  id: totrans-414
  prefs: []
  type: TYPE_NORMAL
  zh: 在人工智能的背景下，欧盟人工智能法案正在实施过程中。这一套法规，预计将在未来几年内生效，旨在规范欧洲人工智能的发展和使用。该法案重点关注确保人工智能系统是透明的、可解释的和非歧视性的，特别关注那些对人们基本权利构成更大风险的应用。在隐私方面，该法案要求用于训练人工智能模型的个人数据应得到高度保护，确保任何敏感信息泄露的风险降至最低。
