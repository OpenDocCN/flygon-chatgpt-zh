- en: Chapter 32\. A TA Based Product Recommendation Engine
  id: totrans-1622
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第 32 章. 基于 TA 的产品推荐引擎
- en: Current Product Recommendation Engines
  id: totrans-1623
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 当前产品推荐引擎
- en: Current product recommendation engines, used by companies like Netflix, Amazon,
    and Spotify, primarily analyse patterns in user interaction data — what users
    watch, purchase, or listen to — to infer preferences and predict future interests.
  id: totrans-1624
  prefs: []
  type: TYPE_NORMAL
  zh: 当前由 Netflix、Amazon 和 Spotify 等公司使用的产品推荐引擎主要分析用户交互数据中的模式——用户观看、购买或听的内容——以推断偏好并预测未来的兴趣。
- en: These systems focus on thematic connections, grouping together items based on
    similar genres, topics, or user ratings.
  id: totrans-1625
  prefs: []
  type: TYPE_NORMAL
  zh: 这些系统侧重于主题关联，根据相似的类型、主题或用户评分将项目分组在一起。
- en: While this approach can successfully identify items of potential interest, it
    overlooks the deeper, behavioural elements of user preferences, such as why a
    user might prefer certain themes over others or how their mood influences their
    choices.
  id: totrans-1626
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然这种方法可以成功地识别出潜在感兴趣的项目，但它忽略了用户偏好的更深层次、行为方面的元素，例如为什么用户可能更喜欢某些主题而不是其他，或者他们的情绪如何影响他们的选择。
- en: Additionally, the mathematical nature of these algorithms means they offer little
    transparency into the reasoning behind their recommendations. Users are presented
    with suggestions based on complex, opaque calculations, making it challenging
    to understand why certain items are recommended and make targeted improvements
    to the system.
  id: totrans-1627
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，这些算法的数学性质意味着它们在推荐背后的推理方面几乎不提供透明度。用户被基于复杂、不透明的计算提出的建议所展示，这使得理解为什么某些项目被推荐以及如何有针对性地改进系统变得具有挑战性。
- en: Designing a Product Recommendation Engine Using an LLM
  id: totrans-1628
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用大型语言模型（LLM）设计产品推荐引擎
- en: Large Language Models, such as GPT 4 are capable of understanding and generating
    human-like text, allowing for more sophisticated analysis of user preferences
    and interactions. When combined with psychoanalytical theory, such as Transactional
    Analysis (TA), LLMs can provide recommendations that are not only thematically
    relevant but also connect with users on a behavioural level.
  id: totrans-1629
  prefs: []
  type: TYPE_NORMAL
  zh: 大型语言模型，如 GPT 4，能够理解和生成类似人类的文本，从而允许对用户偏好和交互进行更复杂化的分析。当与心理分析理论，如交易分析（TA）结合时，LLM
    可以提供不仅主题相关，而且在行为层面上与用户建立联系的推荐。
- en: 'Using LLM-powered, psychologically informed product recommendations has the
    following advantages:'
  id: totrans-1630
  prefs: []
  type: TYPE_NORMAL
  zh: 使用由大型语言模型（LLM）驱动的、心理信息丰富的产品推荐有以下优点：
- en: 'Transparency and Explainability: Unlike traditional product recommendation
    models, LLMs can generate understandable explanations for their recommendations.
    This allows users to understand the logic behind recommendations.'
  id: totrans-1631
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 透明度和可解释性：与传统产品推荐模型不同，LLMs可以为他们的推荐生成可理解的解释。这使用户能够理解推荐背后的逻辑。
- en: 'Behavioural Understanding: By integrating TA, recommendations can reflect a
    deeper understanding of user behaviour and psychological needs. This can lead
    to more varied and engaging suggestions that users might not have discovered otherwise.'
  id: totrans-1632
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 行为理解：通过整合TA，建议可以反映对用户行为和心理需求的更深入理解。这可能导致更多样化和吸引人的建议，用户可能否则不会发现。
- en: 'User-Centric Personalization: Combining thematic analysis with psychological
    insights allows for a more nuanced personalization of recommendations. Users can
    receive suggestions that not only match their interests but also their emotional
    or intellectual needs at the moment.'
  id: totrans-1633
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 以用户为中心的个性化：将主题分析与心理洞察力相结合，可以实现更细致的推荐个性化。用户可以收到不仅符合他们的兴趣，而且符合他们当前情感或智力需求的建议。
- en: 'Engagement: By offering explanations, the model invites users to reflect on
    their own preferences and explore new options that align with their identified
    psychological states.'
  id: totrans-1634
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 参与：通过提供解释，模型邀请用户反思自己的偏好，并探索与他们识别的心理状态一致的新选项。
- en: Specificity of Experience
  id: totrans-1635
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 体验的特定性
- en: Generally speaking, some people prefer experiencing one type of experience many
    times, on the other hand, other people may prefer experiencing a variety of combined
    experiences.
  id: totrans-1636
  prefs: []
  type: TYPE_NORMAL
  zh: 一般而言，有些人更喜欢多次体验同一种类型，另一方面，其他人可能更喜欢体验多种结合的体验。
- en: 'From a Transactional Analysis perspective, we can model these different preferences
    as follows:'
  id: totrans-1637
  prefs: []
  type: TYPE_NORMAL
  zh: 从交易分析的角度来看，我们可以将这些不同的偏好建模如下：
- en: 'Single Ego State Engagement: Some individuals have a pronounced preference
    for experiences that resonate predominantly with a single ego state. This could
    mean seeking experiences that offer comfort and care (Parent), those that stimulate
    intellectual curiosity (Adult), or ones that provide fun and spontaneity (Child).'
  id: totrans-1638
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 单一自我状态参与：有些人对与单一自我状态共鸣的体验有明显的偏好。这可能意味着寻求提供舒适和关怀的体验（父母），那些刺激智力好奇心的体验（成人），或提供乐趣和自发的体验（孩子）。
- en: For example, someone with a single ego state preference for the Child might
    prioritize leisure activities that are purely about fun and enjoyment, like visiting
    an amusement park or engaging in creative hobbies without a set goal.
  id: totrans-1639
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，一个偏好单一自我状态的孩子可能会优先考虑纯粹关于乐趣和娱乐的休闲活动，如参观游乐园或参与没有特定目标的创造性爱好。
- en: 'Balanced Engagement Across All Ego States: Other individuals may seek holistic
    experiences that simultaneously engage the Parent, Adult, and Child ego states.
    These experiences offer a balanced mix of nurturing, learning, and enjoyment.'
  id: totrans-1640
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在所有自我状态中保持平衡参与：其他人可能寻求整体体验，这些体验同时激发父母、成人和孩子自我状态。这些体验提供了一种平衡的滋养、学习和娱乐的混合。
- en: For example, a family vacation that includes visits to historical sites (catering
    to the Parent), educational tours (engaging the Adult), and fun activities (satisfying
    the Child) illustrates this balanced engagement.
  id: totrans-1641
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，包括参观历史遗迹（迎合父母）、教育之旅（激发成人）和娱乐活动（满足孩子）的家庭度假，展示了这种平衡的参与。
- en: 'Dual Ego State Engagement: Some people prefer experiences that cater to two
    ego states, offering a combination of attributes that fulfill dual aspects of
    their personality. This can lead to experiences that are both enriching and enjoyable
    or nurturing and informative.'
  id: totrans-1642
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 双重自我状态参与：有些人更喜欢满足两个自我状态的体验，提供满足他们个性双重方面的属性组合。这可能导致既丰富又愉快或滋养又有信息的体验。
- en: For example, attending a culinary workshop that teaches traditional cooking
    techniques (engaging the Parent for its cultural heritage) while being a hands-on,
    fun activity (engaging the fun-loving Child) can appeal to those seeking a dual
    ego state engagement.
  id: totrans-1643
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，参加一个教授传统烹饪技术的烹饪研讨会（激发父母对文化遗产的参与），同时进行动手、有趣的实践活动（激发爱玩的孩子），可能会吸引那些寻求双重自我状态参与的人。
- en: Subsequently, in order to create a TA based recommendation engine, we need to
    understand if the user prefers specific experiences or a broad range of experiences.
    Additionally, if the user does prefer specific types of experiences, it is necessary
    to understand for which ego state (or states) the user has a preference.
  id: totrans-1644
  prefs: []
  type: TYPE_NORMAL
  zh: 随后，为了创建基于TA的推荐引擎，我们需要了解用户是否偏好特定的体验或广泛的体验范围。此外，如果用户确实偏好特定类型的体验，了解用户对哪种自我状态（或状态）有偏好也是必要的。
- en: TA Based Recommendation Method
  id: totrans-1645
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 基于TA的推荐方法
- en: 'Based on the above ideas, we can design a TA based recommendation method as
    follows:'
  id: totrans-1646
  prefs: []
  type: TYPE_NORMAL
  zh: 根据上述想法，我们可以设计以下基于TA的推荐方法：
- en: 'Understand the context: This could be anything from designing a physical space
    like a garden, curating a menu for a restaurant, or crafting an itinerary for
    a day out.'
  id: totrans-1647
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 理解背景：这可能包括设计一个物理空间，如花园，为餐厅制作菜单，或为一天的行程制定行程。
- en: 'Gather specific requirements or preferences: Collect input on any specific
    needs, desires, or limitations to tailor the recommendations more precisely.'
  id: totrans-1648
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 收集具体需求或偏好：收集关于任何具体需求、愿望或限制的反馈，以便更精确地定制推荐。
- en: 'Determine experiential elements: Identify relevant physical or conceptual elements
    that contribute to the experience. For a garden, this includes plants, design
    features, and functional areas, or for a menu, different food items.'
  id: totrans-1649
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 确定经验元素：识别对体验有贡献的相关物理或概念元素。对于一个花园，这包括植物、设计特征和功能区域，或者对于一个菜单，包括不同的食品项目。
- en: 'Determine ego state weightings: Determine how each ego state relates to the
    experiential elements identified in the previous step.'
  id: totrans-1650
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 确定自我状态权重：确定每个自我状态与上一步中确定的经验元素之间的关系。
- en: In other words, for each element, determine how appealing it is to each ego
    state (Benevolent Parent, Critical Parent, Adult, Adapted Child or Free Child).
  id: totrans-1651
  prefs: []
  type: TYPE_NORMAL
  zh: 换句话说，对于每个元素，确定它对每个自我状态（仁慈的父母、批判的父母、成人、适应型儿童或自由儿童）的吸引力。
- en: 'Create sets of experiences: Identify sets of experiences that appeal to specific
    ego states, to all the ego states together, or to pairs of ego states.'
  id: totrans-1652
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 创建体验集：识别对特定自我状态、所有自我状态或自我状态对的吸引力体验集。
- en: 'Make recommendations: Recommend combinations of elements that align with the
    identified preferences and psychological leanings.'
  id: totrans-1653
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提出推荐：推荐与已识别的偏好和心理倾向一致的元素组合。
- en: 'Explain the rationale: For each recommendation, provide a rationale based on
    the ego state weightings and the desired experiential outcome.'
  id: totrans-1654
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 解释理由：对于每个推荐，提供基于自我状态权重和期望的经验结果的依据。
- en: This TA-based recommendation methodology allows for a specific and personalised
    approach which is suitable for the user’s immediate mood and needs.
  id: totrans-1655
  prefs: []
  type: TYPE_NORMAL
  zh: 这种基于TA的推荐方法允许采取具体和个性化的方法，适合用户的即时情绪和需求。
- en: Worked Example
  id: totrans-1656
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 工作示例
- en: The following example uses a GPT that is designed to implement the above TA-based
    product recommendation method (TA Recommendation Engine - [https://t.ly/ynbI7](https://t.ly/ynbI7)).
  id: totrans-1657
  prefs: []
  type: TYPE_NORMAL
  zh: 以下示例使用了一个旨在实现上述基于TA的产品推荐方法（TA推荐引擎 - [https://t.ly/ynbI7](https://t.ly/ynbI7)）的GPT。
- en: 'Shared chat: [https://t.ly/cYeq2](https://t.ly/cYeq2)'
  id: totrans-1658
  prefs: []
  type: TYPE_NORMAL
  zh: 共享聊天：[https://t.ly/cYeq2](https://t.ly/cYeq2)
- en: '| YouI''m looking for an interesting project to make using materials available
    from my local hardware store.TA Recommendation EngineThat sounds like a fun and
    creative Endeavor! Let''s dive into the process of finding a project that resonates
    with you on all levels - Child, Parent, and Adult - to ensure it’s both enjoyable
    and fulfilling.First, let’s sketch out a few details to guide the recommendation:'
  id: totrans-1659
  prefs: []
  type: TYPE_NORMAL
  zh: '| 我在寻找一个有趣的项目，想用我当地五金店提供的材料来做。TA推荐引擎这听起来像是一项既有趣又富有创意的尝试！让我们深入了解寻找一个能够与你在儿童、父母和成人层面上产生共鸣的项目的过程，以确保它既愉快又充实。首先，让我们勾勒出一些细节来指导推荐：'
- en: What type of project interests you the most? (e.g., home improvement, decorative,
    functional, outdoor, tech-related)
  id: totrans-1660
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你最感兴趣的项目类型是什么？（例如，家居改善、装饰、功能、户外、与科技相关）
- en: Do you have any specific materials you'd like to work with or explore? (wood,
    metal, paint, electronics, etc.)
  id: totrans-1661
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你有没有想要使用或探索的特定材料？（木材、金属、油漆、电子产品等）
- en: What is your skill level with DIY projects or crafts? (beginner, intermediate,
    advanced)
  id: totrans-1662
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你在DIY项目或手工艺方面的技能水平如何？（初学者、中级、高级）
- en: Any specific limitations or preferences to consider? (space, budget, tools available)
  id: totrans-1663
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 有任何需要考虑的具体限制或偏好？（空间、预算、可用的工具）
- en: 'Once we have this information, we can tailor suggestions that touch upon the
    playful creativity of the Child, the enriching and educational aspect of the Parent,
    and the practical, feasible considerations of the Adult.YouI like working with
    wood and it should be tech related.TA Recommendation EngineGreat choice! Working
    with wood offers a warm, natural aesthetic that can beautifully complement tech-related
    projects, blending tradition with modernity. Considering your interest, we''ll
    craft suggestions that incorporate woodworking with a tech twist, ensuring they
    cater to the Child, Parent, and Adult within you. Without knowing your specific
    skill level or limitations, I''ll offer a range of ideas that can be adjusted
    based on complexity and resources.Child-Centric: Interactive Wooden Puzzle Game'
  id: totrans-1664
  prefs: []
  type: TYPE_NORMAL
- en: 'Concept: Create a series of wooden puzzles or a maze that incorporates electronic
    components such as LEDs, sound modules, or simple motors. The goal could be to
    complete the circuit and light up an LED, make a sound, or move a piece of the
    puzzle. This project invites playful interaction and creativity.'
  id: totrans-1665
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Materials Needed: Wood for the puzzle pieces and maze walls, electronic kits
    with LEDs, sound modules, small motors, wires, and batteries.'
  id: totrans-1666
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Skills Required: Basic woodworking and elementary electronics. It’s a fun way
    to learn about circuits and woodworking simultaneously.'
  id: totrans-1667
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Parent-Centric: Educational Wooden Robot Kit'
  id: totrans-1668
  prefs: []
  type: TYPE_NORMAL
- en: 'Concept: Design a wooden robot kit that can be assembled and programmed to
    perform simple tasks. This project is not only about building but also about educating
    on the basics of robotics and programming.'
  id: totrans-1669
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Materials Needed: Wood for the robot body parts, microcontroller (Arduino or
    Raspberry Pi), motors, sensors, and wires.'
  id: totrans-1670
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Skills Required: Intermediate woodworking and programming skills. This project
    blends the craftsmanship of woodworking with the educational value of programming.'
  id: totrans-1671
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Adult-Centric: Smart Wooden Desk Organizer'
  id: totrans-1672
  prefs: []
  type: TYPE_NORMAL
- en: 'Concept: A practical desk organizer made from wood, equipped with smart features
    such as a built-in wireless charger, USB ports, and perhaps a small screen to
    display notifications or the time. This project focuses on enhancing your workspace’s
    functionality and aesthetics.'
  id: totrans-1673
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Materials Needed: Wood for the organizer, wireless charging pad, USB hub, small
    LCD screen, and necessary electronics.'
  id: totrans-1674
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Skills Required: Intermediate woodworking and basic electronics. It''s a project
    that adds convenience and style to your daily routine.'
  id: totrans-1675
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Blended Concept: Interactive Wooden Wall Art with Embedded Tech'
  id: totrans-1676
  prefs: []
  type: TYPE_NORMAL
- en: 'Concept: Create a piece of wooden wall art that integrates LED lighting or
    small screens to display art, information, or mood lighting. The piece could change
    lighting based on the time of day or react to music in the room, combining aesthetics,
    functionality, and interactive elements.'
  id: totrans-1677
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Materials Needed: Wood for the art frame and panels, LED strips or panels,
    microcontroller (capable of handling light patterns or connecting to a music source),
    and possibly small LCD screens for more complex displays.'
  id: totrans-1678
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 需要的材料：用于艺术框架和面板的木材，LED灯带或面板，能够处理灯光模式或连接到音乐源的微控制器，以及可能用于更复杂显示的小型液晶显示屏。
- en: 'Skills Required: Intermediate to advanced woodworking and electronics skills.
    This project beautifully merges the playful nature of interactive art, the enriching
    experience of creating something functional and aesthetically pleasing, and the
    practicality of adding a personalized touch to your living space.'
  id: totrans-1679
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 需要的技能：中级到高级的木工和电子技能。这个项目完美地融合了互动艺术的趣味性，创造功能性且美观产品的丰富体验，以及为你的生活空间增添个性化触感的实用性。
- en: These suggestions are starting points, and I'd be happy to refine them based
    on your feedback, skill level, or any specific preferences you have. Which concept
    sparks your interest, or how can we adjust these ideas to better suit your needs?
    |
  id: totrans-1680
