  zh: '[2](#footnote-12250-2-backlink). 在2023年11月的旧金山DevDay上，OpenAi宣布了一个更大的Token窗口，128K个token，大约每个提示300多页。'
- en: '**4\. Prompting Techniques**'
  id: totrans-502
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '**4. 提示技术**'
- en: You can ask AI almost anything. One thing makes the difference. What and how
    you ask is what and how you get. In the early days of computer programming, the
    expression describing the relation between the quality of the program and what
    you get was "garbage in, garbage out." The meaning is that the computers' output
    is limited to their input. Nowadays, it is valid for AI prompting.
  id: totrans-503
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以向AI提出几乎所有问题。有一点是关键。你问什么和怎么问，就是你会得到什么和怎么得到。在计算机编程的早期，描述程序质量与你得到的结果之间关系的表达是“垃圾进，垃圾出”。这意味着计算机的输出仅限于它们的输入。如今，这同样适用于AI提示。
- en: Ranking prompting techniques by importance and usability can be subjective and
    context-dependent. Different approaches may prove more useful depending on the
    complexity of the task and the desired outcome^([1](#footnote-12123-1)). Typically
    experiencing, users find out which techniques work best for their specific needs.
  id: totrans-504
  prefs: []
  type: TYPE_NORMAL
  zh: 按重要性和使用性对提示技术进行排名可能是主观的和情境依赖的。不同的方法可能根据任务的复杂性和期望的结果而证明更有用^([1](#footnote-12123-1))。通常，经验丰富的用户会发现哪些技术最适合他们的特定需求。
- en: 'Below are a few fundamental techniques to improve our interaction with AI.
    The effectiveness of each of them can vary greatly depending on each situation.
    The most basic and widely used ones—listed below—are not discussed in detail:'
  id: totrans-505
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是一些基本技术，以提高我们与AI的交互。每种技术的有效性可能因情况而异。以下列出的最基本和最广泛使用的技术不会详细讨论：
- en: – Natural Language Prompting, simply asking the model a question as you would
    to a human,
  id: totrans-506
  prefs: []
  type: TYPE_NORMAL
  zh: – 自然语言提示，就像向人类提问一样简单地提问，
- en: – Iterative Prompting, back-and-forth interactions for incremental clarification,
  id: totrans-507
  prefs: []
  type: TYPE_NORMAL
  zh: – 迭代提示，通过来回交互进行增量澄清，
- en: – Corrective Prompting, providing the model with feedback and asking it to correct
    itself,
  id: totrans-508
  prefs: []
  type: TYPE_NORMAL
  zh: – 纠正提示，向模型提供反馈并要求它自我纠正，
- en: – Analogical Prompting, asking AI to think by analogy. It can be helpful for
    creative problem-solving and tasks requiring knowledge transfer.
  id: totrans-509
  prefs: []
  type: TYPE_NORMAL
  zh: – 类比提示，要求AI通过类比进行思考。这有助于创造性问题解决和需要知识转移的任务。
- en: As AI technology evolves, new prompting techniques may emerge, or the existing
    ones may gain or lose relevance.
  id: totrans-510
  prefs: []
  type: TYPE_NORMAL
  zh: 随着AI技术的发展，可能会出现新的提示技术，或者现有的技术可能会变得更有或更不相关。
- en: '**4.1 One-Shot Prompting**'
  id: totrans-511
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**4.1 一次性提示**'
- en: Zero-shot and Few-shot prompts describe the interactions in which we provide
    the model with no example (Zero-shot) or a few examples (Few-shot) to guide the
    model on the new task.
  id: totrans-512
  prefs: []
  type: TYPE_NORMAL
  zh: 零样本和少样本提示描述了我们在没有示例（零样本）或少量示例（少样本）的情况下提供模型以引导模型执行新任务的交互。
- en: One-shot prompting means crafting one concise prompt with clear instructions,
    context, and specific details. The model generates a response based solely on
    this one prompt.
  id: totrans-513
  prefs: []
  type: TYPE_NORMAL
  zh: 一次性提示意味着制作一个简洁的提示，包含清晰的指令、上下文和具体细节。模型将根据这个单一提示生成响应。
- en: The One-shot prompting goal is to craft concise, effective prompts to maximize
    the information extracted from a single interaction.
  id: totrans-514
  prefs: []
  type: TYPE_NORMAL
  zh: 一次性提示的目标是制作简洁、有效的提示，以最大限度地从单次交互中提取信息。
- en: One-shot prompting is useful when you have a specific goal in mind, without
    any need for extended conversations. We have already used it so many times in
    this book. The results are as good as the prompt, so focus on crafting good prompts.
  id: totrans-515
  prefs: []
  type: TYPE_NORMAL
  zh: 当你有明确的目标时，一次性提示非常有用，无需进行长时间的对话。我们已经在本书中多次使用它。结果与提示一样好，所以专注于制作好的提示。
- en: '**Benefits:**'
  id: totrans-516
  prefs: []
  type: TYPE_NORMAL
  zh: '**好处：**'
- en: – Obtaining desired information or responses in a single interaction.
  id: totrans-517
  prefs: []
  type: TYPE_NORMAL
  zh: – 在一次交互中获得所需的信息或响应。
- en: – Saving time (One-shot prompting streamlines the interaction).
  id: totrans-518
  prefs: []
  type: TYPE_NORMAL
  zh: – 节省时间（一次性提示简化了交互）。
- en: – Allowing ChatGPT to draw connections across large bodies of text.
  id: totrans-519
  prefs: []
  type: TYPE_NORMAL
  zh: – 允许ChatGPT在大段文本中建立联系。
- en: By refining prompt composition based on empirical findings, you can enhance
    the quality and relevance of the model's responses. It is a dynamic strategy that
    involves a deep understanding of both the language model's capabilities and the
    art of prompt construction.
  id: totrans-520
  prefs: []
  type: TYPE_NORMAL
  zh: 通过基于经验发现的提示组成优化，你可以提高模型响应的质量和相关性。这是一个涉及对语言模型能力和提示构建艺术的深入理解的动态策略。
- en: '**Challenges:**'
  id: totrans-521
  prefs: []
  type: TYPE_NORMAL
  zh: '**挑战：**'
- en: – Crafting a comprehensive prompt within the constraints of the prompt length
    can be challenging, especially for complex tasks.
  id: totrans-522
  prefs: []
  type: TYPE_NORMAL
  zh: – 在提示长度限制内构建一个全面的提示可能具有挑战性，尤其是在复杂任务中。
- en: – Balancing the amount of context provided in the prompt while keeping it concise
    requires practice.
  id: totrans-523
  prefs: []
  type: TYPE_NORMAL
  zh: – 在保持提示简洁的同时平衡提供上下文的数量需要练习。
- en: '**Use Cases:**'
  id: totrans-524
  prefs: []
  type: TYPE_NORMAL
  zh: '**用例：**'
- en: '– Quick Information Retrieval: When you need a specific piece of information
    or a direct answer, One-shot prompting can provide immediate results.'
  id: totrans-525
  prefs: []
  type: TYPE_NORMAL
  zh: – 快速信息检索：当你需要特定信息或直接答案时，一次性提示可以提供即时结果。
- en: '– Simple Queries: When you have straightforward queries or instructions, One-shot
    prompting eliminates the need for long conversations.'
  id: totrans-526
  prefs: []
  type: TYPE_NORMAL
  zh: – 简单查询：当你有直接的查询或指令时，一次性提示消除了长时间对话的需要。
- en: '– Specific Tasks: Tasks with clear parameters and well-defined goals can often
    be solved effectively using One-shot prompting.'
  id: totrans-527
  prefs: []
  type: TYPE_NORMAL
  zh: – 特定任务：具有明确参数和定义良好目标的任务通常可以使用一次性提示有效地解决。
- en: '– Task Summaries: When you want the model to summarize a topic, a well-crafted
    one-shot prompt can yield concise and relevant summaries.'
  id: totrans-528
  prefs: []
  type: TYPE_NORMAL
  zh: – 任务摘要：当你想让模型总结一个主题时，精心制作的单一提示可以产生简洁且相关的摘要。
- en: '**Empirical Findings**'
  id: totrans-529
  prefs: []
  type: TYPE_NORMAL
  zh: '**实证发现**'
- en: – The wording of instructions significantly influences the quality of the model's
    response. Choose words that precisely convey your intent, avoiding ambiguity.
  id: totrans-530
  prefs: []
  type: TYPE_NORMAL
  zh: – 指令的措辞对模型响应的质量有重大影响。选择精确传达你意图的词语，避免歧义。
- en: – The order of the instructions plays a pivotal role. Experiment with different
    instruction sequences to understand how they affect the model's interpretation
    and response.
  id: totrans-531
  prefs: []
  type: TYPE_NORMAL
  zh: – 指令的顺序起着至关重要的作用。尝试不同的指令序列，以了解它们如何影响模型的解释和响应。
- en: – Models are sensitive to the context, but overloading them with context may
    lead to confusion.
  id: totrans-532
  prefs: []
  type: TYPE_NORMAL
  zh: – 模型对上下文敏感，但过度加载上下文可能会导致混淆。
- en: – Demonstrations can be helpful, but models sometimes misinterpret demonstrations.
  id: totrans-533
  prefs: []
  type: TYPE_NORMAL
  zh: – 演示可能有所帮助，但模型有时会误解演示。
- en: – Reuse the same context for multiple prompts and then average the results.
    The method can mitigate the effects of context variation on the model's responses.
  id: totrans-534
  prefs: []
  type: TYPE_NORMAL
  zh: – 重复使用相同的上下文进行多个提示，然后平均结果。这种方法可以减轻上下文变化对模型响应的影响。
- en: '**4.2 Chain-of-Thought Prompting (CoT)**'
  id: totrans-535
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**4.2 思维链提示（CoT）**'
- en: Chain-of-thought prompting is an advanced technique for complex problems requiring
    logical reasoning or step-by-step explanations. The goal is to promote more transparency
    in AI's thought process.
  id: totrans-536
  prefs: []
  type: TYPE_NORMAL
  zh: 思维链提示是用于需要逻辑推理或逐步解释的复杂问题的先进技术。目标是促进人工智能思维过程的透明度。
- en: This technique involves creating a continuous and evolving conversation by chaining
    a sequence of prompts and responses. Each subsequent prompt is informed by the
    model's previous response, leading to a coherent and contextually rich conversation.
  id: totrans-537
  prefs: []
  type: TYPE_NORMAL
  zh: 这种技术涉及通过链接一系列提示和响应来创建连续和不断发展的对话。每个后续提示都由模型的先前响应所指导，导致连贯且上下文丰富的对话。
- en: CoT is a powerful technique that leverages the model's previous responses to
    create dynamic and evolving conversations. This technique enhances the naturalness
    and richness of interactions with language models.
  id: totrans-538
  prefs: []
  type: TYPE_NORMAL
  zh: CoT是一种强大的技术，它利用模型的前期响应来创建动态和不断发展的对话。这种技术增强了与语言模型交互的自然性和丰富性。
- en: The process begins with an initial prompt that sets the context or topic for
    the conversation. This prompt can be a question, instruction, or statement that
    initiates the interaction.
  id: totrans-539
  prefs: []
  type: TYPE_NORMAL
  zh: 过程从设置对话上下文或主题的初始提示开始。这个提示可以是一个问题、指令或陈述，以启动交互。
- en: The language model generates a reply based on the initial prompt. This reply
    becomes the foundation for the following prompt in the sequence. The subsequent
    prompts reference the model response, and the conversation builds upon earlier
    interaction, ensuring that responses align with the established context.
  id: totrans-540
  prefs: []
  type: TYPE_NORMAL
  zh: 语言模型根据初始提示生成回复。这个回复成为后续提示的基础。后续提示参考模型响应，对话建立在早期交互的基础上，确保响应与已建立的上下文一致。
- en: As the CoT continues, the interaction evolves naturally. The model's replies
    are shaped by its previous outputs, leading to a dynamic and engaging conversation
    that feels more human-like.
  id: totrans-541
  prefs: []
  type: TYPE_NORMAL
  zh: 随着CoT的继续，交互自然发展。模型的回复由其先前输出塑造，导致动态和吸引人的对话，感觉更像人类。
- en: '**Benefits:**'
  id: totrans-542
  prefs: []
  type: TYPE_NORMAL
  zh: '**好处：**'
- en: – The conversations flow naturally, mirroring human interactions.
  id: totrans-543
  prefs: []
  type: TYPE_NORMAL
  zh: – 对话自然流畅，模仿人类互动。
- en: – The technique allows for the gradual development of complex topics, enabling
    the model to provide nuanced insights.
  id: totrans-544
  prefs: []
  type: TYPE_NORMAL
  zh: – 该技术允许复杂主题的逐步发展，使模型能够提供细微的见解。
- en: – CoT is efficient for exploring multifaceted topics or brainstorming ideas.
  id: totrans-545
  prefs: []
  type: TYPE_NORMAL
  zh: – CoT在探索多方面主题或构思想法方面效率很高。
- en: – Since each prompt references the previous response, there is a reduction in
    repetitive statements.
  id: totrans-546
  prefs: []
  type: TYPE_NORMAL
  zh: – 由于每个提示都引用了之前的响应，重复的陈述有所减少。
- en: '**Challenges:**'
  id: totrans-547
  prefs: []
  type: TYPE_NORMAL
  zh: '**挑战：**'
- en: – While the technique enhances context, the model may occasionally misinterpret
    the evolving context.
  id: totrans-548
  prefs: []
  type: TYPE_NORMAL
  zh: – 虽然该技术增强了上下文，但模型有时可能会误解不断变化的上文。
- en: – Over multiple interactions, the length of responses can accumulate and may
    require limiting the model's verbosity.
  id: totrans-549
  prefs: []
  type: TYPE_NORMAL
  zh: – 在多次交互中，响应的长度可能会累积，可能需要限制模型的冗长。
- en: – The model might get stuck in a loop, repeatedly referring to the same context.
  id: totrans-550
  prefs: []
  type: TYPE_NORMAL
  zh: – 该模型可能会陷入循环，反复引用相同的上下文。
- en: '**Use Cases:**'
  id: totrans-551
  prefs: []
  type: TYPE_NORMAL
  zh: '**用例：**'
- en: – To explore a topic from various angles, generating diverse insights.
  id: totrans-552
  prefs: []
  type: TYPE_NORMAL
  zh: – 从不同角度探索一个主题，产生多样化的见解。
- en: – (E.g., for writers) to collaboratively brainstorm and develop plotlines, characters,
    and story arcs.
  id: totrans-553
  prefs: []
  type: TYPE_NORMAL
  zh: – （例如，对于作家）共同构思和开发情节、角色和故事弧。
- en: – To brainstorm solutions to complex problems, iteratively refining ideas.
  id: totrans-554
  prefs: []
  type: TYPE_NORMAL
  zh: – 为了构思复杂问题的解决方案，迭代地完善想法。
- en: – To seek creative ideas and innovative suggestions by building on previous
    model responses.
  id: totrans-555
  prefs: []
  type: TYPE_NORMAL
  zh: – 通过构建在先前模型响应的基础上来寻求创意想法和创新建议。
- en: '**4.3 Tree-of-Thought Prompting (ToT)**'
  id: totrans-556
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**4.3 树状思维提示（ToT）**'
- en: The Tree-of-thought prompting is similar to CoT but with a focus on branching
    paths. Just as a tree branches out in various directions, this approach enables
    you to guide the conversation down different paths, each stemming from the initial
    prompt. It involves posing follow-up questions or prompts based on the model's
    responses, creating a dynamic and multifaceted exchange.
  id: totrans-557
  prefs: []
  type: TYPE_NORMAL
  zh: 树状思维提示与CoT类似，但侧重于分支路径。正如树向各个方向分支一样，这种方法使您能够引导对话沿着不同的路径进行，每个路径都源自初始提示。它涉及根据模型响应提出后续问题或提示，从而创造动态和多角度的交流。
- en: To visualize the technique, imagine a prompt about hobbies. It leads to different
    branches of the conversation. Each one delves deeper into one of the mentioned
    hobbies.
  id: totrans-558
  prefs: []
  type: TYPE_NORMAL
  zh: 为了可视化这种技术，想象一个关于爱好的话题提示。它导致对话的不同分支。每个分支都深入探讨提到的某个爱好。
- en: ToT is useful especially when discussing complex subjects with multiple possible
    outcomes or in a decisional process. ToT creates multi-layered conversations that
    branch into various paths within a single interaction with ChatGPT.
  id: totrans-559
  prefs: []
  type: TYPE_NORMAL
  zh: ToT在讨论具有多种可能结果或决策过程中的复杂主题时特别有用。ToT在ChatGPT的单次交互中创建多层次的对话，这些对话分支到不同的路径。
- en: The ToT technique requires good skills in maintaining the coherence and context
    of the conversation.
  id: totrans-560
  prefs: []
  type: TYPE_NORMAL
  zh: ToT技术要求在保持对话的连贯性和上下文方面具备良好的技能。
- en: '**Benefits:**'
  id: totrans-561
  prefs: []
  type: TYPE_NORMAL
  zh: '**好处：**'
- en: – ToT allows for in-depth exploration of a topic. Branching into different facets,
    you can extract insights, ideas, and perspectives.
  id: totrans-562
  prefs: []
  type: TYPE_NORMAL
  zh: – ToT允许深入探讨一个主题。分支到不同的方面，您可以提取见解、想法和观点。
- en: – This technique leads to more diversity as the model delves into various facets
    of the topic.
  id: totrans-563
  prefs: []
  type: TYPE_NORMAL
  zh: – 随着模型深入探讨主题的各个方面，这种技术导致更多样性。
- en: – The branching nature of the conversation keeps the interaction engaging and
    adaptable, catering to evolving thoughts and questions.
  id: totrans-564
  prefs: []
  type: TYPE_NORMAL
  zh: – 对话的分支特性使互动保持吸引力和适应性，满足不断变化的思想和问题。
- en: – Through follow-up prompts, you can guide the model to learn progressively
    about a specific domain or subject matter.
  id: totrans-565
  prefs: []
  type: TYPE_NORMAL
  zh: – 通过后续提示，您可以引导模型逐步了解特定领域或主题。
- en: '**Challenges:**'
  id: totrans-566
  prefs: []
  type: TYPE_NORMAL
  zh: '**挑战：**'
- en: – As the conversation branches out, ensuring coherence and relevance across
    different threads may become increasingly difficult, potentially resulting in
    fragmented responses.
  id: totrans-567
  prefs: []
  type: TYPE_NORMAL
  zh: – 随着对话分支，确保不同线程之间的连贯性和相关性可能变得越来越困难，可能导致响应碎片化。
- en: – Striking a balance between exploring multiple threads and maintaining a coherent
    flow of conversation can be challenging.
  id: totrans-568
  prefs: []
  type: TYPE_NORMAL
  zh: – 在探索多个线程和维护对话连贯性之间取得平衡可能具有挑战性。
- en: – Models may struggle to seamlessly transition between different branches of
    thought if the context is not maintained clear.
  id: totrans-569
  prefs: []
  type: TYPE_NORMAL
  zh: – 如果上下文没有保持清晰，模型可能难以在思想的不同分支之间无缝过渡。
- en: '**Use Cases:**'
  id: totrans-570
  prefs: []
  type: TYPE_NORMAL
  zh: '**用例：**'
- en: – Ideal to conduct in-depth interviews with a model, allowing you to follow
    up various aspects of a person's life, career, or experiences.
  id: totrans-571
  prefs: []
  type: TYPE_NORMAL
  zh: – 适用于对模型进行深入访谈，让您能够跟进一个人的生活、职业或经历的各种方面。
- en: – (For brainstorming ideas) to explore different angles and variations using
    branching prompts to stimulate creativity.
  id: totrans-572
  prefs: []
  type: TYPE_NORMAL
  zh: – （用于头脑风暴）使用分支提示来探索不同的角度和变体，以激发创造力。
- en: – To dissect complex problems, breaking them into smaller components, analyzing
    each aspect separately.
  id: totrans-573
  prefs: []
  type: TYPE_NORMAL
  zh: – 为了剖析复杂问题，将它们分解成更小的组成部分，分别分析每个方面。
- en: '**4.4 Continuity Prompting**'
  id: totrans-574
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**4.4 连续提示**'
- en: Continuity prompting is a vital technique for rich conversations over several
    sessions as the underlying architecture processes each new session independently
    without memory of previous sessions. Continuity prompting involves crafting prompts
    that reference former sessions in conversations. When re-starting the conversation,
    input the prompt to refresh ChatGPT's memory.
  id: totrans-575
  prefs: []
  type: TYPE_NORMAL
  zh: 连续提示是跨多个会话进行丰富对话的重要技术，因为底层架构独立处理每个新会话，而不记得先前的会话。连续提示涉及构建引用先前会话的提示。当重新开始对话时，输入提示以刷新ChatGPT的记忆。
- en: 'To ensure continuity, users would summarize or reference important details
    from earlier interactions at the beginning of a new session. The reference can
    include:'
  id: totrans-576
  prefs: []
  type: TYPE_NORMAL
  zh: 为了确保连续性，用户会在新会话开始时总结或引用早期交互中的重要细节。引用可以包括：
- en: – Summarizing the previous conversation's outcomes
  id: totrans-577
  prefs: []
  type: TYPE_NORMAL
  zh: – 总结先前的对话结果
- en: – Listing relevant facts, decisions, or action items
  id: totrans-578
  prefs: []
  type: TYPE_NORMAL
  zh: – 列出相关事实、决策或行动项目
- en: – Highlighting any important unsolved questions or tasks.
  id: totrans-579
  prefs: []
  type: TYPE_NORMAL
  zh: – 突出显示任何重要未解决的问题或任务。
- en: By incorporating these elements into the initial prompts of a new session, users
    effectively "remind" AI the previous context, helping maintain a coherent and
    relevant dialogue flow. As language models become more sophisticated, they may
    develop longer-term memory capabilities, which can make continuity prompting less
    relevant.
  id: totrans-580
  prefs: []
  type: TYPE_NORMAL
  zh: 通过将这些元素纳入新会话的初始提示中，用户有效地“提醒”AI先前的上下文，帮助保持连贯和相关的对话流程。随着语言模型的日益复杂，它们可能会发展出更长期记忆的能力，这可能会使连续提示变得不那么相关。
- en: '**Benefits:**'
  id: totrans-581
  prefs: []
  type: TYPE_NORMAL
  zh: '**好处：**'
- en: – Contextual continuity prevents disjointed and fragmented interactions.
  id: totrans-582
  prefs: []
  type: TYPE_NORMAL
  zh: – 上下文连续性防止了断开和碎片化的交互。
- en: – Continuity prompts encourage the model to provide deeper insights and more
    thoughtful responses.
  id: totrans-583
  prefs: []
  type: TYPE_NORMAL
  zh: – 连续提示鼓励模型提供更深入的见解和更深思熟虑的回应。
- en: – The model remembers user preferences, choices, or details from previous prompts.
  id: totrans-584
  prefs: []
  type: TYPE_NORMAL
  zh: – 模型记得用户偏好、选择或先前的提示中的细节。
- en: '**Challenges:**'
  id: totrans-585
  prefs: []
  type: TYPE_NORMAL
  zh: '**挑战：**'
- en: – There is a limit to how much information models can remember. (Remember Context
    Window)
  id: totrans-586
  prefs: []
  type: TYPE_NORMAL
  zh: – 模型能记住的信息量是有限的。（记住上下文窗口）
- en: – When the conversation includes multiple threads, the continuity prompt can
    be challenging.
  id: totrans-587
  prefs: []
  type: TYPE_NORMAL
  zh: – 当对话包含多个线程时，连续提示可能具有挑战性。
- en: – Balancing the inclusion of context with natural language flow can be tricky,
    as overly repetitive references can disrupt the conversational rhythm.
  id: totrans-588
  prefs: []
  type: TYPE_NORMAL
  zh: – 平衡上下文的包含与自然语言流畅性可能很棘手，因为过度重复的引用可能会破坏对话节奏。
- en: '**Use Cases:**'
  id: totrans-589
  prefs: []
  type: TYPE_NORMAL
  zh: '**用例：**'
- en: – Tasks related to learning skills or subjects; maintaining contextual continuity
    allows building upon prior lessons and discussions, enhancing the learning experience.
  id: totrans-590
  prefs: []
  type: TYPE_NORMAL
  zh: – 与学习技能或学科相关的任务；保持上下文连续性有助于在先前的课程和讨论的基础上进行构建，增强学习体验。
- en: – Interactive stories; when creating interactive stories or narratives, continuity
    ensures that characters and events remain consistent throughout the conversation.
  id: totrans-591
  prefs: []
  type: TYPE_NORMAL
  zh: – 交互式故事；在创建交互式故事或叙述时，连续性确保角色和事件在整个对话中保持一致。
- en: – Multiple-step tasks; maintaining context helps the personal assistants to
    provide relevant and accurate information.
  id: totrans-592
  prefs: []
  type: TYPE_NORMAL
  zh: – 多步骤任务；保持上下文有助于个人助理提供相关和准确的信息。
- en: '**4.5 Chain-of-Density Prompting (CoD)**'
  id: totrans-593
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**4.5 连续密度提示（CoD）**'
- en: Chain-of-density prompting is a nuanced prompting technique designed to refine
    information processed by AI, producing increasingly dense and concise summaries.
    It is not widely recognized in standard the AI's prompting methodologies, but
    stands out for its unique approach to enhance content richness without expanding
    length.
  id: totrans-594
  prefs: []
  type: TYPE_NORMAL
  zh: 连续密度提示是一种细微的提示技术，旨在精炼AI处理的信息，产生越来越密集和简洁的摘要。它不在标准AI的提示方法中得到广泛认可，但因其独特的增强内容丰富性的方法而脱颖而出，这种方法不会扩展长度。
- en: In CoD, AI progressively incorporates more complex and substantial information
    – 'densifying' the content – while adhering to a strict word limit. This method
    involves starting with a basic summary and, through iterative prompting, adding
    significant entities from the source material. The challenge is to act without
    increasing the overall summary length, compressing more information.
  id: totrans-595
  prefs: []
  type: TYPE_NORMAL
  zh: 在CoD中，AI逐步融入更多复杂和实质性的信息——“浓缩”内容——同时遵守严格的字数限制。这种方法涉及从基本摘要开始，通过迭代提示，添加来源材料中的重要实体。挑战在于在不增加整体摘要长度的同时，压缩更多信息。
- en: The technique is particularly effective for generating summaries where each
    iteration demands greater detail and specificity, encouraging AI to prioritize
    information efficiently.
  id: totrans-596
  prefs: []
  type: TYPE_NORMAL
  zh: 这种技术在生成需要每次迭代都提供更多细节和具体性的摘要时特别有效，鼓励AI高效地优先处理信息。
- en: '**Benefits:**'
  id: totrans-597
  prefs: []
  type: TYPE_NORMAL
  zh: '**好处：**'
- en: – CoD fosters the ability to communicate more information in fewer words, maintaining
    brevity and relevance.
  id: totrans-598
  prefs: []
  type: TYPE_NORMAL
  zh: – CoD培养了用更少的字数传达更多信息的能力，保持了简洁和相关性。
- en: – It ensures essential entities and concepts, enhancing the summary.
  id: totrans-599
  prefs: []
  type: TYPE_NORMAL
  zh: – 确保了必要的实体和概念，增强了摘要。
- en: – Refining summaries iteratively, AI's outputs become more precise.
  id: totrans-600
  prefs: []
  type: TYPE_NORMAL
  zh: – 通过迭代地精炼摘要，AI的输出变得更加精确。
- en: '**Challenges:**'
  id: totrans-601
  prefs: []
  type: TYPE_NORMAL
  zh: '**挑战：**'
- en: – Balancing the introduction of new entities while maintaining summary length
    requires skillful prompt crafting.
  id: totrans-602
  prefs: []
  type: TYPE_NORMAL
  zh: – 在引入新实体同时保持摘要长度需要技巧性的提示制作。
- en: – There is a potential risk of oversimplifying complex information to meet the
    word count constraint.
  id: totrans-603
  prefs: []
  type: TYPE_NORMAL
  zh: – 存在着将复杂信息过度简化的风险，以满足字数限制。
- en: – Ensuring that the summary remains coherent and contextually accurate while
    adding density can be challenging.
  id: totrans-604
  prefs: []
  type: TYPE_NORMAL
  zh: – 在增加密度的同时确保摘要保持连贯性和上下文准确性可能具有挑战性。
- en: '**Use Cases:**'
  id: totrans-605
  prefs: []
  type: TYPE_NORMAL
  zh: '**用例：**'
- en: – To assist students and researchers in creating summaries of complex academic
    texts.
  id: totrans-606
  prefs: []
  type: TYPE_NORMAL
  zh: – 帮助学生和研究人员创建复杂学术文本的摘要。
- en: – To produce high-density informative content without verbosity.
  id: totrans-607
  prefs: []
  type: TYPE_NORMAL
  zh: – 产生高密度信息内容而不冗长。
- en: – (In data-heavy fields) to summarize reports by focusing on the most significant
    data points.
  id: totrans-608
  prefs: []
  type: TYPE_NORMAL
  zh: – （在数据密集型领域）通过关注最重要的数据点来总结报告。
- en: '**Example Framework:**'
  id: totrans-609
  prefs: []
  type: TYPE_NORMAL
  zh: '**示例框架：**'
- en: 'Initial Prompt:'
  id: totrans-610
  prefs: []
  type: TYPE_NORMAL
  zh: 初始提示：
- en: 'TASK:'
  id: totrans-611
  prefs: []
  type: TYPE_NORMAL
  zh: 任务：
- en: '*Write a summary of the following text, not exceeding 100 words. "[TEXT]"*'
  id: totrans-612
  prefs: []
  type: TYPE_NORMAL
  zh: '*编写以下文本的摘要，不超过100字。"[TEXT]"*'
- en: 'CoD Process:'
  id: totrans-613
  prefs: []
  type: TYPE_NORMAL
  zh: CoD流程：
- en: 'Step 1:'
  id: totrans-614
  prefs: []
  type: TYPE_NORMAL
  zh: 第1步：
- en: '*Learn what constitutes a ''New Entity'' within the provided TEXT.*'
  id: totrans-615
  prefs: []
  type: TYPE_NORMAL
  zh: '*了解在提供的TEXT中构成“新实体”的内容。*'
- en: 'Step 2:'
  id: totrans-616
  prefs: []
  type: TYPE_NORMAL
  zh: 第2步：
- en: '*Identify one ''New Entity'' absent from the existing summary.*'
  id: totrans-617
  prefs: []
  type: TYPE_NORMAL
  zh: '*识别一个在现有摘要中缺失的“新实体”。*'
- en: 'Step 3:'
  id: totrans-618
  prefs: []
  type: TYPE_NORMAL
  zh: 第3步：
- en: '*Compose an improved summary incorporating all entities from the previous version
    plus the ''New Entity.''*'
  id: totrans-619
  prefs: []
  type: TYPE_NORMAL
  zh: '*编写一个改进的摘要，包含上一版本的所有实体以及“新实体”。*'
- en: 'Cycle:'
  id: totrans-620
  prefs: []
  type: TYPE_NORMAL
  zh: 循环：
- en: '*Repeat the cycle ten times to enhance entity density.*'
  id: totrans-621
  prefs: []
  type: TYPE_NORMAL
  zh: '*重复循环十次以增强实体密度。*'
- en: 'Guidelines:'
  id: totrans-622
  prefs: []
  type: TYPE_NORMAL
  zh: 指南：
- en: '*To maintain the word limit, utilize contractions, eliminate superfluous language,
    and continuously refine the summary for flow and clarity.*'
  id: totrans-623
  prefs: []
  type: TYPE_NORMAL
  zh: '*为了维持字数限制，使用缩写，消除多余的语言，并不断精炼摘要以保持流畅和清晰。*'
- en: '**4.6 Skeleton-of-Thought Prompting (SoT)**'
  id: totrans-624
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**4.6 思维骨骼法提示（SoT）**'
- en: The Skeleton-of-thought approach structures prompts to outline the 'bones' or
    essential elements of reasoning before fleshing out the details. It is like building
    the frame of a house before you add the walls and roof. This technique allows
    you to construct a clear and logical framework for the conversation, setting a
    foundation for detailed exploration.
  id: totrans-625
  prefs: []
  type: TYPE_NORMAL
  zh: 思维骨骼法（The Skeleton-of-thought approach）在详细阐述细节之前，结构化提示以概述推理的“骨骼”或基本要素。这就像在添加墙壁和屋顶之前先建造房子的框架。这种技术允许你为对话构建一个清晰且逻辑的框架，为详细探索奠定基础。
- en: Imagine a prompt asking for a plan to start a small business. SoT would lay
    out the foundational steps before delving into the intricacies of each step.
  id: totrans-626
  prefs: []
  type: TYPE_NORMAL
  zh: 想象一个提示要求制定一个启动小型企业的计划。SoT会在深入探讨每一步的复杂性之前，列出基础步骤。
- en: SoT is particularly beneficial when addressing multifaceted issues or concepts
    that require a solid foundational understanding before moving into complex territory.
    It helps in creating a structured and comprehensive discourse with ChatGPT.
  id: totrans-627
  prefs: []
  type: TYPE_NORMAL
  zh: SoT在处理需要先建立坚实基础理解才能进入复杂领域的多方面问题或概念时特别有益。它有助于与ChatGPT创建结构化和全面的对话。
- en: The SoT technique is valuable for its organizational benefits and clarity for
    complex conversations.
  id: totrans-628
  prefs: []
  type: TYPE_NORMAL
  zh: 思维骨骼法（SoT技术）因其组织上的好处和对复杂对话的清晰性而非常有价值。
- en: '**Benefits:**'
  id: totrans-629
  prefs: []
  type: TYPE_NORMAL
  zh: '**好处：**'
- en: – To establish a clear base to build upon, ensuring that complex information
    is well-organized.
  id: totrans-630
  prefs: []
  type: TYPE_NORMAL
  zh: – 为了建立一个清晰的基线，确保复杂信息得到良好的组织。
- en: – To promote clarity and a better understanding of the conversation's direction.
  id: totrans-631
  prefs: []
  type: TYPE_NORMAL
  zh: – 促进清晰性和对对话方向的更好理解。
- en: – To foster a logical flow of information.
  id: totrans-632
  prefs: []
  type: TYPE_NORMAL
  zh: – 培养信息的逻辑流程。
- en: – After establishing the skeleton, the discussion can go into detail in a focused
    manner, directly addressing each point.
  id: totrans-633
  prefs: []
  type: TYPE_NORMAL
  zh: – 在建立框架后，讨论可以以专注的方式深入细节，直接针对每个点。
- en: '**Challenges:**'
  id: totrans-634
  prefs: []
  type: TYPE_NORMAL
  zh: '**挑战：**'
- en: – Starting with an overly simplified outline, it can omit crucial nuances for
    understanding complex issues.
  id: totrans-635
  prefs: []
  type: TYPE_NORMAL
  zh: – 从过于简化的提纲开始，可能会遗漏理解复杂问题的重要细微差别。
- en: – The structured nature of SoT may limit the fluidity of conversation, making
    it less dynamic.
  id: totrans-636
  prefs: []
  type: TYPE_NORMAL
  zh: – SoT的结构性质可能会限制对话的流畅性，使其变得不那么动态。
- en: – Ensuring that the expansion of details remains tied to the original outline
    can be more difficult as the conversation progresses.
  id: totrans-637
  prefs: []
  type: TYPE_NORMAL
  zh: – 随着对话的进行，确保细节的扩展与原始提纲保持联系可能变得更加困难。
- en: '**Use Cases:**'
  id: totrans-638
  prefs: []
  type: TYPE_NORMAL
  zh: '**用例：**'
- en: – To teach concepts in a structured manner, laying out the basics before moving
    into complexities.
  id: totrans-639
  prefs: []
  type: TYPE_NORMAL
  zh: – 以结构化的方式教授概念，在进入复杂性之前先阐述基础知识。
- en: – To devise strategies, providing a clear plan with established preliminary
    steps.
  id: totrans-640
  prefs: []
  type: TYPE_NORMAL
  zh: – 制定策略，提供明确的计划，并建立初步步骤。
- en: – (For writers and content creators) to outline articles or stories before fleshing
    them out.
  id: totrans-641
  prefs: []
  type: TYPE_NORMAL
  zh: – （对于作家和内容创作者）在详细阐述之前先概述文章或故事。
- en: – (In research) to outline a study's methodology before detailing the specific
    procedures and tests.
  id: totrans-642
  prefs: []
  type: TYPE_NORMAL
  zh: – 在研究中，在详细说明具体程序和测试之前，先概述研究的方法论。
- en: The technique proves to be effective in scenarios requiring structured output
    from AI.
  id: totrans-643
  prefs: []
  type: TYPE_NORMAL
  zh: 这种技术在需要AI产生结构化输出的场景中证明是有效的。
- en: 'Example:'
  id: totrans-644
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：
- en: 'TASK:'
  id: totrans-645
  prefs: []
  type: TYPE_NORMAL
  zh: 任务：
- en: '*Write a keynote about Global Warming.*'
  id: totrans-646
  prefs: []
  type: TYPE_NORMAL
  zh: '*撰写一篇关于全球变暖的演讲稿。*'
- en: 'TASK GUIDELINES: (Skeleton)'
  id: totrans-647
  prefs: []
  type: TYPE_NORMAL
  zh: 任务指南：（框架）
- en: '*The main causes of global warming: carbon dioxide emissions, methane, deforestation,
    loss of natural carbon sinks, land usage, human behavior, industrialization.*'
  id: totrans-648
  prefs: []
  type: TYPE_NORMAL
  zh: '*全球变暖的主要原因：二氧化碳排放、甲烷、森林砍伐、自然碳汇的丧失、土地利用、人类行为、工业化。*'
- en: '**4.7 Exercises**'
  id: totrans-649
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**4.7 练习**'
- en: '**1\. One-Shot Technique**'
  id: totrans-650
  prefs: []
  type: TYPE_NORMAL
  zh: '**1. 一次性技术**'
- en: 'Test these prompts and adapt them to fit your needs:'
  id: totrans-651
  prefs: []
  type: TYPE_NORMAL
  zh: 测试这些提示，并根据您的需求进行调整：
- en: 'Quick Definition:'
  id: totrans-652
  prefs: []
  type: TYPE_NORMAL
  zh: 快速定义：
- en: '*Define ''photosynthesis'' and explain its significance in the ecosystem.*'
  id: totrans-653
  prefs: []
  type: TYPE_NORMAL
  zh: '*定义“光合作用”并解释其在生态系统中的重要性。*'
- en: 'Creative Writing:'
  id: totrans-654
  prefs: []
  type: TYPE_NORMAL
  zh: 创意写作：
- en: '*Craft a short story set in a futuristic city where dreams are traded as a
    form of currency.*'
  id: totrans-655
  prefs: []
  type: TYPE_NORMAL
  zh: '*创作一个设定在未来城市中，梦想作为一种货币进行交易的短篇小说。*'
- en: 'Coding Help:'
  id: totrans-656
  prefs: []
  type: TYPE_NORMAL
  zh: 编程帮助：
- en: '*Write a Python function that calculates the factorial of a given positive
    integer.*'
  id: totrans-657
  prefs: []
  type: TYPE_NORMAL
  zh: '*编写一个Python函数，计算给定正整数的阶乘。*'
- en: 'Historical Context:'
  id: totrans-658
  prefs: []
  type: TYPE_NORMAL
  zh: 历史背景：
- en: '*Explain the significance of the Magna Carta and its impact on the development
    of modern democracy.*'
  id: totrans-659
  prefs: []
  type: TYPE_NORMAL
  zh: '*解释大宪章的重要性及其对现代民主发展的影响。*'
- en: 'Recipe Request:'
  id: totrans-660
  prefs: []
  type: TYPE_NORMAL
  zh: 食谱请求：
- en: '*Share a simple recipe for a vegetarian pasta dish with a creamy tomato sauce.*'
  id: totrans-661
  prefs: []
  type: TYPE_NORMAL
  zh: '*分享一个简单素食意面食谱，配以奶油番茄酱。*'
- en: 'Problem-Solving:'
  id: totrans-662
  prefs: []
  type: TYPE_NORMAL
  zh: 解决问题：
- en: '*Solve the quadratic equation x^2 - 5x + 6 = 0 and provide both solutions.*'
  id: totrans-663
  prefs: []
  type: TYPE_NORMAL
  zh: '*解方程 x^2 - 5x + 6 = 0 并提供两个解。*'
- en: '**2\. Chain-of-Thought Technique**'
  id: totrans-664
  prefs: []
  type: TYPE_NORMAL
  zh: '**2. 思维链技术**'
- en: 'Initial Prompt:'
  id: totrans-665
  prefs: []
  type: TYPE_NORMAL
  zh: 初始提示：
- en: '*You''re a skilled chef. Tell me about your vegetarian Transylvanian Gulash.*'
  id: totrans-666
  prefs: []
  type: TYPE_NORMAL
  zh: '*你是一位熟练的大厨。告诉我关于你的素食特兰西瓦尼亚炖牛肉的事。*'
- en: 'Model''s Response:'
  id: totrans-667
  prefs: []
  type: TYPE_NORMAL
  zh: 模型响应：
- en: '*This dish pays homage to the region''s rich culinary heritage, with wild mushrooms
    as the focal point. Tender, earthy chanterelles, and porcini mushrooms dance in
    a hearty stew, woven with the whispers of local herbs.*'
  id: totrans-668
  prefs: []
  type: TYPE_NORMAL
  zh: '*这道菜是对该地区丰富的烹饪传统的致敬，以野生蘑菇为主角。柔软、大地的松露和牛肝菌在浓汤中翩翩起舞，融入了当地香草的低语。*'
- en: 'Subsequent Prompt:'
  id: totrans-669
  prefs: []
  type: TYPE_NORMAL
  zh: 后续提示：
- en: '*Share your approach to sourcing the key ingredients highlighting the importance
    of authenticity.*'
  id: totrans-670
  prefs: []
  type: TYPE_NORMAL
  zh: '*分享您寻找关键原料的方法，强调真实性的重要性。*'
- en: 'Model''s Response:'
  id: totrans-671
  prefs: []
  type: TYPE_NORMAL
  zh: 模型响应：
- en: '*Our wild mushrooms are from the pristine forests of Transylvania itself, lovingly
    handpicked by skilled foragers. The herbs are cultivated in our garden. The red
    wine, a product of local vineyards, infuses the dish with the terroir of the land,
    ensuring every spoonful is a taste of Transylvania.*'
  id: totrans-672
  prefs: []
  type: TYPE_NORMAL
  zh: '*我们的野生蘑菇来自特兰西瓦尼亚本身的原始森林，由熟练的采集者精心挑选。香草在我们自己的花园中种植。红酒是当地葡萄园的产品，为这道菜注入了土地的风土，确保每一勺都是特兰西瓦尼亚的味道。*'
- en: 'Subsequent Prompt:'
  id: totrans-673
  prefs: []
  type: TYPE_NORMAL
  zh: 后续提示：
- en: '*Illuminate the cooking techniques employed to achieve the balance of flavors
    and textures in the Transylvanian Wild Mushroom Gulash.*'
  id: totrans-674
  prefs: []
  type: TYPE_NORMAL
  zh: '*请阐述在特兰西瓦尼亚野生蘑菇牛肉炖菜中实现口味和质地平衡所采用的烹饪技巧。*'
- en: 'Model''s Response:'
  id: totrans-675
  prefs: []
  type: TYPE_NORMAL
  zh: 模型响应：
- en: '*Crafting this Gulash involves a symphony of culinary techniques. The wild
    mushrooms are sautéed to enhance their natural flavors before being gently simmered
    in a rich broth. The caramelized onions and garlic, a testament to Transylvania''s
    rustic charm, infuse depth into the stew. As the Gulash simmers, the red wine
    gradually melds with the mushrooms, creating a harmonious union of tastes. A dash
    of smoked paprika completes the masterpiece, adding layers of complexity and a
    whisper of Transylvanian mystique.*'
  id: totrans-676
  prefs: []
  type: TYPE_NORMAL
  zh: '*制作这道匈牙利牛肉炖菜需要一系列烹饪技巧。野生蘑菇先煎炒至增强其自然风味，然后轻轻炖煮在浓郁的肉汤中。焦糖化的洋葱和大蒜，是特兰西瓦尼亚乡村魅力的证明，为炖菜增添了深度。随着牛肉炖菜的炖煮，红酒逐渐与蘑菇融合，创造出和谐的口味结合。一撮烟熏辣椒为这件杰作画上了完美的句点，增添了复杂层次和一丝特兰西瓦尼亚的神秘感。*'
- en: '**3\. Tree-of-Thought Technique**'
  id: totrans-677
  prefs: []
  type: TYPE_NORMAL
  zh: '**3. 思维树技术**'
- en: 'Initial Prompt:'
  id: totrans-678
  prefs: []
  type: TYPE_NORMAL
  zh: 初始提示：
- en: '*Tell me about your favorite hobbies.*'
  id: totrans-679
  prefs: []
  type: TYPE_NORMAL
  zh: '*请告诉我你最喜欢的爱好。*'
- en: 'Model''s Response:'
  id: totrans-680
  prefs: []
  type: TYPE_NORMAL
  zh: 模型响应：
- en: '*One of my favorite hobbies is painting. I find it incredibly relaxing and
    it allows me to express my creativity. I also enjoy hiking in nature, as it gives
    me a sense of serenity and a break from technology.*'
  id: totrans-681
  prefs: []
  type: TYPE_NORMAL
  zh: '*我最喜欢的爱好之一是绘画。我觉得它非常放松，并允许我表达我的创造力。我也喜欢在自然中徒步旅行，因为它给我一种宁静感，并让我从科技中解脱出来。*'
- en: 'Branch 1 - Follow-up Prompt:'
  id: totrans-682
  prefs: []
  type: TYPE_NORMAL
  zh: 分支1 - 追问提示：
- en: '*Tell me more about your painting hobby. What kind of subjects do you like
    to paint?*'
  id: totrans-683
  prefs: []
  type: TYPE_NORMAL
  zh: '*请告诉我更多关于你的绘画爱好。你喜欢画什么主题？*'
- en: 'Model''s Response (Branch 1):'
  id: totrans-684
  prefs: []
  type: TYPE_NORMAL
  zh: 模型响应（分支1）：
- en: '*When it comes to painting, I''m drawn to landscapes and vibrant colors. I
    often find inspiration from nature scenes, like sunsets over the ocean or lush
    forests. I love playing with different shades to capture the beauty and emotions
    of the natural world.*'
  id: totrans-685
  prefs: []
  type: TYPE_NORMAL
  zh: '*说到绘画，我偏爱风景和鲜艳的色彩。我经常从自然场景中寻找灵感，比如海洋上的日落或茂密的森林。我喜欢玩不同的色调来捕捉自然世界的美丽和情感。*'
- en: 'Branch 2 - Follow-up Prompt:'
  id: totrans-686
  prefs: []
  type: TYPE_NORMAL
  zh: 分支2 - 追问提示：
- en: '*What are some of your favorite hiking spots?*'
  id: totrans-687
  prefs: []
  type: TYPE_NORMAL
  zh: '*你最喜欢的徒步地点有哪些？*'
- en: 'Model''s Response (Branch 2):'
  id: totrans-688
  prefs: []
  type: TYPE_NORMAL
  zh: 模型响应（分支2）：
- en: '*Hiking is a wonderful way for me to disconnect and recharge. I''ve explored
    some beautiful trails near my home, like a scenic trail in the nearby mountains
    and a peaceful forest path. The fresh air and sounds of nature are truly rejuvenating.*'
  id: totrans-689
  prefs: []
  type: TYPE_NORMAL
  zh: '*徒步旅行是我放松和充电的绝佳方式。我在家附近探索了一些美丽的步道，比如附近山上的风景步道和一条宁静的森林小径。新鲜的空气和自然的声音确实让人焕然一新。*'
- en: '[1](#footnote-12123-1-backlink). OpenAI, "Prompt engineering" (accessed in
    November 2023; [https://platform.openai.com/docs/guides/prompt-engineering](https://platform.openai.com/docs/guides/prompt-engineering)).'
  id: totrans-690
  prefs: []
  type: TYPE_NORMAL
  zh: '[1](#footnote-12123-1-backlink)。OpenAI，"提示工程"（2023年11月访问；[https://platform.openai.com/docs/guides/prompt-engineering](https://platform.openai.com/docs/guides/prompt-engineering))。'
- en: '**5\. Expanding ChatGPT**'
  id: totrans-691
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '**5. 扩展ChatGPT**'
- en: We started by using our mobile phone just to call someone. Then, when our mobile
    phones became smarter and could connect to the internet, we could send short messages,
    email, use social media, and run apps offering new capabilities like financial
    services. Later updates offered us access to new settings and personalization,
    and we were thrilled to discover, from time to time, new capabilities. We also
    expect that our smartphone's operating system will be regularly updated, and new
    capabilities will be added.
  id: totrans-692
  prefs: []
  type: TYPE_NORMAL
  zh: 我们最初只是用手机打电话。然后，随着手机变得越来越智能并能连接到互联网，我们可以发送短信、电子邮件、使用社交媒体，并运行提供新功能的应用，如金融服务。后续更新为我们提供了新的设置和个性化选项，我们不时地发现新的功能。我们也期待智能手机的操作系统将定期更新，并添加新功能。
- en: We call this our smartphone ecosystem where the updates and the new capabilities
    represent the smartphone's constant evolution, the constant adaptation to new
    challenges and user needs.
  id: totrans-693
  prefs: []
  type: TYPE_NORMAL
  zh: 我们称之为智能手机生态系统，其中更新和新功能代表了智能手机的不断进化，不断适应新的挑战和用户需求。
- en: It works similarly for ChatGPT and its constantly evolving ecosystem. Every
    additional capability and feature represent an added accessory or utility, making
    ChatGPT a more versatile and indispensable tool in the modern digital age.
  id: totrans-694
  prefs: []
  type: TYPE_NORMAL
  zh: 对于ChatGPT及其不断发展的生态系统来说，情况类似。每一个额外的功能和特性都代表了一个附加的配件或实用工具，使得ChatGPT在现代社会中成为一个更加多才多艺且不可或缺的工具。
- en: One is the browsing capability that fetches fresh information from the vast
    web universe. It is much like a smartphone's browser app, accessing vast amounts
    of information in real time. The web browsing feature allows ChatGPT to provide
    more current information than its training data, which—as of September 2023—is
    up to date only until January 2022.
  id: totrans-695
  prefs: []
  type: TYPE_NORMAL
  zh: 第一个是有浏览功能，从浩瀚的互联网宇宙中获取新鲜信息。它就像智能手机的浏览器应用一样，实时访问大量信息。网络浏览功能使 ChatGPT 能够提供比其训练数据更新的信息，而截至
    2023 年 9 月，其训练数据仅更新至 2022 年 1 月。
- en: The second one is the capability to use plugins. The plugins are comparable
    to the myriad of apps you can install on your smartphone, each enhancing the phone's
    functionality, and offering specialized tools and features. The vast universe
    of plugins allows third-party services to provide capabilities that are not built
    into ChatGPT. For example, a plugin may provide math computations, language translation,
    or database lookups.
  id: totrans-696
  prefs: []
  type: TYPE_NORMAL
  zh: 第二个是使用插件的能力。插件可以比作您可以在智能手机上安装的无数应用，每个都增强了手机的功能，并提供专门的工具和功能。插件的大千世界允许第三方服务提供
    ChatGPT 内部未构建的能力。例如，一个插件可能提供数学计算、语言翻译或数据库查询。
- en: And the analogy does not stop there. Custom instructions—introduced in a previous
    chapter—are like the settings and preferences you adjust to tailor your phone
    experience to your desire. And Advanced Data Analytics—which we will meet in the
    next pages—can be likened to the phone's diagnostic tools, diving deep into system
    performance, ensuring everything runs optimally.
  id: totrans-697
  prefs: []
  type: TYPE_NORMAL
  zh: 并且这种类比并未停止。在前一章中引入的定制指令，就像您调整以定制手机体验的设置和偏好一样。而我们在下一页将要遇到的“高级数据分析”——可以比作手机的诊断工具，深入系统性能，确保一切运行最优。
- en: This chapter promises to elevate your understanding and harness the full potential
    of ChatGPT. Let's embark on this enlightening journey together!
  id: totrans-698
  prefs: []
  type: TYPE_NORMAL
  zh: 本章承诺提升您对 ChatGPT 的理解，并充分利用其全部潜力。让我们共同踏上这段启迪人心的旅程吧！
- en: '**5.1 Browsing with Bing**'
  id: totrans-699
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**5.1 使用 Bing 浏览**'
- en: The very nature of our information landscape is constantly changing. News breaks,
    scientific discoveries emerge, tech evolves, and culture shifts. A static database,
    frozen at a point in time, cannot hope to keep up with this relentless tide of
    latest information; therefore, the idea of imbuing ChatGPT with web browsing capabilities.
  id: totrans-700
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的信息景观的本质始终在变化。新闻发生，科学发现出现，技术发展，文化转变。一个在某个时间点冻结的静态数据库无法希望跟上这种最新信息的无情潮流；因此，赋予
    ChatGPT 网络浏览能力的想法。
- en: Browse with Bing was disabled in July 2023 out of "an abundance of caution,"
    and reinstated in September 2023\. OpenAI has since added updates including functions
    so sites can control how ChatGPT interacts with them.
  id: totrans-701
  prefs: []
  type: TYPE_NORMAL
  zh: 由于“谨慎起见”，Bing 浏览功能于 2023 年 7 月被禁用，并于 2023 年 9 月恢复。OpenAI 此后添加了更新，包括允许网站控制 ChatGPT
    如何与之交互的功能。
- en: ChatGPT's browsing capability serves as a bridge between the model's vast internal
    knowledge and the ever-changing, dynamic world of the internet, offering users
    a more timely and comprehensive response to their queries (Figure 5.1).
  id: totrans-702
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT 的浏览功能在模型庞大的内部知识和不断变化的互联网动态世界之间架起了一座桥梁，为用户提供更及时、更全面的查询响应（图 5.1）。
- en: '1\. THE USER INITIATES BROWSING: Question(s) that require(s) up-to-date information.'
  id: totrans-703
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 用户启动浏览：需要最新信息的提问。
- en: '2\. THE MODEL INTERPRETS THE QUERY: The model interprets your request, formulating
    it into a query that is suitable for a search engine. For instance, if you ask,
    "What are the recent advancements in electric cars?," it may translate into a
    search query like "latest electric car advancements 2023."'
  id: totrans-704
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 模型解释查询：模型解释您的请求，将其制定成适合搜索引擎的查询。例如，如果您问，“电动汽车的最近进展是什么？”，它可能翻译成搜索查询“2023 年最新电动汽车进展。”
- en: '3\. FETCHING SEARCH RESULTS: The model will then retrieve a list of search
    results, similar to what you would see if you typed a query into a search engine.
    It does not actually "click" on links as humans do, but it gets a snapshot of
    the content from the search results.'
  id: totrans-705
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 获取搜索结果：模型随后将检索一系列搜索结果，类似于您在搜索引擎中输入查询时看到的结果。它实际上并不像人类那样“点击”链接，而是从搜索结果中获取内容快照。
- en: '4\. DATA EXTRACTION AND ANALYSIS: The model scans these results, identifying
    the most relevant snippets of information. It then extracts and processes this
    data to form a coherent response to your question.'
  id: totrans-706
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 数据提取和分析：模型扫描这些结果，识别最相关的信息片段。然后它提取并处理这些数据，以形成对您问题的连贯回答。
- en: '![Figure_5.1.tif](../Images/Figure_5.1_fmt.png)'
  id: totrans-707
  prefs: []
  type: TYPE_IMG
  zh: '![图5.1.tif](../Images/Figure_5.1_fmt.png)'
- en: '*Figure 5.1 Scheme of ChatGPT browsing capability*'
  id: totrans-708
  prefs: []
  type: TYPE_NORMAL
  zh: '*图5.1 ChatGPT浏览功能方案*'
- en: '5\. CRAFTING A RESPONSE: With the extracted data "in hand," the model synthesizes
    a comprehensive answer. This involves piecing together information from multiple
    sources, ensuring the answer is both relevant and informative.'
  id: totrans-709
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 构建响应：拥有提取的数据“在手”，模型综合生成一个全面的答案。这涉及到从多个来源拼接信息，确保答案既相关又具有信息性。
- en: '6\. RESPONSE DELIVERY: Finally, the model provides you with a neatly formatted
    response, including relevant links, based on the most pertinent information it
    found.'
  id: totrans-710
  prefs: []
  type: TYPE_NORMAL
  zh: 6. 响应交付：最后，模型根据它找到的最相关信息，为您提供格式整洁的响应，包括相关链接。
- en: ChatGPT Browse with Bing is a beta feature (available to ChatGPT Plus subscribers)
    that allows ChatGPT to search the internet in order to answer questions that benefit
    from the latest information.
  id: totrans-711
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT 浏览 Bing 是一个测试功能（仅对 ChatGPT Plus 订阅者开放），允许 ChatGPT 搜索互联网以回答受益于最新信息的提问。
- en: Launch ChatGPT. You will be greeted with a friendly interface, ready to converse
    and explore.
  id: totrans-712
  prefs: []
  type: TYPE_NORMAL
  zh: 启动 ChatGPT。您将看到一个友好的界面，准备好进行对话和探索。
- en: Navigate to settings. Click "Enable Bing Browsing" and toggle it on.
  id: totrans-713
  prefs: []
  type: TYPE_NORMAL
  zh: 转到设置。点击“启用 Bing 浏览”并切换它。
- en: '![Screenshoot1.tif](../Images/Screenshoot1_fmt.png)'
  id: totrans-714
  prefs: []
  type: TYPE_IMG
  zh: '![截图1.tif](../Images/Screenshoot1_fmt.png)'
- en: Select "Browse with Bing" capability and start your first query.
  id: totrans-715
  prefs: []
  type: TYPE_NORMAL
  zh: 选择“使用 Bing 浏览”功能并开始您的第一个查询。
- en: '![Screenshoot2_1.tif](../Images/Screenshoot2_1_fmt.png)'
  id: totrans-716
  prefs: []
  type: TYPE_IMG
  zh: '![截图2_1.tif](../Images/Screenshoot2_1_fmt.png)'
- en: Type in a question or statement. Say, "What's the latest in ChatGPT multimodal
    capability?" ChatGPT will now utilize Bing to browse the web and provide you with
    the freshest insights.
  id: totrans-717
  prefs: []
  type: TYPE_NORMAL
  zh: 输入一个问题或陈述。比如说，“ChatGPT的多模态能力最新进展是什么？”现在 ChatGPT 将利用 Bing 浏览网络，并为您提供最新的见解。
- en: '![Screenshoot3.tif](../Images/Screenshoot3_fmt.png)'
  id: totrans-718
  prefs: []
  type: TYPE_IMG
  zh: '![截图3.tif](../Images/Screenshoot3_fmt.png)'
- en: Of course, you can engage with ChatGPT responses. If you click on the reference
    1., a browser window will open, and you can check the source of the information.
  id: totrans-719
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，您可以与 ChatGPT 的响应进行互动。如果您点击参考1，浏览器窗口将打开，您可以检查信息的来源。
- en: Ask follow-up questions and refine your queries to drill down into specifics.
    It is a dialogue that educates and enlightens.
  id: totrans-720
  prefs: []
  type: TYPE_NORMAL
  zh: 提出后续问题并细化您的查询，以深入了解具体细节。这是一个教育和启迪的对话。
- en: For instance, suppose you search for "generative AI applications." Upon viewing
    the results, you decide to delve deeper into a particular area, say, "generative
    AI in music production." You refine the query, and now ChatGPT assists you in
    exploring articles or resources specific to AI's generative role in music production.
    This iterative process of refining queries helps to narrow down the focus and
    extract more precise information or resources based on evolving interests or inquiries.
  id: totrans-721
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，假设您搜索“生成式AI应用”。在查看结果后，您决定深入研究一个特定领域，比如“音乐制作中的生成式AI”。您细化查询，现在 ChatGPT 将协助您探索特定于AI在音乐制作中生成角色的文章或资源。这种查询细化的迭代过程有助于缩小焦点，并根据不断变化的需求或查询提取更精确的信息或资源。
- en: Worth mentioning that ChatGPT's system does not store personal data, and every
    browsing session with Bing is ephemeral. This means once your question has been
    addressed, all related browsing data is discarded, deleting the history of the
    user's specific requests.
  id: totrans-722
  prefs: []
  type: TYPE_NORMAL
  zh: 值得一提的是，ChatGPT 的系统不存储个人数据，并且与 Bing 的每一次浏览会话都是短暂的。这意味着一旦您的问题得到解答，所有相关的浏览数据都会被丢弃，删除用户特定请求的历史记录。
- en: '**5.2 Expanding Horizons with Plugins**'
  id: totrans-723
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**5.2 使用插件拓展视野**'
- en: Plugins are tools designed specifically for LLMs like ChatGPT to connect them
    to external third-party services or tools (Figure 5.2). The companies behind these
    plugins may have a different policy regarding your data, not meeting OpenAI's
    moral code. Make sure you read the policy docs.
  id: totrans-724
  prefs: []
  type: TYPE_NORMAL
  zh: 插件是为像 ChatGPT 这样的 LLM 设计的工具，旨在将它们连接到外部第三方服务或工具（图5.2）。这些插件背后的公司可能对您的数据有不同的政策，不符合
    OpenAI 的道德准则。请确保您阅读了政策文档。
- en: '![Figure_5.2.tif](../Images/Figure_5.2_fmt.png)'
  id: totrans-725
  prefs: []
  type: TYPE_IMG
  zh: '![图5.2.tif](../Images/Figure_5.2_fmt.png)'
- en: '*Figure 5.2 Scheme of ChatGPT plugin capability*'
  id: totrans-726
  prefs: []
  type: TYPE_NORMAL
  zh: '*图5.2 ChatGPT插件功能方案*'
- en: 'The use cases for ChatGPT plugins are extensive^([1](#footnote-11840-1)); here
    are the most common:'
  id: totrans-727
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT 插件的应用场景非常广泛^([1](#footnote-11840-1))；以下是最常见的：
- en: – Access external data available on the web.
  id: totrans-728
  prefs: []
  type: TYPE_NORMAL
  zh: – 访问网络上可用的外部数据。
- en: – Access private data.
  id: totrans-729
  prefs: []
  type: TYPE_NORMAL
  zh: – 访问私有数据。
- en: – Retrieve real-time information (such as news).
  id: totrans-730
  prefs: []
  type: TYPE_NORMAL
  zh: – 获取实时信息（例如新闻）。
- en: – Help users complete online actions (such as booking).
  id: totrans-731
  prefs: []
  type: TYPE_NORMAL
  zh: – 帮助用户完成在线操作（如预订）。
- en: '**How to install a ChatGPT plugin**'
  id: totrans-732
  prefs: []
  type: TYPE_NORMAL
  zh: '**如何安装 ChatGPT 插件**'
- en: • Open ChatGPT. In the bottom left corner, select Settings > Beta Features,
    then toggle the Plugins setting.
  id: totrans-733
  prefs: []
  type: TYPE_NORMAL
  zh: • 打开 ChatGPT。在左下角，选择“设置”>“测试功能”，然后切换“插件”设置。
- en: • In ChatGPT, select New Chat.
  id: totrans-734
  prefs: []
  type: TYPE_NORMAL
  zh: 在 ChatGPT 中，选择“新建聊天”。
- en: • Switch the ChatGPT model to GPT-4.
  id: totrans-735
  prefs: []
  type: TYPE_NORMAL
  zh: • 将 ChatGPT 模型切换到 GPT-4。
- en: • From the dropdown menu, select Plugins > Plugin Store
  id: totrans-736
  prefs: []
  type: TYPE_NORMAL
  zh: • 从下拉菜单中选择“插件”>“插件商店”
- en: • Now, select the ChatGPT plugin you want to install.
  id: totrans-737
  prefs: []
  type: TYPE_NORMAL
  zh: • 现在，选择你想要安装的 ChatGPT 插件。
- en: '![Screenshoot4.tif](../Images/Screenshoot4_fmt.png)'
  id: totrans-738
  prefs: []
  type: TYPE_IMG
  zh: '![Screenshoot4.tif](../Images/Screenshoot4_fmt.png)'
- en: Before installing and using any plugin, please remember to check "Developer
    info." You can find it at the bottom of the plugin description (see image above).
    This is a must since privacy and data ethics are not provided by OpenAI but by
    the third party providing the plugin. Read the Terms of Use. It may store your
    document in its database and share it with other business partners.
  id: totrans-739
  prefs: []
  type: TYPE_NORMAL
  zh: 在安装和使用任何插件之前，请记住检查“开发者信息”。您可以在插件描述的底部找到它（见上图）。这是必须的，因为隐私和数据伦理不是由 OpenAI 提供，而是由提供插件的第三方提供。阅读使用条款。它可能会将其存储在其数据库中，并与其他商业伙伴共享。
- en: The content and services listed on this site are solely for informational purposes
    and do not constitute professional advice. They have not been reviewed or approved
    by any mentioned entities. Therefore, you are accountable for your actions and
    decisions based on the information provided here.
  id: totrans-740
  prefs: []
  type: TYPE_NORMAL
  zh: 本网站上列出的内容和服务仅用于信息目的，并不构成专业建议。它们未经任何提及实体的审查或批准。因此，你应根据此处提供的信息采取行动和做出决定。
- en: Installation should take less than a minute. To uninstall, just select the plugin
    again. However, there is currently no "All Plugins" list to make it easy to unsubscribe.
    Also, there is no feature to sort the plugins, so you are left to scroll through
    every page until you find what you want. Search functionality will come with a
    later update, but it would be useful to have these UI features for more practical
    use.
  id: totrans-741
  prefs: []
  type: TYPE_NORMAL
  zh: 安装应不超过一分钟。要卸载，只需再次选择插件即可。然而，目前还没有“所有插件”列表，以便轻松取消订阅。此外，没有排序插件的功能，因此你必须滚动浏览每一页，直到找到你想要的内容。搜索功能将在后续更新中提供，但拥有这些
    UI 功能将使其实用性更强。
- en: How you use a ChatGPT plugin depends on the plugin you install. But the general
    gist of ChatGPT plugin usage functions like regular ChatGPT; you ask your question,
    and ChatGPT provides an answer. The accuracy of your answer depends on the quality
    of your prompt, but now also depends on the quality of the ChatGPT plugin. Remember
    that ChatGPT Plugin is a beta feature. The ChatGPT Plugin ecosystem is not fully
    up and running yet, and despite the number of available plugins, only few work
    as they should—or as we might like.
  id: totrans-742
  prefs: []
  type: TYPE_NORMAL
  zh: 你如何使用 ChatGPT 插件取决于你安装的插件。但 ChatGPT 插件的使用方法与常规 ChatGPT 类似；你提出问题，ChatGPT 提供答案。答案的准确性取决于你的提示质量，但现在也取决于
    ChatGPT 插件的质量。请记住，ChatGPT 插件是一个测试功能。ChatGPT 插件生态系统尚未完全运行，尽管有可用的插件数量，但只有少数按预期或我们希望的方式工作。
- en: Please exercise caution when using any plugin. While available on ChatGPT Plugin
    Store, they have not been verified by the author of this book. Use them at your
    own risk. Potential security risks may be associated.
  id: totrans-743
  prefs: []
  type: TYPE_NORMAL
  zh: 使用任何插件时请谨慎。尽管它们在 ChatGPT 插件商店中可用，但它们尚未经过本书作者的验证。使用它们的风险自负。可能存在潜在的安全风险。
- en: '**5.3 Image Input Capability**'
  id: totrans-744
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**5.3 图像输入功能**'
- en: Image Input is an extension of the ChatGPT text-based interface, a bridge between
    visual data representation and textual understanding, making data interpretation
    more accessible and insightful.
  id: totrans-745
  prefs: []
  type: TYPE_NORMAL
  zh: 图像输入是 ChatGPT 文本界面的扩展，是视觉数据表示和文本理解之间的桥梁，使数据解释更加易于访问和有洞察力。
- en: This capability allows users to upload an image file that GPT engine can then
    analyze and interpret. (Just click the File Upload button in the Commands Field,
    see Figure 2.2)
  id: totrans-746
  prefs: []
  type: TYPE_NORMAL
  zh: 这种功能允许用户上传图像文件，然后 GPT 引擎可以分析并解释它。（只需在命令字段中点击“文件上传”按钮，见图 2.2）
- en: Once the image is processed, the engine provides textual descriptions, answers
    questions about the image, or even generates stories or hypotheses based on its
    content. This multi-modal approach enhances the engine's versatility, making it
    not just a text-based tool, but a more comprehensive assistant capable of understanding
    and interacting through both text and visual elements.
  id: totrans-747
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦图像被处理，引擎提供文本描述，回答有关图像的问题，甚至根据其内容生成故事或假设。这种多模态方法增强了引擎的通用性，使其不仅是一个基于文本的工具，而是一个更全面的助手，能够通过文本和视觉元素进行理解和交互。
- en: Although OpenAI's platform is designed to prioritize user privacy, and images
    are not stored or used for other purposes, the rule of thumb is to make sure the
    images to be uploaded do not contain identifiable information.
  id: totrans-748
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管OpenAI的平台旨在优先考虑用户隐私，并且图像不会被存储或用于其他目的，但一般规则是确保要上传的图像不包含可识别的信息。
- en: Here are a few use cases.
  id: totrans-749
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一些用例。
- en: '**Analyze charts**'
  id: totrans-750
  prefs: []
  type: TYPE_NORMAL
  zh: '**分析图表**'
- en: You can upload various types of charts like clustered columns charts, pie charts,
    or line graphs. The GPT engine can interpret visual data and translate it into
    textual information. This is particularly useful for summarizing key insights,
    spotting trends, or identifying outliers.
  id: totrans-751
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以上传各种类型的图表，如簇状柱状图、饼图或折线图。GPT引擎可以解释视觉数据并将其转换为文本信息。这对于总结关键见解、发现趋势或识别异常特别有用。
- en: For example, you upload a sales performance chart, and the engine provides you
    with a concise summary, mentioning which quarter has the highest sales and which
    product is the best performer. This capability adds an extra layer of convenience
    for those who prefer to digest data visually but also want the nuanced understanding
    that comes from textual analysis.
  id: totrans-752
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，您上传一个销售业绩图表，引擎会为您提供简洁的摘要，指出哪个季度销售最高以及哪个产品表现最佳。这种能力为那些喜欢以视觉方式消化数据但同时也希望获得文本分析带来的细微理解的人提供了额外的便利。
- en: '![Screenshoot5a.tif](../Images/Screenshoot5a_fmt.png)'
  id: totrans-753
  prefs: []
  type: TYPE_IMG
  zh: '![Screenshoot5a.tif](../Images/Screenshoot5a_fmt.png)'
- en: '![Screenshoot5b.tif](../Images/Screenshoot5b_fmt.jpeg)![Screenshoot5c.tif](../Images/Screenshoot5c_fmt.png)'
  id: totrans-754
  prefs: []
  type: TYPE_IMG
  zh: '![Screenshoot5b.tif](../Images/Screenshoot5b_fmt.jpeg)![Screenshoot5c.tif](../Images/Screenshoot5c_fmt.png)'
- en: '**Analyze X-rays**'
  id: totrans-755
  prefs: []
  type: TYPE_NORMAL
  zh: '**分析X射线**'
- en: Upload an X-ray image and request a general overview of the image or ask specific
    questions. The GPT engine analyzes visual information, relates findings to its
    database of textual information, and provides relevant insights. Then you can
    have a conversation with the engine. It is useful especially for individuals who
    do not have medical expertise, offering a plain-language understanding of what
    the X-ray image shows.
  id: totrans-756
  prefs: []
  type: TYPE_NORMAL
  zh: 上传一张X射线图像并请求对图像的一般概述或提出具体问题。GPT引擎分析视觉信息，将发现与文本信息数据库相关联，并提供相关见解。然后您可以与引擎进行对话。这对于没有医学专业知识的人来说特别有用，它提供了对X射线图像显示内容的简单语言理解。
- en: The engine provides a general understanding; it may not catch minute or highly
    specialized details that a trained eye would do, so, it is not a substitute for
    a qualified radiologist or medical professional analysis.
  id: totrans-757
  prefs: []
  type: TYPE_NORMAL
  zh: 引擎提供了一般理解；它可能无法捕捉到训练有素的眼睛会注意到的细微或高度专业化的细节，因此，它不能替代合格的放射科医生或医疗专业人员的分析。
- en: It can be applied by users from several fields, starting with students in medicine,
    trying to get a quick understanding of X-ray images, in remote health assistance,
    where immediate professional insight is not available, and in research, for scientists
    looking to categorize or understand a bulk set of X-ray images.
  id: totrans-758
  prefs: []
  type: TYPE_NORMAL
  zh: 这可以应用于多个领域的用户，从试图快速理解X射线图像的医学学生开始，到远程健康援助，在那里即时专业见解不可用，以及在研究方面，科学家们试图对大量X射线图像进行分类或理解。
- en: '![Screenshoo6a.tif](../Images/Screenshoo6a_fmt.png)'
  id: totrans-759
  prefs: []
  type: TYPE_IMG
  zh: '![Screenshoo6a.tif](../Images/Screenshoo6a_fmt.png)'
- en: '![Screenshoo6b.tif](../Images/Screenshoo6b_fmt.png)'
  id: totrans-760
  prefs: []
  type: TYPE_IMG
  zh: '![Screenshoo6b.tif](../Images/Screenshoo6b_fmt.png)'
- en: '![Screenshoo6b.tif](../Images/Screenshoo6b_fmt.jpeg)'
  id: totrans-761
  prefs: []
  type: TYPE_IMG
  zh: '![Screenshoo6b.tif](../Images/Screenshoo6b_fmt.jpeg)'
- en: '**Scrape data from images**'
  id: totrans-762
  prefs: []
  type: TYPE_NORMAL
  zh: '**从图像中抓取数据**'
- en: When it comes to scrape data from images, the system uses Optical Character
    Recognition (OCR) to detect and interpret characters from an image. Once the text
    is extracted, the system can parse and structure the data based on the user's
    criteria.
  id: totrans-763
  prefs: []
  type: TYPE_NORMAL
  zh: 当涉及到从图像中抓取数据时，系统使用光学字符识别（OCR）来检测和解释图像中的字符。一旦文本被提取，系统就可以根据用户的准则解析和结构化数据。
- en: '![Screenshoot7a-b.tif](../Images/Screenshoot7a-b_fmt.png)'
  id: totrans-764
  prefs: []
  type: TYPE_IMG
  zh: '![Screenshoot7a-b.tif](../Images/Screenshoot7a-b_fmt.png)'
- en: '![Screenshoot7c.tif](../Images/Screenshoot7c_fmt.jpeg)'
  id: totrans-765
  prefs: []
  type: TYPE_IMG
  zh: '![Screenshoot7c.tif](../Images/Screenshoot7c_fmt.jpeg)'
- en: '**Design analysis**'
  id: totrans-766
  prefs: []
  type: TYPE_NORMAL
  zh: '**设计分析**'
- en: The image input capability enables AI to analyze user interface (UI) designs
    by processing visual data from images. Firstly, AI identifies and extracts distinct
    components of an UI, such as buttons, text fields, images, icons, and navigation
    bars. Then, AI assesses the spatial arrangement of elements, gauging the visual
    hierarchy, alignment, and distribution. For color analysis, AI evaluates color
    combinations, contrasts, and palettes to determine harmony, readability, and adherence
    to design principles. By using OCR, fonts, sizes, spacing, and typographic contrasts
    are evaluated to determine readability and visual appeal.
  id: totrans-767
  prefs: []
  type: TYPE_NORMAL
  zh: 图像输入能力使AI能够通过处理图像中的视觉数据来分析用户界面（UI）设计。首先，AI识别并提取UI的独特组件，如按钮、文本字段、图像、图标和导航栏。然后，AI评估元素的空间排列，衡量视觉层次、对齐和分布。对于颜色分析，AI评估颜色组合、对比度和调色板，以确定和谐、可读性和对设计原则的遵守。通过使用OCR，评估字体、大小、间距和印刷对比度，以确定可读性和视觉吸引力。
- en: Another step is the consistency check. AI checks for consistent usage of design
    elements across different UI sections or pages. Although it cannot interact with
    static images, it can infer potential interactive elements based on common design
    patterns.
  id: totrans-768
  prefs: []
  type: TYPE_NORMAL
  zh: 另一步是一致性检查。AI检查不同UI部分或页面中设计元素的一致使用。尽管它不能与静态图像交互，但它可以根据常见的设计模式推断潜在的交互元素。
- en: The process consists in comparing the design from the image with established
    design principles and patterns. Based on the analysis, AI can provide improving
    recommendations.
  id: totrans-769
  prefs: []
  type: TYPE_NORMAL
  zh: 该过程包括将图像中的设计与既定的设计原则和模式进行比较。基于分析，AI可以提供改进的建议。
- en: '![Screenshoot8a.tif](../Images/Screenshoot8a_fmt.png)'
  id: totrans-770
  prefs: []
  type: TYPE_IMG
  zh: '![Screenshoot8a.tif](../Images/Screenshoot8a_fmt.png)'
- en: '![Screenshoot8b.tif](../Images/Screenshoot8b_fmt.png)'
  id: totrans-771
  prefs: []
  type: TYPE_IMG
  zh: '![Screenshoot8b.tif](../Images/Screenshoot8b_fmt.png)'
- en: '![Screenshoot8b.tif](../Images/Screenshoot8b_fmt1.png)'
  id: totrans-772
  prefs: []
  type: TYPE_IMG
  zh: '![Screenshoot8b.tif](../Images/Screenshoot8b_fmt1.png)'
- en: '**Wireframe to code**'
  id: totrans-773
  prefs: []
  type: TYPE_NORMAL
  zh: '**线框图转代码**'
- en: Converting wireframes to code using image input capability is an evolving application
    in AI.
  id: totrans-774
  prefs: []
  type: TYPE_NORMAL
  zh: 使用图像输入能力将线框图转换为代码是AI中一个不断发展的应用。
- en: The process is similar to the one explained in Design Analysis. AI identifies
    standard UI components in the wireframe and analyzes their spatial relationships.
    Based on the elements and relationships, AI generates the corresponding HTML,
    CSS, or other relevant code. This code is structured to recreate the layout and
    design represented in the wireframe. If the wireframe contains specific styles
    (like colors, fonts, or spacings), AI can extract these and convert them into
    appropriate CSS properties. The engine can infer responsive design rules from
    the wireframe, ensuring the generated code performs well across various device
    sizes.
  id: totrans-775
  prefs: []
  type: TYPE_NORMAL
  zh: 该过程与在“设计分析”中解释的过程类似。AI在线框图中识别标准UI组件及其空间关系。基于元素和关系，AI生成相应的HTML、CSS或其他相关代码。此代码结构化以重新创建线框图中表示的布局和设计。如果线框图包含特定的样式（如颜色、字体或间距），AI可以提取这些样式并将其转换为适当的CSS属性。该引擎可以从线框图中推断响应式设计规则，确保生成的代码在各种设备尺寸上表现良好。
- en: '**Transform a writer''s story diagram into a text**'
  id: totrans-776
  prefs: []
  type: TYPE_NORMAL
  zh: '**将作者的情节图转换为文本**'
- en: Transforming a writer's diagram into text involves several steps. The written
    text is extracted using OCR techniques. The text reveals character names, plot
    points, and relationships, or story annotations. The next step is to identify
    how text elements relate to each other based on their spatial positioning, connectors,
    and grouping used in the diagram. This helps to determine the sequence, hierarchy,
    or relationship between plot points. Apart from what is explicitly expressed in
    the text, AI identifies various shapes, lines, or symbols in the diagram. (e.g.,
    arrows might indicate a sequence, while circles could represent main events or
    a character.) The shapes recognized could provide context to the extracted text,
    like specific events, turning points, or other structural components of the story.
    With the extracted information, AI constructs sentences or structured text that
    represents the story diagram. Obviously, the initial output might require manual
    review and editing to ensure it accurately captured the writer's intent.
  id: totrans-777
  prefs: []
  type: TYPE_NORMAL
  zh: 将作家的图表转换为文本涉及多个步骤。使用OCR技术提取书面文本。文本揭示了角色名称、情节要点和关系，或故事注释。下一步是确定文本元素之间的关系，这基于它们在图表中的空间位置、连接器和分组。这有助于确定情节点之间的顺序、层次或关系。除了文本中明确表达的内容外，AI还能识别图表中的各种形状、线条或符号。（例如，箭头可能表示顺序，而圆圈可能代表主要事件或角色。）识别出的形状可以为提取的文本提供上下文，如特定事件、转折点或故事的其它结构组成部分。有了提取的信息，AI构建代表故事图表的句子或结构化文本。显然，初始输出可能需要人工审查和编辑，以确保准确捕捉作者的意图。
- en: Workshop notes can be processed the same way.
  id: totrans-778
  prefs: []
  type: TYPE_NORMAL
  zh: 研讨会笔记可以以相同的方式进行处理。
- en: '**Picture to recipe**'
  id: totrans-779
  prefs: []
  type: TYPE_NORMAL
  zh: '**图片到食谱**'
- en: Converting a picture of a dish into a recipe using image input capability is
    an ambitious task. This capability is not yet documented but can be approached
    as follows. AI uses computer vision models to analyze the dish's image, identifying
    key ingredients by recognizing textures, colors, and shapes. For example, it might
    recognize the visual signature of peanuts, chicken, or basil. Then, the system
    categorizes the dish based on its overall appearance, this step narrowing down
    possible recipes. (For instance, a layered appearance might suggest lasagna, while
    a bowl with broth and noodles might be identified as some type of soup.) Once
    primary ingredients and the dish type are identified, the system can cross-reference
    a database of recipes to suggest one or more that closely match the visual input.
  id: totrans-780
  prefs: []
  type: TYPE_NORMAL
  zh: 使用图像输入功能将菜肴图片转换为食谱是一个雄心勃勃的任务。这项功能尚未文档化，但可以按以下方式处理。AI使用计算机视觉模型分析菜肴的图像，通过识别纹理、颜色和形状来识别关键成分。例如，它可能识别出花生、鸡肉或罗勒的视觉特征。然后，系统根据菜肴的整体外观对其进行分类，这一步骤缩小了可能的食谱范围。（例如，分层外观可能表明是千层面，而装有汤和面条的碗可能被识别为某种汤。）一旦确定了主要成分和菜肴类型，系统就可以交叉引用食谱数据库，建议一个或多个与视觉输入密切匹配的食谱。
- en: It is worth noting that while AI can make educated guesses based on visual data,
    achieving a perfect recipe match from an image alone is challenging. Factors like
    spices, cooking techniques, and internal ingredients that are not visually prominent
    can complicate the extraction.
  id: totrans-781
  prefs: []
  type: TYPE_NORMAL
  zh: 值得注意的是，虽然AI可以根据视觉数据做出有根据的猜测，但仅从图像中实现完美的食谱匹配是具有挑战性的。像香料、烹饪技术和不显眼的内部成分等因素可能会使提取复杂化。
- en: '![Screenshoot9a.tif](../Images/Screenshoot9a_fmt.jpeg)'
  id: totrans-782
  prefs: []
  type: TYPE_IMG
  zh: '![Screenshoot9a.tif](../Images/Screenshoot9a_fmt.jpeg)'
- en: '![Screenshoot9b.tif](../Images/Screenshoot9b_fmt.jpeg)'
  id: totrans-783
  prefs: []
  type: TYPE_IMG
  zh: '![Screenshoot9b.tif](../Images/Screenshoot9b_fmt.jpeg)'
- en: '![Screenshoot9b.tif](../Images/Screenshoot9b_fmt1.jpeg)'
  id: totrans-784
  prefs: []
  type: TYPE_IMG
  zh: '![Screenshoot9b.tif](../Images/Screenshoot9b_fmt1.jpeg)'
- en: '**5.4 Temporary Limitations**'
  id: totrans-785
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**5.4 临时限制**'
- en: The magic of ChatGPT is great, but it has its limits. Every user should know
    these limits before diving in. Being aware helps avoiding unexpected surprises.
    But be aware that the short list of limits addressed below does not cover it all.
    ChatGPT can mislead with its fancy talk, so you must check its answers carefully.
    This could be harder than looking up stuff on your own. ChatGPT is a tool, not
    a replacement for critical thinking.
  id: totrans-786
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT的魔力很大，但它有其局限性。每个用户在深入使用之前都应该了解这些限制。了解这些可以帮助避免意外的惊喜。但请注意，以下简短的限制清单并不涵盖所有内容。ChatGPT可能会用其华丽的言辞误导，因此你必须仔细检查其答案。这可能比你自己查找资料更难。ChatGPT是一个工具，而不是批判性思维的替代品。
- en: As with any tool, over-relying on ChatGPT can be a pitfall. It offers rapid,
    extensive insights, but it is vital to cross-reference and verify crucial data.
    Diversifying information sources, collaborating with experts, and periodically
    grounding AI interactions with manual checks can strike a balance between efficiency
    and accuracy.
  id: totrans-787
  prefs: []
  type: TYPE_NORMAL
  zh: 就像任何工具一样，过度依赖ChatGPT可能是一个陷阱。它提供快速、广泛的见解，但交叉核对和验证关键数据至关重要。多样化信息来源，与专家合作，并定期通过人工检查来使AI交互保持平衡，这可以在效率和准确性之间取得平衡。
- en: '**1\. Hallucinations**'
  id: totrans-788
  prefs: []
  type: TYPE_NORMAL
  zh: '**1. 幻觉**'
- en: ChatGPT speaks well, but that does not mean it is always right. It is so good
    with words it makes things sound right even when they are not. The explanation
    is related to the design of ChatGPT and the training data. By design, ChatGPT
    is built to predict the next word based on the previous words. Its only job is
    to autocomplete, but it can keep autocompleting very coherently to make long texts.
    The quality and accuracy of the ChatGPT autocompletion job reflects the quality
    and accuracy of the data it was trained on. And this does not always lead to factual
    accuracy as textual data is not always a source of truth. During training, ChatGPT
    uses more textual data from the internet than science books. And there is a lot
    of wrong info out there, about 30% being false.
  id: totrans-789
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT说话很好，但这并不意味着它总是正确的。它对文字的处理如此之好，以至于即使内容不正确，也能让人听起来很合理。这种解释与ChatGPT的设计和训练数据有关。按设计，ChatGPT是根据前面的单词来预测下一个单词的。它的唯一任务是自动完成，但它可以非常连贯地继续自动完成，以生成长文本。ChatGPT自动完成的质量和准确性反映了它训练数据的质量和准确性。但这并不总是导致事实准确性，因为文本数据并不总是真理的来源。在训练过程中，ChatGPT使用的互联网文本数据比科学书籍多。而且，错误信息很多，大约有30%是错误的。
- en: Now, even with this limit, ChatGPT often gets the answers right, which is cool!
    This is likely because of the good info on places like Wikipedia. But, as a rule
    of thumb, it is crucial to thoroughly fact-check the content. Make a point to
    check dates, locations, numbers, and any claim that seems very specific.
  id: totrans-790
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，即使有这个限制，ChatGPT通常也能给出正确的答案，这很酷！这可能是由于维基百科等地方的良好信息。但，作为一个经验法则，彻底核实内容至关重要。务必检查日期、地点、数字以及任何看似非常具体的声明。
- en: '**2\. Arithmetic and Mathematics**'
  id: totrans-791
  prefs: []
  type: TYPE_NORMAL
  zh: '**2. 算术与数学**'
- en: When you ask ChatGPT math stuff, sometimes it messes up. It can guess simple
    answers right if it has seen them before. It is getting better at math, but it
    is not quite there yet. This is because ChatGPT does not have a source of truth;
    it relies on recognizing patterns in the language of math problems it has seen
    before.
  id: totrans-792
  prefs: []
  type: TYPE_NORMAL
  zh: 当您向ChatGPT询问数学问题时，有时它会出错。如果它以前见过，它可以猜出简单的答案。它在数学方面正在变得更好，但还没有完全达到那个水平。这是因为ChatGPT没有真理的来源；它依赖于识别它以前看到的数学问题语言中的模式。
- en: '**3\. Citations**'
  id: totrans-793
  prefs: []
  type: TYPE_NORMAL
  zh: '**3. 引用**'
- en: ChatGPT struggles with citations. It guesses a lot. It knows how a citation
    looks and can make up fancy-sounding titles, but most of them do not really exist.
    The model does not have access to external sources in real-time (unless you use
    a browsing plugin) so it generates what it "thinks" would be a correct citation
    based on patterns it learned during training.
  id: totrans-794
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT在引用方面有困难。它猜测很多。它知道引用的样子，可以编造听起来很专业的标题，但其中大部分并不真正存在。该模型无法实时访问外部来源（除非您使用浏览插件），因此它根据在训练期间学到的模式生成它“认为”可能是正确引用的内容。
- en: '**4\. Consistency**'
  id: totrans-795
  prefs: []
  type: TYPE_NORMAL
  zh: '**4. 一致性**'
- en: ChatGPT can get an answer right but messes up the explanation. This inconsistency
    occurs as the model might pick up on the correct answer from patterns in the training
    data, but fails to understand the underlying logic or facts, leading to incorrect
    explanations.
  id: totrans-796
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT可以给出正确的答案，但解释可能会出错。这种不一致性可能是因为模型可能从训练数据中的模式中获取正确的答案，但未能理解背后的逻辑或事实，导致解释不正确。
- en: 'Current Events: ChatGPT''s info stops in January 2022\. If you ask about recent
    stuff, it makes up answers. ChatGPT does not have real-time access to the internet,
    so it is like asking someone who has been out of the loop for a while.'
  id: totrans-797
  prefs: []
  type: TYPE_NORMAL
  zh: 当前事件：ChatGPT的信息截止到2022年1月。如果您询问最近的事情，它会编造答案。ChatGPT没有实时访问互联网，所以它就像是在问一个已经脱离了现实一段时间的人。
- en: AI's journey is long but filled with promise. Today's issues could pave the
    way for tomorrow's wonders.
  id: totrans-798
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能的旅程漫长但充满希望。今天的问题可能为明天的奇迹铺平道路。
- en: '![84_Desert_landscape_marked_by_sandstone_formations.tif](../Images/84_Desert_landscape_mar_fmt.png)'
  id: totrans-799
  prefs: []
  type: TYPE_IMG
  zh: '![84_沙漠景观_由砂岩形成的地貌.tif](../Images/84_沙漠景观_由砂岩形成的地貌.png)'
- en: '*Desert landscape marked by sandstone formations and an off-road solitary vehicle
    with a roof rack*'
  id: totrans-800
  prefs: []
  type: TYPE_NORMAL
  zh: '*由砂岩形成的沙漠景观和一辆带有车顶架的越野单车*'
- en: '[1](#footnote-11840-1-backlink). Maria Diaz, "How to use ChatGPT Plus: From
    web browsing to plugins," in ZDNET (accessed in October 2023; [https://www.zdnet.com/article/how-to-use-chatgpt-plus-from-web-browsing-to-plugins/](https://www.zdnet.com/article/how-to-use-chatgpt-plus-from-web-browsing-to-plugins/)).'
  id: totrans-801
  prefs: []
  type: TYPE_NORMAL
  zh: '[1](#footnote-11840-1-backlink)。Maria Diaz，“如何使用 ChatGPT Plus：从网页浏览到插件，”在 ZDNET（2023
    年 10 月访问；[https://www.zdnet.com/article/how-to-use-chatgpt-plus-from-web-browsing-to-plugins/](https://www.zdnet.com/article/how-to-use-chatgpt-plus-from-web-browsing-to-plugins/))。'
- en: '**6\. Expanding ChatGPT: DALL-E**'
  id: totrans-802
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '**6. 扩展 ChatGPT：DALL-E**'
- en: '**6.1 What is DALL-E?**'
  id: totrans-803
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**6.1 什么是 DALL-E？**'
- en: DALL-E is a 12-billion parameter version of GPT-3 trained using a dataset of
    text–image pairs.^([1](#footnote-11253-1))
  id: totrans-804
  prefs: []
  type: TYPE_NORMAL
  zh: DALL-E 是一个 120 亿参数版本的 GPT-3，使用文本-图像对数据集进行训练.^([1](#footnote-11253-1))
- en: GPT-3 transformer architecture is excellent at handling sequences of data.
  id: totrans-805
  prefs: []
  type: TYPE_NORMAL
  zh: GPT-3 的 Transformer 架构在处理数据序列方面表现出色。
- en: While learning, images are converted into a sequence of discrete tokens in a
    process that is analogous to tokenizing text and DALL-E is trained on pairs of
    images and corresponding text captions. The model learns to associate the text
    with the visual concepts in the images by processing the sequences of tokens from
    both modalities.
  id: totrans-806
  prefs: []
  type: TYPE_NORMAL
  zh: 在学习过程中，图像被转换成一系列离散的标记，这个过程类似于对文本进行标记化，DALL-E 在图像及其对应的文本标题对上进行了训练。该模型通过处理来自两种模态的标记序列，学会将文本与图像中的视觉概念相关联。
- en: DALL-E has a diverse set of capabilities, including creating anthropomorphized
    versions of animals and objects, combining unrelated concepts in plausible ways,
    rendering text, and applying transformations to existing images.
  id: totrans-807
  prefs: []
  type: TYPE_NORMAL
  zh: DALL-E 拥有一系列多样化的功能，包括创建动物和物体的拟人化版本，以合理的方式结合无关的概念，渲染文本，以及将变换应用于现有图像。
- en: It receives both the text and the image as a single stream of data containing
    up to 1,280 tokens, being trained to use maximum likelihood to generate all the
    tokens, one after another.
  id: totrans-808
  prefs: []
  type: TYPE_NORMAL
  zh: 它接收文本和图像作为包含最多 1,280 个标记的单个数据流，经过训练，使用最大似然生成所有标记，一个接一个。
- en: What can DALL-E do?
  id: totrans-809
  prefs: []
  type: TYPE_NORMAL
  zh: DALL-E 能做什么？
- en: – Transforms natural language descriptions into distinctive visuals by blending
    various concepts, attributes, and styles.
  id: totrans-810
  prefs: []
  type: TYPE_NORMAL
  zh: – 通过融合各种概念、属性和风格，将自然语言描述转换为独特的视觉图像。
- en: – Generates original images (up to a resolution of 1024x1024 pixels).
  id: totrans-811
  prefs: []
  type: TYPE_NORMAL
  zh: – 生成原始图像（分辨率高达 1024x1024 像素）。
- en: Once you generate the images, you can download and modify them using any preferred
    editing tool.
  id: totrans-812
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦生成图像，你可以使用任何首选的编辑工具下载和修改它们。
- en: 'DALL-E''s latest edition (the 3^(rd)) brings new features:'
  id: totrans-813
  prefs: []
  type: TYPE_NORMAL
  zh: DALL-E 的最新版本（第 3 代）带来了新功能：
- en: – Generates legible text within images.
  id: totrans-814
  prefs: []
  type: TYPE_NORMAL
  zh: – 在图像中生成可读的文本。
- en: – Depicts historical personalities and well-known celebrities.
  id: totrans-815
  prefs: []
  type: TYPE_NORMAL
  zh: – 描绘历史人物和知名名人。
- en: – Incorporates filters for ethical public usage.
  id: totrans-816
  prefs: []
  type: TYPE_NORMAL
  zh: – 包含符合伦理的公共使用过滤器。
- en: – "Out-painting" function extends images beyond their original frame for fresh
    compositions.
  id: totrans-817
  prefs: []
  type: TYPE_NORMAL
  zh: – “超画”功能将图像扩展到原始框架之外，以创作新的构图。
- en: – "In-painting" function allows for selective replacements within images.
  id: totrans-818
  prefs: []
  type: TYPE_NORMAL
  zh: – “内画”功能允许在图像中进行选择性替换。
- en: – Adjusts real photos based on captions, adding or removing elements such as
    objects, shadows, reflections, and textures.
  id: totrans-819
  prefs: []
  type: TYPE_NORMAL
  zh: – 根据标题调整真实照片，添加或删除对象、阴影、反射和纹理等元素。
- en: – Produces high-resolution images.
  id: totrans-820
  prefs: []
  type: TYPE_NORMAL
  zh: – 生成高分辨率图像。
- en: To save resources, DALL-E generates variations to your prompt (most of the time
    expanding it), rendering 4 images. You can choose whatever image you like and
    ask DALL-E, in the next prompt, to modify it to your needs.
  id: totrans-821
  prefs: []
  type: TYPE_NORMAL
  zh: 为了节省资源，DALL-E 会根据你的提示词生成变体（大多数情况下是扩展它），渲染 4 张图像。你可以选择你喜欢的任何图像，并要求 DALL-E 在下一个提示中根据你的需求进行修改。
- en: If your prompt is 76-word long, DALL-E truncates it.
  id: totrans-822
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你的提示词长度为 76 个单词，DALL-E 会将其截断。
- en: '**DALL-E generated images and copyright**'
  id: totrans-823
  prefs: []
  type: TYPE_NORMAL
  zh: '**DALL-E 生成的图像和版权**'
- en: Firstly, any artwork generated by DALL-E is not solely yours. What it means
    is that you can use the AI-created images, but they are not exclusive; others
    might use them as well. Secondly, modifying copyrighted material with DALL-E can
    lead to copyright infringement, even if the result looks different.
  id: totrans-824
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，任何由 DALL-E 生成的艺术品并不完全属于你。这意味着你可以使用由 AI 创建的图像，但它们不是专有的；其他人也可能使用它们。其次，使用 DALL-E
    修改受版权保护的材料可能导致侵权，即使结果看起来不同。
- en: Our recommendation is to use DALL-E responsibly and to honor intellectual property
    boundaries.
  id: totrans-825
  prefs: []
  type: TYPE_NORMAL
  zh: 我们建议负责任地使用 DALL-E 并尊重知识产权边界。
- en: '**6.2 First Image**'
  id: totrans-826
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**6.2 第一张图像**'
- en: Designing with DALL-E 3 (stylized DALL·E 3) is a straightforward process. This
    guide will walk you through generating your first images.
  id: totrans-827
  prefs: []
  type: TYPE_NORMAL
  zh: 使用DALL-E 3（风格化的DALL·E 3）进行设计是一个简单的过程。本指南将指导你生成你的第一张图像。
- en: 'Step 1: Type your desired text into the search bar. Alternatively, explore
    the provided examples (scroll down, several sample descriptions will be available).'
  id: totrans-828
  prefs: []
  type: TYPE_NORMAL
  zh: '第1步：在搜索栏中输入你想要的文本。或者，探索提供的示例（向下滚动，将提供几个样本描述）。 '
- en: 'Step 2: DALL-E 3 usually returns four different image results. If none meets
    your expectations, consider refining your description. If a particular image catches
    your eye and you wish to explore variations, hover over the chosen image, and
    click ![menu1.tif](../Images/menu1_fmt2.png) located in the top right corner.
    Select "Generate variations" to see alternative renditions.'
  id: totrans-829
  prefs: []
  type: TYPE_NORMAL
  zh: 第2步：DALL-E 3通常会返回四张不同的图像结果。如果没有任何一张符合你的期望，考虑细化你的描述。如果你对某张特定的图像感兴趣并希望探索变体，将鼠标悬停在所选图像上，点击右上角的![menu1.tif](../Images/menu1_fmt2.png)。选择“生成变体”以查看不同的版本。
- en: 'Step 3: Once you have settled on a preferred image, delve deeper by using the
    built-in photo editor (as of September 2023, yet not available in ChatGPT DALL-E
    Mode). Experiment with different prompts and adjust as necessary to achieve the
    optimal visual outcome.'
  id: totrans-830
  prefs: []
  type: TYPE_NORMAL
  zh: 第3步：一旦你选定了一个喜欢的图像，就可以通过内置的图片编辑器（截至2023年9月，ChatGPT DALL-E模式中尚不可用）来深入了解。尝试不同的提示词并相应调整，以达到最佳的视觉效果。
- en: '**6.3 Prompt Structure**'
  id: totrans-831
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**6.3 提示结构**'
- en: In this section, we explore the DALL-E Prompt Structure. We will learn how to
    structure good prompts, understand the different parts that make them work, and
    get the best images from AI.
  id: totrans-832
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，我们将探讨DALL-E提示结构。我们将学习如何构建好的提示，理解使它们发挥作用的不同部分，并从AI中获得最佳图像。
- en: '| **Prompt Components** | **Description** | **Examples** |'
  id: totrans-833
  prefs: []
  type: TYPE_TB
  zh: '| **提示组件** | **描述** | **示例** |'
- en: '| CONTEXT | This is the core of the prompt. The component describes **the overarching
    theme**, **the narrative of the image**. This creates **the stage** for what the
    image should represent. Specify the era or historical period. | Specify the background
    or environment where the subject is placed: forest, outer space, 18th-century
    ballroom, underwater city, or post-apocalyptic wasteland, including the time of
    the day and additional elements like rain, butterflies, mist, floating islands,
    holograms, ruins, etc. (e.g., a serene mountain landscape at dawn; a bustling
    city street in the 1800s, on a winter snowing day). |'
  id: totrans-834
  prefs: []
  type: TYPE_TB
  zh: '| 上下文 | 这是提示的核心。该部分描述了**整体主题**、**图像的叙事**。这为图像应该代表的内容创造了**舞台**。指定时代或历史时期。 |
    指定主体放置的背景或环境：森林、外太空、18世纪舞厅、水下城市或末日废墟，包括一天中的时间以及额外的元素如雨、蝴蝶、雾、漂浮岛屿、全息图、遗迹等。（例如，黎明时分宁静的山景；19世纪一个下雪的繁忙城市街道）。
    |'
- en: '| IMAGE TYPE | It sets the basic stylistic direction of the image. The category
    or **style of the image** defines whether you want a photo, illustration, or other
    type of image. | Photo, oil painting, illustration, sketch, cartoon, vector, watercolor
    painting, render, unreal engine, 3D rendering, octane render. |'
  id: totrans-835
  prefs: []
  type: TYPE_TB
  zh: '| 图像类型 | 它设定了图像的基本风格方向。图像的类别或**风格**定义了你想要的是照片、插图还是其他类型的图像。 | 照片、油画、插图、素描、卡通、矢量图、水彩画、渲染、虚幻引擎、3D渲染、octane渲染。
    |'
- en: '| IMAGE ELEMENTS | **Subject Size and Placement**: The size of the subject
    (small, medium, large) and preferred placement (forearm, back, etc.)**Emotional
    Tone**: The emotion you want the image to convey, such as joy, mystery, etc.**Cultural
    References**: Cultural elements you want to incorporate.**Must-Haves**: All specific
    items or ideas that are non-negotiable. You could also include a description of
    the relationships or actions between the elements of the image.**Must-Avoids**:
    All elements or items you do not want in the image. | Cat, mountain, astronaut,
    robot, cityscape, flower, dragon, etc. (e.g., a dragon perched on a cliff; a woman
    reading a book under a tree). Specify the size of the subject concerning its surroundings
    or in comparison to other subjects. It can also be used to create surreal proportions.
    |'
  id: totrans-836
  prefs: []
  type: TYPE_TB
  zh: '| 图像元素 | **主题大小和位置**：主题的大小（小、中、大）和首选位置（前臂、背部等）**情感基调**：你希望图像传达的情感，如快乐、神秘等。**文化参考**：你想要融入的文化元素。**必须包含的元素**：所有非协商性的具体项目或想法。你也可以包括图像元素之间关系或动作的描述。**必须避免的元素**：你不想在图像中出现的所有元素或项目。
    | 猫、山、宇航员、机器人、城市景观、花朵、龙等。（例如，一只龙栖息在悬崖上；一位女士在树下读书）。指定主题的大小相对于其周围环境或与其他主题的比较。它也可以用来创造超现实的尺寸比例。
    |'
- en: '| IMAGE BACKGROUND | **Background, environment, or setting**. They can change
    the interpretation of the main elements. | Sunset at the beach; a snowy mountain
    peak. |'
  id: totrans-837
  prefs: []
  type: TYPE_TB
  zh: '| 图片背景 | **背景、环境或场景**。它们可以改变主要元素的解释。 | 海滩日落；雪山的山顶。 |'
- en: '| IMAGE LAYOUT AND SIZE | The **orientation and resolution** of the image.
    | Wide (1792×1024)Square (1024×1024)Tall (1024×1792) |'
  id: totrans-838
  prefs: []
  type: TYPE_TB
  zh: '| 图片布局和尺寸 | 图片的**方向和分辨率**。 | 宽（1792×1024）正方形（1024×1024）高（1024×1792） |'
- en: '| IMAGE LIGHTNING AND COLOR PALETTE | The component specifies a particular
    **set of colors** or moods the image should adhere to. The idea is that colors
    set the mood and aesthetic of the image, influencing its overall feel. | Light
    source, intensity, ambient light, and optical effects.Monochromatic, pastel, vibrant,
    sepia, neon, cool tones, etc. (e.g., warm autumn colors; cool blues and purples
    for a night scene). |'
  id: totrans-839
  prefs: []
  type: TYPE_TB
  zh: '| 图片光线和色彩调色板 | 该组件指定图像应遵循的特定**颜色集**或情绪。想法是颜色设定了图像的情绪和美学，影响了其整体感觉。 | 光源、强度、环境光和光学效果。单色、粉彩、鲜艳、棕褐色、霓虹、冷色调等。（例如，温暖的秋色；夜晚场景的冷蓝色和紫色）。
    |'
- en: '| IMAGE ADDITIONAL INFO | **Additional guidelines** about the representation
    of image elements. | A diverse group of people at a carnival; Asian scientist
    male in a lab. |'
  id: totrans-840
  prefs: []
  type: TYPE_TB
  zh: '| 图片附加信息 | 关于图像元素表示的**附加指南**。 | 狂欢节上的一群多样化的人；亚洲男性科学家在实验室。 |'
- en: '| STYLE REFERENCES | **Specific style** for the desired artistic look that
    the image should emulate, without naming specific recent artists. Not always essential.
    | Impressionist style with brush strokes, Art Nouveau with ornate, flowing lines,
    Picasso style, Autochrome, Surveillance, Daguerreotype, Disposable Camera, Double
    Exposure, Aerial Photography, Catwalk, and Fashion, etc. |'
  id: totrans-841
  prefs: []
  type: TYPE_TB
  zh: '| 风格参考 | 想要模仿的图像所需的艺术外观的**特定风格**，无需提及具体近期艺术家。不一定必要。 | 印象派风格带有笔触，新艺术风格带有华丽流畅的线条，毕加索风格，Autochrome，监控，达盖尔式，一次性相机，双重曝光，航空摄影，T台，时尚等。
    |'
- en: '| FORMAT & QUALITY | Preferred **format and quality of the image**. Typically,
    the default image format (like PNG or JPEG) is sufficient, but specific use cases
    might require a particular format. | Format: PNG, JPEG. Image quality, such as
    HD. |'
  id: totrans-842
  prefs: []
  type: TYPE_TB
  zh: '| 格式与质量 | 图片的**首选格式和质量**。通常，默认图片格式（如 PNG 或 JPEG）就足够了，但特定用例可能需要特定格式。 | 格式：PNG，JPEG。图片质量，如高清。
    |'
- en: '| SEED VALUE | The seed value initializes the model''s random processes and
    **ensures deterministic behavior**. Seeds are typically non-negative integers.
    On a 64-bit system, the seed can range from 0 to 18,446,744,073,709,551,615\.
    The default value is 5,000.The same prompt with different seeds will produce different
    results. | A numerical value that creates variations of an image from the same
    prompt. Useful for generating variations or ensuring consistency across images.
    |'
  id: totrans-843
  prefs: []
  type: TYPE_TB
  zh: '| 随机数种子 | 随机数种子初始化模型的随机过程并**确保确定性行为**。种子通常是非负整数。在 64 位系统上，种子可以从 0 到 18,446,744,073,709,551,615。默认值是
    5,000。具有不同种子的相同提示将产生不同的结果。 | 一个数值，它从相同的提示创建图像的变体。用于生成变体或确保图像之间的一致性。 |'
- en: '| CAMERA SETTINGS | For images intended to mimic the output of a professional
    camera, the prompt should specify camera settings to achieve a high-quality result,
    like: Aperture, Focal Length, ISO, Mode (automatic or manual), and White Balance.
    Add an explanation of the purpose of each setting (e.g., why a wide aperture or
    a specific shutter speed is chosen). | E.g. A wide aperture of f/2.8 for a shallow
    depth of field, a shutter speed of 1/60 to capture motion without blur, and ISO
    800 for the low-light conditions. A focal length of 35mm to capture the scene
    without excessive distortion. |'
  id: totrans-844
  prefs: []
  type: TYPE_TB
  zh: '| 摄像机设置 | 对于旨在模仿专业相机输出的图像，提示应指定摄像机设置以实现高质量的结果，例如：光圈、焦距、ISO、模式（自动或手动）和白平衡。添加每个设置的用途说明（例如，为什么选择大光圈或特定的快门速度）。
    | 例如，f/2.8 的大光圈以实现浅景深，1/60 的快门速度以捕捉运动而不模糊，以及 ISO 800 以适应低光条件。35mm 的焦距以捕捉场景而不产生过度扭曲。
    |'
- en: '**6.4 Designing with DALL-E**'
  id: totrans-845
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**6.4 使用 DALL-E 进行设计**'
- en: We will exemplify several generic prompts that can be used to accelerate your
    creativity.
  id: totrans-846
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将举例说明几个通用的提示，这些提示可以用来加速您的创造力。
- en: We will reveal the best ways to use DALL-E 3 to save time and cut costs on your
    design projects.
  id: totrans-847
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将揭示使用 DALL-E 3 来节省设计项目时间和降低成本的最佳方法。
- en: As DALL-E is continually evolving and improving, expect prompts to work differently
    when you test them.
  id: totrans-848
  prefs: []
  type: TYPE_NORMAL
  zh: 由于 DALL-E 持续发展和改进，当您测试提示时，预期它们的工作方式会有所不同。
- en: Replace the placeholders (elements within the square brackets) to tailor the
    prompt to the specific photo you want to generate. Providing a model with a clear
    and descriptive prompt improves the likelihood of getting a result closely matching
    your vision.
  id: totrans-849
  prefs: []
  type: TYPE_NORMAL
  zh: 用方括号内的占位符（元素）来调整提示，以适应你想要生成的特定照片。
- en: '**Movie poster**'
  id: totrans-850
  prefs: []
  type: TYPE_NORMAL
  zh: '**电影海报**'
- en: 'Generic prompt:'
  id: totrans-851
  prefs: []
  type: TYPE_NORMAL
  zh: 通用提示：
- en: '*Create a movie poster for a film titled "The Guns of Navarone."*'
  id: totrans-852
  prefs: []
  type: TYPE_NORMAL
  zh: '*为名为“The Guns of Navarone”的电影创建一张海报。*'
- en: '*Historical period: Second World War.*'
  id: totrans-853
  prefs: []
  type: TYPE_NORMAL
  zh: '*历史时期：第二次世界大战。*'
- en: '*Wide image: 1792×1024*'
  id: totrans-854
  prefs: []
  type: TYPE_NORMAL
  zh: '*宽图像：1792×1024*'
- en: '*Mountainside bordering the Mediterranean Sea at sunset.*'
  id: totrans-855
  prefs: []
  type: TYPE_NORMAL
  zh: '*在日落时分，地中海边的高山。*'
- en: '*High on the mountain, soldiers and two artillery batteries all directed toward
    the sea.*'
  id: totrans-856
  prefs: []
  type: TYPE_NORMAL
  zh: '*山顶上，士兵和两个炮兵阵地都朝向大海。*'
- en: '*On the sea, at the horizon, one battleship.*'
  id: totrans-857
  prefs: []
  type: TYPE_NORMAL
  zh: '*在海平面上，地平线处，一艘战舰。*'
- en: '*4K image.*'
  id: totrans-858
  prefs: []
  type: TYPE_NORMAL
  zh: '*4K图像。*'
- en: '*Please add the title of the movie, "THE GUNS OF NAVARONE" on the poster.*'
  id: totrans-859
  prefs: []
  type: TYPE_NORMAL
  zh: '*请在海报上添加电影标题，“THE GUNS OF NAVARONE”。*'
- en: '*When the task is done, give me the image seed you used.*'
  id: totrans-860
  prefs: []
  type: TYPE_NORMAL
  zh: '*任务完成后，给我你使用的图像种子。*'
- en: 'What happened is that DALL-E reworded my prompt:'
  id: totrans-861
  prefs: []
  type: TYPE_NORMAL
  zh: 发生的事情是DALL-E重新措辞了我的提示：
- en: '*Photorealistic 4k wide movie poster for ''The Guns of Navarone''. Set in the
    historical backdrop of the Second World War, the scene unfolds on a mountainside
    overlooking the Mediterranean Sea during a radiant sunset. High on the mountain,
    soldiers stand guard alongside two artillery batteries, all of which are aimed
    toward the sea. On the distant horizon, a single battleship casts a silhouette.
    The title ''THE GUNS OF NAVARONE'' is boldly and prominently displayed on the
    poster.*'
  id: totrans-862
  prefs: []
  type: TYPE_NORMAL
  zh: '*《纳瓦罗恩的枪》4K宽屏电影海报，具有逼真的视觉效果。背景设定在第二次世界大战的历史背景下，场景在夕阳西下时展开，位于俯瞰地中海的山坡上。在山顶上，士兵们站在两个炮兵阵地旁边，所有炮口都指向大海。在遥远的地平线上，一艘战舰投下了轮廓。海报上大胆且突出地展示了标题“THE
    GUNS OF NAVARONE”。*'
- en: The generated poster is far from ideal. You can notice several differences between
    what we asked and what we got.
  id: totrans-863
  prefs: []
  type: TYPE_NORMAL
  zh: 生成的海报远非理想。你可以注意到我们要求的内容和得到的内容之间存在几个差异。
- en: '![TheGunsOfNavaronePrompt.tif](../Images/TheGunsOfNavaronePromp_fmt.jpeg)![TheGuhsOfNavaroneImage.tif](../Images/TheGuhsOfNavaroneImage_fmt.png)'
  id: totrans-864
  prefs: []
  type: TYPE_IMG
  zh: '![TheGunsOfNavaronePrompt.tif](../Images/TheGunsOfNavaronePromp_fmt.jpeg)![TheGuhsOfNavaroneImage.tif](../Images/TheGuhsOfNavaroneImage_fmt.png)'
- en: But we have the image seed. Using the same prompt with the same image seed,
    the result is the same image, convenient for demonstrations.
  id: totrans-865
  prefs: []
  type: TYPE_NORMAL
  zh: 但我们有图像种子。使用相同的提示和相同的图像种子，结果将是相同的图像，方便演示。
- en: Try your example, iterate, and use different image seeds to get the best result.
  id: totrans-866
  prefs: []
  type: TYPE_NORMAL
  zh: 尝试你的示例，迭代，并使用不同的图像种子以获得最佳结果。
- en: '**Book cover**'
  id: totrans-867
  prefs: []
  type: TYPE_NORMAL
  zh: '**书籍封面**'
- en: 'Here''s a generic prompt to help you start:'
  id: totrans-868
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一个通用的提示，帮助你开始：
- en: '*Design a captivating book cover for a [genre of the book, e.g., ''mystery'']
    novel titled ''[title of the book, e.g., ''Whispers in the Shadows'']''. The cover
    should feature [primary elements you want, e.g., ''a silhouette of a woman holding
    a lantern amidst a foggy backdrop'']. The predominant colors should be [preferred
    colors, e.g., ''deep blues and purples'']. The author''s name, ''[author''s name,
    e.g., ''Jane Doe'']'', should appear at the bottom.*'
  id: totrans-869
  prefs: []
  type: TYPE_NORMAL
  zh: '*设计一本名为''[书名，例如''Whispers in the Shadows'']''的[类型，例如''神秘'']小说的吸引人的封面。封面应包含[你想要的主要元素，例如''一位女士在雾蒙蒙的背景中手持灯笼的剪影'']。主要颜色应为[首选颜色，例如''深蓝和紫色'']。作者的名字''[作者的名字，例如''Jane
    Doe'']''应出现在底部。*'
- en: 'Example:'
  id: totrans-870
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：
- en: '![BookCoverPrompt.tif](../Images/BookCoverPrompt_fmt.png)![BookCoverImage.tif](../Images/BookCoverImage_fmt.png)'
  id: totrans-871
  prefs: []
  type: TYPE_IMG
  zh: '![BookCoverPrompt.tif](../Images/BookCoverPrompt_fmt.png)![BookCoverImage.tif](../Images/BookCoverImage_fmt.png)'
- en: '**Logo**'
  id: totrans-872
  prefs: []
  type: TYPE_NORMAL
  zh: '**标志**'
- en: 'Generic prompt:'
  id: totrans-873
  prefs: []
  type: TYPE_NORMAL
  zh: 通用提示：
- en: '*Business or Brand Name: [The name that should appear in or around the logo]*'
  id: totrans-874
  prefs: []
  type: TYPE_NORMAL
  zh: '*商业或品牌名称：[应在或周围显示的名称]*'
- en: '*Industry: [The industry or sector the business operates in]*'
  id: totrans-875
  prefs: []
  type: TYPE_NORMAL
  zh: '*行业：[业务运营的行业或领域]*'
- en: '*Style: [Preferred aesthetic style, such as minimalist, vintage, modern, etc.]*'
  id: totrans-876
  prefs: []
  type: TYPE_NORMAL
  zh: '*风格：[首选的美学风格，如简约、复古、现代等]*'
- en: '*Elements: [Key icons, shapes, or graphics you would like to include]*'
  id: totrans-877
  prefs: []
  type: TYPE_NORMAL
  zh: '*元素：[你想要包含的关键图标、形状或图形]*'
- en: '*Colors: [Color palette you would like to stick to]*'
  id: totrans-878
  prefs: []
  type: TYPE_NORMAL
  zh: '*颜色：[你想要坚持的颜色调色板]*'
- en: '*Typography: [Preferred font style or characteristics if text is involved]*'
  id: totrans-879
  prefs: []
  type: TYPE_NORMAL
  zh: '*字体：[如果涉及文本，首选的字体风格或特征]*'
- en: '*Emotional Tone: [The feeling or vibe you want to convey]*'
  id: totrans-880
  prefs: []
  type: TYPE_NORMAL
  zh: '*情感基调：[你想要传达的感觉或氛围]*'
- en: '*Unique Features: [Any special attributes, like animation or 3D effects]*'
  id: totrans-881
  prefs: []
  type: TYPE_NORMAL
  zh: '*独特特性：[任何特殊属性，如动画或3D效果]*'
- en: '*Must-Haves: [Non-negotiable elements that should be present]*'
  id: totrans-882
  prefs: []
  type: TYPE_NORMAL
  zh: '*必须包含的元素：[必须出现的不可协商元素]*'
- en: '*Must-Avoids: [Things you do not want in the logo]*'
  id: totrans-883
  prefs: []
  type: TYPE_NORMAL
  zh: '*必须避免的事项：[您不希望在标志中看到的内容]*'
- en: '*Additional Notes: [Any other specific instructions or freedoms you want to
    give]*'
  id: totrans-884
  prefs: []
  type: TYPE_NORMAL
  zh: '*附加说明：[您希望提供的任何其他具体说明或自由度]*'
- en: 'Example:'
  id: totrans-885
  prefs: []
  type: TYPE_NORMAL
  zh: '**示例**：'
- en: '*Business or Brand Name: SolarNova*'
  id: totrans-886
  prefs: []
  type: TYPE_NORMAL
  zh: '*企业或品牌名称：SolarNova*'
- en: '*Industry: Renewable Energy*'
  id: totrans-887
  prefs: []
  type: TYPE_NORMAL
  zh: '*行业：可再生能源*'
- en: '*Style: Futuristic yet approachable*'
  id: totrans-888
  prefs: []
  type: TYPE_NORMAL
  zh: '*风格：未来感十足且易于接近*'
- en: '*Elements: A stylized sun, interconnected grid, or circuit lines*'
  id: totrans-889
  prefs: []
  type: TYPE_NORMAL
  zh: '*元素：风格化的太阳、互联的网格或电路线*'
- en: '*Colors: Shades of blue, gold accents*'
  id: totrans-890
  prefs: []
  type: TYPE_NORMAL
  zh: '*颜色：蓝色调，金色点缀*'
- en: '*Typography: Clean, geometric sans-serif*'
  id: totrans-891
  prefs: []
  type: TYPE_NORMAL
  zh: '*字体：简洁的几何无衬线字体*'
- en: '*Emotional Tone: Optimistic and empowering*'
  id: totrans-892
  prefs: []
  type: TYPE_NORMAL
  zh: '*情感基调：乐观且赋权*'
- en: '*Unique Features: A subtle gradient to give depth*'
  id: totrans-893
  prefs: []
  type: TYPE_NORMAL
  zh: '*独特特点：微妙的渐变以增加深度*'
- en: '*Must-Haves: The sun element and brand name must be prominently displayed*'
  id: totrans-894
  prefs: []
  type: TYPE_NORMAL
  zh: '*必须包含的元素：太阳元素和品牌名称必须突出显示*'
- en: '*Must-Avoids: No dark or muted colors*'
  id: totrans-895
  prefs: []
  type: TYPE_NORMAL
  zh: '*必须避免的事项：不要使用深色或暗色调*'
- en: '*Additional Notes: Should convey innovation and sustainability*'
  id: totrans-896
  prefs: []
  type: TYPE_NORMAL
  zh: '*附加说明：应传达创新和可持续性*'
- en: '![LogoImage.tif](../Images/LogoImage_fmt.png)'
  id: totrans-897
  prefs: []
  type: TYPE_IMG
  zh: '![LogoImage.tif](../Images/LogoImage_fmt.png)'
- en: '**Infographic**'
  id: totrans-898
  prefs: []
  type: TYPE_NORMAL
  zh: '**信息图表**'
- en: 'Generic prompt:'
  id: totrans-899
  prefs: []
  type: TYPE_NORMAL
  zh: '**通用提示**：'
- en: '*Design an informative and visually engaging infographic on the topic of ''[subject
    of the infographic, e.g., ''The Benefits of Renewable Energy'']''. The infographic
    is structured in a [layout style, e.g., ''vertical flow''].*'
  id: totrans-900
  prefs: []
  type: TYPE_NORMAL
  zh: '*设计一个关于''[信息图表主题，例如，''可再生能源的好处'']''的具有信息性和视觉吸引力的信息图表。信息图表的结构为[布局风格，例如，''垂直流动'']。*'
- en: '*Images:*'
  id: totrans-901
  prefs: []
  type: TYPE_NORMAL
  zh: '*图像**：'
- en: '*Start with a central image representing [main theme, e.g., ''glowing Earth''].*'
  id: totrans-902
  prefs: []
  type: TYPE_NORMAL
  zh: '*以代表[主要主题，例如，''发光的地球'']的中心图像开始。*'
- en: '*Incorporate visuals for [specific elements related to the topic, e.g., ''solar
    panels, wind turbines, and hydropower dams''].*'
  id: totrans-903
  prefs: []
  type: TYPE_NORMAL
  zh: '*融入与主题相关的视觉元素[例如，''太阳能板、风力涡轮机和水力大坝'']。*'
- en: '*Use icons for [specific sub-points, e.g., ''reduction in carbon emissions,
    cost savings, and job creation''].*'
  id: totrans-904
  prefs: []
  type: TYPE_NORMAL
  zh: '*使用图标来表示[具体子点，例如，''减少碳排放、节省成本和创造就业'']。*'
- en: '*Text Elements:*'
  id: totrans-905
  prefs: []
  type: TYPE_NORMAL
  zh: '*文本元素**：'
- en: '*Title: ''[Title of the infographic, e.g., ''Harnessing the Power of Nature'']''.
    Font: [font style, e.g., ''bold Helvetica''], Size: [size, e.g., ''36pt''], Color:
    [color, e.g., ''dark green''], Position: [position, e.g., ''top center''].*'
  id: totrans-906
  prefs: []
  type: TYPE_NORMAL
  zh: '*标题：''[信息图表标题，例如，''利用自然的力量'']''。字体：[字体样式，例如，''粗体Helvetica'']，大小：[大小，例如，''36pt'']，颜色：[颜色，例如，''深绿色'']，位置：[位置，例如，''顶部中央'']。*'
- en: '*Subheadings for each section, Font: [font style, e.g., ''Arial''], Size: [size,
    e.g., ''24pt''], Color: [color, e.g., ''midnight blue''].*'
  id: totrans-907
  prefs: []
  type: TYPE_NORMAL
  zh: '*每个部分的副标题，字体：[字体样式，例如，''Arial'']，大小：[大小，例如，''24pt'']，颜色：[颜色，例如，''午夜蓝'']。*'
- en: '*Main content text, Font: [font style, e.g., ''Calibri''], Size: [size, e.g.,
    ''18pt''], Color: [color, e.g., ''dark gray''], Position: [position, e.g., ''below
    or next to corresponding images''].*'
  id: totrans-908
  prefs: []
  type: TYPE_NORMAL
  zh: '*主要内容文本，字体：[字体样式，例如，''Calibri'']，大小：[大小，例如，''18pt'']，颜色：[颜色，例如，''深灰色'']，位置：[位置，例如，''在对应图像下方或旁边'']。*'
- en: '*Bullet points or numbered lists for [specific information points, e.g., ''benefits
    or steps'']. Font: [font style, e.g., ''Calibri''], Size: [size, e.g., ''16pt''],
    Color: [color, e.g., ''slate gray''].*'
  id: totrans-909
  prefs: []
  type: TYPE_NORMAL
  zh: '*使用项目符号或编号列表来列出[具体信息点，例如，''好处或步骤'']。字体：[字体样式，例如，''Calibri'']，大小：[大小，例如，''16pt'']，颜色：[颜色，例如，''板岩灰'']。*'
- en: '*Colors and Styling:*'
  id: totrans-910
  prefs: []
  type: TYPE_NORMAL
  zh: '*颜色和风格**：'
- en: '*Use a consistent color palette of [preferred colors, e.g., ''greens, blues,
    and grays'']. Ensure a balanced mix of visuals and text with clear and legible
    fonts. Highlight important points using [specific techniques, e.g., ''bold text
    or colorful icons''].*'
  id: totrans-911
  prefs: []
  type: TYPE_NORMAL
  zh: '*使用[首选颜色，例如，''绿色、蓝色和灰色'']的统一调色板。确保视觉和文本的平衡混合，使用清晰易读的字体。使用[特定技术，例如，''粗体文本或彩色图标'']突出重要点。*'
- en: '*Ensure there''s adequate whitespace for readability. The infographic should
    be concise yet comprehensive, visually guiding the reader through the information.*'
  id: totrans-912
  prefs: []
  type: TYPE_NORMAL
  zh: '*确保有足够的空白空间以提高可读性。信息图表应简明扼要且内容全面，通过视觉引导读者了解信息。*'
- en: '![InfograficPrompt.tif](../Images/InfograficPrompt_fmt.png)'
  id: totrans-913
  prefs: []
  type: TYPE_IMG
  zh: '![InfograficPrompt.tif](../Images/InfograficPrompt_fmt.png)'
- en: '![Infografic1.tif](../Images/Infografic1_fmt.jpeg)  ![Infografic2.tif](../Images/Infografic2_fmt.png)'
  id: totrans-914
  prefs: []
  type: TYPE_IMG
  zh: '![Infografic1.tif](../Images/Infografic1_fmt.jpeg)  ![Infografic2.tif](../Images/Infografic2_fmt.png)'
- en: '![Infografic4.tif](../Images/Infografic4_fmt.jpeg)  ![Infografic3.tif](../Images/Infografic3_fmt.png)'
  id: totrans-915
  prefs: []
  type: TYPE_IMG
  zh: '![Infografic4.tif](../Images/Infografic4_fmt.jpeg)  ![Infografic3.tif](../Images/Infografic3_fmt.png)'
- en: '**Diagrams**'
  id: totrans-916
  prefs: []
  type: TYPE_NORMAL
  zh: '**图表**'
- en: 'Generic prompt:'
  id: totrans-917
  prefs: []
  type: TYPE_NORMAL
  zh: '**通用提示**：'
- en: '*Create a [type of diagram] that illustrates [main concept]. Include the following
    elements: [element 1], [element 2], [element 3], and [element 4]. Use [color scheme]
    for the design and label the elements clearly.*'
  id: totrans-918
  prefs: []
  type: TYPE_NORMAL
  zh: '*创建一个[类型图表]，说明[主要概念]。包括以下元素：[元素1]，[元素2]，[元素3]，和[元素4]。使用[配色方案]进行设计，并清楚地标记元素。*'
- en: 'Example:'
  id: totrans-919
  prefs: []
  type: TYPE_NORMAL
  zh: '**示例：**'
- en: '![InfograficPrompt.tif](../Images/InfograficPrompt_fmt1.png)'
  id: totrans-920
  prefs: []
  type: TYPE_IMG
  zh: '![InfograficPrompt.tif](../Images/InfograficPrompt_fmt1.png)'
- en: '![1.tif](../Images/1_fmt.jpeg)  ![2.tif](../Images/2_fmt.jpeg)'
  id: totrans-921
  prefs: []
  type: TYPE_IMG
  zh: '![1.tif](../Images/1_fmt.jpeg)  ![2.tif](../Images/2_fmt.jpeg)'
- en: '![3.tif](../Images/3_fmt.jpeg)  ![4.tif](../Images/4_fmt.jpeg)'
  id: totrans-922
  prefs: []
  type: TYPE_IMG
  zh: '![3.tif](../Images/3_fmt.jpeg)  ![4.tif](../Images/4_fmt.jpeg)'
- en: '**Fashion**'
  id: totrans-923
  prefs: []
  type: TYPE_NORMAL
  zh: '**时尚**'
- en: 'Generic prompt:'
  id: totrans-924
  prefs: []
  type: TYPE_NORMAL
  zh: '**通用提示：**'
- en: '*Design a [type of clothing, e.g., ''flowing evening gown''] suitable for [occasion
    or season, e.g., ''summer gala''].*'
  id: totrans-925
  prefs: []
  type: TYPE_NORMAL
  zh: '*设计一款[服装类型，例如，''飘逸的晚礼服'']，适合[场合或季节，例如，''夏季晚宴'']。*'
- en: '*Emotion/Sentiment:*'
  id: totrans-926
  prefs: []
  type: TYPE_NORMAL
  zh: '*情感/情绪:*'
- en: '*The design should evoke a sense of [emotion or sentiment, e.g., ''elegance
    and mystery'']. It should resonate with the wearer and make them feel [desired
    emotions, e.g., ''confident and alluring''].*'
  id: totrans-927
  prefs: []
  type: TYPE_NORMAL
  zh: '*设计应唤起一种[情感或情绪，例如，''优雅和神秘'']的感觉。它应与穿着者产生共鸣，并使他们感到[期望的情绪，例如，''自信和迷人'']。*'
- en: '*Image Quality and Details:*'
  id: totrans-928
  prefs: []
  type: TYPE_NORMAL
  zh: '*图像质量和细节:*'
- en: '*Focus on [specific detail or element, e.g., ''intricate lacework''] on [part
    of the clothing, e.g., ''the sleeves and neckline''].*'
  id: totrans-929
  prefs: []
  type: TYPE_NORMAL
  zh: '*专注于[具体细节或元素，例如，''复杂的蕾丝工艺'']在[服装部分，例如，''袖子和领口'']。*'
- en: '*Incorporate [decorative elements or patterns, e.g., ''floral embroidery or
    sequin details''].*'
  id: totrans-930
  prefs: []
  type: TYPE_NORMAL
  zh: '*融入[装饰元素或图案，例如，''花卉刺绣或亮片细节'']。*'
- en: '*The silhouette should be [fit and form, e.g., ''fitted at the waist and flowing
    at the bottom''].*'
  id: totrans-931
  prefs: []
  type: TYPE_NORMAL
  zh: '*轮廓应为[合身和形状，例如，''腰部合身，底部飘逸'']。*'
- en: '*Color:*'
  id: totrans-932
  prefs: []
  type: TYPE_NORMAL
  zh: '*颜色:*'
- en: '*Main color: [primary color, e.g., ''deep sapphire blue''].*'
  id: totrans-933
  prefs: []
  type: TYPE_NORMAL
  zh: '*主色调：[主色调，例如，''深宝石蓝色'']。*'
- en: '*Accent colors: [secondary colors, e.g., ''silver and pearl white''] for [specific
    elements, e.g., ''trimmings or embellishments''].*'
  id: totrans-934
  prefs: []
  type: TYPE_NORMAL
  zh: '*点缀颜色：[次要颜色，例如，''银色和珍珠白色'']用于[特定元素，例如，''装饰或装饰'']。*'
- en: '*Style:*'
  id: totrans-935
  prefs: []
  type: TYPE_NORMAL
  zh: '*风格:*'
- en: '*The overall style should be [overall look and feel, e.g., ''modern with a
    hint of vintage charm''].*'
  id: totrans-936
  prefs: []
  type: TYPE_NORMAL
  zh: '*整体风格应为[整体外观和感觉，例如，''现代并带有复古魅力的微妙感觉'']。*'
- en: '*Incorporate [specific style elements, e.g., ''low back or a high slit on one
    side''] to add [design intent, e.g., ''touch of boldness''].*'
  id: totrans-937
  prefs: []
  type: TYPE_NORMAL
  zh: '*融入[具体风格元素，例如，''低领或一侧高开叉'']以增加[设计意图，例如，''大胆的触感'']。*'
- en: '*Fabric choices should be [desired fabric qualities, e.g., ''soft, breathable,
    and with a subtle sheen''], suitable for [functionality or occasion, e.g., ''warm
    summer nights''].*'
  id: totrans-938
  prefs: []
  type: TYPE_NORMAL
  zh: '*面料选择应为[期望的面料品质，例如，''柔软、透气且带有微妙的光泽'']，适合[功能性或场合，例如，''温暖的夏夜'']。*'
- en: '*Ensure the design balances comfort with aesthetics, making the wearer not
    only look stunning but also feel at ease.*'
  id: totrans-939
  prefs: []
  type: TYPE_NORMAL
  zh: '*确保设计在舒适与美观之间取得平衡，使穿着者不仅看起来惊艳，而且感到自在。*'
- en: 'Example:'
  id: totrans-940
  prefs: []
  type: TYPE_NORMAL
  zh: '**示例：**'
- en: '![FashionPrompt.tif](../Images/FashionPrompt_fmt.png)![FashionImage.tif](../Images/FashionImage_fmt.jpeg)'
  id: totrans-941
  prefs: []
  type: TYPE_IMG
  zh: '![FashionPrompt.tif](../Images/FashionPrompt_fmt.png)![FashionImage.tif](../Images/FashionImage_fmt.jpeg)'
- en: '**Architecture design**'
  id: totrans-942
  prefs: []
  type: TYPE_NORMAL
  zh: '**建筑设计**'
- en: 'Here is a generic prompt for creating a building design:'
  id: totrans-943
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是创建建筑设计的通用提示：
- en: '*Design a building for [specific purpose, e.g., ''corporate office''] located
    in [location type, e.g., ''an urban downtown area''].*'
  id: totrans-944
  prefs: []
  type: TYPE_NORMAL
  zh: '*为位于[地点类型，例如，''城市商业区'']的[特定用途，例如，''企业办公室'']设计一栋建筑。*'
- en: '*Height and Structure:*'
  id: totrans-945
  prefs: []
  type: TYPE_NORMAL
  zh: '*高度和结构:*'
- en: '*The building should have [number of floors, e.g., ''20''] floors, with [specific
    feature, e.g., ''a rooftop garden or terrace''].*'
  id: totrans-946
  prefs: []
  type: TYPE_NORMAL
  zh: '*建筑应有[楼层数，例如，''20'']层，带有[特定特征，例如，''屋顶花园或露台'']。*'
- en: '*The structure should be [structural style, e.g., ''tiered''] where each section
    recedes/[another option: ''protrudes''] as it ascends.*'
  id: totrans-947
  prefs: []
  type: TYPE_NORMAL
  zh: '*结构应为[结构风格，例如，''分层'']，其中每个部分在上升时都向后退/[另一种选择：''突出'']。*'
- en: '*Style:*'
  id: totrans-948
  prefs: []
  type: TYPE_NORMAL
  zh: '*风格:*'
- en: '*Architectural style should be [specific style, e.g., ''modern with Art Deco
    influences''].*'
  id: totrans-949
  prefs: []
  type: TYPE_NORMAL
  zh: '*建筑风格应为[具体风格，例如，''现代并受装饰艺术影响'']。*'
- en: '*The facade should incorporate [materials, e.g., ''glass and brushed steel'']
    with [additional feature, e.g., ''green vertical gardens at intervals''].*'
  id: totrans-950
  prefs: []
  type: TYPE_NORMAL
  zh: '*立面应融入[材料，例如，''玻璃和抛光钢'']，并带有[附加功能，例如，''间隔的绿色垂直花园'']。*'
- en: '*Look and Feel:*'
  id: totrans-951
  prefs: []
  type: TYPE_NORMAL
  zh: '*外观和感觉:*'
- en: '*The main entrance should exude a sense of [emotion, e.g., ''grandeur''] with
    [specific feature, e.g., ''large archway or a water feature''].*'
  id: totrans-952
  prefs: []
  type: TYPE_NORMAL
  zh: '*主入口应散发出一种[情感，例如，''宏伟'']的感觉，并带有[特定特征，例如，''大拱门或水景'']。*'
- en: '*Windows should be [window style, e.g., ''floor-to-ceiling, allowing abundant
    natural light''].*'
  id: totrans-953
  prefs: []
  type: TYPE_NORMAL
  zh: '*窗户应为[窗户风格，例如，''落地窗，允许充足的自然光线'']。*'
- en: '*Balconies or terraces, if any, should be [design/style, e.g., ''sleek and
    minimalist without heavy railings''].*'
  id: totrans-954
  prefs: []
  type: TYPE_NORMAL
  zh: '*如果有阳台或露台，其设计/风格应该是[例如，''光滑简约，没有重型栏杆'']。*'
- en: '*Sustainability:*'
  id: totrans-955
  prefs: []
  type: TYPE_NORMAL
  zh: '*可持续性：*'
- en: '*Consider [sustainability features, e.g., ''solar panels, rainwater harvesting,
    and passive cooling techniques''] to ensure the building is environmentally friendly.*'
  id: totrans-956
  prefs: []
  type: TYPE_NORMAL
  zh: '*考虑[可持续性特征，例如，''太阳能板、雨水收集和被动冷却技术'']以确保建筑对环境友好。*'
- en: '*Surroundings:*'
  id: totrans-957
  prefs: []
  type: TYPE_NORMAL
  zh: '*周围环境：*'
- en: '*The building should integrate well with [surrounding elements, e.g., ''park
    on one side and a busy street on the other''].*'
  id: totrans-958
  prefs: []
  type: TYPE_NORMAL
  zh: '*建筑应与[周围元素，例如，''一侧是公园，另一侧是繁忙的街道'']很好地融合。*'
- en: '*Landscaping around the building should be [landscape style, e.g., ''minimalist
    with native plants and a few statement trees''].*'
  id: totrans-959
  prefs: []
  type: TYPE_NORMAL
  zh: '*建筑周围的景观应该是[景观风格，例如，''简约，使用本土植物和几棵标志性树木'']。*'
- en: '*Ensure the design prioritizes both functionality and aesthetics, making it
    a landmark structure for [location type, e.g., ''the downtown area''].*'
  id: totrans-960
  prefs: []
  type: TYPE_NORMAL
  zh: '*确保设计优先考虑功能和美观，使其成为[地点类型，例如，''市中心区域'']的地标性建筑。*'
- en: 'Example:'
  id: totrans-961
  prefs: []
  type: TYPE_NORMAL
  zh: '**示例：**'
- en: '![ArchitecturePrompt.tif](../Images/ArchitecturePrompt_fmt.png)'
  id: totrans-962
  prefs: []
  type: TYPE_IMG
  zh: '![建筑提示.tif](../Images/ArchitecturePrompt_fmt.png)'
- en: '![ArchitectureImage1.tif](../Images/ArchitectureImage1_fmt.png)'
  id: totrans-963
  prefs: []
  type: TYPE_IMG
  zh: '![建筑图像1.tif](../Images/ArchitectureImage1_fmt.png)'
- en: '![ArchitectureImage2.tif](../Images/ArchitectureImage2_fmt.png)'
  id: totrans-964
  prefs: []
  type: TYPE_IMG
  zh: '![建筑图像2.tif](../Images/ArchitectureImage2_fmt.png)'
- en: '**Coloring book**'
  id: totrans-965
  prefs: []
  type: TYPE_NORMAL
  zh: '**彩色书**'
- en: 'Generic prompt:'
  id: totrans-966
  prefs: []
  type: TYPE_NORMAL
  zh: '**通用提示：**'
- en: '*Design a coloring book with the overarching theme of [context, e.g., ''Wildlife
    Adventures''].*'
  id: totrans-967
  prefs: []
  type: TYPE_NORMAL
  zh: '*设计一本以[情境，例如，''野生动物冒险'']为主题的全套彩色书。*'
- en: '*Time:*'
  id: totrans-968
  prefs: []
  type: TYPE_NORMAL
  zh: '*时间：*'
- en: '*Each page should represent a different time of day, ranging from [specific
    times, e.g., ''dawn to dusk''].*'
  id: totrans-969
  prefs: []
  type: TYPE_NORMAL
  zh: '*每页应代表一天中的不同时间，从[具体时间，例如，''黎明到黄昏'']。*'
- en: '*Location:*'
  id: totrans-970
  prefs: []
  type: TYPE_NORMAL
  zh: '*地点：*'
- en: '*The scenes in the coloring book should transport the colorist to [locations,
    e.g., ''various iconic natural habitats, from dense rainforests to arid deserts''].*'
  id: totrans-971
  prefs: []
  type: TYPE_NORMAL
  zh: '*彩色书中的场景应该将色彩家带到[地点，例如，''从茂密的雨林到干旱的沙漠的各种标志性自然栖息地'']。*'
- en: '*Action:*'
  id: totrans-972
  prefs: []
  type: TYPE_NORMAL
  zh: '*行动：*'
- en: '*Include dynamic scenes of [specific animal, e.g., ''leopard''] in mid-pounce
    or [another animal, e.g., ''hummingbird''] hovering over a flower.*'
  id: totrans-973
  prefs: []
  type: TYPE_NORMAL
  zh: '*包括[具体动物，例如，''豹'']在中跳跃或[另一种动物，例如，''蜂鸟'']在花朵上盘旋的动态场景。*'
- en: '*Incorporate moments of tranquility, such as [specific animal, e.g., ''an elephant'']
    grazing with its calf.*'
  id: totrans-974
  prefs: []
  type: TYPE_NORMAL
  zh: '*融入宁静的时刻，例如[具体动物，例如，''一头大象'']与其小象一起吃草。*'
- en: '*Composition:*'
  id: totrans-975
  prefs: []
  type: TYPE_NORMAL
  zh: '*构图：*'
- en: '*Each page should use the [composition technique, e.g., ''rule of thirds'']
    for balanced designs.*'
  id: totrans-976
  prefs: []
  type: TYPE_NORMAL
  zh: '*每页应使用[构图技巧，例如，''三分法'']进行平衡设计。*'
- en: '*Create variety by alternating between close-up detailed images and expansive
    landscapes on different pages.*'
  id: totrans-977
  prefs: []
  type: TYPE_NORMAL
  zh: '*通过在不同页面上交替使用近距离详细图像和广阔景观来创造多样性。*'
- en: '*Features:*'
  id: totrans-978
  prefs: []
  type: TYPE_NORMAL
  zh: '*特点：*'
- en: '*Incorporate intricate patterns and textures on the animals and the landscapes
    to make the coloring experience more engaging and detailed.*'
  id: totrans-979
  prefs: []
  type: TYPE_NORMAL
  zh: '*在动物和景观上融入复杂的图案和纹理，使涂色体验更加吸引人和详细。*'
- en: '*Emotion:*'
  id: totrans-980
  prefs: []
  type: TYPE_NORMAL
  zh: '*情感：*'
- en: '*The coloring book should evoke feelings of [desired emotions, e.g., ''wonder,
    excitement, and relaxation'']. Aim to instill a connection between the colorist
    and the natural world.*'
  id: totrans-981
  prefs: []
  type: TYPE_NORMAL
  zh: '*彩色书应该唤起[期望的情感，例如，''惊奇、兴奋和放松'']。旨在在色彩家和自然世界之间建立联系。*'
- en: '*Additional Instructions:*'
  id: totrans-982
  prefs: []
  type: TYPE_NORMAL
  zh: '*附加说明：*'
- en: '*Ensure each page has clear, bold lines for easy coloring.*'
  id: totrans-983
  prefs: []
  type: TYPE_NORMAL
  zh: '*确保每页都有清晰、粗体的线条，便于涂色。*'
- en: '*Add a brief description or fact at the bottom of each page related to the
    scene, offering an educational aspect.*'
  id: totrans-984
  prefs: []
  type: TYPE_NORMAL
  zh: '*在每页底部添加与场景相关的简短描述或事实，提供教育方面。*'
- en: '*The designs should cater to a wide age range, from children to adults, by
    varying the complexity of the scenes.*'
  id: totrans-985
  prefs: []
  type: TYPE_NORMAL
  zh: '*设计应适应广泛的年龄范围，从儿童到成人，通过改变场景的复杂性。*'
- en: '*Ensure the overall book has a cohesive feel, taking the colorist through the
    world''s natural wonders, one page at a time.*'
  id: totrans-986
  prefs: []
  type: TYPE_NORMAL
  zh: '*确保整体书籍感觉统一，一次一页地带领色彩家穿越世界的自然奇观。*'
- en: 'Example:'
  id: totrans-987
  prefs: []
  type: TYPE_NORMAL
  zh: '**示例：**'
- en: '![ColorbookPrompt.tif](../Images/ColorbookPrompt_fmt.png)'
  id: totrans-988
  prefs: []
  type: TYPE_IMG
  zh: '![彩色书提示.tif](../Images/ColorbookPrompt_fmt.png)'
- en: '![ColoringBook1.tif](../Images/ColoringBook1_fmt.jpeg)  ![ColoringBook4.tif](../Images/ColoringBook4_fmt.jpeg)'
  id: totrans-989
  prefs: []
  type: TYPE_IMG
  zh: '![彩色书1.tif](../Images/ColoringBook1_fmt.jpeg) ![彩色书4.tif](../Images/ColoringBook4_fmt.jpeg)'
- en: '**Product packaging**'
  id: totrans-990
  prefs: []
  type: TYPE_NORMAL
  zh: '**产品包装**'
- en: 'Generic prompt:'
  id: totrans-991
  prefs: []
  type: TYPE_NORMAL
  zh: '**通用提示：**'
- en: '*Design a product packaging for [context, e.g., ''a premium organic tea brand''].*'
  id: totrans-992
  prefs: []
  type: TYPE_NORMAL
  zh: '*为[情境，例如，''高端有机茶品牌'']设计产品包装。*'
- en: '*Contextual Elements:*'
  id: totrans-993
  prefs: []
  type: TYPE_NORMAL
  zh: '*环境元素：*'
- en: '*Product Name: [specific name, e.g., ''Verde Bliss''].*'
  id: totrans-994
  prefs: []
  type: TYPE_NORMAL
  zh: '*产品名称：[具体名称，例如，''Verde Bliss'']。*'
- en: '*Product Description: Brief text describing [key characteristics, e.g., ''a
    hand-picked, ethically sourced green tea from the Himalayas''].*'
  id: totrans-995
  prefs: []
  type: TYPE_NORMAL
  zh: '*产品描述：简要描述[关键特征，例如，''来自喜马拉雅山脉手工挑选、道德采购的绿茶'']。*'
- en: '*Logo: Incorporate the brand''s [logo description, e.g., ''elegant, cursive
    logo with a tea leaf motif''] at a prominent place on the packaging.*'
  id: totrans-996
  prefs: []
  type: TYPE_NORMAL
  zh: '*标志：在包装的显眼位置融入品牌的[标志描述，例如，''优雅的书法标志，带有茶叶图案'']。*'
- en: '*Image Composition:*'
  id: totrans-997
  prefs: []
  type: TYPE_NORMAL
  zh: '*图像构图：*'
- en: '*Main Visual: Feature an image of [key visual, e.g., ''tea leaves on a wooden
    scoop, with misty mountain peaks in the background''].*'
  id: totrans-998
  prefs: []
  type: TYPE_NORMAL
  zh: '*主要视觉：展示[关键视觉，例如，''木勺上的茶叶图像，背景有雾蒙蒙的山峰'']。*'
- en: '*Background: Use a [background style, e.g., ''subtle gradient''] that complements
    the main visual, transitioning from [color, e.g., ''deep green''] at the bottom
    to [color, e.g., ''soft beige''] at the top.*'
  id: totrans-999
  prefs: []
  type: TYPE_NORMAL
  zh: '*背景：使用[背景样式，例如，''微妙的渐变'']来补充主要视觉元素，从底部[颜色，例如，''深绿色'']过渡到顶部[颜色，例如，''柔和的米色'']。*'
- en: '*Additional Elements: Intersperse [secondary visuals, e.g., ''small illustrations
    of farmers or tea fields''] to showcase the [specific feature, e.g., ''organic
    and hand-picked nature''] of the tea.*'
  id: totrans-1000
  prefs: []
  type: TYPE_NORMAL
  zh: '*附加元素：穿插[次要视觉，例如，''农民或茶园的小插图'']来展示[特定特征，例如，''有机和手工挑选的自然'']的茶。*'
- en: '*Emotion: The packaging should evoke feelings of [desired emotions, e.g., ''tranquility,
    purity, and luxury'']. It should make the customer feel [specific sentiment, e.g.,
    ''connected to nature and the artisanal craftsmanship of the tea makers''].*'
  id: totrans-1001
  prefs: []
  type: TYPE_NORMAL
  zh: '*情感：包装应唤起[期望的情感，例如，''宁静、纯净和奢华'']的感觉。它应该让顾客感到[具体情感，例如，''与自然和茶艺师的工匠精神相连接'']。*'
- en: '*Additional Instructions:*'
  id: totrans-1002
  prefs: []
  type: TYPE_NORMAL
  zh: '*附加说明：*'
- en: '*Typography: Use [font style, e.g., ''combination of script for the product
    name and sans-serif for other details'']. Ensure legibility and hierarchy.*'
  id: totrans-1003
  prefs: []
  type: TYPE_NORMAL
  zh: '*字体：使用[字体样式，例如，''产品名称使用手写体，其他细节使用无衬线字体'']。确保可读性和层次感。*'
- en: '*Space: Ensure a clean layout with sufficient whitespace for a premium feel.*'
  id: totrans-1004
  prefs: []
  type: TYPE_NORMAL
  zh: '*空间：确保布局整洁，留有足够的空白空间以获得高端感。*'
- en: '*Sustainability: Highlight any eco-friendly aspects of the product or packaging
    with [specific icons or badges, e.g., ''recycled emblem or a "cruelty-free" badge''].*'
  id: totrans-1005
  prefs: []
  type: TYPE_NORMAL
  zh: '*可持续性：使用[具体图标或徽章，例如，''回收标志或“无残忍”徽章'']突出产品或包装的环保方面。*'
- en: '*Additional Information: Add a side panel with [specific details, e.g., ''brewing
    instructions, ingredients, and nutritional information''].*'
  id: totrans-1006
  prefs: []
  type: TYPE_NORMAL
  zh: '*附加信息：添加一个侧面板，包含[具体细节，例如，''冲泡说明、成分和营养信息'']。*'
- en: '*Ensure the packaging design is cohesive, clearly communicates the product''s
    unique selling points, and stands out on a retail shelf.*'
  id: totrans-1007
  prefs: []
  type: TYPE_NORMAL
  zh: '*确保包装设计协调一致，清楚地传达产品的独特卖点，并在零售货架上脱颖而出。*'
- en: 'Example:'
  id: totrans-1008
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：
- en: '![PackingPrompt.tif](../Images/PackingPrompt_fmt.png)'
  id: totrans-1009
  prefs: []
  type: TYPE_IMG
  zh: '![PackingPrompt.tif](../Images/PackingPrompt_fmt.png)'
- en: '![PackingImage2.tif](../Images/PackingImage2_fmt.jpeg)  ![PackingImage1.tif](../Images/PackingImage1_fmt.jpeg)'
  id: totrans-1010
  prefs: []
  type: TYPE_IMG
  zh: '![PackingImage2.tif](../Images/PackingImage2_fmt.jpeg)  ![PackingImage1.tif](../Images/PackingImage1_fmt.jpeg)'
- en: '**Tatoo**'
  id: totrans-1011
  prefs: []
  type: TYPE_NORMAL
  zh: '**纹身**'
- en: 'Generic prompt:'
  id: totrans-1012
  prefs: []
  type: TYPE_NORMAL
  zh: 通用提示：
- en: '*Style: [Describe the overall style you are aiming for, such as tribal, minimalist,
    watercolor, etc.]*'
  id: totrans-1013
  prefs: []
  type: TYPE_NORMAL
  zh: '*风格：[描述你希望达到的整体风格，例如，部落风格、极简主义、水彩画等]*'
- en: '*Elements: [List core elements you want to include, e.g., animals, geometric
    shapes, text, etc.]*'
  id: totrans-1014
  prefs: []
  type: TYPE_NORMAL
  zh: '*元素：[列出你想要包含的核心元素，例如，动物、几何形状、文字等]*'
- en: '*Colors: [Specify the color palette, or note if you would like it to be black
    and white]*'
  id: totrans-1015
  prefs: []
  type: TYPE_NORMAL
  zh: '*颜色：[指定色彩搭配，或注明是否希望为黑白]*'
- en: '*Size and Placement: [Detail the size (small, medium, large) and preferred
    placement (forearm, back, etc.)]*'
  id: totrans-1016
  prefs: []
  type: TYPE_NORMAL
  zh: '*尺寸和位置：[详细说明尺寸（小、中、大）和首选位置（前臂、背部等）]*'
- en: '*Emotional Tone: [Convey the emotion or vibe you want the tattoo to encapsulate,
    like joy, mystery, or courage]*'
  id: totrans-1017
  prefs: []
  type: TYPE_NORMAL
  zh: '*情感基调：[传达你希望纹身包含的情感或氛围，如快乐、神秘或勇气]*'
- en: '*Cultural References: [Note any cultural or pop-culture elements you want incorporated]*'
  id: totrans-1018
  prefs: []
  type: TYPE_NORMAL
  zh: '*文化参考：[注明你希望融入的任何文化或流行文化元素]*'
- en: '*Must-Haves: [List any specific items or ideas that are non-negotiable]*'
  id: totrans-1019
  prefs: []
  type: TYPE_NORMAL
  zh: '*必须包含：[列出任何非协商性的具体项目或想法]*'
- en: '*Must-Avoids: [List any elements or themes you absolutely do not want]*'
  id: totrans-1020
  prefs: []
  type: TYPE_NORMAL
  zh: '*必须避免：[列出你绝对不希望包含的元素或主题]*'
- en: '*Additional Notes: [Any other specifics or creative freedom you want to grant
    AI]*'
  id: totrans-1021
  prefs: []
  type: TYPE_NORMAL
  zh: '*附加备注：[任何其他具体要求或给予AI的创意自由]*'
- en: 'Example:'
  id: totrans-1022
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：
- en: '*Style: Cyberpunk meets Japanese traditional*'
  id: totrans-1023
  prefs: []
  type: TYPE_NORMAL
  zh: '*风格：赛博朋克与日本传统风格相遇*'
- en: '*Elements: Koi fish, circuitry patterns, a cherry blossom branch*'
  id: totrans-1024
  prefs: []
  type: TYPE_NORMAL
  zh: '*元素：锦鲤、电路图案、樱花树枝*'
- en: '*Colors: Neon blues, electric purples, with highlights of soft pink for the
    cherry blossoms*'
  id: totrans-1025
  prefs: []
  type: TYPE_NORMAL
  zh: '*颜色：霓虹蓝、电子紫，以柔和的粉色作为樱花的亮点*'
- en: '*Size and Placement: Medium, intended for the forearm.*'
  id: totrans-1026
  prefs: []
  type: TYPE_NORMAL
  zh: '*尺寸和位置：中等，适用于前臂。*'
- en: '*Emotional Tone: A fusion of tranquility and dynamism*'
  id: totrans-1027
  prefs: []
  type: TYPE_NORMAL
  zh: '*情感基调：宁静与活力的融合*'
- en: '*Cultural References: Imagine if the world of "Blade Runner" had a cherry blossom
    festival.*'
  id: totrans-1028
  prefs: []
  type: TYPE_NORMAL
  zh: '*文化参考：想象一下如果“银翼杀手”的世界有樱花节。*'
- en: '*Must-Haves: Make sure the koi fish''s scales transition into circuit patterns*'
  id: totrans-1029
  prefs: []
  type: TYPE_NORMAL
  zh: '*必须包含：确保锦鲤的鳞片过渡到电路图案*'
- en: '*Must-Avoids: Avoid violent or dark imagery.*'
  id: totrans-1030
  prefs: []
  type: TYPE_NORMAL
  zh: '*必须避免：避免暴力或阴暗的图像。*'
- en: '*Additional Notes: Blend the organic and technological elements seamlessly,
    highlighting their interconnectivity.*'
  id: totrans-1031
  prefs: []
  type: TYPE_NORMAL
  zh: '*附加说明：无缝融合有机和技术元素，突出它们的相互关联性。*'
- en: 'Example:'
  id: totrans-1032
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：
- en: '![TattooPrompt.tif](../Images/TattooPrompt_fmt.png)'
  id: totrans-1033
  prefs: []
  type: TYPE_IMG
  zh: '![TattooPrompt.tif](../Images/TattooPrompt_fmt.png)'
- en: '![TattooImage1.tif](../Images/TattooImage1_fmt.jpeg)  ![TattooImage2.tif](../Images/TattooImage2_fmt.jpeg)'
  id: totrans-1034
  prefs: []
  type: TYPE_IMG
  zh: '![TattooImage1.tif](../Images/TattooImage1_fmt.jpeg)  ![TattooImage2.tif](../Images/TattooImage2_fmt.jpeg)'
- en: '**Photo**'
  id: totrans-1035
  prefs: []
  type: TYPE_NORMAL
  zh: '**照片**'
- en: 'Generic prompt:'
  id: totrans-1036
  prefs: []
  type: TYPE_NORMAL
  zh: 通用提示：
- en: '*Capture a photo depicting [photo context, e.g., ''serene lakeside scene with
    a lone individual meditating''].*'
  id: totrans-1037
  prefs: []
  type: TYPE_NORMAL
  zh: '*拍摄一张描述[照片背景，例如，''宁静的湖边场景，一个独自冥想的人'']的照片。*'
- en: '*Time of Day:*'
  id: totrans-1038
  prefs: []
  type: TYPE_NORMAL
  zh: '*一天中的时间：*'
- en: '*The scene should be set during [time of the day, e.g., ''golden hour just
    before sunset''].*'
  id: totrans-1039
  prefs: []
  type: TYPE_NORMAL
  zh: '*场景应设定在[一天中的时间，例如，''日落前的黄金时段'']。*'
- en: '*Location:*'
  id: totrans-1040
  prefs: []
  type: TYPE_NORMAL
  zh: '*位置：*'
- en: '*Taken at [location specifics, e.g., ''tranquil lakeside surrounded by tall
    pine trees with mountains in the backdrop''].*'
  id: totrans-1041
  prefs: []
  type: TYPE_NORMAL
  zh: '*拍摄地点[具体地点，例如，''宁静的湖边，周围是高大的松树，背景是山脉'']。*'
- en: '*Camera Settings:*'
  id: totrans-1042
  prefs: []
  type: TYPE_NORMAL
  zh: '*相机设置：*'
- en: '*Aperture: [specific aperture, e.g., ''f/2.8'']*'
  id: totrans-1043
  prefs: []
  type: TYPE_NORMAL
  zh: '*光圈：[具体光圈，例如，''f/2.8'']*'
- en: '*Shutter Speed: [specific speed, e.g., ''1/200s'']*'
  id: totrans-1044
  prefs: []
  type: TYPE_NORMAL
  zh: '*快门速度：[具体速度，例如，''1/200s'']*'
- en: '*ISO: [specific ISO setting, e.g., ''100'']*'
  id: totrans-1045
  prefs: []
  type: TYPE_NORMAL
  zh: '*ISO：[具体ISO设置，例如，''100'']*'
- en: '*Lens Type:*'
  id: totrans-1046
  prefs: []
  type: TYPE_NORMAL
  zh: '*镜头类型：*'
- en: '*Utilize a [lens type, e.g., ''50mm prime lens''].*'
  id: totrans-1047
  prefs: []
  type: TYPE_NORMAL
  zh: '*使用[镜头类型，例如，''50mm定焦镜头'']。*'
- en: '*Focus:*'
  id: totrans-1048
  prefs: []
  type: TYPE_NORMAL
  zh: '*焦点：*'
- en: '*The focus should be on [focus subject, e.g., ''the individual meditating''],
    with a [focus effect, e.g., ''shallow depth of field to blur the background slightly''].*'
  id: totrans-1049
  prefs: []
  type: TYPE_NORMAL
  zh: '*焦点应集中在[焦点主题，例如，''冥想的人'']上，并使用[焦点效果，例如，''浅景深以轻微模糊背景'']。*'
- en: '*Exposure:*'
  id: totrans-1050
  prefs: []
  type: TYPE_NORMAL
  zh: '*曝光：*'
- en: '*The exposure should be [exposure preference, e.g., ''slightly underexposed
    to emphasize the silhouette of the individual against the setting sun''].*'
  id: totrans-1051
  prefs: []
  type: TYPE_NORMAL
  zh: '*曝光应[曝光偏好，例如，''轻微欠曝以强调人物与落日的剪影'']。*'
- en: '*Composition:*'
  id: totrans-1052
  prefs: []
  type: TYPE_NORMAL
  zh: '*构图：*'
- en: '*Use the [composition technique, e.g., ''rule of thirds''] to position [main
    subject, e.g., ''the individual''] on [specific location, e.g., ''the left third
    of the frame''].*'
  id: totrans-1053
  prefs: []
  type: TYPE_NORMAL
  zh: '*使用[构图技巧，例如，''三分法'']将[主要主题，例如，''这个人'']放置在[具体位置，例如，''画面的左三分之一'']。*'
- en: '*Ensure there''s balance with [balancing elements, e.g., ''the trees on the
    right and the expansive sky above''].*'
  id: totrans-1054
  prefs: []
  type: TYPE_NORMAL
  zh: '*确保与[平衡元素，例如，''右侧的树木和上方广阔的天空'']保持平衡。*'
- en: '*Emotion:*'
  id: totrans-1055
  prefs: []
  type: TYPE_NORMAL
  zh: '*情感：*'
- en: '*The photograph should evoke feelings of [desired emotions, e.g., ''peace,
    solitude, and reflection''].*'
  id: totrans-1056
  prefs: []
  type: TYPE_NORMAL
  zh: '*照片应唤起[期望的情感，例如，''和平、孤独和反思'']的感觉。*'
- en: 'Example:'
  id: totrans-1057
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：
- en: '![PhotoPrompt.tif](../Images/PhotoPrompt_fmt.png)'
  id: totrans-1058
  prefs: []
  type: TYPE_IMG
  zh: '![PhotoPrompt.tif](../Images/PhotoPrompt_fmt.png)'
- en: '![PhotoImage2.tif](../Images/PhotoImage2_fmt.jpeg)  ![PhotoImage1.tif](../Images/PhotoImage1_fmt.jpeg)'
  id: totrans-1059
  prefs: []
  type: TYPE_IMG
  zh: '![PhotoImage2.tif](../Images/PhotoImage2_fmt.jpeg)  ![PhotoImage1.tif](../Images/PhotoImage1_fmt.jpeg)'
- en: '![PhotoWomanPrompt.tif](../Images/PhotoWomanPrompt_fmt.png)![PhotoWoman.tif](../Images/PhotoWoman_fmt.png)'
  id: totrans-1060
  prefs: []
  type: TYPE_IMG
  zh: '![PhotoWomanPrompt.tif](../Images/PhotoWomanPrompt_fmt.png)![PhotoWoman.tif](../Images/PhotoWoman_fmt.png)'
- en: '**6.5 Best Practices**'
  id: totrans-1061
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**6.5 最佳实践**'
- en: '**Use an iterative approach**^([2](#footnote-11253-2))'
  id: totrans-1062
  prefs: []
  type: TYPE_NORMAL
  zh: '**使用迭代方法**^([2](#footnote-11253-2))'
- en: Before designing the landscape, start with the character. You can get the body
    morphology right before filling in the rest. Use detailed descriptions.
  id: totrans-1063
  prefs: []
  type: TYPE_NORMAL
  zh: 在设计风景之前，先从人物开始。在填充其余部分之前，确保身体形态正确。使用详细的描述。
- en: Interactively use methods to influence the position and arrangement of objects
    in the generated image. Use phrases like "on the left," "behind," etc. to guide
    object placement.
  id: totrans-1064
  prefs: []
  type: TYPE_NORMAL
  zh: 通过交互式方法影响生成图像中对象的定位和排列。使用诸如“在左边”、“在后面”等短语来引导对象放置。
- en: '**Be specific with prompts**'
  id: totrans-1065
  prefs: []
  type: TYPE_NORMAL
  zh: '**具体提示**'
- en: Use adjectives, time frames, and context elements to refine your prompts.
  id: totrans-1066
  prefs: []
  type: TYPE_NORMAL
  zh: 使用形容词、时间框架和背景元素来细化你的提示。
- en: Say "jubilant young woman" instead of just "woman." Context also enriches the
    prompt; specifying a time frame like "sunset" can lend the generated image a particular
    hue and mood.
  id: totrans-1067
  prefs: []
  type: TYPE_NORMAL
  zh: 用“欢欣鼓舞的年轻女性”代替“女性”。上下文也丰富了提示；指定一个时间框架，如“日落”，可以为生成的图像增添特定的色调和氛围。
- en: Provide context. For example, specifying "jubilant young woman celebrating her
    graduation at sunset" can drastically refine the generated output.
  id: totrans-1068
  prefs: []
  type: TYPE_NORMAL
  zh: 提供上下文。例如，指定“在日落时欢欣鼓舞的年轻女性庆祝她的毕业”可以极大地细化生成的输出。
- en: '**Be your set designer**'
  id: totrans-1069
  prefs: []
  type: TYPE_NORMAL
  zh: '**成为您的场景设计师**'
- en: DALL-E offers a great deal of creative freedom, but it also obliges you to be
    the director of your virtual stage. You could influence not only the position
    and arrangement of the elements within the image but also the position and settings
    of the camera.
  id: totrans-1070
  prefs: []
  type: TYPE_NORMAL
  zh: DALL-E提供了大量的创作自由，但它也要求您成为您虚拟舞台的导演。您不仅能够影响图像中元素的位置和排列，还能影响相机位置和设置。
- en: '![DogSideWays.tif](../Images/DogSideWays_fmt.jpeg) ![DogSuperWideAngle.tif](../Images/DogSuperWideAngle_fmt.png) ![DogLongShot.tif](../Images/DogLongShot_fmt.jpeg)'
  id: totrans-1071
  prefs: []
  type: TYPE_IMG
  zh: '![DogSideWays.tif](../Images/DogSideWays_fmt.jpeg) ![DogSuperWideAngle.tif](../Images/DogSuperWideAngle_fmt.png) ![DogLongShot.tif](../Images/DogLongShot_fmt.jpeg)'
- en: '![DogLowAngle.tif](../Images/DogLowAngle_fmt.jpeg) ![DogOverTheShoulder.tif](../Images/DogOverTheShoulder_fmt.jpeg) ![DogWorm_sEye_view.tif](../Images/DogWorm_sEye_view_fmt.jpeg)'
  id: totrans-1072
  prefs: []
  type: TYPE_IMG
  zh: '![DogLowAngle.tif](../Images/DogLowAngle_fmt.jpeg) ![DogOverTheShoulder.tif](../Images/DogOverTheShoulder_fmt.jpeg) ![DogWorm_sEye_view.tif](../Images/DogWorm_sEye_view_fmt.jpeg)'
- en: '**Regenerate images**'
  id: totrans-1073
  prefs: []
  type: TYPE_NORMAL
  zh: '**重新生成图片**'
- en: DALL-E cannot edit images, such as removing objects or altering their orientation,
    at your request. If you need to make corrections to the image, review the initial
    image, identify areas for improvement, and refine the wording to capture your
    vision. Treat each iteration as a progression toward the ideal prompt. It is easy
    to iterate; use "Prompt re-writing" by clicking ![pen_symbol.tif](../Images/pen_symbol_fmt.png)
    under the submitted prompt. It allows you to edit the prompt and resubmit it.
  id: totrans-1074
  prefs: []
  type: TYPE_NORMAL
  zh: DALL-E无法根据您的请求编辑图片，例如移除对象或改变它们的朝向。如果您需要修改图片，请回顾原始图片，确定需要改进的区域，并精炼措辞以捕捉您的愿景。将每一次迭代视为向理想提示的进步。迭代很容易；通过点击提交提示下方的![pen_symbol.tif](../Images/pen_symbol_fmt.png)进行“提示重写”，允许您编辑提示并重新提交。
- en: E.g., in the images below, the focus of the image remains the same, and you
    direct the scene's point of view by specifying camera settings, angle, framing,
    zoom, and photographic technique.^([3](#footnote-11253-3))
  id: totrans-1075
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，在下面的图片中，图片的焦点保持不变，您可以通过指定相机设置、角度、构图、缩放和摄影技巧来指导场景的视角。[^([3](#footnote-11253-3))]
- en: 'E.g. "Photorealistic image of a seasoned oil rig explorer in a yellow vest,
    taken with a Canon EOS style, 9 points focus. The setting is a sunny, late afternoon
    in the northern wooded area of Canada. The image captures a close-up portrait,
    highlighting the intricate details of his face: years of experience, freckles,
    some drops of sweat, and a few drops of dirt from the extraction site. In the
    background, an oil rig and other workers are visible amidst the Canadian landscape.
    The natural light enhances the depth and clarity of the image, suitable for a
    National Geographic publication."'
  id: totrans-1076
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，“一位经验丰富的石油钻井平台探险家穿着黄色背心，用佳能EOS风格相机拍摄，9点对焦。场景设定在加拿大北部森林地带的阳光明媚的傍晚时分。图片捕捉了一个特写肖像，突出了他脸上的复杂细节：多年的经验、雀斑、一些汗珠和从开采地点带来的几滴泥土。在背景中，可以看到石油钻井平台和其他工人在加拿大景观中。自然光线增强了图像的深度和清晰度，适合国家地理杂志的出版物。”
- en: '![DALL%c2%b7E_2023-12-02_14.43.50_-_Photorealistic_close-up_image.tif](../Images/DALL%C2%B7E_2023-12-02_14.43_fmt.png)'
  id: totrans-1077
  prefs: []
  type: TYPE_IMG
  zh: '![DALL%c2%b7E_2023-12-02_14.43.50_-_Photorealistic_close-up_image.tif](../Images/DALL%C2%B7E_2023-12-02_14.43_fmt.png)'
- en: Or, "Photography, 8K resolution, depicting a sleek Dacia Duster stationed in
    The Rocks region of Sydney. The scene is bathed in the luminous hues of a summer
    day. The majestic Sydney Opera House and the animated Circular Quay form the backdrop.
    A delicate lens flare, characteristic for 50mm lens, enhances the visual appeal."
  id: totrans-1078
  prefs: []
  type: TYPE_NORMAL
  zh: 或者，“摄影，8K分辨率，描绘了一辆光滑的达西亚Duster停泊在悉尼的岩石区。场景沐浴在夏日阳光的明亮色调中。宏伟的悉尼歌剧院和充满活力的环形码头构成了背景。一个精致的镜头光晕，这是50mm镜头的典型特征，增强了视觉效果。”
- en: '![DALL%c2%b7E_2023-12-04_16.59.44_-_Photography%2c_8k_resolution.tif](../Images/DALL%C2%B7E_2023-12-04_16.59_fmt.png)'
  id: totrans-1079
  prefs: []
  type: TYPE_IMG
  zh: '![DALL%c2%b7E_2023-12-04_16.59.44_-_Photography%2c_8k_resolution.tif](../Images/DALL%C2%B7E_2023-12-04_16.59_fmt.png)'
- en: '**Image sizes**'
  id: totrans-1080
  prefs: []
  type: TYPE_NORMAL
  zh: '**图片尺寸**'
- en: 'DALL-E 3 accepts three different image sizes: 1024px by 1024px, 1792px by 1024px,
    and 1024px by 1792px. It gives more flexibility in aspect ratio and it is an addition
    to the style and context of the generated image. Vertical images may look better
    as if they were taken by a cellphone camera. Horizontal images may work better
    for landscape paintings or digital designs.^([4](#footnote-11253-4))'
  id: totrans-1081
  prefs: []
  type: TYPE_NORMAL
  zh: DALL-E 3接受三种不同的图像尺寸：1024px x 1024px、1792px x 1024px和1024px x 1792px。它提供了更多的纵横比灵活性，并且是生成图像风格和上下文的补充。垂直图像可能看起来像是用手机相机拍摄的。水平图像可能更适合风景画或数字设计。[4](#footnote-11253-4)
- en: '![114_Monkey_seated_on_the_stairs_of_a_colorful_Indian_temple.tif](../Images/114_Monkey_seated_on_th_fmt.png)'
  id: totrans-1082
  prefs: []
  type: TYPE_IMG
  zh: '![114_Monkey_seated_on_the_stairs_of_a_colorful_Indian_temple.tif](../Images/114_Monkey_seated_on_th_fmt.png)'
- en: '*Monkey seated on the stairs of a colorful Indian temple*'
  id: totrans-1083
  prefs: []
  type: TYPE_NORMAL
  zh: '*猴坐在色彩缤纷的印度寺庙的楼梯上*'
