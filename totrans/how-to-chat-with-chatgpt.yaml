- en: 'DALL-E prompt: Imagine a vibrant and realistic image of a cute humanoid robot
    astronaut on the International Space Station, cheerfully conducting its daily
    workout routine and communicating its progress to Earth'
  id: totrans-815
  prefs: []
  type: TYPE_NORMAL
  zh: DALL-E提示：想象一个充满活力且逼真的图像，展示一个可爱的人形机器人宇航员在国际空间站上愉快地进行日常锻炼，并向地球报告其进度
- en: 1\. “As a nutritionist, what daily meal plan would you recommend for an athlete
    in training?”
  id: totrans-816
  prefs: []
  type: TYPE_NORMAL
  zh: 1. “作为一名营养师，你会推荐怎样的日常餐单给正在训练的运动员？”
- en: 2\. “As a climate scientist, how would you explain the greenhouse effect to
    a fifth-grader?”
  id: totrans-817
  prefs: []
  type: TYPE_NORMAL
  zh: 2. “作为一名气候科学家，你会如何向五年级学生解释温室效应？”
- en: 3\. “As a personal finance coach, what steps would you advise for someone in
    debt?”
  id: totrans-818
  prefs: []
  type: TYPE_NORMAL
  zh: 3. “作为一名个人财务教练，你会建议哪些步骤给那些负债的人？”
- en: 4\. “Assume you’re a detective from the 1940s. How would you solve a mysterious
    burglary?”
  id: totrans-819
  prefs: []
  type: TYPE_NORMAL
  zh: 4. “假设你是一位20世纪40年代的侦探。你会如何解决一桩神秘的盗窃案？”
- en: 5\. “Pretend you’re an astronaut on the International Space Station. Describe
    your daily routine.”
  id: totrans-820
  prefs: []
  type: TYPE_NORMAL
  zh: 5. “假装你是一位在国际空间站上的宇航员。描述你的日常作息。”
- en: 6\. “As Shakespeare, how would you go about writing a tragedy?”
  id: totrans-821
  prefs: []
  type: TYPE_NORMAL
  zh: 6. “作为莎士比亚，你会如何着手创作一部悲剧？”
- en: 7\. “If you were a botanist, what plants would you recommend for an indoor herbal
    garden?”
  id: totrans-822
  prefs: []
  type: TYPE_NORMAL
  zh: 7. “如果你是一位植物学家，你会推荐哪些植物用于室内香草花园？”
- en: 8\. “As a historian specializing in Renaissance art, what lesser-known facts
    can you share about the Mona Lisa’s history?”
  id: totrans-823
  prefs: []
  type: TYPE_NORMAL
  zh: 8. “作为一名专注于文艺复兴时期艺术的史学家，你能分享关于蒙娜丽莎历史的哪些鲜为人知的事实？”
- en: 9\. “If you were a cyber security expert, how would you explain the importance
    of secure passwords to a group of high school students?”
  id: totrans-824
  prefs: []
  type: TYPE_NORMAL
  zh: 9. “如果你是一位网络安全专家，你会如何向一群高中生解释安全密码的重要性？”
- en: 10\. “Pretend you’re a marine biologist. How would you describe the process
    of coral bleaching to a documentary film crew?”
  id: totrans-825
  prefs: []
  type: TYPE_NORMAL
  zh: 10. “假装你是一位海洋生物学家。你会如何向纪录片摄制组描述珊瑚白化的过程？”
- en: 11\. “As a children’s book author, what story would you create to teach kids
    about kindness?”
  id: totrans-826
  prefs: []
  type: TYPE_NORMAL
  zh: 11. “作为一名儿童图书作家，你会创作一个怎样的故事来教育孩子们关于善良的道理？”
- en: 12\. “As a world-renowned chef, what unique dish would you design for a global
    cuisine-themed dinner party?”
  id: totrans-827
  prefs: []
  type: TYPE_NORMAL
  zh: 12. “作为一名世界著名的厨师，你会为一场全球美食主题的晚宴设计一道独特的菜肴吗？”
- en: 13\. “If you were a landscape architect, how would you plan a sustainable and
    relaxing backyard space for a busy professional?”
  id: totrans-828
  prefs: []
  type: TYPE_NORMAL
  zh: 13. “如果你是一位景观建筑师，你会如何为一位忙碌的专业人士规划一个可持续且放松的后院空间？”
- en: 14\. “Pretend you’re a professional photographer. How would you capture the
    essence of a bustling city life in a photo series?”
  id: totrans-829
  prefs: []
  type: TYPE_NORMAL
  zh: 14. “假装你是一位专业摄影师。你会如何通过一系列照片捕捉繁忙城市生活的精髓？”
- en: 15\. “As a fashion designer, what tips would you give for creating a versatile
    wardrobe with minimal pieces?”
  id: totrans-830
  prefs: []
  type: TYPE_NORMAL
  zh: 15. “作为一名时尚设计师，你会给出哪些建议来创建一个由少量单品组成的多功能衣橱？”
- en: 16\. “If you were a language tutor, how would you make learning a new language
    engaging for a teenager?”
  id: totrans-831
  prefs: []
  type: TYPE_NORMAL
  zh: 16. “如果你是一位语言导师，你会如何让青少年对学习新语言感兴趣？”
- en: 17\. “As a vintage car restorer, what process would you follow to bring a classic
    1960s car back to its original glory?”
  id: totrans-832
  prefs: []
  type: TYPE_NORMAL
