  id: totrans-765
  prefs: []
  type: TYPE_IMG
  zh: '![image](images/pg104_2.jpg)'
- en: FIGURE 5.23 Box plots summarize the passengers’ ages by gender
  id: totrans-766
  prefs: []
  type: TYPE_NORMAL
  zh: 图5.23 箱线图按性别总结乘客年龄
- en: ChatGPT Answers to the Framed Analytical Questions
  id: totrans-767
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT对框架分析问题的回答
- en: We now use ChatGPT to obtain more detailed answers to the framed questions.
    Remember that the relevant data file has already been loaded into ChatGPT for
    the previous computation. This is a continuation for the analysis, and the results
    of the prompts are included below.
  id: totrans-768
  prefs: []
  type: TYPE_NORMAL
  zh: 我们现在使用ChatGPT来获取对框架问题的更详细答案。记住，相关数据文件已经在前一次计算中加载到ChatGPT中。这是分析的延续，以下包括提示的结果。
- en: 'Prompt: “Were male passengers older or younger, on average, than female passengers?”'
  id: totrans-769
  prefs: []
  type: TYPE_NORMAL
  zh: 提示： “男性乘客的平均年龄是比女性乘客老还是年轻？”
- en: 'Response from ChatGPT:'
  id: totrans-770
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT的回复：
- en: Based on the descriptive statistics summary, male passengers were, on average,
    older than female passengers. The mean age for males was approximately 30.4 years,
    while for females, it was around 27.7 years. This is also reflected in the box
    plot, where the median age (represented by the line in the middle of the box)
    for males is slightly higher than that for females.
  id: totrans-771
  prefs: []
  type: TYPE_NORMAL
  zh: 根据描述性统计总结，男性乘客的平均年龄比女性乘客的平均年龄要大。男性的平均年龄约为30.4岁，而女性的平均年龄约为27.7岁。这也在箱线图中得到反映，其中男性的中位数年龄（由箱体中间的线表示）略高于女性。
- en: 'Prompt: “What are the descriptive statistics for each gender? Compare them.
    Repeat for each class of passenger and compare.”'
  id: totrans-772
  prefs: []
  type: TYPE_NORMAL
  zh: 提示： “每个性别的描述性统计是什么？比较它们。为每个乘客类别重复并比较。”
- en: 'Response from ChatGPT:'
  id: totrans-773
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT的回复：
- en: 'The descriptive statistics for each gender show that [the following is true]:'
  id: totrans-774
  prefs: []
  type: TYPE_NORMAL
  zh: 每个性别的描述性统计显示[以下情况是正确的]：
- en: The average (mean) age of female passengers was about 27.7 years with a standard
    deviation of 13.8 years, indicating variability in the age distribution. The youngest
    female passenger was about 0.75 years old, and the oldest was 63 years. The interquartile
    range (IQR), which is the range between the 25th percentile (18 years) and the
    75th percentile (36 years), suggests that half of the female passengers were between
    18 and 36 years old.
  id: totrans-775
  prefs: []
  type: TYPE_NORMAL
  zh: 女性乘客的平均年龄（均值）约为27.7岁，标准差为13.8岁，表明年龄分布存在变异性。最年轻的女乘客大约0.75岁，最年长的为63岁。四分位距（IQR），即第25百分位数（18岁）和第75百分位数（36岁）之间的范围，表明一半的女乘客年龄在18岁到36岁之间。
- en: For male passengers, the average age was approximately 30.4 years with a standard
    deviation of 14.2 years. The youngest male passenger was about 0.42 years old,
    and the oldest was 80 years. The IQR for males, from the 25th percentile (21 years)
    to the 75th percentile (38 years), indicates that half of the male passengers
    were between 21 and 38 years old.
  id: totrans-776
  prefs: []
  type: TYPE_NORMAL
  zh: 对于男性乘客，平均年龄约为30.4岁，标准差为14.2岁。最年轻的男性乘客大约0.42岁，最年长的为80岁。男性的四分位距（IQR），从第25百分位数（21岁）到第75百分位数（38岁），表明一半的男性乘客年龄在21岁到38岁之间。
- en: Comparing the two, males, on average, were older than females, with a higher
    median and a wider spread of ages as indicated by the standard deviation. The
    box plot visualizes these differences, showing the median and the spread of ages
    (the size of the boxes and the whiskers) for both genders as shown in the table
    in [Figure 5.24](#fig5-24).”
  id: totrans-777
  prefs: []
  type: TYPE_NORMAL
  zh: 比较两者，男性平均年龄比女性大，中位数更高，年龄分布范围更广，这由标准差所指示。箱线图可视化了这些差异，显示了表格中[图5.24](#fig5-24)所示的两个性别的年龄中位数和分布（箱体的大小和须须的长度）。
- en: '![image](images/pg106.jpg)'
  id: totrans-778
  prefs: []
  type: TYPE_IMG
  zh: '![image](images/pg106.jpg)'
- en: FIGURE 5.24 Descriptive statistics summary by passengers’ ages for each gender
  id: totrans-779
  prefs: []
  type: TYPE_NORMAL
  zh: 图5.24 按乘客年龄描述性统计总结，每性别
- en: When comparing for each class, it is evident that first-class passengers were
    older on average compared to the other classes, with a higher median and maximum
    age. Third-class passengers were the youngest group both in terms of average age
    and the age distribution’s spread. The descriptive statistics by class reflect
    the socioeconomic distribution of the time, where wealthier (and typically older)
    individuals could afford first-class tickets, while younger individuals were more
    commonly found in the lower classes.
  id: totrans-780
  prefs: []
  type: TYPE_NORMAL
  zh: 当比较每个类别时，很明显，与其它舱位相比，头等舱乘客的平均年龄更高，中位数和最大年龄也更高。三等舱乘客在平均年龄和年龄分布的跨度方面都是最年轻的群体。按类别进行的描述性统计反映了当时的社会经济分布，其中较富裕（通常是较年长）的个人能够负担得起头等舱票，而较年轻的人更常见于较低阶层。
- en: 'Analysis Case 5.5: Analysis Case Using SFO Airport Survey Data'
  id: totrans-781
  prefs: []
  type: TYPE_NORMAL
  zh: 分析案例 5.5：使用旧金山国际机场调查数据的分析案例
- en: Analysis with Excel
  id: totrans-782
  prefs: []
  type: TYPE_NORMAL
