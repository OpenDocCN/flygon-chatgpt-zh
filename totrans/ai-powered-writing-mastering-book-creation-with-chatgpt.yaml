  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: '**一个有效的提示的解剖**'
- en: '****T**o** ****cr**aft** ****a**n** ****effe**ctiv**e ****pr**omp**t, ****fo**cus**
