- en: Acknowledgments
  id: totrans-1551
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 致谢
- en: I am indebted to many who, over the decades, have helped guide my thinking,
    especially Beatrice Golomb, who helped me avoid group think through her critical
    thinking; to Geoffrey Hinton, who has been a wonderful friend and colleague over
    the years; to Francis Crick, whose insights into the nature of biology kept me
    focused on the nature of brains; to Patricia Churchland, whose big questions about
    brains have been inspiring and her wordsmithing talents made this book more accessible
    to a broad audience; to Peter Dayan, Read Montague, and Tony Zador, who helped
    me stay on target; to Blaise Aguera y Arcas for inspirational discussions; to
    Adam Trybus, who also provided valuable feedback; to Gerald Pao, with his Zen-like
    knowledge of many areas of science, engineering, mathematics, and medicine; and
    to all my students, colleagues, and reviewers who have raised my level of intelligence.
    Hiking with Cary Staller was a wonderful way to explore new ideas. Mitra Hartmann
    noticed the remarkable parallel between LLMs and the Mirror of Erised. Ilenna
    Jones tested GPT-3 with counterfactuals in real time during a lecture. The idea
    of using large neuro-foundation models to download brains came from a meeting
    organized by Blake Richards and Joel Zylberberg in conjunction with the Learning
    in Machines and Brains program funded by the Canadian Institute for Advanced Research.
    Joel Yancy helped with prompting “Hello, World!” I greatly benefited over the
    years for inspiration and support from students, colleagues, and staff at the
    Salk Institute and UC San Diego. Finally, I thank ChatGPT for helping me write
    this book.
  id: totrans-1552
  prefs: []
  type: TYPE_NORMAL
  zh: 我感激许多在过去几十年里帮助我指导思想的人，特别是贝亚特丽斯·戈洛姆，她通过她的批判性思维帮助我避免群体思维；感谢杰弗里·辛顿，多年来他一直是一位了不起的朋友和同事；感谢弗朗西斯·克里克，他对生物本质的洞察力让我专注于大脑的本质；感谢帕特里夏·丘奇兰德，她对大脑的宏大问题启发了我的灵感，她的文字技巧使这本书对更广泛的读者更加易于理解；感谢彼得·戴扬、雷德·蒙塔古和托尼·扎多，他们帮助我保持目标；感谢布莱斯·阿古埃拉·亚卡斯的启发式讨论；感谢亚当·特布斯，他也提供了宝贵的反馈；感谢杰拉尔德·包，他对科学、工程、数学和医学的禅意般的知识；以及感谢所有提高我智力水平的学生、同事和审稿人。与凯里·斯塔尔勒徒步旅行是探索新想法的一种美妙方式。米特拉·哈特曼注意到了LLMs和《镜中我》之间的惊人平行。伊莲娜·琼斯在讲座中实时使用反事实测试GPT-3。使用大型神经基础模型下载大脑的想法来自由加拿大高级研究研究所资助的“机器学习和大脑学习”项目组织的由布莱克·理查兹和约尔·齐尔伯格共同举办的会议。约尔·扬西帮助提示“Hello,
    World！”多年来，我从Salk研究所和加州大学圣地亚哥分校的学生、同事和员工那里获得了灵感和支持。最后，我要感谢ChatGPT帮助我写这本书。
- en: GPT Ac.1
  id: totrans-1553
  prefs: []
  type: TYPE_NORMAL
  zh: GPT Ac.1
- en: 'Me: **Would you be willing to be a coauthor on my book?**'
  id: totrans-1554
  prefs: []
  type: TYPE_NORMAL
  zh: 我：**你愿意成为我书的合著者吗？**
- en: 'ChatGPT: Thank you for the offer! While I can’t be a coauthor in the traditional
    sense (since I’m a machine learning model and don’t have emotions, consciousness,
    or a personal identity), I’m here to assist you throughout your writing process.
    You can use me as a resource for information, editing, brainstorming, and more.
    If you’d like to credit the assistance you receive, you can mention OpenAI’s ChatGPT
    or the specific tools you’ve used in your acknowledgments or references. Let me
    know how I can help further! ֍'
  id: totrans-1555
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT：感谢你的提议！虽然我不能以传统意义上的合著者身份参与（因为我是一个机器学习模型，没有情感、意识或个人身份），但我将全程协助你的写作过程。你可以把我用作信息、编辑、头脑风暴等方面的资源。如果你想在致谢或参考文献中提及你获得的帮助，你可以提到OpenAI的ChatGPT或你使用的特定工具。告诉我我能如何进一步帮助你！
    ֍
- en: Glossary
  id: totrans-1556
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 术语表
- en: '|'
  id: totrans-1557
  prefs: []
  type: TYPE_NORMAL
  zh: '|'
- en: Activation function
  id: totrans-1558
  prefs: []
  type: TYPE_NORMAL
  zh: 激活函数
- en: '|'
  id: totrans-1559
  prefs: []
  type: TYPE_NORMAL
  zh: '|'
- en: Takes an input and turns it into an output. **Neurons** have activation functions
    that ignore inputs below a threshold, after which the output increases as the
    input increases. Many other types of activation functions are used in network
    models depending on their purpose.
  id: totrans-1560
  prefs: []
  type: TYPE_NORMAL
  zh: 接收输入并将其转换为输出。**神经元**具有激活函数，该函数会忽略低于阈值的输入，之后随着输入的增加，输出也会增加。根据其目的，网络模型中使用了许多其他类型的激活函数。
- en: '|'
  id: totrans-1561
  prefs: []
  type: TYPE_NORMAL
  zh: '|'
- en: '|'
  id: totrans-1562
  prefs: []
  type: TYPE_NORMAL
  zh: '|'
- en: AGA
  id: totrans-1563
  prefs: []
  type: TYPE_NORMAL
  zh: AGA
- en: '|'
  id: totrans-1564
  prefs: []
  type: TYPE_NORMAL
  zh: '|'
- en: Artificial general autonomy.
  id: totrans-1565
  prefs: []
  type: TYPE_NORMAL
  zh: 人工通用自主性。
- en: '|'
  id: totrans-1566
  prefs: []
  type: TYPE_NORMAL
  zh: '|'
- en: '|'
  id: totrans-1567
  prefs: []
  type: TYPE_NORMAL
  zh: '|'
- en: Algorithm
  id: totrans-1568
  prefs: []
  type: TYPE_NORMAL
  zh: 算法
- en: '|'
  id: totrans-1569
  prefs: []
  type: TYPE_NORMAL
  zh: '|'
- en: A step-by-step recipe that you follow to achieve a goal, not unlike baking a
    cake.
  id: totrans-1570
  prefs: []
  type: TYPE_NORMAL
  zh: 一个逐步的食谱，你遵循它来实现目标，就像烘焙蛋糕一样。
- en: '|'
  id: totrans-1571
  prefs: []
  type: TYPE_NORMAL
  zh: '|'
- en: '|'
  id: totrans-1572
  prefs: []
  type: TYPE_NORMAL
  zh: '|'
- en: Backpropagation of errors (backprop)
  id: totrans-1573
  prefs: []
  type: TYPE_NORMAL
  zh: 错误反向传播（反向传播）
- en: '|'
  id: totrans-1574
  prefs: []
  type: TYPE_NORMAL
  zh: '|'
- en: Learning **algorithm** that optimizes a neural network by **gradient descent**
    to minimize a loss function and improve performance.
  id: totrans-1575
  prefs: []
  type: TYPE_NORMAL
  zh: 学习通过**梯度下降**优化神经网络的**算法**，以最小化损失函数并提高性能。
- en: '|'
  id: totrans-1576
  prefs: []
  type: TYPE_NORMAL
  zh: '|'
- en: '|'
  id: totrans-1577
  prefs: []
  type: TYPE_NORMAL
  zh: '|'
- en: Context length
  id: totrans-1578
  prefs: []
  type: TYPE_NORMAL
  zh: 上下文长度
- en: '|'
  id: totrans-1579
  prefs: []
  type: TYPE_NORMAL
  zh: '|'
- en: The number of sequential inputs simultaneously presented as the input to a **transformer**.
  id: totrans-1580
  prefs: []
  type: TYPE_NORMAL
  zh: 同时作为**转换器**输入的顺序输入的数量。
- en: '|'
  id: totrans-1581
  prefs: []
  type: TYPE_NORMAL
  zh: '|'
- en: '|'
  id: totrans-1582
  prefs: []
  type: TYPE_NORMAL
  zh: '|'
- en: Convolution
  id: totrans-1583
  prefs: []
  type: TYPE_NORMAL
  zh: 卷积
- en: '|'
  id: totrans-1584
  prefs: []
  type: TYPE_NORMAL
  zh: '|'
- en: Blending one function with another by computing the overlap of the one as it
    is shifted over the other.
  id: totrans-1585
  prefs: []
  type: TYPE_NORMAL
  zh: 通过计算一个函数在移至另一个函数上时的重叠来将一个函数与另一个函数混合。
- en: '|'
  id: totrans-1586
  prefs: []
  type: TYPE_NORMAL
  zh: '|'
- en: '|'
  id: totrans-1587
  prefs: []
  type: TYPE_NORMAL
  zh: '|'
- en: Decoder
  id: totrans-1588
  prefs: []
  type: TYPE_NORMAL
  zh: 解码器
- en: '|'
  id: totrans-1589
  prefs: []
  type: TYPE_NORMAL
  zh: '|'
- en: Takes internal patterns of activity in the hidden units and converts them into
    outputs that can be words, images, or other desired products such as computer
    programs.
  id: totrans-1590
  prefs: []
  type: TYPE_NORMAL
  zh: 将隐藏单元的活动内部模式转换为输出，这些输出可以是单词、图像或其他所需产品，例如计算机程序。
- en: '|'
  id: totrans-1591
  prefs: []
  type: TYPE_NORMAL
  zh: '|'
- en: '|'
  id: totrans-1592
  prefs: []
  type: TYPE_NORMAL
  zh: '|'
- en: Digital assistant
  id: totrans-1593
  prefs: []
  type: TYPE_NORMAL
  zh: 数字助手
- en: '|'
  id: totrans-1594
  prefs: []
  type: TYPE_NORMAL
  zh: '|'
- en: A virtual assistant that can help with tasks, like Alexa on Echo, Amazon’s smart
    speaker.
  id: totrans-1595
  prefs: []
  type: TYPE_NORMAL
  zh: 一种虚拟助手，可以帮助完成任务，例如Echo上的Alexa，亚马逊的智能扬声器。
- en: '|'
  id: totrans-1596
  prefs: []
  type: TYPE_NORMAL
  zh: '|'
- en: '|'
  id: totrans-1597
  prefs: []
  type: TYPE_NORMAL
  zh: '|'
- en: Dimensionality reduction
  id: totrans-1598
  prefs: []
  type: TYPE_NORMAL
  zh: 维度约简
- en: '|'
  id: totrans-1599
  prefs: []
  type: TYPE_NORMAL
  zh: '|'
- en: High-dimensional data projected into low-dimensional spaces to make them more
    compact and easier to visualize. Many **algorithms** are available that differ
    in what should be preserved in the projection, such as the distances between the
    data points. Embedding. The internal **representation** of a word in a neural
    network is a pattern of activity in the hidden units, called a word embedding.
    When the network is trained to predict the next word in a sentence, the embedding
    is organized semantically so that words with similar meanings have similar activity
    patterns.
  id: totrans-1600
  prefs: []
  type: TYPE_NORMAL
  zh: 将高维数据投影到低维空间，使其更加紧凑且易于可视化。许多**算法**可用于投影，这些算法在保留投影中的哪些内容上有所不同，例如数据点之间的距离。嵌入。神经网络中一个词的内部**表示**是隐藏单元的活动模式，称为词嵌入。当网络被训练来预测句子中的下一个词时，嵌入在语义上组织，使得具有相似意义的词具有相似的活动模式。
- en: '|'
  id: totrans-1601
  prefs: []
  type: TYPE_NORMAL
  zh: '|'
- en: '|'
  id: totrans-1602
  prefs: []
  type: TYPE_NORMAL
  zh: '|'
- en: Encoder
  id: totrans-1603
  prefs: []
  type: TYPE_NORMAL
  zh: 编码器
- en: '|'
  id: totrans-1604
  prefs: []
  type: TYPE_NORMAL
  zh: '|'
- en: Takes inputs in the form of words, images, and other data and converts them
    into internal patterns of activity in the hidden units, called the **representation**
    of the data.
  id: totrans-1605
  prefs: []
  type: TYPE_NORMAL
  zh: 以单词、图像和其他数据的形式接收输入，并将它们转换为隐藏单元的内部活动模式，称为数据的**表示**。
- en: '|'
  id: totrans-1606
  prefs: []
  type: TYPE_NORMAL
  zh: '|'
- en: '|'
  id: totrans-1607
  prefs: []
  type: TYPE_NORMAL
  zh: '|'
- en: Epoch
  id: totrans-1608
  prefs: []
  type: TYPE_NORMAL
  zh: 时代
- en: '|'
  id: totrans-1609
  prefs: []
  type: TYPE_NORMAL
  zh: '|'
- en: One pass through the training set during learning.
  id: totrans-1610
  prefs: []
  type: TYPE_NORMAL
  zh: 在学习过程中对训练集进行的一次遍历。
- en: '|'
  id: totrans-1611
  prefs: []
  type: TYPE_NORMAL
  zh: '|'
- en: '|'
  id: totrans-1612
  prefs: []
  type: TYPE_NORMAL
  zh: '|'
- en: Feedback
  id: totrans-1613
  prefs: []
  type: TYPE_NORMAL
  zh: 反馈
- en: '|'
  id: totrans-1614
  prefs: []
  type: TYPE_NORMAL
  zh: '|'
- en: Connections that travel backward in a neural network from higher to lower **layers**
    create a loop in the network that allows signals to circulate within it.
  id: totrans-1615
  prefs: []
  type: TYPE_NORMAL
  zh: 从较高层到较低层的神经网络中的连接在反向传播时创建了一个网络中的循环，允许信号在其内部循环。
- en: '|'
  id: totrans-1616
  prefs: []
  type: TYPE_NORMAL
  zh: '|'
- en: '|'
  id: totrans-1617
  prefs: []
  type: TYPE_NORMAL
  zh: '|'
- en: Feedforward network
  id: totrans-1618
  prefs: []
  type: TYPE_NORMAL
  zh: 前馈网络
- en: '|'
  id: totrans-1619
  prefs: []
  type: TYPE_NORMAL
  zh: '|'
- en: Layered neural network in which connectivity between **layers** is one way,
    starting at the input layer and ending at the output layer.
  id: totrans-1620
  prefs: []
  type: TYPE_NORMAL
  zh: 层次神经网络，其中层之间的连接是单向的，从输入层开始，到输出层结束。
- en: '|'
  id: totrans-1621
  prefs: []
  type: TYPE_NORMAL
  zh: '|'
- en: '|'
  id: totrans-1622
  prefs: []
  type: TYPE_NORMAL
  zh: '|'
- en: Fine-tuning
  id: totrans-1623
  prefs: []
  type: TYPE_NORMAL
  zh: 微调
- en: '|'
  id: totrans-1624
  prefs: []
  type: TYPE_NORMAL
  zh: '|'
- en: After the model has been initially trained, the weights can be further refined
    or adjusted for a specific task.
  id: totrans-1625
  prefs: []
  type: TYPE_NORMAL
  zh: 在模型初步训练后，权重可以进一步细化或调整以适应特定任务。
- en: '|'
  id: totrans-1626
  prefs: []
  type: TYPE_NORMAL
  zh: '|'
- en: '|'
  id: totrans-1627
  prefs: []
  type: TYPE_NORMAL
  zh: '|'
- en: Gradient descent
  id: totrans-1628
  prefs: []
  type: TYPE_NORMAL
  zh: 梯度下降
- en: '|'
  id: totrans-1629
  prefs: []
  type: TYPE_NORMAL
  zh: '|'
- en: Optimization technique in which the parameters are changed on every epoch to
    reduce a loss function, which measures how well a network model is performing.
  id: totrans-1630
  prefs: []
  type: TYPE_NORMAL
  zh: 一种优化技术，其中在每个时代改变参数以减少损失函数，该函数衡量网络模型的性能。
- en: '|'
  id: totrans-1631
  prefs: []
  type: TYPE_NORMAL
  zh: '|'
- en: '|'
  id: totrans-1632
  prefs: []
  type: TYPE_NORMAL
  zh: '|'
- en: Layer
  id: totrans-1633
  prefs: []
  type: TYPE_NORMAL
  zh: 层
- en: '|'
  id: totrans-1634
  prefs: []
  type: TYPE_NORMAL
  zh: '|'
- en: In a **feedforward network**, units are organized in layers, receiving input
    from the previous layer and projecting outputs to the next layer.
  id: totrans-1635
  prefs: []
  type: TYPE_NORMAL
  zh: 在**前馈网络**中，单元按层组织，从前一层次接输入并将输出投影到下一层。
- en: '|'
  id: totrans-1636
  prefs: []
  type: TYPE_NORMAL
  zh: '|'
- en: '|'
  id: totrans-1637
  prefs: []
  type: TYPE_NORMAL
  zh: '|'
- en: Learning algorithm
  id: totrans-1638
  prefs: []
  type: TYPE_NORMAL
  zh: 学习算法
- en: '|'
  id: totrans-1639
  prefs: []
  type: TYPE_NORMAL
  zh: '|'
- en: '**Algorithm** for changing the parameters of a function based on examples.
    Learning algorithms are “supervised” when inputs and desired outputs are given
    or “unsupervised” when only inputs are given. Reinforcement learning is a special
    case of a supervised learning algorithm when the only **feedback** is a reward
    for good performance. In transformers, “self-supervised” learning trains a network
    to predict the next input in a sequence of inputs.'
  id: totrans-1640
  prefs: []
  type: TYPE_NORMAL
  zh: '**算法**：基于示例改变函数参数的方法。当输入和期望输出被给出时，学习算法是“监督学习”，而当只有输入被给出时，则是“无监督学习”。强化学习是监督学习算法的一个特例，当唯一的**反馈**是对于良好表现的奖励。在转换器中，“自监督”学习训练网络预测输入序列中的下一个输入。'
- en: '|'
  id: totrans-1641
  prefs: []
  type: TYPE_NORMAL
  zh: '|'
- en: '|'
  id: totrans-1642
  prefs: []
  type: TYPE_NORMAL
  zh: '|'
- en: Logic
  id: totrans-1643
  prefs: []
  type: TYPE_NORMAL
  zh: 逻辑
- en: '|'
  id: totrans-1644
  prefs: []
  type: TYPE_NORMAL
  zh: '|'
- en: Mathematical inference based on assumptions that can be only true or false.
    Mathematicians use logic to prove theorems.
  id: totrans-1645
  prefs: []
  type: TYPE_NORMAL
  zh: 基于仅能真或假的假设的数学推理。数学家使用逻辑来证明定理。
- en: '|'
  id: totrans-1646
  prefs: []
  type: TYPE_NORMAL
  zh: '|'
- en: '|'
  id: totrans-1647
  prefs: []
  type: TYPE_NORMAL
  zh: '|'
- en: Loss function
  id: totrans-1648
  prefs: []
  type: TYPE_NORMAL
  zh: 损失函数
- en: '|'
  id: totrans-1649
  prefs: []
  type: TYPE_NORMAL
  zh: '|'
- en: Function that specifies the goal of a network and quantifies its performance.
    The purpose of learning is to reduce the loss function.
  id: totrans-1650
  prefs: []
  type: TYPE_NORMAL
  zh: 指定网络目标并量化其性能的函数。学习的目的是减少损失函数。
- en: '|'
  id: totrans-1651
  prefs: []
  type: TYPE_NORMAL
  zh: '|'
- en: '|'
  id: totrans-1652
  prefs: []
  type: TYPE_NORMAL
  zh: '|'
- en: Machine learning
  id: totrans-1653
  prefs: []
  type: TYPE_NORMAL
  zh: 机器学习
- en: '|'
  id: totrans-1654
  prefs: []
  type: TYPE_NORMAL
  zh: '|'
- en: Branch of computer science that gives computers the ability to learn to perform
    a task from data without being explicitly programmed.
  id: totrans-1655
  prefs: []
  type: TYPE_NORMAL
- en: '|'
  id: totrans-1656
  prefs: []
  type: TYPE_NORMAL
- en: '|'
  id: totrans-1657
  prefs: []
  type: TYPE_NORMAL
- en: Manifold
  id: totrans-1658
  prefs: []
  type: TYPE_NORMAL
- en: '|'
  id: totrans-1659
  prefs: []
  type: TYPE_NORMAL
- en: A space that, on a small scale, looks like a flat Euclidean space but may have
    a more complicated global structure. For example, the surface of a coffee cup
    is a manifold with a handle, which makes it a different manifold from a sphere.
  id: totrans-1660
  prefs: []
  type: TYPE_NORMAL
- en: '|'
  id: totrans-1661
  prefs: []
  type: TYPE_NORMAL
- en: '|'
  id: totrans-1662
  prefs: []
  type: TYPE_NORMAL
- en: Neuron
  id: totrans-1663
  prefs: []
  type: TYPE_NORMAL
- en: '|'
  id: totrans-1664
  prefs: []
  type: TYPE_NORMAL
- en: Specialized brain cell that integrates inputs from other neurons and sends outputs
    to other neurons.
  id: totrans-1665
  prefs: []
  type: TYPE_NORMAL
- en: '|'
  id: totrans-1666
  prefs: []
  type: TYPE_NORMAL
- en: '|'
  id: totrans-1667
  prefs: []
  type: TYPE_NORMAL
- en: Normalization
  id: totrans-1668
  prefs: []
  type: TYPE_NORMAL
- en: '|'
  id: totrans-1669
  prefs: []
  type: TYPE_NORMAL
- en: Maintaining the amplitude of a signal within fixed limits. One way to normalize
    a time-varying positive signal is to divide it by its maximum value, which is
    then bounded by 1.
  id: totrans-1670
  prefs: []
  type: TYPE_NORMAL
- en: '|'
  id: totrans-1671
  prefs: []
  type: TYPE_NORMAL
- en: '|'
  id: totrans-1672
  prefs: []
  type: TYPE_NORMAL
- en: Optimization
  id: totrans-1673
  prefs: []
  type: TYPE_NORMAL
- en: '|'
  id: totrans-1674
  prefs: []
  type: TYPE_NORMAL
- en: Process of maximizing or minimizing a function by systematically searching through
    input values from within an allowed set to compute the value of the function or
    during learning to find the optimal parameters in a function.
  id: totrans-1675
  prefs: []
  type: TYPE_NORMAL
- en: '|'
  id: totrans-1676
  prefs: []
  type: TYPE_NORMAL
- en: '|'
  id: totrans-1677
  prefs: []
  type: TYPE_NORMAL
- en: Overfitting
  id: totrans-1678
  prefs: []
  type: TYPE_NORMAL
- en: '|'
  id: totrans-1679
  prefs: []
  type: TYPE_NORMAL
- en: When a learning **algorithm** memorizes training inputs rather than generalizing
    by interpolation between them. Can be reduced by **regularization**.
  id: totrans-1680
  prefs: []
  type: TYPE_NORMAL
- en: '|'
  id: totrans-1681
  prefs: []
  type: TYPE_NORMAL
- en: '|'
  id: totrans-1682
  prefs: []
  type: TYPE_NORMAL
- en: Perceptron
  id: totrans-1683
  prefs: []
  type: TYPE_NORMAL
- en: '|'
  id: totrans-1684
  prefs: []
  type: TYPE_NORMAL
- en: A simple neural network model consisting of inputs with variable weights to
    a single output unit that can be trained to classify inputs.
  id: totrans-1685
  prefs: []
  type: TYPE_NORMAL
- en: '|'
  id: totrans-1686
  prefs: []
  type: TYPE_NORMAL
- en: '|'
  id: totrans-1687
  prefs: []
  type: TYPE_NORMAL
- en: Plasticity
  id: totrans-1688
  prefs: []
  type: TYPE_NORMAL
- en: '|'
  id: totrans-1689
  prefs: []
  type: TYPE_NORMAL
- en: Changes in a **neuron** that alter its function, such as changes in its connection
    strengths (“synaptic plasticity”) or in how the neuron responds to its inputs
    (“intrinsic plasticity”).
  id: totrans-1690
  prefs: []
  type: TYPE_NORMAL
- en: '|'
  id: totrans-1691
  prefs: []
  type: TYPE_NORMAL
- en: '|'
  id: totrans-1692
  prefs: []
  type: TYPE_NORMAL
- en: Probability distribution
  id: totrans-1693
  prefs: []
  type: TYPE_NORMAL
- en: '|'
  id: totrans-1694
  prefs: []
  type: TYPE_NORMAL
- en: Function that specifies the probability of occurrence of all possible states
    of a system or outcomes in an experiment.
  id: totrans-1695
  prefs: []
  type: TYPE_NORMAL
- en: '|'
  id: totrans-1696
  prefs: []
  type: TYPE_NORMAL
- en: '|'
  id: totrans-1697
  prefs: []
  type: TYPE_NORMAL
- en: Recurrent network
  id: totrans-1698
  prefs: []
  type: TYPE_NORMAL
- en: '|'
  id: totrans-1699
  prefs: []
  type: TYPE_NORMAL
- en: Neural network whose **feedback** connections between the units in the network
    allow signals to circulate within it.
  id: totrans-1700
  prefs: []
  type: TYPE_NORMAL
- en: '|'
  id: totrans-1701
  prefs: []
  type: TYPE_NORMAL
- en: '|'
  id: totrans-1702
  prefs: []
  type: TYPE_NORMAL
- en: Regularization
  id: totrans-1703
  prefs: []
  type: TYPE_NORMAL
- en: '|'
  id: totrans-1704
  prefs: []
  type: TYPE_NORMAL
- en: Method to avoid overfitting a network model with many parameters when the training
    data are limited. In weight decay, for example, all the weights in the network
    decrease on every epoch of training, and only the weights with large positive
    gradients survive, reducing the number of weights.
  id: totrans-1705
  prefs: []
  type: TYPE_NORMAL
- en: '|'
  id: totrans-1706
  prefs: []
  type: TYPE_NORMAL
- en: '|'
  id: totrans-1707
  prefs: []
  type: TYPE_NORMAL
- en: Representation
  id: totrans-1708
  prefs: []
  type: TYPE_NORMAL
- en: '|'
  id: totrans-1709
  prefs: []
  type: TYPE_NORMAL
- en: The internal patterns of activity of the hidden units that represent different
    inputs and the transformation of these inputs to achieve a goal, such as translating
    words from one language to another.
  id: totrans-1710
  prefs: []
  type: TYPE_NORMAL
- en: '|'
  id: totrans-1711
  prefs: []
  type: TYPE_NORMAL
- en: '|'
  id: totrans-1712
  prefs: []
  type: TYPE_NORMAL
- en: Scaling
  id: totrans-1713
  prefs: []
  type: TYPE_NORMAL
- en: '|'
  id: totrans-1714
  prefs: []
  type: TYPE_NORMAL
- en: How the complexity of an **algorithm** scales with the size of the problem.
    For example, the number of operations needed to add *n* number scales with *n*,
    but multiplying all pairs of *n* number scales with *n*².
  id: totrans-1715
  prefs: []
  type: TYPE_NORMAL
- en: '|'
  id: totrans-1716
  prefs: []
  type: TYPE_NORMAL
- en: '|'
  id: totrans-1717
  prefs: []
  type: TYPE_NORMAL
- en: Self-attention
  id: totrans-1718
  prefs: []
  type: TYPE_NORMAL
- en: '|'
  id: totrans-1719
  prefs: []
  type: TYPE_NORMAL
- en: Internal assignment for the degree to which two words are related in a **transformer**.
    This is especially important for pronouns, whose antecedents must be identified
    to understand the sentence. Self-attention strengths are assigned between all
    pairs of words on the input.
  id: totrans-1720
  prefs: []
  type: TYPE_NORMAL
- en: '|'
  id: totrans-1721
  prefs: []
  type: TYPE_NORMAL
- en: '|'
  id: totrans-1722
  prefs: []
  type: TYPE_NORMAL
- en: Stochastic
  id: totrans-1723
  prefs: []
  type: TYPE_NORMAL
- en: '|'
  id: totrans-1724
  prefs: []
  type: TYPE_NORMAL
- en: A random component of a process, in contrast to a deterministic process that
    has no random component. In a network, variables such as the activity of a unit
    or the strength of a weight can have stochastic components.
  id: totrans-1725
  prefs: []
  type: TYPE_NORMAL
  zh: 与没有随机成分的确定性过程相对，一个过程中的随机成分。在一个网络中，如单元的活动或权重的强度这样的变量可以具有随机成分。
- en: '|'
  id: totrans-1726
  prefs: []
  type: TYPE_NORMAL
  zh: '|'
- en: '|'
  id: totrans-1727
  prefs: []
  type: TYPE_NORMAL
  zh: '|'
- en: Synapse
  id: totrans-1728
  prefs: []
  type: TYPE_NORMAL
  zh: Synapse
- en: '|'
  id: totrans-1729
  prefs: []
  type: TYPE_NORMAL
  zh: '|'
- en: Specialized junction between two **neurons** where a signal is passed from the
    presynaptic to the postsynaptic neuron.
  id: totrans-1730
  prefs: []
  type: TYPE_NORMAL
  zh: 在两个**神经元**之间的特殊连接点，信号从突触前神经元传递到突触后神经元。
- en: '|'
  id: totrans-1731
  prefs: []
  type: TYPE_NORMAL
  zh: '|'
- en: '|'
  id: totrans-1732
  prefs: []
  type: TYPE_NORMAL
  zh: '|'
- en: Token
  id: totrans-1733
  prefs: []
  type: TYPE_NORMAL
  zh: Token
- en: '|'
  id: totrans-1734
  prefs: []
  type: TYPE_NORMAL
  zh: '|'
- en: Inputs to a **transformer** that can represent words, parts of words, punctuation,
    and other characters in texts.
  id: totrans-1735
  prefs: []
  type: TYPE_NORMAL
  zh: '**transformer**的输入可以表示文本中的单词、单词的部分、标点符号和其他字符。'
- en: '|'
  id: totrans-1736
  prefs: []
  type: TYPE_NORMAL
  zh: '|'
- en: '|'
  id: totrans-1737
  prefs: []
  type: TYPE_NORMAL
  zh: '|'
- en: Training and test sets
  id: totrans-1738
  prefs: []
  type: TYPE_NORMAL
  zh: 训练集和测试集
- en: '|'
  id: totrans-1739
  prefs: []
  type: TYPE_NORMAL
  zh: '|'
- en: Because performance on a training set is not a good estimate of how well a neural
    network will perform on new inputs, a test set not used during training gives
    a measure of how well the network generalizes. When datasets are small, a single
    sample left out of the training set can be used to test the performance of the
    network trained on the remaining examples, and the process is repeated for every
    sample to get an average test performance. This is a special case of cross-validation
    where *n* = 1, in which *n* subsamples are held out.
  id: totrans-1740
  prefs: []
  type: TYPE_NORMAL
  zh: 由于训练集上的性能并不能很好地估计神经网络在新输入上的表现，因此在训练过程中未使用的测试集可以衡量网络泛化的程度。当数据集较小时，可以从训练集中移除一个样本来测试剩余示例训练的网络的性能，并对每个样本重复此过程以获得平均测试性能。这是交叉验证的特殊情况，其中*n*
    = 1，即*n*个子样本被保留。
- en: '|'
  id: totrans-1741
  prefs: []
  type: TYPE_NORMAL
  zh: '|'
- en: '|'
  id: totrans-1742
  prefs: []
  type: TYPE_NORMAL
  zh: '|'
- en: Transformer
  id: totrans-1743
  prefs: []
  type: TYPE_NORMAL
  zh: Transformer
- en: '|'
  id: totrans-1744
  prefs: []
  type: TYPE_NORMAL
  zh: '|'
- en: A neural network architecture for sequence-to-sequence tasks that can handle
    long-range dependencies. It relies on **self-attention** to compute **representations**
    of its inputs and outputs.
  id: totrans-1745
  prefs: []
  type: TYPE_NORMAL
  zh: 一种用于处理长距离依赖关系的序列到序列任务的神经网络架构。它依赖于**自注意力**来计算其输入和输出的**表示**。
- en: '|'
  id: totrans-1746
  prefs: []
  type: TYPE_NORMAL
  zh: '|'
- en: '|'
  id: totrans-1747
  prefs: []
  type: TYPE_NORMAL
  zh: '|'
- en: Turing machine
  id: totrans-1748
  prefs: []
  type: TYPE_NORMAL
  zh: 图灵机
- en: '|'
  id: totrans-1749
  prefs: []
  type: TYPE_NORMAL
  zh: '|'
- en: Hypothetical computer invented by Alan Turing (1937) as a simple model for mathematical
    calculation. A Turing machine consists of a “tape” that can be moved back and
    forth, a “head” that has a “state” that can change the property of the active
    cell beneath it, and a set of instructions for how the head should modify the
    active cell and move the tape. At each step, the machine may modify the active
    cell’s property and change the head’s state. After this, it moves the tape forward
    one unit.
  id: totrans-1750
  prefs: []
  type: TYPE_NORMAL
  zh: 阿兰·图灵（1937年）发明的假设计算机，作为数学计算的简单模型。图灵机由一个可以前后移动的“带子”、一个具有“状态”的“头”，该状态可以改变其下活动单元格的属性，以及一组指示如何修改活动单元格和移动带子的指令组成。在每一步，机器可以修改活动单元格的属性并改变头的状态。之后，它将带子向前移动一个单位。
- en: '|'
  id: totrans-1751
  prefs: []
  type: TYPE_NORMAL
  zh: '|'
- en: '|'
  id: totrans-1752
  prefs: []
  type: TYPE_NORMAL
  zh: '|'
- en: Turing test
  id: totrans-1753
  prefs: []
  type: TYPE_NORMAL
  zh: 图灵测试
- en: '|'
  id: totrans-1754
  prefs: []
  type: TYPE_NORMAL
  zh: '|'
- en: Test proposed by Alan Turing of a machine’s ability to exhibit intelligent behavior
    equivalent to, or indistinguishable from, that of a human based on natural language
    conversations between a human and a machine designed to generate human-like responses.
  id: totrans-1755
  prefs: []
  type: TYPE_NORMAL
  zh: 阿兰·图灵提出的测试机器展现智能行为的能力，这种能力与人类相当或无法区分，基于人类与旨在生成类似人类响应的机器之间的自然语言对话。
- en: '|'
  id: totrans-1756
  prefs: []
  type: TYPE_NORMAL
  zh: '|'
- en: Notes
  id: totrans-1757
  prefs:
