  id: totrans-962
  prefs: []
  type: TYPE_NORMAL
  zh: '○ ****共识构建**** : "****我们可以将AI整合到医疗保健中作为辅助工具，确保所有最终决策都由人类专业人士做出。数据必须通过严格的隐私标准得到保护，并且患者必须被告知他们的信息是如何被使用的。通过这种方式，技术支持医生和患者，维护信任和安全。"'
