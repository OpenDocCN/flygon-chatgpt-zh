- en: Data Handling
  id: totrans-732
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 数据处理
- en: Data is the lifeblood of modern applications that’s why I have written a separate
    book on Data Science. From SQL queries to data transformations, you’ll learn to
    handle data with precision and confidence. This chapter equips you with prompts
    for managing, analyzing, and optimizing data. However, if you want to master Data
    Science then I recommend checking the book [ChatGPT Prompts for Data Science](https://amzn.to/3ZvD8NO).
  id: totrans-733
  prefs: []
  type: TYPE_NORMAL
  zh: 数据是现代应用程序的生命线，这就是我为什么写了一本关于数据科学的单独书籍。从 SQL 查询到数据转换，你将学会精确和自信地处理数据。本章为你提供了管理、分析和优化数据的提示。然而，如果你想掌握数据科学，我建议检查书籍
    [ChatGPT Prompts for Data Science](https://amzn.to/3ZvD8NO)。
- en: '1: Understanding Data Formats'
