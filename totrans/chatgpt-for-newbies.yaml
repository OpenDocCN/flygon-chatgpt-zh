  type: TYPE_NORMAL
  zh: 预计的营销活动及其预期的回报率。
- en: Average customer lifetime value and retention rates.
  id: totrans-878
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 平均客户终身价值和保留率。
- en: '| • | Key Assumptions: |'
  id: totrans-879
  prefs: []
  type: TYPE_TB
  zh: '| • | 关键假设：'
- en: Marketing campaigns will increase lead generation by 15% over the next 6 months.
  id: totrans-880
  prefs:
