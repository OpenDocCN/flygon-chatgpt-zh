- en: '1'
  id: totrans-165
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '1'
- en: '500 words: About me and how I came to write: How to improve your Flash Fiction
    with AI tools.'
  id: totrans-166
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 500字：关于我以及我是如何开始写作的：如何使用AI工具提高你的闪小说。
- en: 'Hello, my name is Sally Dickson, and I write under the pen name Sally Ann Melia.
    I have published two Science Fantasy series: Dodecahedral, a Science Fiction Thriller
    set on future Earth, and Aliens In, a cozy SF mystery series imaging First Contact
    in today’s world. That’s over 1,000,000 words published and over 25,000 books
    and eBooks ordered through Amazon.'
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 你好，我叫萨莉·迪克森，我以萨莉·安·梅利亚的笔名写作。我已经出版了两个科幻系列：多面体，一部设定在未来地球的科幻惊悚小说，以及《异界来客》，一部温馨的科幻神秘系列，想象了在当今世界的首次接触。这已经超过100万字的出版，以及通过亚马逊订购的超过25,000本书和电子书。
- en: But that’s not all…
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 但这还不是全部…
- en: As Sally Dickson, I am an elected town councillor for Farnham. Located just
    40 minutes south-west of London, this Regency town is said to have been visited
    by Jane Austin, who, towards the end of her life, lived near Chorley House, Petersfield,
    just a short drive away.
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 作为萨莉·迪克森，我是法恩汉姆镇选出的镇议员。位于伦敦西南40分钟处，这个摄政时期的城镇据说曾被简·奥斯汀访问过，她在生命的最后几年里，住在离这里仅短途车程的彼得菲尔德的科尔利府附近。
- en: Since 2017, I have organised events for the Farnham Flash Festival, Farnham
    Fringe and Farnham Literary Festival, specifically writer’s panels, workshops
    and, of course, the Farnham Flash Fiction competition. As an organizer and early-stage
    reader, I have read all the entries—some 1,000 entries—over seven years.
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 自2017年以来，我一直在组织法恩汉姆闪亮节、法恩汉姆边缘节和法恩汉姆文学节的活动，特别是作家座谈会、研讨会，当然还有法恩汉姆闪小说比赛。作为一名组织者和早期读者，我在七年的时间里阅读了所有参赛作品——大约1000篇参赛作品。
- en: I started the competition in part because I was curious to know, ‘when it comes
    to writing short fiction, how good is the competition?’ I now realise most flash
    fiction writers are exceptionally skilled. From my experience, what makes a winning
    entry can sometimes feel like fairy dust and most jump out at the very first read-through.
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 我开始这个比赛部分原因是因为我对“在写短篇小说时，比赛的竞争水平如何？”感到好奇。我现在意识到，大多数闪小说作家都非常有技巧。根据我的经验，获奖作品有时感觉像童话中的魔法粉末，大多数作品在第一次阅读时就能脱颖而出。
- en: Last year, I wrote How to write Flash Fiction to win Competitions to set out
    everything I knew about that topic.
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 去年，我写了《如何写闪小说以赢得比赛》来阐述我对这个主题的所有了解。
- en: However, since then, the writing world has witnessed a new dawn with the newly
    available large language model artificial intelligences, the most famous of which
    is called Chat GPT.
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，从那时起，写作界见证了新的黎明，随着新可用的强大语言模型人工智能的出现，其中最著名的是被称为 Chat GPT 的模型。
- en: In its own words,
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 用它自己的话说，
- en: ChatGPT is an AI model trained on diverse texts, designed to understand and
    generate human-like responses. It processes input text to offer relevant, coherent
    replies, aiding in tasks like writing assistance, information retrieval, and conversational
    engagement.
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT 是一个在多种文本上训练的 AI 模型，旨在理解和生成类似人类的响应。它处理输入文本以提供相关、连贯的回复，帮助完成写作辅助、信息检索和对话参与等任务。
- en: Specifically for writers, you can use ChatGPT for idea generation, editing,
    and feedback. And if you use it well, it will save you time and money.
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 特别是为作家设计的，您可以使用 ChatGPT 进行创意生成、编辑和反馈。如果您使用得当，它将为您节省时间和金钱。
- en: You can also use ChatGPT to generate ‘original’ fiction. You must understand
    that nothing this AI does is truly original, it learns from vast databases of
    fiction and creates ‘similar’ texts. I will include examples in this book.
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 您也可以使用 ChatGPT 来生成“原创”小说。您必须明白，这个 AI 所做的一切都不是真正原创的，它从庞大的虚构数据库中学习，并创建“类似”的文本。我将在本书中包含一些示例。
- en: 'But trust me, the human imagination is far more vivid and creative than any
    machine-learning; however, I have realised that there are some incredible tools
    now available to all writers and in this new book, I will try to cover the following
    topics:'
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: 但相信我，人类的想象力比任何机器学习都要生动和富有创造力；然而，我意识到现在有了一些令人难以置信的工具对所有作家都开放，在这本新书里，我将尝试涵盖以下主题：
- en: What are the free and paid for versions of large Language models available for
    writers?
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 对于作家来说，有哪些免费和付费的大型语言模型版本可用？
- en: How to use them for idea creation
  id: totrans-180
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如何使用它们进行创意生成
- en: How to use AI to save money on proofreading
  id: totrans-181
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如何使用 AI 来节省校对费用
- en: How to use AI to improve your writing
  id: totrans-182
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如何使用 AI 来提高您的写作
- en: How AI works as a writing coach and mentor.
  id: totrans-183
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: AI 作为写作教练和导师的工作原理。
- en: I say ‘try’ because this topic is moving very fast. What I write today may very
    well be outdated when you read this.
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 我说“尝试”，因为这个话题发展非常快。我今天写的可能在你阅读时已经过时了。
- en: Never mind!
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: 无所谓！
- en: We have to start somewhere so let’s go.
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: 我们必须从某个地方开始，所以让我们开始吧。
- en: '2'
  id: totrans-187
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '2'
- en: 1,000 words on Writing Flash Fiction
  id: totrans-188
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 1000字关于写作闪小说
- en: 500 words on Finding the Spark
  id: totrans-189
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 500字关于寻找火花
- en: 'If you are reading this book, you probably have already written at least one
    pieces of flash fiction. One question you will often be asked is: Where do you
    get your ideas?'
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你正在阅读这本书，你可能已经至少写了一篇闪小说。你经常会被问到的一个问题是：你的灵感从何而来？
- en: 'Okay well, here are my secrets:'
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: 好吧，这是我的秘密：
- en: 'The Inspiration Walk:'
  id: totrans-192
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 激发灵感的散步：
- en: I highly recommend walking outdoors. Whether accompanied by a pet or solo, aim
    for a 5-loop through your local area; if possible, include a park or green space.
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: 我强烈推荐户外散步。无论是否带着宠物或独自一人，目标是在您当地地区进行5次循环；如果可能的话，包括公园或绿地。
- en: For me, a 5-kilometer walk takes me about 40 minutes and unfolds in three phases.
    The first 10 minutes might be cluttered with daily life — work, family, etc. As
    I proceed, I let my mind wander to my book and focus on my characters, either
    reviewing existing copy or planning something new.
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: 对我来说，5公里的步行大约需要40分钟，分为三个阶段。前10分钟可能充满了日常生活——工作、家庭等。随着我继续前进，我会让我的思绪飘向我的书，专注于我的角色，要么回顾现有的副本，要么计划一些新的内容。
- en: I know an author should always carry a notebook, but I tend to use my phone
    to type myself reminders or to dictate scenes and dialogues as they are fresh
    in my mind. Honestly, it’s not in the least bit weird to pause in your walk and
    spend a few moments speaking to your phone.
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: 我知道作家应该总是携带笔记本，但我倾向于使用我的手机来输入自己提醒或口述场景和对话，因为它们在我脑海中仍然新鲜。老实说，在散步时停下来，花几分钟时间对着手机说话，一点也不奇怪。
- en: 'Bonus: if you set a good pace, you can burn 125 to 200 calories during a 5-kilometer
    walk.'
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
  zh: 奖励：如果你设定了良好的节奏，你可以在5公里的步行中燃烧125到200卡路里。
- en: 'Photographic Inspiration:'
  id: totrans-197
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摄影灵感：
- en: I also use my phone to take photos, and I’m a big fan of cutting memorable photos
    and headlines out of newspapers.
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: 我还用我的手机拍照，我非常喜欢从报纸上剪下难忘的照片和标题。
- en: Make it a routine to capture anything that catches your eye, be it unusual street
    art or striking patterns.
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: 做成一种习惯，捕捉任何吸引你注意的东西，无论是不同寻常的街头艺术还是引人注目的图案。
- en: A single photo might just inspire the title or the first line of your next story.
  id: totrans-200
  prefs: []
  type: TYPE_NORMAL
  zh: 一张单独的照片可能刚好能激发你下一部故事的标题或第一行。
- en: 'Creative Consumption:'
  id: totrans-201
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 创意消费：
- en: Dive deep into other’s creative works. I love sci-fi and fantasy on TV and at
    the movies, and I make no apologies for watching everything. Having said that,
    if I don’t like it or I think the plot is not working, I don’t necessarily watch
    everything to the end.
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
  zh: 深入研究他人的创意作品。我喜欢电视和电影中的科幻和奇幻，我并不为自己的广泛观看感到抱歉。话虽如此，如果我不喜欢它或者我觉得剧情不吸引人，我并不一定看到最后。
- en: I am also inspired by ballet dancers, gymnasts and skaters. The beauty and self-discipline
    these artists exhibit always force me back to the blank page or the computer screen
    and inspire me to practice, improve and excel just as they do.
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: 我还受到芭蕾舞者、体操运动员和滑冰运动员的启发。这些艺术家展现出的美丽和自律总是让我回到空白页或电脑屏幕前，并激励我像他们一样练习、改进和出色。
- en: Live performance of any kind has its own energy that can act like lightening
    to a writer, so head down to your nearest pub or club and sip a beer while your
    local band performs. It will be great for your writing.
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
  zh: 任何形式的现场表演都有其独特的能量，这可以像闪电一样激发作家的灵感，所以去你最近的酒吧或俱乐部，在当地的乐队表演时喝一杯啤酒。这对你的写作大有裨益。
- en: 'Bonus: you have something other than writing to talk to your friends about.'
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
  zh: 奖励：你除了写作外，还有其他话题可以和朋友交谈。
- en: 'Phone Apps I recommend:'
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: 我推荐的手机应用：
- en: Notes or Notebook
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
  zh: 笔记或笔记本
- en: Generally, a free app, this allows you to quickly type down a few lines. You
    can then either email to yourself and cut and paste into a new or existing fiction.
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
  zh: 通常，这是一个免费的软件，它允许你快速写下几行。然后你可以通过电子邮件发送给自己，并粘贴到新的或现有的小说中。
- en: Rev
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
  zh: Rev
- en: This a dictation app where you pay for a transcript to be emailed you. There
    are two price plans AI generated text, and human transcription. Texts up to 5,000
    words will be returned to you by email with an hour of being dictated.
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个语音输入应用，你需要付费将转录本通过电子邮件发送给你。有两种价格计划：AI生成的文本和人工转录。在口述后一小时内，最多5000字的文本将通过电子邮件返回。
- en: One top tip is to dictate short sequences up to 5-10 minutes long, and the texts
    come back within 15 minutes, longer texts can take several hours to be processed.
  id: totrans-211
  prefs: []
  type: TYPE_NORMAL
  zh: 一个顶级技巧是口述5-10分钟长的短序列，文本将在15分钟内返回，较长的文本可能需要几个小时才能处理。
- en: 250 words on The Doing
  id: totrans-212
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 关于“行动”的250字
- en: 'Making Time to Write:'
  id: totrans-213
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 挤出写作时间：
- en: Treat writing as a non-negotiable part of your day. Tell everyone you know.
  id: totrans-214
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 把写作当作你日常生活中不可或缺的一部分。告诉你的每一个人。
- en: Find your time, block it out on your calendar, and/or set an alarm on your phone.
  id: totrans-215
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 找到你的时间，在你的日历上划出时间，并在/或手机上设置闹钟。
- en: Claim your space—designate a specific chair and table as ‘your writing space
    ‘, and don’t use it for anything else.
  id: totrans-216
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 声明你的空间——指定一把特定的椅子和一张桌子作为“你的写作空间”，不要用它做其他任何事情。
- en: Start writing every day. Even if it’s just for 15 minutes. Think of it as a
    daily ritual, crucial to your creative soul.
  id: totrans-217
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 每天开始写作。即使只是15分钟。把它看作是每天的一种仪式，对你的创意灵魂至关重要。
- en: 'Believing Your Writing Is Important:'
  id: totrans-218
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 相信你的写作很重要：
- en: Never underestimate the value of your voice.
  id: totrans-219
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 永远不要低估你声音的价值。
- en: Your writing is a unique lens through which the world can be viewed.
  id: totrans-220
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你的写作是世界可以透过的一个独特的视角。
- en: Each word you write adds to the tapestry of human expression.
  id: totrans-221
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你写的每个词都增加了人类表达的面纱。
- en: Remember, every great writer was once where you are now.
  id: totrans-222
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 记住，每个伟大的作家都曾经在你现在的地方。
- en: Ultimately, the only person who has to enjoy your work is you.
  id: totrans-223
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 最终，唯一需要享受你的作品的人是你自己。
- en: 'Choose your weapons:'
  id: totrans-224
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 选择你的武器：
- en: Whether you’re a fan of the traditional pen and paper or more tech-inclined,
    the medium is secondary to the message.
  id: totrans-225
  prefs: []
  type: TYPE_NORMAL
  zh: 无论你是传统笔和纸的粉丝还是更倾向于技术，媒介是次要的，信息才是最重要的。
- en: I work on a laptop all day, so when I want to write in the evening, I give myself
    permission to write longhand in a notebook and use a transcription service to
    dictate and capture my handwritten notes into computer-based text.
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
  zh: 我整天都在笔记本电脑上工作，所以当我想在晚上写作时，我允许自己在笔记本上手写，并使用转录服务将手写笔记转录成基于计算机的文本。
- en: Sometimes I write directly onto my laptop, but it does help if I switch off
    the internet. The MS Word ‘Focus’ option or other ‘do not interrupt’ functions
    are available on most software. Investigate how you can avoid idling on YouTube
    and Google News when you know you should be writing. And just do it.
  id: totrans-227
  prefs: []
  type: TYPE_NORMAL
  zh: 有时候我直接在我的笔记本电脑上写作，但关掉互联网会很有帮助。大多数软件上都有MS Word的“专注”选项或其他“不要打扰”功能。调查一下你如何避免在知道你应该写作时在YouTube和Google新闻上闲逛。然后就去写吧。
- en: '250 words on Other Options:'
  id: totrans-228
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 其他选项的250字
- en: 'Writing Jellies:'
  id: totrans-229
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 写作果冻：
- en: 'These can be organised with a few writing buddies or something your local writer’s
    critique group might consider. It involves hiring a small hall for the day, preferably
    one with a small kitchen. Setting up the hall with tables and chairs and inviting
    everyone to ‘come and spend the day writing’. There are three rules to making
    your jelly a success:'
  id: totrans-230
  prefs: []
  type: TYPE_NORMAL
  zh: 这些活动可以与几个写作伙伴或你当地的作家评论小组一起组织。这涉及到租用一个大厅一整天，最好是带有一个小厨房的大厅。布置大厅，摆放桌椅，邀请每个人“来度过一天写作”。制作成功果冻有三个规则：
- en: Be strict about the chatter. If you want to catch up, go and shut yourself in
    the kitchen.
  id: totrans-231
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对闲聊要严格。如果你想赶上进度，就去厨房把自己关起来。
- en: Organize a pot-luck lunch; suggest everyone bring a plate to share; you will
    find you have an amazing buffet with food to spare.
  id: totrans-232
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 组织一次自助午餐；建议每个人都带上一盘食物来分享；你会发现你有一个令人惊叹的自助餐，还有剩余的食物。
- en: Bring many extra multi-plugs and extension cables, so everyone has the chance
    to power their laptop.
  id: totrans-233
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 带上许多额外的多孔插座和延长线，这样每个人都有机会为他们的笔记本电脑供电。
- en: Cafes or Libraries
  id: totrans-234
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 咖啡馆或图书馆
- en: Sometimes what your writing needs is a new location. If there’s a large Starbucks
    where they won’t notice if you linger all day in the corner, or if your local
    library has workstations or tables. These are perfect options for leaving your
    normal writing chair and finding a new energy or source of inspiration.
  id: totrans-235
  prefs: []
  type: TYPE_NORMAL
  zh: 有时候，你的写作需要一个新的地点。如果有一个大型星巴克，他们不会注意到你整天坐在角落里，或者如果你的当地图书馆有工作站或桌子，这些是离开你正常的写作椅子和找到新的能量或灵感的完美选择。
- en: 'Writing Retreats:'
  id: totrans-236
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 写作 retreat：
- en: Google for centres across the US and UK. It can be expensive but very indulgent
    and fun to do. Make it your main holiday and enjoy.
  id: totrans-237
  prefs: []
  type: TYPE_NORMAL
  zh: 在美国和英国搜索中心。这可能很昂贵，但非常奢侈和有趣。让它成为你的主要假期并享受它。
- en: Keep writing, keep believing, and let your stories soar.
  id: totrans-238
  prefs: []
  type: TYPE_NORMAL
  zh: 继续写作，保持信念，让你的故事翱翔。
- en: Over and out.
  id: totrans-239
  prefs: []
  type: TYPE_NORMAL
  zh: 结束语。
- en: '3'
  id: totrans-240
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '3'
- en: 500 words on Editing Flash Fiction
  id: totrans-241
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 闪小说编辑的500字
- en: Okay, let’s go over the basics. Here is a checklist of things to consider when
    editing your flash fiction.
  id: totrans-242
  prefs: []
  type: TYPE_NORMAL
  zh: 好吧，让我们回顾一下基础知识。以下是在编辑你的闪小说时需要考虑的事项清单。
- en: Do you start with a strong opening?
  id: totrans-243
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 你是从一个强有力的开头开始的吗？
- en: The opening sentence is one of the most critical parts of your flash fiction
    story. It needs to grab the reader’s attention and make them want to keep reading.
    A strong opening can set the tone for the entire story, and it can help you stand
    out from the competition.
  id: totrans-244
  prefs: []
  type: TYPE_NORMAL
  zh: 开头句是你的闪小说故事中最关键的部分之一。它需要抓住读者的注意力，并让他们想要继续阅读。一个强有力的开头可以为整个故事定下基调，并帮助你从竞争中脱颖而出。
- en: Try to avoid using clichéd openings like “It was a dark and stormy night” or
    “Once upon a time.”
  id: totrans-245
  prefs: []
  type: TYPE_NORMAL
  zh: 尽量避免使用陈词滥调的开头，如“那是一个黑暗而暴风雨的夜晚”或“从前”。
- en: Instead, try to come up with something unique and unexpected that will pique
    the reader’s curiosity.
  id: totrans-246
  prefs: []
  type: TYPE_NORMAL
  zh: 相反，试着想出一些独特且出乎意料的东西，以激发读者的好奇心。
- en: For example, “The blood was the first thing she noticed.”
  id: totrans-247
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，“她首先注意到的是血液。”
- en: Does every word count?
  id: totrans-248
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 每个词都重要吗？
- en: In flash fiction, every word counts. You have a limited word count, so every
    word needs to serve a purpose. Use strong verbs, vivid descriptions, and sensory
    details to make your story come alive.
  id: totrans-249
  prefs: []
  type: TYPE_NORMAL
  zh: 在闪小说中，每个词都很重要。你有字数限制，所以每个词都需要发挥作用。使用强有力的动词、生动的描述和感官细节，让你的故事栩栩如生。
- en: Avoid using unnecessary adjectives and adverbs.
  id: totrans-250
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 避免使用不必要的形容词和副词。
- en: Instead, show the reader what’s happening through action and dialogue. For example,
    instead of saying, “She was very sad,” show the reader how she feels through her
    actions and dialogue.
  id: totrans-251
  prefs: []
  type: TYPE_NORMAL
  zh: 相反，通过行动和对话向读者展示正在发生的事情。例如，与其说“她非常伤心”，不如通过她的行动和对话来展示她的感受。
- en: I always find that in my first draft, my flash fiction might be 700–1000 words
    long, and I personally love to set the challenge of honing an overlong text down
    to a 500-word count.
  id: totrans-252
  prefs: []
  type: TYPE_NORMAL
  zh: 我总是发现，在我的初稿中，我的闪小说可能长达700-1000字，我个人喜欢将挑战设定为将过长的文本精炼到500字。
- en: If you have written something that is 700 words long, sharpen your red pencil;
    that is pretty much the perfect first draft for a 500-word flash fiction.
  id: totrans-253
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你写了700字的内容，拿起你的红笔；这几乎是500字闪小说的完美初稿。
- en: Create Compelling Characters
  id: totrans-254
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 创建引人入胜的角色
- en: Even with a limited word count, it’s important to create compelling characters
    that the reader can relate to and care about. You don’t need to give them a detailed
    backstory, but you should give them unique personalities and motivations.
  id: totrans-255
  prefs: []
  type: TYPE_NORMAL
  zh: 即使字数有限，创建能够引起读者共鸣并关心的人物角色也非常重要。你不需要给他们一个详细的历史背景，但应该赋予他们独特的个性和动机。
- en: Try to avoid using clichéd character types like the brooding bad boy or the
    perfect girl next door. Instead, try to create characters that are more complex
    and nuanced. For example, a brooding bad boy who volunteers at a soup kitchen
    on the weekends or a perfect girl next door who secretly struggles with anxiety.
  id: totrans-256
  prefs: []
  type: TYPE_NORMAL
  zh: 尽量避免使用陈词滥调的角色类型，比如忧郁的坏男孩或完美的邻家女孩。相反，尝试创造更加复杂和细腻的角色。例如，一个在周末在soup kitchen做志愿者的忧郁坏男孩，或者一个表面上完美的邻家女孩，她却在秘密地与焦虑作斗争。
- en: Is your Dialogue quotable?
  id: totrans-257
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 你的对话是否可以引用？
- en: 'Dialogue or conversation, can be a very good way to convey a lot of information
    and move a story forward. There are quite a few pits falls you need to be aware
    of:'
  id: totrans-258
  prefs: []
  type: TYPE_NORMAL
  zh: 对话或交谈，可以是非常好的传达大量信息和推动故事发展的方式。你需要注意的陷阱有很多：
- en: Beware of realistic dialogue; most people speak with lots of hums, hahs, and
    repetitions accompanied by looks and hand waves? This is almost impossible to
    recreate on the page.
  id: totrans-259
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 警惕现实对话；大多数人说话时伴随着很多嗯嗯、哈哈和重复，还有眼神和手势？这在页面上几乎是不可能复制的。
- en: Beware of common sayings and cliché hackneyed phrases, and if you are wondering
    what I mean, anything that has been a punchline in a movie or a lyric in a well-known
    song is, to me, very suspect. I recommend you cut it.
  id: totrans-260
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 警惕常见的谚语和陈词滥调，如果你想知道我指的是什么，任何在电影中作为笑料或流行歌曲中的歌词都是，对我来说，非常可疑。我建议你删掉它。
- en: 'Dialogue is the best tool you have for revealing character. For example:'
  id: totrans-261
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对话是揭示角色的最佳工具。例如：
- en: 'Child: I know I’m going to win'
  id: totrans-262
  prefs: []
  type: TYPE_NORMAL
  zh: 孩子：我知道我会赢
- en: 'Mum: Really, who told you that?'
  id: totrans-263
  prefs: []
  type: TYPE_NORMAL
  zh: 妈妈：真的，谁告诉你的？
- en: The child is hopeful, her head full of stars; the mum is critical—too critical
    or maybe she has a more realistic assessment of her chances.
  id: totrans-264
  prefs: []
  type: TYPE_NORMAL
  zh: 这个孩子充满希望，她的头脑中满是星星；妈妈则很挑剔——过于挑剔，或者也许她对她自己的机会有一个更现实的评估。
- en: Beware of too much dialogue
  id: totrans-265
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 警惕过多的对话
- en: In flash fiction, you cannot have overlong conversations. Occasionally, writers
    write 500 words of just dialogue. This rarely works. It might read well, and it
    might give some good twists and turns, but this will never win against flash fiction
    with narrative backdrops, charismatic characters, and punchy dialogue.
  id: totrans-266
  prefs: []
  type: TYPE_NORMAL
  zh: 在闪小说中，你不能有冗长的对话。偶尔，作家会写500字的对话。这很少有效。它可能读起来很好，可能有一些好的转折和变化，但这种方法永远不会战胜那些有叙事背景、魅力人物和有力对话的闪小说。
- en: '4'
  id: totrans-267
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '4'
- en: 500 words on Polishing your Flash Fiction
  id: totrans-268
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 500字关于润色你的闪小说
- en: Edit, Edit, Edit
  id: totrans-269
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 编辑，编辑，再编辑
- en: Editing is crucial in flash fiction. Beyond the limited word count, the fiction
    needs to sing.
  id: totrans-270
  prefs: []
  type: TYPE_NORMAL
  zh: 在闪小说中，编辑至关重要。除了字数限制，小说还需要有音乐性。
- en: 'Here are some ideas for editing your document:'
  id: totrans-271
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一些编辑你文档的想法：
- en: Read your story out loud to see how it sounds; this will tell you a lot about
    the story arc, overlong descriptions, or unrealistic dialogue.
  id: totrans-272
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 大声朗读你的故事，看看它听起来如何；这将告诉你很多关于故事弧线、冗长的描述或现实主义对话的信息。
- en: Use software to check for typos and grammatical errors.
  id: totrans-273
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用软件检查错别字和语法错误。
- en: A few notes on feedback
  id: totrans-274
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 关于反馈的一些注意事项
- en: 'Though a word of warning, here are a list of people who will never read your
    writing:'
  id: totrans-275
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然有一个警告，以下是一份永远不会阅读你写作的人的名单：
- en: Your husband, wife or life partner
  id: totrans-276
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你的丈夫、妻子或生活伴侣。
- en: Your kids—I mean, you’re kidding, right? Children are always disdainful of their
    parents’ pursuits.
  id: totrans-277
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你的孩子——我是说，你在开玩笑吧？孩子们总是对父母的追求不屑一顾。
- en: The nice author and editor you met at a writer’s conference last summer. Believe
    me, they get bombarded with people asking them to read their work, and they are
    also busy enough with their own work not to have time for yours.
  id: totrans-278
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你在上个夏天参加的作家会议上遇到的那个和善的作者和编辑。相信我，他们被要求阅读作品的人轰炸了，他们自己的工作也很忙，没有时间看你的。
- en: 'Here is a list of people who can probably NOT help:'
  id: totrans-279
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一份可能无法提供帮助的人的名单：
- en: Your best friend
  id: totrans-280
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你的最佳朋友。
- en: The nice lady from your church or office who never says ‘no’
  id: totrans-281
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你教堂或办公室里那个从不说“不”的善良女士。
- en: Your mother may read your work, but I can guarantee her responses will not be
    helpful.
  id: totrans-282
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你的母亲可能会阅读你的作品，但我可以保证她的回应不会有所帮助。
- en: So where should you go for feedback?
  id: totrans-283
  prefs: []
  type: TYPE_NORMAL
  zh: 那么你应该去哪里寻求反馈？
- en: Here are my top tips.
  id: totrans-284
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是我的顶级技巧。
- en: Take your work to a workshop where you are encouraged to bring writing and to
    get feedback.
  id: totrans-285
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 把你的作品带到鼓励你带写作并获取反馈的工作坊。
- en: Join a writer’s group locally or set one up. The local library can normally
    help.
  id: totrans-286
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在当地加入一个作家小组或自己组建一个。当地图书馆通常会提供帮助。
- en: On Fiver.com, you will find lots of experienced editors and writers who will
    give you feedback for $5 or less. I would recommend asking for 3 or 4, and while
    $20 is a lot of money, you will have three to four nice reports, and unlike one
    person’s opinion, you can look at several.
  id: totrans-287
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在Fiver.com上，你会找到很多经验丰富的编辑和作家，他们可以以5美元或更少的费用为你提供反馈。我建议你要求3到4份，虽然20美元是一笔不小的钱，但你将得到三到四份不错的报告，而且与一个人的意见不同，你可以看看几个。
- en: Research the Competition
  id: totrans-288
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 研究比赛。
- en: Before you submit your flash fiction story to a competition, research the competition.
    Read previous winners to get a sense of what the judges are looking for. Pay attention
    to the style, tone, and themes of the winning entries, analyse the stories, and
    determine what makes them work.
  id: totrans-289
  prefs: []
  type: TYPE_NORMAL
  zh: 在你将你的闪小说故事提交给比赛之前，研究一下这个比赛。阅读以前的获奖者，以了解评委在寻找什么。注意获奖作品的风格、语气和主题，分析故事，并确定是什么让它们发挥作用。
- en: Each year, the Farnham Flash Fiction Competition publishes its longlisted winners
    in a booklet. This is a very good place to see the standard and variety of entries
    that make their way to a competition.
  id: totrans-290
  prefs: []
  type: TYPE_NORMAL
  zh: 每年，Farnham闪小说比赛都会在一份小册子中发布其长名单获奖者。这是一个非常好的地方，可以看到进入比赛的参赛作品的标准和多样性。
- en: Submit multiple entries.
  id: totrans-291
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 提交多个作品。
- en: If the rules allow it, submit multiple entries. This increases your chances
    of winning as well as giving you an opportunity to showcase different writing
    styles or concepts.
  id: totrans-292
  prefs: []
  type: TYPE_NORMAL
  zh: 如果规则允许，提交多个作品。这增加了你获胜的机会，同时也给你展示不同写作风格或概念的机会。
- en: Don’t give up.
  id: totrans-293
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 不要放弃。
- en: Winning a flash fiction competition can be demanding, but don’t give up. Keep
    writing and submitting, and don’t be discouraged. Every competition is an opportunity
    to improve and hone your craft.
  id: totrans-294
  prefs: []
  type: TYPE_NORMAL
  zh: 赢得闪小说比赛可能会很具挑战性，但不要放弃。继续写作和投稿，不要气馁。每一次比赛都是提高和磨练你技艺的机会。
- en: Good luck!
  id: totrans-295
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 祝你好运！
- en: '5'
  id: totrans-296
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '5'
- en: '500 words: What is Chat GPT?'
  id: totrans-297
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 500字：什么是Chat GPT？
- en: So let’s get started looking at the AI software, which are now available to
    writers.
  id: totrans-298
  prefs: []
  type: TYPE_NORMAL
  zh: 所以，让我们开始查看现在可供作家使用的AI软件。
- en: Let’s start with the basics. What is Chat GPT?
  id: totrans-299
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们从基础知识开始。什么是Chat GPT？
- en: 'Well, the easiest way to explain is to show you. Go to: https://chat.openai.com/'
  id: totrans-300
  prefs: []
  type: TYPE_NORMAL
  zh: 好吧，最简单的方法是给你展示。去：https://chat.openai.com/
- en: 'The opening screen says: How can I help you today?'
  id: totrans-301
  prefs: []
  type: TYPE_NORMAL
  zh: 开屏显示：今天我能帮您什么忙？
- en: 'At the bottom of the screen in the prompt window and above it a number of example
    questions you might ask it such as:'
  id: totrans-302
  prefs: []
  type: TYPE_NORMAL
  zh: 在提示窗口的底部和它上面的一些你可能想问的问题示例：
- en: Quiz me on the world’s capital like I as a geography student
  id: totrans-303
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 就像我是地理系学生一样，向我提问关于世界首都的问题。
- en: Explain a superconductor to me as if I was five years old
  id: totrans-304
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 像对我五岁的孩子解释超导体一样解释给我听。
- en: Write a content strategy for a writing newsletter
  id: totrans-305
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为一个写作通讯编写内容策略。
- en: Set realistic goals to build a model yacht starting in May and finishing by
    July
  id: totrans-306
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 设定一个现实的目标，从五月开始建造模型帆船，并在七月完成。
- en: 'What I would like you to type is this:'
  id: totrans-307
  prefs: []
  type: TYPE_NORMAL
  zh: 我希望您输入的内容是：
- en: Write in 100 words why writing flash fiction is fun in the voice of Scooby Doo
  id: totrans-308
  prefs: []
  type: TYPE_NORMAL
  zh: 用Scooby Doo的语气写100字，说明为什么写闪小说很有趣。
- en: This is Chat GPT’s reply for me - it might be different for you.
  id: totrans-309
  prefs: []
  type: TYPE_NORMAL
  zh: 这是Chat GPT给我的回复——它可能对你来说是不同的。
- en: Like, writing flash fiction is totally fun, Scoob! It’s super quick and creative,
    you know? You get to jump right into the action and solve mysteries with just
    a few words. There’s no time for a snack break, so it keeps you on your toes!
    Plus, it’s like playing dress-up but with characters and settings, imagining all
    sorts of spooky scenarios in a snap. And the best part? You can finish a whole
    story in just one sitting! So, it’s like, perfect for sharing tales around the
    campfire or during a pizza break. Isn’t that right, Scoob? Ruh-roh, time to write!
  id: totrans-310
  prefs: []
  type: TYPE_NORMAL
  zh: 就像，写闪小说绝对有趣，Scoob！它超级快，富有创意，你知道？你可以直接进入行动，用几个词解决谜题。没有时间吃零食，所以它让你保持警惕！而且，它就像玩变装游戏，但有了角色和场景，瞬间想象出各种恐怖场景。而且最好的部分是？你可以在一次坐下来就完成整个故事！所以，它非常适合在篝火旁或披萨休息时间分享故事。Scoob，对吧？Ruh-roh，是时候写作了！
- en: Okay, so what’s going on?
  id: totrans-311
  prefs: []
  type: TYPE_NORMAL
  zh: 好吧，那么现在发生了什么？
- en: The AI has been trained on millions and millions of texts.
  id: totrans-312
  prefs: []
  type: TYPE_NORMAL
  zh: 该AI已经在数百万篇文章上进行了训练。
- en: It will have ready all of the reviews of the TV show Scooby Doo, and lots of
    stories for children on this topic.
  id: totrans-313
  prefs: []
  type: TYPE_NORMAL
  zh: 它已经阅读了关于《Scooby Doo》电视节目的所有评论，以及大量关于这个主题的儿童故事。
- en: It will also have read lots of books on writing and flash fiction,
  id: totrans-314
  prefs: []
  type: TYPE_NORMAL
  zh: 它还阅读了大量关于写作和闪小说的书籍，
- en: It will have read many many essays on how to be happy
  id: totrans-315
  prefs: []
  type: TYPE_NORMAL
  zh: 它已经阅读了许多关于如何快乐的论文。
- en: It combines all that knowledge to create the above text.
  id: totrans-316
  prefs: []
  type: TYPE_NORMAL
  zh: 它结合所有这些知识来创建上述文本。
- en: And fast!
  id: totrans-317
  prefs: []
  type: TYPE_NORMAL
  zh: 立即！
- en: Were you surprised at how fast it was?
  id: totrans-318
  prefs: []
  type: TYPE_NORMAL
  zh: 你对它的速度感到惊讶吗？
- en: So now you know.
  id: totrans-319
  prefs: []
  type: TYPE_NORMAL
  zh: 所以现在你知道了。
- en: A brief history of ChatGPT
  id: totrans-320
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: ChatGPT简史
- en: ChatGPT is an AI chatbot utilizing natural language processing for human-like
    dialogue creation, capable of generating text, images, or videos in response to
    user prompts.
  id: totrans-321
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT是一个利用自然语言处理进行类似人类对话创作的AI聊天机器人，能够根据用户提示生成文本、图像或视频。
- en: It simulates intelligence and self-awareness by drawing from a vast library
    of content, including books, articles, and reference texts, allowing it to respond
    accurately to a wide range of topics.
  id: totrans-322
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过从包括书籍、文章和参考文本在内的广泛内容库中汲取知识，它模拟了智能和自我意识，能够准确回答广泛的主题。
- en: The analogy of pre-agreed answers highlights ChatGPT’s ability to deduce correct
    responses without actual understanding.
  id: totrans-323
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 预先约定的答案的类比突出了ChatGPT在没有实际理解的情况下推导出正确回答的能力。
- en: Since its public release, ChatGPT has evolved into a versatile tool for writing
    assistance, offering help from idea generation to draft composition and improvement,
    thereby aiding in overcoming writer’s block and boosting creativity.
  id: totrans-324
  prefs: []
  type: TYPE_NORMAL
  zh: 自从公开发布以来，ChatGPT已经演变成为一个多功能的写作辅助工具，从想法生成到草稿创作和改进，提供全方位的帮助，从而帮助克服写作障碍并激发创造力。
- en: 'June 2020: Launch of GPT-3, primarily for researchers and developers, showcasing
    a significant advancement in language model capabilities and hinting at the potential
    for AI in creative and conversational applications.'
  id: totrans-325
  prefs: []
  type: TYPE_NORMAL
  zh: 2020年6月：GPT-3的发布，主要面向研究人员和开发者，展示了语言模型能力的重大进步，并暗示了AI在创意和对话应用中的潜力。
- en: 'November 30, 2022: OpenAI releases ChatGPT to the public, fine-tuned for interactive
    and conversational use, marking its debut as an AI capable of generating human-like
    responses in chat format.'
  id: totrans-326
  prefs: []
  type: TYPE_NORMAL
  zh: 2022年11月30日：OpenAI将ChatGPT公开发布，针对交互和对话使用进行了微调，标志着它作为一个能够在聊天格式中生成类似人类回答的AI的首次亮相。
- en: Specialist versions are now Available
  id: totrans-327
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 现在已有专业版本可供选择
- en: At the start of 2023, Open AI released a number of specialist versions of ChatGPT,
    which were available as subscriptions. This included.
  id: totrans-328
  prefs: []
  type: TYPE_NORMAL
  zh: 到2023年初，OpenAI发布了ChatGPT的多个专业版本，这些版本作为订阅服务提供。这包括。
- en: ChatGPT for Creative Writers
  id: totrans-329
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: ChatGPT为创意作家
- en: This version is trained to understand nuances in storytelling, plot development,
    and character creation, making it an invaluable tool for authors and content creators
    seeking to add depth and intricacy to their narratives.
  id: totrans-330
  prefs: []
  type: TYPE_NORMAL
  zh: 这个版本被训练来理解故事讲述、情节发展和角色创建中的细微差别，对于寻求为他们的叙事增添深度和复杂性的作者和内容创作者来说，这是一个无价之宝的工具。
- en: ChatGPT for Business and Marketing
  id: totrans-331
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: ChatGPT为商业和营销
- en: This is aimed at enhancing communication, marketing, and branding efforts. These
    iterations helped professionals craft pitches, write marketing copy, and develop
    strategic content that aligns with business goals.
  id: totrans-332
  prefs: []
  type: TYPE_NORMAL
  zh: 这旨在提升沟通、营销和品牌推广工作。这些迭代帮助专业人士制作提案、撰写营销文案以及开发与商业目标相一致的战略内容。
- en: Understanding Open Source
  id: totrans-333
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 理解开源
- en: Because the technology behind ChatGPT is open source, OpenAI AI declared itself
    committed to sharing its findings, many different companies have now created different
    versions of ChatGPT. It is worth remembering that at source, they are all the
    same system but with different overlays or more specific functionality.
  id: totrans-334
  prefs: []
  type: TYPE_NORMAL
  zh: 因为ChatGPT背后的技术是开源的，OpenAI AI宣布自己致力于分享其发现，现在许多不同的公司已经创建了不同版本的ChatGPT。值得记住的是，在源头，它们都是同一个系统，但有不同的覆盖层或更具体的功能。
- en: Looking to the future, the potential for further specialized iterations of ChatGPT
    is vast, but this book aims to help you understand the basic/initial tool and
    in doing so, you will also have a better understanding of the others.
  id: totrans-335
  prefs: []
  type: TYPE_NORMAL
  zh: 看向未来，ChatGPT进一步专业化的迭代潜力巨大，但本书旨在帮助你理解基本/初始工具，通过这样做，你也将更好地理解其他工具。
- en: '6'
  id: totrans-336
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '6'
- en: '400 words: And the Future?'
  id: totrans-337
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 400字：未来会怎样？
- en: 'Picture this: your own AI writing coach, one who knows your work intimately.
    It spots those pesky adverbs you overuse, or the moments when a character suddenly
    sounds out of place. But it’s more than an editor – this AI brainstorms ideas
    with you, tossing out plot twists like confetti as you struggle with writer’s
    block. Will it replace the writer? Never that. It will make the act of writing
    feel less lonely.'
  id: totrans-338
  prefs: []
  type: TYPE_NORMAL
  zh: 想象一下：你自己的AI写作教练，一个对你作品了如指掌的人。它会指出你过度使用的那些讨厌的副词，或者当角色突然显得不合适的时候。但它的作用不仅仅是编辑——这个AI会和你一起头脑风暴，在你陷入写作瓶颈时，像撒纸屑一样抛出情节转折。它会取代作家吗？永远不会。它会让写作的过程感觉不那么孤独。
- en: AI, for all its cleverness, isn’t perfect. It can struggle with the messy bits,
    the emotional nuances that make a story truly sing. But where it shines? Spotting
    typos and overused phrases before you do. Imagine an AI that knows the delicate
    line between inspiration and offensive tropes. A watchful eye that flags outdated
    language and points you towards better options. Not to censor, but to make your
    work resonate with even more readers.
  id: totrans-339
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管AI非常聪明，但它并不完美。它可以处理那些混乱的部分，那些让故事真正响亮的情感细微差别。但它在哪里发光？在你之前发现错别字和过度使用的短语。想象一下一个了解灵感和冒犯性陈词滥调之间微妙界限的AI。一个警觉的眼睛会标记过时的语言，并引导你走向更好的选择。这不是为了审查，而是为了让你的作品与更多的读者产生共鸣。
- en: Think of AIs that become the masters of different worlds. One writes thrillers
    that keep you guessing until the last page, another spins historical romances
    with impeccable research. You’d have a team of expert assistants, each a click
    away.
  id: totrans-340
  prefs: []
  type: TYPE_NORMAL
  zh: 想象一下成为不同世界大师的AI。一个写悬疑小说，让你一直猜到最后一页，另一个编写历史浪漫小说，研究无懈可击。你将拥有一支专家团队，每个专家都只需点击即可获得。
- en: Sure, there are kinks to iron out. But what if AI could take care of the tedious
    tasks, like grammar checks and research legwork? What if it could brainstorm with
    you, offering fresh ideas when you’re stuck? The future starts now, and I, for
    one, am excited to see where this collaboration between writer and machine takes
    us.
  id: totrans-341
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，还有一些需要解决的难题。但如果我们能利用AI来处理像语法检查和研究工作这样的繁琐任务呢？如果它能在你陷入困境时与你一起头脑风暴，提供新的想法呢？未来已经开始了，至少对我来说，我很期待看到作家与机器之间的这种合作将带我们走向何方。
- en: 'Acknowledging AI strengths and weaknesses:'
  id: totrans-342
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 承认AI的优势和劣势：
- en: 'The Good Stuff:'
  id: totrans-343
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 好的东西：
- en: Imagine never seeing another typo. That’s the realm of the AI – spotting those
    tiny errors, saving you from blushing later.
  id: totrans-344
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 想象一下永远不再看到另一个错别字。这就是AI的领域——发现那些微小的错误，让你在事后不会感到尴尬。
- en: Need a fresh spin on a sentence? An AI can offer endless variations, some silly,
    some surprisingly good. No more staring at a blank page.
  id: totrans-345
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 需要给句子换一个新鲜的版本吗？AI可以提供无穷无尽的变体，有些愚蠢，有些出人意料地好。不再需要对着空白页面发呆。
- en: Facts are at your fingertips. An AI assistant can dig up research in a tenth
    of the time you’d spend on it.
  id: totrans-346
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 事实就在你的指尖。一个AI助手可以在你花费十分之一的时间内挖掘出研究。
- en: 'The Not-So-Good Stuff:'
  id: totrans-347
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 不太好的东西：
- en: That spark of an original idea, the human messiness that makes a good story?
    That’s still on us. AI can mimic, not innovate.
  id: totrans-348
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 那个原创想法的火花，让一个好故事变得有趣的人类混乱？这些仍然是我们自己的责任。AI可以模仿，但不能创新。
- en: The whispered joke, the unspoken heartache… these are hard for an AI to understand.
    Expect it to miss the nuances of your writing.
  id: totrans-349
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 那个低声的笑话，那个未言说的心痛……这些对AI来说很难理解。预期它会错过你写作的细微差别。
- en: Should a machine get credit for a story? It’s a question for the future, but
    we need to keep asking it, as AI becomes more powerful.
  id: totrans-350
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一部故事应该得到机器的认可吗？这是一个未来的问题，但随着AI变得越来越强大，我们需要不断提出这个问题。
- en: 'Remember: AI is just a tool, like Word or Grammar checker - it helps you write,
    yes faster and better, but you still have to do the work.'
  id: totrans-351
  prefs: []
  type: TYPE_NORMAL
  zh: 记住：AI只是一个工具，就像Word或语法检查器一样——它帮助你写作，是的，更快更好，但你仍然需要做这项工作。
- en: '7'
  id: totrans-352
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '7'
- en: '250 words: AI software that is useful to writers.'
  id: totrans-353
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 250字：对作家有用的AI软件。
- en: 'Let’s be honest, the world of AI writing tools is a bit of a wild jungle at
    the moment. New ones pop up like mushrooms after the rain, promising to solve
    all your writerly woes. But before you get overwhelmed, here’s a simple starting
    point:'
  id: totrans-354
  prefs: []
  type: TYPE_NORMAL
  zh: 诚实地讲，目前AI写作工具的世界有点像雨后的蘑菇丛，不断涌现，承诺解决你所有的写作烦恼。但在你感到不知所措之前，这里有一个简单的起点：
- en: 'The Heavy Hitters:'
  id: totrans-355
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 重磅出击：
- en: 'These are the big names most writers have at least heard of:'
  id: totrans-356
  prefs: []
  type: TYPE_NORMAL
  zh: 这些是大多数作家至少听说过的知名品牌：
- en: 'ChatGPT (OpenAI): A powerful conversational AI. Think of it as your brainstorming
    buddy, good for generating ideas, plot twists, and even whole passages of text
    (with caveats, of course!).'
  id: totrans-357
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT（OpenAI）：一款强大的对话式AI。把它想象成你的头脑风暴伙伴，非常适合生成想法、情节转折，甚至整段文字（当然，有前提条件！）。
- en: 'Bing AI (Microsoft): A similar concept to ChatGPT, built into Microsoft’s Bing
    search engine. It can help with research, story ideas, and even writing critiques.'
  id: totrans-358
  prefs: []
  type: TYPE_NORMAL
  zh: Bing AI（微软）：与ChatGPT类似的概念，内置在微软的Bing搜索引擎中。它可以帮助进行研究、构思故事想法，甚至提供写作评论。
- en: 'Gemini (Google): Designed specifically for creative writers. Gemini offers
    help with plot development, character arcs, and even analyzing your writing style
    to provide personalized feedback.'
  id: totrans-359
  prefs: []
  type: TYPE_NORMAL
  zh: Gemini（谷歌）：专为创意作家设计。Gemini可以帮助情节发展、角色弧线，甚至分析你的写作风格以提供个性化反馈。
- en: 'Grammarly: It’s more than just a fancy spellchecker. Grammarly catches sneaky
    style issues, suggests word clarity, and even offers basic feedback on tone.'
  id: totrans-360
  prefs: []
  type: TYPE_NORMAL
  zh: Grammarly：它不仅仅是高级的拼写检查器。Grammarly可以捕捉到隐藏的样式问题，建议词句清晰度，甚至提供对语调的基本反馈。
- en: Accessing the Tools
  id: totrans-361
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 访问工具
- en: Most of these have free versions that you can access directly through their
    websites. Just search for them, create an account, and you’re ready to start experimenting.
  id: totrans-362
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数这些工具都有免费版本，你可以直接通过他们的网站访问。只需搜索它们，创建账户，你就可以开始实验了。
- en: 'Important Note: Free versions usually have limits. You might only be able to
    generate a certain amount of text or use some features a limited number of times.'
  id: totrans-363
  prefs: []
  type: TYPE_NORMAL
  zh: 重要提示：免费版本通常有限制。你可能只能生成一定数量的文本或有限次数地使用某些功能。
- en: Paid Upgrades… Are they worth it?
  id: totrans-364
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 付费升级…它们值得吗？
- en: This depends on how much you’ll use the AI tools. If you’re just dipping your
    toes in, stick with it for now.
  id: totrans-365
  prefs: []
  type: TYPE_NORMAL
  zh: 这取决于你将如何使用AI工具。如果你只是初尝滋味，现在就坚持下去。
- en: If you find yourself relying on AI frequently, paid versions offer faster responses,
    more features, and generally higher-quality output.
  id: totrans-366
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你发现自己经常依赖AI，付费版本提供更快的响应、更多功能和通常更高的输出质量。
- en: 'Checklist: Before You Hit “Generate”'
  id: totrans-367
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 清单：在点击“生成”之前
- en: What’s Your Goal?
  id: totrans-368
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 你的目标是什么？
- en: Define what you need help with—ideas, editing, research? This helps you pick
    the right tool. Remember, It’s a Tool, Not a Magic Wand. AI output needs editing
    and polishing, always.
  id: totrans-369
  prefs: []
  type: TYPE_NORMAL
  zh: 定义你需要帮助的地方——想法、编辑、研究？这有助于你选择正确的工具。记住，它是一个工具，而不是魔杖。AI输出需要编辑和润色，始终如此。
- en: Experiment!
  id: totrans-370
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 尝试！
- en: Play around, feed the AI odd prompts, and see what it spits out. This is how
    you learn what works and what doesn’t.
  id: totrans-371
  prefs: []
  type: TYPE_NORMAL
  zh: 尝试一些，给AI一些奇怪的提示，看看它会输出什么。这就是你学习什么有效什么无效的方法。
- en: 'Privacy Matters:'
  id: totrans-372
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 隐私很重要：
- en: Read the terms and conditions of each tool. Know what data is being collected
    and how it’s used.
  id: totrans-373
  prefs: []
  type: TYPE_NORMAL
  zh: 阅读每个工具的使用条款和条件。了解正在收集哪些数据以及如何使用。
- en: Be inspired, not intimidated.
  id: totrans-374
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 获得灵感，而不是感到畏惧。
- en: Even the most sophisticated AI can’t replace the human spark in a story. That’s
    still on us!
  id: totrans-375
  prefs: []
  type: TYPE_NORMAL
  zh: 即使是最复杂的AI也无法取代故事中的人类火花。这仍然是我们自己的责任！
- en: 'One last tip:'
  id: totrans-376
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 最后一个小贴士：
- en: The AI writing world changes fast. Blogs and online communities focused on these
    tools are great for keeping up to date and getting new ideas.
  id: totrans-377
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能写作世界变化迅速。专注于这些工具的博客和在线社区是保持最新信息和获取新想法的好地方。
- en: '8'
  id: totrans-378
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '8'
- en: 250 words on Accessing Your AI Writing Toolkit
  id: totrans-379
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 250字关于访问你的AI写作工具包
- en: Ready to try some AI magic? Most of the big tools are just a few clicks away!
  id: totrans-380
  prefs: []
  type: TYPE_NORMAL
  zh: 准备尝试一些AI魔法吗？大多数大型工具只需几步即可访问！
- en: 'ChatGPT (OpenAI):'
  id: totrans-381
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: ChatGPT（OpenAI）：
- en: Go to the ChatGPT website (https://chat.openai.com/).
  id: totrans-382
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 访问 ChatGPT 网站 (https://chat.openai.com/)。
- en: Create a free account (email and password are all you need).
  id: totrans-383
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 创建一个免费账户（只需电子邮件和密码即可）。
- en: Start a chat and ask away! Experiment with different questions and prompts.
  id: totrans-384
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 开始聊天并提出问题！尝试不同的问题和提示。
- en: 'Bing AI (Microsoft):'
  id: totrans-385
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: Bing AI（微软）：
- en: Head to Bing, Microsoft’s search engine (https://www.bing.com/).
  id: totrans-386
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 前往Bing，微软的搜索引擎（https://www.bing.com/）。
- en: Click on the “Chat” tab at the top of the page.
  id: totrans-387
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 点击页面顶部的“聊天”标签。
- en: Sign in with your Microsoft account if needed (works with many email addresses).
  id: totrans-388
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如有需要，使用您的Microsoft账户登录（适用于许多电子邮件地址）。
- en: Ask your questions or try prompts and see what the AI comes back with.
  id: totrans-389
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提出您的问题或尝试提示，看看AI会给出什么回应。
- en: 'Grammarly:'
  id: totrans-390
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 'Grammarly:'
- en: Visit the Grammarly website (https://grammarly.com/).
  id: totrans-391
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 访问Grammarly网站（https://grammarly.com/）。
- en: Create a free account.
  id: totrans-392
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 创建一个免费账户。
- en: Start writing! You can paste text directly into Grammarly, or use their browser
    extension for suggestions as you type.
  id: totrans-393
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 开始写作！您可以直接将文本粘贴到Grammarly中，或者使用他们的浏览器扩展在您输入时提供建议。
- en: 'Gemini (Google):'
  id: totrans-394
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 'Gemini (Google):'
- en: Visit the Gemini website (https://gemini.google.com/).
  id: totrans-395
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 访问Gemini网站（https://gemini.google.com/）。
- en: Sign in with your Google account (the one you use for Gmail).
  id: totrans-396
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用您的Google账户（您用于Gmail的账户）登录。
- en: Start chatting and try out different prompts to see what this creative-focused
    AI can do.
  id: totrans-397
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 开始聊天并尝试不同的提示，看看这个以创意为中心的AI能做什么。
- en: 'Tips:'
  id: totrans-398
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 小贴士：
- en: 'Free vs. Paid: Most of these tools have free versions, perfect for trying them
    out. If you like one, explore the paid subscriptions for extra features and speed.'
  id: totrans-399
  prefs: []
  type: TYPE_NORMAL
  zh: 免费与付费：这些工具中的大多数都有免费版本，非常适合尝试。如果您喜欢其中一个，可以探索付费订阅以获得额外功能和速度。
- en: 'Explore: Don’t be afraid to play around! The best way to learn what AI can
    do is to experiment.'
  id: totrans-400
  prefs: []
  type: TYPE_NORMAL
  zh: 探索：不要害怕尝试！了解AI能做什么的最佳方式就是实验。
- en: 'Be Patient: Sometimes AI tools get busy, so don’t worry if answers aren’t instant.'
  id: totrans-401
  prefs: []
  type: TYPE_NORMAL
  zh: 耐心等待：有时AI工具会忙碌，所以如果答案不是即时的，请不要担心。
- en: '9'
  id: totrans-402
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '9'
- en: '500 words: My first foray into creating AI content.'
  id: totrans-403
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 500字：我第一次尝试创建AI内容。
- en: OK, this is where the shouting starts. I was quite surprised when my daughter
    told me she would never use AI either for content or for imagery. And you may
    have read many articles that predicted the end of all creative writing as machines
    finally replaced humans.
  id: totrans-404
  prefs: []
  type: TYPE_NORMAL
  zh: 好吧，这就是喊叫开始的地方。当我的女儿告诉我她永远不会使用AI来创作内容或图像时，我相当惊讶。你可能也读过许多文章预测，随着机器最终取代人类，所有创造性写作都将走向终结。
- en: I have always been curious about technology, and I tried ChatGPT as one of the
    first million users. I was astonished at how good it was at some tasks that previously
    would have taken hours to do.
  id: totrans-405
  prefs: []
  type: TYPE_NORMAL
  zh: 我一直对技术很感兴趣，并且作为前百万用户之一尝试了ChatGPT。我对它在一些以前需要数小时才能完成的任务上的表现感到惊讶。
- en: One of the first things I asked ChatGPT to do was write a 500-word blog that
    reviewed the 1976 classic film Star Wars.
  id: totrans-406
  prefs: []
  type: TYPE_NORMAL
  zh: 我首先要求ChatGPT做的事情之一是写一篇500字的博客，评论1976年的经典电影《星球大战》。
- en: 'Here is the prompt for a film review:'
  id: totrans-407
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 这里是电影评论的提示：
- en: Write a 500-word review praising George Lucas’s 1976 film Star Wars, aimed at
    a YA audience of 14–18 year-olds.
  id: totrans-408
  prefs: []
  type: TYPE_NORMAL
  zh: 写一篇500字的评论，赞扬乔治·卢卡斯1976年的电影《星球大战》，面向14至18岁的青少年观众。
- en: Here is the AI-generated film review.
  id: totrans-409
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 这里是AI生成的电影评论。
- en: In the world of cinematic legends, George Lucas’s 1976 masterpiece, Star Wars,
    stands as a colossal beacon of imagination, adventure, and innovation. For young
    adults aged 14–18, this film isn’t just a movie; it’s a portal to a universe brimming
    with endless possibilities, where the line between the real and the extraordinary
    blurs into an adventure of a lifetime.
  id: totrans-410
  prefs: []
  type: TYPE_NORMAL
  zh: 在电影传奇的世界中，乔治·卢卡斯1976年的杰作《星球大战》是一座充满想象、冒险和创新的巨大灯塔。对于14至18岁的年轻人来说，这部电影不仅仅是一部电影；它是一个通往充满无限可能性的宇宙的门户，在这里，现实与非凡之间的界限模糊成了一生的冒险。
- en: '*Star Wars*, or more precisely, *Star Wars: Episode IV: A New Hope*, introduces
    us to a galaxy torn apart by conflict, where the oppressive Galactic Empire reigns
    with an iron fist and the Rebel Alliance fights valiantly for freedom. At the
    heart of this epic saga is Luke Skywalker, a young farmer whose destiny propels
    him far beyond the sands of his home planet, Tatooine. Lucas masterfully weaves
    Luke’s journey with timeless themes of good versus evil, the quest for identity,
    and the power of hope, resonating profoundly with the challenges and aspirations
    of today’s youth.'
  id: totrans-411
  prefs: []
  type: TYPE_NORMAL
  zh: 《星球大战》，更确切地说，《星球大战：第四集 新希望》，向我们展示了一个因冲突而分裂的银河系，银河帝国以铁拳统治，反抗联盟英勇地战斗以争取自由。这部史诗般的故事的核心是卢克·天行者，一个年轻的农民，他的命运将他带出了他家乡星球塔图因的沙漠。卢卡斯巧妙地将卢克的旅程与永恒的主题交织在一起，如善与恶的对立、对身份的探索和希望的力量，与当今青年的挑战和抱负产生深刻的共鸣。
- en: The genius of Lucas’s creation lies not only in its storytelling but also in
    its groundbreaking visual and special effects. Remember, this was the mid-70s;
    the technological marvels we take for granted today were mere figments of the
    imagination back then. Lucas, with his visionary mind, brought to life the thrilling
    space battles, the iconic lightsaber duels, and the diverse, richly detailed worlds
    that have become cultural icons. For a young adult audience, the sheer creativity
    and technological prowess displayed in *Star Wars* serve as a powerful reminder
    of the limitless potential of human creativity.
  id: totrans-412
  prefs: []
  type: TYPE_NORMAL
  zh: 卢卡斯创造的奇迹不仅在于其故事讲述，还在于其开创性的视觉和特效。记住，那是在70年代中期；我们现在视为理所当然的技术奇迹在当时只是想象中的产物。卢卡斯，凭借他富有远见的头脑，将激动人心的太空战斗、标志性的光剑对决以及多样、丰富细致的世界变成了文化象征。对于年轻成人观众来说，《星球大战》中展现的纯粹创造力和技术实力，是对人类创造力无限潜力的有力提醒。
- en: Character development is another arena where Star Wars shines brightly. Luke’s
    transformation from a naive farm boy to a courageous hero mirrors the journey
    of self-discovery that many teenagers find themselves on. Princess Leia, with
    her fierce determination and leadership, broke the mold of traditional female
    roles in cinema, offering a strong model of empowerment. Han Solo, the charming
    rogue, adds a layer of complexity and growth that speaks to the importance of
    choice and redemption. These characters, with their flaws and strengths, provide
    relatable figures that embody the struggles and triumphs of adolescence.
  id: totrans-413
  prefs: []
  type: TYPE_NORMAL
  zh: 人物塑造是《星球大战》另一项光彩照人的领域。卢克从天真的农场男孩转变为勇敢的英雄，反映了许多青少年在自我发现之旅上的经历。莉娅公主，以其坚定的决心和领导力，打破了电影中传统女性角色的模式，提供了一个强大的赋权榜样。汉·索洛这位迷人的亡命之徒，增加了复杂性和成长性，强调了选择和救赎的重要性。这些角色，带着他们的缺点和优点，提供了可亲的人物形象，体现了青少年时期的挣扎和胜利。
- en: The cultural impact of Star Wars cannot be overstated. It’s more than a film;
    it’s a shared language across generations, a source of inspiration for countless
    individuals in various fields, and a foundational element of modern pop culture.
    For the young adult demographic, engaging with *Star Wars* is not just about watching
    a movie; it’s about becoming part of a larger community that celebrates creativity,
    diversity, and the pursuit of dreams.
  id: totrans-414
  prefs: []
  type: TYPE_NORMAL
  zh: 《星球大战》的文化影响不容小觑。它不仅仅是一部电影；它是跨越几代人的共同语言，是无数不同领域人士的灵感来源，也是现代流行文化的基础元素。对于年轻成人群体来说，与《星球大战》互动不仅仅是看电影；它意味着成为庆祝创造力、多样性和追求梦想的更大社区的一部分。
- en: In essence, George Lucas’s Star Wars is a timeless masterpiece that continues
    to inspire, entertain, and provoke thought among young adults. Its blend of groundbreaking
    visuals, compelling storytelling, and deep character arcs creates a rich tapestry
    that speaks to the adventurous spirit in all of us. Whether you’re a die-hard
    fan or a newcomer to the galaxy far, far away, Star Wars offers a universe of
    lessons about courage, hope, and the power of the human spirit. So, grab your
    popcorn and let the Force guide you on an unforgettable journey through one of
    cinema’s most beloved sagas.
  id: totrans-415
  prefs: []
  type: TYPE_NORMAL
  zh: 从本质上讲，乔治·卢卡斯创作的《星球大战》是一部永恒的杰作，它继续激发年轻人的灵感、娱乐他们并引发他们的思考。它结合了开创性的视觉效果、引人入胜的故事讲述和深刻的人物弧线，创造了一幅丰富的画卷，它触及了我们每个人内心的探险精神。无论你是忠实的粉丝还是对遥远银河系的新手，星球大战都提供了一个关于勇气、希望和人类精神力量的宇宙级教训。所以，拿起爆米花，让原力引导你踏上一次难忘的星际之旅。
- en: Review of AI-generated copy,
  id: totrans-416
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 人工智能生成文本的评论
- en: Gulp! Clearly, the AI has seen the movie—joke! Of course, the AI has not seen
    the movie; they just read 100 or 1000 reviews and articles on Star Wars.
  id: totrans-417
  prefs: []
  type: TYPE_NORMAL
  zh: 哎呀！显然，AI已经看过这部电影——玩笑！当然，AI并没有看过这部电影；他们只是阅读了100或1000篇关于《星球大战》的评论和文章。
- en: Double Gulp! This text was generated in less than 30 seconds. Setting aside
    the speed at which the text was written, even on this first attempt, I could see
    the problems.
  id: totrans-418
  prefs: []
  type: TYPE_NORMAL
  zh: 双重冲击！这段文本在不到30秒内生成。抛开文本写作的速度，即使是在第一次尝试中，我也能看到问题所在。
- en: How many adjectives does one need?
  id: totrans-419
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 需要多少个形容词呢？
- en: If this AI has read millions of words to learn how to write, this text above
    tells you how much terrible, flowery, over written prose exists. In the future,
    I will be incredibly suspicious of any text which has more than three adjectives
    in a sentence because I will know its source is not human.
  id: totrans-420
  prefs: []
  type: TYPE_NORMAL
  zh: 如果这个AI阅读了数百万字来学习如何写作，上面的文本就告诉你存在多少糟糕的、华丽的、过度冗长的散文。在未来，我会对任何一句话中包含超过三个形容词的文本极其怀疑，因为我会知道其来源不是人类。
- en: The use of *
  id: totrans-421
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 关于 *
- en: ChatGPT uses asterisks a lot. In this text, they are used in place of Italics
    and apostrophes to indicate the names of films. But in other texts, you will see
    them used in numbering, bullet points and much more.
  id: totrans-422
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT经常使用星号。在这段文本中，它们被用来代替斜体和撇号，以表示电影名称。但在其他文本中，你会看到它们被用于编号、项目符号以及更多。
- en: The weird summary
  id: totrans-423
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 奇怪的摘要
- en: Sometimes I think ChatGPT has read too many school essays, but it certainly
    likes putting a totally non-controversial, extremely good summary at the end of
    their texts. Whereas a human writer normally uses the punch line to make a joke
    or to write a memorable last sentence, the AI does not feel the need to leave
    us with a good impression or even anything remotely memorable. Just a dull as
    ditch water summary of what came before.
  id: totrans-424
  prefs: []
  type: TYPE_NORMAL
  zh: 有时候我觉得ChatGPT读了很多学校论文，但它确实喜欢在文本的结尾放一个完全无争议、极其好的总结。而人类作家通常会用笑点来制造笑话或写一个难忘的结尾句子，但AI并不觉得有必要给我们留下好印象，甚至任何稍微有点印象的东西。只是一个平淡无奇、像沟渠水一样平淡的总结。
- en: '10'
  id: totrans-425
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '10'
- en: 500 words How to use AI to generate plot ideas.
  id: totrans-426
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 500字 如何使用AI生成情节想法。
- en: There are now many different AIs for writers, but the main thing is to keep
    it simple so as to waste much time. For that reason, I am going to recommend a
    free Microsoft product which does most of the things a writer needs from AI and
    is free and easy to use.
  id: totrans-427
  prefs: []
  type: TYPE_NORMAL
  zh: 现在有许多不同的AI为作家服务，但最重要的是保持简单，以免浪费太多时间。因此，我将推荐一个免费的Microsoft产品，它可以为作家提供AI所需的大部分功能，并且免费且易于使用。
- en: 'Microsoft Edge is a free browser that comes with many computers or can be downloaded
    free here:'
  id: totrans-428
  prefs: []
  type: TYPE_NORMAL
  zh: Microsoft Edge是一款免费的浏览器，它随许多电脑一起提供，或者可以在这里免费下载：
- en: '![](image_rsrc1R0.jpg)'
  id: totrans-429
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrc1R0.jpg)'
- en: At the top of the page are two tabs; choose CHAT.
  id: totrans-430
  prefs: []
  type: TYPE_NORMAL
  zh: 页面顶部有两个标签；选择CHAT。
- en: A blue magnifying glass with black text Description automatically generated
  id: totrans-431
  prefs: []
  type: TYPE_NORMAL
  zh: 一个蓝色放大镜，上面有黑色文字 描述自动生成
- en: 'You then need to ask the AI a question; this is often referred to as an AI
    query. So, I started with:'
  id: totrans-432
  prefs: []
  type: TYPE_NORMAL
  zh: 你随后需要向AI提问；这通常被称为AI查询。因此，我开始了：
- en: Please generate 5 single plot ideas for flash fiction for thriller writers
  id: totrans-433
  prefs: []
  type: TYPE_NORMAL
  zh: 请为惊悚小说作家生成5个短篇故事的情节想法。
- en: 'This is the answer the AI provided:'
  id: totrans-434
  prefs: []
  type: TYPE_NORMAL
  zh: 这是AI提供的答案：
- en: 'Here are some plot ideas for flash fiction for thriller writers:'
  id: totrans-435
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一些为惊悚小说作家准备的短篇故事情节想法：
- en: A woman wakes up in a hospital with no memory of who she is or why she is there.
    She soon realizes that someone is trying to kill her, and she has to escape before
    it’s too late.
  id: totrans-436
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一名女子在医院醒来，对她的身份和为什么在那里一无所知。她很快意识到有人在试图杀害她，她必须及时逃脱。
- en: A man receives a mysterious package containing a USB drive with a video of his
    wife being held hostage. He has to follow a series of instructions to save her,
    but he doesn’t know who is behind it or what they want.
  id: totrans-437
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一名男子收到一个神秘的包裹，里面有一个包含他妻子被绑架视频的USB驱动器。他必须遵循一系列指示来救她，但他不知道幕后的人是谁，他们想要什么。
- en: A hacker breaks into a secret government database and discovers a shocking truth
    about a covert operation. He decides to expose it to the public, but he is hunted
    down by agents who want to silence him.
  id: totrans-438
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一名黑客入侵了一个秘密政府数据库，发现了一个关于秘密行动的惊人真相。他决定向公众揭露它，但被想要让他闭嘴的特工追捕。
- en: A couple moves into a new house that seems perfect until they start hearing
    strange noises and seeing ghostly apparitions. They soon discover that the house
    has a dark history and a sinister secret.
  id: totrans-439
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一对夫妇搬进了一座看似完美的房子，直到他们开始听到奇怪的噪音和看到幽灵般的幻影。他们很快发现这座房子有着黑暗的历史和邪恶的秘密。
- en: A journalist investigates a series of murders that are linked to a cult. He
    infiltrates the cult and tries to uncover their motives, but he gets in too deep
    and becomes their next target.
  id: totrans-440
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一名记者调查一系列与邪教有关的谋杀案。他潜入邪教，试图揭露他们的动机，但他陷入得太深，成为了他们的下一个目标。
- en: 'I then asked the AI:'
  id: totrans-441
  prefs: []
  type: TYPE_NORMAL
  zh: 我随后问AI：
- en: Can you give me more details about the first plot?
  id: totrans-442
  prefs: []
  type: TYPE_NORMAL
  zh: 你能给我更多关于第一个情节的细节吗？
- en: 'And it answered:'
  id: totrans-443
  prefs: []
  type: TYPE_NORMAL
  zh: 然后它回答道：
- en: 'Sure, here are some more details about the first plot:'
  id: totrans-444
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，这里有关于第一个情节的更多细节：
- en: The woman’s name is Anna, and she is a successful lawyer who was working on
    a high-profile case.
  id: totrans-445
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 这名女子的名字叫安娜，她是一位成功的律师，正在处理一个高调的案件。
- en: She was attacked by a masked assailant in her car and suffered a head injury
    that caused her amnesia.
  id: totrans-446
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 她在车内被一名蒙面袭击者袭击，头部受到重伤，导致她失忆。
- en: The hospital staff are not who they claim to be and are part of a conspiracy
    to kill her and cover up the case.
  id: totrans-447
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 医院的工作人员并不是他们声称的那样，他们是企图杀害她并掩盖案件的阴谋的一部分。
- en: She manages to escape from the hospital with the help of a friendly nurse who
    is also in danger.
  id: totrans-448
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 她在一位同样处于危险中的友好护士的帮助下成功逃离了医院。
- en: She has to find out who she is, who attacked her, and why they want her dead.
    She also has to evade the police, who are looking for her as a suspect.
  id: totrans-449
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 她必须弄清楚她是谁，谁攻击了她，以及他们为什么想让她死。她还得避开正在寻找她作为嫌疑人的警方。
- en: I then asked, Please, can you add a black cat to this story?
  id: totrans-450
  prefs: []
  type: TYPE_NORMAL
  zh: 我接着问道，请，你能在故事中添加一只黑猫吗？
- en: 'And it answered:'
  id: totrans-451
  prefs: []
  type: TYPE_NORMAL
  zh: 它回答道：
- en: 'Okay, I can add a black cat to this story. Here is how:'
  id: totrans-452
  prefs: []
  type: TYPE_NORMAL
  zh: 好的，我可以在故事中添加一只黑猫。以下是方法：
- en: Anna has a pet black cat named Shadow, whom she loves very much. She had left
    him at home when she went to work on the day of the attack.
  id: totrans-453
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 安娜非常爱她的宠物黑猫Shadow。她在攻击那天去上班时把它留在了家里。
- en: Shadow senses that something is wrong and tries to find his owner. He escapes
    from the house and follows her scent to the hospital.
  id: totrans-454
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Shadow感觉到有些不对劲，试图找到它的主人。它从房子里逃出来，跟随她的气味来到医院。
- en: He sneaks into the hospital and helps Anna escape by distracting the guards
    and leading her to an exit.
  id: totrans-455
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 他偷偷潜入医院，通过分散警卫的注意力并带她到出口，帮助安娜逃离。
- en: He stays with her throughout her ordeal and protects her from danger. He also
    helps her recover some of her memories by triggering flashbacks.
  id: totrans-456
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它一直陪伴她度过困境，并保护她免受危险。它还通过引发闪回帮助她恢复一些记忆。
- en: He is a loyal and brave companion who gives her comfort and hope. He is also
    a symbol of luck and fate.
  id: totrans-457
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 他是一位忠诚而勇敢的伴侣，给她带来安慰和希望。他也是幸运和命运的象征。
- en: 'I then said:'
  id: totrans-458
  prefs: []
  type: TYPE_NORMAL
  zh: 我接着说：
- en: Please, can you locate the story in Dubai and add local flavour?
  id: totrans-459
  prefs: []
  type: TYPE_NORMAL
  zh: 请，你能将故事定位在迪拜并添加当地特色吗？
- en: 'And AI answered:'
  id: totrans-460
  prefs: []
  type: TYPE_NORMAL
  zh: AI回答道：
- en: 'Sure, I can locate the story in Dubai and add some local flavour. Here is how:
    Locate the story in Dubai and add some local flavour. Here is how:'
  id: totrans-461
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，我可以将故事定位在迪拜并添加一些当地特色。以下是方法：将故事定位在迪拜并添加一些当地特色。以下是方法：
- en: Anna is a successful lawyer who works for a prestigious law firm in Dubai. She
    was working on a high-profile case involving a corruption scandal in a government
    department.
  id: totrans-462
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 安娜是一位在迪拜一家著名律师事务所工作的成功律师。她正在处理一个涉及政府部门腐败丑闻的高调案件。
- en: She was attacked by a masked assailant in her car while driving on Sheikh Zayed
    Road and suffered a head injury that caused her amnesia.
  id: totrans-463
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 她在谢赫扎耶德路上开车时被蒙面袭击者袭击，头部受伤导致她失忆。
- en: The hospital staff are not who they claim to be and are part of a conspiracy
    to kill her and cover up the case. They are working for her boss, who was involved
    in the scandal and wanted to get rid of her.
  id: totrans-464
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 医院的工作人员并不是他们所说的那样，他们是一个阴谋的一部分，旨在杀了她并掩盖案件。他们为她的老板工作，她的老板参与了丑闻并想除掉她。
- en: She manages to escape from the hospital with the help of a friendly nurse who
    is also in danger. She also has a pet black cat named Shadow, who helps her escape
    and stays with her throughout her ordeal.
  id: totrans-465
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 她在一位同样处于危险中的友好护士的帮助下成功逃离了医院。她还有一只名叫Shadow的宠物黑猫，它帮助她逃离并陪伴她度过了整个困境。
- en: She has to find out who she is, who attacked her, and why they want her dead.
    She also has to evade the police, who are looking for her as a suspect.
  id: totrans-466
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 她必须弄清楚她是谁，谁攻击了她，以及他们为什么想让她死。她还得避开正在寻找她作为嫌疑人的警方。
- en: She discovers that the attacker was hired by her boss, who was involved in a
    corruption scheme with the defendant in the case she was working on. Her boss
    wanted to get rid of her because she had found evidence that could expose him
    and ruin his career.
  id: totrans-467
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 她发现攻击者是被她的老板雇佣的，她的老板与她正在处理的案件中的被告涉及腐败阴谋。她的老板想除掉她，因为她发现了能揭露他并毁掉他事业证据。
- en: She confronts her boss at his office in Burj Khalifa, the tallest building in
    the world, and manages to record his confession. She sends it to the media and
    the police before he can kill her.
  id: totrans-468
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 她在哈利法塔（世界上最高的建筑）的办公室里面对她的老板，并成功录下了他的供认。在她被杀之前，她将录音发送给了媒体和警方。
- en: She survives and regains her memory. She is hailed as a hero and a whistle-blower.
    She reunites with her husband and son, who had been worried sick about her.
  id: totrans-469
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 她幸存下来并恢复了记忆。她被誉为英雄和告密者。她与丈夫和儿子团聚，他们一直为她担心得要命。
- en: 'Some local elements that I added to the story are:'
  id: totrans-470
  prefs: []
  type: TYPE_NORMAL
  zh: 我在故事中添加的一些当地元素包括：
- en: The setting of Dubai, which is a cosmopolitan city with a rich culture and heritage.
  id: totrans-471
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 迪拜的背景，这是一个拥有丰富文化和遗产的国际化城市。
- en: mention of Sheikh Zayed Road, which is one of the main highways in Dubai and
    connects many landmarks and attractions.
  id: totrans-472
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提到谢赫扎耶德路，这是迪拜的主要高速公路之一，连接了许多地标和景点。
- en: The mention of Burj Khalifa, which is the tallest building in the world and
    a symbol of Dubai’s modernity and ambition.
  id: totrans-473
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提到了哈利法塔，这是世界上最高的建筑，也是迪拜现代化和雄心的象征。
- en: The use of Arabic words such as marhaba (welcome), salaam alaykum (peace be
    upon you), gahwa (Arabic coffee), kabsa (rice dish), karak chai (mixed-spice tea),
    luqaimat (sweet dumplings), shorbat adas (lentil soup), shuwaa (lamb dish), etc.
    reflect the local cuisine and hospitality.
  id: totrans-474
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用诸如marhaba（欢迎）、salaam alaykum（愿主保佑你）、gahwa（阿拉伯咖啡）、kabsa（米饭菜肴）、karak chai（混合香料茶）、luqaimat（甜糯米球）、shorbat
    adas（扁豆汤）、shuwaa（羊肉菜肴）等阿拉伯语词汇反映了当地的饮食和好客。
- en: In about 10 minutes, I went from a vague idea of a story to a compelling and
    innovative narrative that I knew would really stand out in any competition.
  id: totrans-475
  prefs: []
  type: TYPE_NORMAL
  zh: 大约10分钟内，我从对故事的一个模糊想法变成了一个引人入胜且创新的叙述，我知道这将使任何比赛中的作品脱颖而出。
- en: So, I then moved onto Chat GPT, the new Content Creator Generator, and asked
    the AI to write the story based on the bullets above.
  id: totrans-476
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我接着转向Chat GPT，这个新的内容创作者生成器，并要求AI根据上述要点写故事。
- en: '11'
  id: totrans-477
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '11'
- en: '500 words: How to use AI to generate a Short Story'
  id: totrans-478
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 500字：如何使用AI生成短篇小说
- en: OK, so far, we have used AI to create a story outline and structure – but can
    the AI actually write the story.
  id: totrans-479
  prefs: []
  type: TYPE_NORMAL
  zh: 好的，到目前为止，我们已经使用AI创建了一个故事的大纲和结构——但AI真的能写出故事吗。
- en: 'Prompt to generate a short story:'
  id: totrans-480
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 生成短篇小说的提示：
- en: 'Please can you write a story using these elements:'
  id: totrans-481
  prefs: []
  type: TYPE_NORMAL
  zh: 请问你能用这些元素写一个故事吗：
- en: Locate the story in Dubai and add some local flavour.
  id: totrans-482
  prefs: []
  type: TYPE_NORMAL
  zh: 将故事定位在迪拜，并添加一些当地风味。
- en: 'Here is how:'
  id: totrans-483
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是如何做到的：
- en: ● Anna is a successful lawyer who works in a prestigious law firm in Dubai.
    She was working on a high-profile case involving a corruption scandal in a government
    department.
  id: totrans-484
  prefs: []
  type: TYPE_NORMAL
  zh: ● 安娜是一位在迪拜一家著名律师事务所工作的成功律师。她正在处理一个涉及政府部门腐败丑闻的高调案件。
- en: ● She was attacked by a masked assailant in her car while driving on Sheikh
    Zayed Road and suffered a head injury that caused her amnesia.
  id: totrans-485
  prefs: []
  type: TYPE_NORMAL
  zh: ● 她在谢赫扎耶德路上开车时，在车内被一个蒙面袭击者袭击，头部受伤导致失忆。
- en: ● The hospital staff are not who they claim to be and are part of a conspiracy
    to kill her and cover up the case. They are working for her boss, who was involved
    in the scandal and wanted to get rid of her.
  id: totrans-486
  prefs: []
  type: TYPE_NORMAL
  zh: ● 医院的工作人员并非他们所声称的那样，他们是一个阴谋的一部分，旨在杀害她并掩盖案件。他们为她的老板工作，她的老板参与了丑闻并想除掉她。
- en: ● She manages to escape from the hospital with the help of a friendly nurse
    who is also in danger. She also has a pet black cat named Shadow, who helps her
    escape and stays with her throughout her ordeal.
  id: totrans-487
  prefs: []
  type: TYPE_NORMAL
  zh: ● 她在一位也是处于危险中的友好护士的帮助下从医院逃脱。她还有一只名叫Shadow的宠物黑猫，它帮助她逃脱并在她整个困境中陪伴着她。
- en: ● She has to find out who she is, who attacked her, and why they want her dead.
    She also has to evade the police who are looking for her as a suspect.
  id: totrans-488
  prefs: []
  type: TYPE_NORMAL
  zh: ● 她必须找出她是谁，谁攻击了她，以及他们为什么想让她死。她还得躲避正在寻找她作为嫌疑人的警察。
- en: ● She discovers that the attacker was hired by her boss, who was involved in
    a corruption scheme with the defendant of the case she was working on. Her boss
    wanted to get rid of her because she had found evidence that could expose him
    and ruin his career.
  id: totrans-489
  prefs: []
  type: TYPE_NORMAL
  zh: ● 她发现攻击者是被她的老板雇佣的，而她的老板与她在处理的一个案件中的被告涉及腐败阴谋。她的老板想除掉她，因为她发现了能揭露他并毁掉他职业生涯的证据。
- en: ● She confronts her boss at his office in Burj Khalifa, the tallest building
    in the world, and manages to record his confession. She sends it to the media
    and the police before he can kill her.
  id: totrans-490
  prefs: []
  type: TYPE_NORMAL
  zh: ● 她在哈利法塔（世界上最高的建筑）她的老板办公室里面对她的老板，并设法录下了他的供认。在杀死她之前，她将录音发送给了媒体和警察。
- en: ● She survives and regains her memory. She is hailed as a hero and a whistleblower.
    She reunites with her husband and son, who had been worried sick about her.
  id: totrans-491
  prefs: []
  type: TYPE_NORMAL
  zh: ● 她幸存下来并恢复了记忆。她被誉为英雄和告密者。她与丈夫和儿子团聚，他们一直为她担心得要命。
- en: '12'
  id: totrans-492
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '12'
- en: 'CHAT GPT Worked Example: How to use AI to generate short fiction'
  id: totrans-493
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: CHAT GPT工作示例：如何使用AI生成短篇小说
- en: 'This is the AI’s response:'
  id: totrans-494
  prefs: []
  type: TYPE_NORMAL
  zh: 这是AI的回应：
- en: 'Title: “Shadows Over Dubai”'
  id: totrans-495
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 标题：“迪拜的阴影”
- en: In the heart of Dubai, where the city’s pulse beats in rhythm with the bustling
    streets and soaring skyscrapers, Anna, a renowned lawyer at a prestigious law
    firm, found herself entangled in a web of deceit and danger. Known for her sharp
    wit and unwavering dedication, Anna was on the brink of unraveling a high-profile
    corruption scandal within a government department. Little did she know that her
    pursuit of justice would soon turn her world upside down.
  id: totrans-496
  prefs: []
  type: TYPE_NORMAL
  zh: 在迪拜的心脏地带，城市的心跳与繁忙的街道和摩天大楼的崛起同步，安娜，一位在著名律师事务所的知名律师，发现自己陷入了一个欺骗和危险的罗网。以她敏锐的机智和坚定不移的奉献精神而闻名，安娜正站在揭露政府部门一个高调腐败丑闻的边缘。她不知道，她对正义的追求很快就会将她世界颠倒过来。
- en: One fateful evening, while driving along the glittering stretch of Sheikh Zayed
    Road, a masked assailant ambushed Anna. The attack was brutal, leaving her unconscious
    with a severe head injury that resulted in amnesia. She awoke in a hospital, the
    gleaming towers of Dubai visible through her window, yet her memory of the vibrant
    city and her life within it was shrouded in darkness.
  id: totrans-497
  prefs: []
  type: TYPE_NORMAL
  zh: 在一个命运多舛的夜晚，当安娜沿着闪耀的谢赫扎耶德路驾驶时，一个蒙面袭击者伏击了她。这次攻击是残忍的，让她失去了意识，头部严重受伤，导致失忆。她在医院醒来，透过窗户可以看到迪拜闪耀的塔楼，但对她充满活力的城市和她其中的生活的记忆却被黑暗笼罩。
- en: As she navigated the fog of her lost memories, Anna sensed that the hospital
    was not a place of healing but a prison designed to silence her. The staff, with
    their too-smooth reassurances and evasive eyes, were conspirators in a plot that
    reached far beyond the hospital walls. They were under the command of her boss,
    the very person she had trusted with her career, who was deeply entangled in the
    corruption she was determined to expose.
  id: totrans-498
  prefs: []
  type: TYPE_NORMAL
  zh: 在她迷失的记忆的迷雾中，安娜感觉到医院不是一个治愈的地方，而是一个旨在让她沉默的监狱。工作人员，他们的过于光滑的保证和逃避的眼神，是远超医院墙壁的阴谋的共犯。他们服从于她的老板，那个她曾信任以自己的职业生涯的人，他深深地卷入了她决心揭露的腐败之中。
- en: In the nick of time, a friendly nurse, aware of the looming danger, helped Anna
    escape. Her loyal black cat, Shadow, who had mysteriously found his way to her,
    became her constant companion, offering comfort and protection in the darkest
    of times. Together, they fled into the labyrinthine streets of Dubai, a city that
    was once familiar but is now a foreign maze filled with unseen threats.
  id: totrans-499
  prefs: []
  type: TYPE_NORMAL
  zh: 在千钧一发之际，一位友好的护士，意识到即将到来的危险，帮助安娜逃脱。她的忠诚的黑猫，影子，神秘地找到了她，成为她黑暗时刻中的忠实伴侣，提供安慰和保护。他们一起逃入迪拜错综复杂的街道，这个曾经熟悉但现在充满未知威胁的陌生迷宫。
- en: Hunted by those she once called colleagues and labelled a suspect by the authorities,
    Anna was a fugitive in her own life. She needed to piece together her past, understand
    the present, and secure her future. Amidst the opulent and often deceptive facades
    of Dubai, from the winding alleys of Al Fahidi Historical Neighbourhood to the
    shimmering waters of Dubai Marina, Anna embarked on a perilous journey to uncover
    the truth.
  id: totrans-500
  prefs: []
  type: TYPE_NORMAL
  zh: 被她曾经称之为同事的人追捕，并被当局标记为嫌疑人，安娜成了自己生活中的逃犯。她需要拼凑自己的过去，理解现在，并确保自己的未来。在迪拜奢华而常常具有欺骗性的外表下，从蜿蜒的阿尔法希迪历史社区小巷到闪耀的迪拜码头水域，安娜开始了危险的旅程，以揭露真相。
- en: 'Her investigation led her to a shocking revelation: her boss, a respected figure
    in the legal community, was the mastermind behind the corruption and her attempted
    murder. He had orchestrated the attack to prevent her from revealing evidence
    that could destroy his empire and expose his criminal activities.'
  id: totrans-501
  prefs: []
  type: TYPE_NORMAL
  zh: 她的调查将她引向一个惊人的揭露：她的老板，法律界的受人尊敬的人物，是腐败和企图谋杀她的幕后主使。他策划了这次攻击，以阻止她揭露能够摧毁他的帝国并揭露其犯罪活动的证据。
- en: Determined to bring him to justice, Anna devised a plan to confront him at his
    office in the majestic Burj Khalifa. Amidst the clouds, in the highest echelons
    of power, she faced her betrayer. With cunning and courage, she managed to record
    his confession, detailing his crimes and the attempted cover-up. Broadcasting
    the confession to the media and law enforcement, Anna ignited a firestorm that
    would cleanse the corrupt underbelly of the city’s elite.
  id: totrans-502
  prefs: []
  type: TYPE_NORMAL
  zh: 决心将他绳之以法，安娜制定了一个计划，在雄伟的哈利法塔的办公室里面对他。在云层之中，在权力的最高层，她面对了自己的背叛者。凭借狡猾和勇气，她设法记录了他的供认，详细描述了他的罪行和试图掩盖的行为。通过向媒体和执法部门广播供认，安娜引发了一场风暴，将清洗城市精英腐败的底层。
- en: In the aftermath, as the truth illuminated the dark corners of Dubai’s power
    corridors, Anna emerged not just as a survivor but as a beacon of justice. Her
    memory returned, piece by piece, like the city lights at dusk. Hailed as a hero
    and a whistleblower, she reunited with her husband and son, who had been the unseen
    anchors keeping her tethered to life.
  id: totrans-503
  prefs: []
  type: TYPE_NORMAL
  zh: 在真相照亮迪拜权力走廊的阴暗角落之后，安娜不仅作为一个幸存者出现，而且作为一个正义的灯塔。她的记忆像黄昏时分的城市灯光一样，一点一点地恢复。被誉为英雄和告密者，她与丈夫和儿子团聚，他们一直是她生命中的看不见的锚，将她系在生命之中。
- en: Anna’s story became a legend whispered among the residents of Dubai, a tale
    of resilience, courage, and the undying pursuit of truth. In the heart of the
    city, where the desert meets the sea, she stood as a testament to the power of
    one individual to make a difference, no matter the odds. And in the shadows, always
    by her side, was Shadow, her black cat, a silent guardian in a world that was
    forever changed.
  id: totrans-504
  prefs: []
  type: TYPE_NORMAL
  zh: 安娜的故事在迪拜居民中变成了一个传说，一个关于坚韧、勇气和对真理永不放弃的追求的故事。在这座城市的心脏地带，沙漠与大海交汇之处，她作为一个个体能够改变世界的见证者而屹立不倒，无论面对多大的困难。而在阴影中，始终陪伴在她身边的是她的黑猫影子，一个在永远改变的世界中的沉默守护者。
- en: 'Review: An AI-Generated Flash Fiction'
  id: totrans-505
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 评论：人工智能生成的闪小说
- en: I then thought, Okay, I have a story, but it is too long as Flash Fiction.
  id: totrans-506
  prefs: []
  type: TYPE_NORMAL
  zh: 我接着想，好吧，我有一个故事，但它作为闪小说太长了。
- en: Prompt for writing Flash Fiction
  id: totrans-507
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 闪小说写作提示
- en: 'So, I said to the ChatGPT:'
  id: totrans-508
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，我对ChatGPT说：
- en: Please can you reduce to 500 words?
  id: totrans-509
  prefs: []
  type: TYPE_NORMAL
  zh: 请问您能否将其缩减到500字？
- en: Example of AI-generated Flash Fiction
  id: totrans-510
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 人工智能生成的闪小说示例
- en: 'And the AI said:'
  id: totrans-511
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能说：
- en: 'Title: “Shadows Over Dubai”'
  id: totrans-512
  prefs: []
  type: TYPE_NORMAL
  zh: 标题：“迪拜的阴影”
- en: In Dubai, where the skyline pierces the heavens, Anna, a sharp-witted lawyer,
    was embroiled in exposing a government corruption scandal. Her life took a dramatic
    turn one night on Sheikh Zayed Road when a masked assailant attacked, leaving
    her with amnesia. She awoke in a hospital, only to realize it was a trap set by
    her boss, involved in the very scandal she was investigating.
  id: totrans-513
  prefs: []
  type: TYPE_NORMAL
  zh: 在迪拜，天际线刺破苍穹，安娜，一位机智的律师，卷入了一场政府腐败丑闻的揭露。她的生活在一个夜晚在谢赫扎耶德路上发生了戏剧性的转折，当时一名蒙面袭击者袭击了她，使她失去了记忆。她在医院醒来，意识到这是一个她正在调查的丑闻中涉及的上司设下的陷阱。
- en: With the hospital staff against her, Anna’s situation seemed dire until a sympathetic
    nurse aided her escape. Accompanied by her loyal black cat, Shadow, Anna navigated
    the once-familiar streets of Dubai, now a maze of danger and deceit. As a fugitive,
    she had to piece together her fragmented past while avoiding the authorities and
    those who wished her silence.
  id: totrans-514
  prefs: []
  type: TYPE_NORMAL
  zh: 在医院工作人员反对她的情况下，安娜的情况似乎非常危急，直到一位同情的护士帮助她逃脱。在她的忠诚的黑猫影子陪伴下，安娜在迪拜曾经熟悉的街道上穿行，现在这些街道充满了危险和欺骗。作为一名逃犯，她必须拼凑自己支离破碎的过去，同时避开当局和那些希望她保持沉默的人。
- en: 'Her journey led her to a harrowing discovery: her boss, the mastermind of the
    corruption, had orchestrated her demise to protect his criminal activities. Determined
    to expose the truth, Anna devised a plan to confront him at his office in the
    towering Burj Khalifa. There, amidst the clouds, she recorded his confession,
    detailing the extensive corruption and his attempt on her life.'
  id: totrans-515
  prefs: []
  type: TYPE_NORMAL
  zh: 她的旅程带她发现了一个令人毛骨悚然的事实：她的老板，腐败的幕后黑手，为了保护他的犯罪活动而策划了她的死亡。决心揭露真相，安娜制定了一个计划，在位于高耸的哈利法塔办公室与他对抗。在那里，云层之中，她记录了他的忏悔，详细描述了广泛的腐败和对他生命的企图。
- en: Broadcasting the confession to the media and law enforcement, Anna ignited a
    storm that shook the city’s elite to its core. Her bravery and pursuit of justice
    hailed her as a hero, a beacon of integrity in a world shrouded in shadows. Reunited
    with her family, Anna’s memory returned, and she stood resilient, a testament
    to the power of truth in the face of adversity. And by her side, as ever, was
    Shadow, her silent guardian in a city forever changed.
  id: totrans-516
  prefs: []
  type: TYPE_NORMAL
  zh: 通过向媒体和执法部门公布忏悔，安娜引发了一场风暴，震撼了城市精英的核心。她的勇敢和对正义的追求使她成为了一位英雄，一个在充满阴影的世界中的正直灯塔。与家人团聚后，安娜的记忆逐渐恢复，她坚强地站立着，成为面对逆境中真理力量的见证。而始终陪伴在她身边的是影子，她在这座永远改变的城市中的沉默守护者。
- en: 'Example: An AI Generated Flash Fiction in the style of Someone else'
  id: totrans-517
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 示例：模仿某人的风格生成的闪小说
- en: Finally, you will remember that in an earlier chapter we saw that stories with
    humour often do well in competition, so what if we could write in the comic style
    of Douglas Adams, famous for writing the Hitchhiker’s Guide to the Galaxy?
  id: totrans-518
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，你会记得在早期章节中我们看到，带有幽默的故事在比赛中往往表现良好，那么如果我们能以道格拉斯·亚当斯（以创作《银河系漫游指南》而闻名）的喜剧风格来写作会怎样？
- en: Prompt for writing in style of Douglas Adams
  id: totrans-519
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 以道格拉斯·亚当斯风格写作的提示
- en: 'So, I said to the AI:'
  id: totrans-520
  prefs: []
  type: TYPE_NORMAL
  zh: 所以，我对AI说：
- en: Can you rewrite this in the style of Douglas Adams?
  id: totrans-521
  prefs: []
  type: TYPE_NORMAL
  zh: 你能把它改写成道格拉斯·亚当斯（Douglas Adams）的风格吗？
- en: And the AI said:.
  id: totrans-522
  prefs: []
  type: TYPE_NORMAL
  zh: AI回答说：
- en: 500-word Example of AI-generated Flash Fiction in the style of Douglas Adams
  id: totrans-523
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 500字道格拉斯·亚当斯风格的AI生成闪小说示例
- en: 'Title: “The Somewhat Inconvenient Adventure of Anna and the Peculiarly Persistent
    Cat”'
  id: totrans-524
  prefs: []
  type: TYPE_NORMAL
  zh: 标题：“安娜和那只特别固执的猫的不太方便的冒险”
- en: In the grand, bustling intergalactic crossroads of Dubai, where the buildings
    stretch ambitiously towards the heavens as if trying to escape the planet altogether,
    there lived a lawyer named Anna. Anna was not your ordinary lawyer; she dealt
    with the kind of corrupt interstellar bureaucracy that made filling out a tax
    return seem as pleasant as a picnic on one of Saturn’s less windy moons.
  id: totrans-525
  prefs: []
  type: TYPE_NORMAL
  zh: 在迪拜这个繁华的星际交汇点，那里的建筑雄心勃勃地伸向天空，仿佛试图逃离整个星球，住着一个名叫安娜的律师。安娜不是普通的律师；她处理的那种腐败星际官僚机构，让填写税务申报单看起来像在土卫六上吹风一样愉快。
- en: One evening, while navigating the notoriously fickle Sheikh Zayed Road, which
    had a habit of behaving more like a hyperactive space worm than a road, Anna encountered
    an unexpected plot twist. A masked assailant, probably hired by some shady figure
    from the Corrupt Galactic Lawyers’ Union, attacked her, leaving her with a head
    injury and an inconvenient case of amnesia. She woke up in what appeared to be
    a hospital, but it was as much a hospital as a black hole is a convenient vacation
    spot.
  id: totrans-526
  prefs: []
  type: TYPE_NORMAL
  zh: 有一天晚上，在以多变的Sheikh Zayed Road上导航时，这条道路习惯性地表现得像一条过于活跃的太空蠕虫而不是一条道路，安娜遇到了一个意想不到的剧情转折。一个蒙面袭击者，可能是来自腐败银河律师联盟的某个神秘人物雇佣的，袭击了她，给她留下了头部伤害和不便的记忆丧失。她醒来时似乎在一个医院里，但那里既像医院，又像黑洞是一个方便的度假胜地。
- en: The staff, who were about as trustworthy as a two-headed Zyglon pet dealer,
    were actually part of a cosmic conspiracy to silence her. They were minions of
    her boss, a man so nefariously involved in the scandal she was uncovering that
    he made the average galactic overlord look like a particularly charitable dolphin.
  id: totrans-527
  prefs: []
  type: TYPE_NORMAL
  zh: 那些员工，他们的可信度几乎和双头Zyglon宠物经销商一样，实际上是他们老板的帮凶，而这位老板正卷入她正在揭露的丑闻中，以至于让普通的银河系霸主看起来像一只特别慈善的海豚。
- en: But fear not! Anna was not alone in her perilous predicament. By her side was
    Shadow, her trusty black cat, who was as mysterious as he was fluffy and had a
    particular talent for sneaky escapes. With the help of a nurse who was a rebel
    at heart (and probably had some thrilling space adventures of her own), Anna and
    Shadow embarked on a journey through Dubai’s glittering spires and shadowy alleys.
  id: totrans-528
  prefs: []
  type: TYPE_NORMAL
  zh: 但别担心！安娜在她的危险困境中并不孤单。在她的身边是她的忠实黑猫Shadow，它既神秘又蓬松，有特别擅长偷偷逃跑的天赋。在一位内心叛逆的护士（可能她自己也有一些激动人心的太空冒险）的帮助下，安娜和Shadow开始了穿越迪拜闪耀尖顶和阴暗小巷的旅程。
- en: Dubai, a city where the past and the future collided with the subtlety of two
    planets in a game of cosmic bumper cars, was the perfect backdrop for their escapade.
    Anna, with her mind as jumbled as a Jovian storm, had to dodge not only the authorities
    but also her own fragmented memories, which popped up at the most inconvenient
    times.
  id: totrans-529
  prefs: []
  type: TYPE_NORMAL
  zh: 迪拜，一个过去和未来在一场宇宙保龄球游戏中微妙碰撞的城市，是他们冒险的完美背景。安娜的思绪像木星风暴一样混乱，她不仅要躲避当局，还要应对那些在最不合适的时候突然出现的支离破碎的记忆。
- en: Finally, in a showdown high above the city in the Burj Khalifa (which was rumoured
    to be a dormant space rocket), Anna confronted her boss. Amidst his luxurious
    office, which had the understated opulence of a small planetary system, she managed
    to record his confession with a device cleverly disguised as an ordinary pen (courtesy
    of the Intergalactic Spy Gadgets Home Shopping Network).
  id: totrans-530
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，在位于城市上空、传闻中是一枚休眠太空火箭的哈利法塔（Burj Khalifa）中，安娜面对了她的老板。在他的豪华办公室里，那里有着小型行星系统的低调奢华，她设法用一台巧妙伪装成普通钢笔的设备（由星际间谍装备家居购物网络提供）记录了他的供认。
- en: Broadcasting the confession, Anna not only cleared her name but also exposed
    the kind of scandal that would make headlines in the Galactic Enquirer. Hailed
    as a hero, her memory conveniently returned, probably deciding that being amnesiac
    was no longer fashionable.
  id: totrans-531
  prefs: []
  type: TYPE_NORMAL
  zh: 通过广播供认，安娜不仅洗清了自己的罪名，还揭露了那种足以登上银河探秘者头条的丑闻。被誉为英雄，她的记忆也方便地恢复了，可能认为失忆已经不再时尚。
- en: Anna’s adventure became the talk of the city, a tale to be told between the
    neon lights and starships. She stood tall, a symbol of justice in a city that
    was at the crossroads of a thousand worlds. And at her side, purring contentedly,
    was Shadow, her enigmatic feline companion, who, for all we know, was the true
    mastermind behind the whole affair.
  id: totrans-532
  prefs: []
  type: TYPE_NORMAL
  zh: 安娜的冒险成为了城市的谈资，一个在霓虹灯和星际飞船之间流传的故事。她站得笔直，成为了一个处于千世界交汇点城市的正义象征。在她身边，是一只满足地咕噜咕噜叫的阴影，她的神秘猫伴侣，据我们所知，可能是整个事件背后的真正幕后黑手。
- en: (504 words)
  id: totrans-533
  prefs: []
  type: TYPE_NORMAL
  zh: （504字）
- en: '500 words: An AI-generated flash fiction in the style of Tom Clancy'
  id: totrans-534
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 500字：一篇模仿汤姆·克兰西风格的AI生成闪小说
- en: 'Prompt:'
  id: totrans-535
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 提示：
- en: 'So I asked the AI: Can you regenerate this story in the style of Tom Clancy.'
  id: totrans-536
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我向AI提问：你能用汤姆·克兰西的风格重新生成这个故事吗？
- en: 'And the AI replied:'
  id: totrans-537
  prefs: []
  type: TYPE_NORMAL
  zh: AI回答道：
- en: In the sprawling urban labyrinth of Dubai, where the architectural titans breach
    the realm of the gods, there walked Anna, a legal mind as sharp as the falcon’s
    talons, embattled in a vortex of governmental malfeasance. Her odyssey into the
    heart of corruption took a perilous twist under the cloak of night on the pulsating
    artery of Sheikh Zayed Road. An ambush, shrouded in mystery and veiled faces,
    left her in the clutches of oblivion, her memory a casualty of the assault.
  id: totrans-538
  prefs: []
  type: TYPE_NORMAL
  zh: 在迪拜广阔的城市迷宫中，建筑巨擘们闯入了神祇的领域，安娜在其中行走，一个法律思维如同猎鹰爪子般锐利，在政府腐败的漩涡中战斗。她的冒险进入腐败的核心在夜晚的谢赫扎耶德路上变得危险，一个神秘且面纱遮面的伏击让她陷入遗忘的掌握，她的记忆成为了攻击的牺牲品。
- en: Awakening in the sterile confines of a hospital that was anything but a sanctuary,
    Anna discovered the treachery of her superior—a puppeteer in the grandiose scheme
    of corruption she had dared to unravel. Surrounded by those complicit in her intended
    demise, her predicament teetered on the brink of despair until the unexpected
    allegiance of a compassionate nurse became her lifeline, her exodus from the imminent
    peril.
  id: totrans-539
  prefs: []
  type: TYPE_NORMAL
  zh: 在一个既不是避难所的医院中醒来，安娜发现了她上司的背叛——一个在腐败大阴谋中扮演木偶手的角色，她曾敢于揭露。在她预定灭亡的共谋者包围下，她的处境在绝望的边缘摇摆，直到一位富有同情心的护士的意外盟友成为她的生命线，她的逃离即将到来的危险。
- en: With her only ally, Shadow, a feline companion as enigmatic as the night itself,
    Anna ventured into the once-benevolent streets of Dubai, now a theater of jeopardy
    and intrigue. A fugitive of justice, wrongfully accused, she embarked on a quest
    to forge the fragments of her past into the weapon of her redemption, all the
    while evading the relentless pursuit of those who sought to silence her testimony.
  id: totrans-540
  prefs: []
  type: TYPE_NORMAL
  zh: 在只有她的神秘猫伴侣阴影作为唯一盟友的情况下，安娜冒险进入了曾经仁慈的迪拜街道，现在却成为了危险和阴谋的舞台。作为一个被错误指控的正义逃犯，她开始了一场将她的过去碎片锻造为救赎武器的追求，同时躲避那些试图让她沉默的追捕者。
- en: Her path led her to a revelation as harrowing as the desert storm—a conspiracy
    with her erstwhile mentor at the helm, a nefarious architect of her downfall,
    safeguarding his empire of deceit. Resolute in her pursuit of vindication, Anna
    engineered a confrontation within the soaring citadel of the Burj Khalifa, where
    the truth, like the falcon, soared from the precipice to the world beyond.
  id: totrans-541
  prefs: []
  type: TYPE_NORMAL
  zh: 她的旅程引导她发现了一个如同沙漠风暴般令人毛骨悚然的真相——一个由她曾经的导师领导，一个邪恶的阴谋建筑师，保护着他的欺骗帝国。安娜坚定地追求着昭雪，她在迪拜哈利法塔高耸的堡垒中策划了一场对抗，在那里，真相如同猎鹰般从悬崖上飞向世界之外。
- en: There, amongst the heavens, she ensnared him in his web of lies, his confession
    a symphony of guilt, broadcasted to the guardians of law and the court of public
    opinion. The tempest she unleashed razed the pedestals of the untouchables, her
    valor a beacon in the tumultuous night.
  id: totrans-542
  prefs: []
  type: TYPE_NORMAL
  zh: 在那里，在天际之间，她用他的谎言之网将他捕获，他的忏悔是一曲罪恶的交响乐，向法律守护者和公众舆论法庭广播。她引发的暴风雨摧毁了不可触及者的基石，她的勇气在动荡的夜晚中如灯塔般闪耀。
- en: Emerging from the shadows, Anna stood, her memory a fortress restored, hailed
    as a harbinger of justice in an epoch tainted by avarice. At her side, Shadow,
    her steadfast sentinel, made her journey a testament to the indomitable spirit
    of truth against the specters of iniquity. In the wake of her odyssey, Dubai stood,
    a metropolis reborn, its skyline a monument to the resilience of the righteous.
  id: totrans-543
  prefs: []
  type: TYPE_NORMAL
  zh: 从阴影中走出，安娜站立着，她的记忆堡垒得以修复，被誉为在一个被贪婪玷污的时代中正义的先知。在她身边，是她的忠诚哨兵阴影，使她的旅程成为对抗邪恶阴影的不屈精神见证。在她的冒险之后，迪拜这座城市重生，其天际线成为正义坚韧的纪念碑。
- en: 500 flash fiction stories in the style of Margaret Atwood
  id: totrans-544
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 500篇模仿玛格丽特·阿特伍德的闪小说
- en: In the shimmering mirage of Dubai, where the skyline stretches upward like fingers
    grasping at the elusive promise of heaven, there walked Anna, a woman whose intellect
    was as keen as the edge of a knife, now caught in the intricate web of governmental
    corruption. Her life veered into the realm of the surreal one night on the pulsing
    vein of Sheikh Zayed Road, where shadows materialized and left her adrift in a
    sea of forgetfulness, her memories stolen by the hands of a masked assailant.
  id: totrans-545
  prefs: []
  type: TYPE_NORMAL
  zh: 在迪拜那闪烁的幻影中，天际线向上延伸，就像手指抓着遥不可及的天堂的承诺，安娜走了过去，一个智力敏锐如刀刃的女人，现在却陷入了政府腐败的复杂网络。她的生活在一夜之间偏离了现实，在熙熙攘攘的谢赫扎耶德路上，阴影显现，将她留在了遗忘的海洋中，她的记忆被一个蒙面袭击者的双手偷走。
- en: She awoke to the sterile, antiseptic glare of a hospital, a place that should
    have been a haven but was instead a meticulously laid trap by her employer, the
    puppet master behind the corruption she had dared to challenge. Surrounded by
    faces masquerading as caretakers, her predicament seemed insurmountable until
    an unexpected ally, a nurse with eyes that spoke of untold stories, facilitated
    her escape.
  id: totrans-546
  prefs: []
  type: TYPE_NORMAL
  zh: 她醒来时，面对的是医院那无菌、消毒般的光芒，这个地方本应是避风港，但却是她雇主精心设置的陷阱，他是她敢于挑战的腐败背后的木偶大师。在那些伪装成看护者的面孔包围下，她的困境似乎无法克服，直到一个意想不到的盟友，一个眼神中透露着无数故事的女护士，帮助她逃脱。
- en: Accompanied by her only confidante, Shadow, a black cat with a gaze as penetrating
    as her own, Anna navigated the labyrinthine streets of Dubai. These streets, once
    familiar but now transformed into a tapestry of danger and deceit, each turn a
    potential betrayal. As a fugitive, wrongfully maligned, she embarked on a quest
    not just for survival but for the reclamation of her own fragmented past, all
    while dodging the omnipresent shadows of those who wished her voice silenced forever.
  id: totrans-547
  prefs: []
  type: TYPE_NORMAL
  zh: 在她的唯一知己，影子，一只目光如她一样锐利的黑猫的陪伴下，安娜在迪拜错综复杂的街道上穿行。这些街道曾经熟悉，但现在变成了危险和欺骗的织物，每个转弯都可能是一次背叛。作为一个被错误地诽谤的逃犯，她不仅开始了生存的斗争，还为了恢复她支离破碎的过去而奋斗，同时躲避那些希望永远让她沉默的阴影。
- en: Her journey unraveled a truth more twisted than the alleys she tread—a revelation
    that the architect of her nightmare, her mentor turned betrayer, had orchestrated
    the entire charade to shield his empire of lies from the light of scrutiny. With
    resolve forged in the crucible of her trials, Anna set her sights on a final confrontation
    within the steel and glass spire of the Burj Khalifa, a tower that scraped the
    belly of the sky.
  id: totrans-548
  prefs: []
  type: TYPE_NORMAL
  zh: 她的旅程揭示了一个比她走过的巷子还要扭曲的真相——一个揭露，她的噩梦制造者，她的导师变成了叛徒，精心策划了整个骗局，以保护他的谎言帝国免受审查的光芒。在考验的熔炉中锻造出的决心，安娜将目光投向了在哈利法塔钢铁和玻璃尖塔中的最终对抗，这座塔楼几乎触及天空的腹部。
- en: There, amidst the clouds, she cornered her quarry, coaxing out a confession
    that unraveled the tapestry of corruption, recording his words as they tumbled
    forth, a cascade of guilt and desperation. This confession, once broadcast, ignited
    a storm that swept through the city’s corridors of power, unsettling the untouchables
    and heralding Anna as a symbol of resilience, a testament to the enduring pursuit
    of justice.
  id: totrans-549
  prefs: []
  type: TYPE_NORMAL
  zh: 在那里，在云层中，她包围了她的猎物，诱使她招供，揭露了腐败的织物，记录下她的话语，当她的话语倾泻而出时，就像一场罪恶和绝望的瀑布。这个招供一旦播出，就在城市的权力走廊中引发了一场风暴，动摇了不可触及的人，并将安娜视为坚韧的象征，是对持久追求正义的见证。
- en: Reunited with the fragments of her past, her memory now a mosaic of resilience,
    Anna emerged not just as a survivor but as a beacon of integrity in an era shadowed
    by greed and deceit. And there, in the quiet after the storm, stood Shadow, her
    silent guardian, a witness to the power of unwavering truth in a world that often
    prefers the comfort of shadows. Together, they looked out at a city transformed,
    its skyline no longer just monuments to ambition but beacons of hope for the voiceless.
  id: totrans-550
  prefs: []
  type: TYPE_NORMAL
  zh: 与她过去的碎片重新团聚，她的记忆现在变成了一幅坚韧的拼贴画，安娜不仅作为一个幸存者出现，而且在被贪婪和欺骗所笼罩的时代，成为了一个正直的灯塔。在那里，在风暴之后的宁静中，站着影子，她的沉默守护者，一个见证了坚定不移真理力量的见证者，在一个常常偏爱阴影的舒适的世界里。他们一起望向一个已经改变的城市，其天际线不再仅仅是雄心勃勃的纪念碑，而是无声者的希望灯塔。
- en: Why write in someone else’s style?
  id: totrans-551
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 为什么要模仿别人的风格写作？
- en: 'I find this very useful for the following reasons:'
  id: totrans-552
  prefs: []
  type: TYPE_NORMAL
  zh: 我认为这有以下几点好处：
- en: It shows you stylistic differences between different writers that are sometimes
    difficult to put a finger on.
  id: totrans-553
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 它展示了不同作家之间在风格上的差异，这些差异有时很难明确指出。
- en: It highlights the very different voices and tonalities of writing different
    versions of the same story.
  id: totrans-554
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 它突出了不同版本同一故事的不同声音和语调。
- en: It can give you some very unusual ideas and point you new directions.
  id: totrans-555
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 它可以给你一些非常奇特的想法，并指引你新的方向。
- en: Obviously, there are some pitfalls.
  id: totrans-556
  prefs: []
  type: TYPE_NORMAL
  zh: 显然，有一些陷阱。
- en: I am not suggesting you use this to write the next Tom Clancy bestseller.
  id: totrans-557
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 我并不是建议你用它来写下一本汤姆·克兰西的最佳畅销书。
- en: You lose your own voice and possibly the confidence to write your own material.
  id: totrans-558
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你失去了自己的声音，可能也失去了写自己材料的信心。
- en: You stop thinking and rely on the machine.
  id: totrans-559
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你停止思考，依赖机器。
- en: Amazing time-waster!
  id: totrans-560
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 惊人的时间杀手！
- en: '13'
  id: totrans-561
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '13'
- en: 'BING Example: AI generated Flash Fiction, using Bing on Microsoft Edge.'
  id: totrans-562
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: BING 示例：使用微软Edge上的Bing生成的闪小说。
- en: 'Prompt:'
  id: totrans-563
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 提示：
- en: Write a 500-word flash fiction about a dog lost in a supermarket in London,
    England
  id: totrans-564
  prefs: []
  type: TYPE_NORMAL
  zh: 写一篇500字的伦敦，英国超市里一只狗的闪小说。
- en: Example of AI-generated Flash Fiction
  id: totrans-565
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: AI生成闪小说的例子
- en: Lost in the Aisles
  id: totrans-566
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 迷失在货架间
- en: The fluorescent lights hummed overhead, casting a sterile glow on the linoleum
    floor. The supermarket in London was a labyrinth of stacked shelves, each aisle
    a narrow corridor leading to a different world of packaged goods. It was here
    that Rusty, a scruffy terrier with a penchant for adventure, found himself lost.
  id: totrans-567
  prefs: []
  type: TYPE_NORMAL
  zh: 荧光灯在头顶嗡嗡作响，给亚麻地板投下了无菌的光芒。伦敦的超市是一个堆满货架的迷宫，每个通道都是一个狭窄的走廊，通向不同的包装商品世界。正是在这里，Rusty，一只喜欢冒险的蓬乱的梗类犬，发现自己迷失了。
- en: Rusty had slipped away from his owner, Mrs. Thompson, during the morning rush.
    She had been busy comparing prices of canned beans, oblivious to the fact that
    her loyal companion had darted off in pursuit of a tantalizing scent. The automatic
    doors had swung open, and Rusty had followed his nose into the heart of the bustling
    store.
  id: totrans-568
  prefs: []
  type: TYPE_NORMAL
  zh: Rusty在早晨的拥挤时段溜走了，他的主人汤普森太太没有注意到，她正忙着比较罐装豆子的价格，而她忠诚的伙伴却追逐着诱人的气味跑了。自动门打开了，Rusty跟着气味走进了熙熙攘攘的商店中心。
- en: Now, he trotted down the cereal aisle, his paws clicking against the tiles.
    The colourful boxes towered above him; their cartoon mascots frozen in perpetual
    cheer. Rusty sniffed at a box of chocolate-flavoured flakes, then moved on. He
    had more important matters to attend to.
  id: totrans-569
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，他沿着谷物通道跑下去，他的爪子敲打着瓷砖。五彩缤纷的盒子在他上方高耸；它们的卡通吉祥物永远保持着欢乐。Rusty嗅了嗅一盒巧克力味的薄片，然后继续前进。他还有更重要的事情要做。
- en: Next came the pet food section. Rusty’s tail wagged as he surveyed the rows
    of kibble and chew toys. Perhaps he’d find a treat here, something to sustain
    him on his unexpected journey. But the bags were too heavy, and Rusty couldn’t
    reach the top shelf. He settled for a half-chewed rawhide bone he found abandoned
    near the cat litter.
  id: totrans-570
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来是宠物食品区。Rusty在审视一排排狗粮和咀嚼玩具时尾巴摇摆。也许他能在那里找到一些零食，一些能在他意外的旅途中支持他的东西。但袋子太重了，Rusty够不到最高的架子。他只好满足于在猫砂附近找到的一根半咬过的生牛肉骨。
- en: As he wandered deeper into the store, Rusty encountered other lost souls. A
    tabby cat perched on a stack of paper towels, its green eyes wide with fear. A
    parrot squawked from the floral department, demanding to know the price of sunflower
    seeds. And in the frozen foods aisle, a hamster clung to a bag of peas, its tiny
    paws trembling.
  id: totrans-571
  prefs: []
  type: TYPE_NORMAL
  zh: 当他越走越深入商店时，Rusty遇到了其他迷失的灵魂。一只虎斑猫蹲在纸巾堆上，它的绿色眼睛里充满了恐惧。一只鹦鹉在花卉部门尖叫，要求知道葵花籽的价格。而在冷冻食品区，一只仓鼠紧紧抓住一袋豌豆，它的小爪子颤抖着。
- en: Rusty decided to form a team. They would be the Supermarket Strays, a ragtag
    group of misfit animals determined to find their way home. They held secret meetings
    behind the cleaning supplies, sharing stories of their owners and their favourite
    treats. Rusty was the leader, his wiry fur standing on end as he barked out orders.
  id: totrans-572
  prefs: []
  type: TYPE_NORMAL
  zh: Rusty决定组建一个团队。他们将被称为超市流浪者，一个由各种不适应的动物组成的杂牌军，决心找到回家的路。他们在清洁用品后面举行秘密会议，分享他们主人的故事和最喜欢的零食。Rusty是领导者，他毛茸茸的身体竖立起来，吠出命令。
- en: But the supermarket was vast, and Rusty’s team faced countless obstacles. The
    automatic sliding doors were like a force field, preventing them from escaping.
    The security cameras tracked their every move, and the checkout lanes were guarded
    by vigilant cashiers. Rusty knew they needed a plan.
  id: totrans-573
  prefs: []
  type: TYPE_NORMAL
  zh: 但超市很大，Rusty的团队面临着无数障碍。自动滑动门像一道屏障，阻止他们逃脱。安全摄像头跟踪他们的每一个动作，收银通道由警惕的收银员守卫。Rusty知道他们需要一个计划。
- en: One day, while exploring the produce section, Rusty discovered a hidden passage.
    Behind a stack of watermelons, a narrow gap led to a service corridor. Rusty squeezed
    through, his heart pounding. The other animals followed; their determination unwavering.
  id: totrans-574
  prefs: []
  type: TYPE_NORMAL
  zh: 一天，当探索蔬菜区时，Rusty发现了一条隐藏的通道。在一堆西瓜后面，一个狭窄的缝隙通向了一条服务走廊。Rusty挤了过去，心跳加速。其他动物也跟了上来；他们的决心坚定不移。
- en: They emerged into the loading dock, where delivery trucks rumbled in and out.
    Rusty spotted a familiar scent—a whiff of Mrs. Thompson’s perfume. She was waiting
    by her car, her face etched with worry. Rusty barked and wagged his tail, and
    Mrs. Thompson scooped him up in her arms.
  id: totrans-575
  prefs: []
  type: TYPE_NORMAL
  zh: 他们出现在装卸区，那里货车进进出出。Rusty闻到了一个熟悉的气味——汤普森夫人香水的味道。她在她的车旁等着，脸上写满了担忧。Rusty吠叫并摇着尾巴，汤普森夫人把他抱在怀里。
- en: The other animals watched from the shadows as Rusty was reunited with his owner.
    They knew their time together was limited. But Rusty promised to return, to lead
    more lost souls to safety. And so, as Mrs. Thompson carried him away, Rusty glanced
    back at the supermarket one last time.
  id: totrans-576
  prefs: []
  type: TYPE_NORMAL
  zh: 当Rusty与他的主人团聚时，其他动物在阴影中观察着。他们知道他们在一起的时间有限。但Rusty承诺会回来，带领更多的迷失灵魂走向安全。因此，当汤普森夫人抱着他离开时，Rusty最后一次回头看向超市。
- en: “Farewell, Supermarket Strays,” he whispered. “May your paths be filled with
    treats and open doors.”
  id: totrans-577
  prefs: []
  type: TYPE_NORMAL
  zh: “再见了，超市流浪者，”他低声说道，“愿你们的道路充满美味和敞开的大门。”
- en: 'Source: Conversation with Bing, 01/03/2024'
  id: totrans-578
  prefs: []
  type: TYPE_NORMAL
  zh: 来源：与Bing的对话，2024年1月3日
- en: (1) Dog Lost - Reuniting Lost Dogs With Their Owners. https://www.doglost.co.uk/.
  id: totrans-579
  prefs: []
  type: TYPE_NORMAL
  zh: (1) 狗丢失 - 失踪狗与主人的团聚。https://www.doglost.co.uk/。
- en: '(2) Pet theft: Six percent of animals reported stolen recovered. https://www.bbc.co.uk/news/uk-england-london-67579911.'
  id: totrans-580
  prefs: []
  type: TYPE_NORMAL
  zh: (2) 犬只盗窃：六百分之一的被盗动物被找回。https://www.bbc.co.uk/news/uk-england-london-67579911。
- en: '(3) Pet theft: Six percent of animals reported stolen recovered - BBC. https://www.bbc.com/news/uk-england-london-67579911.'
  id: totrans-581
  prefs: []
  type: TYPE_NORMAL
