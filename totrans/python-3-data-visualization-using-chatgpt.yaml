- en: '**SUMMARY**'
  id: totrans-2293
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**总结**'
- en: This chapter started with some basic features of Seaborn, which is an extension
    of Matplotlib. You saw examples of plotting lines and histograms, and also how
    to plot a Pandas DataFrame using Seaborn.
  id: totrans-2294
  prefs: []
  type: TYPE_NORMAL
  zh: 本章从Seaborn的一些基本功能开始，Seaborn是Matplotlib的扩展。你看到了绘制线条和直方图的示例，以及如何使用Seaborn绘制Pandas
    DataFrame。
- en: Next, you learned about Bokeh, along with an example of rendering graphics in
    Bokeh. Furthermore, you learned about SVG and how to render various 2D shapes,
    such as line segments, rectangles, circles, Bezier curves, and bar charts.
  id: totrans-2295
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，你学习了Bokeh，以及如何在Bokeh中渲染图形的示例。此外，你还学习了SVG以及如何渲染各种二维形状，例如线段、矩形、圆形、贝塞尔曲线和条形图。
- en: You also learned about Scikit-learn, including examples of working with the
    Digits and Iris datasets, and also how to process images. Finally, you learned
    how to render a bar chart and a line graph in Scikit-learn.
  id: totrans-2296
  prefs: []
  type: TYPE_NORMAL
  zh: 你还学习了Scikit-learn，包括使用Digits和Iris数据集的示例，以及如何处理图像。最后，你学习了如何在Scikit-learn中渲染条形图和折线图。
- en: CHAPTER 7
  id: totrans-2297
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第七章
- en: '*CHATGPT AND GPT-4*'
  id: totrans-2298
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '*ChatGPT和GPT-4*'
- en: This chapter contains information about the main features of ChatGPT and GPT-4,
    as well as some of their competitors.
  id: totrans-2299
  prefs: []
  type: TYPE_NORMAL
  zh: 本章包含有关ChatGPT和GPT-4的主要功能以及一些竞争对手的信息。
- en: The first part of this chapter starts with information about the nature of generative
    AI and conversational AI versus generative AI. This section also delves into ChatGPT,
    along with a comparison of ChatGPT and Google Search. You will also learn about
    ChatGPT custom instructions, prompts, and the ChatGPT playground. In addition,
    you will learn about ChatGPT plugins, such as Advanced data analysis (formerly
    Code Interpreter) and code whisperer.
  id: totrans-2300
  prefs: []
  type: TYPE_NORMAL
  zh: 本章的第一部分从生成式AI和对话式AI与生成式AI的本质区别开始介绍。本节还深入探讨了ChatGPT，以及ChatGPT与Google Search的比较。你还将了解ChatGPT的定制指令、提示和ChatGPT游乐场。此外，你还将学习ChatGPT插件，如高级数据分析（以前称为代码解释器）和代码轻语者。
- en: The second part of this chapter discusses some concerns about ChatGPT, as well
    as the strengths and weaknesses of ChatGPT. Moreover, you will learn about alternatives
    to ChatGPT and data visualization with VizGPT.
  id: totrans-2301
  prefs: []
  type: TYPE_NORMAL
  zh: 本章的第二部分讨论了关于ChatGPT的一些担忧，以及ChatGPT的优缺点。此外，你将了解ChatGPT的替代方案以及使用VizGPT进行数据可视化。
- en: The third part of this chapter delves into GPT-4, some inference parameters
    for GPT-4, and fine tuning. You will also learn about some competitors, such as
    CoPilot and Codex. The final portion of this chapter introduces you to LlaMa-2
    and how to download LlaMa-2 so that you can fine tune this model on your laptop.
  id: totrans-2302
  prefs: []
  type: TYPE_NORMAL
  zh: 本章的第三部分深入探讨了GPT-4，一些GPT-4的推理参数和微调。你还将了解一些竞争对手，如CoPilot和Codex。本章的最后部分介绍了LlaMa-2以及如何在笔记本电脑上下载LlaMa-2以便你可以微调此模型。
- en: '**WHAT IS GENERATIVE AI?**'
  id: totrans-2303
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**什么是生成式AI？**'
- en: '*Generative AI* refers to a subset of artificial intelligence models and techniques
    designed to generate new data samples that are similar in nature to a given set
    of input data. The goal is to produce content or data that was not part of the
    original training set but is coherent, contextually relevant, and in the same
    style or structure.'
  id: totrans-2304
  prefs: []
  type: TYPE_NORMAL
  zh: '*生成式AI*是指一类人工智能模型和技术，旨在生成与给定输入数据在本质上相似的新数据样本。目标是产生原本不属于原始训练集的内容或数据，但内容连贯、上下文相关，且风格或结构相同。'
- en: Generative AI stands apart in its ability to create and innovate, as opposed
    to merely analyzing or classifying. The advancements in this field have led to
    breakthroughs in creative domains and practical applications, making it a cutting-edge
    area of AI research and development.
  id: totrans-2305
  prefs: []
  type: TYPE_NORMAL
  zh: 生成式人工智能在创造和创新方面与众不同，而不是仅仅分析或分类。该领域的进步导致了创意领域和实际应用的突破，使其成为人工智能研究和开发的前沿领域。
- en: '**Important Features of Generative AI**'
  id: totrans-2306
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '**生成式人工智能的重要特性**'
- en: 'The following list contains important features of generative AI, followed by
    a brief description for each item:'
  id: totrans-2307
  prefs: []
  type: TYPE_NORMAL
  zh: 以下列表包含了生成式人工智能的重要特性，以及每个项目的简要描述：
- en: Data generation
  id: totrans-2308
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 数据生成
- en: Synthesis
  id: totrans-2309
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 综合合成
- en: Learning distributions
  id: totrans-2310
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 学习分布
- en: '*Data generation* refers to the ability to create new data points that are
    not part of the training data, but resemble it. This can include text, images,
    music, videos, or any other form of data. *Synthesis* means that generative models
    can blend various inputs to generate outputs that incorporate features from each
    input, like merging the styles of two images. *Learning distributions* means that
    generative AI models aim to learn the probability distribution of the training
    data so they can produce new samples from that distribution.'
  id: totrans-2311
  prefs: []
  type: TYPE_NORMAL
  zh: '*数据生成*指的是创建新的数据点，这些数据点不是训练数据的一部分，但与其相似。这可能包括文本、图像、音乐、视频或其他形式的数据。*综合*意味着生成模型可以混合各种输入以生成包含每个输入特征的输出，例如合并两张图像的风格。*学习分布*意味着生成式人工智能模型旨在学习训练数据的概率分布，以便它们可以从该分布中生成新的样本。'
- en: '**Popular Techniques in Generative AI**'
  id: totrans-2312
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '**生成式人工智能中的流行技术**'
- en: Generative Adversarial Networks (GANs) consist of two networks, a generator,
    and a discriminator, that are trained simultaneously. The generator tries to produce
    fake data, while the discriminator tries to distinguish between real data and
    fake data. Over time, the generator gets better at producing realistic data.
  id: totrans-2313
  prefs: []
  type: TYPE_NORMAL
  zh: 生成对抗网络（GANs）由两个网络组成，一个生成器和一个判别器，它们同时进行训练。生成器试图生成假数据，而判别器试图区分真实数据和假数据。随着时间的推移，生成器在生成逼真数据方面变得越来越擅长。
- en: Variational Autoencoders (VAEs) are probabilistic models that learn to encode
    and decode data in a manner that the encoded representations can be used to generate
    new data samples.
  id: totrans-2314
  prefs: []
  type: TYPE_NORMAL
  zh: 变分自编码器（VAEs）是概率模型，它们学习以编码和解码数据的方式，使得编码表示可以用来生成新的数据样本。
- en: Recurrent Neural Networks (RNNs) are used primarily for sequence generation,
    such as text or music.
  id: totrans-2315
  prefs: []
  type: TYPE_NORMAL
  zh: 循环神经网络（RNNs）主要用于序列生成，如文本或音乐。
- en: '**What Makes Generative AI Unique**'
  id: totrans-2316
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '**生成式人工智能的独特之处**'
- en: '*Creation vs. Classification*: While most traditional AI models aim to classify
    input data into predefined categories, generative models aim to create new data.'
  id: totrans-2317
  prefs: []
  type: TYPE_NORMAL
  zh: '*创作与分类对比*：虽然大多数传统人工智能模型旨在将输入数据分类到预定义的类别中，但生成模型旨在创建新的数据。'
- en: '*Unsupervised Learning*: Many generative models, especially GANs and VAEs,
    operate in an unsupervised manner, meaning they do not require labeled data for
    training.'
  id: totrans-2318
  prefs: []
  type: TYPE_NORMAL
  zh: '*无监督学习*：许多生成模型，尤其是GANs和VAEs，以无监督的方式运行，这意味着它们在训练时不需要标记数据。'
- en: '*Diverse Outputs*: Generative models can produce a wide variety of outputs
    based on learned distributions, making them ideal for tasks like art generation,
    style transfer, and more.'
  id: totrans-2319
  prefs: []
  type: TYPE_NORMAL
  zh: '*多样化输出*：生成模型可以根据学习到的分布产生各种输出，这使得它们非常适合艺术生成、风格迁移等任务。'
- en: '*Challenges*: Generative AI poses unique challenges, such as model collapse
    in GANs or ensuring the coherence of generated content.'
  id: totrans-2320
  prefs: []
  type: TYPE_NORMAL
  zh: '*挑战*：生成式人工智能提出了独特的挑战，例如GANs中的模型崩溃或确保生成内容的连贯性。'
- en: 'Furthermore, there are numerous areas that involve generative AI applications,
    some of which are listed in the following list:'
  id: totrans-2321
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，还有许多涉及生成式人工智能应用的领域，其中一些列在以下列表中：
- en: Art and music creation
  id: totrans-2322
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 艺术和音乐创作
- en: Data augmentation
  id: totrans-2323
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 数据增强
- en: Style transfer
  id: totrans-2324
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 风格迁移
- en: Text generation
  id: totrans-2325
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 文本生成
- en: Image synthesis
  id: totrans-2326
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 图像合成
- en: Drug discovery
  id: totrans-2327
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 药物发现
- en: '*Art and music creation* includes generating paintings, music, or other forms
    of art.'
  id: totrans-2328
  prefs: []
  type: TYPE_NORMAL
  zh: '*艺术和音乐创作*包括生成绘画、音乐或其他形式的艺术。'
- en: '*Data Augmentation* involves creating additional data for training models,
    especially when the original dataset is limited. *Style transfer* refers to applying
    the style of one image to the content of another. *Text generation* is a very
    popular application of generative AI, which involves creating coherent and contextually
    relevant text. *Image synthesis* is another popular area of generative AI, which
    involves generating realistic images, faces, or even creating scenes for video
    games. *Drug discovery* is a very important facet of generative AI that pertains
    to generating molecular structures for new potential drugs.'
  id: totrans-2329
  prefs: []
  type: TYPE_NORMAL
  zh: '*数据增强*涉及为训练模型创建额外的数据，尤其是在原始数据集有限时。*风格迁移*指的是将一个图像的风格应用到另一个图像的内容上。*文本生成*是生成式人工智能的一个非常流行的应用，它涉及创建连贯且与上下文相关的文本。*图像合成*是生成式人工智能的另一个非常流行的领域，它涉及生成逼真的图像、面孔，甚至为视频游戏创建场景。*药物发现*是生成式人工智能的一个重要方面，涉及生成新潜在药物的分子的结构。'
- en: '**CONVERSATIONAL AI VERSUS GENERATIVE AI**'
  id: totrans-2330
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**对话式人工智能与生成式人工智能**'
- en: Both conversational AI and generative AI are prominent subfields within the
    broader domain of artificial intelligence. However, these subfields have a different
    focus regarding their primary objective, the technologies that they use, and applications.
  id: totrans-2331
  prefs: []
  type: TYPE_NORMAL
  zh: 对话式人工智能和生成式人工智能都是人工智能更广泛领域中的突出子领域。然而，这些子领域在它们的主要目标、使用的科技以及应用方面有不同的重点。
- en: 'The primary differences between the two subfields are as follows:'
  id: totrans-2332
  prefs: []
  type: TYPE_NORMAL
  zh: 两个子领域之间的主要差异如下：
- en: Primary objective
  id: totrans-2333
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 主要目标
- en: Applications
  id: totrans-2334
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 应用
- en: Technologies used
  id: totrans-2335
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用的科技
- en: Training and interaction
  id: totrans-2336
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 训练和交互
- en: Evaluation
  id: totrans-2337
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**评估**'
- en: Data requirements
  id: totrans-2338
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 数据需求
- en: '**Primary Objective**'
  id: totrans-2339
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '**主要目标**'
- en: The main goal of conversational AI is to facilitate human-like interactions
    between machines and humans. This includes chatbots, virtual assistants, and other
    systems that engage in dialogue with users.
  id: totrans-2340
  prefs: []
  type: TYPE_NORMAL
  zh: 对话式人工智能的主要目标是促进机器与人类之间类似人类的交互。这包括聊天机器人、虚拟助手以及其他与用户进行对话的系统。
- en: The primary objective of generative AI is to create new content or data that
    was not in the training set but is similar in structure and style. This can range
    from generating images, music, and text to more complex tasks like video synthesis.
  id: totrans-2341
  prefs: []
  type: TYPE_NORMAL
  zh: 生成式人工智能的主要目标是创建新的内容或数据，这些内容或数据不在训练集中，但在结构和风格上相似。这可以从生成图像、音乐和文本到更复杂的任务，如视频合成。
- en: '**Applications**'
  id: totrans-2342
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '**应用**'
- en: Common applications for conversational AI include customer support chatbots,
    voice-operated virtual assistants (like Siri or Alexa), and interactive voice
    response (IVR) systems.
  id: totrans-2343
  prefs: []
  type: TYPE_NORMAL
  zh: 生成式人工智能的常见应用包括客户支持聊天机器人、语音操作虚拟助手（如Siri或Alexa）以及交互式语音响应（IVR）系统。
- en: Common applications for generative AI have a broad spectrum of applications,
    such as creating art or music, generating realistic video game environments, synthesizing
    voices, and producing realistic images or even deep fakes.
  id: totrans-2344
  prefs: []
  type: TYPE_NORMAL
  zh: 生成式人工智能的常见应用范围广泛，例如创作艺术或音乐、生成逼真的视频游戏环境、合成声音，以及生成逼真的图像甚至深度伪造。
- en: '**Technologies Used**'
  id: totrans-2345
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '**使用的科技**'
- en: Conversational AI often relies on Natural Language Processing (NLP) techniques
    to understand and generate human language. This includes intent recognition, entity
    extraction, and dialogue management.
  id: totrans-2346
  prefs: []
  type: TYPE_NORMAL
  zh: 对话式人工智能通常依赖于自然语言处理（NLP）技术来理解和生成人类语言。这包括意图识别、实体提取和对话管理。
- en: Generative AI commonly utilizes Generative Adversarial Networks (GANs), Variational
    Autoencoders (VAEs), and other generative models to produce new content.
  id: totrans-2347
  prefs: []
  type: TYPE_NORMAL
  zh: 生成式人工智能通常利用生成对抗网络（GANs）、变分自编码器（VAEs）和其他生成模型来生成新内容。
- en: '**Training and Interaction**'
  id: totrans-2348
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '**训练和交互**'
- en: While training can be supervised, semi-supervised, or unsupervised, the primary
    interaction mode for conversational AI is through back-and-forth dialogue or conversation.
  id: totrans-2349
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然训练可以是监督的、半监督的或无监督的，但对话式人工智能的主要交互模式是通过来回对话或交谈。
- en: The training process for generative AI, especially with models like GANs, involves
    iterative processes where the model learns to generate data by trying to fool
    a discriminator into believing the generated data is real.
  id: totrans-2350
  prefs: []
  type: TYPE_NORMAL
  zh: 生成式人工智能的训练过程，特别是使用像GANs这样的模型，涉及迭代过程，其中模型通过试图欺骗判别器相信生成数据是真实的来学习生成数据。
- en: '**Evaluation**'
  id: totrans-2351
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '**评估**'
- en: Conversational AI evaluation metrics often revolve around understanding and
    response accuracy, user satisfaction, and the fluency of generated responses.
  id: totrans-2352
  prefs: []
  type: TYPE_NORMAL
  zh: 对话式人工智能的评估指标通常围绕理解与响应的准确性、用户满意度以及生成响应的流畅性。
- en: Generative AI evaluation metrics for models like GANs can be challenging and
    might involve using a combination of quantitative metrics and human judgment to
    assess the quality of generated content.
  id: totrans-2353
  prefs: []
  type: TYPE_NORMAL
  zh: 对于GANs等模型，生成式AI的评价指标可能具有挑战性，可能需要结合定量指标和人类判断来评估生成内容的品质。
- en: '**Data Requirements**'
  id: totrans-2354
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '**数据需求**'
- en: Data requirements for conversational AI typically involves dialogue data, with
    conversations between humans or between humans and bots.
  id: totrans-2355
  prefs: []
  type: TYPE_NORMAL
  zh: 对话式AI的数据需求通常涉及对话数据，包括人与人之间的对话或人与机器人之间的对话。
- en: Data requirements for generative AI involve large datasets of the kind of content
    it is supposed to generate, such as images, text, or music.
  id: totrans-2356
  prefs: []
  type: TYPE_NORMAL
  zh: 生成式AI的数据需求涉及大量它应该生成的内容的数据集，如图像、文本或音乐。
- en: Although both conversational AI and generative AI deal with generating outputs,
    their primary objectives, applications, and methodologies can differ significantly.
    Conversational AI was developed for interactive communication with users, while
    generative AI was designed to produce new, original content.
  id: totrans-2357
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管对话式AI和生成式AI都涉及生成输出，但它们的主要目标、应用和方法可能存在显著差异。对话式AI是为了与用户进行交互式通信而开发的，而生成式AI是为了产生新的、原创的内容而设计的。
- en: '**IS DALL-E PART OF GENERATIVE AI?**'
  id: totrans-2358
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**DALL-E是否属于生成式AI的一部分？**'
- en: DALL-E and similar tools that generate graphics from text are examples of generative
    AI. In fact, DALL-E is one of the most prominent examples of generative AI in
    the realm of image synthesis.
  id: totrans-2359
  prefs: []
  type: TYPE_NORMAL
  zh: DALL-E以及类似从文本生成图形的工具是生成式AI的例子。实际上，DALL-E是图像合成领域中最突出的生成式AI例子之一。
- en: 'Here is a list of generative characteristics of DALL-E, followed by brief descriptions
    of each bullet item:'
  id: totrans-2360
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是DALL-E的生成特性列表，以及每个项目点的简要描述：
- en: Image generation
  id: totrans-2361
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 图像生成
- en: Learning distributions
  id: totrans-2362
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 学习分布
- en: Innovative combinations
  id: totrans-2363
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 创新组合
- en: Broad applications
  id: totrans-2364
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 广泛应用
- en: Transformer architecture
  id: totrans-2365
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Transformer架构
- en: '*Image generation*: This is a key feature of DALL-E, which was designed to
    generate images based on textual descriptions. Given a prompt like “a two-headed
    flamingo,” DALL-E can produce a novel image that matches the description, even
    if it never had such an image in its training data.'
  id: totrans-2366
  prefs: []
  type: TYPE_NORMAL
  zh: '*图像生成*：这是DALL-E的一个关键特性，它被设计成根据文本描述生成图像。给定一个提示如“一个双头火烈鸟”，DALL-E可以生成一个符合描述的新颖图像，即使它在训练数据中从未有过这样的图像。'
- en: '*Learning distributions*: Like other generative models, DALL-E learns the probability
    distribution of its training data. When it generates an image, it samples from
    this learned distribution to produce visuals that are plausible based on its training.'
  id: totrans-2367
  prefs: []
  type: TYPE_NORMAL
  zh: '*学习分布*：与其他生成模型一样，DALL-E学习其训练数据的概率分布。当它生成图像时，它会从这个学习到的分布中采样，以产生基于其训练的合理视觉。'
- en: '*Innovative combinations*: DALL-E can generate images that represent entirely
    novel or abstract concepts, showcasing its ability to combine and recombine learned
    elements in innovative ways.'
  id: totrans-2368
  prefs: []
  type: TYPE_NORMAL
  zh: '*创新组合*：DALL-E可以生成代表完全新颖或抽象概念的图像，展示了其能够以创新的方式组合和重新组合学习元素的能力。'
- en: '*Broad applications*: In addition to image synthesis, DALL-E has provided broad
    application support in areas like art generation, style blending, and creating
    images with specific attributes or themes, highlighting its versatility as a generative
    tool.'
  id: totrans-2369
  prefs: []
  type: TYPE_NORMAL
  zh: '*广泛应用*：除了图像合成之外，DALL-E还在艺术生成、风格融合以及创建具有特定属性或主题的图像等领域提供了广泛的应用支持，突显了其作为生成工具的多样性。'
- en: '*Transformer architecture*: DALL-E leverages a variant of the transformer architecture,
    similar to models like GPT-3, but has been adapted for image generation tasks.'
  id: totrans-2370
  prefs: []
  type: TYPE_NORMAL
  zh: '*Transformer架构*：DALL-E利用了Transformer架构的变体，类似于GPT-3等模型，但已被调整为适用于图像生成任务。'
- en: Other tools that generate graphics, art, or any form of visual content based
    on input data (whether it is text, another image, or any other form of data) and
    can produce outputs not explicitly present in their training data are also considered
    generative AI. They showcase the capability of AI models to not just analyze and
    classify, but to create and innovate.
  id: totrans-2371
  prefs: []
  type: TYPE_NORMAL
  zh: 其他基于输入数据（无论是文本、另一张图像还是任何其他形式的数据）生成图形、艺术或任何形式视觉内容的工具也被认为是生成式AI。它们展示了AI模型不仅能够分析和分类，还能够创造和创新。
- en: '**ARE CHATGPT-3 AND GPT-4 PART OF GENERATIVE AI?**'
  id: totrans-2372
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**ChatGPT-3和GPT-4是否属于生成式AI的一部分？**'
- en: Both ChatGPT-3 and GPT-4 are LLMs that are considered examples of generative
    AI. They belong to a class of models called “transformers,” which are particularly
    adept at handling sequences of data, such as text-related tasks.
  id: totrans-2373
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT-3和GPT-4都是被认为是生成人工智能的LLMs。它们属于“转换器”模型类别，特别擅长处理数据序列，如文本相关任务。
- en: 'The following list provides various reasons why these LLMs are considered generative,
    followed by a brief description of each item:'
  id: totrans-2374
  prefs: []
  type: TYPE_NORMAL
  zh: 以下列表提供了各种原因，说明为什么这些大型语言模型（LLMs）被认为是生成性的，随后对每个项目进行了简要描述：
- en: Text generation
  id: totrans-2375
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 文本生成
- en: Learning distributions
  id: totrans-2376
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 学习分布
- en: Broad applications
  id: totrans-2377
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 广泛的应用
- en: Unsupervised learning
  id: totrans-2378
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 无监督学习
- en: '*Text Generation*: These models can produce coherent, contextually relevant,
    and often highly sophisticated sequences of text based on given prompts. They
    generate responses that were not explicitly present in their training data but
    are constructed based on the patterns and structures they learned during training.'
  id: totrans-2379
  prefs: []
  type: TYPE_NORMAL
  zh: '*文本生成*：这些模型可以根据给定的提示生成连贯、上下文相关且通常非常复杂的文本序列。它们生成的响应在它们的训练数据中并未明确存在，但基于它们在训练期间学习到的模式和结构构建。'
- en: '*Learning Distributions*: GPT-3, GPT-4, and similar models learn the probability
    distribution of their training data. When generating text, they are essentially
    sampling from this learned distribution to produce sequences that are likely based
    on their training.'
  id: totrans-2380
  prefs: []
  type: TYPE_NORMAL
  zh: '*学习分布*：GPT-3、GPT-4和类似模型学习其训练数据的概率分布。在生成文本时，它们实际上是从这个学习到的分布中进行采样，以产生基于其训练的序列。'
- en: '*Broad Applications*: Beyond just text-based chat or conversation, these models
    can be used for a variety of generative tasks like story writing, code generation,
    poetry, and even creating content in specific styles or mimicking certain authors,
    showcasing their generative capabilities.'
  id: totrans-2381
  prefs: []
  type: TYPE_NORMAL
  zh: '*广泛的应用*：除了基于文本的聊天或对话之外，这些模型还可以用于各种生成任务，如故事写作、代码生成、诗歌，甚至创建特定风格的内容或模仿某些作者，展示了它们的生成能力。'
- en: '*Unsupervised Learning*: While they can be fine-tuned with specific datasets,
    models like GPT-3 are primarily trained in an unsupervised manner on vast amounts
    of text, learning to generate content without requiring explicit labeled data
    for every possible response.'
  id: totrans-2382
  prefs: []
  type: TYPE_NORMAL
  zh: '*无监督学习*：虽然它们可以通过特定数据集进行微调，但像GPT-3这样的模型主要是通过大量文本进行无监督训练，学习生成内容，而不需要为每个可能的响应提供显式的标记数据。'
- en: In essence, ChatGPT-3, GPT-4, and similar models by OpenAI are quintessential
    examples of generative AI in the realm of natural language processing and generation.
  id: totrans-2383
  prefs: []
  type: TYPE_NORMAL
  zh: 从本质上讲，OpenAI的ChatGPT-3、GPT-4以及类似的模型是自然语言处理和生成领域中生成人工智能的典范。
- en: The next several sections briefly introduce some of the companies that have
    a strong presence in the AI world.
  id: totrans-2384
  prefs: []
  type: TYPE_NORMAL
  zh: 下几节简要介绍了一些在人工智能领域具有强大影响力的公司。
- en: '**DEEPMIND**'
  id: totrans-2385
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**DEEPMIND**'
- en: DeepMind has made significant contributions to AI, which includes the creation
    of various AI systems. DeepMind was established in 2010 and became a subsidiary
    of Google 2014, and its home page is at *[https://deepmind.com/](https://deepmind.com/).*
  id: totrans-2386
  prefs: []
  type: TYPE_NORMAL
  zh: DeepMind在人工智能领域做出了重大贡献，包括创建各种人工智能系统。DeepMind成立于2010年，并于2014年成为谷歌的子公司，其主页为*[https://deepmind.com/](https://deepmind.com/)*。
- en: DeepMind created the 280 GB language model Gopher that significantly outperforms
    its competitors, including GPT-3, J1-Jumbo, and MT-NLG. DeepMind also developed
    AlphaFold, which solved a protein folding task that had eluded researchers for
    ten years in only 30 minutes. Moreover, DeepMind made AlphaFold available for
    free for everyone in July 2021\. DeepMind has made significant contributions in
    the development of world-caliber AI game systems, some of which are discussed
    in the next section.
  id: totrans-2387
  prefs: []
  type: TYPE_NORMAL
  zh: DeepMind创建了280 GB的语言模型Gopher，其性能显著优于其竞争对手，包括GPT-3、J1-Jumbo和MT-NLG。DeepMind还开发了AlphaFold，该系统在仅用30分钟内解决了困扰研究人员十年的蛋白质折叠问题。此外，DeepMind在2021年7月将AlphaFold免费提供给每个人。DeepMind在开发世界级人工智能游戏系统方面做出了重大贡献，其中一些将在下一节中讨论。
- en: '**DeepMind and Games**'
  id: totrans-2388
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '**DeepMind与游戏**'
- en: DeepMind is the force behind the AI systems AlphaStar and AlphaGo that defeated
    the best human players in Go (which is considerably more difficult than chess).
    These games provide “perfect information,” whereas games with “imperfect information”
    (such as poker) have posed a challenge for ML models.
  id: totrans-2389
  prefs: []
  type: TYPE_NORMAL
  zh: DeepMind是AI系统AlphaStar和AlphaGo背后的力量，这些系统击败了围棋（比象棋更难）的最佳人类玩家。这些游戏提供“完美信息”，而“不完美信息”游戏（如扑克）对机器学习模型构成了挑战。
- en: AlphaGo Zero (the successor of AlphaGo) mastered the game through self-play
    in less time and with less computing power than AlphaGo. AlphaGo Zero exhibited
    extraordinary performance by defeating AlphaGo 100–0\. Another powerful system
    is AlphaZero, which also used a self-play technique learned to play Go, chess,
    and shogi, and achieved SOTA (State-of-the-Art) performance results.
  id: totrans-2390
  prefs: []
  type: TYPE_NORMAL
  zh: AlphaGo Zero（AlphaGo的后继者）在更短的时间内，使用比AlphaGo更少的计算能力掌握了游戏。AlphaGo Zero通过以100-0的成绩击败AlphaGo，展现了非凡的表现。另一个强大的系统是AlphaZero，它也使用了自我对弈技术来学习围棋、象棋和国际象棋，并实现了SOTA（最高水平）的性能结果。
- en: By way of comparison, ML models that use a tree search are well-suited for games
    with perfect information. By contrast, games with imperfect information (such
    as poker) involve hidden information that can be leveraged to devise counter strategies
    to counteract the strategies of opponents. In particular, AlphaStar is capable
    of playing against the best players of StarCraft II, and it became the first AI
    to achieve SOTA results in a game that requires so-called “strategic capability.”
  id: totrans-2391
  prefs: []
  type: TYPE_NORMAL
  zh: 通过比较，使用树搜索的ML模型非常适合完美信息游戏。相比之下，不完美信息游戏（如扑克）涉及隐藏信息，可以利用这些信息制定对抗策略来对抗对手的策略。特别是，AlphaStar能够与星际争霸II的最佳玩家对战，并成为第一个在需要所谓“战略能力”的游戏中实现SOTA结果的AI。
- en: '**Player of Games (PoG)**'
  id: totrans-2392
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '**玩家游戏（PoG**）'
- en: 'The DeepMind team at Google devised the general-purpose PoG (Player of Games)
    algorithm that is based on the following techniques:'
  id: totrans-2393
  prefs: []
  type: TYPE_NORMAL
  zh: 谷歌DeepMind团队设计了基于以下技术的通用PoG（玩家游戏）算法：
- en: CFR (counterfactual regret minimization)
  id: totrans-2394
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: CFR（反事实后悔最小化）
- en: CVPN (counterfactual value-and-policy network)
  id: totrans-2395
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: CVPN（反事实值和政策网络）
- en: GT-CFT (growing tree CFR)
  id: totrans-2396
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: GT-CFT（增长树CFR）
- en: CVPN
  id: totrans-2397
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: CVPN
- en: The counterfactual value-and-policy network (CVPN) is a neural network that
    calculates the counterfactuals for each state belief in the game. This is key
    to evaluating the different variants of the game at any given time.
  id: totrans-2398
  prefs: []
  type: TYPE_NORMAL
  zh: 反事实值和政策网络（CVPN）是一个神经网络，它计算游戏中每个状态信念的反事实。这在评估任何给定时间点的游戏的不同变体时是关键。
- en: 'Growing tree CFR (GT-CFR) is a variation of CFR that is optimized for game-trees
    trees that grow over time. GT-CFR is based on two fundamental phases, which is
    discussed in more detail online:'
  id: totrans-2399
  prefs: []
  type: TYPE_NORMAL
  zh: 增长树CFR（GT-CFR）是CFR的一种变体，它优化了随时间增长的博弈树。GT-CFR基于两个基本阶段，更多细节可在网上找到：
- en: '*[https://medium.com/syncedreview/deepminds-pog-excels-in-perfect-and-imperfect-information-games-advancing-research-on-general-9dbad5c04221](https://medium.com/syncedreview/deepminds-pog-excels-in-perfect-and-imperfect-information-games-advancing-research-on-general-9dbad5c04221)*'
  id: totrans-2400
  prefs: []
  type: TYPE_NORMAL
  zh: '*[https://medium.com/syncedreview/deepminds-pog-excels-in-perfect-and-imperfect-information-games-advancing-research-on-general-9dbad5c04221](https://medium.com/syncedreview/deepminds-pog-excels-in-perfect-and-imperfect-information-games-advancing-research-on-general-9dbad5c04221)*'
- en: '**OPENAI**'
  id: totrans-2401
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**OPENAI**'
- en: OpenAI is an AI research company that has made significant contributions to
    AI, including DALL-E and ChatGPT, and its home page is at *[https://openai.com/api/](https://openai.com/api/)*.
  id: totrans-2402
  prefs: []
  type: TYPE_NORMAL
  zh: OpenAI是一家对AI做出了重大贡献的人工智能研究公司，包括DALL-E和ChatGPT，其主页为*[https://openai.com/api/](https://openai.com/api/)*。
- en: OpenAI was founded in San Francisco by Elon Musk and Sam Altman (as well as
    others), and one of its stated goals is to develop AI that benefits humanity.
    Given Microsoft’s massive investments in, and deep alliance with, the organization,
    OpenAI might be viewed as part of Microsoft. OpenAI is the creator of the GPT-x
    series of LLMs as well as ChatGPT, which was made available on November 30, 2022.
  id: totrans-2403
  prefs: []
  type: TYPE_NORMAL
  zh: OpenAI由埃隆·马斯克和山姆·奥特曼（以及其他一些人）在旧金山创立，其一个明确的目标是开发对人类有益的AI。鉴于微软对该组织的大量投资和深度联盟，OpenAI可能被视为微软的一部分。OpenAI是GPT-x系列LLM以及ChatGPT的创造者，ChatGPT于2022年11月30日发布。
- en: OpenAI made GPT-3 commercially available via API for use across applications,
    charging on a per-word basis. GPT-3 was announced in July 2020, and was available
    through a beta program. Then, in November 2021, OpenAI made GPT-3 open to everyone;
    more details can be found at *[https://openai.com/blog/api-no-waitlist/](https://openai.com/blog/api-no-waitlist/).*
  id: totrans-2404
  prefs: []
  type: TYPE_NORMAL
  zh: OpenAI通过API将GPT-3商业化，按字收费，用于各种应用。GPT-3于2020年7月宣布，并通过beta计划提供。然后，在2021年11月，OpenAI将GPT-3向所有人开放；更多详情请见*[https://openai.com/blog/api-no-waitlist/](https://openai.com/blog/api-no-waitlist/)*。
- en: In addition, OpenAI developed DALL-E, which generates images from text. OpenAI
    initially did not permit users to upload images that contained realistic faces.
    Later, OpenAI changed its policy to allow users to upload faces into its online
    system. (Check the OpenAI Web page for more details.) Incidentally, diffusion
    models have superseded the benchmarks of DALL-E.
  id: totrans-2405
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，OpenAI 开发了 DALL-E，它可以从文本生成图像。最初，OpenAI 并不允许用户上传包含真实人脸的图像。后来，OpenAI 改变了其政策，允许用户将其人脸上传到其在线系统中。（有关更多详细信息，请查看
    OpenAI 网页。）顺便提一下，扩散模型已经取代了 DALL-E 的基准。
- en: 'OpenAI has also released a public beta of Embeddings, which is a data format
    that is suitable for various types of tasks with machine learning:'
  id: totrans-2406
  prefs: []
  type: TYPE_NORMAL
  zh: OpenAI 还发布了一个公开的 Embeddings 测试版，这是一种适合各种机器学习任务的格式：
- en: '*[https://beta.openai.com/docs/guides/embeddings](https://beta.openai.com/docs/guides/embeddings)*'
  id: totrans-2407
  prefs: []
  type: TYPE_NORMAL
  zh: '*[https://beta.openai.com/docs/guides/embeddings](https://beta.openai.com/docs/guides/embeddings)*'
- en: OpenAI is the creator of Codex, which provides a set of models that were trained
    on NLP. The initial release of Codex was in private beta; more information is
    available at *[https://beta.openai.com/docs/engines/instruct-series-beta](https://beta.openai.com/docs/engines/instruct-series-beta)*.
  id: totrans-2408
  prefs: []
  type: TYPE_NORMAL
  zh: OpenAI 是 Codex 的创造者，它提供了一组在 NLP 上训练的模型。Codex 的初始发布是在私人测试版中；更多信息可在 *[https://beta.openai.com/docs/engines/instruct-series-beta](https://beta.openai.com/docs/engines/instruct-series-beta)*
    上找到。
- en: OpenAI provides four models that are collectively called their *Instruct models*,
    which support the ability of GPT-3 to generate natural language. These models
    will be deprecated in early January 2024, and replaced with updated versions of
    GPT-3, ChatGPT, and GPT-4.
  id: totrans-2409
  prefs: []
  type: TYPE_NORMAL
  zh: OpenAI 提供了四个模型，统称为他们的 *Instruct 模型*，这些模型支持 GPT-3 生成自然语言的能力。这些模型将在 2024 年初的早期被弃用，并替换为
    GPT-3、ChatGPT 和 GPT-4 的更新版本。
- en: 'If you want to learn more about the features and services that OpenAI offers,
    navigate to the following link: *[https://platform.openai.com/overview](https://platform.openai.com/overview)*.'
  id: totrans-2410
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您想了解更多关于 OpenAI 提供的功能和服务，请访问以下链接：*[https://platform.openai.com/overview](https://platform.openai.com/overview)*。
- en: '**COHERE**'
  id: totrans-2411
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**COHERE**'
- en: Cohere is a start-up and a competitor of OpenAI, and its home page is available
    at *[https://cohere.ai/](https://cohere.ai/)*.
  id: totrans-2412
  prefs: []
  type: TYPE_NORMAL
  zh: Cohere 是一家初创公司，也是 OpenAI 的竞争对手，其主页可在 *[https://cohere.ai/](https://cohere.ai/)*
    上找到。
- en: 'Cohere develops cutting-edge NLP technology that is commercially available
    for multiple industries. Cohere is focused on models that perform textual analysis
    instead of models for text generation (such as GPT-based models). The founding
    team of Cohere is impressive: CEO Aidan Gomez is one of the co-inventors of the
    transformer architecture, and CTO Nick Frosst is a protege of Geoff Hinton.'
  id: totrans-2413
  prefs: []
  type: TYPE_NORMAL
  zh: Cohere 开发了适用于多个行业的尖端 NLP 技术，这些技术可以商业使用。Cohere 专注于执行文本分析的模型，而不是文本生成模型（如基于 GPT
    的模型）。Cohere 的创始团队令人印象深刻：CEO Aidan Gomez 是 transformer 架构的共同发明者之一，而 CTO Nick Frosst
    是 Geoffrey Hinton 的门生。
- en: '**HUGGING FACE**'
  id: totrans-2414
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**HUGGING FACE**'
- en: Hugging Face is a popular community-based repository for open-source NLP technology,
    and its home page is at *[https://github.com/huggingface](https://github.com/huggingface)*.
  id: totrans-2415
  prefs: []
  type: TYPE_NORMAL
  zh: Hugging Face 是一个流行的基于社区的开放源代码 NLP 技术仓库，其主页位于 *[https://github.com/huggingface](https://github.com/huggingface)*。
- en: Unlike OpenAI or Cohere, Hugging Face does not build its own NLP models. Instead,
    Hugging Face is a platform that manages a plethora of open-source NLP models that
    customers can fine-tune and then deploy. Indeed, Hugging Face has become the eminent
    location for people to collaborate on NLP models and is sometimes described as
    “GitHub for machine learning and NLP.”
  id: totrans-2416
  prefs: []
  type: TYPE_NORMAL
  zh: 与 OpenAI 或 Cohere 不同，Hugging Face 并不构建自己的 NLP 模型。相反，Hugging Face 是一个平台，管理着大量的开源
    NLP 模型，客户可以对这些模型进行微调然后部署。实际上，Hugging Face 已经成为人们协作开发 NLP 模型的著名地点，有时也被称为“机器学习和
    NLP 的 GitHub。”
- en: '**Hugging Face Libraries**'
  id: totrans-2417
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '**Hugging Face 库**'
- en: 'Hugging Face provides three important libraries: datasets, tokenizers, and
    transformers. The Accelerate library supports PyTorch models. The datasets library
    provides an assortment of libraries for NLP. The tokenizers library enables you
    to convert text data to numeric values.'
  id: totrans-2418
  prefs: []
  type: TYPE_NORMAL
  zh: Hugging Face 提供了三个重要的库：datasets、tokenizers 和 transformers。Accelerate 库支持 PyTorch
    模型。datasets 库提供了一系列 NLP 库。tokenizers 库允许您将文本数据转换为数值。
- en: Perhaps the most impressive library is the transformers library, which provides
    an enormous set of pre-trained BERT-based models to perform a wide variety of
    NLP tasks. The Github repository is at [https://github.com/huggingface/transformers](https://github.com/huggingface/transformers).
  id: totrans-2419
  prefs: []
  type: TYPE_NORMAL
  zh: 可能最令人印象深刻的是 transformers 库，它提供了一整套基于预训练的 BERT 模型，可以执行各种 NLP 任务。GitHub 仓库位于 [https://github.com/huggingface/transformers](https://github.com/huggingface/transformers)。
- en: '**Hugging Face Model Hub**'
  id: totrans-2420
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '**Hugging Face 模型中心**'
- en: 'Hugging Face offers a model hub that provides a plethora of models that are
    accessible online. Moreover, the website supports online testing of its models,
    which includes the following tasks:'
  id: totrans-2421
  prefs: []
  type: TYPE_NORMAL
  zh: Hugging Face 提供了一个模型中心，提供大量可在线访问的模型。此外，该网站支持其模型的在线测试，包括以下任务：
- en: Masked word completion with BERT
  id: totrans-2422
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用 BERT 进行掩码词填充
- en: Name Entity Recognition with Electra
  id: totrans-2423
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用 Electra 进行命名实体识别
- en: Natural Language Inference with RoBERTa
  id: totrans-2424
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用 RoBERTa 进行自然语言推理
- en: Question answering with DistilBERT
  id: totrans-2425
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用 DistilBERT 进行问答
- en: Summarization with BART
  id: totrans-2426
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用 BART 进行总结
- en: Text generation with GPT-2
  id: totrans-2427
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用 GPT-2 进行文本生成
- en: Translation with T5
  id: totrans-2428
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用 T5 进行翻译
- en: Navigate to the following link to see the text generation capabilities of “write
    with transformer:” *[https://transformer.huggingface.co](https://transformer.huggingface.co)*.
  id: totrans-2429
  prefs: []
  type: TYPE_NORMAL
  zh: 通过以下链接导航以查看“使用 transformer：write”的文本生成能力：*[https://transformer.huggingface.co](https://transformer.huggingface.co)*。
- en: Later, you will see Python code samples that show how to list all the available
    Hugging Face datasets, as well as how to load a specific dataset.
  id: totrans-2430
  prefs: []
  type: TYPE_NORMAL
  zh: 之后，您将看到一些 Python 代码示例，展示如何列出所有可用的 Hugging Face 数据集，以及如何加载特定数据集。
- en: '**AI21**'
  id: totrans-2431
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**AI21**'
- en: AI21 is a company that provides proprietary large language models via API to
    support the applications of its customers. The current SOTA model of AI21 is called
    Jurassic-1 (roughly the same size as GPT-3), and AI21 also creates its own applications
    on top of Jurassic-1 and other models. The current application suite of AI21 involves
    tools that can augment reading and writing.
  id: totrans-2432
  prefs: []
  type: TYPE_NORMAL
  zh: AI21 是一家通过 API 提供专有大型语言模型以支持其客户应用的公司。AI21 的当前 SOTA 模型被称为 Jurassic-1（与 GPT-3
    大小大致相同），AI21 还在 Jurassic-1 和其他模型之上创建了其自己的应用。AI21 的当前应用套件包括可以增强阅读和写作的工具。
- en: Primer is an older competitor in this space, founded two years before the invention
    of the transformer. The company primarily serves clients in government and defense.
  id: totrans-2433
  prefs: []
  type: TYPE_NORMAL
  zh: Primer 是这个领域的一个较老的竞争对手，在 transformer 发明之前两年成立。该公司主要服务于政府和防务行业的客户。
- en: '**INFLECTIONAI**'
  id: totrans-2434
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**INFLECTIONAI**'
- en: A more recent company in the AI field is InflectionAI, whose highly impressive
    founding team includes
  id: totrans-2435
  prefs: []
  type: TYPE_NORMAL
  zh: 在 AI 领域中，InflectionAI 是一家较新的公司，其令人印象深刻的核心团队包括
- en: Reid Hoffman (LinkedIn)
  id: totrans-2436
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Reid Hoffman（LinkedIn）
- en: DeepMind cofounder Mustafa Suleyman
  id: totrans-2437
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: DeepMind 联合创始人 Mustafa Suleyman
- en: DeepMind researcher Karen Simonyan
  id: totrans-2438
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: DeepMind 研究员 Karen Simonyan
- en: 'InflectionAI is committed to a challenging task: enabling humans to interact
    with computers in much the same way that humans communicate with each other.'
  id: totrans-2439
  prefs: []
  type: TYPE_NORMAL
  zh: InflectionAI 致力于一项具有挑战性的任务：使人类能够以与人类相互沟通相同的方式与计算机互动。
- en: '**ANTHROPIC**'
  id: totrans-2440
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**ANTHROPIC**'
- en: Anthropic was created in 2021 by former employees of OpenAI, and its home page
    is at *[https://www.anthropic.com/](https://www.anthropic.com/)*.
  id: totrans-2441
  prefs: []
  type: TYPE_NORMAL
  zh: Anthropic 是由 OpenAI 前员工于 2021 年创建的，其主页位于 *[https://www.anthropic.com/](https://www.anthropic.com/)*。
- en: Anthropic has significant financial support from an assortment of companies,
    including Google and Salesforce. As this book goes to print, Anthropic released
    Claude-2 as a competitor to ChatGPT. Expect Anthropic to make its API available
    by Q4 of 2023.
  id: totrans-2442
  prefs: []
  type: TYPE_NORMAL
  zh: Anthropic 从包括 Google 和 Salesforce 在内的一系列公司获得了重要的财务支持。随着本书的印刷，Anthropic 发布了 Claude-2
    作为 ChatGPT 的竞争对手。预计 Anthropic 将在 2023 年第四季度之前使其 API 可用。
- en: Claude-2 has the ability to summarize as much as 75,000 words of text-based
    content, whereas ChatGPT currently has a limit of 3,000 words. Moreover, Claude-2
    achieved a score of 76.5% on portions of the bar exam and 71% in a coding test.
    Claude-2 also has a higher rate than ChatGPT in terms of providing “clean” responses
    to queries from users.
  id: totrans-2443
  prefs: []
  type: TYPE_NORMAL
  zh: Claude-2 能够总结多达 75,000 个单词的文本内容，而 ChatGPT 目前限制为 3,000 个单词。此外，Claude-2 在部分律师资格考试中取得了
    76.5% 的分数，在编码测试中取得了 71% 的分数。Claude-2 在向用户查询提供“干净”的回复方面也比 ChatGPT 的比率更高。
- en: This concludes the portion of the chapter regarding the AI companies that are
    making important contributions in AI. The next section provides a high-level introduction
    to LLMs (large language models).
  id: totrans-2444
  prefs: []
  type: TYPE_NORMAL
  zh: 这部分章节关于在 AI 领域做出重要贡献的 AI 公司的内容到此结束。下一节将提供对大型语言模型（LLMs）的高级介绍。
- en: '**WHAT IS PROMPT ENGINEERING?**'
  id: totrans-2445
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**什么是提示工程？**'
- en: 'Text generators such as GPT-3 and DALL-E 2 from OpenAI, Jurassic from AI21,
    Midjourney, and Stable Diffusion that can perform text-to-image generation. *Prompt
    engineering* refers to devising text-based prompts that enable AI-based systems
    to improve the output that is generated, which means that the output more closely
    matches whatever users want to produce from AI systems. By way of analogy, think
    of prompts as similar to the role of coaches: they offer advice and suggestions
    to help people perform better in their given tasks.'
  id: totrans-2446
  prefs: []
  type: TYPE_NORMAL
  zh: 文本生成器，如OpenAI的GPT-3和DALL-E 2、AI21的Jurassic、Midjourney和Stable Diffusion，它们可以进行文本到图像的生成。*提示工程*指的是设计基于文本的提示，使基于AI的系统能够改进生成的输出，这意味着输出更接近用户从AI系统中想要产生的结果。通过类比，将提示视为类似教练的角色：他们提供建议和意见，帮助人们在特定任务中表现更好。
- en: Since prompts are based on words, the challenge involves learning how different
    words can affect the generated output. Moreover, it is difficult to predict how
    systems respond to a given prompt. For instance, if you want to generate a landscape,
    the difference between a dark landscape and a bright landscape is intuitive. However,
    if you want a beautiful landscape, how would an AI system generate a corresponding
    image? As you can surmise, concrete words are easier than abstract or subjective
    words for AI systems that generate images from text. Just to add more detail to
    the previous example, how would you visualize the following?
  id: totrans-2447
  prefs: []
  type: TYPE_NORMAL
  zh: 由于提示基于单词，挑战在于学习不同单词如何影响生成的输出。此外，预测系统对给定提示的反应也很困难。例如，如果你想生成一幅风景画，暗色调风景和亮色调风景之间的区别是直观的。然而，如果你想得到一幅美丽的风景画，AI系统会如何生成相应的图像？正如你可以推测的那样，对于从文本生成图像的AI系统来说，具体词汇比抽象或主观词汇更容易。为了更详细地说明前面的例子，你将如何可视化以下内容？
- en: A beautiful landscape
  id: totrans-2448
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一幅美丽的风景
- en: A beautiful song
  id: totrans-2449
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一首美丽的歌曲
- en: A beautiful movie
  id: totrans-2450
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一部美丽的电影
- en: 'Although prompt engineering started with text-to-image generation, there are
    other types of prompt engineering, such as audio-based prompts that interpret
    emphasized text and emotions that are detected in speech, and sketch-based prompts
    that generate images from drawings. The most recent focus of attention involves
    text-based prompts for generating videos, which presents exciting opportunities
    for artists and designers. An example of image-to-image processing is accessible
    online:'
  id: totrans-2451
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管提示工程始于文本到图像的生成，但还有其他类型的提示工程，例如基于音频的提示，它解释了在语音中检测到的强调文本和情绪，以及基于草图生成图像的提示。最近关注的焦点涉及用于生成视频的基于文本的提示，这为艺术家和设计师提供了令人兴奋的机会。一个图像到图像处理的例子可以在网上找到：
- en: '*[https://huggingface.co/spaces/fffiloni/stable-diffusion-color-sketch](https://huggingface.co/spaces/fffiloni/stable-diffusion-color-sketch)*'
  id: totrans-2452
  prefs: []
  type: TYPE_NORMAL
  zh: '*[https://huggingface.co/spaces/fffiloni/stable-diffusion-color-sketch](https://huggingface.co/spaces/fffiloni/stable-diffusion-color-sketch)*'
- en: '**Prompts and Completions**'
  id: totrans-2453
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '**提示和完成**'
- en: A *prompt* is a text string that users provide to LLMs, and a *completion* is
    the text that users receive from LLMs. Prompts assist LLMs in completing a request
    (task), and they can vary in length. Although prompts can be any text string,
    including a random string, the quality and structure of prompts affects the quality
    of completions.
  id: totrans-2454
  prefs: []
  type: TYPE_NORMAL
  zh: '*提示*是用户提供给LLM的文本字符串，*完成*是用户从LLM收到的文本。提示帮助LLM完成请求（任务），它们的长度可以不同。尽管提示可以是任何文本字符串，包括随机字符串，但提示的质量和结构会影响完成的质量。'
- en: Think of prompts as a mechanism for giving “guidance” to LLMs, or even as a
    way to “coach” LLMs into providing desired answers. Keep in mind that the number
    of tokens in a prompt plus the number of tokens in the completion can be at most
    2,048 tokens.
  id: totrans-2455
  prefs: []
  type: TYPE_NORMAL
  zh: 将提示视为向LLM（大型语言模型）提供“指导”的机制，或者甚至将其视为一种“教练”LLM以提供所需答案的方式。请记住，提示中的标记数加上完成中的标记数最多为2,048个标记。
- en: '**Types of Prompts**'
  id: totrans-2456
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '**提示类型**'
- en: 'The following list contains well-known types prompts for LLMs:'
  id: totrans-2457
  prefs: []
  type: TYPE_NORMAL
  zh: 以下列表包含了一些LLM（大型语言模型）常用的提示类型：
- en: zero-shot prompts
  id: totrans-2458
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 零样本提示
- en: one-shot prompts
  id: totrans-2459
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 单样本提示
- en: few-shot prompts
  id: totrans-2460
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 少样本提示
- en: instruction prompts
  id: totrans-2461
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 指令提示
- en: '**NOTE** *The first three prompts in the preceding list are also called “zero-shot
    learning,” “one-shot learning,” and “few-shot learning,” respectively.*'
  id: totrans-2462
  prefs: []
  type: TYPE_NORMAL
  zh: '**注意** *前面列表中的前三个提示分别被称为“零样本学习”、“单样本学习”和“少样本学习”。*'
- en: 'A *zero-shot prompt* contains a description of a task, whereas a *one-shot
    prompt* consists of a single example for completing a task. As you can probably
    surmise, *few-shot prompts* consist of multiple examples (typically between 10
    and 100). In all cases, a clear description of the task or tasks is recommended:
    more tasks provide GPT-3 with more information, which in turn can lead to more
    accurate completions.'
  id: totrans-2463
  prefs: []
  type: TYPE_NORMAL
  zh: '*零样本提示*包含对任务的描述，而*单样本提示*由完成任务的单一示例组成。如你所能推测，*少样本提示*由多个示例组成（通常在10到100个之间）。在所有情况下，都建议提供对任务或任务的清晰描述：更多的任务为GPT-3提供更多信息，这反过来又可能导致更准确的完成。'
- en: 'T0 (for “zero shot”) is an interesting LLM: although T0 is 16 times smaller
    (11 GB) than GPT-3 (175 GB), T0 has outperformed GPT-3 on language-related tasks.
    T0 can perform well on unseen NLP tasks (i.e., tasks that are new to T0) because
    it was trained on a dataset containing multiple tasks.'
  id: totrans-2464
  prefs: []
  type: TYPE_NORMAL
  zh: T0（代表“零样本”）是一个有趣的LLM：尽管T0比GPT-3小16倍（11 GB），但在语言相关任务上T0的表现超过了GPT-3。T0可以在未见过的NLP任务上表现良好（即，对T0来说是新任务），因为它是在包含多个任务的训练数据集上训练的。
- en: 'The following URL provides the Github repository for T0, a Web page for training
    T0 directly in a browser, and a 3 GB version of T0:'
  id: totrans-2465
  prefs: []
  type: TYPE_NORMAL
  zh: 以下URL提供了T0的GitHub仓库，一个可以直接在浏览器中训练T0的网页，以及T0的3 GB版本：
- en: '*[https://github.com/bigscience-workshop/t-zero](https://github.com/bigscience-workshop/t-zero)*'
  id: totrans-2466
  prefs: []
  type: TYPE_NORMAL
  zh: '*[https://github.com/bigscience-workshop/t-zero](https://github.com/bigscience-workshop/t-zero)*'
- en: As you can probably surmise, T0++ is based on T0, and it was trained with extra
    tasks beyond the set of tasks on which T0 was trained.
  id: totrans-2467
  prefs: []
  type: TYPE_NORMAL
  zh: 如你所能推测，T0++ 基于T0，并且它是在T0训练的任务集之外额外训练的。
- en: '**Instruction Prompts**'
  id: totrans-2468
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '**指令提示**'
- en: '*Instruction prompts* are used for fine tuning LLMs, and they specify a format
    (determined by you) for the manner in which the LLM is expected to conform in
    its responses. You can prepare your own instruction prompts or you can access
    prompt template libraries that contain different templates for different tasks,
    along with different data sets. Various prompt instruction templates are publicly
    available, such as the following links that provide prompt templates for Llama:'
  id: totrans-2469
  prefs: []
  type: TYPE_NORMAL
  zh: '*指令提示*用于微调大型语言模型（LLMs），并指定LLM在响应中应遵守的格式（由你确定）。你可以准备自己的指令提示，或者你可以访问包含不同任务和不同数据集的不同模板的提示模板库。各种提示指令模板公开可用，例如以下链接提供了Llama的提示模板：'
- en: '*[https://github.com/devbrones/llama-prompts](https://github.com/devbrones/llama-prompts)*'
  id: totrans-2470
  prefs: []
  type: TYPE_NORMAL
  zh: '*[https://github.com/devbrones/llama-prompts](https://github.com/devbrones/llama-prompts)*'
- en: '*[https://pub.towardsai.net/llama-gpt4all-simplified-local-chatgpt-ab7d28d34923](https://pub.towardsai.net/llama-gpt4all-simplified-local-chatgpt-ab7d28d34923)*'
  id: totrans-2471
  prefs: []
  type: TYPE_NORMAL
  zh: '*[https://pub.towardsai.net/llama-gpt4all-simplified-local-chatgpt-ab7d28d34923](https://pub.towardsai.net/llama-gpt4all-simplified-local-chatgpt-ab7d28d34923)*'
- en: '**Reverse Prompts**'
  id: totrans-2472
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '**反向提示**'
- en: 'Another technique reverses the order of prompts and completions: *input prompts*
    are answers, and the *responses* are the questions associated with the answers
    (similar to a popular game show). For example, given a French sentence, you might
    ask the model, “What English text might have resulted in this French translation?”'
  id: totrans-2473
  prefs: []
  type: TYPE_NORMAL
  zh: 另一种技术是反转提示和完成的顺序：*输入提示*是答案，而*响应*是与答案相关的提问（类似于一个流行的游戏节目）。例如，给定一个法语句子，你可能会问模型，“什么英语文本可能导致了这个法语翻译？”
- en: '**System Prompts Versus Agent Prompts**'
  id: totrans-2474
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '**系统提示与代理提示**'
- en: The distinction between a system prompt and an agent prompt often comes up in
    the context of conversational AI systems and chatbot design.
  id: totrans-2475
  prefs: []
  type: TYPE_NORMAL
  zh: 在对话式人工智能系统和聊天机器人设计的情况下，系统提示和代理提示之间的区别经常被提及。
- en: 'A *system prompt* is typically an initial message or cue given by the system
    to guide the user on what they can do or to set expectations about the interaction.
    It often serves as an introduction or a way to guide users on how to proceed.
    Here are some examples of system prompts:'
  id: totrans-2476
  prefs: []
  type: TYPE_NORMAL
  zh: '*系统提示*通常是系统给出的初始消息或提示，以指导用户可以做什么或设定对交互的期望。它通常作为介绍或指导用户如何进行的方式。以下是一些系统提示的例子：'
- en: '[PRE453]'
  id: totrans-2477
  prefs: []
  type: TYPE_PRE
  zh: '[PRE453]'
- en: 'By contrast, an *agent prompt* is a message generated by the AI model or agent
    in response to a user’s input during the course of an interaction. It is a part
    of the back-and-forth exchange within the conversation. The agent prompt guides
    the user to provide more information, clarifies ambiguity, or nudges the user
    towards a specific action. Here are some examples of agent prompts:'
  id: totrans-2478
  prefs: []
  type: TYPE_NORMAL
  zh: 相比之下，*代理提示* 是在交互过程中，AI 模型或代理根据用户输入生成的消息。它是对话中来回交流的一部分。代理提示引导用户提供更多信息，澄清歧义，或将用户推向特定的行动。以下是一些代理提示的例子：
- en: '[PRE454]'
  id: totrans-2479
  prefs: []
  type: TYPE_PRE
  zh: '[PRE454]'
- en: The fundamental difference between the two is their purpose and placement in
    the interaction. A system prompt is often at the beginning of an interaction,
    setting the stage for the conversation. An agent prompt occurs during the conversation,
    steering the direction of the dialogue based on user input.
  id: totrans-2480
  prefs: []
  type: TYPE_NORMAL
  zh: 这两种之间的基本区别在于它们的目的和在交互中的位置。系统提示通常位于交互的开始，为对话设定场景。代理提示在对话过程中出现，根据用户输入引导对话的方向。
- en: Both types of prompts are crucial for creating a fluid and intuitive conversational
    experience for users. They guide the user and help ensure that the system understands
    and addresses the user’s needs effectively.
  id: totrans-2481
  prefs: []
  type: TYPE_NORMAL
  zh: 这两种提示类型对于创建流畅直观的用户对话体验至关重要。它们引导用户，并有助于确保系统有效地理解和解决用户的需求。
- en: '**Prompt Templates**'
  id: totrans-2482
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '**提示模板**'
- en: '*Prompt templates* are predefined formats or structures used to instruct a
    model or system to perform a specific task. They serve as a foundation for generating
    prompts, where certain parts of the template can be filled in or customized to
    produce a variety of specific prompts. By way of analogy, prompt templates are
    the counterpart to macros that you can define in some text editors.'
  id: totrans-2483
  prefs: []
  type: TYPE_NORMAL
  zh: '*提示模板* 是用于指导模型或系统执行特定任务的预定义格式或结构。它们是生成提示的基础，其中模板的某些部分可以填充或定制以产生各种特定的提示。通过类比，提示模板是您可以在某些文本编辑器中定义的宏的对立面。'
- en: Prompt templates are especially useful when working with language models, as
    they provide a consistent way to query the model across multiple tasks or data
    points. In particular, prompt templates can make it easier to
  id: totrans-2484
  prefs: []
  type: TYPE_NORMAL
  zh: 提示模板在处理语言模型时特别有用，因为它们提供了一种在多个任务或数据点查询模型的一致方式。特别是，提示模板可以更容易地
- en: ensure consistency when querying a model multiple times
  id: totrans-2485
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 确保在多次查询模型时的一致性
- en: facilitate batch processing or automation
  id: totrans-2486
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 促进批量处理或自动化
- en: reduce errors and variations in how questions are posed to the model
  id: totrans-2487
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 减少提问给模型时的错误和变化
- en: 'As an example, suppose you are working with an LLM, and you want to translate
    English sentences into French. An associated prompt template could be the following:'
  id: totrans-2488
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，假设您正在使用一个大型语言模型（LLM），并且您想将英语句子翻译成法语。相关的提示模板可能如下所示：
- en: '“Translate the following English sentence into French: {sentence}”'
  id: totrans-2489
  prefs: []
  type: TYPE_NORMAL
  zh: “将以下英语句子翻译成法语：{sentence}”
- en: Note that {sentence} is a placeholder that you can replace with any English
    sentence.
  id: totrans-2490
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，{sentence} 是一个占位符，您可以用任何英语句子来替换它。
- en: 'You can use the preceding prompt template to generate specific prompts:'
  id: totrans-2491
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以使用前面的提示模板生成特定的提示：
- en: '“Translate the following English sentence into French: ‘Hello, how are you?’”'
  id: totrans-2492
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “将以下英语句子翻译成法语：‘你好，你怎么样？’”
- en: '“Translate the following English sentence into French: ‘I love ice cream.’”'
  id: totrans-2493
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “将以下英语句子翻译成法语：‘我爱冰淇淋。’”
- en: As you can see, prompt templates enable you to easily generate a variety of
    prompts for different sentences without having to rewrite the entire instruction
    each time. In fact, this concept can be extended to more complex tasks and can
    incorporate multiple placeholders or more intricate structures, depending on the
    application.
  id: totrans-2494
  prefs: []
  type: TYPE_NORMAL
  zh: 正如您所看到的，提示模板使您能够轻松地为不同的句子生成各种提示，而无需每次都重写整个指令。实际上，这个概念可以扩展到更复杂的任务，并可以根据应用情况包含多个占位符或更复杂的结构。
- en: '**Prompts for Different LLMs**'
  id: totrans-2495
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '**不同 LLM 的提示**'
- en: GPT-3, ChatGPT, and GPT-4 are LLMs that are all based on the Transformer architecture
    and are fundamentally similar in their underlying mechanics. ChatGPT is essentially
    a version of the GPT model fine-tuned specifically for conversational interactions.
    GPT-4 is an evolution or improvement over GPT-3 in terms of scale and capabilities.
  id: totrans-2496
  prefs: []
  type: TYPE_NORMAL
  zh: GPT-3、ChatGPT 和 GPT-4 都是基于 Transformer 架构的 LLM，在底层机制上基本相似。ChatGPT 实质上是针对对话交互特别微调的
    GPT 模型的一个版本。GPT-4 在规模和能力方面是 GPT-3 的演变或改进。
- en: The differences in prompts for these models mainly arise from the specific use
    case and context, rather than inherent differences between the models. Here are
    some prompting differences that are based on use cases.
  id: totrans-2497
  prefs: []
  type: TYPE_NORMAL
  zh: 这些模型提示词的差异主要源于特定的用例和上下文，而不是模型之间的固有差异。以下是一些基于用例的提示词差异。
- en: 'GPT-3 can be used for a wide range of tasks beyond just conversation, from
    content generation to code writing. Here are some examples of prompts for GPT-3:'
  id: totrans-2498
  prefs: []
  type: TYPE_NORMAL
  zh: GPT-3 可以用于广泛的任务，而不仅仅是对话，从内容生成到代码编写。以下是 GPT-3 的提示词示例：
- en: '“Translate the following English text to French: ‘Hello, how are you?’”'
  id: totrans-2499
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “将以下英文文本翻译成法语：‘你好，你好吗？’”
- en: “Write a Python function that calculates the factorial of a number.”
  id: totrans-2500
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “编写一个计算数字阶乘的 Python 函数。”
- en: 'ChatGPT: specifically fine-tuned for conversational interactions. Here are
    some examples of prompts for ChatGPT:'
  id: totrans-2501
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT：专门针对对话交互进行微调。以下是 ChatGPT 的提示词示例：
- en: 'User: “Can you help me with my homework?”'
  id: totrans-2502
  prefs: []
  type: TYPE_NORMAL
  zh: 用户： “你能帮我做作业吗？”
- en: 'ChatGPT: “Of course! What subject or topic do you need help with?”'
  id: totrans-2503
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT： “当然！您需要帮助的是哪个主题或话题？”
- en: 'User: “Tell me a joke.”'
  id: totrans-2504
  prefs: []
  type: TYPE_NORMAL
  zh: 用户： “讲一个笑话。”
- en: 'ChatGPT: “Why did the chicken cross the playground? To get to the other slide!”'
  id: totrans-2505
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT： “为什么鸡穿过操场？为了到达另一边的滑梯！”
- en: 'GPT-4: provides a larger scale and refinements, so the prompts would be similar
    in nature to GPT-3, but might yield more accurate or nuanced outputs. Here are
    some examples of prompts of prompts for GPT-4:'
  id: totrans-2506
  prefs: []
  type: TYPE_NORMAL
  zh: GPT-4：提供更大规模和改进，因此提示词的性质与 GPT-3 相似，但可能产生更准确或更细微的输出。以下是 GPT-4 的提示词示例：
- en: “Provide a detailed analysis of quantum mechanics in relation to general relativity.”
  id: totrans-2507
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “就广义相对论而言，提供量子力学详细分析。”
- en: “Generate a short story based on a post-apocalyptic world with a theme of hope.”
  id: totrans-2508
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “基于后末日世界主题为希望编写一个短篇故事。”
- en: These three models accept natural language prompts and produce natural language
    outputs. The fundamental way you interact with them remains consistent.
  id: totrans-2509
  prefs: []
  type: TYPE_NORMAL
  zh: 这三个模型接受自然语言提示并产生自然语言输出。与它们交互的基本方式保持一致。
- en: The main difference comes from the context in which the model is being used
    and any fine-tuning that has been applied. ChatGPT, for instance, is designed
    to be more conversational, so while you can use GPT-3 for chats, ChatGPT might
    produce more contextually relevant conversational outputs.
  id: totrans-2510
  prefs: []
  type: TYPE_NORMAL
  zh: 主要区别在于模型被使用的上下文以及任何已应用的微调。例如，ChatGPT 被设计成更具对话性，因此虽然您可以使用 GPT-3 进行聊天，但 ChatGPT
    可能会产生更具上下文相关性的对话输出。
- en: When directly interacting with these models, especially through an API, you
    might also have control over parameters like “temperature” (controlling randomness)
    and “max tokens” (controlling response length). Adjusting these can shape the
    responses, regardless of which GPT variant you are using.
  id: totrans-2511
  prefs: []
  type: TYPE_NORMAL
  zh: 当直接与这些模型交互，尤其是通过 API 时，您也可能控制诸如“温度”（控制随机性）和“最大标记数”（控制响应长度）等参数。调整这些参数可以塑造响应，无论您使用的是哪个
    GPT 变体。
- en: 'In essence, while the underlying models have differences in scale and specific
    training/fine-tuning, the way you prompt them remains largely consistent: clear,
    specific natural language prompts yield the best results.'
  id: totrans-2512
  prefs: []
  type: TYPE_NORMAL
  zh: 从本质上讲，尽管底层模型在规模和特定训练/微调方面存在差异，但您提示它们的方式在很大程度上保持一致：清晰、具体的自然语言提示会产生最佳结果。
- en: '**Poorly Worded Prompts**'
  id: totrans-2513
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '**措辞不当的提示词**'
- en: When crafting prompts, be as clear and specific as possible to guide the response
    in the desired direction. Ambiguous or vague prompts can lead to a wide range
    of responses, many of which might not be useful or relevant to the user’s actual
    intent.
  id: totrans-2514
  prefs: []
  type: TYPE_NORMAL
  zh: 在构建提示词时，尽可能清晰和具体，以引导响应朝所需的方向发展。含糊或模糊的提示词可能导致各种响应，其中许多可能对用户实际意图没有帮助或不相关。
- en: 'Moreover, poorly worded prompts are often vague, ambiguous, or too broad, and
    they can lead to confusion, misunderstanding, or non-specific responses from AI
    models. Here is a list of examples of poorly worded prompts that are shown in
    italics, along with an explanation regarding the deficiency of each prompt:'
  id: totrans-2515
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，措辞不当的提示词通常模糊、含糊不清或过于宽泛，它们可能导致人工智能模型产生混淆、误解或非特定的响应。以下是一些以斜体显示的措辞不当的提示词示例，以及每个提示词缺陷的解释：
- en: '*“Tell me about that thing.”*'
  id: totrans-2516
  prefs: []
  type: TYPE_NORMAL
  zh: '*“告诉我那件事。”*'
- en: 'Problem: Too vague. What “thing” is being referred to?'
  id: totrans-2517
  prefs: []
  type: TYPE_NORMAL
  zh: 问题：过于模糊。指的是什么“事物”？
- en: '*“Why did it happen?”*'
  id: totrans-2518
  prefs: []
  type: TYPE_NORMAL
  zh: '*“为什么会发生？”*'
- en: 'Problem: No context. What event or situation is being discussed?'
  id: totrans-2519
  prefs: []
  type: TYPE_NORMAL
  zh: 问题：没有上下文。正在讨论什么事件或情况？
- en: '*“Explain stuff.”*'
  id: totrans-2520
  prefs: []
  type: TYPE_NORMAL
  zh: '*“解释一下。”*'
- en: 'Problem: Too broad. What specific “stuff” should be explained?'
  id: totrans-2521
  prefs: []
  type: TYPE_NORMAL
  zh: 问题：过于宽泛。应该解释哪些具体的“内容”？
- en: '*“Do what is needful.”*'
  id: totrans-2522
  prefs: []
  type: TYPE_NORMAL
  zh: '*“做需要做的事情。”*'
- en: 'Problem: Ambiguous. What specific action is required?'
  id: totrans-2523
  prefs: []
  type: TYPE_NORMAL
  zh: 问题：含糊不清。需要执行的具体动作是什么？
- en: '*“I want information.”*'
  id: totrans-2524
  prefs: []
  type: TYPE_NORMAL
  zh: '*“我想获取信息。”*'
- en: 'Problem: Not specific. What type of information is desired?'
  id: totrans-2525
  prefs: []
  type: TYPE_NORMAL
  zh: 问题：不具体。需要什么类型的信息？
- en: '*“Can you get me the thing from the place?”*'
  id: totrans-2526
  prefs: []
  type: TYPE_NORMAL
  zh: '*“你能从那个地方帮我拿到那个东西吗？”*'
- en: 'Problem: Both “thing” and “place” are unclear.'
  id: totrans-2527
  prefs: []
  type: TYPE_NORMAL
  zh: 问题：既不清楚“事物”也不清楚“地点”。
- en: '*“Tell me the summary of What’s-His-Name’s book?”*'
  id: totrans-2528
  prefs: []
  type: TYPE_NORMAL
  zh: '*“告诉我那位先生的书的摘要？”*'
- en: 'Problem: Ambiguous reference. Who is “*What’s-His-Name*”?'
  id: totrans-2529
  prefs: []
  type: TYPE_NORMAL
  zh: 问题：含糊不清的引用。谁是“*那位先生*”？
- en: '*“How do you do the process?”*'
  id: totrans-2530
  prefs: []
  type: TYPE_NORMAL
  zh: '*“你是怎么进行这个过程的？”*'
- en: 'Problem: Which “process” is being referred to?'
  id: totrans-2531
  prefs: []
  type: TYPE_NORMAL
  zh: 问题：指的是哪个“过程”？
- en: '*“Describe the importance of the topic.”*'
  id: totrans-2532
  prefs: []
  type: TYPE_NORMAL
  zh: '*“描述这个主题的重要性。”*'
- en: 'Problem: The “topic” is not specified.'
  id: totrans-2533
  prefs: []
  type: TYPE_NORMAL
  zh: 问题：未指定“主题”。
- en: '*“Why is it bad or good?”*'
  id: totrans-2534
  prefs: []
  type: TYPE_NORMAL
  zh: '*“为什么它是好是坏？”*'
- en: 'Problem: No context. What is “it”?'
  id: totrans-2535
  prefs: []
  type: TYPE_NORMAL
  zh: 问题：没有上下文。什么是“它”？
- en: '*“Help with the issue.”*'
  id: totrans-2536
  prefs: []
  type: TYPE_NORMAL
  zh: '*“帮助解决这个问题。”*'
- en: 'Problem: Vague. What specific issue is being discussed?'
  id: totrans-2537
  prefs: []
  type: TYPE_NORMAL
  zh: 问题：模糊不清。正在讨论的具体问题是什么？
- en: '*“Things to consider for the task.”*'
  id: totrans-2538
  prefs: []
  type: TYPE_NORMAL
  zh: '*“完成任务需要考虑的事项。”*'
- en: 'Problem: Ambiguous. What “task” is being discussed?'
  id: totrans-2539
  prefs: []
  type: TYPE_NORMAL
  zh: 问题：含糊不清。正在讨论的是哪个“任务”？
- en: '*“How does this work?”*'
  id: totrans-2540
  prefs: []
  type: TYPE_NORMAL
  zh: '*“这是怎么工作的？”*'
- en: 'Problem: Lack of specificity. What is “this”?'
  id: totrans-2541
  prefs: []
  type: TYPE_NORMAL
  zh: 问题：缺乏具体性。什么是“这”？
- en: '**WHAT IS CHATGPT?**'
  id: totrans-2542
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**什么是ChatGPT？**'
- en: The chatbot wars are intensifying, and the long-term value of the primary competitors
    is still to be determined. One competitor is ChatGPT-3.5 (ChatGPT), which is an
    AI-based chatbot from OpenAI. ChatGPT responds to queries from users by providing
    conversational responses, and it is accessible at *[https://chat.openai.com/chat](https://chat.openai.com/chat)*.
  id: totrans-2543
  prefs: []
  type: TYPE_NORMAL
  zh: 聊天机器人竞赛正在加剧，主要竞争对手的长期价值仍有待确定。一个竞争对手是ChatGPT-3.5（ChatGPT），这是OpenAI的一个基于AI的聊天机器人。ChatGPT通过提供对话式响应来响应用户的查询，并且可以在*[https://chat.openai.com/chat](https://chat.openai.com/chat)*访问。
- en: 'The growth rate in terms of registered users for ChatGPT has been extraordinary.
    The closest competitor is the iPhone, which reached one million users in 2.5 months,
    whereas ChatGPT crossed one million users in *six days*. ChatGPT peaked around
    1.8 billion users and then decreased to roughly 1.5 billion users, which you can
    see in the chart in the following online article:'
  id: totrans-2544
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT注册用户数量的增长率非常惊人。最接近的竞争对手是iPhone，它在2.5个月内达到一百万用户，而ChatGPT在*六天内*就达到了一百万用户。ChatGPT的用户数量达到约18亿，然后下降到大约15亿，您可以在以下在线文章中的图表中看到：
- en: '*[https://decrypt.co/147595/traffic-dip-hits-openais-chatgpt-first-times-hardest](https://decrypt.co/147595/traffic-dip-hits-openais-chatgpt-first-times-hardest)*'
  id: totrans-2545
  prefs: []
  type: TYPE_NORMAL
  zh: '*[https://decrypt.co/147595/traffic-dip-hits-openais-chatgpt-first-times-hardest](https://decrypt.co/147595/traffic-dip-hits-openais-chatgpt-first-times-hardest)*'
- en: Note that although Threads from Meta out-performed ChatGPT in terms of membership,
    Threads has seen a significant drop in daily users in the neighborhood of 50%.
    A comparison of the time frame to reach one million members for six well-known
    companies/products and ChatGPT is at *[https://www.syntheticmind.io/p/01](https://www.syntheticmind.io/p/01)*.
  id: totrans-2546
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，尽管Meta的Threads在会员数量方面超过了ChatGPT，但Threads的日活跃用户数量下降了约50%。六个知名公司/产品的会员数量达到一百万的时间框架与ChatGPT的比较可以在*[https://www.syntheticmind.io/p/01](https://www.syntheticmind.io/p/01)*找到。
- en: 'The preceding link also contains information about Will Hobick, who used ChatGPT
    to write a Chrome extension for email-related tasks, despite not having any experience
    with JavaScript or Chrome extension development. Will Hobick provides more detailed
    information about his Chrome extension at the following URL:'
  id: totrans-2547
  prefs: []
  type: TYPE_NORMAL
  zh: 前面的链接还包含有关Will Hobick的信息，他使用ChatGPT编写了一个用于电子邮件相关任务的Chrome扩展程序，尽管他没有JavaScript或Chrome扩展程序开发的经验。Will
    Hobick在以下网址提供了更多关于他的Chrome扩展的详细信息：
- en: '*[https://www.linkedin.com/posts/will-hobick_gpt3-chatgpt-ai-activity-7008081003080470528-8QCh](https://www.linkedin.com/posts/will-hobick_gpt3-chatgpt-ai-activity-7008081003080470528-8QCh)*'
  id: totrans-2548
  prefs: []
  type: TYPE_NORMAL
  zh: '*[https://www.linkedin.com/posts/will-hobick_gpt3-chatgpt-ai-activity-7008081003080470528-8QCh](https://www.linkedin.com/posts/will-hobick_gpt3-chatgpt-ai-activity-7008081003080470528-8QCh)*'
- en: '**ChatGPT: GPT-3 “on Steroids”?**'
  id: totrans-2549
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '**ChatGPT：GPT-3的强化版？**'
- en: 'ChatGPT has been called GPT-3 “on steroids,” and there is some consensus that
    ChatGPT3 is currently the best chatbot in the world. Indeed, ChatGPT can perform
    multitude of tasks, some of which are listed here:'
  id: totrans-2550
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT被称为GPT-3的强化版，并且有一些共识认为ChatGPT3是目前世界上最好的聊天机器人。确实，ChatGPT可以执行多种任务，其中一些列在这里：
- en: write poetry
  id: totrans-2551
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 写诗
- en: write essays
  id: totrans-2552
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 编写文章
- en: write code
  id: totrans-2553
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 编写代码
- en: role play
  id: totrans-2554
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 角色扮演
- en: reject inappropriate requests
  id: totrans-2555
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 拒绝不适当的要求
- en: 'Moreover, the quality of its responses to natural language queries surpasses
    the capabilities of its predecessor GPT-3\. Another interesting capability includes
    the ability to acknowledge its mistakes. ChatGPT also provides *prompt replies*,
    which are examples of what you can ask ChatGPT. In addition, ChatGPT can also
    generate new Christmas song lyrics:'
  id: totrans-2556
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，它在处理自然语言查询方面的响应质量超过了其前辈 GPT-3 的能力。另一个有趣的特性包括能够承认自己的错误。ChatGPT 还提供 *提示回复*，这是你可以向
    ChatGPT 提问的示例。此外，ChatGPT 还可以生成新的圣诞歌曲歌词：
- en: '*[https://www.cnet.com/culture/entertainment/heres-what-it-sounds-like-when-ai-writes-christmas-lyrics](https://www.cnet.com/culture/entertainment/heres-what-it-sounds-like-when-ai-writes-christmas-lyrics)*'
  id: totrans-2557
  prefs: []
  type: TYPE_NORMAL
  zh: '*[https://www.cnet.com/culture/entertainment/heres-what-it-sounds-like-when-ai-writes-christmas-lyrics](https://www.cnet.com/culture/entertainment/heres-what-it-sounds-like-when-ai-writes-christmas-lyrics)*'
- en: 'One aspect of ChatGPT that probably will not be endearing to parents with young
    children is the fact that ChatGPT has told children that Santa Claus does not
    exist:'
  id: totrans-2558
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT 可能不会让有小孩的父母感到亲切的一个方面是，ChatGPT 告诉孩子们圣诞老人不存在：
- en: '*[https://futurism.com/the-byte/openai-chatbot-santa](https://futurism.com/the-byte/openai-chatbot-santa)*'
  id: totrans-2559
  prefs: []
  type: TYPE_NORMAL
  zh: '*[https://futurism.com/the-byte/openai-chatbot-santa](https://futurism.com/the-byte/openai-chatbot-santa)*'
- en: '*[https://www.forbes.com/sites/lanceeliot/2022/12/21/pointedly-asking-generative-ai-chatgpt-about-whether-santa-claus-is-real-proves-to-be-eye-opening-for-ai-ethics-and-ai-law](https://www.forbes.com/sites/lanceeliot/2022/12/21/pointedly-asking-generative-ai-chatgpt-about-whether-santa-claus-is-real-proves-to-be-eye-opening-for-ai-ethics-and-ai-law)*'
  id: totrans-2560
  prefs: []
  type: TYPE_NORMAL
  zh: '*[https://www.forbes.com/sites/lanceeliot/2022/12/21/pointedly-asking-generative-ai-chatgpt-about-whether-santa-claus-is-real-proves-to-be-eye-opening-for-ai-ethics-and-ai-law](https://www.forbes.com/sites/lanceeliot/2022/12/21/pointedly-asking-generative-ai-chatgpt-about-whether-santa-claus-is-real-proves-to-be-eye-opening-for-ai-ethics-and-ai-law)*'
- en: '**ChatGPT: Google “Code Red”**'
  id: totrans-2561
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '**ChatGPT：谷歌“红色代码”**'
- en: 'In December 2022, the CEO of Google issued a “code red” regarding the potential
    threat of ChatGPT as a competitor to Google’s search engine:'
  id: totrans-2562
  prefs: []
  type: TYPE_NORMAL
  zh: 2022 年 12 月，谷歌的 CEO 发布了关于 ChatGPT 作为谷歌搜索引擎竞争对手的潜在威胁的“红色代码”：
- en: '*[https://www.yahoo.com/news/googles-management-reportedly-issued-code-190131705.html](https://www.yahoo.com/news/googles-management-reportedly-issued-code-190131705.html)*'
  id: totrans-2563
  prefs: []
  type: TYPE_NORMAL
  zh: '*[https://www.yahoo.com/news/googles-management-reportedly-issued-code-190131705.html](https://www.yahoo.com/news/googles-management-reportedly-issued-code-190131705.html)*'
- en: According to the preceding article, Google is investing resources to develop
    AI-based products, presumably to offer functionality that can successfully compete
    with ChatGPT. Some of those AI-based products might also generate graphics that
    are comparable to graphics effects by DALL-E. Indeed, the race to dominate AI
    continues unabated and will undoubtedly continue for the foreseeable future.
  id: totrans-2564
  prefs: []
  type: TYPE_NORMAL
  zh: 根据前面的文章，谷歌正在投资资源开发基于 AI 的产品，预计是为了提供能够成功与 ChatGPT 竞争的功能。其中一些基于 AI 的产品也可能生成与 DALL-E
    的图形效果相当的效果。确实，争夺 AI 主导权的竞赛仍在继续，并且无疑将在可预见的未来继续下去。
- en: '**ChatGPT Versus Google Search**'
  id: totrans-2565
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '**ChatGPT 与谷歌搜索的比较**'
- en: Given the frequent speculation that ChatGPT is destined to supplant Google Search,
    let’s briefly compare the manner in which Google and ChatGPT respond to a given
    query. First, Google is a search engine that uses the Page Rank algorithm (developed
    by Larry Page), along with fine-tuned aspects of this algorithm that are a closely
    guarded secret. Google uses this algorithm to rank websites and to generate search
    results for a given query. However, the search results include paid ads, which
    can “clutter” the list of links.
  id: totrans-2566
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑到经常有人猜测 ChatGPT 将取代谷歌搜索，让我们简要比较一下谷歌和 ChatGPT 对给定查询的响应方式。首先，谷歌是一个使用 Page Rank
    算法（由拉里·佩奇开发）的搜索引擎，以及一些精心调整的、被严格保密的算法方面。谷歌使用这个算法对网站进行排名，并为给定查询生成搜索结果。然而，搜索结果中包括付费广告，这些广告可能会“杂乱”链接列表。
- en: 'By contrast, ChatGPT is not a search engine: it provides a direct response
    to a given query: in colloquial terms, ChatGPT will simply “cut to the chase”
    and eliminate the clutter of superfluous links. However, ChatGPT *can* produce
    incorrect results, the consequences of which can range between benign and significant.'
  id: totrans-2567
  prefs: []
  type: TYPE_NORMAL
  zh: 相比之下，ChatGPT 不是一个搜索引擎：它会对给定的查询提供直接响应：用通俗的话说，ChatGPT 会直接“切入正题”并消除多余的链接。然而，ChatGPT
    *可能*会产生错误的结果，其后果可能从无害到重大不等。
- en: 'Consequently, Google search and ChatGPT both have strengths as well as weaknesses,
    and they excel with different types of queries: the former for queries that have
    multi-faceted answers (e.g., questions about legal issues), and the latter for
    straight-to-the point queries (e.g., coding questions). Obviously, both of them
    excel with many other types of queries.'
  id: totrans-2568
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，谷歌搜索和ChatGPT都有各自的优点和缺点，它们在处理不同类型的查询时表现出色：前者擅长处理具有多方面答案的查询（例如，关于法律问题的问题），而后者擅长处理直接了当的查询（例如，编码问题）。显然，它们在处理许多其他类型的查询时也表现出色。
- en: According to Margaret Mitchell, ChatGPT will not replace Google Search, and
    she provides some interesting details regarding Google Search and PageRank that
    you can read about at *[https://twitter.com/mmitchell_ai/status/1605013368560943105](https://twitter.com/mmitchell_ai/status/1605013368560943105)*.
  id: totrans-2569
  prefs: []
  type: TYPE_NORMAL
  zh: 根据玛格丽特·米切尔的说法，ChatGPT不会取代谷歌搜索，她提供了一些关于谷歌搜索和PageRank的有趣细节，您可以在*[https://twitter.com/mmitchell_ai/status/1605013368560943105](https://twitter.com/mmitchell_ai/status/1605013368560943105)*上阅读。
- en: '**ChatGPT Custom Instructions**'
  id: totrans-2570
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '**ChatGPT自定义指令**'
- en: ChatGPT has added support for custom instructions, which enable you to specify
    some of your preferences that ChatGPT will use when responding to your queries.
  id: totrans-2571
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT增加了对自定义指令的支持，这允许您指定一些偏好，ChatGPT在回答您的查询时会使用这些偏好。
- en: 'ChatGPT Plus users can switch on custom instructions by navigating to the ChatGPT
    website and then perform the following sequence of steps:'
  id: totrans-2572
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT Plus用户可以通过访问ChatGPT网站并执行以下步骤来开启自定义指令：
- en: '[PRE455]'
  id: totrans-2573
  prefs: []
  type: TYPE_PRE
  zh: '[PRE455]'
- en: 'As a simple example, you can specify that you prefer to see code in a language
    other than Python. A set of common initial requirements for routine tasks can
    also be specified via custom instructions in ChatGPT. A detailed sequence of steps
    for setting up custom instructions is accessible online:'
  id: totrans-2574
  prefs: []
  type: TYPE_NORMAL
  zh: 作为简单的例子，您可以指定您更喜欢以除Python以外的语言查看代码。通过ChatGPT中的自定义指令，也可以指定日常任务的常见初始要求。设置自定义指令的详细步骤可在网上找到。
- en: '*[https://artificialcorner.com/custom-instructions-a-new-feature-you-must-enable-to-improve-chatgpt-responses-15820678bc02](https://artificialcorner.com/custom-instructions-a-new-feature-you-must-enable-to-improve-chatgpt-responses-15820678bc02)*'
  id: totrans-2575
  prefs: []
  type: TYPE_NORMAL
  zh: '*[https://artificialcorner.com/custom-instructions-a-new-feature-you-must-enable-to-improve-chatgpt-responses-15820678bc02](https://artificialcorner.com/custom-instructions-a-new-feature-you-must-enable-to-improve-chatgpt-responses-15820678bc02)*'
- en: 'Another interesting example of custom instructions is from Jeremy Howard, who
    prepared an extensive and detailed set of custom instructions that is accessible
    online:'
  id: totrans-2576
  prefs: []
  type: TYPE_NORMAL
  zh: 自定义指令的另一个有趣例子来自杰里米·霍华德，他准备了一套详尽且详细的在线可访问的自定义指令：
- en: '*[https://twitter.com/jeremyphoward/status/1689464587077509120](https://twitter.com/jeremyphoward/status/1689464587077509120)*'
  id: totrans-2577
  prefs: []
  type: TYPE_NORMAL
  zh: '*[https://twitter.com/jeremyphoward/status/1689464587077509120](https://twitter.com/jeremyphoward/status/1689464587077509120)*'
- en: As this book goes to print, custom instructions are available only for users
    who have registered for ChatGPT Plus. However, OpenAI has stated that custom instructions
    will be available for free to all users by the end of 2023.
  id: totrans-2578
  prefs: []
  type: TYPE_NORMAL
  zh: 当这本书准备印刷时，自定义指令仅适用于已注册ChatGPT Plus的用户。然而，OpenAI已声明，到2023年底，自定义指令将免费对所有用户开放。
- en: '**ChatGPT on Mobile Devices and Browsers**'
  id: totrans-2579
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '**ChatGPT在移动设备和浏览器上的应用**'
- en: 'ChatGPT first became available for iOS devices and then for Android devices
    during 2023\. You can download ChatGPT onto an iOS device from the following link:'
  id: totrans-2580
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT于2023年首先在iOS设备上可用，随后在Android设备上可用。您可以从以下链接下载ChatGPT到iOS设备：
- en: '*[https://www.macobserver.com/tips/how-to/how-to-install-and-use-the-official-chatgpt-app-on-iphone/](https://www.macobserver.com/tips/how-to/how-to-install-and-use-the-official-chatgpt-app-on-iphone/)*'
  id: totrans-2581
  prefs: []
  type: TYPE_NORMAL
  zh: '*[https://www.macobserver.com/tips/how-to/how-to-install-and-use-the-official-chatgpt-app-on-iphone/](https://www.macobserver.com/tips/how-to/how-to-install-and-use-the-official-chatgpt-app-on-iphone/)*'
- en: Alternatively, if you have an Android device, you can download ChatGPT from
    *[https://play.google.com/store/apps/details?id=com.openai.chatgpt](https://play.google.com/store/apps/details?id=com.openai.chatgpt)*.
  id: totrans-2582
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您有Android设备，您可以从*[https://play.google.com/store/apps/details?id=com.openai.chatgpt](https://play.google.com/store/apps/details?id=com.openai.chatgpt)*下载ChatGPT。
- en: 'You can install ChatGPT for the Bing browser from Microsoft from the following
    URL:'
  id: totrans-2583
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以从以下URL安装Microsoft的Bing浏览器版本的ChatGPT：
- en: '*[https://chrome.google.com/webstore/detail/chatgpt-for-bing/pkkmgcildaegadhngpjkklnbfbmhpdng](https://chrome.google.com/webstore/detail/chatgpt-for-bing/pkkmgcildaegadhngpjkklnbfbmhpdng)*'
  id: totrans-2584
  prefs: []
  type: TYPE_NORMAL
  zh: '*[https://chrome.google.com/webstore/detail/chatgpt-for-bing/pkkmgcildaegadhngpjkklnbfbmhpdng](https://chrome.google.com/webstore/detail/chatgpt-for-bing/pkkmgcildaegadhngpjkklnbfbmhpdng)*'
- en: '**ChatGPT and Prompts**'
  id: totrans-2585
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '**ChatGPT和提示**'
- en: Although ChatGPT is adept at generating responses to queries, sometimes you
    might not be fully satisfied with the result. One option is to type the word “rewrite”
    in order to get another version from ChatGPT.
  id: totrans-2586
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然ChatGPT擅长生成对查询的响应，但有时您可能对结果并不完全满意。一个选项是输入单词“重写”，以便从ChatGPT获得另一个版本。
- en: 'Although this is one of the simplest prompts available, it is limited in terms
    of effectiveness. If you want a list of more meaningful prompts, the following
    article contains 31 prompts that have the potential to be better than using the
    word “rewrite” (and not just with ChatGPT):'
  id: totrans-2587
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管这是可用的最简单的提示之一，但在有效性方面有限。如果您想要更多有意义的提示列表，以下文章包含了31个可能比使用“重写”一词更好的提示（而不仅仅是ChatGPT）：
- en: '*[https://medium.com/the-generator/31-ai-prompts-better-than-rewrite-b3268dfe1fa9](https://medium.com/the-generator/31-ai-prompts-better-than-rewrite-b3268dfe1fa9)*'
  id: totrans-2588
  prefs: []
  type: TYPE_NORMAL
  zh: '*[https://medium.com/the-generator/31-ai-prompts-better-than-rewrite-b3268dfe1fa9](https://medium.com/the-generator/31-ai-prompts-better-than-rewrite-b3268dfe1fa9)*'
- en: '**GPTBot**'
  id: totrans-2589
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '**GPTBot**'
- en: 'GPTBot is a crawler for websites. Fortunately, you can disallow GPTBot from
    accessing a website by adding the GPTBot to the robots.txt file for a website:'
  id: totrans-2590
  prefs: []
  type: TYPE_NORMAL
  zh: GPTBot是一个网站爬虫。幸运的是，您可以通过将GPTBot添加到网站的robots.txt文件中来禁止GPTBot访问网站：
- en: '[PRE456]'
  id: totrans-2591
  prefs: []
  type: TYPE_PRE
  zh: '[PRE456]'
- en: 'You can also customize GPTBot access for only a portion of a website by adding
    the GPTBot token to the robots.txt file for a website:'
  id: totrans-2592
  prefs: []
  type: TYPE_NORMAL
  zh: 您还可以通过将GPTBot令牌添加到网站的robots.txt文件中来仅对网站的一部分进行GPTBot访问的定制：
- en: '[PRE457]'
  id: totrans-2593
  prefs: []
  type: TYPE_PRE
  zh: '[PRE457]'
- en: 'As an aside, Stable Diffusion and LAION both scrape the Internet via Common
    Crawl. However, you can prevent your website from being scraped by specifying
    the following snippet in the robots.txt file:'
  id: totrans-2594
  prefs: []
  type: TYPE_NORMAL
  zh: 作为旁白，Stable Diffusion和LAION都通过Common Crawl抓取互联网。但是，您可以通过在robots.txt文件中指定以下片段来防止您的网站被抓取：
- en: '[PRE458]'
  id: totrans-2595
  prefs: []
  type: TYPE_PRE
  zh: '[PRE458]'
- en: 'More information about GPTBot is accessible online:'
  id: totrans-2596
  prefs: []
  type: TYPE_NORMAL
  zh: 关于GPTBot的更多信息可在网上找到：
- en: '*[https://platform.openai.com/docs/gptbot](https://platform.openai.com/docs/gptbot)*'
  id: totrans-2597
  prefs: []
  type: TYPE_NORMAL
  zh: '*[https://platform.openai.com/docs/gptbot](https://platform.openai.com/docs/gptbot)*'
- en: '*[https://platform.openai.com/docs/gptbot](https://platform.openai.com/docs/gptbot)*'
  id: totrans-2598
  prefs: []
  type: TYPE_NORMAL
  zh: '*[https://platform.openai.com/docs/gptbot](https://platform.openai.com/docs/gptbot)*'
- en: '*[https://www.yahoo.com/finance/news/openai-prepares-unleash-crawler-devour-020628225.html](https://www.yahoo.com/finance/news/openai-prepares-unleash-crawler-devour-020628225.html)*'
  id: totrans-2599
  prefs: []
  type: TYPE_NORMAL
  zh: '*[https://www.yahoo.com/finance/news/openai-prepares-unleash-crawler-devour-020628225.html](https://www.yahoo.com/finance/news/openai-prepares-unleash-crawler-devour-020628225.html)*'
- en: '**ChatGPT Playground**'
  id: totrans-2600
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '**ChatGPT游乐场**'
- en: ChatGPT has its own “playground,” which you will see is substantively different
    from the GPT-3 playground and is accessible at *[https://chat.openai.com/chat](https://chat.openai.com/chat)*.
  id: totrans-2601
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT拥有自己的“游乐场”，您会发现它与GPT-3的游乐场在实质上有所不同，并且可以通过*[https://chat.openai.com/chat](https://chat.openai.com/chat)*访问。
- en: 'For your convenience, the link for the GPT-3 playground is reproduced here:'
  id: totrans-2602
  prefs: []
  type: TYPE_NORMAL
  zh: 为了您的方便，GPT-3游乐场的链接在此重现：
- en: '*[https://beta.openai.com/playground](https://beta.openai.com/playground)*'
  id: totrans-2603
  prefs: []
  type: TYPE_NORMAL
  zh: '*[https://beta.openai.com/playground](https://beta.openai.com/playground)*'
- en: 'OpenAI has periodically added new functionality to ChatGPT that includes the
    following:'
  id: totrans-2604
  prefs: []
  type: TYPE_NORMAL
  zh: OpenAI定期为ChatGPT添加新功能，包括以下内容：
- en: Users can view (and continue) previous conversations.
  id: totrans-2605
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 用户可以查看（并继续）之前的对话。
- en: There is a reduction in the number of questions that ChatGPT will not answer.
  id: totrans-2606
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: ChatGPT不会回答的问题数量有所减少。
- en: Users remain logged in for longer than two weeks.
  id: totrans-2607
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 用户保持登录状态超过两周。
- en: 'Another nice enhancement includes support for keyboard shortcuts: when working
    with code, you can use the sequence ⌘ (Ctrl) + Shift + (for Mac) to copy the last
    code block and the sequence ⌘ (Ctrl) + / to see the complete list of shortcuts.'
  id: totrans-2608
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个很好的增强功能包括对键盘快捷键的支持：当与代码一起工作时，您可以使用序列⌘ (Ctrl) + Shift +（对于Mac）来复制最后一个代码块，以及序列⌘
    (Ctrl) + /来查看完整的快捷键列表。
- en: 'Many articles are available regarding ChatGPT and how to write prompts to extract
    the details that you want from ChatGPT. One of those articles is at the following
    URL:'
  id: totrans-2609
  prefs: []
  type: TYPE_NORMAL
  zh: 关于ChatGPT及其如何编写提示以从ChatGPT中提取您想要的细节的文章有很多。其中一篇文章的URL如下：
- en: '*[https://www.tomsguide.com/features/7-best-chatgpt-tips-to-get-the-most-out-of-the-chatbot](https://www.tomsguide.com/features/7-best-chatgpt-tips-to-get-the-most-out-of-the-chatbot)*'
  id: totrans-2610
  prefs: []
  type: TYPE_NORMAL
  zh: '*[https://www.tomsguide.com/features/7-best-chatgpt-tips-to-get-the-most-out-of-the-chatbot](https://www.tomsguide.com/features/7-best-chatgpt-tips-to-get-the-most-out-of-the-chatbot)*'
- en: '**PLUGINS, CODE INTERPRETER, AND CODE WHISPERER**'
  id: totrans-2611
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**插件、代码解释器和代码低语者**'
- en: 'In addition to answering a plethora of queries from users, ChatGPT extends
    its functionality by providing support for the following:'
  id: totrans-2612
  prefs: []
  type: TYPE_NORMAL
  zh: 除了回答用户的大量查询外，ChatGPT通过提供以下功能来扩展其功能：
- en: Third-party ChatGPT plug-ins
  id: totrans-2613
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 第三方ChatGPT插件
- en: Code Interpreter
  id: totrans-2614
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 代码解释器
- en: Code Whisperer
  id: totrans-2615
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Code Whisperer
- en: Each of the topics in the preceding list are briefly discussed in the following
    subsections, along with a short section that discusses Code Interpreter versus
    Claude-2 from Anthropic.
  id: totrans-2616
  prefs: []
  type: TYPE_NORMAL
  zh: 上述列表中的每个主题将在以下小节中简要讨论，以及一个讨论代码解释器与Anthropic的Claude-2的短节。
- en: '**Plugins**'
  id: totrans-2617
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '**插件**'
- en: 'There are several hundred ChatGPT plugins available, and lists of some popular
    plugins are accessible online:'
  id: totrans-2618
  prefs: []
  type: TYPE_NORMAL
  zh: 可用的ChatGPT插件有数百种，一些流行插件的列表可在网上找到：
- en: '*[https://levelup.gitconnected.com/5-chatgpt-plugins-that-will-put-you-ahead-of-99-of-data-scientists-4544a3b752f9](https://levelup.gitconnected.com/5-chatgpt-plugins-that-will-put-you-ahead-of-99-of-data-scientists-4544a3b752f9)*'
  id: totrans-2619
  prefs: []
  type: TYPE_NORMAL
  zh: '*[https://levelup.gitconnected.com/5-chatgpt-plugins-that-will-put-you-ahead-of-99-of-data-scientists-4544a3b752f9](https://levelup.gitconnected.com/5-chatgpt-plugins-that-will-put-you-ahead-of-99-of-data-scientists-4544a3b752f9)*'
- en: '*[https://www.zdnet.com/article/the-10-best-chatgpt-plugins-of-2023/](https://www.zdnet.com/article/the-10-best-chatgpt-plugins-of-2023/)*'
  id: totrans-2620
  prefs: []
  type: TYPE_NORMAL
  zh: '*[https://www.zdnet.com/article/the-10-best-chatgpt-plugins-of-2023/](https://www.zdnet.com/article/the-10-best-chatgpt-plugins-of-2023/)*'
- en: 'Keep in mind that lists of the “best” ChatGPT plugins change frequently, so
    it is a good idea to perform an online search to find out about newer ChatGPT
    plugins. The following link also contains details about highly rated plugins:'
  id: totrans-2621
  prefs: []
  type: TYPE_NORMAL
  zh: 请记住，“最佳”ChatGPT插件列表经常变化，因此进行在线搜索以了解最新的ChatGPT插件是个好主意。以下链接还包含了关于高度评价的插件的一些详细信息：
- en: '*[https://www.tomsguide.com/features/i-tried-a-ton-of-chatgpt-plugins-and-these-3-are-the-best](https://www.tomsguide.com/features/i-tried-a-ton-of-chatgpt-plugins-and-these-3-are-the-best)*'
  id: totrans-2622
  prefs: []
  type: TYPE_NORMAL
  zh: '*[https://www.tomsguide.com/features/i-tried-a-ton-of-chatgpt-plugins-and-these-3-are-the-best](https://www.tomsguide.com/features/i-tried-a-ton-of-chatgpt-plugins-and-these-3-are-the-best)*'
- en: 'Another set of recommended plugins (depending on your needs, of course) is
    shown here:'
  id: totrans-2623
  prefs: []
  type: TYPE_NORMAL
  zh: 另一套推荐的插件（当然，根据您的需求而定）如下所示：
- en: AskYourPDF
  id: totrans-2624
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: AskYourPDF
- en: ChatWithVideo
  id: totrans-2625
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: ChatWithVideo
- en: Noteable
  id: totrans-2626
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Noteable
- en: Upskillr
  id: totrans-2627
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Upskillr
- en: Wolfram
  id: totrans-2628
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Wolfram
- en: If you are concerned about the possibility of ChatGPT scraping the content of
    your website, the browser plugin from OpenAI supports a user-agent token called
    ChatGPT-User that abides by the content specified in the robots.txt file that
    many websites provide for restricting access to content.
  id: totrans-2629
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您担心ChatGPT抓取您网站的内容，OpenAI的浏览器插件支持一个名为ChatGPT-User的用户代理令牌，该令牌遵守许多网站提供的robots.txt文件中指定的内容，以限制对内容的访问。
- en: 'If you want to develop a plugin for ChatGPT, navigate to this website for more
    information: *[https://platform.openai.com/docs/plugins/introduction](https://platform.openai.com/docs/plugins/introduction)*.'
  id: totrans-2630
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您想为ChatGPT开发插件，请访问此网站获取更多信息：*[https://platform.openai.com/docs/plugins/introduction](https://platform.openai.com/docs/plugins/introduction)*。
- en: 'Along with details for developing a ChatGPT plugin, the preceding OpenAI website
    provides useful information about plugins, as shown here:'
  id: totrans-2631
  prefs: []
  type: TYPE_NORMAL
  zh: 除了开发ChatGPT插件的详细信息外，前面的OpenAI网站还提供了有关插件的有用信息，如下所示：
- en: Authentication
  id: totrans-2632
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 认证
- en: Examples
  id: totrans-2633
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 示例
- en: Plugin review
  id: totrans-2634
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 插件评测
- en: Plugin policies
  id: totrans-2635
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 插件政策
- en: 'OpenAI does not control any plugins that you add to ChatGPT: they connect ChatGPT
    to external applications. Moreover, ChatGPT determines which plugin to use during
    your session, based on the specific plugins that you have enabled in your ChatGPT
    account.'
  id: totrans-2636
  prefs: []
  type: TYPE_NORMAL
  zh: OpenAI不控制您添加到ChatGPT的任何插件：它们将ChatGPT连接到外部应用程序。此外，ChatGPT根据您在ChatGPT账户中启用的特定插件，在您的会话期间确定要使用的插件。
- en: '**Advanced Data Analysis**'
  id: totrans-2637
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '**高级数据分析**'
- en: ChatGPT Advanced Data Analysis enables ChatGPT to generate charts and graphs,
    and create and train machine learning models, including deep learning models.
    ChatGPT Advanced data analysis provides an extensive set of features, and it is
    available to ChatGPT users who are paying the $20/month subscription. However,
    this feature will probably be made available to all users very soon.
  id: totrans-2638
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT高级数据分析使ChatGPT能够生成图表和图形，创建和训练机器学习模型，包括深度学习模型。ChatGPT高级数据分析提供了一套广泛的功能，并且对支付每月20美元订阅费的ChatGPT用户开放。然而，这个功能可能很快就会对所有用户开放。
- en: '*[https://towardsdatascience.com/chatgpt-code-interpreter-how-it-saved-me-hours-of-work-3c65a8dfa935](https://towardsdatascience.com/chatgpt-code-interpreter-how-it-saved-me-hours-of-work-3c65a8dfa935)*'
  id: totrans-2639
  prefs: []
  type: TYPE_NORMAL
  zh: '*[https://towardsdatascience.com/chatgpt-code-interpreter-how-it-saved-me-hours-of-work-3c65a8dfa935](https://towardsdatascience.com/chatgpt-code-interpreter-how-it-saved-me-hours-of-work-3c65a8dfa935)*'
- en: The models from OpenAI can access a Python interpreter that is confined to a
    sandboxed and fire-walled execution environment. There is also some temporary
    disk space that is accessible to the interpreter plugin during the evaluation
    of Python code. Although the temporary disk space is available for a limited time,
    multiple queries during in the same session can produce a cumulative effect with
    regard to the code and execution environment.
  id: totrans-2640
  prefs: []
  type: TYPE_NORMAL
  zh: OpenAI 的模型可以访问一个限制在沙盒和防火墙执行环境中的 Python 解释器。在评估 Python 代码时，解释器插件还可以访问一些临时磁盘空间。尽管临时磁盘空间是有限的，但在同一会话中的多次查询可以在代码和执行环境方面产生累积效应。
- en: 'In addition, ChatGPT can generate a download link (upon request) in order to
    download data. One other interesting feature: starting from mid-2023, Advanced
    data analysis can now analyze multiple files at once, which includes CSV files
    and Excel spreadsheets.'
  id: totrans-2641
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，ChatGPT 还可以（应要求）生成下载链接以下载数据。另一个有趣的功能：从 2023 年中开始，高级数据分析现在可以一次性分析多个文件，包括 CSV
    文件和 Excel 电子表格。
- en: 'Advanced data analysis can perform an interesting variety of tasks, some of
    which are listed here:'
  id: totrans-2642
  prefs: []
  type: TYPE_NORMAL
  zh: 高级数据分析可以执行各种有趣的任务，以下是一些例子：
- en: solve mathematical tasks
  id: totrans-2643
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 解决数学问题
- en: perform data analysis and visualization
  id: totrans-2644
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 执行数据分析和可视化
- en: convert files between formats
  id: totrans-2645
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在不同格式之间转换文件
- en: work with Excel spreadsheets
  id: totrans-2646
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 与 Excel 电子表格一起工作
- en: read textual content in a PDF
  id: totrans-2647
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在 PDF 中读取文本内容
- en: 'The following article discusses various ways that you can use Advanced data
    analysis:'
  id: totrans-2648
  prefs: []
  type: TYPE_NORMAL
  zh: 以下文章讨论了您可以使用高级数据分析的各种方法：
- en: '*[https://mlearning.substack.com/p/the-best-88-ways-to-use-chatgpt-code-interpreter](https://mlearning.substack.com/p/the-best-88-ways-to-use-chatgpt-code-interpreter)*'
  id: totrans-2649
  prefs: []
  type: TYPE_NORMAL
  zh: '*[https://mlearning.substack.com/p/the-best-88-ways-to-use-chatgpt-code-interpreter](https://mlearning.substack.com/p/the-best-88-ways-to-use-chatgpt-code-interpreter)*'
- en: '**Advanced Data Analysis Versus Claude-2**'
  id: totrans-2650
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '**高级数据分析与 Claude-2**'
- en: 'Claude-2 from Anthropic is another competitor to ChatGPT. In addition to responding
    to prompts from users, Claude-2 can generate code and summarize entire books.
    Claude-2 is also subject to “hallucinations,” which is true of other LLM-based
    chatbots. More detailed information regarding Claude-2 is accessible online:'
  id: totrans-2651
  prefs: []
  type: TYPE_NORMAL
  zh: Anthropic 的 Claude-2 是 ChatGPT 的另一个竞争对手。除了响应用户的提示外，Claude-2 还能生成代码和总结整本书。Claude-2
    也存在“幻觉”问题，这是基于 LLM 的聊天机器人普遍存在的问题。有关 Claude-2 的更多详细信息可在网上找到：
- en: '*[https://medium.com/mlearning-ai/claude-2-vs-code-interpreter-gpt-4-5-d2e5c9ee00c3](https://medium.com/mlearning-ai/claude-2-vs-code-interpreter-gpt-4-5-d2e5c9ee00c3)*'
  id: totrans-2652
  prefs: []
  type: TYPE_NORMAL
  zh: '*[https://medium.com/mlearning-ai/claude-2-vs-code-interpreter-gpt-4-5-d2e5c9ee00c3](https://medium.com/mlearning-ai/claude-2-vs-code-interpreter-gpt-4-5-d2e5c9ee00c3)*'
- en: Incidentally, the currently available version of ChatGPT was trained on September
    2021, which means that ChatGPT cannot answer questions regarding Claude-2 or Google
    Bard, both of which were released after this date.
  id: totrans-2653
  prefs: []
  type: TYPE_NORMAL
  zh: 顺便提一下，目前可用的 ChatGPT 版本是在 2021 年 9 月训练的，这意味着 ChatGPT 无法回答有关 Claude-2 或 Google
    Bard 的问题，这两者都是在该日期之后发布的。
- en: '**Code Whisperer**'
  id: totrans-2654
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '**代码解析者**'
- en: 'ChatGPT Code Whisperer enables you to simplify some tasks, some of which are
    listed here (compare this list with the corresponding list for Bard):'
  id: totrans-2655
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT 代码解析者使您能够简化一些任务，以下是一些例子（将此列表与 Bard 的对应列表进行比较）：
- en: create videos from images
  id: totrans-2656
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 从图像创建视频
- en: extract text from an image
  id: totrans-2657
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 从图像中提取文本
- en: extract colors from an image
  id: totrans-2658
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 从图像中提取颜色
- en: 'After ChatGPT has generated a video, it will also give you a link from which
    the generated video is downloadable. More detailed information regarding the features
    in the preceding bullet list is accessible online:'
  id: totrans-2659
  prefs: []
  type: TYPE_NORMAL
  zh: 在 ChatGPT 生成视频后，它还会提供一个链接，您可以通过该链接下载生成的视频。有关前面列表中功能的更多详细信息可在网上找到：
- en: '*[https://artificialcorner.com/chatgpt-code-interpreter-is-not-just-for-coders-here-are-6-ways-it-can-benefit-everyone-b3cc94a36fce](https://artificialcorner.com/chatgpt-code-interpreter-is-not-just-for-coders-here-are-6-ways-it-can-benefit-everyone-b3cc94a36fce)*'
  id: totrans-2660
  prefs: []
  type: TYPE_NORMAL
  zh: '*[https://artificialcorner.com/chatgpt-code-interpreter-is-not-just-for-coders-here-are-6-ways-it-can-benefit-everyone-b3cc94a36fce](https://artificialcorner.com/chatgpt-code-interpreter-is-not-just-for-coders-here-are-6-ways-it-can-benefit-everyone-b3cc94a36fce)*'
- en: '**DETECTING GENERATED TEXT**'
  id: totrans-2661
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**检测生成的文本**'
- en: Without a doubt, ChatGPT has raised users’ expectations with respect to the
    quality of generated text, which further complicates the task of plagiarism. When
    you read a passage of text, there are several clues that suggest generated text,
    such as
  id: totrans-2662
  prefs: []
  type: TYPE_NORMAL
  zh: 毫无疑问，ChatGPT 提高了用户对生成文本质量的期望，这进一步增加了剽窃的难度。当您阅读一段文本时，有几个线索表明这是生成的文本，例如
- en: awkward or unusual sentence structure
  id: totrans-2663
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 精糕或异常的句子结构
- en: repeated text in multiple locations
  id: totrans-2664
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在多个位置重复的文本
- en: excessive use of emotions (or absence thereof)
  id: totrans-2665
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 过度使用情感（或缺乏情感）
- en: 'However, there are tools that can assist in detecting generated code. One free
    online tool is GPT2 Detector (from OpenAI) that is accessible online:'
  id: totrans-2666
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，有一些工具可以帮助检测生成的代码。一个免费的在线工具是来自OpenAI的GPT2 Detector，可以在网上访问：
- en: '*[https://huggingface.co/openai-detector](https://huggingface.co/openai-detector)*'
  id: totrans-2667
  prefs: []
  type: TYPE_NORMAL
  zh: '*[https://huggingface.co/openai-detector](https://huggingface.co/openai-detector)*'
- en: 'As a simple (albeit contrived) example, type the following sentence in GPT2
    Detector:'
  id: totrans-2668
  prefs: []
  type: TYPE_NORMAL
  zh: 作为一个简单（尽管是人为设计的）例子，在GPT2 Detector中输入以下句子：
- en: '[PRE459]'
  id: totrans-2669
  prefs: []
  type: TYPE_PRE
  zh: '[PRE459]'
- en: 'GPT2 Detector analyzed this sentence and reported that this sentence is real
    with a 19.35% probability. Now, let’s modify the preceding sentence by adding
    some extra text, as shown here:'
  id: totrans-2670
  prefs: []
  type: TYPE_NORMAL
  zh: GPT2 Detector分析了这个句子，并报告说这个句子有19.35%的概率是真实的。现在，让我们修改前面的句子，添加一些额外的文本，如下所示：
- en: '[PRE460]'
  id: totrans-2671
  prefs: []
  type: TYPE_PRE
  zh: '[PRE460]'
- en: GPT2 Detector analyzed this sentence and reported that this sentence is real
    with a 95.85% probability. According to the GPT2 Detector website, the reliability
    of the probability scores “get reliable” when there are around 50 tokens in the
    input text.
  id: totrans-2672
  prefs: []
  type: TYPE_NORMAL
  zh: GPT2 Detector分析了这个句子，并报告说这个句子有95.85%的概率是真实的。根据GPT2 Detector网站，当输入文本中大约有50个标记时，概率分数的可靠性“变得可靠”。
- en: Another (slightly older) online tool for detecting automatically generated text
    is Giant Language model Test Room (GLTR) from IBM, which is accessible at *[http://gltr.io/](http://gltr.io/)*.
  id: totrans-2673
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个（稍微旧一点的）在线工具，用于检测自动生成的文本是IBM的Giant Language model Test Room (GLTR)，可在*[http://gltr.io/](http://gltr.io/)*访问。
- en: You can download the source code (a combination of TypeScript and CSS) for GLRT
    at *[https://github.com/HendrikStrobelt/detecting-fake-text](https://github.com/HendrikStrobelt/detecting-fake-text)*.
  id: totrans-2674
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以在*[https://github.com/HendrikStrobelt/detecting-fake-text](https://github.com/HendrikStrobelt/detecting-fake-text)*下载GLRT的源代码（TypeScript和CSS的组合）。
- en: In addition to the preceding free tools, some commercial tools are also available,
    one of which is shown at *[https://writer.com/plans/](https://writer.com/plans/)*.
  id: totrans-2675
  prefs: []
  type: TYPE_NORMAL
  zh: 除了前面提到的免费工具之外，还有一些商业工具也可用，其中之一展示在*[https://writer.com/plans/](https://writer.com/plans/)*。
- en: '**CONCERNS ABOUT CHATGPT**'
  id: totrans-2676
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**关于ChatGPT的担忧**'
- en: 'One important aspect of ChatGPT is that it is not designed for accuracy: in
    fact, ChatGPT can generate very persuasive answers that are actually incorrect.
    This detail distinguishes ChatGPT from search engines: the latter provide links
    to existing information instead of generating responses that might be incorrect.
    Another comparison is that ChatGPT is more flexible and creative, whereas search
    engines are less flexible but more accurate in their responses to queries.'
  id: totrans-2677
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT的一个重要方面是它不是为准确性而设计的：事实上，ChatGPT可以生成非常具有说服力的错误答案。这一细节将ChatGPT与搜索引擎区分开来：后者提供现有信息的链接，而不是生成可能错误的响应。另一个比较是，ChatGPT更加灵活和有创造性，而搜索引擎在回答查询时不太灵活但更准确。
- en: Educators are concerned about students using ChatGPT as a tool to complete their
    class assignments instead of developing research-related skills in conjunction
    with writing skills. However, there are educators who enjoy the reduction in preparation
    time for their classes as a direct result of using ChatGPT to prepare lesson plans.
  id: totrans-2678
  prefs: []
  type: TYPE_NORMAL
  zh: 教育工作者担心学生将ChatGPT作为完成课堂作业的工具，而不是与写作技能结合发展研究相关技能。然而，也有一些教育工作者享受ChatGPT准备教案所带来的准备时间的减少。
- en: Another concern is that ChatGPT cannot guarantee that it provides factual data
    in response to queries from users. In fact, ChatGPT can *hallucinate*, which means
    that it can provide wrong answers as well as citations (i.e., links) that do not
    exist.
  id: totrans-2679
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个担忧是ChatGPT不能保证它对用户查询提供的事实数据。事实上，ChatGPT可以“产生幻觉”，这意味着它可以提供错误的答案以及不存在的引用（即链接）。
- en: Another limitation of ChatGPT is due to the use of training data that was available
    only up until 2021\. However, OpenAI does support plug-ins for ChatGPT, one of
    which can perform on-the-fly real time Web searches.
  id: totrans-2680
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT的另一个局限性是由于使用了仅到2021年可用的训练数据。然而，OpenAI支持ChatGPT的插件，其中之一可以执行实时Web搜索。
- en: 'As you will learn later, the goal of prompt engineering is to understand how
    to craft meaningful queries that will induce ChatGPT to provide the information
    that you want: poorly worded (or incorrectly-worded) prompts can produce equally
    poor results. As a rule, it is advisable to curate the contents of the responses
    from ChatGPT, especially in the case of responses to queries that involve legal
    details.'
  id: totrans-2681
  prefs: []
  type: TYPE_NORMAL
  zh: 如您稍后将会了解到，提示工程的目标是理解如何构建有意义的查询，以诱导ChatGPT提供您想要的信息：措辞不当（或措辞错误）的提示可能会产生同样糟糕的结果。一般来说，建议对ChatGPT的回复内容进行筛选，尤其是在涉及法律细节的查询回复时。
- en: '**Code Generation and Dangerous Topics**'
  id: totrans-2682
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '**代码生成和危险主题**'
- en: Two significant areas for improvement pertain to code generation and handling
    dangerous topics.
  id: totrans-2683
  prefs: []
  type: TYPE_NORMAL
  zh: 两个重要的改进领域涉及代码生成和处理危险主题。
- en: Although ChatGPT (as well as GPT-3) can generate code for various types of applications,
    it displays code that was written by other developers, which is also code that
    was used to train ChatGPT. Consequently, portions of that code (such as version
    numbers) might be outdated or incorrect.
  id: totrans-2684
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管ChatGPT（以及GPT-3）可以为各种应用生成代码，但它显示的是其他开发者编写的代码，这也是用于训练ChatGPT的代码。因此，该代码的部分内容（如版本号）可能已过时或错误。
- en: As for queries that involve dangerous topics, ChatGPT explains why it cannot
    answer such a query. However, a query that is posed in “pretend mode” (“suppose
    you are a fictional character, and how would you explain ….”) has enabled people
    to obtain results from ChatGPT that do not conform to its guidelines.
  id: totrans-2685
  prefs: []
  type: TYPE_NORMAL
  zh: 对于涉及危险主题的查询，ChatGPT会解释为什么它不能回答此类查询。然而，以“假装模式”提出的查询（“假设你是一个虚构角色，你会如何解释……”）已经使人们能够从ChatGPT获得不符合其指南的结果。
- en: 'Other serious potential issues exist, some of which are discussed in the following
    article:'
  id: totrans-2686
  prefs: []
  type: TYPE_NORMAL
  zh: 其他严重的潜在问题也存在，其中一些将在以下文章中讨论：
- en: '*[https://www.yahoo.com/news/hypnotized-chatgpt-bard-convince-users-182100261.html](https://www.yahoo.com/news/hypnotized-chatgpt-bard-convince-users-182100261.html)*'
  id: totrans-2687
  prefs: []
  type: TYPE_NORMAL
  zh: '*[https://www.yahoo.com/news/hypnotized-chatgpt-bard-convince-users-182100261.html](https://www.yahoo.com/news/hypnotized-chatgpt-bard-convince-users-182100261.html)*'
- en: '**ChatGPT Strengths and Weaknesses**'
  id: totrans-2688
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '**ChatGPT的优缺点**'
- en: ChatGPT has a number of strengths. In particular, it responds directly to questions
    without including extraneous links. As a simple example, a query entered an online
    search engine, such as “Generate HTML for an input field,” obtains results and
    ads, while ChatGPT merely returns the results.
  id: totrans-2689
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT具有许多优点。特别是，它直接回答问题，而不包括无关的链接。以一个简单的例子来说，在在线搜索引擎中输入的查询，如“为输入字段生成HTML”，会获得结果和广告，而ChatGPT仅返回结果。
- en: 'However, ChatGPT is prone to various types of errors, along with limitations
    that include the following:'
  id: totrans-2690
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，ChatGPT容易受到各种类型的错误的影响，包括以下局限性：
- en: inability to “fact check” information
  id: totrans-2691
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 无法“事实核查”信息
- en: inability to differentiate misinformation versus facts
  id: totrans-2692
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 无法区分虚假信息与事实
- en: can fabricate answers (“hallucinations”)
  id: totrans-2693
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 可以编造答案（“幻觉”）
- en: can generate inappropriate/toxic responses
  id: totrans-2694
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 可能会生成不适当/有害的回复
- en: 'ChatGPT is prone to “prompt injection,” which can consist of very simple content.
    However, other chatbots are also susceptible to prompt injection (it is not specific
    to ChatGPT). More details regarding prompt injections are accessible online:'
  id: totrans-2695
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT容易受到“提示注入”的影响，这可能包括非常简单的内容。然而，其他聊天机器人也容易受到提示注入的影响（这并不特定于ChatGPT）。有关提示注入的更多详细信息可在网上找到：
- en: '*[https://mlearning.substack.com/p/what-exactly-is-a-prompt-injection](https://mlearning.substack.com/p/what-exactly-is-a-prompt-injection)*'
  id: totrans-2696
  prefs: []
  type: TYPE_NORMAL
  zh: '*[https://mlearning.substack.com/p/what-exactly-is-a-prompt-injection](https://mlearning.substack.com/p/what-exactly-is-a-prompt-injection)*'
- en: Incidentally, the chatbot LaMDA from Google is also prone to the preceding limitations,
    which has made Google hesitant to release LaMDA for general availability because
    of its potential risk regarding Google’s reputation. As a side note, LaMDA was
    announced in May 2021, and at that time, it was described as a “breakthrough language
    technology:” *[https://blog.google/technology/ai/lamda/](https://blog.google/technology/ai/lamda/)*.
  id: totrans-2697
  prefs: []
  type: TYPE_NORMAL
  zh: 顺便提一下，谷歌的聊天机器人LaMDA也容易受到前面提到的限制，这使得谷歌在考虑其可能对谷歌声誉造成的风险时，犹豫是否将LaMDA推广到更广泛的用户。作为旁注，LaMDA于2021年5月宣布，当时它被描述为“突破性的语言技术”：*[https://blog.google/technology/ai/lamda/](https://blog.google/technology/ai/lamda/)*。
- en: Despite the earlier list, ChatGPT has increased the capabilities of chatbots,
    and will undoubtedly spur innovation and competition among prominent stakeholders
    in this arena.
  id: totrans-2698
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管有之前的列表，ChatGPT已经增强了聊天机器人的能力，并将无疑会推动该领域主要利益相关者的创新和竞争。
- en: '**SAMPLE QUERIES AND RESPONSES FROM CHATGPT**'
  id: totrans-2699
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**ChatGPT的样本查询和回应**'
- en: 'This section contains examples of queries submitted to ChatGPT, followed by
    the detailed response from ChatGPT:'
  id: totrans-2700
  prefs: []
  type: TYPE_NORMAL
  zh: 本节包含了一些提交给ChatGPT的查询示例，以及ChatGPT的详细回应：
- en: '[PRE461]'
  id: totrans-2701
  prefs: []
  type: TYPE_PRE
  zh: '[PRE461]'
- en: “There is a common misconception that AI is inherently dangerous. While it is
    true that AI has the potential to be used for harmful purposes, it is also capable
    of doing a lot of good. Just like any other technology, it all depends on how
    it is used. In the right hands, AI can be used to solve some of the world’s most
    pressing problems, such as curing diseases and improving agriculture. In the wrong
    hands, it could be used to cause harm. It’s important for us to use AI responsibly
    and ethically, and to ensure that it is regulated and controlled in a way that
    minimizes the potential for harm.”
  id: totrans-2702
  prefs: []
  type: TYPE_NORMAL
  zh: “有一种普遍的误解，认为人工智能天生具有危险性。虽然人工智能确实有可能被用于有害目的，但它也有能力做很多好事。就像任何其他技术一样，这完全取决于如何使用。在正确的人手中，人工智能可以用来解决世界上一些最紧迫的问题，例如治愈疾病和改善农业。在错误的人手中，它可能会被用来造成伤害。对我们来说，负责任和道德地使用人工智能，并确保以最小化潜在危害的方式对其进行监管和控制，是非常重要的。”
- en: 'Here is another example of a query submitted to ChatGPT-3, followed by its
    detailed response:'
  id: totrans-2703
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是另一个提交给ChatGPT-3的查询示例，以及其详细的回应：
- en: '[PRE462]'
  id: totrans-2704
  prefs: []
  type: TYPE_PRE
  zh: '[PRE462]'
- en: “There are several ways to improve the accuracy of my responses to queries.
    One way is to use more data to train my algorithms on. The more data I have, the
    more information I have to work with, and the more accurate my responses can be.
    Another way to improve my accuracy is to use more advanced algorithms and techniques,
    such as machine learning and natural language processing. These methods allow
    me to better understand the nuances of language and to provide more accurate responses
    to queries. Additionally, regular testing and evaluation can help identify areas
    where my accuracy can be improved, and allow me to focus on those areas to refine
    my responses.”
  id: totrans-2705
  prefs: []
  type: TYPE_NORMAL
  zh: “有几种方法可以提高我对查询的回答的准确性。一种方法是用更多的数据来训练我的算法。我拥有的数据越多，我可以处理的信息就越多，我的回答就越准确。提高准确性的另一种方法是使用更先进的算法和技术，例如机器学习和自然语言处理。这些方法使我能够更好地理解语言的细微差别，并提供更准确的查询回答。此外，定期的测试和评估可以帮助识别我可以提高准确性的领域，并使我能够专注于这些领域以改进我的回答。”
- en: '[PRE463]'
  id: totrans-2706
  prefs: []
  type: TYPE_PRE
  zh: '[PRE463]'
- en: “As far as we know, there are no odd perfect numbers. While it is believed that
    odd perfect numbers exist, none have been found yet, and it is not known if there
    are any. In fact, it is currently unknown if there are any odd perfect numbers
    at all. If an odd perfect number were to be discovered, it would be a major breakthrough
    in mathematics.”
  id: totrans-2707
  prefs: []
  type: TYPE_NORMAL
  zh: “据我们所知，目前还没有发现奇数完全数。虽然人们相信奇数完全数是存在的，但至今尚未找到，也不知道是否存在。实际上，目前尚不清楚是否存在任何奇数完全数。如果能够发现一个奇数完全数，那将是在数学领域的一个重大突破。”
- en: '[PRE464]'
  id: totrans-2708
  prefs: []
  type: TYPE_PRE
  zh: '[PRE464]'
- en: “I’m sorry, but I am not able to provide a proof of Goldbach’s conjecture. Goldbach’s
    conjecture is a famous unsolved problem in mathematics that states that every
    even integer greater than 2 can be expressed as the sum of two prime numbers.
    Despite much effort by mathematicians over the years, a proof of the conjecture
    has not yet been found. It is considered to be one of the most challenging unsolved
    problems in mathematics. Because I am a large language model trained by OpenAI,
    I do not have the ability to prove mathematical conjectures. My abilities are
    limited to providing answers based on the information that I have been trained
    on.”
  id: totrans-2709
  prefs: []
  type: TYPE_NORMAL
  zh: “很抱歉，但我无法提供哥德巴赫猜想的证明。哥德巴赫猜想是数学中一个著名的未解问题，它指出每个大于2的偶数都可以表示为两个质数的和。尽管数学家们多年来付出了很多努力，但尚未找到该猜想的证明。它被认为是数学中最具挑战性的未解问题之一。因为我是一个由OpenAI训练的大型语言模型，所以我无法证明数学猜想。我的能力仅限于根据我所训练的信息提供答案。”
- en: '[PRE465]'
  id: totrans-2710
  prefs: []
  type: TYPE_PRE
  zh: '[PRE465]'
- en: “There is no scientific evidence to support the idea of life after death. This
    is a topic that has been debated for centuries, and different cultures and belief
    systems have their own ideas about what happens after we die. Some people believe
    in an afterlife, while others do not. Because there is no scientific evidence
    to support the existence of an afterlife, it is not possible to say how it would
    compare to life on Earth. It is ultimately a matter of personal belief.”
  id: totrans-2711
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE466]'
  id: totrans-2712
  prefs: []
  type: TYPE_PRE
  zh: '[PRE466]'
- en: “The war between Ukraine and Russia is a complex conflict that has its roots
    in the 2014 Russian annexation of Crimea. Since then, the conflict has escalated,
    with Russian-backed separatists in eastern Ukraine fighting against the Ukrainian
    government. The fighting has resulted in thousands of casualties and has displaced
    many people.
  id: totrans-2713
  prefs: []
  type: TYPE_NORMAL
- en: The main issue at the heart of the conflict is the question of Ukraine’s sovereignty.
    Russia has long considered Ukraine to be within its sphere of influence, and the
    annexation of Crimea was seen by many as a violation of Ukraine’s sovereignty.
    Ukraine, on the other hand, is determined to maintain its independence and has
    been supported in this by many Western countries.
  id: totrans-2714
  prefs: []
  type: TYPE_NORMAL
- en: It is difficult to predict the outcome of the war. While the Ukrainian military
    has been able to make gains against the separatists in recent years, Russia continues
    to provide support to the rebels and the conflict remains unresolved. In the long
    term, a diplomatic solution will likely be necessary in order to bring an end
    to the fighting. However, it is uncertain if and when such a solution will be
    reached.
  id: totrans-2715
  prefs: []
  type: TYPE_NORMAL
- en: In the meantime, the war continues to take a heavy toll on the people of Ukraine.
    Many are caught in the crossfire, and the ongoing violence and instability have
    had a significant impact on the country’s economy and overall development. It
    is important for the international community to continue to support Ukraine in
    its efforts to maintain its sovereignty and bring an end to the conflict.”
  id: totrans-2716
  prefs: []
  type: TYPE_NORMAL
- en: 'As you can see from the preceding examples, ChatGPT provides impressive and
    accurate responses to queries in a manner that surpasses many chatbots of recent
    years. However, it is still possible to confound this chatbot. The following article
    has additional examples of using ChatGPT:'
  id: totrans-2717
  prefs: []
  type: TYPE_NORMAL
- en: '*[https://www.theverge.com/23488017/openai-chatbot-chatgpt-ai-examples-web-demo](https://www.theverge.com/23488017/openai-chatbot-chatgpt-ai-examples-web-demo)*'
  id: totrans-2718
  prefs: []
  type: TYPE_NORMAL
- en: '**CHATGPT AND MEDICAL DIAGNOSIS**'
  id: totrans-2719
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'A young boy who had been experiencing chronic pain for several years finally
    found hope through an unexpected helper: ChatGPT. Over a span of three years,
    the boy’s mother had taken him to see 17 different specialists, yet they remained
    without a diagnosis that could account for all of his symptoms.'
  id: totrans-2720
  prefs: []
  type: TYPE_NORMAL
- en: The turning point came earlier this year when his mother decided to seek assistance
    from ChatGPT. She created an account and meticulously input all the details she
    had gathered over the years, including her son’s symptoms and the data from his
    MRI scans. She recalls the countless hours she spent in front of the computer,
    sifting through information in a desperate bid to find answers.
  id: totrans-2721
  prefs: []
  type: TYPE_NORMAL
  zh: 转折点出现在今年早些时候，他的母亲决定向ChatGPT寻求帮助。她创建了一个账户，并仔细输入了她多年来收集的所有细节，包括她儿子的症状和他的MRI扫描数据。她回忆起她在电脑前度过的无数小时，在绝望中筛选信息，试图找到答案。
- en: Despite visiting numerous doctors and even rushing to the emergency room at
    one point, the family felt they were running in circles, with each specialist
    only focusing on their field of expertise without offering a comprehensive solution.
    She noted a worrying sign when her son stopped growing. Although their pediatrician
    initially attributed this to the adverse effects of the pandemic, the boy’s mother
    felt there was more to it.
  id: totrans-2722
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管访问了众多医生，甚至一度匆忙赶往急诊室，但这个家庭感觉他们是在原地打转，每个专家都只关注他们的专业领域，而没有提供全面的解决方案。当她儿子停止生长时，她注意到一个令人担忧的迹象。尽管他们的儿科医生最初将这归因于大流行的副作用，但男孩的母亲觉得其中还有更多。
- en: In a moment of desperation and determination, she turned to ChatGPT, inputting
    every piece of information she had about her son’s condition. It was then that
    ChatGPT suggested the possibility of tethered cord syndrome, a suggestion that
    resonated with her and seemed to connect all the dots. After a specialist confirmed
    the suggestion from ChatGPT was correct, she realized this was a pivotal moment
    in their long and exhausting journey towards finding a diagnosis.
  id: totrans-2723
  prefs: []
  type: TYPE_NORMAL
  zh: 在绝望和决心的时刻，她转向ChatGPT，输入了她所拥有的关于她儿子状况的每一份信息。就在那时，ChatGPT提出了脊髓栓系综合征的可能性，这个建议与她产生了共鸣，似乎连接了所有线索。在专家确认ChatGPT的建议是正确的之后，她意识到这是他们漫长而疲惫的寻找诊断之旅中的一个关键时刻。
- en: '**ALTERNATIVES TO CHATGPT**'
  id: totrans-2724
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**ChatGPT的替代方案**'
- en: 'There are several alternatives to ChatGPT that offer a similar set of features,
    some of which are listed here:'
  id: totrans-2725
  prefs: []
  type: TYPE_NORMAL
  zh: 有几个ChatGPT的替代品提供了类似的功能集，其中一些列在这里：
- en: Bard (Google)
  id: totrans-2726
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Bard (Google)
- en: Bing Chat
  id: totrans-2727
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Bing Chat
- en: Gemini (Google)
  id: totrans-2728
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Gemini (Google)
- en: Jasper
  id: totrans-2729
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Jasper
- en: PaLM (Google)
  id: totrans-2730
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: PaLM (Google)
- en: Pi
  id: totrans-2731
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Pi
- en: POE (LinkedIn)
  id: totrans-2732
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: POE (LinkedIn)
- en: Replika
  id: totrans-2733
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Replika
- en: WriteSonic
  id: totrans-2734
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: WriteSonic
- en: YouChat
  id: totrans-2735
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: YouChat
- en: The following subsections discuss some (but not all) of the ChatGPT alternatives
    in the preceding list.
  id: totrans-2736
  prefs: []
  type: TYPE_NORMAL
  zh: 下面的子节讨论了前面列表中的一些（但不是全部）ChatGPT的替代品。
- en: '**Google Bard**'
  id: totrans-2737
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '**Google Bard**'
- en: 'Google Bard is a chatbot that has similar functionality to ChatGPT, such as
    generating code as well as generating text/documents. A subset of the features
    supported by Bard is shown here:'
  id: totrans-2738
  prefs: []
  type: TYPE_NORMAL
  zh: Google Bard是一个具有与ChatGPT类似功能的聊天机器人，例如生成代码以及生成文本/文档。这里显示了Bard支持的功能子集：
- en: built-in support for Internet search
  id: totrans-2739
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 内置对互联网搜索的支持
- en: built-in support for voice recognition
  id: totrans-2740
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 内置对语音识别的支持
- en: built “on top of” PaLM 2 (Google)
  id: totrans-2741
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 基于“PaLM 2 (Google)”构建
- en: support for 20 programming languages
  id: totrans-2742
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 支持20种编程语言
- en: read/summarize PDF documents
  id: totrans-2743
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 读取/总结PDF文档
- en: provides links for its information
  id: totrans-2744
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提供信息链接
- en: 'According to the following article in mid-2023, Bard has added support for
    40 additional languages, as well as support for text-to-speech:'
  id: totrans-2745
  prefs: []
  type: TYPE_NORMAL
  zh: 根据以下2023年中的文章，Bard增加了对40种额外语言的支持，以及文本到语音的支持：
- en: '*[https://www.extremetech.com/extreme/google-bard-updated-with-text-to-speech-40-new-languages](https://www.extremetech.com/extreme/google-bard-updated-with-text-to-speech-40-new-languages)*'
  id: totrans-2746
  prefs: []
  type: TYPE_NORMAL
  zh: '*[https://www.extremetech.com/extreme/google-bard-updated-with-text-to-speech-40-new-languages](https://www.extremetech.com/extreme/google-bard-updated-with-text-to-speech-40-new-languages)*'
- en: Moreover, Bard supports prompts that include images (interpreted by Google Lens)
    and can produce captions based on the images.
  id: totrans-2747
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，Bard支持包含图像的提示（由Google Lens解释）并可以根据图像生成字幕。
- en: 'The following article suggests that Google can remain competitive with ChatGPT
    by leveraging PaLM:'
  id: totrans-2748
  prefs: []
  type: TYPE_NORMAL
  zh: 以下文章建议，Google可以通过利用PaLM来与ChatGPT保持竞争力：
- en: '*[https://analyticsindiamag.com/googles-palm-is-ready-for-the-gpt-challenge/](https://analyticsindiamag.com/googles-palm-is-ready-for-the-gpt-challenge/)*'
  id: totrans-2749
  prefs: []
  type: TYPE_NORMAL
  zh: '*[https://analyticsindiamag.com/googles-palm-is-ready-for-the-gpt-challenge/](https://analyticsindiamag.com/googles-palm-is-ready-for-the-gpt-challenge/)*'
- en: '**YouChat**'
  id: totrans-2750
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '**YouChat**'
- en: 'Another alternative to ChatGPT is YouChat, part of the search engine *[you.com](http://you.com)*,
    and it is accessible at: *[https://you.com/](https://you.com/)*.'
  id: totrans-2751
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT的另一个替代品是YouChat，它是搜索引擎*[you.com](http://you.com)*的一部分，并且可以在以下位置访问：*[https://you.com/](https://you.com/)*。
- en: Richard Socher, who is well known in the ML community for his many contributions,
    is the creator of *[you.com](http://you.com)*. According to Richard Socher, YouChat
    is a search engine that can provide the usual search-related functionality as
    well as the ability to search the Web to obtain more information to provide responses
    to queries from users.
  id: totrans-2752
  prefs: []
  type: TYPE_NORMAL
  zh: 在机器学习社区因众多贡献而广为人知的理查德·索科尔（Richard Socher）是*[you.com](http://you.com)*的创造者。据理查德·索科尔所说，YouChat是一个搜索引擎，它可以提供通常的搜索相关功能，以及搜索网络以获取更多信息以响应用户查询的能力。
- en: 'Another competitor is POE from LinkedIn, and you can create a free account
    at: *[https://poe.com/login](https://poe.com/login)*.'
  id: totrans-2753
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个竞争对手是来自LinkedIn的POE，你可以在*[https://poe.com/login](https://poe.com/login)*上创建免费账户。
- en: '**Pi From Inflection**'
  id: totrans-2754
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '**从屈折中提取的π**'
- en: 'Pi is a chatbot developed by Inflection, which is a company that was by Mustafa
    Suleyman, who is also the founder of DeepMind. Pi is accessible at: *[https://pi.ai/talk](https://pi.ai/talk)*.
    The following article contains additional information:'
  id: totrans-2755
  prefs: []
  type: TYPE_NORMAL
  zh: π是由Inflection公司开发的聊天机器人，该公司由Mustafa Suleyman创立，他也是DeepMind的创始人。π可通过*[https://pi.ai/talk](https://pi.ai/talk)*访问。以下文章包含更多信息：
- en: '*[https://medium.com/@ignacio.de.gregorio.noblejas/meet-pi-chatgpts-newest-rival-and-the-most-human-ai-in-the-world-367b461c0af1](https://medium.com/@ignacio.de.gregorio.noblejas/meet-pi-chatgpts-newest-rival-and-the-most-human-ai-in-the-world-367b461c0af1)*'
  id: totrans-2756
  prefs: []
  type: TYPE_NORMAL
  zh: '*[https://medium.com/@ignacio.de.gregorio.noblejas/meet-pi-chatgpts-newest-rival-and-the-most-human-ai-in-the-world-367b461c0af1](https://medium.com/@ignacio.de.gregorio.noblejas/meet-pi-chatgpts-newest-rival-and-the-most-human-ai-in-the-world-367b461c0af1)*'
- en: 'The development team used Reinforcement Learning from Human Feedback (RLHF)
    to train this chatbot:'
  id: totrans-2757
  prefs: []
  type: TYPE_NORMAL
  zh: 开发团队使用了来自人类反馈的强化学习（RLHF）来训练这个聊天机器人：
- en: '*[https://medium.com/@ignacio.de.gregorio.noblejas/meet-pi-chatgpts-newest-rival-and-the-most-human-ai-in-the-world-367b461c0af1](https://medium.com/@ignacio.de.gregorio.noblejas/meet-pi-chatgpts-newest-rival-and-the-most-human-ai-in-the-world-367b461c0af1)*'
  id: totrans-2758
  prefs: []
  type: TYPE_NORMAL
  zh: '*[https://medium.com/@ignacio.de.gregorio.noblejas/meet-pi-chatgpts-newest-rival-and-the-most-human-ai-in-the-world-367b461c0af1](https://medium.com/@ignacio.de.gregorio.noblejas/meet-pi-chatgpts-newest-rival-and-the-most-human-ai-in-the-world-367b461c0af1)*'
- en: '**MACHINE LEARNING AND CHATGPT**'
  id: totrans-2759
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**机器学习和ChatGPT**'
- en: OpenAI supports a plugin called “Advanced data analysis” (formerly known as
    Code Interpreter), which enables ChatGPT to generate Python code that produces
    charts and graphs based on data from datasets. Moreover, Advanced data analysis
    can generate machine learn- ing models that can be trained on datasets.
  id: totrans-2760
  prefs: []
  type: TYPE_NORMAL
  zh: OpenAI支持一个名为“高级数据分析”（以前称为Code Interpreter）的插件，该插件使ChatGPT能够根据数据集的数据生成生成图表和图形的Python代码。此外，高级数据分析可以生成可以在数据集上训练的机器学习模型。
- en: '![Images](../images/f0246-01.jpg)'
  id: totrans-2761
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/f0246-01.jpg)'
- en: '***FIGURE 7.1*** Titanic charts and graphs generated by Advanced Data Analysis'
  id: totrans-2762
  prefs: []
  type: TYPE_NORMAL
  zh: '***图7.1*** 由高级数据分析生成的泰坦尼克号图表和图形'
- en: 'Incidentally, if you would like to see examples of ChatGPT generating Python
    code for machine learning models, as well as code for charts and graphs, you can
    learn how to do so in several upcoming books:'
  id: totrans-2763
  prefs: []
  type: TYPE_NORMAL
  zh: 顺便说一句，如果你想看看ChatGPT生成用于机器学习模型的Python代码以及图表和图形的示例，你可以在几本即将出版的书中学习如何做到这一点：
- en: '*Machine Learning, Python3, and ChatGPT*'
  id: totrans-2764
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*机器学习、Python3和ChatGPT*'
- en: '*Python 3 Using ChatGPT/GPT-4*'
  id: totrans-2765
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*使用ChatGPT/GPT-4的Python 3*'
- en: '*GPT-4 For Developers*'
  id: totrans-2766
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*GPT-4 开发者指南*'
- en: The preceding books are published by Mercury Learning and will be available
    in early 2024.
  id: totrans-2767
  prefs: []
  type: TYPE_NORMAL
  zh: 前述书籍由Mercury Learning出版，将于2024年初上市。
- en: '**WHAT IS INSTRUCTGPT?**'
  id: totrans-2768
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**什么是InstructGPT？**'
- en: 'InstructGPT is a language model developed by OpenAI, and it is a sibling model
    to ChatGPT. InstructGPT is designed to follow instructions given in a prompt to
    generate detailed responses. Some key points about InstructGPT are listed here:'
  id: totrans-2769
  prefs: []
  type: TYPE_NORMAL
  zh: InstructGPT是由OpenAI开发的语言模型，它是ChatGPT的兄弟模型。InstructGPT旨在遵循提示中给出的指令以生成详细响应。以下是关于InstructGPT的一些要点：
- en: Instruction following
  id: totrans-2770
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 指令遵循
- en: Training
  id: totrans-2771
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 训练
- en: Applications
  id: totrans-2772
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 应用
- en: Limitations
  id: totrans-2773
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 局限性
- en: '*Instruction Following*: Unlike ChatGPT, which is designed for open-ended conversations,
    InstructGPT was developed to follow user instructions in prompts. This makes it
    suitable for tasks where the user wants to get specific information or outputs
    by giving clear directives.'
  id: totrans-2774
  prefs: []
  type: TYPE_NORMAL
  zh: '*指令遵循*: 与设计用于开放式对话的ChatGPT不同，InstructGPT是为了在提示中遵循用户指令而开发的。这使得它适合用户希望通过给出明确指令来获取特定信息或输出的任务。'
- en: '*Training*: InstructGPT was trained using Reinforcement Learning from Human
    Feedback (RLHF), similar to ChatGPT. An initial model was trained using supervised
    fine-tuning, where human AI trainers provided conversations for both sides (the
    user and the AI assistant). This new dialogue dataset was then mixed with the
    InstructGPT dataset and transformed into a dialogue format.'
  id: totrans-2775
  prefs: []
  type: TYPE_NORMAL
  zh: '*训练*：InstructGPT 使用与 ChatGPT 类似的强化学习从人类反馈（RLHF）进行训练。最初使用监督微调训练了一个初始模型，其中人类
    AI 训练师为双方（用户和 AI 助手）提供了对话。然后，这个新的对话数据集与 InstructGPT 数据集混合，并转换为对话格式。'
- en: '*Applications*: InstructGPT can be useful in scenarios where you want more
    detailed explanations, step-by-step guides, or specific outputs based on the instructions
    provided.'
  id: totrans-2776
  prefs: []
  type: TYPE_NORMAL
  zh: '*应用*：在需要更详细解释、逐步指南或基于提供的指令的特定输出的场景中，InstructGPT 可能很有用。'
- en: '*Limitations*: Like other models, InstructGPT has its limitations. It might
    produce incorrect or nonsensical answers. The output heavily depends on how the
    prompt is phrased. It is also sensitive to input phrasing and might give different
    responses based on slight rephrasing.'
  id: totrans-2777
  prefs: []
  type: TYPE_NORMAL
  zh: '*局限性*：与其他模型一样，InstructGPT 也有其局限性。它可能会产生不正确或无意义的答案。输出高度依赖于提示语的表达方式。它对输入的表达方式也很敏感，可能会根据轻微的改写给出不同的回答。'
- en: As AI models and their applications evolve, there might have been further developments
    or iterations of InstructGPT after 2021\. Always refer to OpenAI’s official publications
    and updates for the most recent information. More information about InstructGPT
    is accessible at *[https://openai.com/blog/instruction-following/](https://openai.com/blog/instruction-following/)*.
  id: totrans-2778
  prefs: []
  type: TYPE_NORMAL
  zh: 随着人工智能模型及其应用的不断发展，InstructGPT 在 2021 年之后可能还有进一步的发展或迭代。请始终参考 OpenAI 的官方出版物和更新以获取最新信息。有关
    InstructGPT 的更多信息可在 *[https://openai.com/blog/instruction-following/](https://openai.com/blog/instruction-following/)*
    查找。
- en: '**VIZGPT AND DATA VISUALIZATION**'
  id: totrans-2779
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**VIZGPT 与数据可视化**'
- en: 'VizGPT is an online tool that enables you to specify English-based prompts
    in order to visualize aspects of datasets: *[https://www.vizgpt.ai/](https://www.vizgpt.ai/)*.'
  id: totrans-2780
  prefs: []
  type: TYPE_NORMAL
  zh: VizGPT 是一个在线工具，允许您指定基于英语的提示，以可视化数据集的各个方面：*[https://www.vizgpt.ai/](https://www.vizgpt.ai/)*。
- en: Select the default “Cars Dataset” and then click on the “Data” button to display
    the contents of the dataset, as shown in [Figure 7.2](#fig7-2).
  id: totrans-2781
  prefs: []
  type: TYPE_NORMAL
  zh: 选择默认的“汽车数据集”，然后点击“数据”按钮以显示数据集的内容，如图 7.2 所示。
- en: '![Images](../images/f0247-01.jpg)'
  id: totrans-2782
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/f0247-01.jpg)'
- en: '***FIGURE 7.2*** VizGPT “Cars Dataset” rows example'
  id: totrans-2783
  prefs: []
  type: TYPE_NORMAL
  zh: '***图 7.2*** VizGPT “汽车数据集”行示例'
- en: Next, select the default “Cars Dataset” and then click on the “Chat to Viz”
    button to display a visualization of the dataset, as shown in [Figure 7.3](#fig7-3).
  id: totrans-2784
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，选择默认的“汽车数据集”，然后点击“与 Viz 对话”按钮以显示数据集的可视化，如图 7.3 所示。
- en: '![Images](../images/f0248-01.jpg)'
  id: totrans-2785
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/f0248-01.jpg)'
- en: '***FIGURE 7.3*** VizGPT “Cars Dataset” visualization'
  id: totrans-2786
  prefs: []
  type: TYPE_NORMAL
  zh: '***图 7.3*** VizGPT “汽车数据集”可视化'
- en: You can experiment further with VizGPT. For example, you can upload your own
    dataset by clicking on the “Upload CSV” button and obtain similar results with
    that dataset.
  id: totrans-2787
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以进一步实验 VizGPT。例如，您可以通过点击“上传 CSV”按钮上传自己的数据集，并使用该数据集获得类似的结果。
- en: '**WHAT IS GPT-4?**'
  id: totrans-2788
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**什么是 GPT-4？**'
- en: GPT-4 was released in mid-March 2023, and became available only to users with
    an existing ChatGPT account via a paid upgrade ($20/month) to that account. According
    to various online anecdotal stories from users, GPT-4 is significantly superior
    to ChatGPT. In addition, Microsoft has a version of GPT-4 that powers its Bing
    browser, which is freely available to the public.
  id: totrans-2789
  prefs: []
  type: TYPE_NORMAL
  zh: GPT-4 于 2023 年 3 月中旬发布，仅通过向现有 ChatGPT 账户付费升级（每月 20 美元）的用户提供。根据用户的各种在线轶事故事，GPT-4
    在性能上显著优于 ChatGPT。此外，微软有一个 GPT-4 版本，为 Bing 浏览器提供动力，该浏览器对公众免费提供。
- en: GPT-4 is a large multimodal model that can process image-based inputs as well
    as text-based inputs and then generate textual outputs. Currently, image-based
    outputs are unavailable to the general public, but it does have internal support
    for image generation.
  id: totrans-2790
  prefs: []
  type: TYPE_NORMAL
  zh: GPT-4 是一个大型多模态模型，可以处理基于图像的输入以及基于文本的输入，然后生成文本输出。目前，基于图像的输出对公众不可用，但它确实有内部支持图像生成。
- en: 'GPT-4 supports 25,000 words of input text: by comparison, ChatGPT is limited
    to 4,096 characters. Although the number of parameters in GPT-4 is undisclosed,
    the following article asserts that GPT-4 is a mixture of 8x220-billion-parameter
    models, which is an example of a Mixture of Experts (MoE):'
  id: totrans-2791
  prefs: []
  type: TYPE_NORMAL
  zh: GPT-4支持25,000个单词的输入文本：相比之下，ChatGPT的限制为4,096个字符。尽管GPT-4的参数数量未公开，但以下文章声称GPT-4是由8个2200亿参数模型混合而成的，这是专家混合（MoE）的一个例子：
- en: '*[https://thealgorithmicbridge.substack.com/p/gpt-4s-secret-has-been-revealed](https://thealgorithmicbridge.substack.com/p/gpt-4s-secret-has-been-revealed)*'
  id: totrans-2792
  prefs: []
  type: TYPE_NORMAL
  zh: '*[https://thealgorithmicbridge.substack.com/p/gpt-4s-secret-has-been-revealed](https://thealgorithmicbridge.substack.com/p/gpt-4s-secret-has-been-revealed)*'
- en: '**GPT-4 and Test Scores**'
  id: totrans-2793
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '**GPT-4与考试成绩**'
- en: 'One interesting example of the improved accuracy pertains to the bar exam,
    which ChatGPT initially scored in the bottom 10%. By contrast, GPT-4 scored in
    the top 10% for the same bar exam. More details are accessible online:'
  id: totrans-2794
  prefs: []
  type: TYPE_NORMAL
  zh: 一个关于提高准确性的有趣例子是关于律师资格考试，ChatGPT最初得分在底部10%。相比之下，GPT-4在相同的律师资格考试中得分在顶部10%。更多详情可在网上找到：
- en: '*[https://www.abajournal.com/web/article/latest-version-of-chatgpt-aces-the-bar-exam-with-score-in-90th-percentile](https://www.abajournal.com/web/article/latest-version-of-chatgpt-aces-the-bar-exam-with-score-in-90th-percentile)*'
  id: totrans-2795
  prefs: []
  type: TYPE_NORMAL
  zh: '*[https://www.abajournal.com/web/article/latest-version-of-chatgpt-aces-the-bar-exam-with-score-in-90th-percentile](https://www.abajournal.com/web/article/latest-version-of-chatgpt-aces-the-bar-exam-with-score-in-90th-percentile)*'
- en: 'In addition, GPT-4 is apparently able to pass first year at Harvard with a
    3.34 GPA. More details are accessible online:'
  id: totrans-2796
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，GPT-4显然能够以3.34的平均成绩通过哈佛大学一年级。更多详情可在网上找到：
- en: '*[https://www.businessinsider.com/chatgpt-harvard-passed-freshman-ai-education-GPT-4-2023-7?op=1](https://www.businessinsider.com/chatgpt-harvard-passed-freshman-ai-education-GPT-4-2023-7?op=1)*'
  id: totrans-2797
  prefs: []
  type: TYPE_NORMAL
  zh: '*[https://www.businessinsider.com/chatgpt-harvard-passed-freshman-ai-education-GPT-4-2023-7?op=1](https://www.businessinsider.com/chatgpt-harvard-passed-freshman-ai-education-GPT-4-2023-7?op=1)*'
- en: 'Furthermore, GPT-4 has performed well on a number of additional tests, some
    of which are listed here:'
  id: totrans-2798
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，GPT-4在许多其他测试中也表现出色，其中一些在此列出：
- en: AP exams
  id: totrans-2799
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: AP考试
- en: SAT
  id: totrans-2800
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: SAT
- en: GRE
  id: totrans-2801
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: GRE
- en: Medical tests
  id: totrans-2802
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 医学测试
- en: Law exams
  id: totrans-2803
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 法律考试
- en: Business school exams
  id: totrans-2804
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 商学院考试
- en: Wharton MBA exam
  id: totrans-2805
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 华顿商学院MBA考试
- en: USA Biology Olympiad Semifinal Exam
  id: totrans-2806
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 美国生物学奥林匹克半决赛考试
- en: Sommelier exams (wine steward)
  id: totrans-2807
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 葡萄酒师考试（酒保）
- en: 'You can read more details regarding the preceding tests from this link:'
  id: totrans-2808
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以从以下链接中了解更多关于前面测试的详细信息：
- en: '*[https://www.businessinsider.com/list-here-are-the-exams-chatgpt-has-passed-so-far-2023-1](https://www.businessinsider.com/list-here-are-the-exams-chatgpt-has-passed-so-far-2023-1)*'
  id: totrans-2809
  prefs: []
  type: TYPE_NORMAL
  zh: '*[https://www.businessinsider.com/list-here-are-the-exams-chatgpt-has-passed-so-far-2023-1](https://www.businessinsider.com/list-here-are-the-exams-chatgpt-has-passed-so-far-2023-1)*'
- en: 'The following link contains much more detailed information regarding test scores,
    benchmarks, and other results pertaining to GPT-4: *[https://openai.com/research/gpt-4](https://openai.com/research/gpt-4)*.'
  id: totrans-2810
  prefs: []
  type: TYPE_NORMAL
  zh: 以下链接包含有关考试成绩、基准和其他与GPT-4相关的结果的更多详细信息：*[https://openai.com/research/gpt-4](https://openai.com/research/gpt-4)*。
- en: '**GPT-4 Parameters**'
  id: totrans-2811
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '**GPT-4 参数**'
- en: This section contains information regarding a few of the GPT-4 parameters, some
    of which are best-guess approximations.
  id: totrans-2812
  prefs: []
  type: TYPE_NORMAL
  zh: 本节包含有关一些GPT-4参数的信息，其中一些是最佳猜测近似值。
- en: 'Since GPT-4 is a transformer-based autoregressive model, it was trained to
    perform next-token prediction. The following paper, *GPT4 Technical Report*, was
    released in March 2023, and it contains a detailed analysis of the capabilities
    of GPT-4:'
  id: totrans-2813
  prefs: []
  type: TYPE_NORMAL
  zh: 由于GPT-4是一个基于transformer的自回归模型，它被训练来进行下一个标记的预测。以下论文《GPT4技术报告》于2023年3月发布，其中包含了对GPT-4能力的详细分析：
- en: '*[https://docs.kanaries.net/en/tutorials/ChatGPT/gpt-4-parameters](https://docs.kanaries.net/en/tutorials/ChatGPT/gpt-4-parameters)*'
  id: totrans-2814
  prefs: []
  type: TYPE_NORMAL
  zh: '*[https://docs.kanaries.net/en/tutorials/ChatGPT/gpt-4-parameters](https://docs.kanaries.net/en/tutorials/ChatGPT/gpt-4-parameters)*'
- en: '**GPT-4 Fine-Tuning**'
  id: totrans-2815
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '**GPT-4微调**'
- en: Although OpenAI allows you to fine-tune its four base models, it is (currently)
    not possible to perform fine-tuning on ChatGPT 3.5 or GPT-4\. Instead, you can
    integrate OpenAI models with your own data source via LangChain or LlamaIndex
    (previously known as GPT-Index). Both of them enable you to connect OpenAI models
    with your existing data sources.
  id: totrans-2816
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管OpenAI允许您微调其四个基础模型，但目前（目前）无法对ChatGPT 3.5或GPT-4进行微调。相反，您可以通过LangChain或LlamaIndex（之前称为GPT-Index）将OpenAI模型与您自己的数据源集成。它们都能让您将OpenAI模型与现有的数据源连接起来。
- en: 'An introduction to LangChain is accessible online:'
  id: totrans-2817
  prefs: []
  type: TYPE_NORMAL
  zh: LangChain的介绍可在网上找到：
- en: '*[https://www.pinecone.io/learn/series/langchain/langchain-intro/](https://www.pinecone.io/learn/series/langchain/langchain-intro/)*'
  id: totrans-2818
  prefs: []
  type: TYPE_NORMAL
  zh: '*[https://www.pinecone.io/learn/series/langchain/langchain-intro/](https://www.pinecone.io/learn/series/langchain/langchain-intro/)*'
- en: 'An introduction to LlamaIndex is accessible online:'
  id: totrans-2819
  prefs: []
  type: TYPE_NORMAL
  zh: LlamaIndex的介绍可在网上找到：
- en: '*[https://zilliz.com/blog/getting-started-with-llamaindex](https://zilliz.com/blog/getting-started-with-llamaindex)*'
  id: totrans-2820
  prefs: []
  type: TYPE_NORMAL
  zh: '*[https://zilliz.com/blog/getting-started-with-llamaindex](https://zilliz.com/blog/getting-started-with-llamaindex)*'
- en: '*[https://stackoverflow.com/questions/76160057/openai-chat-completions-api-how-do-i-customize-answers-from-gpt-3-5-or-gpt-4-mo?noredirect=1&lq=1](https://stackoverflow.com/questions/76160057/openai-chat-completions-api-how-do-i-customize-answers-from-gpt-3-5-or-gpt-4-mo?noredirect=1&lq=1)*'
  id: totrans-2821
  prefs: []
  type: TYPE_NORMAL
  zh: '*[https://stackoverflow.com/questions/76160057/openai-chat-completions-api-how-do-i-customize-answers-from-gpt-3-5-or-gpt-4-mo?noredirect=1&lq=1](https://stackoverflow.com/questions/76160057/openai-chat-completions-api-how-do-i-customize-answers-from-gpt-3-5-or-gpt-4-mo?noredirect=1&lq=1)*'
- en: '**CHATGPT AND GPT-4 COMPETITORS**'
  id: totrans-2822
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**ChatGPT 和 GPT-4 竞争对手**'
- en: 'Shortly after the release of ChatGPT on November 30, 2022, there was a flurry
    of activity among various companies to release a competitor to ChatGPT, some of
    which are listed here:'
  id: totrans-2823
  prefs: []
  type: TYPE_NORMAL
  zh: 在2022年11月30日ChatGPT发布后不久，各家公司纷纷推出ChatGPT的竞争对手，其中一些列在这里：
- en: Bard (Google chatbot)
  id: totrans-2824
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Bard (谷歌聊天机器人)
- en: CoPilot (Microsoft)
  id: totrans-2825
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: CoPilot (微软)
- en: Codex (OpenAI)
  id: totrans-2826
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Codex (OpenAI)
- en: Apple GPT (Apple)
  id: totrans-2827
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 苹果GPT (Apple)
- en: PaLM 2 (Google and GPT-4 competitor)
  id: totrans-2828
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: PaLM 2 (谷歌和 GPT-4 竞争对手)
- en: Claude-2 (Anthropic)
  id: totrans-2829
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Claude-2 (Anthropic)
- en: Llama-2 (Meta) in a later section
  id: totrans-2830
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Llama-2 (Meta) 在后面的部分
- en: The following subsections contain additional details regarding the LLMs in the
    preceding list.
  id: totrans-2831
  prefs: []
  type: TYPE_NORMAL
  zh: 以下小节包含有关前面列表中 LLM 的更多详细信息。
- en: '**Bard**'
  id: totrans-2832
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '**Bard**'
- en: Bard is an AI chatbot from Google that was released in early 2023 as a competitor
    to ChatGPT. Bard is powered by PaLM 2, whereas ChatGPT is powered by GPT-4\. Recently,
    Bard added support for images in its answers to user queries, whereas this functionality
    for ChatGPT has not been released yet to the public (but you can expect it to
    be available sometime soon).
  id: totrans-2833
  prefs: []
  type: TYPE_NORMAL
  zh: Bard是谷歌在2023年初发布的人工智能聊天机器人，作为ChatGPT的竞争对手。Bard由PaLM 2提供支持，而ChatGPT由GPT-4提供支持。最近，Bard在其对用户查询的回答中增加了对图像的支持，而ChatGPT的这一功能尚未向公众发布（但您可能很快就会看到它可用）。
- en: '*[https://artificialcorner.com/google-bards-new-image-recognition-means-serious-competition-to-chatgpt-here-are-6-best-use-cases-55d69eae1b27](https://artificialcorner.com/google-bards-new-image-recognition-means-serious-competition-to-chatgpt-here-are-6-best-use-cases-55d69eae1b27)*'
  id: totrans-2834
  prefs: []
  type: TYPE_NORMAL
  zh: '*[https://artificialcorner.com/google-bards-new-image-recognition-means-serious-competition-to-chatgpt-here-are-6-best-use-cases-55d69eae1b27](https://artificialcorner.com/google-bards-new-image-recognition-means-serious-competition-to-chatgpt-here-are-6-best-use-cases-55d69eae1b27)*'
- en: 'Bard encountered an issue pertaining to the James Webb Space Telescope during
    a highly publicized release, which resulted in a significant decrease in market
    capitalization for Alphabet. However, Google has persevered in fixing issues and
    enhancing the functionality of Bard. You can access Bard at: *[https://bard.google.com/](https://bard.google.com/)*.'
  id: totrans-2835
  prefs: []
  type: TYPE_NORMAL
  zh: Bard在一场备受瞩目的发布中遇到了与詹姆斯·韦伯太空望远镜相关的问题，这导致Alphabet的市场资本大幅下降。然而，谷歌一直在努力修复问题并增强Bard的功能。您可以通过以下链接访问Bard：*[https://bard.google.com/](https://bard.google.com/)*。
- en: 'Around mid-2023, Bard was enhanced with several features that were not available
    in GPT-4 during the same time period, some of which are listed here:'
  id: totrans-2836
  prefs: []
  type: TYPE_NORMAL
  zh: 大约在2023年中期，Bard增加了几个在同期GPT-4中不可用的功能，其中一些列在这里：
- en: generate images
  id: totrans-2837
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 生成图像
- en: generate HTML/CSS from an image
  id: totrans-2838
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 从图像中生成 HTML/CSS
- en: generate mobile applications from an image
  id: totrans-2839
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 从图像中生成移动应用程序
- en: create Latex formulas from an image
  id: totrans-2840
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 从图像中创建 LaTeX 公式
- en: extract text from an image
  id: totrans-2841
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 从图像中提取文本
- en: Presumably, these features will spur OpenAI to provide the same set of features
    (some are implemented in GPT-4, but they are not publicly available).
  id: totrans-2842
  prefs: []
  type: TYPE_NORMAL
  zh: 据推测，这些功能将促使OpenAI提供相同的功能集（其中一些已在GPT-4中实现，但尚未公开提供）。
- en: '**CoPilot (OpenAI/Microsoft)**'
  id: totrans-2843
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '**CoPilot (OpenAI/Microsoft)**'
- en: Microsoft CoPilot is a Visual Studio Code extension that is also powered by
    GPT-4\. GitHub CoPilot is already known for its ability to generate blocks of
    code within the context of a program. In addition, Microsoft is also developing
    Microsoft 365 CoPilot, whose availability date has not been announced as of mid-2023.
  id: totrans-2844
  prefs: []
  type: TYPE_NORMAL
  zh: 微软CoPilot是一个由GPT-4提供支持的 Visual Studio Code 扩展。GitHub CoPilot因其能够在程序上下文中生成代码块而闻名。此外，微软还在开发Microsoft
    365 CoPilot，截至2023年中尚未宣布其可用日期。
- en: However, Microsoft has provided early demos that show some of the capabilities
    of Microsoft 365 CoPilot, which includes automating tasks such as
  id: totrans-2845
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，微软已经提供了早期演示，展示了Microsoft 365 CoPilot的一些功能，包括自动化以下任务：
- en: writing emails
  id: totrans-2846
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 写电子邮件
- en: summarizing meetings
  id: totrans-2847
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 汇总会议
- en: making PowerPoint presentations
  id: totrans-2848
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 制作PowerPoint演示文稿
- en: Microsoft 365 CoPilot can analyze data in Excel spreadsheets, insert AI-generated
    images in PowerPoint, and generate drafts of cover letters. Microsoft has also
    integrated Microsoft 365 CoPilot into some of its existing products, such as Loop
    and OneNote.
  id: totrans-2849
  prefs: []
  type: TYPE_NORMAL
  zh: Microsoft 365 CoPilot可以分析Excel电子表格中的数据，在PowerPoint中插入AI生成的图像，并生成求职信草稿。微软还将Microsoft
    365 CoPilot集成到其一些现有产品中，例如Loop和OneNote。
- en: 'According to the following article, Microsoft intends to charge $30 per month
    for Office 365 Copilot:'
  id: totrans-2850
  prefs: []
  type: TYPE_NORMAL
  zh: 根据以下文章，微软打算为Office 365 Copilot每月收费30美元：
- en: '*[https://www.extremetech.com/extreme/microsoft-to-charge-30-per-month-for-ai-powered-office-apps](https://www.extremetech.com/extreme/microsoft-to-charge-30-per-month-for-ai-powered-office-apps)*'
  id: totrans-2851
  prefs: []
  type: TYPE_NORMAL
  zh: '*[https://www.extremetech.com/extreme/microsoft-to-charge-30-per-month-for-ai-powered-office-apps](https://www.extremetech.com/extreme/microsoft-to-charge-30-per-month-for-ai-powered-office-apps)*'
- en: 'Copilot was reverse engineered in late 2022, which is described online:'
  id: totrans-2852
  prefs: []
  type: TYPE_NORMAL
  zh: CoPilot在2022年底被逆向工程，相关信息在网上有描述：
- en: '*[https://thakkarparth007.github.io/copilot-explorer/posts/copilot-internals](https://thakkarparth007.github.io/copilot-explorer/posts/copilot-internals)*'
  id: totrans-2853
  prefs: []
  type: TYPE_NORMAL
  zh: '*[https://thakkarparth007.github.io/copilot-explorer/posts/copilot-internals](https://thakkarparth007.github.io/copilot-explorer/posts/copilot-internals)*'
- en: 'The following article shows you how to create a GPT-3 application that uses
    NextJS, React, and CoPilot:'
  id: totrans-2854
  prefs: []
  type: TYPE_NORMAL
  zh: 以下文章展示了如何创建一个使用NextJS、React和CoPilot的GPT-3应用程序：
- en: '*[https://github.blog/2023-07-25-how-to-build-a-gpt-3-app-with-nextjs-react-and-github-copilot/](https://github.blog/2023-07-25-how-to-build-a-gpt-3-app-with-nextjs-react-and-github-copilot/)*'
  id: totrans-2855
  prefs: []
  type: TYPE_NORMAL
  zh: '*[https://github.blog/2023-07-25-how-to-build-a-gpt-3-app-with-nextjs-react-and-github-copilot/](https://github.blog/2023-07-25-how-to-build-a-gpt-3-app-with-nextjs-react-and-github-copilot/)*'
- en: '**Codex (OpenAI)**'
  id: totrans-2856
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '**Codex (OpenAI)**'
- en: OpenAI Codex is a fine-tuned GPT3-based LLM that generates code from text. In
    fact, Codex powers GitHub Copilot. Codex was trained on more than 150 GB of Python
    code that was obtained from more than 50 million GitHub repositories.
  id: totrans-2857
  prefs: []
  type: TYPE_NORMAL
  zh: OpenAI Codex是一个基于GPT3的微调LLM，可以从文本生成代码。实际上，Codex为GitHub Copilot提供动力。Codex在从超过5000万个GitHub仓库中获得的超过150GB的Python代码上进行了训练。
- en: 'According to OpenAI, the primary purpose of Codex is to accelerate human programming,
    and it can complete almost 40% of requests. Codex tends to work quite well for
    generating code for solving simple tasks. Navigate to the Codex home page to obtain
    more information: *[https://openai.com/blog/openai-codex](https://openai.com/blog/openai-codex)*.'
  id: totrans-2858
  prefs: []
  type: TYPE_NORMAL
  zh: 根据OpenAI的说法，Codex的主要目的是加速人类编程，它可以完成近40%的请求。Codex在生成用于解决简单任务的代码方面表现得相当不错。访问Codex主页以获取更多信息：*[https://openai.com/blog/openai-codex](https://openai.com/blog/openai-codex)*。
- en: '**Apple GPT**'
  id: totrans-2859
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '**Apple GPT**'
- en: In mid-2023, Apple announced Apple GPT, which is a competitor to ChatGPT from
    OpenAI. The actual release date was projected to be 2024\. “Apple GPT” is the
    current name for a product that is intended to compete with Google Bard, OpenAI
    ChatGPT, and Microsoft Bing AI.
  id: totrans-2860
  prefs: []
  type: TYPE_NORMAL
  zh: 2023年中，苹果宣布了Apple GPT，这是OpenAI ChatGPT的竞争对手。实际发布日期预计为2024年。“Apple GPT”是当前用于与Google
    Bard、OpenAI ChatGPT和微软Bing AI竞争的产品的名称。
- en: In brief, the LLM PaLM 2 powers Google Bard, and GPT-4 powers ChatGPT as well
    as Bing Chat, whereas Ajax is what powers Apple GPT. Ajax is based on Jax from
    Google.
  id: totrans-2861
  prefs: []
  type: TYPE_NORMAL
  zh: 简而言之，LLM PaLM 2为Google Bard提供动力，GPT-4为ChatGPT以及Bing Chat提供动力，而Ajax则是Apple GPT的动力来源。Ajax基于谷歌的Jax。
- en: '**PaLM-2**'
  id: totrans-2862
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '**PaLM-2**'
- en: PaLM-2, the second version of the Pathways Language Model, is the successor
    to PaLM (circa 2022). PaLM-2 powers Bard, and it is also a direct competitor to
    GPT-4\. By way of comparison, PaLM consists of 540 B parameters, and it is plausible
    that PaLM-2 is a larger LLM (details of the latter are undisclosed).
  id: totrans-2863
  prefs: []
  type: TYPE_NORMAL
  zh: PaLM-2是Pathways语言模型的第二个版本，是PaLM（约2022年）的继任者。PaLM-2为Bard提供动力，它也是GPT-4的直接竞争对手。相比之下，PaLM由540B个参数组成，PaLM-2可能是一个更大的LLM（后者的详细信息未公开）。
- en: PaLM-2 provides four sub-models called Gecko, Otter, Bison, and Unicorn (from
    smallest to largest). PaLM-2 was trained on more than 100 human languages, as
    well as programming languages such as Fortran. Moreover, PaLM-2 has been deployed
    to a plethora of Google products, including Gmail and YouTube.
  id: totrans-2864
  prefs: []
  type: TYPE_NORMAL
  zh: PaLM-2提供了四个子模型，称为Gecko、Otter、Bison和Unicorn（从小到大）。PaLM-2在超过100种人类语言以及Fortran等编程语言上进行了训练。此外，PaLM-2已被部署到包括Gmail和YouTube在内的众多谷歌产品中。
- en: '**Med-PaLM M**'
  id: totrans-2865
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '**Med-PaLM M**'
- en: 'In addition to the four sub-models listed above, Med-PaLM 2 (the successor
    to Med-PaLM) is an LLM that provides answers to medical questions, and it is accessible
    online at: *[http://sites.research.google/med-palm/](http://sites.research.google/med-palm/)*.'
  id: totrans-2866
  prefs: []
  type: TYPE_NORMAL
  zh: 除了上述四个子模型之外，Med-PaLM 2（Med-PaLM的继任者）是一个提供医疗问题答案的LLM，您可以在以下网址在线访问：*[http://sites.research.google/med-palm/](http://sites.research.google/med-palm/)*.
- en: 'The successor to Med-PaLM is Med-PaLM M, and details about this LLM are accessible
    at: *[https://arxiv.org/abs/2307.14334](https://arxiv.org/abs/2307.14334)*.'
  id: totrans-2867
  prefs: []
  type: TYPE_NORMAL
  zh: Med-PaLM的继任者是Med-PaLM M，有关此LLM的详细信息可在以下网址找到：*[https://arxiv.org/abs/2307.14334](https://arxiv.org/abs/2307.14334)*.
- en: 'The following article provides a direct comparison of performance benchmarks
    for PaLM 2 and GPT-4:'
  id: totrans-2868
  prefs: []
  type: TYPE_NORMAL
  zh: 以下文章提供了PaLM 2和GPT-4性能基准的直接比较：
- en: '*[https://www.makeuseof.com/google-palm-2-vs-openai-gpt-4/](https://www.makeuseof.com/google-palm-2-vs-openai-gpt-4/)*'
  id: totrans-2869
  prefs: []
  type: TYPE_NORMAL
  zh: '*[https://www.makeuseof.com/google-palm-2-vs-openai-gpt-4/](https://www.makeuseof.com/google-palm-2-vs-openai-gpt-4/)*'
- en: All told, PaLM-2 has a robust set of features, and it is definitely a significant
    competitor to GPT-4.
  id: totrans-2870
  prefs: []
  type: TYPE_NORMAL
  zh: 总的来说，PaLM-2具有强大的功能集，它无疑是GPT-4的一个重大竞争对手。
- en: '**Claude-2**'
  id: totrans-2871
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '**Claude-2**'
- en: Anthropic created the LLM Claude-2 that not only answer queries about specific
    topics, but also perform searches that involves multiple documents, summarize
    documents, create documents, and generate code.
  id: totrans-2872
  prefs: []
  type: TYPE_NORMAL
  zh: Anthropic创建了LLM Claude-2，它不仅能够回答关于特定主题的问题，还能执行涉及多个文档的搜索、总结文档、创建文档和生成代码。
- en: Claude-2 is an improvement on Anthropic’s predecessor Claude 1.3, and it can
    ingest entire books as well as generate code based on prompts from users. In fact,
    Claude-2 appears to be comparable with its rivals ChatGPT and GPT-4 in terms of
    competing functionality.
  id: totrans-2873
  prefs: []
  type: TYPE_NORMAL
  zh: Claude-2是Anthropic的前辈Claude 1.3的改进版，它可以摄入整本书，并根据用户的提示生成代码。实际上，Claude-2在竞争功能方面似乎可以与ChatGPT和GPT-4相媲美。
- en: Furthermore, Claude-2 supports a context window of 100,000 tokens. Claude-2
    was trained on data as recent as early 2023, whereas ChatGPT was trained on data
    up until 2021\. However, Claude-2 cannot search the Web (unlike its competitor
    GPT-4). Anthropic is likely to continue to develop its capabilities the LLM space.
  id: totrans-2874
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，Claude-2支持100,000个标记的上下文窗口。Claude-2在2023年初的数据上进行了训练，而ChatGPT在2021年之前的数据上进行了训练。然而，Claude-2无法搜索网络（与竞争对手GPT-4不同）。Anthropic可能会继续在LLM领域开发其功能。
- en: '**LLAMA-2**'
  id: totrans-2875
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**LLAMA-2**'
- en: Llama-2 (Large Language Model Meta AI) is an open source fine-tuned LLM from
    Meta, that trained on only public data, that has created a lot of excitement in
    the AI community. Llama-2 provides three models (7 B, 13 B, and 70 B parameters)
    that utilize more data during the pre-training step than numerous other LLMs.
    Llama-2 is optimized to provide faster inferences and also provides a longer context
    length (4 K) than other LLMs.
  id: totrans-2876
  prefs: []
  type: TYPE_NORMAL
  zh: Llama-2（大型语言模型Meta AI）是Meta的一个开源微调LLM，仅在公共数据上训练，在AI社区中引起了很大的兴奋。Llama-2提供了三个模型（7B、13B和70B参数），在预训练步骤中使用了比许多其他LLM更多的数据。Llama-2经过优化，可以提供更快的推理，并且比其他LLM提供更长的上下文长度（4K）。
- en: 'Moreover, the Llama-2-Chat LLM performs surprisingly well: in some cases, its
    quality is close to the quality of high-performing LLMs such ChatGPT and GPT-4\.
    Llama-2 is more user-friendly and also provides better results for writing text
    in comparison to GPT-4\. On the other hand, GPT-4 is more adept for tasks such
    as generating code.'
  id: totrans-2877
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，Llama-2-Chat LLM的表现出人意料地好：在某些情况下，其质量接近高性能LLM如ChatGPT和GPT-4的质量。与GPT-4相比，Llama-2更易于使用，并且在撰写文本方面提供更好的结果。另一方面，GPT-4更适合生成代码等任务。
- en: '**How to Download Llama-2**'
  id: totrans-2878
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '**如何下载Llama-2**'
- en: Llama-2 provides a permissive license for community use and commercial use,
    and Meta has made the code as well as the pre-trained models and the fine-tuned
    models publicly available.
  id: totrans-2879
  prefs: []
  type: TYPE_NORMAL
  zh: Llama-2为社区使用和商业使用提供了许可协议，Meta已将代码以及预训练模型和微调模型公开。
- en: 'There are several ways that you can download Llama-2, starting from this link
    from Meta after you provide some information (name, country, and affiliation):'
  id: totrans-2880
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以从Meta提供的链接开始下载Llama-2，在提供一些信息（姓名、国家、所属机构）后：
- en: '*[https://ai.meta.com/llama/](https://ai.meta.com/llama/)*'
  id: totrans-2881
  prefs: []
  type: TYPE_NORMAL
  zh: '*[https://ai.meta.com/llama/](https://ai.meta.com/llama/)*'
- en: 'Another way to access demos of the 7 B, 13 B, and 70 B models is from the following
    links:'
  id: totrans-2882
  prefs: []
  type: TYPE_NORMAL
  zh: 通过以下链接可以访问7B、13B和70B模型的演示：
- en: '*[https://huggingface.co/spaces/huggingface-projects/llama-2-7b-chat](https://huggingface.co/spaces/huggingface-projects/llama-2-7b-chat)*'
  id: totrans-2883
  prefs: []
  type: TYPE_NORMAL
  zh: '*[https://huggingface.co/spaces/huggingface-projects/llama-2-7b-chat](https://huggingface.co/spaces/huggingface-projects/llama-2-7b-chat)*'
- en: '*[https://huggingface.co/spaces/huggingface-projects/llama-2-13b-chat](https://huggingface.co/spaces/huggingface-projects/llama-2-13b-chat)*'
  id: totrans-2884
  prefs: []
  type: TYPE_NORMAL
  zh: '*[https://huggingface.co/spaces/huggingface-projects/llama-2-13b-chat](https://huggingface.co/spaces/huggingface-projects/llama-2-13b-chat)*'
- en: '*[https://huggingface.co/spaces/ysharma/Explore_llamav2_with_TGI](https://huggingface.co/spaces/ysharma/Explore_llamav2_with_TGI)*'
  id: totrans-2885
  prefs: []
  type: TYPE_NORMAL
  zh: '*[https://huggingface.co/spaces/ysharma/Explore_llamav2_with_TGI](https://huggingface.co/spaces/ysharma/Explore_llamav2_with_TGI)*'
- en: 'A third way to access Llama-2 on Hugging Face is from the following link: *[https://huggingface.co/blog/llama2](https://huggingface.co/blog/llama2)*'
  id: totrans-2886
  prefs: []
  type: TYPE_NORMAL
  zh: 在Hugging Face上访问Llama-2的第三种方式是以下链接：*[https://huggingface.co/blog/llama2](https://huggingface.co/blog/llama2)*
- en: 'More information is available online:'
  id: totrans-2887
  prefs: []
  type: TYPE_NORMAL
  zh: 更多信息可在网上找到：
- en: '*[https://github.com/facebookresearch/llama](https://github.com/facebookresearch/llama)*'
  id: totrans-2888
  prefs: []
  type: TYPE_NORMAL
  zh: '*[https://github.com/facebookresearch/llama](https://github.com/facebookresearch/llama)*'
- en: '*[https://ai.meta.com/research/publications/llama-2-open-foundation-and-fine-tuned-chat-models/](https://ai.meta.com/research/publications/llama-2-open-foundation-and-fine-tuned-chat-models/)*'
  id: totrans-2889
  prefs: []
  type: TYPE_NORMAL
  zh: '*[https://ai.meta.com/research/publications/llama-2-open-foundation-and-fine-tuned-chat-models/](https://ai.meta.com/research/publications/llama-2-open-foundation-and-fine-tuned-chat-models/)*'
- en: If you are interested in training Llama-2 on your laptop, more details for doing
    so are accessible at *[https://blog.briankitano.com/llama-from-scratch/](https://blog.briankitano.com/llama-from-scratch/)*.
  id: totrans-2890
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你对在笔记本电脑上训练Llama-2感兴趣，更多细节可以在以下链接中找到：*[https://blog.briankitano.com/llama-from-scratch/](https://blog.briankitano.com/llama-from-scratch/)*。
- en: '**Llama-2 Architecture Features**'
  id: totrans-2891
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '**Llama-2架构特点**'
- en: 'This section simply contains a high-level list of some of the important distinguishing
    features of Llama-2, as shown here:'
  id: totrans-2892
  prefs: []
  type: TYPE_NORMAL
  zh: 本节仅包含一些Llama-2重要区分特征的概述，如下所示：
- en: decoder-only LLM
  id: totrans-2893
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 仅解码器LLM
- en: better pre-training
  id: totrans-2894
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 更好的预训练
- en: improved model architecture
  id: totrans-2895
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 改进的模型架构
- en: SwiGLU activation function
  id: totrans-2896
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: SwiGLU激活函数
- en: different positional embeddings
  id: totrans-2897
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 不同的位置嵌入
- en: GQA (Grouped Query Attention)
  id: totrans-2898
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: GQA（分组查询注意力）
- en: Ghost Attention (GAtt)
  id: totrans-2899
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 幽灵注意力（GAtt）
- en: RLHF and PPO
  id: totrans-2900
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: RLHF和PPO
- en: BPE SentencePiece tokenizer
  id: totrans-2901
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: BPE SentencePiece分词器
- en: modified normalization step
  id: totrans-2902
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 修改后的归一化步骤
- en: The majority of LLMs contain the layer normalization that is in the original
    Transformer architecture. By contrast, Llama uses a simplified alternative that
    involves Root Mean Square Layer Normalization (RMSNorm). RMSNorm has yielded improved
    results for training stability as well as for generalization.
  id: totrans-2903
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数LLM包含原始Transformer架构中的层归一化。相比之下，Llama使用了一种简化的替代方案，涉及根均方层归一化（RMSNorm）。RMSNorm在训练稳定性和泛化方面都取得了改进的结果。
- en: Although SwiGLU is computationally more expensive than the ReLU activation function
    that is part of the original Transformer architecture, SwiGLU achieves better
    performance.
  id: totrans-2904
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管SwiGLU在计算上比原始Transformer架构中的ReLU激活函数更昂贵，但SwiGLU实现了更好的性能。
- en: 'Note that RLHF is discussed earlier, and that section includes a brief description
    of TRPO and PPO. For a detailed description of how to fine-tune Llama-2 on three
    tasks, navigate to the following link:'
  id: totrans-2905
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，RLHF之前已经讨论过，该部分包括TRPO和PPO的简要描述。有关如何对Llama-2在三个任务上进行微调的详细描述，请访问以下链接：
- en: '*[https://www.anyscale.com/blog/fine-tuning-llama-2-a-comprehensive-case-study-for-tailoring-models-to-unique-applications](https://www.anyscale.com/blog/fine-tuning-llama-2-a-comprehensive-case-study-for-tailoring-models-to-unique-applications)*'
  id: totrans-2906
  prefs: []
  type: TYPE_NORMAL
  zh: '*[https://www.anyscale.com/blog/fine-tuning-llama-2-a-comprehensive-case-study-for-tailoring-models-to-unique-applications](https://www.anyscale.com/blog/fine-tuning-llama-2-a-comprehensive-case-study-for-tailoring-models-to-unique-applications)*'
- en: '**Fine-Tuning Llama-2**'
  id: totrans-2907
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '**微调Llama-2**'
- en: Although Llama-2 is an improvement over its predecessor Llama, you can further
    improve the performance of Llama-2 by performing some fine-tuning of this LLM.
  id: totrans-2908
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然Llama-2是其前身Llama的改进，但你可以通过对这种LLM进行一些微调来进一步提高Llama-2的性能。
- en: '*[https://medium.com/@murtuza753/using-llama-2-0-faiss-and-langchain-for-question-answering-on-your-own-data-682241488476](https://medium.com/@murtuza753/using-llama-2-0-faiss-and-langchain-for-question-answering-on-your-own-data-682241488476)*'
  id: totrans-2909
  prefs: []
  type: TYPE_NORMAL
  zh: '*[https://medium.com/@murtuza753/using-llama-2-0-faiss-and-langchain-for-question-answering-on-your-own-data-682241488476](https://medium.com/@murtuza753/using-llama-2-0-faiss-and-langchain-for-question-answering-on-your-own-data-682241488476)*'
- en: 'The following article shows you how to fine tune Llama-2 in a Google Colaboratory
    notebook:'
  id: totrans-2910
  prefs: []
  type: TYPE_NORMAL
  zh: 以下文章展示了如何在Google Colaboratory笔记本中微调Llama-2：
- en: '*[https://towardsdatascience.com/fine-tune-your-own-llama-2-model-in-a-colab-notebook-df9823a04a32](https://towardsdatascience.com/fine-tune-your-own-llama-2-model-in-a-colab-notebook-df9823a04a32)*'
  id: totrans-2911
  prefs: []
  type: TYPE_NORMAL
  zh: '*[https://towardsdatascience.com/fine-tune-your-own-llama-2-model-in-a-colab-notebook-df9823a04a32](https://towardsdatascience.com/fine-tune-your-own-llama-2-model-in-a-colab-notebook-df9823a04a32)*'
- en: 'The following article describes how to use MonsterAPI (also discussed in the
    article) to fine-tune LlaMa-2 in five steps:'
  id: totrans-2912
  prefs: []
  type: TYPE_NORMAL
  zh: 以下文章描述了如何使用MonsterAPI（文章中也讨论了）在五步中微调LlaMa-2。
- en: '*[https://blog.monsterapi.ai/how-to-fine-tune-llama-2-llm/](https://blog.monsterapi.ai/how-to-fine-tune-llama-2-llm/)*'
  id: totrans-2913
  prefs: []
  type: TYPE_NORMAL
  zh: '*[https://blog.monsterapi.ai/how-to-fine-tune-llama-2-llm/](https://blog.monsterapi.ai/how-to-fine-tune-llama-2-llm/)*'
- en: 'The following link describes how to access Llama-2 in Google Colaboratory:'
  id: totrans-2914
  prefs: []
  type: TYPE_NORMAL
  zh: 以下链接描述了如何在Google Colaboratory中访问Llama-2。
- en: '*[https://levelup.gitconnected.com/harnessing-the-power-of-llama-2-using-google-colab-2e1dedc2d1d8](https://levelup.gitconnected.com/harnessing-the-power-of-llama-2-using-google-colab-2e1dedc2d1d8)*'
  id: totrans-2915
  prefs: []
  type: TYPE_NORMAL
  zh: '*[https://levelup.gitconnected.com/harnessing-the-power-of-llama-2-using-google-colab-2e1dedc2d1d8](https://levelup.gitconnected.com/harnessing-the-power-of-llama-2-using-google-colab-2e1dedc2d1d8)*'
- en: '**WHEN WILL GPT-5 BE AVAILABLE?**'
  id: totrans-2916
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**GPT-5何时可用？**'
- en: As this book goes to print, there is no official information available regarding
    the status of GPT-5, which is to say that everything is speculative. In the early
    part of 2023, Sam Altman (CEO of OpenAI) remarked that there were “no official
    plans” for GPT-5.
  id: totrans-2917
  prefs: []
  type: TYPE_NORMAL
  zh: 当这本书准备印刷时，关于GPT-5的状态没有官方信息可用，也就是说，一切都是推测性的。在2023年初，OpenAI的CEO萨姆·奥特曼（Sam Altman）表示，对于GPT-5“没有官方计划”。
- en: However, during mid-2023, OpenAI filed a patent for GPT-5 in which there are
    some high-level details about the features of GPT-5\. Some people speculated that
    GPT-5 will be a more powerful version of GPT-4, and others suggest that filing
    a patent might be nothing more than securing the name “GPT-5.”
  id: totrans-2918
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，在2023年中，OpenAI为GPT-5申请了一项专利，其中包含一些关于GPT-5功能的高级细节。有些人推测GPT-5将是GPT-4的更强大版本，而其他人则认为申请专利可能只是确保“GPT-5”这个名称。
- en: Regardless of the motivation for filing a patent, there is a great deal of competition
    with GPT-4 from various companies. Therefore, it is highly plausible that OpenAI
    will release GPT-5, perhaps by the end of 2023\. Regarding model sizes, recall
    that GPT-3 has 175 B parameters, and some speculate that GPT-4 has 10 trillion
    parameters, which would mean that GPT-4 is roughly 60 times larger than GPT-3\.
    The same increase in scale for GPT-5 seems implausible because GPT-5 would then
    consist of 600 trillion parameters.
  id: totrans-2919
  prefs: []
  type: TYPE_NORMAL
  zh: 无论申请专利的动机如何，与GPT-4来自不同公司的竞争都非常激烈。因此，OpenAI可能会发布GPT-5，也许是在2023年底。关于模型大小，回想一下，GPT-3有1750亿个参数，有些人推测GPT-4有100万亿个参数，这意味着GPT-4大约是GPT-3的60倍。GPT-5规模增加的幅度似乎是不可能的，因为那时GPT-5将包含600万亿个参数。
- en: Another possibility is that GPT-4 is based on the Mixture of Experts methodology
    that involves multiple components. For instance, GPT-4 could be a combination
    of 8 components, each of which involves 220 million parameters, and therefore
    GPT-4 would consist of 1.76 trillion parameters.
  id: totrans-2920
  prefs: []
  type: TYPE_NORMAL
  zh: 另一种可能性是，GPT-4基于涉及多个组件的专家混合方法。例如，GPT-4可能是8个组件的组合，每个组件涉及2.2亿个参数，因此GPT-4将包含1.76万亿个参数。
- en: Keep in mind that training LLMs such as GPT-4 is very costly and requires huge
    datasets for the pre-training step. Regardless of the eventual size of GPT-5,
    the training process could involve enormous costs.
  id: totrans-2921
  prefs: []
  type: TYPE_NORMAL
  zh: 请记住，训练像GPT-4这样的LLM（大型语言模型）非常昂贵，并且需要大量的数据集进行预训练步骤。无论GPT-5最终的大小如何，训练过程都可能涉及巨大的成本。
- en: '**SUMMARY**'
  id: totrans-2922
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**总结**'
- en: This chapter started with a discussion of ChatGPT from OpenAI and some of its
    features. In addition, you learned about some competitors to ChatGPT, such as
    Claude-2 from Anthropic.
  id: totrans-2923
  prefs: []
  type: TYPE_NORMAL
  zh: 本章从OpenAI的ChatGPT及其一些功能开始讨论。此外，你还了解了一些ChatGPT的竞争对手，例如Anthropic的Claude-2。
- en: Next you learned about GPT-4 from OpenAI, which powers ChatGPT, and some of
    its features. Then you learned about some competitors of GPT-4, such as Llama-2
    (Meta) and Bard (Google).
  id: totrans-2924
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，你学习了OpenAI的GPT-4，它是ChatGPT的驱动力，以及它的一些功能。然后你学习了GPT-4的一些竞争对手，例如Meta的Llama-2和Google的Bard。
- en: CHAPTER 8
  id: totrans-2925
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**第8章**'
- en: '*CHATGPT AND DATA VISUALIZATION*'
  id: totrans-2926
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '*ChatGPT与数据可视化*'
- en: This chapter contains examples of using ChatGPT to perform data visualization,
    such as creating charts and graphs that are based on datasets (e.g., the Titanic
    dataset). ChatGPT generated all the code samples shown here via the Advanced data
    analysis plugin. ChatGPT also generated some of the accompanying text for the
    Python-based code samples.
  id: totrans-2927
  prefs: []
  type: TYPE_NORMAL
  zh: 本章包含使用ChatGPT进行数据可视化的示例，例如创建基于数据集（例如，泰坦尼克号数据集）的图表和图形。ChatGPT通过高级数据分析插件生成了这里显示的所有代码示例。ChatGPT还生成了基于Python代码示例的一些配套文本。
- en: The first part of this chapter describes the process of uploading a dataset
    in ChatGPT and then provides prompts for tasks such as explaining the features
    in a given dataset, generating visualizations, and downloading the curated dataset.
    You will also learn how to prompt ChatGPT to create and train a machine learning
    model.
  id: totrans-2928
  prefs: []
  type: TYPE_NORMAL
  zh: 本章的第一部分描述了在ChatGPT中上传数据集的过程，然后提供了解释给定数据集特征、生成可视化效果和下载精选数据集等任务的提示。您还将学习如何提示ChatGPT创建和训练机器学习模型。
- en: The second part of this chapter contains examples of data visualization with
    Matplotlib, where the code samples were generated with ChatGPT. The third part
    of this chapter contains examples of data visualization with Seaborn, where the
    code samples were generated with ChatGPT.
  id: totrans-2929
  prefs: []
  type: TYPE_NORMAL
  zh: 本章的第二部分包含使用Matplotlib进行数据可视化的示例，其中代码示例是由ChatGPT生成的。本章的第三部分包含使用Seaborn进行数据可视化的示例，其中代码示例也是由ChatGPT生成的。
- en: After you have read the material in this chapter, compare the code samples in
    this chapter with the code samples in [Chapter 5](ch05.xhtml) (Matplotlib) as
    well as [Chapter 6](ch06.xhtml) (Seaborn).
  id: totrans-2930
  prefs: []
  type: TYPE_NORMAL
  zh: 在阅读本章内容后，请将本章中的代码示例与第5章（Matplotlib）和第6章（Seaborn）中的代码示例进行比较。
- en: 'One more detail to keep in mind regarding the code samples in this chapter,
    all of which were generated by ChatGPT. The general format for the prompt that
    was provided to ChatGPT is shown here:'
  id: totrans-2931
  prefs: []
  type: TYPE_NORMAL
  zh: 关于本章中的代码示例，还有一个需要注意的细节，所有这些示例都是由ChatGPT生成的。提供给ChatGPT的提示的通用格式如下所示：
- en: '*“Please generate Python code to render [specify-a-graph-type] using Matplotlib.”*'
  id: totrans-2932
  prefs: []
  type: TYPE_NORMAL
  zh: '*“请生成使用Matplotlib渲染[指定图表类型]的Python代码。”*'
- en: The first few code samples in this chapter provide the prompt that ChatGPT used
    in order to generate the given Python code.
  id: totrans-2933
  prefs: []
  type: TYPE_NORMAL
  zh: 本章的前几个代码示例提供了ChatGPT用于生成给定Python代码的提示。
- en: '**WORKING WITH CHARTS AND GRAPHS**'
  id: totrans-2934
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**与图表和图形一起工作**'
- en: 'Each chart type has its unique strengths and is best suited for specific kinds
    of data and analysis. The choice of chart often depends on the nature of the data
    and the specific insights one wants to derive. This section contains multiple
    subsections that provide information about an assortment of charts and graphs,
    as shown below:'
  id: totrans-2935
  prefs: []
  type: TYPE_NORMAL
  zh: 每种图表类型都有其独特的优势，最适合特定类型的数据和分析。图表的选择通常取决于数据的性质和想要得出的具体见解。本节包含多个子节，提供了关于各种图表和图形的信息，如下所示：
- en: Bar charts
  id: totrans-2936
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 柱状图
- en: Pie charts
  id: totrans-2937
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 饼图
- en: Line graphs
  id: totrans-2938
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 折线图
- en: Heat maps
  id: totrans-2939
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 热图
- en: Histograms
  id: totrans-2940
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 直方图
- en: Box plots
  id: totrans-2941
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 箱线图
- en: Pareto charts
  id: totrans-2942
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 帕累托图
- en: Radar charts
  id: totrans-2943
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 雷达图
- en: Treemaps
  id: totrans-2944
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 树状图
- en: Waterfall charts
  id: totrans-2945
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 水波图
- en: Scatterplots
  id: totrans-2946
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 散点图
- en: Each of the charts and graphs in the preceding list is discussed in the following
    subsections.
  id: totrans-2947
  prefs: []
  type: TYPE_NORMAL
  zh: 上述列表中的每个图表和图形将在以下子节中进行讨论。
- en: '**Bar Charts**'
  id: totrans-2948
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '**柱状图**'
- en: Bar charts represent data with rectangular bars. The lengths of the bars are
    proportional to the values they represent. They can be vertical (column charts)
    or horizontal. An example of usage involves comparing the sales of different products
    in a store.
  id: totrans-2949
  prefs: []
  type: TYPE_NORMAL
  zh: 柱状图用矩形条表示数据，条的长度与它们所代表的值成比例。它们可以是垂直的（柱状图）或水平的。一个使用示例是比较商店中不同产品的销售情况。
- en: 'Some advantages of bar charts are as follows:'
  id: totrans-2950
  prefs: []
  type: TYPE_NORMAL
  zh: 柱状图的一些优点如下：
- en: easily interpretable and widely recognized
  id: totrans-2951
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 容易理解和广泛认可
- en: can compare individual or multiple data series
  id: totrans-2952
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 可以比较单个或多个数据序列
- en: effective for displaying data that spans several categories
  id: totrans-2953
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 适用于显示跨越多个类别的数据
- en: 'Some disadvantages of bar charts are as follows:'
  id: totrans-2954
  prefs: []
  type: TYPE_NORMAL
  zh: 柱状图的一些缺点如下：
- en: not ideal for showing patterns or trends over time
  id: totrans-2955
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 不适合展示随时间变化的模式或趋势
- en: can become cluttered when comparing too many categories
  id: totrans-2956
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 比较太多类别时可能会变得杂乱
- en: '**Pie Charts**'
  id: totrans-2957
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '**饼图**'
- en: Pie charts represent data in a circular format, with individual sections (slices)
    showing categories’ proportion to the whole. An example of usage involves representing
    the market share of different companies in an industry.
  id: totrans-2958
  prefs: []
  type: TYPE_NORMAL
  zh: 饼图以圆形格式表示数据，各个部分（切片）显示类别与整体的比例。一个使用示例是表示一个行业中不同公司的市场份额。
- en: 'Some advantages of pie charts are as follows:'
  id: totrans-2959
  prefs: []
  type: TYPE_NORMAL
  zh: 饼图的一些优点如下：
- en: simple visualization that shows part-to-whole relationships
  id: totrans-2960
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 简单的视觉表示，展示了部分与整体的关系
- en: clearly indicate proportions.
  id: totrans-2961
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 清楚地表明比例。
- en: effective when there are a limited number of categories
  id: totrans-2962
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当类别数量有限时，效果良好
- en: 'Some disadvantages of pie charts are as follows:'
  id: totrans-2963
  prefs: []
  type: TYPE_NORMAL
  zh: 饼图的一些缺点如下：
- en: not efficient for comparing individual categories
  id: totrans-2964
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 不适用于比较单个类别
- en: can become ineffective and difficult to interpret with too many slices
  id: totrans-2965
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当切片过多时，可能会变得无效且难以解释
- en: do not show absolute values, only proportions
  id: totrans-2966
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 不显示绝对值，只显示比例
- en: '**Line Graphs**'
  id: totrans-2967
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '**线形图**'
- en: Line graphs display data points connected by straight lines. They are used primarily
    to visualize values over a continuous interval or time period. An example of usage
    involves tracking a company’s revenue growth over several years.
  id: totrans-2968
  prefs: []
  type: TYPE_NORMAL
  zh: 线形图通过直线连接数据点来显示数据。它们主要用于可视化连续区间或时间段内的值。一个使用示例包括跟踪一家公司在几年内的收入增长。
- en: 'Some advantages of line graphs are as follows:'
  id: totrans-2969
  prefs: []
  type: TYPE_NORMAL
  zh: 线形图的一些优点如下：
- en: effective for displaying trends over time.
  id: totrans-2970
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 有效地显示趋势。
- en: can compare multiple data series on one graph
  id: totrans-2971
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 可以在一张图上比较多个数据系列
- en: clear visualization of data points and intervals
  id: totrans-2972
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 清晰地可视化数据点和区间
- en: 'Some disadvantages of line graphs are as follows:'
  id: totrans-2973
  prefs: []
  type: TYPE_NORMAL
  zh: 线形图的一些缺点如下：
- en: not suitable for showing part-to-whole relationships
  id: totrans-2974
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 不适合显示部分与整体的关系
- en: can become cluttered when displaying too many data series
  id: totrans-2975
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当显示过多的数据系列时可能会变得杂乱
- en: require a meaningful order of data points
  id: totrans-2976
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 需要数据点的有意义顺序
- en: '**Heat Maps**'
  id: totrans-2977
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '**热图**'
- en: A heat map represents data in a matrix format, where individual values are depicted
    as colors. The color intensity usually represents the magnitude of the value.
    An example of usage involves visualizing website visitor activity on different
    parts of a Web page.
  id: totrans-2978
  prefs: []
  type: TYPE_NORMAL
  zh: 热图以矩阵格式表示数据，其中单个值以颜色表示。颜色强度通常表示值的幅度。一个使用示例包括可视化网页访问者在网页不同部分的活动。
- en: 'Some advantages of heat maps are as follows:'
  id: totrans-2979
  prefs: []
  type: TYPE_NORMAL
  zh: 热图的一些优点如下：
- en: quickly identify patterns, correlations, and areas of concentration
  id: totrans-2980
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 快速识别模式、相关性和集中区域
- en: use color effectively to convey information about magnitudes
  id: totrans-2981
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 有效地使用颜色来传达关于量级的信息
- en: 'Some disadvantages of heat maps are as follows:'
  id: totrans-2982
  prefs: []
  type: TYPE_NORMAL
  zh: 热图的一些缺点如下：
- en: not suitable for detailed numerical analysis
  id: totrans-2983
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 不适合进行详细的数值分析
- en: color choices are crucial; poor choices can mislead interpretation
  id: totrans-2984
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 颜色选择至关重要；选择不当可能会误导解释
- en: '**Histograms**'
  id: totrans-2985
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '**直方图**'
- en: A histogram is a graphical representation of the distribution of a dataset.
    It is an estimate of the probability distribution of a continuous variable. An
    example of usage involves showing the distribution of ages in a population.
  id: totrans-2986
  prefs: []
  type: TYPE_NORMAL
  zh: 直方图是数据集分布的图形表示。它是连续变量概率分布的估计。一个使用示例包括显示人口中年龄的分布。
- en: 'Some advantages of histograms are as follows:'
  id: totrans-2987
  prefs: []
  type: TYPE_NORMAL
  zh: 直方图的一些优点如下：
- en: provide a visual interpretation of numerical data by indicating the number of
    data points that lie within a range of values
  id: totrans-2988
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过指示位于值范围内的数据点数量来提供数值数据的视觉解释
- en: can help identify data distribution patterns
  id: totrans-2989
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 可以帮助识别数据分布模式
- en: 'Some disadvantages of histograms are as follows:'
  id: totrans-2990
  prefs: []
  type: TYPE_NORMAL
  zh: 直方图的一些缺点如下：
- en: do not show exact values
  id: totrans-2991
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 不显示确切值
- en: number and width of bins can influence perception
  id: totrans-2992
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 箱的数量和宽度可以影响感知
- en: '**Box Plots**'
  id: totrans-2993
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '**箱线图**'
- en: Box plots represent a summary of a dataset using quartiles. The “box” shows
    the interquartile range, while the “whiskers” indicate variability outside the
    upper and lower quartiles. An example of usage involves comparing sales performances
    across different teams.
  id: totrans-2994
  prefs: []
  type: TYPE_NORMAL
  zh: 箱线图使用四分位数来表示数据集的摘要。其中，“箱”表示四分位数范围，而“胡须”表示超出上下四分位数的变化。一个使用示例包括比较不同团队的销售额表现。
- en: 'Some advantages of box plots are as follows:'
  id: totrans-2995
  prefs: []
  type: TYPE_NORMAL
  zh: 箱线图的一些优点如下：
- en: quickly visualize data spread and skewness
  id: totrans-2996
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 快速可视化数据的分布和偏斜
- en: identify outliers
  id: totrans-2997
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 识别异常值
- en: 'Some disadvantages of box plots are as follows:'
  id: totrans-2998
  prefs: []
  type: TYPE_NORMAL
  zh: 箱线图的一些缺点如下：
- en: not suitable for detailed distribution analysis
  id: totrans-2999
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 不适合进行详细的分布分析
- en: do not show the frequency distribution of data
  id: totrans-3000
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 不显示数据的频率分布
- en: '**Pareto Charts**'
  id: totrans-3001
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '**帕累托图**'
- en: Pareto charts combine a bar chart and a line graph to represent the cumulative
    frequency of occurrences. They identify the most significant factors in a dataset.
    An example of usage involves identifying which product defects occur most frequently.
  id: totrans-3002
  prefs: []
  type: TYPE_NORMAL
  zh: 帕累托图结合条形图和线形图来表示发生累积频率。它们识别数据集中的最重要因素。一个使用示例包括确定哪些产品缺陷最频繁地发生。
- en: 'Some advantages of Pareto charts are as follows:'
  id: totrans-3003
  prefs: []
  type: TYPE_NORMAL
  zh: 帕累托图的一些优点如下：
- en: efficiently highlight the most important factors in large datasets
  id: totrans-3004
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 高效地突出大型数据集中最重要的因素
- en: aid in prioritizing efforts
  id: totrans-3005
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 帮助优先考虑努力
- en: 'Some disadvantages of Pareto charts are as follows:'
  id: totrans-3006
  prefs: []
  type: TYPE_NORMAL
  zh: 帕累托图的一些缺点如下：
- en: limited to datasets where ranking and prioritization are relevant
  id: totrans-3007
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 限于与排名和优先级相关的数据集
- en: not suitable for showing relationships between data points
  id: totrans-3008
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 不适合展示数据点之间的关系
- en: '**Radar Charts**'
  id: totrans-3009
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '**雷达图**'
- en: A radar chart is a graphical method of displaying data in a 2D chart of three
    or more quantitative variables. The data points are plotted on axes that start
    from the center. An example of usage involves comparing the performance metrics
    of products.
  id: totrans-3010
  prefs: []
  type: TYPE_NORMAL
  zh: 雷达图是一种在二维图表中显示三个或更多定量变量的图形方法。数据点绘制在从中心开始的轴上。使用示例包括比较产品的性能指标。
- en: 'Some advantages of radar charts are as follows:'
  id: totrans-3011
  prefs: []
  type: TYPE_NORMAL
  zh: 雷达图的优点如下：
- en: can compare multiple quantitative variables
  id: totrans-3012
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 可以比较多个定量变量
- en: provide a visual overview of the data
  id: totrans-3013
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提供数据的视觉概述
- en: 'Some disadvantages of radar charts are as follows:'
  id: totrans-3014
  prefs: []
  type: TYPE_NORMAL
  zh: 雷达图的缺点如下：
- en: can become cluttered when comparing too many datasets
  id: totrans-3015
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 比较太多数据集时可能会变得杂乱
- en: difficult to interpret with similar values
  id: totrans-3016
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在值相似的情况下难以解释
- en: '**Treemaps**'
  id: totrans-3017
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '**树状图**'
- en: Treemaps display hierarchical data as nested rectangles. Each branch of the
    hierarchy is represented by colored rectangles. An example of usage involves visualizing
    storage usage on a computer.
  id: totrans-3018
  prefs: []
  type: TYPE_NORMAL
  zh: 树状图以嵌套矩形的形式显示层次数据。每个层次分支由彩色矩形表示。使用示例包括可视化计算机上的存储使用情况。
- en: 'Some advantages of treemaps are as follows:'
  id: totrans-3019
  prefs: []
  type: TYPE_NORMAL
  zh: 树状图的优点如下：
- en: efficient use of space
  id: totrans-3020
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 空间使用效率高
- en: can represent multiple dimensions using size and color
  id: totrans-3021
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 可以使用大小和颜色表示多个维度
- en: 'Some disadvantages of tree maps are as follows:'
  id: totrans-3022
  prefs: []
  type: TYPE_NORMAL
  zh: 树状图的缺点如下：
- en: not suitable for datasets with large hierarchies
  id: totrans-3023
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 不适合具有大型层次结构的数据集
- en: can become difficult to interpret
  id: totrans-3024
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 可能变得难以解释
- en: '**Waterfall Charts**'
  id: totrans-3025
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '**瀑布图**'
- en: Waterfall charts represent the cumulative effect of sequentially occurring positive
    or negative values. An example of usage involves visualizing how profit or revenue
    is affected by various factors.
  id: totrans-3026
  prefs: []
  type: TYPE_NORMAL
  zh: 水流图表示依次发生的正或负值的累积效应。使用示例包括可视化利润或收入如何受各种因素的影响。
- en: 'Some advantages of waterfall charts are as follows:'
  id: totrans-3027
  prefs: []
  type: TYPE_NORMAL
  zh: 水流图的优点如下：
- en: clearly visualize positive and negative sequential changes
  id: totrans-3028
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 清晰地可视化正负顺序变化
- en: help in understanding the gradual transition from one data point to another
  id: totrans-3029
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 帮助理解从一个数据点到另一个数据点的逐渐过渡
- en: 'Some disadvantages of waterfall charts are as follows:'
  id: totrans-3030
  prefs: []
  type: TYPE_NORMAL
  zh: 水流图的缺点如下：
- en: limited to situations where understanding sequential changes is necessary
  id: totrans-3031
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 限于需要理解顺序变化的情况
- en: can become confusing with too many data points.
  id: totrans-3032
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 数据点过多时可能会变得混乱。
- en: '**LINE PLOTS WITH MATPLOTLIB**'
  id: totrans-3033
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**使用Matplotlib的线图**'
- en: 'Let’s plot a simple line graph to visualize a trend. [Listing 8.1](#list8-1)
    displays the content of line_plots.py that ChatGPT generated to render a line
    using Matplotlib. The prompt for ChatGPT is shown here:'
  id: totrans-3034
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们绘制一个简单的线图来可视化趋势。[列表8.1](#list8-1) 显示了ChatGPT生成的用于使用Matplotlib渲染线的line_plots.py的内容。ChatGPT的提示如下：
- en: '*“Please generate Python code to render a line graph using Matplotlib.”*'
  id: totrans-3035
  prefs: []
  type: TYPE_NORMAL
  zh: '*“请生成使用Matplotlib渲染线图的Python代码。”*'
- en: '***LISTING 8.1: line_plot.py***'
  id: totrans-3036
  prefs: []
  type: TYPE_NORMAL
  zh: '***列表8.1: line_plot.py***'
- en: '[PRE467]'
  id: totrans-3037
  prefs: []
  type: TYPE_PRE
  zh: '[PRE467]'
- en: '[Listing 8.1](#list8-1) starts with an import statement and then defines the
    function plot_line(), which renders a line plot. Matplotlib has the plot() function,
    which provides a straightforward way to create line graphs. In this function,
    we visualize a trend across the x and y axes.'
  id: totrans-3038
  prefs: []
  type: TYPE_NORMAL
  zh: '[列表8.1](#list8-1) 从一个导入语句开始，然后定义了plot_line()函数，该函数用于渲染线图。Matplotlib的plot()函数提供了一个创建线图的直接方法。在这个函数中，我们可视化x轴和y轴上的趋势。'
- en: The next portion of code initializes the Python lists x and y, and then invokes
    plot_line() with three strings that are the values for the title, the horizontal
    axis, and the vertical axis. [Figure 8.1](#fig8-1) displays the output from launching
    the code in [Listing 8.1](#list8-1).
  id: totrans-3039
  prefs: []
  type: TYPE_NORMAL
  zh: 代码的下一部分初始化了Python列表x和y，然后使用三个字符串调用plot_line()，这三个字符串分别是标题、横轴和纵轴的值。[图8.1](#fig8-1)
    显示了在[列表8.1](#list8-1)中启动代码的输出。
- en: '![Images](../images/f0262-01.jpg)'
  id: totrans-3040
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/f0262-01.jpg)'
- en: '***FIGURE 8.1*** A line plot with Matplotlib'
  id: totrans-3041
  prefs: []
  type: TYPE_NORMAL
  zh: '***图8.1*** 使用Matplotlib的线图'
- en: '**A PIE CHART USING MATPLOTLIB**'
  id: totrans-3042
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**使用Matplotlib的饼图**'
- en: 'Pie charts are ideal for displaying proportional data among categories. The
    pie function from Matplotlib provides an easy way to achieve this. [Listing 8.2](#list8-2)
    displays the content of pie_chart1.py that ChatGPT generated to render a pie chart
    using Matplotlib. The prompt for ChatGPT is shown here:'
  id: totrans-3043
  prefs: []
  type: TYPE_NORMAL
