- en: 13ChatGPT and Active LearningA New Paradigm for Student Participation in the
    Classroom
  id: totrans-2317
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 13ChatGPT和主动学习——学生参与课堂的新范式
- en: Adiyono Adiyono, Jasiah Jasiah, Mahyudin Ritonga, and Ali Said Al-Matari
  id: totrans-2318
  prefs: []
  type: TYPE_NORMAL
  zh: Adiyono Adiyono, Jasiah Jasiah, Mahyudin Ritonga, 和 Ali Said Al-Matari
- en: 'DOI: [10.1201/9781032716350-13](http://doi.org/10.1201/9781032716350-13)'
  id: totrans-2319
  prefs: []
  type: TYPE_NORMAL
  zh: 'DOI: [10.1201/9781032716350-13](http://doi.org/10.1201/9781032716350-13)'
- en: 13.1 Introduction
  id: totrans-2320
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 13.1 简介
- en: 13.1.1 Background
  id: totrans-2321
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 13.1.1 背景
- en: In the digital transformation era, education is increasingly shifting toward
    active learning models that require active participation from students ([Peñalvo
    & José, 2021](#ch21.xhtml#r585)). This chapter discusses the application of ChatGPT
    in the context of active learning as a new paradigm to enhance student engagement
    and interaction in the classroom. This introduction provides a good overview of
    the chapter’s focus, which is the integration of ChatGPT in active learning models.
    By conveying that education is changing to a more interactive and participatory
    learning model, we can gain the reader’s attention and demonstrate the relevance
    of the topic. Active learning becomes the main focus, where the teacher acts as
    a facilitator of discussion and collaboration ([Cattaneo, 2017](#ch21.xhtml#r552)).
    ChatGPT is used as a tool to stimulate open-ended questions and challenge students
    to think critically, creating an environment where learning does not simply become
    passive information retrieval, but an interactive process that builds deeper understanding
    ([Shoufan, 2023](#ch21.xhtml#r594)).
  id: totrans-2322
  prefs: []
  type: TYPE_NORMAL
  zh: 在数字化转型时代，教育正越来越多地转向需要学生积极参与的主动学习模式([Peñalvo & José, 2021](#ch21.xhtml#r585))。本章讨论了ChatGPT在主动学习背景下的应用，作为一种新的范式来增强学生在课堂中的参与和互动。本介绍提供了对章节重点的良好概述，即ChatGPT在主动学习模式中的整合。通过传达教育正在转变为更加互动和参与的学习模式，我们可以吸引读者的注意并展示该主题的相关性。主动学习成为主要焦点，其中教师作为讨论和协作的促进者([Cattaneo,
    2017](#ch21.xhtml#r552))。ChatGPT被用作工具来激发开放式问题并挑战学生进行批判性思考，创造一个学习不仅仅是被动信息检索，而是一个构建更深层次理解的过程的环境([Shoufan,
    2023](#ch21.xhtml#r594))。
- en: One of the many generative artificial intelligence (AI) technologies that have
    lately surfaced is ChatGPT. It has caused controversy in the education field due
    to worries that it could be used as a tool for plagiarism and compromise students’
    capacity for independent thought ([Tan & Charman, 2023](#ch21.xhtml#r598)). In
    order to help students and teachers benefit from this technology, educators can
    direct the usage of generative AI tools in the classroom and data science. ChatGPT
    is an AI program released in November 2022, but even now, many studies have expressed
    excitement or concern about its introduction into academia and education.
  id: totrans-2323
  prefs: []
  type: TYPE_NORMAL
  zh: 最近出现的许多生成式人工智能(AI)技术之一是ChatGPT。它因担忧其可能被用作剽窃工具并损害学生独立思考的能力而在教育领域引起了争议([Tan &
    Charman, 2023](#ch21.xhtml#r598))。为了帮助师生从这项技术中受益，教育工作者可以指导课堂和数据科学中生成式AI工具的使用。ChatGPT是一个于2022年11月发布的AI程序，但即便如此，许多研究已经对其引入学术界和教育领域表示出兴奋或担忧。
- en: In this paradigm, teachers do not lose their role as classroom leaders, but
    they shift from being the main conveyor of information to guiding and supporting
    student learning ([Brant, 2022](#ch21.xhtml#r550)). Teachers become more involved
    in providing direction, structuring discussions, and designing challenging learning
    experiences ([Whittle et al., 2020](#ch21.xhtml#r601)). On the other hand, students
    become more active, engaging in discussion, collaboration, and problem-solving.
  id: totrans-2324
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个范式下，教师并没有失去他们在课堂中的领导角色，但他们从主要的信息传递者转变为引导和支持学生学习([Brant, 2022](#ch21.xhtml#r550))。教师更多地参与到提供方向、组织讨论和设计具有挑战性的学习体验中([Whittle
    et al., 2020](#ch21.xhtml#r601))。另一方面，学生变得更加活跃，参与到讨论、协作和问题解决中。
- en: In the active learning paradigm, teachers and students have complementary roles.
    The teacher acts as a classroom leader who facilitates student learning, while
    students act as active learners who are responsible for their learning ([Sebastian
    & Allensworth, 2016](#ch21.xhtml#r592)). The active learning paradigm can help
    students develop the critical thinking and problem-solving skills necessary for
    success in an ever-changing world ([Kivunja, 2015](#ch21.xhtml#r575)). [Figure
    13.1](#ch21.xhtml#f38) presents the theoretical framework for using generative
    AI in education.
  id: totrans-2325
  prefs: []
  type: TYPE_NORMAL
  zh: 在主动学习范式下，教师和学生具有互补的角色。教师作为课堂领导者，促进学生学习，而学生作为主动学习者，负责自己的学习（[Sebastian & Allensworth,
    2016](#ch21.xhtml#r592)）。主动学习范式可以帮助学生发展在不断变化的世界中取得成功所需的批判性思维和解决问题的技能。[图13.1](#ch21.xhtml#f38)展示了在教育中使用生成式AI的理论框架。
- en: '![A diagram depicts a box labeled using generative A I in education, with lines
    connected to four boxes labeled evaluate the effectiveness, identify the desired
    outcomes, ensure ethical considerations, and determine the appropriate level of
    automation. Each point is connected to detailed text elaborating on its importance
    and application.](html/images/9781032716084_C013_001.jpg)'
  id: totrans-2326
  prefs: []
  type: TYPE_IMG
  zh: '![一个图解展示了使用生成式AI在教育中的框图，其中连接到四个标签为评估有效性、确定期望结果、确保伦理考虑和确定适当自动化程度的框。每个点都与详细文本相连，阐述其重要性和应用。](html/images/9781032716084_C013_001.jpg)'
- en: '[Figure 13.1](#ch21.xhtml#f38b) Theoretical framework for using generative
    AI in education.'
  id: totrans-2327
  prefs: []
  type: TYPE_NORMAL
  zh: '[图13.1](#ch21.xhtml#f38b) 教育中使用生成式AI的理论框架。'
