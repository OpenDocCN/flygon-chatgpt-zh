  id: totrans-559
  prefs: []
  type: TYPE_NORMAL
  zh: '**它是一个计算机科学领域，专注于创建能够执行通常需要人类智能的任务的系统，例如语言处理、模式识别、决策制定和问题解决。人工智能系统从数据中学习，以改进它们的预测或行为，而不需要直接的人类干预。**'
