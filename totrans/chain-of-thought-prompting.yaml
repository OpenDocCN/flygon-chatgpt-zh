- en: Using CoT Prompting Methods in Combination
  id: totrans-2072
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结合使用CoT提示方法
- en: The Chain of Thought Prompting methods discussed in this book of
  id: totrans-2073
  prefs: []
  type: TYPE_NORMAL
  zh: 本书讨论的思维链提示方法
- en: breaking down generative AI processing into discrete steps,
  id: totrans-2074
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将生成式AI处理分解为离散步骤，
- en: applying the most appropriate type of thinking to solving each step, and
  id: totrans-2075
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 应用最合适的思维方式来解决每个步骤，并且
- en: recombining this thinking in a cogent manner
  id: totrans-2076
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 以连贯的方式重新组合这种思考
- en: can be used in combination to devise powerful and transparent solving problem
    methodologies.
  id: totrans-2077
  prefs: []
  type: TYPE_NORMAL
  zh: 可以组合使用，以制定强大且透明的解决问题方法。
- en: 'For example, in a scenario where a company is facing a complex challenge in
    market analysis, these techniques can be applied as follows:'
  id: totrans-2078
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，在一个公司面临市场分析复杂挑战的情景中，可以如下应用这些技术：
- en: 'Quantitative and Qualitative Decomposition: Data is separated into numerical
    (sales figures, market share) and qualitative aspects (brand perception, customer
    satisfaction).'
  id: totrans-2079
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 定量和定性分解：数据被分为数值（销售额、市场份额）和定性方面（品牌认知、客户满意度）。
- en: 'Systems Analysis: The problem is further deconstructed into components like
    consumer behaviour, market trends, and competitor strategies.'
  id: totrans-2080
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 系统分析：问题进一步分解为消费者行为、市场趋势和竞争对手策略等组成部分。
- en: 'Psychoanalysis: Transactional Analysis is used to analyse the psychological
    factors influencing consumer choices and market dynamics.'
  id: totrans-2081
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 心理分析：交易分析用于分析影响消费者选择和市场动态的心理因素。
- en: At each stage, the base AI model can be accessed multiple times, providing insights
    specific to that element.
  id: totrans-2082
  prefs: []
  type: TYPE_NORMAL
  zh: 在每个阶段，基础AI模型可以多次访问，提供针对该元素的具体见解。
- en: This sequential AI problem-solving approach allows us to use generative AI in
    conjunction with structured thinking techniques to achieve a broader, deeper and
    more transparent conclusion than is possible when using generative AI as a one-shot
    information processing engine.
  id: totrans-2083
  prefs: []
  type: TYPE_NORMAL
  zh: 这种顺序AI问题解决方法使我们能够将生成式AI与结构化思维技术结合使用，以实现比使用生成式AI作为一次性信息处理引擎更广泛、更深、更透明的结论。
- en: Programming AI
  id: totrans-2084
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 编程AI
- en: This is not a book on programming, however the following AI programming considerations
    come to mind after assessing the Chain of Thought Prompting methods presented
    in this book.
  id: totrans-2085
  prefs: []
  type: TYPE_NORMAL
  zh: 这不是一本编程书籍，然而在评估了本书中提出的思维链提示方法后，以下关于AI编程的考虑因素浮现在心头。
- en: The Intermediate Stage
  id: totrans-2086
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 中间阶段
- en: The most fundamental idea that enables all programming is that we have access
    to intermediate stages of problem solving.
  id: totrans-2087
  prefs: []
  type: TYPE_NORMAL
  zh: 使所有编程成为可能的最基本想法是我们能够访问问题解决的中间阶段。
- en: At its core, an intermediate stage in programming is a specific condition or
    state during the execution of a program. It can refer to the status of variables,
    the progress of algorithms, or the system's state at a given moment. Decisions
    made at intermediate stages in programming determine the direction in which a
    program will proceed, based on the current state or data.
  id: totrans-2088
  prefs: []
  type: TYPE_NORMAL
  zh: 在编程的核心，中间阶段是指在程序执行过程中特定条件或状态。它可以指变量的状态、算法的进度或特定时刻的系统状态。在编程的中间阶段做出的决策基于当前状态或数据，决定了程序将如何继续前进。
- en: 'The following elemental logical constructs are applied to allow decision making
    in intermediate program states:'
  id: totrans-2089
  prefs: []
  type: TYPE_NORMAL
  zh: 以下基本逻辑结构被应用于允许在中间程序状态中进行决策：
- en: 'State Evaluation: The current state of a program is assessed. This could mean
    checking the value of variables or the status of a process.'
  id: totrans-2090
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 状态评估：评估程序当前状态。这可能意味着检查变量的值或进程的状态。
- en: 'Decision Making: Based on the evaluation, the program makes decisions at these
    stages. This is where logic operations like ''if-else'' statements and loops come
    into play. The program may choose different paths or repeat certain actions based
    on the conditions assessed.'
  id: totrans-2091
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 决策：基于评估，程序在这些阶段做出决策。这是逻辑运算如'if-else'语句和循环发挥作用的地方。程序可能会根据评估的条件选择不同的路径或重复某些操作。
- en: 'Flow Control: Intermediate stages are crucial for controlling the flow of a
    program. They determine what happens next in a program, whether it''s proceeding
    to the next step, determining which information to pass to the next state, repeating
    a process, or terminating.'
  id: totrans-2092
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 流程控制：中间阶段对于控制程序的流程至关重要。它们决定了程序下一步会发生什么，无论是继续到下一步，确定传递给下一状态的信息，重复一个过程，还是终止。
- en: Correctly managing decision making in intermediate steps is crucial and core
    to all programming.
  id: totrans-2093
  prefs: []
  type: TYPE_NORMAL
  zh: 正确管理中间步骤中的决策至关重要，这是所有编程的核心。
- en: Generative AI Intermediate States
  id: totrans-2094
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 生成式AI中间状态
- en: Generative AIs, such as language models and image generators, typically function
    as one-shot solutions. They take input, process it through a complex network,
    and provide an output without exposing intermediate stages.
  id: totrans-2095
  prefs: []
  type: TYPE_NORMAL
  zh: 生成式AI，如语言模型和图像生成器，通常作为一次性解决方案运行。它们接收输入，通过复杂的网络进行处理，并提供输出，而不暴露中间阶段。
- en: However, to allow a native AI programming paradigm, it's essential to be able
    to access the intermediate stages in the generative AI processing.
  id: totrans-2096
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，为了允许原生的AI编程范式，能够访问生成式AI处理过程中的中间阶段是至关重要的。
- en: Using a structured AI thinking approach, we can break down generative AI processing
    into discrete stages, and access the data present in each stage, in order to make
    decisions about how to proceed.
  id: totrans-2097
  prefs: []
  type: TYPE_NORMAL
  zh: 使用结构化AI思维方法，我们可以将生成式AI处理分解为离散阶段，并访问每个阶段中存在的数据，以便就如何继续做出决策。
- en: 'Business Process Analysis: In the case of splitting up problems into Business
    Process format, and then encouraging the AI to use this format to solve each part
    of the problem discretely, the intermediate state is presented to us as the output
    of each stage and the input to the next stage.'
  id: totrans-2098
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 业务流程分析：在将问题分解为业务流程格式的情况下，并鼓励AI使用这种格式来离散地解决问题的各个部分时，中间状态以每个阶段的输出和下一阶段的输入的形式呈现给我们。
- en: Here, we can make logical decisions based on the values of these values that
    are passed between each stage of the Business Process.
  id: totrans-2099
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，我们可以根据业务流程中各阶段之间传递的值的值做出逻辑决策。
- en: 'Systems Analysis: When we split up problems posed to a generative AI into a
    systems analysis format, we can identify the states of each discrete state of
    the system, and make decisions based on these states.'
  id: totrans-2100
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 系统分析：当我们把向生成式AI提出的问题分解为系统分析格式时，我们可以识别系统的每个离散状态的状态，并基于这些状态做出决策。
- en: 'Transactional Analysis: In the case of using Transactional Analysis to break
    down the AI problem solving process into discrete parts, we have access to what
    each ego state, or sub-ego-state, is “thinking”. This represents the intermediate
    state for this type of structured thinking and decisions could be made based on
    this information.'
  id: totrans-2101
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 交易分析：在将AI问题解决过程分解为离散部分的情况下，我们可以了解每个自我状态或亚自我状态“思考”的内容。这代表了这种结构化思维的中间状态，决策可以根据这些信息做出。
- en: In each of these types of AI structured thinking, splitting the AI processing
    into multiple explicit steps exposes an intermediate stage which can be further
    analysed to make conditional decisions.
  id: totrans-2102
  prefs: []
  type: TYPE_NORMAL
  zh: 在这些类型的AI结构化思维中，将AI处理分解为多个显式步骤会暴露出可以进一步分析以做出条件决策的中间阶段。
- en: Final Thoughts
  id: totrans-2103
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 最后的想法
- en: The advent of generative AI marks a significant shift in the landscape of information
    technology and creative processes. This technology is poised to transform how
    we approach problem-solving, creativity, and knowledge acquisition.
  id: totrans-2104
  prefs: []
  type: TYPE_NORMAL
  zh: 生成式AI的出现标志着信息技术和创意过程领域的重大转变。这项技术有望改变我们处理问题、创造力和知识获取的方式。
- en: With generative AI, the focus shifts from the labour-intensive aspects of making
    IT systems function—such as coding, debugging, and system optimization—to a more
    strategic and holistic approach. This transition involves leveraging the capabilities
    of AI to handle complex, detailed tasks, freeing up human intellect for more abstract,
    conceptual work.
  id: totrans-2105
  prefs: []
  type: TYPE_NORMAL
  zh: 使用生成式AI，重点从劳动密集型的IT系统功能方面——如编码、调试和系统优化——转移到更战略性和整体性的方法。这种转变涉及利用AI处理复杂、详细任务的能力，从而释放人类的智力，使其能够从事更抽象、概念性的工作。
- en: This shift enables a deeper engagement with the "bigger picture." Rather than
    being bogged down in the minutiae, professionals can concentrate on strategy,
    innovation, and high-level decision-making. This can lead to more efficient problem-solving,
    as the AI handles routine and repetitive tasks, allowing humans to focus on creative
    and analytical thinking.
  id: totrans-2106
  prefs: []
  type: TYPE_NORMAL
  zh: 这种转变使得对“大局”的参与更加深入。而不是陷入细节，专业人士可以专注于战略、创新和高级决策。这可以导致更有效的解决问题，因为AI处理常规和重复性任务，使人类能够专注于创造性和分析性思维。
- en: By combining human creativity and strategic thinking with the efficiency and
    processing power of AI, we stand on the brink of a new era. This era promises
    not just enhanced productivity and innovation, but also the potential for significant
    advancements in our understanding of the world and the expansion of human knowledge.
  id: totrans-2107
  prefs: []
  type: TYPE_NORMAL
  zh: 通过结合人类的创造力和战略思维与AI的效率和计算能力，我们站在新时代的门槛上。这个时代不仅承诺提高生产力和创新，还可能在我们对世界的理解以及人类知识的扩展方面取得重大进步。
- en: '![Dawn | Another shot from yesterday morning. I used my 10-sto… | Flickr](image_rsrc6H6.jpg)'
  id: totrans-2108
  prefs: []
  type: TYPE_IMG
  zh: '![黎明 | 昨天早晨的另一张照片。我用了我的10-… | Flickr](image_rsrc6H6.jpg)'
