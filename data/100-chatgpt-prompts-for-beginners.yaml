- en: Function Factories
  id: totrans-168
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 函数工厂
- en: Closures can also be used to create function factories, which are functions
    that return other functions configured with specific behavior.
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 闭包也可以用于创建函数工厂，这些函数返回具有特定行为的其他函数。
- en: function multiplier(factor) {
  id: totrans-170
  prefs: []
