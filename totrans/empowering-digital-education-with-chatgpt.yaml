  type: TYPE_NORMAL
  zh: 此外，根据Hair等人（2016）的指南，本研究必须检查AVE（平均方差提取）的平方根是否大于变量之间的相关性。如[表5.2](#ch13.xhtml#t11)所示，区分效度得到了验证。此外，Harman的单因素测试证实，共同方法偏差不是一个显著问题（[Henseler等人，2015](#ch13.xhtml#r204)）。
