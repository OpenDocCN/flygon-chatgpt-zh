  type: TYPE_NORMAL
  zh: 生成模型是设计用来创建原创内容的系统，例如文本、图像或音乐，从现有数据中生成。与传统的仅用于分类或预测的模型不同，生成模型具有想象和产生新颖结果的能力。从早期使用循环神经网络（RNN）的尝试到引入先进的架构，如Transformer，这些模型已经重新定义了我们对于机器能够实现什么的期望。
