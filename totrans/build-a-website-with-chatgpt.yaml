  zh: ⑫ 当用户在部门或讲师列表中选择一个项目时，过滤数据
- en: ⑬ Filters the data when the user selects an item in the Department or Instructor
    list
  id: totrans-3140
  prefs: []
  type: TYPE_NORMAL
  zh: ⑬ 当用户在部门或讲师列表中选择一个项目时，过滤数据
- en: ⑭ Sorts the data when the user selects an item in the Sort list
  id: totrans-3141
  prefs: []
  type: TYPE_NORMAL
  zh: ⑭ 当用户在排序列表中选择一个项目时，对数据进行排序
- en: ⑮ Searches the data when the user types something in the Search text box
  id: totrans-3142
  prefs: []
  type: TYPE_NORMAL
  zh: ⑮ 当用户在搜索文本框中输入某些内容时，搜索数据
- en: If you like, you can use the HTML and CSS annotations from the previous two
    sections to help customize your web page code, as I describe in the next section.
  id: totrans-3143
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您愿意，可以使用前两节中的HTML和CSS注释来自定义您的网页代码，正如我在下一节中描述的那样。
- en: 13.7 Customizing the course catalog
  id: totrans-3144
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 13.7 自定义课程目录
- en: Using the previous section’s annotations as a guide, here I’m going to take
    you through a few relatively simple code customizations you can make by opening
    the HTML and CSS files in your text editor. If your page isn’t close to what you
    want, however, you’re better off rewriting your prompt and submitting it to ChatGPT
    in a new session.
  id: totrans-3145
  prefs: []
  type: TYPE_NORMAL
  zh: 以前节的注释为指导，这里我将带您通过一些相对简单的代码自定义，您可以通过在文本编辑器中打开HTML和CSS文件来实现。然而，如果您的页面与您想要的不太接近，您最好重新编写提示并将其提交给ChatGPT进行新的会话。
- en: 'The HTML code in this project is minimal because most of the page is generated
    via JavaScript. So, I have just a couple of suggestions:'
  id: totrans-3146
  prefs: []
  type: TYPE_NORMAL
  zh: 由于此项目中的HTML代码最少，因为大部分页面是通过JavaScript生成的。因此，我只有一些建议：
- en: Feel free to add more sorting fields by adding new items to the Sort drop-down
    list. Just remember to prompt ChatGPT to generate the JavaScript code to handle
    sorting on the new fields.
  id: totrans-3147
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 随意添加更多排序字段，只需在排序下拉列表中添加新项目即可。只需记住提示 ChatGPT 生成处理新字段的 JavaScript 代码。
- en: In the footer section of the HTML code, you can add links to your social media
    accounts, as I describe in chapter 4.
  id: totrans-3148
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在 HTML 代码的页脚部分，你可以添加指向你的社交媒体账户的链接，正如我在第 4 章中描述的那样。
- en: 'Now, here are a few customization ideas for the CSS code:'
  id: totrans-3149
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，这里有一些 CSS 代码的定制想法：
- en: To use another page background color, specify a different color keyword for
    the `body` element’s `background-color` property.
  id: totrans-3150
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 要使用不同的页面背景颜色，请为 `body` 元素的 `background-color` 属性指定不同的颜色关键字。
- en: To use another background color for the header and footer, specify a new color
    keyword for the `header` and `footer` elements’ `background-color` property.
  id: totrans-3151
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 要为页眉和页脚使用不同的背景颜色，请为 `header` 和 `footer` 元素的 `background-color` 属性指定新的颜色关键字。
- en: To use a different color for the page text, specify a different color keyword
    for the `body` element’s `color` property.
  id: totrans-3152
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 要为页面文本使用不同的颜色，请为 `body` 元素的 `color` 属性指定不同的颜色关键字。
- en: For any font size value, you can change the number to increase or decrease the
    font size. Just make sure you leave the `px` unit in place.
  id: totrans-3153
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于任何字体大小值，你可以通过改变数字来增加或减少字体大小。只需确保保留 `px` 单位。
- en: For any padding or margin value, you can change the number to increase or decrease
    the padding or margins. In each case, be sure to leave the `px` unit in place.
  id: totrans-3154
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于任何填充或边距值，你可以通过改变数字来增加或减少填充或边距。在每种情况下，都要确保保留 `px` 单位。
- en: To make your page code more accessible, consider converting all px measurements
    to rem measurements. 1 rem is by default equivalent to 16 px, so 20 px is 1.25 rem,
    24 px is 1.5 rem, 32 px is 2 rem, 48 px is 3 rem, and so on. The rem unit is more
    accessible because it measures font sizes relative to the default font size the
    browser user has defined in their browser settings.
  id: totrans-3155
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 要使你的页面代码更易于访问，考虑将所有 px 测量转换为 rem 测量。默认情况下，1 rem 等于 16 px，所以 20 px 是 1.25 rem，24
    px 是 1.5 rem，32 px 是 2 rem，48 px 是 3 rem，依此类推。rem 单位更易于访问，因为它测量的是相对于浏览器用户在其浏览器设置中定义的默认字体大小的字体大小。
- en: 13.8 Where to go from here
  id: totrans-3156
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 13.8 接下来去哪里
- en: My goal in this book has been to show you that although it appears magical that
    ChatGPT can generate sophisticated web page code on request, the real secret is
    converting your web page vision into a detailed and specific prompt that tells
    ChatGPT exactly what you want. You’ve seen many examples of such prompts in this
    book, and along the way, you’ve learned everything you need to know about web
    page construction and design. That’s great news because it means you now have
    the knowledge and experience to create almost anything you want on the web. When
    you’re ready to build something bold and beautiful, ChatGPT will be there for
    you to turn that dream into a reality. It’s all just a prompt away.
  id: totrans-3157
  prefs: []
  type: TYPE_NORMAL
  zh: 我在这本书中的目标一直是向你展示，尽管看起来神奇，ChatGPT 可以根据请求生成复杂的网页代码，但真正的秘密是将你的网页愿景转化为详细和具体的提示，告诉
    ChatGPT 你确切想要什么。你在本书中看到了许多这样的提示示例，并且在过程中，你学习了关于网页构建和设计所需知道的一切。这是个好消息，因为它意味着你现在拥有创建几乎所有你想要在网页上的知识和经验。当你准备好构建一些大胆而美丽的东西时，ChatGPT
    将会为你将梦想变为现实。这一切都只是一个提示的距离。
- en: Summary
  id: totrans-3158
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: To convert Excel data to JSON, make sure the data resides in a range or table
    and that each column has a unique heading.
  id: totrans-3159
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将 Excel 数据转换为 JSON 时，请确保数据位于一个范围或表中，并且每个列都有一个唯一的标题。
- en: JSON is a set of one or more comma-separated property–value pairs surrounded
    by braces (`{` and `}`), where the property names are surrounded by double quotation
    marks. Text values are also surrounded by double quotation marks.
  id: totrans-3160
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: JSON 是一组由逗号分隔的属性-值对，用大括号 `{` 和 `}` 包围，其中属性名用双引号包围。文本值也用双引号包围。
- en: If you have a ChatGPT Plus account, you can upload your Excel file to a chat
    and then prompt ChatGPT to convert your data to JSON and output the result as
    a file you can download.
  id: totrans-3161
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果你有一个 ChatGPT Plus 账户，你可以将你的 Excel 文件上传到聊天中，然后提示 ChatGPT 将你的数据转换为 JSON，并将结果作为可以下载的文件输出。
- en: You ask ChatGPT to generate your web page code with an empty element (such as
    an `article` element); you then use JavaScript to populate it with the JSON data.
  id: totrans-3162
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你让 ChatGPT 生成一个空元素（如 `article` 元素）的网页代码；然后你使用 JavaScript 来填充它，使用 JSON 数据。
- en: The most common data-manipulation techniques on web pages are searching, filtering,
    and sorting. You can prompt ChatGPT to generate the JavaScript code to implement
    each technique.
  id: totrans-3163
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 网页上最常见的数据处理技术包括搜索、过滤和排序。您可以通过提示ChatGPT生成实现每种技术的JavaScript代码。
- en: For the best results, your page prompt should be as specific as possible, including
    colors, font sizes, and heading levels.
  id: totrans-3164
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为了获得最佳结果，您的页面提示应尽可能具体，包括颜色、字体大小和标题级别。
- en: Save the generated HTML to the index.xhtml file, the generated CSS to the filename
    suggested by ChatGPT in the HTML code, usually styles.css, and the generated JavaScript
    code to the filename suggested by ChatGPT in the HTML code, usually script.js.
  id: totrans-3165
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将生成的HTML保存到index.xhtml文件中，将生成的CSS保存到ChatGPT在HTML代码中建议的文件名中，通常是styles.css，将生成的JavaScript代码保存到ChatGPT在HTML代码中建议的文件名中，通常是script.js。
- en: Appendix A. Getting ready to build web pages with ChatGPT
  id: totrans-3166
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 附录A. 使用ChatGPT准备构建网页
- en: Aside from the introductory material in chapter 1, this book’s focus is on showing
    you how to convince ChatGPT to help you build web pages without having to learn
    how to code them yourself. I hope you find that the book’s web page ideas and
    the prompts used to generate them are useful to you, either directly or as stepping-off
    points to explore on your own.
  id: totrans-3167
  prefs: []
  type: TYPE_NORMAL
  zh: 除了第1章的介绍性材料外，本书的重点是向您展示如何说服ChatGPT帮助您构建网页，而无需学习如何自己编码。我希望您会发现本书的网页想法和用于生成它们的提示对您有用，无论是直接使用还是作为您自己探索的起点。
- en: Using ChatGPT as a web coding assistant is nowhere near as complex as learning
    to code pages yourself, but it does require a bit of setup and a modicum of infrastructure.
    This appendix is all about taking you through the few things you need to know
    and the few tasks you need to do before you can successfully get ChatGPT to help
    you turn your website ideas into something real. After going through a mercifully
    short list of requirements, you learn how to set up an optional ChatGPT or Microsoft
    account. You also learn how to test your code before deploying it and how to work
    with HTML and other web page files.
  id: totrans-3168
  prefs: []
  type: TYPE_NORMAL
  zh: 将ChatGPT用作网页编码助手，其复杂程度远不及自己学习编码页面，但它确实需要一些设置和基础设施。本附录旨在向您介绍您需要了解的少数事项以及您需要完成的少数任务，以便您能够成功地将ChatGPT用于将您的网站想法变为现实。在经过一个仁慈的简短需求清单后，您将学习如何设置可选的ChatGPT或Microsoft账户。您还将学习如何在部署代码之前测试您的代码，以及如何处理HTML和其他网页文件。
- en: A.1 What you need to get started
  id: totrans-3169
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: A.1 开始所需准备
- en: 'One of the best things about using ChatGPT to help you create web pages is
    that you can get started with very few requirements and without spending a nickel
    of your hard-earned money (unless you want to). In fact, I can summarize everything
    you need to get up and running in a list that’s a mere four items long:'
  id: totrans-3170
  prefs: []
  type: TYPE_NORMAL
  zh: 使用ChatGPT帮助您创建网页的最好之处之一是，您只需极少的条件，并且无需花费您辛苦赚来的任何一分钱（除非您愿意）。实际上，我可以将您需要启动的所有内容总结成一个只有四项的清单：
- en: '*Internet access*—Although you can use the ChatGPT mobile app offline, the
    OpenAI app ([https://chat.openai.com](https://chat.openai.com)), Bing Copilot
    ([https://bing.com](https://bing.com) and then click Copilot), and Microsoft Copilot
    ([https://copilot.microsoft.com](https://copilot.microsoft.com))—any one of which
    you need to use for easy access to the code generated by ChatGPT—are online-only,
    so you need internet access.'
  id: totrans-3171
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*互联网接入*—尽管您可以使用ChatGPT移动应用离线使用，但OpenAI应用([https://chat.openai.com](https://chat.openai.com))、Bing
    Copilot([https://bing.com](https://bing.com)然后点击Copilot)和Microsoft Copilot([https://copilot.microsoft.com](https://copilot.microsoft.com))——您需要使用其中任何一个来轻松访问ChatGPT生成的代码——都是在线服务，因此您需要互联网接入。'
- en: '*Web browser*—You can access the OpenAI app and Bing Copilot using any recent
    version of a major browser (such as Chrome, Safari, Edge, or Firefox). But to
    use Microsoft Copilot, you need to use Chrome or Microsoft Edge, with support
    for Firefox and Safari in the works as I write this.'
  id: totrans-3172
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*网页浏览器*—您可以使用任何主流浏览器的最新版本（如Chrome、Safari、Edge或Firefox）访问OpenAI应用和Bing Copilot。但为了使用Microsoft
    Copilot，您需要使用Chrome或Microsoft Edge，目前Firefox和Safari也在开发中。'
- en: '*Text editor*—After you copy the code generated by ChatGPT, you have to paste
    it somewhere, and that somewhere is almost always a file opened in a text editor.
    Yep, you can use the default text editor that comes with your computer (Notepad
    for Windows or TextEdit for macOS), but here are some code-friendly editors to
    consider:'
  id: totrans-3173
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*文本编辑器*—在您复制ChatGPT生成的代码后，您需要将其粘贴到某个地方，而这个地方几乎总是打开在文本编辑器中的文件。是的，您可以使用您电脑自带的默认文本编辑器（Windows的记事本或macOS的TextEdit），但这里有一些适合代码的编辑器可以考虑：'
- en: '*Notepad++*—Available for Windows only, and it’s free: [https://notepad-plus-plus.org](https://notepad-plus-plus.org)'
  id: totrans-3174
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*Notepad++*—仅适用于Windows，且是免费的：[https://notepad-plus-plus.org](https://notepad-plus-plus.org)'
- en: '*Nova*—Available for Mac for $99, but a free trial is available: [https://nova.app](https://nova.app)'
  id: totrans-3175
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*Nova*—适用于Mac，价格为99美元，但提供免费试用：[https://nova.app](https://nova.app)'
- en: '*Sublime Text*—Available for both Windows and Mac for $99, but a free trial
    is available: [www.sublimetext.com](https://www.sublimetext.com)'
  id: totrans-3176
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*Sublime Text*—适用于Windows和Mac，价格为99美元，但提供免费试用：[www.sublimetext.com](https://www.sublimetext.com)'
- en: '*Visual Studio Code*—Available for Windows and Mac, and this one is free, as
    well: [https://code.visualstudio.com](https://code.visualstudio.com)'
  id: totrans-3177
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*Visual Studio Code*—适用于Windows和Mac，而且这个也是免费的：[https://code.visualstudio.com](https://code.visualstudio.com)'
- en: '*Web hosting account*—Once you’ve saved the ChatGPT-generated code to a web
    page file, your final step is to deploy the file to the web. To do that, you need
    an account with a web hosting provider. I talk about setting up web hosting accounts
    and deploying your web code in more detail in appendix B. If you don’t have a
    web host, you can still view your pages locally by using your web browser’s File
    > Open command to open each page’s saved HTML file.'
  id: totrans-3178
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*Web hosting account*—一旦你将ChatGPT生成的代码保存到网页文件中，你的最后一步就是将文件部署到网络上。为此，你需要一个网络托管服务提供商的账户。我在附录B中更详细地讨论了如何设置网络托管账户以及部署你的网络代码。如果你没有网络托管服务，你仍然可以通过使用网络浏览器的文件
    > 打开命令来打开每个保存的HTML文件，在本地查看你的页面。'
- en: Note If you’re going to use your own photos on your web pages (check out chapter
    10), you may need a photo-editing app for tasks such as cropping, enhancing colors,
    and changing the image size and file format. The Photos apps that ship with Windows
    and macOS can handle these simple operations, but for more in-depth chores, you’ll
    want higher-end software such as Adobe Photoshop ([www.adobe.com/products/photoshop.xhtml](https://www.adobe.com/products/photoshop.xhtml))
    or GIMP ([www.gimp.org](https://www.gimp.org)), which is free.
  id: totrans-3179
  prefs: []
  type: TYPE_NORMAL
  zh: 注意：如果你打算在你的网页上使用自己的照片（查看第10章），你可能需要一个用于裁剪、增强颜色、更改图像大小和文件格式的照片编辑应用程序。Windows和macOS附带的照片应用程序可以处理这些简单操作，但对于更深入的任务，你可能需要高端软件，如Adobe
    Photoshop ([www.adobe.com/products/photoshop.xhtml](https://www.adobe.com/products/photoshop.xhtml))
    或 GIMP ([www.gimp.org](https://www.gimp.org))，后者是免费的。
- en: Yep, that really is all you need, and none of these items have to cost you any
    extra cash (assuming you’d be paying for internet access even if you weren’t using
    ChatGPT to create web pages). The one exception you may want to make is to pay
    for a ChatGPT subscription, which I discuss in the next section.
  id: totrans-3180
  prefs: []
  type: TYPE_NORMAL
  zh: 是的，这真的是你需要的全部，而且这些物品都不需要额外付费（假设即使你不使用ChatGPT创建网页，你也会支付互联网接入费用）。唯一可能需要付费的情况是购买ChatGPT订阅，我将在下一节中讨论这一点。
- en: A.2 Understanding ChatGPT account access
  id: totrans-3181
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: A.2 理解ChatGPT账户访问
- en: 'ChatGPT is a product of OpenAI, which is backed by Microsoft. So, it would
    seem reasonable to expect that you’d need either an OpenAI account or a Microsoft
    account to converse with ChatGPT. Is that true? Surprisingly, the answer is no,
    not unless you want one. So, should you get an account for ChatGPT access? Here
    are the scenarios to consider:'
  id: totrans-3182
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT是OpenAI的产品，由Microsoft支持。因此，似乎合理的预期是，你需要一个OpenAI账户或Microsoft账户才能与ChatGPT进行对话。这是真的吗？令人惊讶的是，答案是否定的，除非你想要一个。那么，你应该为ChatGPT访问获取一个账户吗？以下是需要考虑的场景：
- en: '*Maximizing privacy (no account)*—Many people are loath to send private data
    to large corporations (such as OpenAI and Microsoft), so accessing ChatGPT without
    an account makes the entire process a bit more private. You can access the Open
    AI ChatGPT app without an account, but you’re restricted to using GPT 3.5\. To
    use ChatGPT without a Microsoft account, you need to access Copilot via Bing.
    Note, however, that without a Microsoft account, you’re restricted to just 10
    responses from ChatGPT per session (versus the 30 responses per session you get
    when you’re signed in with a Microsoft account).'
  id: totrans-3183
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*Maximizing privacy (no account)*—许多人不愿意将私人数据发送给大型企业（如OpenAI和Microsoft），因此在不使用账户的情况下访问ChatGPT可以使整个过程更加私密。你可以不使用账户访问Open
    AI ChatGPT应用程序，但你被限制使用GPT 3.5。要无Microsoft账户使用ChatGPT，你需要通过Bing访问Copilot。注意，然而，如果没有Microsoft账户，你每场会议的限制是ChatGPT只有10个回复（相对于使用Microsoft账户时每场会议的30个回复）。'
- en: '*Getting free access to GPT-4 (Microsoft account)*—GPT-4 is (at least as I
    write this) the latest and greatest large language model (LLM) from OpenAI, so
    it’s the one most people want to use, especially for generating web code. You
    can pay OpenAI to get access to GPT-4 (as I discuss in the last of these bullets),
    but an alternative is to navigate to Microsoft Copilot, which uses GPT-4 as its
    LLM. To get the most out of Bing Copilot (and to access the separate Microsoft
    Copilot site at all), create a Microsoft account and use it to sign in—or use
    your existing Microsoft account if you’re a Windows user. To create a Microsoft
    account, go to [https://account.microsoft.com](https://account.microsoft.com),
    click Sign In, and then follow the steps.'
  id: totrans-3184
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*获取 GPT-4 的免费访问权限（Microsoft 账户）*—GPT-4（至少在我写这篇文章的时候）是 OpenAI 最新的、最强大的大型语言模型（LLM），因此是大多数人想要使用的模型，尤其是用于生成网页代码。你可以付费给
    OpenAI 来获取 GPT-4 的访问权限（如我在这些要点中的最后一个所述），但另一种方法是导航到 Microsoft Copilot，它使用 GPT-4
    作为其 LLM。为了充分利用 Bing Copilot（以及访问独立的 Microsoft Copilot 网站），创建一个 Microsoft 账户并使用它登录——或者如果你是
    Windows 用户，使用你现有的 Microsoft 账户。要创建一个 Microsoft 账户，请访问 [https://account.microsoft.com](https://account.microsoft.com)，点击“登录”，然后按照步骤操作。'
- en: '*Getting free access to GPT-3.5 (free OpenAI account)*—GPT-3.5 is a fantastic
    AI model that produces reliable and useful web page code. If you want free access
    to GPT-3.5 and for some reason aren’t able (or don’t want) to use Copilot to get
    free access to GPT-4 (as described in the previous bullet), you can set up a free
    OpenAI account. Having an account gives you access to some extra ChatGPT features
    that aren’t available to people who use ChatGPT without an account (as described
    in the first bullet). To create a free OpenAI account, go to [https://openai.com](https://openai.com),
    click Sign Up, and then follow the steps.'
  id: totrans-3185
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*获取 GPT-3.5 的免费访问权限（免费 OpenAI 账户）*—GPT-3.5 是一个出色的 AI 模型，能够生成可靠且有用的网页代码。如果你想要免费访问
    GPT-3.5，但出于某种原因无法（或不想）使用 Copilot 来获取 GPT-4 的免费访问权限（如前一个要点所述），你可以设置一个免费的 OpenAI
    账户。拥有账户可以让你访问一些 ChatGPT 的额外功能，这些功能对于没有账户使用 ChatGPT 的人来说是不可用的（如第一个要点所述）。要创建一个免费的
    OpenAI 账户，请访问 [https://openai.com](https://openai.com)，点击“注册”，然后按照步骤操作。'
- en: '*Getting paid access to GPT-4 (ChatGPT Plus subscription)*—If you want to use
    GPT-4 and for some reason aren’t able (or don’t want) to use Bing Copilot or Microsoft
    Copilot to get free access to GPT-4 (as described in an earlier bullet), you need
    to set up a subscription to ChatGPT Plus, which as I write this will set you back
    US $20 per month. To set up a ChatGPT Plus subscription, create a free OpenAI
    account (as described in the previous bullet), access the ChatGPT app ([https://chat.openai.com](https://chat.openai.com)),
    click Upgrade in the lower-left corner (refer to figure A.1), and then follow
    the steps.'
  id: totrans-3186
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*获取 GPT-4 的付费访问权限（ChatGPT Plus 订阅）*—如果你想要使用 GPT-4，但出于某种原因无法（或不想）使用 Bing Copilot
    或 Microsoft Copilot 来获取 GPT-4 的免费访问权限（如前一个要点所述），你需要设置一个 ChatGPT Plus 的订阅，按照我写这篇文章时的价格，这将花费你每月
    20 美元。要设置一个 ChatGPT Plus 订阅，创建一个免费的 OpenAI 账户（如前一个要点所述），访问 ChatGPT 应用程序 ([https://chat.openai.com](https://chat.openai.com))，在左下角点击“升级”（参考图
    A.1），然后按照步骤操作。'
- en: '![](../../OEBPS/Images/APPA_F01_McFedries3.png)'
  id: totrans-3187
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../../OEBPS/Images/APPA_F01_McFedries3.png)'
- en: Figure A.1 To set up a ChatGPT Plus subscription, click Upgrade in the ChatGPT
    app sidebar.
  id: totrans-3188
  prefs: []
  type: TYPE_NORMAL
  zh: 图 A.1 要设置 ChatGPT Plus 订阅，请点击 ChatGPT 应用程序侧边栏中的“升级”按钮。
- en: A.3 Testing your code
  id: totrans-3189
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: A.3 测试你的代码
- en: ChatGPT has been trained on an unfathomably large amount of programming code,
    which is why it’s (usually) so good at generating the web page knickknacks you
    ask for. But ChatGPT isn’t infallible, which means it will sometimes produce HTML,
    CSS, or JavaScript code that either doesn’t do what you asked or is broken in
    some way. A professional coder can usually examine the generated code and understand
    not only *that* the code is wrong but also *why* it’s wrong. You’re reading this
    book because you’re not a professional coder, so how will you know whether ChatGPT
    has coughed up some errant code?
  id: totrans-3190
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT 在难以想象的巨大数量的编程代码上进行了训练，这就是为什么它通常在生成你要求的网页小部件方面表现得如此出色。但 ChatGPT 并非完美无缺，这意味着它有时会生成
    HTML、CSS 或 JavaScript 代码，这些代码要么没有按照你的要求执行，要么在某些方面存在错误。一个专业的程序员通常可以检查生成的代码，并不仅理解“代码是错误的”，而且还能理解“为什么代码是错误的”。你之所以在阅读这本书，是因为你不是专业的程序员，那么你将如何知道
    ChatGPT 是否产生了错误的代码？
- en: The answer is that you get a web browser to render the code and then examine
    the result to see if the code works like it’s supposed to (or at all). One way
    to get a web browser to render ChatGPT code is to run the full prompt-copy-save-deploy
    cycle. That process isn’t particularly onerous, but neither is it trivial, so
    it seems like overkill if you just want to know, say, whether the ChatGPT-generated
    code for a form works as intended.
  id: totrans-3191
  prefs: []
  type: TYPE_NORMAL
  zh: 答案是，你让网络浏览器渲染代码，然后检查结果以查看代码是否按预期工作（或者根本不起作用）。让网络浏览器渲染 ChatGPT 代码的一种方法是通过运行完整的提示-复制-保存-部署周期。这个过程并不特别繁重，但也不是微不足道，所以如果你只是想知道，比如说，ChatGPT
    生成的表单代码是否按预期工作，这似乎有些过度。
- en: A better and faster method is to test only the code generated by ChatGPT, which
    you do by copying the code and then pasting it into one of the available online
    coding playgrounds. The next two sections provide the details.
  id: totrans-3192
  prefs: []
  type: TYPE_NORMAL
  zh: 更好且更快的方法是仅测试 ChatGPT 生成的代码，你可以通过复制代码然后将其粘贴到可用的在线编码沙盒中来实现。接下来的两个部分将提供详细信息。
- en: A.3.1 Copying data from ChatGPT
  id: totrans-3193
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: A.3.1 从 ChatGPT 复制数据
- en: 'Once ChatGPT has finished generating your code, your first step is to copy
    that code to your computer’s Clipboard. (The Clipboard is a special memory area
    that your computer uses to store the most recent item you’ve copied.) How you
    go about this depends on which method you’re using to access ChatGPT:'
  id: totrans-3194
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦 ChatGPT 完成生成你的代码，你的第一步是将该代码复制到你的电脑剪贴板。（剪贴板是电脑用来存储你最近复制的项目的特殊内存区域。）你如何操作取决于你使用哪种方法访问
    ChatGPT：
- en: '*OpenAI ChatGPT app*—Click the Copy Code button in the upper-right corner of
    the code window (as shown in figure A.2).'
  id: totrans-3195
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*OpenAI ChatGPT 应用*——点击代码窗口右上角的“复制代码”按钮（如图 A.2 所示）。'
- en: '![](../../OEBPS/Images/APPA_F02_McFedries3.png)'
  id: totrans-3196
  prefs: []
  type: TYPE_IMG
  zh: '![](../../OEBPS/Images/APPA_F02_McFedries3.png)'
- en: Figure A.2 In the OpenAI ChatGPT app, click the code window’s Copy Code button
    to copy the generated code.
  id: totrans-3197
  prefs: []
  type: TYPE_NORMAL
  zh: 图 A.2 在 OpenAI ChatGPT 应用中，点击代码窗口的“复制代码”按钮以复制生成的代码。
- en: '*Microsoft Copilot*—Click the Copy button that appears above and to the right
    of the code (as shown in figure A.3).'
  id: totrans-3198
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*Microsoft Copilot*——点击代码上方和右侧出现的“复制”按钮（如图 A.3 所示）。'
- en: '![](../../OEBPS/Images/APPA_F03_McFedries3.png)'
  id: totrans-3199
  prefs: []
  type: TYPE_IMG
  zh: '![](../../OEBPS/Images/APPA_F03_McFedries3.png)'
- en: Figure A.3 In Copilot, click the Copy button to copy the generated code.
  id: totrans-3200
  prefs: []
  type: TYPE_NORMAL
  zh: 图 A.3 在 Copilot 中，点击“复制”按钮以复制生成的代码。
- en: Warning Your computer’s Clipboard can store only one copied item at a time.
    If you copy something else before pasting your ChatGPT code (as I describe in
    the next section), that code will be wiped out of memory, and you’ll have to copy
    it all over again.
  id: totrans-3201
  prefs: []
  type: TYPE_NORMAL
  zh: 警告：你的电脑剪贴板一次只能存储一个复制的项目。如果你在粘贴你的 ChatGPT 代码之前复制了其他内容（如我在下一节中描述的），那么该代码将从内存中清除，你将不得不重新全部复制。
- en: A.3.2 Pasting data into an online coding playground
  id: totrans-3202
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: A.3.2 将数据粘贴到在线编码沙盒中
- en: With your ChatGPT-generated code copied to your computer’s Clipboard, the next
    (and final) step is to paste the code into an online web coding playground. A
    *playground* is a website that accepts HTML, CSS, and often JavaScript code and
    then displays how that code will render in the web browser. By using a playground
    to test your code, you avoid the hassle of saving your code to a file and then
    deploying the file to a web host, which is too much work when you just want to
    see whether a page section or component is working properly.
  id: totrans-3203
  prefs: []
  type: TYPE_NORMAL
  zh: 将你的 ChatGPT 生成的代码复制到你的电脑剪贴板后，下一步（也是最后一步）是将代码粘贴到在线网页编码沙盒中。*沙盒* 是一个接受 HTML、CSS
    以及通常 JavaScript 代码的网站，然后显示该代码在网页浏览器中的渲染效果。通过使用沙盒来测试你的代码，你可以避免将代码保存到文件中，然后将文件部署到网络主机上的麻烦，当你只是想查看页面部分或组件是否正常工作时，这会显得过于繁琐。
- en: 'Here are a few web coding playgrounds to check out:'
  id: totrans-3204
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一些可以查看的网页编码沙盒：
- en: '*Web Design Playground*—This is a companion website for my book *Web Design
    Playground*, which teaches HTML and CSS for beginners. As shown in figure A.4,
    the website offers a “sandbox” that includes HTML and CSS editors into which you
    can paste ChatGPT-generated HTML and CSS code. Click Run Code, and the bottom
    results area shows how the code looks in the browser. Navigate to [https://webdesignplayground.io/new](https://webdesignplayground.io/new)
    to try it out.'
  id: totrans-3205
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*网页设计沙盒*——这是我的书 *网页设计沙盒* 的配套网站，该书教授初学者 HTML 和 CSS。如图 A.4 所示，该网站提供了一个“沙盒”，其中包括
    HTML 和 CSS 编辑器，你可以将 ChatGPT 生成的 HTML 和 CSS 代码粘贴进去。点击“运行代码”，底部结果区域将显示代码在浏览器中的样子。导航到
    [https://webdesignplayground.io/new](https://webdesignplayground.io/new) 尝试使用它。'
- en: '![A screenshot of a chat Description automatically generated with medium confidence](../../OEBPS/Images/APPA_F04_McFedries3.png)'
  id: totrans-3206
  prefs: []
  type: TYPE_IMG
  zh: '![自动生成中等置信度的聊天截图](../../OEBPS/Images/APPA_F04_McFedries3.png)'
- en: Figure A.4 Web Design Playground offers HTML and CSS editors into which you
    can paste HTML and CSS code for testing.
  id: totrans-3207
  prefs: []
  type: TYPE_NORMAL
  zh: 图A.4 Web Design Playground提供HTML和CSS编辑器，你可以将HTML和CSS代码粘贴到这些编辑器中以进行测试。
- en: '*WebDev Workbench*—This is a playground I built to help web developers test
    HTML, CSS, and JavaScript code. As shown in figure A.5, the Workbench offers HTML,
    CSS, and JavaScript tabs into which you can paste ChatGPT-provided HTML, CSS,
    and JavaScript code. Click Run, and the bottom results area shows how the code
    looks in the browser. Navigate to [https://webdevworkshop.io/wb](https://webdevworkshop.io/wb)
    to check it out.'
  id: totrans-3208
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*WebDev Workbench*——这是一个我建立的游乐场，旨在帮助网页开发者测试HTML、CSS和JavaScript代码。如图A.5所示，Workbench提供了HTML、CSS和JavaScript标签，你可以将ChatGPT提供的HTML、CSS和JavaScript代码粘贴到这些标签中。点击运行，底部结果区域将显示代码在浏览器中的外观。导航到[https://webdevworkshop.io/wb](https://webdevworkshop.io/wb)查看。'
- en: '![](../../OEBPS/Images/APPA_F05_McFedries3.png)'
  id: totrans-3209
  prefs: []
  type: TYPE_IMG
  zh: '![图片A.5](../../OEBPS/Images/APPA_F05_McFedries3.png)'
- en: Figure A.5 WebDev Workbench offers tabs for HTML, CSS, and JavaScript into which
    you can paste ChatGPT code for testing.
  id: totrans-3210
  prefs: []
  type: TYPE_NORMAL
  zh: 图A.5 WebDev Workbench提供HTML、CSS和JavaScript标签，你可以将ChatGPT代码粘贴到这些标签中以进行测试。
- en: '*CodePen*—This is a popular site for testing web page code. You create a “pen”
    that includes editors for HTML, CSS, and JavaScript code, as shown in figure A.6\.
    A few seconds after pasting, the rendered result appears automatically in the
    lower frame. Navigate to [https://codepen.io](https://codepen.io) and then click
    Start Coding to give it a try.'
  id: totrans-3211
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*CodePen*——这是一个测试网页代码的流行网站。你创建一个包含HTML、CSS和JavaScript代码编辑器的“笔”，如图A.6所示。粘贴后几秒钟，渲染结果会自动出现在下方的框架中。导航到[https://codepen.io](https://codepen.io)并点击开始编码来尝试。'
- en: '![](../../OEBPS/Images/APPA_F06_McFedries3.png)'
  id: totrans-3212
  prefs: []
  type: TYPE_IMG
  zh: '![图片A.6](../../OEBPS/Images/APPA_F06_McFedries3.png)'
- en: Figure A.6 CodePen offers editors for HTML, CSS, and JavaScript. Paste your
    ChatGPT code into the appropriate editor to test the code.
  id: totrans-3213
  prefs: []
  type: TYPE_NORMAL
  zh: 图A.6 CodePen提供HTML、CSS和JavaScript的编辑器。将你的ChatGPT代码粘贴到相应的编辑器中以测试代码。
- en: 'All of these playgrounds work in more or less the same way:'
  id: totrans-3214
  prefs: []
  type: TYPE_NORMAL
  zh: 所有这些游乐场以更多或更少相同的方式工作：
- en: Copy your ChatGPT code.
  id: totrans-3215
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 复制你的ChatGPT代码。
- en: Navigate to the playground.
  id: totrans-3216
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 导航到游乐场。
- en: Click inside the editor that corresponds to the type of code you’re testing
    (for example, use the HTML editor for HTML code).
  id: totrans-3217
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 点击对应于你要测试的代码类型的编辑器内部（例如，使用HTML编辑器来编辑HTML代码）。
- en: Click the button that runs the code (or, in the case of CodePen, just wait a
    few seconds).
  id: totrans-3218
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 点击运行代码的按钮（或者，在CodePen的情况下，只需等待几秒钟）。
- en: Note If ChatGPT generates HTML code that also includes CSS code (between `<style>`
    and `</style>` tags), it’s best to copy the CSS separately (ignoring the `<style>`
    and `</style>` tags) and paste it into the playground’s CSS editor. Similarly,
    if ChatGPT generates HTML code that also includes JavaScript code (between `<script>`
    and `</script>` tags), copy the JavaScript code separately (leave out the `<script>`
    and `</script>` tags) and paste it into the JavaScript editor. To avoid the extra
    work of extracting CSS and JavaScript from generated HTML code, include in your
    prompt that you want ChatGPT to output the HTML, CSS, and JavaScript separately.
    ChatGPT should put the HTML code in an HTML window, the CSS code in a separate
    CSS window, and the JavaScript code in a separate JavaScript window.
  id: totrans-3219
  prefs: []
  type: TYPE_NORMAL
  zh: 注意：如果ChatGPT生成的HTML代码还包含CSS代码（位于`<style>`和`</style>`标签之间），最好单独复制CSS代码（忽略`<style>`和`</style>`标签）并将其粘贴到游乐场的CSS编辑器中。同样，如果ChatGPT生成的HTML代码还包含JavaScript代码（位于`<script>`和`</script>`标签之间），则单独复制JavaScript代码（省略`<script>`和`</script>`标签）并将其粘贴到JavaScript编辑器中。为了避免从生成的HTML代码中提取CSS和JavaScript的额外工作，请在你的提示中包含你想要ChatGPT分别输出HTML、CSS和JavaScript的要求。ChatGPT应该将HTML代码放在HTML窗口中，CSS代码放在单独的CSS窗口中，JavaScript代码放在单独的JavaScript窗口中。
- en: As you work with ChatGPT, it’s a good idea to keep your favorite playground
    open in its own browser tab. That way, as soon as ChatGPT generates new code for
    you, you can immediately copy-and-paste the code into the playground to check
    that it works.
  id: totrans-3220
  prefs: []
  type: TYPE_NORMAL
  zh: 当你与ChatGPT一起工作时，保持你最喜欢的游乐场在其自己的浏览器标签中打开是个好主意。这样，一旦ChatGPT为你生成新的代码，你就可以立即复制并粘贴代码到游乐场以检查它是否工作。
- en: A.4 Working with web page files
  id: totrans-3221
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: A.4 与网页文件一起工作
- en: Although you’ll spend the bulk of your time prompting ChatGPT to produce the
    web page code and text you want to put online, at some point you need to get that
    code into one or more files that you can deploy. To help with this “save” portion
    of the prompt-copy-save-deploy cycle, the rest of this appendix tells you what
    you need to know.
  id: totrans-3222
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然您的大部分时间将用于提示ChatGPT生成您想要放在线上的网页代码和文本，但您需要在某个时候将此代码放入一个或多个可以部署的文件中。为了帮助完成提示-复制-保存-部署循环中的“保存”部分，本附录的其余部分将告诉您需要了解的内容。
- en: A.4.1 Understanding the different types of web page files
  id: totrans-3223
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: A.4.1 理解不同类型的网页文件
- en: 'One of the amazing and surprising things about the web is that everything you
    see, from the humblest home page to the mightiest megacorp website, has nothing
    but simple text underlying it. How do I know? Because every web page consists
    of one or more files, and all the file types supported by the web are variations
    on the text file theme. (Here I’m ignoring image, video, and audio files, which
    are delivered separately.) In fact, most web pages consist of some combination
    of the following three file types:'
  id: totrans-3224
  prefs: []
  type: TYPE_NORMAL
  zh: 网页的一个令人惊讶和令人惊奇的事情是，从最简陋的首页到最强大的超大型企业网站，您所看到的一切，其底层都是简单的文本。我怎么会知道？因为每个网页都由一个或多个文件组成，而所有受网页支持的文件类型都是基于文本文件主题的变体。（在这里，我忽略了图像、视频和音频文件，它们是单独交付的。）事实上，大多数网页都是由以下三种文件类型的一些组合组成的：
- en: '*HTML*—These files use the .xhtml (or sometimes .htm) extension and provide
    the basic structure of a web page. All websites include at least one HTML file
    (usually named index.xhtml).'
  id: totrans-3225
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*HTML*—这些文件使用.xhtml（有时是.htm）扩展名，并提供网页的基本结构。所有网站至少包含一个HTML文件（通常命名为index.xhtml）。'
- en: '*CSS*—These files use the .css extension and provide the overall look of a
    web page by defining style rules for things like fonts, colors, borders, and layout.'
  id: totrans-3226
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*CSS*—这些文件使用.css扩展名，通过定义字体、颜色、边框和布局等样式规则来提供网页的整体外观。'
- en: '*JavaScript*—These files use the .js extension and add interactivity to a web
    page.'
  id: totrans-3227
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*JavaScript*—这些文件使用.js扩展名，并为网页添加交互性。'
- en: When you use separate files this way, you need to reference them from your HTML
    file, which you learn how to do shortly. For now, though, you need to learn how
    to paste ChatGPT-generated code into a web page file.
  id: totrans-3228
  prefs: []
  type: TYPE_NORMAL
  zh: 当您以这种方式使用单独的文件时，您需要从HTML文件中引用它们，您将在不久后学习如何做到这一点。不过，现在您需要学习如何将ChatGPT生成的代码粘贴到网页文件中。
- en: A.4.2 Pasting ChatGPT data into an HTML file
  id: totrans-3229
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: A.4.2 将ChatGPT数据粘贴到HTML文件中
- en: 'A simple web page may use a single HTML file that includes CSS and JavaScript
    code. The CSS code goes between `<style>` and `</style>` tags in a special header
    section of the page, and the JavaScript code goes between `<script>` and `</script>`
    tags, usually near the bottom of the HTML file. Here’s the general layout of such
    an HTML file:'
  id: totrans-3230
  prefs: []
  type: TYPE_NORMAL
  zh: 一个简单的网页可能只使用一个包含CSS和JavaScript代码的HTML文件。CSS代码位于页面的特殊标题部分中的`<style>`和`</style>`标签之间，JavaScript代码位于`<script>`和`</script>`标签之间，通常在HTML文件的底部附近。以下是这样一种HTML文件的一般布局：
- en: '[PRE292]'
  id: totrans-3231
  prefs: []
  type: TYPE_PRE
  zh: '[PRE292]'
- en: ① CSS code goes here.
  id: totrans-3232
  prefs: []
  type: TYPE_NORMAL
  zh: ① 将CSS代码放在这里。
- en: ② HTML tags and text go here.
  id: totrans-3233
  prefs: []
  type: TYPE_NORMAL
  zh: ② 将HTML标签和文本放在这里。
- en: ③ JavaScript code goes here.
  id: totrans-3234
  prefs: []
  type: TYPE_NORMAL
  zh: ③ 将JavaScript代码放在这里。
- en: 'You use this code as a starting point for all your simple web page projects.
    (You learn how to get ChatGPT to generate a similar template in chapter 6.) With
    this template in place, here’s where you paste code generated by ChatGPT:'
  id: totrans-3235
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以将此代码作为所有简单网页项目的起点。（您将在第6章学习如何让ChatGPT生成类似的模板。）有了这个模板，接下来您就可以粘贴ChatGPT生成的代码了：
- en: '*CSS*—Paste the code below the `<style>` tag but above the `</style>` tag.'
  id: totrans-3236
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*CSS*—将以下代码粘贴到`<style>`标签下方但`</style>`标签上方。'
- en: '*HTML*—Paste the code below the `<body>` tag but above the `<script>` tag.
    The various page components need to appear in the file in the same order that
    you want them to appear on the page. I give you more specific placement instructions
    in the chapters where you generate page components.'
  id: totrans-3237
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*HTML*—将代码粘贴到`<body>`标签下方但`</script>`标签上方。页面上的各种组件需要按照您希望在页面上显示的顺序出现在文件中。我在生成页面组件的章节中提供了更具体的放置说明。'
- en: '*JavaScript*—Paste the code below the `<script>` tag but above the `</script>`
    tag.'
  id: totrans-3238
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*JavaScript*—将代码粘贴到`<script>`标签下方但`</script>`标签上方。'
- en: Remember, however, that this all-code-in-one-file approach is really only suitable
    for the simplest web pages. When your pages get a little more complex, you’ll
    want to create separate files for the CSS and JavaScript, as I describe next.
  id: totrans-3239
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，请记住，这种所有代码都在一个文件中的方法实际上仅适用于最简单的网页。当您的页面稍微复杂一些时，您将想要创建单独的CSS和JavaScript文件，正如我接下来要描述的那样。
- en: A.4.3 Referencing CSS and JavaScript files in an HTML file
  id: totrans-3240
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: A.4.3 在HTML文件中引用CSS和JavaScript文件
- en: 'Putting your CSS and JavaScript code in separate files makes your HTML file
    simpler and cleaner and also enables you to apply the same CSS and JavaScript
    code to multiple web pages, which can be a real timesaver. Assuming you’ve already
    saved your CSS and JavaScript code in separate .css and .js files, respectively,
    add references to the files in any HTML file where you want to use the CSS and/or
    JavaScript code:'
  id: totrans-3241
  prefs: []
  type: TYPE_NORMAL
  zh: 将CSS和JavaScript代码放入单独的文件会使HTML文件更加简单和整洁，并且还允许你将相同的CSS和JavaScript代码应用于多个网页，这可以节省大量时间。假设你已经将CSS和JavaScript代码分别保存在单独的.css和.js文件中，那么在你想使用CSS和/或JavaScript代码的任何HTML文件中添加对文件的引用：
- en: '[PRE293]'
  id: totrans-3242
  prefs: []
  type: TYPE_PRE
  zh: '[PRE293]'
- en: ① Use the <link> tag to reference a CSS file.
  id: totrans-3243
  prefs: []
  type: TYPE_NORMAL
  zh: ① 使用`<link>`标签来引用CSS文件。
- en: ② Use the <script> tag to reference a JavaScript file.
  id: totrans-3244
  prefs: []
  type: TYPE_NORMAL
  zh: ② 使用`<script>`标签来引用JavaScript文件。
- en: 'Here are the specifics:'
  id: totrans-3245
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是具体细节：
- en: '*CSS*—Between the `<head>` tag and the `</head>` tag, add a `<link>` tag, and
    set the `href` attribute equal to the name of the CSS file surrounded by quotation
    marks.'
  id: totrans-3246
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*CSS*——在`<head>`标签和`</head>`标签之间添加一个`<link>`标签，并将`href`属性设置为包围在引号中的CSS文件名。'
- en: '*JavaScript*—Just above the `</body>` tag, add a `<script>` tag with its `src`
    attribute set to the name of the JavaScript file surrounded by quotation marks,
    and then add a `</script>` tag.'
  id: totrans-3247
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*JavaScript*——在`</body>`标签上方，添加一个`<script>`标签，并将其`src`属性设置为包围在引号中的JavaScript文件名，然后添加一个`</script>`标签。'
- en: To reuse a CSS or JavaScript file in multiple HTML files, include the same `<link>`
    tag or `<script>` tag in those files.
  id: totrans-3248
  prefs: []
  type: TYPE_NORMAL
  zh: 要在多个HTML文件中重用CSS或JavaScript文件，将这些文件中的相同`<link>`标签或`<script>`标签包含在内。
- en: A.4.4 Saving your work
  id: totrans-3249
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: A.4.4 保存你的工作
- en: 'Once you’ve made any changes to an HTML, CSS, or JavaScript file, you should
    save your changes right away to avoid losing your work. Here are a few notes to
    bear in mind when saving new files for the first time:'
  id: totrans-3250
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦你对HTML、CSS或JavaScript文件进行了任何更改，你应该立即保存你的更改以避免丢失工作。在第一次保存新文件时，请注意以下几点：
- en: 'Be sure to use the correct file extension: .xhtml for HTML files, .css for
    CSS files, and .js for JavaScript files.'
  id: totrans-3251
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一定要使用正确的文件扩展名：HTML文件使用.xhtml扩展名，CSS文件使用.css扩展名，JavaScript文件使用.js扩展名。
- en: If your site consists of a single HTML page, name that page index.xhtml. If
    your site consists of multiple pages, name the home or main page index.xhtml.
  id: totrans-3252
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果你的网站由单个HTML页面组成，那么将该页面命名为index.xhtml。如果你的网站由多个页面组成，那么将主页或主页面命名为index.xhtml。
- en: Don’t use spaces or unusual symbols in your filenames. Use only alphanumeric
    characters, dashes (-), or underscores (_).
  id: totrans-3253
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 不要在文件名中使用空格或特殊符号。仅使用字母数字字符、破折号(-)或下划线(_)。
- en: For most web hosts, filenames are case sensitive, meaning that, say, index.xhtml,
    Index.xhtml, and INDEX.xhtml would all be treated as separate files. It’s best
    to stick with all-lowercase letters in your filenames.
  id: totrans-3254
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于大多数网站托管服务，文件名是区分大小写的，这意味着例如index.xhtml、Index.xhtml和INDEX.xhtml都会被视为不同的文件。在文件名中坚持使用全部小写字母是最好的做法。
- en: Keep the filenames as short as possible without becoming obscure. The name about.xhtml
    is better than a-few-words-about-this-project.xhtml, but nlsup.xhtml is worse
    than newsletter-signup.xhtml.
  id: totrans-3255
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 尽可能保持文件名尽可能短，同时不要使其变得晦涩。about.xhtml的名称比a-few-words-about-this-project.xhtml更好，但nlsup.xhtml比newsletter-signup.xhtml更差。
- en: Be sure to save all the files associated with a single website—meaning not only
    all your HTML, CSS, and JavaScript files but also all your image, video, and audio
    files—in a single folder. This makes your life much easier when it comes to deploying
    your site, as I describe in appendix B.
  id: totrans-3256
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 确保保存与单个网站相关的所有文件——这意味着不仅包括所有的HTML、CSS和JavaScript文件，还包括所有的图片、视频和音频文件——在一个单独的文件夹中。当部署你的网站时，这会使你的生活变得更加容易，正如我在附录B中描述的那样。
- en: Appendix B. Deploying your site
  id: totrans-3257
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 附录B. 部署你的网站
- en: I’m not spilling any great secret or espousing any esoteric knowledge when I
    say that the key feature of a website is the “web” part of the word. That is,
    although you’re free to create and preview as many HTML files as you want on your
    computer, those files don’t add up to an honest-to-goodness website until they’re
    deployed to the web for your friends, family, and even total strangers to see.
    Getting HTML, CSS, JavaScript, images, and other files from your computer to a
    web host is known as *deploying* your site.
  id: totrans-3258
  prefs: []
  type: TYPE_NORMAL
  zh: 当我说一个网站的关键特征是“web”这个词的部分时，我并没有泄露任何重大秘密或宣扬任何深奥的知识。也就是说，尽管你可以在电脑上创建和预览尽可能多的HTML文件，但这些文件只有在部署到网络上供你的朋友、家人甚至陌生人查看时，才真正构成一个网站。将HTML、CSS、JavaScript和其他文件从你的电脑传输到网站托管服务被称为*部署*你的网站。
- en: 'The great news about the types of websites you learn to build in this book—that
    is, websites that use only static HTML files that don’t require access to a full-blown
    web server—is that the simplicity of these files means there are web hosts out
    there that will deploy your site free of charge. These sites make their money
    from big-time corporations and professional web developers, so it’s nothing to
    them to host a basic personal website. In this appendix, you learn how to deploy
    your website to two such web hosts: Netlify and Cloudflare. For good measure,
    I also give you general instructions for deploying your files to other web hosting
    providers.'
  id: totrans-3259
  prefs: []
  type: TYPE_NORMAL
  zh: 关于你在本书中学到的网站类型的好消息——即，仅使用静态 HTML 文件且不需要访问完整网络服务器的网站——是这些文件的简单性意味着有一些网络托管商会免费部署你的网站。这些网站从大型企业和专业网络开发者那里赚钱，因此托管一个基本的个人网站对他们来说无关紧要。在本附录中，你将学习如何将你的网站部署到两个这样的网络托管商：Netlify
    和 Cloudflare。为了保险起见，我还为你提供了将文件部署到其他网络托管提供商的通用说明。
- en: B.1 Deploying to Netlify
  id: totrans-3260
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: B.1 部署到 Netlify
- en: Netlify is a company that offers big businesses and professional developers
    a cloud-based development platform for building and deploying web apps. Happily,
    Netlify also supports individuals and hobbyists by offering a free tier that enables
    anyone to put up a page or three with no hassle. The only restrictions are that
    you’re limited to a maximum of 500 websites and 100 GB of bandwidth. (*Bandwidth*
    is the amount of data per month that your sites transfer to web browsers. And
    100 GB is a *lot* of bandwidth.)
  id: totrans-3261
  prefs: []
  type: TYPE_NORMAL
  zh: Netlify 是一家为大型企业和专业开发者提供基于云的开发平台的公司，用于构建和部署网络应用程序。令人高兴的是，Netlify 还通过提供免费层支持个人和爱好者，使任何人都能轻松地搭建一个或几个页面。唯一的限制是，你最多只能拥有
    500 个网站和 100 GB 的带宽。（*带宽* 是每月你的网站传输到网络浏览器中的数据量。100 GB 是 *很多* 带宽。）
- en: B.1.1 Setting up a Netlify account
  id: totrans-3262
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: B.1.1 设置 Netlify 账户
- en: 'To get up and running with Netlify, you need an account. Here are the steps
    to follow:'
  id: totrans-3263
  prefs: []
  type: TYPE_NORMAL
  zh: 要开始使用 Netlify，你需要一个账户。以下是需要遵循的步骤：
- en: Send your favorite web browser to [https://netlify.com](https://netlify.com).
  id: totrans-3264
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将你喜欢的网络浏览器发送到 [https://netlify.com](https://netlify.com)。
- en: Click Sign Up.
  id: totrans-3265
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 点击“注册”。
- en: Click Sign Up with Email.
  id: totrans-3266
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 点击“使用电子邮件注册”。
- en: Type your email address, type the password you want to use, and then click Sign
    Up. Netlify sends a verification message to your email address.
  id: totrans-3267
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 输入你的电子邮件地址，输入你想要使用的密码，然后点击“注册”。Netlify 会向你的电子邮件地址发送验证消息。
- en: Open your email app, click the Netlify verification message, and click the verification
    link. Netlify verifies your account and then displays a series of questions.
  id: totrans-3268
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 打开你的电子邮件应用程序，点击 Netlify 验证消息，然后点击验证链接。Netlify 验证你的账户，然后显示一系列问题。
- en: Run through the questions, click Continue to Deploy, and then click Skip This
    Step for Now.
  id: totrans-3269
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 答完问题后，点击“继续部署”，然后点击“现在跳过此步骤”。
- en: 'Netlify drops you off at the Team Overview page. From here, you can upload
    your files using one of two methods: drag-and-drop or a dialog. The next two sections
    take you through both methods.'
  id: totrans-3270
  prefs: []
  type: TYPE_NORMAL
  zh: Netlify 会将你带到团队概览页面。从这里，你可以使用两种方法之一上传你的文件：拖放或对话框。接下来的两个部分将带你了解这两种方法。
- en: B.1.2 Uploading your files via drag-and-drop
  id: totrans-3271
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: B.1.2 通过拖放上传你的文件
- en: 'Usually, the quickest way to get your website files to Netlify is to use your
    mouse to drag the website folder to the upload area. Here are the steps to follow:'
  id: totrans-3272
  prefs: []
  type: TYPE_NORMAL
  zh: 通常，将你的网站文件快速发送到 Netlify 的最快方法是使用鼠标将网站文件夹拖放到上传区域。以下是需要遵循的步骤：
- en: 1.  On your computer, open File Explorer (Windows) or Finder (macOS).
  id: totrans-3273
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 在你的电脑上，打开文件资源管理器（Windows）或 Finder（macOS）。
- en: 2.  Navigate to the folder that contains the subfolder you want to upload.
  id: totrans-3274
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 导航到包含你想要上传的子文件夹的文件夹。
- en: 3.  Sign in to Netlify (if you haven’t done so already), and click Sites in
    the left sidebar.
  id: totrans-3275
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 登录 Netlify（如果你还没有这样做），然后在左侧侧边栏中点击“网站”。
- en: 4.  Arrange the browser window and the File Explorer (or Finder) window so they’re
    side by side (or at least so you can see the upload area in the browser and the
    subfolder you want to upload in File Explorer or Finder).
  id: totrans-3276
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 调整浏览器窗口和文件资源管理器（或 Finder）窗口，使它们并排显示（或者至少你可以看到浏览器中的上传区域和文件资源管理器或 Finder 中的你想要上传的子文件夹）。
- en: 5.  Drag the subfolder from File Explorer (or Finder), move your mouse pointer
    into the browser window and over the upload area (as shown in figure B.1), and
    drop the subfolder. Netlify uploads the subfolder and its contents and then deploys
    the site.
  id: totrans-3277
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 从文件资源管理器（或 Finder）拖动子文件夹，将鼠标指针移到浏览器窗口中的上传区域（如图 B.1 所示），然后放下子文件夹。Netlify 上传子文件夹及其内容，然后部署网站。
- en: '![](../../OEBPS/Images/APPB_F01_McFedries3.png)'
  id: totrans-3278
  prefs: []
  type: TYPE_IMG
  zh: '![](../../OEBPS/Images/APPB_F01_McFedries3.png)'
- en: Figure B.1 Drag the website folder to the Netlify upload area.
  id: totrans-3279
  prefs: []
  type: TYPE_NORMAL
  zh: 图B.1 将网站文件夹拖动到Netlify上传区域。
- en: 6.  In the Deploy Success! dialog (shown in figure B.2), click Get Started.
    Netlify displays your account overview page.
  id: totrans-3280
  prefs: []
  type: TYPE_NORMAL
  zh: 6. 在“部署成功！”对话框（如图B.2所示）中，点击“开始”。Netlify显示您的账户概览页面。
- en: '![](../../OEBPS/Images/APPB_F02_McFedries3.png)'
  id: totrans-3281
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../../OEBPS/Images/APPB_F02_McFedries3.png)'
- en: Figure B.2 Netlify displays the Deploy Success! dialog once your website is
    deployed.
  id: totrans-3282
  prefs: []
  type: TYPE_NORMAL
  zh: 图B.2 Netlify在您的网站部署后显示“部署成功！”对话框。
- en: 7.  In the Sites section of the page, click your new site. Netlify displays
    the Site Overview page.
  id: totrans-3283
  prefs: []
  type: TYPE_NORMAL
  zh: 7. 在页面上的“站点”部分，点击您的新站点。Netlify显示网站概览页面。
- en: 8.  Click the link to view the deployed site in the web browser.
  id: totrans-3284
  prefs: []
  type: TYPE_NORMAL
  zh: 8. 点击链接在网页浏览器中查看已部署的站点。
- en: B.1.3 Uploading your files using a dialog box
  id: totrans-3285
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: B.1.3 使用对话框上传您的文件
- en: 'The drag-and-drop method isn’t ideal if you have a relatively small screen
    or if your mouse skills aren’t up to the task. That’s fine because Netlify also
    enables you to upload your website folder using a dialog. Here are the steps to
    follow:'
  id: totrans-3286
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您的屏幕相对较小或您的鼠标技能不够，拖放方法可能不是最佳选择。没关系，因为Netlify还允许您使用对话框上传您的网站文件夹。以下是操作步骤：
- en: Sign in to Netlify (if you haven’t done so already), and click Sites in the
    left sidebar.
  id: totrans-3287
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 登录Netlify（如果您尚未这样做），然后点击左侧边栏中的“站点”。
- en: Click Browse to Upload.
  id: totrans-3288
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 点击浏览以上传。
- en: In the dialog that appears, select the project folder, and then click Upload.
  id: totrans-3289
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在出现的对话框中，选择项目文件夹，然后点击上传。
- en: If your web browser asks you to confirm the operation, click Upload. Netlify
    uploads the subfolder and its contents.
  id: totrans-3290
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 如果您的网络浏览器要求您确认操作，请点击上传。Netlify上传子文件夹及其内容。
- en: In the Deploy Success! dialog, click Get Started. Netlify displays your account
    overview page.
  id: totrans-3291
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在“部署成功！”对话框中，点击“开始”。Netlify显示您的账户概览页面。
- en: In the Sites section of the page, click your new site. Netlify displays the
    Site Overview page.
  id: totrans-3292
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在页面上的“站点”部分，点击您的新站点。Netlify显示网站概览页面。
- en: Click the link to view the deployed site in the web browser.
  id: totrans-3293
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 点击链接在网页浏览器中查看已部署的站点。
- en: B.1.4 Changing your site’s subdomain or domain name
  id: totrans-3294
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: B.1.4 更改您的站点子域名或域名
- en: By default, Netlify gives your deployed website a custom domain name of the
    form *wacky-name-a1b2c3*.netlify.app (figure B.3 shows an example). You see your
    site name on the Site Overview page. To get there from any Netlify page, click
    Sites in the left sidebar and then click the site.
  id: totrans-3295
  prefs: []
  type: TYPE_NORMAL
  zh: 默认情况下，Netlify为您的部署网站提供了一个自定义域名，格式为*wacky-name-a1b2c3*.netlify.app（图B.3展示了示例）。您可以在网站概览页面上看到您的站点名称。要从任何Netlify页面访问该页面，请点击左侧边栏中的“站点”，然后点击该站点。
- en: '![](../../OEBPS/Images/APPB_F03_McFedries3.png)'
  id: totrans-3296
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../../OEBPS/Images/APPB_F03_McFedries3.png)'
- en: Figure B.3 The Site Overview page shows the name Netlify assigned to your site.
  id: totrans-3297
  prefs: []
  type: TYPE_NORMAL
  zh: 图B.3 网站概览页面显示了Netlify分配给您的站点名称。
- en: 'You might like the oddball name supplied randomly by Netlify, but if you’d
    prefer a domain name that reflects the content of your site, you need to use one
    of the following methods to change the domain name:'
  id: totrans-3298
  prefs: []
  type: TYPE_NORMAL
  zh: 您可能喜欢Netlify随机提供的古怪名称，但如果您希望域名反映您网站的内容，您需要使用以下方法之一来更改域名：
- en: '*Changing the subdomain name*—If you want to keep the netlify.app domain name
    and just change the subdomain (the wacky-name-a1b2c3 part), open the Site Overview
    page, click Domain Settings, click Options in the Production Domains section,
    and then click Edit Site Name. Type the subdomain you prefer, and then click Save.
    If Netlify tells you the site name has already been taken, try again using a different
    name.'
  id: totrans-3299
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*更改子域名*——如果您想保留netlify.app域名，只需更改子域名（即wacky-name-a1b2c3部分），请打开网站概览页面，点击“域名设置”，在“生产域名”部分点击“选项”，然后点击“编辑站点名称”。输入您首选的子域名，然后点击“保存”。如果Netlify告诉您该站点名称已被占用，请尝试使用不同的名称。'
- en: '*Changing the domain name*—If you already have a domain name or want to purchase
    a new one with Netlify, open the Site Overview page, click Domain Settings, and
    then click Add a Domain in the Production Domains section. Type your existing
    or new domain, click Verify, and then follow the instructions that appear.'
  id: totrans-3300
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*更改域名*——如果您已经有一个域名或想通过Netlify购买一个新的域名，请打开网站概览页面，点击“域名设置”，然后在“生产域名”部分点击“添加域名”。输入您现有的或新的域名，点击“验证”，然后按照出现的说明操作。'
- en: B.2 Deploying to Cloudflare
  id: totrans-3301
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: B.2 部署到Cloudflare
- en: Cloudflare is best known as a networking company that specializes in helping
    large websites avoid or get out of cyberattacks, such as *distributed denial of
    service* (DDOS) attacks that barrage a website with massive amounts of junk data.
    But Cloudflare also offers web hosting via a service called Pages. This service
    is ostensibly targeted at web developers, but it’s also available for the likes
    of you and me. Best of all, a Pages account is free and offers no restrictions
    on the number of sites and the amount of bandwidth they use.
  id: totrans-3302
  prefs: []
  type: TYPE_NORMAL
  zh: Cloudflare最出名的是一家专注于帮助大型网站避免或摆脱网络攻击的网络公司，例如向网站发送大量垃圾数据的*分布式拒绝服务*（DDOS）攻击。但Cloudflare还通过名为Pages的服务提供网站托管。这项服务表面上针对的是网站开发者，但对我们这样的人也开放。最好的是，Pages账户是免费的，并且对网站数量和带宽使用量没有限制。
- en: B.2.1 Setting up a Cloudflare Pages account
  id: totrans-3303
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: B.2.1 设置Cloudflare Pages账户
- en: 'To get started with Cloudflare Pages, you first need to follow these steps
    to set up an account:'
  id: totrans-3304
  prefs: []
  type: TYPE_NORMAL
  zh: 要开始使用Cloudflare Pages，你首先需要按照以下步骤设置账户：
- en: Navigate to [https://pages.cloudflare.com](https://pages.cloudflare.com).
  id: totrans-3305
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 导航到[https://pages.cloudflare.com](https://pages.cloudflare.com)。
- en: Click Sign Up.
  id: totrans-3306
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 点击“注册”。
- en: Type your email address, type the password you want to use, and then click Sign
    Up. Cloudflare sends a verification email to your email address.
  id: totrans-3307
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 输入你的电子邮件地址，输入你想要使用的密码，然后点击“注册”。Cloudflare会向你的电子邮件地址发送验证邮件。
- en: Open your email app, click the Cloudflare verification message, and click the
    verification link.
  id: totrans-3308
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 打开你的电子邮件应用程序，点击Cloudflare验证消息，然后点击验证链接。
- en: Cloudflare verifies your account and then displays your Cloudflare dashboard.
    You’re ready to create a new Cloudflare application for your website, as described
    in the next section.
  id: totrans-3309
  prefs: []
  type: TYPE_NORMAL
  zh: Cloudflare验证你的账户，然后显示你的Cloudflare仪表板。你已准备好创建一个新的Cloudflare应用程序，如下一节所述。
- en: B.2.2 Creating a new Cloudflare application
  id: totrans-3310
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: B.2.2 创建新的Cloudflare应用程序
- en: 'In Cloudflare, a Pages website is called an *application*, and you deploy it
    as part of Cloudflare’s Pages feature. You begin the deployment by creating a
    new Pages application, as outlined in the following steps:'
  id: totrans-3311
  prefs: []
  type: TYPE_NORMAL
  zh: 在Cloudflare中，一个Pages网站被称为*应用程序*，你将其作为Cloudflare Pages功能的一部分进行部署。你通过创建一个新的Pages应用程序开始部署，以下步骤将概述：
- en: 1.  Sign in to Cloudflare if you haven’t done so already.
  id: totrans-3312
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 如果你还没有这样做，请登录Cloudflare。
- en: 2.  In the navigation menu on the left, under Workers & Pages, click Overview.
    The Overview page appears. If you haven’t yet deployed a Pages project, skip to
    step 4; otherwise, continue with step 3.
  id: totrans-3313
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 在左侧的导航菜单中，在“Workers & Pages”下点击“概览”。出现概览页面。如果你还没有部署Pages项目，请跳到步骤4；否则，继续步骤3。
- en: 3.  Click the Create Application button, shown in figure B.4\. The Create an
    Application page appears.
  id: totrans-3314
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 点击图B.4所示的“创建应用程序”按钮。出现“创建应用程序”页面。
- en: '![](../../OEBPS/Images/APPB_F04_McFedries3.png)'
  id: totrans-3315
  prefs: []
  type: TYPE_IMG
  zh: '![](../../OEBPS/Images/APPB_F04_McFedries3.png)'
- en: Figure B.4 In the Workers & Pages Overview page of Cloudflare, click Create
    Application.
  id: totrans-3316
  prefs: []
  type: TYPE_NORMAL
  zh: 图B.4 在Cloudflare的“Workers & Pages概览”页面，点击“创建应用程序”。
- en: 4.  Click the Pages tab, as shown in figure B.5.
  id: totrans-3317
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 如图B.5所示，点击“Pages”标签页。
- en: '![A picture containing text, font, screenshot Description automatically generated](../../OEBPS/Images/APPB_F05_McFedries3.png)'
  id: totrans-3318
  prefs: []
  type: TYPE_IMG
  zh: '![包含文本、字体、屏幕截图的图片，描述自动生成](../../OEBPS/Images/APPB_F05_McFedries3.png)'
- en: Figure B.5 In the Create an Application page, click the Pages tab.
  id: totrans-3319
  prefs: []
  type: TYPE_NORMAL
  zh: 图B.5 在“创建应用程序”页面，点击“Pages”标签页。
- en: 5.  Scroll down to the Create Using Direct Upload section, and then click Upload
    Assets (refer to figure B.6). The Deploy a Site by Uploading Your Project page
    appears.
  id: totrans-3320
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 滚动到“使用直接上传创建”部分，然后点击“上传资产”（参见图B.6）。出现“通过上传项目部署网站”页面。
- en: '![A screen shot of a cloud Description automatically generated with low confidence](../../OEBPS/Images/APPB_F06_McFedries3.png)'
  id: totrans-3321
  prefs: []
  type: TYPE_IMG
  zh: '![云的屏幕截图，描述自动生成，置信度低](../../OEBPS/Images/APPB_F06_McFedries3.png)'
- en: Figure B.6 Click Upload Assets.
  id: totrans-3322
  prefs: []
  type: TYPE_NORMAL
  zh: 图B.6 点击“上传资产”。
- en: 6.  Type a name for your project, and then click Create Project (refer to figure
    B.7). When your project is ready (it takes a few moments), Cloudflare displays
    an upload area.
  id: totrans-3323
  prefs: []
  type: TYPE_NORMAL
  zh: 6. 为你的项目输入一个名称，然后点击“创建项目”（参见图B.7）。当你的项目准备就绪（需要几分钟）时，Cloudflare会显示上传区域。
- en: '![A blue line on a white background Description automatically generated with
    low confidence](../../OEBPS/Images/APPB_F07_McFedries3.png)'
  id: totrans-3324
  prefs: []
  type: TYPE_IMG
  zh: '![白色背景上的蓝色线条，描述自动生成，置信度低](../../OEBPS/Images/APPB_F07_McFedries3.png)'
- en: Figure B.7 Name your project and then click Create Project.
  id: totrans-3325
  prefs: []
  type: TYPE_NORMAL
  zh: 图B.7 为你的项目命名，然后点击“创建项目”。
- en: 'From here, you can upload your files by using one of two methods: drag-and-drop
    or a dialog box. The next two sections take you through both methods.'
  id: totrans-3326
  prefs: []
  type: TYPE_NORMAL
  zh: 从这里，您可以通过两种方法之一上传文件：拖放或对话框。接下来的两个部分将向您介绍这两种方法。
- en: B.2.3 Uploading your files via drag-and-drop
  id: totrans-3327
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: B.2.3 通过拖放上传您的文件
- en: 'Often, the easiest way to get your files from your computer to Cloudflare is
    to use your mouse to drag the website folder to the upload area. Here are the
    steps to follow:'
  id: totrans-3328
  prefs: []
  type: TYPE_NORMAL
  zh: 通常，将您的文件从计算机传输到 Cloudflare 最简单的方法是使用鼠标将网站文件夹拖放到上传区域。以下是操作步骤：
- en: 1.  On your computer, open File Explorer (Windows) or Finder (macOS).
  id: totrans-3329
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 在您的计算机上，打开文件资源管理器（Windows）或Finder（macOS）。
- en: 2.  Navigate to the folder that contains the subfolder you want to upload.
  id: totrans-3330
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 导航到包含您想要上传的子文件夹的文件夹。
- en: 3.  Arrange the browser window and the File Explorer (or Finder) window so they’re
    side by side (or at least so you can see the upload area in the browser and the
    subfolder you want to upload in File Explorer or Finder).
  id: totrans-3331
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 调整浏览器窗口和文件资源管理器（或Finder）窗口，使它们并排显示（或者至少您可以在浏览器中看到上传区域，在文件资源管理器或Finder中看到您想要上传的子文件夹）。
- en: 4.  Drag the subfolder from File Explorer (or Finder), move your mouse pointer
    into the browser window and over the upload area, and then drop the subfolder.
    Cloudflare uploads the subfolder and its contents.
  id: totrans-3332
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 将子文件夹从文件资源管理器（或Finder）拖动，将鼠标指针移入浏览器窗口并覆盖上传区域，然后放下子文件夹。Cloudflare 会上传子文件夹及其内容。
- en: The final step is to deploy the site, as described in section B.2.5.
  id: totrans-3333
  prefs: []
  type: TYPE_NORMAL
  zh: 最后一步是将网站部署，如 B.2.5 节所述。
- en: B.2.4 Uploading your files using a dialog box
  id: totrans-3334
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: B.2.4 使用对话框上传您的文件
- en: 'If you’re working with a small screen or your mouse skills aren’t that sharp,
    you may prefer to upload your files to Cloudflare using a dialog box. Here’s how
    it’s done:'
  id: totrans-3335
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您正在使用小屏幕或鼠标技能不是那么熟练，您可能更喜欢使用对话框将文件上传到 Cloudflare。以下是操作方法：
- en: 1.  In Cloudflare’s upload area, click Select from Computer.
  id: totrans-3336
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 在 Cloudflare 的上传区域中，点击从计算机选择。
- en: 2.  Click Upload Folder.
  id: totrans-3337
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 点击上传文件夹。
- en: 3.  In the dialog that appears, select the project folder, as shown in figure
    B.8, and then click Upload.
  id: totrans-3338
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 在出现的对话框中，选择项目文件夹，如图 B.8 所示，然后点击上传。
- en: '![A screenshot of a computer Description automatically generated with medium
    confidence](../../OEBPS/Images/APPB_F08_McFedries3.jpg)'
  id: totrans-3339
  prefs: []
  type: TYPE_IMG
  zh: '![计算机截图，描述由中等置信度自动生成](../../OEBPS/Images/APPB_F08_McFedries3.jpg)'
- en: Figure B.8 Select the website folder.
  id: totrans-3340
  prefs: []
  type: TYPE_NORMAL
  zh: 图 B.8 选择网站文件夹。
- en: 4.  If your web browser asks you to confirm the operation, click Upload. Cloudflare
    uploads the subfolder and its contents.
  id: totrans-3341
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 如果您的网络浏览器要求您确认操作，请点击上传。Cloudflare 会上传子文件夹及其内容。
- en: The final step is to deploy the site, as described in the next section.
  id: totrans-3342
  prefs: []
  type: TYPE_NORMAL
  zh: 最后一步是将网站部署，如下一节所述。
- en: B.2.5 Deploying the site
  id: totrans-3343
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: B.2.5 部署网站
- en: With your files uploaded, you’re ready to deploy the new site. You do that by
    clicking the Deploy Site button. Cloudflare deploys the site and then displays
    the Success! message, as shown in figure B.9\. Click the link to view the deployed
    site in the web browser.
  id: totrans-3344
  prefs: []
  type: TYPE_NORMAL
  zh: 文件上传完成后，您就可以部署新网站了。您可以通过点击部署网站按钮来完成此操作。Cloudflare 会部署网站，然后显示成功！消息，如图 B.9 所示。点击链接在网页浏览器中查看已部署的网站。
- en: '![A screenshot of a web page Description automatically generated with low confidence](../../OEBPS/Images/APPB_F09_McFedries3.png)'
  id: totrans-3345
  prefs: []
  type: TYPE_IMG
  zh: '![网页截图，描述由低置信度自动生成](../../OEBPS/Images/APPB_F09_McFedries3.png)'
- en: Figure B.9 Cloudflare displays the Success! message when your site is deployed.
  id: totrans-3346
  prefs: []
  type: TYPE_NORMAL
  zh: 图 B.9 当您的网站部署时，Cloudflare 显示成功！消息。
- en: B.2.6 Changing your site’s domain name
  id: totrans-3347
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: B.2.6 更改您的网站域名
- en: 'Cloudflare gives your deployed website a custom domain name of the form *folder-name*-*a1b2*.pages.dev
    (where *folder-name* comes from the name of the website folder you uploaded).
    You can change this name to your own domain name as follows:'
  id: totrans-3348
  prefs: []
  type: TYPE_NORMAL
  zh: Cloudflare 为您部署的网站提供了一个自定义域名，格式为 *folder-name*-*a1b2*.pages.dev（其中 *folder-name*
    来自您上传的网站文件夹名称）。您可以通过以下方式更改此名称为自己的域名：
- en: '*Domain name purchased from Cloudflare*—In the left sidebar, click Domain Registration,
    click Register Domains, type the new domain name you want to use, click Search,
    and then follow the instructions. Once the purchase is complete, follow the instructions
    in the next bullet to assign the new domain to a Pages website.'
  id: totrans-3349
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*从 Cloudflare 购买的域名*—在左侧侧边栏中，点击域名注册，点击注册域名，输入您想要使用的新域名，点击搜索，然后按照指示操作。购买完成后，按照下一项指示将新域名分配给
    Pages 网站。'
- en: '*Domain name you already own*—From the Worker & Pages Overview page, click
    the website you want to work with, click the Custom Domains tab, click Set Up
    a Custom Domain, type the domain name you own (if you purchased a domain with
    Cloudflare, type that domain name), click Continue, and then follow the instructions.'
  id: totrans-3350
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*你已拥有的域名*—从“工作与页面概览”页面，点击你想要工作的网站，点击“自定义域名”选项卡，点击“设置自定义域名”，输入你拥有的域名（如果你通过Cloudflare购买了域名，请输入该域名），点击“继续”，然后按照指示操作。'
- en: B.3 Deploying to other web hosts
  id: totrans-3351
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: B.3 部署到其他网络托管服务
- en: Other services can host your website; they store your files on a special computer
    called a *web server*, which accepts and responds to web browser requests for
    the page and its associated files. To use such a service, you need to sign up
    with one that offers space on its server. Because the service in effect plays
    host to your files, it’s called a *web hosting provider* or *web host*.
  id: totrans-3352
  prefs: []
  type: TYPE_NORMAL
  zh: 其他服务可以托管你的网站；它们将你的文件存储在称为*Web服务器*的特殊计算机上，该服务器接受并响应Web浏览器对页面及其相关文件的请求。要使用此类服务，你需要注册一个提供其服务器空间的服务。因为该服务实际上充当了你的文件的主机，所以它被称为*网络托管提供商*或*网络托管服务*。
- en: B.3.1 What to look for in a web host
  id: totrans-3353
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: B.3.1 在选择网络托管服务时应该注意什么
- en: 'When you evaluate a web host, what criteria should you use? The answer depends
    on the type of website you want to set up, but the following criteria are the
    most common:'
  id: totrans-3354
  prefs: []
  type: TYPE_NORMAL
  zh: 当你评估网络托管服务时，应该使用哪些标准？答案取决于你想要设置的网站类型，但以下标准是最常见的：
- en: '*Maximum bandwidth*—The maximum amount of your data per month that the host
    will transfer to web browsers. In most cases, you pay extra for data that exceeds
    your monthly maximum. Some web hosts offer unlimited bandwidth.'
  id: totrans-3355
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*最大带宽*—托管服务每月将传输到Web浏览器的最大数据量。在大多数情况下，超出月度最大数据量的数据需要额外付费。一些网络托管服务提供无限带宽。'
- en: '*Total disk space*—The amount of hard disk storage space you get on the web
    server. At a minimum, total disk space is usually a few hundred megabytes, which
    is more than enough for a simple site.'
  id: totrans-3356
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*总磁盘空间*—你在Web服务器上获得的硬盘存储空间。至少，总磁盘空间通常是几百兆字节，对于简单的网站来说已经足够了。'
- en: '*Number of websites*—The number of root folders you can set up.'
  id: totrans-3357
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*网站数量*—你可以设置的根文件夹数量。'
- en: '*Number of email addresses*—The number of email addresses included with the
    hosting service.'
  id: totrans-3358
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*电子邮件地址数量*—包含在托管服务中的电子邮件地址数量。'
- en: '*Domain name hosting*—Whether the web host also hosts domain names that you’ve
    previously purchased from a domain name registrar. Some hosts sell domain names,
    and others offer free subdomain names of the form *yourdomain*.*webhostdomain*.com.'
  id: totrans-3359
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*域名托管*—网络托管服务是否也托管了你之前从域名注册商那里购买的域名。一些托管商销售域名，而另一些则提供免费子域名，形式为*yourdomain*.*webhostdomain*.com。'
- en: '*FTP support*—Support for the *File Transfer Protocol* (FTP), which is the
    internet service you use to transfer your files to the web host. Almost all web
    hosts support FTP, but some offer only proprietary file-transfer services.'
  id: totrans-3360
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*FTP支持*—对*文件传输协议*（FTP）的支持，这是你用来将文件传输到网络托管服务的互联网服务。几乎所有的网络托管服务都支持FTP，但有些只提供专有的文件传输服务。'
- en: 'As a rule, the cheaper the web host, the fewer of these features you get. Before
    you start looking for a web host, make a list of these features and decide what
    you need and what’s optional. That may be difficult for something like maximum
    bandwidth because bandwidth is determined in part by how popular your site becomes,
    but make your best stabs at each one for now. When you’re looking for a web host,
    you have three main choices:'
  id: totrans-3361
  prefs: []
  type: TYPE_NORMAL
  zh: 通常情况下，网络托管服务越便宜，可用的这些功能就越少。在你开始寻找网络托管服务之前，列出一个这些功能的清单，并决定你需要什么以及什么是可以选择的。对于像最大带宽这样的功能可能比较困难，因为带宽部分取决于你的网站有多受欢迎，但你现在可以尽力为每个功能做出最佳猜测。当你寻找网络托管服务时，你有三个主要选择：
- en: '*Your internet service provider* (ISP)—The company or institution you use to
    access the internet may also offer a web hosting service. Many ISPs offer free
    web hosting for simple personal websites, and some organization networks include
    a web server you can use. In most cases, the hosting includes features such as
    bandwidth and disk space at the lower end of the scale.'
  id: totrans-3362
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*你的互联网服务提供商*（ISP）—你用来访问互联网的公司或机构也可能提供网络托管服务。许多ISP为简单的个人网站提供免费网络托管服务，并且一些组织网络包括你可以使用的Web服务器。在大多数情况下，托管服务包括带宽和磁盘空间等低端功能。'
- en: '*Free web hosting provider*—Many services will host your web pages without
    charge. The catch is that you usually have fairly severe restrictions on most
    hosting features, particularly bandwidth and disk space, and you almost always
    get only a single website. Some free web hosts also display ads, although that’s
    becoming rare these days.'
  id: totrans-3363
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*免费网络托管提供商*—许多服务会免费托管您的网页。但是，您通常对大多数托管功能有相当严重的限制，尤其是带宽和磁盘空间，并且您几乎总是只能获得一个网站。一些免费网络托管商也会显示广告，尽管现在这种情况越来越少了。'
- en: '*Commercial web hosting provider*—If you want a reasonable set of features
    for your web presence, you need to shell out money to rent space with a commercial
    web hosting provider. Note that I’m not talking about big bucks. Popular providers
    such as Bluehost ([www.bluehost.com](https://www.bluehost.com)), GoDaddy ([www.godaddy.com](https://www.godaddy.com)),
    and HostGator ([www.hostgator.com](https://www.hostgator.com)) offer feature-packed
    hosting, usually for less than $5 per month. If you think you’ll be getting into
    web design beyond creating a basic home page, you should consider a commercial
    web host.'
  id: totrans-3364
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*商业网络托管提供商*—如果您希望为您的网络存在提供合理的一套功能，您需要支付费用来租用商业网络托管提供商的空间。请注意，我并不是在谈论大笔的钱。流行的提供商，如Bluehost
    ([www.bluehost.com](https://www.bluehost.com))、GoDaddy ([www.godaddy.com](https://www.godaddy.com))
    和 HostGator ([www.hostgator.com](https://www.hostgator.com))，提供功能齐全的托管服务，通常每月费用不到5美元。如果您认为您将从事超出创建基本主页的网页设计，您应该考虑使用商业网络托管。'
- en: When you’ve signed up with a web host, it usually takes anywhere from a few
    minutes to a few hours before everything is ready. When your hosting service is
    good to go, it’s time to get your stuff online.
  id: totrans-3365
  prefs: []
  type: TYPE_NORMAL
  zh: 当您与网络托管商签约后，通常需要几分钟到几小时的时间才能准备就绪。当您的托管服务准备就绪时，就是将您的文件上传到网上的时候了。
- en: B.3.2 Uploading your files
  id: totrans-3366
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: B.3.2 上传您的文件
- en: 'With your HTML and CSS files coded and validated, your support files (such
    as images) in place, your folders set up, and your web host ready to serve your
    stuff to a waiting world, all that remains is to send your files from your computer
    to the web host’s server—a process known as *uploading*. How you go about uploading
    your files depends on the web host, but the following three methods are by far
    the most common:'
  id: totrans-3367
  prefs: []
  type: TYPE_NORMAL
  zh: 当您的HTML和CSS文件编码并验证无误，支持文件（如图片）就位，文件夹设置完成，您的网络托管商准备好向等待的世界提供服务时，剩下的就是将您的文件从您的计算机发送到网络托管商的服务器——这个过程被称为*上传*。您如何上传文件取决于您的网络托管商，但以下三种方法是迄今为止最常用的：
- en: '*FTP*—Most hosts offer support for FTP uploads. First, you need to get yourself
    an *FTP client*, which is a software program that connects to your web host’s
    FTP server and offers an interface for basic file chores, such as navigating and
    creating folders, uploading files, and deleting and renaming files. Popular Windows
    clients are CuteFTP ([www.globalscape.com/cuteftp](https://www.globalscape.com/cuteftp))
    and Cyberduck ([https://cyberduck.io](https://cyberduck.io)). For the Mac, try
    Transmit ([https://panic.com/transmit](https://panic.com/transmit)) or FileZilla
    ([https://filezilla-project.org](https://filezilla-project.org)). When you’ve
    downloaded the software, check your web host’s support pages for information on
    how to connect to the host’s FTP server.'
  id: totrans-3368
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*FTP*—大多数托管商提供对FTP上传的支持。首先，您需要为自己获取一个*FTP客户端*，这是一个软件程序，可以连接到您的网络托管商的FTP服务器，并提供基本文件操作的用户界面，例如导航和创建文件夹、上传文件以及删除和重命名文件。流行的Windows客户端有CuteFTP
    ([www.globalscape.com/cuteftp](https://www.globalscape.com/cuteftp)) 和 Cyberduck
    ([https://cyberduck.io](https://cyberduck.io))。对于Mac用户，可以尝试Transmit ([https://panic.com/transmit](https://panic.com/transmit))
    或 FileZilla ([https://filezilla-project.org](https://filezilla-project.org))。下载软件后，请查看您的网络托管商的支持页面，获取如何连接到托管商FTP服务器的信息。'
- en: '*cPanel*—Many web hosts offer an administration tool called cPanel that presents
    a simple interface for hosting tasks such as email and domain management. cPanel
    also offers a File Manager component that you can use to upload files and perform
    other file management chores.'
  id: totrans-3369
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*cPanel*—许多网络托管商提供一种名为cPanel的管理工具，它提供了一个简单的界面，用于处理诸如电子邮件和域名管理之类的托管任务。cPanel还提供了一个文件管理器组件，您可以使用它上传文件并执行其他文件管理任务。'
- en: '*Proprietary*—Some web hosts offer their own interface for uploading and working
    with files. See your host’s support page for instructions.'
  id: totrans-3370
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*专有*—一些网络托管商提供他们自己的上传和文件操作界面。请参阅您的托管商支持页面以获取说明。'
- en: Whatever method is available, upload all your website files and folders to your
    root folder on your host. Then load your site into your favorite web browser to
    make sure everything’s working okay. It wouldn’t hurt to try your site in a few
    different browsers and on a few different devices to be sure it works properly
    for a wide variety of users.
  id: totrans-3371
  prefs: []
  type: TYPE_NORMAL
  zh: 无论可用什么方法，都要将所有网站文件和文件夹上传到你的主机根目录。然后，将你的网站加载到你喜欢的网页浏览器中，以确保一切正常工作。尝试在几个不同的浏览器和设备上测试你的网站，以确保它对广泛的用户都能正常工作，这不会有害。
- en: Appendix C. Learning a few ChatGPT best practices
  id: totrans-3372
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 附录C. 学习一些ChatGPT最佳实践
- en: Web developers know that creating web pages is a craft that’s as much art as
    technology, as much design as it is coding. My main assumption with this book
    is that you don’t want (or don’t have either the time or the inclination) to become
    a web developer. So, the craft that you learn in this book is the craft of prompting
    ChatGPT to generate the code and text you need for the web pages you want to put
    online.
  id: totrans-3373
  prefs: []
  type: TYPE_NORMAL
  zh: 网页开发者知道，创建网页是一门既包含艺术又包含技术的手艺，既包含设计又包含编码。我对这本书的主要假设是，你不想（或者没有时间或兴趣）成为一名网页开发者。因此，你在本书中学到的手艺是引导ChatGPT生成你想要上线网页所需的代码和文本的手艺。
- en: A big part of cajoling ChatGPT into doing your web page creation chores is using
    your prompts to lay out what you want with as little ambiguity as possible. That’s
    the goal behind all the prompts you see in the book. However, prompting ChatGPT
    is an art, which means there are lots of subtle ways to improve your prompts to
    get better results. You may find (fingers crossed!) that this book’s prompts provide
    good enough starting points for getting ChatGPT to help build your website. If
    so, great! If not, however, don’t despair. As this appendix shows, there are quite
    a few tips, tricks, and best practices you can use to get ChatGPT to generate
    high-quality web page code and text.
  id: totrans-3374
  prefs: []
  type: TYPE_NORMAL
  zh: 将ChatGPT引导去做你的网页创建任务的一大关键部分是使用你的提示尽可能清晰地列出你想要的内容。这正是书中所有提示背后的目标。然而，提示ChatGPT是一种艺术，这意味着有无数微妙的方式来改进你的提示以获得更好的结果。你可能会发现（
    fingers crossed!）这本书的提示为让ChatGPT帮助你构建网站提供了足够好的起点。如果这样，太好了！然而，如果不这样，也不要绝望。正如这个附录所示，有相当多的技巧、窍门和最佳实践可以帮助ChatGPT生成高质量的网页代码和文本。
- en: C.1 Ask ChatGPT to adopt a persona
  id: totrans-3375
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: C.1 请求ChatGPT扮演一个角色
- en: One surprising feature of ChatGPT is that it can adopt a specified persona—for
    example, a teacher, a consultant, or a data analyst—during a conversation. Telling
    the model “who” it is not only gives ChatGPT an overall perspective from which
    to generate its output but also places the conversation in a more specific context,
    which usually helps the model formulate more targeted results.
  id: totrans-3376
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT的一个令人惊讶的特性是它可以在对话中采用指定的角色——例如，教师、顾问或数据分析师。告诉模型“它是谁”不仅为ChatGPT提供了一个生成输出的整体视角，而且将对话置于一个更具体的上下文中，这通常有助于模型制定更针对性的结果。
- en: 'For web page creation, you can start your conversations with example persona
    prompts such as the following:'
  id: totrans-3377
  prefs: []
  type: TYPE_NORMAL
  zh: 对于网页创建，你可以从以下示例角色提示开始你的对话：
- en: '*You are a web design consultant*.'
  id: totrans-3378
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*你是一名网页设计顾问*。'
- en: '*Act as a senior web developer*.'
  id: totrans-3379
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*扮演一个资深网页开发者*。'
- en: '*Provide code that a front-end web engineer would create*.'
  id: totrans-3380
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*提供前端网页工程师会编写的代码*。'
- en: '*You are a website marketing manager*.'
  id: totrans-3381
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*你是一名网站营销经理*。'
- en: 'Tip For assistance writing your persona prompts, see the GitHub repository
    called Awesome ChatGPT Prompts: [https://github.com/f/awesome-chatgpt-prompts](https://github.com/f/awesome-chatgpt-prompts).'
  id: totrans-3382
  prefs: []
  type: TYPE_NORMAL
  zh: 小贴士：为了帮助你编写角色提示，请参阅GitHub仓库“Awesome ChatGPT Prompts”：[https://github.com/f/awesome-chatgpt-prompts](https://github.com/f/awesome-chatgpt-prompts)。
- en: Of course, you can also ask ChatGPT to assume any persona that suits your needs,
    which is especially handy when asking for help to generate web page text.
  id: totrans-3383
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，你也可以要求ChatGPT扮演任何适合你需求的角色，这在请求帮助生成网页文本时特别有用。
- en: C.2 More detail is better than less
  id: totrans-3384
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: C.2 详细信息比简略信息更好
- en: If you leave important information out of your prompt, ChatGPT will try to guess
    what you want, which is almost certainly not going to produce quality results!
    Don’t be afraid to add salient details to your prompts to give the transformer
    part of ChatGPT something to chew on.
  id: totrans-3385
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你没有在提示中包含重要信息，ChatGPT会尝试猜测你想要的内容，这几乎肯定不会产生高质量的结果！不要害怕在你的提示中添加显著细节，以便ChatGPT的转换器部分有所依据。
- en: 'For example, consider the following prompt (from chapter 1):'
  id: totrans-3386
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，考虑以下提示（来自第一章）：
- en: '[PRE294]'
  id: totrans-3387
  prefs: []
  type: TYPE_PRE
  zh: '[PRE294]'
- en: 'The use of the word *large* here is vague, so ChatGPT will guess what size
    you want for the text. For example, in chapter 1, I showed some ChatGPT-generated
    code that formatted the text in a 48-pixel font. However, if you know you want
    the text displayed in a 72-pixel font, add that to your prompt:'
  id: totrans-3388
  prefs: []
  type: TYPE_NORMAL
  zh: 这里使用“大”这个词比较模糊，所以ChatGPT会猜测你想要的文本大小。例如，在第1章中，我展示了一些ChatGPT生成的代码，该代码以48像素的字体格式化文本。然而，如果你知道你想要文本以72像素的字体显示，请将其添加到你的提示中：
- en: '[PRE295]'
  id: totrans-3389
  prefs: []
  type: TYPE_PRE
  zh: '[PRE295]'
- en: 'Here’s some example code generated by ChatGPT from this prompt:'
  id: totrans-3390
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是从这个提示生成的ChatGPT的一些示例代码：
- en: '[PRE296]'
  id: totrans-3391
  prefs: []
  type: TYPE_PRE
  zh: '[PRE296]'
- en: Warning One of the ways a large language model (LLM) such as ChatGPT is trained
    to produce outputs that aren’t (or aren’t *always*) boring or run-of-the-mill
    is to add a soupçon of randomness to the process. This randomness also means,
    first, that ChatGPT doesn’t necessarily generate identical results from identical
    prompts and, second, that sometimes ChatGPT seems to go out of its way to not
    understand your prompts. For the latter, it’s almost always the best strategy
    to clear the current conversation and start over.
  id: totrans-3392
  prefs: []
  type: TYPE_NORMAL
  zh: 警告：大型语言模型（LLM）如ChatGPT被训练产生不（或不是总是）无聊或平淡无奇的输出的一种方式是在过程中加入一些随机性。这种随机性首先意味着ChatGPT不一定从相同的提示中生成相同的结果，其次，有时ChatGPT似乎故意不理解你的提示。对于后者，几乎总是最好的策略是清除当前对话并重新开始。
- en: Detail is generally your friend when prompting ChatGPT, but if you find the
    model timing out, getting confused, or producing incomplete results, too much
    detail may be the culprit. In that case, try breaking your detailed prompts into
    two or more less-detailed prompts.
  id: totrans-3393
  prefs: []
  type: TYPE_NORMAL
  zh: 在提示ChatGPT时，细节通常是你的朋友，但如果你发现模型超时、困惑或产生不完整的成果，过多的细节可能是罪魁祸首。在这种情况下，尝试将详细提示分解为两个或更多较不详细的提示。
- en: C.3 Set an output length
  id: totrans-3394
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: C.3 设置输出长度
- en: When you’re working with ChatGPT to generate text, depending on the prompt,
    ChatGPT may output a result that’s long and/or detailed. That long-winded result
    may be exactly what you want, but web page components are often restricted in
    how much text they can accommodate. For example, you may want a product description
    to be only large enough to fit a card component; similarly, you may want the answers
    to some frequently asked questions to be on the succinct side.
  id: totrans-3395
  prefs: []
  type: TYPE_NORMAL
  zh: 当你与ChatGPT合作生成文本时，根据提示，ChatGPT可能会输出一个长且/或详细的成果。这个冗长的结果可能正是你想要的，但网页组件通常在能容纳多少文本方面有所限制。例如，你可能希望产品描述只足够大，可以适应卡片组件；同样，你可能希望一些常见问题的答案简短明了。
- en: 'So, when prompting ChatGPT to generate website text, you’ll often want that
    text to have a maximum length. It may be 200 words, 3 paragraphs, 4 sentences,
    or 5 bullet points. Whatever the length, be sure to include it as part of your
    prompt. Some examples:'
  id: totrans-3396
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，当提示ChatGPT生成网站文本时，你通常会希望文本有一个最大长度。这可能是一篇200字的短文、3个段落、4个句子，或者5个要点。无论长度如何，务必将其作为你提示的一部分。以下是一些示例：
- en: '`Provide an answer to the question "Why was Jerry Lewis so popular in France?".
    Make the answer 100 words or less`.'
  id: totrans-3397
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`回答问题“为什么杰里·刘易斯在法国如此受欢迎？”。答案不超过100字`。'
- en: '`In three paragraphs, write a buyer''s guide to cubic zirconia jewelry`.'
  id: totrans-3398
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`用三个段落写一篇立方氧化锆珠宝的购买指南`。'
- en: '`List ten fun things to do in the Broad Ripple neighborhood of Indianapolis`.'
  id: totrans-3399
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`列出在印第安纳波利斯布罗德里普区可以做的十个有趣的事情`。'
- en: Tip Chances are, ChatGPT will ignore your suggested output length in its first
    response! This is particularly true for lengths expressed in words, paragraphs,
    and sentences. Once the response is complete, run a follow-up prompt asking ChatGPT
    to reduce the answer to the length you specified in the original prompt.
  id: totrans-3400
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：ChatGPT很可能会在其第一次响应中忽略你建议的输出长度！这对于用单词、段落和句子表示的长度尤其如此。一旦响应完成，运行后续提示，要求ChatGPT将答案缩减到你在原始提示中指定的长度。
- en: 'Setting an output length is an example of a *constraint*, which refers to any
    aspect of the prompt that limits ChatGPT’s response in some way. Here are some
    example constraints to play around with:'
  id: totrans-3401
  prefs: []
  type: TYPE_NORMAL
  zh: 设置输出长度是约束的一个例子，它指的是任何以某种方式限制ChatGPT响应的提示方面。以下是一些可以尝试的示例约束：
- en: '`Write your output in the style of` *`X`* (where *`X`* is an author or publication).'
  id: totrans-3402
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`以` *`X`* （其中 *`X`* 是作者或出版物）的风格撰写你的输出`。'
- en: '`Write the text in a manner that''s` *`X`* (where *`X`* is an adjective or
    adjectival phrase such as *academic*, *casual*, or *accessible to a 10-year-old*).'
  id: totrans-3403
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`以` *`X`* （其中 *`X`* 是形容词或形容词短语，如 *学术的*、*随意的*或*适合10岁孩子的*）的方式撰写文本`。'
- en: '`Make the text` *`X`* (where *`X`* is an adjective such as *vivid*, *lively*,
    or *humorous*).'
  id: totrans-3404
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`使文本` *`X`* （其中 *`X`* 是一个形容词，如 *vivid*，*lively* 或 *humorous*）。'
- en: Constraining your requests is a great way to get ChatGPT to write more interesting
    text.
  id: totrans-3405
  prefs: []
  type: TYPE_NORMAL
  zh: 限制你的请求是让ChatGPT写出更有趣文本的好方法。
- en: C.4 Delimit extra text input with triple quotation marks
  id: totrans-3406
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: C.4 使用三重引号限定额外的文本输入
- en: 'If you’re providing extra text input for ChatGPT to use, surround the input
    with triple quotation marks and include that fact in your prompt. For example,
    in a previous project, I’d asked ChatGPT to write a short biography of the poet
    Walt Whitman. I copied that biography and then pasted it into the following prompt:'
  id: totrans-3407
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你为ChatGPT提供额外的文本输入，请用三重引号包围输入，并在你的提示中包含这一事实。例如，在一个之前的项目中，我要求ChatGPT写一篇关于诗人沃尔特·惠特曼的简短传记。我复制了这篇传记，然后将其粘贴到以下提示中：
- en: '[PRE297]'
  id: totrans-3408
  prefs: []
  type: TYPE_PRE
  zh: '[PRE297]'
- en: 'ChatGPT rose to the challenge with the following ditty:'
  id: totrans-3409
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT以以下小曲接受了挑战：
- en: '[PRE298]'
  id: totrans-3410
  prefs: []
  type: TYPE_PRE
  zh: '[PRE298]'
- en: 'Including example text is particularly useful when you’d like ChatGPT to generate
    new text using your own writing style. For example, you can say something like
    this:'
  id: totrans-3411
  prefs: []
  type: TYPE_NORMAL
  zh: 包含示例文本在你希望ChatGPT使用你自己的写作风格生成新文本时特别有用。例如，你可以这样说：
- en: '[PRE299]'
  id: totrans-3412
  prefs: []
  type: TYPE_PRE
  zh: '[PRE299]'
- en: When including example text in your prompt, bear in mind that most ChatGPT queries
    are limited to about 500 words (about double the number of words in the earlier
    limerick prompt). Remember (as I explain in chapter 7) that you can use Copilot
    to work around this limitation by navigating to a page that includes the text
    you want ChatGPT to reference and then using the Copilot sidebar to write your
    prompt.
  id: totrans-3413
  prefs: []
  type: TYPE_NORMAL
  zh: 当在你的提示中包含示例文本时，请记住，大多数ChatGPT查询限制在大约500字（大约是早期谜语提示字数的两倍）。记住（正如我在第7章中解释的），你可以通过导航到包含ChatGPT需要参考的文本的页面，然后使用Copilot侧边栏来编写你的提示，来使用Copilot绕过这个限制。
- en: C.5 An example is worth a thousand prompts
  id: totrans-3414
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: C.5 一个例子胜过千个提示
- en: 'If you’re asking ChatGPT to output something unusual or esoteric, the model
    may not get what you want. To point ChatGPT in the right direction, include two
    or three examples of the type of output you’re looking for. Here’s an example:'
  id: totrans-3415
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你要求ChatGPT输出不寻常或深奥的内容，模型可能无法理解你的需求。为了将ChatGPT引向正确的方向，请包含两到三个你期望的输出类型的示例。以下是一个示例：
- en: '[PRE300]'
  id: totrans-3416
  prefs: []
  type: TYPE_PRE
  zh: '[PRE300]'
- en: Tip The prompt shown here is an example of a *template prompt*, where you give
    ChatGPT an overall pattern (`"Not the *X*est *Y* in the *Z*"`) that includes one
    or more placeholders (*`X`*, *`Y`*, and *`Z`*) and tell ChatGPT how you want it
    to replace each placeholder.
  id: totrans-3417
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：这里显示的提示是一个*模板提示*的示例，你给ChatGPT一个包含一个或多个占位符（*`X`*，*`Y`* 和 *`Z`*）的整体模式（`"Not
    the *X*est *Y* in the *Z*"`），并告诉ChatGPT你希望它如何替换每个占位符。
- en: However, before spending time coming up with examples, it’s usually best to
    try the prompt on its own without any examples. ChatGPT has been trained on such
    a large quantity of text that it often gets even obscure requests the first time.
  id: totrans-3418
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，在花费时间想出例子之前，通常最好在没有例子的情况下单独尝试提示。ChatGPT接受了大量文本的训练，它通常在第一次就能理解甚至晦涩的请求。
- en: C.6 Flip the conversation direction
  id: totrans-3419
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: C.6 翻转对话方向
- en: Most of your ChatGPT conversations are one-way affairs that have you asking
    the model to perform some tasks and the model (hopefully) completing the request
    successfully. If you’re not getting quality results, it’s probably because you’re
    not giving ChatGPT prompts that are good enough for it to figure out what you
    need. Do you know who may be able to figure out the correct prompts to use? ChatGPT!
    That is, instead of constantly pestering ChatGPT for output, turn things around
    and get ChatGPT to ask *you* to provide the info the model needs.
  id: totrans-3420
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数你的ChatGPT对话都是单向的，你要求模型执行某些任务，而模型（希望）成功完成请求。如果你没有得到高质量的结果，那可能是因为你没有给出足够好的提示，让ChatGPT能够理解你的需求。你知道谁可能能够找出正确的提示吗？ChatGPT！也就是说，与其不断打扰ChatGPT要求输出，不如反过来，让ChatGPT询问你需要的信息。
- en: 'Here are some example prompts:'
  id: totrans-3421
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一些示例提示：
- en: '`Ask me whatever questions you require me to answer for you to create an "About"
    page for my website`.'
  id: totrans-3422
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`问我你需要我回答的任何问题，以便为我网站的“关于”页面创建一个页面`。'
- en: '`I want to create a web page card for a product. I would like you to ask me
    questions until you have enough information to generate the HTML and CSS code
    for the card`.'
  id: totrans-3423
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`我想创建一个产品的网页卡片。请问我需要哪些信息，直到你收集到足够的信息来生成卡片的HTML和CSS代码`。'
- en: '`I want you to help me write a short story. What information do you need from
    me? Ask me one question at a time, please`.'
  id: totrans-3424
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`我想让你帮我写一个短篇故事。你需要从我这里得到哪些信息？请一次问一个问题`。'
- en: Note that in each case, the prompt includes a specific outcome, goal, or result.
    This is important because it enables ChatGPT to generate the appropriate questions.
  id: totrans-3425
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，在每种情况下，提示都包含一个特定的结果、目标或结果。这一点很重要，因为它使ChatGPT能够生成适当的问题。
- en: C.7 Ask ChatGPT to refine your prompts
  id: totrans-3426
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: C.7 让ChatGPT改进你的提示
- en: 'One of the problems you’ll run into when using ChatGPT to generate web page
    code is that, not being a web developer yourself, you can’t be sure that your
    prompts are worded correctly, that they’re asking the right question, or whether
    they’re seeking something that’s just not possible. One of the main goals of this
    book is to give you enough example prompts that you become familiar with a wide
    range of what you can request from ChatGPT. However, if you find yourself in new
    territory, go ahead and prompt ChatGPT as best you can. If the results aren’t
    what you want, ask ChatGPT to refine your prompt for you:'
  id: totrans-3427
  prefs: []
  type: TYPE_NORMAL
  zh: 当你使用ChatGPT生成网页代码时，会遇到的一个问题是，由于你不是自己是一名网页开发者，你无法确定你的提示是否措辞正确，是否提出了正确的问题，或者是否寻求的是根本不可能实现的东西。本书的主要目标之一是给你足够的示例提示，让你熟悉从ChatGPT那里可以请求的广泛范围。然而，如果你发现自己处于新领域，请尽可能地向ChatGPT发出提示。如果结果不是你想要的，你可以要求ChatGPT为你改进提示：
- en: '`Can you suggest a better version of my previous prompt`?'
  id: totrans-3428
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你能建议一个比我之前提示更好的版本吗？
- en: '`Is there anything missing from my previous prompt that would help you generate
    a better response`?'
  id: totrans-3429
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “我的上一个提示中有什么遗漏的东西可以帮助你生成更好的响应吗？”
- en: '`In the following conversation, each time I ask you to generate some code,
    suggest a better version of my request and ask me if I''d prefer to use that version
    instead of the original`.'
  id: totrans-3430
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在以下对话中，每次我让你生成一些代码时，建议一个比我请求更好的版本，并问我是否更喜欢使用这个版本而不是原始版本。
- en: It may also help if you provide some context. For example, if you’re trying
    to create more accessible web pages, let ChatGPT know so that its improved prompts
    can take that goal into account.
  id: totrans-3431
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你能提供一些背景信息，也可能有所帮助。例如，如果你正在尝试创建更易于访问的网页，让ChatGPT知道，这样它的改进提示就可以考虑这个目标。
- en: C.8 Ask ChatGPT to create steps for you to follow
  id: totrans-3432
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: C.8 让ChatGPT为你创建步骤
- en: 'If you want to learn how to perform some complex task (for example, to deploy
    your website to a web host not covered in this book), you can ask ChatGPT to provide
    you with the steps to follow to accomplish that task. For this kind of prompt,
    you usually need to give ChatGPT the following tidbits:'
  id: totrans-3433
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想要学习如何执行某些复杂任务（例如，将你的网站部署到本书未涵盖的托管服务提供商），你可以要求ChatGPT为你提供完成该任务的步骤。对于这种提示，你通常需要给ChatGPT以下信息：
- en: The goal or task you’re trying to accomplish
  id: totrans-3434
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你试图完成的目标或任务
- en: What information related to that goal or task you already know, or what steps
    you’ve already performed
  id: totrans-3435
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 与该目标或任务相关的信息，你已经知道什么，或者你已经执行了哪些步骤
- en: What steps are required to accomplish the goal or task
  id: totrans-3436
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 完成目标或任务需要哪些步骤
- en: The details of any steps that deal with information you don’t yet have or steps
    you haven’t yet performed
  id: totrans-3437
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 与你尚未拥有或尚未执行的信息相关的任何步骤
- en: 'Here’s an example prompt that asks ChatGPT for the steps required to publish
    a website to Vercel:'
  id: totrans-3438
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一个示例提示，要求ChatGPT提供将网站发布到Vercel所需的步骤：
- en: '[PRE301]'
  id: totrans-3439
  prefs: []
  type: TYPE_PRE
  zh: '[PRE301]'
- en: A similar idea is to ask ChatGPT to tell you how to use the web page code that
    it generates for you. For example, if ChatGPT gives you some code but you’re not
    sure where the code is supposed to go in the HTML file, ask ChatGPT to tell you
    where to place the code in the file.
  id: totrans-3440
  prefs: []
  type: TYPE_NORMAL
  zh: 类似的方法是要求ChatGPT告诉你如何使用它为你生成的网页代码。例如，如果ChatGPT给你一些代码，但你不确定代码应该在HTML文件中的哪个位置，你可以要求ChatGPT告诉你如何在文件中放置代码。
- en: C.9 Ask ChatGPT to provide and rate alternatives
  id: totrans-3441
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: C.9 让ChatGPT提供并评估替代方案
- en: 'With all but the simplest designs, there are always multiple ways to code a
    web page or page component. After ChatGPT provides its initial output, you can
    always click Regenerate Response to get another block of code, but how do you
    know which response is the one you should use? Ask ChatGPT, of course! That is,
    you can ask ChatGPT not only to provide alternative approaches to what you’re
    trying to accomplish but also to rate those approaches. Here are some examples:'
  id: totrans-3442
  prefs: []
  type: TYPE_NORMAL
  zh: 对于除了最简单的设计之外的所有设计，总会有多种方法来编写网页或页面组件。在ChatGPT提供其初始输出后，你总是可以点击“重新生成响应”来获取另一块代码，但你怎么知道哪个响应是你应该使用的呢？当然，你可以要求ChatGPT不仅提供实现目标的替代方法，还要对这些方法进行评级。以下是一些示例：
- en: '`I want to add a responsive dropdown menu to my web page. If there are multiple
    ways to accomplish that goal, list the three best methods`.'
  id: totrans-3443
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`我想在我的网页上添加一个响应式下拉菜单。如果有多种实现该目标的方法，请列出三种最佳方法`。'
- en: '`List up to four ways that I can add a navigation bar to my web pages and tell
    me the pros and cons of each method`.'
  id: totrans-3444
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`列出我可以添加到我的网页中的导航栏的最多四种方法，并告诉我每种方法的优缺点`。'
- en: '`Tell me the most popular ways to get form data emailed to me and compare and
    contrast each method`.'
  id: totrans-3445
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`告诉我将表单数据通过电子邮件发送给我的最流行的方法，并比较和对比每种方法`。'
- en: Depending on the prompt, you may prefer to use Copilot, which can use a web
    search to help it rate each alternative.
  id: totrans-3446
  prefs: []
  type: TYPE_NORMAL
  zh: 根据提示，你可能更喜欢使用Copilot，它可以使用网络搜索来帮助它评估每个选项。
- en: C.10 In Microsoft Copilot, choose the appropriate conversation style
  id: totrans-3447
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: C.10 在Microsoft Copilot中选择适当的对话风格
- en: 'If you’re using Copilot, be sure to choose a conversation style that’s suitable
    to your task:'
  id: totrans-3448
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你正在使用Copilot，请确保选择适合你任务的对话风格：
- en: '*More Creative*—This style is best when you want Copilot to stretch its wings,
    so to speak, and generate text or ideas that are less conventional and more imaginative
    or inventive. This version of Copilot can generate truly wild text but is prone
    to claiming its fanciful output is fact, so *caveat emptor*. This style has an
    input limit of 4,000 characters.'
  id: totrans-3449
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*更具创意*——当你希望Copilot展翅高飞，换句话说，生成更不传统、更具想象力或创新性的文本或想法时，这种风格最佳。这个版本的Copilot可以生成真正疯狂的文字，但容易声称其虚构的输出是事实，因此*消费者注意*。这种风格的输入限制为4,000个字符。'
- en: '*More Precise*—This style is best when you want results that are concise, uncomplicated,
    and to the point. This style has an input limit of 4,000 characters.'
  id: totrans-3450
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*更精确*——当你想要简洁、简单、直接的结果时，这种风格最佳。这种风格的输入限制为4,000个字符。'
- en: '*More Balanced*—This is the default style, and it presents Copilot as a friendly,
    informative assistant with results that straddle the line between inventiveness
    and straightforwardness. This style has an input limit of 2,000 characters.'
  id: totrans-3451
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*更平衡*——这是默认风格，它将Copilot呈现为一个友好、信息丰富的助手，其结果介于创新和直接之间。这种风格的输入限制为2,000个字符。'
- en: When generating web page code, it’s usually best to try the More Precise style,
    which creates code that’s relatively free of unnecessary embellishment.
  id: totrans-3452
  prefs: []
  type: TYPE_NORMAL
  zh: 在生成网页代码时，通常最好尝试更精确的风格，它生成的代码相对没有不必要的装饰。
- en: C.11 Troubleshooting ChatGPT’s errors
  id: totrans-3453
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: C.11 解决ChatGPT的错误
- en: How ChatGPT does what it does isn’t a big mystery, and it’s certainly not magic,
    but it *is* extremely impressive, as you learn throughout this book. However,
    that impressiveness doesn’t mean ChatGPT is infallible—far from it. Yes, fortunately,
    most of the time the response you get from ChatGPT is code that not only matches
    what you asked for but also works properly (meaning when you display the code
    in a web browser, you see the content and style you asked for). However, it’s
    crucial to understand that although lots of people call ChatGPT “AI,” it’s not
    even remotely intelligent. It can—and, alas, often does—churn out code that’s
    inaccurate, mistaken, or sometimes downright nonsensical. And, worse, ChatGPT
    will present this “bad” code with the same cheerful confidence with which it presents
    its “good” code. ChatGPT simply doesn’t know the difference between the two.
  id: totrans-3454
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT是如何做到它的，并不是一个很大的秘密，当然也不是魔法，但正如你在本书中学到的，它确实非常令人印象深刻。然而，这种印象深刻并不意味着ChatGPT是完美的——远非如此。是的，幸运的是，大多数时候你从ChatGPT得到的响应是代码，不仅符合你的要求，而且还能正常工作（意味着当你将代码显示在网页浏览器中时，你会看到你要求的内容和样式）。然而，理解这一点至关重要，尽管很多人称ChatGPT为“AI”，但它甚至远非智能。它可以——不幸的是，经常这样做——生成不准确、错误或有时完全是胡说八道的代码。更糟糕的是，ChatGPT会以与它展示“好”代码相同的愉快自信来展示这些“坏”代码。ChatGPT根本不知道这两者之间的区别。
- en: 'So, that leaves you with a big problem: given that you don’t know (and presumably
    don’t want to know) how to code web pages, how can you “fix” whatever code problems
    ChatGPT creates? Happily, you’re not stuck, because you have a few ways to get
    ChatGPT to help fix its own problems:'
  id: totrans-3455
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，你面临着一个大问题：既然你不知道（并且可能不想知道）如何编写网页代码，你如何“修复”ChatGPT创建的任何代码问题？幸运的是，你并不孤立无援，因为你有一些方法可以让ChatGPT帮助修复它自己的问题：
- en: Ask ChatGPT to regenerate its response. Sometimes a second or even a third try
    is required to get things right.
  id: totrans-3456
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 请ChatGPT重新生成其响应。有时需要第二次甚至第三次尝试才能得到正确的结果。
- en: Modify your prompt. If your original prompt was simple, try adding more detail;
    if your original prompt was complex, try breaking it into multiple prompts that
    are simple and/or focus on a single task.
  id: totrans-3457
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 修改您的提示。如果您的原始提示很简单，尝试添加更多细节；如果您的原始提示很复杂，尝试将其分解成多个简单且/或专注于单个任务的提示。
- en: Ask ChatGPT to generate one or more prompts that it thinks are suitable to the
    output you’re looking for.
  id: totrans-3458
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 要求 ChatGPT 生成一个或多个它认为适合您所寻找输出的提示。
- en: Tell ChatGPT that the code it generated doesn’t work, and ask it to fix the
    problem. You’ll be amazed how often this helps!
  id: totrans-3459
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 告诉 ChatGPT 生成的代码无法工作，并要求它修复问题。您会惊讶地发现这有多么频繁地有帮助！
- en: My hope is that you won’t have to switch to troubleshooting mode all that often
    because ChatGPT really is good at churning out web page code.
  id: totrans-3460
  prefs: []
  type: TYPE_NORMAL
  zh: 我希望您不必经常切换到故障排除模式，因为 ChatGPT 确实擅长生成网页代码。
