    Include frameworks like STAR (Situation, Task, Action, Result) to structure your
    answers."'
  id: totrans-1419
  prefs: []
  type: TYPE_NORMAL
  zh: '"准备对常见的面试行为问题如‘描述你解决复杂问题的时刻’或‘你如何处理团队冲突？’的详细回答。包括STAR（情境、任务、行动、结果）框架来构建你的答案。"'
- en: '15: Practicing Greedy Algorithms'
  id: totrans-1420
  prefs: []
  type: TYPE_NORMAL
  zh: '15: 练习贪心算法'
- en: 'Prompt:'
  id: totrans-1421
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Write Python code to solve the problem of finding the minimum number of coins
