  type: TYPE_NORMAL
  zh: '**建立**一个强大且稳定的客户基础（或者应该是）每个和每个企业的目标。如果你没有客户，你就无法进行销售。如果你不销售你的产品或服务，那么你就没有企业，你有一个非常昂贵的爱好。但是仅仅销售你拥有的东西，并且只针对一个客户群体，在现代世界中是不够的。你需要继续销售，并且持续不断地销售，只要你的企业大门保持开放。你可以尝试吸引新客户，不断增长你的客户群，但这并不是一个非常有效的方法来做生意。保留你的客户，鼓励客户忠诚度，通过培养强大的品牌形象和公司在每个方面的质量声誉，这要更好（并且更有利可图）。这首先，首先，是通过拥有高质量的产品，其次，是通过提供高质量的客户服务。'
