- en: 18Beyond AI-Generated EssaysEngaging Students in Collaborative Decision-Making
    Processes in Management Education
  id: totrans-3133
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 18超越AI生成论文：在管理教育中激发学生参与协作决策过程
- en: Karim Darban, Smail Kabbaj, and Mostafa El Jai
  id: totrans-3134
  prefs: []
  type: TYPE_NORMAL
  zh: Karim Darban, Smail Kabbaj, 和 Mostafa El Jai
- en: 'DOI: [10.1201/9781032716350-18](http://doi.org/10.1201/9781032716350-18)'
  id: totrans-3135
  prefs: []
  type: TYPE_NORMAL
  zh: DOI：[10.1201/9781032716350-18](http://doi.org/10.1201/9781032716350-18)
- en: 18.1 Introduction
  id: totrans-3136
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 18.1 引言
- en: In recent years, the widespread integration of advanced artificial intelligence
    (AI) tools, specifically ChatGPT and other large language models (LLMs), has revolutionized
    educational settings by offering innovative avenues for learning and instruction.
    However, the ascendancy of ChatGPT in management education has introduced challenges
    and limitations that necessitate a thoughtful examination ([Opara et al., 2023](#ch26.xhtml#r867);
    [Pavlik, 2023](#ch26.xhtml#r868)). Despite its remarkable linguistic capabilities,
    ChatGPT falls short in addressing the nuanced requirements of management education,
    particularly in decision-making processes crucial to the fabric of management
    disciplines ([Khalil & Er, 2023](#ch26.xhtml#r858)). The reliance on automated
    responses poses unique challenges, such as the potential dilution of the educational
    experience and a diminished emphasis on interpersonal collaboration ([Mijwil et
    al., 2023](#ch26.xhtml#r866)).
  id: totrans-3137
  prefs: []
  type: TYPE_NORMAL
  zh: 近年来，先进的人工智能（AI）工具，特别是ChatGPT和其他大型语言模型（LLMs）的广泛应用，通过提供创新的学习和教学途径，已经彻底改变了教育环境。然而，ChatGPT在管理教育中的崛起也带来了挑战和限制，这需要我们深思熟虑的审视（[Opara等人，2023](#ch26.xhtml#r867)；[Pavlik，2023](#ch26.xhtml#r868)）。尽管ChatGPT在语言能力方面表现出色，但在满足管理教育中细微要求的方面却有所不足，尤其是在管理学科结构中至关重要的决策过程中（[Khalil
    & Er，2023](#ch26.xhtml#r858)）。对自动响应的依赖提出了独特的挑战，例如可能削弱教育体验和减少对人际合作的重视（[Mijwil等人，2023](#ch26.xhtml#r866)）。
- en: Against this backdrop, this chapter seeks to elucidate the pressing need for
    practical approaches that transcend the limitations of ChatGPT. Our goal is to
    explore innovative methodologies that not only acknowledge the presence of AI
    tools but actively leverage them alongside human faculties to enhance student
    engagement. The focal point of our exploration is collaborative decision-making
    processes, recognized as essential components in preparing future managers for
    the complexities of the professional landscape. In doing so, we aim to contribute
    valuable insights into how educators can navigate the challenges posed by ChatGPT,
    moving beyond automated responses to outline a path that mitigates drawbacks and
    enriches the learning experience through collaborative decision-making strategies.
  id: totrans-3138
  prefs: []
  type: TYPE_NORMAL
  zh: 在这样的背景下，本章旨在阐明超越ChatGPT局限性的实用方法的迫切需求。我们的目标是探索创新的方法，这些方法不仅承认AI工具的存在，而且能够积极利用它们与人类能力相结合，以增强学生的参与度。我们探索的重点是协作决策过程，这是为未来管理者准备专业领域复杂性的基本组成部分。在此过程中，我们旨在为教育者如何应对ChatGPT带来的挑战提供有价值的见解，从自动化响应转向通过协作决策策略减轻缺点并丰富学习体验的路径。
- en: The integration of ChatGPT into management education has prompted numerous studies
    assessing its impact on pedagogical practices and student learning outcomes. As
    we delve into this landscape, it becomes imperative to scrutinize the extent of
    ChatGPT integration into management courses and its implications for the development
    of critical managerial skills. Existing literature reveals a spectrum of endeavors
    aimed at incorporating ChatGPT as a pedagogical tool, showcasing its potential
    in automating certain aspects of instruction, generating customized learning materials,
    and simulating decision-making scenarios (Crawford et al., 2023).
  id: totrans-3139
  prefs: []
  type: TYPE_NORMAL
  zh: 将ChatGPT整合到管理教育中已经引发了众多研究，评估其对教学实践和学生学习成果的影响。当我们深入研究这一领域时，仔细审查ChatGPT在管理课程中的整合程度及其对培养批判性管理技能的潜在影响变得至关重要。现有文献揭示了多种努力，旨在将ChatGPT作为教学工具融入，展示了其在自动化某些教学方面、生成定制学习材料和模拟决策场景方面的潜力
    (Crawford等人，2023)。
- en: However, an in-depth analysis is warranted to discern the effectiveness of ChatGPT
    in fostering critical managerial skills. While proficient in generating textual
    content, its ability to instill nuanced decision-making, strategic thinking, and
    interpersonal skills requires careful examination ([Tlili et al., 2023](#ch26.xhtml#r877);
    Gerlak, & Heikkila, 2011). Scholars have scrutinized the outcomes of incorporating
    ChatGPT in management courses, assessing its impact on students’ ability to navigate
    real-world managerial challenges and make informed decisions. The synthesis of
    these findings serves as a foundational element in shaping our exploration of
    practical approaches and strategies, aiming to bridge the gap between ChatGPT
    capabilities and managerial education requirements.
  id: totrans-3140
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，进行深入分析是必要的，以辨别ChatGPT在培养批判性管理技能方面的有效性。尽管它在生成文本内容方面很熟练，但其培养细微的决策能力、战略思维和人际交往能力的能力需要仔细考察
    ([Tlili等人，2023](#ch26.xhtml#r877); Gerlak & Heikkila, 2011)。学者们已经仔细审查了将ChatGPT纳入管理课程的结果，评估其对学生在应对现实世界管理挑战和做出明智决策能力的影响。这些发现的综合分析构成了我们探索实际方法和策略的基础元素，旨在弥合ChatGPT能力与管理教育需求之间的差距。
- en: Collaborative decision-making represents a dynamic process wherein individuals
    collectively contribute to problem-solving, idea generation, and consensus-building.
    Grounding our exploration in established theoretical foundations provides a solid
    framework for assessing its application within management education ([Tlili et
    al., 2023](#ch26.xhtml#r877); [Gerlak & Heikkila, 2011](#ch26.xhtml#r848)). Theoretical
    frameworks emphasize the synergistic interaction of diverse perspectives, problem-solving
    methodologies, and communication strategies within a collaborative setting. Educators
    can leverage collaborative decision-making as a pedagogical tool to enrich the
    learning experience and develop critical interpersonal skills essential in managerial
    roles (Al-Samarraie & Saeed, 2018).
  id: totrans-3141
  prefs: []
  type: TYPE_NORMAL
  zh: 协作决策代表了一个动态过程，其中个人共同参与问题解决、创意生成和共识建设。我们的探索建立在既定的理论基础上，为评估其在管理教育中的应用提供了一个坚实的框架
    ([Tlili等人，2023](#ch26.xhtml#r877); [Gerlak & Heikkila，2011](#ch26.xhtml#r848))。理论框架强调在协作环境中不同观点、问题解决方法和沟通策略之间的协同作用。教育者可以利用协作决策作为一种教学工具，丰富学习体验并培养管理角色中必不可少的批判性人际交往技能
    (Al-Samarraie & Saeed, 2018)。
- en: Extensive literature underscores the pivotal role of collaboration in enhancing
    learning outcomes, stimulating active engagement, deeper comprehension, and the
    cultivation of skills ([Deyle & Wiedenman, 2014](#ch26.xhtml#r842)). Given the
    inherently collaborative nature of managerial roles, integrating collaborative
    decision-making into management education becomes imperative. As we navigate this
    exploration, theoretical underpinnings serve as guideposts, directing attention
    to potential synergies between collaborative learning strategies and the inherent
    requirements of management education.
  id: totrans-3142
  prefs: []
  type: TYPE_NORMAL
  zh: 广泛的文献强调了协作在提高学习成果、激发积极参与、深化理解和培养技能方面的关键作用 ([Deyle & Wiedenman，2014](#ch26.xhtml#r842))。鉴于管理角色的本质上是协作的，将协作决策纳入管理教育变得至关重要。在我们进行这一探索的过程中，理论基础充当了指南针，引导我们关注协作学习策略与管理教育内在要求之间的潜在协同作用。
- en: The synthesis of insights derived from literature serves as a pivotal step in
    shaping a conceptual framework. This synthesis involves distilling key findings
    from the exploration of the role of ChatGPT in management education and collaborative
    decision-making, aiming to identify common threads, discern emerging patterns,
    and construct a theoretical foundation that encapsulates the nuances of effective
    strategies for student engagement. This theoretical foundation, informed by collaborative
    decision-making and ChatGPT limitations, provides a conceptual scaffold for proposed
    practical approaches, ensuring a seamless integration of theoretical principles
    with actionable strategies. Key variables identified during the synthesis phase
    play a crucial role in informing the design of a survey for empirical validation
    in subsequent sections, forming a methodological bridge between theoretical insights
    and empirical evidence (Margerum, 2002).
  id: totrans-3143
  prefs: []
  type: TYPE_NORMAL
  zh: 从文献中提炼出的见解是构建概念框架的关键步骤。这一综合过程包括从探索ChatGPT在管理教育和协作决策中的作用中提炼关键发现，旨在识别共同线索，辨别新兴模式，并构建一个理论基础，该基础能够包含有效策略的细微差别。这一理论基础，基于协作决策和ChatGPT的局限性，为提出的实用方法提供了一个概念框架，确保了理论原则与可执行策略的无缝整合。在综合阶段确定的关键变量在后续章节中设计调查以进行经验验证时发挥着至关重要的作用，形成了理论洞察与经验证据之间的方法论桥梁（Margerum,
    2002）。
- en: 18.2 Literature Review
  id: totrans-3144
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 18.2 文献综述
- en: 18.2.1 Overview of AI in Education
  id: totrans-3145
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 18.2.1 教育领域人工智能概述
- en: The integration of AI into educational settings represents a significant milestone
    in the evolution of pedagogy ([Adiguzel et al., 2023](#ch26.xhtml#r828)). To comprehend
    the current landscape, it is imperative to trace the historical context and the
    nuanced evolution of AI tools within educational domains. The journey of AI in
    education has witnessed transformative advancements, ranging from rule-based systems
    to the advent of sophisticated language models like ChatGPT ([Jeon & Lee, 2023](#ch26.xhtml#r853)).
  id: totrans-3146
  prefs: []
  type: TYPE_NORMAL
  zh: AI在教育环境中的整合是教学演变中的一个重要里程碑 ([Adiguzel et al., 2023](#ch26.xhtml#r828))。为了理解当前的局面，追溯AI工具在教育领域的历史背景和细微演变是至关重要的。教育领域AI的旅程见证了从基于规则的系统到ChatGPT等复杂语言模型的出现等一系列变革性进步
    ([Jeon & Lee, 2023](#ch26.xhtml#r853))。
- en: In exploring the historical trajectory, we unravel the progression from early
    AI applications focused on automating administrative tasks to the contemporary
    era characterized by the infusion of AI into instructional methodologies ([Bierhals
    et al., 2007](#ch26.xhtml#r834); [Darban et al., 2023](#ch26.xhtml#r839)). The
    evolution of AI tools in education mirrors broader technological trends, with
    each phase contributing to the enhancement of learning experiences, personalized
    instruction, and the potential to revolutionize educational paradigms ([Bhutoria,
    2022](#ch26.xhtml#r833)).
  id: totrans-3147
  prefs: []
  type: TYPE_NORMAL
  zh: 在探索历史轨迹时，我们揭示了从早期专注于自动化行政任务的AI应用到当代将AI融入教学方法的时代的演变 ([Bierhals et al., 2007](#ch26.xhtml#r834);
    [Darban et al., 2023](#ch26.xhtml#r839))。教育领域AI工具的演变反映了更广泛的技术趋势，每个阶段都对学习体验、个性化指导和可能革命化教育范式的潜力做出了贡献
    ([Bhutoria, 2022](#ch26.xhtml#r833))。
- en: A significant focal point within the realm of AI in education is the pervasive
    influence of language models, with ChatGPT emerging as a prominent player ([Adiguzel
    et al., 2023](#ch26.xhtml#r828); [Darban et al., 2023](#ch26.xhtml#r839)). The
    existing literature provides a comprehensive examination of the impact of ChatGPT
    in various educational domains, shedding light on its applications, benefits,
    and limitations ([Jeon & Lee, 2023](#ch26.xhtml#r853)). Researchers have scrutinized
    the efficacy of ChatGPT in tasks such as automated content generation, language
    comprehension, and interactive tutoring, offering nuanced perspectives on its
    potential contributions to the educational landscape ([Baidoo-Anu & Ansah, 2023](#ch26.xhtml#r830)).
  id: totrans-3148
  prefs: []
  type: TYPE_NORMAL
  zh: 在教育领域的人工智能领域，语言模型的影响无处不在，ChatGPT的崛起成为了一个突出的参与者 ([Adiguzel et al., 2023](#ch26.xhtml#r828);
    [Darban et al., 2023](#ch26.xhtml#r839))。现有文献对ChatGPT在各个教育领域的影响进行了全面考察，揭示了其应用、益处和局限性
    ([Jeon & Lee, 2023](#ch26.xhtml#r853))。研究人员对ChatGPT在自动内容生成、语言理解和交互式辅导等任务中的有效性进行了审查，提供了对其对教育领域潜在贡献的细致视角
    ([Baidoo-Anu & Ansah, 2023](#ch26.xhtml#r830))。
- en: However, as we delve into the current research landscape, it becomes evident
    that gaps and challenges persist in the effective integration of ChatGPT in education
    ([Kasneci et al., 2023](#ch26.xhtml#r856)). The existing literature highlights
    areas where AI tools, including ChatGPT, may fall short in meeting the diverse
    needs of learners and educators ([Crawford et al., 2023](#ch26.xhtml#r838)). Challenges
    range from issues related to bias and ethical considerations in AI-generated content
    to concerns about the adaptability of these tools to the intricate demands of
    specific educational disciplines ([Mhlanga, 2023](#ch26.xhtml#r865)).
  id: totrans-3149
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，当我们深入研究当前的研究领域时，很明显，ChatGPT在教育中有效整合的差距和挑战仍然存在([Kasneci等人，2023](#ch26.xhtml#r856))。现有文献突出了AI工具，包括ChatGPT，可能在满足学习者和教育者的多样化需求方面存在不足的领域([Crawford等人，2023](#ch26.xhtml#r838))。挑战范围从与AI生成内容相关的偏见和伦理问题到这些工具适应特定教育学科复杂需求的能力的担忧([Mhlanga，2023](#ch26.xhtml#r865))。
- en: Identifying these gaps and challenges is paramount for steering the discourse
    toward a more comprehensive understanding of the role of ChatGPT in education
    ([Kasneci et al., 2023](#ch26.xhtml#r856)). It sets the stage for our exploration
    of management education, where the challenges and opportunities posed by ChatGPT
    become particularly pronounced. By grounding our literature review in the historical
    evolution of AI in education, evaluating the impact of ChatGPT, and discerning
    gaps in the current research landscape, we lay a robust foundation for the subsequent
    sections that delve into the specific dynamics of management education.
  id: totrans-3150
  prefs: []
  type: TYPE_NORMAL
  zh: 识别这些差距和挑战对于引导讨论，以更全面地理解ChatGPT在教育中的作用至关重要([Kasneci等人，2023](#ch26.xhtml#r856))。它为我们的管理教育探索奠定了基础，其中ChatGPT带来的挑战和机遇尤为突出。通过将我们的文献综述建立在教育中AI历史演变的基础上，评估ChatGPT的影响，并辨别当前研究领域的空白，我们为深入探讨管理教育特定动态的后续章节奠定了坚实的基础。
- en: 18.2.2 Role of ChatGPT in Management Education
  id: totrans-3151
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 18.2.2 ChatGPT在管理教育中的作用
- en: Researchers have conducted thorough investigations into the use of ChatGPT as
    a teaching tool, assessing its effectiveness in improving the educational experience
    for management students ([Al-Samarraie & Saeed, 2018](#ch26.xhtml#r829)). These
    studies explore the various approaches educators take, ranging from using ChatGPT
    for automated content creation to employing it as a facilitator for interactive
    learning experiences ([Castro, 2019](#ch26.xhtml#r836)). Analyzing these studies
    provides insights into the diverse applications of ChatGPT in the context of management
    education.
  id: totrans-3152
  prefs: []
  type: TYPE_NORMAL
  zh: 研究人员对ChatGPT作为教学工具的使用进行了彻底的调查，评估了其在改善管理学生教育体验方面的有效性([Al-Samarraie和Saeed，2018](#ch26.xhtml#r829))。这些研究探讨了教育者采取的各种方法，从使用ChatGPT进行自动内容创建到将其作为互动学习体验的促进者([Castro，2019](#ch26.xhtml#r836))。分析这些研究为ChatGPT在管理教育背景下的多样化应用提供了见解。
- en: However, it is crucial to analyze the effectiveness and limitations of ChatGPT
    in developing critical managerial skills for a nuanced understanding of its impact.
    While ChatGPT excels in generating text and simulating conversations, its ability
    to instill the complex decision-making, strategic thinking, and leadership skills
    crucial for managerial roles requires careful examination ([Johnson et al., 2008](#ch26.xhtml#r854)).
    Studies have delved into the outcomes of integrating ChatGPT into management courses,
    evaluating its role in fostering the practical skills needed in real-world managerial
    situations.
  id: totrans-3153
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，分析ChatGPT在培养关键管理技能方面的有效性和局限性，对于深入理解其影响至关重要。尽管ChatGPT在生成文本和模拟对话方面表现出色，但其培养复杂决策、战略思维和领导技能的能力，这些对于管理角色至关重要，需要仔细考察([Johnson等人，2008](#ch26.xhtml#r854))。研究已经深入探讨了将ChatGPT整合到管理课程中的结果，评估其在培养现实世界管理情境中所需实践技能方面的作用。
- en: The synthesis of findings from these studies is a pivotal point in our exploration,
    revealing a multifaceted landscape. While ChatGPT shows promise in automating
    certain instructional aspects and enhancing content understanding, its limitations
    become apparent in cultivating the nuanced skills demanded by managerial roles
    ([Kokina & Davenport, 2017](#ch26.xhtml#r859)). This synthesis forms the basis
    for our argument that a complementary approach is essential, one that harnesses
    the strengths of ChatGPT while addressing its current constraints through the
    strategic integration of collaborative decision-making processes ([Margerum, 2002](#ch26.xhtml#r864);
    [Darban et al., 2023](#ch26.xhtml#r839)).
  id: totrans-3154
  prefs: []
  type: TYPE_NORMAL
  zh: 这些研究结果的综合是我们探索的关键点，揭示了一个多方面的景象。虽然ChatGPT在自动化某些教学方面和增强内容理解方面显示出潜力，但其局限性在培养管理角色所需的细微技能方面变得明显（[Kokina
    & Davenport, 2017](#ch26.xhtml#r859)）。这种综合构成了我们论点的基石，即互补方法至关重要，这种方法利用ChatGPT的优势，并通过战略整合协作决策过程来解决其当前的局限性（[Margerum,
    2002](#ch26.xhtml#r864)；[Darban et al., 2023](#ch26.xhtml#r839)）。
- en: The need for complementary strategies becomes evident as we navigate through
    the synthesis of findings. Recognizing the unique contributions of ChatGPT and
    understanding its limitations, our discussion shifts toward proposing strategies
    that go beyond the capabilities of ChatGPT alone ([Rudolph et al., 2023](#ch26.xhtml#r873)).
    By doing so, we aim to provide educators in management education with a comprehensive
    framework that not only acknowledges the potential of AI but actively enhances
    the learning experience by incorporating collaborative decision-making strategies
    ([Peimani & Kamalipour, 2021](#ch26.xhtml#r869)). This synthesis lays the groundwork
    for the subsequent sections, where we delve into the theoretical foundations and
    empirical evidence supporting our proposed approaches.
  id: totrans-3155
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们通过综合研究结果进行导航时，互补策略的需求变得明显。认识到ChatGPT的独特贡献并了解其局限性，我们的讨论转向提出超越ChatGPT自身能力的策略（[Rudolph
    et al., 2023](#ch26.xhtml#r873)）。通过这样做，我们旨在为管理教育中的教育工作者提供一个全面的框架，该框架不仅承认AI的潜力，而且通过纳入协作决策策略来积极增强学习体验（[Peimani
    & Kamalipour, 2021](#ch26.xhtml#r869)）。这种综合为后续章节奠定了基础，我们将深入探讨支持我们提出的方法的理论基础和实证证据。
- en: 18.2.3 Collaborative Decision-Making in Education
  id: totrans-3156
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 18.2.3 教育中的协作决策
- en: Collaborative decision-making relies on theories from organizational psychology,
    social cognition, and education. Social Constructivism, a key framework, says
    knowledge is built through social interactions, aligning well with collaborative
    decision-making. It emphasizes creating meaning together and sharing knowledge
    ([Kalina & Powell, 2009](#ch26.xhtml#r855)). Another important theory is Shared
    Mental Models, from cognitive psychology. It suggests good decision-making happens
    when group members share common mental models. Collaborative decision-making actively
    works to develop shared mental models, making the group more cohesive and improving
    decisions ([Denzau & North, 1994](#ch26.xhtml#r841)). Distributed Cognition, rooted
    in the idea that decision-making involves the collective intelligence of a group,
    is another critical perspective ([Hutchins, 2000](#ch26.xhtml#r852)). This theoretical
    foundation highlights how collaborative decision-making is interconnected, stressing
    shared cognitive processes that lead to effective group decisions.
  id: totrans-3157
  prefs: []
  type: TYPE_NORMAL
  zh: 协作决策依赖于组织心理学、社会认知和教育理论。社会建构主义，作为一个关键框架，认为知识是通过社会互动构建的，与协作决策相吻合。它强调共同创造意义和共享知识（[Kalina
    & Powell, 2009](#ch26.xhtml#r855)）。另一个重要的理论是共享心智模型，来自认知心理学。它表明，当小组成员共享共同的心智模型时，良好的决策才会发生。协作决策积极致力于发展共享心智模型，使小组更加团结，并提高决策质量（[Denzau
    & North, 1994](#ch26.xhtml#r841)）。分布式认知，根植于决策涉及群体集体智慧的理念，是另一个关键视角（[Hutchins, 2000](#ch26.xhtml#r852)）。这一理论基础突出了协作决策的相互关联性，强调了导致有效群体决策的共享认知过程。
- en: Research consistently shows that collaboration positively affects learning outcomes.
    There are practical strategies to use collaborative decision-making for educational
    benefits. Project-Based Learning (PBL) is one approach where students work on
    real-world projects, encouraging collaboration and decision-making ([de Los Rios
    et al., 2010](#ch26.xhtml#r840)). Online Collaborative Platforms offer virtual
    spaces for collaborative decision-making, overcoming geographical constraints
    ([Peimani & Kamalipour, 2021](#ch26.xhtml#r869)). Case-Based Learning, involving
    real-world cases, encourages students to analyze and decide on solutions together,
    improving decision-making skills ([Kolodner et al., 1996](#ch26.xhtml#r860)).
  id: totrans-3158
  prefs: []
  type: TYPE_NORMAL
  zh: 研究一致表明，协作对学习成果有积极影响。有实用的策略可以利用协作决策来获得教育效益。基于项目的学习（PBL）是一种方法，其中学生参与真实世界的项目，鼓励协作和决策（[de
    Los Rios et al., 2010](#ch26.xhtml#r840)）。在线协作平台为协作决策提供虚拟空间，克服了地理限制（[Peimani &
    Kamalipour, 2021](#ch26.xhtml#r869)）。基于案例的学习，涉及真实案例，鼓励学生共同分析和决定解决方案，提高决策技能（[Kolodner
    et al., 1996](#ch26.xhtml#r860)）。
- en: In management education, collaborative decision-making is vital for developing
    decision-making skills. Simulations and Business Games put students in decision-making
    scenarios, promoting collaborative problem-solving ([Vos, 2015](#ch26.xhtml#r878)).
    Interdisciplinary Collaborations enrich decision-making perspectives by involving
    management students with peers from other disciplines ([Pennington, 2008](#ch26.xhtml#r870)).
    Industry–University Partnerships give students real-world decision-making experiences,
    collaborating with industry partners on projects ([Tener, 1996](#ch26.xhtml#r876)).
  id: totrans-3159
  prefs: []
  type: TYPE_NORMAL
  zh: 在管理教育中，协作决策对于培养决策技能至关重要。模拟和商业游戏将学生置于决策场景中，促进协作问题解决（[Vos, 2015](#ch26.xhtml#r878)）。跨学科合作通过涉及来自其他学科的管理学生来丰富决策视角（[Pennington,
    2008](#ch26.xhtml#r870)）。产业-大学伙伴关系为学生提供真实世界的决策经验，与产业合作伙伴在项目上进行合作（[Tener, 1996](#ch26.xhtml#r876)）。
- en: Human-in-the-Loop Approaches involve human oversight in AI-generated content
    for accuracy ([Zanzotto, 2019](#ch26.xhtml#r881)). Ethical Decision-Making Modules
    address biases in AI-generated content, integrating discussions on AI ethics within
    management courses ([Drumwright et al., 2015](#ch26.xhtml#r843)). Customizable
    AI Tools, like ChatGPT tailored for management education, enhance alignment with
    educational objectives ([Kokina & Davenport, 2017](#ch26.xhtml#r859)). These practical
    applications show how collaborative decision-making is integrated into management
    education.
  id: totrans-3160
  prefs: []
  type: TYPE_NORMAL
  zh: 闭环人类方法涉及人类对AI生成内容的监督以确保准确性（[Zanzotto, 2019](#ch26.xhtml#r881)）。道德决策模块解决AI生成内容中的偏见，将关于AI伦理的讨论整合到管理课程中（[Drumwright
    et al., 2015](#ch26.xhtml#r843)）。可定制的AI工具，如为管理教育量身定制的ChatGPT，增强了与教育目标的契合度（[Kokina
    & Davenport, 2017](#ch26.xhtml#r859)）。这些实际应用展示了协作决策如何融入管理教育。
