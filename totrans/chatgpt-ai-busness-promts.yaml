  prefs: []
  type: TYPE_NORMAL
- en: Are you even a social media marketer if you don't run out of creative ideas
    while brainstorming? Have you ever felt frustrated when attempting to fit a tweet
    into a limited character count?
  prefs: []
  type: TYPE_NORMAL
- en: At times like these, a new perspective can be lifesaving. Instead of bouncing
    your head off the wall, use something to bounce ideas off of.
  prefs: []
  type: TYPE_NORMAL
- en: AI tools can help you overcome these obstacles in seconds. With a simple prompt,
    you can create high-quality content to maintain a strong social media presence.
  prefs: []
  type: TYPE_NORMAL
- en: Here are some examples of how AI tools can help.
  prefs: []
  type: TYPE_NORMAL
- en: Generate new content ideas.
  prefs: []
  type: TYPE_NORMAL
- en: An AI prompt can save time and reduce stress when brainstorming new social media
    post ideas.
  prefs: []
  type: TYPE_NORMAL
- en: Let's say you're working for a new client. Jake's Cakes is a local bakery.
  prefs: []
  type: TYPE_NORMAL
- en: (Yes, I did want the name to rhyme.)
  prefs: []
  type: TYPE_NORMAL
- en: It is late November, so you know what that means. Holiday season. It has arrived
    and is operating at full capacity.
  prefs: []
  type: TYPE_NORMAL
- en: You need to develop some awesome tweets, but all you can think of right now
    are terrible puns.
  prefs: []
  type: TYPE_NORMAL
- en: Merry Cakemas? Seriously? What were your thoughts?
  prefs: []
  type: TYPE_NORMAL
- en: You only need a small spark to nudge your brain in the right direction.
  prefs: []
  type: TYPE_NORMAL
- en: Well, the right prompt can help you generate ideas and jumpstart your content
    creation process.
  prefs: []
  type: TYPE_NORMAL
- en: Here's how it appears in Planable.
  prefs: []
  type: TYPE_NORMAL
- en: Find the right phrase.
  prefs: []
  type: TYPE_NORMAL
- en: When it comes to creating content, every word matters. Sometimes we can spend
    hours agonizing over how to phrase something, which is understandable.
  prefs: []
  type: TYPE_NORMAL
- en: Perhaps you already have an idea for a social media post. You are confident
    in the overall message, but something feels off. Or you just can't seem to find
    the right way to finish it off.
  prefs: []
  type: TYPE_NORMAL
- en: AI copywriting tools can help in this situation. Turn to AI to help you get
    over the final hurdle. You can show the tool what you have so far and ask for
    suggestions. It's an excellent way to incorporate some unconventional thinking
    into your social media posts.
  prefs: []
  type: TYPE_NORMAL
- en: Remember, if you're not satisfied with the proposals, the retry button is your
    friend. You can also make a few minor changes to your prompt to generate slightly
    different results.
  prefs: []
  type: TYPE_NORMAL
- en: Rewrite drafts and repurpose old posts.
  prefs: []
  type: TYPE_NORMAL
- en: When you finish a draft of a social media post, it doesn't mean it's ready to
    go live. A feedback and approval process is necessary to ensure alignment with
    your brand's social media strategy.
  prefs: []
  type: TYPE_NORMAL
- en: Occasionally, feedback may necessitate a rewrite.
  prefs: []
  type: TYPE_NORMAL
- en: When this happens, AI prompts can help you make the necessary changes quickly.
    For example, you may receive feedback on a post stating that while the message
    is good, the tone of voice should be more professional.
  prefs: []
  type: TYPE_NORMAL
- en: In this case, you can send the original draft to the AI tool and instruct it
    to rewrite the post in the appropriate tone. You can even request multiple versions
    so you have more options.
  prefs: []
  type: TYPE_NORMAL
- en: This is also useful when looking for ways to repurpose an existing post on other
    social media platforms. To create a Twitter thread from a YouTube video script,
    follow these tips.
  prefs: []
  type: TYPE_NORMAL
- en: 'Bonus tip 1: You can use an AI prompt to paraphrase engaging content from another
    brand or to suggest a social media post based on a snippet of a blog post.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Bonus tip 2: A paraphrase prompt is useful for creating variations of the same
    post for different team members to use when sharing new content.'
  prefs: []
  type: TYPE_NORMAL
- en: How to structure an AI prompt for optimal results
  prefs: []
  type: TYPE_NORMAL
- en: It's difficult to consistently create content that truly resonates with your
    target audience. AI tools are extremely useful, but there are still things to
    consider when creating prompts. After all, you want to get the best results that
    will enhance your social media marketing efforts.
  prefs: []
  type: TYPE_NORMAL
- en: With that in mind, here are some tips for structuring your prompts to achieve
    the best results.
  prefs: []
  type: TYPE_NORMAL
- en: Provide context.
  prefs: []
  type: TYPE_NORMAL
- en: As a content marketer, I've lost count of how many articles have told me that
    'content is king.'. In the age of artificial intelligence, that phrase may well
    become 'context is king.'.
  prefs: []
  type: TYPE_NORMAL
- en: Why?
  prefs: []
  type: TYPE_NORMAL
- en: It's simple. When you give an AI tool more information about what you want,
    it will be able to generate content that is more likely to match your expectations.
  prefs: []
  type: TYPE_NORMAL
- en: Say you want a pepperoni pizza with extra cheese and a thick crust. You wouldn't
    just call your local pizza parlor and say, "Yo, gimme one of those pizzas."
  prefs: []
  type: TYPE_NORMAL
- en: I mean, you could, but your chances of getting what you want are slim. You'd
    need to be specific to get the right pizza.
  prefs: []
  type: TYPE_NORMAL
- en: AI prompts function in much the same way. If you provide more context to help
    the tool understand your goals and preferences, you will be much more likely to
    receive a satisfactory response.
  prefs: []
  type: TYPE_NORMAL
- en: Keep the following points in mind when writing your prompts, and you will see
    significantly better results.
  prefs: []
  type: TYPE_NORMAL
- en: 1\. Be specific.
  prefs: []
  type: TYPE_NORMAL
- en: When you ask an AI tool to assist you with a social media post, make sure to
    provide some specifics. For example, should it include hashtags or emojis? Do
    you want it to generate a list? Make it clear in your prompt.
  prefs: []
  type: TYPE_NORMAL
- en: You should also be specific about the length of a post. The request for "a fairly
    short promotional LinkedIn post" leaves too much room for interpretation of what
    fairly short means. Instead, you can request "a promotional LinkedIn post that
    is 2-3 sentences long.".
  prefs: []
  type: TYPE_NORMAL
- en: 2\. Establish the format.
  prefs: []
  type: TYPE_NORMAL
- en: Each social media platform has specific formats that work well. A funny tweet
    follows a completely different format than an inspirational LinkedIn post. When
    using an AI tool, specify both the desired writing style and content.
  prefs: []
  type: TYPE_NORMAL
- en: 3\. Be as specific and descriptive as possible.
  prefs: []
  type: TYPE_NORMAL
- en: Give the tool as much key information as possible. There is a significant difference
    between the output you will receive when you provide a basic prompt and one with
    additional details.
  prefs: []
  type: TYPE_NORMAL
- en: 'A basic prompt could be something like:'
  prefs: []
  type: TYPE_NORMAL
- en: Create a social media post promoting Jake's Cakes.
  prefs: []
  type: TYPE_NORMAL
- en: 'A prompt that provides more information could be:'
  prefs: []
  type: TYPE_NORMAL
- en: '"Act as a social media marketing expert and create an engaging Facebook post
    to promote Jake''s Cakes'' upcoming community event. The event is called Jake''s
    Big Bake Off and will take place on December 5th. It includes a guest celebrity
    appearance by Gordon Ramsay. Use the hashtag #JakesBigBakeOff.'
  prefs: []
  type: TYPE_NORMAL
- en: However, it is also important to avoid unnecessary information, so do not include
    extra detail just for the sake of it.
  prefs: []
  type: TYPE_NORMAL
- en: Define the tone of voice.
  prefs: []
  type: TYPE_NORMAL
- en: Each brand has a unique social media presence. It feels different.
  prefs: []
  type: TYPE_NORMAL
- en: You would never confuse a Chipotle tweet with a Visa tweet. Even if I hid the
    logos and only showed you the messages, you'd know which was which.
  prefs: []
  type: TYPE_NORMAL
- en: That is largely due to the established tone of voice that each brand employs
    on the platform.
  prefs: []
  type: TYPE_NORMAL
- en: Maintain a consistent tone of voice when creating AI content prompts. Make it
    clear how you want the response to sound.
  prefs: []
  type: TYPE_NORMAL
- en: Looking for a more inspirational social media message? Great. Tell the AI tool
    to make it sound positive or to use a hopeful tone of voice. This ensures that
    the generated content matches your expectations.
  prefs: []
  type: TYPE_NORMAL
- en: Set limitations.
  prefs: []
  type: TYPE_NORMAL
- en: It is reasonable to expect that AI tools understand social media platforms to
    some extent. If you ask for a series of Twitter posts, all of the results will
    be within the standard 280-character limit, correct?
  prefs: []
  type: TYPE_NORMAL
- en: No, actually. You will occasionally receive tweet recommendations that exceed
    500 characters.
  prefs: []
  type: TYPE_NORMAL
- en: Similarly, when requesting a LinkedIn post, an AI tool may fail to account for
    the platform's 140-character limit. That's when they see more' button appear.
  prefs: []
  type: TYPE_NORMAL
- en: To ensure that platform-specific details like this are taken into account, include
    limitations in your prompt.
  prefs: []
  type: TYPE_NORMAL
- en: For example, a prompt for a LinkedIn story could state, "Limit the opening line
    to 20 words and include a hook that makes me want to read on."
  prefs: []
  type: TYPE_NORMAL
- en: You can also set a limitation by excluding a word or phrase. Sometimes brand
    guidelines prohibit you from using specific language because it is part of a competitor's
    core messaging.
  prefs: []
  type: TYPE_NORMAL
- en: In any situation like this, make sure the AI tool understands not to use the
    term.
  prefs: []
  type: TYPE_NORMAL
- en: Ask for multiple versions.
  prefs: []
  type: TYPE_NORMAL
- en: To ensure success, it's crucial to request multiple variations. Whether you're
    brainstorming ideas for new social media posts in the early stages of content
    creation or putting the finishing touches on a draft, seeing multiple versions
    is always beneficial.
  prefs: []
  type: TYPE_NORMAL
- en: This is also incredibly simple to do. When writing an AI prompt, instead of
    asking for a single output like "Write a catchy Facebook post," aim for multiple
    outputs like "Propose five versions of a catchy Facebook post."
  prefs: []
  type: TYPE_NORMAL
