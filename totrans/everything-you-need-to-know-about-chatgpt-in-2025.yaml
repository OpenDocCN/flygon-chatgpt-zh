  zh: '**提示链式**是一种技术，它将一个复杂的任务分解成几个更小、更易于管理的步骤，并构建与模型的持续对话。而不是期望ChatGPT在一次尝试中生成一个针对复杂请求的完整响应，提示链式允许模型逐步引导到期望的结果。'
