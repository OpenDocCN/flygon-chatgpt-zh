  type: TYPE_NORMAL
- en: HISTOGRAMS
  prefs: []
  type: TYPE_NORMAL
- en: '![image](images/pg113.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 'This chapter introduces a powerful visualization tool for numerical (continuous)
    variables: the histogram. It helps us visualize the distribution of a column of
    numbers in our table. By using a histogram, we can see if there are many large
    numbers, many small numbers, or if they are distributed around the mean or average.'
  prefs: []
  type: TYPE_NORMAL
- en: 'This technique addresses the following business question: “How is this variable
    distributed?”'
  prefs: []
  type: TYPE_NORMAL
- en: We break down the entire range of values in our dataset into intervals from
    the highest to the lowest. Then, we tally the number of data points that fall
    into each interval and create a bar graph to display the count in each interval.
    This process involves grouping the numerical variable into bins, which can be
    of equal or different sizes, and there can be many or few bins. Our goal is to
    categorize the data into these segments.
  prefs: []
  type: TYPE_NORMAL
- en: Histograms play a crucial role in data analysis by providing a visual summary
    of large datasets. They offer insights into the underlying distribution of data,
    revealing important characteristics that might be obscured in raw numbers or tables.
    Analysts rely on histograms to quickly identify patterns, detect anomalies, and
    understand the shape of data distributions. This visual tool aids in hypothesis
    formation, guides further statistical analysis, and supports decision-making processes.
    Histograms are particularly valuable in exploratory data analysis, helping researchers
    gain initial insights and determine appropriate analytical approaches.
  prefs: []
  type: TYPE_NORMAL
- en: Excel contains a function called “Frequency,” but it is challenging to use.
    The Analysis ToolPak, however, has a tool called “Histogram” that automates many
    tasks. Always request the chart to be generated and ensure to adjust the resulting
    bar graph so that the bars touch each other. This will give it the distinctive
    look of a histogram rather than just a bar graph.
  prefs: []
  type: TYPE_NORMAL
- en: Histograms
  prefs: []
  type: TYPE_NORMAL
- en: What is a Histogram?
  prefs: []
  type: TYPE_NORMAL
- en: A histogram is a graphical representation that shows the distribution of numerical
    data. It is made up of bars, where each bar represents a range of values called
    bins, and the height of each bar shows the frequency of data points within that
    bin. This visual format makes it easier to understand large sets of data by displaying
    the distribution of values and their frequency. Histograms are particularly useful
    in revealing the shape of the data distribution, whether it is skewed to one side,
    symmetric, or has outliers. They are essential for identifying characteristics
    like central tendency, spread, and shape of the data distribution, making them
    a staple in an EDA.
  prefs: []
  type: TYPE_NORMAL
- en: When creating a histogram, the first step is to divide the entire range of values
    into a series of intervals or bins. Next, we count how many values fall into each
    interval. The x-axis of the histogram represents these intervals, while the y-axis
    shows the frequency or count of data points in each interval. It is important
    to carefully choose the bin size and range as it significantly affects the appearance
    and interpretability of the histogram. Histograms are especially useful for large
    datasets where patterns and structures might not be immediately apparent, as they
    condense data into a form that is easier to analyze and interpret.
  prefs: []
  type: TYPE_NORMAL
- en: Histograms are widely utilized across various disciplines, including statistics,
    economics, and data science, for their ability to provide a clear and concise
    overview of data distributions. They aid in uncovering underlying patterns, trends,
    and potential anomalies in datasets, which are critical for accurate analysis
    and decision-making. Histograms are a preliminary step in data analysis, often
    used before applying more complex statistical techniques. By presenting a visual
    summary of data, histograms facilitate hypothesis formation, research direction,
    and can guide more detailed statistical analysis. They are invaluable in transforming
    raw data into understandable and actionable insights, forming the backbone of
    effective data visualization and analysis.
  prefs: []
  type: TYPE_NORMAL
- en: What Are the Elements of Histograms?
  prefs: []
  type: TYPE_NORMAL
- en: The elements or components of histograms, which contribute to their effectiveness
    as a tool for data visualization and analysis, include
  prefs: []
  type: TYPE_NORMAL
- en: '**1.**Bins (or bars): Bins are the core component of a histogram. Each bin
    represents a range of values, and the width of each bin is uniform across the
    histogram. The number of bins and the range they cover can significantly influence
    the histogram’s interpretation, as they determine the level of granularity of
    the data representation.'
  prefs: []
  type: TYPE_NORMAL
- en: '**2.**Frequency: This refers to the number of data points within each bin.
    The height of each bin (bar) in a histogram corresponds to the frequency, indicating
    how many data points fall into that specific range. The frequency can either be
    absolute (actual count of data points) or relative (proportion or percentage of
    the total data).'
  prefs: []
  type: TYPE_NORMAL
- en: '**3.**X-axis (horizontal axis): The x-axis represents the intervals or categories
    into which the data is divided. In histograms, this axis will display the range
    of values into which the data is binned. The scale and range of the x-axis need
    to be chosen carefully to accurately reflect the data distribution.'
  prefs: []
  type: TYPE_NORMAL
- en: '**4.**Y-axis (vertical axis): The y-axis shows the frequency of data points
    for each bin. It can represent the count (number of data points) or the density
    (frequency relative to the bin width) for each bin. The scale of the y-axis is
    determined by the frequencies of the data points.'
  prefs: []
  type: TYPE_NORMAL
- en: '**5.**Title and labels: A clear title and axis labels are essential for understanding
    a histogram. The title typically summarizes what the histogram represents, while
    the labels for the x-axis and y-axis clarify what the bins and their heights represent,
    respectively.'
  prefs: []
  type: TYPE_NORMAL
- en: '**6.**Gaps between bins: Unlike bar charts, histograms typically do not have
    gaps between bins, unless there is a gap in the data, which emphasizes that the
    data is continuous and the bins are adjacent intervals. Sometimes, a very small
    gap between bars is present for clarity, or each bar has an outline for clarity;
    otherwise, it may look like an area chart, which is not as useful. Each bar should
    maintain its distinct character as it represents a data range.'
  prefs: []
  type: TYPE_NORMAL
- en: '**7.**Optional elements: Depending on the purpose, histograms may also include
    additional elements like a mean line (representing the average of the data), mode
    indicators, or annotations highlighting specific features of the data distribution.'
  prefs: []
  type: TYPE_NORMAL
- en: An Example of Creating Histograms for a Dataset
  prefs: []
  type: TYPE_NORMAL
- en: 'Here is an example of creating histograms for the ORDERS.xlsx dataset found
    in the Case Data folder:'
  prefs: []
  type: TYPE_NORMAL
- en: '![image](images/pg117.jpg)'
  prefs: []
  type: TYPE_IMG
- en: FIGURE 6.1 Example of a histogram showing the distribution of sales
  prefs: []
  type: TYPE_NORMAL
- en: In the ORDERS dataset, we use a histogram ([Figure 6.1](#fig6-1)) to visualize
    the distribution of sales amounts, offering a clear example of histograms in data
    analysis. The histogram is created from the SALES column, where each bar represents
    a range of sales values. The height of each bar shows the number of orders that
    fall into that sales range, making it easy to see where sales are concentrated.
  prefs: []
  type: TYPE_NORMAL
- en: This method simplifies complex data. The x-axis shows sales amounts divided
    into bins, and the y-axis represents the number of orders per bin. Analyzing the
    histogram helps identify patterns, such as the most common and rare sales ranges.
    This visual tool is essential for quickly understanding the distribution and frequency
    of data, which is crucial for data-driven decision-making and analysis.
  prefs: []
  type: TYPE_NORMAL
