- en: Examining and customizing the ChatGPT-generated code
  id: totrans-2382
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 检查和自定义 ChatGPT 生成的代码
- en: 'One of the best reasons for setting up a home on the web is to showcase your
    personal work or the work of a team, department, or company. Quite a few of this
    book’s projects have served that goal: the personal home page (chapter 3), the
    online journal (chapter 5), the interest or hobby website (chapter 7), and the
    photo gallery (chapter 10).'
  id: totrans-2383
  prefs: []
  type: TYPE_NORMAL
  zh: 在网上建立家园的最好理由之一是展示你的个人作品或团队、部门或公司的作品。本书中的许多项目都是为了实现这一目标：个人主页（第 3 章）、在线日志（第 5
    章）、兴趣或爱好网站（第 7 章）和照片画廊（第 10 章）。
- en: 'In this chapter, you learn yet another page structure for promoting the activities
    of a person, group, or organization: the portfolio page. This page uses images,
    headings, and text to create an efficient and popular page component designed
    to showcase whatever you want other people to see. You also learn various ways
    to customize this component and some techniques that can make your portfolio look
    its best, not only on a large monitor but also on smaller screens—even smartphones.
    You then put all this new HTML and CSS know-how to work to create a detailed prompt
    that enables ChatGPT to generate the web page code for your portfolio page.'
  id: totrans-2384
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，你将学习另一种用于推广个人、团体或组织活动的页面结构：作品集页面。这个页面使用图像、标题和文本来创建一个高效且流行的页面组件，旨在展示你希望其他人看到的内容。你还将学习各种自定义此组件的方法和一些可以使你的作品集看起来最佳的技术，不仅在大型显示器上，也在较小的屏幕上——甚至智能手机上。然后，你将运用所有这些新的
    HTML 和 CSS 知识来创建一个详细的提示，使 ChatGPT 能够生成你的作品集页面的网页代码。
- en: This chapter provides annotated versions of the ChatGPT-generated HTML and CSS
    to help you understand how the portfolio page works. You also get a few useful
    tips for customizing the code.
  id: totrans-2385
  prefs: []
  type: TYPE_NORMAL
  zh: 本章提供了ChatGPT生成的HTML和CSS的注释版本，以帮助您理解投资组合页面是如何工作的。您还可以获得一些自定义代码的实用技巧。
- en: 11.1 Getting to know this chapter’s project
  id: totrans-2386
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 11.1 了解本章的项目
- en: 'This chapter’s project is a portfolio page. The final page will include the
    following components:'
  id: totrans-2387
  prefs: []
  type: TYPE_NORMAL
  zh: 本章的项目是一个投资组合页面。最终页面将包括以下组件：
- en: A header element that includes a logo and title
  id: totrans-2388
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 包含标志和标题的**页眉元素**
- en: A main element that begins with the portfolio title
  id: totrans-2389
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 以投资组合标题开始的**主要元素**
- en: Six cards, each of which shows an item from the portfolio
  id: totrans-2390
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 六张卡片，每张卡片展示投资组合中的一个项目
- en: A footer element that includes a copyright notice
  id: totrans-2391
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 包含版权声明的**页脚元素**
- en: Figure 11.1 shows an example portfolio page created with code supplied by ChatGPT.
  id: totrans-2392
  prefs: []
  type: TYPE_NORMAL
  zh: 图11.1展示了使用ChatGPT提供的代码创建的投资组合页面示例。
- en: '![](../../OEBPS/Images/CH11_F01_McFedries3.png)'
  id: totrans-2393
  prefs: []
  type: TYPE_IMG
  zh: '![](../../OEBPS/Images/CH11_F01_McFedries3.png)'
- en: Figure 11.1 A portfolio page generated by ChatGPT
  id: totrans-2394
  prefs: []
  type: TYPE_NORMAL
  zh: 图11.1 ChatGPT生成的投资组合页面
- en: 'The example page is a portfolio for a book designer, but you can use this kind
    of layout for many other types of content:'
  id: totrans-2395
  prefs: []
  type: TYPE_NORMAL
  zh: 示例页面是一个书籍设计师的投资组合，但您可以使用这种布局来展示许多其他类型的内容：
- en: '*Art*—Paintings, photographs, illustrations, fashion, architecture, interior
    design, writing'
  id: totrans-2396
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**艺术**——绘画、照片、插图、时尚、建筑、室内设计、写作'
- en: '*Work*—Projects, products, events, news, key metrics, educational courses'
  id: totrans-2397
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**工作**——项目、产品、事件、新闻、关键指标、教育课程'
- en: '*People*—Team members, clients, user profiles, testimonials'
  id: totrans-2398
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**人物**——团队成员、客户、用户资料、推荐信'
- en: In short, this is a very versatile layout, and you will start learning how to
    build it in the next section.
  id: totrans-2399
  prefs: []
  type: TYPE_NORMAL
  zh: 简而言之，这是一个非常灵活的布局，您将在下一节开始学习如何构建它。
- en: 11.2 Building the portfolio page
  id: totrans-2400
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 11.2 构建投资组合页面
- en: If you do creative work—illustration, writing, music, fine art—you owe it to
    yourself and your career to put yourself out there and tell the world how talented
    you are. How do you do that? Social media is the standard way of blowing your
    own horn these days. That’s fine, but when you use someone else’s platform to
    talk yourself up, you’re giving up lots of control over how you present yourself.
    It’s always better to control your own message, and the best way to do that is
    to build your own online presence. For creative types, that online stake in the
    ground should include a portfolio page that showcases your best or most recent
    work.
  id: totrans-2401
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您从事创意工作——插画、写作、音乐、美术——您应该为自己和您的职业生涯而自豪，向世界展示您的才华。您该如何做到这一点？如今，社交媒体是吹嘘自己的标准方式。这很好，但当你使用他人的平台来吹嘘自己时，你正在放弃对自己展示方式的许多控制权。始终控制自己的信息会更好，而做到这一点最好的方式是建立自己的在线存在。对于创意人士来说，这种在线存在应该包括一个展示您最好或最新作品的**投资组合页面**。
- en: A *portfolio page* is a web page designed to show off some of (or even all)
    your creative work. It’s the online equivalent of the hard-copy portfolio that
    starving artists have been lugging around from patron to patron and employer to
    employer for decades. The main idea of a portfolio page is to show off your creative
    work to people who may want to buy it or hire you to do your creative thing.
  id: totrans-2402
  prefs: []
  type: TYPE_NORMAL
  zh: '**投资组合页面**是一个网页，旨在展示您的一些（甚至全部）创意作品。它是那些多年来从赞助人到赞助人、从雇主到雇主拖着硬拷贝投资组合的饥饿艺术家的在线等价物。投资组合页面的主要目的是向可能想要购买或雇佣您进行创意工作的人展示您的创意作品。'
- en: However, even if you’re not an artist, a portfolio page is still a great layout
    for showcasing many different types of items, such as products, courses, and employees.
    The main component of a portfolio page is the card, which you learn about next.
  id: totrans-2403
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，即使您不是艺术家，投资组合页面也是一个展示许多不同类型项目的绝佳布局，例如产品、课程和员工。投资组合页面的主要组件是卡片，您将在下一节了解它。
- en: 11.2.1 Building a card
  id: totrans-2404
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 11.2.1 构建卡片
- en: 'A *card*—sometimes called a *user interface card* or a *UI card*—is a special
    collection of HTML tags and CSS properties meant to succinctly and efficiently
    convey information about something, which could be a work of art, an event, a
    project, a person, or whatever items are in your portfolio. A typical card includes
    some or all of the following:'
  id: totrans-2405
  prefs: []
  type: TYPE_NORMAL
  zh: '**卡片**——有时也称为**用户界面卡片**或**UI卡片**——是一组特殊的HTML标签和CSS属性，旨在简洁高效地传达关于某物的信息，这可能是一件艺术品、一个事件、一个项目、一个人或您投资组合中的任何项目。典型的卡片包括以下一些或全部内容：'
- en: '*Image*—A photo, illustration, or other image that provides a preview or representation
    of the item'
  id: totrans-2406
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**图像**——一张照片、插图或其他图像，提供了项目的预览或表示'
- en: '*Heading*—The title or name of the item'
  id: totrans-2407
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*标题*—项目的标题或名称'
- en: '*Text*—A brief description of the item'
  id: totrans-2408
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*文本*—对项目的简要描述'
- en: '*Button or link*—An element that enables the reader to learn more about the
    item or perform an action, such as subscribing to or purchasing the item'
  id: totrans-2409
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*按钮或链接*—允许读者了解更多关于项目或执行操作（如订阅或购买项目）的元素'
- en: There are many ways to organize a card’s information, but two layouts are common.
    The first common layout has the image on top, followed by the heading, the text,
    and then the button or link. Figure 11.2 shows an example.
  id: totrans-2410
  prefs: []
  type: TYPE_NORMAL
  zh: 组织卡片信息的方式有很多种，但两种布局比较常见。第一种常见布局是图片位于顶部，然后是标题、文本，最后是按钮或链接。图11.2展示了示例。
- en: '![](../../OEBPS/Images/CH11_F02_McFedries3.png)'
  id: totrans-2411
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../../OEBPS/Images/CH11_F02_McFedries3.png)'
- en: Figure 11.2 A typical card layout with the information running from the top
    of the card to the bottom
  id: totrans-2412
  prefs: []
  type: TYPE_NORMAL
  zh: 图11.2 一个典型的卡片布局，信息从卡片顶部延伸到卡片底部
- en: 'To prompt ChatGPT to create a card that uses this layout, you’d use an instruction
    similar to the following:'
  id: totrans-2413
  prefs: []
  type: TYPE_NORMAL
  zh: 要提示ChatGPT创建使用此布局的卡片，你可以使用类似以下指令：
- en: '[PRE203]'
  id: totrans-2414
  prefs: []
  type: TYPE_PRE
  zh: '[PRE203]'
- en: The second common layout has the image on one side (it could be the left or
    right), with the heading, text, and button or link on the other side. Figure 11.3
    shows an example.
  id: totrans-2415
  prefs: []
  type: TYPE_NORMAL
  zh: 第二种常见布局是图片位于一侧（可以是左侧或右侧），而标题、文本和按钮或链接位于另一侧。图11.3展示了示例。
- en: '![](../../OEBPS/Images/CH11_F03_McFedries3.png)'
  id: totrans-2416
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../../OEBPS/Images/CH11_F03_McFedries3.png)'
- en: Figure 11.3 A typical card layout with the image on the left and the text on
    the right
  id: totrans-2417
  prefs: []
  type: TYPE_NORMAL
  zh: 图11.3 一个典型的卡片布局，图片位于左侧，文本位于右侧
- en: 'To prompt ChatGPT to create a card that uses this layout, you’d use an instruction
    like the following:'
  id: totrans-2418
  prefs: []
  type: TYPE_NORMAL
  zh: 要提示ChatGPT创建使用此布局的卡片，你可以使用如下指令：
- en: '[PRE204]'
  id: totrans-2419
  prefs: []
  type: TYPE_PRE
  zh: '[PRE204]'
- en: If the designer in you isn’t happy with the whitespace around the image, you
    learn how to fix that in the next section.
  id: totrans-2420
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你对你周围图片的空白区域不满意，你将在下一节中学习如何修复它。
- en: 11.2.2 Making the image extend to the card edges
  id: totrans-2421
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 11.2.2 使图片延伸至卡片边缘
- en: 'One common and attractive card tweak is to have the image extend all the way
    out to the edges of the card:'
  id: totrans-2422
  prefs: []
  type: TYPE_NORMAL
  zh: 一个常见且吸引人的卡片调整是让图片延伸至卡片边缘：
- en: '*If the image is at the top of the card*—The image extends all the way to the
    top, left, and right edges.'
  id: totrans-2423
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*如果图片位于卡片顶部*—图片延伸至顶部、左侧和右侧边缘。'
- en: '*If the image is on the left side of the card*—The image extends all the way
    to the top, left, and bottom edges.'
  id: totrans-2424
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*如果图片位于卡片左侧*—图片延伸至顶部、左侧和底部边缘。'
- en: '*If the image is on the right side of the card*—The image extends all the way
    to the top, right, and bottom edges.'
  id: totrans-2425
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*如果图片位于卡片右侧*—图片延伸至顶部、右侧和底部边缘。'
- en: 'You can ask ChatGPT to configure the card this way by adding something like
    the following to the card prompt from the previous section:'
  id: totrans-2426
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以通过在上一节中卡片提示中添加如下内容来请求ChatGPT配置卡片：
- en: '[PRE205]'
  id: totrans-2427
  prefs: []
  type: TYPE_PRE
  zh: '[PRE205]'
- en: This instruction is suitable for a card with the image on top and results in
    a card that looks like the one shown in figure 11.4.
  id: totrans-2428
  prefs: []
  type: TYPE_NORMAL
  zh: 此指令适用于顶部有图片的卡片，并生成如图11.4所示的卡片。
- en: '![](../../OEBPS/Images/CH11_F04_McFedries3.png)'
  id: totrans-2429
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../../OEBPS/Images/CH11_F04_McFedries3.png)'
- en: Figure 11.4 A card layout where the image extends to the edges of the card
  id: totrans-2430
  prefs: []
  type: TYPE_NORMAL
  zh: 图11.4 一个图片延伸至卡片边缘的卡片布局
- en: Another useful card customize is a drop-shadow, discussed in the next section.
  id: totrans-2431
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个有用的卡片自定义选项是阴影效果，将在下一节中讨论。
- en: 11.2.3 Adding a shadow
  id: totrans-2432
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 11.2.3 添加阴影
- en: 'Notice in figures 11.2, 11.3, and 11.4 that each card has a subtle shadow effect.
    This is called a *drop-shadow* because it makes the card appear as though it is
    raised slightly off the page and therefore has a shadow that “drops” onto the
    background. There are two things to note about these drop-shadow examples:'
  id: totrans-2433
  prefs: []
  type: TYPE_NORMAL
  zh: 注意图11.2、11.3和11.4中的每个卡片都有一个细微的阴影效果。这被称为*阴影效果*，因为它使卡片看起来像是稍微抬离页面，因此有一个“落下”到背景的阴影。关于这些阴影效果的例子有两点需要注意：
- en: 'ChatGPT automatically adds the drop-shadow even when your prompt doesn’t specify
    one. If you don’t want a drop-shadow, you need to include an instruction such
    as the following in your prompt:'
  id: totrans-2434
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 即使你的提示没有指定阴影效果，ChatGPT也会自动添加阴影效果。如果你不希望有阴影效果，你需要在你的提示中包含如下指令：
- en: '[PRE206]'
  id: totrans-2435
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE206]'
- en: The shadow that ChatGPT creates is attractive, but it may not be to your taste.
    For example, you may prefer to have the shadow extend to the right of the card
    by the same amount it extends below the card.
  id: totrans-2436
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: ChatGPT创建的阴影很吸引人，但可能不符合你的口味。例如，你可能更喜欢阴影延伸到卡片右侧的长度与延伸到卡片下方的长度相同。
- en: 'The CSS property that creates the drop-shadow effect is called `box-shadow`,
    and its syntax is shown in figure 11.5\. There are four values you can play around
    with here:'
  id: totrans-2437
  prefs: []
  type: TYPE_NORMAL
  zh: 创建阴影效果的CSS属性称为`box-shadow`，其语法在图11.5中显示。这里有四个你可以调整的值：
- en: '*`x-offset`*—The amount (in pixels) that the shadow is shifted either to the
    right (any positive value) or to the left (any negative value) relative to the
    card'
  id: totrans-2438
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*`x-offset`*—阴影相对于卡片向右（任何正数）或向左（任何负数）移动的像素量'
- en: '*`y-offset`*—The amount (in pixels) that the shadow is shifted either down
    (any positive value) or up (any negative value) relative to the card'
  id: totrans-2439
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*`y-offset`*—阴影相对于卡片向下（任何正数）或向上（任何负数）移动的像素量'
- en: '*`blur`*—The amount (in pixels) that the shadow is blurred, where `0` means
    no blur and higher values make the shadow progressively blurrier'
  id: totrans-2440
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*`blur`*—阴影模糊的像素量，其中`0`表示无模糊，更高的值会使阴影逐渐模糊'
- en: '*`alpha`*—A value between 0 and 1 that defines the transparency of the shadow,
    where `0` means completely transparent and `1` means completely opaque'
  id: totrans-2441
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*`alpha`*—一个介于0和1之间的值，用于定义阴影的透明度，其中`0`表示完全透明，`1`表示完全不透明'
- en: '![](../../OEBPS/Images/CH11_F05_McFedries3.png)'
  id: totrans-2442
  prefs: []
  type: TYPE_IMG
  zh: '![](../../OEBPS/Images/CH11_F05_McFedries3.png)'
- en: Figure 11.5 The syntax of the `box-shadow` property
  id: totrans-2443
  prefs: []
  type: TYPE_NORMAL
  zh: 图11.5 `box-shadow`属性的语法
- en: 'Here’s an example instruction to ChatGPT to add a custom shadow to a card:'
  id: totrans-2444
  prefs: []
  type: TYPE_NORMAL
  zh: 这是向ChatGPT添加自定义阴影到卡片的一个示例指令：
- en: '[PRE207]'
  id: totrans-2445
  prefs: []
  type: TYPE_PRE
  zh: '[PRE207]'
- en: Note Although in this chapter you apply a drop-shadow only to the portfolio
    cards, in practice you can add a drop-shadow to any page element that creates
    a block, including a paragraph, heading, `div` element, or bulleted or numbered
    list.
  id: totrans-2446
  prefs: []
  type: TYPE_NORMAL
  zh: 注意：尽管在本章中你只将阴影应用到投资组合卡片上，但在实践中，你可以将阴影添加到任何创建块状元素的页面元素上，包括段落、标题、`div`元素或项目符号或编号列表。
- en: 'This instruction will produce a box-shadow declaration similar to the following:'
  id: totrans-2447
  prefs: []
  type: TYPE_NORMAL
  zh: 此指令将生成类似于以下内容的阴影声明：
- en: '[PRE208]'
  id: totrans-2448
  prefs: []
  type: TYPE_PRE
  zh: '[PRE208]'
- en: Note Sometimes ChatGPT generates a `box-shadow` value that includes an extra
    number (usually 0) between the *`blur`* number and the `rgba()` function. This
    extra parameter determines the *spread* of the shadow, which is a measure of the
    size of the shadow relative to the card (where `0` means the shadow is the same
    size as the card and higher pixel values expand the size of the shadow).
  id: totrans-2449
  prefs: []
  type: TYPE_NORMAL
  zh: 注意：有时ChatGPT生成的`box-shadow`值在*`blur`*数字和`rgba()`函数之间包含一个额外的数字（通常是0）。这个额外的参数决定了阴影的*扩散*，这是阴影相对于卡片的大小（其中`0`表示阴影与卡片大小相同，更高的像素值会扩大阴影的大小）。
- en: Another effect you can apply to your cards is to round the corners, which is
    the topic of the next section.
  id: totrans-2450
  prefs: []
  type: TYPE_NORMAL
  zh: 你还可以应用到你的卡片上的另一个效果是圆角处理，这是下一节的主题。
- en: 11.2.4 Rounding the corners
  id: totrans-2451
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 11.2.4 圆角处理
- en: 'Examining figures 11.2, 11.3, and 11.4, notice that the corners of each card
    are rounded, which gives the card a softer, more approachable feel. There are
    two things to note about these rounded corners:'
  id: totrans-2452
  prefs: []
  type: TYPE_NORMAL
  zh: 检查图11.2、11.3和11.4，注意每个卡片的角落都是圆角化的，这使卡片看起来更柔和、更易于接近。关于这些圆角需要注意两点：
- en: 'ChatGPT automatically rounds the card corners even when your prompt doesn’t
    ask it to. If you don’t want rounded corners, you need to include an instruction
    such as the following in your prompt:'
  id: totrans-2453
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 即使你的提示没有要求，ChatGPT也会自动将卡片角落圆角化。如果你不希望有圆角，你需要在你的提示中包含如下指令：
- en: '[PRE209]'
  id: totrans-2454
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE209]'
- en: The amount of curvature is variable, and you can also apply the curvature only
    to specific corners.
  id: totrans-2455
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 曲率的量是可变的，你也可以只将曲率应用到特定的角落。
- en: The CSS property that rounds the corners is called `border-radius`, and its
    syntax is shown in figure 11.6.
  id: totrans-2456
  prefs: []
  type: TYPE_NORMAL
  zh: 使角落圆角的CSS属性称为`border-radius`，其语法在图11.6中显示。
- en: '![](../../OEBPS/Images/CH11_F06_McFedries3.png)'
  id: totrans-2457
  prefs: []
  type: TYPE_IMG
  zh: '![](../../OEBPS/Images/CH11_F06_McFedries3.png)'
- en: Figure 11.6 The syntax of the `border-radius` property
  id: totrans-2458
  prefs: []
  type: TYPE_NORMAL
  zh: 图11.6 `border-radius`属性的语法
- en: 'You can adjust four values:'
  id: totrans-2459
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以调整四个值：
- en: '*`top-left`*—The amount (as pixels or a percentage) of curvature to apply to
    the top-left corner of the card'
  id: totrans-2460
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*`top-left`*—应用于卡片左上角的曲率量（以像素或百分比表示）'
- en: '*`top-right`*—The amount (as pixels or a percentage) of curvature to apply
    to the top-right corner of the card'
  id: totrans-2461
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*`top-right`*—应用于卡片右上角的曲率量（以像素或百分比表示）'
- en: '*`bottom-right`*—The amount (as pixels or a percentage) of curvature to apply
    to the bottom-right corner of the card'
  id: totrans-2462
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*`bottom-right`*—应用于卡片右下角的曲率量（以像素或百分比表示）'
- en: '*`bottom-left`*—The amount (as pixels or a percentage) of curvature to apply
    to the bottom-left corner of the card'
  id: totrans-2463
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*`bottom-left`*—应用于卡片左下角的曲率量（以像素或百分比表示）'
- en: Tip A short form that ChatGPT often generates is `border-radius:` *`value`*,
    where *`value`* is the amount (as pixels or a percentage) of curvature to apply
    to all four corners of the card.
  id: totrans-2464
  prefs: []
  type: TYPE_NORMAL
  zh: 小贴士：ChatGPT 常生成的一个简短指令是 `border-radius:` *`value`*，其中 *`value`* 是应用于卡片四个角的所有曲率的量（以像素或百分比表示）。
- en: 'Here’s an example instruction to ChatGPT to add custom rounded corners to a
    card:'
  id: totrans-2465
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个向 ChatGPT 添加自定义圆角到卡片的示例指令：
- en: '[PRE210]'
  id: totrans-2466
  prefs: []
  type: TYPE_PRE
  zh: '[PRE210]'
- en: 'This instruction will produce a `box-shadow` declaration similar to the following:'
  id: totrans-2467
  prefs: []
  type: TYPE_NORMAL
  zh: 此指令将生成一个类似于以下内容的 `box-shadow` 声明：
- en: '[PRE211]'
  id: totrans-2468
  prefs: []
  type: TYPE_PRE
  zh: '[PRE211]'
- en: The final design idea you need to investigate for a portfolio page is ensuring
    that the page displays well on any size screen, which is the subject of the next
    section.
  id: totrans-2469
  prefs: []
  type: TYPE_NORMAL
  zh: 对于作品集页面，你需要调查的最后一个设计想法是确保页面在任何尺寸的屏幕上都能良好显示，这是下一节的主题。
- en: 11.2.5 Making your page responsive
  id: totrans-2470
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 11.2.5 使你的页面响应式
- en: 'As described in chapter 10, the default layout behavior for box-like web page
    elements such as headers, footers, navigation areas, headings, and paragraphs
    is to flow vertically down the page: the second element below the first, the third
    element below the second, and so on. Each item of the portfolio example will also
    be one of these box-like elements: the `div` element. This means if you settle
    for the default layout, your portfolio items will display as a vertical pile,
    which isn’t the most attractive or efficient look.'
  id: totrans-2471
  prefs: []
  type: TYPE_NORMAL
  zh: 如第 10 章所述，对于类似头部、页脚、导航区域、标题和段落这样的盒状网页元素，其默认布局行为是垂直向下流动：第二个元素位于第一个元素下方，第三个元素位于第二个元素下方，依此类推。作品集示例中的每个项目也将是这些盒状元素之一：`div`
    元素。这意味着如果你满足于默认布局，你的作品集项目将以垂直堆叠的形式显示，这不是最吸引人或最有效率的视觉效果。
- en: 'The solution I proposed in chapter 10 was to use Flexbox, which turns a web
    page element into a Flexbox container: items in that container lose their rigid
    default layout behavior and adapt themselves to the browser’s current dimensions.
    For this project, you can prompt ChatGPT to use Flexbox with a simple instruction:'
  id: totrans-2472
  prefs: []
  type: TYPE_NORMAL
  zh: 第 10 章中我提出的解决方案是使用 Flexbox，它将网页元素转换为 Flexbox 容器：该容器中的项目会失去其刚性的默认布局行为，并适应浏览器当前尺寸。对于这个项目，你可以通过一个简单的指令来提示
    ChatGPT 使用 Flexbox：
- en: '[PRE212]'
  id: totrans-2473
  prefs: []
  type: TYPE_PRE
  zh: '[PRE212]'
- en: Note that this prompt includes instructions that set the minimum and maximum
    width of the cards because you don’t want them to get either too big or too small.
  id: totrans-2474
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，这个提示包括设置卡片的最小和最大宽度的指令，因为你不希望它们变得过大或过小。
- en: Enabling the content in the Flexbox container—that is, your portfolio cards—to
    wrap means your layout will adapt itself to the current dimensions of the browser
    window. A layout that does that is called *responsive* and means your portfolio
    will look good on everything from large monitors to tiny smartphone screens.
  id: totrans-2475
  prefs: []
  type: TYPE_NORMAL
  zh: 启用 Flexbox 容器中的内容——即你的作品集卡片——以换行，这意味着你的布局将根据浏览器窗口的当前尺寸自适应。能够做到这一点的布局被称为 *响应式*，这意味着你的作品集将在从大显示器到小巧的手机屏幕上的任何设备上看起来都很好。
- en: 'However, to make your page look its best on the smallest screens, your HTML
    code needs to include the following tag between the `<head>` and `</head>` tags:'
  id: totrans-2476
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，为了使你的页面在小屏幕上看起来最佳，你的 HTML 代码需要在 `<head>` 和 `</head>` 标签之间包含以下标签：
- en: '[PRE213]'
  id: totrans-2477
  prefs: []
  type: TYPE_PRE
  zh: '[PRE213]'
- en: 'This tag does two things:'
  id: totrans-2478
  prefs: []
  type: TYPE_NORMAL
  zh: 此标签做两件事：
- en: By setting `width=device-width`, you’re telling the browser to set the width
    of the page to be the same as the width of whatever device the page is being displayed
    on.
  id: totrans-2479
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过设置 `width=device-width`，你是在告诉浏览器将页面的宽度设置为与显示页面的设备宽度相同。
- en: By setting `initial-scale=1`, you’re telling the browser to display the page
    initially without zooming in or out.
  id: totrans-2480
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过设置 `initial-scale=1`，你是在告诉浏览器最初显示页面时不要放大或缩小。
- en: 'To ensure this tag is included in the code, your ChatGPT prompt should include
    an instruction similar to the following:'
  id: totrans-2481
  prefs: []
  type: TYPE_NORMAL
  zh: 为了确保此标签包含在代码中，你的 ChatGPT 提示应该包含类似于以下内容的指令：
- en: '[PRE214]'
  id: totrans-2482
  prefs: []
  type: TYPE_PRE
  zh: '[PRE214]'
- en: Later, after I show you the final portfolio page layout (refer to figure 11.7),
    I’ll also show you how the page displays on both a tablet (figure 11.8) and a
    smartphone (figure 11.9) to verify that the page is, indeed, responsive.
  id: totrans-2483
  prefs: []
  type: TYPE_NORMAL
  zh: 之后，在我向你展示最终的页面布局（参见图 11.7）之后，我还会向你展示页面在平板电脑（图 11.8）和智能手机（图 11.9）上的显示效果，以验证页面确实是响应式的。
- en: Note You can also work with a special CSS property called a *media query* to
    make your pages even more responsive to different screen sizes. You learn how
    to work with media queries in chapter 12.
  id: totrans-2484
  prefs: []
  type: TYPE_NORMAL
  zh: 注意：你还可以使用一个特殊的 CSS 属性，称为 *媒体查询*，来使你的页面对不同屏幕尺寸的响应性更强。你将在第 12 章学习如何使用媒体查询。
- en: Now you know everything you need to prompt ChatGPT to build a portfolio page,
    as described in the following section.
  id: totrans-2485
  prefs: []
  type: TYPE_NORMAL
  zh: 现在您知道如何提示ChatGPT构建投资组合页面，如以下章节所述。
- en: 11.3 Crafting the prompt for the portfolio page
  id: totrans-2486
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 11.3 构建投资组合页面的提示
- en: 'This chapter’s project is a portfolio page that displays six cards that feature
    the works of a fictional book designer. Before proceeding, I assume you have the
    following at hand:'
  id: totrans-2487
  prefs: []
  type: TYPE_NORMAL
  zh: 本章的项目是一个投资组合页面，展示了一个虚构的书籍设计师的作品。在继续之前，我假设您已经准备好了以下内容：
- en: 'One or more of the following: a page logo, title, and tagline'
  id: totrans-2488
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 以下之一或多个：页面标志、标题和标语
- en: The names of the typefaces you want to use for the page headings and the page
    text
  id: totrans-2489
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 您想要用于页面标题和页面文本的字体名称
- en: The names of the colors you want to apply to the page backgrounds and text
  id: totrans-2490
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 您想要应用于页面背景和文本的颜色名称
- en: Refer to chapter 3 to learn more about each of these design elements and how
    to prompt ChatGPT for title, typeface, and color suggestions.
  id: totrans-2491
  prefs: []
  type: TYPE_NORMAL
  zh: 参考第3章了解每个设计元素以及如何提示ChatGPT进行标题、字体和颜色建议。
- en: 'To start your prompt, tell ChatGPT that you want to construct a web page and
    that you want it to generate the code for you:'
  id: totrans-2492
  prefs: []
  type: TYPE_NORMAL
  zh: 要开始您的提示，告诉ChatGPT您想要构建一个网页，并且希望它为您生成代码：
- en: '[PRE215]'
  id: totrans-2493
  prefs: []
  type: TYPE_PRE
  zh: '[PRE215]'
- en: 'Now go through the page content, item by item, including the following (refer
    to figure 11.7):'
  id: totrans-2494
  prefs: []
  type: TYPE_NORMAL
  zh: 现在逐项检查页面内容，包括以下内容（参见图11.7）：
- en: A header that includes your logo and title
  id: totrans-2495
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 包含您的标志和标题的页眉
- en: A main element that starts with the page title
  id: totrans-2496
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 从页面标题开始的主元素
- en: The portfolio container
  id: totrans-2497
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 投资组合容器
- en: The portfolio cards
  id: totrans-2498
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 投资组合卡片
- en: A footer that includes a copyright notice
  id: totrans-2499
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 包含版权声明的页脚
- en: '![](../../OEBPS/Images/CH11_F07_McFedries3.png)'
  id: totrans-2500
  prefs: []
  type: TYPE_IMG
  zh: '![](../../OEBPS/Images/CH11_F07_McFedries3.png)'
- en: Figure 11.7 The sections of the portfolio page
  id: totrans-2501
  prefs: []
  type: TYPE_NORMAL
  zh: 图11.7 投资组合页面的部分
- en: 'Next, ask ChatGPT to generate the CSS:'
  id: totrans-2502
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，请让ChatGPT生成CSS：
- en: '[PRE216]'
  id: totrans-2503
  prefs: []
  type: TYPE_PRE
  zh: '[PRE216]'
- en: 'You then specify the page formatting, including the following:'
  id: totrans-2504
  prefs: []
  type: TYPE_NORMAL
  zh: 您然后指定页面格式，包括以下内容：
- en: The page background color and text color
  id: totrans-2505
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 页面背景颜色和文本颜色
- en: The type sizes you want to use for the headings and page text
  id: totrans-2506
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 您想要用于标题和页面文本的字体大小
- en: The fonts to use for the headings and regular page text
  id: totrans-2507
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 用于标题和常规页面文本的字体
- en: Which elements should be Flexbox containers (in this project, these will be
    the header and the portfolio container)
  id: totrans-2508
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 哪些元素应该是Flexbox容器（在这个项目中，这些将是页眉和投资组合容器）
- en: 'Here’s an example prompt for my own portfolio page:'
  id: totrans-2509
  prefs: []
  type: TYPE_NORMAL
  zh: 这是我自己的投资组合页面的一个示例提示：
- en: '[PRE217]'
  id: totrans-2510
  prefs: []
  type: TYPE_PRE
  zh: '[PRE217]'
- en: I used OpenAI’s ChatGPT app to submit my prompt to GPT-4\. The generated code
    produced the page shown in figure 11.8.
  id: totrans-2511
  prefs: []
  type: TYPE_NORMAL
  zh: 我使用OpenAI的ChatGPT应用将我的提示提交给GPT-4。生成的代码产生了图11.8所示的页面。
- en: '![](../../OEBPS/Images/CH11_F08_McFedries3.png)'
  id: totrans-2512
  prefs: []
  type: TYPE_IMG
  zh: '![](../../OEBPS/Images/CH11_F08_McFedries3.png)'
- en: Figure 11.8 My portfolio page
  id: totrans-2513
  prefs: []
  type: TYPE_NORMAL
  zh: 图11.8 我的投资组合页面
- en: 'Figure 11.8 shows how the page looks on a desktop monitor. To ensure that your
    page is behaving responsively, you need to test it with some smaller screens.
    For example, figure 11.9 shows the portfolio part of the page on a tablet-sized
    screen: the portfolio has adapted to the smaller screen size by going down to
    a two-column layout.'
  id: totrans-2514
  prefs: []
  type: TYPE_NORMAL
  zh: 图11.8显示了在桌面显示器上的页面外观。为了确保您的页面具有响应性，您需要使用一些较小的屏幕进行测试。例如，图11.9显示了在平板尺寸屏幕上的页面投资组合部分：投资组合通过降低到两列布局以适应较小的屏幕尺寸。
- en: '![](../../OEBPS/Images/CH11_F09_McFedries3.png)'
  id: totrans-2515
  prefs: []
  type: TYPE_IMG
  zh: '![](../../OEBPS/Images/CH11_F09_McFedries3.png)'
- en: Figure 11.9 The portfolio part of the page uses a two-column layout on a tablet
    screen.
  id: totrans-2516
  prefs: []
  type: TYPE_NORMAL
  zh: 图11.9 页面的投资组合部分在平板屏幕上使用两列布局。
- en: Of course, you should also test your page on a smartphone screen, as shown in
    figure 11.10\. In this case, the portfolio has adapted to the even smaller screen
    size by reducing itself to a single-column layout.
  id: totrans-2517
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，您还应该在智能手机屏幕上测试您的页面，如图11.10所示。在这种情况下，投资组合通过将其减少到单列布局以适应更小的屏幕尺寸。
- en: '![](../../OEBPS/Images/CH11_F10_McFedries3.png)'
  id: totrans-2518
  prefs: []
  type: TYPE_IMG
  zh: '![](../../OEBPS/Images/CH11_F10_McFedries3.png)'
- en: Figure 11.10 The portfolio part of the page uses a single-column layout on a
    smartphone screen.
  id: totrans-2519
  prefs: []
  type: TYPE_NORMAL
  zh: 图11.10 页面的投资组合部分在智能手机屏幕上使用单列布局。
- en: If the code generated for you by ChatGPT does the job, you’re free to skip the
    rest of this chapter and deploy the code to the web (as I describe in appendix
    B). However, if you want to get a handle on the portfolio page code, keep reading
    to get a closer look.
  id: totrans-2520
  prefs: []
  type: TYPE_NORMAL
  zh: 如果ChatGPT为您生成的代码完成了工作，您可以跳过本章的其余部分并将代码部署到网络上（如附录B中所述）。但是，如果您想了解投资组合页面代码，请继续阅读以获得更详细的了解。
- en: 11.4 Examining the portfolio page code
  id: totrans-2521
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 11.4 检查投资组合页面代码
- en: If you’re curious about the code generated by ChatGPT, or if you want to understand
    it a bit better so you can tweak it, the next two sections offer annotated guides
    to the HTML and CSS code that lie behind the portfolio page shown earlier in figures
    11.8–11.10.
  id: totrans-2522
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你好奇ChatGPT生成的代码，或者如果你想更好地理解它以便进行微调，下一两节提供了对之前在图11.8-11.10中展示的作品集页面背后的HTML和CSS代码的注释指南。
- en: 'Note The generated HTML and CSS code for my portfolio page are available on
    this book’s website ([www.manning.com/books/build-a-website-with-chatgpt](https://www.manning.com/books/build-a-website-with-chatgpt))
    and in the book’s GitHub repository: [https://github.com/paulmcfe/websites-with-chatgpt](https://github.com/paulmcfe/websites-with-chatgpt).'
  id: totrans-2523
  prefs: []
  type: TYPE_NORMAL
  zh: 注意：我的作品集页面的生成HTML和CSS代码可在本书的网站上找到（[www.manning.com/books/build-a-website-with-chatgpt](https://www.manning.com/books/build-a-website-with-chatgpt)）以及本书的GitHub仓库：[https://github.com/paulmcfe/websites-with-chatgpt](https://github.com/paulmcfe/websites-with-chatgpt)。
- en: I’ll begin in the next section with the HTML code.
  id: totrans-2524
  prefs: []
  type: TYPE_NORMAL
  zh: 我将在下一节开始介绍HTML代码。
- en: 11.4.1 Examining the HTML
  id: totrans-2525
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 11.4.1 检查HTML
- en: 'Here’s an annotated version of the HTML code that ChatGPT generated for my
    portfolio page:'
  id: totrans-2526
  prefs: []
  type: TYPE_NORMAL
  zh: 这是ChatGPT为我作品集页面生成的HTML代码的注释版本：
- en: '[PRE218]'
  id: totrans-2527
  prefs: []
  type: TYPE_PRE
  zh: '[PRE218]'
- en: ① Helps the page display properly on mobile devices
  id: totrans-2528
  prefs: []
