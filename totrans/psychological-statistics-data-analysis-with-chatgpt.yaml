  type: TYPE_NORMAL
- en: 'We will now perform an ANCOVA to analyze:'
  prefs: []
  type: TYPE_NORMAL
- en: ●      Main effect of Class Format (categorical)
  prefs: []
  type: TYPE_NORMAL
- en: ●      Covariate effect of Class Hours (continuous)
  prefs: []
  type: TYPE_NORMAL
- en: ●      Interaction effect (if any) between Class Format and Class Hours
  prefs: []
  type: TYPE_NORMAL
- en: '![テーブル  AI によって生成されたコンテンツは間違っている可能性があります。](image_rsrc245.jpg)'
  prefs: []
  type: TYPE_IMG
- en: ●       Both Class Format and Class Hours have statistically significant effects
    on Test Score.
  prefs: []
  type: TYPE_NORMAL
- en: ● No significant interaction between Class Format and Class Hours, suggesting
    that the effect of hours is consistent across formats.
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 4: Effect Size (Partial Eta Squared)'
  prefs: []
  type: TYPE_NORMAL
- en: '●      Class Format: η² = 0.482 → Large effect'
  prefs: []
  type: TYPE_NORMAL
- en: '●      Class Hours: η² = 0.789 → Very large effect'
  prefs: []
  type: TYPE_NORMAL
- en: '●      Interaction: η² = 0.0014 → Negligible effect'
  prefs: []
  type: TYPE_NORMAL
- en: 'Interpretation:'
  prefs: []
  type: TYPE_NORMAL
- en: ● Both class format and hours spent in class strongly influence test scores.
  prefs: []
  type: TYPE_NORMAL
- en: ● There is no meaningful interaction, meaning the effect of class time is similar
    regardless of class format.
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 5: Visualization of Results'
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc246.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 'Step 6: Conclusion and Next Steps'
  prefs: []
  type: TYPE_NORMAL
- en: Summary of Findings
  prefs: []
  type: TYPE_NORMAL
- en: ● Class Format (0 vs. 1) has a significant main effect on test scores.
  prefs: []
  type: TYPE_NORMAL
- en: ●      Class Hours is also a strong predictor of test performance.
  prefs: []
  type: TYPE_NORMAL
- en: ● No interaction was found between format and hours, meaning the positive impact
    of class hours is consistent across formats.
  prefs: []
  type: TYPE_NORMAL
- en: Interpretation
  prefs: []
  type: TYPE_NORMAL
- en: ● Students in one class format (likely Format 1) tend to score significantly
    higher, even after adjusting for class hours.
  prefs: []
  type: TYPE_NORMAL
- en: ● Spending more time in class generally leads to higher scores, regardless of
    the class format.
  prefs: []
  type: TYPE_NORMAL
- en: Visual Insight
  prefs: []
  type: TYPE_NORMAL
- en: ● Regression lines for each format show parallel positive trends, confirming
    the lack of interaction.
  prefs: []
  type: TYPE_NORMAL
