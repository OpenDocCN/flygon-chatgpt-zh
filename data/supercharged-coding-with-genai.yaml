- en: 'This implementation covers all three required steps: computing the discriminant,
    checking for real roots, and returning the two solutions when appropriate. However,
    the solution includes redundant explanations and a function that is cluttered
    with comments. Later in the chapter, we will see how fine-tuning can help us achieve
    improved results by fine-tuning the LLM to return only code for code completion
    tasks.'
  id: totrans-1614
  prefs: []
  type: TYPE_NORMAL
  zh: 此实现涵盖了所有三个必需步骤：计算判别式、检查实根以及当适当的时候返回两个解。然而，解决方案中包含了冗余的解释和一个注释过多的函数。在本章的后面部分，我们将看到如何通过微调LLM来仅返回代码完成任务的代码，从而帮助我们实现更好的结果。
- en: Next, we will see how to prepare the training data to fine-tune the GPT-4o mini
    model. We will later compare this model with those of the default GPT-4o mini
    model.
  id: totrans-1615
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们将看到如何准备训练数据以微调GPT-4o mini模型。我们稍后将比较这个模型与默认的GPT-4o mini模型。
- en: Crafting a JSONL file for fine-tuning
  id: totrans-1616
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 制作用于微调的JSONL文件
- en: One of the initial challenges in fine-tuning a model is gathering enough training
    examples. When fine-tuning a model through OpenAI, a minimum of 10 training examples
    is required. However, for most tasks that are beyond trivial, tens or even hundreds
    of examples might be necessary, depending on the task. According to OpenAI’s official
    documentation, satisfactory results are typically achieved with 50 training examples.
  id: totrans-1617
  prefs: []
  type: TYPE_NORMAL
  zh: 微调模型时遇到的最初挑战之一是收集足够的训练示例。通过 OpenAI 微调模型时，需要至少 10 个训练示例。然而，对于大多数超出琐碎的任务，可能需要数十个甚至数百个示例，具体取决于任务。根据
    OpenAI 的官方文档，通常需要 50 个训练示例才能达到满意的结果。
- en: 'In our case, where we want to fine-tune a model to produce outputs consisting
    solely of code without comments, 15 examples are sufficient, as we will see later
    in the chapter. When crafting our training set, we will utilize two techniques:
    desirable examples that are like few-shot learning and **contrastive learning**.
    Contrastive learning builds on the idea of in-context learning by first presenting
    an incorrect or incomplete output, followed by an additional user-assistant prompt
    pair that provides the desired output. For more details, see the *Further reading*
    section in this chapter.'
  id: totrans-1618
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们的案例中，我们希望微调一个模型以生成仅包含代码而不包含注释的输出，15 个示例就足够了，正如我们在本章后面将要看到的。在构建我们的训练集时，我们将利用两种技术：类似于少样本学习的期望示例和**对比学习**。对比学习基于上下文学习理念，首先展示一个不正确或不完整的输出，然后是一个额外的用户-助手提示对，提供所需的输出。更多详情，请参阅本章的“进一步阅读”部分。
- en: Fine-tuning file structure
  id: totrans-1619
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 微调文件结构
- en: 'We will upload a JSONL file as the training data for our fine-tuning process,
    where each line in the file is a valid JSON object representing one training example.
    A minimal prompt should include a system prompt and a training example with a
    user prompt and an assistant prompt. Each assistant prompt is attributed with
    a weight of 0 for undesirable output and 1 for desirable output. In the following
    desirable example, the assistant prompt has a weight of 1, and line breaks have
    been added for clarity:'
  id: totrans-1620
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将上传一个 JSONL 文件作为微调过程的训练数据，其中文件中的每一行都是一个有效的 JSON 对象，代表一个训练示例。最小提示应包括系统提示和一个包含用户提示和助手提示的训练示例。每个助手提示根据不希望得到的结果赋予权重
    0，对于期望得到的结果赋予权重 1。在以下期望示例中，助手提示的权重为 1，并添加了行间距以提高清晰度：
- en: '[PRE245]'
  id: totrans-1621
  prefs: []
  type: TYPE_PRE
  zh: '[PRE245]'
- en: This format may look familiar, as it resembles the `messages` parameter used
    in OpenAI API calls. However, in this case, we assign a weight to the assistant
    message. The preceding example is a training instance included in the `fine_tuning.jsonl`
    file for this chapter, located at `ch11/fine_tuning.jsonl`, demonstrating the
    expected implementation of the `get_euclidean_distance` function.
  id: totrans-1622
  prefs: []
  type: TYPE_NORMAL
  zh: 这种格式可能看起来很熟悉，因为它类似于在 OpenAI API 调用中使用的 `messages` 参数。然而，在这种情况下，我们给助手消息分配了一个权重。前面的例子是包含在
    `fine_tuning.jsonl` 文件中的训练实例，该文件位于 `ch11/fine_tuning.jsonl`，展示了 `get_euclidean_distance`
    函数预期的实现方式。
- en: 'A minimal training line template should be as follows, containing at least
    one user prompt and one assistant prompt. Here, too, line spaces are added for
    clarity:'
  id: totrans-1623
  prefs: []
  type: TYPE_NORMAL
  zh: 最小训练行模板应如下所示，包含至少一个用户提示和一个助手提示。在这里，同样添加了行间距以提高清晰度：
- en: '[PRE246]'
  id: totrans-1624
  prefs: []
  type: TYPE_PRE
  zh: '[PRE246]'
- en: We could also incorporate a system prompt if it helps refine the specialization,
    as we will explore later in the chapter.
  id: totrans-1625
  prefs: []
  type: TYPE_NORMAL
  zh: 如果有助于细化专业化，我们还可以包含一个系统提示，正如我们在本章后面将要探讨的。
- en: 'With contrastive learning examples, we will include additional user prompt
    and assistant prompt pairs. The first pair represents an undesirable output and
    is assigned a weight of 0, as such:'
  id: totrans-1626
  prefs: []
  type: TYPE_NORMAL
  zh: 在对比学习示例中，我们将包括额外的用户提示和助手提示对。第一对表示一个不希望得到的结果，并分配了权重 0，如下所示：
- en: '[PRE247]python\ndef sum_of_squares(n: int) -> int:\n return sum(i * i for i
    in range(1, n + 1))\n[PRE248]'
  id: totrans-1627
  prefs: []
  type: TYPE_NORMAL
  zh: '[PRE247]python'
- en: In this example, we provide two sets of user and assistant messages. The initial
    assistant response is undesirable because it includes explanatory text alongside
    the code, so it is assigned a weight of 0\. The second user prompt corrects this
    by explicitly instructing the assistant to provide only the code, and this response
    is given a weight of 1.
  id: totrans-1628
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个例子中，我们提供了两组用户和助手消息。最初的助手响应是不理想的，因为它包含了与代码一起的解释性文本，因此被分配了权重 0。第二个用户提示通过明确指示助手只提供代码来纠正这一点，这个响应被赋予了权重
    1。
- en: Strategy
  id: totrans-1629
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 策略
- en: 'A practical approach to constructing a fine-tuning training file is to start
    with the simplest cases of desired outputs and gradually introduce more complex
    examples to cover the specialization we want the model to develop. While the few-shot
    examples we saw in [*Chapter 8*](Chapter_8.xhtml#_idTextAnchor339) included one
    or two cases, for fine-tuning, we will use 15 examples, allocating 7-8 examples
    to each of the following objectives:'
  id: totrans-1630
  prefs: []
  type: TYPE_NORMAL
  zh: 构建微调训练文件的一个实用方法是，从期望输出的最简单情况开始，逐渐引入更复杂的示例，以涵盖我们希望模型发展的专业化。虽然我们在[*第8章*](Chapter_8.xhtml#_idTextAnchor339)中看到的少量示例包括一两个案例，但对于微调，我们将使用15个示例，将7-8个示例分配给以下每个目标：
- en: '**Code-only**: Positive and contrastive'
  id: totrans-1631
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**仅代码**：正面和对比'
- en: '**No comments**: Positive and contrastive'
  id: totrans-1632
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**无注释**：正面和对比'
- en: These examples will be sufficient to generate code without surrounding explanations
    and without comments within the function. The complete JSONL file is available
    in this book’s repository at `ch11/fine_tuning.jsonl`. Next, we will present a
    single example from each of the preceding objectives.
  id: totrans-1633
  prefs: []
  type: TYPE_NORMAL
  zh: 这些示例足以生成没有周围解释和函数内注释的代码。完整的JSONL文件可在本书的存储库中找到，位于`ch11/fine_tuning.jsonl`。接下来，我们将展示每个先前目标的一个示例。
- en: Code-only – five training examples
  id: totrans-1634
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 仅代码 – 五个训练示例
- en: 'In these cases, we will include simple implementations of functions spanning
    1-2 lines. Each example consists of a single user and assistant prompt pair, ensuring
    that the output consists solely of code. Take the following example:'
  id: totrans-1635
  prefs: []
  type: TYPE_NORMAL
  zh: 在这些情况下，我们将包括1-2行长度的函数的简单实现。每个示例都由一个用户和助手提示对组成，确保输出仅包含代码。以下是一个示例：
- en: '[PRE249]'
  id: totrans-1636
  prefs: []
  type: TYPE_PRE
  zh: '[PRE249]'
- en: In this example, we provide a desirable implementation of `get_arithmetic_mean`
    without any surrounding explanations. Note that the actual JSONL line contains
    no extra line breaks. This is an example of the training pattern with just a single
    positive example indicated by the weight 1\. Additionally, we will include three
    more examples for the `get_``euclidean``_distance`, `reverse_string`, `is_even`,
    and `is_odd` functions.
  id: totrans-1637
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个例子中，我们提供了一个没有周围解释的`get_arithmetic_mean`函数的理想实现。请注意，实际的JSONL行不包含额外的换行符。这是一个仅包含一个正例（权重为1）的训练模式示例。此外，我们还将包括三个关于`get_``euclidean``_distance`、`reverse_string`、`is_even`和`is_odd`函数的示例。
- en: Contrastive code-only – three training examples
  id: totrans-1638
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 对比代码示例 – 三个训练示例
- en: 'In addition to providing high-quality examples, we can also include contrastive
    examples. These scenarios involve an initial assistant response that is undesirable,
    such as including explanations or comments in the code, followed by a chained
    request to refine the output into a more desirable version. The chained user prompt
    should follow the best practices introduced in [*Chapter 9*](Chapter_9.xhtml#_idTextAnchor391),
    such as the following:'
  id: totrans-1639
  prefs: []
  type: TYPE_NORMAL
  zh: 除了提供高质量的示例，我们还可以包括对比示例。这些场景涉及一个初始的助手响应是不理想的，例如在代码中包含解释或注释，随后通过链式请求将输出精炼成更理想版本。链式用户提示应遵循在[*第9章*](Chapter_9.xhtml#_idTextAnchor391)中介绍的最佳实践，例如以下内容：
- en: Include code only
  id: totrans-1640
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 仅包含代码
- en: Remove code comments
  id: totrans-1641
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 删除代码注释
- en: Extract lower-level details to functions
  id: totrans-1642
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将低级细节提取到函数中
- en: As introduced in [*Chapter 9*](Chapter_9.xhtml#_idTextAnchor391), when crafting
    chained prompts, we avoid unnecessary phrasing such as “*Your answer is wrong!*”
    since it does not follow the *short* best practice and adds no value. Instead,
    we should determine whether the assistant’s output is significantly incorrect
    or if only minor adjustments are needed.
  id: totrans-1643
  prefs: []
  type: TYPE_NORMAL
  zh: 如[*第9章*](Chapter_9.xhtml#_idTextAnchor391)中所述，在构建链式提示时，我们避免使用诸如“*你的答案是错误的!*”之类的多余措辞，因为它不符合*简短*的最佳实践，也没有增加任何价值。相反，我们应该确定助手的输出是否严重错误，或者只需要进行轻微调整。
- en: In the first case, if the output is far off, the user prompt should be refined
    to produce a more desirable result, and this example should not be included in
    our training data. In the second case, if the model’s output only requires minor
    refinements, we should focus on providing clear guidance on the necessary adjustments,
    such as instructing the model to return only code or extract low-level details
    into helper functions. This type of direction is more precise and informative.
  id: totrans-1644
  prefs: []
  type: TYPE_NORMAL
  zh: 在第一种情况下，如果输出与预期相差甚远，用户提示应被精炼以产生更理想的结果，并且此示例不应包含在我们的训练数据中。在第二种情况下，如果模型的输出只需要进行轻微的调整，我们应该专注于提供关于必要调整的明确指导，例如指示模型仅返回代码或提取低级细节到辅助函数。这种类型的指示更精确且信息丰富。
- en: 'For example, the following is a contrastive code-only training example for
    an implementation of `is_palindrome`, where the first assistant prompt includes
    an explanation along with the code. This output is marked with a weight of `0`
    to indicate undesirability. It is followed by a chained user prompt instructing
    the assistant to return only the code, leading to a refined implementation with
    a weight of `1`:'
  id: totrans-1645
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，以下是一个对比代码训练示例，用于`is_palindrome`的实现，其中第一个助手提示包括解释和代码。此输出标记为权重`0`以表示不可取。随后是一个链式用户提示，指示助手仅返回代码，导致一个改进的实现，其权重为`1`：
- en: '[PRE250]python\ndef is_palindrome(s: str) -> bool:\n s = s.lower()\n return
    s == s[::-1]\n[PRE251]'
  id: totrans-1646
  prefs: []
  type: TYPE_NORMAL
  zh: '[PRE250]python\ndef is_palindrome(s: str) -> bool:\n s = s.lower()\n return
    s == s[::-1]\n[PRE251]'
- en: The final assistant message consists solely of the implementation code and is
    assigned a weight of `1` to indicate a desirable output. The fine-tuning file
    also includes similar contrastive examples for `sum_of_squares` and `flatten_list_of_lists`.
  id: totrans-1647
  prefs: []
  type: TYPE_NORMAL
  zh: 最终的助手消息仅包含实现代码，并赋予权重`1`以表示期望的输出。微调文件还包括类似的对比示例，用于`sum_of_squares`和`flatten_list_of_lists`。
- en: Code with no comments – five examples
  id: totrans-1648
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 没有注释的代码 – 五个示例
- en: 'In these examples, we focus on functions that go beyond simple 1-2 line implementations,
    breaking down more complex tasks into lower-level abstraction functions. This
    approach enhances readability in the main function and eliminates the need for
    inline comments. For instance, consider the implementation of `get_reversed_longer_string`,
    which takes two strings as input and returns the reverse of the longer string.
    It can be structured as follows:'
  id: totrans-1649
  prefs: []
  type: TYPE_NORMAL
  zh: 在这些示例中，我们关注的是超出简单1-2行实现的函数，将更复杂的任务分解为低级抽象函数。这种方法提高了主函数的可读性，并消除了对内联注释的需求。例如，考虑`get_reversed_longer_string`的实现，它接受两个字符串作为输入，并返回较长字符串的逆序。它可以结构化为以下形式：
- en: '[PRE252]'
  id: totrans-1650
  prefs: []
  type: TYPE_PRE
  zh: '[PRE252]'
- en: While more concise implementations exist, they may be less readable. The preceding
    structure keeps `get_reversed_longer_string` clear and shifts the implementation
    details to dedicated lower-level functions.
  id: totrans-1651
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然存在更简洁的实现，但它们可能可读性较差。前面的结构使`get_reversed_longer_string`保持清晰，并将实现细节转移到专门的低级函数中。
- en: 'To include this approach in our training examples, we will add the following:'
  id: totrans-1652
  prefs: []
  type: TYPE_NORMAL
  zh: 为了将这种方法包含到我们的训练示例中，我们将添加以下内容：
- en: '[PRE253]'
  id: totrans-1653
  prefs: []
  type: TYPE_PRE
  zh: '[PRE253]'
- en: 'This aligns with our preferred coding style of extracting lower-level functionality
    into separate functions. Similarly, we will include example implementations for
    the following:'
  id: totrans-1654
  prefs: []
  type: TYPE_NORMAL
  zh: 这与我们的首选编码风格一致，即把低级功能提取到单独的函数中。同样，我们将包括以下内容的示例实现：
- en: '`get_max_multiplication_from_lists`'
  id: totrans-1655
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`get_max_multiplication_from_lists`'
- en: '`get_maximal_second_element_squared`'
  id: totrans-1656
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`get_maximal_second_element_squared`'
- en: '`get_sum_of_absolute_differences`'
  id: totrans-1657
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`get_sum_of_absolute_differences`'
- en: '`get_highest_even`'
  id: totrans-1658
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`get_highest_even`'
- en: These five implementations will demonstrate the separation of abstraction levels
    in functions, serving as a guideline for the fine-tuning process.
  id: totrans-1659
  prefs: []
  type: TYPE_NORMAL
  zh: 这五个实现将展示函数中抽象级别的分离，作为微调过程的指南。
- en: Contrastive no comments – two examples
  id: totrans-1660
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 没有注释的对比示例 – 两个示例
- en: 'To complete our dataset, we will include examples of initial implementations
    with excessive comments, followed by a refined version where low-level details
    are extracted into separate functions. For instance, consider a function that,
    given a list of lists, computes the average of the second elements of each sublist:'
  id: totrans-1661
  prefs: []
  type: TYPE_NORMAL
  zh: 为了完善我们的数据集，我们将包括带有过多注释的初始实现示例，随后是一个经过改进的版本，其中低级细节被提取到单独的函数中。例如，考虑一个函数，它接受一个列表的列表，计算每个子列表中第二个元素的平均值：
- en: '[PRE254]'
  id: totrans-1662
  prefs: []
  type: TYPE_PRE
  zh: '[PRE254]'
- en: 'This function involves more complex logic than our previous examples, which
    may lead to an implementation with excessive comments. To steer the model toward
    a solution that separates levels of abstraction, we first provide an implementation
    with inline comments, followed by a chained prompt that refines the output. An
    initial incorrect assistant response might look like this:'
  id: totrans-1663
  prefs: []
  type: TYPE_NORMAL
  zh: 这个函数比我们之前的示例涉及更复杂的逻辑，可能会导致带有过多注释的实现。为了引导模型向分离抽象级别的解决方案发展，我们首先提供一个带有内联注释的实现，然后提供一个改进输出的链式提示。一个初始错误的助手响应可能如下所示：
- en: '[PRE255]'
  id: totrans-1664
  prefs: []
  type: TYPE_PRE
  zh: '[PRE255]'
- en: While this implementation is correct, the inline comments add unnecessary fluff.
    When including this negative example in our dataset, we assign it a weight of
    `0`.
  id: totrans-1665
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然这个实现是正确的，但内联注释增加了不必要的冗余。当将这个负面示例包含到我们的数据集中时，我们将其权重设置为`0`。
- en: 'Next, we chain a user prompt requesting a refinement:'
  id: totrans-1666
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们链式地添加一个用户提示，要求进行改进：
- en: '[PRE256]'
  id: totrans-1667
  prefs: []
  type: TYPE_PRE
  zh: '[PRE256]'
- en: 'This results in a cleaner implementation:'
  id: totrans-1668
  prefs: []
  type: TYPE_NORMAL
  zh: 这导致了一个更简洁的实现：
- en: '[PRE257]'
  id: totrans-1669
  prefs: []
  type: TYPE_PRE
  zh: '[PRE257]'
- en: 'By abstracting the extraction logic into a separate function, `get_average_of_second_elements`
    remains more readable. The corresponding example looks like this:'
  id: totrans-1670
  prefs: []
  type: TYPE_NORMAL
  zh: 通过将提取逻辑抽象到单独的函数中，`get_average_of_second_elements` 保持更易读。相应的示例如下：
- en: '[PRE258]'
  id: totrans-1671
  prefs: []
  type: TYPE_PRE
  zh: '[PRE258]'
- en: Additionally, we will include a similar contrastive example for `get_smallest_squared`,
    bringing our total to 15 training examples.
  id: totrans-1672
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，我们还将包括一个类似的对比示例 `get_smallest_squared`，使我们的总训练示例达到 15 个。
- en: With the finalized JSONL dataset, we can now proceed with fine-tuning using
    OpenAI’s GUI.
  id: totrans-1673
  prefs: []
  type: TYPE_NORMAL
  zh: 使用最终的 JSONL 数据集后，我们现在可以使用 OpenAI 的 GUI 进行微调。
- en: Fine-tuning a model with the OpenAI GUI
  id: totrans-1674
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 使用 OpenAI GUI 微调模型
- en: Fine-tuning an LLM with OpenAI can be done either programmatically via an API
    call or through OpenAI’s GUI. In this chapter, we will focus on using the GUI
    to initiate fine-tuning jobs.
  id: totrans-1675
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 OpenAI 对 LLM 进行微调可以通过 API 调用或通过 OpenAI 的 GUI 进行。在本章中，我们将重点介绍使用 GUI 启动微调工作。
- en: Costs of fine-tuning a model
  id: totrans-1676
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 微调模型的成本
- en: 'Fine-tuning an LLM comes with two types of costs:'
  id: totrans-1677
  prefs: []
  type: TYPE_NORMAL
  zh: 微调 LLM 有两种类型的成本：
- en: '**Job cost**: As of April 2025, fine-tuning a model costs $3 per 1M tokens.
    For reference, the JSONL file provided earlier, which contains approximately 12K
    tokens (2K tokens in the file ![](../Images/B31534_11_005.png) 6 iterations),
    would cost around $0.04 to fine-tune. There are no associated storage costs for
    the model or training files.'
  id: totrans-1678
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**工作成本**：截至 2025 年 4 月，微调模型每 1M 令牌的费用为 $3。例如，前面提供的包含大约 12K 令牌（文件中的 2K 令牌，6
    次迭代）的 JSONL 文件微调费用约为 $0.04。模型或训练文件没有相关的存储费用。'
- en: '**Application**: The pricing of using a fine-tuned model depends on the base
    model used. For instance, the cost for GPT-4o mini-based models is $0.30 per 1M
    input tokens and $1.20 per 1M output tokens, and much cheaper than the GPT-4o
    models, as illustrated in *Figure 11.6*:'
  id: totrans-1679
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**应用**：使用微调模型的定价取决于所使用的基模型。例如，基于 GPT-4o mini 的模型的成本为每 1M 输入令牌 $0.30 和每 1M 输出令牌
    $1.20，如图 *图 11.6* 所示：'
- en: '![Figure 11.6: Fine-tuning costs for GPT-4o models](../Images/B31534_11_06.png)'
  id: totrans-1680
  prefs: []
  type: TYPE_IMG
  zh: '![图 11.6：GPT-4o 模型的微调成本](../Images/B31534_11_06.png)'
- en: 'Figure 11.6: Fine-tuning costs for GPT-4o models'
  id: totrans-1681
  prefs: []
  type: TYPE_NORMAL
  zh: 图 11.6：GPT-4o 模型的微调成本
- en: As of April 2025, using a fine-tuned GPT-4o mini model costs exactly twice as
    much as using the model without fine-tuning. However, while the per-token cost
    is higher, a fine-tuned model can be more efficient, as its specialization allows
    for more concise inputs and outputs, potentially reducing overall costs.
  id: totrans-1682
  prefs: []
  type: TYPE_NORMAL
  zh: 截至 2025 年 4 月，使用微调后的 GPT-4o mini 模型的费用是未微调模型的两倍。然而，尽管每令牌的成本更高，但微调后的模型可能更高效，因为其专业化允许更简洁的输入和输出，从而可能降低整体成本。
- en: 'To check the latest pricing for current and legacy models, visit OpenAI’s pricing
    page: [https://openai.com/api/pricing/](https://openai.com/api/pricing/).'
  id: totrans-1683
  prefs: []
  type: TYPE_NORMAL
  zh: 要检查当前和旧模型的最新定价，请访问 OpenAI 的定价页面：[https://openai.com/api/pricing/](https://openai.com/api/pricing/)。
- en: With these costs in mind, we can now proceed with initiating the fine-tuning
    process.
  id: totrans-1684
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑到这些成本，我们现在可以继续启动微调过程。
- en: Initiating a fine-tuning job
  id: totrans-1685
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 启动微调工作
- en: We can fine-tune a model using our JSONL file directly through OpenAI’s API
    GUI. While fine-tuning can also be done programmatically, we will focus on the
    GUI method since it is by far the most common way.
  id: totrans-1686
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以直接通过 OpenAI 的 API GUI 使用我们的 JSONL 文件进行微调。虽然微调也可以通过编程方式进行，但我们将重点介绍 GUI 方法，因为这是迄今为止最常见的方法。
- en: 'To initiate the job, go to OpenAI’s platform home page at [https://platform.openai.com/](https://platform.openai.com/),
    click on **Dashboard** in the upper-right menu, and then select **Fine-tuning**
    from the left-hand menu, as shown in *Figure 11.7*:'
  id: totrans-1687
  prefs: []
  type: TYPE_NORMAL
  zh: 要启动工作，请访问 OpenAI 的平台主页 [https://platform.openai.com/](https://platform.openai.com/)，点击右上角的
    **仪表板**，然后从左侧菜单中选择 **微调**，如图 *图 11.7* 所示：
- en: '![Figure 11.7: Fine-tuning page in the OpenAI API platform](../Images/B31534_11_07.png)'
  id: totrans-1688
  prefs: []
  type: TYPE_IMG
  zh: '![图 11.7：OpenAI API 平台中的微调页面](../Images/B31534_11_07.png)'
- en: 'Figure 11.7: Fine-tuning page in the OpenAI API platform'
  id: totrans-1689
  prefs: []
  type: TYPE_NORMAL
  zh: 图 11.7：OpenAI API 平台中的微调页面
- en: 'To start a new fine-tuning job, click the **Create** button in the upper-right
    corner of the screen. This will open the setup popup, as shown in *Figure 11.8*:'
  id: totrans-1690
  prefs: []
  type: TYPE_NORMAL
  zh: 要开始一个新的微调工作，请点击屏幕右上角的 **创建** 按钮。这将打开设置弹出窗口，如图 *图 11.8* 所示：
- en: '![Figure 11.8: Fine-tuning job popup](../Images/B31534_11_08.png)'
  id: totrans-1691
  prefs: []
  type: TYPE_IMG
  zh: '![图 11.8：微调工作弹出窗口](../Images/B31534_11_08.png)'
- en: 'Figure 11.8: Fine-tuning job popup'
  id: totrans-1692
  prefs: []
  type: TYPE_NORMAL
  zh: 图 11.8：微调工作弹出窗口
- en: 'We used the following settings for fine-tuning:'
  id: totrans-1693
  prefs: []
  type: TYPE_NORMAL
  zh: 我们使用的微调设置如下：
- en: '**Method**: **Supervised** mode. Based on our experience, this is the most
    effective approach for coding style specialization.'
  id: totrans-1694
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**方法**：**监督**模式。根据我们的经验，这是进行编码风格专业化的最有效方法。'
- en: '**Base Model**: **gpt-4o-mini 2024-07-18** (or the latest available mini model).
    This model provides sufficient results for our use case and is cost-effective.'
  id: totrans-1695
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**基础模型**: **gpt-4o-mini 2024-07-18** (或最新可用的迷你模型)。此模型为我们提供的成果足够，且成本效益高。'
- en: '**Training data**: The JSONL file introduced earlier in the chapter.'
  id: totrans-1696
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**训练数据**：本章前面介绍的 JSONL 文件。'
- en: '**Suffix** (optional): This is appended to the model’s name for identification
    and does not need to be unique across fine-tuning jobs. We added the `clean-code`
    suffix for future reference.'
  id: totrans-1697
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**后缀**（可选）：此部分附加到模型名称上以供识别，且不需要在调优作业中唯一。我们添加了 `clean-code` 后缀以供未来参考。'
- en: Now, we can start the fine-tuning job by clicking **Create**.
  id: totrans-1698
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们可以通过点击 **创建** 来开始调优作业。
- en: 'With 15 training examples, the process should take about five minutes to complete.
    Once finished, a success message will appear, as shown in *Figure 11.9*:'
  id: totrans-1699
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 15 个训练示例，整个过程应大约需要五分钟来完成。一旦完成，将显示成功消息，如图 *图 11.9* 所示：
- en: '![Figure 11.9: Successful completion of fine-tuning job](../Images/B31534_11_09.png)'
  id: totrans-1700
  prefs: []
  type: TYPE_IMG
  zh: '![图 11.9：调优作业成功完成](../Images/B31534_11_09.png)'
- en: 'Figure 11.9: Successful completion of fine-tuning job'
  id: totrans-1701
  prefs: []
  type: TYPE_NORMAL
  zh: 图 11.9：调优作业成功完成
- en: The fine-tuning job processed 12,500 tokens, running six iterations (or **epochs**)
    of our file, which contains approximately 2,000 tokens. The fine-tuned model can
    be used in any OpenAI API call or accessed through the Playground, as we will
    explore later in this chapter.
  id: totrans-1702
  prefs: []
  type: TYPE_NORMAL
  zh: 调优作业处理了 12,500 个标记，运行了六个迭代（或 **epoch**）的我们的文件，该文件包含大约 2,000 个标记。调优模型可以在任何 OpenAI
    API 调用中使用或通过游乐场访问，我们将在本章后面探讨。
- en: 'To monitor the cost of the fine-tuning job, navigate to the OpenAI usage page
    at [https://platform.openai.com/usage](https://platform.openai.com/usage), scroll
    down to **Spend categories**, and review the fine-tuning expenses, as shown in
    *Figure 11.10*:'
  id: totrans-1703
  prefs: []
  type: TYPE_NORMAL
  zh: 要监控调优作业的成本，导航到 OpenAI 使用页面 [https://platform.openai.com/usage](https://platform.openai.com/usage)，滚动到
    **支出类别**，并查看调优费用，如图 *图 11.10* 所示：
- en: '![Figure 11.10: Incurred fine-tuning costs](../Images/B31534_11_10.png)'
  id: totrans-1704
  prefs: []
  type: TYPE_IMG
  zh: '![图 11.10：调优过程中产生的费用](../Images/B31534_11_10.png)'
- en: 'Figure 11.10: Incurred fine-tuning costs'
  id: totrans-1705
  prefs: []
  type: TYPE_NORMAL
  zh: 图 11.10：调优过程中产生的费用
- en: Here, we can see that fine-tuning the model with 15 training examples and 12K
    tokens resulted in a total cost of $0.04.
  id: totrans-1706
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，我们可以看到使用 15 个训练示例和 12K 个标记进行模型调优的总费用为 $0.04。
- en: Using the fine-tuned model
  id: totrans-1707
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 使用调优模型
- en: 'The fine-tuned model can be accessed either through the OpenAI Playground or
    programmatically. In *Figure 11.9*, OpenAI gave a formal name for our fine-tuned
    model under **Output model**, in the following format:'
  id: totrans-1708
  prefs: []
  type: TYPE_NORMAL
  zh: 调优模型可以通过 OpenAI 游乐场或编程方式访问。在 *图 11.9* 中，OpenAI 为我们的调优模型在 **输出模型** 下给出了正式名称，格式如下：
- en: '[PRE259]'
  id: totrans-1709
  prefs: []
  type: TYPE_PRE
  zh: '[PRE259]'
- en: 'For example, our model’s name is shown here, but your model will be named differently:'
  id: totrans-1710
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，我们的模型名称在此处显示，但您的模型名称可能不同：
- en: '[PRE260]'
  id: totrans-1711
  prefs: []
  type: TYPE_PRE
  zh: '[PRE260]'
- en: 'To use the fine-tuned model in code, replace the standard model reference:'
  id: totrans-1712
  prefs: []
  type: TYPE_NORMAL
  zh: 要在代码中使用调优后的模型，替换标准模型引用：
- en: '[PRE261]'
  id: totrans-1713
  prefs: []
  type: TYPE_PRE
  zh: '[PRE261]'
- en: 'The updated call using the fine-tuned model will look as follows:'
  id: totrans-1714
  prefs: []
  type: TYPE_NORMAL
  zh: 使用调优模型的更新调用将如下所示：
- en: '[PRE262]'
  id: totrans-1715
  prefs: []
  type: TYPE_PRE
  zh: '[PRE262]'
- en: 'The fine-tuned model is also available in the OpenAI Playground, as shown in
    *Figure 11.11*:'
  id: totrans-1716
  prefs: []
  type: TYPE_NORMAL
  zh: 调优模型也可在 OpenAI 游乐场中找到，如图 *图 11.11* 所示：
- en: '![Figure 11.11: Playground models, including our fine-tuned model](../Images/B31534_11_11.png)'
  id: totrans-1717
  prefs: []
  type: TYPE_IMG
  zh: '![图 11.11：游乐场模型，包括我们的调优模型](../Images/B31534_11_11.png)'
- en: 'Figure 11.11: Playground models, including our fine-tuned model'
  id: totrans-1718
  prefs: []
  type: TYPE_NORMAL
  zh: 图 11.11：游乐场模型，包括我们的调优模型
- en: Within the Playground interface, we can compare its results with the base model,
    which we will explore next.
  id: totrans-1719
  prefs: []
  type: TYPE_NORMAL
  zh: 在游乐场界面中，我们可以将其结果与基础模型进行比较，我们将在下一节中探讨。
- en: Comparing our results
  id: totrans-1720
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 比较我们的结果
- en: 'Now that we have fine-tuned our custom model, we can evaluate how its outputs
    compare to those of the base model. To do this, navigate to the OpenAI Playground,
    [https://platform.openai.com/playground/chat](https://platform.openai.com/playground/chat),
    select **gpt-4o-mini-2024-07-18** as the base model, and click on **Compare**,
    as shown in *Figure 11.12*:'
  id: totrans-1721
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经调优了我们的自定义模型，我们可以评估其输出与基础模型输出的比较。为此，导航到 OpenAI 游乐场，[https://platform.openai.com/playground/chat](https://platform.openai.com/playground/chat)，选择
    **gpt-4o-mini-2024-07-18** 作为基础模型，然后点击 **比较**，如图 *图 11.12* 所示：
- en: '![Figure 11.12: Playground comparison selecting the base model to compare](../Images/B31534_11_12.png)'
  id: totrans-1722
  prefs: []
  type: TYPE_IMG
  zh: '![图 11.12：选择基础模型进行对比的游乐场比较](../Images/B31534_11_12.png)'
- en: 'Figure 11.12: Playground comparison selecting the base model to compare'
  id: totrans-1723
  prefs: []
  type: TYPE_NORMAL
  zh: 图11.12：选择基础模型进行比较的游乐场比较
- en: 'Next, add the fine-tuned model, as shown in *Figure 11.13*:'
  id: totrans-1724
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，添加微调模型，如图*图11.13*所示：
- en: '![Figure 11.13: Adding a model for comparison](../Images/B31534_11_13.png)'
  id: totrans-1725
  prefs: []
  type: TYPE_IMG
  zh: '![图11.13：添加用于比较的模型](../Images/B31534_11_13.png)'
- en: 'Figure 11.13: Adding a model for comparison'
  id: totrans-1726
  prefs: []
  type: TYPE_NORMAL
  zh: 图11.13：添加用于比较的模型
- en: 'We will use the same system message from earlier in the chapter that will be
    applied to both models:'
  id: totrans-1727
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将使用本章早期提到的相同系统消息，并将其应用于两个模型：
- en: '[PRE263]'
  id: totrans-1728
  prefs: []
  type: TYPE_PRE
  zh: '[PRE263]'
- en: 'Next, we will enter the same user message as earlier in the chapter:'
  id: totrans-1729
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们将输入本章早期提到的相同用户消息：
- en: '[PRE264]'
  id: totrans-1730
  prefs: []
  type: TYPE_PRE
  zh: '[PRE264]'
- en: 'Our comparison can be run by clicking **Run**, generating responses from both
    models. The base model’s output includes explanations and inline comments, while
    the fine-tuned model provides a more structured implementation, as shown in *Figure
    11.14*:'
  id: totrans-1731
  prefs: []
  type: TYPE_NORMAL
  zh: 通过点击**运行**，我们可以运行比较，生成两个模型的响应。基础模型的输出包括解释和内联注释，而微调模型提供了一个更结构化的实现，如图*图11.14*所示：
- en: '![Figure 11.14: Comparing the base model (left) and the fine-tuned model (right)](../Images/B31534_11_14.png)'
  id: totrans-1732
  prefs: []
  type: TYPE_IMG
  zh: '![图11.14：比较基础模型（左）和微调模型（右）](../Images/B31534_11_14.png)'
- en: 'Figure 11.14: Comparing the base model (left) and the fine-tuned model (right)'
  id: totrans-1733
  prefs: []
  type: TYPE_NORMAL
  zh: 图11.14：比较基础模型（左）和微调模型（右）
- en: 'The fine-tuned model returns a cleaner implementation that abstracts computations
    into separate functions, keeping the main function concise and readable. For your
    reference, here is the full implementation proposed:'
  id: totrans-1734
  prefs: []
  type: TYPE_NORMAL
  zh: 微调模型返回了一个更干净的实现，将计算抽象为单独的函数，保持了主要函数的简洁和可读性。以下是我们提出的完整实现：
- en: '[PRE265]'
  id: totrans-1735
  prefs: []
  type: TYPE_PRE
  zh: '[PRE265]'
- en: This output aligns with our fine-tuning objective of separating computations
    into helper functions while keeping the primary function, `get_quadratic_roots_only_if_real`,
    clear. Additionally, the base model generates 535 tokens, compared to 179 tokens
    from the fine-tuned model. Despite the higher per-token cost of the fine-tuned
    model, it is ultimately more cost-efficient.
  id: totrans-1736
  prefs: []
  type: TYPE_NORMAL
  zh: 此输出符合我们的微调目标，即在保持主要函数`get_quadratic_roots_only_if_real`清晰的同时，将计算分离到辅助函数中。与微调模型生成的179个token相比，基础模型生成了535个token。尽管微调模型的每token成本更高，但最终它更经济高效。
- en: To conclude, we successfully fine-tuned the model to specialize in returning
    clean, code-only outputs. This targeted specialization was achieved with 15 JSONL
    examples, using a combination of positive and contrastive learning to guide the
    model’s behavior.
  id: totrans-1737
  prefs: []
  type: TYPE_NORMAL
  zh: 总结来说，我们成功地将模型微调以专门返回干净的代码输出。这种有针对性的专业化是通过15个JSONL示例实现的，结合了正对比学习来引导模型的行为。
- en: Fine-tuning enables us to adapt a pre-trained LLM for specific tasks, making
    it especially valuable for automated and large-scale coding projects. In later
    chapters, we will explore ways to further improve fine-tuning, such as refining
    the training data to separate validation logic from core functionality.
  id: totrans-1738
  prefs: []
  type: TYPE_NORMAL
  zh: 微调使我们能够针对特定任务调整预训练的LLM，这使得它在自动化和大规模编码项目中特别有价值。在后面的章节中，我们将探讨进一步改进微调的方法，例如通过细化训练数据来将验证逻辑与核心功能分开。
- en: Fine-tuning in action
  id: totrans-1739
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 行动中的微调
- en: Currently, we use just two fine-tuned models for coding tasks. The first is
    for code implementation as we constructed in this chapter, providing an alternative
    perspective on new implementations. The other is for docstring maintenance, ensuring
    that a function’s code remains consistent with its docstring. For more narrowly
    scoped tasks, few-shot learning is usually sufficient and preferable since it
    requires less effort. In general, fine-tuning is only considered when simpler
    prompt engineering techniques are ineffective or when the project operates at
    a repository-wide scale, making the investment worthwhile.
  id: totrans-1740
  prefs: []
  type: TYPE_NORMAL
  zh: 目前，我们只使用两个微调模型进行编码任务。第一个是我们在本章中构建的代码实现，提供了对新实现的不同视角。另一个是用于维护文档字符串，确保函数的代码与其文档字符串保持一致。对于范围更窄的任务，通常少量的学习就足够且更可取，因为它需要的努力更少。一般来说，只有在简单的提示工程技术无效或项目在仓库范围内运行时，才会考虑微调，这使得投资变得值得。
- en: We encourage you to experiment frequently with prompt engineering and fine-tuning.
    In the next section of the book, we will introduce additional **software development
    life cycle** (**SDLC**) use cases that you can start applying to your code base
    right away.
  id: totrans-1741
  prefs: []
  type: TYPE_NORMAL
  zh: 我们鼓励您经常尝试提示工程和微调。在本书的下一节中，我们将介绍额外的**软件开发生命周期**（**SDLC**）用例，您可以直接将其应用于您的代码库。
- en: Summary
  id: totrans-1742
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 摘要
- en: In *Part 2* of the book, we explored LLMs in greater depth. We explained how
    they work, what they excel at, and how to leverage prompt engineering techniques
    to achieve more effective results. We also covered strategies for evaluating their
    outputs to ensure reliability.
  id: totrans-1743
  prefs: []
  type: TYPE_NORMAL
  zh: 在本书的第二部分，我们更深入地探讨了LLM。我们解释了它们是如何工作的，它们擅长什么，以及如何利用提示工程技术以获得更有效的结果。我们还涵盖了评估其输出的策略，以确保可靠性。
- en: This chapter took the concept of few-shot learning a step further by demonstrating
    how to fine-tune an LLM to specialize on a given task. Through positive and contrastive
    training examples, we guided the model to generate function implementations based
    solely on their signatures, returning clean code without inline comments. This
    approach can be applied more broadly to tasks such as generating unit test suites,
    maintaining docstring quality, or refactoring `for` loops across an entire repository.
  id: totrans-1744
  prefs: []
  type: TYPE_NORMAL
  zh: 本章将少样本学习的概念进一步推进，通过展示如何微调一个LLM以专门针对给定任务。通过正例和对比训练示例，我们引导模型仅根据它们的签名生成函数实现，返回不带内联注释的干净代码。这种方法可以更广泛地应用于生成单元测试套件、维护文档字符串质量或重构整个存储库中的`for`循环等任务。
- en: With this deeper understanding of LLMs, prompt engineering, and output evaluation,
    we now have the essential tools to become supercharged coders. We can determine
    the best tool for a given task, whether ChatGPT, OpenAI API, or Copilot, and craft
    prompts that maximize effectiveness using best practices and advanced techniques.
    Moreover, we now have the skills to assess the quality of the model’s output with
    confidence.
  id: totrans-1745
  prefs: []
  type: TYPE_NORMAL
  zh: 通过对LLM、提示工程和输出评估的更深入理解，我们现在拥有了成为超级编码者的基本工具。我们可以确定给定任务的最佳工具，无论是ChatGPT、OpenAI
    API还是Copilot，并使用最佳实践和高级技术来制定最有效的提示。此外，我们现在有了自信地评估模型输出质量的技能。
- en: In the third part of the book, we will apply this knowledge to advanced SDLC
    tasks. We will explore how GenAI can assist in areas such as documentation, testing,
    scaling applications for runtime and memory efficiency, logging, monitoring, and
    error handling. Some tasks will rely on the five S’s framework for coding-related
    tasks, while others will require more advanced prompt engineering strategies or
    fine-tuning to achieve optimal results.
  id: totrans-1746
  prefs: []
  type: TYPE_NORMAL
  zh: 在本书的第三部分，我们将应用这些知识到高级SDLC任务中。我们将探讨GenAI如何在文档、测试、为运行时和内存效率扩展应用程序、日志记录、监控和错误处理等领域提供帮助。一些任务将依赖于与编码相关任务的五个S框架，而其他任务则需要更高级的提示工程策略或微调以达到最佳效果。
- en: Quiz time
  id: totrans-1747
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 测验时间
- en: 'Before you proceed to the next chapter, make sure that you can confidently
    answer the following questions:'
  id: totrans-1748
  prefs: []
  type: TYPE_NORMAL
  zh: 在你进入下一章之前，请确保你能自信地回答以下问题：
- en: '**Question 1**: When is fine-tuning a good approach?'
  id: totrans-1749
  prefs: []
  type: TYPE_NORMAL
  zh: '**问题1**：何时微调是一个好的方法？'
- en: '**Answer**: Fine-tuning is beneficial for large-scale projects where a repetitive
    task needs to be performed consistently, such as generating function implementations
    from signatures while following specific coding standards. Instead of relying
    on few-shot learning or complex prompt engineering techniques within each request,
    fine-tuning allows the specialization process to be separate from the prompt,
    making it easier to maintain and, in some cases, more cost-effective.'
  id: totrans-1750
  prefs: []
  type: TYPE_NORMAL
  zh: '**答案**：微调对于需要一致执行重复性任务的大型项目有益，例如从签名生成函数实现，同时遵循特定的编码标准。而不是在每个请求中依赖少样本学习或复杂的提示工程技术，微调允许将专门化过程与提示分离，使其更容易维护，在某些情况下，成本效益更高。'
- en: '**Question 2**: What are the costs involved in fine-tuning?'
  id: totrans-1751
  prefs: []
  type: TYPE_NORMAL
  zh: '**问题2**：微调涉及哪些成本？'
- en: '**Answer**: Fine-tuning involves two types of costs:'
  id: totrans-1752
  prefs: []
  type: TYPE_NORMAL
  zh: '**答案**：微调涉及两种类型的成本：'
- en: '**Training cost**: A one-time cost incurred when running the fine-tuning job.'
  id: totrans-1753
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**训练成本**：运行微调作业时产生的一次性成本。'
- en: '**Usage cost**: Fine-tuned models typically have higher per-token costs for
    input and output compared to their base models. For example, with GPT-4o mini,
    using fine-tuned models costs twice as much as those from the base model.'
  id: totrans-1754
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**使用成本**：与基础模型相比，微调模型通常在输入和输出方面每token的成本更高。例如，使用GPT-4o mini，微调模型的使用成本是基础模型的两倍。'
- en: However, the true cost of fine-tuning lies in the time and effort required to
    carefully construct training examples that ensure the model aligns with the desired
    specialization.
  id: totrans-1755
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，微调的真实成本在于需要投入时间和精力来仔细构建训练示例，以确保模型与所需的专门化保持一致。
- en: '**Question 3**: Why does fine-tuning require more training samples than few-shot
    learning?'
  id: totrans-1756
  prefs: []
  type: TYPE_NORMAL
  zh: '**问题3**：为什么微调比少样本学习需要更多的训练样本？'
- en: '**Answer**: The specialization process in fine-tuning is fundamentally different
    from few-shot learning. In few-shot learning, examples are simply provided within
    the prompt, guiding the model without altering its internal parameters.'
  id: totrans-1757
  prefs: []
  type: TYPE_NORMAL
  zh: '**答案**：微调中的专业化过程与少样本学习在本质上有所不同。在少样本学习中，示例只是简单地包含在提示中，指导模型而不改变其内部参数。'
- en: Fine-tuning, on the other hand, adjusts the model’s weights to align with the
    desired behavior. Given that the base model was pre-trained on vast amounts of
    data, requiring tens or even hundreds of fine-tuning examples is relatively modest
    in comparison to the scale of its original training.
  id: totrans-1758
  prefs: []
  type: TYPE_NORMAL
  zh: 另一方面，微调调整模型的权重以与期望的行为相一致。鉴于基础模型是在大量数据上预训练的，因此需要数十个甚至数百个微调示例与原始训练规模相比相对较小。
