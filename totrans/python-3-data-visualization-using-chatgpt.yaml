  id: totrans-449
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: 'Now type the expression 2 + 7 at the prompt:'
  id: totrans-450
  prefs: []
  type: TYPE_NORMAL
  zh: 现在在提示符下输入表达式 2 + 7：
