    a business student at MEC Oman, and I’m interested in pursuing a career in finance.
    What are some recommended steps or resources to help me prepare for a finance-related
    internship or job opportunity?”'
  id: totrans-2265
  prefs: []
  type: TYPE_NORMAL
  zh: '[图12.1](#ch20.xhtml#f33b) ChatGPT对问题“我目前在阿曼的MEC商学院学习商业，我对从事金融职业感兴趣。有哪些推荐的步骤或资源可以帮助我准备金融相关的实习或工作机会？”的回答'
- en: '![A screenshot depicts a conversation between a user and Chat G P T. The user
    asks for insights into job opportunities in logistics and supply chain management.
    Chat G P T lists ten roles including logistics coordinator, supply chain analyst,
    warehouse manager, and logistics director or V P, each with a brief description
    of responsibilities.](html/images/9781032716084_C012_002.jpg)'
  id: totrans-2266
  prefs: []
  type: TYPE_IMG
  zh: '![截图展示了一位用户与Chat G P T的对话。用户询问物流和供应链管理方面的就业机会。Chat G P T列出了十个角色，包括物流协调员、供应链分析师、仓库经理以及物流总监或副总裁，每个角色都有简要的职责描述。](html/images/9781032716084_C012_002.jpg)'
- en: '[Figure 12.2](#ch20.xhtml#f34b) ChatGPT’s answer to “Can you provide insights
    into job opportunities in Logistics and supply chain management?”'
  id: totrans-2267
  prefs: []
  type: TYPE_NORMAL
  zh: '[图12.2](#ch20.xhtml#f34b) ChatGPT对“你能提供关于物流和供应链管理方面的就业机会的见解吗？”的回答'
- en: The third question asks for advice on pursuing a finance-related career for
    business students at Middle East College, Oman. The response is detailed and practical
    covering aspects such as excellence, internships, networking, professional certifications,
    online resources, building resumes, mock interviews, and involvement in professional
    organizations developing soft skills, and staying up to date with industry trends
    ([Figure 12.3](#ch20.xhtml#f35)). The step-by-step recommendations offer guidance
    for aspiring finance professionals in both practical aspects. The emphasis on
    skills and keeping informed about industry trends demonstrates an understanding
    of the nature of success in the finance sector. In terms of substance and tone,
    these responses strike a balance, the language used is clear, concise, and tailored
    to the intended audience. The information is presented in a manner that’s easily
    understandable, for individuals seeking guidance in these fields. Moreover, beyond
    providing information the responses offer valuable insights that can benefit individuals
    at various stages of their career exploration or development. All three responses
    demonstrate a strength in recognizing the unique aspects of these professions.
    Whether discussing the paths in computer science job opportunities in logistics
    or preparing for a finance-related career the responses acknowledge the importance
    of professional growth, soft skills, and the ever-evolving nature of these industries.
    Considering how comprehensive, clear, and practical these responses are they could
    serve as examples for advisors. The amount of information provided by ChatGPT
    surpasses what is typically offered in face-to-face sessions. These responses
    can be a resource especially when it comes to covering nuanced information without
    relying on strict templates or guidebooks. Furthermore, the encouraging language
    and tone used in the responses contribute to a motivating narrative. This is particularly
    evident in the financial advice section where the final paragraph strikes a balance
    between development and making contributions within a finance career. Such encouragement
    plays a role in inspiring students. Guiding them toward fulfilling careers that
    make an impact.
  id: totrans-2268
  prefs: []
  type: TYPE_NORMAL
  zh: 第三个问题询问了阿曼中东学院商业学生追求与金融相关职业的建议。回答详细且实用，涵盖了诸如卓越、实习、人脉、专业认证、在线资源、简历制作、模拟面试、参与提升软技能的专业组织以及紧跟行业趋势等方面（[图12.3](#ch20.xhtml#f35)）。逐步的建议为有志于金融行业的专业人士在实践方面提供了指导。对技能的重视和对行业趋势的了解展现了对方对金融行业成功本质的理解。从内容和语气来看，这些回答在清晰、简洁且针对目标受众的语言使用上取得了平衡。信息以易于理解的方式呈现，为寻求这些领域指导的个人提供了便利。此外，除了提供信息外，这些回答还提供了对个人在职业探索或发展各个阶段都有益的宝贵见解。所有三个回答都展示了识别这些职业独特方面的优势。无论是讨论计算机科学中的就业机会、物流工作道路，还是准备与金融相关的职业，回答都承认了专业成长、软技能以及这些行业不断演变的重要性。考虑到这些回答的全面性、清晰性和实用性，它们可以作为顾问的范例。ChatGPT提供的信息量超过了面对面会议中通常提供的信息量。这些回答可以作为资源，尤其是在需要涵盖细微信息而不依赖严格模板或指南时。此外，回答中使用的鼓励性语言和语气有助于构建激励性的叙事。这在金融建议部分尤为明显，其中最后一段在职业发展和在金融职业中做出贡献之间取得了平衡。这种鼓励在激励学生方面发挥了作用，引导他们走向有意义的职业道路，产生积极影响。
- en: '![A screenshot depicts a conversation between a user and Chat G P T. The user
    asks about common career paths for graduates in computer science. Chat G P T lists
    fourteen roles, including software developer, systems analyst, data scientist,
    network engineer, and database administrator, each with a brief description.](html/images/9781032716084_C012_003.jpg)'
  id: totrans-2269
  prefs: []
  type: TYPE_IMG
  zh: '![一张截图展示了用户与Chat G P T的对话。用户询问计算机科学专业毕业生的常见职业道路。Chat G P T列出了十四个角色，包括软件开发者、系统分析师、数据科学家、网络工程师和数据库管理员，每个角色都有简要的描述。](html/images/9781032716084_C012_003.jpg)'
- en: '[Figure 12.3](#ch20.xhtml#f35b) ChatGPT’s response to the question, “What career
    paths are common for graduates in computer science?”'
  id: totrans-2270
  prefs: []
  type: TYPE_NORMAL
  zh: '[图12.3](#ch20.xhtml#f35b) ChatGPT对“计算机科学专业毕业生常见的职业道路有哪些？”这一问题的回答。'
- en: To conclude the responses, to all three questions demonstrate ChatGPT’s ability
    to provide nuanced and uplifting guidance across professional fields. These responses
    generated by AI have the potential to be resources, for people who are looking
    for guidance in their career journeys. If these responses were included on websites,
    it could make high-quality information more accessible to a range of individuals.
  id: totrans-2271
  prefs: []
  type: TYPE_NORMAL
  zh: 为了总结回答，对这三个问题的回答展示了ChatGPT在各个专业领域提供细致和鼓舞人心的指导能力。这些由AI生成的回答有可能成为资源，为那些在职业道路上寻求指导的人提供帮助。如果这些回答被包含在网站上，它可以使高质量的信息更容易被各种个体获取。
- en: When it comes to discussing calculus concepts ChatGPT delivers a well-organized
    explanation of the principles in calculus. The response covers topics, like limits,
    derivatives, rules of differentiation, integrals, techniques of integration, and
    the practical applications of derivatives and integrals ([Figure 12.4).](#ch20.xhtml#f36)
    The language used is clear and understandable with real-world examples that help
    bridge the gap between theory and practicality. One standout aspect of ChatGPT’s
    response is its encouragement for engagement. By inviting users to ask questions
    or seek clarification on problems the AI model demonstrates an understanding of
    personalized learning. Additionally, suggesting practice problems and working
    through examples aligns with learning strategies ([Figure 12.5).](#ch20.xhtml#f37)
    Shifting our focus to historical events in the Middle East ChatGPT provides a
    concise yet informative overview of significant moments spanning from the emergence
    of Islam in the 7th century to recent developments like the normalization of relations
    in 2020. Covering empires such as the Ottoman and Safavid dynasties conflicts
    like the Israeli Conflict and Syrian Civil War as well as geopolitical shifts,
    like the Gulf War and Iran Nuclear Deal creates a comprehensive and balanced portrayal
    of the region’s history. The response shows a balance, between providing an overview
    and delving into specific details. It manages to give a narrative while also recognizing
    the potential for deeper exploration based on the user’s project focus. The chronological
    arrangement helps in understanding the progression of events. Each event is concisely
    described, capturing its context and importance.
  id: totrans-2272
  prefs: []
  type: TYPE_NORMAL
  zh: 当讨论微积分概念时，ChatGPT提供了对微积分原理的清晰而有组织的解释。回答涵盖了诸如极限、导数、微分规则、积分、积分技巧以及导数和积分的实际应用等主题（[图12.4]）。使用的语言清晰易懂，结合现实世界的例子有助于弥合理论与实践之间的差距。ChatGPT回答的一个突出特点是它的鼓励参与。通过邀请用户提问或寻求对问题的澄清，AI模型展示了其对个性化学习的理解。此外，建议练习问题和通过例子进行练习与学习策略相一致（[图12.5]）。将我们的焦点转向中东的历史事件，ChatGPT提供了一个简洁但信息丰富的概述，涵盖了从7世纪伊斯兰教的兴起到2020年关系正常化等最近的发展。涵盖了奥斯曼和萨法维王朝等帝国、以色列冲突和叙利亚内战等冲突，以及海湾战争和伊朗核协议等地缘政治转变，为该地区的历史提供了一个全面和平衡的描绘。回答在提供概述的同时，也深入到具体细节，它设法提供了一个叙述，同时也认识到根据用户的课题焦点进行更深入探索的可能性。按时间顺序排列有助于理解事件的进展。每个事件都简洁描述，捕捉其背景和重要性。
- en: '![A screenshot depicts a conversation between a user and Chat G P T. The user
    asks to explain calculus concepts. Chat G P T lists five fundamental calculus
    concepts, including derivatives, differentiation rules, integration, fundamental
    theorem of calculus, and application of calculus, each with a brief description.](html/images/9781032716084_C012_004.jpg)'
  id: totrans-2273
  prefs: []
  type: TYPE_IMG
  zh: '![一张截图展示了用户与Chat G P T的对话。用户请求解释微积分概念。Chat G P T列出了五个基本的微积分概念，包括导数、微分规则、积分、微积分基本定理以及微积分的应用，每个概念都有简要描述。](html/images/9781032716084_C012_004.jpg)'
- en: '[Figure 12.4](#ch20.xhtml#f36b) ChatGPT’s response to the question, “I’m struggling
    with understanding calculus concepts. Can you provide explanations?”'
  id: totrans-2274
  prefs: []
  type: TYPE_NORMAL
  zh: '[图12.4](#ch20.xhtml#f36b) ChatGPT对问题“我在理解微积分概念上遇到困难。你能提供解释吗？”的回答'
- en: '![A screenshot depicts a conversation between a user and Chat G P T. The user
    asks about some key historical events related to the Middle East that can be included
    in their project. Chat G P T lists 10 events, including the rise of Islam, the
    Crusades, World War 1, the Syrian Civil War, and the Gulf War, each with a brief
    description.](html/images/9781032716084_C012_005.jpg)'
  id: totrans-2275
  prefs: []
  type: TYPE_IMG
  zh: '![截图展示了一位用户与Chat G P T的对话。用户询问了一些可以包含在他们项目中的与中东相关的关键历史事件。Chat G P T列出了10个事件，包括伊斯兰教的兴起、十字军东征、第一次世界大战、叙利亚内战和海湾战争，每个事件都有简要描述。](html/images/9781032716084_C012_005.jpg)'
- en: '[Figure 12.5](#ch20.xhtml#f37b) ChatGPT’s answer for: “What are some key historical
    events related to the Middle East that I should include in my project?”'
  id: totrans-2276
  prefs: []
  type: TYPE_NORMAL
  zh: '[图12.5](#ch20.xhtml#f37b) ChatGPT对“我应该在我的项目中包含哪些与中东相关的关键历史事件？”的回答'
- en: ChatGPT’s ability to offer relevant information on both calculus concepts and
    Middle Eastern history highlights its potential as an educational tool. The depth
    of information in both responses goes beyond facts incorporating explanations,
    applications, and encouragement for engagement. Although the responses are impressive
    in terms of their content and clarity it’s crucial to acknowledge that the effectiveness
    of guidance in complex subjects like calculus depends on the user’s active involvement
    and participation. By inviting users to seek clarification or ask questions, ChatGPT
    encourages a learning experience. To sum up, ChatGPT demonstrates a capability
    to provide explanations that are user-friendly across various inquiries. The information
    given about calculus concepts and Eastern historical events is well-structured
    and informative. It shows an understanding of user’s potential need for more clarification
    or exploration. Like any tool, the success of its impact ultimately depends on
    how users engage with and apply the information provided in their learning process.
  id: totrans-2277
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT在提供微积分概念和中东历史的相关信息方面的能力突显了其作为教育工具的潜力。两个回答中的信息深度都超越了事实，包含了解释、应用和鼓励参与的鼓励。尽管这些回答在内容和清晰度方面给人印象深刻，但承认在像微积分这样的复杂主题中，指导的有效性取决于用户的积极参与和参与至关重要。通过邀请用户寻求澄清或提问，ChatGPT鼓励学习体验。总的来说，ChatGPT展示了提供用户友好的解释的能力，适用于各种查询。关于微积分概念和东方历史事件的提供的信息结构良好且信息丰富。它表明了对用户可能需要更多澄清或探索的需求的理解。像任何工具一样，其影响的成功最终取决于用户如何在与学习过程中互动和应用提供的信息。
- en: 12.5 Discussion
  id: totrans-2278
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 12.5 讨论
- en: The study presented here about the use of AI models, ChatGPT, for providing
    academic advice in higher education is quite fascinating and holds great potential.
    The authors, who are college professors experienced in guiding students, highlight
    how the model can offer detailed responses to career-related questions. The focus
    on aspects like career steps and expectations in professions showcases ChatGPT’s
    ability to provide broad guidance. The study acknowledges the limitations of AI
    models including accuracy issues and a lack of access to program or personal information.
    However, it emphasizes the value of ChatGPT as a tool to initiate the process
    of gathering information. It suggests that students can utilize AI-based tools
    like ChatGPT as a starting point for their inquiries and then seek clarification
    or confirmation from advisors, which aligns with a blended approach to advising.
    One notable aspect is the emphasis on AI technologies not replacing one-on-one
    assistance but rather complementing it. The study suggests a synergy, between
    ChatGPT and human advisors, where the model acts as a source of information while
    human advisors can provide nuanced and personalized guidance based on the insights
    generated by ChatGPT. The research presents an argument, for incorporating AI-powered
    language models into advising, particularly for students who face difficulties
    in accessing high-quality guidance.
  id: totrans-2279
  prefs: []
  type: TYPE_NORMAL
  zh: 本研究中关于使用AI模型，ChatGPT，在高等教育中提供学术建议的内容非常吸引人，并具有巨大的潜力。这些作者，他们是经验丰富的大学教授，擅长指导学生，强调了该模型如何对职业相关的问题提供详细的回答。关注诸如职业步骤和职业期望等层面展示了ChatGPT提供广泛指导的能力。研究承认了AI模型的局限性，包括准确性问题和缺乏访问程序或个人信息的能力。然而，它强调了ChatGPT作为启动信息收集过程工具的价值。它建议学生可以利用基于AI的工具，如ChatGPT，作为他们查询的起点，然后向顾问寻求澄清或确认，这与咨询的混合方法相一致。一个值得注意的方面是强调AI技术不是取代一对一的协助，而是补充它。研究提出了ChatGPT和人类顾问之间的协同作用，其中模型作为信息来源，而人类顾问可以根据ChatGPT产生的见解提供细微和个性化的指导。研究提出了将AI驱动的语言模型纳入咨询的论点，特别是对于面临获取高质量指导困难的学生。
- en: 12.6 Conclusion
  id: totrans-2280
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 12.6 结论
- en: The accessibility of ChatGPT and its ability to engage users in their native
    language address the need for support for students from disadvantaged backgrounds.
    However, the research acknowledges the importance of user proficiency in formulating
    queries and understanding the capabilities and limitations of the model. It suggests
    that while AI tools like ChatGPT have barriers to entry users may need to develop
    expertise to make the most out of them. This echoes the idea that technology is
    most effective when users have a grasp of how to use it optimally. Additionally,
    the study encourages students to view ChatGPT as a tool rather than an authoritative
    source recognizing that it has limitations in providing comprehensive and completely
    accurate information. The recommendation for follow-up questions and further exploration
    reflects an approach considering the capabilities of AI models. Finally, the study
    concludes by emphasizing its nature and proposes directions for research including
    a more comprehensive evaluation of AI-generated responses, expansion into various
    academic subjects, and investigation into other generative AI models. To sum up,
    the research highlights the promising prospects of AI models such, as ChatGPT
    in improving advising. It acknowledges the significance of an approach that combines
    AI technologies with knowledge to offer students thorough and customized assistance.
    The request for investigation and exploration in this field demonstrates an increasing
    enthusiasm, for utilizing AI to enhance education.
  id: totrans-2281
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT的可访问性和其能够用用户的母语进行交流，满足了来自不利背景的学生获得支持的需求。然而，研究承认了用户在制定查询和理解模型的能力和局限性方面的重要性。它建议，尽管AI工具如ChatGPT存在入门障碍，用户可能需要发展专业知识以充分利用它们。这反映了这样一个观点：当用户掌握如何最优地使用技术时，技术最为有效。此外，研究鼓励学生将ChatGPT视为一种工具，而不是权威的信息来源，认识到它在提供全面和完全准确的信息方面存在局限性。建议后续问题和进一步探索反映了考虑AI模型能力的方法。最后，研究通过强调其性质并提议研究方向来总结，包括对AI生成响应的更全面评估、扩展到各种学术领域以及对其他生成AI模型的调查。总之，研究突出了AI模型，如ChatGPT在改善咨询方面的前景。它承认了将AI技术与知识相结合以提供全面和定制化帮助的方法的重要性。在这个领域进行研究和探索的请求表明了对利用AI提高教育的日益增长的兴趣。
