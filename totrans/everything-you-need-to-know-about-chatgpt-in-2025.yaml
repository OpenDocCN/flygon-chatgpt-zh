  prefs: []
  type: TYPE_NORMAL
  zh: 直到如今，与人工智能的互动，尤其是与像ChatGPT这样的模型，大多数都是基于文本的。多模态人工智能的进步承诺了更加丰富和复杂的交互，其中机器将能够处理和生成响应，不仅限于书面语言，还包括基于图像、声音、手势以及甚至来自多个来源的上下文数据。与仅仅响应文本命令的工具不同，多模态人工智能将能够更人性化和流畅地理解和反应，对广泛的感觉和上下文输入做出响应，从而丰富沟通。
