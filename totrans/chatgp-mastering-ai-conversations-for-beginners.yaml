  zh: '**It** **took** **much** **qui**cker** **than** **you** **would** **think**
    **for** **some** **one** **to** **create** **an** **AI** **that** **stood** **a**
    **ch**ance** **of** **passing** **the** **Turing** **Test**.** The** **first**
    **contender** **was** **ELIZA**, **an** **early** **chatbot** **created** **in**
    **1966** **by** **computer** **scientist** **Joseph** **Weizenbaum**.** ELIZA**’**s**
    **main** **function** **was** **to** **search** **for** **specific** **key**words**
    **used** **in** **conversations** **between** **different** **human** **typists**.**
    Weizenbaum**’**s** **chatbot** **would** **then** **add** **those** **key**words**
    **to** **its** **dataset** **and** **use** **them** **to** **form** **full** **sentences**,
    **respond** **to** **questions** **asked** **of** **it**, **or** **even** **ask**
    **questions** **of** **its** **own**.** ELIZA**’**s** **aim** **was** **to** **act**
    **as** **a** **psychotherapist**, **which** **in** **Weizenbaum**’**s** **words**,
    **allowed** **it** **to** **take** **the** **position** **of** **“** **knowing**
    **almost** **nothing** **about** **the** **real** **world**.”** If** **the** **human**
    **ELIZA** **was** **chatting** **to** **us** **and** **used** **one** **of** **the**
    **keywords** **in** **its** **set**, **then** **the** **chatbot** **would** **use**
    **that** **word** **in** **its** **response**.** If** **no** **keywords** **were**
    **found**, **then** **it** **would** **just** **give** **a** **generic** **response**
    **that** **it** **thought** **fit** **the** **bill**.'
