  id: totrans-262
  prefs: []
  type: TYPE_NORMAL
  zh: • 个性化用户旅程：人工智能根据用户数据定制网站体验。
- en: '15.3 Case Study: AI in Web Design'
  id: totrans-263
  prefs: []
  type: TYPE_NORMAL
  zh: 15.3 案例研究：人工智能在网页设计中的应用
- en: A SaaS company used AI to automate landing page content, resulting in a 70%
    increase in sign-ups.
