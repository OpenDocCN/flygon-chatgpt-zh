- en: Chapter 1 Meet ChatGPT
  prefs: []
  type: TYPE_NORMAL
- en: “Now, thanks to OpenAI and ChatGPT we’ve finally gotten to experience the magic
    of using natural language to ask software for what we want.
  prefs: []
  type: TYPE_NORMAL
- en: —Dharmesh Shah, HubSpot CTO and Founder
  prefs: []
  type: TYPE_NORMAL
- en: ChatGPT is the most useful and helpful app you’ll ever use. It’s the ultimate
    digital assistant. And it’s designed to help you with anything you need, anytime
    you need it. It’s like having an expert available at your fingertips 24/7\. From
    solving complex problems to answering trivial questions, ChatGPT is always ready
    to assist you.
  prefs: []
  type: TYPE_NORMAL
- en: Imagine planning a trip and having ChatGPT create the perfect itinerary based
    on your preferences. Let’s say you have a business trip to Chicago coming up and
    you want to bring your family. You open up ChatGPT and provide details like where
    you’re staying, your work schedule, and specific things your family wants to do.
    For instance, your family really wants to get Pequod’s pizza, you’d like to catch
    a Cubs game, and your son is excited about visiting the Field Museum.
  prefs: []
  type: TYPE_NORMAL
- en: 'Example prompt: “I’m planning a business trip to Chicago and bringing my family.
    We’re staying downtown. My work schedule is busy during the day, but we have evenings
    free. My family wants to eat at Pequod’s pizza, catch a Cubs game, and my son
    is excited about the Field Museum. Can you help create a detailed itinerary for
    us?”'
  prefs: []
  type: TYPE_NORMAL
- en: ChatGPT can take all these details and create a personalized itinerary for you
    in seconds. It could suggest the best time to visit the Field Museum to avoid
    crowds, plan the family pizza outing to Pequod’s based on it’s proximity to other
    items on your schedule, and even provide tips on getting tickets for the Cubs
    game. ChatGPT can plan your family activities around your work schedule for you
    quickly and effortlessly.
  prefs: []
  type: TYPE_NORMAL
- en: Creating personalized travel itineraries is just one example of the AI magic
    ChatGPT can bring to your life. There are endless ways to use it—you really have
    to explore and play with it yourself to see what it can do for you. It can truly
    help you with anything. You just have to ask Chat for whatever it is you want
    or wonder.
  prefs: []
  type: TYPE_NORMAL
- en: Have you ever wondered why the sky is blue? Just ask ChatGPT, and it will explain
    it to you. If the explanation seems too long, you can ask it to ‘shorten it.’
    If it’s too complex, tell that to Chat. Ask for a simplified version of the explanation
    or just reply with ‘TLDR.’ It will know what you mean and give you the TLDR. It’s
    that simple, and ChatGPT is that good.
  prefs: []
  type: TYPE_NORMAL
- en: 'Example prompt: “Can you explain it to me like I’m five?”, or'
  prefs: []
  type: TYPE_NORMAL
- en: 'Example prompt: “Shorten the explanation into just the top 5 points. Put it
    in a bulleted list please.”'
  prefs: []
  type: TYPE_NORMAL
- en: What is ChatGPT?
  prefs: []
  type: TYPE_NORMAL
- en: ChatGPT is an AI that anyone can use. It’s the first AI that truly understands
    and speaks our language. Chat is ready to answer any question you have, anytime.
    Accessible on the web and as a mobile app, ChatGPT is just a tap away. It can
    assist or help you with almost anything you can think of. It’s like texting with
    a friend—except this friend is super smart and can talk to you about any subject
    you can think of.
  prefs: []
  type: TYPE_NORMAL
- en: 'Example prompt: What is ChatGPT? explain it to me like I’m 5.'
  prefs: []
  type: TYPE_NORMAL
- en: 'ChatGPT response: ChatGPT is a smart computer program that can talk to you
    like a person. Imagine it as a friendly robot friend who can answer your questions,
    tell you stories, and help you with things you want to know. You type or say something
    to it, and it understands and responds just like a real person would. It’s like
    having a chat with a very clever robot!'
  prefs: []
  type: TYPE_NORMAL
- en: Imagine having a partner, tutor, researcher, assistant, and the entire internet
    all in one easy-to-use messaging app. ChatGPT can give you superpowers, helping
    you do more and do better every day.
  prefs: []
  type: TYPE_NORMAL
- en: Plus, ChatGPT is so easy to use. You don’t need to be technical or have special
    skills to use it. Just type your question or request, and within seconds, Chat
    will reply with a helpful response.
  prefs: []
  type: TYPE_NORMAL
- en: Not only does ChatGPT answer questions, but it also learns from your interactions,
    giving you more personalized and relevant advice the more you play around and
    chat with it. Whether you need help planning a dinner party, solving a problem,
    or just exploring your curiosity, ChatGPT is there for you.
  prefs: []
  type: TYPE_NORMAL
