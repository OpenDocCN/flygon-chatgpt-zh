    "model",      "created": 1651172509,      "owned_by": "openai-dev"    },    {      "id":
    "gpt-4",      "object": "model",      "created": 1687882411,      "owned_by":
    "openai"    },    {      "id": "gpt-3.5-turbo-16k",      "object": "model",      "created":
    1683758102,      "owned_by": "openai-internal"    },    {      "id": "curie-search-query",      "object":
    "model",      "created": 1651172509,      "owned_by": "openai-dev"    },    {      "id":
    "text-davinci-003",      "object": "model",      "created": 1669599635,      "owned_by":
    "openai-internal"    },    {      "id": "text-search-babbage-query-001",      "object":
