    category] that are currently unmet or could be better served by a new product.”'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Feature Specification: “Suggest a set of features for [product idea] that would
    meet the identified consumer needs and differentiate it from existing products.”'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Product Design Feedback: “Simulate potential customer feedback on the proposed
    design and features of [product idea].”'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Value Proposition Drafting: “Build a compelling value proposition for [product
