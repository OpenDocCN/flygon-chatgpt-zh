- en: '![](../images/author.jpg)'
  id: totrans-2125
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/author.jpg)'
- en: '**[Parmy Olson](http://us.macmillan.com/author/parmyolson?utm_source=ebook&utm_medium=adcard&utm_term=ebookreaders&utm_content=parmyolson_authorpage_macdotcom&utm_campaign=9781250337757)**
    is a *Bloomberg Opinion* columnist who has been covering the technology industry
    for more than thirteen years. A former reporter for the *Wall Street Journal*
    and *Forbes*, she is the author of *We Are Anonymous* and a recipient of the Palo
    Alto Networks Cybersecurity Canon Award. Her reporting on Facebook’s $19 billion
    acquisition of WhatsApp and the subsequent fallout resulted in two honorable mentions
    in the SABEW business journalism awards. At the *Wall Street Journal* she was
    the first to report on a secret effort at Google’s top AI lab to break away from
    the company. This book expands on the dramatic, unstoppable forces that led to
    that incident. You can sign up for email updates [here](http://us.macmillan.com/authoralerts?authorName=parmyolson&authorRefId=200123386&utm_source=ebook&utm_medium=adcard&utm_term=ebookreaders&utm_content=parmyolson_authoralertsignup_macdotcom&utm_campaign=9781250337757).'
  id: totrans-2126
  prefs: []
  type: TYPE_NORMAL
  zh: '**[帕米·奥尔森](http://us.macmillan.com/author/parmyolson?utm_source=ebook&utm_medium=adcard&utm_term=ebookreaders&utm_content=parmyolson_authorpage_macdotcom&utm_campaign=9781250337757)**
    是一位 *彭博社观点*专栏作家，他从事科技行业报道已超过十三年。她曾是《华尔街日报》和《福布斯》的记者，著有《我们是匿名者》一书，并获得了帕洛阿尔托网络安全经典奖。她关于Facebook以190亿美元收购WhatsApp及其后续影响的报道，在SABEW商业新闻奖中获得了两项荣誉提名。在《华尔街日报》工作时，她是首位报道谷歌顶级人工智能实验室秘密试图脱离公司的记者。本书扩展了导致这一事件的戏剧性、不可阻挡的力量。您可以通过[此处](http://us.macmillan.com/authoralerts?authorName=parmyolson&authorRefId=200123386&utm_source=ebook&utm_medium=adcard&utm_term=ebookreaders&utm_content=parmyolson_authoralertsignup_macdotcom&utm_campaign=9781250337757)注册电子邮件更新。'
