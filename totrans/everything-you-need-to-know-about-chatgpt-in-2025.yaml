  type: TYPE_NORMAL
  zh: '**提示工程**是设计有效的语言模型输入的艺术和科学。这个过程涉及创建精确和结构良好的提示，这些提示引导模型生成有用、连贯和相关的响应。提示工程对于在AI应用中获得最佳结果至关重要。'
