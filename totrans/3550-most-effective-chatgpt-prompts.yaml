  zh: 为我们的健身应用的新功能撰写一则吸引人的图片广告标题。
- en: Write a description for our picture ad that talks about our new skincare product.
  id: totrans-2297
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 为我们的新护肤产品撰写一则描述性的图片广告。
- en: Write a short script for a video ad where satisfied customers talk about our
