  prefs: []
  type: TYPE_NORMAL
  zh: '23: 编写可用性测试用例'
- en: 'Prompt:'
  id: totrans-525
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Write usability test cases for a food delivery app’s order tracking feature.
