- en: Hosting your code
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: After creating programs that run on your machine, you might be interested in
    making them accessible to other users or yourself by deploying them on the cloud.
  prefs: []
  type: TYPE_NORMAL
- en: For cloud hosting there are many different providers able to host your code
    for Python. I recommend a simple service called PythonAnywhere (pythonanywhere.com).
    It provides straightforward cloud hosting.
  prefs: []
  type: TYPE_NORMAL
- en: So, let’s illustrate how we can host the website we create previously on PythonAnywhere.
  prefs: []
  type: TYPE_NORMAL
