  - PREF_H1
  type: TYPE_NORMAL
- en: 'Before you send your next prompt, run it through this quick checklist:'
  prefs: []
  type: TYPE_NORMAL
- en: '✅ Clear Intent:'
  prefs: []
  type: TYPE_NORMAL
- en: Am I clear on exactly what I want ChatGPT to do?
  prefs: []
  type: TYPE_NORMAL
- en: '✅ Context Provided:'
  prefs: []
  type: TYPE_NORMAL
- en: Have I given enough background, details, or examples?
  prefs: []
  type: TYPE_NORMAL
- en: '✅ Specific Instructions:'
  prefs: []
  type: TYPE_NORMAL
- en: Did I mention tone, format, structure, style, or audience?
  prefs: []
  type: TYPE_NORMAL
- en: '✅ One Task at a Time:'
  prefs: []
  type: TYPE_NORMAL
- en: Am I asking for ONE thing clearly instead of overwhelming with multiple?
  prefs: []
  type: TYPE_NORMAL
- en: '✅ Iteration Mindset:'
  prefs: []
  type: TYPE_NORMAL
- en: Am I prepared to refine and improve the output after the first draft?
  prefs: []
  type: TYPE_NORMAL
- en: '✅ Energy and Curiosity:'
  prefs: []
  type: TYPE_NORMAL
- en: Am I treating this like a creative dialogue, not just a one-time request?
