- en: '****T**he** ****fi**rst** ****re**aso**n ****w**hy** ****ma**ny** ****pe**opl**e
    ****d**on**’****t**** ****g**et** ****t**he** ****me**nta**l ****he**alt**h ****ca**re**
    ****th**ey** ****ne**ed** ****i**s** ****bec**aus**e ****o**f** ****t**he** ****pr**ice**
    ****t**ag** ****att**ache**d ****t**o** ****get**tin**g ****i**t**. ****Me**nta**l
    ****he**alt**h ****is**sue**s ****af**fec**t ****eve**ryon**e, ****fr**om** ****ri**ch**
    ****t**o** ****po**or**, ****b**ut** ****t**he** ****ri**ch** ****a**re** ****a**t**
    ****le**ast** ****ab**le** ****t**o** ****af**for**d ****t**o** ****g**et** ****t**he**
    ****he**lp** ****th**ey** ****ne**ed**. ****Th**ose** ****le**ss** ****we**ll**-****o**ff**
    ****fina**nciall**y ****n**ot** ****on**ly** ****d**on**’****t**** ****ha**ve**
    ****t**he** ****mo**ney** ****t**o** ****p**ay** ****f**or** ****he**lp** ****a**nd**
    ****trea**tmen**t, ****b**ut** ****th**ey** ****al**so** ****enco**unte**r ****ma**ny**
    ****mo**re** ****o**f** ****t**he** ****str**esse**s ****a**nd** ****str**ain**s,
    ****wor**rie**s ****a**nd** ****wo**es** ****i**n** ****th**eir** ****da**ily**
    ****li**fe** ****th**at** ****exac**erbat**e ****me**nta**l ****he**alt**h ****pro**blem**s.
    ****Har**var**d ****Univ**ersit**y’****s**** ****Nat**iona**l ****Como**rbidit**y
    ****Su**rve**y ****fo**und** ****th**at** ****4**7**% ****o**f** ****th**ose**
    ****th**at** ****resp**onde**d ****b**y** ****sa**yin**g ****th**ey** ****h**ad**
    ****so**me** ****fo**rm** ****o**f** ****me**nta**l ****he**alt**h ****is**sue**
    ****al**so** ****sa**id** ****th**at** ****th**ey** ****co**uld**n’****t**** ****af**for**d
    ****t**o** ****g**et** ****he**lp**, ****b**ut** ****th**at** ****th**ey** ****wo**uld**
    ****se**ek** ****he**lp** ****i**f** ****th**ey** ****co**uld** (****Adr**acar**e,
    ****20**21**).'
  id: totrans-602
  prefs: []
  type: TYPE_NORMAL
  zh: '****第一个原因，为什么许多人得不到他们需要的心理健康护理，是因为获取它的价格标签。心理健康问题影响每个人，从富人到穷人，但富人至少有能力支付他们需要的帮助。那些经济条件不佳的人不仅没有钱支付帮助和治疗，而且他们还面临着许多更多的压力和紧张，日常生活中的担忧和痛苦加剧了心理健康问题。哈佛大学的全国共病调查发现，47%的受访者表示他们有某种形式的心理健康问题，同时也表示他们负担不起寻求帮助，但如果他们能负担得起，他们会寻求帮助。（AdracaRe,
    2021）。'
