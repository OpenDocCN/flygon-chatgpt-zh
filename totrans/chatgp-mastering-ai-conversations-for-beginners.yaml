  zh: '****你****曾****听****说****过****“****数****字****足****迹”****这****个****词****吗****?
    ****它****指****的是****你****在****网****络****世****界****中****留****下的****数****据****痕****迹****，****也****称****为****“****互****联****网****”****。
    ****虽****然****这****一****般****被****视****为****对****平****均****人****群****来****说****是****一****件****不****良****的****事****（****因****为****它****常****常****包****含****个****人****搜****索****或****信****息****，****我们****不****想****被****人****联****系****或****不****愿****意****让****市****场****营****销****人****员****使****用**）****，****但对****于****企****业****来****说****，****它****却****是****无****价****的****。
    ****分****析****你****的****客****户****的****数****字****足****迹****，****可****以****提****供****关****键****的****洞****察****，****这****些****洞****察****能****够****为****你****打****开****一****扇****通****向****目****标****受****众****的****喜****好****与****不****喜****欢****、****关****注****的****事****物****、****以****及****他****们****花****费****钱****的****方****式****的****视****窗****。
    ****通****过****收****集****大****量****这****类****数****据****，****你****还****能****够****识****别****目****标****市****场****的****行****为****趋****势****和****消****费****模****式****，****从而****使****你****能****够****定****制****产****品****，****以****便****反****映****这****些****趋****势****和****模****式****。
    ****分****析****你****的****客****户****的****数****字****足****迹****还****意****味****着****你****能****够****更****好****地****了****解****他****们****，****为****你****个****性****化****他****们****，****并****且****从****而****向****他****们****展****示****你****的****业****务****如****何****使****他****们****感****觉****更****加****个****性****化****。
    ****越****来****越****多****地****了****解****你****的****目****标****受****众****，****你****就****越****能****够****准****确****地****描****绘****他****们****是****谁****，****他****们****要****什****么****。
    ****你****对****这****些****了****解****越****多****，****你****就****越****能****够****根据****这****些****了****解****定****制****你****的****内****容****和****营****销****策****略****。
    ****最****终****的****结****果****是****：****一****个****更****加****可****信****、****忠****诚****的****客****户****基****础****，****他****们****会****感****觉****你****是****他****们****中****的****一****员****。”'
