    ****assi**gnment**s ****a**nd** ****asse**ssment**s. ****Plag**iaris**m ****o**r**
    ****ov**er**-****depe**ndenc**e ****o**n** ****A**I** ****f**or** ****ori**gina**l
    ****wo**rk** ****unde**rmine**s ****t**he** ****lea**rnin**g ****pro**ces**s.'
  id: totrans-574
  prefs: []
  type: TYPE_NORMAL
  zh: 学生和教师必须确保 ChatGPT 的道德使用，尤其是在作业和评估中。剽窃或过度依赖 AI 进行原创工作会损害学习过程。
