  id: totrans-385
  prefs: []
  type: TYPE_NORMAL
  zh: '**我们**已经覆盖了围绕这些疯狂酷炫的东西（称为GPts）的许多基于**特定**的信息，但这些深度学习模型**究竟**能做什么？嗯，几乎任何基于**信息**的任务，你都可以设置它，真的。而且，你与GPT关于一个特定主题“**聊天**”越多，你的答案和结果就会越**精细**。虽然ChatGPT有几乎同样多的应用，但在人类心中仍有许多问题，让我们快速列举出这个强大新计算机程序最常见的用途：'
