    ****a**n** ****ove**rvie**w ****o**f** ****h**ow** ****w**e** ****we**nt** ****fr**om**
    ****cou**ntin**g ****st**ick**s ****a**nd** ****st**one**s ****t**o** ****deve**lopin**g
