    ****c****a**n** ****b****e**** ****a**** ****coll**ab**or**ato**r, ****a**** ****me**n**t**or**
    ****a****n**d** ****a**** ****cat**a**ly**st** ****f****o**r** ****crea**t**iv**ity**.
    ****B****u**t** ****i****t**** ****al****s**o** ****rem**i**n**ds** ****u****s****
    ****th****a**t** ****wi****t**h** ****th****i**s** ****po**w**e**r** ****co**m**e**s**
    ****t****h**e** ****respo**ns**ibi**lit**y ****t****o**** ****u****s**e** ****i****t****
