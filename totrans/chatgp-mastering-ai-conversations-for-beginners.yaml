  type: TYPE_NORMAL
  zh: 当你的聊天机器人不会大声呼喊或对网站访客提出无意义的问题而使他们生气时，它可能会显得冷漠和疏远。这几乎和有一个脾气暴躁的人类回答客户问题一样，甚至更糟，因为人们最不喜欢的是被冷漠和漠不关心的态度对待我们的问题和痛点。在人工智能世界中，粗鲁的表现与人类的粗鲁表现几乎没有区别。它包括像自动播放的弹出广告或视频这样的因素，这些广告或视频会自动播放，要求用户填写“我做得怎么样？”的调查问卷，而他们的问题甚至还没有得到解决，或者浪费他们的时间，通过不必要的推送优惠或折扣来打扰他们，而这些优惠或折扣与他们在机器人上聊天的原因没有任何关系。正如霍尔在她的书中所说，“礼貌的设计是那些在不打断客户追求目标的过程中满足商业目标的设计”（在Zabój，2020年）。
