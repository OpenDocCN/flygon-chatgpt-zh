- en: 25.Google Ads
  id: totrans-1727
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 25.Google Ads
- en: '![image](d2d_images/chapter_title_below.png)'
  id: totrans-1728
  prefs: []
  type: TYPE_IMG
  zh: '![图片](d2d_images/chapter_title_below.png)'
- en: How can I lower my cost per click and raise my Google Ads relevance score?
  id: totrans-1729
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 我如何降低我的每次点击成本并提高我的Google Ads相关性评分？
- en: How should I set up my ad groups and campaigns in Google AdWords to effectively
    accomplish my marketing objectives?
  id: totrans-1730
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 我应该如何在Google AdWords中设置我的广告组和活动，以有效地实现我的营销目标？
- en: In order to reach our [ideal client persona], please provide a list of pertinent
    keywords that we should target in our PPC advertising campaign.
  id: totrans-1731
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 为了接触我们的[理想客户角色]，请提供一份我们应该在我们的PPC广告活动中针对的相关关键词列表。
- en: Could you make a Google advertisement with a pertinent call-to-action that highlights
    our [product/service]?
  id: totrans-1732
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 您能否制作一个具有相关号召性用语（CTA）的Google广告，突出我们的[产品/服务]？
- en: Which keywords and ad copy work best for my [target audience] and [product/service]?
  id: totrans-1733
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 哪些关键词和广告文案最适合我的[目标受众]和[产品/服务]？
- en: I want to avoid wasting my ad spend, can you provide me with a list of negative
    terms I should remove from my Google Ads campaigns?
  id: totrans-1734
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 我想避免浪费我的广告费用，您能为我提供一份我应该从我的Google Ads广告活动中移除的否定术语列表吗？
- en: How can I get the most return on investment from my Google Ads campaigns by
    using the best bidding strategy?
  id: totrans-1735
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 我如何通过使用最佳的出价策略，从我的Google Ads广告活动中获得最高的投资回报率？
- en: In order to prevent wasting ad spend, please provide a list of negative keywords
    that we should exclude from our Google advertising campaign.
  id: totrans-1736
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 为了防止浪费广告费用，请提供一份我们应该从我们的Google广告活动中排除的否定关键词列表。
- en: Could you create a landing page with all the details our [product/service] requires,
    optimized for our PPC ad?
  id: totrans-1737
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 您能否创建一个包含我们[产品/服务]所需所有详细信息的着陆页，并针对我们的PPC广告进行优化？
- en: Please create a PPC advertising plan that tests several landing pages and ad
    creatives in a split-testing manner to maximize conversions.
  id: totrans-1738
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请创建一个PPC广告计划，通过拆分测试的方式测试几个着陆页和广告创意，以最大化转化率。
- en: How do I make my Google Ads campaigns better for getting more value?
  id: totrans-1739
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 我如何使我的Google Ads广告活动更有效，以获得更多价值？
- en: What's the right way to find keywords in Google Ads?
  id: totrans-1740
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在Google Ads中，正确的寻找关键词的方法是什么？
- en: How do I use negative keywords well in my Google Ads campaigns?
  id: totrans-1741
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 我如何在Google Ads广告活动中有效地使用否定关键词？
- en: How do I make ads that people really want to click on in Google Ads?
  id: totrans-1742
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 我如何在Google Ads中制作人们真正想要点击的广告？
- en: What's the smartest way to decide how much money to bid and manage my budget
    in Google Ads?
  id: totrans-1743
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在谷歌广告中，决定出价多少和如何管理我的预算的最明智方式是什么？
- en: How can I add extra features to my ads using Google Ads Extensions?
  id: totrans-1744
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 我如何使用谷歌广告扩展功能为我的广告添加额外功能？
- en: How do I make my ads get a higher Quality Score so they work better and cost
    less?
  id: totrans-1745
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 我如何提高我的广告质量得分，使它们效果更好且成本更低？
- en: What's the best way to choose who sees my ads and split them into groups in
    Google Ads?
  id: totrans-1746
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在谷歌广告中，选择谁看到我的广告并将它们分组到不同的组中，最好的方法是什么？
- en: How can I show my ads again to people who've seen them before in Google Ads?
  id: totrans-1747
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 我如何在谷歌广告中再次向之前看过的人展示我的广告？
- en: What tools can I use to see how well my Google Ads campaigns are doing?
  id: totrans-1748
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 我可以使用哪些工具来查看我的谷歌广告活动表现如何？
- en: How do I make my Google Ads work well on phones and tablets?
  id: totrans-1749
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 我如何使我的谷歌广告在手机和平板电脑上工作得更好？
- en: How can I make Google Ads scripts do the hard work for me and make my ads better?
  id: totrans-1750
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 我如何使谷歌广告脚本为我做艰苦的工作并使我的广告变得更好？
- en: What's the right way to organize my Google Ads account to make it work best?
  id: totrans-1751
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 如何组织我的谷歌广告账户，使其发挥最佳效果？
- en: How do I make a Google Shopping campaign that sells my online store products
    well?
  id: totrans-1752
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 我如何制作一个能有效地销售我的在线商店产品的谷歌购物活动？
- en: How can I make Google Ads' Dynamic Search Ads feature help my campaigns work
    better?
  id: totrans-1753
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 我如何让谷歌广告的动态搜索广告功能帮助我的活动更好地工作？
- en: What are the right things to do when setting up and managing a campaign on Google
    Display Network?
  id: totrans-1754
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在设置和管理谷歌展示网络上的活动时，我应做哪些正确的事情？
- en: How do I use Google Ads' location targeting to reach the people I want?
  id: totrans-1755
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 我如何使用谷歌广告的位置定位来接触我想要的人？
- en: How can I use Google Analytics to make my Google Ads campaigns better?
  id: totrans-1756
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 我如何使用谷歌分析来使我的谷歌广告活动变得更好？
- en: What's the smartest way to test different ads and pages in Google Ads to see
    which works better?
  id: totrans-1757
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在谷歌广告中测试不同广告和页面的最明智方式是什么，以查看哪个效果更好？
- en: How do I set up my Google Ads campaigns to get more people to do what I want,
    like buy something?
  id: totrans-1758
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 我如何设置我的谷歌广告活动，以吸引更多人做我想让他们做的事情，比如购买东西？
- en: How do I make Google Ads' Smart Bidding work better for my ads?
  id: totrans-1759
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 我如何使谷歌广告的智能出价对我广告的效果更好？
- en: What's the right way to handle and make better many Google Ads accounts?
  id: totrans-1760
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 处理和优化多个谷歌广告账户的正确方式是什么？
- en: How do I make a Google Ads campaign that works well for my small business?
  id: totrans-1761
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 我该如何制作一个适合我小型企业的有效谷歌广告活动？
- en: How can I use Google Ads' in-market audiences to reach people who really want
    what I offer?
  id: totrans-1762
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 我如何使用谷歌广告的市场内受众来接触真正想要我提供的产品的人？
- en: What's the best way to set up and manage a campaign on YouTube using Google
    Ads?
  id: totrans-1763
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在YouTube上使用谷歌广告设置和管理活动的最佳方式是什么？
- en: How do I use Google Ads' Custom Intent audiences to find people interested in
    what I sell?
  id: totrans-1764
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 我如何使用谷歌广告的定制意图受众来找到对我销售的产品感兴趣的人？
- en: What's the right way to make Google Ads work well for special times or events
    during the year?
  id: totrans-1765
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在一年中的特殊时间或事件期间，使谷歌广告工作得更好的正确方式是什么？
- en: How do I use Google Ads' features to aim my ads at specific groups of people?
  id: totrans-1766
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 我如何使用谷歌广告的功能将我的广告定位到特定的人群？
- en: What are the best things to do with Google Ads' ad rotation settings to make
    my ads work better?
  id: totrans-1767
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在谷歌广告中，我可以通过哪些最佳做法来设置广告轮播设置，使我的广告效果更好？
- en: How do I use Google Ads' similar audiences feature to find new customers?
  id: totrans-1768
  prefs:
