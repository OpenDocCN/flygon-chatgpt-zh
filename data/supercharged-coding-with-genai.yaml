- en: Preface
  id: totrans-51
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 前言
- en: '*Supercharged Coding with GenAI* aims to train software developers to achieve
    increased productivity throughout the **software development life cycle** (**SDLC**).
    It covers not only the programming aspect but also how to write tests, documentation,
    and other aspects required for putting software into production using GenAI methods.
    The book introduces the *five S’s* framework, a standardized approach for consistently
    producing high-quality output that many GenAI users face.'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: '*Supercharged Coding with GenAI* 旨在培训软件开发人员在整个 **软件开发生命周期**（**SDLC**）中提高生产力。它不仅涵盖了编程方面，还包括如何使用
    GenAI 方法编写测试、文档以及其他将软件投入生产所需的方面。本书介绍了 *五个S框架*，这是一种标准化的方法，旨在持续产生高质量的输出，许多 GenAI
    用户都会遇到。'
- en: 'It guides you on how and when to use the three most common GenAI software tools
    that currently dominate the marketplace: ChatGPT, OpenAI API, and GitHub Copilot.
    Each of these tools offers a different interface for generating code, each with
    different strengths and weaknesses. Learning how to effectively use these tools
    is an empowering skill set in the quickly evolving field of software engineering.'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 它指导您如何以及何时使用目前市场上占主导地位的三个最常见 GenAI 软件工具：ChatGPT、OpenAI API 和 GitHub Copilot。每个工具都提供不同的代码生成界面，各有不同的优势和劣势。学习如何有效地使用这些工具是软件工程快速发展的领域中一种赋权技能集。
- en: This book is a hands-on approach, with many labs introduced throughout the different
    chapters, since GenAI coding tools require practice. The labs provide the necessary
    practice to challenge the knowledge and explore the key skills introduced. The
    book also dives deeper into the concepts behind how to use instructions, making
    sure that you not only learn *how* to do something but also understand *why* the
    GenAI is producing particular outputs.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 本书采用实践方法，在不同章节中介绍了许多实验室，因为 GenAI 编码工具需要练习。这些实验室提供了必要的练习，以挑战知识并探索引入的关键技能。本书还深入探讨了如何使用指令背后的概念，确保您不仅学习
    *如何* 做某事，而且理解 *为什么* GenAI 会产生特定的输出。
- en: 'The book is structured into three parts:'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 本书分为三个部分：
- en: '*Part 1*, *Foundations for Coding with GenAI*, provides a quick start tutorial
    for the three different GenAI tools you can use for code completion and surrounding
    tasks. We will start with OpenAI API framework to harness the **large language
    models** (**LLMs**) as a software developer. We built a program for code completion
    so we can better understand the design of GenAI tools. Next, we will get started
    with GitHub Copilot and ChatGPT using three different interaction modes: chat,
    completion, and analysis. By then, we will also understand the design differences
    among the different interaction modes. Finally, we will introduce the five S’s
    framework, a structured approach to crafting precise prompts that lead to predictable
    and more desirable outputs.'
  id: totrans-56
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*第一部分*，*使用GenAI进行编码的基础*，提供了三个不同GenAI工具的快速入门教程，这些工具可用于代码补全和相关任务。我们将从OpenAI API框架开始，利用**大型语言模型**（**LLMs**）作为软件开发者。我们构建了一个代码补全程序，以便更好地理解GenAI工具的设计。接下来，我们将使用GitHub
    Copilot和ChatGPT开始，采用三种不同的交互模式：聊天、补全和分析。到那时，我们也将了解不同交互模式之间的设计差异。最后，我们将介绍五个S框架，这是一种构建精确提示的结构化方法，可以引导出可预测且更理想的输出。'
- en: '*Part 2*, *Basics to Advanced LLM Prompting for GenAI Coding,* takes the next
    step toward becoming supercharged coders. We will dive deeper into the foundations
    of LLMs. The goal is to gain a better understanding of why these models work so
    much better than the many tools that came before them. We will then start developing
    the mindset of a supercharged coder by learning which tasks are native to the
    models, which require advanced prompting techniques, and which tasks are better
    handled without the assistance of GenAI altogether. We will also learn about applying
    advanced prompting techniques to coding-related tasks, how to evaluate the goodness
    of our output with evaluation techniques, and how to fine-tune a model to specialize
    it for a specific task.'
  id: totrans-57
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*第二部分*，*GenAI编码的LLM提示从基础到高级*，是成为超级编码者的下一步。我们将更深入地研究LLMs的基础。目标是更好地理解为什么这些模型比之前的许多工具表现得更好。然后，我们将通过学习哪些任务是模型的原生任务，哪些任务需要高级提示技术，以及哪些任务最好不依赖GenAI的帮助来培养超级编码者的心态。我们还将学习如何将高级提示技术应用于与编码相关的任务，如何使用评估技术评估我们输出的质量，以及如何微调模型以使其针对特定任务进行专业化。'
- en: '*Part 3*, *From Code to Production with GenAI*, is dedicated to the advanced
    SDLC approach, where we will be able to use our newly obtained skillset and mindset
    to work with GenAI tools. We will talk about logging, monitoring, debugging, unit
    testing, and documenting our code efficiently and quickly with GenAI tools. We
    will also apply prompt engineering techniques to both space and memory optimizations.
    We will close this chapter with talks about design, architecture, and the future.'
  id: totrans-58
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*第三部分*，*使用GenAI从代码到生产的实践*，致力于高级SDLC方法，我们将能够使用新获得的能力和心态与GenAI工具一起工作。我们将讨论使用GenAI工具高效快速地进行日志记录、监控、调试、单元测试和文档编写。我们还将应用提示工程技术进行空间和内存优化。我们将以关于设计、架构和未来的讨论结束这一章节。'
- en: Who this book is for
  id: totrans-59
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 本书面向对象
- en: If you are a Python developer curious about GenAI and are looking to elevate
    your software engineering productivity, this book will transform your approach
    to software. We include many structured examples of varying problem complexity
    that will demonstrate the use of advanced prompting techniques, suitable for early
    intermediate through advanced developers.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你是一名对GenAI感兴趣的Python开发者，并希望提高你的软件工程生产力，这本书将改变你对软件的方法。我们包括了许多不同问题复杂性的结构化示例，这些示例将展示高级提示技术的应用，适用于初级到高级的开发者。
- en: To get the most out of this book, you should have at least one year of hands-on
    Python development experience and be somewhat familiar with the SDLC.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 为了最大限度地利用这本书，你应该至少有一年的Python开发实践经验，并对SDLC有一定了解。
- en: What this book covers
  id: totrans-62
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 本书涵盖内容
- en: '[*Chapter 1*](Chapter_1.xhtml#_idTextAnchor037), *From Automation to Full Software
    Development Life Cycle: The Current Opportunity for GenAI*,describes the recent
    convergence of software development tools and the AI transformation with LLMs.
    It makes a case that now is the best time to improve skills in GenAI to produce
    quality code faster.'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: '[*第一章*](Chapter_1.xhtml#_idTextAnchor037)，*从自动化到全软件生命周期开发：GenAI的当前机遇*，描述了软件开发工具与基于LLM的AI转型的最新融合。它提出现在是提高GenAI技能以更快地生成高质量代码的最佳时机。'
- en: '[*Chapter 2*](Chapter_2.xhtml#_idTextAnchor061), *Your Quickstart Guide to
    OpenAI API*, introduces everything you need to know to begin using OpenAI. By
    the end of the chapter, you will be able to start using it to write code.'
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: '[*第2章*](Chapter_2.xhtml#_idTextAnchor061), *OpenAI API快速入门指南*，介绍了开始使用OpenAI所需了解的一切。到本章结束时，你将能够开始用它来编写代码。'
- en: '[*Chapter 3*](Chapter_3.xhtml#_idTextAnchor108), *A Guide to GitHub Copilot
    with PyCharm, VS Code, and Jupyter Notebook*, provides setup instructions for
    GitHub Copilot, the pair programming GenAI tool. It then shows how to integrate
    GitHub Copilot with the two most popular IDEs. With this background, you will
    be able to prompt with GenAI.'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: '[*第3章*](Chapter_3.xhtml#_idTextAnchor108), *GitHub Copilot在PyCharm、VS Code和Jupyter
    Notebook中的指南*，提供了GitHub Copilot（一种配对编程GenAI工具）的设置说明。然后展示了如何将GitHub Copilot与两个最受欢迎的IDE集成。有了这个背景，你将能够使用GenAI进行提示。'
- en: '[*Chapter 4*](Chapter_4.xhtml#_idTextAnchor166), *Best Practices for Prompting
    with ChatGPT*, dives into prompting, which is a core skill for GenAI coding. This
    chapter introduces the five S’s framework for consistent outputs.'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: '[*第4章*](Chapter_4.xhtml#_idTextAnchor166), *使用ChatGPT进行提示的最佳实践*，深入探讨了提示，这是GenAI编码的核心技能。本章介绍了用于一致输出的五个S框架。'
- en: '[*Chapter 5*](Chapter_5.xhtml#_idTextAnchor205), *Best Practices for Prompting
    with OpenAI API and GitHub Copilot*, completes *Part 1* of the book by extending
    the prompting methods to functions, classes, and methods. The methods are applied
    to not just writing code but also fixing bugs and providing documentation.'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: '[*第5章*](Chapter_5.xhtml#_idTextAnchor205), *使用OpenAI API和GitHub Copilot进行提示的最佳实践*，通过将提示方法扩展到函数、类和方法，完成了本书的*第一部分*。这些方法不仅应用于编写代码，还用于修复错误和提供文档。'
- en: '[*Chapter 6*](Chapter_6.xhtml#_idTextAnchor249), *Behind the Scenes: How ChatGPT,
    GitHub Copilot, and Other LLMs Work*, sheds light on how LLMs work under the hood
    since such an understanding can help understand the strengths and limitations.
    The chapter begins with a statistical example as a motivation and continues through
    general LLMs. The chapter concludes with the extension to code-specific LLMs that
    are at the heart of GitHub Copilot.'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: '[*第6章*](Chapter_6.xhtml#_idTextAnchor249), *幕后揭秘：ChatGPT、GitHub Copilot和其他LLMs是如何工作的*，揭示了LLMs底层的工作原理，因为这种理解有助于了解其优势和局限性。本章从一个统计示例开始，然后继续讨论通用的LLMs。本章以扩展到GitHub
    Copilot核心的代码特定LLMs结束。'
- en: '[*Chapter 7*](Chapter_7.xhtml#_idTextAnchor304), *Reading and Understanding
    Code Bases with GenAI*, showcases the effectiveness of the different GenAI tools
    in working with full code bases. The chapter shows how GenAI can explain how code
    works and help debug issues using the code and support documentation.'
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: '[*第7章*](Chapter_7.xhtml#_idTextAnchor304), *使用GenAI阅读和理解代码库*，展示了不同GenAI工具在处理完整代码库中的有效性。本章展示了GenAI如何解释代码的工作原理，并使用代码和支持文档帮助调试问题。'
- en: '[*Chapter 8*](Chapter_8.xhtml#_idTextAnchor339), *An Introduction to Prompt
    Engineering*, applies this recent field to code development and introduces few-shot
    learning. Prompt engineering methods are applied through OpenAI API and GitHub
    Copilot for code refactoring to support a consistent coding style.'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: '[*第8章*](Chapter_8.xhtml#_idTextAnchor339), *提示工程导论*，将这一新兴领域应用于代码开发，并介绍了少样本学习。提示工程方法通过OpenAI
    API和GitHub Copilot用于代码重构，以支持一致的编码风格。'
- en: '[*Chapter 9*](Chapter_9.xhtml#_idTextAnchor391), *Advanced Prompt Engineering
    for Coding-Related Tasks*, extends the few-shot approaches from [*Chapter 8*](Chapter_8.xhtml#_idTextAnchor339)
    into reasoning models. Iterative prompting, chain-of-thought prompting, and chaining
    can effectively deliver highly predictable code that implements key functionality,
    including code and comments.'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: '[*第9章*](Chapter_9.xhtml#_idTextAnchor391), *与编码相关任务的进阶提示工程*，将第8章中介绍的少样本方法扩展到推理模型。迭代提示、思维链提示和链式提示可以有效地生成高度可预测的代码，实现关键功能，包括代码和注释。'
- en: '[*Chapter 10*](Chapter_10.xhtml#_idTextAnchor424), *Refactoring Code with GenAI*,
    revisits and extends the chain-of-thought prompting technique to improve code.
    The chapter covers examples of refactoring code for improved quality and performance.'
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: '[*第10章*](Chapter_10.xhtml#_idTextAnchor424), *使用GenAI重构代码*，回顾并扩展了思维链提示技术以提高代码质量。本章涵盖了重构代码以提高质量和性能的示例。'
- en: '[*Chapter 11*](Chapter_11.xhtml#_idTextAnchor452), *Fine-Tuning Models with
    OpenAI*, compares and contrasts the few-shot learning approach with fine-tuning,
    a standard approach for customizing LLMs. The chapter uses the OpenAI Playground
    to compare the effectiveness and costs of the two approaches.'
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: '[*第11章*](Chapter_11.xhtml#_idTextAnchor452)，*使用OpenAI微调模型*，比较和对比了少样本学习方法和微调，这是定制LLMs的标准方法。本章使用OpenAI游乐场来比较两种方法的有效性和成本。'
- en: '[*Chapter 12*](Chapter_12.xhtml#_idTextAnchor495), *Documenting Code with GenAI*,
    begins *Part 3*, which focuses on SDLC components beyond coding. The chapter is
    a how-to guide for effectively writing docstrings, the standard documentation
    for Python. It also provides solutions to the problem of out-of-date comments
    within the code.'
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: '[*第12章*](Chapter_12.xhtml#_idTextAnchor495)，*使用GenAI编写代码文档*，开始*第3部分*，该部分专注于SDLC组件之外的编码。本章是编写Python标准文档的指南，即docstrings，同时也提供了解决代码中过时注释问题的解决方案。'
- en: '[*Chapter 13*](Chapter_13.xhtml#_idTextAnchor526), *Writing and Maintaining
    Unit Tests*, demonstrates multiple methods for leveraging GenAI to accelerate
    the creation of tests. The chapter also covers the test-driven development (TDD)
    process of writing test cases first and automatically generating the functional
    code to pass the tests.'
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: '[*第13章*](Chapter_13.xhtml#_idTextAnchor526)，*编写和维护单元测试*，展示了利用GenAI加速测试创建的多种方法。本章还涵盖了测试驱动开发（TDD）过程，即先编写测试用例，然后自动生成功能代码以通过测试。'
- en: '[*Chapter 14*](Chapter_14.xhtml#_idTextAnchor566), *GenAI for Runtime and Memory
    Management*, delves into performance optimization, which is rarely discussed in
    GenAI code literature. Its examples show how to assess performance trade-offs
    and, using a combination of prompting with chaining prompts, how to estimate runtime
    capacities and optimize code to run at scale.'
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: '[*第14章*](Chapter_14.xhtml#_idTextAnchor566)，*GenAI用于运行时和内存管理*，深入探讨了性能优化，这在GenAI代码文献中很少讨论。其示例展示了如何评估性能权衡，以及如何通过提示链结合提示来估计运行时容量并优化代码以大规模运行。'
- en: '[*Chapter 15*](Chapter_15.xhtml#_idTextAnchor610), *Going Live with GenAI:
    Logging, Monitoring, and Errors*, provides guidance on the use of GenAI for key
    late-stage components for putting code into production. The chapter brings together
    past concepts such as enforcing style, few-shot learning, and fine-tuning as applied
    to monitoring and logging methods.'
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: '[*第15章*](Chapter_15.xhtml#_idTextAnchor610)，*使用GenAI上线：日志记录、监控和错误处理*，提供了使用GenAI进行关键后期组件（将代码投入生产）的指导。本章将过去的概念，如强制风格、少样本学习和微调，应用于监控和日志记录方法。'
- en: '[*Chapter 16*](Chapter_16.xhtml#_idTextAnchor643), *Architecture, Design, and
    the Future*, discusses the rise of GenAI, software economics, and the changing
    landscape of software engineering. It provides a perspective on the future of
    software engineering from vibe coding to long-term expectations, including risks
    and governance.'
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: '[*第16章*](Chapter_16.xhtml#_idTextAnchor643)，*架构、设计和未来*，讨论了GenAI的兴起、软件经济学以及软件工程领域的变革。它从vibe编码到长期预期，包括风险和治理，提供了对软件工程未来的观点。'
- en: To get the most out of this book
  id: totrans-79
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 为了最大限度地利用这本书
- en: 'Following along will be easier if you bear the following in mind:'
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 如果记住以下几点，跟随起来会更容易：
- en: '**Examples**: Begin with the hands-on examples provided in each chapter to
    make sure that you can effectively use all the tools, rather than focus on just
    one'
  id: totrans-81
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**示例**：从每一章提供的动手示例开始，确保你能够有效地使用所有工具，而不仅仅是关注其中一个'
- en: '**Labs**: Use the labs to test your knowledge of how you approach the challenges,
    and use the questions at the end of each chapter to make sure you grasp the fundamentals'
  id: totrans-82
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**实验室**：使用实验室来测试你如何应对挑战的知识，并使用每一章末尾的问题来确保你掌握了基础知识'
- en: '**GenAI approach**: Experiment with the different techniques from each chapter
    on your own code and examples to see how GenAI can change your approach to software
    engineering'
  id: totrans-83
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**GenAI方法**：在自己的代码和示例中尝试每一章的不同技术，看看GenAI如何改变你对软件工程的方法'
- en: '**Think beyond**: Reflect on how the practical knowledge of the introduced
    GenAI tools relates to the fundamentals of how LLMs work, and how they can enhance
    multiple aspects of your organization’s software development practices'
  id: totrans-84
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**超越思考**：思考所介绍的GenAI工具的实用知识如何与LLMs工作的基本原理相关，以及它们如何增强你组织软件开发实践的多个方面'
- en: 'Here is a list of things you need to have:'
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是一份你需要拥有的清单：
- en: '| **Software/hardware covered in the book** | **System requirements** |'
  id: totrans-86
  prefs: []
  type: TYPE_TB
  zh: '| **本书涵盖的软件/硬件** | **系统要求** |'
- en: '| Python 3.11 or higher | Windows, macOS, or Linux. |'
  id: totrans-87
  prefs: []
  type: TYPE_TB
  zh: '| Python 3.11或更高版本 | Windows、macOS或Linux。 |'
- en: '| LLM chat and embedding models | Windows, macOS, or Linux.You can decide to
    leverage your LLM of choice. Throughout the book, we will be using a variety of
    GPT models from ChatGPT, OpenAI API, and GitHub Copilot. |'
  id: totrans-88
  prefs: []
  type: TYPE_TB
  zh: '| LLM聊天和嵌入模型 | Windows、macOS或Linux。您可以选择利用您选择的LLM。在整个书中，我们将使用来自ChatGPT、OpenAI
    API和GitHub Copilot的各种GPT模型。 |'
- en: Download the example code files
  id: totrans-89
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 下载示例代码文件
- en: The code bundle for the book is hosted on GitHub at [https://github.com/PacktPublishing/Supercharged-Coding-with-Gen-AI](https://github.com/PacktPublishing/Supercharged-Coding-with-Gen-AI).
    We also have other code bundles from our rich catalog of books and videos available
    at [https://github.com/PacktPublishing](https://github.com/PacktPublishing). Check
    them out!
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 本书代码包托管在GitHub上，网址为[https://github.com/PacktPublishing/Supercharged-Coding-with-Gen-AI](https://github.com/PacktPublishing/Supercharged-Coding-with-Gen-AI)。我们还有其他来自我们丰富图书和视频目录的代码包，可在[https://github.com/PacktPublishing](https://github.com/PacktPublishing)找到。查看它们吧！
- en: Download the color images
  id: totrans-91
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 下载彩色图像
- en: 'We also provide a PDF file that has color images of the screenshots/diagrams
    used in this book. You can download it here: [https://packt.link/gbp/9781836645290](https://packt.link/gbp/9781836645290).'
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还提供了一份包含本书中使用的截图/图表彩色图像的PDF文件。您可以从这里下载：[https://packt.link/gbp/9781836645290](https://packt.link/gbp/9781836645290)。
- en: Conventions used
  id: totrans-93
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 约定用法
- en: There are a number of text conventions used throughout this book.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 本书使用了多种文本约定。
- en: '`CodeInText`: Indicates code words in text, database table names, folder names,
    filenames, file extensions, pathnames, dummy URLs, user input, and X handles.
    For example, “The edits window supports the slash commands such as `/fix`, `/explain`,
    and `/test`, as well as tailored instructions to modify your code.”'
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: '`CodeInText`: 表示文本中的代码词汇、数据库表名、文件夹名、文件名、文件扩展名、路径名、虚拟URL、用户输入和X处理。例如：“编辑窗口支持如`/fix`、`/explain`和`/test`等斜杠命令，以及定制指令来修改您的代码。”'
- en: 'A block of code is set as follows:'
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 代码块应如下设置：
- en: '[PRE0]'
  id: totrans-97
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: 'Any command-line input or output is written as follows:'
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 任何命令行输入或输出都应如下所示：
- en: '[PRE1]'
  id: totrans-99
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: '**Bold**: Indicates a new term, an important word, or words that you see on
    the screen, for example, in menus or dialog boxes. For example: “In this chapter,
    we will introduce the practice of **prompt engineering**, a field of study that
    started in 2020, which offers advanced techniques for refining prompts to achieve
    more reliable, predictable, and desirable outcomes in **large language model**
    (**LLM**)-based applications.”'
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: '**粗体**: 表示新术语、重要词汇或您在屏幕上看到的词汇，例如在菜单或对话框中。例如：“在本章中，我们将介绍**提示工程**的实践，这是一个始于2020年的研究领域，它提供了用于改进提示的高级技术，以在**大型语言模型**（**LLM**）应用中实现更可靠、可预测和理想的结果。”'
- en: Warnings or important notes appear like this.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 警告或重要注意事项如下所示。
- en: Tips and tricks appear like this.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 技巧和窍门如下所示。
- en: Disclaimer on AI usage
  id: totrans-103
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 关于AI使用的免责声明
- en: The authors acknowledge the use of cutting-edge AI, such as ChatGPT, OpenAI
    API, and GitHub Copilot, with the sole aim of enhancing the language and clarity
    within the book, thereby ensuring a smooth reading experience for readers. It
    is important to note that the content itself has been crafted by the authors and
    edited by a professional publishing team.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 作者承认使用了尖端AI，如ChatGPT、OpenAI API和GitHub Copilot，其唯一目的是增强书中的语言和清晰度，从而确保读者有一个顺畅的阅读体验。重要的是要注意，内容本身是由作者创作的，并由专业出版团队编辑。
- en: Get in touch
  id: totrans-105
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 联系我们
- en: Feedback from our readers is always welcome!
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 我们读者的反馈总是受欢迎的！
- en: '**General feedback**: Email `feedback@packtpub.com` and mention the book’s
    title in the subject of your message. If you have questions about any aspect of
    this book, please email us at `questions@packtpub.com`.'
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: '**一般反馈**: 请通过电子邮件`feedback@packtpub.com`发送反馈，并在邮件主题中提及本书的标题。如果您对本书的任何方面有疑问，请通过电子邮件`questions@packtpub.com`联系我们。'
- en: '**Errata**: Although we have taken every care to ensure the accuracy of our
    content, mistakes do happen. If you have found a mistake in this book, we would
