  id: totrans-500
  prefs: []
  type: TYPE_NORMAL
  zh: '[1](#footnote-12250-1-backlink). OpenAI, "使用 OpenAI API 的最佳提示工程实践"（2023年11月访问；[https://help.openai.com/en/articles/6654000-best-practices-for-prompt-engineering-with-openai-api](https://help.openai.com/en/articles/6654000-best-practices-for-prompt-engineering-with-openai-api))。'
