  prefs: []
  type: TYPE_NORMAL
- en: '**SLICING AND SPLICING STRINGS**'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Python enables you to extract substrings of a string (called “slicing”) using
    array notation. Slice notation is start:stop:step, where the start, stop, and
    step values are integers that specify the start value, end value, and the increment
    value, respectively. The interesting part about slicing in Python is that you
    can use the value -1, which operates from the right-side instead of the left-side
    of a string.
