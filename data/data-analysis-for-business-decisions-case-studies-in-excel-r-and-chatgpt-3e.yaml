  id: totrans-856
  prefs: []
  type: TYPE_IMG
  zh: '![图片](images/pg120.jpg)'
- en: FIGURE 6.4 Illustration of the use of the Excel Frequency function in the Analysis
    ToolPak to create a histogram of profit
  id: totrans-857
  prefs: []
  type: TYPE_NORMAL
  zh: 图6.4 使用 Excel 分析工具包中的频率函数创建利润直方图的示例
- en: What can you say about the distribution of profits per sale ([Figure 6.5](#fig6-5))?
  id: totrans-858
