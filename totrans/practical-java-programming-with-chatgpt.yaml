- en: Use a web browser to go to the **ChatGPT** website at **[https://chat.openai.com/auth/login](https://chat.openai.com/auth/login)**
    to give the Welcome Login prompt as shown in *[Figure 1.1](#fig1_1)***:**![](images/Figure-1.01.jpg)
  id: totrans-329
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用网络浏览器访问**ChatGPT**网站**[https://chat.openai.com/auth/login](https://chat.openai.com/auth/login)**，以显示如图*[图1.1](#fig1_1)*所示的欢迎登录提示：**![](images/Figure-1.01.jpg)
- en: '**Figure 1.1:** The ***ChatGPT*** Login web page'
  id: totrans-330
