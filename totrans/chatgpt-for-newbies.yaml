- en: 'Appendix A: Advanced Prompt Formulas - Your Shortcut to AI Mastery'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Prompts are not just for ChatGPT. AI tools like Copilot, Gemini, and Claude
    AI have become integral parts of our work and daily routines, and if you’re using
    them, prompts function in a similar way. To maximize the benefits of these tools,
    mastering the art of prompt engineering is essential. By crafting precise, targeted
    prompts, you can receive more accurate, clear, and tailored responses, saving
    you time and providing deeper insights. This, in turn, fosters creativity and
    broadens your knowledge, allowing you to tap into the full potential of AI.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here are 5 key formulas to optimize your use of prompts and boost your work
    efficiency:'
  prefs: []
  type: TYPE_NORMAL
- en: T-A-G Formula
  prefs: []
  type: TYPE_NORMAL
- en: 'The T-A-G (Task-Action-Goal) formula is a highly effective method for creating
    prompts when using AI tools like ChatGPT. Here''s how to apply it:'
  prefs: []
  type: TYPE_NORMAL
- en: '• Task: Clearly define the task you want the AI to perform. Be specific, such
    as “write a poem”, “summarize an article”, or “solve a math problem”.'
  prefs: []
  type: TYPE_NORMAL
- en: '• Action: Describe the actions you want the AI to take to complete the task,
    including the method, format, or any specific elements to incorporate.'
  prefs: []
  type: TYPE_NORMAL
- en: '• Goal: State the ultimate purpose of the task, whether it''s to gather information,
    learn something new, or entertain.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Example using the T-A-G formula:'
  prefs: []
  type: TYPE_NORMAL
- en: '• Task: I need a poem about spring.'
  prefs: []
  type: TYPE_NORMAL
- en: '• Action: The poem should be concise, rich in imagery, and use metaphors.'
  prefs: []
  type: TYPE_NORMAL
- en: '• Goal: The poem will be used in a presentation about spring''s renewal and
    vitality.'
  prefs: []
  type: TYPE_NORMAL
- en: By structuring your prompt with the T-A-G formula, you help the AI understand
    your request more clearly, leading to more accurate and relevant responses. This
    method is a strategic approach to using AI for information gathering and problem-solving.
  prefs: []
  type: TYPE_NORMAL
- en: R-T-F Formula
  prefs: []
  type: TYPE_NORMAL
- en: 'The R-T-F (Role-Task-Format) formula enhances how you use AI for information
    gathering and problem-solving:'
  prefs: []
  type: TYPE_NORMAL
- en: '• Role: Identify the role you want the AI to assume, such as a writer, analyst,
    or teacher.'
  prefs: []
  type: TYPE_NORMAL
- en: '• Task: Describe the specific task you want the AI to perform, such as “analyze
    a paragraph”, “create a presentation”, or “give advice.”'
  prefs: []
  type: TYPE_NORMAL
- en: '• Format: Specify the format you want the response to take, including length,
    style, or structure.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Example using the R-T-F formula:'
  prefs: []
  type: TYPE_NORMAL
- en: '• Role: I want you to act as an analyst.'
  prefs: []
  type: TYPE_NORMAL
- en: '• Task: Analyze the impact of social media on youth.'
  prefs: []
  type: TYPE_NORMAL
- en: '• Format: I want a 500-word article in formal language with at least 3 key
    points.'
  prefs: []
  type: TYPE_NORMAL
- en: B-A-B Formula
  prefs: []
  type: TYPE_NORMAL
- en: 'The B-A-B (Before-After-Bridge) formula is powerful for creating persuasive
    prompts, particularly when you want to show the transformation a product, service,
    or idea brings:'
  prefs: []
  type: TYPE_NORMAL
- en: '• Before: Describe the current problem or situation. Outline the challenges
    or unmet needs.'
  prefs: []
  type: TYPE_NORMAL
- en: '• After: Describe the desired outcome after applying the solution.'
  prefs: []
  type: TYPE_NORMAL
- en: '• Bridge: Introduce the solution or actions leading to the transformation,
    explaining how to achieve the desired result.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Example using the B-A-B formula:'
  prefs: []
  type: TYPE_NORMAL
- en: '• Before: I spend too much time organizing information and writing reports.'
  prefs: []
  type: TYPE_NORMAL
- en: '• After: I now complete reports quickly, with well-organized information that''s
    easy to understand.'
  prefs: []
  type: TYPE_NORMAL
- en: '• Bridge: I started using a task management app that automates information
    organization and offers customizable report templates.'
  prefs: []
  type: TYPE_NORMAL
- en: The B-A-B formula not only clarifies the problem and solution but also creates
    a compelling narrative that helps others understand the value of your proposed
    solution. This method is ideal for persuasive communication in writing or speeches.
  prefs: []
  type: TYPE_NORMAL
- en: R-I-S-E Formula
  prefs: []
  type: TYPE_NORMAL
- en: 'The R-I-S-E (Role-Input-Steps-Expectation) formula helps you structure prompts
    clearly and in detail when using AI tools:'
  prefs: []
  type: TYPE_NORMAL
- en: '• Role: Identify the role the AI should take, such as a writer, researcher,
    or guide.'
  prefs: []
  type: TYPE_NORMAL
- en: '• Input: Provide the necessary data, background information, or specific elements
    to consider.'
  prefs: []
  type: TYPE_NORMAL
- en: '• Steps: Outline the specific steps the AI should take to achieve the desired
    result.'
  prefs: []
  type: TYPE_NORMAL
- en: '• Expectation: State the outcome you expect from the AI’s actions.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Example using the R-I-S-E formula:'
  prefs: []
  type: TYPE_NORMAL
- en: '• Role: I want you to act as an editor.'
  prefs: []
  type: TYPE_NORMAL
- en: '• Input: Here’s a draft article on blockchain technology.'
  prefs: []
  type: TYPE_NORMAL
- en: '• Steps: Please read and edit the article to improve accuracy, structure, and
    engagement.'
  prefs: []
  type: TYPE_NORMAL
- en: '• Expectation: I expect an edited draft that is clear, coherent, and engaging,
    reflecting expert knowledge on the topic.'
  prefs: []
  type: TYPE_NORMAL
- en: The R-I-S-E formula ensures the AI understands your requirements, leading to
    more accurate, relevant results that meet your expectations.
  prefs: []
  type: TYPE_NORMAL
- en: C-A-R-E Formula
  prefs: []
  type: TYPE_NORMAL
- en: 'The C-A-R-E (Context-Action-Result-Example) formula helps you structure prompts
    for clearer communication:'
  prefs: []
  type: TYPE_NORMAL
- en: '• Context: Describe the situation or background information for the task.'
  prefs: []
  type: TYPE_NORMAL
- en: '• Action: Specify the exact action the AI should take.'
  prefs: []
  type: TYPE_NORMAL
- en: '• Result: State the desired outcome or benefit from the AI’s action.'
  prefs: []
  type: TYPE_NORMAL
- en: '• Example: Provide a concrete example of how this approach has been successfully
    applied.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Example using the C-A-R-E formula:'
  prefs: []
  type: TYPE_NORMAL
- en: '• Context: I’m preparing for an important meeting with a client and need a
    presentation on a new product.'
  prefs: []
  type: TYPE_NORMAL
- en: '• Action: I want you to create an engaging PowerPoint that highlights the features
    and benefits of the product.'
  prefs: []
  type: TYPE_NORMAL
- en: '• Result: The presentation should help me convince the client of the product’s
    value and encourage them to make a purchasing decision.'
  prefs: []
  type: TYPE_NORMAL
- en: '• Example: A similar presentation helped a colleague secure a major contract
    by clearly and persuasively conveying the product’s advantages.'
  prefs: []
  type: TYPE_NORMAL
- en: These formulas are designed to help you craft clear, structured, and effective
    prompts, optimizing the use of AI to accomplish tasks efficiently.
  prefs: []
  type: TYPE_NORMAL
- en: 'Appendix B: Prompt Templates for Every Situation'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'To help you get started and inspire your own creativity, here’s a collection
    of prompt templates tailored for various needs. These templates are designed to
    be adaptable and customizable, ensuring they fit your unique requirements:'
  prefs: []
  type: TYPE_NORMAL
- en: Creative Writing Prompts
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Character Development:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '"Create a detailed character profile for a protagonist who is a [profession],
    struggles with [personal issue], and has a secret ability to [special skill].
    Include their backstory, motivations, and relationships."'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Story Framework:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '"Draft a story outline for a mystery novel set in [location] where the main
    character discovers [unexpected event] that leads to [consequence]. Focus on building
    suspense in the first three chapters."'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Unique Perspectives:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '"Write a short story from the perspective of an inanimate object, like a [specific
    item], witnessing a pivotal historical event."'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Poetry Challenges:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '"Compose a sonnet about the paradox of time, using metaphors involving [natural
    phenomena]."'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Learning and Research Prompts
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Complex Explanation:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '"Explain the relationship between [two concepts, e.g., quantum mechanics and
    classical physics] using a metaphor involving everyday objects."'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Thematic Analysis:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '"Summarize the main themes of [literary work] and analyze how they reflect
    the social context of the time period."'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Step-by-Step Learning:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '"Break down the process of solving a [specific type of mathematical equation]
    into 5 clear and easy-to-follow steps."'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Professional and Business Prompts
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Strategic Planning:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '"Create a 6-month strategic plan for a [specific type of business], focusing
    on marketing, operations, and financial goals."'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Leadership Advice:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '"Suggest 3 techniques for resolving a conflict between team members in a [specific
    industry] workplace."'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Advanced Proposal Writing:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '"Draft a grant proposal for a non-profit organization focused on [specific
    cause], ensuring to include an impact analysis and a budget overview."'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Optimize Workflows and Save Cost:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '"How can ChatGPT be used to streamline the onboarding process for new employees
    in a company?"'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: “Give examples of how ChatGPT can automate administrative tasks in a small business
    to free up employee time.”
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: “Provide examples of tasks that ChatGPT can handle to help a company save on
    operational costs.”
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Analytical and Decision-Making Prompts
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Comparative Analysis:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '"Compare and contrast the strengths and weaknesses of [two competing technologies],
    and recommend the better choice for a startup."'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Scenario Analysis:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '"Analyze the risks and benefits of launching a [specific product] in [specific
    market]. Provide a risk mitigation plan."'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Multi-Factor Decision Making:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '"List the pros and cons of expanding a business into [region]. Include legal,
    cultural, and logistical considerations."'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Everyday Productivity Prompts
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Goal-Oriented Scheduling:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '"Plan a 3-week productivity schedule for preparing for [specific exam], balancing
    work, study, and rest."'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Healthy Habits:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '"Design a morning routine for someone aiming to improve their focus and energy
    levels. Include specific time allocations and activities."'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Organized Task Management:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '"Organize a task list for completing [specific project] by breaking it down
    into daily and weekly milestones."'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Prompt for Marketing Video
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Objective: [State the purpose of the video, e.g., introduce a new product,
    raise brand awareness, drive sales, etc.]'
  prefs: []
  type: TYPE_NORMAL
- en: 'Target Audience: [Who is the video intended for? e.g., young professionals,
    tech enthusiasts, parents, etc.]'
  prefs: []
  type: TYPE_NORMAL
- en: 'Tone & Style: [Define the tone—e.g., humorous, inspirational, serious, exciting,
    etc. Specify the style—e.g., modern, elegant, casual, high-energy, etc.]'
  prefs: []
  type: TYPE_NORMAL
- en: 'Length: [Specify the video length, e.g., 30 seconds, 1 minute, etc.]'
  prefs: []
  type: TYPE_NORMAL
- en: 'Key Message: [What is the main message you want to convey? E.g., “Experience
    the future of tech today” or “Join the movement to sustainable living.”]'
  prefs: []
  type: TYPE_NORMAL
- en: 'Key Elements to Include:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Product/Service Focus: [What is being marketed? E.g., a new smartphone, a subscription
    service, a fitness app, etc.]'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Key Features: [Highlight 2-3 main features or benefits of the product or service.]'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Call to Action: [What do you want the audience to do? E.g., "Shop now," "Sign
    up today," "Learn more," etc.]'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Visual Style: [How should the visuals look? E.g., vibrant colors, sleek design,
    real-life scenarios, animations, etc.]'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Background Music: [What type of music should accompany the video? E.g., upbeat,
    calm, electronic, orchestral, etc.]'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Voiceover/Script: [Provide the script or key lines for voiceover if applicable.
    Example: "Get ready to change the way you live with [Brand Name]..."]'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Logo Placement: [Specify where the logo should appear—e.g., at the beginning,
    end, or as a watermark.]'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Example:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Objective: Launch a new line of eco-friendly water bottles'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Target Audience: Eco-conscious millennials and Gen Z'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Tone & Style: Inspirational, fresh, and modern'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Length: 30 seconds'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Key Message: "Hydrate sustainably with [Brand Name] – the future of hydration."'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Key Elements:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Product Focus: Stainless steel, reusable water bottle'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Features: Keeps drinks cold for 24 hours, made from 100% recycled materials'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Call to Action: "Shop now and make a difference!"'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Visual Style: Nature scenes, product shots, clean, minimal aesthetic'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Background Music: Upbeat, energetic instrumental track'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Voiceover: "Introducing [Brand Name] – the water bottle that keeps your drinks
    cold and the planet cool."'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Logo Placement: Bottom center for the last 3 seconds'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Financial Planning and Modeling Prompts
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '1\. Objective:'
  prefs: []
  type: TYPE_NORMAL
- en: '[State the purpose of the financial model—e.g., long-term growth planning,
    optimizing budget allocation, determining funding needs, etc.]'
  prefs: []
  type: TYPE_NORMAL
- en: '2\. Scope:'
  prefs: []
  type: TYPE_NORMAL
- en: '[Define the scope of the model—e.g., monthly projections, annual budget, 5-year
    financial plan, etc.]'
  prefs: []
  type: TYPE_NORMAL
- en: '3\. Target Areas:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Revenue Forecasting: [Estimate future revenue based on historical data and
    trends]'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Cost Analysis: [Breakdown of fixed, variable, and semi-variable costs]'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Cash Flow Planning: [Determine how cash will flow in and out of the business,
    including payment cycles and operating costs]'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Profitability: [Calculate expected profit margins, EBITDA, net income]'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Investment Planning: [Analyze potential investments and returns]'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Scenario Analysis: [Account for different business conditions: best case, worst
    case, and expected case]'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '4\. Data Inputs:'
  prefs: []
  type: TYPE_NORMAL
- en: '[Specify what data is needed to build the model—e.g., historical revenue data,
    industry growth rates, cost structures, etc.]'
  prefs: []
  type: TYPE_NORMAL
- en: '5\. Key Assumptions:'
  prefs: []
  type: TYPE_NORMAL
- en: '[Provide assumptions that will guide the financial model—e.g., growth rate
    of 5%, annual inflation rate of 3%, fixed costs are constant, etc.]'
  prefs: []
  type: TYPE_NORMAL
- en: '6\. Outputs/Deliverables:'
  prefs: []
  type: TYPE_NORMAL
- en: '[Define the outputs expected from the financial model—e.g., profit & loss statement,
    balance sheet, cash flow projections, break-even analysis, etc.]'
  prefs: []
  type: TYPE_NORMAL
- en: '7\. Constraints:'
  prefs: []
  type: TYPE_NORMAL
- en: '[Outline any limitations or constraints to consider in the financial model—e.g.,
    market volatility, regulatory changes, internal resource limitations, etc.]'
  prefs: []
  type: TYPE_NORMAL
- en: '8\. Additional Considerations:'
  prefs: []
  type: TYPE_NORMAL
- en: '[Provide any additional factors or complexities—e.g., seasonality effects,
    regional market differences, potential investment rounds, etc.]'
  prefs: []
  type: TYPE_NORMAL
- en: 'Example Prompt for Financial Planning:'
  prefs: []
  type: TYPE_NORMAL
- en: '| • | Objective: Create a 3-year financial plan to guide the company’s growth
    strategy. |'
  prefs: []
  type: TYPE_TB
- en: '| • | Scope: Annual financial planning with monthly revenue and cost projections.
    |'
  prefs: []
  type: TYPE_TB
- en: '| • | Target Areas: |'
  prefs: []
  type: TYPE_TB
- en: 'Revenue Forecasting: Estimate monthly revenue for the next 3 years based on
    current market conditions, sales growth projections, and customer acquisition
    strategies.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Cost Analysis: Analyze the company’s fixed and variable costs, including salaries,
    rent, marketing, and logistics, and predict how these will evolve with growth.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Cash Flow: Forecast monthly cash inflows and outflows, accounting for expected
    revenue cycles, investment, and debt servicing.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '| • | Data Inputs: |'
  prefs: []
  type: TYPE_TB
- en: Historical revenue data for the past 3 years.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Projected growth rate of 10% year-over-year.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Fixed costs: $100,000 per month, variable costs: 30% of revenue.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '| • | Key Assumptions: |'
  prefs: []
  type: TYPE_TB
- en: Revenue will increase by 10% annually.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Variable costs will remain consistent at 30% of total revenue.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Inflation rate is assumed to be 2% annually, affecting costs.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '| • | Outputs/Deliverables: |'
  prefs: []
  type: TYPE_TB
- en: Monthly profit & loss projections for 3 years.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Break-even analysis.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Cash flow statement and working capital requirements.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '| • | Constraints: |'
  prefs: []
  type: TYPE_TB
- en: Limited initial capital investment of $500,000 for expansion.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Market saturation may slow growth after Year 2.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '| • | Additional Considerations: |'
  prefs: []
  type: TYPE_TB
- en: Incorporate seasonality with Q1 traditionally being weaker in sales.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Factor in the potential impact of a new competitor entering the market in Year
    2.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Example Prompt for Revenue Forecasting:'
  prefs: []
  type: TYPE_NORMAL
- en: '| • | Objective: Forecast revenue for the next 12 months based on historical
    sales data and marketing strategies. |'
  prefs: []
  type: TYPE_TB
- en: '| • | Scope: Monthly revenue forecasting, adjusting for anticipated changes
    in sales channels and marketing efforts. |'
  prefs: []
  type: TYPE_TB
- en: '| • | Target Areas: |'
  prefs: []
  type: TYPE_TB
- en: 'Revenue Forecasting: Estimate monthly revenue for the next 12 months by factoring
    in current conversion rates, average deal size, and marketing spend.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '| • | Data Inputs: |'
  prefs: []
  type: TYPE_TB
- en: Sales data from the past 12 months.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Planned marketing campaigns with expected ROI.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Average customer lifetime value and retention rates.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '| • | Key Assumptions: |'
  prefs: []
  type: TYPE_TB
- en: Marketing campaigns will increase lead generation by 15% over the next 6 months.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Average conversion rate is 5%, with an average deal size of $2,000.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Customer churn rate is expected to be 5% annually.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '| • | Outputs/Deliverables: |'
  prefs: []
  type: TYPE_TB
- en: Monthly revenue projections.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Breakdown of revenue by marketing channel.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Total expected revenue for the upcoming year.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '| • | Constraints: |'
  prefs: []
  type: TYPE_TB
- en: Marketing budget is fixed at $100,000 for the next year.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '| • | Additional Considerations: |'
  prefs: []
  type: TYPE_TB
- en: Account for potential fluctuations due to external factors (e.g., economic downturn,
    competition).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Example Prompt for Cost Analysis:'
  prefs: []
  type: TYPE_NORMAL
- en: '| • | Objective: Conduct a cost analysis to identify opportunities for cost
    reduction without compromising quality. |'
  prefs: []
  type: TYPE_TB
- en: '| • | Scope: Comprehensive cost breakdown, identifying fixed and variable costs,
    and their relationship with overall profitability. |'
  prefs: []
  type: TYPE_TB
- en: '| • | Target Areas: |'
  prefs: []
  type: TYPE_TB
- en: 'Cost Breakdown: Analyze fixed costs, including rent, utilities, and salaries,
    and variable costs such as raw materials, production, and marketing.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '| • | Data Inputs: |'
  prefs: []
  type: TYPE_TB
- en: Historical cost data for the past 3 years.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Forecasted production volume and associated variable costs.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Estimated costs associated with new supplier contracts.
  prefs:
