  prefs: []
  type: TYPE_NORMAL
  zh: '**预训练**模型是一种在大量数据上进行预训练，然后再用于特定任务的模型。在ChatGPT的情况下，模型是通过使用大量来自互联网和其他资源的文本进行预训练的，这使得它能够生成连贯且高质量的响应，而无需额外的特定训练。'
- en: '****1****8****. ****Regu**la**ti**ons** ****i****n**** ****A****I****:'
