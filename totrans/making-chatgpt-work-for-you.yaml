- en: Now we’re going to look at a simpler example of data conversion. We’re going
    to see how we can use ChatGPT to convert the language and measurement units for
    a recipe in French for macarons.
  prefs: []
  type: TYPE_NORMAL
- en: Converting the Language and Measurement Units in a Recipe for Macarons
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: If you don’t know already, macarons are a delicious French dessert. It’s made
    up of two delicate cookies with a creamy middle, kind of like an Oreo cookie.
    They’re often colorful and can have different fillings—anything from ice cream
    to jelly! They’re amazing, and if you want to try an authentic macaron, you’ll
    want to follow a recipe from natives. Trust me.
  prefs: []
  type: TYPE_NORMAL
- en: Luckily, if you want to follow a recipe from a foreign language, ChatGPT can
    not only translate the recipe but also convert the measurement units so that the
    recipe is easier to follow. Let’s try that out, then create a PDF from the results
    for easy printing.![Two vibrant pink macarons on a dark surface, one whole and
    the other partially eaten, revealing a creamy filling. Crumbs are scattered around,
    highlighting the delicate texture of the macarons.](../images/641691_1_En_10_Chapter/641691_1_En_10_Fig5_HTML.jpg)
  prefs: []
  type: TYPE_NORMAL
- en: Figure 10-5
  prefs: []
  type: TYPE_NORMAL
- en: Delicious-looking macarons
  prefs: []
  type: TYPE_NORMAL
- en: 'I’ve already found a recipe ahead of time, so let’s get started by translating
    it from French to English. Prompt [10-2](#PC3) shows the prompt we used along
    with the recipe we’re using for this example.Translate this recipe from French
    to English:###Pour les coques :15 gouttes de colorant alimentaire rouge80 g de
    sucre glace90 g de sucre semoule75 g de blanc d''oeuf à température ambiante80
    g d'' amandes en poudre tamiséePour la garniture :30 g de beurre40 g de sucre
    en poudre70 g de coulis de framboiseÉTAPE 1Pour les coques :ÉTAPE 2Battre les
    blancs d''oeufs à vitesse moyenne. Quand la mousse fait des vagues, ajouter 45
    g de sucre semoule. Continuer à battre à vitesse moyenne. Lorsque au retrait du
    mixeur, les blancs forment un bec d''oiseau à base large au bout du batteur, incorporer
    le reste du sucre et le colorant alimentaire. Puis battre les blancs à vitesse
    maximum jusqu’à obtention d''une base lisse, brillante et homogène.ÉTAPE 3Ajouter
    ensuite le mélange poudre d''amande - sucre glace, lentement en ramenant les bords
    à la spatule, lentement. Former un mélange homogène, puis tester la préparation
    : lorsque vous lever la spatule, un ruban doit se former. Si ce n''est pas le
    cas, écraser la préparation avec la spatule par le milieu, re-tester et recommencer
    si nécessaire.ÉTAPE 4Préchauffer votre four à 150°C (thermostat 5). Chaleur tournante
    préférable.ÉTAPE 5Mettre la préparation dans une poche à douille et former la
    coque du macaron : environ 2 cm de diamètre. Les espacer sur du papier sulfurisé
    ou sur une plaque en silicone.ÉTAPE 6Enfourner 12 min. Laisser refroidir quelques
    minutes avant de les retirer de la plaque.ÉTAPE 7Vous avez fini les coques ! Ouf
    !ÉTAPE 8La garniture :ÉTAPE 9Mélanger les ingrédients dans une casserole a feu
    fort, porter à ébullition en remuant sans arrêt pendant 3 min. Sortir du feu,
    continuer a mélanger. Quand le mélange épaissit, appliquer 1/2 cuillère à café
    sur la coque du bas, puis placer la coque du haut par dessus.ÉTAPE 10Laisser reposer
    les macarons, les conserver au réfrigérateur.Prompt 10-2'
  prefs: []
  type: TYPE_NORMAL
- en: 'Asking ChatGPT to translate a recipe for macarons from French to English Now
    that we’ve provided ChatGPT with the recipe in our prompt, let’s see how it responds.
    Response [10-2](#PC4) shows the translation ChatGPT came back with.**Macaron Recipe****For
    the Shells:**- 15 drops of red food coloring- 80 g icing sugar- 90 g granulated
    sugar- 75 g egg whites at room temperature- 80 g almond flour (sifted)**For the
    Filling:**- 30 g butter- 40 g powdered sugar- 70 g raspberry coulis---**Instructions:****Step
    1: Preparing the Shells**1\. Beat the Egg Whites   - Whisk the egg whites at medium
    speed.   - Once the foam forms waves, add 45 g of granulated sugar. Continue whisking
    at medium speed.   - When lifting the whisk, the whites should form a broad bird''s
    beak at the tip of the whisk. At this point, add the remaining sugar and the food
    coloring.   - Increase the whisking speed to maximum until the mixture becomes
    smooth, shiny, and uniform.2\. Combine Dry and Wet Ingredients   - Gradually fold
    the almond flour and icing sugar mixture into the egg whites.   - Use a spatula
    to gently fold the mixture from the edges inward until fully incorporated.   -
    Check the consistency by lifting the spatula; the batter should form a ribbon
    as it falls. If not, press the mixture with the spatula down the center, mix,
    and test again.3\. Preheat the Oven   - Preheat your oven to 150°C (300°F) with
    a fan setting, if available.4\. Pipe the Shells   - Transfer the batter to a piping
    bag.   - Pipe shells approximately 2 cm in diameter, spacing them apart, onto
    parchment paper or a silicone baking mat.5\. Bake   - Bake for 12 minutes.   -
    Let the shells cool for a few minutes before removing them from the baking sheet.6\.
    Shells Complete!   - The shells are done—well done!---**Step 2: Preparing the
    Filling**1\. Cook the Filling   - Combine all filling ingredients in a saucepan
    over high heat.   - Bring to a boil, stirring constantly for 3 minutes.   - Remove
    from heat and continue stirring until the mixture thickens.2\. Assemble the Macarons   -
    Apply 1/2 teaspoon of filling onto the flat side of one shell.   - Place another
    shell on top to create a sandwich.3\. Store the Macarons   - Allow the macarons
    to rest and store them in the refrigerator.Enjoy your delicious homemade macarons!
    ![A grayscale emoji face with a smiling expression and three hearts around it,
    one on the left and two on the right. The hearts are also in shades of gray, conveying
    a sense of affection or love.](../images/641691_1_En_10_Chapter/641691_1_En_10_Figa_HTML.gif)Response
    10-2'
  prefs: []
  type: TYPE_NORMAL
- en: A translated version of a French macaron recipe
  prefs: []
  type: TYPE_NORMAL
- en: This is great! The text has been translated in its entirety and has even been
    formatted to make for an aesthetically pleasing recipe to follow. However, we
    still have a bit of a problem. The text has been translated, but the recipe will
    still prove to be a challenge to follow with the measurements still in metric
    units. So, let’s take another step further and ask ChatGPT to convert all of the
    metric measurements to imperial.
  prefs: []
  type: TYPE_NORMAL
- en: Converting Metric Measurements to Imperial
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: We’re going to continue the same conversation we have with ChatGPT with Prompt
    [10-3](#PC5).Convert all of the metric measurements to imperial measurement units
    typically found in the kitchenPrompt 10-3
  prefs: []
  type: TYPE_NORMAL
- en: Instructing ChatGPT to convert measurements
  prefs: []
  type: TYPE_NORMAL
- en: 'Now let’s take a look at the results, as you can see in Response [10-3](#PC6).***Macaron
    Recipe*****For the Shells:**   - 15 drops of red food coloring   - 2/3 cup (2.8
    oz) powdered sugar   - 7 tablespoons (3.2 oz) granulated sugar   - 2 1/2 large
    egg whites (room temperature)   - 2/3 cup (2.8 oz) almond flour (sifted)**For
    the Filling:**   - 2 tablespoons (1 oz) butter   - 3 tablespoons (1.4 oz) granulated
    sugar   - 5 tablespoons (2.5 oz) raspberry coulis***Instructions:*****Step 1:
    Preparing the Shells***1\. Beat the Egg Whites*   - Whisk the egg whites at medium
    speed.   - Once the foam forms waves, add 3 1/2 tablespoons granulated sugar.
    Continue whisking at medium speed.   - When lifting the whisk, the whites should
    form a broad bird''s beak at the tip of the whisk. At this point, add the remaining
    sugar and the food coloring.   - Increase the whisking speed to maximum until
    the mixture becomes smooth, shiny, and uniform.2\. *Combine Dry and Wet Ingredients*   -
    Gradually fold the almond flour and powdered sugar mixture into the egg whites.   -
    Use a spatula to gently fold the mixture from the edges inward until fully incorporated.   -
    Check the consistency by lifting the spatula; the batter should form a ribbon
    as it falls. If not, press the mixture with the spatula down the center, mix,
    and test again.3\. *Preheat the Oven*   - Preheat your oven to 300°F with a fan
    setting, if available.4\. *Pipe the Shells*   - Transfer the batter to a piping
    bag.   - Pipe shells approximately 3/4 inch in diameter, spacing them apart, onto
    parchment paper or a silicone baking mat.5\. *Bake*   - Bake for 12 minutes.   -
    Let the shells cool for a few minutes before removing them from the baking sheet.6\.
    *Shells Complete!*   - The shells are done — well done!**Step 2: Preparing the
    Filling**1\. *Cook the Filling*   - Combine all filling ingredients in a saucepan
    over high heat.   - Bring to a boil, stirring constantly for 3 minutes.   - Remove
    from heat and continue stirring until the mixture thickens.2\. *Assemble the Macarons*   -
    Apply 1/2 teaspoon of filling onto the flat side of one shell.   - Place another
    shell on top to create a sandwich.3\. *Store the Macarons*   - Allow the macarons
    to rest and store them in the refrigerator.   - Enjoy your delicious homemade
    macarons!![A grayscale emoji symbol depicting a smiling face with three hearts
    around it. The face has closed eyes and a wide smile, conveying a sense of happiness
    and affection. The hearts are positioned around the face, enhancing the theme
    of love and joy.](../images/641691_1_En_10_Chapter/641691_1_En_10_Figb_HTML.gif)Response
    10-3'
