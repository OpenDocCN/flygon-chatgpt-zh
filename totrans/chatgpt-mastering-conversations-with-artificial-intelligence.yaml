- en: '*Explain the significance of the Magna Carta and its impact on the development
    of modern democracy.*'
  prefs: []
  type: TYPE_NORMAL
- en: 'Recipe Request:'
  prefs: []
  type: TYPE_NORMAL
- en: '*Share a simple recipe for a vegetarian pasta dish with a creamy tomato sauce.*'
  prefs: []
  type: TYPE_NORMAL
- en: 'Problem-Solving:'
  prefs: []
  type: TYPE_NORMAL
- en: '*Solve the quadratic equation x^2 - 5x + 6 = 0 and provide both solutions.*'
  prefs: []
  type: TYPE_NORMAL
- en: '**2\. Chain-of-Thought Technique**'
  prefs: []
  type: TYPE_NORMAL
- en: 'Initial Prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: '*You''re a skilled chef. Tell me about your vegetarian Transylvanian Gulash.*'
  prefs: []
  type: TYPE_NORMAL
- en: 'Model''s Response:'
  prefs: []
  type: TYPE_NORMAL
- en: '*This dish pays homage to the region''s rich culinary heritage, with wild mushrooms
    as the focal point. Tender, earthy chanterelles, and porcini mushrooms dance in
    a hearty stew, woven with the whispers of local herbs.*'
  prefs: []
  type: TYPE_NORMAL
- en: 'Subsequent Prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: '*Share your approach to sourcing the key ingredients highlighting the importance
    of authenticity.*'
  prefs: []
  type: TYPE_NORMAL
- en: 'Model''s Response:'
  prefs: []
  type: TYPE_NORMAL
- en: '*Our wild mushrooms are from the pristine forests of Transylvania itself, lovingly
    handpicked by skilled foragers. The herbs are cultivated in our garden. The red
    wine, a product of local vineyards, infuses the dish with the terroir of the land,
    ensuring every spoonful is a taste of Transylvania.*'
  prefs: []
  type: TYPE_NORMAL
- en: 'Subsequent Prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: '*Illuminate the cooking techniques employed to achieve the balance of flavors
    and textures in the Transylvanian Wild Mushroom Gulash.*'
  prefs: []
  type: TYPE_NORMAL
- en: 'Model''s Response:'
  prefs: []
  type: TYPE_NORMAL
- en: '*Crafting this Gulash involves a symphony of culinary techniques. The wild
    mushrooms are sautéed to enhance their natural flavors before being gently simmered
    in a rich broth. The caramelized onions and garlic, a testament to Transylvania''s
    rustic charm, infuse depth into the stew. As the Gulash simmers, the red wine
    gradually melds with the mushrooms, creating a harmonious union of tastes. A dash
    of smoked paprika completes the masterpiece, adding layers of complexity and a
    whisper of Transylvanian mystique.*'
  prefs: []
  type: TYPE_NORMAL
- en: '**3\. Tree-of-Thought Technique**'
  prefs: []
  type: TYPE_NORMAL
- en: 'Initial Prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: '*Tell me about your favorite hobbies.*'
  prefs: []
  type: TYPE_NORMAL
- en: 'Model''s Response:'
  prefs: []
  type: TYPE_NORMAL
- en: '*One of my favorite hobbies is painting. I find it incredibly relaxing and
    it allows me to express my creativity. I also enjoy hiking in nature, as it gives
    me a sense of serenity and a break from technology.*'
  prefs: []
  type: TYPE_NORMAL
- en: 'Branch 1 - Follow-up Prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: '*Tell me more about your painting hobby. What kind of subjects do you like
    to paint?*'
  prefs: []
  type: TYPE_NORMAL
- en: 'Model''s Response (Branch 1):'
  prefs: []
  type: TYPE_NORMAL
- en: '*When it comes to painting, I''m drawn to landscapes and vibrant colors. I
    often find inspiration from nature scenes, like sunsets over the ocean or lush
    forests. I love playing with different shades to capture the beauty and emotions
    of the natural world.*'
  prefs: []
  type: TYPE_NORMAL
- en: 'Branch 2 - Follow-up Prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: '*What are some of your favorite hiking spots?*'
  prefs: []
  type: TYPE_NORMAL
- en: 'Model''s Response (Branch 2):'
  prefs: []
  type: TYPE_NORMAL
- en: '*Hiking is a wonderful way for me to disconnect and recharge. I''ve explored
    some beautiful trails near my home, like a scenic trail in the nearby mountains
    and a peaceful forest path. The fresh air and sounds of nature are truly rejuvenating.*'
  prefs: []
  type: TYPE_NORMAL
- en: '[1](#footnote-12123-1-backlink). OpenAI, "Prompt engineering" (accessed in
    November 2023; [https://platform.openai.com/docs/guides/prompt-engineering](https://platform.openai.com/docs/guides/prompt-engineering)).'
  prefs: []
  type: TYPE_NORMAL
- en: '**5\. Expanding ChatGPT**'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: We started by using our mobile phone just to call someone. Then, when our mobile
    phones became smarter and could connect to the internet, we could send short messages,
    email, use social media, and run apps offering new capabilities like financial
    services. Later updates offered us access to new settings and personalization,
    and we were thrilled to discover, from time to time, new capabilities. We also
    expect that our smartphone's operating system will be regularly updated, and new
    capabilities will be added.
  prefs: []
  type: TYPE_NORMAL
- en: We call this our smartphone ecosystem where the updates and the new capabilities
    represent the smartphone's constant evolution, the constant adaptation to new
    challenges and user needs.
  prefs: []
  type: TYPE_NORMAL
- en: It works similarly for ChatGPT and its constantly evolving ecosystem. Every
    additional capability and feature represent an added accessory or utility, making
    ChatGPT a more versatile and indispensable tool in the modern digital age.
  prefs: []
  type: TYPE_NORMAL
- en: One is the browsing capability that fetches fresh information from the vast
    web universe. It is much like a smartphone's browser app, accessing vast amounts
    of information in real time. The web browsing feature allows ChatGPT to provide
    more current information than its training data, which—as of September 2023—is
    up to date only until January 2022.
  prefs: []
  type: TYPE_NORMAL
- en: The second one is the capability to use plugins. The plugins are comparable
    to the myriad of apps you can install on your smartphone, each enhancing the phone's
    functionality, and offering specialized tools and features. The vast universe
    of plugins allows third-party services to provide capabilities that are not built
    into ChatGPT. For example, a plugin may provide math computations, language translation,
    or database lookups.
  prefs: []
  type: TYPE_NORMAL
- en: And the analogy does not stop there. Custom instructions—introduced in a previous
    chapter—are like the settings and preferences you adjust to tailor your phone
    experience to your desire. And Advanced Data Analytics—which we will meet in the
    next pages—can be likened to the phone's diagnostic tools, diving deep into system
    performance, ensuring everything runs optimally.
  prefs: []
  type: TYPE_NORMAL
- en: This chapter promises to elevate your understanding and harness the full potential
    of ChatGPT. Let's embark on this enlightening journey together!
  prefs: []
  type: TYPE_NORMAL
- en: '**5.1 Browsing with Bing**'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The very nature of our information landscape is constantly changing. News breaks,
    scientific discoveries emerge, tech evolves, and culture shifts. A static database,
    frozen at a point in time, cannot hope to keep up with this relentless tide of
    latest information; therefore, the idea of imbuing ChatGPT with web browsing capabilities.
  prefs: []
  type: TYPE_NORMAL
- en: Browse with Bing was disabled in July 2023 out of "an abundance of caution,"
    and reinstated in September 2023\. OpenAI has since added updates including functions
    so sites can control how ChatGPT interacts with them.
  prefs: []
  type: TYPE_NORMAL
- en: ChatGPT's browsing capability serves as a bridge between the model's vast internal
    knowledge and the ever-changing, dynamic world of the internet, offering users
    a more timely and comprehensive response to their queries (Figure 5.1).
  prefs: []
  type: TYPE_NORMAL
- en: '1\. THE USER INITIATES BROWSING: Question(s) that require(s) up-to-date information.'
  prefs: []
  type: TYPE_NORMAL
- en: '2\. THE MODEL INTERPRETS THE QUERY: The model interprets your request, formulating
    it into a query that is suitable for a search engine. For instance, if you ask,
    "What are the recent advancements in electric cars?," it may translate into a
    search query like "latest electric car advancements 2023."'
  prefs: []
  type: TYPE_NORMAL
- en: '3\. FETCHING SEARCH RESULTS: The model will then retrieve a list of search
    results, similar to what you would see if you typed a query into a search engine.
    It does not actually "click" on links as humans do, but it gets a snapshot of
    the content from the search results.'
  prefs: []
  type: TYPE_NORMAL
- en: '4\. DATA EXTRACTION AND ANALYSIS: The model scans these results, identifying
    the most relevant snippets of information. It then extracts and processes this
    data to form a coherent response to your question.'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure_5.1.tif](../Images/Figure_5.1_fmt.png)'
  prefs: []
  type: TYPE_IMG
- en: '*Figure 5.1 Scheme of ChatGPT browsing capability*'
  prefs: []
  type: TYPE_NORMAL
- en: '5\. CRAFTING A RESPONSE: With the extracted data "in hand," the model synthesizes
    a comprehensive answer. This involves piecing together information from multiple
    sources, ensuring the answer is both relevant and informative.'
  prefs: []
  type: TYPE_NORMAL
- en: '6\. RESPONSE DELIVERY: Finally, the model provides you with a neatly formatted
    response, including relevant links, based on the most pertinent information it
    found.'
  prefs: []
  type: TYPE_NORMAL
- en: ChatGPT Browse with Bing is a beta feature (available to ChatGPT Plus subscribers)
    that allows ChatGPT to search the internet in order to answer questions that benefit
    from the latest information.
  prefs: []
  type: TYPE_NORMAL
- en: Launch ChatGPT. You will be greeted with a friendly interface, ready to converse
    and explore.
  prefs: []
  type: TYPE_NORMAL
- en: Navigate to settings. Click "Enable Bing Browsing" and toggle it on.
  prefs: []
  type: TYPE_NORMAL
- en: '![Screenshoot1.tif](../Images/Screenshoot1_fmt.png)'
  prefs: []
  type: TYPE_IMG
- en: Select "Browse with Bing" capability and start your first query.
  prefs: []
  type: TYPE_NORMAL
- en: '![Screenshoot2_1.tif](../Images/Screenshoot2_1_fmt.png)'
  prefs: []
  type: TYPE_IMG
- en: Type in a question or statement. Say, "What's the latest in ChatGPT multimodal
    capability?" ChatGPT will now utilize Bing to browse the web and provide you with
    the freshest insights.
  prefs: []
  type: TYPE_NORMAL
- en: '![Screenshoot3.tif](../Images/Screenshoot3_fmt.png)'
  prefs: []
  type: TYPE_IMG
- en: Of course, you can engage with ChatGPT responses. If you click on the reference
    1., a browser window will open, and you can check the source of the information.
  prefs: []
  type: TYPE_NORMAL
- en: Ask follow-up questions and refine your queries to drill down into specifics.
    It is a dialogue that educates and enlightens.
  prefs: []
  type: TYPE_NORMAL
- en: For instance, suppose you search for "generative AI applications." Upon viewing
    the results, you decide to delve deeper into a particular area, say, "generative
    AI in music production." You refine the query, and now ChatGPT assists you in
    exploring articles or resources specific to AI's generative role in music production.
    This iterative process of refining queries helps to narrow down the focus and
    extract more precise information or resources based on evolving interests or inquiries.
  prefs: []
  type: TYPE_NORMAL
- en: Worth mentioning that ChatGPT's system does not store personal data, and every
    browsing session with Bing is ephemeral. This means once your question has been
    addressed, all related browsing data is discarded, deleting the history of the
    user's specific requests.
  prefs: []
  type: TYPE_NORMAL
- en: '**5.2 Expanding Horizons with Plugins**'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Plugins are tools designed specifically for LLMs like ChatGPT to connect them
    to external third-party services or tools (Figure 5.2). The companies behind these
    plugins may have a different policy regarding your data, not meeting OpenAI's
    moral code. Make sure you read the policy docs.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure_5.2.tif](../Images/Figure_5.2_fmt.png)'
  prefs: []
  type: TYPE_IMG
- en: '*Figure 5.2 Scheme of ChatGPT plugin capability*'
  prefs: []
  type: TYPE_NORMAL
- en: 'The use cases for ChatGPT plugins are extensive^([1](#footnote-11840-1)); here
    are the most common:'
  prefs: []
  type: TYPE_NORMAL
- en: – Access external data available on the web.
  prefs: []
  type: TYPE_NORMAL
- en: – Access private data.
  prefs: []
  type: TYPE_NORMAL
- en: – Retrieve real-time information (such as news).
  prefs: []
  type: TYPE_NORMAL
- en: – Help users complete online actions (such as booking).
  prefs: []
  type: TYPE_NORMAL
- en: '**How to install a ChatGPT plugin**'
  prefs: []
  type: TYPE_NORMAL
- en: • Open ChatGPT. In the bottom left corner, select Settings > Beta Features,
    then toggle the Plugins setting.
  prefs: []
  type: TYPE_NORMAL
- en: • In ChatGPT, select New Chat.
  prefs: []
  type: TYPE_NORMAL
- en: • Switch the ChatGPT model to GPT-4.
  prefs: []
  type: TYPE_NORMAL
- en: • From the dropdown menu, select Plugins > Plugin Store
  prefs: []
  type: TYPE_NORMAL
- en: • Now, select the ChatGPT plugin you want to install.
  prefs: []
  type: TYPE_NORMAL
- en: '![Screenshoot4.tif](../Images/Screenshoot4_fmt.png)'
  prefs: []
  type: TYPE_IMG
- en: Before installing and using any plugin, please remember to check "Developer
    info." You can find it at the bottom of the plugin description (see image above).
    This is a must since privacy and data ethics are not provided by OpenAI but by
    the third party providing the plugin. Read the Terms of Use. It may store your
    document in its database and share it with other business partners.
  prefs: []
  type: TYPE_NORMAL
- en: The content and services listed on this site are solely for informational purposes
    and do not constitute professional advice. They have not been reviewed or approved
    by any mentioned entities. Therefore, you are accountable for your actions and
    decisions based on the information provided here.
  prefs: []
  type: TYPE_NORMAL
- en: Installation should take less than a minute. To uninstall, just select the plugin
    again. However, there is currently no "All Plugins" list to make it easy to unsubscribe.
    Also, there is no feature to sort the plugins, so you are left to scroll through
    every page until you find what you want. Search functionality will come with a
    later update, but it would be useful to have these UI features for more practical
    use.
  prefs: []
  type: TYPE_NORMAL
- en: How you use a ChatGPT plugin depends on the plugin you install. But the general
    gist of ChatGPT plugin usage functions like regular ChatGPT; you ask your question,
    and ChatGPT provides an answer. The accuracy of your answer depends on the quality
    of your prompt, but now also depends on the quality of the ChatGPT plugin. Remember
    that ChatGPT Plugin is a beta feature. The ChatGPT Plugin ecosystem is not fully
    up and running yet, and despite the number of available plugins, only few work
    as they should—or as we might like.
  prefs: []
  type: TYPE_NORMAL
- en: Please exercise caution when using any plugin. While available on ChatGPT Plugin
    Store, they have not been verified by the author of this book. Use them at your
    own risk. Potential security risks may be associated.
  prefs: []
  type: TYPE_NORMAL
- en: '**5.3 Image Input Capability**'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Image Input is an extension of the ChatGPT text-based interface, a bridge between
    visual data representation and textual understanding, making data interpretation
    more accessible and insightful.
  prefs: []
  type: TYPE_NORMAL
- en: This capability allows users to upload an image file that GPT engine can then
    analyze and interpret. (Just click the File Upload button in the Commands Field,
    see Figure 2.2)
  prefs: []
  type: TYPE_NORMAL
- en: Once the image is processed, the engine provides textual descriptions, answers
    questions about the image, or even generates stories or hypotheses based on its
    content. This multi-modal approach enhances the engine's versatility, making it
    not just a text-based tool, but a more comprehensive assistant capable of understanding
    and interacting through both text and visual elements.
  prefs: []
  type: TYPE_NORMAL
- en: Although OpenAI's platform is designed to prioritize user privacy, and images
    are not stored or used for other purposes, the rule of thumb is to make sure the
    images to be uploaded do not contain identifiable information.
  prefs: []
  type: TYPE_NORMAL
- en: Here are a few use cases.
  prefs: []
  type: TYPE_NORMAL
- en: '**Analyze charts**'
  prefs: []
  type: TYPE_NORMAL
- en: You can upload various types of charts like clustered columns charts, pie charts,
    or line graphs. The GPT engine can interpret visual data and translate it into
    textual information. This is particularly useful for summarizing key insights,
    spotting trends, or identifying outliers.
  prefs: []
  type: TYPE_NORMAL
- en: For example, you upload a sales performance chart, and the engine provides you
    with a concise summary, mentioning which quarter has the highest sales and which
    product is the best performer. This capability adds an extra layer of convenience
    for those who prefer to digest data visually but also want the nuanced understanding
    that comes from textual analysis.
  prefs: []
  type: TYPE_NORMAL
- en: '![Screenshoot5a.tif](../Images/Screenshoot5a_fmt.png)'
  prefs: []
  type: TYPE_IMG
- en: '![Screenshoot5b.tif](../Images/Screenshoot5b_fmt.jpeg)![Screenshoot5c.tif](../Images/Screenshoot5c_fmt.png)'
  prefs: []
  type: TYPE_IMG
- en: '**Analyze X-rays**'
  prefs: []
  type: TYPE_NORMAL
- en: Upload an X-ray image and request a general overview of the image or ask specific
    questions. The GPT engine analyzes visual information, relates findings to its
    database of textual information, and provides relevant insights. Then you can
    have a conversation with the engine. It is useful especially for individuals who
    do not have medical expertise, offering a plain-language understanding of what
    the X-ray image shows.
  prefs: []
  type: TYPE_NORMAL
- en: The engine provides a general understanding; it may not catch minute or highly
    specialized details that a trained eye would do, so, it is not a substitute for
    a qualified radiologist or medical professional analysis.
  prefs: []
  type: TYPE_NORMAL
- en: It can be applied by users from several fields, starting with students in medicine,
    trying to get a quick understanding of X-ray images, in remote health assistance,
    where immediate professional insight is not available, and in research, for scientists
    looking to categorize or understand a bulk set of X-ray images.
  prefs: []
  type: TYPE_NORMAL
- en: '![Screenshoo6a.tif](../Images/Screenshoo6a_fmt.png)'
  prefs: []
  type: TYPE_IMG
- en: '![Screenshoo6b.tif](../Images/Screenshoo6b_fmt.png)'
  prefs: []
  type: TYPE_IMG
- en: '![Screenshoo6b.tif](../Images/Screenshoo6b_fmt.jpeg)'
  prefs: []
  type: TYPE_IMG
- en: '**Scrape data from images**'
  prefs: []
  type: TYPE_NORMAL
- en: When it comes to scrape data from images, the system uses Optical Character
    Recognition (OCR) to detect and interpret characters from an image. Once the text
    is extracted, the system can parse and structure the data based on the user's
    criteria.
  prefs: []
  type: TYPE_NORMAL
- en: '![Screenshoot7a-b.tif](../Images/Screenshoot7a-b_fmt.png)'
  prefs: []
  type: TYPE_IMG
- en: '![Screenshoot7c.tif](../Images/Screenshoot7c_fmt.jpeg)'
  prefs: []
  type: TYPE_IMG
- en: '**Design analysis**'
  prefs: []
  type: TYPE_NORMAL
- en: The image input capability enables AI to analyze user interface (UI) designs
    by processing visual data from images. Firstly, AI identifies and extracts distinct
    components of an UI, such as buttons, text fields, images, icons, and navigation
    bars. Then, AI assesses the spatial arrangement of elements, gauging the visual
    hierarchy, alignment, and distribution. For color analysis, AI evaluates color
    combinations, contrasts, and palettes to determine harmony, readability, and adherence
    to design principles. By using OCR, fonts, sizes, spacing, and typographic contrasts
    are evaluated to determine readability and visual appeal.
  prefs: []
  type: TYPE_NORMAL
- en: Another step is the consistency check. AI checks for consistent usage of design
    elements across different UI sections or pages. Although it cannot interact with
    static images, it can infer potential interactive elements based on common design
    patterns.
  prefs: []
  type: TYPE_NORMAL
- en: The process consists in comparing the design from the image with established
    design principles and patterns. Based on the analysis, AI can provide improving
    recommendations.
  prefs: []
  type: TYPE_NORMAL
- en: '![Screenshoot8a.tif](../Images/Screenshoot8a_fmt.png)'
  prefs: []
  type: TYPE_IMG
- en: '![Screenshoot8b.tif](../Images/Screenshoot8b_fmt.png)'
  prefs: []
  type: TYPE_IMG
- en: '![Screenshoot8b.tif](../Images/Screenshoot8b_fmt1.png)'
  prefs: []
  type: TYPE_IMG
- en: '**Wireframe to code**'
  prefs: []
  type: TYPE_NORMAL
- en: Converting wireframes to code using image input capability is an evolving application
    in AI.
  prefs: []
  type: TYPE_NORMAL
- en: The process is similar to the one explained in Design Analysis. AI identifies
    standard UI components in the wireframe and analyzes their spatial relationships.
    Based on the elements and relationships, AI generates the corresponding HTML,
    CSS, or other relevant code. This code is structured to recreate the layout and
    design represented in the wireframe. If the wireframe contains specific styles
    (like colors, fonts, or spacings), AI can extract these and convert them into
    appropriate CSS properties. The engine can infer responsive design rules from
    the wireframe, ensuring the generated code performs well across various device
    sizes.
  prefs: []
  type: TYPE_NORMAL
- en: '**Transform a writer''s story diagram into a text**'
  prefs: []
  type: TYPE_NORMAL
- en: Transforming a writer's diagram into text involves several steps. The written
    text is extracted using OCR techniques. The text reveals character names, plot
    points, and relationships, or story annotations. The next step is to identify
    how text elements relate to each other based on their spatial positioning, connectors,
    and grouping used in the diagram. This helps to determine the sequence, hierarchy,
    or relationship between plot points. Apart from what is explicitly expressed in
    the text, AI identifies various shapes, lines, or symbols in the diagram. (e.g.,
    arrows might indicate a sequence, while circles could represent main events or
    a character.) The shapes recognized could provide context to the extracted text,
    like specific events, turning points, or other structural components of the story.
    With the extracted information, AI constructs sentences or structured text that
    represents the story diagram. Obviously, the initial output might require manual
    review and editing to ensure it accurately captured the writer's intent.
  prefs: []
  type: TYPE_NORMAL
- en: Workshop notes can be processed the same way.
  prefs: []
  type: TYPE_NORMAL
- en: '**Picture to recipe**'
  prefs: []
  type: TYPE_NORMAL
- en: Converting a picture of a dish into a recipe using image input capability is
    an ambitious task. This capability is not yet documented but can be approached
    as follows. AI uses computer vision models to analyze the dish's image, identifying
    key ingredients by recognizing textures, colors, and shapes. For example, it might
    recognize the visual signature of peanuts, chicken, or basil. Then, the system
    categorizes the dish based on its overall appearance, this step narrowing down
    possible recipes. (For instance, a layered appearance might suggest lasagna, while
    a bowl with broth and noodles might be identified as some type of soup.) Once
    primary ingredients and the dish type are identified, the system can cross-reference
    a database of recipes to suggest one or more that closely match the visual input.
  prefs: []
  type: TYPE_NORMAL
- en: It is worth noting that while AI can make educated guesses based on visual data,
    achieving a perfect recipe match from an image alone is challenging. Factors like
    spices, cooking techniques, and internal ingredients that are not visually prominent
    can complicate the extraction.
  prefs: []
  type: TYPE_NORMAL
- en: '![Screenshoot9a.tif](../Images/Screenshoot9a_fmt.jpeg)'
  prefs: []
  type: TYPE_IMG
- en: '![Screenshoot9b.tif](../Images/Screenshoot9b_fmt.jpeg)'
  prefs: []
  type: TYPE_IMG
- en: '![Screenshoot9b.tif](../Images/Screenshoot9b_fmt1.jpeg)'
  prefs: []
  type: TYPE_IMG
- en: '**5.4 Temporary Limitations**'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The magic of ChatGPT is great, but it has its limits. Every user should know
    these limits before diving in. Being aware helps avoiding unexpected surprises.
    But be aware that the short list of limits addressed below does not cover it all.
    ChatGPT can mislead with its fancy talk, so you must check its answers carefully.
    This could be harder than looking up stuff on your own. ChatGPT is a tool, not
    a replacement for critical thinking.
  prefs: []
  type: TYPE_NORMAL
- en: As with any tool, over-relying on ChatGPT can be a pitfall. It offers rapid,
    extensive insights, but it is vital to cross-reference and verify crucial data.
    Diversifying information sources, collaborating with experts, and periodically
    grounding AI interactions with manual checks can strike a balance between efficiency
    and accuracy.
  prefs: []
  type: TYPE_NORMAL
- en: '**1\. Hallucinations**'
  prefs: []
  type: TYPE_NORMAL
- en: ChatGPT speaks well, but that does not mean it is always right. It is so good
    with words it makes things sound right even when they are not. The explanation
    is related to the design of ChatGPT and the training data. By design, ChatGPT
    is built to predict the next word based on the previous words. Its only job is
    to autocomplete, but it can keep autocompleting very coherently to make long texts.
    The quality and accuracy of the ChatGPT autocompletion job reflects the quality
    and accuracy of the data it was trained on. And this does not always lead to factual
    accuracy as textual data is not always a source of truth. During training, ChatGPT
    uses more textual data from the internet than science books. And there is a lot
    of wrong info out there, about 30% being false.
  prefs: []
  type: TYPE_NORMAL
- en: Now, even with this limit, ChatGPT often gets the answers right, which is cool!
    This is likely because of the good info on places like Wikipedia. But, as a rule
    of thumb, it is crucial to thoroughly fact-check the content. Make a point to
    check dates, locations, numbers, and any claim that seems very specific.
  prefs: []
  type: TYPE_NORMAL
- en: '**2\. Arithmetic and Mathematics**'
  prefs: []
  type: TYPE_NORMAL
- en: When you ask ChatGPT math stuff, sometimes it messes up. It can guess simple
    answers right if it has seen them before. It is getting better at math, but it
    is not quite there yet. This is because ChatGPT does not have a source of truth;
    it relies on recognizing patterns in the language of math problems it has seen
    before.
  prefs: []
  type: TYPE_NORMAL
- en: '**3\. Citations**'
  prefs: []
  type: TYPE_NORMAL
- en: ChatGPT struggles with citations. It guesses a lot. It knows how a citation
    looks and can make up fancy-sounding titles, but most of them do not really exist.
    The model does not have access to external sources in real-time (unless you use
    a browsing plugin) so it generates what it "thinks" would be a correct citation
    based on patterns it learned during training.
  prefs: []
  type: TYPE_NORMAL
- en: '**4\. Consistency**'
  prefs: []
  type: TYPE_NORMAL
- en: ChatGPT can get an answer right but messes up the explanation. This inconsistency
    occurs as the model might pick up on the correct answer from patterns in the training
    data, but fails to understand the underlying logic or facts, leading to incorrect
    explanations.
  prefs: []
  type: TYPE_NORMAL
- en: 'Current Events: ChatGPT''s info stops in January 2022\. If you ask about recent
    stuff, it makes up answers. ChatGPT does not have real-time access to the internet,
    so it is like asking someone who has been out of the loop for a while.'
  prefs: []
  type: TYPE_NORMAL
- en: AI's journey is long but filled with promise. Today's issues could pave the
    way for tomorrow's wonders.
  prefs: []
  type: TYPE_NORMAL
- en: '![84_Desert_landscape_marked_by_sandstone_formations.tif](../Images/84_Desert_landscape_mar_fmt.png)'
  prefs: []
  type: TYPE_IMG
- en: '*Desert landscape marked by sandstone formations and an off-road solitary vehicle
    with a roof rack*'
  prefs: []
  type: TYPE_NORMAL
- en: '[1](#footnote-11840-1-backlink). Maria Diaz, "How to use ChatGPT Plus: From
    web browsing to plugins," in ZDNET (accessed in October 2023; [https://www.zdnet.com/article/how-to-use-chatgpt-plus-from-web-browsing-to-plugins/](https://www.zdnet.com/article/how-to-use-chatgpt-plus-from-web-browsing-to-plugins/)).'
  prefs: []
  type: TYPE_NORMAL
- en: '**6\. Expanding ChatGPT: DALL-E**'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: '**6.1 What is DALL-E?**'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: DALL-E is a 12-billion parameter version of GPT-3 trained using a dataset of
    text–image pairs.^([1](#footnote-11253-1))
  prefs: []
  type: TYPE_NORMAL
- en: GPT-3 transformer architecture is excellent at handling sequences of data.
  prefs: []
  type: TYPE_NORMAL
- en: While learning, images are converted into a sequence of discrete tokens in a
    process that is analogous to tokenizing text and DALL-E is trained on pairs of
    images and corresponding text captions. The model learns to associate the text
    with the visual concepts in the images by processing the sequences of tokens from
    both modalities.
  prefs: []
  type: TYPE_NORMAL
- en: DALL-E has a diverse set of capabilities, including creating anthropomorphized
    versions of animals and objects, combining unrelated concepts in plausible ways,
    rendering text, and applying transformations to existing images.
  prefs: []
  type: TYPE_NORMAL
- en: It receives both the text and the image as a single stream of data containing
    up to 1,280 tokens, being trained to use maximum likelihood to generate all the
    tokens, one after another.
  prefs: []
  type: TYPE_NORMAL
- en: What can DALL-E do?
  prefs: []
  type: TYPE_NORMAL
- en: – Transforms natural language descriptions into distinctive visuals by blending
    various concepts, attributes, and styles.
  prefs: []
  type: TYPE_NORMAL
- en: – Generates original images (up to a resolution of 1024x1024 pixels).
  prefs: []
  type: TYPE_NORMAL
- en: Once you generate the images, you can download and modify them using any preferred
    editing tool.
  prefs: []
  type: TYPE_NORMAL
- en: 'DALL-E''s latest edition (the 3^(rd)) brings new features:'
  prefs: []
  type: TYPE_NORMAL
- en: – Generates legible text within images.
  prefs: []
  type: TYPE_NORMAL
- en: – Depicts historical personalities and well-known celebrities.
  prefs: []
  type: TYPE_NORMAL
- en: – Incorporates filters for ethical public usage.
  prefs: []
  type: TYPE_NORMAL
- en: – "Out-painting" function extends images beyond their original frame for fresh
    compositions.
  prefs: []
  type: TYPE_NORMAL
- en: – "In-painting" function allows for selective replacements within images.
  prefs: []
  type: TYPE_NORMAL
- en: – Adjusts real photos based on captions, adding or removing elements such as
    objects, shadows, reflections, and textures.
  prefs: []
  type: TYPE_NORMAL
- en: – Produces high-resolution images.
  prefs: []
  type: TYPE_NORMAL
- en: To save resources, DALL-E generates variations to your prompt (most of the time
    expanding it), rendering 4 images. You can choose whatever image you like and
    ask DALL-E, in the next prompt, to modify it to your needs.
  prefs: []
  type: TYPE_NORMAL
- en: If your prompt is 76-word long, DALL-E truncates it.
  prefs: []
  type: TYPE_NORMAL
- en: '**DALL-E generated images and copyright**'
  prefs: []
  type: TYPE_NORMAL
- en: Firstly, any artwork generated by DALL-E is not solely yours. What it means
    is that you can use the AI-created images, but they are not exclusive; others
    might use them as well. Secondly, modifying copyrighted material with DALL-E can
    lead to copyright infringement, even if the result looks different.
  prefs: []
  type: TYPE_NORMAL
- en: Our recommendation is to use DALL-E responsibly and to honor intellectual property
    boundaries.
  prefs: []
  type: TYPE_NORMAL
- en: '**6.2 First Image**'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Designing with DALL-E 3 (stylized DALL·E 3) is a straightforward process. This
    guide will walk you through generating your first images.
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 1: Type your desired text into the search bar. Alternatively, explore
    the provided examples (scroll down, several sample descriptions will be available).'
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 2: DALL-E 3 usually returns four different image results. If none meets
    your expectations, consider refining your description. If a particular image catches
    your eye and you wish to explore variations, hover over the chosen image, and
    click ![menu1.tif](../Images/menu1_fmt2.png) located in the top right corner.
    Select "Generate variations" to see alternative renditions.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 3: Once you have settled on a preferred image, delve deeper by using the
    built-in photo editor (as of September 2023, yet not available in ChatGPT DALL-E
    Mode). Experiment with different prompts and adjust as necessary to achieve the
    optimal visual outcome.'
  prefs: []
  type: TYPE_NORMAL
- en: '**6.3 Prompt Structure**'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In this section, we explore the DALL-E Prompt Structure. We will learn how to
    structure good prompts, understand the different parts that make them work, and
    get the best images from AI.
  prefs: []
  type: TYPE_NORMAL
- en: '| **Prompt Components** | **Description** | **Examples** |'
  prefs: []
  type: TYPE_TB
- en: '| CONTEXT | This is the core of the prompt. The component describes **the overarching
    theme**, **the narrative of the image**. This creates **the stage** for what the
    image should represent. Specify the era or historical period. | Specify the background
    or environment where the subject is placed: forest, outer space, 18th-century
    ballroom, underwater city, or post-apocalyptic wasteland, including the time of
    the day and additional elements like rain, butterflies, mist, floating islands,
    holograms, ruins, etc. (e.g., a serene mountain landscape at dawn; a bustling
    city street in the 1800s, on a winter snowing day). |'
  prefs: []
  type: TYPE_TB
- en: '| IMAGE TYPE | It sets the basic stylistic direction of the image. The category
    or **style of the image** defines whether you want a photo, illustration, or other
    type of image. | Photo, oil painting, illustration, sketch, cartoon, vector, watercolor
    painting, render, unreal engine, 3D rendering, octane render. |'
  prefs: []
  type: TYPE_TB
- en: '| IMAGE ELEMENTS | **Subject Size and Placement**: The size of the subject
    (small, medium, large) and preferred placement (forearm, back, etc.)**Emotional
    Tone**: The emotion you want the image to convey, such as joy, mystery, etc.**Cultural
    References**: Cultural elements you want to incorporate.**Must-Haves**: All specific
    items or ideas that are non-negotiable. You could also include a description of
    the relationships or actions between the elements of the image.**Must-Avoids**:
    All elements or items you do not want in the image. | Cat, mountain, astronaut,
    robot, cityscape, flower, dragon, etc. (e.g., a dragon perched on a cliff; a woman
    reading a book under a tree). Specify the size of the subject concerning its surroundings
    or in comparison to other subjects. It can also be used to create surreal proportions.
    |'
  prefs: []
  type: TYPE_TB
- en: '| IMAGE BACKGROUND | **Background, environment, or setting**. They can change
    the interpretation of the main elements. | Sunset at the beach; a snowy mountain
    peak. |'
  prefs: []
  type: TYPE_TB
- en: '| IMAGE LAYOUT AND SIZE | The **orientation and resolution** of the image.
    | Wide (1792×1024)Square (1024×1024)Tall (1024×1792) |'
  prefs: []
  type: TYPE_TB
- en: '| IMAGE LIGHTNING AND COLOR PALETTE | The component specifies a particular
    **set of colors** or moods the image should adhere to. The idea is that colors
    set the mood and aesthetic of the image, influencing its overall feel. | Light
    source, intensity, ambient light, and optical effects.Monochromatic, pastel, vibrant,
    sepia, neon, cool tones, etc. (e.g., warm autumn colors; cool blues and purples
    for a night scene). |'
  prefs: []
  type: TYPE_TB
- en: '| IMAGE ADDITIONAL INFO | **Additional guidelines** about the representation
    of image elements. | A diverse group of people at a carnival; Asian scientist
    male in a lab. |'
  prefs: []
  type: TYPE_TB
- en: '| STYLE REFERENCES | **Specific style** for the desired artistic look that
    the image should emulate, without naming specific recent artists. Not always essential.
    | Impressionist style with brush strokes, Art Nouveau with ornate, flowing lines,
    Picasso style, Autochrome, Surveillance, Daguerreotype, Disposable Camera, Double
    Exposure, Aerial Photography, Catwalk, and Fashion, etc. |'
  prefs: []
  type: TYPE_TB
- en: '| FORMAT & QUALITY | Preferred **format and quality of the image**. Typically,
    the default image format (like PNG or JPEG) is sufficient, but specific use cases
    might require a particular format. | Format: PNG, JPEG. Image quality, such as
    HD. |'
  prefs: []
  type: TYPE_TB
- en: '| SEED VALUE | The seed value initializes the model''s random processes and
    **ensures deterministic behavior**. Seeds are typically non-negative integers.
    On a 64-bit system, the seed can range from 0 to 18,446,744,073,709,551,615\.
    The default value is 5,000.The same prompt with different seeds will produce different
    results. | A numerical value that creates variations of an image from the same
    prompt. Useful for generating variations or ensuring consistency across images.
    |'
  prefs: []
  type: TYPE_TB
- en: '| CAMERA SETTINGS | For images intended to mimic the output of a professional
    camera, the prompt should specify camera settings to achieve a high-quality result,
    like: Aperture, Focal Length, ISO, Mode (automatic or manual), and White Balance.
    Add an explanation of the purpose of each setting (e.g., why a wide aperture or
    a specific shutter speed is chosen). | E.g. A wide aperture of f/2.8 for a shallow
    depth of field, a shutter speed of 1/60 to capture motion without blur, and ISO
    800 for the low-light conditions. A focal length of 35mm to capture the scene
    without excessive distortion. |'
  prefs: []
  type: TYPE_TB
- en: '**6.4 Designing with DALL-E**'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: We will exemplify several generic prompts that can be used to accelerate your
    creativity.
  prefs: []
  type: TYPE_NORMAL
- en: We will reveal the best ways to use DALL-E 3 to save time and cut costs on your
    design projects.
  prefs: []
  type: TYPE_NORMAL
- en: As DALL-E is continually evolving and improving, expect prompts to work differently
    when you test them.
  prefs: []
  type: TYPE_NORMAL
- en: Replace the placeholders (elements within the square brackets) to tailor the
    prompt to the specific photo you want to generate. Providing a model with a clear
    and descriptive prompt improves the likelihood of getting a result closely matching
    your vision.
  prefs: []
  type: TYPE_NORMAL
- en: '**Movie poster**'
  prefs: []
  type: TYPE_NORMAL
- en: 'Generic prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: '*Create a movie poster for a film titled "The Guns of Navarone."*'
  prefs: []
  type: TYPE_NORMAL
- en: '*Historical period: Second World War.*'
  prefs: []
  type: TYPE_NORMAL
- en: '*Wide image: 1792×1024*'
  prefs: []
  type: TYPE_NORMAL
- en: '*Mountainside bordering the Mediterranean Sea at sunset.*'
  prefs: []
  type: TYPE_NORMAL
- en: '*High on the mountain, soldiers and two artillery batteries all directed toward
    the sea.*'
  prefs: []
  type: TYPE_NORMAL
- en: '*On the sea, at the horizon, one battleship.*'
  prefs: []
  type: TYPE_NORMAL
- en: '*4K image.*'
  prefs: []
  type: TYPE_NORMAL
- en: '*Please add the title of the movie, "THE GUNS OF NAVARONE" on the poster.*'
  prefs: []
  type: TYPE_NORMAL
- en: '*When the task is done, give me the image seed you used.*'
  prefs: []
  type: TYPE_NORMAL
- en: 'What happened is that DALL-E reworded my prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: '*Photorealistic 4k wide movie poster for ''The Guns of Navarone''. Set in the
    historical backdrop of the Second World War, the scene unfolds on a mountainside
    overlooking the Mediterranean Sea during a radiant sunset. High on the mountain,
    soldiers stand guard alongside two artillery batteries, all of which are aimed
    toward the sea. On the distant horizon, a single battleship casts a silhouette.
    The title ''THE GUNS OF NAVARONE'' is boldly and prominently displayed on the
    poster.*'
  prefs: []
  type: TYPE_NORMAL
- en: The generated poster is far from ideal. You can notice several differences between
    what we asked and what we got.
  prefs: []
  type: TYPE_NORMAL
- en: '![TheGunsOfNavaronePrompt.tif](../Images/TheGunsOfNavaronePromp_fmt.jpeg)![TheGuhsOfNavaroneImage.tif](../Images/TheGuhsOfNavaroneImage_fmt.png)'
  prefs: []
  type: TYPE_IMG
- en: But we have the image seed. Using the same prompt with the same image seed,
    the result is the same image, convenient for demonstrations.
  prefs: []
  type: TYPE_NORMAL
- en: Try your example, iterate, and use different image seeds to get the best result.
  prefs: []
  type: TYPE_NORMAL
