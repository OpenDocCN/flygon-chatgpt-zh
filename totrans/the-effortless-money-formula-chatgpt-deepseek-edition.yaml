  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：一位AI专家使用ChatGPT创建了一门名为“AI入门”的在线课程，用于生成课程内容和推广材料。该课程在Udemy上推出，在第一个月内吸引了超过1000名报名，产生了可观的被动收入。
