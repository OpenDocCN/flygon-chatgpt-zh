    Practice these concepts with hands-on exercises.
  prefs: []
  type: TYPE_NORMAL
- en: '[Chapter 3: Working with Formulas and Functions](chapter03.xhtml)'
  prefs: []
  type: TYPE_NORMAL
- en: Master Excel’s formulas and functions, including IF variations, lookup functions,
    and dynamic VLOOKUP. Reinforce your understanding through practical exercises.
  prefs: []
  type: TYPE_NORMAL
- en: '[Chapter 4: Data Validation](chapter04.xhtml)'
  prefs: []
  type: TYPE_NORMAL
- en: Set data validation rules to ensure data accuracy. Explore custom validation
    techniques through practical exercises.
  prefs: []
  type: TYPE_NORMAL
- en: '[Chapter 5: Protection](chapter05.xhtml)'
  prefs: []
  type: TYPE_NORMAL
- en: Secure your Excel files by protecting worksheets, workbooks, and specific parts
    with passwords.
  prefs: []
  type: TYPE_NORMAL
- en: '[Chapter 6: Sorting a Database](chapter06.xhtml)'
  prefs: []
  type: TYPE_NORMAL
- en: Organize data efficiently using simple, multilevel, and customized sorting methods.
  prefs: []
  type: TYPE_NORMAL
- en: '[Chapter 7: Filtering a Database](chapter07.xhtml)'
  prefs: []
  type: TYPE_NORMAL
- en: Filter data with Auto Filter and advanced filtering techniques to extract relevant
    information.
  prefs: []
  type: TYPE_NORMAL
- en: '[Chapter 8: Subtotals and Data Consolidation](chapter08.xhtml)'
  prefs: []
  type: TYPE_NORMAL
- en: Summarize and analyze data using the Subtotal feature and consolidate data from
    multiple sources.
  prefs: []
  type: TYPE_NORMAL
- en: '[Chapter 9: Pivot Tables](chapter09.xhtml)'
  prefs: []
  type: TYPE_NORMAL
- en: Create and format PivotTables for versatile data analysis, including advanced
    features like grouping items and generating graphs.
  prefs: []
  type: TYPE_NORMAL
- en: '[Chapter 10: Conditional Formatting](chapter10.xhtml)'
  prefs: []
  type: TYPE_NORMAL
- en: Apply cell value-based and formula-based formatting, including advanced techniques
    with multiple conditions.
  prefs: []
  type: TYPE_NORMAL
- en: '[Chapter 11: What-if-Analysis](chapter11.xhtml)'
  prefs: []
  type: TYPE_NORMAL
- en: Use What-if-Analysis tools, like Goal Seek and data tables, to project figures
    and create scenarios.
  prefs: []
  type: TYPE_NORMAL
- en: '[Chapter 12: Working with Multiple Worksheets, Workbooks, and Applications](chapter12.xhtml)'
  prefs: []
  type: TYPE_NORMAL
- en: Link different worksheets and software, merge workbooks, and track changes for
    collaborative work.
  prefs: []
  type: TYPE_NORMAL
- en: '[Chapter 13: Working with Charts](chapter13.xhtml)'
  prefs: []
  type: TYPE_NORMAL
- en: Create and customize charts using Chart Tools, templates, and sparklines to
    enhance data visualization.
  prefs: []
  type: TYPE_NORMAL
- en: '[Chapter 14: Creating and Recording Macros in VBA](chapter14.xhtml)'
  prefs: []
  type: TYPE_NORMAL
- en: Automate tasks by creating and recording macros, including relative reference
    macros.
  prefs: []
  type: TYPE_NORMAL
- en: '[Chapter 15: Assigning Buttons to Macros](chapter15.xhtml)'
