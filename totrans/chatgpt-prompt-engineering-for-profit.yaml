- en: '○        ****Que**stio**n : "****Wh**at** ****a**re** ****t**he** ****diff**erence**s
    ****bet**wee**n ****so**lar** ****en**erg**y ****a**nd** ****wi**nd** ****en**erg**y?
    "'
  id: totrans-790
  prefs: []
  type: TYPE_NORMAL
  zh: ○        ****问题**： "****太阳能和风能之间有什么区别？"
- en: '○        ****Res**pons**e :'
  id: totrans-791
  prefs: []
  type: TYPE_NORMAL
  zh: '○        ****回答** :'
- en: ■ "****So**lar** ****en**erg**y ****i**s** ****gene**rate**d ****b**y** ****conv**ertin**g
    ****sun**ligh**t ****in**to** ****elec**tricit**y, ****wh**ile** ****wi**nd**
    ****en**erg**y ****i**s** ****gene**rate**d ****b**y** ****t**he** ****mov**emen**t
    ****o**f** ****wi**nd** ****th**at** ****dr**ive**s ****tur**bine**s. ****So**lar**
    ****en**erg**y ****i**s** ****be**st** ****su**ite**d ****f**or** ****su**nny**
    ****loca**tion**s ****a**nd** ****c**an** ****b**e** ****us**ed** ****o**n** ****a****
    ****sm**all** ****sc**ale**, ****su**ch** ****a**s** ****i**n** ****ho**mes**,
    ****wh**ile** ****wi**nd** ****en**erg**y ****gene**rall**y ****req**uire**s ****la**rge**
    ****op**en** ****sp**ace**s, ****su**ch** ****a**s** ****pl**ain**s ****o**r**
    ****coa**sta**l ****ar**eas**. ****Bo**th** ****a**re** ****rene**wabl**e, ****b**ut**
    ****effi**cienc**y ****c**an** ****de**pen**d ****o**n** ****lo**cal** ****wea**the**r
    ****cond**ition**s."
  id: totrans-792
  prefs: []
  type: TYPE_NORMAL
  zh: ■ "****太阳能是通过将阳光转化为电能来产生的，而风能是通过风的运动驱动涡轮机来产生的。太阳能最适合阳光充足的地方，并且可以在小规模上使用，例如在家庭中，而风能通常需要开阔的空间，例如平原或沿海地区。两者都是可再生能源，但效率可能取决于当地的天气条件。"
- en: '●        ****Adv**ance**d :'
  id: totrans-793
  prefs: []
  type: TYPE_NORMAL
