- en: Tasks involving law and compliance frequently call for exacting attention to
    detail and regulatory compliance. This chapter's prompts are designed to enable
    professionals to use ChatGPT more effectively when drafting policies, reviewing
    contracts, and managing compliance. Businesses can streamline their operations
    and maintain legal security by utilizing these templates.
  id: totrans-884
  prefs: []
  type: TYPE_NORMAL
  zh: 涉及法律和合规的任务通常需要精确的关注细节和监管合规。本章的提示旨在使专业人士在起草政策、审查合同和管理合规时更有效地使用ChatGPT。通过利用这些模板，企业可以简化其运营并保持法律安全。
- en: '*Chapter 13:'
  id: totrans-885
  prefs:
  - PREF_H1
  - PREF_H3
  type: TYPE_NORMAL
  zh: '*第13章：'
- en: Financial Planning & Management**
  id: totrans-886
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 财务规划与管理**
- en: '**Prompts for Budget Planning Templates**'
  id: totrans-887
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '**预算规划模板提示**'
- en: 1\. Make a small business monthly budget template.
  id: totrans-888
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 创建一个小企业月度预算模板。
- en: 2\. Create a retail store's annual budget, including projected costs and income.
  id: totrans-889
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 创建一个零售店的年度预算，包括预计成本和收入。
- en: 3\. Compose a detailed plan for allocating funds for a marketing campaign.
  id: totrans-890
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 为营销活动分配资金制定一个详细计划。
- en: 4\. Create a template for an entrepreneur's personal finance budget.
  id: totrans-891
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 为企业家创建一个个人财务预算模板。
- en: 5\. Create a template for monitoring budgets for individual projects.
  id: totrans-892
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 创建一个用于监控个人项目预算的模板。
- en: 6\. Create a budget plan for the first year of a startup.
  id: totrans-893
  prefs: []
  type: TYPE_NORMAL
  zh: 6. 为初创公司第一年创建一个预算计划。
- en: 7\. Create a non-profit organization's expense tracking template.
  id: totrans-894
  prefs: []
  type: TYPE_NORMAL
  zh: 7. 创建一个非营利组织的费用跟踪模板。
- en: 8\. Make a forecast to control unforeseen costs.
  id: totrans-895
  prefs: []
  type: TYPE_NORMAL
  zh: 8. 制定一个预测以控制意外成本。
- en: 9\. Create a summary of the financial dashboard to show stakeholders the budgets.
  id: totrans-896
  prefs: []
  type: TYPE_NORMAL
  zh: 9. 创建一个财务仪表板摘要，向利益相关者展示预算。
- en: 10\. Create a template for a weekly cash flow tracker.
  id: totrans-897
  prefs: []
  type: TYPE_NORMAL
  zh: 10. 创建一个每周现金流跟踪模板。
- en: '**Prompts for Financial Forecasting**'
  id: totrans-898
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '**财务预测提示**'
- en: 11\. Create a financial projection for a tech company looking to raise capital
    from investors.
  id: totrans-899
  prefs: []
  type: TYPE_NORMAL
  zh: 11. 为寻求从投资者那里筹集资金的技术公司创建一个财务预测。
- en: 12\. Make an e-commerce business revenue forecast for the next five years.
  id: totrans-900
  prefs: []
  type: TYPE_NORMAL
  zh: 12. 为电子商务业务制定未来五年的收入预测。
- en: 13\. Create a B2B company's monthly sales forecast template.
  id: totrans-901
  prefs: []
  type: TYPE_NORMAL
  zh: 13. 为B2B公司创建一个月度销售预测模板。
- en: 14\. Create a template for forecasting trends in seasonal sales.
  id: totrans-902
  prefs: []
  type: TYPE_NORMAL
  zh: 14. 创建一个预测季节性销售趋势的模板。
- en: 15\. Create a manual for estimating a mid-sized company's quarterly expenses.
  id: totrans-903
  prefs: []
  type: TYPE_NORMAL
  zh: 15. 创建一个估算中型公司季度支出的手册。
- en: 16\. Make a financial projection for a SaaS product that is subscription-based.
  id: totrans-904
  prefs: []
  type: TYPE_NORMAL
  zh: 16. 为基于订阅的SaaS产品制定一个财务预测。
- en: 17\. Create a template to calculate a marketing campaign's return on investment.
  id: totrans-905
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个模板来计算营销活动的投资回报率。
- en: 18\. Create a presentation outline for an investor revenue forecast.
  id: totrans-906
  prefs: []
  type: TYPE_NORMAL
  zh: 18. 为投资者收入预测创建一个演示文稿大纲。
- en: 19\. Develop a forecasting tool to estimate how inflation will affect company
    operations.
  id: totrans-907
  prefs: []
  type: TYPE_NORMAL
  zh: 19. 开发一个预测工具，估计通货膨胀将如何影响公司运营。
- en: 20\. Create a construction project revenue forecast that accounts for risk.
  id: totrans-908
  prefs: []
  type: TYPE_NORMAL
  zh: 20. 创建一个考虑风险的建筑项目收入预测。
- en: '**Prompts for Investment Analysis**'
  id: totrans-909
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '**投资分析提示**'
- en: 21\. Compose an analysis of potential investments for a business's excess capital.
  id: totrans-910
  prefs: []
  type: TYPE_NORMAL
  zh: 21. 为企业的过剩资本制定潜在投资的评估。
- en: 22\. Create a template for assessing the return on investment of equipment purchases.
  id: totrans-911
  prefs: []
  type: TYPE_NORMAL
  zh: 22. 创建一个评估设备购买投资回报的模板。
- en: 23\. Develop a framework for risk analysis in high-growth investments.
  id: totrans-912
  prefs: []
  type: TYPE_NORMAL
  zh: 23. 为高增长投资开发一个风险评估框架。
- en: 24\. Create a list of the benefits and drawbacks of cryptocurrency investing
    for business.
  id: totrans-913
  prefs: []
  type: TYPE_NORMAL
  zh: 24. 创建一个列出加密货币投资对商业的利弊的清单。
- en: 25\. Compose a manual for novice investors on stock market analysis.
  id: totrans-914
  prefs: []
  type: TYPE_NORMAL
  zh: 25. 为新手投资者编写股票市场分析手册。
- en: 26\. Create a mutual fund comparison template.
  id: totrans-915
  prefs: []
  type: TYPE_NORMAL
  zh: 26. 创建一个共同基金比较模板。
- en: 27\. Create a manual for evaluating business real estate investment opportunities.
  id: totrans-916
  prefs: []
  type: TYPE_NORMAL
  zh: 27. 创建一个手册，用于评估商业房地产投资机会。
- en: 28\. Establish a system for assessing prospects for venture capital funding.
  id: totrans-917
  prefs: []
  type: TYPE_NORMAL
  zh: 28. 建立一个评估风险投资资金前景的系统。
- en: 29\. Create a checklist for evaluating the possible returns on investments in
    tech startups.
  id: totrans-918
  prefs: []
  type: TYPE_NORMAL
  zh: 29. 为评估科技初创企业投资可能回报创建一个清单。
- en: 30\. Compose an overview of the Internal Rate of Return (IRR) calculation process
    for long-term projects.
  id: totrans-919
  prefs: []
  type: TYPE_NORMAL
  zh: 30. 编写一份关于长期项目内部收益率（IRR）计算过程的概述。
- en: '**Prompts for Cash Flow Optimization**'
  id: totrans-920
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '**现金流优化提示**'
- en: 31\. Create a manual to help seasonal businesses close cash flow gaps.
  id: totrans-921
  prefs: []
  type: TYPE_NORMAL
  zh: 31. 创建一个手册，帮助季节性业务填补现金流缺口。
- en: 32\. Create a plan to enhance the timeliness of invoice collection.
  id: totrans-922
  prefs: []
  type: TYPE_NORMAL
  zh: 32. 制定一个计划，提高发票收款的及时性。
- en: 33\. Develop a cash inflow and outflow projection template.
  id: totrans-923
  prefs: []
  type: TYPE_NORMAL
  zh: 33. 制定一个现金流入和流出预测模板。
- en: 34\. Create a manual for negotiating the best terms for supplier payments.
  id: totrans-924
  prefs: []
  type: TYPE_NORMAL
  zh: 34. 创建一个手册，用于协商供应商付款的最佳条款。
- en: 35\. Create a checklist to find inefficient cash flow areas.
  id: totrans-925
  prefs: []
  type: TYPE_NORMAL
  zh: 35. 创建一个清单，寻找低效的现金流区域。
- en: 36\. Create a plan of action for preserving liquidity in the event of a market
    decline.
  id: totrans-926
  prefs: []
  type: TYPE_NORMAL
  zh: 36. 制定一个行动计划，以在市场下跌时保持流动性。
- en: 37\. Develop a methodology to determine the break-even point for the introduction
    of a new product.
  id: totrans-927
  prefs: []
  type: TYPE_NORMAL
  zh: 37. 制定一个确定新产品引入盈亏平衡点的方法。
- en: 38\. Compose a manual on how to reinvest earnings in expanding your company.
  id: totrans-928
  prefs: []
  type: TYPE_NORMAL
  zh: 38. 编写一份手册，说明如何将收益再投资于公司扩张。
- en: 39\. Create a plan for handling cash reserves while expanding quickly.
  id: totrans-929
  prefs: []
  type: TYPE_NORMAL
  zh: 39. 制定一个计划，在快速扩张的同时处理现金储备。
- en: 40\. Make a cash flow report outline to show stakeholders.
  id: totrans-930
  prefs: []
  type: TYPE_NORMAL
  zh: 40. 制定一个现金流量报告大纲，向利益相关者展示。
- en: '**Prompts for Cost Reduction Strategies**'
  id: totrans-931
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '**成本削减策略提示**'
- en: 41\. Create a manual for identifying operational waste.
  id: totrans-932
  prefs: []
  type: TYPE_NORMAL
  zh: 41. 创建一个手册，用于识别运营浪费。
- en: 42\. Create a template for cost-cutting vendor contract negotiations.
  id: totrans-933
  prefs: []
  type: TYPE_NORMAL
  zh: 42. 创建一个模板，用于成本削减供应商合同谈判。
- en: 43\. Create a plan to reduce labor costs without laying off employees.
  id: totrans-934
  prefs: []
  type: TYPE_NORMAL
  zh: 43. 制定一个计划，在不裁员的情况下降低劳动力成本。
- en: 44\. Make a checklist to assess supply chain management's cost-efficiency.
  id: totrans-935
  prefs: []
  type: TYPE_NORMAL
  zh: 44. 制定一个清单，评估供应链管理的成本效益。
- en: 45\. Compose a detailed guide on how to combine subscriptions to business software.
  id: totrans-936
  prefs: []
  type: TYPE_NORMAL
  zh: 45. 编写一份详细的指南，说明如何合并商业软件的订阅。
- en: 46\. Create a plan for reducing marketing campaign expenses without sacrificing
    return on investment.
  id: totrans-937
  prefs: []
  type: TYPE_NORMAL
  zh: 46. 制定一个计划，在不牺牲投资回报的情况下减少营销活动开支。
- en: 47\. Come up with a plan to reduce overhead costs for physical stores.
  id: totrans-938
  prefs: []
  type: TYPE_NORMAL
  zh: 47. 制定一个计划，降低实体店的运营成本。
- en: 48\. Create a template for carrying out an audit of all company expenses.
  id: totrans-939
  prefs: []
  type: TYPE_NORMAL
  zh: 48. 创建一个模板，用于对公司所有开支进行审计。
- en: 49\. To cut expenses, develop a manual for putting energy-saving techniques
    into action.
  id: totrans-940
  prefs: []
  type: TYPE_NORMAL
  zh: 49. 为了削减开支，制定一个实施节能技术的手册。
- en: 50\. To cut operating expenses, create a plan for outsourcing non-core functions.
  id: totrans-941
  prefs: []
  type: TYPE_NORMAL
  zh: 50. 为了削减运营开支，创建一个外包非核心功能的计划。
- en: 51\. Develop a plan to lower retail businesses' credit card processing costs.
  id: totrans-942
  prefs: []
  type: TYPE_NORMAL
  zh: 51. 制定一个计划，降低零售业的信用卡处理费用。
- en: 52\. Make a plan to reduce repetitive administrative tasks by using automation
    tools.
  id: totrans-943
  prefs: []
  type: TYPE_NORMAL
  zh: 52. 制定一个计划，通过使用自动化工具减少重复的行政任务。
- en: 53\. Create a manual on how to save money by switching from traditional office
    settings to remote work.
  id: totrans-944
  prefs: []
  type: TYPE_NORMAL
  zh: 53. 创建一个手册，说明如何通过从传统办公环境转向远程工作来节省金钱。
- en: 54\. Create a plan to evaluate and lower shipping expenses for online retailers.
  id: totrans-945
  prefs: []
  type: TYPE_NORMAL
  zh: 54. 为在线零售商创建一个评估和降低运输费用的计划。
- en: 55\. Create a checklist for legally reducing expenses by utilizing tax deductions.
  id: totrans-946
  prefs: []
  type: TYPE_NORMAL
  zh: 55. 利用税收减免合法减少开支，创建一个清单。
- en: '**Note from the Author**'
  id: totrans-947
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**作者笔记**'
- en: A profitable and long-lasting business depends on sound financial management
    and planning. This chapter's prompts offer practical advice for streamlining budgets,
    forecasting finances, maximizing cash flow, and successfully cutting expenses.
    Financial professionals can increase productivity, make wise decisions, and succeed
    in the long run by utilizing these AI-driven prompts.
  id: totrans-948
  prefs: []
  type: TYPE_NORMAL
  zh: 一个盈利且持久的企业依赖于稳健的财务管理和规划。本章的提示提供了简化预算、预测财务、最大化现金流和成功削减开支的实用建议。通过利用这些由AI驱动的提示，财务专业人士可以提高生产力，做出明智的决策，并在长期内取得成功。
- en: '* * *'
  id: totrans-949
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Chapter 14:'
  id: totrans-950
  prefs:
  - PREF_H1
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第14章：
- en: Crisis Management & Recovery**
  id: totrans-951
  prefs: []
  type: TYPE_NORMAL
  zh: 危机管理与恢复**
- en: '**Prompts for Crisis Response Templates**'
  id: totrans-952
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '**危机响应模板提示**'
- en: 1\. Create a template email to notify staff members of an unforeseen emergency.
  id: totrans-953
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 创建一个模板电子邮件，通知员工不可预见的紧急情况。
- en: 2\. Provide a detailed manual for drafting a crisis management strategy.
  id: totrans-954
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 提供一份详细的危机管理策略制定手册。
- en: 3\. Write a press release to respond to unfavorable press coverage of your business.
  id: totrans-955
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 撰写一份新闻稿以回应您业务的负面新闻报道。
- en: 4\. During a crisis, write a social media post to share company updates.
  id: totrans-956
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 在危机期间，撰写社交媒体帖子以分享公司更新。
- en: 5\. Make a checklist for office building emergency evacuations.
  id: totrans-957
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 制定一个办公室建筑紧急疏散清单。
- en: 6\. Write a phone script for customer support agents who answer questions about
    emergencies.
  id: totrans-958
  prefs: []
  type: TYPE_NORMAL
  zh: 6. 为回答有关紧急情况的客户支持代表撰写电话脚本。
- en: 7\. Create a template for alerting interested parties to a cybersecurity incident.
  id: totrans-959
  prefs: []
  type: TYPE_NORMAL
  zh: 7. 为通知对网络安全事件感兴趣的各方创建一个模板。
- en: 8\. Create a backup plan in case a natural disaster disrupts business operations.
  id: totrans-960
  prefs: []
  type: TYPE_NORMAL
  zh: 8. 制定一个备选计划，以防自然灾害扰乱业务运营。
- en: 9\. Write an internal newsletter draft outlining the company's crisis response
    procedures.
  id: totrans-961
  prefs: []
  type: TYPE_NORMAL
  zh: 9. 撰写一份公司危机响应程序的内刊草案。
- en: 10\. Create a breakdown of the duties and responsibilities of a crisis response
    team.
  id: totrans-962
  prefs: []
  type: TYPE_NORMAL
  zh: 10. 创建一个危机响应团队职责和责任的分解。
- en: '**Prompts for Reputation Management**'
  id: totrans-963
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '**声誉管理提示**'
- en: 11\. Create a sample letter of apology to clients following a service issue.
  id: totrans-964
  prefs: []
  type: TYPE_NORMAL
  zh: 11. 在服务问题后向客户发送一份道歉信样本。
- en: 12\. Establish a protocol for handling unfavorable social media reviews.
  id: totrans-965
  prefs: []
  type: TYPE_NORMAL
  zh: 12. 制定处理负面社交媒体评论的程序。
- en: 13\. Create a press release template to rebuild confidence following a product
    recall.
  id: totrans-966
  prefs: []
  type: TYPE_NORMAL
  zh: 13. 创建一个新闻稿模板，以重建产品召回后的信心。
- en: 14\. Compose a manual for creating a proactive approach to reputation management.
  id: totrans-967
  prefs: []
  type: TYPE_NORMAL
  zh: 14. 编写一个手册，说明如何创建积极的声誉管理方法。
- en: 15\. Create a social media strategy to ensure openness in the event of a public
    relations emergency.
  id: totrans-968
  prefs: []
  type: TYPE_NORMAL
  zh: 15. 创建一个社交媒体策略，以确保在公关紧急情况下的透明度。
- en: 16\. Make an email template to offer solutions and an apology to unhappy customers.
  id: totrans-969
  prefs: []
  type: TYPE_NORMAL
  zh: 16. 制作一个电子邮件模板，向不满意的客户提供解决方案和道歉。
- en: 17\. Create a checklist to track the reputation of your brand online.
  id: totrans-970
  prefs: []
  type: TYPE_NORMAL
  zh: 17. 创建一个清单以跟踪您品牌在线的声誉。
- en: 18\. Draft a speech to stakeholders during a crisis involving the company's
    reputation.
  id: totrans-971
  prefs: []
  type: TYPE_NORMAL
  zh: 18. 在涉及公司声誉的危机期间，起草一份面向利益相关者的演讲稿。
- en: 19\. After a crisis, create a document that answers frequently asked questions.
  id: totrans-972
  prefs: []
  type: TYPE_NORMAL
  zh: 19. 危机过后，创建一个文档以回答常见问题。
- en: 20\. Develop a detailed plan for restoring confidence with suppliers and partners.
  id: totrans-973
  prefs: []
  type: TYPE_NORMAL
  zh: 20. 制定一个详细的计划，以恢复与供应商和合作伙伴的信心。
- en: '**Prompts for Business Continuity Planning**'
  id: totrans-974
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '**业务连续性规划提示**'
- en: 21\. Create a template for a small business's business continuity plan.
  id: totrans-975
  prefs: []
  type: TYPE_NORMAL
  zh: 21. 为小型企业的业务连续性计划创建一个模板。
- en: 22\. In the event of a crisis, create a checklist for identifying essential
    business operations.
  id: totrans-976
  prefs: []
  type: TYPE_NORMAL
  zh: 22. 在危机发生时，创建一个清单以确定关键业务运营。
- en: 23\. Create a communication plan template in the event of an IT outage.
  id: totrans-977
  prefs: []
  type: TYPE_NORMAL
  zh: 23. 在发生IT故障的情况下创建一个沟通计划模板。
- en: 24\. Create a manual on how to set up redundancy systems to avoid service interruptions.
  id: totrans-978
  prefs: []
  type: TYPE_NORMAL
  zh: 24. 创建一个手册，说明如何设置冗余系统以避免服务中断。
- en: 25\. Establish a structure for setting priorities for post-crisis recovery activities.
  id: totrans-979
  prefs: []
  type: TYPE_NORMAL
  zh: 25. 制定一个结构，以确定危机后恢复活动的优先事项。
- en: 26\. Create a backup plan in case the supply chain is interrupted.
  id: totrans-980
  prefs: []
  type: TYPE_NORMAL
  zh: 26. 制定一个备选计划以防供应链中断。
- en: 27\. Create a plan for continuing business as usual in the event of a financial
    crisis.
  id: totrans-981
  prefs: []
  type: TYPE_NORMAL
  zh: 27. 制定一个计划，以防金融危机发生时继续正常营业。
- en: 28\. Create a crisis simulation exercise to evaluate plans for business continuity.
  id: totrans-982
  prefs: []
  type: TYPE_NORMAL
  zh: 28. 制定一个危机模拟演练，以评估业务连续性计划。
- en: 29\. Make a template for tracking inventory of vital company assets.
  id: totrans-983
  prefs: []
  type: TYPE_NORMAL
  zh: 29. 为跟踪公司关键资产库存制定一个模板。
- en: 30\. Create a communication plan to keep customers loyal in times of crisis.
  id: totrans-984
  prefs: []
  type: TYPE_NORMAL
  zh: 30. 制定一个沟通计划，以在危机期间保持客户忠诚度。
- en: '**Prompts for Developing Recovery Strategies**'
  id: totrans-985
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '**发展恢复策略提示**'
- en: 31\. Create a recovery plan to resume operations following a significant emergency.
  id: totrans-986
  prefs: []
  type: TYPE_NORMAL
  zh: 31. 制定一个恢复计划，以在重大紧急情况后恢复运营。
- en: 32\. Create a plan for recovering market share after the crisis.
  id: totrans-987
  prefs: []
  type: TYPE_NORMAL
  zh: 32. 制定一个危机后恢复市场份额的计划。
- en: 33\. Create a detailed manual for carrying out post-crisis assessments.
  id: totrans-988
  prefs: []
  type: TYPE_NORMAL
  zh: 33. 制定一个详细的指南，用于执行危机后的评估。
- en: 34\. Make a checklist for handling staff morale following a crisis at work.
  id: totrans-989
  prefs: []
  type: TYPE_NORMAL
  zh: 34. 在工作危机后制定一个处理员工士气的清单。
- en: 35\. Create a framework for reevaluating the priorities and goals of the organization
    after a crisis.
  id: totrans-990
  prefs: []
  type: TYPE_NORMAL
  zh: 35. 在危机后创建一个框架，以重新评估组织的优先事项和目标。
- en: 36\. After a service failure, create a series of emails to re-engage lost clients.
  id: totrans-991
  prefs: []
  type: TYPE_NORMAL
  zh: 36. 在服务失败后，创建一系列电子邮件以重新吸引失去的客户。
- en: 37\. Create a guide to assess options for financial recovery.
  id: totrans-992
  prefs: []
  type: TYPE_NORMAL
  zh: 37. 制定一份指南，评估财务恢复的选项。
- en: 38\. Make a survey template to get input on how well crisis management is working.
  id: totrans-993
  prefs: []
  type: TYPE_NORMAL
  zh: 38. 制定一份调查模板，了解危机管理效果如何。
- en: 39\. Create a schedule for putting post-crisis business process modifications
    into effect.
  id: totrans-994
  prefs: []
  type: TYPE_NORMAL
  zh: 39. 制定一个实施危机后业务流程修改的日程表。
- en: 40\. Create a plan to look for outside funding for rehabilitation.
  id: totrans-995
  prefs: []
  type: TYPE_NORMAL
  zh: 40. 制定一个寻找外部资金用于康复的计划。
- en: '**Prompts for Stakeholder Communication**'
  id: totrans-996
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '**利益相关者沟通提示**'
- en: 41\. Create a template letter to inform investors in an emergency.
  id: totrans-997
  prefs: []
  type: TYPE_NORMAL
  zh: 41. 制定一份紧急情况下的模板信件，通知投资者。
- en: 42\. Develop a template for providing staff with frequent crisis updates.
  id: totrans-998
  prefs: []
  type: TYPE_NORMAL
  zh: 42. 制定一个为员工提供频繁危机更新的模板。
- en: 43\. Write a draft email to reassure clients that service will continue.
  id: totrans-999
  prefs: []
  type: TYPE_NORMAL
  zh: 43. 起草一封电子邮件草稿，向客户保证服务将继续。
- en: 44\. Write a press release outlining the company's crisis management strategy.
  id: totrans-1000
  prefs: []
  type: TYPE_NORMAL
  zh: 44. 编写一份概述公司危机管理策略的新闻稿。
- en: 45\. Create a communication strategy for informing regulatory or governmental
    bodies.
  id: totrans-1001
  prefs: []
  type: TYPE_NORMAL
  zh: 45. 制定一份向监管机构或政府机构通报的沟通策略。
- en: 46\. Create an emergency briefing template for media outlets.
  id: totrans-1002
  prefs: []
  type: TYPE_NORMAL
  zh: 46. 制定一份为媒体机构准备的紧急简报模板。
- en: 47\. Write a manual for holding online town halls to talk about crisis updates.
  id: totrans-1003
  prefs: []
  type: TYPE_NORMAL
  zh: 47. 编写一份关于举办在线市政厅讨论危机更新的指南。
- en: 48\. During a crisis, create a checklist for tracking and dealing with false
    information.
  id: totrans-1004
  prefs: []
  type: TYPE_NORMAL
  zh: 48. 在危机期间，制定一份跟踪和处理虚假信息的清单。
- en: 49\. Create a detailed plan for conducting stakeholder debriefings after a crisis.
  id: totrans-1005
  prefs: []
  type: TYPE_NORMAL
  zh: 49. 制定一份危机后对利益相关者进行简报的详细计划。
- en: 50\. Make an email template to express gratitude to stakeholders for their help
    during challenging times.
  id: totrans-1006
  prefs: []
  type: TYPE_NORMAL
  zh: 50. 制定一份电子邮件模板，向在困难时期提供帮助的利益相关者表示感谢。
- en: '**Note from the Author**'
  id: totrans-1007
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**作者笔记**'
- en: In difficult times, crisis management and recovery are essential to preserving
    a company's stability and reputation. This chapter's prompts are intended to help
    businesses effectively plan for, handle, and recover from crises. Leaders can
    make sure their organizations stay resilient and adaptable in the face of hardship
    by employing these tools.
  id: totrans-1008
  prefs: []
  type: TYPE_NORMAL
  zh: 在困难时期，危机管理和恢复对于维护公司的稳定和声誉至关重要。本章的提示旨在帮助企业在危机中有效规划、处理和恢复。通过运用这些工具，领导者可以确保他们的组织在面对困难时保持韧性和适应性。
- en: 'Chapter 15:'
