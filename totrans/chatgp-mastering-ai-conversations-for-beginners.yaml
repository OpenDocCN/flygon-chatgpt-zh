  id: totrans-433
  prefs: []
  type: TYPE_NORMAL
  zh: '**今天您可以开始将ChatGPT用于您自己的最终方式，就是成为一个自定义代码生成器。这对于小型企业或个人来说非常理想，他们想要创建自己的网站，但又不想学习一大堆编程语言，或者支付一大笔钱让别人来做。有了ChatGPT，您可以在任何时间都拥有一个口袋里的个人程序员。只需输入提示，它就会生成相应的代码**。'
