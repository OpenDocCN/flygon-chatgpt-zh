  type: TYPE_NORMAL
- en: In this chapter, we showed you how ChatGPT can be used to teach a variety of
    subjects just by asking it to do so! We even had a fun scenario where we turned
    a diary entry in French filled with errors into a lesson and then from a lesson
    into a quiz. In the next chapter, we’re going to be looking at how we can use
    ChatGPT as a personal assistant.
  prefs: []
  type: TYPE_NORMAL
- en: © The Author(s), under exclusive license to APress Media, LLC, part of Springer
