- en: '**First Case: Customer Engagement in Small Businesses**'
  id: totrans-1272
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '**第一个案例：小型企业的客户参与**'
- en: ChatGPT was used by a boutique clothing store to automate customer inquiries
    on their website, increasing customer satisfaction by 30% and speeding up response
    times.
  id: totrans-1273
  prefs: []
  type: TYPE_NORMAL
  zh: 一家精品服装店使用 ChatGPT 自动化其网站上的客户咨询，通过提高客户满意度 30% 和加快响应时间。
- en: '**Second Case: AI in Hiring**'
  id: totrans-1274
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '**第二个案例：招聘中的 AI**'
- en: A tech startup cut the hiring process in half by using AI prompts to screen
    resumes.
  id: totrans-1275
  prefs: []
  type: TYPE_NORMAL
  zh: 一家科技初创公司通过使用 AI 提示筛选简历，将招聘流程缩短了一半。
- en: '**Case 3: Forecasting Finances**'
  id: totrans-1276
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '**案例 3：财务预测**'
- en: By using AI-generated financial prompts to forecast seasonal sales trends, a
    mid-sized e-commerce company was able to increase revenue by 20%.
  id: totrans-1277
  prefs: []
  type: TYPE_NORMAL
  zh: 通过使用AI生成的财务提示来预测季节性销售趋势，一家中型电子商务公司能够将收入提高了20%。
