- en: '**POINT PLOTS FOR FACTORIZED VIEWS**'
  id: totrans-3227
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**因子视图的点图**'
- en: Point plots can be useful to highlight the differences between points, especially
    when categorized by factors. The lines connecting the points can help emphasize
    trends. Point plots emphasize the comparison between points with lines.
  id: totrans-3228
  prefs: []
  type: TYPE_NORMAL
  zh: 点图可以用来突出显示点之间的差异，尤其是在按因素分类时。连接点的线条可以帮助强调趋势。点图通过线条强调点之间的比较。
