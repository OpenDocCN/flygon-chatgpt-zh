- en: '****Ada**ptin**g ****t**o** ****Diff**eren**t ****To**nes** ****a**nd** ****Con**text**s'
  id: totrans-358
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '****适应**不同**语调和**语境**'
- en: '****O**ne** ****o**f** ****Cha**tGP**T’****s**** ****mo**st** ****impr**essiv**e
    ****tr**ait**s ****i**s** ****i**ts** ****abi**lit**y ****t**o** ****ad**jus**t
