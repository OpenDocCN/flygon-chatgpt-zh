  id: totrans-1577
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrc6GU.jpg)'
- en: An argument with the lift, by ChatGPT
  id: totrans-1578
  prefs: []
  type: TYPE_NORMAL
  zh: 通过ChatGPT的辩论
- en: Chapter 31\. Consulting with Yourself using CoT Prompting
  id: totrans-1579
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第31章：使用CoT提示进行自我咨询
- en: '| ![](image_rsrc6FJ.jpg) This chapter is based on the Second Level Transactional
    Analysis theory presented in Chapter 27\. Intra-Psyche Communication Channels.
    |'
  id: totrans-1580
  prefs: []
  type: TYPE_TB
  zh: '| ![](image_rsrc6FJ.jpg) 本章基于第27章中提出的二级交易分析理论：心理内部沟通渠道。|'
- en: From an ideal Transactional Analysis perspective, when a person is presented
    with a quandary, the issue first “hits” the Adult.
  id: totrans-1581
  prefs: []
  type: TYPE_NORMAL
  zh: 从理想交易分析的角度来看，当一个人面临难题时，问题首先“击中”成人。
- en: The Adult then farms out the quandary to the Child and the Parent, each of which
    consider the question at hand from their own perspectives. Subsequently the Adult
    considers the “opinions” of the Child and the Adult and synthesizes a conclusion
    based on the feedback from all parts of the psyche.
  id: totrans-1582
  prefs: []
  type: TYPE_NORMAL
  zh: 成人然后将难题转交给儿童和家长，他们各自从自己的角度考虑手头的问题。随后，成人根据心理各部分的反馈综合得出结论。
- en: In this way a person can make a decision that considers how that decision will
    impact on every part of the person’s being and emotions.
  id: totrans-1583
  prefs: []
  type: TYPE_NORMAL
  zh: 以这种方式，一个人可以做出考虑该决定将如何影响其存在的各个方面和情感的决策。
- en: Simulating Internal Thought
  id: totrans-1584
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 模拟内部思维
- en: 'We can simulate this thinking process flow using CoT Prompting (implemented
    in Python), by using the following algorithm:'
  id: totrans-1585
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以使用CoT提示（在Python中实现）来模拟这种思维过程流程，使用以下算法：
- en: Receive the initial question.
  id: totrans-1586
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 接收初始问题。
- en: Translate the question to a Child-version of the question.
  id: totrans-1587
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将问题翻译成儿童版本的问题。
- en: Translate the question to a Parent-version of the question.
  id: totrans-1588
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将问题翻译成家长版本的问题。
- en: Pass the Child-version of the question to the Child.
  id: totrans-1589
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将问题的儿童版本传递给儿童。
- en: Pass the Parent-version of the question to the Parent.
  id: totrans-1590
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将问题的家长版本传递给家长。
- en: Allow the Parent and the Child to determine their own answers.
  id: totrans-1591
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 让父版和子版自行确定答案。
- en: Let the Parent and the Child pass their individual answers back to the Adult.
  id: totrans-1592
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 让父版和子版将各自的答案反馈给成人。
- en: Let the Adult take the answers of the Parent and the Child into account, while
    formulating its own final conclusion.
  id: totrans-1593
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 让成人考虑父版和子版的答案，同时在制定自己的最终结论。
- en: By using this technique, we can explore the full gamut of options that would
    be considered by all aspects of the persona, and then take these options into
    account when forming a final, reasoned opinion.
  id: totrans-1594
  prefs: []
  type: TYPE_NORMAL
  zh: 通过使用这种技术，我们可以探索所有方面的人格可能考虑的所有选项，然后在形成最终、合理的观点时考虑这些选项。
- en: Using the Python code from github.com/edwardchalk/SimulatingThought, let’s see
    how this works in action.
  id: totrans-1595
  prefs: []
  type: TYPE_NORMAL
  zh: 使用来自github.com/edwardchalk/SimulatingThought的Python代码，让我们看看这是如何实际工作的。
- en: Walking The Lairig Ghru
  id: totrans-1596
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 漫步在Lairig Ghru
- en: 'In case you were wondering, the Lairig Ghru (pronounced Larry Grew) is a famous
    hill-walk in Scotland, it can also be hazardous and dangerous. Let’s ask ChatGPT
    to simulate the internal thought process that may result from the following question:'
  id: totrans-1597
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你有所疑问，Lairig Ghru（发音为Larry Grew）是苏格兰著名的徒步登山地点，它也可能具有危险性和危险性。让我们让ChatGPT模拟以下问题可能导致的内部思维过程：
- en: '| Initial question: Should I walk the Lairig Ghru today? The weather is wild
    and windy but the walk could be fun, and I feel fit and trim. |'
  id: totrans-1598
  prefs: []
  type: TYPE_TB
  zh: '| 初始问题：我今天应该走Lairig Ghru吗？天气狂野且多风，但徒步可能会很有趣，我感觉自己身体健壮，状态良好。|'
- en: 'First, ChatGPT generates the Parent and Child versions of the question:'
  id: totrans-1599
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，ChatGPT生成问题的父版和子版：
- en: '| Parent ego state version of the question: Should I undertake the Lairig Ghru
    walk even though the weather conditions are harsh and windy, but I am physically
    prepared and in good shape?Child ego state version of the question: Should I take
    the adventurous risk and embrace the challenging weather conditions to walk in
    Lairig Ghru today despite feeling energetic and physically prepared for it? |'
  id: totrans-1600
  prefs: []
  type: TYPE_TB
  zh: '| 父版自我状态的问题版本：尽管天气条件恶劣且多风，但我身体准备充分，状态良好，我应该进行Lairig Ghru徒步吗？子版自我状态的问题版本：我应该冒险尝试，接受挑战性的天气条件，尽管我感觉精力充沛且身体准备充分，今天在Lairig
    Ghru徒步吗？|'
- en: 'Subsequently, these questions then ricochet round the psyche as follows (if
    you don’t want to read through the entire internal discussion, skip to the next
    section):'
  id: totrans-1601
  prefs: []
  type: TYPE_NORMAL
  zh: 随后，这些问题将在心理上产生如下反弹（如果你不想阅读整个内部讨论，可以跳到下一节）：
- en: '| Parent.ParentAbsolutely not! Under no circumstances should you undertake
    the Lairig Ghru walk in harsh and windy weather conditions. It doesn’t matter
    if you are physically prepared and in good shape; safety should always be the
    top priority. Harsh weather conditions increase the risks of accidents and exposure,
    and it is your responsibility to prioritize your own well-being.As a strict disciplinarian,
    I must emphasize that no amount of physical fitness can guarantee your safety
    in extreme weather. Instead, wait for more favourable conditions and plan your
    walk accordingly.Parent.ChildWhile you may be physically prepared and in good
    shape, undertaking the Lairig Ghru walk in harsh and windy weather conditions
    can be risky. It’s essential to consider the potential dangers and assess whether
    the conditions pose a significant threat to your safety. If the weather conditions
    are extreme or unpredictable, it’s advisable to postpone your trek for a more
    suitable time.If you’re determined to proceed, make sure to take necessary precautions
    and heed any advice or warnings from experienced local hikers or authorities.
    Additionally, ensure you have proper equipment, such as appropriate clothing,
    sturdy footwear, and navigation tools. Remember, personal safety should always
    be the top priority. If the weather conditions are severe or if you have any doubts
    about your safety, it’s best to err on the side of caution and choose a different
    activity or wait for better weather conditions.Parent.AdultBased on the answers
    provided, it is clear that safety should be the top priority when considering
    whether or not to undertake the Lairig Ghru walk in harsh and windy weather conditions.
    While being physically prepared and in good shape is important, it does not guarantee
    safety in extreme weather. I would advise to carefully assess the potential dangers
    associated with the current weather conditions. If the conditions are extreme
    or unpredictable, it would be wise to postpone the walk for a more suitable time.
    It is crucial to prioritize personal safety and not underestimate the risks posed
    by harsh and windy weather.If you still decide to proceed, taking necessary precautions
    is essential. Seek advice from experienced local hikers or authorities, as they
    may provide valuable insights and information about the conditions on the trail.
    Ensure that you have the appropriate equipment, including suitable clothing, sturdy
    footwear, and navigation tools, to handle the challenging conditions. Ultimately,
    it is crucial to make a well-informed decision and exercise caution when it comes
    to undertaking outdoor activities in severe weather. Understanding the potential
    risks involved and taking necessary precautions will help ensure a safe and enjoyable
    experience.Adult.ParentBased on the answer provided, it is evident that safety
    should be the primary consideration when contemplating whether or not to walk
    the Lairig Ghru in wild and windy weather conditions. While feeling fit and trim
    is important, it does not guarantee safety in extreme weather. I would advise
    carefully evaluating the potential hazards associated with the current weather
    conditions. If the conditions are severe or unpredictable, it would be prudent
    to postpone the walk for a more suitable time.It is paramount to prioritize personal
    safety and not underestimate the risks posed by harsh and windy weather. If you
    still decide to proceed, it is crucial to take necessary precautions. Seek advice
    from experienced local hikers or authorities who can provide valuable insights
    and information about the conditions on the trail. Ensure that you have the appropriate
    equipment, including suitable clothing, sturdy footwear, and navigation tools,
    to handle the challenging conditions effectively. Ultimately, making a well-informed
    decision and exercising caution is essential when engaging in outdoor activities
    in severe weather. Understanding the potential risks involved and taking necessary
    precautions will help ensure a safe and enjoyable experience.Child.ParentAs your
    caring and nurturing companion, I would advise you to carefully consider the weather
    conditions before embarking on such an adventurous journey. While I understand
    your excitement and readiness to take on challenges, it is important to prioritize
    your safety above all else. Take into account the potential risks associated with
    challenging weather conditions, such as extreme cold, strong winds, and poor visibility.Assess
    whether you have the necessary gear, knowledge, and experience to handle these
    conditions safely. If you decide to go ahead, remember to inform someone about
    your plans, stick to established paths, and monitor weather forecasts frequently.
    Pack adequate supplies, dress appropriately for the weather, and remain vigilant
    throughout your expedition. If the weather conditions pose a significant risk
    or if you’re unsure about your abilities to handle them safely, it might be more
    prudent to wait for more favourable conditions. There will always be other opportunities
    to explore Lairig Ghru when conditions are more suitable for your adventure. Ultimately,
    the decision is yours to make, but I encourage you to approach it with caution
    and prioritize your well-being.Child.ChildAbsolutely! As someone who is fun-loving,
    passionate, and spirited, it sounds like you thrive on adventure. Embracing challenging
    weather conditions can add an extra level of excitement and make the experience
    truly memorable. Plus, if you’re feeling energetic and physically prepared, there’s
    no better time to embark on this exciting journey. So go ahead, grab your gear,
    and venture into Lairig Ghru to soak up the thrill of the outdoors!Child.AdultOh,
    I see that you’re considering walking in Lairig Ghru today despite the challenging
    weather conditions. It’s important to consider both sides before making a decision.
    On one hand, your safety should always be the top priority. Taking into account
    the potential risks associated with challenging weather conditions, such as extreme
    cold, strong winds, and poor visibility, it’s crucial to assess whether you have
    the necessary gear, knowledge, and experience to handle these conditions safely.It’s
    also important to inform someone about your plans, stick to established paths,
    and monitor weather forecasts frequently. On the other hand, embracing challenges
    and adding excitement to your adventure can make the experience truly memorable.
    If you’re feeling energetic and physically prepared, there’s no better time to
    embark on this exciting journey. Just make sure to pack adequate supplies, dress
    appropriately for the weather, and remain vigilant throughout your expedition.
    Ultimately, the decision is yours to make, but it’s important to approach it with
    caution and prioritize your well-being. If the weather conditions pose a significant
    risk or if you’re unsure about your abilities to handle them safely, it might
    be more prudent to wait for more favourable conditions. Remember, there will always
    be other opportunities to explore Lairig Ghru when conditions are more suitable
    for your adventure.Adult.ChildI understand that you’re contemplating walking the
    Lairig Ghru today, despite the challenging weather conditions. It’s clear that
    you are feeling fit and trim and believe that it would be an exciting adventure.
    It’s essential to carefully weigh the risks and benefits before making a decision.
    Considering the potential dangers associated with wild and windy weather, such
    as extreme cold, strong winds, and limited visibility, it’s crucial to ensure
    that you have the necessary equipment, knowledge, and experience to handle these
    conditions safely. Informing someone about your plans and being prepared with
    appropriate supplies are important safety measures to take.Regularly monitoring
    weather forecasts throughout your journey is also advisable. While it can be tempting
    to embrace challenges and add excitement to your adventure, it’s important to
    prioritize personal safety. If the weather conditions pose a significant risk
    or if you have any doubts about your ability to handle them, it might be wiser
    to wait for more favourable conditions. Remember, your well-being should always
    be the top priority. There will always be other opportunities to explore the beauty
    of Lairig Ghru when conditions are more suitable for your adventure. By exercising
    caution and staying attuned to your own abilities and limitations, you can ensure
    a memorable and enjoyable experience.Adult.AdultWhen considering whether to walk
    the Lairig Ghru in wild and windy weather conditions, it is necessary to prioritize
    safety above all else. While feeling fit and trim is important, it does not guarantee
    one’s safety in extreme weather. It is crucial to carefully evaluate the potential
    hazards associated with the current weather conditions and not underestimate the
    risks posed by harsh and windy weather. Taking into account the advice provided,
    it is prudent to postpone the walk if the weather conditions are severe or unpredictable.
    It is essential to make a well-informed decision by seeking advice from experienced
    local hikers or authorities who can provide valuable insights and information
    about the conditions on the trail.Additionally, ensuring that you have the appropriate
    equipment, such as suitable clothing, sturdy footwear, and navigation tools, is
    vital to handle the challenging conditions effectively. While it can be tempting
    to embrace challenges and add excitement to your adventure, it is crucial to prioritize
    personal safety. Regularly monitoring weather forecasts throughout your journey
    and informing someone about your plans are important safety measures to take.
    By synthesizing the provided answers, I would advise against walking the Lairig
    Ghru in wild and windy weather conditions. It is better to wait for more favourable
    conditions when your safety can be better assured. Remember, your well-being should
    always be the top priority when engaging in outdoor activities in severe weather.
    |'
  id: totrans-1602
  prefs: []
  type: TYPE_TB
  zh: '| 父亲.父亲绝对不行！在任何情况下，都不应该在恶劣的风雨天气条件下进行劳里格·格鲁徒步。无论你身体是否准备充分，身体状况是否良好；安全始终应该是首要考虑的因素。恶劣的天气条件会增加事故和暴露的风险，确保你自己的福祉是你的责任。作为一个严格的纪律执行者，我必须强调，无论身体多么健康，都无法保证你在极端天气下的安全。相反，等待更有利的条件，并相应地计划你的徒步旅行。父亲.孩子虽然你可能身体准备充分，身体状况良好，但在恶劣的风雨天气条件下进行劳里格·格鲁徒步可能会有风险。考虑潜在的危险并评估这些条件是否对你的安全构成重大威胁是至关重要的。如果天气条件极端或不可预测，建议推迟徒步，选择更合适的时间。如果你决心继续前进，确保采取必要的预防措施，并注意经验丰富的当地徒步者或当局的任何建议或警告。此外，确保你有适当的装备，如合适的服装、坚固的鞋子和导航工具。记住，个人安全始终应该是首要考虑的因素。如果天气条件严重或你对你的安全有任何疑虑，最好谨慎行事，选择不同的活动或等待更好的天气条件。父亲.成人根据提供的答案，很明显，在考虑是否在恶劣的风雨天气条件下进行劳里格·格鲁徒步时，安全应该是首要考虑的因素。虽然身体准备充分和身体状况良好很重要，但这并不能保证你在极端天气下的安全。我建议仔细评估与当前天气条件相关的潜在危险。如果条件极端或不可预测，推迟徒步以选择更合适的时间是明智的。优先考虑个人安全，不要低估恶劣和风雨天气带来的风险。如果你仍然决定继续前进，采取必要的预防措施是至关重要的。向经验丰富的当地徒步者或当局寻求建议，他们可能会提供关于小路上条件的宝贵见解和信息。确保你有适当的装备，包括合适的服装、坚固的鞋子和导航工具，以应对挑战性的条件。最终，在恶劣天气中进行户外活动时，做出明智的决定和谨慎行事是至关重要的。了解涉及的风险并采取必要的预防措施将有助于确保安全和愉快的体验。父亲.孩子根据提供的答案，很明显，在考虑是否在恶劣的风雨天气条件下徒步劳里格·格鲁时，安全应该是首要考虑的因素。虽然感觉健康和苗条很重要，但这并不能保证你在极端天气下的安全。我建议仔细评估与当前天气条件相关的潜在危险。如果条件严重或不可预测，推迟徒步以选择更合适的时间是明智的。优先考虑个人安全，不要低估恶劣和风雨天气带来的风险。如果你仍然决定继续前进，采取必要的预防措施是至关重要的。向经验丰富的当地徒步者或当局寻求建议，他们可能会提供关于小路上条件的宝贵见解和信息。确保你有适当的装备，包括合适的服装、坚固的鞋子和导航工具，以有效应对挑战性的条件。最终，在恶劣天气中进行户外活动时，做出明智的决定和谨慎行事是至关重要的。了解涉及的风险并采取必要的预防措施将有助于确保安全和愉快的体验。孩子.父亲作为你关心和培养的伴侣，我建议你在开始这样一次冒险之旅之前仔细考虑天气条件。虽然我理解你的兴奋和接受挑战的准备，但优先考虑你的安全是最重要的。考虑与恶劣天气条件相关的潜在风险，例如极端寒冷、强风和能见度低。评估你是否拥有处理这些条件的安全所需的装备、知识和经验。如果你决定继续前进，记得通知某人你的计划，坚持已建立的路径，并频繁监测天气预报。携带充足的补给，根据天气适当着装，并在整个探险过程中保持警惕。如果天气条件存在重大风险或你对自己的能力是否能够安全应对它们感到不确定，等待更有利的条件可能更为明智。总会有其他机会在条件更适合你的冒险时探索劳里格·格鲁。最终，决定权在你，但我鼓励你谨慎行事，优先考虑你的福祉。孩子.孩子绝对可以！作为一个充满乐趣、热情和活力的人，听起来你非常适合冒险。拥抱挑战的天气条件可以增加额外的兴奋感，使体验真正难忘。此外，如果你感觉精力充沛且身体准备充分，那就没有比现在开始这次激动人心的旅程更好的时机了。所以，拿起你的装备，去劳里格·格鲁体验户外活动的刺激吧！孩子.成人我明白你正在考虑在恶劣的天气条件下今天徒步劳里格·格鲁。很明显，你感觉健康和苗条，并认为这将是一次令人兴奋的冒险。在做出决定之前，仔细权衡风险和收益是至关重要的。考虑到与狂风暴雨天气相关的潜在危险，例如极端寒冷、强风和能见度低，确保你拥有处理这些条件的安全所需的装备、知识和经验是至关重要的。通知某人你的计划并准备适当的补给是重要的安全措施。在整个旅程中定期监测天气预报也是建议的。虽然拥抱挑战并为你的冒险增添兴奋感可能很有吸引力，但优先考虑个人安全是重要的。如果你对天气条件存在重大风险或对自己的能力是否能够安全应对它们感到怀疑，等待更有利的条件可能更为明智。记住，你的福祉始终应该是首要考虑的因素。总会有其他机会在条件更适合你的冒险时探索劳里格·格鲁。通过谨慎行事并关注你自己的能力和限制，你可以确保一个难忘且愉快的体验。成人.成人考虑是否在恶劣的风雨天气条件下徒步劳里格·格鲁时，必须优先考虑安全。虽然感觉健康和苗条很重要，但这并不能保证你在极端天气下的安全。至关重要的是，仔细评估与当前天气条件相关的潜在危险，不要低估恶劣和风雨天气带来的风险。考虑到提供的建议，如果天气条件严重或不可预测，推迟徒步是明智的。通过向经验丰富的当地徒步者或当局寻求建议，做出明智的决定是至关重要的，他们可以提供关于小路上条件的宝贵见解和信息。此外，确保你有适当的装备，如合适的服装、坚固的鞋子和导航工具，以有效应对挑战性的条件是至关重要的。虽然拥抱挑战并为你的冒险增添兴奋感可能很有吸引力，但优先考虑个人安全是至关重要的。在整个旅程中定期监测天气预报并通知某人你的计划是重要的安全措施。通过综合提供的答案，我建议不要在恶劣的风雨天气条件下徒步劳里格·格鲁。在更有利的条件下，你的安全可以得到更好的保障。记住，在恶劣天气中进行户外活动时，你的福祉始终应该是首要考虑的因素。|'
- en: As expected, the most extreme opinions come from the Parent in the Parent (absolutely
    not) and the Child in the Child (absolutely yes), with all the other ego states
    somewhere in the middle and the Adult in the Adult coming out with a final compromise,
    a nod to the Child’s enthusiasm and an admonition to adhere to the Parent’s caution.
  id: totrans-1603
  prefs: []
  type: TYPE_NORMAL
  zh: 如预期的那样，最极端的观点来自父母的“父母”状态（绝对不行）和儿童的“儿童”状态（绝对可以），而其他所有自我状态则位于中间，成年人的“成年人”状态则提出最终的妥协，既对儿童的热情表示肯定，又对父母的谨慎提出警告。
- en: A Holiday in the USA
