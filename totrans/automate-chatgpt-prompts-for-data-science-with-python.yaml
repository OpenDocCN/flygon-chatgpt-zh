- en: Chapter 2:   WRITE PYTHON
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 1\. Train Classification Model
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt: I want you to act as a data scientist and code for me. I have a dataset
    of [describe dataset]. Please build a machine learning model that predict [target
    variable].'
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrcZW.jpg)![](image_rsrcZX.jpg)![](image_rsrcZY.jpg)![](image_rsrcZZ.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 'ChatGPT is able to provide satisfactory code that:'
  prefs: []
  type: TYPE_NORMAL
- en: provide the regular preprocessing (scaling the data and encoding categorical
    variable),
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: drop the testing column
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: provide the train-test split
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: evaluate the model
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: This is good because it provides enough code to start off a model. It is also
    technically sound and correct. However, it’s lacking because it only uses accuracy
    for evaluation.
  prefs: []
  type: TYPE_NORMAL
- en: 2\. Automatic Machine Learning
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt: I want you to act as an automatic machine learning (AutoML) bot using
    TPOT for me. I am working on a model that predicts [...]. Please write python
    code to find the best classification model with the highest AUC score on the test
    set.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc100.jpg)![](image_rsrc101.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 'ChatGPT provided good code (it runs!) that:'
  prefs: []
  type: TYPE_NORMAL
- en: provide the train-test split
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: instantiated the AutoML classifier
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: fit it to the AutoML classifier
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: export the classifier
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: I’m not at all surprised that ChatGPT excels here since the code is pretty much
    only boilerplate code. This can be copied and pasted from the documentation as
    is.
  prefs: []
  type: TYPE_NORMAL
- en: 3\. Tune Hyperparameter
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt: I want you to act as a data scientist and code for me. I have trained
    a [model name]. Please write the code to tune the hyper parameters.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc102.jpg)![](image_rsrc103.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 'For a decision tree classifier, ChatGPT wrote code that:'
  prefs: []
  type: TYPE_NORMAL
- en: performed a grid search
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: suggested the best parameters.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Not bad at all, and the code runs! Grid search is the most popular method for
    hyperparameter tuning, so it’s no surprise that it came up on top.
  prefs: []
  type: TYPE_NORMAL
- en: However, note that grid search goes through the search space exhaustively. The
    larger the search space, the longer time it will take. An alternative is the randomized
    search, which implements a randomized search over parameters. Once assigned a
    budget, randomized search takes the same amount of time regardless of the search
    space.
  prefs: []
  type: TYPE_NORMAL
- en: 4\. Explore Data
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt: I want you to act as a data scientist and code for me. I have a dataset
    of [describe dataset]. Please write code for data visualisation and exploration.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc104.jpg)![](image_rsrc105.jpg)![](image_rsrc106.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 'For an exploration, ChatGPT wrote code that:'
  prefs: []
  type: TYPE_NORMAL
- en: used df.describe() to provide descriptive statistics
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: created count plots for visualizing the distribution of categorical variable
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: created a heatmap to determine the between numerical variables
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: determined the relationship of numerical variables and the target variable with
    box plots of numerical columns
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: determined the relationship of categorical variables and the target variable
    with barplot.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The above choices of charts are indeed correct.
  prefs: []
  type: TYPE_NORMAL
- en: 5\. Generate Data
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt: I want you to act as a fake data generator. I need a dataset that has
    x rows and y columns: [insert column names]'
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc107.jpg)![](image_rsrc108.jpg)'
  prefs: []
  type: TYPE_IMG
- en: ChatGPT produced code that generated the data as per my requirements completely.
    It only used the pandas library and the inhouse random library, making it portable.
    I actually did use the synthetic dataset for other tasks.
  prefs: []
  type: TYPE_NORMAL
- en: 6\. Write Regex
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt: I want you to act as a coder. Please write me a regex in Python that [describe
    regex]'
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc109.jpg)![](image_rsrc10A.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Here, ChatGPT provided code that matched a regex as per requirements in Python.
  prefs: []
  type: TYPE_NORMAL
- en: However, note that I have cherrypicked this example. Before this, I had tried
    asking ChatGPT to create more complex other regex patterns but it failed. It even
    sounded confident when it explained the regex, but the regex it produced didn’t
    work.
  prefs: []
  type: TYPE_NORMAL
