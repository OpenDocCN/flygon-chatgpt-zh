- en: 'Introduction: Why Prompting Matters'
  id: totrans-12
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 引言：为什么提示很重要
- en: In the age of AI, prompting is everything.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 在人工智能时代，提示至关重要。
- en: A well-crafted prompt can unlock powerful, insightful, and game-changing outputs.
    A poorly crafted one? It leaves you frustrated, scrolling endlessly, wondering
    why your AI "doesn't get it."
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 一个精心制作的提示可以解锁强大、有洞察力和变革性的输出。一个制作不当的提示？只会让你感到沮丧，不断地滚动，想知道为什么你的AI“不理解”。
- en: 'The secret is simple: Better prompts = Better results.'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 秘诀很简单：更好的提示 = 更好的结果。
- en: This ebook will show you how to ask ChatGPT smarter questions to get smarter
    answers. Whether you're writing, coding, designing, marketing, or just brainstorming,
    you'll learn the skills that separate amateurs from pros.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 这本电子书将向你展示如何向ChatGPT提出更聪明的问题，以获得更聪明的答案。无论你是写作、编码、设计、营销还是仅仅是为了构思，你都将学会将业余爱好者与专业人士区分开来的技能。
- en: Let's dive in.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们深入探讨。
- en: 'Chapter 1: Understand What ChatGPT Is Good At'
  id: totrans-18
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第1章：了解ChatGPT擅长什么
- en: 'Before diving into the art of crafting perfect prompts, it’s crucial to understand
    what ChatGPT is truly good at — and where it has limitations. Think of ChatGPT
    as a brilliant assistant: incredibly fast, highly versatile, and capable of incredible
    work, but not infallible.'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 在深入探讨如何制作完美的提示之前，了解ChatGPT真正擅长什么——以及它的局限性——至关重要。将ChatGPT视为一位出色的助手：速度极快、高度灵活，并且能够完成令人难以置信的工作，但并非完美无缺。
- en: What ChatGPT Excels At
  id: totrans-20
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: ChatGPT擅长什么
- en: 'ChatGPT shines when it''s given tasks that involve language, creativity, and
    structured thinking. Here are some areas where it performs exceptionally well:'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 当ChatGPT被赋予涉及语言、创造力和结构化思考的任务时，它表现得尤为出色。以下是一些它表现特别出色的领域：
- en: '●       Generating Text : Whether you need an email, blog post, product description,
    or social media caption, ChatGPT can produce high-quality written content on almost
    any topic. Given a clear directive, it can adapt to the tone, audience, and style
    you specify.'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: ● 生成文本：无论你需要撰写电子邮件、博客文章、产品描述还是社交媒体标题，ChatGPT都能在几乎任何主题上生成高质量的书面内容。只要给出明确的指令，它就能适应你指定的语气、受众和风格。
- en: '●       Summarizing Information : If you have a wall of text — a report, article,
    or research paper — and you want to condense it into something more digestible,
    ChatGPT can highlight the main points clearly and quickly.'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: ● 信息的总结：如果你有一大堆文本——报告、文章或研究论文——并且想要将其浓缩成更易于消化的内容，ChatGPT可以清晰地快速地突出主要观点。
- en: '●       Brainstorming Ideas : Need creative input? ChatGPT excels at ideation,
    whether you''re looking for new business names, content ideas, taglines, campaign
    strategies, or book titles.'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: ● 产生想法：需要创意输入吗？ChatGPT在构思方面表现出色，无论是寻找新的商业名称、内容想法、标语、营销策略还是书籍标题。
- en: '●       Explaining Concepts Simply : ChatGPT can take complex subjects and
    break them down into simple, easy-to-understand explanations. This is particularly
    useful for learning, teaching, or communicating difficult ideas to a broad audience.'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: ● 简单解释概念：ChatGPT可以将复杂主题分解成简单、易于理解的解释。这对于学习、教学或向广大受众传达复杂思想特别有用。
- en: '●       Transforming Tone and Style : Want your serious blog post turned into
    a humorous piece? Or a casual email rephrased for a corporate setting? ChatGPT
    is a master at shifting tones and writing styles based on your needs.'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: ● 转变语气和风格：想要将严肃的博客文章变成幽默的作品？或者将随意的电子邮件改写成适合企业环境的版本？ChatGPT可以根据你的需求成为转换语气和写作风格的大师。
- en: '●       Simulating Conversations and Role-Playing : It can convincingly take
    on roles — like acting as a customer support agent, a career coach, a personal
    trainer, or even a fictional character. This makes it great for training, practicing
    interviews, or just having fun.'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: ● 模拟对话和角色扮演：它可以令人信服地承担各种角色——比如扮演客户支持代表、职业导师、个人教练，甚至是虚构角色。这使得它在培训、练习面试或仅仅是为了娱乐方面都非常出色。
- en: Where ChatGPT Struggles
  id: totrans-28
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: ChatGPT的挑战
- en: 'Despite its talents, ChatGPT has notable limitations. It''s important to know
    these to avoid over-relying on it for tasks it''s not suited for:'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管ChatGPT有才华，但它也有明显的局限性。了解这些可以帮助你避免过度依赖它来完成不适合它的任务：
- en: '●       Real-Time Data : ChatGPT’s knowledge is based on what it has been trained
    on, up until its last update. It cannot access current news, real-time market
    data, or ongoing events unless explicitly connected to updated databases.'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: ● 实时数据：ChatGPT的知识基于它最后一次更新的训练内容。除非明确连接到更新的数据库，否则它无法访问当前新闻、实时市场数据或正在发生的事件。
- en: '●       Highly Specialized Technical Tasks : If you’re asking ChatGPT to perform
    a task that requires cutting-edge expertise (like diagnosing a rare disease or
    designing an engine component), it may generate plausible but inaccurate information.
    It''s not a substitute for human experts in technical fields.'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: ● 高度专业化的技术任务：如果你要求ChatGPT执行需要尖端专业知识（如诊断罕见疾病或设计发动机部件）的任务，它可能会生成看似合理但实际上不准确的信息。它不能替代技术领域的专家。
- en: '●       Complex Math and Logical Reasoning : ChatGPT can handle basic calculations
    and straightforward logic, but it may stumble over multi-step math problems, probability
    questions, or anything requiring intricate logical sequencing.'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: ● 复杂数学和逻辑推理：ChatGPT可以处理基本的计算和直接的逻辑，但它可能会在多步数学问题、概率问题或需要复杂逻辑顺序的任何事情上遇到困难。
- en: '●       Vague, Open-Ended Requests : ChatGPT performs best when your input
    is clear and specific. When given vague prompts like "Tell me about business,"
    it tends to generate general, sometimes unhelpful responses.'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: ● 含糊不清、开放式请求：当你的输入清晰具体时，ChatGPT的表现最佳。当给出像“告诉我关于商业”这样的模糊提示时，它往往会生成一般性的、有时无用的回答。
- en: 'Real-World Example: Sarah''s Story'
  id: totrans-34
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 真实世界案例：Sarah的故事
- en: Take Sarah, a freelance marketer. When she first started using ChatGPT, she
    used it to generate 20 Instagram caption ideas for a new skincare brand. Within
    minutes, she had a list of playful, engaging options — each tailored to a slightly
    different vibe. She cut her brainstorming time in half.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 以Sarah为例，她是一名自由职业的市场营销人员。当她第一次开始使用ChatGPT时，她用它为一家新的护肤品牌生成20个Instagram标题想法。几分钟内，她就有了一份充满趣味、引人入胜的选项列表——每个选项都针对略有不同的氛围。她将头脑风暴的时间缩短了一半。
- en: Feeling empowered, she decided to ask ChatGPT for a "market analysis" of the
    latest beauty trends to inform her product launch strategy. It delivered a professional-sounding
    report. But when she cross-checked the trends with real data, she realized the
    information was outdated by over a year.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 感到自信，她决定向ChatGPT请求最新的美容趋势“市场分析”，以告知她的产品发布策略。它提供了一份听起来专业的报告。但当她将趋势与实际数据进行交叉检查时，她发现信息已经过时超过一年。
- en: 'Sarah’s experience highlights a critical principle: Use ChatGPT as a creative
    and productive assistant, not as an oracle for real-time, factual precision.'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: Sarah的经历突出了一个关键原则：将ChatGPT视为一个创造性和高效的助手，而不是一个提供实时、事实精确的先知。
- en: Golden Rule for Chapter 1
  id: totrans-38
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第一章的金科玉律
- en: 'Treat ChatGPT like the smartest intern you''ve ever met: give it clear, structured
    tasks, double-check anything requiring live or niche data, and marvel at how much
    more you can accomplish together.'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 将ChatGPT视为你遇到过的最聪明的实习生：给它清晰、结构化的任务，对需要实时或特定数据的任何内容进行双重检查，并惊叹于你们一起能完成多少工作。
- en: '➡️ Get ready for Chapter 2: The Anatomy of a Great Prompt'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: ➡️ 准备进入第二章：优秀提示语的解剖结构
- en: 'Chapter 2: The Anatomy of a Great Prompt'
  id: totrans-41
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第二章：优秀提示语的解剖结构
- en: If you want great answers, you have to ask great questions.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想要优秀的答案，你必须提出优秀的问题。
- en: It’s that simple — and that powerful.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 这很简单——而且非常强大。
- en: Prompting is not just typing random commands into a box. It's an art and a skill
    . When you master prompting, you essentially learn how to engineer better conversations
    with your AI assistant — and better conversations mean better results.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 提示语不仅仅是将随机命令输入到框中。它是一门艺术和一项技能。当你掌握提示语时，你实际上学会了如何与你的AI助手进行更好的对话——更好的对话意味着更好的结果。
- en: So what makes a prompt great?
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，什么使一个提示语变得优秀呢？
- en: Let's break it down.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们逐一分析。
- en: '* * *'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: The Four Pillars of a Great Prompt
  id: totrans-48
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 优秀提示语的四大支柱
- en: 'Every powerful prompt shares four key elements:'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 每个强大的提示语都包含四个关键要素：
- en: 1\. Clear Intent
  id: totrans-50
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1. 清晰意图
- en: 'Before you even type a word, ask yourself: What exactly do I want?'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 在你甚至开始打字之前，问问自己：我到底想要什么？
- en: If your intent isn’t clear to you, it won’t be clear to ChatGPT either.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你的意图对你来说不清晰，ChatGPT也无法理解。
- en: Be specific. Are you trying to generate ideas? Summarize information? Write
    a script? Draft an apology email?
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 要具体。你是想生成想法吗？总结信息？写一个剧本？草拟一封道歉邮件？
- en: 'Example:'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：
- en: '❌ Vague: "Tell me about marketing."'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: ❌ 含糊不清： “告诉我关于市场营销的事情。”
- en: '✅ Clear: "Write a beginner-friendly blog post explaining the basics of social
    media marketing for small businesses."'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: ✅ 清晰： “写一篇适合初学者的博客文章，解释小企业社交媒体营销的基础。”
- en: '* * *'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 2\. Proper Context
  id: totrans-58
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2. 正确的环境
- en: Context is what fuels relevance. Without it, you get generic, surface-level
    results.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 环境是激发相关性的燃料。没有它，你只能得到泛泛而谈、表面化的结果。
- en: Tell ChatGPT who it is, what it needs to know, and what role it should play.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 告诉ChatGPT它是谁，它需要知道什么，以及它应该扮演什么角色。
- en: 'Example:'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：
- en: '"You are a branding expert with 10 years of experience helping e-commerce businesses
    create memorable names and taglines."'
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: “你是拥有10年经验的品牌专家，帮助电子商务企业创造难忘的名称和标语。”
- en: The more relevant information you give, the more tailored your output will be.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 你提供的相关信息越多，你的输出结果就会越定制化。
- en: '* * *'
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 3\. Specific Instructions
  id: totrans-65
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3. 具体的指令
- en: Details are where the magic happens.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 细节是魔法发生的地方。
- en: Define the tone, style, structure, format, and any other preferences you have.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 定义你想要的语气、风格、结构、格式和其他偏好。
- en: 'Example:'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：
- en: '"Write the article in a friendly, conversational tone, around 800 words, with
    three main sections and a motivational call-to-action at the end."'
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: “用友好、对话的语气写文章，大约800字，包含三个主要部分，并在结尾处有一个激励性的号召性用语。”
- en: If you don’t give specifics, ChatGPT will guess — and sometimes guess wrong.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你没有提供具体信息，ChatGPT会猜测——有时甚至猜错。
- en: '* * *'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 4\. Desired Outcome
  id: totrans-72
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4. 预期结果
- en: Finally, tell it what success looks like.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，告诉它成功是什么样的。
- en: Should the answer be a list? A paragraph? A step-by-step guide?
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 答案应该是列表？段落？还是一步步的指南？
- en: If you know what you want, make that crystal clear.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你知道自己想要什么，那就让它清晰明了。
- en: 'Example:'
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：
- en: '"Present the ideas in bullet points, with a two-sentence explanation under
    each."'
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: “用项目符号列出想法，每个想法下有两句话的解释。”
- en: '* * *'
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Simple Formula for Writing Great Prompts
  id: totrans-79
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 写出优秀提示的简单公式
- en: 'If you’re ever unsure how to structure a prompt, use this foolproof template:'
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你不确定如何构建提示，使用这个万无一失的模板：
- en: You are [role/persona]. Based on [context], write [type of output] in [tone/style],
    including [specifics].
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 你是[角色/人物]。根据[环境]，用[输出类型]在[语气/风格]中写，包括[具体细节]。
- en: It sounds basic — but it works every time.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 这听起来很简单——但每次都有效。
- en: 'Example Prompt:'
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 示例提示：
- en: '"You are a professional LinkedIn copywriter. Based on the following summary
    of my services, write a LinkedIn post in a confident but approachable tone, using
    a short hook, a value-driven body paragraph, and a call-to-action for a free consultation."'
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: “你是专业领英文案撰写者。根据以下我的服务摘要，用自信但易于接近的语气，使用简短的钩子，价值驱动的正文段落，以及免费咨询的号召性用语，写一篇领英帖子。”
- en: '* * *'
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Before-and-After: Bad vs. Good Prompts'
  id: totrans-86
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 前后对比：不好的提示与好的提示
- en: 'Let’s look at a quick makeover:'
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看一个快速的改变：
- en: 'Bad Prompt:'
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 不好的提示：
- en: '"Write about starting a business."'
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: “写一篇关于创业的文章。”
- en: 'Result:'
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 结果：
- en: A generic, boring essay that could apply to anyone, anywhere.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 一篇通用的、无聊的论文，可能适用于任何人、任何地方。
- en: 'Good Prompt:'
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 优秀的提示：
- en: '"You are a startup mentor. Write a 500-word blog post for first-time entrepreneurs
    about the 5 most important legal steps to set up a new business in the U.S., using
    an encouraging tone and breaking down each step clearly."'
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: “你是创业导师。为第一次创业的创业者写一篇500字的博客文章，关于在美国开设新企业最重要的5个法律步骤，使用鼓励的语气，并清晰地分解每个步骤。”
- en: 'Result:'
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 结果：
- en: Specific advice, a clear structure, engaging tone — exactly what the user needs.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 具体的建议，清晰的结构，吸引人的语气——这正是用户所需要的。
- en: '* * *'
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Why This Matters
  id: totrans-97
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 这为什么重要
- en: A lazy prompt wastes time.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 一个懒惰的提示会浪费时间。
- en: A smart prompt saves time, multiplies creativity, and gets you professional-level
    results on the first try.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 一个聪明的提示可以节省时间，增加创造力，并让你在第一次尝试就能得到专业级别的结果。
- en: When you start treating ChatGPT like an elite team member who needs clear briefs
    to do their best work, the quality of your outputs skyrockets.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 当你开始把ChatGPT当作一个需要清晰简报才能发挥最佳作用的精英团队成员时，你的输出质量就会大幅提升。
- en: '* * *'
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Quick Pro Tip: The "Friend Test"'
  id: totrans-102
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 快速技巧： “朋友测试”
- en: 'Before hitting enter, ask yourself:'
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 在按回车键之前，问问自己：
- en: '"If I gave this prompt to a smart friend who knows nothing about my project,
    would they know exactly what I want?"'
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: “如果我把这个提示给一个聪明但对我的项目一无所知的朋友，他们会知道我想要什么吗？”
- en: If the answer is no — clarify, tighten, specify.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 如果答案是“否”——澄清、紧缩、具体化。
- en: '* * *'
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Next Up: Now that you know how to craft a great prompt, it’s time to see some
    powerful templates you can swipe and use right away!'
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来：现在你已经知道如何制作一个出色的提示，是时候看看一些你可以直接使用的高效模板了！
- en: '➡️ Get ready for Chapter 3: 10 Prompt Templates You Can Steal!'
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: ➡️ 准备好第三章：你可以偷取的10个提示模板！
- en: 'Chapter 3: 10 Prompt Templates You Can Steal'
  id: totrans-109
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第三章：你可以偷取的10个提示模板
- en: Now that you know how to craft a strong prompt, what if you could skip the heavy
    lifting entirely?
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 现在你已经知道如何制作一个强大的提示，那么如果你可以完全跳过繁重的工作呢？
- en: That’s what templates are for.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是模板的作用。
- en: Templates are like training wheels — they get you moving faster, smoother, and
    more confidently.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 模板就像训练轮——它们让你更快、更平稳、更有信心地前进。
- en: You can use these exact phrasing structures and just swap in your topic, tone,
    and details .
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以使用这些确切的措辞结构，只需将你的主题、语气和细节替换进去。
- en: 'Let’s dive into 10 plug-and-play templates you can start using today:'
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们深入了解10个即插即用的模板，你可以从今天开始使用：
- en: '* * *'
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 1\. Explain Like I’m Five
  id: totrans-116
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 1. 像对我五岁的孩子解释
- en: Use when you want a complicated idea broken down into plain language.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 使用时，你想将复杂的思想分解成简单的语言。
- en: 'Template:'
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 模板：
- en: '"Explain [topic] like I’m five years old."'
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: '"像对我五岁的孩子解释[主题]。"'
- en: 'Example:'
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：
- en: '"Explain blockchain technology like I’m five years old."'
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: '"像对我五岁的孩子解释区块链技术。"'
- en: 'Why it Works:'
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么它有效：
- en: Forces ChatGPT to simplify without dumbing things down — perfect for teaching,
    learning, or refreshing basic understanding.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 迫使ChatGPT简化而不降低内容质量——非常适合教学、学习或刷新基本理解。
- en: '* * *'
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 2\. Summarize and Highlight
  id: totrans-125
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 2. 概括和突出
- en: Perfect for condensing dense information into key takeaways.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 适用于将密集信息压缩成关键要点。
- en: 'Template:'
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 模板：
- en: '"Summarize [article/text/topic] and list the three most important takeaways."'
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: '"概括[文章/文本/主题]并列出三个最重要的要点。"'
- en: 'Example:'
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：
- en: '"Summarize this blog post about email marketing and give me the top three tips."'
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: '"概括这篇关于电子邮件营销的博客文章，并给我前三条建议。"'
- en: 'Why it Works:'
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么它有效：
- en: Saves time by immediately surfacing the most important points.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 通过立即呈现最重要的要点来节省时间。
- en: '* * *'
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 3\. Rewrite for [Purpose]
  id: totrans-134
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 3. 为[目的]重写
- en: When you have something rough and want it polished for a new situation.
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 当你有一件粗糙的东西，想要为新的情况润色时。
- en: 'Template:'
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 模板：
- en: '"Rewrite this [email/post/script] to sound more [professional, casual, persuasive,
    funny, etc.]."'
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: '"将这篇[电子邮件/帖子/脚本]重写得更[专业/随意/有说服力/幽默]一些。"'
- en: 'Example:'
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：
- en: '"Rewrite this job application email to sound more confident but respectful."'
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: '"将这篇求职信重写得更自信但尊重。"'
- en: 'Why it Works:'
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么它有效：
- en: You keep the core message but drastically improve how it’s delivered.
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 你保留了核心信息，但极大地改进了它的传达方式。
- en: '* * *'
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 4\. Brainstorm Variations
  id: totrans-143
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 4. 思考变体
- en: When you need lots of ideas quickly.
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 当你需要快速获取大量想法时。
- en: 'Template:'
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 模板：
- en: '"Brainstorm 10 [ideas/headlines/captions] for [topic], using a [funny/serious/playful/urgent]
    tone."'
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: '"为[主题] brainstorm 10 [想法/标题/标题]，使用[幽默/严肃/轻松/紧急]的语气。"'
- en: 'Example:'
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：
- en: '"Brainstorm 10 Instagram captions for a pizza restaurant, using a fun, cheeky
    tone."'
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: '"为一家披萨餐厅 brainstorm 10 个有趣的Instagram标题。"'
- en: 'Why it Works:'
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么它有效：
- en: Gives you a buffet of options — perfect for creative projects.
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 提供了一系列选项——非常适合创意项目。
- en: '* * *'
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 5\. Step-by-Step Guide
  id: totrans-152
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 5. 逐步指南
- en: Use when you need a clear process.
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 使用时需要清晰的流程。
- en: 'Template:'
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 模板：
- en: '"Create a step-by-step guide for [goal/task]."'
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: '"为[目标/任务]创建一个逐步指南。"'
- en: 'Example:'
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：
- en: '"Create a step-by-step guide for launching a podcast from scratch."'
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: '"为从头开始创建播客创建一个逐步指南。"'
- en: 'Why it Works:'
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么它有效：
- en: Structured, easy-to-follow instructions without having to map it all yourself.
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 结构化、易于遵循的指令，无需自己绘制整个流程图。
- en: '* * *'
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 6\. Role Play Expert
  id: totrans-161
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 6. 角色扮演专家
- en: When you want advice from a specific type of expert.
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 当你想要从特定类型的专家那里获得建议时。
- en: 'Template:'
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 模板：
- en: '"Pretend you are a [lawyer, marketer, nutritionist, career coach, etc.]. Give
    me advice about [situation]."'
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: '"假装你是一名[律师、营销人员、营养师、职业规划师等]。给我关于[情况]的建议。"'
- en: 'Example:'
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：
- en: '"Pretend you are a career coach. What advice would you give to someone switching
    careers at 40?"'
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: '"假装你是一名职业规划师。对于一个40岁转行的人，你会给他什么建议？"'
- en: 'Why it Works:'
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么它有效：
- en: Instant expertise — tailored to your situation.
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 立即获得专业知识——针对你的情况量身定制。
- en: '* * *'
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 7\. Creative Storytelling
  id: totrans-170
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 7. 创意故事讲述
- en: Need a short story for fun, marketing, or inspiration? Start here.
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 需要一篇有趣的、用于营销或灵感的短故事？从这里开始。
- en: 'Template:'
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 模板：
- en: '"Write a short story about [character/situation] in the style of [author/genre]."'
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: '"以[作者/类型]的风格写一个关于[人物/情况]的短篇故事。"'
- en: 'Example:'
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：
- en: '"Write a short detective story featuring a talking dog, in the style of Sherlock
    Holmes mysteries."'
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: '"写一个以会说话的狗为主角的侦探故事，模仿福尔摩斯探案集的风格。"'
- en: 'Why it Works:'
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么它有效：
- en: Fun, unique content on demand — great for writers, marketers, and creatives.
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 需求即时的有趣、独特内容——非常适合作家、营销人员和创意人士。
- en: '* * *'
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 8\. Compare and Contrast
  id: totrans-179
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 8. 对比与对比
- en: When you’re stuck deciding between two options.
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 当你在两个选项之间犹豫不决时。
- en: 'Template:'
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: 模板：
- en: '"Compare [Option A] vs [Option B] in a pros/cons list."'
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: '"在优劣列表中比较[选项A]与[选项B]。"'
- en: 'Example:'
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：
- en: '"Compare working remotely vs working in an office."'
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: '"比较远程工作与在办公室工作。"'
- en: 'Why it Works:'
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么它有效：
- en: Instant decision clarity, showing you both sides objectively.
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: 立即获得决策清晰度，客观地展示双方。
- en: '* * *'
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 9\. List of Questions
  id: totrans-188
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 9. 问题列表
- en: Need better questions to ask others — or yourself?
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: 需要更好的问题来问别人——或者自己？
- en: 'Template:'
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: 模板：
- en: '"List 10 smart questions to ask about [topic/problem/situation]."'
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: '"列出10个关于[主题/问题/情况]的智能问题。"'
- en: 'Example:'
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：
- en: '"List 10 smart questions to ask during a job interview."'
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: '"列出10个在面试期间要问的智能问题。"'
- en: 'Why it Works:'
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么它有效：
- en: Turns ChatGPT into your brainstorming partner for deeper conversations.
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: 将ChatGPT变成你深入对话的头脑风暴伙伴。
- en: '* * *'
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 10\. Improve My Work
  id: totrans-197
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 10. 改进我的工作
- en: Use when you want feedback and revision ideas.
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: 使用它来获取反馈和修订建议。
- en: 'Template:'
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: 模板：
- en: '"Here is my [text/design/plan]. Give me feedback on how to improve it."'
  id: totrans-200
  prefs: []
  type: TYPE_NORMAL
  zh: '"这是我的[文本/设计/计划]。请给我一些改进它的反馈。"'
- en: 'Example:'
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：
- en: '"Here is my product description. Give me feedback to make it more persuasive."'
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
  zh: '"这是我的产品描述。请给我一些使其更有说服力的反馈。"'
- en: 'Why it Works:'
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么它有效：
- en: Real-time coaching — your work gets stronger with every iteration.
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
  zh: 实时辅导——你的工作随着每一次迭代变得更强大。
- en: '* * *'
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Why Templates Matter
  id: totrans-206
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 为什么模板很重要
- en: Templates are your shortcut to brilliance.
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
  zh: 模板是你的捷径到卓越。
- en: They save you from sitting in front of a blinking cursor, wondering how to ask.
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
  zh: 它能帮你避免坐在闪烁的光标前，不知道如何提问。
- en: They turn every session with ChatGPT into a focused, powerful collaboration.
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
  zh: 它将每次与ChatGPT的会话转变为专注而强大的合作。
- en: (And as you get better, you’ll start customizing and combining templates like
    a true prompt master.)
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: （随着你越来越熟练，你将开始像真正的提示大师一样定制和组合模板。）
- en: '* * *'
  id: totrans-211
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Next Up:'
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来：
- en: Now that you have templates in your toolkit, it’s time to level up with some
    advanced prompting techniques — tricks and strategies that even most AI "power
    users" don’t know.
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
  zh: 现在你已经拥有了模板，是时候通过一些高级提示技巧来提升自己——这些技巧甚至大多数AI“高级用户”都不知道。
- en: '➡️ Let''s roll into Chapter 4: Advanced Prompting Techniques!'
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
  zh: ➡️ 让我们进入第4章：高级提示技巧！
- en: 'Chapter 4: Advanced Prompting Techniques'
  id: totrans-215
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第4章：高级提示技巧
- en: If you’ve made it this far, you already know the basics of good prompting.
  id: totrans-216
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你已经走到这一步，你已经知道了良好提示的基础知识。
- en: Now it’s time to unlock the secret weapons — the advanced techniques that separate
    casual users from true prompt artists.
  id: totrans-217
  prefs: []
  type: TYPE_NORMAL
  zh: 现在是时候解锁秘密武器——那些将普通用户与真正的提示艺术家区分开的高级技巧了。
- en: These strategies will help you think like a conversation designer, not just
    a user.
  id: totrans-218
  prefs: []
  type: TYPE_NORMAL
  zh: 这些策略将帮助你像对话设计师一样思考，而不仅仅是用户。
- en: And once you start layering them into your prompts, you’ll notice the difference
    immediately.
  id: totrans-219
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦你开始在提示中分层使用它们，你将立即注意到差异。
- en: '* * *'
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 1\. Chain of Thought Prompting
  id: totrans-221
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 1. 思维链提示
- en: 'One of the simplest but most powerful tricks:'
  id: totrans-222
  prefs: []
  type: TYPE_NORMAL
  zh: 最简单但最强大的技巧之一：
- en: Ask ChatGPT to think step-by-step before giving an answer.
  id: totrans-223
  prefs: []
  type: TYPE_NORMAL
  zh: 在给出答案之前，让ChatGPT逐步思考。
- en: Instead of jumping straight to a conclusion, it walks through its reasoning
    — just like you would when solving a tricky problem.
  id: totrans-224
  prefs: []
  type: TYPE_NORMAL
  zh: 它不会直接得出结论，而是通过推理过程——就像你解决一个棘手问题一样。
- en: 'Template:'
  id: totrans-225
  prefs: []
  type: TYPE_NORMAL
  zh: 模板：
- en: '"Think through this step-by-step: [problem/question]."'
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
  zh: '"逐步思考这个：[问题/疑问]。"'
- en: 'Example:'
  id: totrans-227
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：
- en: '"Think through the best marketing strategy for a new coffee shop step-by-step."'
  id: totrans-228
  prefs: []
  type: TYPE_NORMAL
  zh: '"逐步思考一家新咖啡店的最佳营销策略。"'
- en: 'Why It Works:'
  id: totrans-229
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么它有效：
- en: ●       Produces deeper, more logical answers
  id: totrans-230
  prefs: []
  type: TYPE_NORMAL
  zh: ● 产生更深入、更有逻辑性的答案
- en: ●       Reduces errors and shallow thinking
  id: totrans-231
  prefs: []
  type: TYPE_NORMAL
  zh: ● 减少错误和浅层思考
- en: ●       Helps you follow the AI’s reasoning (and spot any mistakes)
  id: totrans-232
  prefs: []
  type: TYPE_NORMAL
  zh: ● 帮助你跟随AI的推理（并发现任何错误）
- en: '* * *'
  id: totrans-233
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 2\. Few-shot Prompting
  id: totrans-234
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 2. 少样本提示
- en: Rather than just describing what you want, show examples .
  id: totrans-235
  prefs: []
  type: TYPE_NORMAL
  zh: 而不是仅仅描述你想要的东西，展示例子。
- en: If you want 5 clever headlines, give 1 or 2 examples first so ChatGPT learns
    your style, then ask for more.
  id: totrans-236
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想要5个巧妙的标题，先给出1或2个例子，这样ChatGPT就能学习你的风格，然后要求更多。
- en: 'Template:'
  id: totrans-237
  prefs: []
  type: TYPE_NORMAL
  zh: 模板：
- en: '"Here are two examples of great [outputs]. Write five more in the same style."'
  id: totrans-238
  prefs: []
  type: TYPE_NORMAL
  zh: '"这里有两个优秀的[输出]例子。用同样的风格再写五个。"'
- en: 'Example:'
  id: totrans-239
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：
- en: '"Here are two funny product slogans:'
  id: totrans-240
  prefs: []
  type: TYPE_NORMAL
  zh: '"这里有两条有趣的产品标语：'
- en: '''Spill the Beans: The Mug That Can''t Keep a Secret'''
  id: totrans-241
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '''Spill the Beans: The Mug That Can''t Keep a Secret'''
- en: '''Socks That Whisper Sweet Nothings to Your Feet'''
  id: totrans-242
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '''Socks That Whisper Sweet Nothings to Your Feet'''
- en: Write five more funny slogans for everyday objects."
  id: totrans-243
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 为日常物品写五个更有趣的标语。"
- en: 'Why It Works:'
  id: totrans-244
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么它有效：
- en: ●       Provides clear style and tone guidance
  id: totrans-245
  prefs: []
  type: TYPE_NORMAL
  zh: ●     提供清晰的风格和语气指导
- en: ●       Improves consistency and creativity
  id: totrans-246
  prefs: []
  type: TYPE_NORMAL
  zh: ●     提高一致性和创造力
- en: ●       Feels like you're "training" the AI on the fly
  id: totrans-247
  prefs: []
  type: TYPE_NORMAL
  zh: ●     感觉像是在现场“培训”AI
- en: '* * *'
  id: totrans-248
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 3\. Persona Prompting
  id: totrans-249
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 3. 角色提示
- en: Assign a role or identity to ChatGPT to shape its responses.
  id: totrans-250
  prefs: []
  type: TYPE_NORMAL
  zh: 将角色或身份分配给ChatGPT以塑造其回答。
- en: This taps into its ability to simulate expertise, character, and style.
  id: totrans-251
  prefs: []
  type: TYPE_NORMAL
  zh: 这利用了它模拟专业知识、角色和风格的能力。
- en: 'You''re telling it: "Think and act like this kind of person."'
  id: totrans-252
  prefs: []
  type: TYPE_NORMAL
  zh: 你在讲述： “像这样的人思考和行动。”
- en: 'Template:'
  id: totrans-253
  prefs: []
  type: TYPE_NORMAL
  zh: 模板：
- en: '"You are a [role/persona]. Answer as if you were [them]."'
  id: totrans-254
  prefs: []
  type: TYPE_NORMAL
  zh: “你是一位[角色/身份]。像他们一样回答。”
- en: 'Example:'
  id: totrans-255
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：
- en: '"You are a Michelin-star chef. Create a 5-course meal plan for a romantic dinner
    at home."'
  id: totrans-256
  prefs: []
  type: TYPE_NORMAL
  zh: “你是一位米其林星级厨师。为家庭浪漫晚餐创建一个5道菜的菜单计划。”
- en: 'Why It Works:'
  id: totrans-257
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么这样做有效：
- en: ●       Adds flavor, expertise, and authenticity
  id: totrans-258
  prefs: []
  type: TYPE_NORMAL
  zh: ●     增加风味、专业性和真实性
- en: ●       Creates richer, more convincing outputs
  id: totrans-259
  prefs: []
  type: TYPE_NORMAL
  zh: ●     创建更丰富、更有说服力的输出
- en: ●       Unlocks "voices" beyond the standard ChatGPT tone
  id: totrans-260
  prefs: []
  type: TYPE_NORMAL
  zh: ●     解锁超出标准ChatGPT语调的“声音”
- en: '* * *'
  id: totrans-261
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 4\. Context Building
  id: totrans-262
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 4. 构建背景
- en: Sometimes one prompt isn’t enough.
  id: totrans-263
  prefs: []
  type: TYPE_NORMAL
  zh: 有时候一个提示还不够。
- en: Feed background information before you ask for the real output.
  id: totrans-264
  prefs: []
  type: TYPE_NORMAL
  zh: 在你请求实际输出之前提供背景信息。
- en: 'Treat it like you’re briefing a human coworker: give them a short "training"
    before asking them to perform.'
  id: totrans-265
  prefs: []
  type: TYPE_NORMAL
  zh: 就像你在向人类同事简要介绍一样：在他们执行任务之前给他们简短的“培训”。
- en: 'How To Do It:'
  id: totrans-266
  prefs: []
  type: TYPE_NORMAL
  zh: 如何做：
- en: 'Step 1: Provide important details.'
  id: totrans-267
  prefs: []
  type: TYPE_NORMAL
  zh: 第1步：提供重要细节。
- en: 'Step 2: THEN ask your actual question.'
  id: totrans-268
  prefs: []
  type: TYPE_NORMAL
  zh: 第2步：然后提出你的实际问题。
- en: 'Example:'
  id: totrans-269
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：
- en: '(First message) "Here is the background about my business: It''s a boutique
    dog grooming service focused on elderly dogs needing extra care. We operate in
    Austin, Texas, and pride ourselves on a spa-like experience."\n\n(Second message)
    "Now, write a homepage headline and tagline based on this information."'
  id: totrans-270
  prefs: []
  type: TYPE_NORMAL
  zh: （第一信息）"这是关于我的业务的背景：它是一家专注于需要额外关照的老年狗的精品宠物美容服务。我们在德克萨斯州的奥斯汀运营，并自豪于提供类似水疗的体验。"
    \n\n（第二信息）"现在，根据这些信息写一个主页标题和标语。”
- en: 'Why It Works:'
  id: totrans-271
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么这样做有效：
- en: ●       Ensures highly customized answers
  id: totrans-272
  prefs: []
  type: TYPE_NORMAL
  zh: ●     确保高度定制的答案
- en: ●       Avoids shallow or generic outputs
  id: totrans-273
  prefs: []
  type: TYPE_NORMAL
  zh: ●     避免肤浅或通用的输出
- en: ●       Makes ChatGPT feel "briefed" and prepared
  id: totrans-274
  prefs: []
  type: TYPE_NORMAL
  zh: ●     让ChatGPT感觉“受训”并准备好
- en: '* * *'
  id: totrans-275
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Quick Story: How Jake Landed a Job Using These Techniques'
  id: totrans-276
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 快速故事：杰克如何使用这些技巧找到工作
- en: Jake, a job seeker struggling to stand out, was frustrated by generic cover
    letters.
  id: totrans-277
  prefs: []
  type: TYPE_NORMAL
  zh: 杰克，一个努力想脱颖而出的求职者，对通用的求职信感到沮丧。
- en: 'One night, he decided to get serious: he combined Persona Prompting and Few-shot
    Prompting .'
  id: totrans-278
  prefs: []
  type: TYPE_NORMAL
  zh: 一天晚上，他决定认真对待：他将角色提示和少样本提示结合在一起。
- en: 'He told ChatGPT:'
  id: totrans-279
  prefs: []
  type: TYPE_NORMAL
  zh: 他告诉ChatGPT：
- en: '"You are a Fortune 500 hiring manager. Based on these two examples of great
    cover letters, write one for a sales associate position emphasizing storytelling
    and resilience."'
  id: totrans-280
  prefs: []
  type: TYPE_NORMAL
  zh: “你是一位财富500强的招聘经理。根据这两份优秀的求职信示例，为销售助理职位写一封强调故事讲述和韧性的求职信。”
- en: Within an hour, Jake had a unique, heartfelt letter — not the same robotic cover
    letter everyone else was sending.
  id: totrans-281
  prefs: []
  type: TYPE_NORMAL
  zh: 在一个小时内，杰克就得到了一封独特、充满感情的信——不同于其他人发送的机器人式的求职信。
- en: Result?
  id: totrans-282
  prefs: []
  type: TYPE_NORMAL
  zh: 结果？
- en: He got the interview.
  id: totrans-283
  prefs: []
  type: TYPE_NORMAL
  zh: 他得到了面试机会。
- en: He got the job.
  id: totrans-284
  prefs: []
  type: TYPE_NORMAL
  zh: 他得到了这份工作。
- en: 'Lesson:'
  id: totrans-285
  prefs: []
  type: TYPE_NORMAL
  zh: 课程：
- en: When you combine advanced prompting techniques, you stop sounding like everyone
    else — and start getting real-world results.
  id: totrans-286
  prefs: []
  type: TYPE_NORMAL
  zh: 当你结合高级提示技巧时，你不再像其他人一样——而是开始获得真实世界的成果。
- en: '* * *'
  id: totrans-287
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Recap: Your Advanced Prompting Toolbox'
  id: totrans-288
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 概述：你的高级提示工具箱
- en: '✅ Chain of Thought Prompting: Ask it to reason step-by-step.'
  id: totrans-289
  prefs: []
  type: TYPE_NORMAL
  zh: ✅ 思维链提示：要求它逐步推理。
- en: '✅ Few-shot Prompting: Give a few examples, then ask for more.'
  id: totrans-290
  prefs: []
  type: TYPE_NORMAL
  zh: ✅ 少样本提示：给出几个例子，然后请求更多。
- en: '✅ Persona Prompting: Assign a role or expert identity.'
  id: totrans-291
  prefs: []
  type: TYPE_NORMAL
  zh: ✅ 角色提示：分配一个角色或专家身份。
- en: '✅ Context Building: Brief it before asking for output.'
  id: totrans-292
  prefs: []
  type: TYPE_NORMAL
  zh: ✅ 构建背景：在请求输出之前简要说明。
- en: Each of these on its own is powerful. Together? Unstoppable.
  id: totrans-293
  prefs: []
  type: TYPE_NORMAL
  zh: 这些单独来看都很强大。一起呢？势不可挡。
- en: '* * *'
  id: totrans-294
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Next Up:'
  id: totrans-295
  prefs: []
  type: TYPE_NORMAL
  zh: 下一步：
- en: You’ve learned the techniques — now let’s make sure you avoid the biggest mistakes
    that can still trip you up, even as an advanced pro.
  id: totrans-296
  prefs: []
  type: TYPE_NORMAL
  zh: 你已经学到了技巧——现在让我们确保你避免最大的错误，即使作为高级专业人士也是如此。
- en: '➡️ Onward to Chapter 5: Common Prompting Mistakes (And How to Fix Them)!'
  id: totrans-297
  prefs: []
  type: TYPE_NORMAL
  zh: ➡️ 继续到第5章：常见的提示错误（以及如何修复它们）！
- en: '* * *'
  id: totrans-298
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Would you like me to keep rolling into Chapter 5 now? (where we'll cover the
    biggest face-palm mistakes and how to dodge them!) 🚀
  id: totrans-299
  prefs: []
  type: TYPE_NORMAL
  zh: 你想我现在就继续到第5章吗？（我们将涵盖最大的尴尬错误以及如何避免它们！）🚀
- en: Or do you want a quick visual idea now for this chapter before we keep writing?
    🎨📚
  id: totrans-300
  prefs: []
  type: TYPE_NORMAL
  zh: 或者在我们继续写作之前，你想要对这个章节有一个快速的可视化想法吗？🎨📚
- en: 'Chapter 5: Common Prompting Mistakes (And How to Fix Them)'
  id: totrans-301
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第5章：常见的提示错误（以及如何解决它们）
- en: Even the best intentioned prompt masters sometimes trip up.
  id: totrans-302
  prefs: []
  type: TYPE_NORMAL
  zh: 即使是最有意图的提示大师有时也会出错。
- en: But don’t worry — the most common mistakes are easy to fix once you know what
    to watch out for.
  id: totrans-303
  prefs: []
  type: TYPE_NORMAL
  zh: 但别担心——一旦你知道要留意什么，最常见的错误就很容易纠正。
- en: 'Think of this chapter as your “prompting red flags” checklist:'
  id: totrans-304
  prefs: []
  type: TYPE_NORMAL
  zh: 将本章视为你的“提示红旗”清单：
- en: If you notice any of these creeping into your process, you’ll know exactly how
    to course-correct and get better results.
  id: totrans-305
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你注意到这些错误悄悄进入你的流程，你就会知道如何纠正方向并获得更好的结果。
- en: '* * *'
  id: totrans-306
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 1\. Being Too Vague
  id: totrans-307
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 1. 过于模糊
- en: 'The Mistake:'
  id: totrans-308
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 错误：
- en: You assume ChatGPT can "read your mind."
  id: totrans-309
  prefs: []
  type: TYPE_NORMAL
  zh: 你认为ChatGPT能“读懂你的心思”。
- en: You type a few words and expect it to magically deliver exactly what you want.
  id: totrans-310
  prefs: []
  type: TYPE_NORMAL
  zh: 你输入几个词，并期望它能神奇地提供你想要的确切内容。
- en: 'Example:'
  id: totrans-311
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：
- en: '"Tell me about marketing."'
  id: totrans-312
  prefs: []
  type: TYPE_NORMAL
  zh: '"告诉我关于营销的事情。"'
- en: 'Result:'
  id: totrans-313
  prefs: []
  type: TYPE_NORMAL
  zh: 结果：
- en: A generic, broad response that could have been pulled from any intro-level textbook.
  id: totrans-314
  prefs: []
  type: TYPE_NORMAL
  zh: 一个通用的、广泛的回答，可能来自任何入门级教科书。
- en: '* * *'
  id: totrans-315
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'The Fix:'
  id: totrans-316
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 解决方案：
- en: Add clarity, scope, and purpose to your prompt.
  id: totrans-317
  prefs: []
  type: TYPE_NORMAL
  zh: 添加清晰度、范围和目的到你的提示中。
- en: 'Better Prompt:'
  id: totrans-318
  prefs: []
  type: TYPE_NORMAL
  zh: 更好的提示：
- en: '"Write a beginner-friendly blog post that explains the 5 key strategies for
    marketing a local restaurant, focusing on social media."'
  id: totrans-319
  prefs: []
  type: TYPE_NORMAL
  zh: '"写一篇面向初学者的博客文章，解释营销本地餐厅的5个关键策略，重点放在社交媒体上。"'
- en: 'Why It Works:'
  id: totrans-320
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么它有效：
- en: It defines the audience, topic, number of ideas, and angle — no guesswork needed.
  id: totrans-321
  prefs: []
  type: TYPE_NORMAL
  zh: 它定义了受众、主题、想法数量和角度——无需猜测。
- en: '* * *'
  id: totrans-322
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 2\. Asking Too Much at Once
  id: totrans-323
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 2. 一次性要求过多
- en: 'The Mistake:'
  id: totrans-324
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 错误：
- en: You try to cram 15 different requests into one giant paragraph.
  id: totrans-325
  prefs: []
  type: TYPE_NORMAL
  zh: 你试图在一个大段落中塞入15个不同的请求。
- en: 'Example:'
  id: totrans-326
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：
- en: '"Summarize this article, create a few social posts based on it, suggest 10
    hashtags, and write a newsletter intro too, and make it all funny but professional
    and short but not too short."'
  id: totrans-327
  prefs: []
  type: TYPE_NORMAL
  zh: '"总结这篇文章，基于它创建几个社交媒体帖子，建议10个标签，并写一篇新闻通讯简介，让它既有趣又专业，又简短但不要太短。"'
- en: 'Result:'
  id: totrans-328
  prefs: []
  type: TYPE_NORMAL
  zh: 结果：
- en: ChatGPT short-circuits and either gives a rushed answer or ignores half your
    instructions.
  id: totrans-329
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT短路，要么给出仓促的回答，要么忽略你的一半指令。
- en: '* * *'
  id: totrans-330
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'The Fix:'
  id: totrans-331
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 解决方案：
- en: Break complex tasks into smaller, logical steps.
  id: totrans-332
  prefs: []
  type: TYPE_NORMAL
  zh: 将复杂任务分解成更小、更逻辑的步骤。
- en: 'Better Approach:'
  id: totrans-333
  prefs: []
  type: TYPE_NORMAL
  zh: 更好的方法：
- en: '●       Step 1: "Summarize the article in 5 bullet points."'
  id: totrans-334
  prefs: []
  type: TYPE_NORMAL
  zh: ●       第1步："用5个要点总结文章。"
- en: '●       Step 2: "Create three social posts based on those bullet points."'
  id: totrans-335
  prefs: []
  type: TYPE_NORMAL
  zh: ●       第2步："基于这些要点创建三个社交媒体帖子。"
- en: '●       Step 3: "Suggest 10 relevant hashtags."'
  id: totrans-336
  prefs: []
  type: TYPE_NORMAL
  zh: ●       第3步："建议10个相关标签。"
- en: '●       Step 4: "Write a newsletter intro using a funny but professional tone."'
  id: totrans-337
  prefs: []
  type: TYPE_NORMAL
  zh: ●       第4步："使用幽默但专业的语气写一篇新闻通讯简介。"
- en: 'Why It Works:'
  id: totrans-338
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么它有效：
- en: You stay in control of the flow, and each step builds on the last.
  id: totrans-339
  prefs: []
  type: TYPE_NORMAL
  zh: 你保持对流程的控制，每一步都建立在上一步的基础上。
- en: '* * *'
  id: totrans-340
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 3\. Forgetting to Specify Tone or Style
  id: totrans-341
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 3. 忘记指定语气或风格
- en: 'The Mistake:'
  id: totrans-342
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 错误：
- en: You forget to mention the voice you want — and the AI defaults to its polite,
    neutral tone.
  id: totrans-343
  prefs: []
  type: TYPE_NORMAL
  zh: 你忘记提到你想要的语气——AI默认使用其礼貌、中性的语气。
- en: 'Example:'
  id: totrans-344
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：
- en: '"Write an ad for my coffee shop."'
  id: totrans-345
  prefs: []
  type: TYPE_NORMAL
  zh: '"为我的咖啡店写一则广告。"'
- en: 'Result:'
  id: totrans-346
  prefs: []
  type: TYPE_NORMAL
  zh: 结果：
- en: You get something that sounds robotic or boring, not aligned with your brand's
    vibe.
  id: totrans-347
  prefs: []
  type: TYPE_NORMAL
  zh: 你得到的东西听起来像机器人或无聊的，与你的品牌风格不符。
- en: '* * *'
  id: totrans-348
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'The Fix:'
  id: totrans-349
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 解决方案：
- en: Always describe the tone, style, or feeling you want.
  id: totrans-350
  prefs: []
  type: TYPE_NORMAL
  zh: 总是描述你想要的语气、风格或感觉。
- en: 'Better Prompt:'
  id: totrans-351
  prefs: []
  type: TYPE_NORMAL
  zh: 更好的提示：
- en: '"Write a playful, cheeky Instagram ad for my coffee shop, targeting young professionals
    who love memes."'
  id: totrans-352
  prefs: []
  type: TYPE_NORMAL
  zh: '"为我的咖啡店写一则俏皮、大胆的Instagram广告，针对喜欢梗的年轻专业人士。"'
- en: 'Why It Works:'
  id: totrans-353
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么它有效：
- en: Tone turns basic words into brand magic.
  id: totrans-354
  prefs: []
  type: TYPE_NORMAL
  zh: 语气将基本词汇转化为品牌魔法。
- en: '* * *'
  id: totrans-355
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 4\. Not Iterating
  id: totrans-356
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 4. 不进行迭代
- en: 'The Mistake:'
  id: totrans-357
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 错误：
- en: You take the very first output ChatGPT gives you and run with it — even if it’s
    not quite right.
  id: totrans-358
  prefs: []
  type: TYPE_NORMAL
  zh: 你直接使用ChatGPT给出的第一个输出，即使它并不完全正确。
- en: 'Result:'
  id: totrans-359
  prefs: []
  type: TYPE_NORMAL
  zh: 结果：
- en: Missed potential for better ideas, better structure, or stronger writing.
  id: totrans-360
  prefs: []
  type: TYPE_NORMAL
  zh: 错过了更好的想法、更好的结构或更强的写作。
- en: '* * *'
  id: totrans-361
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'The Fix:'
  id: totrans-362
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 解决方案：
- en: Treat ChatGPT like a collaborator , not a vending machine.
  id: totrans-363
  prefs: []
  type: TYPE_NORMAL
  zh: 将ChatGPT视为一个合作伙伴，而不是自动售货机。
- en: Ask follow-up questions. Request improvements. Push it further.
  id: totrans-364
  prefs: []
  type: TYPE_NORMAL
  zh: 提出后续问题。请求改进。进一步推动。
- en: 'Examples of Iterating Prompts:'
  id: totrans-365
  prefs: []
  type: TYPE_NORMAL
  zh: 迭代提示的例子：
- en: ●       "That’s a good start — can you make it sound even more persuasive?"
  id: totrans-366
  prefs: []
  type: TYPE_NORMAL
  zh: ●       "这是个不错的开始——你能让它听起来更有说服力吗？"
- en: ●       "Now rewrite it, but make it 30% shorter."
  id: totrans-367
  prefs: []
  type: TYPE_NORMAL
  zh: ●       "现在重写它，但要缩短30%。"
- en: ●       "List three alternative versions focusing more on emotional appeal."
  id: totrans-368
  prefs: []
  type: TYPE_NORMAL
  zh: ●       "列出三个更注重情感诉求的替代版本。"
- en: 'Why It Works:'
  id: totrans-369
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么它有效：
- en: Iterating unlocks higher-quality, more customized final products.
  id: totrans-370
  prefs: []
  type: TYPE_NORMAL
  zh: 迭代可以解锁更高质量、更定制化的最终产品。
- en: '* * *'
  id: totrans-371
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Quick Recap: Mistakes to Avoid'
  id: totrans-372
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 快速回顾：要避免的错误
- en: 🚫 Vague prompts → ✅ Add clarity and purpose
  id: totrans-373
  prefs: []
  type: TYPE_NORMAL
  zh: 🚫 含糊的提示 → ✅ 添加清晰性和目的
- en: 🚫 Overloading in one request → ✅ Break into steps
  id: totrans-374
  prefs: []
  type: TYPE_NORMAL
  zh: 🚫 一次请求中信息过载 → ✅ 分步骤进行
- en: 🚫 Ignoring tone and style → ✅ Always specify the voice you want
  id: totrans-375
  prefs: []
  type: TYPE_NORMAL
  zh: 🚫 忽略语气和风格 → ✅ 总是明确指定你想要的语气
- en: 🚫 Accepting first draft output → ✅ Iterate and refine
  id: totrans-376
  prefs: []
  type: TYPE_NORMAL
  zh: 🚫 接受初稿输出 → ✅ 迭代和改进
- en: '* * *'
  id: totrans-377
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Mini Challenge:'
  id: totrans-378
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 小挑战：
- en: 'Next time you write a prompt, ask yourself:'
  id: totrans-379
  prefs: []
  type: TYPE_NORMAL
  zh: 下次你编写提示时，问问自己：
- en: ●       Am I being clear enough?
  id: totrans-380
  prefs: []
  type: TYPE_NORMAL
  zh: ●       我是否足够清晰？
- en: ●       Is this one task or five tasks squished together?
  id: totrans-381
  prefs: []
  type: TYPE_NORMAL
  zh: ●       这是一个任务还是五个任务挤在一起？
- en: ●       Did I mention the tone/style?
  id: totrans-382
  prefs: []
  type: TYPE_NORMAL
  zh: ●       我提到过语气/风格了吗？
- en: ●       Am I willing to tweak and improve after the first answer?
  id: totrans-383
  prefs: []
  type: TYPE_NORMAL
  zh: ●       我是否愿意在第一次回答后调整和改进？
- en: If you hit “yes” on all four, you’re officially in Prompt Wizard Mode.
  id: totrans-384
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你在这四个方面都回答“是”，那么你正式进入了提示巫师模式。
- en: '* * *'
  id: totrans-385
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Next Up:'
  id: totrans-386
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来：
- en: You know the mistakes to avoid. You’ve got the skills.
  id: totrans-387
  prefs: []
  type: TYPE_NORMAL
  zh: 你知道要避免的错误。你已经拥有了技能。
- en: Now let's supercharge you even more with a Prompting Cheatsheet you can reference
    anytime.
  id: totrans-388
  prefs: []
  type: TYPE_NORMAL
  zh: 现在让我们再给你加一把劲，用一张你可以随时参考的提示清单。
- en: '➡️ Onto Chapter 6: The Ultimate Prompting Cheatsheet!'
  id: totrans-389
  prefs: []
  type: TYPE_NORMAL
  zh: ➡️ 进入第6章：终极提示清单！
- en: 'Chapter 6: Prompting Cheatsheet'
  id: totrans-390
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第6章：提示清单
- en: 'Sometimes you don’t need a full lesson — you just need a quick reminder:'
  id: totrans-391
  prefs: []
  type: TYPE_NORMAL
  zh: 有时候你不需要完整的课程——你只需要一个快速的提醒：
- en: “What’s the best way to ask for this?”
  id: totrans-392
  prefs: []
  type: TYPE_NORMAL
  zh: “最好的提问方式是什么？”
- en: This Prompting Cheatsheet is your grab-and-go guide.
  id: totrans-393
  prefs: []
  type: TYPE_NORMAL
  zh: 这张提示清单是你的即取即用指南。
- en: It’s built to save you time, spark better results, and keep you on track whenever
    you’re working with ChatGPT.
  id: totrans-394
  prefs: []
  type: TYPE_NORMAL
  zh: 它旨在节省你的时间，激发更好的结果，并在你使用ChatGPT工作时保持你的进度。
- en: Feel free to bookmark it, print it out, or stick it on your wall next to your
    desk.
  id: totrans-395
  prefs: []
  type: TYPE_NORMAL
  zh: 随意将其添加到书签、打印出来或贴在你的办公桌旁边。
- en: '* * *'
  id: totrans-396
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Quick Prompts for Common Needs
  id: totrans-397
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 常见需求的快速提示
- en: '| Situation | Quick Prompt |'
  id: totrans-398
  prefs: []
  type: TYPE_TB
  zh: '| 情况 | 快速提示 |'
- en: '| Need ideas? | "Brainstorm 10 creative ideas for [topic]." |'
  id: totrans-399
  prefs: []
  type: TYPE_TB
  zh: '| 需要想法吗？ | "为[主题]头脑风暴10个创意想法。" |'
- en: '| Need structure? | "Outline a [blog post/article/plan] about [topic]." |'
  id: totrans-400
  prefs: []
  type: TYPE_TB
  zh: '| 需要结构吗？ | "为[主题]概述一个[博客文章/计划]。" |'
- en: '| Need tone adjustment? | "Rewrite this to sound more [funny/professional/casual/urgent]."
    |'
  id: totrans-401
  prefs: []
  type: TYPE_TB
  zh: '| 需要调整语气吗？ | "重写这段话，让它听起来更[幽默/专业/随意/紧急]。" |'
- en: '| Need advice? | "Act as a [role/persona] and advise me about [situation]."
    |'
  id: totrans-402
  prefs: []
  type: TYPE_TB
  zh: '| 需要建议吗？ | "扮演一个[角色/人物]并就[情况]给我提建议。" |'
- en: '| Need summarization? | "Summarize this text in under 100 words." |'
  id: totrans-403
  prefs: []
  type: TYPE_TB
  zh: '| 需要总结吗？ | "用不到100个字总结这段文字。" |'
- en: '| Need a checklist? | "Create a checklist for [task/goal]." |'
  id: totrans-404
  prefs: []
  type: TYPE_TB
  zh: '| 需要清单吗？ | "为[任务/目标]创建一个清单。" |'
- en: '| Need inspiration? | "Write a motivational quote about [struggle/goal]." |'
  id: totrans-405
  prefs: []
  type: TYPE_TB
  zh: '| 需要灵感吗？ | "关于[挑战/目标]写一个励志名言。" |'
- en: '| Need questions to ask? | "List 10 smart questions to ask about [topic]."
    |'
  id: totrans-406
  prefs: []
  type: TYPE_TB
  zh: '| 需要提问吗？ | "列出关于[主题]的10个聪明问题。" |'
- en: '| Need comparison? | "Compare [Option A] vs [Option B] with pros and cons."
    |'
  id: totrans-407
  prefs: []
  type: TYPE_TB
  zh: '| 需要比较吗？ | "比较[选项A]与[选项B]的优缺点。" |'
- en: '| Need story ideas? | "Write a short story involving [theme/character/event]."
    |'
  id: totrans-408
  prefs: []
  type: TYPE_TB
  zh: '| 需要故事灵感吗？ | "写一个包含[主题/人物/事件]的短故事。" |'
- en: '* * *'
  id: totrans-409
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Magic Phrases to Supercharge Your Prompts
  id: totrans-410
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 提升提示的魔法短语
- en: 'Adding these short phrases to your prompts can dramatically upgrade the quality
    of the answers you get:'
  id: totrans-411
  prefs: []
  type: TYPE_NORMAL
  zh: 在你的提示中加入这些简短的短语可以显著提高你得到的答案的质量：
- en: ●       “Think step-by-step.” (encourages deeper reasoning)
  id: totrans-412
  prefs: []
  type: TYPE_NORMAL
  zh: ●       “一步步思考。”（鼓励深入推理）
- en: ●       “In the style of [author/brand/persona].” (matches tone or style)
  id: totrans-413
  prefs: []
  type: TYPE_NORMAL
  zh: ●       “以[作者/品牌/人物]的风格。”（匹配语气或风格）
- en: '●       “Make it sound more [emotion: exciting, inspiring, dramatic].” (adjusts
    energy)'
  id: totrans-414
  prefs: []
  type: TYPE_NORMAL
  zh: ●       “让它听起来更[情感：激动人心、鼓舞人心、戏剧性]。”（调整能量）
- en: ●       “Give me multiple variations.” (generates different options)
  id: totrans-415
  prefs: []
  type: TYPE_NORMAL
  zh: ●       “给我多个变体。”（生成不同的选项）
- en: ●       “Explain like I’m five.” (forces simple clarity)
  id: totrans-416
  prefs: []
  type: TYPE_NORMAL
  zh: ●       “像对我五岁孩子解释。”（强制简单清晰）
- en: ●       “Start with a hook.” (especially powerful for posts and marketing)
  id: totrans-417
  prefs: []
  type: TYPE_NORMAL
  zh: ●       “从钩子开始。”（特别是对于文章和营销来说非常强大）
- en: ●       “Highlight common mistakes.” (helps in educational content)
  id: totrans-418
  prefs: []
  type: TYPE_NORMAL
  zh: ●       “突出常见错误。”（有助于教育内容）
- en: ●       “End with a motivational call to action.” (perfect for blogs, emails,
    speeches)
  id: totrans-419
  prefs: []
  type: TYPE_NORMAL
  zh: ●       “以激励性的行动呼吁结束。”（非常适合博客、电子邮件、演讲）
- en: '* * *'
  id: totrans-420
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 5-Second Prompt Checklist Before You Hit Enter
  id: totrans-421
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 在你按下回车键前的5秒提示清单
- en: ✅ Is my goal clear?
  id: totrans-422
  prefs: []
  type: TYPE_NORMAL
  zh: ✅ 我的目的是否清晰？
- en: ✅ Did I give enough background/context?
  id: totrans-423
  prefs: []
  type: TYPE_NORMAL
  zh: ✅ 我是否提供了足够的背景/上下文？
- en: ✅ Did I specify tone, style, or structure?
  id: totrans-424
  prefs: []
  type: TYPE_NORMAL
  zh: ✅ 我是否指定了语气、风格或结构？
- en: ✅ Am I asking for one clear task at a time?
  id: totrans-425
  prefs: []
  type: TYPE_NORMAL
  zh: ✅ 我是否一次只请求一个清晰的任务？
- en: ✅ Am I ready to iterate if needed?
  id: totrans-426
  prefs: []
  type: TYPE_NORMAL
  zh: ✅ 如果我需要的话，我准备好迭代了吗？
- en: If you can say YES to all five...
  id: totrans-427
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你对这五个都能说YES...
- en: 🚀 You're about to get top-tier results.
  id: totrans-428
  prefs: []
  type: TYPE_NORMAL
  zh: 🚀 你即将获得顶级结果。
- en: '* * *'
  id: totrans-429
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
