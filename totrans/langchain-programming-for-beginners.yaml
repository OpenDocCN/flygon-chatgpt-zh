- en: 'if question:'
  id: totrans-1161
  prefs: []
  type: TYPE_NORMAL
  zh: 'if question:'
- en: 'response = rag_chain.invoke({"input": question})'
  id: totrans-1162
  prefs: []
  type: TYPE_NORMAL
  zh: 'response = rag_chain.invoke({"input": question})'
- en: print(response["answer"])
  id: totrans-1163
  prefs: []
  type: TYPE_NORMAL
  zh: print(response["answer"])
- en: When the LLM returns the answer, you print the answer to the command line.
  id: totrans-1164
  prefs: []
  type: TYPE_NORMAL
  zh: 当LLM返回答案时，你将答案打印到命令行。
- en: 'Now the application is completed. You can run it using Python from the command
    line:'
  id: totrans-1165
  prefs: []
  type: TYPE_NORMAL
  zh: 现在应用程序已完成。您可以从命令行使用Python运行它：
- en: python rag_prompt.py
  id: totrans-1166
  prefs: []
  type: TYPE_NORMAL
  zh: python rag_prompt.py
- en: 'And then ask a question relevant to the document context. Here’s an example:'
  id: totrans-1167
  prefs: []
  type: TYPE_NORMAL
  zh: 然后提出与文档上下文相关的问题。以下是一个示例：
