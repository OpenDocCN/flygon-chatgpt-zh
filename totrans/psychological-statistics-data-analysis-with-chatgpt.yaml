- en: Chapter 4
  prefs: []
  type: TYPE_NORMAL
- en: Correlation Analysis
  prefs: []
  type: TYPE_NORMAL
- en: Correlation analysis is a statistical method used to assess the relationship
    and strength of association between two or more variables.
  prefs: []
  type: TYPE_NORMAL
- en: 'Depending on the type of data, different correlation coefficients are used:'
  prefs: []
  type: TYPE_NORMAL
- en: Pearson's Product-Moment Correlation Coefficient
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: ●      Measures the linear relationship between continuous variables.
  prefs: []
  type: TYPE_NORMAL
- en: ● Ranges from -1 (perfect negative correlation) to 1 (perfect positive correlation),
    with 0 indicating no correlation.
  prefs: []
  type: TYPE_NORMAL
- en: '●      Example: The correlation between height and weight.'
  prefs: []
  type: TYPE_NORMAL
- en: Spearman’s Rank Correlation Coefficient
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: ●      Measures monotonic relationships, suitable for ranked data.
  prefs: []
  type: TYPE_NORMAL
- en: ●      Does not assume a normal distribution and is robust against outliers.
  prefs: []
  type: TYPE_NORMAL
- en: '●      Example: The correlation between exam rankings and athletic performance
    rankings.'
  prefs: []
  type: TYPE_NORMAL
- en: Kendall’s Rank Correlation Coefficient
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: ●      Measures agreement between ranked data.
  prefs: []
  type: TYPE_NORMAL
- en: ●      Suitable for small datasets or ranked data.
  prefs: []
  type: TYPE_NORMAL
- en: '●      Example: Ranking consistency in sports team evaluations.'
  prefs: []
  type: TYPE_NORMAL
- en: Polychoric Correlation Coefficient
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: ●      Measures correlation between ordinal scale data assuming an underlying
    continuous variable.
  prefs: []
  type: TYPE_NORMAL
- en: ●      Derived from normally distributed latent variables.
  prefs: []
  type: TYPE_NORMAL
- en: '●      Example: Correlation between satisfaction (1–5 scale) and stress level
    (1–4 scale).'
  prefs: []
  type: TYPE_NORMAL
- en: Polyserial Correlation Coefficient
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: ● Measures correlation when one variable is ordinal and the other is continuous.
  prefs: []
  type: TYPE_NORMAL
- en: ●      Assumes the ordinal variable reflects an underlying continuous variable.
  prefs: []
  type: TYPE_NORMAL
- en: '●      Example: The relationship between exam scores and satisfaction level.'
  prefs: []
  type: TYPE_NORMAL
- en: Tetrachoric Correlation Coefficient
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: ● Measures correlation when both variables are binary, assuming they originate
    from an underlying continuous distribution.
  prefs: []
  type: TYPE_NORMAL
- en: '●      Example: The correlation between Yes/No responses.'
  prefs: []
  type: TYPE_NORMAL
- en: Point-Biserial Correlation Coefficient
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: ●      Used when one variable is binary and the other is continuous.
  prefs: []
  type: TYPE_NORMAL
- en: '●      Example: The correlation between gender (male/female) and body weight.'
  prefs: []
  type: TYPE_NORMAL
- en: The necessary modules for calculating polychoric, polyserial, and tetrachoric
    correlation coefficients are not installed in GPT.
  prefs: []
  type: TYPE_NORMAL
- en: Instead, alternative methods such as Spearman’s rank correlation can be used
    for ordinal data.
  prefs: []
  type: TYPE_NORMAL
- en: While correlation coefficients indicate the direction and strength of relationships,
    they do not establish causation.
  prefs: []
  type: TYPE_NORMAL
- en: When dealing with outliers or non-normally distributed data, it is crucial to
    evaluate the presence of outliers and choose an appropriate correlation metric.
  prefs: []
  type: TYPE_NORMAL
- en: A test for zero correlation can be conducted to determine if the observed correlation
    is statistically significant.
  prefs: []
  type: TYPE_NORMAL
- en: Additionally, examining the confidence intervals of correlation coefficients
    is essential for assessing their practical significance.
  prefs: []
  type: TYPE_NORMAL
