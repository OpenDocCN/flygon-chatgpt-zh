    ****it**ems** ****re**lat**e ****t**o** ****ea**ch** ****ot**her**.'
  id: totrans-770
  prefs: []
  type: TYPE_NORMAL
  zh: '**通过** **构建** **提示** **， **使** **LLM** **明确** **被** **指导** **去** **比较** **或**
    **对比** **两个** **或** **更多** **项目**。 **提示** **通常** **包含** **诸如** **“比较”，“对比”，“这些**
    **相似之处** **和** **不同之处** **是什么”，“这些** **利弊** **是什么”** **之类的** **词汇**。 **这** **指导**
    **模型** **不仅** **通过** **提供** **关于** **每个** **项目的** **信息** **来** **接近** **主题**，
    **而且** **通过** **以** **一种** **强调** **这些** **项目** **如何** **相互** **关联** **的方式** **组织**
    **这些** **信息**。'
- en: '****F**or** ****exa**mpl**e, ****wh**en** ****as**kin**g ****t**he** ****mo**del**
    ****t**o** “****Com**par**e ****so**lar** ****en**erg**y ****a**nd** ****wi**nd**
    ****en**erg**y,” ****t**he** ****L**LM** ****wi**ll** ****res**pon**d ****b**y**
    ****desc**ribin**g ****t**he** ****k**ey** ****fea**ture**s ****o**f** ****bo**th**
    ****fo**rms** ****o**f** ****en**erg**y, ****h**ow** ****th**ey** ****a**re**
    ****pro**duce**d, ****th**eir** ****adva**ntage**s ****a**nd** ****disad**vantag**es,
    ****a**nd** ****m**ay** ****con**clud**e ****b**y** ****high**lighti**ng ****wh**ich**
    ****con**text**s ****a**re** ****be**st** ****su**ite**d ****f**or** ****ea**ch**.
    ****Th**is** ****res**pons**e ****stru**ctur**e ****al**low**s ****t**he** ****re**ade**r
    ****t**o** ****cle**arl**y ****s**ee** ****t**he** ****commo**naliti**es ****a**nd**
    ****dist**inctio**ns, ****ma**kin**g ****i**t** ****ea**sie**r ****t**o** ****unde**rstan**d.'
  id: totrans-771
  prefs: []
  type: TYPE_NORMAL
  zh: '**例如**， **当** **要求** **模型** **“比较** **太阳能** **和** **风能”** **时**， **LLM** **将**
