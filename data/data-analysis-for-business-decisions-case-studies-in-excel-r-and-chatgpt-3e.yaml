  prefs: []
  type: TYPE_NORMAL
  zh: 对于第二个问题，“乘客旅行的最常见原因是什么？”，我们设置了变量 Q2PURP1（在代码中）。设置屏幕显示在[图 7.22](#fig7-22)，结果帕累托分析显示在[图
    7.23](#fig7-23)。
