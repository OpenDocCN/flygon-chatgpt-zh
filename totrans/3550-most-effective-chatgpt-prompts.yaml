- en: Explore the idea of using things like surveys or polls in emails to get subscribers
    involved.
  id: totrans-634
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 探索在电子邮件中使用调查或投票等工具以使订阅者参与的想法。
- en: Discuss how dividing customers into groups and sending them special emails can
    make people more likely to buy.
  id: totrans-635
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 讨论将客户分组并发送特殊电子邮件如何使人们更有可能购买。
- en: Share strategies for using emails to get people interested in blog posts or
    other content, so they visit the website more.
  id: totrans-636
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 分享使用电子邮件使人们对博客文章或其他内容感兴趣并使他们更多地访问网站的策略。
- en: Explore the benefits of sending special emails that suggest products based on
    what someone looked at or bought before.
  id: totrans-637
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 探索根据某人之前查看或购买的产品发送特殊电子邮件的好处。
- en: Discuss how making emails urgent, like saying an offer is only for a short time,
    can make people buy more.
  id: totrans-638
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 讨论使电子邮件显得紧迫，例如说优惠仅限短时间内有效，如何使人们购买更多。
- en: Share tips on designing emails so they are easy for everyone to read, including
    using descriptions for pictures and high-contrast colors.
  id: totrans-639
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 分享设计电子邮件的技巧，以便每个人都能轻松阅读，包括使用图片描述和高对比度颜色。
- en: Explore the idea of sending emails automatically when someone does something,
    like leaving items in their cart.
  id: totrans-640
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 探索在某人进行某些操作时自动发送电子邮件的想法，例如将商品留在购物车中。
- en: Discuss the role of telling stories in emails to make customers feel connected
    to the brand and want to buy more.
  id: totrans-641
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 讨论在电子邮件中讲述故事的作用，使客户感到与品牌有联系并希望购买更多产品。
- en: Share strategies for using emails to help people learn about a product and decide
    to buy it.
  id: totrans-642
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 分享使用电子邮件帮助人们了解产品并决定购买它的策略。
- en: Explore the benefits of personalizing the subject lines of emails to grab attention
    and get more people to open them.
  id: totrans-643
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 探索个性化电子邮件主题行以吸引注意并使更多人打开它们的益处。
- en: Discuss how using emails to tell people about special events, like new products
    or online presentations, can get them excited and interested.
  id: totrans-644
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 讨论使用电子邮件告知人们有关特别活动，如新产品或在线演示，如何激发他们的兴奋和兴趣。
- en: ChatGPT can make mistakes. Consider checking import
  id: totrans-645
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: ChatGPT可能会出错。考虑检查导入
- en: Give advice on making emails easy to read on phones, using designs that work
    well on different screens, and keeping messages short.
  id: totrans-646
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供关于使电子邮件在手机上易于阅读的建议，使用在不同屏幕上表现良好的设计，并保持信息简短。
- en: Talk about the idea of sending special emails to people who haven't been interested
    lately to get them excited about the brand again.
  id: totrans-647
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 讨论向最近没有兴趣的人发送特殊电子邮件以重新激发他们对品牌兴趣的想法。
- en: Discuss how dividing customers into groups and sending them special emails with
    extra deals can make people who already bought things buy more.
  id: totrans-648
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 讨论如何将客户分组并发送带有额外优惠的特殊电子邮件，使已经购买过东西的人购买更多。
- en: Share ideas for using emails to ask customers about their opinions and thoughts,
    which can help make products and services better.
  id: totrans-649
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 分享使用电子邮件询问客户意见和想法的想法，这有助于改进产品和服务的建议。
- en: Explore the benefits of sending a series of emails that help people learn more
    about the brand and build a connection.
  id: totrans-650
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 探讨发送一系列电子邮件的好处，这些电子邮件有助于人们更多地了解品牌并建立联系。
- en: Discuss the impact of putting buttons in emails that make it easy for people
    to click and go to the website, which can lead to more sales.
  id: totrans-651
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 讨论在电子邮件中放置按钮的影响，这些按钮使人们能够轻松点击并访问网站，从而可能导致更多销售。
- en: Share tips on using personalized suggestions in emails to recommend products
    that customers might like based on what they've done before.
  id: totrans-652
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 分享在电子邮件中使用个性化建议推荐客户可能喜欢的产品的技巧。
- en: Explore the idea of using emails to tell customers about special offers or exclusive
    deals to thank them for being loyal.
  id: totrans-653
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 探索使用电子邮件向客户告知特别优惠或独家优惠的想法，以感谢他们的忠诚。
- en: Discuss how emails can be used to teach customers about the brand and show that
    it knows a lot about the industry.
  id: totrans-654
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 讨论如何使用电子邮件向客户传授品牌知识，并展示品牌对该行业的深入了解。
- en: Share strategies for using certain types of emails, like order confirmations
    or shipping notifications, to make customers feel confident and engaged.
  id: totrans-655
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 分享使用某些类型电子邮件（如订单确认或发货通知）的策略，以使客户感到自信并参与其中。
- en: Explore the benefits of sending automated emails for customers' birthdays or
    anniversaries, with special offers to make them feel celebrated.
  id: totrans-656
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 探索为客户生日或周年纪念日发送自动电子邮件的好处，附上特别优惠，让他们感到被庆祝。
- en: Discuss how to make emails easy for people who quickly look at the content,
    using headings, bullet points, and short paragraphs.
  id: totrans-657
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 讨论如何使电子邮件易于快速浏览的人阅读，使用标题、项目符号和简短段落。
- en: Share ideas on using emails to remind customers about products they looked at
    before or pages they visited on the website.
  id: totrans-658
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 分享使用电子邮件提醒客户之前查看的产品或网站页面的想法。
- en: Discuss the role of sending personalized content in emails to different groups
    of customers who have different interests.
  id: totrans-659
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 讨论在电子邮件中向不同兴趣组的客户发送个性化内容的作用。
- en: Share strategies for using emails to tell customers about loyalty programs and
    encourage them to buy again and talk about the brand.
  id: totrans-660
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 分享使用电子邮件向客户告知忠诚度计划并鼓励他们再次购买并讨论品牌的策略。
- en: Explore the benefits of sending automatic emails that ask customers for their
    thoughts and feedback, which can be used to show that others like the brand.
  id: totrans-661
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 探索发送自动电子邮件询问客户意见和反馈的好处，这些反馈可以用来展示其他人喜欢该品牌。
- en: Discuss the impact of using moving pictures or videos in emails to catch people's
    attention and make them interested.
  id: totrans-662
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 讨论在电子邮件中使用动态图片或视频吸引人们的注意并激发他们兴趣的影响。
- en: Share tips on how often to send emails so that customers stay interested but
    don't feel like their inbox is too full.
  id: totrans-663
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 分享关于发送电子邮件频率的建议，以确保客户保持兴趣，但不会觉得他们的收件箱太满。
- en: Explore the idea of using emails after someone buys something to suggest other
    things they might like based on their purchase.
  id: totrans-664
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 探索在某人购买某物后使用电子邮件建议他们可能喜欢的东西的想法，基于他们的购买行为。
- en: Discuss the role of using emails to build excitement and let customers know
    about new products or updates.
  id: totrans-665
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 讨论使用电子邮件建立兴奋感并让客户了解新产品或更新的作用。
- en: Share strategies for using emails to give important information, like changes
    to policies, new features, or if there are any problems with the service.
  id: totrans-666
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 分享使用电子邮件提供重要信息（如政策变更、新功能或服务问题）的策略。
- en: Learn about the advantages of using automatic win-back emails to bring back
    customers who haven't bought anything recently.
  id: totrans-667
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 了解使用自动赢回电子邮件召回近期未购买客户的优点。
- en: Talk about how dividing customers based on where they live or their time zone
    can help send them more personalized emails.
  id: totrans-668
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 讨论根据客户的居住地或时区划分客户，以帮助他们发送更个性化的电子邮件。
- en: Share tips for making email templates that look good on different email apps
    and devices to give everyone a consistent and good experience.
  id: totrans-669
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 分享制作在不同电子邮件应用和设备上看起来都好的电子邮件模板的技巧，以提供一致且良好的体验。
- en: Explore the idea of using automatic emails to give people timely and useful
    information, like updates on their orders or suggestions for products.
  id: totrans-670
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 探索使用自动电子邮件提供及时有用信息（如订单更新或产品建议）的想法。
- en: Discuss how using emotions in emails can make people feel good and more connected
    to the brand.
  id: totrans-671
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 讨论在电子邮件中使用情感如何让人感觉良好并更亲近品牌。
- en: Share strategies for using emails to keep people interested and guide them to
    buy after they've shown interest on social media.
  id: totrans-672
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 分享使用电子邮件在社交媒体上表现出兴趣后保持客户兴趣并引导他们购买的策略。
- en: Explore the benefits of sending a series of emails with useful content to teach
    and engage subscribers.
  id: totrans-673
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 探索发送一系列具有有用内容的电子邮件以教育和吸引订阅者的好处。
- en: Discuss how grouping customers and sending them special win-back emails with
    personalized offers can bring them back.
  id: totrans-674
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 讨论将客户分组并发送带有个性化优惠的特殊赢回电子邮件，以吸引他们回归。
- en: Share tips for making sign-up forms for emails better, like explaining the benefits
    and keeping them short.
  id: totrans-675
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 分享如何制作更好的电子邮件注册表提示，例如解释好处并保持简短。
- en: '"I want an email that shows how great my product/service is to my ideal customers
    and convinces them to do something special, backed up by proof and building trust."'
  id: totrans-676
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: “我想要一个电子邮件，展示我的产品/服务对我理想客户来说有多好，并说服他们做一些特别的事情，有证据支持并建立信任。”
- en: '"I''m searching for an email that talks directly to what my ideal customers
    need, making them act quickly with a great offer and a sense of urgency."'
  id: totrans-677
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: “我在寻找一个电子邮件，直接针对我的理想客户的需求，让他们在一份很好的优惠和紧迫感下迅速行动。”
- en: '"I need an email that makes my ideal customers buy my product/service by highlighting
    its special benefits and answering any worries they might have."'
  id: totrans-678
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: “我需要一个电子邮件，通过突出产品的特殊好处并解答他们可能有的任何疑虑，让我的理想客户购买我的产品/服务。”
- en: Develop a series of emails to teach customers about what you sell.
  id: totrans-679
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 制定一系列电子邮件来向客户介绍您所销售的产品。
- en: Send a newsletter with updates and news from your industry.
  id: totrans-680
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 发送一份包含行业更新和新闻的通讯。
- en: Give customers special discounts and coupons through email.
  id: totrans-681
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 通过电子邮件向客户提供特别折扣和优惠券。
- en: Make an email that tells stories of customers who succeeded using your product.
  id: totrans-682
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 制作一封讲述使用您产品成功的客户故事的电子邮件。
- en: Show off reviews and happy thoughts from customers through email.
  id: totrans-683
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 通过电子邮件展示客户的评价和喜悦之情。
- en: Make a set of emails with videos to share interesting content.
  id: totrans-684
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 制作一系列包含视频的电子邮件来分享有趣的内容。
- en: Design an email with cool graphics and pictures.
  id: totrans-685
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 设计一封包含酷炫图形和图片的电子邮件。
- en: Send an email with a quiz or something fun for customers to do.
  id: totrans-686
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 发送一封包含测验或有趣活动的电子邮件供客户参与。
- en: Make an email with questions and answers from someone in charge of the company.
  id: totrans-687
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 制作一封包含公司负责人问答的电子邮件。
- en: Craft an email to show what happens behind the scenes in your company.
  id: totrans-688
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 制作一封电子邮件来展示您公司幕后发生的事情。
- en: Give customers a reward for sharing their thoughts and reviews.
  id: totrans-689
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 当客户分享他们的想法和评价时，给予他们奖励。
- en: Create an email to invite readers to join your mailing list.
  id: totrans-690
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 创建一封邀请读者加入您的邮件列表的电子邮件。
- en: Send an email to say thank you to customers for choosing you.
  id: totrans-691
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 发送一封电子邮件向选择您的客户表示感谢。
- en: Use an email to tell customers about a new thing you're offering.
  id: totrans-692
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 通过电子邮件向客户介绍您提供的新事物。
- en: Create an email to let everyone know about a new blog post or article.
  id: totrans-693
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 创建一封电子邮件，让每个人都知道一篇新的博客文章或文章。
- en: Offer customers the chance to win something exciting with an email.
  id: totrans-694
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 通过电子邮件为客户提供赢取令人兴奋的奖品的机会。
- en: Give customers a free gift when they make a purchase.
  id: totrans-695
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 当客户购买时，向他们提供免费礼物。
- en: Send a newsletter with helpful tips and advice.
  id: totrans-696
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 发送一份包含有用提示和建议的通讯。
- en: Make an email with a special deal for customers who come back.
  id: totrans-697
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 制作一封针对回头客的特别优惠电子邮件。
- en: Send an email to tell everyone about an upcoming event.
  id: totrans-698
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 发送一封电子邮件告诉每个人即将举行的活动。
- en: Create an email to announce a sale or discount.
  id: totrans-699
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 创建一封电子邮件来宣布销售或折扣。
- en: Use an email to share stories and thoughts from customers.
  id: totrans-700
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用电子邮件分享客户的经历和想法。
- en: Create an email to display reviews from customers.
  id: totrans-701
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 创建一封展示客户评价的电子邮件。
- en: Send out a survey to collect thoughts and feedback from customers.
  id: totrans-702
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 发送调查问卷以收集客户的想法和反馈。
- en: Make an email with a special deal for customers who bring in new people.
  id: totrans-703
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 制作一封针对带来新客户的客户的特别优惠电子邮件。
- en: Create an email to boost sales on your online store.
  id: totrans-704
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 创建一封电子邮件来提高您在线商店的销售。
- en: Tell everyone about a new thing you're offering through email.
  id: totrans-705
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 通过电子邮件告诉每个人您提供的新事物。
- en: Give customers exclusive discounts and coupons with an email.
  id: totrans-706
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 通过电子邮件向客户提供独家折扣和优惠券。
- en: Send a survey to collect thoughts and feedback from customers.
  id: totrans-707
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 发送调查问卷以收集客户的想法和反馈。
- en: Create a series of emails to teach customers about what you sell.
  id: totrans-708
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 创建一系列电子邮件来向客户介绍您所销售的产品。
- en: Send a one-time special offer to people who get your emails.
  id: totrans-709
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 向收到您电子邮件的人发送一次性特别优惠。
- en: Craft an email to share stories of customers who succeeded using your product.
  id: totrans-710
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 制作一封分享使用您产品成功的客户故事的电子邮件。
- en: Make an email with a personal touch to connect with customers.
  id: totrans-711
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 制作一封带有个人风格的电子邮件，以与客户建立联系。
- en: Send an email with a quiz or something fun for customers to do.
  id: totrans-712
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 发送一封包含测验或有趣活动的电子邮件供客户参与。
- en: Create a set of emails with videos to share interesting content.
  id: totrans-713
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 创建一系列包含视频的电子邮件来分享有趣的内容。
- en: Send out a newsletter with updates and news from your industry.
  id: totrans-714
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 发送一份包含行业更新和新闻的通讯。
- en: Use an email to show off reviews and happy thoughts from customers.
  id: totrans-715
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 通过电子邮件展示客户的评价和喜悦之情。
- en: Create an email with cool graphics and pictures.
  id: totrans-716
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 创建一封包含酷炫图形和图片的电子邮件。
- en: Make an email to display reviews from customers.
  id: totrans-717
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 制作一封显示客户评价的电子邮件。
- en: Craft an email campaign for a special event or holiday.
  id: totrans-718
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 为特别活动或假日制作电子邮件活动。
- en: Send a welcome email to say thanks to new subscribers.
  id: totrans-719
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 向新订阅者发送一封欢迎邮件以表示感谢。
- en: Announce a new product or service with an email.
  id: totrans-720
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 通过电子邮件宣布新产品或服务。
- en: Share a holiday-themed email with a special deal.
  id: totrans-721
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 分享一个节日主题的电子邮件，并提供特别折扣。
- en: Show off customer reviews or stories in an email.
  id: totrans-722
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在电子邮件中展示客户评价或故事。
- en: Send a "last chance" email with a limited-time deal.
  id: totrans-723
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 发送限时折扣的“最后机会”电子邮件。
- en: Tell everyone about a popular product that's back in stock.
  id: totrans-724
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 通知每个人有关库存恢复的热门产品。
- en: Promote a free trial or demo with an email.
  id: totrans-725
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 通过电子邮件推广免费试用或演示。
- en: Say "thank you" to your customers with a special email.
  id: totrans-726
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 通过一封特别的电子邮件向您的客户表示感谢。
- en: Send a reminder to users who left items in their shopping cart.
  id: totrans-727
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 向将商品留在购物车中的用户发送提醒。
- en: Promote your business's referral program with an email.
  id: totrans-728
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 通过电子邮件推广您的业务推荐计划。
- en: An email telling you about a short sale or quick discount.
  id: totrans-729
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一封介绍即将到来的短期销售或快速折扣的电子邮件。
- en: An email saying thanks to customers and giving them a special deal.
  id: totrans-730
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一封向客户表示感谢并提供特别折扣的电子邮件。
- en: An email telling you about a group of products or services sold together at
    a good price.
  id: totrans-731
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一封介绍一组产品或服务以优惠价格一起销售的电子邮件。
- en: An email with questions or a vote to get people involved and share thoughts.
  id: totrans-732
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一封提出问题或投票以让人们参与并分享想法的电子邮件。
- en: An email telling you about a webinar or event happening online.
  id: totrans-733
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一封介绍即将在线举行的网络研讨会或活动的电子邮件。
- en: An email asking you to follow and check out your business on social media.
  id: totrans-734
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一封邀请您在社交媒体上关注和检查您的业务的电子邮件。
- en: An email saying your business offers free shipping or delivery.
  id: totrans-735
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一封说明您的业务提供免费运输或送货的电子邮件。
- en: An email comparing your product or service to others in the market.
  id: totrans-736
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一封将您的产品或服务与市场上其他产品进行比较的电子邮件。
- en: An email saying something new is coming soon to get people excited.
  id: totrans-737
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一封宣布即将推出新事物以激发人们兴奋的电子邮件。
- en: An email telling you about an upgrade or improvement to your product or service.
  id: totrans-738
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一封介绍您产品或服务的升级或改进的电子邮件。
- en: An email saying what's new and improved about your product or service.
  id: totrans-739
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一封说明您的产品或服务的新功能和改进的电子邮件。
- en: An email with content made by users, like reviews or photos.
  id: totrans-740
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一封包含用户生成内容，如评价或照片的电子邮件。
- en: An email telling you about your business's support or service.
  id: totrans-741
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一封介绍您的业务支持或服务的电子邮件。
- en: An email introducing your team and showing how your business works.
  id: totrans-742
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一封介绍您的团队并展示您的业务运作方式的电子邮件。
- en: An email asking you to install and use a mobile app.
  id: totrans-743
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一封邀请您安装和使用移动应用的电子邮件。
- en: An email to remind users who visited your business's Facebook page about your
    products or services.
  id: totrans-744
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一封提醒访问过您业务Facebook页面的用户关于您的产品或服务的电子邮件。
- en: An email promoting a special deal or discount for birthdays or anniversaries.
  id: totrans-745
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一封推广生日或周年纪念日的特价或折扣电子邮件。
- en: An email showing how to use your product or service with a video.
  id: totrans-746
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一封通过视频展示如何使用您的产品或服务的电子邮件。
- en: An email talking about how your business helps the community.
  id: totrans-747
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一封讨论您的业务如何帮助社区的电子邮件。
- en: An email to get contact info from possible customers.
  id: totrans-748
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一封获取潜在客户联系信息的电子邮件。
- en: An email telling you about a product or service that fits the current trend
    or season.
  id: totrans-749
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一封介绍符合当前趋势或季节的产品或服务的电子邮件。
- en: An email to let people in a certain area know about your business.
  id: totrans-750
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一封让特定地区的人们了解您的业务的电子邮件。
- en: An email giving a special deal just for people who get your emails.
  id: totrans-751
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一封仅针对收到您电子邮件的人提供的特价电子邮件。
- en: An email reminding users who bought from your website before to come back.
  id: totrans-752
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一封提醒之前在您的网站上购买过产品的用户回访的电子邮件。
- en: An email promoting a program that rewards and thanks loyal customers.
  id: totrans-753
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一封推广奖励和感谢忠实客户的计划的电子邮件。
- en: An email telling customers about a product or service that helps with a common
    problem they often have.
  id: totrans-754
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一封向客户介绍有助于他们常见问题的产品或服务的电子邮件。
- en: An email offering a special look or early chance to get products or services
    that are coming soon.
  id: totrans-755
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一封提供即将推出的产品或服务的特别外观或早期购买机会的电子邮件。
- en: An email inviting people to join a contest or giveaway to get them excited about
    your brand.
  id: totrans-756
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一封邀请人们参加比赛或抽奖以激发他们对您品牌的兴趣的电子邮件。
- en: An email giving instructions or showing a video on how to use or do something.
  id: totrans-757
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一封提供使用说明或展示如何使用或做某事的视频的电子邮件。
- en: An email with a special deal or discount just for people who are buying for
    the first time.
  id: totrans-758
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一封专门为首次购买者提供的特价或折扣电子邮件。
- en: An email showing what happens behind the scenes in your business and introducing
    your team.
  id: totrans-759
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一封展示您业务幕后发生的事情并介绍您的团队的电子邮件。
- en: An email advertising a product or service that fits with a current event or
    holiday.
  id: totrans-760
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一封宣传与当前事件或假日相符的产品或服务的电子邮件。
- en: An email telling customers about special or limited-time things your business
    is offering.
  id: totrans-761
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一封向客户告知你的业务提供的特别或限时优惠的电子邮件。
- en: An email promoting your business's blog or other interesting things you share.
  id: totrans-762
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一封推广你的业务博客或其他你分享的有趣事物的电子邮件。
- en: An email offering a time-limited discount or deal for a certain type of product
    or service.
  id: totrans-763
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一封提供限时折扣或特定类型产品或服务的交易的电子邮件。
- en: An email promoting a product or service that's good for the environment or is
    made sustainably.
  id: totrans-764
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一封宣传对环境友好或可持续制造的产品或服务的电子邮件。
- en: An email featuring a customer and their experience with your business.
  id: totrans-765
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一封展示客户及其与你的业务体验的电子邮件。
- en: An email promoting a product or service that customers can customize or personalize.
  id: totrans-766
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一封推广客户可以定制或个性化的产品或服务的电子邮件。
- en: '"I need an email that will make people who might buy my product feel good about
    it and want to get it, even if they have worries or questions."'
  id: totrans-767
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '"我需要一封电子邮件，让可能购买我产品的人对它感到满意，并想要购买，即使他们有担忧或问题。"'
- en: '"I''m looking for an email that will explain why people should sign up for
    my program or subscription by telling them what they''ll get and why it''s valuable."'
  id: totrans-768
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '"我在寻找一封电子邮件，通过告诉他们他们将得到什么以及为什么它有价值，来解释为什么人们应该注册我的项目或订阅。"'
- en: '"I need an email that will make people who might buy my product feel a certain
    way and get them to do something specific."'
  id: totrans-769
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '"我需要一封电子邮件，让可能购买我产品的人产生某种感觉，并促使他们采取具体行动。"'
- en: '"I''m looking for an email that will explain the important things about my
    product or service in a way that''s easy to understand, so people will want to
    buy it."'
  id: totrans-770
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '"我在寻找一封电子邮件，以易于理解的方式解释我的产品或服务的重要信息，以便人们愿意购买。"'
- en: '"I need an email that will talk about the problems and needs of people who
    might buy my product and show them how my product is the answer."'
  id: totrans-771
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '"我需要一封电子邮件，讨论可能购买我产品的人的问题和需求，并展示我的产品是如何成为答案的。"'
- en: '"I''m looking for an email that will catch the attention of people who might
    buy my product and convince them to do something specific with strong and convincing
    words."'
  id: totrans-772
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '"我在寻找一封电子邮件，通过强烈而有说服力的语言吸引可能购买我产品的人的注意，并说服他们采取具体行动。"'
- en: '"I need an email that will tell a story about my product or service and show
    how it''s helped people reach their goals in a way that''s easy for people to
    relate to and enjoy."'
  id: totrans-773
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '"我需要一封电子邮件，讲述关于我的产品或服务的故事，并展示它如何以易于人们相关和享受的方式帮助人们实现目标。"'
- en: '"I''m looking for an email that will talk about the special things my product
    or service offers and convince people to buy it."'
  id: totrans-774
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '"我在寻找一封电子邮件，讨论我的产品或服务提供的特别之处，并说服人们购买它。"'
- en: '"I need an email that will answer the worries and questions people might have
    about my product or service and convince them to do something specific."'
  id: totrans-775
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '"我需要一封电子邮件，回答人们可能对我的产品或服务有的担忧和问题，并说服他们采取具体行动。"'
- en: '"I''m looking for an email that will build trust with people who might buy
    my product or service by sharing the successes and happy stories of other people
    who have used it."'
  id: totrans-776
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '"我在寻找一封电子邮件，通过分享使用过我的产品或服务的其他人的成功和快乐故事，来建立可能购买我的产品或服务的人的信任。"'
- en: '"I need an email that will make people who might buy my product feel a certain
    way and convince them to do something specific, and I want it to feel urgent."'
  id: totrans-777
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '"我需要一封电子邮件，让可能购买我产品的人产生某种感觉，并说服他们采取具体行动，并且我希望它感觉紧迫。"'
- en: Create an email that explains the good things about your product or service
    and encourages the right people to buy it by telling them what it can do.
  id: totrans-778
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 创建一封电子邮件，解释你的产品或服务的优点，并通过告诉他们它能做什么来鼓励合适的人购买。
- en: Make an email that shows why your product or service is valuable and convinces
    the right people to do something you want them to do by using proof and building
    trust.
  id: totrans-779
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 制作一封电子邮件，展示你的产品或服务的价值，并通过使用证据建立信任来说服合适的人采取你希望他们采取的行动。
- en: Design an email that talks directly to the problems or needs of the people you
    want to reach and convinces them to do something important with a strong offer
    and urgency.
  id: totrans-780
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 设计一封直接针对你想要接触的人的问题或需求的电子邮件，并通过强有力的优惠和紧迫性说服他们采取重要的行动。
- en: Create an email that convinces the right people to buy what you're offering
    by talking about its unique benefits and answering any worries they might have.
  id: totrans-781
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 创建一封电子邮件，通过谈论其独特的优点并回答他们可能有的担忧来说服合适的人购买你提供的产品。
- en: Make a bunch of emails that show videos.
  id: totrans-782
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 制作一系列展示视频的电子邮件。
- en: Make an email that shows pictures and graphics.
  id: totrans-783
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 制作一封展示图片和图形的电子邮件。
- en: Send an email with a quiz or something fun to play with.
  id: totrans-784
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 发送一封包含测验或有趣活动的电子邮件。
- en: Make an email that asks the leader of your company some questions.
  id: totrans-785
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 制作一封询问你公司领导问题的电子邮件。
- en: Write an email that shares a look behind the scenes of your company.
  id: totrans-786
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 写一封分享公司幕后故事的电子邮件。
- en: Give a reward to customers who write reviews about your products.
  id: totrans-787
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 给写产品评价的客户提供奖励。
- en: Write an email that asks people to join your email list.
  id: totrans-788
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 写一封电子邮件，请求人们加入你的电子邮件列表。
- en: Send an email to say thank you to your customers.
  id: totrans-789
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 发送一封感谢客户的电子邮件。
- en: Use an email to tell everyone about a new thing you're offering.
  id: totrans-790
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用电子邮件向大家介绍你提供的新事物。
- en: Write an email to tell everyone about a new blog post or article.
  id: totrans-791
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 写一封电子邮件向大家介绍新的博客文章或文章。
- en: Let customers enter a contest to win a prize with an email.
  id: totrans-792
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 让客户通过电子邮件参加比赛以赢得奖品。
- en: Give customers a free gift when they buy something.
  id: totrans-793
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 当客户购买时，给他们提供免费礼物。
- en: Send out a newsletter with helpful tips.
  id: totrans-794
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 发送一份包含有用提示的通讯。
- en: Make an email with a special deal for customers who come back.
  id: totrans-795
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 为回头客制作一封包含特别优惠的电子邮件。
- en: Send an email to let everyone know about an event coming up.
  id: totrans-796
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 发送一封让大家知道即将发生的活动的电子邮件。
- en: Write an email to tell everyone about a sale or discount.
  id: totrans-797
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 写一封向大家介绍销售或折扣的电子邮件。
- en: Use an email to show nice things customers have said about your business.
  id: totrans-798
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用电子邮件展示客户对你业务的正面评价。
- en: Write an email to feature reviews from your customers.
  id: totrans-799
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 写一封突出客户评价的电子邮件。
- en: Ask customers for their opinions through a survey.
  id: totrans-800
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 通过调查询问客户的意见。
- en: Make an email with a special deal for customers who refer others.
  id: totrans-801
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 为推荐他人的人制作一封包含特别优惠的电子邮件。
- en: Create an email to boost online sales.
  id: totrans-802
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 制作一封提升在线销售的电子邮件。
- en: Use an email to tell everyone about a new product or service.
  id: totrans-803
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用电子邮件向大家介绍新产品或服务。
- en: Give customers special discounts and coupons with an email.
  id: totrans-804
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 通过电子邮件给客户提供特别折扣和优惠券。
- en: Ask customers for their opinions through a survey.
  id: totrans-805
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 通过调查询问客户的意见。
- en: Create a series of emails to teach customers about what you offer.
  id: totrans-806
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 创建一系列电子邮件，向客户介绍你提供的内容。
- en: Send a special deal to people who subscribe just one time.
  id: totrans-807
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 向仅订阅一次的人发送特别优惠。
- en: Make an email that tells stories about customers who did well with your stuff.
  id: totrans-808
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 制作一封讲述使用你产品取得成功客户的故事的电子邮件。
- en: Write an email that feels personal.
  id: totrans-809
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 写一封感觉个性化的电子邮件。
- en: Send an email that has a quiz or something fun to do.
  id: totrans-810
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 发送一封包含测验或有趣活动的电子邮件。
- en: Make lots of emails that show videos.
  id: totrans-811
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 制作许多包含视频的电子邮件。
- en: Send a letter with news about the industry and updates.
  id: totrans-812
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 发送一封关于行业新闻和更新的信件。
- en: Use an email to show good things customers said about your business.
  id: totrans-813
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用电子邮件展示客户对你业务的正面评价。
- en: Write an email that has pictures and graphics.
  id: totrans-814
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 写一封包含图片和图形的电子邮件。
- en: Make an email to show reviews from customers.
  id: totrans-815
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 制作一封展示客户评价的电子邮件。
- en: Create a set of emails for a special event or holiday.
  id: totrans-816
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 为特别活动或假日创建一系列电子邮件。
