    columns]. Can you suggest features that we can engineer for this machine learning
    problem?'
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc11Y.jpg)'
  prefs: []
  type: TYPE_IMG
- en: I absolutely loved ChatGPT’s reponse here. The features it suggested are sound
    and actually useful for the use case.
  prefs: []
  type: TYPE_NORMAL
- en: 45\. Suggest A/B Testing Steps
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt: I want you to act as a statistician. [Describe context] Please design
    an A/B test for this purpose. Please include the concrete steps on which statistical
    test I should run.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc11Z.jpg)![](image_rsrc120.jpg)'
  prefs: []
  type: TYPE_IMG
- en: While ChatGPT’s steps for A/B testing is correct. I did find it a requirement
    to explicitly ask it to include the statistical test required.
  prefs: []
  type: TYPE_NORMAL
- en: 46\. Career Coaching
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt: I want you to act as a career advisor. I am looking for a role as a [role
    name]. My background is [...]. How do I land the role and with what resources
    exactly in 6 months?'
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc121.jpg)![](image_rsrc122.jpg)'
  prefs: []
  type: TYPE_IMG
- en: I have no surprises that ChatGPT did well here. It is able to regurgigate oft-repeated
    advice for career changers. While this is technically correct, I didn’t find it
    overwhelming impressive.
  prefs: []
  type: TYPE_NORMAL
- en: 'Side note: One can combine this tip with Tip 41 (Suggest portfolio ideas) and
    42 (Suggest dataset) when building one’s portfolio.'
  prefs: []
  type: TYPE_NORMAL
- en: Chapter 9:   TROUBLESHOOT PROBLEM
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 47\. Correct Own ChatGPT Code
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt: Your above code is wrong. [Point out what is wrong]. Can you try again?'
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc123.jpg)![](image_rsrc124.jpg)'
  prefs: []
  type: TYPE_IMG
- en: ChatGPT is quick to admit its mistakes and correct its code. In the above example,
    I asked ChatGPT to create a shell command. I realized that it does not actually
    run, so I pointed out what was wrong. ChatGPT is able to provide the correct code
    on the second attempt.
  prefs: []
  type: TYPE_NORMAL
- en: This is good enough if you know where the bug is exactly. But in cases where
    you do not know where the bug is, ChatGPT might not be able to pinpoint where
    the fault is. The onus is still on the coder to figure things out.
  prefs: []
  type: TYPE_NORMAL
- en: 48\. Correct Python Code
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt: I want you to act as a software developer. This code is supposed to [expected
    function]. Please help me debug this python code that cannot be run. [Insert function]'
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc125.jpg)'
  prefs: []
  type: TYPE_IMG
- en: I provided ChatGPT with a simple incorrect function and it is able to tell me
    why it is wrong correctly.
  prefs: []
  type: TYPE_NORMAL
- en: 49\. Correct SQL Code
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt: I want you to act as a SQL code corrector. This code does not run in [your
    DBMS, e.g. PostgreSQL]. Can you correct it for me? [SQL code here]'
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc126.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A correct explanation for a simple query. However, upon further testing, I did
    find ChatGPT’s understanding of complex SQL query to be somewhat lacking. It’s
    not able to debug more complex SQL queries containing multiple tables.
  prefs: []
  type: TYPE_NORMAL
- en: 50\. Troubleshoot PowerBI Model
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt: I want you to act as a PowerBl modeler. Here is the details of my current
    project. [Insert details]. Do you see any problems with the table?'
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc127.jpg)![](image_rsrc128.jpg)'
  prefs: []
  type: TYPE_IMG
- en: ChatGPT is able to suggest relevant improvements to the PowerBI model. It also
    admitted its shortcoming (“It’s difficult to determine if there are any problems
    without more context”)
  prefs: []
  type: TYPE_NORMAL
- en: Mathias Halkjær Petersen had a good chat with ChatGPT on this topic. He showed
    that ChatGPT is able to troubleshoot PowerBI models effectively when more context
    is provided. It is also able to write the models relatively independently.
  prefs: []
  type: TYPE_NORMAL
- en: Chapter 10:   WRITE SQL
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 51\. Create Running Average
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt: I want you to act as a data scientist and write SQL code for me. I
    have a table with two columns [Insert column names]. I would like to calculate
    a running average for [which value]. What is the SQL code that works for PostgreSQL
    14?'
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc129.jpg)![](image_rsrc12A.jpg)'
  prefs: []
  type: TYPE_IMG
- en: ChatGPT did provide a good response to the requesst here! It correctly provided
    the output for creating running averages in SQL. It also provided a correct explanation
    and breakdown.
  prefs: []
  type: TYPE_NORMAL
- en: One tip that I have is to provide ChatGPT with the exact version and flavour
    of SQL. This allows it to create versions of the data.
  prefs: []
  type: TYPE_NORMAL
- en: I would encourage practitioners to create test ChatGPT with their own SQL questions
    and see if it creates a correct response.
  prefs: []
  type: TYPE_NORMAL
- en: 52\. Solve Leetcode Question
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt: Assume you are given the tables… with the columns… Output the following…'
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc12B.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 'ChatGPT could solve an introductory Leetcode question (Difficulty: Simple)
    on SQL. The above code is sound and answers the question correctly.'
  prefs: []
  type: TYPE_NORMAL
- en: However, it failed to produce runnable SQL code for a Leetcode question with
    medium difficulty when I tested it.
  prefs: []
  type: TYPE_NORMAL
- en: Chapter 11:   WRITE OTHER CODE
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 53\. Write Google Sheets Formula
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt: I want you to act as a bot that generates Google Sheets formula. Please
    generate a formula that [describe requirements]'
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc12C.jpg)![](image_rsrc12D.jpg)'
  prefs: []
  type: TYPE_IMG
- en: ChatGPT excels at acting as a lookup table for all commands. As you can see,
    I asked it for a function that pulls one sheet and puts it into another. It faithfully
    provided the correct importrange.
  prefs: []
  type: TYPE_NORMAL
- en: However, again, I cherrypicked this example. ChatGPT fails when asked to provide
    more complex formulas. In particular, I asked it to provide a formula that outputs
    the number of Mondays in 2023\. It failed to produce a formula that works. Yet,
    it still confidently explained it as though it performed splendidly.
  prefs: []
  type: TYPE_NORMAL
- en: 54\. Write R
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt: I want you to act as a data scientist using R. Can you write an R script
    that [Insert requirement here]'
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc12E.jpg)'
  prefs: []
  type: TYPE_IMG
- en: ChatGPT sure excelled at this basic R command. This code runs and indeed creates
    the plot as requested.
  prefs: []
  type: TYPE_NORMAL
- en: However, do note that I did not test ChatGPT on R coding extensively. I can
    imagine it failing or producing incorrect codes for more complex cases.
  prefs: []
  type: TYPE_NORMAL
- en: 55\. Write Shell
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt: I want you to act as a Linux terminal expert. Please write the code
    to [describe requirements]'
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc12F.jpg)'
  prefs: []
  type: TYPE_IMG
- en: These are the correct commands for the requested instructions. It even provided
    a line for granting the necessary permission to the file without me explicitly
    asking it to
  prefs: []
  type: TYPE_NORMAL
- en: However, note that I cherrypicked this example out of all the prompts for writing
    shell commands. In particular, when I asked ChatGPT to copy files from a folder
    recursively, it gave an incorrect output that could not be executed. In its defense,
    it’s able to correct its own code (See “47\. Correct Own ChatGPT Code” above.)
  prefs: []
  type: TYPE_NORMAL
- en: 56\. Write VBA
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt: I want you to act as an Excel VBA developer. Can you write a VBA that [Insert
    function here]?'
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc12G.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Chapter 12:   MISCALLANEOUS
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 57\. Format Tables
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt: I want you to act as a document formatter. Please format the following
    into a nice table for me to place in Google Docs? [insert text table here]'
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc12H.jpg)'
  prefs: []
  type: TYPE_IMG
- en: The output speaks for itself. It is able to convert a table that I copied from
    the internet into a nicely formatted table.
  prefs: []
  type: TYPE_NORMAL
- en: However, ChatGPT cannot offer any customization to the table. I asked it to
    change the colors and font, but it was not able to.
  prefs: []
  type: TYPE_NORMAL
- en: 58\. Summarize Book
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt: I want you to act as a technical book summarizer. Can you please summarize
    the book [name] with 5 main points?'
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc12J.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Knaflic’s book is a gold mine of data storytelling tips. I personally feel that
    the summary was too generic and did not capture the tips sufficiently.
  prefs: []
  type: TYPE_NORMAL
- en: 59\. Summarize Paper
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt: I want you to act as an academic. Please summarise the paper [...] in
    simple terms in one paragraph.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc12K.jpg)'
  prefs: []
  type: TYPE_IMG
- en: I asked ChatGPT to summarize a relatively old paper “Distilling the knowledge
    in a neural network”. It is able to explain the most important concepts in a relatively
    straightforward and jargon-free manner.
  prefs: []
  type: TYPE_NORMAL
- en: However, note that this is possible because enough people have written reviews
    or summaries of the above paper. It will not be able to summarize papers that
    are not as popular well.
  prefs: []
  type: TYPE_NORMAL
- en: Also, ChatGPT does not have an understanding of the world beyond 2021\. Thus,
    it will not be able to help you understand new papers.
  prefs: []
  type: TYPE_NORMAL
- en: 60\. Provide Emotional Support (My Favourite)
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt: I want you to provide emotional support to me. [Explain problem here.]'
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc12M.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Alright I’m no psychologist, so I do not think I am qualified to judge this.
    That said, I personally think that this is a response that is both empathetic
    and practical. It also showed a good understanding of the data science process.
  prefs: []
  type: TYPE_NORMAL
- en: Closing
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: ChatGPT performs well in explaining things and providing boilerplate code. However,
    it falters when it comes to debugging or creating complex code snippets.
  prefs: []
  type: TYPE_NORMAL
- en: Will ChatGPT replace data scientists? No, I don’t think so. At least not yet.
    However someone using ChatGPT might.
  prefs: []
  type: TYPE_NORMAL
