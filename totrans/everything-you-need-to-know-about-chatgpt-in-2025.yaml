  zh: '**第一步**走向有效优化的关键在于理解提示（prompt）不仅仅是一个命令或一个问题，而是一种结构化的对话。就像人类对话一样，请求的方式直接影响其被理解和回答的方式。在这个意义上，用清晰、具体、定义良好的上下文来构建提示是至关重要的。例如，与其简单地问：“**总结一下这些信息**”，不如更有效地这样说：“**用150字左右的段落总结这篇文章，重点关注与环境保护和循环经济相关的关键点**。”这种做法不仅减少了歧义，而且还能指导模型朝着更准确的结果发展。'
