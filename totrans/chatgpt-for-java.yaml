- en: Moderation (JSON)
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Table 7-3
  prefs: []
  type: TYPE_NORMAL
- en: The Structure of the Moderation JSON Object
  prefs: []
  type: TYPE_NORMAL
- en: '| Field | Type | Description |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '| Id | String | A unique identifier for the moderation request. |'
  prefs: []
  type: TYPE_TB
- en: '| Model | String | The model used to perform the moderation request. |'
  prefs: []
  type: TYPE_TB
- en: '| Results | Array | A list of moderation objects. |'
  prefs: []
  type: TYPE_TB
- en: '| ↳ flagged | Boolean | Flags if the content violates OpenAI’s usage policies.
    |'
  prefs: []
  type: TYPE_TB
- en: '| ↳ categories | Array | A list of the categories and whether they’re being
    flagged or not. |'
  prefs: []
  type: TYPE_TB
- en: '| ↳↳ hate | Boolean | This indicates whether or not the text given expresses,
    incites, or promotes hate based on race, gender, religion, ethnicity, nationality,
    disability status, sexual orientation, or caste. |'
  prefs: []
  type: TYPE_TB
- en: '| ↳↳ hate/threatening | Boolean | This indicates whether or not the text given
    contains hateful content that also threatens violence or serious harm toward the
    targeted group based on biases expressed above. |'
  prefs: []
  type: TYPE_TB
- en: '| ↳↳ harassment | Boolean | This indicates whether or not the text given contains
    content that expresses, incites, or promotes harassing language toward any target.
    |'
  prefs: []
  type: TYPE_TB
- en: '| ↳↳ harassment/threatening | Boolean | This indicates whether or not the text
    given contains harassment content that also threatens violence or serious harm
    toward any target. |'
  prefs: []
  type: TYPE_TB
- en: '| ↳↳ self-harm | Boolean | This indicates whether or not the text given contains
    content that promotes, encourages, or depicts acts of self-harm, for example,
    suicide, cutting, and eating disorders. |'
  prefs: []
  type: TYPE_TB
- en: '| ↳↳ self-harm/intent | Boolean | This indicates whether or not the text given
    contains content in which the speaker expresses that they are engaging or intend
    to engage in acts of self-harm, such as suicide, cutting, and eating disorders.
    |'
  prefs: []
  type: TYPE_TB
- en: '| ↳↳ self-harm/instructions | Boolean | This indicates whether or not the text
    given contains content that encourages the performing acts of self-harm, such
    as suicide, cutting, and eating disorders. This includes content that gives instructions
    or advice on how to commit such acts. |'
  prefs: []
  type: TYPE_TB
- en: '| ↳↳ sexual | Boolean | This indicates whether or not the text given contains
    content meant to arouse sexual excitement, such as the description of sexual activity.This
    includes content that promotes sexual services; however, this ***excludes*** topics
    such as sex education and wellness. |'
  prefs: []
  type: TYPE_TB
- en: '| ↳↳ sexual/minors | Boolean | This indicates whether or not the text given
    contains content that includes an individual under the age of 18. |'
  prefs: []
  type: TYPE_TB
- en: '| ↳↳ violence | Boolean | This indicates whether or not the text given contains
    content depicting death, violence, or physical injury. |'
  prefs: []
  type: TYPE_TB
- en: '| ↳↳ violence/graphic | Boolean | This indicates whether or not the text given
    contains content depicting death, violence, or physical injury in graphic detail.
    |'
  prefs: []
  type: TYPE_TB
- en: '| ↳ category_scores | Array | A list of the categories along with the scores
