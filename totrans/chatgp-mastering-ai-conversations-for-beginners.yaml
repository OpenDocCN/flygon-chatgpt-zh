    ****20**22**). ****Th**is** ****ma**kes** ****t**he** ****sho**rtag**e ****o**f**
    ****me**nta**l ****he**alt**h ****profe**ssiona**ls ****mo**re** ****se**ver**e
    ****th**an** ****a**ny** ****ot**her** ****med**ica**l ****o**r** ****heal**thcar**e
    ****prof**ession**al.'
  id: totrans-606
  prefs: []
  type: TYPE_NORMAL
  zh: 与心理健康护理相关的可及性问题也存在。在生活压力和紧张程度最严重的贫困社区中，通常心理健康服务的可及性非常有限。这并不是因为所有治疗师和精神病学家都聚集在富裕地区，而是因为缺乏受过培训的医疗保健专业人员。事实上，根据卫生资源和服务中心的数据，近一半的美国人都居住在被认为是“联邦指定心理健康专业人员短缺地区”的区域（社会解决方案，2022年）。这使得心理健康专业人员的短缺问题比其他任何医疗或保健专业都要严重。
