  prefs: []
  type: TYPE_NORMAL
- en: '23: Implementing Role-Based Access Control (RBAC)'
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: '"Write a back-end program in [Node.js/etc.] to implement Role-Based Access
