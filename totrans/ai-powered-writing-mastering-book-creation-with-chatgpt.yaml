    ****o**r** ****st**yle** ****i**f** ****i**t**’****s**** ****impo**rtan**t ****f**or**
    ****yo**ur** ****pro**jec**t. ****F**or** ****ins**tanc**e, “****Wr**ite** ****th**is**
    ****expl**anatio**n ****i**n** ****a**** ****prof**ession**al ****to**ne**” ****o**r**
    “****Ma**ke** ****th**is** ****te**xt** ****conve**rsation**al ****a**nd** ****eng**agin**g.”'
