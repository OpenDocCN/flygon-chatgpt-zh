  zh: '* * *'
- en: 'Step 4: Prompt Templates You Can Reuse'
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 第4步：可重复使用的提示模板
- en: 'Save and re-use these universal prompt formulas:'
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 保存并重复使用这些通用提示公式：
- en: “Act as a [role] and help me [goal]...”
