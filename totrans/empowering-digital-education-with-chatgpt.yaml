- en: The review highlights various axial codes and open codes that arise in the context
    of human–AI interaction in education. The codes encompass social, ethical, technical,
    pedagogical, and policy-related issues that need to be considered by educational
    institutions when integrating AI into education.
  id: totrans-407
  prefs: []
  type: TYPE_NORMAL
  zh: 本综述突出了在教育领域人机交互背景下出现的各种轴向代码和开放代码。这些代码涵盖了社会、伦理、技术、教学和政策相关的问题，这些问题需要在教育机构将人工智能整合到教育中时予以考虑。
- en: '2.4.2 Themes: AI and Emerging Technologies in Education'
  id: totrans-408
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2.4.2 主题：教育中的人工智能和新兴技术
- en: '2.4.2.1 Theme I: Development Phase'
  id: totrans-409
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 2.4.2.1 主题 I：发展阶段
- en: The primary focus of AI initiatives in education is to adopt a development approach
    employing a combination of qualitative and quantitative research methods. A developmental
    phase involves conducting a qualitative study to identify essential factors to
    be incorporated into the research. For instance, [Magsamen-Conrad and Dillon (2020)](#ch10.xhtml#r067)
    used a focused ethnographic approach to examine how mobile technology diffuses
    across the lifespan, in real-time, and within a multi-generational population,
    such as early-stage innovation-decision, the decision to adopt, and late-stage
    adoption (confirmation). In the same vein, the review suggests that a qualitative
    study should be conducted to determine the critical features of AI-ChatGTP applications
    that drive their acceptance, adoption, and use, leading to benefits beyond those
    expected. Importantly, the stages of innovation decision to adopt should be based
    on the knowledge acquired, intent (critical decision stage), and continued use.
    By conducting a qualitative study, the identification of an extensive and critical
    set of features can be achieved, which will go beyond the existing literature
    ([Gao et al. 2023](#ch10.xhtml#r041)). The qualitative study will help to identify
    reasons why the adoption of AI ChatGPT applications yields different or contradictory
    outcomes in educational research ([Mariani et al., 2023](#ch10.xhtml#r068)). Given
    that AI and ChatGPT are relatively new dominant applications, the potential of
    their combination is still unclear, and more research is necessary to understand
    their full potential. The qualitative study should then be followed by a quantitative
    study to establish statistical conclusions ([Juric et al., 2020](#ch10.xhtml#r056))
    and identify the most crucial features driving the adoption and usage of AI-powered
    educational technologies. This follows the approach adopted by [Ofosu-Ampong and
    Acheampong (2022)](#ch10.xhtml#r078) in which a quantitative study was used to
    identify the most important contactless technology features that drive adoption,
    usage, and benefits in times of pandemic. In short, a qualitative study can be
    used to understand the essential features worth prioritizing (barriers to adoption)
    while a quantitative study can help validate and understand proposed networks
    that produce intended outcomes.
  id: totrans-410
  prefs: []
  type: TYPE_NORMAL
  zh: 教育领域人工智能倡议的主要焦点是采用一种结合定性和定量研究方法的开发方法。开发阶段包括进行定性研究，以确定需要纳入研究的基本因素。例如，[Magsamen-Conrad
    和 Dillon (2020)](#ch10.xhtml#r067) 使用了专注的民族志方法来考察移动技术如何在生命周期内实时扩散，在多代人口中，例如在早期创新决策、采用决策和后期采用（确认）阶段。同样，该综述建议应进行定性研究，以确定推动人工智能-ChatGPT应用接受、采用和使用的关键特征，从而带来超出预期的效益。重要的是，采用创新决策的阶段应基于获得的知识、意图（关键决策阶段）和持续使用。通过进行定性研究，可以识别出广泛且关键的特征集，这将超越现有的文献
    ([Gao 等人 2023](#ch10.xhtml#r041))。定性研究将有助于识别为什么人工智能 ChatGPT 应用的采用在教育研究中产生不同或矛盾的结果
    ([Mariani 等人，2023](#ch10.xhtml#r068))。鉴于人工智能和 ChatGPT 是相对较新的主导应用，它们结合的潜力尚不清楚，需要更多的研究来理解它们的全部潜力。然后，应进行定量研究以建立统计结论
    ([Juric 等人，2020](#ch10.xhtml#r056)) 并确定驱动人工智能教育技术采用和使用的最关键特征。这遵循了 [Ofosu-Ampong
    和 Acheampong (2022)](#ch10.xhtml#r078) 采取的方法，其中使用了定量研究来识别在疫情期间推动采用、使用和效益的最重要无接触技术特征。简而言之，定性研究可以用来理解值得优先考虑的基本特征（采用障碍），而定量研究可以帮助验证和理解产生预期结果的网络。
- en: '2.4.2.1.1 A Paradigm Shift: Emerging Technologies Reshaping Education'
  id: totrans-411
  prefs:
  - PREF_H5
  type: TYPE_NORMAL
  zh: 2.4.2.1.1 范式转变：新兴技术重塑教育
- en: Our review identified the integration of emerging technologies into the learning
    landscape as a paradigm shift embodying transformative potential. Diverse tools
    and platforms, driven by advancements in AI, VR, AR, blockchain, and beyond, present
    creative solutions to age-old challenges in pedagogy ([Chaka, 2023](#ch10.xhtml#r025)).
    The following highlights key emerging technologies that are revolutionizing education
    with far-reaching impact. *AI*, extensively discussed, emerges as a game-changer,
    personalizing learning through adaptive platforms that tailor instruction to individual
    strengths and weaknesses ([Ofosu-Ampong et al., 2023](#ch10.xhtml#r079)). Chatbots
    offer immediate feedback and support, enhancing engagement and performance ([Li
    & Wang, 2023](#ch10.xhtml#r061)). *VR and AR* burst onto the scene, shattering
    traditional boundaries with immersive experiences. VR simulations propel students
    into the heart of history or the throes of scientific experiments, while AR seamlessly
    overlays digital elements onto the real world, enriching textbooks and museum
    visits ([Wei et al., 2021](#ch10.xhtml#r099)).
  id: totrans-412
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的综述确定了将新兴技术融入学习领域作为一种体现变革潜力的范式转变。由AI、VR、AR、区块链等技术的进步所驱动的各种工具和平台，为教育中古老的挑战提供了创新解决方案（[Chaka,
    2023](#ch10.xhtml#r025)）。以下突出了一些正在以深远影响革命化教育的关键新兴技术。广泛讨论的*AI*成为了一个颠覆者，通过适应平台个性化学习，针对个人的优势和劣势进行教学（[Ofosu-Ampong
    et al., 2023](#ch10.xhtml#r079)）。聊天机器人提供即时反馈和支持，增强参与度和表现（[Li & Wang, 2023](#ch10.xhtml#r061)）。*VR和AR*突然出现在舞台上，通过沉浸式体验打破了传统界限。VR模拟将学生带入历史的中心或科学实验的激情中，而AR无缝地将数字元素叠加到现实世界中，丰富了教科书和博物馆参观（[Wei
    et al., 2021](#ch10.xhtml#r099)）。
- en: '*Blockchain technology* guarantees the security and integrity of educational
    credentials, a boon for both students and institutions. This decentralized record-keeping
    system eliminates the risk of tampering, streamlining verification, and bolstering
    trust in the credentialing process ([Fedorova & Skobleva, 2020](#ch10.xhtml#r036)).
    *Educational Robotics* ignites a passion for STEM subjects, equipping students
    with hands-on coding, engineering, and problem-solving skills through collaborative
    robotics projects. *Mobile Learning* leverages the ubiquity of smartphones and
    tablets, delivering educational content anytime, anywhere. Personalized learning
    experiences cater to diverse learning styles and preferences. *Gamification* injects
    playful elements like points, badges, and leaderboards, transforming learning
    into an enjoyable and rewarding journey. Student participation and knowledge retention
    soar in these engaging ecosystems ([Ofosu-Ampong, 2020](#ch10.xhtml#r073)).'
  id: totrans-413
  prefs: []
  type: TYPE_NORMAL
  zh: '*区块链技术*保证了教育证书的安全性和完整性，对学生和机构来说都是一大福音。这个去中心化的记录保存系统消除了篡改的风险，简化了验证过程，并增强了认证流程的信任（[Fedorova
    & Skobleva, 2020](#ch10.xhtml#r036)）。*教育机器人*点燃了学生对STEM学科的激情，通过协作机器人项目为学生提供动手编码、工程和解决问题的技能。*移动学习*利用智能手机和平板电脑的普及，随时随地提供教育内容。个性化的学习体验满足多样化的学习风格和偏好。*游戏化*注入了如积分、徽章和排行榜等游戏元素，将学习转变为一个愉快且有益的旅程。在这些引人入胜的生态系统中，学生的参与度和知识保留率大幅提升（[Ofosu-Ampong,
    2020](#ch10.xhtml#r073)）。'
- en: 'The *Internet of Things* (IoT) weaves its magic by connecting physical devices
    and creating smart learning environments. Real-time data collection and analysis
    through interactive whiteboards, sensors, and wearable technologies empower educators
    to personalize instruction and optimize learning outcomes ([Hafezad Abdullah et
    al. 2024](#ch10.xhtml#r048)). Interestingly, we found the progression of emerging
    technologies into three phases: the short-term (2021–2025), mid-term (2025–2030),
    and long-term (2031+) necessary to enhance the future of education. [Table 2.2](#ch10.xhtml#t3)
    shows the technological roadmap, the development or conceptual approaches phase,
    and implications for the future roadmap. For the future road map of emerging technologies,
    we anticipate a focus on human-centered design, promotion of responsible development
    and use, priority on equity and inclusion, and a huge investment in teacher training
    and support. If challenges surrounding the technological roadmap of the emerging
    technologies are addressed, we anticipate an effective, equitable, and engaging
    learning experience for future students.'
  id: totrans-414
  prefs: []
  type: TYPE_NORMAL
  zh: 物联网（IoT）通过连接物理设备和创建智能学习环境，施展其魔法。通过交互式白板、传感器和可穿戴技术进行实时数据收集和分析，使教育工作者能够个性化教学并优化学习成果
    ([Hafezad Abdullah et al. 2024](#ch10.xhtml#r048))。有趣的是，我们发现新兴技术向三个阶段的发展：短期（2021–2025）、中期（2025–2030）和长期（2031+），这是为了增强教育的未来。[表2.2](#ch10.xhtml#t3)
    显示了技术路线图、发展或概念方法阶段以及未来路线图的影响。对于新兴技术的未来路线图，我们预计将重点关注以人为本的设计、促进负责任的发展和利用、优先考虑公平性和包容性，以及大量投资于教师培训和支援。如果解决了新兴技术技术路线图周围的问题，我们预计将为未来的学生提供有效、公平且引人入胜的学习体验。
