  zh: 感谢您选择这本书！如果您喜欢那些讲述真实生活、沟通和联系的故事，您并不孤单。我很乐意邀请您加入 PJ Chavaux 书友会——一个不断壮大的读者社区，我们在这里分享想法、留下评论，并提前获取新书发布。
- en: Whether you want to leave a quick comment, join a discussion, or be the first
    to know about what's next,this is your place.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 无论您是想留下简短的评论、加入讨论还是想首先了解接下来会发生什么，这里就是您的去处。
