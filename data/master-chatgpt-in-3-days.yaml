- en: Chapter I
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 第一章
- en: Introduction to ChatGPT and AI
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT和AI简介
- en: 1.1\. What is ChatGPT?
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 1.1. 什么是ChatGPT？
- en: ChatGPT was launched in November 2022 and quickly captured worldwide attention,
    reaching 10 million daily active users in its first month. Never before has a
    technology been adopted so quickly. This growth, ten times faster than that of
    platforms such as Instagram or Google, marked a before and after in the history
    of technology.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT于2022年11月发布，并迅速吸引了全球关注，在第一个月就达到了1000万日活跃用户。没有任何一项技术被如此快速地采用。这种增长，比Instagram或Google等平台的增长速度快十倍，标志着技术史上的一个分水岭。
- en: ChatGPT is revolutionary because it is an advanced Artificial Intelligence (AI)
    model capable of understanding and generating human language coherently and contextually.
    Unlike other systems designed for specific tasks, ChatGPT adapts to various applications,
    from answering technical questions to creating creative content. This paradigm
    shift represents a breakthrough in AI, enabling more natural interactions between
    humans and machines. However, it also means that we must learn how to interact
    with these models to use them properly, which can be challenging for some people.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT之所以革命性，是因为它是一个高级的人工智能（AI）模型，能够连贯和有上下文地理解和生成人类语言。与其他为特定任务设计的系统不同，ChatGPT能够适应各种应用，从回答技术问题到创建创意内容。这种范式转变代表了人工智能领域的突破，使得人类与机器之间的互动更加自然。然而，这也意味着我们必须学习如何与这些模型互动，以便正确使用它们，这对一些人来说可能具有挑战性。
- en: This book has been created to take you into the fascinating world of ChatGPT.
    You will discover how this tool can change how you communicate, work, and solve
    problems. Throughout these pages, we will break down from the most basic concepts
    of this technology to its most advanced applications, showing you how you can
    take advantage of it whether you are a student, an entrepreneur, or just someone
    who wants to be more efficient in your day-to-day life. We'll dive into prompts
    engineering, explore practical and advanced uses, and even share case studies
    to inspire you. This book is a complete guide to mastering ChatGPT and maximizing
    its potential. Get ready to discover how this revolutionary technology can become
    part of your daily life, transforming it in ways you haven't yet imagined.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 这本书的目的是带您进入ChatGPT这个迷人的世界。您将发现这个工具如何改变您沟通、工作和解决问题的方式。在这本书的每一页，我们将从这项技术的最基本概念开始，逐步深入到其最先进的应用，向您展示无论您是学生、企业家，还是只想在日常生活中更加高效的人，如何利用它。我们将深入研究提示工程，探索实用和高级用法，甚至分享案例研究以激发您的灵感。这本书是掌握ChatGPT并最大化其潜力的完整指南。准备好发现这项革命性技术如何成为您日常生活的一部分，以您尚未想象的方式改变它。
- en: ChatGPT can carry on conversations and provide coherent answers on various topics,
    from science and technology to literature and philosophy. Its ability to learn
    from context and follow the conversation thread makes it valuable and versatile.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT可以在各种主题上展开对话，并就科学和技术到文学和哲学等话题提供连贯的答案。它从上下文中学习并跟随对话线索的能力使其变得有价值且多才多艺。
- en: 'To understand how we got here, it is essential to know the context and history
    of this technology. Let''s start: ChatGPT was developed by the company OpenAI.
    This technology is based on Natural Language Processing (NLP), a branch of AI
    that has been growing for several decades. AI, in turn, is a discipline of computer
    engineering whose main objective is to get computers to perform tasks that usually
    require human intelligence. The main objective of NLP is to help computers understand,
    interpret, and generate human language effectively. In other words, it is about
    teaching machines to understand and use the language we humans use to communicate
    with each other.'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 要了解我们是如何到达这里的，了解这项技术的背景和历史是至关重要的。让我们从ChatGPT的开发商OpenAI开始：ChatGPT是基于自然语言处理（NLP）的技术，这是人工智能的一个分支，几十年来一直在不断发展。人工智能反过来是计算机工程的一个学科，其主要目标是让计算机执行通常需要人类智能的任务。自然语言处理的主要目标是帮助计算机有效地理解、解释和生成人类语言。换句话说，这是关于教会机器理解和使用我们人类用来相互沟通的语言。
- en: 'This is crucial because most of the information in the world is in human language,
    whether in books, articles, or social networks. Now, imagine a future in which
    machines not only understand what we say but also can reason in ways that we,
    as humans, can only dream of. It would not simply be a matter of using AI for
    quick searches or machine translations (uses that already exist today) but something
    much more profound: a time when AI could become so advanced in its reasoning that
    it discovers solutions to problems that now seem impossible to solve.'
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 这一点至关重要，因为世界上大部分信息都是以人类语言的形式存在的，无论是书籍、文章还是社交网络。现在，想象一个未来，在这个未来中，机器不仅能够理解我们说的话，而且能够以我们人类只能梦想的方式进行推理。这不仅仅是将人工智能用于快速搜索或机器翻译（这些用途今天已经存在）的问题，而是一个更深刻的时间：当人工智能在推理上变得如此高级，以至于它能够发现现在看似无法解决的问题的解决方案。
- en: Could we, for example, see cures for diseases we have considered incurable or
    discover innovations that today seem like science fiction? This future, which
    may sound utopian or even dystopian, is closer than we imagine. In this book,
    we will explore how AI, and ChatGPT in particular, could be one of the tools that
    guides us towards this new horizon of possibilities.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，我们能否看到我们曾认为无法治愈的疾病的疗法，或者发现今天看起来像是科幻小说的创新？这个可能听起来是乌托邦或甚至反乌托邦的未来，比我们想象的要近。在这本书中，我们将探讨AI，特别是ChatGPT，如何成为引导我们走向这个可能性新天地的工具之一。
- en: 1.2. The workings behind ChatGPT
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 1.2. ChatGPT背后的运作原理
- en: ChatGPT is a Large Language Model (LLM). Stay with these acronyms because they
    will appear throughout this book. A model (computer model, not the flesh-and-blood
    kind) is a program or software that allows us to predict a specific event. For
    example, we use the climate model to know what the weather will be like in the
    next few days to anticipate it. A language model is similar, but instead of predicting
    the weather, it predicts the next word most likely to appear in a sentence, depending
    on the context.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT是一个大型语言模型（LLM）。请记住这些缩写，因为它们将在整本书中多次出现。一个模型（计算机模型，而不是血肉之躯）是一个程序或软件，它允许我们预测一个特定事件。例如，我们使用气候模型来预测未来几天天气的情况，以便提前做好准备。语言模型与此类似，但它不是预测天气，而是根据上下文预测句子中最可能出现的下一个词。
- en: Think of an LLM as a tool that allows a machine to understand human language.
    In addition, an LLM does not just look for the meaning of each word but also tries
    to understand how they relate to each other to capture the whole meaning of a
    sentence or text.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 将LLM想象成一个工具，它允许机器理解人类语言。此外，LLM不仅寻找每个词的含义，还试图理解它们之间的关系，以捕捉句子或文本的整体含义。
- en: 'There are many LLMs, each with its characteristics and peculiarities. One of
    them is GPT, which you are probably familiar with. But... have you ever wondered
    what GPT means? It comes from "Generative Pre-trained Transformer". Let''s break
    it down:'
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 有许多LLM（大型语言模型），每个都有其特点和独特之处。其中之一是GPT，你可能很熟悉。但是……你有没有想过GPT是什么意思？它来自“生成式预训练变换器”。让我们来分解一下：
- en: 'Generative: It is an AI capable of creating or generating something new. In
    this case, it can create text, images, and audio. The video is probably not far
    away.'
  id: totrans-78
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 生成式：这是一种能够创造或生成新内容的AI。在这种情况下，它可以创建文本、图像和音频。视频可能也不会太远。
- en: 'Pre-trained: GPT is already trained with a large amount of data before use.
    Let''s say it is "ready to use" without the need to perform any additional tasks.'
  id: totrans-79
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 预训练：GPT在使用前已经用大量数据进行过训练。换句话说，它“准备好使用”而不需要执行任何额外的任务。
- en: 'Transformer: This is the type of neural network used.'
  id: totrans-80
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 变换器：这是使用的神经网络类型。
- en: Like the human brain, a neural network can learn from the information it processes
    and, over time, improve its ability to process information. This means that ChatGPT
    can understand human natural language and, from that understanding, generate coherent
    responses.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 就像人脑一样，神经网络可以从它处理的信息中学习，并且随着时间的推移，提高其处理信息的能力。这意味着ChatGPT可以理解人类自然语言，并从这个理解中生成连贯的回应。
- en: 'I''m pretty sure you''ve used those customer service chat rooms on websites:
    those frustrating systems where you rarely got a solution to what you needed due
    to their limited capabilities. These old chats worked differently; instead of
    understanding the context of what you were asking, they relied on keywords to
    provide predefined answers. As a result, they mainly offered answers that had
    nothing to do with what you were looking for.'
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 我很确定你使用过那些网站上的客户服务聊天室：那些由于功能有限，你很少得到所需解决方案的令人沮丧的系统。这些旧的聊天工作方式不同；它们不是理解你询问的上下文，而是依赖于关键词来提供预定义的答案。因此，它们主要提供与你要找的内容无关的答案。
- en: Unlike them, ChatGPT, instead of relying on keywords, can analyze the meaning
    of a whole sentence or even a set of sentences and, based on that, give you a
    more accurate and detailed answer. In other words, ChatGPT can better "understand"
    what you are asking it, which means it is less likely to give you irrelevant or
    generic answers, like the old chats.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 与它们不同，ChatGPT不是依赖于关键词，而是可以分析整个句子或一组句子的含义，并基于此给出更准确、更详细的答案。换句话说，ChatGPT能更好地“理解”你提出的问题，这意味着它不太可能给出无关或通用的答案，就像旧的聊天一样。
- en: 1.3.From GPT-1 to OpenAI o1 and beyond
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 1.3. 从GPT-1到OpenAI o1以及更远
- en: To properly understand ChatGPT and how it works, discussing the different models
    that bring it to life is essential. The models presented below are ordered chronologically,
    from the first GPT in 2018 to OpenAI o1 in September 2024\. OpenAI o1 is the first
    model optimized explicitly for executing complex real-time operations, including
    mathematical computations and advanced data processing.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 要正确理解 ChatGPT 以及其工作原理，讨论使其得以实现的不同的模型是至关重要的。下面展示的模型按时间顺序排列，从 2018 年的第一个 GPT 到
    2024 年 9 月的 OpenAI o1。OpenAI o1 是第一个专门优化以执行复杂实时操作（包括数学计算和高级数据处理）的模型。
- en: GPT-1
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: GPT-1
- en: 'In 2018, OpenAI presented its first language model, GPT. Its primary purpose
    was modest but ambitious: to predict the next word in a sentence accurately and
    rigorously. Although this model''s utility was limited, it laid the groundwork
    for what would come. We could say that it was an early demonstration of the power
    of transformer-based language models.'
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 2018 年，OpenAI 展示了其第一个语言模型 GPT。其主要目的是 modest but ambitious：准确且严格地预测句子中的下一个单词。尽管这个模型的应用范围有限，但它为未来奠定了基础。我们可以说，这是基于
    Transformer 的语言模型力量的早期展示。
- en: GPT-2
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: GPT-2
- en: A year later, in 2019, came GPT-2, an improved version. With an even more significant
    amount of data and a much larger model, it was no longer limited to predicting
    individual words but could generate complete sentences fluently. In just one year,
    this technology had made a breakthrough in natural language generation and response
    consistency. This model had 1.5 billion parameters, and the results began approaching
    a more natural language, although there was still some way to go.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 一年后，2019 年，推出了改进版的 GPT-2。由于拥有更多的数据和更大的模型，它不再局限于预测单个单词，而能够流畅地生成完整的句子。仅仅一年，这项技术就在自然语言生成和响应一致性方面取得了突破。这个模型有
    15 亿个参数，结果开始接近更自然的语言，尽管还有很长的路要走。
- en: 'Note: The parameters refer to the connections between the different layers
    of the neural network. The greater the number of parameters, the greater the complexity
    of the network and, in principle, the better the model''s performance.'
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 注意：参数指的是神经网络不同层之间的连接。参数数量越多，网络的复杂性就越大，原则上模型的表现就越好。
- en: GPT-3
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: GPT-3
- en: In 2020, OpenAI achieved a groundbreaking milestone with the introduction of
    GPT-3, a model that redefined the landscape of artificial intelligence. This innovative
    model represented a significant evolution in AI technology, boasting an impressive
    architecture with 175 billion parameters. This vast scale allowed GPT-3 to generate
    remarkably high-quality text, far surpassing its predecessors.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 2020 年，OpenAI 通过推出 GPT-3 实现了一个突破性的里程碑，这个模型重新定义了人工智能的格局。这个创新模型代表了人工智能技术的一次重大进步，拥有令人印象深刻的架构，拥有
    1750 亿个参数。这种庞大的规模使得 GPT-3 能够生成高质量的文字，远远超过了其前辈。
- en: GPT-3's capabilities extended beyond traditional text generation. It demonstrated
    what are known as "emergent skills," meaning that the model could perform a wide
    array of complex tasks that were not specifically programmed into it. For instance,
    while it was initially trained to predict the next word in a sentence, GPT-3 soon
    showcased its ability to translate languages, answer diverse questions, and even
    write cohesive and contextually relevant code.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: GPT-3 的能力超越了传统的文本生成。它展示了所谓的“涌现技能”，这意味着该模型能够执行一系列复杂的任务，而这些任务并没有被特别编程进去。例如，虽然它最初被训练来预测句子中的下一个单词，但
    GPT-3 很快就展示了其翻译语言、回答各种问题和甚至编写连贯且与上下文相关的代码的能力。
- en: This remarkable versatility highlighted a transformative shift in AI, marking
    a pivotal moment in its evolution. The launch of GPT-3 not only raised the bar
    for what AI could achieve but also set the stage for future advancements, fundamentally
    altering the trajectory of research and applications in the field. This milestone
    is now recognized as a turning point in the history of artificial intelligence,
    signaling a new era of capabilities and potential.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 这种非凡的通用性标志着人工智能的一次变革性转变，标志着其演变过程中的一个关键时刻。GPT-3 的推出不仅提高了人工智能能够实现的标准，也为未来的进步奠定了基础，从根本上改变了该领域的研究和应用轨迹。这个里程碑现在被公认为人工智能历史上的一个转折点，标志着能力和潜力的新时代。
- en: GPT-3.5
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: GPT-3.5
- en: Released by OpenAI in June 2021, GPT-3.5 represented a significant improvement
    over GPT-3 with notable advances. Its training with varied data sets, including
    text and code, improved its ability to handle more complex language tasks. This
    training approach enabled GPT-3.5 to understand context better, produce more coherent
    responses, and generate longer content, with fewer problems related to inaccuracies
    or "hallucinations" (when the model generates incorrect or nonsensical information)
    than GPT-3.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: OpenAI 于 2021 年 6 月发布的 ChatGPT 相比 GPT-3 有了显著的改进，并取得了显著的进展。其使用包括文本和代码在内的多种数据集进行训练，提高了其处理更复杂语言任务的能力。这种训练方法使得
    GPT-3.5 能够更好地理解上下文，产生更连贯的回应，并生成更长的内容，与 GPT-3 相比，出现不准确或“幻觉”（当模型生成错误或不合逻辑的信息时）的问题更少。
- en: GPT-3.5 included several versions of the model, some of which showed improved
    accuracy in tracking user intent. In addition, the GPT-3.5 architecture enabled
    the generation of more extended text outputs. It showed better handling of complex
    tasks, such as responding to more intricate prompts in creative writing or assisting
    in programming.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: GPT-3.5 包含了几个模型的版本，其中一些在跟踪用户意图方面表现出更高的准确性。此外，GPT-3.5 的架构使得生成更长的文本输出成为可能。它展示了在处理复杂任务方面的更好表现，例如在创意写作中回应更复杂的提示或在编程中提供协助。
- en: ChatGPT
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT
- en: 'Launched in November 2022, ChatGPT was more than just a technological novelty:
    it became an unprecedented phenomenon. Its adoption increased staggeringly in
    days, making it the fastest-growing application in human history. Suddenly, millions
    worldwide interacted with the system, testing its ability to carry on fluid conversations,
    answer questions, and perform tasks of all kinds. It was a genuine phenomenon
    that shook the technological sphere and how society understands and uses AI.'
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT 于 2022 年 11 月推出，不仅仅是一个技术新玩意：它成为了一种前所未有的现象。它的采用在几天内急剧增加，成为人类历史上增长最快的应用。突然之间，全球数百万人与该系统互动，测试其进行流畅对话、回答问题和执行各种任务的能力。这是一个真正的现象，震撼了技术领域以及社会对
    AI 的理解和应用方式。
- en: For a large part of the population, the AI era began with the launch of ChatGPT.
    This is not entirely correct. As we have seen, OpenAI's GPT-series language models
    have been around since 2018, and the beginnings of AI date back to the 1950s.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 对于很大一部分人口来说，AI 时代始于 ChatGPT 的推出。这并不完全正确。正如我们所见，OpenAI 的 GPT 系列语言模型自 2018 年以来就已经存在，而
    AI 的起源可以追溯到 20 世纪 50 年代。
- en: Although it is easy to confuse ChatGPT with the language models on which it
    is based, such as GPT-3 or GPT-4, ChatGPT is not a model per se but a conversational
    interface that allows the everyday user to interact fluidly and naturally with
    these models. Its goal is to democratize the interaction with these Large Language
    Models  (LLMs), simulating a conversation instead of just generating text in isolation.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管很容易将 ChatGPT 与其基于的语言模型（如 GPT-3 或 GPT-4）混淆，但 ChatGPT 本身不是一个模型，而是一个会话界面，允许普通用户与这些模型流畅自然地互动。其目标是使大众能够民主化地与这些大型语言模型（LLMs）互动，模拟对话而不是孤立地生成文本。
- en: ChatGPT provides context to each response through this personalization layer,
    maintains the conversation thread, answers questions, and allows users to feel
    they are in dialogue with the AI. We will go deeper into how this technology works
    later, but it is essential to remember that the GPT models are in charge of generating
    the content. At the same time, ChatGPT is the tool that allows us to interact
    with them conversationally and straightforwardly, providing an easy-to-use interface
    that removes the technical complexity of the models and facilitates the experience
    for users without advanced knowledge in AI.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT 通过这个个性化层为每个回应提供上下文，维持对话线程，回答问题，并使用户感觉他们正在与 AI 进行对话。我们将在稍后更深入地探讨这项技术的工作原理，但重要的是要记住，GPT
    模型负责生成内容。同时，ChatGPT 是一个工具，它允许我们以对话和直接的方式与之互动，提供了一个易于使用的界面，消除了模型的技术复杂性，并简化了没有高级
    AI 知识的用户的使用体验。
- en: GPT-4
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: GPT-4
- en: GPT -4 was released on March 14, 2023\. ChatGPT had been available for under
    four months when this major upgrade arrived. GPT-4 substantially improved GPT-3.5,
    especially in reasoning, factual accuracy, and handling longer and more complex
    prompts. This model demonstrated a more remarkable ability to understand context
    and generate well-structured, high-quality responses, positioning itself as the
    flagship in the OpenAI model series for months to come.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: GPT-4于2023年3月14日发布。当这次重大升级到来时，ChatGPT已经上市不到四个月。GPT-4在推理、事实准确性和处理更长、更复杂的提示方面显著改进了GPT-3.5。该模型展示了更出色的理解上下文和生成结构良好、高质量响应的能力，使其在接下来的几个月里成为OpenAI模型系列中的旗舰。
- en: Until then, the only advantage ChatGPT Plus users had was access during peak
    demand, i.e., periods of high usage when many users were trying to access simultaneously.
    Yes, during the first few months of its life, ChatGPT experienced constant downtime
    due to the high and unplanned volume of users. If you paid the subscription, you
    could log in even when the system was down, but little else.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 直到那时，ChatGPT Plus用户唯一的优势是在高峰需求期间可以访问，即许多用户同时尝试访问的高使用时段。是的，在其生命的最初几个月里，ChatGPT由于用户数量高且未计划而经历了不断的停机。如果你支付了订阅费，即使系统关闭你也可以登录，但除此之外几乎没有其他好处。
- en: 'The upgrade to GPT-4 provided compelling reasons to subscribe to this service.
    GPT-4 can solve complex problems more accurately, thanks to its broad general
    knowledge and problem-solving skills. It is the most creative and collaborative
    model to date. Here are some of the key advantages this model brought over its
    predecessor:'
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: GPT-4的升级为订阅此服务提供了令人信服的理由。GPT-4由于其广泛的一般知识和解决问题的技能，可以更准确地解决复杂问题。它是迄今为止最具创造性和协作性的模型。以下是该模型相对于其前辈的一些关键优势：
- en: 'Multimodality: GPT-4 processes not only text but also images and audio, which
    means that it can understand and respond to different types of content. This capability
    allows the model to recognize objects in images, listen to and generate audio,
    and respond more completely and naturally. In other words, multimodality makes
    GPT-4 a much more versatile tool, bringing human-machine interaction closer to
    communication similar to the one we have between people.'
  id: totrans-107
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 多模态：GPT-4不仅处理文本，还处理图像和音频，这意味着它可以理解和响应不同类型的内容。这种能力使模型能够识别图像中的物体，听并生成音频，以及更完整、更自然地响应。换句话说，多模态使GPT-4成为一个更加多才多艺的工具，使人机交互更接近于我们之间的人与人之间的交流。
- en: 'Internet connection: GPT-4 can access real-time information over the Internet,
    which means it is no longer limited by a fixed set of knowledge (a significant
    limitation of GPT-3.5). This connection allows it to search for up-to-date data
    and provide more accurate answers, improving its usefulness in recent news queries,
    sports scores, or any research that requires fresh information. This has improved
    its usefulness for queries requiring updated data, such as news, recent research,
    or details of current trends and events.'
  id: totrans-108
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 互联网连接：GPT-4可以通过互联网访问实时信息，这意味着它不再受限于固定知识集（GPT-3.5的一个重大限制）。这种连接使它能够搜索最新数据并提供更准确的答案，提高了其在最近新闻查询、体育比分或需要新鲜信息的任何研究中的实用性。这提高了它对需要更新数据的查询的实用性，例如新闻、最近的研究或当前趋势和事件的细节。
- en: 'Expanded context window: Thanks to a significantly larger context window than
    GPT-3.5, GPT-4 was able to process a larger amount of text, both in each interaction
    and in the total conversation. This allowed it to handle longer and more complex
    discussions, have greater context in extended communications and work with longer
    documents.'
  id: totrans-109
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 扩展的上下文窗口：得益于比GPT-3.5大得多的上下文窗口，GPT-4能够处理更多的文本，无论是在每次交互中还是在整个对话中。这使得它能够处理更长和更复杂的讨论，在扩展通信中拥有更大的上下文，并且能够处理更长的文档。
- en: 'Greater precision and control in response generation: With GPT-4, the tone
    and style adjustment mechanisms were improved, providing responses that better
    matched the context and the user''s needs. In addition, it could distinguish between
    different levels of formality and adapt the content according to the instructions.'
  id: totrans-110
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在响应生成中具有更高的精确度和控制力：GPT-4在调整语调和风格机制方面得到了改进，提供了更好地匹配上下文和用户需求的响应。此外，它能够区分不同级别的正式程度并根据指示调整内容。
- en: 'Reduction of errors and hallucinations: GPT-4''s ability to recognize and avoid
    mistakes or "hallucinations" (when the model generates incorrect or made-up information)
    was optimized. Although imperfect, it was much less prone to provide false data
    than its predecessor, GPT-3.5, making it more reliable in critical applications.'
  id: totrans-111
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 减少错误和幻觉：GPT-4识别和避免错误或“幻觉”（当模型生成错误或虚构信息时）的能力得到了优化。尽管不完美，但它比其前辈GPT-3.5更不容易提供错误数据，使其在关键应用中更加可靠。
- en: 'Improved understanding of complex instructions: GPT-4 excels at understanding
    and executing detailed, multi-step instructions, making it well-suited for complex
    tasks like programming and report generation.'
  id: totrans-112
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提高对复杂指令的理解：GPT-4擅长理解和执行详细的多步骤指令，使其非常适合编程和报告生成等复杂任务。
- en: 'Integration with external tools: Although it relied on tools such as Whisper
    and DALL-E for specific functions, GPT-4 was better integrated with these tools,
    facilitating a smoother workflow. This expanded its versatility and allowed it
    to offer a broader range of services within a single platform.'
  id: totrans-113
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 与外部工具的集成：尽管GPT-4依赖于Whisper和DALL-E等工具进行特定功能，但它与这些工具的集成更好，从而促进了更流畅的工作流程。这扩大了其多功能性，并允许它在单一平台上提供更广泛的服务。
- en: These improvements made GPT-4 a much more robust and versatile model than GPT-3.5,
    expanding its capabilities and making it ideal for a broader range of applications.
    To conclude this section, let's look at an official comparison of GPT-4 and GPT-3.5\.
    OpenAI evaluated both language models by performing different tests, including
    simulations of tests designed for humans. The results of these tests are shown
    in Figure 1, which compares the performance of both models.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 这些改进使GPT-4比GPT-3.5成为一个更加健壮和多功能的模型，扩展了其功能，使其适用于更广泛的应用。为了总结本节，让我们来看一下GPT-4和GPT-3.5的官方比较。OpenAI通过执行包括为人类设计的测试模拟在内的不同测试，评估了这两种语言模型。这些测试的结果显示在图1中，比较了两种模型的性能。
- en: '![A graph with green and blue bars  Description automatically generated](image_rsrc3PG.jpg)'
  id: totrans-115
  prefs: []
  type: TYPE_IMG
  zh: '![带有绿色和蓝色条的图表，描述自动生成](image_rsrc3PG.jpg)'
- en: 'Figure 1\. Results in different tests GPT-3.5 vs GPT-4\. Source: OpenAI'
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 图1. 不同测试中的GPT-3.5与GPT-4的结果。来源：OpenAI
- en: 'The graph shows a fascinating reality: GPT-4 excels in numerous areas where
    its predecessor, GPT-3.5, failed to excel. This shows us that GPT-4 is not simply
    an improved version of GPT-3.5 but has outperformed its predecessor in various
    fields, thus expanding its usefulness and applicability.'
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 图表显示了令人着迷的现实：GPT-4在许多领域都优于其前辈GPT-3.5，这些领域GPT-3.5未能表现出色。这表明GPT-4不仅仅是GPT-3.5的改进版本，它在各个领域都超越了其前辈，从而扩大了其有用性和适用性。
- en: GPT-4o
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: GPT-4o
- en: At the beginning of 2024, rumors circulated within the AI community suggesting
    that OpenAI was not training GPT-5\. As the year progressed, expectations for
    releasing a new model diminished. However, in a characteristic move that surprised
    many, OpenAI announced a new model to be unveiled at their upcoming presentation.
    This model is designated GPT-4o, where the "o" stands for "Omni." This latest
    iteration signifies a significant advancement, as it can simultaneously generate
    and comprehend text, images, and audio. This multimodal capacity indicates that
    it can even process video content.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 2024年初，AI社区中流传着关于OpenAI没有训练GPT-5的传言。随着年份的推进，发布新模型的期望逐渐降低。然而，OpenAI采取了一种令许多人惊讶的举措，宣布将在即将到来的演示中推出一款新模型。这款模型被指定为GPT-4o，其中的“o”代表“Omni”。这一最新版本标志着重大进步，因为它可以同时生成和理解文本、图像和音频。这种多模态能力表明它甚至可以处理视频内容。
- en: Although the video functionality is integrated into this native version of GPT-4o,
    it is essential to note that this feature is currently unavailable to users, with
    a promise of future release. Users familiar with the ChatGPT Plus version might
    reminisce about the capabilities of GPT-4, which could dictate responses, read
    answers aloud, and generate images. While these functionalities hold, the key
    distinction lies in the underlying operations that support GPT-4o.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然视频功能已集成到GPT-4o的本地版本中，但必须注意的是，此功能目前对用户不可用，并承诺未来将发布。熟悉ChatGPT Plus版本的用户可能会回忆起GPT-4的功能，包括能够口述回复、大声朗读答案和生成图像。尽管这些功能仍然存在，但关键的区别在于支持GPT-4o的底层操作。
- en: Unlike its predecessor, GPT-4, which relied on external tools and systems for
    handling non-text formats, GPT-4o features an inherent ability to understand audio,
    images, and videos directly without requiring any conversion. Traditional models
    would convert audio to text or use other means to process different data types.
    In contrast, GPT-4o's "native" comprehension allows it to engage with various
    inputs in their original formats, significantly enhancing both speed and efficiency
    in generating responses. While GPT-4 depended on auxiliary systems to interpret
    formats beyond text, GPT-4o emerged as a comprehensive multimodal model fully
    equipped for the seamless processing of audio, images, and video.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 与其前辈GPT-4不同，GPT-4依赖于外部工具和系统来处理非文本格式，而GPT-4o具有直接理解音频、图像和视频的内在能力，无需任何转换。传统模型会将音频转换为文本或使用其他方法来处理不同类型的数据。相比之下，GPT-4o的“原生”理解能力使其能够以原始格式处理各种输入，显著提高了生成响应的速度和效率。虽然GPT-4依赖于辅助系统来解释文本格式之外的其他格式，但GPT-4o作为一个全面的多模态模型，完全配备了无缝处理音频、图像和视频的能力。
- en: This model offers practical applications for users. For instance, you can present
    ChatGPT with a photograph if you encounter issues adjusting the saddle on your
    bicycle, enabling it to diagnose the problem. Additionally, if you're unsure what
    to cook based on your pantry ingredients, sharing an image of what’s available
    in your fridge will allow the model to assist you in meal planning. Furthermore,
    GPT-4o can analyze complex graphs about work-related data, providing valuable
    insights.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 此模型为用户提供实际应用。例如，如果你在调整自行车座椅时遇到问题，可以向ChatGPT展示一张照片，使其能够诊断问题。此外，如果你不确定根据你的储藏室食材要做什么菜，分享冰箱里可用的食物图片将允许模型帮助你进行餐食计划。此外，GPT-4o还可以分析关于工作相关数据的复杂图表，提供有价值的见解。
- en: For those wishing to narrow their focus on specific parts of an image, a drawing
    tool is available within the mobile app, allowing users to annotate or highlight
    interest areas, as illustrated in Figure 2.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 对于那些希望专注于图像特定部分的人来说，移动应用内提供了一个绘图工具，允许用户注释或突出感兴趣的区域，如图2所示。
- en: '![A black tube on a bicycle  Description automatically generated](image_rsrc3PH.jpg)'
  id: totrans-124
  prefs: []
  type: TYPE_IMG
  zh: '![自行车上的黑色管子  自动生成的描述](image_rsrc3PH.jpg)'
- en: Figure 2\. Example of the uploaded image to ChatGPT using the drawing tool
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 图2. 使用绘图工具上传到ChatGPT的图片示例
- en: To initiate this multimodal interaction with ChatGPT, users can tap the camera
    button to capture an image or select a pre-existing one. If using an iOS or Android
    device, tapping the "+" button will suffice to begin. Users can also comment on
    multiple images or use the drawing tool to direct the model's attention appropriately.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 要启动与ChatGPT的多模态交互，用户可以点击相机按钮来捕捉一张图片或选择一个现有的图片。如果使用iOS或Android设备，点击"+"按钮即可开始。用户还可以对多张图片进行评论或使用绘图工具来适当地引导模型的注意力。
- en: Multimodal models such as GPT-4o leverage sophisticated linguistic reasoning
    to process various inputs, ranging from ordinary photographs and screenshots to
    documents that contain a mix of textual and visual elements. This capability represents
    a paradigm shift in how artificial intelligence can interact with and understand
    diverse forms of human communication.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 类似于GPT-4o这样的多模态模型利用复杂的语言推理来处理各种输入，从普通的照片和截图到包含文本和视觉元素的文档。这种能力代表了人工智能与理解人类沟通多样形式的一种范式转变。
- en: OpenAI o1
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: OpenAI o1
- en: 'Today, we have achieved developments in language models that were unthinkable
    a few years ago. ChatGPT was a real revolution worldwide, thanks to the GPT-3
    language model underpinning it. GPT-3 generated text with remarkable consistency,
    quickly, and relatively accurately. The arrival of GPT-4 represented a significant
    leap forward: it generated text faster, with greater accuracy, and better performance
    in complex tasks.'
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 今天，我们在语言模型方面取得的进展是几年前无法想象的。ChatGPT的全球革命性变革，得益于其背后的GPT-3语言模型。GPT-3能够快速、相对准确地生成具有显著一致性的文本。GPT-4的问世代表了一个重大的飞跃：它生成文本的速度更快，准确性更高，在复杂任务中的表现也更好。
- en: However, there was a common problem with these models. When formulating a question,
    the models tended to provide an immediate answer without considering the complexity
    of the question. For example, questions such as "What is the capital of Spain?"
    are straightforward to answer. However, others, such as "How does the Heisenberg
    uncertainty principle affect our understanding of the behavior of subatomic particles
    in quantum physics?" require further analysis. Regardless of the complexity, the
    models offered immediate answers, often leading to errors due to lack of reflection.
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，这些模型存在一个共同问题。在构建问题时，模型往往在没有考虑问题的复杂性情况下立即给出答案。例如，“西班牙的首都是哪里？”这样的问题很容易回答。然而，其他问题，如“海森堡不确定性原理如何影响我们对量子物理中亚原子粒子行为的理解？”则需要进一步分析。无论问题的复杂性如何，模型都提供了即时答案，通常由于缺乏反思而导致错误。
- en: Responding without thinking can lead to incorrect answers, especially in complex
    contexts.
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 不加思考地回应可能会导致错误的答案，尤其是在复杂的环境中。
- en: This is where OpenAI o1 comes in. Although it is based on the same technology,
    this model differs from the GPT series in that it does not rush to give an immediate
    response. First, it processes our request, analyzes it, and studies the best response
    methods. This may not make much difference in trivial tasks, but it is a real
    revolution in the scientific field. This is the first release in a new series
    of models. OpenAI CEO Sam Altman stated that this model is equivalent to when
    GPT-2 was launched; there is still a long way to go.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是OpenAI o1的用武之地。尽管它基于相同的技术，但这个模型与GPT系列的不同之处在于它不会急于给出即时回应。首先，它处理我们的请求，分析它，并研究最佳的回应方法。这在琐碎的任务中可能不会带来太大的差异，但在科学领域这是一个真正的革命。这是新系列模型的第一款发布。OpenAI首席执行官山姆·奥特曼表示，这个模型相当于GPT-2发布时的情况；还有很长的路要走。
- en: Next, in Figure 2, a comparison between the GPT-4o, 01-preview (available to
    GPT Plus users), and o1 (soon to be available to paid subscribers) models is presented.
    This comparison measures performance on math, code, and Ph.D.-level science questions,
    respectively, from left to right.
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，在图2中，展示了GPT-4o、01-preview（可供GPT Plus用户使用）和o1（即将对付费订阅者开放）模型之间的比较。从左到右，这个比较分别测量了数学、代码和博士水平科学问题的性能。
- en: '![A graph of different colored bars  Description automatically generated](image_rsrc3PJ.jpg)'
  id: totrans-134
  prefs: []
  type: TYPE_IMG
  zh: '![不同颜色条形的图表，描述自动生成](image_rsrc3PJ.jpg)'
- en: 'Figure 2\. Tests to measure reasoning ability. Source: OpenAI'
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 图2. 测量推理能力的测试。来源：OpenAI
- en: 'Undoubtedly, this is a breakthrough. If mankind manages to develop a model
    capable of generating text but can also reason for itself and self-correct its
    reasoning, we could be closer to achieving superintelligence, Artificial General
    Intelligence (AGI). AI has been capable of playing games like chess or Go better
    than the best players worldwide for several years. This is possible because these
    systems can significantly anticipate future moves, analyzing infinitely more options
    than humans. OpenAI o1 represents the beginning of this type of intelligence applied
    to language. Imagining an AI with the ability to reason at superhuman levels raises
    fascinating questions: Could we cure cancer? Solve riddles of the universe? Eradicate
    global poverty? While these goals may seem distant, we are undoubtedly moving
    in that direction.'
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 毫无疑问，这是一个突破。如果人类能够开发出一个既能生成文本又能自我推理并自我纠正推理过程的模型，我们可能就接近实现超级智能，即通用人工智能（AGI）。AI已经能够好于全球最佳选手玩国际象棋或围棋等游戏好几年了。这是可能的，因为这些系统可以显著预测未来的走法，分析比人类无限多的选项。OpenAI
    o1代表了将此类智能应用于语言的开始。想象一个能够在超人类水平上进行推理的AI，会引发许多有趣的问题：我们能否治愈癌症？解决宇宙的谜团？消除全球贫困？虽然这些目标可能看起来还很遥远，但我们无疑正在朝着这个方向前进。
- en: GPT-5
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: GPT-5
- en: The next OpenAI model is under development but has no official release date
    yet. It is expected to improve reasoning, reliability, and multimodal capabilities,
    including voice, image, and video, surpassing GPT-4\. Although Sam Altman has
    emphasized that there is still work to be done before release, it is rumored that
    significant internal progress has already been made. The release will likely be
    a paid version, following OpenAI's current monetization strategy.
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 下一个OpenAI模型正在开发中，但尚未公布官方发布日期。预计它将提高推理、可靠性和多模态能力，包括语音、图像和视频，超越GPT-4。尽管山姆·奥特曼强调在发布前还有工作要做，但据传闻，内部已经取得了显著的进展。发布可能是一个付费版本，遵循OpenAI当前的货币化策略。
- en: Don't want to miss out on any updates? Join our community and receive a weekly
    email in your inbox with the best news of this world and future updates of this
    book. You can't miss it!
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 不想错过任何更新？加入我们的社区，您将收到每周一封包含这个世界上最好的新闻和本书未来更新的电子邮件。您绝对不能错过！
- en: '![A qr code in a circle  Description automatically generated](image_rsrc3PK.jpg)'
  id: totrans-140
  prefs: []
  type: TYPE_IMG
  zh: '![圆形中的二维码  自动生成的描述](image_rsrc3PK.jpg)'
- en: 'Figure 3\. QR: Join our community'
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3\. QR：加入我们的社区
- en: 1.4\. Limitations
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 1.4\. 局限性
- en: In the previous section, we saw the different OpenAI models and all their potential,
    but this does not mean they are free of limitations. Although they are becoming
    fewer and fewer, it is worth highlighting some of them. The following are the
    main ones.
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 在上一节中，我们了解了不同的 OpenAI 模型及其所有潜在能力，但这并不意味着它们没有局限性。尽管它们的局限性越来越少，但突出一些仍然是有价值的。以下是一些主要局限性。
- en: Biases in training data
  id: totrans-144
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 训练数据中的偏差
- en: AI models, such as ChatGPT, learn from the data on which they are trained. If
    this data contains biases, the models will also remember them, replicating and
    amplifying them in their responses. This can result in discriminatory or biased
    results, as in the case of Amazon, which had to stop using a recruitment algorithm
    that showed a gender bias, penalizing CVs containing the word "female". To mitigate
    these biases, various techniques are applied, such as careful curation of training
    data, inclusion of more diverse data, and implementation of subsequent adjustments.
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能模型，如 ChatGPT，从它们训练的数据中学习。如果这些数据包含偏差，模型也会记住它们，并在其回答中复制和放大它们。这可能导致歧视性或偏见的结果，例如亚马逊不得不停止使用一个显示性别偏差的招聘算法，该算法惩罚包含“女性”一词的简历。为了减轻这些偏差，应用了各种技术，例如仔细编辑训练数据、包含更多样化的数据以及实施后续调整。
- en: Confusion between fact and fiction (hallucinations)
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 事实与虚构之间的混淆（幻觉）
- en: ChatGPT- Language models like me often have a limitation known as "hallucinations".
    This occurs because our main function is to predict the next most likely word
    in a sentence, based on our training with large amounts of text (including both
    fact and fiction). By not "understanding" information as humans do and only replicating
    language patterns, we can generate answers that seem convincing, but are incorrect
    or made up. So, although we try to be accurate, we do not always adequately distinguish
    fact from fiction.
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT-像我这样的语言模型通常有一个被称为“幻觉”的局限性。这是因为我们的主要功能是根据大量文本（包括事实和虚构）的训练来预测句子中下一个最可能出现的单词。由于我们不像人类那样“理解”信息，只是复制语言模式，我们可以生成看似令人信服的答案，但实际上是错误的或虚构的。因此，尽管我们试图保持准确，但我们并不总是能够充分区分事实与虚构。
- en: 'Hallucinations are one of the most significant and most dangerous limitations
    of LLMs. To explain what they are, I decided to ask ChatGPT, and this is what
    it told us:'
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 幻觉是大型语言模型（LLM）最显著且最危险的局限性之一。为了解释它们是什么，我决定询问 ChatGPT，这是它告诉我们的：
- en: Accuracy of bibliographic references
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 参考文献的准确性
- en: Although all ChatGPT users, including the free versions, now have access to
    the Internet, the bibliographic references are often inaccurate. The links provided
    may also be incorrect, lead to unrelated topics, or even result in broken links.
    Therefore, reviewing and verifying the information provided is essential to ensure
    its accuracy.
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管所有 ChatGPT 用户，包括免费版本的用户，现在都可以访问互联网，但参考文献往往不准确。提供的链接也可能不正确，导致无关话题，甚至出现断链。因此，审查和验证提供的信息是确保其准确性的关键。
- en: Limitations in specialized tasks
  id: totrans-151
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 专业化任务中的局限性
- en: ChatGPT may have difficulty performing particular and specialized tasks, mainly
    when dealing with highly complex technical or scientific language. While it can
    handle various general topics, its performance may be limited when faced with
    highly specialized terminology, scientific niche jargon, or areas where a deep
    understanding of the context is required. In these cases, the results may not
    be accurate, and it is crucial to have the intervention of a human expert to validate
    and adjust the information provided.
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT 在执行特定和专业化任务时可能存在困难，尤其是在处理高度复杂的技术或科学语言时。虽然它可以处理各种一般性话题，但当面对高度专业化的术语、科学领域的行话或需要深入理解背景的情况下，其表现可能受限。在这些情况下，结果可能不准确，并且需要人类专家的介入来验证和调整提供的信息。
- en: Chapter II
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 第二章
- en: Getting started with ChatGPT
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 开始使用 ChatGPT
- en: 2.1\. Creating an account
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 2.1\. 创建账户
- en: 'Creating a ChatGPT account is a quick and easy process. Just follow these steps:'
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 创建 ChatGPT 账户是一个快速且简单的过程。只需遵循以下步骤：
- en: Open your browser and visit [chat.openai.com](https://chat.openai.com/).
  id: totrans-157
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 打开您的浏览器并访问 [chat.openai.com](https://chat.openai.com/)。
- en: 'Click on "Subscribe": On the home page, click the " Subscribe " button. Don''t
    worry—it''s free.'
  id: totrans-158
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 点击“订阅”：在主页上点击“订阅”按钮。不用担心——这是免费的。
- en: 'Complete the registration form: Enter your email address and a password. You
    can also register with your Google or Microsoft account for speed and convenience.'
  id: totrans-159
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 完成注册表单：输入您的电子邮件地址和密码。您也可以使用 Google 或 Microsoft 账户进行注册，以获得快速和便捷的体验。
- en: 'Verify your email: OpenAI will send you a verification email. Open the email
    and follow the instructions to verify your account.'
  id: totrans-160
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 验证您的电子邮件：OpenAI 将向您发送验证电子邮件。打开电子邮件并按照指示验证您的账户。
- en: 'Login to your account: Once you have verified your email address, you can log
    in to your OpenAI account and access ChatGPT from the main menu.'
  id: totrans-161
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 登录您的账户：一旦您验证了您的电子邮件地址，您就可以登录到您的 OpenAI 账户，并从主菜单访问 ChatGPT。
- en: 'Complete additional information: When you log in for the first time, you will
    be asked for your first and last name.'
  id: totrans-162
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 完成附加信息：当您首次登录时，您将被要求提供您的姓名和姓氏。
- en: 'SMS Verification: You must provide your phone number for SMS verification.
    Enter the code you receive.'
  id: totrans-163
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 短信验证：您必须提供您的电话号码进行短信验证。输入您收到的代码。
- en: That's it! You can now access ChatGPT and start using it for various tasks.
  id: totrans-164
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 就这些！现在您可以使用 ChatGPT 并开始用它来完成各种任务。
- en: Once logged in, you will see the main screen, where you can type your query
    in the highlighted text box.
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 登录后，您将看到主屏幕，您可以在高亮文本框中输入您的查询。
- en: '![A screenshot of a chat  Description automatically generated](image_rsrc3PM.jpg)'
  id: totrans-166
  prefs: []
  type: TYPE_IMG
  zh: '![聊天截图，自动生成描述](image_rsrc3PM.jpg)'
- en: Prompt - Explain to me how to cook a Spanish omelet, briefly, please.
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 提示 - 请简要解释如何烹饪西班牙煎蛋卷。
- en: 'For example, suppose you want to know how to cook a potato omelet. Type in
    the text box the following:'
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，假设您想知道如何烹饪土豆煎蛋卷。在文本框中输入以下内容：
- en: After typing your query, press the Enter key or click the Submit button (arrow
    pointing up). Then, wait a few seconds while ChatGPT processes your request. Once
    completed, you will receive a response in the chat window.
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 在输入您的查询后，按 Enter 键或点击提交按钮（向上箭头）。然后，等待几秒钟，让 ChatGPT 处理您的请求。一旦完成，您将在聊天窗口中收到回复。
- en: ChatGPT will provide you with an easy-to-follow answer that follows your instructions.
    If you have further questions about a topic, such as the process of cooking a Spanish
    omelet, you can continue to give instructions, and ChatGPT will continue to provide
    you with information.
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT 将为您提供遵循您指示的易于理解的答案。如果您对某个主题有进一步的问题，例如烹饪西班牙煎蛋卷的过程，您可以继续给出指示，ChatGPT 将继续为您提供信息。
- en: 2.2\. Frequently Asked Questions
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 2.2\. 常见问题
- en: Here are some basic questions that may help to clarify common doubts about the
    use of ChatGPT
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一些基本问题，可能有助于澄清关于 ChatGPT 使用的常见疑问
- en: 2.2.1\. What is a prompt?
  id: totrans-173
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2.2.1\. 什么是提示？
- en: A prompt is an instruction you give the LLM to perform a task. It is like talking
    to it or writing down what you want it to do, similar to talking to an online
    person with a wealth of knowledge. Prompts can vary from a simple question to
    several sentences or a complete context, allowing us to generate more accurate
    answers. If we feed ChatGPT with the correct information, we can explore many
    possibilities and access knowledge.
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 提示是您给 LLM 的指令以执行任务。这就像与它交谈或写下您希望它执行的操作，类似于与一个知识丰富的在线人物交谈。提示可以从一个简单的问题到几个句子或一个完整的上下文，使我们能够生成更准确的答案。如果我们向
    ChatGPT 提供正确的信息，我们可以探索许多可能性并获取知识。
- en: The quality of our inputs determines the quality of the responses. Providing
    detailed inputs allows the model to deliver more personalized responses tailored
    to our needs and expectations. The key to getting the most out of ChatGPT or other
    LLMs lies in the quality of our information.
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 我们输入的质量决定了我们得到的回答的质量。提供详细的输入允许模型提供更符合我们需求和期望的个性化回答。从 ChatGPT 或其他大型语言模型中获得最大收益的关键在于我们信息的质量。
- en: 'Let''s see the effectiveness of different levels of instruction with three
    examples:'
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们通过三个例子来看看不同层次指示的效果：
- en: Basic Prompt - Write a short story
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 基本提示 - 写一个短故事
- en: Prompt in some detail - Write a short story set in a medieval world, with a
    young adventurous hero.
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: 提示的详细说明 - 写一个设定在中世纪世界的短故事，有一个年轻勇敢的英雄。
- en: Prompt in more detail  - Write a short story of approximately 500 words, set
    in a medieval world, where a young hero named Aron, accompanied by his wolf, embarks
    on an adventure searching for a legendary sword, facing challenges and mystical
    creatures.
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 更详细的提示 - 写一个大约500字的短篇小说，设定在中世纪世界，讲述一个名叫Aron的年轻英雄，在他的狼的陪伴下，踏上寻找传说中的剑的冒险之旅，面对挑战和神秘生物。
- en: Use these prompts with ChatGPT, and you will notice that the first answer is
    general, while the last one, thanks to the details provided, offers an answer
    that is more in line with our needs.
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 使用这些提示与ChatGPT进行交流，你会发现第一个答案是通用的，而最后一个答案，得益于提供的详细信息，提供了一个更符合我们需求的答案。
- en: 2.2.2\. Is ChatGPT available free of charge?
  id: totrans-181
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2.2.2\. ChatGPT是否免费？
- en: Yes! ChatGPT is free and can be used for writing, programming, learning new
    things, and much more. However, there is also a subscription option called ChatGPT
    Plus, which costs $20 per month.
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 是的！ChatGPT是免费的，可用于写作、编程、学习新事物等更多用途。然而，还有一个名为ChatGPT Plus的订阅选项，每月费用为20美元。
- en: 'With ChatGPT Plus, you get access to additional benefits such as:'
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 使用ChatGPT Plus，您可以获得以下额外好处：
- en: Priority access to the advanced OpenAI o1 and Canvas model.
  id: totrans-184
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 优先访问高级OpenAI o1和Canvas模型。
- en: DALL-E 3 image generation tool.
  id: totrans-185
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: DALL-E 3图像生成工具。
- en: The latest performance improvements and updates.
  id: totrans-186
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 最新性能改进和更新。
- en: This paid option is ideal for those who want an even more complete and faster
    experience.
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: 这个付费选项非常适合那些想要更完整和更快体验的人。
- en: 2.2.3\. Is there a ChatGPT application?
  id: totrans-188
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2.2.3\. 有ChatGPT应用程序吗？
- en: Yes, there is an official ChatGPT app for iPhone and Android. It is important to
    download the official OpenAI app to avoid fake apps, as many apps that are not
    affiliated with OpenAI can be found in the Apple App Store and Google Play Store.
    In addition, both applications are completely free and have received good reviews.
    These are highly recommended if you want quick access to ChatGPT from your mobile.
    Plus, you can dictate to them.
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: 是的，有官方的ChatGPT应用程序适用于iPhone和Android。下载官方OpenAI应用程序很重要，以避免假冒应用程序，因为苹果应用商店和谷歌应用商店中可以发现许多与OpenAI无关的应用程序。此外，这两个应用程序都是完全免费的，并获得了良好的评价。如果您想快速从手机访问ChatGPT，这些应用程序非常推荐。此外，您还可以向它们口述指令。
- en: On the other hand, a ChatGPT application for macOS is also available. This application
    allows quick access to the chatbot with a keyboard shortcut. Initially, this Mac
    version was available only to ChatGPT Plus subscribers, but OpenAI has recently
    made it available to all users.
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: 另一方面，macOS上的ChatGPT应用程序也可用。此应用程序允许通过快捷键快速访问聊天机器人。最初，这个Mac版本仅对ChatGPT Plus订阅者开放，但OpenAI最近已将其提供给所有用户。
- en: 2.2.4\. Is ChatGPT safe?
  id: totrans-191
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2.2.4\. ChatGPT是否安全？
- en: AI chatbots such as ChatGPT have raised concerns about their impact on human
    intelligence, misinformation, and privacy. Some fear that chatbots will replace
    human skills, such as essay writing, which has raised concerns about fraud in
    education. Initially, some schools blocked access to ChatGPT, but many have unblocked
    it, and some universities have even incorporated AI courses. Chatbots can also  spread
    misinformation. ChatGPT recommends verifying the information received, as their
    responses are not always accurate. OpenAI warns that the model can generate responses
    that appear credible but are incorrect.
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: 如ChatGPT之类的AI聊天机器人引发了对其对人类智能、错误信息和隐私影响的担忧。有些人担心聊天机器人会取代人类技能，例如写作，这引发了教育中欺诈的担忧。最初，一些学校封锁了对ChatGPT的访问，但许多学校已经解封，一些大学甚至将AI课程纳入其中。聊天机器人也可能传播错误信息。ChatGPT建议验证接收到的信息，因为它们的回答并不总是准确的。OpenAI警告说，该模型可以生成看似可信但实际上是错误的回答。
- en: On the other hand, there are ethical concerns about the data used to train ChatGPT.
    OpenAI has collected data from the Internet without consent, which raises copyright
    issues. In addition, using user data to improve the model is questioned, although
    OpenAI allows you to disable the use of your data for training and chat history.
    If privacy is your primary concern, OpenAI offers data protection options. The
    debate over ethical concerns continues, and the rules surrounding the use of AI
    are likely to evolve.
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: 另一方面，关于用于训练ChatGPT的数据的伦理问题也引起了担忧。OpenAI未经同意从互联网上收集数据，这引发了版权问题。此外，使用用户数据来改进模型的做法也受到质疑，尽管OpenAI允许您禁用您的数据用于训练和聊天记录。如果您对隐私问题最为关心，OpenAI提供数据保护选项。关于伦理问题的辩论仍在继续，围绕AI使用的规则可能也会演变。
- en: 2.2.5\. Will my ChatGPT conversations be used for training?
  id: totrans-194
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2.2.5\. 我的ChatGPT对话会被用于训练吗？
- en: By default, OpenAI uses the conversations to improve its technology. However,
    you can opt out of sharing your data for training. Click on the question mark
    in the bottom left corner, select Settings, and uncheck the "Enhance models for
    all" option.
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: 默认情况下，OpenAI 使用对话来改进其技术。然而，您可以选择不分享您的数据用于训练。点击左下角的问号，选择设置，取消选中“为所有模型增强”选项。
- en: 2.2.6\. Is ChatGPT detectable?
  id: totrans-196
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2.2.6. ChatGPT 是否可检测？
- en: The short answer is yes. Tools attempt to detect texts generated by ChatGPT,
    but none offer completely reliable accuracy. Currently, there is no way to check
    100% whether a text has been written by ChatGPT using detection tools.
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: 简短的回答是肯定的。工具试图检测由 ChatGPT 生成的文本，但没有一个提供完全可靠的准确性。目前，没有方法可以完全通过检测工具来检查文本是否由 ChatGPT
    编写。
- en: The most effective way to do this is to have experience using ChatGPT. Those
    who have worked extensively with this model can often identify specific patterns
    in the responses generated. For example, ChatGPT employs a somewhat impersonal
    and structured writing style. However, this assessment is subjective and depends
    greatly on the reader's perception, so it is not a foolproof method.
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: 最有效的方法是使用 ChatGPT 的经验。那些与该模型广泛合作的人通常可以识别出响应中的一些特定模式。例如，ChatGPT 采用一种相对客观和结构化的写作风格。然而，这种评估是主观的，并且很大程度上取决于读者的感知，因此这不是一个万无一失的方法。
- en: It should be noted that there is nothing wrong with using ChatGPT as a support
    tool to draft or polish a text, as long as the main ideas and content come from
    ourselves. ChatGPT can be an excellent complement to improve the clarity and accuracy
    of our writing, allowing us to maintain control over the message and style.
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: 应该注意的是，将 ChatGPT 作为辅助工具来起草或润色文本并没有什么不妥，只要主要思想和内容来自我们自己。ChatGPT 可以作为一个优秀的补充，以提高我们写作的清晰度和准确性，使我们能够保持对信息和风格的掌控。
- en: In short, although detection tools exist, none are entirely reliable. Ultimately,
    what matters is that we shape the content and maintain our original voice throughout
    the writing process.
  id: totrans-200
  prefs: []
  type: TYPE_NORMAL
  zh: 简而言之，尽管存在检测工具，但没有一个是完全可靠的。最终，重要的是我们在整个写作过程中塑造内容并保持我们的原创声音。
- en: 2.3\. Tips for writing good instructions
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
  zh: 2.3. 编写良好指令的提示
- en: 'The quality of instruction is essential for quality results. By providing well-written
    instructions, conversations will be more rewarding and generate valuable information.
    To achieve this goal, it is recommended that the following aspects be considered
    when formulating our instructions:'
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
  zh: 指令的质量对于获得高质量的结果至关重要。通过提供精心编写的指令，对话将更加有意义，并生成有价值的信息。为了实现这一目标，在制定我们的指令时，建议考虑以下方面：
- en: 'Clarity: It is preferable to be clear and precise. Avoid using ambiguous language
    that may generate confusion.'
  id: totrans-203
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 清晰度：最好是清晰和精确的。避免使用可能引起混淆的含糊语言。
- en: 'Concise: Do not use unnecessary words; brief and concise instruction will facilitate
    understanding and improve the quality of the response.'
  id: totrans-204
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 简洁：不要使用不必要的词语；简明扼要的指令将有助于理解并提高回答的质量。
- en: 'Focus: Set a clear objective to be achieved and be as specific as possible
    in your instruction to keep the conversation focused.'
  id: totrans-205
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 焦点：设定一个明确的要实现的目标，并在指令中尽可能具体，以保持对话的焦点。
- en: Following these tips will make your interactions with ChatGPT more productive,
    allowing you to get better responses in every conversation.
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: 遵循这些提示将使您与 ChatGPT 的互动更加高效，让您在每次对话中获得更好的回答。
- en: The importance of context
  id: totrans-207
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 环境的重要性
- en: When interacting with ChatGPT, providing a clear and detailed context is essential.
    Although we may have a precise idea of what we want to achieve, the model may
    generate a vague or overly general response if we do not explain it enough. This
    may be sufficient for straightforward questions. However, context becomes crucial
    when addressing more complex issues, developing plans, or creating strategies.
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
  zh: 与 ChatGPT 互动时，提供清晰和详细的环境信息至关重要。尽管我们可能对想要实现的目标有一个精确的想法，但如果解释不够充分，模型可能会生成模糊或过于笼统的回答。这可能是对简单问题的充分回答。然而，在处理更复杂的问题、制定计划或创建策略时，环境变得至关重要。
- en: The more detailed the context we provide to ChatGPT, the better it will understand
    and adapt to our needs, providing more accurate and helpful answers. Like a Google
    search, the more specific the information we provide, the more refined and relevant
    the results will be. ChatGPT needs the proper context to be truly effective in
    its responses.
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
  zh: 我们提供给ChatGPT的背景信息越详细，它就越能理解和适应我们的需求，提供更准确和有帮助的回答。就像谷歌搜索一样，我们提供的信息越具体，结果就越精细、越相关。ChatGPT需要适当的背景信息才能在回答中真正有效。
- en: The example below illustrates how the quality of the model's responses can vary
    depending on the quantity and quality of the context.
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: 下面的示例说明了模型回答的质量如何根据背景信息的数量和质量而变化。
- en: Prompt - How can I increase traffic to my website?
  id: totrans-211
  prefs: []
  type: TYPE_NORMAL
  zh: 提示 - 我如何增加网站流量？
- en: Answer without enough context - To increase traffic to your website, consider
    using SEO techniques to improve your search engine rankings and publish content
    on a regular basis.
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
  zh: 缺乏足够背景信息的回答 - 为了增加您网站的流量，考虑使用SEO技术来提高搜索引擎排名并定期发布内容。
- en: 'Problem: While the answer is valid, it is too generic and may not be practical
    depending on the type of website, target audience or specific business objectives.'
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
  zh: 问题：虽然答案有效，但它过于笼统，可能根据网站类型、目标受众或具体业务目标的不同而不够实用。
- en: Question to the model with additional context - I have an online sports accessories
    store and I want to increase traffic to my site. What specific strategies do you
    recommend?
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
  zh: 带有额外背景信息的模型问题 - 我经营一家在线体育配件店，我想增加网站流量。你推荐哪些具体的策略？
- en: Response with context - To increase traffic to your sports accessories online
    store, you might consider collaborating with sports influencers for reviews and
    mentions of your products. It is also effective to launch targeted PPC campaigns
    for search terms related to sports accessories. In addition, make sure your site
    is optimized for mobile and that product descriptions include SEO-relevant keywords.
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
  zh: 带有背景信息的回答 - 为了增加您的在线体育配件店流量，您可以考虑与体育影响者合作进行产品评论和提及。针对与体育配件相关的搜索词启动定向的PPC活动也很有效。此外，确保您的网站针对移动设备进行了优化，并且产品描述中包含SEO相关的关键词。
- en: 'Result: With more specific context about the type of business and target market,
    the model provides detailed and directly applicable suggestions that will likely
    be more effective for the user.'
  id: totrans-216
  prefs: []
  type: TYPE_NORMAL
  zh: 结果：关于业务类型和目标市场的具体背景信息，模型提供了详细且直接适用的建议，这可能会对用户更有效。
- en: This example shows how even a reasonable initial question can significantly
    benefit from additional detail, making the answer more targeted and valuable.
  id: totrans-217
  prefs: []
  type: TYPE_NORMAL
  zh: 这个例子展示了即使是合理的问题，通过增加细节也能显著受益，使回答更加有针对性和有价值。
- en: Throughout the following chapters, we will continue to work on developing skills
    to create adequate instructions and make the most of this powerful tool.
  id: totrans-218
  prefs: []
  type: TYPE_NORMAL
  zh: 在接下来的章节中，我们将继续努力开发技能，以创建适当的指令并充分利用这个强大的工具。
- en: Chapter III
  id: totrans-219
  prefs: []
  type: TYPE_NORMAL
  zh: 第三章
- en: Basic uses of ChatGPT
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT的基本用法
- en: In this chapter, we will dive into the most common uses of ChatGPT, exploring
    how this tool can simplify and enrich our daily lives. From generating texts and
    defining concepts to planning routines and discovering personalized recommendations,
    we will learn how to get the most out of the basic functionalities. In addition,
    we'll get into the basics of prompt engineering, where you'll discover key tips
    and strategies for interacting more effectively with ChatGPT. Finally, we'll explore
    Canvas functionality, a new addition that opens up even more possibilities. Get
    ready to discover how to use ChatGPT for everyday tasks and much more.
  id: totrans-221
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将深入探讨ChatGPT最常见的使用方法，探讨这个工具如何简化并丰富我们的日常生活。从生成文本和定义概念到规划日常活动和发现个性化推荐，我们将学习如何充分利用基本功能。此外，我们还将了解提示工程的基础，在那里您将发现与ChatGPT更有效互动的关键提示和策略。最后，我们将探索画布功能，这是一个新增功能，为更多可能性打开了大门。准备好发现如何使用ChatGPT处理日常任务以及更多。
- en: 3.1\. What can we do with ChatGPT?
  id: totrans-222
  prefs: []
  type: TYPE_NORMAL
  zh: 3.1. 我们可以用ChatGPT做什么？
- en: ChatGPT offers some basic functionalities that can be very useful. By understanding
    and generating human language coherently and contextually, this model opens up
    a world of possibilities. ChatGPT capabilities include text generation, question
    answering, information summarization, and language translation, among many others.
    In the following, we will explore these primary uses, which, although they may
    seem simple, are the foundation on which more complex and customized applications
    are built.
  id: totrans-223
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT提供了一些基本功能，这些功能可能非常有用。通过理解和生成连贯且具有上下文的人类语言，这个模型打开了一个可能性的世界。ChatGPT的功能包括文本生成、问答、信息摘要和语言翻译等，还有很多其他功能。在以下内容中，我们将探讨这些主要用途，尽管它们可能看起来很简单，但它们是构建更复杂和定制应用的基础。
- en: 3.1.1.     Text generation
  id: totrans-224
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3.1.1.     文本生成
- en: As mentioned in Chapter I, ChatGPT is a large language model (LLM), and one
    of its primary functions is text generation. This AI model understands and processes
    human language and uses it to create new and coherent text. When writing, ChatGPT
    considers the context of the conversation so that responses are appropriate to
    the request. For example, if it is provided with prior information on a specific
    topic, it can use those details to provide more personalized responses.
  id: totrans-225
  prefs: []
  type: TYPE_NORMAL
  zh: 如第一章所述，ChatGPT是一个大型语言模型（LLM），其主要功能之一是文本生成。这个AI模型理解并处理人类语言，并使用它来创建新的、连贯的文本。在写作时，ChatGPT会考虑对话的上下文，以确保回答适合请求。例如，如果它提供了关于特定主题的先前信息，它可以使用这些细节来提供更个性化的回答。
- en: Generating text quickly and consistently is beneficial in various applications,
    from answering questions or writing e-mails to programming applications.
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
  zh: 快速且一致地生成文本在各种应用中都有益处，从回答问题或写电子邮件到编程应用。
- en: 3.1.2.     Define terms
  id: totrans-227
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3.1.2.     定义术语
- en: Nowadays, when we encounter unfamiliar terms, ChatGPT offers us an effective
    alternative to online dictionaries or Google searches. This LLM provides definitions
    and contextualizes them to gain a deeper understanding. While ChatGPT is a powerful
    tool, it has limitations and can produce inaccurate answers. It is still a valuable
    resource for intuitively understanding any term. For example, if you're looking
    to understand what "bitcoin" is, instead of Googling and navigating through links
    and ads, you could use ChatGPT and get a straightforward answer.
  id: totrans-228
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，当我们遇到不熟悉的术语时，ChatGPT为我们提供了一个有效的替代方案，即在线词典或Google搜索。这个LLM提供定义，并将它们置于上下文中以获得更深入的理解。虽然ChatGPT是一个强大的工具，但它也有局限性，可能会产生不准确的结果。它仍然是直观理解任何术语的有价值资源。例如，如果你想要了解“比特币”是什么，而不是在Google上搜索并浏览链接和广告，你可以使用ChatGPT并获得一个直接的答案。
- en: Another advantage is that you can adjust the complexity of the definitions according
    to your needs, from technical explanations to simplified versions for a 10-year-old
    child. Let's look at some examples.
  id: totrans-229
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个优点是，你可以根据需要调整定义的复杂度，从技术解释到为10岁儿童简化的版本。让我们看看一些例子。
- en: Prompt - What is quantum computing? Explain it briefly in technical terms.
  id: totrans-230
  prefs: []
  type: TYPE_NORMAL
  zh: 提示 - 什么是量子计算？用技术术语简要解释。
- en: ChatGPT Response - Quantum computing is a field of computer science that uses
    the principles of quantum mechanics to process and store information. It uses
    quantum bits, or qubits, which can be in multiple states simultaneously, allowing
    calculations to be performed more efficiently.
  id: totrans-231
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT回复 - 量子计算是计算机科学的一个领域，它使用量子力学的原理来处理和存储信息。它使用量子比特，或称为qubits，这些比特可以同时处于多种状态，从而使计算更高效。
- en: Prompt - Now explain it to a 10-year-old.
  id: totrans-232
  prefs: []
  type: TYPE_NORMAL
  zh: 提示 - 现在向一个10岁的孩子解释。
- en: ChatGPT - Quantum computing is like a superpower for computers. Regular computers
    use small blocks called "bits" to do calculations. But quantum computers use something
    called "qubits," like super bits that can be simultaneously in many positions.
    This makes quantum computers much faster.
  id: totrans-233
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT - 量子计算是计算机的超级力量。常规计算机使用称为“比特”的小块进行计算。但量子计算机使用一种称为“量子比特”的东西，就像超级比特，可以同时处于许多位置。这使得量子计算机速度更快。
- en: OpenAI's LLM easily adapts to our needs, providing definitions with the level
    of detail and simplicity required, whether it's a technical explanation for experts
    or a simple analogy for beginners. We can also explore more creative approaches,
    such as asking ChatGPT to define a term, such as quantum computing, as a consonant
    rhyme, which we rarely find in a conventional web search.
  id: totrans-234
  prefs: []
  type: TYPE_NORMAL
  zh: OpenAI的大语言模型很容易适应我们的需求，提供所需详细程度和简单性的定义，无论是为专家提供技术解释还是为初学者提供简单的类比。我们还可以探索更多创意方法，例如要求ChatGPT用谐音韵律定义一个术语，如量子计算，这在传统的网络搜索中很少见。
- en: Prompt -
  id: totrans-235
  prefs: []
  type: TYPE_NORMAL
  zh: 提示 -
- en: Define quantum computing in consonant rhyme.
  id: totrans-236
  prefs: []
  type: TYPE_NORMAL
  zh: 用谐音韵律定义量子计算。
- en: ChatGPT -
  id: totrans-237
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT -
- en: Quantum computing is an art,
  id: totrans-238
  prefs: []
  type: TYPE_NORMAL
  zh: 量子计算是一门艺术，
- en: that in quantum bits becomes part of it.
  id: totrans-239
  prefs: []
  type: TYPE_NORMAL
  zh: 在量子比特中成为其一部分。
- en: Qubits are the key,
  id: totrans-240
  prefs: []
  type: TYPE_NORMAL
  zh: 量子比特是关键，
- en: in multiple states are often found,
  id: totrans-241
  prefs: []
  type: TYPE_NORMAL
  zh: 在多种状态下经常被发现，
- en: solving problems with great dexterity,
  id: totrans-242
  prefs: []
  type: TYPE_NORMAL
  zh: 以极大的灵巧解决问题，
- en: is a technology that subtly surprises everyone.
  id: totrans-243
  prefs: []
  type: TYPE_NORMAL
  zh: 是一种微妙地让每个人都感到惊讶的技术。
- en: Not bad for an AI, right?
  id: totrans-244
  prefs: []
  type: TYPE_NORMAL
  zh: 对于一个AI来说，还不错，对吧？
- en: 3.1.3.     Idea generation
  id: totrans-245
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3.1.3.     想法生成
- en: ChatGPT is great for generating innovative ideas. Whether you're looking for
    inspiration for a creative project, need suggestions for solving a problem at
    work, or want to explore new topics for a blog, ChatGPT can help you open new
    doors. Ask, and the model will generate various ideas and suggestions based on
    the knowledge it has learned.
  id: totrans-246
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT非常适合生成创新想法。无论你是在寻找创意项目的灵感，需要解决工作中问题的建议，还是想探索博客的新主题，ChatGPT都能帮助你打开新的大门。提出问题，模型将根据它所学习到的知识生成各种想法和建议。
- en: In addition to providing initial ideas, ChatGPT can help you expand on these
    ideas, exploring different angles and delving into details you may not have considered.
    This tool offers both quantity and quality, allowing you to see new possibilities
    you may not have considered before and fostering a more prosperous and diverse
    creative process. For example, if you start with a general idea for an advertising
    campaign, ChatGPT can suggest specific approaches, slogans, and strategies you
    had not initially contemplated.
  id: totrans-247
  prefs: []
  type: TYPE_NORMAL
  zh: 除了提供初步想法之外，ChatGPT可以帮助你扩展这些想法，探索不同的角度，深入挖掘你可能未曾考虑到的细节。这个工具既提供数量也提供质量，让你看到之前未曾考虑过的新可能性，并促进更加繁荣和多样化的创意过程。例如，如果你从一项广告活动的初步想法开始，ChatGPT可以提出你最初未曾考虑过的具体方法、口号和策略。
- en: If you want the ideas it generates to follow specific rules or constraints,
    you can guide the model by indicating the limitations you consider. For example,
    you could ask it to include specific words, a certain number of letters, or to
    follow a particular theme. This makes the tool more valuable because you can customize
    the ideas. Best of all, ChatGPT never tires of offering new ideas. It is always
    ready to help you, continuously generating suggestions, no matter how many times
    you ask. So, whether the ideas are simplified or more elaborate, ChatGPT is designed
    to meet your creative needs without limit.
  id: totrans-248
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你希望它生成的想法遵循特定的规则或约束，你可以通过指出你认为的限制来引导模型。例如，你可以要求它包含特定的单词、一定数量的字母，或者遵循特定的主题。这使得工具更有价值，因为你可以定制想法。最好的是，ChatGPT永远不会厌倦提供新想法。它总是准备帮助你，不断地生成建议，无论你问多少次。所以，无论想法是简化还是更详细，ChatGPT旨在满足你的创意需求，没有限制。
- en: 3.1.4.     Translation of texts
  id: totrans-249
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3.1.4.     文本翻译
- en: Regarding translation, ChatGPT stands out as a powerful tool, surpassing traditional
    platforms like Google Translate or DeepL in several key areas. One of its primary
    strengths is its ability to understand broader context and nuances. Unlike conventional
    translation tools, which often default to literal interpretations, ChatGPT can
    adjust translations based on the intended meaning, capturing subtle cultural or
    stylistic nuances that would otherwise be lost. This ability makes it particularly
    useful when accuracy in tone is crucial, allowing translations to feel more natural
    and contextually appropriate.
  id: totrans-250
  prefs: []
  type: TYPE_NORMAL
  zh: 关于翻译，ChatGPT作为一个强大的工具，在几个关键领域超越了传统的平台，如Google Translate或DeepL。它的一项主要优势是能够理解更广泛的上下文和细微差别。与通常默认为直译的传统翻译工具不同，ChatGPT可以根据意图调整翻译，捕捉到否则可能丢失的微妙的文化或风格上的细微差别。这种能力使其在需要准确传达语调时特别有用，使翻译感觉更加自然和上下文适当。
- en: Additionally, ChatGPT offers a level of customization that traditional translation
    tools can't match. Users can request a specific level of formality or ask for
    adjustments to fit a particular audience or purpose. This is especially helpful
    when the translation needs to maintain a consistent style, whether for professional,
    casual, or specialized contexts. The flexibility to adapt the translation makes
    ChatGPT a versatile choice, whether addressing a general audience or delving into
    more niche subjects.
  id: totrans-251
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，ChatGPT提供了一种传统翻译工具无法比拟的定制化水平。用户可以要求特定的正式程度或要求调整以适应特定的受众或目的。这在翻译需要保持一致风格时特别有用，无论是专业、休闲还是专业环境。这种适应翻译的灵活性使ChatGPT成为一个多才多艺的选择，无论是面向一般受众还是深入研究更狭窄的主题。
- en: Beyond simple translation, ChatGPT also has the unique ability to explain its
    choices. If you're curious about a specific word or phrase, ChatGPT can provide
    a rationale for why it was chosen, offering insight into linguistic decisions
    that might otherwise remain opaque. This feature is invaluable for language learners
    who want to understand the nuances of a language, allowing them to grasp why one
    translation might be more appropriate than another.
  id: totrans-252
  prefs: []
  type: TYPE_NORMAL
  zh: 不仅仅是简单的翻译，ChatGPT 还具有独特的解释其选择的能力。如果你对某个特定的单词或短语感到好奇，ChatGPT 可以提供选择该词或短语的理由，从而揭示那些可能原本不透明的语言决策。这个功能对于想要理解语言细微差别的学习者来说是无价的，它使他们能够理解为什么某个翻译可能比另一个更合适。
- en: Another advantage of ChatGPT lies in its built-in grammar correction. It doesn't
    just translate what's written; it also corrects errors in the original text, producing
    a coherent and polished translation. This capability stands in contrast to traditional
    tools, which often translate errors as they appear without considering the overall
    clarity of the final output. Consequently, the result is a translation that feels
    more professional and accurate.
  id: totrans-253
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT的另一个优势在于其内置的语法纠错功能。它不仅翻译所写内容，还纠正原文中的错误，产生一个连贯且精致的翻译。这种能力与传统工具形成鲜明对比，传统工具通常将错误原样翻译，而不考虑最终输出的整体清晰度。因此，结果是翻译感觉更加专业和准确。
- en: Moreover, ChatGPT allows for dynamic interaction, enabling users to refine and
    modify translations in real-time. If the initial translation isn’t quite right,
    you can ask for clarifications or specific adjustments without starting from scratch.
    This level of interactivity provides a smoother and more efficient translation
    process compared to the rigid output of Google Translate or DeepL.
  id: totrans-254
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，ChatGPT允许动态交互，使用户能够实时地完善和修改翻译。如果初始翻译不够准确，你可以要求澄清或具体的调整，而不必从头开始。这种交互性比Google
    Translate或DeepL的僵化输出提供了一个更平滑、更高效的翻译过程。
- en: Paraphrasing is another area where ChatGPT shines. It can reformulate sentences
    to retain their original meaning while adapting the structure, style, or tone.
    This ability to go beyond literal translation is a significant advantage when
    presenting information differently without losing its essence. In contrast, standard
    tools may struggle to maintain clarity when asked to rephrase, leading to awkward
    or disjointed translations.
  id: totrans-255
  prefs: []
  type: TYPE_NORMAL
  zh: 改写是另一个ChatGPT擅长的领域。它可以将句子重新表述，以保留其原始意义，同时调整结构、风格或语气。这种超越字面翻译的能力，在以不同的方式呈现信息而不失去其本质时是一个重要的优势。相比之下，标准工具在要求改写时可能难以保持清晰，导致翻译显得尴尬或不连贯。
- en: Specialized fields benefit significantly from ChatGPT’s flexibility. With the
    proper context, it can handle complex terminology, whether in medicine, technology,
    or law, offering a level of precision that generic translation tools sometimes
    lack. ChatGPT can dive into the specifics of jargon, adapting to the needs of
    the text, while Google Translate or DeepL might not always hit the mark in these
    specialized areas.
  id: totrans-256
  prefs: []
  type: TYPE_NORMAL
  zh: 专业领域从ChatGPT的灵活性中受益匪浅。在适当的语境下，它可以处理复杂的专业术语，无论是医学、技术还是法律，提供一种精确度，这是通用翻译工具有时所缺乏的。ChatGPT可以深入到行话的具体细节中，适应文本的需求，而Google
    Translate或DeepL在这些专业领域可能并不总是能击中目标。
- en: Finally, ChatGPT’s potential extends beyond mere text translation. Its multimodal
    capabilities allow it to interact with other formats, like images or audio, broadening
    its usefulness in complex scenarios. This adaptability makes it a more comprehensive
    solution for users who need more than a simple, standalone translation. Unlike
    traditional tools, which are often limited to handling isolated text, ChatGPT’s
    integration with other technologies enables a richer, more versatile approach
    to translation, catering to a broader range of needs and contexts.
  id: totrans-257
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，ChatGPT的潜力不仅限于简单的文本翻译。其多模态能力允许它与图像或音频等其他格式进行交互，扩大了其在复杂场景中的实用性。这种适应性使其成为需要比简单独立翻译更多功能的用户的更全面解决方案。与通常仅限于处理孤立文本的传统工具不同，ChatGPT与其他技术的集成使得翻译方法更加丰富、更加灵活，满足更广泛的需求和情境。
- en: 3.1.5.     Classify texts
  id: totrans-258
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3.1.5.     对文本进行分类
- en: Text classification is a functional capability of ChatGPT that can be customized
    based on various criteria, such as sentiment analysis, content topic, or urgency
    level, showcasing its versatility. This process involves organizing texts into
    predefined categories, which is particularly useful in many contexts, including
    sentiment analysis, sorting emails by topic, and classifying content based on
    levels of urgency or relevance.
  id: totrans-259
  prefs: []
  type: TYPE_NORMAL
  zh: 文本分类是ChatGPT的一项功能能力，可以根据各种标准进行定制，例如情感分析、内容主题或紧急程度，展示了其多功能性。这个过程涉及将文本组织到预定义的类别中，这在许多情境中特别有用，包括情感分析、按主题排序电子邮件，以及根据紧急程度或相关性对内容进行分类。
- en: For instance, if a company receives thousands of customer reviews each day,
    ChatGPT can automatically classify these comments as positive, negative, or neutral.
    This functionality saves time and enables quick identification of specific areas
    that require attention, such as recurring customer service issues or common themes
    in user feedback.
  id: totrans-260
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，如果一家公司每天收到数千条客户评论，ChatGPT可以自动将这些评论分类为正面、负面或中性。这种功能节省了时间，并能够快速识别需要关注的特定领域，例如反复出现的客户服务问题或用户反馈中的常见主题。
- en: Additionally, ChatGPT can assist in classifying research articles by their respective
    topics, making it easier to manage large volumes of academic information.
  id: totrans-261
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，ChatGPT还可以帮助根据各自的主题对研究文章进行分类，这使得管理大量学术信息变得更加容易。
- en: 3.1.6.     Extract information
  id: totrans-262
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3.1.6.     提取信息
- en: Information extraction is another crucial ability of language models. ChatGPT
    can identify specific data from large volumes of text, making it easy to obtain
    essential details without a full manual review. For example, in the legal or financial
    field, where documents can be lengthy and complex, ChatGPT can help quickly locate
    critical figures, important dates, or specific contract terms or report terms.
    This makes document review much more efficient and less prone to errors of omission,
    as it allows you to accurately extract the relevant elements without reading the
    entire document.
  id: totrans-263
  prefs: []
  type: TYPE_NORMAL
  zh: 信息提取是语言模型的另一项关键能力。ChatGPT可以从大量文本中识别特定数据，使得在不进行完整人工审查的情况下获取关键细节变得容易。例如，在法律或金融领域，文件可能很长且复杂，ChatGPT可以帮助快速定位关键数字、重要日期或特定的合同条款或报告条款。这使得文档审查更加高效，并减少了遗漏错误的可能性，因为它允许你准确提取相关元素，而无需阅读整个文档。
- en: In academic research, this capability allows researchers to extract citations,
    key concepts, or results from previous studies without reading each full article,
    thus facilitating literature review and progress on new projects.
  id: totrans-264
  prefs: []
  type: TYPE_NORMAL
  zh: 在学术研究中，这种能力使得研究人员能够从先前的研究中提取引文、关键概念或结果，而无需阅读每一篇完整的文章，从而促进了文献综述和新项目的发展。
- en: 3.1.7.     Creation of lists and tables
  id: totrans-265
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3.1.7.     创建列表和表格
- en: 'One of the most practical advantages of ChatGPT is its ability to provide answers
    in different formats. It is not limited to generating text in paragraphs; you
    can also structure the information in lists with key points, numbered lists, or
    tables. To get the output in a specific format, you indicate it as if you were
    talking to another person. For example, you can say: "Present this information
    to me on a table" or "Give me a list with five main points".'
  id: totrans-266
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT最实用的优点之一是它能够以不同格式提供答案。它不仅限于生成段落文本；你还可以将信息以要点列表、编号列表或表格的形式进行结构化。为了以特定格式获取输出，你可以像与另一个人交谈一样指示它。例如，你可以这样说：“请将此信息以表格形式呈现给我”或“给我一个包含五个主要要点的列表”。
- en: 'For example, if you are planning an event and need to organize a list of tasks,
    you could ask ChatGPT: "List the tasks needed to organize the event". ChatGPT
    could then generate a numbered list with all the steps to follow, making it easy
    to visualize and organize the tasks.'
  id: totrans-267
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，如果你正在计划一个活动并需要组织任务列表，你可以向ChatGPT询问：“列出组织活动的必要任务。”然后ChatGPT可以生成一个包含所有步骤的编号列表，使任务可视化和组织变得容易。
- en: Similarly, if you need to compare the features of different products, you can
    say, "Show the features in a table." ChatGPT will present the data in a table,
    allowing you to see the differences and similarities at a glance. This ability
    to adapt the format of the information on demand makes ChatGPT an extraordinarily
    versatile and valuable tool in various contexts, from personal planning to professional
    and academic uses.
  id: totrans-268
  prefs: []
  type: TYPE_NORMAL
  zh: 同样，如果你需要比较不同产品的特性，你可以说：“以表格形式展示特性。”ChatGPT将以表格形式展示数据，让你可以一目了然地看到差异和相似之处。这种根据需求调整信息格式的能力使ChatGPT在各种环境中成为一个非常灵活和有价值的工具，从个人规划到职业和学术用途。
- en: 3.1.8.     Summarize texts
  id: totrans-269
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3.1.8.     总结文本
- en: ChatGPT can summarize texts quickly and accurately, which is very useful when
    dealing with large volumes of information. It can condense directly provided texts
    and known books and articles.
  id: totrans-270
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT可以快速准确地总结文本，这在处理大量信息时非常有用。它可以直接提供的文本和已知的书籍和文章进行浓缩。
- en: For example, you can request a summary of the book "Rich Dad, Poor Dad," which
    helps users understand complex books in a simplified way. This tool also allows
    you to choose the summary format, such as lists with key points, numbered lists,
    or tables, which is especially useful for students and professionals.
  id: totrans-271
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，你可以请求对《富爸爸，穷爸爸》这本书的总结，这本书以简化的方式帮助用户理解复杂的书籍。此工具还允许你选择总结格式，如要点列表、编号列表或表格，这对于学生和专业人士特别有用。
- en: ChatGPT eliminates redundant text and highlights critical aspects, such as crucial
    arguments, main findings, or central ideas. This makes it ideal for preparing
    study material, simplifying the reading of reports or summarizing books and research
    articles, and improving efficiency in academic and professional environments.
  id: totrans-272
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT消除了冗余文本，并突出了关键方面，如关键论点、主要发现或中心思想。这使得它在准备学习材料、简化报告阅读或总结书籍和研究文章，以及在学术和职业环境中提高效率方面非常理想。
- en: 3.2\. Examples of everyday use
  id: totrans-273
  prefs: []
  type: TYPE_NORMAL
  zh: 3.2\. 日常使用示例
- en: It is easy to think that ChatGPT is reserved for those who work in offices or
    technical positions, but this is different. This tool has endless applications
    in everyday life, from time management and personal organization to educational
    assistance and activity planning. ChatGPT can help you organize shopping lists,
    create exercise routines, or plan trips. It's here to make everyday tasks more
    accessible and more efficient. Here are a few examples, but remember that the
    possibilities are as broad as your imagination and daily needs.
  id: totrans-274
  prefs: []
  type: TYPE_NORMAL
  zh: 人们很容易认为ChatGPT是为那些在办公室或技术职位工作的人准备的，但事实并非如此。这个工具在日常生活中有无数的应用，从时间管理和个人组织到教育辅助和活动规划。ChatGPT可以帮助你组织购物清单、创建锻炼计划或规划旅行。它旨在使日常任务更加便捷和高效。以下是一些示例，但请记住，可能性之广与你的想象和日常需求一样广泛。
- en: 3.2.1.     Recipes with available ingredients
  id: totrans-275
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3.2.1.     可用食材的食谱
- en: 'Imagine you open the fridge and find some loose ingredients: a couple of carrots,
    some chicken, and maybe some pasta. You only have a little time or desire to think,
    but you want to make something delicious and quick with what you have. That''s
    where ChatGPT comes in to save you. With the help of a reasonably simple prompt,
    you can get a creative and quick recipe; no need to search for a cookbook or browse
    through hundreds of pages on the internet. ChatGPT will offer ideas, alternatives,
    and possible substitutions for those ingredients you might not have.'
  id: totrans-276
  prefs: []
  type: TYPE_NORMAL
  zh: 想象一下，你打开冰箱，发现里面有一些散装的食材：几根胡萝卜，一些鸡肉，也许还有一些意大利面。你只有一点时间或欲望去思考，但你想用这些食材快速地做出美味的食物。这时，ChatGPT就出现了，来帮助你。通过一个相对简单的提示，你可以得到一个创意和快速的食谱；无需搜索食谱书或在网上浏览数百页的信息。ChatGPT会提供想法、替代品和可能替换那些你可能没有的食材的建议。
- en: Prompt - I have carrots, chicken and pasta in the fridge. I want to prepare
    a recipe that is quick, easy, and delicious. Could you suggest some main dish
    ideas and give me the recipe step by step? If possible, include variations or
    suggestions of ingredients that I could add or substitute to improve the dish.
  id: totrans-277
  prefs: []
  type: TYPE_NORMAL
  zh: 提示 - 我冰箱里有胡萝卜、鸡肉和意大利面。我想准备一个快速、简单且美味的食谱。你能给我一些建议的主菜想法，并一步一步给我食谱吗？如果可能的话，包括我可以添加或替换的食材的变体或建议。
- en: 'Why this prompt works:'
  id: totrans-278
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么这个提示有效：
- en: 'Specificity: You tell ChatGPT exactly what ingredients you have, which narrows
    the range of options and focuses it.'
  id: totrans-279
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 明确性：您告诉ChatGPT您确切拥有的食材，这缩小了选项范围并使其聚焦。
- en: 'Flexibility: By asking for variants or substitution suggestions, ChatGPT can
    offer more ideas and help you adapt to your available resources.'
  id: totrans-280
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 灵活性：通过要求变体或替代建议，ChatGPT可以提供更多想法并帮助您适应您可用的资源。
- en: 'Clear focus: You mention that you want a quick and easy recipe, so ChatGPT
    understands that you don''t need advanced techniques but something practical and
    straightforward.'
  id: totrans-281
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 清晰的焦点：您提到您需要一个快速且简单的食谱，因此ChatGPT理解您不需要高级技术，而需要实用且直接的东西。
- en: 3.2.2.     Shopping lists
  id: totrans-282
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3.2.2.     购物清单
- en: Imagine you're thinking about everything you need to buy this week, from breakfast
    to dinner to a treat. Instead of writing it down on paper or trying to remember
    everything as you walk through the supermarket, you can use ChatGPT to make your
    life easier. You dictate what you need directly from the ChatGPT application,
    mentioning each product as it comes to mind. Then, you ask it to organize the
    list in an orderly fashion. Once it's ready, please copy and paste it into your
    cell phone's note editor, and that's it! You now have a list that you can cross
    off on the fly as you shop, adapting to modern times and doing everything more
    efficiently and quickly.
  id: totrans-283
  prefs: []
  type: TYPE_NORMAL
  zh: 想象一下，您正在考虑本周需要购买的所有东西，从早餐到晚餐再到零食。与其在纸上写下或在超市里走动时试图记住所有事情，您可以使用ChatGPT使您的生活更轻松。您可以直接从ChatGPT应用中口述您需要的东西，提到每个产品时，您就提到它。然后，您要求它以有序的方式组织清单。一旦准备好，请将其复制粘贴到您的手机笔记编辑器中，就这样！现在您有一个可以在购物时随时勾选的清单，适应现代时代，更高效、更快速地完成所有事情。
- en: Prompt example (mobile app, voice mode) -
  id: totrans-284
  prefs: []
  type: TYPE_NORMAL
  zh: 提示示例（移动应用，语音模式） -
- en: 'Next, I am going to dictate my grocery list to you: [list the products]. Please
    group the products into fresh, canned, and dairy categories. Please do this in
    list format so I can copy and paste it into my notes app.'
  id: totrans-285
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我将向您口述我的购物清单：[列出产品]。请将产品按新鲜、罐头和乳制品类别分组。请以列表格式进行，这样我就可以将其复制粘贴到我的笔记应用中。
- en: 'Why this prompt works:'
  id: totrans-286
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么这个提示有效：
- en: 'Clear structure: By asking you to organize products into categories, your list
    will be visually more straightforward to follow and will save you time in the
    supermarket.'
  id: totrans-287
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 清晰的结构：通过要求您将产品组织到类别中，您的清单将更直观，在超市购物时可以节省时间。
- en: 'Optimization for use: Requesting the list format ready to copy and paste ensures
    that ChatGPT gives you a helpful result.'
  id: totrans-288
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 优化使用：请求可复制粘贴的列表格式确保ChatGPT为您提供有用的结果。
- en: 'Convenience: This prompt also facilitates dictation, allowing you to use your
    voice to capture your ideas quickly. This keeps you organized without the effort
    of typing or remembering everything.'
  id: totrans-289
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 便利性：此提示还便于语音输入，允许您使用语音快速捕捉您的想法。这样可以在不费劲打字或记住所有事情的情况下保持您的组织性。
- en: 3.2.3.     Exercise routines
  id: totrans-290
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3.2.3.     锻炼计划
- en: Sometimes, knowing where to start or how to structure a gym routine that suits
    your specific needs can take time and effort. While it may not seem like an AI
    would be the ideal source for something so personalized, ChatGPT is trained with
    an extensive database encompassing training, physiology, and exercise routines.
    This allows it to provide you with a plan that can help you reach your goals as
    long as you provide it with the correct information. You will get a more accurate
    routine by giving valuable and detailed context about your goals, experience level,
    and equipment availability. In addition, specifying the amount of time you can
    devote will help make it more effective.
  id: totrans-291
  prefs: []
  type: TYPE_NORMAL
  zh: 有时，知道从哪里开始或如何构建适合您特定需求的健身计划可能需要时间和精力。虽然可能看起来AI不是这种个性化信息的理想来源，但ChatGPT经过了一个涵盖训练、生理学和锻炼计划的广泛数据库的训练。这使得它能够为您提供计划，只要您提供正确的信息，就可以帮助您实现目标。通过提供有关您的目标、经验水平和设备可用性的有价值且详细的背景信息，您将获得更准确的锻炼计划。此外，指定您可以投入的时间将有助于使其更有效。
- en: 'Essential data you should provide to get the best possible routine:'
  id: totrans-292
  prefs: []
  type: TYPE_NORMAL
  zh: 应提供的关键数据以获得最佳可能的常规：
- en: 'Main objective: Indicate whether you want to gain muscle mass, lose fat, improve
    your endurance, or do some of everything.'
  id: totrans-293
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 主要目标：指出你是否想要增加肌肉量、减少脂肪、提高耐力，或者做些所有的事情。
- en: 'Experience level: Mention if you are a beginner, intermediate, or advanced
    so that the training is based on your ability.'
  id: totrans-294
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 经验水平：说明你是否是初学者、中级或高级，以便训练基于你的能力。
- en: 'Training frequency: Specify how many days a week you can dedicate to the gym
    and how many minutes per session.'
  id: totrans-295
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 训练频率：指定你每周可以用于健身房的天数和每次会话的分钟数。
- en: 'Equipment availability: Describe the type of equipment you have, whether you
    go to a fully equipped gym or train at home with weights and elastic bands.'
  id: totrans-296
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 设备可用性：描述你拥有的设备类型，无论你是去一个设备齐全的健身房，还是在家用哑铃和弹力带进行训练。
- en: 'Preferences or restrictions: If you have any preferences for certain types
    of exercises (such as free weight exercises vs. machines) or physical limitations
    that ChatGPT should be aware of.'
  id: totrans-297
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 偏好或限制：如果你对某些类型的运动（如自由重量练习与器械）有偏好，或者ChatGPT应该了解的身体限制。
- en: 'With this data, ChatGPT can create a personalized routine tailored to you,
    giving you the structure and exercises you need to achieve your goals. Here is
    an example of a prompt:'
  id: totrans-298
  prefs: []
  type: TYPE_NORMAL
  zh: 使用这些数据，ChatGPT可以为你创建一个个性化的常规，为你提供实现目标所需的架构和锻炼。以下是一个提示示例：
- en: 'Prompt example - I want a personalized gym routine. My main goal is [e.g.,
    to increase muscle mass], I am a [beginner/intermediate/advanced] level, and I
    can train [X days a week for X minutes]. I have [indicate available equipment:
    weights, bands, machines, etc.], and I prefer [specify your preferences or mention
    restrictions]. Could you create a routine that fits this data and includes exercises
    for each day with the number of sets and reps?'
  id: totrans-299
  prefs: []
  type: TYPE_NORMAL
  zh: 提示示例 - 我想要一个个性化的健身房常规。我的主要目标是[例如，增加肌肉量]，我是[初学者/中级/高级]水平，我可以在每周[X天]进行[X分钟]的训练。我有[指出可用设备：哑铃、弹力带、器械等]，我更喜欢[指定你的偏好或提及限制]。你能创建一个符合这些数据并包括每天锻炼次数和组数的常规吗？
- en: 'Why this prompt works:'
  id: totrans-300
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么这个提示有效：
- en: 'Clear and specific context: By including your objective, level, and available
    equipment, ChatGPT can adjust the routine according to your situation.'
  id: totrans-301
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 明确和具体的环境：通过包括你的目标、水平和可用设备，ChatGPT可以根据你的情况调整常规。
- en: 'Personalization: Your preferences and restrictions help ChatGPT avoid exercises
    you don''t like or can''t perform, making the plan more suitable for you.'
  id: totrans-302
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 个性化：你的偏好和限制帮助ChatGPT避免你不喜欢的或不能做的锻炼，使计划更适合你。
- en: 'Practical details: Including session length and weekly frequency allows ChatGPT
    to design a plan that fits your availability and maximizes results.'
  id: totrans-303
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 实用细节：包括会话长度和每周频率，使ChatGPT能够设计一个适合你的可用性并最大化结果的计划。
- en: 3.2.4.     Travel planning
  id: totrans-304
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3.2.4.     旅行规划
- en: When planning a trip, the options can be endless, and the information overwhelming.
    Planning can become long and tedious, from choosing the ideal destination to finding
    the best activities and restaurants. That's where ChatGPT comes in. Using this
    template's vast data, you can get a complete itinerary tailored to your preferences
    and budget without spending hours searching different websites. You need to provide
    a few key details, and ChatGPT will return a tailor-made plan for you to enjoy
    a perfect trip.
  id: totrans-305
  prefs: []
  type: TYPE_NORMAL
  zh: 当规划一次旅行时，选项可能无限，信息可能令人不知所措。从选择理想的目的地到寻找最佳的活动和餐厅，规划可能会变得漫长而乏味。这就是ChatGPT发挥作用的地方。利用这个模板的大量数据，你可以获得一个完全符合你偏好和预算的完整行程，而无需花费数小时搜索不同的网站。你需要提供一些关键细节，ChatGPT就会为你提供一个定制的计划，让你享受完美的旅行。
- en: 'Important data that you should provide to obtain the best planning:'
  id: totrans-306
  prefs: []
  type: TYPE_NORMAL
  zh: 你应该提供的重要数据以获得最佳的规划：
- en: '1. Desired destination or general ideas: Specify if you already have a place
    in mind or describe what type of trip you are looking for (adventure, beach, culture,
    etc.).'
  id: totrans-307
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 想要的目的地或一般想法：指定你是否已经有一个地方在心中，或者描述你正在寻找的旅行类型（冒险、海滩、文化等）。
- en: '2. Duration of the trip: To better organize the time, mention how many days
    you will travel.'
  id: totrans-308
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 旅行时长：为了更好地组织时间，说明你将旅行多少天。
- en: '3. Approximate budget: Indicate a range of expenses for ChatGPT to suggest
    appropriate options.'
  id: totrans-309
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 大概预算：指出一个费用范围，ChatGPT可以据此建议适当的选择。
- en: '4. Interests and activities: Comment if you prefer outdoor activities, cultural
    visits, local cuisine, or nightlife.'
  id: totrans-310
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 兴趣和活动：如果你更喜欢户外活动、文化参观、当地美食或夜生活，请发表评论。
- en: '5. Restrictions or preferences: If you travel with children, want to avoid
    crowds, or need accessibility, include this for more accurate planning.'
  id: totrans-311
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 限制或偏好：如果您与儿童旅行，想避开人群或需要无障碍设施，请包括这些信息以进行更准确的规划。
- en: Prompt example - I am planning a trip to [destination or type of destination,
    if you are not already clear] and will be there for [number of days]. My approximate
    budget is [budget range], and I would like to focus on activities such as [e.g.
    culture, nature, gastronomy]. Also, I have some preferences/restrictions such
    as [specify additional details]. Could you help me put together a daily itinerary
    that includes activities, restaurant suggestions, and recommended places to visit?
  id: totrans-312
  prefs: []
  type: TYPE_NORMAL
  zh: 提示示例 - 我计划前往[目的地或目的地类型，如果您还不清楚]并将在那里停留[天数]。我的预算大约是[预算范围]，我想要专注于[例如文化、自然、美食]等活动。此外，我有一些偏好/限制，如[指定额外细节]。你能帮我制定一个包括活动、餐厅建议和推荐参观地点的每日行程吗？
- en: 'Why this prompt works:'
  id: totrans-313
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么这个提示有效：
- en: 'Personalized approach: ChatGPT can use your preferences and restrictions to
    create a plan that fits your needs.'
  id: totrans-314
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 个性化方法：ChatGPT可以使用您的偏好和限制来创建符合您需求的计划。
- en: 'Clear organization: Details on duration and budget allow suggestions to be
    realistic and practical, maximizing time and resources during the trip.'
  id: totrans-315
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 明确的组织：关于时长和预算的详细信息使建议更加现实和实用，最大化旅行中的时间和资源。
- en: This prompt allows ChatGPT to design a complete trip tailored to your wishes
    without you having to worry about the details.
  id: totrans-316
  prefs: []
  type: TYPE_NORMAL
  zh: 这个提示允许ChatGPT为您量身定制一个完整的旅行计划，而无需您担心细节。
- en: 3.2.5.     Ideas for activities with children
  id: totrans-317
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3.2.5.     与儿童一起进行活动的想法
- en: Keeping children entertained and stimulated can be challenging when you have
    them in your care, whether as a parent, family member, or caregiver. Instead of
    always resorting to the same activities, you can use ChatGPT to find fresh ideas
    tailored to children's ages and preferences. By providing just a few details,
    you'll get creative and varied suggestions, from at-home activities to outdoor
    options. ChatGPT is a handy tool for keeping kids active and happy, helping you
    explore new possibilities you might not have considered.
  id: totrans-318
  prefs: []
  type: TYPE_NORMAL
  zh: 当您作为父母、家庭成员或照顾者照顾儿童时，保持他们的娱乐和刺激可能会很具挑战性。您不必总是求助于相同的活动，可以使用ChatGPT找到针对儿童年龄和偏好的定制想法。只需提供一些细节，您就会得到创意和多样化的建议，从家庭活动到户外选项。ChatGPT是一个方便的工具，可以帮助孩子们保持活跃和快乐，帮助您探索您可能没有考虑过的新可能性。
- en: 'Essential data you should provide to get the best suggestions for activities:'
  id: totrans-319
  prefs: []
  type: TYPE_NORMAL
  zh: 您应提供的基本数据以获得最佳活动建议：
- en: 'Age of children: Specify ages to ensure that activities are appropriate and
    safe.'
  id: totrans-320
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 儿童年龄：指定年龄以确保活动适合且安全。
- en: 'Interests and preferences: Comment whether they like nature, art, board games,
    sports, etc.'
  id: totrans-321
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 兴趣和偏好：评论他们是否喜欢自然、艺术、桌游、运动等。
- en: 'Available space: Mention if you have a garden, if it will be at home, or if
    you are looking for outdoor activities.'
  id: totrans-322
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 可用空间：如果您有花园，或者活动将在家中进行，或者您正在寻找户外活动，请说明。
- en: 'Duration of the activity: Indicate your available time for ChatGPT to suggest
    activities accordingly.'
  id: totrans-323
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 活动时长：请指出您可用于ChatGPT建议活动的可用时间，以便其相应地提出建议。
- en: 'Resources or materials: If you have specific materials (such as paint, musical
    instruments, games, etc.), include them for more practical options.'
  id: totrans-324
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 资源或材料：如果您有特定的材料（如颜料、乐器、游戏等），请包括它们以提供更多实际的选择。
- en: 'Here is an example:'
  id: totrans-325
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一个示例：
- en: Prompt example - I am looking for ideas for activities to do with children of
    [age or age range] that are [interests, such as creative, sports, educational,
    etc.]. The activities can last about [indicates available time], and I can do
    them in [available space, such as at home, in the park, or in a garden]. I have
    materials such as [mentions materials available], could you suggest some fun and
    suitable activities for them?
  id: totrans-326
  prefs: []
  type: TYPE_NORMAL
  zh: 提示示例 - 我正在寻找适合[年龄或年龄范围]的儿童的活动的想法，这些活动是[兴趣，如创意、运动、教育等]。活动可以持续大约[表示可用时间]，我可以在[可用空间，如在家、在公园或花园]进行。我有[提到的可用材料]，你能为他们建议一些有趣且适合的活动吗？
- en: 'Why this prompt works:'
  id: totrans-327
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么这个提示有效：
- en: 'Context-specific: By detailing ages and preferences, ChatGPT can offer activities
    that are safe and of genuine interest to children.'
  id: totrans-328
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 上下文特定：通过详细说明年龄和偏好，ChatGPT可以提供安全且真正吸引儿童的活动。
- en: 'Adaptability: Information on space and materials allows ChatGPT to suggest
    practical and easy-to-implement options for your situation.'
  id: totrans-329
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 适应性：关于空间和材料的信息使ChatGPT能够根据您的具体情况提出实用且易于实施的选项。
- en: 3.2.6.     Book, movie or series recommendations
  id: totrans-330
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3.2.6.     书籍、电影或电视剧推荐
- en: Whether it's for a movie night at home, a new series to follow or a good book
    to dive into reading, finding suitable recommendations can take time. ChatGPT
    makes this process quick and easy, offering personalized options based on your
    tastes and preferences. Thanks to the amount of information it has, ChatGPT can
    suggest titles that fit what you're looking for, even in genres or styles you
    hadn't considered. All you need to do is provide a little context, and you'll
    have a list of tailored recommendations ready to explore and enjoy.
  id: totrans-331
  prefs: []
  type: TYPE_NORMAL
  zh: 不论是家庭电影之夜、新剧集的追剧还是一本值得深入阅读的好书，找到合适的推荐可能需要时间。ChatGPT使这个过程变得快速简单，根据您的口味和偏好提供个性化选项。得益于其拥有的信息量，ChatGPT可以建议符合您需求的标题，即使是在您未曾考虑过的类型或风格中。您只需提供一些背景信息，就会有一份量身定制的推荐列表供您探索和享受。
- en: 'Essential data you should provide to get the best recommendations:'
  id: totrans-332
  prefs: []
  type: TYPE_NORMAL
  zh: 获取最佳推荐所需提供的基本信息：
- en: 'Genre preferences: Mention your preferred genre, such as drama, comedy, science
    fiction, mystery, or fantasy.'
  id: totrans-333
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 类型偏好：提及您喜欢的类型，如戏剧、喜剧、科幻、悬疑或奇幻。
- en: 'Desired style or tone: If you want something light, deep, funny, or reflective,
    indicate what kind of experience you want.'
  id: totrans-334
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 期望的风格或语气：如果您想要轻松、深入、幽默或反思的体验，请说明您想要什么样的体验。
- en: 'Length or format: Specify whether you prefer something short, like a movie,
    something longer, like a series, or a reading that you can enjoy in several sessions.'
  id: totrans-335
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 长度或格式：指定您是否更喜欢短内容，如电影，长内容，如电视剧，还是可以分几个阶段享受的阅读。
- en: 'Examples of titles you have enjoyed: If you have references to books, movies,
    or series you have enjoyed, share them for recommendations that are more aligned
    with your tastes.'
  id: totrans-336
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 您喜欢的标题示例：如果您有喜欢的书籍、电影或电视剧的参考，分享它们以获得更符合您口味的推荐。
- en: 'Availability or platform: If you prefer options on platforms such as Netflix,
    Amazon, etc., include this so ChatGPT can suggest accessible possibilities.'
  id: totrans-337
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 可用性或平台：如果您更喜欢Netflix、Amazon等平台上的选项，请包含此信息，以便ChatGPT可以建议可访问的可能性。
- en: 'Use a prompt that specifies your preferences and favorite platforms to get
    a selection tailored to your interests. Here is an example:'
  id: totrans-338
  prefs: []
  type: TYPE_NORMAL
  zh: 使用指定您偏好和最喜欢的平台的提示，以获得符合您兴趣的选择。以下是一个示例：
- en: Prompt example - I am looking for recommendations of [books, movies, or series]
    that are genre [desired genre, such as thriller, comedy, fantasy, etc.], with
    style [light, deep, entertaining, etc.]. I have enjoyed titles such as [mention
    previous books, movies, or series you have liked]. I prefer them to be available
    on [desired platform or format, such as Netflix, Amazon, audiobook, etc.]. Can
    you suggest some similar options?
  id: totrans-339
  prefs: []
  type: TYPE_NORMAL
  zh: 提示示例 - 我正在寻找[书籍、电影或电视剧]推荐，它们属于[期望的类型，如惊悚、喜剧、奇幻等]，风格[轻松、深入、娱乐等]。我享受过[提及您之前喜欢的书籍、电影或电视剧]。我更喜欢它们可以在[期望的平台或格式，如Netflix、Amazon、有声书等]上找到。你能推荐一些类似的选择吗？
- en: With this prompt, you will receive a list of suggestions perfectly matched to
    your style, making sure to find your next favorite effortlessly.
  id: totrans-340
  prefs: []
  type: TYPE_NORMAL
  zh: 使用这个提示，您将收到一份与您的风格完美匹配的建议列表，确保您能够轻松找到下一个最喜欢的。
- en: 3.2.7.     Budgets and savings
  id: totrans-341
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3.2.7.     预算和储蓄
- en: Planning a monthly or annual budget may seem overwhelming, but with ChatGPT,
    this task becomes much more manageable. With this tool, you can create a financial
    plan tailored to your income and savings goals. Whether you want to save for a
    vacation, reduce expenses, or better understand where your money is going, ChatGPT
    can provide a clear and practical structure. All you need to do is give a little
    context about your financial situation and goals, and it will return a realistic
    and manageable budget plan, ideal for you to start taking control of your finances.
  id: totrans-342
  prefs: []
  type: TYPE_NORMAL
  zh: 制定月度或年度预算可能看起来令人望而却步，但有了ChatGPT，这项任务变得容易得多。使用这个工具，您可以创建一个符合您收入和储蓄目标的财务计划。无论您是想为度假储蓄、减少开支还是更好地了解您的钱花在哪里，ChatGPT都可以提供一个清晰实用的结构。您只需提供一些关于您的财务状况和目标的信息，它就会返回一个现实且易于管理的预算计划，非常适合您开始掌控您的财务。
- en: 'Important Note: While ChatGPT helps structure budgets and suggest savings ideas,
    it does not constitute professional financial advice. Before making decisions,
    you must review and fully understand any suggestions and consider consulting a
    qualified financial advisor for essential issues. ChatGPT can provide you with
    an initial basis to explore, but ultimately, it is up to you to analyze and evaluate
    your financial decisions.'
  id: totrans-343
  prefs: []
  type: TYPE_NORMAL
  zh: 重要提示：虽然ChatGPT可以帮助构建预算和提出储蓄建议，但它并不构成专业的财务建议。在做出决定之前，您必须审查并完全理解任何建议，并考虑咨询合格的财务顾问以解决重要问题。ChatGPT可以为您提供探索的初步基础，但最终，分析并评估您的财务决策取决于您自己。
- en: 'Essential data you should provide to get the best budget and savings plan:'
  id: totrans-344
  prefs: []
  type: TYPE_NORMAL
  zh: 获取最佳预算和储蓄计划所需提供的基本数据：
- en: '1. Genre preferences: Mention your preferred genre, such as drama, comedy,
    science fiction, mystery, or fantasy.'
  id: totrans-345
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 喜好的类型：提及您喜欢的类型，如戏剧、喜剧、科幻、悬疑或奇幻。
- en: '2. Desired style or tone: If you want something light, deep, funny, or reflective,
    indicate what kind of experience you want.'
  id: totrans-346
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 希望的风格或语气：如果您想要轻松、深刻、幽默或反思的体验，请说明您想要哪种类型的体验。
- en: '3. Length or format: Specify whether you prefer something short, like a movie,
    something longer, like a series, or a reading that you can enjoy in several sessions.'
  id: totrans-347
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 长度或格式：指定您是否更喜欢短内容，如电影，长内容，如剧集，或可以分几个阶段享受的阅读材料。
- en: '4. Examples of titles you have enjoyed: If you have references to books, movies,
    or series you have enjoyed, share them for recommendations that are more aligned
    with your tastes.'
  id: totrans-348
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 您喜欢的标题示例：如果您有喜欢的书籍、电影或电视剧的参考，请分享它们，以便获得更符合您口味的推荐。
- en: '5. Availability or platform: If you prefer options on platforms such as Netflix,
    Amazon, etc., include this so ChatGPT can suggest accessible possibilities.'
  id: totrans-349
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 可用性或平台：如果您更喜欢Netflix、Amazon等平台上的选项，请包括这些信息，以便ChatGPT可以建议可访问的可能性。
- en: 'Prompt example - I want help creating a monthly budget. My monthly income is
    [amount], and I have fixed expenses such as [mention fixed expenses: rent, utilities,
    etc.], and variable expenses such as [meals out, entertainment, etc.]. I would
    like to save for [goal, such as a vacation or emergency fund] within [available
    time]. I also want to prioritize [areas where you prefer not to cut back]. Can
    you help me structure a budget with categories and recommendations to maximize
    my savings?'
  id: totrans-350
  prefs: []
  type: TYPE_NORMAL
  zh: 提示示例 - 我想要帮助创建月度预算。我的月收入是[金额]，我有一些固定支出，例如[提及固定支出：房租、水电费等]，以及一些变动支出，例如[外出就餐、娱乐等]。我想要在[可用时间]内为[目标，例如度假或紧急基金]储蓄。我还想优先考虑[您不希望削减的领域]。您能帮我构建一个带有类别和建议的预算，以最大化我的储蓄吗？
- en: 'Why this prompt works:'
  id: totrans-351
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么这个提示有效：
- en: 'Detailed financial context: ChatGPT can understand your income, expenses, and
    goals to generate a budget that fits your situation.'
  id: totrans-352
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 详细的财务背景：ChatGPT可以理解您的收入、支出和目标，以生成适合您情况的预算。
- en: 'Clear objectives: Including a savings goal allows ChatGPT to give you focused
    recommendations on what you want to achieve, with specific timelines.'
  id: totrans-353
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 明确的目标：包括储蓄目标可以让ChatGPT为您提供关于您想要实现的目标的专注建议，并具有具体的时限。
- en: This approach provides a practical and manageable plan, helping you save effectively
    and organize your finances to achieve your short—or long-term goals.
  id: totrans-354
  prefs: []
  type: TYPE_NORMAL
  zh: 这种方法提供了一个实用且可管理的计划，帮助您有效地节省并组织您的财务，以实现您的短期或长期目标。
- en: 3.2.8.     Learning new topics
  id: totrans-355
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3.2.8.     学习新主题
- en: 'Learning something new can be incredibly motivating and valuable, especially
    when information is just a click away. Whether diving into complex topics like
    quantum physics or economics or picking up practical skills like photography or
    programming, ChatGPT is available to assist you in exploring and understanding
    nearly any subject. However, it''s important to remember that although these tools
    are based on extensive databases, they can also make mistakes or present inaccurate
    information. Therefore, it''s wise to use them as an initial guide or supplement
    and always cross-check information with other sources, particularly for important
    topics. Data you should provide to learn effectively:'
  id: totrans-356
  prefs: []
  type: TYPE_NORMAL
  zh: 学习新事物可以非常鼓舞人心且有价值，尤其是在信息只需点击即可获得的情况下。无论是深入研究复杂主题，如量子物理或经济学，还是学习实用技能，如摄影或编程，ChatGPT都可供您探索和理解几乎任何主题。然而，重要的是要记住，尽管这些工具基于庞大的数据库，但它们也可能犯错或提供不准确的信息。因此，明智的做法是将它们用作初始指南或补充，并始终与其他来源交叉核对信息，尤其是对于重要主题。您应该提供以下数据以有效学习：
- en: 'Specific topic and level of depth: Define what topic you want to learn and
    whether you are looking for a general introduction, an intermediate level, or
    an advanced explanation.'
  id: totrans-357
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 具体主题和深度水平：定义您想学习的内容以及您是否需要一般介绍、中级水平或高级解释。
- en: 'Preferred learning style: Comment whether you prefer short and direct explanations,
    practical examples, visual summaries, or detailed readings.'
  id: totrans-358
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 偏好的学习方式：评论您是否更喜欢简短直接的解释、实际例子、视觉总结或详细阅读。
- en: 'Learning objective: Explain why you want to learn this topic (for an exam,
    personal interest, or to apply it in a project), as this helps to adjust the focus.'
  id: totrans-359
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 学习目标：解释您为什么想学习这个主题（为了考试、个人兴趣或将其应用于项目），因为这有助于调整重点。
- en: 'Time available: Indicate how much time you can dedicate to learning so that
    you can receive suggestions appropriate to your pace.'
  id: totrans-360
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 可用时间：请说明您能投入多少时间用于学习，以便您能收到适合您进度的建议。
- en: 'Accuracy warnings: Recommend additional sources or ask ChatGPT to warn about
    possible limitations or errors, especially on complex topics.'
  id: totrans-361
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 准确性警告：推荐额外来源或要求ChatGPT警告可能的局限性或错误，尤其是在复杂主题上。
- en: 'Use a prompt with these details for a tailored, cautionary learning experience.
    Here is an example:'
  id: totrans-362
  prefs: []
  type: TYPE_NORMAL
  zh: 使用包含这些细节的提示，以获得定制的学习体验。以下是一个示例：
- en: 'Prompt example - I want to learn about [specific topic, such as artificial
    intelligence, philosophy, etc.] at a [basic / intermediate / advanced] level.
    My goal is [explain why you want to learn the subject: for personal interest,
    for a project, etc.], and I prefer a learning style that is [short and to the
    point, with examples, detailed, etc.]. I have approximately [indicate time available,
    such as 1 hour per day]. Also, could you point out possible limitations of the
    information or suggest additional reliable sources to supplement learning?'
  id: totrans-363
  prefs: []
  type: TYPE_NORMAL
  zh: 提示示例 - 我想在[具体主题，例如人工智能、哲学等]的[基础/中级/高级]水平上学习。我的目标是[解释您为什么想学习这个主题：出于个人兴趣、为了一个项目等]，并且我更喜欢[简短直接、举例、详细等]的学习方式。我大约有[指明可用时间，例如每天1小时]。此外，你能指出信息的可能局限性或建议额外的可靠来源来补充学习吗？
- en: 'Why this prompt works:'
  id: totrans-364
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么这个提示有效：
- en: '1. Focus on the objective and level: ChatGPT adapts the explanation according
    to your level of knowledge and the purpose of your learning, providing an adequate
    introduction.'
  id: totrans-365
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 专注于目标和水平：ChatGPT根据您的知识水平和学习目的调整解释，提供适当的介绍。
- en: '2. Cautions: Asking for caveats and additional sources is essential to ensure
    that the information is accurate and that you can reliably dig deeper.'
  id: totrans-366
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 警告：询问注意事项和额外来源对于确保信息的准确性以及您能够可靠地深入挖掘至关重要。
- en: 3.2.9.     Gift ideas
  id: totrans-367
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3.2.9.     礼物想法
- en: We often run out of ideas when giving a gift. Finding the right gift can be
    challenging, whether it's for a birthday, anniversary, or special occasion. With
    ChatGPT, you can get personalized ideas quickly, tailored to the interests and
    tastes of the person you want to surprise. By providing a few basic details, you
    will receive a list of creative and appropriate suggestions for the occasion.
  id: totrans-368
  prefs: []
  type: TYPE_NORMAL
  zh: 在赠送礼物时，我们常常会陷入想法的困境。找到合适的礼物可能具有挑战性，无论是生日、周年纪念日还是特殊场合。使用ChatGPT，您可以快速获得个性化的想法，这些想法符合您想要惊喜的人的兴趣和品味。通过提供一些基本细节，您将收到一份创意和合适的建议清单，适用于该场合。
- en: 'Important data you should provide:'
  id: totrans-369
  prefs: []
  type: TYPE_NORMAL
  zh: 您应该提供的重要数据：
- en: 'Person''s interests and hobbies: Mention hobbies or likes, such as reading,
    sports, technology, etc.'
  id: totrans-370
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 个人的兴趣和爱好：提及爱好或喜好，例如阅读、运动、科技等。
- en: 'Approximate budget: Indicate how much you plan to spend to receive appropriate
    ideas.'
  id: totrans-371
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 大概预算：说明您计划花费多少以获得合适的想法。
- en: 'Occasion or relationship: Explain whether the gift is for a birthday, anniversary,
    or specific celebration and your relationship to the person (friend, partner,
    family member).'
  id: totrans-372
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 事件或关系：解释礼物是为了生日、周年纪念日还是特定庆祝活动，以及您与该人的关系（朋友、伴侣、家庭成员）。
- en: 'To get quick and accurate ideas, you can use a simple prompt like this one:'
  id: totrans-373
  prefs: []
  type: TYPE_NORMAL
  zh: 为了快速准确地获得想法，您可以使用这样的简单提示：
- en: Prompt example - I need gift ideas for [mention relationship, such as friend,
    partner, etc.] who likes [describe interests, such as music, sports, technology].
    My budget is [indicates budget] and the occasion is [anniversary, birthday, etc.]
    Could you suggest some options?
  id: totrans-374
  prefs: []
  type: TYPE_NORMAL
  zh: 提示示例 - 我需要为[提及关系，例如朋友、伴侣等]喜欢[描述兴趣，例如音乐、运动、科技]的人寻找礼物。我的预算是[指明预算]并且场合是[周年纪念日、生日等]。你能推荐一些选项吗？
- en: 'Why this prompt works:'
  id: totrans-375
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么这个提示有效：
- en: 'Simplicity: This prompt is straightforward and provides the essential information
    ChatGPT needs to suggest relevant ideas.'
  id: totrans-376
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 简单性：这个提示直接明了，为ChatGPT提供了所需的基本信息，以提出相关想法。
- en: 'Quick customization: By including interests, budget, and occasion, you will
    receive practical and situation-aligned options.'
  id: totrans-377
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 快速定制：通过包括兴趣、预算和场合，你将收到实用且与情境相符的选项。
- en: With this simple prompt, you will receive a gift list to help you make the right
    choice and reduce your search time.
  id: totrans-378
  prefs: []
  type: TYPE_NORMAL
  zh: 使用这个简单的提示，你将收到一份礼物清单，帮助你做出正确的选择并减少搜索时间。
- en: 3.3\. Fundamentals of Prompts Engineering
  id: totrans-379
  prefs: []
  type: TYPE_NORMAL
  zh: 3.3. 提示工程的基本原则
- en: 'Prompt engineering involves developing and refining how we formulate our questions
    or commands to an LLM. This process helps ensure the model understands what is
    being asked and responds most effectively. It is a mix of art and science, as
    it requires a good understanding of human language and how AI models process that
    language. The idea is simple: the more accurate and precise the prompts we input,
    the more effective and valuable the responses we get.'
  id: totrans-380
  prefs: []
  type: TYPE_NORMAL
  zh: 提示工程涉及开发和改进我们如何向大型语言模型（LLM）提出问题或命令。这个过程有助于确保模型理解所提出的问题，并作出最有效的回应。它是一种艺术与科学的结合，因为它需要深入了解人类语言以及AI模型如何处理这种语言。其理念很简单：我们输入的提示越准确、越精确，我们得到的回应就越有效、越有价值。
- en: Prompt engineering is not just about designing and developing prompts. It encompasses
    many skills and techniques helpful in interacting with LLMs, and understanding
    LLM capabilities is an important skill.
  id: totrans-381
  prefs: []
  type: TYPE_NORMAL
  zh: 提示工程不仅仅是设计和开发提示。它包括许多有助于与LLM互动的技能和技术，理解LLM的能力是一项重要的技能。
- en: In this chapter, several examples show how specificity, simplicity, and conciseness
    can improve results.
  id: totrans-382
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，几个示例展示了具体性、简洁性和简洁性如何提高结果。
- en: 3.3.1.     The instruction
  id: totrans-383
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3.3.1. 指令
- en: You can design effective prompts for a variety of simple tasks using specific
    commands such as "Write", "Sort", "Summarize", "Translate", "Sort", among others.
    Experimenting with different instructions, keywords, contexts, and data types
    is crucial to discovering what best suits your needs.
  id: totrans-384
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以使用特定的命令，如“写”、“排序”、“总结”、“翻译”、“排序”等，为各种简单任务设计有效的提示。尝试不同的指令、关键词、上下文和数据类型对于发现最适合你需求的方法至关重要。
- en: 'The context you provide must be relevant and specific to the task you wish
    to perform; the tighter it is, the better the results will be. In addition, placing
    the instructions at the beginning of the prompt and using a clear separator such
    as " " to differentiate between the instruction and the context is advisable.
    Here is an example:'
  id: totrans-385
  prefs: []
  type: TYPE_NORMAL
  zh: 你提供的上下文必须与你要执行的任务相关且具体；上下文越紧密，结果就会越好。此外，将指令放在提示的开头，并使用清晰的分隔符，如" "来区分指令和上下文是可取的。以下是一个示例：
- en: 'Prompt - Translate the text below into English:Text: "Hello!"'
  id: totrans-386
  prefs: []
  type: TYPE_NORMAL
  zh: '提示 - 将以下文本翻译成英文：Text: "你好！"'
- en: ChatGPT - Hello!
  id: totrans-387
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT - 你好！
- en: 3.3.2.  Specificity
  id: totrans-388
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3.3.2. 具体性
- en: The prompt must be specific and descriptive for the model to perform the task
    accurately. The more detailed and clear the prompt, the better the result. This
    is crucial when looking for a specific result or generation style. There are no
    magic words to ensure better results; the clarity and detail of the prompt are
    essential. Including examples within the prompt can effectively get answers in
    the desired formats.
  id: totrans-389
  prefs: []
  type: TYPE_NORMAL
  zh: 提示必须具体且描述性，以便模型能够准确执行任务。提示越详细、越清晰，结果就越好。这在寻找特定结果或生成风格时尤为重要。没有魔法词可以保证更好的结果；提示的清晰度和细节至关重要。在提示中包含示例可以有效地以期望的格式获得答案。
- en: 'When designing prompts, you should also keep in mind the length allowed. Being
    specific and detailed is key, but it is important to avoid including unnecessary
    details that do not directly contribute to the task. This balance requires experimentation
    and continual tweaking. Experiment with different approaches to optimize prompts
    for your needs. Let''s look at an example of how to formulate a simple prompt
    to extract specific information from a text:'
  id: totrans-390
  prefs: []
  type: TYPE_NORMAL
  zh: 在设计提示时，你也应该考虑到允许的长度。具体和详细是关键，但避免包含不直接贡献于任务的无关细节同样重要。这种平衡需要实验和持续的调整。尝试不同的方法来优化提示以满足你的需求。让我们看看如何制定一个简单的提示来从文本中提取特定信息的示例：
- en: 'Prompt - Identify the names of cities in the text provided. Desired format:
    <comma separated list of city names>. "During her European tour, sustainability
    expert Clara Rodriguez visited several prominent cities. She presented shocking
    data on climate change in Madrid, then in Paris and finally in Berlin at the Humboldt
    University."'
  id: totrans-391
  prefs: []
  type: TYPE_NORMAL
  zh: 提示 - 识别文本中提到的城市名称。所需格式：以逗号分隔的城市名称列表。“在她的欧洲之旅中，可持续性专家克拉拉·罗德里格斯访问了几个著名城市。她在马德里展示了关于气候变化的令人震惊的数据，然后在巴黎，最后在柏林的洪堡大学。”
- en: 'ChatGPT - City: Madrid, Paris, Berlin'
  id: totrans-392
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT - 城市：马德里，巴黎，柏林
- en: 3.3.3.     Avoid inaccuracy
  id: totrans-393
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3.3.3.     避免不准确
- en: 'Avoiding vagueness is critical when seeking effectiveness in prompts. By trying
    to be overly creative or clever, it is easy to get sidetracked and create descriptions
    that are not clear or accurate. The analogy here is very similar to effective
    communication: the more direct you are, the more influential the message will
    be. For example, you might be interested in learning the concept of prompts engineering.
    You could try something like:'
  id: totrans-394
  prefs: []
  type: TYPE_NORMAL
  zh: 在寻求提示的有效性时，避免含糊至关重要。试图过于创意或巧妙，很容易走偏，创造出不清晰或不准确的描述。这里的类比与有效的沟通非常相似：你越直接，信息的影响力就越大。例如，你可能对学习提示工程的概念感兴趣。你可以尝试如下：
- en: Prompt - Explain the concept of promotion engineering. Keep the explanation
    short, just a few sentences
  id: totrans-395
  prefs: []
  type: TYPE_NORMAL
  zh: 提示 - 解释促销工程的概念。请简要说明，只需几句话。
- en: 'The above instruction makes it unclear how many sentences to use and what style to
    use. You may be able to get acceptable answers with the above prompt, but a specific,
    concise, and direct prompt would be better. Something like:'
  id: totrans-396
  prefs: []
  type: TYPE_NORMAL
  zh: 上述指令使得不清楚应该使用多少句子以及使用什么风格。你可能可以用上述提示得到可接受的答案，但一个具体、简洁、直接的提示会更好。例如：
- en: Prompt - Use 2-3 sentences to explain the concept of prompt engineering to a
    high school student.
  id: totrans-397
  prefs: []
  type: TYPE_NORMAL
  zh: 提示 - 用2-3句话向高中生解释提示工程的概念。
- en: 3.3.4.     Language and vocabulary
  id: totrans-398
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3.3.4.     语言和词汇
- en: It is crucial to understand the language style to employ when interacting effectively
    with an LLM such as ChatGPT. Below, we will break down some basic principles for
    maintaining appropriate language and vocabulary.
  id: totrans-399
  prefs: []
  type: TYPE_NORMAL
  zh: 理解在与ChatGPT等LLM有效互动时应采用的语言风格至关重要。以下，我们将分解一些保持适当语言和词汇的基本原则。
- en: 'Use specific phrases: Incorporating phrases in your prompts can guide the model
    more effectively. Phrases such as "Your task is" and "You must" clarify expectations
    and ensure that the model understands the importance of the instructions. Similarly,
    phrases such as "You will be penalized" or "You are prohibited" are more helpful
    than negative formulations such as "Do not do such a thing." This affirmative
    approach helps establish clear boundaries and precise guidelines that the model
    can more easily follow, ensuring that responses align more closely with expectations.
    For example, instead of saying, "Don''t use informal language," it is more constructive
    and precise to state, "You must use formal language." This methodology ensures
    that instructions are interpreted unambiguously.'
  id: totrans-400
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用特定短语：在提示中包含短语可以更有效地引导模型。例如，“你的任务是”和“你必须”这样的短语可以明确期望并确保模型理解指令的重要性。同样，像“你将被惩罚”或“你被禁止”这样的短语比“不要这样做”之类的否定表述更有帮助。这种肯定的方法有助于建立清晰的界限和精确的指南，使模型更容易遵循，确保响应更接近期望。例如，与其说“不要使用非正式语言”，不如明确地说“你必须使用正式语言”。这种方法确保指令被明确理解。
- en: 'Be direct: When interacting with an LLM, there is no need to use polite language
    such as "please" or "thank you." These models are designed to respond efficiently
    without formalities, so getting straight to the point is best. This helps keep
    the prompt unambiguous.'
  id: totrans-401
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 直接表达：在与大型语言模型（LLM）互动时，没有必要使用“请”或“谢谢”等礼貌用语。这些模型被设计成高效响应，无需客套，因此直接表达是最好的。这有助于保持提示的明确性。
- en: 'Word or phrase repetition: Repeating a specific word or phrase within a prompt
    can help emphasize a particular concept or instruction. This ensures that the
    model does not overlook crucial aspects of the task it needs to execute.'
  id: totrans-402
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 单词或短语重复：在提示中重复特定的单词或短语可以帮助强调某个特定的概念或指令。这确保了模型不会忽略任务执行中至关重要的方面。
- en: 'Include monetary incentives in prompts: Although it may seem unusual, mentioning
    incentives such as "I''ll give you a tip of xx€ for a better solution" in your
    prompts can be a strategy to motivate the generation of more elaborate responses.'
  id: totrans-403
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在提示中包含货币激励：虽然这可能看起来不寻常，但在提示中提到“我会给你 xx€ 的小费以获得更好的解决方案”等激励措施，可以是一种激励生成更详尽响应的策略。
- en: By following these principles, you can improve the quality and accuracy of interactions
    with ChatGPT or any other LLM, facilitating more effective communication and reliable
    results.
  id: totrans-404
  prefs: []
  type: TYPE_NORMAL
  zh: 通过遵循这些原则，你可以提高与 ChatGPT 或任何其他 LLM 交互的质量和准确性，促进更有效的沟通和可靠的结果。
- en: 3.4\. Six strategies for better results
  id: totrans-405
  prefs: []
  type: TYPE_NORMAL
  zh: 3.4. 六种提高结果的方法
- en: Now that we have a basic understanding of prompt engineering, it's time to take
    our skills to the next level. Let's explore six effective strategies to achieve
    better results when interacting with ChatGPT. These techniques will allow us to
    fine-tune our questions to maximize the relevance of the responses obtained. By
    applying these strategies, we can take full advantage of the capabilities of any
    LLM, ensuring more efficient interactions and more valuable results in our daily
    projects or queries.
  id: totrans-406
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们对提示工程有了基本的了解，是时候将我们的技能提升到下一个层次了。让我们探索六个有效策略，以在与 ChatGPT 互动时获得更好的结果。这些技术将使我们能够微调我们的问题，以最大化获得响应的相关性。通过应用这些策略，我们可以充分利用任何
    LLM 的能力，确保在日常工作项目或查询中更有效的交互和更有价值的结果。
- en: '3.4.1.     Strategy 1: Write clear instructions'
  id: totrans-407
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3.4.1. 策略 1：写出清晰的指示
- en: 'Tactic 1: Include details in your query to get more relevant responses.'
  id: totrans-408
  prefs: []
  type: TYPE_NORMAL
  zh: 策略 1：在查询中包含细节以获得更相关的响应。
- en: Ensure the requests provide important details or context to get a relevant response.
    Otherwise, you are leaving the model guessing what you want to say.
  id: totrans-409
  prefs: []
  type: TYPE_NORMAL
  zh: 确保请求提供重要细节或背景信息以获得相关响应。否则，你是在让模型猜测你想要说什么。
- en: '| Worst | Best |'
  id: totrans-410
  prefs: []
  type: TYPE_TB
  zh: '| 最差 | 最好 |'
- en: '| How do I add numbers in Excel? | How do I add up a row of dollar amounts
    in Excel? I want to do this automatically for an entire sheet of rows with all
    totals appearing at the end in a column called "Total". |'
  id: totrans-411
  prefs: []
  type: TYPE_TB
  zh: '| 如何在 Excel 中添加数字？ | 如何在 Excel 中将一行美元金额相加？我想为整个工作表的行自动执行此操作，所有总和都出现在名为“总计”的列中。|'
- en: '| Who is the president? | Who was the president of Mexico in 2021, and how
    often are elections held? |'
  id: totrans-412
  prefs: []
  type: TYPE_TB
  zh: '| 谁是总统？ | 2021 年墨西哥的总统是谁，选举多久举行一次？|'
- en: 'Tactic 2: Use delimiters to indicate different parts of the prompt.'
  id: totrans-413
  prefs: []
  type: TYPE_NORMAL
  zh: 策略 2：使用分隔符来指示提示的不同部分。
- en: Prompt - Summarizes the text delimited by triple quotation marks.
  id: totrans-414
  prefs: []
  type: TYPE_NORMAL
  zh: Prompt - 概括由三引号分隔的文本。
- en: '"""insert text here""""'
  id: totrans-415
  prefs: []
  type: TYPE_NORMAL
  zh: '"""在此处插入文本""""'
- en: Prompt - You will be provided with a couple of articles (delimited with XML
    tags) on the same topic. First summarize the arguments in each article. Then indicate
    which one makes a better argument and explain why.
  id: totrans-416
  prefs: []
  type: TYPE_NORMAL
  zh: Prompt - 你将获得几篇关于同一主题的文章（由 XML 标签分隔）。首先总结每篇文章的论点。然后指出哪一篇文章的论点更好，并解释原因。
- en: <article> insert first article here </article>.
  id: totrans-417
  prefs: []
  type: TYPE_NORMAL
  zh: <article>在此处插入第一篇文章</article>。
- en: <article> insert second article here </article>.
  id: totrans-418
  prefs: []
  type: TYPE_NORMAL
  zh: <article>在此处插入第二篇文章</article>。
- en: Delimiters such as triple quotation marks, XML tags, section headings, etc.,
    can help restrict sections of text to be treated differently.
  id: totrans-419
  prefs: []
  type: TYPE_NORMAL
  zh: 如三引号、XML 标签、章节标题等分隔符可以帮助限制文本的不同部分以进行不同的处理。
- en: Delimiters may not affect the output quality for simple tasks such as these.
    However, the more complex a task is, the more critical it is to delimit its different
    sections or parts.
  id: totrans-420
  prefs: []
  type: TYPE_NORMAL
  zh: 分隔符可能不会影响这些简单任务输出质量，但是任务越复杂，对分隔其不同部分或部分的重要性就越大。
- en: 'Tactic 3: Specify the steps required to complete a task.'
  id: totrans-421
  prefs: []
  type: TYPE_NORMAL
  zh: 策略 3：指定完成任务所需的步骤。
- en: When faced with large tasks, these are best managed as a sequence of steps.
    Writing the steps explicitly can make it easier for the model to follow them.
  id: totrans-422
  prefs: []
  type: TYPE_NORMAL
  zh: 面对大型任务时，最好将其作为一系列步骤来管理。明确写出步骤可以使模型更容易遵循。
- en: 'Prompt - Step 1: The user will provide you with text enclosed in triple quotes.
    Summarize this text in a sentence with a prefix that reads "Summary: ".'
  id: totrans-423
  prefs: []
  type: TYPE_NORMAL
  zh: Prompt - 第一步：用户将提供用三引号括起来的文本。用带有“摘要：”前缀的句子总结此文本。
- en: 'Step 2 - Translate the summary from Step 1 into Spanish, with a prefix that
    says "Traducción: ".'
  id: totrans-424
  prefs: []
  type: TYPE_NORMAL
  zh: 第一步 - 将步骤 1 中的摘要翻译成西班牙语，前缀为“翻译：”。
- en: 'Tactic 4: Provide examples.'
  id: totrans-425
  prefs: []
  type: TYPE_NORMAL
  zh: 策略 4：提供示例。
- en: 'This tactic of providing examples, also called "few-shot  Prompting," involves
    training or adjusting language models using only a few input examples at our prompt
    to teach a specific task. This is similar to how humans learn most effectively:
    We can understand concepts with explanations alone, but concrete examples often
    improve our understanding. By providing specific examples, the model learns to
    perform similar tasks more effectively, mimicking the human learning process that
    benefits significantly from practical examples and confirmed applications.'
  id: totrans-426
  prefs: []
  type: TYPE_NORMAL
  zh: 这种提供示例的策略，也称为“少样本提示”，涉及使用我们提示中的仅几个输入示例来训练或调整语言模型，以教授特定任务。这与人类最有效地学习的方式相似：我们可以仅通过解释来理解概念，但具体的例子往往能提高我们的理解。通过提供具体示例，模型学会更有效地执行类似任务，模仿从实际示例和确认应用中受益显著的人类学习过程。
- en: Prompt -
  id: totrans-427
  prefs: []
  type: TYPE_NORMAL
  zh: 提示 -
- en: 'Great product, 10/10: positive'
  id: totrans-428
  prefs: []
  type: TYPE_NORMAL
  zh: 优秀的产品，10/10：正面
- en: 'Did not work very well: negative'
  id: totrans-429
  prefs: []
  type: TYPE_NORMAL
  zh: 工作效果不佳：负面
- en: 'Super useful, worthwhile: positive'
  id: totrans-430
  prefs: []
  type: TYPE_NORMAL
  zh: 非常有用，值得：正面
- en: 'It does not work:'
  id: totrans-431
  prefs: []
  type: TYPE_NORMAL
  zh: 这不起作用：
- en: ChatGPT - Negative
  id: totrans-432
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT - 负面
- en: 'The way we structure the examples is fundamental. Since we have organized these
    three instances in an |input: rating| format, the model generates a single word
    following the final line rather than outputting a complete sentence such as "this
    review is negative".'
  id: totrans-433
  prefs: []
  type: TYPE_NORMAL
  zh: 我们构建示例的方式是基本的。由于我们已经以 |输入：评分| 格式组织了这三个实例，模型在最后一行之后生成一个单词，而不是输出一个完整的句子，例如“这个评论是负面的”。
- en: '3.4.2.     Strategy 2: Provide a reference text'
  id: totrans-434
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3.4.2. 策略 2：提供参考文本
- en: 'Tactic 1: Instruct the model to respond using a reference text.'
  id: totrans-435
  prefs: []
  type: TYPE_NORMAL
  zh: 策略 1：指示模型使用参考文本进行回答。
- en: If we can provide the model with trusted information relevant to the current
    query, we can ask the model to use the information provided to compose its response.
  id: totrans-436
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们可以为模型提供与当前查询相关的可信信息，我们可以要求模型使用提供的信息来编写其回答。
- en: Prompt - Use the provided articles delimited by triple quotation marks to answer
    the questions. If the answer is not found in the articles, write "I could not
    find an answer".
  id: totrans-437
  prefs: []
  type: TYPE_NORMAL
  zh: 提示 - 使用由三引号分隔提供的文章来回答问题。如果答案未在文章中找到，请写“我找不到答案”。
- en: <insert articles, each delimited by triple quotation marks>.
  id: totrans-438
  prefs: []
  type: TYPE_NORMAL
  zh: <插入文章，每篇文章由三引号分隔>。
- en: Since all models have limited context windows, we must be cautious with the
    length of the texts provided.
  id: totrans-439
  prefs: []
  type: TYPE_NORMAL
  zh: 由于所有模型都有有限的范围窗口，我们必须谨慎提供文本的长度。
- en: 'Tactic 2: Ask the model to respond with quotes from a reference text.'
  id: totrans-440
  prefs: []
  type: TYPE_NORMAL
  zh: 策略 2：要求模型引用参考文本中的引语进行回答。
- en: 'Prompt - You will be provided with a document delimited by triple quotation
    marks and a question. Your task is to answer the question using only the document
    provided and cite the passage(s) from the document used to answer the question.
    If the document does not contain the information needed to answer the question,
    simply write: "Insufficient information". If an answer to the question is provided,
    it should be noted with a citation. Use the following format to cite the relevant
    passages ({"citation": ...}).'
  id: totrans-441
  prefs: []
  type: TYPE_NORMAL
  zh: '提示 - 你将获得一个由三引号分隔的文档和一个问题。你的任务是使用提供的文档回答问题，并引用文档中用于回答问题的段落。如果文档不包含回答问题的信息，请简单地写：“信息不足”。如果提供了问题的答案，应注明引用。使用以下格式引用相关段落（{"引用":
    ...}）。'
- en: '3.4.3.     Strategy 3: Assign roles'
  id: totrans-442
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3.4.3. 策略 3：分配角色
- en: When we assign a specific role to an LLM, the model can adapt its approach and
    language to the user's needs, significantly improving the experience.
  id: totrans-443
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们为LLM分配一个特定角色时，模型可以调整其方法和语言以适应用户的需求，从而显著提高体验。
- en: '1\. Role definition: When mathematicians, engineers, and physicists approach
    a problem from different perspectives, assigning ChatGPT a defined role allows
    it to adapt its answers more appropriately. This makes the answers obtained more
    relevant, as the model has a greater conversation context.'
  id: totrans-444
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 角色定义：当数学家、工程师和物理学家从不同角度处理问题时，为ChatGPT分配一个定义好的角色允许它更适当地调整其答案。这使得获得的答案更加相关，因为模型有更大的对话上下文。
- en: '2\. Specialization: Role assignment allows ChatGPT to use its "sub-models"
    or "experts", each tuned for specific tasks or queries. GPT models are speculated
    to be what we know as Mixture of Experts (MoE), meaning that GPT is not a single
    model but several smaller sub-models that work in a coordinated fashion. By establishing
    a role, we help to ensure that only the necessary experts are activated for a
    given query, optimizing the computational resources required for these models''
    operation.'
  id: totrans-445
  prefs: []
  type: TYPE_NORMAL
  zh: 2\. 专业化：角色分配允许ChatGPT使用其“子模型”或“专家”，每个都针对特定任务或查询进行了调整。GPT模型被推测是我们所知的专家混合（MoE），这意味着GPT不是一个单一模型，而是几个较小的子模型，它们以协调的方式工作。通过建立角色，我们帮助确保只有必要的专家在给定的查询中被激活，从而优化了这些模型操作所需的计算资源。
- en: '3\. Efficiency in responses: With clear roles, ChatGPT can provide more specialized
    advice and responses. For example, if assigned the role of a physics educator,
    the model will adjust its language and method of explanation to suit that specific
    field better, resulting in a better response for the user.'
  id: totrans-446
  prefs: []
  type: TYPE_NORMAL
  zh: 3\. 响应效率：有了明确的角色，ChatGPT可以提供更专业的建议和回应。例如，如果被分配为物理教育者的角色，该模型将调整其语言和解释方法，以更好地适应该特定领域，从而为用户提供更好的回应。
- en: The effective way to assign a role to ChatGPT is to include the desired role
    in our instructions at the beginning of the conversation. This can be done using
    phrases such as "act as" or "take on the role of." For example, if you want ChatGPT
    to assume the role of a sports coach, you could start your query with "Act like
    a sports coach and explain to me how to improve my running endurance."
  id: totrans-447
  prefs: []
  type: TYPE_NORMAL
  zh: 为ChatGPT分配角色的有效方法是，在对话开始时将期望的角色包含在我们的指令中。这可以通过使用诸如“扮演”或“承担……的角色”之类的短语来完成。例如，如果你想ChatGPT扮演体育教练的角色，你可以在你的查询开始时说：“扮演一个体育教练的角色，并告诉我如何提高我的跑步耐力。”
- en: '3.4.4.     Strategy 4: Tree of thought'
  id: totrans-448
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3.4.4.     策略 4：思维树
- en: The Thinking Tree is a technique for organizing and simplifying complex decisions
    by breaking them into more manageable options. This strategy, visualized as a
    tree branching in different directions, helps to consider all possible alternatives
    and choose the most appropriate one at each process step.
  id: totrans-449
  prefs: []
  type: TYPE_NORMAL
  zh: 思维树是一种通过将复杂决策分解为更易管理的选项来组织和简化复杂决策的技术。这种策略，以树形分支向不同方向可视化，有助于考虑所有可能的替代方案，并在每个过程步骤中选择最合适的方案。
- en: 'Let''s say you want to eat something but are unsure what. First, you think
    about the types of food you like: Italian, Chinese, Indian? If you wish to eat
    Italian, this is your first path on your map. Then, you have several options for
    Italian food: pizzas, pasta, and ice cream. If you feel like pizza, you follow
    the road to the pizzerias. Finally, at the pizzeria, you decide between different
    types of pizza: Margherita, Neapolitan, or with tuna. In the end, you choose a
    pizza with tuna. This process shows how, step by step, you narrow down your choices
    until you make a particular final decision. You started with a very general idea
    ("I want to eat out") and chose a certain dish in a specific type of restaurant.'
  id: totrans-450
  prefs: []
  type: TYPE_NORMAL
  zh: 假设你想要吃点东西，但又不确定吃什么。首先，你考虑你喜欢哪些类型的食物：意大利菜、中国菜、印度菜？如果你想吃意大利菜，这是你在地图上的第一条路径。然后，你有多样化的意大利菜选择：比萨、意面和冰淇淋。如果你想吃比萨，你就沿着通往比萨饼店的路线走。最后，在比萨饼店，你会在不同类型的比萨之间做出选择：玛格丽塔、那不勒斯或金枪鱼。最终，你选择了一块金枪鱼比萨。这个过程展示了你如何一步一步地缩小选择范围，直到做出一个特定的最终决定。你从一个非常一般的概念（“我想外出就餐”）开始，并在特定类型的餐厅中选择了一道特定的菜肴。
- en: In artificial intelligence, LLMs are designed to assist in these creative processes.
    Although we sometimes ask them to "decide" the best solution or to make decisions
    for us, they are not designed for this. Their strength lies in their ability to
    generate creative and varied content, offering multiple options for us, with our
    human judgment, to make the final decision. This makes them ideal tools for exploring
    possibilities and enriching our decision-making process.
  id: totrans-451
  prefs: []
  type: TYPE_NORMAL
  zh: 在人工智能领域，LLMs（大型语言模型）被设计来协助这些创造性过程。尽管我们有时会要求它们“决定”最佳解决方案或为我们做出决策，但它们并非为此而设计。它们的优势在于能够生成富有创意和多样化的内容，为我们提供多种选择，结合我们人类的判断，最终做出决策。这使得它们成为探索可能性并丰富我们决策过程的理想工具。
- en: '3.4.5.     Strategy 5: Divide complex tasks into subtasks'
  id: totrans-452
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3.4.5.     策略 5：将复杂任务分解为子任务
- en: 'Tactic 1: Summarize or filter previous dialogues.'
  id: totrans-453
  prefs: []
  type: TYPE_NORMAL
  zh: 战术 1：总结或筛选之前的对话。
- en: To handle long conversations, it is crucial to understand the limited ability
    of language models to process text. This refers to the context window. Eventually,
    a limit will be reached to prevent adding more text without losing the previous
    text.
  id: totrans-454
  prefs: []
  type: TYPE_NORMAL
  zh: 为了处理长对话，理解语言模型处理文本的有限能力至关重要。这指的是上下文窗口。最终，将达到一个极限，以防止在不丢失先前文本的情况下添加更多文本。
- en: An effective strategy for handling this problem is to summarize or filter previous
    dialogues. As the conversation nears the edge, information from earlier dialogues
    can be condensed into a shorter summary. This summary retains the key points of
    the conversation and allows the dialogue to continue without losing the relevant
    context. This technique enables long conversations to continue smoothly without
    compromising the model's understanding of the context.
  id: totrans-455
  prefs: []
  type: TYPE_NORMAL
  zh: 处理这个问题的有效策略是对之前的对话进行总结或过滤。随着对话接近边缘，早期对话的信息可以被压缩成一个更短的摘要。这个摘要保留了对话的关键点，并允许对话继续进行，而不会丢失相关的上下文。这种技术使得长对话可以平稳地进行，而不会损害模型对上下文的理解。
- en: 'Tactic 2: Summarize long documents in parts and build a complete summary recursively.'
  id: totrans-456
  prefs: []
  type: TYPE_NORMAL
  zh: 策略2：分部分总结长文档，并递归地构建完整的摘要。
- en: Since the models have a fixed context length, they cannot be used to summarize
    text longer than the context length minus the summary size generated in a single
    query. To summarize a very long document, such as a book, we can use a sequence
    of queries to summarize each section. The section summaries can be concatenated
    to form a single summary. This process can proceed recursively until an entire
    document is summarized.
  id: totrans-457
  prefs: []
  type: TYPE_NORMAL
  zh: 由于模型有一个固定的上下文长度，它们不能用来总结比上下文长度减去单个查询生成的摘要大小还要长的文本。为了总结非常长的文档，例如一本书，我们可以使用一系列查询来总结每个部分。这些部分摘要可以连接起来形成一个单独的摘要。这个过程可以递归进行，直到整个文档被总结。
- en: If it is necessary to use information from earlier sections to understand later
    sections, an additional trick is to include a summary of the text preceding any
    given point in the book.
  id: totrans-458
  prefs: []
  type: TYPE_NORMAL
  zh: 如果需要使用早期部分的信息来理解后续部分，一个额外的技巧是在书中任何给定点之前包含该文本的摘要。
- en: '3.4.6.     Strategy 6: Give models time to "think".'
  id: totrans-459
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3.4.6. 策略6：给模型留出“思考”的时间。
- en: 'Tactic 1: Instruct the model to find its solution before concluding.'
  id: totrans-460
  prefs: []
  type: TYPE_NORMAL
  zh: 策略1：指示模型在得出结论之前找到其解决方案。
- en: A practical method we used to apply with earlier models was to ask them to reason
    step by step, developing their solution logically before arriving at a final answer.
    This approach is handy in tasks that require mathematical or scientific reasoning.
    Rather than simply answering immediately, the model should check each step before
    concluding. This type of Prompting  has been vital to improving the accuracy of
    answers, especially in complex problems.
  id: totrans-461
  prefs: []
  type: TYPE_NORMAL
  zh: 我们在早期模型中使用的实用方法是让他们逐步推理，在得出最终答案之前逻辑地发展他们的解决方案。这种方法在需要数学或科学推理的任务中很有用。模型不应立即回答，而应在得出结论之前检查每个步骤。这种提示类型对于提高答案的准确性至关重要，尤其是在复杂问题中。
- en: With the introduction of the OpenAI o1 model, this process has been incorporated
    directly into the model design. OpenAI o1 is trained to think in a structured
    way, checking its steps and evaluating the validity of its reasoning before providing
    an answer. This makes it an outstanding tool in math and science, where logical
    thinking and accuracy are essential. Whereas previously, we could guide ChatGPT
    to follow this process, OpenA o1 does it naturally, ushering in a new era where
    AI models respond and "think" in a much more advanced and controlled way.
  id: totrans-462
  prefs: []
  type: TYPE_NORMAL
  zh: 随着OpenAI o1模型的引入，这个过程已经被直接纳入到模型设计中。OpenAI o1被训练以结构化的方式进行思考，在提供答案之前检查其步骤并评估其推理的有效性。这使得它在数学和科学领域成为一个出色的工具，在这些领域中逻辑思维和准确性至关重要。而之前，我们只能引导ChatGPT遵循这个过程，OpenAI
    o1则能自然地做到这一点，引领AI模型以更先进和受控的方式响应和“思考”的新时代。
- en: This breakthrough reminds us of the importance of optimizing our Prompting  strategies.
    Although OpenAI o1 does it more efficiently, it is only the first step towards
    even more sophisticated models in the future. The continued evolution of this
    capability will ultimately allow us to work with AI increasingly accurately and
    reliably.
  id: totrans-463
  prefs: []
  type: TYPE_NORMAL
  zh: 这个突破提醒我们优化我们的提示策略的重要性。尽管OpenAI o1做得更有效率，但这只是通往未来更加复杂模型的第一步。这种能力的持续进化最终将使我们能够以越来越准确和可靠的方式与AI合作。
- en: Let's look at an example of this tactic. In this case, we intend to evaluate
    the solution to a mathematical problem. Instead of directly asking if the solution
    is correct, it would be more useful to ask the model to explain step-by-step why
    it considers the answer correct or not. This approach encourages a more detailed
    analysis and can lead to more accurate and substantiated answers.
  id: totrans-464
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看这个策略的一个例子。在这种情况下，我们打算评估一个数学问题的解决方案。与其直接询问解决方案是否正确，不如让模型逐步解释为什么它认为答案是正确或错误的。这种方法鼓励更详细的分析，并可能导致更准确和有根据的答案。
- en: Prompt - How much is 923 * 99?
  id: totrans-465
  prefs: []
  type: TYPE_NORMAL
  zh: 提示 - 923乘以99等于多少？
- en: ChatGPT - 923 * 99 equals 91,677
  id: totrans-466
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT - 923乘以99等于91,677
- en: Wrong answer (the correct answer is 91,377). We can modify our message and tell
    it to think step by step. It is shown that ChatGPT can solve the problem with
    additional instructions. This works because ChatGPT writes all its work, reducing
    the probability of failure.
  id: totrans-467
  prefs: []
  type: TYPE_NORMAL
  zh: 答案错误（正确答案是91,377）。我们可以修改我们的消息，并让它逐步思考。这表明ChatGPT可以通过额外的指令解决问题。这是因为ChatGPT会写出所有的工作，减少了失败的概率。
- en: Prompt - How much is 923 * 99? Let's go step by step. Always write the full
    number of 0s for each term.
  id: totrans-468
  prefs: []
  type: TYPE_NORMAL
  zh: 提示 - 923乘以99等于多少？让我们一步步来。始终为每个项写出完整的0。
- en: 'ChatGPT - To multiply 923 by 99, we can break it down into smaller steps:'
  id: totrans-469
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT - 要将923乘以99，我们可以将其分解成更小的步骤：
- en: 'Step 1: Multiply the first term by 9:'
  id: totrans-470
  prefs: []
  type: TYPE_NORMAL
  zh: 步骤1：将第一个数乘以9：
- en: 923 * 9 = 8307
  id: totrans-471
  prefs: []
  type: TYPE_NORMAL
  zh: 923乘以9等于8307
- en: 'Step 2: Multiply the first term by 90 (adding a 0):'
  id: totrans-472
  prefs: []
  type: TYPE_NORMAL
  zh: 步骤2：将第一个数乘以90（添加一个0）：
- en: 923 * 90 = 83070
  id: totrans-473
  prefs: []
  type: TYPE_NORMAL
  zh: 923乘以90等于83070
- en: 'Step 3: Add the results of step 1 and step 2:'
  id: totrans-474
  prefs: []
  type: TYPE_NORMAL
  zh: 步骤3：将步骤1和步骤2的结果相加：
- en: 8307 + 83070 = 91377
  id: totrans-475
  prefs: []
  type: TYPE_NORMAL
  zh: 8307 + 83070 = 91377
- en: Therefore, 923 multiplied by 99 equals 91,377.
  id: totrans-476
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，923乘以99等于91,377。
- en: 'Tactic 2: Ask the model if anything has been missed in previous passes.'
  id: totrans-477
  prefs: []
  type: TYPE_NORMAL
  zh: 策略2：询问模型在之前的迭代中是否遗漏了任何内容。
- en: A helpful tactic when using language models is to ask them if they have missed
    anything in previous answers. Imagine that you are using an LLM to elicit excerpts
    from a document in response to a specific question. After listing each excerpt,
    the model must decide if it should continue writing another one or stop. If the
    document is long, it is common for the model to stop prematurely without listing
    all relevant excerpts. In these cases, better performance can often be obtained
    by asking follow-up questions to discover any excerpts the model initially missed.
  id: totrans-478
  prefs: []
  type: TYPE_NORMAL
  zh: 当使用语言模型时，一个有用的策略是询问它们是否在之前的答案中遗漏了任何内容。想象一下，你正在使用一个LLM来根据特定问题从文档中提取摘录。在列出每个摘录后，模型必须决定是否继续写另一个摘录或停止。如果文档很长，模型通常会提前停止，而没有列出所有相关的摘录。在这些情况下，通过询问后续问题以发现模型最初遗漏的摘录，通常可以获得更好的性能。
- en: 'Suppose you have a paper on the history of science and want to know about critical
    discoveries in biology. After the first pass of the model, you might ask yourself:'
  id: totrans-479
  prefs: []
  type: TYPE_NORMAL
  zh: 假设你有一篇关于科学历史的论文，并想了解生物学中的关键发现。在模型的第一次迭代后，你可能会问自己：
- en: Prompt - Are there more relevant excerpts about important discoveries in biology
    that have not been mentioned? Make sure the excerpts contain all the relevant
    context necessary to interpret them.
  id: totrans-480
  prefs: []
  type: TYPE_NORMAL
  zh: 提示 - 是否还有关于生物学重要发现的摘录尚未提及？确保摘录包含所有必要的上下文，以便进行解释。
- en: '3.5\. Canvas: A New Collaborative Interface'
  id: totrans-481
  prefs: []
  type: TYPE_NORMAL
  zh: 3.5\. Canvas：一个新的协作界面
- en: Canvas is an innovative interface that transcends traditional chat functionalities to
    enhance your writing and coding projects. Upon detecting potential improvements
    to your workflow or when prompted with "use Canvas" in your message, ChatGPT will
    automatically initiate a separate Canvas window. This feature creates an environment
    where you can collaborate with ChatGPT in real time, significantly enhancing how
    you brainstorm, draft, and refine ideas visually and interactively.
  id: totrans-482
  prefs: []
  type: TYPE_NORMAL
  zh: Canvas是一个创新的界面，它超越了传统的聊天功能，以增强你的写作和编码项目。当检测到你的工作流程有潜在改进时，或者当你的消息中出现“使用Canvas”提示时，ChatGPT将自动启动一个单独的Canvas窗口。这个功能创建了一个可以与ChatGPT实时协作的环境，显著提高了你构思、起草和视觉互动式地完善想法的方式。
- en: Currently, the beta version of Canvas operates on the powerful GPT-4-turbo model.
    Users can manually choose this model from the selection menu, although it is available
    exclusively to ChatGPT Plus and Team users globally. It’s worth noting that after
    the beta testing phase concludes, the intention is to roll out Canvas to all ChatGPT
    users, broadening its accessibility. Many users turn to ChatGPT daily for their
    writing and programming needs. While the traditional chat interface is user-friendly,
    it may lack the depth required for projects involving extensive edits and revisions.
    This is precisely where Canvas plays a pivotal role. It presents a unique experience
    that empowers you to visualize, modify, and manage your projects more precisely
    and efficiently.
  id: totrans-483
  prefs: []
  type: TYPE_NORMAL
  zh: 目前，Canvas的测试版运行在强大的GPT-4-turbo模型上。用户可以从选择菜单手动选择此模型，尽管它仅对全球的ChatGPT Plus和团队用户开放。值得注意的是，在测试阶段结束后，计划将Canvas推广到所有ChatGPT用户，扩大其可访问性。许多用户每天都会转向ChatGPT以满足他们的写作和编程需求。虽然传统的聊天界面用户友好，但它可能缺乏涉及大量编辑和修订的项目所需的深度。这正是Canvas发挥关键作用的地方。它提供了一个独特的体验，让您能够更精确、更高效地可视化、修改和管理项目。
- en: '![A screenshot of a chat  Description automatically generated](image_rsrc3PN.jpg)'
  id: totrans-484
  prefs: []
  type: TYPE_IMG
  zh: '![聊天截图 自动生成描述](image_rsrc3PN.jpg)'
- en: ChatGPT gains an enhanced understanding of the context surrounding your project
    with Canvas. You can highlight particular sections of your work, directing ChatGPT’s
    focus like a text editor or code reviewer. This facilitates real-time feedback
    and suggestions tailored to your specific needs.
  id: totrans-485
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT通过Canvas对您项目的上下文有了更深入的理解。您可以选择您工作的特定部分，将ChatGPT的焦点引导得像文本编辑器或代码审查员一样。这促进了针对您特定需求的实时反馈和建议。
- en: Canvas also places a premium on user control. You can edit text and code directly
    within the interface, ensuring changes are easily implemented. Additionally, a
    convenient shortcut menu—located as a drop-down option in the bottom right corner
    of the screen—allows you to swiftly adjust text length, debug your code, and execute
    other helpful commands with minimal effort. Furthermore, suppose you need to revert
    to an earlier project iteration. In that case, Canvas offers a back button feature
    that lets you seamlessly return to previous versions, ensuring you never lose
    your progress.
  id: totrans-486
  prefs: []
  type: TYPE_NORMAL
  zh: Canvas同样重视用户控制。您可以直接在界面中编辑文本和代码，确保更改易于实施。此外，一个方便的快捷菜单——位于屏幕右下角的下拉选项中——允许您快速调整文本长度、调试代码以及执行其他有助于工作的命令，只需付出最小的努力。此外，如果您需要恢复到早期项目迭代，Canvas提供了一个返回按钮功能，让您可以无缝返回到之前的版本，确保您永远不会丢失进度。
- en: In summary, Canvas is designed to revolutionize users' interactions with ChatGPT
    by providing a more structured and collaborative approach to managing complex
    writing and coding tasks.
  id: totrans-487
  prefs: []
  type: TYPE_NORMAL
  zh: 总结来说，Canvas旨在通过提供更结构化和协作的方式来管理复杂的写作和编码任务，从而彻底改变用户与ChatGPT的互动方式。
- en: 3.5.1.     Shortcuts for writing in Canvas
  id: totrans-488
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3.5.1.     Canvas中的写作快捷键
- en: These quick actions are prompts hidden under buttons, which makes the work incredibly
    easy and fast.
  id: totrans-489
  prefs: []
  type: TYPE_NORMAL
  zh: 这些快速操作是隐藏在按钮下的提示，这使得工作变得极其简单和快速。
- en: 'Suggest edits: ChatGPT provides online suggestions and detailed comments.'
  id: totrans-490
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提出编辑建议：ChatGPT提供在线建议和详细的评论。
- en: 'Adjust the length: Modify the size of your document, making it shorter or more
    detailed.'
  id: totrans-491
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 调整长度：修改文档的大小，使其更短或更详细。
- en: 'Change the reading level: Adapt the text from a basic level to an advanced
    academic level.'
  id: totrans-492
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 改变阅读级别：将文本从基本水平调整到高级学术水平。
- en: 'Add final polish: Improve your texts'' grammar, clarity, and consistency.'
  id: totrans-493
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 添加最终润色：改善文本的语法、清晰度和一致性。
- en: 'Add emojis: Integrate relevant emojis for color and emphasis.'
  id: totrans-494
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 添加表情符号：整合相关的表情符号以增加色彩和强调。
- en: 3.5.2.     Canvas for programming
  id: totrans-495
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3.5.2.     Canvas编程
- en: 'Programming requires a process of constant revisions, and Canvas makes it easy
    to keep track of these changes. Thanks to its tools, greater transparency and
    understanding are ensured with each update. Programming shortcuts:'
  id: totrans-496
  prefs: []
  type: TYPE_NORMAL
  zh: 编程需要不断修订的过程，Canvas使跟踪这些更改变得容易。多亏了它的工具，每次更新都确保了更高的透明度和理解。编程快捷键：
- en: 'Review code: Receive suggestions to optimize and improve your code.'
  id: totrans-497
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 审查代码：接收优化和改进代码的建议。
- en: 'Add records: Inserts print statements for debugging.'
  id: totrans-498
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 添加记录：插入打印语句以进行调试。
- en: 'Add comments: Facilitates the code reading by adding clear explanations.'
  id: totrans-499
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 添加注释：通过添加清晰的解释来促进代码阅读。
- en: 'Error correction: Automatically identifies and fixes problems.'
  id: totrans-500
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 错误纠正：自动识别并修复问题。
- en: 'Convert to another language: Translate the code to JavaScript, TypeScript,
    Python, Java, C++ or PHP.'
  id: totrans-501
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 转换为其他语言：将代码转换为JavaScript、TypeScript、Python、Java、C++或PHP。
- en: Chapter IV
  id: totrans-502
  prefs: []
  type: TYPE_NORMAL
  zh: 第四章
- en: Increase your productivity
  id: totrans-503
  prefs: []
  type: TYPE_NORMAL
  zh: 提高你的生产力
- en: Throughout this chapter, we will see several use case examples, where we will
    demonstrate how ChatGPT can improve the way we work and communicate. We will discover
    applications in the professional field, from preparing resumes and cover letters
    to simulating job interviews, thus facilitating job search processes. In addition,
    we will analyze its potential in programming to learn new languages, explain code,
    and even create web pages. We will address the impact of this technology in education
    and see suggestions on how to integrate these models into the teaching-learning
    process, facilitating tasks such as searching for and managing references. This
    is a truly revolutionary tool because of its ability to understand and generate
    human-like text. In the following pages, we will see examples demonstrating its
    potential to boost our productivity to new levels in various aspects of our lives.
  id: totrans-504
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将看到几个用例示例，我们将展示ChatGPT如何改善我们的工作和沟通方式。我们将发现其在专业领域的应用，从准备简历和求职信到模拟面试，从而简化求职过程。此外，我们还将分析其在编程中学习新语言、解释代码甚至创建网页的潜力。我们将探讨这项技术在教育领域的影响，并提出如何将这些模型整合到教学学习过程中的建议，以简化诸如查找和管理参考文献等任务。这是一个真正革命性的工具，因为它能够理解和生成类似人类的文本。在接下来的页面中，我们将看到一些示例，展示其如何在我们生活的各个方面提高我们的生产力。
- en: 4.1.          Use of ChatGPT in Communication
  id: totrans-505
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 4.1.          ChatGPT在沟通中的应用
- en: ChatGPT has become an essential communication tool, assisting in creating and
    managing texts efficiently. Its ability to generate contextually appropriate responses
    allows users to optimize their time and improve the quality of their writing.
  id: totrans-506
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT已成为一项重要的沟通工具，帮助高效地创建和管理文本。它生成上下文相关响应的能力使用户能够优化他们的时间并提高写作质量。
- en: Despite its numerous advantages, handling ChatGPT responses with caution is
    essential. The tool may sometimes produce errors or 'hallucinations', presenting
    inaccurate data as if they were facts. Therefore, reviewing the generated content
    is always advisable to ensure accuracy and truthfulness.
  id: totrans-507
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管它有众多优点，但谨慎处理ChatGPT的响应是必要的。该工具有时可能会产生错误或“幻觉”，将不准确的数据作为事实呈现。因此，审查生成的内容始终是建议的做法，以确保准确性和真实性。
- en: Effective implementation of ChatGPT in communication simplifies the writing
    process and enhances the quality of the content. However, this is contingent on
    the user's informed and critical monitoring. It's crucial to remember that while
    ChatGPT can assist, it's the user's responsibility to ensure the accuracy and
    truthfulness of the content.
  id: totrans-508
  prefs: []
  type: TYPE_NORMAL
  zh: 在沟通中有效实施ChatGPT简化了写作过程并提高了内容质量。然而，这取决于用户的信息和批判性监控。记住，虽然ChatGPT可以提供帮助，但确保内容的准确性和真实性是用户的责任。
- en: 4.1.1.     Writing e-mails
  id: totrans-509
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4.1.1.     撰写电子邮件
- en: 'Sometimes, writing an e-mail can be difficult, as we must find the right tone
    and use the correct expressions. It is crucial to convey the information efficiently
    so the recipient understands it. ChatGPT can help us write various email types,
    including business proposals, sales, surveys, etc. It can develop any email if
    we give it the proper instructions. Let''s take a look at an example:'
  id: totrans-510
  prefs: []
  type: TYPE_NORMAL
  zh: 有时候，写电子邮件可能很困难，因为我们必须找到合适的语气并使用正确的表达。有效地传达信息至关重要，以便收件人能够理解。ChatGPT可以帮助我们撰写各种类型的电子邮件，包括商务提案、销售、调查等。如果我们给出适当的指令，它几乎可以开发任何类型的电子邮件。让我们来看一个例子：
- en: 'Prompt - You act as an experienced business communication assistant and draft
    a formal e-mail to a customer about a delay in the delivery of a project. The
    reasons for the delay have been: [State reasons]. You should explain these, offer
    a new delivery date, and reaffirm commitment to quality service. Include clear
    and concise details about the delay, preventive measures for future problems,
    and an apology.'
  id: totrans-511
  prefs: []
  type: TYPE_NORMAL
  zh: 提示 - 你将扮演一位经验丰富的商务沟通助理，为客户起草一封关于项目交付延迟的正式电子邮件。延迟的原因是：[列出原因]。你应该解释这些原因，提供一个新的交付日期，并重申对优质服务的承诺。请包括关于延迟的清晰简洁的细节，未来问题的预防措施，以及道歉。
- en: Using ChatGPT for email composing can increase productivity, allowing you to
    put effort and concentration into other more important tasks.
  id: totrans-512
  prefs: []
  type: TYPE_NORMAL
  zh: 使用ChatGPT进行电子邮件撰写可以提高生产力，让你能够将精力和注意力投入到其他更重要的任务上。
- en: Prompt - Corrects grammatical errors in user-supplied messages. Read the message
    carefully, identify any grammatical problems and provide a corrected version.
    Maintain the original meaning and style of the message. Indicate whether the message
    is grammatically correct; if not, point out the modified parts. Responses should
    be direct, concise, and focused exclusively on grammatical correctness. Use a
    professional and helpful tone to ensure clarity of corrections.
  id: totrans-513
  prefs: []
  type: TYPE_NORMAL
  zh: 提示 - 修正用户提供的消息中的语法错误。仔细阅读消息，识别任何语法问题并提供修正版本。保持消息的原意和风格。指出消息是否语法正确；如果不正确，指出修改的部分。回复应直接、简洁，并且仅关注语法正确性。使用专业和有帮助的语气以确保修正的清晰性。
- en: 'Personally, I''m not particularly eager to give total control to any language
    model over the wording of my emails. I write a draft email and pass it through
    ChatGPT for review, improving the text quality quickly and easily. Here is the
    prompt I use:'
  id: totrans-514
  prefs: []
  type: TYPE_NORMAL
  zh: 个人而言，我并不特别渴望将电子邮件的措辞完全控制权交给任何语言模型。我写一个草稿电子邮件，然后通过ChatGPT进行审查，快速轻松地提高文本质量。以下是我使用的提示：
- en: 4.1.2.     Publications in Social Networks
  id: totrans-515
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4.1.2.     社交媒体出版物
- en: Next, let's see how ChatGPT can be useful for generating ideas and creating
    social media posts. The answers provided by ChatGPT may vary depending on the
    context and situation. For example, it can adjust its content depending on the
    target audience or the social network we are addressing since Twitter is different
    from Facebook. For this reason, the more information and context we provide you
    with (in a balanced way), the better results we will get.
  id: totrans-516
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，让我们看看ChatGPT如何有助于生成想法和创建社交媒体帖子。ChatGPT提供的答案可能因上下文和情况而异。例如，它可以根据目标受众或我们正在应对的社交网络进行调整，因为Twitter与Facebook不同。因此，我们提供给你（以平衡的方式）的信息和背景越多，我们得到的结果就越好。
- en: 'Prompt - Act as a communications expert with extensive technology experience.
    Write a concise post for LinkedIn about my participation in the Mobile World Congress
    (MWC) 2024 in Barcelona. Address the following topics or mention the most important
    learnings I gained from the event: [insert your learnings here]. Be sure to connect
    these points to the relevance of the event and its potential impact on the industry,
    ending with an invitation to my connections to explore these ideas.'
  id: totrans-517
  prefs: []
  type: TYPE_NORMAL
  zh: 提示 - 以一个拥有丰富技术经验的传播专家身份行动。为LinkedIn撰写一篇关于我在巴塞罗那参加2024年移动世界大会（MWC）的简洁帖子。提及以下主题或提及我在活动中获得的最重要见解：[在此处插入你的见解]。确保将这些观点与活动的相关性及其对行业潜在影响联系起来，并以邀请我的联系人探索这些想法作为结尾。
- en: 4.1.3.     Writing Blog Articles
  id: totrans-518
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4.1.3.     撰写博客文章
- en: Similar to what we have done before, let's see an example of formulating an
    excellent prompt to ask for title ideas for our blog. From the suggestions provided
    by ChatGPT, we will select the title we like the most and work on it in more detail.
  id: totrans-519
  prefs: []
  type: TYPE_NORMAL
  zh: 与我们之前所做的一样，让我们看看如何制定一个出色的提示来请求我们博客的标题想法。从ChatGPT提供的建议中，我们将选择我们最喜欢的标题并对其进行更详细的处理。
- en: Prompt - Act as an experienced travel blogger with over a decade exploring the
    world, specializing in uncovering hidden destinations and providing detailed travel
    guides. Your goal is to generate three captivating, SEO-optimized titles for your
    blog that will attract readers interested in unique and insightful travel experiences.
    Consider your audience of adventurous travelers, use action verbs and descriptive
    adjectives to make the titles dynamic, and include keywords to improve search
    engine visibility. Make sure titles accurately reflect the content of the posts.
  id: totrans-520
  prefs: []
  type: TYPE_NORMAL
  zh: 提示 - 以一个拥有十多年探索世界经验的资深旅行博主身份行动，专注于发现隐藏的目的地和提供详细的旅行指南。你的目标是为你博客生成三个吸引人的、SEO优化的标题，这些标题将吸引对独特和有见地旅行体验感兴趣的读者。考虑你的目标受众是冒险旅行者，使用动作动词和描述性形容词使标题生动，并包含关键词以提高搜索引擎的可视性。确保标题准确反映文章的内容。
- en: Take a deep breath and work on this problem one step at a time.
  id: totrans-521
  prefs: []
  type: TYPE_NORMAL
  zh: 深呼吸，一步一步解决这个问题。
- en: 4.1.4.     Search Engine Optimization (SEO)
  id: totrans-522
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4.1.4.     搜索引擎优化（SEO）
- en: Let's continue with the blog example shown in the previous section. Imagine
    that the draft is ready to be published on the blog. Let's see how ChatGPT can
    help us optimize the content we have just created to gain relevance in search
    engines using keyword optimization strategies and compelling meta descriptions.
  id: totrans-523
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们继续使用上一节中展示的博客示例。想象一下，草稿已经准备好在博客上发布。让我们看看ChatGPT如何帮助我们通过关键词优化策略和引人入胜的元描述来优化我们刚刚创建的内容，以在搜索引擎中获得相关性。
- en: Prompt - Act as an SEO expert with extensive experience in digital marketing.
    Based on the article we have written above, provide a list of key tags to improve
    the article's visibility in searches related to travel, exotic destinations and
    adventure tourism. In addition, write a concise and engaging meta description
    that summarizes the key points of the article and encourages readers to explore
    these lesser-known destinations. Make sure that both the meta description and
    tags accurately reflect the article's content and highlight its unique value to
    attract readers interested in unique travel.
  id: totrans-524
  prefs: []
  type: TYPE_NORMAL
  zh: 提示 - 以一个拥有丰富数字营销经验的SEO专家的身份行动。根据我们上面写过的文章，提供一系列关键词以提高与旅行、异国目的地和冒险旅游相关的搜索中文章的可见性。此外，撰写一个简洁且吸引人的元描述，总结文章的关键点并鼓励读者探索这些鲜为人知的目的地。确保元描述和关键词准确反映了文章的内容，并突出其独特的价值，吸引对独特旅行感兴趣的读者。
- en: 4.1.5.     Write titles or descriptions
  id: totrans-525
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4.1.5.     撰写标题或描述
- en: 'Now, once we have the article for our travel blog, detailed and with optimized
    content, we will ask ChatGPT to generate a title for us since, having the article,
    it has the proper context to create quality content. Below is an example of an
    instruction to develop an attractive title for our article:'
  id: totrans-526
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，一旦我们有了我们的旅行博客文章，内容详尽且经过优化，我们将要求ChatGPT为我们生成一个标题，因为拥有文章，它就有适当的上下文来创建高质量的内容。以下是一个为我们的文章开发吸引人标题的指令示例：
- en: Prompt - Act as a marketing expert with an extensive background in digital content
    creation. Based on the content of the hidden destinations and travel guides blog
    post we have prepared, develop a title that is engaging, curious and thought-provoking.
    This title should grab the attention of potential readers, inviting them to discover
    lesser-known places through our detailed guides. Make sure the title is witty
    and reflects the unique approach of the article, enhancing the interest and curiosity
    of potential readers.
  id: totrans-527
  prefs: []
  type: TYPE_NORMAL
  zh: 提示 - 以一个拥有丰富数字内容创作背景的市场营销专家的身份行动。根据我们准备的隐藏目的地和旅行指南博客文章的内容，制定一个吸引人、好奇且引人深思的标题。这个标题应该吸引潜在读者的注意，邀请他们通过我们的详细指南发现鲜为人知的地方。确保标题机智且反映了文章的独特方法，增强潜在读者的兴趣和好奇心。
- en: By using the words "attractive, curious, and provocative," we obtain a title
    that arouses the audience's curiosity, increasing the probability that they will
    notice and enter our post.
  id: totrans-528
  prefs: []
  type: TYPE_NORMAL
  zh: 通过使用“吸引人、好奇和挑衅”这些词汇，我们得到了一个能够激发观众好奇心的标题，增加了他们注意到并进入我们帖子的可能性。
- en: 4.2\. Career Advancement with ChatGPT
  id: totrans-529
  prefs: []
  type: TYPE_NORMAL
  zh: 4.2\. 使用ChatGPT实现职业发展
- en: Virtually any company and worker can take advantage of this technology because
    of its great potential to increase productivity in various work environments.
    ChatGPT streamlines multiple tasks, from writing emails to creating advertising
    campaigns. This includes brainstorming content ideas, reviewing and writing documentation,
    verifying code, automating customer service, and analyzing job profiles. So, keeping
    up with these trends and taking advantage of such a powerful tool is essential.
  id: totrans-530
  prefs: []
  type: TYPE_NORMAL
  zh: 几乎任何公司和员工都可以利用这项技术，因为它在提高各种工作环境的生产力方面具有巨大的潜力。ChatGPT简化了从撰写邮件到创建广告活动的多项任务，包括构思内容想法、审查和编写文档、验证代码、自动化客户服务以及分析职位描述。因此，跟上这些趋势并利用如此强大的工具是至关重要的。
- en: In the following sections, we will see how ChatGPT can help you enhance your
    career by writing cover letters, job search emails, and improving your resume
    or LinkedIn profile. Applying this technology in your workplace will depend on
    your needs. Here, we will give you tips and ideas for use so that, based on them,
    you can apply them in the best possible way. Upon completion, you will have the
    knowledge and skills to use this AI to benefit your professional career.
  id: totrans-531
  prefs: []
  type: TYPE_NORMAL
  zh: 在以下章节中，我们将看到ChatGPT如何通过撰写求职信、工作搜索邮件以及改进您的简历或LinkedIn个人资料来帮助您提升职业生涯。在您的办公场所应用这项技术将取决于您的需求。在这里，我们将为您提供使用技巧和想法，以便您可以根据这些技巧以最佳方式应用它们。完成之后，您将拥有使用这项AI为您的职业生涯带来益处的知识和技能。
- en: 4.2.1.     Job search e-mails
  id: totrans-532
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4.2.1.     工作搜索邮件
- en: Writing a job search email can be challenging, as making a good and impactful
    impression on recruiters is critical. The email should be clear and concise and
    highlight your skills and enthusiasm for the position, demonstrating how you could
    benefit the company.
  id: totrans-533
  prefs: []
  type: TYPE_NORMAL
  zh: 撰写工作搜索邮件可能具有挑战性，因为给招聘人员留下良好和深刻的印象至关重要。邮件应清晰简洁，突出您的技能和对职位的热情，展示您如何为公司带来益处。
- en: 'ChatGPT can be beneficial when composing e-mails related to job offers, as
    it facilitates the creation of customized drafts according to our needs. Throughout
    the book, we have highlighted the importance of providing detailed information
    in our requests to obtain more accurate results. For example, let''s compare two
    different requests:'
  id: totrans-534
  prefs: []
  type: TYPE_NORMAL
  zh: 当撰写与工作机会相关的电子邮件时，ChatGPT可以大有裨益，因为它可以根据我们的需求创建定制草稿。在整本书中，我们强调了在请求中提供详细信息的重要性，以获得更准确的结果。例如，让我们比较两个不同的请求：
- en: Prompt - Write an email to apply for a job position
  id: totrans-535
  prefs: []
  type: TYPE_NORMAL
  zh: 提示 - 撰写一封申请工作职位的电子邮件
- en: 'Prompt - Write an email to apply for an embedded software engineer position
    in the region of Mittelland, Switzerland. Where the challenge will be to work
    in a young multidisciplinary team... In addition, the qualities and talents required
    for the position are: Degree in... experience in... knowledge of... etc. Finally,
    I leave you here my CV: [Paste CV]...'
  id: totrans-536
  prefs: []
  type: TYPE_NORMAL
  zh: 提示 - 撰写一封申请瑞士米特兰地区的嵌入式软件工程师职位的电子邮件。那里的挑战将是与一个年轻的多学科团队合作... 此外，该职位所需的品质和才能包括：……学位，……经验，……知识等。最后，我在这里留下我的简历：[粘贴简历]...
- en: The results obtained will differ in terms of the quality and detail of the draft
    generated. The second example will provide a more specific draft email tailored
    to the position we want to apply for. It will allow us to focus on reviewing and
    editing the text instead of writing it from scratch, saving us time and effort.
  id: totrans-537
  prefs: []
  type: TYPE_NORMAL
  zh: 获得的结果将在生成的草稿的质量和细节方面有所不同。第二个示例将提供一个更具体的针对我们想要申请的职位的定制电子邮件草稿。这将使我们能够专注于审查和编辑文本，而不是从头开始写作，从而节省我们的时间和精力。
- en: 4.2.2.     Writing Customized Cover Letters
  id: totrans-538
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4.2.2.     撰写定制求职信
- en: The cover letter is an essential document that accompanies your resume and introduces
    you to the employer. It highlights your skills, experience, and qualifications,
    explaining why you are the ideal candidate. Before you start writing it, it's
    essential to consider the job you're applying for, the company culture, and the
    skills they're looking for. Research the company culture by reviewing the company's
    website, social media, and any relevant articles, and identify the skills mentioned
    in the job description. This information will allow you to tailor your cover letter
    to your job and company.
  id: totrans-539
  prefs: []
  type: TYPE_NORMAL
  zh: 求职信是伴随你的简历的重要文件，它将你介绍给雇主。它突出了你的技能、经验和资格，解释了为什么你是理想的候选人。在你开始撰写之前，考虑你申请的工作、公司文化和他们寻找的技能是非常重要的。通过审查公司的网站、社交媒体和任何相关文章来研究公司文化，并确定工作描述中提到的技能。这些信息将使你能够根据你的工作和公司定制你的求职信。
- en: Once you have gathered the necessary information, you can use ChatGPT to write
    a customized cover letter based on the job description. This way, you will have
    a well-structured document tailored to the company's needs, increasing your chances
    of success in the job search and getting an interview.
  id: totrans-540
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦你收集了必要的信息，你就可以使用ChatGPT根据工作描述撰写定制求职信。这样，你将拥有一份针对公司需求的、结构良好的文件，这将增加你在求职过程中获得面试成功的机会。
- en: Let's assume we are applying for an Integrated Software Engineer position to
    demonstrate how this tool can help us generate a cover letter. Previously, we
    detailed to the model the responsibilities and qualities needed for the position
    and provided our CV. Now, we will ask ChatGPT to write a cover letter based on
    that description, highlighting our experience and skills relevant to the position
    in question.
  id: totrans-541
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们假设我们正在申请一个集成软件工程师职位，以展示这个工具如何帮助我们生成求职信。之前，我们已经向模型详细说明了该职位所需的职责和品质，并提供了我们的简历。现在，我们将要求ChatGPT根据该描述撰写一封求职信，突出与所讨论职位相关的经验和技能。
- en: Prompt - Acts as a software development expert with extensive embedded systems
    experience, specializing in programming for specific hardware devices and software
    platforms. Write a cover letter tailored to the description of the embedded software
    engineer opportunity above. Focus on highlighting your C/C++ programming skills,
    experience with microcontrollers, and ability to work in agile development environments.
    Be sure to mention relevant projects where you have applied these skills and how
    your experience will contribute to the team’s success in this new position. End
    with a cordial invitation to discuss how your skills can be an asset to the company.
  id: totrans-542
  prefs: []
  type: TYPE_NORMAL
  zh: 提示 - 以拥有丰富嵌入式系统经验的软件开发专家身份行动，专注于特定硬件设备和软件平台的编程。撰写一封针对上述嵌入式软件工程师机会的求职信。重点突出您的C/C++编程技能、微控制器经验以及在敏捷开发环境中的工作能力。务必提及您应用这些技能的相关项目，以及您的经验如何有助于团队在新职位上取得成功。最后，以友好的邀请结束，讨论您的技能如何成为公司的资产。
- en: Take a deep breath and work on this problem one step at a time.
  id: totrans-543
  prefs: []
  type: TYPE_NORMAL
  zh: 深吸一口气，一步一步地解决这个问题。
- en: Once the letter is drafted, it is essential to review it to ensure that it meets
    our criteria. Review and edit the content to ensure it is professional, concise,
    and appropriate. If necessary, ask ChatGPT to adjust the tone of the cover letter
    to be more straightforward, enthusiastic, or in line with your needs.
  id: totrans-544
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦草拟了信件，确保它符合我们的标准至关重要。审查和编辑内容，确保其专业、简洁且适当。如有必要，请让ChatGPT调整求职信的语气，使其更加直接、热情或符合您的需求。
- en: 'After writing the cover letter with ChatGPT, we can proceed to the next step:
    updating your LinkedIn profile with this data.'
  id: totrans-545
  prefs: []
  type: TYPE_NORMAL
  zh: 使用ChatGPT撰写求职信后，我们可以进行下一步：使用这些数据更新您的LinkedIn个人资料。
- en: 4.2.3.     Improve your LinkedIn Profile
  id: totrans-546
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4.2.3.     改进您的LinkedIn个人资料
- en: Today, a strong LinkedIn profile is critical to increasing your visibility,
    attracting recruiters, and connecting with professionals in your industry, thereby
    improving your credibility in the job market. This section will explore how to
    use ChatGPT to enhance our LinkedIn profile. The goal is to ensure your profile
    reflects your professional brand and the value you can bring to the organization.
  id: totrans-547
  prefs: []
  type: TYPE_NORMAL
  zh: 今天，一个强大的LinkedIn个人资料对于提高您的可见性、吸引招聘人员和与您所在行业的专业人士建立联系至关重要，从而提高您在就业市场的信誉。本节将探讨如何使用ChatGPT来提升我们的LinkedIn个人资料。目标是确保您的个人资料反映了您的专业品牌和您能为组织带来的价值。
- en: 'We can use ChatGPT to generate a LinkedIn profile based on our resume, highlighting
    key elements such as achievements, specific skills, and relevant experience. It
    is important to note that, for optimal results, we must specify the elements we
    wish to include in the prompt. This detailed specification ensures that the model
    understands and executes our request effectively. To accomplish this task and
    optimize our LinkedIn profile based on our resume, we could use a prompt like
    the following:'
  id: totrans-548
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以使用ChatGPT根据我们的简历生成LinkedIn个人资料，突出关键要素，如成就、特定技能和相关信息。需要注意的是，为了获得最佳结果，我们必须在提示中指定我们希望包含的元素。这种详细的指定确保模型能够有效地理解和执行我们的请求。为了完成这项任务并优化我们的LinkedIn个人资料，我们可以使用以下提示：
- en: 'Prompt - He acts as an expert in writing and creating professional profiles
    for LinkedIn with over 15 years of experience helping professionals in various
    fields excel in their careers.  Objective: To create an attractive and effective
    LinkedIn profile prototype that reflects the individual''s professionalism, skills
    and unique experience, using the detailed information provided'
  id: totrans-549
  prefs: []
  type: TYPE_NORMAL
  zh: 提示 - 他是一位拥有超过15年经验的专家，帮助各领域的专业人士在职业生涯中脱颖而出，撰写和创建专业的LinkedIn个人资料。  目标：创建一个吸引人且有效的LinkedIn个人资料原型，反映个人的专业性、技能和独特经验，使用提供的相关详细信息
- en: 4.2.4.     Prepare for job interviews with ChatGPT
  id: totrans-550
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4.2.4.     使用ChatGPT准备求职面试
- en: Preparing for a job interview is crucial to making a good impression and increasing
    the chances of success. ChatGPT can be a helpful tool in this process, providing
    interview simulations, generating questions based on the desired position, and
    offering suggestions to improve the answers.
  id: totrans-551
  prefs: []
  type: TYPE_NORMAL
  zh: 准备求职面试对于留下好印象和增加成功机会至关重要。ChatGPT在这个过程中可以作为一个有用的工具，提供面试模拟、根据期望职位生成问题，并提供改进答案的建议。
- en: 1\. Gathering information about the company
  id: totrans-552
  prefs: []
  type: TYPE_NORMAL
  zh: 1\. 收集有关公司的信息
- en: If the interview is for a well-known company, you can use ChatGPT to learn about
    its mission and values. If the company is less well known, you can search for
    information online and then provide it to ChatGPT for proper context.
  id: totrans-553
  prefs: []
  type: TYPE_NORMAL
  zh: 如果面试的是一家知名公司，你可以使用ChatGPT了解其使命和价值观。如果公司不太知名，你可以在网上搜索相关信息，然后将其提供给ChatGPT以获得适当的背景。
- en: 2\. Simulation of questions and answers
  id: totrans-554
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 问答模拟
- en: ChatGPT can generate common interview questions based on the job description.
    Provide a job description and CV so ChatGPT can tailor the questions to your skills
    and experience. You can then practice answering these questions by conducting
    a mock interview. ChatGPT can review your answers, tell you the purpose behind
    each question from an HR point of view, and even suggest an ideal answer. This
    helps you polish your answers and identify areas for improvement.
  id: totrans-555
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT可以根据职位描述生成常见的面试问题。提供一份职位描述和简历，以便ChatGPT根据你的技能和经验调整问题。然后，你可以通过进行模拟面试来练习回答这些问题。ChatGPT可以审查你的答案，从HR的角度告诉你每个问题的目的，甚至建议一个理想的答案。这有助于你润色答案并确定需要改进的领域。
- en: 3\. Customization of the preparation process
  id: totrans-556
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 准备过程的定制
- en: 'For detailed preparation, it is helpful to provide ChatGPT with the following
    information:'
  id: totrans-557
  prefs: []
  type: TYPE_NORMAL
  zh: 为了进行详细的准备，提供以下信息给ChatGPT是有帮助的：
- en: 'Job Description: Summary of responsibilities and skills required for ChatGPT
    to tailor questions and answers to the job''s demands.'
  id: totrans-558
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 职位描述：总结ChatGPT为满足职位需求而调整问题和答案所需的责任和技能。
- en: 'Professional profile or CV: This is a description of your experience and achievements,
    which allows ChatGPT to identify your strengths and weaknesses concerning the
    position.'
  id: totrans-559
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 专业简介或简历：这是对你经验和成就的描述，使ChatGPT能够识别你在该职位方面的优势和劣势。
- en: 'Areas of focus: Any specific aspects of the interview that concern you, such
    as your technical expertise or interpersonal skills.'
  id: totrans-560
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 重点关注领域：任何让你担心的面试特定方面，例如你的技术专长或人际交往技能。
- en: 'Desired answer style: Define whether you prefer brief or more detailed answers
    adapted to your style and the type of interview.'
  id: totrans-561
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 希望的答案风格：定义你是否更喜欢简短或更详细的答案，以适应你的风格和面试类型。
- en: 'Here is an example of a job interview preparation prompt:'
  id: totrans-562
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是一个面试准备提示的示例：
- en: 'Prompt - You are an interview preparation assistant. I want you to help me
    prepare for a job interview for the position of [Position Name] at [Company Name].
    Here is the job description: [Paste Job Description]. My experience and skills
    are as follows: [Paste a summary of your CV or relevant experience]. I also have
    some specific areas in which I want to improve: [Mention specific aspects].'
  id: totrans-563
  prefs: []
  type: TYPE_NORMAL
  zh: 提示 - 你是一位面试准备助手。我想让你帮我准备一份[职位名称]在[公司名称]的职位面试。以下是职位描述：[粘贴职位描述]。我的经验和技能如下：[粘贴你的简历或相关经验的总结]。我还想提高一些特定的领域：[提及具体方面]。
- en: 'Additional Resource: In section "7.2, Prompts Repository", you will find further
    and more elaborate prompts for preparing for job interviews, including detailed
    guides and advanced simulations.'
  id: totrans-564
  prefs: []
  type: TYPE_NORMAL
  zh: 补充资源：在“7.2，提示库”部分，你可以找到更多和更详细的准备面试的提示，包括详细的指南和高级模拟。
- en: 4.3\. ChatGPT for basic programming
  id: totrans-565
  prefs: []
  type: TYPE_NORMAL
  zh: 4.3. ChatGPT的基本编程
- en: Before we begin, please note that this section is designed for people without
    programming experience. The following pages will provide tools and knowledge to
    improve and practice your programming skills.
  id: totrans-566
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们开始之前，请注意，本节是为没有编程经验的人设计的。以下页面将提供工具和知识来提高和练习你的编程技能。
- en: ChatGPT can assist us in various programming tasks, from code optimization and
    correction through code translation to code generation from scratch. In addition,
    if we want to learn a new programming language, it can act as a personal tutor
    to develop skills in various areas, including learning from beginner to advanced
    intermediate level.
  id: totrans-567
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT可以帮助我们在各种编程任务中，从代码优化和修正，到代码翻译，再到从头开始生成代码。此外，如果我们想学习一门新的编程语言，它还可以作为个人导师，在从初学者到高级中级水平的不同领域发展技能。
- en: 4.3.1.     Learning to program with ChatGPT
  id: totrans-568
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4.3.1.     使用ChatGPT学习编程
- en: The key to good learning is to be honest and share our current level with ChatGPT,
    telling it how much we know and what we need to learn. By sharing your current
    understanding of the topic or language, this technology will be able to adapt
    to your needs, providing you with more efficient training.
  id: totrans-569
  prefs: []
  type: TYPE_NORMAL
  zh: 良好学习的关键是诚实并与ChatGPT分享我们的当前水平，告诉它我们知道了什么以及需要学习什么。通过分享你对主题或语言的当前理解，这项技术将能够适应你的需求，为你提供更有效的培训。
- en: 'To make your learning experience more engaging, I recommend starting by trying
    to work on a project. For example, you can ask ChatGPT for project ideas that
    match your current level of knowledge and skills, which will help you reach your
    desired level. Let''s look at an example:'
  id: totrans-570
  prefs: []
  type: TYPE_NORMAL
  zh: 为了使你的学习体验更加有趣，我建议从尝试一个项目开始。例如，你可以向ChatGPT请求与你当前的知识和技能水平相匹配的项目想法，这将帮助你达到你想要达到的水平。让我们看看一个例子：
- en: Prompt - I have no technical studies or any career. I am used to use computers,
    but only the office part (excel, word, etc.). I know the basics of C# and C++
    programming. I want to learn how to program in Python, can you create a beginner
    level project to help me learn?
  id: totrans-571
  prefs: []
  type: TYPE_NORMAL
  zh: 提示 - 我没有技术学习或任何职业。我习惯于使用电脑，但只是办公部分（excel、word等）。我了解C#和C++编程的基础。我想学习如何用Python编程，你能创建一个适合初学者的项目来帮助我学习吗？
- en: If you're curious about programming, I encourage you to dive in and start coding
    with ChatGPT. If you're new to programming and feeling lost, don't hesitate to
    ask ChatGPT for some examples; it will be happy to help! For our purposes, let's
    begin with the simplest example.
  id: totrans-572
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你对手套程式设计感兴趣，我鼓励你深入其中，并从ChatGPT开始编码。如果你是编程新手，感到迷茫，不要犹豫，向ChatGPT请求一些示例；它会乐意帮助！为了我们的目的，让我们从最简单的例子开始。
- en: Prompt - Develop me the first example
  id: totrans-573
  prefs: []
  type: TYPE_NORMAL
  zh: 提示 - 开发第一个示例
- en: 'ChatGPT - Sure you can! Here I provide you with a step-by-step to create a
    program that calculates grade point average using Python:'
  id: totrans-574
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT - 当然可以！这里我为你提供一步一步的指导，教你如何使用Python编写一个计算平均绩点的程序：
- en: '![Texto  Descripción generada automáticamente](image_rsrc3PP.jpg)'
  id: totrans-575
  prefs: []
  type: TYPE_IMG
  zh: '![Texto Descripción generada automáticamente](image_rsrc3PP.jpg)'
- en: If you have stayed the same as before or even worse, don't worry, it's good.
    We have found something new to learn, and ChatGPT can help us with it. Just ask
    him what a code snippet does, and he will explain it. The next lesson will show
    you how to get valuable explanations from the code.
  id: totrans-576
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你和以前一样，甚至更糟，不要担心，这是好事。我们找到了一些新的东西要学习，ChatGPT可以帮助我们。只需问他代码片段的功能，他就会解释。下一课将向你展示如何从代码中获得有价值的解释。
- en: 4.3.2.     Using ChatGPT to explain what the code does
  id: totrans-577
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4.3.2. 使用ChatGPT解释代码的功能
- en: As we said, if you do not understand some concepts mentioned in the code, you
    can ask ChatGPT, and it will thoroughly explain them, even using analogies to
    facilitate understanding.
  id: totrans-578
  prefs: []
  type: TYPE_NORMAL
  zh: 正如我们所说，如果你不理解代码中提到的某些概念，你可以询问ChatGPT，它会彻底解释它们，甚至使用类比来帮助理解。
- en: Prompt - Explain to me what the above code does, so that someone without programming
    knowledge can understand it.
  id: totrans-579
  prefs: []
  type: TYPE_NORMAL
  zh: 提示 - 向我解释一下上述代码的功能，以便没有编程知识的人也能理解。
- en: The code with comments can be useful, but it is possible that even with the
    explanation, you still do not understand some of the concepts mentioned. That's
    OK; we can use ChatGPT to explain these concepts. You can ask about specific things
    you don't understand or for a list of concepts you should know before doing these
    exercises. Remember that you can talk to ChatGPT like a human tutor, clarifying
    doubts and asking for additional explanations if you do not understand a concept.
    Next, we will ask you about the basic concepts we should know.
  id: totrans-580
  prefs: []
  type: TYPE_NORMAL
  zh: 带有注释的代码可能很有用，但即使有了解释，你仍然可能不理解提到的某些概念。没关系；我们可以使用ChatGPT来解释这些概念。你可以询问你不懂的具体内容，或者询问在完成这些练习之前你应该了解的概念列表。记住，你可以像与人类导师交谈一样与ChatGPT交谈，澄清疑问并在不理解某个概念时请求额外的解释。接下来，我们将询问你应该了解的基本概念。
- en: Prompt - What are the basic concepts you should know to make the program that
    calculates the grade point average?
  id: totrans-581
  prefs: []
  type: TYPE_NORMAL
  zh: 提示 - 要编写计算平均绩点的程序，你应该了解哪些基本概念？
- en: 'ChatGPT - Variables: These are containers for storing data. You will need variables
    to store individual grades and the average.'
  id: totrans-582
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT - 变量：这些是用于存储数据的容器。你需要变量来存储单个成绩和平均值。
- en: '2\. Types of data: In particular, you must understand...'
  id: totrans-583
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 数据类型：特别是，你必须理解...
- en: If you want to go deeper into any of the above concepts, follow the conversation
    and ask for an explanation. If you are not an expert or unfamiliar with programming
    or technical language, we can ask it to explain as if it were for a 10-year-old
    child. This way, you will use analogies and easy-to-understand language. For example,
    let's ask him about the first concept, variables.
  id: totrans-584
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想要深入了解上述任何概念，请继续对话并要求解释。如果你不是专家，或者对编程或技术语言不熟悉，我们可以要求它像对一个10岁的孩子一样进行解释。这样，你将使用类比和易于理解的语言。例如，让我们问他关于第一个概念，变量。
- en: Prompt - What are variables? explain this concept to me as if I were a 10-year-old
    child.
  id: totrans-585
  prefs: []
  type: TYPE_NORMAL
  zh: 提示 - 什么是变量？请像对我一个10岁的孩子一样解释这个概念。
- en: ChatGPT - Imagine you have a box where you can store things. In that box, you
    can store different things at different times, right? Well, in programming, variables
    are like those boxes where you can store different kinds of information at different
    times. For example, imagine you have a box called "Age". At a given time, you
    can store in that box your current age. But later, if your age changes, you can
    put your new age in the same box...
  id: totrans-586
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT - 想象你有一个盒子，你可以把东西放进去。在那个盒子里，你可以在不同时间放不同东西，对吧？在编程中，变量就像那些盒子，你可以在不同时间存储不同类型的信息。例如，想象你有一个叫“Age”的盒子。在某个特定时间，你可以在那个盒子里存储你现在的年龄。但后来，如果你的年龄变了，你可以在同一个盒子里放你的新年龄...
- en: This explanation is excellent. It is clear, concise, and uses an analogy, as
    we requested. To ensure we understand the code, we will ask you to show us how
    this explanation of variables ties into our project.
  id: totrans-587
  prefs: []
  type: TYPE_NORMAL
  zh: 这个解释非常出色。它清晰、简洁，并且使用了类比，正如我们要求的。为了确保我们理解代码，我们将要求你展示这个变量解释如何与我们的项目相关联。
- en: Prompt - How does this variable relate to the GPA calculation program?
  id: totrans-588
  prefs: []
  type: TYPE_NORMAL
  zh: 提示 - 这个变量如何与GPA计算程序相关？
- en: ChatGPT - In the GPA calculation program, the variables are a fundamental part
    since they are used to store the information of the grades of each subject in
    order to calculate the average.
  id: totrans-589
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT - 在GPA计算程序中，变量是基本的部分，因为它们用于存储每个科目的成绩信息，以便计算平均分。
- en: This way, you can have a private teacher who will give you exercises you can
    correct later. So, you can use this method to learn any programming language you
    want.
  id: totrans-590
  prefs: []
  type: TYPE_NORMAL
  zh: 这样，你就可以拥有一个私人教师，他会给你一些练习题，你可以在之后进行纠正。因此，你可以使用这种方法来学习你想要的任何编程语言。
- en: 4.3.3.     Translating between different programming languages
  id: totrans-591
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4.3.3.     在不同编程语言之间进行翻译
- en: 'As with languages, where ChatGPT can act as a translator, it can also write
    code in several programming languages. Popular languages include Python, Java,
    JavaScript, C++, C#, PHP, Ruby, Swift, Go, and Kotlin. To demonstrate this ability,
    we will perform a classic exercise when testing a language: displaying the "Hello
    World" message. This exercise is the first step when learning a new language,
    as it is an essential and easy-to-implement function.'
  id: totrans-592
  prefs: []
  type: TYPE_NORMAL
  zh: 就像语言一样，ChatGPT可以充当翻译，它也可以用几种编程语言编写代码。流行的语言包括Python、Java、JavaScript、C++、C#、PHP、Ruby、Swift、Go和Kotlin。为了展示这种能力，我们将进行一个经典的练习，即在测试一种语言时：显示“Hello
    World”消息。这个练习是学习新语言的第一步，因为它是一个基本且易于实现的函数。
- en: Prompt - Give me the code to display the "Hello World" message in C#, Python
    and Java.
  id: totrans-593
  prefs: []
  type: TYPE_NORMAL
  zh: 提示 - 给我C#、Python和Java中显示“Hello World”消息的代码。
- en: '![A screenshot of a computer code  Description automatically generated](image_rsrc3PR.jpg)![A
    screenshot of a computer  Description automatically generated](image_rsrc3PS.jpg)![A
    screen shot of a computer code  Description automatically generated](image_rsrc3PT.jpg)'
  id: totrans-594
  prefs: []
  type: TYPE_IMG
  zh: '![计算机代码的截图  自动生成的描述](image_rsrc3PR.jpg)![计算机的截图  自动生成的描述](image_rsrc3PS.jpg)![计算机代码的截图  自动生成的描述](image_rsrc3PT.jpg)'
- en: As you can see, translating between different languages is relatively easy,
    which can be very useful if you already know a language and want to learn another
    one. Finally, it should be noted that the code provided by ChatGPT can be copied
    using the "Copy code" button at the top right to use it in a text editor or in
    an integrated development environment to test its operation.
  id: totrans-595
  prefs: []
  type: TYPE_NORMAL
  zh: 正如你所见，在不同语言之间进行翻译相对容易，如果你已经掌握了一种语言并想学习另一种语言，这将非常有用。最后，需要注意的是，ChatGPT提供的代码可以使用右上角的“复制代码”按钮复制，然后在文本编辑器或集成开发环境中使用它来测试其操作。
- en: 4.3.4.     Create a basic HTML web page
  id: totrans-596
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4.3.4.     创建一个基本的HTML网页
- en: ChatGPT is amazing, since it is able to generate any kind of code that we ask
    it to generate, which includes HTML (code normally used in the development of
    web pages). For this example, we are going to ask it to create a basic web page,
    with a big button in the background, which when clicked causes the background
    of the web page to change color.
  id: totrans-597
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT非常神奇，因为它能够生成我们要求它生成的任何类型的代码，包括HTML（通常用于网页开发）。在这个例子中，我们将要求它创建一个基本的网页，背景中有一个大按钮，点击该按钮会导致网页背景颜色改变。
- en: Prompt - Create a web page, in HTML, that has a big button all over the center
    of the web. When that button is clicked, the background color of the web will
    change randomly.
  id: totrans-598
  prefs: []
  type: TYPE_NORMAL
  zh: 提示 - 创建一个网页，使用HTML，其中有一个大按钮占据网页中心。当点击该按钮时，网页的背景颜色会随机改变。
- en: '![Interfaz de usuario gráfica, Texto, Aplicación  Descripción generada automáticamente](image_rsrc3PU.jpg)*
    Example cut out'
  id: totrans-599
  prefs: []
  type: TYPE_NORMAL
  zh: '![图形用户界面，文本，应用程序，自动生成的描述](image_rsrc3PU.jpg)* 示例截图'
- en: In a matter of seconds, we can get the complete code of a web page, but how
    do we know if it really works? The answer is straightforward. We will use [Replit.com,](https://replit.com/)  a
    platform that allows us to preview and edit the web page quickly and easily. We
    will have to register on the platform, which will take less than a minute. Once
    logged in, we paste the code previously copied to the clipboard and click on "Run".
    In this way, we will obtain the desired result and be able to check the correct
    operation of the code on our web page, as shown below.
  id: totrans-600
  prefs: []
  type: TYPE_NORMAL
  zh: 几秒钟内，我们就能获取一个网页的完整代码，但如何知道它真的能工作呢？答案很简单。我们将使用[Replit.com](https://replit.com/)，这是一个允许我们快速轻松地预览和编辑网页的平台。我们只需在该平台上注册，这不会超过一分钟。一旦登录，我们将之前复制到剪贴板上的代码粘贴进去，然后点击“运行”。这样，我们就能获得期望的结果，并能够检查代码在我们网页上的正确运行情况，如下所示。
- en: '![A screen shot of a computer  Description automatically generated](image_rsrc3PV.jpg)![A
    screenshot of a computer  Description automatically generated](image_rsrc3PW.jpg)'
  id: totrans-601
  prefs: []
  type: TYPE_IMG
  zh: '![计算机屏幕截图，自动生成的描述](image_rsrc3PV.jpg)![计算机屏幕截图，自动生成的描述](image_rsrc3PW.jpg)'
- en: The code complies with the request. If we want to modify it, such as adding
    a second smaller button below the big one, we have to tell ChatGPT. It will generate
    the complete code again, which we will copy and paste into Replit to obtain the
    following result.
  id: totrans-602
  prefs: []
  type: TYPE_NORMAL
  zh: 代码符合要求。如果我们想修改它，比如在下面添加一个比大按钮小的第二个按钮，我们必须告诉ChatGPT。它将再次生成完整的代码，我们将复制并粘贴到Replit中，以获得以下结果。
- en: '![](image_rsrc3PX.jpg)'
  id: totrans-603
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrc3PX.jpg)'
- en: This is one way to create web pages, but not the only way. This example shows
    the capabilities of ChatGPT for creating simple web pages
  id: totrans-604
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一种创建网页的方法，但不是唯一的方法。这个例子展示了ChatGPT创建简单网页的能力。
- en: 4.4\. Transform the way you learn
  id: totrans-605
  prefs: []
  type: TYPE_NORMAL
  zh: 4.4. 转变你的学习方式
- en: Since ChatGPT has become available, many teachers have expressed concerns about
    its possible use in plagiarizing work in universities and schools. However, as
    with any technology, such as calculators or online learning platforms, its impact
    on education depends on the approach taken. While it is true that ChatGPT could
    be used to generate complete papers effortlessly (although the quality of these
    would be questionable), it can also be a useful complementary tool to improve
    the quality of our deliverables, save time in the process, and be more efficient.
    Throughout the following lessons, I want to show you how ChatGPT can be a valuable
    tool for your writing while keeping your content unique.
  id: totrans-606
  prefs: []
  type: TYPE_NORMAL
  zh: 自从ChatGPT推出以来，许多教师对它在大学和学校中可能被用于剽窃工作的可能性表示了担忧。然而，与任何技术一样，例如计算器或在线学习平台，它对教育的影响取决于采取的方法。虽然ChatGPT确实可以轻松地生成完整的论文（尽管这些论文的质量可能值得怀疑），但它也可以是一个有用的辅助工具，以提高我们交付成果的质量，节省时间，并提高效率。在接下来的课程中，我想向大家展示ChatGPT如何成为写作的有价值工具，同时保持内容的独特性。
- en: The educational potential of ChatGPT is enormous, especially for those young
    people who show a deep desire to create a better world but sometimes do not have
    the right tools to progress. These young people have a positive approach and a
    willingness to learn and to do well. The fact that some students see ChatGPT as
    a way to avoid effort does not mean we should ban its use in schools. Doing so
    would be like putting gates on the field. It would not be the right solution,
    as this tool can be helpful for the learning and development of many students.
  id: totrans-607
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT的教育潜力巨大，尤其是对于那些渴望创造更美好世界但有时缺乏正确工具来进步的年轻人。这些年轻人持有积极的态度，并愿意学习和做得更好。一些学生将ChatGPT视为避免努力的方式并不意味着我们应该在学校中禁止其使用。这样做就像在运动场上设置栅栏一样。这不是正确的解决方案，因为这个工具可以帮助许多学生的学习和成长。
- en: The real solution to address any problems related to the use of ChatGPT in schools
    is to encourage a positive approach to the tool. Rather than banning its use,
    we should encourage students to use ChatGPT to save time, be more productive,
    and find inspiration in their work. This can help students see the tool as a useful
    supplement rather than a way to cheat.
  id: totrans-608
  prefs: []
  type: TYPE_NORMAL
  zh: 解决学校中使用ChatGPT相关问题的真正方法是要鼓励对这一工具的积极态度。与其禁止使用，我们更应该鼓励学生利用ChatGPT节省时间，提高生产力，并在工作中找到灵感。这样可以帮助学生将工具视为有用的补充，而不是作弊的手段。
- en: In addition, ChatGPT can be an excellent ally in research, helping us find quality
    sources on which to base our work based on the information we have collected.
    Instead of using this tool to develop work and copy and paste without learning,
    we should use it consciously and responsibly to enhance our education.
  id: totrans-609
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，ChatGPT可以在研究中成为一位出色的盟友，帮助我们根据收集到的信息找到基于质量来源的工作。我们不应将此工具用于开发工作并复制粘贴而不学习，而应自觉地、负责任地使用它来提升我们的教育。
- en: AI is transforming teaching by adapting to each student's needs and offering
    new ways to teach critical skills for the 21st century. Thanks to ChatGPT, we
    can have a virtual assistant offering additional support, answering questions,
    and providing resources to reinforce skills. This applies to any subject.
  id: totrans-610
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能通过适应每个学生的需求并提供教授21世纪关键技能的新方法，正在改变教学。得益于ChatGPT，我们可以拥有一个虚拟助手，提供额外的支持，回答问题，并提供资源以强化技能。这适用于任何学科。
- en: Integrating this technology into the learning process is important rather than
    prohibiting it. Francesc Pujol, director of the Economics degree at the University
    of Navarra, proposes integrating ChatGPT into education to improve learning. He
    has made it mandatory in his subjects. Pujol believes that the impact of ChatGPT
    will be linked to students' attitudes. While some may shirk responsibilities,
    engaged ones will use it to enrich their learning.
  id: totrans-611
  prefs: []
  type: TYPE_NORMAL
  zh: 将这项技术整合到学习过程中比禁止它更重要。纳瓦拉大学经济学学位主任弗朗塞斯科·普约尔（Francesc Pujol）提出将ChatGPT整合到教育中以提高学习效果。他在自己的课程中将其作为必修内容。普约尔认为，ChatGPT的影响将与学生的态度相关联。虽然有些人可能会逃避责任，但积极参与的学生会利用它来丰富他们的学习。
- en: Teachers should guide and integrate the technology effectively, avoiding misuse
    of ChatGPT. This will help students learn to ask better questions and acquire
    knowledge gradually.
  id: totrans-612
  prefs: []
  type: TYPE_NORMAL
  zh: 教师应该有效地引导和整合这项技术，避免ChatGPT的误用。这将帮助学生学会提出更好的问题，并逐步获取知识。
- en: Teachers must design activities that consciously integrate ChatGPT. This approach
    will foster critical thinking and improve academic performance. The key is structured
    implementation and good guidance.
  id: totrans-613
  prefs: []
  type: TYPE_NORMAL
  zh: 教师必须设计出能够有意识地整合ChatGPT的活动。这种方法将培养批判性思维并提高学术表现。关键在于结构化的实施和良好的指导。
- en: 4.4.1.     Learning any subject
  id: totrans-614
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4.4.1.     学习任何学科
- en: Learning something new is easier than ever with tools like ChatGPT. With an
    extensive database and ever-expanding knowledge, ChatGPT allows you to explore
    and understand virtually any topic you're interested in, from science and technology
    to history and art. This makes it an ideal tool for self-study, offering clear
    explanations, examples, and resources to delve into topics of all kinds. However,
    it is vital to remember that, although it is becoming less and less frequent,
    ChatGPT can generate incorrect information or "hallucinate". Therefore, it is
    recommended that you verify essential data with additional sources. With a good
    prompt, you can maximize the usefulness of ChatGPT and customize your learning
    in a way that suits your needs.
  id: totrans-615
  prefs: []
  type: TYPE_NORMAL
  zh: 使用ChatGPT等工具学习新知识比以往任何时候都要容易。凭借庞大的数据库和不断扩展的知识，ChatGPT允许你探索和理解你感兴趣的几乎所有主题，从科学技术到历史和艺术。这使得它成为自学的理想工具，提供了清晰的解释、示例和资源，以便深入各种主题。然而，重要的是要记住，尽管这种情况越来越少见，ChatGPT仍然可能生成错误信息或“幻觉”。因此，建议你用额外的来源验证关键数据。一个好的提示可以帮助你最大限度地发挥ChatGPT的作用，并按需定制你的学习。
- en: 'Here is an example of a prompt:'
  id: totrans-616
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一个提示示例：
- en: Prompt - I want to learn about [topic of interest] and would like an explanation
    at a [basic/intermediate/advanced] level. I prefer an approach that includes [specific
    details, such as practical examples, analogies, or a general overview]. Could
    you explain this topic and suggest some resources or additional steps to go deeper
    into it?
  id: totrans-617
  prefs: []
  type: TYPE_NORMAL
  zh: 提示 - 我想了解[感兴趣的主题]并希望获得[基础/中级/高级]水平的解释。我更喜欢包含[具体细节，例如实际例子、类比或一般概述]的方法。你能解释这个主题并建议一些资源或额外的步骤来深入了解吗？
- en: 'Additional Resource: In section "7.2, Prompts Repository", you will find a
    further, more elaborate prompt on how to learn anything using the Feynman technique.'
  id: totrans-618
  prefs: []
  type: TYPE_NORMAL
  zh: 补充资源：在“7.2，提示库”部分，你将找到关于如何使用费曼技巧学习任何事物的更详细、更深入的提示。
- en: 4.4.2.     Finding and managing references
  id: totrans-619
  prefs: []
  type: TYPE_NORMAL
  zh: 4.4.2.     寻找和管理参考文献
- en: Until recently, the search for references for academic papers was done mainly
    through the Internet from reliable sources, specialized media, or the university
    library. However, with the advent of ChatGPT, this process has undergone a radical
    change. Remember that this AI has been trained with many documents, many more
    than we could read in a lifetime. Therefore, ChatGPT has the information we need,
    and we need to learn how to ask the right questions.
  id: totrans-620
  prefs: []
  type: TYPE_NORMAL
  zh: 直到最近，学术论文参考文献的搜索主要还是通过互联网从可靠来源、专业媒体或大学图书馆进行。然而，随着ChatGPT的出现，这个过程经历了根本性的变化。记住，这个AI是用许多文档训练的，比我们一生中能读到的还要多。因此，ChatGPT拥有我们需要的信息，我们需要学习如何提出正确的问题。
- en: Prompt - I am writing a paper on Bitcoin energy expenditure from a moral approach.
    Recommend academic books to me.
  id: totrans-621
  prefs: []
  type: TYPE_NORMAL
  zh: 提示 - 我正在写一篇从道德角度论述比特币能源消耗的论文。请为我推荐一些学术书籍。
- en: 'ChatGPT - 1. "The Moral Case for Fossil Fuels" by Alex Epstein: Defends fossil
    fuels from a moral perspective and argues that they are essential for human welfare.
    Although it does not specifically address Bitcoin, the arguments could be applied
    to the energy use of this technology.'
  id: totrans-622
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT - 1. 亚历克斯·爱泼斯坦的《化石燃料的道德辩护》：从道德角度捍卫化石燃料，并认为它们对人类福祉至关重要。尽管它没有专门针对比特币，但其中的论点可以应用于该技术的能源使用。
- en: '2. "The Ethics of Climate Change: An Introduction" by James Garvey: Provides
    an ethical framework for considering the environmental impact of various technologies,
    relevant to analyzing the energy use of Bitcoin.'
  id: totrans-623
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 詹姆斯·加维的《气候变化伦理导论》：为考虑各种技术的环境影响提供了一个伦理框架，这与分析比特币的能源使用相关。
- en: '3. "The Ethics of Energy" by William James: Offers a philosophical perspective
    on the responsible use of energy, useful for evaluating the energy impact of Bitcoin.'
  id: totrans-624
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 威廉·詹姆斯的《能源伦理》：从哲学角度探讨了能源的负责任使用，对评估比特币的能源影响很有帮助。
- en: As you can see, ChatGPT not only provides us with a list of books but also gives
    us a brief description of how each book relates to the topic of our work. This
    is an excellent opportunity to use the skills we learned about summarizing information,
    as we can ask it to summarize the book's key points related to our work.
  id: totrans-625
  prefs: []
  type: TYPE_NORMAL
  zh: 正如你所见，ChatGPT不仅为我们提供了一本书的单子，还简要描述了每本书如何与我们的工作主题相关。这是一个极好的机会来运用我们关于总结信息所学的技能，因为我们可以要求它总结与我们工作相关的书籍的关键点。
- en: 'This information search could have taken us hours; however, with ChatGPT, we
    can do it in minutes. It is still a search for information done by ourselves,
    only more efficiently. We have never used it to copy or plagiarize any part of
    our work, only to speed up the information search process. Finally, let''s look
    at how ChatGPT can help us with a tedious task, often at the end of a paper, which
    is citing the sources used. There are several citation styles, such as APA, MLA,
    Chicago, and Harvard, each with their own rules for citing and referencing sources,
    which can be overwhelming. In general, some elements you should consider including
    when citing sources are author(s), title of work, publisher(s), date of publication,
    place of publication, publisher''s name, page number(s), URL, etc. Let''s ask
    ChatGPT to reference the sources he recommended above, plus a related web page:'
  id: totrans-626
  prefs: []
  type: TYPE_NORMAL
  zh: 这种信息搜索原本可能需要我们花费数小时；然而，有了ChatGPT，我们可以在几分钟内完成。这仍然是我们自己进行的信息搜索，只是效率更高。我们从未用它来复制或剽窃我们工作的任何部分，只是用它来加速信息搜索过程。最后，让我们看看ChatGPT如何帮助我们完成一项繁琐的任务，通常在论文的结尾，即引用所使用的来源。有几种引用风格，如APA、MLA、芝加哥和哈佛，每种风格都有自己引用和参考来源的规则，可能会让人感到不知所措。一般来说，在引用来源时，你应该考虑包括以下元素：作者（们）、作品标题、出版者（们）、出版日期、出版地点、出版者名称、页码（们）、URL等。让我们要求ChatGPT引用他推荐的上述来源，以及一个相关的网页：
- en: 'Prompt - Harvard style references the three books you mentioned to me for an
    academic paper, plus this other source: https://ethics.es/2020/02/bitcoins-el-supervillano-virtual-del-medio-ambiente/'
  id: totrans-627
  prefs: []
  type: TYPE_NORMAL
  zh: 提示 - 按照哈佛风格引用你提到的三本书以及这个其他来源：[https://ethics.es/2020/02/bitcoins-el-supervillano-virtual-del-medio-ambiente/](https://ethics.es/2020/02/bitcoins-el-supervillano-virtual-del-medio-ambiente/)
- en: 'ChatGPT - Of course, here I provide you with the bibliographic references of
    the three books I recommended and the additional source you have provided, in
    Harvard reference style:'
  id: totrans-628
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT - 当然，在这里我为你提供了我推荐的这三本书以及你提供的额外来源的参考文献，采用哈佛引用风格：
- en: 1. Epstein, A. (2014). The Moral Case for Fossil Fuels. Portfolio.
  id: totrans-629
  prefs: []
  type: TYPE_NORMAL
  zh: 1. Epstein, A. (2014). 《化石燃料的道德辩护》。Portfolio。
- en: '2. Garvey, J. (2008). The Ethics of Climate Change: An Introduction. Continuum.'
  id: totrans-630
  prefs: []
  type: TYPE_NORMAL
  zh: 2. Garvey, J. (2008). 《气候变化伦理：导论》。Continuum。
- en: '3. Steffen, L. (2014). The Ethics of Energy: William James''s Moral Philosophy
    in Focus. University of Scranton Press.'
  id: totrans-631
  prefs: []
  type: TYPE_NORMAL
  zh: 3. Steffen, L. (2014). 《能源伦理：聚焦威廉·詹姆斯的道德哲学》。Scranton大学出版社。
- en: 4. Ethic (2020). Bitcoins, the virtual supervillain of the environment. Retrieved
    April 7, 2023, from https://ethics.es/2020/02/bitcoins-el-supervillano-virtual-del-medio-ambiente/
  id: totrans-632
  prefs: []
  type: TYPE_NORMAL
  zh: 4. Ethic (2020). 《比特币，环境中的虚拟恶棍》。2023年4月7日检索自[https://ethics.es/2020/02/bitcoins-el-supervillano-virtual-del-medio-ambiente/](https://ethics.es/2020/02/bitcoins-el-supervillano-virtual-del-medio-ambiente/)
- en: You can see how this AI significantly facilitates and speeds up the process.
    ChatGPT handles formatting and almost instantly includes all the necessary information
    in the references. Providing it with the sources we have used saves us a great
    deal of time, allowing us to focus on other important parts of our work.
  id: totrans-633
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以看到这种人工智能如何显著地简化并加快这个过程。ChatGPT处理格式，几乎瞬间就在参考文献中包含了所有必要的信息。提供给我们所使用的来源，为我们节省了大量时间，使我们能够专注于工作的其他重要部分。
- en: 4.4.3.     Improve your Language Learning
  id: totrans-634
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4.4.3.     提高你的语言学习能力
- en: Learning a new language can be a challenge, but with ChatGPT, you have an assistant
    who can help you improve in a personalized and entertaining way. ChatGPT adapts
    to your needs, whether at the beginner or advanced level. You can use ChatGPT
    to complete tasks, practice vocabulary, and strengthen specific areas such as
    grammar, reading comprehension, and more. You can even give it tasks you find
    online or ask it to generate new exercises tailored to your level and goals, providing
    you with a comprehensive learning experience.
  id: totrans-635
  prefs: []
  type: TYPE_NORMAL
  zh: 学习一门新语言可能是一个挑战，但有了ChatGPT，你将拥有一个能够以个性化且有趣的方式帮助你提高的助手。ChatGPT会适应你的需求，无论是初学者还是高级学习者。你可以使用ChatGPT来完成任务、练习词汇，并加强语法、阅读理解等特定领域。你甚至可以给它分配你在网上找到的任务，或者要求它为你生成符合你水平和目标的新练习，为你提供全面的学习体验。
- en: One advantage of using ChatGPT is that you can create tasks according to the
    aspect of the language you want to focus on. For example, you can ask it to design
    grammar exercises that focus on verb tenses, vocabulary lists related to work
    or studies, or even readings with comprehension questions.
  id: totrans-636
  prefs: []
  type: TYPE_NORMAL
  zh: 使用ChatGPT的一个优点是，你可以根据你想要关注的语言方面来创建任务。例如，你可以要求它设计专注于动词时态的语法练习，与工作或学习相关的词汇表，或者甚至带有理解问题的阅读材料。
- en: When learning a new language, using a LLM like ChatGPT is particularly beneficial
    because it excels in understanding and generating language. While there's always
    a possibility of "hallucination" (making mistakes or offering fictitious facts)
    in other topics, such occurrences are minimal when learning a new language, as
    the focus is on structure, vocabulary, and grammar rather than factual information.
    ChatGPT has been trained with a wide array of multilingual data, which makes it
    an excellent tool for practicing any language, often offering precise and accurate
    expressions.
  id: totrans-637
  prefs: []
  type: TYPE_NORMAL
  zh: 当学习一门新语言时，使用像ChatGPT这样的LLM（大型语言模型）特别有益，因为它在理解和生成语言方面表现出色。虽然在其他主题上总有可能出现“幻觉”（犯错或提供虚构事实）的情况，但在学习新语言时，这种情况出现的可能性很小，因为重点在于结构、词汇和语法，而不是事实信息。ChatGPT经过广泛的多语言数据的训练，使其成为练习任何语言的优秀工具，通常能提供精确和准确的表达。
- en: ChatGPT is also useful for creating hypothetical situations adapted to your
    context. For example, if you are preparing for a job interview, you can ask it
    to generate questions in the target language that might come up during the interview
    and practice your answers. Or, if you want to improve your conversational skills,
    you can simulate dialogues about situations that interest you, such as travel,
    projects, or work scenarios. These practices make learning more enjoyable and
    relevant, allowing you to apply the new language to your daily life practically
    and effectively.
  id: totrans-638
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT在创建适应您背景的假设情景方面也非常有用。例如，如果您正在准备求职面试，您可以要求它生成面试中可能出现的目标语言问题，并练习您的回答。或者，如果您想提高您的对话技巧，您可以模拟您感兴趣的情况的对话，例如旅行、项目或工作场景。这些练习使学习更加愉快和具有相关性，让您能够将新语言实际有效地应用到日常生活中。
- en: The voice mode is another feature that makes ChatGPT especially useful in learning
    new languages. You can practice speaking directly with ChatGPT and engage in conversations
    naturally. The model has been trained with diverse language recordings, allowing
    it to understand and respond with quality. In addition, ChatGPT's voice mode helps
    with pronunciation and lets you develop fluency and confidence in speaking.
  id: totrans-639
  prefs: []
  type: TYPE_NORMAL
  zh: 语音模式是ChatGPT在语言学习方面特别有用的另一个特性。您可以直接与ChatGPT练习说话，并自然地进行对话。该模型经过多样化的语言录音训练，使其能够以高质量理解和回应。此外，ChatGPT的语音模式有助于发音，并让您在说话时培养流利和自信。
- en: With all these tools, ChatGPT becomes a flexible resource for learning and improving
    your skills in a new language. It provides an interactive approach tailored to
    your specific level and needs. It is ideal for self-study and complementing your
    studies with a teacher, offering many opportunities to practice and reinforce
    your knowledge.
  id: totrans-640
  prefs: []
  type: TYPE_NORMAL
  zh: 在所有这些工具的帮助下，ChatGPT成为学习新语言和提升技能的灵活资源。它提供了一种针对您特定水平和需求的互动方法。它非常适合自学，并辅以教师的指导，提供了许多练习和巩固知识的机会。
- en: 4.5\. ChatGPT for Gamers
  id: totrans-641
  prefs: []
  type: TYPE_NORMAL
  zh: 4.5. ChatGPT for Gamers
- en: In addition to its usefulness for educational and productivity purposes, ChatGPT
    can also be an incredible tool for gamers, especially in role-playing games. Games
    like Dungeons & Dragons and Yes, Dark Lord require creativity, improvisation,
    and the ability to immerse yourself in a complex story. With ChatGPT, you can
    simulate and enhance your experience in these games, whether playing solo or improving
    your group role-playing skills.
  id: totrans-642
  prefs: []
  type: TYPE_NORMAL
  zh: 除了在教育和生产效率方面的有用性之外，ChatGPT还可以成为游戏玩家，尤其是角色扮演游戏玩家的不可思议的工具。像《龙与地下城》和《是，黑暗领主》这样的游戏需要创造力、即兴发挥和沉浸于复杂故事的能力。使用ChatGPT，您可以在单人游戏或提高团队角色扮演技能时模拟和增强您的游戏体验。
- en: For example, in Yes, Dark Lord, you can play ChatGPT as the Dark Lord, who interrogates
    and judges adventurers for their failures. ChatGPT can assume the role of the
    game master, questioning you about your mission and allowing you to improvise
    excuses and justify your decisions. You can use specific prompts for ChatGPT to
    adapt its role to this type of game, transforming the experience into something
    much more dynamic and interactive.
  id: totrans-643
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，在《是，黑暗领主》中，您可以扮演ChatGPT作为黑暗领主，审问和评判冒险者的失败。ChatGPT可以扮演游戏主持人的角色，询问您的任务，并让您即兴编造借口和为自己的决定辩护。您可以使用特定的提示来调整ChatGPT的角色，使其适应这种类型的游戏，使体验变得更加动态和互动。
- en: Similarly, in Dungeons & Dragons, ChatGPT can act as a virtual Dungeon Master,
    creating custom stories, enemies, and challenges for your adventures. Many players
    have found that they can use ChatGPT to guide their characters through an immersive
    plot, make decisions, and even receive detailed descriptions that enhance immersion.
    The AI can adapt the narrative and surprise you with unexpected twists, resulting
    in a unique experience.
  id: totrans-644
  prefs: []
  type: TYPE_NORMAL
  zh: 类似地，在《龙与地下城》游戏中，ChatGPT可以扮演虚拟地下城主，为你的冒险创造定制的故事、敌人和挑战。许多玩家发现他们可以使用ChatGPT引导他们的角色穿越沉浸式的剧情，做出决策，甚至接收详细描述以增强沉浸感。AI可以调整剧情并给你带来意想不到的转折，从而带来独特的体验。
- en: On the next page is a prompt to start playing Dark Lord with ChatGPT. This is
    a sample of how you can integrate this tool into your gaming experience.
  id: totrans-645
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一页有一个提示，开始与ChatGPT玩黑暗领主游戏。这是如何将此工具集成到你的游戏体验中的示例。
- en: 'ChatGPT   - Let''s play "Yes, Dark Lord". This is a humorous role-playing game
    in which players play a group of adventurers who must justify their failures to
    a powerful and evil Dark Lord. I want you to assume the role of the Dark Lord,
    who will interrogate the characters about their failed mission. The adventurers
    (Character 1, Character 2, and Character 3) have returned from a mission to retrieve
    an important package, but have come back empty-handed. Question each of the characters,
    one by one, and look for the culprit of this failure. > Below, I give you the
    role of each character:'
  id: totrans-646
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT   - 让我们玩“是的，黑暗领主”。这是一款幽默的角色扮演游戏，玩家扮演一群冒险者，必须向一个强大而邪恶的黑暗领主解释他们的失败。我想让你扮演黑暗领主的角色，他将审问角色关于他们失败的使命。冒险者（角色1、角色2和角色3）从一次取回重要包裹的任务中返回，但空手而归。依次审问每个角色，寻找这次失败的罪魁祸首。>
    下面，我给你分配每个角色的角色：
- en: 'Character 1: [Brief description of the character].'
  id: totrans-647
  prefs: []
  type: TYPE_NORMAL
  zh: 角色一：[角色的简要描述]。
- en: 'Character 2: [Brief description of the character].'
  id: totrans-648
  prefs: []
  type: TYPE_NORMAL
  zh: 角色二：[角色的简要描述]。
- en: 'Character 3: [Brief description of the character].'
  id: totrans-649
  prefs: []
  type: TYPE_NORMAL
  zh: 角色三：[角色的简要描述]。
- en: As Dark Lord, your objective is to maintain a stern and inquisitive tone, looking
    for absurd or implausible excuses in their answers. You can change character each
    round and, after each justification, punish whoever you consider to have the worst
    excuse. Follow a humorous approach and use your creativity to make the game fun
    and unexpected.
  id: totrans-650
  prefs: []
  type: TYPE_NORMAL
  zh: 作为黑暗领主，你的目标是保持严厉和好奇的语气，寻找他们答案中的荒谬或不合理的借口。你可以在每一轮中更换角色，并在每次辩解后惩罚你认为借口最差的人。采用幽默的方法，发挥你的创造力，使游戏有趣且出人意料。
- en: Chapter V
  id: totrans-651
  prefs: []
  type: TYPE_NORMAL
  zh: 第五章
- en: Advanced uses of ChatGPT
  id: totrans-652
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: ChatGPT的高级应用
- en: 5.1.          Advanced tips for writing prompts
  id: totrans-653
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 5.1.          编写提示的高级技巧
- en: After exploring the primary uses of ChatGPT and seeing how it can improve our
    productivity with practical examples, we already have a good foundation. In this
    chapter, we will delve into the advanced uses of this tool, discovering new ways
    to take advantage of its full potential.
  id: totrans-654
  prefs: []
  type: TYPE_NORMAL
  zh: 在探索ChatGPT的主要用途并看到它如何通过实际示例提高我们的生产力之后，我们已经有了良好的基础。在本章中，我们将深入探讨这个工具的高级应用，发现利用其全部潜力的新方法。
- en: 5.1.1.     Specifies the output format
  id: totrans-655
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 5.1.1.     指定输出格式
- en: When you ask ChatGPT a question, you can indicate how you want the answer presented.
    Imagine giving an assignment to a student, and you specify how the student should
    organize the work when handing it in. Here are some examples of how you can do
    this.
  id: totrans-656
  prefs: []
  type: TYPE_NORMAL
  zh: 当你向ChatGPT提问时，你可以指出你希望答案如何呈现。想象一下给一个学生布置作业，并指定学生提交作业时应如何组织工作。以下是一些你可以这样做的例子。
- en: Prompt - What are the longest highways in the United States? List only the top
    four in the form of a bullet list.
  id: totrans-657
  prefs: []
  type: TYPE_NORMAL
  zh: 提示 - 美国最长的公路有哪些？以项目符号的形式列出前四名。
- en: ChatGPT   - U.S. Route 20 - 3,365 miles (Boston, MA to Newport, OR)
  id: totrans-658
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT   - 美国国道20号 - 3,365英里（从马萨诸塞州波士顿到俄勒冈州纽波特）
- en: U.S. Route 6 - 3,207 miles (Provincetown, MA to Bishop, CA)
  id: totrans-659
  prefs: []
  type: TYPE_NORMAL
  zh: U.S. Route 6 - 3,207 miles (从马萨诸塞州普罗文斯顿到加利福尼亚州 Bishop)
- en: Interstate 90 (I-90) - 3,021 miles (Seattle, WA to Boston, MA)
  id: totrans-660
  prefs: []
  type: TYPE_NORMAL
  zh: 州际公路90号（I-90）- 3,021英里（从华盛顿州西雅图到马萨诸塞州波士顿）
- en: U.S. Route 30 - 3,073 miles (Atlantic City, NJ to Astoria, OR)
  id: totrans-661
  prefs: []
  type: TYPE_NORMAL
  zh: U.S. Route 30 - 3,073 miles (从新泽西州大西洋城到俄勒冈州阿斯托里亚)
- en: However, we can specify another output format, as shown on the next page.
  id: totrans-662
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，我们可以在下一页指定另一种输出格式。
- en: '![](image_rsrc3PY.jpg)You can tell ChatGPT the format you prefer to present
    the information in, according to your needs.'
  id: totrans-663
  prefs: []
  type: TYPE_NORMAL
  zh: '![](image_rsrc3PY.jpg)你可以告诉ChatGPT你希望以何种格式呈现信息，根据你的需求。'
- en: 5.1.2.     Requests that the formatting be in HTML
  id: totrans-664
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 5.1.2.     请求格式为HTML
- en: You can specify how you want the results to be displayed. For example, you can
    ask for a table generated in HTML.
  id: totrans-665
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以指定您希望结果如何显示。例如，您可以要求生成HTML表格。
- en: 'Prompt - Question: What are the longest roads in USA? Displays only the top
    four and presents the results in HTML format.'
  id: totrans-666
  prefs: []
  type: TYPE_NORMAL
  zh: 提示 - 问题：美国最长的道路是什么？只显示前四条，并以HTML格式呈现结果。
- en: ChatGPT
  id: totrans-667
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT
- en: <table>
  id: totrans-668
  prefs: []
  type: TYPE_NORMAL
  zh: <table>
- en: <tr>
  id: totrans-669
  prefs: []
  type: TYPE_NORMAL
  zh: <tr>
- en: <th>Road</th>
  id: totrans-670
  prefs: []
  type: TYPE_NORMAL
  zh: <th>道路</th>
- en: <th>Connection</th>
  id: totrans-671
  prefs: []
  type: TYPE_NORMAL
  zh: <th>连接</th>
- en: '...'
  id: totrans-672
  prefs: []
  type: TYPE_NORMAL
  zh: '...'
- en: You can also request that the information be displayed using more modern HTML
    styles, such as CSS, instead of traditional table tags.
  id: totrans-673
  prefs: []
  type: TYPE_NORMAL
  zh: 您也可以要求使用更现代的HTML样式显示信息，例如CSS，而不是传统的表格标签。
- en: Prompt - Present that information but use CSS instead of table tags.
  id: totrans-674
  prefs: []
  type: TYPE_NORMAL
  zh: 提示 - 展示该信息，但使用CSS而不是表格标签。
- en: ChatGPT
  id: totrans-675
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT
- en: <div class="table">
  id: totrans-676
  prefs: []
  type: TYPE_NORMAL
  zh: <div class="table">
- en: <div class="row header">
  id: totrans-677
  prefs: []
  type: TYPE_NORMAL
  zh: <div class="row header">
- en: <div class="cell">Road</div>.
  id: totrans-678
  prefs: []
  type: TYPE_NORMAL
  zh: <div class="cell">道路</div>.
- en: <div class="cell">Connection</div>
  id: totrans-679
  prefs: []
  type: TYPE_NORMAL
  zh: <div class="cell">连接</div>
- en: <div class="cell">Approximate length</div>.
  id: totrans-680
  prefs: []
  type: TYPE_NORMAL
  zh: <div class="cell">大约长度</div>.
- en: '...'
  id: totrans-681
  prefs: []
  type: TYPE_NORMAL
  zh: '...'
- en: Using HTML with CSS, you can further customize the table layout to fit the style
    of your web page, making the presentation more visually appealing and modern.
  id: totrans-682
  prefs: []
  type: TYPE_NORMAL
  zh: 使用HTML和CSS，您可以进一步自定义表格布局以适应您网页的风格，使展示更加视觉上吸引人且现代。
- en: 5.1.3.     Iterate with multiple attempts
  id: totrans-683
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 5.1.3.     多次尝试迭代
- en: 'It is often necessary to work with AI to achieve the desired result. For example,
    our CSS result above. Here''s what it looks like:'
  id: totrans-684
  prefs: []
  type: TYPE_NORMAL
  zh: 有时必须与AI合作才能达到预期的结果。例如，我们上面的CSS结果。看起来是这样的：
- en: '![A table with a number of miles and miles  Description automatically generated](image_rsrc3PZ.jpg)'
  id: totrans-685
  prefs: []
  type: TYPE_IMG
  zh: '![包含多英里和英里描述自动生成的表格](image_rsrc3PZ.jpg)'
- en: Figure 4\. First iteration result in HTML format
  id: totrans-686
  prefs: []
  type: TYPE_NORMAL
  zh: 图4\. HTML格式中的第一次迭代结果
- en: Unfortunately, it's not as pretty as we would like. Let's see if we can remedy
    that.
  id: totrans-687
  prefs: []
  type: TYPE_NORMAL
  zh: 很遗憾，它没有我们希望的那样美观。让我们看看我们是否能纠正这一点。
- en: Prompt - Please do it again, but make sure the columns are all lined up. Make
    the headers a darker blue with white uppercase bold letters. Make each row of
    data light gray, but vary the gray levels so that row 1 is light gray, row 2 is
    slightly darker, row 3 is light gray, etc. Make sure that the name of the highway
    is in bold.
  id: totrans-688
  prefs: []
  type: TYPE_NORMAL
  zh: 提示 - 请再次执行，但确保所有列都对齐。将标题设置为较深的蓝色，使用白色大写粗体字母。使每行数据为浅灰色，但改变灰度级别，使第1行是浅灰色，第2行略深，第3行是浅灰色，等等。确保高速公路的名称为粗体。
- en: '![A table with a number of miles and miles  Description automatically generated](image_rsrc3R0.jpg)'
  id: totrans-689
  prefs: []
  type: TYPE_IMG
  zh: '![包含多英里和英里描述自动生成的表格](image_rsrc3R0.jpg)'
- en: Figure 5\. Second iteration result in HTML format
  id: totrans-690
  prefs: []
  type: TYPE_NORMAL
  zh: 图5\. HTML格式中的第二次迭代结果
- en: Never assume that programming is easy. But if you've ever taught programming
    to humans, this is precisely the kind of result you get. Sometimes it seems like
    they're being passive-aggressive, but it's more likely that you haven't specified
    your requirements carefully enough.
  id: totrans-691
  prefs: []
  type: TYPE_NORMAL
  zh: 永远不要假设编程很容易。但如果你曾经教过人类编程，这正是你得到的结果。有时他们似乎很被动攻击，但更有可能的是你没有足够仔细地指定你的要求。
- en: 5.1.4.     Provides explicit constraints to a response
  id: totrans-692
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 5.1.4.     为响应提供明确的约束
- en: In the prompt above, we have applied some restrictions to the answer, such as
    the number of roads we wanted to present. But you can also use constraints for
    more open-ended questions.
  id: totrans-693
  prefs: []
  type: TYPE_NORMAL
  zh: 在上面的提示中，我们已对答案应用了一些限制，例如我们想要展示的道路数量。但您也可以为更开放的问题使用约束。
- en: 'There are limits to this type of prompt. Let''s see this example:'
  id: totrans-694
  prefs: []
  type: TYPE_NORMAL
  zh: 这种提示类型有一定的限制。让我们看看这个例子：
- en: Prompt - Provides a summary of the key events of World War II as reported by
    the major newspapers of the time.
  id: totrans-695
  prefs: []
  type: TYPE_NORMAL
  zh: 提示 - 提供了当时主要报纸报道的第二次世界大战的关键事件摘要。
- en: Since the model was not trained in World War II newspapers, it cannot answer
    the question (although it attempts to).
  id: totrans-696
  prefs: []
  type: TYPE_NORMAL
  zh: 由于模型没有在第二次世界大战报纸上进行训练，它无法回答该问题（尽管它尝试了）。
- en: Prompt - Lists major space missions between 2010 and 2020.
  id: totrans-697
  prefs: []
  type: TYPE_NORMAL
  zh: 提示 - 列出2010年至2020年之间的重要太空任务。
- en: 'Similarly, you cannot specify any "last year" results since the model data
    ends in 2023\. That said, you can select data that is within the scope of the
    model, such as this one:'
  id: totrans-698
  prefs: []
  type: TYPE_NORMAL
  zh: 同样，您不能指定任何“去年”的结果，因为模型数据截止到2023年。但话虽如此，您可以选择在模型范围内的数据，例如这个：
- en: Prompt - Lists the major space missions carried out by NASA between 2010 and
    2020.
  id: totrans-699
  prefs: []
  type: TYPE_NORMAL
  zh: 提示 - 列出2010年至2020年NASA执行的主要太空任务。
- en: 'Note that we are limiting by date. But we can add more restrictions. Let''s
    restrict the data to US missions only. You can also go back to the formatting
    approach we discussed earlier and do something like this:'
  id: totrans-700
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，我们是在日期上进行限制。但我们可以添加更多限制。让我们仅限制美国任务的数据。你也可以回到我们之前讨论的格式化方法，并做类似这样的事情：
- en: Prompt - List all major space missions conducted between 2010 and 2020\. Group
    them by nation and space agency. Make the name of the nation and space agency
    bold.
  id: totrans-701
  prefs: []
  type: TYPE_NORMAL
  zh: 提示 - 列出2010年至2020年间进行的所有主要太空任务。按国家和航天机构分组。将国家和航天机构的名字加粗。
- en: You can be even more explicit. We then include continents and specify that any
    without missions are excluded.
  id: totrans-702
  prefs: []
  type: TYPE_NORMAL
  zh: 你甚至可以更加明确。然后我们包括大洲，并指定任何没有任务的都被排除在外。
- en: Prompt - List all major space missions carried out between 2010 and 2020\. Group
    them by continent. Make the continent name bold and all capitalized. Make the
    name of the nation and space agency bold, initial capitals, or all caps if formatted
    by the space agency (such as NASA). If a continent did not have a space mission,
    do not include it in this list.
  id: totrans-703
  prefs: []
  type: TYPE_NORMAL
  zh: 提示 - 列出2010年至2020年间进行的所有主要太空任务。按大洲分组。将大洲的名字加粗，并全部大写。将国家和航天机构的名字加粗，首字母大写，或者如果由航天机构格式化（如NASA），则全部大写。如果一个大陆没有太空任务，不要将其包括在这个列表中。
- en: We could go on and on, restricting the results provided by ChatGPT as much as
    we want.
  id: totrans-704
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以继续下去，尽可能多地限制ChatGPT提供的结果。
- en: 5.1.5.     Indicates the number of words, phrases or characters.
  id: totrans-705
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 5.1.5.     表示单词、短语或字符的数量。
- en: Regarding restrictions, you may have noticed that ChatGPT tends to be inaccurate
    regarding word count. It sometimes goes over or under if you ask it to limit its
    response to 50 words. This is because the language model works with tokens (data
    representations) that do not directly correspond to individual words.
  id: totrans-706
  prefs: []
  type: TYPE_NORMAL
  zh: 关于限制，你可能已经注意到，ChatGPT在字数统计方面往往不够准确。如果你要求它限制回答在50个字以内，有时它会超出或不足。这是因为语言模型与与数据表示（tokens）工作，这些表示并不直接对应于单个单词。
- en: 'For example, when I asked ChatGPT to "Summarize the TV series Game of Thrones,"
    he responded with 294 words in six paragraphs. But you can try limiting the answer.
    Try various limiting terms until you determine which one works best for you. For
    example:'
  id: totrans-707
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，当我要求ChatGPT“总结电视剧《权力的游戏》”时，他用了六个段落，294个字来回答。但你可以尝试限制答案。尝试各种限制术语，直到你确定哪个最适合你。例如：
- en: Prompt
  id: totrans-708
  prefs: []
  type: TYPE_NORMAL
  zh: 提示
- en: Summarize the television series Game of Thrones in 50 words.
  id: totrans-709
  prefs: []
  type: TYPE_NORMAL
  zh: 用50个字总结电视剧《权力的游戏》。
- en: Summarize the television series Game of Thrones in 2 sentences.
  id: totrans-710
  prefs: []
  type: TYPE_NORMAL
  zh: 用两句话总结电视剧《权力的游戏》。
- en: Summarizes the television series Game of Thrones in less than 200 characters.
  id: totrans-711
  prefs: []
  type: TYPE_NORMAL
  zh: 用不到200个字符总结电视剧《权力的游戏》。
- en: Summarizes the Game of Thrones TV series to fit in a tweet.
  id: totrans-712
  prefs: []
  type: TYPE_NORMAL
  zh: 将《权力的游戏》电视剧总结到一条推文中。
- en: 5.2\. Customized GPTs
  id: totrans-713
  prefs: []
  type: TYPE_NORMAL
  zh: 5.2\. 定制GPTs
- en: Custom GPTs are versions of ChatGPT tailored to fulfill specific functions,
    allowing users to harness the power of AI in a more specialized way. These GPTs
    are designed to offer unique solutions that fit different needs, such as education,
    programming, design, research, etc. Thanks to them, anyone can create or use a
    model focused on precise areas, transforming the experience of interacting with
    AI into something much more targeted and effective.
  id: totrans-714
  prefs: []
  type: TYPE_NORMAL
  zh: 定制GPTs是针对特定功能定制的ChatGPT版本，允许用户以更专业的方式利用AI的力量。这些GPTs旨在提供独特的解决方案，满足不同的需求，如教育、编程、设计、研究等。多亏了它们，任何人都可以创建或使用专注于精确领域的模型，将互动AI的经验转变为更加针对和有效的体验。
- en: 5.2.1.     GPTs Store
  id: totrans-715
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 5.2.1.     GPTs Store
- en: The GPT Store is the ideal place to find customized versions of ChatGPT to meet
    specific needs. OpenAI showcases GPTs created by its team, community members,
    and well-known companies in this store. Some of these companies include Canva,
    which offers design tools; AllTrails, for customized route recommendations; and
    Khan Academy, with a coding tutor called Code Tutor.
  id: totrans-716
  prefs: []
  type: TYPE_NORMAL
  zh: GPT Store是寻找定制版ChatGPT以满足特定需求的理想之地。OpenAI在这个商店展示了其团队、社区成员和知名公司创建的GPTs。这些公司包括提供设计工具的Canva；提供定制路线推荐的AllTrails；以及提供名为Code
    Tutor的编程辅导的Khan Academy。
- en: The GPTs in the store are organized into various categories, making it easy
    for users to find the right tool. Featured categories include "Best Picks," "Writing,"
    "Productivity," "Research and Analysis," "Education," "Lifestyle," and "Programming."
    This structure allows you to explore GPTs according to particular interests, from
    those focused on productivity to tools to enhance learning or simplify daily life.
  id: totrans-717
  prefs: []
  type: TYPE_NORMAL
  zh: 店内的GPT被组织成各种类别，使用户能够轻松找到合适的工具。特色类别包括“最佳选择”、“写作”、“生产力”、“研究和分析”、“教育”、“生活方式”和“编程”。这种结构允许您根据特定兴趣探索GPT，从专注于生产力的工具到增强学习或简化日常生活的工具。
- en: '![A screenshot of a computer  Description automatically generated](image_rsrc3R1.jpg)'
  id: totrans-718
  prefs: []
  type: TYPE_IMG
  zh: '![计算机截图，描述自动生成](image_rsrc3R1.jpg)'
- en: In addition, it is essential to mention that ChatGPT Plus, Team, and Enterprise
    users can create and share their GPTs in this store. In the future, OpenAI plans
    to implement a revenue program allowing creators to earn money based on how others
    use their GPTs. This system will be based on the popularity and usefulness of
    each GPT, awarding compensation to those with the most significant impact. Here's
    how to create these custom GPTs if you are a ChatGPT Plus user and want to share
    your versions in the GPT Store.
  id: totrans-719
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，必须提到的是，ChatGPT Plus、团队和企业用户可以在这个商店中创建和分享他们的GPT。未来，OpenAI计划实施一个收益计划，允许创作者根据他人如何使用他们的GPT来赚钱。这个系统将基于每个GPT的流行度和实用性，奖励那些影响最大的人。如果您是ChatGPT
    Plus用户并希望在自己的GPT商店中分享您的版本，以下是创建这些自定义GPT的方法。
- en: 5.2.2.     Create your GPTs
  id: totrans-720
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 5.2.2.     创建您的GPT
- en: Creating a customized GPT allows us to tailor the power of this wonderful LLM
    to our own specific needs and projects, giving us control over how we want it
    to interact and respond. This opens up possibilities for optimizing tasks, simplifying
    processes, and providing unique value in various areas. In addition, designing
    our own GPT allows us to share it with the community, receive feedback, and even,
    in the future, generate revenue if others find our creation helpful. It's a great
    way to explore the potential of AI and take our ideas to the next level!
  id: totrans-721
  prefs: []
  type: TYPE_NORMAL
  zh: 创建定制的GPT使我们能够根据我们自己的特定需求和项目调整这个出色的LLM的力量，从而控制我们希望它如何交互和响应。这为优化任务、简化流程以及在各个领域提供独特价值打开了可能性。此外，设计我们自己的GPT使我们能够与社区分享，获得反馈，甚至在未来，如果他人认为我们的创作有帮助，我们还可以从中获得收入。这是探索AI潜力并将我们的想法提升到下一个层次的好方法！
- en: 'To create a GPT, follow these steps:'
  id: totrans-722
  prefs: []
  type: TYPE_NORMAL
  zh: 要创建一个GPT，请按照以下步骤操作：
- en: 'Getting Started: You will need an active ChatGPT Plus subscription. If you
    already have one, go to chatgpt.com/gpts or select "Explore GPT" from the left
    navigation bar.'
  id: totrans-723
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 入门指南：您需要一个有效的ChatGPT Plus订阅。如果您已经有了，请访问chatgpt.com/gpts或从左侧导航栏选择“探索GPT”。
- en: 'Create GPT: Select the "+ Create" option at the top right.'
  id: totrans-724
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 创建GPT：在右上角选择“+创建”选项。
- en: 'Creation Wizard: In the "Create" tab, you can communicate with the GPT Builder,
    which helps you build a new GPT. You can give instructions such as "Set up a GPT
    that shows me book recommendations based on my favorite genres and past reading"
    or "Develop a GPT that gives me personalized gardening tips".'
  id: totrans-725
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 创建向导：在“创建”标签页中，您可以与GPT构建器进行交流，它可以帮助您构建一个新的GPT。您可以给出如下指令：“设置一个GPT，根据我喜欢的类型和过去的阅读推荐书籍”或“开发一个GPT，为我提供个性化的园艺建议”。
- en: 'Settings: Click the "Settings" tab to name and describe your GPT. You can also
    select the actions you want your GPT to perform, such as browsing the web or creating
    images.'
  id: totrans-726
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 设置：点击“设置”标签页为您的GPT命名和描述。您还可以选择您希望GPT执行的操作，例如浏览网页或创建图片。
- en: 'Publishing: When you are ready to publish your GPT, select "Publish" and share
    it with others or keep it yourself.'
  id: totrans-727
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 发布：当您准备好发布您的GPT时，选择“发布”并与他人分享或保留给自己。
- en: Advanced configuration
  id: totrans-728
  prefs: []
  type: TYPE_NORMAL
  zh: 高级配置
- en: 'In the GPT Editor, you can configure more detailed settings:'
  id: totrans-729
  prefs: []
  type: TYPE_NORMAL
  zh: 在GPT编辑器中，您可以配置更详细的设置：
- en: 'Add an Image: You can ask GPT Builder to create an image for your GPT or upload
    your own in the ''Configure'' tab.'
  id: totrans-730
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 添加图片：您可以在“配置”标签页中要求GPT构建器为您的GPT创建图片或上传您自己的图片。
- en: 'Additional Instructions: Here, you can provide detailed instructions or guidelines
    on how your GPT should behave, its functionalities, and specific behaviors to
    avoid.'
  id: totrans-731
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 补充说明：在此处，您可以提供详细的指令或指南，说明您的GPT应该如何表现，其功能以及应避免的具体行为。
- en: 'Conversation Starters: These are examples of conversation starter prompts.'
  id: totrans-732
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 对话开场白：这些是对话开场提示的示例。
- en: 'Additional Knowledge: This allows you to provide additional context for your
    GPT to reference. Note that the content of uploaded files may be included in the
    output.'
  id: totrans-733
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 附加知识：这允许您为您的 GPT 提供额外的背景信息。请注意，上传文件的内容可能包含在输出中。
- en: 'New Capabilities: Enabling web browsing, DALL-E image generation, and advanced
    data analysis will allow the GPT to perform additional functions.'
  id: totrans-734
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 新功能：启用网络浏览、DALL-E 图像生成和高级数据分析将使 GPT 能够执行更多功能。
- en: 'Custom Actions: You can make third-party APIs available for your GPT by providing
    details about endpoints, parameters, and how the model should use it. Actions
    for GPT can also be imported from an OpenAPI schema, so if you have already built
    a plugin, you can use your existing plugin manifests to define actions for your
    GPT.'
  id: totrans-735
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 自定义操作：您可以通过提供端点、参数以及模型如何使用它的详细信息，使第三方 API 对您的 GPT 可用。GPT 的操作也可以从 OpenAPI 架构导入，因此如果您已经构建了一个插件，您可以使用现有的插件清单来定义
    GPT 的操作。
- en: In short, 'My GPT' offers an incredibly flexible and accessible platform to
    customize AI to your needs, opening up a world of possibilities for its application
    in various fields.
  id: totrans-736
  prefs: []
  type: TYPE_NORMAL
  zh: 简而言之，'我的 GPT' 提供了一个极其灵活且易于访问的平台，可以根据您的需求定制 AI，为它在各个领域的应用打开了无限可能。
- en: 5.2.3.     Actual example of GPT to transcribe tickets
  id: totrans-737
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 5.2.3.     GPT 转写票据的实际示例
- en: 'Let''s imagine that we want to create a GPT that helps us transcribe purchase
    tickets from a photo, organizing the information in a table. To do this, once
    we are in the editor, inside the "Create" tab, we simply describe the desired
    function in our own words, and GPT Builder takes care of the rest: "I want a GPT
    that transcribes the content of a purchase ticket into a table."'
  id: totrans-738
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们想象一下，我们想要创建一个 GPT，帮助我们从照片中转录购买票据，并将信息整理成表格。为此，一旦我们进入编辑器，在“创建”标签内，我们只需用我们自己的话描述所需的函数，GPT
    Builder 就会处理其余部分：“我想有一个 GPT，它能将购买票据的内容转录成表格。”
- en: With this description, ChatGPT will automatically complete the following "Configure"
    section. Let's see what the result is.
  id: totrans-739
  prefs: []
  type: TYPE_NORMAL
  zh: 用这个描述，ChatGPT 将自动完成以下“配置”部分。让我们看看结果是什么。
- en: '![A screenshot of a computer  Description automatically generated](image_rsrc3R2.jpg)'
  id: totrans-740
  prefs: []
  type: TYPE_IMG
  zh: '![计算机的截图  自动生成的描述](image_rsrc3R2.jpg)'
- en: 'We can see a name and description assigned to our GPT and a picture (generated
    by DALL-E 3). In addition, GPT Builder writes instructions according to what we
    are looking for. As if that were not enough, it also creates conversation starters and suggestions
    for interacting with the GPT, such as "Transcribe my purchase ticket" or "Organize
    my purchases in a table". It is worth mentioning that we could also directly access
    this "Configure" tab and fill in all these data manually. Finally, we access the
    "Preview" tab, where we can check the result by testing some prompts with our
    customized GPT. Let''s test how it works:'
  id: totrans-741
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以看到分配给我们的 GPT 的名称和描述以及一张图片（由 DALL-E 3 生成）。此外，GPT Builder 会根据我们的需求编写指令。不仅如此，它还创建了与
    GPT 互动的起始对话和建议，例如“转录我的购买票据”或“将我的购买整理成表格”。值得一提的是，我们也可以直接访问这个“配置”标签并手动填写所有这些数据。最后，我们访问“预览”标签，在那里我们可以通过测试一些提示来检查我们自定义的
    GPT 的结果。让我们测试一下它的工作情况：
- en: '![A receipt of food on a table  Description automatically generated](image_rsrc3R3.jpg)![A
    screenshot of a receipt  Description automatically generated](image_rsrc3R4.jpg)'
  id: totrans-742
  prefs: []
  type: TYPE_IMG
  zh: '![餐桌上的食物收据  自动生成的描述](image_rsrc3R3.jpg)![收据的截图  自动生成的描述](image_rsrc3R4.jpg)'
- en: As you can see, we just released the ticket. There were no additional instructions,
    and the GPT knew its task. GPTs are for tasks we must perform with a certain constancy.
    We can train a GPT to understand what its task is.
  id: totrans-743
  prefs: []
  type: TYPE_NORMAL
  zh: 正如您所看到的，我们刚刚发布了票据。没有额外的说明，GPT 知道它的任务。GPTs 是用于我们必须以一定稳定性执行的任务。我们可以训练一个 GPT 来理解它的任务是什么。
- en: 'If we like the result, we will proceed to publish it. Here, we are presented
    with three privacy options: publish it so everyone can use it, share it only with
    specific people via a link, or keep it private. In this way, we have created a
    specialized GPT tailored to our needs with only an initial description, ready
    to optimize our tasks simply and practically!'
  id: totrans-744
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们喜欢结果，我们将继续发布它。在这里，我们面临三个隐私选项：发布它以便每个人都可以使用，通过链接仅与特定的人分享，或者保持私密。这样，我们只通过一个初始描述就创建了一个专门针对我们需求的
    GPT，准备好简单而实际地优化我们的任务！
- en: 5.2.4.     GPTs advanced level
  id: totrans-745
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 5.2.4.     GPTs 高级水平
- en: If you found the above interesting, I must tell you this is just the beginning.
    We can take customization much further. These GPTs respond to our instructions
    and allow us to add our knowledge files, creating a specialized environment perfect
    for specific tasks. Imagine you are studying a particular subject, preparing for
    a competitive exam, or working on a project with information that ChatGPT does
    not have by default; this is where the magic of these advanced GPTs comes in.
  id: totrans-746
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你觉得上面的内容很有趣，我必须告诉你这仅仅是个开始。我们可以将定制化做得更深入。这些GPT能够响应我们的指令，并允许我们添加我们的知识文件，创建一个适合特定任务的专用环境。想象一下，你正在学习某个特定主题，准备参加一场竞争性考试，或者在一个ChatGPT默认没有信息的项目上工作；这就是这些高级GPT的神奇之处。
- en: When you upload documents such as notes, syllabi, or any other reference file,
    GPT will have access to them throughout our conversation. Every time you interact
    with it, it can use that specific data to provide answers aligned with your files'
    content. For example, if you are studying for a particular subject, you can upload
    your notes, study guides, or even topic summaries, and GPT will integrate them
    into its responses. So, not only are you conversing with an AI, but you practically
    have a personalized tutor at your disposal who handles precisely the material
    you are working with.
  id: totrans-747
  prefs: []
  type: TYPE_NORMAL
  zh: 当你上传笔记、教学大纲或任何其他参考文件时，GPT将在整个对话中访问它们。每次你与之互动时，它都可以使用这些特定数据来提供与你的文件内容一致的答案。例如，如果你正在为某个特定主题学习，你可以上传你的笔记、学习指南或甚至主题摘要，GPT将它们整合到其回答中。因此，你不仅在与一个AI对话，实际上你有一个个性化的导师可供使用，这位导师处理你正在工作的材料。
- en: 'In addition to being able to customize the knowledge that the GPT queries,
    another key feature is the integrated functions that ChatGPT makes available in
    each model. These functions include three tools that can be activated or deactivated
    according to the needs of the GPT we are creating:'
  id: totrans-748
  prefs: []
  type: TYPE_NORMAL
  zh: 除了能够定制GPT查询的知识外，另一个关键特性是ChatGPT在每个模型中提供的集成功能。这些功能包括三个可以根据我们创建的GPT需求激活或禁用的工具：
- en: 'Web Browsing: This tool allows GPT to search the web in real time, which is
    ideal for obtaining updated information that is not in your database. Enabling
    this option by default is helpful if the GPT needs to query news, recent data,
    or any online content. However, if you prefer the GPT to work with information
    limited to what you provide, you can disable this feature.'
  id: totrans-749
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 网络浏览：这个工具允许GPT实时搜索网络，这对于获取数据库中没有的更新信息非常理想。如果GPT需要查询新闻、最近的数据或任何在线内容，默认启用此选项是有帮助的。然而，如果你希望GPT只处理你提供的信息，你可以禁用此功能。
- en: 'Image generation with DALL-E: This feature, also enabled by default, allows
    the GPT to generate images from text descriptions, using DALL-E technology. This
    is especially useful for creative or visual projects. Like the navigation function,
    you can turn it off if the project does not require image generation.'
  id: totrans-750
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用DALL-E进行图像生成：这个默认启用的特性允许GPT从文本描述中生成图像，使用DALL-E技术。这对于创意或视觉项目特别有用。就像导航功能一样，如果你不需要图像生成，你可以将其关闭。
- en: 'Code interpreter and data analysis: This third feature, turned off by default,
    allows GPT to perform calculations, analyze data, and execute code snippets. It
    is a powerful tool for those working with scientific data or programming, but
    there are risks associated with enabling this feature. In particular, if the GPT
    is shared publicly or via a link, there is a possibility that third parties may
    access your uploaded knowledge files or configuration instructions, which could
    compromise the security of your information. For this reason, it is important
    to carefully evaluate its use and be aware of its potential risks.'
  id: totrans-751
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 代码解释器和数据分析：这个默认关闭的第三项特性允许GPT进行计算、分析数据和执行代码片段。对于那些处理科学数据或编程的人来说，这是一个强大的工具，但启用此功能也存在风险。特别是，如果GPT是公开共享或通过链接共享的，第三方可能会访问你上传的知识文件或配置指令，这可能会危害你的信息安全。因此，重要的是要仔细评估其使用并意识到其潜在风险。
- en: Ultimately, each feature adds customization and power to our GPTs. However,
    with great capabilities also come significant responsibilities, and it is important
    to know and consider these factors before deciding how to configure your GPT.
  id: totrans-752
  prefs: []
  type: TYPE_NORMAL
  zh: 最终，每个功能都为我们的GPT增加了定制化和功能。然而，强大的能力也伴随着重大的责任，因此在决定如何配置你的GPT之前，了解和考虑这些因素是很重要的。
- en: 5.2.5.     Shares in GPTs
  id: totrans-753
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 5.2.5.     GPT中的股份
- en: Actions are advanced functions that allow GPTs to interact with external applications
    or services. These actions act as a "bridge" between the ChatGPT model and the
    real world, allowing the GPT to perform tasks outside the pure text environment
    of ChatGPT. This is achieved through integration with third-party APIs, which
    facilitate automated operations such as accessing databases, making online purchases,
    sending emails, or even querying other web services dynamically.
  id: totrans-754
  prefs: []
  type: TYPE_NORMAL
  zh: 动作是高级功能，允许GPT与外部应用程序或服务交互。这些动作充当ChatGPT模型与真实世界之间的“桥梁”，使GPT能够在ChatGPT的纯文本环境之外执行任务。这是通过集成第三方API实现的，这些API简化了自动化操作，如访问数据库、在线购物、发送电子邮件，甚至动态查询其他网络服务。
- en: For example, if you create a GPT that needs to query updated product prices
    in an online store, you can integrate an action that connects to the store's API.
    In this way, the GPT can query the data in real-time, which allows it to respond
    accurately to queries about prices, availability, or product features.
  id: totrans-755
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，如果你创建了一个需要查询在线商店中更新产品价格的GPT，你可以集成一个连接到商店API的动作。这样，GPT可以实时查询数据，从而能够准确回答有关价格、可用性或产品特性的查询。
- en: Although this process usually requires programming knowledge, there are codeless
    tools, such as Actionize, that simplify the configuration. This platform facilitates
    application integration, allowing GPTs to connect to thousands of apps without
    needing advanced technical knowledge.
  id: totrans-756
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然这个过程通常需要编程知识，但有一些无代码工具，如Actionize，可以简化配置。这个平台促进了应用程序集成，使GPT能够连接到数千个应用程序，而无需高级技术知识。
- en: This aspect makes GPTs become true "digital assistants", capable of carrying
    out complex and customized tasks with the minimum of manual intervention, enhancing
    automation in any workflow.
  id: totrans-757
  prefs: []
  type: TYPE_NORMAL
  zh: 这一特性使GPT成为真正的“数字助手”，能够在最少的人工干预下执行复杂和定制化的任务，从而在任何工作流程中提高自动化水平。
- en: 5.3\. Data analysis
  id: totrans-758
  prefs: []
  type: TYPE_NORMAL
  zh: 5.3. 数据分析
- en: Data analysis is essential to examining, cleaning, and transforming data to
    extract useful information, reach conclusions, and support decision-making. Imagine
    you have a jigsaw puzzle with thousands of scattered pieces; data analytics is
    how you organize those pieces to see the whole picture, which helps you better
    understand what's in front of you and make decisions based on that understanding.
    In a world where we generate enormous amounts of data daily, from application
    usage statistics to customer satisfaction survey results, data analytics allows
    us to filter out the noise, identify trends, predict behaviors, and improve processes
    in almost any imaginable domain.
  id: totrans-759
  prefs: []
  type: TYPE_NORMAL
  zh: 数据分析对于检查、清洗和转换数据以提取有用信息、得出结论和支持决策至关重要。想象一下，你有一个由数千个散落的碎片组成的拼图；数据分析就是如何组织这些碎片，以看到整体画面，这有助于你更好地理解眼前的事物，并基于这种理解做出决策。在一个我们每天产生大量数据的世界里，从应用程序使用统计到客户满意度调查结果，数据分析使我们能够过滤掉噪音，识别趋势，预测行为，并在几乎任何可想象的领域改进流程。
- en: 'Throughout this text, we have explored various facets of ChatGPT. Now, we will
    focus on a compelling application: data analysis. ChatGPT is a good conversationalist
    and a tool for handling and analyzing data. Its ability to process and understand
    structured and unstructured information makes it an ally in data exploration.
    ChatGPT can interact with datasets, either by extracting essential information,
    performing descriptive analysis, or even generating new insights from the data
    provided. In addition, we can now directly upload files whether or not you have
    a ChatGPT Plus subscription. Previously, this file upload feature was exclusive
    to Plus users. However, today, anyone can do so, although the free plan limits
    the number of files that can be uploaded. Currently supported file formats: TXT,
    PDF, DOC, DOCX, JPEG, PNG, MP4, AVI, CSV, JSON, XML, XLS, XLSX, CPP, PY, HTML,
    DB, SQLite, among others.'
  id: totrans-760
  prefs: []
  type: TYPE_NORMAL
  zh: 在本文中，我们已经探讨了ChatGPT的各个方面。现在，我们将关注一个引人入胜的应用：数据分析。ChatGPT是一位优秀的对话者，也是处理和分析数据的工具。它处理和理解结构化和非结构化信息的能力使其成为数据探索的盟友。ChatGPT可以与数据集互动，无论是通过提取关键信息、执行描述性分析，还是从提供的数据中生成新的见解。此外，现在无论你是否拥有ChatGPT
    Plus订阅，我们都可以直接上传文件。之前，这个文件上传功能仅限于Plus用户。然而，今天，任何人都可以这样做，尽管免费计划限制了可以上传的文件数量。目前支持的文件格式包括TXT、PDF、DOC、DOCX、JPEG、PNG、MP4、AVI、CSV、JSON、XML、XLS、XLSX、CPP、PY、HTML、DB、SQLite等。
- en: This ability to interactively load files and manipulate data opens up new possibilities
    for users at all levels, from researchers looking to decipher complex academic
    databases to companies needing fast, reliable market analysis. In the following
    pages, we'll explain how to leverage these ChatGPT capabilities to transform raw
    data into informed decisions and effective strategies.
  id: totrans-761
  prefs: []
  type: TYPE_NORMAL
  zh: 这种能够交互式加载文件和操作数据的能力为所有级别的用户打开了新的可能性，从试图解读复杂学术数据库的研究人员到需要快速、可靠市场分析的公司。在接下来的页面中，我们将解释如何利用这些ChatGPT功能将原始数据转化为明智的决策和有效的策略。
- en: 5.3.1.     Limitations of LLMs for data analysis
  id: totrans-762
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 5.3.1.     LLM在数据分析中的局限性
- en: Before proceeding, it is critical to understand the limitations and safety considerations
    required when using these tools in data analysis.
  id: totrans-763
  prefs: []
  type: TYPE_NORMAL
  zh: 在继续之前，了解在使用这些工具进行数据分析时的限制和安全考虑是至关重要的。
- en: 'Contextual understanding: ChatGPT may have difficulty understanding the full
    context or capturing specific details critical for detailed analysis.'
  id: totrans-764
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 上下文理解：ChatGPT可能难以理解完整的上下文或捕捉到详细分析中至关重要的具体细节。
- en: 'Challenges with large volumes of data: ChatGPT''s handling of large databases
    can be problematic, affecting its effectiveness in extensive analysis.'
  id: totrans-765
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 大量数据带来的挑战：ChatGPT处理大型数据库可能存在问题，影响其在广泛分析中的有效性。
- en: 'Data security risks: When uploading data to ChatGPT, there is a risk that data
    could be exposed or misused due to security breaches.'
  id: totrans-766
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 数据安全风险：将数据上传到ChatGPT时，存在数据可能因安全漏洞而泄露或误用的风险。
- en: 'Use of data in model training: Uploaded data may be used in model training,
    which raises concerns if sensitive or confidential information is involved.'
  id: totrans-767
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 模型训练中的数据使用：上传的数据可能用于模型训练，如果涉及敏感或机密信息，则可能引发担忧。
- en: These limitations and risks are essential to consider when employing ChatGPT
    in data analysis, ensuring that the risks are minimized and the benefits of its
    use are maximized. Next, we will explore how to properly prepare the data and
    formulate practical questions.
  id: totrans-768
  prefs: []
  type: TYPE_NORMAL
  zh: 在使用ChatGPT进行数据分析时，考虑这些限制和风险是至关重要的，以确保风险最小化并最大化其使用的益处。接下来，我们将探讨如何正确准备数据和提出实际的问题。
- en: 5.3.2.     Methodology for data analysis
  id: totrans-769
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 5.3.2.     数据分析方法
- en: Effective use of ChatGPT for data analysis requires proper data preparation,
    accurate question formulation, and techniques for interpreting results. Each of
    these key steps is detailed below.
  id: totrans-770
  prefs: []
  type: TYPE_NORMAL
  zh: 有效利用ChatGPT进行数据分析需要适当的数据准备、准确的问题制定以及结果解释的技术。以下详细说明了这些关键步骤。
- en: Data preparation
  id: totrans-771
  prefs: []
  type: TYPE_NORMAL
  zh: 数据准备
- en: 'Before using ChatGPT for data analysis, ensuring the data is well organized
    and clean is crucial. This includes:'
  id: totrans-772
  prefs: []
  type: TYPE_NORMAL
  zh: 在使用ChatGPT进行数据分析之前，确保数据组织良好且干净至关重要。这包括：
- en: 'Data cleaning: Removing or correcting erroneous or incomplete data.'
  id: totrans-773
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 数据清洗：删除或纠正错误或不完整的数据。
- en: 'Data structuring: Organizing data so ChatGPT can easily interpret it. This
    may involve converting unstructured data into more structured formats or simplifying
    complex data.'
  id: totrans-774
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 数据结构化：组织数据以便ChatGPT能够轻松解释。这可能涉及将非结构化数据转换为更结构化的格式或简化复杂数据。
- en: 'Anonymization of sensitive data: If the data contains sensitive information,
    it is essential to anonymize it to protect privacy before uploading it to the
    platform.'
  id: totrans-775
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 敏感数据的匿名化：如果数据包含敏感信息，在上传到平台之前对其进行匿名化以保护隐私是至关重要的。
- en: Data interrogation and manipulation
  id: totrans-776
  prefs: []
  type: TYPE_NORMAL
  zh: 数据查询和处理
- en: 'Formulating questions and commands to ChatGPT is an art that requires clarity
    and precision to obtain the best results:'
  id: totrans-777
  prefs: []
  type: TYPE_NORMAL
  zh: 向ChatGPT提出问题和命令是一种艺术，需要清晰和精确以获得最佳结果：
- en: 'Clear formulation of questions: Questions should be specific and direct to
    avoid ambiguity. For example, instead of asking, "What can you tell me about this
    data?" it would be more effective to ask, "What is the sales trend shown by this
    data for the third quarter of last year?"'
  id: totrans-778
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 明确的问题表述：问题应具体直接，以避免歧义。例如，与其问“你能告诉我关于这些数据什么？”不如问“去年第三季度的销售趋势是怎样的？”会更有效。
- en: 'Specific commands for analysis tasks: Use commands that direct ChatGPT to perform
    specific analyses, such as calculations of descriptive statistics, correlations,
    or even predictions based on statistical models.'
  id: totrans-779
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 分析任务的具体命令：使用命令指导ChatGPT执行特定分析，例如描述性统计的计算、相关性或基于统计模型的预测。
- en: Visualization and interpretation of results
  id: totrans-780
  prefs: []
  type: TYPE_NORMAL
  zh: 结果的可视化和解释
- en: 'Finally, the most critical part is to interpret and visualize the results.
    This is a fundamental task to get the most out of the data analysis performed
    with ChatGPT, and it falls directly on us:'
  id: totrans-781
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，最关键的部分是解释和可视化结果。这是从ChatGPT执行的数据分析中获得最大价值的基本任务，这直接落在了我们身上：
- en: 'Response Interpretation: Understand ChatGPT responses and how they relate to
    the questions asked and the data provided.'
  id: totrans-782
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 响应解释：理解ChatGPT的响应以及它们如何与提出的问题和提供的数据相关联。
- en: 'Use of visualization tools: Although ChatGPT can generate graphs for us, we
    may use external tools to visualize the results provided to help better understand
    patterns and trends in the data.'
  id: totrans-783
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 可视化工具的使用：尽管ChatGPT可以为我们生成图表，我们可能需要使用外部工具来可视化提供的结果，以更好地理解数据中的模式和趋势。
- en: 5.3.3.     Applications and a gift prompt
  id: totrans-784
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 5.3.3. 应用和提示
- en: The applications of ChatGPT Plus in data analytics are as varied as each user's
    imagination and specific needs, from risk analysis, which allows financial professionals
    to assess the viability and threats of potential investments, to product development,
    where companies can anticipate market reception to their innovations. In education,
    data on student performance can be analyzed to customize teaching methods, and
    in project management, resource optimization is made possible by efficiently identifying
    operational bottlenecks. These are just a few examples, and there are many more
    where creativity and individual needs can take this tool to new horizons.
  id: totrans-785
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT Plus在数据分析中的应用如同每个用户的想象和具体需求一样多样化，从风险分析，这使金融专业人士能够评估潜在投资的可行性和威胁，到产品开发，公司可以预测其创新的市场接受度。在教育领域，学生表现的数据可以用来定制教学方法，而在项目管理中，通过高效地识别运营瓶颈，可以实现资源优化。这只是几个例子，还有更多的地方，创意和个体需求可以使这个工具达到新的高度。
- en: To illustrate the potential of ChatGPT in data analysis and to facilitate a
    direct application of the concepts learned, we have prepared an example of a prompt
    that users can access via a QR code. This prompt is designed to simplify the analysis
    of any dataset they wish to explore. You can find it on the following page.
  id: totrans-786
  prefs: []
  type: TYPE_NORMAL
  zh: 为了展示ChatGPT在数据分析中的潜力，并便于直接应用所学概念，我们准备了一个用户可以通过QR码访问的提示示例。这个提示旨在简化他们希望探索的任何数据集的分析。您可以在以下页面找到它。
- en: '![](image_rsrc3R5.jpg)'
  id: totrans-787
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc3R5.jpg)'
- en: Figure 6\. QR prompt data analysis
  id: totrans-788
  prefs: []
  type: TYPE_NORMAL
  zh: 图6. QR提示数据分析
- en: To conclude, it is important to note that, although ChatGPT can perform data
    analysis quickly and effectively, in reality, anyone with an average level of
    knowledge could also do it.
  id: totrans-789
  prefs: []
  type: TYPE_NORMAL
  zh: 总结来说，重要的是要注意，尽管ChatGPT可以快速有效地执行数据分析，但在现实中，任何具有平均水平知识的人也能做到。
- en: Case study
  id: totrans-790
  prefs: []
  type: TYPE_NORMAL
  zh: 案例研究
- en: 'To put into practice what you have learned about data analysis using ChatGPT,
    we propose an interactive exercise where you can analyze different types of personal
    data to discover patterns, optimizations, and improvements in your daily life.
    Here are three options to choose from, depending on the data you have access to
    and your interest:'
  id: totrans-791
  prefs: []
  type: TYPE_NORMAL
  zh: 为了将您使用ChatGPT学习到的数据分析知识付诸实践，我们提出一个互动练习，您可以分析不同类型个人数据，以发现您日常生活中的模式、优化和改进。以下有三个选项供您选择，具体取决于您能访问的数据和您的兴趣：
- en: Personal finance analysis
  id: totrans-792
  prefs: []
  type: TYPE_NORMAL
  zh: 个人财务分析
- en: Use ChatGPT to analyze your banking transactions (previously exported and anonymized
    to remove personal information). By uploading this data to ChatGPT or copying
    and pasting it into the platform, you can ask it to identify spending patterns.
    In these areas, you may be spending more than necessary and get recommendations
    on optimizing your spending.
  id: totrans-793
  prefs: []
  type: TYPE_NORMAL
  zh: 使用ChatGPT分析您的银行交易（之前已导出并匿名化以去除个人信息）。通过将此数据上传到ChatGPT或复制粘贴到平台中，您可以要求它识别支出模式。在这些领域，您可能花费了不必要的费用，并获得优化支出的建议。
- en: 2\. Energy consumption evaluation
  id: totrans-794
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 能耗评估
- en: If you have access to your digitized electricity bills, ChatGPT can help you
    understand your energy consumption. With this information, the tool could analyze
    your monthly consumption patterns, identify abnormal usage peaks, and offer practical
    advice for improving energy efficiency in your home.
  id: totrans-795
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您能访问您的数字化电费账单，ChatGPT可以帮助您了解您的能源消耗。有了这些信息，该工具可以分析您的月度消费模式，识别异常使用峰值，并提供提高家庭能源效率的实用建议。
- en: 3\. Optimization of displacements
  id: totrans-796
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 位移优化
- en: ChatGPT can analyze travel data to suggest efficiency improvements for those
    who use applications such as Google Maps for their commute. This includes recommendations
    on changing regular routes, selecting other schedules to avoid congestion, or
    exploring more efficient transportation alternatives.
  id: totrans-797
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT可以分析旅行数据，为使用Google Maps等通勤应用的用户提出效率改进建议。这包括改变常规路线、选择其他时间表以避免拥堵，或探索更有效的交通替代方案。
- en: Exercise instructions
  id: totrans-798
  prefs: []
  type: TYPE_NORMAL
  zh: 练习说明
- en: 'Select a data category: Based on the availability and relevance of your data,
    choose from personal finance, energy consumption, or commuting.'
  id: totrans-799
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 选择数据类别：根据数据的可用性和相关性，从个人财务、能源消耗或通勤中选择。
- en: 'Prepare your data: Ensure that the data is free of sensitive personal information
    and is in a format that ChatGPT can easily process.'
  id: totrans-800
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 准备您的数据：确保数据不包含敏感个人信息，并且格式是ChatGPT可以轻松处理的。
- en: 'Interact with ChatGPT: Upload your data to ChatGPT or enter the information
    manually and ask specific questions to explore the aspects you are most interested
    in. You can also use the prompt provided above.'
  id: totrans-801
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 与ChatGPT互动：将您的数据上传到ChatGPT或手动输入信息，并提出具体问题以探索您最感兴趣的部分。您也可以使用上面提供的提示。
- en: This case study will allow you to apply the knowledge acquired in this section.
    Still, it will also provide you with practical knowledge that you could use to
    improve specific aspects of your daily life.
  id: totrans-802
  prefs: []
  type: TYPE_NORMAL
  zh: 本案例研究将使您能够应用在本节中获得的知识，同时也会为您提供可用于改善您日常生活特定方面的实用知识。
- en: 5.4\. Extensions to enhance ChatGPT
  id: totrans-803
  prefs: []
  type: TYPE_NORMAL
  zh: 5.4\. 扩展以增强ChatGPT
- en: 'Throughout the book, we have seen various use cases for ChatGPT, which offers
    many possibilities. Best of all, it can be integrated with other tools by adding
    extensions to multiply the functionalities. These extensions will allow you to
    make the most of your experience. Let''s take a look at some of the main ones:'
  id: totrans-804
  prefs: []
  type: TYPE_NORMAL
  zh: 在整本书中，我们已经看到了ChatGPT的各种用例，它提供了许多可能性。最好的是，它可以通过添加扩展与其它工具集成，以增加其功能。这些扩展将使您充分利用您的体验。让我们看看其中的一些主要扩展：
- en: 5.4.1.     AIPRM for ChatGPT
  id: totrans-805
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 5.4.1.     AIPRM for ChatGPT
- en: AIPRM offers ChatGPT prompt templates, facilitating the process of asking questions.
    Templates are available from the AIPRM community, and you can save your own. Although
    most are about SEO and marketing, we can find all kinds of them.
  id: totrans-806
  prefs: []
  type: TYPE_NORMAL
  zh: AIPRM为ChatGPT提供提示模板，简化了提问过程。模板来自AIPRM社区，您也可以保存自己的模板。尽管大多数与SEO和营销相关，但我们也可以找到各种模板。
- en: 5.4.2.     HARPA AI
  id: totrans-807
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 5.4.2.     HARPA AI
- en: HARPA AI is a tool that allows us to apply the power of ChatGPT to multiple
    tasks within our browser. For example, we can use it to respond to emails and
    social media posts, summarize the content of any web article, or rewrite any text
    we want to publish without the need to access the ChatGPT website. In addition,
    it will display ChatGPT's answers to our searches on the same search engine results
    page. It can also extract data / prices / SEO keywords from web pages. As if that
    were not enough, it includes functions outside ChatGPT, such as the ability to
    monitor the price variation of Amazon products.
  id: totrans-808
  prefs: []
  type: TYPE_NORMAL
  zh: HARPA AI是一个工具，它允许我们在浏览器内将ChatGPT的力量应用于多个任务。例如，我们可以用它来回复电子邮件和社交媒体帖子，总结任何网络文章的内容，或重写我们想要发布的任何文本，而无需访问ChatGPT网站。此外，它还会在同一搜索引擎结果页面上显示ChatGPT对我们搜索的答案。它还可以从网页中提取数据/价格/SEO关键词。如果还不够，它还包括ChatGPT之外的功能，例如监控亚马逊产品价格变动的功能。
- en: 5.4.3.     TweetGPT
  id: totrans-809
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 5.4.3.     TweetGPT
- en: If we want to use ChatGPT to reply to tweets in our browser without needing
    an all-in-one extension, TweetGPT is the ideal solution. With this add-on, a bot
    icon will appear in the Twitter web interface, automatically generating our tweet
    by analyzing the content we are replying to.
  id: totrans-810
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们想在浏览器中使用ChatGPT回复推文，而不需要使用全能扩展，那么TweetGPT是理想的解决方案。使用此附加组件，一个机器人图标将出现在Twitter网页界面中，通过分析我们正在回复的内容自动生成我们的推文。
- en: 5.4.4.     ShareGPT
  id: totrans-811
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 5.4.4.     ShareGPT
- en: Sometimes, we would like to share one of our conversations with ChatGPT online
    so that other users can access it. Screenshots, pastes, and copies are usually
    bad systems for this, especially if the conversation is long. That's why ShareGPT
    allows us to create a public backup of the conversation within its own platform,
    keeping the original format.
  id: totrans-812
  prefs: []
  type: TYPE_NORMAL
  zh: 有时候，我们可能希望在网上分享与ChatGPT的一次对话，以便其他用户可以访问它。截图、粘贴和复制通常不是很好的系统，尤其是如果对话很长的话。这就是为什么ShareGPT允许我们在其平台上创建对话的公共备份，同时保持原始格式。
- en: 5.4.5.     Summarize
  id: totrans-813
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 5.4.5.     总结
- en: If you want your browser to summarize any web page you are viewing, as well
    as any YouTube video, with the click of a button, Summarize is the extension you
    need. You won't have to switch tabs to read the summary; it will be generated
    in a small window that overlays the web.
  id: totrans-814
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您希望您的浏览器能够通过点击按钮来总结您正在查看的任何网页以及任何YouTube视频，那么Summarize就是您需要的扩展。您无需切换标签页来阅读摘要；它将在覆盖网页的小窗口中生成。
- en: 5.4.6.     ChatGPT Writer
  id: totrans-815
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 5.4.6.     ChatGPT Writer
- en: With the ChatGPT Writer extension, we can create emails and reply to messages
    with just one click as long as we provide the original text. This extension integrates
    incredibly well with Gmail, although it is compatible with any other webmail platform.
  id: totrans-816
  prefs: []
  type: TYPE_NORMAL
  zh: 使用ChatGPT Writer扩展，我们只需点击一下就能创建电子邮件并回复消息，只要我们提供原始文本。此扩展与Gmail集成得非常好，尽管它与任何其他网络邮件平台都兼容。
- en: 5.4.7.     Promptheus
  id: totrans-817
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 5.4.7.     普罗米修斯
- en: Promptheus adds a valuable feature to ChatGPT, allowing it to receive voice
    input, transforming the chatbot into a useful voice assistant like Siri.
  id: totrans-818
  prefs: []
  type: TYPE_NORMAL
  zh: 普罗米修斯为ChatGPT添加了一个有价值的特性，允许它接收语音输入，将聊天机器人转变为像Siri这样的有用语音助手。
- en: 5.4.8.     Merlin
  id: totrans-819
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 5.4.8.     梅林
- en: Merlin is an Open AI-powered ChatGPT extension that works across the browser.
    It consistently responds to various instructions based on Open AI's GPT AI model.
  id: totrans-820
  prefs: []
  type: TYPE_NORMAL
  zh: 梅林是一个由Open AI支持的ChatGPT扩展，它可以在浏览器中工作。它根据Open AI的GPT AI模型，始终如一地响应各种指令。
- en: Chapter VI
  id: totrans-821
  prefs: []
  type: TYPE_NORMAL
  zh: 第六章
- en: Expert level
  id: totrans-822
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 专家级
- en: 6.1.          Parameter configuration
  id: totrans-823
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 6.1.         参数配置
- en: Although the ChatGPT interface is simple and easy to use, behind it lies a complex
    model with multiple parameters and settings. Although the model usually works
    optimally with its default settings, it is interesting to know some critical parameters
    that influence its behavior. In this chapter, we will explore three of these parameters,
    temperature, Top-P, and Top-K, to understand how they affect the performance of
    GPT models and what they can contribute to customizing response generation.
  id: totrans-824
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管ChatGPT界面简单易用，但其背后是一个具有多个参数和设置的复杂模型。尽管模型通常使用默认设置就能达到最佳效果，但了解一些影响其行为的关键参数是有趣的。在本章中，我们将探讨这三个参数：温度、Top-P和Top-K，以了解它们如何影响GPT模型的表现以及它们可以为定制响应生成做出什么贡献。
- en: 6.1.1.   Temperature
  id: totrans-825
  prefs: []
  type: TYPE_NORMAL
  zh: 6.1.1.   温度
- en: Temperature is one of the most important parameters you can adjust in ChatGPT.
    This parameter controls the degree of randomness in the model's responses. A higher
    temperature will produce more varied and creative responses, while a lower temperature
    will produce more predictable and consistent responses.
  id: totrans-826
  prefs: []
  type: TYPE_NORMAL
  zh: 温度是您可以在ChatGPT中调整的最重要参数之一。此参数控制模型响应的随机程度。较高的温度将产生更多样化和创造性的响应，而较低的温度将产生更可预测和一致的响应。
- en: 'The temperature range in ChatGPT goes from 0 to 1\. A temperature value of
    0 will cause ChatGPT to always choose the most likely word at each step, resulting
    in very consistent but potentially less creative responses. On the other hand,
    a temperature value of 1 will cause ChatGPT to generate responses with a greater
    diversity of words, which can lead to more creative and unpredictable responses.
    For example, if you ask ChatGPT to create a story with a temperature of 0.2, you
    will likely get a coherent and focused story. However, if you set the temperature
    to 0.8, the generated story might be more varied and surprising, although it might
    also be less coherent. Adjusting the temperature in ChatGPT is a straightforward
    process. You specify the temperature value you want when you write the prompt,
    as shown in the following example:'
  id: totrans-827
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT中的温度范围从0到1。温度值为0将导致ChatGPT在每一步都始终选择最可能的单词，从而产生非常一致但可能不太有创造性的响应。另一方面，温度值为1将导致ChatGPT生成包含更多样化单词的响应，这可能导致更富有创造性和不可预测的响应。例如，如果您要求ChatGPT以0.2的温度创建一个故事，您很可能会得到一个连贯且专注的故事。然而，如果将温度设置为0.8，生成的故事可能会更加多变和令人惊讶，尽管它可能也会不那么连贯。调整ChatGPT中的温度是一个简单的过程。您在编写提示时指定所需的温度值，如下面的示例所示：
- en: Prompt - Once upon a time, in a faraway kingdom, there was a brave knight named
    Sir Lancelot. The story continues, with temperature = 0.1.
  id: totrans-828
  prefs: []
  type: TYPE_NORMAL
  zh: 提示 - 从前，在一个遥远的王国里，有一位名叫兰斯洛特爵士的勇敢骑士。故事继续进行，温度 = 0.1。
- en: ChatGPT - Once upon a time, in a faraway kingdom, there was a brave knight named
    Sir Lancelot. He was known throughout the kingdom for his bravery and courage.
    Every day, he would ride
  id: totrans-829
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT - 从前，在一个遥远的王国里，有一位名叫兰斯洛特爵士的勇敢骑士。他在整个王国以他的勇敢和勇气而闻名。每天，他会骑上马背
- en: 'The setting the temperature to 0.9 can lead to more varied and surprising responses:'
  id: totrans-830
  prefs: []
  type: TYPE_NORMAL
  zh: 将温度设置为0.9可能会导致更多样化和令人惊讶的反应：
- en: ChatGPT - Once upon a time, in a faraway kingdom, there was a brave knight named
    Sir Lancelot. One day, he discovered a hidden portal in the castle library that
    led to a world full of talking animals and magical creatures.
  id: totrans-831
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT - 从前，在一个遥远的王国里，有一位名叫兰斯洛特爵士的勇敢骑士。有一天，他在城堡图书馆里发现了一个隐藏的传送门，通往一个充满会说话的动物和神奇生物的世界。
- en: Remember, a higher temperature can lead to more creative but also more unpredictable
    responses, while a lower temperature can produce more coherent but potentially
    less creative responses. It's all about finding the right balance for your needs.
    In short, temperature is a tool to control the balance between consistency and
    creativity in ChatGPT responses. Adjusting this parameter allows you to customize
    ChatGPT to suit your specific needs.
  id: totrans-832
  prefs: []
  type: TYPE_NORMAL
  zh: 记住，较高的温度可能导致更具创造性和不可预测的反应，而较低的温度可能会产生更连贯但可能不太具创造性的反应。关键在于找到适合您需求的正确平衡。简而言之，温度是控制ChatGPT回答中一致性和创造力平衡的工具。调整此参数允许您定制ChatGPT以满足您的特定需求。
- en: 6.1.2.   Top-K and Top-P
  id: totrans-833
  prefs: []
  type: TYPE_NORMAL
  zh: 6.1.2.   Top-K和Top-P
- en: In the GPT architecture, two adjustable hyperparameters, Top-K and Top-P, play
    a crucial role in text generation. These techniques improve consistency and control
    the creativity of the model's responses.
  id: totrans-834
  prefs: []
  type: TYPE_NORMAL
  zh: 在GPT架构中，两个可调整的超参数，Top-K和Top-P，在文本生成中起着至关重要的作用。这些技术提高了一致性并控制了模型回答的创造力。
- en: Top-K and Top-P are sampling techniques that allow users to adjust the precision
    and diversity of the generated responses. In other words, they will enable you
    to control how "safe" or "adventurous" the model is when generating text. Depending
    on the context and the desired level of control, you can choose to use Top-K,
    Top-P, or even a combination of both for optimal results. For example, you might
    use Top-K to seek concrete and precise answers. On the other hand, if you are
    looking for more diverse and creative responses, you might choose to use Top-P.
  id: totrans-835
  prefs: []
  type: TYPE_NORMAL
  zh: Top-K和Top-P是采样技术，允许用户调整生成回答的精确性和多样性。换句话说，它们将使您能够控制模型在生成文本时的“安全”或“冒险”程度。根据上下文和所需的控制水平，您可以选择使用Top-K、Top-P，甚至两者的组合以获得最佳结果。例如，您可能会使用Top-K来寻求具体和精确的答案。另一方面，如果您正在寻找更多样化和创造性的回答，您可能会选择使用Top-P。
- en: But what exactly are Top-K and Top-P, how do they work, and how can you adjust
    them in ChatGPT? In the following pages, we'll break down these concepts and show
    you how to use them to customize text generation in ChatGPT.
  id: totrans-836
  prefs: []
  type: TYPE_NORMAL
  zh: 但Top-K和Top-P究竟是什么，它们是如何工作的，您如何在ChatGPT中调整它们？在以下页面中，我们将分解这些概念，并展示如何使用它们来定制ChatGPT中的文本生成。
- en: Top-K, this parameter is crucial in determining the variety of words the model
    can consider when generating responses. By setting Top-K, you tell the model how
    many of the most likely words it should feel at each step of text generation.
    A low value of K, such as K=1, will limit the model to selecting only the most
    likely word, which may result in more accurate but less creative responses.
  id: totrans-837
  prefs: []
  type: TYPE_NORMAL
  zh: Top-K，这个参数在确定模型在生成回答时可以考虑的单词多样性方面至关重要。通过设置Top-K，您告诉模型在文本生成的每一步中应该考虑多少最有可能的单词。K值较低，例如K=1，将限制模型仅选择最有可能的单词，这可能会导致更准确但不太具创造性的回答。
- en: On the other hand, a high value of K, such as K=2000, will allow the model to
    consider a broader set of words, which may result in more creative and diverse
    responses. The maximum value of K will be the size of the vocabulary you want
    in the responses, i.e., the total number of unique words in the vocabulary.
  id: totrans-838
  prefs: []
  type: TYPE_NORMAL
  zh: 另一方面，K值较高，例如K=2000，将允许模型考虑更广泛的单词集，这可能会导致更具创造性和多样化的反应。K的最大值将是您希望在回答中包含的词汇量大小，即词汇表中独特单词的总数。
- en: For example, if you set Top-K to 50,000, the model will consider up to 50,000
    different words when generating answers. You can also define Top-K as a percentage
    of the model's answer vocabulary. For example, if you set Top-K to 90%, the model
    will consider 90% of the most likely words in its vocabulary. Top-K is a technique
    to limit output, avoid inconsistent responses, and expand creativity in ChatGPT.
    By adjusting this parameter, you can customize the consistency and diversity of
    ChatGPT responses to suit your specific needs.
  id: totrans-839
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，如果您将Top-K设置为50,000，模型在生成答案时会考虑多达50,000个不同的单词。您还可以将Top-K定义为模型答案词汇量的百分比。例如，如果您将Top-K设置为90%，模型将考虑其词汇量中最有可能的90%的单词。Top-K是一种限制输出、避免不一致的反应并扩展ChatGPT创造力的技术。通过调整此参数，您可以定制ChatGPT的回答的一致性和多样性，以满足您的特定需求。
- en: To set Top-K in ChatGPT, you tell it to do so in your instruction. For example,
    let's ask him to complete the sentence "The sky is..." with a Top-K of 1.
  id: totrans-840
  prefs: []
  type: TYPE_NORMAL
  zh: 在ChatGPT中设置Top-K，你需要在指令中告诉它这样做。例如，让我们要求它以Top-K为1来完成句子“天空是……”。
- en: ChatGPT - The sky is blue.
  id: totrans-841
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT - 天空是蓝色的。
- en: Let's ask him to complete the same sentence with a Top-K of 50,000.
  id: totrans-842
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们要求它以Top-K为50,000来完成相同的句子。
- en: ChatGPT - The sky is a blanket of tranquility, a canvas of changing hues that
    reflects the passage of time, from dawn to dusk, and then fills with stars at
    night.
  id: totrans-843
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT - 天空是一块宁静的布，是一幅不断变化的色彩画布，它反映了时间的流逝，从黎明到黄昏，然后在夜晚填满星星。
- en: As the examples above show, the difference between a low and a high Top-K value
    is notable. A low Top-K value, such as 1, limits the model to always selecting
    the most likely word, which may result in more predictable but potentially less
    creative responses. On the other hand, a high value of Top-K, such as 50,000,
    allows the model to consider a much broader set of words, which may result in
    more creative and diverse, but also more unpredictable, responses. In summary,
    adjusting the Top-K value allows you to control the balance between consistency
    and creativity in the responses generated by ChatGPT.
  id: totrans-844
  prefs: []
  type: TYPE_NORMAL
  zh: 如上例所示，低Top-K值和高Top-K值之间的差异是显著的。一个较低的Top-K值，例如1，将限制模型始终选择最可能的单词，这可能会导致更可预测但可能不太富有创造性的响应。另一方面，一个较高的Top-K值，例如50,000，允许模型考虑一个更广泛的单词集，这可能会导致更富有创造性和多样化的，但也更不可预测的响应。总之，调整Top-K值允许你控制ChatGPT生成的响应中一致性和创造性的平衡。
- en: Top-P is another sampling technique you can adjust in language models based
    on the GPT architecture, such as ChatGPT. This hyperparameter selects words based
    on their cumulative probability, which can lead to more diverse and creative responses.
  id: totrans-845
  prefs: []
  type: TYPE_NORMAL
  zh: Top-P是基于GPT架构的语言模型中可以调整的另一种采样技术，例如ChatGPT。这个超参数根据累积概率选择单词，这可能导致更多样化和富有创造性的响应。
- en: Top-P values can range from 0 to 1\. A low P value, such as P=0.1, will limit
    the choices to the most likely words, which may result in more coherent and concrete
    answers. On the other hand, a high value of P, such as P=0.9, will allow for more
    diversity in generating words for responses, which may result in more creative
    and diverse responses. For example, if you set Top-P to 0.1, the model will be
    limited to selecting words that, in aggregate, add up to a 10% probability. This
    may result in more predictable responses. However, if you set Top-P to 0.9, the
    model will consider a set of words that add up to a 90% probability, which may
    result in more creative responses.
  id: totrans-846
  prefs: []
  type: TYPE_NORMAL
  zh: Top-P的值可以从0到1不等。一个较低的P值，例如P=0.1，将限制选择最可能的单词，这可能会导致更连贯和具体的答案。另一方面，一个较高的P值，例如P=0.9，将允许在生成响应单词时具有更多的多样性，这可能会导致更富有创造性和多样化的响应。例如，如果你将Top-P设置为0.1，模型将仅限于选择总概率加起来达到10%的单词。这可能会导致更可预测的响应。然而，如果你将Top-P设置为0.9，模型将考虑总概率达到90%的一组单词，这可能会导致更富有创造性的响应。
- en: To set Top-P in ChatGPT, specify the value of Top-P when you write the instruction. 
    If you set Top-P to 0.1, the model will be limited to selecting words that add
    up to a 10% probability together. For example, if you ask ChatGPT to complete
    the sentence "The apple is..." with a Top-P of 0.1, you will most likely get an
    answer like "The apple is red".
  id: totrans-847
  prefs: []
  type: TYPE_NORMAL
  zh: 在ChatGPT中设置Top-P时，指定Top-P的值。如果你将Top-P设置为0.1，模型将仅限于选择总概率加起来达到10%的单词。例如，如果你要求ChatGPT以Top-P为0.1来完成句子“苹果是……”，你很可能会得到一个像“苹果是红色的”这样的答案。
- en: On the other hand, if we set Top-P to 0.9, the model will consider a set of
    words that together add up to a 90% probability. If you ask ChatGPT to complete
    the same sentence "The apple is...", with a Top-P of 0.9, you might get a more
    creative answer such as "The apple is the emblem of temptation and knowledge".
    Top-P is a powerful tool for controlling diversity and creativity in ChatGPT responses.
    Adjusting this parameter allows you to customize ChatGPT to suit your specific
    needs.
  id: totrans-848
  prefs: []
  type: TYPE_NORMAL
  zh: 另一方面，如果我们将Top-P设置为0.9，模型将考虑总概率达到90%的一组单词。如果你要求ChatGPT以Top-P为0.9来完成相同的句子“苹果是……”，你可能会得到一个更富有创造性的答案，例如“苹果是诱惑和知识的象征”。Top-P是控制ChatGPT响应中多样性和创造性的强大工具。调整此参数允许你根据特定需求定制ChatGPT。
- en: 6.1.3.   Understanding the Difference
  id: totrans-849
  prefs: []
  type: TYPE_NORMAL
  zh: 6.1.3. 理解差异
- en: Distinguishing between Top-K and Top-P can be challenging, so simplify it with
    an analogy. Imagine you have a toy that can say many words but only want to hear
    the most exciting ones.
  id: totrans-850
  prefs: []
  type: TYPE_NORMAL
  zh: 区分 Top-K 和 Top-P 可能具有挑战性，所以用类比来简化它。想象你有一个玩具能说出很多话，但你只想听到最激动人心的那些。
- en: You can think of Top-K as telling the toy, "Show me only the three most interesting
    words." The toy then selects and displays those three words, ignoring all others.
  id: totrans-851
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以将 Top-K 想象成对玩具说，“只给我展示三个最有趣的话。”玩具随后会选出并展示这三个词，忽略所有其他词。
- en: On the other hand, Top-P is like saying to the toy, "Show me interesting words,
    but only if they have enough probability." In this case, the toy will reveal words
    one by one, and it will stop when the cumulative probability of the words it has
    shown adds up to a specific amount you decide.
  id: totrans-852
  prefs: []
  type: TYPE_NORMAL
  zh: 另一方面，Top-P 就像是告诉玩具，“只给我展示有趣的话，但前提是它们有足够的概率。”在这种情况下，玩具会逐个展示单词，并且当它所展示的单词的累积概率累计到你决定的具体数值时，它会停止。
- en: In summary, Top-K and Top-P are two different techniques used to control the
    diversity and consistency of responses generated by ChatGPT. Top-K limits the
    number of words the model can consider, while Top-P restricts the words based
    on their cumulative probability. Both parameters allow you to customize text generation
    in ChatGPT to suit your needs better
  id: totrans-853
  prefs: []
  type: TYPE_NORMAL
  zh: 总结来说，Top-K 和 Top-P 是两种不同的技术，用于控制 ChatGPT 生成的响应的多样性和一致性。Top-K 限制了模型可以考虑的单词数量，而
    Top-P 则基于单词的累积概率进行限制。这两个参数都允许你根据需要更好地定制 ChatGPT 中的文本生成。
- en: 6.2\. Advanced prompts engineering
  id: totrans-854
  prefs: []
  type: TYPE_NORMAL
  zh: 6.2\. 高级提示工程
- en: So far, we have explored the basics of using ChatGPT. In this chapter, we will
    explore advanced techniques for using this tool. We will look at advanced prompt
    engineering techniques and sample prompts that will allow you to get the most
    out of ChatGPT.
  id: totrans-855
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，我们已经探讨了使用 ChatGPT 的基础知识。在本章中，我们将探讨使用此工具的高级技术。我们将探讨高级提示工程技术和示例提示，这将使你能够最大限度地发挥
    ChatGPT 的作用。
- en: Prompt engineering has been shown to help to effectively design and improve
    prompts for better results in different tasks with LLMs (Brown et al., 2020).
    For this reason, we will now look at ten Prompting  techniques that you may find
    helpful. Although it is unnecessary to put all of them into practice, they will
    help you better understand how LLMs work.
  id: totrans-856
  prefs: []
  type: TYPE_NORMAL
  zh: 提示工程已被证明有助于有效地设计和改进提示，以在 LLMs（Brown 等人，2020 年）的不同任务中取得更好的结果。因此，我们现在将探讨十种可能对你有帮助的提示技术。尽管没有必要将它们全部付诸实践，但它们将帮助你更好地理解
    LLMs 的工作原理。
- en: 6.2.1.     Zero-shot  Prompting
  id: totrans-857
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 6.2.1.     零样本提示
- en: Today, LLM models, such as GPT-3.5 Turbo, GPT-4, and Claude 3, are tuned to
    follow instructions and are trained with large amounts of data. Large-scale training
    makes these models capable of performing some tasks in a "zero-shot" manner. Zero-shot  Prompting  means
    that the prompt used to interact with the model will not contain examples or demonstrations.
    The zero-shot  prompt directly instructs the model to perform a task without additional
    examples to guide it.
  id: totrans-858
  prefs: []
  type: TYPE_NORMAL
  zh: 今天，LLM 模型，如 GPT-3.5 Turbo、GPT-4 和 Claude 3，被调整以遵循指令，并使用大量数据进行训练。大规模训练使这些模型能够在某些任务中以“零样本”的方式执行。零样本提示意味着用于与模型交互的提示将不包含示例或演示。零样本提示直接指示模型执行任务，而无需额外的示例来引导它。
- en: 'The following is an example of a zero-shot  instruction:'
  id: totrans-859
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是一个零样本指令的示例：
- en: 'Prompt - Classify the text as neutral, negative or positive. Text: I think
    the vacations are fine. Sentiment:'
  id: totrans-860
  prefs: []
  type: TYPE_NORMAL
  zh: 提示 - 将文本分类为中性、负面或正面。文本：我认为假期很好。情感：
- en: ChatGPT - Neutral
  id: totrans-861
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT - 中立
- en: In the above prompt, we did not provide the model with any text examples along
    with their classifications; the LLM already understands "sentiment." Those are
    the zero-shot  capabilities. When zero-shot  does not work, providing demonstrations
    or examples in the prompt is recommended, which leads to Prompting  few-shot.
  id: totrans-862
  prefs: []
  type: TYPE_NORMAL
  zh: 在上述提示中，我们没有向模型提供任何文本示例及其分类；LLM 已经理解了“情感”。这些都是零样本能力。当零样本不起作用时，建议在提示中提供演示或示例，这会导致提示少样本。
- en: 6.2.2.     Few-shot  Prompting
  id: totrans-863
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 6.2.2.     少样本提示
- en: Although large-scale language models demonstrate remarkable capabilities in
    zero-shot  tasks, they still present limitations in more complex tasks when using
    this configuration. We use “few-shot Prompting,” a technique that provides demonstrations
    at the prompt to guide the model towards better performance. The demonstrations
    serve as conditioning for later examples where we want the model to generate a
    response.
  id: totrans-864
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管大规模语言模型在零样本任务中表现出惊人的能力，但在使用此配置进行更复杂的任务时，它们仍然存在局限性。我们使用“少量样本提示”，这是一种在提示中提供演示以引导模型获得更好性能的技术。这些演示作为后续示例的条件，在这些示例中，我们希望模型生成一个响应。
- en: 'Prompt - A whatpu is a small furry animal native to Tanzania. An example of
    a sentence using the word whatpu is: We were traveling in Africa and saw these
    very cute whatpus. "To ''farduddle''" means to jump up and down quickly. An example
    of a sentence using the word farduddle is:'
  id: totrans-865
  prefs: []
  type: TYPE_NORMAL
  zh: 提示 - whatpu是一种原产于坦桑尼亚的小型毛茸茸的动物。使用whatpu这个词的句子示例：我们在非洲旅行时看到了这些非常可爱的小whatpus。“To
    'farduddle'”意味着快速地跳上跳下。使用farduddle这个词的句子示例：
- en: ChatGPT - When we won the game, we all started to farduddle in celebration.
  id: totrans-866
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT - 当我们赢得比赛时，我们都开始高兴地farduddle。
- en: According to Touvron et al. 2023[[1]](part0016.xhtml#a1W0), few-shot  properties
    first appeared when models were scaled to a sufficient size Kaplan et al., 2020[[2]](part0016.xhtml#a1W1)
    . Let us demonstrate few-shot  prompting  with an example presented by Brown et
    al. (2020)[[3]](part0016.xhtml#a1W2) . In this example, the task is to use a new
    word in a sentence correctly.
  id: totrans-867
  prefs: []
  type: TYPE_NORMAL
  zh: 根据Touvron等人（2023）[1]的研究，少量样本属性首次出现在模型扩展到足够大时（Kaplan等人，2020）[2]。让我们通过Brown等人（2020）[3]提供的示例来演示少量样本提示。在这个例子中，任务是正确地在句子中使用一个新词。
- en: We can observe that the model has somehow learned how to perform the task by
    providing only one example (i.e., 1-shot). For more complex tasks, we can experiment
    by increasing the number of demonstrations (e.g., 3-shot, 5-shot, 10-shot, etc.).
  id: totrans-868
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以观察到，通过仅提供一个示例（即1-shot），模型已经学会了如何执行这项任务。对于更复杂的任务，我们可以通过增加演示的数量进行实验（例如，3-shot，5-shot，10-shot等）。
- en: 'Following the findings of Min et al. (2022)[[4]](part0016.xhtml#a1VU) here
    are some additional tips on demonstrations/examples when doing few-shot:'
  id: totrans-869
  prefs: []
  type: TYPE_NORMAL
  zh: 在Min等人（2022）[4]的研究发现基础上，以下是一些在少量样本中进行演示/示例时的额外提示：
- en: The label spacing and layout of the input text specified by the demos are critical
    (regardless of whether the labels are correct for the individual entries).
  id: totrans-870
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 由演示指定的输入文本的标签间距和布局至关重要（无论标签是否对单个条目正确）。
- en: The formatting you use also plays a crucial role in performance; even if you
    only use random tags, this is much better than not using tags.
  id: totrans-871
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 您使用的格式在性能中也起着至关重要的作用；即使您只使用随机标签，这也比不使用标签要好得多。
- en: Additional results show that selecting random labels from a valid distribution
    of labels (rather than a uniform distribution) also helps.
  id: totrans-872
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 其他结果显示，从有效的标签分布中选择随机标签（而不是均匀分布）也有帮助。
- en: 'Let''s try some examples. First, let''s try an example with random labels (meaning
    that the negative and positive labels are randomly assigned to the entries):'
  id: totrans-873
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们尝试一些示例。首先，让我们尝试一个带有随机标签的示例（意味着负面和正面标签被随机分配到条目中）：
- en: Prompt - This is unbelievable! // Negative
  id: totrans-874
  prefs: []
  type: TYPE_NORMAL
  zh: 提示 - 这太难以置信了！ // 负面
- en: This is bad! // Positive
  id: totrans-875
  prefs: []
  type: TYPE_NORMAL
  zh: 这太糟糕了！ // 正面
- en: Wow, that movie was great! // Positive
  id: totrans-876
  prefs: []
  type: TYPE_NORMAL
  zh: 哇，那部电影太棒了！ // 正面
- en: What a horrible sight! //
  id: totrans-877
  prefs: []
  type: TYPE_NORMAL
  zh: 多么可怕的场景！ //
- en: ChatGPT - Negative
  id: totrans-878
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT - 负面
- en: 'Even though the labels have been randomized, we still get the correct answer.
    Note that we also kept the formatting, which also helps. In fact, with more experimentation,
    the newer GPT models we are experimenting with are becoming more robust, even
    in randomized formats. Let''s look at the following example:'
  id: totrans-879
  prefs: []
  type: TYPE_NORMAL
  zh: 即使标签已经被随机化，我们仍然得到了正确答案。请注意，我们也保留了格式，这也有助于。实际上，随着更多实验的进行，我们正在实验的新GPT模型在随机格式下变得更加稳健。让我们看看以下示例：
- en: There is no consistency in the above format, but the model still predicted the
    correct label. In general, it seems that providing examples helps solve some tasks.
    When zero-shot  Prompting  and few-shot  Prompting  are insufficient, it could
    mean that what the model has learned is insufficient to perform the task well.
  id: totrans-880
  prefs: []
  type: TYPE_NORMAL
  zh: 上述格式没有一致性，但模型仍然预测了正确的标签。总的来说，似乎提供示例有助于解决一些任务。当零样本提示和少量样本提示不足时，这可能意味着模型学习到的知识不足以很好地完成这项任务。
- en: When faced with more complex reasoning tasks, it may help to break down the
    problem into steps and demonstrate the process to the model. This is known as
    Chain-of-Thought Prompting, a technique that has gained a lot of popularity. In
    fact, it inspired the OpenAI o1 model.
  id: totrans-881
  prefs: []
  type: TYPE_NORMAL
  zh: 面对更复杂的推理任务时，将问题分解为步骤并向模型展示过程可能会有所帮助。这被称为思维链提示，这是一种受到广泛欢迎的技术。事实上，它启发了OpenAI o1模型。
- en: 6.2.3.     Chain-of-thought (CoT) Prompting
  id: totrans-882
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 6.2.3.     思维链（CoT）提示
- en: '![COT](image_rsrc3R6.jpg)'
  id: totrans-883
  prefs: []
  type: TYPE_IMG
  zh: '![COT](image_rsrc3R6.jpg)'
- en: 'Figure 7\. Image Source: Wei et al. (2022)'
  id: totrans-884
  prefs: []
  type: TYPE_NORMAL
  zh: 图7\. 图片来源：Wei等人（2022年）
- en: Introduced in Wei et al. (2022)[[5]](part0016.xhtml#a1X6) , Chain-of-thought  (CoT)
    Prompting  enables complex reasoning abilities through intermediate reasoning
    steps. You can combine it with few-shot  Prompting  to get better results on more
    complex tasks that require reasoning before responding.
  id: totrans-885
  prefs: []
  type: TYPE_NORMAL
  zh: 在Wei等人（2022年）[[5]](part0016.xhtml#a1X6) 中引入的Chain-of-thought（CoT）提示通过中间推理步骤使复杂的推理能力成为可能。您可以将它与少量提示结合使用，以在需要推理才能响应的更复杂任务上获得更好的结果。
- en: When we provide the reasoning step, we can see a perfect result. The authors
    claim this is an emergent ability that arises with large language models.
  id: totrans-886
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们提供推理步骤时，我们可以看到完美的结果。作者声称这是随着大型语言模型的出现而出现的一种新兴能力。
- en: 6.2.4.     Automatic Chain-of-thought (Auto-CoT)
  id: totrans-887
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 6.2.4.     自动思维链（Auto-CoT）
- en: 'The process involves manually creating compelling and diverse examples when
    applying chain-of-thought Prompting with demonstrations. This manual effort could
    lead to suboptimal solutions. Zhang et al. (2022)[[6]](part0016.xhtml#a1WZ) proposes
    an approach to eliminate manual efforts by leveraging LLMs with "Let''s think
    step by step" prompting to generate chains of reasoning for demonstrations one
    by one. This automatic process can still end up with errors in the generated strings.
    To mitigate the effects of mistakes, the diversity of demonstrations is essential.
    This paper proposes Auto-CoT, which selects diverse questions and generates reasoning
    chains to build the demonstrations. Auto-CoT consists of two main stages:'
  id: totrans-888
  prefs: []
  type: TYPE_NORMAL
  zh: 该过程涉及在应用思维链提示时手动创建引人入胜且多样化的示例。这种手动努力可能导致次优解。张等人（2022年）[[6]](part0016.xhtml#a1WZ)
    提出了一种利用具有“让我们一步步思考”提示的大型语言模型来为演示逐个生成推理链的方法，以消除手动努力。这个自动过程仍然可能在生成的字符串中产生错误。为了减轻错误的影响，演示的多样性至关重要。本文提出了Auto-CoT，它选择多样化的问题并生成推理链来构建演示。Auto-CoT包括两个主要阶段：
- en: 'Question grouping: Partitions the questions of a given data set into a few
    groups.'
  id: totrans-889
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 问题分组：将给定数据集的问题划分为几个组。
- en: 'Demonstration sampling: Select a representative question from each group and
    generate its chain of reasoning using zero-shot-CoT with simple heuristics.'
  id: totrans-890
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 演示采样：从每个组中选择一个代表性问题，并使用零样本-CoT和简单启发式方法生成其推理链。
- en: 'Simple heuristics could be the length of the questions (e.g., 60 tokens) and
    the number of steps in reasoning (e.g., five steps of reasoning). This encourages
    the model to use simple and accurate demonstrations. The process is illustrated
    below: ![AUTOCOT](image_rsrc3R7.jpg)'
  id: totrans-891
  prefs: []
  type: TYPE_NORMAL
  zh: 简单的启发式方法可以是问题的长度（例如，60个标记）和推理步骤的数量（例如，五步推理）。这鼓励模型使用简单且准确的演示。过程如下所示：![AUTOCOT](image_rsrc3R7.jpg)
- en: 'Figure 8\. Self-CoT reasoning process. Source: Zhang et al. (2022)'
  id: totrans-892
  prefs: []
  type: TYPE_NORMAL
  zh: 图8\. Self-CoT推理过程。来源：张等人（2022年）
- en: 6.2.5.     Prompt chaining
  id: totrans-893
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 6.2.5.     提示链
- en: One crucial technique in prompt engineering is to decompose tasks into subtasks
    to improve the reliability and performance of LLMs. Once those subtasks have been
    identified, one is presented to the LLM, and its response is used as input to
    another prompt. This is known as prompt chaining, where a task is broken down
    into subtasks to create a chain of prompt operations.
  id: totrans-894
  prefs: []
  type: TYPE_NORMAL
  zh: 提示工程中的一个关键技术是将任务分解为子任务以提高大型语言模型的可靠性和性能。一旦确定了这些子任务，就将其中一个呈现给大型语言模型，并将其响应用作另一个提示的输入。这被称为提示链，其中任务被分解为子任务以创建一系列提示操作。
- en: Prompt chaining helps perform complex tasks that an LLM might have difficulty
    addressing if presented with a detailed prompt. In prompt chaining, the chained
    prompts perform additional processing on the generated responses before arriving
    at a desired end state.
  id: totrans-895
  prefs: []
  type: TYPE_NORMAL
  zh: 提示链有助于执行大型语言模型可能难以应对的复杂任务。在提示链中，链式提示在达到期望的最终状态之前对生成的响应进行额外的处理。
- en: In addition to achieving better performance, prompt chaining helps increase
    the LLM's transparency, controllability, and reliability. This means you can easily
    debug problems with model responses and analyze and improve performance at different
    stages that need improvement.
  id: totrans-896
  prefs: []
  type: TYPE_NORMAL
  zh: 除了实现更好的性能外，提示链还帮助提高LLM的透明度、可控性和可靠性。这意味着您可以轻松调试模型响应中的问题，并在需要改进的不同阶段分析和改进性能。
- en: Prompt chaining can be used in different scenarios involving various operations
    or transformations. For example, a typical use case for LLMs involves answering
    questions about a long document. It is helpful if you design two different prompts,
    where the first prompt is responsible for extracting relevant quotes to answer
    a question, and the second prompt takes the quotes and the original document as
    input to answer the given question. In other words, you will create two prompts
    to answer a given question in a document.
  id: totrans-897
  prefs: []
  type: TYPE_NORMAL
  zh: 提示链可以在涉及各种操作或转换的不同场景中使用。例如，LLM的一个典型用例是回答关于长文档的问题。如果您设计两个不同的提示，其中第一个提示负责提取回答问题的相关引文，第二个提示则将引文和原始文档作为输入来回答给定的问题，这将很有帮助。换句话说，您将创建两个提示来回答文档中的给定问题。
- en: The first prompt below extracts the relevant quotes from the document given
    the question. Note that, for simplicity, we have added a placeholder for the document
    {{document}}. You can copy and paste an article from any website to test the prompt.
    In this case, it has been done on a prompts engineering page. Because of the larger
    context used for this task, we are using the OpenAI GPT-4o model. You can use
    the prompt with other LLMs like Claude.
  id: totrans-898
  prefs: []
  type: TYPE_NORMAL
  zh: 以下提示从提供的文档中提取相关引文。为了简化，我们为文档添加了一个占位符 {{document}}。您可以从任何网站上复制并粘贴一篇文章来测试这个提示。在这种情况下，它是在提示工程页面上完成的。由于这个任务使用了更大的上下文，我们使用了OpenAI
    GPT-4o模型。您可以使用这个提示与其他LLM（如Claude）一起使用。
- en: Prompt - You are a helpful assistant. Your task is to help answer a given question
    in a paper. The first step is to extract quotes relevant to the question from
    the document. Please display the list of quotes using <quotes></quotes>. Respond
    with "No relevant quotes found!" if no relevant quotes were found.
  id: totrans-899
  prefs: []
  type: TYPE_NORMAL
  zh: 提示 - 你是一个有用的助手。你的任务是帮助回答论文中的一个问题。第一步是从文档中提取与问题相关的引文。请使用<quotes></quotes>显示引文列表。如果没有找到相关引文，请回复“未找到相关引文！”
- en: '{{document}}'
  id: totrans-900
  prefs: []
  type: TYPE_NORMAL
  zh: '{{document}}'
- en: ChatGPT
  id: totrans-901
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT
- en: <quotes>
  id: totrans-902
  prefs: []
  type: TYPE_NORMAL
  zh: <quotes>
- en: '- Chain-of-thought (CoT) prompting[27].'
  id: totrans-903
  prefs: []
  type: TYPE_NORMAL
  zh: '- 思维链（CoT）提示[27]。'
