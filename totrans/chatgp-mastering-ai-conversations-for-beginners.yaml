  zh: 你在简历上列出的技能清单中是否有“优秀沟通者”或类似的内容？如果你有，那么是时候将其运用到你的聊天机器人中的提示输入中了！作为一个在需要向他人解释事物的职业中工作的人，比如教师，要让普通人理解并遵循指令并不容易。或者，给出指令，让人们以正确的方式理解并轻松实施，这几乎是一门艺术与科学的结合。项目经理和教师，例如，必须持续思考：“我如何才能最好地表达我的指令，以获得我想要的结果？”如果你从事这些职业之一，或者类似的职业，那么你在以这种方式沟通你的提示给ChatGPT时已经做得相当好了，通过一点尝试和错误，你将能够得到你需要的成果。
