  zh: '**自动化**现象正在以前所未有的速度发生，在许多行业中制造了一种不安全感。然而，认识到人工智能的影响并非线性或统一的过程是至关重要的：虽然某些行业受到自动化的更大威胁，但其他行业正经历着由于人工智能的集成而带来的工作机会的扩张。'
