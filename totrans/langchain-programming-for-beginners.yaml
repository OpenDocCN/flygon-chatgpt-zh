  id: totrans-1605
  prefs: []
  type: TYPE_NORMAL
  zh: 这是 requirements.txt 文件的内容：
- en: langchain == 0.2.1
  id: totrans-1606
  prefs: []
  type: TYPE_NORMAL
  zh: langchain == 0.2.1
