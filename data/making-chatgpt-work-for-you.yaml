    annotated part of the page can actually do:'
  id: totrans-234
  prefs: []
  type: TYPE_NORMAL
  zh: 使用ChatGPT的聊天窗口——编号指南 让我们看看页面上的每个标注部分实际上能做什么：
- en: '1.'
  id: totrans-235
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '1.'
- en: This shows the model of ChatGPT you’re currently using. For users that haven’t
    upgraded to ChatGPT Plus, you cannot switch between ChatGPT models, and behind
    the scenes, the default is ChatGPT 4o mini. Upgrading, however, allows you to
    switch between ChatGPT 4o mini and all of the other models, such as 4o canvas,
