- en: 'Pg 1: Welcome to Your AI Journey'
  id: totrans-20
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第1页：欢迎来到您的AI之旅
- en: Welcome to Mastering AI for Beginners ! You’ve just taken your first powerful
    step into the future. This workbook is designed to help you, whether you're a
    curious teenager or a motivated adult, explore how Artificial Intelligence (AI)
    is shaping the world—and how you can become a part of it.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 欢迎加入人工智能入门精通！您已经迈出了通往未来的第一步。这本工作手册旨在帮助您，无论您是好奇的青少年还是有动力的成年人，探索人工智能（AI）如何塑造世界——以及您如何成为其中的一部分。
- en: Artificial Intelligence is no longer science fiction. It's real, it's evolving
    fast, and it's becoming a vital part of our daily lives. Whether you're using
    Google Maps, chatting with Siri or Alexa, watching YouTube recommendations, or
    scrolling on Instagram—AI is working behind the scenes. This book will show you
    how to understand those systems and start using them creatively.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能不再是科幻小说。它是真实的，它正在快速发展，并且正在成为我们日常生活的重要组成部分。无论您是在使用谷歌地图、与Siri或Alexa聊天、观看YouTube推荐视频，还是在Instagram上滚动浏览——AI都在幕后工作。这本书将向您展示如何理解这些系统并开始创造性地使用它们。
- en: 'Inside this book, you''ll find:'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 在这本书中，您将找到：
- en: Simple lessons explaining what AI is and how it works.
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 简单的课程解释AI是什么以及它是如何工作的。
- en: Interactive activities to test your understanding and spark curiosity.
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 互动活动，以测试您的理解并激发好奇心。
- en: Practical tools like ChatGPT and Canva AI that you can use immediately.
  id: totrans-26
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 您可以立即使用的实用工具，如ChatGPT和Canva AI。
- en: Challenges and project ideas to help you build your skills.
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 挑战和项目想法，以帮助您提升技能。
- en: Reflection prompts so you can track your growth and insights.
  id: totrans-28
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 反思提示，以便您可以跟踪您的成长和洞察。
- en: You don’t need any coding knowledge, fancy computer, or technical degree. You
    just need curiosity, an open mind, and a willingness to try new things.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 您不需要任何编码知识，昂贵的电脑或技术学位。您只需要好奇心，开放的心态，以及尝试新事物的意愿。
- en: Ready to explore the future? Let’s begin!
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 准备探索未来？让我们开始吧！
- en: '![](Image00000.jpg)'
  id: totrans-31
  prefs: []
  type: TYPE_IMG
  zh: '![](Image00000.jpg)'
- en: 'Pg 2: What is Artificial Intelligence (AI)?'
  id: totrans-32
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第2页：什么是人工智能（AI）？
- en: Artificial Intelligence, or AI, refers to the ability of machines or computer
    systems to perform tasks that would normally require human intelligence. These
    tasks include understanding language, recognizing images, making decisions, and
    even being creative.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能，或AI，指的是机器或计算机系统执行通常需要人类智能的任务的能力。这些任务包括理解语言、识别图像、做出决策，甚至具有创造力。
- en: 'Think of AI as giving your computer or phone a "brain" that lets it:'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 将AI视为给您的电脑或手机一个“大脑”，让它能够：
- en: Learn from data
  id: totrans-35
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 从数据中学习
- en: Make smart decisions
  id: totrans-36
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 做出明智的决定
- en: Help you with everyday tasks
  id: totrans-37
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 帮助您完成日常任务
- en: 'Examples of AI in Real Life:'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能在现实生活中的例子：
- en: Google Search understands what you're trying to ask.
  id: totrans-39
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Google搜索理解你试图提出的问题。
- en: Netflix & YouTube recommend what to watch next.
  id: totrans-40
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Netflix和YouTube推荐下一个要观看的内容。
- en: Instagram filters detect faces and apply effects.
  id: totrans-41
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Instagram滤镜检测面孔并应用效果。
- en: Smart assistants like Alexa, Siri, and Google Assistant can answer questions,
    play music, or set reminders.
  id: totrans-42
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 智能助手如Alexa、Siri和Google Assistant可以回答问题，播放音乐，或设置提醒。
- en: AI Isn’t Magic — It’s Math + Data + Programming
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能不是魔法——它是数学+数据+编程
- en: At its core, AI uses data (huge amounts of it), statistics, and logic to figure
    out patterns and make predictions. For example, if you always watch cartoons in
    the morning, YouTube's AI will suggest more cartoons at that time.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 在其核心，人工智能使用数据（大量的数据）、统计学和逻辑来找出模式并做出预测。例如，如果你总是在早上看卡通，YouTube的人工智能就会在那个时间推荐更多卡通。
- en: 'Pg 3: Types of AI – Simple to Smartest'
  id: totrans-45
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第3页：人工智能类型——从简单到最智能
- en: Narrow AI (Most Common Today)
  id: totrans-46
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 窄人工智能（目前最常见）
- en: This is AI that can do one task really well . It might help you write emails,
    recognize faces in photos, or suggest songs. But it can't think or feel like humans.
  id: totrans-47
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 这是一种能够非常出色地完成一项任务的人工智能。它可能帮助你写电子邮件，识别照片中的面孔，或推荐歌曲。但它不能像人类一样思考和感受。
- en: 'Examples: ChatGPT, Google Translate, Siri, Alexa.'
  id: totrans-48
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 示例：ChatGPT、Google Translate、Siri、Alexa。
- en: General AI (Still in Development)
  id: totrans-49
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 通用人工智能（仍在开发中）
- en: This would be an AI that thinks, learns, and reasons like a human being. It
    could apply knowledge across many subjects. Right now, we don’t have it — but
    scientists are working toward it.
  id: totrans-50
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 这将是一种能够像人类一样思考、学习和推理的人工智能。它可以在许多学科中应用知识。目前我们还没有这种人工智能——但科学家们正在朝着这个方向努力。
- en: Superintelligent AI (Future Possibility)
  id: totrans-51
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 超级智能人工智能（未来可能性）
- en: An AI smarter than any human in every field — from art to science. This is still
    theory and brings up a lot of questions about ethics and safety.
  id: totrans-52
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 在每个领域——从艺术到科学——都比任何人类都聪明的人工智能。这仍然是一种理论，并引发了许多关于伦理和安全的问题。
- en: Generative AI (Very Popular Today)
  id: totrans-53
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 生成式人工智能（非常受欢迎）
- en: 'This kind of AI creates things: text, images, music, code.'
  id: totrans-54
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 这种人工智能可以创造事物：文本、图像、音乐、代码。
- en: 'Examples:'
  id: totrans-55
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 示例：
- en: ChatGPT writes essays, poems, even jokes.
  id: totrans-56
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: ChatGPT可以写文章、诗歌，甚至笑话。
- en: DALL·E and MidJourney create AI art.
  id: totrans-57
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: DALL·E和MidJourney创建人工智能艺术。
- en: Synthesia makes AI videos.
  id: totrans-58
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Synthesia制作人工智能视频。
- en: 'KEY POINT: You''re already using AI — you just didn’t realize it.'
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 关键点：你已经在使用人工智能了——只是你没有意识到。
- en: 'Pg 4: How Does AI Actually Work?'
  id: totrans-60
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第4页：人工智能实际上是如何工作的？
- en: 'Artificial Intelligence may seem like magic, but it’s really a combination
    of data , algorithms , and feedback loops . Let’s break it down:'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能可能看起来像魔法，但实际上它是数据、算法和反馈循环的结合。让我们来分解一下：
- en: 1\. Data is the Fuel
  id: totrans-62
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1. 数据是燃料
- en: AI learns from examples. These examples come from data — like thousands of pictures
    of cats, or millions of conversations on the internet. The more data AI has, the
    smarter it can become.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能从例子中学习。这些例子来自数据——比如成千上万张猫的图片，或者数百万次互联网上的对话。人工智能拥有的数据越多，它就越聪明。
- en: 'Example: If we feed an AI 1,000 images of dogs and 1,000 images of cats, it
    can learn the difference between the two by analyzing patterns — shapes, colors,
    ears, noses, tails.'
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：如果我们给人工智能提供1,000张狗的图片和1,000张猫的图片，它可以通过分析模式——形状、颜色、耳朵、鼻子、尾巴——来学习两者之间的区别。
- en: 2\. Algorithms are the Brains
  id: totrans-65
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2. 算法是大脑
- en: An algorithm is a step-by-step formula or rule set the AI uses to make decisions.
    Think of it like a recipe. The AI uses algorithms to figure out what the data
    means.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 算法是人工智能用来做出决策的逐步公式或规则集。把它想象成一个食谱。人工智能使用算法来弄清楚数据的意义。
- en: 'Example: If you''re using ChatGPT, the algorithm decides what word comes next
    in your sentence by predicting the most likely word based on what you’ve already
    typed.'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：如果你在使用ChatGPT，算法会根据你已输入的内容预测下一个单词，从而决定你的句子中下一个单词是什么。
- en: 3\. Training and Learning
  id: totrans-68
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3. 训练和学习
- en: 'AI needs to be trained, just like humans. It gets feedback: correct or incorrect.
    Over time, it becomes better by adjusting itself using machine learning.'
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能需要训练，就像人类一样。它会得到反馈：正确或错误。随着时间的推移，它通过机器学习调整自己，变得越来越好。
- en: 'There are two types of learning:'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 有两种学习类型：
- en: 'Supervised learning: We give the AI the answers (correct labels) as it trains.'
  id: totrans-71
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 监督学习：我们在训练过程中给人工智能答案（正确的标签）。
- en: 'Unsupervised learning: The AI finds patterns on its own, without us telling
    it what’s correct.'
  id: totrans-72
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 无监督学习：人工智能自己找到模式，而不需要我们告诉它什么是正确的。
- en: '4\. Neural Networks: How AI Mimics the Brain'
  id: totrans-73
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4. 神经网络：人工智能如何模拟大脑
- en: Some advanced AI models use artificial neural networks — a system inspired by
    the human brain. These help AI process images, speech, and natural language (like
    how ChatGPT understands what you write).
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 一些高级AI模型使用人工神经网络——一个受人类大脑启发的系统。这些帮助AI处理图像、语音和自然语言（就像ChatGPT理解你写的内容）。
- en: 'Reflection Prompt:'
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 反思提示：
- en: 'Imagine you’re training your own AI assistant. What kind of data would you
    feed it to help it become smart at your favorite topic? (Example: cooking recipes,
    football stats, fashion tips)'
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 想象你正在训练自己的AI助手。你将给它什么样的数据，以帮助它在你的最爱主题上变得聪明？（例如：烹饪食谱、足球统计数据、时尚建议）
- en: '![](Image00000.jpg)'
  id: totrans-77
  prefs: []
  type: TYPE_IMG
  zh: '![Image00000.jpg]'
- en: 'Pg 5: Meet ChatGPT – Your AI Assistant'
  id: totrans-78
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第5页：认识ChatGPT——你的AI助手
- en: One of the most powerful tools available to beginners is ChatGPT , developed
    by OpenAI. It’s a language model trained to understand and respond like a human
    — in conversations, writing, and creative tasks.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 对于初学者来说，最强大的工具之一是OpenAI开发的ChatGPT，它是一个经过训练以理解和像人类一样回应的语言模型——在对话、写作和创意任务中。
- en: What Can ChatGPT Do?
  id: totrans-80
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: ChatGPT能做什么？
- en: Answer questions on any topic
  id: totrans-81
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在任何主题上回答问题
- en: Write essays, poems, stories, blogs, captions
  id: totrans-82
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 写文章、诗歌、故事、博客、字幕
- en: Translate languages
  id: totrans-83
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 翻译语言
- en: Explain complex topics like math, science, or history
  id: totrans-84
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 解释像数学、科学或历史这样的复杂主题
- en: Help with resumes , cover letters, job applications
  id: totrans-85
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 帮助写简历、求职信、工作申请
- en: Brainstorm ideas for projects, videos, social posts
  id: totrans-86
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 发想项目、视频、社交媒体帖子的想法
- en: Generate code or solve programming problems
  id: totrans-87
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 生成代码或解决编程问题
- en: How to Access ChatGPT
  id: totrans-88
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 如何访问ChatGPT
- en: Go to [chat.openai.com](https://chat.openai.com)
  id: totrans-89
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 前往 [chat.openai.com](https://chat.openai.com)
- en: Create a free account using your email
  id: totrans-90
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用您的电子邮件创建一个免费账户
- en: Start chatting just like you would with a friend
  id: totrans-91
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 就像和朋友聊天一样开始聊天
- en: You can use it on mobile or desktop. The free version is great, and there's
    also a paid Pro version with more features and faster responses.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以在手机或电脑上使用它。免费版本很棒，还有更多功能和更快响应的付费Pro版本。
- en: 'Quick Tip: Always double-check AI-generated content, especially for facts or
    sensitive topics. ChatGPT is powerful, but not perfect.'
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 快速提示：始终仔细检查AI生成的内容，特别是对于事实或敏感话题。ChatGPT很强大，但并不完美。
- en: '![](Image00000.jpg)'
  id: totrans-94
  prefs: []
  type: TYPE_IMG
  zh: '![Image00000.jpg]'
- en: 'Pg 6: Getting Started with Prompt Writing'
  id: totrans-95
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第6页：开始提示写作
- en: What is a “Prompt”?
  id: totrans-96
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 什么是“提示”？
- en: A prompt is the message or question you type into ChatGPT. The better your prompt,
    the better the response.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 提示是您在ChatGPT中输入的消息或问题。您的提示越好，响应就越好。
- en: 'Example 1 – Weak Prompt:'
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 示例1 – 弱提示：
- en: “Tell me about dogs.”
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: “告诉我关于狗的事情。”
- en: (Response might be too general)
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: （响应可能过于笼统）
- en: 'Example 2 – Strong Prompt:'
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 示例2 – 强提示：
- en: “List 5 unique dog breeds that are good for apartment living, and explain why
    each is a good choice.”
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: “列出5种适合公寓居住的独特犬种，并解释为什么每个都是好选择。”
- en: (More detailed, useful answer)
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: （更详细、有用的答案）
- en: 'Prompt Writing Formula:'
  id: totrans-104
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 提示写作公式：
- en: 'Here’s a simple structure you can use:'
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一个你可以使用的简单结构：
- en: 'Role: Ask ChatGPT to take a role. (e.g., “Act as a travel guide.”)'
  id: totrans-106
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 角色：要求ChatGPT扮演一个角色。（例如：“扮演一个旅行指南。”）
- en: 'Task: Say what you want. (e.g., “Plan a 3-day trip to Japan.”)'
  id: totrans-107
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 任务：说出你的想法。（例如：“计划一个3天的日本之旅。”）
- en: 'Tone: Add a mood or style. (e.g., “Use a friendly, casual tone.”)'
  id: totrans-108
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 语气：添加情绪或风格。（例如：“使用友好、随意的语气。”）
- en: 'Formula:'
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 公式：
- en: “Act as [role] and [do this task] in a [tone] style.”
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: “扮演[角色]并在[语气]风格中完成[任务]。”
- en: 'Example Prompt:'
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 示例提示：
- en: “Act as a creative writing coach and help me come up with a short story idea
    for a sci-fi novel with a twist ending. Use an imaginative, exciting tone.”
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: “扮演一个创意写作教练，并帮我构思一个科幻小说的短篇故事想法，结局有转折。使用富有想象力和令人兴奋的语气。”
- en: 'Your Turn:'
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 你的机会：
- en: Write a prompt below using the formula above. Try out ChatGPT and paste the
    response in this space.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 使用上述公式在下面写一个提示。尝试ChatGPT并将响应粘贴在这个空间。
- en: 'Prompt: __________________________________________'
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：_________________________________________
- en: 'ChatGPT’s Answer: __________________________________________'
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT的答案：_________________________________________
- en: '![](Image00000.jpg)'
  id: totrans-117
  prefs: []
  type: TYPE_IMG
  zh: '![Image00000.jpg]'
- en: 'Pg 7: Mastering Advanced Prompts – Think Like a Creator'
  id: totrans-118
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第7页：掌握高级提示——像创作者一样思考
- en: Basic prompts give basic results. But when you master advanced prompt writing
    , ChatGPT becomes your creative partner, your tutor, your assistant—even your
    code editor.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 基本提示会给出基本的结果。但当你掌握了高级提示写作时，ChatGPT就成为了你的创意伙伴、你的导师、你的助手——甚至是你的代码编辑器。
- en: 'Here’s how to level up:'
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是如何提升水平的：
- en: '? ? Advanced Prompt Techniques'
  id: totrans-121
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '? ? 高级提示技巧'
- en: Give Context
  id: totrans-122
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供上下文
- en: Let ChatGPT know your situation or goal.
  id: totrans-123
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 让ChatGPT了解你的情况或目标。
- en: 'Example:'
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：
- en: “I’m a high school student preparing for a science fair project. Can you suggest
    AI-related ideas that are simple but impressive?”
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: “我是一名高中生，正在为科学展准备项目。你能建议一些简单但令人印象深刻的人工智能相关想法吗？”
- en: Add Constraints
  id: totrans-126
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 添加限制条件
- en: 'Tell it the limits: time, word count, tone, or level.'
  id: totrans-127
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 告诉它限制条件：时间、字数、语气或水平。
- en: 'Example:'
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：
- en: “Write a 200-word blog post for teenagers explaining how AI works, in a fun
    and relatable tone.”
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: “为青少年写一篇200字的博客文章，解释人工智能是如何工作的，以有趣和贴近的方式。”
- en: Use Step-by-Step Instructions
  id: totrans-130
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用逐步指令
- en: You can ask ChatGPT to respond in structured steps.
  id: totrans-131
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 您可以要求ChatGPT以结构化步骤进行回应。
- en: 'Example:'
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：
- en: '“Explain how AI image generators work in three simple steps: how they learn,
    how they process inputs, and how they create images.”'
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: “用三个简单的步骤解释AI图像生成器的工作原理：它们是如何学习的，它们是如何处理输入的，以及它们是如何创建图像的。”
- en: Refine Your Output
  id: totrans-134
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 精炼您的输出
- en: 'ChatGPT improves with feedback! If a response is too vague, say:'
  id: totrans-135
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: ChatGPT通过反馈不断改进！如果回应过于模糊，请说：
- en: “Make it more creative.”
  id: totrans-136
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “让它更有创意。”
- en: “Use simpler words.”
  id: totrans-137
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “使用更简单的词语。”
- en: “Add real-life examples.”
  id: totrans-138
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “添加真实生活中的例子。”
- en: 'Mini Challenge:'
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 小挑战：
- en: Think of something you’re interested in (fashion, sports, travel, food, coding).
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 想想您感兴趣的事情（时尚、运动、旅行、美食、编程）。
- en: Now write a 3-line advanced prompt for ChatGPT using context + instructions.
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 现在为ChatGPT编写一个包含上下文和指示的3行高级提示。
- en: '✍ Prompt: __________________________________________'
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: ✍ 提示：_________________________________________
- en: '? ? Response: __________________________________________'
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: '? ? 回应：_________________________________________'
- en: '![](Image00000.jpg)'
  id: totrans-144
  prefs: []
  type: TYPE_IMG
  zh: '![](Image00000.jpg)'
- en: 'Pg 8: Canva AI – Designing with Artificial Intelligence'
  id: totrans-145
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第8页：Canva AI – 使用人工智能进行设计
- en: Design used to take hours. Now, with Canva AI , anyone—especially students and
    beginners—can create stunning content in minutes, even without design skills.
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 设计过去需要数小时。现在，有了Canva AI，任何人——尤其是学生和初学者——都能在几分钟内创建令人惊叹的内容，即使没有设计技能。
- en: '? ? What is Canva AI?'
  id: totrans-147
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '? ? 什么是Canva AI？'
- en: Canva is a graphic design platform. Its AI tools help users auto-generate designs,
    images, copy, and layouts based on text input (your prompts).
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: Canva是一个图形设计平台。它的AI工具帮助用户根据文本输入（您的提示）自动生成设计、图像、文案和布局。
- en: '? ? Cool Tools Inside Canva AI'
  id: totrans-149
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '? ? Canva AI内部有哪些酷炫工具？'
- en: Magic Write – Just type your idea and it writes blog posts, bios, captions,
    or headlines.
  id: totrans-150
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 魔法写作 – 只需输入您的想法，它就会为您撰写博客文章、个人简介、配文或标题。
- en: Text to Image – Describe an image, and it creates AI-generated art instantly.
  id: totrans-151
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 文本转图像 – 描述一张图片，它就能立即创建AI生成的艺术作品。
- en: Magic Eraser & Edit – Click on unwanted parts in a photo and AI removes them
    cleanly.
  id: totrans-152
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 魔法橡皮擦与编辑 – 点击照片中不需要的部分，AI会干净地移除它们。
- en: Magic Presentation – Need a slide deck? Canva AI builds one automatically from
    your prompt.
  id: totrans-153
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 魔法演示文稿 – 需要幻灯片？Canva AI会根据您的提示自动构建。
- en: 'Example Prompt:'
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 示例提示：
- en: “Create a presentation about the history of Artificial Intelligence for high
    school students.”
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: “为高中生创建一个关于人工智能历史的演示文稿。”
- en: Try This!
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 尝试这个！
- en: Go to [www.canva.com](https://www.canva.com) , sign in, and click “Magic Design.”
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 前往[www.canva.com](https://www.canva.com)，登录并点击“魔法设计”。
- en: 'Then:'
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 然后：
- en: '? ? Prompt: “Make a poster for an AI club at school with a futuristic style.”'
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: '? ? 提示：“为学校的AI俱乐部制作一张具有未来风格的海报。”'
- en: '✅ Result: Insert your screenshot or notes here: ____________________________'
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: ✅ 结果：在此处插入您的截图或笔记：_____________________________
- en: 'Reflection Prompt:'
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 反思提示：
- en: How do you feel about AI helping with creativity? Does it feel like cheating,
    or is it a tool? Why?
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 您对AI帮助创意有何感受？它感觉像是作弊，还是一种工具？为什么？
- en: '![](Image00000.jpg)'
  id: totrans-163
  prefs: []
  type: TYPE_IMG
  zh: '![](Image00000.jpg)'
- en: 'Pg 9: Exploring DALL·E, MidJourney & AI Art Tools'
  id: totrans-164
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第9页：探索DALL·E、MidJourney和AI艺术工具
- en: AI is no longer just for reading or coding—it’s creating visual art that looks
    like it came from a professional artist or photographer. Tools like DALL·E, MidJourney,
    and Firefly are leading this visual revolution.
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: AI不再只是用于阅读或编码——它正在创建看起来像来自专业艺术家或摄影师的视觉艺术。像DALL·E、MidJourney和Firefly这样的工具正在引领这场视觉革命。
- en: '? ? What is DALL·E?'
  id: totrans-166
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '? ? 什么是DALL·E？'
- en: DALL·E is an image-generating AI by OpenAI (same company as ChatGPT). You type
    a detailed prompt, and it generates images from scratch using learned patterns.
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: DALL·E是OpenAI（与ChatGPT同一家公司）开发的一个图像生成AI。您输入一个详细的提示，它会从头开始使用学习到的模式生成图像。
- en: 'Prompt Example:'
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 提示示例：
- en: “An astronaut walking a cat on Mars, in a Disney cartoon style.”
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: “一位宇航员在火星上牵着一只猫，以迪士尼卡通风格。”
- en: You can try DALL·E directly through ChatGPT (if available in your region) or
    platforms like [openai.com/dall-e](https://openai.com/dall-e) .
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以直接通过ChatGPT（如果您的地区可用）或像[openai.com/dall-e](https://openai.com/dall-e)这样的平台尝试DALL·E。
- en: '? ? What is MidJourney?'
  id: totrans-171
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '? ? 什么是MidJourney？'
- en: MidJourney is another AI art tool, often accessed via Discord. It creates highly
    detailed, artistic, fantasy-style images.
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: MidJourney是另一个AI艺术工具，通常通过Discord访问。它创建高度详细、艺术风格、幻想风格的图像。
- en: 'Prompt Example:'
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 提示示例：
- en: “A futuristic city with glowing towers, flying cars, and cyberpunk characters
    at sunset.”
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: “在日落时分，一座发光的塔楼、飞行汽车和赛博朋克角色构成的未来城市。”
- en: ⚡ How to Write Image Prompts
  id: totrans-175
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: ⚡ 如何编写图像提示
- en: 'Use these ingredients:'
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 使用以下配料：
- en: 'Subject : “A lion”'
  id: totrans-177
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 主题： “狮子”
- en: 'Action : “wearing sunglasses”'
  id: totrans-178
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 行动： “戴着太阳镜”
- en: 'Setting : “on a beach”'
  id: totrans-179
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 环境： “在海滩上”
- en: 'Style : “in Pixar animation style”'
  id: totrans-180
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 风格： “皮克斯动画风格”
- en: 'Try creating your own:'
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: 尝试创建自己的：
- en: '? ? Subject: __________'
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: '? ? 主题： __________'
- en: '? ? Action: __________'
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: '? ? 行动： __________'
- en: '? ? Setting: __________'
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: '? ? 环境： __________'
- en: '? ? Style: __________'
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: '? ? 风格： __________'
- en: '✍ Final Prompt: ____________________________________'
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: ✍ 最终提示：__________________________________
- en: 'Mini Project Idea:'
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: 小项目想法：
- en: Create a character using DALL·E or MidJourney. Name them. Write a 3-line backstory.
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: 使用DALL·E或MidJourney创建一个角色。给他们起个名字。写一个3行的背景故事。
- en: '? ? Name: ______________'
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: '? ? 名称： ______________'
- en: '? ? Backstory: ____________________________________'
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: '? ? 背景：__________________________________'
- en: '![](Image00000.jpg)'
  id: totrans-191
  prefs: []
  type: TYPE_IMG
  zh: '![](Image00000.jpg)'
- en: 'Pg 10: Google Gemini – The Smartest AI from Google'
  id: totrans-192
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第10页：Google Gemini – 来自谷歌的最智能AI
- en: Google Gemini is Google’s latest and most powerful AI assistant, built to compete
    with ChatGPT. It understands natural language, answers questions, writes text,
    and helps with research, code, and more — all integrated with Google’s tools.
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: Google Gemini是谷歌最新的也是最强大的AI助手，旨在与ChatGPT竞争。它理解自然语言，回答问题，撰写文本，并帮助进行研究、编写代码等——所有这些都与谷歌的工具集成在一起。
- en: '? ? Why is Gemini Important?'
  id: totrans-194
  prefs:
