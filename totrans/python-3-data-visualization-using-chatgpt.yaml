  prefs: []
  type: TYPE_NORMAL
  zh: '*[http://www.python.org/download/](http://www.python.org/download/)*'
- en: 'In addition, PythonWin is available for Windows, and its home page is here:'
  id: totrans-432
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，PythonWin适用于Windows，其主页如下：
