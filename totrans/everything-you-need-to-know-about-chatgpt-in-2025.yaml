  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT 的影响远远超出了即时应用。它已经民主化了高级AI工具的访问，使得公司、学生、以及个人创作者都能够使用，这些工具之前仅限于世界上最先进的实验室。此外，它还激发了一波创新浪潮，开发者们创建了插件、集成和特定应用，以充分利用其能力。
- en: '****How**e**v**er**, ****n****o**t** ****ever**y**th**ing** ****i****s****
    ****unbr**i**dl**ed** ****opt**i**mi**sm**. ****Cha**t**G**PT** ****h****a**s**
