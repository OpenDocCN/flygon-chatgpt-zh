- en: 10. Prompts to Use ChatGPT As a Major Time-Saver
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Lydia Evelyn^([1](#Aff2)  )(1)Catalonia, Spain
  prefs: []
  type: TYPE_NORMAL
- en: Earlier in this book, in Chapter [6](641691_1_En_6_Chapter.xhtml), we simplified
    the concept of data analysis and demonstrated that it’s an everyday occurrence
    that can then be even more simplified by delegating the task to ChatGPT. Likewise,
    when we talk about data conversion, what comes to mind might be very technical
    and complex—something only software developers care about. But just like data
    analysis, data conversion is just as common in an everyday setting.
  prefs: []
  type: TYPE_NORMAL
- en: If you’re using a recipe from a French blogger, you need to convert the measurements
    from metric to imperial. If you’re thinking about going on a trip abroad, you’re
    going to have to convert your budget to the local currency. Even turning a verbal
    conversation into a digital report to email to your manager is a form of data
    conversion you perform yourself on a daily basis. Data conversion has a multitude
    of practical applications for anybody. So, let’s take a look at how data conversion
    is another powerful feature of ChatGPT, enabling us to convert files, create transcripts
    from audio files, translate entire documents into another language, and even edit
    a photo for Instagram. Let’s get started.
  prefs: []
  type: TYPE_NORMAL
- en: 'What we’ll be covering in this chapter:'
  prefs: []
  type: TYPE_NORMAL
- en: Optimize your productivity and save time when you’re working with spreadsheets!
    Converting an Excel file into a key insight sales report with charts and graphics.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You went to Paris and had the best macarons of your life, and you want to make
    it at home. Using ChatGPT to translate the language and measurement units from
    a French recipe for macarons.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Make quick photo edits for effective social media posts. Using ChatGPT to edit
    and crop various photos.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Using ChatGPT to Convert an Excel File into a Key Insights Sales Report
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: ChatGPT can be used to convert files of many different formats, which is a lifesaver
    for anyone who works with documents or images that need to be reformatted for
    different purposes.
  prefs: []
  type: TYPE_NORMAL
- en: Most of us have had to work with Excel or software equivalent to work with large
    tables that contain important data. Working with Excel makes it easy to collaborate
    with other coworkers and leave comments, add formatting, or create charts. But
    it’s no one’s favorite task to look through these often massive tables and interpret
    that information into a report with charts and figures that accurately portray
    what the data implies.
  prefs: []
  type: TYPE_NORMAL
- en: Rather than do all that, we’re going to use ChatGPT to read an Excel file and
    create a sales report with analysis of the data for anyone to read and understand.
    Furthermore, we’re going to instruct ChatGPT to put all of this into a Word document
    on our behalf (Prompt [10-1](#PC1)).Create a Word document explaining the contents
    of these sales records and what they could implicate. In the document, include
    key profitability insights and provide charts to visualize the dataPrompt 10-1
  prefs: []
  type: TYPE_NORMAL
- en: 'Telling ChatGPT to explain the contents of an Excel file Figure [10-1](#Fig1)
    shows what it looks like when we submit this prompt to ChatGPT. As you can see,
    it’s very similar to when we uploaded a PDF in previous chapters.![A bar chart
    titled "Total Profit by Region" displays profit data for different regions. The
    chart features orange bars representing total profit, with a vertical axis labeled
    "Total Profit" ranging from 0 to 1.2e7\. The chart includes interactive elements
