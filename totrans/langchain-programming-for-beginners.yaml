    the response is a dictionary with four keys: "input", "chat_history", "context",
    and "answer".'
  id: totrans-1250
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你运行应用程序并将问题传递给 LLM，你会注意到响应是一个包含四个键的字典："input"，"chat_history"，"context" 和 "answer"。
