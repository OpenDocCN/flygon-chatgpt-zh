  id: totrans-366
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: 'Here is a response from the *GPT-4o-mini* model, which, in addition to the
    context and description, included a detailed explanation of the coding task stages,
    an example output, and the task’s challenges:'
  id: totrans-367
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是来自 *GPT-4o-mini* 模型的响应，除了上下文和描述外，还包括了编码任务阶段的详细说明、示例输出以及任务的挑战：
- en: '[PRE15]'
  id: totrans-368
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: 1, 2, Fizz, 4, Buzz, Fizz, 7, 8, Fizz, Buzz, 11, Fizz, 13, 14, FizzBuzz, ...
    [PRE16]
  id: totrans-369
  prefs: []
  type: TYPE_NORMAL
  zh: 1, 2, Fizz, 4, Buzz, Fizz, 7, 8, Fizz, Buzz, 11, Fizz, 13, 14, FizzBuzz, ...
    [PRE16]
- en: In [*Chapter 6*](Chapter_6.xhtml#_idTextAnchor249), we will explore the underlying
    differences between *GPT-4o* and *GPT-3.5* in greater detail.
  id: totrans-370
  prefs: []
  type: TYPE_NORMAL
  zh: 在[*第6章*](Chapter_6.xhtml#_idTextAnchor249)中，我们将更详细地探讨*GPT-4o*和*GPT-3.5*之间的底层差异。
- en: Important note
  id: totrans-371
  prefs: []
  type: TYPE_NORMAL
  zh: 重要提示
- en: As discussed in [*Chapter 1*](Chapter_1.xhtml#_idTextAnchor037), applications
    built on top of LLMs rarely output deterministic results, and responses for similar
    prompts may differ due to prompt construction, user customization, and randomness.
    Moving forward in this book, we will discuss further how to control all three
    to achieve the desired outputs from the model.
  id: totrans-372
  prefs: []
  type: TYPE_NORMAL
  zh: 如[*第1章*](Chapter_1.xhtml#_idTextAnchor037)中所述，建立在LLM之上的应用程序很少输出确定性的结果，并且由于提示构造、用户定制和随机性，相似提示的响应可能不同。在本书接下来的内容中，我们将进一步讨论如何控制这三个方面以实现模型所需的结果。
- en: Next, we will explore how to anticipate the costs associated with each API call
    and understand how tokens, as fragments of words, are used to calculate the request
    charges.
  id: totrans-373
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们将探讨如何预测每个API调用相关的成本，并了解作为单词片段的标记是如何用来计算请求费用的。
- en: Learning how request costs are calculated
  id: totrans-374
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 学习如何计算请求成本
- en: Since OpenAI API is primarily a paid service, it is essential to understand
    and anticipate the costs associated with each request.
  id: totrans-375
  prefs: []
  type: TYPE_NORMAL
  zh: 由于OpenAI API主要是一项付费服务，因此理解并预测每个请求相关的成本至关重要。
- en: Before proceeding with the lab exercises, it is strongly recommended that you
    add credits to your OpenAI platform account. An initial charge of $5 in credits
    should be more than enough to complete all the labs in this book. Loading credits
    will also upgrade your account from Free tier usage (with no prior credits) to
    a Tier 1 account, significantly increasing your rate and usage limits, as we will
    discuss later in this chapter.
  id: totrans-376
  prefs: []
  type: TYPE_NORMAL
  zh: 在进行实验室练习之前，强烈建议您向您的OpenAI平台账户充值。初始的5美元信用额度应该足以完成本书中的所有实验室。充值信用也将使您的账户从免费层使用（无先前信用额度）升级到一级账户，显著提高您的速率和限制，我们将在本章后面讨论。
- en: To load credits, open the OpenAI **Billing Overview** page at [https://platform.openai.com/settings/organization/billing/overview](https://platform.openai.com/settings/organization/billing/overview)
    and add a payment method with a minimum charge of $5.
  id: totrans-377
  prefs: []
  type: TYPE_NORMAL
  zh: 要充值信用，请打开OpenAI的**账单概览**页面[https://platform.openai.com/settings/organization/billing/overview](https://platform.openai.com/settings/organization/billing/overview)，并添加一个最低收费为5美元的支付方式。
- en: '![Figure 2.4: Remaining credit balance](../Images/B31534_02_4.png)'
  id: totrans-378
  prefs: []
  type: TYPE_IMG
  zh: '![图2.4：剩余信用余额](../Images/B31534_02_4.png)'
- en: 'Figure 2.4: Remaining credit balance'
  id: totrans-379
  prefs: []
  type: TYPE_NORMAL
  zh: 图2.4：剩余信用余额
- en: You can also check your remaining balance at any time by visiting the same link.
  id: totrans-380
  prefs: []
  type: TYPE_NORMAL
  zh: 您也可以通过访问相同的链接在任何时候检查您的剩余余额。
- en: Understanding tokens
  id: totrans-381
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 理解标记
- en: The OpenAI platform calculates request costs based on **tokens**, which are
    small segments of text (often subwords, words, or characters) averaging about
    0.75 words or 4 characters each. Text is divided into tokens by elements such
    as punctuation, root words, and word endings. We will discuss tokens in detail
    in [*Chapter 6*](Chapter_6.xhtml#_idTextAnchor249).
  id: totrans-382
  prefs: []
  type: TYPE_NORMAL
  zh: OpenAI平台根据**标记**计算请求成本，这些标记是文本的小段（通常是子词、单词或字符），平均每个约为0.75个单词或4个字符。文本通过标点符号、词根和词尾等元素被划分为标记。我们将在[*第6章*](Chapter_6.xhtml#_idTextAnchor249)中详细讨论标记。
- en: 'Each API request consists of both input and output tokens, and OpenAI charges
    for both. For example, in *Lab 2.1*, the message `{"role": "user", "content":
    "What is the FizzBuzz problem?"}` contains 15 tokens. You can access the exact
    count from the `prompt_token` attribute as in the following code:'
  id: totrans-383
  prefs: []
  type: TYPE_NORMAL
  zh: '每个API请求都包含输入和输出标记，OpenAI对两者都收费。例如，在*实验2.1*中，消息`{"role": "user", "content":
    "What is the FizzBuzz problem?"}`包含15个标记。您可以从以下代码中的`prompt_token`属性访问确切的计数：'
- en: '[PRE17]'
  id: totrans-384
  prefs: []
  type: TYPE_PRE
  zh: '[PRE17]'
- en: Alternatively, we can estimate our total input token consumption using tools
    such as the OpenAI Tokenizer, available at [https://platform.openai.com/tokenizer](https://platform.openai.com/tokenizer).
    The Tokenizer also color-codes the different tokens in the text, identifying words
    such as `role` and `user` as a single token, punctuation marks such as commas
    and question marks as a single token each, and FizzBuzz as three tokens.
  id: totrans-385
  prefs: []
  type: TYPE_NORMAL
  zh: 或者，我们可以使用OpenAI标记器等工具来估计我们的总输入标记消耗，这些工具可在[https://platform.openai.com/tokenizer](https://platform.openai.com/tokenizer)找到。标记器还会对文本中的不同标记进行着色编码，将如`role`和`user`这样的单词识别为单个标记，将如逗号和问号这样的标点符号识别为单个标记，将FizzBuzz识别为三个标记。
- en: '![Figure 2.5: OpenAI Tokenizer simulation](../Images/B31534_02_5.png)'
  id: totrans-386
  prefs: []
  type: TYPE_IMG
  zh: '![图2.5：OpenAI标记器模拟](../Images/B31534_02_5.png)'
- en: 'Figure 2.5: OpenAI Tokenizer simulation'
  id: totrans-387
  prefs: []
  type: TYPE_NORMAL
  zh: 图2.5：OpenAI标记器模拟
- en: 'Output tokens are also billed. For example, in *Lab 2.1*, the output response
    from the *GPT-4o-mini* model contains 292 tokens. You can access the `completion_tokens`
    attribute by calling the following:'
  id: totrans-388
  prefs: []
  type: TYPE_NORMAL
  zh: 输出令牌也会收费。例如，在*Lab 2.1*中，*GPT-4o-mini*模型的输出响应包含292个令牌。您可以通过调用以下代码来访问`completion_tokens`属性：
- en: '[PRE18]'
  id: totrans-389
  prefs: []
  type: TYPE_PRE
  zh: '[PRE18]'
- en: 'This brings the total billable tokens to 307\. You can access the `total_tokens`
    attributes by calling the following:'
  id: totrans-390
  prefs: []
  type: TYPE_NORMAL
  zh: 这使得应计令牌总数达到307个。您可以通过调用以下代码来访问`total_tokens`属性：
- en: '[PRE19]'
  id: totrans-391
  prefs: []
  type: TYPE_PRE
  zh: '[PRE19]'
- en: How billing is computed
  id: totrans-392
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 账单是如何计算的
- en: OpenAI charges for both input and output tokens, with costs varying by model.
    Newer, more advanced models typically have higher costs, while optimized versions,
    such as models with the *-mini* or *-turbo* postfix, are more affordable. You
    can find the full pricing details at [https://openai.com/api/pricing/](https://openai.com/api/pricing/).
  id: totrans-393
  prefs: []
  type: TYPE_NORMAL
  zh: OpenAI对输入和输出令牌都收费，费用因模型而异。较新、更先进的模型通常费用更高，而优化版本，例如带有*-mini*或*-turbo*后缀的模型，则更经济实惠。您可以在[https://openai.com/api/pricing/](https://openai.com/api/pricing/)找到完整的定价详情。
- en: As of January 2025, input tokens for the *GPT-4o* model are priced at $2.50
    per million tokens (or $1 for every 400,000 input tokens), while output tokens
    are priced at $10 per million tokens (or $1 for every 100,000 output tokens).
  id: totrans-394
  prefs: []
  type: TYPE_NORMAL
  zh: 截至2025年1月，*GPT-4o*模型的输入令牌每百万个令牌定价为2.50美元（或每40万个输入令牌收费1美元），输出令牌每百万个令牌定价为10美元（或每10万个输出令牌收费1美元）。
- en: In *Lab 2.1*, we used the more affordable *GPT-4o-mini* model. Input tokens
    for this model cost $0.15 per million tokens (or $1 for every 6.6 million input
    tokens), and output tokens are priced at $0.60 per million tokens (or $1 for every
    1.6 million output tokens). These costs are approximately 1/16 of the *GPT-4o*
    model’s pricing.
  id: totrans-395
  prefs: []
  type: TYPE_NORMAL
  zh: 在*Lab 2.1*中，我们使用了更经济的*GPT-4o-mini*模型。该模型的输入令牌每百万个令牌收费0.15美元（或每660万个输入令牌收费1美元），输出令牌每百万个令牌收费0.60美元（或每160万个输出令牌收费1美元）。这些成本大约是*GPT-4o*模型定价的1/16。
- en: '![Figure 2.6: Costs of GPT-4o input and output tokens](../Images/B31534_02_6.png)'
  id: totrans-396
  prefs: []
  type: TYPE_IMG
  zh: '![图2.6：GPT-4o输入和输出令牌的成本](../Images/B31534_02_6.png)'
- en: 'Figure 2.6: Costs of GPT-4o input and output tokens'
  id: totrans-397
  prefs: []
  type: TYPE_NORMAL
  zh: 图2.6：GPT-4o输入和输出令牌的成本
- en: 'For example, we can calculate the cost of running *Lab 2.1*, which uses 15
    input tokens and 292 output tokens. Based on the pricing for the *GPT-4o-mini*
    model, the cost is as follows:'
  id: totrans-398
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，我们可以计算运行*Lab 2.1*的成本，该实验使用了15个输入令牌和292个输出令牌。根据*GPT-4o-mini*模型的定价，成本如下：
- en: '[PRE20]'
  id: totrans-399
  prefs: []
  type: TYPE_PRE
  zh: '[PRE20]'
- en: This is approximately 1/55 of a cent.
  id: totrans-400
  prefs: []
  type: TYPE_NORMAL
  zh: 这大约是1/55分。
- en: 'If we run *Lab 2.1* with the larger *GPT-4o* model instead, the cost would
    be as follows:'
  id: totrans-401
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们使用更大的*GPT-4o*模型来运行*Lab 2.1*，成本如下：
- en: '[PRE21]'
  id: totrans-402
  prefs: []
  type: TYPE_PRE
  zh: '[PRE21]'
- en: This amounts to 1/5 of a cent.
  id: totrans-403
  prefs: []
  type: TYPE_NORMAL
  zh: 这相当于1/5分。
- en: Keep these cost differences in mind when designing your own applications, especially
    when deciding between using more advanced models and their smaller, more affordable
    versions. Model prices have historically declined as newer models are introduced,
    so it is a good idea to periodically review the **Pricing** page at [https://openai.com/api/pricing/](https://openai.com/api/pricing/).
  id: totrans-404
  prefs: []
  type: TYPE_NORMAL
  zh: 在设计自己的应用程序时，请记住这些成本差异，尤其是在决定使用更先进的模型及其较小、更经济实惠的版本之间时。随着新模型的推出，模型价格历史上一直在下降，因此定期查看[https://openai.com/api/pricing/](https://openai.com/api/pricing/)上的**定价**页面是个好主意。
- en: With a clear understanding of cost calculations, we can now move on to discussing
    the limitations and restrictions associated with different tiers of OpenAI accounts.
  id: totrans-405
  prefs: []
  type: TYPE_NORMAL
  zh: 在清楚了解成本计算之后，我们现在可以继续讨论与OpenAI账户不同层级相关的限制和限制。
- en: Understanding rate limits and usage restrictions for free and paid OpenAI accounts
  id: totrans-406
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 理解免费和付费OpenAI账户的速率限制和使用限制
- en: 'OpenAI usage is limited by three factors: **requests per minute** (**RPM**),
    **requests per day** (**RPD**), and **tokens per minute** (**TPM**). The limits
    of each vary based on both the model and the type of account you have. For Free
    tier accounts with no credits added, the limit is three RPM, and only certain
    models are available, excluding *GPT-4o*. Token limits tend to be more restrictive
    for advanced models such as *GPT-4o* to all account tiers, whereas older or mini
    models, such as *GPT-4o-mini*, have more relaxed limits.'
  id: totrans-407
  prefs: []
  type: TYPE_NORMAL
  zh: OpenAI的使用受到三个因素的限制：**每分钟请求数**（**RPM**）、**每天请求数**（**RPD**）和**每分钟令牌数**（**TPM**）。每个限制的值根据模型和您拥有的账户类型而有所不同。对于未添加信用额的免费层账户，限制为每分钟三个RPM，并且只有某些模型可用，不包括*GPT-4o*。对于像*GPT-4o*这样的高级模型，令牌限制通常更为严格，适用于所有账户层级，而较老或迷你模型，如*GPT-4o-mini*，则有更宽松的限制。
- en: 'For reference, here are the rate limits for Free tier accounts as of January
    2025:'
  id: totrans-408
  prefs: []
  type: TYPE_NORMAL
  zh: 仅供参考，以下是截至2025年1月的免费层账户的速率限制：
- en: '![Figure 2.7: Rate limits example for Free tier accounts](../Images/B31534_02_7.png)'
  id: totrans-409
  prefs: []
  type: TYPE_IMG
  zh: '![图 2.7：免费层账户的速率限制示例](../Images/B31534_02_7.png)'
- en: 'Figure 2.7: Rate limits example for Free tier accounts'
  id: totrans-410
  prefs: []
  type: TYPE_NORMAL
  zh: 图 2.7：免费层账户的速率限制示例
- en: 'And here are the rate limits for Tier 1 accounts as of January 2025:'
  id: totrans-411
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是截至 2025 年 1 月层 1 账户的速率限制：
- en: '![Figure 2.8: Rate limits example for Tier 1 accounts](../Images/B31534_02_8.png)'
  id: totrans-412
  prefs: []
  type: TYPE_IMG
  zh: '![图 2.8：层 1 账户的速率限制示例](../Images/B31534_02_8.png)'
- en: 'Figure 2.8: Rate limits example for Tier 1 accounts'
  id: totrans-413
  prefs: []
  type: TYPE_NORMAL
  zh: 图 2.8：层 1 账户的速率限制示例
- en: 'We encourage you to learn about your account’s API limits by navigating to
    the **Settings** section in the upper-left corner of your organization: [https://platform.openai.com/settings/organization/limits](https://platform.openai.com/settings/organization/limits).'
  id: totrans-414
  prefs: []
  type: TYPE_NORMAL
  zh: 我们鼓励您通过导航到组织右上角的 **设置** 部分来了解您账户的 API 限制：[https://platform.openai.com/settings/organization/limits](https://platform.openai.com/settings/organization/limits)。
- en: With Tier 1’s increased RPM and TPM limits in place, we’re now ready to move
    forward to the next lab, where we will explore additional parameters for OpenAI
    API.
  id: totrans-415
  prefs: []
  type: TYPE_NORMAL
  zh: 在层 1 的 RPM 和 TPM 限制增加后，我们现在可以继续前进到下一个实验室，我们将探索 OpenAI API 的其他参数。
- en: Lab 2.2 – analyzing request parameters
  id: totrans-416
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: Lab 2.2 – 分析请求参数
- en: In *Lab 2.2*, we will expand on our basic OpenAI API request to the Chat service
    by adding additional parameters to customize the model’s response. This time,
    we will ask the Chat service to explain the *Two Sum problem*, a topic we will
    explore further in later chapters.
  id: totrans-417
  prefs: []
  type: TYPE_NORMAL
  zh: 在 *Lab 2.2* 中，我们将通过添加额外的参数来扩展我们对 Chat 服务的 OpenAI API 基本请求，以自定义模型的响应。这次，我们将要求
    Chat 服务解释 *两数之和问题*，我们将在后续章节中进一步探讨这个话题。
- en: 'We will use a similar starter code from *Lab 2.1*, which includes setting up
    an `OpenAI` client and `print` statements:'
  id: totrans-418
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将使用与 *Lab 2.1* 类似的起始代码，其中包括设置 `OpenAI` 客户端和 `print` 语句：
- en: '[PRE22]'
  id: totrans-419
  prefs: []
  type: TYPE_PRE
  zh: '[PRE22]'
- en: 'In this lab’s guided walk-through, we will add the following payload parameters:'
  id: totrans-420
  prefs: []
  type: TYPE_NORMAL
  zh: 在本实验室的指导性说明中，我们将添加以下有效负载参数：
- en: '`n`: Specifies the number of response variations'
  id: totrans-421
  prefs: []
  type: TYPE_NORMAL
  zh: '`n`：指定响应变体的数量'
- en: '`temperature`: Controls the level of randomness in the model’s output ranging
    from `0` to `2`'
  id: totrans-422
  prefs: []
  type: TYPE_NORMAL
  zh: '`temperature`：控制模型输出的随机程度，范围从 `0` 到 `2`'
- en: '`max_tokens`: Limits the number of tokens in each response'
  id: totrans-423
  prefs: []
  type: TYPE_NORMAL
  zh: '`max_tokens`：限制每个响应中的标记数'
- en: Applications such as code completion services often offer users multiple suggestions
    from a language model, so we may want to retrieve more than one response. Additionally,
    in some cases, such as generating a creative prompt (for example, `Give me a marketing
    slogan for a book about GenAI for coding`), we might prefer a higher degree of
    randomness in the output that can be obtained by setting the `temperature` parameter
    closer to its maximum value of 2.
  id: totrans-424
  prefs: []
  type: TYPE_NORMAL
  zh: 诸如代码补全服务之类的应用程序通常从语言模型为用户提供多个建议，因此我们可能希望检索多个响应。此外，在某些情况下，例如生成创意提示（例如，`给我一个关于
    GenAI 编码的书的营销标语`），我们可能更喜欢输出中更高的随机度，这可以通过将 `temperature` 参数设置得更接近其最大值 2 来实现。
- en: The `max_tokens` parameter limits the number of tokens in the response, though
    it does not guarantee the output will be fully complete within that limit. When
    using `max_tokens`, OpenAI charges for the specified token limit rather than the
    actual number of tokens used, so it is best to set it close to the expected length
    of the response.
  id: totrans-425
  prefs: []
  type: TYPE_NORMAL
  zh: '`max_tokens` 参数限制了响应中的标记数，但这并不保证输出将在该限制内完全完整。当使用 `max_tokens` 时，OpenAI 按指定的标记限制而不是实际使用的标记数收费，因此最好将其设置得接近预期响应长度。'
