  type: TYPE_NORMAL
  zh: '**极坐标图**'
- en: Polar plots or radial plots are suitable for displaying multivariate data in
    a two-dimensional chart where the variables are represented on axes starting from
    the same point. They are useful for viewing patterns based on angles and magnitudes.
    They allow us to display data in terms of values and angles.
