  id: totrans-389
  prefs: []
  type: TYPE_NORMAL
  zh: 在**负责任的使用**方面，另一个关键方面是**数据隐私**。像ChatGPT这样的**生成模型**可以存储和处理大量个人数据。因此，对于实施这些技术的公司和组织来说，重要的是要对其如何处理用户数据保持透明，并采取严格的实践来保护隐私和信息安全性。数据收集和使用必须符合隐私法律和法规，例如欧盟的**通用数据保护条例**（GDPR），以及行业最佳实践。
- en: '****So**c**i**al** ****Im**p**a**ct** ****a****n**d** ****Philo**so**ph**ica**l
