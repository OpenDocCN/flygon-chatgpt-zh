  id: totrans-500
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你将如何鼓励观众与你互动（民意调查、竞赛、辩论）？
- en: Are there any trending TikTok formats you’d like to incorporate?
  id: totrans-501
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你是否希望融入任何流行的TikTok格式？
