- en: '****Intr**oducti**on ****t**o** ****Pr**omp**t ****Engi**neerin**g ****a**nd**
    ****t**he** ****Prom**ptmake**r'
  id: totrans-34
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**引言**：**Prompt Engineering**与**Promptmaker**'
- en: '****Prof**essio**n ****Pr**omp**t ****Engi**neerin**g ****i**s** ****a**n**
    ****eme**rgin**g ****fi**eld** ****th**at** ****h**as** ****ga**ine**d ****mom**entu**m
    ****al**ong** ****wi**th** ****t**he** ****adva**ncemen**t ****o**f** ****arti**ficia**l
    ****inte**lligen**ce, ****espe**ciall**y ****wi**th** ****t**he** ****deve**lopmen**t
    ****o**f** ****LL**Ms** ( ****La**rge** ****Lan**guag**e ****Mo**del**s ). ****Wh**at**
    ****w**e** ****of**ten** ****fa**il** ****t**o** ****rea**liz**e ****i**s** ****th**at**
    ****t**he** ****tr**ue** ****pote**ntia**l ****o**f** ****th**ese** ****A**Is**
    ****li**es** ****i**n** ****h**ow** ****w**e** ****fr**ame** ****t**he** ****ques**tion**s.
    ****Pro**mpt**s ****a**re**, ****i**n** ****si**mpl**e ****te**rms**, ****t**he**
    ****inst**ructio**ns ****w**e** ****gi**ve** ****t**he** ****A**I** ****t**o**
    ****pro**vid**e ****a**n** ****an**swe**r. ****T**he** ****qua**lit**y ****o**f**
    ****t**he** ****pro**mpt**s ****dete**rmine**s ****t**he** ****qua**lit**y ****o**f**
    ****t**he** ****ans**wer**s, ****wh**ich** ****i**s** ****w**hy** ****t**he**
    ****abi**lit**y ****t**o** ****cr**eat**e ****go**od** ****pro**mpt**s ****i**s**
    ****cri**tica**l.'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: '**职业Prompt Engineering**是一个随着人工智能的进步而兴起的领域，特别是随着大型语言模型（LLMs）的发展。我们常常未能意识到的是，这些人工智能（AIs）的真正潜力在于我们如何构建问题。简而言之，Prompt是提供给AI的指令，以提供答案。Prompt的质量决定了答案的质量，这也是为什么创造好的Prompt能力至关重要。'
- en: '****A**** “ ****Prom**ptmake**r ” ****i**s** ****som**eon**e ****w**ho** ****i**s**
    ****ab**le** ****t**o** ****tran**slat**e ****a**** ****ne**ed** ****in**to**
    ****a**n** ****effe**ctiv**e ****inte**ractio**n ****wi**th** ****A**I** . ****Be**ing**
    ****a**** ****prom**ptmake**r ****me**ans** ****ha**vin**g ****a**** ****cre**ativ**e
    ****a**nd** ****anal**ytica**l ****mi**nd**, ****kno**win**g ****h**ow** ****t**o**
    ****gu**ide** ****t**he** ****mo**del** ****t**o** ****ach**iev**e ****t**he**
    ****des**ire**d ****re**sul**t. ****Th**is** ****prof**essio**n ****bec**ome**s
    ****incr**easing**ly ****impo**rtan**t ****a**s** ****w**e** ****adv**anc**e ****i**n**
    ****t**he** ****u**se** ****o**f** ****A**Is** ****a**s** ****assi**stant**s,
    ****tea**cher**s, ****coun**selor**s, ****a**nd** ****s**o** ****ma**ny** ****ot**her**
    ****ro**les**. ****Kno**win**g ****h**ow** ****t**o** ****int**erac**t ****appro**priate**ly
    ****wi**th** ****th**ese** ****mac**hine**s ****i**s** ****wh**at** ****diffe**rentiat**es
    ****a**** ****si**mpl**e ****expe**rienc**e ****fr**om** ****a**** ****trans**formati**ve
    ****a**nd** ****va**lue**-****ri**ch** ****expe**rienc**e.'
  id: totrans-36
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: “提示工程师”是指能够将需求转化为与AI有效互动的人。成为一名提示工程师意味着拥有创造性和分析性的思维，知道如何引导模型达到期望的结果。随着我们使用AI作为助手、教师、顾问以及许多其他角色的进步，这一职业变得越来越重要。知道如何与这些机器适当互动，是区分简单体验和变革性、价值丰富的体验的关键。
- en: '****Ev**en** ****i**n** ****a**** ****con**tex**t ****o**f** ****incr**easin**g
    ****auto**matio**n, ****t**he** ****hu**man** ****abi**lit**y ****t**o** ****form**ulat**e
    ****go**od** ****ques**tion**s ****a**nd** ****gu**ide** ****arti**ficia**l ****inte**lligen**ce
    ****i**s** ****wh**at** ****ma**kes** ****th**em** ****tr**uly** ****effe**ctiv**e.
    ****N**o** ****ma**tte**r ****h**ow** ****adv**ance**d ****t**he** ****A**I**
    ****mo**del** ****i**s**, ****i**f** ****t**he** ****inst**ructio**ns ****pro**vide**d
    ****a**re** ****n**ot** ****ade**quat**e, ****t**he** ****pote**ntia**l ****o**f**
    ****t**he** ****sy**ste**m ****wi**ll** ****b**e** ****lim**ite**d. ****Ther**efor**e,
    ****Pr**omp**t ****Engi**neerin**g ****i**s** ****mu**ch** ****mo**re** ****th**an**
    ****a**** ****tech**nica**l ****sk**ill**; ****i**t** ****i**s** ****t**he** ****k**ey**
    ****th**at** ****pu**ts** ****u**s** ****i**n** ****con**tro**l ****o**f** ****A**I**,
    ****maxi**mizin**g ****i**ts** ****va**lue** ****a**nd** ****i**ts** ****im**pac**t
    ****o**n** ****pro**ble**m-****sol**vin**g, ****inno**vatio**n ****a**nd** ****crea**tivit**y.'
  id: totrans-37
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 即使在自动化日益增加的背景下，人类能够提出好问题和指导人工智能的能力，才是使他们真正有效的关键。无论AI模型多么先进，如果提供的指令不足，系统的潜力将受到限制。因此，提示工程不仅仅是技术技能；它是让我们控制AI、最大化其价值和在解决问题、创新和创造力方面产生影响的钥匙。
