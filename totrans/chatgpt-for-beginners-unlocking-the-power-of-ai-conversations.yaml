- en: '****I**f** ****t**he** ****ini**tia**l ****res**pons**e ****do**esn**’****t****
    ****me**et** ****yo**ur** ****expe**ctatio**ns, ****re**fin**e ****yo**ur** ****in**put**
    ****o**r** ****a**sk** ****fo**llo**w-****u**p** ****ques**tion**s. ****F**or**
    ****exa**mpl**e, ****i**f** ****a**** ****gene**rate**d ****st**ory** ****out**lin**e
