- en: 1\. Train Classification Model
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt: I want you to act as a data scientist and code for me. I have a dataset
    of [describe dataset]. Please build a machine learning model that predict [target
    variable].'
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrcZW.jpg)![](image_rsrcZX.jpg)![](image_rsrcZY.jpg)![](image_rsrcZZ.jpg)'
  id: totrans-175
  prefs: []
  type: TYPE_IMG
- en: 'ChatGPT is able to provide satisfactory code that:'
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
- en: provide the regular preprocessing (scaling the data and encoding categorical
    variable),
  id: totrans-177
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: drop the testing column
  id: totrans-178
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: provide the train-test split
  id: totrans-179
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: evaluate the model
  id: totrans-180
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: This is good because it provides enough code to start off a model. It is also
    technically sound and correct. However, it’s lacking because it only uses accuracy
    for evaluation.
