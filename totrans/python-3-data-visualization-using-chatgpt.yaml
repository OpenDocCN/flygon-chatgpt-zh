  type: TYPE_NORMAL
  zh: '**群组图**'
- en: The swarm plot positions each data point on the categorical axis with minimal
    overlap, giving a better representation of the distribution of values. It allows
    us to display a categorical scatterplot with non-overlapping points.
  id: totrans-3212
  prefs: []
  type: TYPE_NORMAL
  zh: 群组图将每个数据点在分类轴上以最小重叠的位置表示，从而更好地表示值的分布。它允许我们显示非重叠点的分类散点图。
