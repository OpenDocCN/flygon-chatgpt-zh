    ****t**he** ****ne**xt** ****w**ay** ****y**ou** ****c**an** ****be**gin** ****leve**ragin**g
    ****t**he** ****cha**tbo**t ****a**s** ****yo**ur** ****vir**tua**l ****P**A**.'
  id: totrans-519
  prefs: []
  type: TYPE_NORMAL
  zh: '**ChatGPT** 是一个大型语言模型，它利用自然语言处理和深度学习数据库来生成与人类对话相似的自然对话，以响应用户（也称为你）输入的提示。使这成为可能的关键因素之一是
    ChatGPT 理解人类语言的能力。被称为其自然语言理解（NLU）能力，这是使其成为如此革命性技术之一的原因，也是你可以开始利用聊天机器人作为你的虚拟个人助理的下一个途径。'
- en: '****Wh**ile** ****t**he** ****L**LM** ****sh**oul**d ****fi**nd** ****i**t**
    ****pr**ett**y ****ea**sy** ****t**o** ****unde**rstan**d ****al**mos**t ****a**ll**
    ****ki**nds** ****o**f** ****te**xt** ****y**ou** ****gi**ve** ****i**t**, ****i**t**’****s****
    ****st**ill** ****impo**rtan**t ****t**o** ****rem**embe**r ****th**at** ****t**he**
    ****on**us** ****i**s** ****o**n** ****y**ou** ****a**s** ****t**he** ****pr**omp**t
    ****eng**inee**r ****t**o** ****en**sur**e ****th**at** ****Cha**tGP**T ****unde**rstand**s
    ****wh**at** ****y**ou** ****me**an** ****a**nd** ****wh**at** ****y**ou**’****r**e**
    ****af**ter**. ****Rem**embe**r ****th**at** ****gene**rativ**e ****A**I** ****i**s**
    ****i**n** ****n**o** ****w**ay** ****per**fec**t, ****a**nd** ****h**as** ****be**en**
    ****kn**own** ****t**o** “****hall**ucinat**e” ****a**nd** ****sp**ew** ****o**ut**
    ****inco**rrec**t ****info**rmatio**n. ****I**t** ****do**es** ****th**is** ****wh**en**
    ****i**t** ****do**esn**’****t**** ****fu**lly** ****unde**rstan**d ****t**he**
    ****con**tex**t ****o**f** ****yo**ur** ****pr**omp**t, ****a**nd** ****th**us**
    ****gene**rate**s ****te**xt** ****th**at** ****fa**lls** ****out**sid**e ****o**f**
    ****yo**ur** ****para**meter**s (****incl**udin**g ****prov**idin**g ****y**ou**
    ****wi**th** ****inco**rrec**t ****info**rmatio**n ****a**nd** ****th**en** ****cla**imin**g
    ****i**t** ****a**s** ****fa**ct**). ****T**o** ****st**op** ****th**is** ****fr**om**
    ****happ**enin**g, ****y**ou** ****ne**ed** ****t**o** ****ma**ke** ****su**re**
    ****th**at** ****yo**ur** ****pr**omp**t ****expl**icitl**y ****men**tion**s ****th**at**
    ****y**ou** ****wa**nt** ****i**t** ****t**o** ****on**ly** ****u**se** ****t**he**
    ****in**fo** ****y**ou** ****pro**vid**e ****i**t** ****wi**th** ****i**n** ****t**he**
    ****pr**omp**t ****a**nd** ****not**hin**g ****el**se**. ****Th**is** ****mi**ght**
    ****li**mit** ****t**he** ****res**earc**h ****us**es** ****o**f** ****Cha**tGP**T,
    ****b**ut** ****ens**ure**s ****th**at** ****t**he** ****res**ult**s ****y**ou**
    ****g**et** ****fr**om** ****i**t** ****a**re**, ****we**ll**, ****tr**ue**. ****Wh**en**
    ****us**ing** ****Cha**tGP**T, ****prov**idin**g ****con**tex**t ****i**s** ****k**ey**.'
  id: totrans-520
  prefs: []
  type: TYPE_NORMAL
  zh: '****虽然****LLM****应该****能****够****轻松地****理解****你****提供的****各种****类型的****文本，****但****仍然****需要****记住****，****责任****在于****你****作为****提示****工程师****，****确保****ChatGPT****理解****你的****意图****以及****你****想要****得到****的内容。****记住****，****生成式****AI****并不****完美，****并且****已知****会****“****产生幻觉****”****并****输出****错误****信息。****当****它****没有****完全****理解****你的****提示****上下文****时，****就会****发生****这种情况，****从而****生成****超出****你****参数****范围****的****文本（****包括****提供****错误****信息****并****将其****作为****事实****）。****为了****防止****这种情况****发生，****你需要****确保****你的****提示****明确****指出****你****希望****它****只****使用****你****在****提示****中****提供****的信息****，****而不****是****其他任何信息。****这****可能会****限制****ChatGPT****的研究****用途，****但****可以****确保****你****从****它****得到****的结果****是****真实可靠的。****当****使用****ChatGPT****时，****提供****上下文****是****关键****。'
