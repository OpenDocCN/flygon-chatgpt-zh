  id: totrans-1410
  prefs: []
  type: TYPE_NORMAL
  zh: '"编写Python代码以实现快速排序算法。包括如何选择枢轴元素和创建分区示例。讨论快速排序的最佳、最坏和平均时间复杂度。"'
- en: '12: Mastering Bit Manipulation'
  id: totrans-1411
  prefs: []
  type: TYPE_NORMAL
  zh: '12: 掌握位操作'
- en: 'Prompt:'
  id: totrans-1412
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Write Python code to solve a common bit manipulation problem: finding the
    single number in an array where every other number appears twice. Include an explanation
