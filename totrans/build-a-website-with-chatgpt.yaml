- en: 11.5 Customizing the portfolio page
  id: totrans-2562
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 11.5 自定义作品集页面
- en: 'Here are some customization suggestions for the HTML code:'
  id: totrans-2563
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一些HTML代码的自定义建议：
- en: In the header, you can edit the title. Just be sure not to edit or delete the
    associated HTML tags, `<h1>` and `</h1>`.
  id: totrans-2564
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在页眉中，你可以编辑标题。只需确保不要编辑或删除相关的HTML标签`<h1>`和`</h1>`。
- en: If you’re building a site that includes multiple portfolios, you’ll want a navigation
    area so visitors can easily find your other pages. Refer to chapter 6 to learn
    how to prompt ChatGPT for links and a navigation bar.
  id: totrans-2565
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果你正在构建包含多个作品集的网站，你将需要一个导航区域，以便访客可以轻松找到你的其他页面。请参考第6章了解如何提示ChatGPT获取链接和导航栏。
- en: In the main section, you can edit the page title, but don’t mess with the associated
    HTML tags, `<h1>` and `</h1>`.
  id: totrans-2566
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在主要部分，你可以编辑页面标题，但不要修改相关的HTML标签`<h1>`和`</h1>`。
- en: 'If you want to include one or more extra introductory paragraphs, add them
    just below the `<h1>` tag in the `main` element. Ensure that each paragraph renders
    properly by surrounding it with a `<p>` tag at the beginning and a `</p>` tag
    at the end:'
  id: totrans-2567
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果你想包含一个或多个额外的引言段落，请将它们添加到`main`元素中的`<h1>`标签下方。确保每个段落都能正确渲染，通过在段落开头和结尾处分别使用`<p>`标签和`</p>`标签来实现：
- en: '[PRE221]'
  id: totrans-2568
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE221]'
- en: In the footer section of the HTML code, you can add links to your social media
    accounts, as I describe in chapter 4.
  id: totrans-2569
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在HTML代码的页脚部分，你可以添加指向你的社交媒体账户的链接，正如我在第4章中描述的那样。
- en: 'Now, here are a few customization ideas for the CSS code:'
  id: totrans-2570
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，这里有一些CSS代码的定制想法：
- en: 'If you’re not a fan of the drop-shadow effect, you can remove it by looking
    for the following code and deleting the `box-shadow` declaration:'
  id: totrans-2571
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果你不喜欢阴影效果，你可以通过查找以下代码并删除`box-shadow`声明来移除它：
- en: '[PRE222]'
  id: totrans-2572
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE222]'
- en: 'If you go without the drop-shadow, you still need some way to make your card
    stand out from the page background. The easiest way to do that is to add a border
    (refer to chapter 5) around the card. At the same spot in the CSS code where the
    `box-shadow` declaration appeared, add the `border` declaration, as shown below
    (with the values adjusted to suit your own portfolio):'
  id: totrans-2573
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果你没有使用阴影效果，你仍然需要某种方法让你的卡片从页面背景中脱颖而出。最简单的方法是在卡片周围添加一个边框（参考第5章）。在CSS代码中，在`box-shadow`声明出现的位置添加`border`声明，如下所示（根据你的个人作品集调整值）：
- en: '[PRE223]'
  id: totrans-2574
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE223]'
- en: 'If you prefer your card text to be left-aligned, you can change that by finding
    the following code in the CSS and changing the `text-align` value from `center`
    to `left`:'
  id: totrans-2575
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果你更喜欢你的卡片文本左对齐，你可以通过在CSS中找到以下代码并将`text-align`值从`center`更改为`left`来更改它：
- en: '[PRE224]'
  id: totrans-2576
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE224]'
- en: For any color value, you can change the existing color to a different color
    keyword.
  id: totrans-2577
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于任何颜色值，你可以将现有的颜色更改为不同的颜色关键字。
- en: For any font size value, you can change the number to increase or decrease the
    font size. Just make sure you leave the `px` unit in place.
  id: totrans-2578
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于任何字体大小值，你可以通过改变数字来增加或减少字体大小。只需确保保留`px`单位。
- en: For any padding or margin value, you can change the number to increase or decrease
    the padding or margins. In each case, be sure to leave the `px` unit in place.
  id: totrans-2579
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于任何填充或边距值，你可以通过改变数字来增加或减少填充或边距。在每种情况下，务必保留`px`单位。
- en: To make your page code more accessible, consider converting all px measurements
    to rem measurements. 1 rem is by default equivalent to 16 px, so 20 px is 1.25 rem,
    24 px is 1.5 rem, 32 px is 2 rem, 48 px is 3 rem, and so on. The rem unit is more
    accessible because it measures font sizes relative to the default font size the
    browser user has defined in their browser settings.
  id: totrans-2580
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为了使你的页面代码更易于访问，考虑将所有px测量值转换为rem测量值。默认情况下，1 rem相当于16 px，所以20 px是1.25 rem，24 px是1.5 rem，32 px是2 rem，48 px是3 rem，依此类推。rem单位更易于访问，因为它测量的是相对于浏览器用户在浏览器设置中定义的默认字体大小的字体大小。
- en: Summary
  id: totrans-2581
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: 'A card is a special collection of HTML tags and CSS properties that’s meant
    to efficiently convey information about an item: a work of art, an event, a project,
    a person, and so on.'
  id: totrans-2582
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 卡片是一组特殊的HTML标签和CSS属性的特殊集合，旨在有效地传达关于物品的信息：一件艺术品、一个事件、一个项目、一个人等等。
- en: Most cards include an image of the item, the title or name of the item, a brief
    description of the item, and a button or link that enables the reader to learn
    more about the item or perform an action related to the item.
  id: totrans-2583
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 大多数卡片都包括物品的图片、物品的标题或名称、物品的简要描述，以及一个按钮或链接，允许读者了解更多关于物品的信息或执行与物品相关的操作。
- en: The two most common card layouts are vertical, where the card elements are laid
    out top to bottom (image, title, text, link), and horizontal, where the card elements
    are laid out left to right (usually with the image on the left and the text on
    the right).
  id: totrans-2584
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 两种最常见的卡片布局是垂直布局，其中卡片元素从上到下排列（图片、标题、文本、链接），和水平布局，其中卡片元素从左到右排列（通常图片在左侧，文本在右侧）。
- en: You can use the `box-shadow` property to add a drop-shadow to a card.
  id: totrans-2585
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你可以使用`box-shadow`属性为卡片添加阴影效果。
- en: You can use the `border-radius` property to round the corners of a card.
  id: totrans-2586
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你可以使用`border-radius`属性来使卡片的角落变得圆润。
- en: For best results, your page prompt should be as specific as possible, including
    colors, font sizes, and heading levels.
  id: totrans-2587
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为了获得最佳效果，你的页面提示应该尽可能具体，包括颜色、字体大小和标题级别。
- en: Save the generated HTML to the index.xhtml file and the generated CSS to the
    filename suggested by ChatGPT in the HTML code, usually styles.css.
  id: totrans-2588
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将生成的HTML保存到index.xhtml文件，将生成的CSS保存到HTML代码中ChatGPT建议的文件名，通常是styles.css。
- en: 12 Building an article page
  id: totrans-2589
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 12 构建文章页面
- en: This chapter covers
  id: totrans-2590
  prefs: []
  type: TYPE_NORMAL
  zh: 本章涵盖
- en: The structure of an article page
  id: totrans-2591
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 文章页面的结构
- en: Laying out the page using CSS Grid
  id: totrans-2592
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用CSS Grid布局页面
- en: Making the article look good on smartphone screens
  id: totrans-2593
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使文章在智能手机屏幕上看起来更好
- en: Crafting a ChatGPT prompt for building an article page
  id: totrans-2594
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为构建文章页面编写ChatGPT提示
- en: Examining and customizing the ChatGPT-generated code
  id: totrans-2595
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 检查和自定义ChatGPT生成的代码
- en: 'There are as many reasons to set up a web page as there are people who want
    to establish some kind of web presence. However, most of these reasons can be
    gathered under two broad umbrellas: self-expression and information sharing. So
    far in this book, you’ve worked on several projects related to self-expression:
    the personal home page (chapter 3), the online journal (chapter 5), the photo
    gallery (chapter 10), and the portfolio page (chapter 11). You’ve also worked
    on projects related to information sharing: the book club page (chapter 4), the
    information website (chapter 6), the interest or hobby website (chapter 7), the
    event sign-up page (chapter 8), and the recipe page (chapter 9).'
  id: totrans-2596
  prefs: []
  type: TYPE_NORMAL
  zh: 建立网页的原因和想要建立某种网络存在感的人一样多。然而，这些原因中的大多数都可以归纳为两大类：自我表达和信息共享。到目前为止，在这本书中，你已经完成了几个与自我表达相关的项目：个人主页（第3章）、在线日记（第5章）、照片画廊（第10章）和作品集页面（第11章）。你同样也完成了与信息共享相关的项目：读书俱乐部页面（第4章）、信息网站（第6章）、兴趣或爱好网站（第7章）、活动报名页面（第8章）和食谱页面（第9章）。
- en: 'This chapter introduces you to another information-sharing page structure:
    the article page. This page uses common HTML structures such as a header, navigation
    bar, sidebar, and footer, all arranged around the star of the page: a long article
    containing several sections. This chapter is going to be a bit more “hands-on”
    than previous projects because it’s easier to add sections, headings, and paragraphs
    and mark up that text (that is, add the appropriate HTML tags) for the reader
    by hand than it is to rely on ChatGPT to do everything. Not to worry, though:
    you’ll still take advantage of ChatGPT’s coding know-how to create the basic structure
    for your article page and add some extra bells and whistles that will make your
    article stand out from the crowd.'
  id: totrans-2597
  prefs: []
  type: TYPE_NORMAL
  zh: 本章将向您介绍另一种信息共享页面结构：文章页面。这个页面使用常见的HTML结构，如页眉、导航栏、侧边栏和页脚，所有这些都被安排在页面的中心：一篇包含几个部分的长文章。本章将比之前的项目更加“动手实践”，因为手动添加部分、标题和段落以及标记文本（即添加适当的HTML标签）比依赖ChatGPT来完成所有工作要容易得多。不过，不用担心：你仍然会利用ChatGPT的编码知识来创建文章页面的基本结构，并添加一些额外的功能，使你的文章脱颖而出。
- en: 12.1 Getting to know this chapter’s project
  id: totrans-2598
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 12.1 了解本章的项目
- en: 'This chapter’s project is an article page. The final page will include the
    following components:'
  id: totrans-2599
  prefs: []
  type: TYPE_NORMAL
  zh: 本章的项目是一个文章页面。最终页面将包括以下组件：
- en: A header element that includes a logo, title, and tagline
  id: totrans-2600
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 包含标志、标题和口号的页眉元素
- en: A navigation bar with links to other sections of the site
  id: totrans-2601
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 包含链接到网站其他部分的导航栏
- en: A main element that contains an article element with a title
  id: totrans-2602
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 包含标题的文章元素的主元素
- en: Multiple section elements within the article, each with its own heading and
    paragraphs
  id: totrans-2603
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 文章中包含多个部分元素，每个部分都有自己的标题和段落
- en: A sidebar element with related information
  id: totrans-2604
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 包含相关信息的侧边栏元素
- en: A footer element that includes a copyright notice
  id: totrans-2605
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 包含版权声明的页脚元素
- en: Figure 12.1 shows a (partial) example article page created with code and text
    supplied by ChatGPT.
  id: totrans-2606
  prefs: []
  type: TYPE_NORMAL
  zh: 图12.1展示了使用ChatGPT提供的代码和文本创建的（部分）示例文章页面。
- en: '![](../../OEBPS/Images/CH12_F01_McFedries3.png)'
  id: totrans-2607
  prefs: []
  type: TYPE_IMG
  zh: '![](../../OEBPS/Images/CH12_F01_McFedries3.png)'
- en: Figure 12.1 An article page generated by ChatGPT
  id: totrans-2608
  prefs: []
  type: TYPE_NORMAL
  zh: 图12.1 由ChatGPT生成的文章页面
- en: 'The example page is a fictional travel article for an imaginary place from
    a work of literature (Narnia, the primary setting of C.S. Lewis’s fantasy series
    *The Chronicles of Narnia*), but you can use the article layout for many other
    types of content: news items, essays, blog posts, reviews, biographies, historical
    accounts, and so on. You start learning how to build the article layout in the
    next section.'
  id: totrans-2609
  prefs: []
  type: TYPE_NORMAL
  zh: 示例页面是一篇虚构的旅行文章，来自一部文学作品（纳尼亚，C.S.路易斯的幻想系列《纳尼亚传奇》的主要背景），但你也可以使用文章布局来展示许多其他类型的内容：新闻条目、论文、博客文章、评论、传记、历史记载等等。你将在下一节中开始学习如何构建文章布局。
- en: 12.2 Building the article page
  id: totrans-2610
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 12.2 构建文章页面
- en: 'How do you know when an article is the page layout you need? Examine the main
    content you want to display on the page, and ask yourself the following questions:'
  id: totrans-2611
  prefs: []
  type: TYPE_NORMAL
  zh: 你如何知道一篇文章的页面布局是你需要的？检查你想要在页面上显示的主要内容，并问自己以下问题：
- en: Is the writing focused on a single topic?
  id: totrans-2612
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 写作是否专注于单一主题？
- en: Is the writing divided into multiple subtopics?
  id: totrans-2613
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 写作是否被分为多个子主题？
- en: If the answer is “Yes” to both questions, the article layout you learn about
    in this chapter will be a fine showcase for your writing.
  id: totrans-2614
  prefs: []
  type: TYPE_NORMAL
  zh: 如果两个问题的答案都是“是”，那么在本章中你学到的文章布局将是你写作的一个很好的展示。
- en: Before you learn how to lay out a page as an article, you should step back a
    bit and review the HTML page layout elements you’ve encountered in this book’s
    earlier chapters. This will help you understand the overall layout of the article
    page.
  id: totrans-2615
  prefs: []
  type: TYPE_NORMAL
  zh: 在你学习如何将页面布局为文章之前，你应该稍微退后一步，回顾你在本书早期章节中遇到的HTML页面布局元素。这将帮助你理解文章页面的整体布局。
- en: 12.2.1 Reviewing the HTML page layout elements
  id: totrans-2616
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 12.2.1 回顾HTML页面布局元素
- en: 'In most of this book’s projects, the HTML that ChatGPT has generated has laid
    out the page using some or all of the following elements:'
  id: totrans-2617
  prefs: []
  type: TYPE_NORMAL
  zh: 在本书的大部分项目中，ChatGPT生成的HTML使用了以下元素之一或全部来布局页面：
- en: '`header`—Defines a page area that contains introductory content. This content
    is most often the site title (which should be marked up with a heading element,
    such as `h1`), but it can also include things such as a site logo and a tagline.
    Here’s an example (from chapter 9):'
  id: totrans-2618
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`header`—定义一个包含介绍性内容的页面区域。此内容通常是网站标题（应使用标题元素，如`h1`进行标记），但它也可以包括网站标志和标语。以下是一个示例（来自第9章）：'
- en: '[PRE225]'
  id: totrans-2619
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE225]'
- en: '`nav`—Defines a page area that contains navigation content, such as links to
    other sections of the site. This element can be anywhere on the page but typically
    appears right after the page’s `header` element. Here’s an example (from chapter
    6):'
  id: totrans-2620
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`nav`—定义一个包含导航内容的页面区域，例如指向网站其他部分的链接。此元素可以在页面的任何位置，但通常出现在页面的`header`元素之后。以下是一个示例（来自第6章）：'
- en: '[PRE226]'
  id: totrans-2621
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE226]'
- en: '`main`—Creates a container for the content that’s unique to the current page.
    Whereas the `header`, `nav`, and `footer` elements are often common to all or
    most of the pages on the site, the `main` element is meant to mark up the content
    that’s unique. You can have only one `main` element per page. It typically appears
    after the `header` and `nav` elements, as shown here (from chapter 6):'
  id: totrans-2622
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`main`—为当前页面独特的内容创建一个容器。与`header`、`nav`和`footer`元素通常是网站所有或大多数页面的共同元素不同，`main`元素旨在标记独特的内容。每个页面只能有一个`main`元素。它通常出现在`header`和`nav`元素之后，如下所示（来自第6章）：'
- en: '[PRE227]'
  id: totrans-2623
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE227]'
- en: '`section`—Contains any part of a page that you’d want to see in an outline
    of the page. That is, if part of the page consists of a heading element (such
    as `h2` or `h3`) followed by some text, you’ll surround the heading and its text
    with `<section>` and `</section>` tags, like so (from chapter 6):'
  id: totrans-2624
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`section`—包含你希望在页面大纲中看到的页面任何部分。也就是说，如果页面的某个部分由一个标题元素（如`h2`或`h3`）和一些文本组成，你将使用`<section>`和`</section>`标签包围标题及其文本，如下所示（来自第6章）：'
- en: '[PRE228]'
  id: totrans-2625
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE228]'
- en: '`p`—Marks up a chunk of text as a paragraph. A `section` element typically
    consists of one or more paragraphs, although you can also add paragraphs to any
    other element, particularly the `header`, `main`, and `footer` elements.'
  id: totrans-2626
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`p`—将一大块文本标记为段落。`section`元素通常由一个或多个段落组成，尽管你也可以将段落添加到任何其他元素中，特别是`header`、`main`和`footer`元素。'
- en: '`footer`—Defines a page area that contains closing content, such as a copyright
    notice, address, and contact information. Here’s an example (from chapter 4):'
  id: totrans-2627
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`footer`—定义一个包含结尾内容的页面区域，例如版权声明、地址和联系方式。以下是一个示例（来自第4章）：'
- en: '[PRE229]'
  id: totrans-2628
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE229]'
- en: 'Figure 12.2 shows an abstract page layout that demonstrates how these elements
    appear on a page. Notice that it includes two HTML page layout elements I didn’t
    cover in this section: `article` and `aside`. Not surprisingly, the `article`
    element plays a vital role in this chapter’s article page layout, so I cover it
    in detail next.'
  id: totrans-2629
  prefs: []
  type: TYPE_NORMAL
  zh: 图12.2显示了一个抽象页面布局，展示了这些元素在页面上的显示方式。注意，它包括我在本节中没有涵盖的两个HTML页面布局元素：`article`和`aside`。不出所料，`article`元素在本章的文章页面布局中起着至关重要的作用，因此我将在下一节中详细介绍它。
- en: '![](../../OEBPS/Images/CH12_F02_McFedries3.png)'
  id: totrans-2630
  prefs: []
  type: TYPE_IMG
  zh: '![](../../OEBPS/Images/CH12_F02_McFedries3.png)'
- en: Figure 12.2 A conceptual layout that includes the basic HTML layout elements
  id: totrans-2631
  prefs: []
  type: TYPE_NORMAL
  zh: 图12.2 包含基本HTML布局元素的概念布局
- en: 12.2.2 Working with the article element
  id: totrans-2632
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 12.2.2 使用文章元素
- en: 'You use the `article` element to mark up a complete, self-contained composition.
    The model here is a newspaper or magazine article, but this element can also apply
    to a review, a blog entry, a forum post, or an essay. Most pages have a single
    `article` element nested within the `main` element. That `article` element usually
    contains the following:'
  id: totrans-2633
  prefs: []
  type: TYPE_NORMAL
  zh: 你使用`article`元素来标记一个完整、自包含的组成。这里的模型是一篇报纸或杂志文章，但这个元素也可以应用于评论、博客条目、论坛帖子或论文。大多数页面都有一个`article`元素嵌套在`main`元素中。那个`article`元素通常包含以下内容：
- en: A title, usually marked up as a second-level heading (that is, an `h2` element)
  id: totrans-2634
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 标题，通常标记为二级标题（即`h2`元素）
- en: One or more introductory `p` elements (paragraphs)
  id: totrans-2635
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个或多个介绍性的`p`元素（段落）
- en: One or more `section` elements
  id: totrans-2636
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个或多个`section`元素
- en: Within each of those `section` elements, a third level-heading (that is, an
    `h3` element) followed by one or more `p` elements
  id: totrans-2637
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在每个`section`元素内部，一个第三级标题（即`h3`元素）后跟一个或多个`p`元素
- en: 'None of this is set in stone. For example, it’s perfectly fine for an `article`
    element to contain only a title and one or more paragraphs. However, for the purposes
    of this chapter, the article page layout uses these elements. Here’s the generic
    structure you’ll be using:'
  id: totrans-2638
  prefs: []
  type: TYPE_NORMAL
  zh: 以上内容并非一成不变。例如，一个`article`元素只包含标题和一个或多个段落是完全可行的。然而，为了本章的目的，文章页面布局使用这些元素。以下是你会使用的通用结构：
- en: '[PRE230]'
  id: totrans-2639
  prefs: []
  type: TYPE_PRE
  zh: '[PRE230]'
- en: 'In general, you can get ChatGPT to generate the code for an `article` element
    by including an instruction similar to the following in your prompt:'
  id: totrans-2640
  prefs: []
  type: TYPE_NORMAL
  zh: 通常，你可以通过在提示中包含类似于以下指令来让ChatGPT生成`article`元素的代码：
- en: '[PRE231]'
  id: totrans-2641
  prefs: []
  type: TYPE_PRE
  zh: '[PRE231]'
- en: The second new HTML page layout element shown earlier in figure 12.2 is `aside`,
    which you learn about next.
  id: totrans-2642
  prefs: []
  type: TYPE_NORMAL
  zh: 在图12.2中较早展示的第二个新的HTML页面布局元素是`aside`，你将在下一部分了解它。
- en: 12.2.3 Including a sidebar on your page
  id: totrans-2643
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 12.2.3 在你的页面上包含侧边栏
- en: 'You use the `aside` element to mark up a page sidebar area that contains content
    indirectly related to the page’s unique content (in this chapter’s layout, that
    unique content refers to what appears in the `article` element). Here are a few
    use cases for such a sidebar:'
  id: totrans-2644
  prefs: []
  type: TYPE_NORMAL
  zh: 你使用`aside`元素来标记一个包含与页面独特内容间接相关的内容的页面侧边栏区域（在本章的布局中，这个独特内容指的是在`article`元素中显示的内容）。以下是一些此类侧边栏的用例：
- en: A list of links to site pages related to the page’s main content
  id: totrans-2645
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 与页面主要内容相关的网站页面链接列表
- en: The latest site news
  id: totrans-2646
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 最新网站新闻
- en: A social media feed
  id: totrans-2647
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 社交媒体动态
- en: One or more advertisements
  id: totrans-2648
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个或多个广告
- en: 'An `aside` element can appear anywhere within the `main` element (and can appear
    multiple times on the page). In this chapter’s article page layout, the `aside`
    element appears right after the page’s `article` element, as shown in the following
    example:'
  id: totrans-2649
  prefs: []
  type: TYPE_NORMAL
  zh: '`aside`元素可以出现在`main`元素中的任何位置（可以在页面上多次出现）。在本章的文章页面布局中，`aside`元素出现在页面的`article`元素之后，如下例所示：'
- en: '[PRE232]'
  id: totrans-2650
  prefs: []
  type: TYPE_PRE
  zh: '[PRE232]'
- en: 'In general, to have ChatGPT generate the code for an `aside` element, include
    an instruction similar to the following in your prompt:'
  id: totrans-2651
  prefs: []
  type: TYPE_NORMAL
  zh: 通常，为了让ChatGPT生成`aside`元素的代码，你需要在提示中包含类似于以下指令的指令：
- en: '[PRE233]'
  id: totrans-2652
  prefs: []
  type: TYPE_PRE
  zh: '[PRE233]'
- en: As part of this chapter’s more hands-on approach, in the next couple of sections,
    you learn how to add new items to your page rather than asking ChatGPT to generate
    those items.
  id: totrans-2653
  prefs: []
  type: TYPE_NORMAL
  zh: 作为本章更实用的方法的一部分，在接下来的几个部分中，你将学习如何向你的页面添加新项目，而不是让ChatGPT生成这些项目。
- en: 12.2.4 Adding new sections to the article
  id: totrans-2654
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 12.2.4 向文章添加新部分
- en: 'Articles can be either short or long. For a short article, it’s no problem
    to include the text and headings in your ChatGPT prompt and let the model do the
    heavy lifting for you. However, that approach doesn’t work all that well for lengthy
    articles because your prompts end up being extremely long. That length can cause
    two problems:'
  id: totrans-2655
  prefs: []
  type: TYPE_NORMAL
  zh: 文章可以是短篇或长篇。对于短篇文章，将文本和标题包含在ChatGPT提示中，让模型为你做大部分工作是没有问题的。然而，这种方法对于长篇文章来说并不那么有效，因为你的提示最终会变得非常长。这种长度可能导致两个问题：
- en: You may exceed the maximum number of characters allowed in a prompt.
  id: totrans-2656
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你可能超过提示中允许的最大字符数。
- en: The longer the prompt, the more likely it is that ChatGPT will lose its way
    when generating a response.
  id: totrans-2657
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提示越长，ChatGPT在生成回复时迷失方向的可能性就越大。
- en: For these reasons, in this chapter’s project, you’re only going to ask ChatGPT
    to create a skeleton of the page layout. You’ll then put some flesh on those bones
    by adding the rest of the article content by hand.
  id: totrans-2658
  prefs: []
  type: TYPE_NORMAL
  zh: 由于这些原因，在本章的项目中，你只需要让ChatGPT创建页面布局的骨架。然后，你将手动添加剩余的文章内容，为这些骨架添加血肉。
- en: 'The HTML code returned by ChatGPT will look, in part, like this:'
  id: totrans-2659
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT返回的HTML代码部分看起来像这样：
- en: '[PRE234]'
  id: totrans-2660
  prefs: []
  type: TYPE_PRE
  zh: '[PRE234]'
- en: 'Here are the steps to follow to add a new `section` element to the article:'
  id: totrans-2661
  prefs: []
  type: TYPE_NORMAL
  zh: 添加新`section`元素到文章的步骤如下：
- en: 1.  Open the HTML file in a text editor.
  id: totrans-2662
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 在文本编辑器中打开HTML文件。
- en: 2.  Position the cursor immediately after the `<!-- Article content goes here
    -->` text placeholder, as shown in figure 12.3.
  id: totrans-2663
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 将光标置于`<!-- Article content goes here -->`文本占位符之后，如图12.3所示。
- en: '![](../../OEBPS/Images/CH12_F03_McFedries3.png)'
  id: totrans-2664
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../../OEBPS/Images/CH12_F03_McFedries3.png)'
- en: Figure 12.3 Position the cursor as shown here.
  id: totrans-2665
  prefs: []
  type: TYPE_NORMAL
  zh: 图12.3 将光标置于此处所示的位置。
- en: 3.  Press Enter or Return to start a new line.
  id: totrans-2666
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 按下Enter或Return键开始新行。
- en: 4.  Type `<section>`. If you’re using a code editor, it should automatically
    add the `</section>` tag (although you may need to press Tab to make this happen).
    If not, type `</section>`, and then position the cursor between the `<section>`
    and `</section>` tags.
  id: totrans-2667
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 输入`<section>`。如果您使用的是代码编辑器，它应该自动添加`</section>`标签（尽管您可能需要按Tab键来实现这一点）。如果不是，请输入`</section>`并将光标置于`<section>`和`</section>`标签之间。
- en: 5.  Press Enter or Return. You now have a new `section` element ready to go,
    as shown in figure 12.4.
  id: totrans-2668
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 按下Enter或Return键。现在您有一个新的`section`元素准备使用，如图12.4所示。
- en: '![](../../OEBPS/Images/CH12_F04_McFedries3.png)'
  id: totrans-2669
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../../OEBPS/Images/CH12_F04_McFedries3.png)'
- en: Figure 12.4 The new `section` element, ready to be filled in
  id: totrans-2670
  prefs: []
  type: TYPE_NORMAL
  zh: 图12.4 新的`section`元素，准备填充
- en: 6.  Type `<h3>`. If you’re using a code editor, it should automatically add
    the `</h3>` tag (although you may need to press Tab to make this happen). If not,
    type `</h3>` and then position the cursor between the `<h3>` and `</h3>` tags.
  id: totrans-2671
  prefs: []
  type: TYPE_NORMAL
  zh: 6. 输入`<h3>`。如果您使用的是代码编辑器，它应该自动添加`</h3>`标签（尽管您可能需要按Tab键来实现这一点）。如果不是，请输入`</h3>`并将光标置于`<h3>`和`</h3>`标签之间。
- en: 7.  Type the section heading or title, as shown in figure 12.5\. (You’re not
    adding the paragraphs just yet. I cover that in the next section.)
  id: totrans-2672
  prefs: []
  type: TYPE_NORMAL
  zh: 7. 输入部分标题或标题，如图12.5所示。（您现在还没有添加段落。我将在下一节中介绍这一点。）
- en: '![](../../OEBPS/Images/CH12_F05_McFedries3.png)'
  id: totrans-2673
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../../OEBPS/Images/CH12_F05_McFedries3.png)'
- en: Figure 12.5 Type a title or heading for the new section.
  id: totrans-2674
  prefs: []
  type: TYPE_NORMAL
  zh: 图12.5 为新部分输入标题或标题
- en: 8.  To add more sections, position the cursor immediately after the `</section>`
    tag of the `section` element you just added and then follow steps 3 through 7.
  id: totrans-2675
  prefs: []
  type: TYPE_NORMAL
  zh: 8. 要添加更多部分，将光标置于您刚刚添加的`section`元素的`</section>`标签之后，然后按照步骤3到7进行操作。
- en: Your new `section` elements have headings but no text. You’ll remedy that situation
    next.
  id: totrans-2676
  prefs: []
  type: TYPE_NORMAL
  zh: 您的新`section`元素有标题但没有文本。您将在下一节中解决这个问题。
- en: 12.2.5 Adding new paragraphs to the article, section, or aside
  id: totrans-2677
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 12.2.5 在文章、部分或旁白中添加新段落
- en: 'Whether you’re working on your page’s `article` element, any `section` element,
    or the `aside` element, you’ll often need to add another paragraph. Here are the
    steps to do this:'
  id: totrans-2678
  prefs: []
  type: TYPE_NORMAL
  zh: 无论您是在处理页面的`article`元素、任何`section`元素还是`aside`元素，您通常都需要添加另一个段落。以下是完成此操作的步骤：
- en: 1.  Open the HTML file in a text editor.
  id: totrans-2679
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 在文本编辑器中打开HTML文件。
- en: 2.  Position the cursor immediately after the end tag of the element after which
    you want to add the paragraph. For example, if you’re working in a `section` element
    that currently only has an `h3` element heading, you’ll position the cursor immediately
    after the `</h3>` tag, as shown in figure 12.6.
  id: totrans-2680
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 将光标置于您想添加段落的元素的结束标签之后。例如，如果您在一个当前只包含`h3`元素标题的`section`元素中工作，您将光标置于`</h3>`标签之后，如图12.6所示。
- en: '![](../../OEBPS/Images/CH12_F06_McFedries3.png)'
  id: totrans-2681
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../../OEBPS/Images/CH12_F06_McFedries3.png)'
- en: Figure 12.6 Position the cursor after the end tag of the element after which
    you want to add the paragraph.
  id: totrans-2682
  prefs: []
  type: TYPE_NORMAL
  zh: 图12.6 将光标置于您想添加段落的元素的结束标签之后。
- en: 3.  Press Enter or Return to start a new line.
  id: totrans-2683
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 按下Enter或Return键开始新行。
- en: 4.  Type `<p>`. If you’re using a code editor, it should automatically add the
    `</p>` tag (although you may need to press Tab to make this happen). If not, type
    `</p>` and then position the cursor between the `<p>` and `</p>` tags.
  id: totrans-2684
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 输入`<p>`。如果您使用的是代码编辑器，它应该自动添加`</p>`标签（尽管您可能需要按Tab键来实现这一点）。如果不是，请输入`</p>`并将光标置于`<p>`和`</p>`标签之间。
- en: 5.  Press Enter or Return. You now have a new `p` element ready for text, as
    shown in figure 12.7.
  id: totrans-2685
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 按下Enter或Return键。现在您有一个新的`p`元素准备输入文本，如图12.7所示。
- en: '![](../../OEBPS/Images/CH12_F07_McFedries3.png)'
  id: totrans-2686
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../../OEBPS/Images/CH12_F07_McFedries3.png)'
- en: Figure 12.7 The new `p` element, ready for text
  id: totrans-2687
  prefs: []
  type: TYPE_NORMAL
  zh: 图12.7 新的`p`元素，准备输入文本
- en: 6.  Type the paragraph text, as shown in figure 12.8.
  id: totrans-2688
  prefs: []
  type: TYPE_NORMAL
  zh: 6. 输入段落文本，如图12.8所示。
- en: '![](../../OEBPS/Images/CH12_F08_McFedries3.png)'
  id: totrans-2689
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../../OEBPS/Images/CH12_F08_McFedries3.png)'
- en: Figure 12.8 Type a title or heading for the new section.
  id: totrans-2690
  prefs: []
  type: TYPE_NORMAL
  zh: 图12.8 为新部分输入标题或标题。
- en: 7.  For each new paragraph you want to add, position the cursor immediately
    after the current paragraph’s `</p>` tag and then follow steps 3 through 6.
  id: totrans-2691
  prefs: []
  type: TYPE_NORMAL
  zh: 7. 对于你想要添加的每个新段落，将光标置于当前段落的 `</p>` 标签之后，然后按照步骤3到6进行操作。
- en: As you’re typing your paragraph text, you may come across special words or phrases
    that you want the web browser to display in either bold or italics. You learn
    how to do that in the next section.
  id: totrans-2692
  prefs: []
  type: TYPE_NORMAL
  zh: 当你输入段落文本时，你可能会遇到你想要网页浏览器以粗体或斜体显示的特殊单词或短语。你将在下一节中学习如何做到这一点。
- en: 12.2.6 Marking up special words and phrases
  id: totrans-2693
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 12.2.6 标记特殊单词和短语
- en: Certain words or phrases in your text are “special” in the sense that they stand
    apart in some way from the rest of the text. For example, you may want to emphasize
    a particular word, which you’d normally do by formatting the word with italic
    type. Similarly, a particular phrase may be important, so to ensure that the reader
    doesn’t miss it, you’d normally format the phrase using bold type.
  id: totrans-2694
  prefs: []
  type: TYPE_NORMAL
  zh: 你的文本中的某些单词或短语在某种意义上是“特殊”的，因为它们以某种方式与文本的其余部分区分开来。例如，你可能想要强调某个特定的单词，你通常会通过使用斜体格式化单词来实现这一点。同样，一个特定的短语可能很重要，为了确保读者不会错过它，你通常会使用粗体格式化短语。
- en: 'Although it’s certainly possible to instruct ChatGPT to add italics and bold
    where needed, that can be problematic in many circumstances:'
  id: totrans-2695
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然当然可以指示ChatGPT在需要的地方添加斜体和粗体，但在许多情况下可能会出现问题：
- en: Your text may use a word or phrase multiple times.
  id: totrans-2696
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你的文本可能多次使用一个单词或短语。
- en: You may want only the first instance of a word or phrase marked up.
  id: totrans-2697
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你可能只想标记单词或短语的第一实例。
- en: Your text may include many different words or phrases you want marked up.
  id: totrans-2698
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你的文本可能包含许多你想要标记的不同的单词或短语。
- en: In each case, you’d somehow have to find a way to ensure that ChatGPT marked
    up what you wanted, a task that’s not easy to do in practice. Instead, it’s actually
    straightforward to do the marking up yourself manually as you enter your text.
    The next few sections provide the details.
  id: totrans-2699
  prefs: []
  type: TYPE_NORMAL
  zh: 在每种情况下，你都需要找到一种方法来确保ChatGPT标记了你想要的文本，这在实践中并不容易做到。相反，实际上在你输入文本时手动进行标记要简单得多。接下来的几节将提供详细信息。
- en: Marking up important text
  id: totrans-2700
  prefs: []
  type: TYPE_NORMAL
  zh: 标记重要文本
- en: 'On your web page, you may want to be sure the reader sees a particular word,
    phrase, or sentence because it’s important. This text may be a vital instruction,
    a crucial condition, or a similarly significant passage that needs to stand out
    from the regular text because you don’t want the reader to miss it. In HTML, you
    mark text as important by using the `strong` element:'
  id: totrans-2701
  prefs: []
  type: TYPE_NORMAL
  zh: 在你的网页上，你可能想要确保读者看到某个特定的单词、短语或句子，因为它很重要。这段文本可能是一个重要的指令、一个关键条件或类似的具有重大意义的段落，需要从普通文本中突出显示，因为你不希望读者错过它。在HTML中，你通过使用
    `strong` 元素来标记文本为重要：
- en: '[PRE235]'
  id: totrans-2702
  prefs: []
  type: TYPE_PRE
  zh: '[PRE235]'
- en: 'All browsers render the text between the `<strong>` and `</strong>` tags in
    a bold font. The following example shows some web page code with an important
    passage marked up with the `strong` element, and figure 12.9 shows that text displayed
    in bold in the web browser:'
  id: totrans-2703
  prefs: []
  type: TYPE_NORMAL
  zh: 所有浏览器都会将 `<strong>` 和 `</strong>` 标签之间的文本以粗体字体显示。以下示例展示了带有重要段落并使用 `strong` 元素标记的网页代码，图12.9显示了在网页浏览器中显示的粗体文本：
- en: '[PRE236]'
  id: totrans-2704
  prefs: []
  type: TYPE_PRE
  zh: '[PRE236]'
- en: '![](../../OEBPS/Images/CH12_F09_McFedries3.png)'
  id: totrans-2705
  prefs: []
  type: TYPE_IMG
  zh: '![](../../OEBPS/Images/CH12_F09_McFedries3.png)'
- en: Figure 12.9 Text marked up with the `strong` element appears as bold in the
    browser.
  id: totrans-2706
  prefs: []
  type: TYPE_NORMAL
  zh: 图12.9 使用 `strong` 元素标记的文本在浏览器中显示为粗体。
- en: A similar markup scenario is the keyword, discussed next.
  id: totrans-2707
  prefs: []
  type: TYPE_NORMAL
  zh: 类似的标记场景是关键词，将在下文讨论。
- en: Marking up keywords
  id: totrans-2708
  prefs: []
  type: TYPE_NORMAL
  zh: 标记关键词
- en: In some cases, you want to draw attention to a word or phrase not because it’s
    important per se but because the text in question plays a role that makes it different
    from regular text. That text could be a product name, a company name, or an interface
    element, such as the text associated with a check box or command button. Again,
    the text you’re working with isn’t crucial, but it’s different in some way, so
    you want it to look different from the regular page text.
  id: totrans-2709
  prefs: []
  type: TYPE_NORMAL
  zh: 在某些情况下，你想要引起对某个单词或短语的关注，并不是因为它本身很重要，而是因为相关的文本在某种角色上使其与普通文本不同。这种文本可能是一个产品名称、公司名称或界面元素，例如与复选框或命令按钮相关的文本。再次强调，你正在处理的文本本身并不重要，但它以某种方式不同，因此你希望它看起来与普通页面文本不同。
- en: Tip Other candidates for web page keywords include the name of a person (such
    as the infamous “boldface names” that appear in celebrity gossip columns) and
    the first few words or the opening sentence of an article.
  id: totrans-2710
  prefs: []
  type: TYPE_NORMAL
  zh: 小贴士：网页关键词的其他候选包括人名（例如出现在名人八卦专栏中的臭名昭著的“粗体名字”）以及文章的前几个单词或开头句子。
- en: 'Each of these items indicates a *keyword* (or *key phrase*) that has meaning
    beyond the regular page text. In HTML, this type of item is marked up with the
    `b` element:'
  id: totrans-2711
  prefs: []
  type: TYPE_NORMAL
  zh: 这些每一项都表示一个*关键词*（或*关键短语*），它具有超出常规页面文本的意义。在HTML中，这种类型的项目通过使用`b`元素进行标记：
- en: '[PRE237]'
  id: totrans-2712
  prefs: []
  type: TYPE_PRE
  zh: '[PRE237]'
- en: 'Web browsers render the text between the `<b>` and `</b>` tags in a bold font,
    as shown in the following example and figure 12.10:'
  id: totrans-2713
  prefs: []
  type: TYPE_NORMAL
  zh: 网络浏览器将`<b>`和`</b>`标签之间的文本以粗体字体显示，如下面的示例和图12.10所示：
- en: '[PRE238]'
  id: totrans-2714
  prefs: []
  type: TYPE_PRE
  zh: '[PRE238]'
- en: '![](../../OEBPS/Images/CH12_F10_McFedries3.png)'
  id: totrans-2715
  prefs: []
  type: TYPE_IMG
  zh: '![](../../OEBPS/Images/CH12_F10_McFedries3.png)'
- en: Figure 12.10 Keywords marked up with the `b` element appear as bold in the browser.
  id: totrans-2716
  prefs: []
  type: TYPE_NORMAL
  zh: 图12.10 使用`b`元素标记的关键词在浏览器中显示为粗体。
- en: At this point, I imagine you’re scratching your head and wondering what the
    difference is between the `strong` element and the `b` element, because both render
    as bold text. That’s a fair point, and I’ll admit the difference is subtle. I
    should say it’s *semantic* because HTML uses these two separate elements to differentiate
    between important text and keywords. Why bother? Because it’s expected that in
    the future, screen readers and other assistive devices will use this semantic
    distinction to help the visually impaired make sense of web pages.
  id: totrans-2717
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，我想你可能正在挠头，想知道`strong`元素和`b`元素之间的区别，因为两者都显示为粗体文本。这是一个合理的观点，我必须承认区别是微妙的。我应该说是*语义的*，因为HTML使用这两个不同的元素来区分重要文本和关键词。为什么要这么做呢？因为预计将来屏幕阅读器和其他辅助设备将使用这种语义区分来帮助视障人士理解网页。
- en: Marking up emphasized text
  id: totrans-2718
  prefs: []
  type: TYPE_NORMAL
  zh: 标记强调文本
- en: 'It’s often important to emphasize certain words or phrases on a page. This
    emphasis tells the reader to read or say the text with added stress. In HTML,
    you add emphasis to a word or phrase by marking it up with the `em` (for emphasis)
    element:'
  id: totrans-2719
  prefs: []
  type: TYPE_NORMAL
  zh: 在页面上强调某些单词或短语通常很重要。这种强调告诉读者要以加重的语气阅读或说出文本。在HTML中，您可以通过使用`em`（表示强调）元素来标记单词或短语以添加强调：
- en: '[PRE239]'
  id: totrans-2720
  prefs: []
  type: TYPE_PRE
  zh: '[PRE239]'
- en: 'Web browsers render the text between the `<em>` and `</em>` tags in italics,
    as shown in the following example and figure 12.11:'
  id: totrans-2721
  prefs: []
  type: TYPE_NORMAL
  zh: 网络浏览器将`<em>`和`</em>`标签之间的文本以斜体显示，如下面的示例和图12.11所示：
- en: '[PRE240]'
  id: totrans-2722
  prefs: []
  type: TYPE_PRE
  zh: '[PRE240]'
- en: '![](../../OEBPS/Images/CH12_F11_McFedries3.png)'
  id: totrans-2723
  prefs: []
  type: TYPE_IMG
  zh: '![](../../OEBPS/Images/CH12_F11_McFedries3.png)'
- en: Figure 12.11 Text marked up with the `em` element is rendered as italic in the
    browser.
  id: totrans-2724
  prefs: []
  type: TYPE_NORMAL
  zh: 图12.11 使用`em`元素标记的文本在浏览器中显示为斜体。
- en: Note What’s the difference between the `strong` element and the `em` element?
    You use `strong` when the text in question is inherently crucial for the reader;
    you use `em` when the text in question requires enhanced stress to get a point
    across.
  id: totrans-2725
  prefs: []
  type: TYPE_NORMAL
  zh: 注意：`strong`元素和`em`元素之间的区别是什么？当问题中的文本对读者来说本质上至关重要时，您使用`strong`；当问题中的文本需要增强强调以传达观点时，您使用`em`。
- en: Marking up alternative text
  id: totrans-2726
  prefs: []
  type: TYPE_NORMAL
  zh: 标记替代文本
- en: 'It’s common in prose to need markup for a word or phrase to indicate that it
    has a voice, mood, or role that’s different from that of the regular text. Common
    examples of alternative text are book and movie titles. In HTML, this type of
    semantic text is marked up with the `i` (for italics) element:'
  id: totrans-2727
  prefs: []
  type: TYPE_NORMAL
  zh: 在散文中，通常需要标记单词或短语以表明它具有与常规文本不同的声音、语气或角色。常见的替代文本例子包括书籍和电影标题。在HTML中，这种语义文本通过使用`i`（表示斜体）元素进行标记：
- en: '[PRE241]'
  id: totrans-2728
  prefs: []
  type: TYPE_PRE
  zh: '[PRE241]'
- en: Note Other examples of alternative text include publication names, technical
    terms, foreign words and phrases, and a person’s thoughts.
  id: totrans-2729
  prefs: []
  type: TYPE_NORMAL
  zh: 注意：替代文本的其他例子包括出版物名称、技术术语、外语短语以及一个人的想法。
- en: 'Web browsers render such text in italics, as shown in the following example
    and figure 12.12:'
  id: totrans-2730
  prefs: []
  type: TYPE_NORMAL
  zh: 网络浏览器将此类文本以斜体显示，如下面的示例和图12.12所示：
- en: '[PRE242]'
  id: totrans-2731
  prefs: []
  type: TYPE_PRE
  zh: '[PRE242]'
- en: '![](../../OEBPS/Images/CH12_F12_McFedries3.png)'
  id: totrans-2732
  prefs: []
  type: TYPE_IMG
  zh: '![](../../OEBPS/Images/CH12_F12_McFedries3.png)'
- en: Figure 12.12 Alternative text marked up with the `i` element is rendered as
    italic in the browser.
  id: totrans-2733
  prefs: []
  type: TYPE_NORMAL
  zh: 图12.12 使用`i`元素标记的替代文本在浏览器中显示为斜体。
- en: You can nest these text-level elements within other text-level elements for
    extra effect. For example, you can mark up a sentence as important by using the
    `strong` element, and within that sentence, you can mark up a word with emphasis
    by using the `em` element. The browser will render that word as both bold and
    italic.
  id: totrans-2734
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以在其他文本级元素内嵌套这些文本级元素以产生额外效果。例如，你可以通过使用`strong`元素来标记一个句子为重要，并在那个句子中，你可以通过使用`em`元素来标记一个词以强调，浏览器将渲染该词为粗体和斜体。
- en: 12.2.7 Starting the article with a drop cap
  id: totrans-2735
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 12.2.7 以滴管首字母开始文章
- en: 'You can make your articles stand out from the crowd by starting them with a
    *drop cap*: the first letter of the first paragraph, formatted to appear much
    larger than the rest of the paragraph text and positioned so that sits below the
    text baseline and “drops” a few lines into the paragraph. To get ChatGPT to create
    a drop cap for you, include an instruction similar to the following in your prompt:'
  id: totrans-2736
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以通过在文章开头使用*滴管首字母*（第一段的第一字母，格式化后看起来比段落其他文本大得多，并定位在文本基线之下，向下“滴落”几行）来让你的文章脱颖而出。要使ChatGPT为你创建滴管首字母，在你的提示中包含类似以下指令：
- en: '[PRE243]'
  id: totrans-2737
  prefs: []
  type: TYPE_PRE
  zh: '[PRE243]'
- en: 'Here’s the HTML generated by ChatGPT:'
  id: totrans-2738
  prefs: []
  type: TYPE_NORMAL
  zh: 这是ChatGPT生成的HTML：
- en: '[PRE244]'
  id: totrans-2739
  prefs: []
  type: TYPE_PRE
  zh: '[PRE244]'
- en: 'The keys are the `<span>` and `</span>` tags that surround the first letter
    of the paragraph. The `span` element uses the `drop-cap` class, which looks like
    this in the CSS code:'
  id: totrans-2740
  prefs: []
  type: TYPE_NORMAL
  zh: 关键是包围段落第一字母的`<span>`和`</span>`标签。`span`元素使用`drop-cap`类，在CSS代码中看起来如下：
- en: '[PRE245]'
  id: totrans-2741
  prefs: []
  type: TYPE_PRE
  zh: '[PRE245]'
- en: ① Takes the letter out of the regular page flow
  id: totrans-2742
  prefs: []
  type: TYPE_NORMAL
  zh: ① 将字母从常规页面流程中移除
- en: ② Makes the letter big
  id: totrans-2743
  prefs: []
  type: TYPE_NORMAL
  zh: ② 使字母变大
- en: ③ Adjusts the position of the drop cap
  id: totrans-2744
  prefs: []
  type: TYPE_NORMAL
  zh: ③ 调整滴管首字母的位置
- en: ④ Gives the drop cap a bit of space
  id: totrans-2745
  prefs: []
  type: TYPE_NORMAL
  zh: ④ 给滴管首字母留出一些空间
- en: ⑤ Styles the drop cap color
  id: totrans-2746
  prefs: []
  type: TYPE_NORMAL
  zh: ⑤ 设置滴管首字母的颜色
- en: Figure 12.13 shows how the drop cap looks in the browser.
  id: totrans-2747
  prefs: []
  type: TYPE_NORMAL
  zh: 图12.13展示了在浏览器中滴管首字母的显示效果。
- en: '![](../../OEBPS/Images/CH12_F13_McFedries3.png)'
  id: totrans-2748
  prefs: []
  type: TYPE_IMG
  zh: '![](../../OEBPS/Images/CH12_F13_McFedries3.png)'
- en: Figure 12.13 An opening paragraph of an article with a drop cap
  id: totrans-2749
  prefs: []
  type: TYPE_NORMAL
  zh: 图12.13 带有滴管首字母的文章开头段落
- en: Drop caps are a great way to add a professional flair to your web pages. Just
    remember that you only use a drop cap for the first letter of the first paragraph
    of an article.
  id: totrans-2750
  prefs: []
  type: TYPE_NORMAL
  zh: 滴管首字母是给网页增添专业风格的好方法。只需记住，你只为文章第一段的第一字母使用滴管首字母。
- en: 12.2.8 Laying out the article with CSS Grid
  id: totrans-2751
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 12.2.8 使用CSS Grid布局文章
- en: When I introduced Flexbox in chapter 10, I mentioned that the default way the
    web browser lays out HTML block-level elements—including the `header`, `nav`,
    `main`, `section`, `aside`, `footer`, and `p` elements—is by stacking them on
    top of each other. The first block is on top, the second block sits below it,
    the third block goes below that, and so on. It’s not a very inspiring look!
  id: totrans-2752
  prefs: []
  type: TYPE_NORMAL
  zh: 当我在第10章介绍Flexbox时，我提到，默认情况下，网络浏览器通过堆叠它们来布局HTML块级元素，包括`header`、`nav`、`main`、`section`、`aside`、`footer`和`p`元素。第一个块在顶部，第二个块位于其下方，第三个块位于第二个块下方，依此类推。这不是一个非常鼓舞人心的外观！
- en: Flexbox enables you to break out of that default layout in one dimension (horizontally
    *or* vertically), but if you want to lay out your page in two dimensions (horizontally
    *and* vertically), you need to turn to a different layout technique called CSS
    Grid.
  id: totrans-2753
  prefs: []
  type: TYPE_NORMAL
  zh: Flexbox使你能够在一个维度（水平或垂直）中跳出默认布局，但如果你想在两个维度（水平和垂直）中布局你的页面，你需要转向另一种称为CSS Grid的布局技术。
- en: 'The good news about CSS Grid is that you can ask ChatGPT to generate all the
    required code for you by including a simple instruction in the CSS part of your
    prompt:'
  id: totrans-2754
  prefs: []
  type: TYPE_NORMAL
  zh: CSS Grid的好消息是，你可以在提示的CSS部分包含一个简单指令，让ChatGPT为你生成所有必需的代码：
- en: '[PRE246]'
  id: totrans-2755
  prefs: []
  type: TYPE_PRE
  zh: '[PRE246]'
- en: 'That’s it! However, for the purposes of this chapter’s project, I’ll mention
    one important aspect of the CSS Grid code that ChatGPT generates. If you refer
    to figure 12.2, notice these two things:'
  id: totrans-2756
  prefs: []
  type: TYPE_NORMAL
  zh: 就这些！然而，为了本章项目的目的，我会提到ChatGPT生成的CSS Grid代码的一个重要方面。如果你参考图12.2，注意以下两点：
- en: Within the `main` element, the `aside` element is laid out to the right of the
    `article` element.
  id: totrans-2757
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在`main`元素内部，`aside`元素被布局在`article`元素的右侧。
- en: The `article` element takes up more horizontal space than the `aside` element.
  id: totrans-2758
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`article`元素比`aside`元素占用更多的水平空间。'
- en: 'This is all done with CSS Grid. To understand how it works, first examine the
    HTML:'
  id: totrans-2759
  prefs: []
  type: TYPE_NORMAL
  zh: 这一切都是通过CSS Grid完成的。要了解它是如何工作的，首先检查HTML：
- en: '[PRE247]'
  id: totrans-2760
  prefs: []
  type: TYPE_PRE
  zh: '[PRE247]'
- en: 'Normally the web browser would stack the `article` element on top of the `aside`
    element, and both would be the full width of the `main` element. You can break
    out of that default layout with an instruction to ChatGPT similar to the following:'
  id: totrans-2761
  prefs: []
  type: TYPE_NORMAL
  zh: 通常，网络浏览器会将`article`元素堆叠在`aside`元素之上，并且两者都会是`main`元素的全宽。你可以通过向ChatGPT发出类似以下指令来打破这种默认布局：
- en: '[PRE248]'
  id: totrans-2762
  prefs: []
  type: TYPE_PRE
  zh: '[PRE248]'
- en: 'In this case, the resulting CSS Grid code puts the `aside` element to the right
    of the `article` element and adjusts the widths of the elements by defining a
    two-column grid for the `main` element:'
  id: totrans-2763
  prefs: []
  type: TYPE_NORMAL
  zh: 在这种情况下，生成的CSS Grid代码将`aside`元素放置在`article`元素的右侧，并通过为`main`元素定义一个两列网格来调整元素的宽度：
- en: '[PRE249]'
  id: totrans-2764
  prefs: []
  type: TYPE_PRE
  zh: '[PRE249]'
- en: ① Sets up the main element as a grid container
  id: totrans-2765
  prefs: []
  type: TYPE_NORMAL
  zh: ① 将主元素设置为网格容器
- en: ② Divides the grid container into two columns
  id: totrans-2766
  prefs: []
  type: TYPE_NORMAL
  zh: ② 将网格容器分为两列
- en: 'The `article` element comes first in the HTML, so it is assigned to the left
    column, and the `article` element is assigned to the right column. The key here
    is the `2fr 1fr` value for the `grid-template-columns` property. This strange-looking
    value defines the relative widths of the two columns as follows:'
  id: totrans-2767
  prefs: []
  type: TYPE_NORMAL
  zh: '`article`元素在HTML中排在第一位，因此被分配到左侧列，而`article`元素被分配到右侧列。关键在于`grid-template-columns`属性的`2fr
    1fr`值。这个看起来奇怪的值定义了两个列的相对宽度如下：'
- en: Take all the horizontal space available to the `main` element.
  id: totrans-2768
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将`main`元素所有可用的水平空间全部占用。
- en: Divide that horizontal space evenly into three portions.
  id: totrans-2769
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将那个水平空间平均分成三部分。
- en: Give two of those portions to the first column.
  id: totrans-2770
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将其中两部分分配给第一列。
- en: Give the remaining portion to the second column.
  id: totrans-2771
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将剩余的部分分配给第二列。
- en: 'This gives you a bit of freedom to adjust these relative widths to suit your
    own page. For example, if you’d prefer that the `article` element have three units
    of the available space and the `aside` element just one unit, you can modify the
    rule like so:'
  id: totrans-2772
  prefs: []
  type: TYPE_NORMAL
  zh: 这给你一些自由度来调整这些相对宽度以适应你自己的页面。例如，如果你希望`article`元素有三个可用空间单位，而`aside`元素只有一个单位，你可以按如下方式修改规则：
- en: '[PRE250]'
  id: totrans-2773
  prefs: []
  type: TYPE_PRE
  zh: '[PRE250]'
- en: As you learn in the next section, although CSS Grid makes your page responsive
    to browser window size changes, it’s not quite enough to make the article page
    display well on all screens.
  id: totrans-2774
  prefs: []
  type: TYPE_NORMAL
  zh: 正如你在下一节中学习的那样，尽管CSS Grid可以使你的页面对浏览器窗口大小的变化做出响应，但它并不足以使文章页面在所有屏幕上显示良好。
- en: 12.2.9 Adjusting the article page layout for small screens
  id: totrans-2775
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 12.2.9 调整小屏幕上的文章页面布局
- en: The `fr` units I introduced in the previous section are known as *relative*
    measurements because the value of, say, `1fr` depends on the available width (assuming
    you’re working with grid columns) in the grid container. This makes your page
    responsive because when the width of the grid container changes (perhaps because
    the width of the browser window changes), the widths of the columns change automatically
    relative to the new width.
  id: totrans-2776
  prefs: []
  type: TYPE_NORMAL
  zh: 我在上一节中引入的`fr`单位被称为*相对*测量，因为例如`1fr`的值取决于网格容器中可用的宽度（假设你在使用网格列）。这使得你的页面具有响应性，因为当网格容器的宽度改变时（可能是因为浏览器窗口的宽度改变），列的宽度会自动相对于新的宽度进行改变。
- en: That works well for relatively large screens (say, tablets, laptops, and desktops),
    but it can be a problem on small screens, such as a smartphone in portrait mode.
    To understand what I mean, examine figure 12.14, which is this chapter’s article
    page displayed on a smartphone. Notice in particular that the two columns are
    narrow, making the text difficult to read.
  id: totrans-2777
  prefs: []
  type: TYPE_NORMAL
  zh: 这对于相对较大的屏幕（例如平板电脑、笔记本电脑和台式机）来说效果很好，但在小屏幕上，例如纵向模式的智能手机上，可能会出现问题。为了理解我的意思，请查看图12.14，这是本章的文章页面在智能手机上的显示。特别注意，两列都很窄，这使得文本难以阅读。
- en: '![](../../OEBPS/Images/CH12_F14_McFedries3.png)'
  id: totrans-2778
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../../OEBPS/Images/CH12_F14_McFedries3.png)'
- en: Figure 12.14 On a smartphone screen, the text columns can become too narrow
    for comfortable reading.
  id: totrans-2779
  prefs: []
  type: TYPE_NORMAL
  zh: 图12.14 在智能手机屏幕上，文本列可能会变得太窄，难以舒适阅读。
- en: This may seem like an unsolvable problem, but with CSS you can create what’s
    known as an *adaptive layout*, which is a layout that changes its properties based
    on some feature of the device screen, such as its width. With an adaptive layout,
    you can solve the problem shown in figure 12.14 by asking questions about the
    width of the browser viewport (the part of the browser window that displays the
    web page).
  id: totrans-2780
  prefs: []
  type: TYPE_NORMAL
  zh: 这可能看起来像是一个无法解决的问题，但使用CSS你可以创建一个所谓的*自适应布局*，这是一种根据设备屏幕的某些特性（如宽度）改变其属性的布局。通过自适应布局，你可以通过询问浏览器视口（浏览器窗口中显示网页的部分）的宽度来解决问题，如图12.14所示。
- en: For example, you may ask, “Is the viewport width less than 500 pixels?” If the
    answer is no, you leave the layout as it is; if the answer is yes, you can tell
    the browser to display the article as a single column, where the `aside` element
    comes after the `article` element but both take up the full width of the screen.
  id: totrans-2781
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，您可能会问：“视口宽度小于500像素吗？”如果答案是“否”，则保持布局不变；如果答案是“是”，您可以告诉浏览器将文章显示为单列，其中`aside`元素位于`article`元素之后，但两者都占据整个屏幕宽度。
- en: You can ask these and many other types of questions by defining media queries
    in your CSS. A *media query* is an expression accompanied by a code block consisting
    of one or more style rules. The expression interrogates some feature of the screen,
    such as its width. If that expression is true for the current device, the browser
    applies the media query’s style rules; if the expression is false, the browser
    ignores the media query’s rules.
  id: totrans-2782
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以通过在CSS中定义媒体查询来提出这些以及其他许多类型的问题。一个*媒体查询*是一个表达式，后面跟着一个包含一个或多个样式规则的代码块。该表达式询问屏幕的某些特性，例如其宽度。如果该表达式对当前设备为真，则浏览器应用媒体查询的样式规则；如果表达式为假，则浏览器忽略媒体查询的规则。
- en: 'Here’s the general syntax for a media query:'
  id: totrans-2783
  prefs: []
  type: TYPE_NORMAL
  zh: 媒体查询的一般语法如下：
- en: '[PRE251]'
  id: totrans-2784
  prefs: []
  type: TYPE_PRE
  zh: '[PRE251]'
- en: 'The `expression` is most often `min-width` or `max-width` followed by a colon
    and a value. For example, if you want to apply styles on a screen no wider than
    a specified value, use `max-width`. The following code tells the browser to display
    the `main` element as a one-column grid whenever the screen width is less than
    or equal to 500 px:'
  id: totrans-2785
  prefs: []
  type: TYPE_NORMAL
  zh: '`expression`通常为`min-width`或`max-width`，后面跟一个冒号和一个值。例如，如果您想要在屏幕宽度不超过指定值的情况下应用样式，请使用`max-width`。以下代码告诉浏览器，当屏幕宽度小于或等于500
    px时，将`main`元素显示为单列网格：'
- en: '[PRE252]'
  id: totrans-2786
  prefs: []
  type: TYPE_PRE
  zh: '[PRE252]'
- en: 'To ask ChatGPT to include a media query in your CSS code, you include an instruction
    such as the following in your prompt:'
  id: totrans-2787
  prefs: []
  type: TYPE_NORMAL
  zh: 要让ChatGPT在您的CSS代码中包含媒体查询，您可以在提示中包含如下指令：
- en: '[PRE253]'
  id: totrans-2788
  prefs: []
  type: TYPE_PRE
  zh: '[PRE253]'
- en: 'Similarly, if you want to apply styles on a screen that’s at least as wide
    as a specified value, use `min-width`. The following code sets the font size on
    the `h1` element whenever the screen width is greater than or equal to 1,024 px:'
  id: totrans-2789
  prefs: []
  type: TYPE_NORMAL
  zh: 类似地，如果您想要在屏幕宽度至少等于指定值的情况下应用样式，请使用`min-width`。以下代码在屏幕宽度大于或等于1,024 px时设置`h1`元素的字体大小：
- en: '[PRE254]'
  id: totrans-2790
  prefs: []
  type: TYPE_PRE
  zh: '[PRE254]'
- en: 'To ask ChatGPT to include this media query in your CSS code, you include an
    instruction such as the following in your prompt:'
  id: totrans-2791
  prefs: []
  type: TYPE_NORMAL
  zh: 要让ChatGPT在您的CSS代码中包含此媒体查询，您可以在提示中包含如下指令：
- en: '[PRE255]'
  id: totrans-2792
  prefs: []
  type: TYPE_PRE
  zh: '[PRE255]'
- en: Later, after I show you the final article page layout (refer to figure 12.16),
    I’ll also show you how the page displays on a smartphone (figure 12.17) to verify
    that the page has, indeed, adapted to the smaller screen by switching to a one-column
    layout.
  id: totrans-2793
  prefs: []
  type: TYPE_NORMAL
  zh: 之后，在我向您展示最终的文章页面布局（参见图12.16）之后，我还会向您展示页面在智能手机上的显示方式（图12.17），以验证页面确实通过切换到单列布局来适应较小的屏幕。
- en: Now you know everything you need to prompt ChatGPT to build an article page,
    as described in the following section.
  id: totrans-2794
  prefs: []
  type: TYPE_NORMAL
  zh: 现在您已经知道如何提示ChatGPT构建文章页面，如以下章节所述。
- en: 12.2.10 Crafting the prompt for the article page
  id: totrans-2795
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 12.2.10 为文章页面制作提示
- en: 'This chapter’s project is an article page that displays a travel guide for
    a place from a work of literature. Before proceeding, I assume you have the following
    at hand:'
  id: totrans-2796
  prefs: []
  type: TYPE_NORMAL
  zh: 本章的项目是一个显示文学作品中某个地方旅行指南的文章页面。在继续之前，我假设您已经准备好了以下内容：
- en: The header content, such as the website logo, title, and tagline
  id: totrans-2797
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 头部内容，例如网站标志、标题和标语
- en: The Google Fonts typefaces you want to use for the headings and text
  id: totrans-2798
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 您想要用于标题和文本的Google Fonts字体样式
- en: The keywords of the colors you want to use for the page backgrounds and text
  id: totrans-2799
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 您想要用于页面背景和文本的颜色关键词
- en: Refer to chapter 3 to learn more about each of these design elements and how
    to prompt ChatGPT for title, typeface, and color suggestions.
  id: totrans-2800
  prefs: []
  type: TYPE_NORMAL
  zh: 参考第3章以了解更多关于这些设计元素的信息，以及如何提示ChatGPT获取标题、字体和颜色建议。
- en: 'To start your prompt, tell ChatGPT that you want to construct a web page and
    that you want it to generate the code for you:'
  id: totrans-2801
  prefs: []
  type: TYPE_NORMAL
  zh: 要开始您的提示，告诉ChatGPT您想要构建一个网页，并且希望它为您生成代码：
- en: '[PRE256]'
  id: totrans-2802
  prefs: []
  type: TYPE_PRE
  zh: '[PRE256]'
- en: 'Now go through the page content, item by item, including the following (refer
    to figure 12.15):'
  id: totrans-2803
  prefs: []
  type: TYPE_NORMAL
  zh: 现在逐项检查页面内容，包括以下内容（参见图12.15）：
- en: A header that includes your website logo, title, and tagline
  id: totrans-2804
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 包含您的网站标志、标题和标语的头像
- en: A navigation element with links to other site areas
  id: totrans-2805
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 包含指向网站其他区域的链接的导航元素
- en: A main element that includes an `article` element and an `aside` element arranged
    in two columns
  id: totrans-2806
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 包含一个`article`元素和一个`aside`元素，这两个元素排列在两列中的主元素
- en: A footer that includes a copyright notice
  id: totrans-2807
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 包含版权声明的页脚
- en: '![](../../OEBPS/Images/CH12_F15_McFedries3.png)'
  id: totrans-2808
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../../OEBPS/Images/CH12_F15_McFedries3.png)'
- en: Figure 12.15 The sections of the article page
  id: totrans-2809
  prefs: []
  type: TYPE_NORMAL
  zh: 图12.15 文章页面的部分
- en: Notice that in this project, you’re not going to include the page content—that
    is, the sections and paragraphs that form the article and the paragraphs that
    form the sidebar—in your prompt. Instead, once you have the page skeleton shown
    in figure 12.15, you’ll add the content manually, as I explain in section 12.3.
  id: totrans-2810
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，在这个项目中，你不会在你的提示中包含页面内容——即构成文章的章节和段落以及构成侧边的段落。相反，一旦你有了图12.15所示的页面骨架，你将手动添加内容，正如我在第12.3节中解释的那样。
- en: 'Next, ask ChatGPT to generate the CSS:'
  id: totrans-2811
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，要求ChatGPT生成CSS：
- en: '[PRE257]'
  id: totrans-2812
  prefs: []
  type: TYPE_PRE
  zh: '[PRE257]'
- en: 'You then specify the page formatting, including the following:'
  id: totrans-2813
  prefs: []
  type: TYPE_NORMAL
  zh: 然后你指定页面格式，包括以下内容：
- en: The page background color and text color
  id: totrans-2814
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 页面背景颜色和文本颜色
- en: The type sizes you want to use for the headings and page text
  id: totrans-2815
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你想要用于标题和页面文本的字体大小
- en: The fonts to use for the headings and regular page text
  id: totrans-2816
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 用于标题和常规页面文本的字体
- en: That the layout should use CSS Grid
  id: totrans-2817
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 布局应使用CSS Grid
- en: That the layout should adapt to smaller screens
  id: totrans-2818
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 布局应适应较小的屏幕
- en: 'Here’s an example prompt for my own article page:'
  id: totrans-2819
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是一个为我自己的文章页面提供的示例提示：
- en: '[PRE258]'
  id: totrans-2820
  prefs: []
  type: TYPE_PRE
  zh: '[PRE258]'
- en: I used Copilot in Precise mode to submit my prompt. The generated code produced
    the page shown in figure 12.16.
  id: totrans-2821
  prefs: []
  type: TYPE_NORMAL
  zh: 我使用Copilot的精确模式提交了我的提示。生成的代码生成了图12.16所示的页面。
- en: '![](../../OEBPS/Images/CH12_F16_McFedries3.png)'
  id: totrans-2822
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../../OEBPS/Images/CH12_F16_McFedries3.png)'
- en: Figure 12.16 My article page before adding the content
  id: totrans-2823
  prefs: []
  type: TYPE_NORMAL
  zh: 图12.16 添加内容前的我的文章页面
- en: 'Figure 12.16 shows how the page looks on a desktop monitor. To check that the
    media query in the prompt is working properly, you need to load the page using
    a smartphone browser, as shown in figure 12.17\. In this case, the media query
    has adapted the page as follows:'
  id: totrans-2824
  prefs: []
  type: TYPE_NORMAL
  zh: 图12.16显示了在桌面显示器上的页面外观。为了检查提示中的媒体查询是否正常工作，你需要使用智能手机浏览器加载页面，如图12.17所示。在这种情况下，媒体查询已按以下方式调整页面：
- en: The header is now a one-column grid container.
  id: totrans-2825
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 现在的页眉是一个一列的网格容器。
- en: The maximum size of the site logo has been reduced.
  id: totrans-2826
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 网站标志的最大尺寸已被减小。
- en: The font size of the site title and tagline have been reduced.
  id: totrans-2827
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 网站标题和标语标签的字体大小已被减小。
- en: The main element is now a one-column grid container.
  id: totrans-2828
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 主元素现在是一个一列的网格容器。
- en: '![](../../OEBPS/Images/CH12_F17_McFedries3.png)'
  id: totrans-2829
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../../OEBPS/Images/CH12_F17_McFedries3.png)'
- en: Figure 12.17 The article skeleton adapted to a smartphone screen via a media
    query
  id: totrans-2830
  prefs: []
  type: TYPE_NORMAL
  zh: 图12.17 通过媒体查询将文章骨架调整为智能手机屏幕
- en: With the code of the skeleton article page copied to your text editor, your
    next task is to fill in the missing content.
  id: totrans-2831
  prefs: []
  type: TYPE_NORMAL
  zh: 将骨架文章页面的代码复制到你的文本编辑器后，你的下一个任务是填写缺失的内容。
- en: 12.3 Adding content to the page
  id: totrans-2832
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 12.3 向页面添加内容
- en: 'The HTML code generated by ChatGPT includes the basic page tags and text, but
    it’s missing the most important parts: the content for the `article` and `aside`
    elements. To complete your page, you need to load index.xhtml into your text editor
    and then add the content manually.'
  id: totrans-2833
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT生成的HTML代码包括基本的页面标签和文本，但它缺少最重要的部分：`article`和`aside`元素的内容。为了完成你的页面，你需要将index.xhtml加载到你的文本编辑器中，然后手动添加内容。
- en: 'First, to add your article content, examine the HTML code to look for the following
    tags:'
  id: totrans-2834
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，为了添加你的文章内容，检查HTML代码以查找以下标签：
- en: '[PRE259]'
  id: totrans-2835
  prefs: []
  type: TYPE_PRE
  zh: '[PRE259]'
- en: 'The key line here is `<!-- Article content goes here -->`, which is a placeholder
    for the article content. (The tags `<!--` and `-->` create a *comment*, which
    is text that describes the HTML code but doesn’t appear when the page is displayed
    in the browser.) You type your content below that line. In most cases, you’ll
    add the following:'
  id: totrans-2836
  prefs: []
  type: TYPE_NORMAL
  zh: 这里的关键行是`<!-- Article content goes here -->`，这是文章内容的占位符。（标签`<!--`和`-->`创建了一个*注释*，这是描述HTML代码的文本，但在浏览器中显示页面时不会出现。）你将在该行下方输入你的内容。在大多数情况下，你将添加以下内容：
- en: A set of `<p>` and `</p>` tags below the article title (the `h2` element) and
    the text for your article introduction between those tags. Feel free to add two
    or more such paragraphs as needed.
  id: totrans-2837
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在文章标题（`h2`元素）下方的一组`<p>`和`</p>`标签以及你的文章介绍在这些标签之间的文本。根据需要，你可以添加两个或更多这样的段落。
- en: After the introductory paragraph (or paragraphs), add one or more `section`
    elements, each of which has a third-level (`h3`) heading, followed by one or more
    paragraphs (with each one between a set of `<p>` and `</p>` tags).
  id: totrans-2838
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在引言段落（或段落）之后，添加一个或多个`section`元素，每个元素都有一个三级（`h3`）标题，后面跟着一个或多个段落（每个段落都位于一对`<p>`和`</p>`标签之间）。
- en: 'Once your article is complete, add your sidebar content. To begin, examine
    the HTML code to look for the following tags:'
  id: totrans-2839
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦你的文章完成，添加你的侧边栏内容。首先，检查HTML代码以查找以下标签：
- en: '[PRE260]'
  id: totrans-2840
  prefs: []
  type: TYPE_PRE
  zh: '[PRE260]'
- en: Again, the important line here is `<!—Related guides go here -->` (your text
    will be different depending on the heading you used in your prompt). This line
    is a placeholder for the `aside` content. You type your content below that line,
    and your content may be a set of paragraphs, a list of links, or something else
    related to the article. Feel free to add new `h3` elements as needed by your content.
    Figure 12.18 shows the top part of my article page fleshed out with content.
  id: totrans-2841
  prefs: []
  type: TYPE_NORMAL
  zh: 再次强调，这里的重要行是`<!—相关指南放在这里 -->`（你的文本将根据你在提示中使用的标题而有所不同）。这一行是`aside`内容的占位符。你可以在该行下方输入你的内容，你的内容可能是一系列段落、链接列表或其他与文章相关的信息。根据需要，你可以自由添加新的`h3`元素。图12.18显示了添加了内容的文章页面的顶部部分。
- en: '![](../../OEBPS/Images/CH12_F18_McFedries3.png)'
  id: totrans-2842
  prefs: []
  type: TYPE_IMG
  zh: '![](../../OEBPS/Images/CH12_F18_McFedries3.png)'
- en: Figure 12.18 My article page, now with added content
  id: totrans-2843
  prefs: []
  type: TYPE_NORMAL
  zh: 图12.18 我的文章页面，现在已添加了内容
- en: If you’re happy with your article page, you may prefer to skip the rest of this
    chapter and deploy your page to the web (as I describe in appendix B). If you
    want to know more about the article page code, keep reading.
  id: totrans-2844
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你对自己的文章页面满意，你可能更喜欢跳过本章的其余部分，并将你的页面部署到网络上（如附录B中所述）。如果你想了解更多关于文章页面代码的信息，请继续阅读。
- en: 12.4 Examining the article page code
  id: totrans-2845
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 12.4 检查文章页面代码
- en: The next two sections offer annotated guides to the HTML and CSS code behind
    the article skeleton page shown earlier in figures 12.16 and 12.17\. I’ll begin
    in the next section with the HTML code.
  id: totrans-2846
  prefs: []
  type: TYPE_NORMAL
  zh: '下一两个部分提供了对之前在图12.16和12.17中显示的文章骨架页面的HTML和CSS代码的注释指南。我将在下一节中从HTML代码开始。 '
- en: 'Note The generated HTML and CSS code for my article page are available on this
    book’s website ([www.manning.com/books/build-a-website-with-chatgpt](https://www.manning.com/books/build-a-website-with-chatgpt))
    and in the book’s GitHub repository: [https://github.com/paulmcfe/websites-with-chatgpt](https://github.com/paulmcfe/websites-with-chatgpt).'
  id: totrans-2847
  prefs: []
  type: TYPE_NORMAL
  zh: 注意：我文章页面的生成的HTML和CSS代码可在本书的网站上找到（[www.manning.com/books/build-a-website-with-chatgpt](https://www.manning.com/books/build-a-website-with-chatgpt)）以及本书的GitHub仓库中：[https://github.com/paulmcfe/websites-with-chatgpt](https://github.com/paulmcfe/websites-with-chatgpt)。
