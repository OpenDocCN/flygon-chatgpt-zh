- en: DALL·E Prompt Engineering and Best Practices
  id: totrans-719
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: DALL·E 提示工程和最佳实践
- en: Now, creating images with DALL⋅E takes prompt engineering in order to get consistent,
    desired results, and it’s a good idea to play around with different prompts to
    get some practice to see what works for you and your use case. Maybe you prefer
    paintings instead of 3D looking images? Maybe you need photos instead of digital
    art? Maybe you want the image to be a close-up shot instead of a portrait? There’s
    a lot of possibilities to consider.
  id: totrans-720
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，使用 DALL⋅E 创建图像需要提示工程，以获得一致、理想的结果，尝试不同的提示以获得一些练习，看看哪些对你和你的用例有效。也许你更喜欢画作而不是看起来像3D的图像？也许你需要照片而不是数字艺术？也许你想要图像是特写而不是肖像？有很多可能性需要考虑。
- en: Regardless of your use case, here are two golden rules in order to get the most
    out of your DALL⋅E prompts.
  id: totrans-721
  prefs: []
  type: TYPE_NORMAL
  zh: 无论你的用例如何，以下两条金规则可以帮助你最大限度地发挥 DALL⋅E 提示的作用。
- en: 'DALL·E Golden Rule #1: Get Familiar with the Types of Images that DALL·E Can
    Generate'
  id: totrans-722
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 'DALL·E 金规则 #1：熟悉DALL·E可以生成的图像类型'
- en: 'First and foremost, one of the most important things that DALL⋅E needs to understand
    is the type of image that needs to be generated. Here’s a list of several of the
    most common types of images that DALL⋅E is able to create:'
  id: totrans-723
  prefs: []
  type: TYPE_NORMAL
  zh: 首先也是最重要的，DALL⋅E 需要理解的是需要生成的图像类型。以下是一些 DALL⋅E 能够创建的最常见的图像类型列表：
