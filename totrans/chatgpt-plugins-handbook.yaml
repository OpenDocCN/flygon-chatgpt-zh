- en: Zoom
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: ChatGPT plugin for Zoom is called Zoom IQ Developed by Zoom in collaboration
    with OpenAI, users can leverage ChatGPT's natural language processing capabilities
    and create creative content in Zoom meetings.
  prefs: []
  type: TYPE_NORMAL
- en: 'Zoom IQ has the following main features:'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: '● Meeting Summary: Zoom IQ can automatically summarize meetings. You can choose
    the length and tone of the summary as desired.'
  prefs: []
  type: TYPE_NORMAL
- en: '● Idea generation: Zoom IQ can help generate new ideas. In a presentation or
    meeting Users can enter the topic or question they want.'
  prefs: []
  type: TYPE_NORMAL
- en: '● Meeting Recording: Zoom IQ can record meetings automatically. and automatically
    create meeting annotations'
  prefs: []
  type: TYPE_NORMAL
- en: 'How to install Zoom IQ from the ChatGPT plugin store:'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 1\. Go to the ChatGPT plugin store website.
  prefs: []
  type: TYPE_NORMAL
- en: 2\. Find the Zoom IQ plugin.
  prefs: []
  type: TYPE_NORMAL
- en: 3\. Click the "Install" button.
  prefs: []
  type: TYPE_NORMAL
- en: 4\. Log in to Zoom with your account.
  prefs: []
  type: TYPE_NORMAL
- en: 5\. Open a Zoom meeting
  prefs: []
  type: TYPE_NORMAL
- en: 6\. Click the "Zoom IQ" icon in the lower-right corner of the screen.
  prefs: []
  type: TYPE_NORMAL
- en: 'Examples of using Zoom IQ are as follows:'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: '● Meeting Summary : Users can open a Zoom meeting and begin the meeting as
    normal. To summarize a meeting, click the "Zoom IQ" icon and select the desired
    summary length and tone, and Zoom IQ will automatically generate a meeting summary.'
  prefs: []
  type: TYPE_NORMAL
- en: '● Idea generation : Users can open a Zoom meeting and start the meeting as
    normal. To generate new ideas, click the "Zoom IQ" icon and enter a topic or question,
    and Zoom IQ will generate new ideas.'
  prefs: []
  type: TYPE_NORMAL
- en: '● Meeting Recording : Users can open a Zoom meeting and start the meeting as
    normal. To record a meeting, click the "Zoom IQ" icon and Zoom IQ will automatically
    record the meeting. and automatically create meeting annotations'
  prefs: []
  type: TYPE_NORMAL
- en: 'An example prompt command that is unique to the previous plugin is as follows:'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: '● Summary of the meeting, highlighting key points: "Summary ofthemeetingbyhighlightingimportantpoints"'
  prefs: []
  type: TYPE_NORMAL
- en: '● Summary of the meeting by including everyone''s opinions: "Summarizethemeetingbyincludingeveryone''sopinions."'
  prefs: []
  type: TYPE_NORMAL
- en: '● Record meetings and automatically create meeting annotations: "Recordmeetingsandautomaticallycreate
    meetingannotations"'
  prefs: []
  type: TYPE_NORMAL
