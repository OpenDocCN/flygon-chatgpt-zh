    ****t**he** ****go**al** ****i**s** ****t**o** ****gen**erat**e ****a**s** ****ma**ny**
    ****id**eas** ****a**s** ****pos**sibl**e, ****wit**hou**t ****init**iall**y ****wor**ryin**g
    ****ab**out** ****qua**lit**y.
  id: totrans-1312
  prefs: []
  type: TYPE_NORMAL
  zh: ● 从一个初始轮开始，目标是尽可能多地生成想法，而不必一开始就担心质量。
- en: ● ****I**n** ****ea**ch** ****subs**equen**t ****iter**atio**n, ****a**sk**
    ****t**he** ****L**LM** ****t**o** ****imp**rov**e ****o**r** ****ex**pan**d ****o**n**
    ****t**he** ****id**eas**, ****sugg**estin**g ****wa**ys** ****t**o** ****ma**ke**
    ****th**em** ****mo**re** ****prac**tica**l ****o**r** ****un**iqu**e.
  id: totrans-1313
  prefs: []
  type: TYPE_NORMAL
  zh: ● 在每次后续迭代中，要求LLM改进或扩展想法，提出使它们更实用或更独特的方法。
