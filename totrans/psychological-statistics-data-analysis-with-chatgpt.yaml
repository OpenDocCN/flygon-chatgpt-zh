  type: TYPE_NORMAL
  zh: ●      学校C：0.520 → 中等正相关。
- en: '![グラフ, 散布図  AI によって生成されたコンテンツは間違っている可能性があります。](image_rsrc23N.jpg)![グラフ, 散布図  AI
