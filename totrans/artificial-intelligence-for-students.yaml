    with a particular theme.'
  id: totrans-974
  prefs: []
  type: TYPE_NORMAL
  zh: 每日词汇挑战：每天向ChatGPT询问与特定主题相关的五个单词。
- en: 'Grammar Workouts: Practice with ChatGPT''s fill-in-the-blank exercises.'
  id: totrans-975
  prefs: []
  type: TYPE_NORMAL
  zh: 语法练习：使用ChatGPT的填空练习进行练习。
- en: Simple paragraphs should be translated into your target language and compared
    to ChatGPT's recommendations.
  id: totrans-976
  prefs: []
  type: TYPE_NORMAL
  zh: 将简单的段落翻译成你的目标语言，并与ChatGPT的建议进行比较。
- en: 'Mock Scenarios: Act out conversations such as placing an order, requesting
    directions, or making an introduction.'
  id: totrans-977
  prefs: []
  type: TYPE_NORMAL
  zh: 模拟场景：扮演订餐、请求方向或自我介绍的对话。
- en: Important Takeaways
  id: totrans-978
  prefs: []
  type: TYPE_NORMAL
  zh: 重要要点。
- en: By serving as a private tutor, ChatGPT can make language learning easier.
  id: totrans-979
  prefs: []
  type: TYPE_NORMAL
  zh: 通过担任私人教师，ChatGPT可以使语言学习更容易。
- en: It offers helpful resources for improving pronunciation, explaining grammar,
    and expanding one's vocabulary.
  id: totrans-980
  prefs: []
  type: TYPE_NORMAL
  zh: 它提供了有助于提高发音、解释语法和扩大词汇量的有用资源。
- en: Quizzes and role-playing are examples of interactive elements that make learning
    enjoyable and useful.
  id: totrans-981
  prefs: []
  type: TYPE_NORMAL
  zh: 问答和角色扮演是使学习变得有趣和有用的互动元素示例。
- en: 'chapter 17:'
  id: totrans-982
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第17章：
- en: 'History and Literature: Study Guides with AI'
  id: totrans-983
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 历史与文学：使用人工智能的学习指南。
- en: '**1\. Introduction: Making Literature and History Simpler**'
  id: totrans-984
  prefs: []
  type: TYPE_NORMAL
  zh: '**1. 简介：使文学和历史变得简单**'
- en: Because of the sheer volume of material they cover, history and literature are
    frequently seen as vast and intimidating. However, by summarizing significant
    historical occurrences, evaluating literature, and assisting students in easily
    preparing for essay-based tests, AI tools can make these subjects simpler.
  id: totrans-985
  prefs: []
  type: TYPE_NORMAL
  zh: 由于它们涵盖的材料量很大，历史和文学通常被视为浩瀚且令人畏惧。然而，通过总结重大历史事件，评估文学，并帮助学生轻松准备基于论文的考试，人工智能工具可以使这些学科变得简单。
- en: This chapter looks at how AI can simplify complicated data into digestible insights.
  id: totrans-986
  prefs: []
  type: TYPE_NORMAL
  zh: 本章探讨人工智能如何将复杂的数据简化为可消化的洞察。
- en: Techniques for efficiently summarizing literature and historical events.
  id: totrans-987
  prefs: []
  type: TYPE_NORMAL
  zh: 效率总结文献和历史事件的技巧。
- en: Resources to help you do well on tests that require essays.
  id: totrans-988
  prefs: []
  type: TYPE_NORMAL
  zh: 帮助你在需要论文的考试中取得好成绩的资源。
- en: '**2\. Using AI to Summarize Historical Events**'
  id: totrans-989
  prefs: []
  type: TYPE_NORMAL
  zh: '**2. 使用人工智能总结历史事件**'
- en: AI technologies can give succinct summaries of historical events, which helps
    students and teachers concentrate on the important details.
  id: totrans-990
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能技术可以对历史事件给出简洁的总结，这有助于学生和教师专注于重要细节。
- en: '**A. Key Features of AI in History Summarization:** - **Timeline Generation:**
    AI can generate timelines of events that chronologically include important details.'
  id: totrans-991
  prefs: []
  type: TYPE_NORMAL
  zh: '**A. 人工智能在历史总结中的关键特性**：- **时间线生成**：人工智能可以生成包含重要细节的时间线。'
- en: AI explains the causes of events and their effects through a process known as
    "cause-and-effect analysis."
  id: totrans-992
  prefs: []
  type: TYPE_NORMAL
  zh: 通过“因果关系分析”的过程，人工智能解释事件的原因及其影响。
- en: '**Thematic Summaries:** Organizing events according to themes such as wars,
    revolutions, or cultural movements.'
  id: totrans-993
  prefs: []
  type: TYPE_NORMAL
  zh: '**主题总结**：根据战争、革命或文化运动等主题组织事件。'
- en: '- **Event:** The French Revolution - **AI Synopsis:** - **Example Use Case:**
    a period of political and social change (1789–1799) that brought democracy to
    France and ended the monarchy. Economic hardship, inequality, and Enlightenment
    concepts were important contributing factors.'
  id: totrans-994
  prefs: []
  type: TYPE_NORMAL
  zh: '- **事件：** 法国大革命 - **人工智能概述：** - **示例用例：** 一个政治和社会变革的时期（1789–1799），将民主带到法国并结束了君主制。经济困难、不平等和启蒙思想是重要的贡献因素。'
- en: '**C. AI Tools for History:** - **ChatGPT/AI Assistants:** Provide an overview
    of historical events and discuss their importance.'
  id: totrans-995
  prefs: []
  type: TYPE_NORMAL
  zh: '**C. 历史的人工智能工具：** - **ChatGPT/人工智能助手：** 提供历史事件的概述并讨论其重要性。'
- en: '- **Timeline Generators:** Resources for making visual timelines, such as Sutori
    or Canva.'
  id: totrans-996
  prefs: []
  type: TYPE_NORMAL
  zh: '- **时间线生成器：** 制作视觉时间线的资源，如Sutori或Canva。'
- en: '- **Interactive Maps:** Geographic context tools such as Google Earth.'
  id: totrans-997
  prefs: []
  type: TYPE_NORMAL
  zh: '- **交互式地图：** 地理背景工具，如Google Earth。'
- en: '---'
  id: totrans-998
  prefs: []
  type: TYPE_NORMAL
  zh: '---'
- en: '**3\. Using AI to Summarize Novels and Literature**'
  id: totrans-999
  prefs: []
  type: TYPE_NORMAL
  zh: '**3. 使用人工智能总结小说和文学**'
- en: Studying literature entails examining themes, characters, and literary devices
    in addition to the plot. AI can help with each of these areas.
  id: totrans-1000
  prefs: []
  type: TYPE_NORMAL
  zh: 学习文学包括检查主题、人物和文学手法，以及情节。人工智能可以帮助这些领域的每一个。
- en: '**A. How AI Improves Literature Analysis:** - **Plot Summarization:** Condenses
    intricate novels into manageable plots.'
  id: totrans-1001
  prefs: []
  type: TYPE_NORMAL
  zh: '**A. 人工智能如何改进文学分析：** - **情节摘要：** 将复杂的小说浓缩成可管理的情节。'
- en: Important characteristics and connections between characters are highlighted
    in the **Character Analysis:**.
  id: totrans-1002
  prefs: []
  type: TYPE_NORMAL
  zh: 在**人物分析**中突出显示重要的人物特征和联系。
- en: Theme identification identifies key concepts and their applicability.
  id: totrans-1003
  prefs: []
  type: TYPE_NORMAL
  zh: 主题识别确定关键概念及其适用性。
- en: '**B. Use Case Example: ** - **Book: Harper Lee''s *To Kill a Mockingbird*.'
  id: totrans-1004
  prefs: []
  type: TYPE_NORMAL
  zh: '**B. 用例示例：** - **书籍：哈珀·李的《杀死一只知更鸟》。**'
- en: '- **AI Synopsis:** A story told from Scout Finch''s point of view about moral
    development and racial injustice in 1930s Alabama. Prejudice, justice, and empathy
    are among the themes.'
  id: totrans-1005
  prefs: []
  type: TYPE_NORMAL
  zh: '- **人工智能概述：** 从斯库特·芬奇的角度讲述的故事，关于20世纪30年代阿拉巴马州的道德发展和种族不公。偏见、正义和同情是其中的主题。'
- en: '**C. AI Literature Tools:** - **Text Analysis Tools:** ChatGPT or QuillBot
    for insights and summaries.'
  id: totrans-1006
  prefs: []
  type: TYPE_NORMAL
  zh: '**C. 人工智能文学工具：** - **文本分析工具：** ChatGPT或QuillBot用于洞察和摘要。'
- en: '- **Mind Mapping Tools:** Tools to link events, characters, and themes, such
    as MindMeister.'
  id: totrans-1007
  prefs: []
  type: TYPE_NORMAL
  zh: '- **思维导图工具：** 链接事件、人物和主题的工具，如MindMeister。'
- en: '- **Apps for AI annotation:** Emphasize important sections for analysis, like
    Hypothesis.'
  id: totrans-1008
  prefs: []
  type: TYPE_NORMAL
  zh: '- **人工智能注释应用程序：** 强调分析的重要部分，如Hypothesis。'
- en: '---'
  id: totrans-1009
  prefs: []
  type: TYPE_NORMAL
  zh: '---'
- en: '**4\. Using AI to Prepare for Essay-Based Exams**'
  id: totrans-1010
  prefs: []
  type: TYPE_NORMAL
  zh: '**4. 使用人工智能准备基于论文的考试**'
- en: Strong writing and analytical abilities are necessary for essay exams. Students
    can use AI to help them organize their ideas and write better.
  id: totrans-1011
  prefs: []
  type: TYPE_NORMAL
  zh: 强大的写作和分析能力对于论文考试是必要的。学生可以使用人工智能来帮助他们组织思想和写出更好的文章。
- en: '**A. How to Use AI to Prepare for Exams:**'
  id: totrans-1012
  prefs: []
  type: TYPE_NORMAL
  zh: '**A. 如何使用人工智能准备考试：**'
- en: 1\. **Essay Prompts:** Create essay questions about literary or historical subjects
    using artificial intelligence.
  id: totrans-1013
  prefs: []
  type: TYPE_NORMAL
  zh: 1. **论文提示：** 使用人工智能创建关于文学或历史主题的论文问题。
- en: 2\. **Outline Creation:** AI can recommend essay formats that divide information
    into an introduction, a body, and a conclusion.
  id: totrans-1014
  prefs: []
  type: TYPE_NORMAL
  zh: 2. **提纲创建：** 人工智能可以推荐将信息分为引言、正文和结论的论文格式。
- en: 3\. **Draft Refinement:** AI tools like Grammarly or ChatGPT can improve grammar,
    coherence, and flow.
  id: totrans-1015
  prefs: []
  type: TYPE_NORMAL
  zh: 3. **草稿润色：** 人工智能工具如Grammarly或ChatGPT可以改进语法、连贯性和流畅性。
- en: '**B. Example Use Case:** - **Essay Prompt:** Discuss the impact of World War
    II on global politics.'
  id: totrans-1016
  prefs: []
  type: TYPE_NORMAL
  zh: '**B. 用例示例：** - **论文提示：** 讨论第二次世界大战对全球政治的影响。'
- en: '- **AI Outline:** - **Introduction:** Brief context of WWII.'
  id: totrans-1017
  prefs: []
  type: TYPE_NORMAL
  zh: '- **人工智能概要：** - **引言：** 第二次世界大战的简要背景。'
- en: '- **Body Paragraphs:** - Political realignments (e.g., Cold War).'
  id: totrans-1018
  prefs: []
  type: TYPE_NORMAL
  zh: '- **正文段落：** - 政治重新组合（例如，冷战）。'
- en: -   they established  a unified country
  id: totrans-1019
  prefs: []
  type: TYPE_NORMAL
  zh: -   他们建立了一个统一的国家
- en: '- Decolonization movements.'
  id: totrans-1020
  prefs: []
  type: TYPE_NORMAL
  zh: '- 非殖民化运动。'
- en: '- **Conclusion:** Long-term impact on global governance.'
  id: totrans-1021
  prefs: []
  type: TYPE_NORMAL
  zh: '- **结论：** 对全球治理的长期影响。'
- en: '**5\. AI-Powered Study Techniques for History and Literature** - **Flashcards:**
    Tools like Anki or Quizlet for memorizing historical dates and literary terms.'
  id: totrans-1022
  prefs: []
  type: TYPE_NORMAL
  zh: '**5. 历史和文学的人工智能学习技巧** - **闪卡：** 用于记忆历史日期和文学术语的工具，如Anki或Quizlet。'
- en: '- **Interactive Q&A:** Use ChatGPT to answer specific questions or test knowledge.'
  id: totrans-1023
  prefs: []
  type: TYPE_NORMAL
  zh: '- **互动问答：** 使用ChatGPT回答具体问题或测试知识。'
- en: '- **Custom Study Guides:** AI can generate personalized study plans based on
    individual strengths and weaknesses.'
  id: totrans-1024
  prefs: []
  type: TYPE_NORMAL
  zh: '- **定制学习指南：** 人工智能可以根据个人的优势和劣势生成个性化的学习计划。'
- en: '---'
  id: totrans-1025
  prefs: []
  type: TYPE_NORMAL
  zh: '---'
- en: '**6\. Real-Life Benefits for Educators and Students** - **For Educators:**
    Save time creating lesson plans and study guides. AI can also suggest creative
    teaching methods like debates or role-playing for historical events.'
  id: totrans-1026
  prefs: []
  type: TYPE_NORMAL
  zh: '**6. 教育者和学生的实际益处** - **对于教育者：** 节省创建课程计划和辅导指南的时间。AI还可以建议像辩论或角色扮演这样的创新教学方法，用于历史事件。'
- en: '- **For Students:** AI provides a focused approach to vast subjects, enabling
    better comprehension and preparation.'
  id: totrans-1027
  prefs: []
  type: TYPE_NORMAL
  zh: '- **对于学生：** AI为广泛的主题提供了一种专注的方法，使理解准备更好。'
- en: '---'
  id: totrans-1028
  prefs: []
  type: TYPE_NORMAL
  zh: '---'
- en: '**Details:**'
  id: totrans-1029
  prefs: []
  type: TYPE_NORMAL
  zh: '**详情：**'
- en: AI has made literature and history less intimidating. AI changes how these subjects
    are taught and learned by summarizing data, examining themes, and assisting with
    essay writing.
  id: totrans-1030
  prefs: []
  type: TYPE_NORMAL
  zh: AI使文学和历史不再令人畏惧。AI通过总结数据、检查主题和协助论文写作，改变了这些学科的教学和学习方式。
- en: Recommended AI Tools for History and Literature
  id: totrans-1031
  prefs: []
  type: TYPE_NORMAL
  zh: 推荐的历史和文学AI工具
- en: 'Here’s a list of powerful AI tools to enhance studying, teaching, and understanding
    history and literature:'
  id: totrans-1032
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一份强大的AI工具列表，用于增强学习、教学和理解历史和文学：
- en: '1\. For History Summarization and Analysis:'
  id: totrans-1033
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 适用于历史总结和分析：
- en: 'ChatGPT/OpenAI: Quickly summarize events, answer questions, and provide context.'
  id: totrans-1034
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT/OpenAI：快速总结事件，回答问题，并提供背景。
- en: 'Sutori: Create interactive timelines for historical events and themes.'
  id: totrans-1035
  prefs: []
  type: TYPE_NORMAL
  zh: Sutori：为历史事件和主题创建交互式时间线。
- en: 'Google Earth: Explore historical locations and geographic context.'
  id: totrans-1036
  prefs: []
  type: TYPE_NORMAL
  zh: Google Earth：探索历史地点和地理背景。
- en: 'History Hit: A platform powered by AI to dive deep into historical insights
    and podcasts.'
  id: totrans-1037
  prefs: []
  type: TYPE_NORMAL
  zh: History Hit：一个由AI驱动的平台，深入历史洞察力和播客。
- en: 'Canva (Timeline Templates): Create visual timelines and infographics for class
    presentations or study aids.'
  id: totrans-1038
  prefs: []
  type: TYPE_NORMAL
  zh: Canva（时间线模板）：创建用于课堂演示或学习辅助的视觉时间线和信息图表。
- en: '2\. For Literature Analysis:'
  id: totrans-1039
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 适用于文学分析：
- en: 'ChatGPT/Claude AI: Summarize novels, analyze characters, and break down themes.'
  id: totrans-1040
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT/Claude AI：总结小说，分析人物，分解主题。
- en: 'QuillBot: Paraphrase or summarize texts for clearer understanding.'
  id: totrans-1041
  prefs: []
  type: TYPE_NORMAL
  zh: QuillBot：改写或总结文本以获得更清晰的理解。
- en: 'Hypothesis: Annotate and highlight digital texts collaboratively.'
  id: totrans-1042
  prefs: []
  type: TYPE_NORMAL
  zh: Hypothesis：协作注释和突出显示数字文本。
- en: 'Perlego: Access summaries and critical analysis of classic and modern literature.'
  id: totrans-1043
  prefs: []
  type: TYPE_NORMAL
  zh: Perlego：访问经典和现代文学的摘要和批判性分析。
- en: 'Shmoop: A platform for comprehensive literature study guides.'
  id: totrans-1044
  prefs: []
  type: TYPE_NORMAL
  zh: Shmoop：一个全面的文学学习指南平台。
- en: '3\. For Essay Preparation and Writing:'
  id: totrans-1045
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 适用于论文准备和写作：
- en: 'Grammarly: Improve grammar, structure, and writing style in essays.'
  id: totrans-1046
  prefs: []
  type: TYPE_NORMAL
  zh: Grammarly：改善论文中的语法、结构和写作风格。
- en: 'Jasper AI: Generate essay ideas, outlines, and drafts with advanced AI.'
  id: totrans-1047
  prefs: []
  type: TYPE_NORMAL
  zh: Jasper AI：使用高级AI生成文章想法、大纲和草稿。
- en: 'Notion AI: Organize and draft essays, create study notes, and structure ideas.'
  id: totrans-1048
  prefs: []
  type: TYPE_NORMAL
  zh: Notion AI：组织论文草稿，创建学习笔记，构建想法。
- en: 'Wartune: Rephrase and refine essay drafts for clarity and coherence.'
  id: totrans-1049
  prefs: []
  type: TYPE_NORMAL
  zh: Wartune：重新措辞和精炼文章草稿，以提高清晰度和连贯性。
- en: 'ProWritingAid: A robust tool for detailed writing analysis, including style
    and tone.'
  id: totrans-1050
  prefs: []
  type: TYPE_NORMAL
  zh: ProWritingAid：一款强大的详细写作分析工具，包括风格和语气。
- en: '4\. For Study Aids and Personalized Learning:'
  id: totrans-1051
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 适用于学习辅助和个性化学习：
- en: 'Quizlet: Create AI-powered flashcards for historical dates and literary terms.'
  id: totrans-1052
  prefs: []
  type: TYPE_NORMAL
  zh: Quizlet：为历史日期和文学术语创建AI驱动的闪卡。
- en: 'Anki: A powerful app for memorization using spaced repetition.'
  id: totrans-1053
  prefs: []
  type: TYPE_NORMAL
  zh: Anki：一个使用间隔重复的强大记忆应用。
- en: 'MindMeister: Visualize concepts and connections in novels or historical events
    with mind maps.'
  id: totrans-1054
  prefs: []
  type: TYPE_NORMAL
  zh: MindMeister：使用思维导图可视化小说或历史事件中的概念和联系。
- en: 'DeepL Translator: Translate historical texts or literature into multiple languages.'
  id: totrans-1055
  prefs: []
  type: TYPE_NORMAL
  zh: DeepL Translator：将历史文本或文学作品翻译成多种语言。
- en: 'Khan Academy AI: Access interactive lessons and discussions on history and
    literature topics.'
  id: totrans-1056
  prefs: []
  type: TYPE_NORMAL
  zh: Khan Academy AI：访问历史和文学主题的互动课程和讨论。
- en: '5\. For Educators and Classroom Use:'
  id: totrans-1057
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 适用于教育者和课堂使用：
- en: 'Edpuzzle: Integrate AI to create quizzes and discussions based on historical
    documentaries or literature adaptations.'
  id: totrans-1058
  prefs: []
  type: TYPE_NORMAL
  zh: Edpuzzle：整合AI，根据历史纪录片或文学改编创建测验和讨论。
- en: 'Pear Deck: Make interactive presentations with historical or literary themes.'
  id: totrans-1059
  prefs: []
  type: TYPE_NORMAL
  zh: Pear Deck：制作具有历史或文学主题的互动演示。
- en: 'Book Creator: Collaboratively write and annotate literature or history e-books
    with students.'
  id: totrans-1060
  prefs: []
  type: TYPE_NORMAL
  zh: Book Creator：与学生协作编写和注释文学或历史电子书。
- en: 'Classcraft: Gamify learning by creating challenges based on historical facts
    or literature quizzes.'
  id: totrans-1061
  prefs: []
  type: TYPE_NORMAL
  zh: Classcraft：通过基于历史事实或文学测验的挑战来游戏化学习。
- en: 'Chapter 18:'
  id: totrans-1062
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第18章：
- en: Boosting Creativity with AI**
  id: totrans-1063
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 使用AI激发创造力**
- en: '**Preamble**'
  id: totrans-1064
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '**序言**'
- en: Exploring your creative potential has never been simpler thanks to tools like
    ChatGPT.The ability to be creative is something that can be learned.. ChatGPT
    can be a useful tool whether you're writing poetry, stories, or coming up with
    creative project ideas. This chapter will walk you through how to use AI for creative
    endeavors both inside and outside of the classroom.
  id: totrans-1065
  prefs: []
  type: TYPE_NORMAL
  zh: 由于有了ChatGPT这样的工具，探索你的创造潜能从未如此简单。创造力是可以学习的。无论你是写诗、讲故事还是想出创意项目想法，ChatGPT都可以成为一个有用的工具。本章将指导你如何使用AI在课堂内外进行创意活动。
- en: '---'
  id: totrans-1066
  prefs: []
  type: TYPE_NORMAL
  zh: '---'
- en: '**Writing Stories with ChatGPT**'
  id: totrans-1067
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**使用ChatGPT写故事**'
- en: 1\. **Creating Story Ideas** ChatGPT can assist you in coming up with original
    plots that suit your tastes.
  id: totrans-1068
  prefs: []
  type: TYPE_NORMAL
  zh: 1. **创造故事想法** ChatGPT可以帮助你构思适合你口味的原创情节。
- en: '"Give me three ideas for a sci-fi story about space exploration," is the prompt
    example.'
  id: totrans-1069
  prefs: []
  type: TYPE_NORMAL
  zh: '"给我三个关于太空探索的科幻故事想法"是提示示例。'
- en: '- **Output**:'
  id: totrans-1070
  prefs: []
  type: TYPE_NORMAL
  zh: '- **输出**：'
- en: A crew uses a black hole to find a parallel universe.
  id: totrans-1071
  prefs: []
  type: TYPE_NORMAL
  zh: 一组人员利用黑洞寻找平行宇宙。
- en: To save their dying planet, an extraterrestrial species asks for human help.
  id: totrans-1072
  prefs: []
  type: TYPE_NORMAL
  zh: 为了拯救他们垂死的星球，一个外星物种请求人类帮助。
- en: On a planet with a different sense of time, a lone astronaut must survive.
  id: totrans-1073
  prefs: []
  type: TYPE_NORMAL
  zh: 在一个时间感不同的星球上，一名宇航员必须生存下去。
- en: 2\. **Creating In-Depth Storylines**
  id: totrans-1074
  prefs: []
  type: TYPE_NORMAL
  zh: 2. **创造深入的故事情节**
- en: Characters, settings, and conflicts can all be further developed by ChatGPT.
  id: totrans-1075
  prefs: []
  type: TYPE_NORMAL
  zh: 人物、场景和冲突都可以通过ChatGPT进一步发展。
- en: '"Describe a mysterious forest where my fantasy story takes place" is the prompt
    example.'
  id: totrans-1076
  prefs: []
  type: TYPE_NORMAL
  zh: '"描述一个我幻想故事发生的神秘森林"是提示示例。'
- en: '- **Output**: "The mist-covered forest is filled with tall, ancient trees whose
    leaves glow dimly in the darkness. Unusual murmurs reverberate as if the forest
    were alive.'
  id: totrans-1077
  prefs: []
  type: TYPE_NORMAL
  zh: '- **输出**： "雾蒙蒙的森林里长满了高大的古老树木，它们的叶子在黑暗中微弱地发光。异常的低语回荡，仿佛森林本身是活的一样。'
- en: The third step is to polish your writing.
  id: totrans-1078
  prefs: []
  type: TYPE_NORMAL
  zh: 第三步是润色你的写作。
- en: By making edit suggestions or improving descriptions, ChatGPT can help you polish
    your draft.
  id: totrans-1079
  prefs: []
  type: TYPE_NORMAL
  zh: 通过提出编辑建议或改进描述，ChatGPT可以帮助你润色你的草稿。
- en: '"Rewrite this sentence to make it more vivid: ''The storm was strong.''" is
    the following prompt.'
  id: totrans-1080
  prefs: []
  type: TYPE_NORMAL
  zh: '"重写这句话使其更生动：''风暴很强烈。''"是下一个提示。'
- en: '- Output: "The earth beneath was shaken by the storm''s deafening thunder and
    blinding flashes of lightning."'
  id: totrans-1081
  prefs: []
  type: TYPE_NORMAL
  zh: '- 输出： "地面被暴风雨的震耳欲聋的雷声和刺眼的闪电震撼。"'
- en: '---'
  id: totrans-1082
  prefs: []
  type: TYPE_NORMAL
  zh: '---'
- en: '**Using ChatGPT to Write Poems**'
  id: totrans-1083
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**使用ChatGPT写诗**'
- en: '**Creating Poetic Themes** - **Suggest five themes for a poem about nature**
    is a prompt example.'
  id: totrans-1084
  prefs: []
  type: TYPE_NORMAL
  zh: '**创建诗歌主题** - **为关于自然的诗歌建议五个主题**是提示示例。'
- en: '- **Output**:'
  id: totrans-1085
  prefs: []
  type: TYPE_NORMAL
  zh: '- **输出**：'
- en: The tranquility of a lake.
  id: totrans-1086
  prefs: []
  type: TYPE_NORMAL
  zh: 湖泊的宁静。
- en: The power of a mountain; the transient splendor of cherry blossoms.
  id: totrans-1087
  prefs: []
  type: TYPE_NORMAL
  zh: 山的力量；樱花盛开的短暂辉煌。
- en: The desert flower's tenacity.
  id: totrans-1088
  prefs: []
  type: TYPE_NORMAL
  zh: 沙漠花朵的坚韧。
- en: The river's never-ending journey.
  id: totrans-1089
  prefs: []
  type: TYPE_NORMAL
  zh: 河流永无止境的旅程。
- en: '**Composing Poems Together** - **Suggested Example**: "Compose a haiku about
    the sea."'
  id: totrans-1090
  prefs: []
  type: TYPE_NORMAL
  zh: '**共同创作诗歌** - **建议示例**： "创作一首关于大海的俳句。"'
- en: The ocean's deep soul is revealed as endless waves collide and whisper stories
    of bygone eras.
  id: totrans-1091
  prefs: []
  type: TYPE_NORMAL
  zh: 海洋深邃的灵魂在无尽的波浪碰撞和低语着往昔时代的故事中显露出来。
- en: 3\. Revision and Enhancement of Poems
  id: totrans-1092
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 诗歌的修订和增强
- en: '"Improve this line: ''The stars are bright.''" is the prompt.'
  id: totrans-1093
  prefs: []
  type: TYPE_NORMAL
  zh: '"改进这句：''星星很亮。''"是提示。'
- en: '- results  The stars shine like diamonds against the velvet sky."'
  id: totrans-1094
  prefs: []
  type: TYPE_NORMAL
  zh: '- 结果：星星在天鹅绒般的天空中闪耀，如同钻石。'
- en: '---'
  id: totrans-1095
  prefs: []
  type: TYPE_NORMAL
  zh: '---'
- en: '**Creating Original Project Concepts**'
  id: totrans-1096
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**创造原创项目概念**'
- en: 1\. **Academic Projects** ChatGPT can offer creative suggestions for assignments.
  id: totrans-1097
  prefs: []
  type: TYPE_NORMAL
  zh: 1. **学术项目** ChatGPT可以为作业提供创意建议。
- en: '**Suggest a unique science fair project for 10th graders** is a prompt example.'
  id: totrans-1098
  prefs: []
  type: TYPE_NORMAL
  zh: '**为10年级学生建议一个独特的科学展览项目**是提示示例。'
- en: '- **Output**: "Build a functional model of a solar-powered water purifier that
    sterilizes water using UV light."'
  id: totrans-1099
  prefs: []
  type: TYPE_NORMAL
  zh: '- **输出**： "构建一个使用紫外线消毒水的太阳能净水器的工作模型。"'
- en: '**Creative Assignments** - **Generative Example**: "What''s an enjoyable art
    project that makes use of recycled materials?"'
  id: totrans-1100
  prefs: []
  type: TYPE_NORMAL
  zh: '**创意任务** - **生成示例**： "有什么有趣的利用回收材料的艺术项目？"'
- en: '"Create a mosaic wall art using broken glass, ceramic, and plastic bottle cap
    pieces" is the output.'
  id: totrans-1101
  prefs: []
  type: TYPE_NORMAL
  zh: '"用破碎的玻璃、陶瓷和塑料瓶盖制作一幅马赛克墙画"是输出结果。'
- en: 3\. **Internal Initiatives**
  id: totrans-1102
  prefs: []
  type: TYPE_NORMAL
  zh: 3. **内部倡议**
- en: ChatGPT can help if you want to engage in a creative hobby of your own.
  id: totrans-1103
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想要参与自己的创意爱好，ChatGPT可以帮助你。
- en: '"Which creative uses are there for'
  id: totrans-1104
  prefs: []
  type: TYPE_NORMAL
  zh: '"有哪些创造性的用途？'
- en: ancient book?
  id: totrans-1105
  prefs: []
  type: TYPE_NORMAL
  zh: 古老的书籍？
- en: is the prompt example.
  id: totrans-1106
  prefs: []
  type: TYPE_NORMAL
  zh: 是提示示例。
- en: '"Transform them into hidden storage boxes, handwritten journals, or even a
    decorative table lamp," is the output.'
  id: totrans-1107
  prefs: []
  type: TYPE_NORMAL
  zh: '"将它们变成隐藏的储物盒、手写日记，甚至是一个装饰性的台灯"，这是输出结果。'
- en: '---'
  id: totrans-1108
  prefs: []
  type: TYPE_NORMAL
  zh: '---'
- en: Useful Advice for Using ChatGPT to Increase Creativity
  id: totrans-1109
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 使用ChatGPT提高创造力的实用建议
- en: 1\. **Work Together, Don't Assign"
  id: totrans-1110
  prefs: []
  type: TYPE_NORMAL
  zh: 1\. **共同工作，不要分配**
- en: ChatGPT is a tool to help you be more creative, not to take the place of it.
    Start with its recommendations and then add your own unique touch.
  id: totrans-1111
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT是一个帮助你更有创造力的工具，而不是取代它。从它的建议开始，然后加入你自己的独特风格。
- en: 2\. **Try Different Prompts**
  id: totrans-1112
  prefs: []
  type: TYPE_NORMAL
  zh: 2\. **尝试不同的提示**
- en: How well you formulate your prompts will determine the caliber of ChatGPT's
    answers. When posing queries or providing instructions, be precise and imaginative.
  id: totrans-1113
  prefs: []
  type: TYPE_NORMAL
  zh: 你如何制定你的提示将决定ChatGPT答案的质量。在提出问题或提供指示时，要精确且富有想象力。
- en: 3\. **Refine and Iterate**
  id: totrans-1114
  prefs: []
  type: TYPE_NORMAL
  zh: 3\. **精炼和迭代**
- en: Don't accept the first result. Request that ChatGPT edit or improve its answers
    until you receive an inspiring outcome.
  id: totrans-1115
  prefs: []
  type: TYPE_NORMAL
  zh: 不要接受第一个结果。要求ChatGPT编辑或改进其答案，直到你得到鼓舞人心的结果。
- en: '---'
  id: totrans-1116
  prefs: []
  type: TYPE_NORMAL
  zh: '---'
- en: '**ChatGPT Creative Writing Practice Exercises**'
  id: totrans-1117
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '**ChatGPT创意写作练习**'
- en: '1\. **Daily Writing Prompts**: Request that ChatGPT provide a daily, arbitrary
    creative writing prompt.'
  id: totrans-1118
  prefs: []
  type: TYPE_NORMAL
  zh: 1\. **每日写作提示**：要求ChatGPT提供每日任意创意写作提示。
- en: '2\. **Story Expansion**: Give ChatGPT a short story idea and request that it
    elaborate on it.'
  id: totrans-1119
  prefs: []
  type: TYPE_NORMAL
  zh: 2\. **故事扩展**：给ChatGPT一个简短的故事想法，并要求它对其进行扩展。
- en: '3\. **Poetry Challenge**: Write a poem every week on a different theme by working
    with ChatGPT.'
  id: totrans-1120
  prefs: []
  type: TYPE_NORMAL
  zh: 3\. **诗歌挑战**：通过与ChatGPT合作，每周以不同的主题写一首诗。
- en: '4\. **Project Idea Brainstorming**: Make a list of five possible concepts for
    your upcoming science or art project using ChatGPT.'
  id: totrans-1121
  prefs: []
  type: TYPE_NORMAL
  zh: 4\. **项目想法头脑风暴**：使用ChatGPT列出你即将到来的科学或艺术项目的五个可能概念。
- en: '---'
  id: totrans-1122
  prefs: []
  type: TYPE_NORMAL
  zh: '---'
- en: '**Most Important Points**'
  id: totrans-1123
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '**最重要的要点**'
- en: A flexible tool for encouraging creativity in writing, poetry, and projects
    is ChatGPT.
  id: totrans-1124
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT是一个灵活的工具，可以鼓励写作、诗歌和项目中的创造力。
- en: '- Make use of it to generate concepts, create intricate stories, and polish
    your work.'
  id: totrans-1125
  prefs: []
  type: TYPE_NORMAL
  zh: '- 利用它来生成概念、创造复杂的故事，并完善你的作品。'
- en: '- You can reach new heights of creativity and inventiveness by working with
    ChatGPT.'
  id: totrans-1126
  prefs: []
  type: TYPE_NORMAL
  zh: '- 通过与ChatGPT合作，你可以达到新的创造力和创新高度。'
- en: You can add a whole new level of creativity to your assignments, projects, and
    personal interests by utilizing ChatGPT's creative potential.
  id: totrans-1127
  prefs: []
  type: TYPE_NORMAL
  zh: 通过利用ChatGPT的创造潜力，你可以为你的作业、项目和兴趣增添全新的创意层次。
- en: 'chapter 19:'
  id: totrans-1128
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第19章：
- en: Using ChatGPT for Group Projects
  id: totrans-1129
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '**使用ChatGPT进行小组项目**'
- en: '**Preamble**'
  id: totrans-1130
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '**序言**'
- en: Although group projects can be a great way to work together and learn from colleagues,
    they can also be difficult to manage and keep up with. By serving as a virtual
    assistant, ChatGPT can help you expedite these procedures by allowing you to assign
    tasks efficiently and maintain team focus with AI-generated plans.
  id: totrans-1131
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然小组项目可以是一个很好的合作和向同事学习的方式，但它们也可能很难管理并跟上进度。通过作为虚拟助手，ChatGPT可以通过允许你高效分配任务并使用AI生成的计划保持团队专注来帮助你加快这些流程。
- en: '---'
  id: totrans-1132
  prefs: []
  type: TYPE_NORMAL
  zh: '---'
- en: '**Efficient Task Delegation**'
  id: totrans-1133
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**高效任务委派**'
- en: 1\. **Dismantling the Project**
  id: totrans-1134
  prefs: []
  type: TYPE_NORMAL
  zh: 1\. **项目拆解**
- en: ChatGPT can assist in breaking down big projects into smaller, more doable tasks.
  id: totrans-1135
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT可以帮助将大型项目分解为更小、更易管理的任务。
- en: '**Prompt Example**: "Divide a climate change research project into smaller
    tasks."'
  id: totrans-1136
  prefs: []
  type: TYPE_NORMAL
  zh: '**提示示例**："将气候变化研究项目拆分为更小的任务。"'
- en: '- **Output**:'
  id: totrans-1137
  prefs: []
  type: TYPE_NORMAL
  zh: '- **输出结果**：'
- en: 'Task 1: Investigate the reasons behind climate change.'
  id: totrans-1138
  prefs: []
  type: TYPE_NORMAL
  zh: 任务1：调查气候变化的原因。
- en: 'Task 2: Compile information on trends in global temperatures.'
  id: totrans-1139
  prefs: []
  type: TYPE_NORMAL
  zh: 任务2：收集关于全球温度趋势的信息。
- en: 'Task 3: Examine the impacts on human life and ecosystems.'
  id: totrans-1140
  prefs: []
  type: TYPE_NORMAL
  zh: 任务3：检查对人类生活和生态系统的影响。
- en: 'Task 4: Create a graphic presentation that summarizes the results.'
  id: totrans-1141
  prefs: []
  type: TYPE_NORMAL
  zh: 任务4：创建一个总结结果的图形演示。
- en: 2\. Role Assignment
  id: totrans-1142
  prefs: []
  type: TYPE_NORMAL
  zh: 2\. 角色分配
- en: ChatGPT can help assign roles based on team members' strengths after tasks have
    been outlined.
  id: totrans-1143
  prefs: []
  type: TYPE_NORMAL
  zh: 在任务概述后，ChatGPT可以根据团队成员的优势分配角色。
- en: 'The following is a prompt example: "Propose roles for a four-person team working
    on a marketing project."'
  id: totrans-1144
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是一个提示示例："为四个人的营销项目团队提出角色建议。"
- en: '- **Output**: - Team Leader: Monitors development and guarantees that due dates
    are fulfilled.'
  id: totrans-1145
  prefs: []
  type: TYPE_NORMAL
  zh: '- **输出结果**: - 团队领导：监控开发进度并确保截止日期得到遵守。'
- en: A researcher gathers information and insights.
  id: totrans-1146
  prefs: []
  type: TYPE_NORMAL
  zh: 研究者收集信息和洞察。
- en: A content creator creates written or visual materials.
  id: totrans-1147
  prefs: []
  type: TYPE_NORMAL
  zh: 内容创作者创建书面或视觉材料。
- en: 'Presenter: Gives the audience the last presentation.'
  id: totrans-1148
  prefs: []
  type: TYPE_NORMAL
  zh: 演讲者：给出最后的展示。
- en: 3\. **Building Accountability** Create a task assignment document using ChatGPT.
  id: totrans-1149
  prefs: []
  type: TYPE_NORMAL
  zh: 3. **建立责任感** 使用ChatGPT创建任务分配文档。
- en: 'The following is a prompt example: "Create a task assignment template for a
    group project on history."'
  id: totrans-1150
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是一个提示示例："为历史小组项目创建任务分配模板。"
- en: '- **Output**:'
  id: totrans-1151
  prefs: []
  type: TYPE_NORMAL
  zh: '- **输出**：'
- en: '- Name: [Name of Team Member]'
  id: totrans-1152
  prefs: []
  type: TYPE_NORMAL
  zh: '- 姓名：[团队成员姓名]'
- en: '[Assigned Task] is the task.'
  id: totrans-1153
  prefs: []
  type: TYPE_NORMAL
  zh: '[分配任务]是任务。'
- en: '[Task Deadline] is the deadline.'
  id: totrans-1154
  prefs: []
  type: TYPE_NORMAL
  zh: '[任务截止日期]是截止日期。'
- en: 'Notes on Progress: [Updates]'
  id: totrans-1155
  prefs: []
  type: TYPE_NORMAL
  zh: 进度笔记：[更新]
- en: '---'
  id: totrans-1156
  prefs: []
  type: TYPE_NORMAL
  zh: '---'
- en: '**Using AI-Generated Plans to Keep Group Members on Track**'
  id: totrans-1157
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**使用AI生成的计划来确保团队成员保持进度**'
- en: 1\. Establishing Schedules
  id: totrans-1158
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 建立日程
- en: ChatGPT can assist in developing project timelines that are realistic.
  id: totrans-1159
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT可以帮助制定现实的项目时间表。
- en: '**Inspiring Example**: "Establish a two-week schedule for a collaborative renewable
    energy project."'
  id: totrans-1160
  prefs: []
  type: TYPE_NORMAL
  zh: '**鼓舞人心的例子**："为协作可再生能源项目建立两周的日程表。"'
- en: '- **Output**:'
  id: totrans-1161
  prefs: []
  type: TYPE_NORMAL
  zh: '- **输出**：'
- en: 'Day 1–2: Assign roles and divide up the work.'
  id: totrans-1162
  prefs: []
  type: TYPE_NORMAL
  zh: 第1-2天：分配角色并分配工作。
- en: 'Day 3–6: Perform research and collect information.'
  id: totrans-1163
  prefs: []
  type: TYPE_NORMAL
  zh: 第3-6天：进行研究和收集信息。
- en: 'Days 7–9: Write the report and create the illustrations.'
  id: totrans-1164
  prefs: []
  type: TYPE_NORMAL
  zh: 第7-9天：撰写报告并创建插图。
- en: 'Day 10–12: Edit and review.'
  id: totrans-1165
  prefs: []
  type: TYPE_NORMAL
  zh: 第10-12天：编辑和审查。
- en: 'Day 13: Practice your presentation.'
  id: totrans-1166
  prefs: []
  type: TYPE_NORMAL
  zh: 第13天：练习你的演示。
- en: 'Day 14: Turn in the project.'
  id: totrans-1167
  prefs: []
  type: TYPE_NORMAL
  zh: 第14天：提交项目。
- en: 2\. **Tracking Progress** ChatGPT has the ability to create reminders or progress
    check-ins.
  id: totrans-1168
  prefs: []
  type: TYPE_NORMAL
  zh: 2. **跟踪进度** ChatGPT有创建提醒或进度检查的能力。
- en: '- **Inspiring Example**: "Propose a weekly progress check schedule for collaborative
    projects."'
  id: totrans-1169
  prefs: []
  type: TYPE_NORMAL
  zh: '- **鼓舞人心的例子**："为协作项目提出每周进度检查日程表。"'
- en: '- **Output**:'
  id: totrans-1170
  prefs: []
  type: TYPE_NORMAL
  zh: '- **输出**：'
- en: '[Insert Date] is the date.'
  id: totrans-1171
  prefs: []
  type: TYPE_NORMAL
  zh: '[插入日期]是日期。'
- en: '- Finalized Assignments: [List Finalized Assignments]'
  id: totrans-1172
  prefs: []
  type: TYPE_NORMAL
  zh: '- 最终任务清单：[列出最终任务清单]'
- en: '[List Remaining Tasks] is the list of pending tasks.'
  id: totrans-1173
  prefs: []
  type: TYPE_NORMAL
  zh: '[剩余任务清单]是待办任务的列表。'
- en: 'Difficulties: [Talk about any problems]'
  id: totrans-1174
  prefs: []
  type: TYPE_NORMAL
  zh: 困难：[讨论任何问题]
- en: '- Next Actions: [List the next steps]'
  id: totrans-1175
  prefs: []
  type: TYPE_NORMAL
  zh: '- 下一步行动：[列出下一步行动]'
- en: 3\. **Dispute Resolution** ChatGPT can offer solutions for handling disagreements
    or uncooperative team members.
  id: totrans-1176
  prefs: []
  type: TYPE_NORMAL
  zh: 3. **争议解决** ChatGPT可以提供处理分歧或不愿合作的团队成员的解决方案。
- en: 'The following is a prompt example: "How should we handle a team member who
    isn''t finishing their tasks?"'
  id: totrans-1177
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是一个提示示例："我们如何处理不完成任务的小组成员？"
- en: '- **Output**:'
  id: totrans-1178
  prefs: []
  type: TYPE_NORMAL
  zh: '- **输出**：'
- en: 'Step 1: Talk to the team member in a polite and private manner.'
  id: totrans-1179
  prefs: []
  type: TYPE_NORMAL
  zh: 第1步：以礼貌和私密的方式与团队成员交谈。
- en: 'Step 2: Reevaluate their workload or offer assistance.'
  id: totrans-1180
  prefs: []
  type: TYPE_NORMAL
  zh: 第2步：重新评估他们的工作量或提供帮助。
- en: 'Step 3: Notify the group and redistribute tasks if needed.'
  id: totrans-1181
  prefs: []
  type: TYPE_NORMAL
  zh: 第3步：通知小组并在必要时重新分配任务。
- en: '---'
  id: totrans-1182
  prefs: []
  type: TYPE_NORMAL
  zh: '---'
- en: '**Group Project Use Cases of ChatGPT in Action**'
  id: totrans-1183
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**ChatGPT在小组项目中的应用案例**'
- en: 'The first step is to create an agenda for a meeting. Here''s an illustration:
    "Create an agenda for a 30-minute group project meeting."'
  id: totrans-1184
  prefs: []
  type: TYPE_NORMAL
  zh: 第一步是创建会议议程。以下是一个示例："为30分钟的团队项目会议创建议程。"
- en: '- **Output**:'
  id: totrans-1185
  prefs: []
  type: TYPE_NORMAL
  zh: '- **输出**：'
- en: 'Five minutes: Go over the progress made thus far.'
  id: totrans-1186
  prefs: []
  type: TYPE_NORMAL
  zh: 五分钟：回顾到目前为止的进展。
- en: 'Ten minutes: Talk about problems and their fixes.'
  id: totrans-1187
  prefs: []
  type: TYPE_NORMAL
  zh: 十分钟：讨论问题和解决方案。
- en: 'Ten minutes: Establish deadlines and plan the next steps.'
  id: totrans-1188
  prefs: []
  type: TYPE_NORMAL
  zh: 十分钟：设定截止日期并计划下一步行动。
- en: 'Five minutes: Assign tasks for follow-up.'
  id: totrans-1189
  prefs: []
  type: TYPE_NORMAL
  zh: 五分钟：分配后续任务。
- en: '2\. **Creating Emails for Communication** - **Inspiring Example**: "Compose
    an email informing the group of impending deadlines."'
  id: totrans-1190
  prefs: []
  type: TYPE_NORMAL
  zh: 2. **创建用于沟通的电子邮件** - **鼓舞人心的例子**："撰写一封通知小组即将到来的截止日期的电子邮件。"
- en: 'The output is as follows: Subject: Reminder: Our Project''s Upcoming Deadlines
    - Body: Hello Team A brief reminder that [date] is the deadline for our first
    draft. Please remember to finish your assignments and provide updates at our upcoming
    meeting. Tell me if you require any assistance!'
  id: totrans-1191
  prefs: []
  type: TYPE_NORMAL
  zh: 输出如下：主题：提醒：我们项目的即将到来的截止日期 - 正文：大家好，简要提醒[日期]是我们第一稿的截止日期。请记住在即将到来的会议上完成您的作业并提供更新。如果您需要任何帮助，请告诉我！
- en: '3\. **Working Together on Presentations** - **Inspiring Example**: "Create
    slide titles for an artificial intelligence group project."'
  id: totrans-1192
  prefs: []
  type: TYPE_NORMAL
  zh: 3. **共同制作演示文稿** - **鼓舞人心的例子**："为人工智能小组项目创建幻灯片标题。"
- en: '- **Output**:'
  id: totrans-1193
  prefs: []
  type: TYPE_NORMAL
  zh: '- **输出**：'
- en: '- Artificial Intelligence Overview Slide 1; History of AI Development Slide
    2; Uses of AI in Contemporary Life Slide 3; and Ethical Considerations in AI Slide
    4'
  id: totrans-1194
  prefs: []
  type: TYPE_NORMAL
  zh: '- 人工智能概述幻灯片1；人工智能发展历史幻灯片2；人工智能在当代生活中的应用幻灯片3；以及人工智能中的伦理考量幻灯片4'
- en: 'Slide 5: Final Thoughts and Prospects'
  id: totrans-1195
  prefs: []
  type: TYPE_NORMAL
  zh: 第5张幻灯片：总结和展望
- en: '---'
  id: totrans-1196
  prefs: []
  type: TYPE_NORMAL
  zh: '---'
- en: '**Expert Advice for Group Projects Using ChatGPT**'
  id: totrans-1197
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**使用ChatGPT进行小组项目的专家建议**'
- en: 1\. **Centralized Communication** Make sure everyone is in agreement by creating
    group communication templates using ChatGPT.
  id: totrans-1198
  prefs: []
  type: TYPE_NORMAL
  zh: 1. **集中沟通** 通过使用ChatGPT创建团队沟通模板，确保每个人都达成一致。
- en: 2\. **Regular Check-ins** Plan weekly or biweekly check-ins to assess development
    and resolve obstacles.
  id: totrans-1199
  prefs: []
  type: TYPE_NORMAL
  zh: 2. **定期检查** 计划每周或每两周进行一次检查，以评估进展并解决障碍。
- en: 3\. AI as an Indifferent Mediator
  id: totrans-1200
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 人工智能作为中立的调解者
- en: ChatGPT can offer unbiased counsel or recommendations to settle disputes if
    they occur.
  id: totrans-1201
  prefs: []
  type: TYPE_NORMAL
  zh: 如果发生争议，ChatGPT可以提供无偏见的建议或推荐来解决。
- en: '---'
  id: totrans-1202
  prefs: []
  type: TYPE_NORMAL
  zh: '---'
- en: '**Most Important Points**'
  id: totrans-1203
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '**最重要的要点**'
- en: ChatGPT makes assigning tasks easier and guarantees that everyone in the group
    stays on course.
  id: totrans-1204
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT使分配任务变得更容易，并确保团队中的每个人都保持正确的方向。
- en: '- For smooth collaboration, use AI to create agendas, timelines, and progress
    reports.'
  id: totrans-1205
  prefs: []
  type: TYPE_NORMAL
  zh: '- 为了实现顺畅的协作，使用人工智能创建议程、时间表和进度报告。'
- en: Additionally, ChatGPT can improve group productivity and mediate disputes.
  id: totrans-1206
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，ChatGPT还可以提高团队生产力和调解争议。
- en: You can save time, enhance communication, and make sure all team members are
    contributing productively by using ChatGPT for your group projects.
  id: totrans-1207
  prefs: []
  type: TYPE_NORMAL
  zh: 通过在团队项目中使用ChatGPT，您可以节省时间、增强沟通并确保所有团队成员都高效地做出贡献。
- en: 'Chapter 20:'
  id: totrans-1208
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第20章：
- en: The Future of AI in Education
  id: totrans-1209
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 教育中人工智能的未来
- en: With its cutting-edge tools and solutions that improve student learning, artificial
    intelligence is quickly changing education. The use of AI in education has a bright
    future ahead of it, with possibilities ranging from individualized instruction
    to sophisticated learning materials. This chapter examines new developments in
    AI-powered educational resources and how students can get ready to stay ahead
    in this rapidly changing AI-driven environment.
  id: totrans-1210
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能凭借其尖端工具和解决方案，正在迅速改变教育。教育中使用人工智能的未来前景光明，从个性化教学到复杂的学习材料，可能性众多。本章探讨了人工智能教育资源的最新发展以及学生如何为在这个快速变化的AI驱动环境中保持领先做好准备。
- en: Developments in AI-Powered Educational Resources
  id: totrans-1211
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能教育资源的进展
- en: Platforms for Personalized Learning
  id: totrans-1212
  prefs: []
  type: TYPE_NORMAL
  zh: 个性化学习平台
- en: AI-powered tools, such as adaptive learning systems, generate study schedules
    that are specific to each student's requirements.
  id: totrans-1213
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能驱动的工具，如适应性学习系统，为每个学生的需求生成特定的学习计划。
- en: For instance, programs such as Duolingo modify their level of difficulty according
    to a student's language learning progress.
  id: totrans-1214
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，像Duolingo这样的程序会根据学生的语言学习进度调整难度级别。
- en: 'Prospects for the Future: More sophisticated AI might examine deeper learning
    trends and provide incredibly detailed suggestions for enhancement.'
  id: totrans-1215
  prefs: []
  type: TYPE_NORMAL
  zh: 未来展望：更高级的人工智能可能会分析更深入的学习趋势，并提供极其详细的改进建议。
- en: AI Assistants and Tutors
  id: totrans-1216
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能助手和导师
- en: AI-powered virtual tutors are becoming more and more adept at providing real-time
    advice, clarification of ideas, and question-answering.
  id: totrans-1217
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能驱动的虚拟导师越来越擅长提供实时建议、阐明思想和解答问题。
- en: For instance, ChatGPT is an AI tutor that can help with various academic subjects.
  id: totrans-1218
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，ChatGPT是一个可以协助各种学术科目的AI导师。
- en: 'Prospects for the Future: AI tutors might develop into more conversational
    beings who can recognize emotions and modify their responses appropriately.'
  id: totrans-1219
  prefs: []
  type: TYPE_NORMAL
  zh: 未来展望：AI导师可能会发展成为更会交谈的存在，能够识别情绪并相应地调整他们的回应。
- en: Virtual reality (VR) and augmented reality (AR) combined with artificial intelligence
    (AI) have the potential to completely transform experiential learning.
  id: totrans-1220
  prefs: []
  type: TYPE_NORMAL
  zh: 虚拟现实（VR）和增强现实（AR）与人工智能（AI）的结合有可能彻底改变体验式学习。
- en: For instance, AR apps with AI capabilities make difficult scientific ideas or
    historical events come to life.
  id: totrans-1221
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，具有人工智能功能的AR应用使难以理解的科学概念或历史事件变得生动起来。
- en: 'Future Potential: Picture using virtual reality to explore ancient civilizations
    while AI provides real-time historical context narration.'
  id: totrans-1222
  prefs: []
  type: TYPE_NORMAL
  zh: 未来潜力：想象一下使用虚拟现实探索古代文明，同时人工智能提供实时历史背景解说。
- en: Gamification and AI-Powered Interaction
  id: totrans-1223
  prefs: []
  type: TYPE_NORMAL
  zh: 游戏化和AI驱动交互
- en: Through the creation of adaptive challenges, AI is improving gamified education
    by maintaining student motivation.
  id: totrans-1224
  prefs: []
  type: TYPE_NORMAL
  zh: 通过创建适应性挑战，人工智能通过维持学生动力来改善游戏化教育。
- en: For instance, AI can design customized games to teach coding, math, or problem-solving
    techniques.
  id: totrans-1225
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，人工智能可以设计定制游戏来教授编码、数学或解决问题的技巧。
- en: 'Potential for the Future: Games could develop into multisensory simulations
    of real-world situations, which would make learning entertaining and useful.'
  id: totrans-1226
  prefs: []
  type: TYPE_NORMAL
  zh: 未来潜力：游戏可能会发展成为多感官的真实世界情景模拟，这将使学习变得既有趣又有用。
- en: Collaboration Tools Driven by AI
  id: totrans-1227
  prefs: []
  type: TYPE_NORMAL
  zh: 由人工智能驱动的协作工具
- en: AI makes it easier to collaborate on group projects, which improves teamwork.
  id: totrans-1228
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能使团队项目协作变得更加容易，从而提高了团队合作。
- en: For instance, AI can monitor each participant's input and offer immediate feedback.
  id: totrans-1229
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，人工智能可以监控每个参与者的输入并提供即时反馈。
- en: 'Prospects for the Future: Deeper analytics will be integrated into collaborative
    tools, offering insights into how teams can operate more effectively.'
  id: totrans-1230
  prefs: []
  type: TYPE_NORMAL
  zh: 未来展望：更深入的分析将集成到协作工具中，为团队如何更有效地运作提供见解。
- en: How Students Can Continue to Lead in the AI Era
  id: totrans-1231
  prefs: []
  type: TYPE_NORMAL
  zh: 学生如何在人工智能时代继续领先
- en: Adopt AI-Powered Tools Early
  id: totrans-1232
  prefs: []
  type: TYPE_NORMAL
  zh: 早期采用人工智能工具
- en: To lay a solid foundation, become familiar with AI-powered tools and platforms.
  id: totrans-1233
  prefs: []
  type: TYPE_NORMAL
  zh: 为了打下坚实的基础，熟悉人工智能工具和平台。
- en: Try using Quizlet for studying with AI-generated flashcards, Notion AI for organization,
    or ChatGPT for assignments.
  id: totrans-1234
  prefs: []
  type: TYPE_NORMAL
  zh: 尝试使用Quizlet进行人工智能生成的闪卡学习，Notion AI进行组织，或ChatGPT完成作业。
- en: Become knowledgeable about AI.
  id: totrans-1235
  prefs: []
  type: TYPE_NORMAL
  zh: 了解人工智能。
- en: In the future, knowing how AI operates will be essential.
  id: totrans-1236
  prefs: []
  type: TYPE_NORMAL
  zh: 在未来，了解人工智能的工作原理将是至关重要的。
- en: 'Doable Actions:'
  id: totrans-1237
  prefs: []
  type: TYPE_NORMAL
  zh: 可行的行动：
- en: Enroll in free AI online courses from sites like Coursera or Khan Academy.
  id: totrans-1238
  prefs: []
  type: TYPE_NORMAL
  zh: 在Coursera或Khan Academy等网站上报名参加免费的在线人工智能课程。
- en: Watch videos or read books that provide basic explanations of AI concepts.
  id: totrans-1239
  prefs: []
  type: TYPE_NORMAL
  zh: 观看提供人工智能概念基本解释的视频或阅读书籍。
- en: Pay Attention to Complementary Skills
  id: totrans-1240
  prefs: []
  type: TYPE_NORMAL
  zh: 注意互补技能
- en: Soft skills like creativity, critical thinking, and emotional intelligence will
    be crucial even as AI manages automation.
  id: totrans-1241
  prefs: []
  type: TYPE_NORMAL
  zh: 即使人工智能管理自动化，创造力、批判性思维和情商等软技能也将至关重要。
- en: 'Example: Develop your critical thinking skills to evaluate data produced by
    AI efficiently.'
  id: totrans-1242
  prefs: []
  type: TYPE_NORMAL
  zh: 例如：发展您的批判性思维技能，以有效地评估人工智能产生的数据。
- en: Study AI-Related Topics
  id: totrans-1243
  prefs: []
  type: TYPE_NORMAL
  zh: 研究人工智能相关主题
- en: Courses in data science, machine learning, and ethical AI are recommended for
    students interested in careers involving AI.
  id: totrans-1244
  prefs: []
  type: TYPE_NORMAL
  zh: 对于对涉及人工智能的职业感兴趣的学生，建议学习数据科学、机器学习和道德人工智能的课程。
- en: 'Practical Tip: Even individuals without technical backgrounds can take beginner-friendly
    AI programming courses offered by universities and online resources.'
  id: totrans-1245
  prefs: []
  type: TYPE_NORMAL
  zh: 实用技巧：即使没有技术背景的个人也可以参加大学和在线资源提供的入门级人工智能编程课程。
- en: Keep Up with Trends
  id: totrans-1246
  prefs: []
  type: TYPE_NORMAL
  zh: 跟踪趋势
- en: Students can stay competitive by following AI trends.
  id: totrans-1247
  prefs: []
  type: TYPE_NORMAL
  zh: 学生可以通过关注人工智能趋势来保持竞争力。
- en: 'Resources to Look Into:'
  id: totrans-1248
  prefs: []
  type: TYPE_NORMAL
  zh: 值得关注的资源：
- en: Keep up with AI news sites, such as AI Weekly and OpenAI Blog.
  id: totrans-1249
  prefs: []
  type: TYPE_NORMAL
  zh: 关注人工智能新闻网站，如AI Weekly和OpenAI博客。
- en: To interact with people in the field, join AI communities and forums.
  id: totrans-1250
  prefs: []
  type: TYPE_NORMAL
  zh: 为了与该领域的人士互动，加入人工智能社区和论坛。
- en: Student's Contribution to the Development of AI in Education
  id: totrans-1251
  prefs: []
  type: TYPE_NORMAL
  zh: 学生对人工智能教育发展的贡献
- en: Promoting the Use of AI Responsibly
  id: totrans-1252
  prefs: []
  type: TYPE_NORMAL
  zh: 负责任地推广人工智能的使用
- en: Students can promote the moral application of AI in the classroom.
  id: totrans-1253
  prefs: []
  type: TYPE_NORMAL
  zh: 学生可以在课堂上推广人工智能的道德应用。
- en: As an illustration, actively engage in conversations regarding inclusivity,
    equity, and privacy in AI education resources.
  id: totrans-1254
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，积极参与关于人工智能教育资源中包容性、公平性和隐私性的对话。
- en: Giving AI Developers Feedback
  id: totrans-1255
  prefs: []
  type: TYPE_NORMAL
  zh: 为人工智能开发者提供反馈
- en: The best people to point out problems and recommend fixes are students utilizing
    AI tools.
  id: totrans-1256
  prefs: []
  type: TYPE_NORMAL
  zh: 指出问题和推荐解决方案的最佳人选是使用人工智能工具的学生。
- en: For instance, provide input on features that enhance usability or accessibility.
  id: totrans-1257
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，提供有关增强可用性或可访问性的功能的反馈。
- en: Developing Into Creators Rather Than Users
  id: totrans-1258
  prefs: []
  type: TYPE_NORMAL
  zh: 从用户转变为创造者
- en: To contribute to the future of education, students can learn how to create AI
    tools.
  id: totrans-1259
  prefs: []
  type: TYPE_NORMAL
  zh: 为了为教育的未来做出贡献，学生可以学习如何创建人工智能工具。
- en: 'Practical Step: Start with simple coding and work your way up to developing
    chatbots or small AI apps.'
  id: totrans-1260
  prefs: []
  type: TYPE_NORMAL
  zh: 实用步骤：从简单的编码开始，逐步发展到开发聊天机器人或小型人工智能应用程序。
- en: In conclusion
  id: totrans-1261
  prefs: []
  type: TYPE_NORMAL
  zh: 总之
- en: AI integration in education is a revolutionary movement that is influencing
    how people learn in the future, not just a fad. Students can set themselves up
    for success in an AI-driven world by utilizing AI tools and keeping up with new
    developments. For those who are willing to adapt, the opportunities are limitless,
    whether it is learning how to use AI tools, gaining critical skills, or even influencing
    the direction of AI education in the future.
  id: totrans-1262
  prefs: []
  type: TYPE_NORMAL
  zh: 教育中的人工智能集成是一场革命性的运动，它正在影响着人们未来的学习方式，而不仅仅是一个潮流。学生可以通过利用人工智能工具并跟上新技术的发展，为在人工智能驱动的世界中取得成功做好准备。对于那些愿意适应的人来说，机会是无限的，无论是学习如何使用人工智能工具，获得关键技能，甚至影响未来人工智能教育的发展方向。
- en: '**Bonus Section: Making the Most of Your AI-Powered Learning Path**'
  id: totrans-1263
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**附加部分：充分利用您的人工智能学习路径**'
- en: This bonus section provides extra advice, tricks, and techniques to enhance
    your educational experience with ChatGPT and other AI tools and help you advance
    your learning. These concepts are meant to prepare you for a technologically advanced
    future while giving you an advantage over conventional study techniques.
  id: totrans-1264
  prefs: []
  type: TYPE_NORMAL
  zh: 本附加部分提供了额外的建议、技巧和技术，以增强你使用ChatGPT和其他AI工具的教育体验，并帮助你提升学习。这些概念旨在为你准备一个技术先进未来，同时让你在传统学习技巧上获得优势。
- en: '---'
  id: totrans-1265
  prefs: []
  type: TYPE_NORMAL
  zh: '---'
- en: '**1\. Mastering Time Management with AI** - **AI-Powered Planners**: To efficiently
    arrange your study schedules, use apps with AI integrations, such as Notion AI,
    ClickUp, or Google Calendar.'
  id: totrans-1266
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**1. 利用AI掌握时间管理** - **AI驱动的计划工具**：为了高效安排你的学习日程，使用集成了AI的应用程序，如Notion AI、ClickUp或Google
    Calendar。'
- en: '- **Prioritize Tasks Automatically**: AI can assist in setting priorities for
    tasks based on difficulty and urgency, allowing you to concentrate on the most
    important assignments first.'
  id: totrans-1267
  prefs: []
  type: TYPE_NORMAL
  zh: '- **自动优先处理任务**：AI可以根据任务的难度和紧急程度来协助设置优先级，让你首先集中精力处理最重要的任务。'
- en: '- **Daily Productivity Reports**: RescueTime and similar tools offer insights
    into your daily routines and AI-based tactics to enhance concentration and time
    management.'
  id: totrans-1268
  prefs: []
  type: TYPE_NORMAL
  zh: '- **每日生产力报告**：RescueTime和类似工具可以提供关于你日常习惯的见解，以及基于AI的策略来提高专注力和时间管理。'
- en: '---'
  id: totrans-1269
  prefs: []
  type: TYPE_NORMAL
  zh: '---'
- en: '**2\. AI for Career and College Preparation** - **Personalized Career Counseling**:
    Determine your career pathways and strengths with AI-based tools such as CareerExplorer.'
  id: totrans-1270
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**2. 为职业和大学做准备使用AI** - **个性化职业咨询**：使用如CareerExplorer等基于AI的工具来确定你的职业路径和优势。'
- en: '**Essay Editing for College Applications**: You can make your application essays
    stand out by polishing them with tools like ChatGPT. To guarantee uniqueness,
    use it in conjunction with AI-powered plagiarism detectors.'
  id: totrans-1271
  prefs: []
  type: TYPE_NORMAL
  zh: '**大学申请论文编辑**：你可以通过使用ChatGPT等工具来润色你的申请论文，使其脱颖而出。为了保证独特性，请与AI驱动的抄袭检测器结合使用。'
- en: '- **Mock Interviews**: Use AI interview bots to hone your responses and boost
    your self-assurance for college or internship interviews.'
  id: totrans-1272
  prefs: []
  type: TYPE_NORMAL
  zh: '- **模拟面试**：使用AI面试机器人来磨练你的回答，并提高你在大学或实习面试中的自信心。'
- en: '---'
  id: totrans-1273
  prefs: []
  type: TYPE_NORMAL
  zh: '---'
- en: '**3\. Mastering AI Research Assistance** - **AI Research Assistants**: Use
    programs such as Semantic Scholar or Elicit to distill scholarly articles and
    pinpoint important ideas.'
  id: totrans-1274
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**3. 掌握AI研究辅助** - **AI研究助手**：使用如Semantic Scholar或Elicit等程序提炼学术论文并确定重要观点。'
- en: '**Investigating Specialized Subjects of Knowledge**: Make your mark on assignments
    and presentations by using AI to find resources and topics in less-studied fields.'
  id: totrans-1275
  prefs: []
  type: TYPE_NORMAL
  zh: '**探索知识领域的专业主题**：通过使用AI在较少研究的领域寻找资源和主题，在你的作业和演示中留下自己的印记。'
- en: '---'
  id: totrans-1276
  prefs: []
  type: TYPE_NORMAL
  zh: '---'
- en: '**4\. Using AI in Group Projects** - **Assigning Roles**: ChatGPT and other
    AI tools can assist in clearly defining roles and responsibilities for group members,
    guaranteeing accountability.'
  id: totrans-1277
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**4. 在团队项目中使用AI** - **分配角色**：ChatGPT和其他AI工具可以帮助明确定义团队成员的角色和责任，确保责任到人。'
- en: '- **Tracking Deadlines**: To lower the likelihood of missed deadlines, use
    AI to track progress and send reminders for group deliverables.'
  id: totrans-1278
  prefs: []
  type: TYPE_NORMAL
  zh: '- **跟踪截止日期**：为了降低错过截止日期的可能性，使用AI跟踪进度并发送团队交付成果的提醒。'
- en: '- **AI-Powered Presentation Tools**: Using the content of your project, Canva
    or Beautiful.ai can produce polished and expert slides.'
  id: totrans-1279
  prefs: []
  type: TYPE_NORMAL
  zh: '- **AI驱动的演示工具**：利用你项目的内 容，Canva或Beautiful.ai可以制作出专业且精致的幻灯片。'
- en: '---'
  id: totrans-1280
  prefs: []
  type: TYPE_NORMAL
  zh: '---'
- en: '**5\. Examining the Fun Side of AI** - **Gamify Your Studies**: Make use of
    AI-powered tools such as Quizlet to make entertaining tests or interactive flashcards
    for concept revision.'
  id: totrans-1281
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**5. 探索AI的乐趣** - **游戏化学习**：利用Quizlet等AI驱动的工具制作有趣的小测验或互动式闪卡，用于概念复习。'
- en: '- **Creative Experiments**: For a more interesting learning experience, try
    using ChatGPT to produce poetry, make up stories, or make trivia.'
  id: totrans-1282
  prefs: []
  type: TYPE_NORMAL
  zh: '- **创意实验**：为了获得更有趣的学习体验，尝试使用ChatGPT创作诗歌、编写故事或制作知识问答。'
- en: '**AI-Enhanced Brainstorming**: Use AI to generate ideas for hobbies, personal
    projects, or even business endeavors.'
  id: totrans-1283
  prefs: []
  type: TYPE_NORMAL
  zh: '**AI增强头脑风暴**：使用AI为爱好、个人项目甚至商业冒险生成想法。'
- en: '---'
  id: totrans-1284
  prefs: []
  type: TYPE_NORMAL
  zh: '---'
- en: '**6\. Staying Ahead with Future AI Skills** - **Basic Coding for AI**: Coursera
    and Codecademy provide introductory AI programming courses that give you the skills
    you need to build your own AI models.'
  id: totrans-1285
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**6. 利用未来AI技能保持领先** - **AI基础编码**：Coursera和Codecademy提供入门级的AI编程课程，这些课程能为你构建自己的AI模型提供所需的技能。'
- en: '**Ethical AI Practices**: Being aware of the ethical ramifications of AI guarantees
    responsible use both during and after your studies.'
  id: totrans-1286
  prefs: []
  type: TYPE_NORMAL
  zh: '**道德AI实践**：意识到AI的道德影响，确保在学习和学习之后都负责任地使用。'
- en: '**AI Certifications**: To bolster your resume, enroll in AI-focused certifications
    like Microsoft AI Engineer or Google''s AI Fundamentals programs.'
  id: totrans-1287
  prefs: []
  type: TYPE_NORMAL
  zh: '**AI认证**：为了增强您的简历，报名参加像微软AI工程师或谷歌的AI基础课程这样的AI相关认证。'
- en: '---'
  id: totrans-1288
  prefs: []
  type: TYPE_NORMAL
  zh: '---'
- en: '**7\. Tools and Resources for Continuous Growth** - **Free AI Resources**:
    To learn more about AI concepts, take advantage of free AI courses offered by
    sites like edX or Khan Academy.'
  id: totrans-1289
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**7. 持续成长所需工具和资源** - **免费AI资源**：为了更深入地了解AI概念，利用像edX或Khan Academy这样的网站提供的免费AI课程。'
- en: '- **Remain Current**: To stay up to date on the newest AI tools and trends,
    sign up for newsletters like TechCrunch or AI Weekly.'
  id: totrans-1290
  prefs: []
  type: TYPE_NORMAL
  zh: '- **保持最新**：为了了解最新的AI工具和趋势，请订阅TechCrunch或AI Weekly等通讯。'
- en: '**Become a Part of AI Communities**: To meet like-minded people, and participate
    in AI-related forums like AI Discord groups or Reddit''s r/MachineLearning.'
  id: totrans-1291
  prefs: []
  type: TYPE_NORMAL
  zh: '**成为AI社区的一员**：为了结识志同道合的人，并参与AI相关的论坛，如AI Discord群组或Reddit的r/MachineLearning。'
- en: '---'
  id: totrans-1292
  prefs: []
  type: TYPE_NORMAL
  zh: '---'
- en: '**8\. Making AI Your Life Companion** - **AI for Everyday Use**: Make use of
    AI-powered applications such as Zapier to automate repetitive tasks in your life
    or Grammarly to improve your writing.'
  id: totrans-1293
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**8. 将AI作为您的生活伴侣** - **日常生活中的AI应用**：利用Zapier等AI驱动的应用来自动化您生活中的重复性任务，或者使用Grammarly来提高您的写作水平。'
- en: '**Health and Wellness with AI**: AI is used by apps such as Sleep Cycle and
    MyFitnessPal to enhance your health practices and help you stay balanced during
    periods of intense study.'
  id: totrans-1294
  prefs: []
  type: TYPE_NORMAL
  zh: '**使用AI保持健康和活力**：Sleep Cycle和MyFitnessPal等应用程序使用AI来增强您的健康习惯，并在紧张的学习期间帮助您保持平衡。'
- en: '**AI in Finance Management**: Programs such as Mint or YNAB use AI to assist
    you in efficiently managing your finances and creating a budget, which is a useful
    ability for students.'
  id: totrans-1295
  prefs: []
  type: TYPE_NORMAL
  zh: '**金融管理中的AI应用**：Mint或YNAB等程序使用AI帮助您高效管理财务和制定预算，这对学生来说是一项有用的技能。'
- en: '---'
  id: totrans-1296
  prefs: []
  type: TYPE_NORMAL
  zh: '---'
- en: '**Conclusion**'
  id: totrans-1297
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**结论**'
- en: The purpose of this bonus section is to provide you with practical advice on
    how to use AI outside of the classroom. By incorporating these techniques into
    your daily routine, you'll not only achieve academic success but also build abilities
    that will help you succeed both personally and professionally in the future.
  id: totrans-1298
  prefs: []
  type: TYPE_NORMAL
  zh: 本附加部分的目的是为您提供如何在课堂之外使用AI的实际建议。通过将这些技术融入您的日常生活，您不仅会取得学术上的成功，还会培养出有助于您在未来个人和职业上取得成功的技能。
