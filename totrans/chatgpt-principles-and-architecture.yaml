  prefs: []
  type: TYPE_NORMAL
- en: '**Ge Cheng**'
  prefs: []
  type: TYPE_NORMAL
- en: <hgroup>
  prefs: []
  type: TYPE_NORMAL
- en: Chapter 1 A new milestone in artificial intelligence—ChatGPT
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: </hgroup>
  prefs: []
  type: TYPE_NORMAL
- en: Abstract
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This chapter provides an in-depth exploration of the evolution, capabilities,
    and impact of ChatGPT, a groundbreaking artificial intelligence (AI) application
    developed by OpenAI. The chapter traces the development history of ChatGPT from
    its early predecessors like GPT-1 and GPT-2 to the more advanced GPT-3 and GPT-4
    models. It highlights the technological advancements that have made ChatGPT a
    powerful tool capable of complex tasks such as language comprehension, code generation,
    and multimodal reasoning. The chapter also discusses the architecture underpinning
    large language models (LLMs), focusing on the transition from traditional natural
    language processing techniques to Transformer-based models. Additionally, it addresses
    the significant computational and data requirements for training these models,
    alongside challenges such as model interpretability, biases, and privacy concerns.
    The chapter concludes by examining the broader implications of LLMs across various
    sectors and anticipates future trends in AI development.
  prefs: []
  type: TYPE_NORMAL
- en: Keywords
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: ChatGPT; OpenAI; transformer model; natural language processing (NLP); artificial
    general intelligence (AGI); GPT series; human feedback reinforcement learning
    (HFRL); large language models (LLMs); computational power; model limitations
  prefs: []
  type: TYPE_NORMAL
- en: In November 2022, OpenAI introduced ChatGPT, an artificial intelligence (AI)-powered
    chat application with diverse functionalities. This application displays intellectual
    prowess that rivals and sometimes surpasses human performance across numerous
    professional and academic measures. Upon its launch, ChatGPT garnered widespread
    acclaim within the technology sector, marking a significant advancement in AI.
  prefs: []
  type: TYPE_NORMAL
- en: 1.1 The development history of ChatGPT
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: For more than 50 years, the quest to enable computers to communicate like humans
    has been a significant focus in technology. The general public is acquainted with
    chat applications, tracing back to 1966 when MIT Professor Joseph Weizenbaum created
    ELIZA, the first program of its kind. Over the decades, advancements have been
    evident from Apple’s Siri and Microsoft’s Xiaoice to smart speakers and intelligent
    assistants used in various industries. These AI-driven products have become intricately
    woven into the fabric of daily life.
  prefs: []
  type: TYPE_NORMAL
- en: 'These products share a distinctive trait: they are easily recognized as AI,
    highlighting a noticeable disparity between their conversational abilities and
    human interaction. Yet, ChatGPT distinguishes itself in this realm. It not only
    conducts complex, multiturn text dialogues but also possesses the ability to generate
    code, marketing materials, poetry, business strategies, and film scripts. While
    it is not without flaws and can occasionally err, its robust capabilities position
    it as one of the AI tools closest to passing the Turing test.'
  prefs: []
  type: TYPE_NORMAL
- en: ChatGPT was developed by OpenAI, a nonprofit AI research institute established
    in San Francisco in 2015\. Its founders include entrepreneur Elon Musk, Sam Altman,
    president of the American startup incubator Y Combinator, and Peter Thiel, cofounder
    of the global online payment platform PayPal, among others. Based in California,
    USA, OpenAI has garnered substantial financial support from several prominent
    Silicon Valley figures, securing an initial investment of up to 1 billion dollars.
  prefs: []
  type: TYPE_NORMAL
- en: The Transformer model, first introduced by the Google Brain team in their seminal
    2017 paper “Attention is All You Need,” is now recognized as a pivotal advancement
    in AI. While it has not entirely supplanted previous frameworks such as recurrent
    neural networks (RNNs) and convolutional neural networks, it has shown exceptional
    efficacy in diverse domains including natural language processing (NLP) and computer
    vision. This model has become a fundamental architecture in these fields. As depicted
    in [Fig. 1.1](#f0010), OpenAI has extensively pursued NLP research using the Transformer
    model, which ultimately culminated in the development of ChatGPT.
  prefs: []
  type: TYPE_NORMAL
- en: '![Timeline of OpenAIs NLP research and development from Transformer to ChatGPT.](../images/F000023f01-01-9780443274367.jpg)'
  prefs: []
  type: TYPE_IMG
- en: '[Figure 1.1](#Bf0010) GPT series evolution timeline.'
  prefs: []
  type: TYPE_NORMAL
- en: The timeline starts with the Transformer model in 2017\. In 2018, GPT1 was developed
    with a 5GB training corpus and 100 million parameters using pretrain and finetune
    methods. In 2019, GPT2 was introduced with a 40GB training corpus and 1.5 billion
    parameters, utilizing zero shot learning. GPT3 followed in 2020 with a 570GB training
    corpus and 175 billion parameters, employing in context learning. In 2021 2022,
    Codex was fine-tuned on GitHub code data from the GPT3 model with 12 billion parameters.
    In 2022, InstructGPT was fine-tuned based on human feedback instructions. Codedavinci002,
    focused on coding capabilities, was developed in April 2022\. Textdavinci002,
    focused on textual capabilities, was developed in May 2022\. Textdavinci003, aimed
    at better performance on public NLP tasks, was developed in November 2022\. Finally,
    ChatGPT was introduced in November 2022.
  prefs: []
  type: TYPE_NORMAL
- en: In 2018 OpenAI introduced its first generative pretrained model, GPT-1\. This
    model significantly advanced the language processing capabilities of AI systems
    by leveraging large-scale unlabeled data for pretraining. It also showcased its
    ability to generalize across multiple tasks through supervised fine-tuning, marking
    a notable evolution in AI language models.
  prefs: []
  type: TYPE_NORMAL
- en: In March 2019, OpenAI transitioned from a nonprofit organization to a capped-profit
    entity, unveiling OpenAI LP and introducing Microsoft as a strategic investor.
    In July of that year, Microsoft made a significant investment of 1 billion dollars
    in OpenAI, thereby securing commercialization rights to OpenAI’s technologies
    and integrating its developed products with Microsoft’s offerings. Concurrently,
    OpenAI released the GPT-2 model, which utilized a larger dataset called WebText,
    comprising about 40 GB of text data from 8 million documents. This version increased
    the number of model parameters to an impressive 1.5 billion, enhancing the model’s
    accuracy. Furthermore, GPT-2 introduced zero-shot learning capabilities, underscoring
    the effectiveness of unsupervised learning and the success of pretrained models
    in downstream NLP tasks.
  prefs: []
  type: TYPE_NORMAL
- en: By June 2020, OpenAI had released the GPT-3 language model and launched its
    first commercial product, the OpenAI application programming interface (API),
    signifying the organization’s official venture into commercial operations. In
    September of the same year, OpenAI granted Microsoft an exclusive license to utilize
    its GPT-3 model, positioning Microsoft as the first company globally to adopt
    GPT-3 technology. Unprecedented in scale, the largest version of GPT-3 boasts
    175 billion parameters—117 times that of GPT-2\. Additionally, GPT-3 introduced
    in-context learning, a method that uses prompts to adapt to a broader range of
    downstream tasks and displays various emergent abilities, such as chains of thought.
  prefs: []
  type: TYPE_NORMAL
- en: In 2021 Microsoft deepened its collaboration with OpenAI through an additional
    investment, propelling their partnership into a new phase. In December 2022, supported
    by Microsoft, OpenAI introduced ChatGPT, which is built on GPT-3.5\. This iteration
    employs reinforcement learning with human feedback, akin to InstructGPT, to better
    align with human needs. Remarkably, just 2 months after its release, ChatGPT surpassed
    100 million active users globally. At the start of 2023, OpenAI launched the ChatGPT
    Plus subscription service alongside the GPT-4 model, which possesses multimodal
    data processing and reasoning capabilities, providing ChatGPT Plus users access
    to a version of GPT-4 enhanced for NLP tasks.
  prefs: []
  type: TYPE_NORMAL
- en: 1.2 The capability level of ChatGPT
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'In a demonstration video released on March 15, 2023, GPT-4 successfully identified
    an image of a balloon, as depicted in [Fig. 1.2](#f0015), and predicted the outcome
    of severing the attached string: “The balloon would fly away.” This demonstration
    underscores GPT-4 proficiency in interpreting and reasoning with multimodal data,
    such as images. Possessing an extensive array of parameters, GPT-4 transcends
    mere surface-level image interpretation to infer deeper significances. This advancement
    has elicited global astonishment, positioning GPT-4 closer to achieving artificial
    general intelligence (AGI). Furthermore, this development prompts an ongoing debate
    regarding the potential of the GPT series to progress towards strong AI, possibly
    culminating in a capability that surpasses human intelligence.'
  prefs: []
  type: TYPE_NORMAL
- en: '![A large bunch of balloons tied to a weight with text explaining that if the
    strings were cut, the balloons would fly away.](../images/F000023f01-02-9780443274367.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 1.2 GPT-4 balloon image multimodal reasoning demonstration.
  prefs: []
  type: TYPE_NORMAL
- en: The text on the right side of the image reads, What would happen if the strings
    were cut? followed by the balloons would fly away.
  prefs: []
  type: TYPE_NORMAL
- en: Since the 1970s, scholarly definitions of intelligence have emphasized that
    intelligence should not be restricted to specific tasks. Over the past few decades,
    the application of AI has expanded significantly across various domains, exemplified
    by AlphaGo’s mastery in the game of Go, AlphaFold’s protein structure predictions,
    and the Yolo series’ contributions to computer vision. These advancements, however,
    represent systems that are intelligent within their respective domains. This has
    led to the development of the concept of AGI, which is distinctly differentiated
    from the earlier concept of “weak AI.” Despite its prominence, both the academic
    and industrial sectors continue to grapple with establishing a universally accepted
    definition of AGI.
  prefs: []
  type: TYPE_NORMAL
- en: While the primary function of ChatGPT is conversational interaction, its applications
    extend far beyond simple dialogue. This AI model is capable of writing and debugging
    computer programs, emulating the writing styles of well-known figures for the
    creation of commercial brochures, and generating diverse content such as music,
    television dramas, fairy tales, student essays, and poetry. Moreover, ChatGPT
    can emulate Linux operating systems, simulate chatrooms, engage in games like
    tic-tac-toe, and even mimic the operations of an ATM machine.
  prefs: []
  type: TYPE_NORMAL
- en: As illustrated in [Fig. 1.3](#f0020), GPT-4 performance on a range of professional
    and academic benchmark tests has achieved levels comparable to human capabilities.
    Notably, GPT-4 placed in the top 10% of candidates in a simulated bar exam and
    achieved a score of 330 on the graduate record examination (GRE), surpassing the
    majority of participants. In additional tests, GPT-4 performance exceeded that
    of other AI systems. These high scores not only reflect enhanced realistic and
    logical reasoning skills but also signify advanced problem-solving abilities.
  prefs: []
  type: TYPE_NORMAL
- en: '![A bar graph comparing GPT4 performance to human or expert average on various
    tests and exams across different fields in May 2023.](../images/F000023f01-03-9780443274367.jpg)'
  prefs: []
  type: TYPE_IMG
- en: '[Figure 1.3](#Bf0020) Comparison of GPT-4 with human examination levels. Image
    source: [https://lifearchitect.ai/iq-testing-ai/](https://lifearchitect.ai/iq-testing-ai/).'
  prefs: []
  type: TYPE_NORMAL
- en: The horizontal bar graph is titled as GPT4 VS HUMAN TESTS MAY2023\. The y axis
    lists various tests and exams, while the x axis represents scores from 0 to 100\.
    For each test, there are two bars, a bar representing the Human or expert average
    and a green bar representing GPT4 performance. The tests and their respective
    scores are, 1\. Theory of mind, psychology, Human 87, GPT4 100.0 2\. Biology,
    USA Biolympiad, USABO Semifinal Exam 2020, Human 50, GPT4 99.5 3\. SAT, Human
    50, GPT4 94.0 4\. Maths, Grade school maths, GSM8K, Human 50, GPT4 92.0 5\. Law,
    Uniform Bar Exam, MBEplusMEEplusMPT, Human 50, GPT4 90.0 6\. Wine tasting, Advanced
    Sommelier, theory knowledge, Human 50, GPT4 77.0 7\. Economics, George Mason University
    Economics 321 Midterm by Prof Caplan, Human 30, GPT4 66.0 8\. Quantum computing,
    UT Austin Quantum Information Science exam, Human 74, GPT4 73.0 9\. Medicine,
    Medical Knowledge Self Assessment Program, Human 50, GPT4 75.0 10\. AI IQ benchmark,
    MMLU, Human 35, GPT4 86.4 11\. Commonsense inference, HellaSwag, Human 96, GPT4
    95.3 12\. Knowledge, commonsense, WinoGrande Human 94, GPT4 87.5 In all but two
    tests, Quantum computing and Commonsense inference, GPT4 outperforms the human
    or expert average, often by a significant margin. The detailed data points are
    as follows. For the Theory of mind psychology test, the human expert average was
    87, while GPT4 scored 100.0\. For the Biology, USA Biolympiad USABO Semifinal
    Exam 2020 test, the human expert average was 50, while GPT4 scored 99.5\. For
    the SAT test, the human expert average was 50, while GPT4 scored 94.0\. For the
    Maths, Grade school maths GSM8K test, the human expert average was 50, while GPT4
    scored 92.0\. For the Law, Uniform Bar Exam MBE plus MEE plus MPT test, the human
    expert average was 50, while GPT4 scored 90.0\. For the Wine tasting, Advanced
    Sommelier theory knowledge test, the human expert average was 50, while GPT4 scored
    77.0\. For the Economics, George Mason University Economics 321 Midterm by Prof
    Caplan test, the human expert average was 30, while GPT4 scored 66.0\. For the
    Quantum computing, UT Austin Quantum Information Science exam test, the human
    expert average was 74, while GPT4 scored 73.0\. For the Medicine, Medical Knowledge
    Self-Assessment Program test, the human/expert average was 50, while GPT4 scored
    75.0\. For the AI IQ benchmark MMLU test, the human expert average was 35, while
    GPT4 scored 86.4\. For the Commonsense inference HellaSwag test, the human expert
    average was 96, while GPT4 scored 95.3\. For the Knowledge, commonsense WinoGrande
    test, the human expert average was 94, while GPT4 scored 87.5.
  prefs: []
  type: TYPE_NORMAL
- en: Although GPT-4 has demonstrated proficiency in a range of exams, assisted in
    translation and programming tasks, and generated innovative ideas, the methodology
    for evaluating its intelligence level continues to be a subject of intense debate.
    Given that GPT-4 has been trained on vast datasets encompassing nearly all information
    available on the internet, it poses a significant challenge to discern whether
    it has simply memorized content related to specific tasks or has achieved a true
    understanding of them. This distinction is crucial for accurately assessing its
    level of intelligence.
  prefs: []
  type: TYPE_NORMAL
- en: 'From the perspective of evaluating human intelligence, a key attribute is the
    understanding of multidomain tasks. In this context, the assessment of GPT-4 intelligence
    can be examined through several critical aspects:'
  prefs: []
  type: TYPE_NORMAL
- en: '• **Task performance**: This metric is crucial for evaluating GPT-4 capabilities.
    Notably, GPT-4 has excelled in various tasks such as exams, translation, programming,
    and generating innovative ideas, often surpassing the average human performance
    in many professional and academic tests.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '• **Knowledge understanding and application**: It is essential to determine
    whether GPT-4 genuinely comprehends the knowledge it has acquired and how it applies
    this knowledge across different contexts. A truly intelligent system should demonstrate
    the ability to understand and flexibly utilize knowledge in diverse scenarios.
    GPT-4 has shown remarkable proficiency in applying knowledge to a wide range of
    activities, including writing and debugging programs, emulating writing styles
    for commercial brochures, composing music, and scripting television shows.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '• **Generalization ability**: An intelligent entity’s performance on new tasks
    and with unseen data—its generalization ability—is a vital measure of its intelligence.
    Despite potential timeliness issues with its training data, GPT-4 continues to
    offer innovative solutions to novel problems, showing it does not solely rely
    on preexisting knowledge and patterns.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '• **Autonomous learning and reasoning**: GPT-4 has proven its ability in autonomous
    learning and reasoning by incorporating new knowledge through prompts and examples.
    It can independently discover knowledge and formulate reasoning across various
    tasks and contexts.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Through a comprehensive evaluation of GPT-4 capabilities, encompassing task
    performance, understanding and application of knowledge, generalization ability,
    and autonomous learning and reasoning, it is clear that GPT-4 epitomizes the zenith
    of current AI research. It stands as the most advanced approximation to AGI thus
    far. The implications of such advancements are profound, promising to significantly
    alter human lifestyles in the near future. While the extent of these changes may
    be underestimated by many, the reality is that the future envisioned by these
    technological advancements is already unfolding.
  prefs: []
  type: TYPE_NORMAL
- en: 1.3 The technical evolution of large language models
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 1.3.1 Symbolism versus connectionism
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: One of the fundamental capabilities of ChatGPT is NLP. Initially, NLP utilized
    symbolic representations to interpret the real world, relying on predefined rules
    for knowledge-based reasoning. This method primarily involved querying a knowledge
    base using established rules and executing logical operations for reasoning. However,
    symbolic approaches often struggle to effectively manage the diversity and ambiguity
    inherent in language. Furthermore, they exhibit limited robustness and generalization
    abilities. As linguistic phenomena grow in complexity, the quantity of manually
    crafted rules increases exponentially, complicating the management of language’s
    diversity and statistical properties.
  prefs: []
  type: TYPE_NORMAL
- en: The advent of machine learning and deep learning heralded a paradigm shift toward
    a data-driven approach in NLP technologies. During the machine learning phase,
    it was feasible to identify optimal mappings within a predefined function space
    based on training data for specific NLP subtasks. However, this approach did not
    entirely eliminate the need for rule design. Feature engineering emerged as a
    crucial determinant of outcomes in machine learning applications, yet the predefined
    function spaces often exhibited limited robustness and generalization capabilities
    for specific subtasks.
  prefs: []
  type: TYPE_NORMAL
- en: The introduction of deep learning models catalyzed a transformative development
    in NLP. Initially, NLP text generation predominantly utilized traditional RNNs,
    long short-term memory networks (LSTMs), or gated recurrent units (GRUs). These
    models, based on recurrent architectures, are adept at managing serialized NLP
    tasks due to their sequential processing capabilities.
  prefs: []
  type: TYPE_NORMAL
- en: RNNs incorporate a memory mechanism to address dependencies within sequence
    data (whether sequential or temporal), integrating the concept of memory into
    neural networks and learning contextually relevant patterns through training.
    Nonetheless, RNNs are challenged by their short memory spans. To overcome this
    limitation, LSTMs and GRUs were developed. Their internal gating mechanisms manage
    the information flow, preserving essential data in the sequence while eliminating
    nonessential elements. This allows significant information to persist in long-sequence
    processing tasks.
  prefs: []
  type: TYPE_NORMAL
- en: 'Nevertheless, RNN architectures, including LSTM and GRU, encounter several
    challenges that compromise their suitability as foundational structures for large
    language models (LLMs):'
  prefs: []
  type: TYPE_NORMAL
- en: '1. **Insufficient parallel computing capability**: The inherent need for RNNs
    to process each time step sequentially in sequence data impedes their ability
    to fully leverage the parallel computing capabilities of modern GPUs during training.
    This limitation significantly affects the efficiency of model training.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '2. **Long-range dependency issues**: Despite the improvements made by LSTM
    and GRU over basic RNNs in managing long-range dependencies, they still face difficulties
    with very long sequences.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '3. **Model capacity limitations**: LSTMs and GRUs possess relatively limited
    model capacities, which restrict the scalability of models in training LLMs. This
    constraint hinders their ability to capture more complex semantic information
    and construct intricate representations.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 1.3.2 Transformer
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The GPT series are based the Transformer model, a highly prevalent deep learning
    framework in NLP tasks, which was introduced by Vaswani et al. in 2017\. At the
    heart of the Transformer model lies the multihead attention mechanism—an enhancement
    of the self-attention mechanism. This mechanism computes query, key, and value
    vectors for each input element within its architecture. It determines the relationships
    (probabilities) between elements via matrix operations and generates the most
    probable sequence, thereby effectively capturing long-range dependencies within
    the input sequence.
  prefs: []
  type: TYPE_NORMAL
- en: In contrast to RNNs, the Transformer model’s self-attention mechanism is capable
    of processing the entire sequence concurrently (refer to [Fig. 1.4](#f0025)),
    maximizing the use of parallel computing capabilities to boost training efficiency.
    This architecture enables direct capture of dependencies between any positions
    in the sequence, thus effectively addressing long-range dependency challenges.
    With its excellent scalability, the Transformer model facilitates extensive model
    expansion during large-scale training, enhancing its capability to assimilate
    more information and develop more intricate representations. Consequently, it
    has become the de facto foundational architecture for applications in NLP, visual
    processing, and multimodal processing.
  prefs: []
  type: TYPE_NORMAL
- en: '![Diagram illustrating the Transformer models architecture with two encoders
    and two decoders.](../images/F000023f01-04-9780443274367.jpg)'
  prefs: []
  type: TYPE_IMG
- en: '[Figure 1.4](#Bf0025) Transformer model. Image source: [http://jalammar.github.io/illustrated-transformer/](http://jalammar.github.io/illustrated-transformer/).'
  prefs: []
  type: TYPE_NORMAL
- en: On the left, there are two encoders labeled Encoder number 1 and Encoder number
    2\. Each encoder consists of a Self-Attention Layer followed by Residual Connections
    and Layer Normalization, then a Feedforward Network and again Residual Connections
    and Layer Normalization. The input to Encoder number 1 is labeled as x sub 1 end
    sub Thinking and the input to Encoder number 2 is labeled as x sub 2 end sub Machines.
    On the right, there are two decoders labeled Decoder number 1 and Decoder number
    2\. Each decoder consists of a Self-Attention Layer, followed by Residual Connections
    and Layer Normalization, then an Encoder-Decoder Attention layer, followed by
    Residual Connections and Layer Normalization, then a Feedforward Network and again
    Residual Connections and Layer Normalization. The output of Decoder number 2 goes
    through a Linear Layer and then a Softmax layer.
  prefs: []
  type: TYPE_NORMAL
- en: It is essential to highlight that while the original Transformer model incorporates
    an encoder-decoder architecture, GPT exclusively employs the decoder component
    (refer to [Fig. 1.5](#f0030)). Both the encoder and decoder consist of *N* identical
    layers, each stacked sequentially. The source and target sequences, which may
    be images or text, are initially processed through an embedding layer to standardize
    the data to the same dimensionality. Each encoder layer features a multihead attention
    module (with *Q*, *K*, *V* inputs) and a feedforward network module. The decoder
    layer commences with a multihead attention module, succeeded by another multihead
    attention module that interacts with the outputs from the encoder stack (i.e.,
    the queries *Q* originate from the decoder, while the values *V* and keys *K*
    are derived from the encoder), and concludes with a feedforward network module.
    The output stage is processed through a softmax classifier, which determines the
    category or vocabulary with the highest probability.
  prefs: []
  type: TYPE_NORMAL
- en: '![Comparison of GPT, GPT2 and GPT3 architectures depicts their layers, components
    and parameters.](../images/F000023f01-05-9780443274367.jpg)'
  prefs: []
  type: TYPE_IMG
- en: '[Figure 1.5](#Bf0030) Diagram of the GPT series model architecture. Image source:
    [https://api.stock.us/api/v1/report-file/wz3g1myv?download](https://api.stock.us/api/v1/report-file/wz3g1myv?download).'
  prefs: []
  type: TYPE_NORMAL
- en: The GPT model includes 12 transformer layers, a word embedding dimension of
    768 and 117 million parameters. It features masked multi-head attention, layer
    normalization and a feedforward network. The GPT-2 model has 48 transformer layers,
    a word embedding dimension of 1600 and 1.5 billion parameters. It includes masked
    multi-head attention, layer normalization, residual connections and a feedforward
    network. The GPT-3 model consists of 96 transformer layers, a word embedding dimension
    of 12888 and 175 billion parameters. It also features masked multi-head attention,
    layer normalization, residual connections and a feedforward network. Each model
    uses positional encoding for text input and outputs text predictions.
  prefs: []
  type: TYPE_NORMAL
- en: 1.3.3 Unsupervised pretraining
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: All models in the GPT series undergo an unsupervised pretraining phase; however,
    they differ markedly in model size and the volume of textual data utilized. This
    phase leverages extensive corpus statistics to capture either unidirectional or
    bidirectional contextual information, which is sensitive to the relative relationships
    of data before and after in the sequence. As a generative model, GPT aims to predict
    the next word in a given context, consistently striving to generate text that
    is most relevant and coherent with the context, thereby maximizing the conditional
    probability $MathML$![Equation](../images/F000023si1.png). As illustrated in [Fig.
    1.6](#f0035), during the pretraining phase, GPT employs a unidirectional (masked
    self-attention) language model, predicting solely based on the left-side context
    without utilizing right-side context information.
  prefs: []
  type: TYPE_NORMAL
- en: '![Diagram illustrating GPT Series with decoders and masked self-attention mechanism.](../images/F000023f01-06-9780443274367.jpg)'
  prefs: []
  type: TYPE_IMG
- en: '[Figure 1.6](#Bf0035) GPT architecture’s masked self-attention. Image source:
    [http://jalammar.github.io/illustrated-gpt2/](http://jalammar.github.io/illustrated-gpt2/).'
  prefs: []
  type: TYPE_NORMAL
- en: On the left side, there is a box labeled GPT Series containing multiple decoders
    stacked from 1 to N. On the right side, there is a representation of masked self-attention.
    The masked self-attention mechanism is depicted with an arrow pointing upwards
    from a circle, indicating the focus on the left-side context without utilizing
    right-side context information. Below the masked self-attention, there are several
    blocks arranged horizontally.
  prefs: []
  type: TYPE_NORMAL
- en: The pretraining mechanism of the GPT model acquires linguistic and world knowledge
    from vast text corpora. Linguistic knowledge includes lexical, morphological,
    syntactic, and semantic aspects, which facilitate the understanding of natural
    language by both humans and machines. World knowledge encompasses factual knowledge
    (events occurring in the real world) and common-sense knowledge. Transformer-based
    language models are capable of learning basic linguistic knowledge from corpora
    ranging from tens of millions to billions of examples. However, acquiring factual
    knowledge requires significantly larger-scale training data. Unlike the relatively
    stable and finite linguistic knowledge, factual knowledge is not only abundant
    but also continuously evolving. Current research indicates that as training data
    volumes increase, the performance of pretrained models on various downstream tasks
    consistently improves, suggesting that these models primarily acquire world knowledge
    from the incremental training data. This expansion in training data enables models
    to more effectively address challenges in NLP tasks, thereby enhancing their performance
    and accuracy across different application scenarios.
  prefs: []
  type: TYPE_NORMAL
- en: 1.3.4 Supervised fine-tuning
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Although the pretraining phase endows GPT models with a broad spectrum of linguistic
    and world knowledge, achieving exemplary performance on specific tasks often necessitates
    supervised fine-tuning. In this phase, the model utilizes a labeled dataset to
    refine its parameters via supervised learning, thereby better aligning with specific
    task requirements. Typically, for the GPT series, this process is applied to NLP
    tasks such as question answering, dialogue generation, and sentiment analysis.
    However, not all GPT models are subjected to supervised fine-tuning due to the
    complexities and high costs associated with constructing training datasets for
    downstream tasks. Moreover, as the number of model parameters increases, the cost
    of training escalates exponentially. In the GPT series, while models like GPT-1
    and GPT-3.5 and above have undergone supervised fine-tuning with a limited number
    of samples, their core competencies primarily derive from the extensive pretraining
    phase. These models are further adapted to more downstream tasks through contextual
    learning.
  prefs: []
  type: TYPE_NORMAL
- en: 1.3.5 Human feedback reinforcement learning
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Supervised fine-tuning can improve model performance on specific tasks, yet
    challenges may persist. To further refine the model, versions GPT-3.5 and above
    have incorporated human feedback reinforcement learning (HFRL). As depicted in
    [Fig. 1.7](#f0040), this process involves evaluating the responses generated by
    the model using human reviewers, whose assessments serve as reinforcement learning
    signals to enhance model performance. Consequently, ChatGPT can progressively
    improve the quality of its responses through interactions with humans.
  prefs: []
  type: TYPE_NORMAL
- en: '![A diagram illustrating the process of reinforcement learning involving reward
    prediction, human feedback and environment.](../images/F000023f01-07-9780443274367.jpg)'
  prefs: []
  type: TYPE_IMG
- en: '[Figure 1.7](#Bf0040) The fundamental principles of reinforcement learning
    with human feedback.'
  prefs: []
  type: TYPE_NORMAL
- en: 'The components are: Reinforcement Learning Algorithm, Reward Prediction and
    Environment. The Reinforcement Learning Algorithm generates a Predicted Reward
    which is sent to Reward Prediction. Human Feedback is provided to Reward Prediction.
    The Reward Prediction sends Observation to the Reinforcement Learning Algorithm.
    The Reinforcement Learning Algorithm sends Action to the Environment. The Environment
    sends Observation back to the Reinforcement Learning Algorithm.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Specifically, questions are randomly selected from a dataset, and human annotators
    provide high-quality answers, which are then utilized to fine-tune the GPT model.
    Through this supervised learning phase, the model is trained to produce answers
    that more accurately meet human expectations. HFRL comprises three steps: initial
    supervised fine-tuning; subsequent training of a reward model (RM), where human
    annotators rank the outputs, and these rankings are employed to train the RM;
    and finally, using the trained RM to refine the strategy through reinforcement
    learning, updating the parameters of the pretrained model based on feedback from
    the RM. By iteratively repeating the last two steps, a higher-quality model is
    developed, better aligning the generated content with human requirements.'
  prefs: []
  type: TYPE_NORMAL
- en: 1.4 The technology stack of large language model
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: LLMs such as ChatGPT are rapidly evolving into essential infrastructural elements.
    They encompass a varied technological stack that incorporates features like containerization,
    performance monitoring, business intelligence, event processing, cloud services,
    microservices, and analytical tools. This technological stack can be systematically
    categorized into five distinct layers, ascending from the foundational level as
    depicted in [Fig. 1.8](#f0045).
  prefs: []
  type: TYPE_NORMAL
- en: 1. **Infrastructure layer:** This layer is fundamental in providing the necessary
    infrastructure for the execution of both training and inference tasks, which includes
    the use of public clouds, private clouds, and specialized computational hardware.
    At this level, the efficiency of AI-specific hardware, such as GPUs and tensor
    processing units, often becomes a critical bottleneck. The computational efforts
    for most extensive language models predominantly occur on these devices within
    cloud environments, serving both model providers and research laboratories for
    training purposes, as well as businesses engaged in model deployment or fine-tuning.
    Since the transition from CPUs to GPUs as the primary computing units in AI, the
    field has confronted renewed challenges associated with the immense demands for
    computational power, marking a significant challenge over the past decade.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 2. **Framework layer:** This layer includes advanced deep learning and distributed
    training frameworks that are essential for the training and deployment of models.
    Prominent frameworks such as PyTorch and TensorFlow, along with distributed training
    systems like Pathway, Megatron-LM, and DeepSpeed Zero, fall within this category.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 3. **Model layer:** This layer comprises a variety of open-source and proprietary
    models, which typically support higher layers, such as the application layer or
    middleware, through APIs.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 4. **Middleware layer:** This layer involves the encapsulation of interfaces
    for LLMs, optimization prompts, integration of external knowledge, and interfaces
    for additional third-party tools. It provides critical middleware services equipped
    with long-term memory and proxy capabilities, which meet diverse workflow requirements
    from the user layer. This layer simplifies workflow decomposition, tool invocation,
    and the connection between the application and model layers, thereby easing the
    interaction between developers and models and reducing barriers to the practical
    utilization of LLMs.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 5. **Application layer:** This final layer integrates AI models into end-user
    applications. Many businesses incorporate LLMs into their client-facing applications
    or search engines, either via the middleware layer or through direct model invocation.
    This integration empowers products with the advanced collaborative and generative
    capabilities of LLMs, exemplified by Microsoft’s New Bing.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![A technological stack categorized into 5 layers, Application, Middleware,
    Model, Framework and Infrastructure.](../images/F000023f01-08-9780443274367.jpg)'
  prefs: []
  type: TYPE_IMG
- en: '[Figure 1.8](#Bf0045) Technology stack of large language models.'
  prefs: []
  type: TYPE_NORMAL
- en: 'The layers are as follows: Application Layer, Middleware Layer, Model Layer,
    Framework Layer and Infrastructure Layer. The Application Layer includes Online
    Platform Application and Client Application. Online Platform Application refers
    to LLM-type applications based on public network platforms, single-platform applications
    with huge traffic volumes. Client Application refers to LLM applications providing
    client interaction. The Middleware Layer includes Middleware Framework, which
    refers to middleware frameworks such as LangChain and HuggingGPT. The Model Layer
    includes Proprietary Pre-trained Models, Model Hub and Open-source Project. Proprietary
    Pre-trained Models refer to commercialized pre-trained models accessible through
    API calls. Model Hub refers to open-source model sharing platform. Open-source
    Project refers to pre-trained models with open-source code and weights, generally
    available for free use. The Framework Layer includes Training Framework, which
    refers to deep learning frameworks such as PyTorch and TensorFlow, as well as
    distributed training frameworks like Pathway, Megatron-LM and DeepSpeed Zero.
    The Infrastructure Layer includes Cloud Platform and Computing Hardware and Chips.
    Cloud Platform refers to open computing platforms for training or cloud deployment,
    such as Azure, AWS, GCP, Alibaba Cloud, etc., as well as private clouds. Computing
    Hardware and Chips refer to computing acceleration chips and storage chips for
    LLM training and deployment, including CPU, GPU, DSA (e.g., TPU), memory, NVMe,
    Infiniband.'
  prefs: []
  type: TYPE_NORMAL
- en: Moreover, some proprietary models, such as OpenAI’s ChatGPT, are directly embedded
    into upper-layer applications. Other organizations, motivated by data privacy
    or specific business needs, may adapt open-source large models to develop bespoke
    solutions tailored to unique industry requirements, thereby offering customized
    services to end users.
  prefs: []
  type: TYPE_NORMAL
- en: 1.5 The impact of large language models
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'The success of ChatGPT has had profound implications for NLP and related fields.
    Looking forward, technological development trends in this area may exhibit the
    following characteristics:'
  prefs: []
  type: TYPE_NORMAL
- en: '1. The independent research significance of NLP subfields may gradually diminish.
    As the scale of LLMs expands, the performance of various subtasks within the NLP
    domain is expected to improve significantly. Traditional fine-tuning methods based
    on small models may gradually be replaced by approaches leveraging large models
    and content learning techniques, such as prompting. Many issues previously considered
    “domain-specific” may primarily stem from a lack of domain knowledge. With sufficient
    domain knowledge, these problems can potentially be resolved. The path to achieving
    AGI might be more straightforward than anticipated: it may simply require providing
    LLMs with more domain-specific data to enable self-learning.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 2. LLMs are anticipated to become multimodal and serve as general human–computer
    interfaces. As illustrated in [Fig. 1.9](#f0050), the application domains of LLMs
    are expected to extend beyond NLP to include image processing, video, and speech
    tasks. The demonstration during the release of GPT-4 has already showcased the
    application scenarios of multimodal LLMs. These models have the potential to evolve
    into general human–computer interfaces supporting multimodal input and output.
    This trend may start with operating systems and commonly used software tools,
    gradually permeating software across various industries, ultimately achieving
    widespread application.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 3. The training and deployment of large models with low computational power
    will become a focal point of research and application. Given the substantial financial
    investment required to develop LLMs, only a few major enterprises are likely to
    continue releasing LLMs that can compete with ChatGPT. Many companies operating
    in specific vertical domains may attempt to customize open-source versions by
    leveraging domain-specific data to establish their own competitive “moats.” However,
    the capabilities of LLMs generally become evident only after reaching a certain
    scale threshold. Thus, achieving ideal results through small-scale models with
    domain data fine-tuning may not be effective. Consequently, low computational
    power training and deployment of large models will inevitably become a prominent
    area of research and application.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '4. Middleware based on LLMs will integrate enterprise workflows. Many small
    and medium-sized enterprises may utilize middleware based on LLMs (see [Fig. 1.10](#f0055))
    to integrate their workflows, thereby enhancing their competitiveness, despite
    potential compromises to the security of domain data. Large models like ChatGPT
    not only demonstrate efficiency in processing and generating multimodal data but
    also exhibit complex reasoning capabilities and robustness to out-of-distribution
    events. This enables LLMs to function as intelligent agents that integrate existing
    enterprise workflows, thereby automating processes and improving efficiency. This
    could lead to a concerning spiral effect: the more domain data is monopolized
    by LLMs, the faster their capabilities will iterate. Consequently, other small
    and medium-sized enterprises, to avoid falling behind in the competition, will
    increasingly rely on the efficiency improvements brought about by integrating
    their workflows with middleware based on LLMs.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Infographic on a general purpose interface for language, vision and multilingual
    tasks, including visual QnA, emotion detection, classification and cross lingual
    Q and A.](../images/F000023f01-09-9780443274367.jpg)'
  prefs: []
  type: TYPE_IMG
- en: '[Figure 1.9](#Bf0050) Large language models as a universal interface.'
  prefs: []
  type: TYPE_NORMAL
- en: 'At the top, there is a box labeled Summarize the content of the following article
    connected to a General-Purpose interface box. Below this, there are three boxes
    labeled Language, Vision and Multilingual. Below these, there are various examples,
    a picture of a robot with the question How many robots are in the picture? and
    the answer One, another picture of multiple robots with the same question and
    the answer Three. There is also a picture of a flower with the question Q: What
    is this? and the answer Plum blossom, labeled as Visual Question Answering. Other
    examples include Determine the emotion: Great ball skills with the answer Positive
    labeled as Instruction-guided Fine-tuning Model, New CPU, choose AMD, GPU, choose...
    What is the topic? with the answer Electronics labeled as Classification and Répondre
    aux questions en anglais: What fruit is good to eat when you are sick? with the
    answer Bananas labeled as Cross Lingual Question Answering. On the right side,
    there is a section labeled Multi turn Dialogue with questions and answers about
    MetaLM, general interface, audio, AGI, pre-training task and semi-causal language
    modeling.'
  prefs: []
  type: TYPE_NORMAL
- en: '![A flowchart depicting the integration of workflows using middleware based
    on LLMs for small and medium-sized enterprises.](../images/F000023f01-10-9780443274367.jpg)'
  prefs: []
  type: TYPE_IMG
- en: '[Figure 1.10](#Bf0055) Diagram for integrating workflows based on the middleware
    of large language models (AutoGPT).'
  prefs: []
  type: TYPE_NORMAL
- en: The process starts with Setting Objectives which leads to Definition and Sequencing
    of Tasks. If the Objective Not Achieved, it loops back to Definition and Sequencing
    of Tasks. Otherwise, it proceeds to Task Execution. Task Execution is followed
    by Evaluation. If the evaluation is successful, the process ends. If not, it loops
    back to Definition and Sequencing of Tasks. The Task Execution is supported by
    AI Large Pre-trained Language Model (GPT-4), Network, and Other Tools.
  prefs: []
  type: TYPE_NORMAL
- en: 1.6 The challenges of training or deploying large models
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 1.6.1 Computational power
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Before the emergence of LLMs like GPT-4, there were few applications that required
    such powerful GPU computing capabilities. The computational cost of these LLMs
    mainly involves two aspects: the initial training of the model and subsequent
    operational maintenance. For companies planning to train or deploy LLMs like GPT-4,
    their demand for computing power is mainly reflected in the following two stages:'
  prefs: []
  type: TYPE_NORMAL
- en: '1. Pretraining and fine-tuning stage: In this stage, the model undergoes pretraining
    from scratch using vast amounts of general data, simultaneously validating the
    effectiveness of the pretrained model to establish its foundational knowledge.
    Subsequently, the model is fine-tuned with specific data tailored to particular
    commercial applications or other scenarios to enhance response accuracy. While
    specific data for GPT-4 at this stage has not been disclosed, estimates can be
    made based on other LLMs. For instance, the Meta LLaMA model with 65 billion parameters
    was trained on 1.4 trillion tokens over approximately 21 days using 2048 Nvidia
    A100 GPUs, incurring a training cost of about 1 million GPU hours.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: For a model like GPT-3, with 175 billion parameters, the training requires 3.14E23
    FLOPS. Assuming the use of NVIDIA 80GB A100 GPUs (theoretical performance of 312
    TFLOPS) and employing tensor parallelism and pipeline parallelism technologies
    to achieve over 50% utilization, the estimated requirement is 758 A100 GPUs for
    a training duration of 1 month. Although specific parameters for ChatGPT 3.5 and
    4.0 have not been disclosed, they are presumed to be on a similar scale to GPT-3,
    with 175 billion parameters. Based on available data from the ChatGPT website,
    the memory usage is estimated to be between 350 and 500 GB. However, training
    might require the computational power of over 1000 A100 GPUs to achieve results
    within an acceptable timeframe. It is also reported that Microsoft and OpenAI
    constructed a supercomputer with over 10,000 GPUs for training GPT-3, with a single
    training session costing around $5 million.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '2. Inference and deployment stage: Once fine-tuned, the LLM can be deployed
    in real-world production environments. Compared with the training stage, the computational
    demand during the deployment stage is relatively lower, but the scale is significantly
    larger. For extensive online interactions, the deployment stage incurs substantial
    server and chip costs, potentially surpassing those of the training stage. This
    is because numerous servers are needed in a cluster to provide parallel network
    services, primarily involving extensive matrix computations and storage management.
    In specific scenarios, such as edge applications, there may be unique requirements
    for hardware cost-effectiveness and response latency, where traditional GPUs might
    not suffice.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'According to a recent interview with OpenAI CEO Sam Altman, we can make the
    following assumptions: If OpenAI adopts the dense model architecture of GPT-3,
    with 175 billion parameters, a hidden layer dimension of 16k, a sequence length
    of 4k, an average token count of 2k per response, and 15 responses per user for
    13 million daily active users, considering 50% hardware utilization due to idle
    times and a cost of $1 per GPU per hour (with performance twice that of FasterTransformer),
    the daily computational hardware cost for ChatGPT is approximately $690,000\.
    OpenAI would require about 3617 HGX A100 servers (totaling 28,936 GPUs) to provide
    ChatGPT services, with each query costing around 0.36 cents.'
  prefs: []
  type: TYPE_NORMAL
- en: 1.6.2 Data
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The training of LLMs relies on vast amounts of data, which enable them to learn
    and master the various knowledge encapsulated in natural language. At the same
    time, considering the quality of LLMs, these data must be effectively cleaned,
    annotated, organized, and stored. Therefore, the cost of the infrastructure, tools,
    and data engineers required for these tasks, as well as data management and processing,
    can rapidly increase.
  prefs: []
  type: TYPE_NORMAL
- en: For example, the LLaMA model utilized a training dataset totaling 4.6TB, comprising
    1.4 trillion tokens. As illustrated in [Fig. 1.11](#f0060), the pretraining text
    data for GPT-3 amounted to a staggering 45TB. These massive data volumes highlight
    the resources needed for model training and underscore the importance of data
    quality. It has been reported that the world’s largest Chinese corpus, WuDaoCorpora,
    stores 3TB of Chinese text data, with 200GB made publicly available.
  prefs: []
  type: TYPE_NORMAL
- en: '![The table details datasets for pre-training, supervised fine-tuning and PPO,
    including quantities, weights, epochs and labeled instances.](../images/F000023f01-11-9780443274367.jpg)'
  prefs: []
  type: TYPE_IMG
- en: '[Figure 1.11](#Bf0060) Composition of the GPT-3 training dataset. Data source:
    paper “Training language models to follow instructions with human feedback”.'
  prefs: []
  type: TYPE_NORMAL
- en: 'The table consists of three main sections: Pre-trained Dataset (Basic Training),
    Training Dataset for Supervised Fine-Tuning (Cognitive/Expressive Training) and
    Training Dataset for PPO (Domain Generalization). The Pre-trained Dataset section
    has four columns: Dataset, Quantity (Tokens), Weights in Mixed Training and Epochs
    Required for Training 300B Tokens. It reads as follows: Row 1\. Common Crawl (filtered):
    410 billion, 60 percent, 0.44\. Row 2\. WebText2: 19 billion, 22 percent, 2.9\.
    Row 3\. Books1: 12 billion, 8 percent, 1.9\. Row 4\. Books2: 55 billion, 8 percent,
    0.43\. Row 5\. Wikipedia: 3 billion, 3 percent, 3.4\. The Training Dataset for
    Supervised Fine-Tuning section has three columns: Category, Corpus Source and
    Count. It reads as follows: Row 1\. Training Dataset: Annotator, 11295\. Row 2\.
    Training Dataset: Client, 1430\. The Training Dataset for PPO section has three
    columns: Category, Corpus Source and Count. It reads as follows: Row 1\. Training
    Dataset: Annotator, 11295.'
  prefs: []
  type: TYPE_NORMAL
- en: For training a Chinese version of GPT-3.5, only a few vertical industry companies,
    apart from giants in the search and social sectors, have access to sufficient
    data. However, a significant legal and ethical issue arises regarding whether
    the text data acquired during business operations can be used for model training.
    Even Codex, which was trained on open-source data from GitHub, faced considerable
    criticism. Notably, the multimodal training dataset for GPT-4 comprises both images
    and text, potentially including various types such as chart reasoning, physics
    exams, image understanding, paper summarization, and comic text.
  prefs: []
  type: TYPE_NORMAL
- en: 1.6.3 Engineering
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The development of LLMs relies on specialized researchers and engineers who
    are responsible for creating the architecture and correctly configuring the training
    process. As illustrated in [Fig. 1.12](#f0065), the architecture of the model
    determines how it learns and generates text. Designing, implementing, and managing
    these architectures require expertise in various fields of computer science. The
    salaries for engineers and researchers responsible for publishing and delivering
    cutting-edge research results often reach hundreds of thousands of dollars. It
    is important to note that the skill set required for developing LLMs may differ
    significantly from the traditional skill set of machine learning engineers, as
    depicted in [Fig. 1.2](#f0015).
  prefs: []
  type: TYPE_NORMAL
- en: '![Diagram showing components of a model architecture.](../images/F000023f01-12-9780443274367.jpg)'
  prefs: []
  type: TYPE_IMG
- en: '[Figure 1.12](#Bf0065) Infrastructure of machine learning systems.'
  prefs: []
  type: TYPE_NORMAL
- en: The diagram illustrates various components of a model architecture. The components
    are Configuration, Data Collection, Data Validation, Machine Resource Management,
    Service Infrastructure, Supervision, Feature Extraction, Process Management Tools,
    Analytical Tools and ML Code.
  prefs: []
  type: TYPE_NORMAL
- en: Moreover, training LLMs imposes high standards on engineering practices. This
    includes data cleaning, the engineering implementation of large-scale distributed
    training, and techniques for maintaining training stability with a large number
    of parameters and data volumes.
  prefs: []
  type: TYPE_NORMAL
- en: 1.7 The limitations of large language models
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'While LLMs like GPT-4 have demonstrated significant capabilities in context-based
    dialogue, programming, and even in understanding images and analyzing data graphs,
    they are still far from achieving AGI. These models face several critical limitations:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Authenticity and accuracy**: LLMs often lack robust guarantees of authenticity
    and accuracy. For example, in areas not extensively covered during training, GPT-4
    may not exhibit human-like common sense or robust logical reasoning, sometimes
    generating incorrect or misleading answers. Despite improvements over previous
    models, GPT-4 can still produce inappropriate suggestions or inaccurate data,
    making it unsuitable for use in high-risk sectors like legal and medical fields.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Interpretability**: The internal workings of LLMs like GPT-4 are complex
    and not fully transparent, making it challenging to guarantee the safety of their
    outputs. While there have been advancements in reducing error rates, the potential
    for harmful outputs poses a risk, potentially leading to legal issues for developers
    and users.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Social and ethical implications**: These models can inadvertently generate
    biased, false, or offensive content due to their “black box” nature. Despite efforts
    to mitigate risks, there remains a possibility for misuse in creating misleading
    information or harmful content, such as fake news or propaganda.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Privacy concerns**: LLMs are trained on vast amounts of data, some of which
    may include sensitive personal information. This raises concerns about privacy
    breaches, as the model could inadvertently learn and reproduce private data.'
  prefs: []
  type: TYPE_NORMAL
- en: 1.8 Summary
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This chapter conducts a thorough analysis and discussion on the evolutionary
    trajectory of ChatGPT AI, highlighting its significant influence. Tracing the
    development from the initial GPT-1 and GPT-2 models to the more sophisticated
    GPT-3 and GPT-4, it emphasizes the pivotal role each version has played in propelling
    the field of AI forward.
  prefs: []
  type: TYPE_NORMAL
- en: The chapter explores the functional breadth of ChatGPT, detailing its proficiency
    in language comprehension and generation, the accuracy of its sentiment analysis,
    and its adeptness at answering questions and crafting poetry. It also offers a
    detailed examination of the shift from early NLP technologies to contemporary
    Transformer models, with a focus on the architectural design of large-scale models.
  prefs: []
  type: TYPE_NORMAL
- en: Further, the text delves into the extensive impact of LLMs across various sectors
    including commercial, academic, and policy realms, while also addressing significant
    concerns such as the immense data and computational demands required for these
    models. Critical challenges such as model hallucinations, biases, interpretability
    issues, and privacy concerns are also discussed.
  prefs: []
  type: TYPE_NORMAL
- en: In summary, this chapter provides a holistic understanding of the operational
    mechanisms, potential, and challenges associated with ChatGPT and similar LLMs.
    Future chapters will further dissect the principles underlying ChatGPT to better
    comprehend its influence and prospective advancements.
  prefs: []
  type: TYPE_NORMAL
- en: <hgroup>
  prefs: []
  type: TYPE_NORMAL
- en: Chapter 2 In-depth understanding of the transformer model
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: </hgroup>
  prefs: []
  type: TYPE_NORMAL
- en: Abstract
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This chapter offers a comprehensive exploration of the Transformer model, a
    pivotal innovation in deep learning, particularly in natural language processing.
    The chapter begins by outlining the model’s core components, including the self-attention
    mechanism, multihead attention, feedforward neural networks (FNNs), residual connections,
    layer normalization, and positional encoding. It delves into the self-attention
    mechanism’s ability to capture long-range dependencies by computing attention
    weights among input elements. Multihead attention is discussed as an enhancement
    that enables simultaneous processing of multiple aspects of input sequences. The
    chapter also covers the role of FNNs in capturing nonlinear features, the importance
    of residual connections for gradient flow, and layer normalization for training
    stability. Positional encoding is highlighted as crucial for incorporating sequence
    order information. Finally, training and optimization techniques such as loss
    functions, optimizers, and learning rate strategies are discussed to enhance model
    performance.
  prefs: []
  type: TYPE_NORMAL
- en: Keywords
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Transformer model; self-attention mechanism; multihead attention; feedforward
    neural networks; residual connections; layer normalization; positional encoding;
    natural language processing (NLP); training optimization
  prefs: []
  type: TYPE_NORMAL
- en: The Transformer model represents a significant shift in deep learning paradigms,
    primarily through its utilization of the self-attention mechanism. This innovation
    has fundamentally altered the conventional approaches typically associated with
    recurrent neural networks (RNNs) and convolutional neural networks, thereby reshaping
    the landscape of natural language processing (NLP). Currently, the Transformer
    stands as a cornerstone in NLP research and development, underpinning a variety
    of prominent models including bidirectional encoder representations from transformers
    (BERT) and generative pre-trained transformer (GPT). This chapter will provide
    a comprehensive examination of the Transformer model’s essential components.
  prefs: []
  type: TYPE_NORMAL
- en: 2.1 Introduction to the transformer model
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: As depicted in [Fig. 2.1](#f0010), the fundamental components of the Transformer
    model encompass the multihead attention mechanism, feedforward neural networks
    (FNNs), residual connections coupled with layer normalization, and positional
    encoding.
  prefs: []
  type: TYPE_NORMAL
- en: '![Diagram of Transformer model: multihead attention, feedforward networks,
    residual connections, layer normalization, positional encoding.](../images/F000011f02-01-9780443274367.jpg)'
  prefs: []
  type: TYPE_IMG
- en: '[Figure 2.1](#Bf0010) Transformer model.'
  prefs: []
  type: TYPE_NORMAL
- en: On the left, there is a sequence of operations starting with Input Embedding
    followed by Positional Encoding and then multiple layers of Add and Norm with
    Multi-Head Attention and Feed Forward blocks, repeated N times. On the right,
    there is a similar structure starting with Output Embedding followed by Positional
    Encoding and multiple layers of Add and Norm with Masked Multi-Head Attention,
    Multi-Head Attention, and Feed Forward blocks, also repeated N times. The output
    probabilities are obtained through a Linear layer followed by Softmax. The diagram
    also zooms into the Multi-Head Attention mechanism, showing Scaled Dot-Product
    Attention with inputs V, K, and Q passing through Linear layers, concatenated
    and then processed through another Linear layer. Another zoom-in shows the Scaled
    Dot-Product Attention process, where Q and K are multiplied (MatMul), scaled,
    optionally masked, passed through SoftMax and then multiplied with V (MatMul).
  prefs: []
  type: TYPE_NORMAL
- en: Central to the Transformer architecture is the self-attention mechanism, which
    assesses relationships between each element of the input sequence and every other
    element. Specifically, it generates “key,” “query,” and “value” representations
    for each input element, employing these to execute a weighted summation that produces
    the output sequence. An elaboration of self-attention, the multihead attention
    mechanism, allows the model to simultaneously address various contexts within
    the input sequence. It partitions the input into multiple subspaces, each processed
    through independent self-attention calculations. The concatenated results of these
    subspaces formulate the composite output sequence.
  prefs: []
  type: TYPE_NORMAL
- en: Additionally, the FNN is a pivotal element within the Transformer. Each FNN
    within the Transformer is composed of two linear layers with an intervening activation
    function. Outputs from self-attention undergo processing through the first linear
    layer, proceed through the activation function, and continue through the second
    linear layer, a sequence repeated across every Transformer layer.
  prefs: []
  type: TYPE_NORMAL
- en: To accelerate training and improve model efficacy, the Transformer architecture
    incorporates residual connections and layer normalization. Residual connections
    facilitate the integration of the input sequence by adding it element wise to
    the outputs of the self-attention and FNNs, thus forming a modified sequence.
    Subsequent layer normalization of this sequence across its dimensions aids in
    hastening the training process.
  prefs: []
  type: TYPE_NORMAL
- en: The inherent design of the self-attention mechanism does not capture the sequential
    order of elements, necessitating the introduction of positional encoding within
    the Transformer model. This encoding utilizes sine and cosine functions to create
    unique positional encodings for each element, which are subsequently added to
    the elements of the input sequence, thereby embedding information about the sequence
    order.
  prefs: []
  type: TYPE_NORMAL
- en: For training, the Transformer predominantly employs the maximum likelihood estimation
    method, aiming to optimize model parameters by minimizing the cross-entropy loss.
    To further enhance the training speed, the Transformer commonly uses the Adam
    optimizer, alongside techniques such as learning rate warmup and gradient clipping.
  prefs: []
  type: TYPE_NORMAL
- en: 2.2 Self-attention mechanism
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The conceptual foundation of the attention mechanism draws inspiration from
    human visual and cognitive processes. When assimilating visual or linguistic data,
    individuals tend to concentrate on specific segments of the input, disregarding
    extraneous details. This selective focus mitigates computational and cognitive
    loads, thereby bolstering the efficiency and accuracy of information processing.
  prefs: []
  type: TYPE_NORMAL
- en: 2.2.1 The calculation process of self-attention
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Self-attention, a specialized variant of the attention mechanism, facilitates
    interactions among all elements within an input sequence to ascertain their respective
    attention weights. This capability allows the self-attention mechanism to incorporate
    all elements when processing sequential data. The principal rationale of self-attention
    is to allocate a weight to each sequence element, dictating the model’s focus
    intensity on other elements during the processing of a specific one. A significant
    advantage of self-attention is its proficiency in capturing long-range dependencies
    within the sequence, thus augmenting the model’s representational capacity. In
    the Transformer, the self-attention computation involves several steps:'
  prefs: []
  type: TYPE_NORMAL
- en: Initially, the input sequence—comprising elements like words, characters, or
    other types—is converted into vector representations via an embedding layer. Subsequently,
    for each element, vectors known as queries, keys, and values are derived typically
    through multiplication with distinct weight matrices.
  prefs: []
  type: TYPE_NORMAL
- en: As illustrated in [Fig. 2.2](#f0015), an input sequence denoted as $MathML$![Equation](../images/F000011si1.png)
    is transformed through an embedding layer to yield token embeddings $MathML$![Equation](../images/F000011si2.png).
    Three transformation matrices, $MathML$![Equation](../images/F000011si3.png),
    $MathML$![Equation](../images/F000011si4.png), and $MathML$![Equation](../images/F000011si5.png),
    are employed to convert these embeddings into vectors $MathML$![Equation](../images/F000011si6.png),
    $MathML$![Equation](../images/F000011si7.png), and $MathML$![Equation](../images/F000011si8.png),
    respectively, representing the tokens’ semantic features in a latent space.
  prefs: []
  type: TYPE_NORMAL
- en: '![A schematic of an attention mechanism in a neural network, showing embeddings,
    multiplications and softmax operations with labeled components and connections.](../images/F000011f02-02-9780443274367.jpg)'
  prefs: []
  type: TYPE_IMG
- en: '[Figure 2.2](#Bf0015) Self-attention mechanism.'
  prefs: []
  type: TYPE_NORMAL
- en: 'It includes embeddings, multiplications and softmax operations. At the bottom,
    there are three input vectors labeled x sub 1 end sub, x sub 2 end sub and x sub
    3 end sub, which are transformed into embeddings e sub 1 end sub, e sub 2 end
    sub and e sub 3 end sub, respectively. These embeddings are then processed through
    weight matrices W superscript Q end superscript, W superscript K end superscript
    and W superscript V end superscript to produce q sub 1 end sub, k sub 1 end sub,
    v sub 1 end sub, q sub 2 end sub, k sub 2 end sub, v sub 2 end sub, q sub 3 end
    sub, k sub 3 end sub and v sub 3 end sub. The attention scores at sub 11 end sub,
    at sub 12 end sub and at sub 13 end sub are computed using these vectors. These
    scores are then passed through a softmax layer to produce st sub 11 end sub, st
    sub 12 end sub and st sub 13 end sub, which are multiplied by wt sub 11 end sub,
    wt sub 12 end sub and wt sub 13 end sub, respectively. The results are summed
    and added to b sub 1 end sub. The diagram includes arrows indicating the flow
    of operations: embedding, multiplication and softmax.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Subsequently, vector $MathML$![Equation](../images/F000011si9.png) is dot-multiplied
    with each $MathML$![Equation](../images/F000011si10.png) to compute initial attention
    scores, $MathML$![Equation](../images/F000011si11.png). Notably, $MathML$![Equation](../images/F000011si12.png)
    is scalar. These scores are normalized using a softmax function to derive $MathML$![Equation](../images/F000011si13.png).
    Each $MathML$![Equation](../images/F000011si14.png) then multiplies the corresponding
    value vectors $MathML$![Equation](../images/F000011si15.png) to generate vectors
    $MathML$![Equation](../images/F000011si16.png). Softmax normalization of the dot
    products, adjusted by the square root of the vector dimension, ensures that the
    sum of attention weights is unity, with individual weights ranging from 0 to 1\.
    The summation of all $MathML$![Equation](../images/F000011si17.png) vectors yields
    the output vector $MathML$![Equation](../images/F000011si18.png), embodying the
    self-attention mechanism’s essence: each input token’s output vector is computed
    similarly. This procedure is replicated across the input sequence to generate
    all output vectors $MathML$![Equation](../images/F000011si19.png), $MathML$![Equation](../images/F000011si20.png).
    Unlike RNNs, the computation of self-attention does not rely on prior hidden states
    but includes positional information in the embeddings, allowing for the model
    to recognize the relative positions of tokens and facilitating the parallelization
    of computations.'
  prefs: []
  type: TYPE_NORMAL
- en: As depicted in [Fig. 2.3](#f0020), by concatenating the vectors $MathML$![Equation](../images/F000011si21.png)
    into matrix “*E*,” matrix-based self-attention operations are enabled. Multiplying
    “*E*” by the parameter matrices $MathML$![Equation](../images/F000011si22.png),
    $MathML$![Equation](../images/F000011si23.png), and $MathML$![Equation](../images/F000011si24.png)
    results in matrices “*Q*,” “*K*,” and “*V*.”
  prefs: []
  type: TYPE_NORMAL
- en: '![A matrix-based self-attention operations by concatenating vectors e1, e2
    and e3 into matrix E.](../images/F000011f02-03-9780443274367.jpg)'
  prefs: []
  type: TYPE_IMG
- en: '[Figure 2.3](#Bf0020) Matrix computation process of the self-attention mechanism.
    [https://sebastianraschka.com/blog/2023/self-attention-from-scratch.html](https://sebastianraschka.com/blog/2023/self-attention-from-scratch.html).'
  prefs: []
  type: TYPE_NORMAL
- en: The process starts with an input matrix x with dimensions n by d, where n is
    the number of tokens and d is the embedding size. The input x is multiplied by
    three weight matrices W sub q superscript T end sub, W sub k superscript T end
    sub and W sub v superscript T end sub to produce matrices Q, K and V, respectively.
    The dimensions of W sub q superscript T end sub and W sub k superscript T end
    sub are d by d sub q end sub and the dimension of W sub v superscript T end sub
    is d by d sub v end sub. The resulting matrices Q and K have dimensions n by d
    sub q end sub and V has dimensions n by d sub v end sub. The matrix Q is then
    multiplied by the transpose of matrix K (K superscript T end superscript) to produce
    an attention matrix with dimensions n by n. This attention matrix is passed through
    a softmax function to produce matrix A with dimensions n by n. Finally, matrix
    A is multiplied by matrix V to produce the output matrix Z with dimensions n by
    d sub v end sub.
  prefs: []
  type: TYPE_NORMAL
- en: The attention score matrix is calculated by multiplying “*Q*” with the transpose
    of “*K*.” This matrix is then row-normalized using softmax to produce a normalized
    attention score matrix “*A*,” where each row sums to one. This matrix “*A*” of
    size $MathML$![Equation](../images/F000011si25.png) is multiplied with “*V*” to
    produce the final matrix “*Z*,” which dimensions $MathML$![Equation](../images/F000011si26.png)
    indicate “*n*” tokens, each with a value vector of length $MathML$![Equation](../images/F000011si27.png).
    The self-attention formula is expressed as
  prefs: []
  type: TYPE_NORMAL
- en: $MathML$ (2.1)
  prefs: []
  type: TYPE_NORMAL
- en: '![Equation](../images/F000011si28.png) (2.1)'
  prefs: []
  type: TYPE_IMG
- en: Here, “*Q*,” “*K*,” “*V*” are hidden state matrices derived by multiplying the
    input matrix “*X*” with three parameter matrices, and $MathML$![Equation](../images/F000011si29.png)
    represents the number of columns in matrix $MathML$![Equation](../images/F000011si30.png).
  prefs: []
  type: TYPE_NORMAL
- en: The division by $MathML$![Equation](../images/F000011si31.png) addresses potential
    vanishing gradient issues. When dkd_kdk is large, the variance in the attention
    scores can be significant, leading to diminished gradients as extreme values are
    squashed by the softmax function. Normalizing by $MathML$![Equation](../images/F000011si32.png)
    reduces this variance from $MathML$![Equation](../images/F000011si33.png) to 1,
    thereby stabilizing the gradients.
  prefs: []
  type: TYPE_NORMAL
- en: 2.2.2 The essence of the self-attention mechanism
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The matrices “*Q*,” “*K*,” and “*V*” represent linear transformations of the
    input matrix “*X*” and can be conceptualized as the semantic representations of
    “*X*” in a latent space. For simplification, these matrices may collectively be
    referred to as “*X*.” Omitting the normalization factor $MathML$![Equation](../images/F000011si34.png)
    leads to a modified version of [Eq. (2.1)](#eqn1), expressed as
  prefs: []
  type: TYPE_NORMAL
- en: $MathML$ (2.2)
  prefs: []
  type: TYPE_NORMAL
- en: '![Equation](../images/F000011si35.png) (2.2)'
  prefs: []
  type: TYPE_IMG
- en: In this formulation, $MathML$![Equation](../images/F000011si36.png) symbolizes
    the product of matrix “*X*” and its transpose, an operation in vector space representing
    the inner products between vectors. This reflects the similarity of the input
    vectors. The geometric interpretation of an inner product between two vectors
    is indicative of the angle between them and the projection of one vector onto
    another. Consequently, the higher the similarity between two vectors, the greater
    the projection value; conversely, when two vectors are perpendicular, indicating
    linear independence, their inner product equates to zero.
  prefs: []
  type: TYPE_NORMAL
- en: As demonstrated in [Fig. 2.4](#f0025), consider an input sequence $MathML$![Equation](../images/F000011si37.png)
    represented by elements $MathML$![Equation](../images/F000011si38.png). Should
    the embedding layer utilize one-hot encoding, the input matrix “*X*” assumes a
    specific configuration. The product of this matrix with its transpose effectively
    serves as an attention weight matrix. This configuration facilitates the straightforward
    computation of attention weights, deriving from the similarities and dissimilarities
    among various input elements, thereby simplifying and enhancing the efficiency
    of the computational process within the attention mechanism.
  prefs: []
  type: TYPE_NORMAL
- en: '![Matrix multiplication and softmax operation on input sequence x1.](../images/F000011f02-04-9780443274367.jpg)'
  prefs: []
  type: TYPE_IMG
- en: '[Figure 2.4](#Bf0025) Attention weight matrix.'
  prefs: []
  type: TYPE_NORMAL
- en: 'The first matrix X has elements: row x1 (1, 0, 1, 0), row x2 (0, 1, 0, 1) and
    row x3 (0, 1, 1, 0). The second matrix X superscript T end superscript has elements:
    row x1 (1, 0, 0, 0), row x2 (0, 1, 1, 1) and row x3 (1, 0, 1, 0). The result of
    the multiplication is the Attention Matrix with elements: row x1 (2, 0, 1), row
    x2 (0, 2, 1) and row x3 (1, 1, 2). The softmax operation is then applied to the
    Attention Matrix, resulting in a matrix with elements: row x1 (0.67, 0.09, 0.24),
    row x2 (0.09, 0.67, 0.24) and row x3 (0.21, 0.21, 0.58).'
  prefs: []
  type: TYPE_NORMAL
- en: The attention weight matrix exemplifies the essence of inner product calculations,
    which is to gauge similarity. For instance, consider the first row, which calculates
    the similarity of the token $MathML$![Equation](../images/F000011si39.png) with
    all other tokens in the sequence. If tokens A and B cooccur frequently, their
    similarity is generally high. In this example, the similarity of $MathML$![Equation](../images/F000011si40.png)
    with itself and with the token $MathML$![Equation](../images/F000011si41.png)
    is notably high, suggesting a closer relationship between $MathML$![Equation](../images/F000011si42.png)
    and these two tokens compared to $MathML$![Equation](../images/F000011si43.png).
  prefs: []
  type: TYPE_NORMAL
- en: Subsequently, these results are normalized using the softmax function to produce
    a normalized attention weight matrix. As depicted in [Fig. 2.5](#f0030), this
    matrix, once normalized, functions as a coefficient matrix. This matrix is then
    right-multiplied by the input matrix $MathML$![Equation](../images/F000011si44.png),
    resulting in $MathML$![Equation](../images/F000011si45.png). This operation involves
    multiplying each row of the coefficient matrix by each column of $MathML$![Equation](../images/F000011si46.png),
    effectively computing the values for each row of the output matrix $MathML$![Equation](../images/F000011si47.png).
    Each row in $MathML$![Equation](../images/F000011si48.png) represents the weighted
    word embedding of the corresponding token, influenced by the attention weights.
  prefs: []
  type: TYPE_NORMAL
- en: '![A table showing the multiplication of matrix alpha with matrix X resulting
    in matrix X hat.](../images/F000011f02-05-9780443274367.jpg)'
  prefs: []
  type: TYPE_IMG
- en: '[Figure 2.5](#Bf0030) Word embeddings weighted by attention scores.'
  prefs: []
  type: TYPE_NORMAL
- en: 'The table consists of three matrices: alpha, X and X hat. It reads as follows:
    Matrix alpha. Row 1\. x sub 1: 0.67, 0.09, 0.24\. Row 2\. x sub 2: 0.09, 0.67,
    0.24\. Row 3\. x sub 3: 0.21, 0.21, 0.58\. Matrix X. Row 1\. x sub 1: 1, 0, 1,
    0\. Row 2\. x sub 2: 0, 1, 0, 1\. Row 3\. x sub 3: 0, 1, 1, 0\. Matrix X hat.
    Row 1\. x sub 1: 0.67, 0.33, 0.91, 0.09\. Row 2\. x sub 2: 0.09, 0.91, 0.33, 0.67\.
    Row 3\. x sub 3: 0.21, 0.79, 0.79, 0.21.'
  prefs: []
  type: TYPE_NORMAL
- en: In summary, the self-attention mechanism, given an input matrix $MathML$![Equation](../images/F000011si49.png),
    yields an output matrix $MathML$![Equation](../images/F000011si50.png) by computing
    attention weights among the input elements. This process involves calculating
    dot products between the query vectors and the key vectors to assess the similarity
    between two elements. These attention weights are subsequently utilized to execute
    a weighted summation of the value vectors, generating an output vector for each
    input element. These output vectors may either serve as inputs to subsequent layers
    or, in combination with other layers, contribute to the model’s overall output.
  prefs: []
  type: TYPE_NORMAL
- en: As illustrated in [Fig. 2.6](#f0035), the matrices “*Q*,” “*K*,” and “*V*” are
    all derived from linear transformations of the input matrix *X*. In theory, these
    transformations could be accomplished with a single matrix to achieve attention
    weighting. Nonetheless, utilizing three distinct matrices to generate query, key,
    and value vectors is instrumental in the attention mechanism. The query vector
    acts as the “question” posed by the current element during attention weight computation,
    evaluating its focus on other elements by comparing with their key vectors. The
    key vector serves as the “answer” for each element in the input sequence, with
    attention weights calculated based on the similarity between query and key vectors.
    The value vector carries the actual information of each element in the sequence.
    These attention weights are then used to aggregate the value vectors, producing
    the final output vector.
  prefs: []
  type: TYPE_NORMAL
- en: '![Matrix multiplication examples with different matrices.](../images/F000011f02-06-9780443274367.jpg)'
  prefs: []
  type: TYPE_IMG
- en: '[Figure 2.6](#Bf0035) Calculation methods for the *Q, K*, and *V* matrices.'
  prefs: []
  type: TYPE_NORMAL
- en: In the first example, matrix X is multiplied by matrix WQ to result in matrix
    Q. In the second example, matrix X is multiplied by matrix WK to result in matrix
    K. In the third example, matrix X is multiplied by matrix WV to result in matrix
    V.
  prefs: []
  type: TYPE_NORMAL
- en: 2.2.3 The advantages and limitations of the self-attention mechanism
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Self-attention is a key component of the Transformer model, focusing on calculating
    attention weights among elements within the input sequence to highlight essential
    information. Unlike traditional sequence models like RNNs and long short-term
    memory networks (LSTMs), which process sequences element by element, the attention
    mechanism can directly evaluate the interactions between any pair of elements,
    enhancing its ability to handle long-range dependencies. The visibility of attention
    weights also adds a layer of interpretability: by examining these weights, one
    can discern the focal points of the model when dealing with specific elements,
    aiding in model analysis, debugging, and optimization. Furthermore, self-attention
    can be computed in parallel, making it highly effective on parallel processing
    units like GPUs. This contrasts sharply with RNNs and LSTMs, whose sequential
    operations do not fully leverage parallel hardware capabilities.'
  prefs: []
  type: TYPE_NORMAL
- en: Self-attention also encounters certain limitations, particularly with processing
    long sequences. While it excels at capturing long-distance dependencies, the computational
    and memory demands can become overwhelming with very long sequences. To mitigate
    this, researchers have developed various optimization techniques such as hierarchical,
    sparse, and low-rank attention, which help reduce both computational load and
    memory usage. Additionally, self-attention models typically require substantial
    amounts of training data to perform optimally, which can restrict their effectiveness
    in scenarios with limited data or in specialized domains.
  prefs: []
  type: TYPE_NORMAL
- en: 2.3 Multihead attention mechanism
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The multihead attention mechanism is a sophisticated expansion of the self-attention
    system, designed to let a model simultaneously process and understand multiple
    aspects of the information presented in an input sequence. This capability allows
    for the creation of more nuanced and varied interpretations, significantly boosting
    the model’s effectiveness.
  prefs: []
  type: TYPE_NORMAL
- en: With its ability to grasp a range of information, the multihead attention mechanism
    uses distinct “attention heads” to focus on different facets of the input. For
    instance, in translating languages, one head might analyze grammar, while another
    delves into the meanings behind words. This approach not only yields translations
    that are both accurate and fluid but also enriches the model’s understanding.
  prefs: []
  type: TYPE_NORMAL
- en: Furthermore, by adding more attention heads, the mechanism does not just enhance
    the model’s capacity for dealing with complex tasks—it also increases its overall
    expressiveness without needing more layers. In addition, the structure of multihead
    attention is inherently suited for parallel processing, making it exceptionally
    efficient on systems with advanced hardware like multiple CPUs or GPUs.
  prefs: []
  type: TYPE_NORMAL
- en: 2.3.1 Implementation of multihead attention
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '[Fig. 2.7](#f0040) illustrates the inner workings of the multihead attention
    mechanism. To set this system up, the query $MathML$![Equation](../images/F000011si51.png),
    key $MathML$![Equation](../images/F000011si52.png), and value $MathML$![Equation](../images/F000011si53.png)
    matrices from the traditional self-attention system are divided, with each section
    aligning with an individual attention head. Each head then processes self-attention
    independently using its designated subset of weights, ensuring that each head’s
    queries, keys, and values are distinctly produced.'
  prefs: []
  type: TYPE_NORMAL
- en: '![The inner workings of the multihead attention mechanism with components for
    Multi-Head Attention and Scaled Dot-Product Attention.](../images/F000011f02-07-9780443274367.jpg)'
  prefs: []
  type: TYPE_IMG
- en: '[Figure 2.7](#Bf0040) Multihead attention.'
  prefs: []
  type: TYPE_NORMAL
- en: 'It is divided into two main parts: Multi-Head Attention and Scaled Dot-Product
    Attention. On the left, under Multi-Head Attention, there are multiple Linear
    blocks feeding into a Scaled Dot-Product Attention block, which then connects
    to a Concat block and another Linear block. The inputs are labeled as V, K and
    Q. On the right, under Scaled Dot-Product Attention, the process starts with MatMul,
    followed by Scale, Mask (opt.), SoftMax and another MatMul block. The inputs are
    labeled as Q, K and V.'
  prefs: []
  type: TYPE_NORMAL
- en: The process involves calculating the dot products of the query and key matrices,
    scaling these products, applying a softmax function for normalization, and then
    multiplying the result with the value matrix to produce the output for each head.
    This methodology enables each head to latch onto various slices of information
    from the input sequence.
  prefs: []
  type: TYPE_NORMAL
- en: However, more heads do not always mean better results. The foundational Transformer
    study suggests that eight heads are optimal. Increasing to 16 or 32 heads doesn’t
    necessarily improve performance and may, in fact, lead to diminishing returns,
    especially when compared to having too few heads, like 1 or 4, which can degrade
    the model’s effectiveness.
  prefs: []
  type: TYPE_NORMAL
- en: Once all heads have processed their inputs, the resulting vectors are merged
    into a larger vector, as depicted in [Fig. 2.8](#f0045). For instance, with eight
    heads, each produces an output vector, and these are then joined together. This
    combined output then passes through a linear layer (marked as “*W*” in [Fig. 2.8](#f0045)),
    which readjusts the dimensions back to match the original input while blending
    the information from all heads into a cohesive whole. This shared linear layer
    plays a crucial role in harmonizing the diverse insights gathered by the individual
    attention heads.
  prefs: []
  type: TYPE_NORMAL
- en: '![Illustration showing merging of vectors Z1, Z5, Z8 into a larger vector Z
    using matrix W.](../images/F000011f02-08-9780443274367.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2.8 Weighted fusion of multihead attention.
  prefs: []
  type: TYPE_NORMAL
- en: The image shows an illustration of merging vectors Z1, Z5, Z8 into a larger
    vector Z. The vectors Z1, Z5 and Z8 are depicted as matrices. These matrices are
    multiplied by matrix W, resulting in the larger vector Z.
  prefs: []
  type: TYPE_NORMAL
- en: 2.3.2 The role of multihead attention
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In the Transformer architecture, the multihead attention layer’s output isn’t
    just used for subsequent layers—it helps build the complex structure of the model
    itself. Each head within this layer zeroes in on a unique aspect of the input
    sequence, enhancing the model’s depth of analysis. Studies on Sparse Transformers
    have shed light on how each head plays a specialized role, focusing on aspects
    such as syntax, contextual relationships, and the emphasis on rare words. For
    instance, the syntax-focused head blocks grammatically incorrect words from influencing
    the outcome, while the context-focused head parses the sentence, paying close
    attention to nearby words. Meanwhile, the head that hones in on rare words picks
    out key elements of sentences.
  prefs: []
  type: TYPE_NORMAL
- en: '[Fig. 2.9](#f0050) offers a visual demonstration of how different heads within
    an encoder influence the attention matrix, with this particular study focusing
    on an encoder configuration composed of four layers, each labeled from 0 to 3,
    and each containing six heads, labeled from 0 to 5\. In this visualization, each
    row correlates with one of the encoder layers, and each column corresponds to
    one of the heads within these layers.'
  prefs: []
  type: TYPE_NORMAL
- en: '![A visual demonstration of how different heads within an encoder influence
    the attention matrix.](../images/F000011f02-09-9780443274367.jpg)'
  prefs: []
  type: TYPE_IMG
- en: '[Figure 2.9](#Bf0050) Visualization of multihead attention. Image source: Paper
    “A multiscale visualization of attention in the transformer model”.'
  prefs: []
  type: TYPE_NORMAL
- en: The visual demonstration of how different heads within an encoder influence
    the attention matrix, with this particular study focusing on an encoder configuration
    composed of four layers, each labeled from 0 to 3 and each containing six heads,
    labeled from 0 to 5\. The image shows a grid with layers on the y-axis and heads
    on the x-axis. Each cell in the grid contains a pattern representing the attention
    matrix influenced by the corresponding head and layer.
  prefs: []
  type: TYPE_NORMAL
- en: 'The diagram illustrates the dynamics within the layers: while some heads tend
    to align and focus on similar features—like heads 1 through 4 in both the second
    and third layers—others exhibit distinct and independent behaviors. For example,
    in the second layer, head 1, and in the third layer, heads 0 and 5, stand out
    for their unique choices, indicating a divergence in how they process and prioritize
    information. This diversity among heads highlights the nuanced capabilities of
    multihead attention in capturing a broad spectrum of features in the input sequence.'
  prefs: []
  type: TYPE_NORMAL
- en: The multihead attention mechanism illustrates that, despite sharing the same
    method for residual gradient backpropagation, different attention heads manage
    to develop unique ways of selecting features. This diversity in feature selection
    could stem from variations in initial configurations and the use of Dropout strategies.
    Studies have specifically examined how different initialization strategies can
    decrease variability between layers, leading to more effective training results.
    Moreover, it has been suggested that employing distinct Dropout strategies for
    each head can allow them to capture and learn varied features, enhancing the overall
    functionality of the model.
  prefs: []
  type: TYPE_NORMAL
- en: 2.3.3 Optimization of multihead attention
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Given the substantial number of parameters in multihead attention, each with
    its distinct “*Q*,” “*K*,” and “*V*” matrices, the model faces considerable computational
    and memory challenges. Researchers have developed several strategies to mitigate
    these issues:'
  prefs: []
  type: TYPE_NORMAL
- en: '1. **Local multihead attention**: This strategy limits each attention head
    to focus only on a specific portion of the input sequence rather than the entire
    sequence. This approach significantly reduces computational demands and memory
    usage while retaining the key benefits of multihead attention.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '2. **Sparse multihead attention**: This technique reduces both computational
    complexity and memory usage by having each attention head focus only on select
    elements of the input sequence. Employing sparse connections can dramatically
    decrease the resources needed.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '3. **Layered multihead attention**: In this structure, attention heads are
    organized into multiple layers, with each layer focusing on different sections
    and types of information from the input. This arrangement allows the model to
    grasp more complex contextual details and enhances performance, especially in
    processing lengthy sequences.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 2.4 Feedforward neural network
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The FNN, a pivotal component of the Transformer model, may constitute only a
    fraction of the model’s structure, yet it is essential for extracting nonlinear
    features and capturing local details from input sequences. As illustrated in [Fig.
    2.10](#f0055), the FNN fundamentally operates as a multilayer perceptron, composed
    of several layers, each populated with numerous neurons. In this setup, the input
    layer takes in the raw data, the hidden layers process this data to extract features,
    and the output layer is tasked with producing the final predictions. The connections
    among these layers are directional and form a loop-free path, ensuring that information
    flows through the network in one direction only.
  prefs: []
  type: TYPE_NORMAL
- en: '![A neural network with an input layer, hidden layer and output layer.](../images/F000011f02-10-9780443274367.jpg)'
  prefs: []
  type: TYPE_IMG
- en: '[Figure 2.10](#Bf0055) Feedforward neural network.'
  prefs: []
  type: TYPE_NORMAL
- en: 'It consists of three layers: an input layer, a hidden layer and an output layer.
    The input layer has three neurons labeled as Input, each receiving an input signal.
    The hidden layer contains three neurons, each connected to all neurons in the
    input layer. The output layer has three neurons, each connected to all neurons
    in the hidden layer. Arrows indicate the direction of signal flow from the input
    layer to the hidden layer and from the hidden layer to the output layer. The output
    layer neurons are labeled as Output.'
  prefs: []
  type: TYPE_NORMAL
- en: In the Transformer model, the FNN is fundamentally composed of two linear layers
    and a nonlinear activation function. This design allows the network to capture
    nonlinear characteristics within the input sequence, significantly boosting the
    model’s ability to express complex ideas. The first linear layer, often referred
    to as the fully connected layer, projects the input data into a higher dimensional
    space. The subsequent layer, the output layer, then brings this high-dimensional
    representation back down to the original dimension. Positioned between these layers,
    the activation function injects nonlinearity into the process, enabling the network
    to discern intricate patterns in the data.
  prefs: []
  type: TYPE_NORMAL
- en: Activation functions are vital in FNNs as they convert the outputs of linear
    transformations into nonlinear outputs, adding necessary complexity to the model.
    The effectiveness of the network often hinges on the specific activation function
    used. Popular choices include Sigmoid, Tanh, and ReLU (Rectified Linear Unit),
    with the Transformer model frequently employing the GELU (Gaussian Error Linear
    Unit) function. GELU is mathematically expressed as
  prefs: []
  type: TYPE_NORMAL
- en: $MathML$ (2.3)
  prefs: []
  type: TYPE_NORMAL
- en: '![Equation](../images/F000011si54.png) (2.3)'
  prefs: []
  type: TYPE_IMG
- en: As depicted in [Fig. 2.11](#f0060), GELU behaves almost linearly when inputs
    are around zero but tapers off towards zero with larger or smaller inputs. This
    property makes GELU particularly effective in deep neural network training, helping
    to prevent gradients from vanishing.
  prefs: []
  type: TYPE_NORMAL
- en: '![A line graph showing the behavior of a mathematical function. The graph depicts
    a curve that starts below zero, dips slightly, then rises steeply in the positive
    quadrant.](../images/F000011f02-11-9780443274367.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2.11 GELU activation function.
  prefs: []
  type: TYPE_NORMAL
- en: The x-axis ranges from negative 3 to 3 in increments of 1\. The y-axis ranges
    from negative 0.5 to 3.0 in increments of 0.5\. The curve starts in the negative
    x quadrant slightly below the x-axis. It descends gradually, reaching its lowest
    point around x equals negative 0.5, where it's approximately -0.1 on the y-axis.
    From there, the curve begins to rise. As the curve enters the positive x quadrant,
    it increases more steeply. Around x equals 0.5, the curve crosses the x-axis and
    continues to rise. The slope becomes increasingly steep as x increases. By x equals
    1, the y-value is approximately 0.5\. At x equals 2, y is about 2.0\. The curve
    continues its upward trajectory, reaching about y equals 3.0 at x equals 3\. The
    shape of the curve resembles that of an activation function used in machine learning,
    specifically the Gaussian Error Linear Unit (GELU) function, as mentioned in the
    provided context information.
  prefs: []
  type: TYPE_NORMAL
- en: In a FNN, each connection is assigned a weight that determines how strongly
    an input signal is passed to the next layer. These weights are fine-tuned through
    gradient descent during training to minimize prediction errors. Additionally,
    each neuron has a bias value that adjusts its activation threshold, which is similarly
    tuned during training to optimize network performance.
  prefs: []
  type: TYPE_NORMAL
- en: 'Despite its relatively small footprint within the Transformer model, the FNN
    is pivotal in capturing local information and unlocking nonlinear features. Its
    contributions to the Transformer model are notably significant in several areas:'
  prefs: []
  type: TYPE_NORMAL
- en: '1. **Local information extraction**: Positioned within each Transformer layer,
    the FNN processes outputs from the self-attention mechanism, adeptly extracting
    local features. This functionality enables the model to grasp short-range dependencies
    within the input sequence, substantially boosting its expressive power.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '2. **Nonlinearity introduction**: Equipped with nonlinear activation functions,
    the FNN adeptly identifies nonlinear features within the input data. This capability
    is crucial for handling complex natural language sequences, which often contain
    inherently nonlinear patterns and structures.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '3. **Generalization enhancement**: By harnessing both local and nonlinear features,
    the FNN significantly enhances the model’s ability to generalize effectively when
    encountering new and previously unseen data.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 2.5 Residual connection
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Residual connections, a type of shortcut linkage in neural networks, allow for
    the direct transmission of layer inputs to later stages. This architectural feature
    is crucial for alleviating the vanishing gradient issue, thereby boosting both
    the training process and the overall model efficacy. These connections were pioneered
    by Kaiming He and colleagues in 2015 within the framework of deep residual networks
    to tackle the prevalent problems of vanishing and exploding gradients during deep
    neural network training. Within the Transformer architecture, residual connections
    are extensively employed, enhancing the multihead attention mechanisms, position-wise
    FNNs, and the various sublayers of the decoder.
  prefs: []
  type: TYPE_NORMAL
- en: '[Fig. 2.11](#f0060) depicts the core concept of residual connections, which
    involve introducing a shortcut in a neural network layer that effectively skips
    over certain layers. This design allows information from a preceding layer to
    bypass others and proceed directly to further layers. In mathematical terms, if
    *x* is the input to a layer, and it undergoes a nonlinear transformation denoted
    by *F*(*x*), the output becomes *F*(*x*) + *x*. Here, *x* is the input signal,
    and *F*(*x*) is the transformation applied by the layer. Adding *x* to *F*(*x*)
    results in combining the original input with the residual changes learned by the
    layer. This configuration is particularly beneficial during the backpropagation
    process as it facilitates smoother gradient flow, effectively addressing the issue
    of vanishing gradients and thus improving the training process ([Fig. 2.12](#f0065)).'
  prefs: []
  type: TYPE_NORMAL
- en: '![Two diagrams illustrating standard and residual learning blocks with weight
    layers and ReLU activations.](../images/F000011f02-12-9780443274367.jpg)'
  prefs: []
  type: TYPE_IMG
- en: '[Figure 2.12](#Bf0065) Residual connection.'
  prefs: []
  type: TYPE_NORMAL
- en: The left diagram shows a standard learning block with an input x, two weight
    layers each followed by a ReLU activation and an output y equals H(x). The right
    diagram shows a residual learning block with an input x, two weight layers each
    followed by a ReLU activation, an intermediate output F(x) and a final output
    y equals F(x) plus x. The residual learning block includes a shortcut connection
    that adds the input x to the intermediate output F(x) before the final ReLU activation.
  prefs: []
  type: TYPE_NORMAL
- en: Residual connections are a key feature in the Transformer model, widely applied
    across its components to speed up training and boost performance. In the multihead
    attention sublayer, once the input undergoes self-attention processing, the resulting
    output is combined back with the original input through a residual connection.
    This setup ensures that the model maintains the initial information while seamlessly
    integrating it with the insights derived from the self-attention.
  prefs: []
  type: TYPE_NORMAL
- en: Similarly, in the FNN sublayer, the input goes through two stages of linear
    transformations followed by an activation function. The output from this sequence
    is then added back to the original input, establishing another residual connection.
    This arrangement preserves the original input data and melds it with the new information
    learned through the FNN, fostering a richer understanding and better retention
    of input features.
  prefs: []
  type: TYPE_NORMAL
- en: In both the encoder and decoder components of the Transformer, each layer includes
    one or more sublayers equipped with residual connections. These connections are
    crucial for allowing information to flow effectively through the depth of the
    network, ultimately contributing to improved performance of the model.
  prefs: []
  type: TYPE_NORMAL
- en: In summary, the Transformer model incorporates residual connections across its
    multihead attention mechanisms, position-wise FNNs, and both encoder and decoder
    layers. These connections effectively address the challenges of gradient vanishing
    and exploding by offering a shortcut that allows for direct gradient flow to earlier
    layers. This feature is crucial for preventing common issues associated with training
    deep models, thereby boosting overall model performance. Residual connections
    also expedite the training process by eliminating unnecessary calculations, streamlining
    the training duration. Moreover, by enabling the learning of more complex representations,
    residual connections enhance the model’s ability to generalize, improving its
    performance on test datasets.
  prefs: []
  type: TYPE_NORMAL
- en: 2.6 Layer normalization
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Layer Normalization is a proven effective strategy for stabilizing neural network
    training and enhancing model performance. Introduced by Jimmy Ba et al. in 2016,
    it is extensively utilized in Transformer models. The core process involves normalizing
    the outputs of each layer’s neurons to have consistent means and variances.
  prefs: []
  type: TYPE_NORMAL
- en: 'This normalization works by first calculating the mean and standard deviation
    across all outputs of a layer’s neurons. Each neuron’s output is then adjusted
    by subtracting the mean and dividing by the standard deviation. This results in
    normalized outputs, described by the equation:'
  prefs: []
  type: TYPE_NORMAL
- en: $MathML$ (2.4)
  prefs: []
  type: TYPE_NORMAL
- en: '![Equation](../images/F000011si55.png) (2.4)'
  prefs: []
  type: TYPE_IMG
- en: Here, $MathML$![Equation](../images/F000011si56.png) represents the output from
    the *i*-th neuron, $MathML$![Equation](../images/F000011si57.png) and $MathML$![Equation](../images/F000011si58.png)
    are the computed mean and variance, and ![ent](../images/epsi_1013.png) is a small
    positive number added for numerical stability. With zero mean and unit variance,
    these normalized outputs significantly expedite the training process and enhance
    the model’s efficiency.
  prefs: []
  type: TYPE_NORMAL
- en: In the Transformer model, layer normalization plays a pivotal role in optimizing
    the training process. By normalizing neuron outputs, it accelerates the convergence
    of gradient descent, enhances training efficiency, reduces covariance shifts between
    layers, and prevents gradient explosions or disappearances. This normalization
    significantly reduces the model’s sensitivity to variations in input data, improving
    its performance on new datasets.
  prefs: []
  type: TYPE_NORMAL
- en: 'Layer normalization is strategically deployed across the Transformer architecture:'
  prefs: []
  type: TYPE_NORMAL
- en: '1. Multihead attention mechanism: It is used to normalize attention scores,
    improving the efficacy of the attention process.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '2. Position-based feedforward networks: Here, it normalizes the outputs of
    neurons, facilitating faster training and boosting overall model performance.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '3. Encoder-decoder architecture: Layer normalization is applied both to each
    sublayer’s output and to the final outputs of the encoder and decoder, stabilizing
    training and enhancing generalization capabilities.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '4. Residual connections: It works alongside addition operations to ensure outputs
    maintain consistent means and variances postaddition, further enhancing performance
    and training speed.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Collectively, residual connections and layer normalization are critical to the
    Transformer’s architecture. Residual connections introduce skip links that alleviate
    gradient vanishing, boost training efficiency, and strengthen generalization.
    Layer normalization, by standardizing outputs within layers, speeds up training
    and stabilizes the model. These technologies are integral to the multihead attention,
    position-based feedforward networks, and the sublayers of the encoder and decoder,
    underpinning the Transformer’s robust performance.
  prefs: []
  type: TYPE_NORMAL
- en: 2.7 Position encoding
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Position encoding is a fundamental component of the Transformer model (as illustrated
    in [Fig. 2.13](#f0070)), equipping the model with the capability to manage the
    positional information of words in sequences. Given that the self-attention mechanism
    lacks the ability to detect the positions of words, position encoding is crucial
    for understanding the order within sequences.
  prefs: []
  type: TYPE_NORMAL
- en: '![Diagram explaining the positional encoding process in a transformer model.](../images/F000011f02-13-9780443274367.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2.13 Workflow of positional encoding.
  prefs: []
  type: TYPE_NORMAL
- en: 'It starts with the input sequence I love my country. Each word in the sequence
    is converted into an embedding vector: v0 equals embedding vector (I), v1 equals
    embedding vector (love), v2 equals embedding vector (my) and v3 equals embedding
    vector (country). These embedding vectors are then added to their corresponding
    position vectors from the positional encoding matrix: P0 equals position vector
    (I), P1 equals position vector (love), P2 equals position vector (my) and P3 equals
    position vector (country). The result is the positional encoding layer output:
    y0 equals positional embedding (I), y1 equals positional embedding (love), y2
    equals positional embedding (my) and y3 equals positional embedding (country).'
  prefs: []
  type: TYPE_NORMAL
- en: 2.7.1 Design and implementation of positional encoding
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'The self-attention mechanism leverages matrix multiplication to assess relationships
    between words, ignoring their sequential positions—an essential factor in processing
    ordered data such as text. To address this, position encoding represents each
    word’s position in the input sequence and integrates this data with the original
    word representations. Position encoding in Transformers is produced using predefined
    sine and cosine functions. The encoding for a given position *p* and dimension
    *i* is calculated as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: $MathML$ (2.5)
  prefs: []
  type: TYPE_NORMAL
- en: '![Equation](../images/F000011si59.png) (2.5)'
  prefs: []
  type: TYPE_IMG
- en: $MathML$ (2.6)
  prefs: []
  type: TYPE_NORMAL
- en: '![Equation](../images/F000011si60.png) (2.6)'
  prefs: []
  type: TYPE_IMG
- en: 'This setup, where d_model denotes the dimension of word embeddings, offers
    several benefits:'
  prefs: []
  type: TYPE_NORMAL
- en: • The encoding varies in frequency across different positions and dimensions,
    aiding the model in discerning complex positional relationships.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: • The cyclical nature of the sine and cosine functions allows the model to process
    longer sequences beyond the training data.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: • Position encoding is adaptable, permitting the model to tailor the significance
    of positional information based on specific task needs.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: To implement position encoding, a vector of dimension d_model is generated for
    each position using the equations above. These vectors are then added to the word
    embeddings of the input sequence, creating enriched word representations with
    embedded positional information. These enriched representations are then utilized
    in subsequent layers, including multihead attention and feedforward networks,
    enhancing the model’s ability to interpret and process sequences.
  prefs: []
  type: TYPE_NORMAL
- en: 'Consider a sentence of sequence length 4, “I love my country,” with each word
    depicted as a two-dimensional vector. This requires generating a 4×2 matrix for
    position encoding. In Transformers, this encoding is derived from sine and cosine
    functions, creating distinct positional signals. In these formulas, i denotes
    the position within the sequence (starting at 0), *j* is the dimension index,
    and $MathML$![Equation](../images/F000011si61.png) is the dimensionality of the
    input vectors. For this example, $MathML$![Equation](../images/F000011si62.png)
    is 2\. Using [Eqs. (2.5](#eqn5), [2.6)](#eqn6), the position encoding matrix for
    this example, with dimensions 4×2, can be calculated as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: $MathML$
  prefs: []
  type: TYPE_NORMAL
- en: '![Equation](../images/F000011si63.png)'
  prefs: []
  type: TYPE_IMG
- en: $MathML$
  prefs: []
  type: TYPE_NORMAL
- en: '![Equation](../images/F000011si64.png)'
  prefs: []
  type: TYPE_IMG
- en: $MathML$
  prefs: []
  type: TYPE_NORMAL
- en: '![Equation](../images/F000011si65.png)'
  prefs: []
  type: TYPE_IMG
- en: $MathML$
  prefs: []
  type: TYPE_NORMAL
- en: '![Equation](../images/F000011si66.png)'
  prefs: []
  type: TYPE_IMG
- en: $MathML$
  prefs: []
  type: TYPE_NORMAL
- en: '![Equation](../images/F000011si67.png)'
  prefs: []
  type: TYPE_IMG
- en: $MathML$
  prefs: []
  type: TYPE_NORMAL
- en: '![Equation](../images/F000011si68.png)'
  prefs: []
  type: TYPE_IMG
- en: $MathML$
  prefs: []
  type: TYPE_NORMAL
- en: '![Equation](../images/F000011si69.png)'
  prefs: []
  type: TYPE_IMG
- en: $MathML$
  prefs: []
  type: TYPE_NORMAL
- en: '![Equation](../images/F000011si70.png)'
  prefs: []
  type: TYPE_IMG
- en: 'These calculated values are compiled into the position encoding matrix as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: $MathML$
  prefs: []
  type: TYPE_NORMAL
- en: '![Equation](../images/F000011si71.png)'
  prefs: []
  type: TYPE_IMG
- en: Subsequently, this position encoding matrix can be added to the original word
    vectors. This addition enables the model to integrate positional information into
    its processing, as depicted in [Fig. 2.13](#f0070). This figure illustrates the
    process of calculating the position encoding matrix and its application to sequence
    data. It’s important to note that this example is a simplified representation.
    Typically, in real-world applications, the dimensionality of $MathML$![Equation](../images/F000011si72.png)
    is considerably larger, often set to 512.
  prefs: []
  type: TYPE_NORMAL
- en: 2.7.2 Variants of positional encoding
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'While the Transformer’s original architecture relies on fixed sine and cosine
    functions for generating position encodings, researchers have developed alternative
    methods for conveying positional information:'
  prefs: []
  type: TYPE_NORMAL
- en: 1. **Learned position encoding:** This approach involves initializing position
    encodings with random values that are subsequently optimized through gradient
    descent during training. This method enables the model to dynamically refine its
    positional representations to meet the specific demands of the task.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 2. **Relative position encoding:** Focusing on the relative distances between
    words within a sequence rather than their absolute positions, relative position
    encoding aids the model in learning more universal positional patterns. This facilitates
    better adaptation to sequences of varying lengths and can be implemented by altering
    the self-attention mechanism to account for the relative distances between queries
    and keys.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 3. **Combined position encoding:** This method merges various positional representation
    techniques, including fixed sine/cosine functions, learned position encodings,
    and relative position encodings. By integrating these diverse sources of positional
    information, the model can draw on a broader range of insights to improve its
    predictive capabilities.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 2.7.3 The advantages and limitations of positional encoding
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Position encoding significantly boosts the ability of neural networks to process
    sequence data by providing essential positional information in specific ways.
    This capability allows models to recognize and leverage the relationships between
    words, enhancing the handling of sequential data such as natural language. Thanks
    to the periodic properties of sine and cosine functions, position encoding efficiently
    manages long sequences and facilitates generalization beyond the lengths encountered
    during training. Additionally, models can improve their adaptability by learning
    to adjust the importance of positional information based on the requirements of
    specific tasks.
  prefs: []
  type: TYPE_NORMAL
- en: However, it is important to note that for tasks not reliant on sequence order,
    introducing position encoding could add unnecessary computational complexity.
    Fixed sine and cosine position encodings might also fail to detect some complex
    positional patterns within sequences, particularly regarding local structures.
    When sequences exceed the maximum length processed during training, the model
    might struggle with effective generalization using position encoding. In these
    instances, relative position encoding or other expandable methods of position
    encoding might offer a more effective solution.
  prefs: []
  type: TYPE_NORMAL
- en: 2.8 Training and optimization
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Training and optimizing a Transformer model involves selecting appropriate methods,
    such as loss functions and optimizers. This section explores training techniques
    and strategies for optimizing Transformers.
  prefs: []
  type: TYPE_NORMAL
- en: 2.8.1 Loss function
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: At the heart of training is defining a loss function that quantifies the discrepancy
    between the model’s predictions and the true labels. The cross-entropy loss function
    is often used in Transformers. It computes a loss by comparing the probability
    distributions from the model’s output against the actual labels. The training
    objective is to minimize this loss.
  prefs: []
  type: TYPE_NORMAL
- en: Cross-entropy measures differences between two probability distributions and
    is crucial in classification tasks. In Transformers, the output layer converts
    scores into probabilities using the softmax function. Cross-entropy then assesses
    the discrepancies between these probabilities and the true distributions. Its
    formula is
  prefs: []
  type: TYPE_NORMAL
- en: $MathML$ (2.7)
  prefs: []
  type: TYPE_NORMAL
- en: '![Equation](../images/F000011si73.png) (2.7)'
  prefs: []
  type: TYPE_IMG
- en: where $MathML$![Equation](../images/F000011si74.png) is the actual distribution
    and $MathML$![Equation](../images/F000011si75.png) is the predicted one. Cross-entropy’s
    main benefit is its direct measurement of the prediction accuracy against true
    labels, although it may not be as effective for less probable categories.
  prefs: []
  type: TYPE_NORMAL
- en: Alternative loss functions can be adopted based on the task’s needs. For instance,
    regression tasks might use mean squared error or mean absolute error, while generative
    tasks could use negative log-likelihood or Kullback-Leibler (KL) divergence.
  prefs: []
  type: TYPE_NORMAL
- en: 2.8.2 Optimizer
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Minimizing the loss function requires selecting an appropriate optimizer to
    update the model parameters. In Transformers, Adam is a preferred choice. Adam,
    or Adaptive Moment Estimation, is an optimizer that automatically adjusts the
    learning rate based on both the first and second moment estimates of gradients.
    This feature allows Transformers to be optimized with varying learning rates at
    different training phases.
  prefs: []
  type: TYPE_NORMAL
- en: Adam combines the advantages of fast convergence and high computational efficiency,
    and is generally less sensitive to the choice of hyperparameters. However, it
    can sometimes compromise generalization performance.
  prefs: []
  type: TYPE_NORMAL
- en: Other available optimizers include Stochastic Gradient Descent (SGD), AdaGrad,
    and RMSprop. SGD is straightforward but might be slow to converge in certain scenarios.
    AdaGrad and RMSprop, which adaptively adjust the learning rate based on the first
    and second moments, respectively, can lead to premature learning rate decay in
    prolonged training sessions. Each optimizer comes with its own set of pros and
    cons, necessitating a choice that best fits the specific requirements of the task
    and dataset.
  prefs: []
  type: TYPE_NORMAL
- en: 2.8.3 Learning rate adjustment strategy
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In the original Transformer paper, the authors introduced a novel approach to
    learning rate scheduling known as “Noam scheduling.” This method initially increases
    the learning rate linearly, followed by a gradual decrease, enhancing early training
    convergence and later preventing overfitting. The formula for this strategy is
  prefs: []
  type: TYPE_NORMAL
- en: $MathML$ (2.8)
  prefs: []
  type: TYPE_NORMAL
- en: '![Equation](../images/F000011si76.png) (2.8)'
  prefs: []
  type: TYPE_IMG
- en: where $MathML$![Equation](../images/F000011si77.png) is the model’s dimension,
    $MathML$![Equation](../images/F000011si78.png) is the current step in training,
    and $MathML$![Equation](../images/F000011si79.png) is the number of initial steps
    before regular training pacing begins. This approach balances the model’s convergence
    speed and stability effectively.
  prefs: []
  type: TYPE_NORMAL
- en: Learning rate strategies are critical as they influence how quickly and effectively
    a model learns and generalizes. The Noam schedule, specifically, promotes a faster
    initial convergence and helps in maintaining model stability, although it may
    require fine-tuning of warmup steps and other hyperparameters.
  prefs: []
  type: TYPE_NORMAL
- en: Other strategies like exponential decay, cosine annealing, and piecewise constant
    learning rates also exist. Exponential decay reduces the learning rate steadily
    over time, while cosine annealing adjusts the learning rate cyclically, reflecting
    the cosine function’s periodic nature. The piecewise constant strategy divides
    the training into phases, each with a consistent learning rate. Choosing the right
    strategy depends on the specific requirements of the task and the data characteristics.
  prefs: []
  type: TYPE_NORMAL
- en: 2.8.4 Regularization
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: To combat overfitting, a range of regularization techniques are utilized during
    the training process. In Transformers, weight decay (also known as L2 regularization),
    dropout, and layer normalization are prevalent strategies. Weight decay boosts
    generalization by incorporating the L2 norm of parameters into the loss function,
    which helps control the scale of the parameters. Nonetheless, this approach might
    sometimes overly penalize certain parameters.
  prefs: []
  type: TYPE_NORMAL
- en: As depicted in [Fig. 2.14](#f0075), dropout is a technique used during training
    to randomly deactivate a subset of neurons, effectively reducing the model’s tendency
    to overfit to particular training examples and thus improving its ability to generalize.
    However, one downside of dropout is that it can slow down the model’s convergence
    rate.
  prefs: []
  type: TYPE_NORMAL
- en: '![A standard neural network and the same network after applying dropout.](../images/F000011f02-14-9780443274367.jpg)'
  prefs: []
  type: TYPE_IMG
- en: '[Figure 2.14](#Bf0075) Dropout regularization.'
  prefs: []
  type: TYPE_NORMAL
- en: Diagram (A) is labeled Standard Neural Net and shows a fully connected neural
    network with three layers of neurons. Each neuron in one layer is connected to
    every neuron in the adjacent layers with arrows indicating the direction of connections.
    Diagram (B) is labeled After applying dropout and shows the same neural network
    with some neurons deactivated, indicated by circles with an X inside them. The
    connections to and from these deactivated neurons are also removed.
  prefs: []
  type: TYPE_NORMAL
- en: Layer normalization standardizes the activations within each layer of a neural
    network, speeding up training and enhancing generalization. However, it can sometimes
    adversely affect specific tasks.
  prefs: []
  type: TYPE_NORMAL
- en: Moreover, there are additional regularization methods like L1 regularization,
    data augmentation, and early stopping. L1 regularization incorporates the L1 norm
    of parameters into the loss function, creating a sparse matrix of parameters,
    though this might sometimes lead to excessive penalties on certain parameters.
    Data augmentation improves generalization by variably transforming training data
    to enlarge the dataset, but this can extend the training duration. Early stopping,
    which halts training when no significant improvements are seen on the validation
    set, helps prevent overfitting but may result in an underfit model.
  prefs: []
  type: TYPE_NORMAL
- en: 2.8.5 Other training and optimization techniques
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Training and optimizing Transformers involve various additional techniques such
    as learning rate warmup, gradient clipping, weight initialization, dropout, label
    smoothing, gradient accumulation, and mixed precision training, which will be
    elaborated upon next.
  prefs: []
  type: TYPE_NORMAL
- en: The learning rate warmup strategy starts with a low learning rate at the onset
    of training and gradually increases to a preset maximum. This approach is designed
    to prevent the instability that can occur from large updates to parameters early
    in training. Typically, Transformers employ a linear warmup strategy where the
    learning rate progressively increases from zero to the established maximum before
    reducing according to a specific scheme like inverse square root decay, as illustrated
    in [Fig. 2.15](#f0080).
  prefs: []
  type: TYPE_NORMAL
- en: '![A line graph illustrating a learning rate schedule for Transformers, showing
    an initial warmup phase followed by a decay period.](../images/F000011f02-15-9780443274367.jpg)'
  prefs: []
  type: TYPE_IMG
- en: '[Figure 2.15](#Bf0080) Learning rate warmup strategy.'
  prefs: []
  type: TYPE_NORMAL
- en: The x-axis represents time, ranging from 0 to 200 in increments of 25\. The
    y-axis represents the learning rate, ranging from 0 to 0.0010 in increments of
    0.0002\. The line starts near zero and rapidly increases to a peak of about 0.0010
    at around time 25\. This represents the warmup phase where the learning rate increases
    from zero to a maximum value. After reaching the peak, the line gradually decreases
    in a curved manner, illustrating the decay phase. The decay follows what appears
    to be an inverse square root pattern, as mentioned in the context information.
    By the end of the graph at time 200, the learning rate has decreased to approximately
    0.0001, which is about 10 percent of its peak value. This graph visually represents
    the typical learning rate strategy employed in Transformer models, with an initial
    linear warmup followed by a decay phase, as described in the context information
    provided.
  prefs: []
  type: TYPE_NORMAL
- en: Gradient clipping is a technique employed to counteract the issue of gradient
    explosion. In neural network training, if gradients become too large, they can
    destabilize the model by causing disproportionately large updates to weights.
    By establishing a maximum limit for gradient values, these excessive updates can
    be curbed. Should gradients exceed this limit, they are scaled back to match the
    established threshold.
  prefs: []
  type: TYPE_NORMAL
- en: Weight initialization plays a critical role in both the speed of training and
    the ultimate performance of the model. Transformer models typically use random
    initialization techniques with either uniform or normal distributions, such as
    Glorot (also known as Xavier) or He initialization.
  prefs: []
  type: TYPE_NORMAL
- en: Dropout is another potent regularization strategy used to combat overfitting.
    It works by randomly disabling a subset of neurons during training, which is particularly
    common in the Transformer’s multihead attention and feedforward layers.
  prefs: []
  type: TYPE_NORMAL
- en: Label smoothing is a technique to combat overfitting by blending true labels
    with a controlled amount of noise, thereby boosting the model’s generalization
    abilities.
  prefs: []
  type: TYPE_NORMAL
- en: Gradient accumulation collects gradients from several batches before updating
    the model’s parameters. This method effectively mimics training with larger batch
    sizes, enhancing both the stability and the speed of convergence of the model,
    while not requiring additional memory resources.
  prefs: []
  type: TYPE_NORMAL
- en: Mixed precision training combines single precision (float32) and half precision
    (float16) computations to reduce memory demands and computational load, thus speeding
    up the training process. As demonstrated in the comparative experiment shown in
    [Fig. 2.16](#f0085), with identical hyperparameters but different data types (float32
    (FT32) or mixed precision), the training loss curves (left image) are nearly the
    same, yet the training speed of the mixed precision model is noticeably quicker
    (right image).
  prefs: []
  type: TYPE_NORMAL
- en: '![Two graphs comparing FP32 and Mixed Precision training. Left graph shows
    training loss over iterations. Right graph displays speedup ratio for both methods
    across iterations.](../images/F000011f02-16-9780443274367.jpg)'
  prefs: []
  type: TYPE_IMG
- en: '[Figure 2.16](#Bf0085) Comparison between mixed precision acceleration ratio
    and training loss.'
  prefs: []
  type: TYPE_NORMAL
- en: 'The left graph is titled Training curves for FP32 and Mixed Precision. The
    x-axis represents the Number of Iterations ranging from 0 to 250000 in increments
    of 50000\. The y-axis shows Training Loss with values from 0 to 0.08 in increments
    of 0.02\. Two lines are plotted: one for FP32 and one for Mixed Precision. Both
    lines start high and quickly drop, then stabilize at a low value, with the Mixed
    Precision line slightly lower than the FP32 line. The right graph is titled Speedup
    Ratio of FP32 and Mixed Precision. It shares the same x-axis as the left graph,
    representing Number of Iterations from 0 to 250000\. The y-axis shows Number of
    Iterations (which appears to be mislabeled and likely represents the speedup ratio)
    ranging from 0 to 1.8 in increments of 0.2\. Two lines are plotted, labeled as
    FP32 and Mixed Precision in the legend. The Mixed Precision line remains consistently
    higher, around 1.6, while the FP32 line stays close to 0.2 throughout the iterations.
    Both graphs demonstrate a comparison between FP32 and Mixed Precision methods
    across training iterations, with Mixed Precision showing lower training loss and
    higher speedup ratio.'
  prefs: []
  type: TYPE_NORMAL
- en: These techniques are crucial in the training and optimization of Transformer
    models. Tailoring these methods to the specific needs of the task and dataset
    can significantly improve the training results and model performance. Generally,
    training and optimizing Transformer models involve selecting the right loss functions,
    optimizers, learning rate adjustments, and regularization techniques. For each
    task and dataset, selecting the appropriate settings and fine-tuning hyperparameters
    are essential to maximize model performance. Each method has its pros and cons
    in real-world applications, necessitating careful evaluation and choice.
  prefs: []
  type: TYPE_NORMAL
- en: 2.9 Summary
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This chapter thoroughly explains the fundamental principles and applications
    of the Transformer model and its essential components. It starts with a succinct
    overview of the Transformer model, then dives deep into each critical component.
    The self-attention mechanism is covered extensively, detailing its principles,
    benefits, and limitations. The chapter also delves into multihead attention, discussing
    its rationale, detailed implementation, practical uses, and various enhancements
    and adaptations.
  prefs: []
  type: TYPE_NORMAL
- en: Future chapters will further explore the progression of large language models,
    examining enhancements to the Transformer model across different GPT versions
    and discussing its uses in areas like NLP, generative models, and reinforcement
    learning.
  prefs: []
  type: TYPE_NORMAL
- en: <hgroup>
  prefs: []
  type: TYPE_NORMAL
- en: Chapter 3 Generative pretraining
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: </hgroup>
  prefs: []
  type: TYPE_NORMAL
- en: Abstract
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This chapter delves into Generative Pretraining (GPT), a foundational technique
    in natural language processing (NLP) that underlies the GPT series of models.
    GPT pretrains on extensive unlabeled text data to learn a generative probability
    distribution, enabling it to predict subsequent words in a sequence based on prior
    context. The chapter explains the architecture of GPT, which is built on a Transformer
    decoder with masked self-attention mechanisms, allowing the model to focus solely
    on previous words during generation. The process of pretraining is followed by
    supervised fine-tuning, where the model is adapted for specific NLP tasks using
    labeled data. This dual-phase approach significantly enhances the model’s performance
    across various applications, making GPT a powerful tool in language understanding
    and generation.
  prefs: []
  type: TYPE_NORMAL
- en: Keywords
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Generative pretraining; natural language processing; transformer decoder; masked
    self-attention; supervised fine-tuning; language model; unsupervised learning;
    text generation
  prefs: []
  type: TYPE_NORMAL
- en: Generative Pretraining (GPT) is a crucial technology in natural language processing
    (NLP) that also underpins the GPT series of models. The core concept revolves
    around pretraining on extensive text data to grasp the generative probability
    distribution of language models. These pretrained models are then utilized across
    various downstream tasks. This chapter offers an in-depth exploration of the principles
    and techniques behind GPT, equipping readers with a thorough understanding of
    the GPT model’s technical nuances.
  prefs: []
  type: TYPE_NORMAL
- en: 3.1 Introduction to generative pretraining
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Pretraining techniques have demonstrated remarkable effectiveness across many
    tasks in computer vision and natural language processing (NLP). These methods
    leverage extensive amounts of unlabeled data to uncover the hidden structures
    of the underlying data.
  prefs: []
  type: TYPE_NORMAL
- en: Generative Pretraining (GPT) aims to develop a language model focused on learning
    a generative probability distribution. This means it predicts the likelihood of
    the next word based on a given context sequence, such as words, phrases, or sentences.
    GPT uses a neural network, specifically a Transformer model equipped with self-attention
    mechanisms, to model these probabilities. This allows it to capture the long-distance
    relationships in text sequences. As depicted in [Fig. 3.1](#f0010), at the heart
    of GPT is a multilayer Transformer encoder, each layer composed of a masked multihead
    attention sublayer and a feedforward neural network sublayer. Masked self-attention,
    a special type of self-attention, captures dependencies across different positions
    in the input sequence and ensures that the model during pretraining only considers
    information from previous words (this is done by introducing a masking matrix
    during self-attention calculations, which excludes subsequent words in the sequence).
  prefs: []
  type: TYPE_NORMAL
- en: '![Diagram of GPT model architecture with layers of normalization, feedforward
    network and masked multi-head attention.](../images/F000035f03-01-9780443274367.jpg)'
  prefs: []
  type: TYPE_IMG
- en: '[Figure 3.1](#Bf0010) Transformer decoder in GPT-1\. *GPT*, Generative pretraining.
    Image source: Paper “Improving language understanding by generative pretraining”.'
  prefs: []
  type: TYPE_NORMAL
- en: At the heart of GPT is a multilayer Transformer encoder, each layer composed
    of a masked multihead attention sublayer and a feedforward neural network sublayer.
    The diagram shows the flow starting from Text and Positional Encoding at the bottom,
    followed by Masked Multi-Head Attention, Layer Normalization, Feedforward Network
    and another Layer Normalization. This sequence is repeated 12 times. The output
    is directed towards Text Prediction and Text Classification.
  prefs: []
  type: TYPE_NORMAL
- en: In the training phase, GPT seeks to maximize the data likelihood by minimizing
    the cross-entropy loss, enhancing the chances of accurately predicting the next
    word. Optimization of this loss improves the precision of the generative probability
    distribution. Popular optimization techniques include Stochastic Gradient Descent
    (SGD) and variants like Adam and Adagrad. The model’s performance is heavily influenced
    by how the learning rate is adjusted and regularization techniques employed. Typically,
    strategies like warming up the learning rate and gradually reducing it help stabilize
    the training process.
  prefs: []
  type: TYPE_NORMAL
- en: 3.2 Generative pretraining model
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The foundation of the GPT model is the decoder architecture of the Transformer,
    which is renowned for its self-attention mechanism that effectively captures long-distance
    dependencies and boosts parallel computing power. As depicted in [Fig. 3.2](#f0015),
    the essence of this model is a series of Transformer decoder layers, each comprising
    a self-attention sublayer and a feedforward neural network sublayer. In this setup,
    the self-attention sublayer comes first, focusing on identifying dependencies
    across various positions in the input sequence, while the subsequent feedforward
    sublayer handles nonlinear transformations at each position.
  prefs: []
  type: TYPE_NORMAL
- en: '![A series of Transformer decoder layers with self-attention and feedforward
    neural network sublayers.](../images/F000035f03-02-9780443274367.jpg)'
  prefs: []
  type: TYPE_IMG
- en: '[Figure 3.2](#Bf0015) Transformer model in GPT-1\. Image source: [https://www.wikiwand.com/zh-hans/OpenAI](https://www.wikiwand.com/zh-hans/OpenAI).'
  prefs: []
  type: TYPE_NORMAL
- en: The diagram illustrates a series of Transformer decoder layers, each comprising
    a self-attention sublayer and a feedforward neural network sublayer. The process
    starts with the input, which goes through Input Embedding and Positional Encoding,
    followed by Dropout. This is then fed into Transformer Block Layer 1, followed
    by subsequent Transformer Block Layers, up to Layer L. Each Transformer Block
    consists of a LayerNorm, followed by a self-attention mechanism with multiple
    heads (Head 1 to Head H), each involving Matmul, Mask, Softmax, Dropout and another
    Matmul. The outputs of these heads are combined through a Linear layer. This is
    followed by another LayerNorm, a Linear layer, Gelu activation, another Linear
    layer, Dropout and a residual connection. The final output of the Transformer
    Block is passed through another LayerNorm, a Linear layer and Softmax to produce
    the final output.
  prefs: []
  type: TYPE_NORMAL
- en: To ensure that the model generates text based solely on the context it has seen
    and not on any future information, GPT uses a technique called masked self-attention.
    In practice, this means that during the self-attention scoring process, the model
    ignores any words that appear after the current position in the sequence. This
    is accomplished by integrating a mask matrix into the self-attention calculation,
    which guarantees that only preceding information is taken into account.
  prefs: []
  type: TYPE_NORMAL
- en: The core principle of masked self-attention is that the model’s focus is restricted
    to the current and preceding positions when calculating self-attention weights.
    For instance, in an input sequence $MathML$![Equation](../images/F000035si1.png),
    the self-attention weight at position i considers only the elements from position
    1 to $MathML$![Equation](../images/F000035si2.png). This approach ensures that
    the text generated is informed only by the context already observed and not by
    any subsequent information. To achieve this, the attention matrix used in self-attention
    calculations is modified by masking, where weights for future positions are set
    to negative infinity. When processed through a softmax function, these weights
    effectively become zero, thereby enforcing causal masking.
  prefs: []
  type: TYPE_NORMAL
- en: The masked self-attention mechanism is crucial in GPT tasks. As illustrated
    in [Fig. 3.3](#f0020), during the pretraining phase, the model is tasked with
    learning a broad representation of language. Masked self-attention ensures that
    the model concentrates solely on the current position and the preceding context
    when generating text, aiding in adherence to the natural patterns of language
    generation. During the fine-tuning phase, this mechanism continues to be essential,
    helping the model produce outputs that align with the previously observed context.
  prefs: []
  type: TYPE_NORMAL
- en: '![Illustration of masked self-attention mechanism in language model pretraining.](../images/F000035f03-03-9780443274367.jpg)'
  prefs: []
  type: TYPE_IMG
- en: '[Figure 3.3](#Bf0020) Working principle of masked self-attention. Image source:
    [https://data-science-blog.com/blog/tag/engineer/](https://data-science-blog.com/blog/tag/engineer/).'
  prefs: []
  type: TYPE_NORMAL
- en: 'It shows 4 stages of weights and masking for the words: Deep, learning, algorithms,
    excel, in, Natural, language, processing, tasks. Each stage has a graph of weights,
    followed by a masked sequence. The first stage focuses on the word Deep, the second
    on learning, the third on processing and the fourth on tasks. The right side of
    the image shows a grid labeled ''Using [Masked Self-Attention] to Ignore Subsequent
    Words'' with attention weights and zero weights.'
  prefs: []
  type: TYPE_NORMAL
- en: It’s important to note the distinct differences between the GPT model and the
    original Transformer model. In the original Transformer, the encoder’s self-attention
    is not masked, allowing the model to focus on any position within the sequence.
    This setup is advantageous for some NLP tasks like machine translation. However,
    for GPT, the lack of masking can result in text that improperly relies on future
    information, violating the principles of natural language generation.
  prefs: []
  type: TYPE_NORMAL
- en: Additionally, in the traditional Transformer model, both the encoder and decoder
    are crucial, with the encoder encoding the input sequence and the decoder producing
    the target sequence based on the encoder’s output. In contrast, GPT aims to learn
    a universal language representation, not to translate an input sequence to a target
    sequence. Thus the GPT model exclusively employs the decoder architecture, streamlining
    its focus on language understanding and generation.
  prefs: []
  type: TYPE_NORMAL
- en: 3.3 The generative pretraining process
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'GPT is a method that uses vast amounts of unlabeled text data to learn how
    to predict the structure and latent meanings within texts. Its objective is to
    develop a language model that can produce text sequences resembling those in the
    training data. Specifically, given a text sequence $MathML$![Equation](../images/F000035si3.png),
    the model is tasked with learning the probability distribution $MathML$![Equation](../images/F000035si4.png)
    of the entire sequence. This distribution is understood as a series of conditional
    probabilities:'
  prefs: []
  type: TYPE_NORMAL
- en: $MathML$ (3.1)
  prefs: []
  type: TYPE_NORMAL
- en: '![Equation](../images/F000035si5.png) (3.1)'
  prefs: []
  type: TYPE_IMG
- en: where $MathML$![Equation](../images/F000035si6.png) denotes the context, which
    includes the previous $MathML$![Equation](../images/F000035si7.png) words ($MathML$![Equation](../images/F000035si8.png),
    $MathML$![Equation](../images/F000035si9.png),…, $MathML$![Equation](../images/F000035si10.png)).
    $MathML$![Equation](../images/F000035si11.png) calculates the likelihood of producing
    the $MathML$![Equation](../images/F000035si12.png)-th word based on this context.
  prefs: []
  type: TYPE_NORMAL
- en: 3.3.1 The objectives of generative pretraining
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In the process of GPT, the main goal of the model is to maximize how likely
    it is to correctly predict words from the training data, a method known as maximum
    likelihood estimation. Specifically, given a training sample *x* and the model-generated
    probability distribution $MathML$![Equation](../images/F000035si13.png), the objective
    function is defined as
  prefs: []
  type: TYPE_NORMAL
- en: $MathML$ (3.2)
  prefs: []
  type: TYPE_NORMAL
- en: '![Equation](../images/F000035si14.png) (3.2)'
  prefs: []
  type: TYPE_IMG
- en: where $MathML$![Equation](../images/F000035si15.png) is the loss function for
    the autoregressive language model, $MathML$![Equation](../images/F000035si16.png)
    represents the length of the training sample, $MathML$![Equation](../images/F000035si17.png)
    is the sequence of words before position $MathML$![Equation](../images/F000035si18.png),
    and $MathML$![Equation](../images/F000035si19.png) is the word at position $MathML$![Equation](../images/F000035si20.png).
    $MathML$![Equation](../images/F000035si21.png) is the conditional probability
    that the model, using parameters $MathML$![Equation](../images/F000035si22.png),
    predicts the next word $MathML$![Equation](../images/F000035si23.png).
  prefs: []
  type: TYPE_NORMAL
- en: Autoregressive language models are designed to predict the next word in a sequence
    based on the previous words. The model calculates the likelihood of a word appearing
    at the current position using the history of the sequence. Therefore $MathML$![Equation](../images/F000035si24.png)
    indicates the probability of the word $MathML$![Equation](../images/F000035si25.png)
    occurring, given the prior sequence $MathML$![Equation](../images/F000035si26.png).
    The parameter $MathML$![Equation](../images/F000035si27.png) is a set of model
    parameters that influence its ability to make these predictions.
  prefs: []
  type: TYPE_NORMAL
- en: Initially, the input text sequence $MathML$![Equation](../images/F000035si28.png)
    is transformed into an embedded representation, where each word is converted into
    a vector using a token embedding matrix. This matrix assigns each word a fixed-dimensional
    vector.
  prefs: []
  type: TYPE_NORMAL
- en: Next, to help the model grasp the relationships between words, position information
    is added to each word’s embedding. This is done through a position embedding matrix
    $MathML$![Equation](../images/F000035si29.png), which is combined with the token
    embedding matrix $MathML$![Equation](../images/F000035si30.png) to form the initial
    embedding representation $MathML$![Equation](../images/F000035si31.png).
  prefs: []
  type: TYPE_NORMAL
- en: 'This representation, $MathML$![Equation](../images/F000035si32.png), is then
    processed through several layers of a Transformer block, each consisting of self-attention
    and feedforward layers. The output $MathML$![Equation](../images/F000035si33.png)
    from the $MathML$![Equation](../images/F000035si34.png)-th Transformer layer is
    given by:'
  prefs: []
  type: TYPE_NORMAL
- en: $MathML$ (3.3)
  prefs: []
  type: TYPE_NORMAL
- en: '![Equation](../images/F000035si35.png) (3.3)'
  prefs: []
  type: TYPE_IMG
- en: where nnn represents the total number of layers in the Transformer stack. At
    the end of the Transformer stack, the final output vector $MathML$![Equation](../images/F000035si36.png)
    and a matrix $MathML$![Equation](../images/F000035si37.png), containing the embedding
    vectors for each word in the vocabulary, are used to compute the probability of
    the next word $MathML$![Equation](../images/F000035si38.png) as
  prefs: []
  type: TYPE_NORMAL
- en: $MathML$ (3.4)
  prefs: []
  type: TYPE_NORMAL
- en: '![Equation](../images/F000035si39.png) (3.4)'
  prefs: []
  type: TYPE_IMG
- en: Here, the $MathML$![Equation](../images/F000035si40.png) function converts the
    output into a probability distribution, with $MathML$![Equation](../images/F000035si41.png)
    indicating the likelihood of each word being the next word in the sequence. The
    model selects the next word by finding the highest value from the dot product
    between $MathML$![Equation](../images/F000035si42.png) and the word embeddings.
  prefs: []
  type: TYPE_NORMAL
- en: The primary objective of training the GPT-1 model is to minimize negative log-likelihood.
    This approach essentially reduces the errors the model makes in predicting the
    next word based on the preceding context. To meet this target, the model not only
    optimizes the parameters of its Transformer structure but also fine-tunes the
    word embedding vectors. Throughout each training cycle, which includes both the
    forward pass and backpropagation, the model calculates and minimizes the loss
    function using the backpropagation algorithm to refine its parameters. Therefore
    during the unsupervised pretraining phase, the GPT-1 model continually adjusts
    both its parameters and the representations of words to improve its predictive
    accuracy.
  prefs: []
  type: TYPE_NORMAL
- en: 3.3.2 The error backpropagation process in generative pretraining
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'All models in the GPT series use a method known as reversible tokenization,
    which is based on data compression techniques (refer to Section 4.2.3), to facilitate
    the explanation of the error backpropagation process in GPT. In this chapter,
    we simplify the initial embedding of words. It is assumed that the model generates
    its initial embeddings by multiplying the one-hot encoding of the input text sequence
    with a word embedding matrix $MathML$![Equation](../images/F000035si43.png), represented
    as $MathML$![Equation](../images/F000035si44.png):'
  prefs: []
  type: TYPE_NORMAL
- en: $MathML$ (3.5)
  prefs: []
  type: TYPE_NORMAL
- en: '![Equation](../images/F000035si45.png) (3.5)'
  prefs: []
  type: TYPE_IMG
- en: 'Here, $MathML$![Equation](../images/F000035si46.png) stands for the one-hot
    encoded matrix of the input text sequence, while $MathML$![Equation](../images/F000035si47.png)
    is the word embedding matrix. The model then enhances these embeddings by applying
    multihead attention, residual connections, and layer normalization within each
    Transformer stack layer to produce contextually enriched embeddings $MathML$![Equation](../images/F000035si48.png):'
  prefs: []
  type: TYPE_NORMAL
- en: $MathML$ (3.6)
  prefs: []
  type: TYPE_NORMAL
- en: '![Equation](../images/F000035si49.png) (3.6)'
  prefs: []
  type: TYPE_IMG
- en: In the final step, the output from the last Transformer stack layer is multiplied
    by a weighting matrix and processed through a softmax function to compute the
    probability distribution for the next word in the sequence.
  prefs: []
  type: TYPE_NORMAL
- en: When calculating its loss function, the model evaluates the difference between
    the actual next word’s one-hot encoding and its predicted probability distribution
    to compute the loss. This loss is then sent back through the Transformer stack
    layers using the backpropagation algorithm, which updates the embedding representations
    for each word. The gradient calculation for the embedding vector $MathML$![Equation](../images/F000035si50.png)
    of any particular word during backpropagation is
  prefs: []
  type: TYPE_NORMAL
- en: $MathML$ (3.7)
  prefs: []
  type: TYPE_NORMAL
- en: '![Equation](../images/F000035si51.png) (3.7)'
  prefs: []
  type: TYPE_IMG
- en: In this formula, $MathML$![Equation](../images/F000035si52.png) is the model’s
    loss function, $MathML$![Equation](../images/F000035si53.png) is the predicted
    probability distribution of the next word by the model, and $MathML$![Equation](../images/F000035si54.png)
    is the embedding matrix. By applying the gradient descent method, the model uses
    this gradient to update the value of $MathML$![Equation](../images/F000035si55.png),
    thus improving the accuracy of future predictions. Once training is complete,
    these refined word embeddings are utilized as the initial embedding representations
    for subsequent tasks.
  prefs: []
  type: TYPE_NORMAL
- en: During GPT, the strategies for adjusting the learning rate and methods of regularization
    play a crucial role in enhancing model performance. Commonly, strategies such
    as a warmup phase for the learning rate followed by a gradual decrease are implemented
    to optimize learning rates, aiming to increase the stability of the training process.
    Furthermore, to avoid overfitting—a common challenge in model training—techniques
    like Dropout and weight decay (for instance, L2 regularization) are used to maintain
    the simplicity of the model structure.
  prefs: []
  type: TYPE_NORMAL
- en: Once pretraining is complete, the GPT model becomes capable of handling various
    NLP tasks, including text classification, sentiment analysis, and question answering.
    To tailor the model for these specific tasks, supervised fine-tuning is conducted.
    In this phase, the model is trained with labeled data pertinent to specific tasks,
    which allows it to acquire task-specific knowledge. This stage is considered a
    form of transfer learning, as the model utilizes the extensive linguistic knowledge
    it gained during pretraining to improve its effectiveness on downstream tasks.
  prefs: []
  type: TYPE_NORMAL
- en: GPT is an approach where language models learn from a vast amount of unlabeled
    text data through unsupervised learning. The GPT model uses a Transformer architecture
    powered by self-attention mechanisms and employs a causality mask during self-attention
    calculations to ensure that the model only accesses information from previous
    segments. The objective is to maximize the likelihood on the training data ([Eqs.
    3.2](#eqn2)–[3.3](#eqn3)) to master a generative probability distribution ([Eqs.
    3.1](#eqn1)–[3.3](#eqn3)). After this phase, the model can undergo supervised
    fine-tuning to adapt to a variety of NLP tasks. This method of GPT has proven
    to significantly boost performance across numerous language processing applications,
    highlighting its substantial potential.
  prefs: []
  type: TYPE_NORMAL
- en: 3.4 Supervised fine-tuning
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: GPT equips the GPT model with a fundamental understanding of grammar and vocabulary.
    During the next phase, supervised fine-tuning, the model’s parameters are further
    refined using annotated data from specific tasks. This enables the model to perform
    specialized NLP tasks like sentiment analysis, text classification, and question
    answering.
  prefs: []
  type: TYPE_NORMAL
- en: 3.4.1 The principles of supervised fine-tuning
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: This section introduces two new equations to describe the supervised fine-tuning
    process. Consider a training example $MathML$![Equation](../images/F000035si56.png)
    for a specific task, where $MathML$![Equation](../images/F000035si57.png) is the
    input sequence and $MathML$![Equation](../images/F000035si58.png) is the associated
    label. The aim during this phase is to minimize the loss function defined as
  prefs: []
  type: TYPE_NORMAL
- en: $MathML$ (3.8)
  prefs: []
  type: TYPE_NORMAL
- en: '![Equation](../images/F000035si59.png) (3.8)'
  prefs: []
  type: TYPE_IMG
- en: 'Here, $MathML$![Equation](../images/F000035si60.png) denotes the model parameters,
    $MathML$![Equation](../images/F000035si61.png) is the expected value, and $MathML$![Equation](../images/F000035si62.png)
    represents the probability of generating the label *y*, given the input *x* and
    parameters $MathML$![Equation](../images/F000035si63.png). This loss function,
    while similar to that described in [Section 3.3.1](#s0025) ([Eqs. 3.2](#eqn2)–[3.3](#eqn3)),
    specifically targets the probability of producing task-related labels, not just
    words. The objective for fine-tuning the model for specific tasks is set as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: $MathML$ (3.9)
  prefs: []
  type: TYPE_NORMAL
- en: '![Equation](../images/F000035si64.png) (3.9)'
  prefs: []
  type: TYPE_IMG
- en: Here, $MathML$![Equation](../images/F000035si65.png) are the adjusted parameters
    after fine-tuning, $MathML$![Equation](../images/F000035si66.png) is the loss
    function for task-specific data, $MathML$![Equation](../images/F000035si67.png)
    is a regularization coefficient, and $MathML$![Equation](../images/F000035si68.png)
    is the regularization term, usually the L2 norm of the parameters. The goal is
    to minimize the loss on task-specific data while using regularization to prevent
    overfitting.
  prefs: []
  type: TYPE_NORMAL
- en: 3.4.2 Supervised fine-tuning for specific tasks
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In the GPT phase, the GPT model diligently works to grasp the various aspects
    of natural language, enabling it to produce text similar to the input sequences
    it receives. At this stage, the GPT operates as a universal language model, capturing
    extensive knowledge encompassing vocabulary, grammar, and semantics. During the
    supervised fine-tuning phase, the model is trained with annotated data, allowing
    it to acquire task-specific knowledge. This resembles the process of transfer
    learning, where the model leverages the extensive linguistic insights gained during
    pretraining to boost its performance on specific tasks.
  prefs: []
  type: TYPE_NORMAL
- en: The representations learned during pretraining effectively capture the fundamental
    structures of the input data. These are then leveraged in the fine-tuning phase
    to enhance the model’s understanding of task-specific features. For particular
    NLP tasks, the input sequence must undergo specific modifications to ensure the
    model focuses on relevant information. These modifications are referred to as
    task-specific input transformations.
  prefs: []
  type: TYPE_NORMAL
- en: The main purpose of these transformations is to tailor the input sequence to
    fit the requirements of specific tasks. This typically involves incorporating
    special tokens within the sequence to emphasize task-related details. For instance,
    in a question-answering task, both the question and its contextual information
    need to be combined into a single input sequence to enable the model to generate
    appropriate answers. Inserting a special separator, such as “[SEP],” between the
    question and context helps the model to more accurately interpret the input structure
    and deliver more precise predictions.
  prefs: []
  type: TYPE_NORMAL
- en: '[Fig. 3.4](#f0025) illustrates the application of the GPT model to specific
    NLP tasks. This process is divided into two main stages: first, the unsupervised
    pretraining stage, where the model learns language models through generative training;
    second, the supervised fine-tuning stage, where the model is tailored to specific
    NLP tasks. On the left side of [Fig. 3.4](#f0025), the model learns the structure
    of language by maximizing the likelihood of input sequences, while on the right
    side, it shows how model parameters are optimized for specific tasks to improve
    task performance. The four NLP tasks are highlighted in [Fig. 3.4](#f0025):'
  prefs: []
  type: TYPE_NORMAL
- en: '1. **Text classification**: In text classification tasks, the model classifies
    input text into one or several predefined categories based on content. Task-specific
    input transformations are straightforward here, involving only a text segment.
    The original text is input directly into the model. Post fine-tuning, the GPT
    model can predict category labels based on the input content. A fully connected
    layer is typically added to the output layer for task-specific predictions. To
    help the model distinguish different tasks, a special classification token (e.g.,
    “[CLS]”) might be placed at the start of the sequence.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '2. **Natural language inference (NLI)**: This task involves determining if
    a hypothesis is derivable from a given premise, with potential outputs being entailment,
    contradiction, or neutrality. The input sequence includes both the premise and
    the hypothesis, separated by a special symbol (e.g., “[Delim]”). A special inference
    token (e.g., “[NLI]”) at the sequence’s start signals the inference task to the
    model.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '3. **Similarity**: Here, the model evaluates the similarity between two text
    sequences. A special delimiter (e.g., “[Delim]”) is typically placed between the
    texts to be compared, and a similarity marker (e.g., “[SIM]”) might be added at
    the start to signify a similarity evaluation task.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '4. **Multiple choice**: This task requires selecting the most appropriate answer
    from multiple options based on a question. A special delimiter (e.g., “[Delim]”)
    is used between the question and each option to differentiate them. A multiple-choice
    token (e.g., “[MCH]”) at the start indicates the task type.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Diagram illustrating the application of the GPT model to specific NLP tasks.](../images/F000035f03-04-9780443274367.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 3.4 Application process of generative pretraining models. Image source:
    Paper “Improving language understanding by generative pretraining”.'
  prefs: []
  type: TYPE_NORMAL
- en: At the top, there are two boxes labeled Text Prediction and Task Classifier.
    Below these, there is a block labeled Text and Position Embed, which connects
    to a larger block containing Layer Norm, Feed Forward and Masked Multi Self Attention,
    repeated 12 times. The tasks shown are Classification, Entailment, Similarity
    and Multiple Choice. Each task has a sequence starting with Start, followed by
    various elements like Text, Premise, Hypothesis, Text 1, Text 2, Context, Answer
    1, Answer 2 and Answer N, with delimiters and Extract. These sequences are processed
    by a Transformer and then a Linear layer. For Similarity, there is an additional
    step where outputs from two Transformers are combined before the Linear layer.
  prefs: []
  type: TYPE_NORMAL
- en: Task-specific input transformations significantly enhance the GPT model’s ability
    to conduct effective transfer learning across a range of NLP tasks. By incorporating
    special symbols within the input sequences, the model gains a better grasp of
    information pertinent to specific tasks, which boosts its performance in downstream
    applications. It is noteworthy that the precise form of these special markers
    can vary depending on the design of the model and the requirements of the specific
    tasks. For instance, the original GPT paper indicates that every task-specific
    input transformation includes the addition of randomly initialized start and end
    tokens.
  prefs: []
  type: TYPE_NORMAL
- en: For these transformations to be effective, it is vital to maintain consistency
    in the vocabulary and encoding schemes used during both the pretraining and fine-tuning
    phases. This involves setting aside some vocabulary space for special symbols
    during pretraining and employing the same vocabulary and encoding scheme for encoding
    input sequences during fine-tuning. Such consistency ensures that the model continues
    to exhibit a uniform understanding and representation of language throughout the
    transfer learning process.
  prefs: []
  type: TYPE_NORMAL
- en: In conclusion, tailoring input sequences to different NLP tasks not only helps
    the model comprehend task-specific information more effectively but also enhances
    its performance in subsequent tasks. Through these input transformation techniques,
    GPT models can effectively engage in transfer learning across various NLP tasks,
    achieving superior NLP performance.
  prefs: []
  type: TYPE_NORMAL
- en: 3.4.3 Fine-tuning steps
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'The supervised fine-tuning process involves several crucial steps:'
  prefs: []
  type: TYPE_NORMAL
- en: '1. **Target task selection**: Determine a specific NLP task based on requirements,
    such as sentiment analysis, text classification, or named entity recognition.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '2. **Training data preparation**: Collect annotated data pertinent to the chosen
    task, typically comprising input sequences (like text snippets) and their corresponding
    labels (e.g., sentiment or category labels).'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '3. **Model initialization**: Start with the model parameters acquired during
    GPT to ensure the model has robust language representation capabilities from the
    beginning of the fine-tuning phase.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '4. **Model fine-tuning**: Utilize task-related data and the loss function $MathML$![Equation](../images/F000035si69.png)
    to fine-tune the model. Use optimization algorithms like SGD or others to update
    the parameters, incorporating regularization techniques such as L2 regularization
    to adjust the regularization coefficient $MathML$![Equation](../images/F000035si70.png)
    and prevent overfitting.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '5. **Model performance evaluation**: Measure the fine-tuned model’s performance
    on a task-specific validation set using metrics such as accuracy or F1 score.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '6. **Hyperparameter adjustment**: Fine-tune the model’s hyperparameters, like
    the learning rate or regularization coefficient, based on performance metrics
    from the validation set to enhance the model’s efficacy.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '7. **Model application**: Deploy the fine-tuned model to tackle real-world
    problems, process new inputs, and produce predictions for specific tasks.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The model can be tailored according to the task and data characteristics. For
    instance, in text classification tasks, a fully connected layer can be added to
    the final layer to generate task-specific predictions. In named entity recognition,
    a conditional random field layer might be integrated into the output layer to
    better capture label sequence dependencies. This adaptability makes the GPT model
    versatile across various NLP tasks.
  prefs: []
  type: TYPE_NORMAL
- en: GPT’s fine-tuning typically delivers robust performance with relatively few
    annotated data, benefiting significantly from the rich linguistic insights gained
    during pretraining. Thus supervised fine-tuning is effectively refining the pretrained
    model for specific tasks using limited annotated data.
  prefs: []
  type: TYPE_NORMAL
- en: In essence, supervised fine-tuning is pivotal for leveraging GPT models in specific
    NLP tasks. It involves optimizing the model on task-relevant data using learned
    language representations to achieve optimal outcomes. This process includes fine-tuning
    the loss function $MathML$![Equation](../images/F000035si71.png) ([Eqs. 3.3](#eqn3)–[3.7](#eqn7))
    and employing regularization to prevent overfitting. Furthermore, the model’s
    architecture can be modified to suit different NLP tasks, enhancing its adaptability.
  prefs: []
  type: TYPE_NORMAL
- en: 3.5 Summary
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'The GPT models that form the basis of the GPT series, discussed in this chapter,
    have been instrumental in shaping the technological framework of ChatGPT. GPT’s
    training regimen is structured into two principal phases: unsupervised pretraining
    and supervised fine-tuning. This dual-phase approach offers an effective training
    paradigm for ChatGPT. During unsupervised pretraining on vast quantities of unlabeled
    text, ChatGPT develops a nuanced understanding of language. In the subsequent
    supervised fine-tuning phase, it is tailored to excel at specific tasks, significantly
    boosting its efficacy in targeted areas.'
  prefs: []
  type: TYPE_NORMAL
- en: The architecture used by GPT, which consists solely of a Transformer decoder
    and masked self-attention mechanisms, serves as a critical blueprint for ChatGPT’s
    design. These elements are not only capable of advanced representation learning
    and efficient parallel processing, but they also ensure that the generation of
    text is influenced only by the current position and preceding context. This focus
    helps ChatGPT generate responses that are both coherent and meaningful.
  prefs: []
  type: TYPE_NORMAL
- en: <hgroup>
  prefs: []
  type: TYPE_NORMAL
- en: Chapter 4 Unsupervised multitask and zero-shot learning
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: </hgroup>
  prefs: []
  type: TYPE_NORMAL
- en: Abstract
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This chapter delves into unsupervised multitask learning (MTL) and zero-shot
    learning, focusing on their implementation in OpenAI’s GPT-2 model. MTL enhances
    model generalization by training on multiple related tasks, while zero-shot learning
    enables task performance without specific training data. The chapter explores
    the Transformer architecture, contrasting BERT’s bidirectional encoder with GPT-2
    unidirectional decoder. Key advancements in GPT-2 include layer normalization
    for stability, orthogonal initialization for gradient preservation, byte-pair
    encoding for efficient tokenization, and learnable relative positional encodings
    for better context understanding. The unsupervised pretraining of GPT-2 allows
    it to perform various natural language processing tasks without fine-tuning, demonstrating
    the synergy between MTL and zero-shot learning. The chapter concludes by highlighting
    GPT-2’s autoregressive generation process and its impact on subsequent models
    like GPT-3.
  prefs: []
  type: TYPE_NORMAL
- en: Keywords
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Unsupervised learning; multitask learning; zero-shot learning; transformer architecture;
    GPT-2; bidirectional encoder representations from transformers (BERT); layer normalization;
    orthogonal initialization; byte-pair encoding (BPE); autoregressive generation
  prefs: []
  type: TYPE_NORMAL
- en: Multitask learning (MTL) is a strategic approach in machine learning that focuses
    on training models on several related tasks at once. By sharing insights across
    these tasks, the model’s ability to generalize and adapt to new scenarios is significantly
    enhanced. OpenAI highlighted this technique, alongside zero-shot learning, in
    their GPT-2 paper.
  prefs: []
  type: TYPE_NORMAL
- en: Zero-shot learning, a subset of unsupervised MTL, allows models to tackle tasks
    without specific training data. Instead, these models utilize a broad language
    model learned beforehand. The beauty of zero-shot learning lies in its cost-effectiveness,
    as it skips the need for task-specific tuning, making the model versatile across
    unfamiliar tasks. This chapter dives deep into the modifications of the Transformer
    architecture in GPT-2, explores the principles behind unsupervised MTL and zero-shot
    learning, and unpacks these concepts in depth.
  prefs: []
  type: TYPE_NORMAL
- en: 4.1 Encoder and decoder
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In October 2018, OpenAI unveiled GPT, followed 6 months later by Google with
    BERT. These models are based on the Transformer architecture, which consists of
    encoders and decoders stacked in multiple layers. [Fig. 4.1](#f0010) illustrates
    BERT as a pretrained language model built on Transformer’s encoder architecture,
    while GPT leverages the decoder side.
  prefs: []
  type: TYPE_NORMAL
- en: '![An architecture of BERT and GPT models with input and output embeddings,
    multi-head attention and feed-forward layers.](../images/F000047f04-01-9780443274367.jpg)'
  prefs: []
  type: TYPE_IMG
- en: '[Figure 4.1](#Bf0010) Transformer encoder (left) and decoder architecture (right).'
  prefs: []
  type: TYPE_NORMAL
- en: On the left, the BERT model is shown with input embeddings followed by positional
    encoding. The architecture includes layers of multi-head attention, add and norm
    and feed-forward components. On the right, the GPT model is depicted with output
    embeddings followed by positional encoding. The architecture includes masked multi-head
    attention, add and norm, multi-head attention, feed-forward layers and output
    probabilities. Both models have N layers, indicated by N times. The BERT model
    processes inputs, while the GPT model processes outputs shifted right.
  prefs: []
  type: TYPE_NORMAL
- en: BERT features a bidirectional approach, analyzing the words before and after
    a target word to predict its context. It employs a strategy known as masked language
    model, where random words in a sentence are hidden to make the model infer them
    based on the whole sentence’s context. This technique enhances BERT’s ability
    to grasp context from both directions, leading to notable improvements across
    various natural language processing (NLP) tasks.
  prefs: []
  type: TYPE_NORMAL
- en: After BERT’s success, OpenAI introduced GPT-2, an advanced version of GPT. GPT-2
    maintains a unidirectional flow from left to right during its unsupervised pretraining.
    The model size of GPT-2 medium version matches that of BERT large, yet their architectures
    and training techniques greatly differ, affecting their performance in specific
    tasks. As depicted in [Fig. 4.2](#f0015), BERT utilizes a bidirectional encoder
    using self-attention to process text context, excelling in tasks that demand an
    understanding of sentence structure and contextual relationships, like question
    answering, entity recognition, and relation extraction.
  prefs: []
  type: TYPE_NORMAL
- en: '![Two diagrams illustrating Self-Attention and Masked Self-Attention mechanisms
    in neural networks.](../images/F000047f04-02-9780443274367.jpg)'
  prefs: []
  type: TYPE_IMG
- en: '[Figure 4.2](#Bf0015) Differences between self-attention and masked self-attention.
    Image source: [http://jalammar.github.io/illustrated-gpt2/](http://jalammar.github.io/illustrated-gpt2/).'
  prefs: []
  type: TYPE_NORMAL
- en: The left diagram is labeled Self-Attention and shows a rectangular block with
    an arrow pointing upwards from a central circle. Below the circle, a triangular
    area is connected to a series of smaller rectangles. The right diagram is labeled
    Masked Self-Attention and is similar to the left diagram but with some of the
    smaller rectangles at the bottom right being shaded differently, indicating masking.
  prefs: []
  type: TYPE_NORMAL
- en: Conversely, GPT-2 features a unidirectional decoder that uses a masked self-attention
    mechanism to focus primarily on learning through language modeling, which might
    limit its bidirectional context comprehension compared to BERT. However, GPT-2
    performs exceptionally well in various language generation tasks, including text
    summarization, translation, and dialog creation. Despite their differences, both
    models are recognized as robust tools in NLP, each excelling in specific tasks
    where they are most effective.
  prefs: []
  type: TYPE_NORMAL
- en: 4.2 GPT-2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: GPT-2, the follow-up to the original GPT, retains the decoder architecture from
    the Transformer model but expands massively on the training data used. It was
    trained on a hefty 40 GB dataset named WebText, gathered by the OpenAI team. [Fig.
    4.3](#f0020) highlights the varied sizes of GPT-2 models used during training,
    ranging from 117 MB (small) to 1542 MB (extra-large) in parameter size. The smallest
    version comprises 12 decoder layers, needing 500 MB of storage for its parameters.
    On the other hand, the largest version features 48 decoder layers, with its parameter
    volume 13 times greater than the smallest, necessitating 6.5 GB of storage. [Fig.
    4.4](#f0025) illustrates that GPT-2 architecture has significantly evolved from
    that of GPT-1, reflecting major advancements in its design and capabilities.
  prefs: []
  type: TYPE_NORMAL
