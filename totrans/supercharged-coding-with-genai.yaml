    mean ( G ) is given by:'
  prefs: []
  type: TYPE_NORMAL
- en: '[ G = \left( \prod_{i=1}^{n} x_i \right)^{\frac{1}{n}} ]'
  prefs: []
  type: TYPE_NORMAL
- en: Steps to Calculate
