- en: Analysis with Generative AI
  id: totrans-1122
  prefs: []
  type: TYPE_NORMAL
  zh: 使用生成式 AI 进行分析
- en: 'The following prompt was given to ChatGPT: “Please create a Pareto analysis
    chart using the provided data. The destination codes should be sorted in descending
    order based on their counts. The x-axis should display the destination codes,
    and the y-axis should display the counts. Additionally, plot the cumulative percentage
    line on a secondary y-axis. Use blue bars for the counts and ensure the cumulative
    percentage line is smooth and accurate. Also, include a horizontal dashed line
    at the 80% mark on the cumulative percentage axis.”'
  id: totrans-1123
  prefs: []
  type: TYPE_NORMAL
  zh: 给 ChatGPT 的以下提示：“请使用提供的数据创建帕累托分析图。目的地代码应根据其计数降序排列。x 轴应显示目的地代码，y 轴应显示计数。此外，在次要
    y 轴上绘制累积百分比线。使用蓝色条形表示计数，并确保累积百分比线平滑且准确。还包括累积百分比轴上的 80% 标记处的水平虚线。”
