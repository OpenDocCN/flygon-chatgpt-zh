  id: totrans-718
  prefs: []
  type: TYPE_NORMAL
  zh: '**虽然ChatGPT不一定一开始就能产生高质量的、吸引人的内容，但当你要求它为你撰写一篇博客文章时，它和人类一样，都不会立即写出完美的第一稿**。正如著名作家Sir
    Terry Pratchett曾经说过的，“第一稿只是你告诉自己故事的方式”（在Fox, 2019）。如果你将“你”替换为“ChatGPT”，那么你就能理解我试图表达的意思。ChatGPT有时确实能产生一些相当精彩的内容，但问题是我们不应该期望它第一次就能完全正确。 '
