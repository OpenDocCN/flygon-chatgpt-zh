  zh: 在冠状病毒封锁我们世界之前，据估计，世界上约有25%的人口遭受抑郁症（Heeg, 2021）。而且，心理健康领域的专家表示，这个比例在疫情期间急剧上升。根据经济合作与发展组织（OECD）的一项研究，“从2020年3月20日起，焦虑和抑郁的普遍率增加，在一些国家甚至翻了一番”（OECD,
    2021）。在这段引语中值得注意的关键一点是使用了“从那时起”这个词。这意味着它仍在继续，因为你不能忽视一个心理健康问题或希望它消失。就像身体健康问题一样，如果你不寻求帮助，那种众所周知的心理障碍就不会消失。事实上，它可能会变得更糟，就像癌症一样，会更多地扩散到你的心理和意识中。但别担心，因为数字心理健康解决方案已经覆盖了你，你不需要等到有钱或有时间去看医生；你现在就可以拿起电话或电脑寻求帮助！显然，我不是在告诉你你需要这样做，但能够做到这一点是非常革命性的，我们应该像那样开始行动。现代世界是一个充满不确定性和压力的地方。我们为什么不都应该有机会访问我们自己的个人数字治疗师，以帮助我们保持心理健康和情绪健康在最佳水平；帮助我们不要沉沦或挣扎，而是乘风破浪，享受现代生活及其所提供的一切呢？
