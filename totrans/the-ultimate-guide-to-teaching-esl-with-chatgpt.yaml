- en: Connecting independent readers to independent writers.
  id: totrans-875
  prefs: []
  type: TYPE_NORMAL
  zh: 将独立读者与独立作家连接起来。
- en: 'Did you love The Ultimate Guide to Teaching ESL With ChatGPT: Harness AI to
    Enhance Language Learning & Teaching? Then you should read 129 ESL Games and Activities
    For Teens: Fun and Interactive Ideas for the English Classroom by Jackie Bolen!'
  id: totrans-876
  prefs: []
  type: TYPE_NORMAL
  zh: 你是否喜欢《使用ChatGPT教授ESL的终极指南：利用AI增强语言学习与教学》？那么你应该阅读Jackie Bolen的《129个青少年ESL游戏和活动：英语课堂中的趣味互动想法》！
- en: '![](images/image-EGJU4MUV.jpg)'
  id: totrans-877
  prefs: []
  type: TYPE_IMG
  zh: '![](images/image-EGJU4MUV.jpg)'
- en: It's time for new games & activities for ESL classes for teenagers!
  id: totrans-878
  prefs: []
  type: TYPE_NORMAL
  zh: 是时候为青少年的ESL课堂准备新的游戏和活动了！
- en: Whether you're a first-time TEFL teacher, an experienced but overwhelmed instructor,
    or an instructor without a textbook, you need more low-prep ESL activities and
    games for your classes for teens.
  id: totrans-879
  prefs: []
  type: TYPE_NORMAL
  zh: 无论你是第一次的TEFL教师，还是经验丰富但感到压力的讲师，或者没有教科书的讲师，你都需要更多为青少年课程准备的低准备ESL活动和游戏。
- en: During her 20 years of experience as a CELTA/DELTA certified teacher, author
    Jackie Bolen has developed countless games and activities for her students. She's
    sharing her low-prep ideas for teens with ESL teachers throughout the world. These
    are the games and activities that she uses in her own classes every single day!
  id: totrans-880
  prefs: []
  type: TYPE_NORMAL
  zh: 在她20年的CELTA/DELTA认证教师经验中，作者Jackie Bolen为她自己的学生开发了许多游戏和活动。她正在与世界各地的ESL教师分享她的低准备活动想法。这些是她每天在自己的课堂上使用的游戏和活动！
- en: In 129 ESL Games and Activities for Teens, you'll get dozens of ideas to use
    in your own classroom. The highly detailed descriptions will show you exactly
    how to use the activities during your lessons. Jackie's clearly and concisely
    explained activities will help you add instructional variety and put the focus
    back on your students. The teaching tips will help you avoid common pitfalls.
  id: totrans-881
  prefs: []
  type: TYPE_NORMAL
  zh: 在《129个青少年ESL游戏和活动》中，你将获得数十个可以在你自己的教室中使用的想法。高度详细描述将向你展示如何在课程中使用这些活动。Jackie清晰简洁的活动解释将帮助你增加教学多样性，并将重点重新放在学生身上。教学技巧将帮助你避免常见的陷阱。
- en: Pick up a copy of the book today if you want to...
  id: totrans-882
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想要...
- en: Have better English ESL classes with teenagersSave time when planning lessonsSee
    happy, smiling faces in your classesHelp students improve their English skillsHave
    students who want to keep coming back for more!
  id: totrans-883
  prefs: []
  type: TYPE_NORMAL
  zh: 通过更好的英语ESL课程来提高青少年的英语技能，节省计划课程的时间，看到课堂上快乐、微笑的面孔，帮助学生提高他们的英语技能，让学生们愿意不断回来学习更多！
- en: If you're extremely busy or you're simply out of new ideas, Jackie's book makes
    it easy to try out new and exciting activities your students will love!
  id: totrans-884
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你非常忙碌或者你只是缺乏新想法，Jackie的书将使你轻松尝试出学生们会喜欢的新的和令人兴奋的活动！
- en: Buy 129 ESL Games and Activities for Teens to get lesson plans for conversation
    classes ready to go in no time!
  id: totrans-885
  prefs: []
  type: TYPE_NORMAL
  zh: 购买《129个青少年ESL游戏和活动》以快速获得对话课程的教案！
