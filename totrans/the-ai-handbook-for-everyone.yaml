  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Creative Arts: Relates to poetry, storytelling, and other artistic endeavors.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Idea Generation: Involves brainstorming and developing new concepts.'
  prefs:
  - PREF_OL
