  prefs: []
  type: TYPE_NORMAL
  zh: '**为什么这很重要**：'
- en: '****Inter**ruptio**ns ****Req**uir**e ****Reint**roducti**on:  ****I**f** ****y**ou**
    ****rev**isi**t ****a**** ****to**pic** ****o**r** ****ta**sk** ****af**ter**
    ****clo**sin**g ****a**** ****ses**sio**n, ****y**ou**’****l**l** ****ne**ed**
    ****t**o** ****rein**troduc**e ****t**he** ****rel**evan**t ****back**groun**d
    ****o**r** ****det**ail**s.'
  id: totrans-880
  prefs: []
  type: TYPE_NORMAL
  zh: '**中断**需要**重新引入**：如果你在关闭会话后重新访问一个主题或任务，你需要重新引入相关的背景或细节。'
