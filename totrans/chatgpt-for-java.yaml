    is selected under the features that display the Advanced token security via token
    rotation and O Auth Tokens for the Workspace settings.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 3-6
  prefs: []
  type: TYPE_NORMAL
- en: The OAuth & Permission Screen
  prefs: []
  type: TYPE_NORMAL
- en: Installing Your Slack Bot App to Your Workspace
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Now that all the permissions have been requested, it’s time to install your
    bot to your workspace. During the installation process, you should see a screen
    as shown in Figure [3-7](#Fig7).![](../images/607613_1_En_3_Chapter/607613_1_En_3_Fig7_HTML.png)
  prefs: []
  type: TYPE_NORMAL
- en: A screenshot of the Slack window. It reads the following message. Tester Bot
    is requesting permission to access the Apress Book Testing Slack workspace and
    the allow button is selected.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 3-7
  prefs: []
  type: TYPE_NORMAL
- en: “Installing” a New Slack Bot App
  prefs: []
  type: TYPE_NORMAL
- en: Click the **Allow** button to authorize the bot and allow the permissions you
    allotted in the previous step.
  prefs: []
  type: TYPE_NORMAL
- en: Note
  prefs: []
  type: TYPE_NORMAL
- en: It’s important to understand what “installing” means here. In a traditional
    Java sense, installing an app means to load a JAR, WAR, or EAR file into another
    machine and have it to execute. That’s not what’s happening here.
  prefs: []
  type: TYPE_NORMAL
- en: Here, when you “install” a bot app, you’re enabling your Slack workspace to
    allow an app to join the workspace – that’s all. The code for your bot will run
    on your own machine, and not on Slack’s servers.
  prefs: []
  type: TYPE_NORMAL
- en: Getting Your Slack Bot (Access) Token
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: This time, “token,” actually means access token! In order to connect to the
    Slack API and access messages and user information programmatically, you need
    a specific OAuth token generated for your Slack bot.![](../images/607613_1_En_3_Chapter/607613_1_En_3_Fig8_HTML.png)
  prefs: []
  type: TYPE_NORMAL
- en: A screenshot of the Slack a p i interface. The O Auth and permissions option
    is selected under the features that display the Advanced token security via token
    rotation and O Auth Tokens for the Workspace with the Bot user O Auth token copied.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 3-8
  prefs: []
  type: TYPE_NORMAL
- en: Copy Your OAuth Token for Your Slack Bot App
  prefs: []
  type: TYPE_NORMAL
- en: Back on the **OAuth & Permissions** page, be sure to copy the bot token (which
    usually starts with “xoxb-”) from the page here, as shown in Figure [3-8](#Fig8).
  prefs: []
  type: TYPE_NORMAL
- en: Inviting Your Bot to Your Channel
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Next, you’re going to go to the channel you’d like to use to test your bot and
    type in the following command in the channel itself./invite
  prefs: []
  type: TYPE_NORMAL
- en: Select the option “**Add apps to this channel****,**” and then select the name
    of the Slack Bot that you specified earlier when you registered the bot with Slack.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/607613_1_En_3_Chapter/607613_1_En_3_Fig9_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A screenshot of a dropdown that lists the following, Invite someone to this
    channel, Invite someone new to join this workspace, and Add apps to this channel.
    The option Add apps to this channel is selected.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 3-9
  prefs: []
  type: TYPE_NORMAL
- en: Adding Your Slack Bot to a Channel
  prefs: []
  type: TYPE_NORMAL
- en: Congratulations! You now have successfully registered a Slack Bot App with Slack,
    enabled it to read messages in your workspace, and added the Slack Bot to a channel.
    Before we can write the Java code to access the channel in our workspace, we need
    to know what is the internal ID that Slack uses for our channel.
  prefs: []
  type: TYPE_NORMAL
- en: Finding the Channel ID of Your Channel
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Ok, this is an easy step to do. In Slack, right-click the name of your channel
    and select the option “**View** **Channel details****.**” At the bottom of the
    popup window is the ID of your channel. Copy that number and save it for later.
    Your Java app will need this in order to join the right channel in your Slack
    workspace.
  prefs: []
  type: TYPE_NORMAL
- en: Using Your Slack Bot App to Automatically Grab Messages from a Channel
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Alright, now that we have done all the prerequisites and we know the ID of our
    channel, let’s get to the code in Java that accesses all the messages from a particular
    Slack channel.
  prefs: []
  type: TYPE_NORMAL
- en: Setting Up Your Dependencies
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The Slack API library for Java provides convenient methods to interact with
    the Slack platform. Mostly everything that we need comes from the com.slack.api.methods.*
    or the com.slack.api.model.* packages, which exist in the slack-api-client-<VERSION>
    and the slack-api-model-<VERSION> jar files.
  prefs: []
  type: TYPE_NORMAL
- en: The Slack Java API has its own dependencies, which are
  prefs: []
  type: TYPE_NORMAL
