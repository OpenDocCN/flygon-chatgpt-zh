  id: totrans-285
  prefs: []
  type: TYPE_NORMAL
  zh: 在20世纪初，许多故事开始探讨这个非常引人入胜的问题。L. Frank Baum的《奥兹国的巫师》和Thea von Harbou的《大都会》中的机器人是人类能够自我思考的机器的早期例子。另一个早期接受机器最终会变得智能这一想法的人是美国作家和生物化学教授Isaac
    Asimov。Asimov从20世纪40年代初开始撰写关于人工智能崛起的故事，最初在1941年5月发行的《惊异科学小说》杂志上发表了他的短篇小说《骗子！》，后来他将这个故事收录在1950年的作品集《我，机器人》中。这本书被用作2004年同名电影发布的灵感来源，并介绍了机器人三大定律，这是一套由Asimov制定的规则，概述了机器人应该如何在人类社会中运作。这也被认为是第一次使用“机器人”这个词。
