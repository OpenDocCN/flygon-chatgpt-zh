- en: Day 3 – Crafting Effective Prompts for Advanced Use
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 第三天 - 为高级使用制作有效的提示
- en: 'Objective: Learn how to guide complex tasks through structured prompts, context
    chaining, and follow-up refinement.'
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 目标：学习如何通过结构化提示、上下文链接和后续细化来引导复杂任务。
- en: '* * *'
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Why This Matters
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么这很重要
- en: Complex tasks require more than a simple question. Today you’ll practice breaking
    big goals into smaller, clear instructions that ChatGPT can handle step-by-step.
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 复杂任务需要不仅仅是简单的问题。今天你将练习将大目标分解成更小、更清晰的指令，ChatGPT可以逐步处理。
- en: '* * *'
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Step 1: Structuring a Multi-Step Prompt'
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 第1步：构建多步提示
- en: 'Example structure:'
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 示例结构：
- en: 'Role: Define who ChatGPT should act as'
  id: totrans-177
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 角色：定义ChatGPT应扮演的角色
- en: 'Goal: What you want to achieve'
  id: totrans-178
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 目标：你想要实现什么
- en: 'Steps: Outline the process'
  id: totrans-179
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 步骤：概述过程
- en: 'Format: Specify output layout'
  id: totrans-180
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 格式：指定输出布局
- en: “Act as a productivity coach. Help me create a weekly plan by asking questions,
    then summarizing it in a bullet list.”
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: “扮演生产力教练的角色。通过提问帮助我制定每周计划，然后以项目符号列表的形式总结。”
- en: '![](image_rsrcV5.jpg)'
  id: totrans-182
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrcV5.jpg)'
- en: '* * *'
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Step 2: Use Follow-Up Prompts'
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 第2步：使用后续提示
- en: 'ChatGPT remembers context within a single session. You can:'
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT在单个会话中记住上下文。你可以：
- en: Add clarification (“Make it shorter”)
  id: totrans-186
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 添加说明（“让它更简短”）
- en: Request changes (“Add emojis”)
  id: totrans-187
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 请求更改（“添加表情符号”）
- en: Build on outputs (“Now turn this into a table”)
  id: totrans-188
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 建立在输出之上（“现在将其转换为表格”）
- en: Ask “Why did you choose this?” to reveal reasoning
  id: totrans-189
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提问“你为什么选择这个？”以揭示推理
- en: “That’s great! Now rewrite it with a fun tone and emojis.”
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: “那太好了！现在用轻松的语气和表情符号重写它。”
- en: “Can you explain that last point further?”
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: “你能进一步解释最后一个观点吗？”
- en: This iterative approach lets you collaborate with ChatGPT like a real assistant.
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: 这种迭代方法让你可以像与真正的助手一样与ChatGPT协作。
- en: '![](image_rsrcV6.jpg)'
  id: totrans-193
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrcV6.jpg)'
- en: '* * *'
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Step 3: Use Constraints and Examples'
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: 第3步：使用约束和示例
- en: 'Add clear rules or examples to shape responses:'
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
  zh: 添加清晰的规则或示例来塑造回答：
- en: “Keep it under 100 words”
  id: totrans-197
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “保持在一百字以内”
- en: “Use professional tone”
  id: totrans-198
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “使用专业语气”
- en: “Here’s an example – follow this format”
  id: totrans-199
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “这里有一个例子 - 按照这个格式”
- en: “Avoid using passive voice”
  id: totrans-200
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “避免使用被动语态”
- en: “Respond only in bullet points”
  id: totrans-201
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “只以项目符号形式回答”
- en: “Summarize this story like a TED Talk intro. Use suspense, avoid spoilers, be
    under 60 seconds.”
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
  zh: “像TED演讲开场白一样总结这个故事。使用悬念，避免剧透，不超过60秒。”
- en: These signals help ChatGPT align with your expectations.
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: 这些信号有助于ChatGPT与你的期望保持一致。
- en: '* * *'
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Step 4: Using the Memory (If Available)'
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
  zh: 第4步：使用记忆（如果可用）
- en: 'ChatGPT Plus accounts may include memory features:'
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT Plus账户可能包括记忆功能：
- en: It remembers preferences between sessions
  id: totrans-207
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它在会话之间记住偏好
- en: You can ask it to remember your writing style, goals, or tone
  id: totrans-208
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你可以要求它记住你的写作风格、目标或语气
- en: You can also turn memory off for privacy
  id: totrans-209
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你也可以关闭记忆以保护隐私
- en: 'To learn more, check: [https://help.openai.com/en/articles/7730893](https://help.openai.com/en/articles/7730893)'
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: 要了解更多信息，请查看：[https://help.openai.com/en/articles/7730893](https://help.openai.com/en/articles/7730893)
