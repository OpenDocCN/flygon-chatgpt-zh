  zh: 注意。在满足某些条件下，允许将此图解纳入作品。首先，出版商或用户不得对图像提出任何版权主张。其次，以下语言必须用于标记或引用图像。IDEE理论框架使用生成式AI在教育中的修订版。©
    Jiahong Su & Weipeng Yang, 2023。经许可复制。[Su和Yang (2023)](#ch21.xhtml#r596)。解锁ChatGPT的力量：在教育中应用生成式AI的框架。华东师范大学教育评论。
- en: Identify the Desired Outcomes The objective, in this case, is to provide early
    childhood teachers with targeted and timely feedback on their teaching practices
    to improve the quality of early childhood education.
  id: totrans-2329
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 确定期望的结果在这种情况下，目标是向幼儿教师提供针对性和及时的反馈，以改进幼儿教育的质量。
- en: Determine the Appropriate Level of Automation ChatGPT can be used to automatically
    generate feedback based on observations made by the coach during classroom observations.
    This feedback can be customized to the specific needs and challenges of each teacher,
    providing a highly tailored and efficient coaching experience.
  id: totrans-2330
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 确定ChatGPT可应用的自动化程度ChatGPT可以根据教练在课堂观察中做出的观察自动生成反馈。这些反馈可以根据每位教师的具体需求和挑战进行定制，从而提供高度定制化和高效的辅导体验。
- en: Ensure Ethical Considerations It is important to ensure that the feedback generated
    by ChatGPT is free from bias and is based on objective observations. Additionally,
    the use of ChatGPT should not replace the important role of human coaches in providing
    support and guidance to early childhood teachers.
  id: totrans-2331
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 确保伦理考虑确保ChatGPT生成的反馈没有偏见，并且基于客观观察非常重要。此外，ChatGPT的使用不应取代人类教练在为幼儿教师提供支持和指导方面的重要作用。
- en: Evaluate the Effectiveness The effectiveness of using ChatGPT to facilitate
    coaching can be evaluated by analyzing the impact of feedback on the teaching
    practices and outcomes of early childhood teachers. This can be achieved through
    teacher evaluations, feedback surveys, and other assessment tools.
  id: totrans-2332
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 评估有效性使用ChatGPT促进辅导的有效性可以通过分析反馈对幼儿教师的教学实践和结果的影响来评估。这可以通过教师评估、反馈调查和其他评估工具来实现。
- en: To facilitate the coaching of early childhood teachers, ChatGPT can be applied
    in the development of a virtual coach that can provide immediate feedback to teachers
    during classroom observations ([Genc, 2023](#ch21.xhtml#r560)). For example, suppose
    a virtual coach observes that a teacher does not use enough open-ended questions
    to promote critical thinking. In that case, it can provide feedback on the importance
    of using open-ended questions and suggest specific examples that the teacher can
    use in future lessons. This can help early childhood teachers improve their teaching
    practices and ultimately enhance the learning outcomes of young children.
  id: totrans-2333
  prefs: []
  type: TYPE_NORMAL
  zh: 为了便于对幼儿教师的辅导，ChatGPT可以应用于开发一个虚拟教练，该教练可以在课堂观察期间为教师提供即时反馈（[Genc, 2023](#ch21.xhtml#r560)）。例如，假设一个虚拟教练观察到教师没有使用足够的开放式问题来促进批判性思维。在这种情况下，它可以提供关于使用开放式问题重要性的反馈，并提出教师可以在未来课程中使用的具体例子。这可以帮助幼儿教师改进他们的教学实践，并最终提高幼儿的学习成果。
- en: 'With the release of ChatGPT in late 2022, many of the obstacles preventing
    the general public from using this technology were removed, significantly simplifying
    the way that humans can communicate with LLMs (see [Figure 13.2](#ch21.xhtml#f39)).
    We were able to use ChatGPT to streamline our workflow from OpenAI’s GPT Playground
    and accomplish the following activities with it: Level and summarize literature
    for students. Automatically fix errors in syntax and sentence structure. Write
    prompts for narrative writing. Make notes for your presentations. Provide lesson
    plans and texts at each reading level for assessments or practice. But first,
    we need to have a clear understanding of what AI is, what LLMs are, and how they
    work before we can explain how AI achieved this and offer specifics on how teachers
    might use these features.'
  id: totrans-2334
  prefs: []
  type: TYPE_NORMAL
  zh: 随着2022年底ChatGPT的发布，许多阻碍公众使用这项技术的障碍被消除，大大简化了人类与LLMs（大型语言模型）沟通的方式（见图13.2）。我们能够使用ChatGPT来简化从OpenAI的GPT游乐场的工作流程，并利用它完成以下活动：为学生分级和总结文献。自动修复语法和句子结构错误。为叙事写作编写提示。为您的演示文稿做笔记。为每个阅读水平提供评估或练习的教案和文本。但首先，我们需要对AI是什么、LLMs是什么以及它们是如何工作的有一个清晰的理解，然后我们才能解释AI是如何实现这一点的，并具体说明教师可能如何使用这些功能。
- en: '![A screenshot of the Chat G P T 3.5 interface with the text How can I help
    you today? Displayed in the center. Below are options, compare storytelling techniques,
    brainstorm names, create a charter, and suggest some names. At the bottom, the
    message input box and user interface elements like the Windows taskbar are visible.](html/images/9781032716084_C013_002.jpg)'
  id: totrans-2335
  prefs: []
  type: TYPE_IMG
  zh: '![ChatGPT 3.5界面的截图，中间显示文本“今天我能帮您做什么？”下方有选项，比较叙事技巧、头脑风暴名称、创建章程和提出一些名称。底部可见消息输入框和用户界面元素，如Windows任务栏。](html/images/9781032716084_C013_002.jpg)'
- en: '[Figure 13.2](#ch21.xhtml#f39b) OpenAI’s ChatGPT interface.'
  id: totrans-2336
  prefs: []
  type: TYPE_NORMAL
  zh: '[图13.2](#ch21.xhtml#f39b) OpenAI的ChatGPT界面。'
- en: AI refers to the development of computer systems that can perform tasks that
    typically require human intelligence, such as learning, reasoning, and decision-making
    ([Trunk et al., 2020](#ch21.xhtml#r599)). LLMs, or large language models, are
    a type of AI that are specifically designed to understand and generate human-like
    text ([Meyer et al., 2023](#ch21.xhtml#r581)). LLMs are trained on vast amounts
    of text data, such as books, articles, and social media posts, to learn the patterns
    and relationships between words and phrases ([Chen et al., 2023](#ch21.xhtml#r553)).
    They can then generate new text that is coherent, relevant, and grammatically
    correct.
  id: totrans-2337
  prefs: []
  type: TYPE_NORMAL
  zh: AI指的是开发能够执行通常需要人类智能的任务的计算机系统，例如学习、推理和决策（[Trunk等，2020](#ch21.xhtml#r599)）。LLMs，或大型语言模型，是一种专门设计来理解和生成类似人类文本的AI（[Meyer等，2023](#ch21.xhtml#r581)）。LLMs在大量文本数据上训练，如书籍、文章和社交媒体帖子，以学习单词和短语之间的模式和关系（[Chen等，2023](#ch21.xhtml#r553)）。然后它们可以生成新的文本，这些文本是连贯的、相关的且语法正确的。
- en: 'ChatGPT, in particular, is an LLM developed by DeepAI that is accessible to
    the general public through a user-friendly interface ([Rane et al., 2023](#ch21.xhtml#r587)).
    It can perform a variety of tasks, such as answering questions, summarizing text,
    and generating new text based on a prompt. Teachers can use these features to
    streamline their workflow and enhance their teaching practices in several ways
    ([Ringuette et al., 2023](#ch21.xhtml#r588)). For example: (1) Level and summarize
    the literature: ChatGPT can help teachers level and summarize the literature for
    students by providing a brief overview of the main ideas and themes of a text
    ([Imran & Almusharraf, 2023](#ch21.xhtml#r564)). This can be especially helpful
    for students who are struggling with comprehension or who need additional support.
    (2) Automatically fix errors in syntax and sentence structure: ChatGPT can also
    help students improve their writing skills by automatically fixing errors in syntax
    and sentence structure ([Hassani & Silva, 2023](#ch21.xhtml#r562)). This can be
    a valuable tool for students who are still learning the rules of grammar and punctuation.
    (3) Write prompts for narrative writing: Teachers can use ChatGPT to generate
    prompts for narrative writing, which can help students develop their creative
    writing skills ([Fitria, 2017](#ch21.xhtml#r558)). These prompts can be tailored
    to specific reading levels and learning objectives. (4) Provide lesson plans and
    texts at each reading level for assessments or practice: ChatGPT can also help
    teachers provide lesson plans and texts at each reading level for assessments
    or practice ([Javaid et al., 2023](#ch21.xhtml#r568)). This can be a valuable
    resource for teachers who are working with students at different levels of proficiency.'
  id: totrans-2338
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT，特别是，是由DeepAI开发的一个面向公众的LLM，用户可以通过一个用户友好的界面访问它([Rane等人，2023](#ch21.xhtml#r587))。它能够执行各种任务，例如回答问题、总结文本，以及根据提示生成新的文本。教师可以利用这些功能以多种方式简化他们的工作流程并增强他们的教学实践([Ringuette等人，2023](#ch21.xhtml#r588))。例如：(1)
    等级和总结文献：ChatGPT可以通过提供文本的主要思想和主题的简要概述来帮助教师为学生等级和总结文献([Imran和Almusharraf，2023](#ch21.xhtml#r564))。这对那些在理解上遇到困难或需要额外支持的学生特别有帮助。(2)
    自动修复语法和句子结构错误：ChatGPT还可以通过自动修复语法和句子结构错误来帮助学生提高写作技能([Hassani和Silva，2023](#ch21.xhtml#r562))。这对仍在学习语法和标点规则的学生来说是一个宝贵的工具。(3)
    为叙事写作编写提示：教师可以使用ChatGPT生成叙事写作的提示，这有助于学生发展他们的创意写作技能([Fitria，2017](#ch21.xhtml#r558))。这些提示可以根据特定的阅读水平和学习目标进行定制。(4)
    为每个阅读水平提供评估或练习的教案和文本：ChatGPT还可以帮助教师为每个阅读水平提供教案和文本，用于评估或练习([Javaid等人，2023](#ch21.xhtml#r568))。这对与不同水平熟练度的学生一起工作的教师来说是一个宝贵的资源。
- en: Overall, the use of AI and LLMs in education has the potential to revolutionize
    the way that students learn and teachers teach. By providing additional support
    and resources, AI can help students develop their skills and achieve their full
    potential. However, teachers need to use these tools responsibly and thoughtfully
    to ensure that they are not replacing human teachers but rather enhancing their
    work.
  id: totrans-2339
  prefs: []
  type: TYPE_NORMAL
  zh: 总体而言，AI和LLM在教育中的应用有可能彻底改变学生学习和教师教学的方式。通过提供额外的支持和资源，AI可以帮助学生发展他们的技能并实现他们的全部潜力。然而，教师需要负责任和深思熟虑地使用这些工具，以确保它们不是取代人类教师，而是增强他们的工作。
- en: 13.1.2 Methodology
  id: totrans-2340
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 13.1.2 方法论
- en: The revolutionary potential of ChatGPT to revolutionize education through active
    learning models is examined in this chapter. Amid the digital revolution, critical
    thinking and student involvement are prioritized through active learning. ChatGPT
    proves to be a potent instrument that encourages students to go deeper and poses
    open-ended inquiries. By going beyond passive learning, this interactive technique
    creates a lively and dynamic learning environment. Instructors become more than
    just informational resources; they become mentors and guides who foster the development
    of their students. This change gives students more authority, and they start participating
    actively in class by having debates, working together, and taking on challenges
    head-on. The comparative analysis gives a comprehensive insight into the current
    state of the incorporation of ChatGPT and opens the door to a paradigm shift in
    which student interaction is prioritized. This novel approach goes beyond simple
    information collecting. It gives pupils essential 21st-century abilities, including
    autonomous learning, teamwork, and critical thinking. With ChatGPT at their disposal,
    educators can establish a classroom that is lively, engaged and focused on critical
    skills. This chapter essentially promotes ChatGPT as a game-changer that sparks
    student engagement and advances education toward a more promising and empowered
    future.
  id: totrans-2341
  prefs: []
  type: TYPE_NORMAL
  zh: 本章探讨了ChatGPT通过主动学习模型革命性地改变教育的潜力。在数字革命中，通过主动学习，批判性思维和学生参与度被优先考虑。ChatGPT证明是一种强大的工具，鼓励学生深入探究并提出开放式问题。通过超越被动学习，这种互动技术创造了一个生动活泼、动态的学习环境。教师不再仅仅是信息资源，他们成为导师和指导者，促进学生的成长。这种变化赋予了学生更多的自主权，他们开始通过辩论、合作和直面挑战来积极参与课堂。比较分析全面洞察了ChatGPT的融合现状，并为优先考虑学生互动的范式转变打开了大门。这种新颖的方法超越了简单的信息收集。它为学生提供了必要的21世纪能力，包括自主学习、团队合作和批判性思维。有了ChatGPT的帮助，教育者可以建立一个充满活力、专注且注重关键技能的课堂。本章本质上将ChatGPT推广为一个颠覆性的变革者，激发学生的参与度，推动教育走向一个更加光明和赋权的未来。
- en: 13.1.3 Chapter organization
  id: totrans-2342
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 13.1.3 章节组织
- en: 'The rest of this chapter is organized as follows: [Section 13.2](#ch21.xhtml#h1-080)
    presents a review of The Role of ChatGPT in Active Learning. [Section 13.3](#ch21.xhtml#h1-081)
    discusses Increasing Engagement through Interaction, while [Section 13.4](#ch21.xhtml#h1-082)
    describes the Impact on Collaborative Learning. [Section 13.5](#ch21.xhtml#h1-083)
    explains Learn the Capabilities and Limitations of ChatGPT. [Section 13.6](#ch21.xhtml#h1-084)
    highlights The Effect of Technology on the Teacher’s Role and Learning Approaches
    That Are Tailored to the Individual Needs of Students. [Section 13.7](#ch21.xhtml#h1-085)
    concludes the chapter.'
  id: totrans-2343
  prefs: []
  type: TYPE_NORMAL
  zh: 本章的其余部分组织如下：[第13.2节](#ch21.xhtml#h1-080)回顾了ChatGPT在主动学习中的作用。[第13.3节](#ch21.xhtml#h1-081)讨论了通过互动提高参与度，而[第13.4节](#ch21.xhtml#h1-082)描述了协作学习的影响。[第13.5节](#ch21.xhtml#h1-083)解释了学习ChatGPT的能力和局限性。[第13.6节](#ch21.xhtml#h1-084)强调了技术对教师角色和学习方法的影响，以及针对学生个体需求量身定制的学习方法。[第13.7节](#ch21.xhtml#h1-085)总结了本章内容。
- en: 13.2 The Role of ChatGPT in Active Learning
  id: totrans-2344
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 13.2 ChatGPT在主动学习中的作用
- en: Understanding how ChatGPT technology can be integrated as a tool to stimulate
    student participation in active learning activities. Active learning is a learning
    approach that involves students actively in the learning process ([Khan, 2015](#ch21.xhtml#r573)).
    It focuses on developing students’ critical thinking, problem-solving, and communication
    skills.
  id: totrans-2345
  prefs: []
  type: TYPE_NORMAL
  zh: 理解ChatGPT技术如何作为工具融入，以激发学生在主动学习活动中的参与度。主动学习是一种让学生积极参与学习过程的学习方法（[汗，2015](#ch21.xhtml#r573)）。它侧重于培养学生的批判性思维、解决问题的能力和沟通技巧。
- en: 'ChatGPT is a large language model trained on a very large dataset of text and
    code ([Maddigan & Susnjak, 2023](#ch21.xhtml#r579)). ChatGPT can be used for a
    variety of tasks, including generating text, translating language, writing different
    types of creative content, and answering questions ([Kalla & Smith, 2023](#ch21.xhtml#r571)).
    ChatGPT can be integrated as a tool to stimulate student participation in active
    learning activities in a variety of ways ([Bruneau et al., 2023](#ch21.xhtml#r551)).
    Here are some examples:'
  id: totrans-2346
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT是一个在非常大的文本和代码数据集上训练的大型语言模型 ([Maddigan & Susnjak，2023](#ch21.xhtml#r579))。ChatGPT可用于各种任务，包括生成文本、翻译语言、创作不同类型的创意内容以及回答问题
    ([Kalla & Smith，2023](#ch21.xhtml#r571))。ChatGPT可以通过多种方式集成作为工具，以激发学生在主动学习活动中的参与
    ([Bruneau等，2023](#ch21.xhtml#r551))。以下是一些示例：
- en: ChatGPT can be used to provide feedback and support to students. ChatGPT can
    be used to answer student questions, provide feedback on student work, and help
    students solve problems. This can help students feel more confident and motivated
    to learn.
  id: totrans-2347
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: ChatGPT可以用来为学生提供反馈和支持。ChatGPT可以用来回答学生的问题，对学生的作业提供反馈，并帮助学生解决问题。这可以帮助学生更有信心和动力去学习。
- en: ChatGPT can be used to create a more personalized learning experience. ChatGPT
    can be used to tailor learning to the needs and interests of individual students.
    This can help students feel more engaged and motivated to learn.
  id: totrans-2348
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: ChatGPT可以用来创建更个性化的学习体验。ChatGPT可以用来根据个别学生的需求和兴趣定制学习。这可以帮助学生感到更加投入和有动力去学习。
- en: ChatGPT can be used to facilitate collaborative learning. It can be used to
    connect students from different backgrounds and experiences. This can help students
    learn from each other and develop cooperation skills.
  id: totrans-2349
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: ChatGPT可以用于促进协作学习。它可以用来连接来自不同背景和经验的学生。这有助于学生相互学习并发展合作技能。
- en: Here are some specific examples of how ChatGPT can be used to stimulate student
    participation in active learning.
  id: totrans-2350
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一些具体示例，说明ChatGPT如何用于激发学生在主动学习中的参与。
- en: Table 13.1 Specific examples of how ChatGPT can be used to stimulate student
    participation in active learning
  id: totrans-2351
  prefs: []
  type: TYPE_NORMAL
  zh: 表13.1 ChatGPT如何用于激发学生在主动学习中的参与的具体示例
- en: '| **Thelesson** | **Benefits** |'
  id: totrans-2352
  prefs: []
  type: TYPE_TB
  zh: '| **课程** | **好处** |'
- en: '| --- | --- |'
  id: totrans-2353
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- |'
- en: '| In history lessons | ChatGPT can be used to create interactive quizzes or
    games that encourage students to think critically and solve problems. |'
  id: totrans-2354
  prefs: []
  type: TYPE_TB
  zh: '| 在历史课上 | ChatGPT可以用来创建互动测验或游戏，鼓励学生批判性思考和解决问题。|'
- en: '| In a language lesson | ChatGPT can be used to provide feedback on students’
    writing assignments or help students learn new vocabulary. |'
  id: totrans-2355
  prefs: []
  type: TYPE_TB
  zh: '| 在语言课上 | ChatGPT可以用来对学生的写作作业提供反馈或帮助学生学习新词汇。|'
- en: '| In science lessons | ChatGPT can be used to provide virtual simulations or
    experiments that allow students to explore science concepts. |'
  id: totrans-2356
  prefs: []
  type: TYPE_TB
  zh: '| 在科学课上 | ChatGPT可以用来提供虚拟模拟或实验，让学生探索科学概念。|'
- en: '| Interactive dialog on Islamic teachings | Teachers can develop interactive
    dialog scenarios with ChatGPT to provide an in-depth understanding of Islamic
    teachings. Students can interact with the model to get explanations of religious
    concepts, ethics, and worship practices. |'
  id: totrans-2357
  prefs: []
  type: TYPE_TB
  zh: '| 关于伊斯兰教义的互动对话 | 教师可以使用ChatGPT开发互动对话场景，以提供对伊斯兰教义的深入理解。学生可以与模型互动，获取宗教概念、伦理和礼拜实践的解释。|'
- en: '| ChatGPT-based project assignment | Provide a project assignment where students
    have to design a learning session using ChatGPT as the main resource. They can
    create questions, dialog scenarios, or other educational materials to teach Islamic
    concepts to classmates. |'
  id: totrans-2358
  prefs: []
  type: TYPE_TB
  zh: '| 基于ChatGPT的项目作业 | 提供一个项目作业，要求学生设计一个使用ChatGPT作为主要资源的课程。他们可以创建问题、对话场景或其他教育材料，向同学传授伊斯兰概念。|'
- en: Source: Shihab et al. (2023).
  id: totrans-2359
  prefs: []
  type: TYPE_NORMAL
  zh: 来源：Shihab等（2023）。
- en: 'Of course, the use of ChatGPT in active learning should be directed by educators
    and organized in such a way that it can enrich the learning process without replacing
    the social interaction and active participation of students ([Liu et al., 2023](#ch21.xhtml#r578)).
    Here are some things that educators need to consider in using ChatGPT in active
    learning:'
  id: totrans-2360
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，ChatGPT在主动学习中的使用应由教育者指导，并组织得使其能够丰富学习过程，而不取代学生的社会互动和积极参与 ([刘等，2023](#ch21.xhtml#r578))。以下是教育者在使用ChatGPT进行主动学习时需要考虑的一些事项：
- en: Educators must understand the capabilities and limitations of ChatGPT. ChatGPT
    is not a substitute for educators, and educators must remain in the role of learning
    leaders.
  id: totrans-2361
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 教育者必须了解ChatGPT的能力和局限性。ChatGPT不能替代教育者，教育者必须继续扮演学习领导者的角色。
- en: Educators must design learning activities that are appropriate to the learning
    objectives and student needs. ChatGPT can be used to support learning activities
    but cannot replace the learning activities themselves.
  id: totrans-2362
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 教育者必须设计适合学习目标和学生学习需求的学习活动。ChatGPT可以支持学习活动，但不能取代学习活动本身。
- en: Educators should monitor student use of ChatGPT. Educators should ensure that
    ChatGPT is used ethically and for learning purposes.
  id: totrans-2363
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 教育者应监控学生对ChatGPT的使用。教育者应确保ChatGPT被道德地用于学习目的。
- en: Overall, ChatGPT has the potential to be a powerful tool to stimulate student
    participation in active learning ([Limna et al., 2023](#ch21.xhtml#r577)). However,
    educators must use ChatGPT wisely and responsibly to provide maximum benefit to
    students.
  id: totrans-2364
  prefs: []
  type: TYPE_NORMAL
  zh: 总体而言，ChatGPT有潜力成为激发学生参与主动学习的强大工具（[Limna 等人，2023](#ch21.xhtml#r577)）。然而，教育者必须明智和负责任地使用ChatGPT，以最大限度地为学生提供益处。
- en: 13.3 Increasing Engagement through Interaction
  id: totrans-2365
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 13.3 通过互动增加参与度
- en: It explains how ChatGPT can be used to create immersive interactive experiences,
    such as dynamic discussions and role simulations, thus increasing student engagement.
    Interaction is one of the keys to improving student engagement in learning. Interaction
    can encourage students to think critically, solve problems, and communicate effectively
    ([Badruzaman & Adiyono, 2023](#ch21.xhtml#r546)). ChatGPT is a large language
    model that can create immersive interactive experiences, such as dynamic discussions
    and role simulations ([Ye et al., 2023](#ch21.xhtml#r603)).
  id: totrans-2366
  prefs: []
  type: TYPE_NORMAL
  zh: 它解释了如何使用ChatGPT创建沉浸式交互体验，例如动态讨论和角色模拟，从而增加学生的参与度。互动是提高学生学习参与度的一个关键因素。互动可以鼓励学生进行批判性思考，解决问题，并有效沟通（[Badruzaman
    和 Adiyono，2023](#ch21.xhtml#r546)）。ChatGPT是一个大型语言模型，可以创建沉浸式交互体验，例如动态讨论和角色模拟（[Ye
    等人，2023](#ch21.xhtml#r603)）。
- en: 'Dynamic discussion is a type of discussion that actively engages students in
    brainstorming and building on each other’s ideas ([Gan et al., 2015](#ch21.xhtml#r559)).
    ChatGPT can be used to create dynamic discussions in the following ways:'
  id: totrans-2367
  prefs: []
  type: TYPE_NORMAL
  zh: 动态讨论是一种积极参与学生头脑风暴和相互构建想法的讨论方式（[Gan 等人，2015](#ch21.xhtml#r559)）。ChatGPT可以通过以下方式创建动态讨论：
- en: ChatGPT can be used to provide feedback and support to students. ChatGPT can
    be used to answer students’ questions, provide feedback on students’ ideas, and
    help students solve problems. This can help students feel more confident and motivated
    to participate in discussions.
  id: totrans-2368
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: ChatGPT可以用于为学生提供反馈和支持。ChatGPT可以用于回答学生的问题，对学生的想法提供反馈，并帮助学生解决问题。这可以帮助学生更有信心和动力参与讨论。
- en: ChatGPT can be used to facilitate fair and inclusive discussions. ChatGPT can
    be used to ensure that all students have the opportunity to participate in discussions,
    regardless of their background or experience.
  id: totrans-2369
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: ChatGPT可以用于促进公平和包容的讨论。ChatGPT可以确保所有学生都有机会参与讨论，无论他们的背景或经验如何。
- en: ChatGPT can be used to encourage creative and innovative discussions. ChatGPT
    can be used to ask open-ended questions, encourage students to think outside the
    box, and generate new ideas.
  id: totrans-2370
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: ChatGPT可以用于鼓励创造性和创新性的讨论。ChatGPT可以用于提出开放式问题，鼓励学生跳出思维定式，并产生新想法。
- en: Role simulation is a type of active learning that involves students in role-playing
    to learn a particular concept or skill ([Effendi & Wahidy, 2019](#ch21.xhtml#r556)).
    [Figure 13.3](#ch21.xhtml#f40) presents how can ChatGPT be used to create role
    simulations.
  id: totrans-2371
  prefs: []
  type: TYPE_NORMAL
  zh: 角色模拟是一种涉及学生角色扮演的主动学习方法，通过这种方式学习特定的概念或技能（[Effendi 和 Wahidy，2019](#ch21.xhtml#r556)）。[图13.3](#ch21.xhtml#f40)展示了ChatGPT如何用于创建角色模拟。
- en: '![A flow diagram titled Chat G P T in active learning role simulation runs
    as follows. Realistic virtual world, create complex and interesting characters,
    provide feedback and support to students, social skills, and role simulation to
    learn about science. Each step includes a detailed description.](html/images/9781032716084_C013_003.jpg)'
  id: totrans-2372
  prefs: []
  type: TYPE_IMG
  zh: '![一个名为“Chat GPT在主动学习角色模拟中的流程图”的流程图如下。创建逼真的虚拟世界，创建复杂有趣的角色，为学生提供反馈和支持，培养社交技能，并通过角色模拟学习科学。每个步骤都包含详细描述。](html/images/9781032716084_C013_003.jpg)'
- en: '[Figure 13.3](#ch21.xhtml#f40b) ChatGPT can be used to create role simulations.'
  id: totrans-2373
  prefs: []
  type: TYPE_NORMAL
  zh: '[图13.3](#ch21.xhtml#f40b) ChatGPT可以用于创建角色模拟。'
- en: Here are some examples of how ChatGPT can be used to create immersive interactive
    experiences.
  id: totrans-2374
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一些 ChatGPT 用于创建沉浸式互动体验的示例。
- en: Table 13.2 Specific examples of how ChatGPT can be used to stimulate student
    participation in active learning
  id: totrans-2375
  prefs: []
  type: TYPE_NORMAL
  zh: 表 13.2 ChatGPT 用于激发学生参与主动学习的具体示例
- en: '| **Thelesson** | **Benefits** |'
  id: totrans-2376
  prefs: []
  type: TYPE_TB
  zh: '| **课程** | **益处** |'
- en: '| --- | --- |'
  id: totrans-2377
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- |'
- en: '| In history lessons | ChatGPT can be used to create dynamic discussions about
    important historical events. For example, ChatGPT can be used to facilitate discussions
    about the American Revolution or World War II. |'
  id: totrans-2378
  prefs: []
  type: TYPE_TB
  zh: '| 历史课程 | ChatGPT 可以用来创建关于重要历史事件的动态讨论。例如，ChatGPT 可以用来促进关于美国革命或第二次世界大战的讨论。 |'
- en: '| In a language lesson | ChatGPT can be used to create role simulations where
    students take on the roles of characters in novels or short stories. For example,
    ChatGPT can be used to create role simulations where students take on the roles
    of characters in F. Scott Fitzgerald’s “The Great Gatsby.” |'
  id: totrans-2379
  prefs: []
  type: TYPE_TB
  zh: '| 语言课程 | ChatGPT 可以用来创建角色模拟，让学生扮演小说或短故事中的角色。例如，ChatGPT 可以用来创建角色模拟，让学生扮演 F.
    Scott Fitzgerald 的《了不起的盖茨比》中的角色。 |'
- en: '| In science lessons | ChatGPT can be used to create role simulations where
    students take on the role of scientists conducting experiments. For example, ChatGPT
    can be used to create a role simulation where students play the role of a scientist
    developing a new vaccine. |'
  id: totrans-2380
  prefs: []
  type: TYPE_TB
  zh: '| 科学课程 | ChatGPT 可以用来创建角色模拟，让学生扮演进行实验的科学家。例如，ChatGPT 可以用来创建一个角色模拟，让学生扮演开发新疫苗的科学家。
    |'
- en: '| Prayer and worship training | ChatGPT can be used as a guide to assist students
    in learning the procedures of prayer, dhikr, and other acts of worship. Students
    can practice virtually with the guidance of ChatGPT to ensure that they understand
    and perform the worship correctly. |'
  id: totrans-2381
  prefs: []
  type: TYPE_TB
  zh: '| 祈祷和礼拜训练 | ChatGPT 可以用作指南，帮助学生学习祈祷、念诵和其他礼拜仪式的程序。学生在 ChatGPT 的指导下进行虚拟练习，以确保他们正确理解和执行礼拜仪式。
    |'
- en: '| Research project on religious perspectives | Using ChatGPT as a resource
    for student research projects on different perspectives in Islam. Students can
    frame questions, analyze answers from ChatGPT, and compare them to the views of
    scholars or other sources. |'
  id: totrans-2382
  prefs: []
  type: TYPE_TB
  zh: '| 研究项目：宗教视角 | 将 ChatGPT 作为资源，用于学生研究伊斯兰教不同视角的项目。学生可以构建问题，分析 ChatGPT 的答案，并将它们与学者的观点或其他来源进行比较。
    |'
- en: Sources: Annuš (2023); Adiyono et al. (2022).
  id: totrans-2383
  prefs: []
  type: TYPE_NORMAL
  zh: 来源：Annuš (2023); Adiyono 等人 (2022)。
- en: ChatGPT has the potential to be a powerful tool to increase student engagement
    in active learning ([Adarkwah et al., 2023](#ch21.xhtml#r538)). ChatGPT can be
    used to create immersive interactive experiences, such as dynamic discussions
    and role simulations ([Junior et al., 2023](#ch21.xhtml#r570)). These immersive
    interactions can encourage students to think critically, solve problems, and communicate
    effectively.
  id: totrans-2384
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT 有潜力成为提高学生参与主动学习的强大工具 ([Adarkwah 等人，2023](#ch21.xhtml#r538))。ChatGPT
    可以用来创建沉浸式互动体验，如动态讨论和角色模拟 ([Junior 等人，2023](#ch21.xhtml#r570))。这些沉浸式互动可以鼓励学生进行批判性思考、解决问题和有效沟通。
- en: ChatGPT can be used to create immersive interactive experiences in several ways
    that can increase student engagement.
  id: totrans-2385
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT 可以通过多种方式创建沉浸式互动体验，从而提高学生的参与度。
- en: 13.3.1 Dynamic discussions
  id: totrans-2386
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 13.3.1 动态讨论
- en: ChatGPT can facilitate dynamic discussions by responding to student’s questions
    and comments in real time ([Wu et al., 2023](#ch21.xhtml#r602)). This can help
    students feel more engaged in the conversation and encourage them to participate
    actively. For example, a teacher can use ChatGPT to lead a discussion on a current
    event, with ChatGPT providing additional information and perspectives as needed.
    During a dynamic discussion facilitated by ChatGPT, students can ask questions
    or make comments, and ChatGPT will respond in real time, providing additional
    information, perspectives, or insights. This can help students feel more engaged
    in the conversation, as they can interact with the material more dynamically and
    interactively. For example, a teacher might use ChatGPT to lead a discussion on
    a current event, such as a political crisis or a natural disaster. Students can
    ask ChatGPT questions about the event, such as “What caused the crisis?” or “What
    are some potential solutions to this problem?” ChatGPT can then provide additional
    information and perspectives, such as historical context or expert opinions, to
    help students better understand the issue at hand.
  id: totrans-2387
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT可以通过实时回应学生的提问和评论来促进动态讨论([Wu et al., 2023](#ch21.xhtml#r602))。这有助于学生更加投入到对话中，并鼓励他们积极参与。例如，教师可以使用ChatGPT来引导关于当前事件的讨论，ChatGPT在需要时提供额外信息和观点。在ChatGPT促进的动态讨论中，学生可以提问或发表评论，ChatGPT将实时回应，提供额外信息、观点或洞察。这有助于学生更加投入到对话中，因为他们可以更加动态和互动地与材料互动。例如，教师可能会使用ChatGPT来引导关于当前事件的讨论，如政治危机或自然灾害。学生可以向ChatGPT提出关于事件的问题，例如“是什么导致了这场危机？”或“有哪些可能的解决方案？”然后ChatGPT可以提供额外信息和观点，如历史背景或专家意见，帮助学生更好地理解当前的问题。
- en: This can also help students develop critical thinking skills, as they are able
    to engage in a more in-depth discussion about the event rather than simply listening
    to a lecture or reading a textbook. By encouraging students to ask questions and
    participate actively in the discussion, ChatGPT can help them develop a deeper
    understanding of the material and better retain the information ([Badruzaman &
    Adiyono, 2023](#ch21.xhtml#r546)). Overall, the use of ChatGPT to facilitate dynamic
    discussions can help students feel more engaged in the learning process and develop
    critical thinking skills, making it a valuable tool for teachers looking to enhance
    their teaching practices.
  id: totrans-2388
  prefs: []
  type: TYPE_NORMAL
  zh: 这也有助于学生培养批判性思维技能，因为他们能够更深入地讨论事件，而不仅仅是听讲座或阅读教科书。通过鼓励学生提问和积极参与讨论，ChatGPT可以帮助他们更深入地理解材料并更好地保留信息([Badruzaman
    & Adiyono, 2023](#ch21.xhtml#r546))。总的来说，使用ChatGPT促进动态讨论可以帮助学生更加投入到学习过程中，并培养批判性思维技能，对于希望提升教学实践的教师来说，这是一个有价值的工具。
- en: 13.3.2 Role simulations
  id: totrans-2389
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 13.3.2 角色模拟
- en: ChatGPT can also be used to create role simulations that allow students to take
    on different perspectives and roles to understand complex issues or concepts ([Keshtkar
    et al., 2023](#ch21.xhtml#r572)). For example, students could take on the roles
    of different characters in a historical event or scientific experiment to better
    understand the underlying principles at work ([Karimi et al., 2023](#ch21.xhtml#r572)).
    Using ChatGPT to create role simulations can be a powerful tool for educators
    to engage students in a more interactive and immersive learning experience ([Junior
    et al., 2023](#ch21.xhtml#r570)). By taking on different perspectives and roles,
    students can gain a deeper understanding of complex issues or concepts, as well
    as develop empathy and critical thinking skills. For example, teachers can use
    ChatGPT to set up a scenario where students take on the roles of historical figures
    in a significant event, such as the signing of the Declaration of Independence
    or the French Revolution. By immersing themselves in the roles of these figures,
    students can gain a better understanding of the motivations, challenges, and decisions
    that shaped the course of history.
  id: totrans-2390
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT还可以用于创建角色模拟，使学生能够扮演不同的视角和角色，以理解复杂的问题或概念([Keshtkar et al., 2023](#ch21.xhtml#r572))。例如，学生可以扮演历史事件或科学实验中的不同角色，以更好地理解起作用的潜在原理([Karimi
    et al., 2023](#ch21.xhtml#r572))。使用ChatGPT创建角色模拟可以成为教育者吸引学生参与更互动和沉浸式学习体验的有力工具([Junior
    et al., 2023](#ch21.xhtml#r570))。通过扮演不同的视角和角色，学生可以更深入地理解复杂的问题或概念，以及培养同理心和批判性思维技能。例如，教师可以使用ChatGPT设置一个场景，让学生扮演重大事件中的历史人物角色，如独立宣言的签署或法国大革命。通过沉浸在这些人物的角色中，学生可以更好地理解塑造历史进程的动机、挑战和决策。
- en: Similarly, in a scientific context, students could use ChatGPT to simulate a
    scientific experiment by taking on the roles of different scientists or research
    team members ([Cooper, 2023](#ch21.xhtml#r555)). This hands-on approach allows
    students to explore the scientific process, hypothesis testing, and data analysis
    more interactively and engagingly. By incorporating role simulations using ChatGPT,
    educators can create a dynamic and interactive learning environment that encourages
    students to think critically, problem-solve, and collaborate effectively ([Mahindru
    et al., 2024](#ch21.xhtml#r580)). This immersive approach can help students connect
    with the material on a deeper level and retain information more effectively. Overall,
    the use of ChatGPT for role simulations offers a creative and engaging way for
    students to explore complex topics and develop a deeper understanding of the subject
    matter, making it a valuable tool for educators seeking to enhance student learning
    outcomes.
  id: totrans-2391
  prefs: []
  type: TYPE_NORMAL
  zh: 类似地，在科学背景下，学生可以利用ChatGPT模拟科学实验，扮演不同科学家或研究团队成员的角色([Cooper, 2023](#ch21.xhtml#r555))。这种动手方法使学生能够更互动和有趣地探索科学过程、假设检验和数据分析。通过结合使用ChatGPT的角色模拟，教育者可以创建一个动态和互动的学习环境，鼓励学生批判性思考、解决问题和有效协作([Mahindru
    et al., 2024](#ch21.xhtml#r580))。这种沉浸式方法可以帮助学生更深入地与材料建立联系，并更有效地保留信息。总的来说，ChatGPT在角色模拟中的应用为学生探索复杂主题和深化对主题的理解提供了创造性和吸引人的方式，对于寻求提高学生学习成果的教育者来说是一个宝贵的工具。
- en: 13.3.3 Collaborative learning
  id: totrans-2392
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 13.3.3 协作学习
- en: ChatGPT can also facilitate collaborative learning by allowing students to work
    together in small groups to solve problems or complete tasks. For example, students
    could use ChatGPT to collaborate on a group project, with ChatGPT providing additional
    resources and feedback as needed ([Alshahrani, 2023](#ch21.xhtml#r544)). ChatGPT
    can be a powerful tool for facilitating collaborative learning, particularly for
    students who are working together remotely due to distance learning or other circumstances.
    By allowing students to work together in small groups to solve problems or complete
    tasks, ChatGPT can help foster a sense of community and collaboration, which is
    essential for effective learning.
  id: totrans-2393
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT还可以通过允许学生在小组中共同解决问题或完成任务来促进协作学习。例如，学生可以使用ChatGPT来合作完成一个小组项目，ChatGPT在需要时提供额外资源和反馈([Alshahrani,
    2023](#ch21.xhtml#r544))。ChatGPT是促进协作学习的强大工具，尤其是对于因远程学习或其他情况而远程合作的学生。通过允许学生在小组中共同解决问题或完成任务，ChatGPT可以帮助培养社区感和协作精神，这对于有效学习至关重要。
- en: For example, teachers can use ChatGPT to facilitate group projects, where students
    work together to research and present on a particular topic. ChatGPT can provide
    additional resources and feedback as needed, helping students stay on track and
    complete the project successfully. This collaborative approach allows students
    to learn from each other, share ideas, and develop a deeper understanding of the
    subject matter.
  id: totrans-2394
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，教师可以使用ChatGPT来促进小组项目，学生们共同研究并就特定主题进行展示。ChatGPT可以根据需要提供额外资源和反馈，帮助学生保持进度并成功完成项目。这种协作方法使学生能够相互学习、分享想法，并更深入地理解主题。
- en: ChatGPT can also help students develop essential skills such as communication,
    teamwork, and problem-solving, which are essential for success in the workplace
    and other areas of life. By working together in small groups, students can learn
    to listen to each other, respect different perspectives, and work collaboratively
    to achieve a common goal ([Solone et al., 2020](#ch21.xhtml#r595)). The use of
    ChatGPT for collaborative learning offers a flexible and engaging way for students
    to learn, particularly in remote or distance learning environments. By fostering
    a sense of community and collaboration, ChatGPT can help students develop essential
    skills and deepen their understanding of the subject matter.
  id: totrans-2395
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT还可以帮助学生培养诸如沟通、团队合作和解决问题的基本技能，这些技能对于职场和其他生活领域的成功至关重要。通过在小团队中共同工作，学生可以学会倾听他人、尊重不同的观点，并协作实现共同目标
    ([Solone等人，2020](#ch21.xhtml#r595))。使用ChatGPT进行协作学习为学生提供了一种灵活且吸引人的学习方式，尤其是在远程或在线学习环境中。通过培养社区感和协作精神，ChatGPT可以帮助学生培养基本技能并加深对主题的理解。
- en: Overall, the use of ChatGPT to create immersive interactive experiences can
    help students feel more engaged in the learning process, as they can interact
    with the material in more dynamic and engaging ways. By facilitating dynamic discussions,
    role simulations, and collaborative learning, ChatGPT can help students develop
    critical thinking skills and communicate more effectively.
  id: totrans-2396
  prefs: []
  type: TYPE_NORMAL
  zh: 总体而言，使用ChatGPT创建沉浸式交互体验可以帮助学生更加投入到学习过程中，因为他们可以以更加动态和吸引人的方式与材料互动。通过促进动态讨论、角色模拟和协作学习，ChatGPT可以帮助学生培养批判性思维技能并更有效地沟通。
- en: 13.4 Impact on Collaborative Learning
  id: totrans-2397
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 13.4 对协作学习的影响
- en: It explores how ChatGPT can facilitate student collaboration, encourage the
    exchange of ideas, and build shared understanding. Collaborative learning is a
    learning approach that involves students working together to achieve a common
    goal ([Le et al., 2018](#ch21.xhtml#r576)). Collaborative learning can encourage
    students to think critically, solve problems, and communicate effectively ([Supena
    et al., 2021](#ch21.xhtml#r597)).
  id: totrans-2398
  prefs: []
  type: TYPE_NORMAL
  zh: 它探讨了ChatGPT如何促进学生协作、鼓励思想交流并建立共同理解。协作学习是一种学生共同为实现共同目标而工作的学习方法 ([Le等人，2018](#ch21.xhtml#r576))。协作学习可以鼓励学生进行批判性思考、解决问题和有效沟通
    ([Supena等人，2021](#ch21.xhtml#r597))。
- en: ChatGPT has the potential to be a powerful tool to facilitate collaborative
    learning ([Rudolph et al., 2023](#ch21.xhtml#r590)). ChatGPT can be used to encourage
    the exchange of ideas, build shared understanding, and overcome barriers to collaboration
    ([Nah et al., 2023](#ch21.xhtml#r582); [Shihab et al., 2023](#ch21.xhtml#r593)).
  id: totrans-2399
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT有潜力成为促进协作学习的强大工具 ([Rudolph等人，2023](#ch21.xhtml#r590))。ChatGPT可用于鼓励思想交流、建立共同理解并克服协作障碍
    ([Nah等人，2023](#ch21.xhtml#r582); [Shihab等人，2023](#ch21.xhtml#r593))。
- en: Table 13.3 ChatGPT impact on learning
  id: totrans-2400
  prefs: []
  type: TYPE_NORMAL
  zh: 表13.3 ChatGPT对学习的影响
- en: '| **Therole** | **Benefits** |'
  id: totrans-2401
  prefs: []
  type: TYPE_TB
  zh: '| **角色** | **益处** |'
- en: '| --- | --- |'
  id: totrans-2402
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- |'
- en: '| Encouraging the exchange of ideas | ChatGPT can be used to encourage the
    exchange of ideas in the following ways: • ChatGPT can be used to create a safe
    and inclusive space for sharing ideas. ChatGPT can be used to ensure that all
    students feel comfortable sharing their ideas, regardless of their background
    or experience. • ChatGPT can be used to facilitate productive and constructive
    discussions. ChatGPT can be used to ask open-ended questions, encourage students
    to think outside the box, and generate new ideas. • ChatGPT can be used to provide
    feedback and support to students. ChatGPT can be used to help students develop
    their ideas and reach a shared understanding. |'
  id: totrans-2403
  prefs: []
  type: TYPE_TB
  zh: '| 鼓励思想交流 | ChatGPT 可以通过以下方式来鼓励思想交流：• ChatGPT 可以用来创建一个安全包容的思想分享空间。ChatGPT 可以确保所有学生无论背景或经验如何，都能舒适地分享他们的想法。•
    ChatGPT 可以用来促进富有成效和建设性的讨论。ChatGPT 可以用来提出开放式问题，鼓励学生跳出思维定式，并产生新想法。• ChatGPT 可以用来为学生提供反馈和支持。ChatGPT
    可以用来帮助学生发展他们的想法，并达到共同的理解。|'
- en: '| Building shared understanding | ChatGPT can be used to build shared understanding
    in the following ways: • ChatGPT can be used to provide relevant and useful resources.
    ChatGPT can be used to access and process information from a variety of sources,
    including books, articles, and websites. • ChatGPT can be used to track and manage
    collaboration progress. ChatGPT can be used to help students stay focused on their
    goals and complete their tasks. • ChatGPT can be used to resolve conflicts and
    overcome obstacles. ChatGPT can be used to help students resolve differences of
    opinion and work together to reach solutions that benefit all parties. |'
  id: totrans-2404
  prefs: []
  type: TYPE_TB
  zh: '| 建立共同理解 | ChatGPT 可以通过以下方式来建立共同理解：• ChatGPT 可以用来提供相关和有用的资源。ChatGPT 可以用来访问和处理来自各种来源的信息，包括书籍、文章和网站。•
    ChatGPT 可以用来跟踪和管理协作进度。ChatGPT 可以用来帮助学生保持对目标的关注并完成他们的任务。• ChatGPT 可以用来解决冲突和克服障碍。ChatGPT
    可以用来帮助学生解决意见分歧，并共同努力达成对各方都有益的解决方案。|'
- en: '| Overcoming barriers to collaboration | ChatGPT can be used to overcome barriers
    to collaboration in the following ways: • ChatGPT can be used to connect students
    from different backgrounds and experiences. ChatGPT can be used to help students
    learn from each other and develop cooperation skills. • ChatGPT can be used to
    provide support and guidance to students. ChatGPT can be used to help students
    overcome challenges they may face in collaboration. |'
  id: totrans-2405
  prefs: []
  type: TYPE_TB
  zh: '| 克服协作障碍 | ChatGPT 可以通过以下方式来克服协作障碍：• ChatGPT 可以用来连接来自不同背景和经验的学生。ChatGPT 可以用来帮助学生相互学习并发展合作技能。•
    ChatGPT 可以用来为学生提供支持和指导。ChatGPT 可以用来帮助学生克服他们在协作中可能遇到的挑战。|'
- en: '| Implementation examples | Here are some examples of how ChatGPT can be used
    to facilitate collaborative learning: • In history lessons, ChatGPT can be used
    to create collaborative research projects. For example, students can work together
    to study a specific historical event or produce creative work on a historical
    topic. • In language lessons, ChatGPT can be used to create collaborative creative
    writing projects. For example, students can work together to write a novel, short
    story, or poem. • In science lessons, ChatGPT can be used to create collaborative
    scientific research projects. For example, students could work together to develop
    a new tool or product. |'
  id: totrans-2406
  prefs: []
  type: TYPE_TB
  zh: '| 实施案例 | 下面是一些 ChatGPT 用于促进协作学习的案例：• 在历史课上，ChatGPT 可以用来创建协作研究项目。例如，学生可以一起研究一个特定历史事件或就历史主题创作创意作品。•
    在语言课上，ChatGPT 可以用来创建协作创意写作项目。例如，学生可以一起创作小说、短篇小说或诗歌。• 在科学课上，ChatGPT 可以用来创建协作科学研究项目。例如，学生可以一起开发新的工具或产品。|'
- en: Source: [Gill et al. (2024)](#ch21.xhtml#r561).
  id: totrans-2407
  prefs: []
  type: TYPE_NORMAL
  zh: 来源：[Gill 等人 (2024)](#ch21.xhtml#r561)。
- en: Here are some suggestions for educators who want to use ChatGPT to facilitate
    collaborative learning.
  id: totrans-2408
  prefs: []
  type: TYPE_NORMAL
  zh: 这里为想要使用 ChatGPT 促进协作学习的教育工作者提供一些建议。
- en: 13.4.1 Learn the capabilities and limitations of ChatGPT
  id: totrans-2409
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 13.4.1 学习 ChatGPT 的功能和限制
- en: ChatGPT is not a substitute for educators, and educators should remain in the
    role of learning leaders. While ChatGPT and other AI technologies can assist students
    with tasks such as answering questions, providing explanations, and generating
    responses, they cannot replace the role of educators as learning leaders. Educators
    bring a wealth of knowledge, experience, and pedagogical expertise that cannot
    be replicated by AI technologies ([Schiff, 2021](#ch21.xhtml#r591)). They can
    provide personalized feedback, adapt teaching strategies to meet the needs of
    individual students, and foster a supportive learning environment that promotes
    critical thinking, collaboration, and problem-solving skills. In short, educators
    are essential for guiding students through the learning process and helping them
    develop the skills and knowledge they need to succeed in their academic and professional
    pursuits.
  id: totrans-2410
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT 并不能替代教育者，教育者应继续扮演学习领导者的角色。虽然 ChatGPT 和其他人工智能技术可以帮助学生完成诸如回答问题、提供解释和生成回应等任务，但它们无法取代教育者在学习领导中的角色。教育者拥有丰富的知识、经验和教学专长，这些是人工智能技术无法复制的
    ([Schiff, 2021](#ch21.xhtml#r591))。他们可以提供个性化的反馈，调整教学策略以满足个别学生的需求，并营造一个支持性的学习环境，促进批判性思维、协作和解决问题的技能。简而言之，教育者在引导学生通过学习过程并帮助他们发展在学术和职业追求中成功所需的技能和知识方面是至关重要的。
- en: 13.4.2 Design learning activities that match the learning objectives and student
    needs
  id: totrans-2411
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 13.4.2 设计符合学习目标和学生学习需求的学习活动
- en: ChatGPT can be used to support learning activities but cannot replace the learning
    activities themselves. While ChatGPT and other AI technologies can provide helpful
    resources for learning activities such as quizzes, practice exercises, and interactive
    simulations, they cannot replace the actual learning activities themselves. Learning
    activities involve active engagement, critical thinking, and the application of
    knowledge in real-world contexts. Students need to interact with their environment,
    collaborate with their peers, and reflect on their learning experiences in order
    to truly understand and apply concepts effectively ([Schiff, 2021](#ch21.xhtml#r591)).
    ChatGPT and other AI technologies can be used to support these learning activities
    by providing additional resources, feedback, and guidance. Still, they cannot
    replace the importance of hands-on, experiential learning that takes place in
    the classroom and beyond.
  id: totrans-2412
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT 可以用来支持学习活动，但不能取代学习活动本身。虽然 ChatGPT 和其他人工智能技术可以为学习活动提供如测验、练习题和交互式模拟等有用的资源，但它们不能取代实际的学习活动。学习活动涉及积极参与、批判性思维以及在现实世界情境中应用知识。学生需要与他们的环境互动，与同伴合作，并反思他们的学习经历，以便真正理解和有效应用概念
    ([Schiff, 2021](#ch21.xhtml#r591))。ChatGPT 和其他人工智能技术可以通过提供额外的资源、反馈和指导来支持这些学习活动。然而，它们不能取代课堂内外实际操作和体验式学习的重要性。
- en: Moreover, AI technologies like ChatGPT can help students with their homework
    assignments, but they cannot replace the importance of independent study and self-directed
    learning. Students need to develop the skills to learn independently, to seek
    out information, and to evaluate the credibility and relevance of sources ([Rosmini
    et al., 2024](#ch21.xhtml#r589)). AI technologies can assist students in this
    process by providing personalized recommendations for resources based on their
    learning history and preferences. Still, they cannot replace the importance of
    students taking ownership of their learning journey.
  id: totrans-2413
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，像 ChatGPT 这样的 AI 技术可以帮助学生完成家庭作业，但它们不能取代独立学习和自主学习的重要性。学生需要培养独立学习的能力，寻找信息，并评估来源的可靠性和相关性
    ([Rosmini et al., 2024](#ch21.xhtml#r589))。人工智能技术可以通过根据他们的学习历史和偏好提供个性化的资源推荐来协助这一过程。然而，它们不能取代学生对自己学习旅程负责的重要性。
- en: Additionally, AI technologies like ChatGPT can help students with their writing
    skills by providing feedback on grammar, style, and coherence (Bibi& Aqsa, 2024).
    However, they cannot replace the importance of students developing their writing
    voice and style. Writing is not just about grammar and syntax but also about expressing
    ideas clearly and persuasively. Students need to learn how to write in a way that
    is appropriate for their audience and purpose, whether it be an academic essay
    or a professional report. AI technologies can provide helpful feedback and suggestions.
    Still, they cannot replace the importance of students developing their writing
    skills through practice and feedback from their teachers and peers.
  id: totrans-2414
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，像 ChatGPT 这样的 AI 技术可以通过提供对语法、风格和连贯性的反馈来帮助学生提高写作技能 (Bibi & Aqsa, 2024)。然而，它们不能取代学生发展自己的写作声音和风格的重要性。写作不仅仅是关于语法和句法，还关于清晰和有说服力地表达思想。学生需要学习如何以适合其受众和目的的方式写作，无论是学术论文还是专业报告。AI
    技术可以提供有用的反馈和建议。但它们不能取代学生通过练习以及从教师和同伴那里获得的反馈来发展写作技能的重要性。
- en: AI technologies like ChatGPT can be a valuable resource for supporting learning
    activities. Still, they cannot replace the importance of hands-on, experiential
    learning, independent study, and self-directed learning. Students need to develop
    a range of skills and competencies beyond just using AI technologies, and educators
    have a critical role to play in guiding students through this process ([Kim et
    al., 2022](#ch21.xhtml#r574)). By providing personalized feedback, adapting teaching
    strategies to meet the needs of individual students ([Adiyono et al., 2024](#ch21.xhtml#r540)),
    and fostering a supportive learning environment, educators can help students develop
    the skills and knowledge they need to succeed in their academic and professional
    pursuits.
  id: totrans-2415
  prefs: []
  type: TYPE_NORMAL
  zh: 像 ChatGPT 这样的 AI 技术可以成为支持学习活动的宝贵资源。然而，它们不能取代动手、体验式学习、独立学习和自主学习的重要性。学生需要发展一系列超出仅使用
    AI 技术的技能和胜任力，教育工作者在这一过程中发挥着关键作用 ([Kim 等人，2022](#ch21.xhtml#r574))。通过提供个性化反馈、调整教学策略以满足个别学生的需求
    ([Adiyono 等人，2024](#ch21.xhtml#r540))，以及营造支持性的学习环境，教育工作者可以帮助学生发展他们在学术和职业追求中成功所需的技能和知识。
- en: 13.4.3 Provide feedback and support to students
  id: totrans-2416
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 13.4.3 向学生提供反馈和支持
- en: ChatGPT can be used to provide feedback on student ideas, but educators should
    also provide constructive and helpful feedback. While AI technologies like ChatGPT
    can provide feedback on student ideas, they cannot replace the importance of constructive
    and helpful feedback from educators. Educators have a unique role to play in guiding
    students through the learning process, providing feedback that is tailored to
    their individual needs and learning styles.
  id: totrans-2417
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT 可以用来对学生观点提供反馈，但教育工作者也应提供建设性和有帮助的反馈。尽管像 ChatGPT 这样的 AI 技术可以对学生观点提供反馈，但它们不能取代教育工作者提供建设性和有帮助反馈的重要性。教育工作者在指导学生通过学习过程、提供针对他们个人需求和学习风格的反馈方面发挥着独特的作用。
- en: AI technologies can provide feedback on grammar, syntax, and other technical
    aspects of student writing or presentations. However, they cannot replace educators’
    ability to provide feedback that is constructive, helpful, and aligned with learning
    objectives and goals for students’ academic or professional development. Educators
    can provide feedback that goes beyond just correcting errors and instead focuses
    on helping students improve their critical thinking, problem-solving, and communication
    skills ([Itmeizeh et al., 2020](#ch21.xhtml#r566)). They can provide feedback
    that is specific to students’ learning goals and help them identify areas for
    improvement while also highlighting their strengths and progress made so far in
    their learning journey toward mastery of concepts or skills being taught in class
    or coursework assignments given by their instructors or professors. This feedback
    should be delivered in a way that is clear and constructive while also being supportive
    and encouraging of students’ efforts toward learning outcomes being assessed.
  id: totrans-2418
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能技术可以对学生的写作或演示中的语法、句法和其他技术方面提供反馈。然而，它们不能取代教育者提供具有建设性、有帮助且与学生的学习目标和学生学术或职业发展目标相一致反馈的能力。教育者可以提供超越仅仅纠正错误的反馈，而是专注于帮助学生提高他们的批判性思维、解决问题的能力和沟通技巧
    ([Itmeizeh 等人，2020](#ch21.xhtml#r566))。他们可以提供针对学生学习目标的特定反馈，帮助他们识别改进领域，同时突出他们在学习旅程中取得的进步和优势。这种反馈应以清晰、建设性的方式提供，同时支持并鼓励学生朝着评估的学习成果努力。
- en: In conclusion, AI technologies like ChatGPT can provide helpful feedback on
    student ideas, but educators should also provide constructive and helpful feedback
    that is tailored to students’ individual needs and learning styles. By providing
    feedback that is specific to students’ learning goals, educators can help students
    develop the skills and knowledge they need to succeed in their academic and professional
    pursuits. By using ChatGPT wisely and responsibly, educators can help students
    achieve better learning outcomes through collaborative learning ([Tuhuteru et
    al., 2023](#ch21.xhtml#r600)).
  id: totrans-2419
  prefs: []
  type: TYPE_NORMAL
  zh: 总之，像 ChatGPT 这样的 AI 技术可以对学生观点提供有用的反馈，但教育者也应提供针对学生个人需求和学习风格的具有建设性和有帮助的反馈。通过提供针对学生学习目标的特定反馈，教育者可以帮助学生发展他们在学术和职业追求中成功所需的技能和知识。通过明智和负责任地使用
    ChatGPT，教育者可以帮助学生通过协作学习实现更好的学习成果 ([Tuhuteru 等人，2023](#ch21.xhtml#r600)))。
- en: 13.5 Personalizing Learning with ChatGPT
  id: totrans-2420
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 13.5 使用 ChatGPT 个性化学习
- en: It describes how this technology can be tailored to the individual needs of
    students, creating a more personalized and relevant learning experience. Personalized
    learning is an approach to learning tailored to students’ individual needs ([Alamri
    et al., 2020](#ch21.xhtml#r541)). It focuses on providing a more relevant and
    meaningful learning experience for each student. [Figure 13.4](#ch21.xhtml#f41)
    presents how can ChatGPT be used for personalized learning.
  id: totrans-2421
  prefs: []
  type: TYPE_NORMAL
  zh: 它描述了这项技术如何根据学生的个人需求进行定制，从而创造一个更加个性化和相关的学习体验。个性化学习是一种针对学生个人需求的学习方法 ([Alamri 等人，2020](#ch21.xhtml#r541))。它侧重于为每位学生提供更加相关和有意义的体验。[图
    13.4](#ch21.xhtml#f41) 展示了如何使用 ChatGPT 进行个性化学习。
- en: '![An infographic chart titled Chat G P T is a large language model that can
    be used to personalize learning. It depicts six ovals labeled in science lessons,
    in language lessons, in history lessons, to track student progress, to provide
    personalized feedback, and to provide personalized learning materials. Each oval
    leads to a detailed description.](html/images/9781032716084_C013_004.jpg)'
  id: totrans-2422
  prefs: []
  type: TYPE_IMG
  zh: '![一个名为“Chat G P T 是一个可以用于个性化学习的大型语言模型”的信息图表。它描绘了六个标记为科学课程、语言课程、历史课程、跟踪学生进度、提供个性化反馈和提供个性化学习材料的椭圆形。每个椭圆形都引导到一个详细的描述。](html/images/9781032716084_C013_004.jpg)'
- en: '[Figure 13.4](#ch21.xhtml#f41b) ChatGPT is used for personalized learning.'
  id: totrans-2423
  prefs: []
  type: TYPE_NORMAL
  zh: '[图 13.4](#ch21.xhtml#f41b) ChatGPT 用于个性化学习。'
- en: ChatGPT has the potential to be a powerful tool for personalization of learning.
    ChatGPT can be used to track student progress, provide personalized feedback,
    and deliver personalized learning materials ([Zhai, 2023](#ch21.xhtml#r604)).
    This approach can help students to achieve better learning outcomes by providing
    learning experiences that are more relevant and meaningful to them.
  id: totrans-2424
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT有潜力成为个性化学习的强大工具。ChatGPT可用于跟踪学生进度、提供个性化反馈和提供个性化学习材料（[Zhai, 2023](#ch21.xhtml#r604)）。这种方法可以通过提供对学生来说更相关和有意义的学习体验，帮助学生取得更好的学习成果。
- en: Here are some suggestions for educators who want to use ChatGPT for learning
    personalization.
  id: totrans-2425
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一些针对希望使用ChatGPT进行学习个性化的教育工作者的建议。
- en: 13.5.1 Learn the capabilities and limitations of ChatGPT
  id: totrans-2426
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 13.5.1 学习ChatGPT的能力和限制
- en: ChatGPT is not a substitute for educators, and educators should remain in the
    role of learning leaders. ChatGPT is an advanced AI language model developed by
    OpenAI that can generate human-like responses to text prompts based on a vast
    corpus of text data. While ChatGPT has impressive capabilities, it also has limitations
    that educators should be aware of.
  id: totrans-2427
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT不能替代教育者，教育者应继续担任学习领导者的角色。ChatGPT是由OpenAI开发的高级AI语言模型，可以根据庞大的文本数据集生成类似人类的回应。虽然ChatGPT具有令人印象深刻的性能，但它也有教育者应该了解的限制。
- en: 13.5.1.1 Capabilities
  id: totrans-2428
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 13.5.1.1 能力
- en: 13.5.1.1.1 Accuracy and speed
  id: totrans-2429
  prefs:
  - PREF_H5
  type: TYPE_NORMAL
  zh: 13.5.1.1.1 准确性和速度
- en: ChatGPT can quickly generate accurate responses to a range of text prompts,
    making it a useful tool for answering questions, summarizing content, and generating
    project ideas. It may also help students with punctuation, grammar, and spelling.
  id: totrans-2430
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT可以快速对一系列文本提示做出准确回应，使其成为回答问题、总结内容和生成项目想法的有用工具。它还可能帮助学生改进标点、语法和拼写。
- en: 13.5.1.1.2 Consistency
  id: totrans-2431
  prefs:
  - PREF_H5
  type: TYPE_NORMAL
  zh: 13.5.1.1.2 一致性
- en: For students who wish to double-check their answers or get more clarification
    on a concept, ChatGPT is a dependable resource because it regularly offers the
    same response to the same question.
  id: totrans-2432
  prefs: []
  type: TYPE_NORMAL
  zh: 对于希望双重检查答案或对某个概念获得更多澄清的学生，ChatGPT是一个可靠的资源，因为它会定期对相同的问题给出相同的回应。
- en: 13.5.1.1.3 Availability
  id: totrans-2433
  prefs:
  - PREF_H5
  type: TYPE_NORMAL
  zh: 13.5.1.1.3 可用性
- en: ChatGPT is available 24/7, making it a convenient resource for students who
    need help outside of regular school hours.
  id: totrans-2434
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT全天候可用，对于需要在校外时间获得帮助的学生来说，它是一个方便的资源。
- en: 13.5.1.2 Limitations
  id: totrans-2435
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 13.5.1.2 限制
- en: 13.5.1.2.1 Lack of emotional intelligence
  id: totrans-2436
  prefs:
  - PREF_H5
  type: TYPE_NORMAL
  zh: 13.5.1.2.1 缺乏情商
- en: ChatGPT is not capable of understanding emotions, feelings, or context. It cannot
    provide personalized feedback or advice based on a student’s individual needs
    or circumstances.
  id: totrans-2437
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT无法理解情绪、感受或情境。它不能根据学生的个人需求或情况提供个性化的反馈或建议。
- en: 13.5.1.2.2 Limited knowledge
  id: totrans-2438
  prefs:
  - PREF_H5
  type: TYPE_NORMAL
  zh: 13.5.1.2.2 知识有限
- en: The training text data, i.e., the knowledge base of ChatGPT, is its sole information
    source. Questions outside of its training set or requiring in-depth investigation
    or analysis are not answered by it.
  id: totrans-2439
  prefs: []
  type: TYPE_NORMAL
  zh: 训练文本数据，即ChatGPT的知识库，是其唯一的信息来源。它无法回答其训练集之外的问题或需要深入调查或分析的问题。
- en: 13.5.1.2.3 Lack of creativity
  id: totrans-2440
  prefs:
  - PREF_H5
  type: TYPE_NORMAL
  zh: 13.5.1.2.3 缺乏创造力
- en: It is impossible for ChatGPT to come up with unique concepts or insights. Only
    the patterns it has discovered from the text data have been trained on, which
    will allow it to respond.
  id: totrans-2441
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT无法提出独特概念或见解。它仅从文本数据中发现的模式进行训练，这将允许它做出回应。
- en: Educators should use ChatGPT as a supplementary resource, not a substitute for
    their role as learning leaders. ChatGPT can help students with basic questions,
    but educators should still provide personalized feedback, guidance, and support
    to help students develop critical thinking, problem-solving, and communication
    skills. ChatGPT should be used as a tool to enhance learning, not replace the
    human element of teaching and learning.
  id: totrans-2442
  prefs: []
  type: TYPE_NORMAL
  zh: 教育者应将ChatGPT作为辅助资源，而不是替代其作为学习领导者的角色。ChatGPT可以帮助学生解决基本问题，但教育者仍应提供个性化的反馈、指导和支持，以帮助学生发展批判性思维、解决问题的能力和沟通技巧。ChatGPT应作为增强学习的工具，而不是取代教学和学习中的人性化元素。
- en: 13.5.2 Design learning activities that meet learning objectives and student
    needs
  id: totrans-2443
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 13.5.2 设计符合学习目标和学生学习需求的学习活动
- en: 'ChatGPT can be used to support learning activities but cannot replace learning
    activities themselves. Creating educational activities that satisfy both student
    needs and learning objectives is crucial for educators. Although ChatGPT can be
    a helpful tool to supplement educational activities, it cannot take the place
    of the actual educational activities. Here are a few examples of how to use ChatGPT
    to enhance educational activities: (1) Practice exercises: Students can utilize
    ChatGPT to get practice exercises that will help them advance their knowledge
    and abilities in a particular subject. For instance, students can solve arithmetic
    problems or do grammatical lessons with ChatGPT. (2) Comments and direction: ChatGPT
    can offer students comments and direction on their papers, assisting them in identifying
    areas in which they require development and offering recommendations for how to
    do so. (3) Research assistance: ChatGPT can offer students research assistance
    by giving them article summaries, essential points, and query responses. By doing
    this, students may concentrate on the most crucial material while also saving
    time. (4) Collaborative learning: By giving students discussion topics or problems
    to go through in small groups, ChatGPT can help to promote collaborative learning
    activities. (5) Personalized learning: By adjusting to each student’s unique needs
    and learning preferences, ChatGPT may be utilized to give them individualized
    learning experiences. Students can receive practice tasks from ChatGPT, for instance,
    that are customized to their learning objectives and ability level. Nevertheless,
    it’s essential to keep in mind that ChatGPT cannot take the place of actual learning
    activities. Learning exercises ought to be created with interaction and engagement
    and pertinent to the interests and needs of the pupils ([Bovermann & Bastiaens,
    2020](#ch21.xhtml#r549)). They ought to give pupils chances to work with their
    peers and use their knowledge and abilities in practical settings. Though it should
    be used in conjunction with other teaching methodologies and resources, ChatGPT
    can be a valuable tool in assisting these learning activities.'
  id: totrans-2444
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT 可以用于支持学习活动，但不能取代学习活动本身。为教育者创造既满足学生需求又符合学习目标的教育活动至关重要。尽管 ChatGPT 可以作为补充教育活动的有用工具，但它不能取代实际的教育活动。以下是一些如何使用
    ChatGPT 来提升教育活动的例子：（1）练习题：学生可以利用 ChatGPT 获得练习题，这有助于他们在特定学科上提升知识和能力。例如，学生可以用 ChatGPT
    解决算术问题或进行语法练习。（2）评论和指导：ChatGPT 可以为学生提供论文的评论和指导，帮助他们识别需要改进的领域，并提供改进的建议。（3）研究协助：ChatGPT
    可以通过提供文章摘要、关键点和查询回复来为学生提供研究协助。通过这种方式，学生可以专注于最重要的材料，同时节省时间。（4）协作学习：通过为学生提供讨论主题或小组需要解决的问题，ChatGPT
    可以帮助促进协作学习活动。（5）个性化学习：通过适应每个学生的独特需求和偏好，ChatGPT 可以用来提供个性化的学习体验。例如，学生可以从 ChatGPT
    获得定制化的练习任务，这些任务符合他们的学习目标和能力水平。然而，必须记住的是，ChatGPT 不能取代实际的学习活动。学习练习应该具有互动性和参与性，并与学生的兴趣和需求相关（Bovermann
    & Bastiaens, 2020）。它们应该给学生提供与同伴合作的机会，并在实际环境中运用他们的知识和能力。尽管它应该与其他教学方法资源结合使用，但 ChatGPT
    在协助这些学习活动中可以是一个有价值的工具。
- en: 13.5.3 Use ChatGPT ethically and responsibly
  id: totrans-2445
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 13.5.3 伦理和负责任地使用 ChatGPT
- en: 'ChatGPT should be used to assist students, not to replace social interaction
    and active student participation. ChatGPT should be used to assist students, not
    to replace social interaction and active student participation. While ChatGPT
    can be a helpful tool for answering questions, providing feedback, and generating
    ideas, it cannot replace the social and interactive aspects of learning. Here
    are some reasons why social interaction and active student participation are essential:
    (1) Collaborative learning: Learning is a social process, and students benefit
    from collaborating with their peers. Social interaction allows students to share
    ideas, perspectives, and insights, which can lead to deeper learning and a better
    understanding of the subject matter ([Islam et al., 2020](#ch21.xhtml#r565)).
    (2) Active learning: Active learning involves students in the learning process,
    encouraging them to ask questions, make connections, and apply their knowledge
    in real-world contexts. Active learning promotes critical thinking, problem-solving,
    and communication skills, which are essential for success in school and life ([Jaenudin
    et al., 2020](#ch21.xhtml#r567)). (3) Feedback and support: Social interaction
    allows students to receive feedback and support from their peers and teachers,
    which can help them identify areas where they need improvement and provide suggestions
    for how to improve. (4) Cultural and linguistic differences: Social interaction
    allows students to learn from their peers who come from different cultural and
    linguistic backgrounds. This can help students develop a greater appreciation
    for diverse perspectives and experiences ([Naicker et al., 2022](#ch21.xhtml#r583)).
    (5) Emotional and social development: Social interaction allows students to develop
    emotional and social skills, such as empathy, respect, and teamwork, which are
    essential for success in school and life ([Paolini & Riley, 2020](#ch21.xhtml#r584)).'
  id: totrans-2446
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT应被用来辅助学生，而不是取代社交互动和学生的积极参与。ChatGPT应被用来辅助学生，而不是取代社交互动和学生的积极参与。虽然ChatGPT可以作为一个有用的工具来回答问题、提供反馈和生成想法，但它不能取代学习的社交和互动方面。以下是一些为什么社交互动和学生的积极参与是至关重要的原因：(1)
    协作学习：学习是一个社会过程，学生通过与同伴合作而受益。社交互动使学生能够分享想法、观点和洞察力，这可能导致更深入的学习和对主题内容的更好理解（[Islam等人，2020](#ch21.xhtml#r565)）。(2)
    积极学习：积极学习涉及学生参与学习过程，鼓励他们提问、建立联系并在现实世界情境中应用他们的知识。积极学习促进批判性思维、问题解决和沟通技能，这些技能对于学校和生活成功至关重要（[Jaenudin等人，2020](#ch21.xhtml#r567)）。(3)
    反馈和支持：社交互动使学生能够从同伴和教师那里获得反馈和支持，这有助于他们识别需要改进的领域，并提供改进的建议。(4) 文化语言差异：社交互动使学生能够从来自不同文化语言背景的同伴那里学习。这有助于学生更加欣赏不同的观点和经验（[Naicker等人，2022](#ch21.xhtml#r583)）。(5)
    情感和社交发展：社交互动使学生能够发展情感和社交技能，如同理心、尊重和团队合作，这些技能对于学校和生活成功至关重要（[Paolini & Riley，2020](#ch21.xhtml#r584)）。
- en: ChatGPT should be used to assist students, not to replace social interaction
    and active student participation. ChatGPT can be a helpful tool for answering
    questions, providing feedback, and generating ideas. Still, it should be used
    in conjunction with other teaching strategies and resources that promote social
    interaction and active student participation. By using ChatGPT wisely and responsibly,
    educators can help students achieve better learning outcomes through the personalization
    of learning.
  id: totrans-2447
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT应被用来辅助学生，而不是取代社交互动和学生的积极参与。ChatGPT可以作为一个有用的工具来回答问题、提供反馈和生成想法。然而，它应该与其他促进社交互动和积极参与的教学策略和资源结合使用。通过明智和负责任地使用ChatGPT，教育者可以帮助学生通过个性化学习实现更好的学习成果。
- en: 13.6 The Effect of Technology on the Teacher’s Role
  id: totrans-2448
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 13.6 技术对教师角色的影响
- en: It discusses how the use of ChatGPT can change the role of the teacher to be
    more of a facilitator, encouraging discussion and directing learning. The use
    of ChatGPT in an educational context can bring about significant changes in the
    role of the teacher ([Jend, 2023](#ch21.xhtml#r569)). Here are some ways in which
    ChatGPT can change the role of the teacher to be more of a facilitator, encouraging
    discussion and directing learning.
  id: totrans-2449
  prefs: []
  type: TYPE_NORMAL
  zh: 它讨论了如何使用ChatGPT可以改变教师的角色，使其更像是一个促进者，鼓励讨论并指导学习。在教育环境中使用ChatGPT可以显著改变教师的角色（[Jend，2023](#ch21.xhtml#r569)）。以下是ChatGPT如何改变教师的角色，使其更像是一个促进者，鼓励讨论并指导学习的几种方式。
- en: Table 13.4 Teacher’s role in context ChatGPT
  id: totrans-2450
  prefs: []
  type: TYPE_NORMAL
  zh: 表13.4 ChatGPT在情境中的教师角色
- en: '| **Therole** | **Benefits** |'
  id: totrans-2451
  prefs: []
  type: TYPE_TB
  zh: '| **作用** | **好处** |'
- en: '| --- | --- |'
  id: totrans-2452
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- |'
- en: '| Improving access to information | • Teachers can use ChatGPT to provide students
    with quick and easy access to the latest and most current information. • Students
    can ask ChatGPT questions to get instant answers, allowing them to understand
    the material more deeply. |'
  id: totrans-2453
  prefs: []
  type: TYPE_TB
  zh: '| 提高信息获取 | • 教师可以使用ChatGPT为学生提供快速便捷地获取最新和最准确信息的途径。 • 学生可以向ChatGPT提问以获得即时答案，从而更深入地理解材料。
    |'
- en: '| Personalizing learning | Teachers can help students’ learning experiences
    be more tailored to them by using ChatGPT. Using this approach, educators can
    provide learning materials that are specific to the interests and comprehension
    levels of each student. |'
  id: totrans-2454
  prefs: []
  type: TYPE_TB
  zh: '| 个性化学习 | 教师可以通过使用ChatGPT帮助学生学习体验更加贴合他们。采用这种方法，教育者可以提供针对每个学生的兴趣和理解水平的特定学习材料。
    |'
- en: '| Building critical thinking skills | • Teachers can ask students open-ended
    questions and encourage them to think critically in formulating their own answers.
    • Students can participate in teacher-guided discussions to explain and defend
    their views using information obtained from ChatGPT. |'
  id: totrans-2455
  prefs: []
  type: TYPE_TB
  zh: '| 培养批判性思维技能 | • 教师可以提出开放式问题，并鼓励学生在构思自己的答案时进行批判性思考。 • 学生可以参与教师引导的讨论，利用从ChatGPT获取的信息来解释和捍卫自己的观点。
    |'
- en: '| Encourage collaboration and discussion | • Teachers can utilize ChatGPT to
    start a discussion in the classroom by presenting readings or discussion starters.
    • By working together to develop answers or solutions, students can foster a collaborative
    learning atmosphere in the classroom. |'
  id: totrans-2456
  prefs: []
  type: TYPE_TB
  zh: '| 鼓励协作和讨论 | • 教师可以利用ChatGPT通过展示阅读材料或讨论起点来在课堂上发起讨论。 • 通过共同开发答案或解决方案，学生可以在课堂上营造一种协作学习的氛围。
    |'
- en: '| Developing problem-solving skills | • Teachers can challenge students with
    complex questions or problems and use ChatGPT as a tool to guide students in finding
    solutions. • Students can use ChatGPT as a resource to develop their problem-solving
    skills. |'
  id: totrans-2457
  prefs: []
  type: TYPE_TB
  zh: '| Developing problem-solving skills | • 教师可以通过提出复杂的问题或问题挑战学生，并使用ChatGPT作为工具指导学生在寻找解决方案。
    • 学生可以将ChatGPT作为资源来发展他们的解决问题的技能。 |'
- en: '| Facilitating independent learning | • Teachers can assign tasks or projects
    that allow students to use ChatGPT as an aid in understanding and exploring topics
    independently. • Students can develop their independence in finding information
    and solving problems by utilizing available resources. |'
  id: totrans-2458
  prefs: []
  type: TYPE_TB
  zh: '| 促进独立学习 | • 教师可以分配任务或项目，让学生利用ChatGPT作为理解探索主题的辅助工具。 • 通过利用可用资源，学生可以在寻找信息和解决问题方面发展独立性。
    |'
- en: '| Assessing student understanding | • Teachers can use ChatGPT to create evaluation
    questions or exams that can measure students’ understanding of the subject matter.
    • Teachers can provide immediate feedback based on students’ answers, allowing
    them to refine their understanding. |'
  id: totrans-2459
  prefs: []
  type: TYPE_TB
  zh: '| 评估学生理解 | • 教师可以使用ChatGPT创建评估问题或考试，以衡量学生对学科内容的理解。 • 教师可以根据学生的答案提供即时反馈，使他们能够完善自己的理解。
    |'
- en: The use of ChatGPT in education can help create a learning environment that
    is dynamic, and interactive, and supports the development of critical skills in
    students ([Annuš, 2023](#ch21.xhtml#r545); [Adiyono et al., 2022](#ch21.xhtml#r539)).
    The teacher is not only a conveyor of information but also acts as a facilitator
    who guides students in their own exploration, discussion, and development of understanding.
  id: totrans-2460
  prefs: []
  type: TYPE_NORMAL
  zh: 在教育中使用ChatGPT可以帮助创建一个动态、互动的学习环境，并支持学生批判性技能的发展（[Annuš, 2023](#ch21.xhtml#r545);
    [Adiyono et al., 2022](#ch21.xhtml#r539)）。教师不仅是信息的传递者，还充当引导者，指导学生在自己的探索、讨论和理解发展中。
- en: Personalized learning is an approach to learning that is tailored to the individual
    needs of students. It focuses on providing a more relevant and meaningful learning
    experience for each student. ChatGPT is a large language model that can be used
    for learning personalization in the following ways.
  id: totrans-2461
  prefs: []
  type: TYPE_NORMAL
  zh: 个性化学习是一种针对学生个体需求的学习方法。它侧重于为每个学生提供更相关和有意义的体验。ChatGPT是一个大型语言模型，可以以下方式用于学习个性化。
- en: Table 13.5 Learning approaches that are tailored to the individual needs of
    students Click or tap here to enter text
  id: totrans-2462
  prefs: []
  type: TYPE_NORMAL
  zh: 表13.5 适应学生个体需求的学习方法 点击或轻触此处输入文本
- en: '| **Roleof the Model** | **Benefits** |'
  id: totrans-2463
  prefs: []
  type: TYPE_TB
  zh: '| **模型的作用** | **好处** |'
- en: '| --- | --- |'
  id: totrans-2464
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- |'
- en: '| ChatGPT can be used to track student progress | ChatGPT is a useful tool
    for gathering information about student performance, including exam scores, homework,
    and involvement in class. This information can be utilized to pinpoint areas in
    which pupils require more assistance or potential obstacles. |'
  id: totrans-2465
  prefs: []
  type: TYPE_TB
  zh: '| ChatGPT可用于跟踪学生进度 | ChatGPT是一个收集学生表现信息的有用工具，包括考试成绩、家庭作业和课堂参与度。这些信息可用于确定学生在哪些方面需要更多帮助或潜在的障碍。|'
- en: '| ChatGPT can be used to provide personalized feedback | Feedback on student
    performance that is tailored to each student’s needs can be given using ChatGPT.
    Students who receive this feedback can improve their skills and have a better
    understanding of their strengths and deficiencies. |'
  id: totrans-2466
  prefs: []
  type: TYPE_TB
  zh: '| ChatGPT可用于提供个性化反馈 | 使用ChatGPT可以提供针对每个学生需求的个性化学生表现反馈。接受这种反馈的学生可以提高他们的技能，并更好地了解他们的优势和不足。|'
- en: '| ChatGPT can be used to provide personalized learning materials | You can
    use ChatGPT to personalize instructional materials to each student’s needs. These
    educational tools may contain articles, games, and other things that are appropriate
    for the student’s skill level and areas of interest. |'
  id: totrans-2467
  prefs: []
  type: TYPE_TB
  zh: '| ChatGPT可用于提供个性化学习材料 | 您可以使用ChatGPT根据每个学生的需求个性化教学材料。这些教育工具可能包含适合学生技能水平和兴趣领域的文章、游戏和其他内容。|'
- en: Source: Alfiani and Sulisworo (2023).
  id: totrans-2468
  prefs: []
  type: TYPE_NORMAL
  zh: 来源：Alfiani和Sulisworo（2023）。
- en: ChatGPT has the potential to be a powerful tool for personalization of learning.
    ChatGPT can be used to track student progress, provide personalized feedback,
    and deliver personalized learning materials as said by Baidoo. This approach can
    help students to achieve better learning outcomes by providing learning experiences
    that are more relevant and meaningful to them.
  id: totrans-2469
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT有潜力成为个性化学习的强大工具。正如Baidoo所说，ChatGPT可用于跟踪学生进度、提供个性化反馈和提供个性化学习材料。这种方法可以通过提供更相关和有意义的学习体验来帮助学生实现更好的学习成果。
- en: 13.6.1 Adaptive learning
  id: totrans-2470
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 13.6.1 自适应学习
- en: ChatGPT can be used to adapt learning materials to meet the individual needs
    and learning styles of students ([Alfiani & Sulisworo, 2023](#ch21.xhtml#r542)).
    By analyzing student data, ChatGPT can identify areas where students need additional
    support and provide personalized learning materials and activities to address
    those needs. ChatGPT can collect data on student performance, such as test scores,
    assignment grades, and learning progress. This data can be used to identify areas
    where students are struggling and need additional support. ChatGPT can analyze
    this data to identify patterns and trends, such as areas where students consistently
    perform poorly or areas where they are making significant progress ([Alneyadi
    & Wardat, 2023](#ch21.xhtml#r543)). This analysis can help ChatGPT to identify
    areas where students need additional support and to provide personalized learning
    materials and activities to address those needs. Based on the analysis, ChatGPT
    can provide students with personalized learning materials, such as interactive
    quizzes, videos, and simulations, that are tailored to their specific needs and
    learning styles. These materials can help students to reinforce their understanding
    of critical concepts and to build on their existing knowledge and skills.
  id: totrans-2471
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT可用于根据学生的个人需求和学习风格调整学习材料（[Alfiani & Sulisworo, 2023](#ch21.xhtml#r542)）。通过分析学生数据，ChatGPT可以确定学生需要额外支持的区域，并提供个性化的学习材料和活动来满足这些需求。ChatGPT可以收集有关学生表现的数据，例如考试成绩、作业评分和学习进度。这些数据可用于确定学生在哪些方面遇到困难并需要额外支持。ChatGPT可以分析这些数据以识别模式和趋势，例如学生持续表现不佳的区域或他们在哪些方面取得了显著进步（[Alneyadi
    & Wardat, 2023](#ch21.xhtml#r543)）。这种分析可以帮助ChatGPT确定学生需要额外支持的区域，并提供个性化的学习材料和活动来满足这些需求。基于分析结果，ChatGPT可以向学生提供个性化的学习材料，如互动测验、视频和模拟，这些材料针对他们的具体需求和学习风格量身定制。这些材料可以帮助学生加强他们对关键概念的理解，并在此基础上构建他们的现有知识和技能。
- en: ChatGPT can adapt learning materials to meet the individual needs and learning
    styles of students. For example, if a student is a visual learner, ChatGPT can
    provide them with videos and simulations to help them understand complex concepts.
    If a student is a kinesthetic learner, ChatGPT can provide them with interactive
    activities and games to help them reinforce their understanding of key concepts
    through hands-on learning experiences. ChatGPT can provide students with ongoing
    feedback on their learning progress, helping them to identify areas where they
    need additional support and providing suggestions for how to improve. This feedback
    can be tailored to the student’s specific needs and learning goals, helping them
    to make progress at their own pace. Overall, ChatGPT can be a powerful tool for
    adapting learning materials to meet the individual needs and learning styles of
    students. By analyzing student data and providing personalized learning materials
    and activities, ChatGPT can help students achieve better learning outcomes and
    build on their existing knowledge and skills.
  id: totrans-2472
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT可以根据学生的个别需求和学习风格调整学习材料。例如，如果学生是视觉学习者，ChatGPT可以提供视频和模拟来帮助他们理解复杂的概念。如果学生是动觉学习者，ChatGPT可以提供互动活动和游戏，帮助他们通过动手学习经验来加强他们对关键概念的理解。ChatGPT可以为学生提供持续的学习进度反馈，帮助他们识别需要额外支持的地方，并提供改进的建议。这种反馈可以根据学生的具体需求和目标进行定制，帮助他们以自己的节奏取得进步。总体而言，ChatGPT可以成为调整学习材料以满足学生个别需求和学习风格的强大工具。通过分析学生数据并提供个性化的学习材料和活动，ChatGPT可以帮助学生实现更好的学习成果，并在此基础上构建他们的知识和技能。
- en: 13.6.2 Real-time feedback
  id: totrans-2473
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 13.6.2 实时反馈
- en: ChatGPT can provide students with real-time feedback on their assignments and
    assessments, helping them to identify areas where they need improvement and providing
    suggestions for how to improve ([Rudolph et al., 2023](#ch21.xhtml#r590)). This
    feedback can be tailored to the student’s specific needs and learning goals, helping
    them to make progress at their own pace.
  id: totrans-2474
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT可以为学生的作业和评估提供实时反馈，帮助他们识别需要改进的领域，并提供改进的建议([Rudolph et al., 2023](#ch21.xhtml#r590))。这种反馈可以根据学生的具体需求和目标进行定制，帮助他们以自己的节奏取得进步。
- en: 13.6.3 Personalized learning paths
  id: totrans-2475
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 13.6.3 个性化学习路径
- en: ChatGPT can help students create personalized learning paths based on their
    interests, goals, and learning styles. By providing students with a range of learning
    materials and activities, ChatGPT can help them explore topics that are relevant
    and meaningful to them ([Firaina & Sulisworo, 2023](#ch21.xhtml#r557)).
  id: totrans-2476
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT可以帮助学生根据他们的兴趣、目标和学习风格创建个性化的学习路径。通过提供各种学习材料和活动，ChatGPT可以帮助他们探索对他们来说相关和有意义的话题([Firaina
    & Sulisworo, 2023](#ch21.xhtml#r557))。
- en: 13.6.4 Collaborative learning
  id: totrans-2477
  prefs: []
  type: TYPE_NORMAL
  zh: 13.6.4 协作学习
- en: ChatGPT can facilitate collaborative learning by connecting students with peers
    who have similar learning needs and goals. By working together, students can share
    ideas, perspectives, and insights, which can lead to deeper learning and a better
    understanding of the subject matter.
  id: totrans-2478
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT可以通过将学生与具有相似学习需求和目标的同学连接起来，促进协作学习。通过共同工作，学生们可以分享想法、观点和见解，这可能导致更深入的学习和对主题内容的更好理解。
- en: 13.6.5 Continuous learning
  id: totrans-2479
  prefs: []
  type: TYPE_NORMAL
  zh: 13.6.5 持续学习
- en: ChatGPT can provide students with ongoing learning opportunities, helping them
    to build on their existing knowledge and skills ([Rahman & Watanobe, 2023](#ch21.xhtml#r586)).
    By providing students with a range of learning materials and activities, ChatGPT
    can help students stay engaged and motivated and achieve their learning goals
    over time. Overall, ChatGPT has the potential to be a powerful tool for the personalization
    of learning, helping students achieve better learning outcomes by providing learning
    experiences that are more relevant and meaningful to them. However, it’s essential
    to remember that ChatGPT should be used in conjunction with other teaching strategies
    and resources that promote social interaction, active learning, and collaboration.
  id: totrans-2480
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT可以为学生们提供持续的学习机会，帮助他们巩固现有的知识和技能([Rahman & Watanobe, 2023](#ch21.xhtml#r586))。通过提供各种学习材料和活动，ChatGPT可以帮助学生们保持参与度和动力，并在一段时间内实现他们的学习目标。总体而言，ChatGPT有潜力成为个性化学习的强大工具，通过提供对他们来说更相关和有意义的体验，帮助学生实现更好的学习成果。然而，记住ChatGPT应该与其他促进社交互动、主动学习和协作的教学策略和资源结合使用是至关重要的。
- en: '[Figure 13.5](#ch21.xhtml#f42) presents some suggestions for educators who
    want to use ChatGPT for learning personalization.'
  id: totrans-2481
  prefs: []
  type: TYPE_NORMAL
  zh: '[图13.5](#ch21.xhtml#f42) 为希望使用ChatGPT进行学习个性化的教育工作者提供了一些建议。'
- en: '![A cyclic chart titled financial suggestions for educators who want to use
    Chat G P T for personalized learning cycle is as follows. 2. Learning activity
    design. 3. Ethical and responsible. 4. Collaboration with other educators. 5. Prioritize
    safety and ethics. 6. Choose the right learning context. Surrounding lists stages
    1 to 6 with descriptions.](html/images/9781032716084_C013_005.jpg)'
  id: totrans-2482
  prefs: []
  type: TYPE_IMG
  zh: '![一个标题为“为希望使用Chat GPT进行个性化学习周期的教育工作者提供的财务建议循环图”的循环图如下。2. 学习活动设计。3. 道德和责任。4. 与其他教育工作者合作。5. 优先考虑安全和道德。6. 选择正确的学习环境。围绕1到6阶段列出描述。](html/images/9781032716084_C013_005.jpg)'
- en: '[Figure 13.5](#ch21.xhtml#f42b) ChatGPT for learning personalization.'
  id: totrans-2483
  prefs: []
  type: TYPE_NORMAL
  zh: '[图13.5](#ch21.xhtml#f42b) ChatGPT用于学习个性化。'
- en: 13.7 Conclusion
  id: totrans-2484
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 13.7 结论
- en: In this chapter, we have discussed the impact of using ChatGPT in an educational
    context, specifically in introducing a new paradigm for student participation
    in the classroom through an active learning approach. It is evident that ChatGPT
    not only serves as a tool to provide quick access to information but can also
    change the role of the teacher and shepherd learning toward a more interactive
    and collaborative environment. First, we see that ChatGPT can improve information
    access, allowing students to quickly get answers to their questions. This not
    only speeds up the learning process but also opens the door for teachers to focus
    more on mentoring and developing students’ critical thinking skills. Furthermore,
    the use of ChatGPT allows for better personalization of learning. Teachers can
    create learning content tailored to student’s individual needs, supporting their
    development according to their level of understanding and interests. This helps
    to create a more inclusive and responsive learning environment.
  id: totrans-2485
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们讨论了在教育环境中使用ChatGPT的影响，特别是通过主动学习方法引入一种新的学生参与课堂的范式。很明显，ChatGPT不仅作为提供快速获取信息的工具，还可以改变教师角色，引导学习走向更互动和协作的环境。首先，我们看到ChatGPT可以改善信息获取，使学生能够快速得到问题的答案。这不仅加快了学习过程，还为教师提供了更多关注指导和发展学生批判性思维技能的机会。此外，ChatGPT的使用允许更好地个性化学习。教师可以根据学生的理解和兴趣创建符合他们个人需求的学习内容，支持他们根据理解水平和兴趣发展。这有助于创造一个更具包容性和响应性的学习环境。
- en: In addition, active learning is the main focus, where teachers act as facilitators
    of discussion and collaboration. ChatGPT is used as a tool to stimulate open-ended
    questions and challenge students to think critically, creating an environment
    where learning does not simply become passive information retrieval, but an interactive
    process that builds deeper understanding. In this paradigm, teachers do not lose
    their role as classroom leaders, but they shift from being the main conveyor of
    information to guiding and supporting student learning. Teachers become more involved
    in providing direction, structuring discussions, and designing challenging learning
    experiences. On the other hand, students become more active, engaging in discussion,
    collaboration, and problem-solving. Thus, the integration of ChatGPT in active
    learning takes us toward a new paradigm where student participation takes center
    stage. In an ever-changing world, this learning model not only supports knowledge
    acquisition but also helps students develop skills relevant to the 21st century,
    such as critical thinking, collaboration, and independence. This paradigm creates
    a strong foundation for producing a generation that is ready to face the challenges
    of the future.
  id: totrans-2486
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，主动学习是主要焦点，其中教师充当讨论和协作的促进者。ChatGPT被用作工具来激发开放式问题并挑战学生进行批判性思考，创造一个学习不仅仅是被动信息检索，而是一个构建更深层次理解互动过程的环境。在这个范式下，教师并没有失去他们在课堂上的领导角色，而是从主要的信息传递者转变为引导和支持学生学习。教师更多地参与到提供方向、结构化讨论和设计具有挑战性的学习体验中。另一方面，学生变得更加活跃，参与讨论、协作和问题解决。因此，ChatGPT在主动学习中的整合引领我们走向一个新范式，其中学生的参与成为中心。在一个不断变化的世界中，这种学习模式不仅支持知识获取，还有助于学生发展21世纪相关的技能，如批判性思维、协作和独立性。这个范式为培养一个准备好面对未来挑战的一代奠定了坚实的基础。
