- en: '**WHAT IS BOKEH?**'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Bokeh is an open source project that depends on Matplotlib as well as Scikit-learn.
    As you will see in the subsequent code sample, Bokeh generates an HTML Web page
    that is based on Python code, and then launches that Web page in a browser. Bokeh
    and D3.js (which is a JavaScript layer of abstraction over SVG) both provide elegant
    visualization effects that support animation effects and user interaction.
  prefs: []
  type: TYPE_NORMAL
- en: Bokeh enables the rapid creation statistical visualization, and it works with
    other tools with as Python Flask and Django. In addition to Python, Bokeh supports
    Julia, Lua, and R (JSON files are generated instead of HTML Web pages).
  prefs: []
  type: TYPE_NORMAL
- en: '[Listing 6.11](#list6-11) displays the contents bokeh_trig.py that illustrates
    how to create a graphics effect using various Bokeh APIs.'
  prefs: []
  type: TYPE_NORMAL
- en: '***LISTING 6.11: bokeh_trig.py***'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE441]'
  prefs: []
  type: TYPE_PRE
- en: '[Listing 6.11](#list6-11) starts with a commented out pip3 code snippet that
    you can launch from the command line in order to install Bokeh (in case you haven’t
    done so already).'
  prefs: []
  type: TYPE_NORMAL
- en: The next code block contains several Bokeh -related statements as well as NumPy
    and Math.
  prefs: []
  type: TYPE_NORMAL
- en: Notice that the variable white is defined as an (R,G,B) triple of integers,
    which represents the red, green, and blue components of a color. In particular,
    (255,255,255) represents the color white (check online if you are unfamiliar with
    RGB). The next portion of [Listing 6.11](#list6-11) initializes some scalar variables
    that are used in the two for loops that are in the second half of [Listing 6.11](#list6-11).
  prefs: []
  type: TYPE_NORMAL
- en: Next, the NumPy variable x is a range of values from 0 to math.PI/3, with an
    increment of 0.05 between successive values. Then the NumPy variables y1 and y2
    are defined as the sine and cosine values, respectively, of the values in x. The
    next code snippet initializes the variable fig1 that represents a context in which
    the graphics effects will be rendered. This completes the initialization of the
    variables that are used in the two for loops.
  prefs: []
  type: TYPE_NORMAL
- en: The next portion of [Listing 6.11](#list6-11) contains the first for loop that
    creates a gradient-like effect by defining (R,G,B) triples whose values are based
    partially on the value of the loop variable i. For example, the variable rgb1
    ranges in a linear fashion from (0,0,0) to (255,0,0), which represent the colors
    black and red, respectively. The variable rgb2 ranges in a linear fashion from
    (0,0,0) to (255,255,0), which represent the colors black and yellow, respectively.
    The next portion of the for loop contains two invocations of the fig1.line() API
    that renders a sine wave and a cosine wave in the context variable fig1.
  prefs: []
  type: TYPE_NORMAL
- en: 'The second for loop is similar to the first for loop: the main difference is
    that the variable rgb1 varies from black to blue, and the variable rgb2 variables
    from black to green. The final code snippet in [Listing 6.13](#list6-13) invokes
    the show() method that generates an HTML Web page (with the same prefix as the
    Python file) and then launches the Web page in a browser.'
  prefs: []
  type: TYPE_NORMAL
- en: '[Figure 6.8](#fig6-8) displays the graphics effect based on the code in [Listing
    6.11](#list6-11). If this image is displayed as black and white, launch the code
    from the command line and you will see the gradient-like effects in the image.'
  prefs: []
  type: TYPE_NORMAL
- en: '![Images](../images/f0205-01.jpg)'
  prefs: []
  type: TYPE_IMG
- en: '***FIGURE 6.8*** A Bokeh graphics sample.'
  prefs: []
  type: TYPE_NORMAL
- en: The next section introduces you to Scikit-learn, which is a powerful Python-based
    library that supports many algorithms for machine learning. After you have read
    the short introduction, subsequent sections contain Python code samples that combine
    Pandas, Matplotlib, and Scikit-learn built-in datasets.
  prefs: []
  type: TYPE_NORMAL
- en: '**INTRODUCTION TO SCIKIT-LEARN**'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Since this book is about data visualization, you might be wondering why this
    chapter contains an introduction to Scikit-learn (also known as Sklearn ). The
    reason is straightforward: the easy introduction to some Scikit-learn functionality
    is possible without a more formal learning process. In addition, this knowledge
    will bode well if you decide to delve into machine learning (and perhaps this
    section will provide additional motivation to do so).'
  prefs: []
  type: TYPE_NORMAL
- en: However, a thorough understanding of Scikit-learn involves significantly more
    time and effort, especially if you plan to learn the details of the Scikit-learn
    machine learning algorithms. On the other hand, if you are not interested in learning
    about Scikit-learn at this point in time, you can skip this section and perhaps
    return to it when you are interested in learning this material.
  prefs: []
  type: TYPE_NORMAL
- en: 'Scikit-learn is Python’s premier general-purpose machine learning library,
    and its home page is here:'
  prefs: []
  type: TYPE_NORMAL
- en: '*[https://scikit-learn.org/stable/](https://scikit-learn.org/stable/)*'
  prefs: []
  type: TYPE_NORMAL
- en: Before we discuss any code samples, please keep in mind that Scikit-learn is
    an immensely useful Python library that supports a huge number of machine learning
    algorithms. In particular, Scikit-learn supports many classification algorithms,
    such as logistic regression, naive Bayes, decision trees, random forests, and
    SVMs (support vector machines). Although entire books are available that are dedicated
    to Scikit-learn, this chapter contains only a few pages of Scikit-learn material.
  prefs: []
  type: TYPE_NORMAL
- en: If you decide that you want to acquire a deep level of knowledge about Scikit-learn,
    navigate to the Web pages that contain very detailed documentation for Scikit-learn.
    Moreover, if you have “how to” questions involving Scikit-learn, you can almost
    always find suitable answers on stack overflow (*[https://stackoverflow.com/](https://stackoverflow.com/)*).
  prefs: []
  type: TYPE_NORMAL
- en: Scikit-learn is well-suited for classification tasks as well as regression and
    clustering tasks in machine learning. Scikit-learn supports a vast collection
    of ML algorithms, including linear regression, logistic regression, kNN (“K nearest
    neighbor”), kMeans, decision trees, random forests, MLPs (multilayer perceptrons),
    and SVMs (support vector machines).
  prefs: []
  type: TYPE_NORMAL
- en: Moreover, Scikit-learn supports dimensionality reduction techniques such as
    PCA (principal component analysis), “hyper parameter” tuning, methods for scaling
    data, and is suitable for preprocessing data, cross-validation, and so forth.
  prefs: []
  type: TYPE_NORMAL
- en: Machine learning code samples often contain a combination of Scikit-learn, NumPy,
    Pandas, and Matplotlib. In addition, Scikit-learn provides various built-in datasets
    that we can display visually. One of those datasets is the Digits dataset, which
    is the topic of the next section.
  prefs: []
  type: TYPE_NORMAL
- en: The next section of this chapter provides several Python code samples that contain
    a combination of Pandas, Matplotlib, and the Scikit-learn built-in Digits dataset.
  prefs: []
  type: TYPE_NORMAL
