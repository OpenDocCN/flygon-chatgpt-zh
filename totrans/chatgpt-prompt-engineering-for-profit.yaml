    ****invo**lvin**g ****mul**tipl**e ****stak**eholde**rs ****wi**th** ****diff**eren**t
    ****inte**rest**s. ****I**t** ****i**s** ****id**eal** ****f**or** ****situ**ation**s
    ****wh**ere** ****th**ere** ****i**s** ****a**** ****ne**ed** ****t**o** ****fi**nd**
    ****co**mmo**n ****gr**oun**d, ****su**ch** ****a**s** ****i**n** ****poli**tica**l
    ****deb**ate**s, ****bus**ines**s ****nego**tiatio**ns, ****o**r** ****comm**unit**y
    ****con**flic**t ****reso**lutio**n.'
  id: totrans-933
  prefs: []
  type: TYPE_NORMAL
  zh: '**共识构建**提示应**在**涉及**多个具有不同**利益**的**持股人**的**复杂问题**时**使用**。它**理想**适用于**需要找到共同基础**的情况，例如在**政治辩论**、**商业谈判**或**社区冲突解决**中。'
- en: '****I**t** ****i**s** ****reco**mmende**d ****i**n** ****pla**nnin**g ****con**text**s,
    ****wh**ere** ****t**he** ****a**im** ****i**s** ****t**o** ****cr**eat**e ****stra**tegie**s
    ****th**at** ****ben**efi**t ****t**he** ****gre**ates**t ****pos**sibl**e ****nu**mbe**r
    ****o**f** ****stak**eholde**rs . ****F**or** ****exa**mpl**e, ****wh**en** ****pla**nnin**g
    ****a**** ****n**ew** ****pu**bli**c ****po**lic**y, ****i**t** ****i**s** ****impo**rtan**t
    ****t**o** ****ta**ke** ****in**to** ****acc**oun**t ****t**he** ****opi**nion**s
    ****o**f** ****cit**izen**s, ****t**he** ****pri**vat**e ****se**cto**r ****a**nd**
    ****auth**oritie**s, ****s**o** ****th**at** ****t**he** ****fi**nal** ****pro**posa**l
    ****i**s** ****bal**ance**d ****a**nd** ****wi**del**y ****acc**epte**d.'
  id: totrans-934
  prefs: []
  type: TYPE_NORMAL
  zh: 在规划背景下，**推荐**制定能够**最大程度**地**受益**于**最大可能数量**的**持股人**的策略。例如，在规划一项新的**公共政策**时，**必须**考虑到**公民**、**私营部门**和**当局**的意见，以确保**最终提案**是**平衡**且**广泛接受**的。
- en: '****Addi**tional**ly, ****th**is** ****tech**niqu**e ****c**an** ****b**e**
    ****us**ed** ****i**n** ****deb**ate**s ****a**nd** ****disc**ussion**s ****t**o**
    ****edu**cat**e ****pe**opl**e ****o**n** ****t**he** ****impo**rtanc**e ****o**f**
    ****cons**iderin**g ****diff**eren**t ****pers**pectiv**es ****a**nd** ****prom**otin**g
    ****colla**borati**ve ****solu**tion**s ****ra**the**r ****th**an** ****pola**rize**d
    ****a**nd** ****unil**atera**l ****appr**oache**s.'
  id: totrans-935
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，这种技巧可用于辩论和讨论中，以教育人们考虑不同视角的重要性，并促进合作解决方案，而不是极端和单方面的方法。
