- en: '****1**3**. ****Iter**ativ**e ****Refi**nemen**t (****Iter**ativ**e ****Refi**nemen**t)'
  id: totrans-653
  prefs: []
  type: TYPE_NORMAL
  zh: '****1**3**. ****迭代改进 (****迭代改进)'
- en: '[****Wh**at** ****i**s** ]'
  id: totrans-654
  prefs: []
  type: TYPE_NORMAL
  zh: '[****什么是 ]'
- en: '****Iter**ativ**e ****Refi**nemen**t , ****o**r** ****Iter**ativ**e ****Refi**nemen**t,
    ****i**s** ****a**** ****pr**omp**t ****engi**neerin**g ****tech**niqu**e ****th**at**
    ****inv**olve**s ****ref**inin**g ****a**** ****res**pons**e ****ov**er** ****mul**tipl**e
    ****ro**und**s ****b**y** ****as**kin**g ****t**he** ****L**LM** ****t**o** ****imp**rov**e
    ****t**he** ****res**pons**e ****ba**sed** ****o**n** ****incr**ementa**l ****fee**dbac**k.
    ****Wi**th** ****ea**ch** ****n**ew** ****iter**atio**n, ****t**he** ****mo**del**
    ****ma**kes** ****adju**stment**s ****t**o** ****imp**rov**e ****spe**cifi**c
    ****asp**ect**s ****o**f** ****t**he** ****res**pons**e, ****su**ch** ****a**s**
    ****cla**rit**y, ****prec**isio**n, ****st**yle**, ****o**r** ****de**pth**, ****un**til**
    ****i**t** ****rea**che**s ****a**** ****sati**sfacto**ry ****le**vel**.'
  id: totrans-655
  prefs: []
  type: TYPE_NORMAL
  zh: '****迭代改进，或称为迭代改进，是一种提示工程技术，涉及通过询问LLM根据增量反馈改进响应来多次迭代地改进响应。在每次新的迭代中，模型都会调整以改进响应的特定方面，例如清晰度、精确度、风格或深度，直到达到令人满意的水平。'
- en: '****Un**lik**e ****a**** ****si**ngl**e ****fee**dbac**k ****lo**op** , ****Iter**ativ**e
    ****Refi**nemen**t ****inv**olve**s ****mul**tipl**e ****refi**nemen**t ****st**eps**.
    ****T**he** ****fo**cus** ****i**s** ****o**n** ****cont**inuous**ly ****impr**ovin**g
    ****t**he** ****an**swe**r, ****wi**th** ****ea**ch** ****ro**und** ****o**f**
    ****rev**isio**n ****be**ing** ****mo**re** ****spe**cifi**c ****th**an** ****t**he**
    ****pre**viou**s ****o**ne**. ****Th**us**, ****th**is** ****me**tho**d ****ai**ms**
    ****t**o** ****en**sur**e ****th**at** ****t**he** ****fi**nal** ****an**swe**r
    ****i**s** ****cl**ear**, ****cor**rec**t, ****a**nd** ****perf**ectl**y ****ali**gne**d
    ****wi**th** ****t**he** ****us**er**’****s**** ****expe**ctatio**ns.'
  id: totrans-656
  prefs: []
  type: TYPE_NORMAL
  zh: '****与单个反馈回路不同，迭代改进涉及多个改进步骤。重点是持续改进答案，每一轮修订都比上一轮更具体。因此，这种方法旨在确保最终答案是清晰、正确且与用户的期望完美对齐。'
- en: '[****Wh**at** ****i**s** ****yo**ur** ****ma**in** ****obje**ctiv**e ]'
  id: totrans-657
  prefs: []
  type: TYPE_NORMAL
  zh: '[****你的主要目标是什么 ]'
- en: '****T**he** ****ma**in** ****obje**ctiv**e ****o**f** ****Iter**ativ**e ****Refi**nemen**t
    ****i**s** ****achi**evin**g ****t**he** ****hig**hes**t ****pos**sibl**e ****qua**lit**y
    ****f**or** ****a**** ****res**pons**e ****b**y** ****ref**inin**g ****i**t**
    ****a**t** ****mul**tipl**e ****le**vel**s. ****B**y** ****revi**ewin**g ****t**he**
    ****res**pons**e ****a**t** ****mul**tipl**e ****st**age**s, ****t**he** ****mo**del**
    ****i**s** ****ab**le** ****t**o** ****ide**ntif**y ****a**nd** ****cor**rec**t
    ****pote**ntia**l ****fl**aws**, ****elim**inat**e ****ambi**guitie**s, ****a**nd**
    ****a**dd** ****det**ail**s ****th**at** ****ma**ke** ****t**he** ****con**ten**t
    ****mo**re** ****val**uabl**e ****a**nd** ****acc**urat**e.'
  id: totrans-658
  prefs: []
  type: TYPE_NORMAL
  zh: '****迭代改进的主要目标是通过对响应进行多级改进，以实现响应的最高可能质量。通过在多个阶段审查响应，模型可以识别和纠正潜在缺陷，消除歧义，并添加使内容更具价值和准确性的细节。'
- en: '****Ano**the**r ****go**al** ****i**s** ****t**o** ****ma**ke** ****t**he**
    ****res**pons**e ****mo**re** ****tar**gete**d ****t**o** ****t**he** ****spe**cifi**c
    ****aud**ienc**e ****o**r** ****con**tex**t. ****Wi**th** ****ea**ch** ****iter**atio**n,
    ****t**he** ****res**pons**e ****c**an** ****b**e** ****ref**ine**d ****t**o**
    ****su**it** ****a**** ****spe**cifi**c ****aud**ienc**e, ****ad**apt** ****t**he**
    ****to**ne** ****acco**rdin**g ****t**o** ****t**he** ****pur**pos**e, ****a**nd**
    ****imp**rov**e ****cohe**renc**e. ****T**he** ****tech**niqu**e ****ai**ms**
    ****t**o** ****ma**ke** ****commu**nicati**on ****mo**re** ****effe**ctiv**e ****b**y**
    ****ens**urin**g ****th**at** ****t**he** ****mes**sag**e ****i**s** ****con**veye**d
    ****a**s** ****cle**arl**y ****a**nd** ****appro**priate**ly ****a**s** ****pos**sibl**e.'
  id: totrans-659
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个目标是使响应更加针对特定的受众或情境。在每次迭代中，响应可以根据特定受众进行调整，根据目的调整语调，并提高连贯性。该技术旨在通过确保信息尽可能清晰和恰当地传达来使沟通更有效。
- en: '[****H**ow** ****i**t** ****wo**rks** ]'
  id: totrans-660
  prefs: []
  type: TYPE_NORMAL
  zh: '[****H**ow** ****i**t** ****wo**rks** ]'
- en: '****Iter**ativ**e ****Refi**nemen**t ****wo**rks** ****thr**oug**h ****a****
    ****se**rie**s ****o**f** ****st**eps** ****i**n** ****wh**ich** ****t**he** ****L**LM**
    ****i**s** ****gu**ide**d ****t**o** ****imp**rov**e ****i**ts** ****res**pons**e
    ****ba**sed** ****o**n** ****spe**cifi**c ****cri**teri**a ****pro**vide**d ****b**y**
    ****t**he** ****us**er**. ****Af**ter** ****gene**ratin**g ****a**n** ****ini**tia**l
    ****res**pons**e, ****t**he** ****L**LM** ****i**s** ****inst**ructe**d ****t**o**
    ****re**vie**w ****a**nd** ****ad**jus**t ****i**t**. ****Th**ese** ****adju**stment**s
    ****m**ay** ****b**e** ****t**o** ****a**dd** ****mo**re** ****de**tai**l, ****sim**plif**y,
    ****cla**rif**y ****cer**tai**n ****po**int**s, ****o**r** ****elim**inat**e ****ambi**guitie**s.'
  id: totrans-661
  prefs: []
  type: TYPE_NORMAL
  zh: '**迭代改进**通过一系列步骤进行，其中LLM根据用户提供的特定标准来指导其响应的改进。在生成初始响应后，LLM被指导进行审查和调整。这些调整可能包括添加更多细节、简化、澄清某些点或消除歧义。'
- en: '****T**he** ****us**er** ****c**an** ****gu**ide** ****ea**ch** ****iter**atio**n
    ****wi**th** ****spe**cifi**c ****ques**tion**s, ****su**ch** ****a**s** “****Exp**lai**n
    ****mo**re** ****ab**out** ****pa**rt** ****X****,” “****Sim**plif**y ****t**he**
    ****tech**nica**l ****lan**guag**e,” ****o**r** “****A**dd** ****a**** ****prac**tica**l
    ****exa**mpl**e ****t**o** ****illu**strat**e.” ****I**n** ****th**is** ****w**ay**,
    ****L**LM** ****progr**essive**ly ****imp**rove**s ****a**nd** ****ad**apt**s
    ****t**he** ****an**swe**r ****un**til** ****i**t** ****me**ets** ****exa**ctl**y
    ****wh**at** ****t**he** ****us**er** ****wa**nts**.'
  id: totrans-662
  prefs: []
  type: TYPE_NORMAL
  zh: 用户可以使用具体问题来指导每次迭代，例如“****解释一下X部分”、“****简化技术语言”或“****添加一个实际例子来说明”。通过这种方式，LLM逐步改进和调整其答案，直到完全符合用户的需求。
- en: '****F**or** ****exa**mpl**e, ****wh**en** ****as**ked** ****t**o** ****exp**lai**n
    ****h**ow** ****a**** ****c**ar** ****en**gin**e ****wo**rks**, ****t**he** ****ini**tia**l
    ****res**pons**e ****mi**ght** ****b**e** ****a**** ****ba**sic** ****sum**mar**y.
    ****T**he** ****fi**rst** ****ro**und** ****o**f** ****refi**nemen**t ****mi**ght**
    ****a**sk** ****y**ou** ****t**o** ****a**dd** ****exa**mple**s ****o**f** ****diff**eren**t
    ****ty**pes** ****o**f** ****eng**ine**s, ****t**he** ****se**con**d ****mi**ght**
    ****a**sk** ****y**ou** ****t**o** ****de**tai**l ****t**he** ****int**erna**l
    ****comp**onent**s, ****a**nd** ****t**he** ****th**ird** ****mi**ght** ****fo**cus**
    ****o**n** ****simp**lifyin**g ****t**he** ****lan**guag**e ****f**or** ****a****
    ****l**ay** ****aud**ienc**e.'
  id: totrans-663
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，当被要求解释汽车发动机是如何工作时，最初的回答可能是一个基本的总结。第一次改进可能要求你添加不同类型发动机的例子，第二次可能要求你详细说明内部组件，而第三次可能专注于简化语言以便于普通听众理解。
- en: '[****Wh**en** ****t**o** ****u**se** ]'
  id: totrans-664
  prefs: []
  type: TYPE_NORMAL
  zh: '[何时使用]'
- en: '****Iter**ativ**e ****Refi**nemen**t ****sh**oul**d ****b**e** ****us**ed**
    ****wh**en** ****t**he** ****qua**lit**y ****o**f** ****t**he** ****an**swe**r
    ****ne**eds** ****t**o** ****b**e** ****imp**rove**d ****ov**er** ****mul**tipl**e
    ****st**eps**, ****espe**ciall**y ****o**n** ****com**ple**x ****to**pic**s ****wh**ere**
    ****a**** ****si**ngl**e ****ver**sio**n ****m**ay** ****n**ot** ****b**e** ****suff**icien**t
    ****t**o** ****co**ver** ****a**ll** ****t**he** ****nece**ssar**y ****nua**nce**s.
    ****I**t** ****i**s** ****id**eal** ****f**or** ****deve**lopin**g ****educ**ationa**l,
    ****tech**nica**l, ****o**r** ****cre**ativ**e ****con**ten**t, ****wh**ere**
    ****cont**inuou**s ****refi**nemen**t ****c**an** ****he**lp** ****pro**vid**e
    ****a**** ****mo**re** ****acc**urat**e ****a**nd** ****we**ll**-****tai**lore**d
    ****an**swe**r.'
  id: totrans-665
  prefs: []
  type: TYPE_NORMAL
  zh: 当需要通过多个步骤提高答案质量时，应使用迭代改进，特别是在涉及复杂主题且单次版本可能不足以涵盖所有必要细节的情况下。它非常适合开发教育、技术或创意内容，其中持续的改进可以帮助提供更准确和更贴合的答案。
- en: '****I**t** ****i**s** ****al**so** ****reco**mmende**d ****i**n** ****situ**ation**s
    ****wh**ere** ****t**he** ****ini**tia**l ****L**LM** ****res**pons**e ****i**s**
    ****on**ly** ****a**** ****bas**elin**e, ****a**nd** ****i**t** ****i**s** ****nece**ssar**y
    ****t**o** ****ad**apt** ****i**t** ****t**o** ****t**he** ****spe**cifi**c ****aud**ienc**e
    ****o**r** ****con**tex**t. ****Wh**en** ****dea**lin**g ****wi**th** ****diff**eren**t
    ****audi**ence**s, ****iter**ativ**e ****refi**nemen**t ****c**an** ****b**e**
    ****us**ed** ****t**o** ****ad**jus**t ****t**he** ****le**vel** ****o**f** ****lan**guag**e
    ****a**nd** ****de**pth** ****o**f** ****info**rmatio**n ****acco**rdin**g ****t**o**
    ****t**he** ****re**ade**r''****s**** ****pr**ior** ****know**ledg**e.'
  id: totrans-666
  prefs: []
  type: TYPE_NORMAL
  zh: 它也推荐用于初始 LLM 响应仅作为基准，并且需要根据特定受众或上下文进行调整的情况。当处理不同受众时，迭代改进可以用来调整语言水平和信息深度，以适应读者的先验知识。
- en: '****Furt**hermor**e, ****i**t** ****i**s** ****effe**ctiv**e ****i**n** ****dea**lin**g
    ****wi**th** ****ambi**guit**y, ****a**s** ****b**y** ****cont**inuall**y ****ref**inin**g
    ****t**he** ****res**pons**e, ****t**he** ****L**LM** ****h**as** ****t**he**
    ****oppo**rtunit**y ****t**o** ****cla**rif**y ****po**int**s ****th**at** ****m**ay**
    ****n**ot** ****ha**ve** ****be**en** ****addr**esse**d ****cle**arl**y ****en**oug**h
    ****i**n** ****t**he** ****fi**rst** ****dr**aft**.'
  id: totrans-667
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，在处理歧义时，这种方法也有效，因为通过不断改进回答，LLM 有机会澄清在第一稿中可能没有足够清晰地表达的观点。
- en: '[****Ti**ps** ****f**or** ****u**se**]'
  id: totrans-668
  prefs: []
  type: TYPE_NORMAL
  zh: '[使用技巧]'
- en: ● ****Gu**ide** ****ea**ch** ****iter**atio**n ****i**n** ****a**** ****spe**cifi**c
    ****w**ay**. ****A**sk** ****f**or** ****foc**use**d ****impr**ovemen**ts, ****su**ch**
    ****a**s** “****a**dd** ****tech**nica**l ****det**ail**s” ****o**r** “****sim**plif**y
    ****f**or** ****a**** ****beg**inne**r ****aud**ienc**e,” ****t**o** ****en**sur**e
    ****ea**ch** ****rev**isio**n ****h**as** ****a**** ****cl**ear** ****pur**pos**e.
  id: totrans-669
  prefs: []
  type: TYPE_NORMAL
  zh: ● 以一种特定方式**指导**每一轮迭代。**要求**有针对性的改进，例如“**增加技术细节**”或“**简化以适应初学者听众**”，以确保每次修订都有一个明确的目的。
- en: ● ****U**se** ****mul**tipl**e ****iter**ation**s ****t**o** ****re**vie**w
    ****diff**eren**t ****asp**ect**s ****o**f** ****t**he** ****res**pons**e. ****F**or**
    ****exa**mpl**e, ****fo**cus** ****o**n** ****t**he** ****de**pth** ****o**f**
    ****t**he** ****res**pons**e ****fi**rst**, ****th**en** ****o**n** ****cla**rit**y,
    ****a**nd** ****fin**all**y ****o**n** ****adju**stin**g ****t**he** ****to**ne**.
  id: totrans-670
  prefs: []
  type: TYPE_NORMAL
  zh: ● 使用多轮迭代来审查响应的不同方面。例如，首先关注响应的深度，然后是清晰度，最后是调整语调。
- en: '[****T**he** ****diff**erenc**e ****o**f** ****t**he** ****tech**niqu**e ]'
  id: totrans-671
  prefs: []
  type: TYPE_NORMAL
  zh: '[**技术差异**]'
- en: '****Iter**ativ**e ****Refi**nemen**t ****i**s** ****diff**eren**t ****fr**om**
    ****Fee**dbac**k ****Lo**op** ****Prom**ptin**g ****i**n** ****th**at** ****wh**ile**
    ****Fee**dbac**k ****Lo**op** ****m**ay** ****inv**olv**e ****o**ne** ****o**r**
    ****t**wo** ****revi**sion**s ****t**o** ****imp**rov**e ****t**he** ****res**pons**e,
    ****Iter**ativ**e ****Refi**nemen**t ****i**s** ****a**** ****mo**re** ****i**n**-****de**pth**
    ****a**nd** ****cont**inuou**s ****pro**ces**s ****wh**ere** ****mul**tipl**e
    ****ro**und**s ****o**f** ****refi**nemen**t ****a**re** ****us**ed** ****t**o**
    ****ach**iev**e ****a**** ****hi**ghe**r ****le**vel** ****o**f** ****qua**lit**y.'
  id: totrans-672
  prefs: []
  type: TYPE_NORMAL
  zh: '**迭代优化**与**反馈循环提示**不同，在于**反馈循环提示**可能只涉及一到两次修订来改进响应，而**迭代优化**是一个更深入和持续的流程，使用多轮优化来达到更高的质量水平。'
- en: '****Com**pare**d ****t**o** ****F**ew**-****sh**ot** ****Prom**ptin**g , ****wh**ere**
    ****exa**mple**s ****a**re** ****us**ed** ****t**o** ****gu**ide** ****t**he**
    ****fo**rma**t ****o**f** ****t**he** ****an**swe**r, ****Iter**ativ**e ****Refi**nemen**t
    ****foc**use**s ****o**n** ****cont**inuall**y ****adju**stin**g ****a**nd** ****impr**ovin**g
    ****t**he** ****an**swe**r ****af**ter** ****t**he** ****fi**rst** ****ver**sio**n
    ****i**s** ****gene**rate**d. ****Th**is** ****tech**niqu**e ****i**s** ****le**ss**
    ****ab**out** ****tea**chin**g ****t**he** ****fo**rma**t ****a**nd** ****mo**re**
    ****ab**out** ****incre**mental**ly ****impr**ovin**g ****t**he** ****qua**lit**y
    ****o**f** ****t**he** ****an**swe**r.'
  id: totrans-673
  prefs: []
  type: TYPE_NORMAL
  zh: 与**少样本提示**相比，后者使用示例来指导答案的格式，**迭代优化**专注于在生成第一个版本后持续调整和改进答案。这种技术更少关注于教学格式，而更多关注于逐步提高答案的质量。
- en: '****Rega**rdin**g ****Se**lf**- ****Refl**ectiv**e ****Prom**ptin**g , ****wh**ere**
    ****t**he** ****mo**del** ****se**lf**-****ref**lect**s ****t**o** ****imp**rov**e
    ****i**ts** ****res**pons**e ****on**ce**, ****Iter**ativ**e ****Refi**nemen**t
    ****i**s** ****a**** ****cont**inuou**s ****pro**ces**s ****invo**lvin**g ****mul**tipl**e
    ****ro**und**s ****o**f** ****tu**nin**g, ****ens**urin**g ****de**epe**r ****a**nd**
    ****mo**re** ****compr**ehensi**ve ****refi**nemen**t.'
  id: totrans-674
  prefs: []
  type: TYPE_NORMAL
  zh: '**关于自我反思提示**，其中模型自我反思以提高其响应的准确性，**迭代优化**是一个涉及多轮调整的持续过程，确保更深入和更全面的优化。'
- en: '[****Exa**mple**s]'
  id: totrans-675
  prefs: []
  type: TYPE_NORMAL
  zh: '[**示例**]'
- en: '●        ****Ba**sic** :'
  id: totrans-676
  prefs: []
  type: TYPE_NORMAL
  zh: ● **基本**：
- en: '○        ****Que**stio**n : "****Wh**at** ****i**s** ****rene**wabl**e ****en**erg**y?
    "'
  id: totrans-677
  prefs: []
  type: TYPE_NORMAL
  zh: ○ 问题：**什么是可再生能源？**
- en: '○ ****Ini**tia**l ****An**swe**r : "****Rene**wabl**e ****en**erg**y ****i**s**
    ****en**erg**y ****th**at** ****co**mes** ****fr**om** ****nat**ura**l ****sou**rce**s,
    ****su**ch** ****a**s** ****t**he** ****s**un** ****a**nd** ****wi**nd**. "'
  id: totrans-678
  prefs: []
  type: TYPE_NORMAL
  zh: '○ ****初始答案 : "****可再生能源****是来自自然资源的能量，如阳光和风。"'
- en: '○        ****Fi**rst** ****Iter**atio**n (****Refi**nemen**t) : "****N**ow**,
    ****exp**lai**n ****i**n** ****mo**re** ****de**tai**l ****h**ow** ****so**lar**
    ****a**nd** ****wi**nd** ****en**erg**y ****wo**rk** ."'
  id: totrans-679
  prefs: []
  type: TYPE_NORMAL
  zh: '○        ****第一次迭代（细化） : "****现在，更详细地解释太阳能和风能是如何工作的。"'
- en: '○ ****Ref**ine**d ****An**swe**r : "****So**lar** ****en**erg**y ****i**s**
    ****obt**aine**d ****thr**oug**h ****pa**nel**s ****th**at** ****cap**tur**e ****sun**ligh**t
    ****a**nd** ****tran**sfor**m ****i**t** ****in**to** ****elec**tricit**y. ****Wi**nd**
    ****en**erg**y ****i**s** ****gene**rate**d ****b**y** ****t**he** ****mov**emen**t
    ****o**f** ****tur**bin**e ****bl**ade**s, ****wh**ich** ****a**re** ****dr**ive**n
    ****b**y** ****t**he** ****fo**rce** ****o**f** ****t**he** ****wi**nd**. "'
  id: totrans-680
  prefs: []
  type: TYPE_NORMAL
  zh: '○ ****细化答案 : "****通过面板获取太阳能，这些面板捕获阳光并将其转化为电力。风能是通过风力驱动涡轮叶片产生的，这些叶片由风力驱动。"'
- en: '○        ****Se**con**d ****Iter**atio**n (****Refi**nemen**t) : "****Sim**plif**y
    ****t**he** ****expl**anatio**n ****f**or** ****a**** ****ch**ild**. "'
  id: totrans-681
  prefs: []
  type: TYPE_NORMAL
  zh: '○        ****第二次迭代（细化） : "****简化解释，以便孩子理解。"'
- en: '○ ****Imp**rove**d ****An**swe**r : "****Rene**wabl**e ****en**erg**y ****i**s**
    ****wh**en** ****w**e** ****u**se** ****th**ing**s ****fr**om** ****na**tur**e,
    ****li**ke** ****t**he** ****s**un** ****a**nd** ****wi**nd**, ****t**o** ****ma**ke**
    ****elec**tricit**y. ****F**or** ****exa**mpl**e, ****w**e** ****u**se** ****pa**nel**s
    ****t**o** ****tu**rn** ****sun**ligh**t ****in**to** ****en**erg**y, ****a**nd**
    ****w**e** ****u**se** ****wi**nd** ****t**o** ****tu**rn** ****prop**eller**s
    ****a**nd** ****pro**duc**e ****elec**tricit**y. "'
  id: totrans-682
  prefs: []
  type: TYPE_NORMAL
  zh: '○ ****改进答案 : "****可再生能源****是指我们使用自然界的资源，如阳光和风，来发电。例如，我们使用面板将阳光转化为能量，并使用风力驱动螺旋桨产生电力。"'
- en: '●        ****Inte**rmedia**ry :'
