- en: SUMMARY
  prefs: []
  type: TYPE_NORMAL
- en: This chapter introduced you to Pandas for creating labeled data frames and displaying
    the metadata of data frames. Then you learned how to create data frames from various
    sources of data, such as random numbers and hard-coded data values. In addition,
    you saw how to perform column-based and row-based operations in Pandas data frames.
  prefs: []
  type: TYPE_NORMAL
- en: You also learned how to read Excel spreadsheets and perform numeric calculations
    on the data in those spreadsheets, such as the minimum, mean, and maximum values
    in numeric columns. Then, you saw how to create Pandas data frames from data stored
    in CSV files.
  prefs: []
  type: TYPE_NORMAL
- en: CHAPTER 2
  prefs: []
  type: TYPE_NORMAL
- en: INTRODUCTION TO MACHINE LEARNING
  prefs: []
  type: TYPE_NORMAL
- en: This chapter introduces numerous concepts in machine learning, such as feature
    selection, feature engineering, data cleaning, training sets, and test sets.
  prefs: []
  type: TYPE_NORMAL
- en: The first part of this chapter briefly discusses machine learning and the sequence
    of steps that are typically required to prepare a dataset. These steps include
    “feature selection” or “feature extraction” that can be performed using various
    algorithms.
  prefs: []
  type: TYPE_NORMAL
- en: The second section describes the types of data that you can encounter, issues
    that can arise with the data in datasets, and how to rectify them. You will also
    learn about the difference between “hold out” and “k-fold” when you perform the
    training step.
  prefs: []
  type: TYPE_NORMAL
- en: The third part of this chapter briefly discusses the basic concepts involved
    in linear regression. Although linear regression was developed more than 200 years
    ago, this technique is still one of the core techniques for solving (albeit simple)
    problems in statistics and machine learning. In fact, the technique known as the
    Mean Squared Error (MSE) for finding a best-fitting line for data points in a
    2D plane (or a hyperplane for higher dimensions) is implemented in Python to minimize
    loss functions that are discussed later.
  prefs: []
  type: TYPE_NORMAL
- en: The fourth section in this chapter contains additional code samples involving
    linear regression tasks using standard techniques in NumPy. Hence, if you are
    comfortable with this topic, you can probably skim quickly through the first two
    sections of this chapter.
  prefs: []
  type: TYPE_NORMAL
- en: WHAT IS MACHINE LEARNING?
  prefs: []
  type: TYPE_NORMAL
- en: In high level terms, machine learning is a subset of AI that can solve tasks
    that are infeasible or too cumbersome with traditional programming languages.
    A spam filter for email is an early example of machine learning. Machine learning
    generally supersedes the accuracy of older algorithms.
  prefs: []
  type: TYPE_NORMAL
- en: Despite the variety of machine learning algorithms, the data is arguably more
    important than the selected algorithm. Many issues can arise with data, such as
    insufficient data, poor quality of data, incorrect data, missing data, irrelevant
    data, and duplicate data values. Later in this chapter, you will see techniques
    that address many of these data-related issues.
  prefs: []
  type: TYPE_NORMAL
- en: If you are unfamiliar with machine learning terminology, a dataset is a collection
    of data values, which can be in the form of a CSV file or a spreadsheet. Each
    column is called a feature, and each row is a datapoint that contains a set of
    specific values for each feature. If a dataset contains information about customers,
    then each row pertains to a specific customer.
  prefs: []
  type: TYPE_NORMAL
- en: Types of Machine Learning
  prefs: []
  type: TYPE_NORMAL
- en: 'There are three main types of machine learning (combinations of these are also
    possible) that you will encounter:'
  prefs: []
  type: TYPE_NORMAL
- en: Supervised learning
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Unsupervised learning
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Semi-supervised learning
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Supervised learning means that the datapoints in a dataset have a label that
    identifies its contents. For example, the MNIST dataset contains 28x28 PNG files,
    each of which contains a single hand-drawn digit (i.e., 0 through 9 inclusive).
    Every image with the digit 0 has the label “0,” every image with the digit 1 has
    the label “1,” and all other images are labeled according to the digit that is
    displayed in those images.
  prefs: []
  type: TYPE_NORMAL
- en: 'As another example, the columns in the Titanic dataset are features about passengers,
    such as their gender, cabin class, price of their ticket, and whether the passenger
    survived. Each row contains information about a single passenger, including the
    value 1 if the passenger survived. The MNIST dataset and the Titanic dataset involve
    classification tasks: the goal is to train a model and then predict the class
    (MNIST) or survival (Titanic) of each row in a test dataset.'
  prefs: []
  type: TYPE_NORMAL
- en: 'In general, the datasets for classification tasks have a small number of possible
    values: one of nine digits in the range of 0 through 9, one of four animals (dog,
    cat, horse, giraffe), or one of two values (survived versus perished, purchased
    versus not purchased). In general, if the number of outcomes can be displayed
    reasonably well in a drop-down list, then it is probably a classification task.'
  prefs: []
  type: TYPE_NORMAL
- en: 'In the case of a dataset that contains real estate data, each row contains
    information about a specific house, such as the number of bedrooms, square feet
    of the house, number of bathrooms, and price of the house. In this dataset, the
    price of the house is the label for each row. Notice that the range of possible
    prices is too large to fit reasonably well in a drop-down list. A real estate
    dataset involves a regression task: the goal is to train a model based on a training
    dataset and then predict the price of each house in a test dataset.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Unsupervised learning involves unlabeled data, which is typically the case
    for clustering algorithms (discussed later). Some important unsupervised learning
    algorithms that involve clustering are listed below:'
  prefs: []
  type: TYPE_NORMAL
- en: k-means
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Hierarchical Cluster Analysis (HCA)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Expectation Maximization
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Some important unsupervised learning algorithms that involve dimensionality
    reduction (discussed in more detail later) are listed below:'
  prefs: []
  type: TYPE_NORMAL
- en: PCA (Principal Component Analysis)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Kernel PCA
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: LLE (Locally Linear Embedding)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: t-SNE (t-distributed Stochastic Neighbor Embedding)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: There is one more very important unsupervised task called anomaly detection.
    This task is relevant for fraud detection and detecting outliers (discussed later
    in more detail).
  prefs: []
  type: TYPE_NORMAL
- en: 'Semi-supervised learning is a combination of supervised and unsupervised learning:
    some datapoints are labeled and some are unlabeled. One technique involves using
    the labeled data to classify (i.e., label) the unlabeled data, after which you
    can apply a classification algorithm.'
  prefs: []
  type: TYPE_NORMAL
- en: TYPES OF MACHINE LEARNING ALGORITHMS
  prefs: []
  type: TYPE_NORMAL
- en: 'There are three main types of machine learning algorithms:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Regression (ex: linear regression)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Classification (ex: k-nearest neighbors)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Clustering (ex: k-means)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Regression is a supervised learning technique to predict numerical quantities.
    An example of a regression task is predicting the value of a particular stock.
    Note that this task is different from predicting whether the value of a particular
    stock will increase or decrease tomorrow (or some other future time period). Another
    example of a regression task involves predicting the loss of a house in a real
    estate dataset. Both of these tasks are examples of a regression task.
  prefs: []
  type: TYPE_NORMAL
- en: Regression algorithms in machine learning include linear regression and generalized
    linear regression (also called multivariate analysis in traditional statistics).
  prefs: []
  type: TYPE_NORMAL
- en: Classification is also a supervised learning technique, but it is for predicting
    categorical quantities. An example of a classification task is detecting the occurrence
    of spam, fraud, or determining the digit in a PNG file (such as the MNIST dataset).
    In this case, the data is already labeled, so you can compare the prediction with
    the label that was assigned to the given PNG.
  prefs: []
  type: TYPE_NORMAL
- en: 'Classification algorithms in machine learning include the following list of
    algorithms (they are discussed in greater detail in the next chapter):'
  prefs: []
  type: TYPE_NORMAL
- en: Decision Trees (a single tree)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Random Forests (multiple trees)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: kNN (k-Nearest Neighbors)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Logistic regression (despite its name)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Naïve Bayes
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: SVM (Support Vector Machines)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Some machine learning algorithms (such as SVMs, random forests, and kNN) support
    regression as well as classification. In the case of SVMs, the scikit-learn implementation
    of this algorithm provides two APIs: SVC for classification and SVR for regression.'
  prefs: []
  type: TYPE_NORMAL
- en: Each of the preceding algorithms involves a model that is trained on a dataset,
    after which the model is used to make a prediction. By contrast, a random forest
    consists of multiple independent trees (the number is specified by you), and each
    tree makes a prediction regarding the value of a feature. If the feature is numeric,
    take the mean or the mode (or perform some other calculation) to determine the
    “final” prediction. If the feature is categorical, use the mode (i.e., the most
    frequently occurring class) as the result; in the case of a tie, you can select
    one of them in a random fashion.
  prefs: []
  type: TYPE_NORMAL
- en: 'Incidentally, the following URL contains more information regarding the kNN
    algorithm for classification as well as regression:'
  prefs: []
  type: TYPE_NORMAL
- en: '[http://saedsayad.com/k_nearest_neighbors_reg.htm](http://saedsayad.com/k_nearest_neighbors_reg.htm)'
  prefs: []
  type: TYPE_NORMAL
- en: Clustering is an unsupervised learning technique for grouping similar data together.
    Clustering algorithms put data points in different clusters without knowing the
    nature of the data points. After the data has been separated into different clusters,
    you can use the SVM algorithm to perform classification.
  prefs: []
  type: TYPE_NORMAL
- en: 'Clustering algorithms in machine learning include the following (some of which
    are variations of each other):'
  prefs: []
  type: TYPE_NORMAL
- en: k-means
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: mean shift
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Hierarchical Cluster Analysis (HCA)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Expectation Maximization
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Keep in mind the following points. First, the value of k in k-means is a hyper
    parameter, and it is usually an odd number to avoid ties between two classes.
    Next, the mean shift algorithm incorporates the k-means algorithm that does not
    require you to specify a value for k. In fact, the mean shift algorithm determines
    the optimal number of clusters. However, this algorithm does not scale well for
    large datasets.
  prefs: []
  type: TYPE_NORMAL
- en: Machine Learning Tasks
  prefs: []
  type: TYPE_NORMAL
- en: Unless you have a dataset that has already been sanitized, you need to examine
    the data in a dataset to make sure that it is in a suitable condition. The data
    preparation phase involves examining the rows (“data cleaning”) to ensure that
    they contain valid data (which might require domain-specific knowledge) and examining
    the columns (feature selection or feature extraction) to determine whether you
    can retain only the most important columns.
  prefs: []
  type: TYPE_NORMAL
- en: 'A high-level list of the sequence of machine learning tasks (some of which
    might not be required) is shown below:'
  prefs: []
  type: TYPE_NORMAL
- en: Obtain a dataset
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Data cleaning
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Feature selection
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Dimensionality reduction
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Algorithm selection
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Train-vs.-test data
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Training a model
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Testing a model
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Fine-tuning a model
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Obtain metrics for the model
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: First, you obviously need to obtain a dataset for your task. In the ideal scenario,
    this dataset already exists; otherwise, you need to cull the data from one or
    more data sources (e.g., a CSV file, relational database, no-SQL database, and
    Web service).
  prefs: []
  type: TYPE_NORMAL
- en: 'Second, you need to perform data cleaning, which you can do via the following
    techniques:'
  prefs: []
  type: TYPE_NORMAL
- en: Missing Value Ratio
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Low Variance Filter
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: High Correlation Filter
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'In general, data cleaning involves checking the data values in a dataset to
    resolve one or more of the following:'
  prefs: []
  type: TYPE_NORMAL
- en: fix incorrect values
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: resolve duplicate values
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: resolve missing values
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: decide what to do with outliers
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Use the Missing Value Ratio technique if the dataset has too many missing values.
    In extreme cases, you might be able to drop features with a large number of missing
    values. Use the Low Variance filter technique to identify and drop features with
    constant values from the dataset. Use the High Correlation filter technique to
    find highly correlated features, which increase multicollinearity in the dataset:
    such features can be removed from a dataset (but check with your domain expert
    before doing so).'
  prefs: []
  type: TYPE_NORMAL
- en: Depending on your background and the nature of the dataset, you might need to
    work with a domain expert, who is a person with a deep understanding of the contents
    of the dataset.
  prefs: []
  type: TYPE_NORMAL
- en: For example, you can use a statistical value (mean, mode, and so forth) to replace
    incorrect values with suitable values. Duplicate values can be handled in a similar
    fashion. You can replace missing numeric values with zero, the minimum, the mean,
    the mode, or the maximum value in a numeric column. You can replace missing categorical
    values with the mode of the categorical column.
  prefs: []
  type: TYPE_NORMAL
- en: 'If a row in a dataset contains a value that is an outlier, you have three choices:'
  prefs: []
  type: TYPE_NORMAL
- en: delete the row
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: keep the row
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: replace the outlier with some other value (mean?)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: When a dataset contains an outlier, you need to make a decision based on domain
    knowledge that is specific to the given dataset.
  prefs: []
  type: TYPE_NORMAL
- en: Suppose that a dataset contains stock-related information. As you know, there
    was a stock market crash in 1929, which you can view as an outlier. Such an occurrence
    is rare, but it can contain meaningful information. Incidentally, the source of
    wealth for some families in the twentieth century was based on buying massive
    amounts of stock are very low prices during the Great Depression.
  prefs: []
  type: TYPE_NORMAL
- en: FEATURE ENGINEERING, SELECTION, AND EXTRACTION
  prefs: []
  type: TYPE_NORMAL
- en: 'In addition to creating a dataset and “cleaning” its values, you also need
    to examine the features in that dataset to determine whether you can reduce the
    dimensionality (i.e., the number of features) of the dataset. The process for
    doing so involves three main techniques:'
  prefs: []
  type: TYPE_NORMAL
- en: feature engineering
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: feature selection
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: feature extraction (also called “feature projection”)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Feature engineering is the process of determining a new set of features that
    are based on a combination of existing features to create a meaningful dataset
    for a given task. Domain expertise is often required for this process, even in
    the cases of relatively simple datasets. Feature engineering can be tedious and
    expensive, and in some cases, you might consider using automated feature learning.
    After you have created a dataset, it is a good idea to perform feature selection
    or feature extraction (or both) to ensure that you have a high-quality dataset.
  prefs: []
  type: TYPE_NORMAL
- en: 'Feature selection is also called “variable selection,” “attribute selection,”
    or “variable subset selection.” Feature selection involves selecting a subset
    of relevant features in a dataset. In essence, feature selection involves selecting
    the most important features in a dataset, which provides these advantages:'
  prefs: []
  type: TYPE_NORMAL
- en: reduced training time
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: simpler models that are easier to interpret
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: avoidance of the curse of dimensionality
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: better generalization due to a reduction in overfitting (“reduction of variance”)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Feature selection techniques are often used in domains where there are many
    features and comparatively few samples (or data points). Keep in mind that a low-value
    feature can be redundant or irrelevant, which are two different concepts. For
    instance, a relevant feature might be redundant when it is combined with another
    strongly correlated feature.
  prefs: []
  type: TYPE_NORMAL
- en: 'Feature selection can use three strategies: the filter strategy (e.g., information
    gain), wrapper strategy (e.g., search guided by accuracy), and embedded strategy
    (prediction errors are used to determine whether features are included or excluded
    while developing a model). On other interesting point is that feature selection
    can also be useful for regression as well as classification tasks.'
  prefs: []
  type: TYPE_NORMAL
- en: Feature extraction creates new features from functions that produce combinations
    of the original features. By contrast, feature selection involves determining
    a subset of the existing features.
  prefs: []
  type: TYPE_NORMAL
- en: Feature selection and feature extraction both result in dimensionality reduction
    for a given dataset, which is the topic of the next section.
  prefs: []
  type: TYPE_NORMAL
- en: DIMENSIONALITY REDUCTION
  prefs: []
  type: TYPE_NORMAL
- en: Dimensionality reduction refers to algorithms that reduce the number of features
    in a dataset. As you will see, there are many techniques available, and they involve
    either feature selection or feature extraction.
  prefs: []
  type: TYPE_NORMAL
- en: 'Algorithms that use feature selection to perform dimensionality reduction are
    listed here:'
  prefs: []
  type: TYPE_NORMAL
- en: Backward Feature Elimination
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Forward Feature Selection
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Factor Analysis
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Independent Component Analysis
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Algorithms that use feature extraction to perform dimensionality reduction
    are listed here:'
  prefs: []
  type: TYPE_NORMAL
- en: PCA
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: non-negative matrix factorization (NMF)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: kernel PCA
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: graph-based kernel PCA
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Linear discriminant analysis (LDA)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: generalized discriminant analysis (GDA)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Autoencoder
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'The following algorithms combine feature extraction and dimensionality reduction:'
  prefs: []
  type: TYPE_NORMAL
- en: PCA
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: linear discriminant analysis (LDA)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: canonical correlation analysis (CCA)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: non-negative matrix factorization (NMF)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: These algorithms can be used during a pre-processing step before using clustering
    or some other algorithm (such as kNN) on a dataset. One other group of algorithms
    involves methods based on projections, and it includes t-Distributed Stochastic
    Neighbor Embedding (t-SNE) as well as UMAP.
  prefs: []
  type: TYPE_NORMAL
- en: This chapter discusses PCA, and you can perform an online search to find more
    information about the other algorithms.
  prefs: []
  type: TYPE_NORMAL
- en: PCA
  prefs: []
  type: TYPE_NORMAL
- en: Principal Components are new components that are linear combinations of the
    initial features in a dataset. In addition, these components are uncorrelated
    and the most meaningful or important information is contained in these new components.
  prefs: []
  type: TYPE_NORMAL
- en: 'There are two advantages to PCA: reduced computation time due to far fewer
    features and the ability to graph the components when there are at most three
    components. If you have four or five components, you will not be able to display
    them visually, but you could select subsets of three components for visualization,
    and perhaps gain some additional insight into the dataset.'
  prefs: []
  type: TYPE_NORMAL
- en: 'PCA uses the variance as a measure of information: the higher the variance,
    the more important the component. In fact, PCA determines the eigenvalues and
    eigenvectors of a covariance matrix (discussed later), and constructs a new matrix
    whose columns are eigenvectors, ordered from left-to-right based on the maximum
    eigenvalue in the left-most column, decreasing until the right-most eigenvector
    also has the smallest eigenvalue.'
  prefs: []
  type: TYPE_NORMAL
- en: Covariance Matrix
  prefs: []
  type: TYPE_NORMAL
- en: 'As a reminder, the statistical quantity called the variance of a random variable
    X is defined as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: variance(x) = [SUM (x – xbar)*(x-xbar)]/n
  prefs: []
  type: TYPE_NORMAL
- en: A covariance matrix C is an nxn matrix whose values on the main diagonal are
    the variance of the variables X1, X2, . . ., Xn. The other values of C are the
    covariance values of each pair of variables Xi and Xj.
  prefs: []
  type: TYPE_NORMAL
- en: 'The formula for the covariance of the variables X and Y is a generalization
    of the variance of a variable, and the formula is shown here:'
  prefs: []
  type: TYPE_NORMAL
- en: covariance(X, Y) = [SUM (x – xbar)*(y-ybar)]/n
  prefs: []
  type: TYPE_NORMAL
- en: 'Notice that you can reverse the order of the product of terms (multiplication
    is commutative), and therefore the covariance matrix C is a symmetric matrix:'
  prefs: []
  type: TYPE_NORMAL
- en: covariance(X, Y) = covariance(Y,X)
  prefs: []
  type: TYPE_NORMAL
- en: PCA calculates the eigenvalues and the eigenvectors of the covariance matrix
    A.
  prefs: []
  type: TYPE_NORMAL
- en: WORKING WITH DATASETS
  prefs: []
  type: TYPE_NORMAL
- en: In addition to data cleaning, there are several other steps that you need to
    perform, such as selecting training data vs. test data and deciding whether to
    use “hold out” or cross-validation during the training process. More details are
    provided in the subsequent sections.
  prefs: []
  type: TYPE_NORMAL
- en: Training Data Versus Test Data
  prefs: []
  type: TYPE_NORMAL
- en: 'After you have performed the tasks described earlier in this chapter (i.e.,
    data cleaning and perhaps dimensionality reduction), you are ready to split the
    dataset into two parts. The first part is the training set, which is used to train
    a model, and the second part is the test set, which is used for “inferencing”
    (another term for making predictions). Make sure that you conform to the following
    guidelines for your test sets:'
  prefs: []
  type: TYPE_NORMAL
- en: 1. The set is large enough to yield statistically meaningful results.
  prefs: []
  type: TYPE_NORMAL
- en: 2. It is representative of the dataset as a whole.
  prefs: []
  type: TYPE_NORMAL
- en: 3. Never train on test data.
  prefs: []
  type: TYPE_NORMAL
- en: 4. Never test on training data.
  prefs: []
  type: TYPE_NORMAL
- en: What is Cross-validation?
  prefs: []
  type: TYPE_NORMAL
- en: 'The purpose of cross-validation is to test a model with non-overlapping test
    sets, which is performed in the following manner:'
  prefs: []
  type: TYPE_NORMAL
- en: Step 1) Split the data into k subsets of equal size.
  prefs: []
  type: TYPE_NORMAL
- en: Step 2) Select one subset for testing and the others for training.
  prefs: []
  type: TYPE_NORMAL
- en: Step 3) Repeat Step 2 for the other k-1 subsets.
  prefs: []
  type: TYPE_NORMAL
- en: This process is called k-fold cross-validation, and the overall error estimate
    is the average of the error estimates. A standard method for evaluation involves
    ten-fold cross-validation. Extensive experiments have shown that using ten subsets
    is the best choice to obtain an accurate estimate. In fact, you can repeat ten-fold
    cross-validation ten times and compute the average of the results, which helps
    to reduce the variance.
  prefs: []
  type: TYPE_NORMAL
- en: The next section discusses regularization, which is an important yet optional
    topic in this book. If you plan to become proficient in machine learning, you
    will need to learn about regularization.
  prefs: []
  type: TYPE_NORMAL
- en: WHAT IS REGULARIZATION?
  prefs: []
  type: TYPE_NORMAL
- en: 'Regularization helps to solve the overfitting problem, which occurs when a
    model performs well on training data but poorly on validation or test data. Regularization
    solves this problem by adding a penalty term to the loss function, thereby controlling
    the model complexity with this penalty term. Regularization is generally useful
    for:'
  prefs: []
  type: TYPE_NORMAL
- en: a large number of variables
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: a low ratio of (# observations)/(# of variables)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: a high multicollinearity
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'There are two main types of regularization: L1 Regularization (which is related
    to MAE, or the absolute value of differences) and L2 Regularization (which is
    related to MSE, or the square of differences). In general, L2 performs better
    than L1 and L2 is efficient in terms of computation.'
  prefs: []
  type: TYPE_NORMAL
- en: Machine Learning and Feature Scaling
  prefs: []
  type: TYPE_NORMAL
- en: Feature scaling standardizes the range of features of data. This step is performed
    during the data pre-processing step, in part because gradient descent benefits
    from feature scaling.
  prefs: []
  type: TYPE_NORMAL
- en: The assumption is that the data conforms to a standard normal distribution,
    and standardization involves subtracting the mean and divide by the standard deviation
    for every data point, which results in an N(0,1) normal distribution.
  prefs: []
  type: TYPE_NORMAL
- en: Data Normalization versus Standardization
  prefs: []
  type: TYPE_NORMAL
- en: 'Data normalization is a linear scaling technique. Let’s assume that a dataset
    has the values {X1, X2, . . . , Xn} along with the following terms:'
  prefs: []
  type: TYPE_NORMAL
- en: Minx = minimum of Xi values
  prefs: []
  type: TYPE_NORMAL
- en: Maxx = maximum of Xi values
  prefs: []
  type: TYPE_NORMAL
- en: 'Now calculate a set of new Xi values as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: Xi = (Xi – Minx)/[Maxx – Minx]
  prefs: []
  type: TYPE_NORMAL
- en: The new Xi values are now scaled so that they are between 0 and 1.
  prefs: []
  type: TYPE_NORMAL
- en: THE BIAS-VARIANCE TRADEOFF
  prefs: []
  type: TYPE_NORMAL
- en: Bias in machine learning can be due to an error from wrong assumptions in a
    learning algorithm. High bias might cause an algorithm to miss relevant relations
    between features and target outputs (underfitting). Prediction bias can occur
    because of “noisy” data, an incomplete feature set, or a biased training sample.
  prefs: []
  type: TYPE_NORMAL
- en: Error due to bias is the difference between the expected (or average) prediction
    of your model and the correct value that you want to predict. Repeat the model
    building process multiple times and gather new data each time, and also perform
    an analysis to produce a new model. The resulting models have a range of predictions
    because the underlying datasets have a degree of randomness. Bias measures the
    extent to the predictions for these models are from the correct value.
  prefs: []
  type: TYPE_NORMAL
- en: Variance in machine learning is the expected value of the squared deviation
    from the mean. A high variance can cause an algorithm to model the random noise
    in the training data, rather than the intended outputs (overfitting).
  prefs: []
  type: TYPE_NORMAL
- en: Adding parameters to a model increases its complexity, increases the variance,
    and decreases the bias. Dealing with bias and variance is dealing with underfitting
    and overfitting.
  prefs: []
  type: TYPE_NORMAL
- en: Error due to variance is the variability of a model prediction for a given data
    point. As before, repeat the entire model building process, and the variance is
    the extent to which predictions for a given point vary among different “instances”
    of the model.
  prefs: []
  type: TYPE_NORMAL
- en: METRICS FOR MEASURING MODELS
  prefs: []
  type: TYPE_NORMAL
- en: Linear regression models use R-squared, which measures how close the data is
    to the fitted regression line (regression coefficient). The R-squared value is
    always a percentage between 0 and 100%. The value 0% indicates that the model
    explains none of the variability of the response data around its mean. The value
    100% indicates that the model explains all the variability of the response data
    around its mean. In general, a higher R-squared value indicates a better model.
  prefs: []
  type: TYPE_NORMAL
- en: Limitations of R-Squared
  prefs: []
  type: TYPE_NORMAL
- en: Although high R-squared values are preferred, they are not necessarily always
    good values. Similarly, low R-squared values are not always bad. For example,
    an R-squared value for predicting human behavior is often less than 50%. Moreover,
    R-squared cannot determine whether the coefficient estimates and predictions are
    biased. In addition, an R-squared value does not indicate whether a regression
    model is adequate. Thus, it is possible to have a low R-squared value for a good
    model, or a high R-squared value for a poorly fitting model. Evaluate R-squared
    values in conjunction with residual plots, other model statistics, and subject
    area knowledge.
  prefs: []
  type: TYPE_NORMAL
- en: Confusion Matrix
  prefs: []
  type: TYPE_NORMAL
- en: 'Clasification algorithms use a confusion matrix (also called an “error matrix”),
    which is a square contingency table that contains the number of false positives,
    false negatives, true positives, and true negatives. The four entries in a 2x2
    confusion matrix can be labeled as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: 'TP: True Positive'
  prefs: []
  type: TYPE_NORMAL
- en: 'FP: False Positive'
  prefs: []
  type: TYPE_NORMAL
- en: 'TN: True Negative'
  prefs: []
  type: TYPE_NORMAL
- en: 'FN: False Negative'
  prefs: []
  type: TYPE_NORMAL
- en: The diagonal values of the confusion matrix are correct predictions, whereas
    the off-diagonal values are incorrect predictions. In general, a lower FP value
    is better than a FN value. For example, an FP indicates that a healthy person
    was incorrectly diagnosed with a disease, whereas an FN indicates that an unhealthy
    person was incorrectly diagnosed as healthy.
  prefs: []
  type: TYPE_NORMAL
- en: Accuracy versus Precision versus Recall
  prefs: []
  type: TYPE_NORMAL
- en: 'A 2x2 confusion matrix has four entries that that represent the various combinations
    of correct and incorrect classifications. Given the definitions in the preceding
    section, the definitions of precision, accuracy, and recall are given by the following
    formulas:'
  prefs: []
  type: TYPE_NORMAL
- en: precision = TP/(TP + FP)
  prefs: []
  type: TYPE_NORMAL
- en: accuracy = (TP + TN)/[TP + FP + FN + TN]
  prefs: []
  type: TYPE_NORMAL
- en: recall = TP/[TP + FN]
  prefs: []
  type: TYPE_NORMAL
- en: Accuracy can be an unreliable metric because it yields misleading results in
    unbalanced datasets. When the number of observations in different classes are
    significantly different, it gives equal importance to both false positive and
    false negative classifications. For example, declaring cancer as benign is worse
    than incorrectly informing patients that they are suffering from cancer. Unfortunately,
    accuracy will not differentiate between these two cases.
  prefs: []
  type: TYPE_NORMAL
- en: Keep in mind that the confusion matrix can be an nxn matrix and not just a 2x2
    matrix. For example, if a class has 5 possible values, then the confusion matrix
    is a 5x5 matrix, and the numbers on the main diagonal are the “true positive”
    results.
  prefs: []
  type: TYPE_NORMAL
- en: The ROC Curve
  prefs: []
  type: TYPE_NORMAL
- en: The receiver operating characteristic (ROC) curve is a curve that plots the
    true positive rate (TPR, i.e., the recall) against the false positive rate (FPR).
    Note that the true negative rate (TNR) is also called the specificity.
  prefs: []
  type: TYPE_NORMAL
- en: 'The following Web page contains a Python code sample using sklearn and the
    Iris dataset, as well as code for plotting the ROC:'
  prefs: []
  type: TYPE_NORMAL
- en: '[https://scikit-learn.org/stable/auto_examples/model_selection/plot_roc.html](https://scikit-learn.org/stable/auto_examples/model_selection/plot_roc.html)'
  prefs: []
  type: TYPE_NORMAL
- en: 'The following Web page contains an assortment of Python code samples for plotting
    the ROC:'
  prefs: []
  type: TYPE_NORMAL
- en: '[https://stackoverflow.com/questions/25009284/how-to-plot-roc-curve-in-python](https://stackoverflow.com/questions/25009284/how-to-plot-roc-curve-in-python)'
  prefs: []
  type: TYPE_NORMAL
- en: OTHER USEFUL STATISTICAL TERMS
  prefs: []
  type: TYPE_NORMAL
- en: 'Machine learning relies on a number of statistical quantities to assess the
    validity of a model, some of which are listed here:'
  prefs: []
  type: TYPE_NORMAL
- en: RSS
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: TSS
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: R^2
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: F1 score
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: p-value
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'The definitions of RSS, TSS, and R^2 are shown below, where y^ is the y-coordinate
    of a point on a best-fitting line and y_ is the mean of the y values of the points
    in the dataset:'
  prefs: []
  type: TYPE_NORMAL
- en: '![image](images/p47.jpg)'
  prefs: []
  type: TYPE_IMG
- en: What is an F1 score?
  prefs: []
  type: TYPE_NORMAL
- en: 'The *F1 score* is a measure of the accuracy of a test, and it is defined as
    the harmonic mean of precision and recall. Here are the relevant formulas, where
    p is the precision and r is the recall:'
  prefs: []
  type: TYPE_NORMAL
- en: '![image](images/p48.jpg)'
  prefs: []
  type: TYPE_IMG
- en: The best value of an F1 score is 0 and the worst value is 0\. An F1 score tends
    to be used for categorical classification problems, whereas the R^2 value is typically
    for regression tasks (such as linear regression).
  prefs: []
  type: TYPE_NORMAL
- en: What is a p-value?
  prefs: []
  type: TYPE_NORMAL
- en: The p-value is used to reject the null hypothesis if the p-value is small enough
    (< 0.005), which indicates a higher significance. Recall that the null hypothesis
    states that there is no correlation between a dependent variable (such as y) and
    an independent variable (such as x). The threshold value for p is typically 1%
    or 5%.
  prefs: []
  type: TYPE_NORMAL
- en: There is no straightforward formula for calculating p-values, which are values
    that are always between 0 and 1\. In fact, p-values are statistical quantities
    to evaluate the “null hypothesis,” and they are calculated by means of p-value
    tables or via spreadsheet/statistical software.
  prefs: []
  type: TYPE_NORMAL
- en: WHAT IS LINEAR REGRESSION?
  prefs: []
  type: TYPE_NORMAL
- en: 'The goal of linear regression is to find the best-fitting line that “represents”
    a dataset. Keep in mind two key points. First, the best-fitting line does not
    necessarily pass through all (or even most of) the points in the dataset. The
    purpose of a best-fitting line is to minimize the vertical distance of that line
    from the points in dataset. Second, linear regression does not determine the best-fitting
    polynomial: the latter involves finding a higher-degree polynomial that passes
    through many of the points in a dataset.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Moreover, a dataset in the plane can contain two or more points that lie on
    the same vertical line, which is to say that those points have the same x value.
    However, a function cannot pass through such a pair of points: if two points (x1,y1)
    and (x2,y2) have the same x value, then they must have the same y value (i.e.,
    y1=y2). A function can have two or more points that lie on the same horizontal
    line.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Now consider a scatter plot with many points in the plane that are sort of
    “clustered” in an elongated cloud-like shape: a best-fitting line will probably
    intersect only limited number of points (in fact, a best-fitting line might not
    intersect any of the points).'
  prefs: []
  type: TYPE_NORMAL
- en: 'Consider one other scenario: suppose a dataset contains a set of points that
    lie on the same line. For instance, let’s say the x values are in the set {1,2,3,...,10}
    and the y values are in the set {2,4,6,...,20}. Then the equation of the best-fitting
    line is y=2*x+0\. In this scenario, all the points are collinear, which is to
    say that they lie on the same line.'
  prefs: []
  type: TYPE_NORMAL
- en: Linear Regression vs. Curve-Fitting
  prefs: []
  type: TYPE_NORMAL
- en: Suppose a dataset consists of n data points of the form (x, y), and no two of
    those data points have the same x value. Then, according to a well-known result
    in mathematics, there is a polynomial of degree less than or equal to n-1 that
    passes through those n points (if you are really interested, you can find mathematical
    proof of this statement in online articles). For example, a line is a polynomial
    of degree one and it can intersect any pair of non-vertical points in the plane.
    For any triple of points (that are not all on the same line) in the plane, there
    is a quadratic equation that passes through those points.
  prefs: []
  type: TYPE_NORMAL
- en: 'In addition, sometimes a lower degree polynomial is available. For instance,
    consider the set of 100 points in which the x value equals the y value: in this
    case, the line y = x (which is a polynomial of degree one) passes through all
    100 points.'
  prefs: []
  type: TYPE_NORMAL
- en: However, the extent to which a line “represents” a set of points in the plane
    depends on how closely those points can be approximated by a line, which is measured
    by the variance of the points (the variance is a statistical quantity). The more
    collinear the points, the smaller the variance; conversely, the more “spread out”
    the points are, the larger the variance.
  prefs: []
  type: TYPE_NORMAL
- en: When are Solutions Exact Values?
  prefs: []
  type: TYPE_NORMAL
- en: Although statistics-based solutions provide closed-form solutions for linear
    regression, neural networks provide approximate solutions. This is because machine
    learning algorithms for linear regression involve a sequence of approximations
    that “converges” to optimal values, which means that machine learning algorithms
    produce estimates of the exact values. For example, the slope m and y-intercept
    b of a best-fitting line for a set of points on a 2D plane have a closed-form
    solution in statistics, but they can only be approximated via machine learning
    algorithms (exceptions do exist, but they are rare situations).
  prefs: []
  type: TYPE_NORMAL
- en: Even though a closed-form solution for “traditional” linear regression provides
    exact values for both m and b, sometimes you can only use an approximation of
    the exact value. For instance, suppose that the slope m of a best-fitting line
    equals the square root of 3 and the y-intercept b is the square root of 2\. If
    you plan to use these values in source code, you can only work with an approximation
    of these two numbers. In the same scenario, a neural network computes approximations
    for m and b, regardless of whether or not the exact values for m and b are irrational,
    rational, or integer values. However, machine learning algorithms are better suited
    for complex, non-linear, multi-dimensional datasets.
  prefs: []
  type: TYPE_NORMAL
- en: 'As a simple example, suppose that the closed-form solution for a linear regression
    problem produces integer or rational values for both m and b. Specifically, let’s
    suppose that a closed-form solution yields the values 2.0 and 1.0 for the slope
    and y-intercept, respectively, of a best-fitting line. The equation of the line
    looks like this:'
  prefs: []
  type: TYPE_NORMAL
- en: y = 2.0 * x + 1.0
  prefs: []
  type: TYPE_NORMAL
- en: However, the corresponding solution from training a neural network might produce
    the values 2.0001 and 0.9997 for the slope m and the y-intercept b, respectively,
    as the values of m and b for a best-fitting line. Always keep this point in mind,
    especially when you are training a neural network.
  prefs: []
  type: TYPE_NORMAL
- en: What is Multivariate Analysis?
  prefs: []
  type: TYPE_NORMAL
- en: 'Multivariate analysis generalizes the equation of a line in the Euclidean plane
    to higher dimensions, and it is called a hyper plane instead of a line. The generalized
    equation has the following form:'
  prefs: []
  type: TYPE_NORMAL
- en: y = w1*x1 + w2*x2 + . . . + wn*xn + b
  prefs: []
  type: TYPE_NORMAL
- en: In the case of 2D linear regression, you only need to find the value of the
    slope (m) and the y-intercept (b), whereas in multivariate analysis you need to
    find the values for w1, w2, . . ., wn. Note that multivariate analysis is a term
    from statistics, and in machine learning it is often referred to as “generalized
    linear regression.” Most of the code samples in this book that pertain to linear
    regression involve 2D points in the Euclidean plane.
  prefs: []
  type: TYPE_NORMAL
- en: OTHER TYPES OF REGRESSION
  prefs: []
  type: TYPE_NORMAL
- en: Linear regression finds the best-fitting line that “represents” a dataset, but
    what happens if a line in the plane is not a good fit for the dataset? This is
    a relevant question when you work with datasets.
  prefs: []
  type: TYPE_NORMAL
- en: Some alternatives to linear regression include quadratic equations, cubic equations,
    or higher-degree polynomials. However, these alternatives involve trade-offs,
    as we will discuss later.
  prefs: []
  type: TYPE_NORMAL
- en: Another possibility is a sort of hybrid approach that involves piece-wise linear
    functions, which comprises a set of line segments. If contiguous line segments
    are connected, then it is a piece-wise linear continuous function; otherwise,
    it is a piece-wise linear discontinuous function.
  prefs: []
  type: TYPE_NORMAL
- en: 'Thus, given a set of points in the plane, regression involves addressing the
    following questions:'
  prefs: []
  type: TYPE_NORMAL
- en: 1. What type of curve fits the data well? How do we know?
  prefs: []
  type: TYPE_NORMAL
- en: 2. Does another type of curve fit the data better?
  prefs: []
  type: TYPE_NORMAL
- en: 3. What does “best fit” mean?
  prefs: []
  type: TYPE_NORMAL
- en: One way to check if a line fits the data involves a visual check, but this approach
    does not work for data points that are higher than two dimensions. Moreover, this
    is a subjective decision, and some sample datasets are displayed later in this
    chapter. By visual inspection of a dataset, you might decide that a quadratic
    or cubic (or even higher degree) polynomial has the potential of being a better
    fit for the data. However, visual inspection is probably limited to points in
    a 2D plane or in three dimensions.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s defer the non-linear scenario and make the assumption that a line would
    be a good fit for the data. There is a well-known technique for finding the “best-fitting”
    line for such a dataset that involves minimizing the MSE (which we will discuss
    later in this chapter).
  prefs: []
  type: TYPE_NORMAL
- en: The next section provides a quick review of linear equations in the plane, along
    with some images that illustrate examples of linear equations.
  prefs: []
  type: TYPE_NORMAL
- en: WORKING WITH LINES IN THE PLANE (OPTIONAL)
  prefs: []
  type: TYPE_NORMAL
- en: 'This section contains a short review of lines in the Euclidean plane, so you
    can skip this section if you are comfortable with this topic. A minor point that
    is often overlooked is that lines in the Euclidean plane have infinite length.
    If you select two distinct points of a line, then all the points between those
    two selected points is a line segment. A ray is a “half infinite” line: when you
    select one point as an endpoint, then all the points on one side of the line constitutes
    a ray.'
  prefs: []
  type: TYPE_NORMAL
- en: For example, the points in the plane whose y-coordinate is 0 is a line and also
    the x-axis, whereas the points between (0,0) and (1,0) on the x-axis form a line
    segment. In addition, the points on the x-axis that are to the right of (0,0)
    form a ray, and the points on the x-axis that are to the left of (0,0) also form
    a ray.
  prefs: []
  type: TYPE_NORMAL
- en: 'For simplicity and convenience, in this book we will use the terms “line” and
    “line segment” interchangeably. Now let’s delve into the details of lines in the
    Euclidean plane. Here is the equation of a (non-vertical) line in the Euclidean
    plane:'
  prefs: []
  type: TYPE_NORMAL
- en: y = m*x + b
  prefs: []
  type: TYPE_NORMAL
- en: The value of m is the slope of the line and the value of b is the y-intercept
    (i.e., the place where the line intersects the y-axis).
  prefs: []
  type: TYPE_NORMAL
- en: 'If need be, you can use a more general equation that can also represent vertical
    lines, as shown here:'
  prefs: []
  type: TYPE_NORMAL
- en: a*x + b*y + c = 0
  prefs: []
  type: TYPE_NORMAL
- en: However, we will not be working with vertical lines, so we will use the first
    formula.
  prefs: []
  type: TYPE_NORMAL
- en: '[Figure 2.1](#fig_2-1) displays three horizontal lines whose equations (from
    top to bottom) are y = 3, y = 0, and y = -3.'
  prefs: []
  type: TYPE_NORMAL
- en: '![image](images/p52-1.jpg)'
  prefs: []
  type: TYPE_IMG
- en: FIGURE 2.1 A graph of three horizontal line segments
  prefs: []
  type: TYPE_NORMAL
- en: '[Figure 2.2](#fig_2-2) displays two slanted lines whose equations are y = x
    and y = -x, respectively.'
  prefs: []
  type: TYPE_NORMAL
- en: '![image](images/p52-2.jpg)'
  prefs: []
  type: TYPE_IMG
- en: FIGURE 2.2 A graph of two diagonal line segments
  prefs: []
  type: TYPE_NORMAL
- en: '[Figure 2.3](#fig_2-3) displays two slanted parallel lines whose equations
    are y = 2*x and y = 2*x + 3, respectively.'
  prefs: []
  type: TYPE_NORMAL
- en: '![image](images/p53-1.jpg)'
  prefs: []
  type: TYPE_IMG
- en: FIGURE 2.3 A graph of two slanted parallel line segments
  prefs: []
  type: TYPE_NORMAL
- en: '[Figure 2.4](#fig_2-4) displays a piece-wise linear graph consisting of connected
    line segments.'
  prefs: []
  type: TYPE_NORMAL
- en: '![image](images/p53-2.jpg)'
  prefs: []
  type: TYPE_IMG
- en: FIGURE 2.4 A piece-wise linear graph of line segments
  prefs: []
  type: TYPE_NORMAL
- en: Let’s turn our attention to generating quasi-random data using a NumPy API,
    and then we will plot the data using Matplotlib.
  prefs: []
  type: TYPE_NORMAL
- en: SCATTER PLOTS WITH NUMPY AND MATPLOTLIB (1)
  prefs: []
  type: TYPE_NORMAL
- en: '[Listing 2.1](#lis_2-1) displays the content of np_plot1.py that illustrates
    how to use the NumPy randn() API to generate a dataset and then the scatter()
    API in Matplotlib to plot the points in the dataset.'
  prefs: []
  type: TYPE_NORMAL
- en: One detail to note is that all the adjacent horizontal values are equally spaced,
    whereas the vertical values are based on a linear equation plus a “perturbation”
    value. This “perturbation technique” (which is not a standard term) is used in
    other code samples in this chapter to add a slightly randomized effect when the
    points are plotted. The advantage of this technique is that the best-fitting values
    for m and b are known in advance, and therefore we do not need to guess their
    values.
  prefs: []
  type: TYPE_NORMAL
- en: 'LISTING 2.1: np_plot1.py'
  prefs: []
  type: TYPE_NORMAL
- en: import numpy as np
  prefs: []
  type: TYPE_NORMAL
- en: import matplotlib.pyplot as plt
  prefs: []
  type: TYPE_NORMAL
- en: x = np.random.randn(15,1)
  prefs: []
  type: TYPE_NORMAL
- en: y = 2.5*x + 5 + 0.2*np.random.randn(15,1)
  prefs: []
  type: TYPE_NORMAL
- en: print("x:",x)
  prefs: []
  type: TYPE_NORMAL
- en: print("y:",y)
  prefs: []
  type: TYPE_NORMAL
- en: plt.scatter(x,y)
  prefs: []
  type: TYPE_NORMAL
- en: plt.show()
  prefs: []
  type: TYPE_NORMAL
- en: '[Listing 2.1](#lis_2-1) contains two import statements and then initializes
    the array variable x with 15 random numbers between 0 and 1.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Next, the array variable y is defined in two parts: the first part is a linear
    equation 2.5*x + 5 and the second part is a “perturbation” value that is based
    on a random number. Thus, the array variable y simulates a set of values that
    closely approximate a line segment.'
  prefs: []
  type: TYPE_NORMAL
- en: 'This technique is used in code samples that simulate a line segment, and then
    the training portion approximates the values of m and b for the best-fitting line.
    Obviously, we already know the equation of the best-fitting-line: the purpose
    of this technique is to compare the trained values for the slope m and y-intercept
    b with the known values (which, in this case, are 2.5 and 5). A partial output
    from [Listing 2.1](#lis_2-1) is here:'
  prefs: []
  type: TYPE_NORMAL
- en: 'x: [[-1.42736308]'
  prefs: []
  type: TYPE_NORMAL
- en: '[ 0.09482338]'
  prefs: []
  type: TYPE_NORMAL
- en: '[-0.45071331]'
  prefs: []
  type: TYPE_NORMAL
- en: '[ 0.19536304]'
  prefs: []
  type: TYPE_NORMAL
- en: '[-0.22295205]'
  prefs: []
  type: TYPE_NORMAL
- en: // values omitted for brevity
  prefs: []
  type: TYPE_NORMAL
- en: 'y: [[1.12530514]'
  prefs: []
  type: TYPE_NORMAL
- en: '[5.05168677]'
  prefs: []
  type: TYPE_NORMAL
- en: '[3.93320782]'
  prefs: []
  type: TYPE_NORMAL
- en: '[5.49760999]'
  prefs: []
  type: TYPE_NORMAL
- en: '[4.46994978]'
  prefs: []
  type: TYPE_NORMAL
- en: // values omitted for brevity
  prefs: []
  type: TYPE_NORMAL
- en: '[Figure 2.5](#fig_2-5) displays a scatter plot of points based on the values
    of x and y.'
  prefs: []
  type: TYPE_NORMAL
- en: '![image](images/p55.jpg)'
  prefs: []
  type: TYPE_IMG
- en: FIGURE 2.5 A scatter plot of points for a line segment
  prefs: []
  type: TYPE_NORMAL
- en: Why the Perturbation Technique is Useful
  prefs: []
  type: TYPE_NORMAL
- en: 'You already saw how to use the perturbation technique and by way of comparison,
    consider a dataset with the following points that are defined in the Python array
    variables X and Y:'
  prefs: []
  type: TYPE_NORMAL
- en: X = [0,0.12,0.25,0.27,0.38,0.42,0.44,0.55,0.92,1.0]
  prefs: []
  type: TYPE_NORMAL
- en: Y = [0,0.15,0.54,0.51, 0.34,0.1,0.19,0.53,1.0,0.58]
  prefs: []
  type: TYPE_NORMAL
- en: If you need to find the best-fitting line for the preceding dataset, how would
    you guess the values for the slope m and the y-intercept b? In most cases, you
    probably cannot guess their values. However, the perturbation technique enables
    you to slightly move the points on a line whose value for the slope m (and optionally
    the value for the y-intercept b) is specified in advance.
  prefs: []
  type: TYPE_NORMAL
- en: The perturbation technique only works when you introduce small random values
    that do not result in different values for m and b.
  prefs: []
  type: TYPE_NORMAL
- en: SCATTER PLOTS WITH NUMPY AND MATPLOTLIB (2)
  prefs: []
  type: TYPE_NORMAL
- en: The code in [Listing 2.1](#lis_2-1) (in the previous section) assigned random
    values to the variable x, whereas a hard-coded value is assigned to the slope
    m. The y values are a hard-coded multiple of the x values, plus a random value
    that is calculated via the perturbation technique. Hence, we do not know the value
    of the y-intercept b.
  prefs: []
  type: TYPE_NORMAL
- en: In this section, the values for trainX are based on the np.linspace() API, and
    the values for trainY involve the perturbation technique that is described in
    the previous section.
  prefs: []
  type: TYPE_NORMAL
- en: The code in this example simply prints the values for trainX and trainY, which
    correspond to data points in the Euclidean plane. [Listing 2.2](#lis_2-2) displays
    the content of np_plot2.py that illustrates how to simulate a linear dataset in
    NumPy.
  prefs: []
  type: TYPE_NORMAL
- en: 'LISTING 2.2: np_plot2.py'
  prefs: []
  type: TYPE_NORMAL
- en: import numpy as np
  prefs: []
  type: TYPE_NORMAL
- en: trainX = np.linspace(-1, 1, 11)
  prefs: []
  type: TYPE_NORMAL
- en: trainY = 4*trainX + np.random.randn(*trainX.shape)*0.5
  prefs: []
  type: TYPE_NORMAL
- en: 'print("trainX: ",trainX)'
  prefs: []
  type: TYPE_NORMAL
- en: 'print("trainY: ",trainY)'
  prefs: []
  type: TYPE_NORMAL
- en: '[Listing 2.2](#lis_2-2) initializes the NumPy array variable trainX via the
    NumPy linspace() API, followed by the array variable trainY that is defined in
    two parts. The first part is the linear term 4*trainX and the second part involves
    the perturbation technique that is a randomly generated number. The output from
    [Listing 2.2](#lis_2-2) is here:'
  prefs: []
  type: TYPE_NORMAL
- en: 'trainX: [-1\. -0.8 -0.6 -0.4 -0.2 0\. 0.2 0.4 0.6 0.8 1\. ]'
  prefs: []
  type: TYPE_NORMAL
- en: 'trainY: [-3.60147459 -2.66593108 -2.26491189 -1.65121314 -0.56454605 0.22746004
    0.86830728 1.60673482 2.51151543 3.59573877 3.05506056]'
  prefs: []
  type: TYPE_NORMAL
- en: The next section contains an example that is similar to [Listing 2.2](#lis_2-2),
    using the same perturbation technique to generate a set of points that approximate
    a quadratic equation instead of a line segment.
  prefs: []
  type: TYPE_NORMAL
- en: A QUADRATIC SCATTER PLOT WITH NUMPY AND MATPLOTLIB
  prefs: []
  type: TYPE_NORMAL
- en: '[Listing 2.3](#lis_2-3) displays the content of np_plot_quadratic.py that illustrates
    how to plot a quadratic function in the plane.'
  prefs: []
  type: TYPE_NORMAL
- en: 'LISTING 2.3: np_plot_quadratic.py'
  prefs: []
  type: TYPE_NORMAL
- en: import numpy as np
  prefs: []
  type: TYPE_NORMAL
- en: import matplotlib.pyplot as plt
  prefs: []
  type: TYPE_NORMAL
- en: '#see what happens with this set of values:'
  prefs: []
  type: TYPE_NORMAL
- en: '#x = np.linspace(-5,5,num=100)'
  prefs: []
