  zh: '****现在****，****除非****你****想****尝试****一****个****新的****职业****，****成为****一****名****提示****工程师****，****否则****你****不****必****知道****所有****与****矩阵****和****架构****相关的****技术****和****数学****代码****。****事实上****，****你****只需****掌握****如何****用****最佳****成功****地****构建****你的****提示****，****这就****需要****对****英语****语言****有****良好的****理解****。****作为****特斯拉****AI****部门****的前****负责人****，****安德烈****·****卡帕西****曾****在****推特****上****写道****：****“****最****热门****的新****编程****语言****是****英语”****（****格兰特****，****2023****）。****换句话说****，****你****需要****知道****如何****准确****地****表达****你的****需求****，****以确保****聊天****机器人****不仅****理解****你****想要****的信息****，****而且****确保****你****已经****补偿****了****聊天****机器人****缺乏****第一****手****、****真实****世界****经验****的问题****。 '
