- en: Assume the role of a crime scene investigator for this task. I need you to construct
    a comprehensive police report from the Polperran police force in the UK, where
    Laura Marsh found body of Edward Montague lying on the floor of her aunt Sera’s
    craft studio. He had been stabbed with two knitting needles to the chest. It was
    7pm in mid-February.
  prefs: []
  type: TYPE_NORMAL
- en: Laura’s aunt Sera comes in a few minutes later with her friend, a telepathic
    quilter called Frances Wentworth. They quickly examine the knitting needles before
    the police arrive.
  prefs: []
  type: TYPE_NORMAL
- en: This report is meant for use in a Cozy Murder Mystery Novel.
  prefs: []
  type: TYPE_NORMAL
- en: Please ensure it includes all the necessary details typically found in a real-life
    police report, such as the date and time of the incident, location, victim information,
    description of the scene, potential evidence, and preliminary findings. Additionally,
    incorporate a few witness testimonies to provide more depth to the narrative.
  prefs: []
  type: TYPE_NORMAL
