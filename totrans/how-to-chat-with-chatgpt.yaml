  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您是AI的新手，请从开始学习。我们将引导您设置ChatGPT账户并了解其基本使用方法。如果您已经熟悉了基础知识，请使用“目录”页面跳转到与您的目标和兴趣相匹配的部分。
- en: Let’s get started!
  id: totrans-80
