  type: TYPE_NORMAL
  zh: '**Refinement** involves critically evaluating initial responses and modifying
    the prompt to correct misunderstandings or add additional context. For example,
    if a user asks, "Explain the benefits of physical exercise" and receives an overly
    general response, they could refine the prompt by saying, "Explain the benefits
    of physical exercise for people over 60, highlighting the improvement in cardiovascular
    health and mobility." This iterative process can be repeated several times until
    the ideal response is achieved.'
