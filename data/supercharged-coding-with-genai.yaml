- en: '14'
  id: totrans-2047
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '14'
- en: GenAI for Runtime and Memory Management
  id: totrans-2048
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: GenAI用于运行时和内存管理
- en: In the age of big data, artificial intelligence, and intensive data processing,
    an essential characteristic of well written Python programs is their ability to
    efficiently manage both **memory usage** and **runtime performance**. As part
    of the **Software Development Life Cycle (SDLC)**, it is common practice to profile
    our programs, anticipate performance limitations and strive for efficiency in
    both aspects.
  id: totrans-2049
  prefs: []
  type: TYPE_NORMAL
  zh: 在大数据、人工智能和密集数据处理的时代，编写良好的 Python 程序的一个基本特征是它们能够有效地管理**内存使用**和**运行时性能**。作为**软件开发生命周期（SDLC）**的一部分，分析我们的程序、预测性能限制并努力在这两方面实现效率是常见的做法。
- en: In addition to utilizing traditional tools for profiling program performance
    and addressing inefficiencies, we can leverage the **model mastery** of **Large
    Language Models** (**LLMs**) to code profile snippets, analyze maximal capacities,
    and optimize code to handle larger workloads.
  id: totrans-2050
  prefs: []
  type: TYPE_NORMAL
  zh: 除了利用传统工具来分析程序性能和解决低效问题外，我们还可以利用**大型语言模型（LLMs）**的**模型掌握能力**来对代码片段进行代码分析、分析最大容量，并优化代码以处理更大的工作负载。
- en: 'In this chapter, we will examine two examples of inefficient implementations:
    a Fibonacci calculator with significant runtime overhead and a statistical analysis
    function that demands excessive memory for large matrices. By utilizing prompt
    precision best practices and **chaining** prompt engineering technique, we will
    demonstrate how GenAI applications can help profile performance metrics, estimate
    maximum capacities, and optimize the code to handle larger inputs effectively.'
  id: totrans-2051
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将检查两个低效实现的例子：一个具有显著运行时开销的斐波那契计算器和一个需要大量内存进行大矩阵统计分析的功能。通过利用提示精确最佳实践和**链式**提示工程技术，我们将展示如何通过
    GenAI 应用程序帮助分析性能指标、估计最大容量，并有效地优化代码以处理更大的输入。
- en: 'The topics covered in this chapter include:'
  id: totrans-2052
  prefs: []
  type: TYPE_NORMAL
  zh: 本章涵盖的主题包括：
- en: Introducing time and space complexity analysis
  id: totrans-2053
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 介绍时间和空间复杂度分析
- en: Profiling runtime and memory consumption with GitHub Copilot
  id: totrans-2054
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用 GitHub Copilot 分析运行时和内存消耗
- en: Analyzing maximal capacity with ChatGPT
  id: totrans-2055
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用 ChatGPT 分析最大容量
- en: Optimizing code with chained prompts
  id: totrans-2056
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用链式提示优化代码
- en: Technical requirements
  id: totrans-2057
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 技术要求
- en: 'To get the most out of this chapter, ensure you have the following:'
  id: totrans-2058
  prefs: []
  type: TYPE_NORMAL
  zh: 为了充分利用本章内容，请确保您具备以下条件：
- en: GitHub Copilot account
  id: totrans-2059
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: GitHub Copilot 账户
- en: IDE – either VS Code or Pycharm
  id: totrans-2060
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: IDE – VS Code 或 PyCharm
- en: OpenAI account with access to ChatGPT and OpenAI API
  id: totrans-2061
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 具有访问 ChatGPT 和 OpenAI API 的 OpenAI 账户
- en: 'Access to the book’s repository available at: [https://github.com/PacktPublishing/Supercharged-Coding-with-Gen-AI](https://github.com/PacktPublishing/Supercharged-Coding-with-Gen-AI)'
  id: totrans-2062
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 访问本书的仓库，网址为：[https://github.com/PacktPublishing/Supercharged-Coding-with-Gen-AI](https://github.com/PacktPublishing/Supercharged-Coding-with-Gen-AI)
- en: Virtual environment set up in VS Code or PyCharm
  id: totrans-2063
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在 VS Code 或 PyCharm 中设置虚拟环境
- en: OpenAI API token
  id: totrans-2064
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: OpenAI API 令牌
- en: For assistance setting up a GitHub Copilot account, refer to [*Chapter 3*](Chapter_3.xhtml#_idTextAnchor108).
    For instructions on setting up OpenAI API access and token generation, see [*Chapter
    2*](Chapter_2.xhtml#_idTextAnchor061). If you need help creating an OpenAI account
    or setting up a virtual environment in your IDE, refer to the *Appendix* for detailed
    guidance.
  id: totrans-2065
  prefs: []
  type: TYPE_NORMAL
  zh: 如需设置 GitHub Copilot 账户的帮助，请参阅[*第 3 章*](Chapter_3.xhtml#_idTextAnchor108)。有关设置
    OpenAI API 访问和生成令牌的说明，请参阅[*第 2 章*](Chapter_2.xhtml#_idTextAnchor061)。如果您需要创建 OpenAI
    账户或在其 IDE 中设置虚拟环境的帮助，请参阅*附录*以获取详细指南。
- en: Introducing time and space analysis
  id: totrans-2066
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 介绍时间和空间分析
- en: In our current technology cycle, most companies are leveraging big data and
    artificial intelligence to improve their businesses. For example, videos on the
    YouTube and TikTok platforms are viewed over a billion times per day which generates
    recommendations and advertising value. In these cases, even 1% gains in efficiency
    for storage or computation may save millions of dollars.
  id: totrans-2067
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们当前的技术周期中，大多数公司都在利用大数据和人工智能来改善他们的业务。例如，YouTube 和 TikTok 平台上的视频每天被观看超过十亿次，这产生了推荐和广告价值。在这些情况下，即使存储或计算效率提高
    1%，也可能节省数百万美元。
- en: According to *Lambda Labs*, training the generative pre-trained transformer
    model *GPT-3* involved about 700 gigabytes of **Random Access Memory (RAM)** and
    thousands of powerful Nvidia GPUs operating in parallel, with a cumulative compute
    time equivalent to 355 years. Even a minor inefficiency in implementing these
    models could lead to substantial costs or, in the worst case, create a bottleneck
    that would prevent the model from running effectively.
  id: totrans-2068
  prefs: []
  type: TYPE_NORMAL
  zh: 根据*Lamda Labs*，训练生成式预训练转换器模型*GPT-3*需要大约700千兆字节的**随机存取存储器（RAM**）和数千个并行工作的强大Nvidia
    GPU，累计计算时间相当于355年。在实现这些模型时，即使是微小的低效也可能导致巨大的成本，或者在最坏的情况下，造成瓶颈，阻止模型有效运行。
- en: The runtime of a program
  id: totrans-2069
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 程序的运行时间
- en: The runtime of a program refers to the time it takes to execute the tasks defined
    in the source code on a specific hardware configuration with a given input. The
    runtime duration of a program depends on factors such as the computational complexity
    (the number of operations required to complete the task) and the hardware such
    as the **central processing unit (CPU)**.
  id: totrans-2070
  prefs: []
  type: TYPE_NORMAL
  zh: 程序的运行时间指的是在特定硬件配置下，执行源代码中定义的任务所需的时间。程序的运行时间取决于诸如计算复杂度（完成任务所需的操作数）和硬件（如**中央处理器（CPU）**）等因素。
- en: 'For example, consider an inefficient implementation of the Fibonacci number
    computation using recursion:'
  id: totrans-2071
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，考虑一个使用递归计算斐波那契数的低效实现：
- en: '[PRE288]'
  id: totrans-2072
  prefs: []
  type: TYPE_PRE
  zh: '[PRE288]'
- en: 'In this implementation, each Fibonacci number computation involves two recursive
    calls: one for the previous number and another for the one before that. Each of
    these calls triggers two additional recursive calls, and so on, until the base
    condition `n <= 1` is met.'
  id: totrans-2073
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个实现中，每个斐波那契数的计算涉及两次递归调用：一次是前一个数，另一次是前一个数。这些调用中的每一个又触发了两次额外的递归调用，依此类推，直到满足基本条件`n
    <= 1`。
- en: 'To illustrate how quickly the runtime of this implementation grows, here are
    examples of recorded runtimes on a MacBook Pro with an M1 chip using this implementation:'
  id: totrans-2074
  prefs: []
  type: TYPE_NORMAL
  zh: 为了说明这个实现的运行时间增长有多快，以下是在MacBook Pro上使用这个实现记录的运行时间示例，该电脑配备了M1芯片：
- en: 'Runtime for `fibonacci_recursive(5)`: 0.000006 seconds'
  id: totrans-2075
  prefs: []
  type: TYPE_NORMAL
  zh: '`fibonacci_recursive(5)`的运行时间为：0.000006秒'
- en: 'Runtime for `fibonacci_recursive(35)`: 1.7051 seconds'
  id: totrans-2076
  prefs: []
  type: TYPE_NORMAL
  zh: '`fibonacci_recursive(35)`的运行时间为：1.7051秒'
- en: 'Runtime of `fibonacci_recursive(40)`: 19.5045 seconds'
  id: totrans-2077
  prefs: []
  type: TYPE_NORMAL
  zh: '`fibonacci_recursive(40)`的运行时间为：19.5045秒'
- en: Computing the `fibonacci_recursive(100)` is estimated to take 15 trillion seconds,
    or approximately 475,000 years, making it completely impractical. This exponential
    growth represents one of the least desirable complexities in algorithm design
    as it remains inefficient regardless of the hardware used, as we will now explore.
  id: totrans-2078
  prefs: []
  type: TYPE_NORMAL
  zh: 计算`fibonacci_recursive(100)`预计需要1500万亿秒，或大约475,000年，这使得它完全不切实际。这种指数增长代表了算法设计中最不希望看到的复杂度之一，因为它无论使用什么硬件都保持低效，正如我们现在将要探讨的。
- en: Runtime complexity refresher
  id: totrans-2079
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 运行时复杂度复习
- en: Since computers vary in speed, it is widespread practice to measure runtime
    complexity in general terms using **Big-O notation**, denoted as ![](../Images/B31534_14_001.png).
    This notation describes how the runtime scales relatively to the size of the input
    data.
  id: totrans-2080
  prefs: []
  type: TYPE_NORMAL
  zh: 由于计算机的速度各不相同，因此广泛的做法是使用**大O符号**来一般性地衡量运行时复杂度，表示为![大O符号](../Images/B31534_14_001.png)。这种符号描述了运行时间相对于输入数据大小的相对缩放。
- en: 'For instance:'
  id: totrans-2081
  prefs: []
  type: TYPE_NORMAL
  zh: 例如：
- en: Finding the minimum number in an unsorted array of length ![](../Images/B31534_14_002.png)has
    a runtime complexity of ![](../Images/B31534_14_003.png)
  id: totrans-2082
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在长度为![长度](../Images/B31534_14_002.png)的无序数组中查找最小数具有![复杂度](../Images/B31534_14_003.png)的运行时复杂度
- en: Printing all ![](../Images/B31534_14_004.png)combinations of elements in an
    array of length ![](../Images/B31534_14_002.png)has a runtime complexity of ![](../Images/B31534_14_006.png).
  id: totrans-2083
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 打印长度为![长度](../Images/B31534_14_002.png)的数组中所有![组合](../Images/B31534_14_004.png)的元素具有![复杂度](../Images/B31534_14_006.png)的运行时复杂度。
- en: Retrieving the nth Fibonacci number using `fibonacci_recursive` has a runtime
    complexity of ![](../Images/B31534_14_007.png).
  id: totrans-2084
  prefs: []
  type: TYPE_NORMAL
  zh: 使用`fibonacci_recursive`计算第n个斐波那契数具有![复杂度](../Images/B31534_14_007.png)的运行时复杂度。
- en: If you need a further refresher on Big-O notation or are unfamiliar with it,
    we recommend checking the *Further Reading* section at the end of this chapter.
    Big-O notation is an essential concept for developers, both in application design
    and day-to-day problem-solving.
  id: totrans-2085
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您需要进一步复习大O符号或对它不熟悉，我们建议检查本章末尾的**进一步阅读**部分。大O符号是开发者在应用设计和日常问题解决中的基本概念。
- en: The space consumption of a program
  id: totrans-2086
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 程序的空间消耗
- en: The RAM consumed by a program during execution reflects its memory space usage.
    For instance, a MacBook Pro with 16 **gigabytes (GB)** of RAM can hold about 2
    billion float64 values where each `float64` occupies 8 bytes.
  id: totrans-2087
  prefs: []
  type: TYPE_NORMAL
  zh: 程序在执行过程中消耗的 RAM 反映了其内存空间使用情况。例如，一个拥有 16 **千兆字节 (GB)** RAM 的 MacBook Pro 可以容纳大约
    25 亿个 float64 值，其中每个 `float64` 占据 8 字节。
- en: 'Consider the following inefficient function `get_top_video` that reads a **comma-separated
    values (CSV)** file into memory as a *Pandas DataFrame* and returns the video
    with the highest average watch percentage:'
  id: totrans-2088
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑以下效率低下的函数 `get_top_video`，该函数将逗号分隔值 (CSV) 文件读取到内存中的 *Pandas DataFrame* 中，并返回平均观看百分比最高的视频：
- en: '[PRE289]'
  id: totrans-2089
  prefs: []
  type: TYPE_PRE
  zh: '[PRE289]'
- en: 'The input CSV file may represent a matrix as follows, where each cell indicates
    the percentage of a specific video watched by a user:'
  id: totrans-2090
  prefs: []
  type: TYPE_NORMAL
  zh: 输入 CSV 文件可能表示如下矩阵，其中每个单元格表示用户观看特定视频的百分比：
- en: '|  | video_1 | video_2 | video_3 | video_4 | video_5 | video_6 | ... |'
  id: totrans-2091
  prefs: []
  type: TYPE_TB
  zh: '|  | video_1 | video_2 | video_3 | video_4 | video_5 | video_6 | ... |'
- en: '| user_1 |  | 0.5 |  |  |  | 1 |  |'
  id: totrans-2092
  prefs: []
  type: TYPE_TB
  zh: '| user_1 |  | 0.5 |  |  |  | 1 |  |'
- en: '| user_2 | 0.1 |  |  | 0.7 |  | 0.9 |  |'
  id: totrans-2093
  prefs: []
  type: TYPE_TB
  zh: '| user_2 | 0.1 |  |  | 0.7 |  | 0.9 |  |'
- en: If the input dataset contains 50,000 users (rows) and 50,000 videos (columns),
    this would involve loading 2.5 billion cells into memory. Such a large dataset
    exceeds the 16 GB RAM limit, leading to an **out-of-memory error** and causing
    the function to fail.
  id: totrans-2094
  prefs: []
  type: TYPE_NORMAL
  zh: 如果输入数据集包含 50,000 个用户（行）和 50,000 个视频（列），这将涉及将 25 亿个单元格加载到内存中。如此大的数据集超过了 16 GB
    RAM 的限制，导致 **内存不足错误**，并导致函数失败。
- en: Space complexity
  id: totrans-2095
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 空间复杂度
- en: To assess memory usage, developers often use space complexity, expressed in
    Big-O notation, to describe how memory usage scales with the size of the data
    structure. For example, in `get_top_video`, the space complexity is ![](../Images/B31534_14_008.png)
    for a CSV file with ![](../Images/B31534_14_009.png)rows and ![](../Images/B31534_14_002.png)columns,
    as the function loads the entire dataset into memory.
  id: totrans-2096
  prefs: []
  type: TYPE_NORMAL
  zh: 为了评估内存使用，开发者通常使用空间复杂度，用大 O 表示法表示，来描述内存使用如何随着数据结构的大小而扩展。例如，在 `get_top_video`
    中，对于有 ![](../Images/B31534_14_009.png) 行和 ![](../Images/B31534_14_002.png) 列的
    CSV 文件，空间复杂度是 ![](../Images/B31534_14_008.png)，因为该函数将整个数据集加载到内存中。
- en: Balancing efficiency tradeoffs
  id: totrans-2097
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 平衡效率权衡
- en: When designing programs, it is common to encounter tradeoffs between memory
    usage and runtime efficiency. For instance, **caching** is the process of storing
    information such as a function’s calculated output values in RAM rather than recomputing
    them. This can significantly improve the speed of repeated calculations but also
    increases memory consumption. In a program that calls `fibonacci_recursive` repeatedly
    with the same input, such as `n=35` which previously took 1.7 seconds to run,
    caching the result could save 1.7 seconds for each subsequent call.
  id: totrans-2098
  prefs: []
  type: TYPE_NORMAL
  zh: 在设计程序时，经常会遇到内存使用和运行效率之间的权衡。例如，**缓存**是将函数的计算输出值等信息存储在 RAM 中而不是重新计算的过程。这可以显著提高重复计算的速度，但也会增加内存消耗。在一个重复调用
    `fibonacci_recursive` 函数的程序中，例如 `n=35`，之前运行需要 1.7 秒，缓存结果可以为后续每次调用节省 1.7 秒。
- en: Another tradeoff is with the `get_top_video` we read the entire file into memory
    before starting the calculations. It may be more practical to read smaller batches
    of data from disk and compute the cumulative top videos for each batch sequentially
    rather than handling the entire dataset at once. Reading and processing smaller
    chunks of large CSV files might take more time but helps avoid exceeding RAM limitations.
  id: totrans-2099
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个权衡是在 `get_top_video` 中，我们在开始计算之前将整个文件读入内存。可能更实际的做法是从磁盘读取较小的数据批次，并按顺序计算每个批次的累积顶级视频，而不是一次性处理整个数据集。读取和处理大型
    CSV 文件的小块数据可能需要更多时间，但有助于避免超过 RAM 限制。
- en: Now that we grasp the importance of runtime and space efficiency, how to assess
    their complexity, and the trade-offs involved, we can move forward and explore
    how GenAI can assist with each step in managing and optimizing program efficiency.
  id: totrans-2100
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经掌握了运行时间和空间效率的重要性，以及如何评估它们的复杂性和涉及的权衡，我们可以继续前进，探索 GenAI 如何在管理和优化程序效率的每个步骤中提供帮助。
- en: Profiling runtime and memory consumption with GitHub Copilot
  id: totrans-2101
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 使用 GitHub Copilot 分析运行时间和内存消耗
- en: Profiling runtime and memory usage is a straightforward process. The built-in
    `time` module is useful for tracking runtime and the third-party `memory_profiler`
    library monitors memory usage. The next two sub-sections describe how GitHub Copilot
    can assist by either completing our implementation or generating the code from
    scratch for these two cases. At the end of this section, we will ask ChatGPT to
    predict runtimes and memory size constraints using these analyses as input.
  id: totrans-2102
  prefs: []
  type: TYPE_NORMAL
  zh: 分析运行时间和内存使用是一个简单直接的过程。内置的`time`模块对于跟踪运行时间很有用，第三方`memory_profiler`库用于监控内存使用。接下来的两个子章节将描述GitHub
    Copilot如何通过完成我们的实现或从头生成代码来协助这两种情况。在本节的末尾，我们将要求ChatGPT使用这些分析作为输入来预测运行时间和内存大小限制。
- en: Profiling runtime
  id: totrans-2103
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 分析运行时间
- en: 'Measuring the runtime of a function in Python helps evaluate whether the time
    taken to complete the tasks in the source code aligns with acceptable thresholds
    and identifies potential areas for improvement. This can be achieved using a script
    like the following:'
  id: totrans-2104
  prefs: []
  type: TYPE_NORMAL
  zh: 在Python中测量函数的运行时间有助于评估源代码中完成任务所需的时间是否符合可接受的阈值，并识别潜在的改进区域。这可以通过以下脚本实现：
- en: '[PRE290]'
  id: totrans-2105
  prefs: []
  type: TYPE_PRE
  zh: '[PRE290]'
- en: By recording the time before and after execution, we can calculate the runtime
    as the difference between these times to compute the 35th Fibonacci number.
  id: totrans-2106
  prefs: []
  type: TYPE_NORMAL
  zh: 通过记录执行前后的时间，我们可以计算运行时间，即这两个时间之间的差值，以计算第35个斐波那契数。
- en: In[*Chapter 15*](Chapter_15.xhtml#_idTextAnchor610), we will explore how to
    use **decorators** to log application performance. For now, we will simply use
    `start` and `end` times to measure program runtime.
  id: totrans-2107
  prefs: []
  type: TYPE_NORMAL
  zh: 在[第15章](Chapter_15.xhtml#_idTextAnchor610)中，我们将探讨如何使用**装饰器**来记录应用程序性能。现在，我们将简单地使用`start`和`end`时间来测量程序运行时间。
- en: 'Since the profiling code is short and straightforward, the authors mostly use
    GitHub Copilot for such tasks. The following example demonstrates how Copilot
    can understand the purpose of our file, *profile_runtime.py*, by applying the
    five S’s for prompt precision as shown in *Figure 14.1*:'
  id: totrans-2108
  prefs: []
  type: TYPE_NORMAL
  zh: 由于分析代码简短且直接，作者们主要使用GitHub Copilot来完成此类任务。以下示例演示了Copilot如何通过应用如图14.1所示的五个S（提示精确度）来理解我们的文件`profile_runtime.py`的目的：
- en: '![Figure 14.1: Copilot completion](../Images/B31534_14_1.png)'
  id: totrans-2109
  prefs: []
  type: TYPE_IMG
  zh: '![图14.1：Copilot补全](../Images/B31534_14_1.png)'
- en: 'Figure 14.1: Copilot completion'
  id: totrans-2110
  prefs: []
  type: TYPE_NORMAL
  zh: 图14.1：Copilot补全
- en: In this example, we named the file *profile_runtime.py* and included the necessary
    imports for the `time` package and the `fibonacci_recursive` function to establish
    a clear context for Copilot. Based on these, Copilot is likely to identify our
    goal of profiling the `fibonacci_recursive` function and suggests a complete implementation
    for runtime profiling.
  id: totrans-2111
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个例子中，我们命名文件为`profile_runtime.py`，并包含了`time`包和`fibonacci_recursive`函数所需的必要导入，为Copilot建立一个清晰的上下文。基于这些，Copilot很可能会识别出我们的目标是分析`fibonacci_recursive`函数，并建议一个完整的运行时分析实现。
- en: 'Alternatively, we can use chat, ChatGPT or OpenAI API to generate the profiling
    script from scratch. For example, we could use the following prompt in Copilot
    chat:'
  id: totrans-2112
  prefs: []
  type: TYPE_NORMAL
  zh: 或者，我们可以使用聊天、ChatGPT或OpenAI API从头生成分析脚本。例如，我们可以在Copilot聊天中使用以下提示：
- en: '[PRE291]'
  id: totrans-2113
  prefs: []
  type: TYPE_PRE
  zh: '[PRE291]'
- en: 'Below is a sample implementation provided by Copilot in PyCharm:'
  id: totrans-2114
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是Copilot在PyCharm中提供的示例实现：
- en: '![Figure 14.2: Copilot chat to write the full method from a profiling suggestion](../Images/B31534_14_2.png)'
  id: totrans-2115
  prefs: []
  type: TYPE_IMG
  zh: '![图14.2：Copilot从分析建议中编写完整方法](../Images/B31534_14_2.png)'
- en: 'Figure 14.2: Copilot chat to write the full method from a profiling suggestion'
  id: totrans-2116
  prefs: []
  type: TYPE_NORMAL
  zh: 图14.2：Copilot从分析建议中编写完整方法
- en: This code can be used as-is to profile the runtime of the function. Alternatively,
    we can make slight modifications, such as rounding the runtime value for better
    readability.
  id: totrans-2117
  prefs: []
  type: TYPE_NORMAL
  zh: 这段代码可以直接用来分析函数的运行时间。或者，我们可以进行一些小的修改，例如对运行时间值进行四舍五入以提高可读性。
- en: 'Here is an output from running the suggested profiling script:'
  id: totrans-2118
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是运行建议的分析脚本的一个输出：
- en: '[PRE292]'
  id: totrans-2119
  prefs: []
  type: TYPE_PRE
  zh: '[PRE292]'
- en: While a runtime of 1.7 seconds for `n=35` might seem reasonable, the runtime
    for larger inputs, such as 50 or 100, becomes impractical. Later in this chapter,
    we will explore techniques to identify and address these challenges.
  id: totrans-2120
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然`n=35`时运行时间为1.7秒可能看起来合理，但对于更大的输入，如50或100，运行时间变得不切实际。在本章的后面部分，我们将探讨识别和解决这些挑战的技术。
- en: Profiling space usage
  id: totrans-2121
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 分析空间使用情况
- en: Profiling a program’s memory usage can be achieved with the `@profile` decorator
    from the `memory_profiler` package. This lightweight tool monitors memory usage
    for every line within a function. The package should be included in the *requirements.txt*
    file of this book’s repository, so it should already be accessible in your virtual
    environment.
  id: totrans-2122
  prefs: []
  type: TYPE_NORMAL
  zh: 使用`memory_profiler`包中的`@profile`装饰器可以实现对程序内存使用的分析。这个轻量级工具监控函数中每一行的内存使用情况。该包应包含在此书仓库的*requirements.txt*文件中，因此它应该已经可以在您的虚拟环境中访问。
- en: 'For example, to profile the function `get_top_video`, which retrieves the video
    with the highest average watch percentage, we can add the `@profile` decorator
    before the function definition. A call to the function with the file *interactions_10_000.csv*
    that records 10,000 users’ watch percentages of 10,000 videos will log the memory
    consumption for each line:'
  id: totrans-2123
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，为了配置`get_top_video`函数，该函数检索具有最高平均观看百分比的视频，我们可以在函数定义之前添加`@profile`装饰器。对包含10,000个用户观看10,000个视频观看百分比的文件*interactions_10_000.csv*的函数调用将记录每行的内存消耗：
- en: '[PRE293]'
  id: totrans-2124
  prefs: []
  type: TYPE_PRE
  zh: '[PRE293]'
- en: 'The profiling output provides details such as line numbers, total memory usage,
    incremental memory usage, the number of times each statement was executed, and
    the content of those executions. For reference, *Figure 14.3* shows the output
    from the code above:'
  id: totrans-2125
  prefs: []
  type: TYPE_NORMAL
  zh: 配置输出提供了诸如行号、总内存使用量、增量内存使用量、每个语句执行的次数以及这些执行的内容等详细信息。为了参考，*图14.3* 展示了上述代码的输出：
- en: '![Figure 14.3: Profiler output showing memory consumption by line](../Images/B31534_14_3.png)'
  id: totrans-2126
  prefs: []
  type: TYPE_IMG
  zh: '![图14.3：按行显示内存消耗的配置输出](../Images/B31534_14_3.png)'
- en: 'Figure 14.3: Profiler output showing memory consumption by line'
  id: totrans-2127
  prefs: []
  type: TYPE_NORMAL
  zh: 图14.3：按行显示内存消耗的配置输出
- en: 'The file *interactions_10_000.csv* contains 10,000 x 10,000 cells of type float64,
    requiring 8 bytes each, and the expected memory usage is approximately:'
  id: totrans-2128
  prefs: []
  type: TYPE_NORMAL
  zh: 文件*interactions_10_000.csv*包含10,000 x 10,000个float64类型的单元格，每个单元格需要8字节，预期的内存使用量大约为：
- en: '![](../Images/B31534_14_011.png)'
  id: totrans-2129
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/B31534_14_011.png)'
- en: This aligns closely with the memory consumption recorded at line 7, where loading
    the CSV file into a Pandas DataFrame consumed 889.7 MB. This includes both the
    memory required for the cell data and the overhead associated with the Pandas
    DataFrame object such as column and row names, metadata, and type.
  id: totrans-2130
  prefs: []
  type: TYPE_NORMAL
  zh: 这与第7行记录的内存消耗非常接近，其中将CSV文件加载到Pandas DataFrame中消耗了889.7 MB。这包括单元格数据所需的内存以及与Pandas
    DataFrame对象相关的开销，例如列名、行名、元数据和类型。
- en: Having learned how to use GitHub Copilot to simplify the creation of profiling
    scripts for runtime and space complexity, we can move forward and explore how
    to use Copilot to profile multiple runs and ChatGPT to estimate the maximum input
    capacity that our functions can manage.
  id: totrans-2131
  prefs: []
  type: TYPE_NORMAL
  zh: 学习了如何使用GitHub Copilot简化创建配置脚本以简化运行时间和空间复杂性的创建后，我们可以继续探索如何使用Copilot配置多次运行以及如何使用ChatGPT估计我们的函数可以管理的最大输入容量。
- en: Analyzing maximal capacity with ChatGPT
  id: totrans-2132
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 使用ChatGPT分析最大容量
- en: Identifying the maximal capacity of a function means determining the largest
    input beyond which it will fail due to either memory limitations or unacceptable
    runtime. One strategy for such predictions involves profiling its performance
    for a few input sizes, identifying the runtime or space growth, and then estimating
    the maximal capacity the function can handle. GenAI can assist in this two-step
    process by automating profiling for different inputs and using the results as
    supplementary data for a prompt to compute the maximal capacity.
  id: totrans-2133
  prefs: []
  type: TYPE_NORMAL
  zh: 确定函数的最大容量意味着确定超过该容量后由于内存限制或不可接受的运行时间而失败的最大的输入。此类预测的一种策略是针对几个输入大小对其性能进行配置，识别运行时间或空间增长，然后估计函数可以处理的最大容量。GenAI可以通过自动化不同输入的配置以及将结果用作提示以计算最大容量的辅助数据来协助这一两步过程。
- en: Profiling runtime across multiple runs
  id: totrans-2134
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 在多次运行中配置运行时间
- en: 'Copilot can assist us in creating a profiling loop for `fibonacci_recursive`
    like we did for a single profile. For instance, if we want to profile the runtime
    of the function for inputs ranging from 10 to 40 in steps of 5, we can start by
    adding the following import statements to the file:'
  id: totrans-2135
  prefs: []
  type: TYPE_NORMAL
  zh: Copilot可以帮助我们创建类似于单个配置的`fibonacci_recursive`配置循环。例如，如果我们想配置从10到40的输入的运行时间，步长为5，我们可以在文件中添加以下导入语句：
- en: '[PRE294]'
  id: totrans-2136
  prefs: []
  type: TYPE_PRE
  zh: '[PRE294]'
- en: 'Then use a prompt in Copilot chat like this:'
  id: totrans-2137
  prefs: []
  type: TYPE_NORMAL
  zh: 然后在Copilot聊天中使用如下提示：
- en: '[PRE295]'
  id: totrans-2138
  prefs: []
  type: TYPE_PRE
  zh: '[PRE295]'
- en: 'This prompt, along with the surrounding context of the import statements in
    the file, is likely to generate a code to profile runtimes for varying arguments:'
  id: totrans-2139
  prefs: []
  type: TYPE_NORMAL
  zh: 这个提示，连同文件中导入语句的周围上下文，很可能会生成一段代码来分析不同参数的运行时间：
- en: '![Figure 14.4: Profiling suggestion for profiling multiple Fibonacci inputs](../Images/B31534_14_4.png)'
  id: totrans-2140
