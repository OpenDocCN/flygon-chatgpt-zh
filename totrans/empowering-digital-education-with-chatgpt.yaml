- en: 9.1 Introduction to the Development of AI
  id: totrans-1663
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 9.1 人工智能发展简介
- en: Since the first reference to artificial intelligence (AI) appeared in 1956,
    there has been exponential technological progress that has accompanied the evolution
    of the current industrial fabric and has culminated in significant advances that
    represent a useful guide for many of the automated activities that surround us.
    Symbolizing productivity and digitization, the so-called fourth industrial revolution
    proposes the use of different disruptive technologies, such as the Internet of
    Things, big data, augmented and virtual reality, cloud services, and AI.
  id: totrans-1664
  prefs: []
  type: TYPE_NORMAL
  zh: 自1956年首次出现人工智能（AI）以来，伴随着当前工业结构的演变，技术进步呈指数级增长，并最终在许多我们周围的自动化活动中取得了显著的进步，这些进步成为了一个有用的指南。象征着生产力和数字化，所谓的第四次工业革命提出了使用不同的颠覆性技术，如物联网、大数据、增强和虚拟现实、云服务和人工智能。
- en: 'Today, AI has enjoyed widespread application in recent years in various sectors,
    from the healthcare sector, through its presence in drug development and personalized
    treatments, to the industry, with the creation of materials; in addition to other
    areas such as business, finance, logistics, and the environment (MINECO). In the
    field of education, it had a significant impact from the second millennium, with
    deep learning, data analysis, and the development of chatbots, which fostered
    text and image recognition and generation, assessment in teaching, interaction,
    immersive learning, and the creation of virtual assistants ([Sanabria-Navarro
    et al., 2023](#ch17.xhtml#r383)). Likewise, in recent years, ICT has significantly
    modified computer-assisted language learning (CALL), and the transition to intelligent
    CALL (ICALL) has provided the adaptation and personalization that characterize
    current teaching, as we witness networked environments where the integration of
    natural language processing (NLP) and AI potentials has a significant impact on
    language teaching ([Kannan and Munday 2018](#ch17.xhtml#r367)). Such has been
    its application that there have been numerous studies on the application of ChatGPT
    in education: post-editing ([González Vallejo 2023](#ch17.xhtml#r363)); automatic
    translation ([Lee 2023](#ch17.xhtml#r370)), for academic editing ([Castillo-González
    et al. 2022](#ch17.xhtml#r352)), student feedback ([Steiss et al. 2023](#ch17.xhtml#r387);
    [Dai et al. 2023](#ch17.xhtml#r358)), as a virtual tutor ([Limo et al. 2023](#ch17.xhtml#r371))
    and language teaching utilizing AR, voice bots and ChatGPT ([Topsakal and Topsakal
    2022](#ch17.xhtml#r388)), among others.'
  id: totrans-1665
  prefs: []
  type: TYPE_NORMAL
  zh: 近年来，人工智能在各个领域得到了广泛应用，从医疗保健领域，其在药物开发和个性化治疗中的存在，到工业领域，通过创造材料；以及其他领域，如商业、金融、物流和环境（MINECO）。在教育领域，它从第二个千年开始就产生了重大影响，深度学习、数据分析以及聊天机器人的发展促进了文本和图像的识别和生成、教学评估、互动、沉浸式学习和虚拟助手的创建([Sanabria-Navarro等，2023](#ch17.xhtml#r383))。同样，近年来，信息通信技术（ICT）显著改变了计算机辅助语言学习（CALL），向智能CALL（ICALL）的转变提供了当前教学所具有的适应性和个性化，正如我们所见证的网络环境，其中自然语言处理（NLP）和人工智能潜力的集成对语言教学产生了重大影响([Kannan和Munday
    2018](#ch17.xhtml#r367))。其应用如此广泛，以至于已经有许多关于ChatGPT在教育领域应用的研究：后编辑([González Vallejo
    2023](#ch17.xhtml#r363))；自动翻译([Lee 2023](#ch17.xhtml#r370))，用于学术编辑([Castillo-González等，2022](#ch17.xhtml#r352))，学生反馈([Steiss等，2023](#ch17.xhtml#r387);
    [Dai等，2023](#ch17.xhtml#r358))，作为虚拟导师([Limo等，2023](#ch17.xhtml#r371))，以及利用AR、语音机器人ChatGPT进行语言教学([Topsakal和Topsakal
    2022](#ch17.xhtml#r388))等。
- en: This significant advancement in AI has been made possible thanks to factors
    such as the exponential increase in usage data, technological progress in computer
    systems, and the development of algorithm research and machine learning (MINECO).
    However, its multiple facets and the continuous field studies to which it is subjected
    raise concerns about its correct use and uncertainties about its long-term impact,
    as reflected by [Kannan and Munday (2018)](#ch17.xhtml#r367), who assert that
    it will be under constant research, as further investigation is needed in affective
    computing, to analyze and leverage the affective aspects of learning.
  id: totrans-1666
  prefs: []
  type: TYPE_NORMAL
  zh: 由于使用数据呈指数级增长、计算机系统技术进步以及算法研究和机器学习（MINECO）的发展，人工智能的这一重大进步才成为可能。然而，其多面性和持续的研究领域研究引起了对其正确使用的担忧，以及对长期影响的不确定性，正如[Kannan和Munday
    (2018)](#ch17.xhtml#r367)所指出，他们认为它将始终处于研究之中，因为还需要在情感计算方面进行进一步的研究，以分析和利用学习的情感方面。
- en: Next, the applications of AI in education are presented with the aim of understanding
    its main uses by educational institutions; the potentials and challenges of ChatGPT
    in the educational field, where the most common uses of the program will be highlighted;
    and finally, the learning strategies with ChatGPT, in order to emphasize the functionalities
    that ChatGPT offers during Italian language learning through preliminary support,
    support during learning, and evaluative support strategies.
  id: totrans-1667
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，将介绍人工智能在教育领域的应用，旨在了解教育机构对其主要用途的理解；突出ChatGPT在教育领域的潜力和挑战，其中将重点介绍该程序最常见的使用；最后，将讨论使用ChatGPT的学习策略，以强调ChatGPT在意大利语学习过程中通过初步支持、学习过程中的支持和评估支持策略所提供的功能。
- en: 9.1.1 Chapter Organization
  id: totrans-1668
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 9.1.1 章节组织
- en: 'The rest of the chapter is organized as follows: [Section 9.2](#ch17.xhtml#h1-054)
    presents the applications of AI in education, aiming to understand what its main
    uses are by educational institutions. [Section 9.3](#ch17.xhtml#h1-055) highlights
    the potentials and challenges of ChatGPT in the educational field, focusing on
    its most common uses. [Section 9.4](#ch17.xhtml#h1-056) presents learning strategies
    with ChatGPT, aiming to highlight the functionalities offered by ChatGPT during
    Italian learning through preliminary support strategies, support during learning,
    and evaluative support. Finally, [Sections 9.5](#ch17.xhtml#h1-057) and [9.6](#ch17.xhtml#h1-058)
    conclude the chapter with discussions and conclusions.'
  id: totrans-1669
  prefs: []
  type: TYPE_NORMAL
  zh: 本章的其余部分组织如下：[第9.2节](#ch17.xhtml#h1-054)介绍了人工智能在教育中的应用，旨在了解教育机构的主要用途。[第9.3节](#ch17.xhtml#h1-055)突出了ChatGPT在教育领域的潜力和挑战，重点关注其最常见用途。[第9.4节](#ch17.xhtml#h1-056)介绍了使用ChatGPT的学习策略，旨在通过初步支持策略、学习过程中的支持和评估支持来突出ChatGPT在意大利语学习期间提供的功能。最后，[第9.5节](#ch17.xhtml#h1-057)和[第9.6节](#ch17.xhtml#h1-058)通过讨论和结论结束本章。
- en: 9.2 Applications of AI in Education
  id: totrans-1670
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 9.2 人工智能在教育中的应用
- en: In recent years, Artificial Intelligence in Education (AEID) has taken center
    stage by offering greater adaptation and personalization of educational content
    through its applications. With this purpose, it can enhance teaching by increasing
    study hours, providing more resources, and revamping traditional assessment methods,
    thus transforming the traditional classroom into an interactive learning environment
    ([Luo and Cheng 2020](#ch17.xhtml#r373)). Specifically, AI aims to address open
    challenges in education by innovating educational practices and promoting inclusion,
    equality, and quality. All of this is geared towards shaping a new critical and
    autonomous student immersed in technology, particularly within the multidirectional
    and (a) asynchronous system represented by distance education ([García Villarroel
    2021](#ch17.xhtml#r362)).
  id: totrans-1671
  prefs: []
  type: TYPE_NORMAL
  zh: 近年来，通过其应用提供更高级的教育内容适应性和个性化，教育领域的人工智能（AEID）已经占据了中心舞台。为此，它可以通过增加学习时间、提供更多资源和改革传统评估方法来增强教学，从而将传统课堂转变为互动学习环境（[Luo
    and Cheng 2020](#ch17.xhtml#r373)）。具体来说，AI旨在通过创新教育实践和促进包容性、平等和质量来应对教育中的开放挑战。所有这些都旨在塑造一个沉浸在技术中、具有新批判性和自主性的学生，尤其是在代表远程教育的多方向和（a）异步系统中（[García
    Villarroel 2021](#ch17.xhtml#r362)）。
- en: Evidence of this shift can be seen in various available alternatives that have
    emerged in developing countries, embodying these principles. In China, Liulishuo
    aims to teach English with a capacity to accommodate 600,000 students, and the
    Superteacher answers 500 million questions during Gaokao preparation. In Uruguay,
    the adaptive learning platform PAM focuses on personalized feedback in mathematics
    teaching. Brazil’s Mec Flix is an educational platform for national exam preparation,
    while Daptio in Cape Town is software that adapts learning by analyzing students’
    competencies. M-Shule in Kenya is used to deliver content via SMS based on the
    national curriculum, among others (United Nations 2019).
  id: totrans-1672
  prefs: []
  type: TYPE_NORMAL
  zh: 这种转变的证据可以在发展中国家出现的各种可用的替代方案中看到，这些方案体现了这些原则。在中国，Liulishuo旨在以能够容纳60万名学生的能力教授英语，而Superteacher在高考准备期间回答了5亿个问题。在乌拉圭，自适应学习平台PAM专注于数学教学中的个性化反馈。巴西的Mec
    Flix是一个国家考试准备的教育平台，而开普敦的Daptio是一种通过分析学生能力来适应学习的软件。在肯尼亚，M-Shule用于根据国家课程通过短信提供内容，等等（联合国2019）。
- en: The significant technological revolution witnessed in the education system has
    been made possible by the so-called fifth generation of computers, based on AI,
    robotics, expert systems, chips, and the implementation of machine learning, deep
    learning, and data analysis. These technologies have enabled the creation of applications
    that support the development of NLP, enhancing capabilities such as information
    classification and search, among others.[³](#fn3) In essence, the potential of
    AI lies in its ability to “solve complex problems by applying advanced programming
    techniques without the need to establish predefined steps or instructions, as
    is the case with conventional computer programs” (MINECO, p. 3).[⁴](#fn4) Moreover,
    AI integrates techniques from foundational educational theories such as behaviorism,
    connectivism, discovery learning, and constructivism ([Escobar Hernández 2021](#ch17.xhtml#r359)).
  id: totrans-1673
  prefs: []
  type: TYPE_NORMAL
  zh: 教育系统中见证的重大技术革命得益于所谓的第五代计算机，这些计算机基于人工智能、机器人技术、专家系统、芯片，以及机器学习、深度学习和数据分析的实施。这些技术使得创建支持自然语言处理（NLP）发展的应用程序成为可能，增强了信息分类和搜索等能力。[³](#fn3)
    从本质上讲，人工智能的潜力在于其能够“通过应用高级编程技术解决复杂问题，而不需要建立预定义的步骤或指令，这与传统计算机程序的情况不同”（MINECO，第3页）。[⁴](#fn4)
    此外，人工智能整合了行为主义、连接主义、发现学习和建构主义等基础教育理论的技术([Escobar Hernández 2021](#ch17.xhtml#r359))。
- en: In this context, [Ma (2021)](#ch17.xhtml#r374) examines the English learning
    experience of two groups of university students. While the control group uses
    a traditional method, the experimental group receives training through virtual
    reality technology based on constructivist theory. Given the importance of working
    on the learner’s experience and meaning construction, the immersive experience
    in the experimental group yielded superior results and satisfaction compared to
    the control group. Consequently, we agree that AIED “enables the adjustment and/or
    adaptation of a user’s learning pathways through inductive processes based on
    data extracted from formative evidence generated throughout their school life”
    ([Magal-Royo and García Laborda 2017](#ch17.xhtml#r375), p. 1). To such an extent
    that AI has even been proposed as an effective strategy for addressing learning
    problems, as seen in the case of students with dyslexia ([Chassignol et al. 2018](#ch17.xhtml#r353)).
    [Table 9.1](#ch17.xhtml#t19) presents some applications of Generative AI in education.
  id: totrans-1674
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个背景下，[Ma (2021)](#ch17.xhtml#r374) 考察了两组大学生的英语学习体验。虽然对照组使用传统方法，但实验组通过基于建构主义理论的虚拟现实技术接受培训。鉴于对学习者体验和意义构建的重要性，实验组的沉浸式体验与对照组相比，产生了更好的结果和满意度。因此，我们同意AIED“通过基于从整个学校生活中生成的形成性证据中提取的数据的归纳过程，调整和/或适应用户的
    学习路径”([Magal-Royo and García Laborda 2017](#ch17.xhtml#r375)，第1页)。甚至有人提出，人工智能是解决学习问题的有效策略，正如有阅读障碍的学生的案例所示([Chassignol
    et al. 2018](#ch17.xhtml#r353))。[表9.1](#ch17.xhtml#t19) 展示了教育中生成式人工智能的一些应用。
- en: '[Table 9.1](#ch17.xhtml#t19b) Applications of AI in education'
  id: totrans-1675
  prefs: []
  type: TYPE_NORMAL
  zh: '[表9.1](#ch17.xhtml#t19b) 教育中人工智能的应用'
- en: '| Administration | • Perform the administrative tasks faster that consume much
    of instructors’ time, such as grading exams and providing feedback. • Identify
    the learning styles and preferences of each of their students, helping them build
    personalized learning plans. • Assist instructors in decision support and data-driven
    work. • Give feedback and work with students timely and directly. |'
  id: totrans-1676
  prefs: []
  type: TYPE_TB
  zh: '| 管理 | • 快速完成消耗教师大量时间的行政任务，例如批改考试和提供反馈。 • 识别每位学生的学习风格和偏好，帮助他们建立个性化学习计划。 • 协助教师在决策支持和数据驱动的工作中。
    • 及时直接地向学生提供反馈并与学生合作。 |'
- en: '| Instruction | • Anticipate how well a student exceeds expectations in projects
    and exercises and the odds of dropping out of school. • Analyze the syllabus and
    course material to propose customized content. • Allow instruction beyond the
    classroom and into the higher-level education, supporting collaboration. • Tailor
    teaching methods for each student based on their personal data. • Help instructors
    create personalized learning plans for each student. |'
  id: totrans-1677
  prefs: []
  type: TYPE_TB
  zh: '| 指令 | • 预测学生在项目和练习中超出预期表现的程度以及辍学的可能性。 • 分析课程大纲和教材，提出定制化内容。 • 允许课堂外的教学，支持高等教育中的协作。
    • 根据学生的个人数据调整教学方法。 • 帮助教师为每位学生制定个性化学习计划。 |'
- en: '| Learning | • Uncover the learning shortcomings of students and address them
    early in education. • Customize the university course election for students. •
    Predict the career path for each student by gathering studying data. • Detect
    learning state and apply intelligent adaptive intervention to students. |'
  id: totrans-1678
  prefs: []
  type: TYPE_TB
  zh: '| 学习 | • 揭示学生的学习不足并及早解决。 • 为学生定制大学课程选择。 • 通过收集学习数据预测每个学生的职业道路。 • 检测学习状态并对学生应用智能自适应干预。
    |'
- en: Note. From [Chen et al. (2020](#ch17.xhtml#r354), p. 75272).
  id: totrans-1679
  prefs: []
  type: TYPE_NORMAL
  zh: 注意。摘自 [Chen 等人 (2020)](#ch17.xhtml#r354)，第 75272 页。
- en: In Spain, the objective of the National Artificial Intelligence Strategy (ENIA)
    is to coordinate the actions of different administrations, serving as a reference
    point for both the public and private sectors (MINECO). Among its strategic goals,
    emphasis is placed on promoting the Spanish language and its use in AI technologies.
    To this end, [Cuenca (2021)](#ch17.xhtml#r356) reflects on the development of
    AI in Spanish compared to English. Specifically, it suggests that there is a common
    interest among institutions, businesses, science, and citizens in narrowing the
    gap between the two languages. While acknowledging that this delay is, in part,
    a disadvantage, it allows for learning from the implementation of technologies
    and anticipating future developments. As a solution for bridging this gap, the
    proposal involves “public-private collaboration and the connection between scientists,
    engineers, business developers, entrepreneurs, and public administrations” ([Cuenca
    2021](#ch17.xhtml#r356), p. 13).
  id: totrans-1680
  prefs: []
  type: TYPE_NORMAL
  zh: 在西班牙，国家人工智能战略（ENIA）的目标是协调不同行政机构的行为，作为公共和私营部门的参考点（MINECO）。在其战略目标中，强调促进西班牙语及其在人工智能技术中的应用。为此，[Cuenca
    (2021)](#ch17.xhtml#r356) 对西班牙语与英语在人工智能发展上的差异进行了反思。具体来说，它提出，在机构、企业、科学和公民之间存在着缩小两种语言差距的共同利益。虽然承认这种延迟部分是一个劣势，但它允许从技术的实施中学习并预测未来的发展。作为弥合这一差距的解决方案，该提议涉及“公私合作以及科学家、工程师、商业开发者、企业家和公共行政机构之间的联系”([Cuenca
    2021](#ch17.xhtml#r356)，第 13 页)。
- en: Finally, the collection of massive data, enabling the feeding of AI systems
    applied to education, raises concerns about the management and compilation of
    such data. [Regan and Jesse (2018](#ch17.xhtml#r382), cited in [Hockly 2023](#ch17.xhtml#r364))
    question the extent to which the user controls their data (privacy), which data
    are anonymized (anonymity), the purpose of monitoring users (surveillance), how
    much autonomy the user has in the system (autonomy), what non-discrimination measures
    are in place (non-discrimination), and who owns control of the data (information
    ownership).[⁵](#fn5) All of this leads us to discuss the numerous challenges that
    the rapid implementation of AI in the educational field has brought about. According
    to [Hwang et al. (2020)](#ch17.xhtml#r366), important considerations in AIED include
    the development of learning models that align with educational objectives, the
    performance of students learning with AI systems, a redefinition of educational
    theories through a new conception of education based on new learning systems,
    big data analysis focused on education, the development of ethical practices,
    and collaboration between humans and AI. On the other hand, [Owoc et al. (2021)](#ch17.xhtml#r379)
    highlight challenges in establishing strategies agreed upon by all stakeholders
    based on specific goals and timelines; achieving maturity in the adoption of AI
    technologies; controlling data to feed systems through quality, access, and data
    lifecycle principles; and addressing infrastructure problems arising from the
    compatibility and integration of different technologies. Finally, [Zawacki-Richter
    et al. (2019)](#ch17.xhtml#r391), in their analysis of research on AI applications
    in higher education, argue that there is a lack of critical reflection on the
    ethical issues, risks, and challenges posed by AI in education, and a lack of
    robustness with theoretical pedagogical approaches.
  id: totrans-1681
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，大量数据的收集，使得AI系统在教育领域的应用成为可能，这引发了关于此类数据管理和汇编的担忧。[Regan和Jesse (2018](#ch17.xhtml#r382)，参见[Hockly
    2023](#ch17.xhtml#r364))质疑用户对其数据的控制程度（隐私），哪些数据被匿名化（匿名性），监控用户的目的（监控），用户在系统中的自主程度（自主性），实施的非歧视措施（非歧视），以及谁拥有数据控制权（信息所有权）[⁵](#fn5)。所有这些都让我们讨论了AI在教育领域快速实施所带来的众多挑战。根据[Hwang等人(2020)](#ch17.xhtml#r366)，AIED的重要考虑因素包括开发与教育目标一致的学习模型，使用AI系统学习的学生表现，通过基于新学习系统的新教育观念重新定义教育理论，关注教育的数据分析，发展道德实践，以及人与AI之间的合作。另一方面，[Owoc等人(2021)](#ch17.xhtml#r379)强调在基于具体目标和时间表达成所有利益相关者一致策略方面的挑战；在采用AI技术方面达到成熟；通过质量、访问和数据生命周期原则控制数据以喂养系统；以及解决由不同技术的兼容性和集成引起的基础设施问题。最后，[Zawacki-Richter等人(2019)](#ch17.xhtml#r391)，在他们对高等教育中AI应用的研究分析中，认为缺乏对AI在教育中提出的伦理问题、风险和挑战的批判性反思，以及缺乏对理论教学方法的稳健性。
- en: 9.3 Potentials and Challenges of ChatGPT
  id: totrans-1682
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 9.3 ChatGPT 的潜力和挑战
- en: While the functionalities offered by ChatGPT in language comprehension and production
    are undeniable, and it appears to be suitable for both personal and professional
    use, it has garnered significant media attention regarding data privacy, the reliability
    of its massive pretraining, and its environmental cost. As an example, in recent
    months, Italy has blocked access to ChatGPT due to concerns about data protection
    ([Planas Bou 2023](#ch17.xhtml#r380)). Some companies, such as Deloitte, have
    instructed their employees not to share confidential information through ChatGPT
    due to the risk of leaks ([Sánchez 2023](#ch17.xhtml#r384)). Universities, like
    the University of Copenhagen, have studied its environmental impact, concluding
    that its pretraining cost approximately 85,000 kilograms of CO[2] ([Muñoz 2023](#ch17.xhtml#r378)).
  id: totrans-1683
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然ChatGPT在语言理解和生成方面的功能无可否认，并且似乎适用于个人和职业用途，但它因数据隐私、其大规模预训练的可靠性以及其环境成本而受到媒体的高度关注。例如，在最近几个月，意大利因对数据保护的担忧而封锁了对ChatGPT的访问([Planas
    Bou 2023](#ch17.xhtml#r380))。一些公司，如德勤，已指示其员工不要通过ChatGPT分享机密信息，以防止泄露([Sánchez 2023](#ch17.xhtml#r384))。像哥本哈根大学这样的大学已经研究了其环境影响，结论是它的预训练成本大约为85,000公斤的CO[2]([Muñoz
    2023](#ch17.xhtml#r378))。
- en: Despite these concerns, ChatGPT remains one of the most widely used chatbots.
    In terms of its potential, notable features include the platform’s intuitiveness,
    its usability across various devices, dynamic language learning, and a system
    particularly beneficial for shy students ([Schmidt and Strasser 2022](#ch17.xhtml#r385)),
    making it useful in all educational stages. To such a purpose, [Kasneci et al.
    (2023)](#ch17.xhtml#r368) analyze the application of ChatGPT in different educational
    stages. In primary education, it could be useful for developing writing and reading
    skills, along with critical thinking through adaptive questioning. At the university
    level, it can assist in research tasks and the generation of summaries and outlines,
    fostering quicker comprehension. In professional training, beyond language study
    for specific purposes, it can contribute to other tasks such as report writing
    or project management.
  id: totrans-1684
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管存在这些担忧，ChatGPT仍然是使用最广泛的聊天机器人之一。就其潜力而言，其显著特点包括平台的直观性、跨各种设备的可用性、动态语言学习，以及特别有利于害羞学生的系统（[Schmidt和Strasser
    2022](#ch17.xhtml#r385)），使其在所有教育阶段都非常有用。为此，[Kasneci等人（2023）](#ch17.xhtml#r368)分析了ChatGPT在不同教育阶段的应用。在基础教育阶段，它可以用于培养写作和阅读技能，以及通过适应性提问进行批判性思维。在大学阶段，它可以帮助进行研究任务和总结、提纲的生成，从而促进更快地理解。在专业培训中，除了特定目的的语言学习之外，它还可以帮助完成其他任务，如报告撰写或项目管理。
- en: On the other hand, regarding the challenges it presents, we find issues such
    as the lack of data privacy, inefficient use in high-performance scenarios, and
    the cost of full versions ([Schmidt and Strasser 2022](#ch17.xhtml#r385)).[⁶](#fn6)
    Additionally, we can add other challenges, such as effective language understanding,
    as nuances or colloquialisms can pose a challenge in information management. The
    lack of human-like interaction, which only a native speaker can provide to communication,
    and the importance of offering universal access to these systems to bridge the
    digital divide ([Chicaiza et al. 2023](#ch17.xhtml#r355)) are also significant
    challenges. Continuous human supervision is essential, and there is a risk of
    potential misinformation in the system’s responses if the corpus is not reliable.
    Another challenge relates to the responses provided when the information does
    not meet the user’s satisfaction threshold, known as reinforcement learning. This
    process involves the algorithm generating different responses and learning from
    the most appropriate suggestions ([Mijwil et al. 2022](#ch17.xhtml#r376)). The
    inefficiency in addressing certain questions is linked to the fact that the chatbot
    works contextually and semantically in its responses based on information extracted
    from the texts in its massive pretraining. This means it understands the relationships
    and dependencies between words but lacks an understanding of how these concepts
    correspond to the real world, despite the surprising generalizations it can generate
    ([Cuenca 2021](#ch17.xhtml#r356)). Moreover, the fact that ChatGPT operates in
    English raises questions about the reliability of using other languages without
    developing specific language models (LLMs). Implementing such technology is a
    consideration due to factors like limited transparency, high maintenance costs,
    and various short-term risks, among others ([Dac Lai et al. 2023](#ch17.xhtml#r357)).
  id: totrans-1685
  prefs: []
  type: TYPE_NORMAL
  zh: 另一方面，关于它所提出的挑战，我们发现存在数据隐私缺失、高性能场景下的低效使用，以及完整版本的成本等问题（[Schmidt和Strasser 2022](#ch17.xhtml#r385)）。[⁶](#fn6)
    此外，我们还可以添加其他挑战，例如有效的语言理解，因为细微差别或俚语可能在信息管理中构成挑战。缺乏类似人类的互动，这是只有母语者才能为交流提供的，以及提供这些系统以弥合数字鸿沟的重要性（[Chicaiza等人
    2023](#ch17.xhtml#r355)）也是重大的挑战。持续的人类监督是必不可少的，如果语料库不可靠，系统响应中存在潜在的错误信息风险。另一个挑战与当信息不符合用户满意度阈值时的响应有关，这被称为强化学习。这个过程涉及算法生成不同的响应，并从最合适的建议中学习（[Mijwil等人
    2022](#ch17.xhtml#r376)）。处理某些问题的低效与聊天机器人基于从其大量预训练文本中提取的信息在上下文和语义上工作的事实有关。这意味着它理解词语之间的关系和依赖，但缺乏理解这些概念如何对应现实世界的能力，尽管它可以产生令人惊讶的泛化（[Cuenca
    2021](#ch17.xhtml#r356)）。此外，ChatGPT以英语为操作语言，这引发了关于在没有开发特定语言模型（LLMs）的情况下使用其他语言可靠性的问题。由于透明度有限、维护成本高昂以及各种短期风险等因素，实施此类技术是一个需要考虑的因素（[Dac
    Lai等人 2023](#ch17.xhtml#r357)）。
- en: 9.4 Learning Strategies with ChatGPT
  id: totrans-1686
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 9.4 使用ChatGPT的学习策略
- en: 'AI offers significant advantages in the educational field, such as personalized
    curriculum plans, adaptation to the student’s pace, attention to individual needs,
    and the use of intelligent tutoring systems. Its application is shared by all
    stakeholders in the educational system: teachers apply AI from a pedagogical perspective
    to foster student motivation and performance; students leverage it to analyze
    their performance and receive academic assistance; and researchers not only create
    platforms but also study the implications of their use ([Hwang et al. 2020](#ch17.xhtml#r366)).
    However, it is important to note that sometimes the use of technology creates
    dependence on the part of teachers, who turn to computer tools with the aim of
    imparting the same knowledge through technology without changing their methodology.
    In this regard, [Kasneci et al. (2023)](#ch17.xhtml#r368) warn of the risks of
    teacher dependence on AI and propose a series of recommendations to mitigate the
    danger: AI is only a supplement, continuous training for critical thinking, evaluation
    of its use in the classroom, and promotion of educational strategies that involve
    characters and problem-solving activities.'
  id: totrans-1687
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能在教育领域提供了显著的优势，如个性化课程计划、适应学生的进度、关注个体需求以及使用智能辅导系统。其应用在教育系统的所有利益相关者中共享：教师从教学角度应用AI以激发学生的动机和表现；学生利用它来分析自己的表现并获得学术援助；研究人员不仅创建平台，还研究其使用的含义([Hwang等人
    2020](https://wiki.example.org/ch17.xhtml#r366))。然而，值得注意的是，有时技术的使用会导致教师产生依赖，他们转向计算机工具的目的是通过技术传授相同的知识，而不改变他们的教学方法。在这方面，[Kasneci等人（2023）](https://wiki.example.org/ch17.xhtml#r368)警告教师对AI的依赖风险，并提出了一系列减轻危险的建议：AI只是一个补充，持续进行批判性思维的培训，评估其在课堂上的使用，以及推广涉及角色和解决问题的教育活动策略。
- en: Concerning the use of second languages, there is a lack of practical studies
    analyzing the potentials of ChatGPT in language classrooms. Among them, [Kohnke
    et al. (2023)](#ch17.xhtml#r369) study the advantages and disadvantages, as well
    as the digital competencies of both teachers and students, in its use for language
    study. [Barrot (2023)](#ch17.xhtml#r351) analyzes the benefits and challenges
    of using ChatGPT in writing the second language (L2). [Shaikh et al. (2023)](#ch17.xhtml#r386)
    qualitatively study the effectiveness of ChatGPT in the formal learning of English
    through questionnaires, and finally, [Young and Shishido (2023)](#ch17.xhtml#r390)
    examine the quality of dialogues produced by the chatbot in English as a Foreign
    Language (EFL) students, asserting that the most suitable audience is those at
    an A2 level of proficiency.
  id: totrans-1688
  prefs: []
  type: TYPE_NORMAL
  zh: 关于第二语言的使用，缺乏对ChatGPT在语言课堂中潜力的实际研究。其中，[Kohnke等人（2023）](https://wiki.example.org/ch17.xhtml#r369)研究了其在语言学习中的应用的优缺点，以及教师和学生的数字能力。[Barrot（2023）](https://wiki.example.org/ch17.xhtml#r351)分析了使用ChatGPT进行第二语言（L2）写作的益处和挑战。[Shaikh等人（2023）](https://wiki.example.org/ch17.xhtml#r386)通过问卷调查定性研究了ChatGPT在正式学习英语中的有效性，最后，[Young和Shishido（2023）](https://wiki.example.org/ch17.xhtml#r390)检验了英语作为外语（EFL）学生产生的聊天机器人对话的质量，断言最合适的受众是那些处于A2水平的学习者。
- en: 'For all these reasons, and with the aim of providing a comprehensive study
    of the actions that ChatGPT offers for language learning, we will now present
    a taxonomy of the strategies identified based on the preparation for the Italian
    B1 level. To do this, we have used the activities and language skills required
    for the official test at that level (CELI 2) of the Università per Stranieri di
    Perugia as a reference for the content of the prompts. We have focused, due to
    space constraints, on language skills and written production. The language teaching
    strategies offered by ChatGPT have been classified into three groups: preliminary
    support, support during learning, and evaluative support. For each strategy, we
    will indicate the prompt used (PR), the program’s response (CG), and, at times,
    the presence of more than one interaction by the user with the program (H), as
    in the case of written production and interaction. The results generated by ChatGPT
    will be shown only in part, for space reasons, and in English when possible, relying
    on ChatGPT’s translation, which, as demonstrated in other studies, is superior
    compared to other commercial translation engines ([Gao et al. 2023](#ch17.xhtml#r361)).
    [Table 9.2](#ch17.xhtml#t20) presents specific forms of digital competence needed
    to use ChatGPT. This justification is based on the occasional need to keep the
    text in Italian unchanged for the study of errors in understanding the response.
    Finally, a concluding section is provided dedicated to the limitations detected
    in the program’s functions.'
  id: totrans-1689
  prefs: []
  type: TYPE_NORMAL
  zh: 由于以上所有原因，并且旨在提供对ChatGPT为语言学习提供的行动的全面研究，我们现在将根据为意大利B1级别准备的策略来展示一个策略分类法。为此，我们使用了佩鲁贾外国人大学的官方测试（CELI
    2）在该级别所需的活动和语言技能作为提示内容的标准。由于空间限制，我们专注于语言技能和书面生产。ChatGPT提供的语言教学策略被分为三组：初步支持、学习过程中的支持和评估支持。对于每个策略，我们将指出所使用的提示（PR）、程序的反应（CG），有时还会指出用户与程序之间的多次互动（H），例如在书面生产和互动的情况下。由于空间原因，ChatGPT生成的结果将仅部分展示，并在可能的情况下使用英语展示，依赖于ChatGPT的翻译，正如其他研究所示，其翻译质量优于其他商业翻译引擎([高etal.
    2023](#ch17.xhtml#r361))。[表9.2](#ch17.xhtml#t20)展示了使用ChatGPT所需的具体数字能力形式。这种解释基于偶尔需要保持文本在意大利语中不变，以便研究对响应理解的错误。最后，提供了一个专门讨论程序功能局限性的结论部分。
- en: '[Table 9.2](#ch17.xhtml#t20b) Strategies with ChatGPT based on language teaching'
  id: totrans-1690
  prefs: []
  type: TYPE_NORMAL
  zh: '[表9.2](#ch17.xhtml#t20b) 基于语言教学的ChatGPT策略'
- en: '| Preliminary support | — Lesson planning and objectives — Creation of didactic
    materials (exercises, dialogues, specific textual genres, and general reading
    comprehension) |'
  id: totrans-1691
  prefs: []
  type: TYPE_TB
  zh: '| 初步支持 | — 课程计划和目标 — 教学材料的制作（练习、对话、特定文本类型和一般阅读理解） |'
- en: '| Support during learning | — Creation of mind maps — Written production and
    interaction in real and authentic contexts — Gamification — Text analysis — Automatic
    translation — Definition of words — Language for specific purposes (and different
    language registers) — Pronunciation — Grammar correction — Vocabulary analysis
    — Grammar explanations — Summaries and paraphrasing — Writing tips — Adaptation
    of texts and levels |'
  id: totrans-1692
  prefs: []
  type: TYPE_TB
  zh: '| 学习过程中的支持 | — 制作思维导图 — 在真实和真实情境中的书面生产和互动 — 游戏化 — 文本分析 — 自动翻译 — 词汇定义 — 专门用途语言（和不同的语言语域）
    — 发音 — 语法纠正 — 词汇分析 — 语法解释 — 摘要和改写 — 写作技巧 — 文本和水平的调整 |'
- en: '| Evaluative support | — Evaluation and feedback — Error correction — Research
    |'
  id: totrans-1693
  prefs: []
  type: TYPE_TB
  zh: '| 评估支持 | — 评估和反馈 — 错误纠正 — 研究 |'
- en: 9.4.1 Preliminary support
  id: totrans-1694
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 9.4.1 初步支持
- en: 'Lesson planning and objectives *(PR) I am a student of Italian at B1 level
    and I need to plan the contents of this level for a self-study of 12 weeks, 4
    hours a week. Can you plan the contents and objectives for learning B1 Italian?*
    (CG) Weeks 3–4: Past Tense and Thematic Vocabulary Objectives:'
  id: totrans-1695
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 课程计划和目标 *(PR) 我是一名B1级别的意大利语学生，我需要为12周的自学计划制定这个级别的教学内容，每周4小时。你能为我制定B1意大利语的学习内容和目标吗？*
    (CG) 第3-4周：过去时态和主题词汇目标：
- en: Learn the simple past tense of regular and irregular verbs.
  id: totrans-1696
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 学习规则动词和不规则动词的简单过去时态。
- en: 'Expand vocabulary in themes such as travel, food, and leisure. Activities:'
  id: totrans-1697
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在旅行、食物和休闲等主题中扩展词汇。活动：
- en: Practice conjugating verbs in the past.
  id: totrans-1698
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 练习过去时态的动词变位。
- en: Read texts related to the mentioned themes.
  id: totrans-1699
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 阅读与所提及主题相关的文本。
- en: Engage in brief conversations about past experiences.
  id: totrans-1700
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 参与关于过去经历的简短对话。
- en: Creation of didactic materials (exercises, dialogues, specific textual genres,
    and general reading comprehension) *(PR) I am an Italian B1 student and I need
    to create a set of questions on this economics text adapted to B1 level to work
    on reading comprehension.* (CG) Nell’Unione europea si producono ogni anno più
    di 2,2 miliardi di tonnellate di rifiuti. L’UE sta aggiornando la legislazione
    sulla gestione dei rifiuti per promuovere la transizione verso un’economia circolare,
    in alternativa all’attuale modello economico lineare. A marzo 2020 la Commissione
    europea ha presentato, sotto il Green deal europeo in linea con la proposta per
    la nuova strategia industriale, il piano d’azione per una nuova economia circolare
    che include proposte sulla progettazione di prodotti più sostenibili, sulla riduzione
    dei rifiuti e sul dare più potere ai cittadini, come per esempio attraverso il
    ‘diritto alla riparazione’ […] (European Union, 2023).
  id: totrans-1701
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 制作教学材料（练习、对话、特定文本类型和一般阅读理解） *(PR) 我是一名意大利B1级学生，我需要为这篇经济文本制作一套适合B1级别的阅读理解问题。
    (CG) 在欧盟，每年产生的垃圾超过22亿吨。欧盟正在更新废物管理法规，以促进向循环经济的转型，而不是目前的线性经济模式。2020年3月，欧洲委员会在欧洲绿色协议和新的工业战略提案下提出了新的循环经济行动计划，包括关于更可持续产品设计、减少废物和赋予公民更多权力的建议
    [...] (欧洲联盟，2023)。
