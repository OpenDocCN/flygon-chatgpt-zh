  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: '****让我们**分解**ChatGP**T**工作的三个核心部分：'
- en: '****1****. ****To**ken**s'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: '****1****. ****标记'
- en: '****Cha**tGP**T ****do**esn**’****t**** ****act**uall**y ****re**ad** ****o**r**
    ****wr**ite** ****wo**rd**-****b**y**-****wo**rd** ****li**ke** ****w**e** ****d**o**.
    ****Ins**tea**d, ****i**t** ****br**eak**s ****do**wn** ****te**xt** ****in**to**
    ****sm**all** ****ch**unk**s ****ca**lle**d *****to**ken**s*—****th**ese** ****mi**ght**
    ****b**e** ****wo**rds**, ****pa**rts** ****o**f** ****wo**rds**, ****o**r** ****ev**en**
    ****sym**bol**s. ****S**o**, “****Cha**tGP**T” ****mi**ght** ****b**e** ****o**ne**
    ****to**ken**, ****wh**ile** “****I**t**’****s**** ****rai**nin**g ****ca**ts**
    ****a**nd** ****do**gs**” ****mi**ght** ****b**e** ****br**oke**n ****do**wn**
    ****in**to** ****sev**era**l ****to**ken**s.'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: '****ChatGP**T****并不真正像我们一样逐字逐句地阅读或写作。相反，它将文本分解成称为**标记**的小块——这些可能是单词、单词的一部分，甚至是符号。因此，“**ChatGP**T”可能是一个标记，而“**It’s
    raining cats and dogs**”可能被分解成几个标记。'
- en: '****Th**ese** ****to**ken**s ****he**lp** ****t**he** ****mo**del** ****pro**ces**s
    ****te**xt** ****i**n** ****sm**all**, ****mana**geabl**e ****pi**ece**s ****a**nd**
    ****ma**ke** ****se**nse** ****o**f** ****wh**at** ****co**mes** ****ne**xt**.'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: '****这些标记帮助模型将文本处理成小而可管理的片段，并理解接下来会发生什么。'
- en: '****2****. ****Ne**ura**l ****Net**work**s'
