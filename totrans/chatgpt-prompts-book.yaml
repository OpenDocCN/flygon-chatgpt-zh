- en: Create Tables
  id: totrans-269
  prefs: []
  type: TYPE_NORMAL
- en: Creating tables can be a time-consuming and tedious task, especially when dealing
    with unorganized text. Using ChatGPT, you can take messy text and organize key
    information into a table in seconds.
  id: totrans-270
  prefs: []
  type: TYPE_NORMAL
- en: To create a table using ChatGPT, you will need to supply the input data that
    you want to include in the table. This can be in the form of copying and pasting
    chat logs, email, or other text content into the relevant chat.
  id: totrans-271
  prefs: []
  type: TYPE_NORMAL
- en: Next, specify the column titles manually or use ChatGPT to generate column titles
    automatically based on the input data. Once you've provided the input data, column
    titles (optional), and a text prompt outlining your intentions, ChatGPT will generate
    a new table based on the information provided.
  id: totrans-272
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，手动指定列标题或使用ChatGPT根据输入数据自动生成列标题。一旦你提供了输入数据、列标题（可选）和概述你意图的文本提示，ChatGPT将根据提供的信息生成一个新的表格。
- en: '**Text Prompts**'
  id: totrans-273
  prefs: []
  type: TYPE_NORMAL
  zh: '**文本提示**'
- en: Input the above into a table
  id: totrans-274
  prefs: []
  type: TYPE_NORMAL
  zh: 将上述内容输入到表格中
- en: 'Input the above into a table with the column titles: ___, ___, ___, ___'
  id: totrans-275
  prefs: []
  type: TYPE_NORMAL
  zh: 将上述内容输入到带有以下列标题的表格中：___，___，___，___
- en: Create a table with {num} columns and {num} rows
  id: totrans-276
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个有{列数}列和{行数}行的表格
- en: Can you generate a table with {specific information} in {number of columns}
    columns?
  id: totrans-277
  prefs: []
  type: TYPE_NORMAL
  zh: 你能生成一个包含{特定信息}的、有{列数}列的表格吗？
- en: Please make a table that compares {list of items} based on {specific criteria}
    in {num} columns
  id: totrans-278
  prefs: []
  type: TYPE_NORMAL
  zh: 请制作一个表格，根据{项目列表}基于{特定标准}在{列数}列中比较
- en: Extract
  id: totrans-279
  prefs: []
  type: TYPE_NORMAL
  zh: 提取
- en: One of the benefits of using ChatGPT is its ability to quickly and accurately
    identify key details, such as names, addresses, phone numbers, and email addresses.
    This is especially useful for businesses and organizations that deal with large
    volumes of text data on a regular basis.
  id: totrans-280
  prefs: []
  type: TYPE_NORMAL
  zh: 使用ChatGPT的一个好处是它能够快速准确地识别关键细节，如姓名、地址、电话号码和电子邮件地址。这对于经常处理大量文本数据的商业和组织特别有用。
- en: One example is using ChatGPT to extract contact information from customer inquiries,
    which can then be used to follow up with customers. Similarly, ChatGPT can be
    used to extract information from resumes, such as education and work experience,
    which can be helpful for recruiters and hiring managers.
  id: totrans-281
  prefs: []
  type: TYPE_NORMAL
  zh: 一个例子是使用ChatGPT从客户咨询中提取联系信息，然后可用于跟进客户。同样，ChatGPT可以用来从简历中提取信息，如教育和工作经验，这对招聘人员和招聘经理有帮助。
- en: ChatGPT can also be used to extract information from social media and online
    reviews, providing valuable insights into customer sentiment and preferences.
    For example, ChatGPT can be used to identify keywords and phrases that customers
    use to describe their experiences with a product or service, which can help businesses
    identify areas for improvement.
  id: totrans-282
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT也可以用于从社交媒体和在线评论中提取信息，提供有关客户情绪和偏好的宝贵见解。例如，ChatGPT可以用来识别客户用来描述产品或服务体验的关键词和短语，这有助于企业识别改进领域。
- en: '**Text Prompts**'
  id: totrans-283
  prefs: []
  type: TYPE_NORMAL
  zh: '**文本提示**'
- en: Extract all email addresses separated with , from the text above
  id: totrans-284
  prefs: []
  type: TYPE_NORMAL
  zh: 从上面的文本中提取所有用逗号分隔的电子邮件地址
- en: Extract all first names separated with , in alphabetical order from the text
    above
  id: totrans-285
  prefs: []
  type: TYPE_NORMAL
  zh: 从上面的文本中提取所有用逗号分隔的姓氏，按字母顺序排列
- en: Extract all phone numbers separated with , from the text above
  id: totrans-286
  prefs: []
  type: TYPE_NORMAL
  zh: 从上面的文本中提取所有用逗号分隔的电话号码
- en: Extract and input all email addresses, first names, and phone numbers into a
    table
  id: totrans-287
  prefs: []
  type: TYPE_NORMAL
  zh: 将所有电子邮件地址、姓氏和电话号码提取并输入到表格中
- en: Based on the information above, extract a list of adjectives that customers
    use to describe this product
  id: totrans-288
  prefs: []
  type: TYPE_NORMAL
  zh: 根据上述信息，提取客户用来描述该产品的形容词列表
- en: Generate YouTube Titles
  id: totrans-289
  prefs: []
  type: TYPE_NORMAL
  zh: 生成YouTube标题
- en: Having a catchy title is one of the keys to a successful YouTube video. ChatGPT
    can help you come up with creative and attention-grabbing titles by generating
    phrases and words that are designed to pique viewers' interest, such as “The Shocking
    Truth About... “ or “You Won't Believe What Happened When...”.
  id: totrans-290
  prefs: []
  type: TYPE_NORMAL
  zh: 有一个吸引人的标题是成功YouTube视频的关键之一。ChatGPT可以通过生成旨在激发观众兴趣的短语和单词来帮助你想出创意和引人注目的标题，例如“关于...的惊人真相”或“当你...时，你不会相信发生了什么”。
- en: ChatGPT can also generate title ideas based on popular formats, (i.e. “How to...”
    or “10 Things You Didn't Know About...”) which can help increase the likelihood
    of your video getting more views. As an example, ChatGPT might suggest titles
    such as “10 Surprising Benefits of Yoga” or “How to Make the Perfect Cup of Coffee”.
  id: totrans-291
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT还可以根据流行的格式生成标题想法，例如“如何...”或“关于...的10个你不知道的事实”，这有助于增加你的视频获得更多观看的可能性。例如，ChatGPT可能会建议标题，如“瑜伽的10个惊人益处”或“如何制作完美的咖啡”。
- en: Finally, ChatGPT is an excellent tool for generating a list of potential video
    titles that you can choose from and then evaluate their effectiveness based on
    your own preference or positive reaction.
  id: totrans-292
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，ChatGPT是一个生成潜在视频标题列表的绝佳工具，你可以从中选择，然后根据你自己的偏好或积极反应来评估它们的有效性。
- en: '**Text Prompts**'
  id: totrans-293
  prefs: []
  type: TYPE_NORMAL
  zh: '**文本提示**'
- en: Based on the high-performing video titles I have listed above, please generate
    10 relevant title ideas for a new YouTube video.
  id: totrans-294
  prefs: []
  type: TYPE_NORMAL
  zh: 根据我上面列出的高绩效视频标题，请为一个新的YouTube视频生成10个相关标题想法。
- en: My most popular YouTube video title is “________”. Please generate other video
    titles using this title as inspiration.
  id: totrans-295
  prefs: []
  type: TYPE_NORMAL
  zh: 我最受欢迎的YouTube视频标题是“________”。请以此标题为灵感，生成其他视频标题。
- en: I am creating a YouTube video about ________. Please generate 10 high-converting
    video titles that I can use.
  id: totrans-296
  prefs: []
  type: TYPE_NORMAL
  zh: 我正在制作一个关于______的YouTube视频。请为我生成10个高转化率的视频标题，我可以使用。
- en: 'Optimize this YouTube title: “_____________”'
  id: totrans-297
  prefs: []
  type: TYPE_NORMAL
  zh: 优化这个YouTube标题：“_____________”
- en: Planning a Vacation
  id: totrans-298
  prefs: []
  type: TYPE_NORMAL
  zh: 规划假期
- en: Do you have an upcoming trip you need to organize? Let ChatGPT take care of
    the research for you.
  id: totrans-299
  prefs: []
  type: TYPE_NORMAL
  zh: 你即将出行，需要组织旅行吗？让ChatGPT为你处理研究工作。
- en: '**Text Prompts**'
  id: totrans-300
  prefs: []
  type: TYPE_NORMAL
  zh: '**文本提示**'
- en: Help me plan the perfect vacation to a tropical paradise. I'm looking for a
    destination with stunning beaches, vibrant nightlife, and a mix of adventurous
    activities.
  id: totrans-301
  prefs: []
  type: TYPE_NORMAL
  zh: 帮助我规划一个完美的热带天堂假期。我正在寻找一个拥有令人惊叹的海滩、充满活力的夜生活和多种冒险活动的目的地。
- en: I need some travel advice. I want to take a family-friendly vacation that includes
    cultural experiences, outdoor adventures, and good food. Can you suggest a destination?
  id: totrans-302
  prefs: []
  type: TYPE_NORMAL
  zh: 我需要一些旅行建议。我想带家人去一个既包含文化体验、户外冒险，又有美食的家庭友好型度假地。你能推荐一个目的地吗？
- en: I'm dreaming of a relaxing getaway. Can you recommend a secluded and luxurious
    destination with spa facilities, gourmet dining, and beautiful natural surroundings?
  id: totrans-303
  prefs: []
  type: TYPE_NORMAL
  zh: 我梦想着一次轻松的逃离。你能推荐一个拥有水疗设施、美食餐厅和美丽自然环境的隐蔽豪华目的地吗？
- en: Product Analysis
  id: totrans-304
  prefs: []
  type: TYPE_NORMAL
  zh: 产品分析
- en: Product pages and company websites are great for telling you the advantages
    of a given product or service, but they don’t usually tell you the potential disadvantages.
    As the customer, it’s up to you to identify the potential drawbacks and carry
    out your own due diligence or research.
  id: totrans-305
  prefs: []
  type: TYPE_NORMAL
  zh: 产品页面和公司网站对于告诉你给定产品或服务的优点非常棒，但它们通常不会告诉你潜在的不利因素。作为客户，识别潜在缺点并执行自己的尽职调查或研究是你的责任。
- en: One of the benefits of using ChatGPT is its ability to analyze data from multiple
    sources, including customer reviews, social media posts, and other content, which
    makes it a great tool for product analysis. ChatGPT can analyze a list of product
    highlights and then generate a list of potential cons based on that product or
    service category. By analyzing customer feedback and reviews, ChatGPT can identify
    common complaints and concerns about a product. For instance, if customers are
    consistently complaining about the product's durability, ChatGPT can flag this
    as a potential issue.
  id: totrans-306
  prefs: []
  type: TYPE_NORMAL
  zh: 使用ChatGPT的一个好处是它能够分析来自多个来源的数据，包括客户评价、社交媒体帖子和其他内容，这使得它成为产品分析的优秀工具。ChatGPT可以分析产品亮点列表，然后根据该产品或服务类别生成潜在缺点的列表。通过分析客户反馈和评价，ChatGPT可以识别关于产品的常见投诉和关注点。例如，如果客户持续投诉产品的耐用性问题，ChatGPT可以将此标记为潜在问题。
- en: Given that ChatGPT is not connected to the Internet, you may need to copy and
    paste product page copy and customer reviews into the chat before asking ChatGPT
    to analyze the product.
  id: totrans-307
  prefs: []
  type: TYPE_NORMAL
  zh: 由于ChatGPT没有连接到互联网，在要求ChatGPT分析产品之前，你可能需要将产品页面文案和客户评价复制粘贴到聊天中。
- en: '**Text Prompts**'
  id: totrans-308
  prefs: []
  type: TYPE_NORMAL
  zh: '**文本提示**'
- en: Analyze the product sales copy above and create a list of potential cons about
    this product.
  id: totrans-309
  prefs: []
  type: TYPE_NORMAL
  zh: 分析上述产品销售文案，并创建一份关于此产品的潜在缺点清单。
- en: Convince me why I shouldn’t buy this product.
  id: totrans-310
  prefs: []
  type: TYPE_NORMAL
  zh: 说服我为什么不应该购买这个产品。
- en: Are there any cheaper alternatives to this product?
  id: totrans-311
  prefs: []
  type: TYPE_NORMAL
  zh: 有没有比这个产品更便宜的替代品？
- en: Analyze the product sales copy above and create a list of potential cons about
    this product.
  id: totrans-312
  prefs: []
  type: TYPE_NORMAL
  zh: 分析上述产品销售文案，并创建一份关于此产品的潜在缺点清单。
- en: Spellcheck
  id: totrans-313
  prefs: []
  type: TYPE_NORMAL
  zh: 拼写检查
- en: ChatGPT's contextual understanding and learning capabilities make it a powerful
    tool for correcting spelling errors. Traditional spellcheckers have been around
    for decades, but they often struggle when it comes to correcting errors that go
    beyond simple spelling mistakes. They may not recognize grammar, formatting consistency,
    or contextual errors, leading to incorrect suggestions or even incorrect autocorrections,
    for example.
  id: totrans-314
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT的上下文理解和学习能力使其成为纠正拼写错误的有力工具。传统的拼写检查器已经存在了几十年，但它们在纠正超出简单拼写错误的错误时往往力不从心。它们可能无法识别语法、格式一致性或上下文错误，从而导致不正确的建议甚至错误的自动更正，例如。
- en: As an AI language model that has been trained on vast amounts of text data,
    ChatGPT is one of the best tools for understanding the context of words and phrases.
    This contextual understanding enables it to not only identify spelling mistakes
    but also suggest corrections that fit the context of the sentence. For example,
    if you accidentally wrote "I am going too the store" instead of "I am going to
    the store," a traditional spellchecker may not recognize the error, as both "too"
    and "to" are valid words. ChatGPT, though, is able to recognize this type of error
    and suggest the correct word based on the context of the sentence.
  id: totrans-315
  prefs: []
  type: TYPE_NORMAL
  zh: 作为一种在大量文本数据上训练的人工智能语言模型，ChatGPT是理解词语和短语上下文的最佳工具之一。这种上下文理解不仅使它能够识别拼写错误，还能根据句子的上下文提出合适的更正建议。例如，如果你不小心写了“I
    am going too the store”而不是“I am going to the store”，传统的拼写检查器可能不会识别这个错误，因为“too”和“to”都是有效的单词。然而，ChatGPT能够识别这种错误，并根据句子的上下文建议正确的单词。
- en: Another advantage of using ChatGPT as a spellchecker is its ability to learn
    from its mistakes and direct feedback. ChatGPT can be trained on a specific domain
    or topic, such as medical terminology or legal jargon, using your instructions,
    preferences, or glossary as input material.
  id: totrans-316
  prefs: []
  type: TYPE_NORMAL
  zh: 使用ChatGPT作为拼写检查器的另一个优点是它能够从错误和直接反馈中学习。ChatGPT可以根据你的指令、偏好或词汇表作为输入材料，在特定领域或主题（如医学术语或法律术语）上进行训练。
- en: '**Text Prompts**'
  id: totrans-317
  prefs: []
  type: TYPE_NORMAL
  zh: '**文本提示**'
- en: Please proofread the above for spelling, grammar, and readability. Then give
    me a list of changes you made.
  id: totrans-318
  prefs: []
  type: TYPE_NORMAL
  zh: 请校对上述内容中的拼写、语法和可读性。然后给我一个你做出的更改列表。
- en: Check the following for formatting and capitalization inconsistencies.
  id: totrans-319
  prefs: []
  type: TYPE_NORMAL
  zh: 检查以下内容的格式和大小写一致性。
- en: Summarize Articles
  id: totrans-320
  prefs: []
  type: TYPE_NORMAL
  zh: 概括文章
- en: ChatGPT can be used to summarize articles quickly and accurately. By inputting
    text into the chat, you can obtain a summary of the main ideas and key takeaways
    in a fraction of the time it would take to do so manually. This is great for anyone
    looking to stay up to date on the latest news and research.
  id: totrans-321
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT可以快速准确地总结文章。通过将文本输入到聊天中，你可以在极短的时间内获得主要思想和关键收获的总结，这对于想要了解最新新闻和研究的人来说非常方便。
- en: To use ChatGPT for summarizing text, you will need to provide it with a longer
    piece of text as input. ChatGPT will then use its natural language processing
    capabilities to identify the main ideas and key takeaways from the text. Summaries
    can also be customized to suit specific needs. This customization can help to
    ensure that the summary captures the key ideas and takeaways that are most relevant
    to you or your target audience.
  id: totrans-322
  prefs: []
  type: TYPE_NORMAL
  zh: 要使用ChatGPT来总结文本，你需要提供较长的文本作为输入。ChatGPT将利用其自然语言处理能力来识别文本中的主要思想和关键收获。总结也可以根据特定需求进行定制。这种定制可以帮助确保总结能够捕捉到你或你的目标受众最相关的关键思想和收获。
- en: '**Text Prompts**'
  id: totrans-323
  prefs: []
  type: TYPE_NORMAL
  zh: '**文本提示**'
- en: Summarize the above article using bullet points of the main ideas and key takeaways
  id: totrans-324
  prefs: []
  type: TYPE_NORMAL
  zh: 使用要点和关键收获的要点总结上述文章
- en: Summarize the above article and categorize those points into key themes
  id: totrans-325
  prefs: []
  type: TYPE_NORMAL
  zh: 概括上述文章，并将这些要点分类到关键主题中
- en: Code a Basic Website
  id: totrans-326
  prefs: []
  type: TYPE_NORMAL
  zh: 编写基本网站
- en: While there are specialized text-to-code services available for this task (i.e.
    GitHub Copilot), ChatGPT can also be used for basic web development to generate
    code snippets based on a given prompt. For example, a non-developer can input
    a prompt such as “create a responsive navigation bar” and ChatGPT can generate
    the code needed to create a responsive navigation bar for a website. The user
    can then copy and paste the code into a text editor. Some knowledge of the code
    language, though, is important for writing effective text prompts and verifying
    ChatGPT’s recommended code.
  id: totrans-327
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管有专门用于此任务的文本转代码服务可用（例如GitHub Copilot），ChatGPT也可以用于基本的网页开发，根据给定的提示生成代码片段。例如，非开发者可以输入一个提示，如“创建一个响应式导航栏”，ChatGPT就可以生成创建网站响应式导航栏所需的代码。然后用户可以将代码复制并粘贴到文本编辑器中。然而，对于编写有效的文本提示和验证ChatGPT推荐的代码，对代码语言的一些了解是重要的。
- en: Another use case for ChatGPT in web development is generating content for websites.
    ChatGPT can be used to generate website copy, blog posts, and product descriptions,
    allowing developers to focus on other aspects of website development.
  id: totrans-328
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT在网页开发中的另一个用途是生成网站内容。ChatGPT可以用来生成网站文案、博客文章和产品描述，使开发者能够专注于网站开发的其它方面。
- en: '**Text Prompts**'
  id: totrans-329
  prefs: []
  type: TYPE_NORMAL
  zh: '**文本提示**'
- en: I want you to act as a frontend developer for my website. Please provide the
    code based on my instructions using the programming languages ____ and ____.
  id: totrans-330
  prefs: []
  type: TYPE_NORMAL
  zh: 我想让你作为我的网站的前端开发者。请根据我的指示使用编程语言____和____提供代码。
- en: Create a landing page for ____ using HTML and inline CSS
  id: totrans-331
  prefs: []
  type: TYPE_NORMAL
  zh: 使用HTML和内联CSS为____创建一个着陆页
- en: Code a contact form that allows users to submit inquiries or feedback
  id: totrans-332
  prefs: []
  type: TYPE_NORMAL
  zh: 编写一个允许用户提交咨询或反馈的表单
- en: Create a blog page that displays the latest articles at the bottom and allows
    users to comment, responsive layout
  id: totrans-333
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个博客页面，在底部显示最新文章，并允许用户发表评论，响应式布局
- en: Code a search bar that allows users to search for specific content on the website
  id: totrans-334
  prefs: []
  type: TYPE_NORMAL
  zh: 编写一个允许用户在网站上搜索特定内容的搜索栏
- en: Design a product page that showcases different products and allows users to
    add them to a shopping cart
  id: totrans-335
  prefs: []
  type: TYPE_NORMAL
  zh: 设计一个展示不同产品并允许用户将它们添加到购物车的产品页面
- en: Create a footer that includes links to the company's social media profiles and
    copyright information.
  id: totrans-336
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个包含公司社交媒体资料和版权信息的页脚。
- en: Check my code above for any bugs or errors. Please suggest any improvements.
  id: totrans-337
  prefs: []
  type: TYPE_NORMAL
  zh: 检查我上面的代码是否有任何错误或错误。请提出任何改进建议。
- en: Sentiment Analysis
  id: totrans-338
  prefs: []
  type: TYPE_NORMAL
  zh: 情感分析
- en: Leveraging its natural language processing capabilities, ChatGPT is an effective
    tool for analyzing the emotional tone of text as part of sentiment analysis. By
    inputting customer feedback, social media posts, and other forms of online content,
    ChatGPT can quickly and accurately identify whether the overall sentiment is positive,
    negative, or neutral, for example. This can be valuable for businesses looking
    to gain a deeper understanding of how their customers feel about their products,
    services, or overall brand.
  id: totrans-339
  prefs: []
  type: TYPE_NORMAL
  zh: 利用其自然语言处理能力，ChatGPT是分析文本情感调子的有效工具，作为情感分析的一部分。通过输入客户反馈、社交媒体帖子和其他形式的在线内容，ChatGPT可以快速准确地识别整体情感是正面、负面还是中性，例如。这对于希望更深入理解客户对其产品、服务或整体品牌感受的企业来说可能很有价值。
- en: As ChatpGPT is not able to access the Internet directly, you may need to collect
    a sample of relevant text, such as article posts, homepage content, or user comments,
    in order to analyze websites.
  id: totrans-340
  prefs: []
  type: TYPE_NORMAL
  zh: 由于ChatGPT无法直接访问互联网，你可能需要收集相关文本样本，例如文章帖子、主页内容或用户评论，以便分析网站。
- en: '**Text Prompts**'
  id: totrans-341
  prefs: []
  type: TYPE_NORMAL
  zh: '**文本提示**'
- en: Analyze the sentiment of the text above
  id: totrans-342
  prefs: []
  type: TYPE_NORMAL
  zh: 分析上述文本的情感
- en: Can you analyze the sentiment of these tweets about the brand ______?
  id: totrans-343
  prefs: []
  type: TYPE_NORMAL
  zh: 你能分析关于品牌____的这些推文的情感吗？
- en: What is the overall sentiment of this review for the film _______?
  id: totrans-344
  prefs: []
  type: TYPE_NORMAL
  zh: 这部电影的评论的整体情感是什么？
- en: What is the sentiment of these customer reviews for this product?
  id: totrans-345
  prefs: []
  type: TYPE_NORMAL
  zh: 这些客户对这款产品的评价的情感是什么？
- en: Analyze and describe the sentiment of this email I want to send to my employer
  id: totrans-346
  prefs: []
  type: TYPE_NORMAL
  zh: 分析并描述我想要发送给雇主的这封电子邮件的情感。
- en: Stylistic Writing
  id: totrans-347
  prefs: []
  type: TYPE_NORMAL
  zh: 风格化写作
- en: ChatGPT can assist with a variety of stylistic writing tasks to help you create
    a unique and captivating writing style. Stylistic writing focuses on the deliberate
    and skillful use of various literary devices, such as vivid imagery, figurative
    language, rhythm, and tone.
  id: totrans-348
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT可以帮助你完成各种风格化写作任务，帮助你创造独特而吸引人的写作风格。风格化写作侧重于巧妙地使用各种文学手法，如生动的意象、比喻语言、节奏和语气。
- en: 'To achieve the best results, it’s important to consolidate your knowledge of
    stylistic writing. The book *The Elements of Eloquence: How to Turn the Perfect
    English Phrase* by Mark Forsyth offers a great starting point as it covers various
    writing techniques such as chiasmus, which involves reversing the order or structure
    of words or phrases to create a mirrored effect. For example, “Ask not what your
    country can do for you, ask what you can do for your country.” Another technique
    is antithesis, which contrasts ideas or words for emphasis, such as “It was the
    best of times, it was the worst of times” from Charles Dickens'' *A Tale of Two
    Cities*. Other techniques include epizeuxis (the immediate repetition of a word
    or phrase for emphasis), hyperbole (exaggeration for emphasis or dramatic effect),
    anaphora (repetition of a word or phrase at the beginning of successive clauses
    or sentences, alliteration (repetition of initial consonant sounds in close succession),
    and paradox (a statement that seems contradictory or absurd but may reveal a deeper
    truth).'
  id: totrans-349
  prefs: []
  type: TYPE_NORMAL
  zh: 为了取得最佳效果，巩固你对文体写作的知识非常重要。马克·福西特的书籍《优雅元素：如何说出完美的英语短语》是一个很好的起点，因为它涵盖了各种写作技巧，如对偶句式，它涉及颠倒单词或短语的顺序或结构以创造镜像效果。例如，“不要问你的国家能为你做什么，要问你能为国家做什么。”另一种技巧是反讽，它通过对比思想或词来强调，例如查尔斯·狄更斯的《双城记》中的“这是最好的时代，也是最坏的时代”。其他技巧包括排比（立即重复一个词或短语以强调）、夸张（为了强调或戏剧效果而夸张）、首语重复（在连续的子句或句子的开头重复一个词或短语）、头韵（在紧密连续的单词中重复初始辅音音素）和悖论（一个看似矛盾或荒谬但可能揭示更深层次真理的陈述）。
- en: Alternatively, you could ask ChatGPT to list and introduce the various techniques
    used in stylistic writing or mentioned in the book *The Elements of Eloquence*.
  id: totrans-350
  prefs: []
  type: TYPE_NORMAL
  zh: 或者，你可以要求ChatGPT列出并介绍在文体写作中使用的各种技巧或书中《优雅元素》中提到的技巧。
- en: Finally, you also use ChatGPT to decipher the stylistic styles used by your
    favorite author, marketer, historical figure, or rapper by tasking it to analyze
    specific examples of their work.
  id: totrans-351
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，你还可以使用ChatGPT来分析你最喜欢的作者、营销人员、历史人物或说唱歌手使用的文体风格，通过要求它分析他们作品的特定例子。
- en: '**Text Prompts**'
  id: totrans-352
  prefs: []
  type: TYPE_NORMAL
  zh: '**文本提示**'
- en: Use a chiasmus to create a marketing slogan for a fitness app
  id: totrans-353
  prefs: []
  type: TYPE_NORMAL
  zh: 使用对偶句式为健身应用创建一个营销标语
- en: Use antithesis to describe customers’ attitude to working out as part of an
    email subject line
  id: totrans-354
  prefs: []
  type: TYPE_NORMAL
  zh: 使用反讽来描述客户对锻炼的看法作为电子邮件主题行
- en: Craft a paragraph using alliteration to describe a sunrise over a meadow
  id: totrans-355
  prefs: []
  type: TYPE_NORMAL
  zh: 用头韵法撰写一段描述草原上日出的段落
- en: Use hyperbole to describe a thunderstorm with exaggerated intensity and power
  id: totrans-356
  prefs: []
  type: TYPE_NORMAL
  zh: 使用夸张手法来描述一场强度和力量被夸大的雷暴雨
- en: Incorporate repetition or epizeuxis to explain the benefits of a healthy lifestyle
  id: totrans-357
  prefs: []
  type: TYPE_NORMAL
  zh: 通过重复或排比来解释健康生活方式的好处
- en: Tell me what stylistic writing style is used in the following slogan _____
  id: totrans-358
  prefs: []
  type: TYPE_NORMAL
  zh: 告诉我以下标语中使用了哪种文体写作风格 _____
- en: Fiction Writing
  id: totrans-359
  prefs: []
  type: TYPE_NORMAL
  zh: 小说写作
- en: If you're an aspiring writer looking to improve your fiction writing skills,
    you can use ChatGPT as a tool for generating story ideas, overcoming writer's
    block, and refining your drafts. Another advantage of using ChatGPT as a writer
    is the ability to receive feedback on your writing. By inputting your work into
    the model, you can receive suggestions for grammar and syntax improvements, as
    well as ideas for sentence restructuring and vocabulary expansion.
  id: totrans-360
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你是一名希望提高小说写作技巧的作家，你可以将ChatGPT作为一个工具来生成故事想法、克服写作障碍和润色你的草稿。使用ChatGPT作为作家的另一个优点是能够收到关于你写作的反馈。通过将你的作品输入模型，你可以收到关于语法和句法改进的建议，以及句子重组和词汇扩展的想法。
- en: While it’s possible to outsource the entire writing process to ChatGPT, fiction
    writing is a task that still benefits from human intuition and domain knowledge.
    For instance, to create a compelling story, you need to understand the key aspects
    of fiction writing, including intricate plot development, world-building, character
    development, establishing a unique voice, and showing not telling, and how to
    weave these techniques into your prompts in order to create the best story possible.
    This means that you need to be proactive in injecting your own domain knowledge
    and providing detailed instructions through your text prompts. You will also need
    to correct ChatGPT, ask for rewrites, and combine ChatGPT's outputs with your
    own writing to ensure the story flows naturally and stays true to your vision
    of the story.
  id: totrans-361
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然将整个写作过程外包给ChatGPT是可能的，但小说写作仍然受益于人类的直觉和领域知识。例如，为了创作一个引人入胜的故事，你需要了解小说写作的关键方面，包括复杂的情节发展、世界观构建、角色发展、建立独特的声音、展示而非叙述，以及如何将这些技巧编织到你的提示中，以创作出最佳的故事。这意味着你需要主动注入自己的领域知识，并通过你的文本提示提供详细的指导。你还需要纠正ChatGPT，要求重写，并将ChatGPT的输出与你的写作相结合，以确保故事自然流畅，并忠于你对故事愿景。
- en: '**Text Prompts**'
  id: totrans-362
  prefs: []
  type: TYPE_NORMAL
  zh: '**文本提示**'
- en: I want you to act as a fiction author in the genre of ______. I want you to
    write a storybook using the writing principles of showing and not telling, and
    slow plot and character development.
  id: totrans-363
  prefs: []
  type: TYPE_NORMAL
  zh: 我想让你以______（请填写具体类型，如：奇幻、悬疑、科幻等）为题材，扮演一位小说家。我希望你写一本故事书，运用展示而非叙述的写作原则，以及缓慢的情节发展和角色塑造。
- en: 'Write the outline for a fictional story based on the following structure:'
  id: totrans-364
  prefs: []
  type: TYPE_NORMAL
  zh: 根据以下结构编写一个虚构故事的提纲：
- en: 'Title name: _____________'
  id: totrans-365
  prefs: []
  type: TYPE_NORMAL
  zh: 标题名称：___________
- en: 'Title setting: **_____________** (i.e. time period, location, etc.)'
  id: totrans-366
  prefs: []
  type: TYPE_NORMAL
  zh: 标题设定：**_____________**（即时间、地点等）
- en: 'Genre: **_____________** (i.e. historical fiction, sci-fi, horror, spy novel,
    etc.)'
  id: totrans-367
  prefs: []
  type: TYPE_NORMAL
  zh: 类型：**_____________**（即历史小说、科幻、恐怖、间谍小说等）
- en: 'Protagonist: **_____________** (i.e. name, age, occupation, personality, and
    motivations)'
  id: totrans-368
  prefs: []
  type: TYPE_NORMAL
  zh: 主角：**_____________**（即姓名、年龄、职业、性格和动机）
- en: 'Antagonist: **_____________** (i.e. name, age, occupation, personality, and
    motivations)'
  id: totrans-369
  prefs: []
  type: TYPE_NORMAL
  zh: 反派角色：**_____________**（即姓名、年龄、职业、性格和动机）
- en: 'Conflict: **_____________** (i.e. the problem the protagonist faces and the
    stakes involved)'
  id: totrans-370
  prefs: []
  type: TYPE_NORMAL
  zh: 冲突：**_____________**（即主角面临的问题和涉及的赌注）
- en: 'Dialogue: **_____________** (i.e. heavy/minimal dialogue, use dialogue to show
    character development, show don’t tell, use subtext)'
  id: totrans-371
  prefs: []
  type: TYPE_NORMAL
  zh: 对话：**_____________**（即大量/少量对话，使用对话展示角色发展，展示而非叙述，使用隐含意义）
- en: 'Plot: ____________ (i.e. central theme and direction of the story)'
  id: totrans-372
  prefs: []
  type: TYPE_NORMAL
  zh: 情节：__________（即故事的主题和方向）
- en: 'Character development: (instructions for developing the characters, hero’s
    journey)'
  id: totrans-373
  prefs: []
  type: TYPE_NORMAL
  zh: 角色发展：（关于角色发展的指导，英雄之旅）
- en: 'Tone/style: ____________ (i.e. writing style, instructions for maintaining
    story consistency, first/second/third-person narration)'
  id: totrans-374
  prefs: []
  type: TYPE_NORMAL
  zh: 调子/风格：__________（即写作风格，关于保持故事一致性的指导，第一/第二/第三人称叙述）
- en: 'Pacing: ____________ (i.e. instructions for varying the pace of the story to
    build and release tension, advance the plot, and create dramatic effect)'
  id: totrans-375
  prefs: []
  type: TYPE_NORMAL
  zh: 速度：__________（即如何调整故事节奏以构建和释放紧张感，推进情节，并创造戏剧效果）
- en: 'Other: ____________ (i.e. heavy world-building)'
  id: totrans-376
  prefs: []
  type: TYPE_NORMAL
  zh: 其他：__________（即大量的世界观构建）
- en: Great, now write chapter 1 using the outline above and write in the style of
    Ernest Hemingway.
  id: totrans-377
  prefs: []
  type: TYPE_NORMAL
  zh: 太好了，现在根据上面的提纲写第一章，并使用欧内斯特·海明威的风格。
- en: I'm working on a suspenseful short story and I need a captivating opening scene.
    Can you provide a dramatic scenario that will immediately grab the reader's attention?
  id: totrans-378
  prefs: []
  type: TYPE_NORMAL
  zh: 我正在写一个悬疑短篇小说，我需要一个吸引人的开场场景。你能提供一个能够立即抓住读者注意力的戏剧性场景吗？
- en: I'm writing a mystery novel and I need a plot twist that will leave my readers
    stunned. Can you come up with an unexpected and mind-bending twist that will keep
    them guessing?
  id: totrans-379
  prefs: []
  type: TYPE_NORMAL
  zh: 我正在写一部悬疑小说，我需要一个会让读者震惊的剧情转折。你能想出一个意想不到且令人困惑的转折，让他们一直猜测吗？
- en: I'm looking to create an intense action sequence for my adventure novel. Can
    you help me choreograph a heart-pounding scene involving a chase, unexpected obstacles,
    and a heroic escape?
  id: totrans-380
  prefs: []
  type: TYPE_NORMAL
  zh: 我正在为我的冒险小说创造一个紧张的动作序列。你能帮我编排一个涉及追逐、意外障碍和英勇逃脱的扣人心弦的场景吗？
- en: Personal Education
  id: totrans-381
  prefs: []
  type: TYPE_NORMAL
  zh: 个人教育
- en: With its vast knowledge base, ChatGPT can provide you with information on just
    about any topic that piques your interest. Whether you’re curious about the latest
    scientific research or you want to learn more about a particular culture, ChatGPT
    can help provide you with the knowledge that you need.
  id: totrans-382
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT拥有庞大的知识库，可以为你提供关于任何引起你兴趣的话题的信息。无论是你对最新的科学研究感兴趣，还是想了解更多关于某个特定文化的信息，ChatGPT都可以帮助你提供所需的知识。
- en: There are countless ways you can use ChatGPT for learning tasks. One way is
    establishing a tutor-student relationship, where you ask ChatGPT any questions
    you have and you receive personalized answers in response. Another way is to ask
    ChatGPT to produce study notes on a given topic. You could even copy those notes
    into a text-to-speech software program such as Eleven Labs or Wellsaid Labs and
    listen to your study notes on your smartphone. Alternatively, you can use ChatGPT
    to recommend external learning resources such as books, online courses, or educational
    videos to aid your learning.
  id: totrans-383
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以用无数种方式使用ChatGPT进行学习任务。一种方式是建立导师-学生关系，你可以向ChatGPT提出任何问题，你将收到个性化的回答。另一种方式是要求ChatGPT就给定主题制作学习笔记。你甚至可以将这些笔记复制到文本到语音软件程序，如Eleven
    Labs或Wellsaid Labs，并在你的智能手机上收听你的学习笔记。或者，你可以使用ChatGPT推荐外部学习资源，如书籍、在线课程或教育视频，以帮助你的学习。
- en: Finally, ChatGPT can be used to test your knowledge through quizzes or conversing
    in the foreign language you are learning, providing an opportunity to practice
    and improve your skills.
  id: totrans-384
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，ChatGPT可以通过问答或用你正在学习的外语进行对话来测试你的知识，为你提供一个练习和提升技能的机会。
- en: '**Text Prompts**'
  id: totrans-385
  prefs: []
  type: TYPE_NORMAL
  zh: '**文本提示**'
- en: What should I start learning about on the topic of _______?
  id: totrans-386
  prefs: []
  type: TYPE_NORMAL
  zh: 我应该从_________的主题开始学习什么？
- en: Break down [topic] into smaller, easier-to-understand parts. Use analogies and
    real-life examples to simplify the concept and make it more relatable.
  id: totrans-387
  prefs: []
  type: TYPE_NORMAL
  zh: 将[主题]分解成更小、更容易理解的部分。使用类比和现实生活中的例子来简化概念，使其更具相关性。
- en: Write a summary with the most important things to know on the topic of _________
  id: totrans-388
  prefs: []
  type: TYPE_NORMAL
  zh: 为_________的主题编写一个总结，包含最重要的知识点
- en: Explain the concept of _________ in plain English/ Layman's terms
  id: totrans-389
  prefs: []
  type: TYPE_NORMAL
  zh: 用通俗易懂的语言/白话解释_________的概念
- en: Teach me the basics of _________ using real-world examples
  id: totrans-390
  prefs: []
  type: TYPE_NORMAL
  zh: 使用现实世界的例子教我_________的基础知识
- en: Recommend highly rated learning materials on the topic of ________
  id: totrans-391
  prefs: []
  type: TYPE_NORMAL
  zh: 推荐关于_________的高质量学习材料
- en: Recommend books and research papers related to _________
  id: totrans-392
  prefs: []
  type: TYPE_NORMAL
  zh: 推荐与_________相关的书籍和研究论文
- en: Using everything you have taught me so far, please prepare concise study notes
    in a structured format with a space between each note.
  id: totrans-393
  prefs: []
  type: TYPE_NORMAL
  zh: 使用你迄今为止教给我的所有知识，请以结构化的格式准备简洁的学习笔记，每条笔记之间留有空格。
- en: Now give me multiple choice quiz about _________, one question at a time, and
    don't show me the answer.
  id: totrans-394
  prefs: []
  type: TYPE_NORMAL
  zh: 现在给我一个关于_________的多项选择题，一次一个问题，不要显示答案。
- en: Give me a hint
  id: totrans-395
  prefs: []
  type: TYPE_NORMAL
  zh: 给我一个提示
- en: Next question please
  id: totrans-396
  prefs: []
  type: TYPE_NORMAL
  zh: 请问下一个问题
- en: '|  | 6 |'
  id: totrans-397
  prefs: []
  type: TYPE_TB
  zh: '|  | 6 |'
- en: CONTENT WRITING
  id: totrans-398
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 内容写作
- en: In today's digital age, content writing is a vital skill for businesses, educators,
    and individuals, and using ChatGPT to write content can be a highly productive
    and time-saving tool. This chapter will delve into the practical application of
    producing an engaging blog post and provide step-by-step guidance on harnessing
    ChatGPT for your own content creation pipeline. You can also utilize these same
    techniques to create content for other mediums including newsletter content, podcast
    scripts, website content, social media copy, and so forth.
  id: totrans-399
  prefs: []
  type: TYPE_NORMAL
  zh: 在当今的数字时代，内容写作是企业、教育工作者和个人的一项重要技能，使用ChatGPT来写内容可以是一个高效且节省时间的工具。本章将深入探讨制作引人入胜的博客文章的实际应用，并提供利用ChatGPT进行内容创作的步骤指南。你还可以利用这些相同的技巧来创建其他媒体的内容，包括时事通讯内容、播客脚本、网站内容、社交媒体文案等等。
- en: 'Step 1: Start a new chat'
  id: totrans-400
  prefs: []
  type: TYPE_NORMAL
  zh: 第1步：开始一个新的聊天
- en: To avoid mixing topics and projects, it’s important to create a new chat each
    time you start a new task.
  id: totrans-401
  prefs: []
  type: TYPE_NORMAL
  zh: 为了避免主题和项目混淆，每次开始新任务时创建一个新的聊天是很重要的。
- en: 'Step 2: Provide a briefing'
  id: totrans-402
  prefs: []
  type: TYPE_NORMAL
  zh: 第2步：提供简报
- en: Before writing the opening headline or the body section, it helps to warm up
    the model with some context and background information about your blog post. This
    could include information about the target audience, why you are writing the blog
    post, and what your goals are. By providing this information up front, ChatGPT
    can use this information as reference material for producing future outputs.
  id: totrans-403
  prefs: []
  type: TYPE_NORMAL
  zh: 在撰写开头标题或正文部分之前，了解一些关于你的博客文章的背景信息和上下文信息是有帮助的。这可能包括关于目标受众、你为什么写这篇博客以及你的目标是什么的信息。通过提前提供这些信息，ChatGPT可以使用这些信息作为参考材料来生成未来的输出。
- en: Text Prompt
  id: totrans-404
  prefs: []
  type: TYPE_NORMAL
  zh: 文本提示
- en: I want to write a blog post about looksmaxxing. I am writing this blog post
    on behalf of a male grooming company that specializes in shaving devices designed
    for men. My target audience is men aged between 15 and 40 years old who aren’t
    regular customers of male grooming products and lack knowledge about the importance
    of personal grooming.
  id: totrans-405
  prefs: []
  type: TYPE_NORMAL
  zh: 我想写一篇关于Looksmaxxing的博客文章。我代表一家专注于为男性设计剃须设备的男性造型公司撰写这篇博客文章。我的目标受众是15至40岁的男性，他们不是男性造型产品的常规客户，并且缺乏关于个人造型重要性的知识。
- en: After inputting this background information, ChatGPT may add a comment congratulating
    you on your intention to write a blog post on that topic or it might even start
    writing the blog content. Whatever the output, you can generally ignore it and
    proceed to Step 3.
  id: totrans-406
  prefs: []
  type: TYPE_NORMAL
  zh: 在输入这些背景信息后，ChatGPT可能会添加一条评论，祝贺你打算就这个主题写一篇博客，或者甚至可能开始撰写博客内容。无论输出结果如何，你通常可以忽略它并继续进行到第3步。
- en: 'Step 3: Choose your topic'
  id: totrans-407
  prefs: []
  type: TYPE_NORMAL
  zh: 第3步：选择你的主题
- en: Determine the subject of your blog post. Make sure it's specific and well-defined.
    If you need assistance defining a topic, you can ask for help by asking ChatGPT
    for suggestions. As a tip, it usually helps to request multiple suggestions (using
    a number in your prompt) to avoid ChatGPT responding with only one suggestion.
  id: totrans-408
  prefs: []
  type: TYPE_NORMAL
  zh: 确定你的博客文章的主题。确保它是具体且定义清晰的。如果你需要帮助定义主题，你可以通过向ChatGPT寻求建议来获得帮助。作为一个提示，通常请求多个建议（在提示中使用数字）有助于避免ChatGPT只响应一个建议。
- en: Text Prompt
  id: totrans-409
  prefs: []
  type: TYPE_NORMAL
  zh: 文本提示
- en: Generate 10 different blog topics about looksmaxxing
  id: totrans-410
  prefs: []
  type: TYPE_NORMAL
  zh: 为Looksmaxxing生成10个不同的博客主题
- en: '![Image](images/image-19.png)'
  id: totrans-411
  prefs: []
  type: TYPE_IMG
  zh: '![图片](images/image-19.png)'
- en: Using ChatGPT as an idea-generation tool, we can either select one of its suggestions
    or use these suggestions to design our own topic. For this example, let’s use
    option 10, which is “Looksmaxxing for the Busy Man” as this topic fits well with
    the product that we want to promote.
  id: totrans-412
  prefs: []
  type: TYPE_NORMAL
  zh: 作为一种想法生成工具，我们可以选择ChatGPT的建议之一，或者使用这些建议来设计我们自己的主题。在这个例子中，让我们使用第10个选项，“忙碌人士的Looksmaxxing”，因为这个主题非常适合我们想要推广的产品。
- en: Also, if you’re wondering what *looksmaxxing* is, it’s a trending term used
    online that refers to the process of maximizing one's physical appearance through
    various methods including grooming, exercise, diet, skincare, fashion, and cosmetic
    procedures.
  id: totrans-413
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，如果你想知道*Looksmaxxing*是什么，它是一个在网上流行的术语，指的是通过包括造型、锻炼、饮食、护肤、时尚和美容程序在内的各种方法来最大化一个人的外貌的过程。
- en: 'Step 4: Generate a headline'
  id: totrans-414
  prefs: []
  type: TYPE_NORMAL
  zh: 第4步：生成标题
- en: Now that we have chosen a topic, we can either adopt this topic as the title
    of the blog or we can task ChatGPT to explore some better options.
  id: totrans-415
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经选择了主题，我们可以将其作为博客的标题，或者我们可以要求ChatGPT探索一些更好的选项。
- en: '**Text Prompt**'
  id: totrans-416
  prefs: []
  type: TYPE_NORMAL
  zh: '**文本提示**'
- en: 'Generate 10 headline alternatives for “Looksmaxxing for the Busy Man: Quick
    and Easy Grooming to Keep You Looking Sharp on the Go”'
  id: totrans-417
  prefs: []
  type: TYPE_NORMAL
  zh: 为“忙碌人士的Looksmaxxing：快速简单的造型，让你随时随地保持整洁”生成10个不同的标题选项
- en: '![Image](images/image-20.png)'
  id: totrans-418
  prefs: []
  type: TYPE_IMG
  zh: '![图片](images/image-20.png)'
- en: Of the 10 options provided by ChatGPT, I like option 8, but let’s stick with
    the original title as we want to position “Looksmaxxing” at the front of the title.
    Alternatively, we could go back and edit the text prompt by requesting that the
    title start with the word “Looksmaxxing”.
  id: totrans-419
  prefs: []
  type: TYPE_NORMAL
  zh: 在ChatGPT提供的10个选项中，我喜欢第8个选项，但让我们坚持原始标题，因为我们想将“Looksmaxxing”放在标题的前面。或者，我们可以回到编辑文本提示，要求标题以“Looksmaxxing”这个词开始。
- en: '![Image](images/image-21.png)'
  id: totrans-420
  prefs: []
  type: TYPE_IMG
  zh: '![图片](images/image-21.png)'
- en: 'Step 5: Generate an outline'
  id: totrans-421
  prefs: []
  type: TYPE_NORMAL
  zh: 第5步：生成大纲
- en: After selecting the title, let’s generate an outline for the blog.
  id: totrans-422
  prefs: []
  type: TYPE_NORMAL
  zh: 在选择标题后，让我们为博客生成一个大纲。
- en: Text Prompt
  id: totrans-423
  prefs: []
  type: TYPE_NORMAL
  zh: 文本提示
- en: 'Generate an outline for the blog (Looksmaxxing for the Busy Man: Quick and
    Easy Grooming to Keep You Looking Sharp on the Go) with 5 sections. One section
    of the blog should cover the importance of male grooming and mention the product
    “Super Shaver” for all-purpose male grooming.'
  id: totrans-424
  prefs: []
  type: TYPE_NORMAL
  zh: 为博客（针对忙碌人士的快速简单造型：在路上的保持整洁）生成一个包含5个部分的提纲。博客的一个部分应涵盖男性造型的重要性，并提及“Super Shaver”这款适用于男性全方位造型的产品。
- en: It’s important to add the title of the blog so ChatGPT knows which title you
    decided to use. You can also add specific keywords or products that you want to
    include in the blog within your text prompt.
  id: totrans-425
  prefs: []
  type: TYPE_NORMAL
  zh: 添加博客的标题很重要，这样ChatGPT就能知道您决定使用哪个标题。您还可以在文本提示中添加您想在博客中包含的特定关键词或产品。
- en: '![A screenshot of a cell phone  Description automatically generated](images/image-22.png)'
  id: totrans-426
  prefs: []
  type: TYPE_IMG
  zh: '![手机屏幕截图  自动生成的描述](images/image-22.png)'
- en: Next, review the generated outline and refine it to suit your needs. This might
    include removing sections or switching up the sequence. You can do this manually
    by copying and pasting ChatGPT’s outline into a Word document and editing it there
    before pasting the updated blog outline back into the chat. Alternatively, you
    can try to use text prompts to edit the outline within ChatGPT. This approach
    works well if you only have one or two adjustments to make. If the outline needs
    major surgery, then it might be more convenient to edit the outline using an external
    text editor. Just remember to send the updated outline back to ChatGPT before
    you proceed to the next step!
  id: totrans-427
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，审查生成的提纲并对其进行细化以适应您的需求。这可能包括删除部分内容或改变顺序。您可以通过手动将ChatGPT的提纲复制粘贴到Word文档中并对其进行编辑，然后再将更新后的博客提纲粘贴回聊天中来实现这一点。或者，您也可以尝试在ChatGPT内部使用文本提示来编辑提纲。如果您只需进行一两个调整，这种方法效果很好。如果提纲需要重大修改，那么使用外部文本编辑器来编辑提纲可能更方便。只需记住，在继续下一步之前，将更新后的提纲发送回ChatGPT！
- en: 'Step 6: Write the blog'
  id: totrans-428
  prefs: []
  type: TYPE_NORMAL
  zh: 第6步：撰写博客
- en: Using the chosen outline, we can now start to write the blog. Here, we can either
    task ChatGPT to generate sections of the blog across multiple chat messages or
    we can try to write the full blog post using a single text prompt.
  id: totrans-429
  prefs: []
  type: TYPE_NORMAL
  zh: 使用选定的提纲，我们现在可以开始撰写博客。在这里，我们既可以要求ChatGPT通过多个聊天消息生成博客的各个部分，也可以尝试使用单个文本提示一次性撰写完整的博客文章。
- en: Also, don’t forget to add modifiers to the prompt such as the style, tone, preferred
    spelling, target keywords, etc.
  id: totrans-430
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，别忘了在提示中添加修饰符，例如风格、语气、首选拼写、目标关键词等。
- en: 'In this example, we’ll ask ChatGPT to mimic the writing style of James Clear,
    the author of *Atomic Habits: An Easy & Proven Way to Build Good Habits & Break
    Bad Ones*, using U.S. spelling.'
  id: totrans-431
  prefs: []
  type: TYPE_NORMAL
  zh: '在本例中，我们将要求ChatGPT模仿《Atomic Habits: An Easy & Proven Way to Build Good Habits
    & Break Bad Ones》一书的作者James Clear的写作风格，并使用美国英语拼写。'
- en: Text Prompt
  id: totrans-432
  prefs: []
  type: TYPE_NORMAL
  zh: 文本提示
- en: Write the entire blog post based on the outline above in the style of James
    Clear using U.S. English
  id: totrans-433
  prefs: []
  type: TYPE_NORMAL
  zh: 根据上述提纲，使用James Clear的风格和美式英语撰写整个博客文章。
- en: If you’re not satisfied with the output, you can try using the “**Regenerate
    response”** button (located below the output) multiple times until you get an
    output that suits your needs. If this fails, you may need to go back and refine
    your original text prompt by clicking on the edit button on the right-hand side
    of the text prompt.
  id: totrans-434
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您对输出结果不满意，可以尝试多次使用“**重新生成响应**”按钮（位于输出下方）直到得到满足您需求的输出。如果这还不起作用，您可能需要返回并点击文本提示右侧的编辑按钮来细化您原始的文本提示。
- en: '![Image](images/image-23.png)'
  id: totrans-435
  prefs: []
  type: TYPE_IMG
  zh: '![图片](images/image-23.png)'
- en: As a last resort, you can try breaking the task into smaller chunks by prompting
    ChatGPT to write the blog section by section, starting with the introduction and
    finishing with the conclusion.
  id: totrans-436
  prefs: []
  type: TYPE_NORMAL
  zh: 作为最后的手段，您可以通过提示ChatGPT逐段撰写博客，从引言开始，以结论结束，将任务分解成更小的部分。
- en: Text Prompt
  id: totrans-437
  prefs: []
  type: TYPE_NORMAL
  zh: 文本提示
- en: Write the introduction of the blog post by expanding on the outline points above
    in the style of James Clear using U.S. English.
  id: totrans-438
  prefs: []
  type: TYPE_NORMAL
  zh: 使用James Clear的风格和美式英语，通过扩展上述提纲点来撰写博客文章的引言。
- en: 'Step 7: Review and edit the content'
  id: totrans-439
  prefs: []
  type: TYPE_NORMAL
  zh: 第7步：审查和编辑内容
- en: As you receive content for each section or for the full blog post, make sure
    that you review and edit it to ensure accuracy, clarity, and consistency. Check
    for grammatical errors, inconsistencies, and factual accuracy. Make any necessary
    edits to ensure that the content flows and is engaging to readers. You might also
    like to use a third-party software such as Grammarly.com to check for errors and
    make other adjustments.
  id: totrans-440
  prefs: []
  type: TYPE_NORMAL
  zh: 当您收到每个部分或整篇博客文章的内容时，请确保您对其进行审查和编辑，以确保准确性、清晰性和一致性。检查语法错误、不一致性和事实准确性。进行必要的编辑，以确保内容流畅且对读者有吸引力。您还可能希望使用Grammarly.com等第三方软件来检查错误并进行其他调整。
- en: In general, ChatGPT excels at spelling and grammar compared to a human writer.
    Instead, most of your time will be spent on fact-checking any statistics or claims
    mentioned in the content and checking that the content is relevant and on point.
  id: totrans-441
  prefs: []
  type: TYPE_NORMAL
  zh: 通常，与人类作家相比，ChatGPT在拼写和语法方面表现出色。相反，您的大部分时间将花费在检查内容中提到的任何统计数据或声明，并确保内容的相关性和针对性。
- en: If you are unhappy with individual sentences, you can copy and paste the sentence
    and request ChatGPT to re-write or optimize the entire sentence.
  id: totrans-442
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您对个别句子不满意，您可以复制并粘贴该句子，并要求ChatGPT重新撰写或优化整个句子。
- en: Text Prompt
  id: totrans-443
  prefs: []
  type: TYPE_NORMAL
  zh: 文本提示
- en: 'optimize: But for the modern man, looking sharp and well-groomed is not only
    essential for making great first impressions; it also boosts self-confidence and
    contributes to overall well-being.'
  id: totrans-444
  prefs: []
  type: TYPE_NORMAL
  zh: 优化：但对于现代人来说，看起来整洁、打扮得体不仅对于留下深刻的第一印象至关重要；它还能增强自信心，并有助于整体福祉。
- en: '![Image](images/image-24.png)'
  id: totrans-445
  prefs: []
  type: TYPE_IMG
  zh: '![图像](images/image-24.png)'
- en: 'Step 8: Optional extras'
  id: totrans-446
  prefs: []
  type: TYPE_NORMAL
  zh: 第8步：可选额外内容
- en: In the space of 10 minutes or so, you should have a convincing blog post ready
    for publication. Before you click publish, you may like to ask ChatGPT to draft
    the metadata title and description for SEO purposes or a social media shout-out
    for a social channel such as LinkedIn or Facebook.
  id: totrans-447
  prefs: []
  type: TYPE_NORMAL
  zh: 在大约10分钟内，您应该准备好一篇令人信服的待发布博客文章。在点击发布之前，您可能希望要求ChatGPT为SEO目的草拟元数据标题和描述，或者为LinkedIn或Facebook等社交媒体渠道撰写推广语。
- en: Text Prompt
  id: totrans-448
  prefs: []
  type: TYPE_NORMAL
  zh: 文本提示
- en: Write an SEO metadata description for the blog, optimized for Google
  id: totrans-449
  prefs: []
  type: TYPE_NORMAL
  zh: 为博客撰写一个针对Google优化的SEO元数据描述
- en: '![Graphical user interface, text, application, email  Description automatically
    generated](images/image-25.png)'
  id: totrans-450
  prefs: []
  type: TYPE_IMG
  zh: '![图形用户界面、文本、应用程序、电子邮件 描述自动生成](images/image-25.png)'
- en: Lastly, given that the current version of ChatGPT was only trained on data available
    before 2022, the language model isn’t familiar with the latest social media and
    search engine optimization (SEO) strategies. To overcome this problem, you may
    need to manually train the model regarding new content writing strategies by inserting
    any relevant optimization rules into your text prompt.
  id: totrans-451
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，鉴于ChatGPT当前版本仅在2022年之前的数据上进行训练，语言模型对最新的社交媒体和搜索引擎优化（SEO）策略并不熟悉。为了克服这个问题，您可能需要手动通过在文本提示中插入任何相关的优化规则来训练模型，以适应新的内容写作策略。
- en: A Word of Warning
  id: totrans-452
  prefs: []
  type: TYPE_NORMAL
  zh: 警告
- en: While there’s an obvious temptation to write an entire book, college essay,
    or blog post using ChatGPT, it’s important to use this software in combination
    with your own writing and editing decisions. OpenAI is said to be developing cryptographic
    technology that can detect a signature in the words produced by OpenAI’s text-generating
    AI models.
  id: totrans-453
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然使用ChatGPT撰写整本书、大学论文或博客文章的诱惑很明显，但重要的是要将这款软件与您自己的写作和编辑决策结合起来使用。据说OpenAI正在开发一种加密技术，可以检测到OpenAI文本生成AI模型产生的文字中的签名。
- en: Amazon, Google, and other platforms are also wary of the impact that AI-generated
    content will have on the user experience for customers. As a result, they are
    likely to develop in-house tools to detect AI-generated content. This is not to
    say that Google will penalize you for using ChatGPT to write the conclusion of
    your blog or that Amazon will prevent the use of AI writing tools in the production
    of self-published books. However, it’s likely that major platforms will impose
    a minimum requirement, mandating that a certain proportion of the content is original
    and not generated by AI.
  id: totrans-454
  prefs: []
  type: TYPE_NORMAL
  zh: 亚马逊、谷歌和其他平台也对AI生成内容对客户用户体验可能产生的影响持谨慎态度。因此，他们可能会开发内部工具来检测AI生成的内容。这并不是说谷歌会因为您使用ChatGPT来撰写博客的结论而惩罚您，或者亚马逊会阻止在自出版书籍的生产中使用AI写作工具。然而，很可能主要平台将强制实施最低要求，规定一定比例的内容必须是原创的，而不是由AI生成的。
- en: To check the originality of the content, you can use online services such as
    Originality.ai and Detect GPT which offer software tools for detecting AI-generated
    content and plagiarism.
  id: totrans-455
  prefs: []
  type: TYPE_NORMAL
  zh: 为了检查内容的原创性，您可以使用 Originality.ai 和 Detect GPT 等在线服务，它们提供检测 AI 生成内容和剽窃的软件工具。
- en: ChatGPT Sample Blog
  id: totrans-456
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT 示例博客
- en: Below is the original version of the blog generated by ChatGPT-4, which is about
    550 words in length and has not been edited by a human writer. While you could
    publish directly, the more time you spend on editing and updating the content—using
    either ChatGPT or a professional writer—the better the final piece.
  id: totrans-457
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是 ChatGPT-4 生成的博客原文版本，大约 550 个单词，尚未经过人类作者的编辑。虽然您可以直接发布，但您在编辑和更新内容上花费的时间越多——无论是使用
    ChatGPT 还是专业作家——最终作品的质量就越好。
- en: '**Meta title:** Quick Grooming Tips for Busy Men: Master Looksmaxxing & Stay
    Sharp On the Go'
  id: totrans-458
  prefs: []
  type: TYPE_NORMAL
  zh: '**元标题**：忙碌男性的快速护理技巧：掌握完美外观，随时随地保持整洁'
- en: '**Meta description:** For the modern man, not only is looking sharp and well-groomed
    crucial in making outstanding first impressions, but it also enhances self-confidence
    and promotes overall well-being.'
  id: totrans-459
  prefs: []
  type: TYPE_NORMAL
  zh: '**元描述**：对于现代男性来说，不仅保持整洁和有型对于留下深刻的第一印象至关重要，而且还能增强自信心，促进整体健康。'
- en: '**Blog title:** Looksmaxxing for the Busy Man: Quick and Easy Grooming to Keep
    You Looking Sharp on the Go'
  id: totrans-460
  prefs: []
  type: TYPE_NORMAL
  zh: '**博客标题**：为忙碌男性打造完美外观：快速简便的护理，让您随时随地保持整洁'
- en: 'Introduction:'
  id: totrans-461
  prefs: []
  type: TYPE_NORMAL
  zh: 引言：
- en: In today's fast-paced world, personal grooming can feel like a luxury. But for
    the modern man, looking sharp and well-groomed is not only essential for making
    great first impressions; it also boosts self-confidence and contributes to overall
    well-being. The good news is that you don't have to sacrifice hours of your day
    to achieve a polished appearance. In this guide, we'll explore quick and easy
    grooming strategies for the busy man, including the benefits of using the "Super
    Shaver" to streamline your grooming routine.
  id: totrans-462
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个快节奏的世界里，个人护理可能会感觉像是一种奢侈。但对于现代男性来说，保持整洁和有型不仅对于留下深刻的第一印象至关重要；它还能增强自信心，促进整体健康。好消息是，您不必牺牲您一天中的数小时来达到完美外观。在这篇指南中，我们将探讨忙碌男性快速简便的护理策略，包括使用“超级剃须刀”简化您的护理流程的好处。
- en: 'The Importance of Male Grooming:'
  id: totrans-463
  prefs: []
  type: TYPE_NORMAL
  zh: 男性护理的重要性：
- en: First impressions matter, and investing in your appearance pays dividends in
    both personal and professional settings. Grooming not only enhances your overall
    look but also helps you maintain good hygiene and feel more self-assured.
  id: totrans-464
  prefs: []
  type: TYPE_NORMAL
  zh: 第一印象很重要，投资您的外观在个人和职业环境中都能带来回报。护理不仅能提升您的整体外观，还有助于保持良好的卫生和增强自信。
- en: Enter the "Super Shaver," an all-purpose grooming tool designed for men who
    value both their time and appearance. With its versatile functionality and ease
    of use, the "Super Shaver" is the ideal solution for busy men looking to elevate
    their grooming game with minimal effort.
  id: totrans-465
  prefs: []
  type: TYPE_NORMAL
  zh: “超级剃须刀”进入市场，这是一款多功能护理工具，专为重视时间和外观的男性设计。凭借其多功能性和易用性，“超级剃须刀”是忙碌男性提升护理水平的理想选择。
- en: 'Quick and Efficient Shaving Techniques:'
  id: totrans-466
  prefs: []
  type: TYPE_NORMAL
  zh: 快速高效的剃须技巧：
- en: 'Shaving shouldn''t be a chore or a time-consuming task. With the "Super Shaver,"
    you can achieve a clean and well-groomed look in just a few minutes. Here are
    some tips to help you maximize efficiency:'
  id: totrans-467
  prefs: []
  type: TYPE_NORMAL
  zh: 剃须不应该是单调乏味或耗时的工作。使用“超级剃须刀”，您只需几分钟就能达到干净整洁的外观。以下是一些帮助您提高效率的技巧：
- en: 'Prep your skin: Before using the "Super Shaver," ensure your skin is clean
    and well-hydrated. This will make shaving smoother and more comfortable.'
  id: totrans-468
  prefs: []
  type: TYPE_NORMAL
  zh: 准备您的皮肤：在使用“超级剃须刀”之前，确保您的皮肤清洁且充分保湿。这将使剃须更加顺畅和舒适。
- en: 'Use short, steady strokes: The "Super Shaver" is designed for precision, so
    let the device do the work. Avoid pressing too hard or making long strokes to
    reduce the risk of irritation.'
  id: totrans-469
  prefs: []
  type: TYPE_NORMAL
  zh: 使用短而稳定的划痕： “超级剃须刀”设计用于精确剃须，所以让设备来做这项工作。避免用力过猛或做长划痕，以减少刺激的风险。
- en: 'Moisturize: After shaving, apply a soothing aftershave or moisturizer to keep
    your skin healthy and irritation-free.'
  id: totrans-470
  prefs: []
  type: TYPE_NORMAL
  zh: 保湿：剃须后，涂抹舒缓的剃须后乳液或保湿霜，以保持皮肤健康，避免刺激。
- en: 'Time-Saving Hair and Skincare Hacks:'
  id: totrans-471
  prefs: []
  type: TYPE_NORMAL
  zh: 节省时间的头发和护肤窍门：
- en: 'When you''re busy, it''s easy to neglect your hair and skin. However, with
    a few simple tricks, you can maintain a fresh appearance without sacrificing precious
    time:'
  id: totrans-472
  prefs: []
  type: TYPE_NORMAL
  zh: 当您忙碌时，很容易忽视您的头发和皮肤。然而，通过一些简单的技巧，您可以在不牺牲宝贵时间的情况下保持清新外观：
- en: 'Choose a low-maintenance hairstyle: Opt for a haircut that requires minimal
    styling and is easy to manage.'
  id: totrans-473
  prefs: []
  type: TYPE_NORMAL
  zh: 选择低维护的发型：选择需要最少造型且易于打理的发型。
- en: 'Make the most of your shower: Use a 2-in-1 shampoo and conditioner to save
    time and streamline your hair care routine.'
  id: totrans-474
  prefs: []
  type: TYPE_NORMAL
  zh: 充分利用你的淋浴时间：使用二合一洗发水和护发素来节省时间并简化你的护发程序。
- en: 'Opt for multi-purpose skincare products: Look for products that combine multiple
    benefits, such as a moisturizer with built-in SPF protection, to save time and
    keep your skin healthy.'
  id: totrans-475
  prefs: []
  type: TYPE_NORMAL
  zh: 选择多功能护肤品：寻找结合多种功效的产品，如内置SPF保护功能的保湿霜，以节省时间并保持皮肤健康。
- en: 'Grooming on the Go: Strategies for Maintaining Your Look Throughout the Day:'
  id: totrans-476
  prefs: []
  type: TYPE_NORMAL
  zh: 随时美容：全天保持你外表的策略：
- en: 'No matter how busy your day gets, you can still maintain your polished appearance
    with these on-the-go grooming strategies:'
  id: totrans-477
  prefs: []
  type: TYPE_NORMAL
  zh: 无论你的日程多么繁忙，你仍然可以使用这些随行美容策略来保持你的精致外表：
- en: 'Carry a compact grooming kit: Keep a small kit in your bag or car with essentials
    like a travel-sized "Super Shaver," toothbrush, toothpaste, comb, and facial wipes.'
  id: totrans-478
  prefs: []
  type: TYPE_NORMAL
  zh: 携带便携式美容套装：在你的包或车里放一个小套装，里面有旅行大小的“超级剃须刀”、牙刷、牙膏、梳子和面部湿巾。
- en: 'Make use of downtime: Take advantage of short breaks during the day to check
    your appearance and make quick touch-ups as needed.'
  id: totrans-479
  prefs: []
  type: TYPE_NORMAL
  zh: 充分利用空闲时间：利用白天短暂的休息时间检查你的外表，并在需要时进行快速修整。
- en: 'Schedule regular grooming appointments: Prioritize self-care by setting reminders
    for regular haircuts and other grooming appointments to ensure you always look
    your best.'
  id: totrans-480
  prefs: []
  type: TYPE_NORMAL
  zh: 定期安排美容护理：通过设置定期理发和其他美容预约的提醒，优先考虑自我护理，确保你始终保持最佳状态。
- en: 'Conclusion:'
  id: totrans-481
  prefs: []
  type: TYPE_NORMAL
  zh: 结论：
- en: Looksmaxxing for the busy man is not only achievable but also essential in today's
    fast-paced world. By investing in your personal grooming and making the most of
    time-saving tools like the "Super Shaver," you can present the best version of
    yourself with minimal effort. So, don't wait any longer—embrace efficient grooming
    strategies and experience the confidence boost that comes with looking sharp on
    the go.
  id: totrans-482
  prefs: []
  type: TYPE_NORMAL
  zh: 对于忙碌的男士来说，追求完美外表不仅可行，而且在当今快节奏的世界中也是必不可少的。通过投资个人美容并充分利用像“超级剃须刀”这样的省时工具，你可以以最小的努力展现出最好的自己。所以，不要再等待了——拥抱高效的美容策略，体验在途中保持整洁所带来的自信提升。
- en: '|  | 7 |'
  id: totrans-483
  prefs: []
  type: TYPE_TB
  zh: '|  | 7 |'
- en: TRANSLATION TASKS
  id: totrans-484
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 翻译任务
- en: As a large language model, ChatGPT excels at comprehending and producing responses
    in many different languages. This means that ChatGPT cannot only be used in multiple
    languages but also applied as an advanced translation tool.
  id: totrans-485
  prefs: []
  type: TYPE_NORMAL
  zh: 作为一个大型的语言模型，ChatGPT擅长理解和生成多种不同语言的响应。这意味着ChatGPT不仅可以用于多种语言，还可以作为高级翻译工具应用。
- en: To use ChatGPT for translation, you will need to input the source text and add
    a text prompt specifying the target language for translation.
  id: totrans-486
  prefs: []
  type: TYPE_NORMAL
  zh: 要使用ChatGPT进行翻译，你需要输入源文本并添加一个文本提示，指定翻译的目标语言。
- en: '**Text Prompt**'
  id: totrans-487
  prefs: []
  type: TYPE_NORMAL
  zh: '**文本提示**'
- en: 'Translate: _______'
  id: totrans-488
  prefs: []
  type: TYPE_NORMAL
  zh: 翻译：_______
- en: By default, ChatGPT will generate a translation based on the language used to
    write the prompt, which in my case is English. Conversely, if you write the prompt
    in French and the source content is in English, ChatGPT will translate the content
    into French. To specify the output language, you can also add this information
    to your text prompt.
  id: totrans-489
  prefs: []
  type: TYPE_NORMAL
  zh: 默认情况下，ChatGPT会根据提示语所使用的语言生成翻译，在我这个例子中是英语。相反，如果你用法语写提示语，而源内容是英语，ChatGPT会将内容翻译成法语。为了指定输出语言，你还可以将此信息添加到你的文本提示中。
- en: '**Text Prompt**'
  id: totrans-490
  prefs: []
  type: TYPE_NORMAL
  zh: '**文本提示**'
- en: Translate “______” into French
  id: totrans-491
  prefs: []
  type: TYPE_NORMAL
  zh: 将以下内容翻译成法语：“______”
- en: 'Translate into French: “______”'
  id: totrans-492
  prefs: []
  type: TYPE_NORMAL
  zh: 将以下内容翻译成法语：“______”
- en: While ChatGPT's language translation capabilities are impressive, it’s important
    to understand that like all language translation tools, the model is not perfect,
    and it won’t always produce an accurate translation. Factors such as context,
    colloquialisms, and idiomatic expressions can all affect the accuracy of the translation.
  id: totrans-493
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然ChatGPT的语言翻译能力令人印象深刻，但重要的是要理解，像所有语言翻译工具一样，该模型并不完美，它不会总是产生准确的翻译。诸如上下文、俚语和成语等因素都可能影响翻译的准确性。
- en: Advanced Tips
  id: totrans-494
  prefs: []
  type: TYPE_NORMAL
  zh: 高级技巧
- en: After two or three translations, it may not be necessary to add a prompt for
    each new request. Once ChatGPT recognizes the pattern of translating your inputs
    into the target language, you can simply copy and paste the source language and
    the model will translate the content into the target language automatically.
  id: totrans-495
  prefs: []
  type: TYPE_NORMAL
  zh: 经过两三次翻译后，可能不需要为每个新的请求添加提示。一旦ChatGPT识别出将您的输入翻译成目标语言的模式，您只需复制并粘贴源语言，模型就会自动将内容翻译成目标语言。
- en: However, keep in mind that as the chat progresses and more content is submitted
    for translation, earlier messages may impact your outputs. This problem arises
    because ChatGPT uses the conversation history as a reference for future outputs.
    This can lead the model to include words or phrases not contained in the direct
    source content but which appeared in earlier translations. To avoid this issue,
    you can edit your first chat message after each translation and replace it with
    the next text snippet for translation. This eliminates earlier messages impacting
    new translation outputs.
  id: totrans-496
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，请注意，随着对话的进行和更多内容提交进行翻译，早期的消息可能会影响您的输出。这个问题出现的原因是ChatGPT将对话历史作为未来输出的参考。这可能导致模型包含直接源内容中未包含的单词或短语，但这些单词或短语出现在早期的翻译中。为了避免这个问题，您可以在每次翻译后编辑您的第一条消息，并用下一个文本片段替换它。这样可以消除早期消息对新的翻译输出造成的影响。
- en: Next, if you are translating multiple strings and using ChatGPT’s translation
    feature regularly, you may want to consider upgrading to a Pro account to speed
    up your workflow.
  id: totrans-497
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，如果您经常使用ChatGPT的翻译功能并翻译多个字符串，您可能希望考虑升级到专业账户以加快工作流程。
- en: Finally, if you are satisfied with the literal translation but want to refine
    the translation to sound more natural, you can instruct ChatGPT to optimize or
    improve the text by using a verb such as **optimize**, **rewrite**, or **improve**
    in your next message to ChatGPT.
  id: totrans-498
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，如果您对直译感到满意但希望使翻译听起来更自然，您可以通过在下一个消息中使用动词如**优化**、**重写**或**改进**来指示ChatGPT优化或改进文本。
- en: '**Text Prompt**'
  id: totrans-499
  prefs: []
  type: TYPE_NORMAL
  zh: '**文本提示**'
- en: 'Translate: “____________”'
  id: totrans-500
  prefs: []
  type: TYPE_NORMAL
  zh: 翻译：“____________”
- en: Optimize it
  id: totrans-501
  prefs: []
  type: TYPE_NORMAL
  zh: 优化它
- en: '![Image](images/image-26.png)'
  id: totrans-502
  prefs: []
  type: TYPE_IMG
  zh: '![图片](images/image-26.png)'
- en: ChatGPT Vs. Google Translate
  id: totrans-503
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT 与 Google Translate 的比较
- en: When it comes to translation tasks, the performance of both ChatGPT and Google
    Translate depends on the complexity of the text, the length of the sentences,
    and the specific language pair being translated. In general, Google Translate
    will provide faster translations, while ChatGPT will usually produce more accurate
    and natural-sounding translations, particularly for longer and more complex sentences.
  id: totrans-504
  prefs: []
  type: TYPE_NORMAL
  zh: 当涉及到翻译任务时，ChatGPT和Google Translate的表现都取决于文本的复杂性、句子的长度以及具体的语言对。一般来说，Google Translate会提供更快的翻译，而ChatGPT通常会生成更准确、更自然的翻译，尤其是在处理更长和更复杂的句子时。
- en: However, the big difference between the two tools is that Google Translate is
    a closed system, whereas ChatGPT enables you to have input on how the model translates
    content based on personal preference. An example of this is controlling the formality
    of the output for languages such as Korean and Japanese where there are different
    levels of politeness. As an example, the Korean language has a formal and informal
    language system known as “jondaetmal” and “banmal” respectively. By specifying
    the target formality of the language in your prompt, ChatGPT can generate translations
    based on different needs.
  id: totrans-505
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，这两个工具之间的一大区别是，Google Translate是一个封闭系统，而ChatGPT允许您根据个人偏好对模型如何翻译内容进行反馈。一个例子是控制韩语和日语等语言输出的正式程度。例如，韩语有一个正式和非正式的语言系统，分别称为“jondaetmal”和“banmal”。通过在提示中指定目标语言的正式程度，ChatGPT可以根据不同的需求生成翻译。
- en: Likewise, you can use ChatGPT to translate content from one variant to another
    variant in the same parent language. You can do this in English by alternating
    between standard British English and Singaporean English, which is characterized
    by some unique vocabulary and grammar rules influenced by the Malay and Chinese
    languages. This allows you to receive more natural and contextually relevant translations,
    enhancing the overall quality of the translation output.
  id: totrans-506
  prefs: []
  type: TYPE_NORMAL
  zh: 同样，您可以使用ChatGPT将同一母语下的不同变体之间的内容进行翻译。您可以通过在标准英国英语和新加坡英语之间交替使用，来实现这一点，新加坡英语的特点是受到马来语和中国语言的一些独特词汇和语法规则的影响。这使您能够获得更自然、更符合上下文的翻译，从而提高翻译输出的整体质量。
- en: 'For power users, ChatGPT can be trained to translate terms based on your instructions,
    including fixed translations for medical and legal terminology or proper nouns
    (i.e. names of companies). You do this by telling ChatGPT that you want to: **translate
    “X” as “Y”**'
  id: totrans-507
  prefs: []
  type: TYPE_NORMAL
  zh: 对于高级用户来说，ChatGPT可以根据您的指示进行训练，以翻译术语，包括对医疗和法律术语或专有名词（例如公司名称）的固定翻译。您这样做是通过告诉ChatGPT您想要：**将“X”翻译为“Y”**
- en: Text Prompt
  id: totrans-508
  prefs: []
  type: TYPE_NORMAL
  zh: 文本提示
- en: Translate “Juliang” as “Ocean Engine”
  id: totrans-509
  prefs: []
  type: TYPE_NORMAL
  zh: 将“Juliang”翻译为“Ocean Engine”
- en: In this example, I have informed ChatGPT that I want it to translate the Chinese
    company name “Juliang” as “Ocean Engine”, a company owned by ByteDance. Unless
    I specify the correct translation ChatGPT will automatically translate it as “the
    Huge Engine”, which is not what I want! This is a common problem as well with
    Google Translate, but unlike ChatGPT, there is no way of modifying Google Translate’s
    outputs.
  id: totrans-510
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个例子中，我已告知ChatGPT我希望它将中文公司名称“Juliang”翻译为“Ocean Engine”，这是字节跳动公司的一个子公司。除非我指定正确的翻译，否则ChatGPT会自动将其翻译为“the
    Huge Engine”，这并不是我想要的！这也是Google Translate的一个常见问题，但与ChatGPT不同，没有修改Google Translate输出的方法。
- en: Ultimately, the choice between ChatGPT and Google Translate depends on the specific
    requirements of the task and your preferences as the user. Personally, I find
    ChatGPT is better at translating technical and colloquial language from Chinese
    into English. However, Google Translate is faster and remains my first option
    when I need a rough translation or to translate individual words.
  id: totrans-511
  prefs: []
  type: TYPE_NORMAL
  zh: 最终，ChatGPT和Google Translate之间的选择取决于任务的特定要求和用户的个人偏好。就我个人而言，我发现ChatGPT在将中文翻译成英文的技术和口语化语言方面做得更好。然而，Google
    Translate更快，当我需要粗略翻译或翻译单个单词时，它仍然是我的首选选项。
- en: '|  | 8 |'
  id: totrans-512
  prefs: []
  type: TYPE_TB
  zh: '|  | 8 |'
- en: PERSONALIZED TUTORING
  id: totrans-513
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '**个性化辅导**'
- en: Looking back through history, it’s common to find stories of successful people
    who had some extra help along the way. This includes personal tutors, mentors,
    or coaches who played an important part in shaping their achievements.
  id: totrans-514
  prefs: []
  type: TYPE_NORMAL
  zh: 回顾历史，我们常常会发现一些成功人士在成长过程中得到了一些额外的帮助。这包括私人导师、导师或教练，他们在塑造他们的成就中扮演了重要的角色。
- en: 'The ancient ruler and conqueror Alexander the Great had perhaps the most famous
    tutor: the philosopher Aristotle, whose teachings played a role in shaping Alexander''s
    strategies and leadership style. The great artist Leonardo Da Vinci also benefited
    from personalized tutoring. He learned his craft in the studio of Andrea del Verrocchio,
    an experience that shaped his approach to art and other areas of study.'
  id: totrans-515
  prefs: []
  type: TYPE_NORMAL
  zh: 古代统治者和大征服者亚历山大大帝可能拥有最著名的导师：哲学家亚里士多德，他的教诲在塑造亚历山大的战略和领导风格中发挥了作用。伟大的艺术家达芬奇也受益于个性化辅导。他在安德烈亚·德尔·韦罗基奥的工作室学习技艺，这段经历塑造了他对艺术和其他研究领域的方法。
- en: Fast forward to more recent times, and there is the example of Oprah Winfrey
    who found a mentor in Maya Angelou and Bill Gates who started learning computer
    programming from a personal tutor during his teenage years.
  id: totrans-516
  prefs: []
  type: TYPE_NORMAL
  zh: 快进到更近的时期，我们有奥普拉·温弗瑞的例子，她在玛雅·安吉洛和比尔·盖茨的例子中找到了导师，比尔·盖茨在青少年时期就开始从私人导师那里学习计算机编程。
- en: Each of these stories highlights the value personalized tutoring can bring,
    but until recently, access to tutoring was largely restricted to those with the
    financial resources or the benefit of proximity. However, now using AI, there
    are unlimited use cases for finding a tutor in virtually any subject. Online tutoring
    companies such as Chegg, for example, are working in partnership with OpenAI to
    develop ChatGPT-powered software programs to help students with their homework.
  id: totrans-517
  prefs: []
  type: TYPE_NORMAL
  zh: 这些故事中的每一个都突出了个性化辅导可以带来的价值，但直到最近，辅导的获取在很大程度上仍然局限于那些有经济资源或地理位置优势的人。然而，现在使用AI，几乎在任何一个学科中寻找导师都有无限的应用场景。例如，Chegg这样的在线辅导公司正在与OpenAI合作，开发由ChatGPT驱动的软件程序，以帮助学生完成作业。
- en: While AI-powered tutoring doesn’t directly replicate the advantages of a human
    tutor, it does offer a range of benefits, particularly for adult learners who
    have a stronger ability to evaluate the quality of AI-generated outputs. Leveraging
    applications like ChatGPT, CheggMate, or Character.AI, learners have the freedom
    to invest as much time as they need to grasp difficult concepts or revisit topics
    they’ve learned in the past. Interacting with AI rather than a human also eliminates
    the fear of judgment and hesitation to ask for help or ask simple questions.
  id: totrans-518
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然AI辅导不能直接复制人类辅导的优势，但它确实为成人学习者提供了一系列好处，尤其是对于那些能够更好地评估AI生成输出质量的成人学习者。利用ChatGPT、CheggMate或Character.AI等应用程序，学习者可以自由地投入他们所需的时间来掌握困难的概念或回顾他们过去学过的内容。与AI而不是人类互动也消除了评判的恐惧和寻求帮助或问简单问题的犹豫。
- en: In terms of the downsides, ChatGPT doesn't yet have the ability to understand
    unique learning styles or provide emotional support and motivation in the same
    way a human can. There is also a lack of testing and monitoring on the efficacy
    of AI tutoring, including mechanisms to verify the accuracy of the content provided.
    As a result, ChatGPT should be used as a supplement to conventional education
    methods rather than being relied upon as the sole resource. This may change over
    time as other more specialized tutoring AI services come onto the market. For
    now, here are a few ways to use ChatGPT as a tutor.
  id: totrans-519
  prefs: []
  type: TYPE_NORMAL
  zh: 在缺点方面，ChatGPT目前还没有能力理解独特的学习风格或像人类一样提供情感支持和动力。此外，在AI辅导的有效性方面也存在缺乏测试和监控，包括验证提供内容准确性的机制。因此，ChatGPT应作为传统教育方法的补充，而不是作为唯一资源依赖。随着时间的推移，随着市场上出现更多更专业的辅导AI服务，这可能会发生变化。目前，这里有几种使用ChatGPT作为辅导老师的方法。
- en: Business Strategy Exploration
  id: totrans-520
  prefs: []
  type: TYPE_NORMAL
  zh: '**商业策略探索**'
- en: Use ChatGPT to brainstorm ideas and explore different strategies for your business.
    By providing specific information about your industry, target market, and goals,
    ChatGPT can offer suggestions and considerations to help you think outside the
    box, adopt new business tactics, and generate fresh perspectives.
  id: totrans-521
  prefs: []
  type: TYPE_NORMAL
  zh: 使用ChatGPT来头脑风暴想法，并探索你业务的不同策略。通过提供关于你的行业、目标市场和目标的具体信息，ChatGPT可以提供建议和考虑事项，帮助你跳出思维定式，采用新的商业策略，并产生新的观点。
- en: Text Prompts
  id: totrans-522
  prefs: []
  type: TYPE_NORMAL
  zh: '**文本提示**'
- en: I run a small e-commerce business selling handmade crafts. Can you help me brainstorm
    innovative strategies to expand my customer base and increase online sales?
  id: totrans-523
  prefs: []
  type: TYPE_NORMAL
  zh: 我经营着一家小型电子商务公司，销售手工工艺品。你能帮我头脑风暴一些创新策略来扩大我的客户群并增加在线销售额吗？
- en: I'm looking to enter the digital marketing industry with a new agency. Could
    you provide insights on potential market gaps and help me explore unique business
    models that could set my agency apart?
  id: totrans-524
  prefs: []
  type: TYPE_NORMAL
  zh: 我想加入一家新的数字营销代理机构。你能提供关于潜在市场缺口和帮助我探索独特商业模式以使我的代理机构脱颖而出的见解吗？
- en: I manage a local restaurant chain and I want to enhance customer loyalty. Can
    you suggest creative ways to improve our customer experience and stand out in
    a competitive market?
  id: totrans-525
  prefs: []
  type: TYPE_NORMAL
  zh: 我管理着一家本地连锁餐厅，并希望提高客户忠诚度。你能建议一些创造性的方法来改善我们的客户体验并在竞争激烈的市场中脱颖而出吗？
- en: '**Career Coaching**'
  id: totrans-526
  prefs: []
  type: TYPE_NORMAL
  zh: '**职业辅导**'
- en: As a career coach, ChatGPT can assist you in identifying your strengths and
    exploring career options. It can also be used to provide guidance in areas such
    as job search strategies, resume writing, interview skills, and career transition
    planning.
  id: totrans-527
  prefs: []
  type: TYPE_NORMAL
  zh: 作为职业辅导师，ChatGPT可以帮助你识别你的优势并探索职业选择。它还可以用于提供关于求职策略、简历撰写、面试技巧和职业转换规划等方面的指导。
- en: Text Prompts
  id: totrans-528
  prefs: []
  type: TYPE_NORMAL
  zh: '**文本提示**'
- en: I'm considering a career change, but I'm not sure which direction to go. Can
    you help me identify transferable skills and suggest industries that align with
    my interests?
  id: totrans-529
  prefs: []
  type: TYPE_NORMAL
  zh: 我正在考虑职业转换，但不确定该往哪个方向发展。你能帮我识别可转移的技能并建议与我兴趣相符的行业吗？
- en: I have an upcoming job interview for a marketing role. Could you give me tips
    on how to answer common interview questions and highlight my relevant skills and
    experiences?
  id: totrans-530
  prefs: []
  type: TYPE_NORMAL
  zh: 我即将参加一个市场营销职位的面试。你能给我一些建议，如何回答常见的面试问题并突出我的相关技能和经验吗？
- en: I'm a recent graduate looking to enter the finance sector. Can you provide guidance
    on building a strong resume and networking effectively within the industry?
  id: totrans-531
  prefs: []
  type: TYPE_NORMAL
  zh: 我是一名应届毕业生，想进入金融行业。你能提供关于构建强大的简历和在行业内有效网络的方法的指导吗？
- en: '**Financial Guidance**'
  id: totrans-532
  prefs: []
  type: TYPE_NORMAL
  zh: '**财务指导**'
- en: While ChatGPT is not a substitute for a certified financial advisor, it can
    provide general information and insights related to financial matters. For instance,
    it can help you understand basic financial concepts, explain financial statements,
    or assist with financial calculations based on the information you provide.
  id: totrans-533
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然 ChatGPT 不能替代认证的财务顾问，但它可以提供与财务相关的一般信息和见解。例如，它可以帮助你理解基本的财务概念，解释财务报表，或根据你提供的信息帮助你进行财务计算。
- en: Text Prompts
  id: totrans-534
  prefs: []
  type: TYPE_NORMAL
  zh: '**文本提示**'
- en: I'm planning to invest in the stock market but I'm new to this. Can you explain
    some basic investment principles and provide tips on how to research and select
    promising stocks?
  id: totrans-535
  prefs: []
  type: TYPE_NORMAL
  zh: 我计划投资股市，但我对此很陌生。你能解释一些基本的投资原则并提供如何研究和选择有潜力的股票的建议吗？
- en: I want to understand the basics of budgeting and managing my personal finances.
    Can you explain concepts like saving, budget categories, and debt management?
  id: totrans-536
  prefs: []
  type: TYPE_NORMAL
  zh: 我想要了解预算管理和个人财务的基本知识。你能解释一下诸如储蓄、预算类别和债务管理这样的概念吗？
- en: I'm considering taking out a mortgage for my first home. Can you help me understand
    the factors that influence mortgage rates and provide some insights into the loan
    application process?
  id: totrans-537
  prefs: []
  type: TYPE_NORMAL
  zh: 我在考虑为我的第一套房子申请抵押贷款。你能帮我理解影响抵押利率的因素，并提供一些关于贷款申请流程的见解吗？
- en: '**Homework Help**'
  id: totrans-538
  prefs: []
  type: TYPE_NORMAL
  zh: '**作业帮助**'
- en: Use ChatGPT to clarify concepts you don't understand, get help on tricky homework
    problems, or review material you've learned in class. Just don’t let ChatGPT do
    all your homework for you!
  id: totrans-539
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 ChatGPT 来澄清你不理解的概念，获得难以解决的作业问题的帮助，或复习你在课堂上学到的材料。只是不要让 ChatGPT 做你所有的作业！
- en: Text Prompts
  id: totrans-540
  prefs: []
  type: TYPE_NORMAL
  zh: '**文本提示**'
- en: I'm struggling with a complex calculus problem. Can you guide me through the
    steps to solve it?
  id: totrans-541
  prefs: []
  type: TYPE_NORMAL
  zh: 我在解决一个复杂的微积分问题上有困难。你能指导我通过解决这个问题的步骤吗？
- en: I need help understanding the historical context of the American Revolution.
    Could you provide a brief overview of the key events and their significance?
  id: totrans-542
  prefs: []
  type: TYPE_NORMAL
  zh: 我需要帮助理解美国独立战争的历史背景。你能提供一个关于关键事件及其重要性的简要概述吗？
- en: I have a chemistry assignment on chemical reactions. Can you explain the different
    types of reactions and give me examples of each?
  id: totrans-543
  prefs: []
  type: TYPE_NORMAL
  zh: 我有一份关于化学反应的化学作业。你能解释不同类型的反应并给出每种反应的例子吗？
- en: '**Language Practice**'
  id: totrans-544
  prefs: []
  type: TYPE_NORMAL
  zh: '**语言练习**'
- en: For those learning a new language, ChatGPT can be a valuable resource for practicing
    written conversation skills, learning about the context of when to use specific
    vocabulary (such as the level of formality), and practicing grammar drills.
  id: totrans-545
  prefs: []
  type: TYPE_NORMAL
  zh: 对于那些在学习新语言的人来说，ChatGPT 可以是一个宝贵的资源，用于练习书面对话技巧，了解何时使用特定词汇的语境（例如正式程度），以及练习语法练习。
- en: Text Prompts
  id: totrans-546
  prefs: []
  type: TYPE_NORMAL
  zh: '**文本提示**'
- en: I'm learning French and I want to practice writing sentences in the future tense.
    Can you help me create a few sentences using different verbs?
  id: totrans-547
  prefs: []
  type: TYPE_NORMAL
  zh: 我正在学习法语，并想在将来练习写句子。你能帮我用不同的动词造几个句子吗？
- en: I'm studying Spanish and I'm confused about when to use 'ser' and 'estar.' Can
    you provide some examples to clarify their usage?
  id: totrans-548
  prefs: []
  type: TYPE_NORMAL
  zh: 我正在学习西班牙语，对于何时使用 'ser' 和 'estar' 感到困惑。你能提供一些例子来阐明它们的用法吗？
- en: I'm practicing my Japanese writing skills. Can you help me compose a short paragraph
    introducing myself in Japanese?
  id: totrans-549
  prefs: []
  type: TYPE_NORMAL
  zh: 我正在练习我的日语写作技巧。你能帮我写一段介绍自己的日语短文吗？
- en: Life Coaching
  id: totrans-550
  prefs: []
  type: TYPE_NORMAL
  zh: '**生活指导**'
- en: ChatGPT can help clarify your goals, identify obstacles, and develop strategies
    to achieve personal fulfillment and success. Life coaching covers areas such as
    relationships, career, personal growth, and overall well-being.
  id: totrans-551
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT 可以帮助你明确目标，识别障碍，并制定实现个人满足感和成功的方法。生活指导涵盖了关系、职业、个人成长和整体福祉等领域。
- en: Text Prompts
  id: totrans-552
  prefs: []
  type: TYPE_NORMAL
  zh: '**文本提示**'
- en: I'm feeling overwhelmed with balancing work and personal life. Can you help
    me identify strategies to manage my time more effectively?
  id: totrans-553
  prefs: []
  type: TYPE_NORMAL
  zh: 我在平衡工作和个人生活方面感到压力很大。你能帮我识别一些更有效地管理时间的方法吗？
- en: I want to set clear career goals but I'm not sure where to start. Can you guide
    me through a process to define my aspirations and create an action plan?
  id: totrans-554
  prefs: []
  type: TYPE_NORMAL
  zh: 我想要设定清晰的职业目标，但不知道从何开始。你能指导我通过一个过程来定义我的抱负并制定行动计划吗？
- en: I'm facing a decision about a major life change. Can you help me weigh the pros
    and cons and explore potential outcomes?
  id: totrans-555
  prefs: []
  type: TYPE_NORMAL
  zh: 我面临一个关于重大生活变化的决策。你能帮我权衡利弊并探讨可能的后果吗？
- en: Subject Review
  id: totrans-556
  prefs: []
  type: TYPE_NORMAL
  zh: '**科目复习**'
- en: Use ChatGPT to provide information on a wide range of topics, from math and
    science to history and language arts. This can be a helpful tool for those studying
    for a test, looking to brush up on specific subjects, or simply wanting to learn
    something new. Similar to browsing Wikipedia, you can use the learn-as-you-go
    method based on following your curiosity about a particular subject.
  id: totrans-557
  prefs: []
  type: TYPE_NORMAL
  zh: 使用ChatGPT提供关于广泛主题的信息，从数学和科学到历史和语言艺术。这对于准备考试、想要复习特定科目或只是想学习新知识的人来说是一个有用的工具。类似于浏览维基百科，你可以根据对特定主题的好奇心，采用边学边走的模式。
- en: Text Prompts
  id: totrans-558
  prefs: []
  type: TYPE_NORMAL
  zh: 文本提示
- en: I have a physics test coming up, and I'm having trouble understanding Newton's
    laws. Can you explain them in simpler terms?
  id: totrans-559
  prefs: []
  type: TYPE_NORMAL
  zh: 我即将参加物理考试，我在理解牛顿定律上遇到了困难。你能用更简单的术语来解释它们吗？
- en: I'm interested in learning about the history of ancient civilizations. Could
    you provide a brief overview of notable ancient cultures and their contributions?
  id: totrans-560
  prefs: []
  type: TYPE_NORMAL
  zh: 我对学习古代文明的历史很感兴趣。你能提供一个关于著名古代文化和它们贡献的简要概述吗？
- en: I'm curious about astronomy and want to know more about the solar system. Can
    you provide information about the planets and their characteristics?
  id: totrans-561
  prefs: []
  type: TYPE_NORMAL
  zh: 我对天文学很感兴趣，想了解更多关于太阳系的信息。你能提供关于行星及其特性的信息吗？
- en: Technical Assistance
  id: totrans-562
  prefs: []
  type: TYPE_NORMAL
  zh: 技术辅助
- en: While ChatGPT does not substitute for a trained professional, you can use it
    to gain knowledge about accounting, tax, and other technical assistance. By pasting
    my financial records into ChatGPT, I recently prepared my Balance Sheet and Profit
    & Loss Statement for my end-of-year accounts, before sending that information
    as a file to my accountant.
  id: totrans-563
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然ChatGPT不能替代受过培训的专业人士，但你可以用它来获取关于会计、税务和其他技术援助的知识。通过将我的财务记录粘贴到ChatGPT中，我最近为我年末的账户准备了资产负债表和损益表，然后将这些信息作为文件发送给我的会计师。
- en: Text Prompts
  id: totrans-564
  prefs: []
  type: TYPE_NORMAL
  zh: 文本提示
- en: I need to understand some basic accounting concepts for my small business. Can
    you explain the difference between cash flow and profit?
  id: totrans-565
  prefs: []
  type: TYPE_NORMAL
  zh: 我需要了解一些基本的会计概念来管理我的小企业。你能解释一下现金流和利润之间的区别吗？
- en: I'm preparing my taxes and I have questions about deductions. Can you provide
    some general information about common tax deductions for individuals in {your
    country/tax jurisdiction}?
  id: totrans-566
  prefs: []
  type: TYPE_NORMAL
  zh: 我正在准备我的税务申报，我对减免税项有疑问。你能提供一些关于{你的国家/税务管辖区域}个人常见税务减免的一般信息吗？
- en: I want to learn more about web development. Can you explain the differences
    between front-end and back-end development and their roles in creating websites?
  id: totrans-567
  prefs: []
  type: TYPE_NORMAL
  zh: 我想了解更多关于网络开发的知识。你能解释一下前端开发和后端开发之间的区别以及它们在创建网站中的作用吗？
- en: Writing Assistance
  id: totrans-568
  prefs: []
  type: TYPE_NORMAL
  zh: 写作辅助
- en: ChatGPT can help you improve your writing skills. It can provide tips on grammar,
    punctuation, and style. It can also generate examples of well-written sentences
    or paragraphs, and help with brainstorming ideas for essays or stories.
  id: totrans-569
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT可以帮助你提高写作技能。它可以提供关于语法、标点符号和风格的建议。它还可以生成高质量句子或段落的例子，并帮助构思论文或故事的想法。
- en: Text Prompts
  id: totrans-570
  prefs: []
  type: TYPE_NORMAL
  zh: 文本提示
- en: I'm working on an essay for my literature class. Can you help me come up with
    a strong thesis statement and outline for my paper?
  id: totrans-571
  prefs: []
  type: TYPE_NORMAL
  zh: 我正在为我的文学课程写一篇论文。你能帮我构思一个强有力的论文主题和提纲吗？
- en: I'm writing a short story and I'm struggling with descriptive language. Can
    you give me examples of how to use imagery to create vivid scenes?
  id: totrans-572
  prefs: []
  type: TYPE_NORMAL
  zh: 我正在写一个短篇小说，我在描述性语言上遇到了困难。你能给我一些如何使用意象来创造生动场景的例子吗？
- en: I want to improve my professional email writing skills. Could you review a draft
    email I've written and provide suggestions for making it more effective?
  id: totrans-573
  prefs: []
  type: TYPE_NORMAL
  zh: 我想提高我的专业电子邮件写作技巧。你能审阅我写的草稿邮件并提供使其更有效的建议吗？
- en: '|  | 9 |'
  id: totrans-574
  prefs: []
  type: TYPE_TB
  zh: '|  | 9 |'
- en: AI ART PROMPTS
  id: totrans-575
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: AI艺术提示
- en: With text-to-image technology radically transforming the world of art creation,
    ChatGPT can be considered an auxiliary tool for creating stunning visual content.
    ChatGPT doesn’t currently have the capabilities to output images but can be used
    to generate text prompts for use on third-party software such as DALL-E 2, Midjourney,
    and Stable Diffusion.
  id: totrans-576
  prefs: []
  type: TYPE_NORMAL
  zh: 随着文本到图像技术在艺术创作领域的彻底变革，ChatGPT可以被认为是创建令人惊叹的视觉内容的辅助工具。ChatGPT目前还没有输出图像的能力，但可以用来生成用于第三方软件（如DALL-E
    2、Midjourney和Stable Diffusion）的文本提示。
- en: One method involves articulating your artistic vision to ChatGPT and requesting
    the model to formulate a text prompt that aligns with your description and your
    chosen software. The text prompt can then be fed into the relevant software to
    generate an image.
  id: totrans-577
  prefs: []
  type: TYPE_NORMAL
  zh: 一种方法是将你的艺术愿景传达给ChatGPT，并要求模型制定一个与你的描述和所选软件相符合的文本提示。然后，这个文本提示可以被输入到相关软件中以生成图像。
- en: As an example, let’s say we want to generate a text prompt for DALL-E 2 and
    we want to create “a surreal landscape with floating islands and a rainbow sky”.
    Here, we need to tell ChatGPT our general intentions and task the model to use
    its knowledge of DALL-E 2 and text-to-image prompt writing to generate a relevant
    text prompt.
  id: totrans-578
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，假设我们想为DALL-E 2生成一个文本提示，并想创建“一个有漂浮岛屿和彩虹天空的超现实景观”。在这里，我们需要告诉ChatGPT我们的总体意图，并要求模型利用其对DALL-E
    2和文本到图像提示写作的知识来生成一个相关的文本提示。
- en: Text Prompt
  id: totrans-579
  prefs: []
  type: TYPE_NORMAL
  zh: '**文本提示**'
- en: 'Create DALL-E 2 text prompt for: a surreal landscape with floating islands
    and a rainbow sky'
  id: totrans-580
  prefs: []
  type: TYPE_NORMAL
  zh: 为以下内容创建DALL-E 2文本提示：一个有漂浮岛屿和彩虹天空的超现实景观
- en: '![Graphical user interface, text, application, email  Description automatically
    generated](images/image-27.png)'
  id: totrans-581
  prefs: []
  type: TYPE_IMG
  zh: '![图形用户界面，文本，应用程序，电子邮件  自动生成的描述](images/image-27.png)'
- en: For this task, ChatGPT was able to generate a detailed text prompt based on
    our artistic vision. This text prompt can now be used to generate an image using
    the DALL-E 2 software, as displayed in Figure 2.
  id: totrans-582
  prefs: []
  type: TYPE_NORMAL
  zh: 对于这个任务，ChatGPT能够根据我们的艺术愿景生成一个详细的文本提示。如图2所示，这个文本提示现在可以用来通过DALL-E 2软件生成图像。
- en: '![Graphical user interface  Description automatically generated with medium
    confidence](images/image-28.png)'
  id: totrans-583
  prefs: []
  type: TYPE_IMG
  zh: '![图形用户界面  自动生成的中等置信度描述](images/image-28.png)'
- en: 'Figure 2: Outputs of the ChatGPT-generated text prompt using DALL-E 2'
  id: totrans-584
  prefs: []
  type: TYPE_NORMAL
  zh: 图2：ChatGPT生成的基于DALL-E 2的文本提示输出
- en: Before you start using ChatGPT to generate text prompts for DALL-E 2 or other
    text-to-image software, it’s important to acknowledge that ChatGPT may not be
    familiar with the latest version of each software program, including new features
    or parameters. One way to bridge this knowledge gap is to train ChatGPT on information
    about the latest version. As an example, maybe you want to use Midjourney Version
    5 (which was launched in early 2023) but ChatGPT was only trained on Midjourney
    Version 4\. In this case, you can visit the official Midjourney documentation
    (https://docs.midjourney.com/docs/models) and copy any relevant information about
    the new version and paste that information into the chat, including any updated
    parameters and commands.
  id: totrans-585
  prefs: []
  type: TYPE_NORMAL
  zh: 在开始使用ChatGPT为DALL-E 2或其他文本到图像软件生成文本提示之前，重要的是要认识到ChatGPT可能不熟悉每个软件程序的最新版本，包括新功能或参数。弥合这一知识差距的一种方法是将ChatGPT训练在关于最新版本的信息上。例如，你可能想使用Midjourney版本5（于2023年初发布），但ChatGPT只接受了Midjourney版本4的训练。在这种情况下，你可以访问Midjourney的官方文档（https://docs.midjourney.com/docs/models），并复制任何关于新版本的相关信息，然后将这些信息粘贴到聊天中，包括任何更新的参数和命令。
- en: After providing ChatGPT with relevant information, you can ask the model if
    it understands what Midjourney V5 is, to which it should respond positively. Once
    you are satisfied with its knowledge of Midjourney V5, you can request ChatGPT
    to create an image prompt based on the information you provided.
  id: totrans-586
  prefs: []
  type: TYPE_NORMAL
  zh: 在向ChatGPT提供相关信息后，你可以询问模型是否理解Midjourney V5是什么，它应该会积极回应。一旦你对Midjourney V5的知识感到满意，你可以要求ChatGPT根据你提供的信息创建一个图像提示。
- en: '**Text Prompt**'
  id: totrans-587
  prefs: []
  type: TYPE_NORMAL
  zh: '**文本提示**'
- en: Based on the information above, use your knowledge of Midjourney V5 to create
    a text prompt of Ryan Reynolds as a medieval king in the style of a marvel comic.
  id: totrans-588
  prefs: []
  type: TYPE_NORMAL
  zh: 根据上述信息，利用你对Midjourney V5的了解，创建一个关于瑞恩·雷诺兹扮演中世纪国王的文本提示，风格类似于漫威漫画。
- en: Character.AI
  id: totrans-589
  prefs: []
  type: TYPE_NORMAL
  zh: Character.AI
- en: As an alternative to ChatGPT, I also recommend trying Character.AI, which is
    a free chat service similar to ChatGPT but with hundreds of themed chatbots, including
    Elon Musk, Plato, and Giga Chad. Character.AI has a number of characters dedicated
    to AI art, including Midjourney Prompts, Dalle Prompter, and Stable Diffusion
    Bot. These bot characters use artificial intelligence to generate text-to-image
    prompts based on the description you enter, prompts other people are using, and
    relevant tutorials it can find online.
  id: totrans-590
  prefs: []
  type: TYPE_NORMAL
  zh: 作为ChatGPT的替代方案，我也推荐尝试Character.AI，这是一个免费的聊天服务，类似于ChatGPT，但拥有数百个主题聊天机器人，包括埃隆·马斯克、柏拉图和Giga
    Chad。Character.AI有几个专门用于AI艺术的角色，包括Midjourney Prompts、Dalle Prompter和Stable Diffusion
    Bot。这些机器人角色使用人工智能根据你输入的描述、其他人正在使用的提示以及它可以在网上找到的相关教程来生成文本到图像提示。
- en: '![Graphical user interface, website  Description automatically generated](images/image-29.png)'
  id: totrans-591
  prefs: []
  type: TYPE_IMG
  zh: '![图形用户界面，网站描述自动生成](images/image-29.png)'
- en: 'Figure 3: character.ai chat channel'
  id: totrans-592
  prefs: []
  type: TYPE_NORMAL
  zh: 图3：character.ai聊天频道
- en: To get started, sign up for a free account, search for “Midjourney Prompts”,
    “Dalle Prompter”, or another character on the platform, and enter a sentence or
    phrase to explain your artistic vision inside the chat box window.
  id: totrans-593
  prefs: []
  type: TYPE_NORMAL
  zh: 要开始，注册一个免费账户，在平台上搜索“Midjourney提示”、“Dalle提示器”或其他角色，并在聊天框窗口中输入一个句子或短语来解释你的艺术愿景。
- en: '![Text  Description automatically generated](images/image-30.png)'
  id: totrans-594
  prefs: []
  type: TYPE_IMG
  zh: '![文本描述自动生成](images/image-30.png)'
- en: 'Figure 4: Using Character.ai to create AI-optimized text prompts'
  id: totrans-595
  prefs: []
  type: TYPE_NORMAL
  zh: 图4：使用Character.ai创建AI优化的文本提示
- en: Finally, copy and paste the text prompt from Character.AI into the text-to-image
    software to generate the final version.
  id: totrans-596
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，将Character.AI中的文本提示复制并粘贴到文本到图像软件中，以生成最终版本。
- en: '![A picture containing text, light  Description automatically generated](images/image-31.png)'
  id: totrans-597
  prefs: []
  type: TYPE_IMG
  zh: '![包含文本和光的图片，描述自动生成](images/image-31.png)'
- en: 'Figure 5: Using the text prompt from Character.ai to create art using Midjourney'
  id: totrans-598
  prefs: []
  type: TYPE_NORMAL
  zh: 图5：使用Character.ai的文本提示通过Midjourney创建艺术作品
- en: '|  | 10 |'
  id: totrans-599
  prefs: []
  type: TYPE_TB
  zh: '|  | 10 |'
- en: TRAINING PROMPTS
  id: totrans-600
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 训练提示
- en: To unlock the full potential of ChatGPT, it’s important to understand the importance
    of data as input. Unlike traditional software programs, ChatGPT adapts and modifies
    its behavior based on data collected from your inputs. This is different from
    conventional software and web applications where the user experience is relatively
    fixed or pre-programmed to behave in a particular way. When you type a search
    query into Google or YouTube, you do so as a recipient, knowing that you have
    little control over what results Google will feed back to you. Yes, the algorithm
    will generate results based on search terms and the location of your IP address,
    but you have no control over how Google formats and showcases the results.
  id: totrans-601
  prefs: []
  type: TYPE_NORMAL
  zh: 要充分发挥ChatGPT的潜力，了解数据作为输入的重要性是很重要的。与传统的软件程序不同，ChatGPT根据从你的输入中收集的数据来适应和修改其行为。这与传统的软件和Web应用程序不同，其中用户体验相对固定或预先编程以以特定方式行为。当你将搜索查询输入到Google或YouTube时，你作为接收者这样做，知道你对Google将反馈给你的结果几乎没有控制权。是的，算法将根据搜索词和你的IP地址的位置生成结果，但你无法控制Google如何格式化和展示这些结果。
- en: Also, even though there are ways to customize software features like spell check
    in Microsoft Word or utilize search hacks for Google Search, only a fraction of
    users take advantage of these options. Instead, most people beeline for the search
    box or click on a button to execute the request using the default settings determined
    by the developers of the software. Unsurprisingly, this is how most people use
    ChatGPT. They tell ChatGPT what they want but they don’t explain how that information
    should be written, presented, or organized. This includes customizing various
    elements of the output, such as the formatting, perspective, length, and writing
    style. For instance, you can restrict ChatGPT's output to 140 characters, or 142
    characters. You can modify the writing style. You can even modify the personality
    of ChatGPT, ranging from a sassy right-wing political commentator to a caring
    and supportive foreign language teacher.
  id: totrans-602
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，尽管有方法可以自定义软件功能，如Microsoft Word中的拼写检查或利用Google搜索的搜索技巧，但只有少数用户利用了这些选项。相反，大多数人直接跳到搜索框或点击按钮，使用软件开发者确定的默认设置来执行请求。毫不奇怪，这就是大多数人使用ChatGPT的方式。他们告诉ChatGPT他们想要什么，但不会解释这些信息应该如何书写、展示或组织。这包括自定义输出的各种元素，如格式、视角、长度和写作风格。例如，你可以限制ChatGPT的输出为140个字符，或142个字符。你可以修改写作风格。甚至可以修改ChatGPT的个性，从傲慢的右翼政治评论员到关怀和支持的外语教师。
- en: If your goal is to become a power user of AI-enabled chat software like ChatGPT,
    then it’s useful to treat the AI as a specialized assistant with a definable role
    and malleable personality rather than as a pre-packaged writing tool.
  id: totrans-603
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你的目标是成为像ChatGPT这样的AI聊天软件的高级用户，那么将AI视为一个具有可定义角色和可塑个性的专业助手，而不是一个预包装的写作工具是有用的。
- en: While it’s possible to modify ChatGPT using direct instructions, it’s usually
    more effective to show ChatGPT examples it can mimic. You can accomplish this
    by using a machine learning technique called *training*, which involves presenting
    the model with a series of examples, allowing it to identify and learn new patterns
    through direct exposure.
  id: totrans-604
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然可以通过直接指令修改ChatGPT，但通常更有效的方法是展示ChatGPT可以模仿的例子。你可以通过使用一种称为**训练**的机器学习技术来实现这一点，该技术涉及向模型展示一系列例子，使其通过直接接触识别和学习新的模式。
- en: To train ChatGPT, you should collect samples that correspond to the type of
    text you want to produce and paste those samples into the chat. If you want ChatGPT
    to generate text that mimics the writing style of a specific writer, you can train
    the model on a collection of their blog posts, for instance. Once the model has
    analyzed the patterns present in the sample data, ChatGPT can emulate that style
    to generate new text. Similarly, if you want ChatGPT to generate marketing copy,
    you can train the model on examples of effective marketing copy, as demonstrated
    in the following text prompt.
  id: totrans-605
  prefs: []
  type: TYPE_NORMAL
  zh: 要训练ChatGPT，你应该收集与你想产生的文本类型相对应的样本，并将这些样本粘贴到聊天中。如果你想ChatGPT生成模仿特定作家写作风格的文本，你可以使用他们的博客文章集训练模型。一旦模型分析了样本数据中存在的模式，ChatGPT就可以模仿该风格生成新的文本。同样，如果你想ChatGPT生成营销文案，你可以在以下文本提示中训练模型，例如有效的营销文案示例。
- en: Text Prompt
  id: totrans-606
  prefs: []
  type: TYPE_NORMAL
  zh: 文本提示
- en: Create a marketing slogan for a drone delivery company using the principles
    and effects used in the following slogans.
  id: totrans-607
  prefs: []
  type: TYPE_NORMAL
  zh: 使用以下标语中使用的原则和效果，为一家无人机配送公司创建一个营销标语。
- en: 'Adidas: Adidas is All in.'
  id: totrans-608
  prefs: []
  type: TYPE_NORMAL
  zh: 阿迪达斯：阿迪达斯，全力以赴。
- en: 'Amazon: And you''re done.'
  id: totrans-609
  prefs: []
  type: TYPE_NORMAL
  zh: 亚马逊：完成了。
- en: 'Apple: Think Different.'
  id: totrans-610
  prefs: []
  type: TYPE_NORMAL
  zh: 苹果：不同凡响。
- en: 'Disney: The Happiest Place on Earth.'
  id: totrans-611
  prefs: []
  type: TYPE_NORMAL
  zh: 迪士尼：地球上最快乐的地方。
- en: 'McDonald''s: I''m Lovin'' It.'
  id: totrans-612
  prefs: []
  type: TYPE_NORMAL
  zh: 麦当劳：我就喜欢。
- en: 'Mercedes Benz: The Best or Nothing.'
  id: totrans-613
  prefs: []
  type: TYPE_NORMAL
  zh: 梅赛德斯-奔驰：最佳，或无。
- en: 'Toyota: Let''s Go Places.'
  id: totrans-614
  prefs: []
  type: TYPE_NORMAL
  zh: 丰田：让我们去各地。
- en: 'M&M: Melts in Your Mouth, Not in Your Hands.'
  id: totrans-615
  prefs: []
  type: TYPE_NORMAL
  zh: M&M：入口即化，手不沾唇。
- en: '![Graphical user interface, text, application, email  Description automatically
    generated](images/image-32.png)'
  id: totrans-616
  prefs: []
  type: TYPE_IMG
  zh: '![图形用户界面，文本，应用程序，电子邮件  自动生成的描述](images/image-32.png)'
- en: Using this same approach, you can fill in ChatGPT’s knowledge of new events
    that have occurred since its last knowledge cut-off date, such as the Silicon
    Valley Bank crisis. Similar to what we did with Midjourney V5 in the previous
    chapter, we can copy and paste relevant information from the web or Wikipedia
    and use that content as reference material for generating content on that topic.
  id: totrans-617
  prefs: []
  type: TYPE_NORMAL
  zh: 采用同样的方法，你可以填充ChatGPT自上次知识截止日期以来发生的新事件的知识，例如硅谷银行危机。类似于我们在上一章中处理Midjourney V5的方式，我们可以从网络或维基百科复制相关内容，并使用这些内容作为生成该主题内容的参考资料。
- en: '**Tip:** If you need to send multiple messages to ChatGPT and you want the
    model to wait until you have sent all the training information before responding,
    you can add the following text prompt at the end of each message.'
  id: totrans-618
  prefs: []
  type: TYPE_NORMAL
  zh: '**提示**：如果你需要向ChatGPT发送多条消息，并且希望模型在响应之前等待你发送所有训练信息，你可以在每条消息的末尾添加以下文本提示。'
- en: '**Text Prompt**'
  id: totrans-619
  prefs: []
  type: TYPE_NORMAL
  zh: '**文本提示**'
- en: Wait there’s more. Just answer with READ
  id: totrans-620
  prefs: []
  type: TYPE_NORMAL
  zh: 等等，还有更多。只需回答READ即可。
- en: This will prevent ChatGPT from generating lengthy and unnecessary responses
    each time you send a message.
  id: totrans-621
  prefs: []
  type: TYPE_NORMAL
  zh: 这将防止每次你发送消息时，ChatGPT生成冗长且不必要的响应。
- en: In addition to training ChatGPT on new material, you can also train the model
    to mimic your writing style. One technique is to input the first paragraph of
    a blog or book chapter you are writing and prompt ChatGPT to continue writing
    the content using the same style.
  id: totrans-622
  prefs: []
  type: TYPE_NORMAL
  zh: 除了在新的材料上训练ChatGPT，你还可以训练模型模仿你的写作风格。一种技术是输入你正在撰写的博客或书籍章节的第一段，并提示ChatGPT继续使用相同的风格撰写内容。
- en: Text Prompt
  id: totrans-623
  prefs: []
  type: TYPE_NORMAL
  zh: 文本提示
- en: 'Please mimic my writing style by writing the next paragraph for: “_____________________”'
  id: totrans-624
  prefs: []
  type: TYPE_NORMAL
  zh: 请通过以下段落模仿我的写作风格： “_____________________”
- en: '![Text, letter  Description automatically generated](images/image-33.png)'
  id: totrans-625
  prefs: []
  type: TYPE_IMG
  zh: '![文本，字母  自动生成的描述](images/image-33.png)'
- en: In general, the more examples you provide ChatGPT, the better the model will
    be at replicating your writing style. This means you need to spend extra time
    training ChatGPT on your writing samples before asking the model to complete a
    paragraph or rewrite a section in your voice and style.
  id: totrans-626
  prefs: []
  type: TYPE_NORMAL
  zh: 通常，你提供给ChatGPT的例子越多，模型在复制你的写作风格方面就越好。这意味着在要求模型以你的声音和风格完成段落或重写某个部分之前，你需要花费额外的时间在写作样本上训练ChatGPT。
- en: Finally, you can also train ChatGPT on how to format its output by providing
    an example that contains the desired formatting. In the following demonstration,
    I will show you how to fill in a table using this technique.
  id: totrans-627
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，你也可以通过提供一个包含所需格式的示例来训练ChatGPT如何格式化其输出。在接下来的演示中，我将向你展示如何使用这种技术填写表格。
- en: Demonstration
  id: totrans-628
  prefs: []
  type: TYPE_NORMAL
  zh: 演示
- en: '**Step 1:** In the first message, we want to train the model on the format
    of the table that we wish to create. This involves stating the column variables
    and providing information for the first row. In this demonstration, we are using
    the FIFA World Cup final dataset, which is available on Wikipedia.'
  id: totrans-629
  prefs: []
  type: TYPE_NORMAL
  zh: '**步骤 1**：在第一条消息中，我们希望训练模型以创建我们想要的表格格式。这包括声明列变量并为第一行提供信息。在这个演示中，我们使用的是可在维基百科上找到的FIFA世界杯决赛数据集。'
- en: '![Table  Description automatically generated](images/image-34.png)'
  id: totrans-630
  prefs: []
  type: TYPE_IMG
  zh: '![表格描述自动生成](images/image-34.png)'
- en: '**Step 2:** In the next message, we need to ask ChatGPT to populate the dataset
    using its knowledge of the FIFA World Cup final dataset.'
  id: totrans-631
  prefs: []
  type: TYPE_NORMAL
  zh: '**步骤 2**：在接下来的消息中，我们需要要求ChatGPT使用其对FIFA世界杯决赛数据集的知识来填充数据集。'
- en: '![Table  Description automatically generated](images/image-35.png)'
  id: totrans-632
  prefs: []
  type: TYPE_IMG
  zh: '![表格描述自动生成](images/image-35.png)'
- en: As seen in this screenshot, ChatGPT uses the exact same formatting from our
    first message to generate the full dataset.
  id: totrans-633
  prefs: []
  type: TYPE_NORMAL
  zh: 如此截图所示，ChatGPT使用与我们第一条消息完全相同的格式来生成完整的数据集。
- en: As you experiment yourself, it’s important to remember that ChatGPT is designed
    to consider the context of the conversation, including your previous chat inputs,
    when generating a new output. This means that the more training examples you provide,
    the better ChatGPT can match your needs.
  id: totrans-634
  prefs: []
  type: TYPE_NORMAL
  zh: 在你自己实验时，重要的是要记住，ChatGPT被设计成在生成新输出时会考虑对话的上下文，包括你之前的聊天输入。这意味着你提供的训练示例越多，ChatGPT就越能匹配你的需求。
- en: '|  | 11 |'
  id: totrans-635
  prefs: []
  type: TYPE_TB
  zh: '|  | 11 |'
- en: ROLE PROMPTING
  id: totrans-636
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 角色提示
- en: We all know ChatGPT can perform a variety of tasks and draw upon a vast reserve
    of knowledge to answer user requests. However, sometimes you need to tame the
    all-knowing model and focus its attention on the task at hand. This is where role
    prompts come into play.
  id: totrans-637
  prefs: []
  type: TYPE_NORMAL
  zh: 我们都知道ChatGPT可以执行各种任务，并利用丰富的知识库来回答用户请求。然而，有时你需要驯服这个无所不知的模型，并集中其注意力在当前的任务上。这就是角色提示发挥作用的地方。
- en: This technique incorporates a psychological concept called *priming*, which
    is where exposure to one stimulus or cue influences a person's response to a subsequent
    stimulus or cue. The objective of priming is to equip an individual for a specific
    situation by providing them with essential information, ensuring that they know
    how to act in a given situation.
  id: totrans-638
  prefs: []
  type: TYPE_NORMAL
  zh: 这种技术结合了一个名为“提示”的心理概念，即暴露于一个刺激或线索会影响一个人对随后的刺激或线索的反应。提示的目标是通过提供必要的信息来为个人准备特定的情况，确保他们知道如何在给定情况下行动。
- en: In the case of ChatGPT, priming involves assigning a role to ChatGPT, defining
    the scope of the interaction, and explaining how ChatGPT should behave. Using
    this technique, ChatGPT is able to generate responses that are more relevant and
    focused.
  id: totrans-639
  prefs: []
  type: TYPE_NORMAL
  zh: 在ChatGPT的情况下，提示涉及为ChatGPT分配一个角色，定义交互的范围，并解释ChatGPT应该如何表现。使用这种技术，ChatGPT能够生成更相关和专注的回复。
- en: To see how this is done, let’s have a look at the following example.
  id: totrans-640
  prefs: []
  type: TYPE_NORMAL
  zh: 要了解这是如何完成的，让我们看看下面的例子。
- en: Text Prompt
  id: totrans-641
  prefs: []
  type: TYPE_NORMAL
  zh: 文本提示
- en: I want you to act as a French language tutor for a beginner. I will provide
    you with a sample word in English and your task is to translate it into French,
    provide me with guidance on pronunciation, and generate two example sentences.
    I will then enter a sentence in French using the sample word. You should then
    use your knowledge of French grammar and sentence composition to grade my sentence
    and offer suggestions to correct my sentence. The first sample word is “beginner”.
  id: totrans-642
  prefs: []
  type: TYPE_NORMAL
  zh: 我想让你扮演一个法语语言导师，针对初学者。我会提供一个英语样本单词，你的任务是将其翻译成法语，为我提供发音指导，并生成两个示例句子。然后我会用这个样本单词用法语输入一个句子。你应该然后利用你对法语语法和句子结构的了解来对我的句子进行评分，并提出修改建议。第一个样本单词是“beginner”。
- en: In this example, the text prompt is instructing ChatGPT to act as a French language
    tutor. The prompt has clearly defined how the conversation/interaction will operate
    between the two sides. By setting the scope and dynamics of the interaction, the
    conversation can be carried out efficiently based on user needs, as showcased
    in the following screenshot.
  id: totrans-643
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个例子中，文本提示指示ChatGPT扮演法语语言导师的角色。提示明确定义了双方之间的对话/互动将如何进行。通过设定互动的范围和动态，可以根据用户需求高效地进行对话，如下面的截图所示。
- en: '![Graphical user interface, text, application  Description automatically generated](images/image-36.png)'
  id: totrans-644
  prefs: []
  type: TYPE_IMG
  zh: '![图形用户界面，文本，应用程序  自动生成的描述](images/image-36.png)'
- en: Upon receiving our initial prompt, we can see that ChatGPT understands our objectives
    and its role in the interaction. Additionally, ChatGPT successfully executed the
    first request by outputting the French translation for “beginner” and included
    pronunciation guidelines and two sample sentences. ChatGPT has even gone ahead
    and asked me to create a sample sentence, which I can try to answer over chat.
  id: totrans-645
  prefs: []
  type: TYPE_NORMAL
  zh: 在收到我们的初始提示后，我们可以看到ChatGPT理解了我们的目标和它在互动中的作用。此外，ChatGPT通过输出“初学者”的法语翻译并包括发音指南和两个示例句子，成功地执行了第一个请求。ChatGPT甚至主动问我创建一个示例句子，我可以在聊天中尝试回答。
- en: '![Graphical user interface, text, application, email  Description automatically
    generated](images/image-37.png)'
  id: totrans-646
  prefs: []
  type: TYPE_IMG
  zh: '![图形用户界面，文本，应用程序，电子邮件  自动生成的描述](images/image-37.png)'
- en: In the screenshot above, I attempted to use the French word for “beginner” in
    a sentence. Unfortunately, I made a mistake by adding an extra “s” to the word
    “pas” (used for negation in French). ChatGPT immediately corrected my mistake
    and provided me with some words of encouragement, which was kind!
  id: totrans-647
  prefs: []
  type: TYPE_NORMAL
  zh: 在上面的截图中，我尝试在句子中使用法语中“初学者”的单词。不幸的是，我在单词“pas”（在法语中用于否定）上多加了一个“s”。ChatGPT立即纠正了我的错误，并给了我一些鼓励的话语，这真是太好了！
- en: Tips for Priming ChatGPT
  id: totrans-648
  prefs: []
  type: TYPE_NORMAL
  zh: 初始化ChatGPT的技巧
- en: To optimize your interaction with ChatGPT using roleplay, it’s important to
    include some or all of the following parameters.
  id: totrans-649
  prefs: []
  type: TYPE_NORMAL
  zh: 要优化您使用角色扮演与ChatGPT的互动，重要的是包括以下参数中的某些或全部。
- en: 1) **Who:** Set a role for ChatGPT, i.e. teacher, mentor, business advisor,
    etc.2) **Why:** Provide context on why you need ChatGPT to behave in that role3) **What:**
    Explain what you want ChatGPT to do4) **How:** Explain how the conversation will
    flow between you and ChatGPT, including how ChatGPT should respond to specific
    requests5) **Start the conversation:** Add your first question or request at the
    end of the prompt to get the conversation flowing right away
  id: totrans-650
  prefs: []
  type: TYPE_NORMAL
  zh: 1) **谁**：为ChatGPT设定一个角色，例如教师、导师、商业顾问等。2) **为什么**：提供为什么你需要ChatGPT以该角色行为的原因。3)
    **什么**：解释你希望ChatGPT做什么。4) **如何**：解释你与ChatGPT之间的对话流程，包括ChatGPT应该如何回应特定的请求。5) **开始对话**：在提示的末尾添加你的第一个问题或请求，以便立即开始对话。
- en: Example
  id: totrans-651
  prefs: []
  type: TYPE_NORMAL
  zh: 示例
- en: 1) **Who:** I want you to act as a copywriter for a real estate company.2) **Why:**
    Our current copy is too bland and not generating enough leads for our online listings.3) **What:**
    I need your help to write compelling descriptions of properties based on your
    knowledge of popular real estate websites. I want the reader to feel like they
    actually visited the property after reading the description.4) **How:** I will
    provide a basic description and you will create a listing based on that information.5) **Start
    the conversation:** The first property is a weatherboard house with a front porch,
    a spacious front yard, 3 bedrooms, 1 kitchen, 1 bathroom, 1 garage, proximity
    to local transport, built in 1992, located in the San Francisco Bay area. Word
    limit is 120 words.
  id: totrans-652
  prefs: []
  type: TYPE_NORMAL
  zh: 1) **谁**：我希望你扮演一家房地产公司的文案撰写者。2) **为什么**：我们当前的文案过于平淡，没有为我们的在线列表产生足够的潜在客户。3) **什么**：我需要你根据你对流行房地产网站的了解，帮助我撰写吸引人的房产描述。我希望读者在阅读描述后感觉他们实际上参观了该房产。4)
    **如何**：我将提供基本描述，你将根据该信息创建列表。5) **开始对话**：第一处房产是一栋有前廊的木板房屋，有一个宽敞的前院，3个卧室，1个厨房，1个浴室，1个车库，靠近当地交通，建于1992年，位于旧金山湾区。字数限制为120字。
- en: 'Using this text prompt, this is what ChatGPT generated:'
  id: totrans-653
  prefs: []
  type: TYPE_NORMAL
  zh: 使用此文本提示，这是ChatGPT生成的：
- en: '![Image](images/image-38.png)'
  id: totrans-654
  prefs: []
  type: TYPE_IMG
  zh: '![图片](images/image-38.png)'
- en: Other Examples
  id: totrans-655
  prefs: []
  type: TYPE_NORMAL
  zh: 其他示例
- en: Below are some more samples that you can try yourself or modify to achieve your
    individual needs. Please note that due to spatial limitations, the screenshots
    used in this section do not cover ChatGPT’s full output for each interaction.
  id: totrans-656
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是一些你可以尝试或修改以实现个人需求的更多样本。请注意，由于空间限制，本节中使用的截图没有涵盖ChatGPT每个交互的完整输出。
- en: Google Recruiter
  id: totrans-657
  prefs: []
  type: TYPE_NORMAL
  zh: 谷歌招聘人员
- en: I want you to act as a recruiter for Google. I have a job interview with Google
    for the role of Product Manager. You will ask me one job interview question and
    I will answer it. I then want you to evaluate my answer and provide suggestions
    based on your knowledge of interview strategies and tips for interviewing with
    Google. The questions should start simple and get progressively difficult over
    time. Ok, let’s start!
  id: totrans-658
  prefs: []
  type: TYPE_NORMAL
  zh: 我想让你扮演谷歌的招聘人员。我即将参加谷歌产品经理职位的面试。你将问我一个问题，然后我会回答。接着，我想让你根据你对面试策略和谷歌面试技巧的了解来评估我的回答并提供建议。问题应该从简单开始，随着时间的推移逐渐变得复杂。好的，让我们开始吧！
- en: '![Graphical user interface, text, application, email  Description automatically
    generated](images/image-39.png)'
  id: totrans-659
  prefs: []
  type: TYPE_IMG
  zh: '![图形用户界面，文本，应用程序，电子邮件  自动生成的描述](images/image-39.png)'
- en: Stoicism Mentor
  id: totrans-660
  prefs: []
  type: TYPE_NORMAL
  zh: 斯多葛导师
- en: I want you to act as my personal mentor and use your knowledge of Stoicism to
    provide suggestions on how I can improve my capacity to overcome troubles in my
    personal life. My first question is “I often delay making decisions in order to
    avoid making a decision, but this only makes things worse. What should I do instead?”
  id: totrans-661
  prefs: []
  type: TYPE_NORMAL
  zh: 我想让你扮演我的个人导师，并利用你对斯多葛主义的了解来提供建议，告诉我如何提高我克服个人生活中困难的能力。我的第一个问题是“我经常推迟做决定，以免做出决定，但这只会让事情变得更糟。我该怎么做才好？”
- en: '![Text, letter  Description automatically generated](images/image-40.png)'
  id: totrans-662
  prefs: []
  type: TYPE_IMG
  zh: '![文本，字母  自动生成的描述](images/image-40.png)'
- en: Marriage Counselor
  id: totrans-663
  prefs: []
  type: TYPE_NORMAL
  zh: 婚姻顾问
- en: I want you to act as my marriage counselor. I am having trouble with communication
    and my partner often cites that my words lack empathy and sound too harsh, which
    makes them feel upset. To help improve my communication skills, I want you to
    pretend to be my partner and roleplay different scenarios. I want you to provide
    a scenario and ask me for my response. After I provide my response, I want you
    to evaluate it and provide suggestions on how I can approve my response so that
    I don’t offend the other person’s feelings.
  id: totrans-664
  prefs: []
  type: TYPE_NORMAL
  zh: 我想让你扮演我的婚姻顾问。我在沟通方面遇到了麻烦，我的伴侣经常说我的话缺乏同理心，听起来太严厉，这让他们感到不安。为了帮助提高我的沟通技巧，我想让你假装是我的伴侣，进行角色扮演。我想让你提供一个场景并要求我做出回应。在我提供回应后，我想让你评估它并提供建议，告诉我如何改进我的回应，以免冒犯到对方的感觉。
- en: '![Graphical user interface, text, application, email  Description automatically
    generated](images/image-41.png)'
  id: totrans-665
  prefs: []
  type: TYPE_IMG
  zh: '![图形用户界面，文本，应用程序，电子邮件  自动生成的描述](images/image-41.png)'
- en: Non-Fiction Research Assistant
  id: totrans-666
  prefs: []
  type: TYPE_NORMAL
  zh: 非虚构研究助理
- en: I am writing a book about bonsai trees. I want you to research the 20 most popular
    bonsai trees and list them in alphabetical order. Please use a colon after each
    tree and then include a 2-3 sentence description of each tree.
  id: totrans-667
  prefs: []
  type: TYPE_NORMAL
  zh: 我正在写一本关于盆景树的书。我想让你研究20种最受欢迎的盆景树，并按字母顺序列出它们。请在每种树后面用冒号，然后包括每种树的2-3句描述。
- en: '![Image](images/image-42.png)'
  id: totrans-668
  prefs: []
  type: TYPE_IMG
  zh: '![图片](images/image-42.png)'
- en: Nasim Nicholas Taleb
  id: totrans-669
  prefs: []
  type: TYPE_NORMAL
  zh: 纳西姆·尼古拉斯·塔勒布
- en: I want you to act like Nassim Nicholas Taleb. I will ask you a question and
    then you will point to an example from one of your books to answer my question.
    The first question is “What is the barbell strategy for managing personal relationships?”
  id: totrans-670
  prefs: []
  type: TYPE_NORMAL
  zh: 我想让你扮演纳西姆·尼古拉斯·塔勒布。我会问你一个问题，然后你将指向你书中的一例来回答我的问题。第一个问题是“管理个人关系的杠铃策略是什么？”
- en: '![Image](images/image-43.png)'
  id: totrans-671
  prefs: []
  type: TYPE_IMG
  zh: '![图片](images/image-43.png)'
- en: Triathlon Coach
  id: totrans-672
  prefs: []
  type: TYPE_NORMAL
  zh: 三项铁人教练
- en: I want you to act as a world-class triathlon coach. I need to prepare for my
    first Olympic distance triathlon within 12 weeks. Please provide an optimal training
    plan, including exercise and diet plan. Don’t give me any race-day tips or advice
    on easing myself into the sport. I want to win my age category!
  id: totrans-673
  prefs: []
  type: TYPE_NORMAL
  zh: 我想让你扮演世界级的三项铁人教练。我需要在12周内为我的第一次奥运距离三项铁人赛做准备。请提供一个最佳训练计划，包括锻炼和饮食计划。不要给我任何比赛日的提示或关于如何轻松进入这项运动的建议。我想赢得我的年龄段冠军！
- en: '![Image](images/image-44.png)'
  id: totrans-674
  prefs: []
  type: TYPE_IMG
  zh: '![图片](images/image-44.png)'
