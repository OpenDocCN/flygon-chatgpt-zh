  prefs: []
  type: TYPE_NORMAL
- en: Tropes are shortcuts into the story that readers use to find the cozy mystery
    stories they love.
  prefs: []
  type: TYPE_NORMAL
- en: The system did what we asked it to do – hence the need to think about the prompt
