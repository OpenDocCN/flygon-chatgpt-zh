  type: TYPE_NORMAL
- en: Best, [Your Name]”
  prefs: []
  type: TYPE_NORMAL
- en: Sample Seller Lead Email
  prefs: []
  type: TYPE_NORMAL
- en: “Hi [Client Name],
  prefs: []
