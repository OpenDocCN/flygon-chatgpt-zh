- en: Source Collaboration
  id: totrans-1008
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 源协作
- en: Science and Technology would have not reached its advance stage without open
    source collaboration. Open source is where ideas flourish and innovation thrives.
    In fact, AI has multiplied its presence due to open-source collaboration in the
    tech community around the world. In this chapter, I guide you through prompts
    for contributing to open-source projects, collaborating effectively, and building
    your reputation in the coding community.
  id: totrans-1009
  prefs: []
  type: TYPE_NORMAL
  zh: 没有开源合作，科学技术就不会达到其先进阶段。开源是思想繁荣和创新兴盛的地方。事实上，由于全球技术社区的开源合作，人工智能的存在得到了倍增。在本章中，我将指导你了解如何为开源项目做出贡献、有效协作以及在编码社区中建立你的声誉。
- en: '1: Understanding Open Source Basics'
  id: totrans-1010
  prefs: []
  type: TYPE_NORMAL
  zh: '1: 理解开源基础'
- en: 'Prompt:'
  id: totrans-1011
  prefs: []
  type: TYPE_NORMAL
