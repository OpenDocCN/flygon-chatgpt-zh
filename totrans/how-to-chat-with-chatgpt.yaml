  prefs: []
  type: TYPE_NORMAL
  zh: 10 个与 ChatGPT 更好交流的技巧
- en: '![](image_rsrc2XW.jpg)'
  id: totrans-433
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc2XW.jpg)'
- en: 'DALL-E prompt: Create a lively image of a woman social media manager in a futuristic
    pod office with neon accents'
  id: totrans-434
  prefs: []
  type: TYPE_NORMAL
  zh: DALL-E 提示：创建一个未来派办公室中社交媒体经理的生动图像，带有霓虹灯装饰
- en: 1\. Share Examples
  id: totrans-435
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 分享示例
- en: 'Prompt: “May I share some sample text for you to use as reference for style
    and tone?”'
  id: totrans-436
  prefs: []
  type: TYPE_NORMAL
  zh: 提示： “我可以分享一些示例文本供您参考风格和语气吗？”
- en: Give ChatGPT examples of what you want or need. This can help guide it to match
    the specific style, format, and tone you’re aiming for.
  id: totrans-437
  prefs: []
  type: TYPE_NORMAL
  zh: 给ChatGPT提供您想要或需要的示例。这可以帮助它匹配您所追求的具体风格、格式和语气。
- en: 2\. Always Specify Style and Tone for Content Requests
  id: totrans-438
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 总是明确内容请求的风格和语气
- en: 'Prompt: “Can you help me write a more engaging introduction? Use a persuasive
    writing style and write in a friendly yet professional tone.”'
  id: totrans-439
  prefs: []
  type: TYPE_NORMAL
  zh: 提示： “你能帮我写一个更有吸引力的引言吗？使用说服性的写作风格，并以友好而专业的语气来写。”
- en: If a sample of writing is not available to use as reference, always start content
    requests by letting ChatGPT know what style (narrative, descriptive, expository,
    persuasive) and tone (casual, formal, friendly, humorous) you need.
  id: totrans-440
  prefs: []
  type: TYPE_NORMAL
  zh: 如果没有可用的写作样本作为参考，请始终通过让ChatGPT知道您需要的风格（叙述、描述、说明、说服）和语气（随意、正式、友好、幽默）来开始内容请求。
- en: 3\. Use Dictation for Prompts
  id: totrans-441
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 使用口述提示
- en: 'Prompt: “Please condense my original prompt to make it clearer for you.”'
  id: totrans-442
  prefs: []
  type: TYPE_NORMAL
  zh: 提示： “请将我的原始提示压缩一下，以便你更清晰地理解。”
- en: Use your phone’s voice-to-text feature for dictating prompts to ChatGPT can
    streamline the process. If the output is lengthy or unclear, ask ChatGPT to revise
    it for enhanced clarity.
  id: totrans-443
  prefs: []
  type: TYPE_NORMAL
  zh: 使用手机的语音到文本功能为ChatGPT口述提示可以简化流程。如果输出内容过长或不清晰，请要求ChatGPT进行修订以增强清晰度。
- en: 4\. Explore Different Perspectives
  id: totrans-444
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 探索不同的视角
- en: 'Prompt: “Describe the future of renewable energy from both an optimist’s and
    a pessimist’s perspective.”'
  id: totrans-445
  prefs: []
  type: TYPE_NORMAL
  zh: 提示： “从乐观者和悲观者的角度描述可再生能源的未来。”
- en: Asking ChatGPT to provide answers from various viewpoints can enrich the content
    and make it sound more natural.
  id: totrans-446
  prefs: []
  type: TYPE_NORMAL
  zh: 要求ChatGPT从不同的观点提供答案可以丰富内容，并使其听起来更加自然。
- en: 5\. Request Responses or Explanations as Common Sayings
  id: totrans-447
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 请求以常见谚语形式提供回答或解释
- en: 'Prompt: “Can you explain quantum computing using common sayings or phrases?”'
  id: totrans-448
  prefs: []
  type: TYPE_NORMAL
  zh: 提示： “你能用常见的谚语或短语来解释量子计算吗？”
- en: Ask ChatGPT to explain things using popular sayings or everyday language that
    your audience understands. This makes the content feel more familiar.
  id: totrans-449
  prefs: []
  type: TYPE_NORMAL
  zh: 让ChatGPT使用流行语或日常语言来解释事物，这些语言是您的受众能够理解的。这使得内容感觉更加熟悉。
- en: 6\. Adjust the Complexity
  id: totrans-450
  prefs: []
  type: TYPE_NORMAL
  zh: 6. 调整复杂性
- en: 'Prompt: “Explain blockchain technology in simple terms suitable for beginners.”'
  id: totrans-451
  prefs: []
  type: TYPE_NORMAL
  zh: 提示： “用适合初学者的简单术语解释区块链技术。”
- en: Ask to have things explained in a way you’ll understand. Asking for simpler
    terms or a more sophisticated vocabulary can change how ChatGPT gives you the
    information.
  id: totrans-452
  prefs: []
  type: TYPE_NORMAL
  zh: 要求以您能理解的方式进行解释。要求使用更简单的术语或更复杂的词汇可以改变ChatGPT提供信息的方式。
- en: 7\. Create a Narrative
  id: totrans-453
  prefs: []
  type: TYPE_NORMAL
  zh: 7. 创建叙述
- en: 'Prompt: “Tell me a story that illustrates how machine learning is used in healthcare.”'
  id: totrans-454
  prefs: []
  type: TYPE_NORMAL
  zh: 提示： “告诉我一个故事，说明机器学习在医疗保健中的应用。”
- en: Ask ChatGPT to frame information within a story or anecdote to make explanations
    more engaging and memorable.
  id: totrans-455
  prefs: []
  type: TYPE_NORMAL
  zh: 让ChatGPT在故事或轶事中构建信息，以使解释更加吸引人和难忘。
- en: 8\. Simplify Responses
  id: totrans-456
  prefs: []
  type: TYPE_NORMAL
  zh: 8. 简化回答
- en: 'Prompt: “Describe the significance of AI compared to the invention of electricity
    in a way that a five-year-old could understand.”'
  id: totrans-457
  prefs: []
  type: TYPE_NORMAL
  zh: 提示： “用五岁孩子能理解的方式描述人工智能与电的发明相比的重要性。”
- en: To make information accessible for all ages or levels of expertise, request
    simplified explanations.
  id: totrans-458
  prefs: []
  type: TYPE_NORMAL
  zh: 为了使信息对所有年龄或专业水平的人都能理解，请请求简化解释。
- en: 9\. Mix Up Sentence Lengths
  id: totrans-459
  prefs: []
  type: TYPE_NORMAL
  zh: 9. 混合句子长度
- en: 'Prompt: “Write a paragraph about space exploration, alternating between short
    and long sentences.”'
  id: totrans-460
  prefs: []
  type: TYPE_NORMAL
  zh: 提示： “关于太空探索写一段话，交替使用短句和长句。”
- en: A great tip when using ChatGPT for content writing, instruct it to vary sentence
    lengths within your content. Shorter sentences can add impact, while longer ones
    provide detail.
  id: totrans-461
  prefs: []
  type: TYPE_NORMAL
  zh: 当使用ChatGPT进行内容写作时，一个很好的提示是指导它在内容中变化句子长度。较短的句子可以增加影响力，而较长的句子则提供细节。
- en: 10\. Incorporate Questions and Answers
  id: totrans-462
  prefs: []
  type: TYPE_NORMAL
  zh: 10. 结合问题和答案
- en: 'Prompt: “Present the benefits of renewable energy in a Q&A format, with three
    common questions followed by concise answers.”'
  id: totrans-463
  prefs: []
  type: TYPE_NORMAL
  zh: 提示： “以问答格式呈现可再生能源的好处，包括三个常见问题及其简洁的回答。”
- en: Enhance engagement by framing some information as a Q&A. This format can make
    complex topics more accessible.
  id: totrans-464
  prefs: []
  type: TYPE_NORMAL
  zh: 通过将一些信息框定为问答来增强参与度。这种格式可以使复杂主题更容易理解。
- en: Chapter 2
  id: totrans-465
  prefs: []
  type: TYPE_NORMAL
  zh: 第二章
- en: How to Speak AI
  id: totrans-466
  prefs: []
  type: TYPE_NORMAL
  zh: 如何与AI交流
- en: “Those who know how to prompt the AI to do their bidding and to do it faster
    and better and more creatively than anyone else is going to be golden.
  id: totrans-467
  prefs: []
  type: TYPE_NORMAL
  zh: “那些知道如何指导AI完成他们的任务，并且比任何人都更快、更好、更有创意的人将会是金子般的人。”
- en: —Nikhil Dey, Executive Director, Adfactors PR & Founder
  id: totrans-468
  prefs: []
  type: TYPE_NORMAL
  zh: ——尼希尔·戴伊，Adfactors PR执行董事及创始人
- en: It’s time to learn how to chat with Chat like a pro. Using ChatGPT is all about
    communication. To get the most accurate and helpful responses, it’s essential
    that ChatGPT clearly understands what you need and want. While ChatGPT can answer
    any question you ask, giving it detailed instructions will get you more personalized
    and specific responses.
  id: totrans-469
  prefs: []
  type: TYPE_NORMAL
  zh: 是时候学习如何像专业人士一样与ChatGPT聊天了。使用ChatGPT完全是关于沟通。为了获得最准确和有帮助的回答，确保ChatGPT清楚地了解你的需求和期望至关重要。虽然ChatGPT可以回答你提出的任何问题，但给出详细的指示将使你获得更个性化和具体的回答。
- en: Think of interacting with ChatGPT like directing an executive assistant who
    can handle any task you throw at it. Unlike a basic assistant who might need step-by-step
    instructions, ChatGPT is like a seasoned executive assistant who understands the
    context and knows how to deliver optimal responses. The clearer and more precise
    you are, the better the AI can help you. You don’t need to learn any new technical
    skills—just how to communicate your needs naturally.
  id: totrans-470
  prefs: []
  type: TYPE_NORMAL
  zh: 将与ChatGPT的互动想象成指导一位能够处理你抛出的任何任务的行政助理。与可能需要逐步指令的基本助理不同，ChatGPT就像一位经验丰富的行政助理，理解上下文并知道如何提供最佳回答。你越清晰、越精确，AI就能更好地帮助你。你不需要学习任何新的技术技能——只需学会自然地表达你的需求。
- en: What is Prompt Engineering?
  id: totrans-471
  prefs: []
  type: TYPE_NORMAL
  zh: 提示工程是什么？
- en: Prompt engineering is the art of framing your questions so ChatGPT understands
    and responds effectively. Mastering this skill ensures you get precise answers
    quickly. But don’t worry – for everyday tasks and simple questions, ChatGPT is
    pretty forgiving. It can handle misspellings, poor grammar, and even long-winded
    prompts. The goal is to help you communicate clearly and effectively.
  id: totrans-472
  prefs: []
  type: TYPE_NORMAL
  zh: 提示工程是构建你的问题，以便ChatGPT能够理解和有效回应的艺术。掌握这项技能可以确保你快速获得精确的答案。但不用担心——对于日常任务和简单问题，ChatGPT相当宽容。它可以处理拼写错误、语法错误，甚至冗长的提示。目标是帮助你清晰有效地沟通。
- en: We Are All Prompt Engineers
  id: totrans-473
  prefs: []
  type: TYPE_NORMAL
  zh: 我们都是提示工程师
- en: Think about how you talk to a young child. Asking, “What do you want to eat
    for lunch?” might lead to indecision. But saying, “Do you want to eat chicken
    tenders or spaghetti?” results in a quicker choice. This approach works for adults
    too, especially in professional settings.
  id: totrans-474
  prefs: []
  type: TYPE_NORMAL
  zh: 想想你是如何与一个小孩交谈的。问“你午饭想吃点什么？”可能会导致犹豫不决。但如果说“你想要吃鸡柳还是意大利面？”就能更快地做出选择。这种方法对成年人也适用，尤其是在专业环境中。
- en: Consider asking your manager for a favor. Instead of saying, ‘Can I leave early
    next Friday?’ try, ‘Remember how I stayed late last week to finish those sales
    reports? I’m hoping to leave early this Friday to visit my parents who live four
    hours away and beat rush hour traffic.’ This approach provides context and facts
    before making your request, making it more likely to be granted.
  id: totrans-475
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑向你的经理提出请求。与其说，“我下周五可以早点下班吗？”不如尝试说，“你还记得上周我为了完成那些销售报告而加班吗？我希望这周五能早点下班去拜访住在四个小时以外的父母，以避开高峰期交通。”这种做法在提出请求之前提供了背景和事实，使得请求更有可能被批准。
- en: Good communication is crucial, whether you’re dealing with ChatGPT or real people.
    When ChatGPT understands you, it can help you achieve your goals more efficiently.
    Just like in any relationship, knowing how to communicate effectively with ChatGPT
    gives you an edge.
  id: totrans-476
  prefs: []
  type: TYPE_NORMAL
  zh: 良好的沟通至关重要，无论你是在与ChatGPT交流还是与真人沟通。当ChatGPT理解了你，它可以帮助你更高效地实现目标。就像在任何关系中一样，知道如何有效地与ChatGPT沟通会给你带来优势。
- en: In today’s AI-powered world, guiding ChatGPT to understand your needs is like
    having a superpower. Whether you need a question answered, help with a task, or
    some creative inspiration, ChatGPT will understand your intent and provide helpful
    responses. It’s designed to respond in a conversational, human-like manner.
  id: totrans-477
  prefs: []
  type: TYPE_NORMAL
  zh: 在今天的AI驱动世界中，引导ChatGPT理解你的需求就像拥有超能力。无论你需要回答问题、完成任务，还是需要一些创造性的灵感，ChatGPT都会理解你的意图并提供有帮助的回答。它被设计成以对话、类似人类的方式回应。
- en: Understanding different communication styles is also key. Some people are moved
    by data, while others prefer stories or big ideas. For example, if I want the
    CEO to approve a project, I’d align it with her priorities. Instead of saying,
    “I want to build X; it will increase sales,” I’d say, “I want to build X; it will
    boost sales, especially among first-time parents, which you’ve identified as a
    key market for us next year.”
  id: totrans-478
  prefs: []
  type: TYPE_NORMAL
  zh: 理解不同的沟通风格也很关键。有些人受数据驱动，而有些人更喜欢故事或大想法。例如，如果我想让CEO批准一个项目，我会将其与她的优先事项对齐。与其说“我想建造X；这将增加销售额”，不如说“我想建造X；这将提高销售额，特别是对于首次成为父母的人，这是你明年确定为我们关键市场的人群。”
- en: Prompt engineering unlocks ChatGPT’s full potential, helping you get the most
    out of its capabilities. It’s not about coding or technical skills; it’s about
    clear communication.
  id: totrans-479
  prefs: []
  type: TYPE_NORMAL
  zh: 提示工程解锁了ChatGPT的全部潜力，帮助你充分利用其功能。这不仅仅是关于编码或技术技能；这是关于清晰的沟通。
- en: Simple Requests and Everyday Use
  id: totrans-480
  prefs: []
  type: TYPE_NORMAL
  zh: 简单请求和日常使用
- en: For most basic questions and tasks, you don’t need to worry too much about crafting
    the perfect prompt. ChatGPT is designed to understand and respond to natural language.
    Even if your prompt isn’t perfect, ChatGPT can usually figure out what you mean
    and provide a helpful answer. This makes it easy to start using ChatGPT right
    away without feeling intimidated.
  id: totrans-481
  prefs: []
  type: TYPE_NORMAL
  zh: 对于大多数基本问题和任务，你不必过于担心精心制作完美的提示。ChatGPT被设计成能够理解和回应自然语言。即使你的提示并不完美，ChatGPT通常也能理解你的意图并提供有用的答案。这使得你可以轻松地立即开始使用ChatGPT，而无需感到害怕。
- en: The C.L.E.A.R. Way to Talk to AI
  id: totrans-482
  prefs: []
  type: TYPE_NORMAL
  zh: C.L.E.A.R.方式与AI交流
- en: 'How you ask is just as important as what you ask. The secret to successful
    and productive chats with ChatGPT can be remembered with this easy-to-use mnemonic:
    C.L.E.A.R.'
  id: totrans-483
  prefs: []
  type: TYPE_NORMAL
  zh: 你提问的方式和你提出的问题一样重要。与ChatGPT成功和高效聊天的秘诀可以用这个易于使用的助记符记住：C.L.E.A.R.
- en: 'Concise: Keep your prompts brief and to the point. Avoid overloading ChatGPT
    with unnecessary details. Focus on important info and details.'
  id: totrans-484
  prefs: []
  type: TYPE_NORMAL
  zh: 简洁：确保你的提示简洁明了，避免向ChatGPT提供不必要的细节。专注于重要信息和细节。
- en: 'Language: Use simple, direct language that minimizes confusion. Avoid jargon,
    slang, or overly complex terminology unless necessary for the task at hand.'
  id: totrans-485
  prefs: []
  type: TYPE_NORMAL
  zh: 语言：使用简单、直接的语言，以最大限度地减少混淆。除非任务本身需要，否则避免使用行话、俚语或过于复杂的术语。
- en: 'Explicit: Be specific about what you want the AI to do. Define the task, desired
    output format, and any constraints clearly. Leave no room for misinterpretation.'
  id: totrans-486
  prefs: []
  type: TYPE_NORMAL
  zh: 明确：具体说明你希望AI执行的任务。明确定义任务、期望的输出格式和任何限制条件，避免误解。
- en: 'Accurate: Ensure your prompt includes precise, factual information. If referencing
    external data, quotes, or statistics, check sources before sharing.'
  id: totrans-487
  prefs: []
  type: TYPE_NORMAL
  zh: 准确：确保你的提示包含精确、事实性的信息。如果引用外部数据、引语或统计数据，请在分享之前检查来源。
- en: 'Relevant: Keep your prompts focused on the specific topic or problem at hand.
    Avoid irrelevant tangents that could confuse the AI or lead it off-track.'
  id: totrans-488
  prefs: []
  type: TYPE_NORMAL
  zh: 相关：确保你的提示专注于特定的话题或问题。避免可能导致AI混淆或偏离轨道的不相关旁白。
- en: Using the CLEAR framework can make your prompts work like magic, guiding ChatGPT
    to deliver exactly what you need with minimal back-and-forth. In the next sections,
    we’ll explore how to put these principles into practice.
  id: totrans-489
  prefs: []
  type: TYPE_NORMAL
  zh: 使用CLEAR框架可以使你的提示像魔法一样起作用，引导ChatGPT以最少的来回互动提供你所需的内容。在接下来的章节中，我们将探讨如何将这些原则付诸实践。
- en: The Power of Context
  id: totrans-490
  prefs: []
  type: TYPE_NORMAL
  zh: 上下文的力量
- en: Context is king in prompt engineering. The more relevant background information
    you can provide, the better ChatGPT can understand your intent and deliver a useful,
    specific response.
  id: totrans-491
  prefs: []
  type: TYPE_NORMAL
  zh: 上下文在提示工程中至关重要。你能提供的背景信息越相关，ChatGPT就越能理解你的意图，并提供有用、具体的回应。
- en: Imagine asking a friend, “What should I do?” versus “I missed my flight to the
    conference where I’m the keynote speaker, what should I do?” The latter provides
    crucial context that leads to much more relevant advice.
  id: totrans-492
  prefs: []
  type: TYPE_NORMAL
  zh: 想象一下，你向朋友询问“我应该做什么？”与“我错过了去参加我作为主讲人的会议的航班，我应该怎么办？”后者提供了关键上下文，这会导致更相关的建议。
- en: 'With ChatGPT, context can include:'
  id: totrans-493
  prefs: []
  type: TYPE_NORMAL
  zh: 在ChatGPT中，上下文可以包括：
- en: Background on your role, industry, or project
  id: totrans-494
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 关于你的角色、行业或项目的背景
- en: Specific goals you’re trying to achieve
  id: totrans-495
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你试图实现的具体目标
- en: Constraints or requirements to consider
  id: totrans-496
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 需要考虑的约束或要求
- en: Examples of desired output format or style
  id: totrans-497
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 期望的输出格式或风格的示例
- en: Relevant data, quotes, or links to analyze
  id: totrans-498
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 需要分析的相关数据、引语或链接
- en: See how the added context helps frame the task more clearly? ChatGPT can now
    generate ideas tailored to your specific niche, audience, and goals much more
    accurately.
  id: totrans-499
  prefs: []
  type: TYPE_NORMAL
  zh: 看看增加的上下文如何更清晰地界定任务？现在ChatGPT可以更准确地生成针对你特定领域、受众和目标的定制想法。
- en: 'Build your prompts in this order to help ChatGPT understand what you need:'
  id: totrans-500
  prefs: []
  type: TYPE_NORMAL
  zh: 按以下顺序构建你的提示，以帮助ChatGPT理解你的需求：
- en: '1\. Start with your goal:'
  id: totrans-501
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 从你的目标开始：
- en: What do you want to achieve?
  id: totrans-502
  prefs: []
  type: TYPE_NORMAL
  zh: 你想实现什么？
- en: 'Example: I need a list of tasks to organize my home office.'
  id: totrans-503
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：我需要一个任务列表来组织我的家庭办公室。
- en: '2\. Provide context:'
  id: totrans-504
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 提供上下文：
- en: Why do you need this information?
  id: totrans-505
  prefs: []
  type: TYPE_NORMAL
  zh: 你为什么需要这些信息？
- en: 'Example: I work from home and need a more organized space to increase my productivity.'
  id: totrans-506
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：我在家工作，需要一个更有组织的空间来提高我的生产力。
- en: '3\. Add specific details:'
  id: totrans-507
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 添加具体细节：
- en: Include any important details that can help.
  id: totrans-508
  prefs: []
  type: TYPE_NORMAL
  zh: 包含任何有助于理解的重要细节。
- en: 'Example: My office space is small, and I need to minimize distractions.'
  id: totrans-509
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：我的办公空间很小，我需要最小化干扰。
- en: '4\. Define the format:'
  id: totrans-510
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 定义格式：
- en: Specify how you want the information presented.
  id: totrans-511
  prefs: []
  type: TYPE_NORMAL
  zh: 明确你希望信息如何呈现。
- en: 'Example: Please list the tasks in bullet points.'
  id: totrans-512
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：请用项目符号列出任务。
- en: When you keep your prompts CLEAR, you can unlock the magic of AI with ChatGPT.
    You can ask for whatever you want or need, and with the right prompts, ChatGPT
    will help you get there.
  id: totrans-513
  prefs: []
  type: TYPE_NORMAL
  zh: 当你保持你的提示清晰时，你可以利用 ChatGPT 的魔法，获取你想要或需要的任何信息，并且通过正确的提示，ChatGPT 将帮助你实现目标。
- en: 'Reasons for this Order:'
  id: totrans-514
  prefs: []
  type: TYPE_NORMAL
  zh: 这种顺序的原因：
- en: 'Clarity: Starting with the goal makes your request clear from the beginning.'
  id: totrans-515
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 清晰性：从目标开始，使你的请求从一开始就清晰。
- en: 'Relevance: Providing context helps ChatGPT understand why you need this information,
    making its response more targeted.'
  id: totrans-516
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 相关性：提供上下文有助于 ChatGPT 理解你需要这些信息的原因，使其响应更加有针对性。
- en: 'Precision: Adding specific details ensures ChatGPT includes all necessary information
    in its response.'
  id: totrans-517
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 精确性：添加具体细节确保 ChatGPT 在其响应中包含所有必要的信息。
- en: 'Usability: Defining the format helps you receive the information in a way that’s
    easy to use immediately.'
  id: totrans-518
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 可用性：定义格式有助于你以易于使用的方式立即接收信息。
- en: Common Mistakes in Prompt Engineering
  id: totrans-519
  prefs: []
  type: TYPE_NORMAL
  zh: 提示工程中的常见错误
- en: '![](image_rsrc2XX.jpg)'
  id: totrans-520
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrc2XX.jpg)'
- en: 'DALL-E prompt: Create an image of a cozy, modern living room with a woman in
    her early 30s, engaging in a friendly conversation with a small, cute humanoid
    robot with expressive LED eyes, --ar 16:9'
  id: totrans-521
  prefs: []
  type: TYPE_NORMAL
  zh: DALL-E 提示：创建一张温馨的现代客厅图像，其中一位30岁左右的女性正与一个小巧可爱的类人机器人进行友好的对话，该机器人拥有表情丰富的 LED 眼睛，--ar
    16:9
- en: 'When you’re first starting with ChatGPT, it’s natural to experience a learning
    curve. Being aware of common challenges people new to AI face is key to creating
    prompts that get you the results you need. Here are some typical mistakes to watch
    out for:'
  id: totrans-522
  prefs: []
  type: TYPE_NORMAL
  zh: 当你刚开始使用 ChatGPT 时，经历一个学习曲线是很自然的。了解新接触 AI 的人面临的常见挑战是创建能够得到你所需结果的提示的关键。以下是一些典型的错误，需要注意：
- en: Being Too Vague or Overly Broad
  id: totrans-523
  prefs: []
  type: TYPE_NORMAL
  zh: 过于模糊或过于宽泛
- en: Prompts that are too vague or broad can lead to responses that are too general
    and not very useful. Specificity is key to getting valuable answers.
  id: totrans-524
  prefs: []
  type: TYPE_NORMAL
  zh: 过于模糊或过于宽泛的提示可能导致过于一般且不太有用的响应。具体性是获得有价值答案的关键。
- en: 'Why it’s important: Specific prompts help ChatGPT understand exactly what you
    need, leading to more precise and helpful responses. Vague questions often result
    in vague answers.'
  id: totrans-525
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么这很重要：具体的提示有助于 ChatGPT 理解你确切需要什么，从而得到更精确和有帮助的响应。模糊的问题通常会导致模糊的答案。
- en: 'Helpful tip: Narrow down your questions to focus on specific areas. Instead
    of asking broad questions, break them down into more detailed ones.'
  id: totrans-526
  prefs: []
  type: TYPE_NORMAL
  zh: 有用提示：缩小你的问题，专注于特定领域。不要问宽泛的问题，而是将它们分解成更详细的问题。
- en: Not Knowing Your Desired Outcome
  id: totrans-527
  prefs: []
  type: TYPE_NORMAL
  zh: 不了解你想要的成果
- en: One of the biggest mistakes is not having a clear goal in mind. If you don’t
    know what you want to achieve, ChatGPT won’t either. This can lead to vague or
    unhelpful responses.
  id: totrans-528
  prefs: []
  type: TYPE_NORMAL
  zh: 最大的错误之一是没有一个明确的目标。如果你不知道你想要实现什么，ChatGPT 也不会知道。这可能导致模糊或不有帮助的响应。
- en: 'Why it’s important: Having a specific goal helps you formulate better prompts
    and get more relevant answers. Think about the exact information or solution you
    need before asking ChatGPT.'
  id: totrans-529
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么这很重要：有一个具体的目标有助于你制定更好的提示并获得更相关的答案。在询问 ChatGPT 之前，考虑一下你确切需要的信息或解决方案。
- en: 'Helpful tip: Before you type your prompt, ask yourself what specific outcome
    you want. Clear goals lead to clear responses.'
  id: totrans-530
  prefs: []
  type: TYPE_NORMAL
  zh: 有用提示：在你输入提示之前，问问自己你想要的具体结果是什么。明确的目标会导致明确的响应。
- en: Overloading the Details
  id: totrans-531
  prefs: []
  type: TYPE_NORMAL
  zh: 过载细节
- en: While it’s good to be specific, adding too much detail can confuse ChatGPT.
    If your prompt is overloaded with information, it might not know what to focus
    on.
  id: totrans-532
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然具体化是好的，但添加过多的细节可能会让 ChatGPT 产生混淆。如果你的提示信息过载，它可能不知道应该关注什么。
- en: 'Why it’s important: A balanced prompt ensures that ChatGPT understands the
    main points without getting lost in unnecessary details. Too much information
    can dilute the response quality.'
  id: totrans-533
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么这很重要：平衡的提示确保 ChatGPT 理解主要观点，而不会在不必要的细节中迷失。过多的信息可能会稀释响应质量。
- en: 'Helpful tip: Stick to the key points and avoid overloading your prompt with
    too many details. Focus on what’s most important.'
  id: totrans-534
  prefs: []
  type: TYPE_NORMAL
  zh: 有用提示：坚持要点，避免在提示中添加过多细节。关注最重要的部分。
- en: Overlooking Context
  id: totrans-535
  prefs: []
  type: TYPE_NORMAL
  zh: 忽略上下文
- en: Context is crucial for ChatGPT to fully understand your request. Without context,
    ChatGPT might give you a response that’s too general or off the mark.
  id: totrans-536
  prefs: []
  type: TYPE_NORMAL
  zh: 上下文对于 ChatGPT 完全理解您的请求至关重要。没有上下文，ChatGPT 可能会给出过于笼统或偏离目标的响应。
- en: 'Why it’s important: Providing context helps ChatGPT tailor its responses to
    your specific situation, making the information more relevant and useful.'
  id: totrans-537
  prefs: []
  type: TYPE_NORMAL
  zh: 重要性：提供上下文有助于 ChatGPT 根据您的具体情况定制其响应，使信息更具相关性和实用性。
- en: 'Helpful tip: Always include background information that can help ChatGPT understand
    your request better. The more context you provide, the better the response.'
  id: totrans-538
  prefs: []
  type: TYPE_NORMAL
  zh: 有用的小贴士：始终包含有助于 ChatGPT 更好理解您请求的背景信息。您提供的信息越多，响应就越好。
- en: Not Defining the
  id: totrans-539
  prefs: []
  type: TYPE_NORMAL
  zh: 未定义的
- en: Desired Output
  id: totrans-540
  prefs: []
  type: TYPE_NORMAL
  zh: 预期输出
- en: ChatGPT needs clear instructions on how you want the response to be structured.
    Without these guidelines, the response might not meet your expectations.
  id: totrans-541
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT 需要明确的指示，说明您希望响应的结构。没有这些指南，响应可能不符合您的期望。
- en: 'Why it’s important: Clearly defining the desired output helps ensure that ChatGPT
    provides information in a format that is most useful to you. For instance, if
    you need a response in bullet-point format, specifying this will help you get
    the information in an easy-to-read manner.'
  id: totrans-542
  prefs: []
  type: TYPE_NORMAL
  zh: 重要性：明确定义所需的输出有助于确保 ChatGPT 以对您最有用的格式提供信息。例如，如果您需要以项目符号格式响应，指定这一点将帮助您以易于阅读的方式获取信息。
- en: 'Helpful tip: Be clear about how you want the response to be formatted. For
    example, if you prefer a bullet-point list, include that in your request.'
  id: totrans-543
  prefs: []
  type: TYPE_NORMAL
  zh: 有用的小贴士：明确您希望响应的格式。例如，如果您更喜欢项目符号列表，请在您的请求中包含这一点。
- en: Failing to Iterate and Refine
  id: totrans-544
  prefs: []
  type: TYPE_NORMAL
  zh: 无法迭代和细化
- en: Prompt engineering is an ongoing process that often requires multiple attempts
    to perfect. A common mistake is not adjusting your prompts after the initial try.
  id: totrans-545
  prefs: []
  type: TYPE_NORMAL
  zh: 提示工程是一个持续的过程，通常需要多次尝试才能完善。一个常见的错误是在初次尝试后没有调整您的提示。
- en: 'Why it’s important: Refining your prompts based on the responses you receive
    helps improve the clarity and relevance of the answers. Just like editing a draft,
    refining prompts ensures your interactions with ChatGPT are productive and aligned
    with your goals.'
  id: totrans-546
  prefs: []
  type: TYPE_NORMAL
  zh: 重要性：根据您收到的响应来细化您的提示有助于提高答案的清晰度和相关性。就像编辑草稿一样，细化提示确保您与 ChatGPT 的互动富有成效，并与您的目标保持一致。
- en: 'Helpful tip: Treat each prompt as a starting point and be prepared to make
    adjustments. Use the feedback from ChatGPT’s responses to fine-tune your prompts
    for better results.'
  id: totrans-547
  prefs: []
  type: TYPE_NORMAL
  zh: 有用的小贴士：将每个提示视为一个起点，并准备好进行调整。使用 ChatGPT 响应的反馈来微调您的提示以获得更好的结果。
- en: '20 Exercises in Prompt Engineering:'
  id: totrans-548
  prefs: []
  type: TYPE_NORMAL
  zh: 20 个提示工程练习：
- en: The Power of Being Specific
  id: totrans-549
  prefs: []
  type: TYPE_NORMAL
  zh: 专注于具体性的力量
- en: '![](image_rsrc2XY.jpg)'
  id: totrans-550
  prefs: []
  type: TYPE_IMG
  zh: '![image_rsrc2XY.jpg](image_rsrc2XY.jpg)'
- en: 'DALL-E prompt: Create a photorealistic image of a woman and her friendly, square-shaped
    head robot assistant with big blue glowing eyes and a smile, giving each other
    a high five, in a colorful vibrant, futuristic domestic setting, --ar 16:9'
  id: totrans-551
  prefs: []
  type: TYPE_NORMAL
  zh: DALL-E 提示：创建一张照片般逼真的图像，展示一位女士和她的友好、方形头部的机器人助手，机器人助手拥有大而明亮的蓝色发光眼睛和微笑，两人相互击掌，在一个色彩缤纷、充满活力的未来家庭环境中，--ar
    16:9
- en: 1\. Morning Smoothie for a Healthy Start
  id: totrans-552
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 健康开始之晨间冰沙
- en: 'Instead of: “Give me a smoothie recipe, please?”'
  id: totrans-553
  prefs: []
  type: TYPE_NORMAL
  zh: 而不是： “请给我一个冰沙配方？”
- en: 'Try this instead: “Create a refreshing morning smoothie for 2 using kale, banana,
    and peanut butter. I have most essentials in the fridge so get creative!”'
  id: totrans-554
  prefs: []
  type: TYPE_NORMAL
  zh: 尝试这样做： “为两人制作一款清新的晨间冰沙，使用羽衣甘蓝、香蕉和花生酱。我冰箱里大部分基本食材都有，所以发挥创意吧！”
- en: 2\. Entrepreneurial Brainstorming
  id: totrans-555
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 创业头脑风暴
- en: 'Instead of: “Can you give me some business ideas?”'
  id: totrans-556
  prefs: []
  type: TYPE_NORMAL
  zh: 而不是： “你能给我一些商业想法吗？”
- en: 'Try this instead: “Generate a list of five innovative business ideas tailored
    for the health and wellness industry, focusing on digital services.”'
  id: totrans-557
  prefs: []
  type: TYPE_NORMAL
  zh: 尝试这样做： “为健康和福祉行业生成五个创新商业想法，重点关注数字服务。”
- en: 3\. Efficient Meal Planning
  id: totrans-558
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 高效的餐食计划
- en: 'Instead of: “What should I cook for dinner this week?”'
  id: totrans-559
  prefs: []
  type: TYPE_NORMAL
  zh: 而不是： “这周我该做什么晚餐？”
- en: 'Try this instead: “Outline a seven-day dinner plan that incorporates a Mediterranean
    diet for a family of four, including a shopping list with seasonal ingredients.”'
  id: totrans-560
  prefs: []
  type: TYPE_NORMAL
  zh: 尝试这样做： “概述一个为期七天的晚餐计划，包括适合四口之家地中海饮食的计划，以及包含时令成分的购物清单。”
- en: 4\. Professional Development Plan
  id: totrans-561
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 专业发展计划
- en: 'Instead of: “How can I improve my professional skills?”'
  id: totrans-562
  prefs: []
  type: TYPE_NORMAL
  zh: 而不是： “我如何提高我的专业技能？”
- en: 'Try this instead: “Create a six-month professional development plan for a mid-level
    marketing manager looking to advance into a leadership role, with a focus on strategic
    thinking and digital marketing skills.”'
  id: totrans-563
  prefs: []
  type: TYPE_NORMAL
  zh: 尝试这样：为一位希望晋升为领导角色的中级市场营销经理制定一个为期六个月的专业发展计划，重点在于战略思维和数字营销技能。
- en: 5\. Social Media Content Ideas
  id: totrans-564
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 社交媒体内容想法
- en: 'Instead of: “Can you suggest some content ideas for social media?”'
  id: totrans-565
  prefs: []
  type: TYPE_NORMAL
  zh: 而不是：“你能为我提供一些社交媒体内容想法吗？”
- en: 'Try this instead: “Develop a week’s worth of daily engaging content themes
    for a small bookstore’s Instagram, highlighting unique genres and community events.”'
  id: totrans-566
  prefs: []
  type: TYPE_NORMAL
  zh: 尝试这样：为一家小型书店的Instagram制定一周的每日吸引人内容主题，突出独特的类型和社区活动。
- en: 6\. Daily Reflections for Personal Growth
  id: totrans-567
  prefs: []
  type: TYPE_NORMAL
  zh: 6. 个人成长每日反思
- en: 'Instead of: “Can you give me journal prompts?”'
  id: totrans-568
  prefs: []
  type: TYPE_NORMAL
  zh: 而不是：“你能给我一些日记提示吗？”
- en: 'Try this instead: “Provide me with five thought-provoking questions for daily
    self-reflection focused on personal achievements and mindfulness.”'
  id: totrans-569
  prefs: []
  type: TYPE_NORMAL
  zh: 尝试这样：提供五个针对个人成就和正念的每日自我反思的引人深思的问题。
- en: 7\. Budgeting Basics
  id: totrans-570
  prefs: []
  type: TYPE_NORMAL
  zh: 7. 预算基础
- en: 'Instead of: “How do I budget?”'
  id: totrans-571
  prefs: []
  type: TYPE_NORMAL
  zh: 而不是：“我该如何制定预算？”
- en: 'Try this instead: “Create a simple weekly budget template for tracking expenses
    for someone living in a city with a moderate cost of living.”'
  id: totrans-572
  prefs: []
  type: TYPE_NORMAL
  zh: 尝试这样：为生活在生活成本适中的城市的人制定一个简单的每周预算模板，用于跟踪开支。
- en: 8\. Habit Formation Tips
  id: totrans-573
  prefs: []
  type: TYPE_NORMAL
  zh: 8. 培养习惯的技巧
- en: 'Instead of: “I want to start new habits.”'
  id: totrans-574
  prefs: []
  type: TYPE_NORMAL
  zh: 而不是：“我想开始新的习惯。”
- en: 'Try this instead: “List out three key strategies for forming healthy habits
    related to fitness and well-being.”'
  id: totrans-575
  prefs: []
  type: TYPE_NORMAL
  zh: 尝试这样：列出与健身和健康相关的三个形成良好习惯的关键策略。
- en: 9\. Learning a New Language
  id: totrans-576
  prefs: []
  type: TYPE_NORMAL
  zh: 9. 学习一门新语言
- en: 'Instead of: “Help me learn Spanish.”'
  id: totrans-577
  prefs: []
  type: TYPE_NORMAL
  zh: 而不是：“帮助我学习西班牙语。”
- en: 'Try this instead: “Outline a 4-week plan for a beginner to practice and learn
    basic Spanish phrases, dedicating 30 minutes each day.”'
  id: totrans-578
  prefs: []
  type: TYPE_NORMAL
  zh: 尝试这样：为初学者制定一个为期四周的计划，练习和学习基本的西班牙语短语，每天投入30分钟。
- en: 10\. Quick Home Organization
  id: totrans-579
  prefs: []
  type: TYPE_NORMAL
  zh: 10. 快速家庭整理
- en: 'Instead of: “Organize my home.”'
  id: totrans-580
  prefs: []
  type: TYPE_NORMAL
  zh: 而不是：“整理我的家。”
- en: 'Try this instead: “Provide a step-by-step guide for decluttering a living room,
    focusing on bookshelves and entertainment areas.”'
  id: totrans-581
  prefs: []
  type: TYPE_NORMAL
  zh: 尝试这样：提供一个整理客厅的逐步指南，重点关注书架和娱乐区域。
- en: 11\. Home Workout Routine
  id: totrans-582
  prefs: []
  type: TYPE_NORMAL
  zh: 11. 家庭锻炼计划
- en: 'Instead of: “Can you give me some exercise ideas?”'
  id: totrans-583
  prefs: []
  type: TYPE_NORMAL
  zh: 而不是：“你能给我一些锻炼想法吗？”
- en: 'Try this instead: “Design a 20-minute home workout routine that includes bodyweight
    exercises, suitable for all fitness levels, to be done in a small space.”'
  id: totrans-584
  prefs: []
  type: TYPE_NORMAL
  zh: 尝试这样：设计一个20分钟的家庭锻炼计划，包括体重训练，适合所有健身水平，在狭小空间内完成。
- en: 12\. Relaxation Techniques for Stress Relief
  id: totrans-585
  prefs: []
  type: TYPE_NORMAL
  zh: 12. 应对压力的放松技巧
- en: 'Instead of: “How can I relax after work?”'
  id: totrans-586
  prefs: []
  type: TYPE_NORMAL
  zh: 而不是：“我该如何在工作后放松？”
- en: 'Try this instead: “Provide three relaxation techniques that can be performed
    after work to alleviate stress, which can be done within 15 minutes.”'
  id: totrans-587
  prefs: []
  type: TYPE_NORMAL
  zh: 尝试这样：提供三种在工作后可以缓解压力的放松技巧，可以在15分钟内完成。
- en: 13\. Quick Healthy Breakfasts
  id: totrans-588
  prefs: []
  type: TYPE_NORMAL
  zh: 13. 快速健康早餐
- en: 'Instead of: “I need breakfast ideas.”'
  id: totrans-589
  prefs: []
  type: TYPE_NORMAL
  zh: 而不是：“我需要早餐想法。”
- en: 'Try this instead: “Suggest five quick and healthy breakfast options that can
    be prepared in under 10 minutes for a busy morning.”'
  id: totrans-590
  prefs: []
  type: TYPE_NORMAL
  zh: 尝试这样：建议五种在10分钟内可以准备的快速健康早餐选项，适合忙碌的早晨。
- en: 14\. Weekend Getaway Planning
  id: totrans-591
  prefs: []
  type: TYPE_NORMAL
  zh: 14. 周末度假计划
- en: 'Instead of: “Where should I go for a weekend trip?”'
  id: totrans-592
  prefs: []
  type: TYPE_NORMAL
  zh: 而不是：“我该去哪里度周末？”
- en: 'Try this instead: “Propose an itinerary for a two-day weekend getaway within
    200 miles of New York City, focusing on outdoor activities and local cuisine.”'
  id: totrans-593
  prefs: []
  type: TYPE_NORMAL
  zh: 尝试这样：为距离纽约市200英里内的两天周末度假行程制定一个行程表，重点在于户外活动和当地美食。
- en: 15\. Plant Care Schedule
  id: totrans-594
  prefs: []
  type: TYPE_NORMAL
  zh: 15. 植物护理计划
- en: 'Instead of: “How do I take care of my plants?”'
  id: totrans-595
  prefs: []
  type: TYPE_NORMAL
  zh: 而不是：“我该如何照顾我的植物？”
- en: 'Try this instead: “Draft a weekly care schedule for indoor plants, including
    watering, fertilizing, and sunlight exposure, for someone with a modest collection
    of houseplants.”'
  id: totrans-596
  prefs: []
  type: TYPE_NORMAL
  zh: 尝试这样：为拥有适度家庭植物收藏的人制定一个室内植物每周护理计划，包括浇水、施肥和阳光照射。
- en: 16\. Streamlined Study Sessions
  id: totrans-597
  prefs: []
  type: TYPE_NORMAL
  zh: 16. 精简学习时段
- en: 'Instead of: “How do I study effectively?”'
  id: totrans-598
  prefs: []
  type: TYPE_NORMAL
  zh: 而不是：“我该如何有效地学习？”
- en: 'Try this instead: “Develop a focused 30-minute study session plan for a college
    student preparing for exams, with strategies for minimizing distractions and maximizing
    retention.”'
  id: totrans-599
  prefs: []
  type: TYPE_NORMAL
  zh: 尝试这样：为一位准备考试的大学学生制定一个30分钟的专注学习时段计划，包括最小化干扰和最大化记忆的策略。
- en: 17\. Eco-Friendly Living Tips
  id: totrans-600
  prefs: []
  type: TYPE_NORMAL
  zh: 17. 环保生活技巧
- en: 'Instead of: “How can I be more eco-friendly?”'
  id: totrans-601
  prefs: []
  type: TYPE_NORMAL
