  prefs: []
  type: TYPE_NORMAL
- en: CalcDa = sal * 0.05
  prefs: []
  type: TYPE_NORMAL
- en: Else
  prefs: []
  type: TYPE_NORMAL
- en: CalcDa = sal * 0.1
  prefs: []
  type: TYPE_NORMAL
