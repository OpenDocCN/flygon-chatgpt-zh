    ****th**an** ****ev**er** ****be**for**e ****o**f** ****spe**akin**g ****hu**man**.'
  id: totrans-1027
  prefs: []
  type: TYPE_NORMAL
  zh: '**虽然对话设计已经存在了比ChatGPT更长的时间，但生成式AI已经改变了游戏规则，从聊天机器人能够做什么以及机器人如何流畅地“说话”像人类的角度来看。这也意味着对话设计不再是单行道。换句话说，不仅仅是AI在学习如何像人类说话，人类也需要学习如何与AI交流，如果我们想要从像ChatGPT这样的LLMs中获得我们想要的结果。这与我们在前几章中讨论的提示工程有关。由于我们在本书中已经相当详细地讨论了如何构建你的提示，所以在这一节中，我们将更多地探讨ChatGPT如何帮助创建比以往任何时候都更擅长说话的聊天机器人**。'
