- en: Understanding tokens
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The OpenAI platform calculates request costs based on **tokens**, which are
    small segments of text (often subwords, words, or characters) averaging about
    0.75 words or 4 characters each. Text is divided into tokens by elements such
    as punctuation, root words, and word endings. We will discuss tokens in detail
    in [*Chapter 6*](Chapter_6.xhtml#_idTextAnchor249).
  prefs: []
  type: TYPE_NORMAL
- en: 'Each API request consists of both input and output tokens, and OpenAI charges
    for both. For example, in *Lab 2.1*, the message `{"role": "user", "content":
    "What is the FizzBuzz problem?"}` contains 15 tokens. You can access the exact
    count from the `prompt_token` attribute as in the following code:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE17]'
  prefs: []
  type: TYPE_PRE
- en: Alternatively, we can estimate our total input token consumption using tools
    such as the OpenAI Tokenizer, available at [https://platform.openai.com/tokenizer](https://platform.openai.com/tokenizer).
    The Tokenizer also color-codes the different tokens in the text, identifying words
    such as `role` and `user` as a single token, punctuation marks such as commas
    and question marks as a single token each, and FizzBuzz as three tokens.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 2.5: OpenAI Tokenizer simulation](../Images/B31534_02_5.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 2.5: OpenAI Tokenizer simulation'
  prefs: []
  type: TYPE_NORMAL
- en: 'Output tokens are also billed. For example, in *Lab 2.1*, the output response
    from the *GPT-4o-mini* model contains 292 tokens. You can access the `completion_tokens`
    attribute by calling the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE18]'
  prefs: []
  type: TYPE_PRE
- en: 'This brings the total billable tokens to 307\. You can access the `total_tokens`
    attributes by calling the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE19]'
  prefs: []
  type: TYPE_PRE
- en: How billing is computed
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: OpenAI charges for both input and output tokens, with costs varying by model.
    Newer, more advanced models typically have higher costs, while optimized versions,
    such as models with the *-mini* or *-turbo* postfix, are more affordable. You
    can find the full pricing details at [https://openai.com/api/pricing/](https://openai.com/api/pricing/).
  prefs: []
  type: TYPE_NORMAL
- en: As of January 2025, input tokens for the *GPT-4o* model are priced at $2.50
    per million tokens (or $1 for every 400,000 input tokens), while output tokens
    are priced at $10 per million tokens (or $1 for every 100,000 output tokens).
  prefs: []
  type: TYPE_NORMAL
- en: In *Lab 2.1*, we used the more affordable *GPT-4o-mini* model. Input tokens
    for this model cost $0.15 per million tokens (or $1 for every 6.6 million input
    tokens), and output tokens are priced at $0.60 per million tokens (or $1 for every
    1.6 million output tokens). These costs are approximately 1/16 of the *GPT-4o*
    model’s pricing.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 2.6: Costs of GPT-4o input and output tokens](../Images/B31534_02_6.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 2.6: Costs of GPT-4o input and output tokens'
  prefs: []
  type: TYPE_NORMAL
- en: 'For example, we can calculate the cost of running *Lab 2.1*, which uses 15
    input tokens and 292 output tokens. Based on the pricing for the *GPT-4o-mini*
    model, the cost is as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE20]'
  prefs: []
  type: TYPE_PRE
- en: This is approximately 1/55 of a cent.
  prefs: []
  type: TYPE_NORMAL
- en: 'If we run *Lab 2.1* with the larger *GPT-4o* model instead, the cost would
    be as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE21]'
  prefs: []
  type: TYPE_PRE
- en: This amounts to 1/5 of a cent.
  prefs: []
  type: TYPE_NORMAL
- en: Keep these cost differences in mind when designing your own applications, especially
    when deciding between using more advanced models and their smaller, more affordable
    versions. Model prices have historically declined as newer models are introduced,
    so it is a good idea to periodically review the **Pricing** page at [https://openai.com/api/pricing/](https://openai.com/api/pricing/).
  prefs: []
  type: TYPE_NORMAL
- en: With a clear understanding of cost calculations, we can now move on to discussing
    the limitations and restrictions associated with different tiers of OpenAI accounts.
  prefs: []
  type: TYPE_NORMAL
- en: Understanding rate limits and usage restrictions for free and paid OpenAI accounts
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'OpenAI usage is limited by three factors: **requests per minute** (**RPM**),
    **requests per day** (**RPD**), and **tokens per minute** (**TPM**). The limits
    of each vary based on both the model and the type of account you have. For Free
    tier accounts with no credits added, the limit is three RPM, and only certain
    models are available, excluding *GPT-4o*. Token limits tend to be more restrictive
    for advanced models such as *GPT-4o* to all account tiers, whereas older or mini
    models, such as *GPT-4o-mini*, have more relaxed limits.'
  prefs: []
  type: TYPE_NORMAL
- en: 'For reference, here are the rate limits for Free tier accounts as of January
    2025:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 2.7: Rate limits example for Free tier accounts](../Images/B31534_02_7.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 2.7: Rate limits example for Free tier accounts'
  prefs: []
  type: TYPE_NORMAL
- en: 'And here are the rate limits for Tier 1 accounts as of January 2025:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 2.8: Rate limits example for Tier 1 accounts](../Images/B31534_02_8.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 2.8: Rate limits example for Tier 1 accounts'
  prefs: []
  type: TYPE_NORMAL
- en: 'We encourage you to learn about your account’s API limits by navigating to
    the **Settings** section in the upper-left corner of your organization: [https://platform.openai.com/settings/organization/limits](https://platform.openai.com/settings/organization/limits).'
  prefs: []
  type: TYPE_NORMAL
- en: With Tier 1’s increased RPM and TPM limits in place, we’re now ready to move
    forward to the next lab, where we will explore additional parameters for OpenAI
    API.
  prefs: []
  type: TYPE_NORMAL
- en: Lab 2.2 – analyzing request parameters
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: In *Lab 2.2*, we will expand on our basic OpenAI API request to the Chat service
    by adding additional parameters to customize the model’s response. This time,
    we will ask the Chat service to explain the *Two Sum problem*, a topic we will
    explore further in later chapters.
  prefs: []
  type: TYPE_NORMAL
- en: 'We will use a similar starter code from *Lab 2.1*, which includes setting up
    an `OpenAI` client and `print` statements:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE22]'
  prefs: []
  type: TYPE_PRE
- en: 'In this lab’s guided walk-through, we will add the following payload parameters:'
  prefs: []
  type: TYPE_NORMAL
- en: '`n`: Specifies the number of response variations'
  prefs: []
  type: TYPE_NORMAL
- en: '`temperature`: Controls the level of randomness in the model’s output ranging
    from `0` to `2`'
  prefs: []
  type: TYPE_NORMAL
- en: '`max_tokens`: Limits the number of tokens in each response'
  prefs: []
  type: TYPE_NORMAL
- en: Applications such as code completion services often offer users multiple suggestions
    from a language model, so we may want to retrieve more than one response. Additionally,
    in some cases, such as generating a creative prompt (for example, `Give me a marketing
    slogan for a book about GenAI for coding`), we might prefer a higher degree of
    randomness in the output that can be obtained by setting the `temperature` parameter
    closer to its maximum value of 2.
  prefs: []
  type: TYPE_NORMAL
- en: The `max_tokens` parameter limits the number of tokens in the response, though
    it does not guarantee the output will be fully complete within that limit. When
    using `max_tokens`, OpenAI charges for the specified token limit rather than the
    actual number of tokens used, so it is best to set it close to the expected length
    of the response.
  prefs: []
  type: TYPE_NORMAL
