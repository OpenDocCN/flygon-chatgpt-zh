  prefs: []
  type: TYPE_NORMAL
  zh: '****与** ****角色** ****扮演** ****相比** ****，****其中** ****涉及** ****让** ****LLM**
    ****扮演** ****一个** ****特定的** ****角色** ****，****重构** ****关注** ****改变** ****对** ****问题的**
    ****视角** ****，****而不** ****必** ****改变** ****模型的** ****角色** ****。****而不是** ****试图**
    ****让** ****模型** ****像** ****另一个人** ****一样** ****回答** ****，****它** ****简单地** ****改变**
    ****它们** ****看待** ****问题的** ****方式** .'
- en: '****I**n** ****t**he** ****con**tex**t ****o**f** ****Ch**ain** ****o**f**
    ****Tho**ugh**t , ****wh**ere** ****t**he** ****fo**cus** ****i**s** ****o**n**
