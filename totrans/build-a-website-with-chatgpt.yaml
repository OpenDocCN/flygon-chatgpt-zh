- en: 12.4.2 Examining the CSS
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Here’s an annotated version of the CSS code that ChatGPT generated for my article
    page:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE263]'
  prefs: []
  type: TYPE_PRE
- en: ① Imports the Baskerville and Raleway typefaces from Google Fonts
  prefs: []
  type: TYPE_NORMAL
- en: ② Styles the text size and font, sets the maximum width, and centers the page
  prefs: []
