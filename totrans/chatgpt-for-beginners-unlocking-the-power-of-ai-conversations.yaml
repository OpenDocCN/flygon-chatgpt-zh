    ****Cha**tGP**T’****s**** ****out**put**s ****wi**th** ****rel**iabl**e ****sou**rce**s,
    ****espe**ciall**y ****f**or** ****cri**tica**l ****o**r** ****fa**ct**-****ba**sed**
    ****con**ten**t.'
  id: totrans-570
  prefs: []
  type: TYPE_NORMAL
  zh: 学生和教师应交叉检查 ChatGPT 的输出与可靠来源，特别是对于批判性或基于事实的内容。
