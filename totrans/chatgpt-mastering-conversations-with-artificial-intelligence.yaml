  type: TYPE_NORMAL
  zh: 上下文：
- en: '*You are a travel blogger exploring the vibrant streets of Tokyo.*'
  id: totrans-450
  prefs: []
  type: TYPE_NORMAL
  zh: '*你是一位探索东京繁华街道的旅行博主。*'
- en: 'Assistant Role:'
  id: totrans-451
