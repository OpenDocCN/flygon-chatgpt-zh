- en: Simulations and Business Games emerge as the most favored approach by both company
    managers and students, garnering the highest effectiveness ratings of 65% in each
    group. Ethical Decision-Making Modules hold significant prominence among professors,
    leading with a 65% effectiveness rating. Online Collaborative Platforms, despite
    variations across groups, consistently rank in the top tier, emphasizing their
    universal relevance. Industry–University Partnerships, PBL, and Interdisciplinary
    Collaborations display relatively balanced effectiveness ratings across groups.
    Customizable AI Tools and Human-in-the-Loop Approaches exhibit nuanced preferences,
    showcasing the diverse perspectives of each respondent group. This comprehensive
    ranking provides valuable insights into the perceived efficacy of these approaches
    in fostering collaborative decision-making skills in the context of management
    education as shown in [Table 18.7](#ch26.xhtml#t38).
  id: totrans-3305
  prefs: []
  type: TYPE_NORMAL
  zh: 模拟和商业游戏被公司经理和学生视为最受欢迎的方法，每个群体都获得了最高的65%的有效性评分。道德决策模块在教授中占有显著地位，以65%的有效性评分领先。尽管各群体之间存在差异，但在线协作平台始终位于顶级，强调了其普遍相关性。产业-大学合作、项目式学习（PBL）和跨学科合作在各个群体中显示出相对平衡的有效性评分。可定制人工智能工具和人工参与方法表现出细微的偏好，展示了每个受访群体多样化的观点。这一全面的排名为这些方法在管理教育背景下促进协作决策技能的感知有效性提供了宝贵见解，如[表18.7](#ch26.xhtml#t38)所示。
