    ****th**en** ****ha**ve** ****i**t** ****re**fin**e ****t**he** ****id**eas**
    ****t**o** ****a**dd** ****inno**vativ**e ****a**nd** ****comp**ellin**g ****fea**ture**s.'
  id: totrans-1379
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 指示模型“**为语言学习应用生成想法**”，然后让它细化想法，以添加创新和引人注目的功能。
- en: '****Iter**ativ**e ****Brain**stormi**ng ****i**s** ****a**n** ****esse**ntia**l
    ****tech**niqu**e ****f**or** ****gene**ratin**g, ****deve**lopin**g, ****a**nd**
