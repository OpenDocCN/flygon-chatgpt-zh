- en: If you like, you can use the HTML and CSS annotations from the previous two
    sections to help customize your web page code, as I describe in the next section.
  id: totrans-2349
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你愿意，可以使用前两节中的HTML和CSS注释来帮助定制你的网页代码，正如我在下一节中描述的那样。
- en: 10.8 Customizing the photo gallery
  id: totrans-2350
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 10.8 定制照片库
- en: Using the previous sections’ annotations as a guide, I’m going to take you through
    a few relatively simple code customizations you can make by opening the HTML and
    CSS files in your text editor. If your page isn’t close to what you want, however,
    you’re better off rewriting your prompt and submitting it to ChatGPT in a new
    session.
  id: totrans-2351
  prefs: []
  type: TYPE_NORMAL
  zh: 以前几节的注释为指导，我将带你通过一些相对简单的代码定制，你可以在文本编辑器中打开HTML和CSS文件来实现。然而，如果你的页面离你想要的效果还差很远，你最好重写你的提示并将其提交给ChatGPT的新会话。
- en: 'For the HTML code, here are a few suggested customizations:'
  id: totrans-2352
  prefs: []
  type: TYPE_NORMAL
  zh: 对于HTML代码，这里有一些建议的定制：
- en: You can edit what little text there is on the page, including the title, the
    heading, and the instruction text. Just make sure you only edit the text and not
    the HTML tags that surround the text (such as the `<figcaption>` and `</figcaption>`
    tags around each figure caption).
  id: totrans-2353
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你可以编辑页面上的一些文本，包括标题、标题和说明文本。只需确保你只编辑文本，而不是围绕文本的HTML标签（如每个图例周围的`<figcaption>`和`</figcaption>`标签）。
- en: Feel free to change the alternative text for any image by editing that `img`
    tag’s `alt` attribute value. Make sure you don’t accidentally delete the double
    quotation marks that surround the `alt` value.
  id: totrans-2354
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 随意更改任何图像的替代文本，只需编辑该`img`标签的`alt`属性值。确保你不会意外删除围绕`alt`值的双引号。
- en: If you want to include a second introductory paragraph, place the edit cursor
    after the `</p>` tag that ends the existing introductory paragraph. Press Enter
    or Return to start a new line, type a `<p>` tag, type your paragraph text, and
    finish with a `</p>` tag.
  id: totrans-2355
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果你想包含一个第二段简介，请将编辑光标放置在结束现有简介的`</p>`标签之后。按Enter或Return键开始新行，输入一个`<p>`标签，输入你的段落文本，并以`</p>`标签结束。
- en: You may want to build out your site by creating multiple photo galleries (or
    whatever), with each page dedicated to a particular theme or category. Ask ChatGPT
    to create one page at a time, modifying your prompt as needed. If you go this
    route, you’ll want a navigation element that enables users to visit each page.
    Refer to chapter 6 to learn how to prompt ChatGPT for links and a navigation bar.
  id: totrans-2356
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你可能想通过创建多个照片库（或其他内容），每个页面专注于特定的主题或类别来构建你的网站。请ChatGPT一次创建一个页面，根据需要修改你的提示。如果你选择这条路，你将需要一个导航元素，使用户能够访问每个页面。参考第6章了解如何提示ChatGPT获取链接和导航栏。
- en: In the footer section of the HTML code, you can add links to your social media
    accounts, as I describe in chapter 4.
  id: totrans-2357
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在HTML代码的页脚部分，你可以添加指向你的社交媒体账户的链接，正如我在第4章中描述的那样。
- en: 'Now, here are a few customization ideas for the CSS code:'
  id: totrans-2358
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，这里有一些CSS代码的定制想法：
- en: To use another page background color, specify a different color keyword for
    the `body` element’s `background-color` property.
  id: totrans-2359
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 要使用其他页面背景颜色，为`body`元素的`background-color`属性指定不同的颜色关键字。
- en: To use another background color for the header and footer, specify a new color
    keyword for the `header` and `footer` elements’ `background-color` property.
  id: totrans-2360
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 要为页眉和页脚使用其他背景颜色，为`header`和`footer`元素的`background-color`属性指定一个新的颜色关键字。
- en: To use a different color for the page text, specify a different color keyword
    for the `body` element’s `color` property.
  id: totrans-2361
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 要使用不同的颜色显示页面文本，为`body`元素的`color`属性指定不同的颜色关键字。
- en: To adjust the transparency of the lightbox overlay, edit the `.overlay` class’s
    `background-color` property. Specifically, modify the final value in the `rgba()`
    function, where `1.0` is completely opaque and `0.0` is completely transparent.
  id: totrans-2362
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 要调整灯箱覆盖层的透明度，编辑`.overlay`类的`background-color`属性。具体来说，修改`rgba()`函数中的最后一个值，其中`1.0`是完全不透明，`0.0`是完全透明。
- en: For any font size value, you can change the number to increase or decrease the
    font size. Just make sure you leave the `px` unit in place.
  id: totrans-2363
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于任何字体大小值，你可以通过改变数字来增加或减少字体大小。只需确保保留`px`单位。
- en: For any padding or margin value, you can change the number to increase or decrease
    the padding or margins. In each case, be sure to leave the `px` unit in place.
  id: totrans-2364
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于任何填充或边距值，你可以更改数字以增加或减少填充或边距。在每种情况下，务必保留 `px` 单位。
- en: To make your page code more accessible, consider converting all px measurements
    to rem measurements. 1 rem is by default equivalent to 16 px, so 20 px is 1.25 rem,
    24 px is 1.5 rem, 32 px is 2 rem, 48 px is 3 rem, and so on. The rem unit is more
    accessible because it measures font sizes relative to the default font size the
    browser user has defined in their browser settings.
  id: totrans-2365
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为了使你的页面代码更易于访问，考虑将所有 px 测量值转换为 rem 测量值。默认情况下，1 rem 等于 16 px，因此 20 px 等于 1.25
    rem，24 px 等于 1.5 rem，32 px 等于 2 rem，48 px 等于 3 rem，依此类推。rem 单位更易于访问，因为它测量的是相对于浏览器用户在其浏览器设置中定义的默认字体大小的字体大小。
- en: Summary
  id: totrans-2366
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: In HTML, you use the `img` element to tell the web browser to insert an external
    image file into the page.
  id: totrans-2367
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在 HTML 中，你使用 `img` 元素告诉网络浏览器将外部图像文件插入到页面中。
- en: In the `<img>` tag, use the `src` attribute to tell the browser where to find
    the image file; use the `alt` attribute to add a short phrase that describes the
    image, particularly for people using screen readers and Braille apps.
  id: totrans-2368
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在 `<img>` 标签中，使用 `src` 属性告诉浏览器在哪里找到图像文件；使用 `alt` 属性添加一个简短的短语来描述图像，尤其是对于使用屏幕阅读器和盲文应用的人。
- en: When working with image thumbnails, it’s best to create a separate thumbnail
    file that has the smaller dimensions you want to use.
  id: totrans-2369
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当处理图像缩略图时，最好创建一个具有你想要使用的较小尺寸的单独缩略图文件。
- en: To include a caption, surround the `img` element with a `figure` element, and
    add the caption to the `figcaption` element.
  id: totrans-2370
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 要包含标题，将 `img` 元素包裹在 `figure` 元素中，并将标题添加到 `figcaption` 元素中。
- en: A lightbox overlay is a web page element created on the fly to display a large-size
    version of a clicked thumbnail.
  id: totrans-2371
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 轻量级覆盖层是一种动态创建的网页元素，用于显示点击的缩略图的大尺寸版本。
- en: When you don’t want page items laid out vertically on the page, turn the element
    into a Flexbox container.
  id: totrans-2372
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当你不想在页面上垂直排列页面元素时，将元素转换为 Flexbox 容器。
- en: For best results, your page prompt should be as specific as possible, including
    colors, font sizes, and heading levels.
  id: totrans-2373
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为了获得最佳效果，你的页面提示应尽可能具体，包括颜色、字体大小和标题级别。
- en: Save the generated HTML to the index.xhtml file and the generated CSS to the
    filename suggested by ChatGPT in the HTML code, usually styles.css.
  id: totrans-2374
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将生成的 HTML 保存到 index.xhtml 文件，并将生成的 CSS 保存到 ChatGPT 在 HTML 代码中建议的文件名，通常是 styles.css。
- en: 11 Creating a portfolio page
