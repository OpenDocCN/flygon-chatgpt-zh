- en: 4Mapping ChatGPT in Education ResearchBibliographic Coupling and Co-Citation
    Analyses
  id: totrans-827
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 4Mapping ChatGPT in Education ResearchBibliographic Coupling and Co-Citation
    Analyses
- en: Luc Phan Tan
  id: totrans-828
  prefs: []
  type: TYPE_NORMAL
  zh: 吕克·潘·坦
- en: 'DOI: [10.1201/9781032716350-4](http://doi.org/10.1201/9781032716350-4)'
  id: totrans-829
  prefs: []
  type: TYPE_NORMAL
  zh: 'DOI: [10.1201/9781032716350-4](http://doi.org/10.1201/9781032716350-4)'
- en: 4.1 Introduction
  id: totrans-830
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 4.1 引言
- en: In recent years, artificial intelligence (AI) has emerged as a significant trend
    in education ([Chen, Chen, and Lin 2020](#ch12.xhtml#r125)). Specifically, the
    advent of ChatGPT has unlocked new educational possibilities. With its capacity
    to generate text closely resembling human composition, ChatGPT can offer substantial
    assistance to teachers and students. Teachers can swiftly create quizzes, exercises,
    or tests with the help of ChatGPT. For students, ChatGPT can elucidate complex
    concepts, provide suggestions, and furnish feedback based on the content they
    provide ([Aithal and Aithal 2023](#ch12.xhtml#r116)). It can also facilitate personalized
    learning, adapting content and teaching styles to individual students. Although
    ethical challenges persist in using ChatGPT, it undeniably presents new opportunities
    for educators and learners.
  id: totrans-831
  prefs: []
  type: TYPE_NORMAL
  zh: 近年来，人工智能（AI）在教育领域已成为一个显著的趋势（[陈、陈和林2020](#ch12.xhtml#r125)）。特别是，ChatGPT的出现解锁了新的教育可能性。凭借其生成与人类创作相似文本的能力，ChatGPT可以为教师和学生提供实质性帮助。教师可以利用ChatGPT迅速创建测验、练习或测试。对于学生来说，ChatGPT可以阐明复杂的概念，提供建议，并根据他们提供的内容提供反馈（[艾塔尔和艾塔尔2023](#ch12.xhtml#r116)）。它还可以促进个性化学习，根据个别学生的需求调整内容和教学风格。尽管使用ChatGPT存在伦理挑战，但它无疑为教育工作者和学习者提供了新的机遇。
- en: Consequently, the subject of ChatGPT in education has witnessed a recent notable
    surge in research and attention from scholars and practitioners. This significant
    development across multiple disciplines has accumulated a substantial body of
    knowledge, requiring scholars to comprehensively review and synthesize existing
    works to provide a common understanding of the subject. Several literature reviews
    have been conducted to summarize the research focus on ChatGPT in education. In
    an evaluation of 50 articles, [Lo (2023)](#ch12.xhtml#r156) emphasized ChatGPT’s
    inconsistent performance in various subject areas and its possible advantages
    as a teaching assistant and online tutor for learners. According to the review’s
    findings, schools and colleges should update their policies and guidelines for
    academic integrity and plagiarism prevention as soon as possible. [Thurzo et al.
    (2023)](#ch12.xhtml#r173) offer a synopsis of the impending modifications and
    a succinct review of the significant developments in AI for dental education since
    2020.
  id: totrans-832
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，ChatGPT在教育领域的主题最近受到了学者和实践者研究和关注的显著增长。这一在多个学科中的重大发展积累了大量的知识，需要学者们全面回顾和综合现有作品，以提供对该主题的共同理解。已经进行了几项文献综述，以总结ChatGPT在教育中的研究重点。在评估50篇文章时，[Lo
    (2023)](#ch12.xhtml#r156) 强调了ChatGPT在各个学科领域中的表现不一致，以及它作为教学助理和在线辅导员的潜在优势。根据综述的结果，学校和学院应尽快更新其关于学术诚信和抄袭预防的政策和指南。[Thurzo
    等人 (2023)](#ch12.xhtml#r173) 提供了即将进行的修改的概述，并对自2020年以来牙科教育中人工智能的重大发展进行了简要回顾。
- en: Additionally, in light of developments in AI applications and their implications
    for dentistry, this review offers recommendations for updating undergraduate and
    graduate dental curricula. [Pradana, Elisa, and Syarifuddin (2023)](#ch12.xhtml#r168)
    used bibliometric analysis and a systematic literature review of previous studies
    on the application of OpenAI ChatGPT in education. This piece contributes to the
    knowledge of the application of AI in education and can be helpful for researchers
    and decision-makers. Through their thorough analysis of the international literature
    on ChatGPT’s application in higher education, [Ansari, Ahmad, and Bhutta (2023)](#ch12.xhtml#r118)
    add much to the field. ChatGPT is a valuable tool that teachers, students, and
    researchers can use to help with various tasks, according to the findings from
    the studies mentioned above. Previous evaluation studies were largely qualitative
    and context-specific. This leads to the need for quantitative research examining
    ChatGPT in a general educational context to create a comprehensive literature
    map and provide an understanding of the current state and trajectory in this area.
  id: totrans-833
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，鉴于人工智能应用的发展及其对牙科的影响，本综述提出了更新本科和研究生牙科课程的建议。[Pradana, Elisa, 和 Syarifuddin
    (2023)](#ch12.xhtml#r168) 使用了文献计量分析和系统文献综述，对OpenAI ChatGPT在教育中的应用进行了先前研究。这篇作品有助于增进对人工智能在教育中应用的知识，对研究人员和决策者可能有所帮助。通过他们对ChatGPT在高等教育中应用的国际文献的彻底分析，[Ansari,
    Ahmad, 和 Bhutta (2023)](#ch12.xhtml#r118) 为该领域做出了很多贡献。根据上述研究的结果，ChatGPT是教师、学生和研究人员可以用来帮助完成各种任务的宝贵工具。
- en: By identifying the most influential authors, journals, and keywords, a bibliometric
    analysis offers a thorough understanding of the state of the art and the field’s
    evolution ([Chang, Huang, and Lin 2015](#ch12.xhtml#r123)). According to [Chang,
    Huang, and Lin (2015)](#ch12.xhtml#r123), this kind of analysis also identifies
    gaps in the literature and potential areas for additional study. In order to comprehend
    the current body of knowledge and to guide future research directions, academics,
    practitioners, and policymakers must conduct a bibliometric analysis of ChatGPT
    in education research. The findings of bibliometric analyses can be used to highlight
    prevailing research paradigms and spot new developments in the field. Every bibliometric
    method has benefits and drawbacks. Bibliometric analysis increasingly combines
    these techniques to create thorough literature maps to yield better results and
    a more profound understanding ([Phan Tan 2021](#ch12.xhtml#r166)).
  id: totrans-834
  prefs: []
  type: TYPE_NORMAL
  zh: 通过识别最有影响力的作者、期刊和关键词，文献计量分析提供了对当前技术状态和领域演变的全面理解（[Chang, Huang, and Lin 2015](#ch12.xhtml#r123)）。根据[Chang,
    Huang, and Lin (2015)](#ch12.xhtml#r123)，这种分析还能识别文献中的空白和潜在的研究领域。为了理解当前的知识体系并指导未来的研究方向，学者、实践者和政策制定者必须对教育研究中的ChatGPT进行文献计量分析。文献计量分析的结果可以用来突出主流的研究范式，并发现领域中的新进展。每种文献计量方法都有其优点和缺点。文献计量分析越来越多地结合这些技术，以创建全面的文献地图，从而获得更好的结果和更深入的理解（[Phan
    Tan 2021](#ch12.xhtml#r166)）。
- en: This chapter employs two distinct bibliometric techniques, co-citation and bibliographic
    coupling, to complementarily capture and connect bibliographic information. This
    enabled them to investigate the formation of ChatGPT in education thoroughly and
    rigorously. This chapter aims to identify important works, draw maps and networks,
    and pinpoint essential clusters. This approach finds the most influential writers,
    books, journals, and keywords over time and the knowledge bases, typologies, frameworks,
    and intellectual foundations of ChatGPT in education. By providing insight into
    the dynamics of topic development, new issues, and trends, this methodology will
    help to advance and renew our understanding of ChatGPT in education and facilitate
    its continued development. The results of this chapter also provide a worldwide
    perspective and guidelines for the literature on ChatGPT in education, assisting
    academics in recognizing recent contributions, locating research resources in
    promising fields, and investigating potential avenues for future investigation.
    For real-world use, managers can also access academic research on this topic.
  id: totrans-835
  prefs: []
  type: TYPE_NORMAL
  zh: 本章采用两种不同的文献计量技术，即共引和文献耦合，以互补地捕捉和连接文献信息。这使得他们能够彻底而严谨地研究ChatGPT在教育中的形成。本章旨在识别重要作品、绘制地图和网络、并确定关键集群。这种方法找到了随着时间的推移最有影响力的作家、书籍、期刊和关键词，以及ChatGPT在教育中的知识库、类型学、框架和知识基础。通过提供对主题发展动态、新问题和趋势的洞察，这种方法将有助于推进和更新我们对ChatGPT在教育中的理解，并促进其持续发展。本章的结果还提供了对ChatGPT教育文献的全球视角和指导方针，帮助学者识别最近的贡献，在有希望的领域定位研究资源，并探索未来研究的潜在途径。对于实际应用，管理者也可以访问这个主题的学术研究。
- en: This chapter begins with a methods section that briefly describes bibliographic
    coupling, co-citation analysis, and methodological procedures. The subsequent
    sections present the results of the analysis, followed by conclusions and limitations.
  id: totrans-836
  prefs: []
  type: TYPE_NORMAL
  zh: 本章从方法部分开始，简要描述了文献耦合、共引分析和方法论程序。接下来的部分展示了分析结果，随后是结论和局限性。
- en: 4.2 Methods
  id: totrans-837
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 4.2 方法
- en: 4.2.1 Bibliometrics
  id: totrans-838
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4.2.1 文献计量学
- en: '*Bibliometrics* is a field that uses statistical and mathematical techniques
    to analyse empirical data found in published literature. It was first introduced
    by Pritchard in 1969\. The goal is to analyse publication trends and identify
    key themes in a particular field. Using science mapping techniques and quantitative
    analysis, bibliometric analysis visually represents the field’s intellectual structure
    ([Small 1973](#ch12.xhtml#r171)). This analysis uses several techniques, such
    as co-word analysis, co-authorship analysis, and citation analysis ([van Eck and
    Waltman 2009](#ch12.xhtml#r176)). The data are further categorized by citation-based
    analysis into bibliographic coupling, co-citation, and citation analysis ([van
    Eck and Waltman 2009](#ch12.xhtml#r176)). According to [Leung, Sun, and Bai (2017)](#ch12.xhtml#r154),
    these techniques help researchers examine the body of literature in their field
    of study and offer insights into the intellectual climate. *Co-citation analysis*
    is a bibliometric technique that combines cited publications into a cluster to
    represent a common theme and reveal relationships among cited publications ([Small
    1973](#ch12.xhtml#r171)). Another technique is bibliographic coupling, which looks
    at the connections between citing publications and identifies a recurring theme
    by aggregating them into a cluster ([Kessler 1963](#ch12.xhtml#r150)). Co-citation
    analysis and bibliographic coupling are called cross-citations, indicating the
    interconnections between publications on a specific topic. A more thorough understanding
    of the connections between cited and citing publications can be obtained by combining
    the two techniques of co-citation analysis and bibliographic coupling ([van Eck
    and Waltman 2009](#ch12.xhtml#r176)). By combining the two approaches, researchers
    can better visualize and comprehend the connections between various field elements,
    advancing theoretical and empirical research ([van Raan 2005](#ch12.xhtml#r177)).
    Thus, combining these methods can uncover valuable information that cannot be
    obtained through the use of a single method.'
  id: totrans-839
  prefs: []
  type: TYPE_NORMAL
  zh: '*文献计量学* 是一个使用统计和数学技术来分析发表文献中发现的经验数据的领域。它最初由 Pritchard 在 1969 年提出。目标是分析出版趋势并识别特定领域的关键主题。使用科学图谱技术和定量分析，文献计量分析可以直观地表示该领域的知识结构（[Small
    1973](#ch12.xhtml#r171)）。这种分析使用了多种技术，例如共词分析、共著者分析和引文分析（[van Eck 和 Waltman 2009](#ch12.xhtml#r176)）。数据进一步通过基于引文的分析进行分类，包括书目耦合、共引和引文分析（[van
    Eck 和 Waltman 2009](#ch12.xhtml#r176)）。根据 [Leung、Sun 和 Bai (2017)](#ch12.xhtml#r154)
    的研究，这些技术有助于研究人员检查他们研究领域中的文献，并提供对知识气候的见解。*共引分析* 是一种文献计量技术，它将引用的出版物组合成一个集群，以表示一个共同的主题并揭示引用出版物之间的关系（[Small
    1973](#ch12.xhtml#r171)）。另一种技术是书目耦合，它研究引用出版物之间的联系，通过将它们聚合到一起形成一个集群来识别一个重复出现的主题（[Kessler
    1963](#ch12.xhtml#r150)）。共引分析和书目耦合被称为交叉引用，表明特定主题出版物之间的相互联系。通过结合共引分析和书目耦合这两种技术，可以获得对被引用和引用出版物之间联系的更深入理解（[van
    Eck 和 Waltman 2009](#ch12.xhtml#r176)）。通过结合这两种方法，研究人员可以更好地可视化和理解各种领域元素之间的联系，从而推进理论和实证研究（[van
    Raan 2005](#ch12.xhtml#r177)）。因此，结合这些方法可以揭示通过使用单一方法无法获得的有价值信息。'
- en: 4.2.2 Review process
  id: totrans-840
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4.2.2 审查过程
- en: A literature review by bibliometric analysis is performed to synthesize and
    classify knowledge, identify main categories and themes, and suggest future research
    ([Xia et al. 2018](#ch12.xhtml#r181)). The three-stage review process was carried
    out as [Luc (2018)](#ch12.xhtml#r157) suggested.
  id: totrans-841
  prefs: []
  type: TYPE_NORMAL
  zh: 通过文献计量分析进行的文献综述旨在综合和分类知识，识别主要类别和主题，并提出未来研究（[Xia 等人 2018](#ch12.xhtml#r181)）。审查过程按照
    [Luc (2018)](#ch12.xhtml#r157) 的建议进行了三个阶段的审查。
- en: '4.2.2.1 Stage 1: Data collection'
  id: totrans-842
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 4.2.2.1 阶段 1：数据收集
- en: Quality journals are the basis for selecting quality publications for a bibliometric
    analysis ([Xia et al. 2018](#ch12.xhtml#r181)). Consequently, the Web of Science
    database was selected to search for English-language research papers. The terms
    “ChatGPT” and “education” were searched in a few databases using the title/abstract/keyword
    field. This chapter’s scope was limited to periods prior to October 1, 2023\.
    As a result, 326 papers in all were retrieved.
  id: totrans-843
  prefs: []
  type: TYPE_NORMAL
  zh: 质量期刊是选择用于文献计量分析的质量出版物的基础（[Xia 等人 2018](#ch12.xhtml#r181)）。因此，选择了 Web of Science
    数据库来搜索英语研究论文。在几个数据库中使用了标题/摘要/关键词字段搜索了“ChatGPT”和“教育”这两个术语。本章的范围限定在 2023 年 10 月
    1 日之前的时期。因此，总共检索到了 326 篇论文。
- en: '4.2.2.2 Stage 2: Screening'
  id: totrans-844
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 4.2.2.2 阶段 2：筛选
- en: To determine the relevance of the 326 collected publications to issues related
    to ChatGPT in education, a comprehensive review of their titles and abstracts
    was carried out in the second stage. The screening procedure was designed to remove
    publications not related to education. As a result, 136 publications were retrieved
    for the final analysis.
  id: totrans-845
  prefs: []
  type: TYPE_NORMAL
  zh: 为了确定326篇收集到的出版物与教育相关ChatGPT问题的相关性，在第二阶段对它们的标题和摘要进行了全面审查。筛选程序旨在去除与教育无关的出版物。因此，最终分析中检索到了136篇出版物。
- en: '4.2.2.3 Stage 3: Data analysis'
  id: totrans-846
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 4.2.2.3 第三阶段：数据分析
- en: Bibliographic coupling, co-citation, and co-word analyses were used to analyse
    136 publications related to issues related to ChatGPT in education. Bibliographic
    coupling analysis was mainly presented to show (1) the most influential publications,
    bibliographic coupling analysis cluster, and representative publications for each
    cluster; (2) the most influential journals of bibliographic coupling analysis
    and bibliographic coupling as a network of journals; (3) authorship; and (4) countries
    with the highest number of publications. In addition, co-citation analysis was
    presented to show (1) the most influential publications of co-citation analysis,
    co-citation analysis cluster, and representative publications for each cluster;
    (2) the most influential journals of co-citation analysis and co-citation as a
    network of journals; and (3) the most influential authors.
  id: totrans-847
  prefs: []
  type: TYPE_NORMAL
  zh: 使用文献耦合、共引和共词分析来分析与教育相关ChatGPT问题的136篇出版物。文献耦合分析主要展示以下内容：(1)最有影响力的出版物、文献耦合分析聚类以及每个聚类的代表性出版物；(2)文献耦合分析中最有影响力的期刊以及期刊之间的文献耦合网络；(3)作者；(4)出版物数量最多的国家。此外，还展示了共引分析，以展示以下内容：(1)共引分析中最有影响力的出版物、共引分析聚类以及每个聚类的代表性出版物；(2)共引分析中最有影响力的期刊以及期刊之间的共引网络；(3)最有影响力的作者。
- en: For each of the above analysis techniques, scientific maps were used to visualize
    the structure of the theoretical basis of the research topic ([Cobo et al. 2011](#ch12.xhtml#r127)).
    Networks were built and visualized for issues related to ChatGPT in education
    research by VOSviewer software ([Waltman 2017](#ch12.xhtml#r179), [van Eck and
    Waltman 2009](#ch12.xhtml#r176)). In order to reveal the structure, the smart
    local moving (SLM) algorithm method was used to cluster citations ([Waltman 2017](#ch12.xhtml#r179)).
    The bubble size represents the number of standardized citations the articles received,
    and the thickness of the lines denotes the strength of citation relations. The
    link and the distance between the two publications demonstrate the relationship’s
    strength. The colour of the bubble indicates the cluster to which the document
    belonged.
  id: totrans-848
  prefs: []
  type: TYPE_NORMAL
  zh: 对于上述每种分析技术，都使用了科学地图来可视化研究主题的理论基础结构([Cobo等人，2011](#ch12.xhtml#r127))。通过VOSviewer软件([Waltman
    2017](#ch12.xhtml#r179)，[van Eck和Waltman 2009](#ch12.xhtml#r176))构建并可视化了与教育研究相关ChatGPT问题的议题。为了揭示结构，使用了智能局部移动(SLM)算法方法对引用进行聚类([Waltman
    2017](#ch12.xhtml#r179))。气泡大小表示文章收到的标准化引用数量，线条的粗细表示引用关系的强度。两个出版物之间的链接和距离表明关系的强度。气泡的颜色表示文档所属的聚类。
- en: 4.3 Results
  id: totrans-849
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 4.3 结果
- en: 4.3.1 Bibliographic coupling analysis
  id: totrans-850
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4.3.1 文献耦合分析
- en: 4.3.1.1 Year
  id: totrans-851
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 4.3.1.1 年份
- en: All the studies were published in 2023\. This demonstrates the growth of this
    topic since ChatGPT launched**.**
  id: totrans-852
  prefs: []
  type: TYPE_NORMAL
  zh: 所有研究均于2023年发表。这表明自ChatGPT推出以来，该主题的增长**。**
- en: 4.3.1.2 Publication
  id: totrans-853
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 4.3.1.2 出版物
- en: 'The results of the bibliographic coupling analysis show the most impactful
    publications. The five articles with the highest citation count are as follows:'
  id: totrans-854
  prefs: []
  type: TYPE_NORMAL
  zh: 文献耦合分析的结果显示了最具影响力的出版物。以下是最受引用的5篇文章：
- en: 'Cotton, D. R., Cotton, P. A., & Shipway, J. R. (2023). Chatting and cheating:
    Ensuring academic integrity in the era of ChatGPT. *Innovations in Education and
    Teaching International*, 1(1), 1–12.'
  id: totrans-855
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 'Cotton, D. R., Cotton, P. A., & Shipway, J. R. (2023). Chatting and cheating:
    Ensuring academic integrity in the era of ChatGPT. *《国际教育创新与教学》*，1(1)，1–12。'
- en: 'Tlili, A., Shehata, B., Adarkwah, M. A., Bozkurt, A., Hickey, D. T., Huang,
    R., & Agyemang, B. (2023). What if the devil is my guardian angel: ChatGPT as
    a case study of using chatbots in education. *Smart Learning Environments*, 10(1),
    15–39.'
  id: totrans-856
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 'Tlili, A., Shehata, B., Adarkwah, M. A., Bozkurt, A., Hickey, D. T., Huang,
    R., & Agyemang, B. (2023). What if the devil is my guardian angel: ChatGPT as
    a case study of using chatbots in education. *《智能学习环境》*，10(1)，15–39。'
- en: 'Arif, T. B., Munaf, U., & Ul-Haque, I. (2023). The future of medical education
    and research: Is ChatGPT a blessing or blight in disguise?. *Medical education
    online*, 28(1), 1–2.'
  id: totrans-857
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: Arif, T. B., Munaf, U., & Ul-Haque, I. (2023). 医学教育和研究的未来：ChatGPT是福是祸？*医学教育在线*，28(1)，1–2。
- en: 'Lim, W. M., Gunasekara, A., Pallant, J. L., Pallant, J. I., & Pechenkina, E.
    (2023). Generative AI and the future of education: Ragnarök or reformation? A
    paradoxical perspective from management educators. *The International Journal
    of Management Education*, 21(2), 1–13.'
  id: totrans-858
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: Lim, W. M., Gunasekara, A., Pallant, J. L., Pallant, J. I., & Pechenkina, E.
    (2023). 生成式AI和教育的未来：是末日还是改革？管理教育者的悖论视角。*国际管理教育杂志*，21(2)，1–13。
- en: Lo, C. K. (2023). What is the impact of ChatGPT on education? A rapid review
    of the literature. *Education Sciences*, 13(4), 410–425.
  id: totrans-859
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: Lo, C. K. (2023). ChatGPT对教育的影响是什么？文献快速综述。*教育科学*，13(4)，410–425。
- en: Bibliographic coupling network was presented in [Figure 4.1](#ch12.xhtml#f7).
    Bibliographic coupling network formed six clusters. The clusters and representative
    publications were presented in [Table 4.1](#ch12.xhtml#t6).
  id: totrans-860
  prefs: []
  type: TYPE_NORMAL
  zh: 在[图4.1](#ch12.xhtml#f7)中展示了书目耦合网络。书目耦合网络形成了六个群组。群组和代表性出版物在[表4.1](#ch12.xhtml#t6)中展示。
- en: '![A network diagram depicts interconnected nodes labeled with author names
    and publication year, 2023\. Nodes are colored in clusters. Notable large nodes
    include Lo 2023, Cotton 2023, Perkins 2023 b, Arif 2023, and Tlili 2023.](html/images/9781032716084_C004_001.jpg)'
  id: totrans-861
  prefs: []
  type: TYPE_IMG
  zh: '![一个网络图展示了用作者姓名和出版年份标注的相互连接的节点，2023年。节点按群组着色。显著的较大节点包括Lo 2023、Cotton 2023、Perkins
    2023 b、Arif 2023和Tlili 2023。](html/images/9781032716084_C004_001.jpg)'
- en: '[Figure 4.1](#ch12.xhtml#f7b) Bibliographic coupling network of publications.'
  id: totrans-862
  prefs: []
  type: TYPE_NORMAL
  zh: '[图4.1](#ch12.xhtml#f7b) 出版物书目耦合网络。'
- en: Cluster 1
  id: totrans-863
  prefs: []
  type: TYPE_NORMAL
  zh: 群组 1
- en: The investigation of ChatGPT in educational contexts is the main topic of this
    cluster. The articles in this cluster look into how students accept and use ChatGPT,
    how it affects learning, and how it might be used in medical education. The articles
    collectively explore the consequences of integrating AI and ChatGPT into educational
    environments, raising questions about its benefits and challenges.
  id: totrans-864
  prefs: []
  type: TYPE_NORMAL
  zh: 本群组的主要主题是教育背景下ChatGPT的研究。本群组的文章探讨了学生如何接受和使用ChatGPT，它如何影响学习，以及它可能在医学教育中如何被使用。这些文章共同探讨了将AI和ChatGPT整合到教育环境中的后果，提出了关于其利益和挑战的问题。
- en: Cluster 2
  id: totrans-865
  prefs: []
  type: TYPE_NORMAL
  zh: 群组 2
- en: The ethical implications of ChatGPT in education are examined in Cluster 2\.
    These articles address the use of chatbots in the classroom, investigate the need
    for moral leadership in AI applications, and present a counterintuitive viewpoint
    on the application of generative AI in the classroom. This cluster also examines
    the validity of assessments made with ChatGPT in educational settings.
  id: totrans-866
  prefs: []
  type: TYPE_NORMAL
  zh: 群组2考察了ChatGPT在教育中的伦理影响。这些文章讨论了课堂中使用聊天机器人的问题，调查了在AI应用中道德领导力的需求，并提出了关于课堂中应用生成式AI的出人意料的观点。本群组还考察了在教育环境中使用ChatGPT进行的评估的有效性。
- en: Cluster 3
  id: totrans-867
  prefs: []
  type: TYPE_NORMAL
  zh: 群组 3
- en: This cluster focuses on ChatGPT in particular and the problem of academic integrity
    in the context of AI. The articles discuss issues with academic integrity brought
    up by large language models like ChatGPT, evaluate the viability of AI agents
    in passing academic courses, and look at considerations for using AI text-generation
    software.
  id: totrans-868
  prefs: []
  type: TYPE_NORMAL
  zh: 本群组特别关注ChatGPT及其在人工智能背景下学术诚信的问题。文章讨论了由ChatGPT等大型语言模型引发的学术诚信问题，评估了AI代理通过学术课程的可行性，并探讨了使用AI文本生成软件的考虑因素。
- en: Cluster 4
  id: totrans-869
  prefs: []
  type: TYPE_NORMAL
  zh: 群组 4
- en: In the ChatGPT era, Cluster 4 is devoted to the crucial topic of academic integrity.
    These articles assess ChatGPT’s effects on education and discuss ways to uphold
    academic integrity. A few articles examine users’ first impressions of ChatGPT
    in particular subject areas.
  id: totrans-870
  prefs: []
  type: TYPE_NORMAL
  zh: 在ChatGPT时代，群组4致力于学术诚信这一关键主题。这些文章评估了ChatGPT对教育的影响，并讨论了维护学术诚信的方法。一些文章特别考察了特定学科领域用户对ChatGPT的第一印象。
- en: Cluster 5
  id: totrans-871
  prefs: []
  type: TYPE_NORMAL
  zh: 群组 5
- en: Articles in this cluster examine how AI – ChatGPT in particular – and education
    can work together. They review how AI will affect nursing and midwifery practice,
    emphasize how ChatGPT and human teachers work well together, and speculate about
    how AI will teach digital writing in the post-pandemic era.
  id: totrans-872
  prefs: []
  type: TYPE_NORMAL
  zh: 本群组的文章探讨了AI（特别是ChatGPT）和教育如何协同工作。它们回顾了AI将如何影响护理和助产实践，强调ChatGPT和人类教师如何良好合作，并推测AI在疫情后时代将如何教授数字写作。
- en: Cluster 6
  id: totrans-873
  prefs: []
  type: TYPE_NORMAL
  zh: 群组 6
- en: The intersection of AI, education, and emerging technologies is the research
    subject in Cluster 6\. The notions of intelligence and the function of AI in assessing
    student performance are discussed in these articles. In order to highlight ChatGPT’s
    potential and implications for education, they also perform a SWOT analysis of
    the technology in educational practice and research.
  id: totrans-874
  prefs: []
  type: TYPE_NORMAL
  zh: AI、教育和新兴技术的交叉点是第6集群的研究主题。这些文章讨论了智能的概念以及AI在评估学生表现中的功能。为了突出ChatGPT在教育实践和研究中的潜力和影响，他们还对这项技术在教育实践中的SWOT分析进行了研究。
- en: Cluster 7
  id: totrans-875
  prefs: []
  type: TYPE_NORMAL
  zh: 集群7
- en: This cluster focuses on ChatGPT’s function in health professions and medical
    education. The articles in this category explore ChatGPT’s potential for teaching
    medical terminology, evaluate its effects on medical education and research, and
    talk about the moral application of AI in healthcare education. The cluster, as
    a whole, tackles the changing face of AI in medical education and healthcare.
  id: totrans-876
  prefs: []
  type: TYPE_NORMAL
  zh: 这个集群关注ChatGPT在医疗专业和医学教育中的功能。这类文章探讨了ChatGPT在教授医学术语、评估医学教育和研究的影响以及讨论AI在医疗教育中的道德应用方面的潜力。作为一个整体，这个集群探讨了AI在医学教育和医疗保健中的变化面貌。
- en: Cluster 8
  id: totrans-877
  prefs: []
  type: TYPE_NORMAL
  zh: 集群8
- en: A collection of articles about ChatGPT’s application in academic advising and
    assessment in educational settings are collected in this cluster. The articles
    examine ChatGPT’s present situation and how academic advising could empower students.
    They also examine ChatGPT’s use in medical school settings and concentrate on
    evaluating the academic responses it produces. In addition, the cluster questions
    whether the educational system is prepared for the arrival of AI and examines
    the benefits and drawbacks of conventional assessment techniques, such as undergraduate
    oral exams in physical chemistry.
  id: totrans-878
  prefs: []
  type: TYPE_NORMAL
  zh: 本集群收集了关于ChatGPT在教育环境中的学术咨询和评估应用的系列文章。这些文章分析了ChatGPT的现状以及学术咨询如何赋能学生。它们还探讨了ChatGPT在医学院环境中的应用，并专注于评估其产生的学术回应。此外，本集群质疑教育体系是否为AI的到来做好了准备，并探讨了传统评估技术（如物理化学本科口试）的利弊。
