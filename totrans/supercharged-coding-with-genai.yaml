  - PREF_H1
  type: TYPE_NORMAL
- en: Your Quickstart Guide to OpenAI API
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: '**Generative artificial intelligence** (**GenAI**) platforms such as OpenAI
    are transforming entire industries by empowering everyday users to generate custom
    answers to questions, reports, and images. You do not have to be an AI expert
    to leverage OpenAI to supercharge your software development. This chapter focuses
    on setting up OpenAI and using its **application programming interface** (**API**)
    calls to generate quality code.'
  prefs: []
  type: TYPE_NORMAL
- en: OpenAI offers numerous services such as chat, image generation, and text-to-speech.
    These are available through a **RESTful HTTP** request, which is a standard way
    for applications to communicate over the web, or through a programmatic interface
    of the `openai` Python package.
  prefs: []
  type: TYPE_NORMAL
- en: In our first quickstart guide of the book, we will walk through three interactive
    labs and three sets of requests, working with the OpenAI Chat service. We will
    dive into the different models available through OpenAI API, and how to impact
    the AI-generated output.
  prefs: []
  type: TYPE_NORMAL
- en: We will obtain our project API keys, analyze the services’ limits, and learn
    how to compute each request’s costs. The costs are computed from the number of
    **tokens** or subword fragments of the model’s input and output.
  prefs: []
  type: TYPE_NORMAL
- en: We will wrap up this chapter by creating a basic code completion program that
    can generate a Python code implementation based on a function signature.
  prefs: []
  type: TYPE_NORMAL
- en: 'In this chapter, we will explore the following topics:'
  prefs: []
  type: TYPE_NORMAL
- en: Introducing OpenAI API
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Obtaining your project API keys from OpenAI
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Sending your first OpenAI API request using the `openai` Python package
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Learning how request costs are calculated
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Understanding rate limits and usage restrictions for free and paid OpenAI accounts
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Analyzing request parameters
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Using OpenAI API to generate code
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Technical requirements
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'To get the most out of this chapter, ensure you have the following:'
  prefs: []
  type: TYPE_NORMAL
- en: Your personal OpenAI account credentials
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Access to the book’s GitHub repository, which is available at [https://github.com/PacktPublishing/Supercharged-Coding-with-Gen-AI](https://github.com/PacktPublishing/Supercharged-Coding-with-Gen-AI)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A virtual environment set up in your **integrated development environment**
    (**IDE**), either VS Code or PyCharm
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: If you require additional assistance in setting up your OpenAI account or a
    virtual environment in your IDE, refer to the *Appendix* for detailed instructions.
  prefs: []
  type: TYPE_NORMAL
- en: Introducing OpenAI API
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: The OpenAI platform offers a variety of **natural language processing** (**NLP**)
    services, powering many AI applications. At its core, the platform leverages **large
    language models** (**LLMs**) that are trained on a massive amount of data, with
    a complex architecture and billions of learnable parameters to produce AI-generated
    responses. Developers can interact with the platform through its API with text-based
    requests that are often called **prompts**. The prompts are processed, enriched,
    and transformed before being passed into the LLM model. The model’s output is
    further refined and delivered as a response to the API request.
  prefs: []
  type: TYPE_NORMAL
- en: 'The Chat service by OpenAI is designed for conversational interactions with
    the LLM where the conversation uses three types of prompt roles – user, system,
    and assistant:'
  prefs: []
  type: TYPE_NORMAL
- en: '**User prompts** represent an end user of the system such as a ChatGPT user,
    and resemble prompts we feed into ChatGPT, such as `Tell me about the Fibonacci
    sequence.`'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Assistant prompts** represent the model output through the conversation and
    resemble answers we will get back from ChatGPT, such as `The Fibonacci sequence
    is a series of numbers where each number is the sum of the two preceding ones.`'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**System prompts** define the guidelines of the assistant behavior through
    the conversation, such as `You are a helpful programming instructor.`'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Like many other GenAI tools in the industry, the OpenAI API calls are primarily
    a paid service. It does offer some limited free usage such as three requests per
    minute to a restricted selection of models, excluding *GPT-4o*. With just $5 in
    OpenAI credits, you can fully engage with the examples and labs presented in this
    book. We will instruct you how to do this right after our initial *Lab 2.1*.
  prefs: []
  type: TYPE_NORMAL
- en: OpenAI API through a RESTful HTTP request
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'The OpenAI API services are accessed via **RESTful HTTP requests**, a communication
    protocol based on the principles of **Representational State Transfer** (**REST**)
    architecture, and using the **HyperText Transfer Protocol** (**HTTP**). RESTful
    HTTP provides a standardized way to send and retrieve data from servers over the
    internet. A request to OpenAI API includes four key components:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Endpoint**: The URL specifying the service you are accessing, such as [https://api.openai.com/v1/chat/completions](https://api.openai.com/v1/chat/completions)
    for the Chat service'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**HTTP method**: The action to perform, such as `POST` for OpenAI Chat service
    requests, which sends data to the server'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Headers**: Metadata about the request, including your API token, to authenticate
    and provide context for the request'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Body**: The data payload containing details such as the LLM to use and the
    input prompts'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Here is an example of a request to the OpenAI API Chat service using the `requests`
    package in Python. It demonstrates how to make a `POST` request to the service,
    including a header with your API key for authentication and a body containing
    the data payload, such as the model and a prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: '![](../Images/3.png) **Quick tip**: Enhance your coding experience with the
    **AI Code Explainer** and **Quick Copy** features. Open this book in the next-gen
    Packt Reader. Click the **Copy** button'
  prefs: []
  type: TYPE_NORMAL
- en: (**1**) to quickly copy code into your coding environment, or click the **Explain**
    button
  prefs: []
  type: TYPE_NORMAL
- en: (**2**) to get the AI assistant to explain a block of code to you.
  prefs: []
  type: TYPE_NORMAL
- en: '![A white background with a black text  AI-generated content may be incorrect.](../Images/image_%282%29.png)'
  prefs: []
  type: TYPE_IMG
- en: '**![](../Images/4.png)** **The next-gen Packt Reader** is included for free
    with the purchase of this book. Scan the QR code OR visit packtpub.com/unlock,
    then use the search bar to find this book by name. Double-check the edition shown
    to make sure you get the right one.'
  prefs: []
  type: TYPE_NORMAL
- en: '![A qr code on a white background  AI-generated content may be incorrect.](../Images/Split-B-PEN-Unlock-QR.png)'
  prefs: []
  type: TYPE_IMG
- en: Note that this code sample can also be found at the book’s repository path,
    *ch2/code_samples/openai_request.py*.
  prefs: []
  type: TYPE_NORMAL
- en: In this example, the payload is submitted in JSON format. If the request is
    successfully accepted and the server responds, the OpenAI API Chat service’s output
    can be retrieved from `response.json()["choices"][0]["message"]["content"]`.
  prefs: []
  type: TYPE_NORMAL
- en: For Python developers, a more efficient approach to accessing the OpenAI Chat
    service is available. Rather than dealing with the complexities of crafting and
    sending RESTful HTTP requests, such as constructing the correct endpoint URL,
    setting authentication tokens in headers, formatting payloads in JSON, and handling
    potential response errors, we can leverage the dedicated `openai` package.
  prefs: []
  type: TYPE_NORMAL
- en: OpenAI API Python package installation
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The `openai` Python package simplifies the process by abstracting complexities
    such as URL paths, retries, error handling, and authentication. This allows us
    to interact directly with Python objects, instead of manually constructing RESTful
    HTTP requests.
  prefs: []
  type: TYPE_NORMAL
- en: 'To install the `openai` package, run the following command in your terminal
    within your virtual environment:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: 'To verify that the `openai` package is installed correctly on your virtual
    environment, run the following command, which specifies the information of the
    package:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: Your console will output information about the package version, author, and
    support email.
  prefs: []
  type: TYPE_NORMAL
- en: With the `openai` package installed, we can simplify our interactions with the
    OpenAI platform using a programmatic framework. Instead of making direct RESTful
    HTTP requests, we will utilize Python classes. This results in fewer boilerplates,
    such as handling authentication and error management, and a more maintainable
    code.
  prefs: []
  type: TYPE_NORMAL
- en: Important note
  prefs: []
  type: TYPE_NORMAL
- en: If you are already working with the book repository, you do not need to install
    the `openai` package separately. It is already specified in the `requirements.txt`
    file and should be installed in your virtual environment. If you require additional
    assistance in setting up your virtual environments, refer to the *Appendix* for
    detailed instructions.
  prefs: []
  type: TYPE_NORMAL
- en: Obtaining your project API keys from OpenAI
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: All requests to OpenAI API require an authentication token, and we must obtain
    one prior to submitting any request.
  prefs: []
  type: TYPE_NORMAL
- en: Navigate to [https://platform.openai.com](https://platform.openai.com) and log
    in with the same credentials as you use for ChatGPT at [https://chat.openai.com/](https://chat.openai.com/).
  prefs: []
  type: TYPE_NORMAL
- en: Once logged in, click on **Dashboard** in the upper-right menu, then select
    **API keys** from the left menu.
  prefs: []
  type: TYPE_NORMAL
- en: Recently, OpenAI replaced personal API keys with the option to create a project
    API key. This new key serves two purposes. First, it allows personal use, as required
    for the work throughout this book. Second, it supports service API keys intended
    for non-human identities such as microservices running in production.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 2.1: Project API keys dashboard](../Images/B31534_02_1.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 2.1: Project API keys dashboard'
  prefs: []
  type: TYPE_NORMAL
- en: To generate your first API key, click on **Create new secret key** under your
    account icon at the upper left. Choose an API key that is owned by **You**, as
    we will use this key rather than assign it to a service account. You can assign
    a name for future reference, and it should be associated with a project (named
    *default project* if you have not changed the project name yet).
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 2.2: Creating a new secret key for personal use](../Images/B31534_02_2.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 2.2: Creating a new secret key for personal use'
  prefs: []
  type: TYPE_NORMAL
- en: Once you click on **Create secret key**, the platform will generate a new secret
    key for you.
  prefs: []
  type: TYPE_NORMAL
- en: 'Return to your IDE, either VS Code or PyCharm, and export it as an environment
    variable from your terminal by running the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: 'Alternatively, for a reproducible environment, you can use the *.env* file
    template provided with this book’s repository:'
  prefs: []
  type: TYPE_NORMAL
- en: "![Figure 2.3: The .env file template, placed at the root of the repositor\uFEFF\
    y](../Images/B31534_02_3.png)"
  prefs: []
  type: TYPE_IMG
- en: 'Figure 2.3: The .env file template, placed at the root of the repository'
  prefs: []
  type: TYPE_NORMAL
- en: If you choose to work with *.env* for your environment variables management,
