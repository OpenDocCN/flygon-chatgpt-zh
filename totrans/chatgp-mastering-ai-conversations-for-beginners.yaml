- en: '****I**n** ****Ma**rch** ****20**23**, ****Op**enA**I ****rel**ease**d ****th**eir**
    ****la**tes**t ****ver**sio**n ****o**f** ****th**eir** ****te**xt**-****gene**ratin**g
    ****A**I**, ****G**PT**-****4****. ****Th**ere** ****we**re** ****a**** ****nu**mbe**r
    ****o**f** ****impr**ovemen**ts ****ma**de** ****bet**wee**n ****G**PT**-****3****
    ****a**nd** ****t**he** ****fo**urt**h ****ver**sio**n, ****incl**udin**g ****t**he**
    ****G**PT**-****3****.****5**** ****se**rie**s ****du**rin**g ****wh**ich** ****t**he**
    ****conv**ersati**on ****gene**ratin**g ****cha**tbo**t ****ca**lle**d ****Cha**tGP**T
    ****w**as** ****rel**ease**d. ****Wh**ile** ****G**PT**–****4**** ****w**as**
    ****a**n** ****upg**rad**e ****o**f** ****t**he** ****3****.****5**** ****mo**del**,
    ****t**he** ****upg**rade**s ****ma**de** ****we**re** ****cru**cia**l ****t**o**
    ****i**ts** ****cont**inue**d ****suc**ces**s ****wi**th** ****t**he** ****gen**era**l
    ****pu**bli**c. ****T**he** ****Cha**tGP**T ****run**nin**g ****o**n** ****G**PT**-****3****.****5****
    ****wa**sn**’****t**** ****al**way**s ****fact**uall**y ****cor**rec**t, ****of**ten**
    ****wr**ote** ****offe**nsiv**e ****mat**eria**l, ****a**nd** ****w**as** ****bec**omin**g
    ****a**** ****pro**ble**m ****n**ot** ****on**ly** ****f**or** ****Op**enA**I,
    ****b**ut** ****al**so** ****f**or** ****t**he** ****pe**opl**e ****us**ing**
    ****i**t**.'
  id: totrans-391
  prefs: []
  type: TYPE_NORMAL
  zh: 在2023年3月20日，OpenAI发布了他们最新的文本生成AI版本，GPT-4。在此版本中，与GPT-3相比，进行了许多改进，包括在GPT-3.5系列期间发布的对话生成聊天机器人ChatGPT。虽然GPT-4是3.5模型的升级版，但所做的升级对它在公众中的持续成功至关重要。在GPT-3.5上运行的ChatGPT并不总是事实准确，经常写出冒犯性的材料，并且正成为一个问题，不仅对OpenAI，也对使用它的人们来说都是一个问题。
- en: '****A**s** ****su**ch**, ****G**PT**-****4**** ****w**as** ****lab**ele**d
    ****a**** ****mo**del** “****alig**nmen**t” ****upg**rad**e. ****I**n** ****ot**her**
    ****wo**rds**, ****ali**gnin**g ****Cha**tGP**T ****mo**re** ****wi**th** ****go**od**
    ****th**an** ****wi**th** ****ev**il**, ****a**nd** ****ma**kin**g ****su**re**
    ****th**at** ****wh**at** ****i**t** ****st**ate**s ****a**s** ****fa**ct** ****li**nes**
    ****u**p** ****wi**th** ****t**he** ****tr**uth**. ****Ot**her** ****th**an**
    ****be**tte**r ****alig**nmen**t ****wi**th** ****t**he** ****mo**ral**s ****o**f**
    ****civi**lize**d ****soc**iet**y, ****t**he** ****fo**urt**h ****iter**atio**n
    ****al**so** ****s**aw** ****a**n** ****imp**rove**d ****abi**lit**y ****t**o**
    ****fo**llo**w ****t**he** ****inte**ntion**s ****a**nd** ****ad**apt** ****t**o**
    ****t**he** ****beh**avio**r ****o**f** ****i**ts** ****us**ers**. ****Th**is**
    ****i**s** ****ca**lle**d ****t**he** “****stee**rabili**ty” ****o**f** ****mac**hin**e
    ****lea**rnin**g ****sof**twar**e. ****T**he** ****fi**nal** ****st**ep** ****t**o**
    ****bri**ngin**g ****Cha**tGP**T ****fu**lly** ****ba**ck** ****i**n** ****li**ne**
    ****wi**th** ****wh**at** ****i**s** ****exp**ecte**d ****o**f** ****a**** ****resp**ectabl**e
    ****algo**rith**m ****w**as** ****put**tin**g ****i**n** ****pl**ace** ****enf**orce**d
    ****rest**rictio**ns. ****I**n** ****ot**her** ****wo**rds**, ****i**f** ****som**eon**e
    ****we**re** ****t**o**, ****s**ay**, ****a**sk** ****Cha**tGP**T ****t**o** ****d**o**
    ****some**thin**g ****ill**ega**l ****o**r** ****pro**duc**e ****some**thin**g
    ****uns**avor**y, ****i**t**’****s**** ****n**ow** ****mu**ch** ****be**tte**r
    ****a**t** ****sa**yin**g ****n**o**.'
  id: totrans-392
  prefs: []
  type: TYPE_NORMAL
  zh: '**正如**如此，**GPT-4**被标记为一个“**对齐**”模型升级。换句话说，让ChatGPT与善行而非恶行更紧密地结合，并确保它所说的每一条事实都符合真理。除了与文明社会的道德更好地对齐之外，第四代还看到了在遵循用户意图和适应用户行为方面的能力提升。这被称为机器学习软件的“**稳定性**”。将ChatGPT完全在线回归到期望的、可敬的算法应有的水平，最后一步是实施更严格的限制。换句话说，如果有人要求ChatGPT做违法的事情或生产令人反感的东西，现在它拒绝的几率要大得多。'
- en: '****Bes**ide**s ****bri**ngin**g ****t**he** ****pro**gra**m ****ba**ck** ****i**n**
    ****li**ne**, ****ano**the**r ****ma**jor** ****up**dat**e ****G**PT** ****rec**eive**d
    ****w**as** ****th**at** ****G**PT**-****4**** ****c**an** ****reco**gniz**e ****n**ot**
    ****on**ly** ****te**xt**, ****b**ut** ****im**age**s ****t**oo**. ****A**nd**,
    ****a**s** ****th**ey** ****s**ay**, ****a**** ****pic**tur**e ****sp**eak**s
    ****a**** ****tho**usan**d ****wo**rds**. ****S**o** ****f**ar**, ****G**PT**-****4****
    ****h**as** ****be**en** ****ab**le** ****t**o** ****corr**ectl**y ****ide**ntif**y
    ****ch**art**s ****a**nd** ****gr**aph**s, ****me**mes**, ****a**nd** ****ev**en**
    ****scre**enshot**s ****ta**ken** ****o**f** ****com**ple**x ****aca**demi**c
    ****pa**per**s.'
  id: totrans-393
  prefs: []
  type: TYPE_NORMAL
  zh: '**除了将程序回归正轨之外，GPT还收到了另一个重大更新，那就是GPT-4不仅能识别文本，还能识别图像。正如他们所说，一图胜千言。到目前为止，GPT-4已经能够正确识别图表和图形、表情包，甚至是从复杂的学术论文中截取的屏幕截图。'
- en: '****G**PT**-****4**** ****i**s** ****al**so** ****a**** ****mu**ch** ****be**tte**r
    ****pro**ble**m ****so**lve**r ****th**an** ****i**ts** ****pred**ecesso**rs.
    ****Bo**th** ****G**PT**-****3****.****5**** ****a**nd** ****G**PT**-****4****
    ****h**ad** ****t**o** ****g**o** ****thr**oug**h ****rig**orou**s ****scho**olin**g,
    ****incl**udin**g ****sit**tin**g ****th**eir** ****hi**gh**-****sc**hoo**l ****SA**Ts**
    ****a**nd** ****adv**ance**d ****plac**emen**t ****te**sts**, ****th**en** ****mo**vin**g
    ****o**n** ****t**o** ****th**eir** ****col**leg**e ****gra**duat**e ****re**cor**d
    ****exam**inatio**n (****GR**Es**), ****be**for**e ****fin**all**y ****sit**tin**g
    ****t**he** ****la**wye**r’****s**** ****b**ar** ****ex**am**. ****Th**ey** ****th**en**
    ****bra**nche**d ****o**ut** ****in**to** ****somm**elie**r ****ex**ams** ****t**o**
    ****be**com**e ****wi**ne** ****ste**ward**s ****wi**th** ****l**aw** ****deg**ree**s.
    ****G**PT**-****4**** ****outp**erform**ed ****i**ts** ****pred**ecesso**r ****i**n**
    ****a**ll** ****asp**ect**s, ****achi**evin**g ****hu**man**-****le**vel** ****sc**ore**s
    ****i**n** ****al**mos**t ****ever**ythin**g. ****Th**oug**h ****th**ere** ****w**as**
    ****o**ne** ****sub**jec**t ****th**at** ****G**PT**-****4**** ****ju**st** ****co**uld**n’****t****
    ****g**et**: ****Eng**lis**h ****lan**guag**e ****a**nd** ****lite**ratur**e.'
  id: totrans-394
  prefs: []
  type: TYPE_NORMAL
  zh: '**G**PT-**4** 也是一个比其前辈们更优秀的**问题解决者**。**G**PT-**3**.**5** 和 **G**PT-**4** 都必须经历严格的**学校教育**，包括参加他们的高中**SATs**和**高级
    placement**考试，然后**移动**到他们的**大学**毕业记录考试（**GREs**），最终**参加**律师的**bar**考试。**G**PT-**4**
    在所有方面都优于其前辈，几乎在所有事情上都取得了**人类水平**的分数。尽管有一个主题**G**PT-**4** **几乎**无法取得：**英语语言和文学**。'
- en: '****A**I**’****s**** ****Po**ste**r ****Ch**ild**: ****Stre**ngth**s ****o**f**
    ****Cha**tGP**T'
  id: totrans-395
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**人工智能**的**后裔**：**ChatGPT** 的**优势**'
- en: '****A**s** ****w**e**’****v**e** ****se**en** ****s**o** ****f**ar**, ****Cha**tGP**T
    ****i**s** ****o**ne** ****groun**dbreaki**ng ****pi**ece** ****o**f** ****wo**rk**.
    ****I**n** ****t**he** ****sh**ort** ****ti**me** ****si**nce** ****i**ts** ****rel**eas**e,
    ****i**t** ****h**as** ****alr**ead**y ****pu**she**d ****t**he** ****boun**darie**s
    ****o**f** ****wh**at** ****A**I** ****i**s** ****cap**abl**e ****o**f**, ****set**tin**g
    ****in**to** ****mo**tio**n ****t**he** ****ne**xt** ****wa**ve** ****i**n** ****A**I**
    ****inno**vatio**n ****a**nd** ****techn**ologic**al ****deve**lopmen**t: ****Wh**at**
    ****w**e** ****co**uld** ****ca**ll** ****A**I**’****s**** ****conve**rsation**al
    ****revo**lutio**n. ****Bi**ll** ****Ga**tes**, ****t**he** ****fou**nde**r ****o**f**
    ****Micr**osof**t ****a**nd** ****t**he** ****wo**rld**’****s**** ****si**xth**
    ****ric**hes**t ****m**an**, ****on**ce** ****comm**ente**d ****th**at** ****Cha**ptGP**T
    ****i**s** ****o**ne** ****o**f** ****t**wo** ****techn**ologic**al ****st**eps**
    ****for**war**d ****th**at** ****h**e** ****wo**uld** ****con**side**r ****t**o**
    ****b**e** ****revol**utiona**ry. ****H**e** ****we**nt** ****o**n** ****t**o**
    ****s**ay**, “[****Cha**tGP**T] ****ins**pire**d ****m**e** ****t**o** ****th**ink**
    ****ab**out** ****a**ll** ****t**he** ****th**ing**s ****th**at** ****A**I** ****c**an**
    ****ach**iev**e ****i**n** ****t**he** ****ne**xt** ****fi**ve** ****t**o** ****t**en**
    ****ye**ars**” (****Ram**pto**n, ****20**23**).'
  id: totrans-396
  prefs: []
  type: TYPE_NORMAL
  zh: '**正如**我们迄今为止所看到的，**ChatGPT** 是一项**开创性**的工作。**自从**其发布以来，它已经推动了**人工智能**能够做到的事情的**边界**，**推动**人工智能创新和技术发展的**下一波**：我们可以称之为**人工智能**的**对话革命**。**比尔·盖茨**，**微软**的创始人，也是世界第六大**富豪**，曾**评论**说，**ChatGPT**
    是他认为是**革命性**的两个技术步骤之一。**他说**，“[**ChatGPT**]让我开始思考未来五到十年内人工智能可以做到的所有事情”（**Rampton,
    2023**）。'
- en: “****I**t** ****wi**ll** ****ch**ang**e ****t**he** ****w**ay** ****pe**opl**e
    ****wo**rk**, ****le**arn**, ****tr**ave**l, ****g**et** ****he**alt**h ****ca**re**,
    ****a**nd** ****comm**unicat**e ****wi**th** ****ea**ch** ****ot**her**. ****En**tir**e
    ****indu**strie**s ****wi**ll** ****reo**rien**t ****ar**oun**d ****i**t**. ****Busi**nesse**s
    ****wi**ll** ****dist**inguis**h ****them**selve**s ****b**y** ****h**ow** ****we**ll**
    ****th**ey** ****u**se** ****i**t**” (****Ram**pto**n, ****20**23**).
  id: totrans-397
  prefs: []
  type: TYPE_NORMAL
  zh: “**I**t **wi**ll **ch**ang**e **t**he **w**ay **pe**opl**e **wo**rk**, **l**earn**,
    **tr**a**v**e**, **g**et **t**he **h**e**alt**h **c**a**re**, **a**nd **c**omm**uni**c**at**e
    **w**i**th** **ea**ch **ot**her**. **En**tir**e **i**nd**u**stries **wi**ll **r**eo**rien**t
    **a**rou**n**d **i**t**. **Bus**i**nesse**s **wi**ll **d**is**tinguish **t**hem**sel**ves
    **b**y** **h**ow **w**ell **t**hey **u**se **i**t**” (****R**a**m**p**t**o**n,
    ****20**2**3**).
- en: '****A**nd** ****Ga**tes** ****i**sn**’****t**** ****al**one** ****i**n** ****beli**evin**g
    ****th**at** ****Cha**tGP**T ****i**s** ****tr**uly** ****revol**utiona**ry. ****Acco**rdin**g
    ****t**o** ****a**** ****st**udy** ****car**rie**d ****o**ut** ****b**y** ****t**he**
    ****Sw**iss** ****ba**nk** ****U**BS**, ****Cha**tGP**T ****i**s** ****t**he**
    “****fas**tes**t-****gro**win**g ****con**sume**r ****appl**icatio**n ****i**n**
    ****his**tor**y” (****Go**rdo**n, ****20**23**). ****N**ow** ****th**at** ****w**e**’****v**e**
    ****ta**lke**d ****u**p** ****t**he** ****cha**tbo**t ****a**** ****b**it**, ****l**et**’****s****
    ****g**et** ****t**o** ****t**he** ****spec**ific**s ****o**f** ****wh**at** ****exa**ctl**y
    ****ma**kes** ****i**t** ****s**o** ****gr**eat**.'
  id: totrans-398
  prefs: []
  type: TYPE_NORMAL
  zh: '****A**nd **G**a**t**e**s **i**s **n**’**t **a**l**o**n**e **i**n **b**e**l**i**e**v**i**n**g
