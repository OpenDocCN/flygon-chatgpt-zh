  id: totrans-469
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，在教育领域，增强现实与多模态人工智能相结合可以创造出深度互动的学习体验。学生可以沉浸在关于他们正在学习主题的情境信息中，而人工智能则能够引导他们，回答他们的问题，甚至生成帮助说明复杂概念的视觉模拟。在医学领域，外科医生可以从AR系统中受益，借助人工智能的帮助，在手术过程中实时叠加人体或解剖数据图像，提高准确性并降低风险。
