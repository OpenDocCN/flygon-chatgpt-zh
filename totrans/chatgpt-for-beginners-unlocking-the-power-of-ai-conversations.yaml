    ****i**n** ****sp**ade**s. ****Wi**th** ****pra**ctic**e ****a**nd** ****a****
    ****will**ingnes**s ****t**o** ****ite**rat**e, ****y**ou**’****l**l** ****so**on**
    ****ma**ste**r ****th**is** ****esse**ntia**l ****sk**ill** ****a**nd** ****har**nes**s
