  type: TYPE_NORMAL
  zh: '○        **问题** : "实施自动驾驶汽车在城市中的影响有哪些？"'
- en: '○        ****Exc**hang**e ****o**f** ****Pers**pectiv**es :'
  id: totrans-1412
  prefs: []
  type: TYPE_NORMAL
  zh: '○        **观点交换** :'
- en: '■ ****Ord**inar**y ****Cit**ize**n ****Pers**pectiv**e : "****Se**lf**-****dri**vin**g
    ****ca**rs** ****co**uld** ****re**duc**e ****t**he** ****st**res**s ****o**f**
    ****dri**vin**g ****a**nd** ****imp**rov**e ****sa**fet**y, ****b**ut** ****th**ere**
    ****a**re** ****con**cern**s ****ab**out** ****pri**vac**y ****a**nd** ****pote**ntia**l
    ****techn**ologic**al ****fl**aws**. "'
  id: totrans-1413
  prefs: []
  type: TYPE_NORMAL
  zh: '■ **普通市民视角** : "自动驾驶汽车可以减少驾驶压力并提高安全性，但关于隐私和潜在的技术缺陷也存在担忧。"'
- en: '■ ****Ta**xi** ****Dr**ive**r''****s**** ****Pers**pectiv**e : "****T**he**
    ****intr**oducti**on ****o**f** ****se**lf**-****dri**vin**g ****ca**rs** ****co**uld**
    ****dras**ticall**y ****re**duc**e ****empl**oymen**t ****oppor**tuniti**es ****i**n**
    ****t**he** ****trans**portati**on ****se**cto**r, ****cre**atin**g ****unce**rtaint**y
    ****ab**out** ****t**he** ****fu**tur**e ****o**f** ****t**he** ****prof**essio**n.
    "'
  id: totrans-1414
  prefs: []
  type: TYPE_NORMAL
  zh: '■ **出租车司机视角** : "自动驾驶汽车可能会大幅减少运输行业的就业机会，从而对职业的未来产生不确定性。"'
- en: '■ ****A**** ****Poli**ticia**n''****s**** ****Pers**pectiv**e : "****Se**lf**-****dri**vin**g
    ****ca**rs** ****ha**ve** ****t**he** ****pote**ntia**l ****t**o** ****imp**rov**e
    ****sa**fet**y ****a**nd** ****re**duc**e ****cong**estio**n, ****b**ut** ****regu**latio**n
    ****ne**eds** ****t**o** ****en**sur**e ****th**ey** ****a**re** ****sa**fe**
    ****a**nd** ****acce**ssibl**e ****t**o** ****eve**ryon**e. "'
  id: totrans-1415
  prefs: []
  type: TYPE_NORMAL
  zh: '■ **政治家视角** : "自动驾驶汽车有可能提高安全性和减少拥堵，但监管需要确保它们既安全又对每个人可及。"'
- en: '■ ****Pers**pectiv**e ****fr**om** ****a**n** ****Auto**mobil**e ****Manu**factur**er
    : "****Th**is** ****inno**vatio**n ****repr**esent**s ****a**** ****hu**ge** ****ma**rke**t
    ****oppo**rtunit**y, ****b**ut** ****i**t** ****al**so** ****req**uire**s ****hi**gh**
    ****inve**stment**s ****i**n** ****tech**nolog**y ****a**nd** ****cha**nge**s
    ****i**n** ****prod**uctio**n ****infra**structu**re. "'
  id: totrans-1416
  prefs: []
  type: TYPE_NORMAL
  zh: '■ **汽车制造商视角** : "这项创新代表了一个巨大的市场机遇，但也需要在高投资和技术以及生产基础设施变革方面进行大量投资。"'
