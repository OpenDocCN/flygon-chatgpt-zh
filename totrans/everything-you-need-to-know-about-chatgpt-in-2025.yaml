  id: totrans-413
  prefs: []
  type: TYPE_NORMAL
  zh: '**欧**洲**联**盟**的**通**用**数**据**保**护**规**定**（**GDPR**）是**最**具**影**响**力**的**规**定**之**一**。这**套**法**律**，**于**2018**年**实**施**，**确**立**了**一**个**严**格**的**框**架**，**以**便**保**护**个**人**数**据**。**GDPR**赋**予**用**户**更**多**的**直**接**控**制**权**，**要**求**公**司**在**收**集**数**据**前**必**须**获**得**明**确**的**同**意**，**并**且**赋**予**个**人**查**阅**、**更**正**和**删**除**其**信**息**的**权**利**。这**项**法**规**还**为**不**遵**守**其**指**导**原**则**的**组**织**设**立**了**严**厉**的**罚**款**，**这**促**使**公**司**采**取**更**负**责**的**方**式**来**处**理**数**据**。'
- en: '****I****n**** ****t****h**e** ****con**t**e**xt** ****o****f**** ****arti**f**ic**ial**
