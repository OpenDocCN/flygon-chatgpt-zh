- en: Preface
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: As a university computer science researcher and a veteran entrepreneur, I was
    profoundly impressed by experiencing firsthand the logical reasoning capabilities
    emerging from ChatGPT. Although many celebrate the efficiency enhancements in
    multimodal content creation brought by generative artificial intelligence (AI),
    the reasoning abilities displayed by ChatGPT are often underestimated. This capability
    enables ChatGPT to serve not only as the core of a new generation of human–computer
    interaction but also as an intelligent agent to build automated and semiautomated
    workflows. It can even merge with industrial control or robotics fields, thereby
    triggering profound social changes.
  prefs: []
  type: TYPE_NORMAL
- en: Many underestimate the impact of this transformation. Given the current pace
    of R&D and commercial application iterations, I expect that this transformation
    will gradually permeate all aspects of human life and production over the next
    3–5 years, greatly enhancing existing productivity and thereby initiating a series
    of changes. If asked to pinpoint the last era called a “major technological transformation,”
    many would unhesitatingly refer to the dawn of the internet. This transformation
    will also reshape business models related to content production, change existing
    work methods, and even drive changes in production methods. Of course, this still
    depends on whether the next generation of large language models can achieve breakthroughs
    in controllability of content output.
  prefs: []
  type: TYPE_NORMAL
- en: Main Content of the Book
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This book is designed to help readers deeply understand ChatGPT and its related
    technologies. It consists of 11 chapters that comprehensively explore various
    aspects.
  prefs: []
  type: TYPE_NORMAL
- en: Chapter 1 provides an in-depth analysis of the technological evolution of large
    language models, supporting technologies, and technology stacks, and discusses
    their significant impact on society.
  prefs: []
  type: TYPE_NORMAL
- en: Chapter 2 elaborates on the theoretical foundations and main components of the
    Transformer model, revealing the principles and applications behind these technologies.
  prefs: []
  type: TYPE_NORMAL
- en: Chapter 3 delves into the generative pretraining process and principles of GPT.
  prefs: []
  type: TYPE_NORMAL
- en: Chapter 4 primarily explores technologies such as layer normalization, orthogonal
    initialization, and reversible tokenization in GPT-2, and provides a detailed
    analysis of GPT-2 autoregressive generation process.
  prefs: []
  type: TYPE_NORMAL
- en: Chapter 5 introduces GPT-3 sparse attention mechanisms, metalearning, and content-based
    learning concepts, and discusses the application of Bayesian inference in conceptual
    distributions.
  prefs: []
  type: TYPE_NORMAL
- en: Chapter 6 details the pretraining datasets and data processing methods for large
    language models, as well as distributed training models and architectures.
  prefs: []
  type: TYPE_NORMAL
- en: Chapter 7 deeply analyzes the fundamental principles of the proximal policy
    optimization (PPO) algorithm.
  prefs: []
  type: TYPE_NORMAL
- en: Chapter 8 focuses on the fine-tuning datasets of reinforcement learning with
    human feedback (RLHF) and the application of PPO in InstructGPT, discussing the
    capabilities of multiturn dialog and the necessity of human feedback reinforcement
    learning.
  prefs: []
  type: TYPE_NORMAL
- en: Chapter 9 explores how to transfer large language models to specific domains
    at low resource costs.
  prefs: []
  type: TYPE_NORMAL
- en: Chapter 10 primarily introduces the middleware technologies involved in the
    development of large language models.
  prefs: []
  type: TYPE_NORMAL
- en: Chapter 11 predicts and prospects the future development trends of large language
    models.
  prefs: []
  type: TYPE_NORMAL
- en: Target Audience for This Book
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '• **Product managers in the AI field**: For product managers looking to incorporate
    AI features into their products, understanding the basic principles and operational
    mechanisms of large language models like ChatGPT is crucial. From this book, they
    can learn about the design philosophies and construction methods of large language
    models, as well as how to integrate these models into their products. They can
    also better understand the performance bottlenecks of their products, which aids
    in more precise product planning.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '• **Researchers in AI-related fields**: For AI researchers, this book can serve
    as a textbook for a deep understanding of large language models. Whether it''s
    the details of the Transformer model or tips on training and optimizing GPT models,
    this book provides thorough explanations. More importantly, this book explores
    some of the cutting-edge research areas, such as human feedback reinforcement
    learning and bootstrap labeling algorithms.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '• **Engineers specializing in large-scale data processing and analysis**: For
    engineers facing challenges such as efficiently processing large-scale data or
    building distributed training architectures, this book offers many valuable suggestions
    and ideas. For example, Chapter 6 delves deeply into data processing and distributed
    training patterns.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '• **AI enthusiasts and technologically savvy individuals in everyday life**:
    If you are an AI technology enthusiast or someone who uses technology to improve
    everyday life, this book is also suitable for you. The introduction to large language
    models in this book is easy to understand, providing a comprehensive overview
    of this powerful technology. More interestingly, this book offers many practical
    usage tips and case studies that can be directly applied to your life or work.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Contact the Author
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Given my limited writing skills, there are inevitably some inadequacies in this
    book. If you have any questions or suggestions during your reading, you can contact
    me via email at [chenggextu@hotmail.com](mailto:chenggextu@hotmail.com). I greatly
    look forward to your feedback, as it will be immensely helpful for my future writing.
    I hope you gain profound insights and deepen your understanding of large language
    models and AI while reading this book.
  prefs: []
  type: TYPE_NORMAL
- en: Acknowledgments
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: First, I would like to thank my family. During the writing of this book, the
