  zh: '**逐步**分析与**目标分解**虽然都涉及将问题分解成更小的部分，但两者有所不同。**逐步**分析侧重于通过一系列连续的、逻辑的步骤来解决一个问题，而**目标分解**则侧重于识别需要解决以实现更大目标的子目标或任务部分。'
