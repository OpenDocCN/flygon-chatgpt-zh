- en: Next in this chapter, we will explore how to use GenAI and increase the capacity
    of the functions such as algorithms with better runtime complexity and dealing
    with chunks.
  id: totrans-2196
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章的下一部分，我们将探讨如何使用GenAI和增加具有更好运行时间复杂度的函数（如算法）以及处理块的能力。
- en: Optimizing code with chained prompts
  id: totrans-2197
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 使用链式提示优化代码
- en: The previous examples depict the simple coding and estimation capability of
    LLMs. However, LLMs can do much more. They can create code for improved algorithms
    and even balance specific runtime and memory efficiency goals.
  id: totrans-2198
  prefs: []
  type: TYPE_NORMAL
  zh: 之前的例子展示了LLMs的简单编码和估计能力。然而，LLMs可以做更多。它们可以创建改进算法的代码，甚至平衡特定的运行时间和内存效率目标。
- en: 'To effectively increase the input capacities, we will **chain** our optimization
    prompt to the results of the maximal capacity prompt. The initial prompt already
    provides essential details, such as the function, runtime or memory limits, and
    profiling various inputs. The optimization prompt should also include the following
    key information:'
  id: totrans-2199
  prefs: []
  type: TYPE_NORMAL
  zh: 为了有效地增加输入容量，我们将优化提示与最大容量提示的结果**链式**连接。初始提示已经提供了基本细节，例如函数、运行时或内存限制，以及各种输入的剖析。优化提示还应包括以下关键信息：
- en: '**Optimization goal**: Clearly specify the primary goal, either on improving
    runtime complexity, reducing memory usage, or both. Detail the desired approach
    as much as possible, such as batching, or improving algorithm complexity.'
  id: totrans-2200
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**优化目标**：明确指定主要目标，无论是提高运行时间复杂度、减少内存使用，还是两者兼而有之。尽可能详细地描述期望的方法，例如批处理或提高算法复杂度。'
- en: '**Function docstring**: Provide a concise description of the function’s purpose,
    along with any constraints or requirements.'
  id: totrans-2201
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**函数文档字符串**：提供对函数目的的简洁描述，以及任何约束或要求。'
- en: '**Input requirements**: Define the new input goals under the runtime or memory
    constraints, such as computing the 1,000,000^(th) Fibonacci number or handling
    a matrix with 100,000 rows and 100,000 columns.'
  id: totrans-2202
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**输入要求**：在运行时或内存约束下定义新的输入目标，例如计算1,000,000^(th)斐波那契数或处理一个有100,000行和100,000列的矩阵。'
- en: For more complex scenarios, additional details may be helpful, such as previous
    optimization attempts, dependencies on external functions or resources, frequency
    of function calls or concurrent usage patterns, and acceptable trade-offs, such
    as allowing longer runtimes in exchange for reduced memory usage.
  id: totrans-2203
  prefs: []
  type: TYPE_NORMAL
  zh: 对于更复杂的场景，提供更多细节可能有所帮助，例如之前的优化尝试、对外部函数或资源的依赖、函数调用的频率或并发使用模式，以及可接受的权衡，例如为了减少内存使用而允许更长的运行时间。
- en: This information will be integrated into a chained prompt, following the five
    S’s for precision and clarity.
  id: totrans-2204
  prefs: []
  type: TYPE_NORMAL
  zh: 此信息将被整合到一个链式提示中，遵循五个S原则以确保精确性和清晰度。
- en: Runtime optimization
  id: totrans-2205
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 运行时间优化
- en: 'Let us examine a runtime optimization for the `fibonacci_recursive` function.
    Below is an example of a chained prompt, building on an initial prompt of maximal
    capacity as presented earlier in the chapter. This prompt requests an improved
    implementation with better runtime complexity to handle an input of 1,000,000:'
  id: totrans-2206
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们考察`fibonacci_recursive`函数的运行时间优化。下面是一个链式提示的示例，基于本章前面提出的最大容量提示。此提示请求一个改进的实现，以更好的运行时间复杂度处理1,000,000的输入：
- en: '[PRE303]'
  id: totrans-2207
  prefs: []
  type: TYPE_PRE
  zh: '[PRE303]'
- en: This prompt includes a docstring describing out specific task of optimizing
    runtime complexity to achieve the target input of 1,000,000\. Providing different
    constraints, such as a smaller input size, will yield a different output from
    the model.
  id: totrans-2208
  prefs: []
  type: TYPE_NORMAL
  zh: 此提示包含一个文档字符串，描述了我们的特定任务，即优化运行时间复杂度以实现目标输入1,000,000。提供不同的约束，如较小的输入大小，将导致模型输出不同。
- en: 'A typical approach for Fibonacci calculations has a ![](../Images/B31534_14_003.png)
    complexity, however *GPT-4o1* suggested a more efficient implementation for large
    inputs, achieving a runtime complexity of ![](../Images/B31534_14_013.png) through
    the fast-doubling recursive approach:'
  id: totrans-2209
  prefs: []
  type: TYPE_NORMAL
  zh: 一个典型的斐波那契数计算方法具有![](../Images/B31534_14_003.png)复杂度，然而*GPT-4o1*提出了一种更有效的实现方法，通过快速加倍递归方法实现了![](../Images/B31534_14_013.png)的运行时间复杂度：
- en: '![Figure 14.10: Fast-doubling approach for handling large inputs](../Images/B31534_14_10.png)'
  id: totrans-2210
  prefs: []
  type: TYPE_IMG
  zh: '![图14.10：处理大输入的快速加倍方法](../Images/B31534_14_10.png)'
- en: 'Figure 14.10: Fast-doubling approach for handling large inputs'
  id: totrans-2211
  prefs: []
  type: TYPE_NORMAL
  zh: 图14.10：处理大输入的快速加倍方法
- en: 'And here is the code proposed by *GPT-4o1*:'
  id: totrans-2212
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是*GPT-4o1*提出的代码：
- en: '[PRE304]'
  id: totrans-2213
  prefs: []
  type: TYPE_PRE
  zh: '[PRE304]'
- en: 'While this implementation also uses recursion, it makes a call to ![](../Images/B31534_14_014.png)
    (![](../Images/B31534_14_015.png)without remainder) reducing the number of function
    invocations to approximately ![](../Images/B31534_14_016.png). To illustrate its
    efficiency, here are performance comparisons for calculating the 1,000,000^(th)
    Fibonacci number:'
  id: totrans-2214
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然此实现也使用了递归，但它调用![](../Images/B31534_14_014.png) (![](../Images/B31534_14_015.png)无余数)来减少函数调用的次数，大约为![](../Images/B31534_14_016.png)。为了说明其效率，以下是计算第1,000,000个斐波那契数的性能比较：
- en: '[PRE305]'
  id: totrans-2215
  prefs: []
  type: TYPE_PRE
  zh: '[PRE305]'
- en: As another benchmark, computing the 10,000,000^(th) Fibonacci number with `fibonacci_fast_doubling`
    took 2.26 seconds, whereas the iterative approach did not complete within a 10-minute
    time limit.
  id: totrans-2216
  prefs: []
  type: TYPE_NORMAL
  zh: 作为另一个基准，使用`fibonacci_fast_doubling`计算第10,000,000个斐波那契数耗时2.26秒，而迭代方法在10分钟内未能完成。
- en: 'This method leverages the mathematical identities:'
  id: totrans-2217
  prefs: []
  type: TYPE_NORMAL
  zh: 此方法利用了数学恒等式：
- en: '![](../Images/B31534_14_017.png)'
  id: totrans-2218
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/B31534_14_017.png)'
- en: '![](../Images/B31534_14_018.png)'
  id: totrans-2219
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/B31534_14_018.png)'
- en: Where ![](../Images/B31534_14_019.png) is the k-th Fibonacci number.
  id: totrans-2220
  prefs: []
  type: TYPE_NORMAL
  zh: 其中 ![](../Images/B31534_14_019.png) 是第k个斐波那契数。
- en: Using these identities, once ![](../Images/B31534_14_019.png) and ![](../Images/B31534_14_021.png)
    are calculated, ![](../Images/B31534_14_022.png) and ![](../Images/B31534_14_023.png)
    can be determined efficiently. This means we do not need to compute all Fibonacci
    numbers sequentially up to the 1,000,000^(th) number but only focus on its halves,
    significantly reducing the required computations.
  id: totrans-2221
  prefs: []
  type: TYPE_NORMAL
  zh: 使用这些恒等式，一旦![](../Images/B31534_14_019.png)和![](../Images/B31534_14_021.png)被计算出来，![](../Images/B31534_14_022.png)和![](../Images/B31534_14_023.png)就可以高效地确定。这意味着我们不需要按顺序计算到第1,000,000个斐波那契数，而只需关注其一半，显著减少了所需的计算量。
- en: Space optimization
  id: totrans-2222
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 空间优化
- en: Like the runtime optimization prompt, we can chain a request to optimize a function
    to fit within RAM constraints. The prompt structure remains similar, but it describes
    a memory limit instead of a runtime limit, along with an optimization request
    to address memory usage.
  id: totrans-2223
  prefs: []
  type: TYPE_NORMAL
  zh: 与运行时优化提示类似，我们可以链式请求优化一个函数以适应RAM限制。提示结构保持相似，但它描述了一个内存限制而不是运行时限制，以及一个针对内存使用的优化请求。
- en: 'For example, consider the following chained prompt requesting an optimization
    for the `get_top_video` function to handle a matrix of 100,000 rows by 100,000
    columns within a 5GB RAM limit:'
  id: totrans-2224
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，考虑以下链式提示，要求对`get_top_video`函数进行优化，以处理在5GB RAM限制内的100,000行乘以100,000列的矩阵：
- en: '[PRE306]'
  id: totrans-2225
  prefs: []
  type: TYPE_PRE
  zh: '[PRE306]'
- en: This prompt specifies the size of the input matrix (100,000 rows by 100,000
    columns) and builds upon the previously defined RAM limit of 5GB.
  id: totrans-2226
  prefs: []
  type: TYPE_NORMAL
  zh: 此提示指定了输入矩阵的大小（100,000行乘以100,000列）并基于之前定义的5GB RAM限制。
- en: '![Figure 14.11: ChatGPT suggestion for chunk-based processing](../Images/B31534_14_11.png)'
  id: totrans-2227
  prefs: []
  type: TYPE_IMG
  zh: '![图14.11：ChatGPT基于分块处理的建议](../Images/B31534_14_11.png)'
- en: 'Figure 14.11: ChatGPT suggestion for chunk-based processing'
  id: totrans-2228
  prefs: []
  type: TYPE_NORMAL
  zh: 图14.11：ChatGPT基于分块处理的建议
- en: Based on this information, ChatGPT suggested processing the CSV file in batches
    of 1,000 rows, which is an appropriate solution for handling data of this size
    efficiently.
  id: totrans-2229
  prefs: []
  type: TYPE_NORMAL
  zh: 基于这些信息，ChatGPT建议以1,000行为一批处理CSV文件，这对于有效处理此类大小的数据是一个合适的解决方案。
- en: In this scenario, specifying the input requirements is vital. For larger matrices,
    working with a Pandas DataFrame may become impractical, necessitating an alternative
    solution. Conversely, for matrices with fewer columns, larger column chunks might
    be sufficient.
  id: totrans-2230
  prefs: []
  type: TYPE_NORMAL
  zh: 在这种情况下，指定输入要求至关重要。对于更大的矩阵，使用Pandas DataFrame可能变得不切实际，需要寻找替代方案。相反，对于列数较少的矩阵，较大的列块可能就足够了。
- en: 'For your reference, here is the implementation for processing the matrix in
    chunks provided by ChatGPT with the prompt above:'
  id: totrans-2231
  prefs: []
  type: TYPE_NORMAL
  zh: 供您参考，以下是ChatGPT根据上述提示提供的分块处理矩阵的实现：
- en: '[PRE307]'
  id: totrans-2232
  prefs: []
  type: TYPE_PRE
  zh: '[PRE307]'
- en: 'When profiling the implementation with an input of 100,000 rows and 100,000
    columns, the chunked implementation concluded with a memory usage of 4,326.1 GB:'
  id: totrans-2233
  prefs: []
  type: TYPE_NORMAL
  zh: 当使用100,000行和100,000列的输入对实现进行性能分析时，分块实现最终以4,326.1 GB的内存使用量结束：
- en: '![Figure 14.12: Improved memory utilization with chunking](../Images/B31534_14_12.png)'
  id: totrans-2234
  prefs: []
  type: TYPE_IMG
  zh: '![图14.12：使用分块提高内存利用率](../Images/B31534_14_12.png)'
- en: 'Figure 14.12: Improved memory utilization with chunking'
  id: totrans-2235
  prefs: []
  type: TYPE_NORMAL
  zh: 图14.12：使用分块提高内存利用率
- en: In line 13, we can see that the matrix was processed in 100 chunks, with each
    chunk containing 1,000 columns.
  id: totrans-2236
  prefs: []
  type: TYPE_NORMAL
  zh: 在第13行，我们可以看到矩阵被处理成100个块，每个块包含1,000列。
- en: The proposed solutions can be further refined to meet both memory and runtime
    requirements. It is always advisable to test new implementations against both
    criteria to ensure the solution is satisfactory in terms of both efficiency and
    performance.
  id: totrans-2237
  prefs: []
  type: TYPE_NORMAL
  zh: 提出的解决方案可以进一步细化以满足内存和运行时要求。始终建议对新实现进行测试，以这两个标准来确保解决方案在效率和性能方面都是令人满意的。
- en: Further runtime and space optimization
  id: totrans-2238
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 进一步的运行时间和空间优化
- en: The previous optimizations focused on single CPU algorithms. GenAI can go beyond
    these and recommend additional techniques. For instance, it may be appropriate
    to use parallelization with threads, leverage **graphical processing units** (**GPUs**),
    or adopt more efficient file formats like sparse matrices or *Apache Parquet*.
    In the function `get_top_video`, processing different videos can be performed
    in parallel by integrating threading. Further acceleration could be achieved by
    leveraging GPUs, as each column can be processed independently of others. Alternatively,
    converting the file format from CSV to a more efficient option could enhance performance.
    Formats like **compressed sparse row** (**CSR**) or **compressed sparse column**
    (**CSC**) from *SciPy* are well-suited for sparse data, while columnar storage
    formats like Apache Parquet are ideal for handling large datasets.
  id: totrans-2239
  prefs: []
  type: TYPE_NORMAL
  zh: 之前的优化主要集中在单CPU算法上。GenAI可以超越这些限制，并推荐额外的技术。例如，可能适合使用线程进行并行化，利用**图形处理单元**（**GPU**），或者采用更高效的文件格式，如稀疏矩阵或*Apache
    Parquet*。在`get_top_video`函数中，可以通过集成线程将不同视频的处理并行化。通过利用GPU，可以进一步加速，因为每一列可以独立于其他列进行处理。或者，将文件格式从CSV转换为更高效的选项可以提高性能。如*SciPy*中的**压缩稀疏行**（**CSR**）或**压缩稀疏列**（**CSC**）格式非常适合稀疏数据，而像Apache
    Parquet这样的列式存储格式则非常适合处理大型数据集。
- en: Summary
  id: totrans-2240
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 摘要
- en: In this chapter, we explored how LLMs can assist in ensuring efficient applications
    by profiling runtime and memory usage, identifying maximal capacities, and suggesting
    optimized code to increase those capacities.
  id: totrans-2241
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们探讨了如何通过分析运行时间和内存使用情况、识别最大容量以及建议优化代码来增加这些容量，从而确保LLM可以辅助高效的应用程序。
- en: Using the recursive Fibonacci example, we saw how adopting a more efficient
    algorithm significantly reduces runtime. With the `get_top_video` function, we
    tackled large matrices under RAM constraints, assisting GenAI to optimize memory
    usage through chunking. GitHub Copilot assisted in profiling runtime and memory
    consumption and profiling runs across different inputs. ChatGPT estimated the
    maximal capacity within runtime and RAM constraints. Leveraging chained prompts,
    ChatGPT demonstrated the ability to vastly improve the implementation to achieve
    larger capacities and can do much more.
  id: totrans-2242
  prefs: []
  type: TYPE_NORMAL
  zh: 使用递归斐波那契示例，我们看到了采用更有效的算法如何显著减少运行时间。在`get_top_video`函数中，我们在RAM限制下处理大型矩阵，通过分块帮助GenAI优化内存使用。GitHub
    Copilot协助分析运行时间和内存消耗，并在不同输入上执行分析运行。ChatGPT估计了在运行时和RAM限制下的最大容量。利用链式提示，ChatGPT展示了大幅改进实现以实现更大容量的能力，并且可以做更多。
- en: In the next chapter, we will further explore how to integrate GenAI into the
    SDLC, focusing on logging, monitoring applications, and error handling.
  id: totrans-2243
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一章中，我们将进一步探讨如何将GenAI集成到SDLC中，重点关注日志记录、监控应用程序和错误处理。
- en: Quiz time
  id: totrans-2244
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 测验时间
- en: 'Before you proceed to the next chapter, make sure that you can confidently
    answer the following questions:'
  id: totrans-2245
  prefs: []
  type: TYPE_NORMAL
  zh: 在你进入下一章之前，请确保你能自信地回答以下问题：
- en: '**Question 1**: How can Copilot assist in profiling the runtime and memory
    usage of a program?'
  id: totrans-2246
  prefs: []
  type: TYPE_NORMAL
  zh: '**问题1**：Copilot如何帮助分析程序的运行时间和内存使用情况？'
- en: '**Answer**: Profiling runtime and memory usage in Python can be achieved using
    the built-in `time` module and the third-party `memory-profiler` package. Copilot
    can assist by either completing a starter code or generating that functionality
    from scratch based on a precise prompt.'
  id: totrans-2247
  prefs: []
  type: TYPE_NORMAL
  zh: '**答案**：在Python中，可以使用内置的`time`模块和第三方`memory-profiler`包来分析运行时间和内存使用情况。Copilot可以通过完成起始代码或根据精确提示从头生成该功能来协助。'
- en: '**Question 2**: How can ChatGPT help identify maximal inputs under runtime
    or RAM constraints?'
  id: totrans-2248
  prefs: []
  type: TYPE_NORMAL
  zh: '**问题2**：ChatGPT如何帮助在运行时或RAM限制下识别最大输入？'
- en: '**Answer**: By crafting precise prompts that include the function’s source
    code, runtime or RAM constraints, and profiling results, we can utilize the *GPT-4o1*
    model, designed for chain-of-thought reasoning, to calculate the largest input
    manageable within those constraints.'
  id: totrans-2249
  prefs: []
  type: TYPE_NORMAL
  zh: '**答案**：通过精心设计的提示，包括函数的源代码、运行时或RAM限制以及分析结果，我们可以利用专为思维链推理设计的*GPT-4o1*模型，来计算在那些限制下可管理的最大输入。'
- en: '**Question 3**: How can chaining prompts help increase program input capacity?'
  id: totrans-2250
  prefs: []
  type: TYPE_NORMAL
  zh: '**问题 3**：如何通过链式提示来增加程序输入容量？'
- en: '**Answer**: After identifying the maximal input a function can handle without
    becoming a bottleneck, a chained prompt can include the desired input size and
    a specific optimization request. *GPT-4o1* can leverage this information to propose
    an optimized solution that follows the runtime and/or memory constraints.'
  id: totrans-2251
  prefs: []
  type: TYPE_NORMAL
  zh: '**答案**：在确定一个函数可以处理的最大输入而不会成为瓶颈后，链式提示可以包括期望的输入大小和特定的优化请求。*GPT-4o1*可以利用这些信息提出一个遵循运行时和/或内存限制的优化解决方案。'
