- en: Introduction
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 简介
- en: In the constantly evolving world of modern work, where efficiency and creativity
    are the pillars of success, a discreet but profound revolution is underway.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 在现代工作不断演变的世界上，效率与创造力是成功的支柱，一场微妙但深刻的革命正在进行中。
- en: At the heart of this transformation is an unexpected alliance between the human
    mind and artificial intelligence, a collaboration that pushes the boundaries of
    what we thought possible.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 在这次变革的核心是一个意想不到的人脑与人工智能的联盟，这种合作推动了我们对可能性的认知边界。
- en: Welcome to the fascinating world of prompt engineering and AI, where every word
    we write becomes the key to a treasure trove of untapped potential. Imagine a
    tool so powerful that it can not only understand your intentions but also act
    on them. brought to life, turning your ideas into reality with unrivaled precision
    and speed.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 欢迎来到令人着迷的提示工程和AI的世界，我们写的每一个字都成为开启未开发潜能宝库的钥匙。想象一下一个如此强大的工具，它不仅能理解你的意图，还能采取行动，将你的想法以无与伦比的精度和速度变为现实。
- en: This tool is none other than artificial intelligence, shaped and directed by
    the subtle art of prompt engineering. Together, they open the door to a new era
    of productivity, where laborious tasks are automated, creativity is amplified,
    and possibilities are limitless.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 这个工具正是人工智能，它由提示工程的微妙艺术塑造和引导。它们共同开启了一个新的生产力时代，在这个时代里，繁重的工作自动化，创造力得到增强，可能性无限。
- en: Whether you are a creator looking to bring your artistic visions to life, an
    entrepreneur seeking efficiency in your operations, or an educator aspiring to
    enrich the learning experience, prompt engineering and AI are your greatest allies.
    more valuable.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 无论你是希望将你的艺术愿景变为现实的创作者，还是寻求提高运营效率的企业家，亦或是一位希望丰富学习体验的教育者，提示工程和AI都是你最大的盟友。它们的价值更加宝贵。
- en: This primer invites you to explore how, with a few carefully chosen keywords,
    you can guide AI to optimize your work, unlock new forms of creation, and radically
    transform your approach to everyday challenges.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 这本入门指南邀请你探索如何通过精心选择的几个关键词，引导人工智能优化你的工作，解锁新的创作形式，并彻底改变你应对日常挑战的方法。
- en: Get ready to dive into a journey through the secrets of prompt engineering,
    discover how mastering this skill can open up unexplored horizons for you, and
    see how AI can become the ideal companion in your quest for efficiency and innovation.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 准备开始一段探索提示工程秘密的旅程，发现掌握这项技能如何为你开辟未知的视野，并看看人工智能如何成为你追求效率和创新的理想伴侣。
- en: The revolution in the way you work starts here, and the future has never been
    brighter.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 你工作方式的革命从这里开始，未来从未如此光明。
