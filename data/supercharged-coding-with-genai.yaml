- en: 'The _constructor_from_mgr method is a helper function in the DataFrame class.
    It is used to create a new DataFrame instance from a given BlockManager (or ArrayManager)
    and its associated axes. Key Points:'
  id: totrans-1100
  prefs: []
  type: TYPE_NORMAL
  zh: _constructor_from_mgr 方法是 DataFrame 类中的一个辅助函数。它用于从给定的 BlockManager（或 ArrayManager）及其相关轴创建一个新的
    DataFrame 实例。关键点：
- en: '1\. Parameters:'
  id: totrans-1101
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 参数：
- en: 'mgr: The BlockManager or ArrayManager that holds the actual data for the DataFrame.
    axes: The axes (index and columns) for the new DataFrame. 2\. Return Value:'
  id: totrans-1102
  prefs: []
  type: TYPE_NORMAL
  zh: 'mgr: 持有 DataFrame 实际数据的 BlockManager 或 ArrayManager。axes: 新 DataFrame 的轴（索引和列）。2.
    返回值：'
- en: 'It returns a new DataFrame object constructed from the provided manager and
    axes. Example Snippet:'
  id: totrans-1103
  prefs: []
