  zh: '**如果你**的英语语法理解水平最高是高中水平，并且你的词汇量仅限于你读过的几本书，**不必担心**！这正是本章的内容。我们将开始探索如何通过一些关于对话设计的简短讨论来提升你的提示，在讨论如何使用这些语言工具“**训练**”AI以便它能说话、**训练**和**微调**LLM以成功完成你提出的任何任务之前。然后，我们将探讨本地化的概念以及它是如何融入你的AI对话中的。最后，我们将以一个对话设计“**工作坊**”结束，在那里我们将提供一个实践你的AI对话和**完善**你的提示的手册。'
