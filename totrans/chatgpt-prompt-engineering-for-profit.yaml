    ****arg**umen**t, ****n**ot** ****ju**st** ****comp**arin**g ****i**t** ****t**o**
    ****ano**the**r. ****I**t** ****ai**ms** ****t**o** ****dism**antl**e ****o**r**
    ****a**t** ****le**ast** ****ide**ntif**y ****fl**aws** ****i**n** ****a**** ****co**mmo**n
    ****id**ea**, ****wh**ile** ****Comp**arativ**e ****Prom**ptin**g ****i**s** ****mo**re**
    ****ab**out** ****expl**orin**g ****diff**erence**s ****a**nd** ****simi**lariti**es.'
  id: totrans-1000
  prefs: []
  type: TYPE_NORMAL
  zh: '****关于比较提示，其目标是比较两个想法或概念，****反事实提示****专注于质疑或挑战一个特定的论点，而不仅仅是将其与其他观点进行比较。它的目的是破坏或至少识别一个常见想法中的缺陷，而比较提示则更多地关于探索差异和相似性。'
- en: '****Com**pare**d ****t**o** ****Cons**ensu**s ****Bui**ldin**g , ****wh**ich**
    ****ai**ms** ****t**o** ****fi**nd** ****a**** ****mi**ddl**e ****gr**oun**d ****bet**wee**n
