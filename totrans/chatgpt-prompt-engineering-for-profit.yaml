    **和** **缺点**， **并** **可能** **通过** **强调** **哪些** **情境** **最适合** **每种** **能源** **来**
    **回答**。 **这种** **回答** **结构** **允许** **读者** **清楚地** **看到** **共同** **点和** **区别**，
    **使** **理解** **变得** **更容易**。'
