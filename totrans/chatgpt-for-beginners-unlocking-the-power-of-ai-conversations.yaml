  zh: 在其核心，ChatGPT 由**GPT**驱动，这是一个由 OpenAI 开发的最先进的大规模语言模型。本文解构了 ChatGPT 背后的技术，探讨了其适应性，并解释了其局限性，为你提供了与它自信互动的知识。
