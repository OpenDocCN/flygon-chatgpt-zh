    ****a**re** ****of**ten** ****pu**she**d ****t**o** ****t**he** ****ba**ck** ****o**f**
    ****t**he** ****qu**eue**, ****ma**kin**g ****th**em** ****le**ss** ****li**kel**y
    ****t**o** ****se**ek** ****he**lp** ****o**r** ****cau**sin**g ****th**eir**
    ****me**nta**l ****we**ll**-****be**ing** ****t**o** ****dete**riorat**e ****ev**en**
    ****mo**re**.'
  id: totrans-604
  prefs: []
  type: TYPE_NORMAL
  zh: '**接下来**让人们不愿意寻求心理健康护理的原因是等待看心理卫生专业人员的**时间长短**。正如我们在本章前面提到的，几乎一半的人在其一生中的某个时刻都会遭受某种形式的心理健康问题。这意味着治疗师和精神病学家通常都安排了很长的等待名单，可能长达两周甚至更长。由于需要帮助的人很多，大多数心理健康专业人士都通过紧急系统运作，优先考虑那些有更明显或严重心理健康问题的人。这意味着那些被认为没有时间敏感的心理健康问题的人通常会被推到队伍的后面，使他们不太可能寻求帮助，甚至可能导致他们的心理健康状况进一步恶化。'
