  id: totrans-480
  prefs: []
  type: TYPE_NORMAL
  zh: © 作者（们），独家授权给 APress 媒体公司，Springer Nature 部分版权所有 2024B. HopkinsChatGPT for Java[https://doi.org/10.1007/979-8-8688-0116-7_4](https://doi.org/10.1007/979-8-8688-0116-7_4)
- en: '4. Multimodal AI: Creating a Podcast Visualizer with Whisper and DALL·E 3'
  id: totrans-481
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 4. 多模态 AI：使用 Whisper 和 DALL·E 3 创建播客可视化器
- en: 'Bruce Hopkins^([1](#Aff2)  )(1)Beaverton, OR, USANow let’s introduce a new
    term: **multimodal AI**. In the most simplest of terms, generative AI models can
    create content in 1 of 4 formats:'
  id: totrans-482
  prefs: []
  type: TYPE_NORMAL
  zh: '布鲁斯·霍普金斯^([1](#Aff2)  )(1)美国俄勒冈州比佛顿Now let’s introduce a new term: **multimodal
    AI**. In the most simplest of terms, generative AI models can create content in
    1 of 4 formats:'
- en: Text
  id: totrans-483
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 文本
- en: Audio
  id: totrans-484
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 音频
- en: Images
  id: totrans-485
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 图片
- en: Video
  id: totrans-486
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 视频
- en: Each of those formats is a **mode**. Multimodal AI is the process of using multiple
    AI models together to generate (or to understand) content where the input is one
    type of mode and the output is a different type of mode.
  id: totrans-487
  prefs: []
  type: TYPE_NORMAL
  zh: 这些格式中的每一个都是一个**模式**。多模态 AI 是使用多个 AI 模型一起生成（或理解）内容的过程，其中输入是一种模式，输出是另一种模式。
- en: Take, for example, OpenAI’s Whisper model. If you provide it audio, it is able
    to create a transcription of everything said into text. The same thing applies
    to DALL⋅E. If you supply it with a textual prompt, then it is able to generate
    an image of what you described.
  id: totrans-488
  prefs: []
  type: TYPE_NORMAL
  zh: 以 OpenAI 的 Whisper 模型为例。如果你提供音频，它能够将所说的所有内容转录成文本。同样，这也适用于 DALL⋅E。如果你提供文本提示，它就能够生成你所描述的图像。
- en: In this chapter, we’re going to take multimodal AI to the next level! As an
    avid podcast listener, I’ve often wondered what the scenery, the imagery, the
    characters, the subject, or the background looked like while listening to a very
    immersive story in audio format.
  id: totrans-489
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将把多模态人工智能提升到新的水平！作为一名热衷的播客听众，我常常想知道在收听音频格式的非常沉浸式故事时，场景、意象、人物、主题或背景看起来是什么样子。
- en: So we’re going to create a Podcast Visualizer using multiple models from OpenAI.
    There are a few steps involved, but the final results are stunning. While listening
    to a podcast about a guy cooking some amazing things with tofu (don’t knock it
    until you try it), the Podcast Visualizer came up with the image in Figure [4-1](#Fig1).![](../images/607613_1_En_4_Chapter/607613_1_En_4_Fig1_HTML.png)
  id: totrans-490
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们将使用 OpenAI 的多个模型创建一个播客可视化器。涉及几个步骤，但最终结果令人惊叹。在收听关于一个用豆腐烹饪一些令人惊叹的事情的播客（不要尝试之前就贬低它）时，播客可视化器产生了图
    [4-1](#Fig1) 中的图像。![图 4-1](../images/607613_1_En_4_Chapter/607613_1_En_4_Fig1_HTML.png)
- en: A close up photograph of a man wearing glasses and holding a piece of tofu in
    a bowl.
  id: totrans-491
  prefs: []
  type: TYPE_NORMAL
  zh: 一张戴着眼镜、手持一碗豆腐的男人的特写照片。
- en: Figure 4-1
  id: totrans-492
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4-1
- en: The AI-Generated Result of Visualizing a Podcast About Tofu Using the GPT-4,
    Whisper, and DALL·E Models
  id: totrans-493
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 GPT-4、Whisper 和 DALL⋅E 模型可视化关于豆腐的播客的 AI 生成结果
- en: 'In order to make the code for the Podcast Visualizer easy to follow along,
    we’ll do things separately in the following three steps:'
  id: totrans-494
  prefs: []
  type: TYPE_NORMAL
  zh: 为了使播客可视化器的代码易于理解，我们将在以下三个步骤中分别进行操作：
- en: 'Step-1: Take a podcast episode and use the Whisper model to get a transcript.'
  id: totrans-495
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 'Step-1: 选择一个播客节目并使用 Whisper 模型获取转录本。'
- en: 'Step-2: Take the resulting transcript and use the GTP-4 model to describe the
    visual aspects of what’s being discussed in the podcast episode.'
  id: totrans-496
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 'Step-2: 将生成的转录本用于 GTP-4 模型以描述播客节目中讨论内容的视觉方面。'
- en: 'Step-3: Take the resulting description and use the DALL⋅E model to generate
    an image.'
  id: totrans-497
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 'Step-3: 将生成的描述用于 DALL⋅E 模型以生成图像。'
- en: 'The code presented here in this chapter has tons of practical uses, for example:'
  id: totrans-498
  prefs: []
  type: TYPE_NORMAL
  zh: 本章中展示的代码具有许多实际用途，例如：
- en: If you’re just curious about the things in a podcast episode could look like
    (which is always the case for me), you can get a simple representative visual
    image to associate with what you’re listening to.
  id: totrans-499
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果您只是对播客节目中事物可能看起来什么样感到好奇（对我来说总是这样），您可以得到一个简单的代表性视觉图像来关联您正在收听的内容。
- en: For people who are hearing impaired, you can easily turn a podcast or radio
    program into a slide-show of images. This greatly enhances the accessibility of
    the content.
  id: totrans-500
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于听力受损的人，您可以轻松地将播客或广播节目转换成图像幻灯片。这大大提高了内容的可访问性。
- en: For podcasters, you can now have a simple way to add a visual/hero image to
    each of your episodes. This is useful since podcast players such as Apple Podcasts
    and Spotify allow podcasters to display a single image to associate with an individual
    episode. This can help with engagement for your listeners.
  id: totrans-501
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于播客制作者来说，现在您可以简单地将视觉/英雄图像添加到每个播客节目中。这很有用，因为播客播放器，如 Apple Podcasts 和 Spotify，允许播客制作者显示单个图像以关联到单个节目。这有助于提高听众的参与度。
- en: Introducing the Whisper Model by OpenAI
  id: totrans-502
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 介绍 OpenAI 的 Whisper 模型
- en: 'Now let’s introduce another new term: **Automatic Speech Recognition** (ASR).
    The average everyday consumer is very familiar with this technology due to its
    integration into mobile phones (e.g., Siri for the iPhone) and smart speakers
    (e.g., any Alexa device). At its core, ASR technology converts spoken language
    into text.'
  id: totrans-503
  prefs: []
  type: TYPE_NORMAL
  zh: 现在让我们介绍另一个新术语：**自动语音识别** (ASR)。由于该技术集成到移动电话（例如，iPhone 的 Siri）和智能扬声器（例如，任何 Alexa
    设备）中，普通消费者对此技术非常熟悉。在其核心，ASR 技术将语音转换为文本。
- en: Whisper is OpenAI’s model for speech recognition, and the accuracy is astonishingly
    high. Listing [4-1](#PC1) is a transcript of an episode of the very popular DuoLingo
    Spanish podcast, which makes the Spanish language easy to be understood by English
    listeners by combining both English and Spanish together in a woven narrative
    story. The transcript was generated using the Whisper model....I'm Martina Castro.
    Every episode we bring you fascinating, true stories to help you improve your
    Spanish listening and gain new perspectives on the world. The storyteller will
    be using intermediate Spanish and I'll be chiming in for context in English. If
    you miss something, you can always skip back and listen again. We also offer full
    transcripts at podcast.duolingo.com.Growing up, Linda was fascinated with her
    grandmother, Erlinda. Erlinda was a healer or curandera, someone who administers
    remedies for mental, emotional, physical, or spiritual illnesses.In Guatemala,
    this is a practice passed down orally through generations in the same family.
    Mal de ojo, or the evil eye, is considered an illness by many Guatemalans who
    believe humans have the power to transfer bad energy to others. Neighbors would
    bring their babies to Linda's grandmother when they suspected an energy imbalance.
    Su madre lo llevaba a nuestra casa para curarlo...Listing 4-1
  id: totrans-504
  prefs: []
  type: TYPE_NORMAL
  zh: Whisper是OpenAI的语音识别模型，其准确率令人惊讶。列表[4-1](#PC1)是DuoLingo西班牙语播客一集的转录，该播客通过将英语和西班牙语结合在一个编织的故事中，使西班牙语对英语听众来说更容易理解。转录是使用Whisper模型生成的。……我是Martina
    Castro。每一集我们都会带来引人入胜的真实故事，帮助你提高西班牙语听力并从世界中获得新的视角。讲述者将使用中级西班牙语，而我将用英语提供背景信息。如果你错过了什么，你可以随时回放并再次收听。我们还在podcast.duolingo.com提供完整的转录。Linda在成长过程中对她的祖母Erlinda非常着迷。Erlinda是一位治疗师或curandera，她为精神、情感、身体或精神疾病提供治疗方法。在危地马拉，这种做法是通过家族内部代代相传的口头传统。许多危地马拉人认为，人类有能力将负面能量传递给他人，因此他们把婴儿带到Linda的祖母那里，当他们怀疑有能量失衡时。她的母亲会带他去我们家治疗……列表4-1
- en: 'The Whisper Model Performs Speech Recognition to Convert Audio Into Text If
    you’ve ever worked with a speech recognition system before (even with sophisticated
    technologies like Siri and Alexa), you will know that it has problems, for instance:'
  id: totrans-505
  prefs: []
  type: TYPE_NORMAL
  zh: Whisper模型执行语音识别，将音频转换为文本 如果你之前曾经使用过语音识别系统（即使是像Siri和Alexa这样的复杂技术），你就会知道它存在问题，例如：
- en: '**Speech recognition has problems with punctuation**'
  id: totrans-506
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**语音识别在处理标点符号时存在问题**'
- en: Have you noticed that nobody speaks with punctuation? For the English language,
    we use changes in tone or volume to ask a question or give an exclamation. We
    also use short and long pauses for commas and periods.
  id: totrans-507
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你有没有注意到没有人说话时使用标点符号？对于英语来说，我们使用音调或音量的变化来提问或感叹。我们还会使用短停顿和长停顿来表示逗号和句号。
- en: '**Speech recognition** **has problems with foreign words and accents**'
  id: totrans-508
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**语音识别在处理外来词和口音时存在问题**'
- en: Depending on who you ask, there are at least 170k words in the English language.
    However, in conversational English, we are always using foreign words like
  id: totrans-509
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 根据你问的人，英语中至少有170k个单词。然而，在英语口语中，我们总是使用外语，例如
- en: 'Tsunami (Japanese origin): A large sea wave often caused by an earthquake'
  id: totrans-510
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 海啸（日语起源）：由地震引起的大海浪
- en: 'Hors d’oeuvre (French origin): An appetizer'
  id: totrans-511
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: Hors d’oeuvre（法语起源）：开胃菜
- en: 'Lingerie (French origin): Women’s underwear or nightclothes'
  id: totrans-512
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: Lingerie（法语起源）：女性的内衣或睡衣
- en: 'Aficionado (Spanish origin): Someone who is very passionate about a specific
    activity or subject'
  id: totrans-513
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
