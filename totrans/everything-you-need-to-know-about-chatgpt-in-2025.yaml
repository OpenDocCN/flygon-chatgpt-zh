  prefs: []
  type: TYPE_NORMAL
  zh: '**在此意义上，混合工作模式和人与AI的协作将是关键。那些理解AI不应被视为人类的替代品，而应被视为一种分析工具，可以增强人类工作，的公司将更好地定位利用双方优势。例如，聊天机器人可以自动回答频繁询问的问题，但人类雇员仍将被需要以提供更个性化的服务水平和处理更复杂或情感敏感的情况。**'
