  id: totrans-935
  prefs: []
  type: TYPE_NORMAL
  zh: localStorage.setItem('chats', JSON.stringify(chats));
- en: '}'
  id: totrans-936
  prefs: []
  type: TYPE_NORMAL
  zh: '}'
- en: Server-Side Storage
  id: totrans-937
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 服务器端存储
- en: For preserving chat data on the server, consider using databases like MySQL,
    PostgreSQL, or NoSQL options like MongoDB. These provide scalable and secure storage
    solutions.
  id: totrans-938
  prefs: []
  type: TYPE_NORMAL
  zh: 为了在服务器上保留聊天数据，考虑使用MySQL、PostgreSQL或NoSQL选项，如MongoDB。这些提供了可扩展和安全的存储解决方案。
