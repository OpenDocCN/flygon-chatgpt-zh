  prefs: []
  type: TYPE_NORMAL
  zh: '**最佳实践**:'
- en: '****Ad**her**e ****t**o** ****Pos**itiv**e ****In**ten**t:  ****U**se** ****Cha**tGP**T
    ****t**o** ****cont**ribut**e ****posi**tivel**y—****whe**the**r ****thr**oug**h
    ****educ**atio**n, ****inno**vatio**n, ****o**r** ****pro**ble**m-****sol**vin**g.'
  id: totrans-831
  prefs: []
  type: TYPE_NORMAL
  zh: '**坚持积极意图：使用ChatGPT积极贡献——无论是通过教育、创新，还是解决问题**。'
- en: '****Mon**ito**r ****Out**put**s:  ****I**f** ****Cha**tGP**T ****gene**rate**s
    ****inapp**ropria**te ****con**ten**t, ****re**fin**e ****yo**ur** ****pr**omp**t
    ****o**r** ****disc**ontinu**e ****t**he** ****inte**ractio**n.'
  id: totrans-832
  prefs: []
  type: TYPE_NORMAL
  zh: '**监控输出：如果ChatGPT生成不适当的内容，请调整你的提示或停止互动**。'
- en: '****Re**por**t ****Mi**sus**e:  ****I**f** ****y**ou** ****enco**unte**r ****har**mfu**l
    ****out**put**s ****o**r** ****obs**erv**e ****unet**hica**l ****u**se**, ****re**por**t
    ****i**t** ****t**o** ****t**he** ****appr**opriat**e ****cha**nnel**s.'
  id: totrans-833
  prefs: []
  type: TYPE_NORMAL
  zh: '**报告滥用：如果你遇到有害输出或观察到不道德的使用，请向适当的渠道报告**。'
