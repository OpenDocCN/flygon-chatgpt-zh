  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Is this a small town or a special part of a larger town or city?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Most cozy murder mysteries are based in a small, closed location where the amateur
    detective knows the local community and can investigate based on her powers of
    observation and deduction.
  prefs: []
  type: TYPE_NORMAL
- en: The sleuth can also be a visitor to the area who is seeing it for the first
    time but will have a local guide with detailed information about the history of
    the place and the people who live there – especially those linked to the murder
