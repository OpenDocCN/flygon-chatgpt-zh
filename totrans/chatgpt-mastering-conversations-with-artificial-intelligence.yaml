- en: '**About the Author**'
  id: totrans-14
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '**关于作者**'
- en: Dumitru Radoiu is an Associate Professor at George Emil Palade University of
    Medicine, Pharmacy, Science, and Technology of Targu Mures, Romania, EU. His published
    work includes books, scholarly articles, and science popularization articles aimed
    at making science and technology subjects more accessible.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: Dumitru Radoiu是罗马尼亚特兰西瓦尼亚的乔治·埃米尔·帕拉代大学医学、药学、科学和技术学院的副教授。他的出版物包括书籍、学术论文和科学普及文章，旨在使科学技术主题更加易于理解。
- en: He embraced many roles such as leader, strategist, educator, researcher, academic
    writer, and visiting professor at universities from the UK, Ireland, Norway, France,
    The Netherlands, Spain, Italy, and Greece.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 他曾扮演过许多角色，如领导者、战略家、教育家、研究人员、学术作家和访问教授，在英国、爱尔兰、挪威、法国、荷兰、西班牙、意大利和希腊的大学。
- en: As an early adopter and evangelist of Digital Transformation, he offers consulting
    services at the intersection of customer experience, process innovation, and digital
    technologies.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 作为数字化转型的一名早期采用者和传教士，他在客户体验、流程创新和数字技术交汇处提供咨询服务。
- en: Most recently, he has been playing with Generative AI, exploring mostly Large
    Language Models and thinking about how to use the new tools to create value, increase
    productivity, and competitive advantage.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 最近，他一直在探索生成式AI，主要研究大型语言模型，并思考如何利用新工具创造价值、提高生产力和竞争优势。
- en: Dumitru Radoiu can be reached on LinkedIn as dumitruradoiu.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: Dumitru Radoiu可在LinkedIn上联系，dumitruradoiu。
- en: The prompts from the book can be downloaded from [www.jacaranda.ro](https://www.jacaranda.ro/).
