  prefs: []
  type: TYPE_NORMAL
  zh: let count = 0;
- en: return function() {
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: return function() {
- en: count++;
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: count++;
- en: return count;
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: return count;
- en: '};'
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: '};'
- en: '}'
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: '}'
- en: const counter = createCounter();
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: const counter = createCounter();
- en: 'console.log(counter()); // Output: 1'
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 'console.log(counter()); // 输出: 1'
- en: 'console.log(counter()); // Output: 2'
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 'console.log(counter()); // 输出: 2'
- en: In this example, the inner function returned by   createCounte r  forms a closure.
    It has access to the outer function's variable,   coun t , and can modify it each
    time it is called.
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 在此示例中，由createCounter返回的内层函数形成一个闭包。它可以访问外部函数的变量count，并且每次被调用时都可以修改它。
- en: Common Use Cases for Closures
  id: totrans-156
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 闭包的常见用例
- en: Data Encapsulation
  id: totrans-157
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 数据封装
- en: Closures allow for encapsulating data, providing privacy for variables. This
    can be useful for creating modules or objects with private state.
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 闭包允许封装数据，为变量提供隐私。这可以用于创建具有私有状态的模块或对象。
- en: function createPerson(name) {
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: function createPerson(name) {
