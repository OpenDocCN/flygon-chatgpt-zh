- en: Introduction
  id: totrans-31
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 简介
- en: 'Imagine standing right at the edge of a vast digital library that stretches
    infinitely into the horizon, filled with the sum of human understanding, creativity,
    and insight. In this library, there are no physical books to leaf through and
    no indexes to consult. Instead, there''s a conversational interface poised to
    retrieve any knowledge you seek—but only if you know how to ask for it. This is
    not a scene from a futuristic novel; it''s the reality of interacting with AI
    technologies like ChatGPT today. The difference between finding a precise answer
    and a useless one often lies in formulating the question itself. This book explores
    this premise: the art of asking the right questions to navigate the vast potential
    of artificial intelligence, unlocking doors to realms of knowledge we have yet
    to explore.'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 想象一下，你正站在一个广阔的数字图书馆的边缘，这个图书馆无限延伸到地平线，充满了人类理解、创造力和洞察力的总和。在这个图书馆里，没有可以翻阅的实体书籍，也没有可以查阅的索引。取而代之的是，有一个对话界面，可以检索你寻求的任何知识——但前提是你知道如何提问。这不是来自未来小说的场景；这是今天与ChatGPT等人工智能技术互动的现实。找到精确答案和无用答案之间的区别往往在于提问本身。这本书探讨了这一前提：掌握提出正确问题的艺术，以导航人工智能的巨大潜力，开启我们尚未探索的知识领域的大门。
- en: The Importance of Asking the Right Questions
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 提出正确问题的重要性
- en: The art of inquiry has always been at the heart of human progress. In the world
    of artificial intelligence, the right questions are not merely a philosophical
    exercise but a practical tool for unlocking AI's capabilities. Our engagement
    with an AI, especially conversational models like ChatGPT, is fundamentally shaped
    by the questions we pose.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 探究的艺术始终是人类进步的核心。在人工智能的世界里，正确的问题不仅仅是一项哲学练习，而且是解锁人工智能能力的一项实用工具。我们与人工智能的互动，尤其是与ChatGPT等对话模型，从根本上是由我们提出的问题塑造的。
- en: The precision and depth of a question can dramatically alter the trajectory
    of an AI's response, guiding it through the complex web of data and algorithms
    to retrieve or generate the most relevant information. In this context, a well-formulated
    question can mean the difference between a generic response and an answer that
    provides new perspectives or solves complex problems.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 一个问题的精确性和深度可以显著改变人工智能的响应轨迹，引导它通过复杂的数据和算法网络，检索或生成最相关的信息。在这种情况下，一个精心构思的问题可能意味着普通回答和提供新视角或解决复杂问题的答案之间的区别。
- en: This emphasis on questioning is mirrored in the AI's design, which seeks to
    replicate human conversational patterns. Just as in human dialogue, the clarity,
    intent, and structure of our questions influence the quality and depth of the
    responses we receive. Thus, mastering the art of questioning becomes crucial for
    anyone aiming to leverage AI effectively.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 这种对提问的强调在人工智能的设计中得到了体现，它试图复制人类的对话模式。正如在人类的对话中一样，我们问题的清晰度、意图和结构会影响我们收到的回答的质量和深度。因此，掌握提问的艺术对于任何希望有效利用人工智能的人来说都至关重要。
- en: History is replete with instances where a single question paved the way for
    monumental discoveries. Take, for example, Albert Einstein's musing, 'What would
    the world look like if I rode through it on a beam of light?' This simple yet
    profound question was the spark that ignited the development of the theory of
    Special Relativity, fundamentally altering our understanding of space, time, and
    the interconnectivity of energy and mass. These insights have revolutionized our
    perception of the universe and propelled physics into new realms of inquiry. In
    the AI-driven era, the potential for such transformative questions is amplified,
    promising to unlock new frontiers in various domains.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 历史上充满了单一个问题开辟了重大发现道路的例子。以阿尔伯特·爱因斯坦的沉思为例，“如果我骑在一束光上穿过世界，世界会是什么样子？”这个简单而深刻的问题点燃了狭义相对论的发展，从根本上改变了我们对空间、时间和能量与质量相互联系的理解。这些洞察力改变了我们对宇宙的看法，推动了物理学进入新的研究领域。在人工智能驱动的时代，这种变革性问题的潜力得到了放大，承诺在各个领域开启新的前沿。
- en: Overview of ChatGPT
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT概述
- en: ChatGPT is a groundbreaking development in the field of artificial intelligence.
    It's a variant of the Generative Pre-trained Transformer models designed to simulate
    human-like conversations. Developed by OpenAI, this conversational AI leverages
    vast amounts of text data to understand and generate language in a way that is
    coherent and contextually relevant.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT 是人工智能领域的一项突破性发展。它是一种生成式预训练变换器模型的变体，旨在模拟类似人类的对话。由 OpenAI 开发，这种对话式人工智能利用大量文本数据，以连贯和上下文相关的方式理解和生成语言。
- en: The inception of ChatGPT can be traced back to the broader research into language
    models, particularly those focusing on understanding and generating human language
    with increasing accuracy and nuance. Unlike its predecessors, ChatGPT is distinguished
    by its ability to engage in dialogues, answer questions, write content, and even
    perform specific tasks like programming or composing music based on the prompts
    it receives.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT 的起源可以追溯到对语言模型更广泛的研究，特别是那些专注于以不断提高的准确性和细微差别理解和生成人类语言的研究。与前辈不同，ChatGPT
    的特点是能够进行对话、回答问题、撰写内容，甚至根据收到的提示执行特定任务，如编程或创作音乐。
- en: The technology behind ChatGPT involves training on a diverse dataset of text
    from the internet, allowing it to grasp a huge range of topics, languages, and
    writing styles. This training enables ChatGPT to generate responses that can mimic
    human tone and style, adapting to the nuances of the input it receives. Moreover,
    its design incorporates mechanisms to handle follow-up questions, acknowledge
    its mistakes, challenge incorrect premises, and even refuse to engage in inappropriate
    conversations.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT 背后的技术涉及在互联网上的大量文本数据集上进行训练，使其能够掌握广泛的主题、语言和写作风格。这种训练使 ChatGPT 能够生成可以模仿人类语气和风格的响应，适应它接收到的输入的细微差别。此外，其设计还包含了处理后续问题、承认错误、挑战错误前提，甚至拒绝参与不适当对话的机制。
- en: ChatGPT's impact extends beyond the realm of technology enthusiasts and researchers.
    It has found applications in education, customer service, content creation, and
    many other areas where human-like communication can add value.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT 的影响超越了技术爱好者和研究人员的领域。它在教育、客户服务、内容创作以及许多其他领域找到了应用，在这些领域，类似人类的沟通可以增加价值。
- en: 'Building on this, driven by my mission to make AI accessible to everyone, I''ve
    also authored ''The ChatGPT Alchemist: Turning Ideas Into Income with ChatGPT,''
    available on Amazon. This book is designed to unlock the potential of ChatGPT
    for entrepreneurial ventures, demonstrating how this cutting-edge technology can
    be a powerful ally in generating income.'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 基于此，受我让每个人都能接触人工智能的使命所驱动，我还撰写了《ChatGPT炼金术士：用ChatGPT将想法转化为收入》，可在亚马逊购买。这本书旨在释放
    ChatGPT 在创业企业中的潜力，展示这项尖端技术如何成为创造收入的强大盟友。
- en: In my books, I strive to demystify the complexities of ChatGPT. By breaking
    down technical barriers and presenting ChatGPT's functionalities in a user-friendly
    manner, I aim to empower my readers to harness AI in their personal and professional
    lives, opening up a world of possibilities for innovation and creativity.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 在我的书中，我努力揭示 ChatGPT 的复杂性。通过打破技术壁垒，并以用户友好的方式展示 ChatGPT 的功能，我旨在赋予我的读者利用人工智能在个人和职业生活中的能力，为创新和创造力开辟一个充满可能性的世界。
- en: The Power of Prompt Engineering
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 提示工程的力量
- en: Prompt engineering is the skillful crafting of prompts or questions that guide
    AI models like ChatGPT to generate responses that are not only relevant and accurate
    but also creative and insightful.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 提示工程是巧妙地制作提示或问题，以引导像 ChatGPT 这样的人工智能模型生成既相关又准确、富有创意和洞察力的响应。
- en: At its core, prompt engineering involves understanding how AI models process
    language and use context to generate responses. By meticulously designing prompts,
    you can influence the direction, tone, and depth of the AI's output, making it
    possible to tailor the interaction to specific goals or needs. The power of prompt
    engineering lies in its ability to unlock the full capabilities of the AI, turning
    it into a versatile tool that can adapt to various tasks and challenges.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 在其核心，提示工程涉及理解人工智能模型如何处理语言并使用上下文来生成响应。通过精心设计提示，你可以影响人工智能输出的方向、语气和深度，使其能够根据特定的目标或需求定制交互。提示工程的力量在于其解锁人工智能全部功能的能力，将其转变为一种适应各种任务和挑战的多功能工具。
- en: Prompt engineering represents a shift in how we interact with technology, moving
    from passive information consumers to active participants in a dialogue with AI.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 提示工程代表了我们在与技术互动方式上的转变，从被动的信息消费者转变为与AI对话的积极参与者。
- en: What Readers Can Expect to Learn
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 读者可以期待学习到什么
- en: As you dive into the pages of this book, you must know that I aim to unlock
    a new way of thinking and interacting with AI that's both profound and practical.
    You're about to become adept at shaping prompts that turn complex AI technology
    into a responsive, insightful companion across any challenge you face.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 当您深入阅读这本书的每一页时，您必须知道，我的目标是解锁一种深刻且实用的思考方式和与AI互动的新方法。您即将熟练地塑造提示，将复杂的AI技术转化为面对任何挑战时都能提供响应和洞察力的伙伴。
- en: We will walk through the intricate dance of human-AI conversation, showing you
    exactly how to lead. You'll learn the secrets behind structuring your questions
    to get the right answers. With practical examples, exercises, and easy-to-follow
    guides, we'll peel back the curtain on the AI wizardry, making the complex simple
    and the impossible within reach.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将带您领略人类-人工智能对话的复杂舞蹈，向您展示如何引领对话。您将学会如何构建问题以获得正确答案的秘密。通过实际案例、练习和易于遵循的指南，我们将揭开AI魔法的面纱，使复杂变得简单，使不可能变为可能。
- en: But this book offers more than just skills—it's an invitation to think differently
    about the potential of AI in your life. As we explore more advanced techniques
    and the vast applications of prompt engineering, you'll start to see AI as a partner
    in discovery and creativity. So, get ready. The future of human-AI collaboration
    begins with you and starts right here.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 但这本书提供的不仅仅是技能——它是对您生活中AI潜力的全新思考的邀请。当我们探索更高级的技术和提示工程的广泛应用时，您将开始将AI视为探索和创造力的伙伴。所以，准备好吧。人机协作的未来始于您，从这里开始。
- en: How This Book is Structured
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 本书是如何结构的
- en: This book is crafted to guide you seamlessly from the basics of ChatGPT and
    prompt engineering to the more intricate techniques and applications, ensuring
    a comprehensive understanding by the end of your journey. Each chapter builds
    on the last, starting with the fundamentals of how ChatGPT operates and moving
    through the nuances of crafting effective prompts.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 本书旨在引导您无缝地从ChatGPT和提示工程的基础知识过渡到更复杂的技术和应用，确保您在旅程结束时有一个全面的理解。每一章都建立在上一章的基础上，从ChatGPT运作的基本原理开始，逐步过渡到构建有效提示的细微差别。
- en: As we progress, I'll introduce you to more advanced prompt engineering strategies,
    learning how to leverage AI for creative and practical purposes across various
    fields. We delve into troubleshooting and the ethical considerations of AI interaction,
    ensuring you're equipped to navigate this technology's opportunities and challenges.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 随着我们不断前进，我将向您介绍更高级的提示工程策略，学习如何利用AI在各个领域的创意和实用目的。我们深入探讨故障排除和AI交互的伦理考量，确保您能够应对这一技术的机遇和挑战。
- en: The structure is designed to be both logical and flexible, allowing you to either
    proceed chapter by chapter or jump to sections that most interest you. By the
    end of the book, you'll have a thorough understanding of ChatGPT and prompt engineering.
    Welcome to a book that's as much a journey of discovery as it is a learning resource.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 结构设计既符合逻辑又灵活，让您可以选择逐章阅读，也可以跳到最感兴趣的章节。到书末，您将对ChatGPT和提示工程有一个全面的理解。欢迎来到一本既是探索之旅也是学习资源的书籍。
- en: 'Chapter 1: Understanding ChatGPT'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 第一章：理解ChatGPT
- en: Brief History of ChatGPT and Its Development
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT及其发展的简要历史
- en: The story of ChatGPT begins with the foundational work in Natural Language Processing
    (NLP) and machine learning, where researchers aimed to create algorithms that
    could understand and generate human language. OpenAI's development of ChatGPT
    marks a significant milestone in this quest, blending advanced NLP techniques
    with the power of generative pre-trained transformers (GPT) to create a conversational
    AI unlike any before.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT的故事始于自然语言处理（NLP）和机器学习的基础性工作，研究人员旨在创建能够理解和生成人类语言的算法。OpenAI对ChatGPT的开发标志着这一追求的重要里程碑，它将先进的NLP技术与生成预训练转换器（GPT）的力量相结合，创造了一种前所未有的对话式AI。
- en: The genesis of ChatGPT can be traced back to the introduction of the transformer
    model in 2017, a breakthrough in deep learning that enabled models to process
    words in relation to all other words in a sentence rather than one at a time.
    This innovation laid the groundwork for developing GPT, a series of models designed
    to predict the next word in a sentence, given all the previous words. Each iteration
    of GPT has been a leap forward in complexity and capability, culminating in the
    versions that power ChatGPT today.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT的起源可以追溯到2017年引入的transformer模型，这是深度学习的一个突破，使得模型能够根据句子中所有其他单词而不是单个单词来处理单词。这一创新为开发GPT系列模型奠定了基础，这些模型旨在根据句子中所有前面的单词预测句子中的下一个单词。GPT的每一代迭代都在复杂性和能力方面取得了飞跃，最终导致了今天为ChatGPT提供动力的版本。
- en: What sets ChatGPT apart is the ability to generate coherent and contextually
    relevant responses and its training method. OpenAI uses a technique called "reinforcement
    learning from human feedback" (RLHF), which involves training the model with a
    combination of algorithms and human input to refine its responses to be more aligned
    with what a human would find helpful, accurate, and engaging. This method helps
    the AI understand nuances in language, context, and even humor, making interactions
    with it feel more natural and less robotic.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT与众不同的能力在于生成连贯且与上下文相关的响应，以及其训练方法。OpenAI使用一种称为“基于人类反馈的强化学习”（RLHF）的技术，这涉及到使用算法和人类输入的组合来训练模型，以使其响应更符合人类认为有帮助、准确和吸引人的标准。这种方法帮助AI理解语言、上下文甚至幽默的细微差别，使得与之互动的感觉更加自然，不那么机械。
- en: ChatGPT's capabilities are vast. It can help with various tasks, from answering
    questions, offering explanations, and providing educational support to more creative
    endeavors like writing stories, composing emails, or generating code.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT的能力非常广泛。它可以帮助完成各种任务，从回答问题、提供解释和提供教育支持到更富有创造性的活动，如编写故事、撰写电子邮件或生成代码。
- en: The implications of ChatGPT offer a glimpse into a future where AI can serve
    as an assistant to human creativity and productivity rather than a replacement.
    However, this technology also presents challenges and ethical considerations.
    The information accuracy provided by AI models, their potential to generate misleading
    or harmful content, and privacy concerns are all critical issues that researchers
    and developers continue to address.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT的影响预示着一个未来，在这个未来中，AI可以作为人类创造力和生产力的助手，而不是替代品。然而，这项技术也带来了挑战和伦理考量。AI模型提供的信息准确性、其生成误导性或有害内容的能力以及隐私问题都是研究人员和开发者持续关注的关键问题。
- en: The Difference Between ChatGPT-3.5 and ChatGPT-4
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT-3.5和ChatGPT-4之间的区别
- en: For beginners navigating the evolving landscape of conversational AI models,
    understanding the distinction between ChatGPT-3.5 and ChatGPT-4 is important.
    Let's delve into these differences, focusing on the key improvements introduced
    with GPT-4 and how to access these models.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 对于正在探索对话式AI模型不断演变领域的初学者来说，了解ChatGPT-3.5和ChatGPT-4之间的区别很重要。让我们深入探讨这些差异，重点关注GPT-4引入的关键改进以及如何访问这些模型。
- en: Key Improvements in ChatGPT-4
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT-4的关键改进
- en: 'Multimodal Capabilities: A standout feature of ChatGPT-4 is its multimodal
    capabilities, which means it can understand and generate responses based on both
    text and image inputs. This significantly broadens its applications, from enhanced
    conversational interfaces to more complex analytical tasks that involve visual
    data.'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 多模态能力：ChatGPT-4的一个显著特点是它的多模态能力，这意味着它可以理解和基于文本和图像输入生成响应。这显著扩大了其应用范围，从增强的对话界面到涉及视觉数据的更复杂的分析任务。
- en: 'Accuracy: ChatGPT-4 marks a leap forward in accuracy, making fewer factual
    errors than its predecessor. This improvement is particularly important for applications
    requiring high reliability, such as educational content generation, technical
    support, and professional advice.'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 准确性：ChatGPT-4在准确性方面取得了飞跃，比其前辈犯的错误更少。这种改进对于需要高可靠性的应用尤其重要，如教育内容生成、技术支持和专业建议。
- en: 'Response to Offensive Commands: OpenAI has strongly emphasized making ChatGPT-4
    less likely to engage with or respond to offensive inputs. This enhancement makes
    the model more suitable for diverse and inclusive applications by reducing the
    risk of generating inappropriate content.'
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 对冒犯性命令的响应：OpenAI强烈强调降低ChatGPT-4与或对冒犯性输入的参与或响应的可能性。这种增强使得该模型更适合多样化的包容性应用，通过减少生成不适当内容的风险。
- en: 'Steerability: ChatGPT-4 introduces improved steerability, allowing users to
    guide the model''s behavior according to specific requirements more effectively.
    This feature is essential for creating more dynamic and contextually appropriate
    interactions, including role-play scenarios and personalized academic tutoring.'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 可控性：ChatGPT-4 引入了改进的可控性，使用户能够更有效地根据特定要求引导模型的行为。这一特性对于创建更动态和情境适当的交互至关重要，包括角色扮演场景和个性化学术辅导。
- en: 'Academic and Problem-Solving Skills: With superior academic capabilities and
    advanced problem-solving skills, ChatGPT-4 stands out for its ability to tackle
    complex questions and offer detailed explanations. This makes it an invaluable
    tool for learners, researchers, and professionals seeking AI assistance in their
    work.'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 学术和解决问题的技能：ChatGPT-4 以其卓越的学术能力和先进的解决问题的技能而突出，能够处理复杂问题并提供详细的解释。这使得它成为寻求在工作和学习中利用人工智能辅助的学习者、研究人员和专业人士的宝贵工具。
- en: If you've never used ChatGPT before, the first thing to do is go to chat.openai.com
    and create an account. ChatGPT-3.5 is an earlier version available for free, while
    ChatGPT-4 requires a subscription priced at $20 per month. This subscription also
    ensures priority during peak times, a crucial feature for users relying on the
    tool for timely tasks.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你之前从未使用过 ChatGPT，首先需要做的是访问 chat.openai.com 并创建一个账户。ChatGPT-3.5 是一个免费提供的早期版本，而
    ChatGPT-4 需要订阅，每月价格为 20 美元。这个订阅还确保在高峰时段有优先权，这对于依赖该工具完成及时任务的用户来说是一个关键特性。
- en: Within the platform, you can switch between GPT-3.5 and GPT-4\. This way you
    can compare the performance and output quality directly, keeping in mind that
    while GPT-4 might operate at a slower speed due to its complexity, the quality
    and reliability of its outputs are significantly higher. If you plan to use ChatGPT
    for work and need its advanced features for more complex tasks, I strongly recommend
    ChatGPT-4 for its superior capabilities. However, for those just exploring the
    world of AI, experimenting, or playing around, GPT-3.5 works fine, though it has
    fewer features.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 在平台内，你可以切换到 GPT-3.5 和 GPT-4。这样你可以直接比较性能和输出质量，同时考虑到 GPT-4 由于其复杂性可能会运行得较慢，但其输出质量和可靠性显著更高。如果你计划将
    ChatGPT 用于工作并需要其高级功能来处理更复杂的任务，我强烈推荐 ChatGPT-4，因为它具有更优越的功能。然而，对于那些只是探索人工智能世界、进行实验或玩耍的人来说，GPT-3.5
    也足够使用，尽管它具有较少的功能。
- en: 'How ChatGPT Works: From Input to Response'
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT 的工作原理：从输入到响应
- en: Understanding how ChatGPT translates a simple prompt into a coherent and contextually
    relevant response requires peeling back the layers of one of the most advanced
    artificial intelligence models today. At its core, ChatGPT operates on machine
    learning principles, specifically leveraging a type of neural network known as
    a Transformer. This foundation has been pivotal in developing models like GPT
    (Generative Pre-trained Transformer), leading up to the iterations that power
    ChatGPT.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 了解 ChatGPT 如何将一个简单的提示转换为连贯且情境相关的响应，需要揭开当今最先进的人工智能模型之一的面纱。在核心上，ChatGPT 运行在机器学习原理之上，特别是利用一种称为
    Transformer 的神经网络类型。这一基础对于开发 GPT（生成预训练变换器）等模型至关重要，直至 ChatGPT 的迭代版本。
- en: From Input to Understanding
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 从输入到理解
- en: When you input a question or statement into ChatGPT, the first step is for the
    model to parse and understand the prompt. This involves breaking down the text
    into tokens, which can be words or parts of words. These tokens are then converted
    into numerical representations, known as embeddings, which capture not only the
    tokens' identity but also their relationship to other tokens. This process allows
    the model to understand the prompt's context and nuances, setting the stage for
    generating a relevant response.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 当你将一个问题或陈述输入到 ChatGPT 中时，第一步是模型对提示进行解析和理解。这涉及到将文本分解成标记，这些标记可以是单词或单词的一部分。然后，这些标记被转换成称为嵌入的数值表示，它们不仅捕捉到标记的身份，还捕捉到它们与其他标记的关系。这个过程使得模型能够理解提示的情境和细微差别，为生成相关响应做好准备。
- en: The Role of Attention Mechanisms
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 注意力机制的作用
- en: The Transformer architecture that underpins ChatGPT utilizes what's called an
    Attention Mechanism. It allows the model to weigh the importance of different
    words in the prompt relative to each other. For instance, in a sentence asking
    about the weather in Paris, "weather" and "Paris" would be given more significance.
    This focus enables ChatGPT to maintain relevance and coherence in its responses,
    ensuring that it addresses the core of the user's query.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 支撑ChatGPT的Transformer架构使用了一种称为注意力机制的技术。它允许模型根据彼此之间的相对重要性权衡提示中不同单词的重要性。例如，在一个询问巴黎天气的句子中，“weather”和“Paris”会被赋予更多的意义。这种关注使ChatGPT能够在其响应中保持相关性和连贯性，确保它解决了用户查询的核心。
- en: Generating the Response
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 生成响应
- en: With an understanding of the prompt established, ChatGPT generates a response.
    This is done through a process known as Autoregressive Text Generation. Starting
    with the initial input, the model predicts the next word in the sequence based
    on the probability of what it learned during training. It then adds this word
    to the prompt and repeats the process, generating text word by word. Throughout
    this phase, the model continuously refers to the original prompt and the tokens
    it has generated, maintaining context.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 在建立对提示的理解之后，ChatGPT生成一个响应。这是通过一个称为自回归文本生成的过程完成的。从初始输入开始，模型根据训练期间学到的概率预测序列中的下一个单词。然后它将这个单词添加到提示中，并重复这个过程，逐字生成文本。在整个这个阶段，模型持续参考原始提示和它已经生成的标记，保持上下文。
- en: Training and Learning
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 训练和学习
- en: The ability of ChatGPT to process prompts and generate responses is underpinned
    by extensive training on diverse datasets. These datasets include a wide range
    of text from books, articles, websites, and other sources, allowing the model
    to learn various writing styles, tones, and information across countless subjects.
    This training involves understanding language and learning to predict the most
    likely next word in a sequence, enabling the generation of text that feels natural
    and human-like.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT处理提示并生成响应的能力建立在大量对多样化数据集的训练之上。这些数据集包括来自书籍、文章、网站和其他来源的广泛文本，使模型能够学习各种写作风格、语气和无数主题中的信息。这种训练涉及理解语言并学习预测序列中最可能出现的下一个单词，从而生成感觉自然、类似人类的文本。
- en: The Significance of Large Language Models in AI
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 大型语言模型在人工智能中的重要性
- en: The advent of Large Language Models (LLMs) like ChatGPT represents a pivotal
    moment in artificial intelligence. It marks a significant leap in our ability
    to create machines that understand and generate human language with remarkable
    depth and nuance. These models have transformed the landscape of Natural Language
    Processing (NLP).
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 大型语言模型（LLMs）如ChatGPT的出现标志着人工智能的一个关键时刻。它标志着我们在创建能够以非凡深度和细微差别理解和生成人类语言的机器方面的能力取得了重大飞跃。这些模型已经改变了自然语言处理（NLP）的格局。
- en: Large language models are essentially vast neural networks trained on equally
    vast datasets comprising text from the internet. This training involves learning
    patterns, structures, and the intricacies of human language from various sources,
    allowing the models to generate responses that mimic human-like understanding
    and articulation. The scale of these models, often containing hundreds of billions
    of parameters, enables an unprecedented level of linguistic and contextual awareness.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 大型语言模型本质上是在包含来自互联网的文本的庞大数据集上训练的巨大神经网络。这种训练涉及从各种来源学习人类语言的模式、结构和复杂性，使模型能够生成模仿人类理解和表达的响应。这些模型的规模，通常包含数百亿个参数，实现了前所未有的语言和上下文意识水平。
- en: LLMs serve as the backbone for many applications, from generating creative content
    to providing insights into complex problems. They showcase the versatility and
    adaptability of AI in addressing tasks once believed to be the sole domain of
    human intellect. Moreover, LLMs have dramatically improved the accessibility and
    usability of AI for a broader audience. By providing more intuitive and conversational
    interfaces, they lower the entry barrier for users to leverage AI technologies,
    democratizing access to sophisticated data analysis, content creation, and problem-solving
    tools.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: LLMs（大型语言模型）是许多应用的骨干，从生成创意内容到提供对复杂问题的见解。它们展示了人工智能在处理一度被认为是人类智慧独占领域的任务时的多样性和适应性。此外，LLMs显著提高了人工智能对更广泛受众的可用性和易用性。通过提供更直观和对话式的界面，它们降低了用户利用人工智能技术的门槛，使复杂的数据分析、内容创作和问题解决工具的访问权民主化。
- en: Potential Applications and Limitations
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 潜在应用和局限性
- en: 'In this section, we''ll touch upon potential ChatGPT applications. Still, we
    will not cover them in detail, as I''ve thoroughly addressed this topic in my
    other book, "The ChatGPT Alchemist: Turning Ideas Into Income with ChatGPT."'
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，我们将简要提及ChatGPT的潜在应用。但我们不会详细讨论，因为我已经在我的另一本书《ChatGPT炼金术士：用ChatGPT将想法转化为收入》中彻底讨论了这一主题。
- en: Potential Applications
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 潜在应用
- en: 'Education: ChatGPT can act as a 24/7 tutor, providing explanations, helping
    with homework, and even offering practice quizzes.'
  id: totrans-91
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 教育：ChatGPT可以作为全天候的导师，提供解释，帮助做作业，甚至提供练习测验。
- en: 'Customer Support: Imagine contacting customer service and getting immediate,
    helpful responses without waiting. ChatGPT can power chatbots that handle inquiries
    efficiently.'
  id: totrans-92
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 客户支持：想象一下联系客户服务并立即获得有帮助的响应，无需等待。ChatGPT可以为处理查询的聊天机器人提供动力。
- en: 'Content Creation: ChatGPT can be a boon for content creators, from drafting
    blog posts to generating creative stories.'
  id: totrans-93
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 内容创作：ChatGPT对于内容创作者来说是一大福音，从撰写博客文章到生成创意故事。
- en: 'Programming Help: For developers, ChatGPT can suggest code, debug, or even
    explain complex concepts in simpler terms.'
  id: totrans-94
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 编程帮助：对于开发者来说，ChatGPT可以建议代码、调试，甚至用更简单的术语解释复杂概念。
- en: 'Language Learning: ChatGPT offers a dynamic way to practice language skills,
    as it can converse in multiple languages.'
  id: totrans-95
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 语言学习：ChatGPT提供了一种动态练习语言技能的方式，因为它可以用多种语言进行对话。
- en: Limitations
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 局限性
- en: Despite its impressive capabilities, ChatGPT has limitations. Understanding
    these will help you navigate its use more effectively and ethically.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管ChatGPT拥有令人印象深刻的性能，但它也有局限性。了解这些局限性将帮助您更有效地、道德地使用它。
- en: 'Accuracy of Information: ChatGPT sometimes gets things wrong. It''s based on
    patterns in data up to its last training update (currently April 2023), which
    means it might not have the most current information or can inadvertently generate
    incorrect or misleading answers.'
  id: totrans-98
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 信息准确性：ChatGPT有时会出错。它基于截至其最后训练更新（目前为2023年4月）的数据模式，这意味着它可能没有最新的信息，或者可能无意中生成错误或误导性的答案。
- en: 'Bias and Ethical Concerns: Like any AI trained on vast datasets from the internet,
    ChatGPT can reflect and even amplify biases present in those datasets. It''s crucial
    to approach its responses with a critical eye and consider the ethical implications
    of its use.'
  id: totrans-99
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 偏见和伦理担忧：像任何基于互联网上大量数据集训练的AI一样，ChatGPT可能会反映甚至放大这些数据集中的偏见。在处理其响应时，必须持批判性眼光，并考虑其使用的伦理影响。
- en: 'Lack of Understanding: While ChatGPT can mimic understanding through its responses,
    it doesn''t "understand" in the human sense. It processes inputs based on patterns
    rather than genuine comprehension, sometimes leading to nonsensical or irrelevant
    responses.'
  id: totrans-100
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 理解不足：虽然ChatGPT可以通过其响应模仿理解，但它并不“理解”人类意义上的理解。它根据模式而非真正的理解来处理输入，有时会导致无意义或不相关的响应。
- en: 'Dependence and De-skilling: Overreliance on AI for tasks like writing, problem-solving,
    or even thinking can lead to skills degradation. It''s important to use ChatGPT
    as a tool rather than a crutch.'
  id: totrans-101
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 依赖与技能退化：过度依赖人工智能进行写作、问题解决甚至思考可能导致技能退化。将ChatGPT用作工具而非拐杖非常重要。
- en: 'Privacy Concerns: Conversations with ChatGPT can sometimes contain personal
    data. While OpenAI has guidelines and mechanisms in place to handle data responsibly,
    privacy remains a concern, especially in sensitive applications.'
  id: totrans-102
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 隐私担忧：与ChatGPT的对话有时可能包含个人数据。尽管OpenAI已经制定了处理数据的指导方针和机制，但隐私仍然是一个担忧，尤其是在敏感应用中。
- en: It's essential to navigate the future with awareness, acknowledging the limitations
    and ethical considerations that accompany this powerful tool. As we harness the
    potential of ChatGPT, let's do so with a commitment to responsible use, ensuring
    that it serves as a force for good in society.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 在导航未来时，我们必须保持警觉，承认伴随这个强大工具的局限性和伦理考量。当我们利用ChatGPT的潜力时，让我们做出承诺，负责任地使用它，确保它成为社会中的正能量。
- en: Key Takeaways from Chapter 1
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 第一章要点总结
- en: ChatGPT, a landmark in AI, merges NLP and generative transformers to revolutionize
    conversational AI.
  id: totrans-105
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: ChatGPT，人工智能的一个里程碑，将NLP和生成式转换器合并，以革新对话式AI。
- en: Reinforcement learning from human feedback (RLHF) equips ChatGPT with nuanced
    language and context understanding, enhancing its human-like interaction capabilities.
  id: totrans-106
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 从人类反馈中进行强化学习（RLHF）使ChatGPT具备细微的语言和上下文理解能力，增强了其类似人类的交互能力。
- en: Progressing from the transformer model, GPT iterations showcase significant
    advancements in AI's predictive text generation, reflecting swift technological
    evolution.
  id: totrans-107
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 从Transformer模型发展而来，GPT的迭代展示了AI预测文本生成的重大进步，反映了技术的快速演变。
- en: ChatGPT -4's standout multimodal capabilities and improvements in accuracy and
    steerability mark it as a versatile tool for various applications.
  id: totrans-108
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: ChatGPT-4的多模态能力和在准确性和可控性方面的改进，使其成为各种应用的通用工具。
- en: The model's enhanced accuracy and customizability cater to sectors requiring
    precision, illustrating OpenAI's push towards more adaptable AI solutions.
  id: totrans-109
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 模型的增强准确性和可定制性满足了需要精确性的行业，展示了OpenAI向更适应性的AI解决方案推进的努力。
- en: ChatGPT faces challenges like maintaining information accuracy, ethical considerations,
    and privacy concerns, emphasizing the importance of responsible AI usage.
  id: totrans-110
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: ChatGPT面临着保持信息准确性、伦理考虑和隐私问题等挑战，强调了负责任地使用AI的重要性。
- en: Its broad application spectrum—from education and creativity to technical support—underscores
    ChatGPT's potential to augment human productivity and creativity.
  id: totrans-111
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它广泛的应用范围——从教育和创造力到技术支持——凸显了ChatGPT增强人类生产力和创造力的潜力。
- en: Ongoing advancements and ethical considerations in ChatGPT's development signify
    a balanced approach to harnessing AI's societal benefits while addressing its
    complexities.
  id: totrans-112
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: ChatGPT发展中的持续进步和伦理考虑标志着在利用AI的社会效益的同时解决其复杂性的平衡方法。
- en: 'Chapter 2: Foundations of Prompt Engineering'
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 第二章：提示工程的基础
- en: What Is Prompt Engineering?
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 什么是提示工程？
- en: Prompt engineering is the art and science of meticulously crafting questions
    or inputs to elicit specific, desired responses from artificial intelligence systems
    like ChatGPT. This discipline lies at the intersection of technology, linguistics,
    and psychology, requiring a deep understanding of how AI interprets human language
    and an inventive approach to communication.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 提示工程是精心设计问题或输入以从像ChatGPT这样的人工智能系统中获得特定、期望的响应的艺术和科学。这一学科位于技术、语言学和心理学交汇处，需要深入理解AI如何解释人类语言，并采用创新的沟通方法。
- en: At its core, prompt engineering is about leveraging the AI's underlying model—its
    training, capabilities, and limitations—to guide it toward generating accurate,
    relevant, creative, and insightful outputs. The process involves a combination
    of precise language, contextual cues, and strategic structuring of prompts to
    navigate the complexities of AI's response mechanisms.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 在本质上，提示工程是利用AI的底层模型——其训练、能力和局限性——来引导它生成准确、相关、创造性和有洞察力的输出。这个过程涉及精确语言、上下文线索和提示的战略结构，以导航AI响应机制的复杂性。
- en: The importance of prompt engineering stems from the AI's reliance on the quality
    and structure of the input it receives. A well-engineered prompt can lead to responses
    that provide new perspectives, solve complex problems, or inspire innovation.
    Conversely, poorly crafted prompts may result in vague, irrelevant, or misleading
    answers. Thus, prompt engineering is not just about asking the right questions
    but framing them in a way that aligns with the AI's operational logic.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 提示工程的重要性源于AI对其接收到的输入的质量和结构的依赖。一个精心设计的提示可以导致提供新视角、解决复杂问题或激发创新的响应。相反，设计不佳的提示可能会导致模糊、不相关或误导性的答案。因此，提示工程不仅仅是提出正确的问题，而是以与AI的操作逻辑相一致的方式构建这些问题。
- en: As AI technologies like ChatGPT become more integrated into various sectors,
    the ability to effectively communicate with these systems becomes paramount. Prompt
    engineering offers a pathway to enhance this communication, ensuring that interactions
    with AI are as impactful as possible.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 随着像ChatGPT这样的AI技术越来越多地融入各个行业，有效地与这些系统沟通的能力变得至关重要。提示工程提供了一条提高这种沟通效率的途径，确保与AI的互动尽可能有影响力。
- en: In this chapter, we'll delve into the components that make a prompt effective,
    the principles guiding the crafting of prompts, and the strategies that can optimize
    the interaction with AI, setting the foundation for mastering this essential skill.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将深入研究使提示有效的组成部分、指导提示构建的原则以及优化与AI互动的策略，为掌握这一基本技能奠定基础。
- en: The Components of a Good Prompt
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 好的提示的组成部分
- en: 'A well-engineered prompt is the linchpin in eliciting precise and relevant
    responses from ChatGPT. In this subchapter, I''ll explain the essential elements
    that constitute a good prompt: clarity, specificity, context, and open-endedness.
    Each serves a unique purpose in the art of prompt crafting.'
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 一个精心设计的提示是激发ChatGPT精确和相关性响应的关键。在本子章节中，我将解释构成良好提示的基本要素：清晰性、明确性、上下文和开放性。每个要素在提示构建的艺术中都有其独特的作用。
- en: Clarity is paramount. A prompt must be straightforward and unambiguous to avoid
    confusion and ensure that ChatGPT accurately grasps your intent. Clear prompts
    guide ChatGPT in the right direction, reducing the likelihood of irrelevant or
    off-target responses. Crafting clear prompts involves using precise language and
    avoiding overly complex or vague phrasing that could lead the AI astray.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 清晰性至关重要。提示必须直接且明确，以避免混淆并确保ChatGPT准确理解你的意图。清晰的提示引导ChatGPT走向正确的方向，减少无关或不切题的响应的可能性。构建清晰的提示涉及使用精确的语言，并避免可能导致AI误入歧途的过于复杂或含糊不清的表达。
- en: Specificity narrows the focus of the inquiry, directing ChatGPT's response mechanism
    to zoom in on the exact area of interest or issue at hand. It helps in filtering
    out extraneous information, ensuring that the responses are directly relevant
    to the user's query. Specific prompts effectively leverage the AI's vast knowledge
    base, targeting the retrieval or generation of information that best matches the
    user's request.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 明确性缩小了调查的范围，将ChatGPT的响应机制聚焦于感兴趣的特定区域或当前问题。这有助于过滤掉无关信息，确保响应直接与用户的查询相关。明确的提示能够有效地利用AI的广泛知识库，针对与用户请求最匹配的信息检索或生成。
- en: Context enriches the prompt by providing necessary background information, enabling
    ChatGPT to generate responses informed by a broader understanding of the topic.
    Contextual cues are especially important in complex or nuanced inquiries, where
    the relevance and depth of the response can be significantly enhanced by the AI's
    awareness of the underlying circumstances or broader thematic connections.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 上下文通过提供必要的背景信息丰富了提示，使ChatGPT能够根据对主题的更广泛理解生成响应。在复杂或细微的调查中，上下文线索尤为重要，因为AI对潜在情况或更广泛主题联系的了解可以显著增强响应的相关性和深度。
- en: Open-endedness encourages ChatGPT to explore beyond straightforward, binary
    answers, inviting creativity, depth, and exploration in its responses. Open-ended
    prompts are particularly useful in scenarios where the goal is to generate ideas,
    stimulate discussion, or explore a topic from multiple perspectives.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 开放性鼓励ChatGPT探索超出简单、二元的答案，在其回应中激发创造力、深度和探索精神。开放性问题在旨在生成想法、激发讨论或从多个角度探索主题的场景中尤其有用。
- en: By the end of this book, you'll learn how effective prompt crafting can significantly
    enhance the utility and satisfaction of your interactions with ChatGPT across
    various domains.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 到本书结束时，你将学会如何通过有效的提示构建显著提高你在各个领域与ChatGPT互动的效用和满意度。
- en: The Role of Creativity in Prompt Engineering
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 提示工程中创造力的作用
- en: The role of creativity in prompt engineering is the essence that transforms
    functional prompts into gateways of innovation and discovery. This involves experimenting
    with language, context, and structure to inspire unique and insightful responses.
    It's about pushing beyond conventional queries to explore the boundaries of what
    ChatGPT can generate.
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 在提示工程中，创造力的作用是将功能性提示转化为创新和发现的门户的本质。这涉及到对语言、上下文和结构的实验，以激发独特和有洞察力的响应。这是关于超越传统查询，探索ChatGPT可以生成的边界。
- en: Engaging with ChatGPT creatively might involve presenting scenarios, hypotheticals,
    or even challenges that encourage it to apply its knowledge base in new and interesting
    ways. The creativity in prompt engineering lies in the ability to envision the
    potential paths AI might take in its response process and craft prompts that guide
    it toward those paths.
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 与ChatGPT进行创造性的互动可能包括提出场景、假设甚至挑战，鼓励它以新的和有趣的方式应用其知识库。提示工程中的创造力在于预见AI在响应过程中可能采取的潜在路径，并构建引导它走向这些路径的提示。
- en: Imagine you're sitting across from ChatGPT, ready to chat. But instead of just
    asking straight questions, you decide to mix things up. You start experimenting
    with different ways of asking, playing with words, and tossing in new ideas or
    funny challenges. This is a way to see how far ChatGPT can stretch its imagination
    with you.
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 想象你正坐在ChatGPT对面，准备聊天。但不是直接提问，你决定改变一下方式。你开始尝试不同的提问方式，玩弄文字，并提出新的想法或有趣的挑战。这是看看ChatGPT能与你一起发挥多少想象力的方法。
- en: I'm here to encourage you to try this out. Think of it as a game where you're
    testing ChatGPT's knowledge and creativity. Ask it to plan a party on Mars or
    how Shakespeare would text if he were alive today. It's in these playful moments
    that AI can surprise you, maybe by making you laugh or think about something in
    a way you hadn't before.
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 我在这里鼓励你们尝试一下。把它想象成一个游戏，你在测试ChatGPT的知识和创造力。让它策划一场火星派对，或者想象如果莎士比亚今天还活着，他会怎么发短信。在这些轻松的时刻，AI可能会让你感到惊讶，也许是通过让你笑，或者以你以前从未想过的方式让你思考。
- en: Moreover, creativity in prompts can unlock ChatGPT's potential to generate outputs
    that reflect a deeper level of understanding, empathy, or humor, enriching the
    human-AI interaction. It allows for the exploration of the AI's capabilities,
    testing its limits, and understanding its nuances.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，提示中的创造力可以解锁ChatGPT生成反映更深层次理解、同理心或幽默感的输出的潜力，丰富人机交互。它允许探索AI的能力，测试其极限，并理解其细微差别。
- en: Basic Techniques for Effective Prompting
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 有效的提示基本技巧
- en: Mastering the art of prompt engineering involves understanding and applying
    several fundamental yet powerful techniques. These strategies are crucial for
    crafting prompts that effectively communicate with ChatGPT to produce the most
    insightful and relevant responses.
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 掌握提示工程的艺术涉及理解和应用几种基本而强大的技术。这些策略对于制作能够有效与ChatGPT沟通的提示至关重要，以产生最深刻和相关的回应。
- en: 'Leading Questions: This technique is about framing your prompts in a way that
    gently nudges ChatGPT towards a specific area of inquiry or thought process. By
    asking leading questions, you can subtly influence the direction of the conversation,
    making it more likely for the AI to focus on the desired topics or details. This
    approach works especially well when exploring complex subjects where you want
    to guide ChatGPT through a series of logical steps or when seeking information
    that builds upon previous responses.'
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 引导性问题：这种技术是通过以某种方式构建你的提示，温和地引导ChatGPT朝向特定的探究领域或思维过程。通过提出引导性问题，你可以微妙地影响对话的方向，使AI更有可能关注你想要的主题或细节。这种方法在探索复杂主题时特别有效，当你想要引导ChatGPT通过一系列逻辑步骤或寻求基于先前回应的信息时。
- en: 'Example:'
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：
- en: Your first prompt, "What are the main types of renewable energy sources?"
  id: totrans-137
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你的第一个提示，“可再生能源的主要类型有哪些？”
- en: Once answered, proceed with, "What challenges are associated with storing and
    distributing these energy sources?"
  id: totrans-138
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一旦回答完毕，继续提问：“存储和分配这些能源源有哪些挑战？”
- en: Finally, "How is AI being used to solve these challenges, focusing on one renewable
    energy source as an example?"
  id: totrans-139
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 最后，聚焦于“AI是如何被用来解决这些挑战的，以一个可再生能源源为例？”
- en: 'Incremental Prompting: Incremental prompting is like peeling an onion, layer
    by layer, to reveal the core. Start with a broad, general question and, based
    on ChatGPT''s response, gradually narrow down the focus with more specific follow-up
    prompts. This method allows for a deeper exploration of a topic, as it encourages
    the AI to provide detailed and comprehensive answers at each step. It''s an effective
    way to navigate vast information spaces or drill down into nuanced aspects of
    a subject.'
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 逐步提示：逐步提示就像一层层剥洋葱，揭示核心。从一个宽泛、一般的问题开始，根据ChatGPT的回应，逐步通过更具体的后续提示缩小焦点。这种方法允许对主题进行更深入的探索，因为它鼓励AI在每一步提供详细和全面的答案。这是一种有效的方法来导航庞大的信息空间或深入探讨主题的细微之处。
- en: 'Example:'
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：
- en: 'Start Broad:'
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 从宽泛开始：
- en: Your first prompt, "Give me an overview of the evolution of artificial intelligence
    from its beginning to the present day."
  id: totrans-143
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你的第一个提示，“给我一个从开始到现在的艺术智能演变概述。”
- en: 'First Layer of Detail Based on Response:'
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 根据回应的第一层细节：
- en: If the overview mentions key milestones, the next prompt could be, "What were
    the critical technological advancements that propelled the development of AI during
    its early stages?"
  id: totrans-145
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果概述中提到了关键里程碑，下一个提示可以是，“在AI早期发展阶段，有哪些关键技术进步推动了其发展？”
- en: 'More Specific, Based on Previous Answer:'
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 更具体地说，基于之前的回答：
- en: If the response highlights certain technologies, you might ask, "How did the
    invention of neural networks impact the capabilities of AI systems?"
  id: totrans-147
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果响应突出了某些技术，你可能问："神经网络的出现是如何影响人工智能系统能力的？"
- en: 'Drill Down Further:'
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 深入挖掘：
- en: From there, "Can you discuss a breakthrough application of neural networks in
    AI that significantly influenced current AI research directions?"
  id: totrans-149
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 从那里，"你能讨论一个在人工智能领域对当前研究方向有重大影响的神经网络突破性应用吗？"
- en: 'Focus on Nuanced Aspect:'
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 关注细微之处：
- en: Finally, based on the information about breakthrough applications, "What ethical
    considerations have emerged with the advanced application of neural networks in
    AI?"
  id: totrans-151
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 最后，基于突破性应用的信息，"随着神经网络在人工智能中的高级应用，出现了哪些伦理考量？"
- en: 'Use of Specific Keywords or Phrases: Integrating specific keywords or phrases
    into your prompts can significantly enhance ChatGPT''s ability to generate relevant
    and precise responses. These keywords act as signposts, guiding the AI''s understanding
    and response mechanism towards the intended context or content area. Careful selection
    of these words can trigger ChatGPT''s training on related topics, aligning the
    responses with your inquiry''s intent.'
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 使用特定的关键词或短语：将特定的关键词或短语整合到你的提示中可以显著增强ChatGPT生成相关和精确响应的能力。这些关键词作为路标，引导AI的理解和响应机制朝着预期的上下文或内容领域发展。仔细选择这些词可以触发ChatGPT在相关主题上的训练，使响应与你的查询意图保持一致。
- en: 'Example:'
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：
- en: 'Initial Prompt with Key Concepts:'
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 初始提示中的关键概念：
- en: '"Can you explain how quantum computing impacts the field of cryptography?"'
  id: totrans-155
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '"你能解释量子计算是如何影响密码学领域的吗？"'
- en: 'Keywords: "quantum computing", "cryptography"'
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 关键词： "量子计算"、"密码学"
- en: 'Adding Specificity with More Keywords:'
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 通过更多关键词增加具体性：
- en: 'Based on the initial response, suppose quantum computing is described as potentially
    breaking traditional encryption methods. The follow-up could be: "What are quantum-resistant
    encryption algorithms, and how do they secure data against quantum attacks?"'
  id: totrans-158
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 根据初始响应，假设量子计算被描述为可能破坏传统的加密方法。后续可以是："什么是量子抗性加密算法，它们是如何保护数据免受量子攻击的？"
- en: 'Keywords: "quantum-resistant," "encryption algorithms," "quantum attacks."'
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 关键词： "量子抗性"、"加密算法"、"量子攻击"。
- en: 'Drill Down with Technical Details:'
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 深入技术细节：
- en: 'If ChatGPT mentions specific algorithms like "Post-Quantum Cryptography," the
    next prompt could be: "How does Post-Quantum Cryptography differ from classical
    encryption techniques in protecting against cybersecurity threats?"'
  id: totrans-161
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果ChatGPT提到了特定的算法如"后量子密码学"，下一个提示可以是："后量子密码学在保护网络安全威胁方面与经典加密技术有何不同？"
- en: 'Keywords: "Post-Quantum Cryptography," "classical encryption techniques," "cybersecurity
    threats."'
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 关键词： "后量子密码学"、"经典加密技术"、"网络安全威胁"。
- en: 'Focus on Application and Implementation:'
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 关注应用和实施：
- en: 'After discussing the technical differences, you might want to know about practical
    applications: "Can you provide examples of sectors implementing Post-Quantum Cryptography
    to enhance their security measures?"'
  id: totrans-164
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在讨论了技术差异之后，你可能想了解实际应用："你能提供一些实施后量子密码学以增强其安全措施的行业的例子吗？"
- en: 'Keywords: "Post-Quantum Cryptography," "security measures," "sectors."'
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 关键词： "后量子密码学"、"安全措施"、"行业"。
- en: 'Exploring Future Prospects:'
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 探索未来前景：
- en: 'Lastly, to explore future directions, a prompt could be: "What are the emerging
    challenges and opportunities in the field of quantum cryptography as it evolves?"'
  id: totrans-167
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 最后，为了探索未来方向，一个提示可以是："随着量子密码学领域的发展，新兴的挑战和机遇有哪些？"
- en: 'Keywords: "emerging," "challenges," "opportunities," "quantum cryptography,"
    "evolves"'
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 关键词： "新兴"、"挑战"、"机遇"、"量子密码学"、"发展"
- en: Applying these techniques requires a blend of creativity, precision, and strategic
    thinking. By experimenting with leading questions, incremental prompting, and
    the judicious use of keywords, you can refine your approach to interacting with
    ChatGPT. This practice not only improves the quality of ChatGPT's responses but
    also deepens your understanding of how to communicate effectively with advanced
    AI models. As you become more adept at employing these techniques, you'll unlock
    new possibilities for discovery and insight.
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 应用这些技术需要创意、精确性和战略思维的结合。通过实验性的引导问题、增量提示和关键词的明智使用，你可以优化与ChatGPT的交互方式。这种实践不仅提高了ChatGPT响应的质量，而且加深了你对于如何与高级AI模型有效沟通的理解。随着你越来越擅长运用这些技术，你将解锁新的发现和洞察的可能性。
- en: 'Exercise: Crafting Effective Prompts'
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 练习：构建有效的提示
- en: 'Objective: Practice the basic techniques of effective prompting to improve
    interaction quality with ChatGPT.'
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 目标：练习有效的提示基本技巧，以改善与ChatGPT的交互质量。
- en: 'Task:'
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 任务：
- en: Choose a topic you're curious about but feel you have limited knowledge on.
    Apply the techniques mentioned in the chapter to craft a series of prompts that
    guide ChatGPT in exploring this topic in depth. Let's use the topic of "sustainable
    living practices" as an example.
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 选择一个你感兴趣但知识有限的课题。应用章节中提到的技术来构建一系列提示，引导ChatGPT深入探索这个课题。让我们以“可持续生活实践”这个主题为例。
- en: 'Start with a Leading Question: "What are some general principles of sustainable
    living?"'
  id: totrans-174
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 从一个引导性问题开始：“可持续生活的基本原则有哪些？”
- en: 'Use Incremental Prompting to Drill Down: Based on ChatGPT''s response, pick
    an aspect that interests you, for example, "energy conservation," and ask for
    more details: "Can you explain how energy conservation plays a role in sustainable
    living?"'
  id: totrans-175
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用增量提示进行深入挖掘：基于ChatGPT的回复，选择一个你感兴趣的角度，例如，“能量守恒”，并要求更多细节：“你能解释一下能量守恒在可持续生活中扮演什么角色吗？”
- en: 'Integrate Specific Keywords: From the discussion on energy conservation, choose
    a specific technology or method to explore further, using targeted keywords: "What
    are the benefits and challenges of solar panels for household energy conservation?"'
  id: totrans-176
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 集成特定关键词：从关于能量守恒的讨论中，选择一个特定的技术或方法进行进一步探索，使用针对性的关键词：“太阳能板在家庭能源节约方面的优势和挑战是什么？”
- en: 'Add Context to Your Prompt: Provide a scenario or context to deepen the exploration:
    "Considering the cost and climate conditions, how effective are solar panels in
    northern climates for sustainable living?"'
  id: totrans-177
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为你的提示添加上下文：提供一个场景或上下文以深化探索：“考虑到成本和气候条件，太阳能板在北方气候中对可持续生活的有效性如何？”
- en: 'Encourage Open-ended Exploration: Invite ChatGPT to provide a broader perspective
    or creative insights: "Can you imagine a future where sustainable living practices
    are universally adopted? What changes might we see in urban and rural settings?"'
  id: totrans-178
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 鼓励开放式探索：邀请ChatGPT提供更广泛的视角或创意见解：“你能想象一个可持续生活实践被普遍采纳的未来吗？我们可能会在城市和乡村环境中看到哪些变化？”
- en: 'Reflection: After completing the exercise, reflect on how each prompt influenced
    the direction and depth of ChatGPT''s responses. Notice how specificity, context,
    and creativity can unlock more detailed and insightful answers. This exercise
    is designed to improve your understanding and skill in prompt engineering, fostering
    more meaningful and productive interactions with AI.'
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 反思：完成练习后，反思每个提示如何影响了ChatGPT响应的方向和深度。注意具体性、上下文和创意如何解锁更详细和有洞察力的答案。这个练习旨在提高你对提示工程的理解和技能，促进与AI更有意义和高效的交互。
- en: Key Takeaways from Chapter 2
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 第二章的关键要点
- en: Prompt engineering is critical in navigating AI interactions, focusing on crafting
    inputs to elicit precise, relevant responses from AI systems like ChatGPT.
  id: totrans-181
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在导航AI交互时，提示工程至关重要，重点是构建输入以从ChatGPT等AI系统中引发精确、相关的响应。
- en: A successful prompt combines clarity, specificity, context, and a level of open-endedness
    to guide ChatGPT responses effectively.
  id: totrans-182
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个成功的提示结合了清晰度、具体性、上下文和一定程度上的开放性，以有效地引导ChatGPT的响应。
- en: Creative prompt crafting expands the possibilities of AI responses, unlocking
    innovative insights and solutions.
  id: totrans-183
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 创意提示构建扩展了AI响应的可能性，解锁创新见解和解决方案。
- en: Employing strategies like incremental prompting and specific keyword use enhances
    the interaction quality with ChatGPT, ensuring responses are aligned with user
    intentions.
  id: totrans-184
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 采用增量提示和特定关键词使用等策略，可以增强与ChatGPT的交互质量，确保响应与用户意图保持一致。
- en: Regularly crafting and refining prompts, informed by feedback from ChatGPT's
    responses, sharpens your prompt engineering skills, enabling more meaningful and
    productive AI interactions.
  id: totrans-185
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 定期制作和改进提示，根据ChatGPT的响应反馈，可以磨练你的提示工程技能，使AI互动更加有意义和高效。
- en: Steering clear of vagueness, overly complex questions, and disregarding the
    tone can significantly improve the effectiveness of your prompts.
  id: totrans-186
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 避免模糊不清、过于复杂的问题，以及忽视语气，可以显著提高你提示的有效性。
- en: The journey of prompt engineering is continuous, where each interaction serves
    as a stepping stone toward mastering effective communication with AI.
  id: totrans-187
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提示工程的旅程是持续的，每一次互动都是通向掌握与AI有效沟通的基石。
- en: 'Chapter 3: Crafting Your First Prompt'
  id: totrans-188
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第三章：制作你的第一个提示
- en: Every journey begins with a single step. In the world of artificial intelligence,
    that step is the crafting of your first prompt. As you stand at the threshold
    of this new frontier, remember that the power to shape this conversation lies
    in your hands. Let's embark on this journey together, transforming your curiosity
    into a bridge that connects you with the vast, uncharted territories of AI interaction.
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: 每一段旅程都是从第一步开始的。在人工智能的世界里，这一步就是制作你的第一个提示。当你站在这个新领域的门槛上时，请记住，塑造这次对话的力量掌握在你手中。让我们共同踏上这段旅程，将你的好奇心转化为连接你与AI互动广阔、未知的领域的桥梁。
- en: Setting Clear Objectives for Your Prompt
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: 为你的提示设置明确的目标
- en: Setting clear objectives for your prompt ensures that your interactions are
    aligned with your desired outcomes. Whether you're seeking information, generating
    content, or attempting to solve a problem, the clarity of your objective will
    significantly influence the effectiveness and relevance of ChatGPT's response.
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: 为你的提示设置明确的目标可以确保你的互动与你的期望结果保持一致。无论你是寻求信息、生成内容还是试图解决问题，你的目标清晰度将显著影响ChatGPT响应的有效性和相关性。
- en: The objective of your prompt should be concise and specific. It helps ChatGPT
    understand not just the "what" but the "why" behind your query. For instance,
    if your goal is to generate ideas for a blog post, specifying the theme, target
    audience, and desired tone can lead to more tailored suggestions. Similarly, if
    you're looking to solve a technical problem, providing clear context and details
    will enable the AI to offer more accurate solutions.
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: 你的提示目标应该是简洁和具体的。这有助于ChatGPT理解你的查询背后的“是什么”和“为什么”。例如，如果你的目标是生成博客文章的想法，指定主题、目标受众和期望的语气可以导致更定制化的建议。同样，如果你正在寻找解决技术问题，提供清晰的环境和细节将使AI能够提供更准确的解决方案。
- en: 'Example Prompt for a Blog Post:'
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: 博客文章示例提示：
- en: '"Generate a list of 5 innovative blog post ideas focusing on sustainable living
    for young families. The tone should be optimistic and engaging, encouraging eco-friendly
    practices without overwhelming the reader. Include tips that are budget-friendly
    and easy to implement, considering the busy lifestyle of young parents."'
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: '"生成一份针对年轻家庭的可持续生活方式的5个创新博客文章想法清单。语气应保持乐观和吸引人，鼓励环保实践，同时不要让读者感到压力。包括预算友好且易于实施的提示，考虑到年轻父母忙碌的生活方式。”'
- en: 'Example Prompt for a Technical Problem:'
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: 技术问题示例提示：
- en: '"I''m developing a web application using React, and I''ve encountered an issue
    where the state doesn''t update as expected when using async functions. The specific
    problem occurs in a component where user input triggers an API call, and the fetched
    data should update the component''s state to reflect changes in the UI. I''ve
    tried using the useState and useEffect hooks, but the issue persists. Can you
    provide a solution or suggest best practices to ensure the state updates correctly
    after completing the asynchronous operation?"'
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
  zh: '"我正在使用React开发一个网络应用程序，并遇到了一个问题，即在使用异步函数时，状态没有按预期更新。具体问题发生在用户输入触发API调用并获取的数据应更新组件状态以反映UI变化的一个组件中。我已经尝试使用useState和useEffect钩子，但问题仍然存在。你能提供一个解决方案或建议最佳实践来确保在异步操作完成后正确更新状态吗？”'
- en: Moreover, setting clear objectives helps you evaluate the success of your interactions
    with ChatGPT. By having a specific goal in mind, you can more easily assess whether
    the response meets your needs or if further refinement is necessary. This iterative
    process of setting objectives, interacting with ChatGPT, and evaluating outcomes
    is fundamental to developing effective prompts.
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，设定明确的目标有助于你评估与ChatGPT交互的成功。通过有一个具体的目标在心中，你可以更容易地评估响应是否满足你的需求，或者是否需要进一步改进。设定目标、与ChatGPT交互和评估结果这一迭代过程是开发有效提示的基本要素。
- en: Clear objectives can also help mitigate common pitfalls in AI interactions,
    like receiving overly broad or irrelevant responses. By precisely defining what
    you hope to achieve, you reduce the ambiguity that can often lead AI models astray,
    ensuring a more focused and productive dialogue.
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: 清晰的目标还可以帮助减轻AI交互中常见的陷阱，如收到过于宽泛或不相关的响应。通过精确定义你希望实现的目标，你可以减少可能导致AI模型偏离方向的模糊性，确保对话更加专注和高效。
- en: As you begin to craft your first prompt, remember that the clarity of your objectives
    is directly proportional to the value of the insights you gain.
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: 当你开始编写第一个提示时，请记住，你的目标清晰度与获得洞察力的价值成正比。
- en: Choosing the Right Tone and Style
  id: totrans-200
  prefs: []
  type: TYPE_NORMAL
  zh: 选择合适的语气和风格
- en: Choosing the right tone and style for your prompt impacts how ChatGPT interprets
    your request and shapes its responses.
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
  zh: 选择合适的语气和风格对你的提示影响ChatGPT如何解释你的请求并塑造其响应。
- en: The tone of your prompt sets the mood for the interaction. A formal tone might
    be appropriate for business-related queries or academic research, signaling to
    ChatGPT the seriousness and precision expected in the response. On the other hand,
    a casual or playful tone can be used for more creative endeavors or when seeking
    to generate light-hearted or humorous content. Your chosen tone instructs ChatGPT
    on how to "speak" back to you, aligning its language and nuances with your expectations.
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
  zh: 你的提示语气为互动设定了基调。正式语气可能适用于与商业相关的查询或学术研究，向ChatGPT传达对响应的严肃性和精确性的期望。另一方面，轻松或幽默的语气可以用于更创意的尝试或寻求轻松或幽默的内容。你选择的语气指导ChatGPT如何“说话”回你，使其语言和细微差别与你的期望相一致。
- en: 'Example Formal Tone Prompt for a Business Query:'
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: 适用于商业查询的示例正式语气提示：
- en: '"Provide a comprehensive analysis of the most recent developments in the global
    e-commerce market. The analysis should include key growth sectors, emerging technologies
    shaping the industry, and potential challenges businesses may face over the next
    five years. Include data and statistics to support your findings, ensuring the
    information is up-to-date and relevant for strategic planning purposes."'
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
  zh: “提供对全球电子商务市场最新发展的全面分析。分析应包括关键增长领域、塑造行业的新兴技术，以及企业未来五年可能面临的潜在挑战。包括数据统计以支持你的发现，确保信息是最新的且对战略规划目的相关。”
- en: 'Example Casual Tone Prompt for Creative Content Generation:'
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
  zh: 适用于创意内容生成的示例轻松语气提示：
- en: '"Can you come up with a funny story about a cat who decides to start its own
    online business? Make it super light-hearted and sprinkle in some humor about
    the challenges of being an entrepreneur. Bonus points if the cat encounters silly
    misunderstandings with customers due to being, well, a cat. Let''s make readers
    laugh and maybe even inspire them with the cat''s quirky determination."'
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: “你能想出一个关于一只决定开始自己的在线生意的猫的有趣故事吗？让它非常轻松愉快，并加入一些关于成为企业家挑战的幽默。如果猫因为自己是猫而与客户发生愚蠢的误解，那就加分了。让我们让读者笑一笑，也许还能用猫的古怪决心来激励他们。”
- en: Style, while closely related to tone, refers to the structure and complexity
    of your language. A straightforward, concise style can be effective for clear-cut
    inquiries, ensuring that ChatGPT focuses directly on the essence of your request.
    A more elaborate or nuanced style might be suitable for complex scenarios where
    the subtleties of your request need to be fully captured. This could involve using
    specific jargon, idiomatic expressions, or detailed descriptions, guiding the
    AI to tailor its responses in a manner that respects the depth of your inquiry.
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
  zh: 风格虽然与语气密切相关，但指的是你语言的结构和复杂性。直接、简洁的风格对于明确的问题非常有效，确保ChatGPT直接关注你请求的本质。更详尽或细腻的风格可能适用于需要完全捕捉你请求细微差别的情况。这可能涉及使用特定术语、习语或详细描述，引导AI以尊重你查询深度的方式定制其响应。
- en: 'Example Prompt Straightforward and Concise Style:'
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
  zh: 示例提示直接简洁风格：
- en: '"List the top 5 SEO strategies for small businesses in 2024\. Include key actions
    and expected outcomes for each strategy."'
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
  zh: “列出2024年小型企业的前5种SEO策略。包括每个策略的关键行动和预期结果。”
- en: 'Example Prompt Elaborate Style for a Complex Scenario:'
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: 复杂场景的示例提示详细风格：
- en: '"Imagine a scenario where a mid-sized tech company specializing in AI-driven
    analytics is looking to penetrate the healthcare market, a domain notoriously
    resistant to rapid technological changes. The company''s product, a predictive
    analytics tool, is designed to enhance patient outcomes through data-driven insights.
    Given the complexity of healthcare regulations and the critical importance of
    building trust with healthcare professionals, outline a multi-faceted approach
    for this company to introduce its innovation successfully. Discuss potential regulatory
    hurdles, strategies for engaging healthcare professionals, and how to demonstrate
    the tangible benefits of their tool to non-technical decision-makers within the
    healthcare industry."'
  id: totrans-211
  prefs: []
  type: TYPE_NORMAL
  zh: “想象一个场景，一家专注于AI驱动分析的中小型科技公司正试图进入一个以对快速技术变革持抵制态度而闻名的医疗保健市场。该公司的产品是一款预测分析工具，旨在通过数据驱动的洞察力提高患者结果。鉴于医疗保健法规的复杂性和与医疗保健专业人员建立信任的至关重要性，概述该公司成功引入其创新的多方面方法。讨论潜在的监管障碍、吸引医疗保健专业人员的策略，以及如何向医疗保健行业中的非技术决策者展示其工具的实质性好处。”
- en: Furthermore, the tone and style you choose can also serve to clarify the intended
    audience of the generated content or the context in which you're asking the question.
    For instance, prompts intended for a technical audience may require a different
    style and tone than those aimed at children or a general audience.
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，您选择的语气和风格也可以用来阐明生成内容的预期受众或您提问的上下文。例如，针对技术受众的提示可能需要与针对儿童或普通受众的提示不同的风格和语气。
- en: Structuring Your Prompt for Clarity and Direction
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
  zh: 结构化您的提示以清晰和方向性
- en: Structuring your prompt for clarity and direction guides ChatGPT through the
    nuances of your request to ensure the response is relevant and insightful. This
    structuring is essential in prompt engineering, as it has a direct impact on the
    efficiency of the interaction between humans and machines. A well-structured prompt
    minimizes misunderstandings and maximizes the AI's ability to deliver precise,
    actionable insights.
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
  zh: 为了清晰和方向性，对您的提示进行结构化，这有助于ChatGPT理解您请求的细微差别，以确保回复的相关性和洞察力。这种结构化在提示工程中至关重要，因为它直接影响人与机器之间交互的效率。一个结构良好的提示可以最大限度地减少误解，并最大化AI提供精确、可操作见解的能力。
- en: 'Start with a Clear Introduction: Begin your prompt with a clear statement of
    intent. This serves as an introduction to your request, setting the stage for
    what follows. For example, if you''re seeking information on a specific topic,
    start by stating that topic clearly. If you''re looking for creative content,
    outline the theme or context right at the beginning. This helps ChatGPT understand
    the primary focus of your inquiry from the outset.'
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
  zh: 从清晰的介绍开始：用明确的意图声明开始您的提示。这为您的要求提供了一个介绍，为后续内容设定了舞台。例如，如果您正在寻求有关特定主题的信息，请首先清楚地陈述该主题。如果您正在寻找创意内容，请从一开始就概述主题或背景。这有助于ChatGPT从一开始就理解您查询的主要焦点。
- en: 'Provide Necessary Context: After the introduction, offer any relevant background
    information or context that could influence the AI''s response. This could include
    details about the target audience, the purpose of the inquiry, or specific nuances
    related to the topic. Providing context helps ChatGPT tailor its response more
    closely to your needs, ensuring the output is aligned with your expectations.'
  id: totrans-216
  prefs: []
  type: TYPE_NORMAL
  zh: 提供必要的背景：在介绍之后，提供任何可能影响AI回复的相关背景信息或上下文。这可能包括有关目标受众、查询目的或与主题相关的具体细微差别。提供背景有助于ChatGPT更紧密地根据您的需求定制其回复，确保输出与您的期望一致。
- en: 'Specify Your Requirements: Be explicit about what you''re asking for. If you
    have specific requirements for the response, such as tone, format, or key points
    to be addressed, mention these clearly. For instance, if you''re asking for a
    summary, specify the desired length or if you want the information to be structured
    in bullet points. This level of specificity guides the AI in crafting a response
    that meets your exact needs.'
  id: totrans-217
  prefs: []
  type: TYPE_NORMAL
  zh: 明确您的需求：清楚地说明您所要求的内容。如果您对回复有特定的要求，例如语气、格式或需要涵盖的关键点，请明确指出。例如，如果您需要摘要，请指定所需的长度；如果您希望信息以项目符号形式呈现，请说明。这种具体性有助于AI构建一个满足您确切需求的回复。
- en: 'End with a Clear Call to Action: Conclude your prompt with clear instructions
    or questions that direct ChatGPT toward the type of response you''re seeking.
    Ending with a specific call to action focuses the AI''s "efforts" on delivering
    the type of content you want.'
  id: totrans-218
  prefs: []
  type: TYPE_NORMAL
  zh: 以明确的行动呼吁结束：在你的提示中结束，给出明确的指示或问题，以引导ChatGPT向你寻求的响应类型。以具体的行动呼吁结束将使AI的“努力”集中在提供你想要的内容上。
- en: 'Revise for Precision: Once you''ve drafted your prompt, review it for clarity
    and conciseness. Remove any ambiguities or redundancies that could confuse ChatGPT
    or lead to irrelevant responses. A concise, well-structured prompt is more likely
    to result in a precise and useful output.'
  id: totrans-219
  prefs: []
  type: TYPE_NORMAL
  zh: 精确修订：一旦你起草了你的提示，请对其进行审查以确保清晰和简洁。删除任何可能使ChatGPT困惑或导致无关响应的含糊不清或重复内容。一个简洁、结构良好的提示更有可能产生精确而有用的输出。
- en: 'Example Prompt:'
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
  zh: 示例提示：
- en: '"Introduction: I am researching the impact of renewable energy adoption on
    global economies.'
  id: totrans-221
  prefs: []
  type: TYPE_NORMAL
  zh: “介绍：我正在研究可再生能源采用对全球经济的影响。
- en: 'Context: This inquiry is for an upcoming article aimed at a readership of environmentally-conscious
    professionals and policymakers. The focus is on understanding how transitioning
    to renewable energy sources affects economic growth, job creation, and energy
    security. The article intends to highlight the economic benefits of renewable
    energy, addressing common misconceptions about its costs and feasibility.'
  id: totrans-222
  prefs: []
  type: TYPE_NORMAL
  zh: 背景：这个调查是为了即将发表的一篇面向环保专业人士和政策制定者的文章。重点是了解向可再生能源转型如何影响经济增长、就业创造和能源安全。文章旨在强调可再生能源的经济效益，解决关于其成本和可行性的常见误解。
- en: 'Requirements: Provide a detailed analysis covering the following key points:'
  id: totrans-223
  prefs: []
  type: TYPE_NORMAL
  zh: 要求：提供以下关键点的详细分析：
- en: The economic benefits of adopting renewable energy, with specific examples from
    different countries.
  id: totrans-224
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 采用可再生能源的经济效益，具体例子来自不同国家。
- en: How renewable energy adoption influences job creation and energy security.
  id: totrans-225
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 可再生能源采用如何影响就业创造和能源安全。
- en: Any challenges and solutions related to the economic aspects of renewable energy
    transition.
  id: totrans-226
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 与可再生能源转型经济方面相关的任何挑战和解决方案。
- en: The response should be structured in bullet points for clarity, with each point
    succinctly summarizing an aspect of the economic impact. Aim for a tone that is
    informative yet accessible, avoiding overly technical jargon.
  id: totrans-227
  prefs: []
  type: TYPE_NORMAL
  zh: 响应应结构化，以清晰起见，每个要点简洁地总结经济影响的一个方面。力求语气既信息丰富又易于理解，避免使用过于技术性的术语。
- en: 'Call to Action: Can you summarize the main economic impacts of renewable energy
    adoption, focusing on the benefits and addressing common economic concerns?"'
  id: totrans-228
  prefs: []
  type: TYPE_NORMAL
  zh: 行动呼吁：你能总结可再生能源采用的主要经济影响，重点关注其好处并解决常见的经济担忧？”
- en: 'Revision for Precision: I''ve ensured the prompt is clear, specific, and devoid
    of any unnecessary information that could detract from the primary focus of the
    inquiry.'
  id: totrans-229
  prefs: []
  type: TYPE_NORMAL
  zh: 精确修订：我已经确保提示清晰、具体，并且没有可能分散调查主要焦点的任何不必要信息。
- en: Testing and Refining Your Prompt
  id: totrans-230
  prefs: []
  type: TYPE_NORMAL
  zh: 测试和精炼你的提示
- en: Testing and refining your prompts enhances their effectiveness and deepens your
    understanding of how AI interprets and responds to various inputs.
  id: totrans-231
  prefs: []
  type: TYPE_NORMAL
  zh: 测试和精炼你的提示可以提高其有效性，并加深你对AI如何解释和响应各种输入的理解。
- en: The Testing Phase
  id: totrans-232
  prefs: []
  type: TYPE_NORMAL
  zh: 测试阶段
- en: The first step in this phase is to test your prompt by entering it into ChatGPT
    and analyzing the response. This is where you assess whether the AI's reply aligns
    with your expectations and meets your objectives. It's important to approach this
    phase with an open mind, as the responses you receive may differ significantly
    from what you anticipated. This variance can provide valuable insights into how
    ChatGPT processes information and the nuances of its language understanding capabilities.
  id: totrans-233
  prefs: []
  type: TYPE_NORMAL
  zh: 这一阶段的第一步是通过将提示输入ChatGPT并分析响应来测试你的提示。这是你评估AI的回复是否与你的期望相符并满足你的目标的地方。以开放的心态进入这一阶段很重要，因为收到的回复可能与预期的有很大不同。这种差异可以提供关于ChatGPT如何处理信息和其语言理解能力细微差别的宝贵见解。
- en: 'When testing your prompt, pay attention to the following key aspects:'
  id: totrans-234
  prefs: []
  type: TYPE_NORMAL
  zh: 在测试你的提示时，请注意以下关键方面：
- en: 'Relevance: Does the response directly address the question or task outlined
    in your prompt?'
  id: totrans-235
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 相关性：响应是否直接回答了你在提示中概述的问题或任务？
- en: 'Completeness: Is the answer comprehensive, covering all the aspects you were
    inquiring about?'
  id: totrans-236
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 完整性：答案是否全面，涵盖了你所询问的所有方面？
- en: 'Accuracy: For factual queries or tasks requiring specific knowledge, is the
    information provided correct and reliable?'
  id: totrans-237
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 准确性：对于需要具体知识的事实性查询或任务，提供的信息是否正确且可靠？
- en: 'Tone and Style: Does the response reflect your intended tone and style, making
    it suitable for your target audience?'
  id: totrans-238
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 语气和风格：响应是否反映了你期望的语气和风格，使其适合你的目标受众？
- en: The Refinement Process
  id: totrans-239
  prefs: []
  type: TYPE_NORMAL
  zh: 精炼过程
- en: Based on your observations during testing, the next step is to refine your prompt.
    This might involve clarifying your objectives, tweaking the tone or style, or
    providing additional context to guide ChatGPT. Sometimes, it's a matter of simplifying
    your language or being more explicit about what you seek. In other instances,
    incorporating keywords or phrases that directly signal your intent can significantly
    alter the response.
  id: totrans-240
  prefs: []
  type: TYPE_NORMAL
  zh: 根据你在测试过程中的观察，下一步是完善你的提示词。这可能包括明确你的目标，调整语气或风格，或者提供额外的背景信息以指导ChatGPT。有时，这只是一个简化你的语言或更明确地说明你寻求的内容的问题。在其他情况下，融入直接表明你意图的关键词或短语可以显著改变响应。
- en: 'Example:'
  id: totrans-241
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：
- en: 'Initial Prompt: "Discuss the impact of recent technology trends on remote work,
    focusing on collaboration tools, cybersecurity challenges, and work-life balance."'
  id: totrans-242
  prefs: []
  type: TYPE_NORMAL
  zh: 初始提示词： "讨论最近的技术趋势对远程工作的影响，重点关注协作工具、网络安全挑战和工作与生活的平衡。"
- en: 'Refined Prompt: "Provide a detailed analysis of how emerging technology trends,
    specifically in collaboration software, cybersecurity measures, and digital wellness
    tools, have transformed remote work practices. Examine how these trends have improved
    team communication, addressed data security concerns, and contributed to a healthier
    work-life balance for remote employees. Emphasize real-world applications and
    potential future developments in these areas. Aim for a comprehensive overview
    suitable for a professional audience interested in leveraging technology to enhance
    remote working environments."'
  id: totrans-243
  prefs: []
  type: TYPE_NORMAL
  zh: 精炼提示词： "提供对新兴技术趋势的详细分析，特别是协作软件、网络安全措施和数字健康工具如何改变远程工作实践。探讨这些趋势如何改善团队沟通、解决数据安全问题，并为远程员工创造更健康的工作与生活平衡。强调这些领域的实际应用和潜在的未来发展。旨在为对利用技术提升远程工作环境感兴趣的专业人士提供一个全面的概述。"
- en: This process may require several iterations. Each cycle of testing and refining
    brings you closer to creating a prompt that consistently yields the desired outcomes.
    It's a dynamic process that encourages experimentation and learning from each
    interaction with ChatGPT.
  id: totrans-244
  prefs: []
  type: TYPE_NORMAL
  zh: 这个过程可能需要多次迭代。每次测试和精炼的循环都会让你更接近创建一个能够持续产生预期结果的提示词。这是一个动态的过程，鼓励实验并从与ChatGPT的每次互动中学习。
- en: Learning from Feedback
  id: totrans-245
  prefs: []
  type: TYPE_NORMAL
  zh: 从反馈中学习
- en: An essential part of refining your prompt is learning from the feedback inherent
    in the AI's responses. Identifying patterns in how different phrasings or structures
    influence the outcome can inform your approach to crafting prompts in the future.
    This feedback loop is invaluable for honing your skills in prompt engineering,
    gradually increasing your ability to predict and shape the AI's responses with
    precision.
  id: totrans-246
  prefs: []
  type: TYPE_NORMAL
  zh: 精炼你的提示词的一个重要部分是从AI响应中固有的反馈中学习。识别不同措辞或结构如何影响结果的模式，可以指导你未来制作提示词的方法。这个反馈循环对于磨练你的提示词工程技能、逐渐提高你预测和精确塑造AI响应的能力至关重要。
- en: Common Mistakes to Avoid in Your First Prompt
  id: totrans-247
  prefs: []
  type: TYPE_NORMAL
  zh: 避免在首次提示词中犯的常见错误
- en: Navigating the initial steps of prompt engineering can be a journey filled with
    discovery and learning. However, certain common errors can hinder the effectiveness
    of your first interactions with ChatGPT. Being aware of these common mistakes
    can significantly improve your prompt crafting skills, ensuring a more successful
    and rewarding experience.
  id: totrans-248
  prefs: []
  type: TYPE_NORMAL
  zh: 在提示词工程的初始步骤中导航可能是一段充满发现和学习的旅程。然而，某些常见的错误可能会妨碍你与ChatGPT首次互动的有效性。了解这些常见错误可以显著提高你的提示词制作技能，确保更成功和有益的体验。
- en: '1\. Being Too Vague or Broad: One of the most common mistakes is not specifying
    enough detail in your prompt. General or broad prompts can lead to equally vague
    or off-target responses. It''s crucial to be as specific as possible about what
    you''re asking for, providing clear context and objectives.'
  id: totrans-249
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 过于模糊或宽泛：最常见的错误之一是在你的提示词中未提供足够的细节。过于宽泛的提示词可能导致同样模糊或不相关的响应。至关重要的是，尽可能具体地说明你要求的内容，提供清晰的环境和目标。
- en: '2\. Overcomplicating Your Prompt: Conversely, including too much detail or
    unnecessary complexity can confuse ChatGPT, leading to irrelevant or overly complex
    responses. Striking a balance between clarity and conciseness is key.'
  id: totrans-250
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 过度复杂化你的提示：相反，包含过多细节或不必要的复杂性可能会使ChatGPT困惑，导致不相关或过于复杂的响应。在清晰度和简洁性之间取得平衡是关键。
- en: '3\. Ignoring Tone and Style: The tone and style of your prompt directly influence
    the AI''s output. Failing to align these elements with your intended audience
    or purpose can result in responses that feel out of place or inappropriate.'
  id: totrans-251
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 忽视语气和风格：你的提示的语气和风格直接影响AI的输出。未能将这些元素与你的目标受众或目的对齐可能导致感觉不合适或不恰当的响应。
- en: '4\. Unrealistic Expectations: AI, no matter how advanced, has limitations.
    Expecting it to understand deeply personal nuances or to perform tasks beyond
    its capabilities can lead to disappointment. It is important to set realistic
    expectations based on the AI''s known functionalities.'
  id: totrans-252
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 不切实际的期望：无论多么先进，AI都有局限性。期望它深刻理解个人细微差别或执行超出其能力范围的任务可能会导致失望。根据AI已知的性能设置现实的期望是很重要的。
- en: '5\. Not Testing and Refining: Skipping the crucial steps of testing and refining
    your prompts can prevent you from achieving optimal results. Each interaction
    with ChatGPT is an opportunity to learn and improve your prompts.'
  id: totrans-253
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 跳过测试和改进：跳过测试和改进提示的关键步骤可能会阻止你获得最佳结果。与ChatGPT的每一次互动都是一个学习和改进提示的机会。
- en: Key Takeaways from Chapter 3
  id: totrans-254
  prefs: []
  type: TYPE_NORMAL
  zh: 第三章要点总结
- en: Setting clear objectives for your prompt ensures relevance and focus in the
    AI's responses.
  id: totrans-255
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为你的提示设置明确的目标可以确保AI的响应相关且具有焦点。
- en: The choice of tone and style should reflect your intended audience and the nature
    of your inquiry.
  id: totrans-256
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 语气和风格的选择应反映你的目标受众和你的查询性质。
- en: A well-structured prompt enhances clarity and direction, guiding ChatGPT to
    understand better and respond to your request.
  id: totrans-257
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个结构良好的提示增强了清晰度和方向性，引导ChatGPT更好地理解并回应你的请求。
- en: Testing and refining your prompt is an iterative process that improves its effectiveness
    and your skill in prompt engineering.
  id: totrans-258
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 测试和改进你的提示是一个迭代的过程，可以提高其有效性和你在提示工程方面的技能。
- en: Avoiding common mistakes, such as being too vague or ignoring the importance
    of tone, can significantly enhance the quality of your interactions with AI.
  id: totrans-259
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 避免常见的错误，如过于模糊或忽视语气的重要性，可以显著提高你与AI互动的质量。
- en: Engaging with ChatGPT through prompt engineering is a dynamic learning process,
    offering endless possibilities for creativity and discovery.
  id: totrans-260
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过提示工程与ChatGPT互动是一个动态的学习过程，提供了无限的可能性，激发创造力和发现。
- en: 'Chapter 4: The Perfect Prompt Formula'
  id: totrans-261
  prefs: []
  type: TYPE_NORMAL
  zh: 第四章：完美提示公式
- en: Defining the Characteristics of a Perfect Prompt
  id: totrans-262
  prefs: []
  type: TYPE_NORMAL
  zh: 定义完美提示的特征
- en: At the heart of every meaningful interaction with ChatGPT lies a well-crafted
    prompt to deliver relevant, insightful, and engaging responses. A perfect prompt
    is characterized by its clarity, specificity, engagement, and alignment with the
    user's intent, as we've seen in Chapter 2.
  id: totrans-263
  prefs: []
  type: TYPE_NORMAL
  zh: 每次与ChatGPT有意义的互动的核心都是一个精心设计的提示，以提供相关、有洞察力和引人入胜的响应。一个完美的提示以其清晰度、具体性、参与度和与用户意图的一致性为特征，正如我们在第二章中看到的。
- en: I will not reiterate those details extensively now. Instead, consider this section
    a concise recap, a refresher of the foundational elements we've already explored.
    This summary aims to reinforce your understanding and ensure that these key characteristics
    are at the forefront of your mind as you craft your prompts, striving toward the
    ideal balance that defines the perfect prompt.
  id: totrans-264
  prefs: []
  type: TYPE_NORMAL
  zh: 我现在不会详细重申那些细节。相反，将这一部分视为一个简明的回顾，是对我们已经探讨的基础元素的复习。这个总结旨在加强你的理解，并确保这些关键特征在你构建提示时始终处于你的脑海中，努力达到定义完美提示的理想平衡。
- en: Clarity is paramount. A perfect prompt is devoid of ambiguity, clearly stating
    what is being asked without leaving room for misinterpretation. This clarity helps
    ChatGPT understand the exact nature of the request, ensuring the response is on
    point.
  id: totrans-265
  prefs: []
  type: TYPE_NORMAL
  zh: 清晰度至关重要。一个完美的提示没有歧义，清楚地陈述所询问的内容，不留任何误解的空间。这种清晰度有助于ChatGPT理解请求的确切性质，确保响应准确无误。
- en: Specificity sharpens the focus. It involves providing enough detail to guide
    ChatGPT's response in the desired direction. Specific prompts go beyond general
    inquiries, zooming in on particular aspects of a topic or question. This doesn't
    mean overloading the prompt with details but rather carefully selecting information
    that enhances the AI's ability to provide a targeted response.
  id: totrans-266
  prefs: []
  type: TYPE_NORMAL
  zh: '**特异性**可以增强专注力。它涉及到提供足够的细节，以引导ChatGPT的响应朝向期望的方向。具体的提示超越了泛泛的询问，聚焦于话题或问题的特定方面。这并不意味着在提示中过度加载细节，而是要仔细选择能够增强AI提供针对性响应能力的信息。'
- en: Engagement in a prompt invites interaction. It's about crafting the prompt in
    a way that encourages ChatGPT to generate responses that are interesting and thought-provoking.
    Engaging prompts often incorporate elements of creativity, curiosity, and openness,
    inviting expansive answers.
  id: totrans-267
  prefs: []
  type: TYPE_NORMAL
  zh: '**在提示中投入互动**邀请互动。这是关于以某种方式构建提示，鼓励ChatGPT生成有趣和引人深思的响应。吸引人的提示通常包含创造性、好奇心和开放性的元素，邀请广泛的答案。'
- en: Alignment with User Intent ensures that the prompt is geared toward fulfilling
    the user's specific needs or goals. Whether the intent is to learn something new,
    solve a problem, or generate creative content, the prompt must clearly reflect
    this goal. This alignment transforms a standard query into a prompt that is perfectly
    tailored to produce the desired outcome.
  id: totrans-268
  prefs: []
  type: TYPE_NORMAL
  zh: '**与用户意图保持一致**确保提示旨在满足用户的特定需求或目标。无论意图是学习新知识、解决问题还是生成创造性内容，提示必须清楚地反映这一目标。这种一致性将一个标准查询转变为一个完美定制的提示，旨在产生预期的结果。'
- en: Incorporating these characteristics into your prompts can significantly enhance
    the quality and relevance of the interactions with ChatGPT. A perfect prompt acts
    as a clear and specific invitation for the AI to delve deep into its wealth of
    knowledge and capabilities. As we progress in our journey of prompt engineering,
    keep these characteristics in mind, as they will be crucial in crafting prompts
    that are perfectly aligned with our quest for knowledge and creativity.
  id: totrans-269
  prefs: []
  type: TYPE_NORMAL
  zh: 将这些特性融入你的提示中可以显著提高与ChatGPT交互的质量和相关性。完美的提示就像是对AI深入其知识库和能力的清晰、具体邀请。随着我们在提示工程之旅中不断前进，请记住这些特性，因为它们在制作与我们的知识和创造力追求完美对齐的提示时至关重要。
- en: Balancing Specificity with Openness in Prompt Design
  id: totrans-270
  prefs: []
  type: TYPE_NORMAL
  zh: '**在提示设计中平衡特异性与开放性**'
- en: Mastering the art of prompt design with ChatGPT involves striking a delicate
    balance between specificity and openness. This equilibrium ensures that prompts
    are detailed enough to guide the AI toward the intended response yet flexible
    enough to allow for creative and insightful answers.
  id: totrans-271
  prefs: []
  type: TYPE_NORMAL
  zh: 掌握使用ChatGPT进行提示设计的艺术，需要在特异性和开放性之间取得微妙的平衡。这种平衡确保提示足够详细，以引导AI朝向预期的响应，同时足够灵活，以允许创造性和有洞察力的答案。
- en: As you already know, specificity in prompts directs ChatGPT's focus, helping
    it to understand precisely what information or type of response you seek. It narrows
    down the AI's vast knowledge base to the specifics of your query, ensuring the
    response is relevant and to the point. For example, asking, "What are the steps
    involved in the photosynthesis process in plants?" provides a clear, direct line
    of inquiry that the model can follow, ensuring the response is focused on photosynthesis
    in plants specifically.
  id: totrans-272
  prefs: []
  type: TYPE_NORMAL
  zh: 如您所知，提示中的特异性可以引导ChatGPT的焦点，帮助它精确理解您寻求的信息或响应类型。它将AI庞大的知识库缩小到您查询的具体内容，确保响应相关且简洁。例如，询问“植物光合作用过程中涉及哪些步骤？”提供了一个清晰、直接的探究路径，确保响应专注于植物的光合作用。
- en: However, too much specificity can sometimes limit the AI's ability to provide
    comprehensive or creative responses. Suppose a prompt is overly detailed or restricts
    the answer to a narrow frame. In that case, it might exclude valuable or related
    information that could have enriched the response or provided a broader context.
    The key is to provide enough detail to guide the response without boxing it into
    a corner.
  id: totrans-273
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，过多的特异性有时可能会限制AI提供全面或创造性的响应的能力。假设一个提示过于详细或限制了答案的狭窄框架，那么它可能会排除可能丰富响应或提供更广泛背景的有价值或相关信息。关键在于提供足够的细节来引导响应，同时又不将其局限在角落里。
- en: On the other side of the spectrum, openness in prompts invites exploration and
    creativity. It gives ChatGPT the freedom to draw upon its extensive training data
    to generate engaging responses. Open prompts encourage the model to "think" more
    broadly, often leading to richer, more nuanced answers. An open-ended prompt,
    such as "Discuss the impact of photosynthesis on the environment," allows ChatGPT
    to explore the topic from various angles, potentially uncovering connections and
    insights that a more narrowly focused prompt might miss.
  id: totrans-274
  prefs: []
  type: TYPE_NORMAL
  zh: 在另一个极端，提示中的开放性鼓励探索和创造力。它给予ChatGPT利用其广泛的训练数据生成吸引人响应的自由。开放式提示鼓励模型“更广泛地思考”，通常会导致更丰富、更细微的答案。一个开放式提示，如“讨论光合作用对环境的影响”，允许ChatGPT从多个角度探讨这个话题，可能揭示出更狭窄焦点提示可能错过的联系和见解。
- en: The challenge, then, is to find the right mix of specificity and openness. This
    balance is not static; it shifts depending on your goals, the context of the conversation,
    and what you hope to achieve with each interaction. A useful strategy is to start
    with a specific question to establish context and intent and gradually broaden
    the scope with follow-up prompts inviting more open-ended responses.
  id: totrans-275
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，挑战在于找到具体性和开放性的正确平衡。这种平衡不是静态的；它根据你的目标、对话的背景以及你希望通过每次互动实现的目标而变化。一个有用的策略是先从一个具体的问题开始，以建立背景和意图，然后通过后续提示逐渐扩大范围，邀请更开放式的回答。
- en: The Perfect Prompt Formula
  id: totrans-276
  prefs: []
  type: TYPE_NORMAL
  zh: 完美提示公式
- en: 'A well-constructed prompt not only guides ChatGPT in understanding exactly
    what you''re asking but also shapes the response to meet your specific needs.
    Below is a formula that encapsulates the essence of creating effective prompts:'
  id: totrans-277
  prefs: []
  type: TYPE_NORMAL
  zh: 一个构建良好的提示不仅指导ChatGPT理解你确切在问什么，而且塑造响应以满足你的特定需求。以下是一个包含创建有效提示本质的公式：
- en: '[Context] + [Specific Information] + [Intent/Goal] + [Response Format (if needed)]
    = Perfect Prompt'
  id: totrans-278
  prefs: []
  type: TYPE_NORMAL
  zh: '[背景] + [具体信息] + [意图/目标] + [所需响应格式（如有）] = 完美提示'
- en: 'Be Specific: Detail is key. A precise question leads to a precise answer. For
    instance, rather than a broad "tell me about all plants," narrow it down to, "What
    are the different plants and flowers suitable for an apartment?"'
  id: totrans-279
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 明确具体：细节是关键。一个精确的问题会引导到一个精确的答案。例如，与其问一个宽泛的“告诉我所有植物”，不如缩小范围到“适合公寓的不同植物和花卉有哪些？”
- en: 'State Your Intent: Make your purpose clear. Instead of a general "explain biology,"
    specify, "I''m helping my fifth-grade son with his biology homework. Can you explain
    what is a cell in a simple way?"'
  id: totrans-280
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 表明你的意图：让你的目的明确。与其说一个笼统的“解释生物学”，不如具体说明，“我在帮助我的五年级儿子做生物作业。你能用简单的方式解释什么是细胞吗？”
- en: 'Use Correct Spelling and Grammar: Accuracy in your prompt ensures ChatGPT accurately
    interprets your request, leading to better responses.'
  id: totrans-281
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用正确的拼写和语法：在提示中保持准确性确保ChatGPT准确理解你的请求，从而得到更好的响应。
- en: 'Direct the Output Format: If you have a preference for how you''d like the
    information presented, include it. Ask for "a list of steps to make bread at home"
    or "an explanation of the bread-making process in a paragraph" to guide the AI''s
    output.'
  id: totrans-282
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 指定输出格式：如果你对信息呈现的方式有偏好，请包含在内。例如，要求“列出在家制作面包的步骤”或“用一段话解释面包制作过程”，以指导AI的输出。
- en: 'Ask Follow-Up Questions: Don''t hesitate to clarify or expand upon the initial
    response with follow-up questions to hone in on the information you seek.'
  id: totrans-283
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提出后续问题：不要犹豫，通过后续问题来澄清或扩展初始回答，以聚焦于你寻求的信息。
- en: 'Experiment with Different Phrasings: If the response doesn''t meet your expectations,
    try rephrasing your prompt. Different wordings can yield different results.'
  id: totrans-284
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 尝试不同的措辞：如果响应不符合你的期望，尝试重新措辞你的提示。不同的措辞可能会产生不同的结果。
- en: 'Prompt for Fact-Checking: Encourage the model to provide sources or verify
    claims to ensure reliability, such as "Can you fact-check this: The largest continent
    in the world is Asia."'
  id: totrans-285
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 事实核查提示：鼓励模型提供来源或验证主张以确保可靠性，例如“你能核实这个事实吗：世界上最大的洲是亚洲。”
- en: 'By following this formula, you can significantly enhance the quality and relevance
    of ChatGPT''s responses. Let''s apply it in two different scenarios to illustrate
    its effectiveness:'
  id: totrans-286
  prefs: []
  type: TYPE_NORMAL
  zh: 通过遵循这个公式，你可以显著提高ChatGPT响应的质量和相关性。让我们在两个不同的场景中应用它，以说明其有效性：
- en: 'Example 1:'
  id: totrans-287
  prefs: []
  type: TYPE_NORMAL
  zh: 示例 1：
- en: 'Context: I''m a teacher planning a biology lesson'
  id: totrans-288
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提供背景：我是一位正在计划生物学课程的教师
- en: 'Specific Information: Need simple explanations suitable for a fifth-grader'
  id: totrans-289
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 具体信息：需要适合五年级学生的简单解释
- en: 'Intent/Goal: Explain a complex scientific concept in simple terms'
  id: totrans-290
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 意图/目标：用简单术语解释复杂科学概念
- en: 'Response Format: Explanation in simple language'
  id: totrans-291
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 响应格式：简单语言解释
- en: 'Prompt: "I''m a teacher preparing a lesson plan for my fifth-grade class on
    basic biology concepts. Can you explain in a simple way what DNA is and why it''s
    important?"'
  id: totrans-292
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提示：我是一名教师，正在为五年级班级准备关于基本生物学概念的教案。你能用简单的方式解释DNA是什么以及为什么它很重要吗？
- en: 'Example 2:'
  id: totrans-293
  prefs: []
  type: TYPE_NORMAL
  zh: 示例 2：
- en: 'Context: Culinary skills improvement'
  id: totrans-294
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 上下文：烹饪技能提升
- en: 'Specific Information: Interested in baking bread at home'
  id: totrans-295
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 具体信息：对在家烘焙面包感兴趣
- en: 'Intent/Goal: Learn the bread-making process'
  id: totrans-296
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 意图/目标：学习面包制作过程
- en: 'Response Format: Step-by-step guide'
  id: totrans-297
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 响应格式：逐步指南
- en: 'Prompt: "I want to improve my baking skills by learning how to make bread at
    home. Provide a step-by-step guide on kneading and baking a basic white bread
    loaf."'
  id: totrans-298
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提示：我想通过学习在家制作面包来提高我的烘焙技巧。请提供揉面和烘烤基本白面包面包的逐步指南。
- en: That's how applying the perfect prompt formula can lead to more precise, useful,
    and tailored responses, making your interactions with ChatGPT more fruitful and
    satisfying.
  id: totrans-299
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是应用完美的提示公式如何能导致更精确、有用和定制的响应，使您与ChatGPT的互动更加丰富和满足。
- en: The Iterative Process of Crafting and Refining Prompts
  id: totrans-300
  prefs: []
  type: TYPE_NORMAL
  zh: 制定和精炼提示的迭代过程
- en: The journey to mastering prompt engineering with ChatGPT is an iterative process
    of continuous refinement and learning. This cycle of crafting, testing, evaluating,
    and refining prompts is crucial for honing your ability to communicate effectively
    with the AI.
  id: totrans-301
  prefs: []
  type: TYPE_NORMAL
  zh: 使用ChatGPT掌握提示工程的旅程是一个持续精炼和学习的迭代过程。这个制定、测试、评估和精炼提示的周期对于磨练您与AI有效沟通的能力至关重要。
- en: Crafting the Initial Prompt is the first step, where you apply your understanding
    of prompt design principles, including clarity, specificity, and the balance between
    guiding ChatGPT and allowing for creativity. This initial prompt is your hypothesis,
    a best guess at articulating your question or task to get the desired response.
  id: totrans-302
  prefs: []
  type: TYPE_NORMAL
  zh: 制定初始提示是第一步，在这一步中，您应用对提示设计原则的理解，包括清晰度、具体性和在引导ChatGPT和允许创造力之间的平衡。这个初始提示是您的假设，是对如何表达您的问题或任务以获得所需响应的最佳猜测。
- en: Testing the Prompt involves entering your crafted prompt into ChatGPT and analyzing
    the response. This is where theory meets practice, and you get to see how well
    your prompt translates into the kind of response you were aiming for. It's important
    to approach this step with an open mind, ready to learn from the outcome, whether
    it meets your expectations or falls short.
  id: totrans-303
  prefs: []
  type: TYPE_NORMAL
  zh: 测试提示涉及将您制定的提示输入到ChatGPT中，并分析响应。这是理论与实践相结合的地方，您可以看到您的提示如何转化为您所期望的那种响应。以开放的心态处理这一步很重要，准备好从结果中学习，无论它是否符合您的期望或不足。
- en: Evaluating the Response requires carefully assessing how closely the response
    aligns with what you were looking for. Did ChatGPT grasp the essence of your question?
    Was the answer too broad, too narrow, or just right? Did the format of the response
    match your request? This evaluation is not just about what ChatGPT got right or
    wrong but also about understanding how your choice of words and structure influenced
    the outcome.
  id: totrans-304
  prefs: []
  type: TYPE_NORMAL
  zh: 评估响应需要仔细评估响应与您所寻找的内容的接近程度。ChatGPT是否理解了您的问题的本质？答案是过于宽泛、过于狭窄还是恰到好处？响应的格式是否符合您的请求？这种评估不仅关乎ChatGPT做得对或错，还关乎理解您选择的措辞和结构如何影响结果。
- en: Refining the Prompt is where the real learning happens. Based on your evaluation,
    you adjust your prompt, tweaking the wording, adding more context, clarifying
    the intent, or adjusting the level of specificity and openness. This refinement
    is an opportunity to apply what you've learned from the previous steps, improving
    your prompt to better align with your objectives.
  id: totrans-305
  prefs: []
  type: TYPE_NORMAL
  zh: 提示的精炼是真正学习的地方。根据您的评估，您调整您的提示，调整措辞，添加更多上下文，阐明意图，或调整具体性和开放性的程度。这种精炼是应用您从前一步骤中学到的知识的机会，改进您的提示以更好地与您的目标对齐。
- en: This Iterative Process is a cycle of learning and improvement that gradually
    enhances your skills in prompt engineering. Each cycle provides valuable insights
    into how ChatGPT interprets and responds to different types of prompts, allowing
    you to become more adept at crafting prompts that yield useful, accurate, and
    engaging responses.
  id: totrans-306
  prefs: []
  type: TYPE_NORMAL
  zh: 这个迭代过程是一个学习和改进的周期，逐渐提高您在提示工程方面的技能。每个周期都提供了宝贵的见解，了解ChatGPT如何解释和响应不同类型的提示，使您能够更熟练地制定产生有用、准确和吸引人的响应的提示。
- en: Examples of Effective Prompts Across Various Domains
  id: totrans-307
  prefs: []
  type: TYPE_NORMAL
  zh: 各领域有效提示的示例
- en: 'By examining examples of effective prompts across various domains, we can distill
    the principles that make these prompts work. Here are three examples in distinct
    contexts, showcasing the application of techniques discussed in the book:'
  id: totrans-308
  prefs: []
  type: TYPE_NORMAL
  zh: 通过检查各个领域的有效提示示例，我们可以提炼出使这些提示起作用的原理。以下是三个在不同背景下的示例，展示了书中讨论的技术应用：
- en: '1\. Example in an Educational Context: Explaining Complex Concepts'
  id: totrans-309
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 教育背景示例：解释复杂概念
- en: 'Prompt: "Can you explain the theory of relativity in simple terms suitable
    for high school students, focusing on its significance and real-world applications?"'
  id: totrans-310
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：请用适合高中生的简单术语解释相对论，并着重于其重要性和实际应用。
- en: 'Analysis: This prompt excels because it clearly states the context (educational),
    the audience (high school students), and the desired outcome (an explanation of
    the theory of relativity). It balances specificity (focusing on significance and
    real-world applications) with openness (allowing for a broad discussion). The
    prompt directs ChatGPT to tailor the complexity of its response to suit a younger
    audience, ensuring the explanation is accessible. This alignment with user intent
    and the careful calibration of specificity makes it an effective prompt.'
  id: totrans-311
  prefs: []
  type: TYPE_NORMAL
  zh: 分析：这个提示非常出色，因为它清楚地说明了背景（教育）、受众（高中生）和期望的结果（相对论的解释）。它平衡了具体性（着重于重要性和实际应用）与开放性（允许广泛讨论）。提示指导ChatGPT调整其回答的复杂性以适应年轻受众，确保解释易于理解。这种与用户意图的一致性和对具体性的细致调整使其成为一个有效的提示。
- en: '2\. Example in Creative Writing Assistance: Generating Ideas'
  id: totrans-312
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 创意写作辅助示例：生成想法
- en: 'Prompt: "I''m working on a science fiction story set in a post-apocalyptic
    world. Can you suggest five original plot twists that involve artificial intelligence
    rebelling against humans?"'
  id: totrans-313
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：我正在创作一部设定在末日世界的科幻故事。你能建议五个涉及人工智能反抗人类的原创情节转折吗？
- en: 'Analysis: This prompt shines by providing a specific context (science fiction
    story, post-apocalyptic world) and a clear request (suggest five original plot
    twists). It invites creativity within a defined framework, guiding ChatGPT to
    produce ideas that fit the thematic and genre constraints. The mention of "original"
    encourages the AI to generate unique suggestions, demonstrating how directing
    the output can lead to more tailored and creative responses. The prompt''s structure
    facilitates focused brainstorming, making it highly effective for creative assistance.'
  id: totrans-314
  prefs: []
  type: TYPE_NORMAL
  zh: 分析：这个提示之所以出色，是因为它提供了一个具体的背景（科幻故事、末日世界）和一个明确的要求（建议五个原创情节转折）。它在一个定义的框架内鼓励创新，引导ChatGPT产生符合主题和类型限制的想法。提到“原创”鼓励AI生成独特的建议，展示了如何通过指导输出以获得更定制和创造性的回应。提示的结构促进了集中的头脑风暴，使其在创意辅助方面非常有效。
- en: '3\. Example in Professional Development: Skill Enhancement'
  id: totrans-315
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 专业发展示例：技能提升
- en: 'Prompt: "As a project manager looking to improve my communication skills, what
    are five actionable strategies I can implement to facilitate better team collaboration
    and project updates?"'
  id: totrans-316
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：作为一名希望提高沟通技巧的项目经理，我可以实施哪些五个可行的策略来促进更好的团队合作和项目更新？
- en: 'Analysis: This prompt is successful for several reasons. It provides a clear
    context (professional development for a project manager) and a specific goal (improving
    communication skills). By requesting "actionable strategies," it directs ChatGPT
    to offer practical advice rather than abstract concepts, ensuring the response
    is immediately useful. The prompt also specifies the desired outcome (better team
    collaboration and project updates), guiding the AI to focus its response on areas
    most relevant to the user''s needs. The inclusion of a quantifiable request ("five
    strategies") ensures the response is structured and concise.'
  id: totrans-317
  prefs: []
  type: TYPE_NORMAL
  zh: 分析：这个提示之所以成功，有几个原因。它提供了一个清晰的背景（项目经理的专业发展）和一个具体的目标（提高沟通技巧）。通过要求“可行的策略”，它指导ChatGPT提供实用的建议而不是抽象的概念，确保回应立即有用。提示还指定了期望的结果（更好的团队合作和项目更新），引导AI将回答集中在与用户需求最相关的领域。包含可量化的请求（“五个策略”）确保回应结构化且简洁。
- en: These examples demonstrate the effectiveness of applying the principles of specificity,
    clarity, user intent, and response formatting in crafting prompts. By clearly
    articulating the context, desired outcome, and any specific requirements, these
    prompts guide ChatGPT in producing responses that are relevant and directly aligned
    with the user's objectives across different domains. The techniques employed in
    these prompts—detailed in previous chapters—serve as a practical guide for anyone
    aiming to enhance their prompt engineering skills, showcasing the versatility
    and adaptability of ChatGPT in meeting diverse needs.
  id: totrans-318
  prefs: []
  type: TYPE_NORMAL
  zh: 这些例子展示了应用具体性、清晰性、用户意图和响应格式的原则在制作提示中的有效性。通过明确阐述上下文、期望的结果和任何具体要求，这些提示引导ChatGPT产生相关且直接与用户目标一致的响应，跨越不同的领域。这些提示中使用的技巧——在之前的章节中详细说明——为任何希望提高提示工程技能的人提供了一个实用指南，展示了ChatGPT在满足多样化需求方面的灵活性和适应性。
- en: Key takeaways from Chapter 4
  id: totrans-319
  prefs: []
  type: TYPE_NORMAL
  zh: 第四章的关键要点
- en: A well-crafted prompt is clear and specific, guiding ChatGPT to understand precisely
    what is being asked. This clarity minimizes ambiguity, ensuring the response is
    relevant and focused.
  id: totrans-320
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个精心制作的提示清晰且具体，引导ChatGPT精确理解所提问题。这种清晰度最小化了歧义，确保响应相关且专注。
- en: While specificity directs the response, openness invites creativity and depth.
    Finding the right balance between the two can lead to richer, more insightful
    interactions with ChatGPT.
  id: totrans-321
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当具体性指导响应时，开放性则邀请创造性和深度。在两者之间找到合适的平衡可以导致与ChatGPT更丰富、更有洞察力的互动。
- en: Clearly articulating the purpose of your prompt or the desired outcome helps
    tailor the AI's responses to your specific needs, enhancing the relevance and
    utility of the information provided.
  id: totrans-322
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 清晰地阐述你的提示或期望的结果有助于使人工智能的回复符合你的特定需求，增强提供信息的关联性和实用性。
- en: Specifying the format you'd like the response to take (e.g., a list, a detailed
    explanation, a summary) can significantly impact the usefulness and applicability
    of ChatGPT's replies.
  id: totrans-323
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 指定你希望响应采取的格式（例如，列表、详细解释、摘要）可以显著影响ChatGPT回复的有用性和适用性。
- en: Crafting the perfect prompt is an iterative process. Initial attempts may require
    adjustments based on the responses received, underscoring the importance of evaluation
    and refinement.
  id: totrans-324
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 制作完美的提示是一个迭代的过程。最初的尝试可能需要根据收到的回复进行调整，这强调了评估和改进的重要性。
- en: Different wording can lead to different outcomes. If the first response doesn't
    meet your expectations, rephrasing the prompt can uncover new perspectives and
    insights.
  id: totrans-325
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 不同的措辞可能导致不同的结果。如果第一个回复不符合你的期望，重新措辞提示可以揭示新的视角和见解。
- en: Asking follow-up questions based on initial responses can clarify or expand
    upon the information provided, leading to a deeper understanding of the topic.
  id: totrans-326
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 根据初始回复提出后续问题可以澄清或扩展提供的信息，从而加深对主题的理解。
- en: The formula [Context] + [Specific Information] + [Intent/Goal] + [Response Format
    (if needed)] = Perfect Prompt serves as a guideline for constructing prompts that
    are effective and aligned with your objectives.
  id: totrans-327
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 公式 [上下文] + [具体信息] + [意图/目标] + [所需响应格式（如有需要）] = 完美提示，作为构建有效且与你的目标一致提示的指南。
- en: 'Chapter 5: Debugging and Troubleshooting Prompt'
  id: totrans-328
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第五章：调试和故障排除提示
- en: Encountering unexpected outcomes is a rite of passage in prompt engineering.
    But these moments of misalignment are opportunities to refine your approach, understand
    the AI's language more deeply, and master the art of crafting prompts that resonate
    with precision. This chapter is your guide through the world of debugging and
    troubleshooting prompts.
  id: totrans-329
  prefs: []
  type: TYPE_NORMAL
  zh: 遇到意外结果是提示工程过程中的一个必经阶段。但这些不一致的时刻却是完善你的方法、更深入地理解人工智能的语言以及掌握制作与精确性产生共鸣的提示的艺术的机会。本章将引导你进入调试和故障排除提示的世界。
- en: Common Issues with ChatGPT Responses
  id: totrans-330
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT回复的常见问题
- en: Issues in prompt engineering often stem from mismatches between the user's intentions
    and the AI's interpretations, leading to irrelevant or off-target responses. Recognizing
    these problems early can save time and frustration, enabling more effective outcomes.
  id: totrans-331
  prefs: []
  type: TYPE_NORMAL
  zh: 提示工程中的问题通常源于用户的意图与人工智能的解释之间的不匹配，导致无关或偏离目标的响应。及早识别这些问题可以节省时间和挫败感，从而实现更有效的结果。
- en: One frequent issue is vagueness or lack of specificity in the prompt, which
    can lead to broad or generalized responses from ChatGPT. This occurs when the
    prompt doesn't provide enough context or detail, leaving ChatGPT to fill in the
    gaps with its own assumptions.
  id: totrans-332
  prefs: []
  type: TYPE_NORMAL
  zh: 一个常见的问题是提示不明确或缺乏具体性，这可能导致ChatGPT给出广泛或概括性的回答。这种情况发生在提示没有提供足够的上下文或细节时，让ChatGPT用自己的假设来填补空白。
- en: 'Prompt: "Tell me about space."'
  id: totrans-333
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：“告诉我关于太空的事情。”
- en: 'Issue: This prompt is extremely vague and lacks specificity, which could lead
    ChatGPT to cover a broad range of topics related to space, from astronomy to space
    exploration or even space in art, without focusing on any particular area of interest
    to the user.'
  id: totrans-334
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 问题：这个提示非常模糊，缺乏具体性，可能导致ChatGPT涵盖与空间相关的广泛主题，从天文学到太空探索，甚至艺术中的空间，但没有专注于用户感兴趣的任何特定领域。
- en: Conversely, overly complex prompts can confuse the AI, resulting in responses
    that miss the point or address only a fraction of the prompt.
  id: totrans-335
  prefs: []
  type: TYPE_NORMAL
  zh: 相反，过于复杂的提示可能会让AI困惑，导致回答偏离要点或只涉及提示的一部分。
- en: 'Prompt: "Explain the socio-economic impacts of quantum computing on global
    supply chains, considering the implications of quantum cryptography for cybersecurity,
    and how this might affect emerging markets'' access to technology in light of
    current geopolitical tensions."'
  id: totrans-336
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：“解释量子计算对全球供应链的社会经济影响，考虑到量子密码学对网络安全的含义，以及这在当前地缘政治紧张局势下可能如何影响新兴市场对技术的获取。”
- en: 'Issue: This prompt is overly complex, touching on multiple deeply intricate
    topics. It risks confusing ChatGPT, leading to a response that may only address
    parts of the prompt or provide a superficial overview without meaningful insights
    into any specific area.'
  id: totrans-337
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 问题：这个提示过于复杂，涉及多个深奥复杂的话题。它可能会让ChatGPT困惑，导致回答可能只涉及提示的一部分，或者提供一个没有深入见解的表面概述。
- en: Another common challenge is misinterpreting the prompt's intent. This can happen
    when the language used is ambiguous, or the prompt inadvertently leads the AI
    down an unintended path.
  id: totrans-338
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个常见的挑战是误解提示的意图。这可能会发生在使用的语言含糊不清，或者提示无意中引导AI走向了不期望的道路。
- en: 'Prompt: "Discuss the role of networks in society."'
  id: totrans-339
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：“讨论网络在社会中的作用。”
- en: 'Issue: Without clear context, "networks" can be interpreted in various ways,
    including social networks, computer networks, or even transportation networks.
    ChatGPT might choose an interpretation that diverges from the user''s intended
    focus, leading to a response that doesn''t align with the user''s expectations.'
  id: totrans-340
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 问题：在没有明确上下文的情况下，“网络”可以被解释为多种方式，包括社交网络、计算机网络，甚至交通网络。ChatGPT可能会选择一种与用户意图不符的解释，导致回答不符合用户的期望。
- en: Similarly, failure to specify the desired tone or format can result in responses
    that don't match your expectations in terms of seriousness, formality, or style.
  id: totrans-341
  prefs: []
  type: TYPE_NORMAL
  zh: 同样，未能指定期望的语气或格式可能导致回答不符合你的期望，无论是在严肃性、正式性还是风格方面。
- en: 'Prompt: "Write about the French Revolution."'
  id: totrans-342
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：“撰写关于法国大革命的论文。”
- en: 'Issue: Without specifying the tone (academic, casual, satirical) or format
    (essay, bullet points, dialogue), ChatGPT''s response might not align with what
    the user had in mind, potentially leading to a mismatch in expectations regarding
    the seriousness, depth, or style of the content.'
  id: totrans-343
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 问题：如果没有指定语气（学术、随意、讽刺）或格式（文章、项目符号、对话），ChatGPT的回答可能不符合用户的期望，可能导致对内容的严肃性、深度或风格的期望不一致。
- en: Inaccuracies or outdated information in ChatGPT's responses also pose significant
    issues, especially in fast-evolving fields. This is often due to the AI's training
    data being static and not including the most recent developments. If you want
    up-to-date information, clearly ask ChatGPT to browse the internet to provide
    its answers.
  id: totrans-344
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT回答中的不准确或过时信息也带来了重大问题，尤其是在快速发展的领域。这通常是由于AI的训练数据是静态的，不包括最新的发展。如果你想获取最新信息，请明确要求ChatGPT浏览互联网以提供答案。
- en: Finally, repetitiveness or looping in responses indicates that the AI might
    not have understood the prompt correctly or cannot generate new, relevant content
    based on the given instructions.
  id: totrans-345
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，回答中的重复或循环表明AI可能没有正确理解提示，或者无法根据给定的指示生成新的、相关的内容。
- en: Strategies for Debugging Problematic Prompts
  id: totrans-346
  prefs: []
  type: TYPE_NORMAL
  zh: 调试问题性提示的策略
- en: 'Debugging problematic prompts is essential for achieving the desired outcomes.
    Here are some strategies to help you systematically address and resolve issues
    with your prompts:'
  id: totrans-347
  prefs: []
  type: TYPE_NORMAL
  zh: 调试有问题的提示对于实现期望的结果至关重要。以下是一些帮助你系统地解决你的提示中问题的策略：
- en: 1\. Simplify and Clarify
  id: totrans-348
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 1. 简化和明确
- en: Begin by breaking down complex prompts into simpler, more direct questions.
    Complexity can often lead to confusion, not just for humans but also for AI. If
    your original prompt was multifaceted, try separating it into multiple, straightforward
    prompts that each focus on a single aspect of your inquiry. This can help isolate
    the issue and lead to clearer responses.
  id: totrans-349
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，将复杂的提示分解成更简单、更直接的问题。复杂性往往会导致困惑，这不仅对人类，也对AI都是如此。如果你的原始提示是多方面的，尝试将其分解成多个简单、直接的提示，每个提示都专注于你调查的一个方面。这有助于隔离问题并导致更清晰的回答。
- en: 'Example:'
  id: totrans-350
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：
- en: 'Original Complex Prompt: "Explain the socio-economic impacts of quantum computing
    on global supply chains, considering the implications of quantum cryptography
    for cybersecurity, and how this might affect emerging markets'' access to technology
    in light of current geopolitical tensions."'
  id: totrans-351
  prefs: []
  type: TYPE_NORMAL
  zh: 原始复杂提示：“解释量子计算对全球供应链的社会经济影响，考虑到量子密码学对网络安全的含义，以及这在当前地缘政治紧张局势下可能如何影响新兴市场对技术的获取。”
- en: 'Simplified and Clarified Version: "What are the socio-economic impacts of quantum
    computing on global supply chains?"'
  id: totrans-352
  prefs: []
  type: TYPE_NORMAL
  zh: 简化和明确版本：“量子计算对全球供应链的社会经济影响是什么？”
- en: 'This revised prompt breaks down the original complex question into a simpler,
    more focused inquiry that targets one specific aspect: the socio-economic impacts
    of quantum computing on global supply chains. It eliminates the additional layers
    of complexity related to quantum cryptography and geopolitical tensions, aiming
    for a more precise response on a single topic.'
  id: totrans-353
  prefs: []
  type: TYPE_NORMAL
  zh: 这个修订的提示将原始的复杂问题分解成更简单、更专注的查询，针对一个特定的方面：量子计算对全球供应链的社会经济影响。它消除了与量子密码学和地缘政治紧张相关的额外复杂性层，旨在对单一主题提供更精确的回答。
- en: 2\. Adjust the Level of Detail
  id: totrans-354
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 2. 调整细节程度
- en: If responses are consistently off-target, it might be due to the level of detail
    in your prompts. Too much detail can overwhelm ChatGPT, while too little can make
    it difficult for it to grasp your exact needs. Experiment with the granularity
    of your information, providing just enough context to guide the AI without leading
    it astray.
  id: totrans-355
  prefs: []
  type: TYPE_NORMAL
  zh: 如果响应始终偏离目标，可能是因为你提示的细节程度。过多的细节可能会使ChatGPT感到不知所措，而太少的细节则可能使其难以理解你的确切需求。尝试调整信息的粒度，提供足够的信息来引导AI，同时避免将其引入歧途。
- en: 3\. Rephrase for Clarity
  id: totrans-356
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 3. 重新措辞以明确
- en: Sometimes, the problem lies in how the prompt is worded. Phrasing can significantly
    influence the AI's understanding. Rephrase your prompt to eliminate ambiguity
    and use language that accurately reflects your intent. This includes specifying
    the type of response you're looking for, such as an explanation, a list, or a
    detailed analysis.
  id: totrans-357
  prefs: []
  type: TYPE_NORMAL
  zh: 有时，问题在于提示的措辞。措辞可以显著影响AI的理解。重新措辞你的提示以消除歧义，并使用准确反映你意图的语言。这包括指定你想要的响应类型，如解释、列表或详细分析。
- en: 'Example:'
  id: totrans-358
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：
- en: 'Original Ambiguous Prompt: "Discuss the role of networks in society."'
  id: totrans-359
  prefs: []
  type: TYPE_NORMAL
  zh: 原始模糊提示：“讨论网络在社会中的作用。”
- en: 'Rephrased for Clarity Version: "Explain how social networks influence interpersonal
    communication in modern society."'
  id: totrans-360
  prefs: []
  type: TYPE_NORMAL
  zh: 明确措辞版本：“解释社交网络如何影响现代社会的人际沟通。”
- en: This revision addresses the ambiguity of the word "networks" by specifying "social
    networks" and narrowing down the focus to their influence on interpersonal communication.
    It uses clearer language to reflect the intent of understanding the impact of
    social networks on how people communicate today, removing any confusion about
    the type of networks being referred to.
  id: totrans-361
  prefs: []
  type: TYPE_NORMAL
  zh: 这次修订通过指定“社交网络”来解决“网络”一词的歧义，并将焦点缩小到它们对人际沟通的影响。它使用更清晰的语言来反映理解社交网络对人们今天如何沟通的影响的意图，消除了对所提及网络类型的任何混淆。
- en: 4\. Specify Context Explicitly
  id: totrans-362
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 4. 明确指定上下文
- en: Explicitly stating the context within your prompt can drastically improve the
    relevance of ChatGPT's responses. If the context was implied or not clearly stated
    in your original prompt, add explicit references to the necessary background information,
    audience, or purpose behind your question.
  id: totrans-363
  prefs: []
  type: TYPE_NORMAL
  zh: 在你的提示中明确说明上下文可以极大地提高ChatGPT响应的相关性。如果上下文在原始提示中是暗示的或没有明确说明，添加对必要的背景信息、受众或你问题的目的的明确引用。
- en: 5\. Utilize Feedback Loops
  id: totrans-364
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 5. 利用反馈循环
- en: Incorporate the AI's previous responses as feedback in your new prompts. If
    a response was not what you expected, craft a follow-up prompt addressing the
    initial reply's shortcomings. This could involve asking for clarification, requesting
    missing information, or correcting inaccuracies.
  id: totrans-365
  prefs: []
  type: TYPE_NORMAL
  zh: 将AI的先前回复作为反馈纳入你的新提示中。如果回复不是你所期望的，可以制作一个后续提示，解决初始回复的不足。这可能包括要求澄清、请求缺失的信息或纠正不准确之处。
- en: 6\. Seek External Inputs
  id: totrans-366
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 6. 寻求外部输入
- en: Sometimes, consulting external resources or the experiences of others can offer
    insights into resolving your prompt issues. Online forums, communities dedicated
    to AI research, and prompt engineering resources can provide examples of how similar
    challenges were addressed.
  id: totrans-367
  prefs: []
  type: TYPE_NORMAL
  zh: 有时，咨询外部资源或他人的经验可以为你提供解决提示问题的见解。在线论坛、致力于AI研究的社区和提示工程资源可以提供如何解决类似挑战的例子。
- en: 7\. Iterative Testing
  id: totrans-368
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 7. 迭代测试
- en: Adopt an iterative approach to testing your adjusted prompts. Each iteration
    offers a learning opportunity, helping you fine-tune your strategy based on the
    AI's responses. This process not only helps in debugging the current prompt but
    also enhances your overall prompt engineering skills.
  id: totrans-369
  prefs: []
  type: TYPE_NORMAL
  zh: 采用迭代方法测试你的调整后的提示。每次迭代都提供学习机会，帮助你根据AI的回复调整策略。这个过程不仅有助于调试当前提示，还能提高你的整体提示工程技能。
- en: Adjusting Prompts Based on Response Analysis
  id: totrans-370
  prefs: []
  type: TYPE_NORMAL
  zh: 根据回复分析调整提示
- en: 'Adjusting prompts based on response analysis is a nuanced approach that requires
    a deep dive into the specifics of the AI''s feedback. Unlike general debugging,
    which may start with broad strategies, adjusting based on analysis is a targeted
    refinement process tailored to the intricacies of each response. Here''s how to
    enhance your prompts effectively:'
  id: totrans-371
  prefs: []
  type: TYPE_NORMAL
  zh: 根据回复分析调整提示是一种微妙的方法，需要深入挖掘AI反馈的具体细节。与可能从广泛策略开始的通用调试不同，基于分析的调整是一个针对每个回复复杂性的针对性细化过程。以下是有效增强提示的方法：
- en: Tailor Specificity and Precision
  id: totrans-372
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 定制具体性和精确性
- en: After analyzing a response, pinpoint where more specificity could refine the
    interaction. Adjust your prompt by incorporating precise details that were either
    missing or glossed over in the initial response. For instance, specify the level
    of expertise or the particular angle of interest if seeking expert insights on
    a topic.
  id: totrans-373
  prefs: []
  type: TYPE_NORMAL
  zh: 分析完回复后，确定哪里需要更多的具体性来细化交互。通过结合初始回复中缺失或被忽略的精确细节来调整你的提示。例如，如果你在寻求关于某个主题的专家见解，可以指定专业水平或感兴趣的特定角度。
- en: 'Example:'
  id: totrans-374
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：
- en: 'Prompt Before Adjustment: "Tell me about renewable energy technologies." Prompt
    After Tailoring for Specificity and Precision: "Provide an accurate analysis of
    the latest advancements in solar panel technology post-2020, focusing on efficiency
    improvements and cost reduction."'
  id: totrans-375
  prefs: []
  type: TYPE_NORMAL
  zh: 调整前的提示： "告诉我关于可再生能源技术的事情。" 调整后针对具体性和精确性定制的提示： "提供2020年之后太阳能板技术最新进展的准确分析，重点关注效率提升和成本降低。"
- en: This adjusted prompt specifies the type of renewable energy (solar panel technology),
    the timeframe (post-2020), and the particular angles of interest (efficiency improvements
    and cost reduction), offering clear guidance on the expected details
  id: totrans-376
  prefs: []
  type: TYPE_NORMAL
  zh: 这个调整后的提示指定了可再生能源的类型（太阳能板技术）、时间框架（2020年之后）以及感兴趣的特定角度（效率提升和成本降低），为预期的细节提供了清晰的指导
- en: Refine Contextual Framing
  id: totrans-377
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 细化上下文框架
- en: Evaluate whether the context provided was sufficient for ChatGPT to grasp the
    full scope of your inquiry. Refining the contextual framing might involve adding
    or subtracting background information to better align with the desired response.
    This could mean clarifying the geographical or temporal scope of your question.
  id: totrans-378
  prefs: []
  type: TYPE_NORMAL
  zh: 评估提供的上下文是否足够让ChatGPT掌握你查询的全貌。细化上下文框架可能涉及添加或删除背景信息，以更好地与期望的回复对齐。这可能意味着明确你问题的地理或时间范围。
- en: 'Example:'
  id: totrans-379
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：
- en: 'Prompt Before Adjustment: "Discuss economic growth trends." Prompt After Refining
    Contextual Framing: "Examine the economic growth trends in Southeast Asia from
    2015 to 2020, highlighting the impact of digital transformation on these trends."'
  id: totrans-380
  prefs: []
  type: TYPE_NORMAL
  zh: 调整前的提示： "讨论经济增长趋势。" 调整后细化上下文框架的提示： "分析2015年至2020年东南亚的经济增长趋势，突出数字化转型对这些趋势的影响。"
- en: By clarifying the geographical scope (Southeast Asia) and the temporal frame
    (2015 to 2020), along with focusing on the role of digital transformation, this
    prompt provides a more defined context that aligns with a specific inquiry.
  id: totrans-381
  prefs: []
  type: TYPE_NORMAL
  zh: 通过明确地理范围（东南亚）和时间框架（2015至2020年），以及关注数字化转型的作用，这个提示提供了更明确的背景，与特定的调查相一致。
- en: Optimize Question Structure
  id: totrans-382
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 优化问题结构
- en: Based on the response received, consider restructuring your prompt for better
    comprehension. Sometimes, the order of information or the way a question is posed
    can lead to varied outcomes. Experiment with leading with the most critical piece
    of information or breaking down a complex inquiry into a logical sequence of smaller
    questions.
  id: totrans-383
  prefs: []
  type: TYPE_NORMAL
  zh: 根据收到的响应，考虑重新构建你的提示以获得更好的理解。有时，信息的顺序或提问的方式可能会导致不同的结果。尝试从最重要的信息开始引导，或者将复杂的问题分解为一系列逻辑上较小的疑问。
- en: Enhance Response Direction
  id: totrans-384
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 增强响应方向
- en: If ChatGPT's response veers off course, introduce directional cues in your prompt
    to guide it back to the core of your inquiry. This can involve using transitional
    phrases that signal a return to the main topic or explicitly stating the desired
    focus area if the initial response wandered.
  id: totrans-385
  prefs: []
  type: TYPE_NORMAL
  zh: 如果ChatGPT的响应偏离了轨道，在你的提示中引入方向性提示，以引导它回到调查的核心。这可能包括使用过渡性短语来表示返回主要主题，或者在初始响应偏离后明确指出期望的关注领域。
- en: 'Example:'
  id: totrans-386
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：
- en: 'Prompt Before Adjustment: "Discuss the ethical implications of artificial intelligence."'
  id: totrans-387
  prefs: []
  type: TYPE_NORMAL
  zh: 调整前的提示：“讨论人工智能的伦理影响。”
- en: 'Prompt After Enhancing Response Direction: "Focus on the ethical implications
    of artificial intelligence in healthcare decision-making. Specifically, address
    concerns about patient privacy, bias in algorithmic decisions, and the transparency
    of AI systems used in diagnostics and treatment recommendations."'
  id: totrans-388
  prefs: []
  type: TYPE_NORMAL
  zh: 在增强响应方向后： "关注人工智能在医疗决策中的伦理影响。具体来说，解决关于患者隐私、算法决策中的偏见以及用于诊断和治疗建议的AI系统的透明度的问题。"
- en: This adjusted prompt directs ChatGPT more specifically towards the ethical implications
    of AI within a particular context (healthcare decision-making), highlighting key
    areas of concern (patient privacy, bias, transparency) to ensure the response
    remains focused on the core inquiry. This addition of directional cues helps guide
    ChatGPT back to the intended topic, enhancing the relevance and precision of the
    output.
  id: totrans-389
  prefs: []
  type: TYPE_NORMAL
  zh: 这个调整后的提示更具体地指导ChatGPT关注特定背景（医疗决策）中人工智能的伦理影响，突出关键关注领域（患者隐私、偏见、透明度），以确保响应保持对核心调查的关注。这种方向性提示的添加有助于将ChatGPT引导回预期主题，增强了输出的相关性和精确性。
- en: Integrate Reflective Adjustments
  id: totrans-390
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 集成反思性调整
- en: Utilize reflective adjustments that consider both what was and wasn't said in
    the response. If essential aspects were overlooked, explicitly ask for these in
    your follow-up. Conversely, if certain points were overemphasized, use your next
    prompt to gently steer the conversation away from these areas.
  id: totrans-391
  prefs: []
  type: TYPE_NORMAL
  zh: 利用反思性调整，考虑响应中说了什么和没有说什么。如果遗漏了关键方面，明确在后续中要求这些方面。相反，如果某些点被过分强调，使用你的下一个提示温和地将对话引导离开这些领域。
- en: Adjust for Tone and Engagement
  id: totrans-392
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 调整语气和参与度
- en: Lastly, if the tone of the response doesn't match your expectations, subtly
    adjust your language to cue the AI toward the preferred style. This adjustment
    can be particularly effective in aligning the conversation's tone with your target
    audience or the intended use of the information.
  id: totrans-393
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，如果响应的语气不符合你的预期，微妙地调整你的语言，以引导AI向期望的风格靠拢。这种调整在使对话的语气与目标受众或信息的预期用途保持一致时尤其有效。
- en: By focusing on these detailed strategies for adjusting your prompts based on
    response analysis, you move beyond basic troubleshooting to a more refined, response-oriented
    approach. This tailored method ensures that each iteration of your prompt is a
    step closer to the ideal outcome, demonstrating a sophisticated understanding
    of AI interaction dynamics.
  id: totrans-394
  prefs: []
  type: TYPE_NORMAL
  zh: 通过关注这些基于响应分析的详细策略来调整你的提示，你将超越基本的故障排除，转向更精细、以响应为导向的方法。这种方法确保了你的每个提示迭代都更接近理想的成果，展示了你对AI交互动态的复杂理解。
- en: Case Study and Exercise
  id: totrans-395
  prefs: []
  type: TYPE_NORMAL
  zh: 案例研究和练习
- en: In this section, I will share with you a practical case study and a carefully
    crafted hands-on exercise to solidify your understanding and allow you to apply
    what you've learned directly. This approach will give you the skills necessary
    to navigate the world of prompt engineering confidently.
  id: totrans-396
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，我将与你分享一个实际案例研究和精心设计的动手练习，以巩固你的理解，并允许你直接应用所学知识。这种方法将赋予你自信地导航提示工程世界的技能。
- en: 'Case Study: Focusing a Research Inquiry for Depth'
  id: totrans-397
  prefs: []
  type: TYPE_NORMAL
  zh: 案例研究：聚焦研究调查以深化
- en: 'Challenge: An overly broad prompt—"Tell me about renewable energy sources"—yielded
    superficial information lacking depth.'
  id: totrans-398
  prefs: []
  type: TYPE_NORMAL
  zh: 挑战：一个过于宽泛的提示——“告诉我关于可再生能源的信息”——产生了缺乏深度的表面信息。
- en: 'Strategies Applied:'
  id: totrans-399
  prefs: []
  type: TYPE_NORMAL
  zh: 采取的策略：
- en: 'Refining for Depth and Relevance: The prompt was refined to "Analyze the feasibility
    and environmental impact of integrating solar and wind energy into urban residential
    areas, focusing on recent advancements and case studies from the past five years.
    Highlight potential challenges and solutions."'
  id: totrans-400
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 精炼以深化和相关性：提示被精炼为“分析将太阳能和风能整合到城市住宅区的可行性和环境影响，重点关注过去五年的最新进展和案例研究。突出潜在挑战和解决方案。”
- en: 'Incorporating Feedback Loops: After an initial response, further prompts asked
    for clarification on specific technologies and real-world application examples,
    iteratively refining the focus based on the AI''s outputs.'
  id: totrans-401
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 引入反馈循环：在初步回应之后，进一步的提示要求对特定技术和现实世界应用案例进行澄清，基于AI的输出迭代地细化焦点。
- en: 'Outcome: The revised prompts produced a detailed comparative analysis that
    was rich with current data, technological insights, and practical considerations
    for urban energy planning. The responses were significantly more actionable and
    informative, providing a solid foundation for further research or policy development.'
  id: totrans-402
  prefs: []
  type: TYPE_NORMAL
  zh: 结果：修订后的提示产生了一份详细比较分析，其中包含了丰富的当前数据、技术见解和城市能源规划的实际考虑。回应显著更具可操作性和信息性，为进一步的研究或政策制定提供了坚实的基础。
- en: 'Integrated Strategies for Success:'
  id: totrans-403
  prefs: []
  type: TYPE_NORMAL
  zh: 成功的整合策略：
- en: 'Iterative Refinement: Using ChatGPT''s responses to refine and direct subsequent
    prompts for deeper exploration.'
  id: totrans-404
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 迭代精炼：使用ChatGPT的回应来精炼和指导后续提示，以进行更深入的探索。
- en: 'Feedback Integration: Adjusting prompts based on the quality of ChatGPT responses
    to hone in on the targeted outcome.'
  id: totrans-405
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 反馈整合：根据ChatGPT回应的质量调整提示，以聚焦于目标结果。
- en: This case study illustrates the power of strategic prompt adjustment, demonstrating
    how specificity, context, and an iterative approach can transform generic interactions
    into valuable insights and captivating narratives.
  id: totrans-406
  prefs: []
  type: TYPE_NORMAL
  zh: 本案例研究展示了战略提示调整的力量，展示了如何通过具体性、情境和迭代方法将通用互动转化为有价值的见解和引人入胜的叙述。
- en: 'Exercise: Refine a Broad Research Inquiry'
  id: totrans-407
  prefs: []
  type: TYPE_NORMAL
  zh: 练习：精炼宽泛的研究调查
- en: 'Objective: Narrow down a broad, unfocused research prompt into a targeted inquiry
    that facilitates deep and actionable insights from ChatGPT.'
  id: totrans-408
  prefs: []
  type: TYPE_NORMAL
  zh: 目标：将一个宽泛、不聚焦的研究提示精炼为一个有针对性的调查，从而从ChatGPT中获得深入和可操作性的见解。
- en: 'Original Prompt: "Tell me about the impacts of climate change."'
  id: totrans-409
  prefs: []
  type: TYPE_NORMAL
  zh: 原始提示：“告诉我气候变化的影响。”
- en: 'Instructions:'
  id: totrans-410
  prefs: []
  type: TYPE_NORMAL
  zh: 指示：
- en: Choose a specific aspect of climate change impacts to focus on (e.g., effects
    on agriculture, coastal cities, public health).
  id: totrans-411
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 选择气候变化影响的特定方面进行关注（例如，对农业、沿海城市、公共健康的影响）。
- en: Refine the prompt by specifying a geographical area, population group, timeframe,
    or future projection scenario.
  id: totrans-412
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 通过指定地理区域、人口群体、时间框架或未来预测情景来精炼提示。
- en: Draft a follow-up question based on the potential response to your refined prompt,
    preparing to deepen the inquiry or clarify any ambiguities.
  id: totrans-413
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 根据对精炼提示的潜在回应制定后续问题，准备深化调查或澄清任何含糊之处。
- en: Reflect on how this iterative approach might lead to a more comprehensive understanding
    of the chosen aspect of climate change impacts.
  id: totrans-414
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 反思这种迭代方法如何可能导致对所选气候变化影响方面的更全面理解。
- en: 'Reflection: After completing the exercise, consider the strategies you applied
    (specificity, contextual framing, question structure, etc.) and how they might
    improve ChatGPT''s ability to generate relevant and detailed responses.'
  id: totrans-415
  prefs: []
  type: TYPE_NORMAL
  zh: 反思：完成练习后，考虑你应用的策略（具体性、情境框架、问题结构等）以及它们如何可能提高ChatGPT生成相关和详细回应的能力。
- en: Key Takeaways from Chapter 5
  id: totrans-416
  prefs: []
  type: TYPE_NORMAL
  zh: 第五章要点总结
- en: Recognizing when a prompt isn't yielding the desired outcome is crucial. Analyzing
    the AI's response to identify the issue is the first step toward making effective
    adjustments.
  id: totrans-417
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 认识到提示没有产生预期结果至关重要。分析AI的响应以确定问题是进行有效调整的第一步。
- en: Adjusting prompts for specificity and clarity can significantly improve the
    quality of AI responses, leading to more relevant and engaging outcomes.
  id: totrans-418
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 调整提示以增加具体性和清晰度可以显著提高AI响应的质量，导致更相关和吸引人的结果。
- en: Adjusting prompts is often iterative, requiring multiple refinements to hone
    in on the optimal phrasing.
  id: totrans-419
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 调整提示通常是迭代的，需要多次改进以精确地找到最佳措辞。
- en: Utilizing external tools and resources can provide additional perspectives and
    insights, aiding in the prompt adjustment process.
  id: totrans-420
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 利用外部工具和资源可以提供额外的视角和见解，有助于提示调整过程。
- en: Each adjustment is an opportunity to learn more about effective prompt engineering,
    enhancing your ability to craft successful prompts in the future.
  id: totrans-421
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 每次调整都是一个学习更多关于有效提示工程的机会，这将增强您未来制作成功提示的能力。
- en: 'Chapter 6: Advanced Prompt Engineering Techniques'
  id: totrans-422
  prefs: []
  type: TYPE_NORMAL
  zh: 第6章：高级提示工程技巧
- en: Using Context Effectively
  id: totrans-423
  prefs: []
  type: TYPE_NORMAL
  zh: 有效使用上下文
- en: Using context effectively in your prompts guides ChatGPT's responses to align
    more closely with your expectations and needs. Context enriches your prompts by
    adding layers of understanding, enabling the AI to grasp not just the literal
    question or task at hand but also the broader scenario in which it's being asked.
    This can dramatically improve the relevance and precision of its output.
  id: totrans-424
  prefs: []
  type: TYPE_NORMAL
  zh: 在您的提示中有效地使用上下文可以引导ChatGPT的响应更接近您的期望和需求。上下文通过增加理解层次丰富了您的提示，使AI不仅能够理解字面问题或手头的任务，还能理解提问的更广泛场景。这可以显著提高其输出的相关性和精确性。
- en: To incorporate context effectively, start by identifying the essential background
    information that might influence ChatGPT's response. This could include details
    about the intended audience for the content, the purpose of the inquiry, or specific
    constraints and preferences you have. For example, if you're asking for a marketing
    strategy suggestion, mentioning your target demographic, product type, and marketing
    goals provides ChatGPT with a clearer direction.
  id: totrans-425
  prefs: []
  type: TYPE_NORMAL
  zh: 为了有效地融入上下文，首先确定可能影响ChatGPT响应的基本背景信息。这可能包括关于内容目标受众、查询目的或您具有的具体限制和偏好的细节。例如，如果您正在寻求营销策略建议，提及您的目标受众、产品类型和营销目标可以为ChatGPT提供更清晰的指导。
- en: Example Prompt - Incorporating Context Effectively
  id: totrans-426
  prefs: []
  type: TYPE_NORMAL
  zh: 示例提示 - 有效地融入上下文
- en: '"Provide an overview of sustainable living practices tailored for urban dwellers,
    focusing on small-scale recycling, energy efficiency, and urban gardening. The
    intended audience is city residents living in apartments or small spaces, looking
    to reduce their carbon footprint and embrace an eco-friendly lifestyle. Highlight
    practical tips that can be easily implemented in limited spaces and with a modest
    budget."'
  id: totrans-427
  prefs: []
  type: TYPE_NORMAL
  zh: “为城市居民提供可持续生活实践的概述，重点关注小规模回收、能源效率和城市园艺。目标受众是居住在公寓或小空间的居民，他们希望减少碳足迹并拥抱环保的生活方式。强调可以在有限空间和预算内轻松实施的实用技巧。”
- en: However, it's crucial to balance the amount of context provided. Too little
    can leave ChatGPT making assumptions that might not align with your needs, while
    too much can overwhelm or confuse it. Aim for a concise yet comprehensive briefing
    that covers the key points without becoming overly detailed.
  id: totrans-428
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，平衡提供上下文的数量至关重要。太少可能导致ChatGPT做出可能不符合您需求的假设，而太多则可能使其感到不知所措或困惑。目标是简洁而全面的简报，涵盖关键点，而不变得过于详细。
- en: 'Example Prompt: Balancing Context Provided'
  id: totrans-429
  prefs: []
  type: TYPE_NORMAL
  zh: 示例提示：平衡提供的上下文
- en: '"Discuss sustainable living practices for people living in cities, such as
    recycling methods, reducing energy consumption, and growing food in small spaces.
    Avoid excessive detail that might overwhelm someone new to sustainability, but
    ensure enough context is given to guide them in making meaningful changes within
    the constraints of urban living. Aim for a balance between practicality and simplicity
    to encourage action."'
  id: totrans-430
  prefs: []
  type: TYPE_NORMAL
  zh: “讨论城市居民的可持续生活实践，例如回收方法、减少能源消耗和在小型空间种植食物。避免提供可能使新接触可持续性的人感到不知所措的过多细节，但确保提供足够的上下文，以指导他们在城市生活的限制内做出有意义的改变。在实用性和简单性之间寻求平衡，以鼓励采取行动。”
- en: Another effective strategy is to use context-setting phrases at the beginning
    of your prompt. Phrases like "Given the current trends in renewable energy..."
    or "Considering the needs of a small business in the tech industry..." immediately
    set the stage for ChatGPT, framing the response in a way that considers these
    factors.
  id: totrans-431
  prefs: []
  type: TYPE_NORMAL
  zh: 另一种有效的策略是在你的提示的开头使用设置上下文的短语。例如，“鉴于可再生能源的当前趋势...”或“考虑到科技行业中小型企业的需求...”，这些短语立即为ChatGPT设定了场景，以考虑这些因素的方式构建响应。
- en: 'Example Prompt: Using Context-Setting Phrases'
  id: totrans-432
  prefs: []
  type: TYPE_NORMAL
  zh: 示例提示：使用设置上下文的短语
- en: '"Considering the challenges of urban living, outline key sustainable living
    actions suitable for apartment dwellers, including effective recycling techniques,
    energy-saving tips, and options for balcony or windowsill gardening. The goal
    is to empower residents with limited space to contribute positively to environmental
    sustainability."'
  id: totrans-433
  prefs: []
  type: TYPE_NORMAL
  zh: “考虑到城市生活的挑战，概述适合公寓居住者的关键可持续生活行为，包括有效的回收技术、节能技巧以及阳台或窗台园艺的选项。目标是让空间有限的居民能够积极地为环境可持续性做出贡献。”
- en: Finally, remember that the context should be relevant to the question or task.
    Irrelevant details can detract from the focus of the prompt, leading to less targeted
    responses.
  id: totrans-434
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，请记住，上下文应与问题或任务相关。不相关的细节可能会分散提示的焦点，导致响应不够精准。
- en: Prompt Chaining for Complex Interactions
  id: totrans-435
  prefs: []
  type: TYPE_NORMAL
  zh: 复杂交互的提示链
- en: Prompt chaining is a powerful technique designed to navigate complex interactions
    with ChatGPT. It involves creating a sequence of related prompts, where each subsequent
    prompt builds upon the response received from the previous one. This method allows
    for deeper exploration of a topic or more complex task execution than could be
    managed with a single prompt.
  id: totrans-436
  prefs: []
  type: TYPE_NORMAL
  zh: 提示链是一种旨在导航与ChatGPT复杂交互的强大技术。它涉及创建一系列相关的提示，其中每个后续提示都是基于前一个提示的响应。这种方法允许对主题进行更深入的探索或执行比单个提示所能管理的更复杂的任务。
- en: The essence of prompt chaining lies in its iterative nature. The first prompt
    sets the foundation by introducing the topic or task. The response to this initial
    prompt then informs the next question or directive, tailoring it based on the
    information or insight gained. This process repeats, with each link in the chain
    drawing from the preceding response, guiding the AI through a more intricate line
    of reasoning or a series of steps toward a goal.
  id: totrans-437
  prefs: []
  type: TYPE_NORMAL
  zh: 提示链的本质在于其迭代性。第一个提示通过介绍主题或任务来奠定基础。对这个初始提示的响应然后指导下一个问题或指令，根据获得的信息或洞察力进行定制。这个过程重复进行，链中的每个环节都从前一个响应中汲取，引导AI通过更复杂的推理线路或一系列步骤向目标迈进。
- en: For example, in a research project, the first prompt might ask for an overview
    of a subject. Based on ChatGPT's response, the next prompt could request deeper
    details on a specific aspect mentioned. Further prompts might explore related
    subtopics, ask for clarifications, or compare perspectives. This approach ensures
    that the exploration remains focused and builds progressively, allowing for a
    thorough examination of the subject.
  id: totrans-438
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，在一个研究项目中，第一个提示可能要求概述一个主题。根据ChatGPT的响应，下一个提示可能要求对提到的特定方面进行更深入的细节请求。进一步的提示可能探索相关的子主题，要求澄清或比较观点。这种方法确保了探索保持专注并逐步构建，允许对主题进行彻底的审查。
- en: Implementing prompt chaining effectively requires clear objectives and understanding
    how to leverage the AI's responses. It's essential to read and analyze each response
    carefully, identifying key points that can be expanded upon or clarified in subsequent
    prompts. This might also involve adjusting the direction based on new information
    uncovered during the interaction, making the process dynamic and adaptive.
  id: totrans-439
  prefs: []
  type: TYPE_NORMAL
  zh: 有效地实施提示链需要明确的目标和了解如何利用AI的响应。仔细阅读和分析每个响应至关重要，以识别可以在后续提示中进一步阐述或澄清的关键点。这也可能涉及根据在互动过程中发现的新信息调整方向，使整个过程动态且适应性较强。
- en: 'Prompt Chaining Example:'
  id: totrans-440
  prefs: []
  type: TYPE_NORMAL
  zh: 提示链示例：
- en: 'First Prompt: "Provide an overview of the different types of renewable energy
    sources currently available."'
  id: totrans-441
  prefs: []
  type: TYPE_NORMAL
  zh: 第一个提示：“概述目前可用的不同类型的可再生能源。”
- en: This sets the foundation by introducing the topic and asking for a broad overview.
  id: totrans-442
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 这通过介绍主题并请求一个广泛的概述来奠定基础。
- en: 'Second Prompt (Based on Response to First): "You mentioned solar and wind energy
    as two key renewable sources. Can you compare their efficiency and cost-effectiveness
    for residential use?"'
  id: totrans-443
  prefs: []
  type: TYPE_NORMAL
  zh: 第二个提示（基于对第一个提示的响应）：“你提到了太阳能和风能作为两种关键的可再生能源。你能比较它们在家庭使用中的效率和成本效益吗？”
- en: This prompt digs deeper into specifics mentioned in the response, asking for
    a comparison that requires analysis.
  id: totrans-444
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 这个提示深入到回答中提到的具体内容，要求进行对比分析。
- en: 'Third Prompt (Based on Response to Second): "Given the efficiency and costs
    you outlined for solar and wind energy, what are the initial steps a homeowner
    should take to evaluate and possibly install a solar energy system?"'
  id: totrans-445
  prefs: []
  type: TYPE_NORMAL
  zh: 第三个提示（基于第二个提示的回答）：“鉴于你概述的太阳能和风能的效率和成本，家庭在评估和可能安装太阳能系统时应采取哪些初步步骤？”
- en: The chain moves towards practical application, building on the earlier comparative
    analysis.
  id: totrans-446
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 链条转向实际应用，基于早期比较分析。
- en: 'Fourth Prompt (Based on Response to Third): "Can you list the potential subsidies
    or government incentives available for homeowners wanting to install solar panels
    in the United States?"'
  id: totrans-447
  prefs: []
  type: TYPE_NORMAL
  zh: 第四个提示（基于第三个提示的回答）：“你能列出美国希望安装太阳能电池板的家庭可获得的潜在补贴或政府激励措施吗？”
- en: This prompt seeks further details on a specific aspect (financial incentives)
    that's crucial for the practical step mentioned previously.
  id: totrans-448
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 这个提示寻求对先前提到的特定方面（财务激励）的更多细节，这对于之前提到的实际步骤至关重要。
- en: 'Fifth Prompt (Based on Response to Fourth): "Lastly, provide a template for
    a cost-benefit analysis that a homeowner could use to assess the financial return
    of investing in solar panels over 10 years."'
  id: totrans-449
  prefs: []
  type: TYPE_NORMAL
  zh: 第五个提示（基于第四个提示的回答）：“最后，提供一个成本效益分析模板，供家庭在10年内评估投资太阳能电池板的财务回报使用。”
- en: The final link in the chain aims to synthesize the information gathered into
    a practical tool for decision-making.
  id: totrans-450
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 链条的最后一个环节旨在将收集到的信息综合成一个实用的决策工具。
- en: This sequence exemplifies prompt chaining by starting with a broad inquiry and
    progressively narrowing down to specific, actionable insights, demonstrating an
    effective exploration of the topic.
  id: totrans-451
  prefs: []
  type: TYPE_NORMAL
  zh: 这个序列通过从广泛的询问开始，逐步缩小范围到具体的、可操作的见解，展示了有效探索主题的方法。
- en: Techniques for Controlling Output Length and Format
  id: totrans-452
  prefs: []
  type: TYPE_NORMAL
  zh: 控制输出长度和格式的技巧
- en: Controlling the output length and format of ChatGPT's response is essential
    for tailoring the information to suit specific requirements or constraints. Whether
    you need a concise summary, a detailed explanation, or a response in a particular
    format, understanding how to guide the AI's output can significantly enhance the
    utility and applicability of its responses.
  id: totrans-453
  prefs: []
  type: TYPE_NORMAL
  zh: 控制ChatGPT响应的长度和格式对于定制信息以适应特定要求或约束至关重要。无论你需要简洁的总结、详细的解释，还是特定格式的回复，了解如何引导AI的输出可以显著提高其响应的实用性和适用性。
- en: Specifying Output Length
  id: totrans-454
  prefs: []
  type: TYPE_NORMAL
  zh: 指定输出长度
- en: To control the length of ChatGPT's output, you can directly specify your requirements
    within the prompt. For instance, asking for a "brief summary" indicates the need
    for a concise response, while requesting a "detailed explanation" signals the
    desire for a more comprehensive reply. You can also set explicit word count limits,
    such as "in 100 words or less," to ensure the response adheres to specific constraints.
    This technique works especially well in scenarios where space or attention is
    limited, such as social media posts or quick reference guides.
  id: totrans-455
  prefs: []
  type: TYPE_NORMAL
  zh: 为了控制ChatGPT输出的长度，你可以在提示中直接指定你的要求。例如，要求“简要总结”表明需要简洁的回答，而要求“详细解释”则表明希望得到更全面的回复。你还可以设置明确的字数限制，如“不超过100字”，以确保回答符合特定的约束。这种技术在空间或注意力有限的情况下特别有效，例如社交媒体帖子或快速参考指南。
- en: 'Example Prompt:'
  id: totrans-456
  prefs: []
  type: TYPE_NORMAL
  zh: 示例提示：
- en: '"Provide a brief summary, in 200 words or less, of the key impacts of climate
    change on marine biodiversity. The summary should highlight the most critical
    effects, focusing on species diversity and ecosystem health."'
  id: totrans-457
  prefs: []
  type: TYPE_NORMAL
  zh: “请提供一个不超过200字的简要总结，概述气候变化对海洋生物多样性的关键影响。总结应突出最关键的影响，重点关注物种多样性和生态系统健康。”
- en: Formatting Instructions
  id: totrans-458
  prefs: []
  type: TYPE_NORMAL
  zh: 格式说明
- en: Including formatting instructions within your prompt can guide the AI in structuring
    its response in the desired manner. For example, if you need information presented
    as a list, you can specify this by saying, "List the main points" or "Provide
    the information in bullet points." For more complex formatting, like a report
    or an article outline, detailing the structure you have in mind ("begin with an
    introduction, followed by three key points, and conclude with a summary") helps
    ChatGPT organize its response accordingly.
  id: totrans-459
  prefs: []
  type: TYPE_NORMAL
  zh: 在你的提示中包含格式说明可以指导AI以期望的方式构建其响应。例如，如果你需要以列表形式呈现信息，你可以通过说“列出主要观点”或“提供以项目符号形式的信息”来指定这一点。对于更复杂的格式，如报告或文章大纲，详细说明你心中的结构（“从引言开始，接着是三个要点，最后以总结结束”）有助于ChatGPT相应地组织其响应。
- en: 'Example Prompt:'
  id: totrans-460
  prefs: []
  type: TYPE_NORMAL
  zh: 示例提示：
- en: '"List the top five benefits of renewable energy sources over fossil fuels.
    Provide the information in bullet points, each point summarizing a different benefit,
    including aspects such as environmental impact, cost-effectiveness, and energy
    efficiency."'
  id: totrans-461
  prefs: []
  type: TYPE_NORMAL
  zh: “列出可再生能源相对于化石燃料的前五大优势。以项目符号形式提供信息，每个要点总结一个不同的优势，包括如环境影响、成本效益和能源效率等方面。”
- en: Using Templates
  id: totrans-462
  prefs: []
  type: TYPE_NORMAL
  zh: 使用模板
- en: Creating a template within your prompt is another effective technique for controlling
    the format. This involves outlining a specific structure for the AI to fill in,
    which could include placeholders for an introduction, body paragraphs, and a conclusion,
    or more specialized content like data tables or Q&A formats.
  id: totrans-463
  prefs: []
  type: TYPE_NORMAL
  zh: 在你的提示中创建一个模板是另一种有效的控制格式的技术。这涉及到为AI提供一个特定的结构，这可能包括用于引言、正文段落和结论的占位符，或者更专业的内容，如数据表或问答格式。
- en: 'Example Template SEO Optimization:'
  id: totrans-464
  prefs: []
  type: TYPE_NORMAL
  zh: 示例模板SEO优化：
- en: 'Title: [Insert Title Based on Main Keyword]'
  id: totrans-465
  prefs: []
  type: TYPE_NORMAL
  zh: 标题：[根据主要关键词插入标题]。
- en: 'Introduction: Briefly introduce [Insert Topic], emphasizing [Primary Keyword].'
  id: totrans-466
  prefs: []
  type: TYPE_NORMAL
  zh: 引言：简要介绍[插入主题]，强调[主要关键词]。
- en: 'Body Paragraphs:'
  id: totrans-467
  prefs: []
  type: TYPE_NORMAL
  zh: 正文段落：
- en: 'Section 1: [Discuss Aspect 1, incorporating Secondary Keyword 1].'
  id: totrans-468
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 第一部分：[讨论方面1，结合次要关键词1]。
- en: 'Section 2: [Discuss Aspect 2, incorporating Secondary Keyword 2].'
  id: totrans-469
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 第二部分：[讨论方面2，结合次要关键词2]。
- en: 'Section 3: [Discuss Aspect 3, incorporating Secondary Keyword 3].'
  id: totrans-470
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 第三部分：[讨论方面3，结合次要关键词3]。
- en: 'Conclusion: Summarize the key points made about [Insert Topic], reiterating
    the importance of [Primary Keyword] in [SEO Goals].'
  id: totrans-471
  prefs: []
  type: TYPE_NORMAL
  zh: 结论：总结关于[插入主题]的关键点，重申[主要关键词]在[SEO目标]中的重要性。
- en: 'Meta Description: [Craft a concise summary that includes the Primary Keyword
    aimed at [SEO Goal]].'
  id: totrans-472
  prefs: []
  type: TYPE_NORMAL
  zh: 元描述：[制作一个简洁的摘要，包括针对[SEO目标]的主要关键词]。
- en: 'Additional Instructions: [Detail any specific SEO strategies, such as internal
    linking, that should be incorporated into the content].'
  id: totrans-473
  prefs: []
  type: TYPE_NORMAL
  zh: 补充说明：[详细说明应纳入内容中的任何特定SEO策略，例如内部链接]。
- en: Incorporating Feedback Loops Into Prompts
  id: totrans-474
  prefs: []
  type: TYPE_NORMAL
  zh: 将反馈循环纳入提示
- en: Incorporating feedback loops into prompts is another advanced technique that
    enhances the iterative dialogue between you and ChatGPT, allowing for continuous
    refinement and adaptation of responses. This method leverages the AI's previous
    outputs as a basis for further inquiries or directions, creating a dynamic exchange
    where each interaction is informed by the last. It's particularly useful for deepening
    the conversation, refining the focus, or correcting misunderstandings.
  id: totrans-475
  prefs: []
  type: TYPE_NORMAL
  zh: 将反馈循环纳入提示是另一种高级技术，它增强了你与ChatGPT之间的迭代对话，允许对响应进行持续的细化与适应。这种方法利用AI的先前输出作为进一步查询或方向的依据，创造了一个动态的交流，其中每次交互都受到上一次交互的启发。这对于深化对话、细化焦点或纠正误解特别有用。
- en: If you're wondering whether this is the same as Prompt Chaining, I'll tell you
    it's not, and here is why. While both techniques involve iterative interactions
    with ChatGPT, feedback loops are distinct in their emphasis on refinement, correction,
    and adaptation, fostering a more personalized and precise dialogue. Prompt chaining
    is more about leveraging consecutive prompts for deeper exploration or complex
    task execution, whereas feedback loops focus on enhancing the quality of interaction
    through continuous feedback and adaptation.
  id: totrans-476
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想知道这与提示链是否相同，我会告诉你它不是，原因如下。虽然这两种技术都涉及与ChatGPT的迭代交互，但反馈循环在强调细化、纠正和适应方面是不同的，这促进了更个性化和精确的对话。提示链更多地关于利用连续提示进行更深入的探索或复杂任务的执行，而反馈循环则侧重于通过持续的反馈和适应来提高交互质量。
- en: To implement a feedback loop effectively, start by analyzing ChatGPT's response
    to your initial prompt. Identify key points, insights, or areas where further
    clarification could be beneficial. Use this analysis to craft your next prompt,
    explicitly referencing elements from the prior response or asking for expansion
    on specific points. This not only makes your follow-up prompts more targeted but
    also helps the AI to understand the context of the conversation more deeply.
  id: totrans-477
  prefs: []
  type: TYPE_NORMAL
  zh: 为了有效地实施反馈循环，首先分析ChatGPT对你初始提示的响应。识别关键点、洞见或需要进一步澄清的领域。使用这种分析来制定你的下一个提示，明确引用先前的响应或请求对特定点的扩展。这不仅使你的后续提示更加有针对性，还有助于AI更深入地理解对话的上下文。
- en: For example, if ChatGPT provides a broad overview in response to your query,
    you might follow up by asking for detailed examples related to a specific aspect
    mentioned. Alternatively, if the response contains inaccuracies or misses the
    mark, your next prompt can correct these misunderstandings by clarifying your
    original intent and asking for a revised answer.
  id: totrans-478
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，如果ChatGPT对你的查询提供了一个广泛的概述，你可以通过询问与提到的特定方面相关的详细例子来跟进。或者，如果响应中包含不准确或偏离了目标，你的下一个提示可以通过澄清你的原始意图并请求修改后的答案来纠正这些误解。
- en: 'Example Feedback Loop Prompt:'
  id: totrans-479
  prefs: []
  type: TYPE_NORMAL
  zh: 示例反馈循环提示：
- en: 'Initial Prompt: "Explain the significance of quantum computing in enhancing
    encryption technologies."'
  id: totrans-480
  prefs: []
  type: TYPE_NORMAL
  zh: 初始提示：“解释量子计算在增强加密技术中的重要性。”
- en: After receiving the initial response, suppose ChatGPT provides a general overview
    of quantum computing but does not specifically address how it enhances encryption
    technologies in depth.
  id: totrans-481
  prefs: []
  type: TYPE_NORMAL
  zh: 在收到初始响应后，假设ChatGPT提供了一个关于量子计算的一般概述，但没有具体说明它如何深入增强加密技术。
- en: 'Follow-Up Prompt (Incorporating Feedback Loop): "Your explanation of quantum
    computing was helpful. Can you now dive deeper into how quantum computing specifically
    impacts encryption technologies? I''m particularly interested in quantum cryptography
    and how it differs from traditional encryption methods. Also, can you clarify
    the practical applications of this technology in securing digital communications?"'
  id: totrans-482
  prefs: []
  type: TYPE_NORMAL
  zh: 后续提示（结合反馈循环）：“你对量子计算的解释很有帮助。现在你能更深入地探讨量子计算如何具体影响加密技术吗？我特别感兴趣的是量子密码学以及它与传统加密方法的区别。此外，你能澄清这项技术在保障数字通信方面的实际应用吗？”
- en: This follow-up prompt uses the feedback loop technique by referencing the initial
    response to ask for more detailed information on a particular aspect (quantum
    cryptography) and seeking clarification on its applications. Thus, based on the
    AI's previous outputs, the focus and depth of the conversation are refined.
  id: totrans-483
  prefs: []
  type: TYPE_NORMAL
  zh: 这个后续提示通过引用初始响应来使用反馈循环技术，请求对特定方面（量子密码学）的更详细信息，并寻求对其应用的澄清。因此，基于AI之前的输出，对话的焦点和深度得到了细化。
- en: Feedback loops also encourage a form of active learning for both the user and
    the AI. Over time, you'll become more adept at interpreting responses and identifying
    effective follow-up questions, while ChatGPT's ability to align with your expectations
    improves through the nuanced direction provided by your prompts.
  id: totrans-484
  prefs: []
  type: TYPE_NORMAL
  zh: 反馈循环也鼓励用户和AI进行一种主动学习。随着时间的推移，你将变得更加擅长解读响应并识别有效的后续问题，而ChatGPT通过你提示中的细微指导，其满足你期望的能力也会得到提高。
- en: Creative Uses of Re-prompting and Follow-up Questions
  id: totrans-485
  prefs: []
  type: TYPE_NORMAL
  zh: 重提示和后续问题的创造性使用
- en: Creative uses of re-prompting and follow-up questions allow you to delve deeper
    into subjects, explore new angles, or steer conversations in innovative directions.
  id: totrans-486
  prefs: []
  type: TYPE_NORMAL
  zh: 重提示和后续问题的创造性使用允许你深入探讨主题，探索新的角度，或以创新的方式引导对话。
- en: 'Exploratory Re-prompting: One creative application is using re-prompting to
    explore a topic from multiple perspectives. For instance, after receiving a response,
    you might ask ChatGPT to consider the question from an alternative viewpoint or
    through the lens of a different discipline. This can lead to a richer, more nuanced
    understanding of the subject.'
  id: totrans-487
  prefs: []
  type: TYPE_NORMAL
  zh: 探索性重提示：一种创造性的应用是使用重提示从多个角度探索一个主题。例如，在收到响应后，你可以要求ChatGPT从一个不同的观点或通过不同学科的视角来考虑这个问题。这可能导致对主题有更丰富、更细腻的理解。
- en: 'Example Exploratory Re-prompting:'
  id: totrans-488
  prefs: []
  type: TYPE_NORMAL
  zh: 示例探索性重提示：
- en: 'Initial Prompt: "What are the potential benefits of implementing blockchain
    technology in the healthcare sector?"'
  id: totrans-489
  prefs: []
  type: TYPE_NORMAL
  zh: 初始提示：“实施区块链技术在医疗保健领域的潜在好处是什么？”
- en: 'Follow-Up Prompt: "That''s insightful. Can you now explore how blockchain technology
    could present challenges in the healthcare sector, especially regarding data privacy
    and regulatory compliance?"'
  id: totrans-490
  prefs: []
  type: TYPE_NORMAL
  zh: 后续提示： "这很有见地。现在你能探索区块链技术如何在医疗保健领域提出挑战，特别是在数据隐私和监管合规方面吗？"
- en: 'Idea Generation: Re-prompting can also be instrumental in brainstorming sessions.
    After ChatGPT presents an initial set of ideas or solutions, follow-up questions
    can encourage further creativity. Asking for variations, combinations, or entirely
    new suggestions based on the initial response can spark a cascade of innovative
    thoughts.'
  id: totrans-491
  prefs: []
  type: TYPE_NORMAL
  zh: 创意生成：重新提示在头脑风暴会议中也可以起到重要作用。在ChatGPT提出初始想法或解决方案后，后续问题可以鼓励进一步的创造力。根据初始响应请求变化、组合或全新的建议可以激发一系列创新思维。
- en: 'Example Idea Generation Prompt:'
  id: totrans-492
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：创意生成提示
- en: 'Initial Prompt: "Provide three innovative ways to reduce carbon footprint for
    small businesses."'
  id: totrans-493
  prefs: []
  type: TYPE_NORMAL
  zh: 初始提示： "提供三种减少小型企业碳足迹的创新方法。"
- en: 'Follow-Up Prompt: "Interesting ideas! Can you investigate how these methods
    could be combined or enhanced with technology to offer even more effective solutions?"'
  id: totrans-494
  prefs: []
  type: TYPE_NORMAL
  zh: 后续提示： "很有趣的想法！你能调查这些方法如何与技术结合或增强，以提供更有效的解决方案吗？"
- en: 'Deep Dive Questions: Follow-up questions are key for drilling down into specifics.
    If ChatGPT provides a general overview, asking for case studies, examples, or
    detailed explanations of certain points can deepen the knowledge gained. This
    technique is particularly useful in educational contexts or when mastering new
    concepts.'
  id: totrans-495
  prefs: []
  type: TYPE_NORMAL
  zh: 深入探讨问题：后续问题是深入具体细节的关键。如果ChatGPT提供了一个概述，询问案例研究、例子或某些点的详细解释可以加深获得的知识。这种技术在教育环境中或掌握新概念时特别有用。
- en: 'Example Deep Dive Questions Prompt:'
  id: totrans-496
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：深入探讨问题提示
- en: 'Initial Prompt: "Explain the basic principles of machine learning."'
  id: totrans-497
  prefs: []
  type: TYPE_NORMAL
  zh: 初始提示： "解释机器学习的基本原理。"
- en: 'Follow-Up Prompt: "You''ve given a good overview. Can you now provide a real-world
    case study where machine learning has significantly improved business operations,
    including the challenges faced and the outcomes?"'
  id: totrans-498
  prefs: []
  type: TYPE_NORMAL
  zh: 后续提示： "你提供了一个很好的概述。现在你能提供一个真实世界的案例研究，其中机器学习显著改善了业务运营，包括面临的挑战和结果吗？"
- en: 'Storytelling Enhancement: In creative writing or storytelling, re-prompting
    can be used to develop characters, plot lines, or settings. Following up with
    questions that challenge the AI to expand on a narrative element or introduce
    twists can enrich the story.'
  id: totrans-499
  prefs: []
  type: TYPE_NORMAL
  zh: 故事讲述增强：在创意写作或故事讲述中，重新提示可用于发展人物、情节线或场景。通过后续问题挑战AI扩展叙事元素或引入转折可以丰富故事。
- en: 'Example Storytelling Enhancement Prompt:'
  id: totrans-500
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：故事讲述增强提示
- en: 'Initial Prompt: "Tell me a story about a detective solving a mystery in a futuristic
    city."'
  id: totrans-501
  prefs: []
  type: TYPE_NORMAL
  zh: 初始提示： "给我讲一个侦探在未来的城市中解决神秘案件的故事。"
- en: 'Follow-Up Prompt: "Great start! Can you add a twist where the detective discovers
    the crime is linked to a larger conspiracy involving the city''s ruling government,
    and how does this revelation affect their trust in the system?"'
  id: totrans-502
  prefs: []
  type: TYPE_NORMAL
  zh: 后续提示： "是个好开始！你能增加一个转折，其中侦探发现犯罪与城市统治政府的更大阴谋有关，这种揭露如何影响他们对系统的信任？"
- en: Key Takeaways from Chapter 6
  id: totrans-503
  prefs: []
  type: TYPE_NORMAL
  zh: 第六章要点总结
- en: Effective use of context in prompts can significantly enhance the relevance
    and accuracy of AI responses.
  id: totrans-504
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在提示中使用上下文的有效性可以显著提高AI响应的相关性和准确性。
- en: Prompt chaining is a powerful strategy for navigating complex interactions,
    allowing for a deeper and more structured exploration of topics.
  id: totrans-505
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提示链是一个强大的策略，用于导航复杂交互，允许对主题进行更深入和更有结构的探索。
- en: Techniques for controlling the length and format of ChatGPT outputs are crucial
    for tailoring responses to specific needs and preferences.
  id: totrans-506
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 控制ChatGPT输出长度和格式的技巧对于定制响应以满足特定需求和偏好至关重要。
- en: Incorporating feedback loops into prompts creates a more personalized and adaptive
    dialogue, improving the quality of the interaction over time.
  id: totrans-507
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将反馈循环纳入提示中可以创建更个性化和适应性强的对话，随着时间的推移提高交互质量。
- en: Re-prompting and follow-up questions offer a pathway to more creative and exploratory
    conversations with AI, fostering innovation and deeper understanding.
  id: totrans-508
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 重新提示和后续问题为与AI进行更具创造性和探索性的对话提供了途径，促进了创新和更深入的理解。
- en: 'Chapter 7: ChatGPT Features Explained'
  id: totrans-509
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第七章：ChatGPT功能解释
- en: 'Quick Note: I hope you''re enjoying the book. If it has resonated with you
    thus far, your feedback would be invaluable to me. A review on Amazon sharing
    your experience can greatly support my work and help others discover the book.
    Your thoughts and reflections are greatly appreciated. You can do so by simply
    scanning this QR code:'
  id: totrans-510
  prefs: []
  type: TYPE_NORMAL
  zh: 快速笔记：我希望你喜欢这本书。如果它已经与你产生了共鸣，你的反馈对我来说将非常有价值。在亚马逊上分享你的体验可以极大地支持我的工作，并帮助他人发现这本书。你的想法和反思非常受欢迎。你可以通过简单地扫描这个二维码来做到这一点：
- en: '![Review QR Code](image_rsrc3ZD.jpg)'
  id: totrans-511
  prefs: []
  type: TYPE_IMG
  zh: '![评论二维码](image_rsrc3ZD.jpg)'
- en: In this chapter, I'll walk you through the features of ChatGPT-4\. Please note
    that the plugin feature has recently been disabled and thus will not be covered.
    However, I'm thrilled to introduce the newly launched "read aloud." This feature
    allows ChatGPT to deliver its responses verbally, enhancing user interaction.
    It's available across both ChatGPT 3.5 and GPT-4 versions.
  id: totrans-512
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我将向您介绍ChatGPT-4的功能。请注意，插件功能最近已被禁用，因此不会涉及。然而，我很高兴介绍新推出的“朗读”功能。此功能允许ChatGPT以口头形式提供其回答，增强用户互动。该功能在ChatGPT
    3.5和GPT-4版本中均可用。
- en: And just so you know, you can also use ChatGPT on the go! The app is available
    for both Android and iPhone users, bringing the power of AI to your fingertips
    wherever you are.
  id: totrans-513
  prefs: []
  type: TYPE_NORMAL
  zh: 顺便说一下，你还可以随时随地使用ChatGPT！该应用适用于Android和iPhone用户，将人工智能的力量带到你的指尖，无论你在哪里。
- en: This exploration is designed to equip you with a thorough understanding of ChatGPT's
    versatile applications. By dissecting each feature, I aim to show you how ChatGPT
    extends beyond simple text generation, becoming a multifaceted tool that can navigate
    the internet, analyze information, and even understand images, transforming the
    way we interact with AI technology.
  id: totrans-514
  prefs: []
  type: TYPE_NORMAL
  zh: 这次探索旨在让你对ChatGPT的多功能性有深入的理解。通过剖析每个功能，我旨在向你展示ChatGPT如何超越简单的文本生成，成为一个多功能的工具，可以导航互联网、分析信息，甚至理解图像，改变我们与人工智能技术互动的方式。
- en: Web Browsing
  id: totrans-515
  prefs: []
  type: TYPE_NORMAL
  zh: 网络浏览
- en: ChatGPT-4 web browsing feature empowers it to access and retrieve current data,
    news articles, and other resources directly from the web, expanding its knowledge
    base and the freshness of the information it provides.
  id: totrans-516
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT-4的网络浏览功能使其能够直接从互联网上访问和检索当前数据、新闻文章和其他资源，扩大其知识库和信息的新鲜度。
- en: The internet is a dynamic and ever-evolving knowledge repository, with new information
    being added and updated every moment. By integrating web browsing, ChatGPT can
    enhance its responses with the latest information, providing accurate answers
    that reflect the most current data and trends.
  id: totrans-517
  prefs: []
  type: TYPE_NORMAL
  zh: 互联网是一个动态且不断发展的知识库，信息每时每刻都在被添加和更新。通过集成网络浏览，ChatGPT可以增强其回答，提供最新的信息，提供反映最新数据和趋势的准确答案。
- en: Just remember to ask ChatGPT if you want it to browse the internet before replying
    to your request.
  id: totrans-518
  prefs: []
  type: TYPE_NORMAL
  zh: 只需记住，在回复你的请求之前，向ChatGPT询问是否需要它浏览互联网。
- en: 'Example: Tracking Financial Market Trends'
  id: totrans-519
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：追踪金融市场趋势
- en: 'A practical application of ChatGPT''s web browsing feature could be tracking
    and analyzing financial market trends. Suppose you''re an investor looking to
    make informed decisions based on the latest market movements. Here''s how ChatGPT
    can assist:'
  id: totrans-520
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT网络浏览功能的实际应用可以是追踪和分析金融市场趋势。假设你是一位希望根据最新市场动态做出明智决策的投资者。以下是ChatGPT如何协助的示例：
- en: 'Query Submission: You ask ChatGPT for the latest trends in the stock market,
    specifically focusing on technology stocks.'
  id: totrans-521
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 查询提交：你向ChatGPT询问股市的最新趋势，特别是关注科技股。
- en: 'Web Browsing in Action: Ask ChatGPT to use the web browsing capability. It
    then accesses real-time financial news and data from reputable financial websites
    and databases.'
  id: totrans-522
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 网络浏览实战：请ChatGPT使用网络浏览功能。然后，它访问来自知名金融网站和数据库的实时金融新闻和数据。
- en: 'Analysis and Response: ChatGPT provides a summary of the latest trends, highlighting
    significant movements, any notable news affecting technology stocks, and potential
    market forecasts.'
  id: totrans-523
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 分析和回应：ChatGPT提供最新趋势的总结，突出显著变动、影响科技股的任何显著新闻以及潜在的市场预测。
- en: 'Note: ChatGPT tends to provide responses based on its own data knowledge (currently
    up to April 2023), so remember to clearly ask if you want it to browse the internet.'
  id: totrans-524
  prefs: []
  type: TYPE_NORMAL
  zh: 注意：ChatGPT倾向于根据其自身的知识数据（目前截至2023年4月）提供回答，所以记得在需要它浏览互联网时明确询问。
- en: Data Analysis
  id: totrans-525
  prefs: []
  type: TYPE_NORMAL
  zh: 数据分析
- en: This feature enables ChatGPT-4 to process, analyze, and present data from uploaded
    files, effectively serving as an AI-powered data analyst. Here's a closer look
    at how this feature works and a practical example of its application.
  id: totrans-526
  prefs: []
  type: TYPE_NORMAL
  zh: 此功能使ChatGPT-4能够处理、分析和展示上传文件中的数据，有效地充当一个AI驱动的数据分析师。以下是该功能如何工作的更详细说明以及其实际应用的一个实例。
- en: At its core, the data analysis feature allows ChatGPT to sift through extensive
    datasets, identifying patterns, trends, and correlations that might not be immediately
    apparent. This capability is especially beneficial in scenarios where quick decision-making
    is crucial and large volumes of data need to be understood rapidly. ChatGPT can
    summarize this data, generate charts, and also predict future trends based on
    historical data, giving users a comprehensive overview of their datasets.
  id: totrans-527
  prefs: []
  type: TYPE_NORMAL
  zh: 在核心上，数据分析功能允许ChatGPT筛选大量数据集，识别可能不会立即显现的模式、趋势和相关性。这种能力在需要快速决策且需要快速理解大量数据的场景中特别有益。ChatGPT可以总结这些数据，生成图表，并根据历史数据预测未来趋势，为用户提供其数据集的全面概述。
- en: 'Example in Market Research:'
  id: totrans-528
  prefs: []
  type: TYPE_NORMAL
  zh: 市场研究中的示例：
- en: Picture a scenario where a business needs to analyze customer feedback to guide
    its product development strategy. The company has collected extensive customer
    reviews and survey data but faces challenges in extracting meaningful insights
    from this vast information pool.
  id: totrans-529
  prefs: []
  type: TYPE_NORMAL
  zh: 想象一个场景，一家企业需要分析客户反馈来指导其产品开发策略。该公司收集了大量的客户评论和调查数据，但面临从大量信息中提取有意义的洞察的挑战。
- en: 'Upload and Query: The business uploads the customer feedback dataset to ChatGPT
    and asks for an analysis specifying the need for insights on customer satisfaction
    levels, common complaints, and suggestions for improvement.'
  id: totrans-530
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 上传和查询：企业将客户反馈数据集上传到ChatGPT，并要求进行分析，具体需要了解客户满意度水平、常见投诉和建议改进。
- en: 'Analysis by ChatGPT: ChatGPT processes the dataset, identifying key themes
    and sentiments expressed in the feedback. It then generates a summary report highlighting
    the main areas of customer satisfaction and dissatisfaction, along with common
    suggestions for product improvements.'
  id: totrans-531
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: ChatGPT的分析：ChatGPT处理数据集，识别反馈中表达的关键主题和情感。然后，它生成一份总结报告，突出客户满意和不满意的主要领域，以及产品改进的常见建议。
- en: 'Actionable Insights: Based on ChatGPT''s analysis, the business gains a clear
    understanding of its customers'' needs and preferences, which informs its product
    development and marketing strategies. The ability to quickly turn raw data into
    useful insights allows the company to make informed decisions that align with
    customer expectations.'
  id: totrans-532
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 可操作的洞察：基于ChatGPT的分析，企业对其客户的需求和偏好有了清晰的认识，这为产品开发和营销策略提供了信息。快速将原始数据转化为有用洞察的能力，使公司能够做出符合客户期望的明智决策。
- en: The data analysis capability of ChatGPT marks a significant leap toward democratizing
    data science. It enables users without deep technical expertise to benefit from
    advanced data analysis and interpretation, simplifying the path from data collection
    to insight generation.
  id: totrans-533
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT的数据分析能力标志着向数据科学民主化迈出的重要一步。它使没有深厚技术专长的用户能够受益于高级数据分析与解读，简化了从数据收集到洞察生成的路径。
- en: GPT Vision
  id: totrans-534
  prefs: []
  type: TYPE_NORMAL
  zh: GPT视觉
- en: GPT Vision represents an innovative leap in integrating visual processing capabilities
    with the linguistic prowess of ChatGPT. This fusion allows the AI to analyze and
    interpret images, offering descriptions, insights, and solutions based on visual
    data. While ChatGPT and its predecessors primarily focus on text, the idea of
    GPT Vision extends the model's utility into the visual domain.
  id: totrans-535
  prefs: []
  type: TYPE_NORMAL
  zh: GPT视觉代表了将视觉处理能力与ChatGPT的语言能力相结合的创新飞跃。这种融合使AI能够分析和解读图像，基于视觉数据提供描述、洞察和解决方案。虽然ChatGPT及其前辈主要关注文本，但GPT视觉的想法将模型的效用扩展到视觉领域。
- en: GPT Vision symbolizes a bridge between textual understanding and visual interpretation,
    enabling the AI to process images alongside text queries. This capability allows
    you to upload images for analysis, with ChatGPT providing detailed descriptions,
    contextual information, or even answering questions about the images' content.
  id: totrans-536
  prefs: []
  type: TYPE_NORMAL
  zh: GPT视觉象征着文本理解和视觉解读之间的桥梁，使AI能够在文本查询的同时处理图像。这种能力允许您上传图像进行分析，ChatGPT提供详细的描述、背景信息，甚至回答有关图像内容的提问。
- en: 'Exercise:'
  id: totrans-537
  prefs: []
  type: TYPE_NORMAL
  zh: 练习：
- en: 'Prompt: "I want you to use GPT Vision to tell me exactly what you see in this
    picture."'
  id: totrans-538
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：“我想让你使用GPT视觉来告诉我你在这张图片中看到了什么。”
- en: Upload an image and watch ChatGPT do its magic.
  id: totrans-539
  prefs: []
  type: TYPE_NORMAL
  zh: 上传一张图片，看看ChatGPT如何施展其魔法。
- en: As AI technology continues to evolve, features like GPT Vision could transform
    how we leverage AI, making it an even more integral tool in various fields by
    bridging the gap between textual and visual information.
  id: totrans-540
  prefs: []
  type: TYPE_NORMAL
  zh: 随着人工智能技术的不断发展，像GPT Vision这样的功能可能会改变我们利用AI的方式，通过弥合文本和视觉信息之间的差距，使其成为各个领域更加核心的工具。
- en: Key Takeaways from Chapter 7
  id: totrans-541
  prefs: []
  type: TYPE_NORMAL
  zh: 第七章的关键要点
- en: ChatGPT's web browsing capability ensures that users have access to the latest
    information from across the internet, making it a powerful tool for research and
    real-time data retrieval.
  id: totrans-542
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: ChatGPT的网页浏览能力确保用户能够访问来自互联网的最新信息，使其成为研究和实时数据检索的有力工具。
- en: ChatGPT can act as a data analyst, processing and interpreting complex datasets
    to provide users with actionable insights, summaries, and visual data representations.
  id: totrans-543
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: ChatGPT可以充当数据分析师，处理和解释复杂的数据集，为用户提供可操作见解、摘要和视觉数据表示。
- en: GPT Vision represents the AI's ability to analyze and interpret images, providing
    detailed descriptions and insights based on visual inputs.
  id: totrans-544
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: GPT Vision代表了AI分析和解释图像的能力，基于视觉输入提供详细描述和见解。
- en: 'Chapter 8: Custom Instructions'
  id: totrans-545
  prefs: []
  type: TYPE_NORMAL
  zh: 第八章：自定义指令
- en: Introduction to Custom Instructions
  id: totrans-546
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 介绍自定义指令
- en: Custom Instructions, one of my favorite features in ChatGPT, allow you to tailor
    the AI's responses to your specific needs and preferences by giving detailed guidelines
    on how you want the interaction to proceed. These instructions can include information
    about your background, the context of your query, desired tone, level of detail,
    specific topics to focus on or avoid, and how technical or simplified the answers
    should be.
  id: totrans-547
  prefs: []
  type: TYPE_NORMAL
  zh: 自定义指令是ChatGPT我最喜欢的功能之一，它允许你通过提供详细的指南来定制AI的回应，以适应你的特定需求和偏好。这些指令可以包括关于你的背景、查询的上下文、偏好的语气、详细程度、需要关注或避免的具体主题，以及答案应该有多技术性或简化。
- en: By setting these parameters, you can guide ChatGPT to generate responses that
    are more relevant, accurate, and aligned with your intentions, enhancing the overall
    effectiveness and personalized experience of the conversation. This feature is
    particularly useful in professional or specialized contexts where the user's goals
    and requirements can greatly influence the type of assistance needed from the
    AI.
  id: totrans-548
  prefs: []
  type: TYPE_NORMAL
  zh: 通过设置这些参数，你可以引导ChatGPT生成更相关、准确且符合你意图的回应，从而提高对话的整体效果和个性化体验。这一功能在专业或特定环境中尤其有用，因为用户的目标和需求可以极大地影响所需的AI辅助类型。
- en: 'To customize ChatGPT, you''ll be asked to reply to these two questions:'
  id: totrans-549
  prefs: []
  type: TYPE_NORMAL
  zh: 要定制ChatGPT，你将被要求回答这两个问题：
- en: '"What would you like ChatGPT to know about you to provide better responses?"'
  id: totrans-550
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: “你希望ChatGPT了解哪些关于你的信息，以便提供更好的回应？”
- en: '"How would you like ChatGPT to respond?"'
  id: totrans-551
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: “你希望ChatGPT如何回应？”
- en: Your answers to these questions are instrumental in shaping how ChatGPT interacts
    with you, influencing both the content and presentation of its responses.
  id: totrans-552
  prefs: []
  type: TYPE_NORMAL
  zh: 你对这些问题的回答对于塑造ChatGPT如何与你互动至关重要，它影响着其回应的内容和呈现方式。
- en: 'Here''s how you should craft these answers:'
  id: totrans-553
  prefs: []
  type: TYPE_NORMAL
  zh: 这是你应该如何构建这些回答的方式：
- en: 1\. Share Relevant Information
  id: totrans-554
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 分享相关信息
- en: When responding to what you'd like ChatGPT to know about you, think about the
    context or expertise relevant to your inquiries. For instance, if you're seeking
    advice on digital marketing strategies, mentioning your role as a digital marketer
    and your target audience can help ChatGPT tailor its advice more effectively.
  id: totrans-555
  prefs: []
  type: TYPE_NORMAL
  zh: 当回应你希望ChatGPT了解的关于你的信息时，考虑与你的查询相关的背景或专业知识。例如，如果你在寻求数字营销策略的建议，提及你的数字营销角色和目标受众可以帮助ChatGPT更有效地定制其建议。
- en: 2\. Define Response Preferences
  id: totrans-556
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 定义回应偏好
- en: Determining how you want ChatGPT to respond involves specifying the tone, format,
    and level of detail you prefer. If your goal is to gather concise, actionable
    advice, your instructions should reflect this preference.
  id: totrans-557
  prefs: []
  type: TYPE_NORMAL
  zh: 确定你希望ChatGPT如何回应，涉及指定你偏好的语气、格式和详细程度。如果你的目标是收集简洁、可操作的建议，你的指令应反映这一偏好。
- en: 'Example for a Software Developer:'
  id: totrans-558
  prefs: []
  type: TYPE_NORMAL
  zh: 软件开发者的示例：
- en: 1\. What would you like ChatGPT to know about you to provide better responses?
  id: totrans-559
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 你希望ChatGPT了解哪些信息以提供更好的回应？
- en: Your primary programming languages (e.g., Python, JavaScript).
  id: totrans-560
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你主要的编程语言（例如，Python、JavaScript）。
- en: The types of projects you work on (e.g., web development, machine learning).
  id: totrans-561
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你所参与的项目类型（例如，网站开发、机器学习）。
- en: Your preferred development tools and environments (e.g., Visual Studio Code,
    Docker).
  id: totrans-562
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 您首选的开发工具和环境（例如，Visual Studio Code，Docker）。
- en: Your current learning goals or areas of interest within software development
    (e.g., learning Rust, exploring cloud computing).
  id: totrans-563
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 您当前的学习目标或软件开发中的兴趣领域（例如，学习Rust，探索云计算）。
- en: Any frameworks or libraries you frequently use (e.g., React for front-end, TensorFlow
    for ML).
  id: totrans-564
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 您经常使用的任何框架或库（例如，React用于前端，TensorFlow用于机器学习）。
- en: 2\. How would you like ChatGPT to respond?
  id: totrans-565
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 您希望ChatGPT如何回应？
- en: Provide code examples in your preferred programming languages.
  id: totrans-566
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提供您首选编程语言的代码示例。
- en: Offer solutions that are compatible with your development tools and environments.
  id: totrans-567
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提供与您的开发工具和环境兼容的解决方案。
- en: Share resources and tutorials that are directly relevant to your current learning
    goals.
  id: totrans-568
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 分享与您当前学习目标直接相关的资源和教程。
- en: Suggest best practices tailored to the frameworks or libraries you use.
  id: totrans-569
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 针对您所使用的框架或库，建议最佳实践。
- en: When discussing concepts, relate them to your areas of interest or projects.
  id: totrans-570
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 讨论概念时，将其与您的兴趣领域或项目相关联。
- en: Designing Effective Custom Instructions
  id: totrans-571
  prefs: []
  type: TYPE_NORMAL
  zh: 设计有效的自定义指令
- en: Designing effective custom instructions requires a clear understanding of your
    objectives and the ability to articulate these goals in a way ChatGPT can interpret
    and act upon. It involves striking a balance between providing enough detail to
    guide the AI's responses and allowing flexibility for it to generate creative
    and insightful outputs. Key elements to consider include defining the scope of
    the inquiry, setting expectations for the tone and format of the response, and
    identifying any critical information that should be included or omitted.
  id: totrans-572
  prefs: []
  type: TYPE_NORMAL
  zh: 设计有效的自定义指令需要清楚地了解您的目标，并能够以ChatGPT能够理解和执行的方式表达这些目标。这涉及到在提供足够细节以引导AI的响应和允许其生成创造性和有洞察力的输出之间取得平衡。需要考虑的关键要素包括定义调查范围、设定对响应语气和格式的期望，以及确定应包含或省略的任何关键信息。
- en: Moreover, effective custom instructions should also specify the user's background
    knowledge on the topic, enabling ChatGPT to adjust its explanations accordingly.
    For instance, a software developer looking for advanced coding techniques would
    benefit from different instructions than a hobbyist seeking basic programming
    tips.
  id: totrans-573
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，有效的自定义指令还应指定用户对该主题的背景知识，使ChatGPT能够相应地调整其解释。例如，寻求高级编码技术的软件开发者将受益于与寻求基本编程技巧的爱好者不同的指令。
- en: The most important things to outline when crafting custom instructions are the
    user's professional role, responsibilities, expertise, and the specific challenges
    they face. The instructions should also specify how ChatGPT should communicate,
    including the tone, level of detail, and types of resources that would be most
    helpful.
  id: totrans-574
  prefs: []
  type: TYPE_NORMAL
  zh: 在制定自定义指令时，最重要的内容是用户的职业角色、责任、专长以及他们面临的特定挑战。指令还应指定ChatGPT应该如何沟通，包括语气、详细程度和最有帮助的资源类型。
- en: 'Below, you''ll find a template of the most important information to include:'
  id: totrans-575
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是一个包含最重要的信息的模板：
- en: Custom Instructions Template
  id: totrans-576
  prefs: []
  type: TYPE_NORMAL
  zh: 自定义指令模板
- en: What would you like ChatGPT to know about you to provide better responses?
  id: totrans-577
  prefs: []
  type: TYPE_NORMAL
  zh: 您希望ChatGPT了解哪些关于您的内容以提供更好的响应？
- en: 'Profession/Role:'
  id: totrans-578
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 职业/角色：
- en: 'Knowledge/Expertise:'
  id: totrans-579
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 知识/专长：
