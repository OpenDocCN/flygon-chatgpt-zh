  prefs: []
  type: TYPE_NORMAL
- en: 3.1.3.     Idea generation
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: ChatGPT is great for generating innovative ideas. Whether you're looking for
    inspiration for a creative project, need suggestions for solving a problem at
    work, or want to explore new topics for a blog, ChatGPT can help you open new
    doors. Ask, and the model will generate various ideas and suggestions based on
    the knowledge it has learned.
  prefs: []
  type: TYPE_NORMAL
- en: In addition to providing initial ideas, ChatGPT can help you expand on these
    ideas, exploring different angles and delving into details you may not have considered.
    This tool offers both quantity and quality, allowing you to see new possibilities
    you may not have considered before and fostering a more prosperous and diverse
    creative process. For example, if you start with a general idea for an advertising
    campaign, ChatGPT can suggest specific approaches, slogans, and strategies you
    had not initially contemplated.
  prefs: []
  type: TYPE_NORMAL
- en: If you want the ideas it generates to follow specific rules or constraints,
    you can guide the model by indicating the limitations you consider. For example,
    you could ask it to include specific words, a certain number of letters, or to
    follow a particular theme. This makes the tool more valuable because you can customize
    the ideas. Best of all, ChatGPT never tires of offering new ideas. It is always
    ready to help you, continuously generating suggestions, no matter how many times
    you ask. So, whether the ideas are simplified or more elaborate, ChatGPT is designed
    to meet your creative needs without limit.
  prefs: []
  type: TYPE_NORMAL
- en: 3.1.4.     Translation of texts
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Regarding translation, ChatGPT stands out as a powerful tool, surpassing traditional
    platforms like Google Translate or DeepL in several key areas. One of its primary
    strengths is its ability to understand broader context and nuances. Unlike conventional
    translation tools, which often default to literal interpretations, ChatGPT can
    adjust translations based on the intended meaning, capturing subtle cultural or
    stylistic nuances that would otherwise be lost. This ability makes it particularly
    useful when accuracy in tone is crucial, allowing translations to feel more natural
    and contextually appropriate.
  prefs: []
  type: TYPE_NORMAL
- en: Additionally, ChatGPT offers a level of customization that traditional translation
    tools can't match. Users can request a specific level of formality or ask for
    adjustments to fit a particular audience or purpose. This is especially helpful
    when the translation needs to maintain a consistent style, whether for professional,
    casual, or specialized contexts. The flexibility to adapt the translation makes
    ChatGPT a versatile choice, whether addressing a general audience or delving into
    more niche subjects.
  prefs: []
  type: TYPE_NORMAL
- en: Beyond simple translation, ChatGPT also has the unique ability to explain its
    choices. If you're curious about a specific word or phrase, ChatGPT can provide
    a rationale for why it was chosen, offering insight into linguistic decisions
    that might otherwise remain opaque. This feature is invaluable for language learners
    who want to understand the nuances of a language, allowing them to grasp why one
    translation might be more appropriate than another.
  prefs: []
  type: TYPE_NORMAL
- en: Another advantage of ChatGPT lies in its built-in grammar correction. It doesn't
    just translate what's written; it also corrects errors in the original text, producing
    a coherent and polished translation. This capability stands in contrast to traditional
    tools, which often translate errors as they appear without considering the overall
    clarity of the final output. Consequently, the result is a translation that feels
    more professional and accurate.
  prefs: []
  type: TYPE_NORMAL
- en: Moreover, ChatGPT allows for dynamic interaction, enabling users to refine and
    modify translations in real-time. If the initial translation isn’t quite right,
    you can ask for clarifications or specific adjustments without starting from scratch.
    This level of interactivity provides a smoother and more efficient translation
    process compared to the rigid output of Google Translate or DeepL.
  prefs: []
  type: TYPE_NORMAL
- en: Paraphrasing is another area where ChatGPT shines. It can reformulate sentences
    to retain their original meaning while adapting the structure, style, or tone.
    This ability to go beyond literal translation is a significant advantage when
    presenting information differently without losing its essence. In contrast, standard
    tools may struggle to maintain clarity when asked to rephrase, leading to awkward
    or disjointed translations.
  prefs: []
  type: TYPE_NORMAL
- en: Specialized fields benefit significantly from ChatGPT’s flexibility. With the
    proper context, it can handle complex terminology, whether in medicine, technology,
    or law, offering a level of precision that generic translation tools sometimes
    lack. ChatGPT can dive into the specifics of jargon, adapting to the needs of
    the text, while Google Translate or DeepL might not always hit the mark in these
    specialized areas.
  prefs: []
  type: TYPE_NORMAL
- en: Finally, ChatGPT’s potential extends beyond mere text translation. Its multimodal
    capabilities allow it to interact with other formats, like images or audio, broadening
    its usefulness in complex scenarios. This adaptability makes it a more comprehensive
    solution for users who need more than a simple, standalone translation. Unlike
    traditional tools, which are often limited to handling isolated text, ChatGPT’s
    integration with other technologies enables a richer, more versatile approach
    to translation, catering to a broader range of needs and contexts.
  prefs: []
  type: TYPE_NORMAL
- en: 3.1.5.     Classify texts
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Text classification is a functional capability of ChatGPT that can be customized
    based on various criteria, such as sentiment analysis, content topic, or urgency
    level, showcasing its versatility. This process involves organizing texts into
    predefined categories, which is particularly useful in many contexts, including
    sentiment analysis, sorting emails by topic, and classifying content based on
    levels of urgency or relevance.
  prefs: []
  type: TYPE_NORMAL
- en: For instance, if a company receives thousands of customer reviews each day,
    ChatGPT can automatically classify these comments as positive, negative, or neutral.
    This functionality saves time and enables quick identification of specific areas
    that require attention, such as recurring customer service issues or common themes
    in user feedback.
  prefs: []
  type: TYPE_NORMAL
- en: Additionally, ChatGPT can assist in classifying research articles by their respective
    topics, making it easier to manage large volumes of academic information.
  prefs: []
  type: TYPE_NORMAL
- en: 3.1.6.     Extract information
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Information extraction is another crucial ability of language models. ChatGPT
    can identify specific data from large volumes of text, making it easy to obtain
    essential details without a full manual review. For example, in the legal or financial
    field, where documents can be lengthy and complex, ChatGPT can help quickly locate
    critical figures, important dates, or specific contract terms or report terms.
    This makes document review much more efficient and less prone to errors of omission,
    as it allows you to accurately extract the relevant elements without reading the
    entire document.
  prefs: []
  type: TYPE_NORMAL
- en: In academic research, this capability allows researchers to extract citations,
    key concepts, or results from previous studies without reading each full article,
    thus facilitating literature review and progress on new projects.
  prefs: []
  type: TYPE_NORMAL
- en: 3.1.7.     Creation of lists and tables
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'One of the most practical advantages of ChatGPT is its ability to provide answers
    in different formats. It is not limited to generating text in paragraphs; you
    can also structure the information in lists with key points, numbered lists, or
    tables. To get the output in a specific format, you indicate it as if you were
    talking to another person. For example, you can say: "Present this information
    to me on a table" or "Give me a list with five main points".'
  prefs: []
  type: TYPE_NORMAL
- en: 'For example, if you are planning an event and need to organize a list of tasks,
    you could ask ChatGPT: "List the tasks needed to organize the event". ChatGPT
    could then generate a numbered list with all the steps to follow, making it easy
    to visualize and organize the tasks.'
  prefs: []
  type: TYPE_NORMAL
- en: Similarly, if you need to compare the features of different products, you can
    say, "Show the features in a table." ChatGPT will present the data in a table,
    allowing you to see the differences and similarities at a glance. This ability
    to adapt the format of the information on demand makes ChatGPT an extraordinarily
    versatile and valuable tool in various contexts, from personal planning to professional
    and academic uses.
  prefs: []
  type: TYPE_NORMAL
- en: 3.1.8.     Summarize texts
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: ChatGPT can summarize texts quickly and accurately, which is very useful when
    dealing with large volumes of information. It can condense directly provided texts
    and known books and articles.
  prefs: []
  type: TYPE_NORMAL
- en: For example, you can request a summary of the book "Rich Dad, Poor Dad," which
    helps users understand complex books in a simplified way. This tool also allows
    you to choose the summary format, such as lists with key points, numbered lists,
    or tables, which is especially useful for students and professionals.
  prefs: []
  type: TYPE_NORMAL
- en: ChatGPT eliminates redundant text and highlights critical aspects, such as crucial
    arguments, main findings, or central ideas. This makes it ideal for preparing
    study material, simplifying the reading of reports or summarizing books and research
    articles, and improving efficiency in academic and professional environments.
  prefs: []
  type: TYPE_NORMAL
- en: 3.2\. Examples of everyday use
  prefs: []
  type: TYPE_NORMAL
- en: It is easy to think that ChatGPT is reserved for those who work in offices or
    technical positions, but this is different. This tool has endless applications
    in everyday life, from time management and personal organization to educational
    assistance and activity planning. ChatGPT can help you organize shopping lists,
    create exercise routines, or plan trips. It's here to make everyday tasks more
    accessible and more efficient. Here are a few examples, but remember that the
    possibilities are as broad as your imagination and daily needs.
  prefs: []
  type: TYPE_NORMAL
- en: 3.2.1.     Recipes with available ingredients
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Imagine you open the fridge and find some loose ingredients: a couple of carrots,
    some chicken, and maybe some pasta. You only have a little time or desire to think,
    but you want to make something delicious and quick with what you have. That''s
    where ChatGPT comes in to save you. With the help of a reasonably simple prompt,
    you can get a creative and quick recipe; no need to search for a cookbook or browse
    through hundreds of pages on the internet. ChatGPT will offer ideas, alternatives,
    and possible substitutions for those ingredients you might not have.'
  prefs: []
  type: TYPE_NORMAL
- en: Prompt - I have carrots, chicken and pasta in the fridge. I want to prepare
    a recipe that is quick, easy, and delicious. Could you suggest some main dish
    ideas and give me the recipe step by step? If possible, include variations or
    suggestions of ingredients that I could add or substitute to improve the dish.
  prefs: []
  type: TYPE_NORMAL
- en: 'Why this prompt works:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Specificity: You tell ChatGPT exactly what ingredients you have, which narrows
    the range of options and focuses it.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Flexibility: By asking for variants or substitution suggestions, ChatGPT can
    offer more ideas and help you adapt to your available resources.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Clear focus: You mention that you want a quick and easy recipe, so ChatGPT
    understands that you don''t need advanced techniques but something practical and
    straightforward.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 3.2.2.     Shopping lists
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Imagine you're thinking about everything you need to buy this week, from breakfast
    to dinner to a treat. Instead of writing it down on paper or trying to remember
    everything as you walk through the supermarket, you can use ChatGPT to make your
    life easier. You dictate what you need directly from the ChatGPT application,
    mentioning each product as it comes to mind. Then, you ask it to organize the
    list in an orderly fashion. Once it's ready, please copy and paste it into your
    cell phone's note editor, and that's it! You now have a list that you can cross
    off on the fly as you shop, adapting to modern times and doing everything more
    efficiently and quickly.
  prefs: []
  type: TYPE_NORMAL
- en: Prompt example (mobile app, voice mode) -
  prefs: []
  type: TYPE_NORMAL
- en: 'Next, I am going to dictate my grocery list to you: [list the products]. Please
    group the products into fresh, canned, and dairy categories. Please do this in
    list format so I can copy and paste it into my notes app.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Why this prompt works:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Clear structure: By asking you to organize products into categories, your list
    will be visually more straightforward to follow and will save you time in the
    supermarket.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Optimization for use: Requesting the list format ready to copy and paste ensures
    that ChatGPT gives you a helpful result.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Convenience: This prompt also facilitates dictation, allowing you to use your
    voice to capture your ideas quickly. This keeps you organized without the effort
    of typing or remembering everything.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 3.2.3.     Exercise routines
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Sometimes, knowing where to start or how to structure a gym routine that suits
    your specific needs can take time and effort. While it may not seem like an AI
    would be the ideal source for something so personalized, ChatGPT is trained with
    an extensive database encompassing training, physiology, and exercise routines.
    This allows it to provide you with a plan that can help you reach your goals as
    long as you provide it with the correct information. You will get a more accurate
    routine by giving valuable and detailed context about your goals, experience level,
    and equipment availability. In addition, specifying the amount of time you can
    devote will help make it more effective.
  prefs: []
  type: TYPE_NORMAL
- en: 'Essential data you should provide to get the best possible routine:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Main objective: Indicate whether you want to gain muscle mass, lose fat, improve
    your endurance, or do some of everything.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Experience level: Mention if you are a beginner, intermediate, or advanced
    so that the training is based on your ability.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Training frequency: Specify how many days a week you can dedicate to the gym
    and how many minutes per session.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Equipment availability: Describe the type of equipment you have, whether you
    go to a fully equipped gym or train at home with weights and elastic bands.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Preferences or restrictions: If you have any preferences for certain types
    of exercises (such as free weight exercises vs. machines) or physical limitations
    that ChatGPT should be aware of.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'With this data, ChatGPT can create a personalized routine tailored to you,
    giving you the structure and exercises you need to achieve your goals. Here is
    an example of a prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt example - I want a personalized gym routine. My main goal is [e.g.,
    to increase muscle mass], I am a [beginner/intermediate/advanced] level, and I
    can train [X days a week for X minutes]. I have [indicate available equipment:
    weights, bands, machines, etc.], and I prefer [specify your preferences or mention
    restrictions]. Could you create a routine that fits this data and includes exercises
    for each day with the number of sets and reps?'
  prefs: []
  type: TYPE_NORMAL
- en: 'Why this prompt works:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Clear and specific context: By including your objective, level, and available
    equipment, ChatGPT can adjust the routine according to your situation.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Personalization: Your preferences and restrictions help ChatGPT avoid exercises
    you don''t like or can''t perform, making the plan more suitable for you.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Practical details: Including session length and weekly frequency allows ChatGPT
    to design a plan that fits your availability and maximizes results.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 3.2.4.     Travel planning
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: When planning a trip, the options can be endless, and the information overwhelming.
    Planning can become long and tedious, from choosing the ideal destination to finding
    the best activities and restaurants. That's where ChatGPT comes in. Using this
    template's vast data, you can get a complete itinerary tailored to your preferences
    and budget without spending hours searching different websites. You need to provide
    a few key details, and ChatGPT will return a tailor-made plan for you to enjoy
    a perfect trip.
  prefs: []
  type: TYPE_NORMAL
- en: 'Important data that you should provide to obtain the best planning:'
  prefs: []
  type: TYPE_NORMAL
- en: '1. Desired destination or general ideas: Specify if you already have a place
    in mind or describe what type of trip you are looking for (adventure, beach, culture,
    etc.).'
  prefs: []
  type: TYPE_NORMAL
- en: '2. Duration of the trip: To better organize the time, mention how many days
    you will travel.'
  prefs: []
  type: TYPE_NORMAL
- en: '3. Approximate budget: Indicate a range of expenses for ChatGPT to suggest
    appropriate options.'
  prefs: []
  type: TYPE_NORMAL
- en: '4. Interests and activities: Comment if you prefer outdoor activities, cultural
    visits, local cuisine, or nightlife.'
  prefs: []
  type: TYPE_NORMAL
- en: '5. Restrictions or preferences: If you travel with children, want to avoid
    crowds, or need accessibility, include this for more accurate planning.'
  prefs: []
  type: TYPE_NORMAL
- en: Prompt example - I am planning a trip to [destination or type of destination,
    if you are not already clear] and will be there for [number of days]. My approximate
    budget is [budget range], and I would like to focus on activities such as [e.g.
    culture, nature, gastronomy]. Also, I have some preferences/restrictions such
    as [specify additional details]. Could you help me put together a daily itinerary
    that includes activities, restaurant suggestions, and recommended places to visit?
  prefs: []
  type: TYPE_NORMAL
- en: 'Why this prompt works:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Personalized approach: ChatGPT can use your preferences and restrictions to
    create a plan that fits your needs.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Clear organization: Details on duration and budget allow suggestions to be
    realistic and practical, maximizing time and resources during the trip.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: This prompt allows ChatGPT to design a complete trip tailored to your wishes
    without you having to worry about the details.
  prefs: []
  type: TYPE_NORMAL
- en: 3.2.5.     Ideas for activities with children
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Keeping children entertained and stimulated can be challenging when you have
    them in your care, whether as a parent, family member, or caregiver. Instead of
    always resorting to the same activities, you can use ChatGPT to find fresh ideas
    tailored to children's ages and preferences. By providing just a few details,
    you'll get creative and varied suggestions, from at-home activities to outdoor
    options. ChatGPT is a handy tool for keeping kids active and happy, helping you
    explore new possibilities you might not have considered.
  prefs: []
  type: TYPE_NORMAL
- en: 'Essential data you should provide to get the best suggestions for activities:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Age of children: Specify ages to ensure that activities are appropriate and
    safe.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Interests and preferences: Comment whether they like nature, art, board games,
    sports, etc.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Available space: Mention if you have a garden, if it will be at home, or if
    you are looking for outdoor activities.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Duration of the activity: Indicate your available time for ChatGPT to suggest
    activities accordingly.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Resources or materials: If you have specific materials (such as paint, musical
    instruments, games, etc.), include them for more practical options.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Here is an example:'
  prefs: []
  type: TYPE_NORMAL
- en: Prompt example - I am looking for ideas for activities to do with children of
    [age or age range] that are [interests, such as creative, sports, educational,
    etc.]. The activities can last about [indicates available time], and I can do
    them in [available space, such as at home, in the park, or in a garden]. I have
    materials such as [mentions materials available], could you suggest some fun and
    suitable activities for them?
  prefs: []
  type: TYPE_NORMAL
- en: 'Why this prompt works:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Context-specific: By detailing ages and preferences, ChatGPT can offer activities
    that are safe and of genuine interest to children.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Adaptability: Information on space and materials allows ChatGPT to suggest
    practical and easy-to-implement options for your situation.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 3.2.6.     Book, movie or series recommendations
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Whether it's for a movie night at home, a new series to follow or a good book
    to dive into reading, finding suitable recommendations can take time. ChatGPT
    makes this process quick and easy, offering personalized options based on your
    tastes and preferences. Thanks to the amount of information it has, ChatGPT can
    suggest titles that fit what you're looking for, even in genres or styles you
    hadn't considered. All you need to do is provide a little context, and you'll
    have a list of tailored recommendations ready to explore and enjoy.
  prefs: []
  type: TYPE_NORMAL
- en: 'Essential data you should provide to get the best recommendations:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Genre preferences: Mention your preferred genre, such as drama, comedy, science
    fiction, mystery, or fantasy.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Desired style or tone: If you want something light, deep, funny, or reflective,
    indicate what kind of experience you want.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Length or format: Specify whether you prefer something short, like a movie,
    something longer, like a series, or a reading that you can enjoy in several sessions.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Examples of titles you have enjoyed: If you have references to books, movies,
    or series you have enjoyed, share them for recommendations that are more aligned
    with your tastes.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Availability or platform: If you prefer options on platforms such as Netflix,
    Amazon, etc., include this so ChatGPT can suggest accessible possibilities.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Use a prompt that specifies your preferences and favorite platforms to get
    a selection tailored to your interests. Here is an example:'
  prefs: []
  type: TYPE_NORMAL
- en: Prompt example - I am looking for recommendations of [books, movies, or series]
    that are genre [desired genre, such as thriller, comedy, fantasy, etc.], with
    style [light, deep, entertaining, etc.]. I have enjoyed titles such as [mention
    previous books, movies, or series you have liked]. I prefer them to be available
    on [desired platform or format, such as Netflix, Amazon, audiobook, etc.]. Can
    you suggest some similar options?
  prefs: []
  type: TYPE_NORMAL
- en: With this prompt, you will receive a list of suggestions perfectly matched to
    your style, making sure to find your next favorite effortlessly.
  prefs: []
  type: TYPE_NORMAL
- en: 3.2.7.     Budgets and savings
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Planning a monthly or annual budget may seem overwhelming, but with ChatGPT,
    this task becomes much more manageable. With this tool, you can create a financial
    plan tailored to your income and savings goals. Whether you want to save for a
    vacation, reduce expenses, or better understand where your money is going, ChatGPT
    can provide a clear and practical structure. All you need to do is give a little
    context about your financial situation and goals, and it will return a realistic
    and manageable budget plan, ideal for you to start taking control of your finances.
  prefs: []
  type: TYPE_NORMAL
- en: 'Important Note: While ChatGPT helps structure budgets and suggest savings ideas,
    it does not constitute professional financial advice. Before making decisions,
    you must review and fully understand any suggestions and consider consulting a
    qualified financial advisor for essential issues. ChatGPT can provide you with
    an initial basis to explore, but ultimately, it is up to you to analyze and evaluate
    your financial decisions.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Essential data you should provide to get the best budget and savings plan:'
  prefs: []
  type: TYPE_NORMAL
- en: '1. Genre preferences: Mention your preferred genre, such as drama, comedy,
    science fiction, mystery, or fantasy.'
  prefs: []
  type: TYPE_NORMAL
- en: '2. Desired style or tone: If you want something light, deep, funny, or reflective,
    indicate what kind of experience you want.'
  prefs: []
  type: TYPE_NORMAL
- en: '3. Length or format: Specify whether you prefer something short, like a movie,
    something longer, like a series, or a reading that you can enjoy in several sessions.'
  prefs: []
  type: TYPE_NORMAL
- en: '4. Examples of titles you have enjoyed: If you have references to books, movies,
    or series you have enjoyed, share them for recommendations that are more aligned
    with your tastes.'
  prefs: []
  type: TYPE_NORMAL
- en: '5. Availability or platform: If you prefer options on platforms such as Netflix,
    Amazon, etc., include this so ChatGPT can suggest accessible possibilities.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt example - I want help creating a monthly budget. My monthly income is
    [amount], and I have fixed expenses such as [mention fixed expenses: rent, utilities,
    etc.], and variable expenses such as [meals out, entertainment, etc.]. I would
    like to save for [goal, such as a vacation or emergency fund] within [available
    time]. I also want to prioritize [areas where you prefer not to cut back]. Can
    you help me structure a budget with categories and recommendations to maximize
    my savings?'
  prefs: []
  type: TYPE_NORMAL
- en: 'Why this prompt works:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Detailed financial context: ChatGPT can understand your income, expenses, and
    goals to generate a budget that fits your situation.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Clear objectives: Including a savings goal allows ChatGPT to give you focused
    recommendations on what you want to achieve, with specific timelines.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: This approach provides a practical and manageable plan, helping you save effectively
    and organize your finances to achieve your short—or long-term goals.
  prefs: []
  type: TYPE_NORMAL
- en: 3.2.8.     Learning new topics
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Learning something new can be incredibly motivating and valuable, especially
    when information is just a click away. Whether diving into complex topics like
    quantum physics or economics or picking up practical skills like photography or
    programming, ChatGPT is available to assist you in exploring and understanding
    nearly any subject. However, it''s important to remember that although these tools
    are based on extensive databases, they can also make mistakes or present inaccurate
    information. Therefore, it''s wise to use them as an initial guide or supplement
    and always cross-check information with other sources, particularly for important
    topics. Data you should provide to learn effectively:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Specific topic and level of depth: Define what topic you want to learn and
    whether you are looking for a general introduction, an intermediate level, or
    an advanced explanation.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Preferred learning style: Comment whether you prefer short and direct explanations,
    practical examples, visual summaries, or detailed readings.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Learning objective: Explain why you want to learn this topic (for an exam,
    personal interest, or to apply it in a project), as this helps to adjust the focus.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Time available: Indicate how much time you can dedicate to learning so that
    you can receive suggestions appropriate to your pace.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Accuracy warnings: Recommend additional sources or ask ChatGPT to warn about
    possible limitations or errors, especially on complex topics.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Use a prompt with these details for a tailored, cautionary learning experience.
    Here is an example:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt example - I want to learn about [specific topic, such as artificial
    intelligence, philosophy, etc.] at a [basic / intermediate / advanced] level.
    My goal is [explain why you want to learn the subject: for personal interest,
    for a project, etc.], and I prefer a learning style that is [short and to the
    point, with examples, detailed, etc.]. I have approximately [indicate time available,
    such as 1 hour per day]. Also, could you point out possible limitations of the
    information or suggest additional reliable sources to supplement learning?'
  prefs: []
  type: TYPE_NORMAL
- en: 'Why this prompt works:'
  prefs: []
  type: TYPE_NORMAL
- en: '1. Focus on the objective and level: ChatGPT adapts the explanation according
    to your level of knowledge and the purpose of your learning, providing an adequate
    introduction.'
  prefs: []
  type: TYPE_NORMAL
- en: '2. Cautions: Asking for caveats and additional sources is essential to ensure
    that the information is accurate and that you can reliably dig deeper.'
  prefs: []
  type: TYPE_NORMAL
- en: 3.2.9.     Gift ideas
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: We often run out of ideas when giving a gift. Finding the right gift can be
    challenging, whether it's for a birthday, anniversary, or special occasion. With
    ChatGPT, you can get personalized ideas quickly, tailored to the interests and
    tastes of the person you want to surprise. By providing a few basic details, you
    will receive a list of creative and appropriate suggestions for the occasion.
  prefs: []
  type: TYPE_NORMAL
- en: 'Important data you should provide:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Person''s interests and hobbies: Mention hobbies or likes, such as reading,
    sports, technology, etc.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Approximate budget: Indicate how much you plan to spend to receive appropriate
    ideas.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Occasion or relationship: Explain whether the gift is for a birthday, anniversary,
    or specific celebration and your relationship to the person (friend, partner,
    family member).'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'To get quick and accurate ideas, you can use a simple prompt like this one:'
  prefs: []
  type: TYPE_NORMAL
- en: Prompt example - I need gift ideas for [mention relationship, such as friend,
    partner, etc.] who likes [describe interests, such as music, sports, technology].
    My budget is [indicates budget] and the occasion is [anniversary, birthday, etc.]
    Could you suggest some options?
  prefs: []
  type: TYPE_NORMAL
- en: 'Why this prompt works:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Simplicity: This prompt is straightforward and provides the essential information
    ChatGPT needs to suggest relevant ideas.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Quick customization: By including interests, budget, and occasion, you will
    receive practical and situation-aligned options.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: With this simple prompt, you will receive a gift list to help you make the right
    choice and reduce your search time.
  prefs: []
  type: TYPE_NORMAL
- en: 3.3\. Fundamentals of Prompts Engineering
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt engineering involves developing and refining how we formulate our questions
    or commands to an LLM. This process helps ensure the model understands what is
    being asked and responds most effectively. It is a mix of art and science, as
    it requires a good understanding of human language and how AI models process that
    language. The idea is simple: the more accurate and precise the prompts we input,
    the more effective and valuable the responses we get.'
  prefs: []
  type: TYPE_NORMAL
- en: Prompt engineering is not just about designing and developing prompts. It encompasses
    many skills and techniques helpful in interacting with LLMs, and understanding
    LLM capabilities is an important skill.
  prefs: []
  type: TYPE_NORMAL
- en: In this chapter, several examples show how specificity, simplicity, and conciseness
    can improve results.
  prefs: []
  type: TYPE_NORMAL
- en: 3.3.1.     The instruction
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: You can design effective prompts for a variety of simple tasks using specific
    commands such as "Write", "Sort", "Summarize", "Translate", "Sort", among others.
    Experimenting with different instructions, keywords, contexts, and data types
    is crucial to discovering what best suits your needs.
  prefs: []
  type: TYPE_NORMAL
- en: 'The context you provide must be relevant and specific to the task you wish
    to perform; the tighter it is, the better the results will be. In addition, placing
    the instructions at the beginning of the prompt and using a clear separator such
    as " " to differentiate between the instruction and the context is advisable.
    Here is an example:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt - Translate the text below into English:Text: "Hello!"'
  prefs: []
  type: TYPE_NORMAL
- en: ChatGPT - Hello!
  prefs: []
  type: TYPE_NORMAL
- en: 3.3.2.  Specificity
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The prompt must be specific and descriptive for the model to perform the task
    accurately. The more detailed and clear the prompt, the better the result. This
    is crucial when looking for a specific result or generation style. There are no
    magic words to ensure better results; the clarity and detail of the prompt are
    essential. Including examples within the prompt can effectively get answers in
    the desired formats.
  prefs: []
  type: TYPE_NORMAL
- en: 'When designing prompts, you should also keep in mind the length allowed. Being
    specific and detailed is key, but it is important to avoid including unnecessary
    details that do not directly contribute to the task. This balance requires experimentation
    and continual tweaking. Experiment with different approaches to optimize prompts
    for your needs. Let''s look at an example of how to formulate a simple prompt
    to extract specific information from a text:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt - Identify the names of cities in the text provided. Desired format:
    <comma separated list of city names>. "During her European tour, sustainability
    expert Clara Rodriguez visited several prominent cities. She presented shocking
    data on climate change in Madrid, then in Paris and finally in Berlin at the Humboldt
    University."'
  prefs: []
  type: TYPE_NORMAL
- en: 'ChatGPT - City: Madrid, Paris, Berlin'
  prefs: []
  type: TYPE_NORMAL
- en: 3.3.3.     Avoid inaccuracy
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Avoiding vagueness is critical when seeking effectiveness in prompts. By trying
    to be overly creative or clever, it is easy to get sidetracked and create descriptions
    that are not clear or accurate. The analogy here is very similar to effective
    communication: the more direct you are, the more influential the message will
    be. For example, you might be interested in learning the concept of prompts engineering.
    You could try something like:'
  prefs: []
  type: TYPE_NORMAL
- en: Prompt - Explain the concept of promotion engineering. Keep the explanation
    short, just a few sentences
  prefs: []
  type: TYPE_NORMAL
- en: 'The above instruction makes it unclear how many sentences to use and what style to
    use. You may be able to get acceptable answers with the above prompt, but a specific,
    concise, and direct prompt would be better. Something like:'
  prefs: []
  type: TYPE_NORMAL
- en: Prompt - Use 2-3 sentences to explain the concept of prompt engineering to a
    high school student.
  prefs: []
  type: TYPE_NORMAL
- en: 3.3.4.     Language and vocabulary
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: It is crucial to understand the language style to employ when interacting effectively
    with an LLM such as ChatGPT. Below, we will break down some basic principles for
    maintaining appropriate language and vocabulary.
  prefs: []
  type: TYPE_NORMAL
- en: 'Use specific phrases: Incorporating phrases in your prompts can guide the model
    more effectively. Phrases such as "Your task is" and "You must" clarify expectations
    and ensure that the model understands the importance of the instructions. Similarly,
    phrases such as "You will be penalized" or "You are prohibited" are more helpful
    than negative formulations such as "Do not do such a thing." This affirmative
    approach helps establish clear boundaries and precise guidelines that the model
    can more easily follow, ensuring that responses align more closely with expectations.
    For example, instead of saying, "Don''t use informal language," it is more constructive
    and precise to state, "You must use formal language." This methodology ensures
    that instructions are interpreted unambiguously.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Be direct: When interacting with an LLM, there is no need to use polite language
    such as "please" or "thank you." These models are designed to respond efficiently
    without formalities, so getting straight to the point is best. This helps keep
    the prompt unambiguous.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Word or phrase repetition: Repeating a specific word or phrase within a prompt
    can help emphasize a particular concept or instruction. This ensures that the
    model does not overlook crucial aspects of the task it needs to execute.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Include monetary incentives in prompts: Although it may seem unusual, mentioning
    incentives such as "I''ll give you a tip of xx€ for a better solution" in your
    prompts can be a strategy to motivate the generation of more elaborate responses.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: By following these principles, you can improve the quality and accuracy of interactions
    with ChatGPT or any other LLM, facilitating more effective communication and reliable
    results.
  prefs: []
  type: TYPE_NORMAL
- en: 3.4\. Six strategies for better results
  prefs: []
  type: TYPE_NORMAL
- en: Now that we have a basic understanding of prompt engineering, it's time to take
    our skills to the next level. Let's explore six effective strategies to achieve
    better results when interacting with ChatGPT. These techniques will allow us to
    fine-tune our questions to maximize the relevance of the responses obtained. By
    applying these strategies, we can take full advantage of the capabilities of any
    LLM, ensuring more efficient interactions and more valuable results in our daily
    projects or queries.
  prefs: []
  type: TYPE_NORMAL
- en: '3.4.1.     Strategy 1: Write clear instructions'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Tactic 1: Include details in your query to get more relevant responses.'
  prefs: []
  type: TYPE_NORMAL
- en: Ensure the requests provide important details or context to get a relevant response.
    Otherwise, you are leaving the model guessing what you want to say.
  prefs: []
  type: TYPE_NORMAL
- en: '| Worst | Best |'
  prefs: []
  type: TYPE_TB
- en: '| How do I add numbers in Excel? | How do I add up a row of dollar amounts
    in Excel? I want to do this automatically for an entire sheet of rows with all
    totals appearing at the end in a column called "Total". |'
  prefs: []
  type: TYPE_TB
- en: '| Who is the president? | Who was the president of Mexico in 2021, and how
    often are elections held? |'
  prefs: []
  type: TYPE_TB
- en: 'Tactic 2: Use delimiters to indicate different parts of the prompt.'
  prefs: []
  type: TYPE_NORMAL
- en: Prompt - Summarizes the text delimited by triple quotation marks.
  prefs: []
  type: TYPE_NORMAL
- en: '"""insert text here""""'
  prefs: []
  type: TYPE_NORMAL
- en: Prompt - You will be provided with a couple of articles (delimited with XML
    tags) on the same topic. First summarize the arguments in each article. Then indicate
    which one makes a better argument and explain why.
  prefs: []
  type: TYPE_NORMAL
- en: <article> insert first article here </article>.
  prefs: []
  type: TYPE_NORMAL
- en: <article> insert second article here </article>.
  prefs: []
  type: TYPE_NORMAL
- en: Delimiters such as triple quotation marks, XML tags, section headings, etc.,
    can help restrict sections of text to be treated differently.
  prefs: []
  type: TYPE_NORMAL
- en: Delimiters may not affect the output quality for simple tasks such as these.
    However, the more complex a task is, the more critical it is to delimit its different
    sections or parts.
  prefs: []
  type: TYPE_NORMAL
- en: 'Tactic 3: Specify the steps required to complete a task.'
  prefs: []
  type: TYPE_NORMAL
- en: When faced with large tasks, these are best managed as a sequence of steps.
    Writing the steps explicitly can make it easier for the model to follow them.
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt - Step 1: The user will provide you with text enclosed in triple quotes.
    Summarize this text in a sentence with a prefix that reads "Summary: ".'
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 2 - Translate the summary from Step 1 into Spanish, with a prefix that
    says "Traducción: ".'
  prefs: []
  type: TYPE_NORMAL
- en: 'Tactic 4: Provide examples.'
  prefs: []
  type: TYPE_NORMAL
- en: 'This tactic of providing examples, also called "few-shot  Prompting," involves
    training or adjusting language models using only a few input examples at our prompt
    to teach a specific task. This is similar to how humans learn most effectively:
    We can understand concepts with explanations alone, but concrete examples often
    improve our understanding. By providing specific examples, the model learns to
    perform similar tasks more effectively, mimicking the human learning process that
    benefits significantly from practical examples and confirmed applications.'
  prefs: []
  type: TYPE_NORMAL
- en: Prompt -
  prefs: []
  type: TYPE_NORMAL
- en: 'Great product, 10/10: positive'
  prefs: []
  type: TYPE_NORMAL
- en: 'Did not work very well: negative'
  prefs: []
  type: TYPE_NORMAL
- en: 'Super useful, worthwhile: positive'
  prefs: []
  type: TYPE_NORMAL
- en: 'It does not work:'
  prefs: []
  type: TYPE_NORMAL
- en: ChatGPT - Negative
  prefs: []
  type: TYPE_NORMAL
- en: 'The way we structure the examples is fundamental. Since we have organized these
    three instances in an |input: rating| format, the model generates a single word
    following the final line rather than outputting a complete sentence such as "this
    review is negative".'
  prefs: []
  type: TYPE_NORMAL
- en: '3.4.2.     Strategy 2: Provide a reference text'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Tactic 1: Instruct the model to respond using a reference text.'
  prefs: []
  type: TYPE_NORMAL
- en: If we can provide the model with trusted information relevant to the current
    query, we can ask the model to use the information provided to compose its response.
  prefs: []
  type: TYPE_NORMAL
- en: Prompt - Use the provided articles delimited by triple quotation marks to answer
    the questions. If the answer is not found in the articles, write "I could not
    find an answer".
  prefs: []
  type: TYPE_NORMAL
- en: <insert articles, each delimited by triple quotation marks>.
  prefs: []
  type: TYPE_NORMAL
- en: Since all models have limited context windows, we must be cautious with the
    length of the texts provided.
  prefs: []
  type: TYPE_NORMAL
- en: 'Tactic 2: Ask the model to respond with quotes from a reference text.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt - You will be provided with a document delimited by triple quotation
    marks and a question. Your task is to answer the question using only the document
    provided and cite the passage(s) from the document used to answer the question.
    If the document does not contain the information needed to answer the question,
    simply write: "Insufficient information". If an answer to the question is provided,
    it should be noted with a citation. Use the following format to cite the relevant
    passages ({"citation": ...}).'
  prefs: []
  type: TYPE_NORMAL
- en: '3.4.3.     Strategy 3: Assign roles'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: When we assign a specific role to an LLM, the model can adapt its approach and
    language to the user's needs, significantly improving the experience.
  prefs: []
  type: TYPE_NORMAL
- en: '1\. Role definition: When mathematicians, engineers, and physicists approach
    a problem from different perspectives, assigning ChatGPT a defined role allows
    it to adapt its answers more appropriately. This makes the answers obtained more
    relevant, as the model has a greater conversation context.'
  prefs: []
  type: TYPE_NORMAL
- en: '2\. Specialization: Role assignment allows ChatGPT to use its "sub-models"
    or "experts", each tuned for specific tasks or queries. GPT models are speculated
    to be what we know as Mixture of Experts (MoE), meaning that GPT is not a single
    model but several smaller sub-models that work in a coordinated fashion. By establishing
    a role, we help to ensure that only the necessary experts are activated for a
    given query, optimizing the computational resources required for these models''
    operation.'
  prefs: []
  type: TYPE_NORMAL
- en: '3\. Efficiency in responses: With clear roles, ChatGPT can provide more specialized
    advice and responses. For example, if assigned the role of a physics educator,
    the model will adjust its language and method of explanation to suit that specific
    field better, resulting in a better response for the user.'
  prefs: []
  type: TYPE_NORMAL
- en: The effective way to assign a role to ChatGPT is to include the desired role
    in our instructions at the beginning of the conversation. This can be done using
    phrases such as "act as" or "take on the role of." For example, if you want ChatGPT
    to assume the role of a sports coach, you could start your query with "Act like
    a sports coach and explain to me how to improve my running endurance."
  prefs: []
  type: TYPE_NORMAL
- en: '3.4.4.     Strategy 4: Tree of thought'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The Thinking Tree is a technique for organizing and simplifying complex decisions
    by breaking them into more manageable options. This strategy, visualized as a
    tree branching in different directions, helps to consider all possible alternatives
    and choose the most appropriate one at each process step.
  prefs: []
  type: TYPE_NORMAL
- en: 'Let''s say you want to eat something but are unsure what. First, you think
    about the types of food you like: Italian, Chinese, Indian? If you wish to eat
    Italian, this is your first path on your map. Then, you have several options for
    Italian food: pizzas, pasta, and ice cream. If you feel like pizza, you follow
    the road to the pizzerias. Finally, at the pizzeria, you decide between different
    types of pizza: Margherita, Neapolitan, or with tuna. In the end, you choose a
    pizza with tuna. This process shows how, step by step, you narrow down your choices
    until you make a particular final decision. You started with a very general idea
    ("I want to eat out") and chose a certain dish in a specific type of restaurant.'
  prefs: []
  type: TYPE_NORMAL
- en: In artificial intelligence, LLMs are designed to assist in these creative processes.
    Although we sometimes ask them to "decide" the best solution or to make decisions
    for us, they are not designed for this. Their strength lies in their ability to
    generate creative and varied content, offering multiple options for us, with our
    human judgment, to make the final decision. This makes them ideal tools for exploring
    possibilities and enriching our decision-making process.
  prefs: []
  type: TYPE_NORMAL
- en: '3.4.5.     Strategy 5: Divide complex tasks into subtasks'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Tactic 1: Summarize or filter previous dialogues.'
  prefs: []
  type: TYPE_NORMAL
- en: To handle long conversations, it is crucial to understand the limited ability
    of language models to process text. This refers to the context window. Eventually,
    a limit will be reached to prevent adding more text without losing the previous
    text.
  prefs: []
  type: TYPE_NORMAL
- en: An effective strategy for handling this problem is to summarize or filter previous
    dialogues. As the conversation nears the edge, information from earlier dialogues
    can be condensed into a shorter summary. This summary retains the key points of
    the conversation and allows the dialogue to continue without losing the relevant
    context. This technique enables long conversations to continue smoothly without
    compromising the model's understanding of the context.
  prefs: []
  type: TYPE_NORMAL
- en: 'Tactic 2: Summarize long documents in parts and build a complete summary recursively.'
  prefs: []
  type: TYPE_NORMAL
- en: Since the models have a fixed context length, they cannot be used to summarize
    text longer than the context length minus the summary size generated in a single
    query. To summarize a very long document, such as a book, we can use a sequence
    of queries to summarize each section. The section summaries can be concatenated
    to form a single summary. This process can proceed recursively until an entire
    document is summarized.
  prefs: []
  type: TYPE_NORMAL
- en: If it is necessary to use information from earlier sections to understand later
    sections, an additional trick is to include a summary of the text preceding any
    given point in the book.
  prefs: []
  type: TYPE_NORMAL
- en: '3.4.6.     Strategy 6: Give models time to "think".'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Tactic 1: Instruct the model to find its solution before concluding.'
  prefs: []
  type: TYPE_NORMAL
- en: A practical method we used to apply with earlier models was to ask them to reason
    step by step, developing their solution logically before arriving at a final answer.
    This approach is handy in tasks that require mathematical or scientific reasoning.
    Rather than simply answering immediately, the model should check each step before
    concluding. This type of Prompting  has been vital to improving the accuracy of
    answers, especially in complex problems.
  prefs: []
  type: TYPE_NORMAL
- en: With the introduction of the OpenAI o1 model, this process has been incorporated
    directly into the model design. OpenAI o1 is trained to think in a structured
    way, checking its steps and evaluating the validity of its reasoning before providing
    an answer. This makes it an outstanding tool in math and science, where logical
    thinking and accuracy are essential. Whereas previously, we could guide ChatGPT
    to follow this process, OpenA o1 does it naturally, ushering in a new era where
    AI models respond and "think" in a much more advanced and controlled way.
  prefs: []
  type: TYPE_NORMAL
- en: This breakthrough reminds us of the importance of optimizing our Prompting  strategies.
    Although OpenAI o1 does it more efficiently, it is only the first step towards
    even more sophisticated models in the future. The continued evolution of this
    capability will ultimately allow us to work with AI increasingly accurately and
    reliably.
  prefs: []
  type: TYPE_NORMAL
- en: Let's look at an example of this tactic. In this case, we intend to evaluate
    the solution to a mathematical problem. Instead of directly asking if the solution
    is correct, it would be more useful to ask the model to explain step-by-step why
    it considers the answer correct or not. This approach encourages a more detailed
    analysis and can lead to more accurate and substantiated answers.
  prefs: []
  type: TYPE_NORMAL
- en: Prompt - How much is 923 * 99?
  prefs: []
  type: TYPE_NORMAL
- en: ChatGPT - 923 * 99 equals 91,677
  prefs: []
  type: TYPE_NORMAL
- en: Wrong answer (the correct answer is 91,377). We can modify our message and tell
    it to think step by step. It is shown that ChatGPT can solve the problem with
    additional instructions. This works because ChatGPT writes all its work, reducing
    the probability of failure.
  prefs: []
  type: TYPE_NORMAL
- en: Prompt - How much is 923 * 99? Let's go step by step. Always write the full
    number of 0s for each term.
  prefs: []
  type: TYPE_NORMAL
- en: 'ChatGPT - To multiply 923 by 99, we can break it down into smaller steps:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 1: Multiply the first term by 9:'
  prefs: []
  type: TYPE_NORMAL
- en: 923 * 9 = 8307
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 2: Multiply the first term by 90 (adding a 0):'
  prefs: []
  type: TYPE_NORMAL
- en: 923 * 90 = 83070
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 3: Add the results of step 1 and step 2:'
  prefs: []
  type: TYPE_NORMAL
- en: 8307 + 83070 = 91377
  prefs: []
  type: TYPE_NORMAL
- en: Therefore, 923 multiplied by 99 equals 91,377.
  prefs: []
  type: TYPE_NORMAL
- en: 'Tactic 2: Ask the model if anything has been missed in previous passes.'
  prefs: []
  type: TYPE_NORMAL
- en: A helpful tactic when using language models is to ask them if they have missed
    anything in previous answers. Imagine that you are using an LLM to elicit excerpts
    from a document in response to a specific question. After listing each excerpt,
    the model must decide if it should continue writing another one or stop. If the
    document is long, it is common for the model to stop prematurely without listing
    all relevant excerpts. In these cases, better performance can often be obtained
    by asking follow-up questions to discover any excerpts the model initially missed.
  prefs: []
  type: TYPE_NORMAL
- en: 'Suppose you have a paper on the history of science and want to know about critical
    discoveries in biology. After the first pass of the model, you might ask yourself:'
  prefs: []
  type: TYPE_NORMAL
- en: Prompt - Are there more relevant excerpts about important discoveries in biology
    that have not been mentioned? Make sure the excerpts contain all the relevant
    context necessary to interpret them.
  prefs: []
  type: TYPE_NORMAL
- en: '3.5\. Canvas: A New Collaborative Interface'
  prefs: []
  type: TYPE_NORMAL
- en: Canvas is an innovative interface that transcends traditional chat functionalities to
    enhance your writing and coding projects. Upon detecting potential improvements
    to your workflow or when prompted with "use Canvas" in your message, ChatGPT will
    automatically initiate a separate Canvas window. This feature creates an environment
    where you can collaborate with ChatGPT in real time, significantly enhancing how
    you brainstorm, draft, and refine ideas visually and interactively.
  prefs: []
  type: TYPE_NORMAL
- en: Currently, the beta version of Canvas operates on the powerful GPT-4-turbo model.
    Users can manually choose this model from the selection menu, although it is available
    exclusively to ChatGPT Plus and Team users globally. It’s worth noting that after
    the beta testing phase concludes, the intention is to roll out Canvas to all ChatGPT
    users, broadening its accessibility. Many users turn to ChatGPT daily for their
    writing and programming needs. While the traditional chat interface is user-friendly,
    it may lack the depth required for projects involving extensive edits and revisions.
    This is precisely where Canvas plays a pivotal role. It presents a unique experience
    that empowers you to visualize, modify, and manage your projects more precisely
    and efficiently.
  prefs: []
  type: TYPE_NORMAL
- en: '![A screenshot of a chat  Description automatically generated](image_rsrc3PN.jpg)'
  prefs: []
  type: TYPE_IMG
- en: ChatGPT gains an enhanced understanding of the context surrounding your project
    with Canvas. You can highlight particular sections of your work, directing ChatGPT’s
    focus like a text editor or code reviewer. This facilitates real-time feedback
    and suggestions tailored to your specific needs.
  prefs: []
  type: TYPE_NORMAL
- en: Canvas also places a premium on user control. You can edit text and code directly
    within the interface, ensuring changes are easily implemented. Additionally, a
    convenient shortcut menu—located as a drop-down option in the bottom right corner
    of the screen—allows you to swiftly adjust text length, debug your code, and execute
    other helpful commands with minimal effort. Furthermore, suppose you need to revert
    to an earlier project iteration. In that case, Canvas offers a back button feature
    that lets you seamlessly return to previous versions, ensuring you never lose
    your progress.
  prefs: []
  type: TYPE_NORMAL
- en: In summary, Canvas is designed to revolutionize users' interactions with ChatGPT
    by providing a more structured and collaborative approach to managing complex
    writing and coding tasks.
  prefs: []
  type: TYPE_NORMAL
- en: 3.5.1.     Shortcuts for writing in Canvas
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: These quick actions are prompts hidden under buttons, which makes the work incredibly
    easy and fast.
  prefs: []
  type: TYPE_NORMAL
- en: 'Suggest edits: ChatGPT provides online suggestions and detailed comments.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Adjust the length: Modify the size of your document, making it shorter or more
    detailed.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Change the reading level: Adapt the text from a basic level to an advanced
    academic level.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Add final polish: Improve your texts'' grammar, clarity, and consistency.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Add emojis: Integrate relevant emojis for color and emphasis.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 3.5.2.     Canvas for programming
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Programming requires a process of constant revisions, and Canvas makes it easy
    to keep track of these changes. Thanks to its tools, greater transparency and
    understanding are ensured with each update. Programming shortcuts:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Review code: Receive suggestions to optimize and improve your code.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Add records: Inserts print statements for debugging.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Add comments: Facilitates the code reading by adding clear explanations.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Error correction: Automatically identifies and fixes problems.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Convert to another language: Translate the code to JavaScript, TypeScript,
    Python, Java, C++ or PHP.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Chapter IV
  prefs: []
  type: TYPE_NORMAL
- en: Increase your productivity
  prefs: []
  type: TYPE_NORMAL
- en: Throughout this chapter, we will see several use case examples, where we will
    demonstrate how ChatGPT can improve the way we work and communicate. We will discover
    applications in the professional field, from preparing resumes and cover letters
    to simulating job interviews, thus facilitating job search processes. In addition,
    we will analyze its potential in programming to learn new languages, explain code,
    and even create web pages. We will address the impact of this technology in education
    and see suggestions on how to integrate these models into the teaching-learning
    process, facilitating tasks such as searching for and managing references. This
    is a truly revolutionary tool because of its ability to understand and generate
    human-like text. In the following pages, we will see examples demonstrating its
    potential to boost our productivity to new levels in various aspects of our lives.
  prefs: []
  type: TYPE_NORMAL
- en: 4.1.          Use of ChatGPT in Communication
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: ChatGPT has become an essential communication tool, assisting in creating and
    managing texts efficiently. Its ability to generate contextually appropriate responses
    allows users to optimize their time and improve the quality of their writing.
  prefs: []
  type: TYPE_NORMAL
- en: Despite its numerous advantages, handling ChatGPT responses with caution is
    essential. The tool may sometimes produce errors or 'hallucinations', presenting
    inaccurate data as if they were facts. Therefore, reviewing the generated content
    is always advisable to ensure accuracy and truthfulness.
  prefs: []
  type: TYPE_NORMAL
- en: Effective implementation of ChatGPT in communication simplifies the writing
    process and enhances the quality of the content. However, this is contingent on
    the user's informed and critical monitoring. It's crucial to remember that while
    ChatGPT can assist, it's the user's responsibility to ensure the accuracy and
    truthfulness of the content.
  prefs: []
  type: TYPE_NORMAL
- en: 4.1.1.     Writing e-mails
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Sometimes, writing an e-mail can be difficult, as we must find the right tone
    and use the correct expressions. It is crucial to convey the information efficiently
    so the recipient understands it. ChatGPT can help us write various email types,
    including business proposals, sales, surveys, etc. It can develop any email if
    we give it the proper instructions. Let''s take a look at an example:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt - You act as an experienced business communication assistant and draft
    a formal e-mail to a customer about a delay in the delivery of a project. The
    reasons for the delay have been: [State reasons]. You should explain these, offer
    a new delivery date, and reaffirm commitment to quality service. Include clear
    and concise details about the delay, preventive measures for future problems,
    and an apology.'
  prefs: []
  type: TYPE_NORMAL
- en: Using ChatGPT for email composing can increase productivity, allowing you to
    put effort and concentration into other more important tasks.
  prefs: []
  type: TYPE_NORMAL
- en: Prompt - Corrects grammatical errors in user-supplied messages. Read the message
    carefully, identify any grammatical problems and provide a corrected version.
    Maintain the original meaning and style of the message. Indicate whether the message
    is grammatically correct; if not, point out the modified parts. Responses should
    be direct, concise, and focused exclusively on grammatical correctness. Use a
    professional and helpful tone to ensure clarity of corrections.
  prefs: []
  type: TYPE_NORMAL
- en: 'Personally, I''m not particularly eager to give total control to any language
    model over the wording of my emails. I write a draft email and pass it through
    ChatGPT for review, improving the text quality quickly and easily. Here is the
    prompt I use:'
  prefs: []
  type: TYPE_NORMAL
- en: 4.1.2.     Publications in Social Networks
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Next, let's see how ChatGPT can be useful for generating ideas and creating
    social media posts. The answers provided by ChatGPT may vary depending on the
    context and situation. For example, it can adjust its content depending on the
    target audience or the social network we are addressing since Twitter is different
    from Facebook. For this reason, the more information and context we provide you
    with (in a balanced way), the better results we will get.
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt - Act as a communications expert with extensive technology experience.
    Write a concise post for LinkedIn about my participation in the Mobile World Congress
    (MWC) 2024 in Barcelona. Address the following topics or mention the most important
    learnings I gained from the event: [insert your learnings here]. Be sure to connect
    these points to the relevance of the event and its potential impact on the industry,
    ending with an invitation to my connections to explore these ideas.'
  prefs: []
  type: TYPE_NORMAL
- en: 4.1.3.     Writing Blog Articles
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Similar to what we have done before, let's see an example of formulating an
    excellent prompt to ask for title ideas for our blog. From the suggestions provided
    by ChatGPT, we will select the title we like the most and work on it in more detail.
  prefs: []
  type: TYPE_NORMAL
- en: Prompt - Act as an experienced travel blogger with over a decade exploring the
    world, specializing in uncovering hidden destinations and providing detailed travel
    guides. Your goal is to generate three captivating, SEO-optimized titles for your
    blog that will attract readers interested in unique and insightful travel experiences.
    Consider your audience of adventurous travelers, use action verbs and descriptive
    adjectives to make the titles dynamic, and include keywords to improve search
    engine visibility. Make sure titles accurately reflect the content of the posts.
  prefs: []
  type: TYPE_NORMAL
- en: Take a deep breath and work on this problem one step at a time.
  prefs: []
  type: TYPE_NORMAL
- en: 4.1.4.     Search Engine Optimization (SEO)
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Let's continue with the blog example shown in the previous section. Imagine
    that the draft is ready to be published on the blog. Let's see how ChatGPT can
    help us optimize the content we have just created to gain relevance in search
    engines using keyword optimization strategies and compelling meta descriptions.
  prefs: []
  type: TYPE_NORMAL
- en: Prompt - Act as an SEO expert with extensive experience in digital marketing.
    Based on the article we have written above, provide a list of key tags to improve
    the article's visibility in searches related to travel, exotic destinations and
    adventure tourism. In addition, write a concise and engaging meta description
    that summarizes the key points of the article and encourages readers to explore
    these lesser-known destinations. Make sure that both the meta description and
    tags accurately reflect the article's content and highlight its unique value to
    attract readers interested in unique travel.
  prefs: []
  type: TYPE_NORMAL
- en: 4.1.5.     Write titles or descriptions
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Now, once we have the article for our travel blog, detailed and with optimized
    content, we will ask ChatGPT to generate a title for us since, having the article,
    it has the proper context to create quality content. Below is an example of an
    instruction to develop an attractive title for our article:'
  prefs: []
  type: TYPE_NORMAL
- en: Prompt - Act as a marketing expert with an extensive background in digital content
    creation. Based on the content of the hidden destinations and travel guides blog
    post we have prepared, develop a title that is engaging, curious and thought-provoking.
    This title should grab the attention of potential readers, inviting them to discover
    lesser-known places through our detailed guides. Make sure the title is witty
    and reflects the unique approach of the article, enhancing the interest and curiosity
    of potential readers.
  prefs: []
  type: TYPE_NORMAL
- en: By using the words "attractive, curious, and provocative," we obtain a title
    that arouses the audience's curiosity, increasing the probability that they will
    notice and enter our post.
  prefs: []
  type: TYPE_NORMAL
- en: 4.2\. Career Advancement with ChatGPT
  prefs: []
  type: TYPE_NORMAL
- en: Virtually any company and worker can take advantage of this technology because
    of its great potential to increase productivity in various work environments.
    ChatGPT streamlines multiple tasks, from writing emails to creating advertising
    campaigns. This includes brainstorming content ideas, reviewing and writing documentation,
    verifying code, automating customer service, and analyzing job profiles. So, keeping
    up with these trends and taking advantage of such a powerful tool is essential.
  prefs: []
  type: TYPE_NORMAL
- en: In the following sections, we will see how ChatGPT can help you enhance your
    career by writing cover letters, job search emails, and improving your resume
    or LinkedIn profile. Applying this technology in your workplace will depend on
    your needs. Here, we will give you tips and ideas for use so that, based on them,
    you can apply them in the best possible way. Upon completion, you will have the
    knowledge and skills to use this AI to benefit your professional career.
  prefs: []
  type: TYPE_NORMAL
- en: 4.2.1.     Job search e-mails
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Writing a job search email can be challenging, as making a good and impactful
    impression on recruiters is critical. The email should be clear and concise and
    highlight your skills and enthusiasm for the position, demonstrating how you could
    benefit the company.
  prefs: []
  type: TYPE_NORMAL
- en: 'ChatGPT can be beneficial when composing e-mails related to job offers, as
    it facilitates the creation of customized drafts according to our needs. Throughout
    the book, we have highlighted the importance of providing detailed information
    in our requests to obtain more accurate results. For example, let''s compare two
    different requests:'
  prefs: []
  type: TYPE_NORMAL
- en: Prompt - Write an email to apply for a job position
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt - Write an email to apply for an embedded software engineer position
    in the region of Mittelland, Switzerland. Where the challenge will be to work
    in a young multidisciplinary team... In addition, the qualities and talents required
    for the position are: Degree in... experience in... knowledge of... etc. Finally,
    I leave you here my CV: [Paste CV]...'
  prefs: []
  type: TYPE_NORMAL
- en: The results obtained will differ in terms of the quality and detail of the draft
    generated. The second example will provide a more specific draft email tailored
    to the position we want to apply for. It will allow us to focus on reviewing and
    editing the text instead of writing it from scratch, saving us time and effort.
  prefs: []
  type: TYPE_NORMAL
- en: 4.2.2.     Writing Customized Cover Letters
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The cover letter is an essential document that accompanies your resume and introduces
    you to the employer. It highlights your skills, experience, and qualifications,
    explaining why you are the ideal candidate. Before you start writing it, it's
    essential to consider the job you're applying for, the company culture, and the
    skills they're looking for. Research the company culture by reviewing the company's
    website, social media, and any relevant articles, and identify the skills mentioned
    in the job description. This information will allow you to tailor your cover letter
    to your job and company.
  prefs: []
  type: TYPE_NORMAL
- en: Once you have gathered the necessary information, you can use ChatGPT to write
    a customized cover letter based on the job description. This way, you will have
    a well-structured document tailored to the company's needs, increasing your chances
    of success in the job search and getting an interview.
  prefs: []
  type: TYPE_NORMAL
- en: Let's assume we are applying for an Integrated Software Engineer position to
    demonstrate how this tool can help us generate a cover letter. Previously, we
    detailed to the model the responsibilities and qualities needed for the position
    and provided our CV. Now, we will ask ChatGPT to write a cover letter based on
    that description, highlighting our experience and skills relevant to the position
    in question.
  prefs: []
  type: TYPE_NORMAL
- en: Prompt - Acts as a software development expert with extensive embedded systems
    experience, specializing in programming for specific hardware devices and software
    platforms. Write a cover letter tailored to the description of the embedded software
    engineer opportunity above. Focus on highlighting your C/C++ programming skills,
    experience with microcontrollers, and ability to work in agile development environments.
    Be sure to mention relevant projects where you have applied these skills and how
    your experience will contribute to the team’s success in this new position. End
    with a cordial invitation to discuss how your skills can be an asset to the company.
  prefs: []
  type: TYPE_NORMAL
- en: Take a deep breath and work on this problem one step at a time.
  prefs: []
  type: TYPE_NORMAL
- en: Once the letter is drafted, it is essential to review it to ensure that it meets
    our criteria. Review and edit the content to ensure it is professional, concise,
    and appropriate. If necessary, ask ChatGPT to adjust the tone of the cover letter
    to be more straightforward, enthusiastic, or in line with your needs.
  prefs: []
  type: TYPE_NORMAL
- en: 'After writing the cover letter with ChatGPT, we can proceed to the next step:
    updating your LinkedIn profile with this data.'
  prefs: []
  type: TYPE_NORMAL
- en: 4.2.3.     Improve your LinkedIn Profile
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Today, a strong LinkedIn profile is critical to increasing your visibility,
    attracting recruiters, and connecting with professionals in your industry, thereby
    improving your credibility in the job market. This section will explore how to
    use ChatGPT to enhance our LinkedIn profile. The goal is to ensure your profile
    reflects your professional brand and the value you can bring to the organization.
  prefs: []
  type: TYPE_NORMAL
- en: 'We can use ChatGPT to generate a LinkedIn profile based on our resume, highlighting
    key elements such as achievements, specific skills, and relevant experience. It
    is important to note that, for optimal results, we must specify the elements we
    wish to include in the prompt. This detailed specification ensures that the model
    understands and executes our request effectively. To accomplish this task and
    optimize our LinkedIn profile based on our resume, we could use a prompt like
    the following:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt - He acts as an expert in writing and creating professional profiles
    for LinkedIn with over 15 years of experience helping professionals in various
    fields excel in their careers.  Objective: To create an attractive and effective
    LinkedIn profile prototype that reflects the individual''s professionalism, skills
    and unique experience, using the detailed information provided'
  prefs: []
  type: TYPE_NORMAL
- en: 4.2.4.     Prepare for job interviews with ChatGPT
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Preparing for a job interview is crucial to making a good impression and increasing
    the chances of success. ChatGPT can be a helpful tool in this process, providing
    interview simulations, generating questions based on the desired position, and
    offering suggestions to improve the answers.
  prefs: []
  type: TYPE_NORMAL
- en: 1\. Gathering information about the company
  prefs: []
  type: TYPE_NORMAL
- en: If the interview is for a well-known company, you can use ChatGPT to learn about
    its mission and values. If the company is less well known, you can search for
    information online and then provide it to ChatGPT for proper context.
  prefs: []
  type: TYPE_NORMAL
- en: 2\. Simulation of questions and answers
  prefs: []
  type: TYPE_NORMAL
- en: ChatGPT can generate common interview questions based on the job description.
    Provide a job description and CV so ChatGPT can tailor the questions to your skills
    and experience. You can then practice answering these questions by conducting
    a mock interview. ChatGPT can review your answers, tell you the purpose behind
    each question from an HR point of view, and even suggest an ideal answer. This
    helps you polish your answers and identify areas for improvement.
  prefs: []
  type: TYPE_NORMAL
- en: 3\. Customization of the preparation process
  prefs: []
  type: TYPE_NORMAL
- en: 'For detailed preparation, it is helpful to provide ChatGPT with the following
    information:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Job Description: Summary of responsibilities and skills required for ChatGPT
    to tailor questions and answers to the job''s demands.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Professional profile or CV: This is a description of your experience and achievements,
    which allows ChatGPT to identify your strengths and weaknesses concerning the
    position.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Areas of focus: Any specific aspects of the interview that concern you, such
    as your technical expertise or interpersonal skills.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Desired answer style: Define whether you prefer brief or more detailed answers
    adapted to your style and the type of interview.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Here is an example of a job interview preparation prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt - You are an interview preparation assistant. I want you to help me
    prepare for a job interview for the position of [Position Name] at [Company Name].
    Here is the job description: [Paste Job Description]. My experience and skills
    are as follows: [Paste a summary of your CV or relevant experience]. I also have
    some specific areas in which I want to improve: [Mention specific aspects].'
  prefs: []
  type: TYPE_NORMAL
- en: 'Additional Resource: In section "7.2, Prompts Repository", you will find further
    and more elaborate prompts for preparing for job interviews, including detailed
    guides and advanced simulations.'
  prefs: []
  type: TYPE_NORMAL
- en: 4.3\. ChatGPT for basic programming
  prefs: []
  type: TYPE_NORMAL
- en: Before we begin, please note that this section is designed for people without
    programming experience. The following pages will provide tools and knowledge to
    improve and practice your programming skills.
  prefs: []
  type: TYPE_NORMAL
- en: ChatGPT can assist us in various programming tasks, from code optimization and
    correction through code translation to code generation from scratch. In addition,
    if we want to learn a new programming language, it can act as a personal tutor
    to develop skills in various areas, including learning from beginner to advanced
    intermediate level.
  prefs: []
  type: TYPE_NORMAL
- en: 4.3.1.     Learning to program with ChatGPT
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The key to good learning is to be honest and share our current level with ChatGPT,
    telling it how much we know and what we need to learn. By sharing your current
    understanding of the topic or language, this technology will be able to adapt
    to your needs, providing you with more efficient training.
  prefs: []
  type: TYPE_NORMAL
- en: 'To make your learning experience more engaging, I recommend starting by trying
    to work on a project. For example, you can ask ChatGPT for project ideas that
    match your current level of knowledge and skills, which will help you reach your
    desired level. Let''s look at an example:'
  prefs: []
  type: TYPE_NORMAL
- en: Prompt - I have no technical studies or any career. I am used to use computers,
    but only the office part (excel, word, etc.). I know the basics of C# and C++
    programming. I want to learn how to program in Python, can you create a beginner
    level project to help me learn?
  prefs: []
  type: TYPE_NORMAL
- en: If you're curious about programming, I encourage you to dive in and start coding
    with ChatGPT. If you're new to programming and feeling lost, don't hesitate to
    ask ChatGPT for some examples; it will be happy to help! For our purposes, let's
    begin with the simplest example.
  prefs: []
  type: TYPE_NORMAL
- en: Prompt - Develop me the first example
  prefs: []
  type: TYPE_NORMAL
- en: 'ChatGPT - Sure you can! Here I provide you with a step-by-step to create a
    program that calculates grade point average using Python:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Texto  Descripción generada automáticamente](image_rsrc3PP.jpg)'
  prefs: []
  type: TYPE_IMG
- en: If you have stayed the same as before or even worse, don't worry, it's good.
    We have found something new to learn, and ChatGPT can help us with it. Just ask
    him what a code snippet does, and he will explain it. The next lesson will show
    you how to get valuable explanations from the code.
  prefs: []
  type: TYPE_NORMAL
- en: 4.3.2.     Using ChatGPT to explain what the code does
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: As we said, if you do not understand some concepts mentioned in the code, you
    can ask ChatGPT, and it will thoroughly explain them, even using analogies to
    facilitate understanding.
  prefs: []
  type: TYPE_NORMAL
- en: Prompt - Explain to me what the above code does, so that someone without programming
    knowledge can understand it.
  prefs: []
  type: TYPE_NORMAL
- en: The code with comments can be useful, but it is possible that even with the
    explanation, you still do not understand some of the concepts mentioned. That's
    OK; we can use ChatGPT to explain these concepts. You can ask about specific things
    you don't understand or for a list of concepts you should know before doing these
    exercises. Remember that you can talk to ChatGPT like a human tutor, clarifying
    doubts and asking for additional explanations if you do not understand a concept.
    Next, we will ask you about the basic concepts we should know.
  prefs: []
  type: TYPE_NORMAL
- en: Prompt - What are the basic concepts you should know to make the program that
    calculates the grade point average?
  prefs: []
  type: TYPE_NORMAL
- en: 'ChatGPT - Variables: These are containers for storing data. You will need variables
    to store individual grades and the average.'
  prefs: []
  type: TYPE_NORMAL
- en: '2\. Types of data: In particular, you must understand...'
  prefs: []
  type: TYPE_NORMAL
- en: If you want to go deeper into any of the above concepts, follow the conversation
    and ask for an explanation. If you are not an expert or unfamiliar with programming
    or technical language, we can ask it to explain as if it were for a 10-year-old
    child. This way, you will use analogies and easy-to-understand language. For example,
    let's ask him about the first concept, variables.
  prefs: []
  type: TYPE_NORMAL
- en: Prompt - What are variables? explain this concept to me as if I were a 10-year-old
    child.
  prefs: []
  type: TYPE_NORMAL
- en: ChatGPT - Imagine you have a box where you can store things. In that box, you
    can store different things at different times, right? Well, in programming, variables
    are like those boxes where you can store different kinds of information at different
    times. For example, imagine you have a box called "Age". At a given time, you
    can store in that box your current age. But later, if your age changes, you can
    put your new age in the same box...
  prefs: []
  type: TYPE_NORMAL
- en: This explanation is excellent. It is clear, concise, and uses an analogy, as
    we requested. To ensure we understand the code, we will ask you to show us how
    this explanation of variables ties into our project.
  prefs: []
  type: TYPE_NORMAL
- en: Prompt - How does this variable relate to the GPA calculation program?
  prefs: []
  type: TYPE_NORMAL
- en: ChatGPT - In the GPA calculation program, the variables are a fundamental part
    since they are used to store the information of the grades of each subject in
    order to calculate the average.
  prefs: []
  type: TYPE_NORMAL
- en: This way, you can have a private teacher who will give you exercises you can
    correct later. So, you can use this method to learn any programming language you
    want.
  prefs: []
  type: TYPE_NORMAL
- en: 4.3.3.     Translating between different programming languages
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'As with languages, where ChatGPT can act as a translator, it can also write
    code in several programming languages. Popular languages include Python, Java,
    JavaScript, C++, C#, PHP, Ruby, Swift, Go, and Kotlin. To demonstrate this ability,
    we will perform a classic exercise when testing a language: displaying the "Hello
    World" message. This exercise is the first step when learning a new language,
    as it is an essential and easy-to-implement function.'
  prefs: []
  type: TYPE_NORMAL
- en: Prompt - Give me the code to display the "Hello World" message in C#, Python
    and Java.
  prefs: []
  type: TYPE_NORMAL
- en: '![A screenshot of a computer code  Description automatically generated](image_rsrc3PR.jpg)![A
    screenshot of a computer  Description automatically generated](image_rsrc3PS.jpg)![A
    screen shot of a computer code  Description automatically generated](image_rsrc3PT.jpg)'
  prefs: []
  type: TYPE_IMG
- en: As you can see, translating between different languages is relatively easy,
    which can be very useful if you already know a language and want to learn another
    one. Finally, it should be noted that the code provided by ChatGPT can be copied
    using the "Copy code" button at the top right to use it in a text editor or in
    an integrated development environment to test its operation.
  prefs: []
  type: TYPE_NORMAL
- en: 4.3.4.     Create a basic HTML web page
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: ChatGPT is amazing, since it is able to generate any kind of code that we ask
    it to generate, which includes HTML (code normally used in the development of
    web pages). For this example, we are going to ask it to create a basic web page,
    with a big button in the background, which when clicked causes the background
    of the web page to change color.
  prefs: []
  type: TYPE_NORMAL
- en: Prompt - Create a web page, in HTML, that has a big button all over the center
    of the web. When that button is clicked, the background color of the web will
    change randomly.
  prefs: []
  type: TYPE_NORMAL
- en: '![Interfaz de usuario gráfica, Texto, Aplicación  Descripción generada automáticamente](image_rsrc3PU.jpg)*
    Example cut out'
  prefs: []
  type: TYPE_NORMAL
- en: In a matter of seconds, we can get the complete code of a web page, but how
    do we know if it really works? The answer is straightforward. We will use [Replit.com,](https://replit.com/)  a
    platform that allows us to preview and edit the web page quickly and easily. We
    will have to register on the platform, which will take less than a minute. Once
    logged in, we paste the code previously copied to the clipboard and click on "Run".
    In this way, we will obtain the desired result and be able to check the correct
    operation of the code on our web page, as shown below.
  prefs: []
  type: TYPE_NORMAL
- en: '![A screen shot of a computer  Description automatically generated](image_rsrc3PV.jpg)![A
    screenshot of a computer  Description automatically generated](image_rsrc3PW.jpg)'
  prefs: []
  type: TYPE_IMG
- en: The code complies with the request. If we want to modify it, such as adding
    a second smaller button below the big one, we have to tell ChatGPT. It will generate
    the complete code again, which we will copy and paste into Replit to obtain the
    following result.
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc3PX.jpg)'
  prefs: []
  type: TYPE_IMG
- en: This is one way to create web pages, but not the only way. This example shows
    the capabilities of ChatGPT for creating simple web pages
  prefs: []
  type: TYPE_NORMAL
- en: 4.4\. Transform the way you learn
  prefs: []
  type: TYPE_NORMAL
- en: Since ChatGPT has become available, many teachers have expressed concerns about
    its possible use in plagiarizing work in universities and schools. However, as
    with any technology, such as calculators or online learning platforms, its impact
    on education depends on the approach taken. While it is true that ChatGPT could
    be used to generate complete papers effortlessly (although the quality of these
    would be questionable), it can also be a useful complementary tool to improve
    the quality of our deliverables, save time in the process, and be more efficient.
    Throughout the following lessons, I want to show you how ChatGPT can be a valuable
    tool for your writing while keeping your content unique.
  prefs: []
  type: TYPE_NORMAL
- en: The educational potential of ChatGPT is enormous, especially for those young
    people who show a deep desire to create a better world but sometimes do not have
    the right tools to progress. These young people have a positive approach and a
    willingness to learn and to do well. The fact that some students see ChatGPT as
    a way to avoid effort does not mean we should ban its use in schools. Doing so
    would be like putting gates on the field. It would not be the right solution,
    as this tool can be helpful for the learning and development of many students.
  prefs: []
  type: TYPE_NORMAL
- en: The real solution to address any problems related to the use of ChatGPT in schools
    is to encourage a positive approach to the tool. Rather than banning its use,
    we should encourage students to use ChatGPT to save time, be more productive,
    and find inspiration in their work. This can help students see the tool as a useful
    supplement rather than a way to cheat.
  prefs: []
  type: TYPE_NORMAL
- en: In addition, ChatGPT can be an excellent ally in research, helping us find quality
    sources on which to base our work based on the information we have collected.
    Instead of using this tool to develop work and copy and paste without learning,
    we should use it consciously and responsibly to enhance our education.
  prefs: []
  type: TYPE_NORMAL
- en: AI is transforming teaching by adapting to each student's needs and offering
    new ways to teach critical skills for the 21st century. Thanks to ChatGPT, we
    can have a virtual assistant offering additional support, answering questions,
    and providing resources to reinforce skills. This applies to any subject.
  prefs: []
  type: TYPE_NORMAL
- en: Integrating this technology into the learning process is important rather than
    prohibiting it. Francesc Pujol, director of the Economics degree at the University
    of Navarra, proposes integrating ChatGPT into education to improve learning. He
    has made it mandatory in his subjects. Pujol believes that the impact of ChatGPT
    will be linked to students' attitudes. While some may shirk responsibilities,
    engaged ones will use it to enrich their learning.
  prefs: []
  type: TYPE_NORMAL
- en: Teachers should guide and integrate the technology effectively, avoiding misuse
    of ChatGPT. This will help students learn to ask better questions and acquire
    knowledge gradually.
  prefs: []
  type: TYPE_NORMAL
- en: Teachers must design activities that consciously integrate ChatGPT. This approach
    will foster critical thinking and improve academic performance. The key is structured
    implementation and good guidance.
  prefs: []
  type: TYPE_NORMAL
- en: 4.4.1.     Learning any subject
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Learning something new is easier than ever with tools like ChatGPT. With an
    extensive database and ever-expanding knowledge, ChatGPT allows you to explore
    and understand virtually any topic you're interested in, from science and technology
    to history and art. This makes it an ideal tool for self-study, offering clear
    explanations, examples, and resources to delve into topics of all kinds. However,
    it is vital to remember that, although it is becoming less and less frequent,
    ChatGPT can generate incorrect information or "hallucinate". Therefore, it is
    recommended that you verify essential data with additional sources. With a good
    prompt, you can maximize the usefulness of ChatGPT and customize your learning
    in a way that suits your needs.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here is an example of a prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: Prompt - I want to learn about [topic of interest] and would like an explanation
    at a [basic/intermediate/advanced] level. I prefer an approach that includes [specific
    details, such as practical examples, analogies, or a general overview]. Could
    you explain this topic and suggest some resources or additional steps to go deeper
    into it?
  prefs: []
  type: TYPE_NORMAL
- en: 'Additional Resource: In section "7.2, Prompts Repository", you will find a
    further, more elaborate prompt on how to learn anything using the Feynman technique.'
  prefs: []
  type: TYPE_NORMAL
- en: 4.4.2.     Finding and managing references
  prefs: []
  type: TYPE_NORMAL
- en: Until recently, the search for references for academic papers was done mainly
    through the Internet from reliable sources, specialized media, or the university
    library. However, with the advent of ChatGPT, this process has undergone a radical
    change. Remember that this AI has been trained with many documents, many more
    than we could read in a lifetime. Therefore, ChatGPT has the information we need,
    and we need to learn how to ask the right questions.
  prefs: []
  type: TYPE_NORMAL
- en: Prompt - I am writing a paper on Bitcoin energy expenditure from a moral approach.
    Recommend academic books to me.
  prefs: []
  type: TYPE_NORMAL
- en: 'ChatGPT - 1. "The Moral Case for Fossil Fuels" by Alex Epstein: Defends fossil
    fuels from a moral perspective and argues that they are essential for human welfare.
    Although it does not specifically address Bitcoin, the arguments could be applied
    to the energy use of this technology.'
  prefs: []
  type: TYPE_NORMAL
- en: '2. "The Ethics of Climate Change: An Introduction" by James Garvey: Provides
    an ethical framework for considering the environmental impact of various technologies,
    relevant to analyzing the energy use of Bitcoin.'
  prefs: []
  type: TYPE_NORMAL
- en: '3. "The Ethics of Energy" by William James: Offers a philosophical perspective
    on the responsible use of energy, useful for evaluating the energy impact of Bitcoin.'
  prefs: []
  type: TYPE_NORMAL
- en: As you can see, ChatGPT not only provides us with a list of books but also gives
    us a brief description of how each book relates to the topic of our work. This
    is an excellent opportunity to use the skills we learned about summarizing information,
    as we can ask it to summarize the book's key points related to our work.
  prefs: []
  type: TYPE_NORMAL
- en: 'This information search could have taken us hours; however, with ChatGPT, we
    can do it in minutes. It is still a search for information done by ourselves,
    only more efficiently. We have never used it to copy or plagiarize any part of
    our work, only to speed up the information search process. Finally, let''s look
    at how ChatGPT can help us with a tedious task, often at the end of a paper, which
    is citing the sources used. There are several citation styles, such as APA, MLA,
    Chicago, and Harvard, each with their own rules for citing and referencing sources,
    which can be overwhelming. In general, some elements you should consider including
    when citing sources are author(s), title of work, publisher(s), date of publication,
    place of publication, publisher''s name, page number(s), URL, etc. Let''s ask
    ChatGPT to reference the sources he recommended above, plus a related web page:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt - Harvard style references the three books you mentioned to me for an
    academic paper, plus this other source: https://ethics.es/2020/02/bitcoins-el-supervillano-virtual-del-medio-ambiente/'
  prefs: []
  type: TYPE_NORMAL
- en: 'ChatGPT - Of course, here I provide you with the bibliographic references of
    the three books I recommended and the additional source you have provided, in
    Harvard reference style:'
  prefs: []
  type: TYPE_NORMAL
- en: 1. Epstein, A. (2014). The Moral Case for Fossil Fuels. Portfolio.
  prefs: []
  type: TYPE_NORMAL
- en: '2. Garvey, J. (2008). The Ethics of Climate Change: An Introduction. Continuum.'
  prefs: []
  type: TYPE_NORMAL
- en: '3. Steffen, L. (2014). The Ethics of Energy: William James''s Moral Philosophy
    in Focus. University of Scranton Press.'
  prefs: []
  type: TYPE_NORMAL
- en: 4. Ethic (2020). Bitcoins, the virtual supervillain of the environment. Retrieved
    April 7, 2023, from https://ethics.es/2020/02/bitcoins-el-supervillano-virtual-del-medio-ambiente/
  prefs: []
  type: TYPE_NORMAL
- en: You can see how this AI significantly facilitates and speeds up the process.
    ChatGPT handles formatting and almost instantly includes all the necessary information
    in the references. Providing it with the sources we have used saves us a great
    deal of time, allowing us to focus on other important parts of our work.
  prefs: []
  type: TYPE_NORMAL
- en: 4.4.3.     Improve your Language Learning
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Learning a new language can be a challenge, but with ChatGPT, you have an assistant
    who can help you improve in a personalized and entertaining way. ChatGPT adapts
    to your needs, whether at the beginner or advanced level. You can use ChatGPT
    to complete tasks, practice vocabulary, and strengthen specific areas such as
    grammar, reading comprehension, and more. You can even give it tasks you find
    online or ask it to generate new exercises tailored to your level and goals, providing
    you with a comprehensive learning experience.
  prefs: []
  type: TYPE_NORMAL
- en: One advantage of using ChatGPT is that you can create tasks according to the
    aspect of the language you want to focus on. For example, you can ask it to design
    grammar exercises that focus on verb tenses, vocabulary lists related to work
    or studies, or even readings with comprehension questions.
  prefs: []
  type: TYPE_NORMAL
- en: When learning a new language, using a LLM like ChatGPT is particularly beneficial
    because it excels in understanding and generating language. While there's always
    a possibility of "hallucination" (making mistakes or offering fictitious facts)
    in other topics, such occurrences are minimal when learning a new language, as
    the focus is on structure, vocabulary, and grammar rather than factual information.
    ChatGPT has been trained with a wide array of multilingual data, which makes it
    an excellent tool for practicing any language, often offering precise and accurate
    expressions.
  prefs: []
  type: TYPE_NORMAL
- en: ChatGPT is also useful for creating hypothetical situations adapted to your
    context. For example, if you are preparing for a job interview, you can ask it
    to generate questions in the target language that might come up during the interview
    and practice your answers. Or, if you want to improve your conversational skills,
    you can simulate dialogues about situations that interest you, such as travel,
    projects, or work scenarios. These practices make learning more enjoyable and
    relevant, allowing you to apply the new language to your daily life practically
    and effectively.
  prefs: []
  type: TYPE_NORMAL
- en: The voice mode is another feature that makes ChatGPT especially useful in learning
    new languages. You can practice speaking directly with ChatGPT and engage in conversations
    naturally. The model has been trained with diverse language recordings, allowing
    it to understand and respond with quality. In addition, ChatGPT's voice mode helps
    with pronunciation and lets you develop fluency and confidence in speaking.
  prefs: []
  type: TYPE_NORMAL
- en: With all these tools, ChatGPT becomes a flexible resource for learning and improving
    your skills in a new language. It provides an interactive approach tailored to
    your specific level and needs. It is ideal for self-study and complementing your
    studies with a teacher, offering many opportunities to practice and reinforce
    your knowledge.
  prefs: []
  type: TYPE_NORMAL
- en: 4.5\. ChatGPT for Gamers
  prefs: []
  type: TYPE_NORMAL
- en: In addition to its usefulness for educational and productivity purposes, ChatGPT
    can also be an incredible tool for gamers, especially in role-playing games. Games
    like Dungeons & Dragons and Yes, Dark Lord require creativity, improvisation,
    and the ability to immerse yourself in a complex story. With ChatGPT, you can
    simulate and enhance your experience in these games, whether playing solo or improving
    your group role-playing skills.
  prefs: []
  type: TYPE_NORMAL
- en: For example, in Yes, Dark Lord, you can play ChatGPT as the Dark Lord, who interrogates
    and judges adventurers for their failures. ChatGPT can assume the role of the
    game master, questioning you about your mission and allowing you to improvise
    excuses and justify your decisions. You can use specific prompts for ChatGPT to
    adapt its role to this type of game, transforming the experience into something
    much more dynamic and interactive.
  prefs: []
  type: TYPE_NORMAL
- en: Similarly, in Dungeons & Dragons, ChatGPT can act as a virtual Dungeon Master,
    creating custom stories, enemies, and challenges for your adventures. Many players
    have found that they can use ChatGPT to guide their characters through an immersive
    plot, make decisions, and even receive detailed descriptions that enhance immersion.
    The AI can adapt the narrative and surprise you with unexpected twists, resulting
    in a unique experience.
  prefs: []
  type: TYPE_NORMAL
- en: On the next page is a prompt to start playing Dark Lord with ChatGPT. This is
    a sample of how you can integrate this tool into your gaming experience.
  prefs: []
  type: TYPE_NORMAL
- en: 'ChatGPT   - Let''s play "Yes, Dark Lord". This is a humorous role-playing game
    in which players play a group of adventurers who must justify their failures to
    a powerful and evil Dark Lord. I want you to assume the role of the Dark Lord,
    who will interrogate the characters about their failed mission. The adventurers
    (Character 1, Character 2, and Character 3) have returned from a mission to retrieve
    an important package, but have come back empty-handed. Question each of the characters,
    one by one, and look for the culprit of this failure. > Below, I give you the
    role of each character:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Character 1: [Brief description of the character].'
  prefs: []
  type: TYPE_NORMAL
- en: 'Character 2: [Brief description of the character].'
  prefs: []
  type: TYPE_NORMAL
- en: 'Character 3: [Brief description of the character].'
  prefs: []
  type: TYPE_NORMAL
- en: As Dark Lord, your objective is to maintain a stern and inquisitive tone, looking
    for absurd or implausible excuses in their answers. You can change character each
    round and, after each justification, punish whoever you consider to have the worst
    excuse. Follow a humorous approach and use your creativity to make the game fun
    and unexpected.
  prefs: []
  type: TYPE_NORMAL
- en: Chapter V
  prefs: []
  type: TYPE_NORMAL
- en: Advanced uses of ChatGPT
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 5.1.          Advanced tips for writing prompts
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: After exploring the primary uses of ChatGPT and seeing how it can improve our
    productivity with practical examples, we already have a good foundation. In this
    chapter, we will delve into the advanced uses of this tool, discovering new ways
    to take advantage of its full potential.
  prefs: []
  type: TYPE_NORMAL
- en: 5.1.1.     Specifies the output format
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: When you ask ChatGPT a question, you can indicate how you want the answer presented.
    Imagine giving an assignment to a student, and you specify how the student should
    organize the work when handing it in. Here are some examples of how you can do
    this.
  prefs: []
  type: TYPE_NORMAL
- en: Prompt - What are the longest highways in the United States? List only the top
    four in the form of a bullet list.
  prefs: []
  type: TYPE_NORMAL
- en: ChatGPT   - U.S. Route 20 - 3,365 miles (Boston, MA to Newport, OR)
  prefs: []
  type: TYPE_NORMAL
- en: U.S. Route 6 - 3,207 miles (Provincetown, MA to Bishop, CA)
  prefs: []
  type: TYPE_NORMAL
- en: Interstate 90 (I-90) - 3,021 miles (Seattle, WA to Boston, MA)
  prefs: []
  type: TYPE_NORMAL
- en: U.S. Route 30 - 3,073 miles (Atlantic City, NJ to Astoria, OR)
  prefs: []
  type: TYPE_NORMAL
- en: However, we can specify another output format, as shown on the next page.
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc3PY.jpg)You can tell ChatGPT the format you prefer to present
    the information in, according to your needs.'
  prefs: []
  type: TYPE_NORMAL
- en: 5.1.2.     Requests that the formatting be in HTML
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: You can specify how you want the results to be displayed. For example, you can
    ask for a table generated in HTML.
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt - Question: What are the longest roads in USA? Displays only the top
    four and presents the results in HTML format.'
  prefs: []
  type: TYPE_NORMAL
- en: ChatGPT
  prefs: []
  type: TYPE_NORMAL
- en: <table>
  prefs: []
  type: TYPE_NORMAL
- en: <tr>
  prefs: []
  type: TYPE_NORMAL
- en: <th>Road</th>
  prefs: []
  type: TYPE_NORMAL
- en: <th>Connection</th>
  prefs: []
  type: TYPE_NORMAL
- en: '...'
  prefs: []
  type: TYPE_NORMAL
- en: You can also request that the information be displayed using more modern HTML
    styles, such as CSS, instead of traditional table tags.
  prefs: []
  type: TYPE_NORMAL
- en: Prompt - Present that information but use CSS instead of table tags.
  prefs: []
  type: TYPE_NORMAL
- en: ChatGPT
  prefs: []
  type: TYPE_NORMAL
- en: <div class="table">
  prefs: []
  type: TYPE_NORMAL
- en: <div class="row header">
  prefs: []
  type: TYPE_NORMAL
- en: <div class="cell">Road</div>.
  prefs: []
  type: TYPE_NORMAL
- en: <div class="cell">Connection</div>
  prefs: []
  type: TYPE_NORMAL
- en: <div class="cell">Approximate length</div>.
  prefs: []
  type: TYPE_NORMAL
- en: '...'
  prefs: []
  type: TYPE_NORMAL
- en: Using HTML with CSS, you can further customize the table layout to fit the style
    of your web page, making the presentation more visually appealing and modern.
  prefs: []
  type: TYPE_NORMAL
- en: 5.1.3.     Iterate with multiple attempts
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'It is often necessary to work with AI to achieve the desired result. For example,
    our CSS result above. Here''s what it looks like:'
  prefs: []
  type: TYPE_NORMAL
- en: '![A table with a number of miles and miles  Description automatically generated](image_rsrc3PZ.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 4\. First iteration result in HTML format
  prefs: []
  type: TYPE_NORMAL
- en: Unfortunately, it's not as pretty as we would like. Let's see if we can remedy
    that.
  prefs: []
  type: TYPE_NORMAL
- en: Prompt - Please do it again, but make sure the columns are all lined up. Make
    the headers a darker blue with white uppercase bold letters. Make each row of
    data light gray, but vary the gray levels so that row 1 is light gray, row 2 is
    slightly darker, row 3 is light gray, etc. Make sure that the name of the highway
    is in bold.
  prefs: []
  type: TYPE_NORMAL
- en: '![A table with a number of miles and miles  Description automatically generated](image_rsrc3R0.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5\. Second iteration result in HTML format
  prefs: []
  type: TYPE_NORMAL
- en: Never assume that programming is easy. But if you've ever taught programming
    to humans, this is precisely the kind of result you get. Sometimes it seems like
    they're being passive-aggressive, but it's more likely that you haven't specified
    your requirements carefully enough.
  prefs: []
  type: TYPE_NORMAL
- en: 5.1.4.     Provides explicit constraints to a response
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In the prompt above, we have applied some restrictions to the answer, such as
    the number of roads we wanted to present. But you can also use constraints for
    more open-ended questions.
  prefs: []
  type: TYPE_NORMAL
- en: 'There are limits to this type of prompt. Let''s see this example:'
  prefs: []
  type: TYPE_NORMAL
- en: Prompt - Provides a summary of the key events of World War II as reported by
    the major newspapers of the time.
  prefs: []
  type: TYPE_NORMAL
- en: Since the model was not trained in World War II newspapers, it cannot answer
    the question (although it attempts to).
  prefs: []
  type: TYPE_NORMAL
- en: Prompt - Lists major space missions between 2010 and 2020.
  prefs: []
  type: TYPE_NORMAL
- en: 'Similarly, you cannot specify any "last year" results since the model data
    ends in 2023\. That said, you can select data that is within the scope of the
    model, such as this one:'
  prefs: []
  type: TYPE_NORMAL
- en: Prompt - Lists the major space missions carried out by NASA between 2010 and
    2020.
  prefs: []
  type: TYPE_NORMAL
- en: 'Note that we are limiting by date. But we can add more restrictions. Let''s
    restrict the data to US missions only. You can also go back to the formatting
    approach we discussed earlier and do something like this:'
  prefs: []
  type: TYPE_NORMAL
- en: Prompt - List all major space missions conducted between 2010 and 2020\. Group
    them by nation and space agency. Make the name of the nation and space agency
    bold.
  prefs: []
  type: TYPE_NORMAL
- en: You can be even more explicit. We then include continents and specify that any
    without missions are excluded.
  prefs: []
  type: TYPE_NORMAL
- en: Prompt - List all major space missions carried out between 2010 and 2020\. Group
    them by continent. Make the continent name bold and all capitalized. Make the
    name of the nation and space agency bold, initial capitals, or all caps if formatted
    by the space agency (such as NASA). If a continent did not have a space mission,
    do not include it in this list.
  prefs: []
  type: TYPE_NORMAL
- en: We could go on and on, restricting the results provided by ChatGPT as much as
    we want.
  prefs: []
  type: TYPE_NORMAL
- en: 5.1.5.     Indicates the number of words, phrases or characters.
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Regarding restrictions, you may have noticed that ChatGPT tends to be inaccurate
    regarding word count. It sometimes goes over or under if you ask it to limit its
    response to 50 words. This is because the language model works with tokens (data
    representations) that do not directly correspond to individual words.
  prefs: []
  type: TYPE_NORMAL
- en: 'For example, when I asked ChatGPT to "Summarize the TV series Game of Thrones,"
    he responded with 294 words in six paragraphs. But you can try limiting the answer.
    Try various limiting terms until you determine which one works best for you. For
    example:'
  prefs: []
  type: TYPE_NORMAL
- en: Prompt
  prefs: []
  type: TYPE_NORMAL
- en: Summarize the television series Game of Thrones in 50 words.
  prefs: []
  type: TYPE_NORMAL
- en: Summarize the television series Game of Thrones in 2 sentences.
  prefs: []
  type: TYPE_NORMAL
- en: Summarizes the television series Game of Thrones in less than 200 characters.
  prefs: []
  type: TYPE_NORMAL
- en: Summarizes the Game of Thrones TV series to fit in a tweet.
  prefs: []
  type: TYPE_NORMAL
- en: 5.2\. Customized GPTs
  prefs: []
  type: TYPE_NORMAL
- en: Custom GPTs are versions of ChatGPT tailored to fulfill specific functions,
    allowing users to harness the power of AI in a more specialized way. These GPTs
    are designed to offer unique solutions that fit different needs, such as education,
    programming, design, research, etc. Thanks to them, anyone can create or use a
    model focused on precise areas, transforming the experience of interacting with
    AI into something much more targeted and effective.
  prefs: []
  type: TYPE_NORMAL
- en: 5.2.1.     GPTs Store
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The GPT Store is the ideal place to find customized versions of ChatGPT to meet
    specific needs. OpenAI showcases GPTs created by its team, community members,
    and well-known companies in this store. Some of these companies include Canva,
    which offers design tools; AllTrails, for customized route recommendations; and
    Khan Academy, with a coding tutor called Code Tutor.
  prefs: []
  type: TYPE_NORMAL
- en: The GPTs in the store are organized into various categories, making it easy
    for users to find the right tool. Featured categories include "Best Picks," "Writing,"
    "Productivity," "Research and Analysis," "Education," "Lifestyle," and "Programming."
    This structure allows you to explore GPTs according to particular interests, from
    those focused on productivity to tools to enhance learning or simplify daily life.
  prefs: []
  type: TYPE_NORMAL
- en: '![A screenshot of a computer  Description automatically generated](image_rsrc3R1.jpg)'
  prefs: []
  type: TYPE_IMG
- en: In addition, it is essential to mention that ChatGPT Plus, Team, and Enterprise
    users can create and share their GPTs in this store. In the future, OpenAI plans
    to implement a revenue program allowing creators to earn money based on how others
    use their GPTs. This system will be based on the popularity and usefulness of
    each GPT, awarding compensation to those with the most significant impact. Here's
    how to create these custom GPTs if you are a ChatGPT Plus user and want to share
    your versions in the GPT Store.
  prefs: []
  type: TYPE_NORMAL
- en: 5.2.2.     Create your GPTs
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Creating a customized GPT allows us to tailor the power of this wonderful LLM
    to our own specific needs and projects, giving us control over how we want it
    to interact and respond. This opens up possibilities for optimizing tasks, simplifying
    processes, and providing unique value in various areas. In addition, designing
    our own GPT allows us to share it with the community, receive feedback, and even,
    in the future, generate revenue if others find our creation helpful. It's a great
    way to explore the potential of AI and take our ideas to the next level!
  prefs: []
  type: TYPE_NORMAL
- en: 'To create a GPT, follow these steps:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Getting Started: You will need an active ChatGPT Plus subscription. If you
    already have one, go to chatgpt.com/gpts or select "Explore GPT" from the left
    navigation bar.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Create GPT: Select the "+ Create" option at the top right.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Creation Wizard: In the "Create" tab, you can communicate with the GPT Builder,
    which helps you build a new GPT. You can give instructions such as "Set up a GPT
    that shows me book recommendations based on my favorite genres and past reading"
    or "Develop a GPT that gives me personalized gardening tips".'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Settings: Click the "Settings" tab to name and describe your GPT. You can also
    select the actions you want your GPT to perform, such as browsing the web or creating
    images.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Publishing: When you are ready to publish your GPT, select "Publish" and share
    it with others or keep it yourself.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Advanced configuration
  prefs: []
  type: TYPE_NORMAL
- en: 'In the GPT Editor, you can configure more detailed settings:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Add an Image: You can ask GPT Builder to create an image for your GPT or upload
    your own in the ''Configure'' tab.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Additional Instructions: Here, you can provide detailed instructions or guidelines
    on how your GPT should behave, its functionalities, and specific behaviors to
    avoid.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Conversation Starters: These are examples of conversation starter prompts.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Additional Knowledge: This allows you to provide additional context for your
    GPT to reference. Note that the content of uploaded files may be included in the
    output.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'New Capabilities: Enabling web browsing, DALL-E image generation, and advanced
    data analysis will allow the GPT to perform additional functions.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Custom Actions: You can make third-party APIs available for your GPT by providing
    details about endpoints, parameters, and how the model should use it. Actions
    for GPT can also be imported from an OpenAPI schema, so if you have already built
    a plugin, you can use your existing plugin manifests to define actions for your
    GPT.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: In short, 'My GPT' offers an incredibly flexible and accessible platform to
    customize AI to your needs, opening up a world of possibilities for its application
    in various fields.
  prefs: []
  type: TYPE_NORMAL
- en: 5.2.3.     Actual example of GPT to transcribe tickets
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Let''s imagine that we want to create a GPT that helps us transcribe purchase
    tickets from a photo, organizing the information in a table. To do this, once
    we are in the editor, inside the "Create" tab, we simply describe the desired
    function in our own words, and GPT Builder takes care of the rest: "I want a GPT
    that transcribes the content of a purchase ticket into a table."'
  prefs: []
  type: TYPE_NORMAL
- en: With this description, ChatGPT will automatically complete the following "Configure"
    section. Let's see what the result is.
  prefs: []
  type: TYPE_NORMAL
- en: '![A screenshot of a computer  Description automatically generated](image_rsrc3R2.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 'We can see a name and description assigned to our GPT and a picture (generated
    by DALL-E 3). In addition, GPT Builder writes instructions according to what we
    are looking for. As if that were not enough, it also creates conversation starters and suggestions
    for interacting with the GPT, such as "Transcribe my purchase ticket" or "Organize
    my purchases in a table". It is worth mentioning that we could also directly access
    this "Configure" tab and fill in all these data manually. Finally, we access the
    "Preview" tab, where we can check the result by testing some prompts with our
    customized GPT. Let''s test how it works:'
  prefs: []
  type: TYPE_NORMAL
- en: '![A receipt of food on a table  Description automatically generated](image_rsrc3R3.jpg)![A
    screenshot of a receipt  Description automatically generated](image_rsrc3R4.jpg)'
  prefs: []
  type: TYPE_IMG
- en: As you can see, we just released the ticket. There were no additional instructions,
    and the GPT knew its task. GPTs are for tasks we must perform with a certain constancy.
    We can train a GPT to understand what its task is.
  prefs: []
  type: TYPE_NORMAL
- en: 'If we like the result, we will proceed to publish it. Here, we are presented
    with three privacy options: publish it so everyone can use it, share it only with
    specific people via a link, or keep it private. In this way, we have created a
    specialized GPT tailored to our needs with only an initial description, ready
    to optimize our tasks simply and practically!'
  prefs: []
  type: TYPE_NORMAL
- en: 5.2.4.     GPTs advanced level
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: If you found the above interesting, I must tell you this is just the beginning.
    We can take customization much further. These GPTs respond to our instructions
    and allow us to add our knowledge files, creating a specialized environment perfect
    for specific tasks. Imagine you are studying a particular subject, preparing for
    a competitive exam, or working on a project with information that ChatGPT does
    not have by default; this is where the magic of these advanced GPTs comes in.
  prefs: []
  type: TYPE_NORMAL
- en: When you upload documents such as notes, syllabi, or any other reference file,
    GPT will have access to them throughout our conversation. Every time you interact
    with it, it can use that specific data to provide answers aligned with your files'
    content. For example, if you are studying for a particular subject, you can upload
    your notes, study guides, or even topic summaries, and GPT will integrate them
    into its responses. So, not only are you conversing with an AI, but you practically
    have a personalized tutor at your disposal who handles precisely the material
    you are working with.
  prefs: []
  type: TYPE_NORMAL
- en: 'In addition to being able to customize the knowledge that the GPT queries,
    another key feature is the integrated functions that ChatGPT makes available in
    each model. These functions include three tools that can be activated or deactivated
    according to the needs of the GPT we are creating:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Web Browsing: This tool allows GPT to search the web in real time, which is
    ideal for obtaining updated information that is not in your database. Enabling
    this option by default is helpful if the GPT needs to query news, recent data,
    or any online content. However, if you prefer the GPT to work with information
    limited to what you provide, you can disable this feature.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Image generation with DALL-E: This feature, also enabled by default, allows
    the GPT to generate images from text descriptions, using DALL-E technology. This
    is especially useful for creative or visual projects. Like the navigation function,
    you can turn it off if the project does not require image generation.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Code interpreter and data analysis: This third feature, turned off by default,
    allows GPT to perform calculations, analyze data, and execute code snippets. It
    is a powerful tool for those working with scientific data or programming, but
    there are risks associated with enabling this feature. In particular, if the GPT
    is shared publicly or via a link, there is a possibility that third parties may
    access your uploaded knowledge files or configuration instructions, which could
    compromise the security of your information. For this reason, it is important
    to carefully evaluate its use and be aware of its potential risks.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Ultimately, each feature adds customization and power to our GPTs. However,
    with great capabilities also come significant responsibilities, and it is important
    to know and consider these factors before deciding how to configure your GPT.
  prefs: []
  type: TYPE_NORMAL
- en: 5.2.5.     Shares in GPTs
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Actions are advanced functions that allow GPTs to interact with external applications
    or services. These actions act as a "bridge" between the ChatGPT model and the
    real world, allowing the GPT to perform tasks outside the pure text environment
    of ChatGPT. This is achieved through integration with third-party APIs, which
    facilitate automated operations such as accessing databases, making online purchases,
    sending emails, or even querying other web services dynamically.
  prefs: []
  type: TYPE_NORMAL
- en: For example, if you create a GPT that needs to query updated product prices
    in an online store, you can integrate an action that connects to the store's API.
    In this way, the GPT can query the data in real-time, which allows it to respond
    accurately to queries about prices, availability, or product features.
  prefs: []
  type: TYPE_NORMAL
- en: Although this process usually requires programming knowledge, there are codeless
    tools, such as Actionize, that simplify the configuration. This platform facilitates
    application integration, allowing GPTs to connect to thousands of apps without
    needing advanced technical knowledge.
  prefs: []
  type: TYPE_NORMAL
- en: This aspect makes GPTs become true "digital assistants", capable of carrying
    out complex and customized tasks with the minimum of manual intervention, enhancing
    automation in any workflow.
  prefs: []
  type: TYPE_NORMAL
- en: 5.3\. Data analysis
  prefs: []
  type: TYPE_NORMAL
- en: Data analysis is essential to examining, cleaning, and transforming data to
    extract useful information, reach conclusions, and support decision-making. Imagine
    you have a jigsaw puzzle with thousands of scattered pieces; data analytics is
    how you organize those pieces to see the whole picture, which helps you better
    understand what's in front of you and make decisions based on that understanding.
    In a world where we generate enormous amounts of data daily, from application
    usage statistics to customer satisfaction survey results, data analytics allows
    us to filter out the noise, identify trends, predict behaviors, and improve processes
    in almost any imaginable domain.
  prefs: []
  type: TYPE_NORMAL
- en: 'Throughout this text, we have explored various facets of ChatGPT. Now, we will
    focus on a compelling application: data analysis. ChatGPT is a good conversationalist
    and a tool for handling and analyzing data. Its ability to process and understand
    structured and unstructured information makes it an ally in data exploration.
    ChatGPT can interact with datasets, either by extracting essential information,
    performing descriptive analysis, or even generating new insights from the data
    provided. In addition, we can now directly upload files whether or not you have
    a ChatGPT Plus subscription. Previously, this file upload feature was exclusive
    to Plus users. However, today, anyone can do so, although the free plan limits
    the number of files that can be uploaded. Currently supported file formats: TXT,
    PDF, DOC, DOCX, JPEG, PNG, MP4, AVI, CSV, JSON, XML, XLS, XLSX, CPP, PY, HTML,
    DB, SQLite, among others.'
  prefs: []
  type: TYPE_NORMAL
- en: This ability to interactively load files and manipulate data opens up new possibilities
    for users at all levels, from researchers looking to decipher complex academic
    databases to companies needing fast, reliable market analysis. In the following
    pages, we'll explain how to leverage these ChatGPT capabilities to transform raw
    data into informed decisions and effective strategies.
  prefs: []
  type: TYPE_NORMAL
- en: 5.3.1.     Limitations of LLMs for data analysis
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Before proceeding, it is critical to understand the limitations and safety considerations
    required when using these tools in data analysis.
  prefs: []
  type: TYPE_NORMAL
- en: 'Contextual understanding: ChatGPT may have difficulty understanding the full
    context or capturing specific details critical for detailed analysis.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Challenges with large volumes of data: ChatGPT''s handling of large databases
    can be problematic, affecting its effectiveness in extensive analysis.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Data security risks: When uploading data to ChatGPT, there is a risk that data
    could be exposed or misused due to security breaches.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Use of data in model training: Uploaded data may be used in model training,
    which raises concerns if sensitive or confidential information is involved.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: These limitations and risks are essential to consider when employing ChatGPT
    in data analysis, ensuring that the risks are minimized and the benefits of its
    use are maximized. Next, we will explore how to properly prepare the data and
    formulate practical questions.
  prefs: []
  type: TYPE_NORMAL
- en: 5.3.2.     Methodology for data analysis
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Effective use of ChatGPT for data analysis requires proper data preparation,
    accurate question formulation, and techniques for interpreting results. Each of
    these key steps is detailed below.
  prefs: []
  type: TYPE_NORMAL
- en: Data preparation
  prefs: []
  type: TYPE_NORMAL
- en: 'Before using ChatGPT for data analysis, ensuring the data is well organized
    and clean is crucial. This includes:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Data cleaning: Removing or correcting erroneous or incomplete data.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Data structuring: Organizing data so ChatGPT can easily interpret it. This
    may involve converting unstructured data into more structured formats or simplifying
    complex data.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Anonymization of sensitive data: If the data contains sensitive information,
    it is essential to anonymize it to protect privacy before uploading it to the
    platform.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Data interrogation and manipulation
  prefs: []
  type: TYPE_NORMAL
- en: 'Formulating questions and commands to ChatGPT is an art that requires clarity
    and precision to obtain the best results:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Clear formulation of questions: Questions should be specific and direct to
    avoid ambiguity. For example, instead of asking, "What can you tell me about this
    data?" it would be more effective to ask, "What is the sales trend shown by this
    data for the third quarter of last year?"'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Specific commands for analysis tasks: Use commands that direct ChatGPT to perform
    specific analyses, such as calculations of descriptive statistics, correlations,
    or even predictions based on statistical models.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Visualization and interpretation of results
  prefs: []
  type: TYPE_NORMAL
- en: 'Finally, the most critical part is to interpret and visualize the results.
    This is a fundamental task to get the most out of the data analysis performed
    with ChatGPT, and it falls directly on us:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Response Interpretation: Understand ChatGPT responses and how they relate to
    the questions asked and the data provided.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Use of visualization tools: Although ChatGPT can generate graphs for us, we
    may use external tools to visualize the results provided to help better understand
    patterns and trends in the data.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 5.3.3.     Applications and a gift prompt
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The applications of ChatGPT Plus in data analytics are as varied as each user's
    imagination and specific needs, from risk analysis, which allows financial professionals
    to assess the viability and threats of potential investments, to product development,
    where companies can anticipate market reception to their innovations. In education,
    data on student performance can be analyzed to customize teaching methods, and
    in project management, resource optimization is made possible by efficiently identifying
    operational bottlenecks. These are just a few examples, and there are many more
    where creativity and individual needs can take this tool to new horizons.
  prefs: []
  type: TYPE_NORMAL
- en: To illustrate the potential of ChatGPT in data analysis and to facilitate a
    direct application of the concepts learned, we have prepared an example of a prompt
    that users can access via a QR code. This prompt is designed to simplify the analysis
    of any dataset they wish to explore. You can find it on the following page.
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc3R5.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 6\. QR prompt data analysis
  prefs: []
  type: TYPE_NORMAL
- en: To conclude, it is important to note that, although ChatGPT can perform data
    analysis quickly and effectively, in reality, anyone with an average level of
    knowledge could also do it.
  prefs: []
  type: TYPE_NORMAL
- en: Case study
  prefs: []
  type: TYPE_NORMAL
- en: 'To put into practice what you have learned about data analysis using ChatGPT,
    we propose an interactive exercise where you can analyze different types of personal
    data to discover patterns, optimizations, and improvements in your daily life.
    Here are three options to choose from, depending on the data you have access to
    and your interest:'
  prefs: []
  type: TYPE_NORMAL
- en: Personal finance analysis
  prefs: []
  type: TYPE_NORMAL
- en: Use ChatGPT to analyze your banking transactions (previously exported and anonymized
    to remove personal information). By uploading this data to ChatGPT or copying
    and pasting it into the platform, you can ask it to identify spending patterns.
    In these areas, you may be spending more than necessary and get recommendations
    on optimizing your spending.
  prefs: []
  type: TYPE_NORMAL
- en: 2\. Energy consumption evaluation
  prefs: []
  type: TYPE_NORMAL
- en: If you have access to your digitized electricity bills, ChatGPT can help you
    understand your energy consumption. With this information, the tool could analyze
    your monthly consumption patterns, identify abnormal usage peaks, and offer practical
    advice for improving energy efficiency in your home.
  prefs: []
  type: TYPE_NORMAL
- en: 3\. Optimization of displacements
  prefs: []
  type: TYPE_NORMAL
- en: ChatGPT can analyze travel data to suggest efficiency improvements for those
    who use applications such as Google Maps for their commute. This includes recommendations
    on changing regular routes, selecting other schedules to avoid congestion, or
    exploring more efficient transportation alternatives.
  prefs: []
  type: TYPE_NORMAL
- en: Exercise instructions
  prefs: []
  type: TYPE_NORMAL
- en: 'Select a data category: Based on the availability and relevance of your data,
    choose from personal finance, energy consumption, or commuting.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Prepare your data: Ensure that the data is free of sensitive personal information
    and is in a format that ChatGPT can easily process.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Interact with ChatGPT: Upload your data to ChatGPT or enter the information
    manually and ask specific questions to explore the aspects you are most interested
    in. You can also use the prompt provided above.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: This case study will allow you to apply the knowledge acquired in this section.
    Still, it will also provide you with practical knowledge that you could use to
    improve specific aspects of your daily life.
  prefs: []
  type: TYPE_NORMAL
- en: 5.4\. Extensions to enhance ChatGPT
  prefs: []
  type: TYPE_NORMAL
- en: 'Throughout the book, we have seen various use cases for ChatGPT, which offers
    many possibilities. Best of all, it can be integrated with other tools by adding
    extensions to multiply the functionalities. These extensions will allow you to
    make the most of your experience. Let''s take a look at some of the main ones:'
  prefs: []
  type: TYPE_NORMAL
- en: 5.4.1.     AIPRM for ChatGPT
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: AIPRM offers ChatGPT prompt templates, facilitating the process of asking questions.
    Templates are available from the AIPRM community, and you can save your own. Although
    most are about SEO and marketing, we can find all kinds of them.
  prefs: []
  type: TYPE_NORMAL
- en: 5.4.2.     HARPA AI
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: HARPA AI is a tool that allows us to apply the power of ChatGPT to multiple
    tasks within our browser. For example, we can use it to respond to emails and
    social media posts, summarize the content of any web article, or rewrite any text
    we want to publish without the need to access the ChatGPT website. In addition,
    it will display ChatGPT's answers to our searches on the same search engine results
    page. It can also extract data / prices / SEO keywords from web pages. As if that
    were not enough, it includes functions outside ChatGPT, such as the ability to
    monitor the price variation of Amazon products.
  prefs: []
  type: TYPE_NORMAL
- en: 5.4.3.     TweetGPT
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: If we want to use ChatGPT to reply to tweets in our browser without needing
    an all-in-one extension, TweetGPT is the ideal solution. With this add-on, a bot
    icon will appear in the Twitter web interface, automatically generating our tweet
    by analyzing the content we are replying to.
  prefs: []
  type: TYPE_NORMAL
- en: 5.4.4.     ShareGPT
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Sometimes, we would like to share one of our conversations with ChatGPT online
    so that other users can access it. Screenshots, pastes, and copies are usually
    bad systems for this, especially if the conversation is long. That's why ShareGPT
    allows us to create a public backup of the conversation within its own platform,
    keeping the original format.
  prefs: []
  type: TYPE_NORMAL
- en: 5.4.5.     Summarize
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: If you want your browser to summarize any web page you are viewing, as well
    as any YouTube video, with the click of a button, Summarize is the extension you
    need. You won't have to switch tabs to read the summary; it will be generated
    in a small window that overlays the web.
  prefs: []
  type: TYPE_NORMAL
- en: 5.4.6.     ChatGPT Writer
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: With the ChatGPT Writer extension, we can create emails and reply to messages
    with just one click as long as we provide the original text. This extension integrates
    incredibly well with Gmail, although it is compatible with any other webmail platform.
  prefs: []
  type: TYPE_NORMAL
- en: 5.4.7.     Promptheus
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Promptheus adds a valuable feature to ChatGPT, allowing it to receive voice
    input, transforming the chatbot into a useful voice assistant like Siri.
  prefs: []
  type: TYPE_NORMAL
- en: 5.4.8.     Merlin
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Merlin is an Open AI-powered ChatGPT extension that works across the browser.
    It consistently responds to various instructions based on Open AI's GPT AI model.
  prefs: []
  type: TYPE_NORMAL
- en: Chapter VI
  prefs: []
  type: TYPE_NORMAL
- en: Expert level
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 6.1.          Parameter configuration
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Although the ChatGPT interface is simple and easy to use, behind it lies a complex
    model with multiple parameters and settings. Although the model usually works
    optimally with its default settings, it is interesting to know some critical parameters
    that influence its behavior. In this chapter, we will explore three of these parameters,
    temperature, Top-P, and Top-K, to understand how they affect the performance of
    GPT models and what they can contribute to customizing response generation.
  prefs: []
  type: TYPE_NORMAL
- en: 6.1.1.   Temperature
  prefs: []
  type: TYPE_NORMAL
- en: Temperature is one of the most important parameters you can adjust in ChatGPT.
    This parameter controls the degree of randomness in the model's responses. A higher
    temperature will produce more varied and creative responses, while a lower temperature
    will produce more predictable and consistent responses.
  prefs: []
  type: TYPE_NORMAL
- en: 'The temperature range in ChatGPT goes from 0 to 1\. A temperature value of
    0 will cause ChatGPT to always choose the most likely word at each step, resulting
    in very consistent but potentially less creative responses. On the other hand,
    a temperature value of 1 will cause ChatGPT to generate responses with a greater
    diversity of words, which can lead to more creative and unpredictable responses.
    For example, if you ask ChatGPT to create a story with a temperature of 0.2, you
    will likely get a coherent and focused story. However, if you set the temperature
    to 0.8, the generated story might be more varied and surprising, although it might
    also be less coherent. Adjusting the temperature in ChatGPT is a straightforward
    process. You specify the temperature value you want when you write the prompt,
    as shown in the following example:'
  prefs: []
  type: TYPE_NORMAL
- en: Prompt - Once upon a time, in a faraway kingdom, there was a brave knight named
    Sir Lancelot. The story continues, with temperature = 0.1.
  prefs: []
  type: TYPE_NORMAL
- en: ChatGPT - Once upon a time, in a faraway kingdom, there was a brave knight named
    Sir Lancelot. He was known throughout the kingdom for his bravery and courage.
    Every day, he would ride
  prefs: []
  type: TYPE_NORMAL
- en: 'The setting the temperature to 0.9 can lead to more varied and surprising responses:'
  prefs: []
  type: TYPE_NORMAL
- en: ChatGPT - Once upon a time, in a faraway kingdom, there was a brave knight named
    Sir Lancelot. One day, he discovered a hidden portal in the castle library that
    led to a world full of talking animals and magical creatures.
  prefs: []
  type: TYPE_NORMAL
- en: Remember, a higher temperature can lead to more creative but also more unpredictable
    responses, while a lower temperature can produce more coherent but potentially
    less creative responses. It's all about finding the right balance for your needs.
    In short, temperature is a tool to control the balance between consistency and
    creativity in ChatGPT responses. Adjusting this parameter allows you to customize
    ChatGPT to suit your specific needs.
  prefs: []
  type: TYPE_NORMAL
- en: 6.1.2.   Top-K and Top-P
  prefs: []
  type: TYPE_NORMAL
- en: In the GPT architecture, two adjustable hyperparameters, Top-K and Top-P, play
    a crucial role in text generation. These techniques improve consistency and control
    the creativity of the model's responses.
  prefs: []
  type: TYPE_NORMAL
- en: Top-K and Top-P are sampling techniques that allow users to adjust the precision
    and diversity of the generated responses. In other words, they will enable you
    to control how "safe" or "adventurous" the model is when generating text. Depending
    on the context and the desired level of control, you can choose to use Top-K,
    Top-P, or even a combination of both for optimal results. For example, you might
    use Top-K to seek concrete and precise answers. On the other hand, if you are
    looking for more diverse and creative responses, you might choose to use Top-P.
  prefs: []
  type: TYPE_NORMAL
- en: But what exactly are Top-K and Top-P, how do they work, and how can you adjust
    them in ChatGPT? In the following pages, we'll break down these concepts and show
    you how to use them to customize text generation in ChatGPT.
  prefs: []
  type: TYPE_NORMAL
- en: Top-K, this parameter is crucial in determining the variety of words the model
    can consider when generating responses. By setting Top-K, you tell the model how
    many of the most likely words it should feel at each step of text generation.
    A low value of K, such as K=1, will limit the model to selecting only the most
    likely word, which may result in more accurate but less creative responses.
  prefs: []
  type: TYPE_NORMAL
- en: On the other hand, a high value of K, such as K=2000, will allow the model to
    consider a broader set of words, which may result in more creative and diverse
    responses. The maximum value of K will be the size of the vocabulary you want
    in the responses, i.e., the total number of unique words in the vocabulary.
  prefs: []
  type: TYPE_NORMAL
- en: For example, if you set Top-K to 50,000, the model will consider up to 50,000
    different words when generating answers. You can also define Top-K as a percentage
    of the model's answer vocabulary. For example, if you set Top-K to 90%, the model
    will consider 90% of the most likely words in its vocabulary. Top-K is a technique
    to limit output, avoid inconsistent responses, and expand creativity in ChatGPT.
    By adjusting this parameter, you can customize the consistency and diversity of
    ChatGPT responses to suit your specific needs.
  prefs: []
  type: TYPE_NORMAL
- en: To set Top-K in ChatGPT, you tell it to do so in your instruction. For example,
    let's ask him to complete the sentence "The sky is..." with a Top-K of 1.
  prefs: []
  type: TYPE_NORMAL
- en: ChatGPT - The sky is blue.
  prefs: []
  type: TYPE_NORMAL
- en: Let's ask him to complete the same sentence with a Top-K of 50,000.
  prefs: []
  type: TYPE_NORMAL
- en: ChatGPT - The sky is a blanket of tranquility, a canvas of changing hues that
    reflects the passage of time, from dawn to dusk, and then fills with stars at
    night.
  prefs: []
  type: TYPE_NORMAL
- en: As the examples above show, the difference between a low and a high Top-K value
    is notable. A low Top-K value, such as 1, limits the model to always selecting
    the most likely word, which may result in more predictable but potentially less
    creative responses. On the other hand, a high value of Top-K, such as 50,000,
    allows the model to consider a much broader set of words, which may result in
    more creative and diverse, but also more unpredictable, responses. In summary,
    adjusting the Top-K value allows you to control the balance between consistency
    and creativity in the responses generated by ChatGPT.
  prefs: []
  type: TYPE_NORMAL
- en: Top-P is another sampling technique you can adjust in language models based
    on the GPT architecture, such as ChatGPT. This hyperparameter selects words based
    on their cumulative probability, which can lead to more diverse and creative responses.
  prefs: []
  type: TYPE_NORMAL
- en: Top-P values can range from 0 to 1\. A low P value, such as P=0.1, will limit
    the choices to the most likely words, which may result in more coherent and concrete
    answers. On the other hand, a high value of P, such as P=0.9, will allow for more
    diversity in generating words for responses, which may result in more creative
    and diverse responses. For example, if you set Top-P to 0.1, the model will be
    limited to selecting words that, in aggregate, add up to a 10% probability. This
    may result in more predictable responses. However, if you set Top-P to 0.9, the
    model will consider a set of words that add up to a 90% probability, which may
    result in more creative responses.
  prefs: []
  type: TYPE_NORMAL
- en: To set Top-P in ChatGPT, specify the value of Top-P when you write the instruction. 
    If you set Top-P to 0.1, the model will be limited to selecting words that add
    up to a 10% probability together. For example, if you ask ChatGPT to complete
    the sentence "The apple is..." with a Top-P of 0.1, you will most likely get an
    answer like "The apple is red".
  prefs: []
  type: TYPE_NORMAL
- en: On the other hand, if we set Top-P to 0.9, the model will consider a set of
    words that together add up to a 90% probability. If you ask ChatGPT to complete
    the same sentence "The apple is...", with a Top-P of 0.9, you might get a more
    creative answer such as "The apple is the emblem of temptation and knowledge".
    Top-P is a powerful tool for controlling diversity and creativity in ChatGPT responses.
    Adjusting this parameter allows you to customize ChatGPT to suit your specific
    needs.
  prefs: []
  type: TYPE_NORMAL
- en: 6.1.3.   Understanding the Difference
  prefs: []
  type: TYPE_NORMAL
- en: Distinguishing between Top-K and Top-P can be challenging, so simplify it with
    an analogy. Imagine you have a toy that can say many words but only want to hear
    the most exciting ones.
  prefs: []
  type: TYPE_NORMAL
- en: You can think of Top-K as telling the toy, "Show me only the three most interesting
    words." The toy then selects and displays those three words, ignoring all others.
  prefs: []
  type: TYPE_NORMAL
- en: On the other hand, Top-P is like saying to the toy, "Show me interesting words,
    but only if they have enough probability." In this case, the toy will reveal words
    one by one, and it will stop when the cumulative probability of the words it has
    shown adds up to a specific amount you decide.
  prefs: []
  type: TYPE_NORMAL
- en: In summary, Top-K and Top-P are two different techniques used to control the
    diversity and consistency of responses generated by ChatGPT. Top-K limits the
    number of words the model can consider, while Top-P restricts the words based
    on their cumulative probability. Both parameters allow you to customize text generation
    in ChatGPT to suit your needs better
  prefs: []
  type: TYPE_NORMAL
- en: 6.2\. Advanced prompts engineering
  prefs: []
  type: TYPE_NORMAL
- en: So far, we have explored the basics of using ChatGPT. In this chapter, we will
    explore advanced techniques for using this tool. We will look at advanced prompt
    engineering techniques and sample prompts that will allow you to get the most
    out of ChatGPT.
  prefs: []
  type: TYPE_NORMAL
- en: Prompt engineering has been shown to help to effectively design and improve
    prompts for better results in different tasks with LLMs (Brown et al., 2020).
    For this reason, we will now look at ten Prompting  techniques that you may find
    helpful. Although it is unnecessary to put all of them into practice, they will
    help you better understand how LLMs work.
  prefs: []
  type: TYPE_NORMAL
- en: 6.2.1.     Zero-shot  Prompting
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Today, LLM models, such as GPT-3.5 Turbo, GPT-4, and Claude 3, are tuned to
    follow instructions and are trained with large amounts of data. Large-scale training
    makes these models capable of performing some tasks in a "zero-shot" manner. Zero-shot  Prompting  means
    that the prompt used to interact with the model will not contain examples or demonstrations.
    The zero-shot  prompt directly instructs the model to perform a task without additional
    examples to guide it.
  prefs: []
  type: TYPE_NORMAL
- en: 'The following is an example of a zero-shot  instruction:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt - Classify the text as neutral, negative or positive. Text: I think
    the vacations are fine. Sentiment:'
  prefs: []
  type: TYPE_NORMAL
- en: ChatGPT - Neutral
  prefs: []
  type: TYPE_NORMAL
- en: In the above prompt, we did not provide the model with any text examples along
    with their classifications; the LLM already understands "sentiment." Those are
    the zero-shot  capabilities. When zero-shot  does not work, providing demonstrations
    or examples in the prompt is recommended, which leads to Prompting  few-shot.
  prefs: []
  type: TYPE_NORMAL
- en: 6.2.2.     Few-shot  Prompting
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Although large-scale language models demonstrate remarkable capabilities in
    zero-shot  tasks, they still present limitations in more complex tasks when using
    this configuration. We use “few-shot Prompting,” a technique that provides demonstrations
    at the prompt to guide the model towards better performance. The demonstrations
    serve as conditioning for later examples where we want the model to generate a
    response.
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt - A whatpu is a small furry animal native to Tanzania. An example of
    a sentence using the word whatpu is: We were traveling in Africa and saw these
    very cute whatpus. "To ''farduddle''" means to jump up and down quickly. An example
    of a sentence using the word farduddle is:'
  prefs: []
  type: TYPE_NORMAL
- en: ChatGPT - When we won the game, we all started to farduddle in celebration.
  prefs: []
  type: TYPE_NORMAL
- en: According to Touvron et al. 2023[[1]](part0016.xhtml#a1W0), few-shot  properties
    first appeared when models were scaled to a sufficient size Kaplan et al., 2020[[2]](part0016.xhtml#a1W1)
    . Let us demonstrate few-shot  prompting  with an example presented by Brown et
    al. (2020)[[3]](part0016.xhtml#a1W2) . In this example, the task is to use a new
    word in a sentence correctly.
  prefs: []
  type: TYPE_NORMAL
- en: We can observe that the model has somehow learned how to perform the task by
    providing only one example (i.e., 1-shot). For more complex tasks, we can experiment
    by increasing the number of demonstrations (e.g., 3-shot, 5-shot, 10-shot, etc.).
  prefs: []
  type: TYPE_NORMAL
- en: 'Following the findings of Min et al. (2022)[[4]](part0016.xhtml#a1VU) here
    are some additional tips on demonstrations/examples when doing few-shot:'
  prefs: []
  type: TYPE_NORMAL
- en: The label spacing and layout of the input text specified by the demos are critical
    (regardless of whether the labels are correct for the individual entries).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The formatting you use also plays a crucial role in performance; even if you
    only use random tags, this is much better than not using tags.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Additional results show that selecting random labels from a valid distribution
    of labels (rather than a uniform distribution) also helps.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Let''s try some examples. First, let''s try an example with random labels (meaning
    that the negative and positive labels are randomly assigned to the entries):'
  prefs: []
  type: TYPE_NORMAL
- en: Prompt - This is unbelievable! // Negative
  prefs: []
  type: TYPE_NORMAL
- en: This is bad! // Positive
  prefs: []
  type: TYPE_NORMAL
- en: Wow, that movie was great! // Positive
  prefs: []
  type: TYPE_NORMAL
- en: What a horrible sight! //
  prefs: []
  type: TYPE_NORMAL
- en: ChatGPT - Negative
  prefs: []
  type: TYPE_NORMAL
- en: 'Even though the labels have been randomized, we still get the correct answer.
    Note that we also kept the formatting, which also helps. In fact, with more experimentation,
    the newer GPT models we are experimenting with are becoming more robust, even
    in randomized formats. Let''s look at the following example:'
  prefs: []
  type: TYPE_NORMAL
- en: There is no consistency in the above format, but the model still predicted the
    correct label. In general, it seems that providing examples helps solve some tasks.
    When zero-shot  Prompting  and few-shot  Prompting  are insufficient, it could
    mean that what the model has learned is insufficient to perform the task well.
  prefs: []
  type: TYPE_NORMAL
- en: When faced with more complex reasoning tasks, it may help to break down the
    problem into steps and demonstrate the process to the model. This is known as
    Chain-of-Thought Prompting, a technique that has gained a lot of popularity. In
    fact, it inspired the OpenAI o1 model.
  prefs: []
  type: TYPE_NORMAL
- en: 6.2.3.     Chain-of-thought (CoT) Prompting
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '![COT](image_rsrc3R6.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 7\. Image Source: Wei et al. (2022)'
  prefs: []
  type: TYPE_NORMAL
- en: Introduced in Wei et al. (2022)[[5]](part0016.xhtml#a1X6) , Chain-of-thought  (CoT)
    Prompting  enables complex reasoning abilities through intermediate reasoning
    steps. You can combine it with few-shot  Prompting  to get better results on more
    complex tasks that require reasoning before responding.
  prefs: []
  type: TYPE_NORMAL
- en: When we provide the reasoning step, we can see a perfect result. The authors
    claim this is an emergent ability that arises with large language models.
  prefs: []
  type: TYPE_NORMAL
- en: 6.2.4.     Automatic Chain-of-thought (Auto-CoT)
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'The process involves manually creating compelling and diverse examples when
    applying chain-of-thought Prompting with demonstrations. This manual effort could
    lead to suboptimal solutions. Zhang et al. (2022)[[6]](part0016.xhtml#a1WZ) proposes
    an approach to eliminate manual efforts by leveraging LLMs with "Let''s think
    step by step" prompting to generate chains of reasoning for demonstrations one
    by one. This automatic process can still end up with errors in the generated strings.
    To mitigate the effects of mistakes, the diversity of demonstrations is essential.
    This paper proposes Auto-CoT, which selects diverse questions and generates reasoning
    chains to build the demonstrations. Auto-CoT consists of two main stages:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Question grouping: Partitions the questions of a given data set into a few
    groups.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Demonstration sampling: Select a representative question from each group and
    generate its chain of reasoning using zero-shot-CoT with simple heuristics.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Simple heuristics could be the length of the questions (e.g., 60 tokens) and
    the number of steps in reasoning (e.g., five steps of reasoning). This encourages
    the model to use simple and accurate demonstrations. The process is illustrated
    below: ![AUTOCOT](image_rsrc3R7.jpg)'
  prefs: []
  type: TYPE_NORMAL
- en: 'Figure 8\. Self-CoT reasoning process. Source: Zhang et al. (2022)'
  prefs: []
  type: TYPE_NORMAL
- en: 6.2.5.     Prompt chaining
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: One crucial technique in prompt engineering is to decompose tasks into subtasks
    to improve the reliability and performance of LLMs. Once those subtasks have been
    identified, one is presented to the LLM, and its response is used as input to
    another prompt. This is known as prompt chaining, where a task is broken down
    into subtasks to create a chain of prompt operations.
  prefs: []
  type: TYPE_NORMAL
- en: Prompt chaining helps perform complex tasks that an LLM might have difficulty
    addressing if presented with a detailed prompt. In prompt chaining, the chained
    prompts perform additional processing on the generated responses before arriving
    at a desired end state.
  prefs: []
  type: TYPE_NORMAL
- en: In addition to achieving better performance, prompt chaining helps increase
    the LLM's transparency, controllability, and reliability. This means you can easily
    debug problems with model responses and analyze and improve performance at different
    stages that need improvement.
  prefs: []
  type: TYPE_NORMAL
- en: Prompt chaining can be used in different scenarios involving various operations
    or transformations. For example, a typical use case for LLMs involves answering
    questions about a long document. It is helpful if you design two different prompts,
    where the first prompt is responsible for extracting relevant quotes to answer
    a question, and the second prompt takes the quotes and the original document as
    input to answer the given question. In other words, you will create two prompts
    to answer a given question in a document.
  prefs: []
  type: TYPE_NORMAL
- en: The first prompt below extracts the relevant quotes from the document given
    the question. Note that, for simplicity, we have added a placeholder for the document
    {{document}}. You can copy and paste an article from any website to test the prompt.
    In this case, it has been done on a prompts engineering page. Because of the larger
    context used for this task, we are using the OpenAI GPT-4o model. You can use
    the prompt with other LLMs like Claude.
  prefs: []
  type: TYPE_NORMAL
- en: Prompt - You are a helpful assistant. Your task is to help answer a given question
    in a paper. The first step is to extract quotes relevant to the question from
    the document. Please display the list of quotes using <quotes></quotes>. Respond
    with "No relevant quotes found!" if no relevant quotes were found.
  prefs: []
  type: TYPE_NORMAL
- en: '{{document}}'
  prefs: []
  type: TYPE_NORMAL
- en: ChatGPT
  prefs: []
  type: TYPE_NORMAL
- en: <quotes>
  prefs: []
  type: TYPE_NORMAL
- en: '- Chain-of-thought (CoT) prompting[27].'
  prefs: []
  type: TYPE_NORMAL
- en: '- Generated knowledge prompting[37]'
  prefs: []
  type: TYPE_NORMAL
- en: '- Directional-stimulus prompting[46]'
  prefs: []
  type: TYPE_NORMAL
- en: '- Textual inversion and embeddings[59]'
  prefs: []
  type: TYPE_NORMAL
- en: '- Using gradient descent to search for prompts[61][62][63][64]'
  prefs: []
  type: TYPE_NORMAL
- en: '- Prompt injection[65][66][66][67]'
  prefs: []
  type: TYPE_NORMAL
- en: </quotes>
  prefs: []
  type: TYPE_NORMAL
- en: 'The citations returned at the first prompt can now be used as input for the
    second prompt below. You can clean up the citations more, i.e., remove the bibliographic
    citations. Those citations could be removed or used as part of another prompt
    in the string, but you can ignore this for now. The second prompt then takes the
    relevant citations extracted by the first prompt and prepares a valuable answer
    to the question given in the document and those extracted citations. The second
    prompt can be as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: Prompt - Given a set of relevant quotes (delimited by <quotes></quotes>) extracted
    from a document and the original document, please compose an answer to the question.
    Make sure the answer is accurate, has a friendly tone, and sounds useful.
  prefs: []
  type: TYPE_NORMAL
- en: '{{document}}'
  prefs: []
  type: TYPE_NORMAL
- en: <quotes>
  prefs: []
  type: TYPE_NORMAL
- en: '- Chain-of-thought (CoT) prompting[27].'
  prefs: []
  type: TYPE_NORMAL
- en: '- Generated knowledge prompting[37]'
  prefs: []
  type: TYPE_NORMAL
- en: '- Directional-stimulus prompting[46]'
  prefs: []
  type: TYPE_NORMAL
- en: '- Textual inversion and embeddings[59]'
  prefs: []
  type: TYPE_NORMAL
- en: '- Using gradient descent to search for prompts[61][62][63][64]'
  prefs: []
  type: TYPE_NORMAL
- en: '- Prompt injection[65][66][66][67]'
  prefs: []
  type: TYPE_NORMAL
- en: </quotes>
  prefs: []
  type: TYPE_NORMAL
- en: ChatGPT -
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompting techniques mentioned in the document include:'
  prefs: []
  type: TYPE_NORMAL
- en: Chain-of-thought (CoT) Prompting[27].
  prefs: []
  type: TYPE_NORMAL
- en: Generated knowledge Prompting[37]
  prefs: []
  type: TYPE_NORMAL
- en: Least-to-most Prompting[38]
  prefs: []
  type: TYPE_NORMAL
- en: Self-consistency decoding[39]
  prefs: []
  type: TYPE_NORMAL
- en: Complexity-based Prompting[41]
  prefs: []
  type: TYPE_NORMAL
- en: Self-refine[42]
  prefs: []
  type: TYPE_NORMAL
- en: Tree-of-thought Prompting[43]
  prefs: []
  type: TYPE_NORMAL
- en: Maieutic Prompting[45]
  prefs: []
  type: TYPE_NORMAL
- en: Directional-stimulus Prompting[46]
  prefs: []
  type: TYPE_NORMAL
- en: Textual inversion and embeddings[59]
  prefs: []
  type: TYPE_NORMAL
- en: Using gradient descent to search for prompts[61][62][63][64]
  prefs: []
  type: TYPE_NORMAL
- en: Prompt injection[65][66][66][67]
  prefs: []
  type: TYPE_NORMAL
- en: Each of these techniques employs unique strategies to enhance or specify interactions
    with extensive language models to produce the desired results.
  prefs: []
  type: TYPE_NORMAL
- en: As you can see, simplifying and creating prompt strings is a valuable approach
    where answers must undergo various operations or transformations. As an exercise,
    feel free to design a prompt that removes the bibliographic citations (e.g., [27])
    from the answer before taking this as a final answer.
  prefs: []
  type: TYPE_NORMAL
- en: You can also find more examples of prompts chaining in this documentation[[7]](part0016.xhtml#a1WG)
    which is supported by LLM Claude. This example is inspired and adapted from his
    documents.
  prefs: []
  type: TYPE_NORMAL
- en: 6.2.6.     Tree of Thoughts (ToT)
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Traditional prompting techniques are insufficient for complex tasks that require
    exploration or strategic planning. Yao et al. (2023)[[8]](part0016.xhtml#a1VG)
    and Long (2023)[[9]](part0016.xhtml#a1VH) proposed the Tree of Thoughts (ToT),
    a framework that encourages the exploration of ideas as intermediate steps to
    solve problems with language models.
  prefs: []
  type: TYPE_NORMAL
- en: ToT maintains a thought tree, where each is an intermediate step toward the
    solution. This approach allows the model to self-assess progress through a deliberate
    process. In addition, it combines thought generation and evaluation with search
    algorithms, such as breadth-first and depth-first search, to systematically explore
    possible solutions.
  prefs: []
  type: TYPE_NORMAL
- en: 'The ToT framework is illustrated below:'
  prefs: []
  type: TYPE_NORMAL
- en: '![TOT](image_rsrc3R8.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 9\. Image Source: Yao et el. (2023)'
  prefs: []
  type: TYPE_NORMAL
- en: When using ToT, different tasks require defining the number of candidates and
    the number of thoughts/steps. For example, as demonstrated in the paper, the Set
    of 24 is used as a mathematical reasoning task that requires decomposing thoughts
    into three steps, each involving an intermediate equation. At each step, the best
    b=5 candidates are kept.
  prefs: []
  type: TYPE_NORMAL
- en: To perform a breadth-first search (BFS) in ToT for the Game of 24 tasks, the
    language model is asked to evaluate each thought candidate as "sure/maybe/impossible"
    concerning reaching 24\. According to the authors, "the goal is to promote correct
    partial solutions that can be verified within a few trials of anticipation, and
    to eliminate impossible partial solutions based on the common sense of 'too big/small’
    and keep the rest as 'maybe'". Values are sampled 3 times for each thought.
  prefs: []
  type: TYPE_NORMAL
- en: 'The process is illustrated below:'
  prefs: []
  type: TYPE_NORMAL
- en: '![TOT2](image_rsrc3R9.jpg)'
  prefs: []
  type: TYPE_IMG
- en: The results reported in the figure below show that ToT substantially outperforms
    the other Prompting  methods. The code is available here[[10]](part0016.xhtml#a1WH)
    and here[[11]](part0016.xhtml#a1WJ).
  prefs: []
  type: TYPE_NORMAL
- en: '![TOT3](image_rsrc3RA.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 10\. Image Source: Yao et el. (2023)'
  prefs: []
  type: TYPE_NORMAL
- en: The main ideas of Yao et al. (2023)[[12]](part0016.xhtml#a1X2) and Long (2023)[[13]](part0016.xhtml#a1X3)
    are similar. Both improve the ability of LLMs to solve complex problems through
    tree search via a multi-round conversation. One of the main differences is that
    Yao et al. (2023) uses depth-first search (DFS), breadth-first search (BFS), and
    beam search (Beam Search), while the tree search strategy (i.e. when to backtrack
    and backtrack how many levels, etc.) proposed by Long (2023) is driven by a "ToT
    Controller" trained via reinforcement learning (RL). DFS/BFS/Beam searches are
    generic solution-finding strategies without adaptation to specific problems. In
    comparison, a ToT Controller trained by RL could learn from new data sets, and
    therefore, this system can continue to evolve and learn new knowledge even with
    a fixed LLM.
  prefs: []
  type: TYPE_NORMAL
- en: Prompt - Imagine that three different experts are answering this question. All
    experts will write a passage of their thinking, then share it with the group.
    Then all the experts will move on to the next step, etc. If any expert realizes
    that he or she is wrong at any point, he or she will withdraw. The question is.
  prefs: []
  type: TYPE_NORMAL
- en: 'Hulbert (2023)[[14]](part0016.xhtml#a1XJ) has proposed Thought Tree Prompting,
    which applies the main concept of ToT frames as a simple Prompting  technique
    by having the LLM evaluate intermediate thoughts in a single prompt. An example
    ToT prompt is:'
  prefs: []
  type: TYPE_NORMAL
- en: Sun (2023)[[15]](part0016.xhtml#a1XK) compared Thought Tree Prompting  with
    large-scale experiments and introduced PanelGPT, a Prompting  idea with panel
    discussions among LLMs.
  prefs: []
  type: TYPE_NORMAL
- en: 6.2.7.     Automatic Prompts Engineer (APE)
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Zhou et al. (2022)[[16]](part0016.xhtml#a1W7) proposes the automatic prompt
    engineer (APE), a framework for automatic instruction generation and selection.
    The instruction generation problem is posed as a natural language synthesis, approached
    as a black-box optimization problem using LLMs to generate and search for candidate
    solutions.
  prefs: []
  type: TYPE_NORMAL
- en: The first step involves a large language model (such as an inference model)
    given output demonstrations to generate instruction candidates for a task. These
    candidate solutions will guide the fetch procedure. Instructions are executed
    using an objective model, and then the most appropriate instruction is selected
    based on computed evaluation scores.
  prefs: []
  type: TYPE_NORMAL
- en: APE discovers a better chain reasoning prompt (zero-shot  CoT) than the human-designed
    prompt "Let's think step by step" (Kojima et al., 2022[[17]](part0016.xhtml#a1XE)
    ). The prompt "Let's solve this step-by-step to ensure we have the right answer"
    causes the model to reason in a chain and improves performance on the MultiArith
    and GSM8K benchmarks.
  prefs: []
  type: TYPE_NORMAL
- en: '![APECOT](image_rsrc3RB.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 11\. Image source: Zhou et al., (2022).'
  prefs: []
  type: TYPE_NORMAL
- en: 'This article touches on an important topic related to prompt engineering: automatically
    optimizing prompts. Although we do not discuss this topic in depth in this book,
    below are some critical articles if you are interested in further information.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt-OIRL[[18]](part0016.xhtml#a1X0) : proposes to use offline inverse reinforcement
    learning to generate query-dependent prompts.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'OPRO[[19]](part0016.xhtml#a1WK): introduces the idea of using LLMs to optimize
    prompts. For example, letting LLMs "Take a deep breath" improves performance on
    mathematical problems.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'AutoPrompt[[20]](part0016.xhtml#a1VC): proposes an approach to automatically
    create prompts for a diverse set of tasks based on gradient-guided search.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Prefix Tuning[[21]](part0016.xhtml#a1W5): a lightweight alternative to fine-tuning
    that prefixes a trainable continuous prefix for NLG tasks.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Prompt Tuning[[22]](part0016.xhtml#a1WP): proposes a mechanism for learning
    soft prompts through backpropagation.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 6.2.8.     ReAct prompting
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Yao et al., 2022[[23]](part0016.xhtml#a1W6) introduced a framework called ReAct,
    where LLMs generate reasoning traces and task-specific actions interleaved.
  prefs: []
  type: TYPE_NORMAL
- en: Generating reasoning traces allows the model to induce, track, and update action
    plans and even handle exceptions. The action step provides for interaction with
    and gathering information from external sources, such as knowledge bases or environments.
    The ReAct framework can enable LLMs to interact with external tools to retrieve
    additional information, leading to more reliable and factual answers.
  prefs: []
  type: TYPE_NORMAL
- en: The results show that ReAct can outperform several state-of-the-art models in
    language and decision-making tasks. ReAct also improves the human interpretability
    and reliability of LLMs. Overall, the authors found that the best approach uses
    ReAct combined with Chain-of-thought  (CoT), which allows using internal knowledge
    and external information obtained during reasoning.
  prefs: []
  type: TYPE_NORMAL
- en: And how exactly does it work? ReAct is inspired by the synergies between "acting"
    and "reasoning" that enable humans to learn new tasks and make decisions or reasoning.
    Chain-of-thought  (CoT) Prompting  has demonstrated the abilities of LLMs to perform
    reasoning tasks and generate answers to questions involving arithmetic and commonsense
    reasoning, among other tasks (Wei et al., 2022[[24]](part0016.xhtml#a1XM) ). However,
    their lack of access to the external world or inability to update their knowledge
    can lead to problems such as fact hallucinations and error propagation.
  prefs: []
  type: TYPE_NORMAL
- en: ReAct is a general paradigm that combines reasoning and action with LLMs. ReAct
    prompts LLMs to generate verbal reasoning traces and actions for a task. This
    allows the system to perform dynamic reasoning to create, maintain, and adjust
    action plans while allowing interaction with external environments (e.g., Wikipedia)
    to incorporate additional information into the reasoning. The Figure 12 below
    is an example of ReAct and the steps to answer a question.
  prefs: []
  type: TYPE_NORMAL
- en: 'In the following example, we pass a prompt like the following question:'
  prefs: []
  type: TYPE_NORMAL
- en: Prompt - Other than the Apple Remote, what other devices can control the software
    that the Apple Remote was originally designed to interface with?
  prefs: []
  type: TYPE_NORMAL
- en: '![REACT](image_rsrc3RC.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 12\. Image source: Yao et al., 2022.'
  prefs: []
  type: TYPE_NORMAL
- en: It should be noted that contextual examples are also added to the prompt, but
    we exclude them here for simplicity. We can see that the model generates task
    resolution trajectories (Thought, Action). Obs corresponds to the observation
    of the environment being interacted with (e.g., the search engine). ReAct can
    retrieve information to support reasoning, while reasoning helps identify what
    to retrieve next.
  prefs: []
  type: TYPE_NORMAL
- en: 'To demonstrate how ReAct Prompting  works, let''s follow an example from the
    article. The first step is to select cases from a training set (e.g., HotPotQA)
    and compose trajectories in ReAct format. These are used as few-shot  examples
    in the prompts. The trajectories consist of multiple thought-action-observation
    steps, as shown in the figure above. Free-form thoughts perform different tasks,
    such as decomposing questions, extracting information, performing common-sense
    or arithmetic reasoning, guiding the formulation of searches, and synthesizing
    the final answer. Here is an example of what the ReAct prompt examples look like
    (obtained from the article and shortened to a single instance for simplicity):'
  prefs: []
  type: TYPE_NORMAL
- en: Prompt
  prefs: []
  type: TYPE_NORMAL
- en: 'Question: What is the elevation range of the area to which the eastern sector
    of the Colorado orogeny extends?'
  prefs: []
  type: TYPE_NORMAL
- en: 'Thought 1: I need to look up the Colorado orogeny, find the area to which the
    eastern sector of the Colorado orogeny extends, and then find the elevation range
    of the area.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Action 1: Search [Colorado orogeny].'
  prefs: []
  type: TYPE_NORMAL
- en: 'Observation 1: The Colorado orogeny was an episode of mountain formation (an
    orogeny) in Colorado and surrounding areas.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Thought 2: It does not mention the eastern sector. So I need to look for the
    eastern sector.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Action 2: Search [eastern sector].'
  prefs: []
  type: TYPE_NORMAL
- en: 'Observation 2: (Result 1 / 1) The eastern sector extends into the High Plains
    and is called the Central Plains orogeny.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Thought 3: The eastern sector of the Colorado orogeny extends into the High
    Plains. So I need to look for High Plains and find its elevation range....'
  prefs: []
  type: TYPE_NORMAL
- en: 'Action 3: Search [High Plains].'
  prefs: []
  type: TYPE_NORMAL
- en: 'Comment 3: High Plains refers to one of two distinct land regions.'
  prefs: []
  type: TYPE_NORMAL
- en: It should be noted that different prompt configurations are used for other types
    of tasks. For tasks where reasoning is of primary importance (e.g., HotPotQA),
    multiple thought-action-observation steps are used for the task resolution path.
    For decision-making tasks involving many action steps, thoughts are used more
    sporadically.
  prefs: []
  type: TYPE_NORMAL
- en: The paper first evaluates ReAct on knowledge-intensive reasoning tasks, such
    as question answering (HotPotQA) and fact-checking (Fever). PaLM-540B is used
    as the base model for Prompting.
  prefs: []
  type: TYPE_NORMAL
- en: '![REACT1](image_rsrc3RD.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 13\. Image Source: Yao et al., 2022.'
  prefs: []
  type: TYPE_NORMAL
- en: Prompting  results in HotPotQA and Fever using different Prompting  methods
    show that ReAct generally performs better than Act (which involves only Act) in
    both tasks.
  prefs: []
  type: TYPE_NORMAL
- en: 'We can also observe that ReAct outperforms CoT on Fever and lags behind CoT
    on HotPotQA. A detailed error analysis is provided in the article. Bottom line:'
  prefs: []
  type: TYPE_NORMAL
- en: CoT suffers from factual hallucination.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The structural restriction of ReAct reduces its flexibility in formulating reasoning
    steps.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: ReAct relies heavily on the information it retrieves; uninformative search results
    derail the model's reasoning and make it difficult to recover and reformulate
    thoughts.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Prompting  methods that combine and support switching between ReAct and CoT+Self-Consistency
    generally outperform all other Prompting  methods.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'The paper also presents results demonstrating ReAct''s performance on decision-making
    tasks. React is evaluated on two benchmarks: ALFWorld (a text-based game) and
    WebShop (an online shopping website environment). Both involve complex environments
    that require reasoning to act and explore effectively.'
  prefs: []
  type: TYPE_NORMAL
- en: It should be noted that the ReAct prompts are designed differently for these
    tasks while maintaining the same central idea of combining reasoning and action.
    An example is shown below [Figure 14 of an ALFWorld problem involving ReAct Prompting.
  prefs: []
  type: TYPE_NORMAL
- en: ReAct outperforms Act in both ALFWorld and WebShop. Act, without any thinking,
    fails to decompose targets into sub-targets correctly. Reasoning seems advantageous
    in ReAct for these types of tasks, but current Prompting-based methods are still
    far from the performance of human experts on these tasks. See the article for
    more detailed results.
  prefs: []
  type: TYPE_NORMAL
- en: '![REACT2](image_rsrc3RE.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 14\. Image source: Yao et al., 2022.'
  prefs: []
  type: TYPE_NORMAL
- en: Chapter VII
  prefs: []
  type: TYPE_NORMAL
- en: Additional Resources
  prefs: []
  type: TYPE_NORMAL
- en: 7.1.          Other AI tools
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In this section, we will explore other AI tools. While ChatGPT is one of the
    most advanced and versatile AIs available, many other options excel in specific
    areas. Below, we'll look at these tools organized by category so you can find
    the one that best fits what you want to accomplish. At the end of the chapter,
    you will have a QR to my web page with all the official links to the tools shown,
    in the same order as shown below
  prefs: []
  type: TYPE_NORMAL
- en: 7.1.1.     Writing
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Claude: AI that generates coherent, context-relevant text with improved accuracy,
    especially in long documents. The best in copywriting.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'EasyGen: A Google Chrome extension to write your first LinkedIn post in seconds.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 7.1.2.     Audio
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Udio: Create your music.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Suno: Make a song about any topic.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Play.ht: Is an AI-based text-to-speech platform for creating realistic voiceovers.
    It offers a wide range of AI-generated voices and easy-to-use features.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Heygen: AI video generation platform that allows you to create talking avatars,
    text-based videos and change faces. It offers more than 100 avatars and 300 voices
    in 40 languages.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Fliki: An AI-based text-to-speech and text-to-video platform with over 850
    voices in 77 languages, designed to quickly create audio and video content.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'ElevenLabs: develops AI-driven speech synthesis software, focusing on realistic
    text-to-speech conversion, voice cloning, and dubbing with natural human intonation
    and emotion.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 7.1.3.     Image
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Stable Diffusion: An open-source AI tool for image generation'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'DALL-E: AI program known for generating creative and detailed images from textual
    descriptions. It can be used in ChatGPT Plus.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Midjourney: The most powerful image generator on the market.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 7.1.4.     Video
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Runway: Offers a complete set of AI tools for creative projects, combining
    image, video, and text generation capabilities for various multimedia applications.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Pika: Specializes in generating photorealistic images or videos from text,
    focusing on creating highly detailed and accurate visual content.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Invideo: A video creation platform that integrates AI to simplify video editing
    and production, catering to professional and personal uses with various templates
    and tools.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Captions: The next generation of storytelling at your fingertips. Discover
    the power of AI and create studio-quality videos with just a few taps.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Sora: OpenAI''s soon-to-be-released text to video tool.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'OpusClip: This tool leverages AI to optimize video editing, focusing on automating
    tasks such as cutting, stitching, and enhancing videos. It is accessible to users
    without extensive editing experience.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 7.1.5.     Avatar
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Synthesia: Create studio-quality videos with avatars and narration in over
    130 languages. It''s as easy as making a slideshow.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Heygen: AI video generation platform offering talking avatars, text-to-video,
    and face-changing, with over 100 avatars and 300 voices in 40 languages.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'D-ID: Specializes in AI-driven facial animation and deepfake technology, enabling
    the creation of realistic digital avatars and animations from still images.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 7.1.6.     Sales
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Sybill: AI tool for sales teams, automating CRM updates and providing insights
    by analyzing non-verbal cues and generating detailed call summaries.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'SubStrata: Is a social signals intelligence platform for negotiators and sales
    professionals. It is trained to understand the "social dance" between sellers
    and buyers.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 7.1.7.     Marketing
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'CreativAI: An AI-powered platform to generate creative and unique content quickly,
    using machine learning to understand content context, brand voice, and target
    audience, automating and personalizing the content generation process.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Aidaptive: An AI tool for e-commerce and hospitality, delivering personalized
    shopping experiences and increasing conversions through predictive personalization
    and machine learning.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 7.1.8.     Academics
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Consensus: An AI-powered search engine that provides summarized knowledge of
    scientific research articles.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Perplexity: It is an alternative to traditional search engines, where you can
    pose your questions directly and receive concise and accurate answers backed by
    a set of selected sources.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Beautiful.ai: An AI tool for creating attractive and customizable presentations.
    It features professionally designed templates and visual elements that automatically
    adapt to the content, making the design process quick and easy.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Tome: AI-powered storytelling platform that allows you to create visual presentations
    and interactive documents in minutes, combining text, images, and videos in captivating
    and modern designs.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 7.2\. Prompt repositories
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt repositories are organized collections of instructions that facilitate
    interaction with LLMs, allowing you to take full advantage of their capabilities.
    These prompts are designed to assist with specific tasks, from writing to data
    analysis, and function as templates that guide the model to respond optimally.
    Here are two recommended repositories: a personal one with high-quality prompts
    and a more extensive one available online, with options for virtually any type
    of need.'
  prefs: []
  type: TYPE_NORMAL
- en: 7.2.1.     Personal collection of prompts
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Throughout these months, I have been collecting specific prompts that I have
    discovered and have turned out to be very good. Due to the extension of these,
    I have decided to create a report with all of them classified and ordered in four
    main categories:'
  prefs: []
  type: TYPE_NORMAL
- en: Marketing
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Writing
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Business
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Sales
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: All the prompts you will find are advanced, high quality and extremely useful.
    Some of them are paid prompts, which I will give you as a token of appreciation
    for buying the book.
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc3RF.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 15\. QR personal prompts collection
  prefs: []
  type: TYPE_NORMAL
- en: 7.2.2.     +2,500 Prompts for ChatGPT
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Quality is more important than quantity. Therefore, I recommend using the prompts
    provided in the previous section. However, I have a template with over 2,500 prompts
    for ChatGPT, organized by categories for those seeking a more significant number
    of prompts for inspiration or direct use. Ignacio Velasquez, the developer of
    the popular productivity application, Notion, created this impressive collection.
  prefs: []
  type: TYPE_NORMAL
- en: 'You''ll find many categories here: agriculture, blog writing, business, celebrity
    news, code interpretation, etc. Each category features a variety of prompts, with
    some offering over 100 options. Whether you need inspiration for writing about
    finance or food, want to explore the world of fiction, or are interested in email
    marketing, this site has something for everyone. The site is designed for ease
    of use. You can search by category, filter results, and sort them according to
    your needs. Each category also includes direct links, allowing you to access prompts
    easily. For instance, if you''re interested in content creation, check out the
    "Content Creation Frameworks" section, which contains 21 ready-to-use prompts.
    If Facebook advertising is more your focus, the "Facebook Ad Copy" section provides
    15 prompts to help you craft effective ads.'
  prefs: []
  type: TYPE_NORMAL
- en: '![A screenshot of a computer  Description automatically generated](image_rsrc3RG.jpg)![A
    qr code in a circle  Description automatically generated](image_rsrc3RH.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 16\. QR +2500 prompts in notion
  prefs: []
  type: TYPE_NORMAL
- en: In short, this repository is a gold mine for anyone using ChatGPT and looking
    for inspiration for their prompts. So, explore and discover all that Ignacio Velasquez
    has prepared for you!
  prefs: []
  type: TYPE_NORMAL
- en: Chapter VII
  prefs: []
  type: TYPE_NORMAL
- en: Conclusions and Future of AI
  prefs: []
  type: TYPE_NORMAL
- en: We live in a fascinating era in which AI is becoming an integral part of our
    lives. Big tech companies are investing more and more in this technology, and
    its influence on our professions and the world at large is undeniable. But what
    will the future hold, and how can we reflect on AI's impact on our society?
  prefs: []
  type: TYPE_NORMAL
- en: AI has proven to be a powerful tool to assist many professionals in different
    fields, enabling greater efficiency and productivity. As we have seen in this
    book, AI tools can help developers write code faster and more efficiently in the
    field of programming. In journalism, AI can streamline information gathering and
    analysis, while in the legal field, it can support it. It can help doctors diagnose
    diseases more accurately and develop effective treatment plans. Despite this,
    we must remember that AI cannot completely replace the human touch and critical
    judgment required in many professions. Professionals must continue to use their
    judgment, relying on their experience to ensure optimal and ethical outcomes.
  prefs: []
  type: TYPE_NORMAL
- en: This growing utility in various fields is a result of AI's astonishing progress
    in recent years after decades of effort and research. At this rate, it could soon
    interpret multiple forms of communication, such as text, images, and audio.
  prefs: []
  type: TYPE_NORMAL
- en: We must remember that practically all of humanity's knowledge is written or
    visual. From the earliest cave paintings to the latest research paper on AI, it
    has been our way of transmitting knowledge and wisdom between civilizations. Therefore,
    we can affirm that if AI continues to develop at this pace, it will be able to
    understand human language with precision, and what is more, it will become capable
    of reasoning, even at superhuman levels. If, at that point, we let AI interact
    with the world without limits, there is a risk that the technology will evolve
    beyond our understanding, which could raise concerns about its impact on humanity.
    That is why, as this technology evolves, new questions and concerns arise about
    its effect on the economy and people's lives.
  prefs: []
  type: TYPE_NORMAL
- en: Today, AI significantly influences everyday life, and its potential ability
    to transform capitalism's economic and social structure brings significant challenges
    that we must address. Just as happened during the Industrial Revolution, where
    the automation of goods production displaced many workers in agriculture and artisanal
    manufacturing, AI-driven automation could replace workers in specific industries,
    leading to more significant numbers of unemployed people. Only this time, instead
    of lower-skilled jobs being replaced, higher-skilled jobs would be replaced.
  prefs: []
  type: TYPE_NORMAL
- en: While it is true that during the Industrial Revolution, there was a loss of
    jobs, and new job opportunities were also created; the same is happening with
    AI, which is far from eliminating jobs; it has created new ones. Such is the case
    of the "request engineer," whose role is to design and formulate specific questions
    or instructions to guide an AI model such as ChatGPT so that it delivers high-quality
    and accurate answers or results.
  prefs: []
  type: TYPE_NORMAL
- en: We know that AI can increase efficiency and reduce costs, but what seems reasonable
    initially may need to be better on closer inspection. Capitalism is based on valuing
    human labor and effort. Competition between companies drives innovation and production
    efficiency, generating wealth and economic growth. If we add to the equation a
    machine that performs tasks previously exclusive to humans, the results could
    be unpredictable, as it would begin to create an immense amount of knowledge speedily
    and affordably, thus increasing efficiency in a way never seen before.
  prefs: []
  type: TYPE_NORMAL
- en: What happens when companies adopt efficiency-enhancing technologies? Since they
    cannot currently assume that there will be enough demand for all their products,
    they reduce the number of workers employed to increase their profits without significantly
    increasing total output. This situation would lead to a greater concentration
    of wealth in the hands of a few companies that can more effectively take advantage
    of these technologies.
  prefs: []
  type: TYPE_NORMAL
- en: AI algorithms are reaching into every corner and can be used to make decisions
    in employee selection processes, loan granting, and even in the administration
    of justice, which could lead to unfair or inadvertent discrimination. These ethical
    and social concerns highlight the importance of addressing the challenges presented
    by AI responsibly.
  prefs: []
  type: TYPE_NORMAL
- en: In conclusion, the future of AI is promising, but it is also full of uncertainty
    and challenges. As we move into this new era, it is critical that we address these
    concerns, working together to ensure that AI is used ethically and responsibly.
    Only then can we make the most of AI's potential to ensure a bright and prosperous
    future for all.
  prefs: []
