- en: About the authors
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Hila Paz Herszfang, with seven years of building machine learning (ML) services
    and leading teams, holds a master’s degree in information management systems and
    is completing a second master’s in data science, both from Harvard Extension School.
    She developed a *Python for MLOps* Udemy course and runs a math and tech TikTok
    channel boasting 15K followers and 300K+ likes.
  prefs: []
  type: TYPE_NORMAL
- en: Peter V. Henstock is an AI expert with 25+ years of experience at Pfizer, Incyte,
    and MIT LL. He teaches graduate software engineering and AI/ML courses at Harvard
    Extension School. He holds a PhD in AI from Purdue and seven Master’s degrees.
    Recognized as a top AI leader by DKA, Peter guides professionals in AI/ML, software,
    visualization, and statistics.
  prefs: []
  type: TYPE_NORMAL
- en: About the reviewers
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Mike Erlihson is a seasoned AI professional, leveraging his PhD in mathematics
    and extensive expertise in deep learning and data science. As a prolific scientific
    content creator and lecturer, he has reviewed approximately 500 deep learning
    papers and hosted more than 50 recorded podcasts in the field, building a substantial
    following of over 60,000 on LinkedIn. In addition to his professional work, Mike
    is committed to education and knowledge sharing in the AI community, making complex
    topics accessible through his various content platforms.
  prefs: []
  type: TYPE_NORMAL
- en: Alice Fridberg is a data science team lead with a master’s in applied statistics
    from Tel Aviv University. She specializes in innovative ML and deep learning methods
    for marketing optimization, forecasting, and user modelling. Her work earned her
    the *Top Women in Media & Ad Tech – Data Demystifiers* award. Alice in an active
    public speaker, delivering talks such as *A Brief History of Data Science* with
    the *Women on Stage* community. She also mentors students and early-career professionals
    through programs with DataHack, Women in Data Science, and Tel Aviv University.
  prefs: []
  type: TYPE_NORMAL
