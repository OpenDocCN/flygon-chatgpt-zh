  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: '"解释[Python/JavaScript等]中作用域的概念。编写一个程序，演示全局变量和局部变量之间的区别，以及它们如何影响程序的执行。"'
- en: '15: Understanding Data Structures'
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: '15: 理解数据结构'
- en: 'Prompt:'
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Write a detailed explanation of basic data structures such as stacks and queues.
    Implement these data structures in [Python/JavaScript/etc.] and demonstrate their
    operations (push, pop, enqueue, dequeue)."'
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: '"详细解释基本数据结构，如栈和队列。在[Python/JavaScript等]中实现这些数据结构，并演示它们的操作（push、pop、enqueue、dequeue）。"'
- en: '16: Writing Lambda Functions'
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: '16: 编写 Lambda 函数'
- en: 'Prompt:'
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Explain the concept of lambda (or anonymous) functions in [Python/JavaScript/etc.].
    Write a program that uses a lambda function to filter even numbers from a list."'
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: '"解释[Python/JavaScript等]中lambda（或匿名）函数的概念。编写一个程序，使用lambda函数从列表中筛选出偶数。"'
- en: '17: Explaining Boolean Logic'
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: '17: 解释布尔逻辑'
- en: 'Prompt:'
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Explain Boolean logic in programming with examples. Write a program in [Python/JavaScript/etc.]
    that uses Boolean operators to check multiple conditions (e.g., age and income
    for loan eligibility)."'
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: '"用示例解释编程中的布尔逻辑。编写一个[Python/JavaScript等]程序，使用布尔运算符检查多个条件（例如，年龄和收入以确定贷款资格）。"'
- en: '18: Generating Random Numbers'
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: '18: 生成随机数'
- en: 'Prompt:'
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Write a program in [Python/JavaScript/etc.] to generate random numbers within
    a given range. Explain how randomness is achieved in programming and its common
    use cases."'
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: '"编写一个[Python/JavaScript等]程序，在给定范围内生成随机数。解释在编程中如何实现随机性及其常见用例。"'
- en: '19: Understanding Object-Oriented Programming'
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: '19: 理解面向对象编程'
- en: 'Prompt:'
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Explain the principles of Object-Oriented Programming (OOP) in [Python/JavaScript/etc.].
    Write a program that demonstrates the use of classes, objects, inheritance, and
    encapsulation."'
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: '"解释[Python/JavaScript等]中面向对象编程（OOP）的原则。编写一个程序，演示类、对象、继承和封装的使用。"'
- en: '20: Writing Efficient Code'
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: '20: 编写高效代码'
- en: 'Prompt:'
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Explain the concept of code efficiency and Big-O notation. Write a program
    in [Python/JavaScript/etc.] that demonstrates an optimized solution for finding
    the maximum value in a list."'
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: '"解释代码效率和大O记号的概念。用[Python/JavaScript等]编写一个程序，演示寻找列表中最大值的优化解决方案。"'
- en: '21: Creating a Simple Calculator'
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: '21: 创建一个简单的计算器'
- en: 'Prompt:'
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Write a program in [Python/JavaScript/etc.] that implements a basic calculator
    with operations like addition, subtraction, multiplication, and division. Include
