  prefs: []
  type: TYPE_NORMAL
  zh: 在ChatGPT和其他语言模型的情况下，个性化指的是调整模型响应的过程，以适应特定用户的需要和偏好。这可能包括调整响应的语调、长度，甚至模型生成的内容类型，这取决于在提示中提供的指令。
- en: '****1****3****. ****Mult**i**mo**dal**:'
