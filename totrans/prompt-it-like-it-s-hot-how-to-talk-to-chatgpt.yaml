  id: totrans-546
  prefs: []
  type: TYPE_NORMAL
  zh: 继续练习。继续调整。继续构建推动想法、梦想和商业前进的对话。
- en: You’re officially a Prompt Whisperer.
  id: totrans-547
  prefs: []
