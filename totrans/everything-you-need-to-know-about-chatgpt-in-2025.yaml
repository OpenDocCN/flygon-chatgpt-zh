  zh: '**鼓励创造性和协作**：ChatGPT不是人类创造力的替代品，而是一个赋予力量的工具。将AI作为助手来改进你的想法和项目，但始终保持对创造性过程的控制。最佳使用AI的方式是作为一个伴侣，它放大你的技能，而不是作为一个取代人类劳动的工具。'
