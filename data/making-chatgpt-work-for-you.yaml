    PDF。你将在图 [10-6](#Fig6) 中看到这个样子。![一个文本界面截图，显示了关于生成 PDF 的对话。文本讨论了不支持字符（如花括号引号、破折号和表情符号）的问题，并建议用
    ASCII 等效字符替换它们。它确认了 PDF 生成成功，并提供了一个下载“Macaron Recipe PDF”的链接。](../images/641691_1_En_10_Chapter/641691_1_En_10_Fig6_HTML.jpg)
