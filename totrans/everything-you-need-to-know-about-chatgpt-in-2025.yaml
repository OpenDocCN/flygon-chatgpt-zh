    ****wo**u**l**d** ****re**m**a**in** ****prot**e**ct**ed**.'
  id: totrans-407
  prefs: []
  type: TYPE_NORMAL
  zh: 在人工智能系统中确保隐私的最广泛使用的机制之一是数据加密。加密确保即使数据在传输过程中被拦截，也无法被未授权的第三方读取或使用。加密可以应用于数据在传输（当数据在系统之间发送时）和存储（当数据存储在服务器上时）。这样，即使发生安全漏洞，敏感信息也会得到保护。
