  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: '**为了制作一个有效的提示，关注以下关键组成部分**：'
- en: '****Cla**rit**y: ****En**sur**e ****t**he** ****pr**omp**t ****i**s** ****straig**htforwa**rd
