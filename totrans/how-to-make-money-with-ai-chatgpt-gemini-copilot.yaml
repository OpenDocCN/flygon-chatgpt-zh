  type: TYPE_NORMAL
- en: '1'
  id: totrans-25
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Getting to know AI
  id: totrans-26
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Meaning of AI
  id: totrans-27
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: '![](image_rsrcBV.jpg)'
  id: totrans-28
  prefs: []
  type: TYPE_IMG
- en: AI, or Artificial Intelligence, is a branch of computer science that focuses
    on developing computer systems capable of functioning like humans. These systems
    can perform tasks that humans typically excel in, such as thinking, learning,
    problem-solving, and planning.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
- en: AI is further divided into several sub-fields, including Machine Learning, Natural
    Language Processing, Computer Vision, Linear Artificial Intelligence (Intelligent
    Agents), and Cognitive Artificial Intelligence (Knowledge-Based AI).
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
- en: AI has the potential to transform the world across economic, social, and environmental
    sectors. Presently, numerous businesses and organizations are integrating AI into
    their operations to create new opportunities and enhance work efficiency. Consequently,
    there is a growing demand for individuals with AI skills.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
- en: 'Examples of current AI applications include:'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
- en: ● Product recommendation systems (Recommendation
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
- en: Systems) on online shopping websites
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
- en: ● Automatic translation systems
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
- en: ● Face recognition systems
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
- en: ● Automatic driving systems
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
- en: ● Precision medical systems
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
- en: AI is a transformative technology with the power to significantly impact the
    world. Individuals possessing knowledge and skills in AI are likely to have better
    prospects for success in their future businesses and careers.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
- en: Types of AI Technology
  id: totrans-40
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'AI technology is categorized into the following types:'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
- en: '● Machine Learning: It is an AI technology that enables machines to learn autonomously
    based on sample data.'
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
- en: '● Artificial Neural Networks: This AI technology simulates the functioning
    of the human brain by utilizing a network of artificial nerve cells.'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
- en: '● Robots (Robotics): This AI technology enables machines to automate tasks.'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
- en: '● Natural Language Processing (NLP): NLP is an AI technology that aids machines
    in understanding and processing human language.'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
- en: '● Computer Vision: This AI technology allows machines to see and comprehend
    their environment.'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
- en: Working Principles of AI
  id: totrans-47
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'AI, or artificial intelligence, operates based on two fundamental principles:
    ● Learning:'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
- en: AI can learn from data and experiences to enhance work efficiency. Examples
    include product recommendation systems, automatic translation systems, and face
    recognition systems.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
- en: Learning techniques like machine learning, natural language processing, and
    computer vision are employed. For instance, product recommendation systems learn
    from customers' order history to suggest suitable products, automatic translation
    systems learn from extensive language pairs for accurate translations, and facial
    recognition systems learn from a database of faces to recognize various individuals.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
- en: '● Processing:'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
- en: AI processes data and makes decisions, as seen in automated driving systems
    and precision medical systems.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
- en: Processing techniques involve algorithms and neural networks. For example, autonomous
    driving systems process data from sensors like cameras, distance sensors, and
    GPS sensors to determine safe car control. Precision medicine systems process
    medical data, such as X-ray images and blood test results, for accurate disease
    diagnosis.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
- en: The working principles of AI are evolving rapidly, constantly advancing. Consequently,
    AI has the potential to revolutionize various aspects of the world, including
    the economic, social, and environmental sectors.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
- en: Benefits of AI Technology
  id: totrans-55
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'AI technology provides numerous benefits, including:'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
- en: '● Enhanced Efficiency: AI aids in analyzing data, product design, and providing
    customer service, making human work more efficient.'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
- en: '● Boosts Creativity: AI contributes to creative tasks like writing articles,
    composing songs, and designing art, fostering greater creativity in human endeavors.'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
- en: '● Improved Safety: AI plays a role in controlling machines or vehicles, thereby
    enhancing safety in various human tasks.'
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
- en: '● Increased Accessibility: AI facilitates language translation and automated
    customer service, making human work more accessible and inclusive.'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
- en: These are just a few examples of the manifold benefits that AI technology brings
    to various aspects of human work and activities.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
- en: Trends in AI Technology
  id: totrans-62
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'Future trends in AI technology include:'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
- en: '● Advances in Machine Learning: Machine learning, a core AI technique, enables
    AI to learn from data and experience. Currently, it is rapidly developing, enhancing
    AI''s ability to learn more effectively and accurately. For instance, AI can learn
    from medical data to improve disease diagnosis accuracy or predict stock prices
    more precisely using financial data.'
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
- en: '● Development of General Artificial Intelligence (General AI): General AI aims
    to develop computer systems that can emulate human capabilities in all aspects,
    such as thinking, learning, problem-solving, and planning. Although in the early
    stages of development, it is likely to progress rapidly. This development may
    lead to AI replacing humans in various fields like services, manufacturing, and
    research.'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
- en: '● Applications of AI in Various Fields: AI is being applied across society,
    impacting economic, social, and environmental sectors. Examples include the development
    of autonomous transportation systems, precision medical systems, and intelligent
    agricultural systems.'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
- en: '● Ethical and Safety Challenges: The development of AI brings ethical and security
    challenges. Concerns include potential misuse for cyberattacks or controlling
    individuals. Addressing these issues is crucial in the continued development of
    AI.'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
- en: In conclusion, AI technology is poised for rapid development, influencing every
    sector of society in the future. Individuals with knowledge and skills in AI are
    better positioned for success in business and careers.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
