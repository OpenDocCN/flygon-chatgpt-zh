- en: 'Chapter 4: Conciseness and Clarity'
  id: totrans-232
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第四章：简洁与清晰
- en: '![image](d2d_images/chapter_title_below.png)'
  id: totrans-233
  prefs: []
