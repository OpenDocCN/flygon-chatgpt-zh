- en: Retrieve Price of Bitcoin through API
  id: totrans-124
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 通过API获取比特币价格
- en: You can use programs to retrieve data from APIs. For example, let’s say we want
    to get the latest price of Bitcoin. Let’s prompt “Create a python program that
    gets the latest price of bitcoin”
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以使用程序从API中检索数据。例如，假设我们想获取比特币的最新价格。让我们提示“创建一个Python程序，获取比特币的最新价格”。
- en: '![](image_rsrc11U.jpg)'
  id: totrans-126
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrc11U.jpg)'
- en: The program retrieves the latest Bitcoin price from coingecko.com’s API.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 程序从coingecko.com的API中检索最新的比特币价格。
- en: 'So I copy and paste the code. And before running it, I install requests with:'
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 所以我复制并粘贴了代码。在运行之前，我用以下方式安装requests：
- en: pip3 install requests
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: pip3 install requests
- en: 'Now, let’s run it:'
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们运行它：
- en: '![](image_rsrc11V.jpg)'
  id: totrans-131
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrc11V.jpg)'
- en: And I get the latest price of Bitcoin!
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 我得到了最新的比特币价格！
- en: Retrieve Price of Bitcoin through Web Scraping
  id: totrans-133
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 通过网络抓取获取比特币价格
- en: Suppose we don’t want to use the API, (perhaps we don’t want to pay the API
    fees or there’s no API available), we can prompt “Create a python program that
    gets the latest price of bitcoin by scraping from a website”.
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 假设我们不想使用API（可能我们不想支付API费用或者没有可用的API），我们可以提示“创建一个Python程序，通过从网站抓取来获取比特币的最新价格”。
- en: '![](image_rsrc11W.jpg)'
  id: totrans-135
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrc11W.jpg)'
- en: 'And ChatGPT suggests using a library called BeautifulSoup, which is designed
    to parse HTML code. Let’s copy-paste this code, install the libraries and give
    it a try:'
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT建议使用一个名为BeautifulSoup的库，该库用于解析HTML代码。让我们复制粘贴此代码，安装库并尝试一下：
- en: '![](image_rsrc11X.jpg)'
  id: totrans-137
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrc11X.jpg)'
- en: Unfortunately, the Price is not found. It seems that we need to provide more
    details of the HTML structure so our program knows where to gather the price from.
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 很遗憾，价格未找到。似乎我们需要提供更多HTML结构的详细信息，以便我们的程序知道从哪里收集价格。
- en: 'What we can do is take a look at coinmarketcap.com/currencies/bitcoin/:'
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以查看coinmarketcap.com/currencies/bitcoin/：
- en: '![](image_rsrc11Y.jpg)'
  id: totrans-140
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrc11Y.jpg)'
- en: 'We have the Bitcoin price clearly showing on the left. If inspect the bitcoin
    price:'
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 我们在左侧清楚地显示了比特币价格。如果检查比特币价格：
- en: '![](image_rsrc11Z.jpg)'
  id: totrans-142
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrc11Z.jpg)'
- en: 'We can see the HTML element containing the price:'
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以看到包含价格的HTML元素：
- en: '![](image_rsrc120.jpg)'
  id: totrans-144
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrc120.jpg)'
- en: If you are an experienced developer, you might examine the path to that code,
    but we’re not going to do that.
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你是一位经验丰富的开发者，你可能会检查代码的路径，但我们不会这么做。
- en: 'Instead, we’ll copy the element:'
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 而不是，我们将复制该元素：
- en: '![](image_rsrc121.jpg)'
  id: totrans-147
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrc121.jpg)'
- en: 'And then paste it into ChatGPT:'
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 然后将它粘贴到ChatGPT：
- en: '![](image_rsrc122.jpg)'
  id: totrans-149
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrc122.jpg)'
- en: 'ChatGPT identifies that the price is stored within a span tag in the HTML structure,
    and now it’s modifying the code:'
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT确定价格存储在HTML结构中的span标签内，现在它正在修改代码：
- en: '![](image_rsrc123.jpg)'
  id: totrans-151
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc123.jpg)'
- en: 'We then copy-paste the code, run it and we get the current Bitcoin price:'
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 我们然后复制粘贴代码，运行它，我们得到当前的比特币价格：
- en: '![](image_rsrc124.jpg)'
  id: totrans-153
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc124.jpg)'
- en: Web Browsing Automation
  id: totrans-154
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 网络浏览自动化
- en: 'Let’s create a program that visit websites for us. Let’s create a Python program
    that goes to wikipedia and enters a search term input by the user:'
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们创建一个程序，为我们访问网站。让我们创建一个Python程序，访问维基百科并输入用户输入的搜索词：
- en: '![](image_rsrc125.jpg)'
  id: totrans-156
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc125.jpg)'
- en: 'And we copy-paste the code:'
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 然后我们复制粘贴代码：
- en: '![](image_rsrc126.jpg)'
  id: totrans-158
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc126.jpg)'
- en: 'Let’s run it. Let’s enter a search term *e.g.* “vibe coding”:'
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们运行它。让我们输入一个搜索词 *例如* “vibe coding”：
- en: '![](image_rsrc127.jpg)'
  id: totrans-160
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc127.jpg)'
- en: '![](image_rsrc128.jpg)'
  id: totrans-161
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc128.jpg)'
- en: The search term is entered, and we’ve navigated to the Wikipedia page!
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 搜索词已输入，我们已经导航到维基百科页面！
- en: Text to Speech
  id: totrans-163
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 文本到语音
- en: 'We’re going to use ChatGPT to turn a text into an audio file using text-to-speech
    technology. Let’s prompt it:'
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将使用ChatGPT将文本转换为音频文件，使用文本到语音技术。让我们提示它：
- en: '![](image_rsrc129.jpg)'
  id: totrans-165
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc129.jpg)'
- en: 'And it gives us:'
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 它给出了：
- en: '![](image_rsrc12A.jpg)'
  id: totrans-167
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc12A.jpg)'
- en: If we look at the code, we can see that it imports the Google Text-to-Speech
    library, from gtts import gTTS. It receives the text from the user, and then calls
    a function to create and save the audio as an MP3 file.
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们查看代码，我们可以看到它导入了Google Text-to-Speech库，from gtts import gTTS。它从用户那里接收文本，然后调用一个函数来创建并保存为MP3格式的音频文件。
- en: 'First, run: pip install gtts'
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，运行：pip install gtts
- en: Now, run the file and write something simple like, “Hello, how are you doing?”
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，运行文件并输入一些简单的内容，例如，“你好，你怎么样？”
- en: '![](image_rsrc12B.jpg)'
  id: totrans-171
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc12B.jpg)'
- en: 'The audio file will be saved as something like output.mp3:'
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 音频文件将被保存为类似output.mp3的文件：
- en: '![](image_rsrc12C.jpg)'
  id: totrans-173
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc12C.jpg)'
- en: And if you play the output, it should play “Hello. How are you doing?”. Try
    feeding it larger text and it should work fine too.
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 如果播放输出，它应该播放“你好。你怎么样？”。尝试输入更长的文本，它也应该运行良好。
- en: Changing the Voice
  id: totrans-175
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 改变声音
- en: 'Can we change the voice for the text to speech? Let’s try prompting: “can change
    the voice?”'
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 我们能否将文本转换为语音的语音改变？让我们尝试提示：“能否改变语音？”
- en: '![](image_rsrc12D.jpg)'
  id: totrans-177
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc12D.jpg)'
- en: 'It tells us to use the pyttsx3 library for different languages and accents
    and provides an updated script:'
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: 它告诉我们使用pyttsx3库来处理不同的语言和口音，并提供了更新的脚本：
- en: '![](image_rsrc12E.jpg)'
  id: totrans-179
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc12E.jpg)'
- en: 'Let’s copy-paste the code and run it:'
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们复制粘贴代码并运行它：
- en: '![](image_rsrc12F.jpg)'
  id: totrans-181
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc12F.jpg)'
- en: We are being presented with a list of voices. If we select a voice and provide
    the text, it works! Now, the voice can sound quite robotic. If you want a higher
    quality voice or even clone a famous person’s voice, we can use the Elevenlabs
    API which we will explore in the next section.
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 我们正在看到一个声音列表。如果我们选择一个声音并提供文本，它就会工作！现在，声音听起来可能相当机械。如果您想要更高品质的声音或克隆名人的声音，我们可以使用Elevenlabs
    API，我们将在下一节中探讨。
- en: Generate a Voice Clone with the Elevenlabs API
  id: totrans-183
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用Elevenlabs API生成声音克隆
- en: To be able to generate a voice clone, there are a variety of services to do
    so. One of the most popular is by the company called ElevenLabs. You need to first
    provide them with a voice sample.
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 要生成一个声音克隆，有多种服务可以实现。其中最受欢迎的是由ElevenLabs公司提供的服务。您需要首先向他们提供一个声音样本。
- en: 'The voice cloning service is a paid service. It’s $11 per month for the most
    popular plan:'
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: 语音克隆服务是一项付费服务。最受欢迎的计划每月11美元：
- en: '![](image_rsrc12G.jpg)'
  id: totrans-186
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc12G.jpg)'
- en: 'Let’s prompt, “create a python program that uses the elevenlabs API to clone
    a voice and produce an audio file with user input text”:'
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们提示，“创建一个使用elevenlabs API克隆声音并使用用户输入文本生成音频文件的Python程序”：
- en: '![](image_rsrc12H.jpg)'
  id: totrans-188
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc12H.jpg)'
- en: 'In the ElevenLabs dashboard, get your API key:'
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: 在ElevenLabs仪表板中，获取您的API密钥：
- en: '![](image_rsrc12J.jpg)'
  id: totrans-190
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc12J.jpg)'
- en: 'Next, in ElevenLabs, ‘Add a new voice’:'
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，在ElevenLabs中，‘添加新声音’：
- en: '![](image_rsrc12K.jpg)'
  id: totrans-192
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc12K.jpg)'
- en: 'You can choose to clone an existing voice or design a new voice from a prompt:'
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以选择克隆现有的声音或从提示中设计新的声音：
- en: '![](image_rsrc12M.jpg)'
  id: totrans-194
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc12M.jpg)'
- en: 'Choose either option. Note that you have to pay to clone a voice. When the
    voice is created, copy the voice ID:'
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: 选择任一选项。请注意，您必须付费才能克隆声音。声音创建后，复制声音ID：
- en: '![](image_rsrc12N.jpg)'
  id: totrans-196
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc12N.jpg)'
- en: 'Now that we have the API key and the voice ID, paste it in the code ChatGPT
    generates for us:'
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们有了API密钥和声音ID，将其粘贴到ChatGPT为我们生成的代码中：
- en: '![](image_rsrc12P.jpg)'
  id: totrans-198
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc12P.jpg)'
- en: 'Copy-paste into VS Code and run:'
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: 复制粘贴到VS Code并运行：
- en: '![](image_rsrc12R.jpg)'
  id: totrans-200
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc12R.jpg)'
- en: And you should hear the voice audio file (e.g. audio.mp3) for the text you have
    input!
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
  zh: 你应该会听到你输入文本的语音音频文件（例如 audio.mp3）！
- en: Email automation
  id: totrans-202
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 邮件自动化
- en: 'Sometimes we want to send emails without doing it manually one by one. Let’s
    ask for help to create some lightweight email automation. Let’s prompt ChatGPT:'
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: 有时我们想要发送电子邮件而不需要逐个手动发送。让我们请求帮助创建一些轻量级的电子邮件自动化。让我们提示 ChatGPT：
- en: “create a python program that sends an email to a list of emails that the user
    provides. ask the user for the subject and body. send the email through my personal
    gmail”
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
  zh: “创建一个 Python 程序，向用户提供的一串电子邮件发送邮件。询问用户主题和正文。通过我的个人 Gmail 发送邮件”
- en: 'ChatGPT responds with:'
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT 响应：
- en: '![](image_rsrc12S.jpg)'
  id: totrans-206
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc12S.jpg)'
- en: 'I choose the basic SMTP method (requiring App Password). And ChatGPT gives
    me the code:'
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
  zh: 我选择了基本的 SMTP 方法（需要应用程序密码）。ChatGPT 给我提供了以下代码：
- en: '![](image_rsrc12T.jpg)'
  id: totrans-208
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc12T.jpg)'
- en: You’ll need to input into the code your Gmail email address and app password.
    Take note that this is not your original gmail password, which you shouldn’t provide
    for security settings. Rather, it’s a safer app-specific App password.
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
  zh: 你需要在代码中输入你的 Gmail 电子邮件地址和应用程序密码。请注意，这不是你的原始 Gmail 密码，你不应该为了安全设置而提供。相反，这是一个更安全的特定于应用程序的应用程序密码。
- en: 'To get a App password, google ‘Google App Password’, you should be brought
    to the ‘App passwords’ site:'
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: 要获取应用程序密码，请在 Google 上搜索“Google App Password”，你应该会被带到“应用程序密码”网站：
- en: '![](image_rsrc12U.jpg)'
  id: totrans-211
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc12U.jpg)'
- en: 'Input a name *e.g.* ‘python email sender’ and it will generate you an app password:'
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
  zh: 输入一个名称 *例如* ‘python email sender’ 并生成你的应用程序密码：
- en: '![](image_rsrc12V.jpg)'
  id: totrans-213
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc12V.jpg)'
- en: 'Modify the code to include your own email and app password:'
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
  zh: 修改代码以包含你自己的电子邮件和应用程序密码：
- en: '![](image_rsrc12W.jpg)'
  id: totrans-215
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc12W.jpg)'
- en: Now, run your app. It should prompt you to enter the recipient emails, as well
    as subject and email body.
  id: totrans-216
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，运行你的应用。它应该提示你输入收件人电子邮件、主题和电子邮件正文。
- en: '![](image_rsrc12X.jpg)'
  id: totrans-217
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc12X.jpg)'
- en: 'All emails should then be sent successfully. For e.g., I received an email
    with the specified subject header and body:'
  id: totrans-218
  prefs: []
  type: TYPE_NORMAL
  zh: 所有电子邮件都应该成功发送。例如，我收到了指定主题标题和正文的电子邮件：
- en: '![](image_rsrc12Y.jpg)'
  id: totrans-219
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc12Y.jpg)'
- en: The email sending worked! You can further improve the app for *e.g.* get the
    list of emails from a text file instead of having to manually input in the Terminal.
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
  zh: 邮件发送成功了！你可以进一步改进应用，例如从文本文件中获取电子邮件列表，而不是在终端中手动输入。
- en: Computer Vision
  id: totrans-221
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 计算机视觉
- en: 'We can do a lot with computer vision. Let’s create a program that can recognize
    an image. We can prompt:'
  id: totrans-222
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以用计算机视觉做很多事情。让我们创建一个可以识别图像的程序。我们可以提示：
- en: '![](image_rsrc12Z.jpg)'
  id: totrans-223
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc12Z.jpg)'
- en: Go ahead and install the dependencies, and Google “Download imagenet_classes.txt”
    to get the file and paste it in VS Code.
  id: totrans-224
  prefs: []
  type: TYPE_NORMAL
  zh: 继续安装依赖项，并在 Google 上搜索“Download imagenet_classes.txt”以获取文件并将其粘贴到 VS Code 中。
- en: '![](image_rsrc130.jpg)'
  id: totrans-225
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc130.jpg)'
- en: ChatGPT uses several advanced computer vision libraries for image recognition,
    but we don’t need to understand the details. Let’s just copy and paste the code
    into VS Code and run it.
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT 使用了几个高级计算机视觉库进行图像识别，但我们不需要了解细节。让我们直接将代码复制粘贴到 VS Code 中并运行它。
- en: 'You might encounter an error like:'
  id: totrans-227
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能会遇到以下错误：
- en: '![](image_rsrc131.jpg)'
  id: totrans-228
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc131.jpg)'
- en: 'As suggested by ChatGPT, try disabling the SSL verification by adding the below
    two lines to download the model:'
  id: totrans-229
  prefs: []
  type: TYPE_NORMAL
  zh: 如 ChatGPT 所建议，尝试通过在下载模型时添加以下两行来禁用 SSL 验证：
- en: '![](image_rsrc132.jpg)'
  id: totrans-230
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc132.jpg)'
- en: 'Try running the program and give the path to the image to be recognized. In
    my case, I’ve passed it this image:'
  id: totrans-231
  prefs: []
  type: TYPE_NORMAL
  zh: 尝试运行程序并给出要识别的图像的路径。在我的情况下，我传递了这张图像：
- en: '![](image_rsrc133.jpg)![](image_rsrc134.jpg)'
  id: totrans-232
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc133.jpg)![图片](image_rsrc134.jpg)'
- en: And we can see the program recognizes the image as a daisy!
  id: totrans-233
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以看到程序将图像识别为雏菊！
- en: 'Now, if I can and give it the below image:'
  id: totrans-234
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，如果我可以，并给出以下图像：
- en: '![](image_rsrc135.jpg)'
  id: totrans-235
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc135.jpg)'
- en: 'It actually wrongly identify it as a starfish:'
  id: totrans-236
  prefs: []
  type: TYPE_NORMAL
  zh: 它实际上错误地将其识别为海星：
- en: '![](image_rsrc136.jpg)'
  id: totrans-237
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc136.jpg)'
- en: 'This could be because the peeled off skin could be mistaken as the legs of
    a starfish. So, we also want the program to tell us the confidence percentages
    assigned to the image. So let’s prompt:'
  id: totrans-238
  prefs: []
  type: TYPE_NORMAL
  zh: 这可能是因为剥落的皮肤可能被误认为是海星的一条腿。因此，我们也希望程序告诉我们分配给图像的置信度百分比。所以让我们提示：
- en: '![](image_rsrc137.jpg)'
  id: totrans-239
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc137.jpg)'
- en: Copy the updated code and run it again. And it shows us that it recognizes it
    as a starfish only with 46.16% confidence.![](image_rsrc138.jpg)
  id: totrans-240
  prefs: []
  type: TYPE_NORMAL
  zh: 复制更新的代码并再次运行。它显示它以 46.16% 的置信度将其识别为海星！![图片](image_rsrc138.jpg)
- en: 'Let’s try it again but with a clearer picture of a banana:'
  id: totrans-241
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们再次尝试，但这次使用一个更清晰的香蕉图片：
- en: '![](image_rsrc139.jpg)'
  id: totrans-242
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc139.jpg)'
- en: And this time, we get a more confident result!
  id: totrans-243
  prefs: []
  type: TYPE_NORMAL
  zh: 而这次，我们得到了一个更有信心的结果！
- en: '![](image_rsrc13A.jpg)'
  id: totrans-244
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc13A.jpg)'
- en: Chapter 3 - Creating and Hosting Websites
  id: totrans-245
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第三章 - 创建和托管网站
- en: 'You can use ChatGPT to create simple or more complex websites. Let’s start
    with a simple website:'
  id: totrans-246
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以使用ChatGPT创建简单或更复杂的网站。让我们从一个简单的网站开始：
- en: “Create a Python program for a personal page with a logo in the center, and
    links to my YouTube, Twitter, and Gumroad page. The design should be modern and
    minimalist.”
  id: totrans-247
  prefs: []
  type: TYPE_NORMAL
  zh: “创建一个带有中心标志的个人页面Python程序，并链接到我的YouTube、Twitter和Gumroad页面。设计应该是现代和简约的。”
- en: '![](image_rsrc13B.jpg)'
  id: totrans-248
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc13B.jpg)'
- en: 'ChatGPT suggests using Flask to render the website. We have to create a ‘templates’
    folder with a ‘index.html’ with the following code: ![](image_rsrc13C.jpg)'
  id: totrans-249
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT建议使用Flask来渲染网站。我们必须创建一个包含“index.html”的“templates”文件夹，其代码如下：![图片](image_rsrc13C.jpg)
- en: 'Make sure you replace the Youtube, Twitter and Gumroad links with your own:
    …'
  id: totrans-250
  prefs: []
  type: TYPE_NORMAL
  zh: 确保您将YouTube、Twitter和Gumroad链接替换为您自己的：…
- en: <body>
  id: totrans-251
  prefs: []
  type: TYPE_NORMAL
  zh: <body>
- en: <div class="logo"></div>
  id: totrans-252
  prefs: []
  type: TYPE_NORMAL
  zh: <div class="logo"></div>
- en: <div class="links">
  id: totrans-253
  prefs: []
  type: TYPE_NORMAL
  zh: <div class="links">
- en: <a href="https://www.youtube.com/@codeschool-r8q" target="_blank">YouTube</a>
    <a href="https://x.com/greglim81" target="_blank">Twitter</a> <a href="https://greglim.gumroad.com/"
    target="_blank">Gumroad</a> </div>
  id: totrans-254
  prefs: []
  type: TYPE_NORMAL
  zh: '[YouTube](https://www.youtube.com/@codeschool-r8q) [Twitter](https://x.com/greglim81)
    [Gumroad](https://greglim.gumroad.com/)'
- en: </body>
  id: totrans-255
  prefs: []
  type: TYPE_NORMAL
  zh: </body>
- en: …
  id: totrans-256
  prefs: []
  type: TYPE_NORMAL
  zh: …
- en: 'I also ask ChatGPT to generate a logo for me:'
  id: totrans-257
  prefs: []
  type: TYPE_NORMAL
  zh: 我还要求ChatGPT为我生成一个标志：
- en: '![](image_rsrc13D.jpg)'
  id: totrans-258
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc13D.jpg)'
- en: Download it and place it in a ‘static’ folder.
  id: totrans-259
  prefs: []
  type: TYPE_NORMAL
  zh: 下载它并将其放置在“static”文件夹中。
- en: 'Finally, copy-paste the main code into a python file and run it: ![](image_rsrc13E.jpg)'
  id: totrans-260
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，将主要代码复制粘贴到一个Python文件中并运行它：![图片](image_rsrc13E.jpg)
- en: 'The site will be running locally, in my case: 127.0.0.1:5000'
  id: totrans-261
  prefs: []
  type: TYPE_NORMAL
  zh: 网站将在本地运行，以我的情况为例：127.0.0.1:5000
- en: '![](image_rsrc13F.jpg)'
  id: totrans-262
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc13F.jpg)'
- en: 'Let’s take a look at it and it’s done! We have a nice logo in the center and
    links to my personal YouTube, Google, and Gumroad page: ![](image_rsrc13G.jpg)'
  id: totrans-263
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看它，完成了！我们在中心有一个漂亮的标志，并链接到我的个人YouTube、Google和Gumroad页面：![图片](image_rsrc13G.jpg)
- en: Improving Our Website
  id: totrans-264
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 改进我们的网站
- en: 'Suppose we want to improve our website. Let’s ask ChatGPT, “how can I make
    this site more complex”:'
  id: totrans-265
  prefs: []
  type: TYPE_NORMAL
  zh: 假设我们想要改进我们的网站。让我们询问ChatGPT，“我如何使这个网站更复杂”：
- en: '![](image_rsrc13H.jpg)'
  id: totrans-266
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc13H.jpg)'
- en: 'Let’s try the first suggestion to add a dark/light mode toggle: “Add a button
    that switches between dark and light themes for better user experience.”'
  id: totrans-267
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们尝试第一个建议来添加暗/亮模式切换：“添加一个按钮，在暗色和亮色主题之间切换，以获得更好的用户体验。”
- en: '![](image_rsrc13J.jpg)'
  id: totrans-268
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc13J.jpg)'
- en: Let’s copy and paste the updated code, and now we have dark/light mode!
  id: totrans-269
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们复制粘贴更新的代码，现在我们有了暗/亮模式！
- en: '![](image_rsrc13K.jpg)![](image_rsrc13M.jpg)'
  id: totrans-270
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc13K.jpg)![图片](image_rsrc13M.jpg)'
- en: 'Now, let’s say I want to “Embed my latest Twitter posts without using the Twitter
    API”: ![](image_rsrc13N.jpg)'
  id: totrans-271
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，假设我想“在不使用Twitter API的情况下嵌入我的最新Twitter帖子”：![图片](image_rsrc13N.jpg)
- en: 'It updates my index.html with a twitter widget:'
  id: totrans-272
  prefs: []
  type: TYPE_NORMAL
  zh: 它更新了我的index.html，并添加了一个Twitter小部件：
- en: '![](image_rsrc13P.jpg)'
  id: totrans-273
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc13P.jpg)'
- en: 'What if we want to change the page layout to make the Twitter widget wider?
    Let’s prompt ChatGPT: ![](image_rsrc13R.jpg)'
  id: totrans-274
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们想更改页面布局以使Twitter小部件更宽，让我们提示ChatGPT：![图片](image_rsrc13R.jpg)
- en: 'Copy-paste the updated index.html and now we have: ![](image_rsrc13S.jpg)'
  id: totrans-275
  prefs: []
  type: TYPE_NORMAL
  zh: 复制粘贴更新的index.html，现在我们有了：![图片](image_rsrc13S.jpg)
- en: I hope you get the idea, simply prompt ChatGPT on suggestions to improve your
    site and choose a specific one to implement, and the next, and the next!
  id: totrans-276
  prefs: []
  type: TYPE_NORMAL
  zh: 我希望你能理解这个想法，只需简单地提示ChatGPT提出改进你网站的建议，并选择一个具体的建议来实施，然后是下一个，再下一个！
- en: Hosting your code
  id: totrans-277
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 代码托管
- en: After creating programs that run on your machine, you might be interested in
    making them accessible to other users or yourself by deploying them on the cloud.
  id: totrans-278
  prefs: []
  type: TYPE_NORMAL
  zh: 在创建在您的机器上运行的程序之后，您可能对通过在云上部署它们使其他用户或自己能够访问它们感兴趣。
- en: For cloud hosting there are many different providers able to host your code
    for Python. I recommend a simple service called PythonAnywhere (pythonanywhere.com).
    It provides straightforward cloud hosting.
  id: totrans-279
  prefs: []
  type: TYPE_NORMAL
  zh: 对于云托管，有许多不同的提供商能够托管您的Python代码。我推荐一个简单的服务，称为PythonAnywhere (pythonanywhere.com)。它提供直接的云托管。
- en: So, let’s illustrate how we can host the website we create previously on PythonAnywhere.
  id: totrans-280
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，让我们说明如何将我们之前创建的网站托管在PythonAnywhere上。
- en: 'PythonAnywhere.com has a free plan, so just sign up to create an account. It
    let’s you deploy one free web app: ![](image_rsrc13T.jpg)'
  id: totrans-281
  prefs: []
  type: TYPE_NORMAL
  zh: PythonAnywhere.com有一个免费计划，所以只需注册创建一个账户。它允许你部署一个免费的Web应用：![](image_rsrc13T.jpg)
- en: 'Sign in and you will be brought to the dashboard. Go to "Web":'
  id: totrans-282
  prefs: []
  type: TYPE_NORMAL
  zh: 登录后，你将被带到仪表板。转到“Web”：
- en: '![](image_rsrc13U.jpg)'
  id: totrans-283
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrc13U.jpg)'
- en: 'Add a new web app:'
  id: totrans-284
  prefs: []
  type: TYPE_NORMAL
  zh: 添加一个新的Web应用：
- en: '![](image_rsrc13V.jpg)'
  id: totrans-285
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrc13V.jpg)'
- en: 'Because ChatGPT previously directed me to use Flask in creating a web app,
    click on "Flask": ![](image_rsrc13W.jpg)'
  id: totrans-286
  prefs: []
  type: TYPE_NORMAL
  zh: 由于ChatGPT之前指导我使用Flask创建Web应用，点击“Flask”：![](image_rsrc13W.jpg)
- en: Select your Python version (if you are not sure, you can just select the latest
    version) ![](image_rsrc13X.jpg)
  id: totrans-287
  prefs: []
  type: TYPE_NORMAL
  zh: 选择你的Python版本（如果你不确定，你可以直接选择最新版本）![](image_rsrc13X.jpg)
- en: 'In the following screen, we will just use the default path provided: ![](image_rsrc13Y.jpg)'
  id: totrans-288
  prefs: []
  type: TYPE_NORMAL
  zh: 在接下来的屏幕上，我们将只使用提供的默认路径：![](image_rsrc13Y.jpg)
- en: 'And so, your web app is now set up:'
  id: totrans-289
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，你的Web应用现在已经设置好了：
- en: '![](image_rsrc13Z.jpg)'
  id: totrans-290
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrc13Z.jpg)'
- en: 'To see your web app, you can click on the URL to visit it. In my case, it’s
    my username, "greglim.pythonanywhere.com": ![](image_rsrc140.jpg)'
  id: totrans-291
  prefs: []
  type: TYPE_NORMAL
  zh: 要查看你的Web应用，你可以点击URL来访问它。以我的情况为例，是“greglim.pythonanywhere.com”：![](image_rsrc140.jpg)
- en: For now, it’s just a simple web app saying "Hello from Flask" because we haven’t
    uploaded anything yet.
  id: totrans-292
  prefs: []
  type: TYPE_NORMAL
  zh: 目前，它只是一个简单的Web应用，显示“Hello from Flask”，因为我们还没有上传任何内容。
- en: 'To change this, go to "Files" and go to "mysite" folder:'
  id: totrans-293
  prefs: []
  type: TYPE_NORMAL
  zh: 要更改这一点，请转到“文件”并进入“mysite”文件夹：
- en: '![](image_rsrc141.jpg)'
  id: totrans-294
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrc141.jpg)'
- en: 'There’s the "flask_app.py" file:'
  id: totrans-295
  prefs: []
  type: TYPE_NORMAL
  zh: 这是“flask_app.py”文件：
- en: '![](image_rsrc142.jpg)'
  id: totrans-296
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrc142.jpg)'
- en: 'This is a default file. If you click it, you’ll see "Hello from Flask"—that’s
    what’s being rendered now by PythonAnywhere: ![](image_rsrc143.jpg)'
  id: totrans-297
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个默认文件。如果你点击它，你会看到“Hello from Flask”——这就是PythonAnywhere现在正在渲染的内容：![](image_rsrc143.jpg)
- en: 'Go back to "My Sites", delete "flask_app.py" and upload our own Python file
    we created previously for our website. That’s "page.py" in my case: ![](image_rsrc144.jpg)'
  id: totrans-298
  prefs: []
  type: TYPE_NORMAL
  zh: 返回到“我的站点”，删除“flask_app.py”并上传我们之前为我们的网站创建的Python文件。以我的情况为例：“page.py”![](image_rsrc144.jpg)
- en: 'Remember that in our "My Site" folder, we also need a "templates" and “static”
    folder. So, under "Directories" type "templates" and click on "New Directory":
    ![](image_rsrc145.jpg)'
  id: totrans-299
  prefs: []
  type: TYPE_NORMAL
  zh: 记住，在我们的“我的站点”文件夹中，我们还需要一个“templates”和“static”文件夹。所以，在“目录”下输入“templates”并点击“新建目录”：![](image_rsrc145.jpg)
- en: 'Now you’re inside the "templates" folder, where you need to upload the "index.html"
    file: ![](image_rsrc146.jpg)'
  id: totrans-300
  prefs: []
  type: TYPE_NORMAL
  zh: 现在你已经进入了“templates”文件夹，你需要上传“index.html”文件：![](image_rsrc146.jpg)
- en: 'Next, back in “My Site”, create the ‘static’ folder and upload ‘logo.png’:
    ![](image_rsrc147.jpg)'
  id: totrans-301
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，回到“我的站点”，创建“static”文件夹并上传“logo.png”：![](image_rsrc147.jpg)
- en: 'Go back to "Web”:'
  id: totrans-302
  prefs: []
  type: TYPE_NORMAL
  zh: 返回到“Web”：
- en: '![](image_rsrc148.jpg)'
  id: totrans-303
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrc148.jpg)'
- en: 'Go down under "Code," and click on the "WSGI configuration file":'
  id: totrans-304
  prefs: []
  type: TYPE_NORMAL
  zh: 在“代码”下向下滚动，并点击“WSGI配置文件”：
- en: '![](image_rsrc149.jpg)'
  id: totrans-305
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrc149.jpg)'
- en: Here, change "flask_app," (the name of the file we deleted) to the file name
    you uploaded, *e.g.* ‘page’
  id: totrans-306
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，将“flask_app”（我们删除的文件名）更改为你上传的文件名，例如‘page’
- en: '![](image_rsrc14A.jpg)'
  id: totrans-307
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrc14A.jpg)'
- en: 'Basically, it’s importing from "page.py". Click "Save”. Go back to "Web," and
    reload the webpage: ![](image_rsrc14B.jpg)'
  id: totrans-308
  prefs: []
  type: TYPE_NORMAL
  zh: 基本上，它是从“page.py”导入的。点击“保存”。返回到“Web”，并重新加载网页：![](image_rsrc14B.jpg)
- en: Click the URL and you should see your webpage!
  id: totrans-309
  prefs: []
  type: TYPE_NORMAL
  zh: 点击URL，你应该能看到你的网页！
- en: '![](image_rsrc14C.jpg)'
  id: totrans-310
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrc14C.jpg)'
- en: Now it’s online, and everyone can visit it through your URL. This should now
    work the same way as it did on your localhost. So, if you manage to do this, congratulations!
    If not, drop a question to support@i-ducate.com or just read this section again
    because you might have missed some small detail.
  id: totrans-311
  prefs: []
  type: TYPE_NORMAL
  zh: 现在它已经上线，任何人都可以通过你的URL访问它。这应该和你在本地主机上的表现一样。所以，如果你成功做到了这一点，恭喜你！如果没有，可以向support@i-ducate.com发送问题，或者再次阅读这一节，因为你可能遗漏了一些小细节。
- en: 'You can also look at the "Error Logs" to see what errors you might get: ![](image_rsrc14D.jpg)'
  id: totrans-312
  prefs: []
  type: TYPE_NORMAL
  zh: 你还可以查看“错误日志”以查看你可能会遇到的错误：![](image_rsrc14D.jpg)
- en: Chapter 4 - Creating a Flappy Bird Game
  id: totrans-313
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第四章 - 创建Flappy Bird游戏
- en: Let’s explore creating multi-function projects. These are projects that are
    typically more complicated because they use multiple libraries and functions,
    requiring a bit more organization. It doesn’t mean we have to organize them perfectly,
    but understanding how code is structured helps us direct ChatGPT effectively and
    avoid mistakes.
  id: totrans-314
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们探索创建多功能项目。这些项目通常更复杂，因为它们使用了多个库和函数，需要更多的组织。这并不意味着我们必须完美地组织它们，但了解代码的结构有助于我们有效地指导ChatGPT并避免错误。
- en: 'To get started, we’ll ask ChatGPT to help us create a Flappy Bird game: ![](image_rsrc14E.jpg)'
  id: totrans-315
  prefs: []
  type: TYPE_NORMAL
  zh: 要开始，我们将要求ChatGPT帮助我们创建一个Flappy Bird游戏：![](image_rsrc14E.jpg)
- en: 'ChatGPT decides to use a library called "pygame" that’s been developed for
    simple games. The code is ready. It’s less than 100 lines: ![](image_rsrc14F.jpg)'
  id: totrans-316
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT决定使用一个名为"pygame"的库，该库是为简单游戏开发的。代码已经准备好了。它不到100行：![](image_rsrc14F.jpg)
- en: 'Let’s copy, paste, and run it. Okay, it’s like Flappy Bird, and it’s scrolling
    (contact [support@i-ducate.com](mailto:support@i-ducate.com) to get the video
    version of this chapter): ![](image_rsrc14G.jpg)'
  id: totrans-317
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们复制、粘贴并运行它。好的，它就像Flappy Bird，而且它在滚动（联系[support@i-ducate.com](mailto:support@i-ducate.com)以获取本章的视频版本）：![](image_rsrc14G.jpg)
- en: 'Let’s improve by adding scrolling clouds:'
  id: totrans-318
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们通过添加滚动云彩来改进：
- en: '![](image_rsrc14H.jpg)'
  id: totrans-319
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrc14H.jpg)'
- en: Make sure you add a cloud.png either from downloading from the Internet or have
    ChatGPT generate it for you. Copy-paste and run the code. We now having scrolling
    clouds to give the impression of the bird moving forward.
  id: totrans-320
  prefs: []
  type: TYPE_NORMAL
  zh: 确保你添加一个cloud.png，无论是从互联网下载还是让ChatGPT为你生成。复制粘贴并运行代码。我们现在有了滚动云彩，给鸟儿向前移动的印象。
- en: '![](image_rsrc14J.jpg)'
  id: totrans-321
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrc14J.jpg)'
- en: .
  id: totrans-322
  prefs: []
  type: TYPE_NORMAL
  zh: .
- en: 'We next add coins for the bird to collect:'
  id: totrans-323
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们为鸟儿添加可以收集的硬币：
- en: '![](image_rsrc14K.jpg)'
  id: totrans-324
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrc14K.jpg)'
- en: 'Copy-paste and run the code. There are now coins to collect: ![](image_rsrc14M.jpg)'
  id: totrans-325
  prefs: []
  type: TYPE_NORMAL
  zh: 复制粘贴并运行代码。现在有了可以收集的硬币：![](image_rsrc14M.jpg)
- en: 'Now, the game might be too hard to play. So, I give it the prompt: ![](image_rsrc14N.jpg)'
  id: totrans-326
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，游戏可能太难玩了。所以我给出了提示：![](image_rsrc14N.jpg)
- en: Copy-paste and run the code. And now, before the game starts, I can select the
    difficulty:.
  id: totrans-327
  prefs: []
  type: TYPE_NORMAL
  zh: 复制粘贴并运行代码。现在，在游戏开始之前，我可以选择难度：.
- en: '![](image_rsrc14P.jpg)'
  id: totrans-328
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrc14P.jpg)'
- en: 'ChatGPT also explains how they make the game either easier to harder by changing
    certain recommended values: ![](image_rsrc14R.jpg)'
  id: totrans-329
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT还解释了他们如何通过改变某些推荐值来使游戏更容易或更难：![](image_rsrc14R.jpg)
- en: 'Let’s ask ChatGPT to create some music and sound effects:'
  id: totrans-330
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们要求ChatGPT创建一些音乐和音效：
- en: '![](image_rsrc14S.jpg)'
  id: totrans-331
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrc14S.jpg)'
- en: 'You can even ask ChatGPT to provide you with the download links: ![](image_rsrc14T.jpg)'
  id: totrans-332
  prefs: []
  type: TYPE_NORMAL
  zh: 你甚至可以要求ChatGPT为你提供下载链接：![](image_rsrc14T.jpg)
- en: 'To simplify things, I just prompt it to implement the flap sound: ![](image_rsrc14U.jpg)'
  id: totrans-333
  prefs: []
  type: TYPE_NORMAL
  zh: 为了简化，我只是提示它实现拍打声音：![](image_rsrc14U.jpg)
- en: 'Sometimes, ChatGPT might not give you the entire code. You can prompt it to
    do so: ![](image_rsrc14V.jpg)'
  id: totrans-334
  prefs: []
  type: TYPE_NORMAL
  zh: 有时，ChatGPT可能不会给你完整的代码。你可以提示它这样做：![](image_rsrc14V.jpg)
- en: 'Next, let’s add music:'
  id: totrans-335
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，让我们添加音乐：
- en: '![](image_rsrc14W.jpg)'
  id: totrans-336
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrc14W.jpg)'
- en: 'In the code, it’s now loading a "music.mp3":'
  id: totrans-337
  prefs: []
  type: TYPE_NORMAL
  zh: 在代码中，现在正在加载"music.mp3"：
- en: '![](image_rsrc14X.jpg)'
  id: totrans-338
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrc14X.jpg)'
- en: 'Lastly, we tell it to change the yellow circle to a bird image: ![](image_rsrc14Y.jpg)'
  id: totrans-339
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，我们告诉它将黄色圆圈改为鸟儿图像：![](image_rsrc14Y.jpg)
- en: Okay, that’s enough as a demo. I think you get the gist of what you can do.
    It’s possible to use free assets from various libraries on the internet to create
    all kinds of games and game mechanics.
  id: totrans-340
  prefs: []
  type: TYPE_NORMAL
  zh: 好的，作为演示这就足够了。我想你已经了解了你可以做什么。你可以使用互联网上各种库中的免费资源来创建各种游戏和游戏机制。
- en: Chapter 5 - Unlocking the Power of APIs
  id: totrans-341
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第五章 - 解锁API的力量
- en: In this chapter, we dive more into exploring some popular and powerful APIs
    offered by OpenAI and Telegram. This would equip you with the skills to go and
    explore others APIs on your own.
  id: totrans-342
  prefs: []
  type: TYPE_NORMAL
  zh: 在这一章中，我们更深入地探索了OpenAI和Telegram提供的某些流行且强大的API。这将使你具备探索其他API的技能。
- en: Speech to Text and Summarizing with the OpenAI API
  id: totrans-343
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用OpenAI API进行语音转文本和摘要
- en: Now, what if we prefer to read text rather than listen to audio? We could build
    code that transcribes an audio file.
  id: totrans-344
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，如果我们更喜欢阅读文本而不是听音频呢？我们可以构建转录音频文件的代码。
- en: 'Let’s try “Create a Python program that transcribes an audio file using the
    OpenAI API”:'
  id: totrans-345
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们尝试“创建一个使用OpenAI API转录音频文件的Python程序”：
- en: '![](image_rsrc14Z.jpg)'
  id: totrans-346
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrc14Z.jpg)'
- en: 'Let’s install the openai library. Next, ChatGPT suggested using the Whisper
    model and create our own Open AI key:'
  id: totrans-347
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们安装openai库。接下来，ChatGPT建议使用Whisper模型并创建我们自己的Open AI密钥：
- en: '![](image_rsrc150.jpg)'
  id: totrans-348
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrc150.jpg)'
- en: 'Go to platform.openai.com to create your own secret key:'
  id: totrans-349
  prefs: []
  type: TYPE_NORMAL
  zh: 前往platform.openai.com创建你自己的密钥：
- en: '![](image_rsrc151.jpg)'
  id: totrans-350
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrc151.jpg)'
- en: You might need to input some initial credits to use the API *e.g.* $5 is more
    than enough.
  id: totrans-351
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能需要输入一些初始积分来使用该API，例如*例如* $5就足够了。
- en: 'Copy-paste and run the code:'
  id: totrans-352
  prefs: []
  type: TYPE_NORMAL
  zh: 复制粘贴并运行代码：
- en: '![](image_rsrc152.jpg)'
  id: totrans-353
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrc152.jpg)'
- en: 'I provide a sample .wav file and the program successfully transcribes my audio
    file:'
  id: totrans-354
  prefs: []
  type: TYPE_NORMAL
  zh: 我提供了一个样本.wav文件，程序成功转录了我的音频文件：
- en: '![](image_rsrc153.jpg)'
  id: totrans-355
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrc153.jpg)'
- en: 'Now, let’s say we don’t have time to read the transcript. Can we get a summary?
    Let’s prompt: “Modify the code to create a summary of max 100 words of the transcript.”'
  id: totrans-356
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，假设我们没有时间阅读记录。我们能得到一个摘要吗？让我们提示：“修改代码以创建最多100字的记录摘要。”
- en: 'This should be an easy task for the ChatGPT API:'
  id: totrans-357
  prefs: []
  type: TYPE_NORMAL
  zh: 这应该是ChatGPT API的一个简单任务：
- en: '![](image_rsrc154.jpg)'
  id: totrans-358
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrc154.jpg)'
- en: 'In the generated code, there is now a new function:'
  id: totrans-359
  prefs: []
  type: TYPE_NORMAL
  zh: 在生成的代码中，现在有一个新的函数：
- en: '![](image_rsrc155.jpg)'
  id: totrans-360
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrc155.jpg)'
- en: 'When we copy-paste and run our code, we get our summary:'
  id: totrans-361
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们复制粘贴并运行我们的代码时，我们会得到我们的摘要：
- en: '![](image_rsrc156.jpg)'
  id: totrans-362
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrc156.jpg)'
- en: Telegram bot
  id: totrans-363
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Telegram机器人
- en: 'Let’s create a Telegram bot that can send us the latest S&P price. Let’s prompt:
    “create a python program that sends the latest S&P price via telegram.”:'
  id: totrans-364
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们创建一个可以发送最新S&P价格的Telegram机器人。让我们提示：“创建一个通过Telegram发送最新S&P价格的python程序。”：
- en: '![](image_rsrc157.jpg)'
  id: totrans-365
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrc157.jpg)'
- en: To use this code, we need to create a Telegram bot using Telegram and a service
    called BotFather.
  id: totrans-366
  prefs: []
  type: TYPE_NORMAL
  zh: 要使用此代码，我们需要使用Telegram和名为BotFather的服务创建一个Telegram机器人。
- en: 'In Telegram, Go to the BotFather Telegram account and type /newbot:'
  id: totrans-367
  prefs: []
  type: TYPE_NORMAL
  zh: 在Telegram中，转到BotFather Telegram账户并输入/newbot：
- en: '![](image_rsrc158.jpg)'
  id: totrans-368
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrc158.jpg)'
- en: 'Choose a name—we’ll name it "VibeCodingPythonBot” (it has to be available):'
  id: totrans-369
  prefs: []
  type: TYPE_NORMAL
  zh: 选择一个名称——我们将它命名为"VibeCodingPythonBot”（它必须是可用的）：
- en: '![](image_rsrc159.jpg)'
  id: totrans-370
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrc159.jpg)'
- en: You will then receive your API token. Save it securely somewhere.
  id: totrans-371
  prefs: []
  type: TYPE_NORMAL
  zh: 您将收到您的API令牌。请将其安全地保存在某个地方。
- en: 'Next, let’s get the chat ID:'
  id: totrans-372
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，让我们获取聊天ID：
- en: '![](image_rsrc15A.jpg)'
  id: totrans-373
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrc15A.jpg)'
- en: 'First, let’s send a message to our bot first:'
  id: totrans-374
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，让我们先向我们的机器人发送一条消息：
- en: '![](image_rsrc15B.jpg)'
  id: totrans-375
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrc15B.jpg)'
- en: Then, get a chat ID by visiting api.telegram.org/bot<your_token>/getUpdates
  id: totrans-376
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，通过访问api.telegram.org/bot<your_token>/getUpdates获取聊天ID
- en: 'in your browser:'
  id: totrans-377
  prefs: []
  type: TYPE_NORMAL
  zh: 在您的浏览器中：
- en: '![](image_rsrc15C.jpg)'
  id: totrans-378
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrc15C.jpg)'
- en: Save your chat ID securely.
  id: totrans-379
  prefs: []
  type: TYPE_NORMAL
  zh: 请安全地保存您的聊天ID。
- en: 'Install the required libraries and copy-paste the code into VSCode:'
  id: totrans-380
  prefs: []
  type: TYPE_NORMAL
  zh: 安装所需的库并将代码复制粘贴到VSCode中：
- en: '![](image_rsrc15D.jpg)'
  id: totrans-381
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrc15D.jpg)'
- en: Enter your token and chat ID into the code. Take note that if you intend to
    deploy this code into production, the token and chat ID should not be stored directly
    in the code itself, you would generally use environment variables.
  id: totrans-382
  prefs: []
  type: TYPE_NORMAL
  zh: 将您的令牌和聊天ID输入到代码中。请注意，如果您打算将此代码部署到生产环境中，令牌和聊天ID不应直接存储在代码中，您通常会使用环境变量。
- en: 'Let’s run the code and it should give us the latest S&P price:'
  id: totrans-383
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们运行代码，它应该会给我们最新的S&P价格：
- en: '![](image_rsrc15E.jpg)'
  id: totrans-384
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrc15E.jpg)'
- en: Try creating more advanced bots and interactions by combining different functions.
  id: totrans-385
  prefs: []
  type: TYPE_NORMAL
  zh: 通过组合不同的功能，尝试创建更多高级的机器人和交互。
- en: Chapter 6 - Creating a RAG - Chat with PDF app
  id: totrans-386
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第6章 - 创建RAG - 与PDF应用程序聊天
- en: 'Let’s try to create a Retrieval Augmented Generation (RAG) chat with PDF app
    with this prompt:'
  id: totrans-387
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们尝试使用这个提示符创建一个带有PDF应用程序的检索增强生成（RAG）聊天：
- en: '“give me a python rag program where i can chat with pdf”: ![](image_rsrc15F.jpg)'
  id: totrans-388
  prefs: []
  type: TYPE_NORMAL
  zh: “给我一个可以与pdf聊天的python程序”：![](image_rsrc15F.jpg)
- en: 'I get a list of dependencies to install, and also the python code to chat with
    a pdf: ![](image_rsrc15G.jpg)'
  id: totrans-389
  prefs: []
  type: TYPE_NORMAL
  zh: 我得到了一个需要安装的依赖项列表，以及一个可以与pdf聊天的python代码：![](image_rsrc15G.jpg)
- en: 'However, the frontend is currently through the Terminal. Suppose I want the
    frontend to be a web UI. I can prompt: ![](image_rsrc15H.jpg)'
  id: totrans-390
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，前端目前是通过终端。假设我想让前端成为一个Web UI。我可以提示：![](image_rsrc15H.jpg)
- en: 'I can then copy-paste, and run the streamlit app with:'
  id: totrans-391
  prefs: []
  type: TYPE_NORMAL
  zh: 我可以将其复制粘贴，并使用以下命令运行streamlit应用程序：
- en: '![](image_rsrc15J.jpg)'
  id: totrans-392
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrc15J.jpg)'
- en: 'Along the way, you might get errors. But just copy-paste the error into ChatGPT
    and see how it rectifies it. For e.g., I get an empty weights error: ![](image_rsrc15K.jpg)'
  id: totrans-393
  prefs: []
  type: TYPE_NORMAL
  zh: 在过程中，您可能会遇到错误。但只需将错误复制粘贴到ChatGPT中，看看它是如何纠正的。例如，我得到一个空的权重错误：![](image_rsrc15K.jpg)
- en: I copy-paste into ChatGPT and it gives me some options to downgrade to a lower
    more compatible version of Python.
  id: totrans-394
  prefs: []
  type: TYPE_NORMAL
  zh: 我将其复制粘贴到ChatGPT中，它给了我一些选项，可以将Python版本降级到一个更低、更兼容的版本。
- en: '![](image_rsrc15M.jpg)'
  id: totrans-395
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrc15M.jpg)'
- en: Just follow the steps as prompted by ChatGPT.
  id: totrans-396
  prefs: []
  type: TYPE_NORMAL
  zh: 只需按照ChatGPT提示的步骤操作。
- en: You might get more errors along the way, but just copy-paste the errors, and
    you should soon arrive with a working app.
  id: totrans-397
  prefs: []
  type: TYPE_NORMAL
  zh: 在过程中，您可能会遇到更多错误，但只需复制粘贴错误，您应该很快就能得到一个可工作的应用程序。
- en: '![](image_rsrc15N.jpg)'
  id: totrans-398
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrc15N.jpg)'
- en: Closing Words
  id: totrans-399
  prefs: []
  type: TYPE_NORMAL
  zh: 结束语
- en: First, congratulations! You've learned to prompt LLMs to generate code and run
    it. This is your new superpower.
  id: totrans-400
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，恭喜！你已经学会了如何提示LLMs生成代码并运行它。这是你的新超能力。
- en: Now you can create programs for work, for fun, or even for one-time use. This
    is an exciting time, and I hope you’ll put this new skill to good use. I look
    forward to hearing about what you create.
  id: totrans-401
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，您可以为工作、娱乐或一次性使用创建程序。这是一个激动人心的时刻，我希望您能充分利用这项新技能。我期待着听到您创作的成果。
- en: Hopefully, you have enjoyed this book and would like to learn more from me.
    I would love to get your feedback, learning what you liked and didn't for us to
    improve.
  id: totrans-402
  prefs: []
  type: TYPE_NORMAL
  zh: 希望您喜欢这本书，并愿意从我这里学到更多。我很乐意收到您的反馈，了解您喜欢和不喜欢的地方，以便我们改进。
- en: Please feel free to email me at [support@i-ducate.com](mailto:support@i-ducate.com)
    if you encounter any errors with your code or to get updated versions of this
    book.
  id: totrans-403
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你在代码中遇到任何错误或者想要获取本书的更新版本，请随时通过电子邮件联系我：[support@i-ducate.com](mailto:support@i-ducate.com)。
- en: If you didn't like the book, or if you feel that I should have covered certain
    additional topics, please email us to let us know. This book can only get better
    thanks to readers like you. If you like the book, I would appreciate if you could
    leave us a review too. Thank you and all the best!
  id: totrans-404
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您不喜欢这本书，或者觉得我应该涵盖某些额外的主题，请通过电子邮件告诉我们。这本书会因为像您这样的读者而变得更好。如果您喜欢这本书，我也非常感谢您能给我们留下评论。谢谢，祝您一切顺利！
- en: About the Author
  id: totrans-405
  prefs: []
  type: TYPE_NORMAL
  zh: 关于作者
- en: Greg Lim is a technologist and author of several programming books. Greg has
    many years in teaching programming in tertiary institutions and he places special
    emphasis on learning by doing.
  id: totrans-406
  prefs: []
  type: TYPE_NORMAL
  zh: Greg Lim是一位技术专家，也是几本编程书籍的作者。Greg在高等教育机构教授编程已有多年经验，他特别强调通过实践学习。
- en: Contact Greg at [support@i-ducate.com](mailto:support@i-ducate.com)
  id: totrans-407
  prefs: []
  type: TYPE_NORMAL
  zh: 联系Greg：[support@i-ducate.com](mailto:support@i-ducate.com)
