- en: '![image](image/Figure_1.1.jpg)'
  id: totrans-538
  prefs: []
  type: TYPE_IMG
  zh: '![image](image/Figure_1.1.jpg)'
- en: Figure 1.1 Excel Welcome Window
  id: totrans-539
  prefs: []
  type: TYPE_NORMAL
  zh: 图1.1 Excel欢迎窗口
- en: When you open Excel by clicking its shortcut, a unique landing page known as
    the Welcome page appears. This welcome page offers various sample spreadsheets,
    such as movie lists, personal budgeting, trend, analysis, and more. Most importantly,
    it offers the Blank worksheet option, with which users can open a blank spreadsheet
    and enter the data according to their requirements. The Welcome Window of Excel
    is shown in [Figure 1.1](#fig1-1).
  id: totrans-540
  prefs: []
  type: TYPE_NORMAL
  zh: 当您通过点击快捷方式打开Excel时，会出现一个独特的登录页面，称为欢迎页面。这个欢迎页面提供了各种示例电子表格，如电影列表、个人预算、趋势分析等。最重要的是，它提供了空白工作表选项，用户可以使用它打开空白工作表并根据需要输入数据。Excel的欢迎窗口如图[图1.1](#fig1-1)所示。
- en: This window also has a text field that allows the user to search for online
    templates. This can be used to synchronize the user’s Excel interface with the
    online MS office templates library.
  id: totrans-541
  prefs: []
  type: TYPE_NORMAL
  zh: 此窗口还有一个文本字段，允许用户搜索在线模板。这可以用来同步用户的Excel界面与在线MS Office模板库。
- en: When you double-click the Blank window option, a blank spreadsheet opens, as
    shown in [Figure 1.2](#fig1-2).
  id: totrans-542
  prefs: []
  type: TYPE_NORMAL
  zh: 当您双击空白窗口选项时，会打开一个空白工作表，如图[图1.2](#fig1-2)所示。
- en: '![image](image/Figure_1.2.jpg)'
  id: totrans-543
  prefs: []
  type: TYPE_IMG
  zh: '![image](image/Figure_1.2.jpg)'
- en: Figure 1.2 Various Components of an Excel 2016 Window
  id: totrans-544
  prefs: []
  type: TYPE_NORMAL
  zh: 图1.2 Excel 2016窗口的各种组件
- en: Backstage View
  id: totrans-545
  prefs: []
  type: TYPE_NORMAL
  zh: 后台视图
- en: '![image](image/Figure_1.3.jpg)'
  id: totrans-546
  prefs: []
  type: TYPE_IMG
  zh: '![image](image/Figure_1.3.jpg)'
- en: Figure 1.3 Options Available in the Backstage View
  id: totrans-547
  prefs: []
  type: TYPE_NORMAL
  zh: 图1.3 后台视图中可用的选项
- en: 'From the Backstage view, you can manage your documents and the data related
    to them. Here, you can create, save, send, and inspect documents for hidden metadata
    or personal information. The File tab replaces the MS Office button and the File
    menu used in the earlier releases of MS Office. [Figure 1.3](#fig1-3) features
    the various options available in the Backstage view:'
  id: totrans-548
  prefs: []
  type: TYPE_NORMAL
  zh: 从后台视图，您可以管理您的文档及其相关数据。在这里，您可以创建、保存、发送和检查文档以查找隐藏的元数据或个人信息。文件选项卡取代了MS Office早期版本中使用的MS
    Office按钮和文件菜单。[图1.3](#fig1-3)展示了后台视图中可用的各种选项：
- en: 'Below are the various options available in the Backstage view:'
  id: totrans-549
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是后台视图中可用的各种选项：
- en: '■Quick Access Toolbar: This toolbar is present at the top left corner of the
    window. It contains commands for saving the current workbook and undoing and redoing
    actions. This toolbar can be customized by adding buttons for frequently used
    commands. It is movable and can be moved underneath the Ribbon.'
  id: totrans-550
  prefs: []
  type: TYPE_NORMAL
  zh: ■快速访问工具栏：此工具栏位于窗口的左上角。它包含保存当前工作簿和撤销和重做操作的命令。可以通过添加常用命令的按钮来自定义此工具栏。它是可移动的，可以移动到功能区下方。
- en: '■Ribbon: The Ribbon is organized into various tabs, with each ribbon tab activating
    a ribbon. Each tab is divided into a set of commands known as groups, which contain
    commands and options that relate to the group name.'
  id: totrans-551
  prefs: []
  type: TYPE_NORMAL
  zh: ■功能区：功能区组织成多个选项卡，每个选项卡激活一个功能区。每个选项卡分为一组称为组的命令，其中包含与组名称相关的命令和选项。
- en: '■Gallery: A Gallery may be displayed within a Ribbon, but more often, it is
    a drop-down group of commands or functions. The Gallery uses icons or other graphics
    to show the result of commands rather than the commands themselves. [Figure 1.4](#fig1-4)
    shows the gallery options.'
  id: totrans-552
  prefs: []
  type: TYPE_NORMAL
  zh: ■图库：图库可以显示在功能区中，但更常见的是一组命令或功能的下拉组。图库使用图标或其他图形来显示命令的结果，而不是命令本身。[图 1.4](#fig1-4)
    显示了图库选项。
- en: '![image](image/Figure_1.4.jpg)'
  id: totrans-553
  prefs: []
  type: TYPE_IMG
  zh: '![image](image/Figure_1.4.jpg)'
- en: Figure 1.4 Gallery Options
  id: totrans-554
  prefs: []
  type: TYPE_NORMAL
  zh: 图 1.4 图库选项
- en: Saving and Sharing Files Online
  id: totrans-555
  prefs: []
  type: TYPE_NORMAL
  zh: 在线保存和共享文件
- en: Even if you do not have MS Office 365 or any of its versions, you can still
    access and view the essentials for free online. Refer to [Figure 1.5](#fig1-5).
  id: totrans-556
  prefs: []
  type: TYPE_NORMAL
  zh: 即使你没有 MS Office 365 或其任何版本，你仍然可以免费在线访问和查看基本内容。请参阅 [图 1.5](#fig1-5)。
- en: '![image](image/Figure_1.5.jpg)'
  id: totrans-557
  prefs: []
  type: TYPE_IMG
  zh: '![image](image/Figure_1.5.jpg)'
- en: Figure 1.5 Share Option in the Backstage View
  id: totrans-558
  prefs: []
  type: TYPE_NORMAL
  zh: 图 1.5 后台视图中的共享选项
- en: Interacting with Excel
  id: totrans-559
  prefs: []
  type: TYPE_NORMAL
  zh: 与 Excel 交互
- en: There are various ways by which any user can interact with the Excel worksheet.
    These are typing or using the mouse to choose a command, make selections, click
    buttons, and other do other actions.
  id: totrans-560
  prefs: []
  type: TYPE_NORMAL
  zh: 用户可以通过多种方式与 Excel 工作表交互。这些是通过键入或使用鼠标选择命令、进行选择、点击按钮和其他操作。
- en: '■Using the Ribbon: The Ribbon is a main container for menus and tools. When
    you choose a Ribbon tab, it displays Ribbon groups, which contains tools (buttons
    and lists). Some of these tools expand to display simple lists and the gallery,
    as shown in [Figure 1.3](#fig1-3).'
  id: totrans-561
  prefs: []
  type: TYPE_NORMAL
  zh: ■使用功能区：功能区是菜单和工具的主要容器。当你选择一个功能区选项卡时，它会显示功能区组，其中包含工具（按钮和列表）。其中一些工具可以展开以显示简单的列表和图库，如图
    [图 1.3](#fig1-3) 所示。
- en: '■Using Galleries: The Gallery is an interactive list of options which display
    the option under the click command. For example, the font gallery shows a list
    of fonts available. Some galleries use live preview, so that when you move the
    pointer over the options on a gallery, each option is previewed. For example,
    if you select text in the worksheet and display the font gallery, moving the pointer
    over each font in the gallery causes the selected text on the screen to display
    in that font. Refer to [Figure 1.4](#fig1-4).'
  id: totrans-562
  prefs: []
  type: TYPE_NORMAL
  zh: ■使用图库：图库是一个交互式选项列表，点击命令后会显示选项。例如，字体图库显示可用的字体列表。一些图库使用实时预览，因此当你将指针移到图库中的选项上时，每个选项都会预览。例如，如果你在工作表中选择了文本并显示字体图库，将指针移到图库中的每个字体上会导致屏幕上选中的文本以该字体显示。请参阅
    [图 1.4](#fig1-4)。
- en: '■Using Tools: When you keep your mouse pointer over any tool, a small description
    about the tool appears, which is called a super tooltip. It provides a small description
    about the tool so you can understand what exactly the tool can do.'
  id: totrans-563
  prefs: []
  type: TYPE_NORMAL
  zh: ■使用工具：当你将鼠标指针悬停在任何工具上时，会出现一个关于该工具的小描述，这被称为超级提示。它提供了关于工具的小描述，以便你可以了解工具的确切功能。
- en: Tip  Press Alt+F4 to see the shortcuts related to the option inside the ribbon.
  id: totrans-564
  prefs: []
  type: TYPE_NORMAL
  zh: 小贴士：按 Alt+F4 键可查看功能区内部选项的快捷键。
- en: Working with Default Settings
  id: totrans-565
  prefs: []
  type: TYPE_NORMAL
  zh: 使用默认设置工作
- en: 'Excel allows you to customize various aspects, behaviors, and methods by which
    you can interact with it. You can change the default settings of Excel, including
    font, number of iterations, file locations, and the file which opens on starting
    Excel. To select the dialog box of options, you need to click the File Tab button
    and then select Options, as shown in [Figure 1.6](#fig1-6):'
  id: totrans-566
  prefs: []
  type: TYPE_NORMAL
  zh: Excel 允许你自定义与它交互的各种方面、行为和方法。你可以更改 Excel 的默认设置，包括字体、迭代次数、文件位置以及启动 Excel 时打开的文件。要选择选项对话框，需要点击文件选项卡按钮，然后选择“选项”，如图
    [图 1.6](#fig1-6) 所示：
- en: '![image](image/Figure_1.6.jpg)'
  id: totrans-567
  prefs: []
  type: TYPE_IMG
  zh: '![image](image/Figure_1.6.jpg)'
- en: Figure 1.6 Option Window of MS Excel
  id: totrans-568
  prefs: []
  type: TYPE_NORMAL
  zh: 图 1.6 MS Excel 的选项窗口
- en: 'The various options are as follows:'
  id: totrans-569
  prefs: []
  type: TYPE_NORMAL
  zh: 各种选项如下：
- en: '■Personalize Options: You can change the workbook settings by using the Personalize
    Options tool to change the type and size of the font, the number of worksheets
    in the workbook, and to activate the Developer tab, which is used for Macros.'
  id: totrans-570
  prefs: []
  type: TYPE_NORMAL
  zh: ■个性化选项：您可以通过使用个性化选项工具来更改工作簿设置，包括更改字体类型和大小、工作表数量以及激活用于宏的开发者选项卡。
- en: '■Save Option: This option allows you to change the default file location, file
    format, and Auto Recover settings of the file.'
  id: totrans-571
  prefs: []
  type: TYPE_NORMAL
  zh: ■保存选项：此选项允许您更改文件的默认位置、文件格式和自动恢复设置。
- en: '■Customize the Ribbon: In Excel, you can create custom tabs and groups, and
    rename or change the order of the built-in tabs and groups. In the Customize the
    Ribbon list, the custom tabs and groups have “custom” after the name, but the
    word “custom” does not appear in the ribbon.'
  id: totrans-572
  prefs: []
  type: TYPE_NORMAL
  zh: ■自定义功能区：在Excel中，您可以创建自定义选项卡和组，并重命名或更改内置选项卡和组的顺序。在“自定义功能区”列表中，自定义选项卡和组名称后有“自定义”字样，但在功能区中不会出现“自定义”一词。
- en: '■Adding a Custom Tab and a Custom Group: Here we have a set of steps by which
    we can add a custom tab and custom group in the ribbon. Command can be added only
    in the custom groups.'
  id: totrans-573
  prefs: []
  type: TYPE_NORMAL
  zh: ■添加自定义选项卡和自定义组：这里有一系列步骤，我们可以通过这些步骤在功能区中添加自定义选项卡和自定义组。命令只能添加到自定义组中。
- en: 'To add a custom tab, follow these steps:'
  id: totrans-574
  prefs: []
  type: TYPE_NORMAL
  zh: 要添加自定义选项卡，请按照以下步骤操作：
- en: 1. Click the File tab.
  id: totrans-575
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 点击“文件”选项卡。
- en: 2. Click the Options button under Help.
  id: totrans-576
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 点击“帮助”下的“选项”按钮。
- en: 3. Click Customize Ribbon.
  id: totrans-577
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 点击“自定义功能区”。
- en: 4. Click New Tab.
  id: totrans-578
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 点击“新建选项卡”。
- en: 5. To see and save your customizations, click OK. Refer to [Figure 1.7](#fig1-7).
  id: totrans-579
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 要查看和保存您的自定义设置，请点击“确定”。参见图1.7。
- en: '![image](image/Figure_1.7.jpg)'
  id: totrans-580
  prefs: []
  type: TYPE_IMG
  zh: '![image](image/Figure_1.7.jpg)'
- en: Figure 1.7 Steps to Customize a Custom Tab and a Custom Group
  id: totrans-581
  prefs: []
  type: TYPE_NORMAL
  zh: 图1.7 自定义自定义选项卡和自定义组的步骤
- en: Formatting of Tables
  id: totrans-582
  prefs: []
  type: TYPE_NORMAL
  zh: 表格格式化
- en: Excel provides various predefined table styles that we can use to format a table
    quickly. It is a format which is provided by Excel, so we do not have to change
    the style of or font used in the table.
  id: totrans-583
  prefs: []
  type: TYPE_NORMAL
  zh: Excel提供了各种预定义的表格样式，我们可以快速地使用这些样式来格式化表格。这是一个由Excel提供的格式，因此我们不需要更改表格的样式或字体。
- en: 'You can format the table by using the following steps:'
  id: totrans-584
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以通过以下步骤格式化表格：
- en: 1. Select the range.
  id: totrans-585
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 选择范围。
- en: 2. Select Home on Ribbon.
  id: totrans-586
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 在功能区中选择“开始”。
- en: 3. Select the Style Group.
  id: totrans-587
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 选择样式组。
- en: 4. Select the Format Table. This option opens the various format styles in the
    form of a drop-down list. By clicking on any style, you can apply it to your data.
  id: totrans-588
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 选择“格式化表格”。此选项以下拉列表的形式打开各种格式样式。通过点击任何样式，您可以将它应用到您的数据上。
- en: Paste Special Preview
  id: totrans-589
  prefs: []
  type: TYPE_NORMAL
  zh: 粘贴特殊预览
- en: Excel offers you the Paste with Live Preview feature, which enables you to save
    time when reusing content. This option helps you see the preview of various available
    paste options, such as keeping source column widths, use of borders, and whether
    or not to keep source formatting. The live preview enables you to see how your
    pasted content will look before you paste it into the worksheet. When you move
    your pointer over Paste Options to preview results, you will see a menu containing
    items that change contextually to best fit the content you are reusing. ScreenTips
    provide additional information to help you to make the right decision.
  id: totrans-590
  prefs: []
  type: TYPE_NORMAL
  zh: Excel为您提供了“粘贴并预览”功能，该功能可以在重复使用内容时节省时间。此选项可以帮助您查看各种可用的粘贴选项的预览，例如保留源列宽度、使用边框以及是否保留源格式。实时预览允许您在将内容粘贴到工作表之前看到粘贴内容的外观。当您将指针移到粘贴选项以预览结果时，您将看到一个包含根据上下文更改的项目菜单，这些项目最适合您正在重复使用的内容。屏幕提示提供额外信息，以帮助您做出正确的决定。
- en: Flash Fill
  id: totrans-591
  prefs: []
  type: TYPE_NORMAL
  zh: 快速填充
- en: 'This is an exciting new feature which promises to save time. Consider an example:
    if you write first name in Column A and last name in Column B, and want to concatenate
    both names in column C, Excel uses the Flash Fill feature to auto-fill the entire
    column, as shown in [Figure 1.8](#fig1-8) (a). As another example, suppose we
    have email addresses with full names in Column A. You can start entering the first
    names in a new column, and Excel will auto-fill the entire column, as shown in
    [Figure 1.8](#fig1-8) (b).'
  id: totrans-592
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个令人兴奋的新功能，承诺可以节省时间。考虑一个例子：如果您在列A中写入名字，在列B中写入姓氏，并且想在列C中合并这两个名字，Excel将使用快速填充功能自动填充整个列，如图1.8（a）所示。作为另一个例子，假设我们在列A中有完整的电子邮件地址。您可以在新列中开始输入名字，Excel将自动填充整个列，如图1.8（b）所示。
- en: '![image](image/Figure_1.8.jpg)'
  id: totrans-593
  prefs: []
  type: TYPE_IMG
  zh: '![image](image/Figure_1.8.jpg)'
- en: Figure 1.8 Flash Fill
  id: totrans-594
  prefs: []
  type: TYPE_NORMAL
  zh: 图1.8 快速填充
- en: Quick Data Analysis
  id: totrans-595
  prefs: []
  type: TYPE_NORMAL
  zh: 快速数据分析
- en: Quick analysis is a new tool added to Excel which enables single click access
    to data analysis features such as formulas, conditional formatting, spark lines,
    tables, charts, and Pivot Tables. You just need to select some data and right
    click and see various Quick Analysis options.
  id: totrans-596
  prefs: []
  type: TYPE_NORMAL
  zh: 快速分析是 Excel 中新增的一个工具，它允许单击访问数据分析功能，如公式、条件格式、Spark 线、表格、图表和数据透视表。您只需选择一些数据，然后右键单击，即可看到各种快速分析选项。
- en: 'In this example, there is data arranged in department-wise salary, but it needs
    to be presented in a proper format. You need to do a quick analysis. Refer to
    [Figure 1.9](#fig1-9):'
  id: totrans-597
  prefs: []
  type: TYPE_NORMAL
  zh: 在此示例中，有按部门划分的薪资数据，但需要以适当的格式展示。您需要进行快速分析。请参阅[图 1.9](#fig1-9)：
- en: '![image](image/Figure_1.9.jpg)'
  id: totrans-598
  prefs: []
  type: TYPE_IMG
  zh: '![image](image/Figure_1.9.jpg)'
- en: Figure 1.9 The Quick Data Analysis Tool
  id: totrans-599
  prefs: []
  type: TYPE_NORMAL
  zh: 图 1.9 快速数据分析工具
- en: Data Mining
  id: totrans-600
  prefs: []
  type: TYPE_NORMAL
  zh: 数据挖掘
- en: 'Advanced Excel has several features that can be used for data mining, which
    is the process of discovering patterns and insights from large datasets. Here
    are some of the key data mining features in Excel:'
  id: totrans-601
  prefs: []
  type: TYPE_NORMAL
  zh: 高级 Excel 几个功能可用于数据挖掘，即从大量数据集中发现模式和洞察的过程。以下是 Excel 中一些关键的数据挖掘功能：
- en: '■PivotTables: PivotTables allow you to summarize and analyze large datasets
    quickly and easily. You can use PivotTables to create interactive reports, identify
    trends, and discover patterns in your data. [Figure 1.10](#fig1-10) shows the
    PivotTables icon:'
  id: totrans-602
  prefs: []
  type: TYPE_NORMAL
  zh: ■数据透视表：数据透视表允许您快速轻松地汇总和分析大量数据集。您可以使用数据透视表创建交互式报告、识别趋势，并在您的数据中发现模式。[图 1.10](#fig1-10)
    展示了数据透视表的图标：
- en: '![image](image/Figure_1.10.jpg)'
  id: totrans-603
  prefs: []
  type: TYPE_IMG
  zh: '![image](image/Figure_1.10.jpg)'
- en: Figure 1.10 PivotTables
  id: totrans-604
  prefs: []
  type: TYPE_NORMAL
  zh: 图 1.10 数据透视表
- en: '■Conditional Formatting: Conditional Formatting allows you to highlight specific
    data based on certain criteria. This can be useful for identifying outliers, spotting
    trends, and identifying patterns in your data. [Figure 1.11](#fig1-11) shows the
    Conditional Formatting icon:'
  id: totrans-605
  prefs: []
  type: TYPE_NORMAL
  zh: ■条件格式：条件格式允许您根据某些标准突出显示特定数据。这有助于识别异常值、发现趋势并在您的数据中识别模式。[图 1.11](#fig1-11) 展示了条件格式的图标：
- en: '![image](image/Figure_1.11.jpg)'
  id: totrans-606
  prefs: []
  type: TYPE_IMG
  zh: '![image](image/Figure_1.11.jpg)'
- en: Figure 1.11 Conditional Formatting
  id: totrans-607
  prefs: []
  type: TYPE_NORMAL
  zh: 图 1.11 条件格式
- en: '■Data Validation: Data Validation allows you to set rules for data entry in
    your spreadsheets. This can help ensure data integrity and accuracy, which is
    important for effective data mining. [Figure 1.12](#fig1-12) shows the icon for
    data validation:'
  id: totrans-608
  prefs: []
  type: TYPE_NORMAL
  zh: ■数据验证：数据验证允许您为电子表格中的数据输入设置规则。这有助于确保数据完整性和准确性，这对于有效的数据挖掘非常重要。[图 1.12](#fig1-12)
    展示了数据验证的图标：
- en: '![image](image/Figure_1.12.jpg)'
  id: totrans-609
  prefs: []
  type: TYPE_IMG
  zh: '![image](image/Figure_1.12.jpg)'
- en: Figure 1.12 Data Validation
  id: totrans-610
  prefs: []
  type: TYPE_NORMAL
  zh: 图 1.12 数据验证
- en: '■What-if Analysis: What-if Analysis allows you to explore different scenarios
    and their potential outcomes. This can be useful for forecasting, risk analysis,
    and decision-making. [Figure 1.13](#fig1-13) shows the icon for What-if Analysis:'
  id: totrans-611
  prefs: []
  type: TYPE_NORMAL
  zh: ■假设分析：假设分析允许您探索不同的场景及其潜在结果。这有助于预测、风险评估和决策。[图 1.13](#fig1-13) 展示了假设分析的图标：
- en: '![image](image/Figure_1.13.jpg)'
  id: totrans-612
  prefs: []
  type: TYPE_IMG
  zh: '![image](image/Figure_1.13.jpg)'
- en: Figure 1.13 What-if Analysis
  id: totrans-613
  prefs: []
  type: TYPE_NORMAL
  zh: 图 1.13 假设分析
- en: '■Solver: Solver is an add-in for Excel that allows you to optimize complex
    models and solve problems. It can be used for optimization problems, linear programming,
    and more. Refer to [Figure 1.14](#fig1-14):'
  id: totrans-614
  prefs: []
  type: TYPE_NORMAL
  zh: ■求解器：求解器是 Excel 的一个插件，允许您优化复杂模型并解决问题。它可以用于优化问题、线性规划等。请参阅[图 1.14](#fig1-14)：
- en: '![image](image/Figure_1.14.jpg)'
  id: totrans-615
  prefs: []
  type: TYPE_IMG
  zh: '![image](image/Figure_1.14.jpg)'
- en: Figure 1.14 Solver
  id: totrans-616
  prefs: []
  type: TYPE_NORMAL
  zh: 图 1.14 求解器
- en: '■Power Query: Power Query is a data transformation and cleaning tool that can
    be used to extract, transform, and load data from multiple sources. It can automate
    data cleaning tasks and prepare data for analysis. Refer to [Figure 1.15](#fig1-15):'
  id: totrans-617
  prefs: []
  type: TYPE_NORMAL
  zh: ■Power Query：Power Query 是一个数据转换和清理工具，可用于从多个来源提取、转换和加载数据。它可以自动化数据清理任务并为分析准备数据。请参阅[图
    1.15](#fig1-15)：
- en: '![image](image/Figure_1.15.jpg)'
  id: totrans-618
  prefs: []
  type: TYPE_IMG
  zh: '![image](image/Figure_1.15.jpg)'
- en: Figure 1.15 Power Query
  id: totrans-619
  prefs: []
  type: TYPE_NORMAL
  zh: 图 1.15 Power Query
- en: '■Text-to-Columns: The Text-to-Columns feature allows you to split data in a
    column into multiple columns based on a delimiter or pattern. This can be useful
    for cleaning and restructuring your data. [Figure 1.16](#fig1-16) shows the icon
    for Text-to-Column.'
  id: totrans-620
  prefs: []
  type: TYPE_NORMAL
  zh: ■文本分列：文本分列功能允许您根据分隔符或模式将列中的数据拆分到多个列中。这有助于清理和重构您的数据。[图 1.16](#fig1-16) 展示了文本分列的图标。
- en: '![image](image/Figure_1.16.jpg)'
  id: totrans-621
  prefs: []
  type: TYPE_IMG
  zh: '![image](image/Figure_1.16.jpg)'
- en: Figure 1.16 Text-to-Columns
  id: totrans-622
  prefs: []
  type: TYPE_NORMAL
  zh: 图 1.16 文本分列
- en: By using these data mining features in Excel, you can quickly and easily discover
    patterns and insights in your data, which can help you make better decisions and
    achieve your business goals.
  id: totrans-623
  prefs: []
  type: TYPE_NORMAL
  zh: 通过使用 Excel 中的这些数据挖掘功能，您可以快速轻松地发现数据中的模式和见解，这可以帮助您做出更好的决策并实现您的业务目标。
- en: TAT Saving Techniques
  id: totrans-624
  prefs: []
  type: TYPE_NORMAL
  zh: TAT 保存技巧
- en: 'Turnaround time (TAT) reduction techniques in Excel can refer to different
    methods that aim to speed up the process of working with spreadsheets and reduce
    the time it takes to perform certain tasks. Here are some techniques that can
    help improve TAT in Excel:'
  id: totrans-625
  prefs: []
  type: TYPE_NORMAL
  zh: Excel 中的 TAT（周转时间）减少技巧可以参考旨在加快处理电子表格过程并减少执行某些任务所需时间的不同方法。以下是一些可以帮助提高 Excel 中
    TAT 的技巧：
- en: '■Use Keyboard Shortcuts: Keyboard shortcuts can significantly improve your
    speed in Excel. For example, you can press Ctrl+C to copy and Ctrl+V to paste
    or use the F2 key to edit a cell.'
  id: totrans-626
  prefs: []
  type: TYPE_NORMAL
  zh: ■使用键盘快捷键：键盘快捷键可以显著提高您在 Excel 中的速度。例如，您可以按 Ctrl+C 来复制，按 Ctrl+V 来粘贴，或者使用 F2 键来编辑单元格。
- en: '■Use Formulas and Functions: Excel offers a wide range of built-in formulas
    and functions that can automate many tasks and save time. For example, some commonly
    used functions include SUM, AVERAGE, COUNT, IF, and VLOOKUP. The Formulas bar
    can be seen in [Figure 1.17](#fig1-17):'
  id: totrans-627
  prefs: []
  type: TYPE_NORMAL
  zh: ■使用公式和函数：Excel 提供了广泛的内置公式和函数，可以自动化许多任务并节省时间。例如，一些常用的函数包括 SUM（求和）、AVERAGE（平均值）、COUNT（计数）、IF
    和 VLOOKUP。公式栏可以在[图 1.17](#fig1-17)中看到：
- en: '![image](image/Figure_1.17.jpg)'
  id: totrans-628
  prefs: []
  type: TYPE_IMG
  zh: '![image](image/Figure_1.17.jpg)'
- en: Figure 1.17 Formulas in Excel
  id: totrans-629
  prefs: []
  type: TYPE_NORMAL
  zh: 图 1.17 Excel 中的公式
- en: '■Use Data Validation: Data validation is a powerful feature in Excel that allows
    you to control the type of data that can be entered into a cell. This can help
    prevent errors and save time by reducing the need to correct mistakes. This option
    can be seen in the following [Figure 1.18](#fig1-18):'
  id: totrans-630
  prefs: []
  type: TYPE_NORMAL
  zh: ■使用数据验证：数据验证是 Excel 中的一个强大功能，允许您控制可以输入到单元格中的数据类型。这可以通过减少纠正错误的需要来帮助防止错误并节省时间。此选项可以在以下[图
    1.18](#fig1-18)中看到：
- en: '![image](image/Figure_1.18.jpg)'
  id: totrans-631
  prefs: []
  type: TYPE_IMG
  zh: '![image](image/Figure_1.18.jpg)'
- en: Figure 1.18 Data Validation
  id: totrans-632
  prefs: []
  type: TYPE_NORMAL
  zh: 图 1.18 数据验证
- en: '■Use Conditional Formatting: Conditional formatting allows you to highlight
    cells that meet certain criteria, making it easier to analyze data and identify
    trends. This can help save time by reducing the need to manually search for specific
    values or patterns. This option can be seen in [Figure 1.19](#fig1-19):'
  id: totrans-633
  prefs: []
  type: TYPE_NORMAL
  zh: ■使用条件格式：条件格式允许您突出显示满足特定标准的单元格，这使得分析数据和识别趋势变得更容易。这可以通过减少手动搜索特定值或模式的需要来节省时间。此选项可以在[图
    1.19](#fig1-19)中看到：
- en: '![image](image/Figure_1.19.jpg)'
  id: totrans-634
  prefs: []
  type: TYPE_IMG
  zh: '![image](image/Figure_1.19.jpg)'
- en: Figure 1.19 Conditional Formatting
  id: totrans-635
  prefs: []
  type: TYPE_NORMAL
  zh: 图 1.19 条件格式
- en: '■Use Pivot Tables: Pivot tables are a powerful tool for summarizing and analyzing
    large datasets. They can help you quickly identify trends and patterns in your
    data and make it easier to create reports and charts. Refer to [Figure 1.20](#fig1-20):'
  id: totrans-636
  prefs: []
  type: TYPE_NORMAL
  zh: ■使用数据透视表：数据透视表是汇总和分析大型数据集的强大工具。它们可以帮助您快速识别数据中的趋势和模式，并使创建报告和图表变得更容易。请参阅[图 1.20](#fig1-20)：
- en: '![image](image/Figure_1.20.jpg)'
  id: totrans-637
  prefs: []
  type: TYPE_IMG
  zh: '![image](image/Figure_1.20.jpg)'
- en: Figure 1.20 PivotTable Icon
  id: totrans-638
  prefs: []
  type: TYPE_NORMAL
  zh: 图 1.20 数据透视表图标
- en: '■Use Excel Templates: Excel templates can save time by providing pre-designed
    spreadsheets with built-in formulas, formatting, and layouts. This can save time
    by eliminating the need to create spreadsheets from scratch. Refer to [Figure
    1.21](#fig1-21):'
  id: totrans-639
  prefs: []
  type: TYPE_NORMAL
  zh: ■使用 Excel 模板：Excel 模板可以通过提供预设计的带有内置公式、格式和布局的电子表格来节省时间。这可以通过消除从头创建电子表格的需要来节省时间。请参阅[图
    1.21](#fig1-21)：
- en: '![image](image/Figure_1.21.jpg)'
  id: totrans-640
  prefs: []
  type: TYPE_IMG
  zh: '![image](image/Figure_1.21.jpg)'
- en: Figure 1.21 Excel Templates
  id: totrans-641
  prefs: []
  type: TYPE_NORMAL
  zh: 图 1.21 Excel 模板
- en: '■Use the Autofill Feature: The Autofill feature in Excel can save time by automatically
    filling in a series of values or formulas in a selected range of cells. To use
    Autofill, select the cell(s) with the desired value or formula, and then drag
    the fill handle over the range of cells where you want the values or formulas
    to appear. Refer to [Figure 1.22](#fig1-22):'
  id: totrans-642
  prefs: []
  type: TYPE_NORMAL
  zh: ■使用自动填充功能：Excel 中的自动填充功能可以通过自动填充所选单元格范围内的值或公式来节省时间。要使用自动填充，请选择带有所需值或公式的单元格，然后将填充句柄拖动到您希望值或公式出现的位置。请参阅[图
    1.22](#fig1-22)：
- en: '![image](image/Figure_1.22.jpg)'
  id: totrans-643
  prefs: []
  type: TYPE_IMG
  zh: '![image](image/Figure_1.22.jpg)'
- en: Figure 1.22 Autofill Feature
  id: totrans-644
  prefs: []
  type: TYPE_NORMAL
  zh: 图 1.22 自动填充功能
- en: '■Use Excel’s Sorting and Filtering Features: Excel’s sorting and filtering
    features can save time by quickly organizing and analyzing data. To sort data,
    select the column you want to sort by and click the Sort A-Z or Sort Z-A button.
    To filter data, click the Filter button and select the criteria you want to use
    to filter the data, as shown in [Figure 1.23](#fig1-23):'
  id: totrans-645
  prefs: []
  type: TYPE_NORMAL
  zh: ■使用Excel的排序和筛选功能：Excel的排序和筛选功能可以通过快速组织和分析数据来节省时间。要排序数据，选择要排序的列，然后点击排序A-Z或排序Z-A按钮。要筛选数据，点击筛选按钮并选择用于筛选数据的条件，如图1.23
    [Figure 1.23](#fig1-23)所示：
- en: '![image](image/Figure_1.23.jpg)'
  id: totrans-646
  prefs: []
  type: TYPE_IMG
  zh: '![image](image/Figure_1.23.jpg)'
- en: Figure 1.23 Sorting and Filtering in Excel
  id: totrans-647
  prefs: []
  type: TYPE_NORMAL
  zh: 图1.23 Excel中的排序和筛选
- en: By using these techniques, you can save time and increase your productivity
    when working with Excel spreadsheets.
  id: totrans-648
  prefs: []
  type: TYPE_NORMAL
  zh: 通过使用这些技术，您可以在使用Excel电子表格时节省时间并提高生产力。
- en: Conclusion
  id: totrans-649
  prefs: []
  type: TYPE_NORMAL
  zh: 结论
- en: In summary, Excel 2021 is a powerful tool that offers an array of features for
    data management, analysis, and collaboration. With its user-friendly interface,
    customization options, and data analysis capabilities, Excel 2021 empowers users
    to work efficiently, gain insights, and make informed decisions. It is a versatile
    tool that enhances productivity and is essential for individuals and businesses
    dealing with data.
  id: totrans-650
  prefs: []
  type: TYPE_NORMAL
  zh: 总结来说，Excel 2021是一个功能强大的工具，提供了数据管理、分析和协作的一系列功能。凭借其用户友好的界面、定制选项和数据分析能力，Excel 2021使用户能够高效工作、获得洞察力并做出明智的决策。它是一个多功能的工具，提高了生产力，对于处理数据的个人和企业来说是必不可少的。
- en: Exercises
  id: totrans-651
  prefs: []
  type: TYPE_NORMAL
  zh: 练习
- en: 1. What is the purpose of Excel’s conditional formatting feature?
  id: totrans-652
  prefs: []
  type: TYPE_NORMAL
  zh: 1. Excel的条件格式化功能有什么用途？
- en: a. To perform complex calculations
  id: totrans-653
  prefs: []
  type: TYPE_NORMAL
  zh: a. 执行复杂计算
- en: b. To analyze data trends
  id: totrans-654
  prefs: []
  type: TYPE_NORMAL
  zh: b. 分析数据趋势
- en: c. To format cells based on specific criteria
  id: totrans-655
  prefs: []
  type: TYPE_NORMAL
  zh: c. 根据特定标准格式化单元格
- en: d. To import and export data from other software
  id: totrans-656
  prefs: []
  type: TYPE_NORMAL
  zh: d. 从其他软件导入和导出数据
- en: 2. Which function in Excel allows you to find the highest value in a range of
    cells?
  id: totrans-657
  prefs: []
  type: TYPE_NORMAL
  zh: 2. Excel中哪个函数可以在单元格范围中找到最高值？
- en: a. MAX
  id: totrans-658
  prefs: []
  type: TYPE_NORMAL
  zh: a. 最大值
- en: b. SUM
  id: totrans-659
  prefs: []
  type: TYPE_NORMAL
  zh: b. 求和
- en: c. AVERAGE
  id: totrans-660
  prefs: []
  type: TYPE_NORMAL
  zh: c. 平均值
- en: d. COUNT
  id: totrans-661
  prefs: []
  type: TYPE_NORMAL
  zh: d. 计数
- en: CHAPTER    2
  id: totrans-662
  prefs: []
  type: TYPE_NORMAL
  zh: 章节摘要：2
- en: Cell References and Range
  id: totrans-663
  prefs: []
  type: TYPE_NORMAL
  zh: 单元格引用和范围
- en: Introduction
  id: totrans-664
  prefs: []
  type: TYPE_NORMAL
  zh: 简介
- en: In this chapter, we will explore the essential concepts of cell references and
    ranges in spreadsheet applications, enabling us to effectively manipulate and
    analyze data. By understanding how cell references and ranges work, we can streamline
    our tasks, perform calculations, and maintain consistency in our spreadsheet work.
  id: totrans-665
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将探讨电子表格应用中单元格引用和范围的基本概念，使我们能够有效地操作和分析数据。通过理解单元格引用和范围的工作原理，我们可以简化我们的任务，执行计算，并在我们的电子表格工作中保持一致性。
- en: Structure
  id: totrans-666
  prefs: []
  type: TYPE_NORMAL
  zh: 结构
- en: 'In this chapter, we will go over the following topics:'
  id: totrans-667
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将讨论以下主题：
- en: ■Using different types of references
  id: totrans-668
  prefs: []
  type: TYPE_NORMAL
  zh: ■使用不同类型的引用
- en: ■Types of cell reference
  id: totrans-669
  prefs: []
  type: TYPE_NORMAL
  zh: ■单元格引用类型
- en: ■Named range
  id: totrans-670
  prefs: []
  type: TYPE_NORMAL
  zh: ■命名范围
- en: Objectives
  id: totrans-671
  prefs: []
  type: TYPE_NORMAL
  zh: 目标
- en: After studying this chapter, the reader will understand the meaning and usage
    of cell references, as well as the usage of range names. The reader will also
    be able to identify the various types of cell references.
  id: totrans-672
  prefs: []
  type: TYPE_NORMAL
  zh: 学习本章后，读者将理解单元格引用的含义和用法，以及范围名称的用法。读者还将能够识别各种类型的单元格引用。
- en: Using Different Types of References
  id: totrans-673
  prefs: []
  type: TYPE_NORMAL
  zh: 使用不同类型的引用
- en: When we copy a reference from one cell to another, it gets updated automatically.
    For example, we have a reference in cell C1 as A1, and we copy the same to D1\.
    This will automatically update itself to B1\. Sometimes, we need to keep a part
    of the used cell references constant. This can be done by using different types
    of cell references.
  id: totrans-674
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们从单元格复制引用到另一个单元格时，它会自动更新。例如，我们在单元格C1中的引用是A1，我们将相同的引用复制到D1。这将自动更新为B1。有时，我们需要保持使用过的单元格引用的一部分不变。这可以通过使用不同类型的单元格引用来实现。
- en: Types of Cell Reference
  id: totrans-675
  prefs: []
  type: TYPE_NORMAL
  zh: 单元格引用类型
- en: 'There are three types of cell references:'
  id: totrans-676
  prefs: []
  type: TYPE_NORMAL
  zh: 有三种类型的单元格引用：
- en: ■Relative Cell Reference
  id: totrans-677
  prefs: []
  type: TYPE_NORMAL
  zh: ■相对单元格引用
- en: ■Absolute Cell Reference
  id: totrans-678
  prefs: []
  type: TYPE_NORMAL
  zh: ■绝对单元格引用
- en: ■Mixed Cell Reference
  id: totrans-679
  prefs: []
  type: TYPE_NORMAL
  zh: ■混合单元格引用
- en: 'Refer to [Figure 2.1](#fig2-1):'
  id: totrans-680
  prefs: []
  type: TYPE_NORMAL
  zh: 参考图2.1 [Figure 2.1](#fig2-1)：
- en: '![image](image/Figure_2.1.jpg)'
  id: totrans-681
  prefs: []
  type: TYPE_IMG
  zh: '![image](image/Figure_2.1.jpg)'
- en: Figure 2.1 Types of Cell References
  id: totrans-682
  prefs: []
  type: TYPE_NORMAL
  zh: 图2.1 单元格引用类型
- en: Relative Cell Reference
  id: totrans-683
  prefs: []
  type: TYPE_NORMAL
  zh: 相对单元格引用
- en: 'This is the default cell reference in Excel. In this kind of reference, when
    you copy and paste a relative cell reference into a cell, the cell is updated
    automatically according to the change made in the cell from which it has been
    copied. For example, suppose you want to calculate HRA, which is 50% of the base
    salary. To do this, you need to type the formula =H2*50% in the first cell of
    the HRA column, as shown in [Figure 2.2](#fig2-2):'
  id: totrans-684
  prefs: []
  type: TYPE_NORMAL
  zh: 这是Excel中的默认单元格引用。在这种引用中，当你将相对单元格引用复制并粘贴到单元格中时，单元格会根据复制源单元格的更改自动更新。例如，假设你想计算人力资源会计（HRA），它是基本工资的50%。为此，你需要在HRA列的第一个单元格中输入公式
    =H2*50%，如图[图2.2](#fig2-2)所示：
- en: '![image](image/Figure_2.2.jpg)'
  id: totrans-685
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image/Figure_2.2.jpg)'
- en: Figure 2.2 Typing Formula =H2*50% in the First Cell of the HRA Column
  id: totrans-686
  prefs: []
  type: TYPE_NORMAL
  zh: 图2.2 在HRA列的第一个单元格中输入公式 =H2*50%
- en: 'To find the HRA for all employees, press the left button of the mouse over
    the lower right corner of the border of the first cell in the HRA column and drag
    it down to the last record, as shown in [Figure 2.3](#fig2-3):'
  id: totrans-687
  prefs: []
  type: TYPE_NORMAL
  zh: 要找到所有员工的人力资源会计（HRA），请将鼠标左键放在HRA列第一个单元格的右下角边界上，并向下拖动到最后一条记录，如图[图2.3](#fig2-3)所示：
- en: '![image](image/Figure_2.3.jpg)'
  id: totrans-688
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image/Figure_2.3.jpg)'
- en: Figure 2.3 Dragging the Formula
  id: totrans-689
  prefs: []
  type: TYPE_NORMAL
  zh: 图2.3 拖动公式
- en: Tip! Select the cells to fill and press Ctrl + D to fill the range, or double
    click on the fill handle.
  id: totrans-690
  prefs: []
  type: TYPE_NORMAL
  zh: 小贴士！选择要填充的单元格，然后按Ctrl + D填充范围，或者双击填充句柄。
- en: Absolute Cell References
  id: totrans-691
  prefs: []
  type: TYPE_NORMAL
  zh: 绝对单元格引用
- en: If you want to freeze a cell reference, but you do not want a cell reference
    to change when you copy a formula, you have to use absolute cell reference. To
    make a cell reference absolute, a dollar sign ($) is placed before the column
    name and with the row number of the reference.
  id: totrans-692
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想要冻结单元格引用，但又不想在复制公式时改变单元格引用，你必须使用绝对单元格引用。要使单元格引用绝对，需要在列名前放置美元符号（$）和引用的行号。
- en: 'Suppose you want to find 10% of 1000, 2000, 3000, and 4000, as shown in [Figure
    2.4](#fig2-4):'
  id: totrans-693
  prefs: []
  type: TYPE_NORMAL
  zh: 假设你想找到1000, 2000, 3000和4000的10%，如图[图2.4](#fig2-4)所示：
- en: '![image](image/Figure_2.4.jpg)'
  id: totrans-694
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image/Figure_2.4.jpg)'
- en: Figure 2.4 Finding 10% of 1000, 2000, 3000, and 4000
  id: totrans-695
  prefs: []
  type: TYPE_NORMAL
  zh: 图2.4 找到1000, 2000, 3000和4000的10%
- en: 'If you write the formula as shown in the previous figure, the formula when
    copied to the right would change itself to C1*B2, D1*C2, and so on. This is not
    the right calculation, however. We would need to freeze the cell reference A2,
    such that it remains the same each time we copy the formula. A2 needs to be changed
    to $A$2 to achieve the required output, as shown in [Figure 2.5](#fig2-5):'
  id: totrans-696
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你将公式写成如图所示，当公式向右复制时，它会自动变为C1*B2, D1*C2，依此类推。然而，这并不是正确的计算方法。我们需要冻结单元格引用A2，使其在每次复制公式时保持不变。要将A2改为$A$2以实现所需输出，如图[图2.5](#fig2-5)所示：
- en: '![image](image/Figure_2.5.jpg)'
  id: totrans-697
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image/Figure_2.5.jpg)'
- en: Figure 2.5 Write A2 as $A$2
  id: totrans-698
  prefs: []
  type: TYPE_NORMAL
  zh: 图2.5 将A2写成$A$2
- en: 'The required result can be seen in [Figure 2.6](#fig2-6):'
  id: totrans-699
  prefs: []
  type: TYPE_NORMAL
  zh: 所需的结果可以在[图2.6](#fig2-6)中看到：
- en: '![image](image/Figure_2.6.jpg)'
  id: totrans-700
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image/Figure_2.6.jpg)'
- en: Figure 2.6 Result of the Formula Made with Absolute Cell References
  id: totrans-701
  prefs: []
  type: TYPE_NORMAL
  zh: 图2.6 使用绝对单元格引用创建的公式结果
- en: Tip! First, select the cells from B2 to F2, then press Ctrl + R. This will copy
    the formula from B2 in C2, D2, E2, and F2.
  id: totrans-702
  prefs: []
  type: TYPE_NORMAL
  zh: 小贴士！首先，选择B2到F2的单元格，然后按Ctrl + R。这将把B2的公式复制到C2, D2, E2和F2。
- en: Mixed Cell Reference
  id: totrans-703
  prefs: []
  type: TYPE_NORMAL
  zh: 混合单元格引用
- en: Sometimes you may want to freeze only the row or column in a cell reference.
    In [Figure 2.7](#fig2-7), we need to calculate 10%, 20%, 30%, 40%, and 50% of
    1000, 2000, 3000, 4000, and so on.
  id: totrans-704
  prefs: []
  type: TYPE_NORMAL
  zh: 有时你可能只想冻结单元格引用中的行或列。在[图2.7](#fig2-7)中，我们需要计算1000, 2000, 3000, 4000等的10%，20%，30%，40%和50%。
- en: '![image](image/Figure_2.7.jpg)'
  id: totrans-705
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image/Figure_2.7.jpg)'
- en: Figure 2.7 Calculate 10%, 20%, 30%, 40%, and 50% of 1000, 2000, 3000, 4000,
    and 5000
  id: totrans-706
  prefs: []
  type: TYPE_NORMAL
  zh: 图2.7 计算1000, 2000, 3000, 4000和5000的10%，20%，30%，40%和50%
- en: If you drag the formula toward the right, it changes to C2*B3, D2*C3, and so
    on. Once dragged down, it would change to B3*A4, B4*A5, and so on. These are not
    the right formulae, however. Refer to [Figure 2.8](#fig2-8).
  id: totrans-707
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你将公式向右拖动，它会变为C2*B3, D2*C3，依此类推。一旦向下拖动，它会变为B3*A4, B4*A5，依此类推。然而，这些都不是正确的公式。请参阅[图2.8](#fig2-8)。
- en: '![image](image/Figure_2.8.jpg)'
  id: totrans-708
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image/Figure_2.8.jpg)'
- en: Figure 2.8 Wrong Formulae in the Referenced Cells
  id: totrans-709
  prefs: []
  type: TYPE_NORMAL
  zh: 图2.8 引用单元格中的错误公式
- en: If we observe [Figure 2.8](#fig2-8) closely, we can see that we need to freeze
    the row number of B2 (as it is common for all the formulae toward the right and
    down) and the column name for A3 (as it is common for all the formulae toward
    the right and down). When copied, the resultant formulae would be as shown in
    [Figure 2.9](#fig2-9).
  id: totrans-710
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们仔细观察[图2.8](#fig2-8)，我们可以看到我们需要冻结B2的行号（因为它对所有向右和向下的公式都是通用的）和A3的列名（因为它对所有向右和向下的公式都是通用的）。当复制时，结果公式将如图[图2.9](#fig2-9)所示。
- en: '![image](image/Figure_2.9.jpg)'
  id: totrans-711
  prefs: []
  type: TYPE_IMG
  zh: '![image](image/Figure_2.9.jpg)'
- en: Figure 2.9 Resultant Formulae
  id: totrans-712
  prefs: []
  type: TYPE_NORMAL
  zh: 图2.9 结果公式
- en: The answer would be as shown in [Figure 2.10](#fig2-10). References where either
    the row or the column number is frozen are called Mixed Cell References.
  id: totrans-713
  prefs: []
  type: TYPE_NORMAL
  zh: 答案如图[图2.10](#fig2-10)所示。行号或列号之一被冻结的引用称为混合单元格引用。
- en: '![image](image/Figure_2.10.jpg)'
  id: totrans-714
  prefs: []
  type: TYPE_IMG
  zh: '![image](image/Figure_2.10.jpg)'
- en: Figure 2.10 Resultant Values
  id: totrans-715
  prefs: []
  type: TYPE_NORMAL
  zh: 图2.10 结果值
- en: Tip! Keep the cursor near the cell reference and press F4 to toggle between
    the different cell references.
  id: totrans-716
  prefs: []
  type: TYPE_NORMAL
  zh: 小贴士！将光标靠近单元格引用并按F4键，在不同的单元格引用之间切换。
- en: Named Range
  id: totrans-717
  prefs: []
  type: TYPE_NORMAL
  zh: 命名范围
- en: When you write formulas (also called functions), you need to select a range
    of cells. It could be time-consuming when the range is large. Excel provides us
    a way to give a name to the range. For example, we can write Sum (Basic) in place
    of Sum (H2:H101). To do this, we first need to name the range H2:H10 as Basic.
    Below are instructions on how to give a name to the range.
  id: totrans-718
  prefs: []
  type: TYPE_NORMAL
  zh: 当您编写公式（也称为函数）时，您需要选择一个单元格范围。如果范围很大，这可能会很耗时。Excel为我们提供了一种给范围命名的方法。例如，我们可以用Sum
    (Basic)代替Sum (H2:H101)。为此，我们首先需要将H2:H10命名为Basic。以下是命名范围的步骤。
- en: Creating a Named Range
  id: totrans-719
  prefs: []
  type: TYPE_NORMAL
  zh: 创建命名范围
- en: 'To name a range, we may use one of the following procedures:'
  id: totrans-720
  prefs: []
  type: TYPE_NORMAL
  zh: 要命名一个范围，我们可以使用以下程序之一：
- en: '1. Select the range (for example, H2:H101) and type the name (for example,
    Sal) in the name box, as shown in [Figure 2.11](#fig2-11):'
  id: totrans-721
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 选择范围（例如，H2:H101）并在名称框中输入名称（例如，Sal），如图[图2.11](#fig2-11)所示：
- en: '![image](image/Figure_2.11.jpg)'
  id: totrans-722
  prefs: []
  type: TYPE_IMG
  zh: '![image](image/Figure_2.11.jpg)'
- en: Figure 2.11 Creating a named range
  id: totrans-723
  prefs: []
  type: TYPE_NORMAL
  zh: 图2.11 创建命名范围
- en: 2. If you want to name the cells with the value in one of the cells, you may
    select the range along with the name. Click on Create from Selection in the Formulas
    tab and select one of the options.
  id: totrans-724
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 如果您想给包含在单元格中的值命名，您可以选中范围及其名称。在公式选项卡中点击从选择创建，并选择一个选项。
- en: 3. Click on OK.
  id: totrans-725
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 点击确定。
- en: 4. You may also want to create a named range by clicking on Define name in the
    Formulas tab.
  id: totrans-726
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 您也可以通过在公式选项卡中点击定义名称来创建一个命名范围。
- en: 5. Write the name for the range in the name box. Then click on the Refers to
    box and select the range you wish to name.
  id: totrans-727
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 在名称框中输入范围的名称。然后点击引用到框并选择您希望命名的范围。
- en: 6. Click on OK.
  id: totrans-728
  prefs: []
  type: TYPE_NORMAL
  zh: 6. 点击确定。
- en: '7. Now you can use the given name instead of the range anywhere in the workbook.
    Refer to [Figure 2.12](#fig2-12):'
  id: totrans-729
  prefs: []
  type: TYPE_NORMAL
  zh: 7. 现在，您可以在工作簿的任何地方使用给定的名称而不是范围。参见图[图2.12](#fig2-12)：
- en: '![image](image/Figure_2.12.jpg)'
  id: totrans-730
  prefs: []
  type: TYPE_IMG
  zh: '![image](image/Figure_2.12.jpg)'
- en: Figure 2.12 Use of Named Range Instead of Cell Reference
  id: totrans-731
  prefs: []
  type: TYPE_NORMAL
  zh: 图2.12 使用命名范围代替单元格引用
- en: Editing Named Ranges
  id: totrans-732
  prefs: []
  type: TYPE_NORMAL
  zh: 编辑命名范围
- en: 'Sometimes, it becomes essential to rename or edit the named range. This can
    be done by taking the following steps:'
  id: totrans-733
  prefs: []
  type: TYPE_NORMAL
  zh: 有时，重命名或编辑命名范围变得至关重要。可以通过以下步骤完成：
- en: 1. In the Formulas tab, click on Name Manager.
  id: totrans-734
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 在公式选项卡中，点击名称管理器。
- en: '2. A Name Manager dialog box opens, as shown in [Figure 2.13](#fig2-13):'
  id: totrans-735
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 打开一个命名管理器对话框，如图[图2.13](#fig2-13)所示：
- en: '![image](image/Figure_2.13.jpg)'
  id: totrans-736
  prefs: []
  type: TYPE_IMG
  zh: '![image](image/Figure_2.13.jpg)'
- en: Figure 2.13 Name Manager Dialog Box
  id: totrans-737
  prefs: []
  type: TYPE_NORMAL
  zh: 图2.13 命名管理器对话框
- en: 3. Select the Named Range that you want to edit and click on the Edit button
    to edit a named range.
  id: totrans-738
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 选择要编辑的命名范围并点击编辑按钮来编辑命名范围。
- en: '4. An Edit Name dialog box appears, as shown in [Figure 2.14](#fig2-14):'
  id: totrans-739
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 出现一个编辑名称对话框，如图[图2.14](#fig2-14)所示：
- en: '![image](image/Figure_2.14.jpg)'
  id: totrans-740
  prefs: []
  type: TYPE_IMG
  zh: '![image](image/Figure_2.14.jpg)'
- en: Figure 2.14 Edit Name Dialog Box
  id: totrans-741
  prefs: []
  type: TYPE_NORMAL
  zh: 图2.14 编辑名称对话框
- en: 5. Type a new name or redefine the range name.
  id: totrans-742
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 输入一个新名称或重新定义范围名称。
- en: Deleting Named Ranges
  id: totrans-743
  prefs: []
  type: TYPE_NORMAL
  zh: 删除命名范围
- en: 'To delete a range, do the following steps:'
  id: totrans-744
  prefs: []
  type: TYPE_NORMAL
  zh: 要删除一个范围，请按照以下步骤操作：
- en: 1. Select the range from the Name Manager list.
  id: totrans-745
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 从名称管理器列表中选择范围。
- en: 2. Click Delete.
  id: totrans-746
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 点击删除。
- en: 3. The named range will be deleted.
  id: totrans-747
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 命名范围将被删除。
- en: Tip! Press Ctrl + F3 to open the Name Manager dialog box.
  id: totrans-748
  prefs: []
  type: TYPE_NORMAL
  zh: 小贴士！按Ctrl + F3键打开命名管理器对话框。
- en: Conclusion
  id: totrans-749
  prefs: []
  type: TYPE_NORMAL
  zh: 结论
- en: In conclusion, mastering cell references and ranges empowers users to effectively
    manipulate data and streamline operations in spreadsheet applications, leading
    to improved efficiency and accuracy in handling large datasets.
  id: totrans-750
  prefs: []
  type: TYPE_NORMAL
  zh: 总之，掌握单元格引用和范围使用户能够有效地操作数据并简化电子表格应用程序中的操作，从而提高处理大量数据集的效率和准确性。
- en: Exercises
  id: totrans-751
  prefs: []
  type: TYPE_NORMAL
  zh: 练习
- en: '1. Match the correct Relative, Absolute, and Mixed references in [Table 2.1](#tab2-1):'
  id: totrans-752
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 在 [表 2.1](#tab2-1) 中匹配正确的相对、绝对和混合引用：
- en: TABLE 2.1 Match the right options
  id: totrans-753
  prefs: []
  type: TYPE_NORMAL
  zh: 表 2.1 匹配正确的选项
- en: '| A$1 | Relative Reference |'
  id: totrans-754
  prefs: []
  type: TYPE_TB
  zh: '| A$1 | 相对引用 |'
- en: '| $A$1 | Absolute Reference |'
  id: totrans-755
  prefs: []
  type: TYPE_TB
  zh: '| $A$1 | 绝对引用 |'
- en: '| $A1 | Mixed Reference |'
  id: totrans-756
  prefs: []
  type: TYPE_TB
  zh: '| $A1 | 混合引用 |'
- en: 2. In the Excel Training folder, open a file named Advanced Excel Assignment.xlsx.
    Open “Mixed-Cell sheet” and calculate the percentage sales of each product in
    different regions in such a way that when you copy the cell formula of east sales
    and paste in each of the region columns, it automatically calculates sales for
    the region.
  id: totrans-757
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 在 Excel 训练文件夹中，打开名为 Advanced Excel Assignment.xlsx 的文件。打开“混合单元格”工作表，以这种方式计算不同地区的每个产品的销售额百分比，即当你将东部销售额的单元格公式复制并粘贴到每个地区列中时，它会自动计算该地区的销售额。
- en: CHAPTER    3
  id: totrans-758
  prefs: []
  type: TYPE_NORMAL
  zh: 第 3 章
- en: Working with Formulas and Functions
  id: totrans-759
  prefs: []
  type: TYPE_NORMAL
  zh: 与公式和函数一起工作
- en: Introduction
  id: totrans-760
  prefs: []
  type: TYPE_NORMAL
  zh: 简介
- en: In this chapter, we will explore the usage of formulas and functions in Microsoft
    Excel. Formulas are equations that perform calculations on values, while functions
    are predefined formulas that simplify complex tasks. We will cover topics such
    as using formulas in a worksheet, array formulas, using functions, the IF function
    and its variations, and lookup functions.
  id: totrans-761
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将探讨 Microsoft Excel 中公式和函数的使用。公式是执行值计算的方程，而函数是简化复杂任务的预定义公式。我们将涵盖使用工作表中的公式、数组公式、使用函数、IF
    函数及其变体以及查找函数等主题。
- en: Structure
  id: totrans-762
  prefs: []
  type: TYPE_NORMAL
  zh: 结构
- en: 'In this chapter, we will go over the following topics:'
  id: totrans-763
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将讨论以下主题：
- en: ■Using formulas in a worksheet
  id: totrans-764
  prefs: []
  type: TYPE_NORMAL
  zh: ■在工作表中使用公式
- en: ■Using functions
  id: totrans-765
  prefs: []
  type: TYPE_NORMAL
  zh: ■使用函数
- en: ■Lookup functions
  id: totrans-766
  prefs: []
  type: TYPE_NORMAL
  zh: ■查找函数
- en: ■Making V-lookup dynamic
  id: totrans-767
  prefs: []
  type: TYPE_NORMAL
  zh: ■使 V-lookup 动态化
- en: ■Index
  id: totrans-768
  prefs: []
  type: TYPE_NORMAL
  zh: ■索引
- en: Objectives
  id: totrans-769
  prefs: []
  type: TYPE_NORMAL
  zh: 目标
- en: After studying this chapter, the reader will understand the use of formulas
    and functions, will be able to identify the different types of functions, and
    will know how IF and other logical functions work.
  id: totrans-770
  prefs: []
  type: TYPE_NORMAL
  zh: 在学习完本章后，读者将了解公式的使用和函数，能够识别不同类型的函数，并了解 IF 和其他逻辑函数的工作方式。
- en: Using Formulas in a Worksheet
  id: totrans-771
  prefs: []
  type: TYPE_NORMAL
  zh: 在工作表中使用公式
- en: Formulas are the equations that perform calculations on values. A formula starts
    with an equal sign (=). It contains at least two operands and one operation. For
    example, the following formula multiplies two by three and adds five to the result.
  id: totrans-772
  prefs: []
  type: TYPE_NORMAL
  zh: 公式是执行值计算的方程。公式以等号（=）开头。它包含至少两个操作数和一个运算符。例如，以下公式将两个乘以三，并将五加到结果中。
- en: =5+2*3
  id: totrans-773
  prefs: []
  type: TYPE_NORMAL
  zh: =5+2*3
- en: The operand in a formula can be a function, reference, or constant. Operators
    may be any arithmetic or logical operator.
  id: totrans-774
  prefs: []
  type: TYPE_NORMAL
  zh: 公式中的操作数可以是函数、引用或常数。运算符可以是任何算术或逻辑运算符。
- en: Note In Excel, the BODMAS rule is followed to solve a formula when multiple
    operators are involved. BODMAS stands for Brackets, Order of powers or roots,
    Division, Multiplication, Addition, and Subtraction. According to this rule, mathematical
    expressions with multiple operations should be solved from left to right.
  id: totrans-775
  prefs: []
  type: TYPE_NORMAL
  zh: 注意：在 Excel 中，当涉及多个运算符时，将遵循 BODMAS 规则来解决公式。BODMAS 代表括号、幂或根的顺序、除法、乘法、加法和减法。根据此规则，具有多个运算的数学表达式应从左到右解决。
- en: Array Formula
  id: totrans-776
  prefs: []
  type: TYPE_NORMAL
  zh: 数组公式
- en: In [Figure 3.1](#fig3-1), there are five products for which we know the quantity
    and price. We need to find the Total Sales, which is the result of adding together
    the quantity and price for all products. In a normal scenario, we would individually
    calculate the amount for each product and add them to get the answer. To make
    things simpler, we may also use the Array Formula. Select B8, write =sum (A2:A6*B2:B6)
    and press Ctrl + Shift + Enter to fill the formula {=sum (A1:A3*B1:B3)} in the
    selected cell, as shown in [Figure 3.2](#fig3-2). This calculates quantity*price
    for all the products in cell B8.
  id: totrans-777
  prefs: []
  type: TYPE_NORMAL
  zh: 在 [图 3.1](#fig3-1) 中，有五种产品，我们知道它们的数量和价格。我们需要找到总销售额，这是将所有产品的数量和价格加在一起的结果。在正常情况下，我们会分别计算每个产品的金额并将它们相加以得到答案。为了使事情更简单，我们也可以使用数组公式。选择
    B8，输入 =sum (A2:A6*B2:B6) 并按 Ctrl + Shift + Enter 键填充所选单元格中的公式 {=sum (A1:A3*B1:B3)}，如图
    [图 3.2](#fig3-2) 所示。这将在单元格 B8 中计算所有产品的数量乘以价格。
- en: Note Curly brackets ({}) around the formula indicate that it is applied to an
    array.
  id: totrans-778
  prefs: []
  type: TYPE_NORMAL
  zh: 注意：公式周围的括号({})表示它应用于数组。
- en: '[Figure 3.1](#fig3-1) features the quantity and price of five products.'
  id: totrans-779
  prefs: []
  type: TYPE_NORMAL
  zh: '[图3.1](#fig3-1)展示了五种产品的数量和价格。'
- en: '![image](image/Figure_3.1.jpg)'
  id: totrans-780
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image/Figure_3.1.jpg)'
- en: Figure 3.1 Quantity and Price of Five Products
  id: totrans-781
  prefs: []
  type: TYPE_NORMAL
  zh: 图3.1 五种产品的数量和价格
- en: '[Figure 3.2](#fig3-2) features the Quantity*Price for all products:'
  id: totrans-782
  prefs: []
  type: TYPE_NORMAL
  zh: '[图3.2](#fig3-2)展示了所有产品的数量*价格：'
- en: '![image](image/Figure_3.2.jpg)'
  id: totrans-783
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image/Figure_3.2.jpg)'
- en: Figure 3.2 Quantity*Price for All Products
  id: totrans-784
  prefs: []
  type: TYPE_NORMAL
  zh: 图3.2 所有产品的数量*价格
- en: Using Functions
  id: totrans-785
  prefs: []
  type: TYPE_NORMAL
  zh: 使用函数
- en: Performing calculations on each value in a range of cells can be complicated
    and time-consuming. For example, if you have a range consisting of 20 cells, a
    formula that adds each of these values will be very long. Excel functions simplify
    complex tasks.
  id: totrans-786
  prefs: []
  type: TYPE_NORMAL
  zh: 对单元格范围内的每个值进行计算可能很复杂且耗时。例如，如果您有一个由20个单元格组成的范围，一个添加这些值的公式将会非常长。Excel函数简化了复杂任务。
- en: A function is a predefined formula that performs a specific calculation or other
    action on a number or a text string and returns a value. You may specify the values
    on which the function performs calculations. The syntax of a function begins with
    the function name, followed by an opening parenthesis, the arguments for the function
    separated by commas, and a closing parenthesis.
  id: totrans-787
  prefs: []
  type: TYPE_NORMAL
  zh: 函数是一个预定义的公式，它对数字或文本字符串执行特定的计算或其他操作，并返回一个值。您可以指定函数执行计算的值。函数的语法以函数名开始，后跟一个开括号，函数的参数用逗号分隔，然后是一个闭括号。
- en: If the function starts a formula, type an equal sign (=) before the function
    name. As you create a formula that contains a function, the Formula Palette will
    assist you, as shown in [Figure 3.3](#fig3-3).
  id: totrans-788
  prefs: []
  type: TYPE_NORMAL
  zh: 如果函数以公式开始，请在函数名之前输入等号(=)。当您创建包含函数的公式时，公式栏将提供帮助，如图3.3所示。
- en: '![image](image/Figure_3.3.jpg)'
  id: totrans-789
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image/Figure_3.3.jpg)'
- en: Figure 3.3 Inserting a Function
  id: totrans-790
  prefs: []
  type: TYPE_NORMAL
  zh: 图3.3 插入函数
- en: Note From an empty cell, you may click on the fx symbol near the formula bar
    to see all the available functions in Excel.
  id: totrans-791
  prefs: []
  type: TYPE_NORMAL
  zh: 注意：从空单元格中，您可以点击公式栏附近的fx符号，以查看Excel中所有可用的函数。
- en: 'The syntax of a function is:'
  id: totrans-792
  prefs: []
  type: TYPE_NORMAL
  zh: 函数的语法是：
- en: =Function name (argument1, argument2, ….)
  id: totrans-793
  prefs: []
  type: TYPE_NORMAL
  zh: =函数名（参数1，参数2，……）
- en: 'Example:'
  id: totrans-794
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：
- en: '=SUM (A10, B5: B10, 50, 37)'
  id: totrans-795
  prefs: []
  type: TYPE_NORMAL
  zh: '=SUM (A10, B5: B10, 50, 37)'
- en: There is no need to memorize all the functions available and the arguments necessary
    for each function. You can use sigma sign (d) for sum or click on the drop-down
    for more functions, like Max, Min, and so on. Excel prompts you for required and
    optional arguments.
  id: totrans-796
  prefs: []
  type: TYPE_NORMAL
  zh: 您不需要记住所有可用的函数及其每个函数所需的参数。您可以使用求和符号(Σ)进行求和，或者点击下拉菜单以获取更多函数，如最大值、最小值等。Excel会提示您输入必需和可选的参数。
- en: Note You can use the Alt + = key combination to get the sum function on your
    worksheet.
  id: totrans-797
  prefs: []
  type: TYPE_NORMAL
  zh: 注意：您可以使用Alt + =键组合在您的工作表中获取求和函数。
- en: IF Function
  id: totrans-798
  prefs: []
  type: TYPE_NORMAL
  zh: IF函数
- en: In [Chapter 2](chapter02.xhtml), Cell References and Range, we have studied
    the calculation of income heads such as HRA and DA. The formula we saw was the
    same for the entire database. According to certain conditions, we need to decide
    the formula to apply. For example, incentives may be calculated according to the
    department. This is where conditional functions like “IF” come into the picture.
  id: totrans-799
  prefs: []
  type: TYPE_NORMAL
  zh: 在[第二章](chapter02.xhtml)“单元格引用和范围”中，我们学习了诸如HRA和DA等收入项目的计算。我们看到的公式在整个数据库中都是相同的。根据某些条件，我们需要决定要应用的公式。例如，激励可能根据部门来计算。这就是条件函数如“IF”发挥作用的地方。
- en: 'The IF function can be used for evaluating a condition. Depending on whether
    the conditions are true or false, the IF function will return the values. The
    syntax for the IF function is:'
  id: totrans-800
  prefs: []
  type: TYPE_NORMAL
  zh: IF函数可用于评估条件。根据条件是真是假，IF函数将返回值。IF函数的语法是：
- en: If(logical_test, [Value_if_true], [Value_if_false])
  id: totrans-801
  prefs: []
  type: TYPE_NORMAL
  zh: If(logical_test, [Value_if_true], [Value_if_false])
- en: The first argument is the condition that you need the function to evaluate.
    The second argument is the value to be returned if the condition is true, and
    the third argument is the value to be returned if the condition is false. The
    second and third parameters are optional.
  id: totrans-802
  prefs: []
  type: TYPE_NORMAL
  zh: 第一个参数是需要函数评估的条件。第二个参数是在条件为真时返回的值，第三个参数是在条件为假时返回的值。第二个和第三个参数是可选的。
- en: 'Example:'
  id: totrans-803
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：
- en: 'Suppose you want to calculate HRA based on the designation of the employees.
    If the designation is Manager, the HRA is either 1000 or 500\. In this case, the
    function code will be as follows:'
  id: totrans-804
  prefs: []
  type: TYPE_NORMAL
  zh: 假设您想根据员工的职位计算 HRA。如果职位是经理，HRA 要么是 1000，要么是 500。在这种情况下，函数代码如下：
- en: =if (C2="Manager", 1000, 500)
  id: totrans-805
  prefs: []
  type: TYPE_NORMAL
  zh: =if (C2="Manager", 1000, 500)
- en: Refer to [Figure 3.4](#fig3-4).
  id: totrans-806
  prefs: []
  type: TYPE_NORMAL
  zh: 参考 [图 3.4](#fig3-4)。
- en: '![image](image/Figure_3.4.jpg)'
  id: totrans-807
  prefs: []
  type: TYPE_IMG
  zh: '![image](image/Figure_3.4.jpg)'
- en: Figure 3.4 IF Function
  id: totrans-808
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3.4 IF 函数
- en: As shown in [Figure 3.4](#fig3-4), the above function calculates HRA as 1000
    for Managers and 500 for others.
  id: totrans-809
  prefs: []
  type: TYPE_NORMAL
  zh: 如 [图 3.4](#fig3-4) 所示，上述函数计算经理的 HRA 为 1000，其他人为 500。
- en: Nested IF
  id: totrans-810
  prefs: []
  type: TYPE_NORMAL
  zh: Nested IF
- en: A nested IF function is used when a second IF function is placed inside the
    first order function in order to test additional conditions.
  id: totrans-811
  prefs: []
  type: TYPE_NORMAL
  zh: 嵌套 IF 函数用于在第一个 IF 函数内部放置第二个 IF 函数，以便测试额外的条件。
- en: 'The syntax for the Nested IF function is:'
  id: totrans-812
  prefs: []
  type: TYPE_NORMAL
  zh: 嵌套 IF 函数的语法是：
- en: If (logical_test, [Value_if_true], If (logical_test, [Value_if_true], [Value_if_false]))
  id: totrans-813
  prefs: []
  type: TYPE_NORMAL
  zh: If (logical_test, [Value_if_true], If (logical_test, [Value_if_true], [Value_if_false]))
- en: 'Example:'
  id: totrans-814
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：
- en: 'You can use nested IF functions to evaluate complex conditions. For example,
    if the salary is < 5000, the tax is 5%. If the salary is between 5000 and 1000,
    then it is 10% or it is 15%. Since we have already given the name sal to the salary
    column, we can also use sal instead of h2 =if (sal<5000, salary*.05, if (sal<10000,
    salary*.10, sal*.15)). Refer to [Figure 3.5](#fig3-5):'
  id: totrans-815
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以使用嵌套 IF 函数来评估复杂条件。例如，如果工资小于 5000，则税率为 5%。如果工资在 5000 到 10000 之间，则税率为 10% 或
    15%。由于我们已经给工资列命名为 sal，我们也可以使用 sal 而不是 h2 =if (sal<5000, salary*.05, if (sal<10000,
    salary*.10, sal*.15))。参考 [图 3.5](#fig3-5)：
- en: '![image](image/Figure_3.5.jpg)'
  id: totrans-816
  prefs: []
  type: TYPE_IMG
  zh: '![image](image/Figure_3.5.jpg)'
- en: Figure 3.5 Using Nested IF Function
  id: totrans-817
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3.5 使用嵌套 IF 函数
- en: 'Suppose you want to assign letter grades to numbers referenced by the name
    Average Score, as shown in [Table 3.1](#tab3-1):'
  id: totrans-818
  prefs: []
  type: TYPE_NORMAL
  zh: 假设您想根据名为平均分的名称给数字分配字母等级，如 [表 3.1](#tab3-1) 所示：
- en: 'TABLE 3.1: Assigning Letter Grades'
  id: totrans-819
  prefs: []
  type: TYPE_NORMAL
  zh: 表 3.1：分配字母等级
- en: '| If Average Score is | Return |'
  id: totrans-820
  prefs: []
  type: TYPE_TB
  zh: '| 如果平均分大于 | 返回 |'
- en: '| Greater than 89 | A |'
  id: totrans-821
  prefs: []
  type: TYPE_TB
  zh: '| 大于 89 | A |'
- en: '| From 80 to 89 | B |'
  id: totrans-822
  prefs: []
  type: TYPE_TB
  zh: '| 从 80 到 89 | B |'
- en: '| From 70 to 79 | C |'
  id: totrans-823
  prefs: []
  type: TYPE_TB
  zh: '| 从 70 到 79 | C |'
- en: '| From 60 to 69 | D |'
  id: totrans-824
  prefs: []
  type: TYPE_TB
  zh: '| 从 60 到 69 | D |'
- en: '| Less than 60 | F |'
  id: totrans-825
  prefs: []
  type: TYPE_TB
  zh: '| 小于 60 | F |'
- en: 'You can use the following nested IF function:'
  id: totrans-826
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以使用以下嵌套 IF 函数：
- en: IF (AverageScore>89,"A", IF (AverageScore>79,"B", IF (AverageScore>69,"C", IF
    (AverageScore>59,"D","F"))))
  id: totrans-827
  prefs: []
  type: TYPE_NORMAL
  zh: IF (AverageScore>89,"A", IF (AverageScore>79,"B", IF (AverageScore>69,"C", IF
    (AverageScore>59,"D","F"))))
- en: Note You can nest up to sixty-four levels of IF functions in a single formula.
  id: totrans-828
  prefs: []
  type: TYPE_NORMAL
  zh: 注意：您可以在单个公式中嵌套最多 64 级 IF 函数。
- en: IF With AND
  id: totrans-829
  prefs: []
  type: TYPE_NORMAL
  zh: IF With AND
- en: In Excel, OR is a logical function which returns false if any one of the arguments
    returns false.
  id: totrans-830
  prefs: []
  type: TYPE_NORMAL
  zh: 在 Excel 中，OR 是一个逻辑函数，如果任何参数返回假，则返回假。
- en: 'Syntax:'
  id: totrans-831
  prefs: []
  type: TYPE_NORMAL
  zh: 语法：
- en: AND (logical1, logical2...)
  id: totrans-832
  prefs: []
  type: TYPE_NORMAL
  zh: AND (logical1, logical2...)
- en: If there is a scenario where we have two conditions whose combined truth value
    would decide the output of an IF function, we can use AND with IF.
  id: totrans-833
  prefs: []
  type: TYPE_NORMAL
  zh: 如果存在一个场景，其中有两个条件，它们的组合真值将决定 IF 函数的输出，我们可以使用 AND 与 IF。
- en: 'Syntax:'
  id: totrans-834
  prefs: []
  type: TYPE_NORMAL
  zh: 语法：
- en: If (and (Condition1, condition2….), True, False)
  id: totrans-835
  prefs: []
  type: TYPE_NORMAL
  zh: If (and (Condition1, condition2….), True, False)
- en: 'Example:'
  id: totrans-836
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：
- en: 'If we need to give 10% of a basic salary as incentive to everyone working in
    the Sales department in the North region, we would use the following formula:'
  id: totrans-837
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们需要给在北方销售部门的每位员工发放基本工资的 10% 作为激励，我们会使用以下公式：
- en: =IF (AND (Department=”sales”, Region=”north”), 10%*Basic Salary, 0)
  id: totrans-838
  prefs: []
  type: TYPE_NORMAL
  zh: =IF (AND (Department=”sales”, Region=”north”), 10%*Basic Salary, 0)
- en: IF With OR
  id: totrans-839
  prefs: []
  type: TYPE_NORMAL
  zh: IF With OR
- en: OR is a logical function in Excel, which returns False if any one of the arguments
    returns false.
  id: totrans-840
  prefs: []
  type: TYPE_NORMAL
  zh: OR 是 Excel 中的一个逻辑函数，如果任何参数返回假，则返回 False。
- en: 'Syntax:'
  id: totrans-841
  prefs: []
  type: TYPE_NORMAL
  zh: 语法：
- en: OR (logical1, logical2...)
  id: totrans-842
  prefs: []
  type: TYPE_NORMAL
  zh: OR (logical1, logical2...)
- en: If there is a scenario where we have two conditions of which any one of the
    conditions is false, and the IF should return the value in the false argument,
    we may use OR with IF.
  id: totrans-843
  prefs: []
  type: TYPE_NORMAL
  zh: 如果存在一个场景，其中有两个条件，其中任何一个条件为假，并且 IF 应返回假参数中的值，我们可以使用 OR 与 IF。
- en: Syntax Using OR With IF
  id: totrans-844
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 OR 与 IF 的语法
- en: If (OR (Condition1, condition2….), True, False)
  id: totrans-845
  prefs: []
  type: TYPE_NORMAL
  zh: If (OR (Condition1, condition2….), True, False)
- en: 'Example:'
  id: totrans-846
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：
- en: If the employee is in Sales, Mktg or Hrd, then HRA is 50% of the Basic salary.
    Otherwise, it is 30% of the Basic salary.
  id: totrans-847
  prefs: []
  type: TYPE_NORMAL
  zh: 如果员工在销售、市场或人力资源部，则 HRA 为基本工资的 50%。否则，为基本工资的 30%。
- en: If (or (Department=”Mktg”, Department =”Sales”, Department=”Hrd”), Basic salary*.5,
    Basic salary*.3)
  id: totrans-848
  prefs: []
  type: TYPE_NORMAL
  zh: If (or (Department=”Mktg”, Department =”Sales”, Department=”Hrd”), Basic salary*.5,
    Basic salary*.3)
- en: IF With NOT
  id: totrans-849
  prefs: []
  type: TYPE_NORMAL
  zh: IF With NOT
- en: This is a logical function which is used to negate an argument.
  id: totrans-850
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个用于否定参数的逻辑函数。
- en: 'Syntax:'
  id: totrans-851
  prefs: []
  type: TYPE_NORMAL
  zh: 语法：
- en: NOT (logical)
  id: totrans-852
  prefs: []
  type: TYPE_NORMAL
  zh: NOT (逻辑)
- en: If we have a condition which, when not satisfied, requires us to apply a formula,
    we may use NOT with IF.
  id: totrans-853
  prefs: []
  type: TYPE_NORMAL
  zh: 如果有一个条件，当不满足时，需要我们应用公式，我们可以使用NOT与IF结合。
- en: Syntax Using NOT With If
  id: totrans-854
  prefs: []
  type: TYPE_NORMAL
  zh: 使用NOT与IF结合的语法
- en: If (NOT (Condition), True, False)
  id: totrans-855
  prefs: []
  type: TYPE_NORMAL
  zh: If (NOT (Condition), True, False)
- en: 'Example:'
  id: totrans-856
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：
- en: 'If we need to give an incentive to everyone except people working in the Marketing
    department, we may use the following formula:'
  id: totrans-857
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们需要给除了市场营销部门外的所有人提供激励，我们可以使用以下公式：
- en: IF (NOT (Department=”MT”), 10%*salary, 0)
  id: totrans-858
  prefs: []
  type: TYPE_NORMAL
  zh: IF (NOT (Department=”MT”), 10%*salary, 0)
- en: Note There can be maximum of 255 conditions which can be passed to the AND/OR
    function, and we can pass only one condition to NOT.
  id: totrans-859
  prefs: []
  type: TYPE_NORMAL
  zh: 注意：AND/OR函数可以传递的最大条件数为255个，而NOT只能传递一个条件。
- en: We may also use multiple NOT statements inside the IF statement.
  id: totrans-860
  prefs: []
  type: TYPE_NORMAL
  zh: 我们也可以在IF语句中使用多个NOT语句。
- en: 'Example:'
  id: totrans-861
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：
- en: 'If you need to give an incentive to everyone except people from the sales and
    admin departments, you may use the following function:'
  id: totrans-862
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您需要给除了销售和行政部门的人之外的所有人提供激励，您可以使用以下函数：
- en: If (and (not (department=”Sales”), not (department=”admin”)), 10%* salary, 0)
  id: totrans-863
  prefs: []
  type: TYPE_NORMAL
  zh: If (and (not (department=”Sales”), not (department=”admin”)), 10%* salary, 0)
- en: Lookup Functions
  id: totrans-864
  prefs: []
  type: TYPE_NORMAL
  zh: 查找函数
- en: 'Sometimes we need to search for a value in a database using a lookup value.
    For example, given the Employee ID, how can we look up the incentive value from
    some other sheet or some other file? In such scenarios, depending on the source
    database, we may use one of the following lookup functions:'
  id: totrans-865
  prefs: []
  type: TYPE_NORMAL
  zh: 有时我们需要使用查找值在数据库中搜索一个值。例如，给定员工ID，我们如何从其他工作表或其他文件中查找激励值？在这种情况下，根据源数据库，我们可能使用以下查找函数之一：
- en: '■VLOOKUP (if the database is vertical). Refer to [Figure 3.6](#fig3-6):'
  id: totrans-866
  prefs: []
  type: TYPE_NORMAL
  zh: ■VLOOKUP（如果数据库是纵向的）。参考[图3.6](#fig3-6)：
- en: '■HLOOKUP (if the database is horizontal). Refer to [Figure 3.7](#fig3-7):'
  id: totrans-867
  prefs: []
  type: TYPE_NORMAL
  zh: ■HLOOKUP（如果数据库是横向的）。参考[图3.7](#fig3-7)：
- en: '![image](image/Figure_3.6.jpg)'
  id: totrans-868
  prefs: []
  type: TYPE_IMG
  zh: '![image](image/Figure_3.6.jpg)'
- en: Figure 3.6 VLOOKUP
  id: totrans-869
  prefs: []
  type: TYPE_NORMAL
  zh: 图3.6 VLOOKUP
- en: '![image](image/Figure_3.7.jpg)'
  id: totrans-870
  prefs: []
  type: TYPE_IMG
  zh: '![image](image/Figure_3.7.jpg)'
- en: Figure 3.7 HLOOKUP
  id: totrans-871
  prefs: []
  type: TYPE_NORMAL
  zh: 图3.7 HLOOKUP
- en: VLOOKUP
  id: totrans-872
  prefs: []
  type: TYPE_NORMAL
  zh: VLOOKUP
- en: If we need to get the value of a column from some other file or sheet based
    on a common field, you may use VLOOKUP. VLOOKUP is a function that searches for
    a value (lookup value) in the leftmost column of a given database (table array)
    and returns a value in the same row from a column you specify.
  id: totrans-873
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们需要根据公共字段从其他文件或工作表获取列值，可以使用VLOOKUP。VLOOKUP是一个函数，它在一个给定数据库（table_array）的最左侧列中搜索一个值（查找值），并从您指定的列返回同一行的值。
- en: 'Syntax:'
  id: totrans-874
  prefs: []
  type: TYPE_NORMAL
  zh: 语法：
- en: VLOOKUP (lookup_value, table_array, col_index_num, range_lookup)
  id: totrans-875
  prefs: []
  type: TYPE_NORMAL
  zh: VLOOKUP (lookup_value, table_array, col_index_num, range_lookup)
- en: 'You can write this function by using the built-in-function Arguments dialog-box.
    Click on the Formulas tab and search in the lookup & reference category for VLOOKUP.
    You will get a function Arguments dialog box, as shown in [Figure 3.8](#fig3-8):'
  id: totrans-876
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以通过使用内置函数参数对话框来编写此函数。点击“公式”选项卡，在查找与引用类别中搜索VLOOKUP。您将获得一个函数参数对话框，如图[图3.8](#fig3-8)所示：
- en: '![image](image/Figure_3.8.jpg)'
  id: totrans-877
  prefs: []
  type: TYPE_IMG
  zh: '![image](image/Figure_3.8.jpg)'
- en: Figure 3.8 VLOOKUP Function Argument
  id: totrans-878
  prefs: []
  type: TYPE_NORMAL
  zh: 图3.8 VLOOKUP函数参数
- en: 'The different values to be selected here are as follows:'
  id: totrans-879
  prefs: []
  type: TYPE_NORMAL
  zh: 这里可以选择的不同值如下：
- en: '■Lookup_value: The value to be found in the first column of the table. It is
    the value that you are looking for. Lookup_value can be a value, a reference,
    or a text string.'
  id: totrans-880
  prefs: []
  type: TYPE_NORMAL
  zh: ■Lookup_value：在表的第一个列中要查找的值。它是您正在寻找的值。Lookup_value可以是值、引用或文本字符串。
- en: '■Table_array: The table of information in which data is looked up. It is the
    source database. Use a reference to a range or a range name.'
  id: totrans-881
  prefs: []
  type: TYPE_NORMAL
  zh: ■Table_array：查找数据的信息表。它是源数据库。使用对范围或范围名称的引用。
- en: '■Col_index_num: The column number in table_array from which the matching value
    must be returned.'
  id: totrans-882
  prefs: []
  type: TYPE_NORMAL
  zh: ■Col_index_num：在table_array中必须返回匹配值的列号。
- en: '■Range_lookup: The logical value that specifies whether you want VLOOKUP to
    find an exact match or an approximate match. If Range Lookup is set as FALSE or
    0, VLOOKUP will find an exact match. If the exact match is not found, the error
    value #N/A is returned. If it is set to TRUE or non-zero, it finds the nearest
    value that is less than the lookup value.'
  id: totrans-883
  prefs: []
  type: TYPE_NORMAL
  zh: ■范围查找：指定是否希望VLOOKUP查找精确匹配或近似匹配的逻辑值。如果范围查找设置为FALSE或0，VLOOKUP将查找精确匹配。如果未找到精确匹配，则返回错误值#N/A。如果设置为TRUE或非零，则查找小于查找值的最近值。
- en: HLOOKUP
  id: totrans-884
  prefs: []
  type: TYPE_NORMAL
  zh: HLOOKUP
- en: The HLOOKUP function searches for a value in the top row of a table, and then
    returns a value in the same column from a row you specify.
  id: totrans-885
  prefs: []
  type: TYPE_NORMAL
  zh: HLOOKUP函数在表的顶部行中搜索一个值，然后从您指定的行返回同一列的值。
- en: 'Syntax:'
  id: totrans-886
  prefs: []
  type: TYPE_NORMAL
  zh: 语法：
- en: HLOOKUP (lookup_value, table_array, row_index_num, range_lookup)
  id: totrans-887
  prefs: []
  type: TYPE_NORMAL
  zh: HLOOKUP（查找值，表格数组，行索引号，范围查找）
- en: HLOOKUP works the same way as VLOOKUP. In this case, however, we need to specify
    the row index number, instead of the column index number.
  id: totrans-888
  prefs: []
  type: TYPE_NORMAL
  zh: HLOOKUP与VLOOKUP的工作方式相同。然而，在这种情况下，我们需要指定行索引号，而不是列索引号。
- en: Note You may also get the function argument box by the following type. Type
    =VLOOKUP (or =HLOOKUP (as the case may be) and press Ctrl + A.
  id: totrans-889
  prefs: []
  type: TYPE_NORMAL
  zh: 注意：你也可以通过以下方式获取函数参数框。输入=VLOOKUP（或=HLOOKUP（视情况而定）并按Ctrl + A。
- en: 'Example of VLOOKUP With Range 0 (False):'
  id: totrans-890
  prefs: []
  type: TYPE_NORMAL
  zh: VLOOKUP与范围0（False）的示例：
- en: 'Suppose you want to add an incentive in the Salary Sheet according to the incentive
    table, the range of which is A1:B12 in the Incentive worksheet. Follow these steps:'
  id: totrans-891
  prefs: []
  type: TYPE_NORMAL
  zh: 假设你想要根据激励表添加工资表中的激励，该表的范围在激励工作表的A1:B12。按照以下步骤操作：
- en: 1. Select the cell where you want the result.
  id: totrans-892
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 选择你想要结果所在的单元格。
- en: 2. Click the Insert function. Select the VLOOKUP() function from the Lookup
    and Reference category.
  id: totrans-893
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 点击插入函数。从查找和引用类别中选择VLOOKUP()函数。
- en: '3. Lookup Value: Select A2 (The Employee code).'
  id: totrans-894
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 查找值：选择A2（员工代码）。
- en: '4. Table Array: Select the Incentive Sheet and select the Range from $A$1:$B$12
    (the Employee code and incentive Column).'
  id: totrans-895
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 表格数组：选择激励表，并选择从$A$1:$B$12（员工代码和激励列）的范围。
- en: '5. Column Index: Type 2 (Column 2 is the Incentive column in Incentive table).'
  id: totrans-896
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 列索引：输入2（激励表中的第二列是激励列）。
- en: '6. Range Lookup: Type False. (This means we are searching for the exact match
    from the table for the lookup value).'
  id: totrans-897
  prefs: []
  type: TYPE_NORMAL
  zh: 6. 范围查找：输入False。（这意味着我们正在从表中搜索查找值的精确匹配）。
- en: 'To remove the #NA (Not Available) error, you can use the function iferror.
    The Syntax of iferror is as follows:'
  id: totrans-898
  prefs: []
  type: TYPE_NORMAL
  zh: 要移除#NA（不可用）错误，你可以使用iferror函数。iferror的语法如下：
- en: = iferror (vlookup….,"")
  id: totrans-899
  prefs: []
  type: TYPE_NORMAL
  zh: = iferror (vlookup…,"")
- en: Example of VLOOKUP with Range Non-Zero (True)
  id: totrans-900
  prefs: []
  type: TYPE_NORMAL
  zh: VLOOKUP与范围非零（True）的示例
- en: Suppose you want to add an incentive based on salary slab rates. In this case,
    instead of using the IF condition, you can use VLOOKUP with a True range. In this
    scenario, we would create a table, such as [Table 3.2](#tab3-2). In the table
    array, select this table, and in the field for range lookup, type “True” instead
    of “False.”
  id: totrans-901
  prefs: []
  type: TYPE_NORMAL
  zh: 假设你想要根据工资档次添加激励。在这种情况下，除了使用IF条件外，你还可以使用具有True范围的VLOOKUP。在这种情况下，我们会创建一个表格，例如[表3.2](#tab3-2)。在表格数组中，选择此表格，并在范围查找字段中输入“True”而不是“False”。
- en: TABLE 3.2 Sample Example Table
  id: totrans-902
  prefs: []
  type: TYPE_NORMAL
  zh: 表3.2 示例示例表
- en: '| 0 | 2% |'
  id: totrans-903
  prefs: []
  type: TYPE_TB
  zh: '| 0 | 2% |'
- en: '| 5000 | 5% |'
  id: totrans-904
  prefs: []
  type: TYPE_TB
  zh: '| 5000 | 5% |'
- en: '| 10000 | 10% |'
  id: totrans-905
  prefs: []
  type: TYPE_TB
  zh: '| 10000 | 10% |'
- en: '| 15000 | 15% |'
  id: totrans-906
  prefs: []
  type: TYPE_TB
  zh: '| 15000 | 15% |'
- en: Note The table in this case would be sorted in ascending order of first column.
  id: totrans-907
  prefs: []
  type: TYPE_NORMAL
  zh: 注意：在这种情况下，表格将按第一列的升序排序。
- en: 'Example:'
  id: totrans-908
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：
- en: In the Advanced Excel Assignment file titled “emp_inf sheet”, we need to retrieve
    employee information based on employee id. To do this, we may use VLOOKUP, as
    shown in [Figure 3.9](#fig3-9).
  id: totrans-909
  prefs: []
  type: TYPE_NORMAL
  zh: 在名为“emp_inf sheet”的Excel高级作业文件中，我们需要根据员工ID检索员工信息。为此，我们可以使用VLOOKUP，如图3.9所示。
- en: '![image](image/Figure_3.9.jpg)'
  id: totrans-910
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image/Figure_3.9.jpg)'
- en: Figure 3.9 Example of VLOOKUP with Range Non-Zero
  id: totrans-911
  prefs: []
  type: TYPE_NORMAL
  zh: 图3.9 VLOOKUP与范围非零的示例
- en: To find other details, you may use the same formula and change the column index
    number accordingly.
  id: totrans-912
  prefs: []
  type: TYPE_NORMAL
  zh: 要查找其他详细信息，你可以使用相同的公式并相应地更改列索引号。
- en: Making VLOOKUP Dynamic
  id: totrans-913
  prefs: []
  type: TYPE_NORMAL
  zh: 使VLOOKUP动态化
- en: 'When we have a dynamic database, with new columns frequently being added to
    the database, the position of the current columns may also change. The column
    index number of VLOOKUP does not update automatically with the growing database,
    however. This is why we would need to make VLOOKUP dynamic: in order to pick up
    the column index number. To do this, we may use one of the following functions
    to retrieve the column index number dynamically:'
  id: totrans-914
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们有一个动态数据库，数据库中经常添加新列时，当前列的位置也可能发生变化。然而，VLOOKUP的列索引号不会随着数据库的增长而自动更新。这就是为什么我们需要使VLOOKUP动态化的原因：为了获取列索引号。为此，我们可以使用以下函数之一来动态检索列索引号：
- en: ■Column
  id: totrans-915
  prefs: []
  type: TYPE_NORMAL
  zh: ■列
- en: ■Match
  id: totrans-916
  prefs: []
  type: TYPE_NORMAL
  zh: ■匹配
- en: Using the Column Function in VLOOKUP
  id: totrans-917
  prefs: []
  type: TYPE_NORMAL
  zh: 在VLOOKUP中使用列函数
- en: 'To make VLOOKUP dynamic, we can use the column header as an indicator that
    will dynamically pick up the index number of the particular column in which the
    required value exists. The syntax for using the column functions in VLOOKUP is:'
  id: totrans-918
  prefs: []
  type: TYPE_NORMAL
  zh: 要使VLOOKUP动态化，我们可以使用列标题作为指示器，它会动态地获取存在所需值的特定列的索引号。在VLOOKUP中使用列函数的语法如下：
- en: = vlookup (lookup_value, table_array, COLUMN (reference), Range_lookup)
  id: totrans-919
  prefs: []
  type: TYPE_NORMAL
  zh: = vlookup (查找值，表格数组，COLUMN (参考)，范围查找）
- en: The Reference parameter of the column function will contain the cell reference
    of the column header from the original database.
  id: totrans-920
  prefs: []
  type: TYPE_NORMAL
  zh: 列函数的引用参数将包含原始数据库中列标题的单元格引用。
- en: 'Example:'
  id: totrans-921
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：
- en: In the preceding example of VLOOKUP, if we need to find the column index number
    dynamically, we may use the column function, as shown in [Figure 3.10](#fig3-10).
  id: totrans-922
  prefs: []
  type: TYPE_NORMAL
  zh: 在前面的VLOOKUP示例中，如果我们需要动态地找到列索引号，我们可以使用列函数，如图3.10所示。
- en: '![image](image/Figure_3.10.jpg)'
  id: totrans-923
  prefs: []
  type: TYPE_IMG
  zh: '![image](image/Figure_3.10.jpg)'
- en: Figure 3.10 Using the Column Function in VLOOKUP
  id: totrans-924
  prefs: []
  type: TYPE_NORMAL
  zh: 图3.10 在VLOOKUP中使用列函数
- en: B1 is the reference to the column header of the First Name column in the “Salary”
    worksheet.
  id: totrans-925
  prefs: []
  type: TYPE_NORMAL
  zh: B1是“Salary”工作表中“First Name”列标题的引用。
- en: Using the Match Function in VLOOKUP
  id: totrans-926
  prefs: []
  type: TYPE_NORMAL
  zh: 在VLOOKUP中使用匹配函数
- en: As we saw in the preceding case, we require access to the original database,
    or at least an idea as to the current position of the column. This information
    will not always be there for us, however. In that case, we need to use a function
    that can retrieve the position of the column header by name.
  id: totrans-927
  prefs: []
  type: TYPE_NORMAL
  zh: 如前所述，我们需要访问原始数据库，或者至少了解列的当前位置。然而，这种信息并不总是对我们有用。在这种情况下，我们需要使用一个可以按名称检索列标题位置的函数。
- en: A Match function does the same action. The match function returns the position
    of a string in a range.
  id: totrans-928
  prefs: []
  type: TYPE_NORMAL
  zh: 匹配函数执行相同的操作。匹配函数返回字符串在范围内的位置。
- en: 'The syntax of the match function is as follows:'
  id: totrans-929
  prefs: []
  type: TYPE_NORMAL
  zh: 匹配函数的语法如下：
- en: MATCH (lookup_value, lookup_array, [match_type])
  id: totrans-930
  prefs: []
  type: TYPE_NORMAL
  zh: MATCH(lookup_value, lookup_array, [match_type])
- en: 'The various options to be chosen are:'
  id: totrans-931
  prefs: []
  type: TYPE_NORMAL
  zh: 可选的选项如下：
- en: '■Lookup_Value: This is the string that we are looking for. It may be a string
    (for example, “Salary”) or a cell reference where the string is stored.'
  id: totrans-932
  prefs: []
  type: TYPE_NORMAL
  zh: ■查找值：这是我们正在寻找的字符串。它可以是字符串（例如，“Salary”）或存储字符串的单元格引用。
- en: '■Lookup_Array: This is the range from which we need to know the position of
    the Lookup_value.'
  id: totrans-933
  prefs: []
  type: TYPE_NORMAL
  zh: ■查找数组：这是我们需要知道查找值位置的数组。
- en: '■Match_Type: This is an optional parameter that is used to specify the type
    of match we require. We use 0 for Exact match, 1 for Less than, and -1 for Greater
    Than.'
  id: totrans-934
  prefs: []
  type: TYPE_NORMAL
  zh: ■匹配类型：这是一个可选参数，用于指定所需的匹配类型。我们使用0进行精确匹配，1进行小于匹配，-1进行大于匹配。
- en: 'Example:'
  id: totrans-935
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：
- en: 'If we need to find out the position of the string “salary” in the first row
    of the salary sheet, we would write:'
  id: totrans-936
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们需要找出字符串“salary”在薪酬表第一行的位置，我们将编写：
- en: =match ("salary", salary! $1:$1, 0)
  id: totrans-937
  prefs: []
  type: TYPE_NORMAL
  zh: =match("salary", salary!$1:$1, 0)
- en: We may use the match function instead of the column index number to get the
    column index number dynamically.
  id: totrans-938
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以使用匹配函数而不是列索引号来动态获取列索引号。
- en: 'The syntax of using the match function in VLOOKUP is:'
  id: totrans-939
  prefs: []
  type: TYPE_NORMAL
  zh: 在VLOOKUP中使用匹配函数的语法如下：
- en: 'Example:'
  id: totrans-940
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：
- en: =vlookup (lookup_value, table_array, match (label, firstrow of source-database,
    0), Range_lookup)
  id: totrans-941
  prefs: []
  type: TYPE_NORMAL
  zh: =vlookup(lookup_value, table_array, match(label, firstrow of source-database,
    0), Range_lookup)
- en: In the emp_inf example, if we need to make the VLOOKUP more dynamic using the
    column headers, we may use match with VLOOKUP, as shown in [Figure 3.11](#fig3-11).
    Here, the match looks for the labels on each field in the header of the salary
    database and returns the position of the column dynamically.
  id: totrans-942
  prefs: []
  type: TYPE_NORMAL
  zh: 在emp_inf示例中，如果我们需要通过列标题使VLOOKUP更加动态，我们可以使用匹配函数与VLOOKUP一起使用，如图3.11所示。在这里，匹配函数查找薪酬数据库标题中每个字段的标签，并动态返回列的位置。
- en: '![image](image/Figure_3.11.jpg)'
  id: totrans-943
  prefs: []
  type: TYPE_IMG
  zh: '![image](image/Figure_3.11.jpg)'
- en: Figure 3.11 Match Function in Vlookup
  id: totrans-944
  prefs: []
  type: TYPE_NORMAL
  zh: 图3.11 VLOOKUP中的匹配函数
- en: Index
  id: totrans-945
  prefs: []
  type: TYPE_NORMAL
  zh: 索引
- en: Sometimes, we need to lookup data based on its row number and column number.
    The Index function helps us do this.
  id: totrans-946
  prefs: []
  type: TYPE_NORMAL
  zh: 有时，我们需要根据行号和列号查找数据。索引函数帮助我们完成这项任务。
- en: INDEX (array, row_number, [column_number])
  id: totrans-947
  prefs: []
  type: TYPE_NORMAL
  zh: INDEX(array, row_number, [column_number])
- en: 'The syntax of index function is as follows:'
  id: totrans-948
  prefs: []
  type: TYPE_NORMAL
  zh: index函数的语法如下：
- en: As you can see, there are two ways in which you can use the index function.
    The first syntax is used to look for data in a single database, and the second
    syntax is used when more than one database is involved.
  id: totrans-949
  prefs: []
  type: TYPE_NORMAL
  zh: 如您所见，有两种方式可以使用索引函数。第一种语法用于在单个数据库中查找数据，第二种语法用于涉及多个数据库的情况。
- en: 'Example:'
  id: totrans-950
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：
- en: 'Suppose we need to find the data at the intersection of row number 3 and column
    number 4 of a database. In that case, we may use the following function:'
  id: totrans-951
  prefs: []
  type: TYPE_NORMAL
  zh: 假设我们需要找到数据库中行号为3和列号为4的数据。在这种情况下，我们可以使用以下函数：
- en: =index (database, 3, 4)
  id: totrans-952
  prefs: []
  type: TYPE_NORMAL
  zh: =index(database, 3, 4)
- en: Index-Match
  id: totrans-953
  prefs: []
  type: TYPE_NORMAL
  zh: 索引-匹配
- en: As we studied before, VLOOKUP looks for data on the basis of values in the first
    column of the database. If we have a database where our lookup value is in the
    middle and we need to search towards the left, however, we have to move the column
    to the left-most corner before we use VLOOKUP. The index function, when used along
    with match, helps us search for the data even if the lookup value is not present
    in the left-most column.
  id: totrans-954
  prefs: []
  type: TYPE_NORMAL
  zh: 如我们之前所研究的，VLOOKUP基于数据库第一列的值来查找数据。如果我们有一个数据库，我们的查找值位于中间，并且我们需要向左搜索，然而，在使用VLOOKUP之前，我们必须将列移动到最左侧。当与match一起使用时，index函数帮助我们即使在查找值不在最左侧列中时也能搜索数据。
- en: INDEX (array, [MATCH (lookup_value, lookup_array, [match_type])], [Match (lookup_value,
    lookup_array, [match_type])])
  id: totrans-955
  prefs: []
  type: TYPE_NORMAL
  zh: INDEX (数组, [MATCH (查找值, 查找数组, [匹配类型])], [Match (查找值, 查找数组, [匹配类型])])
- en: 'The syntax for index-match is as follows:'
  id: totrans-956
  prefs: []
  type: TYPE_NORMAL
  zh: Index-Match的语法如下：
- en: Here, you may use the match function for row number, column number, or both.
  id: totrans-957
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，您可以使用match函数进行行号、列号或两者的匹配。
- en: 'Example:'
  id: totrans-958
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：
- en: 'Suppose that from the data given in [Figure 3.12](#fig3-12), we need to find
    the total sales, given year and quarter. We may then use the function:'
  id: totrans-959
  prefs: []
  type: TYPE_NORMAL
  zh: 假设我们从[图3.12](#fig3-12)中给出的数据中需要找到给定年份和季度的总销售额。然后我们可以使用以下函数：
- en: =INDEX (database, MATCH (qtr 3, column header, 0), MATCH (year, years column,
    0))
  id: totrans-960
  prefs: []
  type: TYPE_NORMAL
  zh: =INDEX (数据库, MATCH (季度3, 列标题, 0), MATCH (年份, 年份列, 0))
- en: '![image](image/Figure_3.12.jpg)'
  id: totrans-961
  prefs: []
  type: TYPE_IMG
  zh: '![image](image/Figure_3.12.jpg)'
- en: Figure 3.12 Index-match Function
  id: totrans-962
  prefs: []
  type: TYPE_NORMAL
  zh: 图3.12 Index-Match函数
- en: 'In [Figure 3.13](#fig3-13), empcode is the third column. If we need to find
    out the DA or Salary based on the empcode, we normally copy and paste the column
    towards the left and use VLOOKUP. Instead, we may use index match as given in
    [Figure 3.13](#fig3-13):'
  id: totrans-963
  prefs: []
  type: TYPE_NORMAL
  zh: 在[图3.13](#fig3-13)中，empcode是第三列。如果我们需要根据empcode查找DA或工资，我们通常会复制并粘贴该列到左侧并使用VLOOKUP。相反，我们可以使用[图3.13](#fig3-13)中给出的index
    match：
- en: '![image](image/Figure_3.13.jpg)'
  id: totrans-964
  prefs: []
  type: TYPE_IMG
  zh: '![image](image/Figure_3.13.jpg)'
- en: Figure 3.13 Find the DA or Salary Based on the empcode by Using Index Match
  id: totrans-965
  prefs: []
  type: TYPE_NORMAL
  zh: 图3.13 通过Index Match使用empcode查找DA或工资
- en: Conclusion
  id: totrans-966
  prefs: []
  type: TYPE_NORMAL
  zh: 结论
- en: In conclusion, the use of formulas and functions in Microsoft Excel is essential
    for performing calculations, data analysis, and automating tasks. Formulas allow
    users to combine values, cell references, and operators to perform mathematical
    calculations, while functions provide predefined formulas for common tasks. By
    utilizing formulas and functions effectively, users can save time, minimize errors,
    and perform complex data analysis in Excel. Understanding and mastering these
    tools is crucial for anyone working with data and spreadsheets in Excel.
  id: totrans-967
  prefs: []
  type: TYPE_NORMAL
  zh: 总之，在Microsoft Excel中使用公式和函数对于执行计算、数据分析以及自动化任务至关重要。公式允许用户组合值、单元格引用和运算符以执行数学计算，而函数为常见任务提供预定义的公式。通过有效地利用公式和函数，用户可以节省时间，减少错误，并在Excel中执行复杂的数据分析。理解和掌握这些工具对于任何在Excel中处理数据和电子表格的人来说都是至关重要的。
- en: Exercise
  id: totrans-968
  prefs: []
  type: TYPE_NORMAL
  zh: 练习
- en: '1. Make a copy of the Salary worksheet from the advanced Excel assignment workbook.
    Calculate the following incentive schemes:'
  id: totrans-969
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 从高级Excel作业工作簿中复制工资工作表。计算以下激励方案：
- en: 'a. Incentive 1: Everyone working in the Sales department gets 10% of their
    salary as an incentive; all others get 0%.'
  id: totrans-970
  prefs: []
  type: TYPE_NORMAL
  zh: a. 激励措施1：销售部门的每位员工将获得其工资的10%作为激励；其他所有员工获得0%。
- en: 'b. Incentive 2: Everyone working in the Sales or Marketing departments gets
    5% of their salary as incentive; all others get 2%.'
  id: totrans-971
  prefs: []
  type: TYPE_NORMAL
  zh: b. 激励措施2：销售或市场部门的每位员工将获得其工资的5%作为激励；其他所有员工获得2%。
- en: 2. Calculate the incentive scheme in Q.1 using VLOOKUP column.
  id: totrans-972
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 使用VLOOKUP列计算Q.1中的激励方案。
- en: 3. Make a column titled “Reporting Manager” after the Salary column and apply
    the employee code of the managers to the employees, according to their employee
    numbers as follows, using VLOOKUP.
  id: totrans-973
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 在工资列之后创建一个名为“报告经理”的列，并根据员工的员工编号将经理的员工代码应用于员工，如下所示，使用VLOOKUP。
- en: CHAPTER    4
  id: totrans-974
  prefs: []
  type: TYPE_NORMAL
  zh: 第四章
- en: Data Validation
  id: totrans-975
  prefs: []
  type: TYPE_NORMAL
  zh: 数据验证
- en: Introduction
  id: totrans-976
  prefs: []
  type: TYPE_NORMAL
  zh: 简介
- en: Sometimes we want to prevent the user from entering a non-text value in a cell.
    In other words, you can say that you want to restrict the user from entering a
    certain type of value in the cell. Data Validation does this work for you.
  id: totrans-977
  prefs: []
  type: TYPE_NORMAL
  zh: 有时我们希望防止用户在单元格中输入非文本值。换句话说，您可以说您希望限制用户在单元格中输入某种类型的值。数据验证为您完成这项工作。
- en: Data Validation is a process which prevents the users from entering invalid
    data for individual cells or for a cell range. With the help of data validation,
    you can limit data entry to a specific data type, like integer numbers, fractional
    (decimal) numbers, or text. You can also set a limit on valid entries.
  id: totrans-978
  prefs: []
  type: TYPE_NORMAL
  zh: '数据验证是一个过程，它防止用户为单个单元格或单元格范围输入无效数据。借助数据验证，你可以限制数据输入到特定数据类型，如整数、分数（小数）或文本。你还可以设置有效输入的限制。 '
- en: Structure
  id: totrans-979
  prefs: []
  type: TYPE_NORMAL
  zh: 结构
- en: 'In this chapter, we will go over the following topics:'
  id: totrans-980
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将讨论以下主题：
- en: ■Trace Precedents
  id: totrans-981
  prefs: []
  type: TYPE_NORMAL
  zh: ■跟踪 precedent
- en: ■Trace Dependents
  id: totrans-982
  prefs: []
  type: TYPE_NORMAL
  zh: ■跟踪 dependent
- en: ■Setting Data Validation Rules
  id: totrans-983
  prefs: []
  type: TYPE_NORMAL
  zh: ■设置数据验证规则
- en: ■Methods of Data Validation
  id: totrans-984
  prefs: []
  type: TYPE_NORMAL
  zh: ■数据验证方法
- en: Objectives
  id: totrans-985
  prefs: []
  type: TYPE_NORMAL
  zh: 目标
- en: After studying this chapter, students will be able to describe how to restrict
    data entry in any cell or in any worksheet, as well as identify various Data Validation
    techniques.
  id: totrans-986
  prefs: []
  type: TYPE_NORMAL
  zh: 在学习本章后，学生将能够描述如何限制任何单元格或任何工作表中的数据输入，以及识别各种数据验证技术。
- en: Trace Precedents
  id: totrans-987
  prefs: []
  type: TYPE_NORMAL
  zh: 跟踪 precedent
- en: 'Trace Precedents and Trace Dependents are two features in Excel that allow
    you to visualize and understand the relationships between cells in a spreadsheet.
    Here is a brief overview of each:'
  id: totrans-988
  prefs: []
  type: TYPE_NORMAL
  zh: 跟踪 precedent 和跟踪 dependent 是 Excel 中的两个功能，允许你可视化并理解电子表格中单元格之间的关系。以下是每个功能的简要概述：
- en: Trace Precedents allow you to see which cells are referenced by a selected cell.
    This is useful for understanding how data flows through your spreadsheet and identifying
    any potential errors or issues. To use Trace Precedents, select the cell you want
    to trace, and then click the Trace Precedents button in the Formula Auditing section
    of the ribbon. Excel will draw arrows pointing to the cells that are referenced
    by the selected cell.
  id: totrans-989
  prefs: []
  type: TYPE_NORMAL
  zh: 跟踪 precedent 允许你看到哪些单元格被选定的单元格引用。这对于理解数据如何通过你的电子表格流动以及识别任何潜在的错误或问题很有用。要使用跟踪
    precedent，请选择要跟踪的单元格，然后在功能区公式审核部分单击跟踪 precedent 按钮。Excel 将绘制指向被选定单元格引用的单元格的箭头。
- en: For example, imagine you have a spreadsheet that calculates the total revenue
    for a company based on the number of units sold and the price per unit. The formula
    for the total revenue is simply the product of the number of units sold and the
    price per unit. In this example, cell C2 contains the formula for the total revenue,
    which is “=A2*B2”. Cell A2 contains the number of units sold, and cell B2 contains
    the price per unit.
  id: totrans-990
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，假设你有一个电子表格，它根据销售单位和每单位价格计算公司的总收入。总收入的公式仅仅是销售单位和每单位价格的乘积。在这个例子中，单元格 C2 包含总收入的公式，即“=A2*B2”。单元格
    A2 包含销售单位数，单元格 B2 包含每单位价格。
- en: 'Refer to [Figure 4.1](#fig4-1):'
  id: totrans-991
  prefs: []
  type: TYPE_NORMAL
  zh: 请参阅[图 4.1](#fig4-1)：
- en: '![image](image/Figure_4.1.jpg)'
  id: totrans-992
  prefs: []
  type: TYPE_IMG
  zh: '![image](image/Figure_4.1.jpg)'
- en: Figure 4.1 Example of Trace Precedent
  id: totrans-993
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4.1 跟踪 precedent 示例
- en: 'To use Trace Precedents to see which cells are referenced by cell C2, follow
    these steps:'
  id: totrans-994
  prefs: []
  type: TYPE_NORMAL
  zh: 要使用跟踪 precedent 来查看哪些单元格被单元格 C2 引用，请按照以下步骤操作：
- en: '1. Select cell C2, as shown:'
  id: totrans-995
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 选择单元格 C2，如图所示：
- en: '![image](image/Figure_4.2.jpg)'
  id: totrans-996
  prefs: []
  type: TYPE_IMG
  zh: '![image](image/Figure_4.2.jpg)'
- en: Figure 4.2 Apply a Formula for Total Revenue
  id: totrans-997
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4.2 应用总收入公式
- en: '2. Click on the Trace Precedents button in the Formula Auditing section of
    the ribbon, as shown:'
  id: totrans-998
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 在功能区公式审核部分单击跟踪 precedent 按钮，如图所示：
- en: '![image](image/Figure_4.3.jpg)'
  id: totrans-999
  prefs: []
  type: TYPE_IMG
  zh: '![image](image/Figure_4.3.jpg)'
- en: Figure 4.3 Formulas Tab
  id: totrans-1000
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4.3 公式选项卡
- en: 'Excel will draw arrows pointing to cells A2 and B2, indicating that they are
    the cells referenced by the formula in cell C2, as shown:'
  id: totrans-1001
  prefs: []
  type: TYPE_NORMAL
  zh: Excel 将绘制指向单元格 A2 和 B2 的箭头，指示它们是单元格 C2 中公式的引用单元格，如图所示：
- en: '![image](image/Figure_4.4.jpg)'
  id: totrans-1002
  prefs: []
  type: TYPE_IMG
  zh: '![image](image/Figure_4.4.jpg)'
- en: Figure 4.4 Trace Precedent
  id: totrans-1003
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4.4 跟踪 precedent
- en: This shows you that the formula in cell C2 is dependent on the values in cells
    A2 and B2\. If you change the values in either of these cells, the value in cell
    C2 will change accordingly.
  id: totrans-1004
  prefs: []
  type: TYPE_NORMAL
  zh: 这表明单元格 C2 中的公式依赖于单元格 A2 和 B2 中的值。如果你更改这些单元格中的任何一个值，单元格 C2 中的值将相应地更改。
- en: Using Trace Precedents helps you understand how data flows through your spreadsheet
    and is useful for identifying potential errors or issues in your formulas.
  id: totrans-1005
  prefs: []
  type: TYPE_NORMAL
  zh: 使用跟踪 precedent 有助于你了解数据如何通过你的电子表格流动，并且对于识别公式中的潜在错误或问题很有用。
- en: Trace Dependents
  id: totrans-1006
  prefs: []
  type: TYPE_NORMAL
  zh: 跟踪 dependent
- en: Trace Dependents allows you to see which cells depend on a selected cell. This
    is useful for understanding the impact that changing a particular cell will have
    on other parts of your spreadsheet. To use Trace Dependents, select the cell you
    want to trace, and then click the Trace Dependents button in the Formula Auditing
    section of the ribbon. Excel will draw arrows pointing to the cells that depend
    on the selected cell.
  id: totrans-1007
  prefs: []
  type: TYPE_NORMAL
  zh: “追踪依赖项”允许您查看哪些单元格依赖于所选单元格。这对于理解更改特定单元格将如何影响电子表格的其他部分非常有用。要使用“追踪依赖项”，请选择您想要追踪的单元格，然后单击功能区公式审核部分中的“追踪依赖项”按钮。Excel将绘制指向依赖于所选单元格的单元格的箭头。
- en: Both Trace Precedents and Trace Dependents can help you understand the structure
    of your spreadsheet and troubleshoot any errors or issues that may arise. By using
    these features, you can more easily navigate and analyze complex spreadsheets,
    and make more informed decisions based on your data.
  id: totrans-1008
  prefs: []
  type: TYPE_NORMAL
  zh: “追踪前导项”和“追踪依赖项”都可以帮助您理解电子表格的结构，并解决可能出现的任何错误或问题。通过使用这些功能，您可以更轻松地导航和分析复杂的电子表格，并基于您的数据做出更明智的决策。
- en: How to Use Trace Dependents
  id: totrans-1009
  prefs: []
  type: TYPE_NORMAL
  zh: 如何使用“追踪依赖项”
- en: In this example, you have a spreadsheet that calculates the monthly payment
    on a loan based on the principal, interest rate, and term. The formula for the
    monthly payment is based on the principle, interest rate, and term, which are
    stored in cells A1, A2, and A3, respectively. Cell A4 contains the formula for
    the monthly payment, which is calculated using the PMT function.
  id: totrans-1010
  prefs: []
  type: TYPE_NORMAL
  zh: 在此示例中，您有一个电子表格，它根据本金、利率和期限计算贷款的月付款。月付款的公式基于本金、利率和期限，分别存储在单元格A1、A2和A3中。单元格A4包含月付款的公式，该公式使用PMT函数计算。
- en: 'To use Trace Dependents to see which cells depend on cell A4:'
  id: totrans-1011
  prefs: []
  type: TYPE_NORMAL
  zh: 要使用“追踪依赖项”来查看哪些单元格依赖于单元格A4：
- en: 1. Select cell A4.
  id: totrans-1012
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 选择单元格A4。
- en: 2. Click on the Trace Dependents button in the Formula Auditing section of the
    ribbon.
  id: totrans-1013
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 在功能区公式审核部分单击“追踪依赖项”按钮。
- en: 3. Excel will draw arrows pointing to any cells that depend on cell A4.
  id: totrans-1014
  prefs: []
  type: TYPE_NORMAL
  zh: 3. Excel将绘制指向任何依赖于单元格A4的单元格的箭头。
- en: 4. In this example, cells B4, C4, and D4 depend on cell A4, because they contain
    the breakdown of the monthly payment, including the portion that goes towards
    principal, interest, and any additional fees or charges.
  id: totrans-1015
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 在此示例中，单元格B4、C4和D4依赖于单元格A4，因为它们包含月付款的分解，包括本金、利息以及任何额外的费用或收费。
- en: 'Refer to [Figure 4.5](#fig4-5):'
  id: totrans-1016
  prefs: []
  type: TYPE_NORMAL
  zh: 参考图4.5：
- en: '![image](image/Figure_4.5.jpg)'
  id: totrans-1017
  prefs: []
  type: TYPE_IMG
  zh: '![image](image/Figure_4.5.jpg)'
- en: Figure 4.5 Trace Dependents
  id: totrans-1018
  prefs: []
  type: TYPE_NORMAL
  zh: 图4.5 追踪依赖项
- en: By using Trace Dependents, you can see which cells are affected by changing
    the value in cell A4\. If you were to increase the interest rate or change the
    loan term, for example, you could use Trace Dependents to see how this would affect
    the monthly payment and its breakdown.
  id: totrans-1019
  prefs: []
  type: TYPE_NORMAL
  zh: 通过使用“追踪依赖项”，您可以查看哪些单元格会受到单元格A4中值变化的影響。例如，如果您要增加利率或更改贷款期限，您可以使用“追踪依赖项”来查看这将如何影响月付款及其分解。
- en: Using Trace Dependents can help you understand the structure of your spreadsheet
    and make more informed decisions based on your data.
  id: totrans-1020
  prefs: []
  type: TYPE_NORMAL
  zh: 使用“追踪依赖项”可以帮助您理解电子表格的结构，并基于您的数据做出更明智的决策。
- en: Setting Data Validation Rules
  id: totrans-1021
  prefs: []
  type: TYPE_NORMAL
  zh: 设置数据验证规则
- en: 'Follow the steps below to create a set of rules for data validation:'
  id: totrans-1022
  prefs: []
  type: TYPE_NORMAL
  zh: 按照以下步骤创建数据验证的规则集：
- en: 1. Select the cells for which you want to create a validation rule.
  id: totrans-1023
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 选择您想要创建验证规则的单元格。
- en: 2. On the Data tab, in the Data Tools group, click Data Validation to open the
    Data Validation dialog box (shown in [Figure 4.1](#fig4-1)).
  id: totrans-1024
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 在“数据”选项卡上的“数据工具”组中，单击“数据验证”以打开数据验证对话框（如图4.1所示）。
- en: 3. Activate the Settings tab.
  id: totrans-1025
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 激活“设置”选项卡。
- en: 4. From the Allow list, select a data validation option.
  id: totrans-1026
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 从“允许”列表中选择数据验证选项。
- en: 5. From the Data list, select the operator you want.
  id: totrans-1027
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 从“数据”列表中选择您想要的运算符。
- en: 6. Complete the remaining entries.
  id: totrans-1028
  prefs: []
  type: TYPE_NORMAL
  zh: 6. 完成剩余的输入。
- en: 7. If required, enter the Input Message in the Input Message tab.
  id: totrans-1029
  prefs: []
  type: TYPE_NORMAL
  zh: 7. 如有必要，在“输入消息”选项卡中输入输入消息。
- en: 8. If required, enter the error message in the Error Alert tab.
  id: totrans-1030
  prefs: []
  type: TYPE_NORMAL
  zh: 8. 如有必要，在“错误警报”选项卡中输入错误消息。
- en: 9. Click OK to set the validation rule.
  id: totrans-1031
  prefs: []
  type: TYPE_NORMAL
  zh: 9. 单击“确定”以设置验证规则。
- en: 10. Close the dialog box.
  id: totrans-1032
  prefs: []
  type: TYPE_NORMAL
  zh: 10. 关闭对话框。
- en: 'Refer to [Figure 4.6](#fig4-6):'
  id: totrans-1033
  prefs: []
  type: TYPE_NORMAL
  zh: 参考图4.6：
- en: '![image](image/Figure_4.6.jpg)'
  id: totrans-1034
  prefs: []
  type: TYPE_IMG
  zh: '![image](image/Figure_4.6.jpg)'
- en: Figure 4.6 Data Validation
  id: totrans-1035
  prefs: []
  type: TYPE_NORMAL
  zh: 图4.6 数据验证
- en: Methods of Data Validation
  id: totrans-1036
  prefs: []
  type: TYPE_NORMAL
  zh: 数据验证方法
- en: 'Let us now look at a method of data validation: creating a list.'
  id: totrans-1037
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看数据验证的一种方法：创建列表。
- en: Creating a List
  id: totrans-1038
  prefs: []
  type: TYPE_NORMAL
  zh: 创建列表
- en: A list is an effective form of data validation where the user is allowed to
    select an option from a drop-down list which is built into the cell ([Figure 4.7](#fig4-7)).
    The data source may be written manually by the user or selected from the same
    sheet.
  id: totrans-1039
  prefs: []
  type: TYPE_NORMAL
  zh: 列表是一种有效的数据验证形式，用户可以从内置单元格的下拉列表中选择一个选项（[图 4.7](#fig4-7)）。数据源可以是用户手动编写，或从同一工作表中选择。
- en: 'The following are the steps to create a list:'
  id: totrans-1040
  prefs: []
  type: TYPE_NORMAL
  zh: 创建列表的以下步骤：
- en: 1. Select a blank cell.
  id: totrans-1041
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 选择一个空白单元格。
- en: 2. Select Data tab.
  id: totrans-1042
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 选择“数据”选项卡。
- en: 3. Select Data Validation from Data Tool group.
  id: totrans-1043
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 从数据工具组中选择“数据验证”。
- en: 4. Select List.
  id: totrans-1044
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 选择“列表”。
- en: 5. In Source, select the cell with values, or type the data with commas.
  id: totrans-1045
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 在“源”中，选择包含值的单元格，或用逗号输入数据。
- en: 'Refer to [Figure 4.7](#fig4-7):'
  id: totrans-1046
  prefs: []
  type: TYPE_NORMAL
  zh: 参考图 4.7 [Figure 4.7](#fig4-7)：
- en: '![image](image/Figure_4.7.jpg)'
  id: totrans-1047
  prefs: []
  type: TYPE_IMG
  zh: '![image](image/Figure_4.7.jpg)'
- en: Figure 4.7 Creating a List
  id: totrans-1048
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4.7 创建列表
- en: Note If the source is from a different sheet, create a named range for all the
    values and use the name in the Source field for Data Validation.
  id: totrans-1049
  prefs: []
  type: TYPE_NORMAL
  zh: 注意：如果源来自不同的工作表，为所有值创建一个命名范围，并在数据验证的源字段中使用该名称。
- en: 'Allow Numbers Within Limits:'
  id: totrans-1050
  prefs: []
  type: TYPE_NORMAL
  zh: 允许在范围内的数字：
- en: 1. In the Allow box, click Whole Number or Decimal.
  id: totrans-1051
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 在“允许”框中，点击“整数”或“十进制”。
- en: 2. In the Data box, select the type of restriction you want. For example, to
    set upper and lower limits, select Between.
  id: totrans-1052
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 在“数据”框中，选择您想要的限制类型。例如，要设置上下限，请选择“介于”。
- en: 3. Enter the minimum, maximum, or specific value to allow.
  id: totrans-1053
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 输入允许的最小值、最大值或特定值。
- en: 'Allow Dates or Times Within a Timeframe:'
  id: totrans-1054
  prefs: []
  type: TYPE_NORMAL
  zh: 允许在时间范围内输入日期或时间：
- en: 1. In the Allow box, select Date or Time.
  id: totrans-1055
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 在“允许”框中，选择日期或时间。
- en: 2. In the Data box, select the type of restriction you want. For example, to
    allow dates after a certain day, select Greater Than.
  id: totrans-1056
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 在“数据”框中，选择您想要的限制类型。例如，要允许在某个日期之后的日期，请选择“大于”。
- en: 3. Enter the start, end, or specific date or time to allow.
  id: totrans-1057
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 输入允许的开始、结束或特定日期或时间。
- en: 'Allow Text of a Specified Length:'
  id: totrans-1058
  prefs: []
  type: TYPE_NORMAL
  zh: 允许指定长度的文本：
- en: 1. In the Allow box, click Text Length.
  id: totrans-1059
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 在“允许”框中，点击“文本长度”。
- en: 2. In the Data box, click the type of restriction you want. For example, to
    allow up to a certain number of characters, click less than or equal to.
  id: totrans-1060
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 在“数据”框中，点击您想要的限制类型。例如，要允许达到一定数量的字符，请点击“小于或等于”。
- en: 3. Enter the minimum, maximum, or specific length for the text.
  id: totrans-1061
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 输入文本的最小值、最大值或特定长度。
- en: 'Calculate What is Allowed Based on the Content of Another Cell:'
  id: totrans-1062
  prefs: []
  type: TYPE_NORMAL
  zh: 根据另一个单元格的内容计算允许的内容：
- en: 1. In the Allow box, select the type of data you want.
  id: totrans-1063
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 在“允许”框中，选择您想要的数据类型。
- en: 2. In the Data box, select the operator you want.
  id: totrans-1064
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 在“数据”框中，选择您想要的运算符。
- en: 3. In the box or boxes below the Data box, click the cell that you want to use
    to specify what is allowed.
  id: totrans-1065
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 在数据框下面的框或框中，点击您想要用来指定允许内容的单元格。
- en: For example, to allow entries for an account only if the result will not go
    over the budget, click Decimal for Allow, select less than or equal to for Data,
    and in the Maximum box, click the cell that contains the budget amount.
  id: totrans-1066
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，要仅在结果不会超过预算的情况下允许账户输入，请点击“允许”下的“十进制”，选择“小于或等于”作为数据，并在“最大值”框中点击包含预算金额的单元格。
- en: 'Use a Formula to Calculate What is Allowed:'
  id: totrans-1067
  prefs: []
  type: TYPE_NORMAL
  zh: 使用公式计算允许的内容：
- en: 1. In the Allow box, click Custom.
  id: totrans-1068
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 在“允许”框中，点击“自定义”。
- en: '2. In the Formula box, enter a formula that calculates a logical value (TRUE
    for valid entries or FALSE for invalid). For example, to give an incentive only
    if the department is sales and the region is west, you may use the following custom
    formula: =and(d2=”sales”,e2=”west”).'
  id: totrans-1069
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 在“公式”框中，输入计算逻辑值的公式（有效输入为 TRUE，无效输入为 FALSE）。例如，如果要仅在部门为销售且地区为西部时提供激励，您可以使用以下自定义公式：=and(d2="sales",e2="west")。
- en: To display an optional input message when the cell is clicked, click the Input
    Message tab. Ensure the Show Input Message When Cell is Selected checkbox is selected
    and fill in the title and text for the message.
  id: totrans-1070
  prefs: []
  type: TYPE_NORMAL
  zh: 要在点击单元格时显示可选的输入消息，请点击“输入消息”选项卡。确保选中“选择单元格时显示输入消息”复选框，并填写消息的标题和文本。
- en: 'Specify How You Want Excel to Respond When Invalid Data is Entered:'
  id: totrans-1071
  prefs: []
  type: TYPE_NORMAL
  zh: 指定当输入无效数据时Excel如何响应：
- en: 1. Click the Error Alert tab, and make sure the Show Error Alert After Invalid
    Data is Entered checkbox is selected.
  id: totrans-1072
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 点击“错误警告”选项卡，并确保选中“输入无效数据后显示错误警告”复选框。
- en: '2. Select one of the following options for the Style box:'
  id: totrans-1073
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 为“样式”框选择以下选项之一：
- en: •To display an information message that does not prevent entry of invalid data,
    select Information.
  id: totrans-1074
  prefs: []
  type: TYPE_NORMAL
  zh: •要显示不阻止无效数据输入的信息消息，请选择“信息”。
- en: •To display a warning message that does not prevent entry of invalid data, select
    Warning.
  id: totrans-1075
  prefs: []
  type: TYPE_NORMAL
  zh: •要显示不阻止输入无效数据的警告消息，请选择“警告”。
- en: •To prevent entry of invalid data, select Stop.
  id: totrans-1076
  prefs: []
  type: TYPE_NORMAL
  zh: •为了防止输入无效数据，请选择“停止”。
- en: 3. Fill in the title and text for the message (up to 225 characters).
  id: totrans-1077
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 填写消息的标题和文本（最多225个字符）。
- en: If you do not enter a title or text, the title defaults to MS Excel and the
    message defaults to “The value you entered is not valid. A user has restricted
    values that can be entered into this cell.”
  id: totrans-1078
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您没有输入标题或文本，标题将默认为MS Excel，消息将默认为“您输入的值无效。用户已限制可以输入此单元格的值。”
- en: Conclusion
  id: totrans-1079
  prefs: []
  type: TYPE_NORMAL
  zh: 结论
- en: 'In this chapter, we learned about data validation in Microsoft Excel. Data
    validation allows us to restrict the type of data that can be entered into cells,
    ensuring data accuracy and consistency. We explored two methods of data validation:
    Trace Precedents and Trace Dependents. These features help us understand the relationships
    between cells and identify potential errors in our formulas.'
  id: totrans-1080
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们学习了Microsoft Excel中的数据验证。数据验证允许我们限制可以输入到单元格中的数据类型，确保数据准确性和一致性。我们探讨了两种数据验证方法：追踪
    precedent 和追踪 dependent。这些功能帮助我们了解单元格之间的关系，并识别公式中的潜在错误。
- en: We also discussed how to set data validation rules using the Data Validation
    dialog box. This allows us to define specific criteria for the allowed data, such
    as whole numbers, decimals, dates, times, or text of a specified length. We can
    even create custom formulas to calculate what data is allowed based on the content
    of other cells.
  id: totrans-1081
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还讨论了如何使用数据验证对话框设置数据验证规则。这允许我们定义允许数据的特定标准，例如整数、小数、日期、时间或指定长度的文本。我们甚至可以创建自定义公式，根据其他单元格的内容计算允许的数据。
- en: Furthermore, we examined the method of creating a list for data validation,
    which allows users to select an option from a drop-down list. This helps maintain
    data consistency and simplifies data entry.
  id: totrans-1082
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，我们还研究了创建数据验证列表的方法，允许用户从下拉列表中选择选项。这有助于保持数据一致性并简化数据输入。
- en: Exercises
  id: totrans-1083
  prefs: []
  type: TYPE_NORMAL
  zh: 练习
- en: 1. Open the Advance Excel Assignment workbook. In the sheet named Validation,
    do the following data validations.
  id: totrans-1084
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 打开高级Excel作业工作簿。在名为“验证”的表格中执行以下数据验证。
- en: a. No duplicates should be allowed in emp_code.
  id: totrans-1085
  prefs: []
  type: TYPE_NORMAL
  zh: a. 不允许在“emp_code”中存在重复项。
- en: b. Only text should be allowed in the emp name.
  id: totrans-1086
  prefs: []
  type: TYPE_NORMAL
  zh: b. “emp name”中只允许文本。
- en: c. Age should only include numeric data.
  id: totrans-1087
  prefs: []
  type: TYPE_NORMAL
  zh: c. 年龄应仅包含数字数据。
- en: d. Salary should be between 5000 and 50000.
  id: totrans-1088
  prefs: []
  type: TYPE_NORMAL
  zh: d. 薪资应在5000至50000之间。
- en: e. Joining Date should be less than current Date.
  id: totrans-1089
  prefs: []
  type: TYPE_NORMAL
  zh: e. 加入日期应早于当前日期。
- en: 2. In the emp_inf sheet create a drop-down list of all the employee codes in
    cell B3.
  id: totrans-1090
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 在“emp_inf”表格中，在B3单元格创建包含所有员工代码的下拉列表。
- en: CHAPTER    5
  id: totrans-1091
  prefs: []
  type: TYPE_NORMAL
  zh: 第五章
- en: Protection
  id: totrans-1092
  prefs: []
  type: TYPE_NORMAL
  zh: 保护
- en: Introduction
  id: totrans-1093
  prefs: []
  type: TYPE_NORMAL
  zh: 简介
- en: In today’s digital age, it is paramount to protect sensitive information and
    ensure data integrity. Microsoft Excel provides a range of features to safeguard
    your worksheets and workbooks, preventing unauthorized changes and maintaining
    the confidentiality of your data. In this chapter, we will explore various methods
    of protection in Excel, allowing you to control access and preserve the integrity
    of your valuable information.
  id: totrans-1094
  prefs: []
  type: TYPE_NORMAL
  zh: 在当今数字时代，保护敏感信息并确保数据完整性至关重要。Microsoft Excel提供了一系列功能来保护您的工作表和工作簿，防止未经授权的更改并维护数据机密性。在本章中，我们将探讨Excel中的各种保护方法，让您能够控制访问并保护您宝贵信息的完整性。
- en: Structure
  id: totrans-1095
  prefs: []
  type: TYPE_NORMAL
  zh: 结构
- en: 'In this chapter, we will go over the following topics:'
  id: totrans-1096
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将讨论以下主题：
- en: ■Employee information system
  id: totrans-1097
  prefs: []
  type: TYPE_NORMAL
  zh: ■员工信息系统
- en: ■Protecting a worksheet by using passwords
  id: totrans-1098
  prefs: []
  type: TYPE_NORMAL
  zh: ■使用密码保护工作表
- en: ■Protecting a workbook
  id: totrans-1099
  prefs: []
  type: TYPE_NORMAL
  zh: ■保护工作簿
- en: ■Protecting a part of a worksheet
  id: totrans-1100
  prefs: []
  type: TYPE_NORMAL
  zh: ■保护工作表的一部分
- en: ■Protecting a file with a password
  id: totrans-1101
  prefs: []
  type: TYPE_NORMAL
  zh: ■使用密码保护文件
- en: ■Case study
  id: totrans-1102
  prefs: []
  type: TYPE_NORMAL
  zh: ■案例研究
- en: Objectives
  id: totrans-1103
  prefs: []
  type: TYPE_NORMAL
  zh: 目标
- en: After studying this chapter, you will understand how to prevent unauthorized
    changes to your worksheets and how to protect workbooks with passwords.
  id: totrans-1104
  prefs: []
  type: TYPE_NORMAL
  zh: 学习本章后，您将了解如何防止对工作表进行未经授权的更改，以及如何使用密码保护工作簿。
- en: Employee Information System
  id: totrans-1105
  prefs: []
  type: TYPE_NORMAL
  zh: 员工信息系统
- en: In the emp_inf example, as shown in [Figure 5.1](#fig5-1), if we wish to use
    the worksheet as a public template, we will need to prevent unauthorized access
    to the VLOOKUP formulas. We need to restrict data entry to cell B3\. To accomplish
    these goals, we may use Protection.
  id: totrans-1106
  prefs: []
  type: TYPE_NORMAL
  zh: 在“emp_inf”示例中，如图[图5.1](#fig5-1)所示，如果我们希望将工作表用作公共模板，我们需要防止对VLOOKUP公式的未经授权访问。我们需要限制对B3单元格的数据输入。为了实现这些目标，我们可以使用保护功能。
- en: '![image](image/Figure_5.1.jpg)'
  id: totrans-1107
  prefs: []
  type: TYPE_IMG
  zh: '![image](image/Figure_5.1.jpg)'
- en: Figure 5.1 Employee Information System
  id: totrans-1108
  prefs: []
  type: TYPE_NORMAL
  zh: 图5.1 员工信息系统
- en: In Excel, there are three levels of Protection, as shown in [Figure 5.2](#fig5-2).
  id: totrans-1109
  prefs: []
  type: TYPE_NORMAL
  zh: 在Excel中，有三种保护级别，如图5.2所示。
- en: '![image](image/Figure_5.2.jpg)'
  id: totrans-1110
  prefs: []
  type: TYPE_IMG
  zh: '![image](image/Figure_5.2.jpg)'
- en: Figure 5.2 Levels of Protection
  id: totrans-1111
  prefs: []
  type: TYPE_NORMAL
  zh: 图5.2 保护级别
- en: Protecting a Worksheet by Using Passwords
  id: totrans-1112
  prefs: []
  type: TYPE_NORMAL
  zh: 使用密码保护工作表
- en: 'Take the following steps to password protect a worksheet:'
  id: totrans-1113
  prefs: []
  type: TYPE_NORMAL
  zh: 按以下步骤通过密码保护工作表：
- en: 1. Activate the Review ribbon tab.
  id: totrans-1114
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 激活“审阅”选项卡。
- en: 2. In the Changes ribbon group, click Protect Sheet to open the Protect Sheet
    dialog box.
  id: totrans-1115
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 在“更改”选项卡组中，点击“保护工作表”以打开“保护工作表”对话框。
- en: 3. Check the options you want.
  id: totrans-1116
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 选择您想要的选项。
- en: 4. Type a password.
  id: totrans-1117
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 输入密码。
- en: 5. Click OK.
  id: totrans-1118
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 点击“确定”。
- en: 6. The Confirm Password dialog box appears.
  id: totrans-1119
  prefs: []
  type: TYPE_NORMAL
  zh: 6. 出现“确认密码”对话框。
- en: 7. In the Re-enter Password to Proceed box, type the same password to confirm.
  id: totrans-1120
  prefs: []
  type: TYPE_NORMAL
  zh: 7. 在“重新输入密码以继续”框中，输入相同的密码以确认。
- en: 8. Click OK to close the password confirmation box and the dialog box.
  id: totrans-1121
  prefs: []
  type: TYPE_NORMAL
  zh: 8. 点击“确定”以关闭密码确认框和对话框。
- en: Protecting a Workbook
  id: totrans-1122
  prefs: []
  type: TYPE_NORMAL
  zh: 保护工作簿
- en: Workbook level protection can be done in two ways, as shown in [Figure 5.3](#fig5-3).
  id: totrans-1123
  prefs: []
  type: TYPE_NORMAL
  zh: 工作簿级别的保护可以通过两种方式完成，如图5.3所示。
- en: ■Protect the workbook structure, preventing changes like worksheets being moved,
    deleted, inserted, hidden, unhidden, or renamed.
  id: totrans-1124
  prefs: []
  type: TYPE_NORMAL
  zh: ■保护工作簿结构，防止如工作表移动、删除、插入、隐藏、取消隐藏或重命名等更改。
- en: ■Protect the workbook window and ensure that the window is the same size and
    position each time it is opened.
  id: totrans-1125
  prefs: []
  type: TYPE_NORMAL
  zh: ■保护工作簿窗口并确保每次打开窗口时大小和位置相同。
- en: '![image](image/Figure_5.3.jpg)'
  id: totrans-1126
  prefs: []
  type: TYPE_IMG
  zh: '![image](image/Figure_5.3.jpg)'
- en: Figure 5.3 Protect the Workbook
  id: totrans-1127
  prefs: []
  type: TYPE_NORMAL
  zh: 图5.3 保护工作簿
- en: 'Perform the following steps to protect a workbook:'
  id: totrans-1128
  prefs: []
  type: TYPE_NORMAL
  zh: 执行以下步骤以保护工作簿：
- en: 1. Activate the Review ribbon tab.
  id: totrans-1129
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 激活“审阅”选项卡。
- en: 2. In the Changes ribbon group, click Protect Workbook.
  id: totrans-1130
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 在“更改”选项卡组中，点击“保护工作簿”。
- en: 3. In the Protect Workbook dialog box which appears, select either or both options
    (Structure or Windows) as required.
  id: totrans-1131
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 在出现的“保护工作簿”对话框中，根据需要选择一个或两个选项（结构或窗口）。
- en: 4. To prevent others from removing workbook protection, you can set a password.
  id: totrans-1132
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 为了防止他人移除工作簿保护，您可以设置密码。
- en: '5. After specifying options in the Protect Workbook dialog box, click OK. Refer
    to [Figure 5.4](#fig5-4):'
  id: totrans-1133
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 在“保护工作簿”对话框中指定选项后，点击“确定”。参见图5.4：
- en: '![image](image/Figure_5.4.jpg)'
  id: totrans-1134
  prefs: []
  type: TYPE_IMG
  zh: '![image](image/Figure_5.4.jpg)'
- en: Figure 5.4 Protect Structure and Windows
  id: totrans-1135
  prefs: []
  type: TYPE_NORMAL
  zh: 图5.4 保护结构和窗口
- en: Protecting a Part of a Worksheet
  id: totrans-1136
  prefs: []
  type: TYPE_NORMAL
  zh: 保护工作表的一部分
- en: When you protect an entire worksheet, all the cells in the worksheet are locked
    by default. This means that users cannot make changes to any cell in the worksheet.
    To allow the users to make changes to particular cells, you must unlock the cells
    manually before protecting the worksheet. This will allow the users to change
    data only in the unlocked cells. You can hide the formula before protecting the
    sheet, so that it is not visible to the user after sheet-level protection is activated.
  id: totrans-1137
  prefs: []
  type: TYPE_NORMAL
  zh: 当您保护整个工作表时，工作表中的所有单元格默认都会被锁定。这意味着用户无法更改工作表中的任何单元格。要允许用户更改特定单元格，您必须在保护工作表之前手动解锁单元格。这将允许用户仅更改解锁单元格中的数据。您可以在保护工作表之前隐藏公式，这样在激活工作表级别的保护后，用户就看不到公式了。
- en: 'To password protect only part of a worksheet, perform the following steps:'
  id: totrans-1138
  prefs: []
  type: TYPE_NORMAL
  zh: 如果只想保护工作表的一部分，请执行以下步骤：
- en: 1. Select the range of cells that you want users to be able to modify.
  id: totrans-1139
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 选择您希望用户能够修改的单元格范围。
- en: 2. Right-click and choose Format Cells to open the Format Cells dialog box.
  id: totrans-1140
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 右键单击并选择“设置单元格格式”以打开“设置单元格格式”对话框。
- en: 3. Activate the Protection tab.
  id: totrans-1141
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 激活“保护”选项卡。
- en: 4. Clear the Locked check box.
  id: totrans-1142
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 清除“锁定”复选框。
- en: 5. Click OK.
  id: totrans-1143
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 点击“确定”。
- en: 'Follow steps six to ten if you wish to hide your formulae, or proceed to step
    eleven directly:'
  id: totrans-1144
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您想隐藏公式，请遵循第6步到第10步，或者直接进行第11步：
- en: 6. Select the range of cells with formulae that you want to hide from users.
  id: totrans-1145
  prefs: []
  type: TYPE_NORMAL
  zh: 6. 选择您想要隐藏公式以便用户看不到的单元格范围。
- en: 7. Right-click and choose Format Cells to open the Format Cells dialog box.
  id: totrans-1146
  prefs: []
  type: TYPE_NORMAL
  zh: 7. 右键单击并选择“设置单元格格式”以打开“设置单元格格式”对话框。
- en: 8. Activate the Protection tab.
  id: totrans-1147
  prefs: []
  type: TYPE_NORMAL
  zh: 8. 激活“保护”选项卡。
- en: 9. Check the hidden check box along with the locked check box.
  id: totrans-1148
  prefs: []
  type: TYPE_NORMAL
  zh: 9. 选择“隐藏”复选框和“锁定”复选框。
- en: 10. Click OK.
  id: totrans-1149
  prefs: []
  type: TYPE_NORMAL
  zh: 10. 点击“确定”。
- en: 'Continue with step eleven to password protect the worksheet:'
  id: totrans-1150
  prefs: []
  type: TYPE_NORMAL
  zh: 继续进行第11步以通过密码保护工作表：
- en: 11. Activate the Review ribbon tab.
  id: totrans-1151
  prefs: []
  type: TYPE_NORMAL
  zh: 11. 激活“审阅”选项卡。
- en: 12. In the Changes ribbon group, click Protect Sheet to open the Protect Sheet
    dialog box.
  id: totrans-1152
  prefs: []
  type: TYPE_NORMAL
  zh: 12. 在“更改”选项卡组中，点击“保护工作表”以打开“保护工作表”对话框。
- en: 13. Type a password.
  id: totrans-1153
  prefs: []
  type: TYPE_NORMAL
  zh: 13. 输入密码。
- en: 14. Click OK.
  id: totrans-1154
  prefs: []
  type: TYPE_NORMAL
  zh: 14. 点击“确定”。
- en: 15. The Confirm Password dialog box will appear.
  id: totrans-1155
  prefs: []
  type: TYPE_NORMAL
  zh: 15. 将出现确认密码对话框。
- en: 16. In the Re-enter password to proceed box, type the same password.
  id: totrans-1156
  prefs: []
  type: TYPE_NORMAL
  zh: 16. 在“重新输入密码以继续”框中，键入相同的密码。
- en: 17. Click OK to close both the password confirmation box and the dialog box.
  id: totrans-1157
  prefs: []
  type: TYPE_NORMAL
  zh: 17. 点击“确定”以关闭密码确认框和对话框。
- en: Password Protecting a File
  id: totrans-1158
  prefs: []
  type: TYPE_NORMAL
  zh: 文件密码保护
- en: 'You may wish to save your file with a password so that any user will be asked
    for a password before they can view or modify your file. To do this, follow the
    steps below:'
  id: totrans-1159
  prefs: []
  type: TYPE_NORMAL
  zh: 您可能希望用密码保存文件，这样任何用户在查看或修改文件之前都会被要求输入密码。为此，请按照以下步骤操作：
- en: 1. Click on File button.
  id: totrans-1160
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 点击“文件”按钮。
- en: 2. Select Save As.
  id: totrans-1161
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 选择“另存为”。
- en: 3. In the Save As dialog box, click on Tools.
  id: totrans-1162
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 在“另存为”对话框中，单击“工具”。
- en: 4. Then click on General Options, as shown in [Figure 5.5](#fig5-5).
  id: totrans-1163
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 然后单击“常规选项”，如图[图5.5](#fig5-5)所示。
- en: '![image](image/Figure_5.5.jpg)'
  id: totrans-1164
  prefs: []
  type: TYPE_IMG
  zh: '![image](image/Figure_5.5.jpg)'
- en: Figure 5.5 Protecting a File with a Password
  id: totrans-1165
  prefs: []
  type: TYPE_NORMAL
  zh: 图5.5 使用密码保护文件
- en: 5. Set the password to open or modify, as needed.
  id: totrans-1166
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 根据需要设置打开或修改密码。
- en: 6. Save the file.
  id: totrans-1167
  prefs: []
  type: TYPE_NORMAL
  zh: 6. 保存文件。
- en: Note To use an Excel sheet as a template, save the file with the .xlt extension.
  id: totrans-1168
  prefs: []
  type: TYPE_NORMAL
  zh: 注意：要将Excel工作表作为模板使用，请将文件保存为.xlt扩展名。
- en: Conclusion
  id: totrans-1169
  prefs: []
  type: TYPE_NORMAL
  zh: 结论
- en: In conclusion, data protection is essential in Microsoft Excel to ensure the
    security and integrity of your worksheets and workbooks. By utilizing features
    such as password protection for worksheets, workbooks, and files, you can restrict
    unauthorized access and prevent unauthorized changes to your data. Additionally,
    protecting specific parts of a worksheet allows you to control which cells users
    can modify and will make it easier to maintain data consistency.
  id: totrans-1170
  prefs: []
  type: TYPE_NORMAL
  zh: 总之，在Microsoft Excel中保护数据安全至关重要，以确保工作表和工作簿的安全性和完整性。通过利用如工作表、工作簿和文件的密码保护等特性，您可以限制未经授权的访问并防止对数据的未授权更改。此外，保护工作表中的特定部分允许您控制用户可以修改的单元格，这将使维护数据一致性变得更加容易。
- en: Exercises
  id: totrans-1171
  prefs: []
  type: TYPE_NORMAL
  zh: 练习
- en: 'Open the practice folder in the file named “Practice Assignment Product-Invoice”.
    Prepare the invoice template by performing the following steps:'
  id: totrans-1172
  prefs: []
  type: TYPE_NORMAL
  zh: 在名为“Practice Assignment Product-Invoice”的文件中打开练习文件夹。通过以下步骤准备发票模板：
- en: 1. In M/s, create a dropdown list of all customer names.
  id: totrans-1173
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 在M/s中创建一个包含所有客户名称的下拉列表。
- en: 2. The address should be looked up based on the customer name from the “customers”
    worksheet.
  id: totrans-1174
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 应根据“客户”工作表中的客户名称查找地址。
- en: 3. The Product column should contain a list of all the products listed in the
    “product” worksheet.
  id: totrans-1175
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 产品列应包含“产品”工作表中列出的所有产品列表。
- en: 4. The Rate should be looked up based on the product selected in the adjoining
    product list.
  id: totrans-1176
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 应根据相邻的产品列表中选定的产品查找费率。
- en: 5. The first “Sr. No” should be entered by the vendor, and the rest should appear
    only if a product is selected from the product list. See [Figure 5.6](#fig5-6).
  id: totrans-1177
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 第一项“序号”应由供应商输入，其余项目只有在从产品列表中选择产品时才会显示。参见[图5.6](#fig5-6)。
- en: '![image](image/Figure_5.6.jpg)'
  id: totrans-1178
  prefs: []
  type: TYPE_IMG
  zh: '![image](image/Figure_5.6.jpg)'
- en: Figure 5.6 Product Invoice
  id: totrans-1179
  prefs: []
  type: TYPE_NORMAL
  zh: 图5.6 产品发票
- en: 6. The Amount should be calculated as qty*rate.
  id: totrans-1180
  prefs: []
  type: TYPE_NORMAL
  zh: 6. 金额应计算为数量*费率。
- en: 7. The Gross Amount is the sum of all amounts. The Vat is 14% of the gross amount.
  id: totrans-1181
  prefs: []
  type: TYPE_NORMAL
  zh: 7. 总金额是所有金额的总和。增值税是总金额的14%。
- en: 8. The Discount should be calculated as 10% of the Gross Amount, if the Gross
    Amount is greater than 15000.
  id: totrans-1182
  prefs: []
  type: TYPE_NORMAL
  zh: 8. 如果总金额大于15000，则折扣应计算为总金额的10%。
- en: 9. The Net Amount should be calculated as Gross Amount + Vat-Discount.
  id: totrans-1183
  prefs: []
  type: TYPE_NORMAL
  zh: 9. 净金额应计算为总金额+增值税-折扣。
- en: 10. Save the file as a template.
  id: totrans-1184
  prefs: []
  type: TYPE_NORMAL
  zh: 10. 将文件保存为模板。
- en: Note There should be no visible errors in the template.
  id: totrans-1185
  prefs: []
  type: TYPE_NORMAL
  zh: 注意：模板中不应有任何可见的错误。
- en: CHAPTER    6
  id: totrans-1186
  prefs: []
  type: TYPE_NORMAL
  zh: 第六章
- en: Sorting a Database
  id: totrans-1187
  prefs: []
  type: TYPE_NORMAL
  zh: 数据库排序
- en: Introduction
  id: totrans-1188
  prefs: []
  type: TYPE_NORMAL
  zh: 简介
- en: Sorting data in a database is the process of arranging items in a specific order
    based on criteria, such as alphabetical or numerical values. It enables easy organization,
    comparison, and analysis of data, leading to efficient data management and informed
    decision-making. This chapter explores different sorting techniques, including
    simple sort, multilevel sort, and customized sort, providing you with the knowledge
    to effectively arrange and analyze data in your database.
  id: totrans-1189
  prefs: []
  type: TYPE_NORMAL
  zh: 在数据库中排序数据是根据特定标准（如字母或数字值）对项目进行排列的过程。它使数据组织、比较和分析变得容易，从而实现高效的数据管理和明智的决策。本章探讨了不同的排序技术，包括简单排序、多级排序和自定义排序，为您提供有效安排和分析数据库中数据的知识。
- en: Structure
  id: totrans-1190
  prefs: []
  type: TYPE_NORMAL
  zh: 结构
- en: 'In this chapter, we will go over the following topics:'
  id: totrans-1191
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将讨论以下主题：
- en: ■Definition of sorting
  id: totrans-1192
  prefs: []
  type: TYPE_NORMAL
  zh: ■排序的定义
- en: •Simple sort
  id: totrans-1193
  prefs: []
  type: TYPE_NORMAL
  zh: •简单排序
- en: •Multilevel sort
  id: totrans-1194
  prefs: []
  type: TYPE_NORMAL
  zh: • 多级排序
- en: •Customized sort
  id: totrans-1195
  prefs: []
  type: TYPE_NORMAL
  zh: • 自定义排序
- en: Objectives
  id: totrans-1196
  prefs: []
  type: TYPE_NORMAL
  zh: 目标
- en: After studying this chapter, the readers should be able to define sorting and
    identify various types of sorting techniques.
  id: totrans-1197
  prefs: []
  type: TYPE_NORMAL
  zh: 在学习本章后，读者应该能够定义排序并识别各种排序技术。
- en: Definition of Sorting
  id: totrans-1198
  prefs: []
  type: TYPE_NORMAL
  zh: 排序的定义
- en: Sorting is any process of arranging items systematically, i.e., arranging items
    in a sequence ordered by some criterion. For example, sorting data in either increasing
    or decreasing order.
  id: totrans-1199
  prefs: []
  type: TYPE_NORMAL
  zh: 排序是指任何系统性地安排项目的流程，即按照某些标准对项目进行排序。例如，按升序或降序排序数据。
- en: Simple Sort
  id: totrans-1200
  prefs: []
  type: TYPE_NORMAL
  zh: 简单排序
- en: 'To perform a simple sort on a column, follow the following steps:'
  id: totrans-1201
  prefs: []
  type: TYPE_NORMAL
  zh: 要对一个列执行简单排序，请按照以下步骤操作：
- en: 1. Select any cell in the column which you want to sort.
  id: totrans-1202
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 选择您想要排序的列中的任何单元格。
- en: 2. Activate the Data ribbon tab.
  id: totrans-1203
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 激活“数据”功能区选项卡。
- en: 3. In the Sort & Filter group, click the Sort Ascending or Sort Descending button.
    As shown in [Figure 6.1](#fig6-1), this will sort the entire database.
  id: totrans-1204
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 在“排序和筛选”功能区组中，单击“升序排序”或“降序排序”按钮。如图6.1所示，这将排序整个数据库。
- en: '![image](image/Figure_6.1.jpg)'
  id: totrans-1205
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image/Figure_6.1.jpg)'
- en: Figure 6.1 Simple Sort
  id: totrans-1206
  prefs: []
  type: TYPE_NORMAL
  zh: 图6.1 简单排序
- en: Multilevel Sort
  id: totrans-1207
  prefs: []
  type: TYPE_NORMAL
  zh: 多级排序
- en: Sometimes, you may want to sort your data in multiple columns. For example,
    you want to sort employee information by region and department. This can be done
    by multilevel sorting.
  id: totrans-1208
  prefs: []
  type: TYPE_NORMAL
  zh: 有时，您可能希望按多列对数据进行排序。例如，您想按地区和部门对员工信息进行排序。这可以通过多级排序来完成。
- en: 'To sort a list based on two or more columns:'
  id: totrans-1209
  prefs: []
  type: TYPE_NORMAL
  zh: 要根据两个或多个列对列表进行排序：
- en: 1. Select any cell in the list.
  id: totrans-1210
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 选择列表中的任何单元格。
- en: 2. Activate the Data ribbon tab.
  id: totrans-1211
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 激活“数据”功能区选项卡。
- en: 3. In the Sort & Filter ribbon group, click Sort to open the Sort dialog box.
  id: totrans-1212
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 在“排序和筛选”功能区组中，单击“排序”以打开排序对话框。
- en: 4. From the Sort by list, select the column heading of the column by which you
    want to sort the list, and select a sorting order.
  id: totrans-1213
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 从“排序依据”列表中，选择您想要按其排序的列表列标题，并选择一个排序顺序。
- en: 5. All records will be sorted based on the column and the sorting order you
    selected.
  id: totrans-1214
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 所有记录将根据您选择的列和排序顺序进行排序。
- en: 6. From the Then by list, select the next column by which you want to sort.
  id: totrans-1215
  prefs: []
  type: TYPE_NORMAL
  zh: 6. 从“然后按”列表中，选择您想要按其排序的下一个列。
- en: 7. If necessary, add more Then by fields by clicking Add Level.
  id: totrans-1216
  prefs: []
  type: TYPE_NORMAL
  zh: 7. 如有必要，通过单击“添加级别”来添加更多“然后按”字段。
- en: 8. When all Then by fields are complete, click OK, as shown in [Figure 6.2](#fig6-2).
  id: totrans-1217
  prefs: []
  type: TYPE_NORMAL
  zh: 8. 当所有“然后按”字段都填写完毕后，单击“确定”，如图6.2所示。
- en: '![image](image/Figure_6.2.jpg)'
  id: totrans-1218
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image/Figure_6.2.jpg)'
- en: Figure 6.2 Multilevel Sort
  id: totrans-1219
  prefs: []
  type: TYPE_NORMAL
  zh: 图6.2 多级排序
- en: Note Make sure at least one “Then By” field is selected before clicking on OK
    button.
  id: totrans-1220
  prefs: []
  type: TYPE_NORMAL
  zh: 注意：在点击“确定”按钮之前，请确保至少选择了一个“然后按”字段。
- en: Customized Sort
  id: totrans-1221
  prefs: []
  type: TYPE_NORMAL
  zh: 自定义排序
- en: In custom sorting, the list will sort the data in the sequence specified by
    you. If we sort the data by region, it sorts either in ascending or descending
    order, but imagine we want to sort our data in a customized order.
  id: totrans-1222
  prefs: []
  type: TYPE_NORMAL
  zh: 在自定义排序中，列表将按照您指定的顺序对数据进行排序。如果我们按地区排序，它将按升序或降序排序，但想象一下，如果我们想按自定义顺序排序我们的数据。
- en: 'For example, we want to sort North, South, East, and West. To do so, we would
    need to perform a custom sort, as described in the following steps:'
  id: totrans-1223
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，我们想按北、南、东、西排序。为此，我们需要执行自定义排序，如下述步骤所述：
- en: 1. Select any cell in the list.
  id: totrans-1224
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 选择列表中的任何单元格。
- en: 2. Activate the Data tab.
  id: totrans-1225
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 激活“数据”选项卡。
- en: 3. In the Sort & Filter group, click Sort to open the Sort dialog box.
  id: totrans-1226
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 在“排序和筛选”组中，单击“排序”以打开排序对话框。
- en: 4. From the Sort By list, select the column heading of the column by which you
    want to sort the list.
  id: totrans-1227
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 从“排序依据”列表中，选择您想要按其排序的列表列标题。
- en: 5. From Sorting Order, select Custom List.
  id: totrans-1228
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 从“排序顺序”中选择“自定义列表”。
- en: 6. It will open the Custom List dialog box.
  id: totrans-1229
  prefs: []
  type: TYPE_NORMAL
  zh: 6. 这将打开“自定义列表”对话框。
- en: 7. Type the sequence by which you wish to sort.
  id: totrans-1230
  prefs: []
  type: TYPE_NORMAL
  zh: 7. 输入您希望排序的序列。
- en: 8. Click the Add button to add the list in custom sort.
  id: totrans-1231
  prefs: []
  type: TYPE_NORMAL
  zh: 8. 单击“添加”按钮以将列表添加到自定义排序中。
- en: 9. Click OK.
  id: totrans-1232
  prefs: []
  type: TYPE_NORMAL
  zh: 9. 单击“确定”。
- en: Conclusion
  id: totrans-1233
  prefs: []
  type: TYPE_NORMAL
  zh: 结论
- en: In conclusion, sorting data in a database is essential for organizing information
    and facilitating efficient analysis. By applying various sorting techniques, such
    as simple sort, multilevel sort, and customized sort, we can arrange data based
    on specific criteria and improve the usability and functionality of our database.
    Sorting enables us to navigate and compare data more effectively, leading to better
    insights and informed decision-making.
  id: totrans-1234
  prefs: []
  type: TYPE_NORMAL
  zh: 总之，在数据库中对数据进行排序对于组织信息和促进高效分析至关重要。通过应用各种排序技术，如简单排序、多级排序和自定义排序，我们可以根据特定标准排列数据，并提高我们数据库的可使用性和功能性。排序使我们能够更有效地导航和比较数据，从而获得更好的见解和明智的决策。
- en: Exercises
  id: totrans-1235
  prefs: []
  type: TYPE_NORMAL
  zh: 练习
- en: Refer to [Table 6.1](#tab6-1) and answer the questions below.
  id: totrans-1236
  prefs: []
  type: TYPE_NORMAL
  zh: 参考表6.1[Table 6.1](#tab6-1)并回答以下问题。
- en: TABLE 6.1 Database Table
  id: totrans-1237
  prefs: []
  type: TYPE_NORMAL
  zh: 表6.1 数据库表
- en: '![image](image/pg-94.jpg)'
  id: totrans-1238
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image/pg-94.jpg)'
- en: 1. Sort a sales database in descending order based on sales revenue column.
  id: totrans-1239
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 根据销售收入列按降序对销售数据库进行排序。
- en: 2. Perform a multilevel sort on a sales database by sorting first by product
    category in alphabetical order, then by quantity sold in descending order.
  id: totrans-1240
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 通过首先按产品类别按字母顺序排序，然后按销售数量按降序排序，对销售数据库进行多级排序。
- en: 3. Customize the sort of a sales database by creating a custom list for product
    names and sorting based on that list.
  id: totrans-1241
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 通过为产品名称创建自定义列表并按该列表排序来自定义销售数据库的排序。
- en: 4. Sort an inventory database in ascending order based on quantity in stock
    column.
  id: totrans-1242
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 根据库存数量列按升序对库存数据库进行排序。
- en: 5. Perform a multilevel sort on an inventory database by sorting first by product
    category in alphabetical order, then by reorder level in ascending order.
  id: totrans-1243
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 通过首先按产品类别按字母顺序排序，然后按重新订购级别按升序排序，对库存数据库进行多级排序。
- en: CHAPTER    7
  id: totrans-1244
  prefs: []
  type: TYPE_NORMAL
  zh: 第七章
- en: Filtering a Database
  id: totrans-1245
  prefs: []
  type: TYPE_NORMAL
  zh: 过滤数据库
- en: Introduction
  id: totrans-1246
  prefs: []
  type: TYPE_NORMAL
  zh: 简介
- en: In this chapter, we will explore the topic of filtering a database in Excel.
    Filtering allows us to display only the rows of information that meet specific
    criteria, making it easier to analyze and work with large datasets. We will learn
    about different types of filters, including the AutoFilter feature, number, text,
    and date filters, as well as the advanced filtering capabilities of Excel. Additionally,
    we will discover how to filter for unique records in a list. By the end of this
    chapter, readers will have a clear understanding of how to effectively use filters
    in Excel to extract and manipulate data based on specific criteria.
  id: totrans-1247
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将探讨在Excel中过滤数据库的主题。过滤功能使我们能够仅显示满足特定标准的信息行，这使得分析大型数据集变得更加容易。我们将了解不同类型的过滤器，包括自动过滤器功能、数字、文本和日期过滤器，以及Excel的高级过滤功能。此外，我们还将发现如何在一个列表中过滤唯一记录。到本章结束时，读者将清楚地了解如何有效地使用Excel中的过滤器，根据特定标准提取和操作数据。
- en: Structure
  id: totrans-1248
  prefs: []
  type: TYPE_NORMAL
  zh: 结构
- en: 'In this chapter, we will go over the following topics:'
  id: totrans-1249
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将讨论以下主题：
- en: ■Filters
  id: totrans-1250
  prefs: []
  type: TYPE_NORMAL
  zh: ■过滤器
- en: •AutoFilter
  id: totrans-1251
  prefs: []
  type: TYPE_NORMAL
  zh: •自动过滤器
- en: •Number, text, or date filters
  id: totrans-1252
  prefs: []
  type: TYPE_NORMAL
  zh: •数字、文本或日期过滤器
- en: •Filtering a list using advanced filter
  id: totrans-1253
  prefs: []
  type: TYPE_NORMAL
  zh: •使用高级过滤器过滤列表
- en: ■Filtering unique records
  id: totrans-1254
  prefs: []
  type: TYPE_NORMAL
  zh: ■过滤唯一记录
- en: Objectives
  id: totrans-1255
  prefs: []
  type: TYPE_NORMAL
  zh: 目标
- en: After studying this chapter, the readers will be able to understand the various
    types of filters and know how to use them in their worksheet.
  id: totrans-1256
  prefs: []
  type: TYPE_NORMAL
  zh: 在学习本章后，读者将能够理解各种类型的过滤器，并了解如何在他们的工作表中使用它们。
- en: Filters
  id: totrans-1257
  prefs: []
  type: TYPE_NORMAL
  zh: 过滤器
- en: At times, you need to display only those rows of information that meet specific
    criteria. To help you do this, you may use a Filter. Let us discuss more about
    filters.
  id: totrans-1258
  prefs: []
  type: TYPE_NORMAL
  zh: 有时，您需要仅显示满足特定标准的信息行。为了帮助您做到这一点，您可以使用过滤器。让我们更深入地讨论一下过滤器。
- en: AutoFilter
  id: totrans-1259
  prefs: []
  type: TYPE_NORMAL
  zh: 自动过滤器
- en: 'For commonly used criteria, Excel provides the AutoFilter feature. Here is
    how it works:'
  id: totrans-1260
  prefs: []
  type: TYPE_NORMAL
  zh: 对于常用标准，Excel提供了自动过滤器功能。以下是它是如何工作的：
- en: 1. Select any cell in the list.
  id: totrans-1261
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 选择列表中的任何单元格。
- en: 2. Activate the Data tab.
  id: totrans-1262
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 激活“数据”选项卡。
- en: 3. In the Sort & Filter group, click Filter to display the AutoFilter arrows
    next to each column heading.
  id: totrans-1263
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 在“排序和筛选”组中，点击“过滤器”以在每个列标题旁边显示自动过滤器箭头。
- en: 4. From the list, select the column by which you want to filter.
  id: totrans-1264
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 从列表中选择您想要过滤的列。
- en: 5. Select the criteria.
  id: totrans-1265
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 选择标准。
- en: 6. Click OK, as shown in [Figure 7.1](#fig7-1).
  id: totrans-1266
  prefs: []
  type: TYPE_NORMAL
  zh: 6. 如[图7.1](#fig7-1)所示，点击“确定”。
- en: '![image](image/Figure_7.1.jpg)'
  id: totrans-1267
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image/Figure_7.1.jpg)'
- en: Figure 7.1 Filter
  id: totrans-1268
  prefs: []
  type: TYPE_NORMAL
  zh: 图7.1 过滤器
- en: To clear the filter and show the entire list, click on Filter again. You can
    filter a list based on more complex criteria by using the Advanced Filtering features.
    For example, you can display the records of all employees whose salary is between
    7000 and 12000.
  id: totrans-1269
  prefs: []
  type: TYPE_NORMAL
  zh: 要清除筛选并显示整个列表，请再次点击筛选。您可以通过使用高级筛选功能根据更复杂的条件筛选列表。例如，您可以使用显示所有工资在7000到12000之间的员工的记录。
- en: 'Excel provides two tools for specifying complex filter criteria:'
  id: totrans-1270
  prefs: []
  type: TYPE_NORMAL
  zh: Excel提供了两个指定复杂筛选条件的工具：
- en: ■Number, text, or date filters
  id: totrans-1271
  prefs: []
  type: TYPE_NORMAL
  zh: ■数字、文本或日期筛选
- en: ■Advanced filter
  id: totrans-1272
  prefs: []
  type: TYPE_NORMAL
  zh: ■高级筛选
- en: Number, Text, or Date Filters
  id: totrans-1273
  prefs: []
  type: TYPE_NORMAL
  zh: 数字、文本或日期过滤器
- en: Once you add a filter to data, you also get a Number, Text, or Date Filter option
    in each field, depending on the type of data in that column. These can be used
    for field specific filtering like “Begins With” and “Contains” for text fields,
    “Greater Than,”, “Less Than,”, and “Between” for number fields, or “Before,” and
    “After” for date fields. Every filter field has a Custom Filter option where you
    may specify formulas or options other than the ones that are already provided.
    Refer to [Figure 7.2](#fig7-2).
  id: totrans-1274
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦您对数据进行筛选，您在每个字段中也会获得数字、文本或日期筛选选项，具体取决于该列中的数据类型。这些可以用于字段特定筛选，例如对于文本字段，“以...开头”和“包含”，对于数字字段，“大于”、“小于”和“介于”，对于日期字段，“之前”和“之后”。每个筛选字段都有一个自定义筛选选项，您可以在其中指定除已提供之外的其他公式或选项。参考图7.2
    [图7.2](#fig7-2)。
- en: '![image](image/Image2708.jpg)'
  id: totrans-1275
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image/Image2708.jpg)'
- en: Figure 7.2 Number Filter
  id: totrans-1276
  prefs: []
  type: TYPE_NORMAL
  zh: 图7.2 数字过滤器
- en: 'Refer to [Figure 7.3](#fig7-3):'
  id: totrans-1277
  prefs: []
  type: TYPE_NORMAL
  zh: 参考图7.3 [图7.3](#fig7-3)：
- en: '![image](image/Image2715.jpg)'
  id: totrans-1278
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image/Image2715.jpg)'
- en: Figure 7.3 Text Filter
  id: totrans-1279
  prefs: []
  type: TYPE_NORMAL
  zh: 图7.3 文本过滤器
- en: 'Refer to [Figure 7.4](#fig7-4):'
  id: totrans-1280
  prefs: []
  type: TYPE_NORMAL
  zh: 参考图7.4 [图7.4](#fig7-4)：
- en: '![image](image/Image2724.jpg)'
  id: totrans-1281
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image/Image2724.jpg)'
- en: Figure 7.4 Date Filter
  id: totrans-1282
  prefs: []
  type: TYPE_NORMAL
  zh: 图7.4 日期过滤器
- en: From the dropdown list of the column for which you want to create criteria,
    choose Text Filters, Date Filters, or Number Filters, then click on Custom to
    display the Custom AutoFilter dialog box.
  id: totrans-1283
  prefs: []
  type: TYPE_NORMAL
  zh: 从您想要创建条件的列的下拉列表中选择文本筛选器、日期筛选器或数字筛选器，然后点击自定义以显示自定义自动筛选对话框。
- en: 1. Enter a comparison criterion below the cell that contains the criteria label.
    You may use same row for “AND” criteria and different rows for “OR” criteria.
    For example, the criteria given in [Figure 7.5](#fig7-5) can be used to display
    only records of people in north or south regions.
  id: totrans-1284
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 在包含条件标签的单元格下方输入比较条件。您可以使用同一行输入“AND”条件，也可以使用不同的行输入“OR”条件。例如，图7.5 [图7.5](#fig7-5)
    中给出的条件可以用来显示仅来自北方或南方地区的人的记录。
- en: '![image](image/Figure_7.5.jpg)'
  id: totrans-1285
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image/Figure_7.5.jpg)'
- en: Figure 7.5 Criteria Range
  id: totrans-1286
  prefs: []
  type: TYPE_NORMAL
  zh: 图7.5 条件范围
- en: 2. Activate the Data tab.
  id: totrans-1287
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 激活数据选项卡。
- en: 3. In the Sort & Filter group, click Advanced to open the Advanced Filter dialog
    box (as shown in [Figure 7.6](#fig7-6)).
  id: totrans-1288
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 在排序与筛选组中，点击高级以打开高级筛选对话框（如图7.6 [图7.6](#fig7-6) 所示）。
- en: '![image](image/Figure_7.6.jpg)'
  id: totrans-1289
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image/Figure_7.6.jpg)'
- en: Figure 7.6 Advanced Filter
  id: totrans-1290
  prefs: []
  type: TYPE_NORMAL
  zh: 图7.6 高级筛选
- en: 4. In the List Range box, select the cell range you want to filter. The cell
    range must include the associated column headings.
  id: totrans-1291
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 在列表范围框中，选择您想要筛选的单元格范围。单元格范围必须包括相关的列标题。
- en: Filtering a List Using Advanced Filter
  id: totrans-1292
  prefs: []
  type: TYPE_NORMAL
  zh: 使用高级筛选筛选列表
- en: If you wish to filter your data so that it displays only the records of employees
    of Sales and Admin departments from the north and south regions, who earn between
    7000-12000 or 15000-20000, AutoFilter will not serve the purpose. This is because
    one number filter cannot be applied over another in AutoFilter. The above query
    requires us to do the same operation on the Salary field. To solve this query,
    we may have to use Advanced Filter.
  id: totrans-1293
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您希望筛选数据，以便仅显示来自北方和南方地区、销售和行政部门、工资在7000-12000或15000-20000之间的员工的记录，自动筛选将无法满足需求。这是因为自动筛选中不能对另一个数字筛选进行应用。上述查询要求我们在工资字段上执行相同的操作。为了解决这个问题，我们可能需要使用高级筛选。
- en: While using Advanced Filter, we need to have a criteria range and a list range.
    The list range is your database.
  id: totrans-1294
  prefs: []
  type: TYPE_NORMAL
  zh: 在使用高级筛选时，我们需要有一个条件范围和一个列表范围。列表范围就是您的数据库。
- en: 1. To create a criteria range, we need to make a copy of the column header of
    the database.
  id: totrans-1295
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 要创建条件范围，我们需要复制数据库的列标题。
- en: 2. In the Criteria Range box, select the cell range that contains your criteria
    and then click OK.
  id: totrans-1296
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 在条件范围框中，选择包含您的条件的单元格范围，然后点击确定。
- en: Note While designing the criteria range, it is better to copy and paste the
    column header of the entire database as the heading of the criteria range.
  id: totrans-1297
  prefs: []
  type: TYPE_NORMAL
  zh: 注意：在设计条件范围时，最好将整个数据库的列标题复制并粘贴为条件范围的标题。
- en: For better visibility, keep the criteria range and list range on different rows.
    The Advanced Filter command filters your list in place, like AutoFilter, but it
    does not display drop-down lists for columns. Instead, you have to select the
    List Range (your data), type criteria in a criteria range on your worksheet, and
    select the Criteria Range. In the output range, type the cell address where you
    want to display the output. This is optional.
  id: totrans-1298
  prefs: []
  type: TYPE_NORMAL
  zh: 为了更好的可见性，请将条件范围和列表范围放在不同的行上。高级筛选命令像自动筛选一样就地筛选您的列表，但它不显示列的下拉列表。相反，您必须选择列表范围（您的数据），在您的工作表上的条件范围内输入条件，并选择条件范围。在输出范围中，输入您想要显示输出的单元格地址。这是可选的。
- en: Filtering Unique Records
  id: totrans-1299
  prefs: []
  type: TYPE_NORMAL
  zh: 筛选唯一记录
- en: 'Advanced Filter can also be used to filter out unique values in a list at a
    separate location. Although the remove duplicates functionality of Excel can help
    with creating a list of unique values in a list, you would need to copy and paste
    the unique values if you need them in a different location. To avoid this, use
    the Advanced Filter option as follows:'
  id: totrans-1300
  prefs: []
  type: TYPE_NORMAL
  zh: 高级筛选也可以用于在单独的位置筛选列表中的唯一值。尽管Excel的删除重复项功能可以帮助创建列表中的唯一值列表，但如果您需要在不同的位置使用这些唯一值，则需要复制和粘贴它们。为了避免这种情况，请使用以下高级筛选选项：
- en: 1. Select the column or click a cell in the range or list you want to filter.
  id: totrans-1301
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 选择要筛选的列或点击范围或列表中的单元格。
- en: 2. On the Data tab, click Filter.
  id: totrans-1302
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 在“数据”选项卡上，点击“筛选”。
- en: 3. Click Advanced Filter.
  id: totrans-1303
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 点击“高级筛选”。
- en: '4. Do one of the following:'
  id: totrans-1304
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 执行以下操作之一：
- en: •To filter the range or list in place, click Filter the list, in-place.
  id: totrans-1305
  prefs: []
  type: TYPE_NORMAL
  zh: •要就地筛选范围或列表，请点击“就地筛选列表”。
- en: •To copy the results of the filter to another location, click Copy to another
    location. Then, in the Copy to box field, enter a cell reference.
  id: totrans-1306
  prefs: []
  type: TYPE_NORMAL
  zh: •要将筛选结果复制到另一个位置，请点击“复制到另一个位置”。然后，在“复制到”框字段中，输入单元格引用。
- en: •To select a cell, click Collapse Dialog to temporarily hide the dialog box.
    Select the cell on the worksheet, then press Expand Dialog.
  id: totrans-1307
  prefs: []
  type: TYPE_NORMAL
  zh: •要选择单元格，请点击“折叠对话框”以暂时隐藏对话框。在工作表上选择单元格，然后按“展开对话框”。
- en: •Select the Unique records only check box.
  id: totrans-1308
  prefs: []
  type: TYPE_NORMAL
  zh: •选择“仅选择唯一记录”复选框。
- en: Note The Advanced filter, copy to option copies to the same worksheet. If you
    want to copy the filtered data into a different worksheet, select the Advanced
    Filter command while you are in the worksheet where you want the data to be placed.
  id: totrans-1309
  prefs: []
  type: TYPE_NORMAL
  zh: 注意：高级筛选的“复制到”选项将复制到同一工作表。如果您想将筛选后的数据复制到不同的工作表，请在您想要放置数据的工作表中选择高级筛选命令。
- en: Conclusion
  id: totrans-1310
  prefs: []
  type: TYPE_NORMAL
  zh: 结论
- en: Filtering a database in Excel allows us to extract specific information based
    on criteria we define. In this chapter, we learned about AutoFilter, number, text,
    and date filters, and advanced filtering. We also explored filtering for unique
    records. By mastering these techniques, we can efficiently analyze data and make
    informed decisions. In the next chapter, we will delve into the powerful capabilities
    of sorting data in Excel.
  id: totrans-1311
  prefs: []
  type: TYPE_NORMAL
  zh: 在Excel中筛选数据库允许我们根据我们定义的标准提取特定信息。在本章中，我们学习了自动筛选、数字、文本和日期筛选以及高级筛选。我们还探讨了唯一记录的筛选。通过掌握这些技术，我们可以有效地分析数据并做出明智的决策。在下一章中，我们将深入了解Excel中排序数据的强大功能。
- en: Exercise
  id: totrans-1312
  prefs: []
  type: TYPE_NORMAL
  zh: 练习
- en: '1. Open the sheet named Filter. Use AutoFilter to find the records according
    to following criteria:'
  id: totrans-1313
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 打开名为“筛选”的工作表。使用自动筛选根据以下标准查找记录：
- en: a. People from North or South
  id: totrans-1314
  prefs: []
  type: TYPE_NORMAL
  zh: a. 来自北方或南方的人
- en: b. People working in Sales or Admin
  id: totrans-1315
  prefs: []
  type: TYPE_NORMAL
  zh: b. 在销售或行政部门工作的人
- en: c. People working in Sales or Admin, North or South, whose salary is between
    7000 and 12000
  id: totrans-1316
  prefs: []
  type: TYPE_NORMAL
  zh: c. 在销售或行政部门工作，位于北方或南方，且工资在7000至12000元之间的人
- en: d. People working in Sales or Admin, North or South whose salary is between
    7000 and 12000 or between 15000 and 20000
  id: totrans-1317
  prefs: []
  type: TYPE_NORMAL
  zh: d. 在销售或行政部门工作，位于北方或南方，且工资在7000至12000元之间或15000至20000元之间的人
- en: CHAPTER    8
  id: totrans-1318
  prefs: []
  type: TYPE_NORMAL
  zh: 第八章
- en: Subtotals and Data Consolidation
  id: totrans-1319
  prefs: []
  type: TYPE_NORMAL
  zh: 小计和数据合并
- en: Introduction
  id: totrans-1320
  prefs: []
  type: TYPE_NORMAL
  zh: 简介
- en: Sometimes we need to calculate subtotals followed by a grand total at the end
    of the report. We generally do this by adding a row at the end of each group by
    using the SUM function. Although this is not an incorrect way to do subtotals,
    the amount of manual intervention maximizes the possibility of errors.
  id: totrans-1321
  prefs: []
  type: TYPE_NORMAL
  zh: 有时我们需要在报告末尾计算小计，然后是总计数。我们通常通过在每个组末尾添加一行并使用求和函数来完成此操作。尽管这不是做小计的错误方法，但最大程度的手动干预增加了出错的可能性。
- en: Excel provides an effective way to do this work with the use of the Subtotal
    feature. The chapter will wrap up with the consolidation of data.
  id: totrans-1322
  prefs: []
  type: TYPE_NORMAL
  zh: Excel提供了使用子总功能有效完成这项工作的方法。本章将以数据的合并结束。
- en: Structure
  id: totrans-1323
  prefs: []
  type: TYPE_NORMAL
  zh: 结构
- en: 'In this chapter, we will go over the following topics:'
  id: totrans-1324
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将讨论以下主题：
- en: ■Subtotals
  id: totrans-1325
  prefs: []
  type: TYPE_NORMAL
  zh: ■子总计
- en: ■Consolidation of data
  id: totrans-1326
  prefs: []
  type: TYPE_NORMAL
  zh: ■数据合并
- en: Objectives
  id: totrans-1327
  prefs: []
  type: TYPE_NORMAL
  zh: 目标
- en: After studying this chapter, the reader will be able to define a subtotal, create
    single and multi-level summaries of data using Subtotal, and identify various
    types of functions.
  id: totrans-1328
  prefs: []
  type: TYPE_NORMAL
  zh: 在学习本章后，读者将能够定义子总计，使用子总计创建单一和多级数据摘要，并识别各种函数类型。
- en: Subtotals
  id: totrans-1329
  prefs: []
  type: TYPE_NORMAL
  zh: 子总计
- en: The Subtotal functionality of Excel can help us to calculate subtotal and grand
    total values in a list automatically.
  id: totrans-1330
  prefs: []
  type: TYPE_NORMAL
  zh: Excel的子总计功能可以帮助我们自动计算列表中的子总计和总计数值。
- en: 'Depending on the type of reporting needed, we have two kinds of work to perform:'
  id: totrans-1331
  prefs: []
  type: TYPE_NORMAL
  zh: 根据所需的报告类型，我们有两种工作要做：
- en: ■Single Level Subtotal
  id: totrans-1332
  prefs: []
  type: TYPE_NORMAL
  zh: ■单一级别子总计
- en: ■Multi-Level Subtotal
  id: totrans-1333
  prefs: []
  type: TYPE_NORMAL
  zh: ■多级子总计
- en: Display Subtotal at a Single Level
  id: totrans-1334
  prefs: []
  type: TYPE_NORMAL
  zh: 在单一级别显示子总计
- en: 'Before calculating Subtotal on data, we first need sort the list according
    to the field on which the subtotal needs to be based. Suppose we want to calculate
    a regional subtotal in the list where we also need to sort data on the basis of
    the region column. To find the Subtotal, follow the steps below:'
  id: totrans-1335
  prefs: []
  type: TYPE_NORMAL
  zh: 在计算数据子总计之前，我们首先需要根据子总计所需的字段对列表进行排序。假设我们想在列表中计算区域子总计，同时还需要按区域列对数据进行排序。要找到子总计，请按照以下步骤操作：
- en: 1. Click on the Subtotals command from the Data Tab | Outline Group.
  id: totrans-1336
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 在“数据”选项卡 | “大纲”组中单击“子总计”命令。
- en: 2. A Subtotal dialog box will appear, as shown in [Figure 8.1](#fig8-1).
  id: totrans-1337
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 将出现一个子总计对话框，如图8.1所示。
- en: '![image](image/Image2817.jpg)'
  id: totrans-1338
  prefs: []
  type: TYPE_IMG
  zh: '![image](image/Image2817.jpg)'
- en: Figure 8.1 Subtotal
  id: totrans-1339
  prefs: []
  type: TYPE_NORMAL
  zh: 图8.1 子总计
- en: 3. Select the desired column from the At Each Change In list box.
  id: totrans-1340
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 从“在每个更改中”列表框中选择所需的列。
- en: 4. Select the function which you want to perform on data from the Use function
    list box.
  id: totrans-1341
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 从“使用函数”列表框中选择您要在数据上执行的功能。
- en: '5. Select the column on which you want to perform subtotals from the Add Subtotal
    To: field.'
  id: totrans-1342
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 从“添加子总计到”字段中选择您要执行子总计的列。
- en: 'When you click the OK button, Excel inserts a subtotal row for each group of
    identical items in the selected column. There are a few more options in the Subtotal
    dialog box, as shown in [Figure 8.1](#fig8-1). These are explained as follows:'
  id: totrans-1343
  prefs: []
  type: TYPE_NORMAL
  zh: 当您单击“确定”按钮时，Excel将在所选列中的每个相同项目的组中插入一个子总计行。子总计对话框中还有一些其他选项，如图8.1所示。以下是对这些选项的解释：
- en: '■Choosing a Summary function: The first time you use the Subtotals command
    for a list, Excel suggests a summary function based on the type of data in the
    column you select in the Add Subtotal To box. Choose a different calculation,
    such as Average, by selecting a different summary function in the Use Function
    box in the Subtotal dialog box.'
  id: totrans-1344
  prefs: []
  type: TYPE_NORMAL
  zh: ■选择汇总函数：第一次使用“子总计”命令时，Excel会根据您在“添加子总计到”框中选择的列中的数据类型建议一个汇总函数。通过在“子总计”对话框中的“使用函数”框中选择不同的汇总函数，例如平均值，来选择不同的计算方式。
- en: '■Choosing the values to summarize: The first time you use the Subtotals command,
    the Add Subtotal To box displays the label of the rightmost column. You can leave
    that label as selected, or you can select the label of any other column in the
    list. The next time you use the Subtotals command, Excel displays the label of
    the last column you selected.'
  id: totrans-1345
  prefs: []
  type: TYPE_NORMAL
  zh: ■选择要汇总的值：第一次使用“子总计”命令时，“添加子总计到”框显示最右侧列的标签。您可以保留该标签为选中状态，或者选择列表中任何其他列的标签。下次您使用“子总计”命令时，Excel将显示您最后选择的列的标签。
- en: '■Displaying subtotal rows above the detailed data: If you want your subtotal
    rows to appear above their associated detailed data and the Grand Total row to
    appear at the top of the list, clear the Summary below the Data check box.'
  id: totrans-1346
  prefs: []
  type: TYPE_NORMAL
  zh: ■在详细数据上方显示子总计行：如果您希望子总计行出现在其相关详细数据上方，并且总计数行出现在列表顶部，请清除“数据下方摘要”复选框。
- en: Displaying Nested Subtotal
  id: totrans-1347
  prefs: []
  type: TYPE_NORMAL
  zh: 显示嵌套子总计
- en: Sometimes you need to obtain multiple levels of subtotals from data. For example,
    you may need to group data on Region and then on Dept. In this case, follow the
    steps below.
  id: totrans-1348
  prefs: []
  type: TYPE_NORMAL
  zh: 有时您需要从数据中获取多个级别的子总计。例如，您可能需要按地区分组数据，然后按部门分组。在这种情况下，请按照以下步骤操作。
- en: 1. First, as discussed earlier, you need to sort the data by Region and then
    by Dept.
  id: totrans-1349
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 首先，如前所述，您需要按地区和部门对数据进行排序。
- en: 2. Click the Subtotals command from the Data Tab | Outline Group.
  id: totrans-1350
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 在“数据”选项卡 | “大纲”组中单击“子总计”命令。
- en: 3. Select the Region column from At Each Change In list box.
  id: totrans-1351
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 从“在每个更改中”列表框中选择地区列。
- en: 4. Select the function which you want to perform on data from the Use function
    list box.
  id: totrans-1352
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 从“使用函数”列表框中选择您要在数据上执行的功能。
- en: 5. Select the column on which you want to perform subtotals from the Add Subtotal
    to field.
  id: totrans-1353
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 从“添加小计到”字段中选择您要执行小计的列。
- en: 6. Click the OK button to perform the first level of subtotals.
  id: totrans-1354
  prefs: []
  type: TYPE_NORMAL
  zh: 6. 点击“确定”按钮以执行第一级小计。
- en: 7. Select the Subtotal command and select the Dept column from At Each Change
    In list box.
  id: totrans-1355
  prefs: []
  type: TYPE_NORMAL
  zh: 7. 选择“小计”命令，并从“在每个变化中”列表框中选择“Dept”列。
- en: 8. Select the function which you want to perform on data from the Use function
    list box.
  id: totrans-1356
  prefs: []
  type: TYPE_NORMAL
  zh: 8. 从“使用函数”列表框中选择您要在数据上执行的功能。
- en: 9. Select the column on which you want to perform subtotals from the Add Subtotal
    to field.
  id: totrans-1357
  prefs: []
  type: TYPE_NORMAL
  zh: 9. 从“添加小计到”字段中选择您要执行小计的列。
- en: 10. Clear the Replace the current subtotal check box before you click on the
    OK button, as shown in [Figure 8.2](#fig8-2).
  id: totrans-1358
  prefs: []
  type: TYPE_NORMAL
  zh: 10. 在点击“确定”按钮之前，清除“替换当前小计”复选框，如图[图8.2](#fig8-2)所示。
- en: '![image](image/Figure_8.2.jpg)'
  id: totrans-1359
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image/Figure_8.2.jpg)'
- en: Figure 8.2 Subtotal Dialog Box for Nested Subtotal
  id: totrans-1360
  prefs: []
  type: TYPE_NORMAL
  zh: 图8.2 嵌套小计对话框
- en: Note If you want to copy only the summary details, select the outline where
    the summary is present. Select the columns required, press Alt (to select only
    visible cells), then copy and paste it.
  id: totrans-1361
  prefs: []
  type: TYPE_NORMAL
  zh: 注意：如果您只想复制摘要细节，请选择包含摘要的概要。选择所需的列，按Alt键（以仅选择可见单元格），然后复制并粘贴。
- en: Consolidate Data
  id: totrans-1362
  prefs: []
  type: TYPE_NORMAL
  zh: 合并数据
- en: Consolidating data in Excel allows you to combine data from multiple ranges
    or worksheets into a single summary report. Below is a step-by-step guide to consolidate
    data in Excel.
  id: totrans-1363
  prefs: []
  type: TYPE_NORMAL
  zh: 在Excel中合并数据允许您将多个范围或工作表中的数据合并成一个单独的汇总报告。以下是Excel中合并数据的分步指南。
- en: 1. Open a new worksheet where you want to consolidate the data, as shown in
    [Figure 8.3](#fig8-3).
  id: totrans-1364
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 打开一个新工作表，您要在其中合并数据，如图[图8.3](#fig8-3)所示。
- en: '![image](image/Figure_8.3.jpg)'
  id: totrans-1365
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image/Figure_8.3.jpg)'
- en: Figure 8.3 Open a New Worksheet
  id: totrans-1366
  prefs: []
  type: TYPE_NORMAL
  zh: 图8.3 打开新工作表
- en: 2. Select the cell where you want to place the consolidated data, as shown in
  id: totrans-1367
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 选择您想要放置合并数据的单元格，如图所示
- en: '[Figure 8.4](#fig8-4).'
  id: totrans-1368
  prefs: []
  type: TYPE_NORMAL
  zh: '[图8.4](#fig8-4)。'
- en: '![image](image/Figure_8.4.jpg)'
  id: totrans-1369
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image/Figure_8.4.jpg)'
- en: Figure 8.4 Select Cell
  id: totrans-1370
  prefs: []
  type: TYPE_NORMAL
  zh: 图8.4 选择单元格
- en: 3. Click on the Data tab in the top menu bar, then click on the Consolidate
    button in the Data Tools group, as shown in [Figure 8.5](#fig8-5).
  id: totrans-1371
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 在顶部菜单栏中点击“数据”标签，然后在“数据工具”组中点击“合并”按钮，如图[图8.5](#fig8-5)所示。
- en: '![image](image/Figure_8.5.jpg)'
  id: totrans-1372
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image/Figure_8.5.jpg)'
- en: Figure 8.5 Consolidate Option
  id: totrans-1373
  prefs: []
  type: TYPE_NORMAL
  zh: 图8.5 合并选项
- en: 4. In the Consolidate dialog box, choose the function you want to use for the
    consolidation, such as SUM, AVERAGE, COUNT, and so on, as shown in [Figure 8.6](#fig8-6).
  id: totrans-1374
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 在合并对话框中，选择您要用于合并的功能，例如求和、平均值、计数等，如图[图8.6](#fig8-6)所示。
- en: '![image](image/Figure_8.6.jpg)'
  id: totrans-1375
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image/Figure_8.6.jpg)'
- en: Figure 8.6 Consolidate Dialog Box
  id: totrans-1376
  prefs: []
  type: TYPE_NORMAL
  zh: 图8.6 合并对话框
- en: 5. Select the range of cells that you want to consolidate by clicking the Collapse
    Dialog button next to the Reference field, then selecting the cells you want to
    consolidate. Refer to [Figure 8.7](#fig8-7).
  id: totrans-1377
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 通过点击参考字段旁边的折叠对话框按钮，然后选择您要合并的单元格，来选择您要合并的单元格范围。参见图[图8.7](#fig8-7)。
- en: '![image](image/Figure_8.7.jpg)'
  id: totrans-1378
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image/Figure_8.7.jpg)'
- en: Figure 8.7 Selecting the Cells to Consolidate
  id: totrans-1379
  prefs: []
  type: TYPE_NORMAL
  zh: 图8.7 选择要合并的单元格
- en: 6. If you want to consolidate data from multiple worksheets, click the Add button
    in the All References field, and then select the additional worksheet and range
    of cells you want to consolidate. Refer to [Figure 8.8](#fig8-8).
  id: totrans-1380
  prefs: []
  type: TYPE_NORMAL
  zh: 6. 如果您要从多个工作表合并数据，点击“所有引用”字段中的“添加”按钮，然后选择您想要合并的附加工作表和单元格范围。参见图[图8.8](#fig8-8)。
- en: '![image](image/Figure_8.8.jpg)'
  id: totrans-1381
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image/Figure_8.8.jpg)'
- en: Figure 8.8 Consolidating Data From Multiple Worksheets
  id: totrans-1382
  prefs: []
  type: TYPE_NORMAL
  zh: 图8.8 从多个工作表合并数据
- en: 7. Repeat the previous step for any additional worksheets you want to include
    in the consolidation.
  id: totrans-1383
  prefs: []
  type: TYPE_NORMAL
  zh: 7. 对于您想要包含在合并中的任何其他工作表，重复前面的步骤。
- en: 8. Make sure that the Top row and Left column checkboxes are unchecked if you
    do not want to include these items in your consolidation, as shown in [Figure
    8.9](#fig8-9).
  id: totrans-1384
  prefs: []
  type: TYPE_NORMAL
  zh: 8. 如果您不想在合并中包含这些项，请确保“顶部行”和“左侧列”复选框未被选中，如图[图8.9](#fig8-9)所示。
- en: '![image](image/Figure_8.9.jpg)'
  id: totrans-1385
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image/Figure_8.9.jpg)'
- en: Figure 8.9 Checkboxes for Use of Labels
  id: totrans-1386
  prefs: []
  type: TYPE_NORMAL
  zh: 图8.9 使用标签的复选框
- en: 9. Click OK to consolidate the data, as shown in [Figure 8.10](#fig8-10).
  id: totrans-1387
  prefs: []
  type: TYPE_NORMAL
  zh: 9. 点击“确定”以合并数据，如图[图8.10](#fig8-10)所示。
- en: '![image](image/Figure_8.10.jpg)'
  id: totrans-1388
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image/Figure_8.10.jpg)'
- en: Figure 8.10 Click OK
  id: totrans-1389
  prefs: []
  type: TYPE_NORMAL
  zh: 图8.10 点击确定
- en: After you consolidate the data, the results will be displayed in the cell you
    selected in the second step. You can also use the Consolidate feature to create
    pivot tables, which can provide a more detailed summary of your data.
  id: totrans-1390
  prefs: []
  type: TYPE_NORMAL
  zh: 在您合并数据后，结果将在第二步中选择的单元格中显示。您还可以使用合并功能创建数据透视表，这可以为您提供更详细的数据摘要。
- en: Example of Consolidated Data
  id: totrans-1391
  prefs: []
  type: TYPE_NORMAL
  zh: 合并数据的示例
- en: Let us say you have three worksheets, each containing sales data for a different
    region (East, West, and South). Each worksheet has the same format, with columns
    for Product, Sales Rep, and Sales Amount, as shown in [Figure 8.11](#fig8-11).
  id: totrans-1392
  prefs: []
  type: TYPE_NORMAL
  zh: 假设您有三个工作表，每个工作表包含不同地区（东、西和南）的销售数据。每个工作表具有相同的格式，包括产品、销售代表和销售额列，如图8.11所示[图8.11](#fig8-11)。
- en: '![image](image/Figure_8.11.jpg)'
  id: totrans-1393
  prefs: []
  type: TYPE_IMG
  zh: '![image](image/Figure_8.11.jpg)'
- en: Figure 8.11 Sample Worksheets
  id: totrans-1394
  prefs: []
  type: TYPE_NORMAL
  zh: 图8.11 样本工作表
- en: To consolidate the data from these worksheets into a single summary report,
    follow the steps below.
  id: totrans-1395
  prefs: []
  type: TYPE_NORMAL
  zh: 要将这些工作表中的数据合并到单个摘要报告中，请按照以下步骤操作。
- en: 1. Open a new worksheet where you want to consolidate the data, as we did in
    [Figure 8.3](#fig8-3).
  id: totrans-1396
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 打开一个新的工作表，您想在其中合并数据，就像我们在[图8.3](#fig8-3)中所做的那样。
- en: 2. Select the cell where you want to place the consolidated data, for example,
    cell A1 as shown in [Figure 8.12](#fig8-12).
  id: totrans-1397
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 选择您想要放置合并数据的单元格，例如，如图8.12所示[图8.12](#fig8-12)中的单元格A1。
- en: '![image](image/Figure_8.12.jpg)'
  id: totrans-1398
  prefs: []
  type: TYPE_IMG
  zh: '![image](image/Figure_8.12.jpg)'
- en: Figure 8.12 Select a Cell
  id: totrans-1399
  prefs: []
  type: TYPE_NORMAL
  zh: 图8.12 选择一个单元格
- en: 3. Click on the Data tab in the top menu bar, and then click on the Consolidate
    button in the Data Tools group, as was depicted in [Figure 8.5](#fig8-5).
  id: totrans-1400
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 在顶部菜单栏中点击“数据”标签，然后在“数据工具”组中点击“合并”按钮，如图8.5所示[图8.5](#fig8-5)。
- en: 4. In the Consolidate dialog box, choose the function you want to use for the
    consolidation (e.g., SUM, AVERAGE, COUNT, and so on), as you did in [Figure 8.6](#fig8-6).
  id: totrans-1401
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 在合并对话框中，选择您想要用于合并的函数（例如，SUM、AVERAGE、COUNT等），就像在[图8.6](#fig8-6)中所做的那样。
- en: 5. Select the range of cells that you want to consolidate by clicking the Collapse
    Dialog button next to the Reference field, and then select the cells you want
    to consolidate on the East worksheet, for example, A1:C10, as shown in [Figure
    8.13](#fig8-13).
  id: totrans-1402
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 通过点击“引用”字段旁边的“折叠对话框”按钮来选择您想要合并的单元格范围，然后在东工作表上选择您想要合并的单元格，例如，A1:C10，如图8.13所示[图8.13](#fig8-13)。
- en: '![image](image/Figure_8.13.jpg)'
  id: totrans-1403
  prefs: []
  type: TYPE_IMG
  zh: '![image](image/Figure_8.13.jpg)'
- en: Figure 8.13 Selecting the Cells to Consolidate
  id: totrans-1404
  prefs: []
  type: TYPE_NORMAL
  zh: 图8.13 选择要合并的单元格
- en: 6. If you want to consolidate data from multiple worksheets, click the Add button
    in the All References field, then select the additional worksheet and range of
    cells you want to consolidate (for example, select the range on the West worksheet,
    then select the range on the South worksheet), as shown in [Figure 8.14](#fig8-14).
  id: totrans-1405
  prefs: []
  type: TYPE_NORMAL
  zh: 6. 如果您想从多个工作表中合并数据，请点击“所有引用”字段中的“添加”按钮，然后选择您想要合并的附加工作表和单元格范围（例如，选择西工作表上的范围，然后选择南工作表上的范围），如图8.14所示[图8.14](#fig8-14)。
- en: '![image](image/Figure_8.14.jpg)'
  id: totrans-1406
  prefs: []
  type: TYPE_IMG
  zh: '![image](image/Figure_8.14.jpg)'
- en: Figure 8.14 Consolidating Data From Multiple Worksheets
  id: totrans-1407
  prefs: []
  type: TYPE_NORMAL
  zh: 图8.14 从多个工作表中合并数据
- en: 7. Make sure that the Top row and Left column checkboxes are unchecked if you
    do not want to include these items in your consolidation, as was shown in [Figure
    8.9](#fig8-9).
  id: totrans-1408
  prefs: []
  type: TYPE_NORMAL
  zh: 7. 如果您不想在合并中包含这些项，请确保“顶部行”和“左侧列”复选框未被选中，如图8.9所示[图8.9](#fig8-9)。
- en: 8. Click OK to consolidate the data, as was shown in [Figure 8.10](#fig8-10).
  id: totrans-1409
  prefs: []
  type: TYPE_NORMAL
  zh: 8. 点击“确定”以合并数据，如图8.10所示[图8.10](#fig8-10)。
- en: The final consolidated data can be seen in [Figure 8.15](#fig8-15).
  id: totrans-1410
  prefs: []
  type: TYPE_NORMAL
  zh: 最终合并数据可以在[图8.15](#fig8-15)中查看。
- en: '![image](image/Figure_8.15.jpg)'
  id: totrans-1411
  prefs: []
  type: TYPE_IMG
  zh: '![image](image/Figure_8.15.jpg)'
- en: Figure 8.15 Final Consolidated Data
  id: totrans-1412
  prefs: []
  type: TYPE_NORMAL
  zh: 图8.15 最终合并数据
- en: Conclusion
  id: totrans-1413
  prefs: []
  type: TYPE_NORMAL
  zh: 结论
- en: In conclusion, this chapter introduced the concepts of subtotals and data consolidation
    in Excel. Subtotals allow for automatic calculation of subtotal and grand total
    values in a list, making data analysis more efficient. The Subtotal feature can
    be used to create single-level and multi-level summaries of data based on selected
    columns and functions.
  id: totrans-1414
  prefs: []
  type: TYPE_NORMAL
  zh: 总之，本章介绍了Excel中的小计和数据合并的概念。小计允许自动计算列表中的小计和总计值，使数据分析更高效。您可以使用小计功能根据所选列和函数创建单级和多级数据摘要。
- en: Data consolidation enables the combination of data from multiple ranges or worksheets
    into a single summary report. The Consolidate feature provides various consolidation
    functions and allows for the selection of specific cells or ranges to consolidate.
    This feature can be especially useful when dealing with data from different sources
    or worksheets.
  id: totrans-1415
  prefs: []
  type: TYPE_NORMAL
  zh: 数据合并可以将来自多个范围或工作表的数据组合成一个单一的汇总报告。合并功能提供了各种合并函数，并允许选择特定的单元格或范围进行合并。当处理来自不同来源或工作表的数据时，此功能特别有用。
- en: By mastering subtotals and data consolidation, users can streamline their data
    analysis process and generate accurate and comprehensive reports with minimal
    manual intervention.
  id: totrans-1416
  prefs: []
  type: TYPE_NORMAL
  zh: 通过掌握子总金额和数据合并，用户可以简化他们的数据分析过程，并以最少的手动干预生成准确和全面的报告。
