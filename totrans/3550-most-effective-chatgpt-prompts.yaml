  - PREF_OL
  type: TYPE_NORMAL
  zh: 你能为我编制一份负面关键词列表，以排除在我的效果广告中，防止不必要的广告支出吗？
- en: Craft a PPC ad promoting our [product/service] with a relevant call-to-action.
  id: totrans-1896
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请编写一个推广我们[产品/服务]的PPC广告，其中包含相关的号召性用语。
