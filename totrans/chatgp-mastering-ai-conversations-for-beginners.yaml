  zh: '**如果你**曾经**好奇**过AI是如何从所有其他丑陋的**苍蝇**中**识别**出你的**美丽**景象，那**全**要**归功**于**生物识别**技术。**生物识别**意味着**生物**的**测量**，是AI通过**物理**特征**识别**人的方式。**面部识别**软件最**为人所知**的用途之一是**帮助**我们在**Facebook**上**标记**朋友，利用它所提供的**知识**（即，**照片**）与**其**面部数据库**进行**比较**。**除了**社交领域，**面部识别**软件也被**企业**用于**帮助****验证**他们的**员工**身份或其他**需要****身份证****验证的**工作角色。'
