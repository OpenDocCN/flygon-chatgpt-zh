  prefs: []
  type: TYPE_NORMAL
  zh: 2015年12月，科技界的几个大人物以及一对不知名的夫妇聚集在一起，共同创立了一家名为**OpenAI**的公司，旨在创造一种既实用又聪明的人工智能，这种人工智能在特定任务上可以像人类一样智能。实际上，根据**OpenAI**的章程，达到与人类相同的智能水平只是他们真正目标的第一步，即设计“高度自主的系统，在大多数经济价值最高的工作中超越人类”（**OpenAI，2018**）。
