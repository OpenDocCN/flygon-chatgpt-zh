- en: 'Pg 12: AI Voice Tools – Speak, Listen, Learn'
  id: totrans-231
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第12页：AI 语音工具——说话、听、学
- en: AI is not just about typing. Voice AI tools like ElevenLabs , Play.ht , and
    Google Speech AI are changing how we listen, speak, and create audio content.
  id: totrans-232
  prefs: []
  type: TYPE_NORMAL
  zh: AI 不仅仅是打字。像 ElevenLabs、Play.ht 和 Google 语音 AI 这样的语音 AI 工具正在改变我们听、说和创建音频内容的方式。
- en: '? ? What Can Voice AI Do?'
  id: totrans-233
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '? ? 语音 AI 能做什么？'
- en: Turn text into realistic human voices (Text-to-Speech)
  id: totrans-234
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将文本转换为逼真的真人语音（文本转语音）
