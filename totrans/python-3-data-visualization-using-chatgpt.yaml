- en: '**EXCEPTION HANDLING IN PYTHON**'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Unlike JavaScript, you cannot add a number and a string in Python. However,
    you can detect an illegal operation using the try/except construct in Python,
    which is similar to the try/catch construct in languages such as JavaScript and
    Java.
  prefs: []
  type: TYPE_NORMAL
- en: 'An example of a try/except block is here:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE96]'
  prefs: []
  type: TYPE_PRE
- en: When you run the preceding code, the print() statement in the except code block
    is executed because the variables x and y have incompatible types.
  prefs: []
  type: TYPE_NORMAL
- en: 'Earlier in the chapter, you also saw that subtracting two strings throws an
    exception:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE97]'
  prefs: []
  type: TYPE_PRE
- en: 'A simple way to handle this situation is to use a try/except block:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE98]'
  prefs: []
  type: TYPE_PRE
- en: 'The output from the preceding code block is here:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE99]'
  prefs: []
  type: TYPE_PRE
- en: As you can see, the preceding code block specifies the finer-grained exception
    called TypeError, followed by a generic except code block to handle all other
    exceptions that might occur during the execution of your Python code. This style
    is similar to the exception handling in Java code.
  prefs: []
  type: TYPE_NORMAL
- en: '[Listing 1.10](#list1-10) displays the content of exception1.py that illustrates
    how to handle various types of exceptions.'
  prefs: []
  type: TYPE_NORMAL
- en: '***LISTING 1.10: exception1.py***'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE100]'
  prefs: []
  type: TYPE_PRE
- en: '[Listing 1.10](#list1-10) contains a try block followed by three except statements.
    If an error occurs in the try block, the first except statement is compared with
    the type of exception that occurred. If there is a match, then the subsequent
    print() statement is executed, and the program terminates. If not, a similar test
    is performed with the second except statement. If neither except statement matches
    the exception, the third except statement handles the exception, which involves
    printing a message and then “raising” an exception. Note that you can also specify
    multiple exception types in a single statement, as shown here:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE101]'
  prefs: []
  type: TYPE_PRE
- en: The preceding code block is more compact, but you do not know which of the three
    error types occurred. Python allows you to define custom exceptions, but this
    topic is beyond the scope of this book.
  prefs: []
  type: TYPE_NORMAL
- en: '**HANDLING USER INPUT**'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Python enables you to read user input from the command line via the input()
    function or the raw_input() function. Typically, you assign user input to a variable,
    which will contain all characters that users enter from the keyboard. User input
    terminates when users press the <return> key (which is included with the input
    characters). [Listing 1.11](#list1-11) displays the content of user_input1.py
    that prompts users for their name and then uses interpolation to display a response.
  prefs: []
  type: TYPE_NORMAL
- en: '***LISTING 1.11: user_input1.py***'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE102]'
  prefs: []
  type: TYPE_PRE
- en: 'The output of [Listing 1.11](#list1-11) is here (assume that the user entered
    the word Dave):'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE103]'
  prefs: []
  type: TYPE_PRE
- en: The print() statement in [Listing 1.11](#list1-11) uses string interpolation
    via %s, which substitutes the value of the variable after the % symbol. This functionality
    is obviously useful when you want to specify something that is determined at run-time.
  prefs: []
  type: TYPE_NORMAL
- en: User input can cause exceptions (depending on the operations that your code
    performs), so it is important to include exception-handling code.
  prefs: []
  type: TYPE_NORMAL
