- en: '****2****. ****Ch**ain** ****o**f** ****Tho**ugh**t (****Ch**ain** ****o**f**
    ****Tho**ught**s)'
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: '**2. 思维链（思维链**）'
- en: '[****Wh**at** ****i**s** ]'
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: '[**什么是**]'
- en: '****Ch**ain** ****o**f** ****Tho**ugh**t , ****o**r** ****Ch**ain** ****o**f**
    ****Tho**ught**s, ****i**s** ****a**** ****prom**ptin**g ****engi**neerin**g ****tech**niqu**e
    ****th**at** ****inst**ruct**s ****t**he** ****L**LM** ****t**o** "****th**ink**
    ****o**ut** ****lo**ud**" ****a**s** ****i**t** ****co**mes** ****t**o** ****a****
    ****conc**lusio**n. ****Ins**tea**d ****o**f** ****gi**vin**g ****a**** ****di**rec**t
    ****an**swe**r, ****t**he** ****mo**del** ****mu**st** ****fi**rst** ****des**crib**e
    ****t**he** ****st**eps** ****o**r** ****reas**onin**g ****th**at** ****l**ed**
    ****i**t** ****t**o** ****th**at** ****an**swe**r. ****Th**is** ****cre**ate**s
    ****a**** ****so**rt** ****o**f** ****ch**ain** ****o**f** ****reas**onin**g,
    ****wh**ere** ****t**he** ****mo**del** ****la**ys** ****o**ut** ****ea**ch**
    ****st**ep** ****un**til** ****i**t** ****rea**che**s ****t**he** ****conc**lusio**n.'
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: '**思维链**，或**思维链**，是一种**提示工程**技术，它指导LLM“大声思考”，当它得出结论时。而不是给出直接的答案，模型必须首先描述导致那个答案的步骤或推理。这创建了一种推理链，其中模型逐步展开，直到得出结论。'
- en: '****Th**is** ****tech**niqu**e ****i**s** ****us**efu**l ****f**or** ****ma**kin**g
    ****reas**onin**g ****mo**re** ****tran**sparen**t ****a**nd** ****under**standab**le.
    ****T**he** ****mo**del** ****wo**rks** ****a**s** ****i**f** ****i**t** ****we**re**
    "****thi**nkin**g" ****a**nd** ****expl**ainin**g ****ea**ch** ****dec**isio**n
    ****ma**de** ****thro**ughou**t ****t**he** ****pro**ces**s, ****wh**ich** ****i**s**
    ****espe**ciall**y ****us**efu**l ****f**or** ****com**ple**x ****ques**tion**s,
    ****math**ematic**al ****pro**blem**s, ****o**r** ****log**ica**l ****dil**emma**s.'
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: '**这种技巧**对于制作更**有说服力**、更**透明**和**易于理解**的**论点**很有用。模型工作就像它“思考”并通过整个过程解释每个做出的决策一样，这对于复杂问题、数学问题或逻辑难题尤其有用。'
- en: '[****Wh**at** ****i**s** ****yo**ur** ****ma**in** ****obje**ctiv**e ]'
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: '[**你的主要目标是什么**]'
- en: '****T**he** ****ma**in** ****obje**ctiv**e ****o**f** ****t**he** ****Ch**ain**
    ****o**f** ****Tho**ugh**t ****i**s** ****ab**out** ****gui**din**g ****t**he**
    ****mo**del** ****tow**ard**s ****a**** ****log**ica**l ****a**nd** ****coh**eren**t
    ****an**swe**r, ****gi**vin**g ****visi**bilit**y ****t**o** ****t**he** ****reas**onin**g
    ****st**eps**. ****Of**ten**, ****a**** ****di**rec**t ****an**swe**r ****c**an**
    ****om**it** ****impo**rtan**t ****info**rmatio**n, ****wh**ich** ****le**ads**
    ****t**o** ****a**n** ****inco**mplet**e ****o**r** ****inco**rrec**t ****re**sul**t.
    ****T**he** ****Tho**ugh**t ****Ch**ain** ****ai**ms** ****t**o** ****en**sur**e
    ****th**at** ****ea**ch** ****st**ep** ****th**at** ****l**ed** ****t**o** ****t**he**
    ****an**swe**r ****i**s** ****cle**arl**y ****det**aile**d ****a**nd** ****expl**aine**d.'
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: '**思维链的主要目标**是引导模型朝着**逻辑**和**连贯**的答案发展，**展现**推理步骤。通常，一个直接的答案可能会遗漏重要信息，导致结果**不完整**或**不正确**。思维链的目标是确保导致答案的每个步骤都**清晰**和**详细**地说明。'
- en: '****Ano**the**r ****impo**rtan**t ****go**al** ****i**s** ****t**o** ****u**se**
    ****t**he** ****L**LM**’****s**** ****abi**lit**y ****t**o** ****so**lve** ****com**ple**x
    ****pro**blem**s ****mo**re** ****effe**ctivel**y. ****As**kin**g ****t**he**
    ****mo**del** ****t**o** ****des**crib**e ****i**ts** ****pro**ces**s ****he**lps**
    ****av**oid** ****ans**wer**s ****th**at** ****m**ay** ****se**em** ****cor**rec**t
    ****b**ut** ****a**re** ****act**uall**y ****wr**ong** ****d**ue** ****t**o**
    ****a**** ****la**ck** ****o**f** ****cl**ear** ****lo**gic**. ****Th**is** ****tech**niqu**e
    ****enco**urage**s ****t**he** ****mo**del** ****t**o** ****ch**eck** ****it**sel**f
    ****a**t** ****ea**ch** ****st**ep**, ****incr**easin**g ****t**he** ****acc**urac**y
    ****o**f** ****i**ts** ****ans**wer**s.'
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个重要目标是利用LLM解决复杂问题的能力更加有效。引导模型描述其过程有助于避免看似正确但实际上由于逻辑不清而错误的答案。这种技术鼓励模型在每一步检查自己，从而提高其答案的准确性。
- en: '[****H**ow** ****i**t** ****wo**rks** ]'
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: '[**它是如何工作的**]'
- en: '****Ch**ain** ****o**f** ****Tho**ugh**t ****wo**rks** ****b**y** ****expl**icitl**y
    ****as**kin**g ****t**he** ****mo**del** ****t**o** ****th**ink** ****i**n** ****st**eps**.
    ****T**he** ****pr**omp**t ****sh**oul**d ****b**e** ****cons**tructe**d ****i**n**
    ****a**** ****w**ay** ****th**at** ****ma**kes** ****i**t** ****cl**ear** ****th**at**
    ****t**he** ****L**LM** ****sh**oul**d ****exp**lai**n ****ea**ch** ****pa**rt**
    ****o**f** ****t**he** ****pro**ces**s ****un**til** ****i**t** ****rea**che**s
    ****t**he** ****fi**nal** ****re**sul**t. ****Th**is** ****i**s** ****of**ten**
    ****do**ne** ****thr**oug**h ****key**word**s ****su**ch** ****a**s** “****exp**lai**n
    ****st**ep** ****b**y** ****st**ep**,” “****des**crib**e ****t**he** ****pro**ces**s,”
    ****o**r** “****th**ink** ****thr**oug**h ****ea**ch** ****st**ep** ****be**for**e
    ****gi**vin**g ****t**he** ****an**swe**r.”'
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: '**思维链**工作是通过明确地引导模型分步骤思考来实现的。提示应该以使模型明确知道它应该解释每个步骤直到最终结果的方式构建。这通常通过使用诸如“**逐步解释步骤**”、“**描述过程**”或“**在给出答案之前思考每一步**”等关键词来完成。'
- en: '****Th**is** ****tech**niqu**e ****i**s** ****pow**erfu**l ****bec**aus**e
    ****LL**Ms** ****ha**ve** ****diff**icult**y ****main**tainin**g ****cons**isten**t
    ****reas**onin**g ****wh**en** ****ung**uide**d. ****B**y** ****bre**akin**g ****t**he**
    ****ta**sk** ****in**to** ****sma**lle**r ****st**eps**, ****i**t** ****bec**ome**s
    ****ea**sie**r ****f**or** ****t**he** ****mo**del** ****t**o** ****pro**ces**s
    ****info**rmatio**n, ****ap**ply** ****ru**les**, ****a**nd** ****av**oid** ****shor**tcut**s
    ****th**at** ****co**uld** ****comp**romis**e ****t**he** ****an**swe**r. ****T**he**
    ****Ch**ain** ****o**f** ****Tho**ugh**t ****n**ot** ****on**ly** ****incr**ease**s
    ****tran**sparen**cy, ****b**ut** ****al**so** ****imp**rove**s ****t**he** ****qua**lit**y
    ****o**f** ****t**he** ****ans**wer**s.'
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 这种技术之所以强大，是因为LLM在无引导时难以保持一致的推理。通过将任务分解成更小的步骤，它使得模型更容易处理信息、应用规则，并避免可能导致答案失真的捷径。**思维链**不仅增加了透明度，还提高了答案的质量。
- en: '****Furt**hermor**e, ****t**he** ****Ch**ain** ****o**f** ****Tho**ugh**t ****c**an**
    ****he**lp** ****de**tec**t ****pote**ntia**l ****er**ror**s. ****B**y** ****pres**entin**g
    ****a**** ****st**ep**-****b**y**-****st**ep** ****pro**ces**s, ****t**he** ****us**er**
    ****c**an** ****ch**eck** ****a**nd** ****unde**rstan**d ****wh**ere**, ****i**f**
    ****a**ny**, ****a**** ****fl**aw** ****i**n** ****t**he** ****lo**gic** ****occ**urre**d.
    ****Th**is** ****al**low**s ****f**or** ****mo**re** ****acc**urat**e ****a**nd**
    ****effe**ctiv**e ****corr**ectio**n, ****hel**pin**g ****wi**th** ****lea**rnin**g
    ****o**r** ****pro**ble**m-****sol**vin**g.'
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，**思维链**可以帮助检测潜在错误。通过呈现逐步的过程，用户可以检查并理解在哪里，如果有的话，逻辑中出现了任何缺陷。这允许进行更准确和有效的纠正，有助于学习和问题解决。
- en: '[****Wh**en** ****t**o** ****u**se** ]'
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: '[**何时使用**]'
- en: '****Ch**ain** ****o**f** ****Tho**ugh**t ****i**s** ****id**eal** ****i**n**
    ****situ**ation**s ****wh**ere** ****t**he** ****pro**ble**m ****h**as** ****sev**era**l
    ****log**ica**l ****st**eps** ****o**r** ****wh**ere** ****t**he** ****an**swe**r
    ****req**uire**s ****det**aile**d ****expl**anatio**n ****t**o** ****b**e** ****unde**rstoo**d.
    ****F**or** ****exa**mpl**e, ****pro**blem**s ****i**n** ****math**ematic**s,
    ****lo**gic**, ****te**xt** ****ana**lysi**s, ****o**r** ****a**ny** ****situ**atio**n
    ****th**at** ****inv**olve**s ****det**aile**d ****pla**nnin**g ****ben**efi**t
    ****gre**atl**y ****fr**om** ****th**is** ****app**roac**h.'
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: '**思维链**适用于问题有几个逻辑步骤或答案需要详细解释以便理解的情况。例如，数学、逻辑、文本分析或任何涉及详细计划的情况，从这个方法中受益极大。'
- en: '****T**he** ****tech**niqu**e ****sh**oul**d ****b**e** ****us**ed** ****whe**neve**r
    ****i**t** ****i**s** ****nece**ssar**y ****t**o** ****ob**tai**n ****a**** ****cl**ear**
    ****under**standi**ng ****o**f** ****t**he** ****inte**rmedia**te ****st**eps**
    ****t**o** ****re**ach** ****t**he** ****fi**nal** ****sol**utio**n. ****I**n**
    ****educ**ationa**l ****con**text**s, ****f**or** ****exa**mpl**e, ****Ch**ain**
    ****o**f** ****Tho**ugh**t ****i**s** ****gr**eat** ****f**or** ****tea**chin**g
    ****stu**dent**s ****st**ep**-****b**y**-****st**ep** ****proc**esse**s, ****sho**win**g
    ****n**ot** ****ju**st** ****t**he** ****an**swe**r, ****b**ut** ****h**ow** ****i**t**
    ****w**as** ****ach**ieve**d.'
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 当需要获得对达到最终解决方案的中间步骤的清晰理解时，应使用此技术。在教育环境中，例如，**思维链**对于教授学生逐步过程非常有用，不仅展示答案，还展示它是如何得到的。
- en: '****I**n** ****com**ple**x ****ana**lysi**s ****o**r** ****diag**nosti**c ****situ**ation**s,
    ****t**he** ****Ch**ain** ****o**f** ****Tho**ugh**t ****i**s** ****al**so** ****extr**emel**y
    ****us**efu**l. ****Ima**gin**e ****us**ing** ****t**he** ****mo**del** ****t**o**
    ****ana**lyz**e ****a**** ****med**ica**l ****situ**atio**n: ****b**y** ****expl**ainin**g
    ****ea**ch** ****st**ep** ****o**f** ****t**he** ****diag**nosi**s, ****i**t**
    ****i**s** ****pos**sibl**e ****t**o** ****en**sur**e ****th**at** ****a**ll**
    ****fac**tor**s ****a**re** ****cons**idere**d ****a**nd** ****unde**rstoo**d,
    ****ma**kin**g ****t**he** ****an**swe**r ****mu**ch** ****mo**re** ****val**uabl**e.'
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 在复杂分析或诊断情况下，**思维链**同样极为有用。想象使用该模型来分析一个医疗情况：通过解释诊断的每一步，可以确保所有因素都被考虑和理解，从而使答案更具价值。
