  id: totrans-229
  prefs: []
  type: TYPE_NORMAL
  zh: '**用户也扮演着至关重要的角色。通过积极主动并意识到人工智能的潜在影响，我们可以帮助引导发展那些既重视创新又重视责任感的伦理标准。毕竟，人工智能的未来将由其开发者以及与这些系统互动和依赖它们的每个人共同塑造。**'
