- en: Following our practice of not changing raw data, select the data only (leaving
    out the data dictionary at the bottom of the table and making sure to copy the
    headings), and then file and copy it as the shaped file in a new spreadsheet.
    Label this spreadsheet “StartUpStats.”
  prefs: []
  type: TYPE_NORMAL
- en: Using the Analysis ToolPak, select “Descriptive Statistics.” Enter the entire
    range of data, including the column labels, as the range. Make sure to click the
    “labels in the first row” box. Put the results in another spreadsheet or somewhere
    in the same sheet as the shaped file. Select only the “Summary Statistics” box.
  prefs: []
  type: TYPE_NORMAL
- en: Change the formatting of the statistics to “Numbers” and two decimals. Put the
    column labels on top of the stats numbers and the row labels. Delete every other
    row label to leave only the statistics.
