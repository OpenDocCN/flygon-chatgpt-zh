    ****wi**th** ****t**he** ****to**pic**. ****Ke**ep** ****t**he** ****lan**guag**e
    ****si**mpl**e ****a**nd** ****u**se** ****rela**tabl**e ****exa**mple**s.”'
  id: totrans-109
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**非小说：“为对量子计算不熟悉的读者草拟一个关于量子计算的简要解释。保持语言简单并使用可靠的例子。”**'
- en: '****Brain**stormi**ng: “****Li**st** ****t**en** ****un**iqu**e ****id**eas**
    ****f**or** ****a**** ****sci**enc**e ****fic**tio**n ****no**vel** ****s**et**
    ****i**n** ****a**** ****po**st**-****apoc**alypti**c ****wo**rld**.”'
