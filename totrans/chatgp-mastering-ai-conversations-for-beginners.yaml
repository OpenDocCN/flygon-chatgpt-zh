  prefs: []
  type: TYPE_NORMAL
  zh: 这些早期的AI先驱之一是英国数理逻辑学家**艾伦·图灵**。图灵对计算机能做什么以及它们未来能够做到什么感到着迷。因此，他开始研究人工智能的数学可能性以及它将如何（以及多快）发展。图灵开始探索AI未来可能做到的事情，通过考虑人类目前能够做到的事情。从他的观点来看，如果人类能够利用可用的信息，以及逻辑和推理，来解决复杂问题并做出明智的决定，那么为什么机器不能学会做同样的事情呢？因此，他着手以最佳方式回答这个问题。1950年，图灵发布了一篇开创性的研究论文，名为《计算机与智能》，在其中他概述了他的假设，即如何构建人工智能，以及我们如何测试这些机器的智能程度。进入图灵测试。
