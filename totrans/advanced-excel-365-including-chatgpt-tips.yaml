  id: totrans-2570
  prefs: []
  type: TYPE_NORMAL
  zh: 图16.1 Visual Basic编辑器中的代码窗口
- en: 'The different parts in the Code window in Visual Basic Editor are as follows:'
  id: totrans-2571
  prefs: []
  type: TYPE_NORMAL
  zh: 在Visual Basic编辑器中的代码窗口的不同部分如下：
- en: '■Project Explorer: This section displays a hierarchical list of the projects
    (Excel Workbooks) and all the items contained in and referenced by each project.'
  id: totrans-2572
  prefs: []
  type: TYPE_NORMAL
  zh: ■项目资源管理器：此部分显示项目（Excel工作簿）的分层列表以及每个项目包含和引用的所有项目。
- en: '■Properties Window: This window lists the design-time properties for selected
    objects and their current settings. You can change these properties at design
    time. When you select multiple controls, the Properties window contains a list
    of the properties common to all the selected controls.'
  id: totrans-2573
  prefs: []
  type: TYPE_NORMAL
  zh: ■属性窗口：此窗口列出所选对象的设计时属性及其当前设置。您可以在设计时更改这些属性。当您选择多个控件时，属性窗口包含所有选定控件共有的属性列表。
- en: '■Code Window: Use the Code window to write, display, and edit Visual Basic
    code. You can open as many Code windows as you have modules. You can easily view
    the code in different forms or modules and copy and paste between them.'
  id: totrans-2574
  prefs: []
  type: TYPE_NORMAL
  zh: ■代码窗口：使用代码窗口编写、显示和编辑Visual Basic代码。您可以根据模块数量打开多个代码窗口。您可以轻松查看不同表单或模块中的代码，并在它们之间复制和粘贴。
- en: '[Figure 16.2](#fig16-2) explores the Project Explorer in more detail.'
  id: totrans-2575
  prefs: []
  type: TYPE_NORMAL
  zh: '[图16.2](#fig16-2)更详细地探讨了项目资源管理器。'
- en: '■View Code: Displays the Code window so you can write and edit code associated
    with the selected item.'
  id: totrans-2576
  prefs: []
  type: TYPE_NORMAL
  zh: ■查看代码：显示代码窗口，以便您可以为选定的项目编写和编辑代码。
- en: '■View Object: Displays the Object window for the selected item, such as an
    existing Document or User form.'
  id: totrans-2577
  prefs: []
  type: TYPE_NORMAL
  zh: ■查看对象：显示所选项目的对象窗口，例如现有的文档或用户表单。
- en: '■Toggle Folders: Hides and shows the object folders while still showing the
    individual items contained within them.'
  id: totrans-2578
  prefs: []
  type: TYPE_NORMAL
  zh: ■切换文件夹：在显示包含其中的单个项目的同时，隐藏和显示对象文件夹。
- en: '■List Window: Lists the loaded projects and the items included in each project.'
  id: totrans-2579
  prefs: []
  type: TYPE_NORMAL
  zh: ■列表窗口：列出加载的项目以及每个项目包含的项目。
- en: A Property is a characteristic of any object. The Property Window shown in [Figure
    16.2](#fig16-2) shows the properties of a selected object.
  id: totrans-2580
  prefs: []
  type: TYPE_NORMAL
  zh: 属性是任何对象的特性。图16.2中所示的属性窗口显示了所选对象的属性。
- en: '![image](image/Figure_16.2.jpg)'
  id: totrans-2581
  prefs: []
  type: TYPE_IMG
  zh: '![image](image/Figure_16.2.jpg)'
- en: Figure 16.2 Project Explorer and the Property Window
  id: totrans-2582
  prefs: []
  type: TYPE_NORMAL
  zh: 图16.2 项目资源管理器和属性窗口
- en: Let us now look at the different parts of the Code window (refer to [Figure
    16.3](#fig16-3)).
  id: totrans-2583
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们来看看代码窗口的不同部分（参见图16.3）。
- en: '■Object Box: This view displays a list of objects from current projects.'
  id: totrans-2584
  prefs: []
  type: TYPE_NORMAL
  zh: ■对象框：此视图显示当前项目中的对象列表。
- en: '■Procedure Window: This window contains all the procedures of the current module
    or events of a selected object.'
  id: totrans-2585
  prefs: []
  type: TYPE_NORMAL
  zh: ■过程窗口：此窗口包含当前模块的所有过程或所选对象的全部事件。
- en: '■Procedure View: This view displays only one procedure at a time.'
  id: totrans-2586
  prefs: []
  type: TYPE_NORMAL
  zh: ■过程视图：此视图一次只显示一个过程。
- en: '■Full Module View: This option displays all procedures from the current module.'
  id: totrans-2587
  prefs: []
  type: TYPE_NORMAL
  zh: ■完整模块视图：此选项显示当前模块的所有过程。
- en: Refer to [Figure 16.3](#fig16-3).
  id: totrans-2588
  prefs: []
  type: TYPE_NORMAL
  zh: 参考图16.3。
- en: '![image](image/Figure_16.3.jpg)'
  id: totrans-2589
  prefs: []
  type: TYPE_IMG
  zh: '![image](image/Figure_16.3.jpg)'
- en: Figure 16.3 Code Window
  id: totrans-2590
  prefs: []
  type: TYPE_NORMAL
  zh: 图16.3 代码窗口
- en: Project Explorer Keyboard Shortcuts
  id: totrans-2591
  prefs: []
  type: TYPE_NORMAL
  zh: 项目资源管理器键盘快捷键
- en: 'Let us now look at the various keyboard shortcuts:'
  id: totrans-2592
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们来看看各种键盘快捷键：
- en: '■ENTER + Æ: Open the selected file from the list, or expand and collapse the
    list to show its sub-entries.'
  id: totrans-2593
  prefs: []
  type: TYPE_NORMAL
  zh: '■ENTER + Æ: 从列表中打开所选文件，或展开和折叠列表以显示其子条目。'
- en: '■SHIFT+ENTERÆ: Open the Code window for the selected file.'
  id: totrans-2594
  prefs: []
  type: TYPE_NORMAL
  zh: '■SHIFT+ENTERÆ: 为选定的文件打开代码窗口。'
- en: '■F7 + Æ: Open the Code window for the selected file.'
  id: totrans-2595
  prefs: []
  type: TYPE_NORMAL
  zh: '■F7 + Æ: 为选定的文件打开代码窗口。'
- en: '■SHIFT+F10 Æ: View the shortcut menu.'
  id: totrans-2596
  prefs: []
  type: TYPE_NORMAL
  zh: '■SHIFT+F10 Æ: 查看快捷菜单。'
- en: '■HOME + Æ: Select the first file in the list.'
  id: totrans-2597
  prefs: []
  type: TYPE_NORMAL
  zh: '■HOME + Æ: 选择列表中的第一个文件。'
- en: '■END + Æ: Select the last file in the list.'
  id: totrans-2598
  prefs: []
  type: TYPE_NORMAL
  zh: '■END + Æ: 选择列表中的最后一个文件。'
- en: '■RIGHT ARROW + Æ: Expands a list, then selects a subentry in the list each
    time you press it.'
  id: totrans-2599
  prefs: []
  type: TYPE_NORMAL
  zh: '■RIGHT ARROW + Æ: 展开列表，然后每次按它时选择列表中的子条目。'
- en: '■LEFT ARROW + Æ: Selects a subentry in the list, then moves up the list each
    time you press it until the subentry list collapses into a folder.'
  id: totrans-2600
  prefs: []
  type: TYPE_NORMAL
  zh: ■向左箭头 + Æ：选择列表中的一个子条目，然后每次按它时都会向上移动列表，直到子条目列表折叠成一个文件夹。
- en: '■UP ARROW + Æ: Moves up the list one entry at a time.'
  id: totrans-2601
  prefs: []
  type: TYPE_NORMAL
  zh: ■向上箭头 + Æ：每次移动列表中的一个条目。
- en: '■DOWN ARROW + Æ: Moves down the list one entry at a time.'
  id: totrans-2602
  prefs: []
  type: TYPE_NORMAL
  zh: ■向下箭头 + Æ：每次移动列表中的一个条目。
- en: Inserting Modules
  id: totrans-2603
  prefs: []
  type: TYPE_NORMAL
  zh: 插入模块
- en: To insert a module, follow the steps below.
  id: totrans-2604
  prefs: []
  type: TYPE_NORMAL
  zh: 要插入一个模块，请按照以下步骤操作。
- en: 1. Select the book in which you want to store your procedures, as shown in [Figure
    16.4](#fig16-4) (1).
  id: totrans-2605
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 选择你想要存储你的过程的书籍，如图 16.4 [Figure 16.4](#fig16-4) 所示（1）。
- en: 2. Select Insert menu, then select Module, as shown in [Figure 16.4](#fig16-4)
    (2).
  id: totrans-2606
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 选择插入菜单，然后选择模块，如图 16.4 [Figure 16.4](#fig16-4) 所示（2）。
- en: 3. Module1 is added. You can change the name through the property window, as
    shown in [Figure 16.4](#fig16-4) (3).
  id: totrans-2607
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 模块1已添加。你可以通过属性窗口更改其名称，如图 16.4 [Figure 16.4](#fig16-4) 所示（3）。
- en: Refer to [Figure 16.4](#fig16-4).
  id: totrans-2608
  prefs: []
  type: TYPE_NORMAL
  zh: 参考图 16.4 [Figure 16.4](#fig16-4)。
- en: '![image](image/Figure_16.4.jpg)'
  id: totrans-2609
  prefs: []
  type: TYPE_IMG
  zh: '![image](image/Figure_16.4.jpg)'
- en: Figure 16.4 Inserting Modules
  id: totrans-2610
  prefs: []
  type: TYPE_NORMAL
  zh: 图 16.4 插入模块
- en: Writing Code Inside Modules
  id: totrans-2611
  prefs: []
  type: TYPE_NORMAL
  zh: 模块内编写代码
- en: 'To write code inside modules, follow these steps:'
  id: totrans-2612
  prefs: []
  type: TYPE_NORMAL
  zh: 要在模块中编写代码，请按照以下步骤操作：
- en: 1. Double-click the Module inside which you want to write your code for the
    procedures, as shown in [Figure 16.5](#fig16-5) (a).
  id: totrans-2613
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 双击你想要为这些过程编写代码的模块，如图 16.5 [Figure 16.5](#fig16-5) 所示（a）。
- en: 2. Write your code for the procedures, as shown in [Figure 16.5](#fig16-5) (b).
    Refer to [Figure 16.5](#fig16-5).
  id: totrans-2614
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 编写你的代码，如图 16.5 [Figure 16.5](#fig16-5) 所示（b）。参考图 16.5 [Figure 16.5](#fig16-5)。
- en: '![image](image/Figure_16.5.jpg)'
  id: totrans-2615
  prefs: []
  type: TYPE_IMG
  zh: '![image](image/Figure_16.5.jpg)'
- en: Figure 16.5 Writing Code Inside the Module
  id: totrans-2616
  prefs: []
  type: TYPE_NORMAL
  zh: 图 16.5 模块内编写代码
- en: Sub Procedure
  id: totrans-2617
  prefs: []
  type: TYPE_NORMAL
  zh: 子过程
- en: Sub procedure is a series of Visual Basic statements enclosed by the Sub and
    End Sub statements that perform actions but does not return a value.
  id: totrans-2618
  prefs: []
  type: TYPE_NORMAL
  zh: 子过程是一系列由子过程和结束子过程语句包围的 Visual Basic 语句，执行操作但不返回值。
- en: A Sub procedure can take arguments, such as constants, variables, or expressions
    that are passed by a calling procedure.
  id: totrans-2619
  prefs: []
  type: TYPE_NORMAL
  zh: 子过程可以接受参数，例如常量、变量或由调用过程传递的表达式。
- en: If a Sub procedure has no arguments, the Sub statement must include an empty
    set of parentheses.
  id: totrans-2620
  prefs: []
  type: TYPE_NORMAL
  zh: 如果子过程没有参数，子过程语句必须包含一个空的括号集合。
- en: Macro
  id: totrans-2621
  prefs: []
  type: TYPE_NORMAL
  zh: 宏
- en: 'The macro is as follows:'
  id: totrans-2622
  prefs: []
  type: TYPE_NORMAL
  zh: 该宏如下：
- en: Sub HelloWorld()
  id: totrans-2623
  prefs: []
  type: TYPE_NORMAL
  zh: Sub HelloWorld()
- en: MsgBOx "Hello World"
  id: totrans-2624
  prefs: []
  type: TYPE_NORMAL
  zh: 消息框 "Hello World"
- en: End Sub
  id: totrans-2625
  prefs: []
  type: TYPE_NORMAL
  zh: 结束子过程
- en: '[Figure 16.6](#fig16-6) features a macro.'
  id: totrans-2626
  prefs: []
  type: TYPE_NORMAL
  zh: '[Figure 16.6](#fig16-6) 包含一个宏。'
- en: '![image](image/Figure_16.6.jpg)'
  id: totrans-2627
  prefs: []
  type: TYPE_IMG
  zh: '![image](image/Figure_16.6.jpg)'
- en: Figure 16.6 Macro
  id: totrans-2628
  prefs: []
  type: TYPE_NORMAL
  zh: 图 16.6 宏
- en: Function Procedure
  id: totrans-2629
  prefs: []
  type: TYPE_NORMAL
  zh: 函数过程
- en: A Function procedure is a series of Visual Basic statements enclosed by the
    Function and End Function statements.
  id: totrans-2630
  prefs: []
  type: TYPE_NORMAL
  zh: 函数过程是一系列由函数和结束函数语句包围的 Visual Basic 语句。
- en: A Function procedure is similar to a Sub procedure, but a function can also
    return a value. A Function procedure can take arguments that are passed to it
    by a calling procedure.
  id: totrans-2631
  prefs: []
  type: TYPE_NORMAL
  zh: 函数过程类似于子过程，但函数还可以返回一个值。函数过程可以接受由调用过程传递给它的参数。
- en: If a Function procedure has no arguments, its Function statement must include
    an empty set of parentheses. A function returns a value by assigning a value to
    its name in one or more statements of the procedure.
  id: totrans-2632
  prefs: []
  type: TYPE_NORMAL
  zh: 如果一个函数过程没有参数，它的函数声明必须包含一个空的括号集合。一个函数通过在过程的一个或多个语句中将值赋给其名称来返回一个值。
- en: 'For example:'
  id: totrans-2633
  prefs: []
  type: TYPE_NORMAL
  zh: 例如：
- en: Function Celsius (fDegrees)
  id: totrans-2634
  prefs: []
  type: TYPE_NORMAL
  zh: 函数 Celsius (fDegrees)
- en: Celsius = (fDegrees - 32) * 5 / 9
  id: totrans-2635
  prefs: []
  type: TYPE_NORMAL
  zh: 摄氏度 = (华氏度 - 32) * 5 / 9
- en: End Function
  id: totrans-2636
  prefs: []
  type: TYPE_NORMAL
  zh: 结束函数
- en: Refer to [Figure 16.7](#fig16-7).
  id: totrans-2637
  prefs: []
  type: TYPE_NORMAL
  zh: 参考图 16.7 [Figure 16.7](#fig16-7)。
- en: '![image](image/Figure_16.7.jpg)'
  id: totrans-2638
  prefs: []
  type: TYPE_IMG
  zh: '![image](image/Figure_16.7.jpg)'
- en: Figure 16.7 User-Defined Function
  id: totrans-2639
  prefs: []
  type: TYPE_NORMAL
  zh: 图 16.7 用户定义函数
- en: Syntax to Write Functions
  id: totrans-2640
  prefs: []
  type: TYPE_NORMAL
  zh: 写函数的语法
- en: Note Arguments are the inputs you want from the end user to calculate the result.
  id: totrans-2641
  prefs: []
  type: TYPE_NORMAL
  zh: 注意：参数是你希望从最终用户那里获取的输入，以计算结果。
- en: Function name_of_function( argument1 , argument2 , …)
  id: totrans-2642
  prefs: []
  type: TYPE_NORMAL
  zh: 函数 name_of_function(参数1, 参数2, …)
- en: processing the arguments name_of_function
  id: totrans-2643
  prefs: []
  type: TYPE_NORMAL
  zh: 处理参数 name_of_function
- en: = Result
  id: totrans-2644
  prefs: []
  type: TYPE_NORMAL
  zh: = 结果
- en: End Function
  id: totrans-2645
  prefs: []
  type: TYPE_NORMAL
  zh: 结束函数
- en: Both procedures may or may not have arguments.
  id: totrans-2646
  prefs: []
  type: TYPE_NORMAL
  zh: 这两个过程可能都有参数，也可能没有。
- en: 'Passing by Value Æ: If you pass an argument by value, the called procedure
    receives only a copy of the variable passed from the calling procedure. If the
    called procedure changes the value, the change affects only the copy and not the
    variable in the calling procedure.'
  id: totrans-2647
  prefs: []
  type: TYPE_NORMAL
  zh: 按值传递 Æ：如果你按值传递一个参数，被调用的过程只接收从调用过程传递过来的变量的一个副本。如果被调用的过程改变了值，这个改变只会影响副本，而不会影响调用过程中的变量。
- en: 'Passing by Reference Æ: If you pass an argument by reference when calling a
    procedure, the procedure has access to the actual variable in memory. As a result,
    the variable’s value can be changed by the procedure. By default, arguments are
    by reference.'
  id: totrans-2648
  prefs: []
  type: TYPE_NORMAL
  zh: '通过引用传递参数 Æ: 如果在调用过程时通过引用传递参数，则过程可以访问内存中的实际变量。因此，变量的值可以通过过程进行更改。默认情况下，参数是通过引用传递的。'
- en: Scenario 9
  id: totrans-2649
  prefs: []
  type: TYPE_NORMAL
  zh: 场景 9
- en: 'Write a function to calculate Profit where profit is the difference of Selling
    price and Cost price. The Profit function requires two arguments: cost price and
    selling price.'
  id: totrans-2650
  prefs: []
  type: TYPE_NORMAL
  zh: 编写一个根据销售价格和成本价格计算利润的函数。利润函数需要两个参数：成本价格和销售价格。
- en: Function Profit(CP, SP)
  id: totrans-2651
  prefs: []
  type: TYPE_NORMAL
  zh: Function Profit(CP, SP)
- en: Profit = SP - CP
  id: totrans-2652
  prefs: []
  type: TYPE_NORMAL
  zh: Profit = SP - CP
- en: End Function
  id: totrans-2653
  prefs: []
  type: TYPE_NORMAL
  zh: End Function
- en: Refer to Training File5.xls.
  id: totrans-2654
  prefs: []
  type: TYPE_NORMAL
  zh: 参考培训文件5.xls。
- en: Branching a Procedure
  id: totrans-2655
  prefs: []
  type: TYPE_NORMAL
  zh: 分支过程
- en: If you want to run a block of code depending on the value of a condition, you
    can use the following decision structures.
  id: totrans-2656
  prefs: []
  type: TYPE_NORMAL
  zh: 如果要根据条件的值运行代码块，可以使用以下决策结构。
- en: ■¾ If...Then...Endif
  id: totrans-2657
  prefs: []
  type: TYPE_NORMAL
  zh: ■¾ If...Then...Endif
- en: ■¾ If...Then...Else…Endif
  id: totrans-2658
  prefs: []
  type: TYPE_NORMAL
  zh: ■¾ If...Then...Else…Endif
- en: ■¾ If...Then...Elseif…Then…Else…Endif
  id: totrans-2659
  prefs: []
  type: TYPE_NORMAL
  zh: ■¾ If...Then...Elseif…Then…Else…Endif
- en: ■¾ Select Case …End Select
  id: totrans-2660
  prefs: []
  type: TYPE_NORMAL
  zh: ■¾ Select Case …End Select
- en: Use If…Then...Endif
  id: totrans-2661
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 If…Then...Endif
- en: A single condition that runs a single statement or a block of statements.
  id: totrans-2662
  prefs: []
  type: TYPE_NORMAL
  zh: 单个条件运行一个语句或一组语句。
- en: Use If...Then...Else…Endif
  id: totrans-2663
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 If...Then...Else…Endif
- en: A single condition that runs two different statements or a block of statements,
    depending on the result of the condition.
  id: totrans-2664
  prefs: []
  type: TYPE_NORMAL
  zh: 单个条件运行两个不同的语句或一组语句，具体取决于条件的结果。
- en: Use If...Then...Elseif…Then…Else…Endif OR Select Case… End
  id: totrans-2665
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 If...Then...Elseif…Then…Else…Endif OR Select Case… End
- en: This structure selects more than one condition and runs one of several statement
    blocks.
  id: totrans-2666
  prefs: []
  type: TYPE_NORMAL
  zh: 这种结构选择多个条件并运行几个语句块中的一个。
- en: Scenario 10
  id: totrans-2667
  prefs: []
  type: TYPE_NORMAL
  zh: 场景 10
- en: Write a function to check whether a person is eligible to vote or not. To check
    eligibility, the Vote function requires age as an argument.
  id: totrans-2668
  prefs: []
  type: TYPE_NORMAL
  zh: 编写一个检查一个人是否有资格投票的函数。要检查资格，Vote函数需要年龄作为参数。
- en: Function Vote(Age)
  id: totrans-2669
  prefs: []
  type: TYPE_NORMAL
  zh: Function Vote(Age)
- en: If Age >= 18 Then
  id: totrans-2670
  prefs: []
  type: TYPE_NORMAL
  zh: If Age >= 18 Then
- en: Vote = "Eligible"
  id: totrans-2671
  prefs: []
  type: TYPE_NORMAL
  zh: Vote = "Eligible"
- en: Else
  id: totrans-2672
  prefs: []
  type: TYPE_NORMAL
  zh: Else
- en: Vote = "not eligible"
  id: totrans-2673
  prefs: []
  type: TYPE_NORMAL
  zh: Vote = "not eligible"
- en: EndIf
  id: totrans-2674
  prefs: []
  type: TYPE_NORMAL
  zh: EndIf
