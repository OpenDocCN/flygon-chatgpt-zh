- en: About the author
  id: totrans-33
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 关于作者
- en: '**Adrian Thompson**, a leading expert in **Conversational AI** (**CAI**), has
    been at the forefront of building chatbots and voice assistants since 2018\. As
    the founder of The Bot Forge, he established a pioneering consultancy service
    recognized for its cutting-edge innovations in CAI. Adrian’s expertise spans the
    latest **large language models** (**LLMs**), such as ChatGPT and Google Gemini.
    A versatile programmer and prompt engineer, he is adept in the LLM landscape and
    related technologies. At loveholidays, Adrian enhances customer experiences by
    developing advanced CAI systems. He is passionate about the latest advancements
    in CAI and is renowned for his proficiency in conversation design, AI development,
    and strategic consultancy across various industries.'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: '**Adrian Thompson**是**对话式人工智能**（CAI）领域的领先专家，自2018年以来一直处于构建聊天机器人和语音助手的最前沿。作为The
    Bot Forge的创始人，他建立了一家以CAI的尖端创新而闻名的先驱咨询服务。Adrian的专长涵盖了最新的**大型语言模型**（LLMs），如ChatGPT和Google
    Gemini。作为一名多才多艺的程序员和提示工程师，他在LLM领域和相关技术方面非常熟练。在loveholidays，Adrian通过开发先进的CAI系统来提升客户体验。他对CAI的最新进展充满热情，以其在对话设计、AI开发和跨行业战略咨询方面的专业能力而闻名。'
- en: '*I would like to first and foremost thank my loving and patient wife, kids,
    friends, and family for their continued support, patience, and encouragement throughout
    the long process of writing this book. Thanks also to the Conversational AI team
    at loveholidays for listening to my ideas and the many interesting people I spoke
    to during my days building up The Bot Forge who provided inspiration* *and encouragement.*'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 我首先要感谢我的爱人和耐心、孩子们、朋友们和家人，感谢他们在撰写这本书的漫长过程中给予的支持、耐心和鼓励。还要感谢loveholidays的对话式人工智能团队倾听我的想法，以及在我建立The
    Bot Forge的日子里与我交谈的许多有趣的人，他们提供了灵感和鼓励。
- en: About the reviewers
  id: totrans-36
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 关于审稿人
- en: '**Krishnan Raghavan** is an IT professional with over 20 years of experience
    in the areas of software development and delivery excellence across multiple domains
    and technologies, ranging from C++ to Java, Python, Angular, Golang, and data
    warehousing.'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: '**Krishnan Raghavan**是一位拥有超过20年经验的IT专业人士，在软件开发和交付卓越的多个领域和技术方面拥有经验，从C++到Java、Python、Angular、Golang以及数据仓库。'
- en: When not working, Krishnan likes to spend time with his wife and daughter, as
    well as reading fiction and nonfiction as well as technical books and participating
    in hackathons. Krishnan tries to give back to the community by being part of the
    GDG – Pune Volunteer Group.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 当Krishnan不工作的时候，他喜欢和妻子以及女儿共度时光，同时阅读小说、非小说以及技术书籍，并参与黑客马拉松。Krishnan通过成为GDG – Pune志愿者小组的一员，试图回馈社区。
- en: You can connect with Krishnan at [mailtokrishnan@gmail.com](mailto:mailtokrishnan@gmail.com) or
    via LinkedIn: [www.linkedin.com/in/krishnan-Raghavan](http://www.linkedin.com/in/krishnan-Raghavan).
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以通过[mailtokrishnan@gmail.com](mailto:mailtokrishnan@gmail.com)或LinkedIn：[www.linkedin.com/in/krishnan-Raghavan](http://www.linkedin.com/in/krishnan-Raghavan)与Krishnan取得联系。
- en: '*I would like to thank my wife, Anita, and daughter, Ananya, for giving me
    the time and space to review* *this book.*'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 我要感谢我的妻子Anita和女儿Ananya，感谢她们给予我时间与空间来审阅这本书。
- en: '**Manoj Palaniswamy** is a senior technical staff member at Kyndryl and plays
    a technical leadership role within the application, data, and AI practice. He
    has been working in the IT industry for more than 17 years, and his domain expertise
    includes enterprise AI strategy, data management, AIOps, MLOps, AI platform engineering,
    and hybrid cloud IT infrastructure and analytics. He has led many cross-cultural
    technical teams across the globe on complex technical projects and closely works
    with clients to translate their business requirements into technical solutions.
    Manoj holds two patents in the area of machine learning and workload optimization
    on VMs.'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: '**Manoj Palaniswamy**是Kyndryl的高级技术员工，在应用、数据和AI实践中扮演着技术领导角色。他已在IT行业工作超过17年，其专业领域包括企业AI战略、数据管理、AIOps、MLOps、AI平台工程以及混合云IT基础设施和分析。他领导了全球多个跨文化技术团队在复杂技术项目中的工作，并与客户紧密合作，将他们的业务需求转化为技术解决方案。Manoj在机器学习和虚拟机工作负载优化领域拥有两项专利。'
