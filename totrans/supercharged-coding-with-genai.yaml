- en: Learning how request costs are calculated
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Since OpenAI API is primarily a paid service, it is essential to understand
    and anticipate the costs associated with each request.
  prefs: []
  type: TYPE_NORMAL
- en: Before proceeding with the lab exercises, it is strongly recommended that you
    add credits to your OpenAI platform account. An initial charge of $5 in credits
    should be more than enough to complete all the labs in this book. Loading credits
    will also upgrade your account from Free tier usage (with no prior credits) to
    a Tier 1 account, significantly increasing your rate and usage limits, as we will
    discuss later in this chapter.
  prefs: []
  type: TYPE_NORMAL
- en: To load credits, open the OpenAI **Billing Overview** page at [https://platform.openai.com/settings/organization/billing/overview](https://platform.openai.com/settings/organization/billing/overview)
    and add a payment method with a minimum charge of $5.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 2.4: Remaining credit balance](../Images/B31534_02_4.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 2.4: Remaining credit balance'
  prefs: []
  type: TYPE_NORMAL
- en: You can also check your remaining balance at any time by visiting the same link.
  prefs: []
