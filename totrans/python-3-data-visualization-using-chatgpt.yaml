- en: '[PRE47]'
  prefs: []
  type: TYPE_PRE
- en: '**The chr() Function**'
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: The chr() function takes a positive integer as a parameter and converts it to
    its corresponding alphabetic value (if one exists). The letters A through Z have
    decimal representation of 65 through 91 (which corresponds to hexadecimal 41 through
    5b), and the lowercase letters a through z have decimal representation 97 through
    122 (hexadecimal 61 through 7b).
  prefs: []
  type: TYPE_NORMAL
- en: 'Here is an example of using the chr() function to print uppercase A:'
  prefs: []
  type: TYPE_NORMAL
