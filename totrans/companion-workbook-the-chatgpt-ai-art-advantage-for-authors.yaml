- en: INTRODUCTION
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: '**Welcome, Author!**'
  prefs: []
  type: TYPE_NORMAL
- en: If you've read "The ChatGPT AI Art Advantage for Authors," you know that creating
    compelling visuals for your book marketing doesn't have to be daunting or expensive,
    even if you feel graphically challenged. That book laid the foundation, showing
    you the incredible potential of using tools like ChatGPT 4o to bring your visual
    ideas to life.
  prefs: []
  type: TYPE_NORMAL
- en: Now, it's time to put that knowledge into practice! This companion workbook
    is your hands-on guide, taking you step-by-step through the process of creating
    stunning marketing visuals specifically for your books. Think of it as the practical
    application lab for the concepts you learned.
  prefs: []
  type: TYPE_NORMAL
- en: '**Workbook Goals**'
  prefs: []
  type: TYPE_NORMAL
- en: 'Our goals in this workbook are simple but powerful:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Build Confidence:** Move from understanding AI art concepts to confidently
    generating your own visuals.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Develop Practical Skills:** Master the art of prompting, refining images,
    and applying AI to specific marketing needs like social media graphics and cover
    concepts.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Create Tangible Assets:** By the end of this workbook (and especially if
    you join the live challenge!), you''ll have a portfolio of usable marketing visuals
    tailored to your book.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Save Time & Money:** Learn to leverage AI efficiently, freeing up resources
    for what you do best – writing.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**How to Use This Workbook**'
  prefs: []
  type: TYPE_NORMAL
- en: This workbook is flexible. You can work through it at your own pace, applying
    the exercises directly to your current book project.
  prefs: []
  type: TYPE_NORMAL
- en: It's also specifically designed to accompany the book, **“** [The ChatGPT AI
    Art Advantage for Authors](https://alsoby.me/r/amazon/B0FB1WY5PW?fc=au&ds=1) **”**
    . If you're participating in the challenge, each module corresponds to a day's
    focus, and the exercises will be central to our live sessions and activities.
    Look for the "Challenge Activity Prep" notes within the exercises!
  prefs: []
  type: TYPE_NORMAL
- en: '**Connecting to the Book**'
  prefs: []
  type: TYPE_NORMAL
- en: This workbook directly builds upon "[The ChatGPT AI Art Advantage for Authors](https://alsoby.me/r/amazon/B0FB1WY5PW?fc=au&ds=1)
    ." We'll frequently reference concepts, examples, and chapters from the book.
    Having the original book handy will enrich your experience, but the core exercises
    here are designed to be actionable on their own, assuming you grasp the fundamentals
    covered in the book.
  prefs: []
  type: TYPE_NORMAL
- en: '**Tools Needed**'
  prefs: []
  type: TYPE_NORMAL
- en: 'To make the most of this workbook, you''ll need:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Access to ChatGPT 4o:** Ensure you have an account (free or paid) and are
    comfortable with the basic interface.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**A Web Browser:** For accessing ChatGPT.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**This Workbook:** Either the digital version (which you might be able to fill
    directly) or the print version (with plenty of space for your notes and ideas).'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**(Recommended) Your Copy of "The ChatGPT AI Art Advantage for Authors":**
    For easy reference.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Ready to transform your author marketing with visuals you create yourself? Let's
    dive in!
  prefs: []
  type: TYPE_NORMAL
- en: '[You can also follow along on the online challenge!](https://susanjagannath.gumroad.com/l/TCA-1)'
  prefs: []
  type: TYPE_NORMAL
- en: '![](Image00002.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 1 VISUAL STRATEGY & MINDSET FOR AUTHORS
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: This module helps do the basic groundwork before you dive into AI image creation.
    We'll connect the core message of your book, as discussed in "The ChatGPT AI Art
    Advantage for Authors," to visual concepts and understand your target audience's
    visual preferences.
  prefs: []
  type: TYPE_NORMAL
- en: Get the printed version of this workbook here.
  prefs: []
  type: TYPE_NORMAL
- en: 'EXERCISE 1.1: DEFINING YOUR BOOK''S CORE MESSAGE FOR VISUAL TRANSLATION'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '**Objective:** To state the central theme or promise of your book into keywords
    and concepts that you can use to guide your visual creation.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Reference:** Think back to the Preface and Chapter 1 of "The ChatGPT AI Art
    Advantage for Authors." Why did you write your book? What is the single most important
    takeaway you want readers to have?'
  prefs: []
  type: TYPE_NORMAL
- en: '**Do this:**'
  prefs: []
  type: TYPE_NORMAL
- en: '**Summarise Your Book''s Core Message:** In one or two sentences, what is the
    essence of your book? What problem does it solve, or what transformation does
    it offer? *Your Answer:*'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Identify Key Themes/Concepts:** List 3 main themes, ideas, or concepts explored
    in your book.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Theme 1:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Theme 2:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Theme 3:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Brainstorm Visual Keywords:** For each theme above, brainstorm 5-10 keywords
    or short phrases that represent it visually. Think about objects, actions, emotions,
    settings, and symbols.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Theme 1 Keywords:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Theme 2 Keywords:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Theme 3 Keywords:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Identify the Core Emotion:** What is the primary emotion you want your book''s
    visuals to evoke (e.g., empowerment, curiosity, relief, excitement, calm, urgency)?
    *Your Answer:*'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Challenge Activity Prep:** Keep this list handy! These keywords and the core
    emotion will be the starting point for your first AI image prompts in Module 2.'
  prefs: []
  type: TYPE_NORMAL
- en: 'EXERCISE 1.2: WHAT YOUR AUDIENCE LIKES'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '**Objective:** To understand the visual styles and preferences of your ideal
    reader, helping you create marketing materials they''ll connect with.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Do this:**'
  prefs: []
  type: TYPE_NORMAL
- en: '**Describe Your Ideal Reader:** Briefly describe your target reader (age, interests,
    challenges, aspirations). Who are they? *Your Answer:*'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Where Do They Hang Out Online?** List the social media platforms, websites,
    or online communities your ideal reader frequents. *Your Answer:*'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**What Visuals do they love:** Think about the types of images, colors, and
    styles prevalent in the online spaces you listed above. What seems to capture
    their attention?'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Image Types (e.g., photos, illustrations, memes, infographics):'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Color Palettes (e.g., bright, muted,
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: professional)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Overall Style (e.g., modern, vintage, minimalist, bold, artistic):'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**What Visuals are Turn-offs:** Are there any visual styles or types of imagery
    that might alienate your ideal reader? *Your Answer:*'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Visual Preference Summary:** Based on the above, summarize the likely visual
    preferences of your target audience in a few sentences. What kind of look and
    feel should your marketing visuals aim for? *Your Answer:*'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Challenge Activity Prep:** Understanding your audience''s visual language
    helps you tailor your AI prompts for maximum impact. Consider these preferences
    when crafting prompts in later modules.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](Image00003.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 2 MASTERING THE PROMPTING CONVERSATION
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: This module focuses on translating your visual ideas into effective prompts
    for ChatGPT 4o, building on the techniques discussed in Chapters 2 and 3 of "The
    ChatGPT AI Art Advantage for Authors."
  prefs: []
  type: TYPE_NORMAL
- en: 'EXERCISE 2.1: ANALYZING PROMPTS FROM THE BOOK'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '**Objective:** To deconstruct the example prompts provided in the book to understand
    the function of each component.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Reference:** Revisit the prompt examples in Chapter 3 of the book (e.g.,
    the senior author, the weight loss walker, the ebook cover).'
  prefs: []
  type: TYPE_NORMAL
- en: '**Instructions:** Choose one of the detailed prompts from Chapter 3.'
  prefs: []
  type: TYPE_NORMAL
- en: Break it down into its core components using the structure mentioned in the
    book (or identify the key elements yourself).
  prefs: []
  type: TYPE_NORMAL
- en: '**Selected Prompt from Book:**'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Prompt Breakdown:**'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Subject(s):'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Action(s):'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Setting/Background:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Key Objects:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Emotion/Mood:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Style/Artistic Direction:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Lighting/Atmosphere:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Camera Angle/Composition (if specified):'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Other Details:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Reflection:** What makes this prompt effective? How does each component contribute
    to the final image described in the book?'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'EXERCISE 2.2: CRAFTING BASIC PROMPTS FOR THE THEMES OF YOUR OWN BOOK'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '**Objective:** To practice writing initial prompts based on the keywords and
    core message identified in Module 1.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Reference:** Use your answers from Exercise 1.1 (Core Message & Keywords)
    and the prompt structure discussed in Chapter 3 of the book.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Instructions:**'
  prefs: []
  type: TYPE_NORMAL
- en: '**Select a Core Theme:** Choose one of the key themes you identified for your
    book in Exercise 1.1\. *Selected Theme:*'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Select Keywords:** Pick 3-5 relevant visual keywords you brainstormed for
    this theme. *Keywords:*'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Draft a Basic Prompt:** Combine your keywords with essential elements (subject,
    action, setting) to create a simple, clear prompt for ChatGPT 4o. Aim for a descriptive
    sentence. *Initial Prompt Draft:*'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Generate the Image:** Input your prompt into ChatGPT 4o. *(Optional: Paste
    or describe the resulting image here)*'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Repeat:** Draft basic prompts for at least two other themes/keyword sets
    from Exercise 1.1.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Challenge Activity Prep:** Bring your drafted prompts and generated images
    (if any) to the Prompt Crafting Workshop.'
  prefs: []
  type: TYPE_NORMAL
- en: 'EXERCISE 2.3: EXPERIMENTING WITH STYLE KEYWORDS'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '**Objective:** To explore how adding style keywords can dramatically change
    the look and feel of an AI-generated image.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Reference:** Consider the different visual styles possible (*photorealistic,
    illustration, watercolor, cartoon, minimalist, vintage* ,).'
  prefs: []
  type: TYPE_NORMAL
- en: '**Instructions:**'
  prefs: []
  type: TYPE_NORMAL
- en: '**Choose a Basic Prompt:** Select one of the prompts you drafted in Exercise
    2.2 (or use a simple new one like "A cat sitting on a stack of books"). *Base
    Prompt:*'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Generate Base Image:** Input the base prompt into ChatGPT 4o. *(Optional:
    Note the result)*'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Add Style Keywords:** Generate new images by adding different style keywords
    to your base prompt. Try at least 3 different styles.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Prompt + Style 1 (e.g., "... in a photorealistic style"):'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Prompt + Style 2 (e.g., "... as a watercolor illustration"):'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Prompt + Style 3 (e.g., "... in a vintage cartoon style"):'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Observe the Differences:** How did the style keywords change the output?
    Which styles might be suitable for your author brand and target audience (refer
    back to Exercise 1.2)?'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Challenge Activity Prep:** Understanding style keywords is crucial for controlling
    the aesthetic of your visuals.'
  prefs: []
  type: TYPE_NORMAL
- en: Which styles worked best for your prompts?
  prefs: []
  type: TYPE_NORMAL
