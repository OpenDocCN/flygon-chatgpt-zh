    ****ea**ch** ****no**de** (****li**ke** ****a**** ****ne**uro**n ****i**n** ****t**he**
    ****hu**man** ****br**ain**) ****he**lps** ****t**he** ****mo**del** ****le**arn**
    ****relat**ionshi**ps ****bet**wee**n ****wo**rds** ****a**nd** ****phr**ase**s.'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: '****ChatGP**T****的“**大脑**”由一些称为**神经网络**的东西组成。想象一个由连接组成的网络，其中每个节点（就像人脑中的神经元）帮助模型学习单词和短语之间的关系。'
- en: '****Ev**ery** ****ti**me** ****Cha**tGP**T ****tr**ain**s ****o**n** ****a****
    ****n**ew** ****pi**ece** ****o**f** ****te**xt**, ****i**t** ****stre**ngthen**s
    ****t**he** “****conn**ection**s” ****bet**wee**n ****to**ken**s, ****impr**ovin**g
    ****i**ts** ****abi**lit**y ****t**o** ****pre**dic**t ****wh**at** ****ma**kes**
    ****se**nse** ****i**n** ****a**ny** ****gi**ven** ****con**tex**t. ****Ov**er**
    ****ti**me**, ****th**is** ****net**wor**k ****le**arn**s ****t**o** ****reco**gniz**e
    ****th**ing**s ****li**ke** ****to**ne**, ****stru**ctur**e, ****a**nd** ****ev**en**
    ****con**tex**t ****cl**ues**.'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: '****每次ChatGP**T**在新的文本片段上进行训练时，它都会加强标记之间的“**连接**”，提高其在任何给定上下文中预测什么有意义的能力。随着时间的推移，这个网络学会识别诸如语调、结构和甚至上下文线索之类的东西。'
