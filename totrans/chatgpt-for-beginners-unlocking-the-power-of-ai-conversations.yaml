  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 如果初始响应不符合你的期望，请**细化**你的输入或提出后续问题。例如，如果生成的故事大纲感觉过于笼统，请要求一个包含更多具体细节或独特转折的版本。
