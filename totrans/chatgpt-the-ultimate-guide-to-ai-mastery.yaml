  id: totrans-231
  prefs: []
  type: TYPE_NORMAL
  zh: 13. 电子邮件营销自动化 – AI驱动的拓展 13.1 AI驱动的电子邮件营销
- en: 'AI is revolutionizing email marketing through:'
  id: totrans-232
