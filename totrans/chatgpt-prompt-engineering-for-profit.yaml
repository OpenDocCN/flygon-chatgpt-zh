  zh: '**角色反转提示**与**角色扮演**不同，尽管两者都涉及LLM承担一个角色。在角色扮演中，模型承担一个特定的角色来模拟一个交互或以定义好的声音说话。在角色反转中，焦点在于反转视角以更广泛地看待一个问题并探索不同的含义。'
