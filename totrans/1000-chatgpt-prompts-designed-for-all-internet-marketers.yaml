- en: '📄 Writing an Order Bump Copy :'
  id: totrans-516
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 📄 撰写订单提升文案：
- en: 'FILL-IN-THE-BLANK PROMPTS:'
  id: totrans-517
  prefs: []
  type: TYPE_NORMAL
  zh: '**填空提示**：'
- en: • Our [product or service] is the perfect solution for [pain point] thatmany
    of our customers are facing. It offers [benefit 1], [benefit 2], and [benefit
    3] that make it a musthave for [target audience X]. Please write a 100 word text
    that highlights the product/service and encourages customers to take action (use
    urgency).
  id: totrans-518
  prefs: []
  type: TYPE_NORMAL
  zh: • 我们的产品[产品或服务]是解决许多客户面临[痛点]的完美解决方案。它提供了[好处1]、[好处2]和[好处3]，使其成为[目标受众X]的必备品。请撰写一个100字的文案，突出产品/服务并鼓励客户采取行动（使用紧迫感）。
- en: '• Write 3 versions of a 200 word text that compels potential customers to buy
    a [type of product] with these benefits:'
  id: totrans-519
  prefs: []
  type: TYPE_NORMAL
  zh: • 撰写3个200字的文案版本，以这些好处说服潜在客户购买[产品类型]：
- en: • [Benefit 1]
  id: totrans-520
  prefs: []
  type: TYPE_NORMAL
  zh: • [好处1]
- en: • [Benefit 2]
  id: totrans-521
  prefs: []
  type: TYPE_NORMAL
  zh: • [好处2]
- en: • [Benefit 3]
  id: totrans-522
  prefs: []
  type: TYPE_NORMAL
  zh: • [好处3]
- en: • Make sure to emphasize that this is the only chance to get this product at
    [price point], and include a call to action that says [call to action].
  id: totrans-523
  prefs: []
  type: TYPE_NORMAL
  zh: • 确保强调这是获得此产品[价格点]的唯一机会，并包括一个呼吁行动的语句，即[呼吁行动]。
- en: • Write a short landing page that offers [product] to [market]. Mention it is
    the only time they will see this product with a [percentage]% discount.
  id: totrans-524
  prefs: []
  type: TYPE_NORMAL
  zh: • 撰写一个简短的着陆页，提供[产品]给[市场]。提及这是他们唯一一次以[百分比]%折扣看到这个产品。
- en: OPEN-ENDED PROMPTS**:**
  id: totrans-525
  prefs: []
  type: TYPE_NORMAL
  zh: '**开放式提示**：'
- en: • “Can you write sales copy for my new product, [product name], which is a [description
    of the product]? The target audience is [description of the ideal customer].”
  id: totrans-526
  prefs: []
  type: TYPE_NORMAL
  zh: • “我能为我即将推出的新产品[产品名称]，它是一款[产品描述]的产品撰写销售文案吗？目标受众是[理想客户的描述]。”
- en: • “I need sales copy for my online course on [course topic]. Can you write copy
    that speaks to [description of the target audience] and highlights the benefits
    of taking the course?”
  id: totrans-527
  prefs: []
  type: TYPE_NORMAL
  zh: • “我需要为我关于[课程主题]的在线课程撰写销售文案。你能写一些针对[目标受众描述]并突出课程好处的内容吗？”
- en: • “I'm launching a new line of [product category]. Can you write sales copy
    that appeals to [description of the target audience] and emphasizes the [unique
    selling point] of the products?”
  id: totrans-528
  prefs: []
  type: TYPE_NORMAL
  zh: • “我正在推出一款[产品类别]的新系列。你能写一些吸引[目标受众描述]并强调产品[独特卖点]的销售文案吗？”
- en: • “Can you write sales copy for my e-commerce website that sells [product category]?
    The target audience is [description of the ideal customer] who appreciate [unique
    selling point of the products].”
  id: totrans-529
  prefs: []
  type: TYPE_NORMAL
  zh: • “我能为我销售[产品类别]的电子商务网站撰写销售文案吗？目标受众是[理想客户描述]他们欣赏[产品的独特卖点]。”
- en: • “I need sales copy for my coaching services that help [target audience] achieve
    [goal]. Can you write copy that speaks to individuals who are [pain point of the
    target audience] and want to [desired outcome of the coaching services]?”
  id: totrans-530
  prefs: []
  type: TYPE_NORMAL
  zh: • “我需要为我的辅导服务撰写销售文案，这些服务帮助[目标受众]实现[目标]。你能写一些针对那些[目标受众的痛点]并希望[辅导服务期望结果]的人的文案吗？”
- en: • “I'm launching a new app that helps people manage their [problem area]. Can
    you write sales copy that speaks to individuals who are struggling with [problem
    area] and want to [desired outcome of the app]?”
  id: totrans-531
  prefs: []
  type: TYPE_NORMAL
  zh: • “我正在推出一款帮助人们管理他们[问题领域]的新应用程序。你能为那些在[问题领域]中挣扎并希望[应用程序期望结果]的人撰写销售文案吗？”
- en: • “Can you write sales copy for my new book on [book topic]? The target audience
    is [description of the ideal reader] who want to [desired outcome of the book].”
  id: totrans-532
  prefs: []
  type: TYPE_NORMAL
  zh: • “你能为我即将出版的新书[书籍主题]撰写销售文案吗？目标受众是[理想读者的描述]他们希望[书籍期望结果]。”
- en: • “I need sales copy for my travel agency that specializes in [type of tourism].
    Can you write copy that appeals to travelers who want to [desired outcome of the
    travel experience] and experience [unique selling point of the agency]?”
  id: totrans-533
  prefs: []
  type: TYPE_NORMAL
  zh: • “我需要为我的专注于[旅游类型]的旅行社撰写销售文案。你能写一些吸引那些想要[旅行体验期望结果]并体验[旅行社的独特卖点]的旅行者的文案吗？”
- en: • “Can you write sales copy for my online store that sells [product category]?
    The target audience is individuals who want to prioritize [value proposition of
    the products] and are passionate about [unique selling point of the products].”
  id: totrans-534
  prefs: []
  type: TYPE_NORMAL
  zh: • “你能为我销售[产品类别]的在线商店写销售文案吗？目标受众是那些希望优先考虑[产品价值主张]并对[产品独特卖点]充满热情的个人。”
- en: • “I'm launching a new service that helps [target audience] improve their [problem
    area]. Can you write sales copy that speaks to entrepreneurs who want to [desired
    outcome of the service] and stand out in a [description of the market]?”
  id: totrans-535
  prefs: []
  type: TYPE_NORMAL
  zh: • “我正在推出一项帮助[目标受众]改善[问题领域]的新服务。你能为那些希望[服务期望结果]并在[市场描述]中脱颖而出的企业家写销售文案吗？”
