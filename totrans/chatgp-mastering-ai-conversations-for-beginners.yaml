  zh: '**使用ChatGPT训练你的同理心能力的第一种方式**是扮演不同的“角色”，这些角色的视角是你想要练习从其观察事物的。这也被称为换位思考，这涉及到尝试想象自己“站在别人的鞋子里”，从一个特定的场景中看到他们的观点。换位思考被认为是发展成年人同理心（Dmitriev,
    2023）的最好方式。正如我们在第3章的“行为提示”中看到的那样，ChatGPT能够承担角色，就像你可以设计提示来告诉它这样做一样。模拟是AI游戏的名字，而ChatGPT并无不同。'
