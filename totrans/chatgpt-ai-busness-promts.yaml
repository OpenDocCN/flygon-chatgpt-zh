  type: TYPE_NORMAL
- en: Are you having trouble coming up with ideas for your next social media posts?
    Well, you might discover that AI prompts for social media are exactly what you
    need to fill that blank page with a slew of new ideas.
  prefs: []
  type: TYPE_NORMAL
- en: Artificial intelligence tools have taken the world by storm in recent months.
    And with good reason. Hours-long tasks are now completed in a matter of minutes.
  prefs: []
  type: TYPE_NORMAL
- en: You've probably seen the hype on social media. People are amazed by the results
    that AI tools can produce. However, there are numerous examples of AI completely
    missing the mark.
  prefs: []
  type: TYPE_NORMAL
- en: The distinction between "omg, that's amazing" and "omg, that's not right."
  prefs: []
  type: TYPE_NORMAL
- en: is typically a well-written prompt.
  prefs: []
  type: TYPE_NORMAL
- en: This chapter will teach you how to create AI prompts to fill your social media
    calendar with great ideas.
  prefs: []
  type: TYPE_NORMAL
- en: I'll provide you with 50 brand-specific prompts to get you started.
  prefs: []
  type: TYPE_NORMAL
- en: Let's get into it.
  prefs: []
  type: TYPE_NORMAL
