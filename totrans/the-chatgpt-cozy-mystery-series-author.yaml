  zh: 历史神秘（带有舒适感，设定在各个历史时期）
- en: 7\. Adventure and Travel
  id: totrans-329
  prefs: []
  type: TYPE_NORMAL
  zh: 7. 冒险和旅行
- en: Mystery & Detective (with a focus on travel and exploration)
  id: totrans-330
  prefs: []
  type: TYPE_NORMAL
  zh: 神秘与侦探（侧重于旅行和探索）
- en: Each of these themes and publishing categories offers a unique angle for storytelling
    within the cozy mystery genre. This allows writers to cater to specific interests
    while adhering to the conventions of coziness, community, and crime-solving.
  id: totrans-331
  prefs: []
  type: TYPE_NORMAL
  zh: 每个这些主题和出版类别都为舒适神秘体裁内的叙事提供了一个独特的角度。这允许作家满足特定兴趣，同时遵守舒适、社区和犯罪解决的传统。
- en: Combine multiple themes and categories to create a fresh spin on these very
    familiar cozy murder mystery storylines.
  id: totrans-332
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结合多个主题和类别，为这些非常熟悉的舒适谋杀神秘故事线创造一个全新的视角。
- en: Cozies can blend multiple themes. For instance, a contemporary cozy might also
    be set in a small town and feature a Christmas and animal theme.
  id: totrans-333
  prefs: []
  type: TYPE_NORMAL
  zh: 舒适可以融合多个主题。例如，一部当代舒适小说也可能设定在小镇，并具有圣诞节和动物主题。
- en: Young adult paranormal mysteries could be set in a haunted academy, while senior
    amateur detectives could investigate everything from crafts to dog walking, gardening,
    and holiday travel murder mysteries.
  id: totrans-334
  prefs: []
  type: TYPE_NORMAL
  zh: 青少年超自然神秘可能设定在闹鬼的学院，而资深业余侦探可以调查从手工艺到遛狗、园艺和假日旅行谋杀神秘的一切。
- en: Discoverability is crucial.
  id: totrans-335
  prefs: []
  type: TYPE_NORMAL
  zh: 可发现性至关重要。
- en: Publishers and authors often categorize their books under multiple subcategories
    to reach the broadest possible audience who might be interested in the various
    elements of the story.
  id: totrans-336
  prefs: []
  type: TYPE_NORMAL
  zh: 出版商和作者经常将他们的书籍归类于多个子类别，以触及可能对故事的各种元素感兴趣的最广泛的潜在读者。
- en: WORKED EXAMPLE. Crafts and Paranormal Story Idea
  id: totrans-337
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 工作示例。手工艺和超自然故事创意
- en: 'Category: Crafts and Hobbies Cozy Mystery. Amateur Sleuth. Woman Sleuth. Paranormal
    mystery.'
  id: totrans-338
  prefs: []
  type: TYPE_NORMAL
  zh: 类别：手工艺和爱好舒适神秘。业余侦探。女侦探。超自然神秘。
- en: 'Themes and Ideas:  Crafts and Hobbies. Knitting, Crocheting, and Quilting.
    Coastal and Beach Communities. Psychic and Supernatural Abilities'
  id: totrans-339
  prefs: []
  type: TYPE_NORMAL
  zh: 主题和想法：手工艺和爱好。编织、钩针和拼布。沿海和海滩社区。灵感和超自然能力
- en: What if? The sleuth is a young woman helping her psychic aunt run a knitting
    and craft store in a small seaside town.
  id: totrans-340
  prefs: []
  type: TYPE_NORMAL
  zh: 如果怎样？侦探是一位年轻女性，帮助她的灵媒阿姨在一个小海滨城镇经营一家编织和手工艺店。
- en: The murder mysteries are based around the inhabitants of this town.
  id: totrans-341
  prefs: []
  type: TYPE_NORMAL
  zh: 谋杀悬疑小说围绕这个城镇的居民展开。
- en: Decision Two. The Emotional Experience
  id: totrans-342
  prefs: []
  type: TYPE_NORMAL
  zh: 决策二：情感体验
- en: What emotional experience does this book promise to deliver?
  id: totrans-343
  prefs: []
  type: TYPE_NORMAL
  zh: 这本书承诺带给读者什么样的情感体验？
- en: '![A blue and white logo  Description automatically generated](image_rsrc42K.jpg)'
  id: totrans-344
  prefs: []
  type: TYPE_IMG
  zh: '![蓝色和白色的标志  自动生成的描述](image_rsrc42K.jpg)'
- en: When a reader scans your book cover and then reads the book description on,
    for example, an Amazon book page, what promise are you making to that reader?
  id: totrans-345
  prefs: []
  type: TYPE_NORMAL
  zh: 当读者浏览你的书籍封面，然后阅读例如亚马逊书籍页面上的书籍描述时，你在向那位读者许下什么承诺？
- en: What is the tone of the book?
  id: totrans-346
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 书的语气是什么？
- en: How do you feel when you read the book description?
  id: totrans-347
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你阅读书籍描述时有什么感觉？
- en: What kind of emotional buttons does this book idea press?
  id: totrans-348
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 这个书想法会触动哪些情感按钮？
- en: Overall, your story idea should take the reader on an optimistic and escapist
    emotional journey away from their everyday lives.
  id: totrans-349
  prefs: []
  type: TYPE_NORMAL
  zh: 总体而言，你的故事想法应该带领读者踏上一种乐观的逃避现实情感之旅。
- en: Write down the kind of emotional experience you want your ideal reader to take
    from this book.
  id: totrans-350
  prefs: []
  type: TYPE_NORMAL
  zh: 记下你希望你的理想读者从这本书中获得的情感体验。
- en: Knowing this in advance determines the voice of your manuscript, the title of
    the book, and the languages used in your book description.
  id: totrans-351
  prefs: []
  type: TYPE_NORMAL
  zh: 提前了解这一点决定了你的手稿的语气、书的标题以及你在书籍描述中使用的语言。
- en: For example, do you want this to be a fun, witty, high-energy book with quirky
    secondary characters?
  id: totrans-352
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，你希望这是一本有趣、机智、充满活力的书，拥有古怪的角色？
- en: Or do you prefer narrative-style traditional cozy mysteries that have some humor
    to lift the murder investigation but focus on the psychology of the characters
    and the details of the murder investigation?
  id: totrans-353
  prefs: []
  type: TYPE_NORMAL
  zh: 或者，你更喜欢叙事风格的经典轻松悬疑小说，其中有一些幽默来提升谋杀调查，但重点在于角色的心理和谋杀调查的细节？
- en: '![](image_rsrc42M.jpg)'
  id: totrans-354
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrc42M.jpg)'
- en: Please describe the kinds of emotional experiences that readers of cozy mystery
    fiction enjoy.
  id: totrans-355
  prefs: []
  type: TYPE_NORMAL
  zh: 请描述轻松悬疑小说读者所享受的情感体验类型。
- en: '![](image_rsrc42N.jpg)'
  id: totrans-356
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrc42N.jpg)'
- en: 'Readers of cozy mystery fiction often seek a unique blend of emotional experiences
    that can include:'
  id: totrans-357
  prefs: []
  type: TYPE_NORMAL
  zh: 轻松悬疑小说的读者通常寻求一种独特的情感体验混合，这可能包括：
- en: '1\. Comfort and Nostalgia: The genre is known as "cozy" for a reason; it often
    evokes a sense of comfort and warmth, akin to sitting by a fireplace with a cup
    of tea. There''s a nostalgic feel to these stories that harkens back to simpler
    times and small-town camaraderie.'
  id: totrans-358
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 舒适和怀旧：这个类型之所以被称为“轻松”，是有原因的；它往往唤起一种舒适和温暖的感觉，就像坐在壁炉边，手里拿着一杯茶。这些故事有一种怀旧的感觉，让人回忆起简单时代和小镇间的友谊。
- en: '2\. Curiosity and Intrigue: Despite the gentler pacing and lack of graphic
    content, cozies still deliver on the fundamental intrigue that mystery readers
    crave. The puzzles and secrets spark curiosity and keep readers engaged.'
  id: totrans-359
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 好奇和阴谋：尽管节奏较慢，内容不血腥，但轻松悬疑小说仍然满足了神秘小说读者对基本阴谋的渴望。谜题和秘密激发了好奇心，并保持读者的兴趣。
- en: '3\. Amusement: Cozy mysteries often feature quirky characters and humorous
    situations. The whimsy and light-heartedness provide a gentle, comedic experience
    that can be very uplifting.'
  id: totrans-360
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 娱乐：轻松悬疑小说通常以古怪的角色和幽默的情境为特色。这种异想天开和轻松愉快的氛围提供了一种温和的喜剧体验，可以非常提振精神。
- en: '4\. Satisfaction: The genre typically follows a formula where justice is served,
    and order is restored. This resolution brings a sense of satisfaction and closure
    to the reader, offering a reassuring affirmation that problems can be solved.'
  id: totrans-361
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 满足感：这个类型通常遵循一个公式，即正义得到伸张，秩序得到恢复。这种解决方式给读者带来了一种满足感和圆满感，提供了一个令人安心的肯定，即问题是可以解决的。
- en: '5\. Intellectual Engagement: Readers enjoy the challenge of collecting clues
    alongside the protagonist and trying to solve the mystery before it''s revealed.
    This intellectual engagement is a major draw of the genre.'
  id: totrans-362
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 智力参与：读者喜欢与主角一起收集线索，并在谜底揭晓之前尝试解开谜团。这种智力参与是该类型的主要吸引力。
- en: '6\. Escapism: With their often idyllic settings, cozy mysteries provide an
    escape from the stress and complexities of real life. The stakes are personal
    rather than global, and the focus is on solving a puzzle rather than confronting
    a harsh reality.'
  id: totrans-363
  prefs: []
  type: TYPE_NORMAL
  zh: 6. 逃避现实：轻松悬疑小说通常以田园诗般的背景为特色，为读者提供了一个逃避现实生活中的压力和复杂性的途径。赌注是个人层面的，而不是全球性的，重点是解决谜题，而不是面对残酷的现实。
- en: '7\. Connection and Belonging: Regular characters and a consistent setting foster
    a feeling of returning to a beloved community with each book. Readers grow attached
    to the characters and feel a sense of belonging to the fictional world.'
  id: totrans-364
  prefs: []
  type: TYPE_NORMAL
  zh: 7. 连接与归属感：固定角色和一致的背景让读者在每一本书中都有回到一个心爱社区的感觉。读者会与角色产生情感联系，并感到自己属于这个虚构世界。
- en: '8\. Gentle Suspense: Unlike thrillers or hardboiled detective stories, the
    suspense in cozy mysteries is more subdued. Readers enjoy the tension of a mystery
    without the anxiety-inducing peril found in darker genres.'
  id: totrans-365
  prefs: []
  type: TYPE_NORMAL
  zh: 8. 温和的悬疑：与惊悚片或硬汉侦探故事不同，轻松悬疑小说中的悬疑更加缓和。读者享受悬疑的紧张感，而没有在更黑暗的类型中发现的焦虑性危险。
- en: '9\. Moral Satisfaction: Cozy mysteries often have a strong moral undercurrent
    with clear distinctions between right and wrong. Readers enjoy the reassurance
    that, in the cozy universe, ethical behavior is upheld, and transgressions are
    not left unpunished.'
  id: totrans-366
  prefs: []
  type: TYPE_NORMAL
  zh: 9. 道德满足感：轻松悬疑小说通常具有强烈的道德潜流，明确区分对与错。读者享受在轻松宇宙中，道德行为得到维护，违法行为不会不受惩罚的保证。
- en: 10\. Empowerment. The protagonists in cozy mysteries are often ordinary people
    who use their intellect and resourcefulness to solve crimes. This gives readers
    a sense of empowerment, reflecting the idea that anyone can make a difference.
  id: totrans-367
  prefs: []
  type: TYPE_NORMAL
  zh: 10. 权力感。轻松悬疑小说中的主角通常是普通人，他们利用自己的智慧和机智来解决犯罪。这给读者一种赋权感，反映了任何人都可以有所不同的观点。
- en: '11\. Camaraderie and Friendship: The interplay between characters is often
    characterized by friendship, support, and community. Readers enjoy the dynamics
    of relationships that are built on trust and cooperation.'
  id: totrans-368
  prefs: []
  type: TYPE_NORMAL
  zh: 11. 友谊与友情：角色之间的互动通常以友情、支持和社区为特征。读者享受建立在信任和合作基础上的关系动态。
- en: These emotional experiences contribute to the cozy mystery genre's enduring
    popularity, providing readers with a delightful cocktail of feelings that combines
    the thrill of mystery with the warmth of a community narrative.
  id: totrans-369
  prefs: []
  type: TYPE_NORMAL
  zh: 这些情感体验有助于轻松悬疑小说类型的持久流行，为读者提供了一种令人愉悦的感觉混合物，将悬疑的刺激与社区叙事的温暖相结合。
- en: Review this response and select the most appropriate options for your book.
  id: totrans-370
  prefs: []
  type: TYPE_NORMAL
  zh: 审查这个回应，并选择最适合你书籍的选项。
- en: For example, if I were writing a middle grade or teen cozy mystery, I might
    focus on Empowerment, Connection, Camaraderie, friendship, and Gentle Suspense.
  id: totrans-371
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，如果我正在写一部中级或青少年轻松悬疑小说，我可能会关注权力感、连接、友谊、友情和温和的悬疑。
- en: Adult readers would each expect a different reading experience.
  id: totrans-372
  prefs: []
  type: TYPE_NORMAL
  zh: 成年读者会期待不同的阅读体验。
- en: For example. I enjoy cozy crime that provides a Fun, witty, Escapist reading
    experience with plenty of Curiosity and Intrigue. Low on graphic violence and
    high on Intellectual Satisfaction.
  id: totrans-373
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，我喜欢那种提供有趣、机智、逃避现实阅读体验的轻松犯罪小说，充满了好奇心和悬疑。低度暴力，高度智力满足。
- en: You may prefer paranormal or historical cozy mysteries where you can bring your
    own themes and twists.
  id: totrans-374
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能更喜欢超自然或历史轻松悬疑小说，在那里你可以带来自己的主题和转折。
- en: This is why it is essential to consider your voice and writing style at this
    stage so that you can generate an ideal story idea for your reader.
  id: totrans-375
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是为什么在这个阶段考虑你的声音和写作风格是至关重要的，这样你就可以为你读者生成一个理想的故事想法。
- en: There will be a satisfying conclusion, where justice is seen to be done and
    order restored, and the murderer is caught and punished. The story ends with the
    killer's arrest after a dramatic final confrontation and then leaves it there.
    Law trials and prison scenes are for other types of more hard-boiled crime novels.
  id: totrans-376
  prefs: []
  type: TYPE_NORMAL
  zh: 将会有一个令人满意的结局，正义得到伸张，秩序得到恢复，凶手被逮捕并受到惩罚。故事在一场戏剧性的最终对抗后结束，凶手被捕，然后故事就此结束。法庭审判和监狱场景适合其他类型更硬汉的犯罪小说。
- en: David Baldacci, the best-selling crime author, said the genre fits the turbulent
    political times. “People inherently don’t like folks who do bad to get away with
    it. In real life they do. But in novels evil is punished and the good guys mostly
    win,” he said.
  id: totrans-377
  prefs: []
  type: TYPE_NORMAL
  zh: 畅销犯罪小说作家大卫·贝拉克西说，这个类型适合动荡的政治时代。“人们天生不喜欢做坏事却逍遥法外的人。在现实生活中他们确实如此。但在小说中，邪恶会受到惩罚，好人大多会赢，”他说。
- en: Bonus Factor? Authenticity
  id: totrans-378
  prefs: []
  type: TYPE_NORMAL
  zh: 奖励因素？真实性
- en: 'One further element is fundamentally important for anyone considering writing
    a cozy mystery and is often overlooked: a deep and sincere love of this genre.'
  id: totrans-379
  prefs: []
  type: TYPE_NORMAL
  zh: 对于任何考虑写轻松悬疑小说的人来说，一个基本且重要的元素是深深地热爱这个类型，而这往往被忽视。
- en: Cozy murder mystery readers are astute and prolific. They will quickly spot
    an author who is not taking the genre seriously and creating their best work in
    a specific cozy niche.
  id: totrans-380
  prefs: []
  type: TYPE_NORMAL
  zh: 温馨谋杀神秘小说的读者机敏且多产。他们能迅速发现一个不认真对待这个体裁的作者，并在特定的温馨细分市场中创作出他们最好的作品。
- en: WORKED EXAMPLE. Crafts and Paranormal Story Idea
  id: totrans-381
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 工作示例。工艺与超自然故事想法
- en: 'Category: Crafts and Hobbies Cozy Mystery. Amateur Sleuth. Woman Sleuth. Paranormal
    mystery.'
  id: totrans-382
  prefs: []
  type: TYPE_NORMAL
  zh: 分类：工艺与爱好温馨神秘小说。业余神探。女性神探。超自然神秘小说。
- en: 'Themes and Ideas: Crafts and Hobbies. Knitting, Crocheting, and Quilting. Coastal
    and Beach Communities. Psychic and Supernatural Abilities'
  id: totrans-383
  prefs: []
  type: TYPE_NORMAL
  zh: 主题和想法：工艺与爱好。编织、钩针和拼布。沿海和海滩社区。灵媒和超自然能力
- en: What if? The sleuth is a young woman helping her psychic aunt run a knitting
    and craft store in a small seaside town. The murder mysteries are based around
    the inhabitants of this town.
  id: totrans-384
  prefs: []
  type: TYPE_NORMAL
  zh: 如果怎样？神探是一位年轻女性，帮助她的灵媒阿姨在一个小海滨城镇经营一家编织和工艺店。谋杀神秘小说围绕这个城镇的居民展开。
- en: 'Decision Two: Emotional Experience'
  id: totrans-385
  prefs: []
  type: TYPE_NORMAL
  zh: 决策二：情感体验
- en: I want this to be a light-hearted, fun, and witty escapist story with a well-motivated
    sleuth and an engaging murder mystery. Camaraderie and Friendship are essential
    elements, together with Connection and Belonging. The Psychic element adds another
    layer of interest.
  id: totrans-386
  prefs: []
  type: TYPE_NORMAL
  zh: 我希望这是一个轻松愉快、有趣且机智的逃避现实的故事，有一个动机良好的神探和一个引人入胜的谋杀神秘事件。友谊和友谊是基本要素，连同联系和归属感。灵媒元素增添了另一层兴趣。
- en: Decision Three. The Setting
  id: totrans-387
  prefs: []
  type: TYPE_NORMAL
  zh: 决策三：地点
- en: '![A blue and white rectangular box with white text  Description automatically
    generated](image_rsrc42P.jpg)'
  id: totrans-388
  prefs: []
  type: TYPE_IMG
  zh: '![一个蓝色和白色的长方形盒子，上面有白色文字 描述自动生成](image_rsrc42P.jpg)'
- en: Setting is a crucial part of your novel. It sets the mood, creates an atmosphere,
    and influences the characters and the plot.
  id: totrans-389
  prefs: []
  type: TYPE_NORMAL
  zh: 地点是小说的关键部分。它设定了基调，创造了氛围，并影响了角色和情节。
- en: A well-described setting can immerse readers into your story, making them feel
    as if they're right there with the characters.
  id: totrans-390
  prefs: []
  type: TYPE_NORMAL
  zh: 一个描述良好的设定可以让读者沉浸在你的故事中，让他们感觉就像与角色在一起。
- en: Many readers love a setting so much that they will buy an entire series of cozy
    mysteries to maintain their connection with a magical and immersive extraordinary
    world.
  id: totrans-391
  prefs: []
  type: TYPE_NORMAL
  zh: 许多读者对某个设定如此喜爱，以至于他们会购买整个系列温馨的神秘小说，以保持与一个神奇和沉浸式的非凡世界的联系。
- en: Consider your favorite mysteries.
  id: totrans-392
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑你最喜欢的神秘小说。
- en: What aspects of the setting have stayed with you and appeal to you the most?
  id: totrans-393
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 哪些方面的设定让你印象深刻，最吸引你？
- en: How does the setting enhance the plot and the characters?
  id: totrans-394
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 地点如何增强情节和角色？
- en: Does the sleuth or villain have any particular connection with this setting
    that makes them behave differently or make different decisions?
  id: totrans-395
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 神探或反派与这个设定有特别的联系，使他们表现得不同或做出不同的决定吗？
- en: Are there hidden secrets, quirks, legends, and mysteries associated with that
    location?
  id: totrans-396
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 与该地点相关的隐藏秘密、怪癖、传说和神秘事物有哪些？
- en: Is this a small town or a special part of a larger town or city?
  id: totrans-397
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 这是一个小镇，还是更大城镇或城市的一个特殊部分？
- en: Most cozy murder mysteries are based in a small, closed location where the amateur
    detective knows the local community and can investigate based on her powers of
    observation and deduction.
  id: totrans-398
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数温馨谋杀神秘小说都基于一个小型、封闭的地点，业余侦探了解当地社区，可以根据她的观察力和推理能力进行调查。
- en: The sleuth can also be a visitor to the area who is seeing it for the first
    time but will have a local guide with detailed information about the history of
    the place and the people who live there – especially those linked to the murder
    victim or victims.
  id: totrans-399
  prefs: []
  type: TYPE_NORMAL
  zh: 神探也可以是这个地区的访客，他们第一次看到这个地方，但将有一位了解这个地方历史和当地居民（特别是与受害者或受害者有关的人）的当地导游。
- en: '![A diagram of a story generator  Description automatically generated](image_rsrc42R.jpg)'
  id: totrans-400
  prefs: []
  type: TYPE_IMG
  zh: '![故事生成器的图表 描述自动生成](image_rsrc42R.jpg)'
- en: This can be challenging since cozy mysteries can be set in any period and physical
    location, including paranormal, futuristic, urban, and rural settings.
  id: totrans-401
  prefs: []
  type: TYPE_NORMAL
  zh: 这可能具有挑战性，因为温馨神秘小说可以设定在任何时期和物理位置，包括超自然、未来、城市和乡村环境。
- en: If it helps, don’t be embarrassed to draw a sketch map of your location, including
    where all of the significant buildings are located in this town and where the
    sleuth lives and works.
  id: totrans-402
  prefs: []
  type: TYPE_NORMAL
  zh: 如果有帮助，不要害羞地画一张你的地点草图，包括这个城镇所有重要建筑的位置，以及神探居住和工作的地方。
- en: How long will it take her to drive home or walk to the office or job?
  id: totrans-403
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 她开车回家或步行去办公室或工作需要多长时间？
- en: Does she pass other shops, bistros, bookstores, etc., or is it a seaside town
    or in a valley between snowcapped mountains?
  id: totrans-404
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 她是否经过其他商店、咖啡馆、书店等，或者是一个海边小镇，还是在雪山之间的山谷中？
- en: What is her view like from her bedroom window or storefront?
  id: totrans-405
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 她的卧室窗户或店面有什么风景？
- en: Your accurate and sensory description of these settings will bring them alive.
    The reader should be able to taste the salt from sea spray or inhale the scent
    from the musk roses that grow around the door of the sleuth’s cottage.
  id: totrans-406
  prefs: []
  type: TYPE_NORMAL
  zh: 您对这些场景的准确和感官描述将使它们栩栩如生。读者应该能够品尝到海浪中的盐分，或者吸入生长在侦探小屋门口的麝香玫瑰的香气。
- en: This is one of the many reasons why culinary mysteries are so popular—you can
    add layers of luscious descriptions of the sensory overload that comes with, for
    example, the warm spice and vanilla aromas of a bakery or wedding catering.
  id: totrans-407
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是烹饪悬疑小说如此受欢迎的许多原因之一——您可以为面包店或婚礼餐饮带来的温暖香料和香草香气等感官过载添加丰富的描述。
- en: ChatGPT and Settings
  id: totrans-408
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT和场景
- en: Use ChatGPT as a Brainstorming Tool
  id: totrans-409
  prefs: []
  type: TYPE_NORMAL
  zh: 将ChatGPT作为头脑风暴工具使用
- en: ChatGPT is an excellent tool for generating ideas and descriptions for your
    settings. Be as specific as you can with your prompts to get the most detailed
    responses.
  id: totrans-410
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT是一个生成场景想法和描述的出色工具。在您的提示中尽可能具体，以获得最详细的回复。
- en: 'Here''s how you can use ChatGPT to generate vivid setting descriptions:'
  id: totrans-411
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是您如何使用ChatGPT生成生动的场景描述：
- en: 1\. Research Your Setting.
  id: totrans-412
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 研究您的场景。
- en: If your setting is a real place or a historical period, research it thoroughly.
    Use this information as a basis for your prompts to ChatGPT. Detailed research
    informs accurate and realistic descriptions.
  id: totrans-413
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您的场景是一个真实的地方或一个历史时期，请彻底研究它。将这些信息作为您向ChatGPT提出提示的基础。详细研究可以确保描述准确和逼真。
- en: Suppose your novel is set in modern-day New York or Maine. Research these cities
    thoroughly—the landmarks, the weather, the culture, the people—and feed this information
    to ChatGPT.
  id: totrans-414
  prefs: []
  type: TYPE_NORMAL
  zh: 假设您的小说设定在现代纽约或缅因州。彻底研究这些城市——地标、天气、文化、人们——并将这些信息输入到ChatGPT中。
- en: Experimenting with different prompts and learning from these trials can lead
    to better results over time.
  id: totrans-415
  prefs: []
  type: TYPE_NORMAL
  zh: 通过尝试不同的提示并从这些试验中学习，可以随着时间的推移获得更好的结果。
- en: 'Prompt: Describe a small coffee shop in central New York in detail.'
  id: totrans-416
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：详细描述位于纽约市中心的咖啡馆。
- en: 'Prompt: Describe a snowy December evening in a small coastal town in Maine.
    It is Christmas Eve, and the shops are busy with customers.'
  id: totrans-417
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：描述缅因州一个小沿海小镇的雪夜，那是圣诞节前夕，商店里挤满了顾客。
- en: 'Prompt: Describe an English Country House in 1928 in detail. Focus on the buildings
    and rooms and interior design.'
  id: totrans-418
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：详细描述1928年的英国乡村庄园。
- en: 2\. Use Sensory Details.
  id: totrans-419
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 使用感官细节。
- en: The best way to immerse readers in your setting is to engage all their senses.
    Describe not just what your characters see but also what they hear, smell, taste,
    and touch. When describing a setting, don't just rely on visual details. Use all
    five senses to create a vivid, immersive picture.
  id: totrans-420
  prefs: []
  type: TYPE_NORMAL
  zh: 让读者完全沉浸在您的场景中的最佳方法是调动他们所有的感官。不仅要描述你的角色看到的东西，还要描述他们听到的、闻到的、尝到的和触摸到的。在描述场景时，不要仅仅依赖于视觉细节。使用所有五种感官来创造一个生动、沉浸的画面。
- en: 'Prompt: Describe a summer evening in a seaside town and describe the smells,
    sounds, tastes, and tactile experiences of a place, focusing on all five senses.'
  id: totrans-421
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：描述一个海边小镇的夏日傍晚，并描述该地的气味、声音、味道和触觉体验，重点关注所有五种感官。
- en: 'Prompt: Describe the sounds, smells, and tactile experiences in a bustling
    New York coffee shop.'
  id: totrans-422
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：描述一个繁忙的纽约咖啡馆中的声音、气味和触觉体验。
- en: 'Prompt: Describe the quaint architecture of a small town in Maine in rich and
    evocative detail.'
  id: totrans-423
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：用丰富和引人入胜的细节描述缅因州一个小镇的古朴建筑。
- en: 'Prompt: Describe in detail the sights, sounds, smells, and textures of a modern
    wedding reception, including details of the flowers, food, lighting, and the music
    being played.'
  id: totrans-424
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：详细描述现代婚礼宴会的景象、声音、气味和质感，包括花卉、食物、照明和正在播放的音乐。
- en: 3\. Set the Mood.
  id: totrans-425
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 营造氛围。
- en: The setting can convey emotions and create an atmosphere. A bustling city can
    evoke excitement, a quiet village can suggest tranquility, and a stormy sea can
    create tension.
  id: totrans-426
  prefs: []
  type: TYPE_NORMAL
  zh: 场景可以传达情感并创造氛围。繁忙的城市可以唤起兴奋，宁静的村庄可以暗示宁静，而暴风雨的海浪可以创造紧张感。
- en: 'Prompt: Describe the setting of a tranquil village in the English countryside
    that creates a feeling of peace and relaxation.'
  id: totrans-427
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：描述一个位于英国乡村的宁静村庄的设定，它能营造出平静和放松的感觉。
- en: 'Prompt: Describe how a sudden snowstorm in New York City impacts the characters
    in my story.'
  id: totrans-428
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：描述纽约市突如其来的暴风雪如何影响我故事中的角色。
- en: 'Prompt: Describe the unsettling atmosphere of a haunted old mansion being used
    as a private school.'
  id: totrans-429
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：描述一个被用作私立学校的闹鬼古老豪宅的不安氛围。
- en: 4\. Integrate Setting with Plot and Characters
  id: totrans-430
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 4. 将设定与情节和角色整合
- en: The setting shouldn't just be a backdrop; it should interact with the characters
    and the plot. It can influence a character's actions, decisions, and emotions
    and play a role in the plot.
  id: totrans-431
  prefs: []
  type: TYPE_NORMAL
  zh: 设定不应仅仅是一个背景；它应该与角色和情节互动。它可以影响角色的行为、决定和情感，并在情节中扮演角色。
- en: Settings can reveal a lot about your characters. Their homes, workspaces, and
    favorite places can provide insight into their personalities, backgrounds, and
    priorities.
  id: totrans-432
  prefs: []
  type: TYPE_NORMAL
  zh: 设定可以揭示很多关于你角色的信息。他们的家、工作场所和喜爱的地方可以提供对他们的个性、背景和优先级的洞察。
- en: For example, every setting has secrets and history. Integrate these elements
    into your series, allowing the setting itself to become a source of mystery. An
    old mansion with hidden rooms, a historical feud shaping the community, or a landmark
    rumored to be haunted can all add intrigue.
  id: totrans-433
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，每个设定都有其秘密和历史。将这些元素融入你的系列中，让设定本身成为神秘之源。一个隐藏着房间的古老豪宅、塑造社区历史的古老纷争，或者传说中闹鬼的地标都可以增添神秘感。
- en: '![](image_rsrc42S.jpg)'
  id: totrans-434
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc42S.jpg)'
- en: Give me 10 ways in which the setting can directly impact the characters and
    the plot of a cozy mystery.
  id: totrans-435
  prefs: []
  type: TYPE_NORMAL
  zh: 给我10种设定如何直接影响轻松悬疑小说中角色和情节的方式。
- en: '![](image_rsrc42T.jpg)'
  id: totrans-436
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc42T.jpg)'
- en: 'The setting of a cozy mystery plays a crucial role in shaping the narrative,
    influencing the characters, and driving the plot forward. It does more than merely
    provide a backdrop; it intertwines with the story''s essence, offering both constraints
    and opportunities for the unfolding mystery. Here are ten ways in which the setting
    can directly impact the characters and the plot of a cozy mystery:'
  id: totrans-437
  prefs: []
  type: TYPE_NORMAL
  zh: 轻松悬疑小说的设定在塑造叙事、影响角色和推动情节发展中起着至关重要的作用。它不仅仅是提供一个背景；它与故事的本质交织在一起，既提供限制，也提供展开谜团的机会。以下是设定如何直接影响轻松悬疑小说中角色和情节的十种方式：
- en: 'Enclosed Environment: A small, enclosed setting like a quaint village or an
    isolated estate can limit the suspect pool to a handful of characters, making
    the mystery more intimate and intensifying interpersonal dynamics. It forces the
    characters to interact closely, potentially leading to alliances, betrayals, and
    revelations that drive the plot.'
  id: totrans-438
  prefs: []
  type: TYPE_NORMAL
  zh: 封闭环境：一个像乡村或孤立庄园这样的小型封闭环境可以将嫌疑人范围限制在少数几个角色中，使谜团更加亲密并加剧人际互动。它迫使角色近距离互动，可能导致联盟、背叛和揭露，从而推动情节发展。
- en: 'Cultural Norms and Values: The cultural backdrop of the setting can influence
    the behavior and motivations of the characters. For example, a mystery set in
    a community with strong traditions and values might see characters acting out
    of a desire to protect those ideals, leading to hidden motives and secrets that
    propel the plot.'
  id: totrans-439
  prefs: []
  type: TYPE_NORMAL
  zh: 文化规范和价值：设定的文化背景可以影响角色的行为和动机。例如，在一个有着强烈传统和价值观的社区中设定的谜团可能会看到角色出于保护这些理想而行动，导致隐藏的动机和秘密，推动情节发展。
- en: 'Historical Context: A setting with a rich historical background can add layers
    to the plot through old family feuds, inherited secrets, or hidden treasures.
    Characters might be influenced by their ancestors'' actions, leading to a mystery
    that spans generations.'
  id: totrans-440
  prefs: []
  type: TYPE_NORMAL
  zh: 历史背景：一个拥有丰富历史背景的设定可以通过古老的家族纷争、继承的秘密或隐藏的宝藏为情节增添层次。角色可能会受到祖先行为的影响，导致跨越几代的谜团。
- en: 'Geographical Constraints: The physical landscape, whether it''s the rugged
    coastlines, dense forests, or urban architecture, can dictate the movement of
    characters and the progression of the plot. It can create natural obstacles, hiding
    places, or means of escape that are pivotal to the mystery.'
  id: totrans-441
  prefs: []
  type: TYPE_NORMAL
  zh: 地理限制：无论是崎岖的海岸线、茂密的森林还是城市建筑，都可以决定角色的移动和情节的发展。它可以创造自然障碍、藏身之处或逃生手段，这些对谜团至关重要。
- en: 'Seasonal Variations: The time of year in which the story is set can affect
    the atmosphere and plot. A snowed-in winter setting can isolate characters, heightening
    tension and forcing confrontations, while a festive holiday season can provide
    cover for nefarious deeds amid the celebrations.'
  id: totrans-442
  prefs: []
  type: TYPE_NORMAL
  zh: 季节变化：故事设定的年份可以影响氛围和情节。一个暴风雪覆盖的冬天设定可以隔离角色，加剧紧张气氛并迫使对抗，而节日季节则可以在庆祝活动中为邪恶行为提供掩护。
- en: 'Community Dynamics: The social fabric of the setting, including the relationships
    and power dynamics within a small community, can be a rich source of conflict
    and motive. Gossip, rivalries, and local scandals can serve as clues or red herrings
    that the protagonist must navigate to solve the mystery.'
  id: totrans-443
  prefs: []
  type: TYPE_NORMAL
  zh: 社区动态：场景的社会结构，包括小社区内部的关系和权力动态，可以成为冲突和动机的丰富来源。八卦、竞争和当地丑闻可以作为线索或误导信息，主角必须导航以解决悬疑。
- en: 'Economic Status: The economic conditions of the setting can influence the plot
    through motives like financial desperation, inheritance disputes, or the impact
    of economic downturns on local businesses. Characters might be driven to crime
    out of need, greed, or the desire to maintain their status.'
  id: totrans-444
  prefs: []
  type: TYPE_NORMAL
  zh: 经济状况：场景的经济条件可以通过诸如经济绝望、遗产纠纷或经济衰退对当地企业的影响等动机来影响情节。角色可能会因为需要、贪婪或维持其地位而被迫犯罪。
- en: 'Occupational Backgrounds: In settings centered around specific occupations
    or industries (like a vineyard, bookstore, or theatre), the unique aspects of
    these environments can introduce specialized knowledge, insider secrets, and occupational
    hazards that are integral to the plot.'
  id: totrans-445
  prefs: []
  type: TYPE_NORMAL
  zh: 职业背景：在以特定职业或行业为中心的场景中（如葡萄园、书店或剧院），这些环境的独特方面可以引入专业知识、内部秘密和职业危害，这些都是情节的重要组成部分。
- en: 'Local Events and Traditions: Festivals, competitions, and other local events
    can provide a timely backdrop for a mystery, offering opportunities for public
    spectacles, hidden activities, and communal gatherings where crucial plot developments
    occur.'
  id: totrans-446
  prefs: []
  type: TYPE_NORMAL
  zh: 当地事件和传统：节日、比赛和其他当地事件可以为悬疑故事提供及时背景，提供公共表演、隐藏活动和社区聚会的机会，在这些地方关键情节发展发生。
- en: 'Isolation vs. Connectivity: The degree of isolation or connectivity of a setting
    can influence how information is shared, how quickly rumors spread, and how characters
    interact with the outside world.'
  id: totrans-447
  prefs: []
  type: TYPE_NORMAL
  zh: 隔离与连通性：场景的隔离或连通程度可以影响信息的共享方式、谣言传播的速度以及角色与外界互动的方式。
- en: An isolated setting might trap characters with a killer, while a more connected
    setting could introduce unexpected allies or enemies from beyond the immediate
    locale.
  id: totrans-448
  prefs: []
  type: TYPE_NORMAL
  zh: 一个孤立的环境可能会将角色和杀手困在一起，而一个更连通的环境可能会引入来自更远地方的意外盟友或敌人。
- en: In each of these ways, the setting of a cozy mystery doesn't just serve as a
    passive background but actively shapes the narrative, challenges the characters,
    and enriches the plot, making the story's environment a character in its own right.
  id: totrans-449
  prefs: []
  type: TYPE_NORMAL
  zh: 在这些方式中，温馨悬疑小说的场景不仅仅是一个被动的背景，而是积极地塑造叙事、挑战角色并丰富情节，使故事的环境本身成为一个角色。
- en: 4\. Establish an Emotional Connection between the Setting and the Characters
  id: totrans-450
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 4. 在场景和角色之间建立情感联系
- en: A character's actions can alter the setting, while the setting can force a character
    to adapt, grow, or reveal hidden depths.
  id: totrans-451
  prefs: []
  type: TYPE_NORMAL
  zh: 一个角色的行动可以改变场景，而场景可以迫使角色适应、成长或揭示隐藏的深度。
- en: For instance, a protagonist might renovate a rundown family inn, symbolizing
    their commitment to their heritage and personal growth.
  id: totrans-452
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，一个主角可能会翻新一个破旧的家族旅馆，象征着他们对遗产和个人成长的承诺。
- en: Characters may find themselves out of their comfort zones in new settings, forced
    to confront fears or prejudices, or inspired to take actions they wouldn’t have
    considered elsewhere.
  id: totrans-453
  prefs: []
  type: TYPE_NORMAL
  zh: 角色可能会发现自己在新环境中感到不自在，被迫面对恐惧或偏见，或者受到启发采取他们在其他地方不会考虑的行动。
- en: For example, a character who is typically reserved and cautious might take on
    a leadership role in organizing a community event to save a beloved local landmark,
    showcasing growth and newfound confidence.
  id: totrans-454
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，一个通常保守和谨慎的角色可能会在组织社区活动以拯救一个受爱戴的地方地标时承担领导角色，展示出成长和新的自信。
- en: Conversely, a character's discovery of a secret passage in an old mansion could
    lead to uncovering hidden crimes, propelling the plot forward.
  id: totrans-455
  prefs: []
  type: TYPE_NORMAL
  zh: 相反，一个角色在古老豪宅中发现秘密通道可能会导致发现隐藏的罪行，推动情节向前发展。
- en: '![](image_rsrc42U.jpg)'
  id: totrans-456
  prefs: []
  type: TYPE_IMG
  zh: '![image_rsrc42U.jpg]'
- en: Give me 10 ways to build an emotional connection between a particular setting
    and the main characters in a cozy mystery.
  id: totrans-457
  prefs: []
  type: TYPE_NORMAL
  zh: 请给我10种方法来建立特定场景与温馨悬疑小说中的主要角色之间的情感联系。
- en: '![](image_rsrc42V.jpg)'
  id: totrans-458
  prefs: []
  type: TYPE_IMG
  zh: '![image_rsrc42V.jpg]'
- en: 'Building an emotional connection between the setting and the main characters
    in a cozy mystery not only enriches the narrative but also deepens readers'' engagement
    with the story. Here are ten ways to achieve this:'
  id: totrans-459
  prefs: []
  type: TYPE_NORMAL
  zh: 在温馨悬疑小说中建立场景与主要角色之间的情感联系不仅丰富了叙事，也加深了读者对故事的关注。以下是有十种方法来实现这一点：
- en: 'Rooted History: Establish a deep-rooted history between the characters and
    the setting by making it a place where significant life events occurred. This
    could be a family home where the protagonist grew up, a town where they solved
    their first mystery, or a beloved community spot that holds precious memories,
    thereby intertwining the character''s personal history with the location.'
  id: totrans-460
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 根深蒂固的历史：通过使场景成为发生重大生活事件的地方，在角色和场景之间建立深厚的联系。这可能是一个主角长大的家庭住宅，一个他们解决第一个谜团的城镇，或者一个充满珍贵记忆的受人喜爱的社区场所，从而将角色的个人历史与地点交织在一起。
- en: 'Personal Stakes: Give the main characters personal stakes in the setting. This
    could be their business, like a bookstore or café, that''s threatened by the mystery,
    or a community event they''re deeply invested in. The more the setting matters
    personally to the characters, the more readers will care about both.'
  id: totrans-461
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 个人利益：给主要角色在场景中的个人利益。这可能是一个受到神秘事件威胁的商店或咖啡馆，或者他们深深投入其中的社区活动。场景对角色越重要，读者就越会关心两者。
- en: 'Sentimental Objects: Populate the setting with objects that have sentimental
    value to the characters, such as heirlooms, photographs, or gifts from loved ones.
    These objects can serve as tangible connections to the past and evoke strong emotions,
    making the setting feel like a living memory box.'
  id: totrans-462
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 情感物品：在场景中填充对角色有情感价值的物品，如传家宝、照片或来自亲人的礼物。这些物品可以作为与过去的有形联系，唤起强烈的情感，使场景感觉像一个活生生的记忆盒。
- en: 'Community Ties: Develop strong ties between the characters and the community
    within the setting. Friends, family, and even friendly rivals can create a network
    of relationships that make the setting feel like home, fostering a sense of belonging
    and responsibility towards the place and its inhabitants.'
  id: totrans-463
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 社区联系：在场景内的角色和社区之间建立牢固的联系。朋友、家人甚至友好的竞争对手可以创建一个关系网，使场景感觉像家一样，培养对地方及其居民的归属感和责任感。
- en: 'Unique Traditions: Incorporate unique local traditions or festivals that the
    characters participate in or organize, making them integral to the cultural fabric
    of the setting. This involvement can highlight their emotional investment in maintaining
    and celebrating the community''s identity.'
  id: totrans-464
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 独特传统：将独特的当地传统或节日融入角色参与的或组织的活动中，使它们成为场景文化结构的重要组成部分。这种参与可以突出他们在维护和庆祝社区身份上的情感投入。
- en: 'Shared Memories: Use flashbacks or conversations to reveal shared memories
    between characters and other community members that are tied to specific locations
    within the setting. This technique can deepen the emotional resonance of these
    places and show how they''ve shaped the characters'' relationships and identities.'
  id: totrans-465
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 共同记忆：使用闪回或对话揭示角色与其他社区成员之间的共同记忆，这些记忆与场景中的特定地点相关。这种技术可以加深这些地点的情感共鸣，并展示它们如何塑造角色的关系和身份。
- en: 'Protective Instincts: Trigger the characters'' protective instincts towards
    the setting. This could arise from a threat to the setting''s environmental beauty,
    historical landmarks, or community well-being, motivating the characters to solve
    the mystery to safeguard what they love.'
  id: totrans-466
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 保护本能：激发角色对场景的保护本能。这可能源于对场景环境美丽、历史地标或社区福祉的威胁，激励角色解决谜团以保护他们所爱的一切。
- en: 'Character Development: Let the setting play a role in the characters'' development.
    Challenges or mysteries arising from the setting can force the characters to grow,
    confront fears, or embrace their strengths, making the setting a crucible for
    transformation.'
  id: totrans-467
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 角色发展：让场景在角色的成长中发挥作用。来自场景的挑战或谜团可以迫使角色成长，面对恐惧，或拥抱他们的优势，使场景成为转变的熔炉。
- en: 'Sensory Connections: Describe the setting using sensory details that evoke
    strong emotions in the characters. The smell of the ocean that reminds them of
    childhood, the sight of a particular landmark that brings back a flood of memories,
    or the sound of a local festival can all create a visceral connection to the place.'
  id: totrans-468
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 感官联系：使用能够唤起角色强烈情感的感官细节来描述场景。海洋的气味让他们想起童年，一个特定地标让他们回忆起大量记忆，或当地节日的声音都可以创造与这个地方的直观联系。
- en: 'Personal Sanctuary: Make the setting a personal sanctuary for the characters,
    a place where they find peace, inspiration, or solace, especially in times of
    turmoil. This could be a hidden nook in a library, a serene spot by a lake, or
    a cozy corner of their café, offering a physical space that represents emotional
    safety and comfort.'
  id: totrans-469
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 个人圣地：让设置成为角色的个人圣地，一个他们在动荡时期找到平静、灵感或慰藉的地方。这可能是一个图书馆的隐蔽角落、湖边的宁静之地，或者他们咖啡馆的一个舒适的角落，提供一个代表情感安全和舒适的物理空间。
- en: By weaving these elements into the narrative, the setting becomes more than
    just a backdrop; it transforms into a character in its own right, with which the
    protagonists have a dynamic and emotional relationship. This connection not only
    adds depth to the characters and the story but also makes the setting an indispensable
    part of the mystery that readers will come to care about deeply.
  id: totrans-470
  prefs: []
  type: TYPE_NORMAL
  zh: 通过将这些元素编织进叙事中，设置不仅仅是一个背景；它变成了一个角色，与主角有着动态和情感的关系。这种联系不仅为角色和故事增添了深度，还使设置成为读者将深切关心的谜案不可或缺的一部分。
- en: Next Step?
  id: totrans-471
  prefs: []
  type: TYPE_NORMAL
  zh: 下一步是什么？
- en: Review this response and consider how each of these emotional connections could
    be worked into the plot of a cozy murder mystery.
  id: totrans-472
  prefs: []
  type: TYPE_NORMAL
  zh: 审查这个回应，并考虑如何将这些情感联系融入温馨谋杀谜案的情节中。
- en: Using Settings to Generate Story Ideas
  id: totrans-473
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用设置来生成故事想法
- en: Choosing the correct settings can bring a story to life and drive the plot forward.
    As an author, consider places that naturally connect to the mystery or adventure
    you want to tell.
  id: totrans-474
  prefs: []
  type: TYPE_NORMAL
  zh: 选择正确的设置可以让故事栩栩如生，推动情节发展。作为一名作者，考虑那些自然与你想讲述的神秘或冒险故事相联系的地方。
- en: If there's a historical clue at the heart of things, set key events somewhere
    like a fantastic old museum, an antique shop packed with secrets, or even a historical
    site just bursting with artifacts from the past. Integrating the setting becomes
    part of the story rather than just a backdrop.
  id: totrans-475
  prefs: []
  type: TYPE_NORMAL
  zh: 如果事情的核心有一个历史线索，那么将关键事件设定在一个如奇幻的老博物馆、一个充满秘密的古董店，或者甚至是一个充满过去遗物的历史遗址。将设置融入故事，使其成为故事的一部分，而不仅仅是背景。
- en: Settings can also challenge the characters in fun and interesting ways.
  id: totrans-476
  prefs: []
  type: TYPE_NORMAL
  zh: 设置也可以以有趣和有趣的方式挑战角色。
- en: For example, a snowstorm might force everyone to take shelter in a spooky mansion,
    which could reveal hidden truths or even test their survival skills!
  id: totrans-477
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，一场暴风雪可能迫使每个人都躲进一个阴森的大宅，这可能揭示隐藏的真相，甚至测试他们的生存技能！
- en: Environmental challenges like extreme weather can shake relationships and push
    the plot in unexpected new directions.
  id: totrans-478
  prefs: []
  type: TYPE_NORMAL
  zh: 环境挑战，如极端天气，可以动摇关系，推动情节以意想不到的新方向前进。
- en: The culture and people surrounding the setting also provide many possibilities.
    Conflicts between old and new ways, quirky local traditions and festivals, and
    long-held customs can generate plot twists and let your characters grow in fascinating
    ways.
  id: totrans-479
  prefs: []
  type: TYPE_NORMAL
  zh: 周围的文化和人群也提供了许多可能性。新旧方式之间的冲突、古怪的地方传统和节日，以及长期保留的风俗可以产生情节转折，让你的角色以令人着迷的方式成长。
- en: And last but not least, settings can highlight your book's themes. If you're
    exploring significant issues like conservation or protecting the environment,
    consider a habitat under threat or a community facing problems like industrial
    pollution.
  id: totrans-480
  prefs: []
  type: TYPE_NORMAL
  zh: 最后但同样重要的是，设置可以突出你书中主题。如果你正在探讨像保护或保护环境这样的重大问题，考虑一个受到威胁的栖息地或面临工业污染等问题的社区。
- en: Your characters' interactions with their surroundings and reactions to threats
    to what they value make those themes more realistic and relevant to readers.
  id: totrans-481
  prefs: []
  type: TYPE_NORMAL
  zh: 角色与周围环境的互动以及他们对所珍视事物受到威胁的反应使这些主题更加真实和与读者相关。
- en: '![](image_rsrc42W.jpg)'
  id: totrans-482
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrc42W.jpg)'
- en: For each of the 10 responses above, create 3 story ideas for a cozy murder mystery
    where there is a murder in each story that is investigated by an amateur sleuth.
    Make one mystery contemporary, one Edwardian, and one paranormal.
  id: totrans-483
  prefs: []
  type: TYPE_NORMAL
  zh: 对于上述10个回应中的每一个，为温馨谋杀谜案创造3个故事想法，每个故事中都有一个谋杀案，由业余侦探调查。其中一个是当代的，一个是爱德华时代的，还有一个是超自然的。
- en: '![](image_rsrc42X.jpg)'
  id: totrans-484
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrc42X.jpg)'
- en: 1\. Rooted History
  id: totrans-485
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 根植历史
- en: 'Contemporary: In a small lakeside town, a local librarian finds her childhood
    friend murdered in the family-owned bookstore that''s been a fixture in her life.
    The store, filled with memories and secrets, holds clues to solving the mystery,
    leading her to uncover a web of deceit among the town''s seemingly peaceful residents.'
  id: totrans-486
  prefs: []
  type: TYPE_NORMAL
  zh: 当代：在一个小湖边小镇，一位当地图书管理员发现她的童年朋友在家族拥有的书店中被谋杀，这家书店一直是她生活的一部分。这家充满记忆和秘密的商店持有解开谜团的线索，引导她揭露镇上看似和平的居民中的欺骗网络。
- en: 'Edwardian: At a grand estate where a young woman spent her idyllic summers,
    a guest is found dead during a weekend party. As an amateur sleuth with fond memories
    of the estate, she navigates the rigid social hierarchies and hidden pasts of
    the aristocratic guests to reveal a motive rooted in a decades-old family scandal.'
  id: totrans-487
  prefs: []
  type: TYPE_NORMAL
  zh: 爱德华时代：在一个年轻女子度过她田园诗般夏天的宏伟庄园中，一位客人在周末派对期间被发现死亡。作为一名对庄园怀有美好回忆的业余侦探，她穿梭于严格的社交等级和贵族客人的隐藏过去，揭示了一个根植于几十年前家庭丑闻的动机。
- en: 'Paranormal: In a historic Victorian mansion turned bed-and-breakfast, the owner
    discovers a ghost from her ancestor''s era is trying to communicate clues about
    a recent murder on the property. Using her connection to the house and its history,
    she unravels a centuries-old mystery intertwined with the present crime.'
  id: totrans-488
  prefs: []
  type: TYPE_NORMAL
  zh: 超自然：在一座被改造成民宿的历史维多利亚式豪宅中，女主人发现她祖先时代的幽灵试图向她传达关于房产上最近一起谋杀案的线索。利用她对房屋及其历史的联系，她解开了一个与当前犯罪交织在一起的几个世纪的谜团。
- en: 2\. Personal Stakes
  id: totrans-489
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 个人利益
- en: 'Contemporary: The owner of a popular local café is shocked when her sous chef
    is found dead in the kitchen. With her café''s reputation and her livelihood at
    stake, she must sift through a mix of recipes and resentments to find the murderer
    among her staff and patrons, all while keeping the business afloat.'
  id: totrans-490
  prefs: []
  type: TYPE_NORMAL
  zh: 当代：一家受欢迎的当地咖啡馆的女老板震惊地发现她的副厨师在厨房被发现死亡。随着她咖啡馆的声誉和生计受到威胁，她必须在食谱和怨恨中筛选，以在员工和顾客中找到凶手，同时保持业务的运营。
- en: 'Edwardian: A renowned botanical garden''s future is threatened when its benefactor
    is murdered during the unveiling of a rare plant collection. The garden''s curator,
    whose life''s work is entwined with the garden''s success, investigates the elite
    circle of enthusiasts and rivals to protect her legacy and solve the murder.'
  id: totrans-491
  prefs: []
  type: TYPE_NORMAL
  zh: 爱德华时代：当一位著名植物园的赞助人在展示一个稀有植物收藏时被谋杀，该植物园的未来受到了威胁。植物园的馆长，其一生的工作与植物园的成功紧密相连，调查了爱好者和竞争对手的精英圈子，以保护她的遗产并解决这起谋杀案。
- en: 'Paranormal: In a town where humans and supernatural beings coexist, a witch
    runs a magical apothecary. When a potion ingredient leads to a customer''s untimely
    death, she must use her magical knowledge and connections within both communities
    to clear her name and find the real killer.'
  id: totrans-492
  prefs: []
  type: TYPE_NORMAL
  zh: 超自然：在一个人类和超自然生物共存的小镇上，一位女巫经营着一家魔法药房。当一种药剂的成分导致一位顾客意外死亡时，她必须利用她在两个社区中的魔法知识和联系来洗清她的名字并找到真正的凶手。
- en: 3\. Sentimental Objects
  id: totrans-493
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 情感物品
- en: 'Contemporary: A handmade quilt is the only clue when a beloved quilting circle
    member is found murdered. The quilt''s creator, determined to piece together the
    mystery, discovers that each patch represents a secret from the victim''s past,
    leading her to the unexpected killer.'
  id: totrans-494
  prefs: []
  type: TYPE_NORMAL
  zh: 当代：一块手工拼布是发现一位深受喜爱的拼布圈成员被谋杀的唯一线索。拼布的创作者，决心拼凑这个谜团，发现每个拼块都代表着受害者过去的秘密，这使她找到了一个意想不到的凶手。
- en: 'Edwardian: During a high society wedding, the bride''s heirloom pearl necklace
    goes missing, and the jeweler responsible for its restoration is found dead. An
    amateur sleuth with an eye for detail and knowledge of Edwardian jewellery navigates
    through a web of familial obligations and societal expectations to uncover the
    thief and murderer.'
  id: totrans-495
  prefs: []
  type: TYPE_NORMAL
  zh: 爱德华时代：在一次上流社会的婚礼上，新娘的传家宝珍珠项链不见了，负责修复它的珠宝商被发现死亡。一位对细节有洞察力且了解爱德华时代珠宝的业余侦探，在家族义务和社会期望的错综复杂中，揭露了窃贼和凶手。
- en: 'Paranormal: An antique dealer specializing in haunted objects comes across
    a Victorian locket that contains the spirit of its original owner, who insists
    her death was no accident. To lay the spirit to rest, the dealer must delve into
    the locket''s history, uncovering a tragic love story and a murder that echoes
    into the present day.'
  id: totrans-496
  prefs: []
  type: TYPE_NORMAL
  zh: 超自然：一位专门经营鬼魂物品的古董商发现了一个维多利亚时代的胸针，里面含有其原主人的灵魂，她坚称她的死亡不是意外。为了安息这个灵魂，古董商必须深入胸针的历史，揭示一个悲惨的爱情故事和一桩至今仍在回响的谋杀案。
- en: 4\. Community Ties
  id: totrans-497
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 社区联系
- en: 'Contemporary: The murder of a beloved community theatre director just days
    before the opening night of a play brings the small town to a standstill. The
    lead actress, deeply connected to the theatre and its community, uses her local
    knowledge and relationships to expose secrets behind the curtains.'
  id: totrans-498
  prefs: []
  type: TYPE_NORMAL
  zh: 当代：一位备受喜爱的社区剧院导演在戏剧开演前仅几天被发现死亡，这使小镇陷入停滞。作为与剧院及其社区紧密相连的领衔女演员，她利用她的地方知识和关系揭露幕后的秘密。
- en: 'Edwardian: In a quiet seaside village, the local vicar is found dead under
    mysterious circumstances. A young woman, known for her charitable work and deep
    ties to the community, uses her understanding of the village''s dynamics and the
    changing tides of the Edwardian era to solve the murder.'
  id: totrans-499
  prefs: []
  type: TYPE_NORMAL
  zh: 爱德华时代：在一个宁静的海边村庄，当地的牧师在神秘的情况下被发现死亡。一位以她的慈善工作和与社区的深厚联系而闻名的年轻女性，利用她对村庄动态和爱德华时代变迁的理解来解决谋杀案。
- en: 'Paranormal: The leader of a supernatural community is found dead during a town
    festival that celebrates both the human and paranormal residents. A young witch,
    who has grown up bridging both worlds, must navigate the complex relations between
    species to uncover the truth and ensure harmony is restored.'
  id: totrans-500
  prefs: []
  type: TYPE_NORMAL
  zh: 异常现象：在庆祝人类和异常居民的双重节日的镇上节日期间，一个超自然社区的领导者被发现死亡。一位在两个世界之间长大的年轻女巫，必须穿梭于物种之间的复杂关系，揭露真相并确保恢复和谐。
- en: 5\. Unique Traditions
  id: totrans-501
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 独特传统
- en: 'Contemporary: A murder disrupts the annual pie-baking contest in a small town,
    with the victim found clutching a pie server. The contest organizer, who has spent
    years fostering tradition and community spirit, investigates the contestants''
    secret recipes and rivalries to find the murderer.'
  id: totrans-502
  prefs: []
  type: TYPE_NORMAL
  zh: 当代：一起谋杀案打乱了小镇上一年一度的派饼烘焙比赛，受害者被发现紧握着一把派刀。比赛组织者，多年来一直在培养传统和社区精神，调查参赛者的秘密食谱和竞争，以找出凶手。
- en: 'Edwardian: At a prestigious university, an ancient and secretive academic competition
    ends in tragedy when one of the competitors is murdered. A student, deeply embedded
    in the university''s traditions and aspiring to win the competition herself, deciphers
    historical clues and academic rivalries to solve the crime.'
  id: totrans-503
  prefs: []
  type: TYPE_NORMAL
  zh: 爱德华时代：在一所著名大学中，一场古老而神秘的学术竞赛以一名参赛者的谋杀告终。一位深深植根于大学传统并渴望赢得竞赛的学生，通过解读历史线索和学术竞争来解开犯罪。
- en: 'Paranormal: During a century-old festival where the veil between the living
    and the dead is thinnest, a medium finds a spirit who cannot rest because of their
    unresolved murder. She must navigate the festival''s rituals and uncover hidden
    paranormal practices to bring peace to the restless spirit and catch the killer.'
  id: totrans-504
  prefs: []
  type: TYPE_NORMAL
  zh: 异常现象：在一个百年的节日里，生与死之间的隔阂最薄，一位灵媒发现了一个因为未解决的谋杀案而无法安息的灵魂。她必须穿梭于节日的仪式中，揭露隐藏的异常行为，以平息不安的灵魂并抓住凶手。
- en: 6\. Protective Instincts
  id: totrans-505
  prefs: []
  type: TYPE_NORMAL
  zh: 6. 保护本能
- en: 'Contemporary: When environmental activists are accused of murdering a developer
    planning to destroy a beloved local park, an urban gardener with a deep connection
    to the park''s community digs into the conflict, using her environmental knowledge
    and community ties to uncover the truth.'
  id: totrans-506
  prefs: []
  type: TYPE_NORMAL
  zh: 当代：当环境活动家被指控谋杀了一个计划摧毁一个深受喜爱的当地公园的开发者时，一位与公园社区有着深厚联系的都市园丁深入冲突，利用她的环境知识和社区联系来揭露真相。
- en: 'Edwardian: A cherished historical landmark faces demolition to make way for
    industrial progress, sparking outrage. After a prominent advocate for its preservation
    is killed, a historian with a passion for Edwardian architecture becomes embroiled
    in a dangerous investigation to save the landmark and solve the murder.'
  id: totrans-507
  prefs: []
  type: TYPE_NORMAL
  zh: 爱德华时代：一个受到珍视的历史地标面临被拆除以腾出空间用于工业进步，引发了公愤。在一位著名的保护者被谋杀后，一位对爱德华时代建筑充满热情的历史学家陷入了一场危险的调查，以拯救这个地标并解决谋杀案。
- en: 'Paranormal: A guardian of a magical sanctuary finds her protege dead under
    suspicious circumstances. Driven by a duty to protect her magical charges and
    the sanctuary''s secrets, she must use her powers and knowledge of ancient lore
    to uncover a threat that could destroy the magical world.'
  id: totrans-508
  prefs: []
  type: TYPE_NORMAL
  zh: 异常现象：一位守护着魔法圣地的守护者发现她的门徒在可疑的情况下死亡。在保护她所保护的魔法生物和圣地的秘密的责任驱使下，她必须运用她的力量和对古老知识的了解来揭露一个可能摧毁魔法世界的威胁。
- en: 7\. Sensory Connections
  id: totrans-509
  prefs: []
  type: TYPE_NORMAL
  zh: 7. 感官联系
- en: 'Contemporary: The scent of a specific artisanal chocolate lingers at the scene
    of a chocolatier''s murder, leading his apprentice, who has a unique sensory connection
    to her mentor''s creations, on a journey through culinary secrets and the sensory
    world of chocolate making to find the killer.'
  id: totrans-510
  prefs: []
  type: TYPE_NORMAL
  zh: 当代：一种特定手工巧克力的气味在巧克力制作师的谋杀现场徘徊，引导她的学徒——这位学徒与导师的创作有着独特的感官联系——在烹饪秘密和巧克力制作的感官世界中寻找凶手。
- en: 'Edwardian: The haunting sound of a rare musical composition is the last thing
    heard by a musicologist before his untimely death. His protégé, possessing an
    extraordinary ear for Edwardian musical nuances, follows a trail of notes and
    manuscripts to uncover a deadly rivalry.'
  id: totrans-511
  prefs: []
  type: TYPE_NORMAL
  zh: 爱德华时代：一位音乐学家在不幸去世前听到了一首罕见音乐作品的令人毛骨悚然的旋律。他的弟子，拥有对爱德华时代音乐细微差别的非凡听觉，沿着音符和手稿的线索追踪，揭开了一场致命的竞争。
- en: 'Paranormal: A perfumer with the ability to detect supernatural essences finds
    an otherworldly scent at the scene of a murder. To solve the mystery, she must
    decipher the scent''s origins and its connection to ancient rituals, leading her
    into the depths of the paranormal underworld.'
  id: totrans-512
  prefs: []
  type: TYPE_NORMAL
  zh: 超自然：一位能够检测超自然精气的调香师在谋杀现场发现了一种超凡脱俗的气味。为了解开谜团，她必须解读气味的起源及其与古代仪式的联系，将她带入超自然世界深处的黑暗。
- en: 8\. Personal Sanctuary
  id: totrans-513
  prefs: []
  type: TYPE_NORMAL
  zh: 8. 个人圣地
- en: 'Contemporary: A murder in a peaceful yoga retreat shatters the tranquility
    for a dedicated instructor. She must balance her search for inner peace with her
    determination to find justice for her friend, using her knowledge of the retreat''s
    serene environment and her insight into her clients'' lives.'
  id: totrans-514
  prefs: []
  type: TYPE_NORMAL
  zh: 当代：在一个和平的瑜伽静修中心发生的一起谋杀案打破了一位敬业教练的宁静。她必须在寻找内心平和与决心为朋友伸张正义之间取得平衡，利用她对静修中心宁静环境的了解以及对她客户生活的洞察。
- en: 'Edwardian: The conservatory of a grand estate, a place of solace and study
    for an amateur botanist, becomes the scene of a mysterious death. She must navigate
    the intricate social web of Edwardian society and the natural world she loves
    to uncover the poisoner among them.'
  id: totrans-515
  prefs: []
  type: TYPE_NORMAL
  zh: 爱德华时代：一个宏伟庄园的温室，一个业余植物学家寻求安慰和研究的场所，成为了一起神秘死亡的现场。她必须穿梭于爱德华时代社会的复杂社交网络和她热爱的自然世界，以揭露其中的毒药者。
- en: 'Paranormal: In a hidden library that safeguards magical tomes, the librarian
    discovers a colleague dead with an ancient curse. She must use her intimate knowledge
    of the library''s enchanted nooks and arcane books to break the curse and solve
    the murder, protecting her sanctuary from dark forces.'
  id: totrans-516
  prefs: []
  type: TYPE_NORMAL
  zh: 超自然：在一个保护魔法卷轴的隐藏图书馆中，图书管理员发现一位同事死在古老的诅咒下。她必须利用她对图书馆魔法角落和神秘书籍的深入了解来破解诅咒并解决谋杀案，保护她的圣地免受黑暗力量的侵害。
- en: These story ideas weave the setting deeply into the fabric of the mystery, ensuring
    that the environment and the narrative are inextricably linked, and enhancing
    the emotional engagement of both the characters and the readers.
  id: totrans-517
  prefs: []
  type: TYPE_NORMAL
  zh: 这些故事想法将背景深深地编织进神秘故事的纹理中，确保环境和叙事不可分割地联系在一起，并增强角色和读者之间的情感参与。
- en: I only asked for ten examples to save space, but you can ask for more in-depth
    detail about any aspect of a specific setting and build a comprehensive library
    of plot ideas about the setting.
  id: totrans-518
  prefs: []
  type: TYPE_NORMAL
  zh: 我只要求了十个例子以节省空间，但你可以在任何特定背景的任何方面要求更深入的了解，并建立一个关于该背景的情节想法的全面图书馆。
- en: I hope that this exercise shows you how, by following these tips and utilizing
    ChatGPT, you can create immersive, engaging settings that will transport your
    readers into the storyworld of your novel through the plot and character development.
  id: totrans-519
  prefs: []
  type: TYPE_NORMAL
  zh: 我希望这个练习能让你看到，通过遵循这些提示并利用ChatGPT，你可以创建沉浸式、引人入胜的背景，通过情节和人物发展将读者的注意力转移到你小说的故事世界中。
- en: Anchoring the Series in Its Setting
  id: totrans-520
  prefs: []
  type: TYPE_NORMAL
  zh: 将系列定位于其背景
- en: Your setting should serve as the anchor for the series, providing a consistent
    thread that ties individual books together.
  id: totrans-521
  prefs: []
  type: TYPE_NORMAL
  zh: 你的背景应该成为系列的锚点，提供一条将个别书籍联系起来的连贯线索。
- en: While plots and subplots may vary, the setting remains a constant, familiar
    element that readers return to.
  id: totrans-522
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然情节和副情节可能有所不同，但背景始终是一个恒定、熟悉的因素，读者们会回到这里。
- en: 'To achieve this:'
  id: totrans-523
  prefs: []
  type: TYPE_NORMAL
  zh: 要实现这一点：
- en: 'Recurring Locations: Develop a set of locations that frequently appear throughout
    the series, such as a store, public library, the café where characters gather,
    a town hall where community meetings are held, or a park that’s the setting for
    many significant moments.'
  id: totrans-524
  prefs: []
  type: TYPE_NORMAL
  zh: 重复出现的地点：在整个系列中频繁出现的地点集合，例如一家商店、公共图书馆、人物聚集的咖啡馆、举行社区会议的市政厅，或者许多重要时刻的背景公园。
- en: The sleuth may leave her home setting for short periods, but readers love to
    know more about the setting and the locals.
  id: totrans-525
  prefs: []
  type: TYPE_NORMAL
  zh: 侦探可能偶尔会离开她的家庭环境，但读者们喜欢了解更多关于背景和当地人的信息。
- en: 'Character-Setting Interaction: Show regular interactions between your characters
    and the setting.'
  id: totrans-526
  prefs: []
  type: TYPE_NORMAL
  zh: 人物-背景互动：展示你的角色与背景之间的常规互动。
- en: If the sleuth runs a store, reveal the impact of new town developments. This
    could be the protagonist's routine at their favorite spot, the seasonal festivals
    they participate in, or their efforts to solve a problem affecting the community.
  id: totrans-527
  prefs: []
  type: TYPE_NORMAL
  zh: 如果侦探经营一家商店，揭示新城镇发展的影响。这可能包括主角在他们最喜欢的地点的日常活动，他们参与的季节性节日，或他们解决影响社区的难题的努力。
- en: 'Evolve with the Series: As the series progresses, allow the setting to grow
    and change alongside the characters. New developments, both physical and societal,
    can reflect the ongoing narrative and keep the setting vibrant and engaging.'
  id: totrans-528
  prefs: []
  type: TYPE_NORMAL
  zh: 与系列一起发展：随着系列的推进，让设置与角色一起成长和变化。新的发展和社会变革可以反映持续的叙事，并保持设置充满活力和吸引力。
- en: 'The Importance of Consistency: Maintaining Continuity in Setting Across the
    Series'
  id: totrans-529
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 一致性的重要性：在整个系列中保持设置连贯性
- en: In a cozy mystery series, the setting is not just a backdrop for the narrative
    but a living, breathing character that evolves and grows with each installment.
  id: totrans-530
  prefs: []
  type: TYPE_NORMAL
  zh: 在温馨的悬疑系列中，设置不仅仅是叙事的背景，而是一个有生命、有呼吸的角色，随着每一集的推出而发展和成长。
- en: Maintaining consistency in this setting across the series is crucial for creating
    a believable and immersive world that readers can return to with each new book.
  id: totrans-531
  prefs: []
  type: TYPE_NORMAL
  zh: 在整个系列中保持这一设置的连贯性对于创造一个可信且沉浸式的世界至关重要，读者可以随着每一本新书返回这个世界。
- en: Consistent settings provide a stable foundation upon which the plot can unfold,
    characters can develop, and themes can be explored.
  id: totrans-532
  prefs: []
  type: TYPE_NORMAL
  zh: 一致的设置提供了一个稳定的基石，在这个基础上情节可以展开，角色可以发展，主题可以探索。
- en: Create a Series Bible
  id: totrans-533
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 创建系列圣经
- en: One of the most effective tools for maintaining consistency is a series bible,
    a comprehensive document that details every aspect of your series' setting.
  id: totrans-534
  prefs: []
  type: TYPE_NORMAL
  zh: 维持一致性的最有效工具之一是系列圣经，这是一份详尽说明你系列设置每个方面的综合性文件。
- en: This includes maps, descriptions of key locations, a calendar of events, and
    notes on cultural norms and community dynamics. Referencing this bible when writing
    each book ensures that details remain consistent and continuity errors are avoided.
  id: totrans-535
  prefs: []
  type: TYPE_NORMAL
  zh: 这包括地图、关键地点的描述、事件日历以及关于文化规范和社区动态的笔记。在撰写每一本书时参考这个圣经确保细节保持一致，避免连贯性错误。
- en: Record of Events. Cozy mysteries often unfold in small, close-knit communities
    where history and tradition play significant roles.
  id: totrans-536
  prefs: []
  type: TYPE_NORMAL
  zh: 事件记录。温馨的悬疑故事通常发生在小而紧密团结的社区中，历史和传统在其中扮演着重要的角色。
- en: Keeping a chronological record of major events, character birthdays, and significant
    anniversaries helps maintain continuity in how the setting changes and reacts
    to the narrative over time.
  id: totrans-537
  prefs: []
  type: TYPE_NORMAL
  zh: 保持重大事件、角色生日和重要纪念日的年表记录有助于维持设置随时间变化和反应于叙事的连贯性。
- en: Keep logs of any changes in the setting that are mentioned in subsequent books,
    such as a café renovated after a fire, or a garden planted in memory of a character.
  id: totrans-538
  prefs: []
  type: TYPE_NORMAL
  zh: 记录后续书籍中提到的任何设置变化，例如火灾后翻新的咖啡馆，或为纪念角色而种植的花园。
- en: 'Cultural Elements: The cultural setting, including traditions, festivals, and
    community norms, should remain consistent unless changed by narrative events.
    Documenting these elements and how they are featured in each book helps maintain
    a sense of community identity and continuity.'
  id: totrans-539
  prefs: []
  type: TYPE_NORMAL
  zh: 文化元素：文化背景，包括传统、节日和社区规范，除非叙事事件改变，否则应保持一致。记录这些元素以及它们在每本书中的呈现有助于维持社区身份感和连贯性。
- en: Challenges and Solutions in Setting Consistency
  id: totrans-540
  prefs: []
  type: TYPE_NORMAL
  zh: 设置一致性中的挑战和解决方案
- en: A consistent setting contributes significantly to the identity of a cozy mystery
    series. It becomes a character in its own right, with readers forming attachments
    to the world you’ve created.
  id: totrans-541
  prefs: []
  type: TYPE_NORMAL
  zh: 一致的设置对温馨悬疑系列的身份有重大贡献。它成为了一个角色，读者会对你创造的世界产生依恋。
- en: This familiarity is comforting and appealing, drawing readers back with each
    new installment.
  id: totrans-542
  prefs: []
  type: TYPE_NORMAL
  zh: 这种熟悉感令人感到安慰和吸引人，随着每一集的推出吸引读者回来。
- en: With its unique characteristics and consistent portrayal, the setting becomes
    a hallmark of the series, distinguishing it in the crowded, cozy mystery genre.
  id: totrans-543
  prefs: []
  type: TYPE_NORMAL
  zh: 通过其独特的特征和一致的描绘，设置成为系列的标志，在拥挤的温馨悬疑类型中脱颖而出。
- en: 'Develop Setting: Expansion and Gradual Worldbuilding'
  id: totrans-544
  prefs: []
  type: TYPE_NORMAL
  zh: 发展设置：扩展和逐步世界构建
- en: A well-crafted setting evolves naturally over time, mirroring the growth of
    characters and the unfolding of the series' overarching plot.
  id: totrans-545
  prefs: []
  type: TYPE_NORMAL
  zh: 一个精心设计的设置随着时间的推移自然地发展，反映了角色的成长和系列整体情节的展开。
- en: This section explores the nuanced approach to gradually expanding the setting
    and worldbuilding, ensuring the world remains mysterious, fresh, and engaging
    throughout the series.
  id: totrans-546
  prefs: []
  type: TYPE_NORMAL
  zh: 本节探讨了逐渐扩展背景和世界构建的微妙方法，确保整个系列中世界始终保持神秘、新鲜和引人入胜。
- en: The Art of Gradual Worldbuilding
  id: totrans-547
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 渐进式世界构建的艺术
- en: The setting should unfold slowly, revealing its colors and shapes over time
    rather than all at once.
  id: totrans-548
  prefs: []
  type: TYPE_NORMAL
  zh: 背景（setting）应该缓慢展开，随着时间的推移逐渐展现其色彩和形状，而不是一次性全部展现。
- en: This slow-drip approach to worldbuilding encourages readers to invest in the
    series and be eager to discover new aspects of the setting with each book.
  id: totrans-549
  prefs: []
  type: TYPE_NORMAL
  zh: 这种缓慢滴漏式的方法鼓励读者投资于系列，并渴望在每本书中发现背景的新方面。
- en: Start with the essentials of the setting that are necessary for the initial
    plot, then layer additional details over subsequent books. This could include
    historical backstories, cultural nuances, or hidden locations within the setting
    that become relevant as new mysteries unfold.
  id: totrans-550
  prefs: []
  type: TYPE_NORMAL
  zh: 从初始情节所需的背景要素开始，然后在随后的书籍中逐步添加更多细节。这可能包括历史背景、文化细微差别或背景中的隐藏地点，这些地点在新悬疑展开时变得相关。
- en: While the core setting remains constant, introducing new locations within that
    setting can offer fresh backdrops for each book's plot.
  id: totrans-551
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然核心背景保持不变，但在其中引入新的地点可以为每本书的情节提供新的背景。
- en: A series set in a small town might explore different businesses, landmarks,
    or natural features in each installment, enriching the world and offering new
    avenues for storytelling.
  id: totrans-552
  prefs: []
  type: TYPE_NORMAL
  zh: 以小城镇为背景的系列可能会在每一部作品中探索不同的商业、地标或自然特征，丰富世界并开辟新的叙事途径。
- en: Changes in the setting, whether through development projects, natural events,
    or shifts in community dynamics, can mirror or influence the series' narrative
    progression, keeping the setting dynamic and reflective of the stories it hosts.
  id: totrans-553
  prefs: []
  type: TYPE_NORMAL
  zh: 背景的变化，无论是通过开发项目、自然事件还是社区动态的变化，都可以反映或影响系列的叙事进展，使背景保持动态并反映其承载的故事。
- en: Employ subplots as a means to explore different corners of the setting. A mystery
    involving a local historical society can delve into the town's history, while
    a storyline about a community event can showcase local customs and social dynamics.
  id: totrans-554
  prefs: []
  type: TYPE_NORMAL
  zh: 利用副线剧情作为探索背景不同角落的手段。涉及当地历史学会的悬疑故事可以深入城镇的历史，而关于社区活动的剧情可以展示当地习俗和社会动态。
- en: Keeping the World Mysterious and Fresh
  id: totrans-555
  prefs: []
  type: TYPE_NORMAL
  zh: 保持世界神秘且新鲜
- en: The key to successful worldbuilding in a cozy mystery series is to keep the
    setting mysterious and fresh, revealing new elements gradually to sustain reader
    interest across multiple books.
  id: totrans-556
  prefs: []
  type: TYPE_NORMAL
  zh: 在温馨悬疑系列中成功构建世界的关键在于保持背景神秘且新鲜，逐渐揭示新元素以维持读者在多本书中的兴趣。
- en: '![](image_rsrc42Y.jpg)'
  id: totrans-557
  prefs: []
  type: TYPE_IMG
  zh: '![image_rsrc42Y](image_rsrc42Y.jpg)'
- en: Can you give me 5 ways in which a cozy mystery story setting can change and
    develop over a series of linked books?
  id: totrans-558
  prefs: []
  type: TYPE_NORMAL
  zh: 你能提供五种方法来说明温馨悬疑故事背景如何在一系列相互关联的书中改变和发展吗？
- en: '![](image_rsrc42Z.jpg)'
  id: totrans-559
  prefs: []
  type: TYPE_IMG
  zh: '![image_rsrc42Z](image_rsrc42Z.jpg)'
- en: 'Developing and evolving the setting in a series of cozy mystery books can significantly
    enhance the reader''s engagement and keep the series fresh and intriguing. Here
    are five ways to change and develop the setting over a series:'
  id: totrans-560
  prefs: []
  type: TYPE_NORMAL
  zh: 在一系列温馨悬疑书中发展和演变背景可以显著增强读者的参与度，并保持系列新鲜有趣。以下是改变和发展背景的五种方法：
- en: 1\. Expansion of the Geographical Scope
  id: totrans-561
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 地理范围的扩展
- en: 'Initial Books: Start with a tight-knit community or a small town as the primary
    setting, allowing readers to become familiar with the locale and its inhabitants.'
  id: totrans-562
  prefs: []
  type: TYPE_NORMAL
  zh: 初始书籍：以紧密团结的社区或小城镇作为主要背景，让读者熟悉该地区及其居民。
- en: 'Subsequent Development: Gradually expand the geographical scope by introducing
    neighboring towns, cities, or even countries. This can be done through trips taken
    by the protagonist, cases that extend beyond the initial setting, or the introduction
    of characters from different places. This expansion allows for varied backdrops,
    new characters, and diverse mysteries, keeping the series dynamic.'
  id: totrans-563
  prefs: []
  type: TYPE_NORMAL
  zh: 随后的开发：通过引入邻近的城镇、城市甚至国家来逐渐扩大地理范围。这可以通过主角的旅行、超出初始背景的案件或来自不同地方的人物引入来实现。这种扩展提供了多样化的背景、新角色和多样化的悬疑，使系列保持活力。
- en: 2\. Seasonal Changes and Festivals
  id: totrans-564
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 季节变化和节日
- en: 'Initial Books: Establish the setting in a specific season, which influences
    the type of activities, community events, and potentially the nature of the mysteries.'
  id: totrans-565
  prefs: []
  type: TYPE_NORMAL
  zh: 初始书籍：在特定季节中建立背景，这会影响活动类型、社区事件，甚至可能影响悬疑的性质。
- en: 'Subsequent Development: Rotate through different seasons and incorporate local
    or regional festivals, holidays, and traditions as backdrops for new mysteries.
    Seasonal changes can affect the atmosphere, introduce seasonal crimes (e.g., thefts
    during a summer festival or mysteries related to winter holiday traditions), and
    showcase the community in different lights.'
  id: totrans-566
  prefs: []
  type: TYPE_NORMAL
  zh: 后续发展：在不同的季节中轮换，并将当地或地区的节日、假日和传统作为新神秘事件的背景。季节变化可以影响氛围，引入季节性犯罪（例如，夏季节日的盗窃或与冬季节日传统相关的神秘事件），并从不同的角度展示社区。
- en: 3\. Historical Revelation and Exploration
  id: totrans-567
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 历史揭示与探索
- en: 'Initial Books: Hint at the town''s history or specific landmarks with mysterious
    pasts without fully exploring them.'
  id: totrans-568
  prefs: []
  type: TYPE_NORMAL
  zh: 初期书籍：暗示城镇的历史或具有神秘过去的特定地标，但不要完全探索它们。
- en: 'Subsequent Development: Delve into the history of the setting or its landmarks
    as part of the plot in later books. Discovering historical mysteries, renovating
    an old building with secrets, or uncovering ancestral connections can add depth
    to the setting and provide fresh storylines.'
  id: totrans-569
  prefs: []
  type: TYPE_NORMAL
  zh: 后续发展：在后续的书籍中，将场景或地标的历史作为情节的一部分进行深入探讨。发现历史之谜、翻新带有秘密的旧建筑或揭示祖先的联系可以为场景增添深度，并提供新的故事线索。
- en: 4\. Cultural and Societal Evolution
  id: totrans-570
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 文化和社会演变
- en: 'Initial Books: Present the cultural and social norms of the community, along
    with its conflicts and challenges.'
  id: totrans-571
  prefs: []
  type: TYPE_NORMAL
  zh: 初期书籍：展示社区的文化和社会规范，以及其冲突和挑战。
- en: 'Subsequent Development: Show how the community evolves in response to the events
    of the books or external influences. This could include changes in leadership,
    societal norms, economic conditions, or cultural integration. New businesses,
    families, or community projects can serve as focal points for mysteries, reflecting
    the dynamic nature of society.'
  id: totrans-572
  prefs: []
  type: TYPE_NORMAL
  zh: 后续发展：展示社区如何对书籍中的事件或外部影响做出反应。这可能包括领导层的变化、社会规范、经济条件或文化融合的变化。新企业、家庭或社区项目可以作为神秘事件的焦点，反映社会的动态性。
- en: 5\. Character-Driven Changes
  id: totrans-573
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 以角色为中心的变化
- en: 'Initial Books: Focus on how the main characters interact with and influence
    their immediate surroundings.'
  id: totrans-574
  prefs: []
  type: TYPE_NORMAL
  zh: 初期书籍：关注主要角色如何与他们的直接环境互动并产生影响。
- en: 'Subsequent Development: As characters grow, their actions can lead to significant
    changes in the setting. For example, the protagonist might take a more active
    role in the community, such as running for office, starting a business, or leading
    a community initiative, which can introduce new settings within the familiar locale.
    Their personal development can lead to exploring new social circles, institutions,
    and hidden aspects of the town, offering new venues for mysteries.'
  id: totrans-575
  prefs: []
  type: TYPE_NORMAL
  zh: 后续发展：随着角色的成长，他们的行为可能导致场景发生重大变化。例如，主角可能在社会中扮演更积极的角色，如竞选公职、创办企业或领导社区倡议，这可以在熟悉的地区引入新的场景。他们的个人发展可能导致探索新的社交圈、机构和城镇的隐藏方面，为神秘事件提供新的场所。
- en: By dynamically changing and developing the setting across a series, an author
    can maintain reader interest, build a richer story world, and provide fresh contexts
    for each new mystery, enhancing both character depth and plot complexity.
  id: totrans-576
  prefs: []
  type: TYPE_NORMAL
  zh: 通过在一系列书籍中动态地改变和发展场景，作者可以保持读者的兴趣，构建更丰富的故事世界，并为每个新的神秘事件提供新的背景，从而增强人物深度和情节复杂性。
- en: Suggestions 4 and 5 are particularly important.
  id: totrans-577
  prefs: []
  type: TYPE_NORMAL
  zh: 建议4和5尤为重要。
- en: Each of these ideas can also be developed as part of subplots with secondary
    characters who are part of the community—linking the plot of the mystery with
    the setting and the residents.
  id: totrans-578
  prefs: []
  type: TYPE_NORMAL
  zh: 这些想法也可以作为副情节的一部分进行发展，其中次要角色是社区的一部分——将神秘情节与场景和居民联系起来。
- en: As your characters interact with their surroundings and react to threats to
    what they value, it makes those themes more accurate and relevant for readers.
  id: totrans-579
  prefs: []
  type: TYPE_NORMAL
  zh: 当你的角色与周围环境互动并对他们珍视的事物受到威胁做出反应时，这使得这些主题对读者来说更加准确和相关。
- en: WORKED EXAMPLE. Crafts and Paranormal Story Idea
  id: totrans-580
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 工作示例。工艺与超自然故事想法
- en: 'Category: Crafts and Hobbies Cozy Mystery. Amateur Sleuth. Woman Sleuth. Paranormal
    mystery.'
  id: totrans-581
  prefs: []
  type: TYPE_NORMAL
  zh: 类别：工艺与爱好温馨悬疑。业余侦探。女性侦探。超自然悬疑。
- en: 'Themes and Ideas: Crafts and Hobbies. Knitting, Crocheting, and Quilting. Coastal
    and Beach Communities. Psychic and Supernatural Abilities'
  id: totrans-582
  prefs: []
  type: TYPE_NORMAL
  zh: 主题和想法：工艺与爱好。编织、钩针和拼布。沿海和海滩社区。心灵感应和超自然能力
- en: What if? The sleuth is a young woman helping her psychic aunt run a knitting
    and craft store in a small seaside town. The murder mysteries are based around
    the inhabitants of this town.
  id: totrans-583
  prefs: []
  type: TYPE_NORMAL
  zh: 如果？侦探是一位年轻女性，帮助她的灵媒阿姨在小海滨城镇经营一家编织和手工艺店。谋杀谜案围绕着这个城镇的居民展开。
- en: 'Decision Two: Emotional Experience'
  id: totrans-584
  prefs: []
  type: TYPE_NORMAL
  zh: 决策二：情感体验
- en: I want this to be a light-hearted, fun, and witty escapist story with a well-motivated
    sleuth and an engaging murder mystery. Camaraderie and Friendship are essential
    elements, together with connection and belonging. The Psychic element adds another
    layer of interest.
  id: totrans-585
  prefs: []
  type: TYPE_NORMAL
  zh: 我希望这是一个轻松愉快、有趣且机智的逃避现实的故事，有一个动机良好的侦探和引人入胜的谋杀谜案。友谊和归属感是基本元素，加上心理元素增添了另一层兴趣。
- en: 'The Setting: A small historical coastal town that has spread out across the
    valley behind it. It has an active historical society based in the local museum
    and public library.'
  id: totrans-586
  prefs: []
  type: TYPE_NORMAL
  zh: 背景：一个坐落在其后山谷中的小历史沿海城镇。它有一个以当地博物馆和公共图书馆为基础的活跃历史学会。
- en: '![A diagram of a story generator  Description automatically generated](image_rsrc430.jpg)'
  id: totrans-587
  prefs: []
  type: TYPE_IMG
  zh: '![故事生成器示意图  描述自动生成](image_rsrc430.jpg)'
- en: Brainstorm New Story Ideas for Book One
  id: totrans-588
  prefs: []
  type: TYPE_NORMAL
  zh: 为第一本书头脑风暴新故事想法
- en: This really is the fun part of any story development process.
  id: totrans-589
  prefs: []
  type: TYPE_NORMAL
  zh: 这真的是任何故事发展过程中的有趣部分。
- en: You have already defined the theme and niche, the emotional voice and tone,
    and the setting for your series.
  id: totrans-590
  prefs: []
  type: TYPE_NORMAL
  zh: 你已经定义了主题和细分市场、情感声音和基调以及系列的背景设定。
- en: Using these parameters, the goal now is to generate very simple story scenarios
    that spark your imagination.
  id: totrans-591
  prefs: []
  type: TYPE_NORMAL
  zh: 使用这些参数，现在的目标是生成非常简单的情节场景，激发你的想象力。
- en: Based on these three decisions, AI tools such as ChatGPT, Claude, and others
    can easily generate 50 to 100 possible story ideas.
  id: totrans-592
  prefs: []
  type: TYPE_NORMAL
  zh: 基于这三个决策，ChatGPT、Claude等AI工具可以轻松生成50到100个可能的故事想法。
- en: This is going to be a simple prompt at this stage since we are only looking
    for story ideas for book one, not fully fleshed-out plot outlines.
  id: totrans-593
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个阶段，这将是一个简单的提示，因为我们只寻找第一本书的故事想法，而不是完整的情节大纲。
- en: Once we have the premise for the first book in the series, then we can get to
    work and add more details about the main characters and subplots.
  id: totrans-594
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦我们有了系列第一本书的前提，我们就可以开始工作，并添加更多关于主要角色和副线剧情的细节。
- en: I am going to ask for 10 story ideas to save space, but you could ask for as
    many as you wish.
  id: totrans-595
  prefs: []
  type: TYPE_NORMAL
  zh: 我将要求10个故事想法以节省空间，但你也可以要求尽可能多的想法。
- en: '![](image_rsrc431.jpg)'
  id: totrans-596
  prefs: []
  type: TYPE_IMG
  zh: '![image_rsrc431.jpg]'
- en: Give me 10 different, engaging story ideas for a paranormal, cozy murder mystery
    set in England. The sleuth is a young woman working in her aunt's yarn and craft
    store in a busy coastal town. Her aunt is a psychic. You chose the plot, killer,
    and plot twists. There should be two murders in this book. Be sure to make the
    plot twist clear.
  id: totrans-597
  prefs: []
  type: TYPE_NORMAL
  zh: 给我10个不同、引人入胜的故事想法，这是一个设定在英国的灵异温馨谋杀谜案。侦探是一位年轻女性，她在繁忙的海滨城镇她阿姨的毛线和手工艺店里工作。她的阿姨是一位灵媒。你选择情节、杀手和情节转折。这本书应该有两起谋杀案。务必使情节转折清晰。
- en: '![](image_rsrc432.jpg)'
  id: totrans-598
  prefs: []
  type: TYPE_IMG
  zh: '![image_rsrc432.jpg]'
- en: The Seaside Spirits
  id: totrans-599
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 海滨幽灵
- en: 'Plot: In the quaint coastal town of Seabrook, a renowned author is found dead
    under mysterious circumstances during a book signing at the local library. Days
    later, a local fisherman washes ashore, another victim. The sleuth, a young woman
    named Ellie, working in her psychic aunt''s yarn store, discovers a thread that
    connects both victims to an ancient maritime legend.'
  id: totrans-600
  prefs: []
  type: TYPE_NORMAL
  zh: 情节：在宁静的海滨城镇Seabrook，一位著名的作者在当地图书馆的签书活动中神秘死亡。几天后，一位当地渔民被冲上岸，成为另一个受害者。侦探，一位名叫Ellie的年轻女性，在她在灵媒阿姨的毛线店里工作，发现了一条将两位受害者与一个古老的航海传说联系起来的线索。
- en: 'Killer: A disgruntled local historian who believed the victims were exploiting
    and distorting the town''s history for personal gain.'
  id: totrans-601
  prefs: []
  type: TYPE_NORMAL
  zh: 杀手：一位不满的地方历史学家，他认为受害者正在利用和扭曲城镇的历史以谋取个人利益。
- en: 'Plot Twist: The aunt''s psychic abilities reveal that the spirits of the legend
    were not seeking vengeance, as initially believed, but were actually trying to
    protect a secret buried with them.'
  id: totrans-602
  prefs: []
  type: TYPE_NORMAL
  zh: 情节转折：阿姨的灵媒能力揭示，传说中的幽灵并非寻求报复，如最初所相信的那样，而是实际上试图保护与他们一起埋藏的秘密。
- en: The Knitted Clue
  id: totrans-603
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 编织线索
- en: 'Plot: A competitive knitting competition turns deadly when one of the judges,
    an influential fashion designer, is found murdered, followed by the organizer
    of the event. Ellie, with her knack for solving mysteries and her aunt''s psychic
    insights, unravels clues hidden in knitted patterns left at the crime scenes.'
  id: totrans-604
  prefs: []
  type: TYPE_NORMAL
  zh: 情节：一场激烈的编织比赛变得致命，因为一位有影响力的时尚设计师，作为评委之一，被发现被谋杀，随后是活动的组织者。艾莉凭借她解决谜题的天赋和阿姨的精神洞察力，揭开了隐藏在犯罪现场留下的编织图案中的线索。
- en: 'Killer: The killer is a rival contestant, driven by jealousy and a dark family
    secret related to the murdered judge.'
  id: totrans-605
  prefs: []
  type: TYPE_NORMAL
  zh: 杀手：杀手是一位嫉妒心强、与被谋杀的法官有关的黑暗家族秘密相关的竞争对手。
- en: 'Plot Twist: The organizer was not a second target, but an accomplice gone wrong,
    trying to sabotage the competition from within.'
  id: totrans-606
  prefs: []
  type: TYPE_NORMAL
  zh: 惊转剧情：组织者并非第二个目标，而是一个走错路的帮凶，试图从内部破坏比赛。
- en: Lighthouse Shadows
  id: totrans-607
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 灯塔阴影
- en: 'Plot: When a body is discovered at the base of Seabrook''s historic lighthouse,
    followed by the death of a local historian researching the lighthouse''s past,
    Ellie finds herself winding through a mystery that spans generations.'
  id: totrans-608
  prefs: []
  type: TYPE_NORMAL
  zh: 情节：当一具尸体在Seabrook历史悠久的灯塔底部被发现，随后是一位研究灯塔过去的当地历史学家的死亡，艾莉发现自己陷入了一个跨越几代的谜团。
- en: 'Killer: A member of the town council, fearing the historian''s findings would
    thwart their lucrative development plans.'
  id: totrans-609
  prefs: []
  type: TYPE_NORMAL
  zh: 杀手：一位担心历史学家的发现会阻碍他们有利可图的开发计划的镇议会成员。
- en: 'Plot Twist: The aunt''s visions suggest the lighthouse is haunted not by its
    past but by a recent secret, leading to a hidden chamber that holds the key to
    the murders.'
  id: totrans-610
  prefs: []
  type: TYPE_NORMAL
  zh: 惊转剧情：阿姨的预兆表明灯塔并非被其过去所困扰，而是被一个最近的秘密所困扰，这个秘密引向一个隐藏的密室，那里藏有解开谋杀案的关键。
- en: The Yarn Bomber's Last Pattern
  id: totrans-611
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 织布炸弹者的最后图案
- en: 'Plot: Seabrook becomes the canvas for a mysterious yarn bomber, whose playful
    street art takes a dark turn when two bodies are found wrapped in yarn patterns.
    Ellie''s investigation uncovers a web of rivalries.'
  id: totrans-612
  prefs: []
  type: TYPE_NORMAL
  zh: 情节：Seabrook成为一位神秘的织布炸弹者的画布，他的街头艺术起初是轻松的，但当两具尸体被发现在织物图案中包裹时，它转向了黑暗。艾莉的调查揭露了一个竞争的网。
- en: 'Killer: A local artist using the yarn bombings to cover his tracks and eliminate
    his rivals.'
  id: totrans-613
  prefs: []
  type: TYPE_NORMAL
  zh: 杀手：一位当地艺术家利用织布炸弹来掩盖他的行踪并消除他的竞争对手。
- en: 'Plot Twist: The final pattern is actually a cryptic confession to the crimes,
    designed to be deciphered only by Ellie, whom the killer underestimates.'
  id: totrans-614
  prefs: []
  type: TYPE_NORMAL
  zh: 惊转剧情：最后的图案实际上是对犯罪的一种隐晦的供认，设计成只有艾莉能够解读，而杀手低估了她。
- en: The Psychic Fair Murder
  id: totrans-615
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 精神力谋杀案
- en: 'Plot: A psychic fair in the town ends in tragedy when the organizer and a guest
    psychic are poisoned.'
  id: totrans-616
  prefs: []
  type: TYPE_NORMAL
  zh: 情节：镇上的一个精神力集市以悲剧告终，组织者和一位受邀的精神力者被毒害。
- en: 'Killer: The murderer is a debunked psychic seeking revenge on the community
    that exposed them, using the fair as the perfect opportunity for their vendetta,
    manipulating evidence to point towards supernatural causes.'
  id: totrans-617
  prefs: []
  type: TYPE_NORMAL
  zh: 杀手：一个被揭露的精神力者，他寻求报复那些揭露他们的社区，利用这个集市作为他们复仇的完美机会，操纵证据指向超自然原因。
- en: 'Plot Twist: The psychic aunt foresees the second murder, but her vision is
    misinterpreted, leading them on a wild goose chase before the real motive is uncovered.'
  id: totrans-618
  prefs: []
  type: TYPE_NORMAL
  zh: 惊转剧情：精神力阿姨预见到第二起谋杀案，但她的预兆被误解，导致他们在揭露真实动机之前进行了一场荒唐的追逐。
- en: The Festival of Lights Murder
  id: totrans-619
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 灯光节谋杀案
- en: 'Plot: During Seabrook''s annual Festival of Lights, a beloved town elder is
    murdered, followed by the organizer of the festival. Ellie discovers a connection
    to an old, unsolved mystery involving a shipwreck off the coast.'
  id: totrans-620
  prefs: []
  type: TYPE_NORMAL
  zh: 情节：在Seabrook一年一度的灯光节期间，一位深受爱戴的镇上长者被谋杀，随后是节日的组织者。艾莉发现了一个与海岸附近一次沉船旧谜团有关的联系。
- en: 'Killer: A local antique dealer who believed the victims had discovered the
    location of the shipwreck''s lost treasure.'
  id: totrans-621
  prefs: []
  type: TYPE_NORMAL
  zh: 杀手：一个当地的古董商，他认为受害者发现了沉船失落宝藏的位置。
- en: 'Plot Twist: The treasure is revealed to be a red herring; the real motive was
    an ancient manuscript that could discredit a powerful family lineage.'
  id: totrans-622
  prefs: []
  type: TYPE_NORMAL
  zh: 惊转剧情：宝藏被揭示为一条红鲱鱼；真正的动机是一份能够玷污一个强大家族世系的古代手稿。
- en: The Psychic's Secret
  id: totrans-623
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 精神力的秘密
- en: 'Plot: When Ellie''s aunt is implicated in the murder of a rival psychic and
    a skeptic who was trying to expose them, Ellie must clear her aunt''s name. The
    investigation reveals a secret society of psychics with their own justice system.'
  id: totrans-624
  prefs: []
  type: TYPE_NORMAL
  zh: 情节：当艾莉的阿姨被卷入一位竞争对手的精神力者和试图揭露他们的怀疑论者的谋杀案中时，艾莉必须为她阿姨的名誉洗清。调查揭示了一个拥有自己正义体系的神秘精神力者秘密社团。
- en: 'Killer: The head of the society, who believed the victims posed a threat to
    their existence.'
  id: totrans-625
  prefs: []
  type: TYPE_NORMAL
  zh: 杀手：社团的头目，他认为受害者对他们存在威胁。
- en: 'Plot Twist: Ellie''s aunt had foreseen her own implication and had been trying
    to divert the investigation to protect Ellie from society’s wrath.'
  id: totrans-626
  prefs: []
  type: TYPE_NORMAL
  zh: 情节转折：艾莉的阿姨预见到自己的牵连，并一直在试图将调查转向以保护艾莉免受社会的愤怒。
- en: The Curse of the Merrow's Diamond
  id: totrans-627
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 梅罗钻石之诅咒
- en: 'Plot: A local legend about a cursed diamond resurfaces when the gem is displayed
    in Seabrook and related murders follow. Ellie navigates through curses and legends
    to find the truth.'
  id: totrans-628
  prefs: []
  type: TYPE_NORMAL
  zh: 情节：当宝石在塞布罗克展出时，关于诅咒钻石的当地传说再次浮现，随后发生了相关谋杀案。艾莉在诅咒和传说中寻找真相。
- en: 'Killer: A museum curator, obsessed with acquiring the diamond for its supposed
    mystical powers.'
  id: totrans-629
  prefs: []
  type: TYPE_NORMAL
  zh: 杀手：一位博物馆馆长，痴迷于获取钻石，因为它据说具有神秘的力量。
- en: 'Plot Twist: The diamond was a fake; the real gem had been swapped out years
    ago, and the curator had been killing to protect a secret that no longer existed.'
  id: totrans-630
  prefs: []
  type: TYPE_NORMAL
  zh: 情节转折：钻石是假的；真正的宝石多年前就被调包了，馆长一直在杀人来保护一个已经不存在的秘密。
- en: Witchcraft in Seabrook
  id: totrans-631
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 塞布罗克的巫术
- en: 'Plot: The town is rocked by the murder of a woman rumored to be a witch and
    the subsequent death of a skeptic trying to debunk the town''s supernatural beliefs.
    Ellie delves into ancient practices and modern prejudices to solve the murders.'
  id: totrans-632
  prefs: []
  type: TYPE_NORMAL
  zh: 情节：镇上因一位据称是女巫的妇女被谋杀以及试图驳斥镇上超自然信仰的怀疑者死亡而动荡不安。艾莉深入调查古代习俗和现代偏见来解决谋杀案。
- en: 'Killer: A local historian who believed the witch''s existence threatened to
    expose a fabricated history of Seabrook he had been selling.'
  id: totrans-633
  prefs: []
  type: TYPE_NORMAL
  zh: 杀手：一位相信女巫的存在威胁要揭露他一直在销售的塞布罗克伪造历史的当地历史学家。
- en: 'Plot Twist: The "witch" was actually a guardian of Seabrook''s true history,
    with her death meant to prevent the revelation of a secret that could unite the
    town.'
  id: totrans-634
  prefs: []
  type: TYPE_NORMAL
  zh: 情节转折：“女巫”实际上是一位守护着塞布罗克真实历史的守护者，她的死亡是为了防止一个秘密的揭露，这个秘密本可以团结整个城镇。
- en: The Coastal Carnage
  id: totrans-635
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 海岸屠杀
- en: 'Plot: Seabrook''s annual sailing regatta turns tragic with the murder of a
    competitive sailor and the event''s judge. Ellie discovers that the competition
    on the water is as deadly as the secrets buried beneath it.'
  id: totrans-636
  prefs: []
  type: TYPE_NORMAL
  zh: 情节：塞布罗克年度赛舟会因一位竞争性船员的谋杀和比赛的裁判死亡而变得悲剧。艾莉发现水上的比赛和隐藏在它下面的秘密一样致命。
- en: 'Killer: The co-organizer of the regatta, motivated by a hidden vendetta against
    the victims who had unknowingly wronged the killer''s family in the past.'
  id: totrans-637
  prefs: []
  type: TYPE_NORMAL
  zh: 杀手：赛舟会的共同组织者，出于对过去无意中伤害了杀手家庭的受害者的隐藏仇恨而动机。
- en: 'Plot Twist: The aunt''s psychic abilities uncover an old maritime law that
    renders the regatta a legal battleground for ancient family disputes, which the
    killer was exploiting to claim victory by blood.'
  id: totrans-638
  prefs: []
  type: TYPE_NORMAL
  zh: 情节转折：阿姨的通灵能力揭示了一项古老的航海法律，使得赛舟会变成了一个为古代家族纠纷而展开的法律战场，而杀手正是利用这一点通过血统来赢得胜利。
- en: The titles tell me that the AI has remembered that this is meant to be a fun
    and witty cozy mystery.
  id: totrans-639
  prefs: []
  type: TYPE_NORMAL
  zh: 标题告诉我，AI 记住了这应该是一个有趣而机智的温馨悬疑故事。
- en: All of the instructions have been followed, and the story ideas are based on
    the criteria included in the prompt. We also now have a name for our sleuth –
    Ellie.
  id: totrans-640
  prefs: []
  type: TYPE_NORMAL
  zh: 所有指示都已遵循，故事想法基于提示中包含的标准。我们现在也为我们的侦探取了一个名字——艾莉。
- en: What to Do Next?
  id: totrans-641
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 接下来要做什么？
- en: Review the response generated by ChatGPT.
  id: totrans-642
  prefs: []
  type: TYPE_NORMAL
  zh: 检查 ChatGPT 生成的响应。
- en: Work carefully through the list and copy the ideas you like most into a text
    document to create a shortlist of possible scenarios for your niche, theme, and
    style.
  id: totrans-643
  prefs: []
  type: TYPE_NORMAL
  zh: 仔细地通过列表，将你最喜欢的想法复制到文本文档中，以创建一个可能的场景短名单，用于你的利基、主题和风格。
- en: If you don’t like any of them, change the prompt and give the system more information
    about what you are looking for. Then, ask the AI to generate a list of 20 more
    ideas.
  id: totrans-644
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你不喜欢任何一个，改变提示并给系统提供更多关于你想要什么的信息。然后，要求 AI 生成 20 个更多想法的列表。
- en: These prompts only take seconds to create and generate replies.
  id: totrans-645
  prefs: []
  type: TYPE_NORMAL
  zh: 这些提示只需几秒钟就能创建并生成回复。
- en: Combine ideas. Mix them around. Experiment with the combinations of murder ideas
    and the kind of sleuth who would be a perfect fit for each story.
  id: totrans-646
  prefs: []
  type: TYPE_NORMAL
  zh: 结合想法。将它们混合起来。尝试谋杀想法和适合每个故事的完美侦探类型的组合。
- en: Then, tell ChatGPT what stories you liked best and ask it to create more ideas
    based on your selection and combinations.
  id: totrans-647
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，告诉 ChatGPT 你最喜欢的故事，并要求它根据你的选择和组合创造更多想法。
- en: For example, I liked suggestions 2,4,5,7, and 10.
  id: totrans-648
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，我喜欢建议 2、4、5、7 和 10。
- en: '![](image_rsrc433.jpg)'
  id: totrans-649
  prefs: []
  type: TYPE_IMG
  zh: '![image_rsrc433.jpg](image_rsrc433.jpg)'
- en: I liked suggestions 2, 4, 5, 7, and 10\. Give me 10 different, engaging story
    ideas for a paranormal cozy murder mystery that are similar to these ideas. The
    sleuth is a young woman who works in her aunt's yarn and craft store in a busy
    coastal town. Her aunt is a psychic. You chose the plot, killer, and plot twists.
    There should be two murders in this book. Be sure to make the plot twist clear.
    Focus on the craft and psychic elements.
  id: totrans-650
  prefs: []
  type: TYPE_NORMAL
  zh: 我喜欢建议2、4、5、7和10。给我10个不同、引人入胜的灵异温馨谋杀谜案故事想法，这些想法与这些想法类似。侦探是一位在繁忙的海滨小镇的阿姨的毛线和手工艺店工作的年轻女性。她的阿姨是一位灵媒。你选择情节、杀手和情节转折。这本书中应有两次谋杀。务必使情节转折清晰。关注手工艺和灵媒元素。
- en: '![](image_rsrc434.jpg)'
  id: totrans-651
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc434.jpg)'
- en: Whispers in the Wool
  id: totrans-652
  prefs: []
  type: TYPE_NORMAL
  zh: 《羊毛中的窃窃私语》
- en: 'Plot: A series of coded messages are found knitted into scarves at the scene
    of two murders, leading Ellie and her psychic aunt to delve into the world of
    secret societies hidden within craft circles.'
  id: totrans-653
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 情节：在两起谋杀案的现场，发现了一系列编织在围巾上的编码信息，引导艾莉和她的灵媒阿姨深入探索隐藏在工艺圈子中的秘密社团世界。
- en: 'Killer: The leader of a clandestine knitting society, using the craft to send
    messages about illicit activities.'
  id: totrans-654
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 杀手：一个秘密编织社团的领导者，利用这门手艺来传递关于非法活动的信息。
- en: 'Plot Twist: The messages are actually a decoy; the real motive is an ancient
    textile artifact believed to possess psychic powers, which the aunt is inadvertently
    close to discovering.'
  id: totrans-655
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 情节转折：信息实际上是一个诱饵；真正的动机是被认为拥有灵媒力量的古老纺织艺术品，阿姨无意中接近发现。
- en: The Psychic Fair Mystery
  id: totrans-656
  prefs: []
  type: TYPE_NORMAL
  zh: 《灵媒集市之谜》
- en: 'Plot: When a famous psychic medium is murdered at a local psychic fair, followed
    by the death of an antique dealer specializing in occult objects, Ellie and her
    aunt use their unique skills to unravel the mystery.'
  id: totrans-657
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 情节：当一位著名的灵媒在当地的灵媒集市上被谋杀，紧接着是一位专门经营神秘物品的古董商死亡，艾莉和她的阿姨利用她们独特的技能来解开这个谜团。
- en: 'Killer: A rival psychic, jealous of the attention the first victim was receiving
    and fearful of being exposed as a fraud.'
  id: totrans-658
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 杀手：一位嫉妒第一个受害者受到关注且害怕自己被揭露为骗子的竞争对手灵媒。
- en: 'Plot Twist: The antique dealer had discovered a fake amongst the psychic''s
    possessions, threatening to unveil a conspiracy among the town''s psychics, including
    Ellie''s aunt, though she was unaware of the deceit.'
  id: totrans-659
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 情节转折：古董商在灵媒的财产中发现了一个假货，威胁要揭露包括艾莉的阿姨在内的镇上灵媒之间的阴谋，尽管她并不知道这个欺骗。
- en: The Haunted Haberdashery
  id: totrans-660
  prefs: []
  type: TYPE_NORMAL
  zh: 《幽灵帽店》
- en: 'Plot: Ellie investigates the murder of a local historian found in a historic
    haberdashery, followed by the death of a paranormal investigator. Both were researching
    the ghostly sightings reported in the building.'
  id: totrans-661
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 情节：艾莉调查了一位在当地历史悠久的帽店中被发现的当地历史学家的谋杀案，紧接着是一位超自然调查员的死亡。两人都在研究建筑中报告的鬼魂目击事件。
- en: 'Killer: The owner of the haberdashery, trying to cover up the fact that the
    "ghosts" were a ploy to attract tourists.'
  id: totrans-662
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 杀手：帽店的所有者，试图掩盖“鬼魂”是吸引游客的诡计的事实。
- en: 'Plot Twist: The real ghost, a benevolent spirit of the haberdashery''s original
    owner, provides Ellie with the final clue, revealing that the historian had discovered
    a hidden room with incriminating evidence.'
  id: totrans-663
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 情节转折：真正的鬼魂，是帽店原主人的仁慈精神，为艾莉提供了最后的线索，揭示了历史学家发现了一个隐藏的房间，里面有指控性的证据。
- en: Cursed Canvas
  id: totrans-664
  prefs: []
  type: TYPE_NORMAL
  zh: 《诅咒画布》
- en: 'Plot: Two artists competing in a coastal art festival are found dead, their
    final pieces hinting at a curse. Ellie''s investigation, aided by her aunt''s
    visions, uncovers a centuries-old feud perpetuated through art.'
  id: totrans-665
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 情节：两位在沿海艺术节上竞争的艺术家被发现死亡，他们的最后作品暗示了一个诅咒。艾莉的调查，在阿姨的预兆帮助下，揭露了一个通过艺术延续数百年的家族纷争。
- en: 'Killer: A descendant of one of the feuding families, using the festival as
    a cover to end the curse by eliminating the last of the rival line.'
  id: totrans-666
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 杀手：一个家族纷争的继承者，利用节日作为掩护，通过消除竞争对手的最后一人来结束诅咒。
- en: 'Plot Twist: The "curse" is actually a misunderstood blessing, with the final
    artworks revealing a reconciliation spell that the killer sought to prevent.'
  id: totrans-667
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 情节转折：所谓的“诅咒”实际上是一个被误解的祝福，最后的艺术品揭示了一个杀手试图阻止的和解咒语。
- en: The Bewitched Book Club
  id: totrans-668
  prefs: []
  type: TYPE_NORMAL
  zh: 《被诅咒的书俱乐部》
- en: 'Plot: Members of a local book club, focused on paranormal literature, start
    dying under mysterious circumstances. Ellie discovers each victim received a cursed
    book that predicted their death.'
  id: totrans-669
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 情节：一个当地读书俱乐部，专注于超自然文学，成员在神秘的情况下开始死亡。艾莉发现每个受害者都收到了一本诅咒的书，预言了他们的死亡。
- en: 'Killer: The book club''s organizer, who was using the cursed books to eliminate
    rivals for a rare manuscript believed to grant real magical abilities.'
  id: totrans-670
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 杀手：一个图书俱乐部的组织者，利用诅咒的书籍来消除对手，以保守一本据说能赋予真实魔法能力的罕见手稿的秘密。
- en: 'Plot Twist: The manuscript is actually a diary belonging to Ellie''s aunt,
    containing the secrets to her psychic abilities, which she had lost years ago.'
  id: totrans-671
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 情节转折：这份手稿实际上是艾莉阿姨的日记，包含了她的灵性能力的秘密，这些秘密她多年前就失去了。
- en: Seance and Sensibility
  id: totrans-672
  prefs: []
  type: TYPE_NORMAL
  zh: 通灵与感性
- en: 'Plot: After a seance at the yarn store to contact the spirits of historical
    figures from the town''s past, a medium and a local historian are found dead.
    Ellie must weave through the tangled threads of the supernatural and the all-too-human
    to solve the mystery.'
  id: totrans-673
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 情节：在一家线材店举行的一次通灵会，试图联系镇上过去的著名历史人物的灵魂后，一位灵媒和一位当地历史学家被发现死亡。艾莉必须穿梭于超自然现象和过于人性化的混乱之中，以解开这个谜团。
- en: 'Killer: A skeptic determined to discredit the psychic community by staging
    the murders as accidents caused by negligence.'
  id: totrans-674
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 杀手：一个决心通过将谋杀案作为由疏忽造成的意外来诋毁灵媒社区的无神论者。
- en: 'Plot Twist: The skeptic is actually sensitive to psychic phenomena and was
    trying to suppress their own abilities out of fear, leading to a tragic miscalculation
    in their plan.'
  id: totrans-675
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 情节转折：这位怀疑论者实际上对灵性现象很敏感，他们出于恐惧试图压制自己的能力，导致计划中的悲剧性误算。
- en: The Enchanted Embroidery
  id: totrans-676
  prefs: []
  type: TYPE_NORMAL
  zh: 神秘刺绣
- en: 'Plot: The discovery of two bodies, each marked with intricate embroidered symbols,
    leads Ellie and her aunt into the world of magical symbols and protective charms
    woven into textiles.'
  id: totrans-677
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 情节：发现两具尸体，每具尸体都带有复杂的刺绣符号，将艾莉和她的阿姨带入了一个世界，这个世界将魔法符号和编织到纺织品中的保护符编织在一起。
- en: 'Killer: A local crafter using the embroidered symbols to cast curses on those
    they believed had wronged them.'
  id: totrans-678
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 杀手：一个当地工匠，利用刺绣符号对那些他们认为对他们不公的人施加诅咒。
- en: 'Plot Twist: The symbols were not for curses but for protection; the real killer
    had manipulated the crafter into believing they were avenging a personal slight,
    whereas the motive was to gain control of a legendary embroidered tapestry the
    victims had found.'
  id: totrans-679
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 情节转折：这些符号不是为了诅咒而是为了保护；真正的杀手操纵工匠相信他们在为个人冒犯复仇，而动机是为了控制受害者发现的传奇刺绣挂毯。
- en: Ghosts of the Galleon
  id: totrans-680
  prefs: []
  type: TYPE_NORMAL
  zh: 加勒比海盗的幽灵
- en: 'Plot: During the town''s maritime festival, a replica of a historic galleon
    becomes the scene of two murders. Ellie''s aunt receives psychic impressions from
    the original ship''s log, which seems to predict the deaths.'
  id: totrans-681
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 情节：在镇上的海事节期间，一艘历史仿制加勒比海盗船成为两起谋杀案的现场。艾莉的阿姨从原始船日志中收到灵性印象，这似乎预示了死亡。
- en: 'Killer: A historian obsessed with finding the sunken galleon''s treasure, willing
    to kill to keep the location secret.'
  id: totrans-682
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 杀手：一个着迷于寻找沉没的加勒比海盗船宝藏的历史学家，愿意杀人以保守地点的秘密。
- en: 'Plot Twist: The psychic impressions were actually from the spirit of the ship''s
    captain, trying to protect his descendants from the curse of the treasure, one
    of whom is Ellie''s friend.'
  id: totrans-683
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 情节转折：这些灵性印象实际上来自船长灵魂，试图保护他的后代免受宝藏诅咒，其中之一是艾莉的朋友。
- en: The Crochet Conundrum
  id: totrans-684
  prefs: []
  type: TYPE_NORMAL
  zh: 钩针难题
- en: 'Plot: A crochet competition turns deadly when two contestants are found strangled
    with yarn. Ellie''s investigation reveals a pattern of jealousy and betrayal,
    with clues hidden in crochet stitches.'
  id: totrans-685
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 情节：一场钩针比赛变得致命，因为两名参赛者被发现被线团勒死。艾莉的调查揭示了嫉妒和背叛的模式，线索隐藏在钩针的针法中。
- en: 'Killer: A judge of the competition, eliminating the top competitors to ensure
    their protégé wins.'
  id: totrans-686
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 杀手：一个比赛的裁判，消除顶尖竞争者以确保他们的门徒获胜。
- en: 'Plot Twist: The protégé is actually the judge''s estranged child, who entered
    the competition anonymously to prove their skills without nepotism, unaware of
    the judge''s deadly support.'
  id: totrans-687
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 情节转折：这位门徒实际上是法官的疏远的孩子，他们匿名参加比赛以证明自己的技能，没有利用裙带关系，却不知道法官的致命支持。
- en: Potions and Purls
  id: totrans-688
  prefs: []
  type: TYPE_NORMAL
  zh: 药水与毛线球
- en: 'Plot: When two members of a secret society dedicated to blending witchcraft
    with crafting are poisoned, Ellie and her aunt must unravel a mystery that combines
    ancient potions with modern knitting techniques.'
  id: totrans-689
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 情节：当一个致力于将巫术与工艺相结合的秘密社团的两名成员被毒害时，艾莉和她的阿姨必须解开一个谜团，这个谜团结合了古老的药水和现代的编织技术。
- en: 'Killer: A society member who coveted the position of head crafter, using poisoned
    knitting needles as their weapon.'
  id: totrans-690
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 杀手：一个渴望成为首席工匠职位的社会成员，他们用有毒的编织针作为武器。
- en: 'Plot Twist: The true head crafter had foreseen their own death and prepared
    a potion that, when combined with a specific knitting pattern, would reveal the
    killer''s identity posthumously.'
  id: totrans-691
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 惊喜转折：真正的头饰工匠预见到自己的死亡，并准备了一种药剂，当与特定的编织图案结合时，会在死后揭示凶手的身份。
- en: I hope you can see that editing the prompt to make the AI more specific has
    generated much more detailed and exciting story ideas.
  id: totrans-692
  prefs: []
  type: TYPE_NORMAL
  zh: 我希望你能看到，通过编辑提示使AI更加具体，产生了更加详细和激动人心的故事想法。
- en: This is one of the critical things to remember when using any AI tool – the
    most successful prompts are not one-line questions that generate the best answers
    the first time you use them.
  id: totrans-693
  prefs: []
  type: TYPE_NORMAL
  zh: 这是在使用任何AI工具时需要记住的关键事项之一——最成功的提示并不是第一次使用时就能生成最佳答案的单行问题。
- en: Instead, use a simple prompt to get started, then edit the prompt, adding more
    specific details, layer upon layer, to create unique and fresh ideas that fit
    your niche, theme, and vision for the story. Ask for more detail and ideas.
  id: totrans-694
  prefs: []
  type: TYPE_NORMAL
  zh: 相反，使用一个简单的提示开始，然后编辑提示，逐步添加更多具体细节，层叠出符合你细分市场、主题和故事愿景的独特且新颖的想法。要求更多细节和想法。
- en: Iteration is key to leveraging the power of a large language model AI tool such
    as ChatGPT.
  id: totrans-695
  prefs: []
  type: TYPE_NORMAL
  zh: 迭代是利用像ChatGPT这样的大型语言模型AI工具的力量的关键。
- en: What to Do Next?
  id: totrans-696
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 下一步该做什么？
- en: Ask ChatGPT for more information about ideas you like, copy the results into
    a text document, and build a mini library of story ideas for an entire series
    of linked books.
  id: totrans-697
  prefs: []
  type: TYPE_NORMAL
  zh: 向ChatGPT询问你喜欢的想法的更多信息，将结果复制到文本文档中，并建立一个关于一系列相关书籍的故事想法迷你图书馆。
- en: What ideas leap out as having the most potential?
  id: totrans-698
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 哪些想法看起来最有潜力？
- en: What would be the most fun to write and develop into a series?
  id: totrans-699
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 哪个想法最有趣，可以写成系列？
- en: Then, have fun playing the “What-If” game, using your creative talent to generate
    more ideas and flesh out a very basic scenario.
  id: totrans-700
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，尽情地玩“如果”游戏，利用你的创造力产生更多想法，并完善一个非常基本的场景。
- en: You can repeat this process as many times as you like, using your never-tired
    AI-Writing Assistant to spark your ideas and develop them into new ones.
  id: totrans-701
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以重复这个过程，次数不限，使用你的永不疲倦的AI写作助手来激发你的想法，并将它们发展成新的想法。
- en: 'Let’s Play the “What-if” Game #1\.'
  id: totrans-702
  prefs: []
  type: TYPE_NORMAL
  zh: '让我们玩“如果”游戏 #1。'
- en: 'I like the suggestion: The Psychic Fair Mystery'
  id: totrans-703
  prefs: []
  type: TYPE_NORMAL
  zh: 我喜欢这个建议：灵媒展览之谜
- en: 'Plot: When a famous psychic medium is murdered at a local psychic fair, followed
    by the death of an antique dealer specializing in occult objects, Ellie and her
    aunt use their unique skills to unravel the mystery.'
  id: totrans-704
  prefs: []
  type: TYPE_NORMAL
  zh: 情节：当一位著名的灵媒在当地灵异展览中被谋杀，随后是一位专门经营神秘物品的古董商死亡，艾莉和她的阿姨利用她们独特的技能解开这个谜团。
- en: Let’s work on the basic idea and see where it takes us.
  id: totrans-705
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们专注于基本想法，看看它能带我们走到哪里。
- en: What if? The famous psychic medium was found murdered at the yarn store studio
    run as a meeting place by Ellie’s aunt.
  id: totrans-706
  prefs: []
  type: TYPE_NORMAL
  zh: 如果？著名的灵媒在艾莉阿姨经营的作为聚会场所的毛线店工作室被发现被谋杀。
- en: What if? The killer used special antique poisoned knitting needles as their
    weapon, supplied by a local antique dealer.
  id: totrans-707
  prefs: []
  type: TYPE_NORMAL
  zh: 如果？凶手使用了由当地古董商提供的特殊古董有毒编织针作为他们的武器。
- en: What if? When Ellie touched the body to see if he was okay, he passed his psychic
    abilities over to Ellie in his final moment.
  id: totrans-708
  prefs: []
  type: TYPE_NORMAL
  zh: 如果？当艾莉接触尸体以查看他是否还好时，他在最后一刻将自己的心灵感应能力传给了艾莉。
- en: What if? Her aunt and her close friends are actually a group of highly trained
    paranormal investigators, and the murdered guest was bringing new information
    about a case on his way to the psychic fair.
  id: totrans-709
  prefs: []
  type: TYPE_NORMAL
  zh: 如果？她的阿姨和她的亲密朋友实际上是一群受过高度训练的灵异调查员，而被谋杀的客人正在前往灵异展览的路上带来关于一个案件的新信息。
- en: What if? When Ellie's aunt is implicated in the murder of a rival psychic and
    a dealer who was trying to expose them, Ellie must clear her aunt's name.
  id: totrans-710
  prefs: []
  type: TYPE_NORMAL
  zh: 如果？当艾莉的阿姨被卷入谋杀一位竞争对手的灵媒和试图揭露他们的古董商时，艾莉必须澄清她阿姨的名誉。
- en: What if? Ellie’s mother did not approve of the fact that Ellie’s late uncle
    had married an eccentric woman who claimed to be a psychic. It was a family secret,
    and it came as quite a shock to Ellie when she was gifted these new abilities.
  id: totrans-711
  prefs: []
  type: TYPE_NORMAL
  zh: 如果？艾莉的母亲并不赞成艾莉已故的叔叔娶了一个声称自己是灵媒的古怪女人。这是一个家庭秘密，当艾莉获得这些新能力时，这对她来说是个相当大的震惊。
- en: What if? Ellie is going to rely on her aunt to help her adapt to these new,
    bewildering abilities. But she holds the key to finding out who murdered the victim.
  id: totrans-712
  prefs: []
  type: TYPE_NORMAL
  zh: 如果？艾莉将依赖她的阿姨来帮助她适应这些新而令人困惑的能力。但她掌握着找出谁谋杀受害者的关键。
- en: This would be a great way to introduce Ellie to her aunt’s true passion and
    her team of quirky seniors living in this small community. We could use this story
    idea for Book One of the Series.
  id: totrans-713
  prefs: []
  type: TYPE_NORMAL
  zh: 这将是介绍艾莉阿姨的真实热情和她在这个小社区里居住的奇特老年团队的一个好方法。我们可以用这个故事想法作为系列的第一本书。
- en: 'Let’s Play the “What-if” Game #2\.'
  id: totrans-714
  prefs: []
  type: TYPE_NORMAL
  zh: '让我们再来玩一次“如果”游戏 #2。'
- en: 'I like the suggestion: The Yarn Bomber''s Last Pattern.'
  id: totrans-715
  prefs: []
  type: TYPE_NORMAL
  zh: 我喜欢这个建议：毛线炸弹者的最后图案。
- en: 'Plot: Seabrook becomes the canvas for a mysterious yarn bomber, whose playful
    street art takes a dark turn when two bodies are found wrapped in yarn patterns.
    Ellie''s investigation uncovers a web of rivalries.'
  id: totrans-716
  prefs: []
  type: TYPE_NORMAL
  zh: 情节：塞布罗克成为一位神秘的毛线炸弹者的画布，当发现两具尸体被包裹在毛线图案中时，其轻松的街头艺术变得黑暗。艾莉的调查揭露了一个竞争的网。
- en: Let’s work on the basic idea and see where it takes us.
  id: totrans-717
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们着手基本想法，看看它能带我们走到哪里。
- en: What if? The yarn bombing was part of the town’s annual arts festival and received
    a lot of publicity on social media.
  id: totrans-718
  prefs: []
  type: TYPE_NORMAL
  zh: 如果呢？毛线炸弹是城镇年度艺术节的一部分，并在社交媒体上获得了大量关注。
- en: What if? The authorities are desperate to keep this low-key and protect the
    tourism industry. They are in a hurry to get an arrest.
  id: totrans-719
  prefs: []
  type: TYPE_NORMAL
  zh: 如果呢？当局急于保持低调并保护旅游业。他们急于逮捕。
- en: What if? The body of a yarn shop owner from the next town is found wrapped in
    a very distinctive knitted blanket in the yarn installation in front of the town
    hall.
  id: totrans-720
  prefs: []
  type: TYPE_NORMAL
  zh: 如果呢？下一个镇上的毛线店店主尸体被发现在市政厅前的毛线装置中被包裹在一个非常独特的针织毯子里。
- en: What if? Her aunt becomes the prime suspect in the murder. This blanket design
    is one of her signature patterns.
  id: totrans-721
  prefs: []
  type: TYPE_NORMAL
  zh: 如果呢？她的阿姨成为谋杀案的主要嫌疑人。这个毯子设计是她标志性图案之一。
- en: What if? The sleuth has to untangle the truth to save her aunt and reveal the
    real killer.
  id: totrans-722
  prefs: []
  type: TYPE_NORMAL
  zh: 如果呢？侦探必须解开真相以救出她的阿姨并揭露真正的凶手。
- en: That family connection would motivate the sleuth to come to this town if she
    does not live there, and work to find out who the real killer is. It would make
    Ellie commit more fully to her new psychic powers.
  id: totrans-723
  prefs: []
  type: TYPE_NORMAL
  zh: 如果她不住在这个镇上，这种家庭联系会激励侦探来到这个镇上，努力找出真正的凶手。这将使艾莉更加全心全意地投入到她新的通灵能力中。
- en: It would also be a fun way to introduce yarn bombing and the creativity of the
    close group of crafters of all ages who create amazing designs and street art.
  id: totrans-724
  prefs: []
  type: TYPE_NORMAL
  zh: 这也是一种介绍毛线炸弹和各个年龄段工匠的创意群体的有趣方式，他们创造了惊人的设计和街头艺术。
- en: Let’s save this story idea for another book in the Series.
  id: totrans-725
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们把这个故事想法留到系列中的另一本书里。
- en: Both of these ideas started with a suggestion from our AI-writing assistant,
    and then a human brain started building out the possible options to create something
    new and unique.
  id: totrans-726
  prefs: []
  type: TYPE_NORMAL
  zh: 这两个想法都是从我们的AI写作助手的一个建议开始的，然后一个人类大脑开始构建可能的选项，以创造一些新颖独特的东西。
- en: Time to add a sparkle to the story idea.
  id: totrans-727
  prefs: []
  type: TYPE_NORMAL
  zh: 是时候给故事想法增添一些光彩了。
- en: '![A diagram of a story generator  Description automatically generated](image_rsrc435.jpg)'
  id: totrans-728
  prefs: []
  type: TYPE_IMG
  zh: '![故事生成器图解  自动生成的描述](image_rsrc435.jpg)'
- en: Decision Four. A Cool Hook for the Entire Series
  id: totrans-729
  prefs: []
  type: TYPE_NORMAL
  zh: 决策四。为整个系列提供一个酷炫的钩子
- en: Once you have a basic story idea, it’s time to come up with a fresh, intriguing,
    and cool story hook for your story idea that has the potential to be extended
    across an entire series.
  id: totrans-730
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦你有一个基本的故事想法，就是时候为你的故事想法想出一个新鲜、引人入胜且酷炫的故事钩子，这个钩子有潜力扩展到整个系列。
- en: This is where the magic comes in, and it is worth spending time developing an
    intriguing story hook. You may well develop other ideas as you write the book,
    but this hook is designed to spark your interest and imagination.
  id: totrans-731
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是魔法所在，花时间开发一个引人入胜的故事钩子是值得的。你很可能在写书的过程中发展出其他想法，但这个钩子是为了激发你的兴趣和想象力。
- en: What will make a reader pick up your book in preference to the many thousands
    of other cozy mysteries available?
  id: totrans-732
  prefs: []
  type: TYPE_NORMAL
  zh: 读者会为什么选择你的书而不是众多其他温馨的悬疑小说？
- en: THE HIGH CONCEPT STORY IDEA
  id: totrans-733
  prefs: []
  type: TYPE_NORMAL
  zh: 高概念故事想法
- en: You may have heard of “high-concept premise” or “elevator pitch.”
  id: totrans-734
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能听说过“高概念前提”或“电梯销售”。
- en: This is a one-sentence description of your story idea that encapsulates the
    entire story in a simple way that is easy for someone to understand and immediately
    tells the reader why this story is unique, fresh, and intriguing.
  id: totrans-735
  prefs: []
  type: TYPE_NORMAL
  zh: 这是对你的故事想法的一个简单描述，以简单的方式概括整个故事，使人们容易理解，并立即告诉读者这个故事为什么独特、新颖、引人入胜。
- en: It is the magical factor that will make your book irresistible to readers, potential
    agents, and publishers.
  id: totrans-736
  prefs: []
  type: TYPE_NORMAL
  zh: 这是使你的书对读者、潜在代理商和出版商都具有不可抗拒魅力的神奇因素。
- en: 'Here are a few examples of well-known high-concept novels:'
  id: totrans-737
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一些著名的高概念小说的例子：
- en: An eleven-year-old boy discovers he's a wizard and that a notorious wizard murdered
    his parents. (The Harry Potter series)
  id: totrans-738
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个11岁的男孩发现他是一名巫师，而且一个臭名昭著的巫师谋杀了他的父母。（《哈利·波特》系列）
- en: In a dystopian society, teenagers are randomly selected from each district to
    fight to the death on television. (The Hunger Games series)
  id: totrans-739
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在一个反乌托邦社会中，青少年被随机选中从每个地区进行电视上的生死搏斗。（《饥饿游戏》系列）
- en: A bored and miserable meteorologist is stuck living the same day over and over.
    (Groundhog Day)
  id: totrans-740
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个无聊且痛苦的天气预报员被困在重复过着同一天。（《 Groundhog Day》）
- en: So, what makes a book irresistible to cozy mystery readers?
  id: totrans-741
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，是什么让一本小说对轻松悬疑读者来说不可抗拒？
- en: What would make you instantly click the buy button or put the print book in
    your basket in the bookstore?
  id: totrans-742
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 什么会让你立刻点击购买按钮，或者在书店把印刷版书放入购物篮？
- en: What would get you interested and excited about a book?
  id: totrans-743
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 什么会让你对一本书感兴趣并兴奋起来？
- en: If you pitch that book to a literary agent or editor at a publishing house,
    what would make them invest time in reading your book proposal?
  id: totrans-744
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果你向文学代理人或出版社的编辑推销这本书，什么会让他们投入时间阅读你的书稿？
- en: So, how do you come up with your magical high-concept story idea?
  id: totrans-745
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，你是如何想出你的神奇高概念故事想法的？
- en: Creativity is your superpower. Now, it is time to put that creativity to work.
  id: totrans-746
  prefs: []
  type: TYPE_NORMAL
  zh: 创造力是你的超级力量。现在，是时候把这种创造力付诸实践了。
- en: What exactly is a Story Hook?
  id: totrans-747
  prefs: []
  type: TYPE_NORMAL
  zh: 什么是故事钩子？
- en: For me, a story hook is something that grabs a reader’s attention, immediately
    creates questions that demand to be answered, and makes someone want to read this
    book, watch the TV show, or watch the movie.
  id: totrans-748
  prefs: []
  type: TYPE_NORMAL
  zh: 对我来说，故事钩子是那种能够抓住读者的注意力，立即产生需要被解答的问题，并让人想要阅读这本书、观看电视剧或电影的东西。
- en: For me, the hook has to grab me by asking a question that can only be answered
    by reading the book.
  id: totrans-749
  prefs: []
  type: TYPE_NORMAL
  zh: 对我来说，书中的钩子必须通过提出一个只有通过阅读书籍才能回答的问题来吸引我。
- en: It could be something cool, different, interesting, or intriguing, but it has
    to be attention-grabbing.
  id: totrans-750
  prefs: []
  type: TYPE_NORMAL
  zh: 这可能是一件酷、不同、有趣或引人入胜的事情，但它必须引人注目。
- en: Think of the headlines in an online blog post or newspaper. They are called
    “click-bait” for a reason!
  id: totrans-751
  prefs: []
  type: TYPE_NORMAL
  zh: 想想在线博客文章或报纸上的标题。它们之所以被称为“点击诱饵”，是有原因的！
- en: The Four Key Ingredients of a High-Concept Story Idea
  id: totrans-752
  prefs: []
  type: TYPE_NORMAL
  zh: 高概念故事想法的四个关键要素
- en: What is different about your story idea that makes it sound cool, engaging,
    and fresh?  Yes, readers are looking for similar elements within a specific niche
    but are quickly bored with copycat story ideas.
  id: totrans-753
  prefs: []
  type: TYPE_NORMAL
  zh: 你的故事想法有什么不同之处，让它听起来酷、吸引人且新颖？是的，读者在特定领域内寻找类似元素，但很快就会对模仿故事想法感到厌倦。
- en: How is this different, intriguing, and new in some way? Can you create a great
    high-concept story idea that you can use to sell your entire series in one sentence?
  id: totrans-754
  prefs: []
  type: TYPE_NORMAL
  zh: 这在哪些方面有所不同、引人入胜且新颖？你能创造一个伟大的高概念故事想法，让你可以用一句话来推销整个系列吗？
- en: Here are four top components of high-concept, cozy mystery story ideas.
  id: totrans-755
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是高概念轻松悬疑故事想法的四个主要组成部分。
- en: 1\. A Fish out of Water
  id: totrans-756
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 1. 水中的鱼
- en: This is a very common theme used by many cozy mystery authors. Essentially,
    it is any scenario where a stranger is dropped into a location or plot scenario
    where they are totally out of their comfort zone.
  id: totrans-757
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个许多轻松悬疑作家常用的非常常见的主题。本质上，它是指任何陌生人在完全脱离舒适区的情况下被放入一个地点或情节场景的任何场景。
- en: Characters who are totally at odds with their environment automatically struggle
    to adapt to this new location's culture, habits, rules, and nuances.
  id: totrans-758
  prefs: []
  type: TYPE_NORMAL
  zh: 与其环境完全格格不入的角色会自动努力适应这个新地点的文化、习惯、规则和细微差别。
- en: This creates internal and external conflict and adds exciting layers to the
    murder mystery investigation. Their fresh approach to solving the crime can be
    their greatest asset!
  id: totrans-759
  prefs: []
  type: TYPE_NORMAL
  zh: 这创造了内部和外部冲突，并为谋杀案调查增添了令人兴奋的层次。他们解决犯罪的新方法可以成为他们最大的资产！
- en: In Louisiana Longshot by Jana DeLeon, our sleuth, Fortune Redding, is a CIA
    assassin forced to go off-grid in Sinful, Louisiana, posing as a former beauty
    queen turned librarian.
  id: totrans-760
  prefs: []
  type: TYPE_NORMAL
  zh: 在Jana DeLeon的《路易斯安那长跑者》中，我们的侦探福琼·雷丁是一位被迫在路易斯安那州的Sinful隐居的CIA刺客，她伪装成一位前选美皇后转行的图书管理员。
- en: In Coming in Hot by Deany Ray, former motorcycle gang members thirtysomething
    Piper and her grandmother move south into witness protection in a Florida retirement
    village.
  id: totrans-761
  prefs: []
  type: TYPE_NORMAL
  zh: 在Deany Ray的《热辣登场》中，三十多岁的摩托车帮派前成员Piper和她的祖母搬到了佛罗里达的一个退休村寻求证人保护。
- en: In the movie Murder Mystery, a New York City cop and his hairdresser wife scramble
    to solve a murder on a billionaire’s luxury yacht.
  id: totrans-762
  prefs: []
  type: TYPE_NORMAL
  zh: 在电影《谋杀疑案》中，一位纽约市警察和他的发型师妻子在亿万富翁的豪华游艇上匆忙解决了一起谋杀案。
- en: In The Psychic Fair Mystery  story idea, Ellie has come to visit her aunt at
    her craft shop and is suddenly gifted with frightening psychic powers. She is
    totally out of her comfort zone.
  id: totrans-763
  prefs: []
  type: TYPE_NORMAL
  zh: 在《心灵集市之谜》的故事构思中，艾莉来到她阿姨的工艺品店拜访，突然获得了令人恐惧的心理能力。她完全脱离了舒适区。
- en: Over the course of the series, this person will move from being a stranger to
    finding their place in the new society, family, or plot situation.
  id: totrans-764
  prefs: []
  type: TYPE_NORMAL
  zh: 在整个系列的过程中，这个人将从陌生人变成在新社会、家庭或情节情境中找到自己的位置。
- en: 2\. A Major External Conflict
  id: totrans-765
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 2. 一个主要的外部冲突
- en: This is an overarching problem, dilemma, or conflict that will not be solved
    until the end of the series.
  id: totrans-766
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个贯穿整个系列的总体问题、困境或冲突，直到系列结束才会得到解决。
- en: Each book in the series will have more minor conflicts that may not be linked
    to the murder investigation, but the central conflict is in the background.
  id: totrans-767
  prefs: []
  type: TYPE_NORMAL
  zh: 系列中的每一本书都会有更多的小冲突，这些冲突可能不会与谋杀调查直接相关，但核心冲突始终在幕后。
- en: This hook also generates multiple subplots where this problem threatens the
    main characters and sidekicks.
  id: totrans-768
  prefs: []
  type: TYPE_NORMAL
  zh: 这个悬念还产生了多个副线剧情，其中这个问题威胁到主要角色和配角。
- en: This can be very powerful if you link it to the character arc of the sleuth.
    Introduce it in book one and end it in the final book in the series when the sleuth
    finally resolves the conflict or problem.
  id: totrans-769
  prefs: []
  type: TYPE_NORMAL
  zh: 如果将其与侦探的角色弧线联系起来，这将非常有力量。在系列的第一本书中引入它，并在系列的最后一本书中结束它，当侦探最终解决冲突或问题时。
- en: The key is to make this issue very clear in the book description so that the
    reader knows that this threat or issue is hanging over the characters from the
    start.
  id: totrans-770
  prefs: []
  type: TYPE_NORMAL
  zh: 关键在于在书籍描述中非常清楚地说明这个问题，让读者知道这个威胁或问题从一开始就笼罩着角色。
- en: Example. In Louisiana Longshot and Coming in Hot mentioned above, getting involved
    in a murder investigation could mean blowing their cover, putting themselves and
    their new friends in mortal danger from the people they are hiding from.
  id: totrans-771
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，在上文中提到的《路易斯安那长跑者和热辣登场》中，卷入谋杀调查可能意味着暴露他们的身份，把自己和他们的新朋友置于他们试图隐藏的人的致命危险之中。
- en: Should they stay under the radar and not get involved in the murder investigation
    they are caught up in, or find the killer and risk attracting the criminals who
    are determined to silence them? That question should keep us guessing, while we
    are enjoying the murder investigation they cannot avoid getting caught up in.
  id: totrans-772
  prefs: []
  type: TYPE_NORMAL
  zh: 他们应该保持低调，不介入他们卷入的谋杀调查，还是找到凶手并冒着吸引那些决心让他们沉默的罪犯的风险？这个问题应该让我们保持猜测，同时我们享受着他们无法避免卷入的谋杀调查。
- en: Example. In The Antique Hunter's Guide to Murder by C L Miller, Freya Lockwood
    and her eccentric Aunt Carole are sucked into a thrilling mystery, as a prominent
    antique dealer and Freya's estranged mentor leaves her a letter full of clues
    just before his suspicious death.
  id: totrans-773
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，在C L Miller的《古董猎人谋杀指南》中，弗雷亚·洛克伍德和她古怪的外婆卡罗尔被卷入一个激动人心的谜团，因为一位著名的古董商和弗雷亚疏远的导师在她可疑的死亡前留下了一封充满线索的信。
- en: Can Freya stay alive long enough to solve the murder? And why was he killed?
  id: totrans-774
  prefs: []
  type: TYPE_NORMAL
  zh: 弗雷亚能否活足够长的时间来解决这起谋杀案？他为什么会被杀害？
- en: Example. In The Psychic Fair Mystery  story idea, Ellie is forced to stay with
    her aunt until she has learned how to control and use her new psychic abilities
    without putting her aunt at risk. Can her new abilities be kept a secret from
    the rest of the town and her family? All Ellie wants to do is get back to her
    normal life!  How she learns and adapts is going to be tracked across the series.
  id: totrans-775
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，在《心灵集市之谜》的故事构思中，艾莉被迫与她阿姨待在一起，直到她学会如何控制和使用她新获得的心理能力，而不会让阿姨处于危险之中。她能否将这些新能力保守秘密，不让镇上其他人以及她的家人知道？艾莉唯一想做的就是回到她正常的生活！她如何学习和适应将在整个系列中追踪。
- en: 3\. An Aspirational or Escapist Hook
  id: totrans-776
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 3. 一个有抱负或逃避现实的悬念
- en: Something that plays on the hopes, aspirations and dreams of a reader and whisks
    them off to an escapist world outside of the normal day to day world.
  id: totrans-777
  prefs: []
  type: TYPE_NORMAL
  zh: 有一些东西能够触动读者的希望、抱负和梦想，并将他们带入一个超出日常生活的逃避现实的世界。
- en: How many times have you read mysteries where the sleuth inherits a run-down
    villa/house/bookstore by the sea from someone they barely knew?
  id: totrans-778
  prefs: []
  type: TYPE_NORMAL
  zh: 你有多少次读过这样的神秘故事，侦探从几乎不认识的人那里继承了一座破旧的别墅/房子/书店，位于海边？
- en: Out of the blue, their normal humdrum life is replaced by security, hope, opportunity,
    and excitement, possibly even a new romance.
  id: totrans-779
  prefs: []
  type: TYPE_NORMAL
  zh: 突然之间，他们平淡无奇的生活被安全、希望、机会和兴奋所取代，甚至可能还有一段新的恋情。
- en: Cozy authors make this extra special by adding cool elements such as resident
    paranormal beings, animal companions and quirky kind local residents.
  id: totrans-780
  prefs: []
  type: TYPE_NORMAL
  zh: 舒适的作者通过添加一些酷炫元素，如居住的灵异生物、动物伙伴和古怪的地方居民，使这一切变得更加特别。
- en: The reader instantly wants to know what it would be like to live there. What
    is the weather like? Would they be made to feel welcome? Why has this person left
    them this legacy?
  id: totrans-781
  prefs: []
  type: TYPE_NORMAL
  zh: 读者立刻想知道在那里生活会是什么样子。天气如何？他们会感到受欢迎吗？为什么这个人会给他们留下这样的遗产？
- en: Another option would be to have the sleuth travel to wonderful locations and
    help the local community to solve the murder mystery.
  id: totrans-782
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个选择是让侦探前往美丽的地点，帮助当地社区解决谋杀谜案。
- en: Steve Higgs has a very popular series featuring retired police officer Albert
    Smith and his dog who travel around the UK looking for regional foods – and solving
    murders.
  id: totrans-783
  prefs: []
  type: TYPE_NORMAL
  zh: 史蒂夫·希格斯有一个非常受欢迎的系列，讲述退休警察阿尔伯特·史密斯和他的狗在英国各地寻找地方美食——并解决谋杀案。
- en: Hope Callaghan takes us on luxury cruise ships with sleuth Millie Sanders, while
    TA Williams explores the stunning Italian countryside around Tuscany with retired
    police detective Dan Armstrong. Both perfect escapist backgrounds for a compelling
    murder mystery with a twist.
  id: totrans-784
  prefs: []
  type: TYPE_NORMAL
  zh: 希望卡洛甘带着我们乘坐豪华游轮，侦探米莉·桑德斯，而TA威廉姆斯则探索托斯卡纳周围的壮丽意大利乡村，与退休警察侦探丹·阿姆斯特朗一起。这两个都是扣人心弦的谋杀谜案的好背景，带有转折。
- en: 4\. A Universal Theme
  id: totrans-785
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 4. 一个普遍主题
- en: The universal theme is a universal or relatable lesson that the main character
    must learn by the end of the story.
  id: totrans-786
  prefs: []
  type: TYPE_NORMAL
  zh: 主题是普遍的或相关的教训，主角必须在故事结束时学会。
- en: This doesn't mean that your story has to be moral or boring. It simply means
    your story has to say something about what it is like to be a human being facing
    challenges in life.
  id: totrans-787
  prefs: []
  type: TYPE_NORMAL
  zh: 这并不意味着你的故事必须具有道德性或无聊。这仅仅意味着你的故事必须说出一些关于人类在生活挑战中面临的情况。
- en: Your character has to take some form of internal journey and he or she has to
    learn something along the way.
  id: totrans-788
  prefs: []
  type: TYPE_NORMAL
  zh: 你的角色必须经历某种形式的内心旅程，并且在旅途中学习一些东西。
- en: You have to give us something deeper to hang onto. Something that goes beyond
    just the chase scenes or murder investigations or missing persons or fantastical
    worlds. Something that goes beyond the central plot line.
  id: totrans-789
  prefs: []
  type: TYPE_NORMAL
  zh: 你必须给我们一些更深层次的东西来依靠。一些超越仅仅追逐场景或谋杀调查或失踪人口或奇幻世界的东西。一些超越中心情节线的东西。
- en: The good news about universal themes is that the majority of high concept movies
    and books use and reuse the same ten universal themes over and over again.
  id: totrans-790
  prefs: []
  type: TYPE_NORMAL
  zh: 关于普遍主题的好消息是，大多数高概念电影和书籍反复使用相同的十个普遍主题。
- en: And here they are in no particular order.
  id: totrans-791
  prefs: []
  type: TYPE_NORMAL
  zh: 这里列出的没有特定的顺序。
- en: Love.
  id: totrans-792
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 爱情。
- en: Forgiveness.
  id: totrans-793
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 宽恕。
- en: Acceptance of self, of reality, a family, of the past, of circumstances, etc.
  id: totrans-794
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 接受自我、现实、家庭、过去、环境等。
- en: Faith in oneself and others in the world.
  id: totrans-795
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对自己和世界其他人的信仰。
- en: Courage.
  id: totrans-796
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 勇气。
- en: Trust.
  id: totrans-797
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 信任。
- en: Survival.
  id: totrans-798
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 生存。
- en: Confidence.
  id: totrans-799
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 信心。
- en: Selflessness and
  id: totrans-800
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 无私和
- en: Honor.
  id: totrans-801
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 荣誉。
- en: These are the things that human beings learn throughout their experiences and
    therefore these are the things that your characters must learn because that's
    what makes them human.
  id: totrans-802
  prefs: []
  type: TYPE_NORMAL
  zh: 这些是人类在经历中学习到的东西，因此这些也是你的角色必须学习的东西，因为这就是使他们成为人类的原因。
- en: It makes them relatable - it makes them real.
  id: totrans-803
  prefs: []
  type: TYPE_NORMAL
  zh: 这使它们变得可亲——使它们变得真实。
- en: This Universal Hook Fits Perfectly Into Developing A Series Character Arc For
    the Main Character/Sleuth.
  id: totrans-804
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 这个普遍的钩子完美地融入了为主角/侦探发展故事弧线。
- en: The series will be tracking the journey that character will take over the course
    of several books.
  id: totrans-805
  prefs: []
  type: TYPE_NORMAL
  zh: 这一系列将追踪角色在几本书的过程中所经历的旅程。
- en: You can use these universal themes to develop the series character arc for the
    sleuth.
  id: totrans-806
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以使用这些普遍主题来发展侦探角色的故事弧线。
- en: 'For example. By the end of The Psychic Mystery series our newly psychic Ellie
    will have moved from:'
  id: totrans-807
  prefs: []
  type: TYPE_NORMAL
  zh: 例如。到《心灵之谜》系列结束时，我们新获得心灵感应的艾莉将从一个地方：
- en: '| Book One | End of the Series |'
  id: totrans-808
  prefs: []
  type: TYPE_TB
  zh: '| 第一本书 | 系列结束 |'
- en: '| Being alone. Perhaps she has just ended a long relationship and is at a turning
    point in her life. | Finding love and a lasting romantic relationship |'
  id: totrans-809
  prefs: []
  type: TYPE_TB
  zh: '| 孤独。也许她刚刚结束了一段长期的关系，正处于生活的转折点。 | 寻找爱情和持久的浪漫关系 |'
- en: '| Regret and loss. | Forgiveness and self-forgiveness for past mistakes she
    made.Overcome a broken relationship. |'
  id: totrans-810
  prefs: []
  type: TYPE_TB
  zh: '| 后悔和损失。 | 对她过去犯下的错误进行宽恕和自我宽恕。克服破裂的关系。 |'
- en: '| Refusing to accept her new situation – she wants out! | Self-Acceptance of
    her skills and acceptance of her family. |'
  id: totrans-811
  prefs: []
  type: TYPE_TB
  zh: '| 拒绝接受她新的处境——她想要离开！ | 接受自己的技能，接受自己的家庭。 |'
- en: '| Unsure about her abilities. | Faith in herself and her abilities. |'
  id: totrans-812
  prefs: []
  type: TYPE_TB
  zh: '| 对她的能力不确定。 | 对自己和能力的信念。 |'
- en: '| Scared to make decisions and make changes. | Courage to make decisions. |'
  id: totrans-813
  prefs: []
  type: TYPE_TB
  zh: '| 害怕做决定和改变。 | 做决定的勇气。 |'
- en: '| Lack of trust in others as a direct result of being betrayed or let down
    by others. | Trust in her aunt and the small community she now calls home. |'
  id: totrans-814
  prefs: []
  type: TYPE_TB
  zh: '| 由于被背叛或失望，对他人缺乏信任。 | 对她阿姨和现在称之为家的这个小社区充满信任。 |'
- en: '| Unsure about her new psychic talents and this new town. | She knows now that
    she can survive any situation. |'
  id: totrans-815
  prefs: []
  type: TYPE_TB
  zh: '| 对她新的心灵感应能力和这个新镇感到不确定。 | 她现在知道她可以应对任何情况。 |'
- en: '| Lack of confidence. | Confidence in herself and her abilities. |'
  id: totrans-816
  prefs: []
  type: TYPE_TB
  zh: '| 缺乏自信。 | 对自己和能力的自信。 |'
- en: '| Some selfish behavior due to her vulnerability and loss. | Ellie has been
    taught to be kind and generous. |'
  id: totrans-817
  prefs: []
  type: TYPE_TB
  zh: '| 由于她的脆弱和损失，有一些自私的行为。 | 艾莉被教导要善良和慷慨。 |'
- en: What to Do Next?
  id: totrans-818
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 下一步该做什么？
- en: These four types of Story Hook can be combined together to fit  your story idea,
    theme, niche, voice, setting and emotional promise.
  id: totrans-819
  prefs: []
  type: TYPE_NORMAL
  zh: 这四种故事钩子可以结合起来，适应你的故事构思、主题、细分市场、声音、场景和情感承诺。
- en: Take some time at this point to work through the previous steps and develop
    at least one story idea that really excites you and you cannot wait to write!
  id: totrans-820
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个阶段，花些时间完成前面的步骤，至少发展出一个真正让你兴奋、迫不及待想要写的构思！
- en: If you are not there yet, repeat the Brainstorming Step, edit the prompts, and
    generate more responses from ChatGPT until you have several ideas to work on.
    Keep working on the premise until you are happy with it.
  id: totrans-821
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你还没有准备好，重复头脑风暴步骤，编辑提示，并从ChatGPT生成更多回应，直到你有几个可以工作的想法。继续在这个基础上工作，直到你对它满意。
- en: Combine Your Ideas To Create A Short Summary
  id: totrans-822
  prefs: []
  type: TYPE_NORMAL
  zh: 将你的想法结合起来，创建一个简短的摘要
- en: Worked Example. The Psychic Fair Mystery
  id: totrans-823
  prefs: []
  type: TYPE_NORMAL
  zh: 工作示例。心灵感应集市之谜
- en: '| Who is the sleuth? What do they do and why are they in this murder mystery?
    |'
  id: totrans-824
  prefs: []
  type: TYPE_TB
  zh: '| 谁是侦探？他们做什么，为什么他们会卷入这个谋杀案？ |'
- en: '| Ellie has come to stay with her aunt in an historic coastal town.Ellie is
    a professional chef who has resigned from her job in a major London restaurant.
    |'
  id: totrans-825
  prefs: []
  type: TYPE_TB
  zh: '| 艾莉来到这个历史悠久的沿海小镇，和她阿姨住在一起。艾莉是一位职业厨师，已经从一家伦敦大型餐厅辞职。 |'
- en: '| How does the sleuth get involved in the murder investigation? |'
  id: totrans-826
  prefs: []
  type: TYPE_TB
  zh: '| 侦探是如何卷入谋杀调查的？ |'
- en: '| She walks into her aunt’s craft studio and finds the dead body of a man who
    has been murdered with knitting needles. |'
  id: totrans-827
  prefs: []
  type: TYPE_TB
  zh: '| 她走进她阿姨的手工艺工作室，发现了一具被编织针谋杀的男人的尸体。 |'
- en: '| What are the main themes of the book? |'
  id: totrans-828
  prefs: []
  type: TYPE_TB
  zh: '| 书的主要主题是什么？ |'
- en: '| Crafts and Hobbies. Knitting, Crocheting, and Quilting. Coastal and Beach
    Communities. Psychic and Supernatural Abilities |'
  id: totrans-829
  prefs: []
  type: TYPE_TB
  zh: '| 手工艺和爱好。编织、钩针和拼布。沿海和海滩社区。心灵感应和超自然能力 |'
- en: '| What emotional experience does this book promise to deliver? |'
  id: totrans-830
  prefs: []
  type: TYPE_TB
  zh: '| 这本书承诺带来什么样的情感体验？ |'
- en: '| Fun, contemporary psychic mystery full of quirky and surprising characters,
    including senior sleuths, in a small coastal town. |'
  id: totrans-831
  prefs: []
  type: TYPE_TB
  zh: '| 在一个小沿海城镇中，充满古怪和令人惊讶的角色的有趣、现代心灵感应悬疑故事，包括资深侦探。 |'
- en: '| How is this different and new is some way? |'
  id: totrans-832
  prefs: []
  type: TYPE_TB
  zh: '| 这在某种程度上有什么不同和新鲜之处？ |'
- en: '| The victim grabbed her and transferred his psychic abilities to Ellie just
    before he died. |'
  id: totrans-833
  prefs: []
  type: TYPE_TB
  zh: '| 在死前，受害者抓住她，并将他的心灵感应能力传给了艾莉。 |'
- en: And there we have it. A Story Idea for Book One of a Cozy Mystery.
  id: totrans-834
  prefs: []
  type: TYPE_NORMAL
  zh: 就这样，我们得到了一个温馨悬疑小说第一部的构思。
- en: 'PART TWO: YOUR SLEUTH'
  id: totrans-835
  prefs: []
  type: TYPE_NORMAL
  zh: 第二部分：你的侦探
- en: '![A blue and white rectangular box with text  Description automatically generated](image_rsrc436.jpg)All
    about the Sleuth'
  id: totrans-836
  prefs: []
  type: TYPE_NORMAL
  zh: '![一个带有文字描述的蓝色和白色矩形盒子，描述自动生成](image_rsrc436.jpg)关于侦探的一切'
- en: There is one fundamental aspect of the cozy murder mystery genre which explains
    why readers come back to writers and series they love – it is all about the characters.
  id: totrans-837
  prefs: []
  type: TYPE_NORMAL
  zh: 温馨谋杀悬疑小说的一个基本方面解释了为什么读者会回到他们喜爱的作家和系列——这全部都是关于人物的。
- en: 'Note: For the sake of convenience, I am using an example of a female sleuth
    throughout this book, but of course the sleuth could be any gender or creature.'
  id: totrans-838
  prefs: []
  type: TYPE_NORMAL
  zh: 注意：为了方便起见，我在这本书中使用了女性侦探的例子，但当然侦探可以是任何性别或生物。
- en: I like to think of it this way.
  id: totrans-839
  prefs: []
  type: TYPE_NORMAL
  zh: 我喜欢这样想。
- en: As a reader, when I buy a cozy mystery, I want to feel that I am a tourist taking
    a vacation in an interesting new town/city/resort for a few days. I have booked
    a family-run bed and breakfast hotel, and the owners know everyone in the town.
    I am excited about who I will meet during my short stay and want to learn more
    about this town and its customs and heritage.
  id: totrans-840
  prefs: []
  type: TYPE_NORMAL
  zh: 作为读者，当我购买温馨悬疑小说时，我希望感觉自己像是一个游客，在有趣的新镇/城市/度假胜地度假几天。我预订了一家家庭经营的民宿酒店，酒店老板认识镇上的每一个人。我对在我短暂的逗留期间会遇到谁感到兴奋，并想更多地了解这个镇及其习俗和传统。
- en: I want to be transported into an interesting story world where I meet warm,
    charming, and quirky characters I want to spend time with and get to know better.
    I want to listen to their stories and unique voices and dive deep into their lives.
  id: totrans-841
  prefs: []
  type: TYPE_NORMAL
  zh: 我想被带入一个有趣的故事世界，在那里我遇到温暖、迷人且古怪的角色，我想花时间与他们相处并更好地了解他们。我想听他们的故事和独特的声音，深入他们的生活。
- en: How do I do that?
  id: totrans-842
  prefs: []
  type: TYPE_NORMAL
  zh: 我该如何做到这一点？
- en: By following the journey these characters take when there is a murder in their
    town, and they are forced to deal with the aftermath of the crime.
  id: totrans-843
  prefs: []
  type: TYPE_NORMAL
  zh: 通过跟随这些角色在他们的镇上发生谋杀案时所经历的旅程，以及他们被迫处理犯罪后的后果。
- en: One or two main characters will set out to discover who the killer is and bring
    them to justice before order can be restored to this small community.
  id: totrans-844
  prefs: []
  type: TYPE_NORMAL
  zh: 一两个主要人物将着手发现凶手是谁，并在恢复这个小社区秩序之前将他们绳之以法。
- en: In the process of investigating the murder, they reveal their true nature and
    backstories, making me connect with them at a much deeper level.
  id: totrans-845
  prefs: []
  type: TYPE_NORMAL
  zh: 在调查谋杀案的过程中，他们揭示了他们的真实本质和背景故事，使我与他们建立了更深层次的联系。
- en: When I finally pack my virtual suitcase and head home, I know that I will be
    coming back and spending more vacations in the company of this group of interesting
    people who have become more like old friends.
  id: totrans-846
  prefs: []
  type: TYPE_NORMAL
  zh: 当我最终收拾好我的虚拟行李箱并回家时，我知道我会回来，并在这个有趣的人群中度过更多的假期，他们已经变成了老朋友。
- en: That is why I would always recommend that you plan to write a series of books
    with the same main characters and setting from the start. Readers come back to
    this story world to reconnect with these same characters and discover what has
    changed in their lives.
  id: totrans-847
  prefs: []
  type: TYPE_NORMAL
  zh: 那就是为什么我总是建议你从一开始就计划写一系列以相同的主要人物和背景为特色的书籍。读者回到这个故事世界，重新与这些相同的角色建立联系，并发现他们的生活中发生了什么变化。
- en: None of that matters if the reader does not care about the main character and
    what happens to them.
  id: totrans-848
  prefs: []
  type: TYPE_NORMAL
  zh: 如果读者不关心主要人物以及他们所发生的事情，那么这一切都不重要。
- en: These are ordinary people dropped into extraordinary situations by circumstances
    outside their control, and there should be a personal reason why the sleuth is
    compelled to investigate this murder.
  id: totrans-849
  prefs: []
  type: TYPE_NORMAL
  zh: 这些是普通人，由于他们无法控制的环境因素而被投入到非凡的情况中，侦探被迫调查这起谋杀案应该有一个个人原因。
- en: Why should she put herself into the path of a murderer?
  id: totrans-850
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 她为什么要将自己置于谋杀者的道路上？
- en: Does the murder take place in her community or her place of work, for example?
    She is driven by a sense of justice to discover who committed this terrible crime
    and why.
  id: totrans-851
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 谋杀发生在她的社区或工作场所，例如？她被一种正义感驱使，要发现谁犯下了这起可怕的罪行以及为什么。
- en: Or does it impact a close family member who she knows to be innocent of the
    murder?
  id: totrans-852
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 或者它影响了一个她知道无辜于谋杀的亲密家庭成员？
- en: A sleuth is often a person who runs a business or has a hobby or skill that
    brings her into close contact with other members of her community.
  id: totrans-853
  prefs: []
  type: TYPE_NORMAL
  zh: 侦探通常是一个经营企业或拥有爱好或技能的人，这使她与社区的其他成员有密切接触。
- en: No matter the genre, our role as authors is to immerse our characters in the
    world of the story and then reveal their thoughts and actions when they face challenges
    and are forced to make difficult decisions.
  id: totrans-854
  prefs: []
  type: TYPE_NORMAL
  zh: 无论是什么类型，我们作为作者的角色是将我们的角色沉浸在故事的世界中，然后在他们面对挑战和被迫做出艰难决定时揭示他们的思想和行动。
- en: Readers should feel sympathy and empathy for our main characters and want to
    follow their journeys.
  id: totrans-855
  prefs: []
  type: TYPE_NORMAL
  zh: 读者应该对我们的主要人物表示同情和共鸣，并希望跟随他们的旅程。
- en: They have to care whether they will achieve their goals. And that begins with
    the main characters of our cozy mystery.
  id: totrans-856
  prefs: []
  type: TYPE_NORMAL
  zh: 他们必须关心他们是否会实现自己的目标。这一切都始于我们温馨悬疑故事的主要人物。
- en: Select One Main Amateur Sleuth With A Unique Twist.
  id: totrans-857
  prefs: []
  type: TYPE_NORMAL
  zh: 选择一个具有独特转折的主业余侦探。
- en: Classically, the sleuth is an ordinary person driven to take action to find
    the truth.
  id: totrans-858
  prefs: []
  type: TYPE_NORMAL
  zh: 传统上，侦探是一个普通人，被驱使采取行动以寻找真相。
- en: The sleuth should fit the context of the time period and setting. This is your
    main character, and you should know enough about them to get them onto the page
    as living, breathing people.
  id: totrans-859
  prefs: []
  type: TYPE_NORMAL
  zh: 侦探应该符合时代背景和设定。这是你的主要角色，你应该对他们足够了解，以便将他们描绘成活生生的、有呼吸的人。
- en: Our sleuth should be a realistic character that readers can identify with, who
    may reluctantly agree to get involved, but who has the skills and talents to see
    the clues, analyze the evidence, and solve the crime through common sense and
    her personal intuition.
  id: totrans-860
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的侦探应该是一个读者能够认同的现实人物，他可能不情愿地同意参与其中，但他拥有发现线索、分析证据并通过常识和个人的直觉解决犯罪的能力和才能。
- en: Get the groundwork done before you start work on the opening scenes.
  id: totrans-861
  prefs: []
  type: TYPE_NORMAL
  zh: 在开始处理开场场景之前，先做好基础工作。
- en: '![](image_rsrc437.jpg)'
  id: totrans-862
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc437.jpg)'
- en: What are the typical attributes and characteristics of the sleuth in modern
    cozy mystery novels?
  id: totrans-863
  prefs: []
  type: TYPE_NORMAL
  zh: 现代轻松悬疑小说中的侦探有哪些典型的属性和特点？
- en: '![](image_rsrc438.jpg)'
  id: totrans-864
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc438.jpg)'
- en: 'Modern cozy mystery sleuths, while sharing some traditional traits with their
    genre predecessors, often have attributes that reflect contemporary settings and
    sensibilities. Here are some common characteristics:'
  id: totrans-865
  prefs: []
  type: TYPE_NORMAL
  zh: 现代轻松悬疑小说的侦探，虽然与他们的流派前辈有一些传统特征，但通常具有反映当代环境和感性的属性。以下是一些常见的特点：
- en: '1\. Everyday Heroines/Heroes: They are usually ordinary people with relatable
    jobs and lives who are inadvertently drawn into mystery and murder. They are not
    professional detectives, but their natural curiosity and sense of justice lead
    them to become involved in solving crimes.'
  id: totrans-866
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 日常英雄/女英雄：他们通常是普通人，有着可以理解的工作和生活，无意中被卷入神秘和谋杀。他们不是专业侦探，但他们的自然好奇心和正义感使他们参与解决犯罪。
- en: '2\. Intelligence and Intuition: These sleuths typically possess a sharp intellect
    and keen intuition. They may not have formal training in law enforcement, but
    they are clever, observant, and skilled at piecing together clues.'
  id: totrans-867
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 智力与直觉：这些侦探通常拥有敏锐的智力和敏锐的直觉。他们可能没有在执法方面的正式培训，但他们是聪明的、观察力强的，并且擅长将线索拼凑在一起。
- en: '3\. Connection to the Community: The sleuth often has strong ties to their
    town or city, which can be both a blessing and a curse. Their insider status gives
    them access to gossip and secrets but can also make their investigations personally
    challenging.'
  id: totrans-868
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 与社区的关联：侦探通常与他们的城镇或城市有着紧密的联系，这既是祝福也是诅咒。他们的内部地位使他们能够接触到八卦和秘密，但也可能使他们的调查变得个人化且具有挑战性。
- en: '4\. A Personal Stake: Unlike traditional detectives, cozy sleuths often have
    a personal connection to the crime, such as a friend or family member being the
    suspect or victim, which drives their pursuit of the truth.'
  id: totrans-869
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 个人利益：与传统侦探不同，轻松侦探通常与犯罪有个人联系，例如朋友或家庭成员是嫌疑人或受害者，这驱使他们追求真相。
- en: '5\. Resourcefulness: They are often resourceful and come up with creative solutions
    to problems, sometimes using their professional skills or hobbies to gather information
    or deduce the identity of the criminal.'
  id: totrans-870
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 资源丰富：他们通常很机智，能够想出解决问题的创造性方法，有时使用他们的专业技能或爱好来收集信息或推断罪犯的身份。
- en: '6\. Morally Cantered: Cozy sleuths typically have a strong moral compass. They
    believe in justice and are often motivated by the desire to help others and see
    the guilty parties held accountable for their actions.'
  id: totrans-871
  prefs: []
  type: TYPE_NORMAL
  zh: 6. 道德中心：轻松侦探通常有强烈的道德指南针。他们相信正义，并且通常被帮助他人和看到有罪者对其行为负责的愿望所激励。
- en: '7\. Humor and Wit: They frequently have a good sense of humor, often dry or
    witty, which helps to lighten the mood of the stories and endear them to readers.'
  id: totrans-872
  prefs: []
  type: TYPE_NORMAL
  zh: 7. 幽默与机智：他们通常有很好的幽默感，常常是干练或机智的，这有助于减轻故事的气氛，并使读者感到亲切。
- en: '8\. Empathy and Compassion: Many have a great deal of empathy, which helps
    them understand and connect with other characters, even those who may be suspects
    in their investigation.'
  id: totrans-873
  prefs: []
  type: TYPE_NORMAL
  zh: 8. 同理心与同情：许多人有很强的同理心，这有助于他们理解和与其他角色建立联系，甚至包括那些可能是他们调查中的嫌疑人。
- en: '9\. Independence and Bravery: Despite the dangers they face, they are usually
    quite independent and brave, willing to put themselves in harm’s way to solve
    a crime, although they typically use their wits rather than physical prowess to
    outsmart the culprit.'
  id: totrans-874
  prefs: []
  type: TYPE_NORMAL
  zh: 9. 独立与勇气：尽管他们面临危险，但他们通常非常独立和勇敢，愿意冒险以解决犯罪，尽管他们通常使用智慧而不是体魄来智胜罪犯。
- en: '10\. Personal Growth: Over the course of a series, modern cozy sleuths often
    experience significant personal growth. They may develop new skills, form new
    relationships, or undergo changes in their personal lives.'
  id: totrans-875
  prefs: []
  type: TYPE_NORMAL
  zh: 10. 个人成长：在现代温馨悬疑系列中，侦探往往会在故事中经历显著的个人成长。他们可能会发展新技能，建立新关系，或在其个人生活中经历变化。
- en: '11\. Relationships: They often have a network of friends, family, or a community
    that assists, intentionally or unintentionally, with their investigations. This
    network also provides subplots and interpersonal drama that enrich the story.'
  id: totrans-876
  prefs: []
  type: TYPE_NORMAL
  zh: 11. 关系：他们通常有一个朋友、家人或社区网络，这些网络有意或无意地协助他们的调查。这个网络还提供了副线和人际戏剧，丰富了故事。
- en: '12\. Lifestyle Appeal: They often embody a lifestyle that appeals to readers,
    whether that''s running a small bookstore, baking, crafting, gardening, or owning
    a pet-centric business. Their profession or hobby frequently ties into the theme
    of the series and provides a backdrop for the mysteries.'
  id: totrans-877
  prefs: []
  type: TYPE_NORMAL
  zh: 12. 生活方式吸引力：他们通常体现了一种对读者有吸引力的生活方式，无论是经营一家小型书店、烘焙、手工艺、园艺还是拥有以宠物为中心的业务。他们的职业或爱好通常与系列的主题相关，并为谜团提供了背景。
- en: Modern cozy sleuths have evolved to reflect contemporary values and more diverse
    backgrounds, leading to stories that resonate with a wide range of readers who
    appreciate the genre's blend of charm, community, and intrigue, all served with
    a side of sleuthing sophistication.
  id: totrans-878
  prefs: []
  type: TYPE_NORMAL
  zh: 现代温馨悬疑侦探已经发展起来，反映了当代价值观和更多样化的背景，导致的故事与广泛读者产生共鸣，这些读者欣赏该体裁的魅力、社区和阴谋，所有这些都伴随着侦探的精致。
- en: These are great attributes for any cozy mystery sleuth, irrespective of gender.
  id: totrans-879
  prefs: []
  type: TYPE_NORMAL
  zh: 这些是任何温馨悬疑侦探的优秀品质，无论性别如何。
- en: They are not perfect and may suffer from inner conflict, but they are intelligent
    and resilient enough to identify the killer and bring justice to a broken community.
  id: totrans-880
  prefs: []
  type: TYPE_NORMAL
  zh: 他们并不完美，可能遭受内心的冲突，但他们足够聪明和坚韧，能够识别凶手并为一个破碎的社区带来正义。
- en: 'Two aspects in particular stand out for me:'
  id: totrans-881
  prefs: []
  type: TYPE_NORMAL
  zh: 有两个特别突出的方面对我而言：
- en: At the beginning of the story, the sleuth should be at some form of crossroads
    or crisis in their life. This is key for that character growth/character arc that
    readers love to see. This would be particularly important if the sleuth has a
    profession or hobby linked to the murder.
  id: totrans-882
  prefs: []
  type: TYPE_NORMAL
  zh: 在故事的开头，侦探应该处于某种形式的十字路口或生活中的危机。这对于读者喜爱的角色成长/角色弧线至关重要。如果侦探有一个与谋杀案相关的职业或爱好，这一点尤为重要。
- en: Secondly. You should make the murder personal to the sleuth.
  id: totrans-883
  prefs: []
  type: TYPE_NORMAL
  zh: 其次，你应该让谋杀对侦探来说变得个人化。
- en: What if someone is trying to hurt the people you love in your family, friends,
    or community?  What would you do to protect them?  Would you want to learn more
    about the person threatening them, even if this puts you in danger?
  id: totrans-884
  prefs: []
  type: TYPE_NORMAL
  zh: 如果有人试图伤害你家庭、朋友或社区中你爱的人，你会怎么做来保护他们？你愿意了解更多关于威胁他们的人的信息，即使这会让你处于危险之中吗？
- en: These personal connections mean that the stakes are high from the start.
  id: totrans-885
  prefs: []
  type: TYPE_NORMAL
  zh: 这些个人联系意味着从一开始赌注就很高。
- en: Now increase those stakes – make this the worst thing that could happen to our
    sleuth and those she cares about.
  id: totrans-886
  prefs: []
  type: TYPE_NORMAL
  zh: 现在提高这些赌注——让这成为我们侦探和她所关心的人可能遇到的最糟糕的事情。
- en: For example. What if? The murder victim was linked to a member of the sleuth’s
    family, and they are now the prime suspect in the murder. How would that impact
    the murder investigation?
  id: totrans-887
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，如果？受害者与侦探的家人有关联，现在他们成为了谋杀案的主要嫌疑人。这会如何影响谋杀案的侦查？
- en: Non-Personal Cozy Mysteries
  id: totrans-888
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 非个人温馨悬疑故事
- en: There are cozy mysteries where the sleuth only has a slight connection with
    the victim but gets involved in the murder investigation in order to seek justice
    or out of compassion for the victim’s family and friends.
  id: totrans-889
  prefs: []
  type: TYPE_NORMAL
  zh: 有一些温馨悬疑故事，侦探与受害者只有微弱的联系，但他们参与谋杀案调查是为了寻求正义或出于对受害者家人和朋友的同情。
- en: Story Idea. The sleuth lives in a small town in Alaska and, totally by chance,
    comes across a car that has crashed into a tree on a remote country road. The
    elderly driver had been shot. What was he doing there? He is not a local person.
    Who would want to kill him, and why?
  id: totrans-890
  prefs: []
  type: TYPE_NORMAL
  zh: 故事构思。侦探住在阿拉斯加的一个小镇上，完全偶然地发现了一辆在偏远乡村道路上撞进树里的汽车。年老的司机被枪杀了。他在那里做什么？他不是当地人。谁会想杀他，为什么？
- en: What if? The sleuth in this scenario is the wife of the late sheriff in this
    small town. She knows all of the local criminals and ex-cons. The new sheriff
    might ignore her, but her posse of unconventional ex-con investigators will get
    to the truth.
  id: totrans-891
  prefs: []
  type: TYPE_NORMAL
  zh: 如果？在这个场景中，神探是这个小镇已故郡警长的妻子。她了解所有当地罪犯和前科犯。新郡警可能忽视她，但她的非传统前科犯调查团将找到真相。
- en: Travel Mysteries
  id: totrans-892
  prefs: []
  type: TYPE_NORMAL
  zh: 旅行悬疑
- en: If the sleuth is traveling from location to location, then they should have
    the skills and attributes to get involved in the murder investigation.
  id: totrans-893
  prefs: []
  type: TYPE_NORMAL
  zh: 如果神探在从一个地方旅行到另一个地方，那么他们应该具备参与谋杀调查的技能和属性。
- en: That murder in that town creates a one-time community where the sleuth can interact
    with the local characters and law enforcement officers to solve a murder.
  id: totrans-894
  prefs: []
  type: TYPE_NORMAL
  zh: 那个城镇的谋杀案创造了一个一次性的社区，神探可以与当地人物和执法官员互动，以解决这起谋杀案。
- en: Perhaps they are former police officers or journalists who know how to interview
    suspects and still have contacts they can use to support an investigation.
  id: totrans-895
  prefs: []
  type: TYPE_NORMAL
  zh: 他们可能是前警官或记者，知道如何审问嫌疑人，并且仍然有可以用来支持调查的联系。
- en: Story idea. The sleuth is traveling on a cruise ship, and the passenger in the
    next cabin is found murdered. The sleuth only spoke to this passenger a few times
    but wants justice for this kind, shy person who was traveling alone.
  id: totrans-896
  prefs: []
  type: TYPE_NORMAL
  zh: 故事想法。神探正在游轮上旅行，发现隔壁船舱的乘客被谋杀。神探只和这位乘客说过几次话，但想为这位善良、害羞的独自旅行者伸张正义。
- en: What if? The sleuth in this scenario is on a 70th birthday celebration cruise
    with two of her quirkiest best friends. You don’t argue with these gals or try
    and fob them off!
  id: totrans-897
  prefs: []
  type: TYPE_NORMAL
  zh: 如果？在这个场景中，神探正在与两位最古怪的最佳朋友一起庆祝70岁生日庆祝游轮。你不会和这些女孩争论，也不会试图摆脱她们！
- en: Even when the sleuth has no personal connection to the victim, you can still
    create an engaging character and an intriguing plot line.
  id: totrans-898
  prefs: []
  type: TYPE_NORMAL
  zh: 即使神探与受害者没有个人联系，你仍然可以创造一个引人入胜的角色和引人入胜的情节线。
- en: It's time to create new prompts to investigate your ideas.
  id: totrans-899
  prefs: []
  type: TYPE_NORMAL
  zh: 是时候创建新的提示来调查你的想法了。
- en: '![](image_rsrc439.jpg)'
  id: totrans-900
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrc439.jpg)'
- en: 'I want to write a modern cozy murder mystery. Can you give me a character profile
    for the main female character and sleuth. This profile should include: a physical
    description, background, current crisis, personality, murder connection and character
    arc.'
  id: totrans-901
  prefs: []
  type: TYPE_NORMAL
  zh: 我想写一部现代温馨谋杀悬疑小说。你能为我提供主要女性角色和神探的人物简介吗？这个简介应包括：外貌描述、背景、当前危机、性格、谋杀关联和人物弧线。
- en: At the beginning of the story, the sleuth should be at some form of crossroads
    or crisis in their life and has returned to the historical coastal town of Polperran
    to spend the summer with her aunt who runs a craft store.  This sleuth is called
    Ellie. Ellie is a professional chef who has resigned from her job in a major London
    restaurant.
  id: totrans-902
  prefs: []
  type: TYPE_NORMAL
  zh: 在故事开始时，神探应该在他们的生活中遇到某种形式的十字路口或危机，并回到她阿姨经营的工艺品店所在的历史性沿海小镇Polperran度过夏天。这位神探名叫Ellie。Ellie是一位职业厨师，已经从一家主要的伦敦餐厅辞职。
- en: The murder victim should be linked to her aunt’s craft store, and her aunt is
    a suspect.
  id: totrans-903
  prefs: []
  type: TYPE_NORMAL
  zh: 被害人与她阿姨的工艺品店有关联，而她阿姨是嫌疑人。
- en: The sleuth has all of the typical attributes and characteristics of the sleuth
    in modern cozy mystery novels.
  id: totrans-904
  prefs: []
  type: TYPE_NORMAL
  zh: 神探拥有现代温馨悬疑小说中神探的典型属性和特征。
- en: '![](image_rsrc43A.jpg)'
  id: totrans-905
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrc43A.jpg)'
- en: 'Character Profile: Ellie Marsh'
  id: totrans-906
  prefs: []
  type: TYPE_NORMAL
  zh: 人物简介：Ellie Marsh
- en: 'Physical Description: Ellie Marsh is in her early thirties, with a lithe figure
    and an easy smile that hints at her approachable nature. Her wavy chestnut hair
    falls in loose curls around her shoulders, often pulled back in a practical ponytail
    when she''s busy in the kitchen. Her hazel eyes hold a sharp intelligence, and
    she is always observant of her surroundings.'
  id: totrans-907
  prefs: []
  type: TYPE_NORMAL
  zh: 外貌描述：Ellie Marsh三十多岁，身材苗条，面带轻松的笑容，暗示着她平易近人的性格。她波浪状的栗色头发松散地垂至肩部，当她忙于厨房时，经常扎成一个实用的马尾辫。她的
    hazel 眼睛充满敏锐的智慧，她总是对周围环境保持警觉。
- en: 'Background: Originally from Polperran, Ellie left her hometown to pursue her
    culinary dreams in London. Trained at a prestigious culinary institute, she honed
    her skills in some of the city''s top restaurants, earning a reputation for her
    inventive dishes and dedication to her craft. However, after years of fast-paced
    city life, Ellie craved a change and decided to take a break from the culinary
    world.'
  id: totrans-908
  prefs: []
  type: TYPE_NORMAL
  zh: 背景：Ellie原本来自Polperran，为了追求在伦敦的烹饪梦想而离开家乡。在一家著名的烹饪学院接受培训后，她在伦敦一些顶级餐厅磨练了她的技能，因她富有创意的菜肴和对烹饪艺术的奉献而赢得了声誉。然而，在多年的快节奏城市生活后，Ellie渴望改变，决定从烹饪界暂时休息一下。
- en: 'Current Crisis: Ellie has recently resigned from her position as head chef
    at a major London restaurant, feeling burnt out and disillusioned with the cutthroat
    nature of the industry. Unsure of her next steps, she decides to return to her
    quaint coastal hometown of Polperran for the summer, seeking solace and a chance
    to reconnect with her roots.'
  id: totrans-909
  prefs: []
  type: TYPE_NORMAL
  zh: 当前危机：艾莉最近辞去了在一家大型伦敦餐厅担任主厨的职位，感到疲惫不堪，并对行业的残酷性质感到幻灭。不确定下一步该做什么，她决定回到她那宁静的沿海家乡波尔佩兰度过夏天，寻求慰藉和重新与根源建立联系的机会。
- en: 'Personality: Ellie is a fiercely independent and resourceful woman with a sharp
    wit and a kind heart. She possesses a keen sense of intuition and a natural curiosity
    that serves her well in solving mysteries. Despite her tough exterior, she cares
    deeply for her loved ones and is fiercely loyal to those she trusts. Ellie is
    also known for her culinary prowess, finding solace and expression through cooking.'
  id: totrans-910
  prefs: []
  type: TYPE_NORMAL
  zh: 性格特点：艾莉是一位独立、机智、心地善良的女性。她拥有敏锐的直觉和天生的好奇心，这些特质在解决谜题时对她大有裨益。尽管她外表坚强，但她对亲人关怀备至，对信任的人忠诚无比。艾莉还以其烹饪技艺而闻名，通过烹饪找到慰藉和表达。
- en: 'Murder Connection: The murder victim is a regular customer at Ellie''s aunt''s
    craft store in Polperran. Ellie''s aunt becomes a prime suspect in the investigation,
    drawing Ellie into the case as she seeks to clear her aunt''s name and uncover
    the truth behind the murder.'
  id: totrans-911
  prefs: []
  type: TYPE_NORMAL
  zh: 谋杀关联：谋杀受害者是艾莉阿姨在波尔佩兰的工艺品店的常客。艾莉的阿姨成为调查的主要嫌疑人，艾莉因此卷入案件，她试图洗清阿姨的名誉，揭开谋杀背后的真相。
- en: 'Character Arc: At the beginning of the story, Ellie is at a crossroads in her
    life, questioning her career choices and searching for a sense of purpose. Through
    her involvement in the murder investigation, Ellie rediscovers her passion for
    solving puzzles and helping others, ultimately finding a new direction for her
    life beyond the confines of the kitchen.'
  id: totrans-912
  prefs: []
  type: TYPE_NORMAL
  zh: 人物弧线：故事开始时，艾莉正处于人生的十字路口，质疑自己的职业选择，并寻找一种使命感。通过参与谋杀调查，艾莉重新发现了自己对解决谜题和帮助他人的热情，最终在厨房之外找到了她生活的新的方向。
- en: Along the way, she learns valuable lessons about resilience, forgiveness, and
    the importance of community, emerging as a stronger and more fulfilled individual
    by the story's end.
  id: totrans-913
  prefs: []
  type: TYPE_NORMAL
  zh: 在旅途中，她学到了关于坚韧、宽恕和社区重要性的宝贵教训，到故事结束时，她成为一个更强大、更满足的人。
- en: There are a lot of exciting suggestions here to work on.
  id: totrans-914
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有很多激动人心的建议可以着手实施。
- en: I want to expand on the idea that at the beginning of the story, Ellie should
    be at some form of crossroads or crisis in their life. This is key for that character
    growth/character arc that readers love to see. Why did she resign from her prestigious
    job?
  id: totrans-915
  prefs: []
  type: TYPE_NORMAL
  zh: 我想扩展故事开始时艾莉应该处于某种形式的十字路口或危机中的想法。这对于读者喜爱的角色成长/角色弧线至关重要。她为什么辞去了那份声望很高的工作？
- en: '![](image_rsrc43B.jpg)'
  id: totrans-916
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc43B.jpg)'
- en: You are a very experienced cozy mystery author who is an expert at crafting
    well-rounded, engaging characters that your cozy mystery readers love. We will
    create a character profile for the main character and sleuth of my modern, cozy
    murder mystery series. Here is what I know so far about the character:  The main
    character and sleuth is Ellie Marsh. Ellie has just returned to the small coastal
    town of Polperran to spend the summer. Ellie has recently resigned from her position
    as head chef at a major London restaurant, feeling burnt out and disillusioned
    with the cutthroat nature of the industry. Unsure of her next steps, she decides
    to return to her quaint coastal hometown of Polperran for the summer, seeking
    solace and a chance to reconnect with her roots.
  id: totrans-917
  prefs: []
  type: TYPE_NORMAL
  zh: 你是一位经验丰富的温馨悬疑小说作家，擅长塑造全面、引人入胜的角色，这些角色深受你的温馨悬疑小说读者的喜爱。我们将为主角和侦探创建一个角色档案，我的现代温馨谋杀悬疑系列的主角和侦探是艾莉·玛什。艾莉刚刚回到这个偏远的沿海小镇波尔佩兰度过夏天。艾莉最近辞去了在一家大型伦敦餐厅担任主厨的职位，感到疲惫不堪，并对行业的残酷性质感到幻灭。不确定下一步该做什么，她决定回到她那宁静的沿海家乡波尔佩兰度过夏天，寻求慰藉和重新与根源建立联系的机会。
- en: Please give me 10 reasons why Ellie could have resigned and is at some form
    of crossroads or crisis in their life at the start of this story. This is key
    for that character growth/character arc that readers love to see. Make these reasons
    deep and emotional.
  id: totrans-918
  prefs: []
  type: TYPE_NORMAL
  zh: 请给我10个理由，说明艾莉为什么辞职，并在故事开始时处于某种形式的十字路口或危机中。这对于读者喜爱的角色成长/角色弧线至关重要。这些理由要深刻、情感丰富。
- en: '![](image_rsrc43C.jpg)'
  id: totrans-919
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc43C.jpg)'
- en: 'Loss of Identity: Ellie had poured her heart and soul into her career as a
    chef, but as the years passed, she began to realize that she had become defined
    solely by her job. The thought of being unable to separate herself from her profession
    left her feeling hollow, as if she had lost sight of who she truly was beyond
    the kitchen.'
  id: totrans-920
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 身份的失落：艾莉将自己的心魂倾注于厨师职业，但随着岁月的流逝，她开始意识到自己已经被工作所定义。想到自己无法从职业中分离出来，她感到空虚，仿佛她失去了在厨房之外真正是谁的视线。
- en: 'Betrayal of Passion: Cooking had once been Ellie''s sanctuary, a place where
    she could express herself and find solace in the midst of chaos. However, the
    relentless demands of the restaurant industry had turned her passion into a source
    of stress and disillusionment. The betrayal of something she had once loved so
    deeply left her feeling heartbroken and directionless.'
  id: totrans-921
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 热爱的背叛：烹饪曾经是艾莉的避风港，一个她可以表达自己并在混乱中找到慰藉的地方。然而，餐饮业的不断要求已经将她热爱的事物变成了压力和幻灭的来源。对她曾经深爱的事物所背叛的感觉让她心碎，感到迷茫。
- en: 'Loneliness in Success: Despite her professional achievements, Ellie couldn''t
    shake the overwhelming sense of loneliness that gnawed at her soul. Surrounded
    by colleagues and customers, she felt utterly isolated, longing for genuine connection
    and meaningful relationships that went beyond the surface-level interactions of
    her work life.'
  id: totrans-922
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 成功中的孤独：尽管她在事业上取得了成就，但艾莉无法摆脱那种啃噬她灵魂的强烈孤独感。尽管周围有同事和客户，她却感到完全孤立，渴望真诚的联系和超越工作生活表面互动的有意义的关系。
- en: 'Fear of Failure: The pressure to excel in her career had always been a driving
    force for Ellie, pushing her to strive for perfection at all costs. However, as
    the weight of expectation grew heavier, she found herself crippled by a paralyzing
    fear of failure. The thought of falling short of her own impossibly high standards
    filled her with a suffocating dread.'
  id: totrans-923
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 失败的恐惧：对事业卓越的压力一直是艾莉的驱动力，推动她不惜一切代价追求完美。然而，随着期望的重压越来越大，她发现自己被一种令人瘫痪的失败恐惧所困扰。想到自己无法达到自己那不可能的高标准，她充满了窒息的恐惧。
- en: 'Emotional Exhaustion: Years of suppressing her own emotions and prioritizing
    the needs of others had left Ellie emotionally drained and depleted. The constant
    demands of her job had forced her to bury her feelings deep beneath the surface,
    until she could no longer recognize herself in the reflection of the person she
    had become.'
  id: totrans-924
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 情感疲惫：多年压抑自己的情感，优先考虑他人的需求，已经让艾莉情感上疲惫不堪。她工作的不断要求迫使她将情感深埋在表面之下，直到她无法再在镜子里认出自己变成了怎样的人。
- en: 'Yearning for Connection: Beneath her tough exterior, Ellie longed for genuine
    connection and intimacy, a yearning that had only grown stronger with each passing
    day. The thought of spending another moment alone in a crowded city filled her
    with a profound sense of longing, driving her to seek solace in the familiar embrace
    of her coastal hometown.'
  id: totrans-925
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 对联系的渴望：在她坚韧的外表之下，艾莉渴望真诚的联系和亲密，这种渴望随着日子的流逝而越来越强烈。想到在拥挤的城市中又独自度过一分钟，她充满了深刻的渴望，驱使她寻求在她熟悉的家乡怀抱中的慰藉。
- en: 'Self-Doubt and Insecurity: Despite her outward confidence, Ellie was plagued
    by nagging doubts and insecurities that whispered cruelly in the darkest corners
    of her mind. The constant comparison to her peers and the relentless scrutiny
    of her work left her feeling inadequate and unworthy of the success she had achieved.'
  id: totrans-926
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 自我怀疑和不安全感：尽管她表面上自信，但艾莉被那些在心灵最黑暗的角落里低语着残酷的自我怀疑和不安全感所困扰。与同龄人的不断比较和对她工作的无情审查让她感到自己不足，不配拥有她所取得的成就。
- en: 'Desperation for Change: The suffocating monotony of her daily routine had become
    unbearable, leaving Ellie desperate for any semblance of change or reprieve. The
    thought of spending another day trapped in the same cycle of repetition filled
    her with a desperate longing for escape, driving her to make the drastic decision
    to leave her old life behind.'
  id: totrans-927
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 对改变的绝望：她日常生活的单调乏味已经变得难以忍受，艾莉迫切希望有任何改变或解脱的迹象。想到又要度过一天，被困在同样的重复循环中，她充满了逃离的渴望，驱使她做出离开旧生活的极端决定。
- en: 'Grief for Lost Dreams: With each passing year, Ellie''s dreams slowly slipped
    through her fingers like grains of sand, leaving behind only a lingering sense
    of grief and regret. The realization that she had sacrificed so much for a dream
    that no longer brought her joy left her feeling as if she were mourning the death
    of her own aspirations.'
  id: totrans-928
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 对失去梦想的悲伤：随着岁月的流逝，艾莉的梦想像沙粒一样慢慢从她指间滑落，留下的是挥之不去的悲伤和遗憾。意识到她为了一个不再给她带来快乐的梦想而牺牲了这么多，让她感觉自己像是在哀悼自己梦想的死亡。
- en: 'Search for Healing: Beneath the weight of her burdens, Ellie yearned for healing
    and renewal, a chance to shed the layers of pain and disappointment that had accumulated
    over the years. The thought of returning to her hometown offered a glimmer of
    hope in the darkness, a chance to rediscover herself and reclaim the pieces of
    her soul that she had lost along the way.'
  id: totrans-929
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 寻找疗愈：在重负之下，艾莉渴望疗愈和新生，一个机会，摆脱多年积累的痛苦和失望的层层叠加。回到家乡的想法在黑暗中带来了一线希望，一个机会，重新发现自我，找回她沿途失去的灵魂碎片。
- en: I like these ideas, but I want to increase the loss and connection in Ellie’s
    backstory, which will form the beginning of her character arc when she returns
    to the small coastal town of Polperran.
  id: totrans-930
  prefs: []
  type: TYPE_NORMAL
  zh: 我喜欢这些想法，但我想增加艾莉背景故事中的损失和联系，这将形成她返回波尔佩兰这个小型沿海小镇时角色弧的开始。
- en: Let’s Play the “What-if” Game for the Sleuth’s Backstory.
  id: totrans-931
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 让我们为侦探的背景故事玩“如果……”游戏。
- en: I like Betrayal of Passion, Loss of Identity, and Emotional Exhaustion.
  id: totrans-932
  prefs: []
  type: TYPE_NORMAL
  zh: 我喜欢激情背叛、身份丧失和情感耗竭。
- en: What if? Ellie had been working with Marco, her ex-boyfriend and chef manager,
    for the last ten years.
  id: totrans-933
  prefs: []
  type: TYPE_NORMAL
  zh: 如果……？艾莉过去十年一直在与她的前男友和厨师经理马可共事。
- en: He is opening an exciting second restaurant and promised Ellie that she would
    be head chef with her name on the door, but at the last minute, he gave the role
    to a newly trained and very arrogant chef who also happens to be his latest girlfriend.
    Her billionaire father is investing in the business.
  id: totrans-934
  prefs: []
  type: TYPE_NORMAL
  zh: 他正在开设一家令人兴奋的第二家餐厅，并承诺艾莉她将成为主厨，名字将挂在门上，但最后一刻，他把这个角色给了新训练的非常傲慢的厨师，这位厨师碰巧也是他最新的女朋友。她的亿万富翁父亲正在投资这个业务。
- en: What if? Marco expects Ellie to provide the recipes and run the kitchen to make
    it a success for the inexperienced girl. He gives her vague promises of future
    promotion but refuses to put anything in writing.
  id: totrans-935
  prefs: []
  type: TYPE_NORMAL
  zh: 如果……？马可期望艾莉提供食谱并管理厨房，让这个缺乏经验的女孩成功。他给她含糊的关于未来晋升的承诺，但拒绝书面承诺。
- en: What if? He owes her six weeks’ paid holiday, and she decides to take it all
    immediately - and walks out.
  id: totrans-936
  prefs: []
  type: TYPE_NORMAL
  zh: 如果……？他欠她六周的带薪假期，她决定立刻全部休假——然后离开。
- en: Now, we take all those ideas and work with ChatGPT to generate more ideas for
