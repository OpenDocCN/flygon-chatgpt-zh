  zh: '[****How** ****it** ****works** **?**]'
- en: '****Sce**nari**o ****Pla**nnin**g ****wo**rks** ****b**y** ****as**kin**g ****t**he**
    ****L**LM** ****t**o** ****ima**gin**e ****a**nd** ****des**crib**e ****mul**tipl**e
    ****scen**ario**s ****th**at** ****co**uld** ****un**fol**d ****ba**sed** ****o**n**
    ****diff**eren**t ****ini**tia**l ****cond**ition**s ****o**r** ****spe**cifi**c
    ****deci**sion**s. ****T**he** ****pr**omp**t ****mi**ght** ****inc**lud**e ****a****
    ****req**ues**t ****t**o** ****des**crib**e, ****f**or** ****exa**mpl**e, ****t**he**
    “****be**st**”, “****wo**rst**”, ****a**nd** “****mo**st** ****li**kel**y” ****pos**sibl**e
    ****out**come**s, ****o**r** ****a**ny** ****ot**her** ****s**et** ****o**f**
    ****des**ire**d ****vari**able**s.'
  id: totrans-818
  prefs: []
  type: TYPE_NORMAL
  zh: '****Scenario** ****Planning** ****works** ****by** ****asking** ****the** ****LLM**
    ****to** ****imagine** ****and** ****describe** ****multiple** ****scenarios**
    ****that** ****could** ****unfold**** **based** ****on** ****different** ****initial**
    ****conditions** ****or** ****specific** ****decisions.**** **The** ****prompt**
    ****might** ****include** ****a** ****request** ****to** ****describe, ****for**
    ****example, ****the** ****“****best**”, ****“****worst**”, ****and** ****“****most**
    ****likely”**** **possible** ****outcomes**, ****or** ****any** ****other** ****set**
    ****of** ****desired** ****variables.'
- en: '****F**or** ****exa**mpl**e, ****i**f** ****y**ou** ****a**re** ****as**kin**g,
    “****Wh**at** ****wi**ll** ****t**he** ****fu**tur**e ****o**f** ****rene**wabl**e
    ****en**erg**y ****lo**ok** ****li**ke** ****i**n** ****t**he** ****ne**xt** ****2**0**
    ****ye**ars**?”, ****t**he** ****mo**del** ****c**an** ****b**e** ****to**ld**
    ****t**o** ****des**crib**e ****th**ree** ****scen**ario**s: ****o**ne** ****wh**ere**
    ****th**ere** ****i**s** ****mas**siv**e ****inve**stmen**t ****i**n** ****cl**ean**
    ****en**erg**y, ****o**ne** ****wh**ere** ****th**ere** ****i**s** ****li**ttl**e
    ****inve**stmen**t, ****a**nd** ****a**** ****th**ird** ****wh**ere** ****pol**icie**s
    ****a**re** ****inco**nsiste**nt. ****Ea**ch** ****sce**nari**o ****i**s** ****desc**ribe**d
    ****b**y** ****cons**iderin**g ****h**ow** ****t**he** ****ele**ment**s ****va**ry**
    ****a**nd** ****wh**at** ****t**he** ****cons**equenc**es ****wo**uld** ****b**e**
    ****i**n** ****ea**ch** ****ca**se**.'
  id: totrans-819
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，如果你在问，“未来20年可再生能源的前景将是什么样子？”，模型可以描述三种情景：一种是在清洁能源上有大量投资，一种是在清洁能源上投资很少，还有一种是在政策上不一致。每个情景都是通过考虑元素如何变化以及每种情况下的后果来描述的。
- en: '****Sce**nari**o ****pla**nnin**g ****i**s** ****effe**ctiv**e ****bec**aus**e
    ****i**t** ****al**low**s ****f**or** ****t**he** ****ana**lysi**s ****o**f**
    ****uncer**tainti**es ****a**nd** ****he**lps** ****pre**par**e ****act**ion**s
    ****f**or** ****diff**eren**t ****pos**sibl**e ****out**come**s. ****Th**is**
    ****inc**lude**s ****iden**tifyin**g ****pote**ntia**l ****ri**sks** ****a**nd**
    ****oppor**tuniti**es ****f**or** ****inno**vatio**n, ****wh**ich** ****i**s**
    ****esse**ntia**l ****f**or** ****man**agin**g ****dyn**ami**c ****a**nd** ****unpre**dictab**le
    ****situ**ation**s.'
  id: totrans-820
  prefs: []
  type: TYPE_NORMAL
  zh: '**情景规划**之所以有效，是因为它允许分析不确定性，并帮助为不同的可能结果制定行动方案。这包括识别创新的风险和机会，这对于管理动态和不可预测的情况至关重要。'
- en: '[****Wh**en** ****t**o** ****u**se** ]'
  id: totrans-821
  prefs: []
  type: TYPE_NORMAL
  zh: '[何时使用]'
- en: '****Sce**nari**o ****Pla**nnin**g ****sh**oul**d ****b**e** ****us**ed** ****wh**en**
    ****th**ere** ****i**s** ****a**** ****sign**ifican**t ****le**vel** ****o**f**
    ****unce**rtaint**y ****a**nd** ****mul**tipl**e ****fut**ure**s ****a**re** ****pos**sibl**e.
    ****I**t** ****i**s** ****a**n** ****esse**ntia**l ****tech**niqu**e ****i**n**
    ****t**he** ****deve**lopmen**t ****o**f** ****bus**ines**s ****stra**tegie**s,
    ****envir**onment**al ****pla**nnin**g, ****a**nd** ****pu**bli**c ****po**lic**y,
    ****wh**ere** ****deci**sion**s ****m**ay** ****ha**ve** ****lo**ng**-****te**rm**
    ****imp**act**s ****a**nd** ****wh**ere** ****i**t** ****i**s** ****nece**ssar**y
    ****t**o** ****pre**par**e ****f**or** ****diff**eren**t ****out**come**s.'
  id: totrans-822
  prefs: []
  type: TYPE_NORMAL
  zh: '**情景规划**应在存在显著的不确定性和多种可能未来时使用。它是制定商业策略、环境规划和公共政策中的基本技术，在这些领域中，决策可能具有长期影响，并且需要为不同的结果做好准备。'
- en: '****I**t** ****i**s** ****id**eal** ****f**or** ****situ**ation**s ****wh**ere**
    ****th**ere** ****i**s** ****n**o** ****si**ngl**e ****ri**ght** ****an**swe**r
    ****o**r** ****wh**ere** ****th**ere** ****a**re** ****vari**able**s ****th**at**
    ****c**an** ****infl**uenc**e ****t**he** ****out**com**e ****i**n** ****diff**eren**t
    ****wa**ys**. ****Th**is** ****tech**niqu**e ****i**s** ****us**efu**l ****f**or**
    ****prep**arin**g ****f**or** ****t**he** ****unex**pecte**d, ****iden**tifyin**g
    ****ga**ps**, ****a**nd** ****deve**lopin**g ****alte**rnativ**es ****t**o** ****mit**igat**e
    ****ri**sks** ****o**r** ****se**ize** ****oppor**tuniti**es.'
  id: totrans-823
  prefs: []
  type: TYPE_NORMAL
  zh: 它适用于存在多个答案或变量可以以不同方式影响结果的情况。这种技术对于准备应对意外情况、识别差距以及开发缓解风险或抓住机会的替代方案非常有用。
- en: '****Furt**hermor**e, ****th**is** ****tech**niqu**e ****i**s** ****reco**mmende**d
    ****i**n** ****con**text**s ****wh**ere** ****o**ne** ****wa**nts** ****t**o**
    ****unde**rstan**d ****h**ow** ****cer**tai**n ****cha**nge**s ****co**uld** ****tran**sfor**m
    ****t**he** ****envi**ronmen**t ****i**n** ****wh**ich** ****o**ne** ****i**s**
    ****ins**erte**d. ****Sce**nari**o ****Pla**nnin**g ****al**low**s ****o**ne**
    ****t**o** ****exp**lor**e ****t**he** ****im**pac**t ****o**f** ****pol**icie**s
    ****o**r** ****ext**erna**l ****ev**ent**s, ****su**ch** ****a**s** ****techn**ologic**al
    ****adv**ance**s, ****eco**nomi**c ****cr**ise**s ****o**r** ****cli**mat**e ****ch**ang**e,
    ****cre**atin**g ****a**** ****me**nta**l ****m**ap** ****o**f** ****pos**sibl**e
    ****pa**ths**.'
  id: totrans-824
  prefs: []
  type: TYPE_NORMAL
  zh: '****此外，这种技术****在需要理解某些变化如何改变一个人所处环境的背景下被推荐。****情景规划****允许一个人探索政策或外部事件（如技术进步、经济危机或气候变化）的影响，创建一个可能的路径心理地图。'
- en: '[****Ti**ps** ****f**or** ****u**se**]'
  id: totrans-825
  prefs: []
  type: TYPE_NORMAL
  zh: '[****使用技巧****](https://example.org)'
- en: ● ****A**sk** ****t**he** ****L**LM** ****t**o** ****ima**gin**e ****diff**eren**t
    ****scen**ario**s, ****su**ch** ****a**s** "****opti**misti**c", "****pess**imisti**c"
    ****a**nd** "****real**isti**c", ****t**o** ****co**ver** ****a**** ****wi**de**
    ****ra**nge** ****o**f** ****possi**biliti**es.
  id: totrans-826
  prefs: []
  type: TYPE_NORMAL
  zh: ● 请让****LLM****想象不同的情景，例如“****乐观****”、“****悲观****”和“****现实主义****”，以涵盖广泛的可能情况。
- en: ● ****U**se** ****ques**tion**s ****th**at** ****inv**olv**e ****cond**ition**s
    ****o**r** ****assu**mption**s, ****su**ch** ****a**s** "****Wh**at** ****wo**uld**
    ****ha**ppe**n ****i**f**..." ****o**r** "****Wh**at** ****wo**uld** ****ha**ppe**n
    ****i**f**...". ****Th**is** ****he**lps** ****t**o** ****cle**arl**y ****de**fin**e
    ****t**he** ****ini**tia**l ****cond**ition**s ****f**or** ****ea**ch** ****sce**nari**o.
  id: totrans-827
  prefs: []
  type: TYPE_NORMAL
  zh: ● 使用涉及条件或假设的问题，例如“****如果……会发生什么……”或“****如果……会发生什么……”。这有助于明确定义每个情景的初始条件。
- en: '[****T**he** ****diff**erenc**e ****i**n** ****tech**niqu**e ]'
  id: totrans-828
  prefs: []
  type: TYPE_NORMAL
  zh: '[****技术差异****](https://example.org)'
- en: '****Sce**nari**o ****Pla**nnin**g ****dif**fer**s ****fr**om** ****Hypo**thetic**al
    ****Reas**onin**g , ****bec**aus**e ****wh**ile** ****hypo**thetic**al ****reas**onin**g
    ****foc**use**s ****o**n** ****expl**orin**g ****t**he** ****cons**equenc**es
    ****o**f** ****a**** ****si**ngl**e ****hypo**thesi**s ****o**r** ****imag**inar**y
    ****ev**ent**, ****Sce**nari**o ****Pla**nnin**g ****inv**olve**s ****cre**atin**g
    ****mul**tipl**e ****alte**rnativ**e ****scen**ario**s, ****ea**ch** ****ba**sed**
    ****o**n** ****diff**eren**t ****assu**mption**s. ****Wh**ile** ****hypo**thetic**al
    ****reas**onin**g ****i**s** ****ab**out** ****expl**orin**g ****o**ne** ****pa**th**,
    ****sce**nari**o ****pla**nnin**g ****i**s** ****ab**out** ****visu**alizin**g
    ****sev**era**l ****pos**sibl**e ****pa**ths** ****simul**taneous**ly.'
  id: totrans-829
  prefs: []
  type: TYPE_NORMAL
  zh: '****情景规划****与****假设推理****不同，因为****假设推理****专注于探索一个单一假设或想象事件的结果，而****情景规划****涉及创建多个替代情景，每个情景基于不同的假设。****假设推理****是关于探索一条路径，而****情景规划****是关于同时可视化多条可能的路径。'
- en: '****Rega**rdin**g ****Comp**arativ**e ****Prom**ptin**g , ****wh**ich** ****com**pare**s
    ****t**wo** ****o**r** ****mo**re** ****ele**ment**s, ****Sce**nari**o ****Pla**nnin**g
    ****cre**ate**s ****inde**penden**t ****narr**ative**s ****f**or** ****ea**ch**
    ****pos**sibl**e ****fu**tur**e, ****wit**hou**t ****nece**ssaril**y ****ma**kin**g
    ****a**n** ****exp**lici**t ****comp**ariso**n ****bet**wee**n ****th**em**. ****Scen**ario**s
    ****a**re** ****desc**ribe**d ****comp**letel**y ****a**nd** ****indep**endent**ly,
    ****hel**pin**g ****t**o** ****bu**ild** ****a**** ****cl**ear** ****pic**tur**e
    ****o**f** ****ea**ch** ****poss**ibilit**y.'
  id: totrans-830
  prefs: []
  type: TYPE_NORMAL
  zh: '****关于比较情景规划，它比较两个或更多元素，情景规划为每个可能的未来创建独立的叙述，而不必在它们之间做出明确的比较。情景完全独立地描述，有助于构建每个可能性的清晰画面。'
- en: '****Com**pare**d ****t**o** ****St**ep**-****b**y**-****St**ep** ****Deta**ilin**g
    , ****Sce**nari**o ****Pla**nnin**g ****do**es** ****n**ot** ****a**im** ****t**o**
    ****exp**lai**n ****a**** ****li**nea**r ****pro**ces**s, ****b**ut** ****ra**the**r
    ****t**o** ****des**crib**e ****diff**eren**t ****deve**lopmen**ts ****th**at**
    ****de**pen**d ****o**n** ****var**iabl**e ****cond**ition**s. ****Ea**ch** ****sce**nari**o
    ****i**s** ****a**n** ****alte**rnativ**e ****ver**sio**n ****o**f** ****rea**lit**y,
    ****n**ot** ****a**** ****det**aile**d ****st**ep** ****i**n** ****a**** ****pro**ces**s.'
  id: totrans-831
  prefs: []
  type: TYPE_NORMAL
  zh: '****与逐步细化相比，情景规划并不旨在解释线性过程，而是描述依赖于变量条件的不同发展。每个情景是现实的一种替代版本，而不是过程中的一个详细步骤。'
- en: '[****Exa**mple**s]'
  id: totrans-832
  prefs: []
  type: TYPE_NORMAL
  zh: '[****示例**]'
- en: '●        ****Ba**sic** :'
  id: totrans-833
  prefs: []
  type: TYPE_NORMAL
  zh: '●        ****基础** :'
- en: '○        ****Que**stio**n : "****H**ow** ****wi**ll** ****agri**cultur**e ****b**e**
    ****aff**ecte**d ****b**y** ****cli**mat**e ****ch**ang**e ****i**n** ****t**he**
    ****ne**xt** ****5**0** ****ye**ars**? "'
  id: totrans-834
  prefs: []
  type: TYPE_NORMAL
  zh: '○        ****问题** : "在接下来的50年里，农业将如何受到气候变化的影响？"'
- en: '○        ****Scen**ario**s :'
  id: totrans-835
  prefs: []
  type: TYPE_NORMAL
  zh: '○        ****情景** :'
- en: '■ ****Opti**misti**c ****Sce**nari**o : "****I**f** ****gove**rnment**s ****ad**opt**
    ****effe**ctiv**e ****ca**rbo**n ****redu**ctio**n ****pol**icie**s ****a**nd**
    ****sust**ainabl**e ****agri**cultur**e ****tech**nologi**es, ****agri**cultur**e
    ****c**an** ****ad**apt** ****b**y** ****incr**easin**g ****wa**ter** ****u**se**
    ****effi**cienc**y ****a**nd** ****deve**lopin**g ****n**ew** ****he**at**-****resi**stan**t
    ****vari**etie**s. "'
  id: totrans-836
  prefs: []
  type: TYPE_NORMAL
  zh: '■ ****乐观情景** : "如果政府采用有效的碳减排政策和可持续的农业技术，农业可以通过提高水资源利用效率和发展新的耐热品种来适应。"'
- en: '■ ****Pess**imisti**c ****Sce**nari**o : "****I**f** ****emis**sion**s ****con**tinu**e
    ****a**t** ****t**he** ****cur**ren**t ****ra**te** , ****th**ere** ****wi**ll**
    ****b**e** ****a**** ****sign**ifican**t ****redu**ctio**n ****i**n** ****har**vest**s
    ****d**ue** ****t**o** ****dro**ugh**t ****a**nd** ****ext**rem**e ****wea**the**r
    ****ev**ent**s. ****Ma**ny** ****prod**ucin**g ****reg**ion**s ****co**uld** ****be**com**e
    ****infe**rtil**e."'
  id: totrans-837
  prefs: []
  type: TYPE_NORMAL
  zh: '■ ****悲观情景** : "如果排放量继续以当前速度增长，由于干旱和极端天气事件，将会有显著的产量减少。许多生产地区可能会变得贫瘠。"'
- en: '■ ****Me**diu**m ****Sce**nari**o : "****I**f** ****mea**sure**s ****a**re**
    ****impl**emente**d ****incon**sistent**ly, ****so**me** ****reg**ion**s ****wi**ll**
    ****s**ee** ****impr**ovemen**ts ****wh**ile** ****ot**her**s ****wi**ll** ****su**ffe**r
    ****fr**om** ****a**** ****la**ck** ****o**f** ****adap**tatio**n, ****cre**atin**g
    ****ineq**ualit**y ****i**n** ****fo**od** ****prod**uctio**n. "'
  id: totrans-838
  prefs: []
  type: TYPE_NORMAL
  zh: '■ ****中等情景** : "如果措施不一致地实施，一些地区将看到改进，而其他地区将因缺乏适应性而遭受损失，从而在食品生产中造成不平等。"'
- en: '●        ****Inte**rmedia**ry :'
  id: totrans-839
  prefs: []
  type: TYPE_NORMAL
  zh: '●        ****中间** :'
- en: '○        ****Que**stio**n : "****Wh**at** ****wi**ll** ****b**e** ****t**he**
    ****im**pac**t ****o**f** ****ma**ss** ****ado**ptio**n ****o**f** ****ele**ctri**c
    ****veh**icle**s ****b**y** ****20**50**? "'
  id: totrans-840
  prefs: []
  type: TYPE_NORMAL
  zh: '○        ****问题** : "****什么** ****是** ****到** ****2050** **年** **大量** **采用**
    **电动汽车** **的影响** **？"'
- en: '○        ****Scen**ario**s :'
  id: totrans-841
  prefs: []
  type: TYPE_NORMAL
  zh: '○        ****场景** :'
- en: '■ ****Opti**misti**c ****Sce**nari**o : "****T**he** ****ma**ss** ****ado**ptio**n
    ****o**f** ****ele**ctri**c ****veh**icle**s, ****acco**mpanie**d ****b**y** ****cl**ean**
    ****en**erg**y ****t**o** ****ch**arg**e ****th**em**, ****co**uld** ****dram**atical**ly
    ****re**duc**e ****C**O2** ****emis**sion**s ****fr**om** ****t**he** ****trans**portati**on
    ****se**cto**r, ****impr**ovin**g ****a**ir** ****qua**lit**y ****i**n** ****ci**tie**s
    ****a**nd** ****red**ucin**g ****t**he** ****eff**ect**s ****o**f** ****cli**mat**e
    ****ch**ang**e. "'
  id: totrans-842
  prefs: []
  type: TYPE_NORMAL
  zh: '■ ****乐观** **场景** : "****大量** **采用** **电动汽车** **，** **伴随** **着** **清洁** **能源**
    **充电** **，** **可能** **显著** **减少** **运输** **部门** **的** **CO2** **排放** **，** **改善**
    **城市** **空气质量** **，** **减少** **气候变化** **的影响** **。"'
- en: '■ ****Pess**imisti**c ****Sce**nari**o : "****I**f** ****t**he** ****infra**structu**re
    ****f**or** ****cha**rgin**g ****ele**ctri**c ****veh**icle**s ****do**es** ****n**ot**
    ****ke**ep** ****u**p** ****wi**th** ****t**he** ****inc**reas**e ****i**n** ****de**man**d
    ****a**nd** ****t**he** ****en**erg**y ****us**ed** ****i**s** ****st**ill** ****mo**stl**y
    ****fr**om** ****fo**ssi**l ****sou**rce**s, ****t**he** ****pos**itiv**e ****im**pac**t
    ****wi**ll** ****b**e** ****lim**ite**d ****a**nd** ****infra**structu**re ****pro**blem**s
    ****co**uld** ****disc**ourag**e ****t**he** ****u**se** ****o**f** ****veh**icle**s.
    "'
  id: totrans-843
  prefs: []
  type: TYPE_NORMAL
  zh: '■ ****悲观** **场景** : "****如果** **电动汽车** **充电** **基础设施** **无法** **跟上** **需求**
    **的增长** **，** **并且** **使用的** **能源** **仍然** **主要** **来自** **化石** **燃料** **，** **积极**
    **影响** **将** **有限** **，** **基础设施** **问题** **可能会** **阻碍** **车辆** **的使用** **。"'
- en: '■ ****Me**diu**m ****Sce**nari**o : "****Ado**ptio**n ****wi**ll** ****b**e**
    ****prog**ressiv**e, ****wi**th** ****gra**dua**l ****impr**ovemen**ts ****i**n**
    ****infra**structu**re. ****Emis**sion**s ****wi**ll** ****b**e** ****red**uce**d,
    ****b**ut** ****n**ot** ****a**t** ****t**he** ****sc**ale** ****ne**ede**d ****f**or**
    ****a**** ****ma**jor** ****trans**formati**on, ****main**tainin**g ****a****
    ****par**tia**l ****depe**ndenc**e ****o**n** ****fo**ssi**l ****fu**els**. "'
  id: totrans-844
  prefs: []
  type: TYPE_NORMAL
  zh: '■ ****中等** **场景** : "****采用** **将** **逐步** **进行** **，** **随着** **基础设施** **的**
    **逐步** **改善** **。** **排放** **将** **减少** **，** **但** **不会** **达到** **实现** **重大**
    **转型** **所需的** **规模** **，** **维持** **对** **化石** **燃料** **的部分** **依赖** **。"'
- en: '●        ****Adv**ance**d :'
  id: totrans-845
  prefs: []
  type: TYPE_NORMAL
  zh: '●        ****高级** :'
- en: '○ ****Que**stio**n : "****H**ow** ****wi**ll** ****arti**ficia**l ****inte**lligen**ce
    ****tech**nologi**es ****tran**sfor**m ****t**he** ****j**ob** ****ma**rke**t
    ****i**n** ****t**he** ****ne**xt** ****3**0** ****ye**ars**? "'
  id: totrans-846
  prefs: []
  type: TYPE_NORMAL
  zh: '○ ****问题** : "****人工智能** **技术** **将** **如何** **在** **未来** **30** **年内** **改变**
    **就业** **市场** **？"'
- en: '○        ****Scen**ario**s :'
  id: totrans-847
  prefs: []
  type: TYPE_NORMAL
  zh: '○        ****场景** :'
- en: '■ ****Opti**misti**c ****Sce**nari**o : "****A**I** ****wi**ll** ****b**e**
    ****us**ed** ****t**o** ****inc**reas**e ****prod**uctivi**ty, ****wh**ile** ****resk**illin**g
    ****pro**gram**s ****wi**ll** ****b**e** ****wi**del**y ****impl**emente**d, ****all**owin**g
    ****wor**ker**s ****t**o** ****mo**ve** ****in**to** ****mo**re** ****cre**ativ**e
    ****a**nd** ****le**ss** ****repe**titiv**e ****ro**les**, ****rai**sin**g ****t**he**
    ****qua**lit**y ****o**f** ****wo**rk** ****a**nd** ****li**fe**. "'
  id: totrans-848
  prefs: []
  type: TYPE_NORMAL
  zh: '■ ****乐观** **场景** : "****人工智能** **将** **被** **用于** **提高** **生产力** **，** **同时**
    **实施** **再培训** **计划** **，** **允许** **工作者** **转向** **更** **有** **创造性** **和** **较少**
    **重复性** **的角色** **，** **提高** **工作和** **生活质量** **。"'
- en: '■ ****Pess**imisti**c ****Sce**nari**o : "****T**he** ****la**ck** ****o**f**
    ****retr**ainin**g ****pro**gram**s ****wi**ll** ****ca**use** ****ma**ny** ****pe**opl**e
    ****t**o** ****lo**se** ****th**eir** ****jo**bs** ****d**ue** ****t**o** ****auto**matio**n,
    ****incr**easin**g ****unem**ployme**nt ****a**nd** ****so**cia**l ****ineq**ualiti**es.
    ****T**he** ****la**bor** ****ma**rke**t ****wi**ll** ****be**com**e ****pola**rize**d,
    ****bene**fitin**g ****on**ly** ****th**ose** ****w**ho** ****ha**ve** ****ac**ces**s
    ****t**o** ****techn**ologic**al ****lea**rnin**g. "'
  id: totrans-849
  prefs: []
  type: TYPE_NORMAL
  zh: '■ ****悲观情景 : "****缺乏再培训计划将导致许多人因自动化而失去工作，增加失业和社会不平等。劳动力市场将变得两极分化，只惠及那些能够获得技术学习的人。"'
- en: '■ ****Me**diu**m ****Sce**nari**o : "****A**I** ****wi**ll** ****b**e** ****inte**grate**d
    ****une**venl**y; ****so**me** ****indu**strie**s ****wi**ll** ****tran**sitio**n
    ****smo**othl**y, ****wh**ile** ****ot**her**s ****wi**ll** ****s**ee** ****ma**ss**
    ****lay**off**s ****a**nd** ****sk**ill**s ****shor**tage**s. ****Gove**rnmen**t
    ****a**nd** ****bus**ines**s ****wi**ll** ****ha**ve** ****a**** ****cru**cia**l
    ****ro**le** ****t**o** ****pl**ay**, ****b**ut** ****t**he** ****res**pons**e
    ****wi**ll** ****b**e** ****inco**nsiste**nt."'
  id: totrans-850
  prefs: []
  type: TYPE_NORMAL
  zh: '■ ****中等情景 : "****人工智能将被不均匀地整合；一些行业将平稳过渡，而其他行业将面临大量裁员和技能短缺。政府和商业将扮演关键角色，但反应将不一致。"'
