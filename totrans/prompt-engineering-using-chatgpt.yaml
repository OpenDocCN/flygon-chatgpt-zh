  id: totrans-1047
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：“绘制 -12x（0<=x<=1.5）和 -2x^2+21x-45（1.5<=x<=7.5）的图表”
- en: 'Wolfram: “To create the plot for the given functions −12x for 0≤ x ≤1.5 and
    -2 x ^2+21 x -45 for 1.5≤x ≤7.5, I’ll generate a piecewise function that combines
    these two expressions in their respective intervals. Then, I’ll plot this piecewise
    function over the range 0≤ x ≤7.5.'
  id: totrans-1048
  prefs: []
  type: TYPE_NORMAL
  zh: Wolfram：“为了为给定的函数 -12x（0≤ x ≤1.5）和 -2 x ^2+21 x -45（1.5≤x ≤7.5）创建图表，我将生成一个分段函数，将这些表达式在其各自的区间内组合。然后，我将在
    0≤ x ≤7.5 的范围内绘制这个分段函数。
- en: '![](image/Fig_11_20.jpg)'
  id: totrans-1049
  prefs: []
  type: TYPE_IMG
  zh: '![](image/Fig_11_20.jpg)'
- en: FIGURE 11.20 Graph charted by Wolfram.
  id: totrans-1050
  prefs: []
  type: TYPE_NORMAL
  zh: 图 11.20 Wolfram 绘制的图表。
- en: The graph shows the two functions within their specified domains, illustrating
    the transition between −12x and −2x^2+21x−45 at x =1.5.”
  id: totrans-1051
  prefs: []
  type: TYPE_NORMAL
  zh: 图表显示了在指定域内的两个函数，说明了在 x = 1.5 时从 -12x 到 -2x^2+21x-45 的过渡。”
