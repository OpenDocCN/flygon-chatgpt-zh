- en: In this example, we connect to Interactive Brokers and retrieve real-time market
    data for the Apple share, as well as historical data over a one-day period with
    a 1-hour bar interval.
  id: totrans-939
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个示例中，我们连接到 Interactive Brokers，并检索苹果股票的实时市场数据，以及过去一天的以 1 小时为间隔的历史数据。
- en: Data Collection from Yahoo Finance
  id: totrans-940
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 从 Yahoo Finance 收集数据
- en: Yahoo Finance is a popular source for retrieving historical financial data.
    The yfinance library makes it easy to retrieve this data.
  id: totrans-941
  prefs: []
  type: TYPE_NORMAL
  zh: Yahoo Finance 是检索历史金融数据的热门来源。yfinance 库使得检索这些数据变得简单。
- en: 'Example with Yahoo Finance:'
  id: totrans-942
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 Yahoo Finance 的示例：
- en: 'yfinance installation :'
  id: totrans-943
  prefs: []
  type: TYPE_NORMAL
  zh: yfinance 安装：
- en: pip install yfinance
  id: totrans-944
  prefs: []
  type: TYPE_NORMAL
  zh: pip install yfinance
- en: 'Login and Data Recovery :'
  id: totrans-945
  prefs: []
  type: TYPE_NORMAL
  zh: '登录和数据恢复 :'
- en: import yfinance as yf
  id: totrans-946
