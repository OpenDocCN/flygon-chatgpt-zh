- en: FOREWORD
  id: totrans-21
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 前言
- en: In late 2022, the idea of writing a book on a software program with no code,
    hotkeys, parameters, and a minimalist user interface seemed nonsensical to me.
    Yet, within a week of its release, Amazon.com was inundated with numerous *ultimate
    guide* books on ChatGPT, authored by the AI language model itself and uploaded
    by those quick to seize the opportunity.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 在2022年底，我觉得写一本关于没有代码、快捷键、参数和极简用户界面的软件程序的书是毫无意义的。然而，在发布一周内，亚马逊网站上充斥着大量由AI语言模型本身撰写并由那些迅速抓住机会的人上传的关于ChatGPT的*终极指南*书籍。
- en: I was also skeptical about this new tool. I had experimented with it and while
    its prose and speed were impressive, it seemed to lack the precision of a human
    writer and the ability to stay on point. Over the next few weeks, I spent more
    time observing, testing, and thinking about the limitations of the language model.
    I tested different strategies to overcome ChatGPT’s inefficiencies, while focusing
    on use cases that could support my work as a technical writer. With these strategies
    in hand, I quickly integrated ChatGPT into my daily work routine and I upgraded
    to a Pro subscription.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 我也对这个新工具持怀疑态度。我尝试过它，虽然它的文风和速度令人印象深刻，但它似乎缺乏人类作者的精确性和保持论点的能力。在接下来的几周里，我花了更多的时间观察、测试和思考语言模型的局限性。我测试了不同的策略来克服ChatGPT的低效，同时关注那些可以支持我作为技术作家工作的用例。有了这些策略，我迅速将ChatGPT整合到我的日常工作中，并升级到了专业订阅。
- en: As I was finding ways to streamline my day job, I assumed everyone else was
    using ChatGPT to work more efficiently as well. Despite the benefits that ChatGPT
    had brought to my work, few of my friends and colleagues were using it. As someone
    who had experienced firsthand the power and flexibility of ChatGPT's advanced
    language capabilities, I couldn't help but feel that they were missing out on
    a tool that could help them complete work tasks more efficiently. I decided to
    share with them the strategies and tips that had helped me get the most out of
    ChatGPT, hoping that it would inspire them to utilize the platform more effectively.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 当我在寻找方法来简化我的日常工作时，我假设其他人也在使用ChatGPT来提高工作效率。尽管ChatGPT给我的工作带来了好处，但我的朋友和同事中很少有人使用它。作为一个亲身体验过ChatGPT高级语言能力强大和灵活的人，我无法不感到他们错过了这个可以帮助他们更高效完成工作任务的工具。我决定与他们分享那些帮助我从ChatGPT中获得最大效益的策略和技巧，希望这能激发他们更有效地利用这个平台。
- en: Through this process, I recognized several misconceptions and false expectations
    that needed to be addressed. The first misconception is that ChatGPT is an alternative
    to Google. Despite its extensive knowledge base, many new users mistakenly view
    ChatGPT as a web-search tool, unaware that the model isn't actually connected
    to the Internet!
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 通过这个过程，我认识到需要解决几个误解和错误的期望。第一个误解是ChatGPT是Google的替代品。尽管ChatGPT拥有广泛的知识库，但许多新用户错误地将ChatGPT视为一个网络搜索工具，却不知道这个模型实际上并没有连接到互联网！
- en: The second misconception is you need to talk to ChatGPT like it’s a search algorithm
    or a voice-activated assistant. Rather than interacting with ChatGPT like a human
    equivalent, users often focus their attention on choosing the right keywords and
    keeping their requests extremely simple. Unlike Google Search or Siri, which can
    falter with nuanced or intricate queries, ChatGPT actually thrives in understanding
    and responding to detailed and complex requests. Rather than matching individual
    keywords with a response, ChatGPT analyzes the intention behind the user’s words
    and produces responses similar to what you would expect from a human on the other
    end of the chat. This means that users should converse with ChatGPT as they would
    with another person, without needing to simplify their words.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 第二个误解是您需要像对待搜索算法或语音激活助手那样与ChatGPT交谈。用户往往不像与人类一样互动，而是专注于选择正确的关键词，并保持他们的请求极其简单。与Google搜索或Siri不同，它们在处理细微或复杂的查询时可能会出错，ChatGPT实际上在理解和回应详细和复杂的请求方面表现得更好。ChatGPT不是通过匹配单个关键词来生成响应，而是分析用户话语背后的意图，并生成类似于您期望从聊天另一端的人类那里得到的响应。这意味着用户应该像与另一个人交谈一样与ChatGPT交谈，而不需要简化他们的语言。
- en: Third, ChatGPT is easy to use. Despite its minimalist user interface, ChatGPT
    is a highly open-ended environment with none of the usual handholding that comes
    with most software-as-a-service. Unlike other AI writing software, such as Jasper
    and Copy AI, ChatGPT doesn’t have a dashboard of clickable modules tailored to
    specific scenarios such as social media or blog post writing that prompt the user
    to fill in a list of input variables. Confronted with an empty chat screen, users
    must rely on their text prompt writing skills to generate content—a relatively
    new skillset that has only just gone mainstream. As a result, using ChatGPT can
    be a daunting prospect for many users, particularly those who aren’t accustomed
    to the art and practice of text prompt engineering.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 第三，ChatGPT易于使用。尽管它的用户界面简约，但ChatGPT是一个高度开放的环境，没有大多数软件即服务所附带的传统手把手指导。与Jasper和Copy
    AI等其他AI写作软件不同，ChatGPT没有针对特定场景（如社交媒体或博客文章写作）的可点击模块仪表板，这些模块会提示用户填写一系列输入变量。面对一个空白的聊天屏幕，用户必须依靠他们的文本提示写作技巧来生成内容——这是一种相对较新的技能集，刚刚进入主流。因此，使用ChatGPT对许多用户来说可能是一个令人畏惧的前景，尤其是那些不习惯于文本提示工程艺术和实践的人。
- en: This was the biggest hurdle for me in starting my own journey with ChatGPT.
    While I found extensive collections of AI text prompts online, I was disappointed
    by the lack of guidance on prompt writing principles and strategies that would
    help improve my prompt writing skills. I was eager to learn about the specific
    qualities that make a text prompt effective, rather than relying on someone’s
    list of generic text prompts (likely spun up by ChatGPT).
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 这是我开始自己ChatGPT之旅时遇到的最大障碍。虽然我在网上找到了大量的AI文本提示集合，但我对缺乏关于提示写作原则和策略的指导感到失望，这些原则和策略可以帮助提高我的提示写作技能。我渴望了解使文本提示有效的具体品质，而不是依赖于某人的一般文本提示列表（很可能是ChatGPT生成的）。
- en: Around this time, I had just completed writing a book on *Generative AI Art
    for Beginners*. Through this project, I explored text prompts for generating art
    using DALL-E (ChatGPT’s artistic sibling) and other text-to-image software services.
    Using my knowledge of text-to-image prompt writing techniques including modifiers
    and negative prompting, I started conducting experiments with ChatGPT. At the
    same time, I began training ChatGPT using my own sample data, which enabled the
    model to perform new tasks based on my input data.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 大约在这个时候，我刚刚完成了一本关于《*初学者生成式AI艺术*》的书籍的撰写。通过这个项目，我探索了使用DALL-E（ChatGPT的艺术兄弟）和其他文本到图像软件服务生成艺术作品的文本提示。利用我对文本到图像提示写作技术的了解，包括修饰符和负提示，我开始使用ChatGPT进行实验。同时，我开始使用自己的样本数据训练ChatGPT，这使得模型能够根据我的输入数据执行新的任务。
- en: Recognizing that others could benefit from these experiments, I set aside my
    initial reluctance to publish a book about ChatGPT, and I began writing this brief
    guide on the topic of text prompt engineering.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 认识到其他人可能从这些实验中受益，我放下了最初对出版关于ChatGPT的书籍的犹豫，我开始撰写这本关于文本提示工程主题的简要指南。
- en: Drawing on my findings over the last four months, this guide is designed to
    assist you in generating better outputs from ChatGPT. I also hope that book will
    be a valuable resource for those looking to maximize the potential of ChatGPT
    and lean into the rapidly evolving landscape of generative AI.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 基于我过去四个月的发现，本指南旨在帮助您从ChatGPT中生成更好的输出。我还希望这本书能成为那些希望最大化ChatGPT潜力并适应快速发展的生成式AI领域的宝贵资源。
