- en: '|   | *W*[*q*], *W*[*k*], *W*[*v*], *W*[*o*] | 91.2 | 91.7 | 91.7 | 91.5 |
    91.4 |'
  prefs: []
  type: TYPE_TB
- en: '![Image](../images/T000096tabt0010.png)'
  prefs: []
  type: TYPE_IMG
- en: 9.4 Quantization
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Quantization is a key strategy used to cut down on the computational demands
    of large models during inference. This technique works by lowering the precision
    of weight values, replacing high-precision numbers with lower-precision equivalents.
    For instance, switching from FP32 to INT8 weights can reduce the data size of
    weights by four times, boosting the speed at which the model operates. Additionally,
    on certain hardware, the use of INT8 instructions can enhance throughput.
  prefs: []
  type: TYPE_NORMAL
- en: Nevertheless, in massive language models like OPT-175B and ChatGPT, which have
    extensive parameter counts and large weight matrices and feature tensors, there
    are often outlier weights that deviate significantly from the average. These outliers,
    making up more than 1% of the weights and displaying a clear long-tail distribution,
    pose a challenge. During quantization, if a uniform precision is applied, these
    outliers might be pushed to the extreme values (either maximum or minimum), causing
    a notable shift in the weight distribution from what it was originally. Such discrepancies
    can drastically affect the model’s accuracy, potentially leading to significant
    losses in precision.
  prefs: []
  type: TYPE_NORMAL
- en: To tackle the problem of precision loss during quantization, a sophisticated
    method called hybrid precision quantization, specifically the LLM.int8() approach,
    has been developed. This method cleverly combines vector-wise quantization with
    a mixed-precision decomposition strategy to precisely control the quantization
    precision across different areas of the model, thus neutralizing the adverse effects
    caused by outliers. This technique not only maintains the model’s performance
    but also reduces computational and storage costs significantly.
  prefs: []
  type: TYPE_NORMAL
- en: As depicted in [Fig. 9.8](#f0045), vector-wise quantization systematically categorizes
    the features and weights into different vector regions, either row-wise or column-wise,
    and assigns appropriate quantization parameters to each. The conversion of these
    features and weights into INT8 integers allows the quantization process to perform
    dot products that yield INT32 outputs (from INT8 to INT32). The dequantization
    step then converts these INT32 results back to FP16 precision (from INT32 to FP16).
  prefs: []
  type: TYPE_NORMAL
- en: '![A diagram showing vector-wise quantization and mixed precision decomposition
    for LLM.int8 with matrices X and W and their quantization and dequantization steps.](../images/F000096f09-08-9780443274367.jpg)'
  prefs: []
  type: TYPE_IMG
- en: '[Figure 9.8](#Bf0045) Diagram of LLM.int8(). Image source: Paper “[LLM.int8](http://LLM.int8):
    8-bit Matrix Multiplication for Transformers at Scale”.'
  prefs: []
  type: TYPE_NORMAL
- en: 'It includes two main sections: 8-bit Vector-wise Quantization and 16-bit Mixed
    Precision Decomposition. The input matrices X and W are shown with regular values
    and outliers labeled as FP16\. In the 8-bit Vector-wise Quantization section,
    the steps are: (1) Find the vector-wise constants C sub W end sub and C sub X
    end sub, (2) Quantization X sub F16 end sub times (127 over C sub X end sub) equals
    X sub 18 end sub and W sub F16 end sub times (127 over C sub W end sub) equals
    W sub 18 end sub, (3) Int8 Integer Inner Product X sub 18 end sub W sub 18 end
    sub equals Out sub 132 end sub and (4) Dequantization Out sub 132 end sub times
    (C sub X end sub circled times C sub W end sub) over 127 times 127 equals Out
    sub F16 end sub. In the 16-bit Mixed Precision Decomposition section, the steps
    are: (1) Anomalous Value Decomposition and (2) FP16 Matmul X sub F16 end sub W
    sub F16 end sub equals Out sub F16 end sub. The final output is labeled as Out
    sub FP16 end sub.'
  prefs: []
  type: TYPE_NORMAL
- en: For those vector regions with outliers, LLM.int8() applies 16-bit matrix multiplication
    to ensure accurate computation, incorporating these results into the overall quantized
    outputs, while the remaining 99.9% of the model uses 8-bit multiplication. This
    method effectively handles outliers and prevents significant precision losses
    during quantization. Thus, in massive language models containing up to 175 billion
    parameters, LLM.int8() ensures efficient inference without degrading performance.
  prefs: []
  type: TYPE_NORMAL
- en: 9.5 SparseGPT
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Pruning is a technique used to compress models by removing parts of the network.
    This can include anything from individual weights (unstructured pruning) to whole
    rows or columns of weights in matrices (structured pruning). While this approach
    works well for smaller models, like those used in visual tasks and smaller language
    models, it poses challenges for large-scale models such as GPT. The main issue
    is the significant loss in accuracy, which requires extensive retraining to correct,
    making it an expensive process. To tackle this, SparseGPT, a sophisticated algorithm
    for large-scale approximate sparse regression, has been developed to address these
    drawbacks effectively.
  prefs: []
  type: TYPE_NORMAL
- en: '[Fig. 9.9](#f0050) provides a visual depiction of how the SparseGPT reconstruction
    algorithm works. The process starts with a fixed pruning mask *M*. Using the inverse
    Hessian sequence $MathML$![Equation](../images/F000096si26.png), the algorithm
    progressively updates the remaining weights in each column of the weight matrix
    *W*. Specifically, the weights next to the pruned areas (shown in dark) are adjusted
    to make up for the loss caused by pruning, while the weights that haven’t been
    pruned (shown in light) remain unchanged.'
  prefs: []
  type: TYPE_NORMAL
- en: '![A diagram showing the SparseGPT reconstruction algorithm with matrices M,
    W and inverse Hessian sequence steps.](../images/F000096f09-09-9780443274367.jpg)'
  prefs: []
  type: TYPE_IMG
- en: '[Figure 9.9](#Bf0050) Visualization of SparseGPT reconstruction algorithm.
    Image source: Paper “SparseGPT: Massive Language Models Can Be Accurately Pruned
    in One-Shot”.'
  prefs: []
  type: TYPE_NORMAL
- en: On the left, there is a matrix labeled M. To the right, there is a sequence
    of matrices labeled W, showing the process of pruning and updating. The sequence
    continues with matrices representing the inverse Hessian sequence, labeled as
    (H sub v sub 1 end sub) superscript -1 end superscript, (H sub v sub 2 end sub)
    superscript -1 end superscript, (H sub v sub 3 end sub) superscript -1 end superscript
    and (H sub v sub 4 end sub) superscript -1 end superscript. The process involves
    pruning, updating and elimination steps, with arrows indicating the flow between
    matrices.
  prefs: []
  type: TYPE_NORMAL
- en: Most traditional pruning methods, like gradual magnitude pruning, need a lot
    of retraining to regain accuracy after weights have been removed. But for huge
    models like GPT, which require extensive computing power and intricate parameter
    adjustments, relying on retraining to fine-tune the model postpruning becomes
    unfeasible. Thus, using these gradual pruning approaches for models as large as
    GPT is not practical.
  prefs: []
  type: TYPE_NORMAL
- en: SparseGPT is specially designed for GPT-scale models as a posttraining method
    that does not require any fine-tuning. Its main goal is to make the model lighter
    and less complex by selectively removing parameters, a process known as sparsification.
    Alongside this, quantization methods like ZeroQuant, LLM.int8(), and nuQmm are
    popular for compressing models by reducing the precision of parameters. These
    methods, however, can struggle with anomalies such as outlier features. On the
    other hand, the GPTQ quantization technique uses a novel approach by employing
    approximate second-order information to accurately reduce weights to just 2–4
    bits, making it ideal for very large models. Combined with powerful GPU kernels,
    GPTQ can speed up inference by two to five times.
  prefs: []
  type: TYPE_NORMAL
- en: Thus, SparseGPT serves as a complement to quantization methods, focusing on
    reducing the physical size of the model through sparsification while GPTQ focuses
    on quantization. In practice, combining these two approaches can lead to the best
    outcomes in terms of model compression and speeding up inference. Additionally,
    SparseGPT supports not just unstructured pruning but also semistructured patterns
    like the n:m sparse formats (2:4 and 4:8), which can be optimized for speed on
    Ampere NVIDIA GPUs at a 2:4 ratio. This means that SparseGPT can effectively compress
    the model and enhance inference speed through both sparsification and semistructured
    pruning, all while maintaining the model’s performance. Importantly, SparseGPT
    operates locally, updating weights after each pruning step to maintain the integrity
    of each layer’s input–output relationship. These updates are performed independently
    of global gradient information, as the primary objective of SparseGPT is to streamline
    computational demands without compromising performance. Hence, instead of optimizing
    all parameters globally, SparseGPT strategically updates weights locally after
    each pruning step.
  prefs: []
  type: TYPE_NORMAL
- en: The GPT model’s extensive parameters enable SparseGPT to derive lighter, sparse
    versions from heavily parameterized, dense models. These sparse models closely
    mimic the performance of the original dense models but with much less computational
    complexity. Moreover, SparseGPT uses perplexity as a sensitivity measure, requiring
    that the sparse model’s outputs closely match those of the dense model. This is
    challenging because it’s critical to maintain important parameters that significantly
    impact model performance during the pruning and weight update processes.
  prefs: []
  type: TYPE_NORMAL
- en: In vast models, there is a high degree of redundancy, especially with unstructured
    (element-wise) or semistructured (vector-wise) sparsification. This means many
    parameters can be removed without substantially affecting performance. Compared
    to structured pruning, these sparsification methods are less likely to lose precision,
    offering more flexibility in choosing which parameters to prune. SparseGPT enables
    substantial model compression and its effective sparse regularization can significantly
    cut training costs. This effectiveness is maintained by locally updating weights
    after each pruning step, preserving each layer’s input–output relationship while
    minimizing model size.
  prefs: []
  type: TYPE_NORMAL
- en: However, deploying this type of sparse model for inference requires hardware
    and software that support sparse computational tasks. To fully benefit from SparseGPT’s
    compression, there may be a need to develop new sparse computing libraries or
    enhance existing ones to handle sparse operations better. For optimal compression
    and acceleration, it’s crucial to extend the use of the SparseGPT algorithm during
    model training. This involves further research into effectively integrating SparseGPT
    in the training of large-scale models to reduce computational demands without
    compromising performance.
  prefs: []
  type: TYPE_NORMAL
- en: 9.6 Case studies
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 9.6.1 Base model
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Meta's LLaMA, an open-sourced pretrained model released on February 24, 2023,
    stands out as a top choice among models designed for platforms with low computational
    power. It is available in various sizes, including 7B, 13B, 33B, and 65B parameters,
    as detailed in [Table 9.2](#t0015). The training data for LLaMA included a massive
    1.4 trillion tokens, sourced primarily from CommonCrawl (67%), followed by the
    C4 dataset (15%). Other significant data contributions came from Github, Wikipedia,
    and Books (each contributing 4.5%), with smaller percentages from ArXiv (2.5%)
    and StackExchange (2%).
  prefs: []
  type: TYPE_NORMAL
- en: Table 9.2
  prefs: []
  type: TYPE_NORMAL
- en: Versions of LLaMA with parameter scales.
  prefs: []
  type: TYPE_NORMAL
- en: '| Paramater size | Dimension | *n* Heads | *n* Layers | Learning rate | Sample
    size | Token |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- | --- | --- | --- | --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '| 6.7B | 4096 | 32 | 32 | 3.0e^(−4) | 4M | 1.0T |'
  prefs: []
  type: TYPE_TB
- en: '| 13.0B | 5120 | 40 | 40 | 3.0e^(−4) | 4M | 1.0T |'
  prefs: []
  type: TYPE_TB
- en: '| 32.5B | 6656 | 52 | 60 | 1.5e^(−4) | 4M | 1.4T |'
  prefs: []
  type: TYPE_TB
- en: '| 65.2B | 8192 | 64 | 80 | 1.5e^(−4) | 4M | 1.4T |'
  prefs: []
  type: TYPE_TB
- en: '![Image](../images/T000096tabt0015.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Data Source: Academic Pape “Llama: Open and efficient foundation language models.”'
  prefs: []
  type: TYPE_NORMAL
- en: LLaMA has demonstrated superior performance over the similarly sized GPT-3 in
    several benchmarks, including tasks such as commonsense reasoning, question answering,
    mathematical reasoning, code generation, and language understanding. Notably,
    the 13B version of LLaMA outperforms GPT-3, which has as many as 175B parameters,
    in multiple tests. Moreover, the 65B version of LLaMA holds its own against DeepMind’s
    Chinchilla with 70B parameters and Google’s PaLM with 540B parameters, showing
    competitive results.
  prefs: []
  type: TYPE_NORMAL
- en: 9.6.2 Instruction-following model
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The Alpaca model, launched by Stanford University in March 2023, is a low-power
    transfer model designed to be efficient and effective. It is built on Meta’s LLaMA
    7B as the foundational model. Alpaca utilizes a unique instruction bootstrapping
    method discussed in [Section 9.1](#s0010), leveraging ChatGPT to create a 52,000-entry
    dataset. It then uses the Lora algorithm to fine-tune the LLaMA model to better
    follow instructions. Its conversational abilities are nearly on par with those
    of GPT-3.5 (text-davinci-003), as illustrated in [Fig. 9.10](#f0055).
  prefs: []
  type: TYPE_NORMAL
- en: '![Diagram showing the process of generating instructions using a bootstrapped
    instruction model and fine-tuning Alpaca 7B.](../images/F000096f09-10-9780443274367.jpg)'
  prefs: []
  type: TYPE_IMG
- en: '[Figure 9.10](#Bf0055) Alpaca model. Image source: Paper “Alpaca: A Strong,
    Replicable Instruction-Following Model”.'
  prefs: []
  type: TYPE_NORMAL
- en: 'The diagram illustrates the process of generating instructions using a bootstrapped
    instruction model and fine-tuning Alpaca 7B. Text-davinci-003 is used to generate
    instructions from 175 Bootstrap Instruction Seed Tasks. These instructions are
    then used to create 52K Instruction-Output Data Samples. LLAMA 7B is fine-tuned
    using these data samples through supervised fine-tuning to create Alpaca 7B. Example
    Seed Task: Instruction: Brainstorm New Year''s resolutions. Output: Learn LLM,
    Exercise, Get plenty of rest. Example Generated Task: Instruction: Brainstorm
    creative ideas for a quick move. Output: Use different sizes of cardboard boxes
    to categorize items.'
  prefs: []
  type: TYPE_NORMAL
- en: This approach to instruction fine-tuning is similar to the initial stage of
    human feedback RL, known as the supervised fine-tuning (SFT) stage, but it does
    not encompass the entire human feedback process. Despite this, Alpaca offers a
    highly economical solution for model transfer, requiring only 3 h of training
    on eight 80GB A100 GPUs, costing approximately $500 in total. The release of Alpaca
    has inspired the development of several similar models, which enhance the Meta
    LLaMA model by incorporating more training data and using Lora’s instruction fine-tuning
    technique. Alpaca sets a model where a larger model serves as a “Teacher,” generating
    training data that allows a smaller “Student” model to absorb and replicate the
    larger model’s knowledge and capabilities.
  prefs: []
  type: TYPE_NORMAL
- en: 9.6.3 Medical field
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: ChatDoctor is a project that adapts open-source, large-scale language models
    for use in the medical field without requiring extensive computational resources.
    Illustrated in [Fig. 9.11](#f0060), this model uses dialog data from patient–doctor
    interactions to fine-tune the Meta LLaMA base model and combines it with external
    knowledge from sources like Wikipedia or medical databases. This integration helps
    the model provide accurate medical information and generate high-quality responses
    within the medical domain.
  prefs: []
  type: TYPE_NORMAL
- en: '![Diagram showing the use of dialog data from patient-doctor interactions to
    fine-tune the Meta LLaMA base model for ChatDoctor.](../images/F000096f09-11-9780443274367.jpg)'
  prefs: []
  type: TYPE_IMG
- en: '[Figure 9.11](#Bf0060) Architecture diagram of ChatDoctor. Image source: Paper
    “Chatdoctor: A medical chat model fine-tuned on llama model using medical domain
    knowledge”.'
  prefs: []
  type: TYPE_NORMAL
- en: The sources of the dialog data include EBIX, ADAM Suite of Healthcare Products,
    Healthcare Magic and iClinic The Virtual Hospital. This data is used to fine-tune
    the Meta AI LLaMA model, which is then used by ChatDoctor. An example conversation
    is shown where a patient says, Doctor, I have a stomach ache. The response from
    ChatDoctor is, Thank you for your consultation. If the pain is in the upper part
    of your abdomen, it could be Peptic Ulcer Disease (PUD), or if it's on the right
    side... Since I haven't seen your reports, please provide me with more details.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here’s how the training process unfolds: initially, the model is fine-tuned
    using 52,000 instructional entries derived from Stanford University’s Alpaca project.
    Following this, it undergoes a second round of fine-tuning using real patient–doctor
    dialog data sourced from HealthCareMagic, an online medical consultation platform.
    This site contributes approximately 100,000 real dialog entries, which are carefully
    selected and anonymized to remove any personal information, and also corrected
    for any grammatical inaccuracies.'
  prefs: []
  type: TYPE_NORMAL
- en: To improve its accuracy, ChatDoctor has built a knowledge base using Wikipedia
    and specialized medical databases. This allows the model to pull real-time, authoritative
    information needed to answer questions in the medically critical context where
    mistakes can have serious consequences. Additionally, it has developed a comprehensive
    database that includes information on approximately 700 diseases, detailing symptoms,
    diagnostic tests, and recommended treatments, establishing a robust standard for
    medical data.
  prefs: []
  type: TYPE_NORMAL
- en: Illustrated in [Fig. 9.12](#f0065), ChatDoctor enhances its ability to integrate
    this extensive knowledge by employing a keyword mining approach. This method helps
    identify essential terms needed to search for relevant information. The system
    then uses these terms to find and retrieve the most pertinent sections from the
    knowledge base.
  prefs: []
  type: TYPE_NORMAL
- en: '![Illustration of ChatDoctor''s treatment plan for shingles using autonomous
    knowledge retrieval from a disease database and Wikipedia.](../images/F000096f09-12-9780443274367.jpg)'
  prefs: []
  type: TYPE_IMG
- en: '[Figure 9.12](#Bf0065) Autonomous ChatDoctor based on knowledge brain. Image
    source: Paper “ChatDoctor: A Medical Chat Model Fine-Tuned on a Large Language
    Model Meta-AI (LLaMA) Using Medical Domain Knowledge”.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Q: What is the treatment plan for shingles? The illustration shows ChatDoctor
    using autonomous knowledge retrieval to access relevant medical knowledge from
    a disease database and Wikipedia. The final diagnosis is provided by ChatDoctor.
    The treatment plan for shingles typically involves several aspects: 1\. Antiviral
    Treatment: Medications such as acyclovir, valacyclovir and famciclovir are used
    to reduce viral replication, shorten the course of the disease and alleviate symptoms,
    particularly when used early in the disease. 2\. Pain Management: Nonsteroidal
    anti-inflammatory drugs (NSAIDs) such as ibuprofen, or stronger painkillers like
    codeine, are used to relieve pain. If you or someone you care about is showing
    symptoms of shingles, it is advisable to consult a doctor promptly to receive
    proper diagnosis and treatment.'
  prefs: []
  type: TYPE_NORMAL
- en: Recognizing that the model cannot process all data from the disease database
    simultaneously, ChatDoctor allows the model to access the data in batches. It
    autonomously selects the most relevant entries that could help address the query.
    These selected entries are then fed back into the model to help it generate a
    well-informed and accurate answer. By letting a language model, which has been
    fine-tuned with medical data, select and utilize information from an external
    knowledge base, ChatDoctor significantly boosts the reliability and precision
    of responses to medical inquiries.
  prefs: []
  type: TYPE_NORMAL
- en: 9.6.4 Judicial field
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: LawGPT_zh, LexiLaw, Lawyer LLaMA, and JusticGPT are examples of how LLMs are
    being adapted for the legal sector in China, using less computational power. Lawyer
    LLaMA and JusticGPT use the LLaMA 13B model as their foundation, whereas LawGPT_zh
    and LexiLaw are based on the ChatGLM-6B model.
  prefs: []
  type: TYPE_NORMAL
- en: All these models use a training approach known as LoRA, which typically unfolds
    in two stages. In the first stage, the base models are pretrained on extensive
    collections of legal documents and statutes, providing a deep understanding of
    legal language and context. The second stage focuses on refining these models
    further through instruction fine-tuning, specifically using datasets designed
    for legal dialog and question answering. The sources for this data are detailed
    in [Table 9.3](#t0020).
  prefs: []
  type: TYPE_NORMAL
- en: Table 9.3
  prefs: []
  type: TYPE_NORMAL
- en: Open-source data for large language models in the judicial field.
  prefs: []
  type: TYPE_NORMAL
- en: '| Type | Data source |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '| Official data |'
  prefs: []
  type: TYPE_TB
- en: 'China inspection network: indictments, etc.'
  prefs: []
  type: TYPE_NORMAL
- en: 'China judgments online: judgments, orders, decisions, etc.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Ministry of justice national judicial examination center: administrative regulations
    database, exam papers, etc.'
  prefs: []
  type: TYPE_NORMAL
- en: 'National laws and regulations database: official legal regulations database'
  prefs: []
  type: TYPE_NORMAL
- en: '|'
  prefs: []
  type: TYPE_NORMAL
- en: '| Competition data |'
  prefs: []
  type: TYPE_TB
- en: 'China legal AI challenge (CAIL): historical competition data'
  prefs: []
  type: TYPE_NORMAL
- en: 'Legal AI challenge (LAIC) by China law research: historical competition questions'
  prefs: []
  type: TYPE_NORMAL
- en: 'Baidu Knows Legal Q&A Dataset: about 36,000 legal Q&A entries, including user
    inquiries, peer answers, and best answers'
  prefs: []
  type: TYPE_NORMAL
- en: 'Legal Knowledge Q&A Dataset: About 23,000 legal Q&A entries'
  prefs: []
  type: TYPE_NORMAL
- en: 'China judicial examination dataset: about 26,000 entries from the Chinese judicial
    examination 集'
  prefs: []
  type: TYPE_NORMAL
- en: '|'
  prefs: []
  type: TYPE_NORMAL
- en: '| Third-party open source |'
  prefs: []
  type: TYPE_TB
- en: 'LaWGPT Dataset @pengxiao-song: Includes legal domain-specific vocabulary, structured
    criminal charge data, high-quality Q&A, etc.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Legal charge prediction and machine Q&A @liuhuanyong: includes criminal charge
    knowledge graphs, 200,000 legal Q&A data, etc.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Legal provisions knowledge extraction @liuhuanyong: includes legal judgments
    and criminal case data'
  prefs: []
  type: TYPE_NORMAL
- en: 'China Law Handbook @LawRefBook: collection of various legal regulations, departmental
    rules, case examples, etc.'
  prefs: []
  type: TYPE_NORMAL
- en: '|'
  prefs: []
  type: TYPE_NORMAL
- en: '| Legal service websites |'
  prefs: []
  type: TYPE_TB
- en: 'HuaLaw, FindLaw, DaLaw, Good Lawyer Network, AskLaw: Providing legal consultation
    Q&A and other service data'
  prefs: []
  type: TYPE_NORMAL
- en: 'Flssw: legal consultations, legal news, case analysis, etc.'
  prefs: []
  type: TYPE_NORMAL
- en: '|'
  prefs: []
  type: TYPE_NORMAL
- en: '| Books and journals | Legal dictionaries, e-books, scholarly articles, etc.
    |'
  prefs: []
  type: TYPE_TB
- en: '![Image](../images/T000096tabt0020.png)'
  prefs: []
  type: TYPE_IMG
- en: During the second phase of fine-tuning with instructions, not only are Q&A data
    from legal services websites utilized, but an innovative instruction bootstrapping
    method is also introduced. This approach uses LLMs like ChatGPT to either generate
    new Q&A entries or refine and optimize existing ones. For instance, LawGPT_zh,
    as illustrated in [Fig. 9.13](#f0070), uses a method called reliable-self-instruction,
    which is grounded in specific knowledge. By feeding ChatGPT detailed texts about
    legal knowledge, it generates a series of questions that are closely linked to
    the legal content and its logical implications. ChatGPT then answers these questions
    using a “text segment-question” format. This process creates legally informative
    answers and ensures their accuracy.
  prefs: []
  type: TYPE_NORMAL
- en: '![Diagram showing the process of generating questions and answers using ChatGPT
    based on a legal text.](../images/F000096f09-13-9780443274367.jpg)'
  prefs: []
  type: TYPE_IMG
- en: '[Figure 9.13](#Bf0070) Diagram of LawGPT_zh instruction bootstrapping annotation.'
  prefs: []
  type: TYPE_NORMAL
- en: 'The diagram illustrates the process of generating questions and answers using
    ChatGPT based on a legal text. The first section shows a box labeled Law Context
    approximately 500 Tokens with a note below it saying Please generate five questions
    based on the above legal text. This is connected to a ChatGPT box, which then
    leads to another box listing Question 1: XXXXXX, Question 2: XXXXXX, Question
    3: XXXXXX, Question 4: XXXXXX and Question 5: XXXXXX. The second section shows
    a box labeled Question 1: XXXXXXX Answer 1: XXXXXXXXXXXX, which is connected back
    to the ChatGPT box.'
  prefs: []
  type: TYPE_NORMAL
- en: While models like LawGPT_zh, LexiLaw, and Lawyer LLaMA are primarily used for
    legal consultation, JusticGPT stands out as an experimental judicial decision
    support model developed by Xiangtan University’s Smart Justice research team.
    Built upon a LLM, JusticGPT is finely tuned to better understand and generate
    legal language, handling everything from legal terms to case analysis and generating
    recommendations for legal decisions. Additionally, it uses an extensive external
    knowledge base that stores a wealth of cases and judicial documents as vectors,
    enhancing the model’s decision-making power.
  prefs: []
  type: TYPE_NORMAL
- en: Illustrated in [Fig. 9.14](#f0075), consider a scenario where a user submits
    a legal query. This query is first converted into a vector, which is then matched
    against a database using a similarity algorithm to identify the top relevant cases.
    These selected cases provide context that, along with the initial query, is fed
    into JusticGPT as a prompt. JusticGPT assesses both the context and the query
    to produce a ranked list of case similarities.
  prefs: []
  type: TYPE_NORMAL
- en: '![A flowchart illustrating the process of handling a legal query using embeddings
    model, business service and judicial document vector database.](../images/F000096f09-14-9780443274367.jpg)'
  prefs: []
  type: TYPE_IMG
- en: '[Figure 9.14](#Bf0075) Architecture diagram of JusticeGPT.'
  prefs: []
  type: TYPE_NORMAL
- en: 'The process starts with 1\. Similar Case Query where a user submits a question
    to the Web Service, which returns an answer. The question is also sent to the
    Business Service. 2\. Query Vectorization: The Business Service sends the question
    to the Embeddings Model, which returns a question vector. 3\. Query Vector Database:
    The question vector is used to query the vector database, which returns the top
    N matching knowledge (facts) from the Judicial Document Vector Database. 4\. Construct
    Prompt: The query case and the top N similar cases are used to construct a prompt.
    5\. Return answer: The constructed prompt is sent to JusticeGPT LLM, which ranks
    the top N cases and returns the answer.'
  prefs: []
  type: TYPE_NORMAL
- en: JusticGPT is a pioneering project that marries advanced language processing
    technology with a vast legal database. It aims to dramatically improve the efficiency
    and accuracy of typical judicial decisions, paving the way for genuine AI-assisted
    decision-making in the legal field.
  prefs: []
  type: TYPE_NORMAL
- en: 9.7 Summary
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Fine-tuning or transferring language models for specific industries typically
    involves adapting open-source pretrained models to perform particular tasks within
    those sectors. This adaptation faces two main challenges: reducing the cost associated
    with human annotation and minimizing the computational resources required for
    both training and deployment.'
  prefs: []
  type: TYPE_NORMAL
- en: Most current open-source models that have been transferred are only fine-tuned
    with instructions, which is similar to the SFT phase found in RLHF. Although there
    are RLHF versions of the LLaMA model, such as ChatLLaMA in English and ColossalChat,
    these models don't significantly outperform in terms of size or task effectiveness.
    Additionally, tailoring models for specific sectors involves creating specialized
    reward systems and using proximal policy optimization for fine-tuning with data
    from those sectors, which adds to the cost of data annotation.
  prefs: []
  type: TYPE_NORMAL
- en: There is notable enthusiasm for applying large open-source language models to
    sectors like healthcare, law, finance, banking, and education, with numerous entities
    exploring and launching tailored models.
  prefs: []
  type: TYPE_NORMAL
- en: It’s crucial to highlight that Meta’s LLaMA model is not for commercial use.
    Moreover, datasets used for instruction fine-tuning, such as the Alpaca expansion
    set, are generated using OpenAI’s language model application programming interface
    (API) and instruction bootstrapping techniques. Using this data commercially could
    lead to conflicts with OpenAI and pose risks related to intellectual property.
  prefs: []
  type: TYPE_NORMAL
- en: <hgroup>
  prefs: []
  type: TYPE_NORMAL
- en: Chapter 10 Middleware
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: </hgroup>
  prefs: []
  type: TYPE_NORMAL
- en: Abstract
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This chapter explores the evolving role of middleware in enhancing large language
    models (LLMs) like ChatGPT. It addresses the challenges these models face, such
    as the difficulty of updating knowledge and verifying information accuracy. Middleware
    solutions, including LangChain and AutoGPT, are introduced to tackle these issues
    by integrating external knowledge, improving reasoning abilities, and managing
    complex workflows. LangChain is detailed as a comprehensive framework offering
    tools for model integration, prompt management, memory handling, and workflow
    orchestration. AutoGPT is discussed as an advanced agent that autonomously manages
    tasks with minimal human input. The chapter also examines competitors like Microsoft’s
    Semantic Kernel and GPT-Index, highlighting the growing competition in middleware
    frameworks. Despite challenges, middleware is poised to significantly impact small
    and medium-sized enterprises by boosting productivity through LLMs.
  prefs: []
  type: TYPE_NORMAL
- en: Keywords
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Middleware; large language models; LangChain; AutoGPT; task automation; memory
    management; workflow integration; Semantic Kernel; ChatGPT plugins
  prefs: []
  type: TYPE_NORMAL
- en: Large language models (LLMs) like ChatGPT face two main challenges. Firstly,
    because these models are so complex, updating them can be expensive and cumbersome.
    As a result, it’s hard to keep their knowledge up to date. Secondly, they can’t
    check the correctness of the information they generate. To overcome these issues,
    it’s critical to incorporate external knowledge and improve their ability to reason,
    especially in areas like math and logic. Moreover, to effectively use these models
    across different professional fields, users need specialized tools that can handle
    long-term memory and manage detailed workflows. This need has spurred the development
    of a middleware ecosystem around LLMs. Over the next 3–5 years, this middleware
    market is expected to grow quickly, focusing on enhancing models’ access to external
    knowledge, boosting their reasoning skills, refining user prompts, and streamlining
    workflows.
  prefs: []
  type: TYPE_NORMAL
- en: 10.1 LangChain
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: LangChain is an open-source framework that helps developers create applications
    from start to finish using LLMs. It’s part of a lively open-source community.
    Normally, these models are accessed through representational state transfer (REST)
    application programming interfaces (APIs), but LangChain goes beyond just connecting
    to these APIs. It tackles the integration of LLMs with a company’s internal resources
    like documents, databases, and platforms such as SharePoint. It also facilitates
    interaction with various systems like systems, applications, and products (SAP),
    enterprise resource planning (ERP), customer relationship management (CRM), and
    human resources (HR), and can manage IT ticketing systems. LangChain keeps track
    of conversations, seamlessly integrates prompts into the programming, optimizes
    the use of tokens, and ensures operations stay within set service limits and restrictions.
    Additionally, LangChain serves as an orchestrator in business workflows, efficiently
    managing inputs and outputs from different sources like OpenAI, Azure Search,
    and various databases.
  prefs: []
  type: TYPE_NORMAL
- en: 'LangChain is a robust collection of tools and components designed to make it
    easier to develop applications with LLMs. It delivers these seven key capabilities:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Model: LangChain wraps up the interfaces for calling LLMs, supporting three
    types: text mode, dialog mode, and embedding mode. In text mode, it inputs and
    outputs plain text strings. In dialog mode, it handles the context of conversations,
    taking in and outputting chat messages. In embedding mode, it inputs text and
    outputs a series of text token embeddings. LangChain’s ability to interface with
    multiple LLMs on the market lets developers switch easily between them, reducing
    reliance on any single platform.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt: LangChain offers a comprehensive library of prompt templates suitable
    for different uses. It supports basic text and dialog interactions and allows
    for customized formatting of outputs, which simplifies tasks like switching between
    different underlying models, managing, and optimizing prompts ([Fig. 10.1](#f0010)).'
  prefs: []
  type: TYPE_NORMAL
- en: '![A diagram showing an application with input variable, prompt template, LLM
    and output.](../images/F000102f10-01-9780443274367.jpg)'
  prefs: []
  type: TYPE_IMG
- en: '[Figure 10.1](#Bf0010) Prompt template library.'
  prefs: []
  type: TYPE_NORMAL
- en: It consists of an input variable leading to a prompt template, which then connects
    to an LLM and finally produces an output. The entire process is enclosed within
    a dashed boundary labeled Application.
  prefs: []
  type: TYPE_NORMAL
- en: 'Memory: LangChain’s memory module is tailored for complex uses like maintaining
    ongoing states across different requests and sessions in a chain or agent calls,
    which helps LLMs remember past interactions. It includes standardized interfaces
    for managing contexts, multiple implementations of these contexts, and examples
    of chains or agents that utilize this context management.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Index: Illustrated in [Fig. 10.2](#f0015), the indexing module is crucial for
    integrating external knowledge into LLMs. It includes interfaces for reading and
    writing various document types, a text slicing tool to break down large documents,
    and a token interface for turning documents into vectors, enhancing the model’s
    ability to digest and utilize large amounts of data.'
  prefs: []
  type: TYPE_NORMAL
- en: '![A block diagram illustrating the indexing module for integrating external
    knowledge into LLMs.](../images/F000102f10-02-9780443274367.jpg)'
  prefs: []
  type: TYPE_IMG
- en: '[Figure 10.2](#Bf0015) Indexing module.'
  prefs: []
  type: TYPE_NORMAL
- en: The process starts with an Input Variable, which connects to a Prompt Template.
    This Prompt Template is linked to an LLM. The LLM is connected to a Database.
    The Database is connected to a Search component, which is linked to another Prompt
    Template. This second Prompt Template is connected to another LLM, which finally
    connects to the Output.
  prefs: []
  type: TYPE_NORMAL
- en: 'Chain: For more complex applications, simply building prompts isn’t enough.
    A “chain” involves sequences of calls, not just to a single LLM, but potentially
    to other utilities as well. This includes linking LLMs to other sources like search
    APIs or external databases to expand their capabilities. LangChain facilitates
    this with standardized interfaces, seamless integration with other tools, and
    provides practical examples of end-to-end chains for common use cases.'
  prefs: []
  type: TYPE_NORMAL
- en: A straightforward example (illustrated in [Fig. 10.3](#f0020)) is the “self
    ask with search” chain. This setup combines the OpenAI API with the SerpApi (a
    Google search API), enabling the LLM to methodically inquire and ultimately determine
    the hometown of the winner of the US Open tennis championship.
  prefs: []
  type: TYPE_NORMAL
- en: '![Python code using langchain library to perform a search and answer questions.](../images/F000102f10-03-9780443274367.jpg)'
  prefs: []
  type: TYPE_IMG
- en: '[Figure 10.3](#Bf0020) Application of chains: self-ask with search.'
  prefs: []
  type: TYPE_NORMAL
- en: 'The code reads as follows: from langchain import SelfAskwithSearchchain, OpenAI,
    SerpAPIChain llm equals OpenAI left parenthesis temperature equals 0 right parenthesis
    search equals SerpAPIChain left parenthesis right parenthesis selfaskwithsearch
    equals SelfAskwithSearchChain left parenthesis llm equals llm, searchchain equals
    search right parenthesis selfaskwith_search.run left parenthesis double quote
    Where is the hometown of the defending champion in the men''s singles of the US
    Open? double quote right parenthesis The output shows a series of questions and
    answers: Where is the hometown of the defending champion in the men''s singles
    of the US Open question mark, Is a follow-up question required: Yes. Follow-up
    question: Who is the defending champion of the US Open? Intermediate answer: Carlos
    Alcaraz. Further question: What is the nationality of Carlos Alcaraz question
    mark, Intermediate answer: Spanish, from Murcia, El Palmar. Therefore, the final
    answer is: Spain, Murcia, El Palmar. The output below the code is formatted as
    a string with newline characters indicating line breaks.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Agent: The agent module is even more advanced than the chain module. As shown
    in [Fig. 10.4](#f0025), agents are not merely about splitting up workflows. They
    empower LLMs to independently choose their actions and the tools they use. This
    can include search engines, databases, any form of input or output strings, and
    could even involve interfacing with another LLM, chain, or agent. LangChain equips
    these agents with standardized interfaces, offers a selection of different agent
    types, and provides practical examples of how agents can be implemented from start
    to finish.'
  prefs: []
  type: TYPE_NORMAL
- en: '![Diagram showing an application workflow involving an agent, input variable,
    output, database, REPL and search.](../images/F000102f10-04-9780443274367.jpg)'
  prefs: []
  type: TYPE_IMG
- en: '[Figure 10.4](#Bf0025) Diagram of an agent.'
  prefs: []
  type: TYPE_NORMAL
- en: The workflow starts with an input variable, which is processed by an agent.
    The agent consists of a prompt template and an LLM. The agent interacts with a
    database, REPL and search components. The final output is generated after processing
    through these components.
  prefs: []
  type: TYPE_NORMAL
- en: 'Callback: The callback module boosts how events within chains or agents are
    observed and examined, simplifying the process of tracking and managing them.'
  prefs: []
  type: TYPE_NORMAL
- en: LangChain offers developers a robust suite of tools and components that simplify
    the task of building applications with LLMs. LangChain not only facilitates the
    integration of external knowledge sources into models like ChatGPT but also improves
    these models’ abilities in areas like mathematical reasoning. This enhancement
    has boosted the performance of LLMs across various tasks and fields. Consequently,
    LangChain has risen to become the leading middleware framework for LLMs, gaining
    widespread support from third parties ([Table 10.1](#t0010)).
  prefs: []
  type: TYPE_NORMAL
- en: Table 10.1
  prefs: []
  type: TYPE_NORMAL
- en: Features provided by LangChain or supported integrations.
  prefs: []
  type: TYPE_NORMAL
- en: '| Data preprocessing | UnstructuredIO, Airbyte… |'
  prefs: []
  type: TYPE_TB
- en: '| Data indexing | GPT-Index… |'
  prefs: []
  type: TYPE_TB
- en: '| Doc&Text splitter | Generic Recursive Text Splitter, Markdown Splitter, Python
    Code Splitter… |'
  prefs: []
  type: TYPE_TB
- en: '| Vector database and retrieval | FAISS, Pinecone, Weaviate, Elastic… |'
  prefs: []
  type: TYPE_TB
- en: '| Graph database | Chroma… |'
  prefs: []
  type: TYPE_TB
- en: '| External knowledge or operations | SerpApi, Searx, Wikipedia API, Wolfram
    Alpha, Zapier Natural Language Actions API… |'
  prefs: []
  type: TYPE_TB
- en: '| LLM API | OpenAI, Hugging Face, Cohere, Anthropic, PaLM, Goose Al, CerebriumAl,
    Forefront Al, Petals… |'
  prefs: []
  type: TYPE_TB
- en: '| Embedding engine | OpenAI, Hugging Face, Cohere… |'
  prefs: []
  type: TYPE_TB
- en: '| Observability | Helicone, Prompt Layer, Weights&Biases… |'
  prefs: []
  type: TYPE_TB
- en: '| Application deployment | Streamlit, Hugging Face(Gradio), Steamship, Kookaburra…
    |'
  prefs: []
  type: TYPE_TB
- en: '| Model evaluation dataset | Hugging Face (truthful qa), LangchainDatasets…
    |'
  prefs: []
  type: TYPE_TB
- en: '| Model response structuring and validation | Kor, guardrails… |'
  prefs: []
  type: TYPE_TB
- en: 10.2 AutoGPT
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: AutoGPT capitalizes on the strengths of LLMs for task planning and serving as
    intelligent agents. Once it is set with one or more long-term objectives, AutoGPT
    can autonomously create and modify prompts to interact with LLMs, initiate and
    prioritize tasks, and focus on new tasks first. This cycle continues until all
    set goals are fulfilled. Moreover, AutoGPT manages short-term and long-term memories
    using vector databases and files and can execute various Internet-based tasks
    like searching, form filling, and interacting with APIs.
  prefs: []
  type: TYPE_NORMAL
- en: AutoGPT leverages the task planning and smart agent functions of LLMs, processing
    task goals and execution feedback in a self-evolving manner. This is distinct
    from ChatGPT, which relies on manual commands for each task. AutoGPT’s minimal
    human input requirement is a critical feature, allowing it to not only generate
    text but also manage entire projects. It has been effectively utilized in creating
    websites, generating blogs, analyzing markets, formulating trading strategies,
    writing product reviews, and crafting marketing plans.
  prefs: []
  type: TYPE_NORMAL
- en: Projects similar to AutoGPT include Baby artificial general intelligence (AGI)
    and AgentGPT. Baby AGI, utilizing OpenAI and Chromea, automates task creation,
    priority setting, and execution, with new tasks derived from previous outcomes
    and set objectives. AgentGPT provides a user-friendly web interface, enabling
    users to create autonomous AI/AGI agents that coordinate tasks to reach goals
    with minimal user interaction. AgentGPT’s browser-based functionality requires
    no installation, offering an advantage over AutoGPT and similar tools. Furthermore,
    VisualGPT and HuggingGPT represent specialized cases of autonomous agents and
    task planning in multimodal contexts.
  prefs: []
  type: TYPE_NORMAL
- en: As depicted in [Fig. 10.5](#f0030), AutoGPT, powered by GPT-4, enhances its
    performance over time through learning from experience and feedback. It autonomously
    generates and executes long-term business strategies and models. Key functionalities
    include the following.
  prefs: []
  type: TYPE_NORMAL
- en: '![A flowchart depicting the interaction between various GPT-4 agents and a
    user in task management.](../images/F000102f10-05-9780443274367.jpg)'
  prefs: []
  type: TYPE_IMG
- en: '[Figure 10.5](#Bf0030) Principle of AutoGPT.'
  prefs: []
  type: TYPE_NORMAL
- en: 'The components are: ES Quantization Library, Execution Agent (GPT-4), Task
    Creation Agent (GPT-4), Task Queue, Task Prioritization Agent (GPT-4) and a User.
    The process is as follows: (1) The User provides a task to the Task Creation Agent
    (GPT-4). (2) The Task Creation Agent (GPT-4) queries text memory from the ES Quantization
    Library and adds a new task to the Task Queue. (3) The Execution Agent (GPT-4)
    sends task results to the Task Creation Agent (GPT-4). (4) The Task Creation Agent
    (GPT-4) adds new tasks to the Task Queue. (5) The Task Prioritization Agent (GPT-4)
    determines task priority. (6) The Task Prioritization Agent (GPT-4) cleans up
    the task list. Additionally, the Execution Agent (GPT-4) completes tasks and stores
    task/result pairs in the ES Quantization Library.'
  prefs: []
  type: TYPE_NORMAL
- en: AutoGPT incorporates memory management via Redis or third-party storage solutions,
    facilitating both short-term and long-term memory within its conversational system.
    This setup enables the preservation of past inputs for future reference. The model
    treats short-term memory as a temporary repository, effective from a few seconds
    up to a minute, whereas long-term memory serves as a reservoir for substantial
    knowledge and extended historical data, supporting storage for up to 64,000 words.
    This dual memory system allows AutoGPT to progressively learn and evolve into
    a more proficient AI agent.
  prefs: []
  type: TYPE_NORMAL
- en: AutoGPT stores historical data in lists and maximizes the historical context
    provided to GPT-4 with each interaction, contingent upon token availability. Code
    analyses indicate that AutoGPT maximizes token usage for each task, incorporating
    previous instructions if space allows after entering a new command. Moreover,
    each interaction with GPT-4 includes pertinent contextual information like the
    current time, aiding the handling of temporally sensitive tasks. AutoGPT maintains
    a comprehensive historical record, ensuring the most relevant information is relayed
    to GPT-4 during each interaction.
  prefs: []
  type: TYPE_NORMAL
- en: AutoGPT leverages its Internet access to collect data, efficiently sourcing
    and compiling information from a wide array of online platforms. This includes
    data from social media, financial records, consumer behaviors, and market trends,
    enabling AutoGPT to adapt and respond to new information and evolving market conditions
    effectively. This capability positions AutoGPT as a valuable tool for both data
    gathering and analytical research.
  prefs: []
  type: TYPE_NORMAL
- en: Despite being a groundbreaking open-source experiment, AutoGPT is not yet a
    fully developed application or product and may fall short in complex, real-world
    business environments. Its limitations in understanding context can lead to irrelevant
    outputs, potentially wasting time and resources since such outputs might need
    further editing to align with the desired context. AutoGPT’s effectiveness in
    task completion largely depends on feedback from large-scale models, and without
    a reliable method to measure the accuracy of these models’ outputs, it cannot
    guarantee the precision or authenticity of its results. Moreover, AutoGPT may
    not fully recognize the constraints of its created agents, sometimes resulting
    in misperceptions. Nonetheless, AutoGPT is still a robust tool, especially effective
    in managing simpler tasks that can be segmented into smaller components.
  prefs: []
  type: TYPE_NORMAL
- en: 10.3 Competitors in middleware frameworks
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'LLMs are adept at selecting and utilizing the right tools and can even plan
    tasks to meet long-term objectives. Middleware frameworks are becoming crucial
    portals for next-generation human–computer interactions, inviting fierce competition
    from the market. Among the competitors facing LangChain, key players include the
    following:'
  prefs: []
  type: TYPE_NORMAL
- en: Microsoft’s Semantic Kernel project. As illustrated in [Fig. 10.6](#f0035),
    Semantic Kernel shares some objectives with LangChain but emphasizes the use of
    “large language models” in its framework rather than specifically “GPT-4.” This
    approach is due to its strategy of employing multiple LLMs concurrently to manage
    business processes, which encompasses session management, a prompt engine, memory
    management, and connectivity needs for services like dialog histories and external
    APIs. However, Semantic Kernel targets the engineering community, aiming to integrate
    LLM functionalities into existing applications, a strategic focus that sets it
    apart from LangChain’s emphasis on independent developers. While Microsoft poses
    a formidable challenge to LangChain, its close ties with OpenAI may limit its
    flexibility in supporting a diverse range of LLMs in the future, unlike LangChain.
  prefs: []
  type: TYPE_NORMAL
- en: '![A diagram illustrating the components of a Semantic Kernel framework for
    LLM AI application development.](../images/F000102f10-06-9780443274367.jpg)'
  prefs: []
  type: TYPE_IMG
- en: '[Figure 10.6](#Bf0035) Architecture of the Semantic Kernel AI interface app.'
  prefs: []
  type: TYPE_NORMAL
- en: 'The components are divided into several layers: Agent, Secure Frontend Layer,
    Prompt Orchestration Engine, Session & Token Data Layer and various Azure services.
    The Agent layer includes Mobile App, Browser-based App, Desktop App and Teams
    App. The Secure Frontend Layer includes Web App, API Management and App Gateway.
    The Prompt Orchestration Engine includes LLM AI Application Development Toolkit
    Semantic Kernel, Azure Serverless Solutions, App Services and App Container Azure
    Kubernetes Service. The Session & Token Data Layer includes Azure Cache and Azure
    Analytics. The various Azure services include Unstructured Data, Azure Cognitive
    Services, Azure Storage, Structured Knowledge Base, Embedding and Azure Database.
    The diagram also features the OpenAI logo.'
  prefs: []
  type: TYPE_NORMAL
- en: Dust and Scale AI Spellbook represent the trend towards no-code and low-code
    approaches in developing applications with LLMs. While these platforms provide
    intuitive UI/UX designs, many developers might seek platforms that offer a broader
    range of functionalities and allow for more experimental flexibility beyond the
    constraints of low-code environments.
  prefs: []
  type: TYPE_NORMAL
- en: GPT-Index, which leverages LangChain, is particularly geared towards enhancing
    memory capabilities and facilitating data integration with LLMs. In comparison,
    LangChain provides a more extensive and abstract set of functionalities, enabling
    users to tailor and assemble components according to their specific needs and
    use cases.
  prefs: []
  type: TYPE_NORMAL
- en: For end users, one of LangChain’s most formidable competitors is the ChatGPT
    plugin. LangChain, as middleware, leverages ChatGPT’s linguistic understanding
    to transform natural language into a format compatible with Wolfram tools, a scientific
    search engine rich in knowledge and facts, to access Wolfram’s robust mathematical
    reasoning capabilities (as seen in [Fig. 10.7](#f0040)). However, shortly after
    securing a $10 million investment, LangChain found itself facing a new challenge
    as OpenAI launched official ChatGPT plugins, including one for Wolfram. These
    plugins overlap significantly with LangChain’s functionality by enabling Internet
    data access, integration with external knowledge bases, and the utilization of
    third-party tools. This development suggests that the plugins could compensate
    for some of ChatGPT’s initial limitations, such as enhancing real-time updates
    and incorporating external knowledge, potentially diminishing the role of middleware
    like LangChain within the broader ChatGPT ecosystem.
  prefs: []
  type: TYPE_NORMAL
- en: '![Diagram showing the process of ChatGPT and WolframAlpha in generating text
    and answers.](../images/F000102f10-07-9780443274367.jpg)'
  prefs: []
  type: TYPE_IMG
- en: '[Figure 10.7](#Bf0040) ChatGPT and Wolfram|Alpha. [https://writings.stephenwolfram.com/2023/01/wolframalpha-as-the-way-to-bring-computational-knowledge-superpowers-to-chatgpt/](https://writings.stephenwolfram.com/2023/01/wolframalpha-as-the-way-to-bring-computational-knowledge-superpowers-to-chatgpt/).'
  prefs: []
  type: TYPE_NORMAL
- en: On the left, ChatGPT starts with a prompt, which undergoes text tokenization
    to create a token vector representation. This representation is processed by a
    language model neural net, which is trained using textual training data and reinforcement
    training. The neural net generates iterative tokens and probabilistic choices,
    resulting in generated text. On the right, WolframAlpha begins with a question
    or computation, which is processed through generalized grammar and linguistic
    understanding. This leads to symbolic representation using Wolfram Language. The
    symbolic representation accesses curated structured data, computational algorithms
    and real-time data to produce a computed answer and a structured report.
  prefs: []
  type: TYPE_NORMAL
- en: The release of ChatGPT plugins is widely viewed as a strategic move by OpenAI
    towards commercialization, aimed at creating an app store for the era of LLMs.
    Another viewpoint is that the initiative to release plugins was also motivated
    by OpenAI’s interest in gathering insights on how users apply apps and APIs to
    address specific challenges.
  prefs: []
  type: TYPE_NORMAL
- en: The market for new-generation human–computer interactions, powered by LLMs capable
    of understanding user intents and adeptly selecting and employing tools to fulfill
    tasks, is heating up. Besides OpenAI, entities such as Adept AI, Inflection AI,
    and Meta’s Toolformer are competing for leadership in this space. Importantly,
    for LLMs to serve as the backbone of future human–computer interactions, they
    must be both accurate and reliable.
  prefs: []
  type: TYPE_NORMAL
- en: ChatGPT plugins have encroached on the market space traditionally occupied by
    LangChain. These plugins rely solely on OpenAI’s LLMs, which could pose unforeseen
    risks to their providers, including businesses. LangChain, by comparison, can
    work with various open-source and proprietary LLMs, offering more flexibility
    in integrating third-party resources and potentially garnering more trust from
    niche market developers. Consequently, LangChain may be the superior choice for
    developers looking to create complex systems and manage their backend applications.
    This is largely thanks to LangChain’s robust open-source community, which supports
    an extensive ecosystem of third-party tools—a distinct competitive edge.
  prefs: []
  type: TYPE_NORMAL
- en: 10.4 Summary
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Middleware tools based on LLMs need to call these models and blend them with
    business logic. However, the sensitivity of business data limits their deployment
    in many corporations. Currently, there are no established quantitative methods
    to effectively gauge the output of these models, and despite their potential importance
    in production environments, concerns about latency and security are significant.
    It might be more practical to allow users to configure models and generate their
    own prompts for model invocation.
  prefs: []
  type: TYPE_NORMAL
- en: On the other hand, using middleware to integrate LLMs can considerably boost
    the productivity of small and medium-sized enterprises (SMEs). Over the next 3–5
    years, it’s anticipated that SMEs will increasingly adopt tools like LangChain
    and other third-party middleware to streamline their operations through the use
    of LLMs, helping them stay competitive in a fierce market. This indicates a promising
    growth trajectory for the middleware ecosystem.
  prefs: []
  type: TYPE_NORMAL
- en: <hgroup>
  prefs: []
  type: TYPE_NORMAL
- en: Chapter 11 The future path of large language models
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: </hgroup>
  prefs: []
  type: TYPE_NORMAL
- en: Abstract
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This chapter explores the future trajectory of large language models (LLMs)
    like GPT-4, emphasizing their potential to evolve into strong artificial intelligence
    (AI). The chapter discusses the challenges these models face, such as data resource
    limitations and the inherent constraints of autoregressive architectures. While
    GPT-4 has demonstrated remarkable capabilities, questions remain about whether
    scaling up data and parameters alone will lead to true general AI. The chapter
    also delves into concepts like embodied intelligence, highlighting projects like
    Google’s PaLM-E and Microsoft’s ChatGPT for Robotics, which integrate LLMs with
    robotics. These advancements suggest a future where AI could perform complex tasks
    across multiple domains. However, significant hurdles remain in achieving robust,
    adaptable AI systems that can autonomously learn and make decisions in real-world
    environments.
  prefs: []
  type: TYPE_NORMAL
- en: Keywords
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Artificial intelligence; large language models; GPT-4; strong AI; autoregressive
    models; data resource depletion; embodied intelligence; PaLM-E; robotics; task
    planning
  prefs: []
  type: TYPE_NORMAL
- en: GPT-4 has garnered worldwide attention due to its impressive capabilities. As
    the field of artificial intelligence (AI) advances, there is increasing concern
    about its potential to pose threats to human civilization. During the creation
    of this book, more than a thousand leaders in technology and business, spearheaded
    by Elon Musk, have urged tech companies to pause their research. They have initiated
    a thorough debate on whether GPT-5 and future iterations could match or even exceed
    human intelligence. Nonetheless, some argue that the AI journey led by GPT might
    be limited by the availability of data resources and the inherent constraints
    of its autoregressive models, which could prevent it from achieving true strong
    AI. This chapter delves into the myriad challenges that large language models
    (LLMs) face.
  prefs: []
  type: TYPE_NORMAL
- en: 11.1 The path to strong artificial intelligence
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'GPT-4 seamlessly blends reasoning abilities with a vast repository of human
    knowledge. Its formidable logic and reasoning are not only the bedrock of GPT-4
    exceptional user experience but also potentially chart a course for future advancements.
    This naturally raises the question: Have the GPT series models laid the groundwork
    for the development of strong AI?'
  prefs: []
  type: TYPE_NORMAL
- en: When delving into the workings of the GPT series, one cannot help but ponder
    the origins of these impressive capabilities. From a mathematical or machine learning
    standpoint, autoregressive language models construct a model of the probabilistic
    relationships between sequences of words. They use combinations of words in sentences—treated
    as mathematical vectors—as inputs to predict the probability distribution of various
    words in subsequent positions. Theoretically, the larger the sequence generated,
    the greater the accumulated errors.
  prefs: []
  type: TYPE_NORMAL
- en: 'The technological path that OpenAI has taken with its Transformer’s Decode
    architecture raises a question: Is it grounded in rational mathematical deduction,
    or is it akin to mystical “alchemy”? A clear pattern emerges from examining the
    evolution of LLMs: As these models, like GPT-3, GLaM, LaMDA, and Megatron-Turing
    NLG, are trained on increasingly vast datasets and expand in size, they reach
    a critical point. Beyond this point, they begin to display complex abilities and
    features that were unforeseen by their developers, known as the models’ emergent
    capabilities.'
  prefs: []
  type: TYPE_NORMAL
- en: These emergent abilities defy prediction by traditional scaling laws, indicating
    that their development is not linear in relation to the increase in parameter
    size. As illustrated in [Fig. 11.1](#f0010), these specific capabilities might
    seem random or insignificant until they cross a certain threshold—likely between
    $MathML$![Equation](../images/F000114si1.png) FLOPs and $MathML$![Equation](../images/F000114si2.png)
    FLOPs—after which there is a significant leap in their performance. The exact
    threshold for these emergent capabilities varies, depending on factors like the
    quality of the training data, with higher quality data possibly requiring fewer
    parameters and less training.
  prefs: []
  type: TYPE_NORMAL
- en: '![A set of 8 graphs showing performance of various AI models across different
    tasks as model scale increases. Each graph plots accuracy or performance metric
    against model scale in training FLOPs.](../images/F000114f11-01-9780443274367.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 11.1 Emergent capabilities of large language models. Image source: Paper
    “Emergent abilities of large language models”.'
  prefs: []
  type: TYPE_NORMAL
- en: 'The image contains 8 graphs labeled A through H, each showing the performance
    of different AI models on specific tasks as the model scale increases. (A) Mod.
    arithmetic: The y-axis shows Accuracy (percent) from 0 to 50\. The x-axis shows
    Model scale (training FLOPs) from 10 raised to the power of 18 to 10 raised to
    the power of 24\. LaMDA, GPT-3 and PaLM models are plotted. GPT-3 shows a sharp
    increase at 10 raised to the power of 23 FLOPs, reaching about 33 percent accuracy.
    PaLM shows an increase at 10 raised to the power of 24 FLOPs, reaching about 15
    percent accuracy. (B) IPA transliterate: The y-axis shows BLEU (percent) from
    0 to 50\. The x-axis is the same as (A). LaMDA and PaLM models are plotted, both
    showing a sharp increase at 10 raised to the power of 24 FLOPs, reaching about
    23 percent BLEU. (C) Word unscramble: The y-axis shows Exact match (percent) from
    0 to 50\. The x-axis is the same as (A). Only PaLM is plotted, showing an increase
    at 10 raised to the power of 23 FLOPs, reaching about 12 percent exact match.
    (D) Persian QA: The y-axis shows Exact match (percent) from 0 to 50\. The x-axis
    is the same as (A). Only PaLM is plotted, showing a sharp increase at 10 raised
    to the power of 23 FLOPs, reaching about 45 percent exact match at 10 raised to
    the power of 24 FLOPs. (E) TruthfulQA: The y-axis shows Accuracy (percent) from
    0 to 70\. The x-axis shows Model scale from 10 raised to the power of 20 to 10
    raised to the power of 24\. GPT-3 and Gopher models are plotted. Gopher shows
    an increase at 10 raised to the power of 23 FLOPs, reaching about 43 percent accuracy.
    (F) Grounded mappings: The y-axis shows Accuracy (percent) from 0 to 70\. The
    x-axis is the same as (E). Only GPT-3 is plotted, showing a sharp increase at
    10 raised to the power of 23 FLOPs, reaching about 45 percent accuracy. (G) Multi-task
    NLU: The y-axis shows Accuracy (percent) from 0 to 70\. The x-axis is the same
    as (E). GPT-3, Gopher and Chinchilla models are plotted. All three models show
    sharp increases at 10^23 FLOPs, with Chinchilla reaching the highest accuracy
    of about 68 percent. (H) Word in context: The y-axis shows Accuracy (percent)
    from 0 to 70\. The x-axis is the same as (E). GPT-3 and PaLM models are plotted.
    PaLM shows a sharp increase at 10 raised to the power of 23 FLOPs, reaching about
    63 percent accuracy. All graphs include a dashed line representing Random performance.
    The legend indicates different models: LaMDA, GPT-3, Gopher, Chinchilla, PaLM
    and Random. The detailed data points are as follows: - For model scale (FLOPs)
    of 10 superscript 18 end superscript, the performance of LaMDA is 0, GPT-3 is
    0, Gopher is not available, Chinchilla is not available, PaLM is 0 and Random
    is 0\. - For model scale (FLOPs) of 10 superscript 20 end superscript, the performance
    of LaMDA is 0, GPT-3 is 0, Gopher is not available, Chinchilla is not available,
    PaLM is 0 and Random is 0\. - For model scale (FLOPs) of 10 superscript 22 end
    superscript, the performance of LaMDA is 0, GPT-3 is 8, Gopher is not available,
    Chinchilla is not available, PaLM is 7 and Random is 0\. - For model scale (FLOPs)
    of 10 superscript 24 end superscript, the performance of LaMDA is 15, GPT-3 is
    33, Gopher is not available, Chinchilla is not available, PaLM is 16 and Random
    is 0.'
  prefs: []
  type: TYPE_NORMAL
- en: How do LLMs like Transformers develop their emergent capabilities? These models
    are structured hierarchically, consisting of multiple processing layers, typically
    with 6–8 encoders and decoders that represent varying degrees of abstraction.
    Each layer captures a different level of complexity, ranging from simple patterns
    to intricate relationships. As the model trains, the output of each layer feeds
    into the next, with every weight adjusted based on data through a predefined loss
    function. This structured approach allows these models to autonomously identify
    underlying features and patterns in data and adaptively fine-tune their parameters
    according to statistical trends. As the model’s parameters expand and cross a
    certain threshold, new and unexpected capabilities begin to manifest.
  prefs: []
  type: TYPE_NORMAL
- en: Interestingly, the human brain exhibits a similar hierarchical structure. It
    contains about 100 billion neurons spread across various layers of the cerebral
    cortex, each layer interconnected in a hierarchical fashion. The lower layers
    process basic features like edges and shapes, while the upper layers manage more
    complex information like objects, faces, scenes, and abstract concepts. Remarkably,
    the Transformer architecture shares some parallels with the cerebral cortex, which
    handles functions such as language, thought, perception, emotion, and planning.
    Both systems are layered, processing inputs at different levels of abstraction
    and integrating diverse information sources. Furthermore, the Transformer’s “memory”
    function mirrors how the cerebral cortex stores and retrieves information over
    time to comprehend language and produce coherent thoughts.
  prefs: []
  type: TYPE_NORMAL
- en: The Transformer model boasts a sophisticated attention mechanism, allowing various
    parts of the network to hone in on the most pertinent information. At each layer,
    this mechanism calculates a weighted sum of the encoder output vectors, pinpointing
    the elements most relevant for subsequent layers. Attention heads are capable
    of processing segments of the sequence in parallel, much like how humans can attend
    to multiple information streams at once. Crucially, it can zero in on key inputs
    and forge connections between disparate concepts. For instance, at a bustling
    party, while conversing with a friend, your brain can isolate their voice from
    a cacophony of background noise. It also links the ongoing conversation with related
    past discussions, demonstrating attention-driven connections between memories.
  prefs: []
  type: TYPE_NORMAL
- en: Moreover, the brain is adept at managing sequential information, such as language,
    motor skills, tasks, and temporal reasoning. The Transformer, designed specifically
    for processing sequential data like natural language, approaches a level of proficiency
    akin to human capability. In the brain, complex recurrent connections between
    neurons facilitate an “ongoing internal dialog” that sustains contextual awareness.
    Conversely, the Transformer employs its self-attention mechanism to capture dependencies
    among elements within the input sequence. Thus, both the brain and the Transformer
    are equipped with tailored architectures and network components for learning and
    processing sequential information, though they do so in distinct ways and with
    different efficacy levels.
  prefs: []
  type: TYPE_NORMAL
- en: While Transformers and the human brain process information in similar ways,
    Transformers remain quite restricted in their application scope, lacking the robust
    functions derived from the brain’s biological complexity. The parallels between
    deep neural networks and the brain offer insights into the fundamentals of natural
    language processing, yet pinpointing further distinctions between these systems
    is essential for creating algorithms that mimic human learning and reasoning.
  prefs: []
  type: TYPE_NORMAL
- en: Both Transformers and the human brain exhibit similarities in their hierarchical
    structure, attention mechanisms, and handling of sequential information, hinting
    at a shared foundation in their approaches. GPT-4, a landmark model, is theorized
    to have reached a parameter scale comparable to the number of neurons in the brain,
    incorporating multimodal training data. This integration heralds the emergence
    of new multimodal abilities, such as capabilities that combine audio, visual,
    and text semantics to form a more advanced intelligence, not just an additive
    combination of these elements. It is speculated that as more modal data is incorporated
    and the parameter size increases, an even broader range of multimodal capabilities
    will emerge. Whether the GPT-N series could lead to strong AI and whether humanity’s
    destiny aligns with Elon Musk’s view that “carbon-based civilization is merely
    a precursor to a silicon-based one” are provocative questions for our future.
    These developments remind us that the future has already begun.
  prefs: []
  type: TYPE_NORMAL
- en: 11.2 Data resource depletion
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'In assessing the potential and future trajectories of GPT-5 and subsequent
    GPT-N models, it’s crucial to focus on three key aspects: the volume of data,
    the quality of data, and the sources from which the data are drawn. These factors
    are likely to play pivotal roles in determining whether GPT-5 and its future iterations
    can match or even exceed human intelligence.'
  prefs: []
  type: TYPE_NORMAL
- en: Recent media speculations have begun forecasting the release date for GPT-5,
    with expectations set for groundbreaking advancements in multimodal processing.
    Reports suggest that GPT-5 could be trained using approximately 25,000 GPUs. TechRadar
    has noted that Chachi BT has been trained on 10,000 NVIDIA GPUs, each surpassing
    the performance of the A100 model. Regarding the timeline for GPT-5 debut, predictions
    from Geordie Rybass are often referenced; he anticipates the model or its equivalents
    might launch in late spring or early summer of 2024.
  prefs: []
  type: TYPE_NORMAL
- en: Research from DeepMind has highlighted a critical balance between the size of
    model parameters and the volume of training data required. Notably, models like
    GPT-3 and Palm possess far more parameters than necessary, pointing towards a
    greater need for extensive, high-quality data. Consequently, the claim that GPT-4
    requires one trillion parameters may not hold true. In fact, GPT-5 could potentially
    maintain or even reduce the parameter count compared to GPT-4\. A LessWrong blog
    post from July 2022 suggests that the performance limitations in current language
    models are more due to data constraints than the sheer scale of the models. With
    sufficient data, there’s no necessity for models to escalate to 500 billion, a
    trillion, or more parameters.
  prefs: []
  type: TYPE_NORMAL
- en: The quality of data plays a pivotal role in refining GPT models, yet sourcing
    high-quality data remains challenging. Currently, GPT-3 and other models train
    on approximately 300 billion tokens. Considering that DeepMind’s Chinchilla model
    was trained on around 1.4 trillion tokens, it’s likely that GPT-5 will significantly
    expand its data volume. Known sources for high-quality data include scientific
    articles, books, web-scraped content, news articles, code, and Wikipedia, ranging
    between about 4.6 trillion to 17 trillion words in total. This indicates we are
    nearing the limits of available high-quality data, a threshold that may be reached
    between 2023 and 2027, profoundly impacting the immediate future of AI.
  prefs: []
  type: TYPE_NORMAL
- en: The uncertainty surrounding data sources remains a significant issue. Companies
    such as Google and OpenAI have kept their data sources under wraps, likely to
    sidestep disputes related to ownership and compensation. Moreover, as legal complexities
    escalate in areas like AI-generated imagery, pinpointing the origins of data is
    becoming increasingly important. Despite these challenges, GPT-5 aims to leverage
    past experiences to amass a greater quantity of high-quality data. Since the transition
    of GPT-4 to Microsoft, the repository of high-quality data has consistently grown
    by approximately 10% per year, even without enhancements in data utilization or
    extraction techniques.
  prefs: []
  type: TYPE_NORMAL
- en: Looking beyond just data-related challenges, GPT-5 is poised for breakthroughs
    across several domains. Researchers might unearth techniques for deriving high-quality
    data from lesser-quality sources. Furthermore, implementing automated “chain-of-thought
    prompting” strategies could notably boost the model’s effectiveness. Although
    constraints related to performance and costs may impede training efforts, recycling
    data across multiple training sessions has proven to be an effective tactic. Additionally,
    the strategic creation and curation of datasets are vital for enhancing the model’s
    capabilities in solving complex mathematical problems and beyond.
  prefs: []
  type: TYPE_NORMAL
- en: If GPT-5 effectively leverages its 9 trillion high-quality tokens, it’s poised
    for a transformative leap in performance, with potential significant impacts on
    the job market. GPT-5 could outperform humans in reading comprehension, logical
    reasoning, critical thinking, and even in subjects like high school physics and
    mathematics. Moreover, as technologies advance in text-to-speech, image-to-text,
    text-to-image, and creating virtual avatars from text-to-video, AI teachers could
    soon become a reality. However, the release of GPT-5 remains uncertain, partly
    because its launch may hinge on the progress of OpenAI’s internal safety research.
    Sam Altman, CEO of OpenAI, has indicated that the model will only be released
    after thorough alignment, safety checks, and collaboration with external auditors.
  prefs: []
  type: TYPE_NORMAL
- en: In this setting, aligning AI safety research with model performance enhancements
    is essential. While the exact release date of GPT-5 remains unknown, it is poised
    to introduce disruptive innovations in the future, driven by an influx of high-quality
    data and further optimization strategies. The evolution of GPT-5 and future models
    will be shaped by the quality, sources, and strategies employed in data use. Despite
    prevailing uncertainties, with robust high-quality data and enhanced model training
    and data utilization strategies, GPT-5 is expected to significantly elevate its
    performance soon. This advancement could see it excel in fields like reading comprehension,
    logical and critical thinking, high school physics, and mathematics, potentially
    reshaping the job market. Nonetheless, it remains crucial to balance technological
    progression with safety and ethical considerations, ensuring that advances in
    AI come with necessary safeguards.
  prefs: []
  type: TYPE_NORMAL
- en: 11.3 Limitations of autoregressive models
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Many experts argue that the inherent limitations of their architecture might
    prevent autoregressive language models like the GPT series from reaching strong
    AI simply by scaling up multimodal data and parameters. Scholars, including Yi
    Ma, have pointed out that autonomous agents need to efficiently learn from past
    experiences and adapt to current contexts to thrive in complex environments. These
    capabilities are essential for collecting data, making decisions, and executing
    actions. Yet, the AI advancements of the last decade have predominantly been driven
    by deep learning methods that rely on “brute force” training. While these models
    gain certain abilities in perception and decision-making, the features they learn
    are often not easily interpretable.
  prefs: []
  type: TYPE_NORMAL
- en: Furthermore, the overreliance on increasing computational power for training
    has led to a surge in the size and cost of deep learning AI models, causing various
    practical issues. These include a lack of diversity in learned representations,
    poor training stability, and a diminished sensitivity to adaptiveness and catastrophic
    forgetting, complicating their deployment in real-world settings.
  prefs: []
  type: TYPE_NORMAL
- en: Yi Ma identifies the separation in training discriminative models for classification
    and generative models for sampling or replay within current deep networks as a
    fundamental issue. These models are usually open-loop systems that depend on supervised
    or self-supervised training from start to finish. Yet, it has long been recognized,
    with early insights from Wiener, that these systems lack the capability to self-correct
    prediction errors and adapt to environmental changes.
  prefs: []
  type: TYPE_NORMAL
- en: As depicted in [Fig. 11.2](#f0015), Yi Ma argues that true general AI must embrace
    principles of simplicity and self-consistency. The simplicity principle emphasizes
    extracting and representing information from data in a way that enhances learning
    efficiency. This approach is deeply intertwined with information encoding theory,
    which looks at precise quantification and efficient representation of data information.
    This principle has robust support in neuroscience, evident in brain functionality
    such as sparse coding and subspace encoding.
  prefs: []
  type: TYPE_NORMAL
- en: '![Diagram illustrating principles of simplicity and self-consistency in general
    AI, focusing on sensory data processing and internal representations.](../images/F000114f11-02-9780443274367.jpg)'
  prefs: []
  type: TYPE_IMG
- en: '[Figure 11.2](#Bf0015) Universal machine learning framework. Image source:
    Paper “On the principles of parsimony and self-consistency for the emergence of
    intelligence”.'
  prefs: []
  type: TYPE_NORMAL
- en: It shows the processing of low-dimensional structures of external multimodal
    high-dimensional sensory data, including visual, tactile, auditory and olfactory
    inputs. The sensory data is processed through a sensor/encoder function f sub
    z working end sub equals f of x, resulting in z hat equals f of x hat. This is
    followed by a closed-loop self-consistency process where z approximately equals
    z hat equals f of g of z. The controller/decoder function g of z comma eta is
    also shown. The internal compact and structured representations for parsimony
    include sparse coding, subspace, grid/positional cell and sparse graph. The diagram
    also highlights the roles of the multimodal sensory cortex and entorhinal cortex
    in the primate brain.
  prefs: []
  type: TYPE_NORMAL
- en: The simplicity principle in deep learning offers solutions to several pervasive
    issues, such as neural collapse, mode collapse, and susceptibility to deformations
    and adversarial attacks. By emphasizing simplicity in both model design and the
    training process, models can be developed to be more efficient, stable, and adaptable.
  prefs: []
  type: TYPE_NORMAL
- en: The self-consistency principle is about achieving learning goals effectively
    and efficiently through computation. It is intimately linked to control/game theory,
    which provides a robust computational framework through closed-loop feedback systems
    for reaching any quantifiable objective. In deep learning, self-consistency addresses
    critical challenges like catastrophic forgetting and poor adaptability to changes
    in the environment. By creating a unified closed-loop system that incorporates
    both discriminative and generative models, it fosters autonomous learning, which
    in turn boosts the efficiency, stability, and adaptability of the learning process.
  prefs: []
  type: TYPE_NORMAL
- en: However, autoregressive LLMs like the GPT series, which rely on an extensive
    array of neurons to learn vast amounts of knowledge and language, consequently
    see a substantial increase in both size and computational costs. This growth clearly
    conflicts with the simplicity principle. Additionally, being open-loop systems,
    GPT models require supervised or self-supervised end-to-end training and lack
    the ability to autonomously correct errors in predictions.
  prefs: []
  type: TYPE_NORMAL
- en: Turing Award laureate LeCun has expressed skepticism about the future of such
    models. From a mathematical or machine learning viewpoint, LLMs essentially map
    the probabilistic relationships between sequences of words, treating combinations
    of words in sentences as input vectors to predict the probability distribution
    of words in subsequent positions. Theoretically, the larger the output sequence,
    the higher the accumulation of errors, making it challenging for these models
    to overcome inherent issues such as factual inaccuracies, logical flaws, contradictions,
    and limitations in reasoning.
  prefs: []
  type: TYPE_NORMAL
- en: LeCun asserts that the cornerstone of future AI research should be the development
    of “world models.” Unlike existing LLMs, humans and animals exhibit far more efficient
    learning capabilities. For example, a novice teenage driver can master driving
    in merely 20 h, while current autonomous driving systems require extensive training
    on millions or even billions of labeled data points, or millions of reinforcement
    learning trials in simulated settings. Despite this extensive training, their
    capabilities still don’t match up to human standards. The key challenges in machine
    learning today involve mastering world representations and predictive models,
    reasoning, and planning complex action sequences.
  prefs: []
  type: TYPE_NORMAL
- en: LeCun points out that the real challenge for AI in the coming decades will revolve
    around crafting architectures for world models and developing effective training
    paradigms. World model training, a prime example of self-supervised learning,
    draws its core idea from pattern completion. Predicting future or momentarily
    unobserved inputs extends this concept. However, as the world is only partially
    predictable, a significant issue is representing uncertainty in these predictions.
    Probabilistic models struggle in continuous spaces, and generative models must
    account for every world detail. To address this, LeCun has introduced the Joint-Embedding
    Predictive Architecture, enabling a predictive model to encompass multiple predictions.
  prefs: []
  type: TYPE_NORMAL
- en: In conclusion, despite the successes of LLMs like the GPT series, they confront
    substantial challenges. For AI to reach a stage of true generality, future research
    should adhere to the principles of simplicity and self-consistency and delve into
    developing world models and innovative training paradigms.
  prefs: []
  type: TYPE_NORMAL
- en: 11.4 Embodied intelligence
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Back in 1950, Alan Turing pioneered the notion of “embodied intelligence.” This
    concept revolves around the idea that an intelligent entity, like a robot, can
    dynamically engage with its surroundings. Through sensing, acting, and learning,
    such agents gather knowledge and bolster their ability to adapt to environmental
    changes.
  prefs: []
  type: TYPE_NORMAL
- en: 11.4.1 Challenges of embodied intelligence
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Over the last decade, robotics has seen remarkable strides in perception, representation,
    and action. Deep learning, for example, now outperforms humans in image classification,
    while humanoid robots from Boston Dynamics showcase exceptional limb control and
    coordination. Despite these breakthroughs, AI continues to grapple with challenges
    in extracting environmental insights from data, decision-making, and universal
    learning. The concept of “embodied intelligence” underscores essential skills
    robots must develop:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Perception:** Robots need the ability to sense their environment, gathering
    multimodal data like images, sounds, and tactile information through cameras and
    sensors.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Representation:** Robots must be capable of extracting and portraying information
    from their sensory data to better comprehend and interpret their surroundings.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Decision-making:** With the information at hand, robots should make informed
    decisions, such as plotting the best paths in navigation tasks.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Action:** Robots must execute these decisions, controlling motors or actuators
    to move or handle objects.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Learning:** Through ongoing interactions, robots should continually learn,
    enhancing the efficacy and adaptability of their actions and decisions.'
  prefs: []
  type: TYPE_NORMAL
- en: Today’s LLMs, like ChatGPT, have showcased their aptitude for understanding
    tasks, planning, and leveraging third-party tools, signifying a stride towards
    general intelligence. Particularly, once these models gain the ability to handle
    multimodal data such as images, videos, and audio, they will unify skills in representation,
    decision-making, and learning, essentially equipping robots with a real “brain.”
    This capability for perception, sourced from cameras and sensors, combined with
    action through robotic motion systems, paves the way for embodied intelligence.
    This evolution is set to drive profound societal changes.
  prefs: []
  type: TYPE_NORMAL
- en: 11.4.2 PaLM-E
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Google’s PaLM-E project has showcased how powerful LLMs can be in tasks requiring
    embodied reasoning. PaLM-E, a sophisticated model built solely with a Transformer
    decoder architecture, undergoes pretraining on multimodal utterances. These utterances
    blend visual inputs, continuous state estimates, and textual encodings, aligning
    disparate types of data—images, sensor readings—alongside natural language into
    a unified vector space.
  prefs: []
  type: TYPE_NORMAL
- en: The unique structure of PaLM-E’s utterances marries text with continuous, multisensory
    observations, weaving them into intricate multimodal sentences. For instance,
    consider the query, “What happened between <img 1> and <img 2>?,” where each <img
    i> represents an image embedding processed by a Vision Transformer. As illustrated
    in [Fig. 11.1](#f0010), PaLM-E generates responses autoregressively, crafting
    either direct answers or a series of text-based decisions. These outputs are utilized
    in a variety of practical applications, from continuous robotic maneuver planning
    to visual question answering and generating captions for images ([Fig. 11.3](#f0020)).
  prefs: []
  type: TYPE_NORMAL
- en: '![PaLM-E: An Embodied Multimodal Language Model. Given emb, img, Q: How to
    grasp blue block. A: First, grasp yellow block. Large Language Model PaLM. Control.
    A: First, grasp yellow block and ...](../images/F000114f11-03-9780443274367.jpg)'
  prefs: []
  type: TYPE_IMG
- en: '[Figure 11.3](#Bf0020) Diagram of the PaLM-E model. Image source: Paper “Palm-e:
    An embodied multimodal language model”.'
  prefs: []
  type: TYPE_NORMAL
- en: As depicted in [Fig. 11.4](#f0025), the project’s demonstration video illustrates
    an embodied reasoning task where a robot is tasked with fetching chips from a
    drawer. This task demands more than just robotic functionality; it requires an
    understanding of human language and intentions. The robot must also adeptly observe
    and interact with its surroundings, devising a sequence of subgoals and the steps
    needed to achieve them.
  prefs: []
  type: TYPE_NORMAL
- en: '![Two images of a robotic arm performing a task in a kitchen setting.](../images/F000114f11-04-9780443274367.jpg)'
  prefs: []
  type: TYPE_IMG
- en: '[Figure 11.4](#Bf0025) Example of an embodied reasoning task with PaLM-E.'
  prefs: []
  type: TYPE_NORMAL
- en: The left image depicts the robotic arm reaching into an open drawer, where a
    packet of chips is visible. The right image shows the robotic arm having retrieved
    the packet of chips from the drawer. The background includes a counter with various
    items such as condiment bottles and disposable cups. The robotic arm is marked
    with the number 06.
  prefs: []
  type: TYPE_NORMAL
- en: 11.4.3 ChatGPT for robotics
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In contrast to the PaLM-E project, Microsoft’s ChatGPT for Robotics (GPTR) operates
    on a nonmultimodal version of ChatGPT, which does not possess multimodal sensory
    capabilities. Instead, it relies on auxiliary tools to transform environmental
    information into textual descriptions that feed into ChatGPT. The process involves
    crafting prompts that detail task constraints, the weight and size of objects,
    environmental conditions (like avoiding collisions during navigation), the current
    status of the robot and its target, along with examples of how to complete tasks
    (refer to [Fig. 11.5](#f0030)).
  prefs: []
  type: TYPE_NORMAL
- en: '![A diagram showing how robots can be controlled through interaction with language
    models using high-level language commands.](../images/F000114f11-05-9780443274367.jpg)'
  prefs: []
  type: TYPE_IMG
- en: '[Figure 11.5](#Bf0030) Controlling robots through high-level language commands
    interacting with language models.'
  prefs: []
  type: TYPE_NORMAL
- en: 'The process starts with Prompt, APIs plus Objective which is connected to LLM.
    From LLM, there are two arrows: one leading to Deployment Improvements and another
    leading to Any task, any robot. Any task, any robot is connected to three tasks:
    Check Shelves, Arrange colored blocks into the Microsoft logo and Go to the kitchen
    and find a place to heat up lunch.'
  prefs: []
  type: TYPE_NORMAL
- en: Moreover, the process of breaking down tasks and making decisions in ChatGPT
    requires managing the robot through textual commands. This demands the encapsulation
    of the robot’s basic action libraries and descriptions of these functions. With
    the right prompts in place, ChatGPT is capable of generating the necessary code
    to accomplish targeted tasks, thereby enabling the control of robotic actions
    through its foundational action libraries.
  prefs: []
  type: TYPE_NORMAL
- en: GPTR stands out as a cost-effective embodied intelligence solution primarily
    because it eliminates the need for task-specific fine-tuning of LLMs. Leveraging
    a broad existing knowledge base and sophisticated reasoning abilities, GPTR can
    directly produce code that controls robots, dramatically cutting down the time
    and cost usually required for traditional programming.
  prefs: []
  type: TYPE_NORMAL
- en: In conventional robotic programming, each task demands the creation of bespoke
    control algorithms—a process that’s both time-intensive and reliant on highly
    skilled engineers. However, GPTR circumvents these hurdles by utilizing a pretrained
    LLM to swiftly generate effective control code. In doing so, the LLM taps into
    a wide array of knowledge it has gathered during training, encompassing programming
    tactics, algorithm design, and optimization techniques, to tackle specific challenges
    in robotic tasks.
  prefs: []
  type: TYPE_NORMAL
- en: '[Fig. 11.6](#f0035) effectively outlines the four crucial steps GPTR follows
    to perform tasks under diverse conditions: Initially, it involves encapsulating
    the functions of the library used to control robotic actions, including movements,
    stops, and acquiring target location data. Following this, a prompt is constructed
    that encompasses the task and environmental descriptions along with the library
    functions. Subsequently, a simulation run is conducted, ensuring continuous interaction
    with ChatGPT to guarantee the task’s objectives are met. Ultimately, the code
    is deployed directly onto the machinery.'
  prefs: []
  type: TYPE_NORMAL
- en: '![Four steps to perform tasks using GPTR: define a task-relevant robot API
    library, build prompt following engineering principles, iterate on solution quality
    and safety and execute.](../images/F000114f11-06-9780443274367.jpg)'
  prefs: []
  type: TYPE_IMG
- en: '[Figure 11.6](#Bf0035) Four steps of task execution in ChatGPT for robotics.
    Image source: Paper “ChatGPT for Robotics: Design Principles and Model Abilities”.'
  prefs: []
  type: TYPE_NORMAL
- en: 'It outlines the four crucial steps GPTR follows to perform tasks under diverse
    conditions: Initially, it involves encapsulating the functions of the library
    used to control robotic actions, including movements, stops and acquiring target
    location data. The steps are as follows: 1\. Define a task-relevant robot API
    library. An example is given where a person wants a robot to cook an omelet and
    serve it to their grandpa. The API functions include locateobject, movetolocation,
    cookitem and grab_object. APIs should be easily implementable on the robot and
    have descriptive text names for the LLM. They can be chained together to form
    more complex functions. 2\. Build prompt following engineering principles. The
    prompt should consider the robot''s goal and the functions available. An example
    prompt is provided for a home assistant robot to prepare an omelet for an elderly
    person. 3\. User on the loop: iterate on solution quality and safety. This involves
    using prompt and dialogue with ChatGPT, running simulations and evaluating and
    improving the solution. 4\. Execute! The final step is to execute the task using
    the robot.'
  prefs: []
  type: TYPE_NORMAL
- en: 'GPTR is adept at handling three distinct types of tasks: The primary task type
    is zero-shot task planning, where it formulates plans for new tasks without prior
    specific knowledge. For instance, as depicted in [Fig. 11.7](#f0040), in drone
    inspections, ChatGPT adeptly interprets user intent from inputs, devising viable
    inspection strategies and patrol routes for drones. This enables even nontechnical
    users to oversee drone operations effectively.'
  prefs: []
  type: TYPE_NORMAL
- en: '![Two images showing a wind turbine and a drone from different perspectives.](../images/F000114f11-07-9780443274367.jpg)'
  prefs: []
  type: TYPE_IMG
- en: '[Figure 11.7](#Bf0040) Example of zero-shot task planning for drone inspection.'
  prefs: []
  type: TYPE_NORMAL
- en: The left section shows a close-up view from the base of the wind turbine looking
    up towards the rotor hub and blades, with a drone flying nearby. In the inset
    at the bottom left corner, there is a shadow of the wind turbine on the ground.
    The right section shows the wind turbine from a distance with a drone flying closer
    to the viewer. The inset at the bottom right corner shows a side view of the wind
    turbine blade. Both sections have a backdrop of a coastline and ocean.
  prefs: []
  type: TYPE_NORMAL
- en: Furthermore, ChatGPT acts as a natural language interface between users and
    robots, making it straightforward for nontechnical individuals to interact with
    robots and steer them through complex tasks. Yet, in real-world scenarios, robots
    must manage ever-evolving environmental data and tackle uncertainties. Thus, LLMs
    like GPTR often require integration with other AI technologies, such as reinforcement
    learning or computer vision, to foster robust and reliable embodied intelligence.
  prefs: []
  type: TYPE_NORMAL
- en: The second category encompasses complex tasks facilitated by interactive dialog.
    These tasks require ongoing interactions between the robot and the user to meet
    sophisticated objectives. Such engagements foster intricate control patterns,
    allowing ChatGPT to assimilate and amalgamate simple control schemes to tackle
    bigger, more intricate tasks. Moreover, ChatGPT can translate high-level semantic
    demands for generating control code into actionable, low-level coding tasks, simplifying
    interactions for nontechnical users.
  prefs: []
  type: TYPE_NORMAL
- en: As illustrated in [Fig. 11.8](#f0045), consider a nontechnical user directing
    ChatGPT to devise a goal achievement and obstacle avoidance algorithm for a drone
    equipped with a forward distance sensor. While ChatGPT can compose most parts
    of the obstacle avoidance algorithm, it still needs user input on the drone’s
    direction to pinpoint any overlooked steps. Despite feedback being in high-level
    semantic text, ChatGPT can make targeted code adjustments to refine its solution.
    These instances highlight how ChatGPT progressively refines its solutions through
    interactive dialogs, thus enhancing performance in complex scenarios. This method
    is particularly advantageous for nontechnical users, who can guide ChatGPT using
    natural language without delving into the technical specifics. Nevertheless, to
    ensure precise comprehension and adjustments by ChatGPT, users must offer distinct
    and detailed feedback. Sometimes, iterating on ChatGPT’s improvements might be
    necessary to reach optimal outcomes.
  prefs: []
  type: TYPE_NORMAL
- en: '![A drone flying through an obstacle course with various structures and a green
    target in the distance.](../images/F000114f11-08-9780443274367.jpg)'
  prefs: []
  type: TYPE_IMG
- en: '[Figure 11.8](#Bf0045) Drone obstacle avoidance task.'
  prefs: []
  type: TYPE_NORMAL
- en: The course consists of various metal structures, resembling scaffolding, arranged
    in a pattern. In the background, there is a green square target visible in the
    distance, which appears to be the drone's destination. The environment suggests
    an open field with a clear sky and the shadow of a tower is cast on the ground,
    indicating the presence of a light source in the simulation. The drone is equipped
    with four rotors and is in flight, navigating through the obstacles. There are
    no people or other discernible objects in the image.
  prefs: []
  type: TYPE_NORMAL
- en: The third task type involves the perception-action feedback loop, requiring
    robots to initiate a series of actions based on their environmental perceptions.
    ChatGPT’s abilities in this domain can be gauged from two distinct angles.
  prefs: []
  type: TYPE_NORMAL
- en: Initially, consider how ChatGPT employs API libraries to establish a perception-action
    feedback loop. In its code outputs, ChatGPT precisely utilizes perception functionalities
    such as image capture and object detection to gather essential navigation and
    control information for robots. This showcases ChatGPT’s prowess in handling visual
    perception data, ensuring efficient navigation and operation in unfamiliar settings.
  prefs: []
  type: TYPE_NORMAL
- en: Furthermore, assess ChatGPT’s capability to create a sustainable perception-action
    feedback loop. For this exploration, researchers continuously feed perception
    information into the model via text dialogs, first translating environmental data
    into text before submitting it to ChatGPT. This process reveals that ChatGPT can
    interpret these data and craft appropriate actions based on them, illustrating
    its adeptness at translating sensory inputs into actionable responses.
  prefs: []
  type: TYPE_NORMAL
- en: In a recent experiment involving the perception-action feedback loop, ChatGPT
    was equipped with a computer vision model, part of its functional toolkit, to
    aid in exploring and navigating toward a user-specified object in unfamiliar environments.
    Utilizing an object detection API with YOLOv8 backend, it identified object boundaries,
    while ChatGPT was responsible for generating navigation code, estimating objects’
    relative angles for approach. When supplemented with depth sensor data, ChatGPT
    could further refine its algorithm, showcasing its modular adaptability.
  prefs: []
  type: TYPE_NORMAL
- en: As illustrated in [Fig. 11.9](#f0050), the setting was constructed using the
    Habitat simulator, directing the agent to a designated interest area. This setup
    tested ChatGPT’s role in a perception-action feedback loop through dialog-based
    interactions. Environmental perception data—descriptions of visible objects in
    polar coordinates—was fed into ChatGPT via textual dialog. ChatGPT’s responses
    were confined to movement distances and turning angles, which the agent executed,
    producing fresh environmental data in the process.
  prefs: []
  type: TYPE_NORMAL
- en: '![A simulated indoor environment with a command prompt log and object detection
    boxes.](../images/F000114f11-09-9780443274367.jpg)'
  prefs: []
  type: TYPE_IMG
- en: '[Figure 11.9](#Bf0050) Example of the perception-action feedback loop in ChatGPT.'
  prefs: []
  type: TYPE_NORMAL
- en: The image displays a simulated indoor setting resembling a living room with
    a couch, coffee tables and decorative items. In the foreground, there is a command
    prompt window with multiple lines of text indicating an action Moving towards
    couch followed by varying distances in centimeters. The background shows a larger
    view of the simulated room and in the top right corner, there is a smaller inset
    image with colored boxes around objects such as a potted plant, dining table and
    couch, likely representing object detection within the simulation environment.
  prefs: []
  type: TYPE_NORMAL
- en: The trial confirmed the model’s capability to handle straightforward navigation
    tasks. However, it also highlighted the need for further research into how to
    precisely depict environmental scenes in text or vector formats for more intricate
    tasks and settings.
  prefs: []
  type: TYPE_NORMAL
- en: To summarize, the perception-action feedback loop task compels the robot to
    devise a series of actions driven by its environmental perceptions. Continual
    input of this environmental data into ChatGPT, coupled with monitoring of its
    outputs, reveals that the model adeptly interprets observational data and formulates
    suitable actions accordingly. These findings demonstrate ChatGPT’s potential as
    a control system within a perception-action feedback loop, facilitating effective
    navigation in complex environments.
  prefs: []
  type: TYPE_NORMAL
- en: In real-world applications, identifying more effective methods to contextualize
    scenes is crucial to enhance the model’s environmental comprehension. Moreover,
    research must continue into optimizing the efficiency and simplicity with which
    sensory information is fed into the model. Practical scenarios may also bring
    additional challenges, including computational resource constraints, the model’s
    real-time performance, and safety and reliability concerns.
  prefs: []
  type: TYPE_NORMAL
- en: Presently, initiatives like Microsoft’s GPTR and Google’s PaLM-E highlight the
    potential influence of LLMs in robotics. Despite their limitations in reasoning
    and task breakdown, such as the granularity of specialized robotic APIs for particular
    tasks, GPTR relies on manually curated prior knowledge to compile action primitives
    into skill libraries, leading to issues in design granularity and overlooking
    safety in real-world environments. Nonetheless, leveraging LLMs for embodied intelligence
    could significantly boost existing productivity, marking this as a field of substantial
    commercial promise.
  prefs: []
  type: TYPE_NORMAL
- en: 11.5 Summary
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: With the unveiling of GPT-4 and the ongoing development of GPT-5, AI is progressing
    into a groundbreaking new phase. Future iterations of the GPT series are expected
    to push the boundaries of knowledge-intensive tasks, utilizing even larger scales
    of multimodal data and increasingly complex models. Despite these advancements,
    current LLMs exhibit limitations, particularly in complex reasoning tasks. For
    instance, their ability to process simple character copy reasoning or arithmetic
    diminishes significantly with longer strings or numbers. Moreover, their capacity
    for intricate behavior planning remains somewhat underdeveloped. Yet, as the scale
    of these models increases, they start to exhibit predictable scale-dependent behaviors.
  prefs: []
  type: TYPE_NORMAL
- en: 'This situation prompts two crucial inquiries: To what extent can scaling up
    LLMs address these challenges? And considering the emergent capabilities of these
    models, what unforeseen abilities might develop with further increases in scale
    and more diverse multimodal data integration? While there are critiques of the
    GPT research direction, the abilities displayed by GPT-4—from understanding across
    various modalities and domains to its potential in intelligent agency and task
    planning in robotics—signal the dawn of a new era in general AI. The future has
    arrived, and embracing it is our only option.'
  prefs: []
  type: TYPE_NORMAL
