- en: '**4\. Prompting Techniques**'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: You can ask AI almost anything. One thing makes the difference. What and how
    you ask is what and how you get. In the early days of computer programming, the
    expression describing the relation between the quality of the program and what
    you get was "garbage in, garbage out." The meaning is that the computers' output
    is limited to their input. Nowadays, it is valid for AI prompting.
  prefs: []
  type: TYPE_NORMAL
- en: Ranking prompting techniques by importance and usability can be subjective and
    context-dependent. Different approaches may prove more useful depending on the
    complexity of the task and the desired outcome^([1](#footnote-12123-1)). Typically
    experiencing, users find out which techniques work best for their specific needs.
  prefs: []
  type: TYPE_NORMAL
- en: 'Below are a few fundamental techniques to improve our interaction with AI.
    The effectiveness of each of them can vary greatly depending on each situation.
    The most basic and widely used ones—listed below—are not discussed in detail:'
  prefs: []
  type: TYPE_NORMAL
- en: – Natural Language Prompting, simply asking the model a question as you would
    to a human,
  prefs: []
  type: TYPE_NORMAL
- en: – Iterative Prompting, back-and-forth interactions for incremental clarification,
  prefs: []
  type: TYPE_NORMAL
- en: – Corrective Prompting, providing the model with feedback and asking it to correct
    itself,
  prefs: []
  type: TYPE_NORMAL
- en: – Analogical Prompting, asking AI to think by analogy. It can be helpful for
    creative problem-solving and tasks requiring knowledge transfer.
  prefs: []
  type: TYPE_NORMAL
- en: As AI technology evolves, new prompting techniques may emerge, or the existing
    ones may gain or lose relevance.
  prefs: []
  type: TYPE_NORMAL
- en: '**4.1 One-Shot Prompting**'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Zero-shot and Few-shot prompts describe the interactions in which we provide
    the model with no example (Zero-shot) or a few examples (Few-shot) to guide the
    model on the new task.
  prefs: []
  type: TYPE_NORMAL
- en: One-shot prompting means crafting one concise prompt with clear instructions,
    context, and specific details. The model generates a response based solely on
    this one prompt.
  prefs: []
  type: TYPE_NORMAL
- en: The One-shot prompting goal is to craft concise, effective prompts to maximize
    the information extracted from a single interaction.
  prefs: []
  type: TYPE_NORMAL
- en: One-shot prompting is useful when you have a specific goal in mind, without
    any need for extended conversations. We have already used it so many times in
    this book. The results are as good as the prompt, so focus on crafting good prompts.
  prefs: []
  type: TYPE_NORMAL
- en: '**Benefits:**'
  prefs: []
  type: TYPE_NORMAL
- en: – Obtaining desired information or responses in a single interaction.
  prefs: []
  type: TYPE_NORMAL
- en: – Saving time (One-shot prompting streamlines the interaction).
  prefs: []
  type: TYPE_NORMAL
- en: – Allowing ChatGPT to draw connections across large bodies of text.
  prefs: []
  type: TYPE_NORMAL
- en: By refining prompt composition based on empirical findings, you can enhance
    the quality and relevance of the model's responses. It is a dynamic strategy that
    involves a deep understanding of both the language model's capabilities and the
    art of prompt construction.
  prefs: []
  type: TYPE_NORMAL
- en: '**Challenges:**'
  prefs: []
  type: TYPE_NORMAL
- en: – Crafting a comprehensive prompt within the constraints of the prompt length
    can be challenging, especially for complex tasks.
  prefs: []
  type: TYPE_NORMAL
- en: – Balancing the amount of context provided in the prompt while keeping it concise
    requires practice.
  prefs: []
  type: TYPE_NORMAL
- en: '**Use Cases:**'
  prefs: []
  type: TYPE_NORMAL
- en: '– Quick Information Retrieval: When you need a specific piece of information
    or a direct answer, One-shot prompting can provide immediate results.'
  prefs: []
  type: TYPE_NORMAL
- en: '– Simple Queries: When you have straightforward queries or instructions, One-shot
    prompting eliminates the need for long conversations.'
  prefs: []
  type: TYPE_NORMAL
- en: '– Specific Tasks: Tasks with clear parameters and well-defined goals can often
    be solved effectively using One-shot prompting.'
  prefs: []
  type: TYPE_NORMAL
- en: '– Task Summaries: When you want the model to summarize a topic, a well-crafted
    one-shot prompt can yield concise and relevant summaries.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Empirical Findings**'
  prefs: []
  type: TYPE_NORMAL
- en: – The wording of instructions significantly influences the quality of the model's
    response. Choose words that precisely convey your intent, avoiding ambiguity.
  prefs: []
  type: TYPE_NORMAL
- en: – The order of the instructions plays a pivotal role. Experiment with different
    instruction sequences to understand how they affect the model's interpretation
    and response.
  prefs: []
  type: TYPE_NORMAL
- en: – Models are sensitive to the context, but overloading them with context may
    lead to confusion.
  prefs: []
  type: TYPE_NORMAL
- en: – Demonstrations can be helpful, but models sometimes misinterpret demonstrations.
  prefs: []
  type: TYPE_NORMAL
- en: – Reuse the same context for multiple prompts and then average the results.
    The method can mitigate the effects of context variation on the model's responses.
  prefs: []
  type: TYPE_NORMAL
- en: '**4.2 Chain-of-Thought Prompting (CoT)**'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Chain-of-thought prompting is an advanced technique for complex problems requiring
    logical reasoning or step-by-step explanations. The goal is to promote more transparency
    in AI's thought process.
  prefs: []
  type: TYPE_NORMAL
- en: This technique involves creating a continuous and evolving conversation by chaining
    a sequence of prompts and responses. Each subsequent prompt is informed by the
    model's previous response, leading to a coherent and contextually rich conversation.
  prefs: []
  type: TYPE_NORMAL
- en: CoT is a powerful technique that leverages the model's previous responses to
    create dynamic and evolving conversations. This technique enhances the naturalness
    and richness of interactions with language models.
  prefs: []
  type: TYPE_NORMAL
- en: The process begins with an initial prompt that sets the context or topic for
    the conversation. This prompt can be a question, instruction, or statement that
    initiates the interaction.
  prefs: []
  type: TYPE_NORMAL
- en: The language model generates a reply based on the initial prompt. This reply
    becomes the foundation for the following prompt in the sequence. The subsequent
    prompts reference the model response, and the conversation builds upon earlier
    interaction, ensuring that responses align with the established context.
  prefs: []
  type: TYPE_NORMAL
- en: As the CoT continues, the interaction evolves naturally. The model's replies
    are shaped by its previous outputs, leading to a dynamic and engaging conversation
    that feels more human-like.
  prefs: []
  type: TYPE_NORMAL
- en: '**Benefits:**'
  prefs: []
  type: TYPE_NORMAL
- en: – The conversations flow naturally, mirroring human interactions.
  prefs: []
  type: TYPE_NORMAL
- en: – The technique allows for the gradual development of complex topics, enabling
    the model to provide nuanced insights.
  prefs: []
  type: TYPE_NORMAL
- en: – CoT is efficient for exploring multifaceted topics or brainstorming ideas.
  prefs: []
  type: TYPE_NORMAL
- en: – Since each prompt references the previous response, there is a reduction in
    repetitive statements.
  prefs: []
  type: TYPE_NORMAL
- en: '**Challenges:**'
  prefs: []
  type: TYPE_NORMAL
- en: – While the technique enhances context, the model may occasionally misinterpret
    the evolving context.
  prefs: []
  type: TYPE_NORMAL
- en: – Over multiple interactions, the length of responses can accumulate and may
    require limiting the model's verbosity.
  prefs: []
  type: TYPE_NORMAL
- en: – The model might get stuck in a loop, repeatedly referring to the same context.
  prefs: []
  type: TYPE_NORMAL
- en: '**Use Cases:**'
  prefs: []
  type: TYPE_NORMAL
- en: – To explore a topic from various angles, generating diverse insights.
  prefs: []
  type: TYPE_NORMAL
- en: – (E.g., for writers) to collaboratively brainstorm and develop plotlines, characters,
    and story arcs.
  prefs: []
  type: TYPE_NORMAL
- en: – To brainstorm solutions to complex problems, iteratively refining ideas.
  prefs: []
  type: TYPE_NORMAL
- en: – To seek creative ideas and innovative suggestions by building on previous
    model responses.
  prefs: []
  type: TYPE_NORMAL
- en: '**4.3 Tree-of-Thought Prompting (ToT)**'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The Tree-of-thought prompting is similar to CoT but with a focus on branching
    paths. Just as a tree branches out in various directions, this approach enables
    you to guide the conversation down different paths, each stemming from the initial
    prompt. It involves posing follow-up questions or prompts based on the model's
    responses, creating a dynamic and multifaceted exchange.
  prefs: []
  type: TYPE_NORMAL
- en: To visualize the technique, imagine a prompt about hobbies. It leads to different
    branches of the conversation. Each one delves deeper into one of the mentioned
    hobbies.
  prefs: []
  type: TYPE_NORMAL
- en: ToT is useful especially when discussing complex subjects with multiple possible
    outcomes or in a decisional process. ToT creates multi-layered conversations that
    branch into various paths within a single interaction with ChatGPT.
  prefs: []
  type: TYPE_NORMAL
- en: The ToT technique requires good skills in maintaining the coherence and context
    of the conversation.
  prefs: []
  type: TYPE_NORMAL
- en: '**Benefits:**'
  prefs: []
  type: TYPE_NORMAL
- en: – ToT allows for in-depth exploration of a topic. Branching into different facets,
    you can extract insights, ideas, and perspectives.
  prefs: []
  type: TYPE_NORMAL
- en: – This technique leads to more diversity as the model delves into various facets
    of the topic.
  prefs: []
  type: TYPE_NORMAL
- en: – The branching nature of the conversation keeps the interaction engaging and
    adaptable, catering to evolving thoughts and questions.
  prefs: []
  type: TYPE_NORMAL
- en: – Through follow-up prompts, you can guide the model to learn progressively
    about a specific domain or subject matter.
  prefs: []
  type: TYPE_NORMAL
- en: '**Challenges:**'
  prefs: []
  type: TYPE_NORMAL
- en: – As the conversation branches out, ensuring coherence and relevance across
    different threads may become increasingly difficult, potentially resulting in
    fragmented responses.
  prefs: []
  type: TYPE_NORMAL
- en: – Striking a balance between exploring multiple threads and maintaining a coherent
    flow of conversation can be challenging.
  prefs: []
  type: TYPE_NORMAL
- en: – Models may struggle to seamlessly transition between different branches of
    thought if the context is not maintained clear.
  prefs: []
  type: TYPE_NORMAL
- en: '**Use Cases:**'
  prefs: []
  type: TYPE_NORMAL
- en: – Ideal to conduct in-depth interviews with a model, allowing you to follow
    up various aspects of a person's life, career, or experiences.
  prefs: []
  type: TYPE_NORMAL
- en: – (For brainstorming ideas) to explore different angles and variations using
    branching prompts to stimulate creativity.
  prefs: []
  type: TYPE_NORMAL
- en: – To dissect complex problems, breaking them into smaller components, analyzing
    each aspect separately.
  prefs: []
  type: TYPE_NORMAL
- en: '**4.4 Continuity Prompting**'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Continuity prompting is a vital technique for rich conversations over several
    sessions as the underlying architecture processes each new session independently
    without memory of previous sessions. Continuity prompting involves crafting prompts
    that reference former sessions in conversations. When re-starting the conversation,
    input the prompt to refresh ChatGPT's memory.
  prefs: []
  type: TYPE_NORMAL
- en: 'To ensure continuity, users would summarize or reference important details
    from earlier interactions at the beginning of a new session. The reference can
    include:'
  prefs: []
  type: TYPE_NORMAL
- en: – Summarizing the previous conversation's outcomes
  prefs: []
  type: TYPE_NORMAL
- en: – Listing relevant facts, decisions, or action items
  prefs: []
  type: TYPE_NORMAL
- en: – Highlighting any important unsolved questions or tasks.
  prefs: []
  type: TYPE_NORMAL
- en: By incorporating these elements into the initial prompts of a new session, users
    effectively "remind" AI the previous context, helping maintain a coherent and
    relevant dialogue flow. As language models become more sophisticated, they may
    develop longer-term memory capabilities, which can make continuity prompting less
    relevant.
  prefs: []
  type: TYPE_NORMAL
- en: '**Benefits:**'
  prefs: []
  type: TYPE_NORMAL
- en: – Contextual continuity prevents disjointed and fragmented interactions.
  prefs: []
  type: TYPE_NORMAL
- en: – Continuity prompts encourage the model to provide deeper insights and more
    thoughtful responses.
  prefs: []
  type: TYPE_NORMAL
- en: – The model remembers user preferences, choices, or details from previous prompts.
  prefs: []
  type: TYPE_NORMAL
- en: '**Challenges:**'
  prefs: []
  type: TYPE_NORMAL
- en: – There is a limit to how much information models can remember. (Remember Context
    Window)
  prefs: []
  type: TYPE_NORMAL
- en: – When the conversation includes multiple threads, the continuity prompt can
    be challenging.
  prefs: []
  type: TYPE_NORMAL
- en: – Balancing the inclusion of context with natural language flow can be tricky,
    as overly repetitive references can disrupt the conversational rhythm.
  prefs: []
  type: TYPE_NORMAL
- en: '**Use Cases:**'
  prefs: []
  type: TYPE_NORMAL
- en: – Tasks related to learning skills or subjects; maintaining contextual continuity
    allows building upon prior lessons and discussions, enhancing the learning experience.
  prefs: []
  type: TYPE_NORMAL
- en: – Interactive stories; when creating interactive stories or narratives, continuity
    ensures that characters and events remain consistent throughout the conversation.
  prefs: []
  type: TYPE_NORMAL
- en: – Multiple-step tasks; maintaining context helps the personal assistants to
    provide relevant and accurate information.
  prefs: []
  type: TYPE_NORMAL
- en: '**4.5 Chain-of-Density Prompting (CoD)**'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Chain-of-density prompting is a nuanced prompting technique designed to refine
    information processed by AI, producing increasingly dense and concise summaries.
    It is not widely recognized in standard the AI's prompting methodologies, but
    stands out for its unique approach to enhance content richness without expanding
    length.
  prefs: []
  type: TYPE_NORMAL
- en: In CoD, AI progressively incorporates more complex and substantial information
    – 'densifying' the content – while adhering to a strict word limit. This method
    involves starting with a basic summary and, through iterative prompting, adding
    significant entities from the source material. The challenge is to act without
    increasing the overall summary length, compressing more information.
  prefs: []
  type: TYPE_NORMAL
- en: The technique is particularly effective for generating summaries where each
    iteration demands greater detail and specificity, encouraging AI to prioritize
    information efficiently.
  prefs: []
  type: TYPE_NORMAL
- en: '**Benefits:**'
  prefs: []
  type: TYPE_NORMAL
- en: – CoD fosters the ability to communicate more information in fewer words, maintaining
    brevity and relevance.
  prefs: []
  type: TYPE_NORMAL
- en: – It ensures essential entities and concepts, enhancing the summary.
  prefs: []
  type: TYPE_NORMAL
- en: – Refining summaries iteratively, AI's outputs become more precise.
  prefs: []
  type: TYPE_NORMAL
- en: '**Challenges:**'
  prefs: []
  type: TYPE_NORMAL
- en: – Balancing the introduction of new entities while maintaining summary length
    requires skillful prompt crafting.
  prefs: []
  type: TYPE_NORMAL
- en: – There is a potential risk of oversimplifying complex information to meet the
    word count constraint.
  prefs: []
  type: TYPE_NORMAL
- en: – Ensuring that the summary remains coherent and contextually accurate while
    adding density can be challenging.
  prefs: []
  type: TYPE_NORMAL
- en: '**Use Cases:**'
  prefs: []
  type: TYPE_NORMAL
- en: – To assist students and researchers in creating summaries of complex academic
    texts.
  prefs: []
  type: TYPE_NORMAL
- en: – To produce high-density informative content without verbosity.
  prefs: []
  type: TYPE_NORMAL
- en: – (In data-heavy fields) to summarize reports by focusing on the most significant
    data points.
  prefs: []
  type: TYPE_NORMAL
- en: '**Example Framework:**'
  prefs: []
  type: TYPE_NORMAL
- en: 'Initial Prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: 'TASK:'
  prefs: []
  type: TYPE_NORMAL
- en: '*Write a summary of the following text, not exceeding 100 words. "[TEXT]"*'
  prefs: []
  type: TYPE_NORMAL
- en: 'CoD Process:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 1:'
  prefs: []
  type: TYPE_NORMAL
- en: '*Learn what constitutes a ''New Entity'' within the provided TEXT.*'
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 2:'
  prefs: []
  type: TYPE_NORMAL
- en: '*Identify one ''New Entity'' absent from the existing summary.*'
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 3:'
  prefs: []
  type: TYPE_NORMAL
- en: '*Compose an improved summary incorporating all entities from the previous version
    plus the ''New Entity.''*'
  prefs: []
  type: TYPE_NORMAL
- en: 'Cycle:'
  prefs: []
  type: TYPE_NORMAL
- en: '*Repeat the cycle ten times to enhance entity density.*'
  prefs: []
  type: TYPE_NORMAL
- en: 'Guidelines:'
  prefs: []
  type: TYPE_NORMAL
- en: '*To maintain the word limit, utilize contractions, eliminate superfluous language,
    and continuously refine the summary for flow and clarity.*'
  prefs: []
  type: TYPE_NORMAL
- en: '**4.6 Skeleton-of-Thought Prompting (SoT)**'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The Skeleton-of-thought approach structures prompts to outline the 'bones' or
    essential elements of reasoning before fleshing out the details. It is like building
    the frame of a house before you add the walls and roof. This technique allows
    you to construct a clear and logical framework for the conversation, setting a
    foundation for detailed exploration.
  prefs: []
  type: TYPE_NORMAL
- en: Imagine a prompt asking for a plan to start a small business. SoT would lay
    out the foundational steps before delving into the intricacies of each step.
  prefs: []
  type: TYPE_NORMAL
- en: SoT is particularly beneficial when addressing multifaceted issues or concepts
    that require a solid foundational understanding before moving into complex territory.
    It helps in creating a structured and comprehensive discourse with ChatGPT.
  prefs: []
  type: TYPE_NORMAL
- en: The SoT technique is valuable for its organizational benefits and clarity for
    complex conversations.
  prefs: []
  type: TYPE_NORMAL
- en: '**Benefits:**'
  prefs: []
  type: TYPE_NORMAL
- en: – To establish a clear base to build upon, ensuring that complex information
    is well-organized.
  prefs: []
  type: TYPE_NORMAL
- en: – To promote clarity and a better understanding of the conversation's direction.
  prefs: []
  type: TYPE_NORMAL
- en: – To foster a logical flow of information.
  prefs: []
  type: TYPE_NORMAL
- en: – After establishing the skeleton, the discussion can go into detail in a focused
    manner, directly addressing each point.
  prefs: []
  type: TYPE_NORMAL
- en: '**Challenges:**'
  prefs: []
  type: TYPE_NORMAL
- en: – Starting with an overly simplified outline, it can omit crucial nuances for
    understanding complex issues.
  prefs: []
  type: TYPE_NORMAL
- en: – The structured nature of SoT may limit the fluidity of conversation, making
    it less dynamic.
  prefs: []
  type: TYPE_NORMAL
- en: – Ensuring that the expansion of details remains tied to the original outline
    can be more difficult as the conversation progresses.
  prefs: []
  type: TYPE_NORMAL
- en: '**Use Cases:**'
  prefs: []
  type: TYPE_NORMAL
- en: – To teach concepts in a structured manner, laying out the basics before moving
    into complexities.
  prefs: []
  type: TYPE_NORMAL
- en: – To devise strategies, providing a clear plan with established preliminary
    steps.
  prefs: []
  type: TYPE_NORMAL
- en: – (For writers and content creators) to outline articles or stories before fleshing
    them out.
  prefs: []
  type: TYPE_NORMAL
- en: – (In research) to outline a study's methodology before detailing the specific
    procedures and tests.
  prefs: []
  type: TYPE_NORMAL
- en: The technique proves to be effective in scenarios requiring structured output
    from AI.
  prefs: []
  type: TYPE_NORMAL
- en: 'Example:'
  prefs: []
  type: TYPE_NORMAL
- en: 'TASK:'
  prefs: []
  type: TYPE_NORMAL
- en: '*Write a keynote about Global Warming.*'
  prefs: []
  type: TYPE_NORMAL
- en: 'TASK GUIDELINES: (Skeleton)'
  prefs: []
  type: TYPE_NORMAL
- en: '*The main causes of global warming: carbon dioxide emissions, methane, deforestation,
    loss of natural carbon sinks, land usage, human behavior, industrialization.*'
  prefs: []
  type: TYPE_NORMAL
