    ****all**o**wi**ng** ****i****t**** ****t****o**** ****b****e**** ****app**l**i**ed**
    ****t****o**** ****a**** ****var**i**e**ty** ****o****f**** ****nat**u**r**al**
    ****lan**g**ua**ge** ****proc**e**ss**ing** ****ta**s**k**s** ****wi****t**h**
    ****min**i**m**al** ****tw**e**a**ks**. ****Alt**h**ou**gh** ****rudi**me**nt**ary**
    ****com**p**ar**ed** ****t****o**** ****i****t**s** ****succ**e**ss**ors**, ****G****P**T**-****1****
    ****w****a**s** ****a**** ****mile**s**to**ne** ****th****a**t** ****la****i**d**
    ****t****h**e** ****grou**n**dw**ork** ****f****o**r** ****wh****a**t** ****w****a**s**
    ****t****o**** ****co****m**e**.'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: '**发布于2018年**，GPT-1是系列中的第一个模型，也是一个强大的**概念**证明。基于1.17亿个参数，GPT-1引入了在大型文本语料库中进行**大规模预训练**的概念，随后通过**微调**针对特定任务。这种方法与传统方法形成对比，传统方法需要为每个任务从零开始训练模型，这使得训练过程缓慢且有限。GPT-1证明了**预训练模型**能够捕捉通用语言模式，允许它被应用于各种自然语言处理任务，只需进行最小调整。虽然与它的继任者相比略显粗糙，但GPT-1是一个里程碑，为即将到来的事物奠定了基础。'
