- en: Next, we will explore how to utilize OpenAI API for coding-related tasks, such
    as generating a Python code implementation based on a function’s signature.
  prefs: []
  type: TYPE_NORMAL
- en: Lab 2.3 – using OpenAI API to generate code
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Now that we have learned how to execute OpenAI API calls and configure various
    parameters, we can use them to create our own basic code completion program. Previously,
    developers could select models such as `code-davinci-002`, which were specifically
    trained for code completion. These models have since been deprecated and now chat
    services can effectively handle code completion tasks.
  prefs: []
  type: TYPE_NORMAL
- en: Routing chat capabilities to code completion
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'In this lab, we will create a code completion program by following five steps:'
  prefs: []
  type: TYPE_NORMAL
- en: Define the input to function signatures only.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Add system prompts to guide the model in generating the complete code.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Wrap the function signature with a specific instruction for the model to complete
    the code.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Get the Chat service response for our request.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Extract only the code from the model’s output to present to the end user.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: These steps demonstrate that applications built on top of LLM models require
    a tailored approach such as using wrapping designs and specific prompts to align
    the model’s output with the business problem at hand. We will cover that in depth
    later in the book.
  prefs: []
  type: TYPE_NORMAL
- en: 'Our starter code consists of all five steps, which we will complete in the
    guided walk-through:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE35]")[1] print(suggested_code) except IndexError: print(output)'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE36]'
  prefs: []
  type: TYPE_PRE
- en: USER_PROMPT="""
  prefs: []
  type: TYPE_NORMAL
- en: 'def print_fibonacci_sequence(n: int) -> None:'
  prefs: []
  type: TYPE_NORMAL
- en: '"""'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE37]'
