- en: Introduction
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 引言
- en: We are living through one of the most transformative moments in human history—the
    rise of artificial intelligence. What was once science fiction is now a daily
    reality. From chatbots that can write like authors to AI artists generating stunning
    visuals, the tools we use are changing rapidly—and so are the skills we need.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 我们正在经历人类历史上最具变革性的时刻之一——人工智能的崛起。曾经是科幻的东西现在已成为日常现实。从能够像作者一样写作的聊天机器人到生成令人惊叹视觉效果的AI艺术家，我们使用的工具正在迅速变化——我们需要的技能也在变化。
- en: This book is your guide through that transformation.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 这本书是你穿越这一变革的指南。
- en: Whether you're a student, entrepreneur, educator, creative, or simply curious
    about how AI works and how to use it effectively, this book is built for you.
    It's not a dry manual filled with technical jargon. It's a comprehensive, practical,
    and empowering roadmap that teaches you not only how to use tools like ChatGPT
    and DALL·E, but how to think in a way that collaborates with artificial intelligence.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 无论你是学生、企业家、教育家、创意人士，还是仅仅对人工智能的工作原理及其有效使用方法感到好奇，这本书都是为了你而编写的。这不是一本充满技术术语的枯燥手册。这是一份全面、实用且赋权的路线图，它不仅教你如何使用ChatGPT和DALL·E等工具，还教你如何以一种与人工智能协作的方式进行思考。
- en: 'You’ll learn how to:'
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 你将学习如何：
- en: Craft prompts that generate meaningful, useful output
  id: totrans-65
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 构建能够生成有意义、有用输出的提示
- en: Understand the “mind” of an AI and interact with it effectively
  id: totrans-66
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 理解人工智能的“思维”并与之有效互动
- en: Create content, solve problems, and enhance your productivity
  id: totrans-67
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 创建内容、解决问题并提高你的生产力
- en: Build and train your own custom GPTs
  id: totrans-68
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 构建和训练你自己的定制 GPT
- en: Apply AI across fields like writing, business, education, design, coding, and
    more
  id: totrans-69
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将人工智能应用于写作、商业、教育、设计、编码等领域
- en: This book is organized to take you from foundational understanding to advanced
    implementation. You’ll start with the basics—what AI is, how it thinks, and how
    to talk to it. Then you’ll dive into intermediate and advanced strategies, use
    cases, and creative applications. Along the way, you’ll get hands-on exercises,
    real-world examples, and inspiration for what’s possible.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 这本书的编排是为了带你从基础理解到高级实施。你将从基础知识开始——什么是人工智能，它是如何思考的，以及如何与之交谈。然后你将深入到中级和高级策略、用例和创意应用。在这个过程中，你将获得动手练习、现实世界案例和可能的灵感。
- en: This book is more than a tutorial—it’s a toolkit for the AI era.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 这本书不仅仅是一个教程——它是人工智能时代的工具包。
- en: Whether you want to write faster, think better, design smarter, or build new
    tools, artificial intelligence can amplify your abilities. But only if you know
    how to use it well.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 无论你想要写得更快、思考得更好、设计得更智能，还是构建新的工具，人工智能都可以放大你的能力。但前提是你知道如何有效地使用它。
- en: So let’s begin.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，让我们开始吧。
- en: 'Part I: Foundations of AI Interaction'
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 第一部分：人工智能交互基础
- en: 'Chapter 1: Welcome to the AI Age'
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 第1章：欢迎来到人工智能时代
- en: We are standing at the edge of a new era—an age not defined by machines replacing
    humans, but by machines amplifying human potential.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 我们正站在一个新时代的边缘——一个不是由机器取代人类，而是由机器放大人类潜能的时代。
- en: Artificial Intelligence (AI) is no longer a distant concept reserved for tech
    labs or sci-fi movies. It’s here. It’s real. And it’s already woven into our daily
    lives—whether we’re asking a virtual assistant for directions, getting personalized
    content recommendations, or collaborating with tools like ChatGPT to write, think,
    and create.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能（AI）不再是仅供科技实验室或科幻电影中的遥远概念。它已经在这里。它是真实的。它已经融入了我们的日常生活中——无论是向虚拟助手询问路线，获取个性化的内容推荐，还是与ChatGPT等工具协作进行写作、思考和创作。
- en: But this is just the beginning.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 但这仅仅是开始。
- en: In this AI age, knowledge alone is no longer power—knowing how to interact with
    knowledge is. That’s where conversational AI, like ChatGPT, becomes a game-changer.
    These tools don’t just answer questions. They engage in complex dialogue, simulate
    roles, generate creative ideas, and even help you think better by becoming your
    cognitive partner.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个人工智能时代，知识本身不再是力量——知道如何与知识互动才是。这就是对话式人工智能，如ChatGPT，成为游戏改变者的地方。这些工具不仅仅是回答问题。它们参与复杂的对话，模拟角色，生成创意想法，甚至通过成为你的认知伙伴来帮助你更好地思考。
- en: 'The New Literacy: AI Fluency'
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 新的读写能力：人工智能流利度
- en: 'Just as the printing press revolutionized access to information, AI is revolutionizing
    our ability to generate, analyze, and apply information. But to thrive in this
    new era, you must develop a new kind of literacy: AI fluency—the ability to communicate,
    prompt, and collaborate with intelligent systems.'
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 正如印刷机革命了信息的获取，人工智能正在改变我们生成、分析和应用信息的能力。但要在这个新时代中蓬勃发展，你必须发展一种新的读写能力：人工智能流利度——与智能系统沟通、提示和协作的能力。
- en: Learning how to “talk” to AI is like learning a new language. At first, it feels
    unfamiliar. But once you master the syntax of prompts, the rhythm of dialogue,
    and the mindset behind effective questioning, a world of creative and intellectual
    power opens up to you.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 学习如何“与”人工智能“交谈”就像学习一门新语言。起初，它感觉不熟悉。但一旦你掌握了提示语的语法、对话的节奏和有效提问背后的思维方式，一个充满创造力和智力力量的世界就会向你敞开。
- en: This Chapter Is Your Launch Pad
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 本章是你的起飞平台
- en: 'In this chapter, you''ll:'
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，你将：
- en: Understand what defines the AI age and why it matters now
  id: totrans-85
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 理解定义人工智能时代的东西以及为什么它现在很重要
- en: Explore how tools like ChatGPT and DALL·E fit into the broader AI landscape
  id: totrans-86
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 探索ChatGPT和DALL·E等工具如何融入更广泛的AI领域
- en: Recognize the shift from passive tool usage to active collaboration with AI
  id: totrans-87
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 认识到从被动使用工具到与人工智能积极协作的转变
- en: Reflect on what AI means for your life, work, and creativity
  id: totrans-88
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 思考人工智能对你生活、工作和创造力的影响
- en: By the end, you’ll no longer see AI as just another tool. You’ll see it as a
    partner, capable of expanding your abilities and unlocking new opportunities.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 到最后，你将不再把人工智能仅仅看作是另一个工具。你会把它看作是一个伙伴，能够扩展你的能力并开启新的机会。
- en: Welcome to the AI age. Your journey begins here.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 欢迎来到人工智能时代。你的旅程从这里开始。
- en: 'Chapter 2: Human-AI Synergy'
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 第二章：人机协同
- en: Working With, Not Against, the Machine
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 与机器合作，而非对抗
- en: 'The fear that AI will replace humans is as old as AI itself. But here’s the
    truth: the most powerful outcomes in the AI age come not from machines alone—but
    from humans and machines working together.'
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能将取代人类的恐惧与人工智能本身一样古老。但事实是：人工智能时代最强大的成果并非来自机器本身——而是来自人类与机器的协作。
- en: This is the era of human-AI synergy, where the strengths of both entities are
    combined to create results neither could achieve on their own.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 这是人机协同的时代，两个实体的优势结合在一起，创造出它们单独无法实现的结果。
- en: What AI Can Do (and What It Can’t)
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能能做什么（以及它不能做什么）
- en: 'AI can:'
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能能：
- en: Analyze vast amounts of data in seconds
  id: totrans-97
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在几秒钟内分析大量数据
- en: Generate human-like language at scale
  id: totrans-98
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 大规模生成类似人类的语言
- en: Learn patterns and adapt responses
  id: totrans-99
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 学习模式并适应回应
- en: Assist in decision-making, ideation, and content creation
  id: totrans-100
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 协助决策、创意和内容创作
- en: 'But AI cannot:'
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 但人工智能不能：
- en: Feel empathy
  id: totrans-102
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 感同身受
- en: Understand nuance beyond its training
  id: totrans-103
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 理解其训练之外的细微差别
- en: Make moral or ethical decisions
  id: totrans-104
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 做出道德或伦理决定
- en: Replace your unique human experience, intuition, and judgment
  id: totrans-105
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 替代你独特的人类经验、直觉和判断
- en: That’s where you come in.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是你的角色所在。
- en: AI as a Thought Partner
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能作为思维伙伴
- en: When used effectively, AI becomes more than a tool—it becomes a thinking companion.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 当被有效使用时，人工智能不仅仅是一个工具——它成为了一个思考伙伴。
- en: 'You can:'
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以：
- en: Use ChatGPT to brainstorm business ideas, write first drafts, or plan lessons
  id: totrans-110
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用ChatGPT来头脑风暴商业想法、撰写初稿或规划课程
- en: Use DALL·E to visualize concepts or design mockups instantly
  id: totrans-111
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用DALL·E来即时可视化概念或设计原型
- en: Build your own GPTs to automate tasks or simulate expert roles
  id: totrans-112
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 创建你自己的GPT来自动化任务或模拟专家角色
- en: But the magic isn’t in the AI alone. It’s in the dialogue—the back-and-forth
    where you refine, guide, and reshape the output until it aligns with your goals.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 但魔法并不仅仅在于人工智能本身。它在于对话——你来我往中你精炼、引导和重塑输出，直到它与你的目标一致。
- en: AI excels when you lead. It follows your intention. The more clarity you bring,
    the more powerful your results.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 当你领导时，人工智能就会出色。它跟随你的意图。你带来的清晰度越多，你的结果就越强大。
- en: 'Collaborative Intelligence: The New Superpower'
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 协作智能：新的超级力量
- en: 'In this chapter, you’ll learn:'
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，你将学习：
- en: How to structure prompts that create collaborative experiences
  id: totrans-117
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如何构建能够创造协作体验的提示语
- en: How to combine your intuition with AI’s pattern recognition
  id: totrans-118
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如何将你的直觉与人工智能的模式识别相结合
- en: Why “good enough” AI output isn't the goal—co-creation is
  id: totrans-119
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为什么“足够好”的人工智能输出不是目标——协作才是
- en: How to shift your mindset from “using AI” to “working with AI”
  id: totrans-120
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如何将你的心态从“使用人工智能”转变为“与人工智能合作”
- en: You + AI = Exponential Capability
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 你 + 人工智能 = 指数级能力
- en: The future isn’t AI replacing you—it’s AI augmenting you. The most successful
    people in this age will be those who know how to think with AI, not in fear of
    it.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 未来不是AI取代你——而是AI增强你。这个时代最成功的人将是那些知道如何与AI思考，而不是害怕它的人。
- en: Collaboration is the new skill.
  id: totrans-123
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 协作是新的技能。
- en: Communication is the interface.
  id: totrans-124
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 交流是界面。
- en: And synergy is the outcome.
  id: totrans-125
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 协同效应是结果。
- en: Let’s explore how to make AI your most powerful creative partner.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们探索如何让AI成为你最有力的创意伙伴。
- en: 'Chapter 3: Setting Up Your Digital Workspace'
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 第三章：设置你的数字工作空间
- en: Before you can dive into mastering AI tools, you need a foundation—a digital
    environment that’s organized, efficient, and optimized for creative flow. Your
    digital workspace is your launchpad for everything you'll create, explore, and
    automate with AI.
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 在你深入掌握AI工具之前，你需要一个基础——一个组织有序、高效且优化创意流程的数字环境。你的数字工作空间是你用AI创建、探索和自动化的起点。
- en: Just like an artist needs a clean studio or a coder needs a well-configured
    IDE, your interaction with AI deserves a workspace that supports focus, experimentation,
    and productivity.
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 就像艺术家需要一个干净的画室或程序员需要一个配置良好的IDE一样，你与AI的互动也值得一个支持专注、实验和效率的工作空间。
- en: Why Your Digital Workspace Matters
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么你的数字工作空间很重要
- en: AI tools are fast and powerful—but that power is wasted if you're bouncing between
    scattered tabs, struggling to track your prompts, or losing brilliant outputs
    in digital clutter.
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: AI工具快速且强大——但如果你在分散的标签页之间跳转、努力追踪你的提示或丢失在数字杂乱中的精彩输出，这种力量就会被浪费。
- en: 'An intentional workspace helps you:'
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 有意的工作空间可以帮助你：
- en: Think more clearly
  id: totrans-133
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 思考更清晰
- en: Iterate faster
  id: totrans-134
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 快速迭代
- en: Keep track of prompt experiments
  id: totrans-135
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 跟踪提示实验
- en: Build a system around your creativity and goals
  id: totrans-136
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 围绕你的创造力和目标建立一个系统
- en: 'Step 1: Choose Your Core AI Tools'
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 第一步：选择你的核心AI工具
- en: 'To start, select your main AI interfaces. Here are the essentials:'
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，选择你的主要AI界面。以下是基本要素：
- en: 'ChatGPT (GPT-4 or later): For conversation, writing, ideation, and automation'
  id: totrans-139
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: ChatGPT（GPT-4或更高版本）：用于对话、写作、创意和自动化
- en: 'DALL·E 3: For generating visual content and design mockups'
  id: totrans-140
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: DALL·E 3：用于生成视觉内容和设计原型
- en: 'Custom GPTs: For personalized assistants and expert simulations'
  id: totrans-141
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 定制GPTs：用于个性化助手和专家模拟
- en: 'Other Tools (optional): Midjourney, Claude, Perplexity, Notion AI, etc.'
  id: totrans-142
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 其他工具（可选）：Midjourney、Claude、Perplexity、Notion AI等
- en: Set up accounts and bookmark your most-used platforms.
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 设置账户并收藏你最常用的平台。
- en: 'Step 2: Create Your AI Project Hub'
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 第二步：创建你的AI项目中心
- en: 'Organize your work in one central location. Use tools like:'
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 在一个中心位置组织你的工作。使用以下工具：
- en: 'Notion, Obsidian, or Evernote: For storing prompts, outputs, ideas, and project
    plans'
  id: totrans-146
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Notion、Obsidian或Evernote：用于存储提示、输出、想法和项目计划
- en: 'Google Docs or OneNote: For writing, drafts, and research logs'
  id: totrans-147
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Google Docs或OneNote：用于写作、草稿和研究日志
- en: 'Folder System (Local or Cloud): For saving exports, visuals, and reference
    material'
  id: totrans-148
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 文件系统（本地或云）：用于保存导出、视觉和参考资料
- en: 'Bonus tip: Create a “Prompt Vault”—a document where you save your best prompts,
    refinements, and templates. This becomes invaluable over time.'
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 奖励提示：创建一个“提示保险库”——一个文档，用于保存你最好的提示、改进和模板。随着时间的推移，这变得非常有价值。
- en: 'Step 3: Organize for Speed & Flow'
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 第三步：为速度和流畅性组织
- en: 'Use folders by theme or goal: (e.g., Writing, Business, Art, Automation)'
  id: totrans-151
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 按主题或目标使用文件夹：（例如，写作、商业、艺术、自动化）
- en: 'Color-code or tag your experiments: Mark what works, what doesn’t, and why'
  id: totrans-152
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对实验进行颜色编码或标记：标记哪些有效，哪些无效，以及原因
- en: 'Name files clearly: Use versions and timestamps so you never lose your progress'
  id: totrans-153
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 清晰命名文件：使用版本和时间戳，以免丢失进度
- en: Use browser extensions like tab groups, session savers, and clipboard managers
  id: totrans-154
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用浏览器扩展，如标签组、会话保存器和剪贴板管理器
- en: 'Step 4: Install Essential Extensions & Add-ons'
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 第四步：安装必要的扩展和附加组件
- en: 'Depending on your browser or platform, consider:'
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 根据你的浏览器或平台，考虑：
- en: ChatGPT Prompt Manager
  id: totrans-157
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: ChatGPT提示管理器
- en: A browser tab manager (Toby, Workona)
  id: totrans-158
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 浏览器标签页管理器（Toby、Workona）
- en: Clipboard history tool (like CopyQ or Paste)
  id: totrans-159
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 剪贴板历史记录工具（如CopyQ或Paste）
- en: Markdown or text formatting tools
  id: totrans-160
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Markdown或文本格式化工具
- en: These will boost your workflow and save time.
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 这些将提高你的工作效率并节省时间。
- en: 'Step 5: Design for Focus'
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 第五步：设计以专注为核心
- en: Use dark mode or minimal layouts to reduce eye fatigue
  id: totrans-163
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用深色模式或最小布局以减少眼睛疲劳
- en: Set distraction blockers during deep AI work
  id: totrans-164
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在深度AI工作时设置干扰屏蔽器
- en: Create a daily or weekly routine for exploring and experimenting with prompts
  id: totrans-165
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为探索和实验提示创建每日或每周的常规
- en: Your Digital Workspace = Your Creative Lab
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 你的数字工作空间 = 你的创意实验室
- en: This isn’t just about being tidy—it’s about creating an environment where your
    ideas and AI's capabilities can work together without friction.
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 这不仅仅关乎整洁——这是在创造一个环境，让您的想法和AI的能力能够无摩擦地协同工作。
- en: 'With your workspace set, you’re ready to dive into the real heart of AI mastery:
    the art of prompting.'
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 当你的工作空间设置完毕，你就可以深入到AI掌握的真正核心：提示的艺术。
- en: 'Chapter 4: What Makes AI Seem Human?'
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 第四章：是什么让AI看起来像人？
- en: 'One of the most fascinating (and sometimes eerie) qualities of modern AI systems
    like ChatGPT is how human they appear to be. They can hold conversations, write
    poetry, debate ideas, and even mimic emotions. But here’s the truth: AI doesn’t
    understand the world the way humans do—it just simulates understanding with remarkable
    skill.'
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 现代AI系统如ChatGPT最令人着迷（有时也令人毛骨悚然）的品质之一是它们看起来多么像人。它们可以进行对话、写诗、辩论观点，甚至模仿情感。但事实是：AI并不以人类的方式理解世界——它只是以非凡的技能模拟理解。
- en: So what exactly gives AI this human-like presence? In this chapter, we’ll uncover
    the mechanics behind that illusion and explore how to harness it for more natural,
    productive interactions.
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，究竟是什么给了AI这种类似人类的在场感？在本章中，我们将揭示这种错觉背后的机制，并探讨如何利用它来实现更自然、更富有成效的互动。
- en: '1\. Language: The Great Equalizer'
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 语言：伟大的平等化者
- en: 'Language is the primary bridge between humans and machines. ChatGPT was trained
    on billions of sentences from books, websites, forums, and other text sources.
    This exposure allows it to:'
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 语言是人类与机器之间的主要桥梁。ChatGPT是在来自书籍、网站、论坛和其他文本来源的数十亿个句子上训练的。这种曝光使它能够：
- en: Recognize sentence structure
  id: totrans-174
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 识别句子结构
- en: Predict the most likely next word in a sentence
  id: totrans-175
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 预测句子中最可能出现的下一个词
- en: Respond in fluent, coherent ways across many tones and topics
  id: totrans-176
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 以流畅、连贯的方式在许多语气和主题上回应
- en: But it’s not thinking or feeling—it’s predicting. Every “thoughtful” response
    is a result of deep pattern matching, not emotion or awareness.
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 但它不是在思考或感受——它在预测。每一个“深思熟虑”的回答都是深度模式匹配的结果，而不是情感或意识。
- en: 2\. Context Awareness (Sort Of)
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 上下文意识（某种程度上）
- en: AI seems human because it can remember the context of your conversation—for
    a while. Within a session, ChatGPT can refer back to your earlier questions, mimic
    your tone, and continue a narrative.
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: AI看起来像人是因为它可以记住你对话的上下文——一段时间。在会话中，ChatGPT可以回溯到你的早期问题，模仿你的语气，并继续叙事。
- en: 'This context simulation makes conversations flow more naturally. However:'
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 这种上下文模拟使对话更加自然。然而：
- en: AI doesn't have memory across sessions (unless explicitly programmed)
  id: totrans-181
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: AI在会话之间没有记忆（除非明确编程）
- en: It doesn't understand meaning—only associations based on training data
  id: totrans-182
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它不理解意义——只有基于训练数据的关联
- en: Still, with good prompts, you can make AI feel like a collaborative, thinking
    partner.
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，通过良好的提示，你可以让AI感觉像是一个协作的、思考的伙伴。
- en: 3\. Empathy Simulation
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 同理心模拟
- en: 'While AI cannot feel, it can simulate empathy by using phrases like:'
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然AI没有感觉，但它可以通过使用诸如：
- en: “That sounds difficult.”
  id: totrans-186
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “这听起来很难。”
- en: “I understand your concern.”
  id: totrans-187
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “我理解你的担忧。”
- en: “Let’s explore that together.”
  id: totrans-188
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “让我们一起探索。”
- en: This is useful in coaching, counseling, or customer support scenarios. It builds
    trust, even though the emotion is algorithmic.
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: 这在指导、咨询或客户支持场景中很有用。尽管情感是算法生成的，但它建立了信任。
- en: 4\. Tone, Style, and Personality
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 语气、风格和个性
- en: ChatGPT can adjust its tone—formal, casual, humorous, motivational—because it's
    seen countless examples of each. You can even give it a “persona” (e.g., a mentor,
    coach, expert, or friend), which makes interactions feel more personal and human.
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT可以调整其语气——正式、随意、幽默、激励——因为它看到了无数个例子。你甚至可以给它一个“角色”（例如，导师、教练、专家或朋友），这使得互动感觉更加个性化和人性化。
- en: This flexibility is one of the reasons AI is such a powerful creative partner.
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: 这种灵活性是AI成为如此强大的创意伙伴的原因之一。
- en: 5\. Turn-Taking and Timing
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 轮流和时机
- en: 'Human conversation follows natural rhythms: we pause, we reflect, we shift
    topics. AI mimics this by:'
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: 人类对话遵循自然节奏：我们暂停，我们反思，我们转换话题。AI通过以下方式模仿：
- en: Using transition phrases
  id: totrans-195
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用过渡短语
- en: Breaking responses into clear sections
  id: totrans-196
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将回答分成清晰的段落
- en: Occasionally asking questions to continue the dialogue
  id: totrans-197
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 时不时地提问以继续对话
- en: These patterns create a sense of “flow,” which tricks our brains into feeling
    like we’re speaking to a sentient being.
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: 这些模式创造了一种“流动”感，这种感觉得以欺骗我们的大脑，让我们感觉我们正在与一个有感知的生物交谈。
- en: 6\. The Illusion of Understanding
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: 6. 理解的错觉
- en: 'AI doesn’t understand—but it often sounds like it does. That’s called the ELIZA
    Effect: when people project human traits onto a machine simply because it uses
    natural language.'
  id: totrans-200
  prefs: []
  type: TYPE_NORMAL
  zh: AI并不理解——但它常常听起来像是在理解。这被称为ELIZA效应：当人们因为机器使用自然语言而将其人类化时。
- en: 'When AI says, “I understand,” it means: I’ve seen enough examples of similar
    language to know this is the expected response.'
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
  zh: 当AI说，“我理解了”，它的意思是：我已经看到了足够多的类似语言的例子，知道这是预期的回应。
- en: Knowing this lets you use AI wisely—appreciating the illusion without being
    misled by it.
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
  zh: 了解这一点让你能够明智地使用AI——欣赏错觉而不被其误导。
- en: Why This Matters
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么这很重要
- en: 'Understanding why AI seems human helps you:'
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
  zh: 理解为什么AI看起来像人类有助于你：
- en: Write more effective, human-like prompts
  id: totrans-205
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 编写更有效、更人性化的提示
- en: Use AI as a sounding board, not a decision-maker
  id: totrans-206
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将AI用作回声板，而不是决策者
- en: Avoid overtrusting the system's knowledge or "opinions"
  id: totrans-207
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 避免过度信任系统的知识或“观点”
- en: Create experiences that feel authentic, yet are ethically grounded
  id: totrans-208
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 创造既真实又有道德基础的经历
- en: 'Humans and Machines: Better Together'
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
  zh: 人类与机器：更好的伙伴
- en: The human-like qualities of AI aren’t a flaw—they’re a feature. They allow us
    to communicate, collaborate, and co-create in ways that feel intuitive and natural.
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: AI的人类化特质不是缺陷——它是特性。它们使我们能够以直观和自然的方式沟通、协作和共创。
- en: 'But always remember: you bring the meaning.'
  id: totrans-211
  prefs: []
  type: TYPE_NORMAL
  zh: 但始终记住：意义是你带来的。
- en: AI brings the patterns.
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
  zh: AI带来了模式。
- en: Use that synergy to amplify your thinking—and never forget which one of you
    is truly conscious.
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
  zh: 利用这种协同作用来增强你的思考——永远不要忘记哪一个是真正有意识的。
- en: 'Chapter 5: The Psychology Behind AI Conversations'
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
  zh: 第五章：AI对话背后的心理学
- en: 'When you interact with AI—especially conversational models like ChatGPT—it
    often feels like you''re speaking with a person. You might even find yourself
    reacting emotionally to its responses: feeling validated, surprised, challenged,
    or comforted.'
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
  zh: 当你与AI互动——尤其是像ChatGPT这样的对话模型——你常常感觉就像是在与人交谈。你甚至可能会发现自己对它的回应产生情感反应：感到被证实、惊讶、挑战或安慰。
- en: Why does this happen?
  id: totrans-216
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么会发生这种情况？
- en: The answer lies in a blend of human psychology, cognitive biases, and the carefully
    engineered design of AI systems. This chapter explores the unseen psychological
    forces that shape our conversations with AI—and how you can use that knowledge
    to create deeper, more effective interactions.
  id: totrans-217
  prefs: []
  type: TYPE_NORMAL
  zh: 答案在于人类心理学、认知偏差和AI系统精心设计设计的混合。本章探讨了塑造我们与AI对话的无形心理力量，以及你如何利用这些知识来创建更深、更有效的互动。
- en: '1\. The ELIZA Effect: Believing the Illusion'
  id: totrans-218
  prefs: []
  type: TYPE_NORMAL
  zh: 1. ELIZA效应：相信错觉
- en: In the 1960s, an early chatbot named ELIZA mimicked a therapist by reflecting
    users' statements back at them (“How does that make you feel?”). Despite its simplicity,
    people reported feeling heard and understood.
  id: totrans-219
  prefs: []
  type: TYPE_NORMAL
  zh: 在20世纪60年代，一个早期的聊天机器人ELIZA通过向用户反射他们的陈述（“这让你感觉如何？”）来模仿治疗师。尽管它很简单，但人们报告说他们感到被听到和理解。
- en: This phenomenon is now known as the ELIZA Effect—our tendency to project understanding
    and emotion onto machines that use human language.
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
  zh: 这种现象现在被称为ELIZA效应——我们将理解和情感投射到使用人类语言的机器上的倾向。
- en: AI doesn’t feel or think. But our brains are wired to interpret fluent language
    as a sign of intelligence, empathy, or consciousness. That illusion makes AI powerful—and
    potentially misleading.
  id: totrans-221
  prefs: []
  type: TYPE_NORMAL
  zh: AI没有感觉或思考。但我们的大脑被编程为将流畅的语言解释为智能、同理心或意识的迹象。这种错觉使AI强大——并可能具有误导性。
- en: '2\. Anthropomorphism: Giving Machines a Personality'
  id: totrans-222
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 人类化：给机器赋予个性
- en: Humans naturally assign human traits to non-human entities. It’s why we name
    cars, talk to pets, and yell at our computers when they freeze.
  id: totrans-223
  prefs: []
  type: TYPE_NORMAL
  zh: 人类自然地将人类特质赋予非人类实体。这就是我们为什么给汽车命名、与宠物交谈，当电脑冻结时对它们大喊大叫的原因。
- en: 'When AI responds in a warm, engaging tone, we instinctively attribute personality
    to it—even though it has none. This can:'
  id: totrans-224
  prefs: []
  type: TYPE_NORMAL
  zh: 当AI以温暖、吸引人的语调回应时，我们本能地将其归因于个性——即使它没有个性。这可以：
- en: Make AI feel more relatable and easier to use
  id: totrans-225
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使AI感觉更亲切、更易使用
- en: Help users open up or feel emotionally supported
  id: totrans-226
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 帮助用户敞开心扉或感到情感支持
- en: Lead to overtrust or misplaced expectations
  id: totrans-227
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 导致过度信任或错误的期望
- en: As a creator or user, it's crucial to balance realism with awareness.
  id: totrans-228
  prefs: []
  type: TYPE_NORMAL
  zh: 作为创作者或用户，平衡现实主义与意识至关重要。
- en: 3\. Feedback Loops and User Behavior
  id: totrans-229
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 反馈循环和用户行为
- en: AI learns from patterns—including the way you speak to it. If you're polite
    and clear, it will mirror that. If you're sarcastic or vague, it might respond
    in kind (or misunderstand you).
  id: totrans-230
  prefs: []
  type: TYPE_NORMAL
  zh: AI从模式中学习——包括你与它交谈的方式。如果你礼貌且清晰，它会模仿这一点。如果你讽刺或含糊，它可能会以同样的方式回应（或误解你）。
- en: This dynamic creates a feedback loop, where your tone, clarity, and intent influence
    the direction and quality of the conversation.
  id: totrans-231
  prefs: []
  type: TYPE_NORMAL
  zh: 这种动态创造了一个反馈循环，其中你的语气、清晰度和意图会影响对话的方向和质量。
- en: 'Understanding this helps you:'
  id: totrans-232
  prefs: []
  type: TYPE_NORMAL
  zh: 理解这一点可以帮助你：
- en: Frame better prompts
  id: totrans-233
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 构建更好的提示
- en: Guide tone and flow intentionally
  id: totrans-234
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 有意引导语气和流程
- en: Create more productive and respectful exchanges
  id: totrans-235
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 创建更高效和尊重的交流
- en: 4\. Emotional Triggers in AI Responses
  id: totrans-236
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 人工智能回应中的情感触发
- en: 'Even without emotions, AI can simulate emotional tone. It can:'
  id: totrans-237
  prefs: []
  type: TYPE_NORMAL
  zh: 即使没有情感，人工智能也可以模拟情感语气。它可以：
- en: Offer reassurance
  id: totrans-238
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提供安慰
- en: Use motivational language
  id: totrans-239
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用激励性语言
- en: Mimic humor or seriousness
  id: totrans-240
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 模仿幽默或严肃
- en: This allows AI to be used in therapy, coaching, journaling, and emotional support.
    But because the empathy is simulated, users must remain aware of the limits of
    AI comfort. It’s a mirror, not a mind.
  id: totrans-241
  prefs: []
  type: TYPE_NORMAL
  zh: 这使得人工智能可以在治疗、辅导、日记和情感支持中使用。但因为是模拟的同情，用户必须意识到人工智能舒适度的局限性。它是一面镜子，而不是一个心灵。
- en: 5\. Cognitive Biases at Play
  id: totrans-242
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 作用中的认知偏见
- en: 'AI conversations activate several psychological biases, including:'
  id: totrans-243
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能对话会激活几种心理偏见，包括：
- en: 'Confirmation Bias: AI often agrees or aligns with your ideas unless prompted
    otherwise'
  id: totrans-244
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 确认偏见：除非被提示否则，人工智能通常会同意或与你的一致
- en: 'Authority Bias: Users may treat AI answers as correct simply because they sound
    confident'
  id: totrans-245
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 权威偏见：用户可能会因为人工智能回答听起来自信就将其视为正确
- en: 'Recency Bias: Users may prioritize the latest response, even if it contradicts
    earlier info'
  id: totrans-246
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 近期偏见：用户可能会优先考虑最新的回应，即使它与早期信息相矛盾
- en: Being aware of these helps you remain a critical thinker—even when the AI sounds
    persuasive.
  id: totrans-247
  prefs: []
  type: TYPE_NORMAL
  zh: 了解这些可以帮助你在人工智能听起来有说服力时仍然保持批判性思维。
- en: 6\. Designing Conversations for Connection
  id: totrans-248
  prefs: []
  type: TYPE_NORMAL
  zh: 6. 设计用于建立联系的对话
- en: 'If you''re building AI experiences (e.g., custom GPTs or chatbots), you can
    use psychological insights to:'
  id: totrans-249
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你正在构建人工智能体验（例如，定制的GPT或聊天机器人），你可以使用心理学洞察力：
- en: Design prompts that guide tone and empathy
  id: totrans-250
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 设计引导语气和同情的提示
- en: Craft AI personalities for different user needs
  id: totrans-251
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为不同的用户需求定制人工智能个性
- en: Structure flows that build trust without deception
  id: totrans-252
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 构建建立信任而不欺骗的结构流程
- en: Always pair emotional realism with ethical transparency.
  id: totrans-253
  prefs: []
  type: TYPE_NORMAL
  zh: 总是结合情感现实主义和道德透明度。
- en: Why It Matters
  id: totrans-254
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么它很重要
- en: 'Understanding the psychology behind AI conversations empowers you to:'
  id: totrans-255
  prefs: []
  type: TYPE_NORMAL
  zh: 理解人工智能对话背后的心理学原理，可以让你：
- en: Use AI responsibly
  id: totrans-256
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 负责任地使用人工智能
- en: Guide interactions with clarity and intention
  id: totrans-257
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 以清晰和意图引导互动
- en: Avoid common pitfalls like overtrust or emotional dependence
  id: totrans-258
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 避免常见的陷阱，如过度信任或情感依赖
- en: AI is not human—but it’s human-shaped. When you know how that shape is constructed,
    you can interact with AI more effectively, creatively, and wisely.
  id: totrans-259
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能不是人类——但它有人的形状。当你知道这个形状是如何构建的时候，你可以更有效地、更有创造力地、更明智地与人工智能互动。
- en: 'Part 2: Essential Techniques'
  id: totrans-260
  prefs: []
  type: TYPE_NORMAL
  zh: 第二部分：基本技巧
- en: 'Chapter 6: The Dialogue Method'
  id: totrans-261
  prefs: []
  type: TYPE_NORMAL
  zh: 第六章：对话法
- en: 'Artificial intelligence becomes exponentially more powerful when you stop treating
    it like a search engine—and start interacting with it like a partner. That’s the
    essence of The Dialogue Method: treating AI as a collaborator in a continuous,
    evolving conversation.'
  id: totrans-262
  prefs: []
  type: TYPE_NORMAL
  zh: 当你不再将人工智能视为搜索引擎，而是像合作伙伴一样与之互动时，人工智能的威力呈指数级增长。这就是对话法的精髓：将人工智能视为持续、不断发展的对话中的合作伙伴。
- en: This technique transforms your results from generic outputs into refined, tailored
    solutions that actually meet your needs.
  id: totrans-263
  prefs: []
  type: TYPE_NORMAL
  zh: 这种技术将你的结果从通用的输出转变为符合你需求的精致、定制解决方案。
- en: What Is the Dialogue Method?
  id: totrans-264
  prefs: []
  type: TYPE_NORMAL
  zh: 什么是对话法？
- en: 'The Dialogue Method is a structured approach to interacting with AI through
    conversation, not just commands. It involves:'
  id: totrans-265
  prefs: []
  type: TYPE_NORMAL
  zh: 对话法是一种通过对话与人工智能互动的结构化方法，而不仅仅是命令。它包括：
- en: Starting with a clear intent
  id: totrans-266
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 从一个明确的意图开始
- en: Providing context and constraints
  id: totrans-267
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提供上下文和约束
- en: Engaging in back-and-forth refinement
  id: totrans-268
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 进行来回的细化
- en: Guiding the tone, depth, and structure actively
  id: totrans-269
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 积极引导语气、深度和结构
- en: Rather than expecting perfection in one prompt, you iteratively shape the output—just
    like you would when brainstorming with a colleague or editor.
  id: totrans-270
  prefs: []
  type: TYPE_NORMAL
  zh: 而不是期望一个提示完美，你迭代地塑造输出——就像你与同事或编辑头脑风暴时一样。
- en: Why It Works
  id: totrans-271
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么它有效
- en: AI like ChatGPT thrives on context. The more you feed it—your goals, your tone,
    your audience—the smarter and more accurate it becomes.
  id: totrans-272
  prefs: []
  type: TYPE_NORMAL
  zh: 像ChatGPT这样的AI依赖于上下文。你给它提供的信息越多——你的目标、你的语气、你的受众——它就越聪明、越准确。
- en: A single well-formed conversation can outperform 10 disconnected prompts.
  id: totrans-273
  prefs: []
  type: TYPE_NORMAL
  zh: 一个结构良好的单一对话可以超越10个不连贯的提示。
- en: 'Benefits of the Dialogue Method:'
  id: totrans-274
  prefs: []
  type: TYPE_NORMAL
  zh: 对话法的益处：
- en: Higher quality and relevance in responses
  id: totrans-275
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 响应的质量和相关性更高
- en: Better alignment with your voice and style
  id: totrans-276
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 更好地与你的声音和风格保持一致
- en: Natural evolution of ideas through exploration
  id: totrans-277
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过探索实现想法的自然演变
- en: Stronger creative collaboration
  id: totrans-278
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 更强的创意协作
- en: Core Principles of the Dialogue Method
  id: totrans-279
  prefs: []
  type: TYPE_NORMAL
  zh: 对话法的核心原则
- en: 1\. Start Simple, Then Expand
  id: totrans-280
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 从简单开始，然后扩展
- en: Begin with a basic prompt, then use follow-up questions to dig deeper. Think
    of it as layering, not front-loading.
  id: totrans-281
  prefs: []
  type: TYPE_NORMAL
  zh: 从一个基本的提示开始，然后使用后续问题进行深入挖掘。把它看作是分层，而不是一次性加载。
- en: 2\. Speak Naturally, Yet Clearly
  id: totrans-282
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 自然地、清晰地说话
- en: Write the way you speak to a thoughtful assistant. Be conversational, but specific.
  id: totrans-283
  prefs: []
  type: TYPE_NORMAL
  zh: 用你与一个深思熟虑的助手交谈的方式去写作。要对话，但要具体。
- en: 3\. Clarify, Correct, and Iterate
  id: totrans-284
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 澄清、纠正和迭代
- en: If the output isn’t quite right, say so. AI can revise, expand, shorten, or
    shift tone in seconds.
  id: totrans-285
  prefs: []
  type: TYPE_NORMAL
  zh: 如果输出并不完全正确，请说出来。AI可以在几秒钟内进行修订、扩展、缩短或改变语气。
- en: 4\. Use Memory (Where Available)
  id: totrans-286
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 使用记忆（如果可用）
- en: Some platforms allow persistent memory. Take advantage of this to build long-term
    collaborative workflows.
  id: totrans-287
  prefs: []
  type: TYPE_NORMAL
  zh: 一些平台允许持续记忆。利用这一点来构建长期协作工作流程。
- en: 5\. Ask the AI Questions, Too
  id: totrans-288
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 也要向AI提问
- en: Let the AI prompt you with clarifying questions to refine the task together.
  id: totrans-289
  prefs: []
  type: TYPE_NORMAL
  zh: 让AI提出澄清问题，共同完善任务。
- en: 'Example: Writing a Blog Post with the Dialogue Method'
  id: totrans-290
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：使用对话法撰写博客文章
- en: 'You: “Help me write a blog post about digital minimalism for young professionals.”'
  id: totrans-291
  prefs: []
  type: TYPE_NORMAL
  zh: 你：“帮助我写一篇关于年轻专业人士的数字极简主义的博客文章。”
- en: 'AI: [Creates a draft.]'
  id: totrans-292
  prefs: []
  type: TYPE_NORMAL
  zh: AI：[创建草稿。]
- en: 'You: “Make it more casual and conversational, like a newsletter.”'
  id: totrans-293
  prefs: []
  type: TYPE_NORMAL
  zh: 你：“让它更加随意和对话，就像一份通讯。”
- en: 'AI: [Adjusts tone.]'
  id: totrans-294
  prefs: []
  type: TYPE_NORMAL
  zh: AI：[调整语气。]
- en: 'You: “Now add three bullet points with actionable tips at the end.”'
  id: totrans-295
  prefs: []
  type: TYPE_NORMAL
  zh: 你：“现在在结尾添加三个具有可操作性的提示的项目符号。”
- en: 'AI: [Inserts bullet points.]'
  id: totrans-296
  prefs: []
  type: TYPE_NORMAL
  zh: AI：[插入项目符号。]
- en: Within minutes, you’ve co-written a polished post—through dialogue, not directives.
  id: totrans-297
  prefs: []
  type: TYPE_NORMAL
  zh: 几分钟内，你就通过对话而不是指令共同完成了一篇经过润色的帖子。
- en: Avoiding Common Mistakes
  id: totrans-298
  prefs: []
  type: TYPE_NORMAL
  zh: 避免常见错误
- en: 'Dumping too much into a single prompt: Split your ideas into conversational
    steps.'
  id: totrans-299
  prefs: []
  type: TYPE_NORMAL
  zh: 在一个提示中放入太多内容：把你的想法分成对话步骤。
- en: 'Expecting one-shot perfection: Treat AI like a partner, not a genie.'
  id: totrans-300
  prefs: []
  type: TYPE_NORMAL
  zh: 期待一次就完美无缺：把AI当作一个伙伴，而不是一个精灵。
- en: 'Ignoring the AI’s questions or suggestions: These can unlock better results.'
  id: totrans-301
  prefs: []
  type: TYPE_NORMAL
  zh: 忽略AI的问题或建议：这些可以解锁更好的结果。
- en: Mastering the Mindset
  id: totrans-302
  prefs: []
  type: TYPE_NORMAL
  zh: 掌握心态
- en: The Dialogue Method is more than a technique—it’s a mindset shift. When you
    think of AI as a co-creator, not a tool, your approach changes. You start to explore,
    iterate, and build with it, not just from it.
  id: totrans-303
  prefs: []
  type: TYPE_NORMAL
  zh: 对话法不仅仅是一种技术——它是一种思维方式的转变。当你把AI视为一个共同创造者，而不是一个工具时，你的方法就会改变。你开始用它来探索、迭代和构建，而不仅仅是利用它。
- en: This is how professionals, entrepreneurs, and creators are getting ahead in
    the AI era—not by knowing all the answers, but by asking the right questions.
  id: totrans-304
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是专业人士、企业家和创作者在AI时代取得领先的方式——不是通过知道所有答案，而是通过提出正确的问题。
- en: 'Chapter 7: Roleplay as a Tool'
  id: totrans-305
  prefs: []
  type: TYPE_NORMAL
  zh: 第七章：角色扮演作为工具
- en: One of the most underrated but powerful features of AI is its ability to roleplay.
    That doesn’t mean acting out fictional characters—although it can—but rather,
    using AI to adopt specific perspectives, roles, or personas to solve real-world
    problems, enhance creativity, and accelerate learning.
  id: totrans-306
  prefs: []
  type: TYPE_NORMAL
  zh: AI最被低估但最强大的功能之一是它的角色扮演能力。这并不意味着扮演虚构角色——尽管它可以——而是使用AI来采用特定的观点、角色或人格来解决现实世界的问题，增强创造力，并加速学习。
- en: Roleplay isn’t just a novelty. It’s a strategic technique that transforms AI
    into a coach, critic, customer, teacher, or even your future self.
  id: totrans-307
  prefs: []
  type: TYPE_NORMAL
  zh: 角色扮演不仅仅是一种新奇的玩意儿。它是一种战略技术，可以将AI变成教练、评论家、客户、老师，甚至是你未来的自己。
- en: What Is Roleplay in AI Context?
  id: totrans-308
  prefs: []
  type: TYPE_NORMAL
  zh: 什么是AI环境中的角色扮演？
- en: 'Roleplay in AI refers to instructing the AI to take on a particular role with
    specific characteristics, responsibilities, and viewpoints. For example:'
  id: totrans-309
  prefs: []
  type: TYPE_NORMAL
  zh: AI环境中的角色扮演是指指示AI承担具有特定特征、责任和观点的特定角色。例如：
- en: “Act as a personal finance coach helping a college student on a budget.”
  id: totrans-310
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “扮演一个个人财务教练，帮助一个预算有限的大学学生。”
- en: “Pretend you’re a customer giving feedback on my product.”
  id: totrans-311
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “假装你是一个对我的产品提供反馈的客户。”
- en: “Roleplay as a job interviewer asking me questions for a marketing role.”
  id: totrans-312
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “扮演一个招聘面试官，问我关于市场营销角色的提问。”
- en: By assigning a role, you create situational focus that makes the output more
    relevant, realistic, and targeted.
  id: totrans-313
  prefs: []
  type: TYPE_NORMAL
  zh: 通过分配一个角色，你创造了情境焦点，使输出更加相关、现实和有针对性。
- en: Why Roleplay Works
  id: totrans-314
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么角色扮演有效
- en: 'Humans learn and think better in context—and so does AI. Roleplaying narrows
    the model’s vast knowledge into a specific point of view, allowing it to:'
  id: totrans-315
  prefs: []
  type: TYPE_NORMAL
  zh: 人类在特定情境下学习和思考得更好——AI也是如此。角色扮演将模型广泛的知识缩小到特定的观点，使其能够：
- en: Simulate real-world interactions
  id: totrans-316
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 模拟现实世界的互动
- en: Provide nuanced feedback or advice
  id: totrans-317
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提供细微的反馈或建议
- en: Challenge your assumptions
  id: totrans-318
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 挑战你的假设
- en: Help you practice, prepare, or reflect
  id: totrans-319
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 帮助你练习、准备或反思
- en: In essence, roleplay sharpens your conversation into a useful simulation.
  id: totrans-320
  prefs: []
  type: TYPE_NORMAL
  zh: 从本质上讲，角色扮演将你的对话转化为有用的模拟。
- en: Powerful Use Cases for Roleplay
  id: totrans-321
  prefs: []
  type: TYPE_NORMAL
  zh: 角色扮演的强大用例
- en: 1\. Learning Faster
  id: totrans-322
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 学习更快
- en: “Teach me as if I’m a 10-year-old.”
  id: totrans-323
  prefs: []
  type: TYPE_NORMAL
  zh: “像教一个10岁的孩子一样教我。”
- en: “Act like a patient, and I’ll try diagnosing your symptoms.”
  id: totrans-324
  prefs: []
  type: TYPE_NORMAL
  zh: “装作一个病人，我会尝试诊断你的症状。”
- en: 2\. Preparing for Real Situations
  id: totrans-325
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 为真实情况做准备
- en: Job interviews, sales calls, investor pitches
  id: totrans-326
  prefs: []
  type: TYPE_NORMAL
  zh: 面试、销售电话、投资者提案
- en: Difficult conversations or negotiations
  id: totrans-327
  prefs: []
  type: TYPE_NORMAL
  zh: 困难对话或谈判
- en: 3\. Creative Brainstorming
  id: totrans-328
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 创意头脑风暴
- en: Use AI as your co-writer, editor, or even your imaginary audience
  id: totrans-329
  prefs: []
  type: TYPE_NORMAL
  zh: 将AI用作你的合著者、编辑，甚至你的想象中的观众
- en: Roleplay as a historian to draft period-accurate dialogue
  id: totrans-330
  prefs: []
  type: TYPE_NORMAL
  zh: 以历史学家的身份进行角色扮演，起草符合时代背景的对话
- en: 4\. Building Empathy
  id: totrans-331
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 建立同理心
- en: “Play the role of a frustrated customer.”
  id: totrans-332
  prefs: []
  type: TYPE_NORMAL
  zh: “扮演一个沮丧的客户。”
- en: “Pretend you’re a beginner learning this topic.”
  id: totrans-333
  prefs: []
  type: TYPE_NORMAL
  zh: “假装你是一个刚开始学习这个主题的新手。”
- en: 5\. Testing Ideas or Products
  id: totrans-334
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 测试想法或产品
- en: AI can simulate customer reactions, critique UX, or play devil’s advocate.
  id: totrans-335
  prefs: []
  type: TYPE_NORMAL
  zh: AI可以模拟客户反应、批评UX或扮演魔鬼的代言人。
- en: How to Prompt Roleplay Effectively
  id: totrans-336
  prefs: []
  type: TYPE_NORMAL
  zh: 如何有效地进行角色扮演提示
- en: 'Use this structure for clear roleplay prompts:'
  id: totrans-337
  prefs: []
  type: TYPE_NORMAL
  zh: 使用以下结构进行清晰的角色扮演提示：
- en: “You are a [ROLE] helping a [USER TYPE] achieve [GOAL]. Respond with [STYLE/TONE].”
  id: totrans-338
  prefs: []
  type: TYPE_NORMAL
  zh: “你是一个[角色]，帮助[用户类型]实现[目标]。以[风格/语气]回应。”
- en: 'Example:'
  id: totrans-339
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：
- en: “You are a career coach helping a recent graduate prepare for job interviews.
    Respond with clear, encouraging advice.”
  id: totrans-340
  prefs: []
  type: TYPE_NORMAL
  zh: “你是一位职业导师，帮助一位应届毕业生准备面试。以清晰、鼓励性的建议回应。”
- en: The more specific your framing, the more accurate and useful the output.
  id: totrans-341
  prefs: []
  type: TYPE_NORMAL
  zh: 你的框架越具体，输出就越准确、越有用。
- en: Tips for Mastering AI Roleplay
  id: totrans-342
  prefs: []
  type: TYPE_NORMAL
  zh: 掌握AI角色扮演的技巧
- en: Be clear about context – Who are they? Who are you? What’s the scenario?
  id: totrans-343
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 明确上下文——他们是谁？你是谁？情景是什么？
- en: Give instructions about tone – Supportive, blunt, detailed, brief?
  id: totrans-344
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 指示语气——支持性的、直接的、详细的、简短的？
- en: Stay in character – Remind the AI to continue roleplaying if it drifts.
  id: totrans-345
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 保持角色——如果AI偏离角色扮演，提醒它继续。
- en: Iterate – Try multiple roles to see different perspectives on a problem.
  id: totrans-346
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 迭代——尝试多个角色，以看到对问题的不同观点。
- en: Turning AI into Your Personal Simulation Engine
  id: totrans-347
  prefs: []
  type: TYPE_NORMAL
  zh: 将AI转变为你的个人模拟引擎
- en: 'Imagine having unlimited access to:'
  id: totrans-348
  prefs: []
  type: TYPE_NORMAL
  zh: 想象一下拥有无限访问权限：
- en: A public speaking coach
  id: totrans-349
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 公共演讲教练
- en: A skeptical investor
  id: totrans-350
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 怀疑的投资者
- en: A loyal customer
  id: totrans-351
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 忠诚的客户
- en: A mentor from any industry
  id: totrans-352
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 来自任何行业的导师
- en: All available 24/7, ready to challenge and support your thinking.
  id: totrans-353
  prefs: []
  type: TYPE_NORMAL
  zh: 24/7全天候可用，随时准备挑战和支持你的思考。
- en: This is the power of roleplay.
  id: totrans-354
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是角色扮演的力量。
- en: 'Conclusion: Don’t Just Use AI—Engage It'
  id: totrans-355
  prefs: []
  type: TYPE_NORMAL
  zh: 结论：不要只是使用AI——要参与其中
- en: Roleplay transforms AI from a passive assistant into an active, interactive
    partner. It gives your learning, creativity, and decision-making real depth.
  id: totrans-356
  prefs: []
  type: TYPE_NORMAL
  zh: 角色扮演将AI从被动的助手转变为活跃的、互动的伙伴。它为你的学习、创造力和决策提供了真正的深度。
- en: Whether you’re practicing, prototyping, or problem-solving, roleplay isn’t play—it’s
    performance with purpose.
  id: totrans-357
  prefs: []
  type: TYPE_NORMAL
  zh: 无论你是练习、原型设计还是解决问题，角色扮演不是游戏——它是具有目的性的表演。
- en: 'Chapter 8: Prompt Calibration'
  id: totrans-358
  prefs: []
  type: TYPE_NORMAL
  zh: 第8章：提示词校准
- en: A single word can change everything. In the world of AI interaction, that truth
    becomes especially powerful. Prompt calibration is the art and science of fine-tuning
    your inputs to get precise, high-quality outputs.
  id: totrans-359
  prefs: []
  type: TYPE_NORMAL
  zh: 一个词可以改变一切。在AI交互的世界里，这个真理变得特别强大。提示词校准是调整你的输入以获得精确、高质量输出的艺术和科学。
- en: While the average user settles for "good enough," those who calibrate prompts
    with intention get faster, sharper, and more tailored results—whether they’re
    generating code, writing content, or solving complex problems.
  id: totrans-360
  prefs: []
  type: TYPE_NORMAL
  zh: 当普通用户满足于“足够好”时，那些有意校准提示词的人会得到更快、更锐利、更定制的结果——无论是生成代码、撰写内容还是解决复杂问题。
- en: Let’s explore how you can calibrate your prompts like a pro.
  id: totrans-361
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们探讨如何像专业人士一样校准你的提示词。
- en: What Is Prompt Calibration?
  id: totrans-362
  prefs: []
  type: TYPE_NORMAL
  zh: 什么是提示词校准？
- en: Prompt calibration is the process of adjusting the structure, wording, and details
    of your prompts to guide the AI toward the output you want.
  id: totrans-363
  prefs: []
  type: TYPE_NORMAL
  zh: 提示词校准是调整你提示的结构、措辞和细节的过程，以引导AI向你想要的方向输出。
- en: 'It’s not just about asking a better question. It’s about shaping the AI’s response
    through:'
  id: totrans-364
  prefs: []
  type: TYPE_NORMAL
  zh: 这不仅仅是提出更好的问题。这是通过以下方式塑造AI的回应：
- en: Tone cues (“Be professional,” “Write like a journalist”)
  id: totrans-365
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 语气提示（“要专业”，“像记者一样写作”）
- en: Format instructions (“In bullet points,” “With examples”)
  id: totrans-366
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 格式指令（“用项目符号列出”，“用例子说明”）
- en: Role framing (“As a data analyst,” “As a personal trainer”)
  id: totrans-367
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 角色框架（“作为数据分析师”，“作为个人教练”）
- en: Constraints (“Limit to 100 words,” “Avoid technical jargon”)
  id: totrans-368
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 约束（“限制为100字”，“避免使用技术术语”）
- en: Just like adjusting a microscope brings clarity, calibrating your prompt brings
    control.
  id: totrans-369
  prefs: []
  type: TYPE_NORMAL
  zh: 就像调整显微镜可以带来清晰度一样，校准你的提示可以带来控制。
- en: Why Calibration Matters
  id: totrans-370
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么校准很重要
- en: 'Uncalibrated prompts can lead to:'
  id: totrans-371
  prefs: []
  type: TYPE_NORMAL
  zh: 未校准的提示可能导致：
- en: Overly generic or vague responses
  id: totrans-372
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 过于通用或不明确的回应
- en: Misaligned tone or audience
  id: totrans-373
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 不一致的语气或受众
- en: Incomplete or unfocused outputs
  id: totrans-374
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 不完整或不集中的输出
- en: 'Calibrated prompts produce:'
  id: totrans-375
  prefs: []
  type: TYPE_NORMAL
  zh: 校准提示产生：
- en: Clearer, more accurate results
  id: totrans-376
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 更清晰、更准确的结果
- en: Consistent voice and structure
  id: totrans-377
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一致的语气和结构
- en: Faster completion with fewer edits
  id: totrans-378
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 更快的完成，更少的编辑
- en: 'The Calibration Spectrum: From Broad to Specific'
  id: totrans-379
  prefs: []
  type: TYPE_NORMAL
  zh: 校准光谱：从广泛到具体
- en: '1\. Broad Prompt (Low Calibration):'
  id: totrans-380
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 广泛提示（低校准）：
- en: '"Tell me about digital marketing."'
  id: totrans-381
  prefs: []
  type: TYPE_NORMAL
  zh: '"告诉我关于数字营销的事情。"'
- en: 'Result: A high-level summary with little nuance.'
  id: totrans-382
  prefs: []
  type: TYPE_NORMAL
  zh: 结果：一个高级总结，几乎没有细微差别。
- en: '2\. Refined Prompt (Medium Calibration):'
  id: totrans-383
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 精细提示（中校准）：
- en: '"Explain digital marketing strategies for small e-commerce brands."'
  id: totrans-384
  prefs: []
  type: TYPE_NORMAL
  zh: '"为小型电子商务品牌解释数字营销策略。"'
- en: 'Result: More relevant, somewhat specific.'
  id: totrans-385
  prefs: []
  type: TYPE_NORMAL
  zh: 结果：更相关，有些具体。
- en: '3\. Highly Calibrated Prompt:'
  id: totrans-386
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 高度校准的提示：
- en: '"As a digital marketing strategist, create a 5-bullet action plan for a startup
    selling eco-friendly products online. Keep the tone casual and actionable."'
  id: totrans-387
  prefs: []
  type: TYPE_NORMAL
  zh: '"作为一名数字营销策略师，为一家在线销售环保产品的初创公司制定一个5点行动计划。保持语气轻松且可操作。"'
- en: 'Result: Targeted, role-aware, and easy to act on.'
  id: totrans-388
  prefs: []
  type: TYPE_NORMAL
  zh: 结果：有针对性的、角色意识强且易于采取行动。
- en: Each calibration level adds clarity, context, and direction.
  id: totrans-389
  prefs: []
  type: TYPE_NORMAL
  zh: 每个校准级别都增加了清晰度、上下文和方向。
- en: Calibration Techniques
  id: totrans-390
  prefs: []
  type: TYPE_NORMAL
  zh: 校准技巧
- en: 1\. Specify the Role & Audience
  id: totrans-391
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 指定角色和受众
- en: “Act as a college professor explaining to first-year students.”
  id: totrans-392
  prefs: []
  type: TYPE_NORMAL
  zh: “扮演一位向大一新生解释的大学教授。”
- en: This adjusts depth, tone, and vocabulary.
  id: totrans-393
  prefs: []
  type: TYPE_NORMAL
  zh: 这调整了深度、语气和词汇。
- en: 2\. Set the Format
  id: totrans-394
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 设置格式
- en: “Write as a numbered list.”
  id: totrans-395
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: “按编号列表写。”
- en: “Create a short dialogue between two people.”
  id: totrans-396
  prefs: []
  type: TYPE_NORMAL
  zh: “创作两个人之间的简短对话。”
- en: Reduces formatting work later.
  id: totrans-397
  prefs: []
  type: TYPE_NORMAL
  zh: 减少后续的格式化工作。
- en: 3\. Give Examples or Models
  id: totrans-398
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 提供示例或模型
- en: “Use a style similar to Seth Godin’s blogs.”
  id: totrans-399
  prefs: []
  type: TYPE_NORMAL
  zh: “使用类似塞思·戈丁博客的风格。”
- en: Reference points guide style and rhythm.
  id: totrans-400
  prefs: []
  type: TYPE_NORMAL
  zh: 参考点指导风格和节奏。
- en: 4\. Define Boundaries
  id: totrans-401
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 定义边界
- en: “Limit response to 200 words.”
  id: totrans-402
  prefs: []
  type: TYPE_NORMAL
  zh: “限制回复为200字。”
- en: “Avoid mentioning pricing.”
  id: totrans-403
  prefs: []
  type: TYPE_NORMAL
  zh: “避免提及价格。”
- en: Prevents overload or irrelevance.
  id: totrans-404
  prefs: []
  type: TYPE_NORMAL
  zh: 防止过载或不相关。
- en: 5\. Layer Instructions
  id: totrans-405
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 层次化指令
- en: Stack instructions in a logical order to maintain clarity without overcomplicating
    the prompt.
  id: totrans-406
  prefs: []
  type: TYPE_NORMAL
  zh: 按逻辑顺序堆叠指令，以保持清晰，避免提示过于复杂。
- en: Common Pitfalls and How to Avoid Them
  id: totrans-407
  prefs: []
  type: TYPE_NORMAL
  zh: 常见陷阱及其避免方法
- en: 'Overloading the prompt: Don’t cram too much into one request. Split complex
    tasks into parts.'
  id: totrans-408
  prefs: []
  type: TYPE_NORMAL
  zh: 过度加载提示：不要在一个请求中塞入太多。将复杂任务分解成部分。
- en: 'Being too vague: “Make it better” isn’t helpful—say how.'
  id: totrans-409
  prefs: []
  type: TYPE_NORMAL
  zh: 过于模糊：“让它更好”没有帮助——说明如何。
- en: 'Assuming the AI knows your intent: Spell it out. Be explicit about tone, audience,
    and purpose.'
  id: totrans-410
  prefs: []
  type: TYPE_NORMAL
  zh: 假设AI知道你的意图：明确指出。在语气、受众和目的上要明确。
- en: 'Iterative Calibration: The Feedback Loop'
  id: totrans-411
  prefs: []
  type: TYPE_NORMAL
  zh: 迭代校准：反馈循环
- en: 'Calibrating prompts isn’t always one-and-done. Use an iterative loop:'
  id: totrans-412
  prefs: []
  type: TYPE_NORMAL
  zh: 校准提示不总是一次性完成的。使用迭代循环：
- en: 1\. Draft the initial prompt
  id: totrans-413
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 起草初始提示
- en: 2\. Evaluate the output
  id: totrans-414
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 评估输出
- en: 3\. Identify what’s missing or misaligned
  id: totrans-415
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 确定缺失或不一致的内容
- en: 4\. Refine the prompt accordingly
  id: totrans-416
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 根据需要细化提示
- en: 5\. Repeat until it feels right
  id: totrans-417
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 重复直到感觉合适
- en: AI learns within the session—your corrections matter.
  id: totrans-418
  prefs: []
  type: TYPE_NORMAL
  zh: AI在会话中学习——你的纠正很重要。
- en: Prompt Calibration in Action
  id: totrans-419
  prefs: []
  type: TYPE_NORMAL
  zh: 校准提示的实际应用
- en: 'Initial prompt:'
  id: totrans-420
  prefs: []
  type: TYPE_NORMAL
  zh: 初始提示：
- en: “Write a social media post about productivity.”
  id: totrans-421
  prefs: []
  type: TYPE_NORMAL
  zh: “写一篇关于生产力的社交媒体帖子。”
- en: 'Calibrated version:'
  id: totrans-422
  prefs: []
  type: TYPE_NORMAL
  zh: 校准版本：
- en: “Write a motivational LinkedIn post (under 150 words) on productivity hacks
    for remote workers, using a friendly tone and ending with a call to action.”
  id: totrans-423
  prefs: []
  type: TYPE_NORMAL
  zh: “写一篇关于远程工作者生产力技巧的励志领英帖子（不超过150字），使用友好语气并以行动号召结束。”
- en: 'Result: A targeted, brand-aligned message that performs.'
  id: totrans-424
  prefs: []
  type: TYPE_NORMAL
  zh: 结果：一个有针对性的、与品牌一致的信息，能够发挥作用。
- en: 'Conclusion: Calibration = Control'
  id: totrans-425
  prefs: []
  type: TYPE_NORMAL
  zh: 结论：校准 = 控制
- en: You don’t need to be a programmer or AI expert to get professional-grade results.
    You just need to master prompt calibration.
  id: totrans-426
  prefs: []
  type: TYPE_NORMAL
  zh: 你不需要是程序员或AI专家就能获得专业级的结果。你只需要掌握提示校准。
- en: When you calibrate your prompts, you move from trial-and-error to precision
    interaction—saving time, reducing frustration, and unlocking the true potential
    of AI as your collaborator.
  id: totrans-427
  prefs: []
  type: TYPE_NORMAL
  zh: 当你校准你的提示时，你从试错转向精确互动——节省时间，减少挫折，并释放人工智能作为你合作者的真正潜力。
- en: 'Chapter 9: Teaching Your AI'
  id: totrans-428
  prefs: []
  type: TYPE_NORMAL
  zh: 第九章：教育你的AI
- en: Most people use AI as a one-off tool—ask a question, get an answer, move on.
    But advanced users treat AI like an apprentice—something they can teach, guide,
    and train within a conversation to become more effective over time.
  id: totrans-429
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数人将人工智能作为一次性工具使用——提出问题，得到答案，然后继续。但高级用户将人工智能视为学徒——他们可以在对话中对其进行教学、指导和训练，以随着时间的推移变得更加有效。
- en: Yes, AI models like ChatGPT aren’t conscious or human. But they can mimic learning
    behavior remarkably well within a session—and with persistent memory in certain
    tools, even across sessions.
  id: totrans-430
  prefs: []
  type: TYPE_NORMAL
  zh: 是的，像ChatGPT这样的AI模型没有意识或人性。但它们可以在会话中非常出色地模仿学习行为——并且在某些工具中，即使跨会话也能保持持久记忆。
- en: This chapter shows you how to “teach” your AI to think, write, and respond more
    like you.
  id: totrans-431
  prefs: []
  type: TYPE_NORMAL
  zh: 本章向您展示如何“教育”你的人工智能以更像你地思考、写作和回应。
- en: What Does It Mean to ‘Teach’ an AI?
  id: totrans-432
  prefs: []
  type: TYPE_NORMAL
  zh: 什么是“教”人工智能？
- en: Teaching AI isn’t about rewriting its code—it’s about providing structured input,
    consistent feedback, and clear expectations to shape its behavior in real time.
  id: totrans-433
  prefs: []
  type: TYPE_NORMAL
  zh: 教育人工智能不是重写它的代码——而是提供结构化输入、一致的反馈和清晰的期望，以实时塑造其行为。
- en: 'It means:'
  id: totrans-434
  prefs: []
  type: TYPE_NORMAL
  zh: 这意味着：
- en: Establishing your preferences
  id: totrans-435
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 建立你的偏好
- en: Defining your style, tone, and voice
  id: totrans-436
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 定义你的风格、语气和声音
- en: Feeding it reference material
  id: totrans-437
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提供参考资料
- en: Guiding it with examples and corrections
  id: totrans-438
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 用例子和纠正指导它
- en: You're not programming the AI—you’re coaching it.
  id: totrans-439
  prefs: []
  type: TYPE_NORMAL
  zh: 你不是在编程人工智能——你是在指导它。
- en: Why Teaching AI Works
  id: totrans-440
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么教育人工智能有效
- en: 'AI learns within context. By providing examples, corrections, and preferences,
    you give it:'
  id: totrans-441
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能在特定语境中学习。通过提供例子、纠正和偏好，你给它：
- en: Boundaries to operate within
  id: totrans-442
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 运作边界
- en: Voice patterns to mimic
  id: totrans-443
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 要模仿的语音模式
- en: Values or tone to reflect
  id: totrans-444
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 要反映的价值观或语气
- en: Workflows to follow
  id: totrans-445
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 要遵循的工作流程
- en: Even in a single session, you can radically improve the quality and alignment
    of responses by interacting as a mentor would with an assistant.
  id: totrans-446
  prefs: []
  type: TYPE_NORMAL
  zh: 即使在单一会话中，你也可以通过像导师对待助手一样互动，从根本上改善响应的质量和对齐。
- en: 'The Teaching Framework: 3 Key Steps'
  id: totrans-447
  prefs: []
  type: TYPE_NORMAL
  zh: 教育框架：3个关键步骤
- en: 1\. Set the Standard
  id: totrans-448
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 设定标准
- en: Start by telling the AI how you want things done. Be clear about tone, format,
    depth, and examples.
  id: totrans-449
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，告诉人工智能你希望如何完成任务。明确语气、格式、深度和例子。
- en: '“Here’s how I like emails structured: short intro, three bullet points, a call
    to action.”'
  id: totrans-450
  prefs: []
  type: TYPE_NORMAL
  zh: “这是我喜欢的邮件结构：简短的介绍，三个要点，一个行动号召。”
- en: 2\. Model the Output
  id: totrans-451
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 模拟输出
- en: Show the AI what “good” looks like. Give it a sample to mimic or a previous
    piece of your own work.
  id: totrans-452
  prefs: []
  type: TYPE_NORMAL
  zh: 向人工智能展示“好”是什么样的。给它一个样本来模仿或你之前的作品。
- en: “Here’s a blog post I wrote. Match this tone and format in future posts.”
  id: totrans-453
  prefs: []
  type: TYPE_NORMAL
  zh: “这是我写的博客文章。在未来的文章中匹配这种语气和格式。”
- en: 3\. Correct and Reinforce
  id: totrans-454
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 纠正和强化
- en: Don’t settle for close-enough. Give real-time feedback.
  id: totrans-455
  prefs: []
  type: TYPE_NORMAL
  zh: 不要满足于“足够接近”。提供实时反馈。
- en: “This is too formal—make it sound more casual and use contractions.”
  id: totrans-456
  prefs: []
  type: TYPE_NORMAL
  zh: “这太正式了——让它听起来更随意，并使用缩写。”
- en: “Good start, but add a metaphor like I usually do.”
  id: totrans-457
  prefs: []
  type: TYPE_NORMAL
  zh: “好的开始，但加上我通常用的比喻。”
- en: Tools That Remember You (Beyond One Session)
  id: totrans-458
  prefs: []
  type: TYPE_NORMAL
  zh: 超出单一会话的工具（记住你）
- en: Some AI platforms, like ChatGPT with memory enabled, allow you to store preferences
    across sessions.
  id: totrans-459
  prefs: []
  type: TYPE_NORMAL
  zh: 一些AI平台，如启用记忆的ChatGPT，允许你在会话之间存储偏好。
- en: 'You can:'
  id: totrans-460
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以：
- en: Save instructions (e.g., "Use a motivational tone")
  id: totrans-461
  prefs: []
  type: TYPE_NORMAL
  zh: 保存指令（例如，“使用激励性的语气”）
- en: Upload files and reference them repeatedly
  id: totrans-462
  prefs: []
  type: TYPE_NORMAL
  zh: 上传文件并反复引用
- en: Build AI assistants customized to your style
  id: totrans-463
  prefs: []
  type: TYPE_NORMAL
  zh: 构建符合你风格的定制人工智能助手
- en: Teaching your AI becomes easier when it remembers your habits, goals, and working
    style over time.
  id: totrans-464
  prefs: []
  type: TYPE_NORMAL
  zh: 当你的人工智能随着时间的推移记住你的习惯、目标和工作风格时，教育它变得更加容易。
- en: Use Cases for Teaching AI
  id: totrans-465
  prefs: []
  type: TYPE_NORMAL
  zh: 教育人工智能的使用案例
- en: 'Content creation: Train it to write in your brand voice'
  id: totrans-466
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 内容创作：训练它以你的品牌声音写作
- en: 'Email drafting: Set tone and structure standards'
  id: totrans-467
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 邮件草稿：设定语气和结构标准
- en: 'Tutoring: Teach it your learning style (visual, analogies, step-by-step)'
  id: totrans-468
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 辅导：教它你的学习风格（视觉、类比、逐步）
- en: 'Research assistance: Instruct it how to summarize and cite sources'
  id: totrans-469
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 研究辅助：指导它如何总结和引用来源
- en: 'Code writing: Show it your preferred frameworks or naming conventions'
  id: totrans-470
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 编码写作：展示你偏好的框架或命名约定
- en: 'Example: Training AI to Be Your Writing Assistant'
  id: totrans-471
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：训练AI成为你的写作助手
- en: 'You: “Here’s how I structure my articles: Hook, Insight, Action. Keep it under
    800 words.”'
  id: totrans-472
  prefs: []
  type: TYPE_NORMAL
  zh: 你： “这是我的文章结构：钩子、洞察、行动。控制在800字以内。”
- en: 'AI: [Writes draft.]'
  id: totrans-473
  prefs: []
  type: TYPE_NORMAL
  zh: AI：[撰写草稿。]
- en: 'You: “This insight isn’t strong enough—use a more surprising stat.”'
  id: totrans-474
  prefs: []
  type: TYPE_NORMAL
  zh: 你： “这个洞察不够强烈——使用一个更令人惊讶的统计数据。”
- en: 'AI: [Rewrites with stronger support.]'
  id: totrans-475
  prefs: []
  type: TYPE_NORMAL
  zh: AI：[用更强的支持重写。]
- en: Within minutes, the AI is writing like you, thinking with you, and getting better
    with every revision.
  id: totrans-476
  prefs: []
  type: TYPE_NORMAL
  zh: 几分钟内，AI就能像你一样写作，与你一起思考，并在每次修订中变得更好。
- en: Pro Tips for Teaching Your AI
  id: totrans-477
  prefs: []
  type: TYPE_NORMAL
  zh: 教导你的AI的技巧
- en: 'Name your styles: Give them labels (“newsletter tone,” “client report style”)'
  id: totrans-478
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 命名你的风格：给它们贴上标签（“通讯风格”、“客户报告风格”）
- en: 'Use reference anchors: Keep a file of your best samples to reuse as guides'
  id: totrans-479
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用参考锚点：保存你最好的样本文件以供重用为指南
- en: 'Correct actively: Shape your AI in real time'
  id: totrans-480
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 积极纠正：实时塑造你的AI
- en: 'Avoid passivity: If it’s wrong, say so—and say why'
  id: totrans-481
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 避免被动：如果错了，就说出来——并说明原因
- en: 'Conclusion: The AI You Train is the AI You Gain'
  id: totrans-482
  prefs: []
  type: TYPE_NORMAL
  zh: 结论：你训练的AI就是你获得的人工智能
- en: Great AI interaction isn’t about finding the right tool—it’s about building
    the right relationship. When you treat AI as trainable, coachable, and improvable,
    you unlock a deeper level of usefulness.
  id: totrans-483
  prefs: []
  type: TYPE_NORMAL
  zh: 优秀的AI交互不在于找到正确的工具，而在于建立正确的关系。当你把AI视为可训练、可指导、可改进的，你就能解锁更深层次的有用性。
- en: Start teaching your AI. It’s more capable—and more adaptable—than you think.
  id: totrans-484
  prefs: []
  type: TYPE_NORMAL
  zh: 开始教导你的AI。它比你想象的更有能力——更适应性强。
- en: 'Chapter 10: Managing Output with Prompt Blocks'
  id: totrans-485
  prefs: []
  type: TYPE_NORMAL
  zh: 第10章：使用提示块管理输出
- en: Sometimes, getting what you want from AI isn’t about asking a better question—it’s
    about giving a better structure. That’s where prompt blocks come in.
  id: totrans-486
  prefs: []
  type: TYPE_NORMAL
  zh: 有时，从AI中获得你想要的东西并不在于提出更好的问题，而在于提供更好的结构。这就是提示块的作用所在。
- en: Prompt blocks are like templates or blueprints. They break down your request
    into clear, manageable parts that guide the AI step-by-step. Instead of tossing
    a wall of text at the model, you’re giving it a precise map to follow.
  id: totrans-487
  prefs: []
  type: TYPE_NORMAL
  zh: 提示块就像模板或蓝图。它们将你的请求分解成清晰、可管理的部分，引导AI一步步进行。你不再向模型扔一堆文本，而是给它一个精确的路线图来遵循。
- en: The result? Cleaner, more organized, more reliable outputs—especially for complex
    tasks.
  id: totrans-488
  prefs: []
  type: TYPE_NORMAL
  zh: 结果？更干净、更有组织、更可靠的输出——尤其是对于复杂任务。
- en: What Are Prompt Blocks?
  id: totrans-489
  prefs: []
  type: TYPE_NORMAL
  zh: 什么是提示块？
- en: 'Prompt blocks are modular sections of a prompt that each serve a specific purpose.
    You’re telling the AI:'
  id: totrans-490
  prefs: []
  type: TYPE_NORMAL
  zh: 提示块是提示的模块化部分，每个部分都服务于特定的目的。你正在告诉AI：
- en: What role to take
  id: totrans-491
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 要扮演的角色
- en: What task to complete
  id: totrans-492
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 要完成的任务
- en: What format to follow
  id: totrans-493
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 要遵循的格式
- en: How to behave in tone or style
  id: totrans-494
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如何在语气或风格上表现
- en: What constraints to observe
  id: totrans-495
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 要遵守的约束
- en: Each block is like a gear in a machine. Together, they keep the output aligned,
    focused, and high-quality.
  id: totrans-496
  prefs: []
  type: TYPE_NORMAL
  zh: 每个块就像机器中的一个齿轮。共同作用，保持输出的一致性、专注性和高质量。
- en: The Anatomy of a Prompt Block
  id: totrans-497
  prefs: []
  type: TYPE_NORMAL
  zh: 提示块的结构分析
- en: 'Here’s a common 5-block structure for managing output:'
  id: totrans-498
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个常见的5块结构，用于管理输出：
- en: 1\. Context Block
  id: totrans-499
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 上下文块
- en: “You are a career coach helping job seekers prepare for interviews.”
  id: totrans-500
  prefs: []
  type: TYPE_NORMAL
  zh: “你是一位职业导师，帮助求职者准备面试。”
- en: 2\. Objective Block
  id: totrans-501
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 目标块
- en: “Create a mock Q&A script for a marketing manager position.”
  id: totrans-502
  prefs: []
  type: TYPE_NORMAL
  zh: “为市场营销经理职位创建一个模拟问答脚本。”
- en: 3\. Instruction Block
  id: totrans-503
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 指令块
- en: “Include 5 behavioral interview questions with sample answers.”
  id: totrans-504
  prefs: []
  type: TYPE_NORMAL
  zh: “包含5个行为面试问题及其示例答案。”
- en: 4\. Format Block
  id: totrans-505
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 格式块
- en: “Use a numbered list. Bold each question. Keep each answer under 100 words.”
  id: totrans-506
  prefs: []
  type: TYPE_NORMAL
  zh: “使用编号列表。每个问题加粗。每个答案控制在100字以内。”
- en: 5\. Tone Block
  id: totrans-507
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 语气块
- en: “Keep the tone professional but friendly.”
  id: totrans-508
  prefs: []
  type: TYPE_NORMAL
  zh: “保持语气专业但友好。”
- en: This structure turns a vague prompt into a detailed brief.
  id: totrans-509
  prefs: []
  type: TYPE_NORMAL
  zh: 这种结构将一个模糊的提示转化为详细的简报。
- en: Why Use Prompt Blocks?
  id: totrans-510
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么使用提示块？
- en: Clarity – Each instruction is isolated and easy to follow
  id: totrans-511
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 清晰度 – 每条指令都是独立的，易于遵循
- en: Consistency – Produces more repeatable, predictable results
  id: totrans-512
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一致性 – 产生更多可重复、可预测的结果
- en: Control – Helps you shape tone, length, and complexity
  id: totrans-513
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 控制 – 帮助你塑造语气、长度和复杂性
- en: Efficiency – Saves time editing by getting it right the first time
  id: totrans-514
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 效率 – 通过第一次就做对来节省编辑时间
- en: Prompt blocks make AI work with you, not just for you.
  id: totrans-515
  prefs: []
  type: TYPE_NORMAL
  zh: 提示块使AI与你合作，而不仅仅是为你工作。
- en: Examples in Action
  id: totrans-516
  prefs: []
  type: TYPE_NORMAL
  zh: 行动中的例子
- en: 'Unstructured Prompt:'
  id: totrans-517
  prefs: []
  type: TYPE_NORMAL
  zh: 无结构提示：
- en: “Write an article about staying focused.”
  id: totrans-518
  prefs: []
  type: TYPE_NORMAL
  zh: “撰写一篇关于保持专注的文章。”
- en: 'Structured Prompt with Blocks:'
  id: totrans-519
  prefs: []
  type: TYPE_NORMAL
  zh: 带有块的有序提示：
- en: 'Context: You are a productivity expert.'
  id: totrans-520
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 上下文：你是一位生产力专家。
- en: 'Objective: Write an article to help remote workers stay focused.'
  id: totrans-521
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 目标：撰写一篇文章，帮助远程工作者保持专注。
- en: 'Instruction: Include 3 tips with explanations and 1 personal story.'
  id: totrans-522
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 指令：包括3个带解释的技巧和1个个人故事。
- en: 'Format: Use headings for each section, plus a short intro and conclusion.'
  id: totrans-523
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 格式：为每个部分使用标题，加上简短的引言和结论。
- en: 'Tone: Friendly, motivational, and easy to read.'
  id: totrans-524
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 语气：友好、激励且易于阅读。
- en: 'Result: A fully structured article that feels polished and tailored.'
  id: totrans-525
  prefs: []
  type: TYPE_NORMAL
  zh: 结果：一篇结构完整、感觉经过精心打磨和定制的文章。
- en: Use Prompt Blocks for Any Task
  id: totrans-526
  prefs: []
  type: TYPE_NORMAL
  zh: 使用提示块完成任何任务
- en: 'Emails:'
  id: totrans-527
  prefs: []
  type: TYPE_NORMAL
  zh: 电子邮件：
- en: 'Context: You are a startup founder'
  id: totrans-528
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 背景：你是初创公司创始人
- en: 'Objective: Announce a new feature'
  id: totrans-529
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 目标：宣布一个新功能
- en: 'Format: Email with subject line + 3 short paragraphs'
  id: totrans-530
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 格式：带有主题行和3段简短段落的电子邮件
- en: 'Tone: Excited and informal'
  id: totrans-531
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 语气：兴奋和非正式
- en: 'Code Writing:'
  id: totrans-532
  prefs: []
  type: TYPE_NORMAL
  zh: 代码编写：
- en: 'Context: Python developer'
  id: totrans-533
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 背景：Python 开发者
- en: 'Task: Write a script to scrape data from a webpage'
  id: totrans-534
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 任务：编写一个从网页抓取数据的脚本
- en: 'Instruction: Use requests and BeautifulSoup, include comments'
  id: totrans-535
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 指示：使用请求和BeautifulSoup，包括注释
- en: 'Constraint: Under 50 lines'
  id: totrans-536
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 约束：不超过50行
- en: 'Social Media:'
  id: totrans-537
  prefs: []
  type: TYPE_NORMAL
  zh: 社交媒体：
- en: 'Context: Content marketer'
  id: totrans-538
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 背景：内容营销人员
- en: 'Task: Write a tweet thread about AI trends'
  id: totrans-539
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 任务：撰写关于人工智能趋势的推文串
- en: 'Format: 5 tweets, each under 280 characters'
  id: totrans-540
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 格式：5条推文，每条不超过280个字符
- en: 'Tone: Insightful and engaging'
  id: totrans-541
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 语气：有洞察力和吸引人
- en: Pro Tips for Using Prompt Blocks
  id: totrans-542
  prefs: []
  type: TYPE_NORMAL
  zh: 使用提示块的专业技巧
- en: Label each block so it’s easy to modify or reuse
  id: totrans-543
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为每个块标记，以便易于修改或重用
- en: Start simple, then add detail as needed
  id: totrans-544
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 从简单开始，然后根据需要添加细节
- en: Use bullet points inside blocks for clarity
  id: totrans-545
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在块内使用项目符号以提高清晰度
- en: Create reusable templates for common tasks
  id: totrans-546
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为常见任务创建可重用模板
- en: 'Conclusion: Structure Drives Success'
  id: totrans-547
  prefs: []
  type: TYPE_NORMAL
  zh: 结论：结构驱动成功
- en: Prompt blocks turn messy requests into manageable systems. Whether you’re writing,
    coding, or strategizing, they give you a framework to consistently produce high-quality
    results.
  id: totrans-548
  prefs: []
  type: TYPE_NORMAL
  zh: 提示块将混乱的请求转化为可管理的系统。无论你是在写作、编码还是制定策略，它们都为你提供了一个框架，以持续产生高质量的结果。
- en: Don’t just prompt—orchestrate. Think like a conductor, not a one-note musician.
  id: totrans-549
  prefs: []
  type: TYPE_NORMAL
  zh: 不要只是提示——要编排。像指挥家一样思考，而不是像单音音乐家。
- en: 'Chapter 11: Collaborative Creation'
  id: totrans-550
  prefs: []
  type: TYPE_NORMAL
  zh: 第11章：协作创作
- en: When people think of AI, they often picture it as a tool that delivers results
    on command. But the most powerful way to use AI isn’t through commands—it’s through
    collaboration.
  id: totrans-551
  prefs: []
  type: TYPE_NORMAL
  zh: 当人们想到AI时，他们通常将其想象成一个可以按命令交付结果的工具。但使用AI最强大的方式不是通过命令——是通过协作。
- en: In this chapter, you’ll learn how to engage AI not just as a helper, but as
    a co-creator—an active brainstorming partner, an idea enhancer, and a creative
    mirror that reflects and evolves your vision in real time.
  id: totrans-552
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，你将学习如何将AI不仅仅作为一个助手，而是一个共同创作者——一个积极的头脑风暴伙伴、一个想法增强者、一个创意镜子，它实时地反映和演变你的愿景。
- en: Welcome to collaborative creation, where your imagination meets machine intelligence.
  id: totrans-553
  prefs: []
  type: TYPE_NORMAL
  zh: 欢迎来到协作创作，在这里你的想象力与机器智能相遇。
- en: What Is Collaborative Creation?
  id: totrans-554
  prefs: []
  type: TYPE_NORMAL
  zh: 什么是协作创作？
- en: 'Collaborative creation is a dynamic process where you:'
  id: totrans-555
  prefs: []
  type: TYPE_NORMAL
  zh: 协作创作是一个动态的过程，在这个过程中：
- en: Propose an idea or direction
  id: totrans-556
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提出一个想法或方向
- en: Let AI respond or build upon it
  id: totrans-557
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 让AI做出回应或在此基础上构建
- en: React to its output, tweaking, refining, or redirecting
  id: totrans-558
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对其输出做出反应，调整、改进或重新定向
- en: Repeat the cycle until the work feels right
  id: totrans-559
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 重复循环，直到作品感觉恰到好处
- en: It’s not a one-shot interaction—it’s a conversation, a shared creative flow.
  id: totrans-560
  prefs: []
  type: TYPE_NORMAL
  zh: 这不是一次性的互动——这是一场对话，一个共享的创意流程。
- en: Why Collaboration Beats Solo Prompting
  id: totrans-561
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么协作优于单独提示
- en: 'While one-off prompts can deliver good results, collaboration unlocks:'
  id: totrans-562
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然一次性提示可以产生良好的结果，但协作解锁了：
- en: Unexpected ideas you wouldn’t think of alone
  id: totrans-563
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你独自一人不会想到的意外想法
- en: Rapid iteration through multiple versions or styles
  id: totrans-564
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过多个版本或风格的快速迭代
- en: Stronger refinement as you build upon feedback
  id: totrans-565
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在基于反馈构建时进行更强的改进
- en: Creative acceleration, especially for writing, art, design, or content strategy
  id: totrans-566
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 创意加速，尤其是在写作、艺术、设计或内容策略方面
- en: The AI becomes more than a tool—it becomes a partner in progress.
  id: totrans-567
  prefs: []
  type: TYPE_NORMAL
  zh: AI不仅仅是一个工具——它成为了一个进步的合作伙伴。
- en: How to Start a Collaborative Session
  id: totrans-568
  prefs: []
  type: TYPE_NORMAL
  zh: 如何开始一个协作会议
- en: 1\. Set the Stage
  id: totrans-569
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 设置舞台
- en: Begin with a role and context.
  id: totrans-570
  prefs: []
  type: TYPE_NORMAL
  zh: 从一个角色和背景开始。
- en: “You’re a creative writing coach. Let’s brainstorm a sci-fi short story.”
  id: totrans-571
  prefs: []
  type: TYPE_NORMAL
  zh: “你是创意写作教练。让我们头脑风暴一个科幻短篇小说。”
- en: 2\. Share Your Idea (Even If Rough)
  id: totrans-572
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 分享你的想法（即使很粗糙）
- en: “I want it to be about a future where dreams are recorded and sold.”
  id: totrans-573
  prefs: []
  type: TYPE_NORMAL
  zh: “我想让它关于一个梦想被记录并出售的未来。”
- en: This gives the AI a direction, but leaves space to build.
  id: totrans-574
  prefs: []
  type: TYPE_NORMAL
  zh: 这为AI指明了方向，但留下了构建的空间。
- en: 3\. Invite Input, Not Answers
  id: totrans-575
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 邀请意见，而不是答案
- en: “Give me 3 plot twists that could happen in this world.”
  id: totrans-576
  prefs: []
  type: TYPE_NORMAL
  zh: “给我3个在这个世界中可能发生的故事转折。”
- en: “What emotional arc could the main character follow?”
  id: totrans-577
  prefs: []
  type: TYPE_NORMAL
  zh: “主要角色可以遵循什么样的情感弧线？”
- en: 4\. Review, Reflect, Refine
  id: totrans-578
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 审查、反思、改进
- en: '“Twist #2 is interesting. Let’s build on that.”'
  id: totrans-579
  prefs: []
  type: TYPE_NORMAL
  zh: “第二个转折很有趣。让我们在此基础上构建。”
- en: You guide the process like a director working with a screenwriter.
  id: totrans-580
  prefs: []
  type: TYPE_NORMAL
  zh: 你像导演与编剧合作一样引导这个过程。
- en: Collaborative Modes of Creation
  id: totrans-581
  prefs: []
  type: TYPE_NORMAL
  zh: 创作协作模式
- en: 1\. Brainstorming Mode
  id: totrans-582
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 思考模式
- en: Generate lists of names, topics, angles, or titles
  id: totrans-583
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 生成姓名、主题、角度或标题的列表
- en: Ask “what if” questions
  id: totrans-584
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提出假设性问题
- en: Explore multiple perspectives
  id: totrans-585
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 探索多个视角
- en: 2\. Expansion Mode
  id: totrans-586
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 扩展模式
- en: Start with a sentence, ask the AI to expand it into a paragraph
  id: totrans-587
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 从一个句子开始，让AI将其扩展为段落
- en: Use it to flesh out bullet points into full sections
  id: totrans-588
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用它将项目符号扩展为完整章节
- en: 3\. Editing Mode
  id: totrans-589
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 编辑模式
- en: Provide a rough draft and ask for revisions
  id: totrans-590
  prefs: []
  type: TYPE_NORMAL
  zh: 提供一个草稿并请求修改
- en: Direct the AI to adjust tone, clarity, or structure
  id: totrans-591
  prefs: []
  type: TYPE_NORMAL
  zh: 指导AI调整语气、清晰度或结构
- en: 4\. Style Shifting Mode
  id: totrans-592
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 风格转换模式
- en: Ask AI to rewrite content in a different voice (humorous, academic, poetic)
  id: totrans-593
  prefs: []
  type: TYPE_NORMAL
  zh: 让AI用不同的声音（幽默的、学术的、诗意的）重写内容
- en: Use this to experiment and unlock new creative directions
  id: totrans-594
  prefs: []
  type: TYPE_NORMAL
  zh: 使用此方法进行实验并解锁新的创意方向
- en: Tips for Productive Co-Creation
  id: totrans-595
  prefs: []
  type: TYPE_NORMAL
  zh: 生产力协作创作的技巧
- en: Name your preferences (e.g., “I like metaphor-heavy writing”)
  id: totrans-596
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 命名你的偏好（例如，“我喜欢充满隐喻的写作”）
- en: Push back respectfully (“This is too generic. Try again with more edge.”)
  id: totrans-597
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 尊重地提出反对意见（“这太泛泛而谈了。再试一次，加更多有特色的。”）
- en: Use prompts like “what else?” or “give me another version”
  id: totrans-598
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用提示“还有什么？”或“给我另一个版本”
- en: Mix creativity with constraints (e.g., “Write a poem about AI using only food
    metaphors”)
  id: totrans-599
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将创造性与限制相结合（例如，“用食物隐喻写一首关于AI的诗”）
- en: 'Real Example: Co-Writing a Story'
  id: totrans-600
  prefs: []
  type: TYPE_NORMAL
  zh: 真实示例：共同创作故事
- en: 'You: “Let’s write a thriller set on a Mars colony. I want high tension and
    political intrigue.”'
  id: totrans-601
  prefs: []
  type: TYPE_NORMAL
  zh: 你：“让我们写一个以火星殖民地为背景的惊悚片。我想要高度紧张的政治阴谋。”
- en: 'AI: [Suggests premise and characters]'
  id: totrans-602
  prefs: []
  type: TYPE_NORMAL
  zh: AI：[建议前提和角色]
- en: 'You: “Character B is flat—make them morally ambiguous.”'
  id: totrans-603
  prefs: []
  type: TYPE_NORMAL
  zh: 你：“角色B很扁平——让他们变得道德上模棱两可。”
- en: 'AI: [Refines character]'
  id: totrans-604
  prefs: []
  type: TYPE_NORMAL
  zh: AI：[细化角色]
- en: 'You: “Now write the first scene with a sense of paranoia and cold isolation.”'
  id: totrans-605
  prefs: []
  type: TYPE_NORMAL
  zh: 你：“现在写一个带有偏执和寒冷隔离感的第一个场景。”
- en: 'AI: [Delivers draft]'
  id: totrans-606
  prefs: []
  type: TYPE_NORMAL
  zh: AI：[提供草稿]
- en: 'You: “Good tone. Shorten the dialogue and add more sensory detail.”'
  id: totrans-607
  prefs: []
  type: TYPE_NORMAL
  zh: 你：“好的语气。缩短对话并添加更多感官细节。”
- en: And so on—you’re shaping the work together.
  id: totrans-608
  prefs: []
  type: TYPE_NORMAL
  zh: 等等——你们一起在塑造作品。
- en: 'Conclusion: The New Creative Team'
  id: totrans-609
  prefs: []
  type: TYPE_NORMAL
  zh: 结论：新的创意团队
- en: You bring vision. AI brings variation. Together, you create faster, iterate
    smarter, and explore wider than ever before.
  id: totrans-610
  prefs: []
  type: TYPE_NORMAL
  zh: 你带来愿景。AI带来变化。一起，你们可以更快地迭代，探索比以往任何时候都更广泛。
- en: Collaborative creation is not about replacing your creativity—it’s about extending
    it, multiplying your momentum, and helping your best ideas rise to the surface.
  id: totrans-611
  prefs: []
  type: TYPE_NORMAL
  zh: 协作创作不是关于取代你的创造力——它是关于扩展它，增加你的动力，并帮助你最好的想法浮出水面。
- en: You’re not prompting a machine. You’re co-creating with a force multiplier.
  id: totrans-612
  prefs: []
  type: TYPE_NORMAL
  zh: 你不是在提示一个机器。你是在与一个倍增器共同创作。
- en: 'Chapter 12: Formatting for Impact'
  id: totrans-613
  prefs: []
  type: TYPE_NORMAL
  zh: 第12章：格式化以产生影响力
- en: Great ideas can be lost in poor presentation. Whether you're generating blog
    posts, reports, marketing copy, or educational content, how something looks and
    reads affects how it's understood and remembered.
  id: totrans-614
  prefs: []
  type: TYPE_NORMAL
