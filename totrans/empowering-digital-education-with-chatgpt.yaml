- en: 12Enhancing Academic Guidance with AIInvestigating the Present Capabilities
    and Future Prospects of ChatGPT in Empowering Students
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Azza Ali Abdullah Al Zakwani, Dissanayake Mudiyanselage Thuwarakesh, and Muhammad
    Khuram Khalil
  prefs: []
  type: TYPE_NORMAL
- en: 'DOI: [10.1201/9781032716350-12](http://doi.org/10.1201/9781032716350-12)'
  prefs: []
  type: TYPE_NORMAL
- en: 12.1 Introduction
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 12.1.1 Background
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Artificial intelligence (AI) has completely changed how people get information,
    solve issues, and communicate with one another, as well as with machines. Traditional
    barriers encourage continual and changing information flows and issue solutions.
    In the middle of this groundbreaking development, ChatGPT has become a stunning
    big language model ([Stojanov, 2023](#ch20.xhtml#r531)). Open AI’s ChatGPT is
    a cutting-edge deep learning program that uses the advanced GPT-3.5—or 4.0, depending
    on the version that’s being used at the moment—architecture to generate conversational
    replies that are human-like ([Stojanov, 2023](#ch20.xhtml#r531)). Academics and
    professionals in the field of education have been quite interested in ChatGPT
    and its uses, especially in higher education, because of its potential for teaching
    and learning, even though their opinions haven’t always been positive ([Anders,
    2023](#ch20.xhtml#r509)). The chapter delves into the complex realm of generative
    AI models, or more specifically, ChatGPT, investigating its possible applications
    in improving student advice, a topic that is often discussed. Following the usage
    and importance of this phenomenon in higher education, this exploratory research
    aims to shed light on the profound implications of this and other easily accessible
    large language models, signaling great opportunities for a transformative shift
    in the landscape of student-centered support services. Specifically, it analyzes
    the potential impact and challenges of integrating ChatGPT into academic advising.
    The healthcare industry, which includes the mental health community, has been
    particularly forward-thinking when it comes to incorporating AI technology—most
    notably ChatGPT—into various domains. AI integration has garnered significant
    attention due to its potential for, among other things, clinical decision-making
    and diagnostic utilities, medical education and training, enhanced efficacy and
    efficiency in therapy, and offering patients and the general public advice and
    counseling ([Chan et al., 2019;](#ch20.xhtml#r513) [van der Niet and Bleakley,
    2021](#ch20.xhtml#r532); [Johnson, Strayhorn and Travers, 2023](#ch20.xhtml#r523);
    [Juhi et al., 2023](#ch20.xhtml#r524); [Kraft, 2023](#ch20.xhtml#r525); [Kulkarni
    and Singh, 2023](#ch20.xhtml#r526); [Xie et al., 2023](#ch20.xhtml#r535)). Furthermore,
    according to the same poll, eight out of ten citizens questioned think AI would
    lower healthcare prices, enhance access to healthcare, and improve healthcare
    quality ([Xie et al., 2023](#ch20.xhtml#r535)). Most significantly (and, for some,
    perhaps unsettlingly), according to a poll of Omani people, one in four said they
    would be more inclined to “talk to” AI than to seek out a personal physician for
    guidance ([AlZaabi, AlMaskari and AalAbdulsalam, 2023](#ch20.xhtml#r508)). This
    conclusion is especially paradoxical considering a large number of healthcare
    professionals who participated in the same poll expressed serious concerns about
    utilizing ChatGPT and other generative AI models, believing that these tools might
    deny patients the personal connection they require and cherish ([AlZaabi, AlMaskari
    and AalAbdulsalam, 2023](#ch20.xhtml#r508)). Stated differently, healthcare providers
    may view human interaction as a crucial component of providing healthcare consultations,
    and it’s possible that in-person consultations are more successful than those
    conducted via AI. However, it’s also important to take into account that the general
    public may not share these providers’ views on the importance of human interaction.
  prefs: []
  type: TYPE_NORMAL
- en: 12.1.2 Structure of the Chapter
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Moving ahead, this chapter is organized as follows: Section [12.2](#ch20.xhtml#h1-073)
    provides a brief elaboration on the literature review specifically focusing on
    the capabilities and prospects of ChatGPT. Section [12.3](#ch20.xhtml#h1-074)
    delves into the methodology, including details about our sample and the data collection
    process. The results are outlined in Section [12.4](#ch20.xhtml#h1-075), followed
    by a discussion part in Section [12.5](#ch20.xhtml#h1-076). Furthermore, Section
    [12.6](#ch20.xhtml#h1-077) covered the conclusion including implications and limitations.'
  prefs: []
  type: TYPE_NORMAL
- en: 12.2 Literature Review
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Overall, the researchers found that the guidance from ChatGPT was clear, consistent,
    and typically correct. This included information on the procedure’s risks and
    results, which the authors claimed should encourage reasonable expectations for
    the process ([Xie et al., 2023](#ch20.xhtml#r535)). However, ChatGPT is unable
    to offer customized guidance (such as how a particular patient’s nose would seem
    after the treatment), indicating that in the current iteration of ChatGPT, it
    is human-provided. In addition to the data that potential patients would obtain
    from ChatGPT, counseling would still be extremely important. Analogous endeavors
    have been undertaken in the field of mental health care, delving into the potential
    advantages and difficulties that ChatGPT might present for psychological therapy
    and other facets of mental health. The legal community has also been actively
    investigating how ChatGPT and other AI-powered technologies could be appropriately
    and morally incorporated into legal education and practice ([Ajevski et al., 2023](#ch20.xhtml#r506)).
    Nonetheless, the legal industry has been more cautious, and the incorporation
    of AI has generated a great deal of controversy. As a result, it is not yet broadly
    recognized in the legal area ([Goltz and Dondoli, 2019](#ch20.xhtml#r519); [Weiser
    and Schweber, 2023](#ch20.xhtml#r534)).
  prefs: []
  type: TYPE_NORMAL
- en: In particular, how may similar initiatives in non-educational fields enlighten
    us about providing academic help to present and incoming at Middle East College,
    Oman? Since ChatGPT’s introduction in November 2022, AI’s responsibilities in
    educational settings have attracted a lot of interest in higher education, although
    the excitement has been a little off-balance ([Zawacki-Richter et al., 2019](#ch20.xhtml#r537);
    [Crompton and Burke, 2023](#ch20.xhtml#r514)). The main topics of discussion have
    been concerns about plagiarism and other aspects of academic integrity and, to
    a lesser extent, pedagogical methods to promote teaching and learning, particularly
    with academic writing and medical education, even though scholars and practitioners
    alike seem to agree that ChatGPT and other AI tools have the potential to fundamentally
    change the landscape of higher education ([Anders, 2023](#ch20.xhtml#r509); [Dien,
    2023](#ch20.xhtml#r516); [McCarthy, 2023](#ch20.xhtml#r528); [Gill et al., 2024](#ch20.xhtml#r518)).
    Put differently, even though there seems to be a general consensus that AI will
    revolutionize our society and force us to rethink how people manage information
    in general, higher education research on ChatGPT and other AI-supported technologies
    has not yet shown this to be the case ([van der Niet and Bleakley, 2021](#ch20.xhtml#r532);
    [Barrot, 2023](#ch20.xhtml#r511); [Dashti et al., 2023](#ch20.xhtml#r515); [Rospigliosi,
    2023](#ch20.xhtml#r530)).
  prefs: []
  type: TYPE_NORMAL
- en: It has not investigated its effects outside of a small number of situations,
    frequently viewing them more as a threat than a possible asset. Perhaps as a result,
    there have been moves in educational institutions all over the world to prohibit
    or put a halt to ChatGPT and other AI-powered applications ([Zawacki-Richter et
    al., 2019](#ch20.xhtml#r537); [Crompton and Burke, 2023](#ch20.xhtml#r514); [Dien,
    2023](#ch20.xhtml#r516); [Gill et al., 2024](#ch20.xhtml#r518)). This could unintentionally
    prevent the adoption of a technology that could be very helpful in higher education
    ([Stojanov, 2023](#ch20.xhtml#r531)). As suggested by [Zawacki-Richter et al.
    (2019)](#ch20.xhtml#r537), in order to guarantee that diverse viewpoints will
    be represented as generative AI models spread both inside and outside of educational
    settings, we need to make sure that educators actively and proactively engage
    in discussions surrounding AI integration into the field of education.
  prefs: []
  type: TYPE_NORMAL
- en: Academic advising has been shown to be essential for student success, especially
    for students from underprivileged backgrounds. However, colleges frequently lack
    the resources necessary to hire full-time academic advisers and faculty advisers,
    who may not always be able to dedicate their time and attention to general academic
    advising due to their other responsibilities, including teaching, research, and
    mentoring honors and graduate students ([Blau et al., 2019](#ch20.xhtml#r512);
    [Chan et al., 2019](#ch20.xhtml#r513); [Johnson, Strayhorn and Travers, 2023](#ch20.xhtml#r523)).
    Higher education’s high-quality academic advice has also been connected to students’
    happiness and commitment to their college, which should increase retention ([Vianden
    and Barlow, 2015](#ch20.xhtml#r533)). Thus, it is not unexpected that certain
    elements of AI-powered tools started to be integrated into some pricey academic
    advising systems, such as education advisory board (EAB); yet, there are still
    difficulties in providing academic advice that is both efficient and accessible
    ([Johnson, Strayhorn and Travers, 2023](#ch20.xhtml#r523)). One reason is that
    these technologies are usually quite expensive for institutional subscriptions
    and are not available to the general public, which significantly restricts access.
    The key concerns identified by researchers and practitioners, among the many obstacles
    faced by college students seeking academic advising, are limited availability
    of advisers and difficulty scheduling appointments, and inconsistent fidelity
    of advice provided, which can often result in inaccurate or insufficient information
    provided by advisers ([Young-Jones et al., 2013](#ch20.xhtml#r536); [Apriceno,
    Levy and London, 2020](#ch20.xhtml#r510)). As of the submission of this manuscript,
    no published research seemed to have looked into the possible roles that freely
    available generative AI models, like ChatGPT, could play in academic advising
    or, in fact, the larger context of student service. This is based on an extensive
    database search conducted on education resources information center (ERIC), PsycINFO,
    SocINDEX, and Science Direct. The finding that there is a glaring vacuum in the
    literature on the subject of the effects of generative AI tools on education is
    supported by a newly released fast literature review ([Lo, 2023](#ch20.xhtml#r527)).
  prefs: []
  type: TYPE_NORMAL
- en: 'It may not be shocking that there hasn’t been any empirical study on this subject
    given that, as was previously said, most of the discussions around AI integration
    in education have focused on a limited number of topics, primarily related to
    plagiarism and instruction ([Anders, 2023](#ch20.xhtml#r509); [Dien, 2023](#ch20.xhtml#r516);
    [McCarthy, 2023](#ch20.xhtml#r528)). The goal of the current study, in contrast,
    is to broaden its scope and tackle generative AI integration from another angle.
    It is based on the following query: to what extent, if at all, may generative
    AI tools like ChatGPT help with these student service–related issues? The objective
    of the present exploratory investigation is to concentrate on the utilization
    of ChatGPT within the academic advising domain, subsequent to the previously mentioned
    published exploratory studies in several professional sectors ([Ajevski et al.,
    2023](#ch20.xhtml#r506); [Meissner and Garza, 2023](#ch20.xhtml#r529); [Xie et
    al., 2023](#ch20.xhtml#r535)). It might be important to emphasize again that the
    goal of this investigation is much broader in scope and is not limited to assessing
    ChatGPT as a tool in isolation. In particular, our goal is to investigate the
    present and potential applications of generative AI models, like ChatGPT, in the
    context of student advising a field that doesn’t seem to have received much attention,
    especially in light of the fact that student advising still presents difficulties
    pursuing careers and academic degrees, most frequently involving students from
    underrepresented demographic groups ([Harris, 2018](#ch20.xhtml#r521); [Ford et
    al., 2023](#ch20.xhtml#r517)). Then, why is ChatGPT picked, especially when we
    talk about AI-powered tools in the context of academic advising? First off, ChatGPT
    is by far the most popular AI-powered large language model currently available
    to the public. It is freely and widely accessible for anyone with access to digital
    devices and the internet ([Gill et al., 2024](#ch20.xhtml#r518)), even though
    other AI-powered large language models, like Google’s Bard and Microsoft’s Sydney,
    are still being released ([Akter et al., 2023](#ch20.xhtml#r507)). While there
    is a premium version of ChatGPT, the free version, which has a daily question
    restriction, has been tested and used extensively in the medical field with excellent
    results, including different situations, as already mentioned ([Xie et al., 2023](#ch20.xhtml#r535)).
    AI-powered solutions, like ChatGPT, are often accessible 24/7, seven days a week.
    This alone offers a significant benefit over human-provided advising because the
    majority of higher education institutions do not provide human-based advising
    around the clock. Since ChatGPT is free of charge, actively using it might help
    support educational equity, especially for incoming and existing students who
    may not have as much access to paid advisors or personal networks for answers
    to queries about schooling and careers. Students may also ask questions in their
    native tongue using ChatGPT, and it will reply in words that are comparable to
    what they would say in daily life. Considering that certain research indicates
    that academic language is an obstacle to learning, which serves to preserve educational
    inequity which is a really desired quality ([Jensen and Thompson, 2020](#ch20.xhtml#r522)).
    Similarly, the integration of ChatGPT into academic advising has the potential
    to empower all students equally due to its excellent accessibility, since almost
    no technical experience or understanding of the platform-specific user interface
    is needed to use ChatGPT. However, before we can investigate this further, it
    would be important to find out how ChatGPT performs in terms of the quality of
    the advice it provides. This exploratory report will closely examine the guidance
    offered by ChatGPT’s free version on two topics: general inquiries concerning
    the career of Middle East College students, and inquiries pertaining to general
    educational questions.'
  prefs: []
  type: TYPE_NORMAL
- en: 12.3 Methodology
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'The authors conducted an exploratory study using the same research methodology
    as ([Xie *et al.*, 2023](#ch20.xhtml#r535)). Our goal was to investigate the quality
    of the advice provided by ChatGPT’s free version, which is based on GPT 3.5, regarding
    general inquiries concerning the career of Middle East College students, and inquiries
    pertaining to general educational questions. For the purpose of stimulating additional
    in-depth research on the subject of generative AI-integrated academic coaching,
    narrative summaries of the responses produced by ChatGPT are provided. Selection
    of research questions for this project. The most common questions from prospective
    or current students were generated by the authors using the advising record from
    2021 to 2023\. Then, questions that mostly dealt with (a) extremely unique situations
    were eliminated, such as what are some useful resources for preparing for my upcoming
    supply chain exam? (b) recent and transient circumstances “Considering the current
    global economic challenges, can you provide insights into how these economic uncertainties
    might impact the job market for recent graduates in Oman, specifically in the
    field of Business Administration and Computer Science?”, or (c) straightforward
    inquiries with readily available information “What are the admission requirements
    for the undergraduate program at Middle East College Oman, and where can I find
    detailed information about the application process?”. The primary reasons for
    not including these questions were as follows: (a) ChatGPT is not currently equipped
    to evaluate each student’s situation or profile because it lacks access to the
    necessary data; (b) ChatGPT’s responses will typically not include data that became
    available after 2021; and (c) extremely straightforward factual questions don’t
    need the use of an AI tool because the answers are readily available. Five questions
    were ultimately chosen for the present exploratory investigation shown in [Table
    12.1](#ch20.xhtml#t22). Of the five, two are unique to our students’ general education
    questions, and the other three are generally related to a career of Middle East
    College students.'
  prefs: []
  type: TYPE_NORMAL
- en: '[Table 12.1](#ch20.xhtml#t22b) Five questions that are frequently asked by
    current and prospective students included in the current exploratory study'
  prefs: []
  type: TYPE_NORMAL
- en: '| • *Q1.* “I’m struggling with understanding calculus/Mathematics concepts.
    Can you provide explanations?” |'
  prefs: []
  type: TYPE_TB
- en: '| • *Q2.* “What are some key historical events related to the Middle East that
    I should include in my project?” |'
  prefs: []
  type: TYPE_TB
- en: '| • *Q3.* “What career paths are common for graduates in computer science?”
    |'
  prefs: []
  type: TYPE_TB
- en: '| • *Q4.* “Can you provide insights into job opportunities in logistics and
    supply chain management?” |'
  prefs: []
  type: TYPE_TB
- en: '| • *Q5.* “I’m currently a business student at Middle East College Oman, and
    I’m interested in pursuing a career in finance. What are some recommended steps
    or resources to help me prepare for a finance-related internship or job opportunity?”
    |'
  prefs: []
  type: TYPE_TB
- en: Through random sampling, ChatGPT’s algorithms provide a variety of responses,
    allowing for variation in responses to the same query ([Gupta et al., 2023](#ch20.xhtml#r520)).
    Because of this, the initial response to each question was evaluated for quality
    for the purposes of this study, in accordance with the methodology applied in
    earlier published research ([Xie et al., 2023](#ch20.xhtml#r535)). Using GPT 3.5,
    the writers consecutively wrote these queries on ChatGPT’s free account, recording
    each response. The quality of each response was then assessed based on the previously
    mentioned factors, including correctness, thoroughness, timeliness, and general
    tone. The choice was made early on not to quantify the results since, to the best
    of the authors’ knowledge, this is exploratory research and no previous data was
    available.
  prefs: []
  type: TYPE_NORMAL
- en: 12.4 Analysis and Findings
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In general, ChatGPT’s comments go considerably beyond our expectations in terms
    of quality, with a thoughtful focus on encouraging the person presenting the question
    to refer to other relevant resources on occasion. As will be discussed in more
    depth below, we actually discovered that ChatGPT’s responses to a few of the queries
    were of a better quality than those that many human advisors may be able to supply.
    Furthermore, ChatGPT’s responses had a definite professional yet approachable
    and encouraging tone.
  prefs: []
  type: TYPE_NORMAL
- en: It would have been important to have (a) consulted with a variety of resources
    and, more crucially, (b) with outlines or rules to guarantee adequate coverage
    during consultations in order for human academic advisers to produce responses
    of this level. When students are required to learn so much factual material in
    so many different areas, the quality of guidance from human advisors will inevitably
    differ. Therefore, we firmly believe that the response ChatGPT generated here,
    when combined with appropriate fact-checking and correction, may serve as a great
    (a) first point of reference for students who are enquiring and (b) a “template”
    that human advisers may use to counsel both present and potential advisees. Additionally,
    these responses might be easily uploaded on the organization’s website to improve
    information-sharing efforts after they have been calibrated appropriately. In
    general, the answers, to the three questions regarding career paths in job opportunities
    in logistics and supply chain management (SCM) and advice for a finance-related
    career at Middle East College, Oman, are impressively informative and practical.
    The responses from ChatGPT offer insights and guidance for students and aspiring
    professionals interested in these fields.
  prefs: []
  type: TYPE_NORMAL
- en: The first question explores the career paths of the university graduates ([Figure
    12.1](#ch20.xhtml#f33)). The response demonstrates an understanding of the field’s
    nature highlighting important roles like software developer/engineer, systems
    analyst, and data scientist/analyst. Each career path is described in detail,
    including responsibilities, required skills, and potential areas of specialization.
    The emphasis on the changing industry landscape and the importance of learning
    reflects a nuanced perspective on the demands and opportunities. Likewise, when
    it comes to job opportunities in logistics and SCM a comprehensive response is
    provided. The breakdown of roles such as supply chain analyst, logistics coordinator,
    procurement specialist, and warehouse manager offers an overview of the prospects
    within this field. Including skills for each role mentioned above underscores
    the aspects involved in pursuing a career in logistics and SCM. The response does
    not provide information, about the roles. Also highlights the broader importance
    of these positions in ensuring smooth movement of goods. This contributes to an
    understanding of the industry ([Figure 12.2).](#ch20.xhtml#f34)
  prefs: []
  type: TYPE_NORMAL
- en: '![A screenshot depicts a conversation between a user and Chat G P T. The user
    asks for recommendations to prepare for a finance-related internship or job. Chat
    G P T responds with ten detailed steps, including building a strong foundation,
    gaining practical experience, and networking.](html/images/9781032716084_C012_001.jpg)'
  prefs: []
  type: TYPE_IMG
- en: '[Figure 12.1](#ch20.xhtml#f33b) ChatGPT’s response to the question, “I’m currently
    a business student at MEC Oman, and I’m interested in pursuing a career in finance.
    What are some recommended steps or resources to help me prepare for a finance-related
    internship or job opportunity?”'
  prefs: []
  type: TYPE_NORMAL
- en: '![A screenshot depicts a conversation between a user and Chat G P T. The user
    asks for insights into job opportunities in logistics and supply chain management.
    Chat G P T lists ten roles including logistics coordinator, supply chain analyst,
    warehouse manager, and logistics director or V P, each with a brief description
    of responsibilities.](html/images/9781032716084_C012_002.jpg)'
  prefs: []
  type: TYPE_IMG
- en: '[Figure 12.2](#ch20.xhtml#f34b) ChatGPT’s answer to “Can you provide insights
    into job opportunities in Logistics and supply chain management?”'
  prefs: []
  type: TYPE_NORMAL
- en: The third question asks for advice on pursuing a finance-related career for
    business students at Middle East College, Oman. The response is detailed and practical
    covering aspects such as excellence, internships, networking, professional certifications,
    online resources, building resumes, mock interviews, and involvement in professional
    organizations developing soft skills, and staying up to date with industry trends
    ([Figure 12.3](#ch20.xhtml#f35)). The step-by-step recommendations offer guidance
    for aspiring finance professionals in both practical aspects. The emphasis on
    skills and keeping informed about industry trends demonstrates an understanding
    of the nature of success in the finance sector. In terms of substance and tone,
    these responses strike a balance, the language used is clear, concise, and tailored
    to the intended audience. The information is presented in a manner that’s easily
    understandable, for individuals seeking guidance in these fields. Moreover, beyond
    providing information the responses offer valuable insights that can benefit individuals
    at various stages of their career exploration or development. All three responses
    demonstrate a strength in recognizing the unique aspects of these professions.
    Whether discussing the paths in computer science job opportunities in logistics
    or preparing for a finance-related career the responses acknowledge the importance
    of professional growth, soft skills, and the ever-evolving nature of these industries.
    Considering how comprehensive, clear, and practical these responses are they could
    serve as examples for advisors. The amount of information provided by ChatGPT
    surpasses what is typically offered in face-to-face sessions. These responses
    can be a resource especially when it comes to covering nuanced information without
    relying on strict templates or guidebooks. Furthermore, the encouraging language
    and tone used in the responses contribute to a motivating narrative. This is particularly
    evident in the financial advice section where the final paragraph strikes a balance
    between development and making contributions within a finance career. Such encouragement
    plays a role in inspiring students. Guiding them toward fulfilling careers that
    make an impact.
  prefs: []
  type: TYPE_NORMAL
- en: '![A screenshot depicts a conversation between a user and Chat G P T. The user
    asks about common career paths for graduates in computer science. Chat G P T lists
    fourteen roles, including software developer, systems analyst, data scientist,
    network engineer, and database administrator, each with a brief description.](html/images/9781032716084_C012_003.jpg)'
  prefs: []
  type: TYPE_IMG
- en: '[Figure 12.3](#ch20.xhtml#f35b) ChatGPT’s response to the question, “What career
    paths are common for graduates in computer science?”'
  prefs: []
  type: TYPE_NORMAL
- en: To conclude the responses, to all three questions demonstrate ChatGPT’s ability
    to provide nuanced and uplifting guidance across professional fields. These responses
    generated by AI have the potential to be resources, for people who are looking
    for guidance in their career journeys. If these responses were included on websites,
    it could make high-quality information more accessible to a range of individuals.
  prefs: []
  type: TYPE_NORMAL
- en: When it comes to discussing calculus concepts ChatGPT delivers a well-organized
    explanation of the principles in calculus. The response covers topics, like limits,
    derivatives, rules of differentiation, integrals, techniques of integration, and
    the practical applications of derivatives and integrals ([Figure 12.4).](#ch20.xhtml#f36)
    The language used is clear and understandable with real-world examples that help
    bridge the gap between theory and practicality. One standout aspect of ChatGPT’s
    response is its encouragement for engagement. By inviting users to ask questions
    or seek clarification on problems the AI model demonstrates an understanding of
    personalized learning. Additionally, suggesting practice problems and working
    through examples aligns with learning strategies ([Figure 12.5).](#ch20.xhtml#f37)
    Shifting our focus to historical events in the Middle East ChatGPT provides a
    concise yet informative overview of significant moments spanning from the emergence
    of Islam in the 7th century to recent developments like the normalization of relations
    in 2020. Covering empires such as the Ottoman and Safavid dynasties conflicts
    like the Israeli Conflict and Syrian Civil War as well as geopolitical shifts,
    like the Gulf War and Iran Nuclear Deal creates a comprehensive and balanced portrayal
    of the region’s history. The response shows a balance, between providing an overview
    and delving into specific details. It manages to give a narrative while also recognizing
    the potential for deeper exploration based on the user’s project focus. The chronological
    arrangement helps in understanding the progression of events. Each event is concisely
    described, capturing its context and importance.
  prefs: []
  type: TYPE_NORMAL
- en: '![A screenshot depicts a conversation between a user and Chat G P T. The user
    asks to explain calculus concepts. Chat G P T lists five fundamental calculus
    concepts, including derivatives, differentiation rules, integration, fundamental
    theorem of calculus, and application of calculus, each with a brief description.](html/images/9781032716084_C012_004.jpg)'
  prefs: []
  type: TYPE_IMG
- en: '[Figure 12.4](#ch20.xhtml#f36b) ChatGPT’s response to the question, “I’m struggling
    with understanding calculus concepts. Can you provide explanations?”'
  prefs: []
  type: TYPE_NORMAL
- en: '![A screenshot depicts a conversation between a user and Chat G P T. The user
    asks about some key historical events related to the Middle East that can be included
    in their project. Chat G P T lists 10 events, including the rise of Islam, the
    Crusades, World War 1, the Syrian Civil War, and the Gulf War, each with a brief
    description.](html/images/9781032716084_C012_005.jpg)'
  prefs: []
  type: TYPE_IMG
- en: '[Figure 12.5](#ch20.xhtml#f37b) ChatGPT’s answer for: “What are some key historical
    events related to the Middle East that I should include in my project?”'
  prefs: []
  type: TYPE_NORMAL
- en: ChatGPT’s ability to offer relevant information on both calculus concepts and
    Middle Eastern history highlights its potential as an educational tool. The depth
    of information in both responses goes beyond facts incorporating explanations,
    applications, and encouragement for engagement. Although the responses are impressive
    in terms of their content and clarity it’s crucial to acknowledge that the effectiveness
    of guidance in complex subjects like calculus depends on the user’s active involvement
    and participation. By inviting users to seek clarification or ask questions, ChatGPT
    encourages a learning experience. To sum up, ChatGPT demonstrates a capability
    to provide explanations that are user-friendly across various inquiries. The information
    given about calculus concepts and Eastern historical events is well-structured
    and informative. It shows an understanding of user’s potential need for more clarification
    or exploration. Like any tool, the success of its impact ultimately depends on
    how users engage with and apply the information provided in their learning process.
  prefs: []
  type: TYPE_NORMAL
- en: 12.5 Discussion
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The study presented here about the use of AI models, ChatGPT, for providing
    academic advice in higher education is quite fascinating and holds great potential.
    The authors, who are college professors experienced in guiding students, highlight
    how the model can offer detailed responses to career-related questions. The focus
    on aspects like career steps and expectations in professions showcases ChatGPT’s
    ability to provide broad guidance. The study acknowledges the limitations of AI
    models including accuracy issues and a lack of access to program or personal information.
    However, it emphasizes the value of ChatGPT as a tool to initiate the process
    of gathering information. It suggests that students can utilize AI-based tools
    like ChatGPT as a starting point for their inquiries and then seek clarification
    or confirmation from advisors, which aligns with a blended approach to advising.
    One notable aspect is the emphasis on AI technologies not replacing one-on-one
    assistance but rather complementing it. The study suggests a synergy, between
    ChatGPT and human advisors, where the model acts as a source of information while
    human advisors can provide nuanced and personalized guidance based on the insights
    generated by ChatGPT. The research presents an argument, for incorporating AI-powered
    language models into advising, particularly for students who face difficulties
    in accessing high-quality guidance.
  prefs: []
  type: TYPE_NORMAL
- en: 12.6 Conclusion
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The accessibility of ChatGPT and its ability to engage users in their native
    language address the need for support for students from disadvantaged backgrounds.
    However, the research acknowledges the importance of user proficiency in formulating
    queries and understanding the capabilities and limitations of the model. It suggests
    that while AI tools like ChatGPT have barriers to entry users may need to develop
    expertise to make the most out of them. This echoes the idea that technology is
    most effective when users have a grasp of how to use it optimally. Additionally,
    the study encourages students to view ChatGPT as a tool rather than an authoritative
    source recognizing that it has limitations in providing comprehensive and completely
    accurate information. The recommendation for follow-up questions and further exploration
    reflects an approach considering the capabilities of AI models. Finally, the study
    concludes by emphasizing its nature and proposes directions for research including
    a more comprehensive evaluation of AI-generated responses, expansion into various
    academic subjects, and investigation into other generative AI models. To sum up,
    the research highlights the promising prospects of AI models such, as ChatGPT
    in improving advising. It acknowledges the significance of an approach that combines
    AI technologies with knowledge to offer students thorough and customized assistance.
    The request for investigation and exploration in this field demonstrates an increasing
    enthusiasm, for utilizing AI to enhance education.
  prefs: []
