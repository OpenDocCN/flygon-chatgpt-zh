- en: '*This book has been a long time in the making, and I am deeply grateful to
    my loving wife, Lucy, for her constant support and understanding of the late nights,
    dodged housework, and endless sacrifices she made to help me see it through to
    completion. To my kids, Fletcher and Amalie, your boundless energy and smiles
    have been my greatest motivation.*'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: '*这本书的完成历时已久，我衷心感谢我的爱人，露西，她始终如一的支持和理解，包括那些漫长的夜晚，逃避家务，以及她为了帮助我完成这本书所做出的无尽牺牲。对我孩子们，弗莱彻和阿玛莉，你们无穷无尽的能量和笑容是我最大的动力。*'
