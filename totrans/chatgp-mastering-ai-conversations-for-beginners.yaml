  id: totrans-442
  prefs: []
  type: TYPE_NORMAL
  zh: '**注意力机制**利用了生成式人工智能领域中被称作**Transformer**的模型。Transformer是一组或“家族”的机器学习架构，允许LLMs如ChatGPT确定我们在提示中输入的各个单词的重要性。它是通过使用所谓的**自注意力机制**来做到这一点的。这个机制根据三个矩阵：查询、键和值（Muñoz，2020）来权衡你的提示。不仅如此，它还使用这些关键元素来权衡其对你的提示的响应，因此随着聊天线程的进展，它可以给出更准确的结果。这被称为AI的“自注意力”机制。这一切都加在一起（或由AI添加）使聊天机器人能够理解围绕问题的某些上下文，而不仅仅是依赖于提示中的单词。使用从查询、键和值三个矩阵中获得的关注度分数，ChatGPT可以衡量它应该根据它对这些单词的了解、你如何表述先前的提示，以及你在句子中放置单词的位置——以及围绕它的单词（形成“信息块”）——来关注序列中的各个单词。这便是生成式人工智能领域中的新需求工作——提示工程——开始发挥作用的地方。'
