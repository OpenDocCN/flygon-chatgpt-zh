- en: '**DB Browser for SQLite Installation**'
  id: totrans-1780
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '**SQLite浏览器安装**'
- en: DB Browser is an open source and visual-oriented tool for SQLite that that enables
    you to perform various database-related operations, such as creating and updating
    files. Moreover, this tool enables you to manage data through an interface that
    resembles a spreadsheet.
  id: totrans-1781
  prefs: []
  type: TYPE_NORMAL
  zh: DB Browser 是一个开源且面向视觉的工具，用于 SQLite，它允许你执行各种数据库相关操作，例如创建和更新文件。此外，此工具允许你通过类似于电子表格的界面管理数据。
- en: 'Navigate to the following Web site, download the distribution for your operating
    system, and perform the specified installation steps:'
  id: totrans-1782
  prefs: []
  type: TYPE_NORMAL
  zh: 导航到以下网站，下载适用于您操作系统的发行版，并执行指定的安装步骤：
- en: '*[https://www.macupdate.com/app/mac/38584/db-browser-for-sqlite/download/secure](https://www.macupdate.com/app/mac/38584/db-browser-for-sqlite/download/secure)*'
  id: totrans-1783
  prefs: []
  type: TYPE_NORMAL
  zh: '*[https://www.macupdate.com/app/mac/38584/db-browser-for-sqlite/download/secure](https://www.macupdate.com/app/mac/38584/db-browser-for-sqlite/download/secure)*'
- en: 'The following Web site contains a multitude of URLs that provide details regarding
    the features of DB Browser:'
  id: totrans-1784
  prefs: []
  type: TYPE_NORMAL
  zh: 以下网站包含许多 URL，提供了有关 DB Browser 功能的详细信息：
- en: '*[https://sqlitebrowser.org](https://sqlitebrowser.org)*'
  id: totrans-1785
  prefs: []
  type: TYPE_NORMAL
  zh: '*[https://sqlitebrowser.org](https://sqlitebrowser.org)*'
