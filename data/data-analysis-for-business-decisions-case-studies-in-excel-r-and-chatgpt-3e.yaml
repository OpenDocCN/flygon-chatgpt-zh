  prefs: []
  type: TYPE_NORMAL
  zh: 泰坦尼克号乘客的年龄分布，如图中箱线图所示，主要从年轻人到中年人，中位年龄约为28岁。大多数乘客集中在20至38岁之间，反映了年轻乘客的人口统计特征。此外，还有一些异常值，代表了一些显著超过典型年龄范围的老年人。
