- en: Tomorrow, you’ll learn how to automate repetitive tasks and boost daily productivity.
  id: totrans-233
  prefs: []
  type: TYPE_NORMAL
  zh: 明天，你将学习如何自动化重复性任务并提高日常生产力。
- en: Day 4 – Automating Tasks with ChatGPT
  id: totrans-234
  prefs: []
  type: TYPE_NORMAL
  zh: 第4天 – 使用ChatGPT自动化任务
- en: 'Objective: Discover how to automate repetitive or time-consuming tasks using
    ChatGPT and reduce your daily workload.'
  id: totrans-235
  prefs: []
  type: TYPE_NORMAL
  zh: 目标：发现如何使用ChatGPT自动化重复或耗时任务，以减少你的日常工作量。
- en: '* * *'
  id: totrans-236
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Why This Matters
  id: totrans-237
  prefs: []
  type: TYPE_NORMAL
  zh: 这为什么重要
- en: One of ChatGPT’s greatest strengths is automating small, repetitive tasks. Whether
    you're writing, organizing, or planning, ChatGPT can handle much of the heavy
    lifting with the right instructions.
  id: totrans-238
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT最大的优势之一是自动化小型重复性任务。无论你是写作、组织还是规划，ChatGPT都可以通过正确的指令处理大量的繁重工作。
- en: '* * *'
  id: totrans-239
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Step 1: Identify Repetitive Tasks'
  id: totrans-240
  prefs: []
  type: TYPE_NORMAL
  zh: 第1步：识别重复性任务
- en: 'Start by listing what you do frequently:'
  id: totrans-241
  prefs: []
  type: TYPE_NORMAL
  zh: 从列出你经常做的事情开始：
- en: Writing emails
  id: totrans-242
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 写邮件
- en: Summarizing meetings
  id: totrans-243
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 总结会议
- en: Drafting social media posts
  id: totrans-244
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 撰写社交媒体帖子
- en: Reformatting documents
  id: totrans-245
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 重新格式化文档
- en: Creating checklists or SOPs
  id: totrans-246
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 创建清单或SOP
- en: Pick 1 or 2 that you'd like to offload.
  id: totrans-247
  prefs: []
  type: TYPE_NORMAL
  zh: 选择1或2个你想委托的任务。
- en: “Write a follow-up email thanking someone for a meeting and summarizing next
    steps.”
  id: totrans-248
  prefs: []
  type: TYPE_NORMAL
  zh: “写一封感谢某人会议并总结下一步行动的跟进电子邮件。”
- en: “Create a social media calendar with 5 posts a week, each with a caption and
    emoji.”
  id: totrans-249
  prefs: []
  type: TYPE_NORMAL
  zh: “创建一个每周5个帖子的社交媒体日历，每个帖子都附有标题和表情符号。”
