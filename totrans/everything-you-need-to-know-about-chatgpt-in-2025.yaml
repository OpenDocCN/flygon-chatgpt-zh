  id: totrans-388
  prefs: []
  type: TYPE_NORMAL
  zh: '**AI** **用户**，对于他们的部分，也扮演着至关重要的角色来参与对技术的负责任使用。虽然访问生成式AI模型相对直接，但人们应该意识到与传播错误或有害内容相关的风险。用户必须对所接收的信息保持批判性，并以道德的方式使用AI工具，承担与分享任何其他类型内容相同的责任。教育机构、企业和媒体平台也有义务教育人们如何以道德和负责任的方式与人工智能互动。'
