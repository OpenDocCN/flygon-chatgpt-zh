  prefs: []
  type: TYPE_NORMAL
  zh: '**人工智能**的一个子领域，允许机器从数据中学习，而无需明确编程以执行特定任务。通过算法，机器学习系统分析数据中的模式，以做出预测或决策。机器学习模型分为**监督学习**、**无监督学习**和**强化学习**。'
