  type: TYPE_NORMAL
  zh: '运行这个类后，你会得到一个包含 OpenAI API 提供的所有模型的 JSON 文件，如列表 [2-3](#PC3) 所示。![](../images/607613_1_En_2_Chapter/607613_1_En_2_Figb_HTML.gif)Open
