    how to plot horizontal lines using Matplotlib. Recall that the equation of a non-vertical
    line in the 2D plane is y = m*x + b, where m is the slope of the line and b is
    the y-intercept of the line.'
  id: totrans-1910
  prefs: []
  type: TYPE_NORMAL
  zh: '[列表 5.5](#list5-5) 显示了 hlines1.py 的内容，该内容说明了如何使用 Matplotlib 绘制水平线。回想一下，二维平面中非垂直线的方程是
    y = m*x + b，其中 m 是线的斜率，b 是线的 y 截距。'
