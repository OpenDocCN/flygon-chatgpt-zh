  prefs: []
  type: TYPE_NORMAL
  zh: • 图像生成：DALL·E、MidJourney、Stable Diffusion
- en: '• Music & Audio: Jukebox by OpenAI, Magenta by Google'
  id: totrans-602
  prefs: []
  type: TYPE_NORMAL
  zh: • 音乐与音频：OpenAI的Jukebox，Google的Magenta
- en: '• Code Generation: Codex, CodeGen, AlphaCode'
  id: totrans-603
  prefs: []
  type: TYPE_NORMAL
  zh: • 代码生成：Codex、CodeGen、AlphaCode
- en: 'Case Study: A start-up integrated GPT-4 into its AI-based resume-building software,
    increasing efficiency by 80%.'
  id: totrans-604
  prefs: []
  type: TYPE_NORMAL
  zh: 案例研究：一家初创公司将其GPT-4集成到基于人工智能的简历构建软件中，效率提高了80%。
- en: '9.2.3 Step 3: Collect & Pre-process Data'
  id: totrans-605
  prefs: []
  type: TYPE_NORMAL
  zh: 9.2.3 步骤 3：收集与预处理数据
- en: '• Sourcing Data: Open datasets from Kaggle, Hugging Face, or proprietary data.'
  id: totrans-606
  prefs: []
  type: TYPE_NORMAL
  zh: • 数据来源：来自Kaggle、Hugging Face或专有数据的开放数据集。
- en: '• Data Cleaning: Removing noise, duplicates, and ensuring diversity.'
  id: totrans-607
  prefs: []
  type: TYPE_NORMAL
  zh: • 数据清洗：去除噪声、重复数据并确保多样性。
- en: '• Annotation & Labelling: Essential for supervised learning models.'
  id: totrans-608
  prefs: []
  type: TYPE_NORMAL
  zh: • 标注与标签：对于监督学习模型至关重要。
- en: '9.2.4 Step 4: Train or Fine-Tune the Model'
  id: totrans-609
  prefs: []
