- en: 'What Copilot AI in Microsoft Teams Can Be Used for in Chat, in Detail:'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: '● Help Answer Questions: Copilot assists in answering chat queries by providing
    accurate responses tailored to the context. For instance, if someone asks, "How
    to set up a meeting," Copilot may suggest a suitable answer like "Go to the Meetings
    tab and select ''Create meeting.''"'
  prefs: []
  type: TYPE_NORMAL
- en: '● Help Create Messages: Copilot aids in crafting chat messages, offering words
    and sentences that align with the conversation. For example, if a user wants to
    congratulate a friend on passing an exam, Copilot might suggest phrases like "Congratulations
    on your success" or "Wishing you continued success in your career."'
  prefs: []
  type: TYPE_NORMAL
- en: '● Language Translation: Copilot excels in translating between different languages.
    If a user wishes to translate a Thai message into English, Copilot can accurately
    render the translation, ensuring messages like "Congratulations on your success"
    become "Congratulations on your achievement."'
  prefs: []
  type: TYPE_NORMAL
- en: '● Coding Assistance: Copilot supports coding tasks by providing relevant formulas,
    functions, and coding methods based on the programming language in use. For instance,
    if a user wants to write Python code for sales calculations, Copilot might offer
    helpful suggestions like "Sales = Product * Price."'
  prefs: []
  type: TYPE_NORMAL
- en: '● Content Creation: Copilot extends its assistance beyond chat by helping users
    create various content types such as poetry, songs, plays, and more.'
  prefs: []
  type: TYPE_NORMAL
- en: 'An Example Case Study: How Copilot Enhances Microsoft Teams Chat'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: ● Help Answer Questions
  prefs: []
  type: TYPE_NORMAL
- en: 'Imagine a user chatting with a friend seeking guidance on setting up a meeting.
    In the "How to Set Up a Meeting" section, users can leverage Copilot to answer
    questions. The user can use the prompt command as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: Howtosetupameeting
  prefs: []
  type: TYPE_NORMAL
- en: Copilot provides accurate and appropriate answers, such as “Go to the Meetings
    tab and select 'Create meeting'.
  prefs: []
  type: TYPE_NORMAL
- en: ● Help Create a Message
  prefs: []
  type: TYPE_NORMAL
- en: 'Consider a user chatting with a customer to express congratulations on a purchase.
    Copilot can assist in crafting messages. The user can use the prompt command as
    follows:'
  prefs: []
  type: TYPE_NORMAL
- en: Congratulationstocustomers
  prefs: []
  type: TYPE_NORMAL
- en: Copilot generates fitting congratulatory messages like "Congratulations on your
    decision to purchase our product" or "We hope you are satisfied with our product."
  prefs: []
  type: TYPE_NORMAL
- en: ● Help Translate
  prefs: []
  type: TYPE_NORMAL
- en: 'In a scenario where a user is chatting with a foreign customer and needs to
    translate Thai text into English, Copilot can aid in translation. The user can
    use the prompt command as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: Translate "Congratulations on your success" into English.
  prefs: []
  type: TYPE_NORMAL
- en: Copilot accurately translates the text, providing an appropriate version such
    as "Congratulations on your achievement."
  prefs: []
  type: TYPE_NORMAL
- en: Copilot is a powerful and extremely useful tool for Microsoft Teams users, enhancing
    efficiency in chat by offering various suggestions during ongoing conversations.
  prefs: []
  type: TYPE_NORMAL
