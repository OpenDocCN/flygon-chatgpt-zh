  zh: ○ {"****描述每一步" ["****指导模型解释过程的每个阶段，例如 1 到 5"]}
- en: ○        {"****Th**ink** ****be**for**e ****y**ou** ****an**swe**r" ["****Rein**forc**e
    ****t**he** ****ne**ed** ****t**o** ****ana**lyz**e ****t**he** ****pro**ble**m
    ****i**n** ****pa**rts**"]}
  id: totrans-109
