    ****ins**tea**d ****o**f** ****as**kin**g ****dir**ectl**y ****o**r** ****prov**idin**g
    ****exa**mple**s, ****i**t** ****ref**rame**s ****t**he** ****que**stio**n ****t**o**
    ****exp**lor**e ****n**ew** ****resp**onse**s. ****Wh**ile** ****Ze**ro**- ****sh**ot**
    ****a**nd** ****F**ew**-****sh**ot** ****fo**cus** ****o**n** ****t**he** ****ini**tia**l
    ****pr**omp**t ****a**nd** ****exa**mple**s ****gi**ven**, ****Refr**amin**g ****cha**nge**s
    ****t**he** ****que**stio**n ****it**sel**f ****t**o** ****enco**urag**e ****a****
    ****div**ers**e ****app**roac**h.'
  id: totrans-329
  prefs: []
  type: TYPE_NORMAL
  zh: '****重构** ****与** ****零** ****次** ****提示** ****和** ****少量** ****次** ****提示**
    ****不同** ，****因为****它** ****不是** ****直接** ****提问** ****或** ****提供** ****示例** ，****而是**
    ****重构** ****问题** ****以** ****探索** ****新的** ****回答** .****虽然** ****零** ****次**
    ****提示** ****和** ****少量** ****次** ****提示** ****关注** ****初始** ****提示** ****和**
    ****提供的** ****示例** ，****但** ****重构** ****改变** ****问题** ****本身** ****以** ****鼓励**
    ****不同的** ****方法** .'
