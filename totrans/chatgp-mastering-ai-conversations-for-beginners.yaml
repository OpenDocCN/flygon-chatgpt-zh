  id: totrans-348
  prefs: []
  type: TYPE_NORMAL
  zh: '**《机器人战争》**是关于人工智能的完美例证。它结合了工程和计算机科学，机器人处理的是创造可编程机器（机器人）的过程，这些机器可以帮助人们或可以复制人类动作。起初，机器人只是处理那些非常基础、单调的任务，比如那些“传送带”工作，如装配线工作、包装等。随着技术的发展，机器人现在被编程来处理家庭任务（想想智能家居和Siri，你的家庭助手），商业世界中的工作（你的银行应用），甚至还在军事中服役（保密）。'
