- en: '[2](15580-0016.xhtml#en179r). David Donoho at Stanford has attributed the rapid
    pace of AI to “frictionless reproducibility” from open source tools and benchmark
    competitions (“Data Science at the Singularity,” *Harvard Data Science Review*
    6, no. 1, 2024). Genomics and neuroscience are examples of how open data accelerated
    discovery in biology and medicine.'
  id: totrans-1948
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '[2](15580-0016.xhtml#en179r). 斯坦福大学的 David Donoho 将人工智能的快速发展归因于开源工具和基准竞赛带来的“无摩擦可重复性”（“奇点数据科学”，*哈佛数据科学评论*
    6，第1期，2024年）。基因组学和神经科学是开放数据如何加速生物学和医学发现的例子。'
