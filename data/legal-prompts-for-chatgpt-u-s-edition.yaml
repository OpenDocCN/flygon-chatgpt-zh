  prefs: []
  type: TYPE_NORMAL
  zh: • 写一份基本的知识产权转让协议。
- en: • Generate a contract clause allowing for arbitration over litigation.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: • 生成一份允许通过仲裁而非诉讼的合同条款。
- en: • Draft a boilerplate “entire agreement” clause.
