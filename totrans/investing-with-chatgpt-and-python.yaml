  id: totrans-1457
  prefs: []
  type: TYPE_NORMAL
  zh: API：Coinbase Pro 的 API 允许您访问市场数据，下订单和管理账户。
- en: 'Benefits: Ease of use, high security, seamless integration with Coinbase.'
