    **t**h**e** **m**o**d**e**l **h**o**w** **i**t **s**h**o**u**l**d **b**e**h**a**v**e**.'
- en: '****T**he** ****exa**mple**s ****pro**vide**d ****sh**oul**d ****b**e** ****repre**sentati**ve
