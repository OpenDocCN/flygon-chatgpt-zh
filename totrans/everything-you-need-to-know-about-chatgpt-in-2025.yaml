  id: totrans-585
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能模型中的偏差指的是系统倾向于反映提供的数据中的人类偏差。这些偏差可能来自训练数据并体现在模型生成的响应中。偏差可能是一个重大的道德挑战，因为它可能
    perpetuate刻板印象、歧视或误导信息。
- en: '****1****5****. ****De****e**p** ****Lea**r**ni**ng**:'
