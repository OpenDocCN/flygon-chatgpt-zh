    sure to remove the “0” and “6” response rows for Q7 and the blank and “3” responses
    for Q21\. Perform a chi-squared test to assure that the variables are dependent.
    Check the percentage approval using the sum of the number of the “4” and “5” ratings.
    Note the addition of a Sparkline graph to visualize the differences across income
    levels.
