- en: Using the Case Dataset files provided, find the file 2016_SFO_Customer_Survey_Data.xls.
    Open the data dictionary file and have it available to consult as you work with
    the data. Open 2016_SFO_Customer_Survey_Data.xls using Excel. Save the reshaped
    data file to your computer as SFOAirportSurvey2016.xlsx. Tabulate the number of
    men and women taking the survey ([Figure 5.25](#fig5-25)). Is the difference between
    men and women larger than 10% or about evenly distributed? Make sure to use the
    filter option on the row categories to only select “Male” and “Female” counts.
  id: totrans-783
  prefs: []
  type: TYPE_NORMAL
  zh: 使用提供的案例数据集文件，找到文件 2016_SFO_Customer_Survey_Data.xls。打开数据字典文件，并在处理数据时可供参考。使用
    Excel 打开 2016_SFO_Customer_Survey_Data.xls。将重塑后的数据文件保存到您的计算机上，命名为 SFOAirportSurvey2016.xlsx。统计参与调查的男性和女性人数（[图
    5.25](#fig5-25)）。男性和女性之间的差异是否大于 10% 或大致均匀分布？请确保使用行类别上的过滤器选项仅选择“男性”和“女性”计数。
