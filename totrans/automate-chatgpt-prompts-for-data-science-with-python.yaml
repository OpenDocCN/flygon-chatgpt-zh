- en: Chapter 7:   EXPLAIN CONCEPTS
  id: totrans-342
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Overall, I love ChatGPT’s ability to explain concepts correctly with an awareness
    of the audience. Through the examples below, you can see how ChatGPT is able to
    explain different concepts to audiences of different caliber. When explaining
    a difficult concept to a child, it uses an appropriate analogy. When explaining
    the concept to a professor, it uses the appropriate tone and language. When explaining
    the concept to a business stakeholder, it drew parallels to the business jargons
    and contexts. five stars for each of this.
  id: totrans-343
  prefs: []
  type: TYPE_NORMAL
- en: 34\. Explain to Five-Year-Old
  id: totrans-344
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt: I want you to act as a data science instructor. Explain [concept] to
    a five-year-old.'
  id: totrans-345
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc11K.jpg)'
  id: totrans-346
  prefs: []
  type: TYPE_IMG
- en: 35\. Explain to Undergraduate
  id: totrans-347
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt: I want you to act as a data science instructor. Explain [concept] to
    an undergraduate.'
  id: totrans-348
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc11M.jpg)'
  id: totrans-349
  prefs: []
  type: TYPE_IMG
- en: 36\. Explain to Professor
  id: totrans-350
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt: I want you to act as a data science instructor. Explain [concept] to
    a professor.'
  id: totrans-351
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc11N.jpg)'
  id: totrans-352
  prefs: []
  type: TYPE_IMG
- en: 37\. Explain to Business Stakeholder
  id: totrans-353
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt: I want you to act as a data science instructor. Explain [concept] to
    a business stakeholder.'
  id: totrans-354
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc11P.jpg)'
  id: totrans-355
  prefs: []
  type: TYPE_IMG
- en: 38\. Explain Like StackOverflow
  id: totrans-356
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt: I want you to act as an answerer on StackOverflow. You can provide
    code snippets, sample tables and outputs to support your answer. [Insert technical
    question]'
  id: totrans-357
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc11R.jpg)![](image_rsrc11S.jpg)'
  id: totrans-358
  prefs: []
  type: TYPE_IMG
- en: Not only is the answer correct and succinct, it also came with relevant information
    (the different types of constraints) and the code snippets.
  id: totrans-359
  prefs: []
  type: TYPE_NORMAL
- en: One tip that I have here is to explicitly prompt ChatGPT for code snippets,
    sample tables and outputs for a more comprehensive answer.
  id: totrans-360
  prefs: []
  type: TYPE_NORMAL
- en: Chapter 8:   SUGGEST IDEAS
  id: totrans-361
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 39\. Suggest Edge Cases
  id: totrans-362
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt: I want you to act as a software developer. Please help me catch edge
    cases for this function [insert function]'
  id: totrans-363
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc11T.jpg)'
  id: totrans-364
  prefs: []
  type: TYPE_IMG
- en: For a relatively simple function, ChatGPT is able to correctly and exhaustively
    suggests the edge cases. It exhaustively considered all cases without being prompted
    on what the cases are.
  id: totrans-365
  prefs: []
  type: TYPE_NORMAL
- en: 40\. Suggest Dataset
  id: totrans-366
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt: I want you to act as a data science career coach. I want to build a
    predictive model for [...]. At the same time, I would like to showcase my knowledge
    in [...]. Can you please suggest the five most relevant datasets for my use case?'
  id: totrans-367
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc11U.jpg)'
  id: totrans-368
  prefs: []
  type: TYPE_IMG
- en: I like ChatGPT’s dataset suggestions because they are customized to my use case.
    I have also tested this prompt for different personas and use cases, and the suggestions
    it gives are consistently excellent.
  id: totrans-369
  prefs: []
  type: TYPE_NORMAL
- en: However, note that I have only tested relatively simple use cases. For more
    complex use cases that requires niche datasets, ChatGPT might not do well.
  id: totrans-370
  prefs: []
  type: TYPE_NORMAL
- en: 41\. Suggest Portfolio Ideas
  id: totrans-371
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt: I want you to act as a data science coach. My background is in [...] and
    I would like to [career goal]. I need to build a portfolio of data science projects
    that will help me land a role in [...] as a [...]. Can you suggest five specific
    portfolio projects that will showcase my expertise in [...] and are of relevance
    to [company]?'
  id: totrans-372
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc11V.jpg)'
  id: totrans-373
  prefs: []
  type: TYPE_IMG
- en: This is one of my favourite prompts. Its suggestions are relevant not only to
    myself, but also to the industry that I am gunning for, and also for my dream
    company. It does not suggest any generic projects like the Titanic or Iris project.
    Instead, it makes salient suggestions based on its knowledge of the company (Tesla,
    in this case), the industry (data science), and my background in engineering.
  id: totrans-374
  prefs: []
  type: TYPE_NORMAL
- en: I love this feature and I hope more people will try it out!
  id: totrans-375
  prefs: []
  type: TYPE_NORMAL
- en: 42\. Suggest Resources
  id: totrans-376
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt: I want you to act as a data science coach. I would like to learn about [topic].
    Please suggest 3 best specific resources. You can include [specify resource type]'
  id: totrans-377
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc11W.jpg)'
  id: totrans-378
  prefs: []
  type: TYPE_IMG
- en: This one is for those looking to learn a new skill. I find that the resources
    that it has suggested are not only relevant, but also critically acclaimed. It
    also does not provide an overwhelming list of resources and instead provide only
    a few. I like this because it certainly provides a good starting point for anyone
    hunting for new resources.
  id: totrans-379
  prefs: []
  type: TYPE_NORMAL
- en: 43\. Suggest Time Complexity
  id: totrans-380
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt: I want you to act as a software developer. Please compare the time
    complexity of the two algorithms below. [Insert two functions]'
  id: totrans-381
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc11X.jpg)'
  id: totrans-382
  prefs: []
  type: TYPE_IMG
- en: For this very simple example, ChatGPT is able to deduce the time complexity.
  id: totrans-383
  prefs: []
  type: TYPE_NORMAL
- en: 44\. Suggest Feature Engineering
  id: totrans-384
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt: I want you to act as a data scientist and perform feature engineering.
    I am working on a model that predicts [insert feature name]. There are columns: [Describe
    columns]. Can you suggest features that we can engineer for this machine learning
    problem?'
  id: totrans-385
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc11Y.jpg)'
  id: totrans-386
  prefs: []
  type: TYPE_IMG
- en: I absolutely loved ChatGPT’s reponse here. The features it suggested are sound
    and actually useful for the use case.
  id: totrans-387
  prefs: []
  type: TYPE_NORMAL
- en: 45\. Suggest A/B Testing Steps
  id: totrans-388
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt: I want you to act as a statistician. [Describe context] Please design
    an A/B test for this purpose. Please include the concrete steps on which statistical
    test I should run.'
  id: totrans-389
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc11Z.jpg)![](image_rsrc120.jpg)'
  id: totrans-390
  prefs: []
  type: TYPE_IMG
- en: While ChatGPT’s steps for A/B testing is correct. I did find it a requirement
    to explicitly ask it to include the statistical test required.
  id: totrans-391
  prefs: []
  type: TYPE_NORMAL
- en: 46\. Career Coaching
  id: totrans-392
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt: I want you to act as a career advisor. I am looking for a role as a [role
    name]. My background is [...]. How do I land the role and with what resources
    exactly in 6 months?'
  id: totrans-393
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc121.jpg)![](image_rsrc122.jpg)'
  id: totrans-394
  prefs: []
  type: TYPE_IMG
- en: I have no surprises that ChatGPT did well here. It is able to regurgigate oft-repeated
    advice for career changers. While this is technically correct, I didn’t find it
    overwhelming impressive.
  id: totrans-395
  prefs: []
  type: TYPE_NORMAL
- en: 'Side note: One can combine this tip with Tip 41 (Suggest portfolio ideas) and
    42 (Suggest dataset) when building one’s portfolio.'
  id: totrans-396
  prefs: []
  type: TYPE_NORMAL
- en: Chapter 9:   TROUBLESHOOT PROBLEM
  id: totrans-397
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 47\. Correct Own ChatGPT Code
  id: totrans-398
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt: Your above code is wrong. [Point out what is wrong]. Can you try again?'
  id: totrans-399
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc123.jpg)![](image_rsrc124.jpg)'
  id: totrans-400
  prefs: []
  type: TYPE_IMG
- en: ChatGPT is quick to admit its mistakes and correct its code. In the above example,
    I asked ChatGPT to create a shell command. I realized that it does not actually
    run, so I pointed out what was wrong. ChatGPT is able to provide the correct code
    on the second attempt.
  id: totrans-401
  prefs: []
  type: TYPE_NORMAL
- en: This is good enough if you know where the bug is exactly. But in cases where
    you do not know where the bug is, ChatGPT might not be able to pinpoint where
    the fault is. The onus is still on the coder to figure things out.
  id: totrans-402
  prefs: []
  type: TYPE_NORMAL
- en: 48\. Correct Python Code
  id: totrans-403
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt: I want you to act as a software developer. This code is supposed to [expected
    function]. Please help me debug this python code that cannot be run. [Insert function]'
  id: totrans-404
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc125.jpg)'
  id: totrans-405
  prefs: []
  type: TYPE_IMG
- en: I provided ChatGPT with a simple incorrect function and it is able to tell me
    why it is wrong correctly.
  id: totrans-406
  prefs: []
  type: TYPE_NORMAL
- en: 49\. Correct SQL Code
  id: totrans-407
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt: I want you to act as a SQL code corrector. This code does not run in [your
    DBMS, e.g. PostgreSQL]. Can you correct it for me? [SQL code here]'
  id: totrans-408
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc126.jpg)'
  id: totrans-409
  prefs: []
  type: TYPE_IMG
- en: A correct explanation for a simple query. However, upon further testing, I did
    find ChatGPT’s understanding of complex SQL query to be somewhat lacking. It’s
    not able to debug more complex SQL queries containing multiple tables.
  id: totrans-410
  prefs: []
  type: TYPE_NORMAL
- en: 50\. Troubleshoot PowerBI Model
  id: totrans-411
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt: I want you to act as a PowerBl modeler. Here is the details of my current
    project. [Insert details]. Do you see any problems with the table?'
  id: totrans-412
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc127.jpg)![](image_rsrc128.jpg)'
  id: totrans-413
  prefs: []
  type: TYPE_IMG
- en: ChatGPT is able to suggest relevant improvements to the PowerBI model. It also
    admitted its shortcoming (“It’s difficult to determine if there are any problems
    without more context”)
  id: totrans-414
  prefs: []
  type: TYPE_NORMAL
- en: Mathias Halkjær Petersen had a good chat with ChatGPT on this topic. He showed
    that ChatGPT is able to troubleshoot PowerBI models effectively when more context
    is provided. It is also able to write the models relatively independently.
  id: totrans-415
  prefs: []
  type: TYPE_NORMAL
- en: Chapter 10:   WRITE SQL
  id: totrans-416
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 51\. Create Running Average
  id: totrans-417
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt: I want you to act as a data scientist and write SQL code for me. I
    have a table with two columns [Insert column names]. I would like to calculate
    a running average for [which value]. What is the SQL code that works for PostgreSQL
    14?'
  id: totrans-418
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc129.jpg)![](image_rsrc12A.jpg)'
  id: totrans-419
  prefs: []
  type: TYPE_IMG
- en: ChatGPT did provide a good response to the requesst here! It correctly provided
    the output for creating running averages in SQL. It also provided a correct explanation
    and breakdown.
  id: totrans-420
  prefs: []
  type: TYPE_NORMAL
- en: One tip that I have is to provide ChatGPT with the exact version and flavour
    of SQL. This allows it to create versions of the data.
  id: totrans-421
  prefs: []
  type: TYPE_NORMAL
- en: I would encourage practitioners to create test ChatGPT with their own SQL questions
    and see if it creates a correct response.
  id: totrans-422
  prefs: []
  type: TYPE_NORMAL
- en: 52\. Solve Leetcode Question
  id: totrans-423
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt: Assume you are given the tables… with the columns… Output the following…'
  id: totrans-424
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc12B.jpg)'
  id: totrans-425
  prefs: []
  type: TYPE_IMG
- en: 'ChatGPT could solve an introductory Leetcode question (Difficulty: Simple)
    on SQL. The above code is sound and answers the question correctly.'
  id: totrans-426
  prefs: []
  type: TYPE_NORMAL
- en: However, it failed to produce runnable SQL code for a Leetcode question with
    medium difficulty when I tested it.
  id: totrans-427
  prefs: []
  type: TYPE_NORMAL
- en: Chapter 11:   WRITE OTHER CODE
  id: totrans-428
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 53\. Write Google Sheets Formula
  id: totrans-429
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt: I want you to act as a bot that generates Google Sheets formula. Please
    generate a formula that [describe requirements]'
  id: totrans-430
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc12C.jpg)![](image_rsrc12D.jpg)'
  id: totrans-431
  prefs: []
  type: TYPE_IMG
- en: ChatGPT excels at acting as a lookup table for all commands. As you can see,
    I asked it for a function that pulls one sheet and puts it into another. It faithfully
    provided the correct importrange.
  id: totrans-432
  prefs: []
  type: TYPE_NORMAL
- en: However, again, I cherrypicked this example. ChatGPT fails when asked to provide
    more complex formulas. In particular, I asked it to provide a formula that outputs
    the number of Mondays in 2023\. It failed to produce a formula that works. Yet,
    it still confidently explained it as though it performed splendidly.
  id: totrans-433
  prefs: []
  type: TYPE_NORMAL
- en: 54\. Write R
  id: totrans-434
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt: I want you to act as a data scientist using R. Can you write an R script
    that [Insert requirement here]'
  id: totrans-435
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc12E.jpg)'
  id: totrans-436
  prefs: []
  type: TYPE_IMG
- en: ChatGPT sure excelled at this basic R command. This code runs and indeed creates
    the plot as requested.
  id: totrans-437
  prefs: []
  type: TYPE_NORMAL
- en: However, do note that I did not test ChatGPT on R coding extensively. I can
    imagine it failing or producing incorrect codes for more complex cases.
  id: totrans-438
  prefs: []
  type: TYPE_NORMAL
- en: 55\. Write Shell
  id: totrans-439
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt: I want you to act as a Linux terminal expert. Please write the code
    to [describe requirements]'
  id: totrans-440
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc12F.jpg)'
  id: totrans-441
  prefs: []
  type: TYPE_IMG
- en: These are the correct commands for the requested instructions. It even provided
    a line for granting the necessary permission to the file without me explicitly
    asking it to
  id: totrans-442
  prefs: []
  type: TYPE_NORMAL
- en: However, note that I cherrypicked this example out of all the prompts for writing
    shell commands. In particular, when I asked ChatGPT to copy files from a folder
    recursively, it gave an incorrect output that could not be executed. In its defense,
    it’s able to correct its own code (See “47\. Correct Own ChatGPT Code” above.)
  id: totrans-443
  prefs: []
  type: TYPE_NORMAL
- en: 56\. Write VBA
  id: totrans-444
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt: I want you to act as an Excel VBA developer. Can you write a VBA that [Insert
    function here]?'
  id: totrans-445
  prefs: []
  type: TYPE_NORMAL
