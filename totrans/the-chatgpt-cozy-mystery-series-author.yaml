    what to ask and how.
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: It only takes seconds to change this prompt to match your cozy niche. Experiment
    with different types of setting and your ideas for the sleuth and story world.
    And you can ask for as many story ideas as you wish!
  prefs: []
  type: TYPE_NORMAL
- en: We will be working through the structure of prompts in detail, and there is
    a Prompt Library at the back of this book.
  prefs: []
  type: TYPE_NORMAL
