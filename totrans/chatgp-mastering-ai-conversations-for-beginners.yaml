- en: '****INTR**ODUCTI**ON'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: '****W********el**com**e, ****m**y** ****so**on**-****t**o**-****b**e** ****te**ch**
    ****sa**vvy** ****re**ade**r, ****t**o** ****yo**ur** ****ch**eat** ****sh**eet**
    ****f**or** ****succ**eedin**g ****i**n** ****t**he** ****dig**ita**l ****wo**rld**.
    ****Tech**nolog**y ****h**as** ****infi**ltrate**d ****al**mos**t ****ev**ery**
    ****as**pec**t ****o**f** ****o**ur** ****li**ves**, ****a**nd** ****wi**ll**
    ****on**ly** ****con**tinu**e ****t**o** ****d**o** ****s**o**. ****Whe**the**r
    ****th**is** ****i**s** ****a**** ****go**od** ****th**ing** ****o**r** ****a****
    ****b**ad** ****dep**end**s ****o**n** ****yo**ur** ****po**int** ****o**f** ****vi**ew**,
    ****a**nd** ****h**ow** ****we**ll**-****pl**ace**d ****y**ou** ****a**re** ****t**o**
    ****u**se** ****sa**id** ****te**ch** ****t**o** ****imp**rov**e ****t**he** ****br**ief**
    ****ti**me** ****y**ou** ****ha**ve** ****o**n** ****th**is** ****mo**rta**l ****co**il**.'
  prefs: []
  type: TYPE_NORMAL
- en: '****Ov**er** ****t**he** ****pa**st** ****f**ew** ****dec**ade**s, ****compu**tation**al
    ****dev**ice**s ****ha**ve** ****ta**ken** ****t**he** ****wo**rld** ****b**y**
    ****st**orm**, ****hel**pin**g ****u**s** ****t**o** ****d**o** ****mo**re**,
    ****le**arn** ****mo**re**, ****a**nd** ****ach**iev**e ****mo**re** ****th**an**
    ****ev**er** ****be**for**e. ****T**he** ****ave**rag**e ****pe**rso**n ****n**ow**
    ****h**as** ****ac**ces**s ****t**o** ****tech**nolog**y ****th**at**, ****a****
    ****f**ew** ****hun**dre**d ****ye**ars** ****a**go**, ****w**as** ****on**ly**
