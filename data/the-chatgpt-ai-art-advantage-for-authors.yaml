  id: totrans-354
  prefs: []
  type: TYPE_IMG
  zh: '![请移除摊位但保留标记](Image00031.jpg)'
- en: Blog post 3
  id: totrans-355
  prefs: []
  type: TYPE_NORMAL
  zh: 博客文章3
- en: '![Blog post](Image00032.jpg)'
  id: totrans-356
