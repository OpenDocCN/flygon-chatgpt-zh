  zh: 链接：https://github.com/binance/binance-spot-api-docs
- en: 'Coinbase Pro :'
  id: totrans-1455
  prefs: []
  type: TYPE_NORMAL
  zh: Coinbase Pro：
- en: 'Overview: Coinbase Pro is an advanced trading platform for Coinbase users,
