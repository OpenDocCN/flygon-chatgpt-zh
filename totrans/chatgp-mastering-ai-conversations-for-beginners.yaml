  id: totrans-1053
  prefs: []
  type: TYPE_NORMAL
  zh: '****Wh**ile** ****cha**tbot**s ****ne**ed** ****t**o** ****b**e** ****coop**erativ**e,
    ****go**al** ****ori**ente**d, ****cont**extually ****aw**are**, ****quick** ****and**
    ****clear**, ****and** ****turn** ****ba**sed**, ****this** ****is** ****all**
