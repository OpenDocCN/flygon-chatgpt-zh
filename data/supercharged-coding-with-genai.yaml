  type: TYPE_NORMAL
  zh: Lab 2.1 分析
- en: Run the script and check the output in the terminal if you are using VS Code,
    or the `run` console if you are using PyCharm. The output of the program should
    be the Chat service’s response to the user prompt `What is the FizzBuzz problem?`,
    a problem we will revisit in later chapters.
  id: totrans-364
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您使用 VS Code，请在终端中运行脚本并检查输出；如果您使用 PyCharm，请在 `run` 控制台中检查输出。程序的输出应该是聊天服务对用户提示
    `What is the FizzBuzz problem?` 的响应，这是我们将在后续章节中再次讨论的问题。
