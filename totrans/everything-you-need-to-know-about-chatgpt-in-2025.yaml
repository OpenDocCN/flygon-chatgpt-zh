  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 本章不仅向读者介绍人工智能的世界，同时也为本书的其余部分定下了基调。随着我们向前推进，我们将探讨ChatGPT和类似技术如何重塑行业，重新定义我们对创造性的理解，并引发关于人类未来的新问题。
