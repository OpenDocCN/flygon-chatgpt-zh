  prefs: []
  type: TYPE_NORMAL
  zh: '6: 编写JavaScript进行表单验证'
- en: 'Prompt:'
  id: totrans-566
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Write a JavaScript function to validate a user registration form. Include
