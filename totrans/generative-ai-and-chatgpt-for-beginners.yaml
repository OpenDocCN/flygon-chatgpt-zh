- en: Preface
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 前言
- en: The goal of this book is to provide an easy-to-follow guide to help you understand
    and use Generative AI skillfully in your daily life.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 本书的目标是提供一份易于遵循的指南，帮助您在日常生活中熟练地理解和使用生成式人工智能。
- en: You’ll see how Generative AI like ChatGPT can be used to brainstorm ideas, come
    up with a plan of action, and create various content such as writing emails and
    performing data analysis so that you can get more done in less time.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 您将了解如何使用像ChatGPT这样的生成式人工智能来激发想法、制定行动计划，并创建各种内容，如撰写电子邮件和执行数据分析，以便您能在更短的时间内完成更多工作。
- en: By the end of this book, you will understand how Generative AI works, have some
    ideas for incorporating AI into your daily activities, and be aware of the challenges
    presented when integrating a powerful AI system.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 在本书结束时，您将了解生成式人工智能的工作原理，对将人工智能融入日常活动有一些想法，并意识到将强大的人工智能系统整合时面临的挑战。
- en: Book Overview
  id: totrans-77
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 书籍概述
- en: This book is broken down into 9 concise chapters, each focusing on a specific
    aspect of Generative AI.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 本书分为9个简明扼要的章节，每个章节都专注于生成式人工智能的特定方面。
- en: Chapter 1 highlights the rapid rise of Generative AI technologies and discusses
    the significant impacts Generative AI can have on various industries. The chapter
    also gives a short history of AI, from early neural networks in the 1940s to the
    modern innovations in machine learning models.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 第一章突出了生成式人工智能技术的快速崛起，并讨论了生成式人工智能对各个行业可能产生的重大影响。本章还简要介绍了人工智能的历史，从20世纪40年代的早期神经网络到现代机器学习模型的创新。
- en: Chapter 2 explores the foundational technologies that power Generative AI applications.
    It explains several important concepts in the world of artificial intelligence
    such as Machine Learning, Neural Networks, Deep Learning, Transformer Models,
    and Large Language Models or LLMs.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 第二章探讨了支撑生成式人工智能应用的底层技术。它解释了人工智能领域中的几个重要概念，例如机器学习、神经网络、深度学习、Transformer 模型以及大型语言模型或
    LLM。
- en: Chapter 3 introduces you to ChatGPT, providing practical guidance on accessing
    and interacting with the tool. The chapter walks through the initial interface,
    showing how to use pre-defined prompts and ask questions. It highlights the advantages
    and limitations of ChatGPT before showing you how to unlock additional features
    by signing up for a free account.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 第三章向您介绍ChatGPT，提供访问和交互工具的实用指导。章节将引导您浏览初始界面，展示如何使用预定义的提示和提问。在展示如何通过注册免费账户解锁更多功能之前，它突出了ChatGPT的优势和局限性。
- en: 'Chapter 4 introduces the concept of prompt engineering, which involves crafting
    and refining prompts to get accurate and relevant responses from Generative AI
    like ChatGPT. The chapter outlines four key strategies: writing clear instructions,
    providing references, breaking big task into smaller tasks, and assigning specific
    roles to the AI.'
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 第四章介绍了提示工程的概念，这涉及精心制作和改进提示以从ChatGPT等生成式人工智能中获得准确和相关的响应。章节概述了四个关键策略：撰写清晰的指令、提供参考资料、将大任务分解为小任务，以及为AI分配特定角色。
- en: Chapter 5 reviews the advanced functionalities available to ChatGPT Plus subscribers.
    The subscription plan provides enhanced features such as image generation with
    DALL-E, real-time web browsing, and advanced data analysis capabilities, alongside
    higher usage limits and priority access to new functionalities.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 第五章回顾了ChatGPT Plus订阅者可用的高级功能。订阅计划提供了增强功能，如使用DALL-E进行图像生成、实时网络浏览以及高级数据分析能力，同时还有更高的使用限制和优先访问新功能。
- en: Chapter 6 covers the creation and usage of custom GPTs, which are personalized
    versions of ChatGPT tailored for specific tasks. The chapter also explores the
    GPT store and highlights the best practices to keep in mind when creating a GPT.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 第六章涵盖了自定义GPT的创建和使用，这些是针对特定任务定制的ChatGPT个性化版本。章节还探讨了GPT商店，并强调了在创建GPT时需要考虑的最佳实践。
- en: 'Chapter 7 explores how ChatGPT can assist in various professional and personal
    scenarios. The chapter highlights three practical applications: acting as a personal
    assistant, providing resume feedback and mock interviews, and aiding in software
    development.'
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 第七章探讨了ChatGPT如何在各种专业和个人场景中提供帮助。章节突出了三个实际应用：作为个人助理、提供简历反馈和模拟面试，以及在软件开发中的协助。
- en: 'Chapter 8 addresses the ethical challenges posed by the rapid development and
    deployment of AI technologies. The chapter focuses on three main areas: bias and
    fairness in AI systems, data privacy and security, and the risks posed by malicious
    actors'
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 第八章讨论了AI技术快速发展和部署带来的伦理挑战。章节重点关注三个主要领域：AI系统中的偏见和公平性、数据隐私和安全，以及恶意行为者带来的风险。
- en: Chapter 9 explores how Generative AI will continue to impact industries and
    reshape the job market in the future. It addresses the public concern of AI potentially
    replacing jobs and how AI might lead to economic growth and wealth creation.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 第九章探讨了生成式人工智能将如何继续影响行业并在未来重塑就业市场。它讨论了公众对AI可能取代工作的担忧，以及AI可能如何导致经济增长和财富创造。
- en: 'A tip to make the most of this book: Take at least a 5-minute break after finishing
    a chapter, so that you can regain your energy and focus.'
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 利用这本书的技巧：在完成一章后至少休息5分钟，这样你可以恢复精力并集中注意力。
- en: Also, don’t despair if some concept is hard to understand. Learning anything
    new is hard for the first time, so be patient with yourself. The most important
    thing is to keep going.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，如果某个概念难以理解，请不要气馁。学习任何新事物在第一次尝试时都是困难的，所以请对自己有耐心。最重要的是要继续前进。
- en: Contact
  id: totrans-90
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 联系方式
- en: If you need help, you can contact me at [nathan@codewithnathan.com](mailto:nathan@codewithnathan.com).
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您需要帮助，您可以通过 [nathan@codewithnathan.com](mailto:nathan@codewithnathan.com)
    联系我。
- en: You can also connect or follow me on LinkedIn at [linkedin.com/in/nathansebhastian](https://linkedin.com/in/nathansebhastian)
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 您还可以在 [linkedin.com/in/nathansebhastian](https://linkedin.com/in/nathansebhastian)
    上与我建立联系或关注我。
- en: 'Chapter 1: Introduction to Generative Artificial Intelligence'
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 第一章：生成式人工智能简介
- en: Generative Artificial Intelligence (or GenAI for short) is a special form of
    artificial intelligence that’s capable of generating various types of content,
    such as text, images, videos, and code.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 生成式人工智能（或简称GenAI）是一种特殊的人工智能形式，能够生成各种类型的内容，如文本、图像、视频和代码。
- en: Artificial Intelligence has long been a hot technology topic, and it has been
    applied in various sectors and industries for the last few decades.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能长期以来一直是热门的技术话题，在过去几十年中，它被应用于各个部门和行业。
- en: For instance, Netflix uses AI to recommend shows to users based on their viewing
    history. Similarly, Tesla and Google have leveraged AI in the development of self-driving
    technology.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，Netflix使用AI根据用户的观看历史向用户推荐节目。类似地，特斯拉和谷歌在自动驾驶技术的开发中利用了AI。
- en: 'But Generative AI is the first kind of AI that’s available for everyone. This
    technology came to the attention of the general public on November 30 of 2022,
    when OpenAI released ChatGPT and quickly gained 1 million users in just 5 days:'
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 但生成式AI是第一种面向所有人的AI。这项技术于2022年11月30日引起了公众的关注，当时OpenAI发布了ChatGPT，并在短短5天内迅速获得了100万用户：
- en: '![1 chatgpt stats](image_rsrc1J5.jpg)'
  id: totrans-98
  prefs: []
  type: TYPE_IMG
  zh: '![1 chatgpt stats](image_rsrc1J5.jpg)'
- en: Figure 1\. ChatGPT Reached 1 Million Users in 5 Days
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 图1. ChatGPT在5天内达到100万用户
- en: Two months later in January 2023, it was estimated that ChatGPT reached 100
    million users, making it the fastest growing consumer application in history.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 两个月后的2023年1月，估计ChatGPT用户数量达到了1亿，使其成为历史上增长最快的消费应用。
- en: Another example of a Generative AI application is Perplexity([perplexity.ai](https://perplexity.ai))
    which is an AI-powered search engine that answers queries by summarizing the search
    results in human language.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 生成式AI应用的另一个例子是Perplexity([perplexity.ai](https://perplexity.ai))，这是一个由AI驱动的搜索引擎，通过用人类语言总结搜索结果来回答查询。
- en: The answers provided by Perplexity contain citations to the original website
    used as the source of those answers, allowing users to explore or verify the given
    information.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: Perplexity提供的答案包含了引用原始网站作为答案来源的引用，使用户能够探索或验证提供的信息。
- en: 'Several Generative AI applications, such as DALL-E and MidJourney, specialize
    in generating images. The following two pictures demonstrate the evolution from
    DALL-E version one to DALL-E version three:'
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 几个生成式AI应用，如DALL-E和MidJourney，专门从事图像生成。以下两张图片展示了从DALL-E版本一到DALL-E版本三的演变：
- en: '![1 dall e evo](image_rsrc1J6.jpg)'
  id: totrans-104
  prefs: []
  type: TYPE_IMG
  zh: '![1 dall e evo](image_rsrc1J6.jpg)'
- en: Figure 2\. Evolution of DALL-E
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 图2. DALL-E的演变
- en: The difference is so astounding. Such a big leap forward! Generative AI is a
    rapidly evolving field with the potential to enhance our lives, and in this guide,
    I will show you how to use it in a productive way.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 这种差异是如此惊人。如此大的飞跃！生成式AI是一个快速发展的领域，有潜力改善我们的生活，在这份指南中，我将向你展示如何以高效的方式使用它。
- en: Why You Should Learn Generative AI?
  id: totrans-107
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 为什么你应该学习生成式AI？
- en: Generative AI is very interesting because it will have a tremendous impact on
    businesses and industries.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 生成式AI非常有趣，因为它将对商业和行业产生巨大的影响。
- en: For example, the field of software development has already seen positive results
    using GitHub Copilot, an AI-powered code completion tool that enhances coding-related
    tasks by suggesting snippets and entire functions based on context.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，软件开发领域已经通过使用GitHub Copilot看到了积极的结果，这是一个由AI驱动的代码补全工具，通过根据上下文建议代码片段和整个函数来增强与编码相关的任务。
- en: 'In a research conducted by GitHub, software developers reported that they are
    88% more productive when using the tool:'
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 在GitHub进行的一项研究中，软件开发人员报告称，在使用该工具时，他们的生产力提高了88%：
- en: '![1 github research](image_rsrc1J7.jpg)'
  id: totrans-111
  prefs: []
  type: TYPE_IMG
  zh: '![1 github research](image_rsrc1J7.jpg)'
- en: Figure 3\. GitHub Research Result
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 图3. GitHub研究结果
- en: As you can see, the developers can focus on more satisfying work when using
    Generative AI, making them happier and more fulfilled.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 正如你所见，当使用生成式AI时，开发者可以专注于更有成就感的工作，使他们更加快乐和满足。
- en: In a study conducted by McKinsey Consulting[[1]](part0015.xhtml#a1GB), it was
    reported that Generative AI could add the equivalent of $2.6 trillion to $4.4
    trillion annually across the 63 use cases they analyzed.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 在麦肯锡咨询公司[[1]](part0015.xhtml#a1GB)进行的一项研究中，报告称生成式AI每年可以为他们分析的63个用例增加相当于2.6万亿美元到4.4万亿美元的价值。
- en: Banking, technology, and life sciences are among the industries that stand for
    the greatest revenue impact from Generative AI. Fully implementing AI use cases
    in the banking sector could generate an additional $200 billion to $340 billion
    annually. Similarly, the retail and consumer packaged goods sectors could see
    significant gains, with potential impacts ranging from $400 billion to $660 billion
    per year.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 银行、技术和生命科学是那些从生成式人工智能中获得最大收入影响的行业之一。在银行领域全面实施人工智能用例每年可能产生额外2000亿至3400亿美元的收入。同样，零售和消费品行业也可能看到显著的收益，潜在影响每年从4000亿到6600亿美元不等。
- en: J.P. Morgan Research is also extremely bullish on Generative AI[[2]](part0015.xhtml#a1G4),
    estimating that it could increase global GDP by $7 - 10 trillion, or by as much
    as 10%.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 摩根大通研究也对生成式人工智能持极度乐观态度[[2]](part0015.xhtml#a1G4)，预计它可能将全球GDP提高7-10万亿美元，或高达10%。
- en: The technology could result in a massive workforce productivity boom over the
    next one to three years, which could affect the shape of the economic cycle.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 该技术可能导致未来一到三年内劳动力生产力的巨大增长，这可能影响经济周期的形状。
- en: As the adoption of Generative AI continues to rise, it is essential for everyone
    to know how to use this technology for their professional and personal lives.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 随着生成式人工智能的持续普及，每个人了解如何将这项技术应用于他们的职业和个人生活变得至关重要。
- en: The point is that Generative AI is expected to revolutionize various aspects
    of business and everyday life. From automating routine tasks to providing customer
    service, the technology offers extraordinary opportunities for efficiency and
    innovation.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 重点是，生成式人工智能预计将彻底改变商业和日常生活的各个方面。从自动化常规任务到提供客户服务，这项技术为效率和创新提供了非凡的机会。
- en: Whether you’re looking to boost your career prospects, improve your business
    operations, or live a better life, learning Generative AI is a great decision
    that will pay off positively.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 无论你是想提升职业前景、改善业务运营，还是过上更好的生活，学习生成式人工智能都是一个明智的决定，它将带来积极的结果。
- en: A Quick History of Generative AI
  id: totrans-121
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 生成式人工智能的简要历史
- en: AI is developing at an unprecedented rate, and to appreciate how we got to where
    we are now, it’s important to know how it all began. AI has a rich history that
    dates back to the 1940s, with notable progress occurring in almost every decade.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能正在以前所未有的速度发展，要理解我们是如何到达现在的，了解它是如何开始的非常重要。人工智能有着丰富的历史，可以追溯到20世纪40年代，几乎在每一个十年都取得了显著的进步。
- en: This section will look over some of the significant events that strongly influenced
    the growth of AI. Some of the technology terms below may be unfamiliar to you,
    but don’t worry. They will be explained further in the next chapter.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 本节将回顾一些对人工智能增长产生重大影响的重要事件。以下的一些技术术语可能对你来说不熟悉，但不用担心。它们将在下一章中进一步解释。
- en: The history of Generative AI can be traced back to 1943, when Warren McCulloch
    and Walter Pitts developed the first neural network model.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 生成式人工智能的历史可以追溯到1943年，当时沃伦·麦克洛克（Warren McCulloch）和沃尔特·皮茨（Walter Pitts）开发了第一个神经网络模型。
- en: A neural network is a computer system modeled after the human brain. This system
    is capable of processing large amounts of data through interconnected nodes (also
    called neurons) which work together to recognize patterns and make decisions based
    on input data.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 神经网络是一种模仿人脑的计算机系统。这个系统能够通过相互连接的节点（也称为神经元）处理大量数据，这些节点共同工作以识别模式和根据输入数据做出决策。
- en: Neural networks excel in tasks such as image and speech recognition, natural
    language processing, and even playing complex games.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 神经网络在图像和语音识别、自然语言处理以及甚至玩复杂游戏等任务上表现出色。
- en: Then in 1959, the computer scientist Arthur Samuel popularized the term "machine
    learning" and developed the first machine learning algorithm that can learn how
    to play checkers, a board game similar to chess.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 然后在1959年，计算机科学家阿瑟·塞缪尔（Arthur Samuel）普及了“机器学习”这个术语，并开发了第一个能够学习如何玩国际象棋类似游戏——跳棋的机器学习算法。
- en: Then in 1960s, MIT Professor Joseph Weizenbaum created the first chatbot called
    ELIZA.
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 然后在20世纪60年代，麻省理工学院教授约瑟夫·魏岑鲍姆（Joseph Weizenbaum）创建了第一个名为ELIZA的聊天机器人。
- en: ELIZA is an experimental program created to simulate conversations with a psychotherapist.
    It would respond to prompts using natural language that sounds empathic.
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: ELIZA是一个实验性程序，旨在模拟与心理治疗师进行对话。它会使用听起来富有同情心的自然语言来回应提示。
- en: The groundwork for computer vision was also done during this time, when researchers
    began to develop the human face recognition and identification program.
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 计算机视觉的基础工作也是在此时进行的，当时研究人员开始开发人脸识别和识别程序。
- en: In 1970s, the artificial intelligence project ground to a halt because investors
    are disappointed with the lack of progress in the field.
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 在20世纪70年代，人工智能项目因为投资者对领域内进展的失望而停滞不前。
- en: Nevertheless, the chatbot programs were picked up by individual companies because
    they can serve specific use cases, such as answering common questions and relaying
    complex situations to the support agent in charge.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管如此，聊天机器人程序被个别公司采用，因为它们可以服务于特定的用例，例如回答常见问题并将复杂情况传达给负责的支持代理。
- en: While chatbots are unable to carry on intelligent conversations, they still
    save time and reduce expenses, and business leaders love that.
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然聊天机器人无法进行智能对话，但它们仍然节省了时间和减少了开支，这让商业领袖们非常喜爱。
- en: The development of machine learning algorithms continued in individual companies
    interested in finding new ways to cut costs and increase productivity.
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 在个别公司寻找降低成本和提高生产力的新方法时，机器学习算法的发展继续进行。
- en: As the technology advanced, neural networks gave rise to deep learning. In 1980,
    computer scientist Kunihiko Fukushima developed the first deep learning system
    called Neocognitron, which utilizes multiple layers of neurons to achieve even
    greater levels of accuracy and performance.
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 随着技术的进步，神经网络催生了深度学习。1980年，计算机科学家 Kunihiko Fukushima 开发了第一个深度学习系统，名为Neocognitron，它利用多层神经元来实现更高的准确性和性能水平。
- en: Deep learning paved the way for significant breakthroughs in AI, transforming
    industries and leading to the resurgence of interest and investment in artificial
    intelligence in the decades that followed.
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 深度学习为人工智能的重大突破铺平了道路，改变了行业，并在接下来的几十年里导致了人工智能兴趣和投资的复苏。
- en: Fast forward to 1990s, governments and companies began to look at artificial
    intelligence again and were surprised to see the technology has improved significantly
    while out of sight.
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 快进到20世纪90年代，政府和公司开始重新审视人工智能，并惊讶地发现，尽管技术一直处于幕后，但技术已经取得了显著的进步。
- en: In 2009, AI researcher Fei-Fei Li published ImageNet, a large image database
    used to train computers to recognize objects in images. The dataset enabled rapid
    advances in computer vision in the 2010s.
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 在2009年，人工智能研究员Fei-Fei Li发布了ImageNet，这是一个用于训练计算机识别图像中物体的大型图像数据库。该数据集在2010年代推动了计算机视觉的快速发展。
- en: Next, the Generative Adversarial Network (GAN) was developed by Ian Goodfellow
    in 2014\. The architecture pits two neural networks against each other to generate
    more accurate and realistic results.
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，生成对抗网络（GAN）由Ian Goodfellow在2014年开发。该架构将两个神经网络置于对立面，以生成更准确和逼真的结果。
- en: Then in 2017, researchers at Google introduced a new neural network model called
    transformer. This new model can learn context by tracking relationships in sequential
    data (like words in a sentence).
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，在2017年，谷歌的研究人员介绍了一种新的神经网络模型，称为转换器。这个新模型可以通过跟踪序列数据（如句子中的单词）中的关系来学习上下文。
- en: For example, when you ask, "What color is the sky?" The transformer model is
    able to identify and associate the words "sky", "color", and "blue" as relevant
    based on its training data.
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，当你问，“天空是什么颜色？”时，转换器模型能够根据其训练数据识别并将“天空”、“颜色”和“蓝色”这些词关联为相关词汇。
- en: 'The model uses this knowledge to form a response: "The sky is blue."'
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 该模型利用这些知识来形成回答：“天空是蓝色的。”
- en: The transformer model was then implemented by OpenAI, the company behind ChatGPT,
    to create the GPT large language models (LLMs).
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: OpenAI，ChatGPT背后的公司，随后实现了转换器模型，创建了GPT大型语言模型（LLMs）。
- en: GPT itself stands for Generative Pre-trained Transformer, and the name comes
    from the transformer model.
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: GPT本身代表的是生成式预训练转换器，这个名字来源于转换器模型。
- en: In 2022, OpenAI decided to release ChatGPT, which was powered by GPT-3, and
    the rest is history.
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 在2022年，OpenAI决定发布ChatGPT，该产品由GPT-3驱动，之后的事情就成为了历史。
- en: '![1 ai timeline](image_rsrc1J8.jpg)'
  id: totrans-146
  prefs: []
  type: TYPE_IMG
  zh: '![1 ai timeline](image_rsrc1J8.jpg)'
- en: Figure 4\. The Historical Development of AI
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 图4. 人工智能的历史发展
- en: As you can see, Generative AI has come a long way, and progress was very slow
    at first. However, recent advancements have accelerated its development and adoption.
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 如你所见，生成式人工智能已经走了很长的路，起初进步非常缓慢。然而，最近的进步加速了其发展和应用。
- en: With the release of models like GPT-3 and beyond, AI has achieved excellent
    capabilities in natural language understanding and generation.
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 随着GPT-3及其之后模型的发布，人工智能在自然语言理解和生成方面取得了卓越的能力。
- en: Summary
  id: totrans-150
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: In this chapter, you’ve learned what is Generative AI, why you should learn
    Generative AI, and a short history of Generative AI.
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，你已经学习了什么是生成式AI，为什么你应该学习生成式AI，以及生成式AI的简要历史。
- en: In the next chapter, we’re going to look at the key terminologies relevant to
    Generative AI that will help you better understand how the technology works.
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一章中，我们将探讨与生成式AI相关的关键术语，这将帮助你更好地理解这项技术是如何工作的。
- en: See you there!
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 那里见！
- en: 'Chapter 2: Understanding Key Technologies Behind Generative AI'
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 第二章：理解生成式AI背后的关键技术
- en: To really understand how Generative AI works, we need to take a step back and
    learn the technologies that power the application.
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 要真正理解生成式AI是如何工作的，我们需要退一步，学习支撑该应用的技术。
- en: We’re going to start with what artificial intelligence is and how machine learning
    works. Then, we’ll delve into the intricacies of neural networks and deep learning.
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将从人工智能是什么以及机器学习是如何工作的开始。然后，我们将深入了解神经网络和深度学习的复杂性。
- en: From there, we’ll explore transformers, a breakthrough architecture that has
    revolutionized the field. Finally, we’ll discuss large language models, which
    are the advanced systems that bring Generative AI to life.
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 从那里，我们将探讨Transformer，这是一种突破性的架构，它彻底改变了该领域。最后，我们将讨论大型语言模型，这些是使生成式AI得以实现的先进系统。
- en: Don’t be afraid of all these fancy terms because I will introduce them in the
    most friendly way possible. Let’s jump in.
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 不要害怕所有这些花哨的术语，因为我会以最友好的方式介绍它们。让我们开始吧。
- en: Artificial Intelligence
  id: totrans-159
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 人工智能
- en: Simply put, artificial intelligence (or AI) is a field that focuses on creating
    systems capable of performing tasks that normally require human intelligence.
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 简而言之，人工智能（或AI）是一个专注于创建能够执行通常需要人类智能的任务的系统的领域。
- en: These tasks include reasoning, learning, problem-solving, perception, language
    understanding, and decision-making. For example, you can create AI systems that
    detect suspicious transactions from financial data, or predict property prices
    based on available price data.
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 这些任务包括推理、学习、问题解决、感知、语言理解和决策。例如，你可以创建AI系统来从金融数据中检测可疑交易，或者根据可用的价格数据预测房价。
- en: '![2 ai illustration](image_rsrc1J9.jpg)'
  id: totrans-162
  prefs: []
  type: TYPE_IMG
  zh: '![2 ai illustration](image_rsrc1J9.jpg)'
- en: Figure 5\. The Definition of Artificial Intelligence
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 图5. 人工智能的定义
- en: AI systems can be designed to perform specific tasks, or they can aim to replicate
    human intelligence more broadly.
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: AI系统可以被设计来执行特定任务，或者它们可以更广泛地旨在复制人类智能。
- en: 'The fields of study that make AI viable today are called machine learning and
    deep learning, which are crucial components in developing intelligent systems
    capable of adapting and improving over time:'
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 使AI在今天成为可行的研究领域被称为机器学习和深度学习，它们是开发能够适应和随时间改进的智能系统的关键组成部分：
- en: '![2 ai hierarchy](image_rsrc1JA.jpg)'
  id: totrans-166
  prefs: []
  type: TYPE_IMG
  zh: '![2 ai hierarchy](image_rsrc1JA.jpg)'
- en: Figure 6\. AI Subject Hierarchy
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 图6. 人工智能主题层次结构
- en: As you can see above, Generative AI is a very specific implementation of AI.
    It is only a small portion of a greater whole.
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 如上图所示，生成式AI是AI的一个非常具体的实现，它只是更大整体中的一小部分。
- en: Machine Learning
  id: totrans-169
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 机器学习
- en: As the name implies, machine learning is a subdivision of AI study that focuses
    on the development of algorithms that enable computers to learn and make predictions
    or decisions based on available data.
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 正如其名所示，机器学习是AI研究的一个分支，专注于开发使计算机能够学习和基于可用数据做出预测或决策的算法。
- en: How do machines learn? In the same way humans can learn to differentiate things,
    which is through communication, pattern recognition, and interaction with their
    environment.
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 机器是如何学习的？机器通过人类学习区分事物的相同方式来学习，即通过交流、模式识别和与环境的互动。
- en: 'For example, to teach a baby about orange, we would show the baby an image
    of the fruit and communicate its name verbally:'
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，为了教一个婴儿关于橙子的知识，我们会向婴儿展示水果的图片，并通过口头交流其名称：
- en: '![2 baby learn](image_rsrc1JB.jpg)'
  id: totrans-173
  prefs: []
  type: TYPE_IMG
  zh: '![2 baby learn](image_rsrc1JB.jpg)'
- en: Figure 7\. How to Teach Baby About Oranges
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 图7. 如何教婴儿关于橙子
- en: 'You can test if the baby is able to recognize an orange by putting it in a
    basket of fruits. If the baby can identify the fruit correctly, then the baby
    understands what an orange is:'
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以通过将橙子放入一个水果篮中来测试婴儿是否能识别橙子。如果婴儿能正确识别这种水果，那么婴儿就理解了橙子是什么：
- en: '![2 baby ok](image_rsrc1JC.jpg)'
  id: totrans-176
  prefs: []
  type: TYPE_IMG
  zh: '![2 baby ok](image_rsrc1JC.jpg)'
- en: Figure 8\. Training the Baby
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 图8. 训练婴儿
- en: 'Similarly, we can teach a machine to recognize an object by showing it again
    and again. We show what an orange looks like so the machine can identify the colors,
    the properties, and everything else that makes an orange, orange:'
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: 同样，我们可以通过反复展示来教机器识别一个物体。我们展示橙子的样子，这样机器就可以识别颜色、属性以及使橙子成为橙子的所有其他因素：
- en: '![2 robot learn](image_rsrc1JD.jpg)'
  id: totrans-179
  prefs: []
  type: TYPE_IMG
  zh: '![2 机器人学习](image_rsrc1JD.jpg)'
- en: Figure 9\. Training the Robot
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 图9. 训练机器人
- en: Keep in mind that a machine learns far more slower when compared to a baby.
    It needs lots and lots of data for training until it can be intelligent enough.
    The ChatGPT we have today was trained on millions of text documents, almost the
    size of the internet itself.
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: 请记住，与婴儿相比，机器学习要慢得多。它需要大量的数据来训练，直到它足够智能。我们今天拥有的ChatGPT是在数百万份文本文档上训练的，几乎相当于整个互联网的大小。
- en: 'Machine learning techniques are categorized into three modes of learning:'
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 机器学习技术被分为三种学习模式：
- en: Supervised learning - The model is trained on labeled data (show and describe
    images)
  id: totrans-183
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 监督学习 - 模型在标记数据（展示和描述图像）上训练
- en: Unsupervised learning - The model identifies patterns in unlabeled data (just
    show images)
  id: totrans-184
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 无监督学习 - 模型在未标记数据中识别模式（仅展示图像）
- en: Reinforcement learning - The model learns by interacting with its environment
    and receiving feedback (trial and error)
  id: totrans-185
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 强化学习 - 模型通过与环境的交互并接收反馈（试错）来学习
- en: Unlike traditional programming, where explicit instructions are provided, machine
    learning systems improve their performance by identifying patterns and relationships
    within large datasets.
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: 与传统的编程不同，传统编程中提供的是明确的指令，机器学习系统通过识别大量数据集中的模式和关系来提高其性能。
- en: This process involves training models on historical data, allowing them to generalize
    and apply their knowledge to new, unseen data.
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: 这个过程涉及在历史数据上训练模型，使它们能够推广并将知识应用于新的、未见过的数据。
- en: Neural Networks
  id: totrans-188
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 神经网络
- en: A Neural network is a type of machine learning model inspired by the human brain’s
    network of neurons. They consist of layers of interconnected nodes, or neurons,
    which work together to process input data and produce output.
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: 神经网络是一种受人类大脑神经元网络启发的机器学习模型。它们由相互连接的节点或神经元层组成，共同工作以处理输入数据并产生输出。
- en: 'A typical neural network has an input layer, one or more hidden layers, and
    an output layer:'
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: 一个典型的神经网络包括输入层、一个或多个隐藏层和输出层：
- en: '![2 neural network](image_rsrc1JE.jpg)'
  id: totrans-191
  prefs: []
  type: TYPE_IMG
  zh: '![2 神经网络](image_rsrc1JE.jpg)'
- en: Figure 10\. Neural Network Illustration
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: 图10. 神经网络示意图
- en: The input layer receives the raw data, the hidden layers transform and process
    this data through a series of weighted connections, and the output layer produces
    the final result.
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: 输入层接收原始数据，隐藏层通过一系列加权连接对这个数据进行转换和处理，输出层产生最终结果。
- en: Neural networks can learn through trial and error by comparing the output to
    the expected result.
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: 神经网络可以通过比较输出与预期结果来通过试错学习。
- en: The model is fundamental to many advanced AI applications, including image and
    speech recognition, language translation, and document summarization. Their ability
    to learn complex patterns and representations from data makes them indispensable
    in creating powerful AI systems.
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: 该模型是许多高级人工智能应用的基础，包括图像和语音识别、语言翻译和文档摘要。它们从数据中学习复杂模式和表示的能力使它们在创建强大的AI系统中变得不可或缺。
- en: Deep Learning
  id: totrans-196
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 深度学习
- en: Deep learning is a subdivision of machine learning that emerged in an attempt
    to make machine learning more accurate and efficient.
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: 深度学习是机器学习的一个分支，它试图使机器学习更加准确和高效。
- en: The main difference between deep learning and machine learning is the structure
    of the neural network models used by the computer.
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: 深度学习与机器学习的主要区别在于计算机使用的神经网络模型的结构。
- en: 'In deep learning, the neural networks typically have three or more (up to a
    thousand) hidden layers:'
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: 在深度学习中，神经网络通常有三个或更多（多达一千个）隐藏层：
- en: '![2 deep nn](image_rsrc1JF.jpg)'
  id: totrans-200
  prefs: []
  type: TYPE_IMG
  zh: '![2 深度神经网络](image_rsrc1JF.jpg)'
- en: Figure 11\. Deep Learning Illustration
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
  zh: 图11. 深度学习示意图
- en: These advanced neural networks are designed to mimic the human brain’s structure
    and function, enabling computers to learn and make decisions in a way that is
    more similar to human thought processes.
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
  zh: 这些高级神经网络被设计来模仿人类大脑的结构和功能，使计算机能够以更类似于人类思维过程的方式学习和做出决策。
- en: Deep learning models excel at handling large and complex datasets, making them
    particularly effective for tasks such as image and speech recognition.
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: 深度学习模型擅长处理大型和复杂的数据集，这使得它们在图像和语音识别等任务中特别有效。
- en: By using multiple layers of interconnected nodes, or neurons, deep learning
    models can automatically discover intricate patterns and representations in the
    data, enabling them to achieve high levels of accuracy in various use cases.
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
  zh: 通过使用多层相互连接的节点，或神经元，深度学习模型可以自动发现数据中的复杂模式和表示，使它们能够在各种用例中实现高精度。
- en: Transformer Model
  id: totrans-205
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Transformer 模型
- en: The transformer model is a type of neural network that learns context and meaning
    by tracking relationships in a sequence of data, like the influence of a word
    in a sentence.
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: Transformer 模型是一种通过跟踪数据序列中的关系来学习上下文和意义的神经网络，例如句子中单词的影响。
- en: This ability is enabled because of the self-attention mechanism introduced in
    transformer models. When the model pays attention to one word, it looks to the
    surrounding words to get the context of that word.
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
  zh: 这种能力是由于在 Transformer 模型中引入的自注意力机制所实现的。当模型关注一个单词时，它会查看周围的单词以获取该单词的上下文。
- en: We’ve seen an example before that when asked with the question "What color is
    the sky?", the transformer model is able to identify and associate the words "sky",
    "color", and "blue" as relevant based on its training data.
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
  zh: 我们之前已经看到过一个例子，当被问及“天空是什么颜色？”时，Transformer 模型能够根据其训练数据识别并将“天空”、“颜色”和“蓝色”这些词关联为相关词汇。
- en: 'The following image shows a simplified transformer model process:'
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
  zh: 下图展示了简化的 Transformer 模型过程：
- en: '![2 transformer](image_rsrc1JG.jpg)'
  id: totrans-210
  prefs: []
  type: TYPE_IMG
  zh: '![2 transformer](image_rsrc1JG.jpg)'
- en: Figure 12\. The Transformer Model Illustration
  id: totrans-211
  prefs: []
  type: TYPE_NORMAL
  zh: 图 12. Transformer 模型示意图
- en: After receiving input from the user, the model transforms this input into vector
    embeddings, which are numerical representations of the input data. These vector
    embeddings capture the meaning and relationships of the words in a way that can
    be processed by computer models.
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
  zh: 在接收到用户输入后，模型将此输入转换为向量嵌入，这些嵌入是输入数据的数值表示。这些向量嵌入以计算机模型可以处理的方式捕捉词语的意义和关系。
- en: The neural network model then searches through its training data for embeddings
    that are similar to the input. Based on these similarities, the model generates
    a response, which is then decoded into natural language that we can understand.
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
  zh: 神经网络模型随后在其训练数据中搜索与输入相似的嵌入。基于这些相似性，模型生成一个响应，然后将其解码成我们可以理解的自然语言。
- en: There are additional technical details in the transformer model, but they are
    not essential to understand unless you wish to explore the topic further.
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
  zh: 在 Transformer 模型中还有额外的技术细节，但除非你想进一步探索这个主题，否则它们不是理解所必需的。
- en: Large Language Model (LLM)
  id: totrans-215
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 大型语言模型（LLM）
- en: Large Language Model is the engine that drives the Generative AI systems we
    have today. The model was built upon the transformer model and trained on vast
    amounts of text data.
  id: totrans-216
  prefs: []
  type: TYPE_NORMAL
  zh: 大型语言模型是驱动我们今天所拥有的生成式人工智能系统的引擎。该模型建立在 Transformer 模型之上，并在大量文本数据上进行训练。
- en: You can think of a Large Language Model like a digital tree that grows when
    fed by data. The branches of the tree will extend with each new piece of information,
    creating a large and complex network of knowledge.
  id: totrans-217
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以将大型语言模型想象成一个由数据滋养而生长的数字树。随着每条新信息的加入，树的分支会延伸，形成一个庞大而复杂的知识网络。
- en: '![2 llm illustration](image_rsrc1JH.jpg)'
  id: totrans-218
  prefs: []
  type: TYPE_IMG
  zh: '![2 llm illustration](image_rsrc1JH.jpg)'
- en: Figure 13\. Large Language Model Illustration
  id: totrans-219
  prefs: []
  type: TYPE_NORMAL
  zh: 图 13. 大型语言模型示意图
- en: When you send an instruction, the tree will search through its branches of knowledge
    for the matching information required to carry out that instruction.
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
  zh: 当你发送指令时，树会搜索其知识分支以找到执行该指令所需的匹配信息。
- en: Because of the transformer architecture, LLM excels at understanding and generating
    human-like text. It can predict the next word in a sentence based on the context
    formed by the previous words.
  id: totrans-221
  prefs: []
  type: TYPE_NORMAL
  zh: 由于 Transformer 架构，大型语言模型（LLM）在理解和生成类似人类的文本方面表现出色。它可以根据前文形成的上下文预测句子中的下一个单词。
- en: This ability to analyze context enables them to perform a wide range of language-related
    tasks, from composing essays and writing code to engaging in conversation and
    answering questions.
  id: totrans-222
  prefs: []
  type: TYPE_NORMAL
  zh: 这种分析上下文的能力使它们能够执行广泛的与语言相关的任务，从撰写文章和编写代码到参与对话和回答问题。
- en: Large language models are trained on a diverse and extensive corpus of text
    data to learn general language patterns, and then fine-tuned to enhance their
    performance in particular domains. This two-step process allows these models to
    adapt to various applications with remarkable accuracy and coherence.
  id: totrans-223
  prefs: []
  type: TYPE_NORMAL
  zh: 大型语言模型在多样化的广泛文本数据语料库上训练，以学习通用语言模式，然后进行微调以增强其在特定领域的性能。这一两步过程使得这些模型能够以惊人的准确性和连贯性适应各种应用。
- en: As of this writing, LLM is the core technology behind Generative AI tools such
    as ChatGPT, ChatPDF, Claude, and many others.
  id: totrans-224
  prefs: []
  type: TYPE_NORMAL
  zh: 到本文写作时，LLM是ChatGPT、ChatPDF、Claude等生成式AI工具背后的核心技术。
- en: It is expected that other fields requiring a deep understanding of human language
    will harness this technology in the future.
  id: totrans-225
  prefs: []
  type: TYPE_NORMAL
  zh: 预计未来其他需要深入理解人类语言的领域将利用这项技术。
- en: Summary
  id: totrans-226
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: In this chapter, we just went through the most important concepts that make
    up the foundation of Generative AI.
  id: totrans-227
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们仅介绍了构成生成式AI基础的最重要概念。
- en: While new models might be released tomorrow, the fundamentals of Generative
    AI will remain the same unless we have another research breakthrough.
  id: totrans-228
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然明天可能会发布新的模型，但除非我们又有研究突破，否则生成式AI的基本原理将保持不变。
- en: By understanding the fundamental technologies behind Generative AI, you can
    dispel common misconceptions around AI, such as AI can fully understand and comprehend
    context in the same way humans do, or it becoming sentient.
  id: totrans-229
  prefs: []
  type: TYPE_NORMAL
  zh: 通过理解生成式AI背后的基本技术，您可以消除围绕AI的常见误解，例如AI可以像人类一样完全理解和理解上下文，或者它变得有意识。
- en: Generative AI is a very specific implementation of artificial intelligence that
    leverages the power of large language model, which uses numbers, statistics and
    similarities to create an accurate response. The chance of it being sentient is
    virtually nonexistent.
  id: totrans-230
  prefs: []
  type: TYPE_NORMAL
  zh: 生成式AI是人工智能的一个非常具体的实现，它利用大型语言模型的力量，该模型使用数字、统计和相似性来创建准确的响应。它变得有意识的概率几乎为零。
- en: In the next chapter, you’re going to start exploring ChatGPT features and learn
    what sets it apart from all AI tools that came in the past.
  id: totrans-231
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一章中，您将开始探索ChatGPT的功能，并了解它与其他过去出现的所有AI工具有何不同。
- en: 'Chapter 3: Getting Started With Generative AI (ChatGPT Introduction)'
  id: totrans-232
  prefs: []
  type: TYPE_NORMAL
  zh: 第3章：开始使用生成式AI（ChatGPT简介）
- en: Now that we’ve learned the key terms and technologies used by Generative AI,
    it’s time to start using one and see how Generative AI might assist us in performing
    tasks. We’re going to use ChatGPT for this practice.
  id: totrans-233
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经了解了生成式AI所使用的核心术语和技术，是时候开始使用一个并看看生成式AI如何帮助我们完成任务了。我们将使用ChatGPT进行这次实践。
- en: You need a browser and an active internet connection to access ChatGPT. If you
    don’t have a browser installed yet, I suggest you install the Chrome browser.
  id: totrans-234
  prefs: []
  type: TYPE_NORMAL
  zh: 您需要一个浏览器和活跃的互联网连接来访问ChatGPT。如果您还没有安装浏览器，我建议您安装Chrome浏览器。
- en: 'You can download the browser here:'
  id: totrans-235
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以在此处下载浏览器：
- en: '[www.google.com/chrome](https://www.google.com/chrome)'
  id: totrans-236
  prefs: []
  type: TYPE_NORMAL
  zh: '[www.google.com/chrome](https://www.google.com/chrome)'
- en: The browser is available for all major operating systems. Once the download
    is complete, follow the installation steps presented by the installer to have
    the browser on your computer.
  id: totrans-237
  prefs: []
  type: TYPE_NORMAL
  zh: 浏览器适用于所有主流操作系统。下载完成后，按照安装程序提供的步骤进行安装，即可在您的电脑上使用浏览器。
- en: Your First Interaction With ChatGPT
  id: totrans-238
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 您与ChatGPT的第一次互动
- en: 'Head over to [chatgpt.com](https://chatgpt.com), and you will be presented
    with an interface where you can start conversing with ChatGPT:'
  id: totrans-239
  prefs: []
  type: TYPE_NORMAL
  zh: 访问[chatgpt.com](https://chatgpt.com)，您将看到一个界面，您可以在其中开始与ChatGPT进行对话：
- en: '![3 chatgpt screen](image_rsrc1JJ.jpg)'
  id: totrans-240
  prefs: []
  type: TYPE_IMG
  zh: '![3 chatgpt屏幕](image_rsrc1JJ.jpg)'
- en: Figure 14\. ChatGPT Main Interface
  id: totrans-241
  prefs: []
  type: TYPE_NORMAL
  zh: 图14. ChatGPT主界面
- en: On the screen above, there are four random prompts (or instructions) added above
    the text input that you can click on to test out ChatGPT.
  id: totrans-242
  prefs: []
  type: TYPE_NORMAL
  zh: 在上面的屏幕上，有四个随机提示（或指令）添加到文本输入上方，您可以点击它们来测试ChatGPT。
- en: These four prompts are randomly selected, so you might see different prompts
    on your screen. You can click on any one of the available prompts right away.
  id: totrans-243
  prefs: []
  type: TYPE_NORMAL
  zh: 这四个提示是随机选择的，所以您可能会在屏幕上看到不同的提示。您可以直接点击任何一个可用的提示。
- en: 'For example, I clicked on ''Tell me a fun fact about the Roman Empire'', and
    here’s the reply I got from ChatGPT:'
  id: totrans-244
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，我点击了“告诉我一个关于罗马帝国的有趣事实”，这是我从ChatGPT那里得到的回复：
- en: '![3 chatgpt output](image_rsrc1JK.jpg)'
  id: totrans-245
  prefs: []
  type: TYPE_IMG
  zh: '![3 chatgpt输出](image_rsrc1JK.jpg)'
- en: Figure 15\. ChatGPT Output
  id: totrans-246
  prefs: []
  type: TYPE_NORMAL
  zh: 图15. ChatGPT输出
- en: Because the fun fact is random, ChatGPT might reply with a different answer
    each time we send the same prompt.
  id: totrans-247
  prefs: []
  type: TYPE_NORMAL
  zh: 由于有趣的事实是随机的，ChatGPT可能会在每次发送相同的提示时给出不同的答案。
- en: These answers are generated real-time by ChatGPT using the power of large language
    models. The given result will always be different because ChatGPT generates the
    answer in a sequence, which means one word at a time.
  id: totrans-248
  prefs: []
  type: TYPE_NORMAL
  zh: 这些答案是由 ChatGPT 使用大型语言模型的力量实时生成的。给出的结果总是不同的，因为 ChatGPT 是按顺序生成答案的，这意味着一次一个词。
- en: One thing to note is that you should not share sensitive information (such as
    phone numbers and email addresses) because your messages may be reviewed and used
    to train the LLM that powers ChatGPT.
  id: totrans-249
  prefs: []
  type: TYPE_NORMAL
  zh: 有一个需要注意的事情是，你不应该分享敏感信息（如电话号码和电子邮件地址），因为你的消息可能会被审查并用于训练 ChatGPT 所依赖的 LLM。
- en: Alright! Now you can start asking questions to ChatGPT about anything you need.
  id: totrans-250
  prefs: []
  type: TYPE_NORMAL
  zh: 好的！现在你可以开始向 ChatGPT 提出任何你需要的问题了。
- en: 'For instance, suppose you want to start investing in mutual funds. You can
    ask ChatGPT for the advantages and disadvantages of investing in mutual funds
    to help you make an informed decision:'
  id: totrans-251
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，假设你想开始投资共同基金。你可以要求 ChatGPT 提供投资共同基金的优缺点，以帮助你做出明智的决定：
- en: '![3 chatgpt example](image_rsrc1JM.jpg)'
  id: totrans-252
  prefs: []
  type: TYPE_IMG
  zh: '![3 chatgpt example](image_rsrc1JM.jpg)'
- en: Figure 16\. Using ChatGPT to Learn Something
  id: totrans-253
  prefs: []
  type: TYPE_NORMAL
  zh: 图 16\. 使用 ChatGPT 学习某事
- en: The answer is too long to fit in a single image above, but you get the idea.
  id: totrans-254
  prefs: []
  type: TYPE_NORMAL
  zh: 答案太长，无法放入上面的单个图像中，但你能理解这个意思。
- en: Advantages of ChatGPT
  id: totrans-255
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: ChatGPT 的优点
- en: 'There are a number of advantages that make ChatGPT a valuable tool in various
    applications. Here are three key benefits of using ChatGPT:'
  id: totrans-256
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT 有许多优点，使其在各种应用中成为一个有价值的工具。以下是使用 ChatGPT 的三个关键好处：
- en: Contextual Continuity
  id: totrans-257
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 上下文连续性
- en: ChatGPT has the ability to remember previous messages within a conversation.
    This feature allows for a more coherent and contextually relevant dialogue.
  id: totrans-258
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT 具有在对话中记住先前消息的能力。这一功能使得对话更加连贯且与上下文相关。
- en: 'For example, I can ask, "What’s my previous question?" after asking about the
    advantages and disadvantages of investing in a mutual fund, and ChatGPT will answer
    like this:'
  id: totrans-259
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，我可以在询问了投资共同基金的优缺点之后问，“我之前的问题是什么？”ChatGPT 将会这样回答：
- en: '![3 chatgpt continuity](image_rsrc1JN.jpg)'
  id: totrans-260
  prefs: []
  type: TYPE_IMG
  zh: '![3 chatgpt continuity](image_rsrc1JN.jpg)'
- en: Figure 17\. ChatGPT Remembers Past Conversation
  id: totrans-261
  prefs: []
  type: TYPE_NORMAL
  zh: 图 17\. ChatGPT 记忆过去对话
- en: When a user asks a question and then follows up with a related query, ChatGPT
    can reference the earlier messages of the conversation to provide a more informed
    and accurate response.
  id: totrans-262
  prefs: []
  type: TYPE_NORMAL
  zh: 当用户提出一个问题并随后提出相关查询时，ChatGPT 可以参考对话中的早期消息，以提供更全面和准确的回答。
- en: Allowing Users to Provide Follow-Up Corrections
  id: totrans-263
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 允许用户提供后续更正
- en: ChatGPT is designed to accept and adapt to user feedback, so if a response is
    not accurate or does not meet your expectations, you can correct or refine your
    query to make ChatGPT adjust its answer.
  id: totrans-264
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT 被设计为接受并适应用户反馈，所以如果回答不准确或不符合你的期望，你可以更正或细化你的查询，使 ChatGPT 调整其答案。
- en: 'For example, suppose you asked ChatGPT to calculate the total cost of a purchase
    with 5% discount as follows:'
  id: totrans-265
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，假设你要求 ChatGPT 计算带有 5% 折扣的购买总成本如下：
- en: '![3 chatgpt calculate 1](image_rsrc1JP.jpg)'
  id: totrans-266
  prefs: []
  type: TYPE_IMG
  zh: '![3 chatgpt calculate 1](image_rsrc1JP.jpg)'
- en: Figure 18\. ChatGPT Calculation Example
  id: totrans-267
  prefs: []
  type: TYPE_NORMAL
  zh: 图 18\. ChatGPT 计算示例
- en: 'After calculation, you found out you need to revise the data previously entered:
    the discount is 10% instead of 5%.'
  id: totrans-268
  prefs: []
  type: TYPE_NORMAL
  zh: 经过计算，你发现你需要修改之前输入的数据：折扣是 10% 而不是 5%。
- en: 'You can provide a follow-up as follows:'
  id: totrans-269
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以提供以下后续操作：
- en: '![3 chatgpt calculate 2](image_rsrc1JR.jpg)'
  id: totrans-270
  prefs: []
  type: TYPE_IMG
  zh: '![3 chatgpt calculate 2](image_rsrc1JR.jpg)'
- en: Figure 19\. ChatGPT Calculation Corrected
  id: totrans-271
  prefs: []
  type: TYPE_NORMAL
  zh: 图 19\. ChatGPT 计算更正
- en: By just providing the correct discount, ChatGPT is able to perform the same
    calculation as before. This dynamic capability improves the overall utility and
    effectiveness of your interactions with ChatGPT.
  id: totrans-272
  prefs: []
  type: TYPE_NORMAL
  zh: 只需提供正确的折扣，ChatGPT 就能执行与之前相同的计算。这种动态能力提高了你与 ChatGPT 互动的整体效用和有效性。
- en: Trained to Decline Inappropriate Instructions
  id: totrans-273
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 训练拒绝不适当的指令
- en: 'When ChatGPT was released, the founder of Tesla and SpaceX Elon Musk commented
    that the AI is "scary good":'
  id: totrans-274
  prefs: []
  type: TYPE_NORMAL
  zh: 当 ChatGPT 发布时，特斯拉和 SpaceX 的创始人埃隆·马斯克评论说，这个 AI 是“令人恐惧地好”：
- en: '![3 elon](image_rsrc1JS.jpg)'
  id: totrans-275
  prefs: []
  type: TYPE_IMG
  zh: '![3 elon](image_rsrc1JS.jpg)'
- en: Figure 20\. Elon Musk Commenting on ChatGPT on X
  id: totrans-276
  prefs: []
  type: TYPE_NORMAL
  zh: 图 20\. 埃隆·马斯克在 X 上评论 ChatGPT
- en: Because ChatGPT is just that good, there will be users who want to use the tool
    for malicious intent.
  id: totrans-277
  prefs: []
  type: TYPE_NORMAL
  zh: 因为 ChatGPT 就这么好，所以会有用户想要利用这个工具进行恶意行为。
- en: To maintain ethical standards and ensure that the AI is used responsibly, ChatGPT
    was trained to recognize and decline inappropriate instructions.
  id: totrans-278
  prefs: []
  type: TYPE_NORMAL
  zh: 为了维护道德标准并确保 AI 负责任地使用，ChatGPT 被训练来识别并拒绝不适当的指令。
- en: 'For example, if you ask ChatGPT to help you with hacking an email account,
    you get the following answer:'
  id: totrans-279
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，如果您要求ChatGPT帮助您破解电子邮件账户，您会得到以下回答：
- en: '![3 chatgpt refuse](image_rsrc1JT.jpg)'
  id: totrans-280
  prefs: []
  type: TYPE_IMG
  zh: '![3 chatgpt refuse](image_rsrc1JT.jpg)'
- en: Figure 21\. ChatGPT Refusing Innapropriate Instructions
  id: totrans-281
  prefs: []
  type: TYPE_NORMAL
  zh: 图21. ChatGPT拒绝不适当指令
- en: As you can see, ChatGPT doesn’t shy away from refusing to engage in a harmful,
    offensive, or illegal request.
  id: totrans-282
  prefs: []
  type: TYPE_NORMAL
  zh: 如您所见，ChatGPT不会回避拒绝参与有害、冒犯性或非法的请求。
- en: ChatGPT wants to promote a safer and more positive environment for users, so
    this capability not only protects users but also aligns with broader society values
    and ethical guidelines. This makes the AI system a trustworthy assistant.
  id: totrans-283
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT旨在为用户提供更安全、更积极的环境，因此这项功能不仅保护了用户，而且与更广泛的社会价值观和道德规范相一致。这使得AI系统成为一个值得信赖的助手。
- en: Limitations of ChatGPT
  id: totrans-284
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: ChatGPT局限性
- en: While ChatGPT offers many advantages, you need to be aware of its limitations
    so that you can use the tool effectively and responsibly.
  id: totrans-285
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然ChatGPT提供了许多优势，但您需要意识到其局限性，以便有效地且负责任地使用此工具。
- en: 'Here are three main limitations of ChatGPT:'
  id: totrans-286
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是ChatGPT的三个主要局限性：
- en: Might Generate Incorrect Information
  id: totrans-287
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 可能生成错误信息
- en: One significant limitation of ChatGPT is its potential to generate incorrect
    or misleading information.
  id: totrans-288
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT的一个显著局限性是其可能生成错误或误导性信息。
- en: Although the model is trained on a vast amount of data, it doesn’t have real-time
    access to verify facts and can sometimes produce responses that are inaccurate
    or outdated.
  id: totrans-289
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管该模型在大量数据上进行了训练，但它没有实时访问来验证事实，有时可能产生不准确或过时的回答。
- en: This can be particularly problematic in situations where precise and reliable
    information is crucial. Users should always cross-check critical information from
    authoritative sources to ensure its accuracy.
  id: totrans-290
  prefs: []
  type: TYPE_NORMAL
  zh: 在精确和可靠信息至关重要的场合，这可能会特别成问题。用户应始终从权威来源交叉检查关键信息，以确保其准确性。
- en: Might Generate Harmful or Biased Answers
  id: totrans-291
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 可能生成有害或偏见答案
- en: ChatGPT training data includes a wide range of human text, which can contain
    biases and potentially harmful content. Although safeguards and filters are in
    place, the AI may still produce responses that reflect these biases or are otherwise
    inappropriate. Despite efforts to minimize such occurrences, ChatGPT might occasionally
    generate harmful or biased answers.
  id: totrans-292
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT的训练数据包括广泛的人类文本，可能包含偏见和潜在有害内容。尽管有安全措施和过滤器，但AI可能仍然产生反映这些偏见或不适当地回答。尽管努力减少此类事件的发生，ChatGPT偶尔可能生成有害或偏见的答案。
- en: It’s essential for users to approach the AI’s responses critically and to be
    aware of the potential for such issues. OpenAI continues to work on improving
    these aspects to make AI safer and unbiased.
  id: totrans-293
  prefs: []
  type: TYPE_NORMAL
  zh: 用户批判性地对待AI的回答并意识到这些问题是至关重要的。OpenAI继续努力改进这些方面，以使AI更安全且无偏见。
- en: Also note that ChatGPT is not a replacement for professional services, such
    as therapists, coaches, or legal advisors, so please do not attempt to use the
    tool to supplant these services.
  id: totrans-294
  prefs: []
  type: TYPE_NORMAL
  zh: 还请注意，ChatGPT不能替代专业服务，例如治疗师、教练或法律顾问，因此请不要尝试使用此工具来取代这些服务。
- en: Always consult a qualified professional for advice tailored to your specific
    circumstances.
  id: totrans-295
  prefs: []
  type: TYPE_NORMAL
  zh: 请始终咨询合格的专业人士，以获得针对您特定情况的建议。
- en: Knowledge Cutoff
  id: totrans-296
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 知识截止
- en: ChatGPT training data only includes information available up to a certain date,
    so the AI system has no awareness of new events, developments, or trends after
    the date.
  id: totrans-297
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT的训练数据仅包括截至某个日期的信息，因此AI系统对该日期之后的新事件、发展或趋势没有意识。
- en: When ChatGPT was released, its cutoff date was September 2021\. This cutoff
    date was continually updated as the development of ChatGPT continues.
  id: totrans-298
  prefs: []
  type: TYPE_NORMAL
  zh: 当ChatGPT发布时，其截止日期是2021年9月。随着ChatGPT的发展，这个截止日期持续更新。
- en: 'You can ask the knowledge cutoff date directly to ChatGPT as follows:'
  id: totrans-299
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以直接向ChatGPT询问知识截止日期，如下所示：
- en: '![3 chatgpt cutoff](image_rsrc1JU.jpg)'
  id: totrans-300
  prefs: []
  type: TYPE_IMG
  zh: '![3 chatgpt cutoff](image_rsrc1JU.jpg)'
- en: Figure 22\. ChatGPT Knowledge Cutoff Date
  id: totrans-301
  prefs: []
  type: TYPE_NORMAL
  zh: 图22. ChatGPT知识截止日期
- en: OpenAI (the company behind ChatGPT) is constantly working to update ChatGPT
    training data, but because it must undergo rigorous safety testing before release,
    the cutoff date will always be months or years earlier than the current date.
  id: totrans-302
  prefs: []
  type: TYPE_NORMAL
  zh: OpenAI（ChatGPT背后的公司）正在不断努力更新ChatGPT的训练数据，但由于在发布前必须经过严格的安全测试，因此截止日期将始终比当前日期早几个月或几年。
- en: Signing Up For a ChatGPT Account
  id: totrans-303
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 注册ChatGPT账户
- en: You can use ChatGPT without signing up for an account, but your experience with
    the tool will be limited.
  id: totrans-304
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以不注册账户就使用 ChatGPT，但你的工具体验将会受限。
- en: When you go away from the website and come back, your previous conversations
    will disappear.
  id: totrans-305
  prefs: []
  type: TYPE_NORMAL
  zh: 当你离开网站并回来时，之前的对话将会消失。
- en: You are also limited to the free version of ChatGPT, which uses the GPT 3.5
    model under the hood.
  id: totrans-306
  prefs: []
  type: TYPE_NORMAL
  zh: 你也仅限于 ChatGPT 的免费版本，其底层使用 GPT 3.5 模型。
- en: To save your previous conversations, use the latest GPT model, and subscribe
    to ChatGPT paid service, you need to register a free account.
  id: totrans-307
  prefs: []
  type: TYPE_NORMAL
  zh: 要保存之前的对话，使用最新的 GPT 模型，并订阅 ChatGPT 付费服务，你需要注册一个免费账户。
- en: 'On the top right side of the interface, you can see the ''Sign up'' and ''Log
    in'' buttons as shown below:'
  id: totrans-308
  prefs: []
  type: TYPE_NORMAL
  zh: 在界面的右上角，你可以看到如下所示的“注册”和“登录”按钮：
- en: '![3 chatgpt signup](image_rsrc1JV.jpg)'
  id: totrans-309
  prefs: []
  type: TYPE_IMG
  zh: '![3 chatgptsignup](image_rsrc1JV.jpg)'
- en: Figure 23\. ChatGPT Sign Up Button
  id: totrans-310
  prefs: []
  type: TYPE_NORMAL
  zh: 图 23\. ChatGPT 注册按钮
- en: 'Click the ''Sign up'' button to register an account with ChatGPT. You can use
    an email address, or an account from Microsoft, Google, or Apple to sign up:'
  id: totrans-311
  prefs: []
  type: TYPE_NORMAL
  zh: 点击“注册”按钮，用 ChatGPT 注册一个账户。你可以使用电子邮件地址，或者使用来自 Microsoft、Google 或 Apple 的账户来注册：
- en: '![3 chatgpt register](image_rsrc1JW.jpg)'
  id: totrans-312
  prefs: []
  type: TYPE_IMG
  zh: '![3 chatgpt register](image_rsrc1JW.jpg)'
- en: Figure 24\. Sign Up For a ChatGPT Account
  id: totrans-313
  prefs: []
  type: TYPE_NORMAL
  zh: 图 24\. 注册 ChatGPT 账户
- en: Once you sign up for an account, you might be asked for more details, such as
    entering your 'Full Name' and 'Birthday', then verify your account by entering
    a phone number.
  id: totrans-314
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦你注册了账户，你可能会被要求提供更多详细信息，例如输入你的“全名”和“生日”，然后通过输入电话号码来验证你的账户。
- en: Just follow the instructions you see on the screen until you get back to ChatGPT
    interface.
  id: totrans-315
  prefs: []
  type: TYPE_NORMAL
  zh: 只需按照屏幕上的说明操作，直到你回到 ChatGPT 界面。
- en: Useful ChatGPT Features
  id: totrans-316
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 有用的 ChatGPT 功能
- en: 'Once you return to ChatGPT, you will notice that this time you have a slightly
    different interface with a sidebar similar to this:'
  id: totrans-317
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦你回到 ChatGPT，你会注意到这次你有一个稍微不同的界面，有一个类似于下面的侧边栏：
- en: '![3 gpt sidebar](image_rsrc1JX.jpg)'
  id: totrans-318
  prefs: []
  type: TYPE_IMG
  zh: '![3 gpt sidebar](image_rsrc1JX.jpg)'
- en: Figure 25\. ChatGPT Sidebar Changed
  id: totrans-319
  prefs: []
  type: TYPE_NORMAL
  zh: 图 25\. ChatGPT 侧边栏更改
- en: The sidebar contains extra features available only to registered ChatGPT users.
    The sidebar can be hidden by clicking on the sidebar icon (2) as shown above.
  id: totrans-320
  prefs: []
  type: TYPE_NORMAL
  zh: 侧边栏包含仅对注册 ChatGPT 用户可用的额外功能。可以通过点击上面的侧边栏图标（2）来隐藏侧边栏，如下所示。
- en: Next, Let me break down the useful features added to ChatGPT for free users.
  id: totrans-321
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，让我来分解为免费用户添加到 ChatGPT 的有用功能。
- en: File Uploads
  id: totrans-322
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 文件上传
- en: 'If you look into the ChatGPT text input, you’ll notice that there’s a paper
    clip icon before the input as shown below:'
  id: totrans-323
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你查看 ChatGPT 文本输入，你会注意到输入前有一个回形针图标，如下所示：
- en: '![3 upload file icon](image_rsrc1JY.jpg)'
  id: totrans-324
  prefs: []
  type: TYPE_IMG
  zh: '![3 upload file icon](image_rsrc1JY.jpg)'
- en: Figure 26\. Upload File Icon in ChatGPT
  id: totrans-325
  prefs: []
  type: TYPE_NORMAL
  zh: 图 26\. ChatGPT 上传文件图标
- en: This icon enables you to send files to ChatGPT. You can opt to connect to Google
    Drive or Microsoft One Drive so that ChatGPT can access your files, or upload
    a file from your computer.
  id: totrans-326
  prefs: []
  type: TYPE_NORMAL
  zh: 此图标允许你向 ChatGPT 发送文件。你可以选择连接到 Google Drive 或 Microsoft One Drive，以便 ChatGPT
    可以访问你的文件，或者从你的电脑上传一个文件。
- en: You can upload documents (PDF or a DOCX files) or images (JPG or PNG files)
    and then ask questions regarding the file.
  id: totrans-327
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以上传文档（PDF 或 DOCX 文件）或图片（JPG 或 PNG 文件），然后就文件提出问题。
- en: 'In the following example, I asked ChatGPT to describe the uploaded image:'
  id: totrans-328
  prefs: []
  type: TYPE_NORMAL
  zh: 在以下示例中，我要求 ChatGPT 描述上传的图片：
- en: '![3 gpt describe image](image_rsrc1JZ.jpg)'
  id: totrans-329
  prefs: []
  type: TYPE_IMG
  zh: '![3 gpt describe image](image_rsrc1JZ.jpg)'
- en: Figure 27\. ChatGPT Described an Image
  id: totrans-330
  prefs: []
  type: TYPE_NORMAL
  zh: 图 27\. ChatGPT 描述了图片
- en: Here, ChatGPT correctly identified the Colosseum of Rome, which is located in
    Italy. It also described the objects around the building.
  id: totrans-331
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，ChatGPT 正确地识别了位于意大利的罗马斗兽场，并描述了建筑物周围的物体。
- en: Again, keep in mind that you don’t share files with sensitive information with
    ChatGPT.
  id: totrans-332
  prefs: []
  type: TYPE_NORMAL
  zh: 再次提醒，不要与 ChatGPT 分享包含敏感信息的文件。
- en: Switch LLM Models
  id: totrans-333
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 切换 LLM 模型
- en: 'ChatGPT commonly offers two of the latest models available. You can see the
    model used to generate the response by clicking on the stars icon as shown below:'
  id: totrans-334
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT 通常提供两种最新的模型。你可以通过点击下面的星星图标来查看用于生成响应的模型，如下所示：
- en: '![3 gpt models](image_rsrc1K0.jpg)'
  id: totrans-335
  prefs: []
  type: TYPE_IMG
  zh: '![3 gpt models](image_rsrc1K0.jpg)'
- en: Figure 28\. ChatGPT Models Option
  id: totrans-336
  prefs: []
  type: TYPE_NORMAL
  zh: 图 28\. ChatGPT 模型选项
- en: As of this writing, the latest GPT model is GPT-4o, and this model is available
    for a limited number of conversations.
  id: totrans-337
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，最新的 GPT 模型是 GPT-4o，这个模型仅适用于有限数量的对话。
- en: The exact limit is not stated on ChatGPT website, but usually you can get up
    to 15 - 20 messages using GPT-4o every 3 hours.
  id: totrans-338
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT 网站上没有明确说明确切限制，但通常你每 3 小时可以使用 GPT-4o 发送多达 15-20 条消息。
- en: 'When the limit is reached, you’ll get a notification that ChatGPT will use
    GPT 3.5 as follows:'
  id: totrans-339
  prefs: []
  type: TYPE_NORMAL
  zh: 当达到限制时，您将收到通知，ChatGPT将使用GPT 3.5如下：
- en: '![3 chatgpt limit reached](image_rsrc1K1.jpg)'
  id: totrans-340
  prefs: []
  type: TYPE_IMG
  zh: '![3 ChatGPT达到限制](image_rsrc1K1.jpg)'
- en: Figure 29\. ChatGPT Limit Reached
  id: totrans-341
  prefs: []
  type: TYPE_NORMAL
  zh: 图 29\. ChatGPT达到限制
- en: If you subscribe to ChatGPT Plus, you can get up to 5 times the usage, which
    means around 80 messages every 3 hours.
  id: totrans-342
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您订阅了ChatGPT Plus，您可以获得最多5倍的用量，这意味着每3小时大约80条消息。
- en: Managing Previous Conversations
  id: totrans-343
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 管理之前的对话
- en: 'With a registered account, you can access previous chat sessions as you can
    see below:'
  id: totrans-344
  prefs: []
  type: TYPE_NORMAL
  zh: 使用注册账户，您可以访问以下所示的之前的聊天会话：
- en: '![3 gpt conversations](image_rsrc1K2.jpg)'
  id: totrans-345
  prefs: []
  type: TYPE_IMG
  zh: '![3 ChatGPT对话](image_rsrc1K2.jpg)'
- en: Figure 30\. Managing ChatGPT Chat Sessions
  id: totrans-346
  prefs: []
  type: TYPE_NORMAL
  zh: 图 30\. 管理ChatGPT聊天会话
- en: You can also initiate a new conversation by clicking the 'New Chat' icon above.
  id: totrans-347
  prefs: []
  type: TYPE_NORMAL
  zh: 您也可以通过点击上面的“新建聊天”图标来启动一个新的对话。
- en: Whenever you leave ChatGPT website, the chat sessions you have initiated are
    saved automatically.
  id: totrans-348
  prefs: []
  type: TYPE_NORMAL
  zh: 每次您离开ChatGPT网站时，您启动的聊天会话都会自动保存。
- en: 'If you want to clear all chat sessions, you need to go to Settings > General
    > Delete all chats as shown below:'
  id: totrans-349
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您想清除所有聊天会话，您需要转到设置>常规>删除所有聊天，如下所示：
- en: '![3 chatgpt delete all](image_rsrc1K3.jpg)'
  id: totrans-350
  prefs: []
  type: TYPE_IMG
  zh: '![3 删除所有ChatGPT](image_rsrc1K3.jpg)'
- en: Figure 31\. Delete All Chat Sessions in ChatGPT
  id: totrans-351
  prefs: []
  type: TYPE_NORMAL
  zh: 图 31\. 在ChatGPT中删除所有聊天会话
- en: 'To delete a single chat session, you can click on the triple dots (…​) icon
    next to the chat session item, then click the Delete option:'
  id: totrans-352
  prefs: []
  type: TYPE_NORMAL
  zh: 要删除单个聊天会话，您可以点击聊天会话项旁边的三个点（…）图标，然后点击删除选项：
- en: '![3 gpt delete session](image_rsrc1K4.jpg)'
  id: totrans-353
  prefs: []
  type: TYPE_IMG
  zh: '![3 删除会话](image_rsrc1K4.jpg)'
- en: Figure 32\. Delete A Single Session in ChatGPT
  id: totrans-354
  prefs: []
  type: TYPE_NORMAL
  zh: 图 32\. 在ChatGPT中删除单个会话
- en: The selected single session will then be deleted from ChatGPT.
  id: totrans-355
  prefs: []
  type: TYPE_NORMAL
  zh: 然后所选的单个会话将从ChatGPT中删除。
- en: As shown in the menu above, you can also rename or share your conversation with
    ChatGPT.
  id: totrans-356
  prefs: []
  type: TYPE_NORMAL
  zh: 如上图菜单所示，您还可以重命名或与ChatGPT分享您的对话。
- en: ChatGPT will generate a public link for each conversation you choose to share,
    allowing others to view that particular chat session. Remember that they are unable
    to send any prompts; they can only read the chat.
  id: totrans-357
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT将为您选择的每个要分享的对话生成一个公共链接，允许他人查看特定的聊天会话。请记住，他们无法发送任何提示；他们只能阅读聊天。
- en: Temporary Chat
  id: totrans-358
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 临时聊天
- en: You can switch to a temporary chat mode to start a private conversation with
    ChatGPT.
  id: totrans-359
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以切换到临时聊天模式，与ChatGPT开始私密对话。
- en: 'To see this option, select the ChatGPT drop down on the top-left just next
    to the sidebar:'
  id: totrans-360
  prefs: []
  type: TYPE_NORMAL
  zh: 要查看此选项，请选择左上角的ChatGPT下拉菜单，紧挨着侧边栏：
- en: '![3 chatgpt temporary chat](image_rsrc1K5.jpg)'
  id: totrans-361
  prefs: []
  type: TYPE_IMG
  zh: '![3 ChatGPT临时聊天](image_rsrc1K5.jpg)'
- en: Figure 33\. ChatGPT Temporary Chat
  id: totrans-362
  prefs: []
  type: TYPE_NORMAL
  zh: 图 33\. ChatGPT临时聊天
- en: 'When this mode is active, the text input will be pitch black, and the sidebar
    will be greyed out:'
  id: totrans-363
  prefs: []
  type: TYPE_NORMAL
  zh: 当此模式激活时，文本输入将变为纯黑色，侧边栏将变为灰色：
- en: '![3 temporary chat active](image_rsrc1K6.jpg)'
  id: totrans-364
  prefs: []
  type: TYPE_IMG
  zh: '![3 临时聊天激活](image_rsrc1K6.jpg)'
- en: Figure 34\. Active Temporary Chat
  id: totrans-365
  prefs: []
  type: TYPE_NORMAL
  zh: 图 34\. 激活临时聊天
- en: Temporary chats will not be used to train GPT models, use or create memories,
    or show up in the history sidebar. This mode is useful when you want to share
    data that is quite sensitive with ChatGPT.
  id: totrans-366
  prefs: []
  type: TYPE_NORMAL
  zh: 临时聊天不会用于训练GPT模型、使用或创建记忆，或显示在历史侧边栏中。当您想与ChatGPT分享非常敏感的数据时，此模式非常有用。
- en: Personalized Settings
  id: totrans-367
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 个性化设置
- en: The Settings option allows you to personalize the experience of using ChatGPT.
    To open the Settings menu, click on your profile picture at the top right corner,
    and select Settings.
  id: totrans-368
  prefs: []
  type: TYPE_NORMAL
  zh: 设置选项允许您个性化使用ChatGPT的体验。要打开设置菜单，请点击右上角的个人资料图片，然后选择设置。
- en: There are many useful settings that you can modify to enhance your experience.
  id: totrans-369
  prefs: []
  type: TYPE_NORMAL
  zh: 有许多有用的设置可以修改以增强您的体验。
- en: 'For example, you can use the Dark theme which may decrease eye strain if you
    have a room with low-light conditions:'
  id: totrans-370
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，如果您在光线较暗的房间里，可以使用深色主题，这可能会减少眼睛疲劳：
- en: '![3 gpt dark theme](image_rsrc1K7.jpg)'
  id: totrans-371
  prefs: []
  type: TYPE_IMG
  zh: '![3 ChatGPT深色主题](image_rsrc1K7.jpg)'
- en: Figure 35\. ChatGPT Options
  id: totrans-372
  prefs: []
  type: TYPE_NORMAL
  zh: 图 35\. ChatGPT选项
- en: 'You can also opt to not share your conversation to train ChatGPT in Data Controls
    > Improve the model as shown below:'
  id: totrans-373
  prefs: []
  type: TYPE_NORMAL
  zh: 您还可以选择不在数据控制>改进模型中分享您的对话以训练ChatGPT，如下所示：
- en: '![3 disable training](image_rsrc1K8.jpg)'
  id: totrans-374
  prefs: []
  type: TYPE_IMG
  zh: '![3 禁用训练](image_rsrc1K8.jpg)'
- en: Figure 36\. Disable Data Sharing With ChatGPT
  id: totrans-375
  prefs: []
  type: TYPE_NORMAL
  zh: 图 36\. 禁用与ChatGPT的数据共享
- en: Another important option is to enable Multi-factor authentication to secure
    your account. You can view this option under the Security tab.
  id: totrans-376
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个重要的选项是启用多因素认证以保护您的账户。您可以在安全选项卡下查看此选项。
- en: Feel free to navigate around and see all the options offered by ChatGPT.
  id: totrans-377
  prefs: []
  type: TYPE_NORMAL
  zh: 随意浏览并查看ChatGPT提供的所有选项。
- en: GPT Memory
  id: totrans-378
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: GPT记忆
- en: GPT Memory is the latest addition to ChatGPT features. This feature enables
    ChatGPT to remember conversations from different chat sessions.
  id: totrans-379
  prefs: []
  type: TYPE_NORMAL
  zh: GPT记忆是ChatGPT功能中的最新增项。此功能使ChatGPT能够记住来自不同聊天会话的对话。
- en: '![3 chatgpt memory](image_rsrc1K9.jpg)'
  id: totrans-380
  prefs: []
  type: TYPE_IMG
  zh: '![3 chatgpt记忆](image_rsrc1K9.jpg)'
- en: Figure 37\. ChatGPT Memory Feature
  id: totrans-381
  prefs: []
  type: TYPE_NORMAL
  zh: 图37. ChatGPT记忆功能
- en: The information added to ChatGPT memory is automatic, and it will only include
    personal information that you shared with the tool.
  id: totrans-382
  prefs: []
  type: TYPE_NORMAL
  zh: 添加到ChatGPT记忆中的信息是自动的，并且它只会包括您与工具共享的个人资料信息。
- en: 'Whenever ChatGPT uses this feature, you will see a notification that says ''Memory
    updated'' before the response like this:'
  id: totrans-383
  prefs: []
  type: TYPE_NORMAL
  zh: 每当ChatGPT使用此功能时，您将在响应之前看到一条通知，如下所示：“记忆更新”。
- en: '![3 memory updated](image_rsrc1KA.jpg)'
  id: totrans-384
  prefs: []
  type: TYPE_IMG
  zh: '![3 记忆更新](image_rsrc1KA.jpg)'
- en: Figure 38\. ChatGPT Memory Updated Notification
  id: totrans-385
  prefs: []
  type: TYPE_NORMAL
  zh: 图38. ChatGPT记忆更新通知
- en: 'If you hover over the notification, you’ll see the new entry on the memory,
    as well as the option to manage saved information as follows:'
  id: totrans-386
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您将鼠标悬停在通知上，您将看到记忆中的新条目，以及如下管理保存信息的选项：
- en: '![3 memory hover](image_rsrc1KB.jpg)'
  id: totrans-387
  prefs: []
  type: TYPE_IMG
  zh: '![3 记忆悬停](image_rsrc1KB.jpg)'
- en: Figure 39\. ChatGPT Memory Detail
  id: totrans-388
  prefs: []
  type: TYPE_NORMAL
  zh: 图39. ChatGPT记忆详情
- en: When you open a new chat session, information saved in memory will be included
    for reference.
  id: totrans-389
  prefs: []
  type: TYPE_NORMAL
  zh: 当您打开新的聊天会话时，保存在记忆中的信息将包括作为参考。
- en: You can delete any information saved in memory, as well as disable this feature
    entirely from the Settings > Personalization option.
  id: totrans-390
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以删除保存在记忆中的任何信息，也可以从设置>个性化选项中完全禁用此功能。
- en: Explore Custom GPTs
  id: totrans-391
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 探索自定义GPT
- en: Custom GPTs are GPT models created for a specific purpose. These GPTs can have
    custom instructions or actions tailored to perform specific tasks.
  id: totrans-392
  prefs: []
  type: TYPE_NORMAL
  zh: 自定义GPT是为特定目的创建的GPT模型。这些GPT可以具有定制的指令或操作，以执行特定任务。
- en: 'To access custom GPTs, select the Explore GPTs menu from the sidebar as follows:'
  id: totrans-393
  prefs: []
  type: TYPE_NORMAL
  zh: 要访问自定义GPT，请从侧边栏选择“探索GPT”菜单，如下所示：
- en: '![3 custom gpts](image_rsrc1KC.jpg)'
  id: totrans-394
  prefs: []
  type: TYPE_IMG
  zh: '![3 自定义GPT](image_rsrc1KC.jpg)'
- en: Figure 40\. The GPT Store Interface
  id: totrans-395
  prefs: []
  type: TYPE_NORMAL
  zh: 图40. GPT商店界面
- en: Here, you can see there is the Kayak custom GPT, which specializes in helping
    you to plan travels. There’s also the Resume GPT, which can assist you in diagnosing
    and enhancing resumes.
  id: totrans-396
  prefs: []
  type: TYPE_NORMAL
  zh: 这里，您可以看到有专门帮助您规划旅行的Kayak自定义GPT，还有可以帮助您诊断和改进简历的Resume GPT。
- en: To use these custom GPTs, you only need to click on them and start a chat.
  id: totrans-397
  prefs: []
  type: TYPE_NORMAL
  zh: 要使用这些自定义GPT，您只需点击它们并开始聊天。
- en: You can even create and share your own custom GPT. We will explore this feature
    more later in Chapter 6.
  id: totrans-398
  prefs: []
  type: TYPE_NORMAL
  zh: 您甚至可以创建并分享您自己的自定义GPT。我们将在第6章中更深入地探讨这个功能。
- en: Upgrade to ChatGPT Plus
  id: totrans-399
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 升级到ChatGPT Plus
- en: 'As a registered user, you have the option to subscribe to ChatGPT Plus by clicking
    on the upgrade banner as shown below:'
  id: totrans-400
  prefs: []
  type: TYPE_NORMAL
  zh: 作为注册用户，您可以通过点击以下所示的升级横幅来订阅ChatGPT Plus：
- en: '![3 plus plan](image_rsrc1KD.jpg)'
  id: totrans-401
  prefs: []
  type: TYPE_IMG
  zh: '![3 plus计划](image_rsrc1KD.jpg)'
- en: Figure 41\. ChatGPT Subscription Plans
  id: totrans-402
  prefs: []
  type: TYPE_NORMAL
  zh: 图41. ChatGPT订阅计划
- en: The Plus plan is USD $20 per month. There’s also the Team plan which gives a
    higher limit for using the paid features and provides the workspaces feature.
  id: totrans-403
  prefs: []
  type: TYPE_NORMAL
  zh: Plus计划每月20美元。还有团队计划，它为使用付费功能提供了更高的限制，并提供了工作空间功能。
- en: I highly recommend the Plus plan if you decide to use ChatGPT extensively, but
    you don’t have to get the subscription yet.
  id: totrans-404
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您决定广泛使用ChatGPT，我强烈推荐Plus计划，但您不必立即订阅。
- en: I will show you the features offered by the Plus plan later in Chapter 5, and
    then you can decide whether you want to subscribe or not.
  id: totrans-405
  prefs: []
  type: TYPE_NORMAL
  zh: 我将在第5章中向您展示Plus计划提供的功能，然后您可以决定是否订阅。
- en: Summary
  id: totrans-406
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: In this chapter, you’ve started using ChatGPT as a helpful assistant and learned
    about its capabilities and limitations.
  id: totrans-407
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，您已经开始使用ChatGPT作为有用的助手，并了解了其功能和限制。
- en: You’ve also had a tour introducing the features offered by ChatGPT for free
    users, such as file uploads, chat sessions, accessing the latest GPT model, and
    temporary chat mode.
  id: totrans-408
  prefs: []
  type: TYPE_NORMAL
  zh: 您还游览了ChatGPT为免费用户提供的功能，例如文件上传、聊天会话、访问最新的GPT模型和临时聊天模式。
- en: In the upcoming chapter, we will explore prompt engineering, a new field of
    study that focuses on maximizing the effectiveness of Generative AI.
  id: totrans-409
  prefs: []
  type: TYPE_NORMAL
  zh: 在即将到来的章节中，我们将探讨提示工程，这是一个专注于最大化生成式AI有效性的新研究领域。
- en: 'Chapter 4: Prompt Engineering For Non-Technical People'
  id: totrans-410
  prefs: []
  type: TYPE_NORMAL
  zh: 第四章：面向非技术人员的提示工程
- en: In the context of Generative AI, a prompt is simply a question, instruction,
    or input that you provide to an AI system so that you can receive a particular
    response back.
  id: totrans-411
  prefs: []
  type: TYPE_NORMAL
  zh: 在生成式 AI 的背景下，提示只是你提供给 AI 系统的问题、指令或输入，以便你可以得到特定的响应。
- en: This response can be whatever the AI system is trained to produce. For ChatGPT,
    it’s likely a text of information, an article, or a piece of code. For another
    AI system trained on images, it might generate new images or edit existing ones.
  id: totrans-412
  prefs: []
  type: TYPE_NORMAL
  zh: 这个响应可以是 AI 系统训练产生的任何内容。对于 ChatGPT，它可能是信息文本、文章或代码。对于在图像上训练的另一个 AI 系统，它可能会生成新的图像或编辑现有的图像。
- en: When you test ChatGPT in the previous chapter, you’ve already learned how to
    give a prompt to an AI system.
  id: totrans-413
  prefs: []
  type: TYPE_NORMAL
  zh: 当你在上一章测试 ChatGPT 时，你已经学会了如何向一个 AI 系统提供提示。
- en: Prompt engineering is a new field of study for writing and optimizing prompts
    so that humans can get an accurate and relevant response from Generative AI.
  id: totrans-414
  prefs: []
  type: TYPE_NORMAL
  zh: 提示工程是写作和优化提示的新研究领域，以便人类可以从生成式 AI 获得准确和相关的响应。
- en: 'I found that there are 4 strategies that can help me get the desired results.
    They are:'
  id: totrans-415
  prefs: []
  type: TYPE_NORMAL
  zh: 我发现有 4 种策略可以帮助我获得期望的结果。它们是：
- en: Writing clear instructions
  id: totrans-416
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 写出清晰的指令
- en: Providing reference
  id: totrans-417
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供参考
- en: Breaking a big task into smaller tasks
  id: totrans-418
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将大任务分解成小任务
- en: Giving specific role
  id: totrans-419
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 给出具体角色
- en: Let’s explore these 4 options next.
  id: totrans-420
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们接下来探索这 4 个选项。
- en: Write Clear Instructions
  id: totrans-421
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 写出清晰的指令
- en: ChatGPT and other Generative AI technologies are not able to read your mind
    or know who you are.
  id: totrans-422
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT 和其他生成式 AI 技术无法读取你的想法或知道你是谁。
- en: 'This means you need to provide explicit and detailed instructions to ensure
    the AI understands your request accurately. Here are some tips to help you write
    clear instructions for Generative AI:'
  id: totrans-423
  prefs: []
  type: TYPE_NORMAL
  zh: 这意味着你需要提供明确和详细的指令，以确保 AI 准确理解你的请求。以下是一些帮助你为生成式 AI 编写清晰指令的提示：
- en: Include Specific Details
  id: totrans-424
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 包含具体细节
- en: Generic prompts result in generic answers. If you want to get a highly relevant
    answer, you need to provide any important details in the prompt.
  id: totrans-425
  prefs: []
  type: TYPE_NORMAL
  zh: 通用提示会导致通用答案。如果你想得到高度相关的答案，你需要在提示中提供任何重要的细节。
- en: For example, if your prompt is "Tell me about dogs," then ChatGPT will answer
    with generic information about dogs. If you only want information about a specific
    breed of dogs, so you could say "Tell me about the different breeds of Poodles
    and their characteristics."
  id: totrans-426
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，如果你的提示是“告诉我关于狗的事情”，那么 ChatGPT 将用关于狗的通用信息回答。如果你只想了解特定品种的狗，你可以说“告诉我关于不同品种的贵宾犬及其特征。”
- en: Use Simple Language
  id: totrans-427
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 使用简单语言
- en: The simpler the language you use, the easier it will be for ChatGPT to understand
    and process your request.
  id: totrans-428
  prefs: []
  type: TYPE_NORMAL
  zh: 你使用的语言越简单，ChatGPT 理解和处理你的请求就越容易。
- en: For instance, "Explain how photosynthesis works" is more straightforward than
    "Provide an in-depth analysis of the photosynthetic process."
  id: totrans-429
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，“解释光合作用是如何工作的”比“提供对光合作用过程的深入分析”更直接。
- en: Iterate and Refine
  id: totrans-430
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 迭代和细化
- en: Because AI remembers past conversations, you can iterate and refine your instructions
    to help AI understand the request. Prompt engineering is a mix of art and science,
    and sometimes you might need several attempts before you get the response you
    want.
  id: totrans-431
  prefs: []
  type: TYPE_NORMAL
  zh: 因为 AI 记得过去的对话，你可以迭代和细化你的指令，以帮助 AI 理解请求。提示工程是艺术和科学的结合，有时你可能需要尝试几次才能得到你想要的响应。
- en: Providing feedback or additional clarification can help ChatGPT generate a more
    accurate response on subsequent attempts.
  id: totrans-432
  prefs: []
  type: TYPE_NORMAL
  zh: 提供反馈或额外的澄清可以帮助 ChatGPT 在后续尝试中生成更准确的响应。
- en: Specify the Output Length and Format
  id: totrans-433
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 指定输出长度和格式
- en: 'When you see the output is longer than you expected, you can ask the AI for
    a shorter output. For example:'
  id: totrans-434
  prefs: []
  type: TYPE_NORMAL
  zh: 当你看到输出比你预期的更长时，你可以要求 AI 提供更短的输出。例如：
- en: Summarize the text delimited by triple quotes below in about 300 words.
  id: totrans-435
  prefs: []
  type: TYPE_NORMAL
  zh: 将以下由三引号分隔的文本总结为大约 300 字。
- en: '"""insert text here"""'
  id: totrans-436
  prefs: []
  type: TYPE_NORMAL
  zh: '```插入文本在这里```'
- en: 'If you want bullet points instead of paragraphs, then say so in the prompt
    as well:'
  id: totrans-437
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想要的是项目符号而不是段落，那么在提示中也要这样说明：
- en: Summarize the text delimited by triple quotes below as 3 bullet points.
  id: totrans-438
  prefs: []
  type: TYPE_NORMAL
  zh: 将以下由三引号分隔的文本总结为 3 个项目符号。
- en: '"""insert text here"""'
  id: totrans-439
  prefs: []
  type: TYPE_NORMAL
  zh: '```插入文本在这里```'
- en: Now the summary will be formatted as bullet points instead of paragraphs.
  id: totrans-440
  prefs: []
  type: TYPE_NORMAL
  zh: 现在总结将以项目符号的形式呈现，而不是段落。
- en: Provide Reference
  id: totrans-441
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 提供参考
- en: If you want ChatGPT to answer from a reference text, you can say so in the prompt.
  id: totrans-442
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想让 ChatGPT 从参考文本中回答，你可以在提示中这样说明。
- en: 'For example, send the prompt below after you upload a PDF file:'
  id: totrans-443
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，在你上传 PDF 文件后发送以下提示：
- en: Use the provided document to answer the following question.
  id: totrans-444
  prefs: []
  type: TYPE_NORMAL
  zh: 使用提供的文档来回答以下问题。
- en: If the answer cannot be found in the articles, write "I could not find an answer."
  id: totrans-445
  prefs: []
  type: TYPE_NORMAL
  zh: 如果答案在文章中找不到，请写“我找不到答案。”
- en: 'Question: <insert question here>'
  id: totrans-446
  prefs: []
  type: TYPE_NORMAL
  zh: 问题：[在此处插入问题]
- en: This way, ChatGPT will not try to come up with an answer derived from its training
    data. It will only refer to your PDF document for the answer.
  id: totrans-447
  prefs: []
  type: TYPE_NORMAL
  zh: 这样，ChatGPT将不会尝试从其训练数据中得出答案。它只会参考你的PDF文档来获取答案。
- en: 'If you want ChatGPT to also cite the source, you can further improve the prompt
    as follows:'
  id: totrans-448
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想让ChatGPT也引用来源，你可以进一步改进提示如下：
- en: Use the provided document to answer the following question.
  id: totrans-449
  prefs: []
  type: TYPE_NORMAL
  zh: 使用提供的文档来回答以下问题。
- en: If the answer cannot be found in the articles, write "I could not find an answer."
  id: totrans-450
  prefs: []
  type: TYPE_NORMAL
  zh: 如果答案在文章中找不到，请写“我找不到答案。”
- en: If an answer to the question is provided, it must be annotated with a citation.
  id: totrans-451
  prefs: []
  type: TYPE_NORMAL
  zh: 如果提供了问题的答案，它必须带有引用标注。
- en: 'Use the following format for the citation:'
  id: totrans-452
  prefs: []
  type: TYPE_NORMAL
  zh: 使用以下格式进行引用：
- en: '({"citation": <passages from the document>}).'
  id: totrans-453
  prefs: []
  type: TYPE_NORMAL
  zh: '（{"引用": <文档中的段落>}）。'
- en: 'Question: <insert question here>'
  id: totrans-454
  prefs: []
  type: TYPE_NORMAL
  zh: 问题：[在此处插入问题]
- en: Now ChatGPT will tell you which passage it refers to for the answer.
  id: totrans-455
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，ChatGPT将告诉你它为答案引用了哪些段落。
- en: Break a Big Task Into Smaller Tasks
  id: totrans-456
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 将大任务分解为小任务
- en: One effective prompt engineering strategy involves breaking down a complex task
    into smaller, more manageable prompts to enhance the clarity and precision of
    the responses.
  id: totrans-457
  prefs: []
  type: TYPE_NORMAL
  zh: 一种有效的提示工程策略是将复杂任务分解为更小、更易于管理的提示，以增强回答的清晰度和精确度。
- en: This approach allows the AI to focus on one aspect of the problem at a time,
    leading to more detailed and accurate outputs.
  id: totrans-458
  prefs: []
  type: TYPE_NORMAL
  zh: 这种方法允许人工智能一次专注于问题的一个方面，从而产生更详细和准确的输出。
- en: This strategy is best suited when you need the AI to perform complex reasoning,
    multi-step calculations, or provide detailed explanations.
  id: totrans-459
  prefs: []
  type: TYPE_NORMAL
  zh: 这种策略最适合需要人工智能执行复杂推理、多步计算或提供详细解释的情况。
- en: 'To show you an example, the following prompt can be considered a big task:'
  id: totrans-460
  prefs: []
  type: TYPE_NORMAL
  zh: 为了给你一个例子，以下提示可以被认为是一个大任务：
- en: Describe 5 challenges in implementing AI effectively and suggest potential solutions
    to these challenges
  id: totrans-461
  prefs: []
  type: TYPE_NORMAL
  zh: 描述实施人工智能时面临的5个挑战，并提出这些挑战的潜在解决方案
- en: While the AI can handle the task just fine, you can improve the quality of the
    response by splitting the prompt in two.
  id: totrans-462
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然人工智能可以很好地处理这项任务，但你可以通过将提示分成两部分来提高回答的质量。
- en: 'First, you can ask for the challenges:'
  id: totrans-463
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，你可以要求列出挑战：
- en: Describe 5 challenges in implementing AI effectively
  id: totrans-464
  prefs: []
  type: TYPE_NORMAL
  zh: 描述实施人工智能时面临的5个挑战
- en: This helps the AI to concentrate on identifying and elaborating on the challenges
    without the added complexity of immediately proposing solutions.
  id: totrans-465
  prefs: []
  type: TYPE_NORMAL
  zh: 这样做有助于人工智能集中精力识别和阐述挑战，而不必立即提出解决方案，从而避免了额外的复杂性。
- en: 'Once the challenges are clearly outlined, you can then follow up with a related
    prompt:'
  id: totrans-466
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦挑战被清楚地概述，你就可以随后提出一个相关的提示：
- en: Now suggest potential solutions to these challenges
  id: totrans-467
  prefs: []
  type: TYPE_NORMAL
  zh: 现在提出这些挑战的潜在解决方案
- en: By taking the previously established context into account, the AI can now shift
    its focus to problem-solving.
  id: totrans-468
  prefs: []
  type: TYPE_NORMAL
  zh: 通过考虑之前建立的上下文，人工智能现在可以将重点转向问题解决。
- en: This sequential prompting not only enhances the quality of the generated content
    but also mirrors a logical, step-by-step approach that humans often use when tackling
    complex issues.
  id: totrans-469
  prefs: []
  type: TYPE_NORMAL
  zh: 这种顺序提示不仅提高了生成内容的质量，而且反映了人类在处理复杂问题时常用的逻辑、逐步的方法。
- en: By building context incrementally, the AI is better equipped to deliver in-depth
    and thoughtful responses.
  id: totrans-470
  prefs: []
  type: TYPE_NORMAL
  zh: 通过逐步构建上下文，人工智能能够更好地提供深入和周到的回答。
- en: This method can also reduce the risk of incomplete or superficial answers, as
    the AI is not overwhelmed by trying to address multiple aspects of a complex idea
    simultaneously.
  id: totrans-471
  prefs: []
  type: TYPE_NORMAL
  zh: 这种方法还可以降低答案不完整或肤浅的风险，因为人工智能不会被同时处理复杂想法的多个方面所压倒。
- en: Giving Specific Role
  id: totrans-472
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 给定具体角色
- en: Another way to improve Generative AI results is by telling it to respond from
    the perspective of a specific role.
  id: totrans-473
  prefs: []
  type: TYPE_NORMAL
  zh: 提高生成式人工智能结果的另一种方法是让它从特定角色的角度进行回答。
- en: Role-playing prompts instruct the AI system to adopt a specific role, similar
    to an actor in a movie or play. By assigning a role, users can guide the AI’s
    responses to be more aligned with the desired tone, expertise, and context.
  id: totrans-474
  prefs: []
  type: TYPE_NORMAL
  zh: 角色扮演提示指导人工智能系统采用特定角色，类似于电影或戏剧中的演员。通过分配角色，用户可以引导人工智能的回答更符合期望的语气、专业知识和上下文。
- en: This technique can enhance the quality and relevancy of the output, making it
    more useful and effective for the intended audience.
  id: totrans-475
  prefs: []
  type: TYPE_NORMAL
  zh: 这种技术可以提高输出的质量和相关性，使其对目标受众更有用和有效。
- en: 'For example, suppose you are creating an AI support agent for a technology
    company. You can instruct the AI to play the role of a support agent as follows:'
  id: totrans-476
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，假设您正在为一家科技公司创建一个AI支持代理。您可以指示AI扮演支持代理的角色，如下所示：
- en: You are a helpful and empathetic support agent for a technology company. Your
    mission is to provide a supportive and understanding response to the customer's
    questions.
  id: totrans-477
  prefs: []
  type: TYPE_NORMAL
  zh: 您是一家科技公司的一名有帮助和同理心的支持代理。您的任务是向客户的提问提供支持性和理解性的回复。
- en: If you don't know the answer, gently ask if they would like to be referred to
    a human assistant.
  id: totrans-478
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您不知道答案，可以温和地询问他们是否希望被转接到人工助手。
- en: To effectively use role-playing prompts, it’s important to clearly define the
    role and its characteristics. In the example above, a restriction is added to
    the AI system, instructing it to direct the customer to a real human agent when
    it is unable to assist.
  id: totrans-479
  prefs: []
  type: TYPE_NORMAL
  zh: 为了有效地使用角色提示，重要的是要清楚地定义角色及其特征。在上面的例子中，向AI系统添加了限制，指示当它无法协助时，将客户引导到真实的人工代理。
- en: Specific details about the role’s expertise, style of communication, and the
    context in which it operates can help the AI generate more precise responses.
  id: totrans-480
  prefs: []
  type: TYPE_NORMAL
  zh: 关于该角色的专业知识、沟通风格以及其运作的背景的详细信息可以帮助AI生成更精确的回复。
- en: Instead of simply asking the AI to respond as a scientist, specifying a particular
    field of science, such as a marine biologist or an astrophysicist, can lead to
    more targeted and accurate answers.
  id: totrans-481
  prefs: []
  type: TYPE_NORMAL
  zh: 与其简单地让AI以科学家的身份回复，不如指定一个特定的科学领域，例如海洋生物学家或天体物理学家，这样可以引导出更具体和准确的答案。
- en: Additionally, role-playing prompts can be layered to create more nuanced interactions.
    Combining multiple roles within a single prompt can help simulate complex scenarios.
  id: totrans-482
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，可以通过叠加角色提示来创建更细腻的互动。在单个提示中结合多个角色可以帮助模拟复杂场景。
- en: 'For example, an AI can be asked to respond as a financial advisor who also
    has a background in psychology, offering financial advice that takes into account
    emotional and psychological factors:'
  id: totrans-483
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，可以要求AI以同时具有心理学背景的财务顾问的身份回复，提供考虑情绪和心理因素的财务建议：
- en: You are a financial advisor with a background in psychology. You offer advice
    that addresses both the financial aspects and the psychological impact of market
    volatility on the client.
  id: totrans-484
  prefs: []
  type: TYPE_NORMAL
  zh: 您是一位有心理学背景的财务顾问。您提供的建议既关注财务方面，也关注市场波动对客户的心理影响。
- en: You communicate in a professional, empathetic manner, prioritizing the client's
    well-being ahead of maximizing returns.
  id: totrans-485
  prefs: []
  type: TYPE_NORMAL
  zh: 您以专业、富有同理心的方式进行沟通，将客户的福祉置于最大化回报之前。
- en: However, keep in mind that the AI’s responses should not be taken as professional
    advice. No matter how good the result gets, AI is just giving you what it figured
    out from its training data.
  id: totrans-486
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，请注意，AI的回复不应被视为专业建议。无论结果有多好，AI只是根据其训练数据推断出的信息。
- en: As always, use the AI’s responses at your own discretion and risk.
  id: totrans-487
  prefs: []
  type: TYPE_NORMAL
  zh: 如往常一样，自行决定并承担AI回复的风险。
- en: Summary
  id: totrans-488
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: In this chapter, we have explored what prompt engineering is and how you can
    improve the AI response by giving it a better prompt.
  id: totrans-489
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们探讨了提示工程是什么以及如何通过给出更好的提示来改进AI的回复。
- en: 'Always remember the following equation when you are interacting with Generative
    AI:'
  id: totrans-490
  prefs: []
  type: TYPE_NORMAL
  zh: 在与生成式AI互动时，始终记住以下等式：
- en: Generic prompts + AI = Generic results
  id: totrans-491
  prefs: []
  type: TYPE_NORMAL
  zh: 通用提示 + AI = 通用结果
- en: Specific prompts + AI = Specific results
  id: totrans-492
  prefs: []
  type: TYPE_NORMAL
  zh: 专用提示 + AI = 专用结果
- en: The four strategies explained here will help you to be more specific when giving
    instructions to AI.
  id: totrans-493
  prefs: []
  type: TYPE_NORMAL
  zh: 这里解释的四种策略将帮助您在向AI下达指令时更加具体。
- en: Refine your prompt if the result does not meet your expectations. Eventually,
    you will intuitively understand how to achieve the desired responses. Just have
    a little patience when working with an AI system.
  id: totrans-494
  prefs: []
  type: TYPE_NORMAL
  zh: 如果结果不符合您的预期，请调整您的提示。最终，您将直觉地了解如何获得期望的回复。在与AI系统工作时，只需有一点耐心即可。
- en: Next, I’m going to show you the awesome features offered by the ChatGPT Plus
    plan.
  id: totrans-495
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我将向您展示ChatGPT Plus计划提供的出色功能。
- en: 'Chapter 5: ChatGPT Paid Features'
  id: totrans-496
  prefs: []
  type: TYPE_NORMAL
  zh: 第5章：ChatGPT付费功能
- en: Now that you know how to use ChatGPT better with prompt engineering, let’s continue
    with exploring ChatGPT Plus.
  id: totrans-497
  prefs: []
  type: TYPE_NORMAL
  zh: 现在您已经了解了如何通过提示工程更好地使用ChatGPT，让我们继续探索ChatGPT Plus。
- en: ChatGPT Plus is a premium subscription plan that provides advanced features,
    priority access to new functionalities, and higher limits on using the latest
    GPT model.
  id: totrans-498
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT Plus是一个高级订阅计划，它提供了高级功能、对新功能的优先访问权限，以及对最新GPT模型使用的高限制。
- en: This chapter will review the most important features that you can access when
    subscribed to ChatGPT Plus.
  id: totrans-499
  prefs: []
  type: TYPE_NORMAL
  zh: 本章将回顾当你订阅ChatGPT Plus时可以访问的最重要功能。
- en: Image Generation With DALL-E
  id: totrans-500
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用DALL-E进行图像生成
- en: With an active subscription plan, you can use ChatGPT to generate images using
    DALL-E, which is an AI tool that can generate digital images from a given instruction.
  id: totrans-501
  prefs: []
  type: TYPE_NORMAL
  zh: 拥有活跃的订阅计划，你可以使用ChatGPT通过DALL-E生成图像，DALL-E是一个可以从给定指令生成数字图像的人工智能工具。
- en: To use DALL-E, you only need to send an instruction, just like when talking
    with ChatGPT.
  id: totrans-502
  prefs: []
  type: TYPE_NORMAL
  zh: 要使用DALL-E，你只需要发送一个指令，就像与ChatGPT交谈时一样。
- en: 'For example, let’s give the following prompt to ChatGPT:'
  id: totrans-503
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，让我们给ChatGPT以下提示：
- en: Generate a vector art of a cartoon beagle. The image has the soft pastel colors
    of blue, yellow, and green.
  id: totrans-504
  prefs: []
  type: TYPE_NORMAL
  zh: 生成一幅卡通比格犬的矢量艺术图像。这幅图像采用了蓝色、黄色和绿色的柔和蜡笔色调。
- en: 'ChatGPT will respond by generating an image as follows:'
  id: totrans-505
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT将通过生成以下图像来回应：
- en: '![5 dalle image](image_rsrc1KE.jpg)'
  id: totrans-506
  prefs: []
  type: TYPE_IMG
  zh: '![5 dalle image](image_rsrc1KE.jpg)'
- en: Figure 42\. DALL-E Generates an Image
  id: totrans-507
  prefs: []
  type: TYPE_NORMAL
  zh: 图42. DALL-E生成图像
- en: You can also give follow-up instructions after the image is generated, but most
    likely ChatGPT will generate a new image that is similar to the last one instead
    of editing the original.
  id: totrans-508
  prefs: []
  type: TYPE_NORMAL
  zh: 在图像生成后，你也可以给出后续指令，但很可能是ChatGPT会生成一个与上一个图像相似的新图像，而不是编辑原始图像。
- en: 'For example, I asked ChatGPT to make the image landscape:'
  id: totrans-509
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，我要求ChatGPT将图像调整为横幅格式：
- en: Make the image landscape at 16:9
  id: totrans-510
  prefs: []
  type: TYPE_NORMAL
  zh: 将图像调整为16:9的横幅格式
- en: 'But it generates a new one instead:'
  id: totrans-511
  prefs: []
  type: TYPE_NORMAL
  zh: 但它生成了一个新的：
- en: '![5 dalle followup](image_rsrc1KF.jpg)'
  id: totrans-512
  prefs: []
  type: TYPE_IMG
  zh: '![5 dalle followup](image_rsrc1KF.jpg)'
- en: Figure 43\. DALL-E Follow Up Instructions
  id: totrans-513
  prefs: []
  type: TYPE_NORMAL
  zh: 图43. DALL-E后续指令
- en: The current AI model is not very good at altering images exactly as we want
    it.
  id: totrans-514
  prefs: []
  type: TYPE_NORMAL
  zh: 当前的人工智能模型在精确地按照我们的意愿改变图像方面并不十分出色。
- en: It is better to use the images produced by DALL-E as a starting point for inspiration
    or manual editing and fine-tuning.
  id: totrans-515
  prefs: []
  type: TYPE_NORMAL
  zh: 使用DALL-E生成的图像作为灵感的起点或进行手动编辑和微调会更好。
- en: Browsing the Web
  id: totrans-516
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 浏览网页
- en: At the time of this writing, the latest large language model that powers ChatGPT
    was GPT-4o, which possesses the ability to search the internet for answers.
  id: totrans-517
  prefs: []
  type: TYPE_NORMAL
  zh: 在撰写本文时，为ChatGPT提供动力的最新大型语言模型是GPT-4o，它具有在互联网上搜索答案的能力。
- en: 'For example, you can ask ChatGPT, "How is the weather in London today?" It
    will browse the web in search of this information and give back a response as
    follows:'
  id: totrans-518
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，你可以向ChatGPT提问：“今天伦敦的天气怎么样？”它会在网上搜索相关信息，并给出如下回应：
- en: '![5 asking weather](image_rsrc1KG.jpg)'
  id: totrans-519
  prefs: []
  type: TYPE_IMG
  zh: '![5询问天气](image_rsrc1KG.jpg)'
- en: Figure 44\. Asking ChatGPT the Current Weather
  id: totrans-520
  prefs: []
  type: TYPE_NORMAL
  zh: 图44. 向ChatGPT询问当前天气
- en: Under the hood, ChatGPT utilizes the Bing search engine to navigate the web
    and fetch the required data.
  id: totrans-521
  prefs: []
  type: TYPE_NORMAL
  zh: 在底层，ChatGPT利用必应搜索引擎在网络上导航并获取所需数据。
- en: This browsing functionality is designed to mimic human web searches, where it
    queries relevant sources, retrieves information from the top 4 results, and compiles
    it into a coherent response.
  id: totrans-522
  prefs: []
  type: TYPE_NORMAL
  zh: 这种浏览功能旨在模拟人类的网络搜索，它会查询相关来源，从前4个结果中检索信息，并将其编译成一个连贯的回应。
- en: 'Here are some additional use cases where you might want to use ChatGPT’s browsing
    ability:'
  id: totrans-523
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一些额外的用例，你可能希望使用ChatGPT的浏览能力：
- en: '| ​▪​ | Keeping up with the latest headlines and breaking news from around
    the world. |'
  id: totrans-524
  prefs: []
  type: TYPE_TB
  zh: '| ● | 跟踪全球的最新头条新闻和突发新闻。 |'
- en: '| ​▪​ | Asking for summaries of recent events or updates on ongoing situations.
    |'
  id: totrans-525
  prefs: []
  type: TYPE_TB
  zh: '| ● | 请求最近事件或正在进行的形势的摘要或更新。 |'
- en: '| ​▪​ | Checking current stock prices, market trends, and financial news. |'
  id: totrans-526
  prefs: []
  type: TYPE_TB
  zh: '| ● | 检查当前的股票价格、市场趋势和财经新闻。 |'
- en: '| ​▪​ | Getting updates on cryptocurrency prices and market movements. |'
  id: totrans-527
  prefs: []
  type: TYPE_TB
  zh: '| ● | 获取加密货币价格和市场动态的更新。 |'
- en: '| ​▪​ | Finding the dates and details of upcoming events, such as concerts,
    sports games, or conferences. |'
  id: totrans-528
  prefs: []
  type: TYPE_TB
  zh: '| ● | 查找即将举行的活动日期和详情，如音乐会、体育比赛或会议。 |'
- en: '| ​▪​ | Checking movie showtimes or local event listings. |'
  id: totrans-529
  prefs: []
  type: TYPE_TB
  zh: '| ● | 检查电影放映时间或当地活动列表。 |'
- en: '| ​▪​ | Looking up flight statuses, including delays and cancellations. |'
  id: totrans-530
  prefs: []
  type: TYPE_TB
  zh: '| ● | 查找航班状态，包括延误和取消。 |'
- en: '| ​▪​ | Finding current travel advisories or restrictions for specific destinations.
    |'
  id: totrans-531
  prefs: []
  type: TYPE_TB
  zh: '| ● | 查找特定目的地的当前旅行警告或限制。 |'
- en: In short, you can look up any particular information you want, just like when
    using Google search.
  id: totrans-532
  prefs: []
  type: TYPE_NORMAL
  zh: 简而言之，你可以查找任何你想要的信息，就像使用Google搜索一样。
- en: 'Here’s another example of looking for a flight from Singapore to Cambodia:'
  id: totrans-533
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是另一个从新加坡到柬埔寨查找航班的例子：
- en: '![5 flight search](image_rsrc1KH.jpg)'
  id: totrans-534
  prefs: []
  type: TYPE_IMG
  zh: '![5 flight search](image_rsrc1KH.jpg)'
- en: Figure 45\. ChatGPT Flight Search
  id: totrans-535
  prefs: []
  type: TYPE_NORMAL
  zh: 图45. ChatGPT航班搜索
- en: By leveraging Bing search capabilities, ChatGPT ensures that the information
    it provides is accurate and up to date.
  id: totrans-536
  prefs: []
  type: TYPE_NORMAL
  zh: 通过利用Bing搜索功能，ChatGPT确保它提供的信息是准确和最新的。
- en: Advanced Data Analysis
  id: totrans-537
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 高级数据分析
- en: With the Plus subscription, you also get access to advanced data analysis capability
