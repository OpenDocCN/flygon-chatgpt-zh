- en: Chapter 22\. Combining Psychoanalysis with AI
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Psychoanalysis
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Psychoanalysis, invented by Sigmund Freud, divides human behaviour and thoughts
    into their component elements. Based on this analysis, psychoanalysis aims to
    provide people with tools and techniques to better understand their thoughts and
    feelings, and so achieve harmony in their everyday lives.
  prefs: []
  type: TYPE_NORMAL
- en: 'Some of the ways in which psychoanalysis segments human psychology are as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: 'The Unconscious: Psychoanalysis delves into the unconscious mind, where it
    seeks to uncover and segment hidden thoughts, feelings and motivations.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Dissecting Complex Behaviours: Psychoanalysis views human behaviour as the
    result of multiple, interrelated, psychological processes. By segmenting these
    behaviours into basic elements, psychoanalysis aims to understand and address
    the root causes of behavioural and mind-based issues.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Analysing Thought Processes: Individual thoughts are seen as a complex amalgamation
    of conscious and unconscious processes, memories, and internalised experiences.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Psychoanalysis breaks down these thought processes to better understand how
    past experiences and learned thinking patterns shape an individual's thinking
    and behaviour.
  prefs: []
  type: TYPE_NORMAL
- en: This analysis allows for a deeper understanding of the underlying mechanisms
    of the psyche, and aims to bring about greater self-awareness and psychological
    health.
  prefs: []
  type: TYPE_NORMAL
- en: Simulating the Human Mind using AI
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Assuming that the human mind is structured in the most efficient way possible,
    leads us to the idea that if we can simulate the way that the mind uses different
    thought-processing centres in AI, then we can increase the efficiency and power
    of the AI simply by following the structure of the human thought process, without
    increasing the power of the underlying AI model.
  prefs: []
  type: TYPE_NORMAL
- en: In other words, we can use psychoanalytical techniques in conjunction with Chain
    of Thought Prompting to simulate the human mind. Thereby we can enhance AI's problem-solving
    and analytical abilities and develop AI systems that can approximate human-like
    reasoning and decision-making.
  prefs: []
  type: TYPE_NORMAL
- en: This approach does not require an increase in computational power but instead
    leverages the efficient structural and functional architecture of the human mind.
  prefs: []
  type: TYPE_NORMAL
- en: The possibilities of this approach are explored in the current and following
    sections.
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc6G3.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Exploring the patterns of nature, by ChatGPT
  prefs: []
  type: TYPE_NORMAL
- en: Chapter 23\. Introduction to Transactional Analysis
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Transactional Analysis is a psychoanalytical theory for understanding human
    behaviour in a structured and systematic way.
  prefs: []
  type: TYPE_NORMAL
- en: Transactional Analysis is used in various fields such as education, organisational
    management, and counselling for better understanding and management of personal
    and social dynamics.
  prefs: []
  type: TYPE_NORMAL
- en: Suitability of Transactional Analysis for Generative AI
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Out of the various schools of psychoanalysis, Transactional Analysis (TA) stands
    out as being particularly well suited for use with generative AI, for the following
    reasons:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Clear Psyche Structure: Transactional Analysis has a well-defined and clear
    model of the psyche, introducing  concepts like ego states (Parent, Adult, Child)
    and sub ego states (which are further divisions of the primary ego states). The
    well-defined TA model of the psyche gives the AI a clear basis for its psychoanalysis.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Patterns of Communication: Transactional Analysis focuses on clarifying the
    actual meaning of patterns of communication. These well-defined patterns provide
    a clear framework for AI to analyse and interpret.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Language-Based Approach: Unlike other psychoanalytical schools that use imagery
    and symbolic interpretation, Transactional Analysis primarily relies on spoken
    communication for analysing psychological processes. This focus on language aligns
    well with the NLP (natural language processing) capabilities of generative AI.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: In  summary, Transactional Analysis, with its well-defined model of the psyche
    and clear interpretations of interpersonal communication, presents an ideal psychoanalytical
    school for application via AI. This is because the methodological structure of
    Transactional Analysis aligns with AI's key strengths in systematic analysis and
    natural language processing.
  prefs: []
  type: TYPE_NORMAL
- en: Main Areas of Transactional Analysis
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'The main areas of Transactional Analysis are as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: Structural Analysis
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Structural Analysis is that area of TA which analyses the internal structure
    of the human mind. TA Structural Analysis breaks down the personality into three
    distinct ego states: Parent ego state, Adult ego state, and Child ego state.'
  prefs: []
  type: TYPE_NORMAL
- en: Each ego state represents a self-contained system of thoughts, feelings, and
    behaviours.
  prefs: []
  type: TYPE_NORMAL
- en: The Parent ego state thinks in the same way as the person’s actual parents and
    parent figures, such as teachers.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The Adult ego state is the home of the faculty of rational thought, and responds
    logically based on current reality.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The Child ego state is the seat of feeling, and tends to reflect the patterns
    of emotion experienced in childhood.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Understanding these ego states helps in analysing how individuals think internally
    and how they interact with others.
  prefs: []
  type: TYPE_NORMAL
- en: Structural Analysis is explained in Chapter 14.
  prefs: []
  type: TYPE_NORMAL
- en: Transactional Analysis (proper)
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Transactional Analysis (proper) refers to the study of interactions, or 'transactions',
    between individuals. In this area of psychoanalysis, the focus is on identifying
    which ego states are involved in a transaction and how this influences the direction
    of the communication.
  prefs: []
  type: TYPE_NORMAL
- en: Transactional Analysis (proper) is a complex area of Transactional Analysis,
    and is discussed further in Chapter 15.
  prefs: []
  type: TYPE_NORMAL
- en: Game Analysis
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Games in Transactional Analysis are repetitive behaviours people engage in with
    others. These games often have hidden psychological motives and can lead to positive
    or negative outcomes.
  prefs: []
  type: TYPE_NORMAL
- en: Game Analysis helps in identifying these patterns, understanding their underlying
    motives, and assists people in finding ways to stop participating in negative
    games in favour of developing healthy relationships.
  prefs: []
  type: TYPE_NORMAL
- en: Script Analysis
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Script Analysis involves examining an individual's life plan or 'script', which
    is unconsciously developed in childhood and guides their behaviour and life choices.
    Scripts often have a deep impact on an individual's life story and can be either
    positive or limiting.
  prefs: []
  type: TYPE_NORMAL
- en: Script Analysis aims to uncover these scripts, understand how they influence
    current behaviour, and work towards rewriting limiting aspects of the script for
    a more fulfilling life plan.
  prefs: []
  type: TYPE_NORMAL
- en: Further Reading
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This book uses the TA ideas of Structural Analysis and Transactional Analysis
    (proper), and so presents a brief outline of these Transactional Analysis areas
    below. For further reading on Game Analysis and Script Analysis, the classics
    are Eric Berne’s original books. Numerous other books and online resources are
    also available.
  prefs: []
  type: TYPE_NORMAL
- en: Chapter 24\. Structural Psychoanalysis
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Ego States
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Ego states are a core concept in Transactional Analysis. According to Transactional
    Analysis, we can divide the mind into three primary ego states - Parent, Adult,
    and Child. Each ego state comprises a discrete set of thoughts, feelings, and
    behaviours directly linked to specific aspects of an individual''s capabilities
    and experience:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Parent Ego State: This ego state contains behaviours, thoughts, and feelings
    copied from parental figures or authority figures. It can be nurturing and protective,
    or controlling and critical.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Adult Ego State: The Adult is oriented towards current data and experiences,
    and functions autonomously and rationally. It evaluates and processes information
    and makes decisions based on available facts.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Child Ego State: This ego state is the seat of emotion; it typically displays
    the same types of behaviours, thoughts, and feelings that were experienced during
    childhood.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'The Parent, Adult and Child ego states are diagrammed as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '![A black letter in a circle  Description automatically generated](image_rsrc6G4.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 'Note: There is no special significance in the ordering of ego states in the
    diagram.'
  prefs: []
  type: TYPE_NORMAL
- en: Cathexis
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'According to Transactional Analysis theory, when people “change mood”, or change
    their mode of thinking and feeling, this may be because they have “moved” (or
    cathected) into a different ego state:'
  prefs: []
  type: TYPE_NORMAL
- en: 'The Parent: A person may display anger after “moving” into the Parent ego state.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'The Adult: A person may express rational thinking after “moving” into the Adult
    ego state.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'The Child: A person may express happiness after “moving” into the Child ego
    state.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: So rather than saying that the person has changed their mood, TA suggests that
    the person has emotionally engaged a different area of their psyche (i.e. a different
    ego state), which subsequently displays its own typical behaviours.
  prefs: []
  type: TYPE_NORMAL
- en: 'For example, take a day in the life of a bank manager:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Parent: In a team meeting, the manager moves into his Parent ego state, offering
    guidance and setting expectations with a tone of authority and experience.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Adult: Later, as he analyses data and strategizes the bank’s next steps, the
    manager moves into his Adult ego state. Here, he is rational, pragmatic, and focused
    on the here and now.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Child: In the evening, while playing with his young child, the manager enters
    the Child ego state. Now he is spontaneous, playful, and emotionally expressive.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In Transactional Analysis terminology, moving into an ego state is called cathexis;
    the manager cathected into the Parent in the meeting, he cathected into the Adult
    when number crunching, and he cathected into the Child when playing with his own
    child at home.
  prefs: []
  type: TYPE_NORMAL
- en: Favourite Ego States
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: From a simple TA perspective, we would understand that every person has three
    ego states, Parent, Adult and Child, which they access at will and as appropriate
    to the situation.
  prefs: []
  type: TYPE_NORMAL
- en: 'However, Transactional Analysis suggests that many people have a "favourite
    ego state”. This means that a person may prefer to “spend most of their time”
    in a specific ego state. For example:'
  prefs: []
  type: TYPE_NORMAL
- en: A mathematician may prefer the Adult, since this is where they think logically.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A teacher may prefer the Parent, because this is where they act in a parental
    manner towards their students.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A comedian may prefer the Child, because this is where they are amusing and
    jolly.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Staying in the ego state most suited to their profession allows these professionals
    to hone their professional skills and to develop those parts of their personalities
    which they need for making a living.
  prefs: []
  type: TYPE_NORMAL
- en: Additionally, it is also possible that these different professionals initially
    chose their professional callings based on their preferred ego state.
  prefs: []
  type: TYPE_NORMAL
- en: The mathematician knew he was good at analytical thinking, due to his predisposition
    for the Adult, and therefore chose maths.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The teacher knew he was good at parenting style behaviour due to his predisposition
    for the Parent, and therefore chose teaching.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The comedian knew he was good at entertainment due to his predisposition for
    the Child, and therefore chose the entertainment industry.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In this way, the tendency people have towards a particular ego states can determine
    their careers, as well as being part of that which moulds their essential personalities.
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc6G5.jpg)'
  prefs: []
  type: TYPE_IMG
- en: The teacher, by ChatGPT
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc6G6.jpg)'
  prefs: []
  type: TYPE_IMG
- en: The mathematician, by ChatGPT
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc6G7.jpg)'
  prefs: []
  type: TYPE_IMG
- en: The comedian, by ChatGPT
  prefs: []
  type: TYPE_NORMAL
- en: Chapter 25\. Transactional Analysis (proper)
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: '| ![](image_rsrc6FJ.jpg) Transactional Analysis is called Transactional Analysis
    because it started off as a way of analysing the social transactions that occur
    between different people.In other words, whereas other schools of psychoanalysis
    concentrated more on the internal processes that occur within the mind, Transactional
    Analysis suggested that if we can understand the actual meaning of interpersonal
    dialogue (rather than the obvious meaning), then we are well on the way to addressing
    the behavioural and emotional issues that plague people from time to time. |'
  prefs: []
  type: TYPE_TB
- en: Transactional Analysis views social interactions as transactions between discrete
    and well-defined ego-states. It analyses the ego states involved in these exchanges
    to understand communication patterns and relationship dynamics.
  prefs: []
  type: TYPE_NORMAL
- en: Transactional Analysis (proper) can be complex and involved, the following are
    some of the basic transaction types identified by TA.
  prefs: []
  type: TYPE_NORMAL
- en: Complementary Transactions
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Complementary transactions occur when the first person communicates from one
    specific ego state and the other person responds appropriately from the corresponding,
    complementary ego state.
  prefs: []
  type: TYPE_NORMAL
- en: 'For example:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Adult to Adult Transaction: Logical, factual communication between two people
    speaking as rational adults.'
  prefs: []
  type: TYPE_NORMAL
- en: '![A diagram of a traffic light  Description automatically generated](image_rsrc6G8.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 'Child to Child Transaction: Appropriate and predictable emotional interaction
    between two people.'
  prefs: []
  type: TYPE_NORMAL
- en: '![A traffic light with text below  Description automatically generated with
    medium confidence](image_rsrc6G9.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 'Child to Parent Transaction: A child-like expression of need or emotion which
    elicits a nurturing parent-like response.'
  prefs: []
  type: TYPE_NORMAL
- en: '![A traffic light with black lines  Description automatically generated with
    medium confidence](image_rsrc6GA.jpg)'
  prefs: []
  type: TYPE_IMG
- en: These transactions are considered complementary because they are predictable
    and effective, facilitating clear communication.
  prefs: []
  type: TYPE_NORMAL
- en: When transactions are complementary, the communication can continue indefinitely.
    Problems arise in communication when transactions are crossed (see next section),
    leading to misunderstandings, conflicts, and breakdowns in communication.
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc6GB.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Checking the time, by ChatGPT
  prefs: []
  type: TYPE_NORMAL
- en: Crossed Transactions
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Crossed transactions in Transactional Analysis occur when an individual responds
    to a communication from an unexpected ego state, leading to a breakdown in communication.
  prefs: []
  type: TYPE_NORMAL
- en: Unlike complementary transactions, where responses match the ego state from
    which the initial message was sent, crossed transactions involve mismatched responses,
    which results in confusion, conflict, or miscommunication.
  prefs: []
  type: TYPE_NORMAL
- en: Example
  prefs: []
  type: TYPE_NORMAL
- en: Imagine a conversation between Alex and Jordan. Alex is speaking from the Adult
    ego state, and Jordan is responding from the Child ego state.
  prefs: []
  type: TYPE_NORMAL
- en: 'Alex (Adult): "Could you please update the report by tomorrow? We need it for
    the meeting."'
  prefs: []
  type: TYPE_NORMAL
- en: 'Jordan (Child): "What’s your problem exactly? Everyone else around here gets
    more time!"'
  prefs: []
  type: TYPE_NORMAL
- en: 'From a TA perspective, this communication breakdown can be modelled as a crossed
    transaction:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc6GC.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Alex addresses Jordan’s Adult, from his Adult. Jordan responds from an ego state
    that was never addressed, the Child, to Alex’s Parent, which never spoke to him.
  prefs: []
  type: TYPE_NORMAL
- en: This is because Jordan perceived Alex’s rational request as being critical or
    demanding, and so responded with a defensive, emotional reaction typical of the
    Child.
  prefs: []
  type: TYPE_NORMAL
- en: Such a transaction is called a crossed transaction because, diagrammatically,
    the lines of communication cross each other. (However, it is worthwhile noting
    that crossed transactions can also occur where this does not occur.)
  prefs: []
  type: TYPE_NORMAL
- en: This mismatch can lead to conflict or a breakdown in communication, as the two
    individuals are effectively 'talking past' each other, engaging in different types
    of dialogue.
  prefs: []
  type: TYPE_NORMAL
- en: From a psychotherapeutic perspective, resolving miscommunication that arises
    from crossed transactions involves recognizing the ego states at play and adjusting
    the responses to become complementary, thereby re-establishing effective communication.
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc6GD.jpg)'
  prefs: []
  type: TYPE_IMG
- en: The Misunderstanding, by ChatGPT
  prefs: []
  type: TYPE_NORMAL
- en: Dual Level Transactions
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Transactional Analysis identifies two types of dual transactions: ulterior
    transactions and angular transactions.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Both ulterior transactions and angular transactions include two levels of communication,
    however they differ in the way these levels are used in combination:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Ulterior Transactions: Here communication happens at two levels, both of which
    are acknowledged and understood by all parties involved.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Angular Transactions: In this case, the two levels of communication have different,
    possibly contradictory, purposes. The angular transaction represents an ulterior
    motive of the conversation initiator, of which the other person is unaware.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: If the recipient responds to the unstated, covert intention of the initiator,
    then this is called a successful Angular Transaction; the initiator has “hooked”
    the recipient. On the other hand, if the recipient of the transaction responds
    to the stated, overt intention of the initiator, then the Angular Transaction
    was unsuccessful.
  prefs: []
  type: TYPE_NORMAL
- en: Ulterior Transactions
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'An ulterior transaction in TA involves two messages being sent simultaneously:
    an overt, social message and a covert, psychological message. The social, overt
    message is what is openly said or expressed, while the covert, psychological message
    is hidden or implied. Both the initiator and recipient are fully aware of both
    levels of communication, however.'
  prefs: []
  type: TYPE_NORMAL
- en: 'We can identify two types of Ulterior Transaction: Positive Ulterior Transactions
    and Negative Ulterior Transactions.'
  prefs: []
  type: TYPE_NORMAL
- en: Positive Ulterior Transactions
  prefs: []
  type: TYPE_NORMAL
- en: An example of a positive ulterior transaction could occur where someone encourages
    a friend; in this case the covert message can be used to convey empathy or understanding.
  prefs: []
  type: TYPE_NORMAL
- en: 'Overt Message: "You''re always so calm under pressure."'
  prefs: []
  type: TYPE_NORMAL
- en: 'Covert Message: This might be a subtle way of encouraging a friend who is going
    through a tough time, without directly addressing their struggles. The friend
    understands the deeper meaning and feels supported.'
  prefs: []
  type: TYPE_NORMAL
- en: '![A diagram of a traffic light  Description automatically generated](image_rsrc6GE.jpg)'
  prefs: []
  type: TYPE_IMG
- en: In this example, the interactions involve a combination of the Nurturing Parent,
    Adult, and Child ego states. The initiator’s Adult states a fact, their Nurturing
    Parent provides support and affirmation and the recipient’s Child responds to
    the validation undercurrent.
  prefs: []
  type: TYPE_NORMAL
- en: Negative Ulterior Transactions
  prefs: []
  type: TYPE_NORMAL
- en: Negative ulterior transactions can carry a superficially benign or neutral overt
    message but have a covert, potentially harmful psychological message. These transactions
    can be damaging because they involve subliminal aggression.
  prefs: []
  type: TYPE_NORMAL
- en: 'For example:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Overt Message: "Wow, you got your last project done on time? That''s amazing!"'
  prefs: []
  type: TYPE_NORMAL
- en: 'Covert  Message: This message subtly implies that it is unusual or unexpected
    for the person to achieve success, indirectly suggesting incompetence or unreliability.'
  prefs: []
  type: TYPE_NORMAL
- en: '![A diagram of a project manager  Description automatically generated](image_rsrc6GF.jpg)'
  prefs: []
  type: TYPE_IMG
- en: In this example, the interactions involve a combination of the Critical Parent,
    Adult, and Child ego states. The initiator’s Adult states a fact, their Critical
    Parent denies the validity of the recipient and the recipient’s Child may respond
    to the disparaging undercurrent by feeling hurt and unvalued.
  prefs: []
  type: TYPE_NORMAL
- en: Angular Transactions
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Angular transactions in Transactional Analysis refer to a type of communication
    where an individual sends a message to another person on an overt social level,
    but there is a hidden psychological message that is directed to a different part
    of the recipient's personality.
  prefs: []
  type: TYPE_NORMAL
- en: Angular transactions often occur when a person has a hidden agenda or motive;
    the sender might be trying to manipulate or control the recipient in a subtle
    way. If the receiver responds to the hidden psychological message rather than
    to the overt social message, then the angular transaction is said to be successful.
  prefs: []
  type: TYPE_NORMAL
- en: The following diagram shows a successful angular transaction.
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc6GG.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Ostensibly, the salesperson is simply telling facts to the customer. There is
    however an angular transaction from the salesperson’s Adult to the customer’s
    Child which effectively says, “Make sure you don’t miss out on this limited opportunity!”
  prefs: []
  type: TYPE_NORMAL
- en: In this case, the salesperson gets the sought-for response from the customer’s
    child and makes a sale.
  prefs: []
  type: TYPE_NORMAL
- en: Chapter 26\. Second Order TA Structural Analysis
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Sub-Ego-States
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'The high-level psychoanalytic model suggested by Transactional Analysis is
    simple and consists of three ego states: Parent, Adult and Child. Human behaviour
    is far more complex than this simple model suggests, however.'
  prefs: []
  type: TYPE_NORMAL
- en: One way in which Transactional Analysis theory refines the three ego-state model
    is by introducing second-order ego-states (or, sub ego-states).
  prefs: []
  type: TYPE_NORMAL
- en: This means to say as follows; just as the whole psyche is understood to consist
    of three ego-states, so too each ego-state is understood to consist of a further
    three sub ego-states. (Transactional Analysis theory further suggests that each
    sub ego-state can be further subdivided into sub-sub-ego-states, and so on, to
    a very fine level of granularity.)
  prefs: []
  type: TYPE_NORMAL
- en: This subdivision can be diagrammatically represented as follows.
  prefs: []
  type: TYPE_NORMAL
- en: '![A diagram of a diagram of a parent and child  Description automatically generated](image_rsrc6GH.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 'Practically speaking, this means that each ego state (or, state of mind) has
    its own:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Centre of control: The sub-parent ego state.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Centre of reasoning: The sub-adult ego state.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Centre of emotion: The sub-child ego state.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In this way, each ego state has its own internal “life” and can function independently
    of the rest of the psyche.
  prefs: []
  type: TYPE_NORMAL
- en: 'The following detailed list explains how we may imagine the identity and nature
    of each of the second-level sub ego states:'
  prefs: []
  type: TYPE_NORMAL
- en: Child Sub-Ego-States
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Parent in the Child: A child displays parental behaviour, but in a childlike
    manner.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Adult in the Child: A child displays rational thinking, but in an uninitiated
    childlike manner. Eric Berne refers to the Adult in the Child as “the Little Professor,”
    it’s like a child playing at being an academic.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Child in the Child: The child’s pristine wonder and emotion.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Parent Sub-Ego-States
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Adult in the Parent: The Adult in the Parent may occur when a parent assists
    their child by being rational.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Child in the Parent: The Child in the Parent may occur when a parent supports
    their child in an emotional manner.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Parent in the Parent: The Parent in the Parent may occur when a parent seeks
    to modify their child’s behaviour by asserting their parental rights.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Adult Sub-Ego-States
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Parent in the Adult: This sub ego-state can emerge when an individual in their
    Adult state adopts a guiding or nurturing role, reminiscent of a Parental figure.
    It''s an ego state where Adult logic and understanding are used to provide support
    or correction in a parental style.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Child in the Adult: Here, the Adult ego state is influenced by the characteristics
    of the Child. This could manifest as creativity, spontaneity, or emotional expression
    within a framework of adult reasoning and responsibility.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Adult in the Adult: This is the purest form of the Adult ego state, characterised
    by rational thinking, problem-solving, and mature interactions with the world.
    It represents the Adult ego state functioning independently, without significant
    influence from the Parent or Child sub-states.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Each sub ego-state offers a subtly different mode of behaviour and thinking,
    which allows for a more nuanced appreciation of the dynamics at play in human
    interactions and intrapersonal processes.
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc6GJ.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 'Parent in the Child. Creator: Unsplash'
  prefs: []
  type: TYPE_NORMAL
- en: Chapter 27\. Intra-Psyche Communication Channels
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'The second-level TA structural analysis of the psyche allows us to refine the
    intra-psyche model of communication, as per the following diagram:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc6GK.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Channels of Communication
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Elaborating on the internal channels of communication represented in the above
    diagram provides the following analysis:'
  prefs: []
  type: TYPE_NORMAL
- en: Interactions Among Sub-Ego-States within the Adult
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'The Adult in the Adult Communicates with:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Parent in the Adult: This communication represents the rational, problem-solving
    aspects of the Adult ego state engaging with the nurturing, guiding elements of
    the Parent sub-state within the Adult. This is where logical thinking meets parental
    wisdom and guidance.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Child in the Adult: Here, the Adult in the Adult, characterised by rationality
    and maturity, communicates with the mature Child aspect of the Adult.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Interactions between the Adult Sub-Ego-States and the Parent and Child
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'The Parent in the Adult Communicates with:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Adult in the Parent: This interaction represents the guidance and nurturing
    aspects of the Parent within the Adult ego state engaging with the rational, responsible
    elements of the Adult sub-state within the Parent. This is a blend of parental
    guidance with adult reasoning and responsibility.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'The Child in the Adult Communicates with:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Adult in the Child: This reflects the emotional, creative, and spontaneous
    aspects of the mature Child within the Adult ego state communicating with the
    rational, thoughtful aspects of the Adult within the Child ego state. This is
    where the inner child''s creativity and emotions are tempered by adult-like thoughtfulness
    and reasoning.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Interactions Among Sub-Ego-States within the Parent and the Child
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'The Adult in the Parent Communicates with:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Parent in the Parent: This interaction represents the rational and responsible
    elements of the Adult within the Parent ego state communicating with the authoritative
    and guiding aspects of the Parent within the Parent. This is where parental logic
    meets parental authority and guidance.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Child in the Parent: In this communication, the Adult within the Parent engages
    with the emotional, childlike aspects of the Child within the Parent. This reflects
    a softening of the Parent’s parental stance and may also invoke emotional support
    for a child.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'The Adult in the Child Communicates with:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Child in the Child: Here, the rational, thoughtful aspects of the Adult within
    the Child ego state communicate with the pure, emotional, and spontaneous aspects
    of the Child within the Child. This is a blend of childlike wonder and innocence
    with child-like thoughtfulness and understanding.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Parent in the Child: This represents the interaction between the Child’s rationality
    and the Child’s ability to be nurturing and guiding.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: These interactions demonstrate the complex and dynamic nature of internal communication
    within an individual's psyche according to TA.
  prefs: []
  type: TYPE_NORMAL
- en: The model presented underscores the multifaceted nature of our internal experiences,
    where different aspects of self (Parent, Adult, Child) and their sub-states engage
    in a continual dialogue, shaping our behaviour and internal processes.
  prefs: []
  type: TYPE_NORMAL
- en: Section V – Psychoanalysis using AI
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: This section illustrates the psychoanalytical capabilities of an advanced generative
    AI model like Chat GPT 4.
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc6GM.jpg)'
  prefs: []
  type: TYPE_IMG
- en: So how are you feeling today?, by ChatGPT
  prefs: []
  type: TYPE_NORMAL
- en: Chapter 28\. Performing Structural Analysis using ChatGPT
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Structure of the Psyche
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: As explained in the previous section, TA Structural Analysis identifies the
    internal ego-state structure unique to each individual.
  prefs: []
  type: TYPE_NORMAL
- en: 'This means that although each individual is born with a full complement of
    ego states: Parent, Adult and Child, nevertheless people develop particular habits
    about which part of their psyche they decide to “hang around in” and fine tune.
    Some people may prefer to interact from the Parent (e.g. a teacher), some from
    the Adult (e.g. a mathematician), and some from the Child (e.g. a comedian).'
  prefs: []
  type: TYPE_NORMAL
- en: Understanding the preferred ego states of other people and of ourselves can
    help us optimise our personal interactions and to know “what will work and what
    won’t work” from a social perspective.
  prefs: []
  type: TYPE_NORMAL
- en: Psychoanalysing the Beatles
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: ChatGPT is impressively good at performing Structural Analysis and identifying
    preferred ego states, as the following example demonstrates. (This example uses
    a GPT designed for this purpose, Ego State Behaviour Analyser - [https://t.ly/9LDfx](https://t.ly/9LDfx).)
  prefs: []
  type: TYPE_NORMAL
- en: '| YouAnalyse which ego state was favoured by each member of the Beatles and
    how this affected the band''s dynamic.Ego State Behaviour AnalyserTo analyse the
    favoured ego states of each member of the Beatles and how these influenced the
    band''s dynamics, we need to look at their behaviours, public personas, and interactions,
    both as individuals and as a group.The Transactional Analysis (TA) framework categorises
    ego states into three primary categories: Parent, Adult, and Child. These states
    are not literal age-related categories but rather represent styles of thinking,
    feeling, and behaviour.John Lennon: Lennon often exhibited characteristics of
    the Child ego state, especially in his early years with the Beatles. His playful
    and rebellious nature, tendency for emotional and creative expressions, and his
    advocacy for peace and love align with the Free Child sub-state. However, Lennon
    also showed aspects of the Critical Parent, particularly in his later years, where
    he was more outspoken about social issues, displaying a tendency to critique and
    challenge societal norms.Paul McCartney: McCartney generally favoured the Adult
    ego state, characterised by his rational, organised approach to music production
    and business matters. His ability to balance creativity with practicality and
    his often-mediating role in the group suggest a strong Adult presence. Additionally,
    McCartney displayed nurturing aspects of the Nurturing Parent state, particularly
    in his care and concern for the group’s wellbeing and harmony.George Harrison:
    Harrison''s behaviour leaned towards the Adult ego state, especially evident in
    his spiritual and philosophical interests. He approached life and music with a
    reflective and introspective manner, often seeking deeper meaning and understanding.
    His immersion in Eastern spirituality also indicates a tendency towards the Adapted
    Child state, reflecting a desire for inner peace and acceptance.Ringo Starr: Starr
    often demonstrated characteristics of the Adapted Child ego state, displaying
    compliance and a willingness to go along with the group''s decisions. His good-natured
    and easy-going demeanour, coupled with a somewhat less dominant role in the group''s
    decision-making, aligns with this state. However, Starr also showed elements of
    the Adult state, particularly in his steady and reliable presence within the band.Impact
    on Band Dynamics:The interplay of Lennon''s Child and Parent states with McCartney''s
    predominantly Adult state likely created a dynamic tension in the band, driving
    creativity but also leading to conflicts.Harrison''s Adult state, coupled with
    his Adapted Child tendencies, may have positioned him as a more introspective
    and stabilising force within the group, though possibly leading to feelings of
    being overshadowed by the more dominant personalities of Lennon and McCartney.Starr’s
    Adapted Child state provided a flexible and accommodating presence, which may
    have helped in balancing the stronger ego states present in the band.This analysis
    is a broad and generalised interpretation based on public personas and known behaviours.
    It''s important to note that individuals can shift between different ego states
    depending on the context, and a more nuanced analysis would require a deeper exploration
    of their personal histories and private lives. |'
  prefs: []
  type: TYPE_TB
- en: Impressively, in addition to identifying the primary ego states which the different
    singers tended to be “in”, ChatGPT also provided a compelling explanation of the
    interaction between the group members in terms of their “favourite” ego states.
  prefs: []
  type: TYPE_NORMAL
- en: This psychoanalytical capability of ChatGPT could be useful for determining
    which ego states people in a real-life situation are “in” and choosing an effective
    course of action correspondingly.
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc6GN.jpg)'
  prefs: []
  type: TYPE_IMG
- en: The Beatles 1964 concert, Wikimedia Commons
  prefs: []
  type: TYPE_NORMAL
- en: Practical Applications of AI Structural Analysis
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The practical applications of ChatGPT’s ability to perform TA Structural Analysis
    are virtually unlimited. This ability can theoretically be used in any case where
    we want to optimise the interactions between computers and people, or the interactions
    between people and people.
  prefs: []
  type: TYPE_NORMAL
- en: 'Some examples of where this AI capability can be applied are:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Leadership and Management: Leaders and managers can use ChatGPT''s structural
    analysis to understand the dominant ego states within their teams. By recognizing
    whether team members operate from the Parent, Adult, or Child states, leaders
    can tailor their communication and management strategies to motivate their teams,
    resolve conflicts, and enhance teamwork.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Enhancing Therapeutic Practices: Therapists and counsellors can use ChatGPT
    to aid in the identification of clients'' ego states, streamlining the diagnostic
    phase and enriching therapy sessions.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Improving Educational Outcomes: Educators can use ChatGPT to understand the
    ego states of their students, thus adapting teaching methods to better engage
    them. Understanding whether a student is operating from a Child, Adult, or Parent
    state can help in tailoring lesson plans and interactions to encourage more effective
    learning.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Optimising Marketing and Customer Service: Marketing professionals and customer
    service representatives can benefit from understanding the ego states of their
    audience or customers to craft messages that resonate with the target ego state,
    improving communication effectiveness and customer satisfaction.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: By understanding “people are coming from” we can customise computer-human interactions
    and person-person interactions to customise and optimise the experience, leading
    to more effective, efficient, and satisfying outcomes for all parties involved.
  prefs: []
  type: TYPE_NORMAL
- en: Chapter 29\. Performing Transactional Analysis (proper) using ChatGPT
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: In addition to its capabilities in Structural Analysis, ChatGPT is capable of
    doing an accurate Transactional Analysis (proper) of social interactions and conversations;
    the following example uses a GPT designed for this purpose (Transactional Analyst
    GPT -  [https://t.ly/N1SYj](https://t.ly/N1SYj)).
  prefs: []
  type: TYPE_NORMAL
- en: '| YouAnalyse:Manager: "Hey, I know you''re swamped, but did you manage to finalise
    that report? The executive team''s expecting it tomorrow, and I need to review
    and add my input before then. It''s crucial for our department''s funding proposal."Worker:
    "Why must you keep pressing me about it? I''m already juggling a dozen other tasks.
    I assured you, it''ll be completed. Trust me to handle my responsibilities!"Manager:
    "I understand, but this report is a top priority. Our department''s future projects
    hinge on it. I need you to prioritise this above all else today. And, let''s try
    to maintain a professional tone, shall we?"Worker: (sighs, rubbing temples) "Fine,
    I''ll reshuffle my schedule and push some tasks to tomorrow. But understand this
    puts a strain on my other deliverables. I''ll have the report on your desk by
    the end of the day, but at a cost to other projects."Manager: "I appreciate your
    effort. Let''s sit down after you''re done and discuss how we can better manage
    the workload going forward. I''m here to support, not just to push for deadlines."Worker:
    (nods reluctantly) "Alright, let''s focus on getting this done first. We''ll talk
    later."Transactional AnalystIn this conversation, we can observe different ego
    states from Transactional Analysis theory in action.Manager''s Ego States:Parent
    Ego State: The manager initially speaks from a ''Parent'' ego state, expressing
    concern and authority about the report and its importance. This is evident in
    the manager''s directive language, like "I need to review" and emphasising the
    report''s significance for funding.Adult Ego State: When the worker expresses
    frustration, the manager shifts to an ''Adult'' ego state, trying to reason with
    statements like "this report is a top priority" and offering future support. This
    is a rational, problem-solving approach.Worker''s Ego States:Child Ego State:
    The worker initially responds from a ''Child'' ego state, evident in the emotional
    and defensive reaction ("Why must you keep pressing me about it?"). This state
    often surfaces in response to feeling pressured or misunderstood.Adult Ego State:
    Later, the worker moves towards an ''Adult'' ego state, acknowledging the situation''s
    reality ("Fine, I''ll reshuffle my schedule") and agreeing to discuss the workload
    later. This shift demonstrates a more practical and solution-focused approach.Transactional
    Analysis:Crossed Transactions: Initially, there is a ''crossed transaction'' where
    the manager''s ''Parent'' state addresses the worker''s ''Adult'' state, but the
    worker responds from the ''Child'' state. This mismatch creates tension and conflict.Complementary
    Transactions: Later, the conversation shifts to ''complementary transactions''
    with both parties operating from their ''Adult'' states, leading to a more constructive
    and problem-solving dialogue.Overall, the conversation demonstrates how shifts
    in ego states can influence the dynamics of a transaction. Initially, the conversation
    is strained due to mismatched ego states, but it becomes more productive as both
    parties shift to their ''Adult'' states, focusing on practical solutions and mutual
    understanding. |'
  prefs: []
  type: TYPE_TB
- en: In this case, ChatGPT accurately identifies an initial crossed transaction which
    then moves into a complementary transaction, leading to a positive outcome.
  prefs: []
  type: TYPE_NORMAL
- en: Analysing Spam Email using Transactional Analysis (proper)
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Spam email with a social engineering exploit typically consists of an ulterior
    transaction designed to “hook” the Child ego state of the recipient.
  prefs: []
  type: TYPE_NORMAL
- en: The following typical SPAM email presents too-good-to-be-true information to
    the user in the hope of bypassing the recipient’s Adult ego state and hooking
    their Child into providing their credit card details to the sender.
  prefs: []
  type: TYPE_NORMAL
- en: '| From: ExcitingOpportunities@wonderlandpromo.com To: [Recipient''s Email]Subject:
    �� Unlock Your Dreams! A Once-in-a-Lifetime Surprise Awaits You!  🌟Dear [Recipient''s
    Name],�� Congratulations!  �� You''ve been specially selected for an unbelievable
    adventure that we guarantee you''ve never experienced before! Remember those dreams
    you had where anything seemed possible? It''s time to make them come true!We at
    Wonderland Promotions believe in the magic of dreams and the spirit of endless
    possibilities. That''s why we''ve handpicked YOU for a surprise so big, you''ll
    be talking about it for years!  🚀But here''s the catch - this is a secret, limited-time
    offer, just for you. Why? Because we know you''re someone who still cherishes
    the wonders of the world and you''re not afraid to take a leap of faith into the
    extraordinary.What do you need to do? It''s simple! Just click the link below,
    enter your personal details (don''t forget your credit card info for a small processing
    fee), and the journey to your dream adventure begins![Exciting Link to Wonderland]Don''t
    let this chance slip away! After all, what''s life without a little adventure?
    Act fast, as this offer disappears in 48 hours!Can''t wait to see you on the other
    side, where dreams become reality!�� Best Wishes,'
  prefs: []
  type: TYPE_NORMAL
- en: Alice Adventure
  prefs: []
  type: TYPE_NORMAL
- en: Wonderland PromotionsP.S. Remember, great opportunities don't come knocking
    twice!  😉 |
  prefs: []
  type: TYPE_NORMAL
- en: Using the same GPT as above (Transactional Analyst GPT - [https://t.ly/N1SYj](https://t.ly/N1SYj)),
    let’s see what ChatGPT makes of this email.
  prefs: []
  type: TYPE_NORMAL
- en: '| YouAnalyse: (email text…)Transactional AnalystIn the context of Transactional
    Analysis, the email from ExcitingOpportunities@wonderlandpromo.com can be analysed
    as an angular transaction. In angular transactions, the communication involves
    a hidden agenda or motive that is not explicitly stated in the social message.
    Here''s how this applies to the email:Apparent Social Message (Surface Level):
    On the surface, the email is framed as an enthusiastic and enticing invitation.
    It uses emotive language and promises a unique, exciting adventure. This part
    of the message is designed to appeal to the recipient''s Child ego state, which
    is more open to excitement, novelty, and adventure.Hidden Psychological Message
    (Underlying Intent): The underlying motive of the email is not as overt. The sender
    appears to have a hidden agenda, which is to persuade the recipient to click on
    a link and enter personal and credit card information. This action is subtly encouraged
    under the guise of a limited-time, exclusive offer, tapping into the recipient''s
    sense of urgency and fear of missing out.Dynamics of the Angular Transaction:Sender''s
    Ego States: The sender is operating from a Controlling Parent ego state, as they
    are attempting to manipulate the recipient''s behaviour through persuasive language
    and creating a sense of urgency and exclusivity.Targeted Ego State of the Recipient:
    The message is directed towards the recipient''s Child ego state, seeking to evoke
    an impulsive, emotional response. The aim is to bypass the recipient''s Adult
    ego state, which would normally analyse the situation more critically and logically.Outcome
    of the Angular Transaction: The success of such an angular transaction depends
    on whether the recipient responds to the overt, social message or recognizes the
    covert, psychological intent. If the recipient responds positively to the social
    message (e.g., by clicking the link and providing information), the sender''s
    hidden objective is achieved. However, if the recipient''s Adult ego state intervenes
    and questions the legitimacy or motives behind the email, the angular nature of
    the transaction is exposed, and the sender''s hidden agenda may not succeed.In
    summary, the angular nature of this transaction lies in the discrepancy between
    the overt enthusiasm and promise of an exciting opportunity (social message) and
    the covert intent to obtain personal and financial information (psychological
    message). The effectiveness of such a transaction depends on the recipient''s
    ability to discern and respond to these two levels of communication. |'
  prefs: []
  type: TYPE_TB
- en: That was pretty obvious. Let’s try a slightly trickier phishing email on the
    Transactional Analyst GPT.
  prefs: []
  type: TYPE_NORMAL
- en: 'Shared Chat: [https://t.ly/Ql2y_](https://t.ly/Ql2y_)'
  prefs: []
  type: TYPE_NORMAL
- en: '| YouAnalyse this email:"Hello,We have received several reports against your
    activity!You have posted many videos that violate our rules. Reports claimed that
    your posts violated Facebook Policies regarding third party intellectual property
    rights.Based on our policies, robotic growth of followers , sensitive content,
    human rights violators, animal rights violators or even copyrights should be prohibited.
    Referring to reports on your page, your page has been set up in the deletion process.Please
    first look at the activity on your site and if you think this is a mistake , please
    contact us.For appeal and for more details below at the link.https://www.facebook.com/4238954357356/Appeals
    after 48 hours wont be taken into considerationSincerely,Facebook Team"Transactional
    AnalystThe email presents a transaction that appears to be an angular transaction,
    carrying both overt and covert messages aimed at eliciting a specific reaction
    from the recipient. Here''s an analysis based on the provided content:Overt Transaction'
  prefs: []
  type: TYPE_NORMAL
- en: 'Adult-Adult Ego State: The overt content of the email claims to address a serious
    concern regarding violations of Facebook''s policies. It purports to inform the
    recipient about alleged activities such as posting videos that violate rules,
    engaging in prohibited behaviours like robotic growth of followers, and other
    infringements related to intellectual, animal, and human rights. The message concludes
    by offering an option to appeal the decision within a specific timeframe, ostensibly
    respecting the recipient''s ability to rectify the situation.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Covert Transaction
  prefs: []
  type: TYPE_NORMAL
- en: 'Child-Parent Ego State: The covert message, designed to "hook" the recipient''s
    Child ego state, aims to create anxiety and urgency. The mention of "several reports
    against your activity" and the setup of the page "in the deletion process" are
    likely to provoke fear and prompt immediate action without critical thinking.
    This urgency is compounded by the deadline for appeals, pushing the recipient
    to act hastily.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Angular Aspect: The link provided for the appeal is the most critical part
    of the angular transaction. Although it seems to offer a solution, its real purpose
    could be to deceive. By urging the recipient to click a potentially malicious
    link, the sender may be aiming to compromise personal information or security.
    This part of the message targets the recipient''s anxiety and fear, exploiting
    their emotional state to trigger an impulsive response.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Tactics Used:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Urgency and Fear: Creating a sense of urgency to prompt immediate action, bypassing
    rational analysis.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Authority Claim: Posing as the "Facebook Team" to add legitimacy to the demand.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Threat of Loss: Suggesting that the recipient''s page is already in the process
    of deletion to instigate a fear of losing something valuable.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: ConclusionThis email likely constitutes a phishing attempt, exploiting psychological
    manipulation to deceive the recipient into clicking a malicious link under the
    guise of resolving a policy violation issue. The transaction is designed to bypass
    rational analysis (Adult ego state) and directly appeal to emotional responses
    (Child ego state), specifically fear and urgency, to trick the recipient into
    compromising their security or personal information. |
  prefs: []
  type: TYPE_NORMAL
- en: ChatGPT correctly identifies the typical hidden agenda of the spammer and identifies
    the angular transaction with which the spammer is trying to hook the Child ego
    state of the recipient.
  prefs: []
  type: TYPE_NORMAL
- en: Practically speaking, this AI ability could be used in an email service to mark
    spam those emails that constitute angular transactions.
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc6GP.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Too good to be true, by ChatGPT
  prefs: []
  type: TYPE_NORMAL
- en: Real Time Transactional Analysis
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Consider the following unsuccessful conversation between a sales representative
    from an energy retail company and a customer who is about to leave the company.
  prefs: []
  type: TYPE_NORMAL
- en: '| Sales Rep: Good afternoon! May I speak with John, please?Customer: This is
    John. What''s this about?Sales Rep: Hi John, I''m Eddie from Blue Star Energy.
    We noticed you''ve requested to switch to a different electricity provider. Before
    you make a final decision, we''d really appreciate the opportunity to discuss
    your current plan and see if there''s anything we can do to enhance your experience
    with us.Customer: I''ve already made up my mind. Your rates are too high, and
    I found a better deal elsewhere.Sales Rep: I completely understand that finding
    a good deal is important. However, we truly value your business and would hate
    to see you go. To show how much we appreciate you, we''re prepared to offer you
    a $50 voucher if you decide to stay with us. This could be a great way to reduce
    your next bill significantly. What do you think?Customer: I''m not interested
    in vouchers. I''d prefer lower rates instead of one-off deals.Sales Rep: Of course,
    I can see where you''re coming from. But consider this: the $50 voucher is as
    good as cash. You can use it towards your bill, effectively lowering your rates
    for the next billing cycle. Plus, we''re constantly reviewing our plans to ensure
    they''re competitive. There''s a lot of value in staying with us, beyond just
    the numbers.Customer: I don''t think you''re getting it. It''s not just about
    this next bill or a one-time voucher. I want consistently lower rates.Sales Rep:
    I understand your concern about consistent savings, John. Still, this voucher
    is a step in that direction. It''s a quick win while we work on making our rates
    more competitive for you in the long run. And, you won''t find the level of service
    we offer anywhere else. Why not give us another chance?Customer: You''re not really
    listening to me. I''ve already told you what I need, and a one-off voucher isn''t
    it. I''m looking for long-term savings, not short-term incentives.Sales Rep: But
    if you consider the overall benefits and services we provide, plus this voucher,
    you''ll see that staying with us is the right choice. We''re constantly improving
    our offerings, and we''d love to have you experience these enhancements first-hand.Customer:
    No, thank you. I think we''re done here.[At this point, the customer becomes increasingly
    frustrated due to the sales rep''s insistence on the voucher and perceived lack
    of understanding regarding the customer''s request for consistent long-term savings
    rather than short-term incentives. The sales rep fails to read the customer''s
    growing annoyance, continuing to push the voucher offer.]Customer: I''ve made
    my decision. Please, just process my switch request. Goodbye.[The customer hangs
    up, feeling unheard and dissatisfied with the sales rep''s approach.] |'
  prefs: []
  type: TYPE_TB
- en: Let’s run that conversation through the Transactional Analyst GPT ([https://t.ly/N1SYj](https://t.ly/N1SYj))
    to find at which stage the sales representative could have corrected his approach.
  prefs: []
  type: TYPE_NORMAL
- en: 'Shared Chat: [https://t.ly/cF-jc](https://t.ly/cF-jc)'
  prefs: []
  type: TYPE_NORMAL
- en: '| YouIdentify where a crossed transaction occurred in this conversation and
    explain how the call could have been handled better. "Sales Rep: Good afternoon!
    May I speak with John, please...] "Transactional AnalystIn this conversation,
    the crossed transaction occurs when the Sales Rep continues to offer the $50 voucher
    despite the Customer expressing a clear preference for consistently lower rates
    over one-off deals. The Sales Rep''s persistent focus on the voucher and benefits
    of staying with the company does not align with the Customer''s expressed need
    for long-term savings.This misalignment demonstrates a failure in the transactional
    communication, where the Sales Rep responds to the Customer''s Adult ego state
    with messages aimed at appealing to the Child ego state by offering immediate
    gratification (the voucher), rather than addressing the Adult concern for long-term
    financial benefits.Better Handling of the Call:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Acknowledgment and Empathy: The Sales Rep could have acknowledged the Customer''s
    concern more effectively by showing empathy towards the Customer''s situation.
    A response like, "I see that finding a solution that offers long-term savings
    is really important to you," would validate the Customer''s feelings and concerns,
    aligning with the Customer''s Adult ego state.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Direct Address of Concerns: Instead of repeatedly offering the voucher, the
    Sales Rep could have explored or proposed alternative solutions that align with
    the Customer''s request for lower rates. For example, the Sales Rep could have
    said, "Let''s review your current usage and see if there''s a more cost-effective
    plan that would offer you the lower rates you''re looking for on a consistent
    basis."'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Offer to Follow-Up: If immediate alternatives were not available, the Sales
    Rep could have offered to follow up after discussing with their team or management
    to find a more suitable offer. This approach would demonstrate a commitment to
    genuinely addressing the Customer''s needs.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Respect the Customer''s Decision: Recognizing and respecting the Customer''s
    decision to switch providers is crucial. The Sales Rep could have ended the call
    on a positive note by saying, "I understand your decision. While we''re sorry
    to see you go, I''ll process your switch request right away. If anything changes
    or you''d like to discuss future options, please feel free to contact us."'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: By focusing on genuinely understanding and addressing the Customer's needs,
    the Sales Rep could have avoided the crossed transaction and potentially maintained
    a positive relationship, even if the Customer ultimately decided to switch providers.
    This approach would leave the door open for future business and ensure the Customer
    felt heard and respected. |
  prefs: []
  type: TYPE_NORMAL
- en: The GPT is able to accurately identify at which stage a crossed transaction
    occurred, and what could have been done to avoid a negative outcome to the call.
  prefs: []
  type: TYPE_NORMAL
- en: In practice, an AI could monitor sales calls in real time and alert the sales
    rep when they were getting into a crossed transaction, so that  they could adjust
    their approach to better suit the ego state from which the customer was addressing 
    them.
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc6GR.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Next call, by ChatGPT
