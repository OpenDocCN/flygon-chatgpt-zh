- en: ● ****T**ry** ****reph**rasin**g ****t**he** ****que**stio**n ****us**ing**
    ****diff**eren**t ****wo**rds** ****o**r** ****phr**ase**s. ****A**** ****sm**all**
    ****ch**ang**e ****c**an** ****dras**ticall**y ****ch**ang**e ****t**he** ****mo**del**'****s****
    ****pers**pectiv**e.
  id: totrans-326
  prefs: []
  type: TYPE_NORMAL
  zh: ● **尝试**用不同的**词语**或**短语****重述**问题。一个小小的改变可以**极大地**改变模型**的视角**。
- en: ● ****Con**side**r ****cha**ngin**g ****t**he** ****to**ne** ****o**f** ****t**he**
    ****req**ues**t. ****F**or** ****exa**mpl**e, ****i**f** ****y**ou**’****r**e**
