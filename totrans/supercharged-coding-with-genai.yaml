- en: '15'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'Going Live with GenAI: Logging, Monitoring, and Errors'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: '**Large Language Models** (**LLMs**) can supercharge our going-live processes,
    which refers to deploying code to production. But if prompted incorrectly, they
    can also degrade code quality. In this chapter, we will examine how, even when
    following the five S’s to prompt GenAI for logging, monitoring, and input validation,
    the resulting code can become cluttered, combining these elements with core functionality
    and violating the **single responsibility principle**. For instance, models sometimes
    suggest using `print` statements instead of proper logging, handling input validation
    within functions, or incrementing counters without reporting their values. This
    violates the single responsibility principle and reduces overall code quality.'
  prefs: []
  type: TYPE_NORMAL
- en: To address this, we will apply the **Chain-of-Thought** (**CoT**) prompt engineering
    technique to GitHub Copilot to generate well-monitored code without interfering
    with the function’s core functionality, leveraging **decorators** as a design
    pattern. We will also leverage **few-shot learning** to guide it toward following
    a coding style. While GitHub Copilot is well suited for these tasks, we will explore
    how similar results can be achieved using CoT with few-shot learning in ChatGPT
    and CoT with **fine-tuning** in OpenAI API.
  prefs: []
  type: TYPE_NORMAL
- en: 'The key topics covered in this chapter include the following:'
  prefs: []
  type: TYPE_NORMAL
- en: Introducing logging, monitoring, and raising errors
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Leveraging GenAI for higher-level coding patterns
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Applying inverse CoT with ChatGPT and OpenAI
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Utilizing few-shot learning and fine-tuning as style guides
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Technical requirements
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'To get the most out of this chapter, ensure you have the following:'
  prefs: []
  type: TYPE_NORMAL
- en: A GitHub Copilot account
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: An **integrated development environment** (**IDE**) – either VS Code or PyCharm
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: An OpenAI account with access to ChatGPT and OpenAI API
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Access to the book’s repository, available at [https://github.com/PacktPublishing/Supercharged-Coding-with-Gen-AI](https://github.com/PacktPublishing/Supercharged-Coding-with-Gen-AI)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A virtual environment set up in VS Code or PyCharm
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: An OpenAI API token
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: For assistance with setting up a GitHub Copilot account, refer to [*Chapter
    3*](Chapter_3.xhtml#_idTextAnchor108). For instructions on setting up OpenAI API
    access and token generation, see [*Chapter 2*](Chapter_2.xhtml#_idTextAnchor061).
    If you need help with creating an OpenAI account or setting up a virtual environment
    in your IDE, refer to the *Appendix* for detailed guidance.
  prefs: []
  type: TYPE_NORMAL
- en: Introducing logging, monitoring, and raising errors
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: When Python software goes live in the production stage and serves clients, it
    is important to verify that it is consistently working as expected in real-world
    use cases. If some problems are identified, understanding the behavior of these
    issues is critical. Thus, logging, monitoring, and raising errors for problematic
    inputs are an essential aspect of the **Software Development Life Cycle** (**SDLC**).
    They involve tracking key checkpoints within internal processes, which are usually
    performed by loggers, and these facilitate debugging and other analyses. Recording
    performance statistics such as counting function calls is often used with profiling
    to improve performance. Lastly, handling unexpected scenarios, such as receiving
    arguments of an invalid type, is a process to ensure that the code is robust against
    the wide range of user inputs. These three aspects help maintain software quality,
    minimize unexpected issues, and simplify debugging when problems occur.
  prefs: []
  type: TYPE_NORMAL
- en: In this chapter, we will focus on these three fundamental practices since these
    are typically the first going-live initiatives in any project, and they are likely
    to be relevant to your software as well. As your strategy expands to additional
    metrics and error-handling techniques, these standard approaches using GenAI tools
    can easily be generalized and extended from what we introduce in this chapter.
  prefs: []
  type: TYPE_NORMAL
- en: The FizzBuzz use case
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: To explore how monitoring efforts can be integrated into our code, let us consider
    developing a program that generates the **FizzBuzz** sequence, a coding challenge
    introduced in [*Chapter 2*](Chapter_2.xhtml#_idTextAnchor061). As part of the
    monitoring efforts for this program, we want to log each function call along with
    its arguments, maintain a counter of total function calls, and ensure inputs are
    positive integers less than 500.
  prefs: []
  type: TYPE_NORMAL
- en: 'As a starting point, a basic implementation of FizzBuzz can be generated from
    the function signature:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE308]'
  prefs: []
  type: TYPE_PRE
- en: '*Figure 15.1* shows an implementation suggested by GitHub Copilot in PyCharm:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 15.1: Copilot’s initial FizzBuzz implementation](../Images/B31534_15_1.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 15.1: Copilot’s initial FizzBuzz implementation'
  prefs: []
  type: TYPE_NORMAL
- en: This implementation serves as a foundation for incorporating going-live features.
    Before introducing best practices for monitoring with prompt engineering techniques,
    we will first explore how simply chaining logging, monitoring, and error-raising
    requests can degrade code quality. Adding GenAI implementation for these tasks
    results in a longer and more complex function. However, techniques such as CoT
    and few-shot learning can help add these functionalities yet maintain clean, well-structured
    code.
  prefs: []
  type: TYPE_NORMAL
- en: Logging
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Logs are generated text records that serve as a diary of our program’s execution.
    For example, at the start of the FizzBuzz sequence, we may want to log the call’s
    arguments. While using a simple `print` statement is an option, the built-in `logging`
    library is a much better choice as it can write to the console but also provides
    more control over the output and where the logs can be written, such as files
    and remote servers. It enables the structured formatting of records and log-level
    management, which can report all outputs for debugging, or a subset of warnings
    based on importance.
  prefs: []
  type: TYPE_NORMAL
- en: 'To use the `logging` library, we typically define a `logger` instance with
    the module’s name:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE309]'
  prefs: []
  type: TYPE_PRE
- en: This creates a logger instance linked to the module name using the `__name__`
    special attribute (also referred to as a **magic attribute**). This association
    allows better filtering and customization of log messages in that file.
  prefs: []
  type: TYPE_NORMAL
- en: When using GenAI for logging, it is essential to separate the logging task into
    its own prompt, rather than embedding it within the implementation prompt. This
    approach aligns with the **single-task** principle, one of the five S’s best practices
    introduced earlier in the book.
  prefs: []
  type: TYPE_NORMAL
- en: 'For example, when working with Copilot in VS Code’s **edits window**, we can
    select the `print_fizzbuzz` implementation and use the following prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE310]'
  prefs: []
  type: TYPE_PRE
- en: 'For your reference, here is the suggestion we got when using the *3o-mini*
    model as appears in *Figure 15.2*:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 15.2: Log suggestion for FizzBuzz](../Images/B31534_15_2.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 15.2: Log suggestion for FizzBuzz'
  prefs: []
  type: TYPE_NORMAL
- en: 'In PyCharm, we can leverage the inline chat after selecting the function’s
    code, and prompt the following to yield similar results:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE311]'
  prefs: []
  type: TYPE_PRE
- en: While the generated log statement correctly logs the function’s argument, it
    also introduces two lines of unnecessary code clutter within the function, which
    should remain focused on printing the FizzBuzz sequence. Later in the chapter,
    we will explore how to maintain cleaner code with prompt engineering techniques.
  prefs: []
  type: TYPE_NORMAL
- en: Handling unexpected input
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: When our program receives unexpected inputs at runtime, such as incorrect argument
    types (for example, `float` instead of `int`) or values that are beyond a manageable
    range for our program, we want to control the program’s behavior by **raising
    errors** rather than failing or producing unpredictable results.
  prefs: []
  type: TYPE_NORMAL
- en: For instance, in the `print_fizzbuzz` function, the `limit` argument is expected
    to be a positive integer so that we can print numbers, `fizz`, or `buzz` from
    0 up to that value. An additional constraint might be that the input should be
    less than 500 to ensure the output fits on the screen. To enforce both requirements
    with error handling, we can leverage Copilot.
  prefs: []
  type: TYPE_NORMAL
- en: 'When using Copilot in VS Code’s edit window, we can select the `print_fizzbuzz`
    code and use the following prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE312]'
  prefs: []
  type: TYPE_PRE
- en: 'In PyCharm, we can use the inline chat by selecting the `print_fizzbuzz` function
    and entering the following prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE313]'
  prefs: []
  type: TYPE_PRE
- en: 'For reference, here is the result obtained using Copilot for VS Code with the
    o3 mini model:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 15.3: VS Code output correctly handles inputs but creates code clutter](../Images/B31534_15_3.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 15.3: VS Code output correctly handles inputs but creates code clutter'
  prefs: []
  type: TYPE_NORMAL
- en: This recommendation verifies both the argument’s type and its range limits,
    as requested. However, like the logging prompt, it introduces an additional responsibility
    of validating inputs to the function. Later in this chapter, we will explore how
    prompt engineering can help generate higher-quality code.
  prefs: []
  type: TYPE_NORMAL
- en: Monitoring
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Another key aspect of going live is tracking the usage of different functions.
    By recording metrics, we can collect valuable statistics on performance, call
    frequency, and execution rates.
  prefs: []
  type: TYPE_NORMAL
- en: 'A simple starting point is to track the number of function calls in our program.
    To do this with `print_fizzbuzz`, we can define a global counter variable, `FIZZBUZZ_COUNTER
    = 0`, and instruct Copilot to increment it before or after each successful execution.
    For example, when working with Copilot in VS Code’s **edits window**, we can select
    the `print_fizzbuzz` implementation and use the following prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE314]'
  prefs: []
  type: TYPE_PRE
- en: 'Similarly, in PyCharm, we can select the code and use the inline chat to prompt
    the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE315]'
  prefs: []
  type: TYPE_PRE
- en: '*Figure 15.4* illustrates a suggested completion for this prompt when using
    Copilot in VS Code with the o3 mini model:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 15.4: VS Code adds a record usage counter](../Images/B31534_15_4.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 15.4: VS Code adds a record usage counter'
  prefs: []
  type: TYPE_NORMAL
- en: 'At this point, our `print_fizzbuzz` function integrates multiple monitoring
    components: logging, handling invalid inputs, and counting calls. While these
    fulfill our monitoring needs, they lead to a lengthy and less readable function.
    This violates clean coding principles, particularly the **single responsibility
    principle**, which emphasizes that functions should focus on a single task.'
  prefs: []
  type: TYPE_NORMAL
- en: Code created by GenAI using simple prompts tends to generate code and add it
    within existing methods which can lead to cluttered implementations. To maintain
    clean and structured code, we can leverage CoT prompting. This approach enables
    us to handle monitoring at a higher abstraction level, as we will explore next.
  prefs: []
  type: TYPE_NORMAL
- en: Leveraging GenAI for higher-level coding patterns
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'To balance clean code principles, such as the single responsibility principle,
    with the need for going-live requirements, a Pythonic approach is to use higher-level
    coding patterns such as decorators. Rather than embedding logging statements within
    a function, we delegate this responsibility to a decorator pattern:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE316]'
  prefs: []
  type: TYPE_PRE
- en: Here, `log_function_args` is responsible for logging function calls, allowing
    `print_fizzbuzz` to focus on handling the FizzBuzz sequence. This approach ensures
    cleaner, more modular code while enabling logging for multiple functions.
  prefs: []
  type: TYPE_NORMAL
- en: GenAI applications may not suggest this pattern unless we actively steer them
    toward clean coding practices. As introduced in [*Chapter 9*](Chapter_9.xhtml#_idTextAnchor391),
    CoT prompting helps LLMs reason through complex tasks. We can direct the model
    toward better design choices by using CoT prompting and explicitly writing a decorator
    call, such as `@log_function_args`, prior to implementing the actual decorator
    function. This will result in cleaner and more maintainable implementations.
  prefs: []
  type: TYPE_NORMAL
- en: Using decorators to separate responsibilities
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'A **decorator** is a structural design pattern that enables stacking tasks
    before and after a function call without altering the function’s code. It is a
    specialized use case of a **closure**, where a function retains access to its
    associated arguments. A typical decorator implementation looks like this:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE317]'
  prefs: []
  type: TYPE_PRE
- en: 'A common usage involves applying the `@` annotation, as shown here:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE318]'
  prefs: []
  type: TYPE_PRE
- en: Here, the `sample_decorator` decorator accepts a function object and returns
    a wrapper function that takes the same arguments as the original function but
    prints `Function is wrapped` before execution.
  prefs: []
  type: TYPE_NORMAL
- en: LLMs can certainly include decorators in their generated code as their training
    data contains many common decorator implementations. For well-known use cases
    such as timers, loggers, argument validation, and retry mechanisms, the models
    can generate decent implementations based on the decorator’s signature when prompted
    to.
  prefs: []
  type: TYPE_NORMAL
- en: Next, we will explore how to apply inverse CoT prompting to generate the desired
    implementation.
  prefs: []
  type: TYPE_NORMAL
- en: Inverse CoT for decorator implementation
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In [*Chapter 9*](Chapter_9.xhtml#_idTextAnchor391), we explored how defining
    a function that calls low-level implementations provides strong guidance for GitHub
    Copilot. With inverse CoT, we take a similar approach by referencing functions
    that have not yet been defined. We use the term *inverse* because we want the
    decorators to appear earlier in the file than the function that uses them. To
    achieve this, we place the cursor higher in the file, allowing Copilot to generate
    code above an existing implementation.
  prefs: []
  type: TYPE_NORMAL
- en: 'As a review, here is an example of CoT prompting used in [*Chapter 9*](Chapter_9.xhtml#_idTextAnchor391)
    to implement a variation of a geometric mean calculator, where Copilot successfully
    generated the missing low-level functions:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 15.5: CoT-driven implementation of a higher-level function with GitHub
    Copilot](../Images/B31534_15_5.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 15.5: CoT-driven implementation of a higher-level function with GitHub
    Copilot'
  prefs: []
  type: TYPE_NORMAL
- en: In this approach, the function is broken into named functions that are intentionally
    called undefined. Copilot understands that its role is to generate these necessary
    implementations. Such an approach enables Copilot to implement the missing functions,
    producing structured and predictable code.
  prefs: []
  type: TYPE_NORMAL
- en: 'We can apply the same technique when implementing going-live functionality,
    by defining a decorator structure and allowing Copilot to generate the implementation.
    By merely adding calls to the required decorators, we guide Copilot to generate
    their corresponding implementations. For instance, in our FizzBuzz use case, we
    can layer three monitoring functionalities onto our function:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Validate the input**: Define a decorator with parameters to enforce input
    bounds, that is, `@validate_args_types_and_limits(0, 500)`.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Increment a global counter**:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '`@increment_counter`.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Log function calls**:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '`@log_function_args`.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'For reference, here is how stacking these decorators would appear before Copilot
    generates their implementations:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 15.6: Inverse CoT approach](../Images/B31534_15_6.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 15.6: Inverse CoT approach'
  prefs: []
  type: TYPE_NORMAL
- en: 'Here, as usual with the CoT technique, the IDE will correctly mark the decorators
    as undefined with the red underlines. After calling the decorators, we move the
    cursor to line 7 before the call to the first decorator, press *Enter* three times
    to create space for their implementations, then return to line 8 and type the
    following:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE319]'
  prefs: []
  type: TYPE_PRE
- en: This prompt is sufficient for Copilot to infer that it should generate the first
    decorator, interpreting `l` as a reference to `log_function_args`. Moving the
    cursor up and pressing *Enter* three times is all that is involved in **inverse
    CoT**, but it is very effective. As shown in *Figure 15.7*, this cue enables Copilot
    to generate a complete implementation of a logging mechanism, including the function’s
    arguments.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 15.7: Copilot’s decorator implementation](../Images/B31534_15_7.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 15.7: Copilot’s decorator implementation'
  prefs: []
  type: TYPE_NORMAL
- en: The suggested implementation of `log_function_args` correctly logs the function
    name and arguments as an `info`-level log statement.
  prefs: []
  type: TYPE_NORMAL
- en: 'After the initial `def l` prompt, pressing the *Enter* key twice is enough
    for Copilot to generate the next decorator, `increment_counter`, as shown in *Figure
    15.8*:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 15.8: Enter key as a cue for Copilot to implement the next decorator](../Images/B31534_15_8.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 15.8: Enter key as a cue for Copilot to implement the next decorator'
  prefs: []
  type: TYPE_NORMAL
- en: 'The *Enter* key serves as a sufficient cue for the next implementation. This
    highlights how Copilot can supercharge our workflow. For your reference, here
    is the suggested implementation of `increment_counter` by Copilot:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE320]'
  prefs: []
  type: TYPE_PRE
- en: This decorator correctly increments the previously initialized global variable,
    `FIZZBUZZ_COUNTER`, before the function call. If we prefer to increment it after
    execution, we could have used a different decorator’s call, such as `@increment_counter_after_call`.
  prefs: []
  type: TYPE_NORMAL
- en: Finally, Copilot’s suggested implementation for argument validation efficiently
    manages both type-checking and value constraints using a **parameterized decorator**.
    This type of decorator introduces an additional closure layer, allowing us to
    specify arguments, such as the minimum and maximum limits, in this case.
  prefs: []
  type: TYPE_NORMAL
- en: 'By calling `@validate_args_types_and_limits(0, 500)`, we provide a clear cue
    for Copilot to recognize the need for a parameterized decorator with the given
    constraints. Here is the suggested implementation:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE321]'
  prefs: []
  type: TYPE_PRE
- en: Here, the parameterized decorator, `validate_args_types_and_limits`, ensures
    that the argument falls within the specified inclusive range before executing
    the function.
  prefs: []
  type: TYPE_NORMAL
- en: 'For reference, here is an example of calling `print_fizzbuzz(-15)`, which should
    raise a value error due to the negative input:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE322]'
  prefs: []
  type: TYPE_PRE
- en: '`validate_args_types_and_limits` raised an error due to a bad input, preventing
    the function from being called with a negative limit. Similarly, if we had called
    `print_fizbuzz(3.14)`, we would have received a `TypeError` error, indicating
    that it handles integers but not floating-point values.'
  prefs: []
  type: TYPE_NORMAL
- en: 'To see how our `log_function_args` and `increment_counter` decorators operate,
    we will add a basic logging configuration at the beginning of the file, capturing
    `INFO`-level and higher logs, in a file named `fizzbuzz.log`:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE323]'
  prefs: []
  type: TYPE_PRE
- en: This ensures that the log messages are stored in `fizzbuzz.log`. In most software
    systems, `print` statements should not be used and should be replaced by logging
    that can direct output to the console or a file.
  prefs: []
  type: TYPE_NORMAL
- en: 'Next, we add two function calls with valid inputs:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE324]'
  prefs: []
  type: TYPE_PRE
- en: 'For reference, the `fizzbuzz_printer.py` output is shown in *Figure 15.9*:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 15.9: Console output for the two function calls](../Images/B31534_15_9.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 15.9: Console output for the two function calls'
  prefs: []
  type: TYPE_NORMAL
- en: 'This produces a clean output, containing the FizzBuzz results. Meanwhile, the
    `fizzbuzz.log` log file records log messages in the specified format, as illustrated
    in *Figure 15.10*:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 15.10: fizzbuzz.log output containing logs and counter messages](../Images/B31534_15_10.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 15.10: fizzbuzz.log output containing logs and counter messages'
  prefs: []
  type: TYPE_NORMAL
- en: This implementation follows clean code principles, separating core functionality
    from monitoring while leveraging inverse CoT prompting in Copilot to generate
    neat and maintainable code. However, decorators can be styled in various ways.
    Later in the chapter, we will explore how few-shot learning can help refine their
    structure for even better results.
  prefs: []
  type: TYPE_NORMAL
- en: Next, we will apply the inverse CoT technique when prompting ChatGPT and OpenAI
    API.
  prefs: []
  type: TYPE_NORMAL
- en: Applying inverse CoT with ChatGPT and OpenAI
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: GitHub Copilot is the preferred tool for integrating going-live functionality,
    as it provides the fastest code completion experience. However, we will also demonstrate
    how to apply the same CoT prompting technique with ChatGPT and OpenAI API. To
    do this effectively, we will structure our prompts using the five S’s best practices
    for prompt precision introduced earlier in this book.
  prefs: []
  type: TYPE_NORMAL
- en: Using ChatGPT to monitor decorators
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Similar to our approach with GitHub Copilot, we can leverage ChatGPT to generate
    the required decorators for monitoring. Since we submit the full code rather than
    moving the cursor up in the file, this approach aligns with a standard CoT technique.
    The following is an example of a structured prompt that provides context about
    the incomplete Python implementation, focusing on a single task, with specific
    and short instructions, followed by a lead-in cue:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE325]'
  prefs: []
  type: TYPE_PRE
- en: 'When used in ChatGPT with the *o3-mini high* model (available to Plus subscribers
    as of April 2025), this prompt generated a complete script including the full
    implementation of the missing decorators, as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE326]'
  prefs: []
  type: TYPE_PRE
- en: This implementation retains the same functionality as the decorators generated
    by Copilot but differs in style. It includes docstrings and the addition of the
    `@functools.wraps(func)` decorator, which helps preserve the original function’s
    attributes. Later in the chapter, we will explore how to guide ChatGPT toward
    a more desirable implementation style using few-shot learning.
  prefs: []
  type: TYPE_NORMAL
- en: Using OpenAI API to monitor decorators
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The approach for using OpenAI API closely mirrors the ChatGPT prompt structure.
    We construct a system prompt that provides context and a single task, as was done
    for ChatGPT. Additionally, we use a user prompt that includes the existing script
    along with a cue for code completion.
  prefs: []
  type: TYPE_NORMAL
- en: 'The system prompt should look as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE327]'
  prefs: []
  type: TYPE_PRE
- en: 'These prompt pieces serve the same role as the context and task definitions
    in the ChatGPT prompt. The user prompt should incorporate the incomplete implementation,
    for example, by reading the code from a file, as shown here:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE328]'
  prefs: []
  type: TYPE_PRE
- en: By providing the incomplete script alongside the `CODE:` cue, we can guide OpenAI
    API toward generating the missing decorator implementations. Calling OpenAI API
    with these prompts should yield a decorator implementation like the outputs from
    ChatGPT and GitHub Copilot. The full script is available for your reference at
    `ch15/inverse_cot_openai.py`.
  prefs: []
  type: TYPE_NORMAL
- en: Now that we have seen how to use GenAI tools to implement monitoring decorators,
    the next step is refining their style to better fit our needs. This can be achieved
    using few-shot learning to guide Copilot and ChatGPT with structured examples
    or by fine-tuning a model through OpenAI API GUI. We will explore both approaches
    in the next section.
  prefs: []
  type: TYPE_NORMAL
- en: Utilizing few-shot learning and fine-tuning as style guides
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: While the decorators generated by GenAI applications provide the desired functionality,
    we can further refine their style using few-shot learning techniques, as introduced
    in [*Chapter 8*](Chapter_8.xhtml#_idTextAnchor339).
  prefs: []
  type: TYPE_NORMAL
- en: For instance, we might want to include the `@functools.wraps` decorator to preserve
    the original function’s attributes and enforce a specific logging style with the
    `extra` parameters. Both objectives can be achieved by supplying few-shot examples
    to Copilot and ChatGPT or adding desired prompt outputs to our fine-tuning file
    to be used by OpenAI API.
  prefs: []
  type: TYPE_NORMAL
- en: Few-shot decorator style for GitHub Copilot
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: As introduced in [*Chapter 8*](Chapter_8.xhtml#_idTextAnchor339), enforcing
    a specific style with GitHub Copilot requires a few examples, which can be provided
    as a style guide script. This few-shot example achieves the desired implementation.
  prefs: []
  type: TYPE_NORMAL
- en: To achieve this, we can create a `style_guide_decorator.py` file, which should
    be treated like another non-project file and is typically placed outside the `src`
    folder in a project repository.
  prefs: []
  type: TYPE_NORMAL
- en: This style guide should include all the elements we want Copilot to follow,
    such as log message formatting, type hints, and spacing. These examples guide
    Copilot and reduce the need for chained prompts or additional edits.
  prefs: []
  type: TYPE_NORMAL
- en: 'When creating a style guide for decorators, we suggest including a `time_it`
    decorator to log a function’s runtime. The implementation should demonstrate the
    use of `@functools.wraps` to retain the decorated function’s attributes, type
    hints for arguments and variables, and a hanging indent logging style with extra
    parameters:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE329]'
  prefs: []
  type: TYPE_PRE
- en: In this case, the logger message combines static text with the `extra` parameter,
    resulting in a structured log message that is better suited for large-scale logging.
    For instance, to quickly identify all timing messages where execution exceeded
    five seconds, we could filter logs based on the `timing` parameter with a condition
    such as `timing > 5`.
  prefs: []
  type: TYPE_NORMAL
- en: To incorporate the style guide into the session, we open `decorators_style_guide.py`,
    then cut and paste the entire content of the file in place. This trick ensures
    that Copilot recognizes the code in the file as part of the active session and
    incorporates its style when making suggestions.
  prefs: []
  type: TYPE_NORMAL
- en: 'Next, we return to `print_fizzbuzz.py` and repeat the inverse CoT process.
    This time, Copilot’s suggestions should align with the style guide defined in
    `style_guide_decorator.py`. As shown in *Figure 15.11*, Copilot includes the `@functools.wraps`
    decorator in its suggested implementation, while the logging indentation and extra
    parameters maintain the same formatting as specified in the style guide:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 15.11: Decorator implementation using the style guide in GitHub Copilot](../Images/B31534_15_11.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 15.11: Decorator implementation using the style guide in GitHub Copilot'
  prefs: []
  type: TYPE_NORMAL
- en: This implementation demonstrates that Copilot follows our preferred logging
    style, using a static log message and extra parameters to support a more structured
    logging format.
  prefs: []
  type: TYPE_NORMAL
- en: Next, we will explore how to apply the style guide when prompting with ChatGPT.
    We will then show how to incorporate it into a fine-tuning approach when working
    with OpenAI API.
  prefs: []
  type: TYPE_NORMAL
- en: Few-shot learning in ChatGPT
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: When using ChatGPT, we can apply a few-shot approach to deploying decorators,
    like that we explored in [*Chapter 8*](Chapter_8.xhtml#_idTextAnchor339). For
    this task, we recommend the o3-mini high model since it is better at complex coding
    tasks.
  prefs: []
  type: TYPE_NORMAL
- en: 'We first enhance the prompt’s surrounding context by including a reference
    example:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE330]'
  prefs: []
  type: TYPE_PRE
- en: 'For the few-shot example, we will label the input and output code snippets,
    with `INCOMPLETE_CODE` used for the input, indicating the missing `time_it` decorator,
    and `COMPLETE_CODE` for the fully implemented script. This distinction clearly
    highlights the intended transformation:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE331]'
  prefs: []
  type: TYPE_PRE
- en: 'With this incomplete code snippet, we expect the model to generate a fully
    implemented decorator that follows a specific style. To guide the model, we will
    provide a fully implemented version of the desired code, as shown here:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE332]'
  prefs: []
  type: TYPE_PRE
- en: 'Providing this example of the desired output helps guide ChatGPT toward generating
    the expected implementation. The following is the structure of the prompt, with
    previously introduced parts omitted for brevity:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE333]'
  prefs: []
  type: TYPE_PRE
- en: 'The full prompt is available in the book’s repository at `ch15/decorators_few_shot_chatgpt.txt`.
    For reference, the results generated using this prompt closely resemble Copilot’s
    code completion, as shown in *Figure 15.12*:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 15.12: Few-shot learning using ChatGPT](../Images/B31534_15_12.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 15.12: Few-shot learning using ChatGPT'
  prefs: []
  type: TYPE_NORMAL
- en: In ChatGPT’s implementation, we can see that the model followed the style guide
    from our example, incorporating the `extra` parameter alongside the static log
    message and using the `@functools.wraps` decorator to preserve the function’s
    attributes. However, this is a relatively lengthy prompt to achieve a code completion
    that GitHub Copilot can generate much faster. Therefore, we recommend using Copilot
    whenever possible for a more efficient workflow.
  prefs: []
  type: TYPE_NORMAL
- en: Leveraging fine-tuning for OpenAI API
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: With OpenAI, we can either apply the few-shot technique, as in the ChatGPT input-output
    examples, or train a **fine-tuned model** by adding a few training samples in
    JSONL format, as introduced in [*Chapter 11*](Chapter_11.xhtml#_idTextAnchor452).
    This approach would take even longer than ChatGPT to achieve what GitHub Copilot
    can generate almost instantly. Fine-tuning would be more practical for large-scale
    projects, such as scanning an entire repository to implement logging, monitoring,
    and error handling for all files automatically, at scale.
  prefs: []
  type: TYPE_NORMAL
- en: As we saw in [*Chapter 11*](Chapter_11.xhtml#_idTextAnchor452), fine-tuning
    generally requires more examples than few-shot learning because of the differences
    in how models handle prompts versus how they update weights during fine-tuning.
    However, considering our starter fine-tuning file, `fine_tuning.jsonl`, from [*Chapter
    11*](Chapter_11.xhtml#_idTextAnchor452), which has already established the preferred
    logging style, indentation, and spacing, a single decorator may be sufficient
    to achieve the desired implementation.
  prefs: []
  type: TYPE_NORMAL
- en: 'For example, here is a `time_it` decorator added to `ch13/fine_tuning.jsonl`,
    structured with a system and user prompt as used in ChatGPT, along with a desirable
    assistant response assigned a weight of `1`:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE334]'
  prefs: []
  type: TYPE_PRE
- en: 'We can then upload the fine-tuning file by going to [platform.openai.com](https://platform.openai.com),
    selecting **Dashboard** | **Fine-tune**, and uploading the JSONL file, as shown
    in *Figure 15.13*:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 15.13: Upload the fine-tuned JSONL file](../Images/B31534_15_13.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 15.13: Upload the fine-tuned JSONL file'
  prefs: []
  type: TYPE_NORMAL
- en: 'After the upload is complete, the fine-tuned model will be trained, which takes
    around 15 minutes. When done, a **Succeeded** icon will appear, as shown in *Figure
    15.14*:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 15.14: Successful fine-tuning job indicates the model has finished
    training](../Images/B31534_15_14.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 15.14: Successful fine-tuning job indicates the model has finished training'
  prefs: []
  type: TYPE_NORMAL
- en: To compare the benefits of fine-tuning against the base GPT-4o mini model, we
    can use the **Playground** page. This allows us to compare the fine-tuned model’s
    output against the baseline results, highlighting improvements. It is always recommended
    to validate these enhancements on key prompts once the fine-tuning process is
    complete.
  prefs: []
  type: TYPE_NORMAL
- en: 'We will select **gpt-4o-mini-2024-07-18** as the base model on the left and
    choose the fine-tuned model from the drop-down menu on the right, as shown in
    *Figure 15.15*:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 15.15: Base model and fine-tuned model comparison](../Images/B31534_15_15.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 15.15: Base model and fine-tuned model comparison'
  prefs: []
  type: TYPE_NORMAL
- en: 'This comparison allows us to assess the performance of both models. Next, we
    add the system instructions on both sides of the screen, mirroring the surrounding
    context and single-task approach used in ChatGPT:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE335]'
  prefs: []
  type: TYPE_PRE
- en: 'The user message follows a format like our ChatGPT prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE336]'
  prefs: []
  type: TYPE_PRE
- en: 'At this stage, our prompt is ready to run, producing more precise results when
    using the fine-tuned model. Compared to **gpt-4o-mini-2024-07-18**, the fine-tuned
    model returns only the code with our preferred logging style, and including the
    `@functools.wraps` decorator, as shown in *Figure 15.16*:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 15.16: Comparison of the fine-tuned model and the base model](../Images/B31534_15_16.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 15.16: Comparison of the fine-tuned model and the base model'
  prefs: []
  type: TYPE_NORMAL
- en: In this figure, we can see that the assistant’s response begins directly with
    the code, reflecting the influence of the fine-tuned examples. Additionally, the
    preferred logging style is consistently applied, aligning with the provided sample.
  prefs: []
  type: TYPE_NORMAL
- en: While fine-tuning helps maintain the desired structure and style, it requires
    significantly more effort than using Copilot for going-live tasks related to code
    completion. For this reason, we recommend Copilot as your primary tool for such
    tasks. Fine-tuning may be a viable option if you’re building a custom GenAI application
    for internal use and have dozens of training examples, such as scanning an entire
    repository for suggestions or developing a GenAI-powered solution to serve other
    customers. However, Copilot with few-shot learning tends to be a more efficient
    method of achieving results without having to invest time in finding many use
    cases.
  prefs: []
  type: TYPE_NORMAL
- en: Summary
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: In this chapter, we explored how going-live tasks, such as adding logs, monitoring
    usage, and handling bad input, can introduce unnecessary complexity to functions.
    GenAI does not inherently suggest using decorators to separate these objectives
    from the core functionality of the program, which can lead to lower-quality code.
  prefs: []
  type: TYPE_NORMAL
- en: The most effective way to leverage GenAI for these tasks is through CoT prompting
    with GitHub Copilot. This approach involves first implementing the core function
    and then specifying additional requirements for decorators to handle logging,
    metric recording, or argument validation.
  prefs: []
  type: TYPE_NORMAL
- en: To ensure that the decorator implementation follows our desired style, we can
    use few-shot learning with Copilot and ChatGPT or fine-tune a model for OpenAI
    API. This allows us to achieve more desirable results, minimizing the requirements
    for chained edits to the code.
  prefs: []
  type: TYPE_NORMAL
- en: In the final chapter of the book, we will summarize the key takeaways from the
    15 chapters and explore how to enhance our coding efforts with GenAI tools.
  prefs: []
  type: TYPE_NORMAL
- en: Quiz time
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'Before you proceed to the next chapter, make sure that you can confidently
    answer the following questions:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Question 1**: Do LLMs guarantee higher coding standards?'
  prefs: []
  type: TYPE_NORMAL
- en: '**Answer**: No, not necessarily. Simply asking GenAI applications to add monitoring
    responsibilities can lead to undesirable suggestions, such as merging monitoring
    tasks with core functionality instead of properly separating responsibilities.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Question 2**: What is the inverse CoT for Copilot?'
  prefs: []
  type: TYPE_NORMAL
- en: '**Answer**: It involves defining higher-level coding structures, such as decorators,
    first and then moving the cursor up to let Copilot complete the implementation
    details.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Question 3**: How can we guide GenAI applications to follow a style guide
    that aligns with our internal standards?'
  prefs: []
  type: TYPE_NORMAL
- en: '**Answer**: We can use a style guide file for Copilot, provide a few examples
    when prompting ChatGPT, and apply fine-tuning when working with OpenAI API.'
  prefs: []
  type: TYPE_NORMAL
- en: Further reading
  prefs:
