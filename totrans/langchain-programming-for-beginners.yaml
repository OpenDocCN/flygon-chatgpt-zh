  type: TYPE_NORMAL
  zh: 图1. 在GitHub上下载源代码
- en: You need to extract the archive to access the code. Usually, you can just double-click
    the archive to extract the content.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 你需要解压存档以访问代码。通常，你只需双击存档即可提取内容。
- en: The number in the folder name indicates the chapter number in this book.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 文件夹名称中的数字表示本书中的章节编号。
- en: Contact
  id: totrans-110
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 联系方式
- en: If you need help, you can contact me at [nathan@codewithnathan.com](mailto:nathan@codewithnathan.com).
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你需要帮助，你可以通过[nathan@codewithnathan.com](mailto:nathan@codewithnathan.com)联系我。
- en: You can also connect or follow me on LinkedIn at [https://linkedin.com/in/nathansebhastian](https://linkedin.com/in/nathansebhastian)
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 你也可以在LinkedIn上连接或关注我，[https://linkedin.com/in/nathansebhastian](https://linkedin.com/in/nathansebhastian)
- en: 'Chapter 1: Introduction to Generative AI Applications'
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 第1章：生成式AI应用简介
- en: A Generative AI application is a computer application that can generate contextually
    relevant output based on a given input (or prompt).
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 生成式AI应用是一种计算机应用程序，可以根据给定的输入（或提示）生成上下文相关的输出。
- en: 'Generative AI application came to the attention of the general public in 2022,
    when OpenAI released ChatGPT and quickly gained 1 million users in just 5 days:'
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 生成式AI应用在2022年引起了公众的关注，当时OpenAI发布了ChatGPT，并在短短5天内迅速获得了100万用户：
- en: '![1 chatgpt stats](image_rsrc1YA.jpg)'
  id: totrans-116
  prefs: []
  type: TYPE_IMG
  zh: '![1 chatgpt stats](image_rsrc1YA.jpg)'
- en: Figure 2\. ChatGPT Reached 1 Million Users in 5 Days
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 图2. ChatGPT在5天内达到100万用户
- en: Another example of a generative AI application is chatpdf.com, which enables
    users to upload a PDF and perform various tasks, such as extracting insights from
    the PDF.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 生成式AI应用的另一个例子是chatpdf.com，它允许用户上传PDF并执行各种任务，例如从PDF中提取见解。
- en: The answers provided by chatpdf.com contain references to their source in the
    original PDF document, so no more flipping pages to find the source.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: chatpdf.com提供的答案包含对原始PDF文档中来源的引用，因此不再需要翻页查找来源。
- en: Behind the scenes, these generative AI applications use the power of Large Language
    Models to generate the answers.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 在幕后，这些生成式AI应用利用大型语言模型的力量来生成答案。
- en: What is a Large Language Model?
  id: totrans-121
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 什么是大型语言模型？
- en: A Large Language Model (LLM for short) is a machine learning model that can
    understand and generate an output that humans can understand.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 大型语言模型（LLM，简称）是一种机器学习模型，可以理解并生成人类可以理解的结果。
- en: LLMs are usually trained on a vast amount of text data available on the internet
    so that they can perform a wide range of language-related tasks such as translation,
    summarization, question answering, and creative writing.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: LLM通常在互联网上可用的海量文本数据上进行训练，以便它们能够执行广泛的与语言相关的任务，例如翻译、摘要、问答和创意写作。
- en: Examples of LLMs include GPT-4 by OpenAI, Gemini by Google, Llama by Meta, and
    Mistral by Mistral.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: LLM的例子包括OpenAI的GPT-4、Google的Gemini、Meta的Llama和Mistral的Mistral。
- en: Some LLMs are closed-source, like GPT and Gemini, while some are open-source
    such as Llama and Mistral.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 一些LLM是闭源的，如GPT和Gemini，而一些是开源的，如Llama和Mistral。
- en: What is LangChain?
  id: totrans-126
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 什么是LangChain？
- en: LangChain is an open-source framework designed to simplify the process of developing
    a LLM-powered application.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: LangChain是一个开源框架，旨在简化开发LLM驱动应用程序的过程。
- en: LangChain enables you to integrate and call LLM which powers generative AI applications
    by simply calling the class that represents the model.
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: LangChain允许你通过调用表示模型的类来简单地集成和调用LLM，从而为生成式AI应用提供动力。
- en: Under the hood, LangChain will perform the steps required to interact with the
    language model API and manage the processing of input and output so that you can
    access different LLMs with minimal code change.
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 在幕后，LangChain将执行与语言模型API交互所需的步骤，并管理输入和输出的处理，以便你可以通过最小的代码更改访问不同的LLM。
- en: What’s more, you can also use external data sources such as a PDF, a Wikipedia
    article, or a search engine result with LangChain to produce a contextually relevant
    response.
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 更重要的是，您还可以使用 LangChain 与外部数据源（如 PDF、维基百科文章或搜索引擎结果）一起生成上下文相关的响应。
- en: By using LangChain, you can develop specialized generative AI applications that
    are optimized for certain use cases, such as summarizing a YouTube video, extracting
    insights from a PDF, or writing an essay.
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 通过使用 LangChain，您可以开发针对特定用例优化的专用生成式 AI 应用程序，例如总结 YouTube 视频、从 PDF 中提取见解或撰写文章。
- en: The Architecture of a Generative AI Application
  id: totrans-132
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 生成式 AI 应用的架构
- en: 'A traditional application commonly uses the client-server architecture as follows:'
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 传统应用程序通常使用以下客户端-服务器架构：
- en: '![1 client server arch](image_rsrc1YB.jpg)'
  id: totrans-134
  prefs: []
  type: TYPE_IMG
  zh: '![1 client server arch](image_rsrc1YB.jpg)'
- en: Figure 3\. Client-Server Architecture
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3. 客户端-服务器架构
- en: The client and server communicate using HTTP requests. When needed, a server
    might interact with the database to fulfill the request sent by the client.
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 客户端和服务器通过 HTTP 请求进行通信。当需要时，服务器可能会与数据库交互以完成客户端发送的请求。
- en: 'On the other hand, a Generative AI application utilizes the power of LLM to
    understand human language prompts and generate relevant outputs:'
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 另一方面，生成式 AI 应用程序利用 LLM 的力量来理解人类语言提示并生成相关的输出：
- en: '![1 ai client server arch](image_rsrc1YC.jpg)'
  id: totrans-138
  prefs: []
  type: TYPE_IMG
  zh: '![1 ai client server arch](image_rsrc1YC.jpg)'
- en: Figure 4\. AI-Powered Application Architecture
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4. AI 驱动的应用架构
- en: While the architecture is similar to a traditional application, there’s an added
    layer to connect to LLMs.
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然架构与传统应用程序类似，但增加了一层来连接到 LLM。
- en: This added layer is where LangChain comes in, as it performs and manages tasks
    related to LLM, such as processing our input into a prompt that LLMs can understand.
    It also processes the response from LLM into a format that’s accepted in traditional
    applications.
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是 LangChain 发挥作用的层次，因为它执行并管理与 LLM 相关的任务，例如将我们的输入处理成 LLM 可以理解的提示。它还将 LLM 的响应处理成传统应用程序接受的格式。
- en: You’ll understand more as you practice building generative AI applications in
    the following chapters.
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 随着您在下一章中练习构建生成式 AI 应用程序，您将理解得更多。
- en: For now, just think of LangChain as a management layer between your application
    server and the LLM.
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，只需将 LangChain 视为您的应用程序服务器和 LLM 之间的管理层即可。
- en: Development Environment Set Up
  id: totrans-144
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 开发环境设置
- en: 'To start developing AI applications with LangChain, you need to have three
    things on your computer:'
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 要开始使用 LangChain 开发 AI 应用程序，您需要在您的计算机上准备三样东西：
- en: A web browser
  id: totrans-146
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 网络浏览器
- en: A code editor
  id: totrans-147
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 代码编辑器
- en: The Python programming language
  id: totrans-148
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: Python 编程语言
- en: Let’s install them in the next section.
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们在下一节中安装它们。
- en: Installing Chrome Browser
  id: totrans-150
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 安装 Chrome 浏览器
- en: Any web browser can be used to browse the Internet, but for development purposes,
    you need to have a browser with sufficient development tools.
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 任何网络浏览器都可以用来浏览互联网，但出于开发目的，您需要有一个具有足够开发工具的浏览器。
- en: 'The Chrome browser developed by Google is a great browser for web development,
    and if you don’t have the browser installed, you can download it here:'
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 由谷歌开发的 Chrome 浏览器是一款非常适合网页开发的浏览器，如果您还没有安装此浏览器，可以在此处下载：
- en: '[https://google.com/chrome](https://google.com/chrome)'
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: '[https://google.com/chrome](https://google.com/chrome)'
- en: The browser is available for all major operating systems. Once the download
    is complete, follow the installation steps presented by the installer to have
    the browser on your computer.
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 浏览器适用于所有主流操作系统。下载完成后，按照安装程序提供的步骤进行安装，即可在您的计算机上使用浏览器。
- en: Next, we need to install a code editor. There are several free code editors
    available on the Internet, such as Sublime Text, Visual Studio Code, and Notepad++.
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们需要安装一个代码编辑器。互联网上有许多免费的代码编辑器可供选择，例如 Sublime Text、Visual Studio Code 和 Notepad++。
- en: Out of these editors, my favorite is Visual Studio Code because it’s fast and
    easy to use.
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 在这些编辑器中，我最喜欢的是 Visual Studio Code，因为它速度快且易于使用。
- en: Installing Visual Studio Code
  id: totrans-157
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 安装 Visual Studio Code
- en: Visual Studio Code or VSCode for short is a code editor application created
    for the purpose of writing code. Aside from being free, VSCode is fast and available
    on all major operating systems.
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: Visual Studio Code 或简称 VSCode 是一款专为编写代码而创建的代码编辑器应用程序。除了免费之外，VSCode 还速度快，可在所有主流操作系统上使用。
- en: 'You can download Visual Studio Code here:'
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以在此处下载 Visual Studio Code：
- en: '[https://code.visualstudio.com](https://code.visualstudio.com)'
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: '[https://code.visualstudio.com](https://code.visualstudio.com)'
- en: 'When you open the link above, there should be a button showing the version
    compatible with your operating system as shown below:'
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 当你打开上面的链接时，应该会显示一个按钮，显示与你的操作系统兼容的版本，如下所示：
- en: '![1 download vscode](image_rsrc1YD.jpg)'
  id: totrans-162
  prefs: []
  type: TYPE_IMG
  zh: '![1 下载 vscode](image_rsrc1YD.jpg)'
- en: Figure 5\. Downloading VSCode
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 图5. 下载 VSCode
- en: Click the button to download VSCode, and install it on your computer.
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 点击按钮下载 VSCode，并在你的电脑上安装它。
- en: Now that you have a code editor installed, the next step is to install Node.js
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 现在你已经安装了代码编辑器，下一步是安装 Node.js
- en: Installing Python
  id: totrans-166
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 安装 Python
- en: The following section will show you how to install Python on macOS, Windows,
    and Linux. Feel free to skip to the operating system you used.
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 以下部分将向您展示如何在 macOS、Windows 和 Linux 上安装 Python。请随意跳转到您使用的操作系统。
- en: Installing Python on macOS
  id: totrans-168
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 在 macOS 上安装 Python
- en: If you’re using the latest version of macOS, then Python should be included
    on your system already.
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你使用的是最新版本的 macOS，那么 Python 应该已经包含在你的系统中了。
- en: 'To check if you have Python installed, open the Terminal application and run
    the following command:'
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 要检查你是否已安装 Python，打开终端应用程序并运行以下命令：
- en: python3 --version
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: python3 --version
- en: 'You should see the output as follows:'
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 你应该看到以下输出：
- en: '![1 mac python version](image_rsrc1YE.jpg)'
  id: totrans-173
  prefs: []
  type: TYPE_IMG
  zh: '![1 mac python version](image_rsrc1YE.jpg)'
- en: Figure 6\. Checking Python Version on Mac
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 图6. 在 Mac 上检查 Python 版本
- en: 'If you see the command not found: python3 message, this means you need to install
    Python by yourself.'
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你看到“命令未找到：python3”的消息，这意味着你需要自己安装 Python。
- en: Open your browser and head to [https://www.python.org/downloads](https://www.python.org/downloads)
    to download the Python Interpreter for Mac.
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 打开你的浏览器并转到 [https://www.python.org/downloads](https://www.python.org/downloads)
    下载适用于 Mac 的 Python 解释器。
- en: The website should show a link to download the .dmg or .pkg installer for your
    Mac.
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 网站应该会显示一个下载适用于你的 Mac 的 .dmg 或 .pkg 安装程序的链接。
- en: Once downloaded, just follow the installation steps shown on the screen.
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: 下载后，只需按照屏幕上显示的安装步骤进行操作。
- en: After you finish installing, run the python3 --version command again. This time,
    you should be able to see the Python version in the output.
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 安装完成后，再次运行 python3 --version 命令。这次，你应该能在输出中看到 Python 版本。
- en: Installing Python on Windows
  id: totrans-180
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 在 Windows 上安装 Python
- en: To install Python on Windows, you need to download the Python installer at [https://www.python.org/downloads](https://www.python.org/downloads).
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: 要在 Windows 上安装 Python，你需要下载 [https://www.python.org/downloads](https://www.python.org/downloads)
    上的 Python 安装程序。
- en: 'The website should detect the Operating System you used and offer a compatible
    Python installer as shown below:'
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 网站应该检测到你使用的操作系统，并提供兼容的 Python 安装程序，如下所示：
- en: '![1 python windows](image_rsrc1YF.jpg)'
  id: totrans-183
  prefs: []
  type: TYPE_IMG
  zh: '![1 python windows](image_rsrc1YF.jpg)'
- en: Figure 7\. Installing Python on Windows
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 图7. 在 Windows 上安装 Python
- en: Download and run the .exe installer to get the latest stable version of Python
    on Windows.
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: 下载并运行 .exe 安装程序，以获取 Windows 上的最新稳定版 Python。
- en: 'In the setup wizard, you need to select the option Add Python.exe to PATH as
    follows:'
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: 在设置向导中，你需要选择以下选项“将 Python.exe 添加到 PATH”：
- en: '![1 win add python topath](image_rsrc1YG.jpg)'
  id: totrans-187
  prefs: []
  type: TYPE_IMG
  zh: '![1 win add python topath](image_rsrc1YG.jpg)'
- en: Figure 8\. Adding Python to Path on Windows
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: 图8. 在 Windows 上将 Python 添加到 PATH
- en: This is required so that you can access Python from the Command Prompt later.
    Next, Select the Install Now option to install with the default settings.
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: 这是为了让你以后可以从命令提示符访问 Python。接下来，选择“立即安装”选项以使用默认设置进行安装。
- en: 'Once done, open the Command Prompt and run the following command:'
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: 完成后，打开命令提示符并运行以下命令：
- en: python --version
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: python --version
- en: 'You should see a Python version number in the output like this:'
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: 你应该在输出中看到 Python 版本号，如下所示：
- en: '![1 win python version](image_rsrc1YH.jpg)'
  id: totrans-193
  prefs: []
  type: TYPE_IMG
  zh: '![1 win python version](image_rsrc1YH.jpg)'
- en: Figure 9\. Windows Python Version
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: 图9. Windows Python 版本
- en: If that doesn’t work, try running py --version as the Windows system commonly
    gives the py alias for the Python program.
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: 如果不起作用，尝试运行 py --version，因为 Windows 系统通常将 py 别名为 Python 程序。
- en: Now you’re ready to run Python code in your Windows system.
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，你可以在 Windows 系统中运行 Python 代码了。
- en: Installing Python on Linux
  id: totrans-197
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 在 Linux 上安装 Python
- en: Linux systems are designed for software developers, so many Linux distributions
    already include Python by default.
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: Linux 系统是为软件开发者设计的，因此许多 Linux 发行版默认已经包含了 Python。
- en: If you’re using the latest version of Ubuntu, try to run Python from the Terminal.
    Type python3 --version and run the command.
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你使用的是最新版本的 Ubuntu，尝试从终端运行 Python。输入 python3 --version 并运行命令。
- en: 'You should see the following response:'
  id: totrans-200
  prefs: []
  type: TYPE_NORMAL
  zh: 你应该看到以下响应：
- en: '![1 ubuntu python version](image_rsrc1YJ.jpg)'
  id: totrans-201
  prefs: []
  type: TYPE_IMG
  zh: '![1 ubuntu python version](image_rsrc1YJ.jpg)'
- en: Figure 10\. Ubuntu Python Version
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
  zh: 图10. Ubuntu Python 版本
- en: This means that the Python interpreter is already installed on your system.
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: 这意味着Python解释器已经安装在你的系统上了。
- en: 'If you see Linux responds with Command ''python3'' not found, then you can
    install it using apt-get as follows:'
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你看到Linux响应“命令 'python3' 未找到”，那么你可以使用以下方式使用apt-get安装它：
- en: sudo apt-get install python3
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
  zh: sudo apt-get install python3
- en: With that, you’re now able to run Python code on a Linux system.
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，你可以在Linux系统上运行Python代码了。
- en: Why the Different python and python3 Commands?
  id: totrans-207
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 为什么会有不同的python和python3命令？
- en: In macOS and Linux, a Python Interpreter is usually included in the OS because
    many applications in these two systems depend on Python.
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
  zh: 在macOS和Linux系统中，Python解释器通常包含在操作系统内，因为这两个系统中的许多应用程序都依赖于Python。
- en: The Python version bundled with the OS is usually Python 2, and you can verify
    this by running python --version command in Mac and Linux.
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
  zh: 操作系统捆绑的Python版本通常是Python 2，你可以通过在Mac和Linux上运行python --version命令来验证这一点。
- en: To let you install Python 3 without colliding with the bundled version, the
    Python installer for Mac and Linux uses the name python3 as an alias.
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: 为了让你能够安装Python 3而不与捆绑版本冲突，Mac和Linux的Python安装程序使用python3作为别名。
- en: 'This is why there are two commands that can be used to run Python: python and
    python3.'
  id: totrans-211
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是为什么可以使用两个命令来运行Python：python和python3。
- en: Because Windows didn’t include a Python Interpreter, it usually has only the
    python command, while macOS and Linux can have python and python3 available.
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
  zh: 因为Windows没有包含Python解释器，它通常只有python命令，而macOS和Linux可以提供python和python3。
- en: So depending on the OS you have, you need to use either python or python3 command
    to run the Python 3 Interpreter.
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，根据你拥有的操作系统，你需要使用python或python3命令来运行Python 3解释器。
- en: Summary
  id: totrans-214
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: In this chapter, you’ve learned the architecture of a generative AI application,
    and how LangChain takes the role of an integration layer between the server and
    the LLM API endpoint.
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，你学习了生成式AI应用程序的架构，以及LangChain如何在服务器和LLM API端点之间扮演集成层的角色。
- en: You’ve also installed the tools required to write and run a LangChain application
    on your computer.
  id: totrans-216
  prefs: []
  type: TYPE_NORMAL
  zh: 你也已经安装了在计算机上编写和运行LangChain应用程序所需的工具。
- en: If you encounter any issues, you can email me at [nathan@codewithnathan.com](mailto:nathan@codewithnathan.com)
    and I will do my best to help you.
  id: totrans-217
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你遇到任何问题，你可以通过电子邮件[nathan@codewithnathan.com](mailto:nathan@codewithnathan.com)联系我，我会尽我所能帮助你。
- en: 'Chapter 2: Your First LangChain Application'
  id: totrans-218
  prefs: []
  type: TYPE_NORMAL
  zh: 第二章：你的第一个LangChain应用程序
- en: It’s time to create our first LangChain application.
  id: totrans-219
  prefs: []
  type: TYPE_NORMAL
  zh: 是时候创建我们的第一个LangChain应用程序了。
- en: We will create a simple question and answer application where we can ask any
    kind of question to a Large Language Model
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将创建一个简单的问答应用程序，我们可以向大型语言模型提出任何类型的问题。
- en: First, you need to install the LangChain module using pip.
  id: totrans-221
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，你需要使用pip安装LangChain模块。
- en: pip is a Python program used to install and manage Python packages. It’s already
    included when you install Python on your computer.
  id: totrans-222
  prefs: []
  type: TYPE_NORMAL
  zh: pip是一个用于安装和管理Python包的Python程序。当你安装Python到你的计算机上时，它已经包含在内了。
- en: 'Open the command line, then run the command below to check pip version:'
  id: totrans-223
  prefs: []
  type: TYPE_NORMAL
  zh: 打开命令行，然后运行以下命令来检查pip版本：
- en: pip --version
  id: totrans-224
  prefs: []
  type: TYPE_NORMAL
  zh: pip --version
- en: Python packages are Python libraries and frameworks that you can use for free
    in your project. We’re going to use pip to install the LangChain package.
  id: totrans-225
  prefs: []
  type: TYPE_NORMAL
  zh: Python包是你可以免费在你的项目中使用的Python库和框架。我们将使用pip来安装LangChain包。
- en: If you don’t have pip, you need to install Python using the instructions in
    the previous chapter.
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你没有pip，你需要按照上一章中的说明安装Python。
- en: 'On your command line, run the command below:'
  id: totrans-227
  prefs: []
  type: TYPE_NORMAL
  zh: 在你的命令行中，运行以下命令：
- en: pip install langchain==0.2.1 python-decouple==3.8 langchain-google-genai==1.0.5
  id: totrans-228
  prefs: []
  type: TYPE_NORMAL
  zh: pip install langchain==0.2.1 python-decouple==3.8 langchain-google-genai==1.0.5
- en: The pip install command is used to install the package you specify next to it.
  id: totrans-229
  prefs: []
  type: TYPE_NORMAL
  zh: pip install命令用于安装你指定旁边的包。
- en: To avoid breaking changes, you can specify the exact version of the package
    to install with ==version as shown above.
  id: totrans-230
  prefs: []
  type: TYPE_NORMAL
  zh: 为了避免破坏性更改，你可以指定要安装的包的确切版本，如上所示使用==version。
- en: The langchain package contains everything you need to start using LangChain.
    The python-decouple package is used for loading and using environment variables
    in your project.
  id: totrans-231
  prefs: []
  type: TYPE_NORMAL
  zh: langchain包包含了你需要开始使用LangChain的一切。python-decouple包用于在你的项目中加载和使用环境变量。
- en: The langchain-google-genai package contains the integration between LangChain
    and Google Generative AI models.
  id: totrans-232
  prefs: []
  type: TYPE_NORMAL
  zh: langchain-google-genai包包含了LangChain和Google生成AI模型之间的集成。
- en: Once the installation is finished, create a folder on your computer that will
    be used to store all files related to this project. You can name the folder 'beginning_langchain'.
  id: totrans-233
  prefs: []
  type: TYPE_NORMAL
  zh: 安装完成后，在您的计算机上创建一个文件夹，用于存储与此项目相关的所有文件。您可以将文件夹命名为 'beginning_langchain'。
- en: Next, open the Visual Studio Code, and select File > Open Folder…​ from the
    menu bar. Select the folder you’ve just created earlier.
  id: totrans-234
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，打开 Visual Studio Code，从菜单栏中选择文件 > 打开文件夹…。选择您之前创建的文件夹。
- en: VSCode will load the folder and display the content in the Explorer sidebar,
    it should be empty as we haven’t created any files yet.
  id: totrans-235
  prefs: []
  type: TYPE_NORMAL
  zh: VSCode 将加载文件夹并在资源管理器侧边栏中显示内容，它应该是空的，因为我们还没有创建任何文件。
- en: To create a file, right-click anywhere inside the VSCode window and select New
    Text File or New File…​ from the menu.
  id: totrans-236
  prefs: []
  type: TYPE_NORMAL
  zh: 要创建文件，在 VSCode 窗口内的任何位置右键单击，然后从菜单中选择“新建文本文件”或“新建文件…”。
- en: Once the file is created, press Control + S or Command + S to save the file.
    Name that file as app.py.
  id: totrans-237
  prefs: []
  type: TYPE_NORMAL
  zh: 文件创建完成后，按 Control + S 或 Command + S 保存文件。将文件命名为 app.py。
- en: The next step is to write the code for the question and answer application.
  id: totrans-238
  prefs: []
  type: TYPE_NORMAL
  zh: 下一步是编写问答应用的代码。
- en: 'First, import the packages required by the application as follows:'
  id: totrans-239
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，按照以下方式导入应用程序所需的包：
- en: from langchain_google_genai import ChatGoogleGenerativeAI
  id: totrans-240
  prefs: []
  type: TYPE_NORMAL
  zh: from langchain_google_genai import ChatGoogleGenerativeAI
- en: from decouple import config
  id: totrans-241
  prefs: []
  type: TYPE_NORMAL
  zh: from decouple import config
- en: To interact with LLMs in LangChain, you need to create an object that represents
    the API for that LLM.
  id: totrans-242
  prefs: []
  type: TYPE_NORMAL
  zh: 要与 LangChain 中的 LLM 交互，您需要创建一个表示该 LLM API 的对象。
- en: 'Because we want to interact with Google’s LLM, we need to create an object
    from the ChatGoogleGenerativeAI class as follows:'
  id: totrans-243
  prefs: []
  type: TYPE_NORMAL
  zh: 因为我们想与 Google 的 LLM 交互，所以我们需要从 ChatGoogleGenerativeAI 类创建一个对象，如下所示：
- en: GOOGLE_GEMINI_KEY = config("GOOGLE_GEMINI_KEY")
  id: totrans-244
  prefs: []
  type: TYPE_NORMAL
  zh: GOOGLE_GEMINI_KEY = config("GOOGLE_GEMINI_KEY")
- en: llm = ChatGoogleGenerativeAI(model="gemini-pro", google_api_key=GOOGLE_GEMINI_KEY)
  id: totrans-245
  prefs: []
  type: TYPE_NORMAL
  zh: llm = ChatGoogleGenerativeAI(model="gemini-pro", google_api_key=GOOGLE_GEMINI_KEY)
- en: The GOOGLE_GEMINI_KEY contains the API key which you’re going to get in the
    next section.
  id: totrans-246
  prefs: []
  type: TYPE_NORMAL
  zh: GOOGLE_GEMINI_KEY 包含您将在下一节中获取的 API 密钥。
- en: For now, you just need to understand that the ChatGoogleGenerativeAI object
    represents the Google LLM.
  id: totrans-247
  prefs: []
  type: TYPE_NORMAL
  zh: 目前，您只需了解 ChatGoogleGenerativeAI 对象代表 Google LLM。
- en: When instantiating the llm object, you can choose the model you want to interact
    with, then pass the API key under the google_api_key parameter.
  id: totrans-248
  prefs: []
  type: TYPE_NORMAL
  zh: 当实例化 llm 对象时，您可以选择要交互的模型，然后通过 google_api_key 参数传递 API 密钥。
- en: 'Next, write the code for a simple question and answer application as follows:'
  id: totrans-249
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，编写以下简单问答应用的代码：
- en: print("Q & A With AI")
  id: totrans-250
  prefs: []
  type: TYPE_NORMAL
  zh: print("Q & A With AI")
- en: print("=============")
  id: totrans-251
  prefs: []
  type: TYPE_NORMAL
  zh: print("=============")
- en: question = "What's the currency of Thailand?"
  id: totrans-252
  prefs: []
  type: TYPE_NORMAL
  zh: question = "What's the currency of Thailand?"
- en: 'print("Question: " + question)'
  id: totrans-253
  prefs: []
  type: TYPE_NORMAL
  zh: 'print("Question: " + question)'
- en: response = llm.invoke(question)
  id: totrans-254
  prefs: []
  type: TYPE_NORMAL
  zh: response = llm.invoke(question)
- en: 'print("Answer: " + response.content)'
  id: totrans-255
  prefs: []
  type: TYPE_NORMAL
  zh: 'print("Answer: " + response.content)'
- en: Here, we simply print some text showing the question we want to ask the model.
  id: totrans-256
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，我们简单地打印一些文本，显示我们想要向模型提出的问题。
- en: The llm.invoke() method will send the input question to the LLM and return an
    answer.
  id: totrans-257
  prefs: []
  type: TYPE_NORMAL
  zh: llm.invoke() 方法会将输入问题发送给 LLM 并返回答案。
- en: The answer is stored under the content attribute, so we print response.content
    in the code above.
  id: totrans-258
  prefs: []
  type: TYPE_NORMAL
  zh: 答案存储在 content 属性下，因此我们在上面的代码中打印 response.content。
- en: While the application is ready, we still need to get the Google Gemini API key
    used in this application.
  id: totrans-259
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然应用程序已经准备就绪，但我们仍然需要获取在此应用程序中使用的 Google Gemini API 密钥。
- en: Getting Google Gemini API Key
  id: totrans-260
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 获取 Google Gemini API 密钥
- en: To get the API key, you need to visit the Gemini API page at [https://ai.google.dev/gemini-api](https://ai.google.dev/gemini-api)
  id: totrans-261
  prefs: []
  type: TYPE_NORMAL
  zh: 要获取 API 密钥，您需要访问 Gemini API 页面 [https://ai.google.dev/gemini-api](https://ai.google.dev/gemini-api)。
- en: 'On the page, you need to click the ''Get API Key in Google AI Studio'' button
    as shown below:'
  id: totrans-262
  prefs: []
  type: TYPE_NORMAL
  zh: 在页面上，您需要点击如下所示的“在 Google AI Studio 获取 API 密钥”按钮：
- en: '![2 get gemini api key](image_rsrc1YK.jpg)'
  id: totrans-263
  prefs: []
  type: TYPE_IMG
  zh: '![2 get gemini api key](image_rsrc1YK.jpg)'
- en: Figure 11\. Get Gemini API Key
  id: totrans-264
  prefs: []
  type: TYPE_NORMAL
  zh: 图 11. 获取 Gemini API 密钥
- en: From there, you’ll be taken to Google AI Studio.
  id: totrans-265
  prefs: []
  type: TYPE_NORMAL
  zh: 从那里，您将被带到 Google AI Studio。
- en: 'Note that, you might be shown the page below when clicking the button:'
  id: totrans-266
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，当您点击按钮时，您可能会看到以下页面：
- en: '![2 google available regions](image_rsrc1YM.jpg)'
  id: totrans-267
  prefs: []
  type: TYPE_IMG
  zh: '![2 google available regions](image_rsrc1YM.jpg)'
- en: Figure 12\. Google AI Studio Available Regions Page
  id: totrans-268
  prefs: []
  type: TYPE_NORMAL
  zh: 图 12. Google AI Studio 可用地区页面
- en: This page usually appears when you are located in a region that’s not served
    by Google AI Studio.
  id: totrans-269
  prefs: []
  type: TYPE_NORMAL
  zh: 当你位于一个由 Google AI Studio 不提供服务的地区时，这个页面通常会显示。
- en: One way to handle this is to use a VPN service, but I would recommend you use
    another LLM instead, such as OpenAI or Ollama which I will show in the next chapters.
  id: totrans-270
  prefs: []
  type: TYPE_NORMAL
  zh: 一种处理方法是通过使用 VPN 服务，但我建议您使用另一个 LLM，例如 OpenAI 或 Ollama，这些内容将在下一章中展示。
- en: 'If this is your first time accessing the studio, it will show you the terms
    of service like this:'
  id: totrans-271
  prefs: []
  type: TYPE_NORMAL
  zh: 如果这是您第一次访问工作室，它会向您展示如下服务条款：
- en: '![2 gemini consent](image_rsrc1YN.jpg)'
  id: totrans-272
  prefs: []
  type: TYPE_IMG
  zh: '![2 个 Gemini 同意](image_rsrc1YN.jpg)'
- en: Figure 13\. Google AI Studio Terms of Service
  id: totrans-273
  prefs: []
  type: TYPE_NORMAL
  zh: 图 13\. Google AI Studio 服务条款
- en: Just check on the 'I consent' option, then click 'Continue'.
  id: totrans-274
  prefs: []
  type: TYPE_NORMAL
  zh: 只需勾选“我同意”选项，然后点击“继续”。
- en: 'Now click the ''Create API Key'' button to create the key:'
  id: totrans-275
  prefs: []
  type: TYPE_NORMAL
  zh: 现在点击“创建 API 密钥”按钮以创建密钥：
- en: '![2 gemini create key](image_rsrc1YP.jpg)'
  id: totrans-276
  prefs: []
  type: TYPE_IMG
  zh: '![2 个 Gemini 创建密钥](image_rsrc1YP.jpg)'
- en: Figure 14\. Gemini Create API Key
  id: totrans-277
  prefs: []
  type: TYPE_NORMAL
  zh: 图 14\. Gemini 创建 API 密钥
- en: 'If you’re asked where to create the API Key, select create in new project:'
  id: totrans-278
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您被问及在哪里创建 API 密钥，请选择在新项目中创建：
- en: '![2 gemini api key new project](image_rsrc1YR.jpg)'
  id: totrans-279
  prefs: []
  type: TYPE_IMG
  zh: '![2 个 Gemini API 密钥新项目](image_rsrc1YR.jpg)'
- en: Figure 15\. Create API Key in New Project
  id: totrans-280
  prefs: []
  type: TYPE_NORMAL
  zh: 图 15\. 在新项目中创建 API 密钥
- en: Google will create a Cloud project and generate the key for you.
  id: totrans-281
  prefs: []
  type: TYPE_NORMAL
  zh: Google 将为您创建一个云项目并生成密钥。
- en: 'After a while, you should see the key shown in a pop-up box as follows:'
  id: totrans-282
  prefs: []
  type: TYPE_NORMAL
  zh: 一段时间后，您应该会看到一个弹出框中显示的密钥，如下所示：
- en: '![2 gemini key shown](image_rsrc1YS.jpg)'
  id: totrans-283
  prefs: []
  type: TYPE_IMG
  zh: '![2 个 Gemini 密钥显示](image_rsrc1YS.jpg)'
- en: Figure 16\. Gemini API Key Generated
  id: totrans-284
  prefs: []
  type: TYPE_NORMAL
  zh: 图 16\. 生成的 Gemini API 密钥
- en: 'Copy the API key string, then create a .env file in your application folder
    with the following content:'
  id: totrans-285
  prefs: []
  type: TYPE_NORMAL
  zh: 复制 API 密钥字符串，然后在您的应用程序文件夹中创建一个 .env 文件，内容如下：
- en: GOOGLE_GEMINI_KEY='Your Key Here'
  id: totrans-286
  prefs: []
  type: TYPE_NORMAL
  zh: GOOGLE_GEMINI_KEY='您的密钥'
- en: Replace the Your Key Here string above with your actual API key.
  id: totrans-287
  prefs: []
  type: TYPE_NORMAL
  zh: 将上面的“您的密钥”字符串替换为您的实际 API 密钥。
- en: Running the Application
  id: totrans-288
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 运行应用程序
- en: With the API key set, you are ready to run the LangChain application.
  id: totrans-289
  prefs: []
  type: TYPE_NORMAL
  zh: 设置了 API 密钥后，您就可以运行 LangChain 应用程序了。
- en: 'On the terminal, run .py file using Python as follows:'
  id: totrans-290
  prefs: []
  type: TYPE_NORMAL
  zh: 在终端上，使用以下方式运行 .py 文件，使用 Python：
- en: python app.py
  id: totrans-291
  prefs: []
  type: TYPE_NORMAL
  zh: python app.py
- en: 'You should see the following output in your terminal:'
  id: totrans-292
  prefs: []
  type: TYPE_NORMAL
  zh: 您应该在终端中看到以下输出：
- en: Q & A With AI
  id: totrans-293
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能问答
- en: =============
  id: totrans-294
  prefs: []
  type: TYPE_NORMAL
  zh: =============
- en: 'Question: What''s the currency of Thailand?'
  id: totrans-295
  prefs: []
  type: TYPE_NORMAL
  zh: 问题：泰国的货币是什么？
- en: 'Answer: Thai baht'
  id: totrans-296
  prefs: []
  type: TYPE_NORMAL
  zh: 答案：泰铢
- en: This means you have successfully created your first LangChain application and
    interacted with Google’s Gemini LLM using the API key.
  id: totrans-297
  prefs: []
  type: TYPE_NORMAL
  zh: 这意味着您已成功创建了您的第一个 LangChain 应用程序，并使用 API 密钥与 Google 的 Gemini LLM 进行了交互。
- en: Each LLM model has its own characteristics. The 'gemini-pro' model usually answers
    a question directly with no extra information.
  id: totrans-298
  prefs: []
  type: TYPE_NORMAL
  zh: 每个LLM模型都有其自身的特点。'gemini-pro'模型通常直接回答问题，不提供额外信息。
- en: 'You can try changing the model to ''gemini-1.5-flash-latest'' as shown below:'
  id: totrans-299
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以尝试将模型更改为如下所示的 'gemini-1.5-flash-latest'：
- en: llm = ChatGoogleGenerativeAI(model="gemini-1.5-flash-latest", google_api_key=GOOGLE_GEMINI_KEY)
  id: totrans-300
  prefs: []
  type: TYPE_NORMAL
  zh: llm = ChatGoogleGenerativeAI(model="gemini-1.5-flash-latest", google_api_key=GOOGLE_GEMINI_KEY)
- en: 'Now run the .py file again using Python, and the answer is a bit different
    this time:'
  id: totrans-301
  prefs: []
  type: TYPE_NORMAL
  zh: 现在再次使用 Python 运行 .py 文件，这次答案略有不同：
- en: Q & A With AI
  id: totrans-302
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能问答
- en: =============
  id: totrans-303
  prefs: []
  type: TYPE_NORMAL
  zh: =============
- en: 'Question: What''s the currency of Thailand?'
  id: totrans-304
  prefs: []
  type: TYPE_NORMAL
  zh: 问题：泰国的货币是什么？
- en: 'Answer: The currency of Thailand is the **Thai baht**, which is abbreviated
    as **THB** or **฿**.'
  id: totrans-305
  prefs: []
  type: TYPE_NORMAL
  zh: 答案：泰国的货币是**泰铢**，缩写为**THB**或**฿**。
- en: Here, the 'gemini-1.5-flash' repeats the question first, then gives more information
    such as the currency abbreviation and symbol.
  id: totrans-306
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，'gemini-1.5-flash' 首先重复了问题，然后提供了更多信息，例如货币缩写和符号。
- en: The asterisk ** symbols around THB and ฿ are meant to make the text appear in
    bold, but it’s rendered as-is in the terminal.
  id: totrans-307
  prefs: []
  type: TYPE_NORMAL
  zh: THB 和 ฿ 周围的星号 **符号是为了使文本显示为粗体，但在终端中它以原样显示**。
- en: Now try replacing the question variable with any question you want to ask the
    LLM.
  id: totrans-308
  prefs: []
  type: TYPE_NORMAL
  zh: 现在尝试将问题变量替换为您想要询问 LLM 的任何问题。
- en: Resource Exhausted Error
  id: totrans-309
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 资源耗尽错误
- en: 'When using Google Gemini, you might see an error like this when running the
    application:'
  id: totrans-310
  prefs: []
  type: TYPE_NORMAL
  zh: 当使用 Google Gemini 时，运行应用程序时可能会看到如下错误：
- en: 'ResourceExhausted: 429 Resource has been exhausted (e.g. check quota)..'
  id: totrans-311
  prefs: []
  type: TYPE_NORMAL
  zh: 资源耗尽错误：429 资源耗尽（例如检查配额）...
- en: This error occurs because the free tier resource has been exhausted. You need
    to try again at a later time.
  id: totrans-312
  prefs: []
  type: TYPE_NORMAL
  zh: 这个错误发生是因为免费层资源已耗尽。您需要稍后再试。
- en: Summary
  id: totrans-313
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: The code for this chapter is available in the 02_Simple_Q&A_Gemini folder.
  id: totrans-314
  prefs: []
  type: TYPE_NORMAL
  zh: 本章的代码可在 02_Simple_Q&A_Gemini 文件夹中找到。
- en: In this chapter, you’ve created and run your first LangChain application. Congratulations!
  id: totrans-315
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，您已创建并运行了您的第一个 LangChain 应用程序。恭喜！
- en: The application can connect to Google’s Gemini LLM to ask questions and get
    answers.
  id: totrans-316
  prefs: []
  type: TYPE_NORMAL
  zh: 该应用程序可以连接到 Google 的 Gemini LLM 来提问并获得答案。
- en: In the next chapter, we’re going to learn how to use OpenAI’s GPT model in LangChain.
  id: totrans-317
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一章中，我们将学习如何在 LangChain 中使用 OpenAI 的 GPT 模型。
- en: 'Chapter 3: Using OpenAI LLM in LangChain'
  id: totrans-318
  prefs: []
  type: TYPE_NORMAL
  zh: 第 3 章：在 LangChain 中使用 OpenAI LLM
- en: In the previous chapter, you’ve seen how to communicate with Google’s Gemini
    model using LangChain.
  id: totrans-319
  prefs: []
  type: TYPE_NORMAL
  zh: 在上一章中，您已经看到了如何使用 LangChain 与 Google 的 Gemini 模型进行通信。
- en: In this chapter, I will show you how to use OpenAI in LangChain as an alternative.
  id: totrans-320
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我将向您展示如何将 OpenAI 作为替代方案在 LangChain 中使用。
- en: But keep in mind that the OpenAI API has no free tier. It used to give away
    $5 worth of API usage, but it seems to have been quietly stopped.
  id: totrans-321
  prefs: []
  type: TYPE_NORMAL
  zh: 但请记住，OpenAI API 没有免费层。它曾经提供价值 5 美元的 API 使用额度，但似乎已经悄悄停止。
- en: So if you want to use OpenAI API, you need to buy the minimum amount of credit,
    which is $5 USD.
  id: totrans-322
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，如果您想使用 OpenAI API，您需要购买最低信用额度，即 5 美元。
- en: Getting Started With OpenAI API
  id: totrans-323
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 开始使用 OpenAI API
- en: OpenAI is an AI research company that aims to develop and promote capable AI
    software for the benefit of humanity. The famous ChatGPT is one of the products
    developed by OpenAI.
  id: totrans-324
  prefs: []
  type: TYPE_NORMAL
  zh: OpenAI 是一家致力于开发和推广有益于人类的人工智能软件的研究公司。著名的 ChatGPT 就是 OpenAI 开发的产品之一。
- en: Besides the ChatGPT application, OpenAI also offers GPT models, the LLM that
    powers ChatGPT, in the form of HTTP API endpoints.
  id: totrans-325
  prefs: []
  type: TYPE_NORMAL
  zh: 除了 ChatGPT 应用程序外，OpenAI 还提供 GPT 模型，这是 ChatGPT 的底层大型语言模型，以 HTTP API 端点形式提供。
- en: To use OpenAI’s API, you need to register an account on their website at [https://platform.openai.com](https://platform.openai.com).
  id: totrans-326
  prefs: []
  type: TYPE_NORMAL
  zh: 要使用 OpenAI 的 API，您需要在他们的网站上注册账户 [https://platform.openai.com](https://platform.openai.com)。
- en: After you sign up, you can go to [https://platform.openai.com/api-keys](https://platform.openai.com/api-keys)
    to create a new secret key.
  id: totrans-327
  prefs: []
  type: TYPE_NORMAL
  zh: 在您注册后，您可以访问 [https://platform.openai.com/api-keys](https://platform.openai.com/api-keys)
    创建一个新的密钥。
- en: 'When you try to create a key for the first time, you’ll be asked to verify
    by adding a phone number:'
  id: totrans-328
  prefs: []
  type: TYPE_NORMAL
  zh: 当您第一次尝试创建密钥时，您将被要求通过添加电话号码进行验证：
- en: '![3 openai phone verification](image_rsrc1YT.jpg)'
  id: totrans-329
  prefs: []
  type: TYPE_IMG
  zh: '![3 openai phone verification](image_rsrc1YT.jpg)'
- en: Figure 17\. OpenAI Phone Verification
  id: totrans-330
  prefs: []
  type: TYPE_NORMAL
  zh: 图 17\. OpenAI 电话验证
- en: OpenAI only uses your phone number for verification purpose. You will receive
    the verification code through SMS.
  id: totrans-331
  prefs: []
  type: TYPE_NORMAL
  zh: OpenAI 仅用于验证目的使用您的电话号码。您将通过短信收到验证码。
- en: Once you’re verified, you’re going to be asked to add credit balance for API
    usage. If not, go to [https://platform.openai.com/account/billing](https://platform.openai.com/account/billing)
    to add some credits.
  id: totrans-332
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦您完成验证，您将被要求添加 API 使用信用额。如果没有，请访问 [https://platform.openai.com/account/billing](https://platform.openai.com/account/billing)
    添加一些信用额。
- en: '![3 openai add credit](image_rsrc1YU.jpg)'
  id: totrans-333
  prefs: []
  type: TYPE_IMG
  zh: '![3 openai add credit](image_rsrc1YU.jpg)'
- en: Figure 18\. OpenAI Adding Credits
  id: totrans-334
  prefs: []
  type: TYPE_NORMAL
  zh: 图 18\. OpenAI 添加信用额
- en: OpenAI receives payment using credit cards, so you need to have one. The lowest
    amount you can buy is $5 USD, and it will be more than enough to run all the examples
    in this book using OpenAI.
  id: totrans-335
  prefs: []
  type: TYPE_NORMAL
  zh: OpenAI 通过信用卡收取费用，因此您需要拥有一张。您最低可以购买 5 美元，这足以运行本书中所有使用 OpenAI 的示例。
- en: Alternatively, if you somehow get the $5 free trial credits, then you don’t
    need to set up your billing information.
  id: totrans-336
  prefs: []
  type: TYPE_NORMAL
  zh: 或者，如果您以某种方式获得了 5 美元的免费试用信用额，那么您不需要设置您的账单信息。
- en: 'Next, input the name and select the project the key will belong to:'
  id: totrans-337
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，输入名称并选择密钥将属于的项目：
- en: '![3 openai create key](image_rsrc1YV.jpg)'
  id: totrans-338
  prefs: []
  type: TYPE_IMG
  zh: '![3 openai create key](image_rsrc1YV.jpg)'
- en: Figure 19\. OpenAI Create API Key
  id: totrans-339
  prefs: []
  type: TYPE_NORMAL
  zh: 图 19\. OpenAI 创建 API 密钥
- en: 'Click the ''Create secret key'' button, and OpenAI will show you the generated
    key:'
  id: totrans-340
  prefs: []
  type: TYPE_NORMAL
  zh: 点击“创建密钥”按钮，OpenAI 将显示生成的密钥：
- en: '![3 openai copy key](image_rsrc1YW.jpg)'
  id: totrans-341
  prefs: []
  type: TYPE_IMG
  zh: '![3 openai copy key](image_rsrc1YW.jpg)'
- en: Figure 20\. OpenAI Copy API Key
  id: totrans-342
  prefs: []
  type: TYPE_NORMAL
  zh: 图 20\. OpenAI 复制 API 密钥
- en: 'You need to copy and paste this API key into the .env file of your project:'
  id: totrans-343
  prefs: []
  type: TYPE_NORMAL
  zh: 您需要将此 API 密钥复制并粘贴到项目的 .env 文件中：
- en: OPENAI_KEY='Your Key Here'
  id: totrans-344
  prefs: []
  type: TYPE_NORMAL
  zh: OPENAI_KEY='您的密钥位置'
- en: Now that you have the OpenAI key ready, it’s time to use it in the LangChain
    application.
  id: totrans-345
  prefs: []
  type: TYPE_NORMAL
  zh: 现在您已经有了 OpenAI 密钥，是时候在 LangChain 应用程序中使用它了。
- en: Integrating OpenAI With LangChain
  id: totrans-346
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 将 OpenAI 与 LangChain 集成
- en: 'To use OpenAI in LangChain, you need to install the langchain_openai package
    using pip:'
  id: totrans-347
  prefs: []
  type: TYPE_NORMAL
  zh: 在 LangChain 中使用 OpenAI，您需要使用 pip 安装 langchain_openai 包：
- en: pip install langchain-openai==0.1.7
  id: totrans-348
  prefs: []
  type: TYPE_NORMAL
  zh: pip install langchain-openai==0.1.7
- en: Once the package is installed, create a new file named app_gpt.py and import
    the ChatOpenAI class from the package.
  id: totrans-349
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦安装了包，创建一个名为 app_gpt.py 的新文件，并从包中导入 ChatOpenAI 类。
- en: 'We also need to add the OPENAI_KEY using config() as shown below:'
  id: totrans-350
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还需要使用 config() 添加 OPENAI_KEY，如下所示：
- en: from decouple import config
  id: totrans-351
  prefs: []
  type: TYPE_NORMAL
  zh: from decouple import config
- en: from langchain_openai import ChatOpenAI
  id: totrans-352
  prefs: []
  type: TYPE_NORMAL
  zh: from langchain_openai import ChatOpenAI
- en: OPENAI_KEY = config("OPENAI_KEY")
  id: totrans-353
  prefs: []
  type: TYPE_NORMAL
  zh: OPENAI_KEY = config("OPENAI_KEY")
- en: llm = ChatOpenAI(model="gpt-4o", api_key=OPENAI_KEY)
  id: totrans-354
  prefs: []
  type: TYPE_NORMAL
  zh: llm = ChatOpenAI(model="gpt-4o", api_key=OPENAI_KEY)
- en: You can change the model parameter with the model you want to use. As of this
    writing, GPT-4o is the latest LLM released by OpenAI.
  id: totrans-355
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以使用你想要使用的模型来更改模型参数。截至本文写作时，GPT-4o是OpenAI发布的最新LLM。
- en: 'Let’s ask GPT the same question we asked to Gemini:'
  id: totrans-356
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们向GPT提出与Gemini相同的问题：
- en: print("Q & A With AI")
  id: totrans-357
  prefs: []
  type: TYPE_NORMAL
  zh: print("Q & A With AI")
- en: print("=============")
  id: totrans-358
  prefs: []
  type: TYPE_NORMAL
  zh: print("=============")
- en: question = "What's the currency of Thailand?"
  id: totrans-359
  prefs: []
  type: TYPE_NORMAL
  zh: question = "What's the currency of Thailand?"
- en: 'print("Question: " + question)'
  id: totrans-360
  prefs: []
  type: TYPE_NORMAL
  zh: 'print("Question: " + question)'
- en: response = llm.invoke(question)
  id: totrans-361
  prefs: []
  type: TYPE_NORMAL
  zh: response = llm.invoke(question)
- en: 'print("Answer: " + response.content)'
  id: totrans-362
  prefs: []
  type: TYPE_NORMAL
  zh: 'print("Answer: " + response.content)'
- en: 'Save the changes, then run the file using Python:'
  id: totrans-363
  prefs: []
  type: TYPE_NORMAL
  zh: 保存更改，然后使用Python运行文件：
- en: python app_gpt.py
  id: totrans-364
  prefs: []
  type: TYPE_NORMAL
  zh: python app_gpt.py
- en: 'You should get a response similar to this:'
  id: totrans-365
  prefs: []
  type: TYPE_NORMAL
  zh: 你应该得到一个类似这样的响应：
- en: Q & A With AI
  id: totrans-366
  prefs: []
  type: TYPE_NORMAL
  zh: Q & A With AI
- en: =============
  id: totrans-367
  prefs: []
  type: TYPE_NORMAL
  zh: =============
- en: 'Question: What''s the currency of Thailand?'
  id: totrans-368
  prefs: []
  type: TYPE_NORMAL
  zh: 问题：泰国的货币是什么？
- en: 'Answer: The currency of Thailand is the Thai Baht. Its ISO code is THB.'
  id: totrans-369
  prefs: []
  type: TYPE_NORMAL
  zh: 答案：泰国的货币是泰铢。其ISO代码是THB。
- en: This means the LangChain application successfully communicated with the GPT
    chat model from OpenAI. Awesome!
  id: totrans-370
  prefs: []
  type: TYPE_NORMAL
  zh: 这意味着LangChain应用程序成功与OpenAI的GPT聊天模型进行了通信。太棒了！
- en: You can try asking another question by changing the question variable value.
  id: totrans-371
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以通过更改问题变量的值尝试提出另一个问题。
- en: 'ChatGPT vs Gemini: Which One To Use?'
  id: totrans-372
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: ChatGPT vs Gemini：使用哪一个？
- en: Both ChatGPT and Gemini are very capable of performing the tasks we want them
    to do in this book, so it’s really up to you.
  id: totrans-373
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT和Gemini都非常擅长执行这本书中我们希望它们完成的任务，所以这完全取决于你。
- en: In the past, OpenAI used to give $5 credits for free. But it seems no longer
    to be the case, as many people in the OpenAI forum said they don’t get it after
    registering.
  id: totrans-374
  prefs: []
  type: TYPE_NORMAL
  zh: 在过去，OpenAI曾免费提供5美元的信用额度。但似乎不再是这样了，因为OpenAI论坛上的许多人表示，注册后他们没有收到。
- en: On the other hand, Google is offering a free tier for the Gemini model in exchange
    for using our data to train the model, so it’s okay to use it for learning and
    exploring LangChain.
  id: totrans-375
  prefs: []
  type: TYPE_NORMAL
  zh: 另一方面，谷歌提供Gemini模型的免费层，以换取使用我们的数据来训练模型，所以对于学习和探索LangChain来说，使用它是可以的。
- en: Still, Google has the right to stop the free tier at any time, so let me introduce
    you to one more way to use LLMs in LangChain.
  id: totrans-376
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，谷歌有权随时停止免费层，所以让我再介绍一种在LangChain中使用LLMs的方法。
- en: This time, we’re going to use open-source models.
  id: totrans-377
  prefs: []
  type: TYPE_NORMAL
  zh: 这次，我们将使用开源模型。
- en: Summary
  id: totrans-378
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: The code for this chapter is available in the folder 03_Using_OpenAI from the
    book source code.
  id: totrans-379
  prefs: []
  type: TYPE_NORMAL
  zh: 本章的代码可在书籍源代码的03_Using_OpenAI文件夹中找到。
- en: In this chapter, you’ve learned how to create OpenAI API key and use it in a
    LangChain application.
  id: totrans-380
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，你学习了如何创建OpenAI API密钥并在LangChain应用程序中使用它。
- en: Here, we start to see one of the benefits of using LangChain, which is easy
    integration with LLMs of any kind.
  id: totrans-381
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，我们开始看到使用LangChain的一个好处，那就是它易于与任何类型的LLMs集成。
- en: LangChain represents the LLMs as packages that you can install and import into
    your project.
  id: totrans-382
  prefs: []
  type: TYPE_NORMAL
  zh: LangChain将LLMs表示为可以安装并导入到你的项目中的包。
- en: You only need to create an instance of the model class and run the invoke()
    method to access the LLM.
  id: totrans-383
  prefs: []
  type: TYPE_NORMAL
  zh: 你只需要创建模型类的实例并运行invoke()方法来访问LLM。
- en: Whenever you need to use another LLM, you just change the llm variable and pass
    the required API key.
  id: totrans-384
  prefs: []
  type: TYPE_NORMAL
  zh: 无论何时你需要使用另一个LLM，你只需更改llm变量并传递所需的API密钥。
- en: 'Chapter 4: Using Open-Source LLMs in LangChain'
  id: totrans-385
  prefs: []
  type: TYPE_NORMAL
  zh: 第四章：在LangChain中使用开源LLMs
- en: The LangChain library enables you to communicate with LLMs of any kind, from
    proprietary LLMs such as Google’s Gemini and OpenAI’s GPT to open-source LLMs
    like Meta’s Llama and Mistral.
  id: totrans-386
  prefs: []
  type: TYPE_NORMAL
  zh: LangChain库使你能够与任何类型的LLMs进行通信，从专有LLMs如谷歌的Gemini和OpenAI的GPT到开源LLMs如Meta的Llama和Mistral。
- en: This chapter will show you how to use open-source models in LangChain. Let’s
    jump in.
  id: totrans-387
  prefs: []
  type: TYPE_NORMAL
  zh: 本章将向你展示如何在LangChain中使用开源模型。让我们开始吧。
- en: Ollama Introduction
  id: totrans-388
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Ollama简介
- en: Ollama is a tool used to run LLMs locally. It handles downloading, managing,
    and opening HTTP API endpoints for the models you want to use on your computer.
  id: totrans-389
  prefs: []
  type: TYPE_NORMAL
  zh: Ollama是一个用于在本地运行LLMs的工具。它负责下载、管理和打开你想要在电脑上使用的模型的HTTP API端点。
- en: To get started, head over to [https://ollama.com](https://ollama.com) and click
    the 'Download' button.
  id: totrans-390
  prefs: []
  type: TYPE_NORMAL
  zh: 要开始，请访问[https://ollama.com](https://ollama.com)并点击“下载”按钮。
- en: 'From there, you can select the version for your Operating System:'
  id: totrans-391
  prefs: []
  type: TYPE_NORMAL
  zh: 从那里，你可以选择适合你的操作系统的版本：
- en: '![4 download ollama](image_rsrc1YX.jpg)'
  id: totrans-392
  prefs: []
  type: TYPE_IMG
  zh: '![4 download ollama](image_rsrc1YX.jpg)'
- en: Figure 21\. Downloading Ollama
  id: totrans-393
  prefs: []
  type: TYPE_NORMAL
  zh: 图21. 下载Ollama
- en: 'Once downloaded, open the package and follow the instructions until you are
    asked to install the command line tool as follows:'
  id: totrans-394
  prefs: []
  type: TYPE_NORMAL
  zh: 下载完成后，打开包并按照说明操作，直到被要求按照以下方式安装命令行工具：
- en: '![4 ollama terminal](image_rsrc1YY.jpg)'
  id: totrans-395
  prefs: []
  type: TYPE_IMG
  zh: '![4 ollama终端](image_rsrc1YY.jpg)'
- en: Figure 22\. Installing Ollama Terminal Command
  id: totrans-396
  prefs: []
  type: TYPE_NORMAL
  zh: 图22. 安装Ollama终端命令
- en: Go ahead and click the 'Install' button.
  id: totrans-397
  prefs: []
  type: TYPE_NORMAL
  zh: 点击“安装”按钮继续。
- en: 'Once the installation is finished, Ollama will show you how to run a model:'
  id: totrans-398
  prefs: []
  type: TYPE_NORMAL
  zh: 安装完成后，Ollama会向你展示如何运行模型：
- en: '![4 ollama run first model](image_rsrc1YZ.jpg)'
  id: totrans-399
  prefs: []
  type: TYPE_IMG
  zh: '![4 ollama运行第一个模型](image_rsrc1YZ.jpg)'
- en: Figure 23\. Ollama Running Your First Model
  id: totrans-400
  prefs: []
  type: TYPE_NORMAL
  zh: 图23. Ollama运行您的第一个模型
- en: But since Llama 3 is an 8 billion parameter model, the model is quite large
    at 4.7 GB.
  id: totrans-401
  prefs: []
  type: TYPE_NORMAL
  zh: 但由于Llama 3是一个800亿参数的模型，该模型相当大，有4.7 GB。
- en: 'I recommend you run the Gemma model instead, which has 2 billion parameters:'
  id: totrans-402
  prefs: []
  type: TYPE_NORMAL
  zh: 我建议你运行Gemma模型，它有20亿参数：
- en: ollama run gemma:2b
  id: totrans-403
  prefs: []
  type: TYPE_NORMAL
  zh: ollama run gemma:2b
- en: The Gemma model is a lightweight model from Google, so you can think of it as
    an open-source version of Google Gemini.
  id: totrans-404
  prefs: []
  type: TYPE_NORMAL
  zh: Gemma模型是来自Google的一个轻量级模型，所以你可以将其视为Google Gemini的开源版本。
- en: The Gemma 2B model is only 1.7 GB in size, so it comes in handy when you want
    to try out ollama.
  id: totrans-405
  prefs: []
  type: TYPE_NORMAL
  zh: Gemma 2B模型大小仅为1.7 GB，所以在你想尝试ollama时非常有用。
- en: 'Once the download is finished, you can immediately use the model from the terminal.
    Ask it a question as shown below:'
  id: totrans-406
  prefs: []
  type: TYPE_NORMAL
  zh: 下载完成后，你就可以立即从终端使用该模型。如下所示提问：
- en: '![4 running gemma](image_rsrc1Z0.jpg)'
  id: totrans-407
  prefs: []
  type: TYPE_IMG
  zh: '![4 运行gemma](image_rsrc1Z0.jpg)'
- en: Figure 24\. Example of Asking Gemma in Ollama
  id: totrans-408
  prefs: []
  type: TYPE_NORMAL
  zh: 图24. 在Ollama中询问Gemma的示例
- en: To exit the running model, type /bye and press Enter.
  id: totrans-409
  prefs: []
  type: TYPE_NORMAL
  zh: 要退出正在运行的模型，请输入/bye并按Enter键。
- en: 'As long as Ollama is running on your computer, the Ollama API endpoint is accessible
    at localhost:11434 as shown below:'
  id: totrans-410
  prefs: []
  type: TYPE_NORMAL
  zh: 只要Ollama在你的电脑上运行，Ollama API端点就可以在localhost:11434上访问，如下所示：
- en: '![4 ollama localhost](image_rsrc1Z1.jpg)'
  id: totrans-411
  prefs: []
  type: TYPE_IMG
  zh: '![4 ollama本地](image_rsrc1Z1.jpg)'
- en: Figure 25\. Ollama Localhost API Endpoint
  id: totrans-412
  prefs: []
  type: TYPE_NORMAL
  zh: 图25. Ollama本地API端点
- en: LangChain will use this API endpoint to communicate with Ollama models, which
    we’re going to do next.
  id: totrans-413
  prefs: []
  type: TYPE_NORMAL
  zh: LangChain将使用此API端点与Ollama模型通信，这是我们接下来要做的。
- en: Using Ollama in LangChain
  id: totrans-414
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 在LangChain中使用Ollama
- en: To use the models downloaded by Ollama, you need to import the ChatOllama class
    from the langchain_community.chat_models module.
  id: totrans-415
  prefs: []
  type: TYPE_NORMAL
  zh: 要使用Ollama下载的模型，你需要从langchain_community.chat_models模块导入ChatOllama类。
- en: 'Create a new file named app_ollama.py and import the Ollama chat model as shown
    below:'
  id: totrans-416
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个名为app_ollama.py的新文件，并按如下所示导入Ollama聊天模型：
- en: from langchain_community.chat_models import ChatOllama
  id: totrans-417
  prefs: []
  type: TYPE_NORMAL
  zh: from langchain_community.chat_models import ChatOllama
- en: llm = ChatOllama(model="gemma:2b")
  id: totrans-418
  prefs: []
  type: TYPE_NORMAL
  zh: llm = ChatOllama(model="gemma:2b")
- en: print("Q & A With AI")
  id: totrans-419
  prefs: []
  type: TYPE_NORMAL
  zh: print("Q & A With AI")
- en: print("=============")
  id: totrans-420
  prefs: []
  type: TYPE_NORMAL
  zh: print("=============")
- en: question = "What's the currency of Thailand?"
  id: totrans-421
  prefs: []
  type: TYPE_NORMAL
  zh: question = "What's the currency of Thailand?"
- en: 'print("Question: " + question)'
  id: totrans-422
  prefs: []
  type: TYPE_NORMAL
  zh: 'print("Question: " + question)'
- en: 'print("Answer: " + response.content)'
  id: totrans-423
  prefs: []
  type: TYPE_NORMAL
  zh: 'print("Answer: " + response.content)'
- en: You also need to assign the ChatOllama object to the llm variable as shown above.
  id: totrans-424
  prefs: []
  type: TYPE_NORMAL
  zh: 你还需要将ChatOllama对象分配给上面所示的llm变量。
- en: Because Ollama is open-source and local, you don’t need to add an API key when
    using it.
  id: totrans-425
  prefs: []
  type: TYPE_NORMAL
  zh: 由于Ollama是开源且本地的，使用时无需添加API密钥。
- en: 'Now you can run the file using Python to communicate with the LLM. You should
    have a response similar to this:'
  id: totrans-426
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，你可以使用Python运行文件来与LLM进行通信。你应该得到以下类似的响应：
- en: Q & A With AI
  id: totrans-427
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能问答
- en: =============
  id: totrans-428
  prefs: []
  type: TYPE_NORMAL
  zh: =============
- en: 'Question: What''s the currency of Thailand?'
  id: totrans-429
  prefs: []
  type: TYPE_NORMAL
  zh: 问题：泰国的货币是什么？
- en: 'Answer: The currency of Thailand is the Thai baht (THB). It is subdivided into
    100 sen. The baht is denoted by the symbol THB.'
  id: totrans-430
  prefs: []
  type: TYPE_NORMAL
  zh: 答案：泰国的货币是泰铢（THB），它被分为100分。泰铢用符号THB表示。
- en: Note that because the LLM model is running on your computer, the answer may
    take longer when compared to the Gemini and GPT models.
  id: totrans-431
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，由于LLM模型是在你的电脑上运行的，与Gemini和GPT模型相比，答案可能需要更长的时间。
- en: 'And that’s how you use Ollama in LangChain. If you want to use other open-source
    models, you need to download the model with Ollama first:'
  id: totrans-432
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是如何在LangChain中使用Ollama。如果你想使用其他开源模型，你需要首先使用Ollama下载该模型：
- en: ollama pull mistral
  id: totrans-433
  prefs: []
  type: TYPE_NORMAL
  zh: ollama pull mistral
- en: The pull command downloads the model without running it on the command line.
  id: totrans-434
  prefs: []
  type: TYPE_NORMAL
  zh: pull命令下载模型，但不会在命令行上运行它。
- en: 'After that, you can switch the model parameter when creating the ChatOllama
    object:'
  id: totrans-435
  prefs: []
  type: TYPE_NORMAL
  zh: 之后，你可以在创建ChatOllama对象时切换模型参数：
- en: Switch the model
  id: totrans-436
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 切换模型
- en: llm = ChatOllama(model="mistral")
  id: totrans-437
  prefs: []
  type: TYPE_NORMAL
  zh: llm = ChatOllama(model="mistral")
- en: Remember that the larger the model, the longer it takes to run.
  id: totrans-438
  prefs: []
  type: TYPE_NORMAL
  zh: 记住，模型越大，运行所需的时间越长。
- en: The common guideline is that you should have at least 8 GB of RAM available
    to run the 7B models, 16 GB to run the 13B models, and 32 GB to run the 33B models.
  id: totrans-439
  prefs: []
  type: TYPE_NORMAL
  zh: 常规指南是，你应该至少有 8 GB 的 RAM 来运行 7B 模型，16 GB 来运行 13B 模型，以及 32 GB 来运行 33B 模型。
- en: There are many open-source models that you can run using Ollama, such as Google’s
    Gemma and Microsoft’s Phi-3.
  id: totrans-440
  prefs: []
  type: TYPE_NORMAL
  zh: 有许多开源模型可以使用 Ollama 运行，例如 Google 的 Gemma 和 Microsoft 的 Phi-3。
- en: You can explore [https://ollama.com/library](https://ollama.com/library) to
    see all available models.
  id: totrans-441
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以探索 [https://ollama.com/library](https://ollama.com/library) 来查看所有可用的模型。
- en: Again, Which One To Use?
  id: totrans-442
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 再次，选择哪一个？
- en: So far, you have explored how to use Google Gemini, OpenAI GPT, and Ollama open-source
    models. Which one to use in your application?
  id: totrans-443
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，你已经探索了如何使用 Google Gemini、OpenAI GPT 和 Ollama 开源模型。在你的应用程序中应该使用哪一个？
- en: I recommend you use OpenAI GPT if you can afford it because the API isn’t rate-limited
    and the result is great.
  id: totrans-444
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你负担得起，我建议你使用 OpenAI GPT，因为它的 API 没有速率限制，结果也非常出色。
- en: If you can’t use OpenAI GPT for any reason, then you can use Google Gemini free
    tier if it’s available in your country.
  id: totrans-445
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你因为任何原因无法使用 OpenAI GPT，那么如果你的国家有提供，你可以使用 Google Gemini 的免费层。
- en: If not, you can use Ollama and download the Gemma 2B model or Llama 3, based
    on your computer’s RAM capacity.
  id: totrans-446
  prefs: []
  type: TYPE_NORMAL
  zh: 如果没有，你可以根据你电脑的 RAM 容量使用 Ollama 下载 Gemma 2B 模型或 Llama 3。
- en: Unless specifically noted, I’m going to use OpenAI GPT for all example codes
    shown in this book.
  id: totrans-447
  prefs: []
  type: TYPE_NORMAL
  zh: 除非特别说明，我将在这本书的所有示例代码中使用 OpenAI GPT。
- en: But don’t worry because replacing the LLM part in LangChain is very easy. You
    only need to change the llm variable itself as shown in this chapter.
  id: totrans-448
  prefs: []
  type: TYPE_NORMAL
  zh: 但别担心，因为替换 LangChain 中的 LLM 部分非常简单。你只需更改本章节中显示的 llm 变量本身即可。
- en: You can get the code examples that use Gemini and Ollama on the repository.
  id: totrans-449
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以在存储库中找到使用 Gemini 和 Ollama 的代码示例。
- en: Summary
  id: totrans-450
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: The code for this chapter is available in the folder 04_Using_Ollama from the
    book source code.
  id: totrans-451
  prefs: []
  type: TYPE_NORMAL
  zh: 本章的代码可在书籍源代码的 04_Using_Ollama 文件夹中找到。
- en: In this chapter, you’ve learned how to use open-source LLMs using Ollama and
    LangChain.
  id: totrans-452
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，你已经学习了如何使用 Ollama 和 LangChain 来使用开源 LLMs。
- en: Using Ollama, you can download and run any Large Language Models that are open-source
    and free to use.
  id: totrans-453
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 Ollama，你可以下载并运行任何开源且免费使用的 Large Language Models。
- en: If you look at the Ollama website, you will find many models that are very capable
    and can even match proprietary models such as Gemini and ChatGPT in performance.
  id: totrans-454
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你查看 Ollama 网站，你会找到许多非常强大的模型，甚至可以在性能上与专有模型如 Gemini 和 ChatGPT 相媲美。
- en: If you are worried about the privacy of your data and want to make sure that
    no one uses it for training their LLMs, then using open-source LLMs like Llama
    3, Mistral, or Gemma can be a great choice.
  id: totrans-455
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你担心你的数据隐私，并想确保没有人用它来训练他们的 LLMs，那么使用像 Llama 3、Mistral 或 Gemma 这样的开源 LLMs 可以是一个很好的选择。
- en: 'Chapter 5: Adding Web GUI With Streamlit'
  id: totrans-456
  prefs: []
  type: TYPE_NORMAL
  zh: 第五章：使用 Streamlit 添加 Web GUI
- en: So far, we have used Python to run the simple question and answer application.
  id: totrans-457
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，我们已经使用 Python 运行简单的问答应用程序。
- en: Instead of using the terminal to communicate with LLMs, let’s create a simple
    web-based user interface for interacting with LLMs.
  id: totrans-458
  prefs: []
  type: TYPE_NORMAL
  zh: 我们不再使用终端与 LLMs 通信，而是创建一个简单的基于网络的用户界面来与 LLMs 交互。
- en: To create the web interface, we’re going to use the Streamlit module.
  id: totrans-459
  prefs: []
  type: TYPE_NORMAL
  zh: 要创建网络界面，我们将使用 Streamlit 模块。
- en: Streamlit Introduction
  id: totrans-460
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Streamlit 简介
- en: Streamlit is an open-source Python framework that you can use to build data-oriented
    applications with only a few lines of code.
  id: totrans-461
  prefs: []
  type: TYPE_NORMAL
  zh: Streamlit 是一个开源的 Python 框架，你可以用它用几行代码来构建以数据为导向的应用程序。
- en: By using Streamlit and LangChain, you can build a web-based interface for interacting
    with LLMs of any kind.
  id: totrans-462
  prefs: []
  type: TYPE_NORMAL
  zh: 通过使用 Streamlit 和 LangChain，你可以为任何类型的 LLM 建立一个基于网络的交互界面。
- en: 'To start using Streamlit, you need to install the package using pip as follows:'
  id: totrans-463
  prefs: []
  type: TYPE_NORMAL
  zh: 要开始使用 Streamlit，你需要使用 pip 安装以下包：
- en: pip install streamlit==1.35.0
  id: totrans-464
  prefs: []
  type: TYPE_NORMAL
  zh: pip install streamlit==1.35.0
- en: 'Next, import the streamlit module to create a header and a textbox as shown
    below:'
  id: totrans-465
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，导入 streamlit 模块以创建一个标题和文本框，如下所示：
- en: import streamlit as st
  id: totrans-466
  prefs: []
  type: TYPE_NORMAL
  zh: import streamlit as st
- en: llm...
  id: totrans-467
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: llm...
- en: st.title("Q & A With AI")
  id: totrans-468
  prefs: []
  type: TYPE_NORMAL
  zh: st.title("Q & A With AI")
- en: question = st.text_input("Your Question")
  id: totrans-469
  prefs: []
  type: TYPE_NORMAL
  zh: question = st.text_input("Your Question")
- en: 'if question:'
  id: totrans-470
  prefs: []
  type: TYPE_NORMAL
  zh: 'if question:'
- en: response = llm.invoke(question)
  id: totrans-471
  prefs: []
  type: TYPE_NORMAL
  zh: response = llm.invoke(question)
- en: st.write(response.content)
  id: totrans-472
  prefs: []
  type: TYPE_NORMAL
  zh: st.write(response.content)
- en: The st.title() creates a <h1> element and renders the text you passed as its
    argument.
  id: totrans-473
  prefs: []
  type: TYPE_NORMAL
  zh: st.title() 创建一个 <h1> 元素，并渲染你传递给它的文本。
- en: The st.text_input() creates a text input. The return value is any value you
    put on the box.
  id: totrans-474
  prefs: []
  type: TYPE_NORMAL
  zh: st.text_input() 创建一个文本输入。返回值是你在框中输入的任何值。
- en: After that, use an if statement to check if the question variable contains a
    question.
  id: totrans-475
  prefs: []
  type: TYPE_NORMAL
  zh: 之后，使用if语句检查question变量是否包含问题。
- en: When the question is not empty, we run the llm.invoke() method and write the
    returned response to Streamlit.
  id: totrans-476
  prefs: []
  type: TYPE_NORMAL
  zh: 当问题不为空时，我们运行llm.invoke()方法并将返回的响应写入Streamlit。
- en: 'To run a Streamlit application, you need to use streamlit instead of python
    on the command line:'
  id: totrans-477
  prefs: []
  type: TYPE_NORMAL
  zh: 要运行Streamlit应用程序，你需要在命令行上使用streamlit而不是python：
- en: streamlit run app.py
  id: totrans-478
  prefs: []
  type: TYPE_NORMAL
  zh: streamlit run app.py
- en: 'Streamlit will open your web browser and navigate to the localhost:8501, where
    the Streamlit application is running:'
  id: totrans-479
  prefs: []
  type: TYPE_NORMAL
  zh: Streamlit将打开你的网络浏览器并导航到localhost:8501，那里运行着Streamlit应用程序：
- en: '![5 streamlit running](image_rsrc1Z2.jpg)'
  id: totrans-480
  prefs: []
  type: TYPE_IMG
  zh: '![5 streamlit running](image_rsrc1Z2.jpg)'
- en: Figure 26\. Opening Streamlit in Web Browser
  id: totrans-481
  prefs: []
  type: TYPE_NORMAL
  zh: 图26. 在网络浏览器中打开Streamlit
- en: You can type your question in the box and press Enter.
  id: totrans-482
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以在框中输入你的问题并按Enter键。
- en: 'The LLM response will be written below the question box:'
  id: totrans-483
  prefs: []
  type: TYPE_NORMAL
  zh: LLM的响应将被写入问题框下方：
- en: '![5 streamlit qna](image_rsrc1Z3.jpg)'
  id: totrans-484
  prefs: []
  type: TYPE_IMG
  zh: '![5 streamlit qna](image_rsrc1Z3.jpg)'
- en: Figure 27\. Streamlit Output Example
  id: totrans-485
  prefs: []
  type: TYPE_NORMAL
  zh: 图27. Streamlit 输出示例
- en: And that’s how you use Streamlit to create a simple interface for LLM-powered
    applications.
  id: totrans-486
  prefs: []
  type: TYPE_NORMAL
  zh: 这样就是使用Streamlit为LLM驱动的应用程序创建简单界面的方法。
- en: Summary
  id: totrans-487
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: The code for this chapter is available in the folder 05_Adding_Streamlit_GUI
    from the book source code.
  id: totrans-488
  prefs: []
  type: TYPE_NORMAL
  zh: 本章的代码可在书籍源代码的05_Adding_Streamlit_GUI文件夹中找到。
- en: In this chapter, you’ve learned how to use Streamlit to quickly create a web-based
    interface for interacting with a Large Language Model through LangChain.
  id: totrans-489
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，你学习了如何使用Streamlit快速创建一个基于Web的界面，通过LangChain与大型语言模型进行交互。
- en: We’re going to explore Streamlit more as we build more advanced AI applications.
  id: totrans-490
  prefs: []
  type: TYPE_NORMAL
  zh: 随着我们构建更高级的AI应用程序，我们将进一步探索Streamlit。
- en: In the next chapter, you’re going to learn about prompt templates. See you there!
  id: totrans-491
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一章中，你将学习关于提示模板的内容。那里见！
- en: 'Chapter 6: LangChain Prompt Templates'
  id: totrans-492
  prefs: []
  type: TYPE_NORMAL
  zh: 第六章：LangChain提示模板
- en: The LangChain prompt template is a Python class used to create a specific prompt
    (or instruction) to send to a Large Language Model.
  id: totrans-493
  prefs: []
  type: TYPE_NORMAL
  zh: LangChain提示模板是一个Python类，用于创建发送给大型语言模型的特定提示（或指令）。
- en: By using prompt templates, we can reproduce the same instruction while requiring
    minimal input from the user.
  id: totrans-494
  prefs: []
  type: TYPE_NORMAL
  zh: 通过使用提示模板，我们可以在用户输入最少的情况下重复相同的指令。
- en: To show you an example, suppose you are creating a simple AI application that
    only gives currency information of a specific country.
  id: totrans-495
  prefs: []
  type: TYPE_NORMAL
  zh: 为了给你一个例子，假设你正在创建一个简单的AI应用程序，该应用程序只提供特定国家的货币信息。
- en: 'Based on what we already know, the only way to do this is to keep repeating
    the question while changing the country as follows:'
  id: totrans-496
  prefs: []
  type: TYPE_NORMAL
  zh: 根据我们已知的，唯一的方法是重复问题，同时更改国家如下：
- en: question = "What is the currency of Thailand?"
  id: totrans-497
  prefs: []
  type: TYPE_NORMAL
  zh: question = "What is the currency of Thailand?"
- en: question = "What is the currency of Malaysia?"
  id: totrans-498
  prefs: []
  type: TYPE_NORMAL
  zh: question = "What is the currency of Malaysia?"
- en: question = "What is the currency of India?"
  id: totrans-499
  prefs: []
  type: TYPE_NORMAL
  zh: question = "What is the currency of India?"
- en: 'Instead of repeating the question, you can create a template for that question
    as follows:'
  id: totrans-500
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以创建一个模板来代替重复的问题，如下所示：
- en: st.title("Currency Info")
  id: totrans-501
  prefs: []
  type: TYPE_NORMAL
  zh: st.title("Currency Info")
- en: country = st.text_input("Input Country")
  id: totrans-502
  prefs: []
  type: TYPE_NORMAL
  zh: country = st.text_input("Input Country")
- en: 'if country:'
  id: totrans-503
  prefs: []
  type: TYPE_NORMAL
  zh: 'if country:'
- en: question = "What is the currency of " + country + "?"
  id: totrans-504
  prefs: []
  type: TYPE_NORMAL
  zh: question = "What is the currency of " + country + "?"
- en: response = llm.invoke(question)
  id: totrans-505
  prefs: []
  type: TYPE_NORMAL
  zh: response = llm.invoke(question)
- en: st.write(response.content)
  id: totrans-506
  prefs: []
  type: TYPE_NORMAL
  zh: st.write(response.content)
- en: Now you only need to give the country name on the input box to run the prompt.
  id: totrans-507
  prefs: []
  type: TYPE_NORMAL
  zh: 现在你只需要在输入框中输入国家名称来运行提示。
- en: You can use a plain string or f-string to create a prompt template, but LangChain
    recommends you use the prompt template class for effective reuse. Let me show
    you how.
  id: totrans-508
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以使用纯字符串或f-string来创建提示模板，但LangChain建议你使用提示模板类以实现有效重用。让我给你展示一下。
- en: Creating a Prompt Template
  id: totrans-509
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 创建提示模板
- en: 'To create a prompt template, you need to import the PromptTemplate class from
    langchain.prompts as shown below:'
  id: totrans-510
  prefs: []
  type: TYPE_NORMAL
  zh: 要创建一个提示模板，你需要从langchain.prompts导入PromptTemplate类，如下所示：
- en: from langchain.prompts import PromptTemplate
  id: totrans-511
  prefs: []
  type: TYPE_NORMAL
  zh: from langchain.prompts import PromptTemplate
- en: The next step is to create the prompt itself.
  id: totrans-512
  prefs: []
  type: TYPE_NORMAL
  zh: 下一步是创建提示本身。
- en: 'You can create a variable named prompt, then pass the call to PromptTemplate()
    constructor to that variable:'
  id: totrans-513
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以创建一个名为prompt的变量，然后将调用PromptTemplate()构造函数传递给该变量：
- en: prompt = PromptTemplate()
  id: totrans-514
  prefs: []
  type: TYPE_NORMAL
  zh: prompt = PromptTemplate()
- en: 'When calling the PromptTemplate() constructor, you need to pass two arguments:'
  id: totrans-515
  prefs: []
  type: TYPE_NORMAL
  zh: 当调用PromptTemplate()构造函数时，你需要传递两个参数：
- en: input_variables - A list of the names of the variables used in the template
  id: totrans-516
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: input_variables - 模板中使用的变量名称列表
- en: template - A string for the prompt template itself
  id: totrans-517
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: template - 用于提示模板本身的字符串
- en: 'Here’s an example of the complete PromptTemplate() call:'
  id: totrans-518
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是一个完整的 PromptTemplate() 调用的示例：
- en: prompt = PromptTemplate(
  id: totrans-519
  prefs: []
  type: TYPE_NORMAL
  zh: prompt = PromptTemplate(
- en: input_variables=["country"],
  id: totrans-520
  prefs: []
  type: TYPE_NORMAL
  zh: input_variables=["country"],
- en: template="What is the currency of {country}? Answer in one short paragraph",
  id: totrans-521
  prefs: []
  type: TYPE_NORMAL
  zh: template="{country}的货币是什么？请用一段简短的段落回答",
- en: )
  id: totrans-522
  prefs: []
  type: TYPE_NORMAL
  zh: )
- en: Now you can use the prompt object when calling the llm.invoke() method.
  id: totrans-523
  prefs: []
  type: TYPE_NORMAL
  zh: 现在您可以在调用 llm.invoke() 方法时使用提示对象。
- en: 'You need to call the prompt.format() method and pass the variable specified
    in the input_variables parameter as shown below:'
  id: totrans-524
  prefs: []
  type: TYPE_NORMAL
  zh: 您需要调用 prompt.format() 方法，并按照 input_variables 参数中指定的变量传递，如下所示：
- en: country = st.text_input("Input Country")
  id: totrans-525
  prefs: []
  type: TYPE_NORMAL
  zh: country = st.text_input("输入国家")
- en: 'if country:'
  id: totrans-526
  prefs: []
  type: TYPE_NORMAL
  zh: 'if country:'
- en: response = llm.invoke(prompt.format(country=country))
  id: totrans-527
  prefs: []
  type: TYPE_NORMAL
  zh: response = llm.invoke(prompt.format(country=country))
- en: st.write(response.content)
  id: totrans-528
  prefs: []
  type: TYPE_NORMAL
  zh: st.write(response.content)
- en: Now run the Streamlit application and ask for the currency of a specific country.
  id: totrans-529
  prefs: []
  type: TYPE_NORMAL
  zh: 现在运行 Streamlit 应用程序并请求特定国家的货币。
- en: 'Here’s an example of asking for the currency of Spain:'
  id: totrans-530
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是一个请求西班牙货币的示例：
- en: '![6 prompt result](image_rsrc1Z4.jpg)'
  id: totrans-531
  prefs: []
  type: TYPE_IMG
  zh: '![6 提示结果](image_rsrc1Z4.jpg)'
- en: Figure 28\. LLM Response
  id: totrans-532
  prefs: []
  type: TYPE_NORMAL
  zh: 图 28. LLM 响应
- en: The PromptTemplate class provides a structure from which you can construct a
    specific prompt.
  id: totrans-533
  prefs: []
  type: TYPE_NORMAL
  zh: PromptTemplate 类提供了一个结构，您可以从该结构构建特定的提示。
- en: Prompt Template With Multiple Inputs
  id: totrans-534
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 带有多个输入的提示模板
- en: The prompt template can accept as many inputs as you need in your template string.
  id: totrans-535
  prefs: []
  type: TYPE_NORMAL
  zh: 提示模板可以接受您在模板字符串中需要的任何输入。
- en: 'For example, suppose you want to control the amount of paragraph and the language
    of the answer. You can add two more variables to the prompt template like this:'
  id: totrans-536
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，假设您想控制段落的数量和答案的语言。您可以在提示模板中添加两个更多变量，如下所示：
- en: prompt = PromptTemplate(
  id: totrans-537
  prefs: []
  type: TYPE_NORMAL
  zh: prompt = PromptTemplate(
- en: input_variables=["country", "paragraph", "language"],
  id: totrans-538
  prefs: []
  type: TYPE_NORMAL
  zh: input_variables=["country", "paragraph", "language"],
- en: template="What is the currency of {country}? Answer in {paragraph} short paragraph
    in {language}",
  id: totrans-539
  prefs: []
  type: TYPE_NORMAL
  zh: template="{country}的货币是什么？请用 {paragraph} 段简短的段落在 {language} 中回答"，
- en: )
  id: totrans-540
  prefs: []
  type: TYPE_NORMAL
  zh: )
- en: 'Now below the country input, add two more inputs as shown below:'
  id: totrans-541
  prefs: []
  type: TYPE_NORMAL
  zh: 现在在“国家”输入下方添加两个更多输入，如下所示：
- en: country = st.text_input("Input Country")
  id: totrans-542
  prefs: []
  type: TYPE_NORMAL
  zh: country = st.text_input("输入国家")
- en: paragraph = st.number_input("Input Number of Paragraphs", min_value=1, max_value=5)
  id: totrans-543
  prefs: []
  type: TYPE_NORMAL
  zh: paragraph = st.number_input("输入段落数量", min_value=1, max_value=5)
- en: language = st.text_input("Input Language")
  id: totrans-544
  prefs: []
  type: TYPE_NORMAL
  zh: language = st.text_input("输入语言")
- en: Notice that the paragraph input is limited between 1 and 5 to avoid generating
    a long article.
  id: totrans-545
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，段落输入限制在 1 到 5 之间，以避免生成过长的文章。
- en: 'On the if statement, add two more variables to check using the and operator,
    then pass the variables when calling the prompt.format() method:'
  id: totrans-546
  prefs: []
  type: TYPE_NORMAL
  zh: 在 if 语句中添加两个更多变量，使用 and 运算符进行检查，然后在调用 prompt.format() 方法时传递变量：
- en: 'if country and paragraph and language:'
  id: totrans-547
  prefs: []
  type: TYPE_NORMAL
  zh: 'if country and paragraph and language:'
- en: response = llm.invoke(prompt.format(country=country, paragraph=paragraph, language=language))
  id: totrans-548
  prefs: []
  type: TYPE_NORMAL
  zh: response = llm.invoke(prompt.format(country=country, paragraph=paragraph, language=language))
- en: st.write(response.content)
  id: totrans-549
  prefs: []
  type: TYPE_NORMAL
  zh: st.write(response.content)
- en: 'And that’s it. Now you can try running the web application as shown below:'
  id: totrans-550
  prefs: []
  type: TYPE_NORMAL
  zh: 就这样。现在您可以根据下面所示尝试运行网络应用程序：
- en: '![6 multi inputs prompt](image_rsrc1Z5.jpg)'
  id: totrans-551
  prefs: []
  type: TYPE_IMG
  zh: '![6 多输入提示](image_rsrc1Z5.jpg)'
- en: Figure 29\. Multiple Inputs Result
  id: totrans-552
  prefs: []
  type: TYPE_NORMAL
  zh: 图 29. 多输入结果
- en: Combining the prompt template and Streamlit inputs, you can create a more sophisticated
    currency information application that can generate an answer exactly N paragraphs
    long in your preferred language.
  id: totrans-553
  prefs: []
  type: TYPE_NORMAL
  zh: 结合提示模板和 Streamlit 输入，您可以创建一个更复杂的货币信息应用程序，该应用程序可以生成恰好 N 段的答案，并使用您首选的语言。
- en: Restricting LLM From Answering Unwanted Prompts
  id: totrans-554
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 限制 LLM 对不想要的提示进行响应
- en: Prompt templates can also prevent your model from giving answers to weird questions.
  id: totrans-555
  prefs: []
  type: TYPE_NORMAL
  zh: 提示模板还可以防止您的模型对奇怪的问题给出答案。
- en: 'For example, you can ask the LLM about the currency of Narnia, which is a fictional
    country created by the British author C.S. Lewis:'
  id: totrans-556
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，您可以询问纳尼亚的货币，纳尼亚是由英国作家 C.S. Lewis 创造的一个虚构国家：
- en: '![6 narnia](image_rsrc1Z6.jpg)'
  id: totrans-557
  prefs: []
  type: TYPE_IMG
  zh: '![6 纳尼亚](image_rsrc1Z6.jpg)'
- en: Figure 30\. LLM Answering All Kinds of Questions
  id: totrans-558
  prefs: []
  type: TYPE_NORMAL
  zh: 图 30. LLM 回答各种问题
- en: While the answer is correct, you might not want to give information about fictional
    or non-existent countries in the application.
  id: totrans-559
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然答案正确，但您可能不希望在应用程序中提供关于虚构或不存在国家的信息。
- en: 'Using the prompt template, you can specify the prompt string in multiple lines
    as shown below:'
  id: totrans-560
  prefs: []
  type: TYPE_NORMAL
  zh: 使用提示模板，您可以像下面这样在多行中指定提示字符串：
- en: prompt = PromptTemplate(
  id: totrans-561
  prefs: []
  type: TYPE_NORMAL
  zh: prompt = PromptTemplate(
- en: input_variables=["country", "paragraph", "language"],
  id: totrans-562
  prefs: []
  type: TYPE_NORMAL
  zh: input_variables=["country", "paragraph", "language"],
- en: template='''
  id: totrans-563
  prefs: []
  type: TYPE_NORMAL
  zh: template='''
- en: You are a currency expert. You give information about a specific currency used
    in a specific country.
  id: totrans-564
  prefs: []
  type: TYPE_NORMAL
  zh: 你是一位货币专家。你提供关于特定国家使用的特定货币的信息。
- en: Avoid giving information about fictional places.
  id: totrans-565
  prefs: []
  type: TYPE_NORMAL
  zh: 避免提供关于虚构地点的信息。
- en: 'If the country is fictional or non-existent, answer: I don''t know.'
  id: totrans-566
  prefs: []
  type: TYPE_NORMAL
  zh: 如果国家是虚构的或不存在的，回答：我不知道。
- en: 'Answer the question: What is the currency of {country}?'
  id: totrans-567
  prefs: []
  type: TYPE_NORMAL
  zh: 回答问题：{国家}的货币是什么？
- en: Answer in {paragraph} short paragraph in {language}
  id: totrans-568
  prefs: []
  type: TYPE_NORMAL
  zh: 用 {段落} 简短段落回答 {语言}
- en: ''''''','
  id: totrans-569
  prefs: []
  type: TYPE_NORMAL
  zh: ''''''','
- en: )
  id: totrans-570
  prefs: []
  type: TYPE_NORMAL
  zh: )
- en: The prompt above instructs the LLM to not answer when asked about fictional
    places.
  id: totrans-571
  prefs: []
  type: TYPE_NORMAL
  zh: 上述提示指示 LLM 在被问及虚构地点时不回答。
- en: 'Now if you ask again, the LLM will respond as follows:'
  id: totrans-572
  prefs: []
  type: TYPE_NORMAL
  zh: 现在如果你再次提问，LLM 将会这样回答：
- en: '![6 prompt guard](image_rsrc1Z7.jpg)'
  id: totrans-573
  prefs: []
  type: TYPE_IMG
  zh: '![6 提示守卫](image_rsrc1Z7.jpg)'
- en: Figure 31\. LLM Not Answering
  id: totrans-574
  prefs: []
  type: TYPE_NORMAL
  zh: 图 31. LLM 不回答
- en: As you can see, the LLM refused to answer when asked about the currency of a
    fictional country.
  id: totrans-575
  prefs: []
  type: TYPE_NORMAL
  zh: 如你所见，当被问及虚构国家的货币时，LLM 拒绝回答。
- en: With a prompt template, the code is more maintainable and cleaner compared to
    using f-strings repeatedly.
  id: totrans-576
  prefs: []
  type: TYPE_NORMAL
  zh: 与反复使用 f-strings 相比，使用提示模板的代码更易于维护且更简洁。
- en: Summary
  id: totrans-577
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: The code for this chapter is available in the folder 06_Prompt_Template from
    the book source code.
  id: totrans-578
  prefs: []
  type: TYPE_NORMAL
  zh: 本章的代码可在书籍源代码的 06_Prompt_Template 文件夹中找到。
- en: The use of prompt templates enable you to craft a sophisticated instruction
    for LLMs while requiring only minimal inputs from the user.
  id: totrans-579
  prefs: []
  type: TYPE_NORMAL
  zh: 提示模板的使用使你能够在仅需要用户最小输入的情况下为 LLM 制定复杂的指令。
- en: The more specific your instruction, the more accurate the response will be.
  id: totrans-580
  prefs: []
  type: TYPE_NORMAL
  zh: 你的指令越具体，响应就越准确。
- en: You can even instruct the LLM to avoid answering unwanted prompts, as shown
    in the last section.
  id: totrans-581
  prefs: []
  type: TYPE_NORMAL
  zh: 你甚至可以指示 LLM 避免回答不想要的提示，如最后部分所示。
- en: 'Chapter 7: The LangChain Expression Language (LCEL)'
  id: totrans-582
  prefs: []
  type: TYPE_NORMAL
  zh: 第 7 章：LangChain 表达式语言（LCEL）
- en: 'In the previous chapter, we called the prompt.format() method inside the llm.invoke()
    method as shown below:'
  id: totrans-583
  prefs: []
  type: TYPE_NORMAL
  zh: 在上一章中，我们在 llm.invoke() 方法内部调用了 prompt.format() 方法，如下所示：
- en: response = llm.invoke(prompt.format(country=country, paragraph=paragraph, language=language))
  id: totrans-584
  prefs: []
  type: TYPE_NORMAL
  zh: response = llm.invoke(prompt.format(country=country, paragraph=paragraph, language=language))
- en: While this technique works, LangChain actually provides a declarative way to
    sequentially execute the prompt and llm objects.
  id: totrans-585
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然这种技术有效，但 LangChain 实际上提供了一种声明式的方法来顺序执行提示和 llm 对象。
- en: This declarative way is called the LangChain Expression Language (LCEL for short)
  id: totrans-586
  prefs: []
  type: TYPE_NORMAL
  zh: 这种声明式的方法被称为 LangChain 表达式语言（简称 LCEL）
- en: 'Using LCEL, you can wrap the prompt and the llm object in a chain as follows:'
  id: totrans-587
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 LCEL，你可以将提示和 llm 对象包装在链中，如下所示：
- en: chain = prompt | llm
  id: totrans-588
  prefs: []
  type: TYPE_NORMAL
  zh: chain = prompt | llm
- en: LCEL is marked by the pipe (|) operator, and it can be used to wrap around LangChain
    components. Components in LangChain include the prompt, the LLM, and the chain
    itself.
  id: totrans-589
  prefs: []
  type: TYPE_NORMAL
  zh: LCEL 以管道（|）运算符为标志，并且可以用来包装 LangChain 组件。LangChain 组件包括提示、LLM 以及链本身。
- en: 'Next, you can call the invoke() method from the chain object, and pass the
    inputs required by the prompt as a dictionary like this:'
  id: totrans-590
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，你可以从链对象中调用 invoke() 方法，并将提示所需输入作为字典传递，如下所示：
- en: response = chain.invoke(
  id: totrans-591
  prefs: []
  type: TYPE_NORMAL
  zh: response = chain.invoke(
- en: '{"country": country, "paragraph": paragraph, "language": language}'
  id: totrans-592
  prefs: []
  type: TYPE_NORMAL
  zh: '{"country": country, "paragraph": paragraph, "language": language}'
- en: )
  id: totrans-593
  prefs: []
  type: TYPE_NORMAL
  zh: )
- en: st.write(response.content)
  id: totrans-594
  prefs: []
  type: TYPE_NORMAL
  zh: st.write(response.content)
- en: The chain object will format the prompt and then pass it automatically to the
    llm object.
  id: totrans-595
  prefs: []
  type: TYPE_NORMAL
  zh: 链对象将格式化提示，然后自动将其传递给 llm 对象。
- en: 'The response object is the same as when you call the llm.invoke() method: it’s
    a message object with the answer stored under the content attribute.'
  id: totrans-596
  prefs: []
  type: TYPE_NORMAL
  zh: 响应对象与调用 llm.invoke() 方法时相同：它是一个包含在 content 属性下存储答案的消息对象。
- en: Sequential Chains
  id: totrans-597
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 顺序链
- en: By using LCEL, you can create many chains and send the next prompts once the
    LLM responds to the previous prompt.
  id: totrans-598
  prefs: []
  type: TYPE_NORMAL
  zh: 通过使用 LCEL，你可以在 LLM 对前一个提示做出响应后创建多个链并发送下一个提示。
- en: This method of sending the next prompt after the previous prompt has been answered
    is called the sequential chain.
  id: totrans-599
  prefs: []
  type: TYPE_NORMAL
  zh: 在前一个提示被回答后发送下一个提示的方法被称为顺序链。
- en: 'Based on the input and output results, the sequential chain is divided into
    2 categories:'
  id: totrans-600
  prefs: []
  type: TYPE_NORMAL
  zh: 根据输入和输出结果，顺序链分为 2 类：
- en: '| ​▪​ | Simple Sequential Chain |'
  id: totrans-601
  prefs: []
  type: TYPE_TB
  zh: '| ● | 简单顺序链'
- en: '| ​▪​ | Regular Sequential Chain |'
  id: totrans-602
  prefs: []
  type: TYPE_TB
  zh: '| ● | 正规顺序链'
- en: We’ll see an example of these sequential chains in the next two sections.
  id: totrans-603
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将在接下来的两个部分中看到这些顺序链的示例。
- en: Simple Sequential Chain
  id: totrans-604
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 简单顺序链
- en: 'The simple sequential chain is where each step in the chain has a single input/
    output. The output of one step will be the input of the next prompt:'
  id: totrans-605
  prefs: []
  type: TYPE_NORMAL
  zh: 简单的顺序链是链中的每一步只有一个输入/输出。一个步骤的输出将是下一个提示的输入：
- en: '![7 ssc](image_rsrc1Z8.jpg)'
  id: totrans-606
  prefs: []
  type: TYPE_IMG
  zh: '![7 ssc](image_rsrc1Z8.jpg)'
- en: Figure 32\. Simple Sequential Chain Illustration
  id: totrans-607
  prefs: []
  type: TYPE_NORMAL
  zh: 图32. 简单顺序链示意图
- en: For example, suppose you want to create an application that can write a short
    essay.
  id: totrans-608
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，假设你想创建一个可以写短文的应用程序。
- en: You will provide the topic, and the LLM will first decide on the title, then
    continue by writing the essay for that topic.
  id: totrans-609
  prefs: []
  type: TYPE_NORMAL
  zh: 你将提供主题，LLM将首先决定标题，然后继续为该主题撰写文章。
- en: 'To create the application, you need to create a prompt for the title first:'
  id: totrans-610
  prefs: []
  type: TYPE_NORMAL
  zh: 要创建应用程序，你首先需要为标题创建一个提示：
- en: title_prompt = PromptTemplate(
  id: totrans-611
  prefs: []
  type: TYPE_NORMAL
  zh: title_prompt = PromptTemplate(
- en: input_variables=["topic"],
  id: totrans-612
  prefs: []
  type: TYPE_NORMAL
  zh: input_variables=["topic"],
- en: template="""
  id: totrans-613
  prefs: []
  type: TYPE_NORMAL
  zh: template="""
- en: You are an expert journalist.
  id: totrans-614
  prefs: []
  type: TYPE_NORMAL
  zh: 你是一位专家记者。
- en: 'You need to come up with an interesting title for the following topic: {topic}'
  id: totrans-615
  prefs: []
  type: TYPE_NORMAL
  zh: 你需要为以下主题想一个有趣的主题：{topic}
- en: Answer exactly with one title
  id: totrans-616
  prefs: []
  type: TYPE_NORMAL
  zh: 精确回答一个标题
- en: '""",'
  id: totrans-617
  prefs: []
  type: TYPE_NORMAL
  zh: '""",'
- en: )
  id: totrans-618
  prefs: []
  type: TYPE_NORMAL
  zh: )
- en: 'The title_prompt above receives a single input variable: the topic for the
    title it will generate.'
  id: totrans-619
  prefs: []
  type: TYPE_NORMAL
  zh: 上面的title_prompt接收一个输入变量：它将生成的标题的主题。
- en: 'Next, you need to create a prompt for the essay as follows:'
  id: totrans-620
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，你需要按照以下方式为短文创建一个提示：
- en: essay_prompt = PromptTemplate(
  id: totrans-621
  prefs: []
  type: TYPE_NORMAL
  zh: essay_prompt = PromptTemplate(
- en: input_variables=["title"],
  id: totrans-622
  prefs: []
  type: TYPE_NORMAL
  zh: input_variables=["title"],
- en: template="""
  id: totrans-623
  prefs: []
  type: TYPE_NORMAL
  zh: template="""
- en: You are an expert nonfiction writer.
  id: totrans-624
  prefs: []
  type: TYPE_NORMAL
  zh: 你是一位专家非虚构作家。
- en: 'You need to write a short essay of 350 words for the following title:'
  id: totrans-625
  prefs: []
  type: TYPE_NORMAL
  zh: 你需要为以下标题写一篇350字的短文：
- en: '{title}'
  id: totrans-626
  prefs: []
  type: TYPE_NORMAL
  zh: '{title}'
- en: Make sure that the essay is engaging and makes the reader feel excited.
  id: totrans-627
  prefs: []
  type: TYPE_NORMAL
  zh: 确保文章引人入胜，让读者感到兴奋。
- en: '""",'
  id: totrans-628
  prefs: []
  type: TYPE_NORMAL
  zh: '""",'
- en: )
  id: totrans-629
  prefs: []
  type: TYPE_NORMAL
  zh: )
- en: 'This essay_prompt also takes a single input: the title generated by the title_prompt
    which we created before.'
  id: totrans-630
  prefs: []
  type: TYPE_NORMAL
  zh: 这个essay_prompt也接受单个输入：我们之前创建的title_prompt生成的标题。
- en: 'Now you need to create two chains, one for each prompt:'
  id: totrans-631
  prefs: []
  type: TYPE_NORMAL
  zh: 现在你需要为每个提示创建两个链：
- en: first_chain = title_prompt | llm | StrOutputParser()
  id: totrans-632
  prefs: []
  type: TYPE_NORMAL
  zh: first_chain = title_prompt | llm | StrOutputParser()
- en: second_chain = essay_prompt | llm
  id: totrans-633
  prefs: []
  type: TYPE_NORMAL
  zh: second_chain = essay_prompt | llm
- en: 'The first_chain uses the StrOutputParser() to parse the LLM response as a string,
    so you need to import the parser from LangChain:'
  id: totrans-634
  prefs: []
  type: TYPE_NORMAL
  zh: first_chain使用StrOutputParser()将LLM响应解析为字符串，因此你需要从LangChain导入解析器：
- en: from langchain_core.output_parsers import StrOutputParser
  id: totrans-635
  prefs: []
  type: TYPE_NORMAL
  zh: from langchain_core.output_parsers import StrOutputParser
- en: I will show you why the parser is needed below.
  id: totrans-636
  prefs: []
  type: TYPE_NORMAL
  zh: 我将在下面展示为什么需要解析器。
- en: 'For now, you need to combine the chains above into a single overall chain:'
  id: totrans-637
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，你需要将上面的链组合成一个单一的总体链：
- en: overall_chain = first_chain | second_chain
  id: totrans-638
  prefs: []
  type: TYPE_NORMAL
  zh: overall_chain = first_chain | second_chain
- en: Now you have a sequential chain made from the first_chain and second_chain components.
  id: totrans-639
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，你已经从first_chain和second_chain组件中创建了一个顺序链。
- en: 'The next step is to update the Streamlit interface and the if statement:'
  id: totrans-640
  prefs: []
  type: TYPE_NORMAL
  zh: 下一步是更新Streamlit界面和if语句：
- en: st.title("Essay Writer")
  id: totrans-641
  prefs: []
  type: TYPE_NORMAL
  zh: st.title("作文作家")
- en: topic = st.text_input("Input Topic")
  id: totrans-642
  prefs: []
  type: TYPE_NORMAL
  zh: topic = st.text_input("输入主题")
- en: 'if topic:'
  id: totrans-643
  prefs: []
  type: TYPE_NORMAL
  zh: 'if topic:'
- en: 'response = overall_chain.invoke({"topic": topic})'
  id: totrans-644
  prefs: []
  type: TYPE_NORMAL
  zh: 'response = overall_chain.invoke({"topic": topic})'
- en: st.write(response.content)
  id: totrans-645
  prefs: []
  type: TYPE_NORMAL
  zh: st.write(response.content)
- en: 'And you’re finished. If you run the application and ask for a topic, you’ll
    get a response similar to this:'
  id: totrans-646
  prefs: []
  type: TYPE_NORMAL
  zh: 完成后。如果你运行应用程序并请求一个主题，你会得到一个类似以下的响应：
- en: '![7 sequential result](image_rsrc1Z9.jpg)'
  id: totrans-647
  prefs: []
  type: TYPE_IMG
  zh: '![7 sequential result](image_rsrc1Z9.jpg)'
- en: Figure 33\. Simple Sequential Chain Result
  id: totrans-648
  prefs: []
  type: TYPE_NORMAL
  zh: 图33. 简单顺序链结果
- en: There are a few paragraphs cut from the result above, but you can already see
    that the first_chain prompt generates the title variable used by the second_chain
    prompt.
  id: totrans-649
  prefs: []
  type: TYPE_NORMAL
  zh: 上面的结果中删除了一些段落，但你已经可以看到，first_chain提示生成了second_chain提示使用的标题变量。
- en: Using simple sequential chains allows you to break down a complex task into
    a sequence of smaller tasks, improving the accuracy of the LLM results.
  id: totrans-650
  prefs: []
  type: TYPE_NORMAL
  zh: 使用简单的顺序链可以将复杂任务分解成一系列更小的任务，从而提高LLM结果的准确性。
- en: Using Multiple LLMs in Sequential Chain
  id: totrans-651
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 在顺序链中使用多个LLM
- en: You can also assign a different LLM for each chain you create using LCEL.
  id: totrans-652
  prefs: []
  type: TYPE_NORMAL
  zh: 你也可以使用LCEL为创建的每个链分配不同的LLM。
- en: 'The following example runs the first chain using Google Gemini, while the second
    chain uses OpenAI GPT:'
  id: totrans-653
  prefs: []
  type: TYPE_NORMAL
  zh: 以下示例使用Google Gemini运行first_chain，而second_chain使用OpenAI GPT：
- en: GOOGLE_GEMINI_KEY = config("GOOGLE_GEMINI_KEY")
  id: totrans-654
  prefs: []
  type: TYPE_NORMAL
  zh: GOOGLE_GEMINI_KEY = config("GOOGLE_GEMINI_KEY")
- en: OPENAI_KEY = config("OPENAI_KEY")
  id: totrans-655
  prefs: []
  type: TYPE_NORMAL
  zh: OPENAI_KEY = config("OPENAI_KEY")
- en: llm = ChatGoogleGenerativeAI(model="gemini-pro", google_api_key=GOOGLE_GEMINI_KEY)
  id: totrans-656
  prefs: []
  type: TYPE_NORMAL
  zh: llm = ChatGoogleGenerativeAI(model="gemini-pro", google_api_key=GOOGLE_GEMINI_KEY)
- en: llm2 = ChatOpenAI(model="gpt-4o", api_key=OPENAI_KEY)
  id: totrans-657
  prefs: []
  type: TYPE_NORMAL
  zh: llm2 = ChatOpenAI(model="gpt-4o", api_key=OPENAI_KEY)
- en: 'Use a different LLM for each chain:'
  id: totrans-658
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 为每个链使用不同的 LLM：
- en: first_chain = title_prompt | llm | StrOutputParser()
  id: totrans-659
  prefs: []
  type: TYPE_NORMAL
  zh: first_chain = title_prompt | llm | StrOutputParser()
- en: second_chain = essay_prompt | llm2
  id: totrans-660
  prefs: []
  type: TYPE_NORMAL
  zh: second_chain = essay_prompt | llm2
- en: Because LCEL is declarative, you can swap the components in the chain easily.
  id: totrans-661
  prefs: []
  type: TYPE_NORMAL
  zh: 因为 LCEL 是声明式的，所以你可以轻松地在链中交换组件。
- en: Debugging the Sequential Chains
  id: totrans-662
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 调试顺序链
- en: 'If you want to see the process of sequential chains in more detail, you can
    enable the debug mode from LangChain globals module:'
  id: totrans-663
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想更详细地查看顺序链的过程，你可以从 LangChain 全局模块中启用调试模式：
- en: from langchain.globals import set_debug
  id: totrans-664
  prefs: []
  type: TYPE_NORMAL
  zh: from langchain.globals import set_debug
- en: set_debug(True)
  id: totrans-665
  prefs: []
  type: TYPE_NORMAL
  zh: set_debug(True)
- en: When you rerun the prompt from Streamlit interface, you’ll see the debug output
    on the command line.
  id: totrans-666
  prefs: []
  type: TYPE_NORMAL
  zh: 当你在 Streamlit 界面中重新运行提示时，你将在命令行上看到调试输出。
- en: 'You can see the prompt sent by LangChain by searching for the [chain/start]
    log as follows:'
  id: totrans-667
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以通过搜索 [chain/start] 日志来查看 LangChain 发送的提示如下：
- en: '[chain/start] [chain:RunnableSequence] Entering Chain run with input:'
  id: totrans-668
  prefs: []
  type: TYPE_NORMAL
  zh: '[chain/start] [chain:RunnableSequence] 正在运行链输入：'
- en: '{'
  id: totrans-669
  prefs: []
  type: TYPE_NORMAL
  zh: '{'
- en: '"topic": "The impact of artificial intelligence for humanity"'
  id: totrans-670
  prefs: []
  type: TYPE_NORMAL
  zh: '"topic": "人工智能对人类的影响"'
- en: '}'
  id: totrans-671
  prefs: []
  type: TYPE_NORMAL
  zh: '}'
- en: 'If you search for the second chain input, you’ll see the prompt defined as
    follows:'
  id: totrans-672
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你搜索第二个链的输入，你会看到如下定义的提示：
- en: '[chain/start] [chain:RunnableSequence > prompt:PromptTemplate] Entering Prompt
    run with input:'
  id: totrans-673
  prefs: []
  type: TYPE_NORMAL
  zh: '[chain/start] [chain:RunnableSequence > prompt:PromptTemplate] 正在运行输入提示：'
- en: '{'
  id: totrans-674
  prefs: []
  type: TYPE_NORMAL
  zh: '{'
- en: '"input": "**AI''s Transformative Embrace: Shaping the Future of Humanity**"'
  id: totrans-675
  prefs: []
  type: TYPE_NORMAL
  zh: '"input": "**AI的变革性拥抱：塑造人类未来**"'
- en: '}'
  id: totrans-676
  prefs: []
  type: TYPE_NORMAL
  zh: '}'
- en: The input for the second prompt is formatted as a string because we use the
    StrOutputParser() for the first chain.
  id: totrans-677
  prefs: []
  type: TYPE_NORMAL
  zh: 第二个提示的输入格式化为字符串，因为我们为第一个链使用了 StrOutputParser()。
- en: 'If you don’t parse the output of the first chain, then the second chain prompt
    will look like this:'
  id: totrans-678
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你没有解析第一个链的输出，那么第二个链的提示将看起来像这样：
- en: '{'
  id: totrans-679
  prefs: []
  type: TYPE_NORMAL
  zh: '{'
- en: '"prompts": ['
  id: totrans-680
  prefs: []
  type: TYPE_NORMAL
  zh: '"prompts": ['
- en: '"Human: \n    You are an expert nonfiction writer.\n\n    You need to write
    a short essay of 350 words for the following title:\n\n    content=\"**AI''s Transformative
    Embrace: Shaping the Future of Humanity**\" response_metadata={''prompt_feedback'':
    {''block_reason'': 0, ''safety_ratings'': []}, ''finish_reason'': ''STOP'', ''safety_ratings'':
    [{''category'': ''HARM_CATEGORY_SEXUALLY_EXPLICIT'', ''probability'': ''NEGLIGIBLE'',
    ''blocked'': False}, {''category'': ''HARM_CATEGORY_HATE_SPEECH'', ''probability'':
    ''NEGLIGIBLE'', ''blocked'': False}, {''category'': ''HARM_CATEGORY_HARASSMENT'',
    ''probability'': ''NEGLIGIBLE'', ''blocked'': False}, {''category'': ''HARM_CATEGORY_DANGEROUS_CONTENT'',
    ''probability'': ''NEGLIGIBLE'', ''blocked'': False}]} id=''run-6e718aba-b2a6-4dfb-b9e0-8dc1e338308c-0''\n\n    Make
    sure that the essay is engaging and make the reader feel excited."'
  id: totrans-681
  prefs: []
  type: TYPE_NORMAL
  zh: '"人类：\n    你是一位专家非虚构作家。\n\n    你需要为以下标题撰写一篇350字的短文：\n\n    content=\"**AI的变革性拥抱：塑造人类未来**\"
    response_metadata={''prompt_feedback'': {''block_reason'': 0, ''safety_ratings'':
    []}, ''finish_reason'': ''STOP'', ''safety_ratings'': [{''category'': ''HARM_CATEGORY_SEXUALLY_EXPLICIT'',
    ''probability'': ''NEGLIGIBLE'', ''blocked'': False}, {''category'': ''HARM_CATEGORY_HATE_SPEECH'',
    ''probability'': ''NEGLIGIBLE'', ''blocked'': False}, {''category'': ''HARM_CATEGORY_HARASSMENT'',
    ''probability'': ''NEGLIGIBLE'', ''blocked'': False}, {''category'': ''HARM_CATEGORY_DANGEROUS_CONTENT'',
    ''probability'': ''NEGLIGIBLE'', ''blocked'': False}]} id=''run-6e718aba-b2a6-4dfb-b9e0-8dc1e338308c-0''\n\n    确保文章引人入胜，让读者感到兴奋。"'
- en: ']'
  id: totrans-682
  prefs: []
  type: TYPE_NORMAL
  zh: ']'
- en: '}'
  id: totrans-683
  prefs: []
  type: TYPE_NORMAL
  zh: '}'
- en: Here, the whole response object from the first chain is included in the prompt,
    such as the response_metadata, and id attributes.
  id: totrans-684
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，包括了第一个链的整个响应对象，例如 response_metadata 和 id 属性。
- en: While the LLM is smart enough to guess the title from the response object, let’s
    minimize this kind of imperfect prompt as much as possible.
  id: totrans-685
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然 LLM 足够智能，可以从响应对象中猜测标题，但让我们尽可能减少这种不完美的提示。
- en: Summary
  id: totrans-686
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: The code for this chapter is available in the folder 07_LCEL from the book source
    code.
  id: totrans-687
  prefs: []
  type: TYPE_NORMAL
  zh: 本章的代码可在书籍源代码的 07_LCEL 文件夹中找到。
- en: In this chapter, you’ve learned about the LangChain Expression Language, which
    can be used to compose LangChain components in a declarative way.
  id: totrans-688
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，你了解了 LangChain 表达式语言，它可以用来以声明式的方式组合 LangChain 组件。
- en: 'A chain is simply a wrapper for these LangChain components:'
  id: totrans-689
  prefs: []
  type: TYPE_NORMAL
  zh: 链只是一个这些 LangChain 组件的包装器：
- en: The prompt template
  id: totrans-690
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提示模板
- en: The LLM to use
  id: totrans-691
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 要使用的 LLM
- en: The parser to process the output from LLM
  id: totrans-692
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 处理 LLM 输出的解析器
- en: The components of a chain are interchangeable, meaning you can use the GPT model
    for the first prompt, and then use the Gemini model for the second prompt, as
    shown above.
  id: totrans-693
  prefs: []
  type: TYPE_NORMAL
  zh: 链的组件可以互换，这意味着你可以为第一个提示使用 GPT 模型，然后为第二个提示使用 Gemini 模型，如上所示。
- en: By using LCEL, you can create advanced workflows and interact with Large Language
    Models to solve a complex task.
  id: totrans-694
  prefs: []
  type: TYPE_NORMAL
  zh: 通过使用LCEL，你可以创建高级工作流程并与大型语言模型交互以解决复杂任务。
- en: In the next chapter, I will show you how to create a regular sequential chain.
  id: totrans-695
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一章中，我将向你展示如何创建常规顺序链。
- en: 'Chapter 8: Regular Sequential Chains'
  id: totrans-696
  prefs: []
  type: TYPE_NORMAL
  zh: 第8章：常规顺序链
- en: A regular sequential chain is a more general form of sequential chains that
    allow multiple inputs and outputs.
  id: totrans-697
  prefs: []
  type: TYPE_NORMAL
  zh: 常规顺序链是顺序链的更通用形式，允许多个输入和输出。
- en: 'The input for the next chain is usually a mix of the output from the previous
    chain and another source like this:'
  id: totrans-698
  prefs: []
  type: TYPE_NORMAL
  zh: 下一个链的输入通常是前一个链的输出和另一个来源（如本例所示）的混合：
- en: '![8 sc](image_rsrc1ZA.jpg)'
  id: totrans-699
  prefs: []
  type: TYPE_IMG
  zh: '![8 sc](image_rsrc1ZA.jpg)'
- en: Figure 34\. Sequential Chain Illustration
  id: totrans-700
  prefs: []
  type: TYPE_NORMAL
  zh: 图34.顺序链示意图
- en: This chain is a little more complicated than a simple sequential chain because
    we need to track multiple inputs and outputs.
  id: totrans-701
  prefs: []
  type: TYPE_NORMAL
  zh: 这个链比简单的顺序链要复杂一些，因为我们需要跟踪多个输入和输出。
- en: 'For example, suppose you change the essay_prompt from the previous chapter
    to have two input_variables as follows:'
  id: totrans-702
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，假设你将上一章的essay_prompt更改为具有两个input_variables，如下所示：
- en: essay_prompt = PromptTemplate(
  id: totrans-703
  prefs: []
  type: TYPE_NORMAL
  zh: essay_prompt = PromptTemplate(
- en: input_variables=["title", "emotion"],
  id: totrans-704
  prefs: []
  type: TYPE_NORMAL
  zh: input_variables=["title", "emotion"],
- en: template="""
  id: totrans-705
  prefs: []
  type: TYPE_NORMAL
  zh: template="""
- en: You are an expert nonfiction writer.
  id: totrans-706
  prefs: []
  type: TYPE_NORMAL
  zh: 你是一位非虚构写作专家。
- en: 'You need to write a short essay of 350 words for the following title:'
  id: totrans-707
  prefs: []
  type: TYPE_NORMAL
  zh: 你需要为以下标题写一篇350字的短文：
- en: '{title}'
  id: totrans-708
  prefs: []
  type: TYPE_NORMAL
  zh: '{title}'
- en: Make sure that the essay is engaging and make the reader feel {emotion}.
  id: totrans-709
  prefs: []
  type: TYPE_NORMAL
  zh: 确保文章引人入胜，让读者感受到{emotion}。
- en: '""",'
  id: totrans-710
  prefs: []
  type: TYPE_NORMAL
  zh: '""",'
- en: )
  id: totrans-711
  prefs: []
  type: TYPE_NORMAL
  zh: )
- en: The emotion input required by the essay prompt doesn’t come from the first chain,
    which only returns the title variable.
  id: totrans-712
  prefs: []
  type: TYPE_NORMAL
  zh: 文章提示所需的情感输入不来自第一个链，它只返回标题变量。
- en: 'To inject the emotion input, you need to pipe a lambda function between the
    first_chain and second_chain when creating the overall_chain as follows:'
  id: totrans-713
  prefs: []
  type: TYPE_NORMAL
  zh: 要注入情感输入，你需要在创建overall_chain时在first_chain和second_chain之间传递一个lambda函数，如下所示：
- en: overall_chain = (
  id: totrans-714
  prefs: []
  type: TYPE_NORMAL
  zh: overall_chain = (
- en: first_chain
  id: totrans-715
  prefs: []
  type: TYPE_NORMAL
  zh: first_chain
- en: '| (lambda title: {"title": title, "emotion": emotion})'
  id: totrans-716
  prefs: []
  type: TYPE_NORMAL
  zh: '| (lambda title: {"title": title, "emotion": emotion})'
- en: '| second_chain'
  id: totrans-717
  prefs: []
  type: TYPE_NORMAL
  zh: '| second_chain'
- en: )
  id: totrans-718
  prefs: []
  type: TYPE_NORMAL
  zh: )
- en: This way, the title input is obtained from the output of the first_chain, while
    the emotion input is from another source.
  id: totrans-719
  prefs: []
  type: TYPE_NORMAL
  zh: 这样，标题输入来自first_chain的输出，而情感输入来自另一个来源。
- en: 'You can add a text input for the emotion input next:'
  id: totrans-720
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以添加一个文本输入来获取情感输入：
- en: st.title("Essay Writer")
  id: totrans-721
  prefs: []
  type: TYPE_NORMAL
  zh: st.title("文章撰写者")
- en: topic = st.text_input("Input Topic")
  id: totrans-722
  prefs: []
  type: TYPE_NORMAL
  zh: topic = st.text_input("输入主题")
- en: emotion = st.text_input("Input Emotion")
  id: totrans-723
  prefs: []
  type: TYPE_NORMAL
  zh: emotion = st.text_input("输入情感")
- en: 'if topic and emotion:'
  id: totrans-724
  prefs: []
  type: TYPE_NORMAL
  zh: 'if topic and emotion:'
- en: 'response = overall_chain.invoke({"topic": topic})'
  id: totrans-725
  prefs: []
  type: TYPE_NORMAL
  zh: 'response = overall_chain.invoke({"topic": topic})'
- en: st.write(response.content)
  id: totrans-726
  prefs: []
  type: TYPE_NORMAL
  zh: st.write(response.content)
- en: And now you have multiple inputs, with one input from outside of the first chain
    result.
  id: totrans-727
  prefs: []
  type: TYPE_NORMAL
  zh: 现在你有多个输入，其中一个输入来自第一个链的结果之外。
- en: Format the Output Variables
  id: totrans-728
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 格式化输出变量
- en: A sequential chain usually also tracks multiple output variables.
  id: totrans-729
  prefs: []
  type: TYPE_NORMAL
  zh: 顺序链通常也会跟踪多个输出变量。
- en: Advanced LLMs like GPT-4 and Gemini can help us format the output as multiple
    variables simply by adding a specific instruction in the prompt template.
  id: totrans-730
  prefs: []
  type: TYPE_NORMAL
  zh: 高级LLM（如GPT-4和Gemini）可以通过在提示模板中添加特定指令来帮助我们格式化输出为多个变量。
- en: 'Back to the essay_prompt, you can instruct the LLM to send the output in JSON
    format:'
  id: totrans-731
  prefs: []
  type: TYPE_NORMAL
  zh: 回到essay_prompt，你可以指示LLM以JSON格式发送输出：
- en: essay_prompt = PromptTemplate(
  id: totrans-732
  prefs: []
  type: TYPE_NORMAL
  zh: essay_prompt = PromptTemplate(
- en: input_variables=["title", "emotion"],
  id: totrans-733
  prefs: []
  type: TYPE_NORMAL
  zh: input_variables=["title", "emotion"],
- en: template="""
  id: totrans-734
  prefs: []
  type: TYPE_NORMAL
  zh: template="""
- en: You are an expert nonfiction writer.
  id: totrans-735
  prefs: []
  type: TYPE_NORMAL
  zh: 你是一位非虚构写作专家。
- en: 'You need to write a short essay of 350 words for the following title:'
  id: totrans-736
  prefs: []
  type: TYPE_NORMAL
  zh: 你需要为以下标题写一篇350字的短文：
- en: '{title}'
  id: totrans-737
  prefs: []
  type: TYPE_NORMAL
  zh: '{title}'
- en: Make sure that the essay is engaging and makes the reader feel {emotion}.
  id: totrans-738
  prefs: []
  type: TYPE_NORMAL
  zh: 确保文章引人入胜，让读者感受到{emotion}。
- en: 'Format the output as a JSON object with three keys: ''title'', ''emotion'',
    ''essay'' and fill them with respective values'
  id: totrans-739
  prefs: []
  type: TYPE_NORMAL
  zh: 将输出格式化为具有三个键的JSON对象：'title'、'emotion'、'essay'，并分别填充相应的值
- en: '""",'
  id: totrans-740
  prefs: []
  type: TYPE_NORMAL
  zh: '""",'
- en: )
  id: totrans-741
  prefs: []
  type: TYPE_NORMAL
  zh: )
- en: Now that the LLM is instructed to format the output as a JSON object, you need
    to parse the output using the JsonOutputParser.
  id: totrans-742
  prefs: []
  type: TYPE_NORMAL
  zh: 现在LLM被指示将输出格式化为JSON对象，你需要使用JsonOutputParser来解析输出。
- en: 'Pipe the JsonOutputParser to the second_chain as shown below:'
  id: totrans-743
  prefs: []
  type: TYPE_NORMAL
  zh: 如下所示将JsonOutputParser管道连接到second_chain：
- en: from langchain_core.output_parsers import StrOutputParser, JsonOutputParser
  id: totrans-744
  prefs: []
  type: TYPE_NORMAL
  zh: from langchain_core.output_parsers import StrOutputParser, JsonOutputParser
- en: '...'
  id: totrans-745
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '...'
- en: first_chain = title_prompt | llm | StrOutputParser()
  id: totrans-746
  prefs: []
  type: TYPE_NORMAL
  zh: first_chain = title_prompt | llm | StrOutputParser()
- en: second_chain = essay_prompt | llm | JsonOutputParser()
  id: totrans-747
  prefs: []
  type: TYPE_NORMAL
  zh: second_chain = essay_prompt | llm | JsonOutputParser()
- en: 'Next, change the st.write() method to write the response object directly:'
  id: totrans-748
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，将 st.write() 方法更改为直接写入响应对象：
- en: 'if topic and emotion:'
  id: totrans-749
  prefs: []
  type: TYPE_NORMAL
  zh: 'if topic and emotion:'
- en: 'response = overall_chain.invoke({"topic": topic})'
  id: totrans-750
  prefs: []
  type: TYPE_NORMAL
  zh: 'response = overall_chain.invoke({"topic": topic})'
- en: st.write(response)
  id: totrans-751
  prefs: []
  type: TYPE_NORMAL
  zh: st.write(response)
- en: 'Now you can run the application and see that the output is indeed in JSON format:'
  id: totrans-752
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，你可以运行应用程序并看到输出确实是以 JSON 格式：
- en: '![8 json output](image_rsrc1ZB.jpg)'
  id: totrans-753
  prefs: []
  type: TYPE_IMG
  zh: '![8 json 输出](image_rsrc1ZB.jpg)'
- en: Figure 35\. Receiving JSON Output
  id: totrans-754
  prefs: []
  type: TYPE_NORMAL
  zh: 图 35. 接收 JSON 输出
- en: 'If you want to write each output variable, you can access them directly as
    follows:'
  id: totrans-755
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想写入每个输出变量，你可以直接按如下方式访问它们：
- en: 'if topic and emotion:'
  id: totrans-756
  prefs: []
  type: TYPE_NORMAL
  zh: 'if topic and emotion:'
- en: 'response = overall_chain.invoke({"topic": topic})'
  id: totrans-757
  prefs: []
  type: TYPE_NORMAL
  zh: 'response = overall_chain.invoke({"topic": topic})'
- en: st.write(response.title)
  id: totrans-758
  prefs: []
  type: TYPE_NORMAL
  zh: st.write(response.title)
- en: st.write(response.emotion)
  id: totrans-759
  prefs: []
  type: TYPE_NORMAL
  zh: st.write(response.emotion)
- en: st.write(response.essay)
  id: totrans-760
  prefs: []
  type: TYPE_NORMAL
  zh: st.write(response.essay)
- en: Now you have a sequential chain that tracks multiple inputs and outputs. Nice
    work!
  id: totrans-761
  prefs: []
  type: TYPE_NORMAL
  zh: 现在你有一个跟踪多个输入和输出的顺序链。做得好！
- en: Summary
  id: totrans-762
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: The code for this chapter is available in the folder 08_Sequential_Chain from
    the book source code.
  id: totrans-763
  prefs: []
  type: TYPE_NORMAL
  zh: 本章的代码可在书籍源代码的 08_Sequential_Chain 文件夹中找到。
- en: When you create a sequential chain, you can add extra inputs to the next chain
    that are not sourced from the previous chain.
  id: totrans-764
  prefs: []
  type: TYPE_NORMAL
  zh: 当你创建一个顺序链时，你可以向下一个链添加额外的输入，这些输入不是来自上一个链。
- en: Using a lambda function, you can add custom logic before running the chain,
    enabling you to send previous chain results together with extra inputs.
  id: totrans-765
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 lambda 函数，你可以在运行链之前添加自定义逻辑，这样你就可以将上一个链的结果与额外的输入一起发送。
- en: You can also format the output as a JSON object to make the response better
    organized and easier to process.
  id: totrans-766
  prefs: []
  type: TYPE_NORMAL
  zh: 你还可以将输出格式化为 JSON 对象，以便使响应更有组织且更容易处理。
- en: 'Chapter 9: Implementing Chat History in LangChain'
  id: totrans-767
  prefs: []
  type: TYPE_NORMAL
  zh: 第九章：在 LangChain 中实现聊天历史
- en: So far, the LLM took the question we asked it and gave an answer retrieved from
    the training data.
  id: totrans-768
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，LLM 已经根据我们提出的问题从训练数据中检索到了答案。
- en: 'Going back to the simple question and answer application in Chapter 5, you
    can try to ask the LLM a question such as:'
  id: totrans-769
  prefs: []
  type: TYPE_NORMAL
  zh: 回到第五章中的简单问答应用，你可以尝试向 LLM 提出一个问题，例如：
- en: When was the last FIFA World Cup held?
  id: totrans-770
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 世界杯最后一次是在什么时候举行的？
- en: Multiply the year by 2
  id: totrans-771
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将年份乘以 2
- en: At the time of this writing, the last FIFA World Cup was held in 2022\. Reading
    the second prompt above, we can understand that the 'year' refers to '2022'.
  id: totrans-772
  prefs: []
  type: TYPE_NORMAL
  zh: 在撰写本文时，上一次 FIFA 世界杯是在 2022 年举行的。阅读上面的第二个提示，我们可以理解 'year' 指的是 '2022'。
- en: However, because the LLM has no awareness of the previous interaction, the answer
    won’t be related.
  id: totrans-773
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，由于 LLM 没有意识到之前的交互，答案将不会相关。
- en: 'With GPT, the LLM refers to the current year instead of the last FIFA World
    Cup year:'
  id: totrans-774
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 GPT，LLM 指的是当前年份而不是上一次 FIFA 世界杯年份：
- en: '![9 no history](image_rsrc1ZC.jpg)'
  id: totrans-775
  prefs: []
  type: TYPE_IMG
  zh: '![9 无历史](image_rsrc1ZC.jpg)'
- en: Figure 36\. LLM Out of Context Example
  id: totrans-776
  prefs: []
  type: TYPE_NORMAL
  zh: 图 36. LLM 无上下文示例
- en: The LLM can’t understand that we are making a follow-up instruction to the previous
    question.
  id: totrans-777
  prefs: []
  type: TYPE_NORMAL
  zh: LLM 无法理解我们正在对上一个问题进行后续指令。
- en: To address this issue, you need to save the previous messages and use them when
    sending a new prompt.
  id: totrans-778
  prefs: []
  type: TYPE_NORMAL
  zh: 为了解决这个问题，你需要保存之前的消息并在发送新提示时使用它们。
- en: To follow along with this chapter, you can copy the code from Chapter 5 and
    use it as a starter.
  id: totrans-779
  prefs: []
  type: TYPE_NORMAL
  zh: 为了跟随本章内容，你可以复制第五章的代码并将其用作起点。
- en: Creating a Chat Prompt Template
  id: totrans-780
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 创建聊天提示模板
- en: First, you need to create a chat prompt template that has the chat history injected
    into it.
  id: totrans-781
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，你需要创建一个聊天提示模板，其中包含注入的聊天历史。
- en: A chat prompt template is different from the usual prompt template. It accepts
    a list of messages, and each message can be associated with a specific role.
  id: totrans-782
  prefs: []
  type: TYPE_NORMAL
  zh: 聊天提示模板与通常的提示模板不同。它接受一个消息列表，并且每个消息都可以与一个特定的角色相关联。
- en: 'Here’s an example of a chat prompt template:'
  id: totrans-783
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是一个聊天提示模板的示例：
- en: from langchain_core.prompts import ChatPromptTemplate
  id: totrans-784
  prefs: []
  type: TYPE_NORMAL
  zh: from langchain_core.prompts import ChatPromptTemplate
- en: chat_template = ChatPromptTemplate.from_messages(
  id: totrans-785
  prefs: []
  type: TYPE_NORMAL
  zh: chat_template = ChatPromptTemplate.from_messages(
- en: '['
  id: totrans-786
  prefs: []
  type: TYPE_NORMAL
  zh: '['
- en: ("system", "You are a helpful AI bot. Your name is {name}."),
  id: totrans-787
  prefs: []
  type: TYPE_NORMAL
  zh: ("system", "You are a helpful AI bot. Your name is {name}."),
- en: ("human", "Hello, how are you doing?"),
  id: totrans-788
  prefs: []
  type: TYPE_NORMAL
  zh: ("human", "Hello, how are you doing?"),
- en: ("ai", "I'm doing well, thanks!"),
  id: totrans-789
  prefs: []
  type: TYPE_NORMAL
  zh: ("ai", "I'm doing well, thanks!"),
- en: ("human", "{user_input}"),
  id: totrans-790
  prefs: []
  type: TYPE_NORMAL
  zh: ("human", "{user_input}"),
- en: ']'
  id: totrans-791
  prefs: []
  type: TYPE_NORMAL
  zh: ']'
- en: )
  id: totrans-792
  prefs: []
  type: TYPE_NORMAL
  zh: )
- en: In the example above, the messages are associated with the 'system', 'human',
    and 'ai' roles.
  id: totrans-793
  prefs: []
  type: TYPE_NORMAL
  zh: 在上面的示例中，消息与 'system'、'human' 和 'ai' 角色相关联。
- en: 'You can use the ChatPromptTemplate and MessagesPlaceholder classes to create
    a prompt that accepts a chat history as follows:'
  id: totrans-794
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以使用 ChatPromptTemplate 和 MessagesPlaceholder 类创建一个接受聊天历史的提示，如下所示：
- en: from langchain_core.prompts import ChatPromptTemplate, MessagesPlaceholder
  id: totrans-795
  prefs: []
  type: TYPE_NORMAL
  zh: from langchain_core.prompts import ChatPromptTemplate, MessagesPlaceholder
- en: prompt = ChatPromptTemplate.from_messages(
  id: totrans-796
  prefs: []
  type: TYPE_NORMAL
  zh: prompt = ChatPromptTemplate.from_messages(
- en: '['
  id: totrans-797
  prefs: []
  type: TYPE_NORMAL
  zh: '['
- en: (
  id: totrans-798
  prefs: []
  type: TYPE_NORMAL
  zh: (
- en: '"system",'
  id: totrans-799
  prefs: []
  type: TYPE_NORMAL
  zh: '"system",'
- en: '"You are an AI chatbot having a conversation with a human. Use the following
    context to understand the human question. Do not include emojis in your answer.
    ",'
  id: totrans-800
  prefs: []
  type: TYPE_NORMAL
  zh: '"你是一个与人类进行对话的人工智能聊天机器人。使用以下上下文来理解人类的问题。不要在回答中包含表情符号。",'
- en: ),
  id: totrans-801
  prefs: []
  type: TYPE_NORMAL
  zh: ),
- en: MessagesPlaceholder(variable_name="chat_history"),
  id: totrans-802
  prefs: []
  type: TYPE_NORMAL
  zh: MessagesPlaceholder(variable_name="chat_history"),
- en: ("human", "{input}"),
  id: totrans-803
  prefs: []
  type: TYPE_NORMAL
  zh: ("human", "{input}"),
- en: ']'
  id: totrans-804
  prefs: []
  type: TYPE_NORMAL
  zh: ']'
- en: )
  id: totrans-805
  prefs: []
  type: TYPE_NORMAL
  zh: )
- en: The MessagesPlaceholder class acts as an open parameter from which you can inject
    the chat history, which is what we’re going to do next.
  id: totrans-806
  prefs: []
  type: TYPE_NORMAL
  zh: MessagesPlaceholder类充当一个开放参数，你可以从中注入聊天历史，这就是我们接下来要做的。
- en: Saving Messages in Streamlit Chat History
  id: totrans-807
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 在Streamlit聊天历史中保存消息
- en: The Streamlit session state is used to store variables as long as the Streamlit
    application is running.
  id: totrans-808
  prefs: []
  type: TYPE_NORMAL
  zh: Streamlit会话状态用于在Streamlit应用程序运行期间存储变量。
- en: 'To save chat history in Streamlit, you need to import the StreamlitChatMessageHistory
    class, and instantiate an object from that class:'
  id: totrans-809
  prefs: []
  type: TYPE_NORMAL
  zh: 要在Streamlit中保存聊天历史，你需要导入StreamlitChatMessageHistory类，并从这个类中实例化一个对象：
- en: from langchain_community.chat_message_histories import StreamlitChatMessageHistory
  id: totrans-810
  prefs: []
  type: TYPE_NORMAL
  zh: from langchain_community.chat_message_histories import StreamlitChatMessageHistory
- en: other code ...
  id: totrans-811
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 其他代码 ...
- en: chain = prompt | llm
  id: totrans-812
  prefs: []
  type: TYPE_NORMAL
  zh: chain = prompt | llm
- en: history = StreamlitChatMessageHistory()
  id: totrans-813
  prefs: []
  type: TYPE_NORMAL
  zh: history = StreamlitChatMessageHistory()
- en: Next, you need to inject the history stored in Streamlit into the chain.
  id: totrans-814
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，你需要将存储在Streamlit中的历史记录注入到链中。
- en: 'This can be done by using the RunnableWithMessageHistory class, which is a
    wrapper around a chain that injects the chat history for you:'
  id: totrans-815
  prefs: []
  type: TYPE_NORMAL
  zh: 这可以通过使用RunnableWithMessageHistory类来完成，它是一个包装了注入聊天历史的链的包装器：
- en: from langchain_core.runnables.history import RunnableWithMessageHistory
  id: totrans-816
  prefs: []
  type: TYPE_NORMAL
  zh: from langchain_core.runnables.history import RunnableWithMessageHistory
- en: other code...
  id: totrans-817
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 其他代码...
- en: chain = prompt | llm
  id: totrans-818
  prefs: []
  type: TYPE_NORMAL
  zh: chain = prompt | llm
- en: history = StreamlitChatMessageHistory()
  id: totrans-819
  prefs: []
  type: TYPE_NORMAL
  zh: history = StreamlitChatMessageHistory()
- en: chain_with_history = RunnableWithMessageHistory(
  id: totrans-820
  prefs: []
  type: TYPE_NORMAL
  zh: chain_with_history = RunnableWithMessageHistory(
- en: chain,
  id: totrans-821
  prefs: []
  type: TYPE_NORMAL
  zh: chain,
- en: 'lambda session_id: history,'
  id: totrans-822
  prefs: []
  type: TYPE_NORMAL
  zh: 'lambda session_id: history,'
- en: input_messages_key="input",
  id: totrans-823
  prefs: []
  type: TYPE_NORMAL
  zh: input_messages_key="input",
- en: history_messages_key="chat_history",
  id: totrans-824
  prefs: []
  type: TYPE_NORMAL
  zh: history_messages_key="chat_history",
- en: )
  id: totrans-825
  prefs: []
  type: TYPE_NORMAL
  zh: )
- en: When creating the RunnableWithMessageHistory object, you need to pass the chain
    that you want to inject history into and a function that returns the chat history.
  id: totrans-826
  prefs: []
  type: TYPE_NORMAL
  zh: 在创建RunnableWithMessageHistory对象时，你需要传递你想要注入历史的链和一个返回聊天历史的函数。
- en: The input_messages_key is the input key that exists in the prompt, while history_messages_key
    is the variable that accepts the history (it should be the same as the variable_name
    passed to MessagesPlaceholder before)
  id: totrans-827
  prefs: []
  type: TYPE_NORMAL
  zh: The input_messages_key是提示中存在的输入键，而history_messages_key是接受历史记录的变量（它应该与之前传递给MessagesPlaceholder的variable_name相同）
- en: 'Now that the chain_with_history object is completed, you can modify the Streamlit
    interface and the if statement as follows:'
  id: totrans-828
  prefs: []
  type: TYPE_NORMAL
  zh: 现在chain_with_history对象已经完成，你可以修改Streamlit界面和if语句如下：
- en: st.title("Q & A With AI")
  id: totrans-829
  prefs: []
  type: TYPE_NORMAL
  zh: st.title("与AI的问答")
- en: question = st.text_input("Your Question")
  id: totrans-830
  prefs: []
  type: TYPE_NORMAL
  zh: question = st.text_input("你的问题")
- en: 'if question:'
  id: totrans-831
  prefs: []
  type: TYPE_NORMAL
  zh: 'if question:'
- en: response = chain_with_history.invoke(
  id: totrans-832
  prefs: []
  type: TYPE_NORMAL
  zh: response = chain_with_history.invoke(
- en: '{"input": question}, config={"configurable": {"session_id": "any"}}'
  id: totrans-833
  prefs: []
  type: TYPE_NORMAL
  zh: '{"input": question}, config={"configurable": {"session_id": "any"}}'
- en: )
  id: totrans-834
  prefs: []
  type: TYPE_NORMAL
  zh: )
- en: st.write(response.content)
  id: totrans-835
  prefs: []
  type: TYPE_NORMAL
  zh: st.write(response.content)
- en: When invoking the chain_with_history object, you need to pass the session_id
    key into the config parameter as shown above.
  id: totrans-836
  prefs: []
  type: TYPE_NORMAL
  zh: 当调用chain_with_history对象时，你需要将session_id键传递到config参数中，如上所示。
- en: The session_id can be of any string value.
  id: totrans-837
  prefs: []
  type: TYPE_NORMAL
  zh: session_id可以是任何字符串值。
- en: 'Now you can test the application by giving a follow-up question:'
  id: totrans-838
  prefs: []
  type: TYPE_NORMAL
  zh: 现在你可以通过提出一个后续问题来测试应用程序：
- en: 'Q: When was the last FIFA World Cup held?'
  id: totrans-839
  prefs: []
  type: TYPE_NORMAL
  zh: 'Q: 上一个FIFA世界杯是在什么时候举办的？'
- en: 'A: The last FIFA World Cup was held in 2022.'
  id: totrans-840
  prefs: []
  type: TYPE_NORMAL
  zh: 'A: 上一个FIFA世界杯是在2022年举办的。'
- en: 'Q: Multiply the year by 2'
  id: totrans-841
  prefs: []
  type: TYPE_NORMAL
  zh: 'Q: 将年份乘以2'
- en: 'A: 2022 multiplied by 2 is 4044.'
  id: totrans-842
  prefs: []
  type: TYPE_NORMAL
  zh: 'A: 2022乘以2等于4044。'
- en: Because the chat history is injected into the prompt, the LLM can put the second
    question in the context of the first.
  id: totrans-843
  prefs: []
  type: TYPE_NORMAL
  zh: 因为聊天历史被注入到提示中，LLM可以将第二个问题放在第一个问题的上下文中。
- en: 'If you activate the debug mode with set_debug(True), you’ll see the prompt
    as shown below:'
  id: totrans-844
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你通过set_debug(True)激活调试模式，你将看到如下提示：
- en: '"prompts": ['
  id: totrans-845
  prefs: []
  type: TYPE_NORMAL
  zh: '"prompts": ['
- en: '"System: You are an AI chatbot having a conversation with a human. Use the
    following context to understand the human question. Do not include emojis in your
    answer. \nHuman: When was the last FIFA World Cup held?\nAI: The last FIFA World
    Cup was held in 2022\. \n\nHuman: Multiply the year by 2"'
  id: totrans-846
  prefs: []
  type: TYPE_NORMAL
  zh: '"系统：你是一个与人类进行对话的人工智能聊天机器人。使用以下上下文来理解人类的问题。在回答中不要包含表情符号。\n人类：上一次FIFA世界杯是在哪一年举行的？\nAI：上一次FIFA世界杯是在2022年。\n\n人类：将年份乘以2"'
- en: ']'
  id: totrans-847
  prefs: []
  type: TYPE_NORMAL
  zh: ']'
- en: As you can see, the RunnableWithMessageHistory injects the history right where
    you put the MessagesPlaceholder() in the prompt.
  id: totrans-848
  prefs: []
  type: TYPE_NORMAL
  zh: 如你所见，RunnableWithMessageHistory在提示中放置MessagesPlaceholder()的地方注入了历史记录。
- en: Showing Chat History
  id: totrans-849
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 显示聊天历史
- en: 'To show the chat history, you need to add a for loop below the st.write() method:'
  id: totrans-850
  prefs: []
  type: TYPE_NORMAL
  zh: 要显示聊天历史，你需要在st.write()方法下方添加一个for循环：
- en: st.write(response.content)
  id: totrans-851
  prefs: []
  type: TYPE_NORMAL
  zh: st.write(response.content)
- en: 'for message in st.session_state["langchain_messages"]:'
  id: totrans-852
  prefs: []
  type: TYPE_NORMAL
  zh: 'for message in st.session_state["langchain_messages"]:'
- en: 'if message.type == "human":'
  id: totrans-853
  prefs: []
  type: TYPE_NORMAL
  zh: 'if message.type == "human":'
- en: 'st.write("Question: " + message.content)'
  id: totrans-854
  prefs: []
  type: TYPE_NORMAL
  zh: 'st.write("问题: " + message.content)'
- en: 'else:'
  id: totrans-855
  prefs: []
  type: TYPE_NORMAL
  zh: 'else:'
- en: 'st.write("Answer: " + message.content)'
  id: totrans-856
  prefs: []
  type: TYPE_NORMAL
  zh: 'st.write("答案: " + message.content)'
- en: The for loop above iterates over the st.session_state["langchain_messages"]
    list.
  id: totrans-857
  prefs: []
  type: TYPE_NORMAL
  zh: 上面的for循环遍历st.session_state["langchain_messages"]列表。
- en: We also check on the type of the message to prepend the 'Question' and 'Answer'
    string before the message content.
  id: totrans-858
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还检查了消息的类型，在消息内容之前添加了'问题'和'答案'字符串。
- en: 'Now you should see the chat history as follows:'
  id: totrans-859
  prefs: []
  type: TYPE_NORMAL
  zh: 现在你应该看到以下聊天历史：
- en: '![9 chat history](image_rsrc1ZD.jpg)'
  id: totrans-860
  prefs: []
  type: TYPE_IMG
  zh: '![9 chat history](image_rsrc1ZD.jpg)'
- en: Figure 37\. Chat History Shown
  id: totrans-861
  prefs: []
  type: TYPE_NORMAL
  zh: 图37. 显示的聊天历史
- en: Nice work so far!
  id: totrans-862
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止做得很好！
- en: Cloning ChatGPT With Streamlit Chat Input
  id: totrans-863
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用Streamlit Chat Input克隆ChatGPT
- en: Now that we’ve added chat history to our application, we can create an interface
    that looks like ChatGPT with the help of Streamlit.
  id: totrans-864
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经将聊天历史添加到我们的应用程序中，我们可以借助Streamlit创建一个看起来像ChatGPT的界面。
- en: 'Instead of using text_input for the text box, you need to use chat_input as
    follows:'
  id: totrans-865
  prefs: []
  type: TYPE_NORMAL
  zh: 在文本框中不使用text_input，你需要使用chat_input如下所示：
- en: question = st.chat_input("Your Question")
  id: totrans-866
  prefs: []
  type: TYPE_NORMAL
  zh: question = st.chat_input("你的问题")
- en: 'Next, use the with st.chat_message() method and pass the role ''user'' to write
    down the question:'
  id: totrans-867
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，使用with st.chat_message()方法并将角色'user'传递给写入问题：
- en: question = st.chat_input("Your Question")
  id: totrans-868
  prefs: []
  type: TYPE_NORMAL
  zh: question = st.chat_input("你的问题")
- en: 'if question:'
  id: totrans-869
  prefs: []
  type: TYPE_NORMAL
  zh: 如果有疑问：
- en: 'with st.chat_message("user"):'
  id: totrans-870
  prefs: []
  type: TYPE_NORMAL
  zh: 'with st.chat_message("user"):'
- en: st.markdown(question)
  id: totrans-871
  prefs: []
  type: TYPE_NORMAL
  zh: st.markdown(question)
- en: 'Then replace the invoke() call with stream() as follows:'
  id: totrans-872
  prefs: []
  type: TYPE_NORMAL
  zh: 然后将invoke()调用替换为如下所示的stream()：
- en: 'if question:'
  id: totrans-873
  prefs: []
  type: TYPE_NORMAL
  zh: 'if question:'
- en: 'with st.chat_message("user"):'
  id: totrans-874
  prefs: []
  type: TYPE_NORMAL
  zh: 'with st.chat_message("user"):'
- en: st.markdown(question)
  id: totrans-875
  prefs: []
  type: TYPE_NORMAL
  zh: st.markdown(question)
- en: response = chain_with_history.stream(
  id: totrans-876
  prefs: []
  type: TYPE_NORMAL
  zh: response = chain_with_history.stream(
- en: '{"input": question}, config={"configurable": {"session_id": "any"}}'
  id: totrans-877
  prefs: []
  type: TYPE_NORMAL
  zh: '{"input": question}, config={"configurable": {"session_id": "any"}}'
- en: )
  id: totrans-878
  prefs: []
  type: TYPE_NORMAL
  zh: )
- en: 'When writing the response, you need to use with st.chat_message() and pass
    the ''assistant'' role to the method:'
  id: totrans-879
  prefs: []
  type: TYPE_NORMAL
  zh: 在编写响应时，你需要使用with st.chat_message()并将'assistant'角色传递给方法：
- en: response = chain_with_history.stream(
  id: totrans-880
  prefs: []
  type: TYPE_NORMAL
  zh: response = chain_with_history.stream(
- en: '{"input": question}, config={"configurable": {"session_id": "any"}}'
  id: totrans-881
  prefs: []
  type: TYPE_NORMAL
  zh: '{"input": question}, config={"configurable": {"session_id": "any"}}'
- en: )
  id: totrans-882
  prefs: []
  type: TYPE_NORMAL
  zh: )
- en: 'with st.chat_message("assistant"):'
  id: totrans-883
  prefs: []
  type: TYPE_NORMAL
  zh: 'with st.chat_message("assistant"):'
- en: st.write_stream(response)
  id: totrans-884
  prefs: []
  type: TYPE_NORMAL
  zh: st.write_stream(response)
- en: 'Finally, you need to show the chat history just below the page title as follows:'
  id: totrans-885
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，你需要在页面标题下方显示聊天历史，如下所示：
- en: st.title("Q & A With AI")
  id: totrans-886
  prefs: []
  type: TYPE_NORMAL
  zh: st.title("与AI的问答")
- en: 'for message in st.session_state["langchain_messages"]:'
  id: totrans-887
  prefs: []
  type: TYPE_NORMAL
  zh: 'for message in st.session_state["langchain_messages"]:'
- en: role = "user" if message.type == "human" else "assistant"
  id: totrans-888
  prefs: []
  type: TYPE_NORMAL
  zh: role = "user" if message.type == "human" else "assistant"
- en: 'with st.chat_message(role):'
  id: totrans-889
  prefs: []
  type: TYPE_NORMAL
  zh: 'with st.chat_message(role):'
- en: st.markdown(message.content)
  id: totrans-890
  prefs: []
  type: TYPE_NORMAL
  zh: st.markdown(message.content)
- en: You can determine the role of the message by checking the message.type value.
  id: totrans-891
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以通过检查message.type的值来确定消息的角色。
- en: 'Run the application again, and you will see the output as shown below:'
  id: totrans-892
  prefs: []
  type: TYPE_NORMAL
  zh: 再次运行应用程序，你将看到以下输出：
- en: '![9 chatgpt clone](image_rsrc1ZE.jpg)'
  id: totrans-893
  prefs: []
  type: TYPE_IMG
  zh: '![9 chatgpt clone](image_rsrc1ZE.jpg)'
- en: Figure 38\. A Simpler ChatGPT Clone
  id: totrans-894
  prefs: []
  type: TYPE_NORMAL
  zh: 图38. 一个更简单的ChatGPT克隆
- en: Now you have a proper AI chat application that looks just like ChatGPT. Awesome!
  id: totrans-895
  prefs: []
  type: TYPE_NORMAL
  zh: 现在你有一个看起来就像ChatGPT的合适的人工智能聊天应用程序。太棒了！
- en: Summary
  id: totrans-896
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: The code for this chapter is available in the folder 09_Chat_History from the
    book source code.
  id: totrans-897
  prefs: []
  type: TYPE_NORMAL
  zh: 本章的代码可在书籍源代码的09_Chat_History文件夹中找到。
- en: In this chapter, you’ve learned how to inject chat history into the prompt using
    LangChain’s RunnableWithMessageHistory class.
  id: totrans-898
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，你学习了如何使用LangChain的RunnableWithMessageHistory类将聊天历史注入提示。
- en: Adding the chat history enables AI to contextualize your question based on the
    previous messages.
  id: totrans-899
  prefs: []
  type: TYPE_NORMAL
  zh: 添加聊天历史使AI能够根据之前的消息来上下文化你的问题。
- en: Combining chat history with Streamlit user interface, you can create an application
    similar to ChatGPT easily.
  id: totrans-900
  prefs: []
  type: TYPE_NORMAL
  zh: 结合聊天历史和Streamlit用户界面，您可以轻松创建类似于ChatGPT的应用程序。
- en: 'Chapter 10: AI Agents and Tools'
  id: totrans-901
  prefs: []
  type: TYPE_NORMAL
  zh: 第10章：人工智能代理和工具
- en: An AI agent is a thinking software that is capable of solving a task through
    a sequence of actions. It uses the LLM as a reasoning engine to plan and execute
    actions.
  id: totrans-902
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能代理是一种能够通过一系列动作解决任务的思考软件。它使用LLM作为推理引擎来规划和执行动作。
- en: All you need to do is to give the agent a specific task. The agent will process
    the task, determine the actions needed to solve it, and then take those actions.
  id: totrans-903
  prefs: []
  type: TYPE_NORMAL
  zh: 您需要做的只是给代理一个特定的任务。代理将处理任务，确定解决它所需的动作，然后执行这些动作。
- en: An agent can also use tools to take actions in the real-world, such as searching
    for specific information on the internet.
  id: totrans-904
  prefs: []
  type: TYPE_NORMAL
  zh: 代理还可以使用工具在现实世界中采取行动，例如在互联网上搜索特定信息。
- en: 'Here’s an illustration to help you understand the concept of agents:'
  id: totrans-905
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一个插图来帮助您理解代理的概念：
- en: '![10 llm agents](image_rsrc1ZF.jpg)'
  id: totrans-906
  prefs: []
  type: TYPE_IMG
  zh: '![10 llm agents](image_rsrc1ZF.jpg)'
- en: Figure 39\. LLM Agents Illustration
  id: totrans-907
  prefs: []
  type: TYPE_NORMAL
  zh: 图39. LLM代理插图
- en: Not all LLMs are capable of creating an agent, so advanced models like GPT-4,
    Gemini 1.5 Pro, or Mistral are required.
  id: totrans-908
  prefs: []
  type: TYPE_NORMAL
  zh: 并非所有LLM都能创建代理，因此需要像GPT-4、Gemini 1.5 Pro或Mistral这样的高级模型。
- en: Let me show you how to create an agent using LangChain next.
  id: totrans-909
  prefs: []
  type: TYPE_NORMAL
  zh: 让我向您展示如何使用LangChain创建一个代理。
- en: Creating an AI Agent
  id: totrans-910
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 创建人工智能代理
- en: 'Create a new Python file named react_agent.py and import the following modules:'
  id: totrans-911
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个名为react_agent.py的新Python文件，并导入以下模块：
- en: from decouple import config
  id: totrans-912
  prefs: []
  type: TYPE_NORMAL
  zh: from decouple import config
- en: from langchain import hub
  id: totrans-913
  prefs: []
  type: TYPE_NORMAL
  zh: from langchain import hub
- en: from langchain.agents import create_react_agent, AgentExecutor
  id: totrans-914
  prefs: []
  type: TYPE_NORMAL
  zh: from langchain.agents import create_react_agent, AgentExecutor
- en: from langchain_community.agent_toolkits.load_tools import load_tools
  id: totrans-915
  prefs: []
  type: TYPE_NORMAL
  zh: from langchain_community.agent_toolkits.load_tools import load_tools
- en: from langchain_google_genai import ChatGoogleGenerativeAI
  id: totrans-916
  prefs: []
  type: TYPE_NORMAL
  zh: from langchain_google_genai import ChatGoogleGenerativeAI
- en: The config and ChatGoogleGenerativeAI have already been used before, but the
    rest are new modules used to create an AI agent.
  id: totrans-917
  prefs: []
  type: TYPE_NORMAL
  zh: config和ChatGoogleGenerativeAI已经使用过，但其余的都是用于创建人工智能代理的新模块。
- en: The hub module is used to retrieve a prompt from the LangChain community hub.
    You can visit the hub at [https://smith.langchain.com/hub](https://smith.langchain.com/hub)
  id: totrans-918
  prefs: []
  type: TYPE_NORMAL
  zh: 中心模块用于从LangChain社区中心检索提示。您可以通过[https://smith.langchain.com/hub](https://smith.langchain.com/hub)访问中心。
- en: The LangChain community hub is an open collection of prompts that you can use
    for free in your projects.
  id: totrans-919
  prefs: []
  type: TYPE_NORMAL
  zh: LangChain社区中心是一个免费的提示库，您可以在项目中免费使用。
- en: The create_react_agent module creates an agent that uses ReAct prompting, while
    AgentExecutor manages the execution of the agent, such as processing inputs, generating
    responses, and updating the agent’s state.
  id: totrans-920
  prefs: []
  type: TYPE_NORMAL
  zh: create_react_agent模块创建一个使用ReAct提示的代理，而AgentExecutor管理代理的执行，例如处理输入、生成响应和更新代理的状态。
- en: The load_tools module is used to load tools available in LangChain.
  id: totrans-921
  prefs: []
  type: TYPE_NORMAL
  zh: load_tools模块用于加载LangChain中可用的工具。
- en: 'Next, initialize the llm and get the prompt from the hub as follows:'
  id: totrans-922
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，初始化llm并从中心获取提示，如下所示：
- en: OPENAI_KEY = config("OPENAI_KEY")
  id: totrans-923
  prefs: []
  type: TYPE_NORMAL
  zh: OPENAI_KEY = config("OPENAI_KEY")
- en: llm = ChatOpenAI(model="gpt-4o", api_key=OPENAI_KEY)
  id: totrans-924
  prefs: []
  type: TYPE_NORMAL
  zh: llm = ChatOpenAI(model="gpt-4o", api_key=OPENAI_KEY)
- en: prompt = hub.pull("hwchase17/react")
  id: totrans-925
  prefs: []
  type: TYPE_NORMAL
  zh: prompt = hub.pull("hwchase17/react")
- en: The hub.pull() method retrieves the prompt from the repository in the LangChain
    hub. Here, we use the "react" prompt created by the user "hwchase17".
  id: totrans-926
  prefs: []
  type: TYPE_NORMAL
  zh: hub.pull()方法从LangChain中心库中的存储库检索提示。在这里，我们使用用户"hwchase17"创建的"react"提示。
- en: If you want to see the prompt, you can visit [https://smith.langchain.com/hub/hwchase17/react](https://smith.langchain.com/hub/hwchase17/react)
  id: totrans-927
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您想查看提示，可以访问[https://smith.langchain.com/hub/hwchase17/react](https://smith.langchain.com/hub/hwchase17/react)
- en: 'Next, load the tools we want to provide to the LLM, then create the agent executor
    object as follows:'
  id: totrans-928
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，加载我们想要提供给LLM的工具，然后创建代理执行器对象，如下所示：
- en: tools = load_tools(["wikipedia", "ddg-search", "llm-math"], llm)
  id: totrans-929
  prefs: []
  type: TYPE_NORMAL
  zh: tools = load_tools(["wikipedia", "ddg-search", "llm-math"], llm)
- en: agent = create_react_agent(llm, tools, prompt)
  id: totrans-930
  prefs: []
  type: TYPE_NORMAL
  zh: agent = create_react_agent(llm, tools, prompt)
- en: agent_executor = AgentExecutor(agent=agent, tools=tools, verbose=True)
  id: totrans-931
  prefs: []
  type: TYPE_NORMAL
  zh: agent_executor = AgentExecutor(agent=agent, tools=tools, verbose=True)
- en: 'There are three tools we provide to the agent:'
  id: totrans-932
  prefs: []
  type: TYPE_NORMAL
  zh: 我们为代理提供了三个工具：
- en: wikipedia for accessing and summarizing Wikipedia articles
  id: totrans-933
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: wikipedia用于访问和总结维基百科文章
- en: ddg-search for searching the internet using the DuckDuckGo search engine
  id: totrans-934
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: ddg-search用于使用DuckDuckGo搜索引擎在互联网上搜索
- en: llm-math for calculating mathematical equations
  id: totrans-935
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: llm-math用于计算数学方程
- en: 'To run these tools properly, you need to install the packages using pip:'
  id: totrans-936
  prefs: []
  type: TYPE_NORMAL
  zh: 要正确运行这些工具，你需要使用pip安装以下包：
- en: pip install wikipedia==1.4.0 duckduckgo-search==6.1.2 numexpr==2.10.0
  id: totrans-937
  prefs: []
  type: TYPE_NORMAL
  zh: pip install wikipedia==1.4.0 duckduckgo-search==6.1.2 numexpr==2.10.0
- en: The numexpr package is used by llm-math behind the scene.
  id: totrans-938
  prefs: []
  type: TYPE_NORMAL
  zh: llm-math在后台使用numexpr包。
- en: 'Once the installation is finished, finish the agent by adding an input prompt
    and call the invoke() method:'
  id: totrans-939
  prefs: []
  type: TYPE_NORMAL
  zh: 安装完成后，通过添加输入提示并调用invoke()方法来完成代理：
- en: 'question = input("Give me a task: ")'
  id: totrans-940
  prefs: []
  type: TYPE_NORMAL
  zh: question = input("给我一个任务：")
- en: 'agent_executor.invoke({"input": question})'
  id: totrans-941
  prefs: []
  type: TYPE_NORMAL
  zh: 'agent_executor.invoke({"input": question})'
- en: And the AI agent is now completed.
  id: totrans-942
  prefs: []
  type: TYPE_NORMAL
  zh: 并且AI代理现在已完成。
- en: 'You can run the agent using Python as follows:'
  id: totrans-943
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以使用以下Python命令运行代理：
- en: python react_agent.py
  id: totrans-944
  prefs: []
  type: TYPE_NORMAL
  zh: python react_agent.py
- en: Now give a task for the agent to finish, such as 'Who was the first president
    of America?'
  id: totrans-945
  prefs: []
  type: TYPE_NORMAL
  zh: 现在给代理一个任务来完成，例如 '谁是美国的第一个总统？'
- en: 'Because the verbose parameter is set to True in AgentExecutor, you will see
    the reasoning done by the LLM:'
  id: totrans-946
  prefs: []
  type: TYPE_NORMAL
  zh: 因为在AgentExecutor中设置了verbose参数为True，所以你会看到LLM的推理过程：
- en: '![10 agent running](image_rsrc1ZG.jpg)'
  id: totrans-947
  prefs: []
  type: TYPE_IMG
  zh: '![10个代理运行](image_rsrc1ZG.jpg)'
- en: Figure 40\. LLM Agent Reasoning and Taking Actions
  id: totrans-948
  prefs: []
  type: TYPE_NORMAL
  zh: 图40. LLM代理推理和采取行动
- en: 'The agent will perform several actions before it reaches the final answer:'
  id: totrans-949
  prefs: []
  type: TYPE_NORMAL
  zh: 代理在得到最终答案之前将执行几个动作：
- en: '![10 agent finish](image_rsrc1ZH.jpg)'
  id: totrans-950
  prefs: []
  type: TYPE_IMG
  zh: '![10个代理完成](image_rsrc1ZH.jpg)'
- en: Figure 41\. LLM Agent Finished
  id: totrans-951
  prefs: []
  type: TYPE_NORMAL
  zh: 图41. LLM代理完成
- en: Now these outputs are shown because we use the verbose parameter.
  id: totrans-952
  prefs: []
  type: TYPE_NORMAL
  zh: 现在这些输出被显示出来，因为我们使用了verbose参数。
- en: 'You can show the steps the agent takes by calling the stream() method instead
    of invoke(), then check the returned response for a specific key:'
  id: totrans-953
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以通过调用stream()方法而不是invoke()来显示代理采取的步骤，然后检查返回的响应中的特定键：
- en: Turn verbose off to avoid polluting the command line
  id: totrans-954
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 关闭verbose以避免污染命令行
- en: agent_executor = AgentExecutor(agent=agent, tools=tools)
  id: totrans-955
  prefs: []
  type: TYPE_NORMAL
  zh: agent_executor = AgentExecutor(agent=agent, tools=tools)
- en: 'question = input("Give me a task: ")'
  id: totrans-956
  prefs: []
  type: TYPE_NORMAL
  zh: question = input("给我一个任务：")
- en: Call stream() instead of invoke()
  id: totrans-957
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 用stream()代替invoke()
- en: 'response = agent_executor.stream({"input": question})'
  id: totrans-958
  prefs: []
  type: TYPE_NORMAL
  zh: 'response = agent_executor.stream({"input": question})'
- en: Agent Action
  id: totrans-959
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 代理动作
- en: 'if "actions" in response:'
  id: totrans-960
  prefs: []
  type: TYPE_NORMAL
  zh: 'if "actions" in response:'
- en: 'for action in response["actions"]:'
  id: totrans-961
  prefs: []
  type: TYPE_NORMAL
  zh: 'for action in response["actions"]:'
- en: 'print(f"Calling Tool: `{action.tool}` with input `{action.tool_input}`")'
  id: totrans-962
  prefs: []
  type: TYPE_NORMAL
  zh: '打印(f"调用工具: `{action.tool}`，输入 `{action.tool_input}`")'
- en: Observation
  id: totrans-963
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 观察
- en: 'elif "steps" in response:'
  id: totrans-964
  prefs: []
  type: TYPE_NORMAL
  zh: 'elif "steps" in response:'
- en: 'for step in response["steps"]:'
  id: totrans-965
  prefs: []
  type: TYPE_NORMAL
  zh: 'for step in response["steps"]:'
- en: 'print(f"Tool Result: `{step.observation}`")'
  id: totrans-966
  prefs: []
  type: TYPE_NORMAL
  zh: 'print(f"工具结果: `{step.observation}`")'
- en: Final result
  id: totrans-967
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 最终结果
- en: 'elif "output" in response:'
  id: totrans-968
  prefs: []
  type: TYPE_NORMAL
  zh: 'elif "output" in response:'
- en: 'print(f''Final Output: {response["output"]}'')'
  id: totrans-969
  prefs: []
  type: TYPE_NORMAL
  zh: 'print(f''最终输出: {response["output"]}'')'
- en: 'else:'
  id: totrans-970
  prefs: []
  type: TYPE_NORMAL
  zh: 'else:'
- en: raise ValueError()
  id: totrans-971
  prefs: []
  type: TYPE_NORMAL
  zh: raise ValueError()
- en: print("---")
  id: totrans-972
  prefs: []
  type: TYPE_NORMAL
  zh: print("---")
- en: 'Now if you run the agent again, you will only be shown the actions, steps,
    and final output. The summaries are omitted for brevity below:'
  id: totrans-973
  prefs: []
  type: TYPE_NORMAL
  zh: 现在如果你再次运行代理，你将只会看到动作、步骤和最终输出。以下为了简洁省略了摘要：
- en: 'Give me a task: Who was the first president of America?'
  id: totrans-974
  prefs: []
  type: TYPE_NORMAL
  zh: 给我一项任务：谁是美国的第一个总统？
