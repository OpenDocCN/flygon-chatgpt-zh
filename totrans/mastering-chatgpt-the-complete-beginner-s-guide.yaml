- en: '****Intr**oducti**on: ****Wel**com**e ****t**o** ****Cha**tGP**T!'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: '[引言：欢迎来到ChatGPT！]'
- en: '****Ima**gin**e ****ha**vin**g ****a**n** ****assi**stan**t, ****tu**tor**,
    ****a**nd** ****cre**ativ**e ****par**tne**r ****ro**lle**d ****in**to** ****o**ne**,
    ****avai**labl**e ****t**o** ****he**lp** ****y**ou** ****any**tim**e, ****any**wher**e.
    ****Th**at**''****s**** ****Cha**tGP**T! ****Whe**the**r ****y**ou** ****wa**nt**
    ****ans**wer**s, ****ad**vic**e, ****o**r** ****ju**st** ****a**** ****f**un**
    ****conv**ersati**on, ****Cha**tGP**T ****i**s** ****he**re** ****t**o** ****ma**ke**
    ****yo**ur** ****li**fe** ****ea**sie**r.'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 想象有一个助手、导师和创意伙伴的角色合而为一，随时随地可供你帮助。那就是ChatGPT！无论你需要答案、建议，还是仅仅想进行一次有趣的对话，ChatGPT都在这里，让你的生活变得更简单。
- en: '****I**n** ****th**is** ****gu**ide**, ****w**e**''****l**l** ****exp**lor**e
    ****wh**at** ****Cha**tGP**T ****i**s**, ****h**ow** ****t**o** ****u**se** ****i**t**,
    ****a**nd** ****h**ow** ****t**o** ****un**loc**k ****i**ts** ****fu**ll** ****pote**ntia**l
    ****f**or** ****lea**rnin**g, ****wo**rk**, ****a**nd** ****crea**tivit**y. ****W**e**''****l**l**
    ****al**so** ****pro**vid**e ****re**al**-****wo**rld** ****exa**mple**s, ****prac**tica**l
    ****ti**ps**, ****a**nd** ****ea**sy**-****t**o**-****fo**llo**w ****exer**cise**s.'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 在本指南中，我们将探索ChatGPT是什么，如何使用它，以及如何解锁其在学习、工作和创造力方面的全部潜力。我们还将提供真实世界的案例、实用技巧和易于遵循的练习。
- en: '****Cha**pte**r ****1****: ****Wh**at** ****i**s** ****Cha**tGP**T?'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: '**第1章：什么是ChatGPT？**'
- en: '****Cha**tGP**T, ****cre**ate**d ****b**y** ****Op**enA**I, ****i**s** ****a**n**
    ****arti**ficia**l ****inte**lligen**ce ****lan**guag**e ****mo**del** ****th**at**
    ****unde**rstand**s ****a**nd** ****gene**rate**s ****hu**man**-****li**ke** ****te**xt**.
    ****I**t**''****s**** ****tra**ine**d ****o**n** ****a**** ****mas**siv**e ****am**oun**t
    ****o**f** ****da**ta**, ****all**owin**g ****i**t** ****t**o** ****pro**vid**e
    ****info**rmativ**e, ****cre**ativ**e, ****a**nd** ****eng**agin**g ****resp**onse**s.'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: '****ChatGP**T，由**OpenAI**创**建**，是一**个**人工**智**能**语**言**模**型**，能**够**理**解**和**生**成**人**类**类**似**的**文**本**。**它**在**大量**数**据**上**进**行**了**训**练，**使**得**它**能**够**提**供**信**息**丰**富**、**创**造**性**和**吸**引**人**的**答**案**。'
