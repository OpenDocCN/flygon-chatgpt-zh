- en: '100 ChatGPT Prompts:'
  id: totrans-0
  prefs: []
  type: TYPE_NORMAL
  zh: 100 ChatGPT 提示词：
- en: 'To Make Money Online: Create and Sell, with AI'
  id: totrans-1
  prefs: []
  type: TYPE_NORMAL
  zh: 在线赚钱：通过 AI 创建和销售
- en: '* * *'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Introduction
  id: totrans-3
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 引言
- en: 'Welcome to "100 ChatGPT Prompts to Help You Create, Sell, and Make Money Online"!
    In today’s fast-paced digital world, staying relevant on social media can be overwhelming,
    but this eBook is here to change that. Whether you''re an entrepreneur, content
    creator, or marketer, these 100 actionable prompts will empower you to:'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 欢迎来到“100 ChatGPT 提示词，帮助您创建、销售和在线赚钱”！在当今快节奏的数字世界中，保持社交媒体的相关性可能会让人感到压倒，但这本电子书正是为了改变这一点。无论您是企业家、内容创作者还是营销人员，这
    100 个可操作的提示将赋予您力量：
- en: ●     Create captivating, audience-focused content.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: ●     创建吸引人的、以受众为中心的内容。
- en: ●     Sell your products or services with confidence.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: ●     自信地销售您的产品或服务。
- en: ●     Monetize your online presence effectively.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: ●     有效地货币化您的在线存在。
- en: At the heart of this eBook is ChatGPT, a transformative AI tool that bridges
    the gap between your ideas and their execution. Unlike traditional content tools,
    ChatGPT doesn’t just generate text—it adapts to your goals, tone, and audience.
    Let’s dive into why ChatGPT stands out and how it can revolutionize the way you
    work.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 这本电子书的核心是 ChatGPT，这是一个变革性的 AI 工具，它弥合了您的想法与其实施之间的差距。与传统的内容工具不同，ChatGPT 不仅生成文本，它还会根据您的目标、语气和受众进行调整。让我们深入了解为什么
    ChatGPT 独具特色以及它如何能彻底改变您的工作方式。
- en: Why ChatGPT Is a Game-Changer
  id: totrans-9
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 为什么 ChatGPT 是一个变革者
- en: 'Adaptability: ChatGPT tailors its responses to your specific needs. Whether
    you’re crafting a witty TikTok caption or drafting a professional LinkedIn article,
    ChatGPT aligns with your desired style and tone.'
  id: totrans-10
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 适应性：ChatGPT 会根据您的具体需求定制其回答。无论是撰写一个俏皮的 TikTok 标题还是草拟一篇专业的 LinkedIn 文章，ChatGPT
    都会与您期望的风格和语气保持一致。
- en: 'Time-Saving: Say goodbye to hours spent brainstorming. ChatGPT provides instant,
    creative ideas to keep your content pipeline full and on-trend.'
  id: totrans-11
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 节省时间：告别花费数小时进行头脑风暴的日子。ChatGPT 提供即时、富有创意的想法，以保持您的内容渠道充满活力并紧跟潮流。
- en: 'Audience Insights: With ChatGPT, you can simulate conversations with your ideal
    customer, helping you create messages that truly resonate.'
  id: totrans-12
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 受众洞察：借助 ChatGPT，您可以模拟与理想客户的对话，帮助您创建真正引起共鸣的信息。
- en: 'Iterative Refinement: Not happy with the first result? Ask ChatGPT to rephrase,
    expand, or narrow down its suggestions. It’s like having a collaborative brainstorming
    partner available 24/7\.'
  id: totrans-13
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 逐步改进：对第一个结果不满意？让 ChatGPT 重新措辞、扩展或缩小其建议。这就像拥有一个全天候可用的协作头脑风暴伙伴。
- en: 'Platform Versatility: Whether you’re targeting Instagram, TikTok, YouTube,
    or Pinterest, ChatGPT knows the nuances of each platform. It generates content
    tailored to fit the expectations and trends of different audiences.'
  id: totrans-14
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 平台通用性：无论您是针对 Instagram、TikTok、YouTube 还是 Pinterest，ChatGPT 都了解每个平台的细微差别。它生成适合不同受众期望和趋势的内容。
- en: What You’ll Learn in This eBook
  id: totrans-15
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 在本电子书中您将学到什么
- en: 'This eBook goes beyond teaching you how to use ChatGPT—it’s a roadmap for success.
    Each section provides targeted prompts to address specific business goals:'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 这本电子书不仅教授您如何使用 ChatGPT，它还是成功的路线图。每个部分都提供了有针对性的提示，以解决特定的商业目标：
- en: '● Content Creation (Create): Learn how to craft high-quality content that stops
    the scroll, from Instagram captions to viral TikTok ideas.'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: ● 内容创作（创建）：学习如何制作高质量的内容，从 Instagram 标题到病毒式 TikTok 灵感，让用户停止滑动。
- en: '● Engagement and Growth (Sell): Unlock strategies to build trust, foster community,
    and drive engagement with your audience.'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: ● 参与和增长（销售）：解锁建立信任、培养社区和与受众互动的策略。
- en: '● Monetization Strategies (Make Money Online): Discover how to turn your content
    into revenue streams using ChatGPT’s unique capabilities.'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: ● 货币化策略（在线赚钱）：发现如何利用 ChatGPT 的独特功能将您的内容转化为收入来源。
- en: A Tool for Everyone
  id: totrans-20
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 适用于每个人的工具
- en: You don’t need to be a tech wizard or a professional copywriter to use ChatGPT
    effectively. This eBook is designed for everyone, whether you’re just starting
    your business or are a seasoned entrepreneur. If you’ve ever found yourself staring
    at a blank screen, unsure of what to post, ChatGPT is here to spark your creativity.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 您不需要成为技术高手或专业文案作家就能有效地使用 ChatGPT。这本电子书是为每个人设计的，无论您是刚开始创业还是经验丰富的企业家。如果您曾经发现自己面对着空白的屏幕，不确定要发布什么内容，ChatGPT
    就在这里激发您的创造力。
- en: By the time you finish this eBook, you’ll not only understand how to use ChatGPT
    but also have a library of prompts tailored to your needs. Most importantly, you’ll
    know how to scale your content creation process without sacrificing quality.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 当你完成这本电子书时，你不仅会了解如何使用ChatGPT，还会拥有一个针对你需求的提示词库。最重要的是，你会知道如何在不牺牲质量的情况下扩展你的内容创作流程。
- en: Let’s Get Started
  id: totrans-23
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 让我们开始吧
- en: You’re one step away from transforming the way you approach content creation
    and business growth. With the help of ChatGPT and the prompts in this eBook, you’ll
    create with confidence, sell with strategy, and monetize with ease.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 你离改变你处理内容创作和业务增长的方式只有一步之遥。借助ChatGPT和这本电子书中的提示，你将自信地创作，有策略地销售，轻松地盈利。
- en: 'Section 1: Content Creation (Create)'
  id: totrans-25
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第1节：内容创作（创建）
- en: In this section, we’ll dive into the essentials of content creation and uncover
    how ChatGPT can be your creative partner in crafting standout material. Whether
    you’re building an Instagram post, planning a YouTube video, or brainstorming
    TikTok ideas, you’ll find prompts designed to spark inspiration and simplify the
    process.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 在这一节中，我们将深入了解内容创作的要点，揭示ChatGPT如何成为你创作突出材料的创意伙伴。无论你是构建Instagram帖子、规划YouTube视频还是头脑风暴TikTok想法，你都会找到激发灵感和简化过程的提示。
- en: From generating attention-grabbing headlines to structuring engaging blog posts
    and social media updates, this section is packed with practical tips and actionable
    prompts that will help you create content that connects with your audience.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 从生成吸引注意力的标题到构建引人入胜的博客文章和社交媒体更新，这一节充满了实用的技巧和可操作的提示，帮助你创作出与受众产生共鸣的内容。
- en: Content creation isn’t just about filling up a content calendar—it’s about storytelling,
    building relationships, and delivering value. Let this section be your guide to
    mastering the art of creating content with confidence and creativity.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 内容创作不仅仅是填满内容日历——它是关于讲故事、建立关系和传递价值。让这一节成为你掌握自信和创造性地创作内容的指南。
- en: 'Instagram Prompts for Content Creation:'
  id: totrans-29
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Instagram内容创作提示：
- en: '1\. Instagram Prompt: Monetization Through Product Promotion'
  id: totrans-30
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1. Instagram提示：通过产品推广实现盈利
- en: 'Prompt:'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"ChatGPT, ask me 10 detailed questions about my business, products, or services.
    Based on my answers, generate 5 Instagram post ideas to showcase my products and
    make sales. Include suggested captions, hashtags, and call-to-actions that drive
    conversions."'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: '"ChatGPT，请问我关于我的业务、产品或服务的10个详细问题。根据我的回答，生成5个Instagram帖子想法来展示我的产品并促进销售。包括建议的标题、标签和促进转化的号召性用语。"'
- en: 'Example Interaction:'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 示例互动：
- en: '●     ChatGPT asks:'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: ● ChatGPT提问：
- en: What product/service are you selling?
  id: totrans-35
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你在销售什么产品/服务？
- en: Who is your target audience?
  id: totrans-36
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你的目标受众是谁？
- en: What pain points does your product solve?
  id: totrans-37
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你的产品解决了哪些痛点？
- en: Do you have any ongoing discounts or promotions?
  id: totrans-38
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你是否有任何正在进行的折扣或促销活动？
- en: What are your brand values?
  id: totrans-39
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你的品牌价值观是什么？
- en: How do customers typically use your product?
  id: totrans-40
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 客户通常如何使用你的产品？
- en: What kind of visuals (photos/videos) do you already have?
  id: totrans-41
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你已经有什么样的视觉（照片/视频）？
- en: Do you collaborate with influencers or partners?
  id: totrans-42
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你是否与影响者或合作伙伴合作？
- en: What platform-specific tone do you prefer?
  id: totrans-43
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你更喜欢哪种平台特定的语气？
- en: What’s your ultimate goal for this Instagram campaign?
  id: totrans-44
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你对这个Instagram活动的最终目标是什么？
- en: '2\. Instagram Prompt: Viral Reel for Affiliate Marketing'
  id: totrans-45
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2. Instagram提示：通过产品推广实现盈利
- en: 'Prompt:'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"ChatGPT, ask me 10 questions about an affiliate product I’m promoting and
    generate 5 Instagram Reel ideas to drive clicks and sales. Include trending audio
    suggestions, captions, and hashtags."'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: '"ChatGPT，请问我关于我正在推广的联盟产品的10个问题，并生成5个Instagram Reel想法来推动点击和销售。包括趋势音频建议、标题和标签。"'
- en: 'Example Interaction:'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 示例互动：
- en: '●     ChatGPT asks:'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: ● ChatGPT提问：
- en: What’s the product, and why do you recommend it?
  id: totrans-50
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 产品是什么，你为什么推荐它？
- en: Who benefits most from this product?
  id: totrans-51
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 谁从这个产品中受益最大？
- en: What’s the most unique feature or benefit?
  id: totrans-52
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 最独特的特点或好处是什么？
- en: Do you have a personal success story with it?
  id: totrans-53
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你有没有与它的个人成功故事？
- en: What’s the affiliate link/discount code?
  id: totrans-54
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 什么是一级链接/折扣代码？
- en: Are there similar products you can compare it to?
  id: totrans-55
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你能比较类似的产品吗？
- en: What visual or demonstration works best for this product?
  id: totrans-56
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 对于这个产品，哪种视觉或演示效果最好？
- en: What’s a common objection potential buyers might have?
  id: totrans-57
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 潜在买家可能有的常见反对意见是什么？
- en: What’s the urgency (limited-time offer, etc.)?
  id: totrans-58
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 紧迫性是什么（限时优惠等）？
- en: What tone matches the audience (educational, funny, etc.)?
  id: totrans-59
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 什么语气适合你的受众（教育性、幽默等）？
- en: '3\. Instagram Prompt: Selling Through Educational Content'
  id: totrans-60
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3. Instagram提示：通过教育内容销售
- en: 'Prompt:'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"ChatGPT, ask me 10 questions to understand my niche. Then, suggest 5 Instagram
    post ideas for educational content that subtly promote my services or products
    while building audience trust."'
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: '"ChatGPT，请问我10个问题，以了解我的细分市场。然后，建议5个Instagram教育内容帖子想法，这些帖子巧妙地推广我的服务或产品，同时建立观众信任。"'
- en: 'Example Interaction:'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 示例互动：
- en: '●     ChatGPT asks:'
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: ●    ChatGPT询问：
- en: What’s your industry or niche?
  id: totrans-65
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 您的行业或细分市场是什么？
- en: What are the most common questions your audience asks?
  id: totrans-66
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 您的观众最常问的问题是什么？
- en: What unique knowledge or skills do you offer?
  id: totrans-67
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 您提供哪些独特的知识或技能？
- en: What services/products do you want to promote?
  id: totrans-68
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 您想推广哪些服务/产品？
- en: Are there any myths or misconceptions in your industry?
  id: totrans-69
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 您的行业中是否有任何神话或误解？
- en: What visual format do you prefer (carousel, video, etc.)?
  id: totrans-70
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 您更喜欢哪种视觉格式（轮播图，视频等）？
- en: What tone aligns with your brand (authoritative, casual, etc.)?
  id: totrans-71
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 与您的品牌相符的语气是什么（权威的，随意的等）？
- en: What’s your audience’s biggest challenge or pain point?
  id: totrans-72
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 您的观众面临的最大挑战或痛点是什么？
- en: What’s the most common reason people hesitate to buy your product?
  id: totrans-73
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 人们犹豫购买您产品最常见的原因是什么？
- en: Do you have any testimonials or success stories?
  id: totrans-74
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 您是否有任何推荐信或成功故事？
- en: '4\. Instagram Prompt: Lead Generation with Free Resources'
  id: totrans-75
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4. Instagram提示：利用免费资源生成潜在客户
- en: 'Prompt:'
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"ChatGPT, ask me 10 questions to create a lead-generation campaign for Instagram.
    Then, suggest 5 content ideas for promoting a free resource (e.g., guide, checklist)
    that converts followers into leads."'
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: '"ChatGPT，请问我10个问题，为Instagram创建一个潜在客户生成活动。然后，建议5个推广免费资源（例如，指南，清单）的内容想法，将关注者转化为潜在客户。"'
- en: 'Example Interaction:'
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 示例互动：
- en: '●      ChatGPT asks:'
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: ●    ChatGPT询问：
- en: What’s your free resource (e.g., eBook, checklist)?
  id: totrans-80
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 您的免费资源是什么（例如，电子书，清单）？
- en: What specific problem does it solve?
  id: totrans-81
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 它解决了什么具体问题？
- en: Who is the resource designed for?
  id: totrans-82
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 该资源是为谁设计的？
- en: What’s your ideal lead (demographics, goals)?
  id: totrans-83
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 您的理想潜在客户（人口统计，目标）是什么？
- en: How will people access the resource (link in bio, etc.)?
  id: totrans-84
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 人们如何访问资源（生物链接等）？
- en: What’s the most compelling benefit of downloading it?
  id: totrans-85
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 下载它的最吸引人的好处是什么？
- en: Do you already have testimonials or case studies?
  id: totrans-86
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 您已经有了推荐信或案例研究吗？
- en: What’s the deadline for accessing the resource?
  id: totrans-87
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 访问资源的截止日期是什么时候？
- en: How will you follow up after leads sign up?
  id: totrans-88
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在潜在客户注册后，您将如何跟进？
- en: What visual format suits this promotion (carousel, Reel, etc.)?
  id: totrans-89
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 适合这种推广的视觉格式是什么（轮播图，Reel等）？
- en: '5\. Instagram Prompt: Customer Success Stories to Drive Sales'
  id: totrans-90
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 5. Instagram提示：通过客户成功故事推动销售
