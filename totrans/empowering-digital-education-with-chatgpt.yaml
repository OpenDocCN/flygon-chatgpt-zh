    of UTAUT variables of the post-measurement'
  id: totrans-727
  prefs: []
  type: TYPE_NORMAL
  zh: '[表3.2](#ch11.xhtml#t5b) 后测量的UTAUT变量的平均值、标准误和置信区间'
