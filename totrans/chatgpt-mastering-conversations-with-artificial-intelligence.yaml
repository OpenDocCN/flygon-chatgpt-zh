- en: '**10\. Data Analysis**'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Too often, we work through mounds of data, merge data, transform files from
    one format to another, put data into graph form, and do other more time-consuming
    tasks.
  prefs: []
  type: TYPE_NORMAL
- en: The good news is that all these can be done quickly and efficiently, without
    deep knowledge of data science, using ChatGPT Data Analysis.
  prefs: []
  type: TYPE_NORMAL
- en: In this chapter, we delve into this revolutionary way you interact with your
    data provided by ChatGPT Data Analysis. We will begin by comparing ChatGPT and
    ChatGPT Data Analysis, shedding light on the transformative shift that empowers
    you to work with your data. Then, we will dive deep into the capabilities of Data
    Analysis.
  prefs: []
  type: TYPE_NORMAL
- en: Throughout this chapter, we have crafted exercises that allow you to put your
    newfound knowledge to the test.
  prefs: []
  type: TYPE_NORMAL
- en: A word of caution, though. While ChatGPT Plus can assist with data analysis,
    we must exercise critical thinking and validate the results. It is a tool that
    provides insights but works best when combined with human expertise and rigorous
    analysis.
  prefs: []
  type: TYPE_NORMAL
- en: Advanced Data Analysis can be a game-changer.
  prefs: []
  type: TYPE_NORMAL
- en: '**10.1 What is Advanced Data Analysis?**'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: If we compare ChatGPT to a "Knowledge Keeper," a wizard of words, we can compare
    Data Analysis to a capable "Data Scientist" assistant.
  prefs: []
  type: TYPE_NORMAL
- en: 'The "Data Scientist" is knowledgeable but needs specific instructions and some
    oversight. It excels in tasks like coding, interpreting documents, and visualizing
    data. It is skilled in computer programming and adept at using specialized tools.
    With some observations:'
  prefs: []
  type: TYPE_NORMAL
- en: – It is confined to its super powerful computer but has no internet access.
    So, for any task you assign, you must hand over all necessary files and data directly.
  prefs: []
  type: TYPE_NORMAL
- en: – It can write Python code to accomplish complex tasks, with no need to understand
    the code to benefit from it.
  prefs: []
  type: TYPE_NORMAL
- en: – Its memory is limited. It remembers only the tasks and instructions during
    the current interaction. It does not remember anything about past interactions
    or unfinished tasks. When you start a new chat, it is like meeting you for the
    first time.
  prefs: []
  type: TYPE_NORMAL
- en: – It is skilled but not infallible. It often does not check its output unless
    is requested. You must review and double-check every work for any errors or oversights.
    This vigilance ensures that the output you receive is accurate and reliable.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure10-1_CMYK.tif](../Images/Figure10-1_CMYK_fmt.png)'
  prefs: []
  type: TYPE_IMG
- en: '*Figure 10.1 LLM''s* vs. *Data Analysis Capabilities*'
  prefs: []
  type: TYPE_NORMAL
- en: The best advice is to be very specific about your goals, constraints, needs,
    etc. Be explicit in your instructions. For instance, if you need files organized,
    specify how you want them named and what folder structure you prefer.
  prefs: []
  type: TYPE_NORMAL
- en: Always confirm if the "Data Scientist" understood your task correctly. It will
    often mirror what it is about to do, offering a chance for adjustments (Figure
    10.1).
  prefs: []
  type: TYPE_NORMAL
- en: You can enable it if you have a ChatGPT Plus subscription.
  prefs: []
  type: TYPE_NORMAL
- en: The fundamental difference between the "Knowledge Keeper" and the "Data Scientist"
    lies in their ability to interact with data files.
  prefs: []
  type: TYPE_NORMAL
- en: 'While both allow you to send chat messages and receive responses, ChatGPT Data
    Analysis offers an additional feature: an "Upload file" button. This feature allows
    users to upload their data files: sales data, documents or images, and videos.'
  prefs: []
  type: TYPE_NORMAL
- en: When dealing with text-based tasks, "Master Librarian" alone is often enough.
    For data manipulation, numerical calculations, or file operations, expect a "Data
    Scientist" to be involved.
  prefs: []
  type: TYPE_NORMAL
- en: Data Analysis in the context of ChatGPT allows the usage of various file formats
    for data import, export, and manipulation. Here is a simple table that outlines
    the supported file formats and file sizes up to 512 MB:^([1](#footnote-10801-1))
  prefs: []
  type: TYPE_NORMAL
- en: '| **File Format** | **Extension** | **Purpose** | **Notes** |'
  prefs: []
  type: TYPE_TB
- en: '| CSV | .csv | Data Import/Export | Comma-separated values |'
  prefs: []
  type: TYPE_TB
- en: '| JSON | .json | Data Import/Export | JavaScript Object Notation |'
  prefs: []
  type: TYPE_TB
- en: '| Excel | .xls, .xlsx | Data Import/Export | Microsoft Excel formats |'
  prefs: []
  type: TYPE_TB
- en: '| XML | .xml | Data Import/Export | eXtensible Markup Language |'
  prefs: []
  type: TYPE_TB
- en: '| SQL | .sql | Data Export | Structured Query Language |'
  prefs: []
  type: TYPE_TB
- en: '| HTML | .html | Data Export | HyperText Markup Language |'
  prefs: []
  type: TYPE_TB
- en: '| PDF | .pdf | Data Export | Portable Document Format |'
  prefs: []
  type: TYPE_TB
- en: '| TXT | .txt | Data Import/Export | Plain Text |'
  prefs: []
  type: TYPE_TB
- en: These file formats are supported by data analysis tools and libraries like Pandas,
    Numpy, and various SQL databases, making them compatible with advanced data analysis
    tasks you might perform in conjunction with ChatGPT.
  prefs: []
  type: TYPE_NORMAL
- en: Once the task is complete, ask the ChatGPT to compile the work into a downloadable
    format, like a zip file, so you can easily retrieve it.
  prefs: []
  type: TYPE_NORMAL
- en: Data Analysis is exclusively available to ChatGPT Plus subscribers.
  prefs: []
  type: TYPE_NORMAL
- en: '**10.2 Advanced Data Analysis: The User Guide**'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'The new capabilities of Data Analysis for ChatGPT aim to enhance the analysis
    of text-rich documents:'
  prefs: []
  type: TYPE_NORMAL
- en: '– Synthesis: Analyze information from documents to generate content or insights.'
  prefs: []
  type: TYPE_NORMAL
- en: '– Transformation: Alter the presentation of information without changing its
    underlying essence.'
  prefs: []
  type: TYPE_NORMAL
- en: '– Extraction: Identify and pull out specific pieces of data from a document.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Step 1: Define Your Objective**'
  prefs: []
  type: TYPE_NORMAL
- en: Begin by clarifying what you want to achieve with your data analysis. Are you
    looking for trends, patterns, or specific insights? It will guide your interactions
    with ChatGPT.
  prefs: []
  type: TYPE_NORMAL
- en: For example, for a fast-moving consumer goods (FMCG) distributor, the objective
    could be to analyze sales and identify the top-selling products. Or explore whether
    there is any correlation between the sales of these products and other items.
  prefs: []
  type: TYPE_NORMAL
- en: '**Step 2: Prepare Your Data**'
  prefs: []
  type: TYPE_NORMAL
- en: Before interacting with ChatGPT, organize your data into a format that is easy
    to understand. It could be in tables, spreadsheets, or any other structured data
    format.
  prefs: []
  type: TYPE_NORMAL
- en: Let's assume the real dataset of the small distribution company includes columns
    such as "Product Name," "Sales," and "Date."
  prefs: []
  type: TYPE_NORMAL
- en: '**Step 3: Start a Conversation**'
  prefs: []
  type: TYPE_NORMAL
- en: 'Open up a conversation with ChatGPT and introduce the context of your data
    analysis project. For instance: "I have a dataset of sales data for various fast-moving
    consumer goods. I want to analyze the sales and identify the top-selling products.
    Additionally, I''m curious to know if there''s any correlation between the sales
    of these products and other items. Could you help me with this analysis?"'
  prefs: []
  type: TYPE_NORMAL
- en: '**Step 4: Ask Specific Questions**'
  prefs: []
  type: TYPE_NORMAL
- en: 'Proceed with specific questions related to the analysis:'
  prefs: []
  type: TYPE_NORMAL
- en: '*Can you tell me which products are the top sellers based on the sales data?*'
  prefs: []
  type: TYPE_NORMAL
- en: '*Is there any noticeable pattern or trend in the sales figures of these top-selling
    products?*'
  prefs: []
  type: TYPE_NORMAL
- en: '*Could you explore whether there''s any correlation between the sales of the
    top products and the sales of other items in the dataset?*'
  prefs: []
  type: TYPE_NORMAL
- en: '**Step 5: Seek Explanations**'
  prefs: []
  type: TYPE_NORMAL
- en: 'Do not just ask for results—ask ChatGPT to explain its reasoning. For example:'
  prefs: []
  type: TYPE_NORMAL
- en: '*Could you explain the factors contributing to the increase in sales during
    a certain month?*'
  prefs: []
  type: TYPE_NORMAL
- en: '*Why do you think these particular products are the top sellers?*'
  prefs: []
  type: TYPE_NORMAL
- en: '*Could you explain any factors contributing to the observed sales pattern?*'
  prefs: []
  type: TYPE_NORMAL
- en: '**Step 6: Visualize Insights**'
  prefs: []
  type: TYPE_NORMAL
- en: 'If your data includes numerical values, ask ChatGPT to help create visualizations.
    For instance:'
  prefs: []
  type: TYPE_NORMAL
- en: '*Please generate a line graph to display the sales trends over the past year.*'
  prefs: []
  type: TYPE_NORMAL
- en: '*Can you generate a bar chart illustrating the sales distribution of the top-selling
    products?*'
  prefs: []
  type: TYPE_NORMAL
- en: '*Please create a scatter plot to show the relationship between the sales of
    the top products and the sales of other items.*'
  prefs: []
  type: TYPE_NORMAL
- en: '**Step 7: Refine and Iterate**'
  prefs: []
  type: TYPE_NORMAL
- en: Based on the initial insights, continue refining your questions and iterating
    the conversation with ChatGPT to delve deeper into the analysis.
  prefs: []
  type: TYPE_NORMAL
- en: '**Step 8: Summarize Findings**'
  prefs: []
  type: TYPE_NORMAL
- en: Toward the end of your interaction, ask ChatGPT to summarize the key findings
    from the data analysis. It will help you consolidate the information for reporting
    or decision-making.
  prefs: []
  type: TYPE_NORMAL
- en: Throughout the process, remember that ChatGPT Plus aids the analysis, but your
    critical thinking and domain knowledge are essential for interpreting the results
    accurately. Feel free to modify the questions or instructions based on the specific
    dataset and nuances you encounter.
  prefs: []
  type: TYPE_NORMAL
- en: Following these steps, you can effectively leverage ChatGPT Plus to analyze
    sales data and uncover valuable insights that drive informed decisions.
  prefs: []
  type: TYPE_NORMAL
- en: Happy data analyzing!
  prefs: []
  type: TYPE_NORMAL
- en: Example
  prefs: []
  type: TYPE_NORMAL
- en: Data set
  prefs: []
  type: TYPE_NORMAL
- en: '| **Product Name** | **Sales April** | **Sales May** | **Sales June** | **Sales
    July** | **Sales August** |'
  prefs: []
  type: TYPE_TB
- en: '| Soap | 131.00 | 141.00 | 154.00 | 167.00 | 175.00 |'
  prefs: []
  type: TYPE_TB
- en: '| Shampoo | 138.00 | 139.00 | 146.00 | 152.00 | 160.00 |'
  prefs: []
  type: TYPE_TB
- en: '| Dish Soap | 157.00 | 153.00 | 149.00 | 151.00 | 152.00 |'
  prefs: []
  type: TYPE_TB
- en: '| Laundry Detergent |   84.00 |   86.00 |   80.00 |   81.00 |   83.00 |'
  prefs: []
  type: TYPE_TB
- en: 'Prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: '*The dataset is from a small FMCG distribution company. The dataset has six
    columns: Product Name, Sales April, Sales May, Sales June, Sales July, and Sales
    August. The first row of the dataset contains header names. Please:*'
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 1:'
  prefs: []
  type: TYPE_NORMAL
- en: '*Analyze the data structure.*'
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 2:'
  prefs: []
  type: TYPE_NORMAL
- en: '*Calculate the correlation between all product pairs.*'
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 3:'
  prefs: []
  type: TYPE_NORMAL
- en: '*Visualize the sales and write the correlation factors on the graph.*'
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 4:'
  prefs: []
  type: TYPE_NORMAL
- en: '*Find the top seller product, extract data, and visualize the sales of the
    top seller using different colors.*'
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 5:'
  prefs: []
  type: TYPE_NORMAL
- en: '*Find the best method to estimate sales for each product for September and
    visualize the sales of all products for April through September, included.*'
  prefs: []
  type: TYPE_NORMAL
- en: The first observation is that you can phrase the prompt in simple language,
    nothing technical, and ChatGPT will understand what you need.
  prefs: []
  type: TYPE_NORMAL
