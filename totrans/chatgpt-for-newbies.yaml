  type: TYPE_NORMAL
  zh: 平均转化率为5%，平均交易额为2,000美元。
- en: Customer churn rate is expected to be 5% annually.
  id: totrans-882
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 预计年客户流失率为5%。
- en: '| • | Outputs/Deliverables: |'
  id: totrans-883
  prefs: []
  type: TYPE_TB
  zh: '| • | 输出/可交付成果：'
