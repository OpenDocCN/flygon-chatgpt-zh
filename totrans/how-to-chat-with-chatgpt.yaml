- en: '![](image_rsrc2Y0.jpg)'
  id: totrans-676
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc2Y0.jpg)'
- en: 'DALL-E prompt: create a funny image of a woman and a square-shaped robot closeup,
    planning a big surprise, in a vibrant futuristic casual setting, with a wide aspect
    ratio 16:9'
  id: totrans-677
  prefs: []
  type: TYPE_NORMAL
  zh: DALL-E 提示：创建一张有趣的照片，展示一位女士和一位方形机器人特写镜头，正在计划一个大型惊喜，在一个充满活力的未来休闲环境中，宽高比为16:9
- en: 'Effective communication is key to building strong relationships, and it’s no
    different when interacting with ChatGPT. Be sure that Chat clearly understands
    your instructions before moving forward to get the best results:'
  id: totrans-678
  prefs: []
  type: TYPE_NORMAL
  zh: 有效的沟通是建立强大关系的关键，与ChatGPT互动时也不例外。在继续前进以获得最佳结果之前，请确保Chat清楚地理解了你的指令：
- en: 1\. “Did I explain what I want well enough?”
  id: totrans-679
  prefs: []
  type: TYPE_NORMAL
  zh: 1. “我是否很好地解释了我想要的东西？”
- en: 2\. “What do you think I’m asking you to do?”
  id: totrans-680
  prefs: []
  type: TYPE_NORMAL
  zh: 2. “你认为我要求你做什么？”
- en: 3\. “Is there anything confusing about my request?”
  id: totrans-681
  prefs: []
  type: TYPE_NORMAL
  zh: 3. “我的请求有什么不清楚的吗？”
- en: 4\. “Can you tell me, in your own words, what you plan to do?”
  id: totrans-682
  prefs: []
  type: TYPE_NORMAL
  zh: 4. “你能用你自己的话告诉我你打算做什么吗？”
- en: 5\. “Are you making any guesses based on my prompt?”
  id: totrans-683
  prefs: []
  type: TYPE_NORMAL
  zh: 5. “你根据我的提示做出任何猜测了吗？”
- en: 6\. “What parts of my request might be hard to do?”
  id: totrans-684
  prefs: []
  type: TYPE_NORMAL
  zh: 6. “我的请求中哪些部分可能难以完成？”
- en: 7\. “Which part of my request should you do first?”
  id: totrans-685
  prefs: []
  type: TYPE_NORMAL
  zh: 7. “我的请求中哪一部分你应该先做？”
- en: 8\. “What else do you need to know to help me?”
  id: totrans-686
  prefs: []
  type: TYPE_NORMAL
  zh: 8. “我还需要了解什么来帮助你？”
- en: 9\. “How could I ask this better?”
  id: totrans-687
  prefs: []
  type: TYPE_NORMAL
  zh: 9. “我如何更好地提出这个问题？”
- en: 10\. “Do you see any issues with doing what I’ve asked?”
  id: totrans-688
  prefs: []
  type: TYPE_NORMAL
  zh: 10. “你看到我请求的任何问题吗？”
- en: Chapter 3
  id: totrans-689
  prefs: []
  type: TYPE_NORMAL
  zh: 第3章
- en: Elevate Your Prompt Game
  id: totrans-690
  prefs: []
  type: TYPE_NORMAL
  zh: 提升你的提示技巧
- en: “We’re all prompt engineers. When my wife talks to me, she’s prompt engineering
    me.
  id: totrans-691
  prefs: []
  type: TYPE_NORMAL
  zh: “我们都是提示工程师。当我的妻子和我说话时，她正在对我进行提示工程。”
- en: — Jensen Huang, Founder and CEO, NVIDIA
  id: totrans-692
  prefs: []
  type: TYPE_NORMAL
  zh: —— 黄仁勋，英伟达创始人兼首席执行官
- en: By keeping in mind the importance of clarity when interacting with ChatGPT,
    you will get better responses in less time. CLEAR prompts will help you achieve
    what you seek from ChatGPT. You’ll have superpowers. So let’s take those newly-acquired
    superpowers and get into some advanced prompting.
  id: totrans-693
  prefs: []
  type: TYPE_NORMAL
  zh: 通过记住与ChatGPT互动时清晰度的重要性，您将更快地获得更好的回答。清晰的提示将帮助您从ChatGPT中获得您所寻求的东西。您将拥有超能力。所以，让我们利用这些新获得的能力，开始一些高级提示。
- en: This chapter explores creative prompting strategies like role-playing, prompt
    stacking, and chain-of-thought prompting. These methods not only deliver richer,
    more targeted responses but also streamline your ChatGPT interaction, eliminating
    the need for repetitive back-and-forth exchanges.
  id: totrans-694
  prefs: []
  type: TYPE_NORMAL
  zh: 本章探讨了创意提示策略，如角色扮演、提示堆叠和思维链提示。这些方法不仅提供更丰富、更有针对性的回答，而且简化了您的ChatGPT交互，消除了重复往返交换的需要。
- en: Imagine ChatGPT solving complex issues and generating ideas beyond your expectations
    with fewer prompts. This chapter shows you how to make ChatGPT work harder and
    smarter for you with strategic prompting. Ready for a magical ChatGPT experience?
    Let’s get into it.t.
  id: totrans-695
  prefs: []
  type: TYPE_NORMAL
  zh: 想象一下ChatGPT在更少的提示下解决复杂问题并产生超出您预期的想法。本章将向您展示如何通过战略提示让ChatGPT为您更努力、更聪明地工作。准备好体验神奇的ChatGPT了吗？让我们开始吧。
- en: Exploring Advanced Prompting
  id: totrans-696
  prefs: []
  type: TYPE_NORMAL
  zh: 探索高级提示
- en: '![](image_rsrc2Y1.jpg)'
  id: totrans-697
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrc2Y1.jpg)'
- en: 'DALL-E prompt: Generate a digital painting of a chatGPT-enabled robot, ecstatic,
    holding up a game controller with digital confetti and virtual fireworks in the
    background'
  id: totrans-698
  prefs: []
  type: TYPE_NORMAL
  zh: DALL-E提示：生成一幅由ChatGPT启用的机器人数字绘画，机器人兴奋地举起游戏控制器，背景中有数字烟花和虚拟烟花
- en: Let’s get into some exciting and advanced techniques to take your ChatGPT interactions
    to the next level. In this chapter, you’ll learn how to make the most out of ChatGPT’s
    capabilities with a few creative prompting strategies.
  id: totrans-699
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们深入了解一些令人兴奋的高级技巧，以将您的ChatGPT交互提升到下一个层次。在本章中，您将学习如何通过一些创造性的提示策略充分利用ChatGPT的功能。
- en: First, we’ll explore role-playing. Imagine asking ChatGPT to become anyone you
    want it to be—whether it’s a historical figure, a fictional character, or an industry
    expert. This method turns your interactions into detailed, tailored dialogues,
    making the conversation more engaging and informative.
  id: totrans-700
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，我们将探讨角色扮演。想象一下要求ChatGPT成为您想要的任何人——无论是历史人物、虚构角色还是行业专家。这种方法将您的互动转变为详细、定制的对话，使对话更加吸引人且信息丰富。
- en: After that it’s prompt stacking. This technique combines several questions into
    one comprehensive prompt, allowing you to get detailed answers without the need
    for constant back-and-forth. It’s perfect for when you need a thorough response
    in one go.
  id: totrans-701
  prefs: []
  type: TYPE_NORMAL
  zh: 之后是提示堆叠。这项技术将多个问题组合成一个综合提示，让您在一次交互中获取详细答案，无需不断往返。这对于您需要一次性获得全面回答的情况非常完美。
- en: We’ll also cover chain-of-thought prompting. Think of this as building a bridge,
    with each clearly worded question leading ChatGPT deeper into understanding your
    needs. This approach helps produce more thoughtful and intricate responses.
  id: totrans-702
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还将介绍思维链提示。将其视为搭建一座桥梁，每个清晰表述的问题都将ChatGPT引向更深入地理解您的需求。这种方法有助于产生更深思熟虑和复杂的回答。
- en: Finally, we’ll look at creative collaboration. Engage with ChatGPT in a way
    that goes beyond simple Q&A. This technique lets you explore your creativity,
    whether you’re brainstorming ideas, crafting stories, or solving complex problems
    together.t.
  id: totrans-703
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，我们将探讨创意协作。以超越简单问答的方式与ChatGPT互动。这种技术让您在头脑风暴、构思故事或共同解决复杂问题时发挥创造力。
- en: What makes role-playing so powerful?
  id: totrans-704
  prefs: []
  type: TYPE_NORMAL
  zh: 角色扮演为什么如此强大？
- en: Role play elevates ChatGPT from a basic responder to a character loaded with
    a backstory and specific insight. Whether you’re conversing with ChatGPT as a
    renowned physicist like asking ChatGpt to ‘act as Richard Feynman’ or a social
    media expert like asking ChatGPT to ‘act as Gary Vee,’ this method enriches responses
    with perspective and context, offering a tailored experience that standard queries
    can’t match.
  id: totrans-705
  prefs: []
  type: TYPE_NORMAL
  zh: 角色扮演将ChatGPT从基本的回应者提升为一个拥有背景故事和特定见解的角色。无论你是以著名物理学家如请求ChatGPT“扮演理查德·费曼”的身份与ChatGPT交谈，还是以社交媒体专家如请求ChatGPT“扮演Gary
    Vee”的身份交谈，这种方法都能通过视角和背景丰富回应，提供标准查询无法比拟的定制体验。
- en: How can you set the scene?
  id: totrans-706
  prefs: []
  type: TYPE_NORMAL
  zh: 你如何设置场景？
- en: 'Start by painting a vivid picture: who do you want ChatGPT to personify, where
    are they, and what’s the scenario? It’s like giving ChatGPT a script, yet with
    the freedom to improvise. This setup not only enriches the interaction but also
    unlocks a more engaging, fun, and informative exchange.'
  id: totrans-707
  prefs: []
  type: TYPE_NORMAL
  zh: 首先画出一个生动的画面：你希望ChatGPT扮演谁，他们在哪里，场景是什么？这就像给ChatGPT一个剧本，但又有即兴发挥的自由。这种设置不仅丰富了互动，还解锁了更吸引人、更有趣、更有信息量的交流。
- en: 'Example prompt: “Imagine you are Bob Ross in his studio. Teach me how to paint
    a simple landscape with happy little trees and a serene lake.”'
  id: totrans-708
  prefs: []
  type: TYPE_NORMAL
  zh: 示例提示：“想象你是在Bob Ross的工作室里。教我如何用快乐的小树和宁静的湖泊画一幅简单的风景画。”
- en: 'ChatGPT response: Alright, my friend, let’s take a journey to a beautiful place
    with some happy little trees and a serene lake. Grab your brushes and let’s get
    started!'
  id: totrans-709
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT回应：好的，我的朋友，让我们去一个美丽的地方旅行，那里有一些快乐的小树和宁静的湖泊。拿起你的画笔，我们开始吧！
- en: 'Materials You’ll Need:'
  id: totrans-710
  prefs: []
  type: TYPE_NORMAL
  zh: 你需要的材料：
- en: 1\. Canvas (size of your choice)
  id: totrans-711
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 画布（您选择的尺寸）
- en: '2\. Acrylic or oil paints: Titanium White, Phthalo Blue, Prussian Blue, Midnight
    Black, Alizarin Crimson, Sap Green, Van Dyke Brown, Dark Sienna, Indian Yellow,
    Yellow Ochre, Bright Red, and Liquid White.'
  id: totrans-712
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 丙烯或油画颜料：钛白，酞菁蓝，普鲁士蓝，午夜黑，洋红色，黄绿色，梵高棕，深赭石，印度黄，黄赭石，鲜红，液体白。
- en: '3\. Brushes: 2-inch brush, 1-inch brush, fan brush, liner brush'
  id: totrans-713
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 画笔：2英寸画刷、1英寸画刷、扇形画刷、细笔刷
- en: 4\. Palette knife
  id: totrans-714
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 调色刀
- en: 5\. Palette for mixing
  id: totrans-715
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 调色板用于混合
- en: 'Steps to Paint a Simple Landscape:'
  id: totrans-716
  prefs: []
  type: TYPE_NORMAL
  zh: 简单风景画的绘画步骤：
- en: '1\. Prepare Your Canvas:'
  id: totrans-717
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 准备你的画布：
- en: Start by applying a thin, even coat of Liquid White to your canvas. This wet
    base will help you blend colors on the canvas.
  id: totrans-718
  prefs: []
  type: TYPE_NORMAL
  zh: 首先在你的画布上涂上一层薄薄的、均匀的液体白。这个湿润的基底将帮助你将颜色在画布上混合。
- en: '2\. Create the Sky:'
  id: totrans-719
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 创建天空：
- en: Load a small amount of Phthalo Blue onto your 2-inch brush. Start at the top
    of the canvas and make criss-cross strokes. As you work your way down, the color
    should become lighter. This creates a nice gradient effect.
  id: totrans-720
  prefs: []
  type: TYPE_NORMAL
  zh: 在你的2英寸画刷上蘸取少量酞菁蓝。从画布的顶部开始，进行交叉涂抹。当你向下工作时，颜色应该变浅。这会创造一个很好的渐变效果。
- en: You can add a touch of Alizarin Crimson to the blue to create a purplish tint
    for a sunset sky if you like.
  id: totrans-721
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你喜欢，可以在蓝色中加入一点洋红色以创建紫罗兰色调的日落天空。
- en: '3\. Paint the Water:'
  id: totrans-722
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 涂抹水面：
- en: Using the same brush, pull some of the Phthalo Blue down into the water area.
    Add a touch of Titanium White to create reflections. Horizontal strokes work best
    for water.
  id: totrans-723
  prefs: []
  type: TYPE_NORMAL
  zh: 使用同一把画刷，将一些酞菁蓝拉到水面区域。添加一点钛白以产生反射。水平线条最适合水面。
- en: '4\. Add Distant Trees:'
  id: totrans-724
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 添加远景树：
- en: Mix a little Prussian Blue, Midnight Black, and Alizarin Crimson to create a
    dark color. Use your 1-inch brush to tap in the shapes of distant trees. Just
    tap gently to create a textured look.
  id: totrans-725
  prefs: []
  type: TYPE_NORMAL
  zh: 混合一点普鲁士蓝、午夜黑和洋红色以创建一种深色。使用你的1英寸画刷轻轻敲击出远处的树木形状。只需轻轻敲击以创造纹理效果。
- en: Add a little bit of white to the mix to lighten it up for the reflection in
    the water.
  id: totrans-726
  prefs: []
  type: TYPE_NORMAL
  zh: 在混合物中添加一点白色，以使水面反射更加明亮。
- en: '5\. Create the Midground Trees:'
  id: totrans-727
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 创建中景树：
- en: Use a mixture of Sap Green, Van Dyke Brown, and a touch of Yellow Ochre. With
    your 1-inch brush, tap in some midground trees. Use the corner of the brush to
    create leafy textures.
  id: totrans-728
  prefs: []
  type: TYPE_NORMAL
  zh: 使用黄绿色、梵高棕和一点黄赭石的混合物。用你的1英寸画刷轻轻敲击一些中景树。用画刷的角落创造叶子的纹理。
- en: '6\. Paint the Lake Shore:'
  id: totrans-729
  prefs: []
  type: TYPE_NORMAL
  zh: 6. 涂抹湖岸：
- en: Mix some Van Dyke Brown with Dark Sienna. Use your palette knife to scrape in
    some land along the shoreline. Pull the paint down to create the reflection in
    the water.
  id: totrans-730
  prefs: []
  type: TYPE_NORMAL
  zh: 将梵高棕与深赭石混合。使用你的调色刀在岸边刮出一些陆地。将颜料拉下来以在水中产生反射。
- en: Add a bit of highlight to the land with a touch of Yellow Ochre and Titanium
    White.
  id: totrans-731
  prefs: []
  type: TYPE_NORMAL
  zh: 用一点黄赭石和钛白为陆地添加一些高光。
- en: '7\. Add Happy Little Trees:'
  id: totrans-732
  prefs: []
  type: TYPE_NORMAL
  zh: 7. 添加快乐的小树：
- en: Load your fan brush with a mixture of Sap Green and a touch of Indian Yellow.
    Tap the brush to create the shape of evergreen trees. Start at the top and work
    your way down, getting wider as you go.
  id: totrans-733
  prefs: []
  type: TYPE_NORMAL
  zh: 用扇形刷蘸上树绿和一点印度黄的混合物。轻敲刷子以创建常绿树的外形。从顶部开始，逐渐向下工作，越往下越宽。
- en: Remember, these are happy little trees, so let them have fun and be unique!
  id: totrans-734
  prefs: []
  type: TYPE_NORMAL
  zh: 记住，这些是快乐的小树，所以让他们尽情玩耍，保持独特！
- en: '8\. Detail the Trees and Land:'
  id: totrans-735
  prefs: []
  type: TYPE_NORMAL
  zh: 8. 详细描述树木和土地：
- en: Use your liner brush and a thin mixture of brown to add tree trunks and branches.
    Don’t worry about making them perfect; nature is wonderfully imperfect.
  id: totrans-736
  prefs: []
  type: TYPE_NORMAL
  zh: 使用您的线条刷和少量棕色混合物添加树干和树枝。不用担心做得完美；大自然是美妙的不完美。
- en: Add a few highlights to the trees with a lighter green mix.
  id: totrans-737
  prefs: []
  type: TYPE_NORMAL
  zh: 在树木上添加一些浅绿色的点缀。
- en: '9\. Add Final Touches:'
  id: totrans-738
  prefs: []
  type: TYPE_NORMAL
  zh: 9. 添加最终细节：
- en: Mix a bit of white with blue to add some highlights on the water, indicating
    ripples and reflections.
  id: totrans-739
  prefs: []
  type: TYPE_NORMAL
  zh: 在水中混合一些白色和蓝色，以添加一些高光，表示波纹和反射。
- en: If you want, you can add a couple of birds in the sky using your liner brush
    and a bit of black.
  id: totrans-740
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您愿意，可以使用您的线条刷和一点黑色在空中添加几只鸟。
- en: '10\. Sign Your Painting:'
  id: totrans-741
  prefs: []
  type: TYPE_NORMAL
  zh: 10. 签署您的画作：
- en: Once you’re happy with your landscape, sign your painting with your liner brush.
  id: totrans-742
  prefs: []
  type: TYPE_NORMAL
  zh: 当您对您的风景满意后，使用您的线条刷签署您的画作。
- en: And there you have it! A simple, serene landscape with happy little trees and
    a peaceful lake. Remember, the joy of painting is in the process, so enjoy every
    moment and let your creativity flow. Happy painting, my friend!
  id: totrans-743
  prefs: []
  type: TYPE_NORMAL
  zh: 就这样！一个简单宁静的风景，有快乐的小树和平静的湖泊。记住，绘画的乐趣在于过程，所以享受每一刻，让您的创造力自由流淌。祝您绘画愉快，我的朋友！
- en: 20 Role Play Prompts for Everyday
  id: totrans-744
  prefs: []
  type: TYPE_NORMAL
  zh: 20 个日常角色扮演提示
- en: '![](image_rsrc2Y2.jpg)'
  id: totrans-745
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrc2Y2.jpg)'
- en: 'DALL-E prompt: Imagine an illustration featuring a ChatGPT-inspired robot assistant
    embracing the role of a professional photographer, complete with photography equipment
    in a picturesque setting'
  id: totrans-746
  prefs: []
  type: TYPE_NORMAL
  zh: DALL-E 提示：想象一幅插图，展示一个受 ChatGPT 启发的机器人助手扮演专业摄影师的角色，背景是一个风景如画的地点，并配备了摄影设备。
- en: 1\. “As a productivity coach, how would you structure a workday for a professional
    with a young family to maximize efficiency and family time?”
  id: totrans-747
  prefs: []
  type: TYPE_NORMAL
  zh: 1. “作为一名生产力教练，您会如何为有年轻家庭的职业人士规划工作日，以最大化效率和家庭时间？”
- en: 2\. “If you were a financial advisor, what strategies would you suggest for
    managing a household budget that accommodates childcare and savings?”
  id: totrans-748
  prefs: []
  type: TYPE_NORMAL
  zh: 2. “如果您是一位财务顾问，您会建议哪些策略来管理一个兼顾育儿和储蓄的家庭预算？”
- en: 3\. “Pretend you’re a chef specializing in quick, healthy meals. What weeknight
    dinner plan would you propose that involves the children’s help?”
  id: totrans-749
  prefs: []
  type: TYPE_NORMAL
  zh: 3. “假设您是一位擅长快速健康餐点的厨师。您会提出一个涉及孩子帮助的周中晚餐计划吗？”
- en: 4\. “As a fitness trainer, could you outline a quick morning workout routine
    that can be done before the kids wake up?”
  id: totrans-750
  prefs: []
  type: TYPE_NORMAL
  zh: 4. “作为一名健身教练，您能否概述一个在孩子们醒来之前可以完成的快速早晨锻炼计划？”
- en: 5\. “Imagine you’re a life coach. How would you advise balancing professional
    development with family commitments?”
  id: totrans-751
  prefs: []
  type: TYPE_NORMAL
  zh: 5. “想象您是一位人生导师。您会如何建议平衡职业发展与家庭责任？”
- en: 6\. “Assume you’re an interior designer. How would you organize a home office
    that’s efficient yet child-friendly?”
  id: totrans-752
  prefs: []
  type: TYPE_NORMAL
  zh: 6. “假设您是一位室内设计师。您会如何布置一个既高效又适合儿童的家庭办公室？”
- en: 7\. “As a time-management expert, what tips would you give for preparing for
    the upcoming week during a busy weekend?”
  id: totrans-753
  prefs: []
  type: TYPE_NORMAL
  zh: “作为一名时间管理专家，您在繁忙的周末为准备即将到来的周提供哪些建议？”
- en: 8\. “Pretend you’re a stress-relief therapist. What are some quick de-stressing
    techniques suitable for a parent between meetings?”
  id: totrans-754
  prefs: []
  type: TYPE_NORMAL
  zh: 8. “假设您是一位减压治疗师。对于会议之间的家长，有哪些快速减压技巧是合适的？”
- en: 9\. “As an educational consultant, how would you suggest incorporating educational
    activities into family time for school-aged children?”
  id: totrans-755
  prefs: []
  type: TYPE_NORMAL
  zh: 9. “作为一名教育顾问，您建议如何将教育活动融入学龄儿童的家庭时间？”
- en: 10\. “Imagine you’re a cybersecurity expert. How can a professional protect
    their family’s digital information while working remotely?”
  id: totrans-756
  prefs: []
  type: TYPE_NORMAL
  zh: 10. “想象您是一位网络安全专家。专业人士如何在远程办公的同时保护家人的数字信息？”
- en: 11\. “If you were a personal shopper, what tips would you offer for efficiently
    updating a professional’s wardrobe on a budget, with online shopping?”
  id: totrans-757
  prefs: []
  type: TYPE_NORMAL
  zh: 11. “如果您是一位个人购物顾问，您会提供哪些关于在预算内高效更新专业人士衣物的建议，特别是使用在线购物？”
- en: 12\. “Pretend you’re a nutritionist. What simple changes would you suggest to
    a busy professional’s diet to improve energy and focus?”
  id: totrans-758
  prefs: []
  type: TYPE_NORMAL
  zh: 12. “假设您是一位营养师。您会建议对忙碌的专业人士的饮食进行哪些简单的改变，以提升能量和专注力？”
- en: 13\. “As a travel planner, how would you organize a weekend getaway that balances
    relaxation for the parents and fun for the kids?”
  id: totrans-759
  prefs: []
  type: TYPE_NORMAL
  zh: 13. “作为一名旅行规划师，您会如何安排一个既能让父母放松又能让孩子们快乐的周末度假？”
- en: 14\. “Imagine you’re a time-saving expert. What strategies would you recommend
    for quick and effective grocery shopping?”
  id: totrans-760
  prefs: []
  type: TYPE_NORMAL
  zh: 14. “想象一下您是一位节省时间专家。您会推荐哪些策略来快速有效地购物？”
- en: 15\. “Assume you’re a personal development coach. How would you guide a professional
    in setting realistic personal and career goals?”
  id: totrans-761
  prefs: []
  type: TYPE_NORMAL
  zh: 15. “假设您是一位个人发展教练。您会如何指导专业人士设定现实可行的个人和职业目标？”
- en: 16\. “If you were a hobby coach, what hobbies would you recommend to a professional
    looking to find a fulfilling activity outside of work?”
  id: totrans-762
  prefs: []
  type: TYPE_NORMAL
  zh: 16. “如果您是一位爱好教练，您会推荐哪些爱好给那些希望在业余时间找到充实活动专业人士？”
- en: 17\. “Pretend you’re a mindfulness instructor. What daily practices would you
    suggest to a professional to help maintain mental clarity?”
  id: totrans-763
  prefs: []
  type: TYPE_NORMAL
  zh: 17. “假装您是一位正念指导师。您会建议哪些日常实践给专业人士以帮助保持心理清晰？”
- en: 18\. “As a sleep specialist, what routine would you advise for a professional
    struggling to get restful sleep due to stress?”
  id: totrans-764
  prefs: []
  type: TYPE_NORMAL
  zh: 18. “作为一名睡眠专家，您会建议哪种常规给那些因压力而难以获得休息性睡眠的专业人士？”
- en: 19\. “Imagine you’re a relationship advisor. How would you recommend a professional
    manage work-life balance to improve family relationships?”
  id: totrans-765
  prefs: []
  type: TYPE_NORMAL
  zh: 19. “想象一下您是一位关系顾问。您会如何建议专业人士管理工作和生活的平衡，以改善家庭关系？”
- en: 20\. “If you were an efficiency consultant, what would be your top recommendation
    for automating household tasks to save time?”
  id: totrans-766
  prefs: []
  type: TYPE_NORMAL
  zh: 20. “如果您是一位效率顾问，您会如何建议自动化家务任务以节省时间？”
- en: 20 Role Play Prompts for Health & Wellness
  id: totrans-767
  prefs: []
  type: TYPE_NORMAL
  zh: 20. 健康与福祉角色扮演提示
- en: '![](image_rsrc2Y3.jpg)'
  id: totrans-768
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrc2Y3.jpg)'
- en: 'DALL-E prompt: Generate a photo-realistic image of a serene landscape transformed
    by AI, happy, chill vibes, --ar 16:9'
  id: totrans-769
  prefs: []
  type: TYPE_NORMAL
  zh: DALL-E 提示：生成一张由 AI 转变的宁静风景照片，快乐、轻松的氛围，--ar 16:9
- en: 1\. “As a personal trainer specializing in office ergonomics, what exercises
    would you recommend for someone sitting at a desk all day?”
  id: totrans-770
  prefs: []
  type: TYPE_NORMAL
  zh: 1. “作为一名专注于办公室人体工学的个人训练师，您会推荐哪些锻炼给整天坐在办公桌前的人？”
- en: 2\. “Pretend you’re a nutritionist. What meal planning tips would you give to
    a busy professional looking to eat healthily with limited prep time?”
  id: totrans-771
  prefs: []
  type: TYPE_NORMAL
  zh: 2. “假装您是一位营养师。您会给一个忙碌的专业人士提供哪些餐食计划建议，以便在有限准备时间下健康饮食？”
- en: 3\. “Imagine you’re a sleep coach. How would you advise improving sleep quality
    for someone balancing a high-pressure job and family life?”
  id: totrans-772
  prefs: []
  type: TYPE_NORMAL
  zh: 3. “想象一下您是一位睡眠教练。您会如何建议改善一个既要应对高压力工作又要平衡家庭生活的人的睡眠质量？”
- en: 4\. “As a mindfulness instructor, what quick stress-reduction techniques would
    you suggest for someone with a demanding schedule?”
  id: totrans-773
  prefs: []
  type: TYPE_NORMAL
  zh: 4. “作为一名正念指导师，您会建议哪些快速减压技巧给那些日程安排紧张的人？”
- en: 5\. “As an exercise physiologist, what is a quick circuit workout you would
    propose for someone with only a lunch hour available?”
  id: totrans-774
  prefs: []
  type: TYPE_NORMAL
  zh: 5. “作为一名运动生理学家，您会为只有午餐时间可用的人提出哪种快速循环训练？”
- en: 6\. “Pretend you’re a life coach. How would you guide someone to achieve work-life
    balance without sacrificing career progression?”
  id: totrans-775
  prefs: []
  type: TYPE_NORMAL
  zh: 6. “假装您是一位人生教练。您会如何指导一个人在不牺牲职业进步的情况下实现工作与生活的平衡？”
- en: 7\. “As a yoga teacher, can you create a 15-minute morning routine designed
    to energize and focus a professional before a long workday?”
  id: totrans-776
  prefs: []
  type: TYPE_NORMAL
  zh: 7. “作为一名瑜伽老师，您能创造一个旨在在漫长工作日之前为专业人士提供能量和专注力的15分钟早晨常规吗？”
- en: 8\. “Imagine you’re a mental health counselor. What daily practices would you
    recommend to a remote worker facing isolation?”
  id: totrans-777
  prefs: []
  type: TYPE_NORMAL
  zh: 8. “想象一下您是一位心理健康顾问。您会推荐哪些日常实践给一位面临孤独的远程工作者？”
- en: 9\. “Act a relationship counselor. How would you suggest busy professionals
    maintain strong family connections amidst their work commitments?”
  id: totrans-778
  prefs: []
  type: TYPE_NORMAL
  zh: 9. “扮演一位关系顾问。您会如何建议忙碌的专业人士在他们的工作承诺中保持强大的家庭联系？”
- en: 10\. “As a digital wellness expert, what habits would you recommend to reduce
    digital strain and screen time after office hours?”
  id: totrans-779
  prefs: []
  type: TYPE_NORMAL
  zh: 10. “作为一名数字健康专家，您会推荐哪些习惯来减少下班后的数字压力和屏幕时间？”
- en: 11\. “As a hydration specialist, what strategies would you recommend for ensuring
    a busy professional stays adequately hydrated throughout their day?”
  id: totrans-780
  prefs: []
  type: TYPE_NORMAL
  zh: 11. “作为一名水分专家，您会推荐哪些策略以确保忙碌的专业人士在一天中保持充足的水分？”
- en: 12\. “Pretend you’re a dermatologist. What simple skincare routine would you
    suggest for someone exposed to screen light for extended periods?”
  id: totrans-781
  prefs: []
  type: TYPE_NORMAL
  zh: 12. “假装您是一位皮肤科医生。您会建议一个长时间暴露在屏幕光线下的简单护肤程序吗？”
- en: 13\. “Imagine you’re a holistic health coach. How would you incorporate natural
    supplements into a daily routine for stress management?”
  id: totrans-782
  prefs: []
  type: TYPE_NORMAL
  zh: 13. “想象你是一位整体健康教练。你如何将天然补充剂融入日常常规中，以管理压力？”
- en: 14\. “As a dietitian, what are some quick and nutritious breakfast options you
    would recommend for a professional always on-the-go?”
  id: totrans-783
  prefs: []
  type: TYPE_NORMAL
  zh: 14. “作为一名营养师，你推荐一些快速且营养的早餐选项，给那些总是忙碌的专业人士？”
- en: 15\. “If you were a physiotherapist, what desk-friendly stretches would you
    propose to alleviate neck and shoulder pain from long hours of sitting?”
  id: totrans-784
  prefs: []
  type: TYPE_NORMAL
  zh: 15. “如果你是一位理疗师，你会提出哪些适合办公桌的伸展运动，以缓解长时间坐着引起的颈部和肩部疼痛？”
- en: 16\. “Pretend you’re a wellness retreat planner. How would you suggest a professional
    incorporate mini relaxation sessions into a hectic week?”
  id: totrans-785
  prefs: []
  type: TYPE_NORMAL
  zh: 16. “扮演一位健康度假村策划者。你会如何建议专业人士在繁忙的一周中融入短暂的放松时间？”
- en: 17\. “As an allergist, what advice would you give to professionals dealing with
    seasonal allergies without letting it disrupt their work?”
  id: totrans-786
  prefs: []
  type: TYPE_NORMAL
  zh: 17. “作为一名过敏科医生，你会给那些处理季节性过敏而不影响其工作的专业人士提供什么建议？”
- en: 18\. “Imagine you’re a fitness app developer. What features would you include
    in an app designed for professionals with unpredictable schedules?”
  id: totrans-787
  prefs: []
  type: TYPE_NORMAL
  zh: 18. “想象你是一位健身应用开发者。你会在为那些日程不规律的专业人士设计的应用中包含哪些功能？”
- en: 19\. “Act as a meal prep consultant. What is the most efficient way to prepare
    a week’s worth of healthy meals for someone with little spare time?”
  id: totrans-788
  prefs: []
  type: TYPE_NORMAL
  zh: 19. “扮演一位餐食准备顾问。对于几乎没有空闲时间的人来说，准备一周的健康餐食最有效的方法是什么？”
- en: 20\. “As a health gadget reviewer, what wearable technology would you recommend
    to a professional interested in tracking their fitness progress?”
  id: totrans-789
  prefs: []
  type: TYPE_NORMAL
  zh: 20. “作为一名健康小工具评论员，你会向一位对追踪其健身进展感兴趣的专业人士推荐哪种可穿戴技术？”
- en: 20 Role Play Prompts for Meal Planning
  id: totrans-790
  prefs: []
  type: TYPE_NORMAL
  zh: 20 个餐食计划角色扮演提示
- en: '![](image_rsrc2Y4.jpg)'
  id: totrans-791
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrc2Y4.jpg)'
- en: 'DALL-E prompt: Imagine a scene in a sleek, futuristic kitchen, powered by AI,
    in a warm and comfy environment, --ar 16:9'
  id: totrans-792
  prefs: []
  type: TYPE_NORMAL
  zh: DALL-E 提示：想象一个在温暖舒适的未来派厨房场景，由人工智能驱动，--ar 16:9
- en: 1\. “As a sustainable living consultant, what weekly meal plan would you recommend
    that minimizes waste and supports local farmers?”
  id: totrans-793
  prefs: []
  type: TYPE_NORMAL
  zh: 1. “作为一名可持续生活顾问，你会推荐什么样的每周餐食计划，以最大限度地减少浪费并支持当地农民？”
- en: 2\. “If you were a fitness nutritionist, how would you design a meal plan that
    complements a high-intensity workout regimen?”
  id: totrans-794
  prefs: []
  type: TYPE_NORMAL
  zh: 2. “如果你是一位健身营养师，你会如何设计一个餐食计划，以补充高强度锻炼计划？”
- en: 3\. “Pretend you’re a budgeting expert specializing in food expenses. What cost-effective
    meal strategies would you propose for a family of four?”
  id: totrans-795
  prefs: []
  type: TYPE_NORMAL
  zh: 3. “扮演一位专注于食品支出的预算专家。你会为四口之家提出哪些经济实惠的餐食策略？”
- en: 4\. “As a vegan lifestyle coach, could you outline a nutritious and satisfying
    vegan meal plan for someone transitioning to plant-based eating?”
  id: totrans-796
  prefs: []
  type: TYPE_NORMAL
  zh: 4. “作为一名素食生活方式教练，你能概述一个营养且令人满意的素食餐食计划，为那些转向植物性饮食的人？”
- en: 5\. “Imagine you’re a culinary instructor. How would you suggest involving children
    in meal preparation to foster a love of cooking?”
  id: totrans-797
  prefs: []
  type: TYPE_NORMAL
  zh: 5. “想象你是一位烹饪讲师。你会如何建议让儿童参与餐食准备，以培养他们对烹饪的热爱？”
- en: 6\. “Assume you’re a gourmet chef. What meal plan would you create that introduces
    exotic flavors while being easy to prepare?”
  id: totrans-798
  prefs: []
  type: TYPE_NORMAL
  zh: 6. “假设你是一位高级厨师。你会创建什么样的餐食计划，在引入异国风味的同时又易于准备？”
- en: 7\. “As a dietician, what meal plan would you recommend for someone with specific
    dietary needs, like gluten intolerance or diabetes?”
  id: totrans-799
  prefs: []
  type: TYPE_NORMAL
  zh: 7. “作为一名营养师，你会为有特定饮食需求的人（如对麸质不耐受或糖尿病患者）推荐什么餐食计划？”
- en: 8\. “Pretend you’re a meal prep guru. What efficient meal prep techniques would
    you suggest for a busy professional?”
  id: totrans-800
  prefs: []
  type: TYPE_NORMAL
  zh: 8. “扮演一位餐食准备大师。你会建议哪些高效的餐食准备技巧，给那些忙碌的专业人士？”
- en: 9\. “As a wellness coach, how would you incorporate superfoods into a weekly
    meal plan for optimal health?”
  id: totrans-801
  prefs: []
  type: TYPE_NORMAL
  zh: 9. “作为一名健康教练，你如何将超级食品融入每周的餐食计划，以实现最佳健康状态？”
- en: 10\. “Imagine you’re a culinary world traveler. What global cuisine-inspired
    meal plan would you craft for adventurous eaters?”
  id: totrans-802
  prefs: []
  type: TYPE_NORMAL
  zh: 10. “想象你是一位美食世界旅行者。你会为那些喜欢冒险的食客制定什么样的全球美食灵感餐食计划？”
- en: 11\. “If you were a local produce advocate, how would you design a meal plan
    that highlights seasonal and locally sourced ingredients?”
  id: totrans-803
  prefs: []
  type: TYPE_NORMAL
  zh: 11. “如果你是一位地方农产品倡导者，你会如何设计一个突出季节性和本地食材的餐食计划？”
- en: 12\. “Pretend you’re a family therapist. What meal planning strategies would
    you suggest to encourage family bonding during meals?”
  id: totrans-804
  prefs: []
  type: TYPE_NORMAL
  zh: 12. “扮演一位家庭治疗师。你建议采取哪些餐食计划策略来鼓励在用餐时增进家庭关系？”
- en: 13\. “As a professional organizer, how would you suggest structuring kitchen
    storage for easier meal preparation and planning?”
  id: totrans-805
  prefs: []
  type: TYPE_NORMAL
  zh: 13. “作为一名专业整理师，你会建议如何构建厨房储物空间，以便更容易准备和规划餐食？”
- en: 14\. “Imagine you’re a quick-fix meals expert. What meal plan would you propose
    for individuals with less than 30 minutes to cook daily?”
  id: totrans-806
  prefs: []
  type: TYPE_NORMAL
  zh: 14. “想象你是一位快速烹饪专家。你会为那些每天烹饪时间少于30分钟的人提出怎样的餐单建议？”
- en: 15\. “Assume you’re a health and fitness coach. How would you balance a meal
    plan to support both weight loss and muscle gain?”
  id: totrans-807
  prefs: []
  type: TYPE_NORMAL
  zh: 15. “假设你是一位健康和健身教练。你会如何平衡餐单以支持减肥和增肌？”
- en: 16\. “If you were a senior nutrition specialist, what meal plan considerations
    would you recommend for older adults to maintain health?”
  id: totrans-808
  prefs: []
  type: TYPE_NORMAL
  zh: 16. “如果你是一位高级营养专家，你会推荐哪些餐单考虑因素，以帮助老年人保持健康？”
- en: 17\. “Pretend you’re an eco-friendly chef. How would you create a meal plan
    that reduces carbon footprint through food choices?”
  id: totrans-809
  prefs: []
  type: TYPE_NORMAL
  zh: 17. “假装你是一位环保厨师。你会如何通过食物选择来制定一个减少碳足迹的餐单？”
- en: 18\. “As a culinary creativity coach, what techniques would you suggest for
    transforming classic dishes into new, exciting meals?”
  id: totrans-810
  prefs: []
  type: TYPE_NORMAL
  zh: 18. “作为一名烹饪创意教练，你会建议哪些技巧将经典菜肴转变为新颖、令人兴奋的美食？”
- en: 19\. “Imagine you’re a plant-based pastry chef. What would a week of indulgent
    yet healthy dessert options look like?”
  id: totrans-811
  prefs: []
  type: TYPE_NORMAL
  zh: 19. “想象你是一位植物基糕点厨师。一个充满诱惑且健康的甜点选择周会是什么样子？”
- en: 20\. “If you were a food sensitivity expert, how would you tailor a meal plan
    to avoid common allergens while remaining flavorful and diverse?”
  id: totrans-812
  prefs: []
  type: TYPE_NORMAL
  zh: 20. “如果你是一位食物敏感性专家，你会如何调整餐单，以避免常见过敏原，同时保持美味和多样性？”
- en: 20 Creative Examples of Role Play Prompts
  id: totrans-813
  prefs: []
  type: TYPE_NORMAL
  zh: 20. 创意角色扮演提示示例
