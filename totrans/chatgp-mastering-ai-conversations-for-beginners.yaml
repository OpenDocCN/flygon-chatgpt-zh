  zh: 如同我们在上一节中看到的，数字工具在心理健康领域的使用经历了巨大的增长。这有助于使心理健康支持民主化，使其对每个人来说都变得可用。而且，如果COVID-19将数字疗法推进了几步，那么像ChatGPT这样的LLM的发明则进一步加速了这一进程，将在线心理健康服务向前推进，在短时间内取得了进展，并扩大了其边界，同时使其对任何需要它但负担不起传统治疗途径的人变得更加容易获得。
