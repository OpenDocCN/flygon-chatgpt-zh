  type: TYPE_NORMAL
  zh: 设置对数刻度
- en: add titles
  id: totrans-2119
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 添加标题
- en: 'Some useful Seaborn methods are listed here:'
  id: totrans-2120
  prefs: []
  type: TYPE_NORMAL
  zh: 列出一些有用的 Seaborn 方法：
