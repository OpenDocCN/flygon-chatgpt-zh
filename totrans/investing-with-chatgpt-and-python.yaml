- en: '4\. Backup and security :'
  id: totrans-1219
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 备份和安全：
- en: 'Data backup :'
  id: totrans-1220
  prefs: []
  type: TYPE_NORMAL
  zh: 数据备份：
- en: Use Time Machine for regular, automatic backups of your system and data. Also
    use online backup solutions like iCloud, Google Drive or Dropbox for extra security.
  id: totrans-1221
  prefs: []
  type: TYPE_NORMAL
  zh: 使用Time Machine进行系统和数据定期自动备份。同时使用在线备份解决方案，如iCloud、Google Drive或Dropbox以获得额外的安全性。
- en: 'Security and Antivirus :'
  id: totrans-1222
  prefs: []
  type: TYPE_NORMAL
  zh: 安全和杀毒软件：
- en: Install reliable antivirus software and keep your operating system up to date
    to protect your data and algorithms from cyberthreats.
  id: totrans-1223
  prefs: []
  type: TYPE_NORMAL
  zh: 安装可靠的杀毒软件并保持操作系统更新，以保护您的数据和算法免受网络威胁。
- en: By following these recommendations, you can set up a stable, high-performance
    macOS environment for algorithmic trading, capable of processing data continuously
    and executing orders without interruption.
  id: totrans-1224
  prefs: []
  type: TYPE_NORMAL
  zh: 通过遵循这些建议，您可以设置一个稳定、高性能的macOS环境，用于算法交易，能够连续处理数据并不间断地执行订单。
- en: 'Part 3: Under Linux (Ubuntu)'
  id: totrans-1225
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 第三部分：在Linux（Ubuntu）下
- en: Ubuntu is a popular Linux distribution, appreciated for its ease of use and
    large support community. It's an excellent option for traders wishing to benefit
    from the robustness and flexibility of Linux.
  id: totrans-1226
  prefs: []
  type: TYPE_NORMAL
  zh: Ubuntu是一个流行的Linux发行版，因其易用性和庞大的支持社区而受到赞赏。它是希望从Linux的稳健性和灵活性中受益的交易者的绝佳选择。
- en: '![](images/image-PKBUNDJ5.png)'
  id: totrans-1227
  prefs: []
  type: TYPE_IMG
  zh: '![图片](images/image-PKBUNDJ5.png)'
- en: '1\. Minimum recommended configuration :'
  id: totrans-1228
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 推荐的最小配置：
- en: 'Computer: standard Linux-compatible PC.'
  id: totrans-1229
  prefs: []
  type: TYPE_NORMAL
  zh: 计算机：标准兼容Linux的PC。
- en: 'Operating system: Ubuntu 20.04 LTS or later.'
  id: totrans-1230
  prefs: []
  type: TYPE_NORMAL
  zh: 操作系统：Ubuntu 20.04 LTS或更高版本。
- en: 'Processor: Intel Core i5 or higher.'
  id: totrans-1231
  prefs: []
  type: TYPE_NORMAL
  zh: 处理器：Intel Core i5或更高。
- en: 'RAM memory: 8 GB minimum, 16 GB recommended for best multitasking performance.'
  id: totrans-1232
  prefs: []
  type: TYPE_NORMAL
  zh: RAM内存：最小8 GB，推荐16 GB以获得最佳多任务性能。
- en: 'Storage: 256 GB SSD minimum for fast read/write speeds.'
  id: totrans-1233
  prefs: []
  type: TYPE_NORMAL
  zh: 存储：最小256 GB SSD以获得快速的读写速度。
- en: 'Network connection: Ethernet or Wi-Fi connection with a reliable Internet link,
    preferably a fiber optic connection to minimize latencies and interruptions.'
  id: totrans-1234
  prefs: []
  type: TYPE_NORMAL
  zh: 网络连接：具有可靠互联网链接的以太网或Wi-Fi连接，最好使用光纤连接以最小化延迟和中断。
- en: '2\. PC configuration :'
  id: totrans-1235
  prefs: []
  type: TYPE_NORMAL
  zh: 2. PC配置：
- en: 'Installing Ubuntu :'
  id: totrans-1236
  prefs: []
  type: TYPE_NORMAL
  zh: 安装Ubuntu：
- en: Download the Ubuntu ISO image from ubuntu.com.
  id: totrans-1237
  prefs: []
  type: TYPE_NORMAL
  zh: 从ubuntu.com下载Ubuntu ISO镜像。
- en: Create an installation medium (bootable USB key) using a tool like Rufus (Windows)
    or Disk Utility (macOS).
  id: totrans-1238
  prefs: []
  type: TYPE_NORMAL
  zh: 使用Rufus（Windows）或Disk Utility（macOS）等工具创建安装介质（可启动的USB闪存驱动器）。
- en: Boot the computer from the USB key and follow the Ubuntu installation instructions.
  id: totrans-1239
  prefs: []
  type: TYPE_NORMAL
  zh: 从USB闪存驱动器启动计算机并遵循Ubuntu安装说明。
- en: 'Deactivating Sleep Mode: To ensure that the PC remains active at all times
    and able to process data without interruption, it''s crucial to deactivate Sleep
    Mode:'
  id: totrans-1240
  prefs: []
  type: TYPE_NORMAL
  zh: 禁用休眠模式：为确保PC始终保持活跃状态，能够不间断地处理数据，禁用休眠模式至关重要：
- en: Go to Settings > Energy.
  id: totrans-1241
  prefs: []
  type: TYPE_NORMAL
  zh: 前往设置 > 能源。
- en: Set Turn off screen after to Never.
  id: totrans-1242
  prefs: []
  type: TYPE_NORMAL
  zh: 将“关闭屏幕后”设置为“永不”。
- en: Set Computer Standby to Never.
  id: totrans-1243
  prefs: []
  type: TYPE_NORMAL
  zh: 将计算机待机设置为“永不”。
- en: This configuration allows the computer to continue running and executing algorithms
    even in your absence.
  id: totrans-1244
  prefs: []
  type: TYPE_NORMAL
  zh: 此配置允许计算机在您不在的情况下继续运行和执行算法。
- en: 'Reliable Internet connection :'
  id: totrans-1245
  prefs: []
  type: TYPE_NORMAL
  zh: 可靠的互联网连接：
- en: Use a wired Ethernet connection for maximum reliability.
  id: totrans-1246
  prefs: []
  type: TYPE_NORMAL
  zh: 使用有线以太网连接以获得最大可靠性。
- en: If you're using Wi-Fi, make sure the signal is strong and stable. Use a Wi-Fi
    repeater or network adapter if necessary.
  id: totrans-1247
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您使用Wi-Fi，请确保信号强大且稳定。如有必要，请使用Wi-Fi中继器或网络适配器。
