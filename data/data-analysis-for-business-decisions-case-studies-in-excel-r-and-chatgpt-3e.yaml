- en: 'Option A:'
  id: totrans-1764
  prefs: []
  type: TYPE_NORMAL
  zh: '选项 A:'
- en: Pay for all 18,000 gallons upfront at $2.10 per gallon.
  id: totrans-1765
  prefs: []
  type: TYPE_NORMAL
  zh: 以每加仑2.10美元的价格一次性支付所有18,000加仑。
- en: Total cost = 18,000 gallons ×× $2.10/gallon = $37,800.
  id: totrans-1766
  prefs: []
  type: TYPE_NORMAL
  zh: 总成本 = 18,000加仑 ×× $2.10/加仑 = $37,800。
- en: 'Option B:'
  id: totrans-1767
  prefs: []
  type: TYPE_NORMAL
  zh: '选项 B:'
- en: Pay a 20% deposit and the rest in ten equal monthly payments at $2.29 per gallon.
  id: totrans-1768
  prefs: []
  type: TYPE_NORMAL
  zh: 支付20%的定金，其余部分以每加仑2.29美元的十次等额月付款支付。
- en: Deposit = 20% of (18,000 gallons ×× $2.29/gallon).
  id: totrans-1769
  prefs: []
