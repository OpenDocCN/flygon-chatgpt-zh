- en: THE MEAN SQUARED ERROR (MSE) FORMULA
  prefs: []
  type: TYPE_NORMAL
- en: The MSE is the sum of the squares of the difference between an actual y value
    and the predicted y value, divided by the number of points. Notice that the predicted
    y value is the y value that each point would have if that point were actually
    on the best-fitting line.
  prefs: []
  type: TYPE_NORMAL
- en: Although the MSE is popular for linear regression, there are other error types
    available, some of which are discussed briefly in the next section.
  prefs: []
  type: TYPE_NORMAL
- en: A List of Error Types
  prefs: []
  type: TYPE_NORMAL
- en: 'Although we will only discuss MSE for linear regression in this book, there
    are other types of formulas that you can use for linear regression, some of which
    are listed here:'
  prefs: []
  type: TYPE_NORMAL
- en: MSE
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: RMSE
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: RMSPROP
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: MAE
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The MSE is the basis for the preceding error types. For example, RMSE is the
    Root Mean Squared Error, which is the square root of the MSE.
  prefs: []
  type: TYPE_NORMAL
- en: MAE is the Mean Absolute Error, which is the sum of the absolute value of the
    differences of the y terms (not the square of the differences of the y terms),
    which is then divided by the number of terms.
  prefs: []
  type: TYPE_NORMAL
- en: The RMSPROP optimizer utilizes the magnitude of recent gradients to normalize
    the gradients. Specifically, RMSPROP maintain a moving average over the RMS (root
    mean squared) gradients, and then divides that term by the current gradient.
  prefs: []
  type: TYPE_NORMAL
- en: 'Although it is easier to compute the derivative of MSE, it is also true that
    MSE is more susceptible to outliers, whereas MAE is less susceptible to outliers.
    The reason is simple: a squared term can be significantly larger than the absolute
    value of a term. For example, if a difference term is 10, then a squared term
    of 100 is added to MSE, whereas only 10 is added to MAE. Similarly, if a difference
    term is -20, then a squared term 400 is added to MSE, whereas only 20 (which is
    the absolute value of -20) is added to MAE.'
  prefs: []
  type: TYPE_NORMAL
- en: Non-linear Least Squares
  prefs: []
  type: TYPE_NORMAL
- en: When predicting housing prices, where the dataset contains a wide range of values,
    techniques such as linear regression or random forests can cause the model to
    overfit the samples with the highest values to reduce quantities such as the mean
    absolute error.
  prefs: []
  type: TYPE_NORMAL
- en: In this scenario, you probably want an error metric, such as relative error,
    that reduces the importance of fitting the samples with the largest values. This
    technique is called non-linear least squares, which may use a log-based transformation
    of labels and predicted values.
  prefs: []
  type: TYPE_NORMAL
- en: The next section contains several code samples, the first of which involves
    calculating the MSE manually, followed by an example that uses NumPy formulas
    to perform the calculations.
  prefs: []
  type: TYPE_NORMAL
- en: CALCULATING THE MSE MANUALLY
  prefs: []
  type: TYPE_NORMAL
- en: This section contains two line graphs, both of which contain a line that approximates
    a set of points in a scatter plot.
  prefs: []
  type: TYPE_NORMAL
- en: '[Figure 2.7](#fig_2-7) displays a line segment that approximates a scatter
    plot of points (some of which intersect the line segment). The MSE for the line
    in [Figure 2.7](#fig_2-7) is computed as follows (only numerators will be compared):'
  prefs: []
  type: TYPE_NORMAL
- en: MSE = (1*1 + (-1)*(-1) + (-1)*(-1) + 1*1)/9 = 4/9
  prefs: []
  type: TYPE_NORMAL
- en: '![image](images/p59.jpg)'
  prefs: []
  type: TYPE_IMG
- en: FIGURE 2.7 A line graph that approximates points of a scatter plot
  prefs: []
  type: TYPE_NORMAL
- en: '[Figure 2.8](#fig_2-8) displays a set of points and a line that is a potential
    candidate for best-fitting line for the data. The MSE for the line in [Figure
    2.8](#fig_2-8) is computed as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: MSE = ((-2)*(-2) + 2*2)/7 = 8/7
  prefs: []
  type: TYPE_NORMAL
- en: '![image](images/p60.jpg)'
  prefs: []
  type: TYPE_IMG
- en: FIGURE 2.8 A line graph that approximates points of a scatter plot
  prefs: []
  type: TYPE_NORMAL
- en: Thus, the line in [Figure 2.7](#fig_2-7) has a smaller MSE than the line in
    [Figure 2.8](#fig_2-8), which might have surprised you (or did you guess correctly?).
  prefs: []
  type: TYPE_NORMAL
- en: In these two figures, we calculated the MSE easily and quickly, but in general
    it is significantly more difficult. For instance, if we plot 10 points in the
    Euclidean plane that do not closely fit a line, with individual terms that involve
    non-integer values, we would probably need a calculator.
  prefs: []
  type: TYPE_NORMAL
- en: A better solution involves NumPy functions, such as the np.linspace() API, as
    discussed in the next section.
  prefs: []
  type: TYPE_NORMAL
- en: APPROXIMATING LINEAR DATA WITH NP.LINSPACE()
  prefs: []
  type: TYPE_NORMAL
- en: '[Listing 2.4](#lis_2-4) displays the content of np_linspace1.py that illustrates
    how to generate some data with the np.linspace() API in conjunction with the perturbation
    technique.'
  prefs: []
  type: TYPE_NORMAL
- en: 'LISTING 2.4: np_linspace1.py'
  prefs: []
  type: TYPE_NORMAL
- en: import numpy as np
  prefs: []
  type: TYPE_NORMAL
- en: trainX = np.linspace(-1, 1, 6)
  prefs: []
  type: TYPE_NORMAL
- en: trainY = 3*trainX+ np.random.randn(*trainX.shape)*0.5
  prefs: []
  type: TYPE_NORMAL
- en: 'print("trainX: ", trainX)'
  prefs: []
  type: TYPE_NORMAL
- en: 'print("trainY: ", trainY)'
  prefs: []
  type: TYPE_NORMAL
- en: The purpose of this code sample is to produce and display a set of randomly
    generated numbers. Later in this chapter, we will use this code as a starting
    point for an actual linear regression task.
  prefs: []
  type: TYPE_NORMAL
- en: '[Listing 2.4](#lis_2-4) starts with the definition of the array variable trainX
    that is initialized via the np.linspace() API. Next, the array variable trainY
    is defined via the perturbation technique used in previous code samples. The output
    from [Listing 2.4](#lis_2-4) is here:'
  prefs: []
  type: TYPE_NORMAL
- en: 'trainX: [-1\. -0.6 -0.2 0.2 0.6 1\. ]'
  prefs: []
  type: TYPE_NORMAL
- en: 'trainY: [-2.9008553 -2.26684745 -0.59516253 0.66452207 1.82669051 2.30549295]'
  prefs: []
  type: TYPE_NORMAL
- en: 'trainX: [-1\. -0.6 -0.2 0.2 0.6 1\. ]'
  prefs: []
  type: TYPE_NORMAL
- en: 'trainY: [-2.9008553 -2.26684745 -0.59516253 0.66452207 1.82669051 2.30549295]'
  prefs: []
  type: TYPE_NORMAL
- en: Now that we know how to generate (x,y) values for a linear equation, let’s learn
    how to calculate the MSE, which is discussed in the next section. The next example
    generates a set of data values using the np.linspace() method and the np.random.randn()
    method to introduce some randomness in the data points.
  prefs: []
  type: TYPE_NORMAL
- en: CALCULATING MSE WITH NP.LINSPACE() API
  prefs: []
  type: TYPE_NORMAL
- en: 'The code sample in this section differs from many of the earlier code samples
    in this chapter: it uses a hard-coded array of values for X and also for Y instead
    of the perturbation technique. Hence, you will not know the correct value for
    the slope and y-intercept (and you probably will not be able to guess their correct
    values). [Listing 2.5](#lis_2-5) displays the content of plain_linreg1.py that
    illustrates how to compute the MSE with simulated data.'
  prefs: []
  type: TYPE_NORMAL
- en: 'LISTING 2.5: plain_linreg1.py'
  prefs: []
  type: TYPE_NORMAL
- en: import numpy as np
  prefs: []
  type: TYPE_NORMAL
- en: import matplotlib.pyplot as plt
  prefs: []
  type: TYPE_NORMAL
- en: X = [0,0.12,0.25,0.27,0.38,0.42,0.44,0.55,0.92,1.0]
  prefs: []
  type: TYPE_NORMAL
- en: Y = [0,0.15,0.54,0.51, 0.34,0.1,0.19,0.53,1.0,0.58]
  prefs: []
  type: TYPE_NORMAL
- en: losses = []
  prefs: []
  type: TYPE_NORMAL
- en: '#Step 1: Parameter initialization'
  prefs: []
  type: TYPE_NORMAL
- en: W = 0.45
  prefs: []
  type: TYPE_NORMAL
- en: b = 0.75
  prefs: []
  type: TYPE_NORMAL
- en: 'for i in range(1, 100):'
  prefs: []
  type: TYPE_NORMAL
- en: '#Step 2: Calculate Loss'
  prefs: []
  type: TYPE_NORMAL
- en: Y_pred = np.multiply(W, X) + b
  prefs: []
  type: TYPE_NORMAL
- en: Loss_error = 0.5 * (Y_pred - Y)**2
  prefs: []
  type: TYPE_NORMAL
- en: loss = np.sum(Loss_error)/10
  prefs: []
  type: TYPE_NORMAL
- en: '#Step 3: Calculate dW and db'
  prefs: []
  type: TYPE_NORMAL
- en: db = np.sum((Y_pred - Y))
  prefs: []
  type: TYPE_NORMAL
- en: dw = np.dot((Y_pred - Y), X)
  prefs: []
  type: TYPE_NORMAL
- en: losses.append(loss)
  prefs: []
  type: TYPE_NORMAL
- en: '#Step 4: Update parameters:'
  prefs: []
  type: TYPE_NORMAL
- en: W = W - 0.01*dw
  prefs: []
  type: TYPE_NORMAL
- en: b = b - 0.01*db
  prefs: []
  type: TYPE_NORMAL
- en: 'if i%10 == 0:'
  prefs: []
  type: TYPE_NORMAL
- en: print("Loss at", i,"iteration = ", loss)
  prefs: []
  type: TYPE_NORMAL
- en: '#Step 5: Repeat via a for loop with 1000 iterations'
  prefs: []
  type: TYPE_NORMAL
- en: '#Plot loss versus # of iterations'
  prefs: []
  type: TYPE_NORMAL
- en: print("W = ", W,"& b = ", b)
  prefs: []
  type: TYPE_NORMAL
- en: plt.plot(losses)
  prefs: []
  type: TYPE_NORMAL
- en: plt.ylabel('loss')
  prefs: []
  type: TYPE_NORMAL
- en: plt.xlabel('iterations (per tens)')
  prefs: []
  type: TYPE_NORMAL
- en: plt.show()
  prefs: []
  type: TYPE_NORMAL
- en: '[Listing 2.5](#lis_2-5) initializes the array variables X and Y with hard-coded
    values, and then initializes the scalar variables W and b. The next portion of
    [Listing 2.5](#lis_2-5) contains a for loop that iterates 100 times. After each
    iteration of the loop, the variables Y_pred, Loss_error, and loss are calculated.
    Next, the values for dw and db are calculated, based on the sum of the terms in
    the array Y_pred-Y, and the inner product of Y_pred-y and X, respectively.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Notice how W and b are updated: their values are decremented by the terms 0.01*dw
    and 0.01*db, respectively. This calculation should look familiar: the code is
    programmatically calculating an approximate value of the gradient for W and b,
    both of which are multiplied by the learning rate (the hard-coded value 0.01),
    and the resulting term is decremented from the current values of W and b to produce
    a new approximation for W and b. Although this technique is simple, it does calculate
    reasonable values for W and b.'
  prefs: []
  type: TYPE_NORMAL
- en: 'The final block of code in [Listing 2.5](#lis_2-5) displays the intermediate
    approximations for W and b, along with a plot of the loss (vertical axis) vs.
    the number of iterations (horizontal axis). The output from [Listing 2.5](#lis_2-5)
    is here:'
  prefs: []
  type: TYPE_NORMAL
- en: Loss at 10 iteration = 0.04114630674619492
  prefs: []
  type: TYPE_NORMAL
- en: Loss at 20 iteration = 0.026706242729839392
  prefs: []
  type: TYPE_NORMAL
- en: Loss at 30 iteration = 0.024738889446900423
  prefs: []
  type: TYPE_NORMAL
- en: Loss at 40 iteration = 0.023850565034634254
  prefs: []
  type: TYPE_NORMAL
- en: Loss at 50 iteration = 0.0231499048706651
  prefs: []
  type: TYPE_NORMAL
- en: Loss at 60 iteration = 0.02255361434242207
  prefs: []
  type: TYPE_NORMAL
- en: Loss at 70 iteration = 0.0220425055291673
  prefs: []
  type: TYPE_NORMAL
- en: Loss at 80 iteration = 0.021604128492245713
  prefs: []
  type: TYPE_NORMAL
- en: Loss at 90 iteration = 0.021228111750568435
  prefs: []
  type: TYPE_NORMAL
- en: W = 0.47256473531193927 & b = 0.19578262688662174
  prefs: []
  type: TYPE_NORMAL
- en: '[Figure 2.9](#fig_2-9) displays a scatter plot of points generated by the code
    in [Listing 2.5](#lis_2-5).'
  prefs: []
  type: TYPE_NORMAL
- en: '![image](images/p63.jpg)'
  prefs: []
  type: TYPE_IMG
- en: FIGURE 2.9 MSE values with linear regression
  prefs: []
  type: TYPE_NORMAL
- en: 'The code sample plain-linreg2.py is similar to the code in [Listing 2.5](#lis_2-5):
    the difference is that instead of a single loop with 100 iterations, there is
    an outer loop that execute 100 times, and during each iteration of the outer loop,
    the inner loop also executes 100 times.'
  prefs: []
  type: TYPE_NORMAL
- en: SUMMARY
  prefs: []
  type: TYPE_NORMAL
- en: This chapter introduced you to machine learning and concepts such as feature
    selection, feature engineering, data cleaning, training sets, and test sets. Next
    you learned about supervised, unsupervised, and semi-supervised learning. Then
    you learned regression tasks, classification tasks, and clustering, as well as
    the steps that are typically required to prepare a dataset. These steps include
    “feature selection” or “feature extraction” that can be performed using various
    algorithms. Then you learned about issues that can arise with the data in datasets
    and how to rectify them.
  prefs: []
  type: TYPE_NORMAL
- en: In addition, you also learned about linear regression, along with a brief description
    of how to calculate a best-fitting line for a dataset of values in the Euclidean
    plane. You saw how to perform linear regression using NumPy to initialize arrays
    with data values, along with a “perturbation technique” that introduces some randomness
    for the y values. This technique is useful because you will know the correct values
    for the slope and y-intercept of the best-fitting line, which you can then compare
    with the trained values.
  prefs: []
  type: TYPE_NORMAL
- en: CHAPTER 3
  prefs: []
  type: TYPE_NORMAL
- en: CLASSIFIERS IN MACHINE LEARNING
  prefs: []
  type: TYPE_NORMAL
- en: This chapter presents numerous classification algorithms in machine learning.
    This includes algorithms such as the kNN (k-nearest neighbors) algorithm, logistic
    regression (despite its name, it is a classifier), decision trees, random forests,
    SVMs, and Bayesian classifiers. The emphasis on algorithms is intended to introduce
    you to machine learning, which includes a tree-based code sample that relies on
    scikit-learn.
  prefs: []
  type: TYPE_NORMAL
- en: Due to space constraints, this chapter does not cover other well-known algorithms,
    such as Linear Discriminant Analysis and the k-means algorithm (which is for unsupervised
    learning and clustering). However, there are many online tutorials available that
    discuss these and other algorithms in machine learning.
  prefs: []
  type: TYPE_NORMAL
- en: With the preceding points in mind, the first section of this chapter briefly
    discusses the classifiers that are mentioned in the introductory paragraph. The
    second section of this chapter provides an overview of activation functions, which
    will be very useful if you decide to learn about deep neural networks. You will
    learn how and why they are used in neural networks. This section also contains
    a list of the TensorFlow APIs for activation functions, followed by a description
    of some of their merits.
  prefs: []
  type: TYPE_NORMAL
- en: The third section introduces logistic regression, which relies on the sigmoid
    function and is also used in RNNs (recurrent neural networks) and LSTMs (Long
    Short Term Memory).
  prefs: []
  type: TYPE_NORMAL
- en: 'To give you some context, classifiers are one of three major types of algorithms:
    regression algorithms (e.g., linear regression and GPT-4 in [Chapter 4](12_ch04.xhtml)),
    classification algorithms (discussed in this chapter), and clustering algorithms
    (such as k-means, which is not discussed in this book).'
  prefs: []
  type: TYPE_NORMAL
- en: The section pertaining to activation functions does involve a basic understanding
    of hidden layers in a neural network. Depending on your experience level, you
    might benefit from reading some preparatory material before reading this section
    (there are many articles available online).
  prefs: []
  type: TYPE_NORMAL
- en: WHAT IS CLASSIFICATION?
  prefs: []
  type: TYPE_NORMAL
- en: Given a dataset that contains observations whose class membership is known,
    classification is the task of determining the class to which a new datapoint belongs.
    Classes refer to categories and are also called “targets” or “labels.” For example,
    spam detection in email service providers involves binary classification (only
    two classes). The MNIST dataset contains a set of images, where each image is
    a single digit, which means there are ten labels. Some applications in classification
    include credit approval, medical diagnosis, and target marketing.
  prefs: []
  type: TYPE_NORMAL
- en: What are Classifiers?
  prefs: []
  type: TYPE_NORMAL
- en: 'In the previous chapter, you learned that linear regression uses supervised
    learning in conjunction with numeric data. The goal is to train a model that can
    make numeric predictions (e.g., the price of stock tomorrow, the temperature of
    a system or its barometric pressure). By contrast, classifiers use supervised
    learning in conjunction with non-numeric classes of data: the goal is to train
    a model that can make categorical predictions.'
  prefs: []
  type: TYPE_NORMAL
- en: 'For instance, suppose that each row in a dataset is a specific wine, and each
    column pertains to a specific wine feature (tannin, acidity, and so forth). Suppose
    further that there are five classes of wine in the dataset: for simplicity, let’s
    label them A, B, C, D, and E. Given a new data point, which is to say a new row
    of data, a classifier for this dataset attempts to determine the label for this
    wine.'
  prefs: []
  type: TYPE_NORMAL
- en: Some of the classifiers in this chapter can perform categorical classification
    and also make numeric predictions (i.e., they can be used for regression as well
    as classification).
  prefs: []
  type: TYPE_NORMAL
- en: Common Classifiers
  prefs: []
  type: TYPE_NORMAL
- en: 'Some of the most popular classifiers for machine learning are listed here (in
    no particular order):'
  prefs: []
  type: TYPE_NORMAL
- en: linear classifiers
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: kNN
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: logistic regression
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: decision trees
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: random forests
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: SVMs
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Bayesian classifiers
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: CNNs (deep learning)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Different classifiers have different advantages and disadvantages, which often
    involves a trade-off between complexity and accuracy, similar to algorithms in
    fields that are outside of AI.
  prefs: []
  type: TYPE_NORMAL
- en: In the case of deep learning, CNNs (convolutional neural networks) perform image
    classification, which makes them classifiers (they can also be used for audio
    and text processing).
  prefs: []
  type: TYPE_NORMAL
- en: The upcoming sections provide a brief description of the machine learning classifiers
    that are listed in the previous list.
  prefs: []
  type: TYPE_NORMAL
- en: Binary versus Multiclass Classification
  prefs: []
  type: TYPE_NORMAL
- en: Binary classifiers work with datasets that have two classes, whereas multiclass
    classifiers (sometimes called multinomial classifiers) distinguish more than two
    classes. Random forest classifiers and Naïve Bayes classifiers support multiple
    classes, whereas SVMs and linear classifiers can only be used as binary classifiers.
  prefs: []
  type: TYPE_NORMAL
- en: 'In addition, there are techniques for multiclass classification that are based
    on binary classifiers: One-versus-All (OvA) and One-versus-One (OvO).'
  prefs: []
  type: TYPE_NORMAL
- en: The OvA technique (also called “One-versus-The-Rest”) involves multiple binary
    classifiers that are equal to the number of classes. For example, if a dataset
    has five classes, then OvA uses five binary classifiers, each of which detects
    one of the five classes. In order to classify a datapoint in this particular dataset,
    select the binary classifier that has output the highest score.
  prefs: []
  type: TYPE_NORMAL
- en: 'The OvO technique also involves multiple binary classifiers, but in this case,
    a binary classifier is used to train on a pair of classes. For instance, if the
    classes are A, B, C, D, and E, then ten binary classifiers are required: one for
    A and B, one for A and C, one for A and D, and so forth, until the last binary
    classifier for D and E.'
  prefs: []
  type: TYPE_NORMAL
- en: In general, if there are n classes, then n*(n-1)/2 binary classifiers are required.
    Although the OvO technique requires considerably more binary classifiers (e.g.,
    190 are required for 20 classes) than the OvA technique (e.g., a mere 20 binary
    classifiers for 20 classes), the OvO technique has the advantage that each binary
    classifier is only trained on the portion of the dataset that pertains to its
    two chosen classes.
  prefs: []
  type: TYPE_NORMAL
- en: Multilabel Classification
  prefs: []
  type: TYPE_NORMAL
- en: 'Multilabel classification involves assigning multiple labels to an instance
    from a dataset. Hence, multilabel classification generalizes multiclass classification
    (discussed in the previous section), where the latter involves assigning a single
    label to an instance belonging to a dataset that has multiple classes. An article
    involving multilabel classification that contains Keras-based code is available
    online:'
  prefs: []
  type: TYPE_NORMAL
- en: '[https://medium.com/@vijayabhaskar96/multi-label-image-classification-tutorial-with-keras-imagedatagenerator-cd541f8eaf24](https://medium.com/@vijayabhaskar96/multi-label-image-classification-tutorial-with-keras-imagedatagenerator-cd541f8eaf24)'
  prefs: []
  type: TYPE_NORMAL
- en: You can also perform an online search for articles that involve SKLearn or PyTorch
    for multilabel classification tasks.
  prefs: []
  type: TYPE_NORMAL
- en: WHAT ARE LINEAR CLASSIFIERS?
  prefs: []
  type: TYPE_NORMAL
- en: A linear classifier separates a dataset into two classes. A linear classifier
    is a line for 2D points, a plane for 3D points, and a hyperplane (a generalization
    of a plane) for higher dimensional points.
  prefs: []
  type: TYPE_NORMAL
- en: Linear classifiers are often the fastest classifiers, so they are often used
    when the speed of classification is of high importance. Linear classifiers usually
    work well when the input vectors are sparse (i.e., mostly zero values) or when
    the number of dimensions is large.
  prefs: []
  type: TYPE_NORMAL
- en: WHAT IS KNN?
  prefs: []
  type: TYPE_NORMAL
- en: 'The kNN (k-nearest neighbors) algorithm is a classification algorithm. In brief,
    data points that are “near” each other are classified as belonging to the same
    class. When a new point is introduced, it is added to the class of the majority
    of its nearest neighbor. For example, suppose that k equals 3, and a new data
    point is introduced. Look at the class of its 3 nearest neighbors: let’s say they
    are A, A, and B. Then by majority vote, the new data point is labeled as a data
    point of class A.'
  prefs: []
  type: TYPE_NORMAL
- en: The kNN algorithm is essentially a heuristic and not a technique with complex
    mathematical underpinnings, and yet it is still an effective and useful algorithm.
  prefs: []
  type: TYPE_NORMAL
- en: Try the kNN algorithm if you want to use a simple algorithm, or when you believe
    that the nature of your dataset is highly unstructured. The kNN algorithm can
    produce highly nonlinear decisions despite being very simple. You can use kNN
    in search applications where you are searching for “similar” items.
  prefs: []
  type: TYPE_NORMAL
- en: Measure similarity by creating a vector representation of the items, and then
    compare the vectors using an appropriate distance metric (such as Euclidean distance).
  prefs: []
  type: TYPE_NORMAL
- en: Some concrete examples of kNN search include searching for semantically similar
    documents.
  prefs: []
  type: TYPE_NORMAL
- en: How to Handle a Tie in kNN
  prefs: []
  type: TYPE_NORMAL
- en: An odd value for k is less likely to result in a tie vote, but it is not impossible.
    For example, suppose that k equals 7, and when a new data point is introduced,
    its 7 nearest neighbors belong to the set {A,B,A,B,A,B,C}. As you can see, there
    is no majority vote, because there are 3 points in class A, 3 points in class
    B, and 1 point in class C.
  prefs: []
  type: TYPE_NORMAL
- en: 'There are several techniques for handling a tie in kNN, as listed here:'
  prefs: []
  type: TYPE_NORMAL
- en: Assign higher weights to closer points.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Increase the value of k until a winner is determined.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Decrease the value of k until a winner is determined.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Randomly select one class.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'If you reduce k until it equals 1, it is still possible to have a tie vote:
    there might be two points that are equally distant from the new point, so you
    need a mechanism for deciding which of those two points to select as the 1-neighbor.'
  prefs: []
  type: TYPE_NORMAL
- en: If there is a tie between classes A and B, then randomly select either class
    A or class B. Another variant is to keep track of the “tie” votes, and alternate
    round-robin style to ensure a more even distribution.
  prefs: []
  type: TYPE_NORMAL
- en: WHAT ARE DECISION TREES?
  prefs: []
  type: TYPE_NORMAL
- en: Decision trees are another type of classification algorithm that involves a
    tree-like structure. In a “generic” tree, the placement of a data point is determined
    by simple conditional logic. As a simple illustration, suppose that a dataset
    contains a set of numbers that represent the ages of people, and let’s also suppose
    that the first number is 50\. This number is chosen as the root of the tree, and
    all numbers that are smaller than 50 are added on the left branch of the tree,
    whereas all numbers that are greater than 50 are added on the right branch of
    the tree.
  prefs: []
  type: TYPE_NORMAL
- en: 'For example, suppose we have the sequence of numbers that is as follows: {50,
    25, 70, 40}. Then we can construct a tree as follows: 50 is the root node; 25
    is the left child of 50; 70 is the right child of 50; and 40 is the right child
    of 20\. Each additional numeric value that we add to this dataset is processed
    to determine which direction to proceed (“left or right”) at each node in the
    tree.'
  prefs: []
  type: TYPE_NORMAL
- en: '[Listing 3.1](#lis_3-1) displays the content of sklearn_tree2.py that defines
    a set of 2D points in the Euclidean plane, along with their labels, and then predicts
    the label (i.e., the class) of several other 2D points in the Euclidean plane.'
  prefs: []
  type: TYPE_NORMAL
