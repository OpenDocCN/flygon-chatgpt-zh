- en: Introduction
  id: totrans-531
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 简介
- en: '![image](d2d_images/chapter_title_below.png)'
  id: totrans-532
  prefs: []
  type: TYPE_IMG
  zh: '![image](d2d_images/chapter_title_below.png)'
- en: User feedback is a critical component in the continuous improvement of AI models
    like ChatGPT. By integrating feedback, the model can refine its responses, address
    shortcomings, and enhance its overall performance. This chapter explores the role
    of user feedback in the development of ChatGPT, the methods used to collect and
    integrate feedback, and the impact of feedback on the model's capabilities.
  id: totrans-533
  prefs: []
  type: TYPE_NORMAL
  zh: 用户反馈是ChatGPT等AI模型持续改进的关键组成部分。通过整合反馈，模型可以精炼其回复，解决不足，并提高整体性能。本章探讨了用户反馈在ChatGPT开发中的作用，以及收集和整合反馈的方法，以及反馈对模型能力的影响。
