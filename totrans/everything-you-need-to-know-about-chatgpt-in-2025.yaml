  id: totrans-396
  prefs: []
  type: TYPE_NORMAL
  zh: 生成式人工智能的伦理问题不仅仅是抽象原则的集合；这是一个直接影响这些技术塑造我们生活方式的至关重要的问题。偏见、技术的负责任使用以及哲学上的含义只是我们需要迫切解决的一些难题。为了使生成式人工智能成为社会中的积极力量，我们必须意识到它的局限性和风险，并承诺以道德、公平和透明的方式使用它。只有这样，我们才能充分利用其无与伦比的力量，在不损害定义我们作为一个社会核心价值的前提下，改善人类生活。
