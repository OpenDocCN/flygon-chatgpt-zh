  prefs: []
  type: TYPE_NORMAL
- en: The huge advantage of using AI as your writing assistant is that you can sort
    through and evaluate multiple ideas in minutes instead of days of work.
  prefs: []
  type: TYPE_NORMAL
- en: Generate new ideas for each part of your cozy mystery and weave them into the
    general outline until you have generated your own plot outline that matches your
    vision for this story!
  prefs: []
  type: TYPE_NORMAL
- en: The goal is to create a 24-chapter (or other story structure plan) plot outline
    for your story that incorporates all of your ideas, chapter by chapter.
  prefs: []
  type: TYPE_NORMAL
- en: Don’t worry if you only have a vague idea of what happens in some of these chapters.
