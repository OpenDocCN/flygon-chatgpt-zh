    posts or Reels that showcase their success stories and drive sales for my product
    or service."'
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: '"ChatGPT，请问我10个关于我最满意的客户的问题。然后，创建5个Instagram帖子或Reels，展示他们的成功故事，并推动我的产品或服务的销售。"'
