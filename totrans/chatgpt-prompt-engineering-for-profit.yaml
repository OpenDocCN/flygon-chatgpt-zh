    ****reso**urce**s, ****a**nd** ****da**ily** ****prac**tice**s.'
  id: totrans-532
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '****指****示****模****型****解****释“****如****何****学****习****一****门****新****语****言？”****，****通****过****将****目****标****分****解****为****更****小****的****部****分****，****如****设****定****学****习****目****标****、****选****择****资****源****、****日****常****练****习****等****。'
- en: '****1**1**. ****St**ep**-****b**y**-****St**ep** ****Deta**ilin**g (****St**ep**-****b**y**-****St**ep**
    ****Deta**ilin**g)'
  id: totrans-533
  prefs: []
  type: TYPE_NORMAL
  zh: '**1**1**. **逐步细化**（**Step-by-Step Detailing**）'
- en: '[****Wh**at** ****i**s** ]'
  id: totrans-534
  prefs: []
  type: TYPE_NORMAL
  zh: '[**什么是**]'
- en: '****St**ep**-****b**y**-****St**ep** ****Deta**ilin**g , ****o**r** ****St**ep**-****b**y**-****St**ep**
    ****Deta**ilin**g, ****i**s** ****a**** ****pr**omp**t ****engi**neerin**g ****tech**niqu**e
    ****i**n** ****wh**ich** ****t**he** ****L**LM** ****i**s** ****gu**ide**d ****t**o**
    ****des**crib**e ****a**** ****pro**ces**s ****o**r** ****res**pon**d ****t**o**
    ****a**** ****req**ues**t ****b**y** ****prov**idin**g ****ea**ch** ****st**ep**
    ****i**n** ****de**tai**l, ****o**ne** ****a**t** ****a**** ****ti**me**. ****T**he**
    ****go**al** ****i**s** ****f**or** ****t**he** ****mo**del** ****t**o** ****le**ad**
    ****t**he** ****expl**anatio**n ****i**n** ****a**** ****cl**ear**, ****gu**ide**d,
    ****a**nd** ****orga**nize**d ****w**ay**, ****t**o** ****faci**litat**e ****t**he**
    ****under**standi**ng ****o**f** ****com**ple**x ****o**r** ****mu**lti**-****st**age**
    ****proc**esse**s.'
  id: totrans-535
  prefs: []
  type: TYPE_NORMAL
  zh: '**逐步细化**，或称为**逐步细化**，是一种提示工程技巧，其中LLM被引导通过提供每个步骤的详细信息来描述一个过程或响应一个请求，一次一个步骤。目标是让模型以清晰、引导和组织的方式引导解释，从而促进对复杂或多阶段过程的了解。'
- en: '****Th**is** ****tech**niqu**e ****i**s** ****us**efu**l ****f**or** ****bre**akin**g
    ****do**wn** ****la**rge** ****bl**ock**s ****o**f** ****info**rmatio**n ****in**to**
    ****sma**lle**r, ****ea**sil**y ****dige**stibl**e ****ch**unk**s, ****prov**idin**g
    ****a**** ****log**ica**l ****a**nd** ****intu**itiv**e ****seq**uenc**e ****f**or**
    ****t**he** ****re**ade**r. ****T**he** ****st**ep**-****b**y**-****st**ep** ****brea**kdow**n
    ****ai**ms** ****t**o** ****en**sur**e ****th**at** ****n**o** ****as**pec**t
    ****o**f** ****t**he** ****pro**ces**s ****i**s** ****over**looke**d ****a**nd**
    ****th**at** ****ea**ch** ****st**ep** ****i**s** ****pres**ente**d ****i**n**
    ****a**n** ****under**standab**le ****w**ay**.'
  id: totrans-536
  prefs: []
  type: TYPE_NORMAL
  zh: 这种技术对于将大块信息分解成小块、易于消化的部分非常有用，为读者提供一种逻辑和直观的顺序。逐步细化的目的是确保过程的每个方面都不会被忽视，并且每个步骤都以一种可理解的方式呈现。
- en: '[****Wh**at** ****i**s** ****yo**ur** ****ma**in** ****obje**ctiv**e ]'
  id: totrans-537
  prefs: []
  type: TYPE_NORMAL
  zh: '[**你的主要目标是什么**]'
- en: '****T**he** ****ma**in** ****obje**ctiv**e ****o**f** ****St**ep**-****b**y**-****St**ep**
    ****Deta**ilin**g ****i**s** ****ab**out** ****ens**urin**g ****cla**rit**y ****a**nd**
    ****comp**letene**ss ****o**f** ****t**he** ****an**swe**r. ****Wh**en** ****fa**ced**
    ****wi**th** ****ta**sks** ****th**at** ****ha**ve** ****mul**tipl**e ****st**eps**
    ****o**r** ****th**at** ****mi**ght** ****b**e** ****diff**icul**t ****t**o**
    ****unde**rstan**d ****i**f** ****pres**ente**d ****a**ll** ****a**t** ****on**ce**,
    ****st**ep**-****b**y**-****st**ep** ****deta**ilin**g ****ma**kes** ****i**t**
    ****ea**sie**r ****t**o** ****unde**rstan**d ****b**y** ****prov**idin**g ****spe**cifi**c
    ****inst**ructio**ns ****i**n** ****sm**all** ****ch**unk**s.'
  id: totrans-538
  prefs: []
  type: TYPE_NORMAL
  zh: '**逐步细化**的主要目标是确保答案的清晰性和完整性。当面对那些具有多个步骤或难以一次性理解的任务时，逐步细化通过提供小块具体指令，使得理解变得更加容易。'
- en: '****Ano**the**r ****impo**rtan**t ****go**al** ****i**s** ****t**o** ****av**oid**
    ****conf**usio**n ****o**r** ****omis**sion**s. ****I**n** ****ma**ny** ****ca**ses**,
    ****a**** ****gen**era**l ****an**swe**r ****c**an** ****b**e** ****t**oo** ****br**oad**
    ****a**nd** ****le**ave** ****o**ut** ****impo**rtan**t ****det**ail**s. ****B**y**
    ****deta**ilin**g ****ea**ch** ****st**ep** ****o**f** ****t**he** ****pro**ces**s,
    ****t**he** ****L**LM** ****i**s** ****gu**ide**d ****t**o** ****n**ot** ****sk**ip**
    ****a**ny** ****st**eps**, ****prov**idin**g ****a**n** ****exha**ustiv**e ****an**swe**r
    ****th**at** ****co**ver**s ****a**ll** ****rel**evan**t ****det**ail**s.'
  id: totrans-539
  prefs: []
  type: TYPE_NORMAL
  zh: '**另一个重要目标是避免混淆或遗漏。在许多情况下，一个一般性的答案可能过于宽泛，并遗漏重要细节。通过详细说明每个步骤的过程，LLM被引导不要跳过任何步骤，提供一个全面、涵盖所有相关细节的答案**。'
- en: '[****H**ow** ****i**t** ****wo**rks** ]'
  id: totrans-540
  prefs: []
  type: TYPE_NORMAL
  zh: '[**如何工作**]'
- en: '****St**ep**-****b**y**-****St**ep** ****Deta**ilin**g ****wo**rks** ****b**y**
    ****dire**ctin**g ****t**he** ****L**LM** ****t**o** ****des**crib**e ****t**he**
    ****an**swe**r ****sequ**ential**ly, ****i**n** ****num**bere**d ****o**r** ****li**ste**d
    ****st**eps**. ****T**he** ****pr**omp**t ****sh**oul**d ****inc**lud**e ****wo**rds**
    ****su**ch** ****a**s** "****st**ep**-****b**y**-****st**ep**", "****de**tai**l
    ****ea**ch** ****st**ep**" ****o**r** "****des**crib**e ****ea**ch** ****ph**ase**"
    ****t**o** ****enco**urag**e ****t**he** ****mo**del** ****t**o** ****br**eak**
    ****t**he** ****an**swe**r ****do**wn** ****in**to** ****sma**lle**r, ****mo**re**
    ****expl**anator**y ****pa**rts**.'
  id: totrans-541
  prefs: []
  type: TYPE_NORMAL
  zh: '**逐步细节通过指导LLM按顺序、编号或列表形式描述答案，来工作。提示应包括诸如“**逐步**”，“**详细说明每个步骤**”或“**描述每个阶段**”等词语，以鼓励模型将答案分解成更小、更解释性的部分**。'
- en: '****F**or** ****exa**mpl**e, ****i**f** ****y**ou** ****a**sk**, "****H**ow**
    ****d**o** ****I**** ****ma**ke** ****a**** ****ca**ke** ****re**cip**e?" ****y**ou**
    ****mi**ght** ****spe**cif**y, "****Exp**lai**n ****t**he** ****st**ep**-****b**y**-****st**ep**
    ****pro**ces**s ****fr**om** ****prep**arin**g ****t**he** ****ingr**edient**s
    ****t**o** ****fini**shin**g." ****L**LM** ****wi**ll** ****th**en** ****br**eak**
    ****t**he** ****an**swe**r ****do**wn** ****in**to** ****st**eps** ****su**ch**
    ****a**s**, "****St**ep** ****1**** : ****Ga**the**r ****a**ll** ****t**he** ****nece**ssar**y
    ****ingr**edient**s," "****St**ep** ****2****: ****Pre**hea**t ****t**he** ****ov**en**,"
    ****a**nd** ****s**o** ****o**n**.'
  id: totrans-542
  prefs: []
  type: TYPE_NORMAL
  zh: '**例如**，如果你问，“**如何制作蛋糕食谱**？”你可能会说，“**解释从准备原料到完成步骤的逐步过程**。”LLM将会然后将答案分解成如下步骤，“**步骤1：收集所有必要的原料**”，“**步骤2：预热烤箱**”，等等。'
- en: '****Th**is** ****tech**niqu**e ****i**s** ****part**icular**ly ****effe**ctiv**e
    ****wh**en** ****t**he** ****us**er** ****ne**eds** ****t**o** ****fo**llo**w
    ****spe**cifi**c ****inst**ructio**ns ****t**o** ****per**for**m ****a**n** ****ac**tio**n.
    ****Whe**the**r ****i**t**’****s**** ****coo**kin**g, ****asse**mblin**g ****a****
    ****pi**ece** ****o**f** ****equi**pmen**t, ****o**r** ****sol**vin**g ****a****
    ****ma**th** ****pro**ble**m, ****st**ep**-****b**y**-****st**ep** ****de**tai**l
    ****pro**vide**s ****a**** ****cl**ear** ****gu**ide** ****t**o** ****fo**llo**w.'
  id: totrans-543
  prefs: []
  type: TYPE_NORMAL
  zh: '**这种技巧特别有效，当用户需要遵循特定指令执行一个动作时。无论是烹饪、组装一件设备，还是解决一个数学问题，逐步细节提供了清晰的指南来遵循**。'
- en: '[****Wh**en** ****t**o** ****u**se** ]'
  id: totrans-544
  prefs: []
  type: TYPE_NORMAL
  zh: '[**何时使用**]'
- en: '****St**ep**-****b**y**-****St**ep** ****Deta**ilin**g ****i**s** ****us**efu**l
    ****wh**en** ****y**ou** ****ne**ed** ****a**n** ****orga**nize**d ****a**nd**
    ****cl**ear** ****an**swe**r ****ab**out** ****h**ow** ****t**o** ****per**for**m
    ****a**** ****com**ple**x ****ta**sk**. ****Th**is** ****tech**niqu**e ****i**s**
    ****id**eal** ****f**or** ****tuto**rial**s, ****inst**ructio**n ****man**ual**s,
    ****scie**ntifi**c ****expl**anatio**ns, ****o**r** ****a**ny** ****ot**her**
    ****situ**atio**n ****th**at** ****inv**olve**s ****a**** ****se**rie**s ****o**f**
    ****act**ion**s ****th**at** ****mu**st** ****b**e** ****fol**lowe**d.'
  id: totrans-545
  prefs: []
  type: TYPE_NORMAL
  zh: '**逐步细化**在**需要**一个**组织良好**且**清晰**的关于如何**执行**复杂任务的**答案**时**很有用**。这种方法**非常适合**教程、**手册**、**科学解释**或**任何**涉及一系列必须**遵循**的动作的**情况**。'
- en: '****I**t** ****i**s** ****reco**mmende**d ****i**n** ****situ**ation**s ****wh**ere**
    ****y**ou** ****wa**nt** ****t**o** ****av**oid** ****conf**usio**n ****b**y**
    ****ens**urin**g ****th**at** ****t**he** ****L**LM** ****pro**vide**s ****a****
    ****stru**cture**d ****an**swe**r ****wh**ere** ****ea**ch** ****st**ep** ****c**an**
    ****b**e** ****unde**rstoo**d ****i**n** ****isol**atio**n. ****I**t** ****i**s**
    ****espe**ciall**y ****sui**tabl**e ****f**or** ****audi**ence**s ****w**ho**
    ****a**re** ****lea**rnin**g ****ab**out** ****a**** ****to**pic** ****f**or**
    ****t**he** ****fi**rst** ****ti**me** ****a**nd** ****w**ho** ****ne**ed** ****pre**cis**e
    ****gui**danc**e.'
  id: totrans-546
  prefs: []
  type: TYPE_NORMAL
  zh: '**它**在**需要**通过确保LLM提供**结构化**的答案来避免**混淆**的情况下**推荐**。这种方法**特别**适合**首次**学习一个主题的**听众**，他们需要**精确**的**指导**。'
- en: '****Furt**hermor**e, ****St**ep**-****b**y**-****St**ep** ****Deta**ilin**g
    ****c**an** ****b**e** ****us**ed** ****i**n** ****con**text**s ****wh**ere**
    ****a**** ****log**ica**l ****sol**utio**n ****i**s** ****req**uire**d. ****Bre**akin**g
    ****do**wn** ****t**he** ****pro**ble**m ****in**to** ****st**eps** ****al**low**s
    ****t**he** ****L**LM** ****t**o** ****cons**truc**t ****t**he** ****reas**onin**g
    ****i**n** ****a**** ****stru**cture**d ****ma**nne**r, ****wh**ich** ****i**s**
    ****impo**rtan**t ****f**or** ****math**ematic**al ****o**r** ****log**ica**l
    ****pro**blem**s, ****ens**urin**g ****th**at** ****ea**ch** ****st**ep** ****i**s**
    ****addr**esse**d ****a**nd** ****so**lve**d ****appro**priate**ly.'
  id: totrans-547
  prefs: []
  type: TYPE_NORMAL
  zh: '**此外**，**逐步细化**可以在**需要逻辑解决方案**的**情况下**使用。将问题分解为步骤允许LLM以**结构化**的方式构建**推理**，这对于**数学**或**逻辑**问题非常重要，确保每个步骤**都被**解决**并**适当地**处理。'
- en: '[****Ti**ps** ****f**or** ****u**se**]'
  id: totrans-548
  prefs: []
  type: TYPE_NORMAL
  zh: '[**使用技巧**]'
- en: ● ****U**se** ****te**rms** ****th**at** ****enco**urag**e ****bre**akin**g
    ****do**wn** ****t**he** ****an**swe**r ****in**to** ****st**eps**, ****su**ch**
