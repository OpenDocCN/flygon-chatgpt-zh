- en: Freelancing & Project Management
  id: totrans-1468
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 自由职业与项目管理
- en: Earlier I worked in PSU and my career was safe still I moved to freelancing
    and later entrepreneurship. It’s not about being an expert in the domain; it’s
    about completing the project and delivering the results. Coding is not just about
    writing code; it’s also about managing projects and relationships. This chapter
    provides prompts to help you plan, execute, and deliver freelance projects while
    mastering the art of client management and project workflows.
  id: totrans-1469
  prefs: []
  type: TYPE_NORMAL
  zh: 之前我在PSU工作，我的职业生涯很稳定，但我还是转向了自由职业，后来是创业。这不仅仅是在领域内成为专家；这是关于完成项目和交付结果。编码不仅仅是编写代码；它还涉及项目管理和管理关系。本章提供提示，帮助你规划、执行和交付自由职业项目，同时掌握客户管理和项目工作流程的艺术。
