  prefs: []
  type: TYPE_NORMAL
  zh: 产品销售报告
- en: '*Salesofeachproduct'
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
  zh: '*每种产品的销售'
- en: '*Monthlyproductsales'
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: '*月度产品销售'
- en: '*Annualproductsales'
  id: totrans-211
  prefs: []
  type: TYPE_NORMAL
  zh: '*年度产品销售'
- en: '*Graphshowingproductsales'
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
  zh: '*产品销售图示'
- en: Copilot provides data and graphics that suit the content of the report, including
    a sales summary table, sales graphs, etc.
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
  zh: Copilot提供适合报告内容的数据和图形，包括销售摘要表、销售图表等。
- en: 2\. Writing an Email
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 写电子邮件
- en: Imagine a user is composing an email to notify a customer of a company policy
    change. Users can utilize Copilot to achieve a clear and concise writing style.
    The user can enter the Prompt command as follows >
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
  zh: '想象一个用户正在撰写一封通知客户公司政策变化的电子邮件。用户可以利用Copilot实现清晰简洁的写作风格。用户可以输入以下提示命令> '
- en: Email customersaboutpolicychanges. heading
  id: totrans-216
  prefs: []
  type: TYPE_NORMAL
  zh: 关于政策变化的客户电子邮件标题
- en: content
  id: totrans-217
  prefs: []
  type: TYPE_NORMAL
  zh: 内容
- en: summarize
  id: totrans-218
  prefs: []
  type: TYPE_NORMAL
  zh: 总结
- en: Copilot provides a clear and concise writing format, including subtopics, and
    the incorporation of page numbers, etc.
  id: totrans-219
  prefs: []
  type: TYPE_NORMAL
  zh: Copilot提供清晰简洁的写作格式，包括子主题，以及页码等的融入。
- en: 3\. Writing Poetry
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 写诗
- en: Imagine a user is composing a poem about "love." Copilot can offer suggestions
    for appropriate words and sentences. The user can enter the Prompt command as
    follows >
  id: totrans-221
  prefs: []
  type: TYPE_NORMAL
  zh: '想象一个用户正在创作一首关于“爱”的诗。Copilot可以提供合适的词语和句子的建议。用户可以输入以下提示命令> '
- en: poems aboutlove
  id: totrans-222
  prefs: []
  type: TYPE_NORMAL
  zh: 爱情诗
- en: '*Whatislove?'
  id: totrans-223
  prefs: []
  type: TYPE_NORMAL
  zh: '*什么是爱？'
- en: '*Whatislovelike?'
  id: totrans-224
  prefs: []
  type: TYPE_NORMAL
  zh: '*爱是什么样子？'
- en: '*Howdoeslovemakeyoufeel?'
  id: totrans-225
  prefs: []
  type: TYPE_NORMAL
  zh: '*爱情让你感觉如何？'
- en: Copilot will suggest words and sentences that suit the content of the poem,
    such as "Love is a warm and gentle feeling," "Love brings happiness to people,"
    etc.
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
  zh: Copilot会根据诗歌的内容建议合适的词语和句子，例如“爱是一种温暖而温柔的感觉”，“爱给人们带来幸福”等。
- en: 'In addition to the case study examples mentioned above, users can employ various
    prompt commands to seek assistance from Copilot, including:'
  id: totrans-227
  prefs: []
  type: TYPE_NORMAL
  zh: 除了上述案例研究示例外，用户可以使用各种提示命令来寻求Copilot的帮助，包括：
- en: ● General Prompt commands "Helpmewrite"
