  zh: '**意大利**是欧洲第一个对OpenAI在ChatGPT数据集中使用个人信息提起法律诉讼的国家。根据意大利监管机构的说法，**意大利数据保护局**（Garante
    per la protezione dei dati personali）认为OpenAI没有法律权利访问和使用它在网上找到的个人信息。因此，2023年3月20日，意大利数据保护局发布了一项被称为“临时紧急决定”的决定，要求OpenAI停止使用其公民的私人数据，并列出了ChatGPT违反GDPR规定的四种方式。第一种是ChatGPT未能实施年龄限制，在收集数据和允许使用生成式AI（或他们可以使用它做什么）方面都没有年龄控制。第二种是ChatGPT无法确保它收集的有关人们的个人信息是准确的。第三种是人们从未被告知他们的数据被用于LLM的数据集。最后，**意大利数据保护局**提出的论点是，OpenAI没有使用人们个人信息来训练其创建的“法律基础”。几天后，意大利宣布将对ChatGPT进行调查，其他欧洲国家也加入了进来，德国、爱尔兰和法国要求Garante与他们自己的数据监管机构分享他们的发现，以便他们可以采取类似的行动。OpenAI对意大利的调查有何回应？他们表示正在调查这些指控，并在Garante的调查完成后提供正式回应。然后，他们阻止意大利人访问和使用ChatGPT。'
