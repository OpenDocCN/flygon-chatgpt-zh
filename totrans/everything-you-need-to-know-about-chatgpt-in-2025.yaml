  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 在人工智能的世界中，很少有组织像OpenAI那样拥有如此深刻的影响力和定义性的作用。OpenAI成立于2015年12月，由包括埃隆·马斯克、山姆·奥特曼、格雷格·布罗克曼、伊利亚·苏茨克维尔、沃伊切赫·扎雷姆巴和其他技术专家在内的一群有远见的人士共同创立。OpenAI的诞生带着一个雄心勃勃且明确的目标：确保人工智能的益处惠及全人类。这个目标在当时是一个激进的转变，因为当时人工智能的发展似乎被商业和战略利益所主导，往往远离道德和社会考量。
- en: '****Si**n**c**e** ****i****t**s** ****ince**p**ti**on**, ****Op**e**n**AI**
