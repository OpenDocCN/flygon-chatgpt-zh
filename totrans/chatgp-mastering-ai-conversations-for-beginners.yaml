  type: TYPE_NORMAL
  zh: '**如果**你之前**曾**听过**“同理心**”这个术语，但**并不**真正**了解**它**的**含义，**这里**为**你**提供**一个**定义**。**同理心**是指**理解**和**“感受”**他人**的**情绪**的能力（Dmitriev,
    2023）。**与**同情**不同，**同情**是从**你的**视角**看待**事物，**感到**对**你**同情**的人**的**同情，**同理心**是关于**站在**他人的**立场**上**行走**一**英里**；**换句话说**，**从**他们的**视角**看待**事物**。**同理心**由**两部分**组成：**情感**的（**能够**“**分享**”**他人**的**情绪**状态）和**认知**的（**能够**理解**他人**的**思维**过程**并**从**他们的**视角**看待**事物）（Dmitriev,
    2023）。'
