  id: totrans-1543
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 8 分析 ChatGPT 在学术环境中的应用
- en: Farhana Kausar, Devi Kannan, and R. Goutam
  id: totrans-1544
  prefs: []
  type: TYPE_NORMAL
  zh: Farhana Kausar, Devi Kannan, 和 R. Goutam
- en: 'DOI: [10.1201/9781032716350-8](http://doi.org/10.1201/9781032716350-8)'
  id: totrans-1545
  prefs: []
  type: TYPE_NORMAL
  zh: 'DOI: [10.1201/9781032716350-8](http://doi.org/10.1201/9781032716350-8)'
- en: 8.1 Introduction
  id: totrans-1546
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 8.1 简介
- en: One crucial characteristic that enhances learning in children is the capacity
    to ask questions motivated by curiosity. Because of this, earlier studies have
    looked into creating specialized exercises to hone this ability. Several researchers
    used linguistic and semantic cues to teach participants to ask more of these kinds
    of inquiries, often known as divergent questions. Despite its proven pedagogical
    effectiveness, this strategy is limited since it relies on the time-consuming
    and labor-intensive process of manually constructing the previously mentioned
    clues.
  id: totrans-1547
  prefs: []
  type: TYPE_NORMAL
  zh: 儿童学习中的一个关键特征是受好奇心驱使提出问题的能力。因此，早期的研究着眼于创造专门的练习来磨练这种能力。一些研究人员利用语言和语义线索教导参与者提出更多这类问题，通常被称为发散性问题。尽管这种策略在教学方法上已被证明是有效的，但由于它依赖于耗时且劳动密集的手动构建上述线索的过程，因此其应用是有限的。
- en: A new era of advancements in communication, automation, and information processing
    has been ushered in by the rapid expansion of technology, which has fundamentally
    changed the way we live today. Specifically, artificial intelligence (AI) has
    transformed several areas, including the sphere of academia. By processing and
    analyzing enormous amounts of natural language data, the multidisciplinary subfield
    of natural language processing (NLP), which includes linguistics, computer science,
    and AI, provides a potent tool for human–computer interaction [[1](#ch16.xhtml#r313)].
    According to [[1](#ch16.xhtml#r313)], this technology has proven to be remarkably
    good at producing, interpreting, and understanding context in human language.
    NLP has advanced significantly over time, now doing many language processing tasks
    better than humans [[2](#ch16.xhtml#r314)]. These days, cutting-edge NLP models
    improve efficiency and accuracy across many domains, providing vital support and
    help in a wide range of applications [[2](#ch16.xhtml#r314)].
  id: totrans-1548
  prefs: []
  type: TYPE_NORMAL
  zh: 技术的快速扩张引领了通信、自动化和信息处理领域的新时代进步，这从根本上改变了我们今天的生活方式。具体来说，人工智能（AI）已经改变了包括学术界在内的几个领域。通过处理和分析大量自然语言数据，包括语言学、计算机科学和AI在内的跨学科子领域自然语言处理（NLP），为人类-计算机交互提供了一个强大的工具
    [[1](#ch16.xhtml#r313)]。根据 [[1](#ch16.xhtml#r313)]，这项技术已被证明在产生、解释和理解人类语言上下文中表现出色。随着时间的推移，NLP取得了显著进步，现在在很多语言处理任务上甚至优于人类
    [[2](#ch16.xhtml#r314)]。如今，最前沿的NLP模型在许多领域提高了效率和准确性，为各种应用提供了重要的支持和帮助 [[2](#ch16.xhtml#r314)]。
- en: The integration of AI tools into the educational environment has received significant
    attention in the dynamic field of modern education. Among these, ChatGPT stands
    out as a noteworthy AI model with possible applications in the field of education.
    Despite the fact that ChatGPT’s impact on education has been the subject of numerous
    research, including Rueda’s systematic review [[3](#ch16.xhtml#r315)], there is
    still a clear lack of clarity on the technology’s actual value to teachers and
    its useful applications in the classroom. Previous studies have mostly focused
    on the general use of ChatGPT in learning environments. Some have highlighted
    how educators are utilizing it more and more [[4](#ch16.xhtml#r316), [5](#ch16.xhtml#r317)],
    while others have explained the creative ways in which educators are incorporating
    it into their lesson plans [[6](#ch16.xhtml#r318)]. However, these studies often
    overlook the possible drawbacks and difficulties related to their implementation.
    For example, attention has been drawn to the problem of students using ChatGPT
    for academic dishonesty.
  id: totrans-1549
  prefs: []
  type: TYPE_NORMAL
  zh: 在现代教育的动态领域，将AI工具集成到教育环境中受到了广泛关注。在这些工具中，ChatGPT作为一个在教育领域可能有应用的显著AI模型而脱颖而出。尽管ChatGPT对教育的影响已成为众多研究的主题，包括Rueda的系统综述[3]，但关于这项技术对教师实际价值的清晰认识及其在课堂中的有用应用仍然缺乏。先前的研究主要关注ChatGPT在学习环境中的通用使用。一些研究强调了教育工作者越来越多地使用它[4]、[5]，而另一些则解释了教育工作者将其融入课程计划中的创新方式[6]。然而，这些研究往往忽略了与其实施相关的潜在缺点和困难。例如，已经引起了学生使用ChatGPT进行学术不诚实的问题。
- en: 8.2 Related Work
  id: totrans-1550
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 8.2 相关工作
- en: According to [7]‌, to stay up to date with the most recent technical advancements
    and adapt to the changing demands of the engineering industry, engineering education
    is always changing. The application of generative AI technology, like the ChatGPT
    conversational agent, is one encouraging development in this sector. ChatGPT has
    the capacity to provide students with tailored feedback and explanations, as well
    as realistic virtual simulations for hands-on learning, thereby offering individualized
    and effective learning experiences. It’s crucial to take into account this technology’s
    limits, though. Because ChatGPT and other generative AI systems rely on their
    training data, they have the potential to produce and disseminate false information
    as well as reinforce prejudices. Furthermore, there are ethical questions raised
    by the use of generative AI in education, including the possibility of students
    using it unethically or dishonestly and the possibility of jobless situations
    resulting from technologically rendered jobs. Although ChatGPT’s representation
    of the status of generative AI technology is astounding, it is but a taste of
    what is to come. To guarantee that the upcoming generation of engineers can take
    advantage of the advantages provided by generative AI while avoiding any negative
    consequences, it is crucial for engineering educators to comprehend the ramifications
    of this technology and research how to adjust the engineering education ecosystem.
  id: totrans-1551
  prefs: []
  type: TYPE_NORMAL
  zh: 根据[7]，为了跟上最新的技术进步并适应工程行业不断变化的需求，工程教育始终在变化。像ChatGPT对话代理这样的生成式AI技术的应用是这一领域的令人鼓舞的发展。ChatGPT能够为学生提供定制反馈和解释，以及现实虚拟模拟的动手学习，从而提供个性化的有效学习体验。然而，考虑到这项技术的局限性也是至关重要的。因为ChatGPT和其他生成式AI系统依赖于它们的训练数据，它们有可能产生和传播虚假信息，以及强化偏见。此外，使用生成式AI在教育中引发了一些伦理问题，包括学生可能不道德或不诚实使用它，以及可能因技术导致的失业情况。尽管ChatGPT对生成式AI技术现状的描述令人惊叹，但它只是未来可能到来的一个缩影。为了保证下一代工程师能够利用生成式AI带来的优势，同时避免任何负面影响，工程教育工作者理解这项技术的后果并研究如何调整工程教育生态系统至关重要。
- en: Numerous studies investigating the potential uses of generative AI models, especially
    ChatGPT, in education, have been spurred by their widespread adoption and usage.
    This survey by author [[8](#ch16.xhtml#r330)] explores the ramifications and real-world
    uses of generative AI models in a variety of educational settings. This review
    aims to shed light on the changing role of generative AI models—particularly ChatGPT—in
    education through a thorough and rigorous analysis of contemporary scholarly literature.
    The survey aims to advance knowledge of the relationship between AI and education
    by illuminating the possible advantages, difficulties, and new developments in
    this exciting topic. The results of this assessment will enable scholars, educators,
    and legislators to make knowledgeable choices on the incorporation of AI technologies.
  id: totrans-1552
  prefs: []
  type: TYPE_NORMAL
  zh: 许多研究探讨了生成式AI模型，尤其是ChatGPT在教育领域的潜在用途，这些研究的推动力来自于这些模型的广泛应用和普及。作者[[8](#ch16.xhtml#r330)]进行的这项调查，探讨了生成式AI模型在多种教育环境中的影响和实际应用。本综述旨在通过详尽和严谨的分析当代学术文献，揭示生成式AI模型——尤其是ChatGPT在教育中角色的变化。调查旨在通过阐明这一激动人心的主题中可能的优势、困难和新发展，推进人工智能与教育之间关系的研究。这项评估的结果将使学者、教育工作者和立法者能够在人工智能技术的融合上做出明智的选择。
- en: The globe was shocked by the generative AI tool ChatGPT’s advanced ability to
    complete incredibly difficult tasks. The remarkable capabilities of ChatGPT to
    carry out intricate tasks in the educational domain have generated conflicting
    emotions among educators, since this breakthrough in AI appears to transform current
    educational practices. This exploratory study presents some possible advantages
    and disadvantages of ChatGPT in fostering teaching and learning by synthesizing
    recent existing literature. Personalized and interactive learning is encouraged
    by ChatGPT, and it also generates suggestions for formative assessment activities
    that give continuous feedback to improve instruction. The study [9]‌ also identifies
    a few of ChatGPT’s intrinsic drawbacks, including the possibility of incorrect
    information being generated, biases in data training that could exacerbate pre-existing
    prejudices, and privacy concerns. The report makes suggestions for utilizing ChatGPT
    to enhance instruction and learning. Together, policymakers, researchers, educators,
    and tech specialists might initiate discussions on the safe and beneficial applications
    of these developing generative AI technologies to enhance instruction and facilitate
    students’ learning.
  id: totrans-1553
  prefs: []
  type: TYPE_NORMAL
  zh: 全球对生成式AI工具ChatGPT在完成极其困难任务方面的先进能力感到震惊。ChatGPT在教育领域执行复杂任务的能力引起了教育工作者的矛盾情绪，因为这一AI领域的突破似乎正在改变现有的教育实践。这项探索性研究通过综合现有文献，提出了ChatGPT在促进教学和学习方面的一些可能优势和劣势。ChatGPT鼓励个性化互动学习，并生成形成性评估活动的建议，以提供持续反馈以改进教学。研究[9]‌还识别了ChatGPT的一些内在缺陷，包括可能生成错误信息、数据训练中的偏见可能加剧既存的偏见，以及隐私问题。报告提出了利用ChatGPT来提高教学和学习的建议。政策制定者、研究人员、教育工作者和技术专家可以共同发起关于这些正在发展的生成式AI技术的安全有益应用的讨论，以增强教学并促进学生的学习。
- en: As mentioned by [10], AI and machine learning have changed the scientific research
    scene in the last few years. Among these, chatbot technology has advanced significantly
    in recent years, particularly with the emergence of ChatGPT as a prominent AI
    language model. This in-depth analysis explores ChatGPT’s history, uses, main
    obstacles, and potential future developments. Before studying its numerous uses
    across areas like customer service, healthcare, and education, we first examine
    its history, development, and underlying technology. We also address potential
    mitigation measures and draw attention to the significant obstacles that ChatGPT
    confronts, such as data biases, ethical difficulties, and safety risks. Lastly,
    we discuss our vision for ChatGPT’s future, highlighting areas for additional
    study and development, better human-AI interaction, solving the digital divide,
    and integrating ChatGPT with other technologies. For researchers, developers,
    and stakeholders interested in the constantly changing field of conversational
    agents powered by AI, this review provides insightful information. This chapter
    investigates how ChatGPT has transformed scientific research in a number of areas,
    including data processing, hypothesis development, collaboration, and public outreach.
    The study also looks at the possible drawbacks and moral dilemmas related to using
    ChatGPT in research, emphasizing the significance of finding a balance between
    human knowledge and AI-assisted creativity. The study discusses a number of ethical
    concerns with the current computing landscape and how ChatGPT may raise objections
    to this idea. Additionally, some ChatGPT biases and limitations are present in
    this work. It is noteworthy that in a relatively short period of time, ChatGPT
    has garnered significant attention from academics, research, and enterprises,
    despite a number of challenges and ethical concerns.
  id: totrans-1554
  prefs: []
  type: TYPE_NORMAL
  zh: 如[10]所述，人工智能和机器学习在过去几年中改变了科学研究场景。在这些变化中，聊天机器人技术近年来取得了显著进步，尤其是随着ChatGPT作为突出的AI语言模型的诞生。这项深入分析探讨了ChatGPT的历史、用途、主要障碍和潜在的未来发展。在研究其在客户服务、医疗保健和教育等领域的众多用途之前，我们首先考察了其历史、发展和底层技术。我们还讨论了潜在的缓解措施，并关注ChatGPT面临的重大障碍，如数据偏差、伦理难题和安全风险。最后，我们讨论了我们对ChatGPT未来的展望，强调了需要进一步研究和发展的领域，以及改善人机交互、解决数字鸿沟和将ChatGPT与其他技术集成的方面。对于对人工智能驱动的对话代理领域不断变化的领域感兴趣的学者、开发者和利益相关者，这篇综述提供了有见地的信息。本章探讨了ChatGPT如何改变包括数据处理、假设发展、协作和公众宣传在内的多个领域的科学研究。该研究还考察了使用ChatGPT进行研究的可能弊端和道德困境，强调了在人类知识和人工智能辅助创造力之间找到平衡的重要性。研究还讨论了当前计算景观中的许多伦理问题以及ChatGPT可能提出的反对意见。此外，这项工作中还存在着一些ChatGPT的偏见和局限性。值得注意的是，在相对较短的时间内，ChatGPT尽管面临许多挑战和伦理问题，但仍然受到了学术界、研究和企业的广泛关注。
- en: As mentioned in [11], in the realm of education, AI’s application in academics
    is a popular issue. An AI application called ChatGPT has several advantages, such
    as improved accessibility, cooperation, and student involvement. But it also calls
    into question academic integrity and plagiarism. This essay explores the advantages
    and disadvantages of implementing ChatGPT in higher education as well as the possible
    hazards and benefits of these resources. The study also addresses the challenges
    associated with identifying and stopping academic dishonesty and offers tactics
    that academic institutions might implement to guarantee the moral and responsible
    use of these resources. These tactics consist of creating guidelines and protocols,
    offering assistance and training, and employing a variety of techniques to identify
    and stop cheating. It also addresses the challenges associated with identifying
    and stopping academic dishonesty and offers tactics that academic institutions
    might implement to guarantee the moral and responsible use of these resources.
    These tactics consist of creating guidelines and protocols, offering assistance
    and training, and employing a variety of techniques to identify and stop cheating.
    The study indicates that while there are potential and challenges associated with
    using AI in higher education, these issues can be successfully addressed by universities
    by using these tools in a proactive and morally responsible manner.
  id: totrans-1555
  prefs: []
  type: TYPE_NORMAL
  zh: 如[11]中所述，在教育领域，AI在学术中的应用是一个热门话题。一个名为ChatGPT的AI应用具有几个优点，如提高可访问性、合作和学生的参与度。但它也引发了学术诚信和剽窃的问题。本文探讨了在高等教育中实施ChatGPT的优缺点，以及这些资源的潜在危害和益处。研究还解决了与识别和阻止学术不诚实相关的问题，并提出了学术机构可能实施的策略，以确保这些资源的道德和负责任的使用。这些策略包括制定指南和协议，提供帮助和培训，以及采用各种技术来识别和阻止作弊。研究还解决了与识别和阻止学术不诚实相关的问题，并提出了学术机构可能实施的策略，以确保这些资源的道德和负责任的使用。这些策略包括制定指南和协议，提供帮助和培训，以及采用各种技术来识别和阻止作弊。研究表明，尽管在高等教育中使用AI存在潜在的和挑战，但这些问题可以通过大学以积极主动和道德负责任的方式使用这些工具来解决。
- en: As the author mentioned in [[12](#ch16.xhtml#r324)], discussions concerning
    ChatGPT, an AI tool, and its possible effects on education have begun. We discussed
    ChatGPT’s potential for and dangers to education, as well as its strengths and
    limitations, using the SWOT analysis framework. The strengths include the use
    of an advanced natural language model to provide believable responses, the ability
    to improve itself, and the provision of customized and instantaneous responses.
    As a result, ChatGPT can improve information availability, enable customized and
    sophisticated learning, and lessen the workload of teachers—all of which contribute
    to the efficiency of important procedures and duties. The shortcomings include
    a deficiency in higher-order cognitive abilities, a danger of bias and discrimination,
    a lack of in-depth comprehension, and trouble assessing the caliber of responses.
    Lack of context awareness, threats to academic integrity, ongoing discrimination
    in the classroom, democratization of plagiarism, and a decline in higher-order
    cognitive skills are some of the threats facing education.
  id: totrans-1556
  prefs: []
  type: TYPE_NORMAL
  zh: 如作者在[[12](#ch16.xhtml#r324)]中提到，关于ChatGPT，一个AI工具，及其对教育可能产生的影响的讨论已经开始。我们使用SWOT分析框架讨论了ChatGPT对教育的潜在益处和风险，以及其优势和局限性。其优势包括使用高级自然语言模型提供可信的响应，自我改进的能力，以及提供定制和即时响应。因此，ChatGPT可以提高信息可用性，实现定制和复杂的学习，减轻教师的工作负担——所有这些都对重要程序和职责的效率做出了贡献。其不足之处包括缺乏高级认知能力，存在偏见和歧视的风险，缺乏深入理解，以及评估响应质量的问题。缺乏情境意识、对学术诚信的威胁、课堂上的持续歧视、剽窃的民主化以及高级认知技能的下降是教育面临的一些威胁。
- en: 8.3 Education in Era of ChatGPT
  id: totrans-1557
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 8.3 ChatGPT时代的教育
- en: Technology frequently upends customs, forcing people to adjust and weigh the
    advantages and disadvantages of new innovations [[13](#ch16.xhtml#r319)]. Researchers
    have already questioned if Google would have an impact on education, whether it
    is making us wiser or shallower [14], and whether we really need teachers in this
    day and age [[15](#ch16.xhtml#r321)]. Massive Open Online Courses (MOOCs) attracted
    a lot of interest in the early 2010s [[1](#ch16.xhtml#r322)6], but their performance
    fell short of expectations, leading to changes in their focus and economic models
    [[1](#ch16.xhtml#r323)7]. Numerous applications have made use of ChatGPT, such
    as producing music and ideas for tales and content as well as chatbot responses.
    Both teachers and students can benefit from ChatGPT in the educational setting.
    It can be used, for example, by educators to produce course plans, presentations,
    quizzes, coding, grading, scientific articles, and more. It can assist students
    with question-solving, essay writing, and receiving constructive criticism on
    their work [[1](#ch16.xhtml#r325)8, 19]. It’s critical to assess the current state
    of affairs in a balanced way and forecast how education will develop going forward
    given the availability of technologies like ChatGPT, which will only get better
    with time. More precisely, in order to ensure that the technology is used for
    social good and not for social damage, it is crucial to take into account both
    the potential applications of ChatGPT and the significant hazards associated with
    them [20–[22](#ch16.xhtml#r329)]. With AI acting as the pivot and ChatGPT emerging
    as a paradigmatic example of this evolutionary wave, the field of education is
    poised for an epochal shift. Scholarly discussions currently taking place clarify
    the intricate educational dynamics and the deliberate implementation of ChatGPT,
    presenting it as a versatile tool that is reshaping the educational environment.
    The introduction of ChatGPT into higher education represents a radical redesign
    of educational interaction rather than a simple addition to the current array
    of educational tools. Its versatility in a range of educational domains, especially
    in the field of healthcare education, is evidence of its many uses. The excellent
    results that ChatGPT has achieved in medical examinations, which are comparable
    to those of human medical trainees, portend the arrival of an AI-mediated learning
    environment that will expand and enhance the range of available learning modalities.
    ChatGPT’s ability to expedite information sharing, improve clinical decision-making
    procedures, and advance patient education programs makes it a viable adjunctive
    educator in specialty fields like orthopedics, guiding students through complex
    clinical narratives and treatment plans [23].
  id: totrans-1558
  prefs: []
  type: TYPE_NORMAL
  zh: 技术经常颠覆习俗，迫使人们调整并权衡新创新的利弊 [[13](#ch16.xhtml#r319)]。研究人员已经质疑谷歌是否会对教育产生影响，无论是使我们变得更聪明还是更肤浅
    [14]，以及我们是否真的需要在这个时代有教师 [[15](#ch16.xhtml#r321)]。大规模开放在线课程（MOOCs）在2010年代初引起了广泛关注
    [[1](#ch16.xhtml#r322)6]，但它们的性能未能达到预期，导致它们关注点和经济模式的改变 [[1](#ch16.xhtml#r323)7]。许多应用已经利用了ChatGPT，例如创作音乐、故事和内容以及聊天机器人的回应。教师和学生都可以在教育环境中从ChatGPT中受益。例如，它可以被教育者用来制作课程计划、演示文稿、测验、编码、评分、科学文章等等。它可以帮助学生解决疑问、撰写论文，并对其作品获得建设性的批评
    [[1](#ch16.xhtml#r325)8, 19]。在ChatGPT等技术的可用性下，以平衡的方式评估当前状况并预测教育将如何发展至关重要，因为这些技术只会随着时间的推移而变得更好。更确切地说，为了确保技术被用于社会公益而不是社会损害，考虑ChatGPT的潜在应用及其相关的重大风险至关重要
    [20–[22](#ch16.xhtml#r329)]。随着AI作为支点，ChatGPT作为这一进化浪潮的典范性例子出现，教育领域正准备发生历史性的转变。目前正在进行的学术讨论阐明了复杂的教育动态和ChatGPT的故意实施，将其呈现为一个多功能的工具，正在重塑教育环境。ChatGPT进入高等教育领域代表了对教育互动的彻底重新设计，而不仅仅是当前教育工具集合的简单补充。它在众多教育领域的多功能性，特别是在医疗教育领域，是其多种用途的证据。ChatGPT在医学考试中取得的优异成绩，与人类医学实习生相当，预示着即将到来的人工智能介导的学习环境，它将扩大和增强可用的学习模式范围。ChatGPT加速信息共享、改善临床决策程序和推进患者教育计划的能力，使其在骨科等专科领域成为可行的辅助教育者，指导学生通过复杂的临床叙述和治疗计划
    [23]。
- en: AI has grown rapidly in the last few decades and changed many facets of civilization.
    AI has established itself as a leader in a number of scientific areas, including
    education, autonomous driving, robotics, and medicine. AI, in its broadest sense,
    is the capacity of a computer system to simulate the functions of the human brain.
    This entails obtaining facts from outside sources, learning via instruction, and
    accomplishing the intended goals in light of that learning [[2](#ch16.xhtml#r334)4].
  id: totrans-1559
  prefs: []
  type: TYPE_NORMAL
  zh: 在过去几十年中，AI发展迅速，改变了文明的许多方面。AI在包括教育、自动驾驶、机器人和医学在内的多个科学领域确立了其领导地位。从广义上讲，AI是指计算机系统模拟人脑功能的能力。这包括从外部来源获取事实、通过指导学习，并根据这种学习实现既定目标
    [[2](#ch16.xhtml#r334)4]。
- en: The integration of AI in education has yielded notable results, including enhanced
    educational process efficiency, global learning promotion, personalized learning,
    more intelligent content creation, and optimized educational management in terms
    of effectiveness and efficiency [25]. Modern technologies are essential for streamlining
    the teaching–learning process. Education is a process in which learning transcends
    the mere acquisition of knowledge rather than being restricted to being a single
    product. As a result, AI presents itself as a cutting-edge technology with enormous
    promise for the educational sector [[26](#ch16.xhtml#r336)]. AI-based systems
    have the ability to support individualized learning by adjusting to the needs
    and interests of individual students.
  id: totrans-1560
  prefs: []
  type: TYPE_NORMAL
  zh: AI在教育中的整合产生了显著的结果，包括提高教育过程效率、促进全球学习、个性化学习、更智能的内容创作以及从有效性和效率方面优化教育管理 [25]。现代技术对于简化教学-学习过程至关重要。教育是一个过程，学习不仅仅是知识的获取，而不仅仅是单一产品的限制。因此，AI作为具有巨大教育行业潜力的尖端技术呈现出来
    [[26](#ch16.xhtml#r336)]。基于AI的系统能够通过调整以适应个别学生的需求和兴趣来支持个性化学习。
- en: It is imperative to acknowledge that the integration of AI in education poses
    notable obstacles and ethical dilemmas. Careful consideration must be given to
    issues like data privacy, equitable access to education, and the effect on the
    role of the educator. To guarantee that AI is applied in a way that is advantageous
    and equitable for all students, it is crucial to address these factors in a responsible
    manner [[2](#ch16.xhtml#r338)7]. To guarantee that the emphasis stays on students’
    holistic development and their readiness for a world that is changing all the
    time, it is crucial to strike a balance between technology and the vital role
    that educators play in society. Owing to ChatGPT’s brief launch period (ending
    at the end of November 2022), no thorough reviews examining its effects on schooling
    have been located [[28](#ch16.xhtml#r337)]. Thus, the primary goal of this systematic
    review is to evaluate the body of research on ChatGPT’s use in education to determine
    its advantages, disadvantages, and potential applications in the fields of teaching
    and learning.
  id: totrans-1561
  prefs: []
  type: TYPE_NORMAL
  zh: 认识到AI在教育中的整合带来了显著的障碍和伦理困境是至关重要的。必须仔细考虑诸如数据隐私、教育公平获取以及教育者角色的影响等问题。为了保证AI的应用对所有学生都有益且公平，必须以负责任的方式解决这些因素
    [[2](#ch16.xhtml#r338)7]。为了保证重点始终放在学生的全面发展以及他们随时准备适应不断变化的世界，必须平衡技术与教育者在社会中的关键作用。由于ChatGPT的短暂发布期（截至2022年11月底结束），尚未找到对其对学校教育影响的全面审查
    [[28](#ch16.xhtml#r337)]。因此，本系统综述的主要目标是评估ChatGPT在教育中应用的现有研究，以确定其在教学和学习领域的优势、劣势和潜在应用。
- en: 8.4 Transforming Education with the Impact of ChatGPT
  id: totrans-1562
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 8.4 利用ChatGPT的影响变革教育
- en: AI is proven to be a game-changer in the rapidly changing field of educational
    technology. Tools like ChatGPT are driving a fundamental transition in areas like
    language learning and assessment design. AI is used by many e-learning platforms,
    such as Coursera, to identify typical mistakes in students’ assignments [[29](#ch16.xhtml#r346)].
    Instructors can create original evaluations and learning materials with ChatGPT,
    and companies (like Course Hero) may find their paid homework help models challenged
    by the AI’s affordable adaptability [[30](#ch16.xhtml#r347)]. AI chatbots can
    help students improve their comprehension of text by asking them customized questions
    and providing feedback on their answers. The instrument can also be used to improve
    one’s analytical and critical thinking skills. Helping students explore languages
    is another essential feature of ChatGPT. It allows them to edit sentences, practice
    pronouncing words correctly, understand sentence structure, and provide interpretations
    in real time [[31](#ch16.xhtml#r348)]. Creating written responses to test or essay
    questions is arguably the most important and contentious use of ChatGPT. In response
    to instructions entered into this program, it allows teachers and students to
    write articles on any topic. Furthermore, ChatGPT can provide advice on how to
    improve the grammatical structures, succinctness, or clarity of several draughts
    of the same essay. This helps users overcome writing obstacles and offer novel
    perspectives on the topic they have chosen.
  id: totrans-1563
  prefs: []
  type: TYPE_NORMAL
  zh: AI已被证明是教育技术快速变化领域的一个颠覆者。像ChatGPT这样的工具正在推动语言学习和评估设计等领域的根本性转变。许多在线学习平台，如Coursera，使用AI来识别学生作业中的典型错误
    [[29](#ch16.xhtml#r346)]。教师可以使用ChatGPT创建原创的评估和学习材料，而公司（如Course Hero）可能会发现他们的付费作业帮助模式受到AI低成本适应性的挑战
    [[30](#ch16.xhtml#r347)]。AI聊天机器人可以通过提出定制问题和对其答案提供反馈来帮助学生提高对文本的理解。该工具还可以用来提高个人的分析和批判性思维能力。帮助学生学习语言是ChatGPT的另一个重要功能。它允许他们编辑句子，练习正确发音单词，理解句子结构，并在实时提供解释
    [[31](#ch16.xhtml#r348)]。为测试或论文问题创建书面回答可能是ChatGPT最重要的和最具争议性的用途。对于输入到该程序中的指令，它允许教师和学生就任何主题撰写文章。此外，ChatGPT还可以就如何改进几篇相同论文的语法结构、简洁性或清晰度提供建议。这有助于用户克服写作障碍，并对他们选择的主题提供新颖的视角。
- en: 8.5 Context Analysis
  id: totrans-1564
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 8.5 上下文分析
- en: In the first, AI is employed to drive the entire discussion around the function
    of the teacher in the classroom. In the context of AI utilization, the teacher’s
    involvement is essential for advancing innovative teaching approaches and enhancing
    educational practice [3[2](#ch16.xhtml#r339)]. Trainers can create curriculum,
    instructional materials, and assessment activities with the help of ChatGPT, which
    is a useful tool [[33](#ch16.xhtml#r340)].
  id: totrans-1565
  prefs: []
  type: TYPE_NORMAL
  zh: 在第一种情况下，AI被用于推动围绕课堂中教师功能的整个讨论。在AI应用的环境中，教师的参与对于推进创新教学方法和完善教育实践至关重要 [3[2](#ch16.xhtml#r339)]。培训师可以在ChatGPT的帮助下创建课程、教学材料和评估活动，这是一个有用的工具
    [[33](#ch16.xhtml#r340)]。
- en: The influence and application of AI in the classroom are the subject of the
    second line of research in the field of education, which has piqued the interest
    of pedagogical specialists and teachers alike. Numerous studies have been conducted
    and show potential in the use of AI as a supplemental tool in the teaching–learning
    process [[34](#ch16.xhtml#r341)]. In this connection, it has been noted that AI—ChatGPT
    in particular—has the potential to enhance academic achievement and promote the
    growth of critical thinking among students. ChatGPT makes it easier to obtain
    current, pertinent information by giving prompt, precise replies to specific queries.
    This can be very helpful for students as they learn about various subjects and
    conduct research [[35](#ch16.xhtml#r342)]. Furthermore, AI adjusts to the unique
    learning speed of every student, letting them advance at their own speed and get
    individualized guidance according to their requirements. This increases student
    involvement and enthusiasm while also giving teachers more time to work on more
    creative and participatory projects like one-on-one tutoring and critical criticism
    [[36](#ch16.xhtml#r343)]. But, while using AI in the classroom, it’s also critical
    to keep in mind a few difficulties and moral issues. For instance, in order to
    prevent the dissemination of false or biased information, it is crucial to guarantee
    the confidentiality and privacy of student data as well as to evaluate the dependability
    and correctness of the responses offered by AI [[3](#ch16.xhtml#r344)7].
  id: totrans-1566
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能在课堂中的影响和应用是教育领域第二项研究主题，这一主题激起了教育学专家和教师们的兴趣。已经进行了许多研究，并显示出在教与学过程中将人工智能作为辅助工具使用的潜力
    [[34](#ch16.xhtml#r341)]。在这方面，人们已经指出，人工智能——特别是ChatGPT——具有提高学术成就和促进学生批判性思维发展的潜力。ChatGPT通过针对特定查询提供及时、精确的回复，使得获取当前、相关的信息变得更加容易。这对学生来说非常有帮助，因为他们学习各种科目和进行研究
    [[35](#ch16.xhtml#r342)]。此外，人工智能能够适应每个学生的独特学习速度，让他们根据自己的需求以自己的速度前进，并得到个性化的指导。这增加了学生的参与度和热情，同时也让教师有更多时间从事更具创造性和参与性的项目，如一对一辅导和批判性评论
    [[36](#ch16.xhtml#r343)]。但是，在课堂中使用人工智能时，也要牢记一些困难和道德问题。例如，为了防止虚假或偏见信息的传播，确保学生数据的保密性和隐私性以及评估人工智能提供的回复的可靠性和正确性至关重要
    [[3](#ch16.xhtml#r344)7]。
- en: The final sentence is directly relevant to how AI affects the processes of teaching
    and learning, taking into account elements such the technological, institutional,
    cultural, and socioeconomic environments [[38](#ch16.xhtml#r345)]. In conclusion,
    AI technologies like ChatGPT can assist educational institutions in managing and
    allocating learning resources intelligently, enhancing their use and effectiveness,
    significantly altering the nature of education quality and efficiency, and offering
    students better learning services that will better prepare them for the demands
    of a changing society.
  id: totrans-1567
  prefs: []
  type: TYPE_NORMAL
  zh: 最后一句直接关系到人工智能如何影响教学和学习的进程，考虑到技术、制度、文化和社会经济环境等要素 [[38](#ch16.xhtml#r345)]。总之，像ChatGPT这样的AI技术可以帮助教育机构智能地管理和分配学习资源，提高其使用效率和效果，显著改变教育质量和效率的本质，并为学生提供更好的学习服务，使他们更好地适应不断变化的社会需求。
- en: 8.5.1 Gender Analysis
  id: totrans-1568
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 8.5.1 性别分析
- en: The dataset, which consists of 192 respondents’ answers about their gender identity,
    offers important insights into the demographic makeup of the sample as shown in
    [Figure 8.1](#ch16.xhtml#f18). The main focus is on binary gender classification,
    which shows that 40.6% of respondents identify as female and 59.4% of respondents
    as male. This difference in numbers points to a significant male preponderance
    in the sample. The “Prefer not to say” choice is a notable addition, recognizing
    the range of respondent preferences about the sharing of personal data. This option
    emphasizes the growing significance of data privacy in survey methodology while
    also honoring people’s privacy concerns. Consideration should be given to possible
    influencing factors, such as social, cultural, and contextual elements impacting
    gender identifications, given the almost 60–40 divide between male and female
    respondents. It’s important to note that the binary classification system might
    not adequately represent the range of gender identities, indicating the necessity
    for a more sophisticated investigation.
  id: totrans-1569
  prefs: []
  type: TYPE_NORMAL
  zh: 由192名受访者关于其性别认同的回答组成的数据库，提供了关于样本人口构成的宝贵见解，如[图8.1](#ch16.xhtml#f18)所示。主要关注的是二元性别分类，显示40.6%的受访者自认为是女性，而59.4%的受访者自认为是男性。这种数字上的差异表明样本中男性占主导地位。选择“不愿透露”是一个值得注意的补充，它承认了受访者关于个人数据分享的偏好范围。此选项强调了数据隐私在调查方法中的日益重要性，同时也尊重了人们的隐私担忧。鉴于男性和女性受访者之间几乎60-40的差距，应考虑可能的影响因素，例如社会、文化和环境因素对性别认同的影响。重要的是要注意，二元分类系统可能不足以代表性别认同的整个范围，这表明需要进行更深入的研究。
- en: '![A pie chart titled gender 192 responses. The data are as follows. (Male,
    59.4%), (female, 40.6%), and (prefer not to say, 0%).](html/images/9781032716084_C008_001.jpg)'
  id: totrans-1570
  prefs: []
  type: TYPE_IMG
  zh: '![A pie chart titled gender 192 responses. The data are as follows. (Male,
    59.4%), (female, 40.6%), and (prefer not to say, 0%).](html/images/9781032716084_C008_001.jpg)'
- en: '[Figure 8.1](#ch16.xhtml#f18b) Representation of gender data.'
  id: totrans-1571
  prefs: []
  type: TYPE_NORMAL
  zh: '[图8.1](#ch16.xhtml#f18b) 性别数据的表示。'
- en: Future analyses could investigate more demographic variables to improve comprehension
    and reveal possible intersections and connections that add to a more complete
    story about the population studied. Finally, the gender identity data invites
    contemplation on identity complexity, privacy concerns, and the changing field
    of inclusive survey methodology in addition to providing a quantitative window
    into the demographic composition.
  id: totrans-1572
  prefs: []
  type: TYPE_NORMAL
  zh: 未来分析可以调查更多的人口统计变量，以提高理解力并揭示可能的人口研究更完整故事的增加交集和联系。最后，性别认同数据引发了对身份复杂性、隐私担忧以及包容性调查方法领域的变化的思考，同时提供了一个了解人口构成的定量窗口。
- en: 8.5.2 Familiarity with ChatGPT
  id: totrans-1573
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 8.5.2 对ChatGPT的熟悉程度
- en: 'Indeed, it appears that you have provided information on users’ knowledge levels
    with ChatGPT based on 178 replies. Now let’s analyze the data from [Figure 8.2](#ch16.xhtml#f19):'
  id: totrans-1574
  prefs: []
  type: TYPE_NORMAL
  zh: 事实上，根据178条回复，你提供了关于用户对ChatGPT知识水平的资料。现在让我们分析[图8.2](#ch16.xhtml#f19)中的数据：
- en: '![A column chart titled how familiar are you with Chat G P T, 192 responses.
    The data are as follows. (1, 7 or 3.6%), (2, 8 or 4.2%), (3, 41 or 21.4%), (4,
    57 or 29.7%), and (5, 79 or 41.1%).](html/images/9781032716084_C008_002.jpg)'
  id: totrans-1575
  prefs: []
  type: TYPE_IMG
  zh: '![A column chart titled how familiar are you with Chat G P T, 192 responses.
    The data are as follows. (1, 7 or 3.6%), (2, 8 or 4.2%), (3, 41 or 21.4%), (4,
    57 or 29.7%), and (5, 79 or 41.1%).](html/images/9781032716084_C008_002.jpg)'
- en: '[Figure 8.2](#ch16.xhtml#f19b) Sample statistics of familiarity with ChatGPT
    among students.'
  id: totrans-1576
  prefs: []
  type: TYPE_NORMAL
  zh: '[图8.2](#ch16.xhtml#f19b) 学生对ChatGPT熟悉程度的样本统计。'
- en: Of the respondents, 80 (44.9%) claim to be highly familiar with ChatGPT. 33.7
    % that is 36 respondents indicated some familiarity. 40 that is (22.5%) of the
    respondents were less familiar. It is unknown if the 41 respondents (23%) who
    do not fall into any particular category are only familiar with the group or if
    they belong to a different one altogether. Not a single person, or 0%, indicated
    that they were not familiar with ChatGPT. It is important to remember that the
    percentages might not sum up to 100% due to the unclear categorization and potential
    rounding. If you have any specific questions, or if there is anything else you
    would like to discuss or think about in connection with this information, then
    let me know.
  id: totrans-1577
  prefs: []
  type: TYPE_NORMAL
  zh: 在受访者中，80人（44.9%）声称对ChatGPT非常熟悉。33.7%（即36人）表示有些熟悉。40人（即22.5%）的受访者不太熟悉。对于41人（23%）的受访者，他们不属于任何特定类别，不清楚他们是否只是熟悉该群体，或者是否属于完全不同的群体。没有人，即0%，表示他们不熟悉ChatGPT。重要的是要记住，由于分类不明确和可能的四舍五入，百分比可能不会达到100%。如果您有任何具体问题，或者如果您想讨论或思考与此信息相关的内容，请告诉我。
- en: 8.5.3 Usage of ChatGPT by Students
  id: totrans-1578
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 8.5.3 学生使用ChatGPT的情况
- en: People may now communicate more quickly and share knowledge on social media
    thanks to the widespread discussion that has been spurred by the use of ChatGPT
    in education. The rapid and widespread dissemination of information through social
    media can speed up the formation of opposing viewpoints, which can help decision-makers
    solve issues for students mentioned in [Figure 8.3](#ch16.xhtml#f20). Furthermore,
    social media networks can advertise. Policymakers, tech companies, educators,
    and students collaborate and share knowledge, which helps to build best practices
    for responsible AI in education. For instance, IT businesses and engineers can
    provide insights on the most recent advancements in AI models and methods, while
    educators can discuss their experiences and worries about incorporating AI into
    the learning process.
  id: totrans-1579
  prefs: []
  type: TYPE_NORMAL
  zh: 由于ChatGPT在教育中的广泛应用引发的广泛讨论，人们现在可以更快地通过社交媒体进行沟通和分享知识。通过社交媒体快速广泛地传播信息可以加快形成对立观点，这有助于决策者解决[图8.3](#ch16.xhtml#f20)中提到的学生问题。此外，社交媒体网络可以进行宣传。政策制定者、科技公司、教育工作者和学生合作分享知识，有助于建立教育中负责任的AI的最佳实践。例如，IT企业和工程师可以提供关于AI模型和方法最新进展的见解，而教育工作者可以讨论他们关于将AI融入学习过程的经历和担忧。
- en: '![A pie chart titled students use Chat G P T, 192 responses. The data are as
    follows. (Effective to learn, 32.8%), (homework or assignment, 17.7%), (exam preparation,
    15.6%), (communication skills, 0%), (skill development, 10.4%), (generating ideas,
    16.1%), and (optimizing the code, 7.3%).](html/images/9781032716084_C008_003.jpg)'
  id: totrans-1580
  prefs: []
  type: TYPE_IMG
  zh: '![标题为“学生使用Chat G P T，192个回复”的饼图。以下是一些数据：（有效学习，32.8%），（作业或任务，17.7%），（考试准备，15.6%），（沟通技巧，0%），（技能发展，10.4%），（产生想法，16.1%），以及（优化代码，7.3%）。（html/images/9781032716084_C008_003.jpg）'
- en: '[Figure 8.3](#ch16.xhtml#f20b) Purpose of ChatGPT among students.'
  id: totrans-1581
  prefs: []
  type: TYPE_NORMAL
  zh: '[图8.3](#ch16.xhtml#f20b) ChatGPT在学生中的用途。'
- en: 8.5.4 Positive Comments
  id: totrans-1582
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 8.5.4 正面评论
- en: A student’s learning preferences and patterns can be examined by ChatGPT, which
    can then suggest learning materials that are suited to their individual requirements
    shown in [Figure 8.4](#ch16.xhtml#f21). This can assist pupils in learning in
    a method that suits them best and at their own speed.
  id: totrans-1583
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT可以检查学生的学习偏好和模式，然后根据[图8.4](#ch16.xhtml#f21)中显示的个体需求推荐适合的学习材料。这可以帮助学生以最适合他们的方式和自己的速度进行学习。
- en: '![A pie chart titled count of positive comments. The chart is divided into
    multiple labeled sections. Some of the data are as follows. (Chat G P T can be,
    0.7), (It’s good, 2), (good, 8.1), (easy and fast, 0.7), (skill development, 1.4%),
    (no, 0.7), (helpful, 1.4), and (it’s very knowledgeable, 0.7).](html/images/9781032716084_C008_004.jpg)'
  id: totrans-1584
  prefs: []
  type: TYPE_IMG
  zh: '![标题为“正面评论数量”的饼图。图表分为多个标记部分。以下是一些数据：（Chat G P T 可以是，0.7），（很好，2），（好，8.1），（简单快捷，0.7），（技能发展，1.4%），（不，0.7），（有帮助，1.4），以及（非常知识渊博，0.7）。（html/images/9781032716084_C008_004.jpg）'
- en: '[Figure 8.4](#ch16.xhtml#f21b) Positive comments.'
  id: totrans-1585
  prefs: []
  type: TYPE_NORMAL
  zh: '[图8.4](#ch16.xhtml#f21b) 正面评论。'
- en: 8.5.5 Negative Comments
  id: totrans-1586
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 8.5.5 负面评论
- en: The strengths and weaknesses of ChatGPT, highlight its broad knowledge retrieval
    from a variety of sources, such as books, journals, and websites. The text notes
    inherent shortcomings, even though the model’s ability to recall and offer trustworthy
    information is considered essential for sensitive applications and other AI technologies.
    Because ChatGPT uses a learning algorithm, its accuracy could be compromised.
  id: totrans-1587
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT 的优势和劣势突出了其从各种来源广泛检索知识的能力，例如书籍、期刊和网站。文本指出固有的不足，尽管该模型回忆和提供可靠信息的能力被认为对于敏感应用和其他人工智能技术至关重要。由于
    ChatGPT 使用学习算法，其准确性可能会受到影响。
- en: Notably, the imperfection is acknowledged, addressing the possible risks of
    bias and manipulation in the data supplied by ChatGPT. It is crucial to be open
    and honest about the model’s limits in order to control expectations and draw
    attention to the difficulties in using it as referred in [Figure 8.5](#ch16.xhtml#f22).
  id: totrans-1588
  prefs: []
  type: TYPE_NORMAL
  zh: 显然，不完美得到了认可，指出了 ChatGPT 提供的数据中可能存在的偏见和操纵的风险。为了控制期望并引起人们对使用 ChatGPT 作为参考的困难的关注，公开诚实地讨论该模型的局限性至关重要。[图
    8.5](#ch16.xhtml#f22)。
- en: '![A pie chart titled count of negative comments. The chart is divided into
    multiple labeled sections. Some of the data are as follows. (Sometimes dumb, 1%),
    (sometimes it doesn’t, 1%), (can only work on, 1%), (not up to date, 1%), (no
    negative, 2%), (network error, 2.1), and (no student work, 1%).](html/images/9781032716084_C008_005.jpg)'
  id: totrans-1589
  prefs: []
  type: TYPE_IMG
  zh: '![标题为“负面评论计数”的饼图。图表分为多个标记部分。以下是一些数据：（有时愚蠢，1%）、（有时不行，1%）、（只能工作在，1%）、（过时，1%）、（没有负面，2%）、（网络错误，2.1%）和（没有学生作业，1%）。（图片链接：html/images/9781032716084_C008_005.jpg）'
- en: '[Figure 8.5](#ch16.xhtml#f22b) Negative comments.'
  id: totrans-1590
  prefs: []
  type: TYPE_NORMAL
  zh: '[图 8.5](#ch16.xhtml#f22b) 负面评论。'
- en: 8.5.6 ChatGPT for Programming
  id: totrans-1591
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 8.5.6 ChatGPT 用于编程
- en: The information you have provided shows the opinions of 184 people regarding
    how useful they think ChatGPT is for programming. Nearly 93% of respondents agree
    that ChatGPT is useful in the programming field. This overwhelming positive opinion
    points to a general understanding among respondents that ChatGPT is a useful tool
    for jobs involving programming. The significant proportion of participants endorsing
    ChatGPT’s value for programming is consistent with the wider pattern of applying
    language processing models to tasks linked to coding. It shows a favorable response
    from users who view ChatGPT as a useful tool for anything from writing code to
    solving problems in a programming environment.
  id: totrans-1592
  prefs: []
  type: TYPE_NORMAL
  zh: 您提供的信息显示了 184 人的观点，关于他们认为 ChatGPT 对编程有多有用。近 93% 的受访者同意 ChatGPT 在编程领域是有用的。这种压倒性的正面观点表明，受访者普遍认为
    ChatGPT 是编程相关工作的有用工具。支持 ChatGPT 编程价值的参与者比例与将语言处理模型应用于与编码相关的任务的更广泛模式一致。它显示出用户对
    ChatGPT 作为从编写代码到在编程环境中解决问题的有用工具的积极反应。
- en: To gain a more thorough comprehension of the factors influencing the respondents’
    opinions, more qualitative data or particular remarks may shed light on the features
    of ChatGPT that users find especially beneficial for their programming pursuits.
    Please feel free to express any specific queries you may have about this data,
    or if you would want more information, I would be pleased to help.
  id: totrans-1593
  prefs: []
  type: TYPE_NORMAL
  zh: 为了更深入地理解影响受访者观点的因素，更多的定性数据或特定的评论可能有助于揭示 ChatGPT 对用户编程追求特别有益的特点。请随时提出您可能对这一数据的具体疑问，或者如果您需要更多信息，我将很高兴提供帮助。
- en: A fundamental prerequisite for enhanced programming efficiency is having a well-defined
    idea.
  id: totrans-1594
  prefs: []
  type: TYPE_NORMAL
  zh: 提高编程效率的基本先决条件是拥有一个明确的想法。
- en: ChatGPT is able to offer succinct, clear explanations and examples of a wide
    range of programming principles, including data structures, algorithms, languages,
    and syntax in an easy-to-understand way. For instance, ChatGPT produced the pseudocode
    and explanation when we requested it to “provide a pseudocode for a binary search
    technique and an explanation”. The findings show that ChatGPT is capable of producing
    clear explanations and pseudocode that help students comprehend algorithmic ideas
    as shown in [Figure 8.6](#ch16.xhtml#f18).
  id: totrans-1595
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT 能够以易于理解的方式提供关于广泛编程原则的简洁、清晰的解释和示例，包括数据结构、算法、语言和语法。例如，当请求 ChatGPT “提供一个二分搜索技术的伪代码和解释”时，它产生了伪代码和解释。结果表明，ChatGPT
    能够产生清晰的解释和伪代码，帮助学生理解算法思想，如[图 8.6](#ch16.xhtml#f18)所示。
- en: '![A pie chart titled Chat G P T helpful for programming, 192 responses. The
    data are as follows. (Yes, 93.8%) and (no, 6.2%).](html/images/9781032716084_C008_006.jpg)'
  id: totrans-1596
  prefs: []
  type: TYPE_IMG
  zh: '![一个标题为“Chat G P T对编程有帮助，192个响应”的饼图。数据如下。（是，93.8%）和（否，6.2%）](html/images/9781032716084_C008_006.jpg)'
- en: Figure 8.6 ChatGPT for programming.
  id: totrans-1597
  prefs: []
  type: TYPE_NORMAL
  zh: 图8.6 ChatGPT for programming.
- en: '[Figure 8.7](#ch16.xhtml#f24) is a sample image of a program on binary search
    and [Figure 8.8](#ch16.xhtml#f25) is the explanation to the program code snippet.
    This shows that when students who are not aware of the logic of the program, ChatGPT
    helps them to have a clarity on the programming aspect.'
  id: totrans-1598
  prefs: []
  type: TYPE_NORMAL
  zh: '[图8.7](#ch16.xhtml#f24) 是一个关于二分查找程序的示例图像，[图8.8](#ch16.xhtml#f25) 是对该程序代码片段的解释。这表明，当学生不了解程序逻辑时，ChatGPT帮助他们清晰地理解编程方面。'
- en: '![A screenshot of a Chat G P T response displays pseudocode for binary search.
    The pseudocode initializes variables for left and right pointers, calculates the
    middle index, checks if the middle element is the target, and adjusts the search
    range accordingly. If the target is not found, it returns negative 1.](html/images/9781032716084_C008_007.jpg)'
  id: totrans-1599
  prefs: []
  type: TYPE_IMG
  zh: '![一个Chat G P T响应的截图显示了二分查找的伪代码。伪代码初始化左右指针变量，计算中间索引，检查中间元素是否为目标，并相应地调整搜索范围。如果找不到目标，则返回-1。](html/images/9781032716084_C008_007.jpg)'
- en: '[Figure 8.7](#ch16.xhtml#f24b) Sample code.'
  id: totrans-1600
  prefs: []
  type: TYPE_NORMAL
  zh: '[图8.7](#ch16.xhtml#f24b) 示例代码。'
- en: '![A screenshot of a response titled explanation. It includes seven points numbered
    from 1 to 7, titled initialization, binary search loop, calculate the middle index,
    check middle element, update pointers based on comparison, repeat steps 3 to 5,
    and target not found. Each consists of a detailed description.](html/images/9781032716084_C008_008.jpg)'
  id: totrans-1601
  prefs: []
  type: TYPE_IMG
  zh: '![一个标题为“解释”的响应截图。它包括从1到7编号的七个要点，标题为初始化、二分查找循环、计算中间索引、检查中间元素、根据比较更新指针、重复步骤3到5，以及目标未找到。每个要点都包含详细描述。](html/images/9781032716084_C008_008.jpg)'
- en: '[Figure 8.8](#ch16.xhtml#f25b) Explanation for programming.'
  id: totrans-1602
  prefs: []
  type: TYPE_NORMAL
  zh: '[图8.8](#ch16.xhtml#f25b) 编程解释。'
- en: 8.5.7 ChatGPT Replaces Human Intelligence
  id: totrans-1603
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 8.5.7 ChatGPT Replaces Human Intelligence
- en: 'The data that is being supplied includes the opinions of 192 respondents regarding
    the potential for ChatGPT to supplant human intellect. The analysis indicates
    a significant difference in viewpoints:'
  id: totrans-1604
  prefs: []
  type: TYPE_NORMAL
  zh: 提供的数据包括192名受访者对ChatGPT取代人类智能潜力的看法。分析表明，观点存在显著差异：
- en: About 65.1% of participants hold the opinion that ChatGPT has the capacity to
    supplant human intelligence. This shows that a sizable portion of the sample believes
    AI, and ChatGPT in particular, may mimic or even surpass some elements of human
    cognitive ability.
  id: totrans-1605
  prefs: []
  type: TYPE_NORMAL
  zh: 大约65.1%的参与者认为ChatGPT有能力取代人类智能。这表明样本中相当一部分人相信AI，尤其是ChatGPT，可能模仿甚至超越人类认知能力的一些方面。
- en: Conversely, 34.9% of participants claim that ChatGPT is insufficient to take
    the position of human intellect. This group, which is a sizable minority, is dubious
    or doubtful that the model can accurately capture the complexities of human creativity,
    cognition, and problem-solving.
  id: totrans-1606
  prefs: []
  type: TYPE_NORMAL
  zh: 相反，34.9%的参与者声称ChatGPT不足以取代人类智能。这个占相当少数的群体对模型能否准确捕捉人类创造力、认知和解决问题的复杂性持怀疑或怀疑态度。
- en: The question touches on the changing field of AI and how it relates to human
    intellect, which is by nature a deep and complicated subject. The percentages
    show various viewpoints regarding the present and future possibilities of AI models
    such as ChatGPT.
  id: totrans-1607
  prefs: []
  type: TYPE_NORMAL
  zh: 这个问题触及了AI领域的不断变化以及它与人类智能的关系，这是一个本质上是深奥而复杂的话题。百分比显示了关于ChatGPT等AI模型现在和未来可能性的各种观点。
- en: It’s critical to understand that the advancement and application of AI technologies
    lead to constant debates on their moral ramifications, the effects they have on
    society, and the nature of interactions between humans and machines. Determining
    the reasoning behind these disparate answers may offer more insight into the complex
    opinions of ChatGPT’s place in the field of AI.
  id: totrans-1608
  prefs: []
  type: TYPE_NORMAL
  zh: 理解AI技术的进步和应用导致的道德影响、对社会的影响以及人与机器之间互动的性质的辩论是至关重要的。确定这些不同答案背后的原因可能有助于更深入地了解ChatGPT在AI领域中的复杂观点。
- en: 8.5.8 ChatGPT for Job Opportunities
  id: totrans-1609
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 8.5.8 ChatGPT for Job Opportunities
- en: The data offered comprises 184 respondents’ responses to inquiries regarding
    the potential impact of ChatGPT on job opportunities. Notably, a substantial majority
    of respondents (74.5%) think ChatGPT can increase job opportunities. The overwhelmingly
    positive response suggests that most respondents are positive about ChatGPT’s
    good effects on professional advancement and employment prospects. Nevertheless,
    25.5% of respondents disagree, voicing skepticism or the belief that ChatGPT won’t
    significantly improve job prospects as in [Figure 8.9](#ch16.xhtml#f26).
  id: totrans-1610
  prefs: []
  type: TYPE_NORMAL
  zh: 提供的数据包括184位受访者对关于ChatGPT对工作机会潜在影响的调查回应。值得注意的是，绝大多数受访者（74.5%）认为ChatGPT可以增加工作机会。压倒性的积极回应表明，大多数受访者对ChatGPT对职业发展和就业前景的积极影响持乐观态度。然而，25.5%的受访者持不同意见，表达出怀疑或认为ChatGPT不会显著改善工作前景，如[图8.9](#ch16.xhtml#f26)所示。
- en: '![A pie chart titled do you think Chat G P T replaces human intelligence, 192
    responses. The data are as follows. (No, 65.1%) and (yes, 34.9%).](html/images/9781032716084_C008_009.jpg)'
  id: totrans-1611
  prefs: []
  type: TYPE_IMG
  zh: '![一个标题为“你认为Chat G P T会取代人类智能吗，192个回应。数据如下。（不，65.1%）和（是，34.9%）”的饼图](html/images/9781032716084_C008_009.jpg)'
- en: '[Figure 8.9](#ch16.xhtml#f26b) ChatGPT strengthens job opportunities.'
  id: totrans-1612
  prefs: []
  type: TYPE_NORMAL
  zh: '[图8.9](#ch16.xhtml#f26b) ChatGPT增强工作机会。'
- en: The data encourages research into the factors that lead to these opposing views
    of view. Individuals who embrace ChatGPT’s beneficial influence may view it as
    an essential skill in the evolving labor market, offering benefits in positions
    like content production, NLP, and problem-solving. However, individuals in the
    minority group can question the value or applicability of ChatGPT capabilities
    in their specific line of work. A deeper understanding of the respondents’ justifications—possibly
    through qualitative insights or follow-up questions—could provide useful background
    information to assess the intricacies within these percentages as in [Figure 8.10](#ch16.xhtml#f27).
    This analysis highlights the need for a comprehensive investigation into the perceived
    use of ChatGPT in the workplace by bringing attention to the divergent viewpoints
    regarding its impact on employment chances.
  id: totrans-1613
  prefs: []
  type: TYPE_NORMAL
  zh: 这些数据鼓励研究导致这些对立观点的因素。接受ChatGPT有益影响的个人可能会将其视为不断变化的劳动力市场中的一个基本技能，在内容生产、NLP和问题解决等职位上提供好处。然而，少数群体中的个人可能会质疑ChatGPT能力在其特定行业中的价值或适用性。通过定性见解或后续问题深入了解受访者的理由，可能为评估这些百分比背后的复杂性提供有用的背景信息，如[图8.10](#ch16.xhtml#f27)所示。这项分析强调了全面调查ChatGPT在工作场所感知使用需求的必要性，通过关注其对就业机会影响的分歧观点。
- en: '![A pie chart titled can Chat G P T strengthens your job opportunities. The
    data are as follows. (Yes, 74.5%) and (no, 25.5%).](html/images/9781032716084_C008_010.jpg)'
  id: totrans-1614
  prefs: []
  type: TYPE_IMG
  zh: '![一个标题为“Chat G P T能增强你的工作机会吗。数据如下。（是，74.5%）和（否，25.5%）”的饼图](html/images/9781032716084_C008_010.jpg)'
- en: '[Figure 8.10](#ch16.xhtml#f27b) ChatGPT strengthens job opportunities.'
  id: totrans-1615
  prefs: []
  type: TYPE_NORMAL
  zh: '[图8.10](#ch16.xhtml#f27b) ChatGPT增强工作机会。'
- en: Since ChatGPT is a relatively new technology—it was just introduced in late
    2022—the systematic literature evaluation has shown that there is still a lack
    of research on its potential uses in education. ChatGPT has gained popularity
    in education as a cutting-edge and promising tool to enhance student–teacher engagement
    and the overall learning experience. As ChatGPT’s capabilities are investigated
    and understood, there is a great chance that it will transform teaching and learning
    approaches in the educational system. When used effectively, this AI technology
    improves academic performance significantly and acts as a motivator for students
    by making them use ICTs (information and communication technologies). However,
    it is crucial to keep in mind that there are a number of challenges associated
    with utilizing it, which educators must be aware of in order to discourage incorrect
    use. Given this, providing instructors and students with sufficient training can
    enable them to make appropriate use of the program and guard against misuse in
    the classroom. When utilized responsibly and closely monitored, this technology
    can enhance instruction while opening up new learning opportunities.
  id: totrans-1616
  prefs: []
  type: TYPE_NORMAL
  zh: 由于ChatGPT是一项相对较新的技术——它仅在2022年底推出——系统文献评估显示，对其在教育中潜在用途的研究仍然不足。ChatGPT作为一项前沿且具有潜力的工具，在教育领域获得了流行，用于增强师生互动和整体学习体验。随着对ChatGPT能力的调查和理解，它有很大可能改变教育体系中的教学和学习方法。当有效使用时，这项AI技术可以显著提高学术成绩，并通过使学生使用ICTs（信息和通信技术）来激发学生的学习动力。然而，必须牢记，使用它存在一些挑战，教育工作者必须意识到这些挑战，以防止不当使用。因此，为教师和学生提供足够的培训，使他们能够适当使用该程序并防止课堂上的滥用，这是至关重要的。当负责任地使用并密切监控时，这项技术可以提高教学效果，同时开辟新的学习机会。
- en: Thus, even if AI is not a new idea, ChatGPT’s introduction has sparked discussion
    in the field of education by raising concerns about required assignments, protocols,
    and assessments. Thus, it’s critical to keep investigating the possibilities and
    effects of new technologies, taking into account scientific and pedagogical aspects,
    and advocating for the moral and responsible incorporation of AI into education.
  id: totrans-1617
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，尽管AI不是一个新概念，但ChatGPT的引入通过引发对所需作业、协议和评估的关注，在教育领域引发了讨论。因此，考虑到科学和教学方面，继续研究新技术及其可能性与影响，并倡导将AI道德和负责任地融入教育，这是至关重要的。
- en: The primary constraint of this review is the restricted quantity of literature
    incorporated into the examination. This is due to the fact that, to date, not
    enough study has been done specifically on ChatGPT’s use in higher education institutions.
    Less research has been done on the subject because higher education may have adopted
    educational technology, like ChatGPT, later than other educational levels. This
    is because the field of educational technology is constantly growing and changing.
    Notwithstanding this drawback, the review offers a summary of ChatGPT’s tertiary
    effects. It will be helpful to broaden the study in order to obtain a more thorough
    knowledge of ChatGPT’s impact and benefits at this particular educational level
    as more research is done and awareness of its use in higher education grows.
  id: totrans-1618
  prefs: []
  type: TYPE_NORMAL
  zh: 本综述的主要限制是纳入审查的文献数量有限。这是由于截至目前，针对ChatGPT在高等教育机构中的应用进行的专门研究还不足。关于这一主题的研究较少，因为高等教育可能比其他教育层次更晚采用像ChatGPT这样的教育技术。这是因为教育技术领域一直在不断发展和变化。尽管存在这一缺点，但综述仍提供了ChatGPT在高等教育中的三级效应的总结。随着更多研究进行以及对其在高等教育中应用的意识增强，这将有助于拓宽研究范围，以便更全面地了解ChatGPT在这一特定教育层次上的影响和益处。
- en: 8.6 Conclusion
  id: totrans-1619
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 8.6 结论
- en: Both instructors and students may find ChatGPT and other AI language models
    to be useful and practical resources for engineering education. These models are
    capable of producing text that is human-like, conversing, answering queries, writing
    essays, and finishing homework assignments. Possible uses include language editing,
    online instruction, language practice, asking and answering both technical and
    non-technical inquiries, and supporting research. But it’s crucial to keep in
    mind that ChatGPT and other AI language models are fallible and could give false
    information. As a result, it’s critical to utilize these technologies responsibly
    and to think about creating rules and criteria for their appropriate use in the
    community. Due to ChatGPT’s adaptability, problems concerning its appropriate
    and inappropriate use are also raised because the technology may be able to provide
    comprehensive responses to tests that measure human learning. It is obvious that
    engineering education and the profession will eventually use these tools, and
    in order to prevent unethical behavior while also allowing for the productivity
    that these tools can produce, evaluation methodologies will need to change. In
    order to prevent increasing already-existing inequalities, it is equally critical
    to guarantee equitable access to cutting-edge technology as well as adequate training
    and education, especially for underprivileged communities. Through a number of
    platforms (such as a website or a smartphone app) and in a number of sectors,
    ChatGPT may provide instructors and students with simple access to information.
    It is also a more effective tool than conventional search engines because it provides
    a written response instead of just a list of references. Students can more easily
    and quickly obtain detailed knowledge by using ChatGPT, which has the ability
    to locate and summarize pertinent material. From an educational standpoint, this
    implies that ChatGPT can free up students’ access time so they can read and think
    critically about the assigned material for longer. Teachers can find and create
    suitable teaching resources with the help of ChatGPT.
  id: totrans-1620
  prefs: []
  type: TYPE_NORMAL
  zh: 教师和学生都可能发现ChatGPT和其他AI语言模型是工程教育中非常有用和实用的资源。这些模型能够生成类似人类的文本，进行对话，回答查询，撰写论文，以及完成家庭作业。可能的用途包括语言编辑、在线教学、语言练习、询问和回答技术性和非技术性问题，以及支持研究。但必须牢记，ChatGPT和其他AI语言模型是会犯错的，可能会提供错误信息。因此，负责任地使用这些技术并考虑在社区中制定适当使用的规则和标准至关重要。由于ChatGPT的适应性，关于其适当和不适当使用的问题也被提出，因为这项技术可能能够对衡量人类学习的测试提供全面回答。显然，工程教育和职业最终将使用这些工具，为了防止不道德行为并允许这些工具产生的生产力，评估方法将需要改变。为了防止加剧已经存在的差距，同样重要的是确保弱势群体能够公平地获得尖端技术以及足够的培训和教育，尤其是对于弱势社区。通过多个平台（如网站或智能手机应用）和多个领域，ChatGPT可以为教师和学生提供简单便捷的信息访问。它也比传统的搜索引擎更有效，因为它提供的是书面回答，而不是仅仅是一系列的参考文献。学生可以通过ChatGPT更轻松、更快地获取详细知识，因为它能够定位和总结相关材料。从教育角度来看，这意味着ChatGPT可以为学生节省访问时间，使他们有更多时间阅读和批判性地思考分配的材料。教师可以在ChatGPT的帮助下找到和创建合适的教学资源。
- en: References
  id: totrans-1621
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
