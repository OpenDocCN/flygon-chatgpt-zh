- en: Integrating ChatGPT with Microsoft Word
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 将 ChatGPT 集成到 Microsoft Word 中
- en: Using VBA and OpenAI API (Windows Edition)
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 VBA 和 OpenAI API（Windows 版本）
- en: Introduction
  id: totrans-4
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 简介
- en: Welcome to Integrating ChatGPT with Microsoft Word Using VBA and OpenAI API
    (Windows Edition). This eBook guides you through the process of harnessing the
    power of ChatGPT’s artificial intelligence in Microsoft Word. Whether you're an
    experienced developer or someone new to programming, this book will take you step
    by step through creating a custom AI-powered assistant using VBA (Visual Basic
    for Applications) and the OpenAI API.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 欢迎使用 VBA 和 OpenAI API（Windows 版本）将 ChatGPT 集成到 Microsoft Word 中。这本电子书将指导您利用
    ChatGPT 的人工智能在 Microsoft Word 中的功能。无论您是经验丰富的开发者还是编程新手，本书都将逐步引导您使用 VBA（Visual Basic
    for Applications）和 OpenAI API 创建一个定制的 AI 助手。
- en: What Will This Book Explain?
  id: totrans-6
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 本书将解释什么？
- en: 'This book provides a comprehensive guide to building a ChatGPT-powered assistant
    that operates directly within Microsoft Word. You’ll learn how to:'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 本书提供了构建一个在 Microsoft Word 中运行的 ChatGPT 助手的全面指南。您将学习如何：
- en: '**Understand VBA and the OpenAI API:** Get a solid foundation in VBA, Microsoft’s
    programming language for Office applications, and learn how to interact with the
    OpenAI API to bring AI capabilities into your documents.'
  id: totrans-8
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**理解 VBA 和 OpenAI API：** 在 VBA（Microsoft 的 Office 应用程序编程语言）方面打下坚实基础，并学习如何与
    OpenAI API 交互，将人工智能功能引入您的文档。'
- en: '**Set Up Your Development Environment:** Configure Microsoft Word and your
    VBA editor to enable seamless integration with external APIs.'
  id: totrans-9
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**设置您的开发环境：** 配置 Microsoft Word 和您的 VBA 编辑器，以实现与外部 API 的无缝集成。'
- en: '**Create and Manipulate Macros:** Write VBA code to automate tasks and enhance
    your documents, making Word work smarter for you.'
  id: totrans-10
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**创建和操作宏：** 编写 VBA 代码来自动化任务并增强您的文档，使 Word 为您更智能地工作。'
- en: '**Interact with ChatGPT:** Send and receive data from OpenAI’s ChatGPT, enabling
    your Word documents to generate AI-driven text based on your inputs.'
  id: totrans-11
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**与 ChatGPT 交互：** 从 OpenAI 的 ChatGPT 发送和接收数据，使您的 Word 文档能够根据您的输入生成由人工智能驱动的文本。'
- en: '**Design a User-Friendly Interface:** Build a custom interface within Word,
    allowing users to interact with ChatGPT directly without needing to write any
    code.'
  id: totrans-12
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**设计用户友好的界面：** 在 Word 中构建一个自定义界面，使用户能够直接与 ChatGPT 交互，而无需编写任何代码。'
- en: '**Handle Errors and Optimize Performance:** Learn best practices for debugging,
    error handling, and performance optimization to ensure your assistant runs smoothly.'
  id: totrans-13
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**处理错误和优化性能：** 学习调试、错误处理和性能优化的最佳实践，以确保您的助手运行顺畅。'
- en: '**Deploy and Share Your Project:** Package and distribute your project to others,
    ensuring they can use the assistant with minimal setup.'
  id: totrans-14
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**部署和分享您的项目：** 打包并分发您的项目给其他人，确保他们可以以最少的设置使用助手。'
- en: '**Explore Advanced Features:** Discover how to extend your assistant’s functionality,
    integrate with other APIs, and customize it to suit your specific needs.'
  id: totrans-15
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**探索高级功能：** 了解如何扩展您助手的函数，与其他API集成，并定制以满足您的特定需求。'
- en: Who Is This Book For?
  id: totrans-16
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 本书面向谁？
- en: 'This book is intended for anyone interested in enhancing their Microsoft Word
    documents with AI-driven features. It’s particularly useful for:'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 本书旨在为任何希望增强其 Microsoft Word 文档的人工智能驱动功能的人提供帮助。它尤其适用于：
- en: • **Office Professionals:** If you frequently use Word and are looking for ways
    to automate tasks or add intelligent features, this book will show you how to
    create tools that save time and improve productivity.• **Developers and Programmers:**
    If you have experience with VBA or other programming languages, this book will
    expand your skill set by integrating AI capabilities into a familiar environment.• **AI
    Enthusiasts:** If you’re excited about artificial intelligence and want to explore
    practical applications, this book provides a hands-on project that brings AI directly
    into your workflow.• **Educators and Trainers:** If you teach or create training
    materials, this book can help you develop interactive tools that enhance learning
    experiences with AI-driven content.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: • **办公专业人士：** 如果您经常使用 Word 并在寻找自动化任务或添加智能功能的方法，本书将向您展示如何创建节省时间和提高生产力的工具。• **开发者和程序员：**
    如果您有 VBA 或其他编程语言的经验，本书将通过将 AI 功能集成到熟悉的环境中来扩展您的技能集。• **AI 热衷者：** 如果您对人工智能感到兴奋并想探索实际应用，本书提供了一个将
    AI 直接带入您工作流程的动手项目。• **教育者和培训师：** 如果您教授或创建培训材料，本书可以帮助您开发增强学习体验的 AI 驱动内容交互式工具。
- en: Whether you're automating routine tasks, creating dynamic documents, or exploring
    the cutting edge of AI, this eBook will equip you with the knowledge and tools
    to integrate ChatGPT into Microsoft Word. By the end of this book, you’ll have
    a working AI-powered assistant tailored to your needs, and the skills to continue
    building and innovating in this exciting field.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 无论您是自动化常规任务、创建动态文档还是探索 AI 的前沿，这本电子书都将为您提供将 ChatGPT 集成到 Microsoft Word 中的知识和工具。到本书结束时，您将拥有一个符合您需求的、功能强大的
    AI 助手，并掌握在令人兴奋的领域中继续构建和创新所需的技能。
- en: 'Chapter 1: Introduction to VBA and OpenAI API'
  id: totrans-20
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第一章：VBA 和 OpenAI API 简介
- en: In this chapter, we’ll explore the basics of VBA and the OpenAI API, setting
    the stage for integrating these two powerful tools.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将探讨 VBA 和 OpenAI API 的基础知识，为整合这两个强大的工具奠定基础。
- en: What is VBA?
  id: totrans-22
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 什么是 VBA？
- en: Visual Basic for Applications (VBA) is a programming language developed by Microsoft.
    It is primarily used for automating repetitive tasks in Microsoft Office applications
    such as Word, Excel, and Outlook. With VBA, users can write custom scripts (macros)
    to perform a wide range of tasks, from simple formatting to complex data manipulation.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: Visual Basic for Applications (VBA) 是由 Microsoft 开发的一种编程语言。它主要用于在 Microsoft
    Office 应用程序（如 Word、Excel 和 Outlook）中自动化重复性任务。使用 VBA，用户可以编写自定义脚本（宏）以执行各种任务，从简单的格式化到复杂的数据处理。
- en: • **Common Uses of VBA in Microsoft Word:**– Automating repetitive text formatting
    tasks– Creating custom dialog boxes and forms– Generating reports and documents
    automatically– Integrating with other Microsoft Office applications
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: • **VBA 在 Microsoft Word 中的常见用途：** – 自动化重复的文本格式化任务– 创建自定义对话框和表单– 自动生成报告和文档–
    与其他 Microsoft Office 应用程序集成
- en: What is the OpenAI API?
  id: totrans-25
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 什么是 OpenAI API？
- en: The OpenAI API is a cloud-based service that provides access to various AI models,
    including ChatGPT. These models can understand and generate human-like text based
    on the prompts provided. By integrating the OpenAI API with VBA, you can automate
    the interaction with these models directly from within Microsoft Word.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: OpenAI API 是一种基于云的服务，提供对各种 AI 模型的访问，包括 ChatGPT。这些模型可以根据提供的提示理解和生成类似人类的文本。通过将
    OpenAI API 与 VBA 集成，您可以直接从 Microsoft Word 中自动化与这些模型的交互。
- en: • **How the OpenAI API Enables AI Interactions:**– The API allows you to send
    text-based prompts to the AI model.– The AI processes these prompts and returns
    responses that can be used within your applications.– This interaction can be
    customized and automated using VBA, making it a powerful tool for enhancing productivity
    in Word.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: • **OpenAI API 如何实现 AI 交互：** – API 允许您向 AI 模型发送基于文本的提示。– AI 处理这些提示并返回可在您的应用程序中使用的响应。–
    通过 VBA 定制和自动化这种交互，使其成为增强 Word 中生产力的强大工具。
- en: Why Integrate VBA with OpenAI?
  id: totrans-28
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 为什么要将 VBA 与 OpenAI 集成？
- en: 'Integrating VBA with the OpenAI API allows you to create a more dynamic and
    interactive experience within Microsoft Word. Here are a few benefits:'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 将 VBA 与 OpenAI API 集成，可以让您在 Microsoft Word 中创建更动态和交互式的体验。以下是一些好处：
- en: • **Enhanced Document Creation:** Automatically generate or suggest content
    based on AI responses.• **Automated Responses:** Use AI to respond to repetitive
    queries or document formatting tasks.• **Custom Assistant:** Create a personalized
    AI-powered assistant that operates directly within Word, helping with writing,
    editing, and more.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: • **增强文档创建：** 根据 AI 响应自动生成或建议内容。• **自动响应：** 使用 AI 响应重复查询或文档格式化任务。• **自定义助手：**
    创建一个直接在 Word 中运行的个性化 AI 助手，帮助写作、编辑等。
- en: 'Chapter 2: Setting Up Your Environment'
  id: totrans-31
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第二章：设置您的环境
- en: Before you can start writing VBA scripts and interacting with the OpenAI API,
    you need to ensure your environment is correctly set up. This chapter will guide
    you through the necessary steps.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 在您开始编写 VBA 脚本并与 OpenAI API 交互之前，您需要确保您的环境已正确设置。本章将指导您完成必要的步骤。
- en: Installing Microsoft Word
  id: totrans-33
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 安装 Microsoft Word
- en: Ensure that you have a working installation of Microsoft Word on your computer.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 确保您的计算机上安装了可正常工作的 Microsoft Word。
- en: • **Checking for Updates:**– Open Word and navigate to File > Account > Update
    Options > Update Now.– Keeping Word updated ensures compatibility with the latest
    features and security patches.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: • **检查更新：** – 打开 Word 并转到文件 > 账户 > 更新选项 > 立即更新。– 保持 Word 更新确保与最新功能和安全补丁兼容。
- en: Enabling Macros in Word
  id: totrans-36
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 启用 Word 中的宏
- en: To run VBA scripts, you must enable macros in Microsoft Word.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 要运行 VBA 脚本，您必须在 Microsoft Word 中启用宏。
- en: '• **How to Enable Macros:**– Go to File > Options > Trust Center > Trust Center
    Settings.– Select Macro Settings and choose Enable all macros.– Note: Enabling
    all macros is recommended for development purposes. For a more secure environment,
    consider using Disable all macros with notification and only enable them when
    needed.'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: • **如何启用宏：**– 转到文件 > 选项 > 信任中心 > 信任中心设置.– 选择宏设置并选择启用所有宏.– 注意：出于开发目的，启用所有宏是推荐的。为了更安全的环境，考虑使用禁用所有宏并带有通知，并且仅在需要时启用它们。
- en: Creating a Developer Tab in Word
  id: totrans-39
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 在Word中创建开发人员选项卡
- en: The Developer tab in Word gives you easy access to the VBA editor and other
    tools.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: Word中的“开发人员”选项卡让您可以轻松访问VBA编辑器和其它工具。
- en: • **Adding the Developer Tab:**– Go to File > Options > Customize Ribbon.– Check
    the box next to Developer in the right pane.– Click OK to add the Developer tab
    to your Word ribbon.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: • **添加开发人员选项卡：**– 转到文件 > 选项 > 自定义功能区.– 在右侧窗格中勾选“开发人员”旁边的框.– 单击“确定”将开发人员选项卡添加到您的Word功能区。
- en: With the Developer tab visible, you're ready to start exploring VBA and the
    OpenAI API.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 当“开发人员”选项卡可见时，您就可以开始探索VBA和OpenAI API了。
- en: 'Chapter 3: Getting Started with VBA in Microsoft Word'
  id: totrans-43
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第3章：在Microsoft Word中开始使用VBA
- en: Now that your environment is set up, it's time to dive into VBA within Microsoft
    Word. This chapter will guide you through accessing the VBA editor and understanding
    its interface.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 现在您的环境已经设置好了，是时候深入Microsoft Word中的VBA了。本章将指导您访问VBA编辑器并理解其界面。
- en: Opening the VBA Editor
  id: totrans-45
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 打开VBA编辑器
- en: 'The VBA Editor is where you write and manage your VBA code. Here’s how to access
    it:'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: VBA编辑器是您编写和管理VBA代码的地方。以下是访问它的方法：
- en: • **Steps to Open the VBA Editor:**– Go to the Developer tab in Word.– Click
    on Visual Basic to open the VBA editor.– Alternatively, you can press Alt + F11
    to open the editor directly.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: • **打开VBA编辑器的步骤：**– 转到Word中的“开发人员”选项卡.– 单击“Visual Basic”以打开VBA编辑器.– 或者，您可以按Alt
    + F11直接打开编辑器。
- en: Understanding the VBA Editor Interface
  id: totrans-48
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 理解VBA编辑器界面
- en: The VBA editor has several components, each serving a specific purpose.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: VBA编辑器包含几个组件，每个组件都服务于特定的目的。
- en: • **Components of the VBA Editor:**– **Project Explorer:** Displays all open
    VBA projects and their components.– **Code Window:** Where you write and edit
    your VBA code.– **Properties Window:** Allows you to view and change properties
    of selected objects.– **Immediate Window:** A useful tool for debugging and testing
    small pieces of code.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: • **VBA编辑器的组件：**– **项目资源管理器：**显示所有打开的VBA项目和它们的组件.– **代码窗口：**您在此处编写和编辑VBA代码.– **属性窗口：**允许您查看和更改所选对象的属性.– **立即窗口：**调试和测试小段代码的有用工具。
- en: VBA Basics
  id: totrans-51
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: VBA基础知识
- en: Before you start writing complex macros, it's essential to understand the basics
    of VBA.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 在开始编写复杂的宏之前，了解VBA的基本知识是至关重要的。
- en: '• **Modules, Procedures, and Functions:**– **Modules:** Containers for storing
    VBA code. A module can hold multiple procedures and functions.– Procedures: Blocks
    of code that perform specific tasks. They can be subroutines (Sub) or functions
    (Function).– **Functions:** Similar to procedures, but they return a value.• **Writing
    Your First Simple Macro:** vba Sub HelloWorld()  MsgBox "Hello, World!" End Sub– **Explanation:**
    This simple macro displays a message box with the text "Hello, World!".'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: • **模块、过程和函数：**– **模块：**存储VBA代码的容器。一个模块可以包含多个过程和函数.– **过程：**执行特定任务的代码块。它们可以是子程序（Sub）或函数（Function）。– **函数：**与过程类似，但它们返回一个值。• **编写您的第一个简单宏：** vba Sub
    HelloWorld()  MsgBox "Hello, World!" End Sub– **说明：**这个简单的宏显示一个包含文本“Hello, World!”的消息框。
- en: Saving and Running Macros
  id: totrans-54
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 保存和运行宏
- en: After writing a macro, you need to save and run it.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 在编写宏之后，您需要保存并运行它。
- en: • **How to Save Your Work:**– Save your Word document as a Macro-Enabled Document
    with a .docm extension.– This allows the document to store and execute VBA code.• **Running
    Macros in Word:**– Go to the Developer tab and click on Macros.– Select your macro
    from the list and click Run.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: • **如何保存您的作品：**– 将Word文档保存为具有.docm扩展名的宏启用文档.– 这允许文档存储和执行VBA代码。• **在Word中运行宏：**– 转到“开发人员”选项卡并单击“宏”。– 从列表中选择您的宏并单击“运行”。
- en: 'Chapter 4: Creating Your First VBA Macro'
  id: totrans-57
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第4章：创建您的第一个VBA宏
- en: With a basic understanding of the VBA editor, you can now create your first
    practical VBA macro that interacts with Word documents.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 在对VBA编辑器有基本了解之后，您现在可以创建第一个与Word文档交互的实用VBA宏了。
- en: Writing a Simple Macro
  id: totrans-59
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 编写简单宏
- en: In this section, we’ll create a macro that automates a basic text manipulation
    task in Word.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，我们将创建一个宏来自动化Word中的基本文本操作任务。
- en: '• **Example: Formatting Selected Text:** vba Sub BoldSelectedText()  Selection.Font.Bold
    = wdToggle End Sub– **Explanation:** This macro toggles bold formatting on the
    currently selected text.'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: • **示例：格式化所选文本：**vba Sub BoldSelectedText() Selection.Font.Bold = wdToggle End
    Sub– **说明：**此宏切换当前所选文本的粗体格式。
- en: Debugging Your Macro
  id: totrans-62
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 调试你的宏
- en: Writing code without errors is challenging, but the VBA editor provides tools
    to help you debug.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 编写无错误的代码具有挑战性，但 VBA 编辑器提供了帮助调试的工具。
- en: '• **Using the Immediate Window:**– The Immediate Window lets you test single
    lines of code.– Example: Select or write some text in the current Word document
    and select it. Next, type ?Selection.Text in the Immediate Window and press Enter
    to display the currently selected text in the Immediate Window.• **Setting Breakpoints:**– Click
    in the left margin of the code window to set a breakpoint.– Breakpoints pause
    code execution, allowing you to inspect variables and step through your code line
    by line.'
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: • **使用立即窗口：**– 立即窗口允许你测试单行代码。– 示例：在当前 Word 文档中选择或输入一些文本，然后选择它。接下来，在立即窗口中输入 ?Selection.Text
    并按 Enter 键，以在立即窗口中显示当前所选文本。• **设置断点：**– 在代码窗口的左侧边缘单击以设置断点。– 断点暂停代码执行，允许你检查变量并逐行执行代码。
- en: Enhancing Your Macro
  id: totrans-65
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 提高你的宏
- en: You can improve your macro by adding features like error handling or more complex
    formatting options.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以通过添加错误处理或更复杂的格式化选项等功能来改进你的宏。
- en: '• **Example: Adding Error Handling:** vba Sub BoldSelectedText()  On Error
    GoTo ErrorHandler  Selection.Font.Bold = wdToggle  Exit Sub ErrorHandler:  MsgBox
    "An error occurred: " & Err.Description End Sub– Explanation: This code includes
    an error handler: On Error GoTo ErrorHandler. Any line of code below that that
    causes an error will cause processing to jump to the line below ErrorHandler:
    and display a message box if something goes wrong.'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: '• **示例：添加错误处理：**vba Sub BoldSelectedText() On Error GoTo ErrorHandler Selection.Font.Bold
    = wdToggle Exit Sub ErrorHandler: MsgBox "An error occurred: " & Err.Description
    End Sub– **说明：**此代码包含一个错误处理程序：On Error GoTo ErrorHandler。任何在该行以下导致错误的代码将导致处理跳转到
    ErrorHandler: 下的行，并在出错时显示一个消息框。'
- en: 'Chapter 5: Understanding the OpenAI API'
  id: totrans-68
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第 5 章：了解 OpenAI API
- en: To interact with ChatGPT, it’s essential to understand how the OpenAI API works.
    This chapter will cover the basics of making API requests and the structure of
    the API responses.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 要与 ChatGPT 交互，了解 OpenAI API 的工作原理至关重要。本章将涵盖发出 API 请求和 API 响应结构的基本知识。
- en: API Basics
  id: totrans-70
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: API 基础
- en: An API (Application Programming Interface) allows different software applications
    to communicate with each other. The OpenAI API provides a way to interact with
    AI models like ChatGPT.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: API（应用程序编程接口）允许不同的软件应用程序相互通信。OpenAI API 提供了一种与 ChatGPT 等人工智能模型交互的方式。
- en: • **How the API Works:**– You send a request to the API with specific parameters.– The
    API processes your request and returns a response containing the AI's output.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: • **API 的工作原理：**– 你向 API 发送带有特定参数的请求。– API 处理你的请求，并返回包含 AI 输出的响应。
- en: API Endpoints
  id: totrans-73
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: API 端点
- en: API endpoints are specific URLs where you can send requests to interact with
    different features of the API.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: API 端点是你可以发送请求以与 API 的不同功能交互的特定 URL。
- en: • **Endpoint for ChatGPT:**– https://api.openai.com/v1/chat/completions is the
    primary endpoint for interacting with ChatGPT models.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: • **ChatGPT 的端点：**– https://api.openai.com/v1/chat/completions 是与 ChatGPT 模型交互的主要端点。
- en: API Parameters
  id: totrans-76
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: API 参数
- en: When making a request, you’ll include parameters that control how the API behaves.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 在发出请求时，你将包括控制 API 行为的参数。
- en: • **Key Parameters for ChatGPT:**– **model:** Specifies which model to use (e.g.,
    "gpt-4o").– **messages:** The conversation history, including system and user
    messages.– **temperature:** Controls the creativity of the response (lower values
    make responses more focused).
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: • **ChatGPT 的关键参数：**– **model:** 指定要使用的模型（例如，“gpt-4o”）。– **messages:** 对话历史，包括系统和用户消息。– **temperature:**
    控制响应的创造力（较低值使响应更集中）。
- en: 'Chapter 6: Obtaining Your OpenAI API Key'
  id: totrans-79
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第 6 章：获取你的 OpenAI API 密钥
- en: To use the OpenAI API, you need an API key, which acts as a password to access
    the service. This chapter guides you through the process of obtaining and managing
    your API key.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 要使用 OpenAI API，你需要一个 API 密钥，它作为访问服务的密码。本章将指导你通过获取和管理你的 API 密钥的过程。
- en: Creating an OpenAI Account
  id: totrans-81
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 创建 OpenAI 账户
- en: If you don’t already have an OpenAI account, you’ll need to create one.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你还没有 OpenAI 账户，你需要创建一个。
- en: • **Steps to Create an Account:**– Visit [OpenAI’s website](https://www.openai.com/)
    and sign up for an account.– Follow the instructions to verify your email and
    complete the registration process.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: • **创建账户的步骤：**– 访问[OpenAI的网站](https://www.openai.com/)并注册账户。– 按照说明验证您的电子邮件并完成注册过程。
- en: Accessing the API Key
  id: totrans-84
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 访问API密钥
- en: Once your account is set up, you can generate an API key.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦您的账户设置完成，您就可以生成一个API密钥。
- en: • **Steps to Obtain Your API Key:**– Log in to your OpenAI account.– Navigate
    to the API section of your account dashboard.– Click on Create new secret key
    to generate your API key.• **Storing Your API Key Securely:**– Store your API
    key in a secure location, as it grants access to your OpenAI account.– Consider
    using environment variables or encrypted storage to manage your key within your
    VBA project.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: • **获取API密钥的步骤：**– 登录您的OpenAI账户。– 导航到您的账户仪表板的API部分。– 点击创建新的密钥来生成您的API密钥。• **安全存储您的API密钥：**– 将您的API密钥存储在安全的位置，因为它可以访问您的OpenAI账户。– 考虑在您的VBA项目中使用环境变量或加密存储来管理您的密钥。
- en: 'Chapter 7: Making API Calls from VBA (with JSONConverter)'
  id: totrans-87
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第7章：使用JSONConverter从VBA进行API调用
- en: In this chapter, you’ll learn how to make API calls from VBA using the JSONConverter
    tool, allowing you to interact with the OpenAI API.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，您将学习如何使用JSONConverter工具从VBA进行API调用，让您能够与OpenAI API进行交互。
- en: Installing the JSONConverter Library
  id: totrans-89
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 安装JSONConverter库
- en: To handle JSON data within VBA, you'll need to install the JSONConverter tool
    from the VBA-JSON GitHub repository.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 要在VBA中处理JSON数据，您需要从VBA-JSON GitHub仓库安装JSONConverter工具。
- en: • **Steps to Install JSONConverter:**– Download the JsonConverter.bas file from
    the author’s [VBA-JSON GitHub repository](https://github.com/mlg4035/VBA-JSON).
    This is a Windows-only supported version that requires you to include a reference
    to the "Microsoft Scripting Runtime" in the VBA editor.– Open the VBA editor in
    Word.– Go to File > Import File and select the JsonConverter.bas file.– ![Image](images/image2.png)Once
    imported, the JSONConverter module will be available for use in your project.
    If you get the following error when running the example code in this chapter,
    go to Tools > References… in the VBA editor and make sure “Microsoft Scripting
    Runtime” is selected. If not, select it from the list (scroll down if you have
    to) then click [OK].
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: • **安装JSONConverter的步骤：**– 从作者的[VBA-JSON GitHub仓库](https://github.com/mlg4035/VBA-JSON)下载JsonConverter.bas文件。这是一个仅支持Windows的版本，需要您在VBA编辑器中包含对“Microsoft
    Scripting Runtime”的引用。– 在Word中打开VBA编辑器。– 转到文件 > 导入文件并选择JsonConverter.bas文件。– ![图片](images/image2.png)导入后，JSONConverter模块将在您的项目中可用。如果在运行本章示例代码时遇到以下错误，请转到VBA编辑器中的工具
    > 引用…，并确保已选择“Microsoft Scripting Runtime”。如果没有，从列表中选择它（如果需要，请向下滚动），然后点击[确定]。
- en: Setting Up an HTTP Request in VBA
  id: totrans-92
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 在VBA中设置HTTP请求
- en: Now that you have the JSONConverter installed, you can use it to send and receive
    JSON data when interacting with the OpenAI API.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 现在您已经安装了JSONConverter，您可以使用它在与OpenAI API交互时发送和接收JSON数据。
- en: '• **Writing VBA Code for an API Request:**– Use MSXML2.ServerXMLHTTP or WinHttp.WinHttpRequest.5.1
    to send HTTP requests.– Example code: vba Dim http As Object Set http = CreateObject("MSXML2.ServerXMLHTTP") http.Open
    "POST", "https://api.openai.com/v1/chat/completions", False http.setRequestHeader
    "Content-Type", "application/json" http.setRequestHeader "Authorization", "Bearer
    YOUR_API_KEY_HERE"• **Creating the JSON Payload:**– Use JSONConverter to create
    the JSON object for the request body. vba Dim json As Object Set json = JsonConverter.ParseJson("{}") json("model")
    = "gpt-4o" json("messages") = Array( _  JsonConverter.ParseJson("{""role"": ""system"",
    ""content"": ""You are a helpful assistant.""}"), _  JsonConverter.ParseJson("{""role"":
    ""user"", ""content"": ""Hello, how can you help me learn Word VBA?""}") _ ) Dim
    jsonString As String jsonString = JsonConverter.ConvertToJson(json)• **Sending
    the Request and Handling the Response:**– Send the JSON payload to the OpenAI
    API and capture the response. vba http.send jsonString Dim response As String response
    = http.responseText'
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: '• **编写 API 请求的 VBA 代码：**– 使用 MSXML2.ServerXMLHTTP 或 WinHttp.WinHttpRequest.5.1
    发送 HTTP 请求。– 示例代码： vba Dim http As Object Set http = CreateObject("MSXML2.ServerXMLHTTP") http.Open
    "POST", "https://api.openai.com/v1/chat/completions", False http.setRequestHeader
    "Content-Type", "application/json" http.setRequestHeader "Authorization", "Bearer
    YOUR_API_KEY_HERE"• **创建 JSON 负载：**– 使用 JSONConverter 创建请求体的 JSON 对象。 vba Dim
    json As Object Set json = JsonConverter.ParseJson("{}") json("model") = "gpt-4o" json("messages")
    = Array( _  JsonConverter.ParseJson("{""role"": ""system"", ""content"": ""You
    are a helpful assistant.""}"), _  JsonConverter.ParseJson("{""role"": ""user"",
    ""content"": ""Hello, how can you help me learn Word VBA?""}") _ ) Dim jsonString
    As String jsonString = JsonConverter.ConvertToJson(json)• **发送请求和处理响应：**– 将 JSON
    负载发送到 OpenAI API 并捕获响应。 vba http.send jsonString Dim response As String response
    = http.responseText'
- en: 'Chapter 8: Parsing API Responses in VBA'
  id: totrans-95
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第 8 章：在 VBA 中解析 API 响应
- en: After sending a request to the OpenAI API, you'll receive a JSON-formatted response.
    This chapter focuses on how to parse and use that data within VBA using the JSONConverter
    tool.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 在向 OpenAI API 发送请求后，你将收到一个 JSON 格式的响应。本章重点介绍如何使用 JSONConverter 工具在 VBA 中解析和使用这些数据。
- en: Parsing JSON with JSONConverter
  id: totrans-97
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 使用 JSONConverter 解析 JSON
- en: • **Converting the Response to a JSON Object:**– Parse the response text into
    a JSON object for easy data manipulation. vba Dim jsonResponse As Object Set jsonResponse
    = JsonConverter.ParseJson(response)• **Extracting Useful Information:**– Access
    specific parts of the JSON object, such as the model's reply. vba Dim reply As
    String reply = jsonResponse("choices")(1)("message")("content") MsgBox reply
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: • **将响应转换为 JSON 对象：**– 将响应文本解析为 JSON 对象，以便轻松数据操作。 vba Dim jsonResponse As Object Set
    jsonResponse = JsonConverter.ParseJson(response)• **提取有用信息：**– 访问 JSON 对象的特定部分，例如模型的回复。 vba Dim
    reply As String reply = jsonResponse("choices")(1)("message")("content") MsgBox
    reply
- en: This code will display the AI's response in a message box, showing how easy
    it is to interact with the OpenAI API from VBA.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 此代码将在消息框中显示 AI 的响应，展示了从 VBA 与 OpenAI API 交互是多么简单。
- en: Summing Up
  id: totrans-100
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 总结
- en: In Chapters 7 and 8, we've covered how to install the JSONConverter library,
    set up an HTTP request in VBA, and handle API responses from the OpenAI API. Now,
    let's combine everything into a complete, working example that you can use in
    your own projects.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 在第 7 章和第 8 章中，我们介绍了如何安装 JSONConverter 库，在 VBA 中设置 HTTP 请求，以及处理来自 OpenAI API
    的 API 响应。现在，让我们将所有内容组合成一个完整、可工作的示例，你可以在自己的项目中使用。
- en: '• **Working Example: Sending a Request to the OpenAI API**'
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: • **工作示例：向 OpenAI API 发送请求**
- en: This example demonstrates how to send a text prompt to ChatGPT using VBA, retrieve
    the response, and display it in a message box. This is a practical example you
    can build upon as you develop more complex integrations.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 本例演示了如何使用 VBA 向 ChatGPT 发送文本提示，检索响应，并在消息框中显示。这是一个实用的例子，你可以在此基础上构建更复杂的集成。
- en: 'Step 1: Install the JSONConverter Library'
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 第 1 步：安装 JSONConverter 库
- en: Ensure that you've downloaded and installed the JsonConverter.bas file from
    the author’s [VBA-JSON GitHub repository](https://github.com/mlg4035/VBA-JSON).
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 确保你已经从作者的 [VBA-JSON GitHub 仓库](https://github.com/mlg4035/VBA-JSON)下载并安装了 JsonConverter.bas
    文件。
- en: In the VBA editor, go to File > Import File and select the JsonConverter.bas
    file.
  id: totrans-106
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在 VBA 编辑器中，转到文件 > 导入文件，并选择 JsonConverter.bas 文件。
- en: This will add the JSONConverter module to your project, which will allow you
    to work with JSON data in VBA.
  id: totrans-107
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 这将添加 JSONConverter 模块到你的项目中，这将允许你在 VBA 中处理 JSON 数据。
- en: 'Step 2: Define the Function to Interact with the API'
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 第 2 步：定义与 API 交互的函数
- en: Create a new module in the VBA editor and paste the following code. This code
    sets up an HTTP request to the OpenAI API, sends a prompt, and retrieves the AI's
    response.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 在VBA编辑器中创建一个新的模块，并粘贴以下代码。此代码设置了一个HTTP请求到OpenAI API，发送一个提示，并检索AI的响应。
- en: 'vba '' Example of interacting with the OpenAI API using VBA Sub GetChatGPTResponse() 
    '' Define the API endpoint  Dim apiUrl As String  apiUrl = "https://api.openai.com/v1/chat/completions" 
    '' Retrieve the API key from an environment variable  Dim apiKey As String  apiKey
    = Environ("OPENAI_API_KEY")  '' Set up the HTTP request  Dim http As Object  Set
    http = CreateObject("MSXML2.ServerXMLHTTP")  '' Open the request  http.Open "POST",
    apiUrl, False  '' Set the request headers  http.setRequestHeader "Content-Type",
    "application/json"  http.setRequestHeader "Authorization", "Bearer " & apiKey 
    '' Prepare the JSON payload  Dim json As Object  Set json = JsonConverter.ParseJson("{}") 
    '' Set the model and the messages  json("model") = "gpt-4o"  json("messages")
    = Array( _  JsonConverter.ParseJson("{""role"": ""system"", ""content"": ""You
    are a helpful assistant.""}"), _  JsonConverter.ParseJson("{""role"": ""user"",
    ""content"": ""Hello, how can you help me learn VBA?""}") _  )  '' Convert the
    JSON object to a string  Dim jsonString As String  jsonString = JsonConverter.ConvertToJson(json) 
    '' Send the request  http.send jsonString  '' Get the response  Dim response As
    String  response = http.responseText  '' Parse the JSON response  Dim jsonResponse
    As Object  Set jsonResponse = JsonConverter.ParseJson(response)  '' Extract the
    AI''s response  Dim chatResponse As String  chatResponse = jsonResponse("choices")(1)("message")("content") 
    '' Display the response in a message box  MsgBox "ChatGPT says: " & chatResponse End
    Sub'
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 'vba '' 使用VBA与OpenAI API交互的示例 Sub GetChatGPTResponse()  '' 定义API端点  Dim apiUrl
    As String  apiUrl = "https://api.openai.com/v1/chat/completions"  '' 从环境变量中检索API密钥 
    Dim apiKey As String  apiKey = Environ("OPENAI_API_KEY")  '' 设置HTTP请求  Dim http
    As Object  Set http = CreateObject("MSXML2.ServerXMLHTTP")  '' 打开请求  http.Open
    "POST", apiUrl, False  '' 设置请求头  http.setRequestHeader "Content-Type", "application/json" 
    http.setRequestHeader "Authorization", "Bearer " & apiKey  '' 准备JSON有效负载  Dim
    json As Object  Set json = JsonConverter.ParseJson("{}")  '' 设置模型和消息  json("model")
    = "gpt-4o"  json("messages") = Array( _  JsonConverter.ParseJson("{""role"": ""system"",
    ""content"": ""You are a helpful assistant.""}"), _  JsonConverter.ParseJson("{""role"":
    ""user"", ""content"": ""Hello, how can you help me learn VBA?""}") _  )  '' 将JSON对象转换为字符串 
    Dim jsonString As String  jsonString = JsonConverter.ConvertToJson(json)  '' 发送请求 
    http.send jsonString  '' 获取响应  Dim response As String  response = http.responseText 
    '' 解析JSON响应  Dim jsonResponse As Object  Set jsonResponse = JsonConverter.ParseJson(response) 
    '' 提取AI的响应  Dim chatResponse As String  chatResponse = jsonResponse("choices")(1)("message")("content") 
    '' 在消息框中显示响应  MsgBox "ChatGPT says: " & chatResponse End Sub'
- en: 'Chapter 9: Creating a User Interface in Word'
  id: totrans-111
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第9章：在Word中创建用户界面
- en: To make your VBA project user-friendly, you'll need to create a simple interface
    within Microsoft Word. This chapter will guide you through building a basic UserForm
    that will allow users to interact with the ChatGPT-powered assistant.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 要使你的VBA项目用户友好，你需要在Microsoft Word中创建一个简单的界面。本章将指导你构建一个基本的用户表单（UserForm），这将使用户能够与ChatGPT驱动的助手进行交互。
- en: Building a Basic UserForm
  id: totrans-113
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 构建基本用户表单
- en: A UserForm is a custom dialog box that you can create in VBA to collect input
    from the user or display information.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 用户表单（UserForm）是一个自定义对话框，你可以在VBA中创建它来收集用户输入或显示信息。
- en: • **Steps to Create a UserForm:**– In the VBA editor, go to Insert > UserForm
    to create a new form.– The UserForm will appear in the Project Explorer under
    the forms section.• **Adding Controls to the UserForm:**– **TextBox:** Use this
    to allow users to input text that will be sent to ChatGPT.• Drag a TextBox control
    from the Toolbox onto the UserForm.– **CommandButton:** Add buttons to send the
    text to ChatGPT and display the response.• Drag two CommandButton controls onto
    the form and name them appropriately (e.g., cmdSend for sending input and cmdClose
    to close the form without sending text).– **Label:** Use labels to guide the user
    or display the AI’s responses.• Drag a Label control to display instructions or
    ChatGPT’s response.• **Naming Conventions:**– Assign meaningful names to the controls
    (e.g., txtInput for the input TextBox) to make your code more readable.• **Completed
    Basic Form:**
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: • **创建用户表单的步骤：**– 在 VBA 编辑器中，转到插入 > 用户表单以创建一个新的表单.– 用户表单将出现在“表单”部分下的项目资源管理器中。• **向用户表单添加控件：**–
    **文本框（TextBox）：** 使用此控件允许用户输入将被发送到 ChatGPT 的文本.– 从工具箱中拖动一个文本框控件到用户表单上.– **命令按钮（CommandButton）：**
    添加按钮以将文本发送到 ChatGPT 并显示响应.– 将两个命令按钮控件拖到表单上，并适当地命名它们（例如，cmdSend 用于发送输入，cmdClose
    用于关闭表单而不发送文本）。– **标签（Label）：** 使用标签来引导用户或显示 AI 的响应.– 拖动一个标签控件以显示说明或 ChatGPT 的响应。–
    **命名约定：**– 为控件分配有意义的名称（例如，txtInput 用于输入文本框）以使代码更易于阅读。– **完成的基本表单：**
- en: '![Image](images/image-1.png)'
  id: totrans-116
  prefs: []
  type: TYPE_IMG
  zh: '![图片](images/image-1.png)'
- en: Connecting the UserForm to VBA Code
  id: totrans-117
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 将用户表单连接到 VBA 代码
- en: With your UserForm designed, the next step is to write VBA code that will link
    the UserForm’s controls to your ChatGPT functionality.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 在设计好用户表单后，下一步是编写 VBA 代码，该代码将连接用户表单的控件到您的 ChatGPT 功能。
- en: '• **Writing the VBA Code:**– Double-click on the Send button (cmdSend) to open
    the code window.– Add code to send the user’s input to the OpenAI API and display
    the response. vba Private Sub cmdSend_Click()  Dim inputText As String  inputText
    = txtInput.Text   '' Call the function to send input to ChatGPT and get the response 
    If inputText <> "" Then  lblResponse.Caption = "Processing..."  Dim chatResponse
    As String  chatResponse = SendToChatGPT(inputText)  '' Display the response in
    a label  lblResponse.Caption = "ChatGPT''s response:" & String(2, vbCrLf) & chatResponse 
    Else  MsgBox "Please enter some text before sending."  End If End Sub– Add code
    for the cmdClose button to close the form without doing anything. vba Private
    Sub cmdClose_Click()  Unload Me End Sub• **Writing the SendToChatGPT Function:**– This
    function will handle sending the user’s input to the OpenAI API and return the
    AI’s response. vba Function SendToChatGPT(userInput As String) As String  Dim
    http As Object  Set http = CreateObject("MSXML2.ServerXMLHTTP")   '' Retrieve
    the API key from an environment variable  Dim apiKey As String  apiKey = Environ("OPENAI_API_KEY") 
    '' API request setup  http.Open "POST", "https://api.openai.com/v1/chat/completions",
    False  http.setRequestHeader "Content-Type", "application/json"  http.setRequestHeader
    "Authorization", "Bearer " & apiKey  '' JSON payload  Dim json As Object  Set
    json = JsonConverter.ParseJson("{}")  json("model") = "gpt-4o"  json("messages")
    = Array( _  JsonConverter.ParseJson("{""role"": ""system"", ""content"": ""You
    are a helpful assistant.""}"), _  JsonConverter.ParseJson("{""role"": ""user"",
    ""content"": """ & userInput & """}") _  )  Dim jsonString As String  jsonString
    = JsonConverter.ConvertToJson(json)  '' Sending the request and getting the response 
    http.send jsonString  Dim response As String  response = http.responseText  ''
    Parse the response and extract the AI''s reply  Dim jsonResponse As Object  Set
    jsonResponse = JsonConverter.ParseJson(response)  SendToChatGPT = jsonResponse("choices")(1)("message")("content") End
    Function'
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: '• **编写 VBA 代码：**– 双击发送按钮（cmdSend）以打开代码窗口.– 添加代码以将用户的输入发送到 OpenAI API 并显示响应。 vba Private
    Sub cmdSend_Click()  Dim inputText As String  inputText = txtInput.Text   '' 调用函数将输入发送到
    ChatGPT 并获取响应  If inputText <> "" Then  lblResponse.Caption = "处理中..."  Dim chatResponse
    As String  chatResponse = SendToChatGPT(inputText)  '' 在标签中显示响应  lblResponse.Caption
    = "ChatGPT 的响应：" & String(2, vbCrLf) & chatResponse  Else  MsgBox "请在发送前输入一些文本。" 
    End If End Sub– 为 cmdClose 按钮添加代码以关闭表单而不执行任何操作。 vba Private Sub cmdClose_Click() 
    Unload Me End Sub• **编写 SendToChatGPT 函数：**– 此函数将处理将用户输入发送到 OpenAI API 并返回 AI
    的响应。 vba Function SendToChatGPT(userInput As String) As String  Dim http As Object 
    Set http = CreateObject("MSXML2.ServerXMLHTTP")   '' 从环境变量中获取 API 密钥  Dim apiKey
    As String  apiKey = Environ("OPENAI_API_KEY")  '' API 请求设置  http.Open "POST",
    "https://api.openai.com/v1/chat/completions", False  http.setRequestHeader "Content-Type",
    "application/json"  http.setRequestHeader "Authorization", "Bearer " & apiKey 
    '' JSON 负载  Dim json As Object  Set json = JsonConverter.ParseJson("{}")  json("model")
    = "gpt-4o"  json("messages") = Array( _  JsonConverter.ParseJson("{""role"": ""system"",
    ""content"": ""您是一个有用的助手。""}"), _  JsonConverter.ParseJson("{""role"": ""user"",
    ""content"": """ & userInput & """}") _  )  Dim jsonString As String  jsonString
    = JsonConverter.ConvertToJson(json)  '' 发送请求并获取响应  http.send jsonString  Dim response
    As String  response = http.responseText  '' 解析响应并提取 AI 的回复  Dim jsonResponse As
    Object  Set jsonResponse = JsonConverter.ParseJson(response)  SendToChatGPT =
    jsonResponse("choices")(1)("message")("content") End Function'
- en: '![Image](images/image-2.png)***Note:      **All of the code in this section
    should be put in the UserForm’s code window.'
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: '![图片](images/image-2.png)***注意：      **本节中所有代码应放入 UserForm 的代码窗口中。'
- en: Design Considerations
  id: totrans-121
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 设计注意事项
- en: 'When designing your UserForm, consider the following tips to enhance usability:'
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 在设计您的 UserForm 时，请考虑以下提示以增强可用性：
- en: • **Layout:** Ensure that the form is clean and easy to navigate. Place controls
    logically and label them clearly.• **Feedback:** Provide feedback to the user
    when the AI is processing the input, such as displaying a "Processing..." message.• **Accessibility:**
    Consider users with different needs, ensuring your form is accessible.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: • **布局：**确保表单整洁且易于导航。合理放置控件并清晰标注标签。• **反馈：**当 AI 正在处理输入时，向用户提供反馈，例如显示“处理中...”消息。• **无障碍性：**考虑不同需求的用户，确保您的表单具有无障碍性。
- en: 'Chapter 10: Building a ChatGPT-Powered Assistant'
  id: totrans-124
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第 10 章：构建 ChatGPT 驱动的助手
- en: This chapter brings together all the skills and techniques you've learned to
    build a fully functional ChatGPT-powered assistant within Microsoft Word. One
    of the key features of this assistant is the ability to handle multi-turn conversations,
    where the assistant retains the context of previous messages.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 本章汇集了您所学到的所有技能和技术，以在Microsoft Word中构建一个功能齐全的ChatGPT助手。该助手的一个关键特性是能够处理多轮对话，助手能够保留先前消息的上下文。
- en: Handling Multiple Messages
  id: totrans-126
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 处理多个消息
- en: To create a dynamic conversation with ChatGPT, it’s important to manage the
    history of the conversation effectively. This section will guide you on how to
    modify your existing code to handle multiple messages in a conversation.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 为了与ChatGPT创建动态对话，有效地管理对话历史非常重要。本节将指导您如何修改现有的代码以处理对话中的多个消息。
- en: 'Step 1: Adding a Collection to Store Messages'
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 第1步：添加一个存储消息的集合
- en: To keep track of the conversation, you’ll need a collection that stores all
    messages exchanged between the user and the assistant. This collection will be
    included in the SendToChatGPT  function, which you created in Chapter 8.
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 为了跟踪对话，您需要一个存储用户和助手之间交换的所有消息的集合。这个集合将包含在您在第8章中创建的SendToChatGPT函数中。
- en: '**Declare the Collection at the Module Level:**'
  id: totrans-130
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**在模块级别声明集合：**'
- en: You should declare the collection at the module level to ensure that it persists
    between different subroutine and function calls.
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 您应该在模块级别声明集合，以确保它在不同的子程序和函数调用之间持续存在。
- en: vba ' Declare the message history collection at the top of your module Private
    messageHistory As Collection
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: vba ' 在模块顶部声明消息历史集合 Private messageHistory As Collection
- en: '**Initialize the Collection in Your Function:**'
  id: totrans-133
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**在您的函数中初始化集合：**'
- en: Modify the SendToChatGPT  function to initialize the messageHistory collection
    if it hasn’t been initialized already. This ensures that the collection is available
    for storing and retrieving messages throughout the session.
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 修改SendToChatGPT函数，如果尚未初始化，则初始化messageHistory集合。这确保了在整个会话中，集合可用于存储和检索消息。
- en: 'vba Function SendToChatGPT(userInput As String) As String   Dim http As Object 
    Set http = CreateObject("MSXML2.ServerXMLHTTP")  '' Retrieve the API key from
    an environment variable  Dim apiKey As String  apiKey = Environ("OPENAI_API_KEY") 
    '' API request setup  http.Open "POST", "https://api.openai.com/v1/chat/completions",
    False  http.setRequestHeader "Content-Type", "application/json"  http.setRequestHeader
    "Authorization", "Bearer " & apiKey   '' Initialize the message history collection
    if it doesn''t exist   If messageHistory Is Nothing Then  Set messageHistory =
    New Collection  '' Add the initial system message to the collection  messageHistory.Add
    JsonConverter.ParseJson("{""role"": ""system"", ""content"": ""You are a helpful
    assistant.""}")  End If'
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 'vba Function SendToChatGPT(userInput As String) As String   Dim http As Object 
    Set http = CreateObject("MSXML2.ServerXMLHTTP")  '' 从环境变量中获取API密钥  Dim apiKey
    As String  apiKey = Environ("OPENAI_API_KEY")  '' API请求设置  http.Open "POST", "https://api.openai.com/v1/chat/completions",
    False  http.setRequestHeader "Content-Type", "application/json"  http.setRequestHeader
    "Authorization", "Bearer " & apiKey   '' 如果不存在，初始化消息历史集合   If messageHistory Is
    Nothing Then  Set messageHistory = New Collection  '' 将初始系统消息添加到集合中  messageHistory.Add
    JsonConverter.ParseJson("{""role"": ""system"", ""content"": ""You are a helpful
    assistant.""}")  End If'
- en: 'Step 2: Adding Messages to the Collection'
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 第2步：向集合中添加消息
- en: Next, you’ll add the user’s input and the assistant’s responses to the messageHistory  collection.
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，您将用户的输入和助手的响应添加到messageHistory集合中。
- en: '**Add the User’s Input:**'
  id: totrans-138
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**添加用户的输入：**'
- en: After collecting the user’s input (which is done via the TextBox on your UserForm),
    add it to the messageHistory  collection.
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 在收集用户的输入（通过UserForm上的TextBox完成）后，将其添加到messageHistory集合中。
- en: 'vba '' Adding the user message messageHistory.Add JsonConverter.ParseJson("{""role"":
    ""user"", ""content"": """ & userInput & """}")'
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 'vba '' 添加用户消息 messageHistory.Add JsonConverter.ParseJson("{""role"": ""user"",
    ""content"": """ & userInput & """}")'
- en: '**Prepare the JSON Payload Using the Message History:**'
  id: totrans-141
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**使用消息历史准备JSON有效负载：**'
- en: Use the messageHistory  collection to create the JSON payload for the API call.
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 使用messageHistory集合创建API调用的JSON有效负载。
- en: vba ' Prepare the JSON payload with the full conversation history Dim json As
    Object Set json = JsonConverter.ParseJson("{}") json("model") = "gpt-4o" ' Convert
    the message history to an array and assign it to the 'messages' key Dim messageArray()
    As Variant ReDim messageArray(0 To messageHistory.Count - 1) Dim i As Integer For
    i = 1 To messageHistory.Count  Set messageArray(i - 1) = messageHistory(i) Next
    i ' Convert the message array to JSON for the API call json("messages") = messageArray
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: vba ' 准备包含完整对话历史的JSON有效负载 Dim json As Object Set json = JsonConverter.ParseJson("{}") json("model")
    = "gpt-4o" ' 将消息历史记录转换为数组并分配给'messages'键 Dim messageArray() As Variant ReDim messageArray(0
    To messageHistory.Count - 1) Dim i As Integer For i = 1 To messageHistory.Count 
    Set messageArray(i - 1) = messageHistory(i) Next i ' 将消息数组转换为JSON以进行API调用 json("messages")
    = messageArray
- en: 'Step 3: Handling the AI’s Response'
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 第3步：处理AI的响应
- en: After sending the API request and receiving the AI’s response, add the AI’s
    reply to the messageHistory  collection.
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 在发送API请求并收到AI的响应后，将AI的回复添加到messageHistory集合中。
- en: '**Add the AI’s Response to the History:**'
  id: totrans-146
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**将AI的响应添加到历史记录：**'
- en: Extract the AI’s response from the JSON response and add it to the messageHistory  collection.
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 从JSON响应中提取AI的响应并将其添加到messageHistory集合中。
- en: 'vba '' Convert the JSON object to a string Dim jsonString As String jsonString
    = JsonConverter.ConvertToJson(json) '' Send the request http.send jsonString ''
    Get the response Dim response As String response = http.responseText '' Parse
    the JSON response Dim jsonResponse As Object Set jsonResponse = JsonConverter.ParseJson(response) ''
    Extract the AI''s response Dim chatResponse As String chatResponse = jsonResponse("choices")(1)("message")("content") ''
    Add the AI''s response to the collection messageHistory.Add JsonConverter.ParseJson("{""role"":
    ""assistant"", ""content"": """ & chatResponse & """}") SendToChatGPT = chatResponse End
    Function'
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 'vba '' 将JSON对象转换为字符串 Dim jsonString As String jsonString = JsonConverter.ConvertToJson(json) ''
    发送请求 http.send jsonString '' 获取响应 Dim response As String response = http.responseText ''
    解析JSON响应 Dim jsonResponse As Object Set jsonResponse = JsonConverter.ParseJson(response) ''
    提取AI的响应 Dim chatResponse As String chatResponse = jsonResponse("choices")(1)("message")("content") ''
    将AI的响应添加到集合中 messageHistory.Add JsonConverter.ParseJson("{""role"": ""assistant"",
    ""content"": """ & chatResponse & """}") SendToChatGPT = chatResponse End Function'
- en: This complete function is now fully equipped to handle multi-turn conversations,
    where the assistant retains context and can engage in more meaningful interactions
    with the user.
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 这个完整的功能现在已完全配备，可以处理多轮对话，其中助手保留上下文，并能与用户进行更有意义的互动。
- en: '• **Updating the Interface:**– Modify the UserForm to allow users to see the
    conversation history.– You might include a ListBox or TextBox where previous messages
    and responses are displayed. vba lstHistory.AddItem "User: " & inputText lstHistory.AddItem
    "ChatGPT: " & chatResponse'
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: '• **更新界面：**– 修改UserForm以使用户能够查看对话历史记录。– 您可能包括一个ListBox或TextBox来显示之前的消息和响应。 vba lstHistory.AddItem
    "User: " & inputText lstHistory.AddItem "ChatGPT: " & chatResponse'
- en: Testing the Assistant
  id: totrans-151
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 测试助手
- en: Once your ChatGPT-powered assistant is functional, it’s essential to test it
    thoroughly.
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦您的ChatGPT助手功能正常，彻底测试它至关重要。
- en: • **Test Scenarios:**– Test various input scenarios, including typical queries,
    unusual requests, and empty inputs.– Ensure that the assistant handles errors
    gracefully, such as network issues or invalid API keys.• **User Feedback:**– If
    possible, have others test the assistant and provide feedback. Use this feedback
    to refine the user experience and improve the assistant’s performance.
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: • **测试场景：**– 测试各种输入场景，包括典型查询、不寻常的请求和空输入。– 确保助手能够优雅地处理错误，例如网络问题或无效的API密钥。• **用户反馈：**– 如果可能的话，让其他人测试助手并提供反馈。使用这些反馈来优化用户体验并提高助手的性能。
- en: 'Chapter 11: Handling Errors and Debugging'
  id: totrans-154
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第11章：处理错误和调试
- en: Even with the best planning, errors can occur. This chapter focuses on identifying
    and fixing issues in your VBA project, particularly those related to API calls
    and JSON handling.
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 即使有最好的规划，错误也可能发生。本章重点介绍识别和修复VBA项目中的问题，特别是与API调用和JSON处理相关的问题。
- en: Common VBA Errors
  id: totrans-156
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 常见VBA错误
- en: Understanding common errors can help you diagnose problems quickly.
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 理解常见错误可以帮助您快速诊断问题。
- en: '• **Runtime Errors:**– These occur during the execution of your VBA code. Examples
    include trying to access an object that doesn''t exist or dividing by zero. vba On
    Error GoTo ErrorHandler• **Compile Errors:**– These are errors that occur when
    you try to run code that doesn’t follow the correct syntax or structure. vba ''
    Example of a compile error: Missing "End If" in an If statement If a > b Then 
    MsgBox "a is greater than b"'
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: • **运行时错误：**– 这些错误发生在你的VBA代码执行过程中。例如，尝试访问不存在的对象或除以零。vba On Error GoTo ErrorHandler• **编译错误：**– 这些错误发生在你尝试运行不遵循正确语法或结构的代码时。vba '
    编译错误的示例：If语句中缺少"End If" If a > b Then  MsgBox "a 大于 b"
- en: Using Error Handling in VBA
  id: totrans-159
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 在VBA中使用错误处理
- en: Implementing error handling in your code makes your assistant more robust and
    user-friendly.
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 在你的代码中实现错误处理可以使你的助手更健壮且用户友好。
- en: '• Using On Error Statements:– The On Error statement allows you to define what
    happens when an error occurs. vba On Error GoTo ErrorHandler '' Code that might
    produce an error http.send jsonString Exit Sub ErrorHandler:  MsgBox "An error
    occurred: " & Err.Description End Sub'
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: • 使用错误处理语句：– 错误处理语句允许你定义当发生错误时会发生什么。vba On Error GoTo ErrorHandler ' 可能产生错误的代码 http.send
    jsonString Exit Sub ErrorHandler:  MsgBox "发生错误： " & Err.Description End Sub
- en: Debugging Tips
  id: totrans-162
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 调试技巧
- en: The VBA editor provides several tools to help you debug your code effectively.
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: VBA编辑器提供了几个工具来帮助你有效地调试代码。
- en: • **Immediate Window:**– Use the Immediate Window to test lines of code and
    inspect variables. vba ?http.status• **Breakpoints and Step Execution:**– Set
    breakpoints in your code to pause execution and examine the current state of variables
    and objects.– Step through your code line by line using F8 to observe how it runs.• **Watch
    Window:**– Add variables to the Watch Window to monitor their values as your code
    executes.
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: • **立即窗口：**– 使用立即窗口来测试代码行并检查变量。vba ?http.status• **断点和单步执行：**– 在代码中设置断点以暂停执行并检查变量和对象当前状态。– 使用F8逐行执行代码以观察其运行方式。• **监视窗口：**– 将变量添加到监视窗口以监控它们在代码执行过程中的值。
- en: 'Chapter 12: Enhancing the User Experience'
  id: totrans-165
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第12章：增强用户体验
- en: A well-designed user experience can make your ChatGPT-powered assistant more
    effective and enjoyable to use. This chapter discusses ways to enhance the interface,
    improve performance, and add useful features.
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 一个精心设计的用户体验可以使你的ChatGPT助手更有效且易于使用。本章讨论了增强界面、改进性能和添加有用功能的方法。
- en: Adding Custom Features
  id: totrans-167
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 添加自定义功能
- en: Consider adding custom features that enhance the functionality of your assistant.
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑添加增强助手功能的自定义功能。
- en: • **Saving Conversation History:**– Allow users to save their conversation history
    to a Word document. vba Dim doc As Document Set doc = Documents.Add doc.Content.Text
    = lstHistory.List(i) doc.SaveAs2 "ChatHistory.docx"• **Custom Commands:**– Implement
    special commands that trigger specific actions, such as clearing the chat or sending
    predefined queries. vba If inputText = "/clear" Then  lstHistory.Clear End If
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: • **保存对话历史记录：**– 允许用户将他们的对话历史保存到Word文档中。vba Dim doc As Document Set doc = Documents.Add doc.Content.Text
    = lstHistory.List(i) doc.SaveAs2 "ChatHistory.docx"• **自定义命令：**– 实现触发特定操作的专用命令，例如清除聊天或发送预定义查询。vba If
    inputText = "/clear" Then  lstHistory.Clear End If
- en: Improving Performance
  id: totrans-170
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 提升性能
- en: As you add more features, it's important to keep your code efficient to ensure
    the assistant runs smoothly.
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 随着你添加更多功能，保持代码效率以确保助手平稳运行是很重要的。
- en: • **Optimizing API Calls:**– Minimize the number of API calls by batching requests
    or managing conversation history efficiently.• **Streamlining the Interface:**– Keep
    the UserForm responsive by ensuring controls are updated efficiently and unnecessary
    tasks are avoided during execution.
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: '• **优化API调用：**– 通过批量请求或高效管理对话历史记录来最小化API调用次数。• **简化界面：**– 通过确保控件高效更新并在执行过程中避免不必要的任务来保持UserForm响应。 '
- en: User Feedback
  id: totrans-173
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 用户反馈
- en: Actively seek feedback from users to identify areas for improvement.
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 积极寻求用户反馈以识别改进领域。
- en: • **Adding a Feedback Mechanism:**– Consider adding a button or link that allows
    users to provide feedback directly within the Word document. vba Dim emailBody
    As String emailBody = "mailto:your.email@example.com?subject=Feedback on ChatGPT
    Assistant&body=" & _  "Please provide your feedback here." FollowHyperlink emailBody
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: • **添加反馈机制：**– 考虑添加一个按钮或链接，允许用户在Word文档中直接提供反馈。vba Dim emailBody As String emailBody
    = "mailto:your.email@example.com?subject=Feedback on ChatGPT Assistant&body="
    & _  "Please provide your feedback here." FollowHyperlink emailBody
- en: 'Chapter 13: Security Considerations'
  id: totrans-176
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第13章：安全考虑
- en: Handling sensitive data, such as API keys and user inputs, requires careful
    consideration. This chapter covers best practices for securing your VBA project
    and protecting user data, including how to set environment variables.
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 处理敏感数据，如API密钥和用户输入，需要仔细考虑。本章涵盖了保护您的VBA项目和保护用户数据的最佳实践，包括如何设置环境变量。
- en: Securing Your API Key
  id: totrans-178
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 保护您的API密钥
- en: Your OpenAI API key is a valuable credential that must be protected to prevent
    unauthorized access. Storing it securely is critical to safeguarding your project.
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 您的OpenAI API密钥是一份宝贵的凭证，必须加以保护以防止未经授权的访问。安全存储它对于保护您的项目至关重要。
- en: Storing the API Key Using Environment Variables
  id: totrans-180
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 使用环境变量存储API密钥
- en: One effective way to secure your API key is by storing it in an environment
    variable. Environment variables are a set of dynamic values that can affect the
    way running processes behave on a computer. They provide a secure way to store
    sensitive information, such as API keys, outside of your code.
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: 保护您的API密钥的一种有效方法是将它存储在环境变量中。环境变量是一组动态值，可以影响计算机上运行进程的行为。它们提供了一种安全的方式来存储敏感信息，如API密钥，而无需在代码中存储。
- en: Setting an Environment Variable on Windows
  id: totrans-182
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 在Windows上设置环境变量
- en: '**Open the System Properties:**'
  id: totrans-183
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**打开系统属性：**'
- en: Right-click on This PC or My Computer on your desktop or in File Explorer.
  id: totrans-184
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在桌面或文件资源管理器中右键单击“此电脑”或“我的电脑”。
- en: Select Properties.
  id: totrans-185
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 选择“属性”。
- en: Click on Advanced system settings on the left-hand side.
  id: totrans-186
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在左侧单击“高级系统设置”。
- en: '**Access Environment Variables:**'
  id: totrans-187
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**访问环境变量：**'
- en: In the System Properties window, click the Environment Variables button.
  id: totrans-188
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在“系统属性”窗口中，单击“环境变量”按钮。
- en: '**Create a New Environment Variable:**'
  id: totrans-189
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**创建新的环境变量：**'
- en: In the Environment Variables window, look under the User variables section for
    your account.
  id: totrans-190
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在“环境变量”窗口中，在用户变量部分查找您的账户。
- en: Click New... to create a new environment variable.
  id: totrans-191
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 点击“新建...”以创建新的环境变量。
- en: '**Set the Variable Name and Value:**'
  id: totrans-192
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**设置变量名和值：**'
- en: In the Variable name field, enter a name for your variable, such as OPENAI_API_KEY.
  id: totrans-193
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在“变量名”字段中，为您的变量输入一个名称，例如OPENAI_API_KEY。
- en: In the Variable value field, enter your OpenAI API key.
  id: totrans-194
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在“变量值”字段中，输入您的OpenAI API密钥。
- en: Click OK to save the variable.
  id: totrans-195
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 点击“确定”以保存变量。
- en: '**Verify the Environment Variable:**'
  id: totrans-196
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**验证环境变量：**'
- en: Open a Command Prompt and type echo %OPENAI_API_KEY% to verify that your environment
    variable is set correctly.
  id: totrans-197
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 打开命令提示符并输入echo %OPENAI_API_KEY%以验证您的环境变量是否设置正确。
- en: If set correctly, it will display your API key.
  id: totrans-198
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 如果设置正确，它将显示您的API密钥。
- en: Accessing the Environment Variable in VBA
  id: totrans-199
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 在VBA中访问环境变量
- en: After setting the environment variable, you can access it in your VBA code using
    the Environ function. This allows you to retrieve your API key securely without
    hardcoding it into your project.
  id: totrans-200
  prefs: []
  type: TYPE_NORMAL
  zh: 在设置环境变量后，您可以使用Environ函数在您的VBA代码中访问它。这允许您安全地检索API密钥，而无需将其硬编码到项目中。
- en: '***Note:      **If Microsoft Word was open when you set the *OPENAI_API_KEY*
    environment variable, you will need to close Word and re-open it before it will
    be able to access (“see”) the variable.'
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
  zh: '***注意：      **如果在您设置*OPENAI_API_KEY*环境变量时Microsoft Word已打开，您需要关闭Word并重新打开它，才能访问（查看）该变量。'
- en: vba
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
  zh: vba
- en: Dim apiKey As String
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: Dim apiKey As String
- en: apiKey = Environ("OPENAI_API_KEY")
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
  zh: apiKey = Environ("OPENAI_API_KEY")
- en: 'Use the apiKey variable in your HTTP request setup to authenticate your API
    calls:'
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
  zh: 在您的HTTP请求设置中使用apiKey变量来验证您的API调用：
- en: vba
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: vba
- en: http.setRequestHeader "Authorization", "Bearer " & apiKey
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
  zh: http.setRequestHeader "Authorization", "Bearer " & apiKey
- en: Data Privacy
  id: totrans-208
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 数据隐私
- en: If your assistant handles sensitive user data, you must ensure it is managed
    securely and in compliance with data protection regulations.
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您的助手处理敏感用户数据，您必须确保其安全管理和符合数据保护法规。
- en: • **Minimizing Data Collection:**– Only collect the data necessary for your
    assistant to function. Avoid storing unnecessary personal information.• **Ensuring
    Data Encryption:**– If you must store sensitive data, ensure it is encrypted both
    in transit (using HTTPS) and at rest (using encryption libraries).
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: • **最小化数据收集：**– 仅收集您的助手功能所必需的数据。避免存储不必要的个人信息。• **确保数据加密：**– 如果您必须存储敏感数据，确保它在传输过程中（使用HTTPS）和在静止状态下（使用加密库）都得到加密。
- en: VBA Security Settings
  id: totrans-211
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: VBA安全设置
- en: VBA macros can pose security risks, especially when distributed to others. Understand
    and configure security settings to mitigate these risks.
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
  zh: VBA宏可能存在安全风险，尤其是在分发给他人的情况下。了解并配置安全设置以减轻这些风险。
- en: '• **Macro Security Settings:**– Configure macro security in Word to prevent
    unauthorized code from running. Go to: File > Options > Trust Center > Trust Center
    Settings > Macro Settings• **Digital Signatures:**– Consider signing your VBA
    project with a digital certificate to assure users that the code is from a trusted
    source.'
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
  zh: • **宏安全设置：**– 在Word中配置宏安全以防止未经授权的代码运行。转到：文件 > 选项 > 信任中心 > 信任中心设置 > 宏设置• **数字签名：**–
    考虑使用数字证书对你的VBA项目进行签名，以确保用户代码来自可信来源。
- en: 'Chapter 14: Advanced Features and Customizations'
  id: totrans-214
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第14章：高级功能和自定义
- en: For those looking to extend the functionality of their ChatGPT-powered assistant,
    this chapter explores advanced VBA techniques and potential customizations. One
    powerful way to enhance your VBA project is by using classes to manage data more
    efficiently. In this section, we'll walk through creating an advanced class to
    manage conversation data.
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
  zh: 对于那些想要扩展他们ChatGPT助手功能的人来说，本章探讨了高级VBA技术和可能的定制。增强你的VBA项目的一种强大方式是使用类来更有效地管理数据。在本节中，我们将逐步创建一个用于管理对话数据的高级类。
- en: Advanced VBA Techniques
  id: totrans-216
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 高级VBA技术
- en: VBA offers many advanced features that can enhance your project, including the
    use of classes. Classes allow you to encapsulate data and related functionalities
    in a single, reusable object, making your code more modular, maintainable, and
    scalable.
  id: totrans-217
  prefs: []
  type: TYPE_NORMAL
  zh: VBA提供了许多高级功能，可以增强你的项目，包括使用类。类允许你将数据和相关功能封装在一个单一、可重用的对象中，使你的代码更加模块化、可维护和可扩展。
- en: 'Example: Extending a Class for Managing Conversation Data'
  id: totrans-218
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 示例：扩展类以管理对话数据
- en: Let’s extend a simple class to manage conversation data within your ChatGPT-powered
    assistant. This class will handle storing messages, adding new messages, and preparing
    the data for sending to the API.
  id: totrans-219
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们扩展一个简单的类来管理ChatGPT助手内的对话数据。这个类将处理存储消息、添加新消息以及准备发送到API的数据。
- en: 'Step 1: Creating the Conversation Class'
  id: totrans-220
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 第1步：创建对话类
- en: 'To create a class in VBA, start by adding a new class module:'
  id: totrans-221
  prefs: []
  type: TYPE_NORMAL
  zh: 要在VBA中创建一个类，首先添加一个新的类模块：
- en: '**Open the VBA Editor:**'
  id: totrans-222
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**打开VBA编辑器：**'
- en: In Word, go to Developer > Visual Basic or press Alt + F11.
  id: totrans-223
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在Word中，转到开发人员 > Visual Basic 或按Alt + F11。
- en: '**Add a Class Module:**'
  id: totrans-224
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**添加类模块：**'
- en: In the VBA editor, go to Insert > Class Module.
  id: totrans-225
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在VBA编辑器中，转到插入 > 类模块。
- en: Name the class Conversation.
  id: totrans-226
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将类命名为Conversation。
- en: 'Step 2: Defining Properties'
  id: totrans-227
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 第2步：定义属性
- en: In the Conversation class, define properties to hold the messages and manage
    other necessary data, such as the conversation history.
  id: totrans-228
  prefs: []
  type: TYPE_NORMAL
  zh: 在对话类中，定义属性以保存消息并管理其他必要的数据，例如对话历史。
- en: vba
  id: totrans-229
  prefs: []
  type: TYPE_NORMAL
  zh: vba
- en: ''' Conversation class'
  id: totrans-230
  prefs: []
  type: TYPE_NORMAL
  zh: ''' 对话类'
- en: Option Explicit
  id: totrans-231
  prefs: []
  type: TYPE_NORMAL
  zh: Option Explicit
- en: Private pMessages As Collection
  id: totrans-232
  prefs: []
  type: TYPE_NORMAL
  zh: Private pMessages As Collection
- en: Private pModel As String
  id: totrans-233
  prefs: []
  type: TYPE_NORMAL
  zh: Private pModel As String
- en: ''' Initialize the class'
  id: totrans-234
  prefs: []
  type: TYPE_NORMAL
  zh: ''' 初始化类'
- en: Private Sub Class_Initialize()
  id: totrans-235
  prefs: []
  type: TYPE_NORMAL
  zh: Private Sub Class_Initialize()
- en: Set pMessages = New Collection
  id: totrans-236
  prefs: []
  type: TYPE_NORMAL
  zh: Set pMessages = New Collection
- en: pModel = "gpt-4o" ' Default model
  id: totrans-237
  prefs: []
  type: TYPE_NORMAL
  zh: pModel = "gpt-4o" ' 默认模型
- en: End Sub
  id: totrans-238
  prefs: []
  type: TYPE_NORMAL
  zh: End Sub
- en: ''' Property to get or set the model'
  id: totrans-239
  prefs: []
  type: TYPE_NORMAL
  zh: ''' 获取或设置模型的属性'
- en: Public Property Get Model() As String
  id: totrans-240
  prefs: []
  type: TYPE_NORMAL
  zh: Public Property Get Model() As String
- en: Model = pModel
  id: totrans-241
  prefs: []
  type: TYPE_NORMAL
  zh: Model = pModel
- en: End Property
  id: totrans-242
  prefs: []
  type: TYPE_NORMAL
  zh: End Property
- en: Public Property Let Model(ByVal value As String)
  id: totrans-243
  prefs: []
  type: TYPE_NORMAL
  zh: Public Property Let Model(ByVal value As String)
- en: pModel = value
  id: totrans-244
  prefs: []
  type: TYPE_NORMAL
  zh: pModel = value
- en: End Property
  id: totrans-245
  prefs: []
  type: TYPE_NORMAL
  zh: End Property
- en: ''' Method to add a message to the conversation'
  id: totrans-246
  prefs: []
  type: TYPE_NORMAL
  zh: ''' 添加消息到对话的方法'
- en: Public Sub AddMessage(ByVal role As String, ByVal content As String)
  id: totrans-247
  prefs: []
  type: TYPE_NORMAL
  zh: Public Sub AddMessage(ByVal role As String, ByVal content As String)
- en: Dim msg As Object
  id: totrans-248
  prefs: []
  type: TYPE_NORMAL
  zh: Dim msg As Object
- en: Set msg = CreateObject("Scripting.Dictionary")
  id: totrans-249
  prefs: []
  type: TYPE_NORMAL
  zh: Set msg = CreateObject("Scripting.Dictionary")
- en: msg("role") = role
  id: totrans-250
  prefs: []
  type: TYPE_NORMAL
  zh: msg("role") = role
- en: msg("content") = content
  id: totrans-251
  prefs: []
  type: TYPE_NORMAL
  zh: msg("content") = content
- en: pMessages.Add msg
  id: totrans-252
  prefs: []
