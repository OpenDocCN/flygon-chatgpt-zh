- en: Our Offensive Conversation with the Intelligent Moderator Discord Bot
  id: totrans-1141
  prefs: []
  type: TYPE_NORMAL
  zh: 我们与智能内容审核员Discord机器人的攻击性对话
- en: In both cases when unwanted content was posted in any channel of the Discord
    server, not only was the offending user called out, but the bad message was deleted.
    Good bot!
  id: totrans-1142
  prefs: []
  type: TYPE_NORMAL
  zh: 在这两种情况下，当任何Discord服务器的通道中发布不适当的内容时，不仅会指出违规用户，还会删除不良信息。好机器人！
- en: Did you notice that the Moderation and Chat Endpoints are able to read emojis
    as well?
  id: totrans-1143
  prefs: []
  type: TYPE_NORMAL
  zh: 你注意到审核和聊天端点也能读取表情符号了吗？
- en: Conclusion
  id: totrans-1144
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: In this chapter, we created a fully functioning content moderator for our entire
    Discord server! We leveraged both the Moderations and Chat Endpoints from OpenAI
    to create a custom content moderator that not only flags unsafe content like hateful
    and threatening messages, but also prevents the users of the Discord server from
    being subject to unwanted solicitations.
  id: totrans-1145
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们为整个Discord服务器创建了一个完全功能化的内容审核员！我们利用了OpenAI的审核和聊天端点来创建一个自定义的内容审核员，它不仅能够标记不安全的内容，如仇恨和威胁性信息，还能防止Discord服务器的用户受到不想要的请求。
- en: Exercises Left for the Reader
  id: totrans-1146
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 读者剩余的练习
- en: 'Although we accomplished a lot in this chapter (as well as in this book!),
    there’s still one more thing that we can do to improve the code. For example:'
  id: totrans-1147
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管我们在本章（以及本书中）取得了很大的成就，但我们还可以做一件事来改进代码。例如：
- en: The individual Discord bots that we created are aware to not respond to messages
    that they send themselves. However, the bots are not yet aware that they shouldn’t
    respond to messages sent by **OTHER BOTS**. In other words, if you run both bots
    at the same time, and someone posts something bad in the “q-and-a” channel, the
    Content Moderator will, of course, delete the message and inform everyone that
    the message was deleted. However, since the Tech Support Bot doesn’t know that
    it shouldn’t respond to other bots, it will try to create a response. Of course,
    bots should not talk to other bots.
  id: totrans-1148
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们创建的独立 Discord 机器人知道不要回复它们自己发送的消息。然而，这些机器人还没有意识到它们不应该回复其他机器人发送的消息。换句话说，如果你同时运行两个机器人，有人在“问答”频道发布不良内容，内容审核员当然会删除这条消息并通知所有人该消息已被删除。然而，由于技术支持机器人不知道它不应该回复其他机器人，它会尝试创建一个回复。当然，机器人之间不应该互相交流。
