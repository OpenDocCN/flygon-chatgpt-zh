    mydict that is initialized as a dictionary that includes the two strings pasta
    and pizza. The next code snippet contains a look that displays the key/value pairs
    of mydict, followed by the length of the mydict dictionary. The next close snippet
    closes the dictionary and then launches a MongoDB client at the default port.
    Now launch the code in [Listing 4.33](#list4-33) and you will see the following
    output:'
  id: totrans-1792
  prefs: []
