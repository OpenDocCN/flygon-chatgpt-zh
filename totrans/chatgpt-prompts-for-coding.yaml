  id: totrans-1472
  prefs: []
  type: TYPE_NORMAL
  zh: '"编写一份关于如何开始自由职业的指南，包括识别你的技能、在Upwork或Fiverr等平台上建立专业档案，以及如何提出第一个项目。讨论如何建立信誉并吸引客户。"'
