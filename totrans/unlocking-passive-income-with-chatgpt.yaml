  zh: 利用人工智能在商业世界中蓬勃发展：企业家必备指南
- en: Seize the Opportunity! If you aspire to successfully build, grow or expand your
    business using artificial intelligence, then this free "AI For Entrepreneurs"
    book is an invaluable resource for you. It will not only help you avoid common
    technological pitfalls but also streamline your business growth journey. Get your
    complimentary copy today!
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 抓住机遇！如果您渴望成功利用人工智能构建、增长或扩展您的业务，那么这本免费的“人工智能企业家指南”书对您来说是无价之宝。它不仅能帮助您避免常见的科技陷阱，还能简化您的业务增长之旅。今天就来领取您的免费副本吧！
- en: '| ![image](d2d_images/chapter_title_corner_decoration_left.png) |  | ![image](d2d_images/chapter_title_corner_decoration_right.png)
    |'
  id: totrans-88
  prefs: []
  type: TYPE_TB
  zh: '| ![图片](d2d_images/chapter_title_corner_decoration_left.png) |  | ![图片](d2d_images/chapter_title_corner_decoration_right.png)
    |'
- en: '![image](d2d_images/chapter_title_above.png)'
  id: totrans-89
  prefs: []
  type: TYPE_IMG
  zh: '![图片](d2d_images/chapter_title_above.png)'
- en: Introduction
  id: totrans-90
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 简介
- en: '![image](d2d_images/chapter_title_below.png)'
  id: totrans-91
  prefs: []
  type: TYPE_IMG
  zh: '![图片](d2d_images/chapter_title_below.png)'
- en: The year is 2025\. You wake up and are greeted by an AI assistant customized
    just for you. It knows your schedule, habits, and preferences better than you
    do. Your self-driving car seamlessly navigates morning traffic while you finish
    up work emails. At the office, AI algorithms monitor supply chains, manage finances,
    and point out inefficiencies no human could ever detect. Robots gracefully handle
    hazardous tasks on the factory floor as a neural network generates an ad campaign
    with creativity that rivals Mozart. Later, an AI doctor reviews medical scans
    with superhuman precision, saving lives in the process. Dinner is prepared by
    a robot chef and served up hot when you walk in the door. Before bed, you don
    your VR headset and enter a vivid, AI-generated world.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 到了2025年，您醒来时，一个为您定制的AI助手向您问好。它比您更了解您的日程、习惯和偏好。您的自动驾驶汽车无缝地导航早晨的交通，同时您完成工作电子邮件。在办公室，AI算法监控供应链、管理财务，并指出人类无法检测到的低效之处。机器人在工厂地板上优雅地处理危险任务，同时一个神经网络创造性地生成一个与莫扎特相媲美的广告活动。稍后，一个AI医生以超人的精确度审查医学扫描，在这个过程中挽救生命。晚餐由机器人厨师准备，您进门时热腾腾地上桌。睡前，您戴上VR头盔，进入一个生动的人工智能生成世界。
- en: This is our future. Artificial intelligence is reinventing society right under
    our noses. Its rise is inevitable, its potential boundless. AI already encapsulates
    everything from smart assistants to self-driving cars to medical marvels. This
    book will chronicle the dawn of the AI revolution.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 这是我们未来的样子。人工智能正在我们鼻子底下重塑社会。其崛起是不可避免的，其潜力是无限的。人工智能已经涵盖了从智能助手到自动驾驶汽车到医疗奇迹的一切。这本书将记录人工智能革命的曙光。
- en: In the vast landscape of technological advancements, one phenomenon has emerged
    as a harbinger of transformative change. It is reshaping industries, society,
    and our understanding of what it means to be human. Artificial Intelligence (AI)
    has unprecedented capabilities to learn, reason, and adapt and has become the
    driving force behind a new era of innovation and human progress.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 在技术进步的广阔领域中，一种现象已经出现，成为变革性变化的预兆。它正在重塑行业、社会，以及我们对人类本质的理解。人工智能（AI）具有前所未有的学习能力、推理能力和适应性，已成为推动一个新时代创新和人类进步的驱动力。
- en: This book, “Unlocking Passive Income with ChatGPT,” will take you on a journey
    to explore the profound impact of AI on the world, both present and future. It
    will delve into the remarkable achievements, limitless potential, and challenges
    ahead as humanity navigates this new world shaped by intelligent machines.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 这本书，“用ChatGPT解锁被动收入”，将带您踏上探索人工智能对世界产生深远影响的旅程，无论是现在还是未来。它将深入探讨人类在由智能机器塑造的新世界中导航时，所取得的非凡成就、无限潜力和未来的挑战。
- en: The transformational power of AI transcends boundaries, revolutionizing sectors
    as diverse as healthcare, finance, transportation, manufacturing, and entertainment.
    It empowers people to unlock the secrets of big data, unravel complex patterns,
    and make informed decisions that were once unimaginable. From personalized medicine
    to self-driving cars, AI is not just a buzzword but a catalyst for disruptive
    change, birthing a new era of efficiency, productivity, and profitability.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能的变革性力量超越了界限，正在改变从医疗保健、金融、交通、制造到娱乐等多样化的行业。它赋予人们解锁大数据秘密、解开复杂模式并做出曾经难以想象的明智决策的能力。从个性化医疗到自动驾驶汽车，人工智能不仅仅是一个流行语，它还是颠覆性变革的催化剂，孕育了一个新的效率、生产力和盈利时代。
- en: As an AI researcher who led teams at major tech firms for over a decade, I have
    witnessed firsthand the meteoric rise of artificial intelligence. When I started
    out, AI was seen as a niche field of research. But in recent years, transformative
    technologies like deep learning have unlocked its vast potential. Now, AI is pervading
    every industry and reshaping our lives in profound ways.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 作为一位在主要科技公司领导团队超过十年的AI研究人员，我亲眼目睹了人工智能的飞速发展。当我刚开始时，人工智能被视为一个研究领域的细分市场。但近年来，像深度学习这样的变革性技术已经释放了其巨大的潜力。现在，人工智能正渗透到每个行业，并以深刻的方式重塑我们的生活。
- en: The latest AI capability that has captured the world’s attention is ChatGPT,
    launched by research company OpenAI in November 2022\. ChatGPT is a large language
    model trained on a massive dataset that can generate remarkably human-like text.
    Many believe ChatGPT represents an inflection point for AI, bringing this once
    distant technology into the mainstream.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 最新引起全世界关注的AI能力是ChatGPT，由研究公司OpenAI于2022年11月推出。ChatGPT是一个在大量数据集上训练的大型语言模型，可以生成非常类似人类的文本。许多人认为ChatGPT代表了人工智能的一个转折点，将这项曾经遥不可及的技术带入了主流。
- en: This book will be your clarity amidst the AI chaos. With simple explanations
    and real-world context, I’ll demystify AI so you can cut through the hype. You’ll
    discover the basic principles powering today’s AI innovations so you can evaluate
    their actual potential. Using relatable examples, I’ll reveal AI’s practical applications
    in business, healthcare, and beyond. You’ll learn where AI excels, where it falls
    short, and the advancements that point to an intriguing future. Consider this
    your handy roadmap to navigating the AI revolution as an informed citizen, consumer
    and professional.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 这本书将成为你在人工智能混乱中的清晰指引。通过简洁的解释和现实世界的背景，我将揭开人工智能的神秘面纱，让你能够穿透炒作。你将发现推动当今人工智能创新的根本原则，以便你可以评估它们的实际潜力。通过相关的例子，我将揭示人工智能在商业、医疗保健等领域的实际应用。你将了解人工智能的优势、不足，以及指向一个引人入胜未来的进步。这将是你在作为知情公民、消费者和专业人士导航人工智能革命时的实用路线图。
- en: My decade developing AI technologies at leading companies provides insider insights
    beyond dusty textbooks.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 我在领先公司开发人工智能技术的十年经验，提供了超越尘封教科书的内部见解。
- en: To chart a prosperous future, one must also confront the ethical and societal
    challenges head-on. You will explore the pressing issues of AI ethics, including
    fairness, transparency, and accountability, while addressing the importance of
    diversity and inclusivity in AI development. By striking a balance between innovation
    and responsibility, humanity can ensure that AI works in harmony with it, augmenting
    its capabilities rather than replacing them.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 为了绘制一个繁荣的未来，一个人也必须直面伦理和社会挑战。你将探讨人工智能伦理的紧迫问题，包括公平性、透明度和问责制，同时解决在人工智能发展中多样性和包容性的重要性。通过在创新和责任之间取得平衡，人类可以确保人工智能与人类和谐共存，增强其能力而不是取代它们。
- en: Explore the transformative power of AI and shape a future where the limitless
    potential of intelligent machines harmonizes with the boundless possibilities
    of the human spirit!
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 探索人工智能的变革力量，塑造一个未来，在那里智能机器的无限潜力与人类精神的无限可能性和谐共存！
- en: '| ![image](d2d_images/chapter_title_corner_decoration_left.png) |  | ![image](d2d_images/chapter_title_corner_decoration_right.png)
    |'
  id: totrans-103
  prefs: []
  type: TYPE_TB
  zh: '| ![image](d2d_images/chapter_title_corner_decoration_left.png) |  | ![image](d2d_images/chapter_title_corner_decoration_right.png)
    |'
- en: '![image](d2d_images/chapter_title_above.png)'
  id: totrans-104
  prefs: []
  type: TYPE_IMG
  zh: '![image](d2d_images/chapter_title_above.png)'
- en: 'Chapter 1: The AI Revolution'
  id: totrans-105
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第一章：人工智能革命
- en: '![image](d2d_images/chapter_title_below.png)'
  id: totrans-106
  prefs: []
  type: TYPE_IMG
  zh: '![image](d2d_images/chapter_title_below.png)'
- en: In recent years, there has been a remarkable transformation in the world of
    technology that revolutionized industries and reshaped the way people live and
    work. At the heart of this shift lies the rapid advancement and adoption of Artificial
    Intelligence (AI). This chapter will explore AI's profound impact and immense
    potential in shaping a smarter and brighter future.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 近年来，技术在世界上发生了显著的变化，这场变革改变了产业，重塑了人们生活和工作的方式。这一转变的核心是人工智能（AI）的快速发展和采用。本章将探讨人工智能在塑造更智能、更光明的未来中的深远影响和巨大潜力。
- en: '| ![image](d2d_images/chapter_title_corner_decoration_left.png) |  | ![image](d2d_images/chapter_title_corner_decoration_right.png)
    |'
  id: totrans-108
  prefs: []
  type: TYPE_TB
  zh: '| ![image](d2d_images/chapter_title_corner_decoration_left.png) |  | ![image](d2d_images/chapter_title_corner_decoration_right.png)
    |'
- en: '![image](d2d_images/chapter_title_above.png)'
  id: totrans-109
  prefs: []
  type: TYPE_IMG
  zh: '![image](d2d_images/chapter_title_above.png)'
- en: The Paradigm Shift in Technology
  id: totrans-110
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 技术范式转变
- en: '![image](d2d_images/chapter_title_below.png)'
  id: totrans-111
  prefs: []
  type: TYPE_IMG
  zh: '![image](d2d_images/chapter_title_below.png)'
- en: In the past, religious doctrine heavily influenced society; knowledge was hard-won,
    and access to it was closely guarded. But with the dawning of the Renaissance
    and Enlightenment era came intellectual liberation – scholars challenged traditional
    beliefs through rigorous examination, sparking a monumental change in mindset.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 在过去，宗教教条对社会有重大影响；知识来之不易，获取它受到严格保护。但随着文艺复兴和启蒙时代的到来，出现了智力解放——学者们通过严格的审查挑战传统信仰，引发了一场巨大的心态变革。
- en: Then came industrialization, during which science took precedence as efficiency
    became paramount for economic growth. Mass production boomed alongside breakthroughs
    from horse/buggy to airplanes, trains, and cars!
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 然后是工业化，在这一过程中，科学占据了优先地位，因为效率对于经济增长至关重要。大规模生产与从马车到飞机、火车和汽车的突破性进展一起蓬勃发展！
- en: Information Technology is another major revolutionary change. It is considered
    one of mankind’s greatest achievements, which completely changed how data is transmitted
    across generations via digital media platforms.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 信息技术是另一场重大的革命性变革。它被认为是人类最伟大的成就之一，它完全改变了通过数字媒体平台跨代传递数据的方式。
- en: The rapid development of technology has completely transformed access to information,
    trading, and communication. People have gone from simply consuming facts to now
    being able to digest knowledge in a matter of seconds.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 技术的快速发展已经彻底改变了信息的获取、交易和通信方式。人们已经从简单地消费事实转变为现在能够在几秒钟内消化知识。
- en: AI is definitely one of mankind’s biggest achievements over recent years. With
    its help, people are no longer limited to just human intelligence. Machine learning,
    how AI systems understand human language, and data analytics have enabled AI systems
    to take on complex tasks that were once impossible.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能无疑是近年来人类最大的成就之一。有了它的帮助，人们不再局限于仅仅依靠人类智慧。机器学习，即人工智能系统理解人类语言的方式，以及数据分析使人工智能系统能够承担曾经不可能的复杂任务。
- en: ChatGPT is at the forefront of the AI scene. This groundbreaking model will
    revolutionize customer service industries by allowing them to make smart decisions
    from automated conversations. ChatGPT is a conversational AI system trained on
    vast datasets and human conversations. It can generate everything from essays,
    emails, social media posts to research papers, business plans, and much more in
    seconds based on a prompt. This cuts hours or even days out of writing and creating
    original content.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT处于AI领域的最前沿。这个开创性的模型将通过允许它们从自动化对话中做出明智决策，从而彻底改变客户服务行业。ChatGPT是一个基于大量数据集和人类对话进行训练的对话式AI系统。它可以在几秒钟内根据提示生成从论文、电子邮件、社交媒体帖子到研究报告、商业计划等一切内容。这可以节省数小时甚至数天的写作和创作原创内容的时间。
- en: Also, content creation can be done faster than ever before! In my opinion, this
    paradigm shift brought forth by ChatGPT is unprecedented in modern times. Every
    industry will feel its ripple effect, eventually making life easier for everyone
    in ways you could’ve never imagined possible beforehand – talk about an upgrade!
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，内容创作可以比以往任何时候都更快地完成！在我看来，ChatGPT带来的这种范式转变在现代社会是前所未有的。每个行业都将感受到其涟漪效应，最终以你之前从未想象到的方式让每个人的生活变得更轻松——这真是一次升级！
- en: '| ![image](d2d_images/chapter_title_corner_decoration_left.png) |  | ![image](d2d_images/chapter_title_corner_decoration_right.png)
    |'
  id: totrans-119
  prefs: []
  type: TYPE_TB
  zh: '| ![image](d2d_images/chapter_title_corner_decoration_left.png) |  | ![image](d2d_images/chapter_title_corner_decoration_right.png)
    |'
- en: '![image](d2d_images/chapter_title_above.png)'
  id: totrans-120
  prefs: []
  type: TYPE_IMG
  zh: '![image](d2d_images/chapter_title_above.png)'
- en: What Is Artificial Intelligence?
  id: totrans-121
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 什么是人工智能？
- en: '![image](d2d_images/chapter_title_below.png)'
  id: totrans-122
  prefs: []
  type: TYPE_IMG
  zh: '![image](d2d_images/chapter_title_below.png)'
- en: When you hear about Artificial Intelligence, you might think of self-driving
    cars, ChatGPT bots, other AI models, and realistically rendered images. But it’s
    also important to look at the underpinnings behind all these outputs and understand
    how AI works as well as its implications for society.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 当你听到关于人工智能时，你可能会想到自动驾驶汽车、ChatGPT机器人、其他AI模型和逼真的图像。但了解所有这些输出的底层原理以及AI的工作原理及其对社会的影响也同样重要。
- en: Broadly speaking, AI can do tasks typically associated with human cognitive
    functions — like decoding language, playing video games, and recognizing patterns.
    Essentially, they learn by processing huge volumes of data in search of models
    that shape their decision-making process.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 广义而言，AI可以执行通常与人类认知功能相关的任务——如解码语言、玩电子游戏和识别模式。本质上，它们通过处理大量数据来寻找塑造其决策过程的模型。
- en: In many scenarios, people need to oversee an AI’s training - rewarding favorable
    decisions while limiting bad ones - but some are designed to learn unsupervised;
    say, by playing a game over and over again until they get the hang of it!
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 在许多情况下，人们需要监督AI的训练——奖励有利决策同时限制不良决策——但有些AI是设计为无监督学习的；比如说，通过反复玩游戏直到掌握技巧！
- en: 'The science behind programming Artificial Intelligence involves honing its
    cognitive skills, such as:'
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 编程人工智能背后的科学涉及磨练其认知技能，例如：
- en: 'Learning: Gathering information and constructing algorithms that provide instructions
    for accomplishing certain objectives'
  id: totrans-127
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 学习：收集信息并构建算法，为完成特定目标提供指导
- en: 'Reasoning: Deciding upon the best algorithm to reach goals'
  id: totrans-128
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 推理：选择最佳算法以达到目标
- en: 'Self-correction: Continuously refining algorithms so accurate results can be
    achieved every time'
  id: totrans-129
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 自我纠正：持续优化算法，以确保每次都能获得准确的结果
- en: 'Creativity: Using neural networks (AI systems are structured in layers, like
    neurons in a brain, to filter information and make decisions) and rules-based
    systems, among others, to generate original content like music and text'
  id: totrans-130
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 创造力：利用神经网络（AI系统结构类似于大脑中的神经元，用于过滤信息和做出决策）和基于规则的系统等，生成原创内容，如音乐和文本
- en: The Four Types of AI
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 四种类型的AI
- en: 'According to Arend Hintze, an assistant professor of integrative biology and
    computer science and engineering at Michigan State University, there are four
    major types of AI. They are:'
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 根据密歇根州立大学整合生物学与计算机科学及工程助理教授Arend Hintze的说法，有四种主要类型的AI。它们是：
- en: 'Reactive Machines: These AI models are limited in their abilities as they have
    no memory and are specifically designed for certain tasks - like Deep Blue, the
    IBM chess program that defeated Garry Kasparov back in the 90s. It was only able
    to recognize pieces on a board and make predictions without any prior experience
    or access to stored data.'
  id: totrans-133
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 反应式机器：这些人工智能模型的能力有限，因为它们没有记忆，并且专门为某些任务而设计——比如90年代击败加里·卡斯帕罗夫的IBM国际象棋程序Deep Blue。它只能识别棋盘上的棋子，并做出预测，没有任何先前的经验或访问存储数据的权限。
- en: 'Limited Memory Systems: Unlike reactive models, which lack memory storage,
    this type has short-term data retention ability, allowing it to consider past
    experiences when making decisions – such as those used for self-driving cars.'
  id: totrans-134
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 与之相反，有限记忆系统不具备记忆存储能力，这种类型具有短期数据保留能力，允许它在做出决策时考虑过去的经验——例如用于自动驾驶汽车的那些。
- en: 'Theory of Mind AI Systems: This category focuses more on social intelligence
    by looking at emotion recognition through inference of human intentions – something
    necessary if robots are going to become part of daily life one day soon.'
  id: totrans-135
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 心智理论人工智能系统：这一类别更多地关注社交智能，通过推断人类意图来观察情绪识别——如果机器人有一天要成为日常生活的一部分，这是必要的。
- en: 'Self-Awareness Models: The ultimate goal here is achieving true machine consciousness,
    whereby artificial systems can identify their own current states, giving them
    a level of autonomy over their decision-making processes not seen before. This
    level hasn’t been achieved yet!'
  id: totrans-136
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 自我意识模型：这里的最终目标是实现真正的机器意识，即人工系统可以识别它们自己的当前状态，从而在决策过程中获得前所未有的自主权。这一水平尚未实现！
- en: AI Success Stories
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能成功案例
- en: AI has been the driving force behind some amazing successes. According to Harvard
    Business Review, Associated Press trained its AI to effortlessly write short financial
    news stories, which enabled them to produce 12 times more content. As a result,
    they freed up their journalists to focus on more in-depth pieces.
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能一直是推动一些惊人成功的主要动力。根据《哈佛商业评论》，美联社训练其人工智能轻松撰写简短的财经新闻故事，这使得他们能够生产出12倍的内容。因此，他们释放了记者，让他们专注于更深入的作品。
- en: Deep Patient, a powerful tool developed by Icahn School of Medicine at Mount
    Sinai, can help doctors identify high-risk patients before they can even be diagnosed
    with an illness. This incredible technology can predict nearly 80 diseases approximately
    one year before their onset based on a patient’s medical history.
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 深度患者（Deep Patient），由西奈山伊坎医学院开发的一种强大工具，可以帮助医生在患者被诊断出疾病之前就识别出高风险患者。这项令人难以置信的技术可以根据患者的病历预测几乎80种疾病，大约在疾病发作前一年。
- en: '| ![image](d2d_images/chapter_title_corner_decoration_left.png) |  | ![image](d2d_images/chapter_title_corner_decoration_right.png)
    |'
  id: totrans-140
  prefs: []
  type: TYPE_TB
  zh: '| ![image](d2d_images/chapter_title_corner_decoration_left.png) |  | ![image](d2d_images/chapter_title_corner_decoration_right.png)
    |'
- en: '![image](d2d_images/chapter_title_above.png)'
  id: totrans-141
  prefs: []
  type: TYPE_IMG
  zh: '![image](d2d_images/chapter_title_above.png)'
- en: How AI Is Transforming Industries and Revolutionizing Business Models
  id: totrans-142
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 人工智能如何改变行业和颠覆商业模式
- en: '![image](d2d_images/chapter_title_below.png)'
  id: totrans-143
  prefs: []
  type: TYPE_IMG
  zh: '![image](d2d_images/chapter_title_below.png)'
- en: The business landscape is transforming dramatically. AI, machine learning, and
    natural language processing are now hot topics in the workplace. Businesses have
    their doubts about these technologies and how they could shape the future of work;
    this next section will give you a look into some ways that AI is changing various
    industries.
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 商业格局正在发生巨大变化。人工智能、机器学习和自然语言处理现在是工作场所的热门话题。企业对这些技术及其如何塑造工作未来持怀疑态度；下一节将向您展示一些人工智能如何改变各个行业的方式。
- en: Agriculture
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 农业
- en: Farmers today face many challenges, from water shortages to labor crunches.
    ChatGPT presents an opportunity to transform farming through customized AI solutions.
    With the right data and prompts, ChatGPT can generate insights to boost efficiency
    and crop yields.
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 今天的农民面临着许多挑战，从缺水到劳动力短缺。ChatGPT通过定制的人工智能解决方案为农业转型提供了一个机会。有了合适的数据和提示，ChatGPT可以生成见解，提高效率和作物产量。
- en: Precision agriculture uses technology to target inputs and practices. Rather
    than applying water, fertilizer, and pesticides uniformly across fields, precision
    agriculture uses AI and data to determine optimal distribution.
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 精准农业利用技术来针对投入和做法。而不是在田野上均匀地应用水、肥料和杀虫剂，精准农业使用人工智能和数据来确定最佳分配。
- en: ChatGPT can analyze crop needs down to the square meter. With prompts on field
    conditions, weather, and plant health data, ChatGPT can provide custom recommendations
    to use resources sustainably.
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT可以分析农作物需求直至每平方米。通过提供关于田间条件、天气和植物健康数据的提示，ChatGPT可以提供可持续使用资源的定制建议。
- en: For example, FarmWise leverages ChatGPT in its autonomous farming robots. By
    pulling data on plant health and soil moisture, FarmWise robots can weed and seed
    with precision.
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，FarmWise利用ChatGPT在其自主农业机器人中。通过获取植物健康和土壤湿度数据，FarmWise机器人可以精确地进行除草和播种。
- en: ChatGPT can also serve as an AI agronomist. With prompts on crop varieties,
    climate patterns, and growth cycles, ChatGPT can generate best practices for planting,
    irrigation, pest management, and harvesting.
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT还可以作为人工智能农业专家。通过提供关于作物品种、气候模式和生长周期的提示，ChatGPT可以生成种植、灌溉、病虫害管理和收获的最佳实践。
- en: Blue River Technology uses ChatGPT-powered visual AI on its agricultural machines.
    By identifying plants and weeds, Blue River can target herbicide spraying precisely.
    This reduces chemical use over 70%.
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: Blue River Technology在其农业机械上使用ChatGPT驱动的视觉AI。通过识别植物和杂草，Blue River可以实现精确的除草剂喷洒。这减少了超过70%的化学物质使用。
- en: ChatGPT is just beginning to unlock AI's potential in farming. As more ag data
    is collected, ChatGPT's recommendations will become more accurate and customized.
    Farmers should be proactive in leveraging ChatGPT now to solve problems and maximize
    yields sustainably.
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT刚开始挖掘农业中AI的潜力。随着更多农业数据的收集，ChatGPT的建议将变得更加准确和定制。农民现在应该积极利用ChatGPT来解决问题并可持续地最大化产量。
- en: Construction
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 建筑
- en: Artificial Intelligence (AI) is revolutionizing various industries, and the
    construction sector is no exception. Leveraging AI solutions, like ChatGPT, can
    significantly reduce the time spent on planning steps by providing accurate estimates
    of project costs and durations.
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能（AI）正在改变各个行业，建筑行业也不例外。利用像ChatGPT这样的AI解决方案，可以显著减少在规划步骤上花费的时间，通过提供项目成本和持续时间的准确估计。
- en: ChatGPT's advanced machine learning algorithms can analyze historical project
    data to predict budgets and time frames before the commencement of work. This
    predictive capability can be a game-changer in the construction sector, where
    cost overruns and project delays are common.
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT的高级机器学习算法可以分析历史项目数据，在工程开始前预测预算和时间框架。这种预测能力在建筑行业中可以带来变革，因为成本超支和项目延误在这里很常见。
- en: 'To understand the practical implications of AI in construction, consider firms
    such as Caidio, Kwant.ai, and AirWorks. These companies are pioneering the use
    of AI in the construction sector:'
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 要了解AI在建筑中的实际应用，可以考虑Caidio、Kwant.ai和AirWorks等公司。这些公司在建筑行业中开创了AI的应用：
- en: 'Caidio: This company uses AI to automate concrete data analysis, enhancing
    the quality of construction and reducing unnecessary costs.'
  id: totrans-157
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: Caidio：这家公司使用AI来自动化混凝土数据分析，提高建筑质量并减少不必要的成本。
- en: 'Kwant.ai: Kwant.ai leverages AI and predictive analytics to improve site safety
    and increase productivity in construction projects.'
  id: totrans-158
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: Kwant.ai：Kwant.ai利用AI和预测分析来提高建筑项目的现场安全和生产力。
- en: 'AirWorks: AirWorks uses AI-powered automation to convert aerial data into CAD
    (Computer-Aided Design) drafts, significantly reducing the time and effort spent
    on manual drafting.'
  id: totrans-159
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: AirWorks：AirWorks使用AI驱动的自动化将航空数据转换为CAD（计算机辅助设计）草图，显著减少了手动制图的时间和精力。
- en: ChatGPT could be utilized in the construction industry for a variety of tasks.
    For instance, it can be used to draft and revise project reports, analyze project
    data, or even interact with project management software to provide real-time updates.
    It can also be trained to understand the specific language and terms used in the
    construction industry, making it a powerful tool for automating various tasks.
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT可以在建筑行业中用于各种任务。例如，它可以用来起草和修改项目报告，分析项目数据，甚至与项目管理软件交互以提供实时更新。它还可以被训练以理解建筑行业使用的特定语言和术语，使其成为自动化各种任务的有力工具。
- en: Education
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 教育
- en: For teachers, AI can automate time-consuming tasks like grading assignments
    and tests. This frees up teachers' time, allowing them to focus more on directly
    engaging with students and improving lesson plans. ChatGPT and similar tools can
    also provide insight into common student misconceptions and struggles, helping
    teachers tailor their lessons accordingly.
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 对于教师来说，AI可以自动化耗时的工作，如批改作业和考试。这为教师节省了时间，使他们能够更多地直接与学生互动，并改进教学计划。ChatGPT和类似工具还可以提供关于学生常见误解和挑战的见解，帮助教师相应地调整他们的课程。
- en: For students, AI tutors can provide on-demand assistance, clarifying complex
    concepts, answering questions, and giving real-time feedback. Student learning
    and outcomes have been shown to improve with AI teaching aids that can adapt to
    individual needs and pace of learning. Carnegie Learning, Cognii, and Century
    Tech are all reaping the rewards of using Artificial Intelligence in education.
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 对于学生来说，AI导师可以提供按需协助，阐明复杂概念，回答问题，并提供实时反馈。研究表明，使用能够适应个人需求和学习节奏的AI教学辅助工具，学生的学习和成果会得到改善。Carnegie
    Learning、Cognii和Century Tech都正在享受使用人工智能在教育中带来的好处。
- en: Finance
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 金融
- en: ChatGPT and other AI systems are playing an increasingly important role within
    the finance industry, helping with tasks like credit risk assessment, fraud detection,
    and portfolio management. When a bank evaluates a loan application, ChatGPT could
    analyze the numerous variables and recommend whether to approve or deny the loan
    based on risk factors.
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT和其他AI系统在金融行业中扮演着越来越重要的角色，帮助完成诸如信用风险评估、欺诈检测和投资组合管理等工作。当银行评估贷款申请时，ChatGPT可以分析众多变量，并根据风险因素建议是否批准或拒绝贷款。
- en: For portfolio management, ChatGPT could offer insights and strategy suggestions
    to maximize returns while minimizing risks. It could identify investments with
    low correlations to provide diversification and generate possible scenarios for
    how the market might evolve based on historical data and current trends.
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 对于投资组合管理，ChatGPT可以提供见解和策略建议，以最大化回报同时最小化风险。它可以识别出与低相关性的投资，以提供多元化，并基于历史数据和当前趋势生成市场可能演变的可能情景。
- en: While AI cannot fully replace human judgment in finance, ChatGPT and similar
    conversational AI assistants are becoming valuable tools to augment the work of
    financial professionals. They can analyze huge amounts of data, detect patterns,
    and generate insights at a scale and speed that humans cannot match.
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管AI不能完全取代金融领域的人类判断，但ChatGPT和类似的对话式AI助手正成为增强金融专业人士工作的宝贵工具。它们可以分析大量数据，发现模式，并以人类无法比拟的规模和速度生成见解。
- en: 'However, companies still need experts in finance and risk management to establish
    guidelines, evaluate the recommendations from AI systems, and make the final decisions.
    AI technology in finance aims to aid, rather than replace, the experts within
    this complex and critical industry. Companies utilizing AI across the finance
    industry include:'
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，公司仍然需要金融和风险管理专家来制定指导方针，评估AI系统的建议，并做出最终决策。金融领域的AI技术旨在辅助，而不是取代这个复杂且关键行业中的专家。在金融行业中使用AI的公司包括：
- en: Socure
  id: totrans-169
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Socure
- en: Scienaptic AI
  id: totrans-170
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Scienaptic AI
- en: AlphaSense
  id: totrans-171
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: AlphaSense
- en: Logistics
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 物流
- en: 'When it comes to logistics, artificial intelligence like ChatGPT can provide
    valuable insights and suggestions to optimize operations. ChatGPT can assist with:'
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 在物流方面，像ChatGPT这样的AI可以提供有价值的见解和建议，以优化运营。ChatGPT可以帮助：
- en: 'Supplier selection: ChatGPT can analyze your company''s supply chain and product
    needs to recommend suppliers that best match those requirements. It considers
    factors like cost, lead times, reliability, and quality to produce a ranked list
    of potential suppliers.'
  id: totrans-174
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 供应商选择：ChatGPT可以分析贵公司的供应链和产品需求，推荐最符合这些要求的供应商。它考虑了成本、交货时间、可靠性和质量等因素，以生成潜在供应商的排名列表。
- en: 'Vehicle routing: ChatGPT can generate optimized routes for delivery drivers
    based on package locations, destinations, and other constraints. It finds the
    most efficient routes that minimize travel time, distance, and fuel costs.'
  id: totrans-175
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 车辆路线规划：ChatGPT可以根据包裹位置、目的地和其他限制条件为送货司机生成优化的路线。它找到最有效的路线，以最小化旅行时间、距离和燃料成本。
- en: 'Package optimization: ChatGPT can recommend optimal packing and sorting strategies
    based on package dimensions, weights, fragility, and other attributes. It determines
    the best box sizes, cushioning materials, and sorting orders to minimize wasted
    space and breakage.'
  id: totrans-176
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 包装优化：ChatGPT可以根据包装尺寸、重量、易碎性和其他属性推荐最佳的包装和排序策略。它确定最佳箱尺寸、缓冲材料以及排序顺序，以最小化浪费空间和破损。
- en: 'Distribution center siting: ChatGPT can model the costs and benefits of potential
    distribution center locations based on factors like proximity to suppliers, customers,
    transportation networks, and labor markets. It helps identify sites that maximize
    efficiency and minimize distribution expenses.'
  id: totrans-177
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 配置中心选址：ChatGPT可以根据供应商、客户、交通网络和劳动力市场等因素，对潜在的配置中心位置的成本和效益进行建模。它有助于确定最大化效率和最小化配送费用的地点。
- en: 'Companies using AI in logistics include:'
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: 在物流中使用AI的公司包括：
- en: Uptake
  id: totrans-179
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Uptake
- en: HAVI
  id: totrans-180
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: HAVI
- en: Symbotic
  id: totrans-181
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Symbotic
- en: Real Estate
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 房地产
- en: 'Automating routines like property evaluation reports and documents creation
    can save agents valuable time, allowing them to focus on higher-value tasks. Agents
    could leverage ChatGPT to:'
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 自动化常规任务，如房产评估报告和文件创建，可以节省代理人宝贵的时间，使他们能够专注于更高价值的工作。代理人可以利用ChatGPT来：
- en: Answer buyer and seller questions quickly, building trust and rapport. ChatGPT's
    explanations and reasoning capabilities could alleviate clients' concerns.
  id: totrans-184
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 快速回答买方和卖方的问题，建立信任和联系。ChatGPT的解释和推理能力可以缓解客户的担忧。
- en: Generate accurate and legally compliant contracts, inspection reports, and other
    paperwork in minutes instead of hours. This reduces workload and billing times
    for agents.
  id: totrans-185
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在几分钟内而不是几小时内生成准确且符合法律规定的合同、检查报告和其他文件。这减少了代理人的工作量和计费时间。
- en: Create virtual walkthroughs and 3D models of listings using text descriptions,
    photos, and floor plans. ChatGPT could even suggest improvements to optimize values.
    Clients could experience properties virtually before committing to viewings.
  id: totrans-186
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用文本描述、照片和平面图创建虚拟看房和3D模型。ChatGPT甚至可以建议改进以优化价值。客户可以在承诺实地看房之前虚拟体验房产。
- en: Advise on negotiation strategies, market trends, and comparable properties based
    on provided details. ChatGPT's knowledge graph could integrate data from multiple
    listing services.
  id: totrans-187
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 根据提供的信息就谈判策略、市场趋势和可比房产提供建议。ChatGPT的知识图谱可以整合来自多个列表服务的多源数据。
- en: 'Companies using AI in the real estate industry include:'
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: 在房地产行业使用AI的公司包括：
- en: Compass
  id: totrans-189
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Compass
- en: Zillow
  id: totrans-190
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Zillow
- en: Redfin
  id: totrans-191
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Redfin
- en: Security
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: 安全
- en: Security-wise, AI can protect confidential information and detect malicious
    threats like phishing or hacking attempts. Companies like Cynet, FireEye, and
    Blue Hexagon offer these solutions.
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: 在安全方面，AI可以保护机密信息并检测恶意威胁，如钓鱼或黑客攻击。Cynet、FireEye和Blue Hexagon等公司提供这些解决方案。
- en: '| ![image](d2d_images/chapter_title_corner_decoration_left.png) |  | ![image](d2d_images/chapter_title_corner_decoration_right.png)
    |'
  id: totrans-194
  prefs: []
  type: TYPE_TB
  zh: '| ![image](d2d_images/chapter_title_corner_decoration_left.png) |  | ![image](d2d_images/chapter_title_corner_decoration_right.png)
    |'
- en: '![image](d2d_images/chapter_title_above.png)'
  id: totrans-195
  prefs: []
  type: TYPE_IMG
  zh: '![image](d2d_images/chapter_title_above.png)'
- en: Exploring the Potential of AI
  id: totrans-196
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 探索AI的潜力
- en: '![image](d2d_images/chapter_title_below.png)'
  id: totrans-197
  prefs: []
  type: TYPE_IMG
  zh: '![image](d2d_images/chapter_title_below.png)'
- en: 'In November 2022, OpenAI – one of the world’s leading research organizations
    – made history with their revolutionary tools: ChatGPT and DALL-E 2\. Sundar Pichai,
    Google CEO, was right - Artificial Intelligence (AI) will revolutionize the future!
    These generators, leveraging existing data sets for input, have opened up a whole
    new realm of possibilities, from product design to artistry and beyond. AI has
    provided innovators with an incredible superpower that will surely change the
    game forever!'
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: 2022年11月，全球领先的科研机构之一OpenAI凭借其革命性的工具ChatGPT和DALL-E 2创造了历史。谷歌CEO桑达尔·皮查伊是对的——人工智能（AI）将改变未来！这些生成器利用现有数据集作为输入，开辟了一个全新的领域，从产品设计到艺术等领域。AI为创新者提供了不可思议的超能力，这将永远改变游戏规则！
- en: ChatGPT is based on GenAI technology which can turn user inputs into audio files,
    code snippets, or even videos with remarkable accuracy. And then there’s DALL-E
    2 - converting images into 3D objects with unprecedented precision - allowing
    people to explore further than ever before! It’s no surprise tech giants are vying
    for pole position as they race ahead in this new era; Microsoft made a huge statement
    recently, splashing 10 billion dollars on OpenAI to incorporate ChatGPT within
    their Edge browser and Bing search engine. This move is set to shake up Google’s
    longtime web monopoly.
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT基于GenAI技术，可以将用户输入转换为音频文件、代码片段，甚至以惊人的准确性转换为视频。还有DALL-E 2——以前所未有的精度将图像转换为3D对象，允许人们探索比以往任何时候都更远的地方！毫不奇怪，科技巨头在这个新时代的竞赛中都在争夺领先地位；微软最近做出了重大声明，投入了100亿美元收购OpenAI，将ChatGPT整合到他们的Edge浏览器和Bing搜索引擎中。这一举措预计将动摇谷歌长期以来的网络垄断地位。
- en: The impact AI has had since its inception is truly remarkable; from marketing
    strategies through software development all the way down to architecture - no
    sphere remains unaffected. Although some may see it as an intimidating or threatening
    force, it brings opportunity, too - enabling progress like never before and ushering
    in a new wave of creativity and possibility.
  id: totrans-200
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能自诞生以来产生的影响确实是惊人的；从营销策略到软件开发，再到建筑学——没有任何领域不受影响。尽管有些人可能将其视为一种令人生畏或威胁的力量，但它也带来了机遇——以前所未有的方式推动进步，并迎来一波新的创造力和可能性。
- en: One of the most common questions when it comes to Artificial Intelligence is
    whether it can ever supersede the capabilities of humans - this suggests that
    people are equals in the grand scheme of things. However, this is not accurate.
    Machines powered by AI have a major benefit over people; speed, accuracy, and
    reliability.
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
  zh: 当谈到人工智能时，最常见的问题之一是它是否能够超越人类的技能——这表明在更大的体系中，人类是平等的。然而，这并不准确。由人工智能驱动的机器在人类之上拥有一个主要优势；速度、准确性和可靠性。
- en: On the other hand, though, people have invaluable qualities such as emotionality
    and intuition, which allows people to comprehend cultural intricacies better than
    any machine could ever hope to. Human instinctual abilities have been crucial
    for societal growth, while those who solely depend on technology get left behind
    in comparison. To ensure future success, it’s imperative to incorporate advancements
    from tech and humanity’s organic gifts into one cohesive plan for progress.
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
  zh: 另一方面，尽管如此，人们拥有诸如情感和直觉等无价品质，这使得人们能够比任何机器都更好地理解文化的复杂性。人类的本能能力对社会发展至关重要，而那些仅仅依赖技术的人相比之下则会被落下。为了确保未来的成功，将技术和人类自身的天赋融入一个统一的进步计划中是至关重要的。
- en: '| ![image](d2d_images/chapter_title_corner_decoration_left.png) |  | ![image](d2d_images/chapter_title_corner_decoration_right.png)
    |'
  id: totrans-203
  prefs: []
  type: TYPE_TB
  zh: '| ![image](d2d_images/chapter_title_corner_decoration_left.png) |  | ![image](d2d_images/chapter_title_corner_decoration_right.png)
    |'
- en: '![image](d2d_images/chapter_title_above.png)'
  id: totrans-204
  prefs: []
  type: TYPE_IMG
  zh: '![image](d2d_images/chapter_title_above.png)'
- en: The Role of AI in Maximizing Earnings and Creating Passive Income
  id: totrans-205
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 人工智能在最大化收益和创造被动收入中的作用
- en: '![image](d2d_images/chapter_title_below.png)'
  id: totrans-206
  prefs: []
  type: TYPE_IMG
  zh: '![image](d2d_images/chapter_title_below.png)'
- en: Generating passive income has never been simpler - and with the help of AI,
    you can set up passive income streams. Investing in stocks is a classic way to
    make money without having to grind at a 9 to 5 job, but harnessing machine learning
    algorithms takes it up another notch. These tools are designed for data analysis
    and predicting which investments will yield substantial returns so you have an
    edge when making choices. Plus, utilizing AI saves time from traditional methods
    of researching stocks while keeping your portfolio diversified for maximum success.
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
  zh: 生成被动收入从未如此简单——借助人工智能，你可以建立被动收入流。投资股票是无需在朝九晚五的工作中辛苦劳作就能赚钱的经典方式，但利用机器学习算法则将这一过程提升到了一个新的层次。这些工具旨在数据分析，预测哪些投资将带来丰厚的回报，这样你在做出选择时就有优势。此外，利用人工智能可以节省传统研究股票的方法所需的时间，同时保持你的投资组合多元化，以实现最大的成功。
- en: Chatbots also provide immense opportunities for earning passive income. Businesses
    can set up automated customer service systems that save time by not requiring
    someone to actively engage with customers. Plus, if coding or software development
    is your jam, why not sell chatbot products or services?
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
  zh: 聊天机器人也提供了巨大的被动收入机会。企业可以建立自动化的客户服务系统，通过不需要有人积极与客户互动来节省时间。此外，如果你热衷于编程或软件开发，为什么不卖聊天机器人产品或服务呢？
- en: Also, don’t forget about advertising platforms powered by AI – they’re great
    for optimizing campaigns and ensuring that ads efficiently reach those who need
    them.
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，别忘了由人工智能驱动的广告平台——它们非常适合优化活动并确保广告有效地触及需要它们的人。
- en: Finally, affiliate marketing presents another excellent chance to use AI technology
    to maximize earnings from each campaign. By leveraging advanced tools driven by
    Artificial Intelligence, it’s easy enough for novices.
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，联盟营销提供了另一个绝佳的机会，利用人工智能技术最大化每次活动的收益。通过利用由人工智能驱动的先进工具，即使是新手也能轻松应对。
- en: '| ![image](d2d_images/chapter_title_corner_decoration_left.png) |  | ![image](d2d_images/chapter_title_corner_decoration_right.png)
    |'
  id: totrans-211
  prefs: []
  type: TYPE_TB
  zh: '| ![图片](d2d_images/chapter_title_corner_decoration_left.png) |  | ![图片](d2d_images/chapter_title_corner_decoration_right.png)
    |'
- en: '![image](d2d_images/chapter_title_above.png)'
  id: totrans-212
  prefs: []
  type: TYPE_IMG
  zh: '![图片](d2d_images/chapter_title_above.png)'
- en: 'Embracing AI: A Mindset for Success'
  id: totrans-213
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 接受人工智能：成功的心态
- en: '![image](d2d_images/chapter_title_below.png)'
  id: totrans-214
  prefs: []
  type: TYPE_IMG
  zh: '![图片](d2d_images/chapter_title_below.png)'
- en: In this tech-driven era, growth is non-negotiable. With groundbreaking developments
    happening on a daily basis and cutting-edge solutions becoming increasingly sophisticated,
    staying ahead of the competition can be daunting. Succeeding in today’s landscape
    requires you to have an open mindset. Any obstacle you face should be viewed as
    a learning experience. AI doesn’t have to cause fear but rather a tool you can
    take advantage of. Embracing change will offer countless opportunities, so take
    advantage while you still can.
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个技术驱动的时代，增长是不可避免的。每天都有突破性的发展，尖端解决方案变得越来越复杂，保持竞争优势可能会令人望而却步。在今天的格局中取得成功需要您拥有开放的心态。您面临的任何障碍都应被视为一次学习经历。人工智能不必引起恐惧，而应被视为可以利用的工具。拥抱变化将提供无数的机会，所以趁现在还来得及，充分利用它们。
- en: An Example of Harnessing AI for Career Advancement
  id: totrans-216
  prefs: []
  type: TYPE_NORMAL
  zh: 利用人工智能提升职业发展的一个例子
- en: My friend Zaroon started using ChatGPT at his tech company and it transformed
    how he worked. Initially, he was like any other Account Executive - working hard
    to hit targets and keep up with his workload. But after discovering ChatGPT, Zaroon
    became fascinated with artificial intelligence.
  id: totrans-217
  prefs: []
  type: TYPE_NORMAL
  zh: 我的朋友Zaroon开始在他的科技公司使用ChatGPT，这彻底改变了他的工作方式。最初，他和其他客户经理一样——努力达成目标，跟上工作量。但发现ChatGPT后，Zaroon对人工智能产生了浓厚的兴趣。
- en: Seeing how I leveraged AI tools to boost performance, Zaroon couldn't resist
    exploring it himself. He researched lead generation tactics, content creation
    hacks, and customer research strategies to get a competitive edge.
  id: totrans-218
  prefs: []
  type: TYPE_NORMAL
  zh: 看到我如何利用人工智能工具提升表现，Zaroon无法抗拒亲自探索。他研究了线索生成策略、内容创作技巧和客户研究策略，以获得竞争优势。
- en: ChatGPT allowed Zaroon to analyze consumer trends more effectively and create
    tailored sales pitches that impressed everyone. With ChatGPT automating tedious
    tasks faster than ever, he freed up more time for strategic planning. The result?
    A huge spike in productivity beyond all expectations.
  id: totrans-219
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT使Zaroon能够更有效地分析消费者趋势，并创建令所有人都印象深刻的定制销售方案。ChatGPT自动化繁琐任务的速度比以往任何时候都要快，这让他有更多时间用于战略规划。结果？生产力的激增，远超预期。
- en: Experts estimate 47% of jobs in the next decade will need reimagining as AI
    like ChatGPT becomes more prevalent. But it doesn't have to replace people! With
    an AI mindset that sees it as an opportunity rather than a threat, humans can
    enhance their skills and performance.
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
  zh: 专家估计，在未来十年内，将有47%的工作需要重新构思，因为像ChatGPT这样的AI变得越来越普遍。但这并不意味着要取代人类！拥有将人工智能视为机遇而非威胁的思维模式，人类可以提升自己的技能和表现。
- en: Take Zaroon - he recognized ChatGPT's potential early on. This enabled him to
    build a powerful sales engine augmented by AI, proving the power of a growth mindset.
  id: totrans-221
  prefs: []
  type: TYPE_NORMAL
  zh: 以Zaroon为例，他早期就认识到了ChatGPT的潜力。这使得他能够构建一个由人工智能增强的销售引擎，证明了成长心态的力量。
- en: 'The key to an AI mindset is accepting that it:'
  id: totrans-222
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能思维的关键在于接受它：
- en: Automates routine tasks so you can focus on high-value work
  id: totrans-223
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 自动化常规任务，以便您能专注于高价值工作
- en: Combines human expertise with machine capabilities
  id: totrans-224
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 结合人类专业知识和机器能力
- en: Develops thoughtful solutions through creative problem solving
  id: totrans-225
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过创造性问题解决开发深思熟虑的解决方案
- en: Adopting this mindset is essential as companies keep pace in our fast-changing
    world.
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们快速变化的世界中，公司要保持步伐，这种心态至关重要。
