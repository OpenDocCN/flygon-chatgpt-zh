- en: Foreword
  id: totrans-34
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 前言
- en: When Hila told me she was working on a book about GenAI-powered software development,
    I smiled. Of course, she was. We’ve collaborated on papers where AI meets cybersecurity,
    so I’ve seen her thinking firsthand—rigorous, curious, never satisfied with surface-level
    insights. If anyone was going to map the future of coding with AI, it was Hila.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 当 Hila 告诉我她正在编写一本关于 GenAI 驱动的软件开发的书时，我笑了。当然，她会。我们在人工智能与网络安全相遇的论文中合作过，所以我亲眼看到了她的思考——严谨、好奇，从不满足于表面的洞察。如果有人要绘制人工智能编码的未来，那一定是
    Hila。
- en: 'This book is not just another tour of ChatGPT or Copilot. It’s a builder’s
    manual for the age of AI-augmented engineering. It’s part workflow, part playbook,
    and part philosophical reflection on what it means to code when the machine is
    your collaborator. It goes from prompt engineering to system design, from small
    refactors to architectural guidance, from GitHub Copilot to OpenAI APIs, without
    losing the plot or pandering to hype. What I appreciate most is how grounded it
    is. Hila and Peter don’t romanticize GenAI, and they don’t fear it either. They
    approach it as engineers: curious, skeptical, and practical. How do you evaluate
    GenAI output? How do you keep it reliable? When should you override it, or better
    yet, teach it? These aren’t abstract questions. They’re daily challenges, and
    this book meets them with clarity and grit. For those of us who live at the intersection
    of AI, code, and security, this book feels like home. It speaks to the real problems
    developers face when integrating these tools into production environments, where
    correctness matters, hallucinations can be dangerous, and productivity means more
    than autocomplete. If you’re looking for a book that teaches you how to code faster,
    sure, you’ll get that. But if you’re looking for a book that teaches you how to
    think more clearly about coding in a world where machines also write code, then
    this is your book.'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 这本书不仅仅是对ChatGPT或Copilot的一次巡游。它是AI增强工程时代的建造者手册。它部分是工作流程，部分是剧本，部分是对当机器成为你的合作伙伴时编码意味着什么的哲学反思。它从提示工程到系统设计，从小型重构到架构指导，从GitHub
    Copilot到OpenAI API，没有失去主线或迎合炒作。我最欣赏的是它的脚踏实地。希拉和彼得既不浪漫化通用人工智能，也不害怕它。他们以工程师的态度对待它：好奇、怀疑和实用。你如何评估通用人工智能的输出？你如何保持它的可靠性？何时应该覆盖它，或者更好的是，教导它？这些问题不是抽象的。它们是日常挑战，而这本书以清晰和坚韧的态度应对了它们。对于我们这些生活在AI、代码和安全交汇处的人来说，这本书就像家一样。它针对开发者在将工具集成到生产环境中时面临的真实问题进行了讨论，在这些环境中，正确性至关重要，幻觉可能是危险的，而生产力意味着的不仅仅是自动完成。如果你在寻找一本教你如何更快地编码的书，当然，你会得到。但如果你在寻找一本教你如何在机器也编写代码的世界中更清晰地思考编码的书，那么这本书就是你的书。
- en: Congratulations, Hila and Peter. You’ve created something timely, honest, and
    actually useful.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 恭喜希拉和彼得。你们创造了一些及时、真诚且真正有用的东西。
