- en: Write faster, sound more professional, and stop dreading that inbox.
  prefs: []
  type: TYPE_NORMAL
- en: If you’ve ever sat at your desk after a full day of inspections, with 47 unread
    emails and a tenant upset about mould (again), you’re not alone — and this book
    is for you.
  prefs: []
  type: TYPE_NORMAL
- en: You’re a property manager. Which means you’re a communicator, a negotiator,
    a human buffer between tenants, owners, trades, tribunal processes, and the never-ending
    cycle of maintenance, updates, rent, and review. Most days, you don’t just wear
    many hats — you juggle them, mid-run, while answering a phone and finishing an
    entry notice.
  prefs: []
  type: TYPE_NORMAL
- en: And in between all that? You’re expected to write.
  prefs: []
  type: TYPE_NORMAL
- en: Write emails. Write reports. Write updates. Write notices. Write nicely. Write
    quickly. Write professionally — no matter how your day’s gone.
  prefs: []
  type: TYPE_NORMAL
- en: So it’s no wonder you’re tired.
  prefs: []
  type: TYPE_NORMAL
- en: And it’s no wonder you might be curious (or even quietly desperate) for a tool
    that could take just a bit of the weight off.
  prefs: []
  type: TYPE_NORMAL
- en: So… what if you had a writing assistant?
  prefs: []
  type: TYPE_NORMAL
- en: One that was fast, consistent, polite, and available at 10:48pm when you’re
    catching up on admin. One that could take a jumbled brain-dump of a sentence and
    turn it into a calm, clear update. One that could draft an inspection summary,
    a tenant reply, or an owner update while you grab a coffee.
  prefs: []
  type: TYPE_NORMAL
- en: That’s what ChatGPT can be — if you know how to use it well.
  prefs: []
  type: TYPE_NORMAL
- en: And that’s what this book is here to help you do.
  prefs: []
  type: TYPE_NORMAL
- en: This isn’t about replacing you.
  prefs: []
  type: TYPE_NORMAL
- en: It’s about helping you feel a little more in control, a little more calm, and
    a whole lot less burnt out. It’s about working with technology to make your work
    life more manageable — not more complicated.
  prefs: []
  type: TYPE_NORMAL
- en: 'Inside, you’ll learn:'
  prefs: []
  type: TYPE_NORMAL
- en: How to write prompts (plain-English instructions) that actually get good results
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: How to use ChatGPT to speed up the writing you already know how to do
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: How to keep your voice and professionalism intact
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Where AI helps — and where your human judgment still matters most
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: We’ll show you real-world examples, helpful scripts, and ready-to-use templates.
    You won’t need to be “techy.” You won’t need hours to learn it. Just a little
    curiosity and a willingness to try.
  prefs: []
  type: TYPE_NORMAL
- en: If you’re thinking, “Finally, something that actually helps…”
  prefs: []
  type: TYPE_NORMAL
- en: Then you’re exactly who we wrote this for.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s help you write better, faster, and with more ease — so you can get back
    to the parts of the job that actually matter.
  prefs: []
  type: TYPE_NORMAL
- en: Deep breath. Let’s begin.
  prefs: []
  type: TYPE_NORMAL
- en: The PM Admin Avalanche
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: If you’re reading this while mentally juggling six emails, two inspection reports,
    and a voicemail you haven’t had the energy to return — take a breath. You’re not
    doing it wrong. You’re doing a job that’s designed to overwhelm.
  prefs: []
  type: TYPE_NORMAL
- en: Property management is one of the most complex, fast-moving roles in real estate.
    You’re coordinating trades, chasing rent, responding to complaints, managing inspections,
    handling emotional tenants, and keeping owners calm — all while trying to stay
    on top of legislation, timelines, and expectations.
  prefs: []
  type: TYPE_NORMAL
- en: And the common thread through it all? Writing.
  prefs: []
  type: TYPE_NORMAL
- en: Emails, reports, messages, notices, updates. Some short, some detailed. Some
    sensitive. Some urgent. Some you’ll rewrite three times because it’s just that
    kind of day.
  prefs: []
  type: TYPE_NORMAL
- en: Writing is a constant — and it’s often where the pressure builds up the fastest.
    This chapter is about unpacking that pressure, naming the hidden workload behind
    your comms, and showing you where ChatGPT can actually help lift the weight.
  prefs: []
  type: TYPE_NORMAL
- en: A Day in the Life of a PM (Relatable Scenario)
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: It starts with good intentions.
  prefs: []
  type: TYPE_NORMAL
- en: You walk into the office, coffee in hand, ready to get on top of emails. Just
    thirty minutes of focused inbox time, then onto your inspections. Easy.
  prefs: []
  type: TYPE_NORMAL
- en: By 9:07am, there’s been a hot water emergency, a tradie no-show, a tenant upset
    about a rent increase, and an owner asking why their lawn looks “less green than
    last inspection.” So, the emails wait. Again.
  prefs: []
  type: TYPE_NORMAL
- en: Between chasing quotes, rebooking jobs, making sure the routine keys are logged
    out properly, and answering five questions that should have been in the listing,
    your brain’s already full. And it’s not even 11:00am.
  prefs: []
  type: TYPE_NORMAL
- en: You finally sit down to send a quick update — but what should take five minutes
    turns into twenty. You’re rephrasing the same sentence, trying not to sound too
    harsh, too vague, too unsure. You second-guess. You edit. You sigh.
  prefs: []
  type: TYPE_NORMAL
- en: Then it’s out the door for inspections. Photos, notes, access issues. A tenant
    wants a chat about mould. Another one didn’t clean the oven again — but left a
    thank-you note, so now you’re overthinking how to word that in the report.
  prefs: []
  type: TYPE_NORMAL
- en: Back at your desk, there’s a pile-up. Maintenance requests. Arrears follow-ups.
    A tribunal case you forgot was due tomorrow. Your inbox is full. Your brain is
    scattered. Your day is... typical.
  prefs: []
  type: TYPE_NORMAL
- en: And through it all?
  prefs: []
  type: TYPE_NORMAL
- en: You’re writing. Constantly.
  prefs: []
  type: TYPE_NORMAL
- en: Quick replies. Long explanations. Carefully worded updates. Condensed timelines.
    Calm responses to not-so-calm emails. Every task involves communication — and
    that communication takes time, energy, and mental bandwidth.
  prefs: []
  type: TYPE_NORMAL
- en: This is what most people don’t see.
  prefs: []
  type: TYPE_NORMAL
- en: Property management isn’t just physical tasks or ticking boxes. It’s translation
    . It’s tone . It’s choosing the right words — over and over — for people who are
    often tired, worried, or upset.
  prefs: []
  type: TYPE_NORMAL
- en: So, if you’re exhausted, you’re not imagining it.
  prefs: []
  type: TYPE_NORMAL
- en: If you’re behind on messages, you’re not lazy.
  prefs: []
  type: TYPE_NORMAL
- en: If you’re avoiding that one email, you’re not unprofessional.
  prefs: []
  type: TYPE_NORMAL
- en: You’re just carrying a heavy load of constant, complex communication — and until
    now, you’ve probably had to do it all on your own.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s change that.
  prefs: []
  type: TYPE_NORMAL
- en: The Hidden Cost of Constant Writing
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Writing is one of the most invisible parts of your job — and also one of the
    most exhausting.
  prefs: []
  type: TYPE_NORMAL
- en: 'It doesn’t look like much from the outside. Typing out an email. Updating an
    owner. Sending a notice. But each of those tasks requires micro-decisions: what
    to say, how to say it, how much detail to include, how to keep it professional,
    how to not sound annoyed. Every message uses energy — even more so when you’re
    tired, rushed, or dealing with conflict.'
  prefs: []
  type: TYPE_NORMAL
- en: It’s not just about the time it takes to write something.
  prefs: []
  type: TYPE_NORMAL
- en: It’s the mental friction of switching between tasks, tones, and expectations
    all day long.
  prefs: []
  type: TYPE_NORMAL
- en: You might go from explaining a lease breach in neutral language, to softening
    a delay notice for a frustrated tenant, to justifying an urgent quote to an owner
    — all before your lunch break. And each time, you’re adjusting your tone, recalling
    details, choosing phrasing, double-checking your facts. That’s not admin. That’s
    cognitive load .
  prefs: []
  type: TYPE_NORMAL
- en: And it adds up.
  prefs: []
  type: TYPE_NORMAL
- en: That’s why, by the end of the day, even a “quick message” can feel impossible.
    It’s not the message. It’s that your brain is done. You’ve used your clarity,
    your professionalism, your patience — and now you’re staring at a blinking cursor,
    wishing someone else would just write it for you.
  prefs: []
  type: TYPE_NORMAL
- en: You’re not bad at communication. You’re not bad at your job.
  prefs: []
  type: TYPE_NORMAL
- en: You’re just burnt out from doing too much of the heavy lifting without support.
  prefs: []
  type: TYPE_NORMAL
- en: This is where ChatGPT can come in — not as a replacement, but as a writing partner.
    Something to help you get that first version down. Something to reduce the mental
    load, so you can stay focused on the work that actually needs you .
  prefs: []
  type: TYPE_NORMAL
- en: The Emotional Side of Communication
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Not every email you send is just an update.
  prefs: []
  type: TYPE_NORMAL
- en: Often, it’s an emotional exchange — even if no one says that out loud.
  prefs: []
  type: TYPE_NORMAL
- en: You’re dealing with tenants who feel stressed, ignored, or unheard. Owners who
    are anxious about money or frustrated by delays. Trades who are overbooked. Teams
    who are stretched thin. And somehow, you’re the one in the middle, trying to word
    it all just right .
  prefs: []
  type: TYPE_NORMAL
- en: You’re not just writing updates.
  prefs: []
  type: TYPE_NORMAL
- en: You’re de-escalating. You’re softening. You’re translating stress into solutions.
    And when people are unhappy, scared, or angry, the way you word something can
    either calm the storm — or make it worse.
  prefs: []
  type: TYPE_NORMAL
- en: That’s a lot of pressure for a “quick message.”
  prefs: []
  type: TYPE_NORMAL
- en: It’s no wonder so many property managers overthink their wording, reread things
    too many times, or delay sending difficult emails. You’re not just trying to sound
    professional. You’re trying to protect yourself from conflict. To avoid escalation.
    To say the right thing, the right way, at the right time.
  prefs: []
  type: TYPE_NORMAL
- en: That’s not just admin. That’s emotional labour.
  prefs: []
  type: TYPE_NORMAL
- en: And it’s draining — especially when it’s expected of you constantly.
  prefs: []
  type: TYPE_NORMAL
- en: What you say matters. How you say it matters even more.
  prefs: []
  type: TYPE_NORMAL
- en: And while no tool can take away the hard parts of the job, there is a way to
    carry the weight with a little more support.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s talk about what that looks like.
  prefs: []
  type: TYPE_NORMAL
- en: Where ChatGPT Fits In
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'By now, you might be thinking:'
  prefs: []
  type: TYPE_NORMAL
- en: '"Okay, yes — the job is overwhelming. But how exactly is a robot supposed to
    help with that?"'
  prefs: []
  type: TYPE_NORMAL
- en: Fair question.
  prefs: []
  type: TYPE_NORMAL
- en: ChatGPT isn’t here to replace you. It won’t make decisions for you. It can’t
    read your mind, and it definitely won’t handle an angry tenant on your behalf.
    But what it can do — consistently, quickly, and without fuss — is help you get
    the words out.
  prefs: []
  type: TYPE_NORMAL
- en: It’s like having a calm, capable assistant who never gets tired, never needs
    context, and never rolls their eyes when you say, “Can you just help me word this
    better?”
  prefs: []
  type: TYPE_NORMAL
- en: 'ChatGPT can:'
  prefs: []
  type: TYPE_NORMAL
- en: Turn dot points into a professional owner update
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Reword a maintenance delay email so it sounds calm, not cold
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Draft a summary of a tenant issue so you don’t have to start from scratch
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Help you explain complex issues (like tribunal processes or insurance updates)
    in plain language
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: It’s not perfect. But it’s good. And more importantly — it’s fast .
  prefs: []
  type: TYPE_NORMAL
- en: The best part? You don’t need to be technical to use it.
  prefs: []
  type: TYPE_NORMAL
- en: If you can type, you can prompt. If you know what you want to say but can’t
    quite find the words, ChatGPT can help shape it. If you’ve already written something
    but aren’t sure about the tone, it can adjust it. It’s not magic — it’s just useful.
  prefs: []
  type: TYPE_NORMAL
- en: 'Most property managers already use tools to save time: email templates, inspection
    software, automation in their trust systems.'
  prefs: []
  type: TYPE_NORMAL
- en: ChatGPT is just another tool — one that happens to be very, very good at writing.
  prefs: []
  type: TYPE_NORMAL
- en: And when writing is the one thing you do all day, every day… that’s worth paying
    attention to.
  prefs: []
  type: TYPE_NORMAL
- en: Reassurance Before We Dive In
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: You don’t need to learn a new system.
  prefs: []
  type: TYPE_NORMAL
- en: You don’t need to get everything right the first time.
  prefs: []
  type: TYPE_NORMAL
- en: And you definitely don’t need to be “techy” to make this work.
  prefs: []
  type: TYPE_NORMAL
- en: If you’ve ever written a maintenance email, jotted notes after an inspection,
    or reworded a message three times to get the tone right — you already have the
    skills. ChatGPT just helps you use them with less friction.
  prefs: []
  type: TYPE_NORMAL
- en: This book isn’t about convincing you to become a digital expert. It’s about
    giving you tools that actually help in the day-to-day chaos of property management.
    Tools that lighten the mental load. Tools that speed up the writing part, so you
    can focus on the work that really needs your attention.
  prefs: []
  type: TYPE_NORMAL
- en: You’re not behind. You’re not doing it wrong.
  prefs: []
  type: TYPE_NORMAL
- en: You’ve just been carrying the admin avalanche alone — and now, you don’t have
    to.
  prefs: []
  type: TYPE_NORMAL
- en: Getting Started with ChatGPT (No Jargon Required)
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'Let’s get something out of the way up front:'
  prefs: []
  type: TYPE_NORMAL
- en: You do not need to be tech-savvy to use ChatGPT.
  prefs: []
  type: TYPE_NORMAL
- en: This isn’t some complicated platform that requires logins, training, or integrations.
    You don’t need to install anything, and you don’t need to “set it up” like software.
    If you can open a browser and type a sentence, you can use it. Truly.
  prefs: []
  type: TYPE_NORMAL
- en: That said — like any new tool — it can feel a bit strange at first. Especially
    if you’ve never worked with anything AI-related before. Maybe you’re curious but
    unsure. Maybe you’ve tried it and got results that didn’t feel useful. Maybe you’ve
    been meaning to give it a go… but there’s always something more urgent to deal
    with.
  prefs: []
  type: TYPE_NORMAL
- en: You’re not alone. Most people either don’t understand how ChatGPT works, or
    they’ve been shown examples that don’t feel relevant to their job. That’s what
    this chapter is here to fix.
  prefs: []
  type: TYPE_NORMAL
- en: We’ll walk through exactly what ChatGPT is, what it can and can’t do, and how
    to start using it as part of your everyday workflow — no jargon, no overwhelm,
    no pressure.
  prefs: []
  type: TYPE_NORMAL
- en: If you’ve ever wished someone would just “help you write this” — this is where
    that wish starts to come true.
  prefs: []
  type: TYPE_NORMAL
- en: What ChatGPT Actually Is (In PM Terms)
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: ChatGPT is a tool that helps you write things faster and easier — that’s really
    the simplest way to explain it.
  prefs: []
  type: TYPE_NORMAL
- en: It’s a type of artificial intelligence (AI) that you can talk to by typing.
    You give it instructions, and it responds in full sentences. You might ask it
    to write an email, explain something in plain language, or reword a message —
    and it will do just that, in a matter of seconds.
  prefs: []
  type: TYPE_NORMAL
- en: It’s not a chatbot like you see on a website. It’s more like a blank document
    that responds when you ask for help. Imagine sitting next to a very fast, very
    polite assistant who can take your messy thoughts and turn them into something
    clear and professional.
  prefs: []
  type: TYPE_NORMAL
- en: But — and this is important — it only works well when you tell it what you need
    . ChatGPT doesn’t guess. It doesn’t know your clients, your tone, your processes,
    or what your agency prefers. You give it the instructions, and it gives you back
    something you can use, edit, or improve.
  prefs: []
  type: TYPE_NORMAL
- en: You’re still in control. You’re still doing the thinking.
  prefs: []
  type: TYPE_NORMAL
- en: ChatGPT just helps you put it into words — faster.
  prefs: []
  type: TYPE_NORMAL
- en: That’s all it is.
  prefs: []
  type: TYPE_NORMAL
- en: No systems to learn. No setup. No pressure.
  prefs: []
  type: TYPE_NORMAL
- en: Just a smart writing tool that’s ready whenever you are.
  prefs: []
  type: TYPE_NORMAL
- en: What You Can Use It For (Real Examples from PM Life)
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'If you’re wondering, “Okay, but what would I actually use this for?” — the
    answer is: probably more than you think.'
  prefs: []
  type: TYPE_NORMAL
- en: You don’t need to hand over your whole job to ChatGPT. Just start with the parts
    that slow you down — the writing tasks that pile up in the background or steal
    time you don’t have.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here are a few everyday ways property managers are already using ChatGPT:'
  prefs: []
  type: TYPE_NORMAL
- en: Writing professional emails from bullet points or phone notes
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Rewording messages to sound firmer, friendlier, or more neutral
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Turning inspection notes into clear updates for owners
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Drafting tenant notices that are polite but compliant
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Creating listing descriptions that don’t all sound the same
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Summarising long email threads into something a team member or owner can quickly
    understand
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Writing social media captions or “just listed” blurbs when your brain is done
    for the day
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: It doesn’t need to be fancy or clever.
  prefs: []
  type: TYPE_NORMAL
- en: 'Sometimes it’s as simple as saying:'
  prefs: []
  type: TYPE_NORMAL
- en: “Here’s what I want to say… can you word it better?”
  prefs: []
  type: TYPE_NORMAL
- en: 'Or:'
  prefs: []
  type: TYPE_NORMAL
- en: “Turn these notes into a professional message for the tenant.”
  prefs: []
  type: TYPE_NORMAL
- en: Small moments. Big time-savers.
  prefs: []
  type: TYPE_NORMAL
- en: If you start by using ChatGPT for just one or two tasks a day, you’ll start
    to feel the difference — not just in time saved, but in how much mental energy
    you get back.
  prefs: []
  type: TYPE_NORMAL
- en: How to Access It (Free vs. Paid Options)
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The good news? You can start using ChatGPT right now — for free.
  prefs: []
  type: TYPE_NORMAL
- en: All you need to do is go to [chat.openai.com](https://chat.openai.com) , create
    an account, and start typing. That’s it. There’s no software to install and nothing
    to download. It works in your browser or through the mobile app, so you can use
    it on your computer or your phone — whatever suits your workflow best.
  prefs: []
  type: TYPE_NORMAL
- en: 'When you log in, you’ll see two options:'
  prefs: []
  type: TYPE_NORMAL
- en: Free (GPT-3.5) — This version is fast, easy to use, and completely fine for
    everyday PM tasks like writing emails, inspection summaries, and maintenance updates.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Paid (GPT-4) — This version is smarter, more accurate, and generally better
    at understanding tone and complex instructions. It costs around $20–30 AUD per
    month (charged in USD), and it’s worth considering if you plan to use ChatGPT
    daily or for more advanced tasks.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: So, which one should you choose?
  prefs: []
  type: TYPE_NORMAL
- en: If you’re just getting started and want to dip your toe in — the free version
    is absolutely enough. You’ll still get time-saving help with wording, tone, structure,
    and summaries.
  prefs: []
  type: TYPE_NORMAL
- en: If you find yourself thinking, “This is saving me hours,” or you want better
    accuracy, longer memory, and access to extra tools, the paid version may be worth
    the upgrade.
  prefs: []
  type: TYPE_NORMAL
- en: There’s no wrong choice. Start where you are.
  prefs: []
  type: TYPE_NORMAL
- en: You can always switch later.
  prefs: []
  type: TYPE_NORMAL
- en: What’s a Prompt, and How Do I Write One?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: A prompt is simply the instruction you give ChatGPT.
  prefs: []
  type: TYPE_NORMAL
- en: It’s what you type in to tell it what you want — like asking a colleague to
    “write up a quick update for the owner,” or “turn this into something we can send
    to the tenant.” That’s it. No special format. No magic words. Just a plain-English
    request.
  prefs: []
  type: TYPE_NORMAL
- en: If you’ve ever written an email asking someone else for help wording something,
    you’ve already written a prompt — you just didn’t call it that.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here’s what a basic prompt might look like:'
  prefs: []
  type: TYPE_NORMAL
- en: “Write a professional message to a tenant explaining that the repair is delayed.
    Make it sound calm and apologetic, but clear.”
  prefs: []
  type: TYPE_NORMAL
- en: 'Or:'
  prefs: []
  type: TYPE_NORMAL
- en: '“Turn these notes into a short update for the landlord:'
  prefs: []
  type: TYPE_NORMAL
- en: plumber attended Wednesday
  prefs: []
  type: TYPE_NORMAL
- en: parts ordered, due Monday
  prefs: []
  type: TYPE_NORMAL
- en: tenant updated and happy to wait”
  prefs: []
  type: TYPE_NORMAL
- en: You don’t need perfect grammar or fancy instructions.
  prefs: []
  type: TYPE_NORMAL
- en: You can use bullet points, rough drafts, or even voice notes (if you’re on mobile).
    The more clearly you explain what you want, the better the result will be — but
    you don’t have to overthink it.
  prefs: []
  type: TYPE_NORMAL
- en: 'If you’re ever unsure where to start, try this simple prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: “I need to send a message about [topic]. Can you help me write it in a professional
    and polite tone?”
  prefs: []
  type: TYPE_NORMAL
- en: That’s enough.
  prefs: []
  type: TYPE_NORMAL
- en: You already know what you want to say — ChatGPT just helps you say it better,
    faster, and with less second-guessing.
  prefs: []
  type: TYPE_NORMAL
- en: Prompting Do’s and Don’ts (For Property Managers)
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Once you get the hang of prompting, it starts to feel natural — but here are
    a few simple do’s and don’ts to help you get better results right from the start.
  prefs: []
  type: TYPE_NORMAL
- en: 'Do: Use dot points or rough notes'
  prefs: []
  type: TYPE_NORMAL
- en: You don’t have to write a full paragraph. ChatGPT is great at turning fragments
    into complete, professional messages.
  prefs: []
  type: TYPE_NORMAL
- en: 'Example prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: '“Turn these notes into an email to the owner: leak reported Tuesday, plumber
    attended Friday, roof tiles cracked, waiting on quote.”'
  prefs: []
  type: TYPE_NORMAL
- en: 'Do: Tell it what tone you want'
  prefs: []
  type: TYPE_NORMAL
- en: You can ask ChatGPT to make your message sound polite, firm, friendly, neutral,
    apologetic — whatever suits the situation.
  prefs: []
  type: TYPE_NORMAL
- en: 'Example prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: “Rewrite this to sound professional but not too formal.”
  prefs: []
  type: TYPE_NORMAL
- en: 'Do: Treat it like a draft, not a final version'
  prefs: []
  type: TYPE_NORMAL
- en: Always read over what it gives you. You might want to add personal details,
    double-check facts, or adjust phrasing to match your agency’s style.
  prefs: []
  type: TYPE_NORMAL
- en: 'Don’t: Copy and paste without checking'
  prefs: []
  type: TYPE_NORMAL
- en: Even good responses might miss a detail or use phrasing that’s slightly off.
    Always proofread before sending — especially for legal, financial, or tribunal-related
    content.
  prefs: []
  type: TYPE_NORMAL
- en: 'Don’t: Be vague'
  prefs: []
  type: TYPE_NORMAL
- en: If you just write “write an email,” you won’t get something useful. Be clear
    about what it’s about, who it’s for, and how you want to come across. The more
    you give, the better the result.
  prefs: []
  type: TYPE_NORMAL
- en: 'Don’t: Expect it to know your policies'
  prefs: []
  type: TYPE_NORMAL
- en: ChatGPT doesn’t know your agency’s internal procedures, your landlord’s preferences,
    or your local legislation. You still need to guide it — just like you would a
    new staff member.
  prefs: []
  type: TYPE_NORMAL
- en: Think of ChatGPT like a helpful assistant who’s great at writing but needs clear
    direction. The better you explain what you need, the more useful it becomes.
  prefs: []
  type: TYPE_NORMAL
- en: Getting Comfortable with Small Wins First
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The best way to build confidence with ChatGPT is to start small.
  prefs: []
  type: TYPE_NORMAL
- en: You don’t need to overhaul your entire workflow or create complex systems. Just
    use it to take one thing off your plate today — maybe it’s rewording an update
    to an owner, drafting a maintenance delay message, or summarising your inspection
    notes into a short paragraph.
  prefs: []
  type: TYPE_NORMAL
- en: The goal isn’t to be perfect. The goal is to save time and reduce stress.
  prefs: []
  type: TYPE_NORMAL
- en: Most property managers find their rhythm by experimenting with a few simple
    prompts and seeing what works. You’ll quickly learn how to phrase your requests,
    how to tweak the output, and how to build on what you get.
  prefs: []
  type: TYPE_NORMAL
- en: 'Try this:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Take one message sitting in your inbox — even something half-written — and
    paste it into ChatGPT with a prompt like:'
  prefs: []
  type: TYPE_NORMAL
- en: “I need to send this to the tenant. Can you tidy it up and make it sound polite
    but clear?”
  prefs: []
  type: TYPE_NORMAL
- en: Then read what it gives you. Edit if needed. Copy. Paste. Done.
  prefs: []
  type: TYPE_NORMAL
- en: The more you do it, the easier it gets.
  prefs: []
  type: TYPE_NORMAL
- en: And over time, you’ll build a workflow that feels less reactive, more efficient
    — and a whole lot lighter on the mental load.
  prefs: []
  type: TYPE_NORMAL
- en: Client Emails & Everyday Replies
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: If you’ve ever spent more time rewriting an email than actually dealing with
    the issue, you’re not alone.
  prefs: []
  type: TYPE_NORMAL
- en: Emails are where a huge chunk of a property manager’s day goes — not because
    they’re difficult, but because they’re constant. Quick updates, follow-ups, reminders,
    clarifications, “just checking in” messages. It all adds up. And the weight of
    trying to sound professional, clear, polite, and in control every single time?
    That adds up too.
  prefs: []
  type: TYPE_NORMAL
- en: The truth is, most emails don’t take long to send.
  prefs: []
  type: TYPE_NORMAL
- en: They take long to word .
  prefs: []
  type: TYPE_NORMAL
- en: You know what you want to say — but saying it in a way that won’t cause confusion,
    escalate tension, or sound rushed takes effort. And when you’re sending ten, twenty,
    even fifty emails a day, that effort compounds into real fatigue.
  prefs: []
  type: TYPE_NORMAL
- en: That’s where ChatGPT can help.
  prefs: []
  type: TYPE_NORMAL
- en: Not by taking over your communication — but by taking care of the first draft.
    Giving you a clean, professional version to edit, instead of starting from scratch.
    Helping you shift tone depending on the person. Saving you from rewriting the
    same sentence for the third time.
  prefs: []
  type: TYPE_NORMAL
- en: In this chapter, we’ll look at how to use ChatGPT to draft and refine everyday
    emails — so you can respond faster, sound more consistent, and free up more time
    to focus on the work that really matters.
  prefs: []
  type: TYPE_NORMAL
- en: 'The Volume Problem: Why Emails Stack Up So Fast'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: On their own, most emails are simple.
  prefs: []
  type: TYPE_NORMAL
- en: A tenant wants an update. An owner has a question. A tradie needs access instructions.
  prefs: []
  type: TYPE_NORMAL
- en: But in property management, the problem isn’t the individual message — it’s
    the fact that they never stop. You can clear your inbox at 10:00 a.m. and be buried
    again by 3:00 p.m. It’s a conveyor belt that doesn’t turn off.
  prefs: []
  type: TYPE_NORMAL
- en: And it’s not just the number of emails — it’s the variety. You’re switching
    between tenant concerns, owner updates, maintenance quotes, arrears follow-ups,
    internal requests, and tribunal prep — sometimes in the space of fifteen minutes.
    Each one requires a different tone, level of detail, and type of response. That
    kind of mental gear-shifting is exhausting.
  prefs: []
  type: TYPE_NORMAL
- en: So, it makes sense that you get stuck.
  prefs: []
  type: TYPE_NORMAL
- en: It makes sense that some messages get delayed.
  prefs: []
  type: TYPE_NORMAL
- en: It makes sense that you write “just checking in” three times before you hit
    send.
  prefs: []
  type: TYPE_NORMAL
- en: This isn’t a sign that you’re behind or unorganised.
  prefs: []
  type: TYPE_NORMAL
- en: It’s a sign that you’re trying to keep up with a system that was never designed
    to be sustainable — at least not without support.
  prefs: []
  type: TYPE_NORMAL
- en: That’s where ChatGPT comes in — not as a replacement, but as a way to reduce
    the time and effort it takes to write the same types of messages over and over.
    You still make the decisions. You still send the email. You just get to skip the
    part where you stare at the screen, trying to find the right words.
  prefs: []
  type: TYPE_NORMAL
- en: Using ChatGPT for Inbox Triage and Reply Drafts
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: One of the simplest — and most effective — ways to use ChatGPT is to help you
    get through your inbox faster. Not by sending anything for you, and not by guessing
    what to say — but by drafting the first version so you’re not starting from a
    blank page every time.
  prefs: []
  type: TYPE_NORMAL
- en: When your inbox is full, even quick replies can start to feel heavy. ChatGPT
    helps by turning notes, bullet points, or rough drafts into clear, professional
    messages that sound like something you would send.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here’s how you can use it in everyday email situations:'
  prefs: []
  type: TYPE_NORMAL
- en: Turn bullet points into a complete reply
  prefs: []
  type: TYPE_NORMAL
- en: You don’t need to write out full sentences. Just feed ChatGPT the key facts
    and ask it to build the message.
  prefs: []
  type: TYPE_NORMAL
- en: 'Example:'
  prefs: []
  type: TYPE_NORMAL
- en: '“These are my notes:'
  prefs: []
  type: TYPE_NORMAL
- en: – tenant reported a leak on Monday
  prefs: []
  type: TYPE_NORMAL
- en: – plumber attended Wednesday
  prefs: []
  type: TYPE_NORMAL
- en: – waiting on parts, ETA Friday
  prefs: []
  type: TYPE_NORMAL
- en: Write a professional update for the owner.”
  prefs: []
  type: TYPE_NORMAL
- en: Reword emotional or reactive drafts
  prefs: []
  type: TYPE_NORMAL
- en: It’s easy to write something quickly when you're frustrated or exhausted — and
    regret how it sounds later.
  prefs: []
  type: TYPE_NORMAL
- en: 'Example:'
  prefs: []
  type: TYPE_NORMAL
- en: “I’ve written a message that feels a bit sharp. Can you soften this while keeping
    it clear?”
  prefs: []
  type: TYPE_NORMAL
- en: Summarise a long chain into a short update
  prefs: []
  type: TYPE_NORMAL
- en: If you’ve had a back-and-forth with a tenant or trade, you can drop the key
    points into ChatGPT and ask for a summary.
  prefs: []
  type: TYPE_NORMAL
- en: 'Example:'
  prefs: []
  type: TYPE_NORMAL
- en: “Summarise this into a short, professional message I can send to the owner.”
  prefs: []
  type: TYPE_NORMAL
- en: 'ChatGPT is especially helpful when you’re: – Tired and struggling to find the
    right words'
  prefs: []
  type: TYPE_NORMAL
- en: – Writing the same type of message for the fifth time that day
  prefs: []
  type: TYPE_NORMAL
- en: – Worried about sounding too blunt or too vague
  prefs: []
  type: TYPE_NORMAL
- en: – Trying to be quick, but not careless
  prefs: []
  type: TYPE_NORMAL
- en: You’re still in charge of what gets sent. ChatGPT just gives you a cleaner,
    quicker starting point — so you can hit reply, edit once, and move on.
  prefs: []
  type: TYPE_NORMAL
- en: 'Tone Tweaks: Firm, Friendly, or Formal?'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: One of the hardest parts of writing as a property manager isn’t what you say
    — it’s how you say it.
  prefs: []
  type: TYPE_NORMAL
- en: You might be giving someone good news, bad news, neutral information, or an
    explanation they’re not going to like. And depending on the situation, the tone
    needs to shift — sometimes subtly, sometimes sharply. That constant adjustment
    takes energy and precision.
  prefs: []
  type: TYPE_NORMAL
- en: ChatGPT makes this part easier by helping you shape your tone without rewriting
    from scratch.
  prefs: []
  type: TYPE_NORMAL
- en: 'You can ask it to:'
  prefs: []
  type: TYPE_NORMAL
- en: Make your message sound more friendly
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Add warmth to something that feels too blunt
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Reword a message to sound more professional
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Adjust the level of formality to suit the recipient
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'For example:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Original prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: “I need to tell a tenant their maintenance request can’t be completed until
    next week.”
  prefs: []
  type: TYPE_NORMAL
- en: 'You could ask ChatGPT:'
  prefs: []
  type: TYPE_NORMAL
- en: “Make this sound friendly but firm.”
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: “Add a polite and apologetic tone without sounding overly formal.”
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: “Rewrite this in a way that reassures them we’re on top of it.”
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Tone is one of the biggest contributors to misunderstandings, especially over
    email. When you’re rushed, tired, or dealing with conflict, it’s easy for a message
    to come across too sharp — or, just as unhelpfully, too vague.
  prefs: []
  type: TYPE_NORMAL
- en: With ChatGPT, you can shift tone quickly, clearly, and consistently. It helps
    you stay calm, sound composed, and communicate with the right balance of empathy
    and authority — no matter what kind of day you’re having.
  prefs: []
  type: TYPE_NORMAL
- en: Helpful Prompts for Everyday Emails
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: You don’t need to start from scratch every time you write to ChatGPT. Having
    a few go-to prompts saved can make a huge difference in how quickly you get helpful
    responses.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here are some examples property managers can use (or adapt) for common situations:'
  prefs: []
  type: TYPE_NORMAL
- en: Maintenance update to an owner
  prefs: []
  type: TYPE_NORMAL
- en: “Write a short, professional update for a landlord explaining that the tenant
    reported a leak on Monday. The plumber attended Wednesday and is waiting on parts.
    Make it sound calm and factual.”
  prefs: []
  type: TYPE_NORMAL
- en: Follow-up to a tenant who hasn’t replied
  prefs: []
  type: TYPE_NORMAL
- en: “Write a polite follow-up to a tenant who hasn’t responded to an earlier message
    about their vacate date. Ask them to confirm by Friday.”
  prefs: []
  type: TYPE_NORMAL
- en: Owner requesting unnecessary upgrades
  prefs: []
  type: TYPE_NORMAL
- en: “Help me write a firm but respectful reply to an owner who wants to replace
    the carpets, even though the property is presenting well and no issues have been
    raised.”
  prefs: []
  type: TYPE_NORMAL
- en: Tenant chasing a response you’re still waiting on
  prefs: []
  type: TYPE_NORMAL
- en: “Write a holding message to a tenant saying we’re still waiting on a quote from
    the tradesperson and will follow up again today. Reassure them we haven’t forgotten.”
  prefs: []
  type: TYPE_NORMAL
- en: You can copy, paste, and tweak these as needed — or start building your own
    library of prompts based on the types of emails you write most often.
  prefs: []
  type: TYPE_NORMAL
- en: The more you use ChatGPT in these everyday moments, the more time you’ll save
    — and the less you’ll second-guess your wording.
  prefs: []
  type: TYPE_NORMAL
- en: Saving Time Without Sounding Robotic
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: One of the biggest concerns people have when using ChatGPT is whether the message
    will sound like them .
  prefs: []
  type: TYPE_NORMAL
- en: 'You don’t want to sound stiff, generic, or overly formal — and you definitely
    don’t want your tenants or landlords to feel like they’re getting copy-paste replies.
    The good news is: you’re still in control of how everything sounds. ChatGPT gives
    you a clear, polished starting point — but you can (and should) make small tweaks
    to keep it personal.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Here are three simple ways to make any message feel more like you :'
  prefs: []
  type: TYPE_NORMAL
- en: 1\. Add a detail
  prefs: []
  type: TYPE_NORMAL
- en: Something specific to the situation — a date, a small reference, or even a line
    of context — helps make the message feel personal and relevant.
  prefs: []
  type: TYPE_NORMAL
- en: 'Example: “As you mentioned in your last email…” or “We’ve asked John from FastFlow
    Plumbing to attend.”'
  prefs: []
  type: TYPE_NORMAL
- en: 2\. Include a next step
  prefs: []
  type: TYPE_NORMAL
- en: People feel reassured when they know what’s coming. Even a simple line like
    “We’ll be in touch again once the quote comes through” helps build trust.
  prefs: []
  type: TYPE_NORMAL
- en: 3\. Use your usual sign-off or phrasing
  prefs: []
  type: TYPE_NORMAL
- en: If you normally say “Let me know if you have any questions” instead of “Please
    do not hesitate to contact me,” stick with that. Small language choices go a long
    way in making a message sound human.
  prefs: []
  type: TYPE_NORMAL
- en: Think of ChatGPT’s response as your first draft — one that’s already 80 percent
    of the way there. All you need to do is scan, adjust, and send.
  prefs: []
  type: TYPE_NORMAL
- en: You’re not outsourcing your communication. You’re just skipping the blank page.
  prefs: []
  type: TYPE_NORMAL
- en: 'Quick Wins: Using ChatGPT in Under 2 Minutes'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: You don’t need a full afternoon or perfect conditions to use ChatGPT. In fact,
    some of its most helpful moments happen when you have two minutes, not twenty.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here are a few examples of quick, practical wins that can make your day run
    smoother:'
  prefs: []
  type: TYPE_NORMAL
- en: After an inspection
  prefs: []
  type: TYPE_NORMAL
- en: 'Drop your rough notes in and prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: “Turn this into a short, professional update for the owner.”
  prefs: []
  type: TYPE_NORMAL
- en: When you’re frustrated but need to sound calm
  prefs: []
  type: TYPE_NORMAL
- en: 'Paste your rough draft and prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: “Soften this message without losing the key points. Keep it polite and clear.”
  prefs: []
  type: TYPE_NORMAL
- en: When you’re tired and just want something to work
  prefs: []
  type: TYPE_NORMAL
- en: 'Try:'
  prefs: []
  type: TYPE_NORMAL
- en: “I need to send a friendly but professional message explaining that we’re still
    waiting on the tradie. Can you write it for me?”
  prefs: []
  type: TYPE_NORMAL
- en: When a task has been sitting in your inbox for too long
  prefs: []
  type: TYPE_NORMAL
- en: Use GPT as a way to just get it moving. Even if you don’t use the full response,
    it gives you momentum.
  prefs: []
  type: TYPE_NORMAL
- en: In a job that’s constantly interrupted, it helps to have a tool that works on
    your schedule. Whether you’re between appointments, catching up at the end of
    the day, or just trying to get through that one annoying message — ChatGPT can
    save you those small moments of struggle that add up over time.
  prefs: []
  type: TYPE_NORMAL
- en: Every time you use it to draft a message, reword a response, or simplify a summary,
    that’s one less thing taking up space in your head.
  prefs: []
  type: TYPE_NORMAL
- en: Small wins. Big difference.
  prefs: []
  type: TYPE_NORMAL
- en: Tenant Comms (That Don’t Escalate)
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Tenant communication is one of the most emotionally complex parts of property
    management. It’s also one of the most draining.
  prefs: []
  type: TYPE_NORMAL
- en: Even when the topic is simple — a routine inspection, a reminder, a repair delay
    — the response isn’t always predictable. Tenants might be frustrated, confused,
    anxious, or simply having a bad day. Sometimes, they’re polite and cooperative.
    Other times, you’re met with silence, sarcasm, or a string of all-caps emails.
  prefs: []
  type: TYPE_NORMAL
- en: The challenge isn’t just what to say. It’s how to say it in a way that doesn’t
    make things worse.
  prefs: []
  type: TYPE_NORMAL
- en: 'That’s a skill — and it’s one you probably use every day without even realising
    it. But when you’re tired, rushed, or writing in the middle of back-to-back tasks,
    it’s easy to fall into default habits: being too blunt, too vague, or too apologetic.'
  prefs: []
  type: TYPE_NORMAL
- en: That’s where ChatGPT can step in and help.
  prefs: []
  type: TYPE_NORMAL
- en: It won’t handle the emotional labour for you. But it will help you reword messages
    so they land the right way — firm without being cold, clear without being abrupt,
    empathetic without over-explaining.
  prefs: []
  type: TYPE_NORMAL
- en: In this chapter, we’ll look at how to use ChatGPT to navigate common tenant
    comms with more ease and less escalation — and give you the language tools to
    feel more in control, even when conversations get tricky.
  prefs: []
  type: TYPE_NORMAL
- en: Why Tenant Messages Are So Emotionally Charged
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'On paper, most tenant communication seems straightforward: access notices,
    maintenance updates, reminders, inspection scheduling. But in practice, it often
    carries emotional weight — and not just for the tenant.'
  prefs: []
  type: TYPE_NORMAL
- en: That’s because you’re usually not just delivering information. You’re managing
    expectations, handling frustration, calming fears, or enforcing rules. And behind
    every message, there’s a human on the other end — with their own stress, stories,
    and assumptions.
  prefs: []
  type: TYPE_NORMAL
- en: Maybe the tenant feels ignored.
  prefs: []
  type: TYPE_NORMAL
- en: Maybe they’ve had bad experiences with previous agents.
  prefs: []
  type: TYPE_NORMAL
- en: Maybe they’re genuinely trying to keep up, but life has gotten hard.
  prefs: []
  type: TYPE_NORMAL
- en: Or maybe they’re just angry — and they’re aiming it at you.
  prefs: []
  type: TYPE_NORMAL
- en: Even when the message is routine, it still takes care to get the tone right.
    Too cold, and you risk escalating tension. Too soft, and you may lose authority.
    Too vague, and the issue drags on.
  prefs: []
  type: TYPE_NORMAL
- en: And all of that would be manageable…
  prefs: []
  type: TYPE_NORMAL
- en: If you weren’t also dealing with twenty other properties, a maintenance backlog,
    and a full inbox.
  prefs: []
  type: TYPE_NORMAL
- en: When you’re under pressure, writing calm, professional messages become even
    harder. That’s when wording slips, tone sharpens, and avoidable problems start
    to appear.
  prefs: []
  type: TYPE_NORMAL
- en: The truth is, tenant communication is a constant balancing act — and the emotional
    labour behind it is real. You’re expected to be patient, clear, firm, and diplomatic,
    often all at once.
  prefs: []
  type: TYPE_NORMAL
- en: That’s why having help with how you say things matters.
  prefs: []
  type: TYPE_NORMAL
- en: Using ChatGPT to De-Escalate and Clarify
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: When a message feels emotionally charged — whether it’s coming from the tenant
    or from you — the best thing you can do is slow the response down and get the
    tone right.
  prefs: []
  type: TYPE_NORMAL
- en: That’s where ChatGPT can help.
  prefs: []
  type: TYPE_NORMAL
- en: It allows you to take a rough draft, bullet points, or even a frustrated version
    of what you want to say, and rework it into something clear, calm, and professional.
    It doesn’t remove the problem, but it can help you communicate in a way that protects
    the relationship, reduces confusion, and keeps the issue from escalating further.
  prefs: []
  type: TYPE_NORMAL
- en: 'For example:'
  prefs: []
  type: TYPE_NORMAL
- en: '– A tenant has sent an angry message about delayed repairs. You can type your
    intended response and ask ChatGPT:'
  prefs: []
  type: TYPE_NORMAL
- en: “Make this sound calm and clear. Acknowledge the frustration but don’t apologise
    unnecessarily.”
  prefs: []
  type: TYPE_NORMAL
- en: '– You need to tell a tenant their request won’t be approved. Prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: “Write a professional message explaining why we can’t proceed with the tenant’s
    request. Keep the tone neutral and respectful.”
  prefs: []
  type: TYPE_NORMAL
- en: '– You’re summarising a complaint to pass on to your team or trades. Prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: “Summarise this tenant message in a way that’s factual and non-emotional.”
  prefs: []
  type: TYPE_NORMAL
- en: This kind of support is especially useful when you’re under pressure, short
    on time, or feeling personally affected by the situation. You still decide what’s
    appropriate, but ChatGPT gives you a solid, objective version of the message —
    one you can edit or send with confidence.
  prefs: []
  type: TYPE_NORMAL
- en: It also helps remove the second-guessing. Instead of wondering whether something
    sounds too blunt or too soft, you can get a version that hits the right tone straight
    away.
  prefs: []
  type: TYPE_NORMAL
- en: The result is communication that’s more consistent, more professional, and less
    emotionally draining — without losing your authority or compassion.
  prefs: []
  type: TYPE_NORMAL
- en: Scripts for Common Tenant Scenarios
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: There are certain situations that come up again and again — and they rarely
    arrive at a convenient time. Whether it’s delays, access, reminders, or complaints,
    having a clear, well-worded message ready to go can make all the difference.
  prefs: []
  type: TYPE_NORMAL
- en: ChatGPT is especially useful in these moments. It helps you say what needs to
    be said, in a tone that’s calm and professional — even if you’re feeling the opposite.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here are a few examples of how to prompt ChatGPT for common tenant situations:'
  prefs: []
  type: TYPE_NORMAL
- en: Maintenance delay
  prefs: []
  type: TYPE_NORMAL
- en: “Write a professional message to a tenant explaining that their repair has been
    delayed due to parts availability. Reassure them it’s being followed up and give
    an estimated timeframe.”
  prefs: []
  type: TYPE_NORMAL
- en: Access notice or inspection reminder
  prefs: []
  type: TYPE_NORMAL
- en: “Write a polite message reminding the tenant about the upcoming inspection at
    [address] on [date/time], including that we require access and will use keys if
    necessary.”
  prefs: []
  type: TYPE_NORMAL
- en: Cleaning or condition reminder (pre-exit)
  prefs: []
  type: TYPE_NORMAL
- en: “Create a firm but respectful reminder to a tenant about cleaning expectations
    before they vacate. Include mention of the bond and link to a cleaning checklist.”
  prefs: []
  type: TYPE_NORMAL
- en: Responding to a complaint
  prefs: []
  type: TYPE_NORMAL
- en: “Reword this message to sound professional and non-defensive. Acknowledge the
    tenant’s concern while clarifying what we’re doing to address it.”
  prefs: []
  type: TYPE_NORMAL
- en: These situations don’t always need brand-new language — they just need the right
    message, at the right time, with the right tone. And when you’re busy, being able
    to generate a first draft quickly can save time, energy, and escalation.
  prefs: []
  type: TYPE_NORMAL
- en: ChatGPT doesn’t just help you write faster — it helps you respond more thoughtfully,
    without burning out in the process.
  prefs: []
  type: TYPE_NORMAL
- en: Balancing Authority and Warmth
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Tenant communication often requires you to strike a difficult balance. You need
    to be clear and firm — especially when you’re enforcing rules or setting boundaries
    — but you also need to come across as approachable and fair. Lean too hard in
    either direction, and the message can easily be misread.
  prefs: []
  type: TYPE_NORMAL
- en: This is where ChatGPT can help fine-tune your tone.
  prefs: []
  type: TYPE_NORMAL
- en: 'When you’re writing a message that needs to walk that line — not too soft,
    not too harsh — you can use prompts like:'
  prefs: []
  type: TYPE_NORMAL
- en: – “Rewrite this to sound polite but authoritative.”
  prefs: []
  type: TYPE_NORMAL
- en: – “Make this message firm, but not aggressive.”
  prefs: []
  type: TYPE_NORMAL
- en: – “Add warmth to this message while keeping it professional.”
  prefs: []
  type: TYPE_NORMAL
- en: – “Soften the tone slightly, but keep the key points clear.”
  prefs: []
  type: TYPE_NORMAL
- en: 'These types of tone edits can be especially helpful when: – You’re dealing
    with repeated non-compliance'
  prefs: []
  type: TYPE_NORMAL
- en: – You’re responding to emotional or accusatory messages
  prefs: []
  type: TYPE_NORMAL
- en: – You need to enforce a policy while still maintaining rapport
  prefs: []
  type: TYPE_NORMAL
- en: For example, a message reminding a tenant about their cleaning obligations doesn’t
    need to sound like a warning. It just needs to be direct, helpful, and respectful
    — and ChatGPT can help shape that tone for you.
  prefs: []
  type: TYPE_NORMAL
- en: By prompting with intention, you can communicate with consistency and confidence
    — no matter how complex or repetitive the situation. You stay in control of the
    message, while letting the tool handle the language.
  prefs: []
  type: TYPE_NORMAL
- en: The result? Messages that carry your authority, without losing your professionalism
    or your care.
  prefs: []
  type: TYPE_NORMAL
- en: Repetitive Tasks You Can Automate
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Some tenant messages are unique. Others? Not so much.
  prefs: []
  type: TYPE_NORMAL
- en: Reminders, follow-ups, inspection notices, basic maintenance replies — these
    often follow the same format, with just a few details changed. Rewriting them
    from scratch every time isn’t just inefficient — it’s exhausting.
  prefs: []
  type: TYPE_NORMAL
- en: ChatGPT is ideal for handling these repetitive tasks. You can build a small
    set of reusable prompts or message templates, and then tweak them based on the
    situation.
  prefs: []
  type: TYPE_NORMAL
- en: 'For example:'
  prefs: []
  type: TYPE_NORMAL
- en: Standard inspection reminder
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: “Write a reminder to the tenant about their upcoming routine inspection on [date/time].
    Include a request for pets to be secured and list common cleaning areas.”
  prefs: []
  type: TYPE_NORMAL
- en: Maintenance access message
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: “Draft a message for the tenant to let them know the plumber will attend on
    [day/time], and that access will be via keys unless otherwise arranged.”
  prefs: []
  type: TYPE_NORMAL
- en: Cleaning follow-up
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: “Create a polite follow-up asking the tenant to address cleaning issues found
    during a recent inspection. Make it firm but respectful.”
  prefs: []
  type: TYPE_NORMAL
- en: Bond cleaning guide
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: “Write a short message to send with a cleaning checklist for a vacating tenant.
    Keep the tone supportive and informative.”
  prefs: []
  type: TYPE_NORMAL
- en: By saving these prompt structures — or even just the final versions of well-written
    messages — you can reuse them later without needing to start fresh each time.
  prefs: []
  type: TYPE_NORMAL
- en: This doesn’t just save time. It also reduces the emotional weight of repetitive
    enforcement. You’re still doing your job — just with less back-and-forth and mental
    effort.
  prefs: []
  type: TYPE_NORMAL
- en: Handling Sensitive Topics with Care
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Some tenant messages carry more weight than others. Whether it’s a complaint
    about mould, concerns about safety, or signs that a tenant might be struggling,
    these situations call for more than just standard templates.
  prefs: []
  type: TYPE_NORMAL
- en: In these moments, the way you respond matters — not just legally, but ethically
    and emotionally. It’s important to be clear, supportive, and professional, without
    making assumptions or overstepping.
  prefs: []
  type: TYPE_NORMAL
- en: ChatGPT can help with the language, but your judgment still leads the way.
  prefs: []
  type: TYPE_NORMAL
- en: 'Examples of how you might use it include:'
  prefs: []
  type: TYPE_NORMAL
- en: Explaining steps taken to resolve a mould complaint
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: “Write a calm and factual response explaining the actions taken to address mould
    concerns, including dates of inspection, trades involved, and what’s happening
    next.”
  prefs: []
  type: TYPE_NORMAL
- en: Acknowledging hardship while maintaining policy
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: “Help me write a message that acknowledges a tenant’s financial hardship, explains
    our rent arrears policy, and outlines the next steps available to them. Keep it
    supportive and respectful.”
  prefs: []
  type: TYPE_NORMAL
- en: Checking in on tenant wellbeing
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: “Write a professional message expressing concern for a tenant’s wellbeing after
    they mentioned personal stress. Include an offer to discuss maintenance or access
    at a later time if needed.”
  prefs: []
  type: TYPE_NORMAL
- en: Referring without overpromising
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: “Write a neutral message informing a tenant that we’ve passed their concerns
    on to the property owner and will update them once we receive instructions.”
  prefs: []
  type: TYPE_NORMAL
- en: In all of these cases, your role is to respond with care and clarity — and ChatGPT
    can help you get the words right when the situation feels emotionally loaded or
    hard to navigate.
  prefs: []
  type: TYPE_NORMAL
- en: While no tool can replace real empathy, a well-worded message can go a long
    way in keeping the line of communication respectful, supportive, and calm.
  prefs: []
  type: TYPE_NORMAL
- en: Use GPT to Pause, Not React
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: One of the most useful things ChatGPT can offer isn’t just help with writing
    — it’s space to breathe.
  prefs: []
  type: TYPE_NORMAL
- en: In property management, it’s easy to fall into reactive mode. An email lands,
    and your instinct is to reply quickly — especially when someone’s upset, or you
    feel like you’re being questioned, blamed, or misunderstood. But rushed replies
    are often the ones you regret later.
  prefs: []
  type: TYPE_NORMAL
- en: ChatGPT gives you a buffer. It allows you to take your initial draft — even
    if it’s written in frustration — and ask for help refining it before you hit send.
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt examples like: – “Can you make this sound more neutral and professional?”'
  prefs: []
  type: TYPE_NORMAL
- en: – “Soften this while keeping the message firm.”
  prefs: []
  type: TYPE_NORMAL
- en: – “Rewrite this to focus on solutions, not blame.”
  prefs: []
  type: TYPE_NORMAL
- en: This moment of pause lets you shift from reacting to responding. You still control
    what’s said. You still choose the message. But you don’t have to carry the full
    weight of finding the right words, especially when emotions are running high.
  prefs: []
  type: TYPE_NORMAL
- en: Used this way, ChatGPT becomes more than a time-saver — it becomes a tool that
    protects your tone, your relationships, and your own peace of mind.
  prefs: []
  type: TYPE_NORMAL
- en: And in a role where communication never stops, that kind of support is worth
    having.
  prefs: []
  type: TYPE_NORMAL
- en: Landlord Updates & Tough Conversations
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Landlords come with a range of expectations — and in property management, you’re
    expected to meet all of them.
  prefs: []
  type: TYPE_NORMAL
- en: 'Some owners want every detail. Others barely want to be contacted. Some are
    highly experienced, while others are new, nervous, and watching every cent. Regardless
    of personality or property type, the role is the same: keep them informed, keep
    them calm, and keep things moving.'
  prefs: []
  type: TYPE_NORMAL
- en: That’s easier said than done — especially when the news isn’t good.
  prefs: []
  type: TYPE_NORMAL
- en: Whether it’s a delayed repair, a breach notice, a rent reduction, or a tribunal
    matter, delivering tough updates is part of the job. But just like with tenant
    communication, it’s not the update that takes the time — it’s figuring out how
    to say it.
  prefs: []
  type: TYPE_NORMAL
- en: The pressure to be professional, factual, firm, and reassuring — all at once
    — can turn a simple message into a 30-minute rewrite. And when you’re short on
    time or worried about a client’s reaction, it’s easy to over-explain, underplay,
    or delay sending the update altogether.
  prefs: []
  type: TYPE_NORMAL
- en: That’s where ChatGPT can offer practical, immediate help.
  prefs: []
  type: TYPE_NORMAL
- en: Not by removing the hard parts — but by helping you word them clearly, quickly,
    and confidently.
  prefs: []
  type: TYPE_NORMAL
- en: This chapter focuses on how to use ChatGPT for owner communication that’s clear,
    professional, and built to maintain trust — even when the message is hard to deliver.
  prefs: []
  type: TYPE_NORMAL
- en: Why Owner Comms Are a Balancing Act
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Communicating with landlords is rarely just about passing on information. It’s
    about protecting relationships, managing expectations, and maintaining trust —
    often while delivering updates that are incomplete, complex, or inconvenient.
  prefs: []
  type: TYPE_NORMAL
- en: Some owners want frequent updates. Others prefer silence unless something goes
    wrong. Some question every invoice. Others sign off without blinking. The variety
    alone can be exhausting — especially when you're writing updates across a portfolio,
    each one needing a slightly different tone.
  prefs: []
  type: TYPE_NORMAL
- en: 'Then there’s the pressure:'
  prefs: []
  type: TYPE_NORMAL
- en: – To sound confident, even when you’re still waiting on answers
  prefs: []
  type: TYPE_NORMAL
- en: – To be clear, but not alarmist
  prefs: []
  type: TYPE_NORMAL
- en: – To manage their frustration without taking it personally
  prefs: []
  type: TYPE_NORMAL
- en: – To explain delays without seeming disorganised
  prefs: []
  type: TYPE_NORMAL
- en: – To defend decisions you didn’t make
  prefs: []
  type: TYPE_NORMAL
- en: It’s a balancing act — and one you’re expected to walk every day, often with
    very little time to prepare.
  prefs: []
  type: TYPE_NORMAL
- en: The result? Updates get delayed. Messages get second-guessed. Or worse, they
    get rushed and create more confusion than clarity.
  prefs: []
  type: TYPE_NORMAL
- en: What you say to an owner — and how you say it — can shape how they view your
    work, your agency, and the value of professional property management as a whole.
    That’s a lot to carry in a single email.
  prefs: []
  type: TYPE_NORMAL
- en: This is where clear, well-structured communication makes all the difference.
    And where a tool like ChatGPT can help you take a breath, write faster, and maintain
    that essential balance between authority and trust.
  prefs: []
  type: TYPE_NORMAL
- en: Using ChatGPT to Clarify Complex Info
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Some updates are simple. Others are anything but.
  prefs: []
  type: TYPE_NORMAL
- en: Trying to explain a delay with trades, a back-and-forth with insurance, or the
    reason why a quote is double what the owner expected — that takes time, clarity,
    and care. And in the middle of a busy day, it’s easy to either over-explain or
    leave out key details.
  prefs: []
  type: TYPE_NORMAL
- en: This is where ChatGPT can become an efficient and reliable second set of eyes.
  prefs: []
  type: TYPE_NORMAL
- en: You can feed it the raw details — notes, call summaries, even partial drafts
    — and ask it to turn that information into a message that’s professional, structured,
    and easy for a non-technical reader to understand.
  prefs: []
  type: TYPE_NORMAL
- en: 'Examples of useful prompts include:'
  prefs: []
  type: TYPE_NORMAL
- en: – “Turn these notes into a clear update for the landlord. The issue is with
    the hot water system, and here’s what we know so far…”
  prefs: []
  type: TYPE_NORMAL
- en: – “Explain this repair quote in plain English. Keep it factual and avoid technical
    jargon.”
  prefs: []
  type: TYPE_NORMAL
- en: – “Write a message that walks the owner through two options for proceeding with
    the fence repair, including rough costs and timelines.”
  prefs: []
  type: TYPE_NORMAL
- en: 'You can also ask ChatGPT to: – Break a complex issue into steps'
  prefs: []
  type: TYPE_NORMAL
- en: – Emphasise what action has been taken so far
  prefs: []
  type: TYPE_NORMAL
- en: – Help the owner understand the risk or urgency of waiting
  prefs: []
  type: TYPE_NORMAL
- en: – Suggest a way to explain the situation without sounding alarmist
  prefs: []
  type: TYPE_NORMAL
- en: Clear communication builds confidence. When an owner understands what’s happening
    — and trusts that you’ve got it under control — they’re less likely to push back,
    escalate concerns, or fill in the gaps themselves.
  prefs: []
  type: TYPE_NORMAL
- en: ChatGPT helps you get to that clarity faster, so you can spend less time rewriting
    and more time managing what matters.
  prefs: []
  type: TYPE_NORMAL
- en: Scripts for Common Owner Situations
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Not every owner update is difficult — but the ones that are tend to take the
    most time and energy to word well. When money’s involved, urgency is high, or
    outcomes are uncertain, even experienced property managers can feel the pressure
    to get it just right.
  prefs: []
  type: TYPE_NORMAL
- en: Here are a few common scenarios where ChatGPT can help you find the right balance
    of tone, detail, and direction — quickly.
  prefs: []
  type: TYPE_NORMAL
- en: Urgent repair with unexpected cost
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: “Write a message to a landlord explaining that the blocked drain requires urgent
    repair. The quote came in higher than expected, but delaying risks further damage.
    Outline the cost and recommend proceeding.”
  prefs: []
  type: TYPE_NORMAL
- en: Rent reduction request from the tenant
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: “Help me write an owner update about a tenant who’s requested a rent reduction.
    Include their reasoning, note current market rent, and suggest next steps. Keep
    the tone neutral and informative.”
  prefs: []
  type: TYPE_NORMAL
- en: Tenant breach notification
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: “Draft a message to a landlord informing them of a tenant breach due to late
    rent and noise complaints. Be clear and professional, and explain what action
    has been taken so far.”
  prefs: []
  type: TYPE_NORMAL
- en: Tribunal preparation
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: “Summarise this issue for the owner ahead of a tribunal hearing. Include a clear
    timeline, key points of dispute, and what the likely outcomes might be.”
  prefs: []
  type: TYPE_NORMAL
- en: Explaining a delay in resolution
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: “Write a professional message explaining that we’re still waiting on a trade
    or supplier to complete a job. Reassure the owner that we’re following up and
    share any ETA we’ve been given.”
  prefs: []
  type: TYPE_NORMAL
- en: Using ChatGPT in these situations helps you move faster — but more importantly,
    it helps you stay calm and consistent. The message sounds considered, even when
    you’ve had to write it under pressure. And when the tone is right, the conversation
    that follows tends to go more smoothly too.
  prefs: []
  type: TYPE_NORMAL
- en: Tough Messages, Softened by Structure
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: When you need to deliver bad news — a costly repair, a breach, a tenancy dispute,
    or a delay — the structure of your message can make all the difference.
  prefs: []
  type: TYPE_NORMAL
- en: You don’t need to over-explain or apologise for things outside your control.
    But you do need to be clear, direct, and steady in your tone. Owners want to know
    what’s happening, what it means, and what you recommend — without having to read
    between the lines.
  prefs: []
  type: TYPE_NORMAL
- en: 'If you’re struggling to word something difficult, try using ChatGPT to shape
    the message into a three-part structure:'
  prefs: []
  type: TYPE_NORMAL
- en: 1\. Start with facts
  prefs: []
  type: TYPE_NORMAL
- en: Keep it neutral and direct. Outline what’s happened, when, and who’s involved.
  prefs: []
  type: TYPE_NORMAL
- en: 2\. Explain impact or options
  prefs: []
  type: TYPE_NORMAL
- en: Clarify what this means for the owner — cost, timing, compliance, risk — and
    what action you’ve already taken.
  prefs: []
  type: TYPE_NORMAL
- en: 3\. End with next steps
  prefs: []
  type: TYPE_NORMAL
- en: Let them know what you recommend, what you’ll do next, or what decision you
    need from them.
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt example:'
  prefs: []
  type: TYPE_NORMAL
- en: “Help me write a message to a landlord about a fence repair. The neighbour is
    pushing for a full replacement, the quote is high, and the tenant has also raised
    concerns. Keep the tone professional, and break it into facts, options, and next
    steps.”
  prefs: []
  type: TYPE_NORMAL
- en: By using this kind of structure, you stay in control of the message. You reduce
    confusion, and you show the owner that the situation is being managed — even when
    it’s messy or ongoing.
  prefs: []
  type: TYPE_NORMAL
- en: ChatGPT helps you build that structure quickly, so you don’t get stuck rewriting
    or overthinking. You just plug in the facts, ask for clarity, and send something
    that feels solid.
  prefs: []
  type: TYPE_NORMAL
- en: Quick Updates That Sound Like You
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Not every message needs to be long or carefully crafted — but even quick updates
    deserve a tone that reflects your professionalism and care.
  prefs: []
  type: TYPE_NORMAL
- en: These are the types of messages that can easily become rushed, clipped, or repetitive.
    And when you’re juggling a dozen things at once, it’s tempting to just fire off
    a one-liner and move on.
  prefs: []
  type: TYPE_NORMAL
- en: But a few extra words — the right words — can change how that message lands.
  prefs: []
  type: TYPE_NORMAL
- en: 'ChatGPT can help you draft or reword short updates that are: – Polite but efficient'
  prefs: []
  type: TYPE_NORMAL
- en: – Consistent with your usual voice
  prefs: []
  type: TYPE_NORMAL
- en: – Easy to personalise with just a few details
  prefs: []
  type: TYPE_NORMAL
- en: 'Here are some examples of how to use it:'
  prefs: []
  type: TYPE_NORMAL
- en: Routine inspection update
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: “Write a short, professional message to a landlord summarising a routine inspection.
    The property was clean, well maintained, and no issues were reported.”
  prefs: []
  type: TYPE_NORMAL
- en: Lease renewal check-in
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: “Create a friendly message to an owner letting them know the lease is up for
    renewal. Ask whether they’d like to renew or make changes, and note that the tenant
    has been reliable.”
  prefs: []
  type: TYPE_NORMAL
- en: General ‘no news’ update
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: “Write a short message to let a landlord know there’s nothing urgent to report
    this month. Keep it warm but professional.”
  prefs: []
  type: TYPE_NORMAL
- en: By having a few of these prompts or templates ready, you can turn a five-minute
    task into a one-minute task — without losing that personal touch that owners appreciate.
  prefs: []
  type: TYPE_NORMAL
- en: These kinds of updates build trust. They show consistency. And with the right
    support, they don’t have to take much out of your day.
  prefs: []
  type: TYPE_NORMAL
- en: Reassurance, Without Overpromising
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: It’s natural to want to keep owners calm — especially when things are delayed,
    uncertain, or outside your control. But there’s a fine line between reassurance
    and overpromising.
  prefs: []
  type: TYPE_NORMAL
- en: Saying “we’ll have it fixed by Friday” might feel helpful in the moment, but
    if the tradie doesn’t show up or parts are delayed, you’re left managing the fallout.
    The better approach is to communicate confidence and care — without locking yourself
    into timelines or outcomes you can’t guarantee.
  prefs: []
  type: TYPE_NORMAL
- en: ChatGPT can help you strike that balance.
  prefs: []
  type: TYPE_NORMAL
- en: 'Examples of prompt structures:'
  prefs: []
  type: TYPE_NORMAL
- en: “We’re onto it” without exact promises
  prefs: []
  type: TYPE_NORMAL
- en: “Write a message letting the owner know we’re following up on a delayed repair.
    Keep the tone calm and professional, and avoid specific promises about timing.”
  prefs: []
  type: TYPE_NORMAL
- en: Framing options clearly, without pressure
  prefs: []
  type: TYPE_NORMAL
- en: “Help me write a message offering two options for how to proceed with a quote.
    Make it clear that we’re happy to manage either, and reassure the owner that the
    property is in good hands.”
  prefs: []
  type: TYPE_NORMAL
- en: Explaining complexity without panic
  prefs: []
  type: TYPE_NORMAL
- en: “Write a message to the landlord explaining that a resolution is taking longer
    than usual due to third-party delays. Keep the tone steady and factual.”
  prefs: []
  type: TYPE_NORMAL
- en: The key is to show that the situation is being handled — even if it’s still
    in progress. You're keeping them informed, you're not ignoring the issue, and
    you're maintaining a steady, professional presence.
  prefs: []
  type: TYPE_NORMAL
- en: Reassurance isn't about having all the answers. It’s about being a consistent,
    trusted communicator — even when things are uncertain.
  prefs: []
  type: TYPE_NORMAL
- en: When to Use GPT — and When Not To
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: ChatGPT can save you time, reduce stress, and help you communicate more clearly.
    But like any tool, it works best when you know when — and when not — to use it.
  prefs: []
  type: TYPE_NORMAL
- en: 'When to use it:'
  prefs: []
  type: TYPE_NORMAL
- en: – Drafting messages you’ve written a hundred times before
  prefs: []
  type: TYPE_NORMAL
- en: – Rewording a tough update to sound more balanced
  prefs: []
  type: TYPE_NORMAL
- en: – Turning notes into a professional message
  prefs: []
  type: TYPE_NORMAL
- en: – Clarifying repairs, processes, or timelines
  prefs: []
  type: TYPE_NORMAL
- en: – Softening tone or tightening structure
  prefs: []
  type: TYPE_NORMAL
- en: – Getting a quick, clean version of something you don’t have the mental energy
    to write from scratch
  prefs: []
  type: TYPE_NORMAL
- en: 'When not to use it:'
  prefs: []
  type: TYPE_NORMAL
- en: – Legal advice or tribunal submissions that require specific compliance wording
  prefs: []
  type: TYPE_NORMAL
- en: – Owner disputes that involve internal risk or agency liability
  prefs: []
  type: TYPE_NORMAL
- en: – Complex issues where tone needs to be highly tailored
  prefs: []
  type: TYPE_NORMAL
- en: – Anything that feels ethically grey, unclear, or outside your comfort zone
    to send
  prefs: []
  type: TYPE_NORMAL
- en: – Moments that genuinely require a human touch — a phone call, a personal apology,
    or a check-in
  prefs: []
  type: TYPE_NORMAL
- en: Think of ChatGPT as a tool that takes the pressure off the writing part — not
    the relationship, not the decision-making, and not your role as a professional
    communicator.
  prefs: []
  type: TYPE_NORMAL
- en: You still decide what’s appropriate. You still make the call.
  prefs: []
  type: TYPE_NORMAL
- en: But now, you don’t have to carry every sentence alone.
  prefs: []
  type: TYPE_NORMAL
- en: Tribunal & Formal Docs
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: When things escalate, the paperwork matters.
  prefs: []
  type: TYPE_NORMAL
- en: Tribunal preparation, breach notices, formal letters, and file summaries — these
    aren’t just admin tasks. They’re legal documents, communication records, and in
    many cases, the deciding factor in how a dispute plays out.
  prefs: []
  type: TYPE_NORMAL
- en: For property managers, this kind of writing comes with pressure. The wording
    needs to be accurate, factual, and clear. The tone needs to be professional but
    not defensive. The structure needs to make sense to someone outside the day-to-day
    context — someone like a tribunal member, a landlord, or a tenant’s legal representative.
  prefs: []
  type: TYPE_NORMAL
- en: It’s not just about saying the right thing. It’s about documenting the right
    thing, in the right way.
  prefs: []
  type: TYPE_NORMAL
- en: And while you likely already use templates for many of these documents, it’s
    still up to you to adapt them. To summarise incidents. To organise facts. To tell
    the story of what happened — without bias, without missing details, and without
    adding emotional charge.
  prefs: []
  type: TYPE_NORMAL
- en: That’s where ChatGPT can help.
  prefs: []
  type: TYPE_NORMAL
- en: 'It won’t write legal advice. But it can absolutely help you: – Summarise timelines'
  prefs: []
  type: TYPE_NORMAL
- en: – Draft structured letters
  prefs: []
  type: TYPE_NORMAL
- en: – Reword formal notices
  prefs: []
  type: TYPE_NORMAL
- en: – Clarify issues for clients or team members
  prefs: []
  type: TYPE_NORMAL
- en: – Organise your thoughts into something sendable
  prefs: []
  type: TYPE_NORMAL
- en: This chapter will walk through how to use ChatGPT for the parts of your role
    where precision matters most — and how to keep your voice steady and professional,
    even when the situation is anything but.
  prefs: []
  type: TYPE_NORMAL
- en: The Pressure of Getting It Right
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: When you’re drafting a routine message or a casual update, there’s room to soften,
    adjust, or explain later. But when you’re preparing a formal letter, a breach
    notice, or tribunal documentation, the stakes are higher — and the room for error
    is smaller.
  prefs: []
  type: TYPE_NORMAL
- en: The wording has to be accurate.
  prefs: []
  type: TYPE_NORMAL
- en: The tone has to be neutral.
  prefs: []
  type: TYPE_NORMAL
- en: The facts have to be complete and clearly laid out.
  prefs: []
  type: TYPE_NORMAL
- en: And once it’s sent or submitted, it’s on the record.
  prefs: []
  type: TYPE_NORMAL
- en: That level of pressure can turn even simple tasks into drawn-out, stressful
    ones. You second-guess your phrasing. You worry about how it might be interpreted.
    You feel the weight of needing to be thorough, even when you’re short on time
    or working from incomplete notes.
  prefs: []
  type: TYPE_NORMAL
- en: 'This is especially true when: – You’re summarising a long history of issues'
  prefs: []
  type: TYPE_NORMAL
- en: – You’re dealing with conflict or complaints
  prefs: []
  type: TYPE_NORMAL
- en: – You’re preparing a file for tribunal, with no room for vagueness
  prefs: []
  type: TYPE_NORMAL
- en: – You’re issuing a breach or notice that needs to hold up if challenged
  prefs: []
  type: TYPE_NORMAL
- en: It’s not just about being professional — it’s about protecting your agency,
    your landlord, and yourself from miscommunication or dispute.
  prefs: []
  type: TYPE_NORMAL
- en: And even if you’ve written hundreds of these documents before, that pressure
    doesn’t always go away. Some cases are messier than others. Some landlords are
    more anxious. Some tenants push back on everything.
  prefs: []
  type: TYPE_NORMAL
- en: You know what needs to be said. But turning that into a well-worded, well-structured,
    legally sound document can take more time and energy than you have to spare.
  prefs: []
  type: TYPE_NORMAL
- en: That’s where having support with the writing — not the decision-making — can
    help you get it right, faster.
  prefs: []
  type: TYPE_NORMAL
- en: Using ChatGPT to Draft First Versions
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Starting is often the hardest part — especially when the issue is complex, emotional,
    or has been going on for weeks. You might have a pile of notes, a file full of
    emails, or just a vague recollection of what happened and when. But when it’s
    time to put it all into a formal document, the blinking cursor can be daunting.
  prefs: []
  type: TYPE_NORMAL
- en: This is where ChatGPT can offer immediate relief.
  prefs: []
  type: TYPE_NORMAL
- en: You can give it the key facts — even if they’re messy, out of order, or incomplete
    — and ask it to turn those into a first draft. Something to shape. Something to
    start with. Something that saves you from staring at a blank screen.
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt examples:'
  prefs: []
  type: TYPE_NORMAL
- en: Drafting a summary letter
  prefs: []
  type: TYPE_NORMAL
- en: “Write a professional summary of this issue for the landlord. The tenant has
    reported recurring leaks since March, we’ve sent three different trades, the problem
    hasn’t been fully resolved, and we’ve now requested a specialist report.”
  prefs: []
  type: TYPE_NORMAL
- en: Structuring a formal timeline
  prefs: []
  type: TYPE_NORMAL
- en: “Turn these notes into a clear, date-based timeline I can include in a tribunal
    submission. Keep it neutral and factual.”
  prefs: []
  type: TYPE_NORMAL
- en: First draft of a breach response
  prefs: []
  type: TYPE_NORMAL
- en: “Draft a formal letter in response to a tenant complaint about a breach notice.
    Acknowledge the complaint, restate the reason for the notice, and outline the
    next steps.”
  prefs: []
  type: TYPE_NORMAL
- en: You don’t need to get the language right before you prompt. You just need to
    get the facts down. ChatGPT takes those raw pieces and gives you something structured
    and professional — which you can then review, edit, and finalise.
  prefs: []
  type: TYPE_NORMAL
- en: It doesn’t replace your judgment. It just gives you a stronger starting point,
    so you can focus on accuracy and compliance — instead of getting stuck trying
    to find the first sentence.
  prefs: []
  type: TYPE_NORMAL
- en: Scripts for Tribunal-Related Documents
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Tribunal preparation is one of the most time-consuming and detail-heavy parts
    of property management. Whether you’re drafting breach notices, preparing evidence
    summaries, or writing support letters for an owner, it all takes time — and needs
    to be worded precisely.
  prefs: []
  type: TYPE_NORMAL
- en: ChatGPT can help you create structured, professional drafts for common tribunal-related
    documents, saving time while improving clarity and tone.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here are examples of how to use it in different scenarios:'
  prefs: []
  type: TYPE_NORMAL
- en: Entry dispute summary
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: “Write a factual summary of a dispute over property access. The tenant refused
    entry for a routine inspection scheduled on [date], despite being given proper
    notice. Include dates of communication and outcome.”
  prefs: []
  type: TYPE_NORMAL
- en: Tribunal timeline preparation
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: “Turn these notes into a clean, date-based timeline suitable for tribunal. Include
    dates of complaint, communication, trades attending, and actions taken by our
    agency.”
  prefs: []
  type: TYPE_NORMAL
- en: Owner briefing for upcoming tribunal
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: “Write a message to the landlord summarising the case being presented at tribunal.
    Include a timeline of events, tenant’s claims, and our position.”
  prefs: []
  type: TYPE_NORMAL
- en: Tenant complaint response
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: “Draft a response letter to a tenant’s formal complaint. Acknowledge receipt,
    outline our findings, and confirm that the matter is being prepared for tribunal
    review.”
  prefs: []
  type: TYPE_NORMAL
- en: Formal breach follow-up
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: “Write a formal follow-up message regarding a previous breach notice for noise
    complaints. Include that a second complaint has been received, reference the tenancy
    agreement clause, and explain next steps.”
  prefs: []
  type: TYPE_NORMAL
- en: These kinds of drafts don’t remove your need to review, tailor, and ensure compliance.
    But they do give you a clear, professional base to work from — so you’re not rewriting
    the same explanations or timelines from scratch, especially under pressure.
  prefs: []
  type: TYPE_NORMAL
- en: With good prompts and a clear outline, ChatGPT can help you create strong documentation
    that reflects your professionalism and protects your agency’s position.
  prefs: []
  type: TYPE_NORMAL
- en: Rewording Templates to Sound Like You
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Most agencies already use formal templates for breach notices, entry letters,
    and tribunal submissions — and for good reason. They help maintain compliance
    and consistency. But let’s be honest: a lot of those templates are clunky, outdated,
    or written in overly stiff legalese that doesn’t reflect how you actually speak
    or write.'
  prefs: []
  type: TYPE_NORMAL
- en: The result? You either send something that feels too cold, or you spend extra
    time editing it line by line so it sounds more like you.
  prefs: []
  type: TYPE_NORMAL
- en: ChatGPT can take the edge off that process.
  prefs: []
  type: TYPE_NORMAL
- en: 'Instead of rewriting your templates from scratch, you can paste them into ChatGPT
    and ask it to: – Modernise the language'
  prefs: []
  type: TYPE_NORMAL
- en: – Simplify the wording for clarity
  prefs: []
  type: TYPE_NORMAL
- en: – Rephrase to sound more natural or in line with your tone
  prefs: []
  type: TYPE_NORMAL
- en: – Adjust for different situations or tenants, while keeping the meaning consistent
  prefs: []
  type: TYPE_NORMAL
- en: 'Example prompts:'
  prefs: []
  type: TYPE_NORMAL
- en: Soften the tone without losing firmness
  prefs: []
  type: TYPE_NORMAL
- en: “Reword this breach letter to sound professional and clear, but not overly formal.
    Keep the message firm and factual.”
  prefs: []
  type: TYPE_NORMAL
- en: Make an entry notice sound more human
  prefs: []
  type: TYPE_NORMAL
- en: “Rewrite this entry notice so it’s still compliant, but sounds more like a friendly
    reminder.”
  prefs: []
  type: TYPE_NORMAL
- en: Adapt a template for a specific case
  prefs: []
  type: TYPE_NORMAL
- en: “Adjust this standard follow-up template for a situation where the tenant has
    partially addressed the issue. Keep the tone constructive.”
  prefs: []
  type: TYPE_NORMAL
- en: Simplify for clarity
  prefs: []
  type: TYPE_NORMAL
- en: “Rewrite this letter in plain English. Remove unnecessary legal jargon and keep
    it easy to understand.”
  prefs: []
  type: TYPE_NORMAL
- en: This approach helps you get the best of both worlds — the reliability of templates,
    and the flexibility to sound like a real person. When your formal communication
    feels clearer, more consistent, and more like your voice, it builds trust with
    tenants, owners, and tribunal decision-makers alike.
  prefs: []
  type: TYPE_NORMAL
- en: Organising Case Details with ChatGPT
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Tribunal prep often starts with a scramble: digging through emails, call logs,
    inspection notes, and messages trying to piece together what happened, when, and
    how it was handled. The information is there — but it’s scattered, repetitive,
    or written in shorthand that made sense at the time, but not so much now.'
  prefs: []
  type: TYPE_NORMAL
- en: This is where ChatGPT can be used like a fast, reliable assistant to help you
    clean up and organise your notes into something useful.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here’s how:'
  prefs: []
  type: TYPE_NORMAL
- en: Turn messy notes into a timeline
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: “Organise these notes into a date-based timeline I can use for tribunal. Keep
    the tone neutral and professional.”
  prefs: []
  type: TYPE_NORMAL
- en: Then paste in your rough dot points, email excerpts, or inspection follow-ups.
    ChatGPT will group and structure them clearly.
  prefs: []
  type: TYPE_NORMAL
- en: Summarise call or email records
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: “Summarise the communication history between our agency and the tenant regarding
    the broken fence. Include only key dates and decisions.”
  prefs: []
  type: TYPE_NORMAL
- en: Create a case summary for your file
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: “Write a short, factual summary of this issue I can add to the property file
    or use in tribunal. The dispute started over a bond claim, escalated with cleaning
    concerns, and was partially resolved through negotiation.”
  prefs: []
  type: TYPE_NORMAL
- en: Clarify the key points of a long thread
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: “Summarise the key events from this long email chain so I can brief my team
    or the landlord.”
  prefs: []
  type: TYPE_NORMAL
- en: These tasks often take longer than they should — not because they’re difficult,
    but because they require structure and headspace you don’t always have at the
    end of a long day.
  prefs: []
  type: TYPE_NORMAL
- en: 'ChatGPT helps you cut through the noise, build the backbone of your documentation,
    and get back to what matters: accuracy, consistency, and peace of mind that your
    files are in order.'
  prefs: []
  type: TYPE_NORMAL
- en: Building a Formal Writing Toolkit
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Formal writing doesn’t have to feel like starting from scratch every time. In
    fact, many of the same situations — tenant breaches, delayed repairs, owner updates,
    complaint responses — show up again and again, just with different details.
  prefs: []
  type: TYPE_NORMAL
- en: By building a small toolkit of ChatGPT prompts and draft templates, you can
    streamline your response process, reduce errors, and spend less time second-guessing
    how to say things.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here’s what to include in your toolkit:'
  prefs: []
  type: TYPE_NORMAL
- en: Go-to prompts for common scenarios
  prefs: []
  type: TYPE_NORMAL
- en: 'These can live in a shared doc, email draft folder, or prompt bank. A few examples:
    – “Summarise this issue into a tribunal-ready timeline.”'
  prefs: []
  type: TYPE_NORMAL
- en: – “Draft a formal breach notice for repeated late rent payments.”
  prefs: []
  type: TYPE_NORMAL
- en: – “Reword this template to sound firm but respectful.”
  prefs: []
  type: TYPE_NORMAL
- en: – “Create a clear, factual update for the landlord about tenant damage.”
  prefs: []
  type: TYPE_NORMAL
- en: Ready-to-adapt templates
  prefs: []
  type: TYPE_NORMAL
- en: Take well-written outputs from ChatGPT and save them for future use. Replace
    key details with placeholders so you can quickly plug in specifics.
  prefs: []
  type: TYPE_NORMAL
- en: 'Example:'
  prefs: []
  type: TYPE_NORMAL
- en: '[Tenant name] was issued a breach notice on [date] due to [issue]. Communication
    was made via [method] and logged on [system]. The tenant has [response/outcome].'
  prefs: []
  type: TYPE_NORMAL
- en: Tone-adjustment requests
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt ChatGPT to adjust tone based on the audience or situation: – “Make this
    less formal, but still professional.”'
  prefs: []
  type: TYPE_NORMAL
- en: – “Soften this message for a tenant who’s been cooperative.”
  prefs: []
  type: TYPE_NORMAL
- en: – “Make this sound steady and confident for a tribunal submission.”
  prefs: []
  type: TYPE_NORMAL
- en: Pre-built tribunal response structures
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompts that help you organise complex cases: – “Help me explain this issue
    using a facts > impact > action structure.”'
  prefs: []
  type: TYPE_NORMAL
- en: – “Turn these points into a formal summary, written in third person.”
  prefs: []
  type: TYPE_NORMAL
- en: Having this toolkit ready doesn’t just save time — it helps you stay calm and
    clear-headed when a difficult situation lands on your desk. The writing becomes
    less of a bottleneck, and more of a process you can trust.
  prefs: []
  type: TYPE_NORMAL
- en: Know When to Edit or Escalate
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: ChatGPT is a helpful tool — but it’s not a legal expert, and it doesn’t know
    your agency’s policies, procedures, or risk tolerance. It can give you a well-worded
    draft, but the responsibility for what you send still sits with you.
  prefs: []
  type: TYPE_NORMAL
- en: That’s why it’s important to treat every output as a first version, not a final
    answer.
  prefs: []
  type: TYPE_NORMAL
- en: 'Always review formal documents carefully before sending or submitting. Make
    sure: – The facts are correct'
  prefs: []
  type: TYPE_NORMAL
- en: – The tone matches the situation
  prefs: []
  type: TYPE_NORMAL
- en: – The wording aligns with your agency’s policies
  prefs: []
  type: TYPE_NORMAL
- en: – The language complies with local legislation and tribunal standards
  prefs: []
  type: TYPE_NORMAL
- en: And if something feels uncertain — legally, ethically, or strategically — don’t
    rely on ChatGPT to resolve it. That’s a moment to pause and check in with your
    team leader, senior PM, or legal support.
  prefs: []
  type: TYPE_NORMAL
- en: Use ChatGPT to take the pressure off writing, structure your thoughts, and help
    you communicate clearly. But don’t hand over the responsibility for decisions
    that require human judgment and real-world understanding.
  prefs: []
  type: TYPE_NORMAL
- en: When you know where GPT fits — and where it doesn’t — you can use it with confidence.
    Not as a shortcut to avoid thinking, but as a support tool that helps you do your
    job better, faster, and with less stress.
  prefs: []
  type: TYPE_NORMAL
- en: That’s the real value.
  prefs: []
  type: TYPE_NORMAL
- en: Inspection Scripts & Reports
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'Inspections are one of the most routine — and most time-consuming — parts of
    property management. The physical process is familiar: attend, observe, photograph,
    note. But the writing that follows? That’s where things can slow you down.'
  prefs: []
  type: TYPE_NORMAL
- en: Turning your notes into a clear, consistent update that sounds professional
    and makes sense to the landlord takes time. Especially when you’re tired, behind,
    or staring down a pile of reports that all need slightly different wording but
    basically say the same thing.
  prefs: []
  type: TYPE_NORMAL
- en: It’s not that the writing is hard. It’s that it’s constant. And when you’ve
    got multiple inspections to report on — all while juggling everything else — even
    the simplest summary can become a mental roadblock.
  prefs: []
  type: TYPE_NORMAL
- en: That’s where ChatGPT can give you back some breathing room.
  prefs: []
  type: TYPE_NORMAL
- en: This chapter is all about using GPT to help you speed up your reporting, avoid
    repetitive phrasing, and communicate clearly with both landlords and tenants —
    all while keeping your tone consistent and your professionalism intact.
  prefs: []
  type: TYPE_NORMAL
- en: Whether you’re writing a quick summary or a more detailed note, you don’t need
    to start from scratch every time. And you don’t have to do it all in your head.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s look at how to make inspection writing easier, faster, and more consistent
    — with just a few prompts.
  prefs: []
  type: TYPE_NORMAL
- en: Inspection Writing is Repetitive — and Draining
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: There’s no question that inspections are part of the job. Routine, entry, exit
    — they happen every week, sometimes every day. And while the process of attending
    a property might be second nature by now, the writing that comes afterward can
    feel like it never ends.
  prefs: []
  type: TYPE_NORMAL
- en: The notes are often the same. The language is familiar. The issues repeat. But
    the expectations don’t change — your reports still need to be clear, accurate,
    and professional, every single time.
  prefs: []
  type: TYPE_NORMAL
- en: That’s where the drain sets in.
  prefs: []
  type: TYPE_NORMAL
- en: 'Because even though the content is similar, you still have to: – Describe it
    in your own words'
  prefs: []
  type: TYPE_NORMAL
- en: – Avoid sounding like a copy-paste robot
  prefs: []
  type: TYPE_NORMAL
- en: – Adjust tone depending on the condition, the tenant, or the landlord
  prefs: []
  type: TYPE_NORMAL
- en: – Remember who needs detail and who just wants a one-paragraph summary
  prefs: []
  type: TYPE_NORMAL
- en: It’s not difficult work — but it is mentally tiring, especially when it’s done
    at the end of a long day, in a rush between appointments, or stacked up in bulk
    after a busy week.
  prefs: []
  type: TYPE_NORMAL
- en: And often, it’s invisible work. The part no one sees. The bit that keeps getting
    pushed to the bottom of your to-do list — until you realise you’re days behind
    and scrambling to catch up.
  prefs: []
  type: TYPE_NORMAL
- en: The truth is, inspection writing doesn’t just take time.
  prefs: []
  type: TYPE_NORMAL
- en: It takes headspace . And when that’s already in short supply, even a quick summary
    can feel like a slog.
  prefs: []
  type: TYPE_NORMAL
- en: This is where ChatGPT becomes more than a tool — it becomes a way to reduce
    friction in your workflow. Not by taking over your reports, but by helping you
    get to the final version faster, with less fatigue and more consistency.
  prefs: []
  type: TYPE_NORMAL
- en: Using ChatGPT for Inspection Report Summaries
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: When you’re short on time or mental energy, even writing a simple inspection
    summary can feel like a drag. You’ve already done the work — walked through the
    property, taken notes, snapped photos. But now you’ve got to turn that into a
    professional update that sounds clear, consistent, and not like every other report
    you’ve written this week.
  prefs: []
  type: TYPE_NORMAL
- en: This is where ChatGPT can step in and save you serious time.
  prefs: []
  type: TYPE_NORMAL
- en: 'You can give it: – Bullet points from your inspection'
  prefs: []
  type: TYPE_NORMAL
- en: – Room-by-room notes
  prefs: []
  type: TYPE_NORMAL
- en: – A rough draft you've jotted down
  prefs: []
  type: TYPE_NORMAL
- en: – Voice-to-text transcriptions from site
  prefs: []
  type: TYPE_NORMAL
- en: And ask it to turn that into a finished paragraph, email, or report section.
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt example:'
  prefs: []
  type: TYPE_NORMAL
- en: '“Turn these inspection notes into a short, professional summary for the owner.
    Keep the tone neutral and factual:'
  prefs: []
  type: TYPE_NORMAL
- en: '– Kitchen: clean, no damage'
  prefs: []
  type: TYPE_NORMAL
- en: '– Bathroom: small patch of mould starting on ceiling'
  prefs: []
  type: TYPE_NORMAL
- en: '– Living room: minor scuff marks on walls'
  prefs: []
  type: TYPE_NORMAL
- en: – Tenant present, raised no concerns”
  prefs: []
  type: TYPE_NORMAL
- en: 'ChatGPT can also help you: – Adjust the tone depending on the property or client'
  prefs: []
  type: TYPE_NORMAL
- en: – Remove repetitive phrasing (e.g. “clean and tidy” five times in a row)
  prefs: []
  type: TYPE_NORMAL
- en: – Highlight only the most important points
  prefs: []
  type: TYPE_NORMAL
- en: – Keep the message consistent with your usual style
  prefs: []
  type: TYPE_NORMAL
- en: You’re still the one doing the inspection.
  prefs: []
  type: TYPE_NORMAL
- en: You’re still responsible for accuracy and detail.
  prefs: []
  type: TYPE_NORMAL
- en: But now, instead of spending fifteen minutes crafting a three-line summary,
    you can paste your notes, review the output, tweak if needed — and move on.
  prefs: []
  type: TYPE_NORMAL
- en: It’s not about cutting corners. It’s about cutting down the friction.
  prefs: []
  type: TYPE_NORMAL
- en: Because when inspection writing gets easier, everything else does too.
  prefs: []
  type: TYPE_NORMAL
- en: 'Phrasing Help: Say It Differently Without Overthinking'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: There are only so many ways to say “clean and tidy.”
  prefs: []
  type: TYPE_NORMAL
- en: Or “no visible damage.”
  prefs: []
  type: TYPE_NORMAL
- en: Or “generally well maintained.”
  prefs: []
  type: TYPE_NORMAL
- en: When you’re writing multiple inspection reports in a week — or even in a day
    — it’s easy to fall into the habit of repeating the same phrases over and over.
    And while there's nothing wrong with a bit of consistency, too much repetition
    can make your reports sound templated, rushed, or impersonal.
  prefs: []
  type: TYPE_NORMAL
- en: You don’t need flowery language. But you do need variety — especially if you
    want your communication to feel fresh, thoughtful, and professionally written.
  prefs: []
  type: TYPE_NORMAL
- en: This is exactly the kind of task ChatGPT is perfect for.
  prefs: []
  type: TYPE_NORMAL
- en: 'You can ask it things like: – “Give me five different ways to say ‘clean and
    tidy’ in a routine inspection report.”'
  prefs: []
  type: TYPE_NORMAL
- en: – “How else can I describe a room that’s well maintained, with no issues?”
  prefs: []
  type: TYPE_NORMAL
- en: – “What’s a more neutral way to say ‘a little messy, but not a problem’?”
  prefs: []
  type: TYPE_NORMAL
- en: 'You can also take a sentence you’ve written and ask GPT to rewrite it: – “Reword
    this to sound more natural: ‘The premises presented in a satisfactory manner.’”'
  prefs: []
  type: TYPE_NORMAL
- en: '– “Make this sentence sound less formal but still professional: ‘Tenant continues
    to maintain the property in accordance with expectations.’”'
  prefs: []
  type: TYPE_NORMAL
- en: By building up a small bank of alternative phrases — or letting GPT offer variations
    on the fly — you can keep your reports from sounding stale, without having to
    overthink every line.
  prefs: []
  type: TYPE_NORMAL
- en: It’s a simple shift, but it makes your writing feel more considered — and more
    human. And in a role built on communication, that’s always worth the extra few
    seconds.
  prefs: []
  type: TYPE_NORMAL
- en: 'Tone Matters: Tailoring Reports for Tenants vs. Owners'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The information in your inspection reports might be the same — but the way you
    say it often isn’t.
  prefs: []
  type: TYPE_NORMAL
- en: What you send to an owner is usually factual, investment-focused, and geared
    toward risk or maintenance. What you say to a tenant might cover similar ground,
    but the tone needs to be more collaborative, respectful, and often a little softer.
  prefs: []
  type: TYPE_NORMAL
- en: Owners want reassurance that their property is being looked after.
  prefs: []
  type: TYPE_NORMAL
- en: Tenants want to know they’re not being unfairly judged or micromanaged.
  prefs: []
  type: TYPE_NORMAL
- en: If the tone doesn’t match the audience, the message can miss the mark — or worse,
    cause unnecessary friction.
  prefs: []
  type: TYPE_NORMAL
- en: ChatGPT can help you adjust tone quickly, without rewriting from scratch.
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt examples:'
  prefs: []
  type: TYPE_NORMAL
- en: 'For owner-facing updates:'
  prefs: []
  type: TYPE_NORMAL
- en: “Write a routine inspection summary for the landlord. The tenant is maintaining
    the property well. Include light scuff marks on the hallway wall and a minor mould
    patch in the bathroom ceiling. Keep the tone factual and professional.”
  prefs: []
  type: TYPE_NORMAL
- en: 'For tenant-facing follow-up:'
  prefs: []
  type: TYPE_NORMAL
- en: “Write a message to the tenant thanking them for access during the routine inspection.
    Mention the small amount of mould in the bathroom and the scuff marks in the hallway.
    Keep the tone respectful and friendly, and include a request to monitor or address
    these items.”
  prefs: []
  type: TYPE_NORMAL
- en: 'You can also ask ChatGPT to: – Soften or neutralise your tone if it sounds
    too formal'
  prefs: []
  type: TYPE_NORMAL
- en: – Reframe a note so it sounds less like a judgment
  prefs: []
  type: TYPE_NORMAL
- en: – Adjust your language for different reading levels or personalities
  prefs: []
  type: TYPE_NORMAL
- en: Getting the tone right helps build trust, prevent conflict, and show that you’re
    not just ticking boxes — you’re communicating with care and purpose.
  prefs: []
  type: TYPE_NORMAL
- en: And when you’re juggling a dozen reports with different people at the other
    end? That little bit of help goes a long way.
  prefs: []
  type: TYPE_NORMAL
- en: After-Inspection Emails Made Easy
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Once the inspection is done and the report is written, there’s still one more
    step: letting people know.'
  prefs: []
  type: TYPE_NORMAL
- en: That might mean emailing the landlord with a summary and attachments, following
    up with a tenant about cleaning or repairs, or just sending a quick “all clear.”
    These messages aren’t hard — but they’re yet another thing to word, format, and
    send. And at the end of a long day of appointments, even a quick email can feel
    like one task too many.
  prefs: []
  type: TYPE_NORMAL
- en: ChatGPT makes this part faster and easier, without sacrificing clarity or professionalism.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here are some example prompts you can use:'
  prefs: []
  type: TYPE_NORMAL
- en: 'For landlords:'
  prefs: []
  type: TYPE_NORMAL
- en: “Write a short email to the owner after a routine inspection. The property was
    generally well maintained, with a small patch of mould in the bathroom noted for
    monitoring. Attach report.”
  prefs: []
  type: TYPE_NORMAL
- en: 'For tenants:'
  prefs: []
  type: TYPE_NORMAL
- en: “Draft a polite message to the tenant thanking them for allowing access. Mention
    that the inspection has been completed, and ask them to address minor cleaning
    issues in the kitchen and bathroom.”
  prefs: []
  type: TYPE_NORMAL
- en: 'All-clear update:'
  prefs: []
  type: TYPE_NORMAL
- en: “Write a quick message confirming that no issues were found during the inspection,
    and no action is required at this time. Keep it warm and professional.”
  prefs: []
  type: TYPE_NORMAL
- en: 'Flagging concerns respectfully:'
  prefs: []
  type: TYPE_NORMAL
- en: “Create a message to a tenant outlining a few concerns noted during the inspection
    — light damage to a bedroom wall, kitchen not cleaned to expected standard. Keep
    tone constructive and respectful.”
  prefs: []
  type: TYPE_NORMAL
- en: You can generate short or long versions, depending on what the situation calls
    for. And once you’ve used a few, you can save the ones that work best and reuse
    them later — with just a few details swapped out.
  prefs: []
  type: TYPE_NORMAL
- en: The goal isn’t to make inspections impersonal — it’s to make communication smoother.
    And when this part flows more easily, your whole workflow does too.
  prefs: []
  type: TYPE_NORMAL
- en: Build Your Own Inspection Prompt Bank
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: If inspections are part of your weekly rhythm, then so is writing about them.
    And while every property is a little different, the structure and language you
    need is often the same.
  prefs: []
  type: TYPE_NORMAL
- en: That’s why it’s worth creating your own small bank of prompts — a set of go-to
    instructions you can feed into ChatGPT whenever you need to write fast, sound
    professional, and keep things consistent.
  prefs: []
  type: TYPE_NORMAL
- en: Think of it as your own AI-powered cheat sheet.
  prefs: []
  type: TYPE_NORMAL
- en: Nothing fancy. Just practical, repeatable, and ready when you are.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here’s what to include:'
  prefs: []
  type: TYPE_NORMAL
- en: Routine inspection summary
  prefs: []
  type: TYPE_NORMAL
- en: “Turn these dot points into a short, professional inspection update for the
    landlord. Keep the tone factual and neutral.”
  prefs: []
  type: TYPE_NORMAL
- en: Entry or exit inspection wrap-up
  prefs: []
  type: TYPE_NORMAL
- en: “Summarise this inspection for the landlord, including property condition, any
    damage, and whether cleaning meets expectations. Keep it concise and clear.”
  prefs: []
  type: TYPE_NORMAL
- en: Cleaning or repair follow-up for tenants
  prefs: []
  type: TYPE_NORMAL
- en: “Write a respectful message to the tenant asking them to address specific items
    found during the inspection. Keep tone constructive and helpful.”
  prefs: []
  type: TYPE_NORMAL
- en: Room-by-room phrasing variations
  prefs: []
  type: TYPE_NORMAL
- en: '“Give me three alternative ways to say:'
  prefs: []
  type: TYPE_NORMAL
- en: – kitchen is clean and tidy
  prefs: []
  type: TYPE_NORMAL
- en: – minor scuff marks on walls
  prefs: []
  type: TYPE_NORMAL
- en: – tenant is maintaining property well”
  prefs: []
  type: TYPE_NORMAL
- en: After-inspection emails
  prefs: []
  type: TYPE_NORMAL
- en: “Draft a short email to the owner with the inspection summary and report attached.
    Mention any key issues and next steps.”
  prefs: []
  type: TYPE_NORMAL
- en: Start with a few you use most often and build from there. You can keep them
    in a notes app, Google Doc, email template folder — wherever’s easy to access
    when you need it.
  prefs: []
  type: TYPE_NORMAL
- en: The more you use them, the faster you’ll work — and the less time you’ll spend
    rewriting the same sentences every week.
  prefs: []
  type: TYPE_NORMAL
- en: It’s not about being robotic.
  prefs: []
  type: TYPE_NORMAL
- en: It’s about giving your brain a break — and still showing up polished and professional,
    every single time.
  prefs: []
  type: TYPE_NORMAL
- en: Marketing, Listings & Social Captions
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Marketing might not be the main part of your role — but if you’re a property
    manager, chances are you’re doing more of it than you realise.
  prefs: []
  type: TYPE_NORMAL
- en: You’re writing listing descriptions. You’re posting property updates. You’re
    fielding enquiries and representing your agency’s voice in every message you send.
    And somewhere between the inspections, maintenance, and lease renewals, you’re
    also expected to sound polished, persuasive, and on-brand.
  prefs: []
  type: TYPE_NORMAL
- en: The problem? Marketing tasks often come last — or get done in a rush, when your
    head’s full of everything else. You don’t have time to write the “perfect” listing.
    You’re tired of captioning the same kind of property over and over. You just want
    the right words to come more easily, without eating up your day.
  prefs: []
  type: TYPE_NORMAL
- en: That’s where ChatGPT becomes more than a time-saver — it becomes your backup
    creative team.
  prefs: []
  type: TYPE_NORMAL
- en: Whether you’re drafting a property listing, refreshing your agency bio, or just
    trying to post something useful on socials, GPT can help you write faster, sound
    sharper, and keep your marketing comms moving — even when you’re short on ideas
    or energy.
  prefs: []
  type: TYPE_NORMAL
- en: This chapter is all about those in-between moments. The quick blurbs. The sticky
    sentences. The copywriting tasks that don’t seem like a big deal until they’re
    clogging up your to-do list.
  prefs: []
  type: TYPE_NORMAL
- en: You don’t have to be a marketer.
  prefs: []
  type: TYPE_NORMAL
- en: You just need a little support to get the words flowing — and that’s exactly
    what this chapter will give you.
  prefs: []
  type: TYPE_NORMAL
- en: Why Marketing Still Lands on Your Desk
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: You didn’t sign up to be a copywriter. But here you are — writing property descriptions,
    replying to enquiry emails, drafting social posts, and somehow speaking on behalf
    of your agency, the landlord, and the brand all at once.
  prefs: []
  type: TYPE_NORMAL
- en: It’s not that you’re bad at it. It’s just that no one ever told you how much
    writing this role would involve — let alone how much of it would fall into the
    marketing bucket.
  prefs: []
  type: TYPE_NORMAL
- en: 'In smaller teams, the PM often ends up being the one who: – Writes the listing
    when the leasing team is flat out'
  prefs: []
  type: TYPE_NORMAL
- en: – Sends the campaign emails to landlords
  prefs: []
  type: TYPE_NORMAL
- en: – Uploads last-minute copy into portals
  prefs: []
  type: TYPE_NORMAL
- en: – Posts a social update because “you’ve got the photos already”
  prefs: []
  type: TYPE_NORMAL
- en: Even in larger agencies, you might still be asked to “just tidy up” a listing,
    “word this nicely for the website,” or “shoot through a caption for this week’s
    post.” And while none of these tasks are huge, they all take headspace — and they
    all involve writing.
  prefs: []
  type: TYPE_NORMAL
- en: Marketing often lands on your desk not because you’re the expert, but because
    you’re the one closest to the property. The one who’s already writing everything
    else. The one who knows what’s going on.
  prefs: []
  type: TYPE_NORMAL
- en: And that’s fine — until it starts feeling like one more invisible job you have
    to juggle on top of everything else.
  prefs: []
  type: TYPE_NORMAL
- en: The good news? You don’t need to be a full-time marketer to handle these tasks
    well.
  prefs: []
  type: TYPE_NORMAL
- en: You just need the right kind of help — and a few smart prompts to get things
    done faster, with less overthinking and more consistency.
  prefs: []
  type: TYPE_NORMAL
- en: Using ChatGPT for Property Listings
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: A good property listing sounds clear, appealing, and specific — without being
    over the top or full of clichés. But when you’re under pressure, low on time,
    or just trying to get it live, writing that kind of listing can feel harder than
    it should.
  prefs: []
  type: TYPE_NORMAL
- en: It’s not that you don’t know what to say. You’ve seen the property. You know
    the layout. You know what features matter. But turning all of that into a polished,
    readable paragraph that sounds fresh (and not like the last five listings you
    wrote) takes time and mental energy.
  prefs: []
  type: TYPE_NORMAL
- en: ChatGPT can take the weight off — fast.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here’s how you can use it:'
  prefs: []
  type: TYPE_NORMAL
- en: Start with your rough notes or bullet points
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: '“Write a property listing for a two-bedroom, one-bathroom apartment in Newtown.
    Include: high ceilings, timber floors, balcony, internal laundry, and a renovated
    kitchen. Walking distance to shops and transport. Pet-friendly. Keep the tone
    warm and professional.”'
  prefs: []
  type: TYPE_NORMAL
- en: Reword or refresh a stale listing
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: “Rewrite this listing to sound more modern and engaging. Avoid clichés like
    ‘won’t last long’ or ‘perfect for first-home buyers.’”
  prefs: []
  type: TYPE_NORMAL
- en: Create different versions for different audiences
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: '“Write two versions of this listing: one for a rental portal (keep it concise
    and factual), and one for social media (more casual and engaging).”'
  prefs: []
  type: TYPE_NORMAL
- en: Highlight standout features
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: “This property has a standout kitchen and great outdoor space — help me write
    a listing that focuses on those two features.”
  prefs: []
  type: TYPE_NORMAL
- en: 'ChatGPT can also help with: – Editing long listings down to the essentials'
  prefs: []
  type: TYPE_NORMAL
- en: – Fixing awkward phrasing or formatting
  prefs: []
  type: TYPE_NORMAL
- en: – Making listings sound less robotic and more natural
  prefs: []
  type: TYPE_NORMAL
- en: You still need to check the details and make sure it reflects the property accurately.
    But you no longer have to stare at a blank screen or rewrite the same phrases
    again and again.
  prefs: []
  type: TYPE_NORMAL
- en: You just need a good starting point — and that’s exactly what GPT gives you.
  prefs: []
  type: TYPE_NORMAL
- en: Creating Social Media Captions (Without Blank Page Panic)
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: You’ve got a property photo. Maybe a video. A bit of info about the listing.
    And now you’re supposed to turn that into a clever, clickable caption.
  prefs: []
  type: TYPE_NORMAL
- en: Cue the blank page panic.
  prefs: []
  type: TYPE_NORMAL
- en: The pressure to sound professional and interesting — without being cheesy or
    repetitive — can make even a short caption feel like a big task. Especially when
    you’re posting quickly between inspections, or trying to “keep the algorithm happy”
    with consistent updates.
  prefs: []
  type: TYPE_NORMAL
- en: This is exactly where ChatGPT shines.
  prefs: []
  type: TYPE_NORMAL
- en: Instead of starting from scratch, you can give it a few details and ask it to
    create captions you can copy, paste, or tweak in seconds.
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt examples:'
  prefs: []
  type: TYPE_NORMAL
- en: Basic listing caption
  prefs: []
  type: TYPE_NORMAL
- en: “Write a short, engaging caption for a 2-bedroom rental in Brunswick with a
    sunny courtyard and off-street parking. Keep the tone upbeat and professional.”
  prefs: []
  type: TYPE_NORMAL
- en: Caption for a just-leased property
  prefs: []
  type: TYPE_NORMAL
- en: “Create a short caption to announce a recently leased property in Southbank.
    Thank the tenants and invite other applicants to get in touch.”
  prefs: []
  type: TYPE_NORMAL
- en: Promotional post for your agency
  prefs: []
  type: TYPE_NORMAL
- en: “Write a friendly Instagram caption explaining why regular routine inspections
    are part of quality property management. Include a light CTA.”
  prefs: []
  type: TYPE_NORMAL
- en: Tone tweaks
  prefs: []
  type: TYPE_NORMAL
- en: 'You can ask GPT to make a caption more casual, punchier, or tailored for different
    platforms: – “Make this sound more relaxed for Facebook.”'
  prefs: []
  type: TYPE_NORMAL
- en: – “Turn this into a short LinkedIn post.”
  prefs: []
  type: TYPE_NORMAL
- en: – “Add emojis without making it cringey.”
  prefs: []
  type: TYPE_NORMAL
- en: Captions don’t need to be perfect — they just need to get posted.
  prefs: []
  type: TYPE_NORMAL
- en: And with ChatGPT on standby, that part of the job doesn’t have to take more
    than a minute or two.
  prefs: []
  type: TYPE_NORMAL
- en: 'Tone: Keeping it Professional but Personable'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Tone can make or break how your marketing reads — especially in real estate,
    where you’re speaking to a wide mix of people: landlords, tenants, prospective
    applicants, and future clients.'
  prefs: []
  type: TYPE_NORMAL
- en: Go too formal, and your posts sound stiff or generic.
  prefs: []
  type: TYPE_NORMAL
- en: Go too casual, and they risk sounding unprofessional or off-brand.
  prefs: []
  type: TYPE_NORMAL
- en: Get it just right, and you build trust — without trying too hard.
  prefs: []
  type: TYPE_NORMAL
- en: 'Most PMs already know how they want to sound: professional, warm, confident,
    and clear. But getting the tone right every time — especially when you''re in
    a hurry — can be hard to sustain.'
  prefs: []
  type: TYPE_NORMAL
- en: ChatGPT can help you keep your tone consistent across listings, captions, emails,
    and web copy. You can train it to reflect your agency’s voice, or your own, with
    just a few simple instructions.
  prefs: []
  type: TYPE_NORMAL
- en: 'Try prompts like: – “Rewrite this listing to sound friendly and confident,
    not salesy.”'
  prefs: []
  type: TYPE_NORMAL
- en: – “Make this social media caption sound helpful, not pushy.”
  prefs: []
  type: TYPE_NORMAL
- en: – “Tidy up this email so it sounds clear and professional but not overly formal.”
  prefs: []
  type: TYPE_NORMAL
- en: – “Reword this so it’s a little warmer, without losing authority.”
  prefs: []
  type: TYPE_NORMAL
- en: 'You can even describe the vibe you’re going for: – “We aim for a ‘calm and
    capable’ tone in our agency communications.”'
  prefs: []
  type: TYPE_NORMAL
- en: – “I want this to sound like someone who knows what they’re doing, but still
    speaks like a real person.”
  prefs: []
  type: TYPE_NORMAL
- en: The best part? Once you find a tone that works, you can start saving those prompts
    or phrases — and reuse them to keep your messaging consistent, no matter who’s
    writing it.
  prefs: []
  type: TYPE_NORMAL
- en: You’re not trying to sound clever. You’re trying to sound like you .
  prefs: []
  type: TYPE_NORMAL
- en: And GPT can help you do that — faster, easier, and with less second-guessing.
  prefs: []
  type: TYPE_NORMAL
- en: Marketing to Landlords (Without the Sales Ick)
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: If the idea of “selling yourself” makes you cringe, you’re not alone.
  prefs: []
  type: TYPE_NORMAL
- en: Most property managers aren’t trying to be marketers — they just want to show
    that they’re capable, reliable, and doing their job well. But when it comes to
    attracting new landlords or strengthening relationships with current ones, a little
    bit of marketing often falls on your shoulders.
  prefs: []
  type: TYPE_NORMAL
- en: The good news? It doesn’t have to feel pushy, scripted, or salesy.
  prefs: []
  type: TYPE_NORMAL
- en: You don’t need slick taglines or perfect branding.
  prefs: []
  type: TYPE_NORMAL
- en: You just need to sound clear, trustworthy, and like someone a landlord would
    want on their side.
  prefs: []
  type: TYPE_NORMAL
- en: This is where ChatGPT can help you write with confidence — without the “ick.”
  prefs: []
  type: TYPE_NORMAL
- en: 'Try prompts like:'
  prefs: []
  type: TYPE_NORMAL
- en: Explaining your services simply
  prefs: []
  type: TYPE_NORMAL
- en: “Write a short, professional paragraph explaining what a property manager actually
    does for a landlord. Make it clear and reassuring.”
  prefs: []
  type: TYPE_NORMAL
- en: Email to a potential landlord
  prefs: []
  type: TYPE_NORMAL
- en: “Draft a friendly email to a landlord who’s enquired about our services. Keep
    the tone helpful, confident, and low-pressure.”
  prefs: []
  type: TYPE_NORMAL
- en: Social post that educates landlords
  prefs: []
  type: TYPE_NORMAL
- en: “Write an Instagram caption that explains why thorough tenant screening protects
    both the tenant and the landlord. Make it informative and human.”
  prefs: []
  type: TYPE_NORMAL
- en: Explaining value without hype
  prefs: []
  type: TYPE_NORMAL
- en: “Help me write a short paragraph that explains the benefit of regular inspections
    from a landlord’s perspective. Keep it warm and grounded, not salesy.”
  prefs: []
  type: TYPE_NORMAL
- en: 'You can also use ChatGPT to reword things you’ve already written: – “Make this
    sound a little more confident.”'
  prefs: []
  type: TYPE_NORMAL
- en: – “Take out the corporate jargon and keep it real.”
  prefs: []
  type: TYPE_NORMAL
- en: – “Soften this — I don’t want it to sound like a pitch.”
  prefs: []
  type: TYPE_NORMAL
- en: The goal isn’t to be persuasive — it’s to be clear and credible.
  prefs: []
  type: TYPE_NORMAL
- en: When your marketing sounds like a conversation, not a sales job, people pay
    attention. And with the right words on hand, that becomes a whole lot easier to
    do.
  prefs: []
  type: TYPE_NORMAL
- en: Templates to Save Time Across Platforms
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Whether you’re writing a listing, a caption, an email, or a quick update — starting
    from scratch every time is exhausting. And the truth is, you don’t need to.
  prefs: []
  type: TYPE_NORMAL
- en: Most of what you write day to day follows similar patterns. Same structure.
    Similar tone. A handful of details that change. Once you know what works, you
    can create a few go-to templates and prompts to reuse again and again — and ChatGPT
    can help you build them.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here’s how to set up a simple, flexible toolkit:'
  prefs: []
  type: TYPE_NORMAL
- en: 1\. Listing Description Starter
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: “Write a 2-3 sentence listing description for a [number]-bedroom, [number]-bathroom
    [house/apartment] in [suburb], featuring [list key features]. Keep it warm and
    professional.”
  prefs: []
  type: TYPE_NORMAL
- en: 2\. Social Caption Builder
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: “Create a short, engaging Instagram caption for a rental property with [feature
    1], [feature 2], and [feature 3]. Include a light call to action and friendly
    tone.”
  prefs: []
  type: TYPE_NORMAL
- en: 3\. Just-Leased or Just-Listed Post
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: “Write a quick caption to announce a newly leased property. Keep it short, upbeat,
    and include a line about contacting us for similar listings.”
  prefs: []
  type: TYPE_NORMAL
- en: 4\. Email to New Landlord Enquiry
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: “Draft an email to a potential landlord explaining our services briefly and
    offering a time to chat. Keep the tone confident and helpful.”
  prefs: []
  type: TYPE_NORMAL
- en: 5\. Educator Post for Landlords
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: “Write a caption that explains why routine inspections benefit landlords. Keep
    it informative and calm, with no sales push.”
  prefs: []
  type: TYPE_NORMAL
- en: Once you find versions that work well, save them in a shared doc or note. When
    the time comes, you (or your team) can simply plug in the new details, ask GPT
    to refresh the tone, and hit publish.
  prefs: []
  type: TYPE_NORMAL
- en: Templates don’t mean you’re taking shortcuts — they mean you’re working smart.
  prefs: []
  type: TYPE_NORMAL
- en: And with ChatGPT by your side, you can show up professionally across every platform,
    without it becoming just one more thing on your already full list.
  prefs: []
  type: TYPE_NORMAL
- en: Time-Savers & Workflow Upgrades
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: By now, you’ve seen how ChatGPT can help with writing — from tough emails to
    inspection reports, marketing content to tribunal prep. But what’s often overlooked
    is how useful it can be behind the scenes, too.
  prefs: []
  type: TYPE_NORMAL
- en: Because if you’re like most property managers, it’s not just the tasks that
    wear you down — it’s the mental load of switching between them. The admin. The
    catch-up. The constant “I’ll just deal with that later” pile.
  prefs: []
  type: TYPE_NORMAL
- en: That’s where ChatGPT really shines.
  prefs: []
  type: TYPE_NORMAL
- en: Used well, it’s not just a writing assistant. It’s a workflow helper. A quiet,
    never-tired thinking partner that can help you plan your week, systemise your
    processes, and buy back pockets of time you didn’t know you were losing.
  prefs: []
  type: TYPE_NORMAL
- en: This chapter is all about those less-obvious time-savers — the ways GPT can
    help you streamline recurring tasks, organise your thoughts, and even get a head
    start on things that usually sit in the too-hard basket.
  prefs: []
  type: TYPE_NORMAL
- en: It’s not about working harder.
  prefs: []
  type: TYPE_NORMAL
- en: It’s about working lighter — with better tools, smarter habits, and less friction
    in your day.
  prefs: []
  type: TYPE_NORMAL
- en: Stop Starting From Scratch Every Time
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: One of the biggest hidden time drains in property management?
  prefs: []
  type: TYPE_NORMAL
- en: Rewriting things you’ve already written — or something very close to it.
  prefs: []
  type: TYPE_NORMAL
- en: That maintenance update you worded perfectly last week?
  prefs: []
  type: TYPE_NORMAL
- en: The inspection summary that hit the right tone?
  prefs: []
  type: TYPE_NORMAL
- en: The follow-up email you spent 10 minutes refining?
  prefs: []
  type: TYPE_NORMAL
- en: Chances are, something almost identical will land on your desk again — and when
    it does, you’ll either waste time rewriting it from scratch, or dig through your
    sent items trying to find the version you liked.
  prefs: []
  type: TYPE_NORMAL
- en: It doesn’t have to be that way.
  prefs: []
  type: TYPE_NORMAL
- en: ChatGPT is perfect for helping you reuse and adapt content you’ve already created
    — without sounding repetitive or lazy.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here’s how:'
  prefs: []
  type: TYPE_NORMAL
- en: 1\. Use previous messages as templates
  prefs: []
  type: TYPE_NORMAL
- en: 'Paste a message you’ve already sent and prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: “Reword this for a different property, but keep the structure and tone.”
  prefs: []
  type: TYPE_NORMAL
- en: “Tweak this to apply to a different repair situation.”
  prefs: []
  type: TYPE_NORMAL
- en: 2\. Turn one message into many
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: “Use this as a base and give me three variations I can use in future.”
  prefs: []
  type: TYPE_NORMAL
- en: “Create a version of this that’s more casual for text messages.”
  prefs: []
  type: TYPE_NORMAL
- en: 3\. Save time on follow-ups
  prefs: []
  type: TYPE_NORMAL
- en: 'Take a message you’ve already sent and say:'
  prefs: []
  type: TYPE_NORMAL
- en: “Write a follow-up to this email if I haven’t heard back in 5 days.”
  prefs: []
  type: TYPE_NORMAL
- en: Instead of seeing every task as a new piece of work, you start building a bank
    of repeatable wins — messages, formats, and phrases that save you energy with
    every reuse.
  prefs: []
  type: TYPE_NORMAL
- en: You don’t need to be original every time.
  prefs: []
  type: TYPE_NORMAL
- en: You just need to sound clear, capable, and consistent — and with the right prompts,
    GPT makes that part simple.
  prefs: []
  type: TYPE_NORMAL
- en: Building a Prompt Bank That Works for You
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: If you’re finding yourself using ChatGPT more often — and getting results you
    like — it’s worth taking a few minutes to set yourself up for even more time saved.
  prefs: []
  type: TYPE_NORMAL
- en: That’s where a prompt bank comes in.
  prefs: []
  type: TYPE_NORMAL
- en: A prompt bank is simply a saved collection of useful instructions you can copy,
    tweak, and reuse. Prompts that work. Phrasing you like. The ones that got it just
    right — so you don’t have to figure it out from scratch next time.
  prefs: []
  type: TYPE_NORMAL
- en: The trick isn’t having hundreds of prompts. It’s having the right ones — for
    the tasks you do every week.
  prefs: []
  type: TYPE_NORMAL
- en: 'Start by saving prompts for: – Routine inspection summaries'
  prefs: []
  type: TYPE_NORMAL
- en: – Tenant follow-up messages
  prefs: []
  type: TYPE_NORMAL
- en: – Owner updates and quote explanations
  prefs: []
  type: TYPE_NORMAL
- en: – Social captions that don’t sound forced
  prefs: []
  type: TYPE_NORMAL
- en: – Tribunal timelines or case summaries
  prefs: []
  type: TYPE_NORMAL
- en: – Property listings with just the right tone
  prefs: []
  type: TYPE_NORMAL
- en: 'You can store them wherever you work best: – A pinned note in your phone'
  prefs: []
  type: TYPE_NORMAL
- en: – A shared Google Doc with your team
  prefs: []
  type: TYPE_NORMAL
- en: – A section in your digital to-do list
  prefs: []
  type: TYPE_NORMAL
- en: – A printed sheet on your desk
  prefs: []
  type: TYPE_NORMAL
- en: 'And you can prompt ChatGPT to help build or sort them:'
  prefs: []
  type: TYPE_NORMAL
- en: '“Group these prompts into categories: inspections, owners, tenants, tribunal.”'
  prefs: []
  type: TYPE_NORMAL
- en: “Help me format these into a checklist I can use weekly.”
  prefs: []
  type: TYPE_NORMAL
- en: Over time, your prompt bank becomes like a shortcut to clarity.
  prefs: []
  type: TYPE_NORMAL
- en: A quiet little system that frees up headspace and gives you fast, repeatable
    results — no guesswork required.
  prefs: []
  type: TYPE_NORMAL
- en: Because the more you build it, the more it starts working for you — quietly
    in the background, smoothing out your workflow one smart shortcut at a time.
  prefs: []
  type: TYPE_NORMAL
- en: Using ChatGPT to Create Reusable Templates
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Templates are one of the simplest ways to save time — and one of the most underused.
    Most PMs have a few they lean on: a standard lease renewal email, a cleaning reminder,
    a maintenance access message. But many still spend too much time rewriting the
    same structure over and over — often just because it’s not saved in a way that’s
    easy to use.'
  prefs: []
  type: TYPE_NORMAL
- en: ChatGPT makes it easy to build, adapt, and store your own library of ready-to-use
    templates — personalised, flexible, and fast to update.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here’s how:'
  prefs: []
  type: TYPE_NORMAL
- en: 1\. Turn a strong message into a reusable template
  prefs: []
  type: TYPE_NORMAL
- en: 'Take a message that worked well and ask:'
  prefs: []
  type: TYPE_NORMAL
- en: “Turn this into a reusable template. Replace the property details, dates, and
    names with placeholders.”
  prefs: []
  type: TYPE_NORMAL
- en: Now you’ve got something you (or your team) can repurpose with one quick copy-paste.
  prefs: []
  type: TYPE_NORMAL
- en: 2\. Create plug-and-play formats for common tasks
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: “Write a template for an owner update after a routine inspection, with fields
    for property condition, tenant notes, and next steps.”
  prefs: []
  type: TYPE_NORMAL
- en: “Create a template for a breach follow-up email that includes the date of the
    breach, the issue, and what action is required.”
  prefs: []
  type: TYPE_NORMAL
- en: 3\. Build a templated structure with flexible tone
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: “Make this template sound friendly but firm.”
  prefs: []
  type: TYPE_NORMAL
- en: '“Create two versions: one professional-formal, one more casual.”'
  prefs: []
  type: TYPE_NORMAL
- en: 4\. Save time on variations
  prefs: []
  type: TYPE_NORMAL
- en: 'Use ChatGPT to create multiple versions from a single structure:'
  prefs: []
  type: TYPE_NORMAL
- en: “Give me three variations of this cleaning reminder for tenants at different
    stages of their lease — move-in, routine inspection, and vacate.”
  prefs: []
  type: TYPE_NORMAL
- en: Once you’ve created a few solid templates, store them in your prompt bank or
    a shared folder — labelled clearly and ready to drop into GPT whenever you need
    to fill in the blanks.
  prefs: []
  type: TYPE_NORMAL
- en: These templates aren’t rigid. They’re launchpads — giving you structure and
    saving you time while still allowing for quick customisation.
  prefs: []
  type: TYPE_NORMAL
- en: Because when you’re juggling dozens of moving parts, having something that’s
    already 80% written is a quiet little gift to your future self.
  prefs: []
  type: TYPE_NORMAL
- en: Create a Quick-Use Toolkit for Busy Days
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: There are days in property management when even the simplest task feels like
    too much — the inbox is full, the phone won’t stop, and you’ve got six half-written
    emails open but can’t finish any of them.
  prefs: []
  type: TYPE_NORMAL
- en: That’s exactly when a quick-use toolkit comes in handy.
  prefs: []
  type: TYPE_NORMAL
- en: Think of it as your emergency pack — a small set of ready-to-go prompts and
    templates you can lean on when your brain is fried and your to-do list won’t quit.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here’s how to build one with ChatGPT:'
  prefs: []
  type: TYPE_NORMAL
- en: 1\. Save 5–10 go-to prompts for high-stress tasks
  prefs: []
  type: TYPE_NORMAL
- en: Pick the moments where you usually freeze or delay — and create prompts to help
    you move through them fast.
  prefs: []
  type: TYPE_NORMAL
- en: 'Examples:'
  prefs: []
  type: TYPE_NORMAL
- en: “Write a calm update for an owner about a delayed quote.”
  prefs: []
  type: TYPE_NORMAL
- en: “Soften this message to a tenant without losing firmness.”
  prefs: []
  type: TYPE_NORMAL
- en: “Summarise this long issue into a two-paragraph timeline.”
  prefs: []
  type: TYPE_NORMAL
- en: 2\. Keep a few inspection and tribunal helpers handy
  prefs: []
  type: TYPE_NORMAL
- en: These are the ones that often get left too late.
  prefs: []
  type: TYPE_NORMAL
- en: “Turn these inspection notes into a clean summary.”
  prefs: []
  type: TYPE_NORMAL
- en: “Write a factual statement for tribunal outlining repeated access refusal.”
  prefs: []
  type: TYPE_NORMAL
- en: 3\. Add some tone-reset prompts for when you’re tired or frustrated
  prefs: []
  type: TYPE_NORMAL
- en: These help you avoid sending something reactive.
  prefs: []
  type: TYPE_NORMAL
- en: “Make this sound more neutral.”
  prefs: []
  type: TYPE_NORMAL
- en: “Rewrite this to sound less formal, more human.”
  prefs: []
  type: TYPE_NORMAL
- en: “Add a supportive tone to this owner message without over-apologising.”
  prefs: []
  type: TYPE_NORMAL
- en: 4\. Store them somewhere you can access in two clicks
  prefs: []
  type: TYPE_NORMAL
- en: This is key — you won’t use them if you have to dig for them.
  prefs: []
  type: TYPE_NORMAL
- en: – A note in your phone
  prefs: []
  type: TYPE_NORMAL
- en: – A pinned browser tab
  prefs: []
  type: TYPE_NORMAL
- en: – A text expander shortcut
  prefs: []
  type: TYPE_NORMAL
- en: – A printed sheet in your diary
  prefs: []
  type: TYPE_NORMAL
- en: You’re not trying to build a giant system here — just a small set of support
    tools that meet you where you are on the days when everything feels a bit much.
  prefs: []
  type: TYPE_NORMAL
- en: Because sometimes, the difference between falling behind and staying on top
    is having the right words when you need them most — and ChatGPT can quietly hand
    them to you, one clear sentence at a time.
  prefs: []
  type: TYPE_NORMAL
- en: Use ChatGPT as a Second Brain
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: There’s a lot you’re expected to hold in your head as a property manager.
  prefs: []
  type: TYPE_NORMAL
- en: Dates, deadlines, trades, tenant details, legislation, landlord preferences,
    emails you still haven’t replied to, conversations you need to have, inspections
    you need to write up. It’s not just the work — it’s the mental tabs constantly
    open in the background.
  prefs: []
  type: TYPE_NORMAL
- en: That’s where ChatGPT can step in — not just as a writing tool, but as a second
    brain.
  prefs: []
  type: TYPE_NORMAL
- en: A place to unload your messy thoughts.
  prefs: []
  type: TYPE_NORMAL
- en: A sounding board to help you structure ideas.
  prefs: []
  type: TYPE_NORMAL
- en: A quiet assistant to sort through what feels jumbled in your head.
  prefs: []
  type: TYPE_NORMAL
- en: 'You can use it to: – Plan your week'
  prefs: []
  type: TYPE_NORMAL
- en: – Draft tricky conversations
  prefs: []
  type: TYPE_NORMAL
- en: – Write checklists or reminders
  prefs: []
  type: TYPE_NORMAL
- en: – Prioritise competing tasks
  prefs: []
  type: TYPE_NORMAL
- en: – Brain-dump everything swirling around — and then shape it into something useful
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt examples:'
  prefs: []
  type: TYPE_NORMAL
- en: “Help me plan out my Monday — I’ve got 3 vacates, 2 inspections, and 5 urgent
    follow-ups. What’s the best way to structure my day?”
  prefs: []
  type: TYPE_NORMAL
- en: “I’ve just had a tough call with a tenant and I need to summarise what was said.
    Can you help me write a short record for the file?”
  prefs: []
  type: TYPE_NORMAL
- en: “Here’s everything I need to do before COB Friday — help me list and group it
    by urgency.”
  prefs: []
  type: TYPE_NORMAL
- en: This isn’t about outsourcing your thinking.
  prefs: []
  type: TYPE_NORMAL
- en: It’s about freeing up space so you can think more clearly .
  prefs: []
  type: TYPE_NORMAL
- en: When you stop trying to carry everything alone, you give yourself more room
    to respond thoughtfully, lead calmly, and stay one step ahead — even on the busiest
    days.
  prefs: []
  type: TYPE_NORMAL
- en: ChatGPT won’t replace your experience or instincts. But used well, it can quietly
    carry some of the mental load — helping you stay focused, steady, and just a little
    more human in a job that asks you to do a whole lot, every single day.
  prefs: []
  type: TYPE_NORMAL
- en: Small Habits That Save Hours Each Week
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: You don’t need a full AI strategy to see the benefits of ChatGPT.
  prefs: []
  type: TYPE_NORMAL
- en: Sometimes, it’s the smallest habits — used consistently — that create the biggest
    shifts in your week.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here are a few low-effort, high-impact ways to start:'
  prefs: []
  type: TYPE_NORMAL
- en: 1\. Start your day with a planning prompt
  prefs: []
  type: TYPE_NORMAL
- en: “Here’s what’s on my list — help me group it by urgency.”
  prefs: []
  type: TYPE_NORMAL
- en: This clears mental clutter and sets a clear focus before the chaos kicks in.
  prefs: []
  type: TYPE_NORMAL
- en: 2\. Use GPT as your first draft engine
  prefs: []
  type: TYPE_NORMAL
- en: For anything that feels like a slog — tenant replies, owner updates, tribunal
    summaries — get a rough version done in seconds, then tweak and send.
  prefs: []
  type: TYPE_NORMAL
- en: 3\. Save strong messages as templates
  prefs: []
  type: TYPE_NORMAL
- en: When something works, don’t just send it — copy it, strip out the details, and
    ask GPT to turn it into a reusable version for next time.
  prefs: []
  type: TYPE_NORMAL
- en: 4\. Batch your prompts
  prefs: []
  type: TYPE_NORMAL
- en: Have a chunk of similar tasks (e.g. inspection summaries, listing captions,
    tribunal prep)? Paste them all in one go and ask GPT to help you knock them out
    together.
  prefs: []
  type: TYPE_NORMAL
- en: 5\. Keep a running prompt bank open
  prefs: []
  type: TYPE_NORMAL
- en: On your phone, browser, or desktop — wherever is easiest to access. When you
    feel stuck, copy, paste, tweak. Done.
  prefs: []
  type: TYPE_NORMAL
- en: 6\. Prompt before you panic
  prefs: []
  type: TYPE_NORMAL
- en: 'Overwhelmed? Emotionally drained? Behind on admin? Instead of spiralling, try:'
  prefs: []
  type: TYPE_NORMAL
- en: “I’m stuck on this — help me write something clear and calm.”
  prefs: []
  type: TYPE_NORMAL
- en: It’s a small pause that can reset your entire afternoon.
  prefs: []
  type: TYPE_NORMAL
- en: These habits aren’t about doing more.
  prefs: []
  type: TYPE_NORMAL
- en: They’re about doing what you already do — with less friction .
  prefs: []
  type: TYPE_NORMAL
- en: Stack a few together, and suddenly you’re saving half an hour here, an hour
    there. Enough to breathe. Enough to stay steady. Enough to actually feel on top
    of your workload — instead of just chasing it.
  prefs: []
  type: TYPE_NORMAL
- en: What If You Have a Team? Share the System
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: If you’ve found ways to make ChatGPT work for you — to write faster, think clearer,
    or just save some headspace — don’t keep it to yourself.
  prefs: []
  type: TYPE_NORMAL
- en: This kind of tool gets even more powerful when shared across a team.
  prefs: []
  type: TYPE_NORMAL
- en: 'You don’t need a full training session or agency-wide rollout. Just start by
    sharing the simple systems that helped you: – The prompts you’ve saved'
  prefs: []
  type: TYPE_NORMAL
- en: – The templates you’ve built
  prefs: []
  type: TYPE_NORMAL
- en: – The quick tricks that get you through a busy day
  prefs: []
  type: TYPE_NORMAL
- en: Even something as small as “Hey, here’s the prompt I use when I get stuck writing
    follow-ups” can lift the load for someone else — and create consistency across
    your comms at the same time.
  prefs: []
  type: TYPE_NORMAL
- en: 'You can also: – Create a shared prompt bank or doc for the team'
  prefs: []
  type: TYPE_NORMAL
- en: – Add GPT tips to onboarding for new staff
  prefs: []
  type: TYPE_NORMAL
- en: – Use it during team check-ins to polish comms, documents, or reports
  prefs: []
  type: TYPE_NORMAL
- en: – Encourage others to save their own go-to prompts as they discover them
  prefs: []
  type: TYPE_NORMAL
- en: If you’re a team leader, this is a quiet but powerful way to reduce overwhelm,
    improve documentation, and help your team feel more supported — without adding
    more meetings or complexity.
  prefs: []
  type: TYPE_NORMAL
- en: The best systems are the ones that spread.
  prefs: []
  type: TYPE_NORMAL
- en: And when one small tool makes the whole team’s day run smoother, it’s worth
    making it part of how you work — together.
  prefs: []
  type: TYPE_NORMAL
- en: Staying Human in a Systemised World
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Property management is full of systems — and for good reason.
  prefs: []
  type: TYPE_NORMAL
- en: They keep things moving.
  prefs: []
  type: TYPE_NORMAL
- en: They help you stay compliant.
  prefs: []
  type: TYPE_NORMAL
- en: They stop important tasks from slipping through the cracks.
  prefs: []
  type: TYPE_NORMAL
- en: But behind every workflow, every inspection, every tribunal timeline or template…
    is you.
  prefs: []
  type: TYPE_NORMAL
- en: And you’re not a system.
  prefs: []
  type: TYPE_NORMAL
- en: You’re a person managing people — their homes, their investments, their expectations,
    their stress. You’re calming tensions, juggling priorities, responding to whatever
    the day throws at you, all while trying to stay steady, professional, and kind.
  prefs: []
  type: TYPE_NORMAL
- en: It’s easy to lose sight of that when the work piles up.
  prefs: []
  type: TYPE_NORMAL
- en: It’s easy to start feeling like you have to become a machine just to keep up.
  prefs: []
  type: TYPE_NORMAL
- en: That’s why this book hasn’t just been about automation or saving time. It’s
    been about using tools like ChatGPT to support your human-ness — not erase it.
  prefs: []
  type: TYPE_NORMAL
- en: 'To help you: – Say what you mean, even when you’re tired'
  prefs: []
  type: TYPE_NORMAL
- en: – Create space for the parts of your job that need empathy and care
  prefs: []
  type: TYPE_NORMAL
- en: – Let the systems carry the weight, so you can carry the moments that matter
  prefs: []
  type: TYPE_NORMAL
- en: This chapter is about staying grounded in all of that. About using tech wisely
    — not to distance yourself from the work, but to stay more connected to it… with
    less burnout and more clarity.
  prefs: []
  type: TYPE_NORMAL
- en: Because the best property managers don’t just get through the list.
  prefs: []
  type: TYPE_NORMAL
- en: They lead people. They build trust. They show up.
  prefs: []
  type: TYPE_NORMAL
- en: And no prompt, tool, or system will ever replace that.
  prefs: []
  type: TYPE_NORMAL
- en: But it can help make space for you to do it with a little more ease.
  prefs: []
  type: TYPE_NORMAL
- en: You’re Still the One Making the Decisions
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: ChatGPT can write a message, shape a report, or help you structure your thoughts
    — but it doesn’t know your clients, your properties, or your local legislation.
    It doesn’t know how that landlord reacts under stress, or how that tenant has
    been communicating all year. It doesn’t hold context the way you do.
  prefs: []
  type: TYPE_NORMAL
- en: And it shouldn’t.
  prefs: []
  type: TYPE_NORMAL
- en: Because you are still the professional.
  prefs: []
  type: TYPE_NORMAL
- en: You are the one bringing experience, empathy, and sound judgment to the table.
  prefs: []
  type: TYPE_NORMAL
- en: ChatGPT simply helps you express that more clearly, more consistently, and with
    less friction.
  prefs: []
  type: TYPE_NORMAL
- en: It’s a tool — and like any good tool, it works best when used with your thinking,
    not instead of it.
  prefs: []
  type: TYPE_NORMAL
- en: 'That means: – You decide which parts of a draft to keep, tweak, or delete'
  prefs: []
  type: TYPE_NORMAL
- en: – You sense when a message needs a softer tone — or a firmer boundary
  prefs: []
  type: TYPE_NORMAL
- en: – You know when a situation needs a phone call, not an email
  prefs: []
  type: TYPE_NORMAL
- en: – You notice when someone’s going quiet, or when a small issue could become
    a big one
  prefs: []
  type: TYPE_NORMAL
- en: ChatGPT can’t read the room.
  prefs: []
  type: TYPE_NORMAL
- en: It can’t pick up tone over the phone, or spot tension in a tenant’s silence.
  prefs: []
  type: TYPE_NORMAL
- en: It can’t notice the gut feeling you get when something’s off.
  prefs: []
  type: TYPE_NORMAL
- en: But you can. And you do — every day.
  prefs: []
  type: TYPE_NORMAL
- en: So let the tool help where it can.
  prefs: []
  type: TYPE_NORMAL
- en: Let it take the admin off your plate.
  prefs: []
  type: TYPE_NORMAL
- en: Let it give you a head start, a first draft, a quick win.
  prefs: []
  type: TYPE_NORMAL
- en: 'But always remember: you’re the one behind the wheel.'
  prefs: []
  type: TYPE_NORMAL
- en: And that’s exactly where you’re meant to be.
  prefs: []
  type: TYPE_NORMAL
- en: Tone is Everything — and It’s Still Yours
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In property management, how you say something often matters more than what you
    say.
  prefs: []
  type: TYPE_NORMAL
- en: You can deliver the same message a dozen different ways — and depending on the
    tone, you’ll either earn trust, calm a tense situation, or accidentally escalate
    it.
  prefs: []
  type: TYPE_NORMAL
- en: Tone is the thing that reassures a stressed-out landlord.
  prefs: []
  type: TYPE_NORMAL
- en: It’s what keeps a tenant from feeling attacked.
  prefs: []
  type: TYPE_NORMAL
- en: It’s what helps a tradie feel respected — even when you’re chasing them again.
  prefs: []
  type: TYPE_NORMAL
- en: And while ChatGPT is incredibly good at helping you find the right tone — friendly,
    firm, neutral, supportive — it still needs your direction. Because your tone is
    what builds relationships. It’s what people come to trust.
  prefs: []
  type: TYPE_NORMAL
- en: ChatGPT can suggest variations.
  prefs: []
  type: TYPE_NORMAL
- en: It can reword something to sound softer, clearer, more professional.
  prefs: []
  type: TYPE_NORMAL
- en: It can help you get unstuck when you’re not sure how to start.
  prefs: []
  type: TYPE_NORMAL
- en: But it’s still your voice. Your intention. Your standard.
  prefs: []
  type: TYPE_NORMAL
- en: You decide when to dial things up or down.
  prefs: []
  type: TYPE_NORMAL
- en: You decide what tone suits the situation — and the people involved.
  prefs: []
  type: TYPE_NORMAL
- en: You make the call on whether a message needs warmth, authority, or quiet clarity.
  prefs: []
  type: TYPE_NORMAL
- en: Think of ChatGPT as the assistant who helps get the words right — but you’re
    still the one setting the tone.
  prefs: []
  type: TYPE_NORMAL
- en: You still bring the emotional intelligence.
  prefs: []
  type: TYPE_NORMAL
- en: You still hold the relationship.
  prefs: []
  type: TYPE_NORMAL
- en: And that’s what makes your communication powerful — not because it’s perfect,
    but because it’s human.
  prefs: []
  type: TYPE_NORMAL
- en: When Not to Use ChatGPT
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: As helpful as ChatGPT can be, it’s not the right tool for every situation.
  prefs: []
  type: TYPE_NORMAL
- en: There are moments in property management where what’s needed isn’t speed or
    structure — it’s presence, professionalism, or a personal touch that can’t be
    automated.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here are a few times when it’s better to step away from the prompt box:'
  prefs: []
  type: TYPE_NORMAL
- en: 1\. When a phone call is the better option
  prefs: []
  type: TYPE_NORMAL
- en: If emotions are running high or a message could easily be misread, a call might
    prevent days of back-and-forth. ChatGPT can help you plan what to say — but the
    conversation itself should be yours.
  prefs: []
  type: TYPE_NORMAL
- en: 2\. When the issue is legally sensitive or high-risk
  prefs: []
  type: TYPE_NORMAL
- en: Tribunal submissions, owner disputes, and anything involving legal liability
    should always go through the proper channels. You can use ChatGPT to help organise
    your notes or timeline — but the wording needs to be checked, verified, and often
    approved internally.
  prefs: []
  type: TYPE_NORMAL
- en: 3\. When clarity matters more than polish
  prefs: []
  type: TYPE_NORMAL
- en: Sometimes a plain, human message lands better than one that’s overly refined.
    If you’re giving instructions to a team member or sharing a quick update, don’t
    feel the need to overthink it.
  prefs: []
  type: TYPE_NORMAL
- en: 4\. When you’re dealing with sensitive personal issues
  prefs: []
  type: TYPE_NORMAL
- en: Mental health disclosures, hardship requests, or personal challenges from tenants
    or landlords call for your full attention — and your empathy. A thoughtful response,
    even if imperfectly written, often matters more than the phrasing.
  prefs: []
  type: TYPE_NORMAL
- en: 5\. When your gut tells you to slow down
  prefs: []
  type: TYPE_NORMAL
- en: If something feels off — or too important to delegate — trust that. Use ChatGPT
    to clarify your thoughts if needed, but let your judgment lead the way.
  prefs: []
  type: TYPE_NORMAL
- en: You don’t have to use the tool for everything.
  prefs: []
  type: TYPE_NORMAL
- en: Knowing when to close the tab is part of using it well.
  prefs: []
  type: TYPE_NORMAL
- en: ChatGPT is here to lighten your load — not to replace your relationships, instincts,
    or expertise.
  prefs: []
  type: TYPE_NORMAL
- en: And in a people-first profession like property management, that balance is everything.
  prefs: []
  type: TYPE_NORMAL
- en: Using AI Ethically and Transparently
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: As tools like ChatGPT become more common in everyday workflows, so does the
    responsibility to use them thoughtfully.
  prefs: []
  type: TYPE_NORMAL
- en: Property management is a profession built on trust — between landlords, tenants,
    trades, and your wider team. And any tool you bring into that space should support
    that trust, not quietly chip away at it.
  prefs: []
  type: TYPE_NORMAL
- en: That’s why ethical use matters.
  prefs: []
  type: TYPE_NORMAL
- en: 'You don’t need to announce every time you’ve used AI to help write a message.
    But it’s worth asking yourself a few grounding questions before you hit send:'
  prefs: []
  type: TYPE_NORMAL
- en: – Is the information accurate?
  prefs: []
  type: TYPE_NORMAL
- en: AI can help shape a message, but you are still responsible for checking the
    details, the dates, and the facts. Don’t assume it’s right — confirm it.
  prefs: []
  type: TYPE_NORMAL
- en: – Would I be comfortable if the recipient knew I used ChatGPT?
  prefs: []
  type: TYPE_NORMAL
- en: If the answer is no, that’s a sign to pause and check whether you’re using the
    tool to enhance your work — or avoid a difficult conversation.
  prefs: []
  type: TYPE_NORMAL
- en: – Does this message still sound like me, or like our agency?
  prefs: []
  type: TYPE_NORMAL
- en: Templates and time-savers are great, but tone consistency matters — especially
    when you’re representing your brand or responding to conflict.
  prefs: []
  type: TYPE_NORMAL
- en: – Am I using ChatGPT to connect, or to avoid?
  prefs: []
  type: TYPE_NORMAL
- en: Sometimes, it’s tempting to lean on automation to get through uncomfortable
    tasks. But if a tenant is upset, or a landlord needs real reassurance, what matters
    most isn’t how polished your words are — it’s that they come from a real place
    of care.
  prefs: []
  type: TYPE_NORMAL
- en: You don’t need to be perfect.
  prefs: []
  type: TYPE_NORMAL
- en: Just intentional.
  prefs: []
  type: TYPE_NORMAL
- en: When you use ChatGPT with ethics and transparency in mind — not as a way to
    cut corners, but as a way to support better communication — you’re not replacing
    your humanity. You’re reinforcing it.
  prefs: []
  type: TYPE_NORMAL
- en: 'That’s how tech becomes truly useful: not when it hides behind us, but when
    it helps us show up more clearly, more calmly, and more confidently in the moments
    that matter.'
  prefs: []
  type: TYPE_NORMAL
- en: Your Humanity is the Real Value
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Systems help. Templates help. ChatGPT helps.
  prefs: []
  type: TYPE_NORMAL
- en: But at the centre of all of this — it’s still you.
  prefs: []
  type: TYPE_NORMAL
- en: The calm voice when someone’s stressed.
  prefs: []
  type: TYPE_NORMAL
- en: The clear reply when everyone else is confused.
  prefs: []
  type: TYPE_NORMAL
- en: The quiet check-in that prevents a problem from escalating.
  prefs: []
  type: TYPE_NORMAL
- en: The way you hold the line, offer solutions, and do the work no one sees.
  prefs: []
  type: TYPE_NORMAL
- en: It’s easy to underestimate just how much you carry in this role — not just tasks,
    but tension. Not just to-do lists, but relationships. You’re expected to be efficient,
    empathetic, firm, flexible, available, and professional… all at once.
  prefs: []
  type: TYPE_NORMAL
- en: That’s why tools like ChatGPT can be so powerful — not because they replace
    your value, but because they protect it. They help you write faster so you can
    listen longer. They carry some of the mental load so you can lead with clarity.
    They take care of the formatting so you can focus on the humans involved.
  prefs: []
  type: TYPE_NORMAL
- en: The real value isn’t in how perfectly something is worded.
  prefs: []
  type: TYPE_NORMAL
- en: It’s in how you show up.
  prefs: []
  type: TYPE_NORMAL
- en: Your tone.
  prefs: []
  type: TYPE_NORMAL
- en: Your care.
  prefs: []
  type: TYPE_NORMAL
- en: Your judgment.
  prefs: []
  type: TYPE_NORMAL
- en: Your steady presence in a job that doesn’t slow down.
  prefs: []
  type: TYPE_NORMAL
- en: Use the tools. Save your time. Build your systems.
  prefs: []
  type: TYPE_NORMAL
- en: 'But never forget: your humanity is the real asset — and it always will be.'
  prefs: []
  type: TYPE_NORMAL
- en: What Calm Looks Like in Practice
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Calm isn’t about having an empty inbox or a perfectly organised calendar.
  prefs: []
  type: TYPE_NORMAL
- en: It’s not about feeling chilled out all the time, or never having a bad day.
  prefs: []
  type: TYPE_NORMAL
- en: In property management, calm is something quieter.
  prefs: []
  type: TYPE_NORMAL
- en: More practical. More earned.
  prefs: []
  type: TYPE_NORMAL
- en: It’s having a clear message ready, even when you’re under pressure.
  prefs: []
  type: TYPE_NORMAL
- en: It’s knowing where to start when everything feels urgent.
  prefs: []
  type: TYPE_NORMAL
- en: It’s having a draft done in two minutes instead of twenty.
  prefs: []
  type: TYPE_NORMAL
- en: It’s being able to respond instead of react — even when emotions are high.
  prefs: []
  type: TYPE_NORMAL
- en: 'Calm looks like: – Skipping the panic rewrite, because GPT helped with your
    first draft'
  prefs: []
  type: TYPE_NORMAL
- en: – Getting a difficult message out the door without spinning your wheels
  prefs: []
  type: TYPE_NORMAL
- en: – Taking a breath, prompting clearly, and knowing the tool will meet you there
  prefs: []
  type: TYPE_NORMAL
- en: – Trusting that you’ve built systems that support your voice — not silence it
  prefs: []
  type: TYPE_NORMAL
- en: Calm isn’t perfection. It’s capacity — the kind that lets you show up steady,
    human, and clear, even when the day doesn’t go to plan.
  prefs: []
  type: TYPE_NORMAL
- en: And that’s what these tools are really for.
  prefs: []
  type: TYPE_NORMAL
- en: Not to replace your work — but to lighten it.
  prefs: []
  type: TYPE_NORMAL
- en: Not to make you faster for the sake of it — but to free up space for what matters.
  prefs: []
  type: TYPE_NORMAL
- en: Not to systemise your personality — but to support your clarity, your care,
    and your boundaries.
  prefs: []
  type: TYPE_NORMAL
- en: You don’t need to become a machine to survive this work.
  prefs: []
  type: TYPE_NORMAL
- en: You just need a little more breathing room — and tools that help you protect
    it.
  prefs: []
  type: TYPE_NORMAL
- en: That’s what calm looks like in practice. And now? You’ve got everything you
    need to create it.
  prefs: []
  type: TYPE_NORMAL
- en: Teach ChatGPT to Work Like You Do
  prefs: []
  type: TYPE_NORMAL
- en: 'By now, you’ve seen how helpful ChatGPT can be with everyday tasks — from writing
    emails to summarising inspections. But what’s even more powerful is this: you
    can teach it to work your way.'
  prefs: []
  type: TYPE_NORMAL
- en: No coding. No tech background. Just a few clear instructions.
  prefs: []
  type: TYPE_NORMAL
- en: ChatGPT can learn how you like to communicate, what your processes look like,
    and how you structure your day-to-day work. It’s like onboarding a new assistant
    — one that remembers your tone, helps with the heavy lifting, and fits right into
    your workflow.
  prefs: []
  type: TYPE_NORMAL
- en: This chapter will give you a simple, practical introduction to what that looks
    like.
  prefs: []
  type: TYPE_NORMAL
- en: Not advanced setup. Just small changes that make a big difference — so GPT starts
    working for you, not just with you.
  prefs: []
  type: TYPE_NORMAL
- en: Yes, You Can Train It — and No, It’s Not Complicated
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'When people hear the word training in relation to AI, it can sound technical
    or out of reach — like something only developers or data scientists do. But in
    the case of ChatGPT, training simply means this:'
  prefs: []
  type: TYPE_NORMAL
- en: Teaching it how you work
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Showing it how you like to sound
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Feeding it examples of the tone, structure, and systems you already use
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: That’s it.
  prefs: []
  type: TYPE_NORMAL
- en: No fancy tools. No coding. No deep tech setup.
  prefs: []
  type: TYPE_NORMAL
- en: Just clear, repeatable communication.
  prefs: []
  type: TYPE_NORMAL
- en: Think of it like onboarding a new team member — one who’s helpful, fast, and
    doesn’t mind repetition. The more context you give it, the better it performs.
    The more examples you share, the more consistent it becomes.
  prefs: []
  type: TYPE_NORMAL
- en: 'You’ve probably already started doing this without realising it: – Prompting
    it with “we like to sound friendly but firm”'
  prefs: []
  type: TYPE_NORMAL
- en: – Asking it to “make this sound like something I’d actually say”
  prefs: []
  type: TYPE_NORMAL
- en: – Sharing your templates, tone, or processes for reference
  prefs: []
  type: TYPE_NORMAL
- en: That is training — and every time you do it, you’re building a smarter, more
    useful version of the tool for your specific business.
  prefs: []
  type: TYPE_NORMAL
- en: Teach It Your Voice
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: You’ve got a way of communicating that works.
  prefs: []
  type: TYPE_NORMAL
- en: It’s not just what you say — it’s how you say it.
  prefs: []
  type: TYPE_NORMAL
- en: Maybe you’re calm and steady, even when people are stressed.
  prefs: []
  type: TYPE_NORMAL
- en: Maybe you’re warm and conversational, but still professional.
  prefs: []
  type: TYPE_NORMAL
- en: Maybe you keep things short, polite, and to the point.
  prefs: []
  type: TYPE_NORMAL
- en: That tone — your voice — is part of what makes people trust you.
  prefs: []
  type: TYPE_NORMAL
- en: And the good news? You can teach that to ChatGPT.
  prefs: []
  type: TYPE_NORMAL
- en: 'It starts with something as simple as telling the tool how you like to sound:'
  prefs: []
  type: TYPE_NORMAL
- en: “We keep things warm, clear, and confident — no jargon, no fluff.”
  prefs: []
  type: TYPE_NORMAL
- en: '“Our tone is professional but not overly formal. Think: capable and calm.”'
  prefs: []
  type: TYPE_NORMAL
- en: “We don’t use emojis or exclamation marks. We sound like a real person who knows
    what they’re doing.”
  prefs: []
  type: TYPE_NORMAL
- en: 'You can also give it examples: – Copy and paste a message or listing you’re
    proud of'
  prefs: []
  type: TYPE_NORMAL
- en: '– Say: “Make future responses sound like this”'
  prefs: []
  type: TYPE_NORMAL
- en: '– Or: “Use this tone going forward when writing to owners/tenants”'
  prefs: []
  type: TYPE_NORMAL
- en: The result?
  prefs: []
  type: TYPE_NORMAL
- en: – Emails that sound like you — even when you’re in a rush
  prefs: []
  type: TYPE_NORMAL
- en: – Listing descriptions or updates that match your brand
  prefs: []
  type: TYPE_NORMAL
- en: – Templates that don’t need constant editing to get the tone right
  prefs: []
  type: TYPE_NORMAL
- en: This small step — describing your voice — changes everything.
  prefs: []
  type: TYPE_NORMAL
- en: Because once ChatGPT knows how you like to communicate, every task gets easier.
    And the more you use it, the more consistent (and useful) that voice becomes.
  prefs: []
  type: TYPE_NORMAL
- en: Teach It Your Processes
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: You already have systems — whether they’re written down or just lived out in
    your day-to-day.
  prefs: []
  type: TYPE_NORMAL
- en: You know how you handle a vacate.
  prefs: []
  type: TYPE_NORMAL
- en: You know the steps you follow when a tenant requests a repair.
  prefs: []
  type: TYPE_NORMAL
- en: You know how you write inspection follow-ups, communicate with owners, and prep
    for tribunal — even if it’s all in your head.
  prefs: []
  type: TYPE_NORMAL
- en: That’s your process.
  prefs: []
  type: TYPE_NORMAL
- en: And you can teach it to ChatGPT.
  prefs: []
  type: TYPE_NORMAL
- en: You don’t need a perfect SOP (standard operating procedure).
  prefs: []
  type: TYPE_NORMAL
- en: You just need to explain what you do, in plain language.
  prefs: []
  type: TYPE_NORMAL
- en: 'Example:'
  prefs: []
  type: TYPE_NORMAL
- en: “When a tenant gives notice, we respond with a vacate checklist, schedule the
    final inspection, and notify the landlord with key dates and access instructions.”
  prefs: []
  type: TYPE_NORMAL
- en: 'Then you can ask GPT to: – Write a message or checklist based on that process'
  prefs: []
  type: TYPE_NORMAL
- en: – Turn your steps into a reusable prompt or template
  prefs: []
  type: TYPE_NORMAL
- en: – Help you document the process so your team (or future self) can reuse it
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt example:'
  prefs: []
  type: TYPE_NORMAL
- en: “Here’s how we handle maintenance follow-ups. Turn this into a template I can
    use to message tenants after a trade visit.”
  prefs: []
  type: TYPE_NORMAL
- en: “Summarise our tribunal prep process so I can share it with a new team member.”
  prefs: []
  type: TYPE_NORMAL
- en: '“Write a checklist from this: [insert your process steps]”'
  prefs: []
  type: TYPE_NORMAL
- en: The beauty of this? Once GPT knows your way of doing things, it can start doing
    the heavy lifting — drafting updates, writing reminders, summarising steps — without
    you needing to explain it again and again.
  prefs: []
  type: TYPE_NORMAL
- en: You already know how to do the job.
  prefs: []
  type: TYPE_NORMAL
- en: This just helps the system remember it for you — and work the way you do.
  prefs: []
  type: TYPE_NORMAL
- en: Build Reusable Templates with Placeholders
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: You probably write the same kinds of messages over and over — just with different
    names, dates, or property details each time. Instead of rewriting or searching
    for that perfect message again, you can use ChatGPT to help you create reusable
    templates with fill-in-the-blank placeholders .
  prefs: []
  type: TYPE_NORMAL
- en: This is one of the fastest ways to save time — and make your communication more
    consistent without making it feel robotic.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here’s how it works:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 1: Take a message you’ve already written and liked.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Example:'
  prefs: []
  type: TYPE_NORMAL
- en: “Hi Sarah, just letting you know your routine inspection is scheduled for Thursday
    21st September between 10:00am and 11:00am…”
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 2: Ask GPT to turn it into a template.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: “Turn this into a reusable template. Use placeholders for name, date, time,
    and property address.”
  prefs: []
  type: TYPE_NORMAL
- en: 'Output:'
  prefs: []
  type: TYPE_NORMAL
- en: “Hi [Tenant Name], just letting you know your routine inspection is scheduled
    for [Day, Date] between [Start Time] and [End Time] at [Property Address]. Please
    let us know if you have any concerns.”
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 3: Reuse it any time you need.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Just plug in the new details, or give GPT the variables and let it fill it
    in for you:'
  prefs: []
  type: TYPE_NORMAL
- en: “Use this template to send a message to Jamie for an inspection on Tuesday 5th
    at 1:30pm at 12 Hill Street.”
  prefs: []
  type: TYPE_NORMAL
- en: 'You can do this with: – Lease renewal emails'
  prefs: []
  type: TYPE_NORMAL
- en: – Maintenance follow-ups
  prefs: []
  type: TYPE_NORMAL
- en: – Entry notices
  prefs: []
  type: TYPE_NORMAL
- en: – Bond claim explanations
  prefs: []
  type: TYPE_NORMAL
- en: – Owner updates
  prefs: []
  type: TYPE_NORMAL
- en: The best part? Once you’ve got a few solid templates built, you can store them
    in your prompt bank and reuse them again and again — without worrying about formatting
    or tone.
  prefs: []
  type: TYPE_NORMAL
- en: It’s not just about speed.
  prefs: []
  type: TYPE_NORMAL
- en: It’s about knowing the job is already half done before you even start typing.
  prefs: []
  type: TYPE_NORMAL
- en: Save Time with Your Own Prompt Bank
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: If you find yourself typing the same instructions over and over — or staring
    at the screen trying to remember how you worded something last time — it’s time
    to build a prompt bank .
  prefs: []
  type: TYPE_NORMAL
- en: A prompt bank is simply a saved list of your most useful ChatGPT instructions
    — the ones that give you fast, consistent results for tasks you do often.
  prefs: []
  type: TYPE_NORMAL
- en: Think of it like your go-to toolbox.
  prefs: []
  type: TYPE_NORMAL
- en: Not huge. Just handy.
  prefs: []
  type: TYPE_NORMAL
- en: 'What to include:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Start with the prompts you use most. For example: – “Turn these notes into
    a short, professional inspection summary.”'
  prefs: []
  type: TYPE_NORMAL
- en: – “Write a friendly reminder to a tenant about upcoming access.”
  prefs: []
  type: TYPE_NORMAL
- en: – “Reword this email to sound more calm and clear.”
  prefs: []
  type: TYPE_NORMAL
- en: – “Create a tribunal timeline from these rough notes.”
  prefs: []
  type: TYPE_NORMAL
- en: 'Where to store it:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Wherever is easy for you to find: – Notes app on your phone'
  prefs: []
  type: TYPE_NORMAL
- en: – Google Doc
  prefs: []
  type: TYPE_NORMAL
- en: – Shared team folder
  prefs: []
  type: TYPE_NORMAL
- en: – Sticky note on your desktop
  prefs: []
  type: TYPE_NORMAL
- en: 'How to use it:'
  prefs: []
  type: TYPE_NORMAL
- en: Copy, paste, tweak the details, and hit send. That’s it.
  prefs: []
  type: TYPE_NORMAL
- en: 'You can even ask GPT to help organise your prompt list:'
  prefs: []
  type: TYPE_NORMAL
- en: '“Sort these prompts into categories: inspections, tenants, owners, tribunal.”'
  prefs: []
  type: TYPE_NORMAL
- en: “Create a weekly checklist of prompts I can reuse for common tasks.”
  prefs: []
  type: TYPE_NORMAL
- en: As your library grows, you’ll spend less time rewriting and more time doing.
  prefs: []
  type: TYPE_NORMAL
- en: It’s like having a smart little assistant who always remembers the exact way
    you like to get things done.
  prefs: []
  type: TYPE_NORMAL
- en: You don’t need 50 prompts. Start with 5.
  prefs: []
  type: TYPE_NORMAL
- en: If they save you even 10 minutes each — that’s almost an hour a week back in
    your pocket.
  prefs: []
  type: TYPE_NORMAL
- en: The More You Use It, the Smarter It Gets
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: One of the best things about ChatGPT? It learns fast — from you .
  prefs: []
  type: TYPE_NORMAL
- en: Not in the creepy, “watching everything you do” kind of way.
  prefs: []
  type: TYPE_NORMAL
- en: But in the practical, the-more-clear-input-you-give-it, the-better-it-performs
    kind of way.
  prefs: []
  type: TYPE_NORMAL
- en: 'Every time you: – Describe your tone'
  prefs: []
  type: TYPE_NORMAL
- en: – Share how you like to structure a message
  prefs: []
  type: TYPE_NORMAL
- en: – Paste in a version of something you want to reuse
  prefs: []
  type: TYPE_NORMAL
- en: – Clarify, correct, or improve the output...
  prefs: []
  type: TYPE_NORMAL
- en: …you’re training it. Prompt by prompt.
  prefs: []
  type: TYPE_NORMAL
- en: 'And if you''re using a paid version with memory turned on? It gets even easier.
    You can teach GPT your: – Tone of voice'
  prefs: []
  type: TYPE_NORMAL
- en: – Preferred formatting
  prefs: []
  type: TYPE_NORMAL
- en: – Key processes (e.g. how you handle vacates or repairs)
  prefs: []
  type: TYPE_NORMAL
- en: – Communication dos and don’ts
  prefs: []
  type: TYPE_NORMAL
- en: Even if you’re not using memory or custom instructions, clear prompting still
    works like training — one interaction at a time.
  prefs: []
  type: TYPE_NORMAL
- en: So if you’ve ever thought,
  prefs: []
  type: TYPE_NORMAL
- en: “I wish GPT just knew how I liked things done…”
  prefs: []
  type: TYPE_NORMAL
- en: 'Good news: It can.'
  prefs: []
  type: TYPE_NORMAL
- en: You just have to show it — once, clearly — and then reuse that instruction or
    prompt going forward.
  prefs: []
  type: TYPE_NORMAL
- en: Consistency beats perfection.
  prefs: []
  type: TYPE_NORMAL
- en: And every time you use GPT with intention, it gets better at working like you
    do.
  prefs: []
  type: TYPE_NORMAL
- en: Want to Go Deeper? It’s Coming.
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: If you’ve made it this far, you’re already ahead of the game.
  prefs: []
  type: TYPE_NORMAL
- en: You’re not just using ChatGPT — you’re starting to shape it to work with you
    .
  prefs: []
  type: TYPE_NORMAL
- en: And this chapter is just the beginning.
  prefs: []
  type: TYPE_NORMAL
- en: In our next book, we’ll go deeper into how to fully train ChatGPT to reflect
    your voice, your systems, and your way of doing business — so it feels less like
    a tool, and more like a team member who knows how you operate.
  prefs: []
  type: TYPE_NORMAL
- en: 'We’ll walk you through: – Setting up a “trained assistant” that thinks like
    your business'
  prefs: []
  type: TYPE_NORMAL
- en: – Teaching GPT to write in your tone, using your processes and templates
  prefs: []
  type: TYPE_NORMAL
- en: – Building smart workflows and reusable tools that lighten your workload
  prefs: []
  type: TYPE_NORMAL
- en: – Using memory and custom instructions to keep everything consistent
  prefs: []
  type: TYPE_NORMAL
- en: – Training your team to use GPT the same way you do
  prefs: []
  type: TYPE_NORMAL
- en: No fluff. No tech overwhelm. Just real-world, step-by-step guidance.
  prefs: []
  type: TYPE_NORMAL
- en: Because once you’ve seen what ChatGPT can do in a busy day —
  prefs: []
  type: TYPE_NORMAL
- en: you’ll want to make that support part of your whole system .
  prefs: []
  type: TYPE_NORMAL
- en: If that sounds like something you’d love, keep an eye out.
  prefs: []
  type: TYPE_NORMAL
- en: The next book’s for you.
  prefs: []
  type: TYPE_NORMAL
- en: Your Property Manager Swipe File
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Prompts, Templates & Wording You Can Use Straight Away
  prefs: []
  type: TYPE_NORMAL
- en: Let’s be honest — some days, you don’t want to start from scratch.
  prefs: []
  type: TYPE_NORMAL
- en: You don’t want to tweak, prompt, or think too hard.
  prefs: []
  type: TYPE_NORMAL
- en: You just want the right words, ready to go.
  prefs: []
  type: TYPE_NORMAL
- en: That’s what this swipe file is for.
  prefs: []
  type: TYPE_NORMAL
- en: This bonus chapter is your collection of ready-to-use prompts, phrases, and
    message templates you can feed straight into ChatGPT, customise with a few quick
    details, and send. No overthinking. No blank-page syndrome. Just support when
    you need it most.
  prefs: []
  type: TYPE_NORMAL
- en: 'You’ll find examples for: – Routine inspection messages'
  prefs: []
  type: TYPE_NORMAL
- en: – Owner and tenant updates
  prefs: []
  type: TYPE_NORMAL
- en: – Tribunal summaries
  prefs: []
  type: TYPE_NORMAL
- en: – Breach notices and follow-ups
  prefs: []
  type: TYPE_NORMAL
- en: – Social captions and listing blurbs
  prefs: []
  type: TYPE_NORMAL
- en: – Templates with plug-and-play placeholders
  prefs: []
  type: TYPE_NORMAL
- en: – And more — all designed to reflect the tone, structure, and clarity we’ve
    worked on throughout the book
  prefs: []
  type: TYPE_NORMAL
- en: 'Use this file to: – Save time on everyday writing'
  prefs: []
  type: TYPE_NORMAL
- en: – Build your own internal library
  prefs: []
  type: TYPE_NORMAL
- en: – Train ChatGPT to sound more like you, every time
  prefs: []
  type: TYPE_NORMAL
- en: Keep it handy. Add your own favourites.
  prefs: []
  type: TYPE_NORMAL
- en: And most importantly — use it to make your day lighter.
  prefs: []
  type: TYPE_NORMAL
- en: How to Use This Swipe File
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This swipe file isn’t a rulebook — it’s a shortcut.
  prefs: []
  type: TYPE_NORMAL
- en: It’s here to help you get unstuck, save time, and communicate clearly without
    starting from scratch.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here’s how to get the most out of it:'
  prefs: []
  type: TYPE_NORMAL
- en: 1\. Copy, Paste, Tweak
  prefs: []
  type: TYPE_NORMAL
- en: Most of the prompts and templates are ready to go.
  prefs: []
  type: TYPE_NORMAL
- en: Just copy the one that fits your task, drop it into ChatGPT, and tweak the details.
  prefs: []
  type: TYPE_NORMAL
- en: 'Example:'
  prefs: []
  type: TYPE_NORMAL
- en: '"Write a routine inspection summary for a 2-bedroom unit. The property is clean
    and well maintained, no issues reported. Tenant was present and cooperative."'
  prefs: []
  type: TYPE_NORMAL
- en: 2\. Add Details in Your Own Words
  prefs: []
  type: TYPE_NORMAL
- en: Not everything needs to be perfectly phrased before you start. Just drop in
    the key facts or dot points, and let ChatGPT shape them into something structured.
  prefs: []
  type: TYPE_NORMAL
- en: 'Example:'
  prefs: []
  type: TYPE_NORMAL
- en: '“Turn this into a message to the owner: Tenant reported leaking tap, plumber
    came on Wednesday, part ordered, due back Friday.”'
  prefs: []
  type: TYPE_NORMAL
- en: 3\. Use Placeholders for Repeat Tasks
  prefs: []
  type: TYPE_NORMAL
- en: Some templates include placeholders like [Tenant Name] or [Inspection Date].
  prefs: []
  type: TYPE_NORMAL
- en: Just swap in your info, or ask ChatGPT to do it for you.
  prefs: []
  type: TYPE_NORMAL
- en: 4\. Save Your Favourites
  prefs: []
  type: TYPE_NORMAL
- en: If a prompt gives you a great result? Save it. Use it again.
  prefs: []
  type: TYPE_NORMAL
- en: You’re building a library that works your way — and it gets faster every time.
  prefs: []
  type: TYPE_NORMAL
- en: 5\. Make It Yours
  prefs: []
  type: TYPE_NORMAL
