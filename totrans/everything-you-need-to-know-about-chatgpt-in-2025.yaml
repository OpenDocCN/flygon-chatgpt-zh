  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能的旅程始于超过半个世纪之前，当时科学家们开始梦想着能够模拟人类思维的机器。在1956年，术语“人工智能”在达特茅斯会议上被提出，标志着跨学科领域——统一数学、计算机科学和神经科学——的诞生。在那些早期日子里，人工智能专注于基于规则的系统，旨在遵循程序员预先定义的精确指令。虽然这些系统在当时令人印象深刻，但它们的适应和学习能力有限。
