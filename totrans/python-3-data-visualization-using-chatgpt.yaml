    语法应该对您很熟悉（许多基本教程都可在网上找到）。每个 NumPy 变量后面都跟着相应的 Pandas DataFrame mydf1、mydf2 和 mydf3。现在运行
    [列表 3.1](#list3-1) 中的代码，您将看到以下输出，并且您可以比较 NumPy 数组与 Pandas DataFrame：'
