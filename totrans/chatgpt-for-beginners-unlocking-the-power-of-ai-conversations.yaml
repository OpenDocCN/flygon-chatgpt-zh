    ****pol**icie**s ****t**o** ****pro**tec**t ****us**er** ****da**ta**, ****i**t**’****s****
    ****al**way**s ****sa**fer** ****t**o** ****li**mit** ****t**he** ****sha**rin**g
    ****o**f** ****pri**vat**e ****det**ail**s.'
