  id: totrans-767
  prefs: []
  type: TYPE_NORMAL
  zh: '**比较提示的主要目标**是帮助用户更好地理解被比较的元素，通过突出它们的相似性和差异。这有助于他们做出更明智的决定，无论是技术选择、哲学观点还是生活选择。'
- en: '****Ano**the**r ****impo**rtan**t ****go**al** ****i**s** ****t**o** ****pro**mot**e
    ****cri**tica**l ****a**nd** ****anal**ytica**l ****thi**nkin**g. ****B**y** ****as**kin**g
