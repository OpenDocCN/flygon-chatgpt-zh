- en: 'Prompt: “Does it make a difference to the distance a kicked football travels,
    whether it is filled with air or filled with helium?”'
  id: totrans-1890
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：“充满空气或充满氦气的足球踢出的距离是否有区别？”
- en: 'Response from ChatGPT:'
  id: totrans-1891
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT的回复：
- en: To determine if there’s a significant difference in the distance a kicked football
    travels based on whether it’s filled with air or helium, we typically employ statistical
    hypothesis testing. One of the most common tests for this purpose is the paired
    t-test, as it compares the means of two related groups.
  id: totrans-1892
  prefs: []
  type: TYPE_NORMAL
  zh: 为了确定根据是否充满空气或氦气，踢出的足球行进距离是否存在显著差异，我们通常采用统计假设检验。为此目的最常用的测试之一是配对t检验，因为它比较两个相关组的均值。
- en: The null hypothesis () for this test is that there’s no difference between the
    two means, i.e., the mean distance for footballs filled with air is the same as
    the mean distance for footballs filled with helium. The alternative hypothesis
    () is that there is a significant difference between the two means.
  id: totrans-1893
  prefs: []
  type: TYPE_NORMAL
  zh: 该测试的零假设（H0）是两个均值之间没有差异，即充满空气的足球的平均距离与充满氦气的足球的平均距离相同。备择假设（H1）是两个均值之间存在显著差异。
- en: To proceed, I’ll conduct a paired t-test on the “Air” and “Helium” metrics.
    If the p-value from the t-test is less than a significant level (typically 0.05),
    then we reject the null hypothesis and conclude that there is a significant difference
    between the two means. Otherwise, we fail to reject the null hypothesis and conclude
    that there is no significant difference.
  id: totrans-1894
  prefs: []
  type: TYPE_NORMAL
  zh: 为了继续，我将对“空气”和“氦气”指标进行配对t检验。如果t检验的p值小于显著性水平（通常为0.05），则我们拒绝零假设，并得出结论，两个均值之间存在显著差异。否则，我们未能拒绝零假设，并得出结论，两个均值之间没有显著差异。
- en: Let’s perform the paired t-test.
  id: totrans-1895
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们进行配对t检验。
- en: 'The results of the paired t-test are as follows:'
  id: totrans-1896
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 配对t检验的结果如下：
- en: '• t-statistic: −0.4198'
  id: totrans-1897
  prefs: []
  type: TYPE_NORMAL
  zh: • t统计量：-0.4198
- en: '• p-value: 0.6770'
  id: totrans-1898
  prefs: []
  type: TYPE_NORMAL
  zh: • p值：0.6770
- en: 'Given a common significance level of α=0.05:'
  id: totrans-1899
  prefs: []
  type: TYPE_NORMAL
  zh: 给定一个常见的显著性水平α=0.05：
- en: • Since the p-value (0.6770) is greater than 0.05, we fail to reject the null
    hypothesis.
  id: totrans-1900
  prefs: []
  type: TYPE_NORMAL
  zh: • 由于p值（0.6770）大于0.05，我们未能拒绝零假设。
- en: In other words, based on this dataset and the performed test, there’s no statistically
    significant difference in the distance a kicked football travels, whether it’s
    filled with air or helium.
  id: totrans-1901
  prefs: []
  type: TYPE_NORMAL
  zh: 换句话说，基于这个数据集和进行的测试，无论是充满空气还是氦气，踢出的足球行进距离在统计学上没有显著差异。
- en: 'Analysis Case 12.3: Analysis Using SFO Airport Survey Data'
  id: totrans-1902
  prefs: []
  type: TYPE_NORMAL
  zh: 分析案例12.3：使用SFO机场调查数据进行分析
- en: Analysis with Excel
  id: totrans-1903
  prefs: []
  type: TYPE_NORMAL
  zh: 使用Excel进行分析
- en: Use the Case Dataset files and find the file 2016_SFO_Customer_Survey_Data.xls.
    Open the data dictionary and have it available to consult as you work with the
    data.
  id: totrans-1904
  prefs: []
  type: TYPE_NORMAL
  zh: 使用案例数据集文件，找到文件2016_SFO_Customer_Survey_Data.xls。打开数据字典，并在处理数据时可供查阅。
- en: We are going to answer several questions using contingency analysis.
  id: totrans-1905
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将使用列联分析来回答几个问题。
- en: Do frequent flyer customers (fly > 100,000/year) feel differently about airport
    cleanliness, safety, and overall rating than regular flyers?
  id: totrans-1906
  prefs: []
  type: TYPE_NORMAL
  zh: 常旅客客户（每年飞行超过100,000次）对机场的清洁度、安全性和整体评分的感受是否与普通旅客不同？
- en: Open the data file in Excel. Create a pivot table of all IDs as rows by Q21FLY
    as columns. Enter the ratings for each row in the dataset by putting the sum of
    Q7ALL in the Results box. This yields two columns for the t-test comparison ([Figure
    12.17](#fig12-17)). Make sure to remove all but Category 1 (frequent fliers) and
    Category 2 (regular flyers) from the columns using the column filter.
  id: totrans-1907
  prefs: []
  type: TYPE_NORMAL
  zh: 在Excel中打开数据文件。创建一个以所有ID为行、以Q21FLY为列的交叉表。通过将Q7ALL的总和在结果框中输入，为数据集中的每一行输入评分。这会产生两个用于t检验比较的列（[图12.17](#fig12-17)）。请确保使用列过滤器从列中删除除类别1（常旅客）和类别2（普通旅客）之外的所有内容。
- en: Perform a t-test analysis with unequal variances. This should give us an answer
    to the question of how frequent flyers feel compared to regular customers. Do
    the two groups feel differently? Are the means significantly different?
  id: totrans-1908
  prefs: []
  type: TYPE_NORMAL
  zh: 进行具有不等方差的t检验分析。这将为我们提供关于常旅客与普通客户感受如何的比较答案。两组的感受是否不同？均值是否有显著差异？
- en: Since we did not know which average of the two would be higher before performing
    the t-test, we should accept the two-tailed result.
  id: totrans-1909
  prefs: []
  type: TYPE_NORMAL
  zh: 由于在执行t检验之前我们不知道两个平均值中哪一个会更高，我们应该接受双尾结果。
- en: '![image](images/pg289.jpg)'
  id: totrans-1910
  prefs: []
  type: TYPE_IMG
  zh: '![图片](images/pg289.jpg)'
- en: FIGURE 12.17 Pivot table parameters and results of the t-test analysis of overall
    customer satisfaction, comparing regular and frequent flyer customers
  id: totrans-1911
  prefs: []
  type: TYPE_NORMAL
  zh: 图12.17 交叉表参数和整体客户满意度t检验分析结果，比较普通和常旅客客户
- en: Create a pivot table of all IDs as rows by Q21FLY as columns ([Figure 12.18](#fig12-18)).
    Enter the ratings for each row in the dataset by putting the sum of Q9ALL (cleanliness)
    in the Results box. This yields two columns for the t-test comparison. Make sure
    to remove all but Category 1 (frequent fliers) and Category 2 (regular flyers)
    from the columns using the column filter. Perform a t-test analysis with unequal
    variances. This yields an answer to the difference between how frequent flyers
    feel about cleanliness compared to regular customers. Since before performing
    the test, we did not know which mean of the two would be higher, we should accept
    the two-tailed result.
  id: totrans-1912
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个以所有ID为行，以Q21FLY为列的交叉表（[图12.18](#fig12-18)）。通过将Q9ALL（清洁度）的总和在结果框中输入，为数据集中的每一行输入评分。这为t检验比较提供了两列。确保使用列过滤器从列中删除除类别1（常旅客）和类别2（普通乘客）之外的所有内容。进行不等方差t检验分析。这将回答常旅客与普通乘客对清洁度的感受差异。由于在执行测试之前，我们不知道两个均值中哪一个会更高，我们应该接受双尾结果。
- en: '![image](images/pg290.jpg)'
  id: totrans-1913
  prefs: []
  type: TYPE_IMG
  zh: '![image](images/pg290.jpg)'
- en: FIGURE 12.18 Pivot table parameters and results of the t-test analysis of customer
    satisfaction with airport cleanliness, comparing regular and frequent flyer customers
  id: totrans-1914
  prefs: []
  type: TYPE_NORMAL
  zh: 图12.18 比较普通乘客和常旅客对机场清洁度的满意度t检验分析结果，包括交叉表参数
- en: Create a pivot table of all IDs as rows by Q21FLY as columns ([Figure 12.19](#fig12-19)).
    Enter the ratings for each row in the dataset by putting the sum of Q10ALL in
    the Results box. This yields two columns for the t-test comparison. Make sure
    to remove all but Category 1 (frequent fliers) and Category 2 (regular flyers)
    from the columns using the column filter. Perform a t-test analysis with unequal
    variances. This should give us an answer to the difference between how frequent
    flyers feel about safety compared to regular customers. Since before performing
    the test, we did not know which mean of the two would be higher, we should accept
    the two-tailed result. Notice that in this case, the t-test fails the two-tailed
    result but passes the one-tailed result, forcing us to accept the null hypothesis
    and conclude that the means are not significantly different.
  id: totrans-1915
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个以所有ID为行，以Q21FLY为列的交叉表（[图12.19](#fig12-19)）。通过将Q10ALL的总和在结果框中输入，为数据集中的每一行输入评分。这为t检验比较提供了两列。确保使用列过滤器从列中删除除类别1（常旅客）和类别2（普通乘客）之外的所有内容。进行不等方差t检验分析。这将给出常旅客与普通乘客对安全感的感受差异。由于在执行测试之前，我们不知道两个均值中哪一个会更高，我们应该接受双尾结果。注意，在这种情况下，t检验未通过双尾结果但通过了单尾结果，迫使我们接受零假设并得出结论，均值没有显著差异。
