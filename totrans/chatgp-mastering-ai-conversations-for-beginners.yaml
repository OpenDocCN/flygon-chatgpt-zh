  id: totrans-361
  prefs: []
  type: TYPE_NORMAL
  zh: '**与人工智能将取代我们的工作**的恐惧相关的是**人工智能**也可能比我们更聪明的恐惧。我们中的许多人已经感到自卑，当涉及到今天正在开发的技术的**复杂性**时，我们感到困惑。再加上**人工智能**似乎变得更聪明的**事实**，你就有了一种人类不安全感的**双重打击**。但不要害怕！因为**人工智能**并不比一个五年级学生更聪明。**至少**还不是。'
