- en: 1.2 Undergraduate Use of Artificial Intelligence
  id: totrans-205
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 1.2 本科生对人工智能的使用
- en: In this section, we explore the experiences of two undergraduate students integrating
    ChatGPT and various AI tools into their educational endeavors. Both 21-year-old
    female students are progressing through their education degrees at the University
    of Kansas. The insights presented here are drawn from in-depth surveys completed
    by these students. We aim to highlight how undergraduate students engage with
    and leverage AI technologies, offering a glimpse into the emerging role of AI
    in the undergraduate academic landscape.
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，我们探讨了两名本科生将ChatGPT和各种人工智能工具整合到他们的教育实践中的经历。这两位21岁的女性学生正在堪萨斯大学攻读教育学位。这里提出的见解来源于这些学生完成的大量调查。我们的目标是突出本科生如何参与和利用人工智能技术，为人工智能在本科生学术领域的崭新角色提供一瞥。
- en: 1.2.1 Undergraduate Student 1
  id: totrans-207
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1.2.1 本科生1
- en: '*Female, 21 years old, White. Senior at the University of Kansas*'
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
  zh: '*女性，21岁，白人。堪萨斯大学大四学生* '
- en: 1.2.1.1 Introduction
  id: totrans-209
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 1.2.1.1 简介
- en: Reflecting on my use of ChatGPT, I find myself in the early stages of navigating
    the terrain of AI as a novice. I am a 21-year-old White female student, currently
    a senior at the University of Kansas. My interactions with ChatGPT are a regular
    part of my routine, occurring three to four times weekly. However, it’s important
    to note that my experience with AI tools is largely confined to ChatGPT, as I
    have not yet explored other AI technologies extensively. In the coming sections,
    I highlight my usage and perspectives on ChatGPT, outlining its integration and
    influence on my educational practices, the evolution of my study habits and time
    management in the presence of AI, and my contemplations on the ethical implications
    and future outlook of AI within the academic sphere.
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: 反思我使用ChatGPT的经历，我发现自己在作为新手探索人工智能领域还处于早期阶段。我是一名21岁的白人女性学生，目前就读于堪萨斯大学的大四学生。我与ChatGPT的互动是我日常的一部分，每周发生三到四次。然而，重要的是要注意，我的AI工具使用经验主要局限于ChatGPT，因为我还没有广泛探索其他人工智能技术。在接下来的部分中，我将突出我对ChatGPT的使用和观点，概述其在我的教育实践中的整合和影响，以及在人工智能存在的情况下我的学习习惯和时间管理的演变，以及我对学术领域内人工智能伦理影响和未来展望的思考。
- en: 1.2.1.2 Initial Perspectives
  id: totrans-211
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 1.2.1.2 初步观点
- en: In exploring the use of ChatGPT and AI in my academic life, I have discovered
    an intersection between this emerging technology and my education. My initial
    foray into using ChatGPT was a blend of curiosity and practicality. Initially,
    my tasks ranged from using ChatGPT to create creative pieces like birthday cards
    and poems about friends to refining and generating grocery lists and reducing
    recipes to feed one person. Seeing how well I did these tasks, I wanted to test
    them in my academic settings.
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
  zh: 在探索ChatGPT和人工智能在我的学术生活中的应用时，我发现这项新兴技术与我的教育之间存在交集。我最初使用ChatGPT是出于好奇和实用性。最初，我的任务范围从使用ChatGPT创作生日卡片和关于朋友的诗歌，到精简和生成购物清单以及将食谱简化为一人的食物。看到我在这些任务上的表现，我想在我的学术环境中测试它们。
- en: 1.2.1.3 Academic Life
  id: totrans-213
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 1.2.1.3 学术生活
- en: Since my initial use of ChatGPT, it has become vital to my study routine. I
    began by utilizing ChatGPT to enhance my thought process and generate ideas for
    discussion board posts, an essential element of most classes. ChatGPT’s ability
    to refine my thoughts and summarize articles for various subjects has significantly
    improved my engagement in these discussions. Its proficiency in distilling complex
    articles into more comprehensible insights has been particularly beneficial, aiding
    my understanding and saving me considerable time; this is particularly evident
    when I need to locate specific information within an article.
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
  zh: 自从我最初使用ChatGPT以来，它已经成为我学习日常的重要组成部分。我开始利用ChatGPT来增强我的思维过程并为讨论区帖子生成想法，这是大多数课程的一个基本要素。ChatGPT在精炼我的思想和为各种主题总结文章方面的能力显著提高了我在这些讨论中的参与度。它将复杂文章提炼成更易理解的洞察力方面的熟练程度特别有益，帮助我理解并节省了大量时间；这在我需要在一篇文章中找到特定信息时尤为明显。
- en: Furthermore, I have incorporated ChatGPT into various assessment tasks. It has
    been instrumental in generating ideas and structuring outlines for papers and
    other assignments. This tool has also been pivotal in crafting and refining lesson
    plans for my higher education classes and during real-life teaching placements.
    ChatGPT’s contributions have been especially valuable in developing lesson plans
    and intervention strategies for special education students, making my work sound
    more polished and enhancing my perspective, leading to a more comprehensive approach
    to my assignments. It is important to highlight that I do not rely solely on AI
    for completing my assignments. I allocate the same amount of time I would without
    its assistance. However, I have found that AI has enabled me to complete assignments
    more efficiently. In addition to academic writing, I have utilized ChatGPT to
    draft professional and academic emails, with the results generally being positively
    received. Knowing that my emails and responses are thoroughly checked for spelling
    and appropriateness before sending is reassuring. This capability of ChatGPT to
    elevate the professionalism of my communications is a primary reason why I plan
    to continue using it in my academic journey. It allows me to focus on content
    while ensuring the language is refined and appropriate.
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，我已经将ChatGPT纳入各种评估任务中。它在生成论文和其他作业的想法和构建大纲方面发挥了重要作用。这个工具在我高等教育课程和实际教学实习期间制定和改进课程计划也至关重要。ChatGPT在为特殊教育学生制定课程计划和干预策略方面的贡献尤其宝贵，使我的工作听起来更加精致，并丰富了我的视角，从而使我对待作业的方法更加全面。重要的是要强调，我并不完全依赖AI来完成我的作业。我分配的时间与没有它的帮助时相同。然而，我发现AI使我能够更有效地完成作业。除了学术写作外，我还利用ChatGPT起草专业和学术邮件，结果通常得到积极的反馈。知道我的邮件和回复在发送前都经过了彻底的拼写和适当性检查，这让我感到安心。ChatGPT提升我沟通专业性的能力是我计划在学术旅程中继续使用它的主要原因。它让我能够专注于内容，同时确保语言精炼且适当。
- en: 1.2.1.4 Ethical Considerations and Future Perspectives of AI in Education
  id: totrans-216
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 1.2.1.4 教育中AI的伦理考量与未来展望
- en: When considering the ethics of engaging and utilizing AI and ChatGPT, I was
    torn between whether I consider its use ethical or not. My stance on ethics hinges
    on the manner in which it is applied. It is one thing to employ AI as a supplementary
    tool for brainstorming or comprehension enhancement and quite another to let it
    wholly author assignments, which raises questions about academic integrity, in
    which case I would say it is not ethical.
  id: totrans-217
  prefs: []
  type: TYPE_NORMAL
  zh: 当考虑使用和利用AI和ChatGPT的伦理问题时，我在是否认为其使用是道德的这个问题上感到矛盾。我对伦理的看法取决于其应用方式。将AI作为辅助工具用于头脑风暴或理解增强是一种情况，而让它完全撰写作业则是另一种情况，这引发了关于学术诚信的问题，在这种情况下，我会说它是不道德的。
- en: As an undergraduate student, I am really conscious of the risks of being accused
    of cheating with ChatGPT. I make sure to use it cautiously, always cross-checking
    its responses to ensure they are accurate before I consider incorporating them
    into my work. Among my fellow students, there is a mix of opinions. Some are pretty
    relaxed, accepting ChatGPT’s outputs as they are. Still, many of us view it as
    potentially crossing the line into cheating unless we have explicit permission
    from our professors.
  id: totrans-218
  prefs: []
  type: TYPE_NORMAL
  zh: 作为一名本科生，我非常意识到使用ChatGPT被指控作弊的风险。我确保谨慎使用它，在考虑将其内容纳入我的工作之前，总是交叉检查其回答以确保其准确性。在我的同学中，意见不一。有些人相当放松，接受ChatGPT的输出。然而，我们中的许多人认为，除非我们得到教授的明确许可，否则将其视为可能越过作弊界限。
- en: In some cases, professors have suggested using ChatGPT, especially for tasks
    like organizing lesson plans or helping with writing, which is real-time. In these
    situations, most students, including myself, feel more comfortable using it, as
    it comes with the endorsement of our educators.
  id: totrans-219
  prefs: []
  type: TYPE_NORMAL
  zh: 在某些情况下，教授们建议使用ChatGPT，尤其是对于像组织课程计划或帮助写作这样的实时任务。在这些情况下，包括我自己在内的大多数学生都更愿意使用它，因为它是我们教育者的认可。
- en: Still, there’s a significant concern about the ethical implications of using
    ChatGPT among many students, making it a topic of ongoing debate and consideration
    in our academic community.
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管如此，许多学生对使用ChatGPT的伦理影响表示担忧，这使得它成为我们学术社区持续辩论和考虑的话题。
- en: I do not believe the platform is currently being used to an extent at the University
    of Kansas that would warrant a ban. However, should a time come when students
    begin to depend on it extensively for their entire workload, replacing key aspects
    of traditional learning, I would then support a ban. It is crucial to maintain
    a balance where AI tools like ChatGPT enhance rather than replace the foundational
    elements of academic study.
  id: totrans-221
  prefs: []
  type: TYPE_NORMAL
  zh: 我认为目前堪萨斯大学并没有到需要禁止这个平台的地步。然而，如果有一天学生开始大量依赖它来完成整个工作量，取代传统学习的关键部分，那时我会支持禁止。保持平衡，让像ChatGPT这样的AI工具增强而不是取代学术研究的基础要素是至关重要的。
- en: 1.2.1.5 Conclusion
  id: totrans-222
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 1.2.1.5 结论
- en: Looking back on my experiences with ChatGPT and AI, I am really fascinated by
    how AI is changing education. I can see a future where AI is part of everything
    we do—from how we write emails to being a regular feature in programs like Microsoft
    Word or even changing how we search on Google. But right now, I think how we use
    AI and what we think is okay or not really depends on whether our professors are
    engaged with ChatGPT and allow it. There are a lot of different opinions on this,
    and it feels like the role of AI in our learning is up in the air.
  id: totrans-223
  prefs: []
  type: TYPE_NORMAL
  zh: 回顾我与ChatGPT和AI的经历，我真的很着迷于AI是如何改变教育的。我可以看到一个未来，AI将成为我们做一切事情的一部分——从我们写电子邮件到成为Microsoft
    Word等程序中的常规功能，甚至改变我们在Google上的搜索方式。但就目前而言，我认为我们如何使用AI以及我们认为什么是对的或不对的，取决于我们的教授是否参与ChatGPT并允许使用它。对此有很多不同的观点，感觉在我们学习中的AI角色悬而未决。
- en: 1.2.2 Undergraduate Student 2
  id: totrans-224
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1.2.2 本科生2
- en: '*Female, 21 years old, White. Senior at the University Of Kansas*'
  id: totrans-225
  prefs: []
  type: TYPE_NORMAL
  zh: '*女性，21岁，白人。堪萨斯大学大四学生*'
- en: 1.2.2.1 Introduction
  id: totrans-226
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 1.2.2.1 简介
- en: I would consider myself a beginner in my experience with AI. I use ChatGPT at
    least once a week, sometimes daily. While I use ChatGPT fairly frequently, I have
    not utilized many other AI tools.
  id: totrans-227
  prefs: []
  type: TYPE_NORMAL
  zh: 我会认为自己是在AI方面的初学者。我至少每周使用一次ChatGPT，有时甚至每天使用。虽然我相当频繁地使用ChatGPT，但我并没有充分利用许多其他AI工具。
- en: 1.2.2.2 Initial Perspectives
  id: totrans-228
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 1.2.2.2 初步观点
- en: I began using AI to create fantasy portraits of myself and my cat on TikTok
    for a trend. I have asked it to create budget- and time-friendly meal plans for
    college students. I enjoy being able to easily modify the plan with my dietary
    restrictions, preferences, and goals. My friends and I have taken personality
    tests ranging from our attachment styles to which muppet we are that AI has generated
    for us.
  id: totrans-229
  prefs: []
  type: TYPE_NORMAL
  zh: 我开始使用AI在TikTok上创建我自己的和我的猫的幻想画像，以追求一种趋势。我曾要求它为大学生创建预算和时间友好的餐单计划。我喜欢能够轻松地根据我的饮食限制、偏好和目标修改计划。我和我的朋友们进行了从我们的依恋风格到AI为我们生成的哪个木偶是我们自己的性格测试。
- en: 1.2.2.3 Academic Life
  id: totrans-230
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 1.2.2.3 学术生活
- en: I have used ChatGPT to assist with my studies this semester. I use the tool
    to give me quick definitions or review concepts from class that I did not fully
    understand or remember. I have asked it to explain the concepts like I was five
    years old and have asked follow-up questions based on its response. I have also
    used the tool to create study guides based on the information I provide it. It
    is quickly organized and can be formatted as a test, which is beneficial to me.
    I like that it does a lot of the work for me, not so much the ideas and content,
    but the bare bones of my understanding and organizing.
  id: totrans-231
  prefs: []
  type: TYPE_NORMAL
  zh: 我在本学期的学习中使用了ChatGPT来协助。我使用这个工具来快速获取定义或复习我在课堂上没有完全理解或记住的概念。我曾要求它像对我五岁时解释概念一样进行解释，并根据它的回答提出后续问题。我还使用这个工具根据我提供的信息创建学习指南。它能够快速组织，并可以格式化为测试，这对我很有益。我喜欢它能为我做很多工作，不仅仅是想法和内容，而是我理解和组织的基础。
- en: I use ChatGPT more frequently than I use Quizlet now because of the user-friendliness
    and affordability. I still incorporate studying with pen and paper, but it has
    altered my studying by acting like a partner for me to review with. Although some
    might find the human touch of AI to be unnerving, I like that it is kind of like
    having a conversation with a robot. I [however] like to start with AI to see what
    it can come up with, but then I Google what it says to see if I can find any credible
    sources. I asked it about a court case’s ruling, and it was completely wrong with
    how the judges voted (it got the ruling correct, but not the distribution of votes).
    I told it that it was wrong, and it apologized and provided another false piece
    of information about the judging votes.
  id: totrans-232
  prefs: []
  type: TYPE_NORMAL
  zh: 由于ChatGPT的用户友好性和性价比，我现在比现在使用Quizlet更频繁。我仍然结合使用笔和纸进行学习，但它通过作为我的复习伙伴来改变了我的学习方式。尽管有些人可能觉得人工智能的人类触感令人不安，但我喜欢它有点像与机器人对话。我[然而]喜欢先从人工智能开始，看看它能想出什么，然后我谷歌它所说的内容，看看我是否能找到任何可靠的来源。我询问了一个法庭案件的裁决，它对法官投票的方式完全错误（它正确地给出了裁决，但没有正确地给出投票分布）。我告诉它它是错误的，它道歉并提供了关于投票分布的另一条错误信息。
- en: 'I have used AI tools to assist in my coursework. I have asked what areas of
    ELA (English Language Arts) content students typically learn at various ages or
    for ideas on lesson planning to take inspiration from. I have yet to encounter
    a lesson plan fully ready to be used in a real classroom, but there are good pieces
    that can be looked at for further development. I did have ChatGPT write an essay
    on Bigfoot for my practicum students (as an example of examining an essay’s) organization.
    Despite explicit instructions and requests, (this AI) tool still did not incorporate
    all elements that I asked for: [I had asked for the essay to contain] no contractions,
    (be written at a) ninth-grade vocabulary level, the inclusion of hypothetical
    sources, restate the thesis in conclusion.'
  id: totrans-233
  prefs: []
  type: TYPE_NORMAL
  zh: 我已经使用人工智能工具来协助我的课程作业。我询问了学生在不同年龄段通常学习的ELA（英语语言艺术）内容领域，或者为课程规划提供灵感。我还没有遇到一个完全准备好在真实课堂中使用的教案，但有一些好的部分可以进一步发展。我确实让ChatGPT为我的实习学生写了一篇关于大脚怪的文章（作为检查文章组织的例子）。尽管有明确的指示和要求，(这个AI)工具仍然没有包含我要求的所有元素：[我要求文章不使用缩写，用九年级的词汇水平写作，包含假设性来源，在结论中重申论点]。
- en: I think AI will be integrated as a tool for helping both students and teachers.
    As a future teacher, I think it will be great to create simple worksheets for
    vocabulary or grammar practice. It could also help students with their studying
    or catching writing mistakes. I would see AI being used as an after-school tutor
    to double-check their work in my ideal world. I think its integration will make
    prompts for assignments more specific so that it is harder for AI to formulate
    an authentic response. In daily life, it could become the new Google or go to
    search resource.
  id: totrans-234
  prefs: []
  type: TYPE_NORMAL
  zh: 我认为人工智能将作为一个工具被整合，以帮助学生和教师。作为一名未来的教师，我认为为词汇或语法练习创建简单的练习册将是一件很棒的事情。它还可以帮助学生学习和捕捉写作错误。在我的理想世界中，我会看到人工智能被用作课后辅导老师，来双重检查他们的作业。我认为它的整合将使作业提示更加具体，这样人工智能就很难构建一个真实的回应。在日常生活中，它可能成为新的谷歌或搜索资源。
- en: 1.2.2.4 Ethical Considerations and Future Perspectives of AI in Education
  id: totrans-235
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 1.2.2.4 教育中人工智能的伦理考量与未来展望
- en: As I have only been using ChatGPT since March, I do not know of any long-term
    impacts on my learning process. As of now, I feel more agitated (when professors
    assign what). I consider it busy work because I feel like ChatGPT would be perfectly
    capable of doing them instead. I imagine it would be lower quality and clearly
    in a robotic tone. It is easier for me to get started on projects or assignments
    because I can easily find inspiration using ChatGPT. I asked it to make a list
    of themes in *Romeo and Juliet* and while it gave some vague concepts to focus
    on, I was able to refine my area of interest.
  id: totrans-236
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我自3月份才开始使用ChatGPT，我不知道它对我的学习过程有任何长期影响。到目前为止，我感觉（当教授布置作业时）更加焦虑。我认为这是一项繁琐的工作，因为我觉得ChatGPT完全可以胜任这些工作。我可以用ChatGPT轻松找到灵感，开始项目或作业。我让它列出《罗密欧与朱丽叶》的主题，虽然它给出了一些模糊的概念来关注，但我能够细化我的兴趣领域。
- en: ChatGPT has positively impacted my time management because it can organize information,
    speed up my searches for definitions and concepts, and the idea stage of coursework.
    I do not account for AI integration in my time management as I still consider
    it an unreliable source at this point. I think it could be a good tool for crafting
    professional communications between colleagues or professors. However, I would
    strongly encourage reading it through and editing for appropriateness and human
    touch. It could be beneficial in stressful situations or where tensions are high.
    I have not used the tool in this way, so I have no personal experience with it.
    I can imagine the receiver of an AI-generated message might be insulted or offended
    by the lack of effort from the sender.
  id: totrans-237
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT对我的时间管理产生了积极影响，因为它可以组织信息，加快我查找定义和概念的速度，以及课程作业的初步阶段。我并没有在我的时间管理中考虑AI的整合，因为我仍然认为它在这个阶段是不可靠的来源。我认为它可以是同事或教授之间制作专业沟通的好工具。然而，我会强烈建议阅读并编辑以确保适当性和人性化的触感。在压力大的情况下或紧张局势高的地方，它可能是有益的。我还没有以这种方式使用这个工具，所以我没有个人经验。我可以想象，接收AI生成消息的人可能会因为发送者的不努力而感到受辱或冒犯。
- en: I think there is a balance that can be maintained to recognize ChatGPT as ethical
    in academia. Honesty about usage is important. If students feel the need to hide
    their usage and incorporation of the tool, I think that is a good indicator that
    they are relying on it too heavily and crossing into plagiarism. It is tricky
    that the available AI recognition tools are not reliably accurate and could lead
    to false accusations or the missed use of AI. Additionally, I know that ChatGPT
    does not always provide correct information or cite its own sources, so that makes
    referencing and giving true credit tricky as well. The line between authenticity
    and fabrication becomes blurry.
  id: totrans-238
  prefs: []
  type: TYPE_NORMAL
  zh: 我认为可以保持一种平衡，将ChatGPT视为学术界的道德工具。关于使用的诚实很重要。如果学生觉得需要隐藏他们使用和整合这个工具的情况，我认为这是一个很好的迹象，表明他们过于依赖它，并可能已经跨入了剽窃的界限。可用的AI识别工具并不总是可靠准确的，可能会导致错误的指控或AI使用的遗漏。此外，我知道ChatGPT并不总是提供正确的信息或引用其自己的来源，这使得引用和给予真正信用变得复杂。真实性和伪造之间的界限变得模糊。
- en: I do not want myself or my classmates to stop thinking and choose to use AI
    instead. The lack of critical thinking can have dangerous outcomes in the future
    and not prepare students to be involved in society.
  id: totrans-239
  prefs: []
  type: TYPE_NORMAL
  zh: 我不希望我自己或我的同学们停止思考，选择使用人工智能。缺乏批判性思维在未来可能会产生危险的结果，并且不能让学生为参与社会做好准备。
- en: I know my peers in education are concerned that people will choose AI instead
    of real, human teachers. Some people do not see it as a tool and only recognize
    it for the harm it has the potential to (cause). There is a fear that it was created
    to gather data/information from people that will be used against them someday.
  id: totrans-240
  prefs: []
  type: TYPE_NORMAL
  zh: 我知道教育界的同行们担心人们会选择人工智能而不是真正的、人类教师。有些人并不将其视为一种工具，而只认识到它可能带来的危害（造成）。有人担心它是为了收集人们的数据/信息，将来可能会被用来对付他们。
- en: 1.2.2.5 Conclusion
  id: totrans-241
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 1.2.2.5 结论
- en: I absolutely do not think ChatGPT should be banned at the University of Kansas.
    Banning technology is hardly a way to prevent its use by students. It could prevent
    students from getting familiar with a potential tool in their job force. On the
    other hand, it could promote academic integrity and result in higher-quality learning.
    (Reactions I have seen from my professors) range from being curious about ChatGPT
    to being avid users themselves. Nearly all of my professors this past year have
    shown some sort of AI tool for the classroom during their lessons. We are being
    prepared as future educators on the negatives of ChatGPT and what to look out
    for as well.
  id: totrans-242
  prefs: []
  type: TYPE_NORMAL
  zh: 我绝对不认为ChatGPT应该在堪萨斯大学被禁止。禁止技术几乎不能阻止学生使用它。它可能会阻止学生熟悉他们未来工作场所可能用到的工具。另一方面，它可能会促进学术诚信，并导致更高质量的学习。（我教授们的反应）从对ChatGPT的好奇到成为其狂热用户，各不相同。去年，我几乎所有教授在他们的课程中都展示了一些AI工具。我们正在为成为未来的教育者做准备，了解ChatGPT的负面影响以及需要注意的事项。
- en: 1.3 Graduate Use of Artificial Intelligence
  id: totrans-243
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 1.3 人工智能的毕业生使用
- en: In the upcoming section, we explore the firsthand accounts of two doctoral candidates
    who are utilizing ChatGPT and other AI tools in their academic journey. Both are
    amid their Ph.D. dissertations at the University of Kansas, where they are enroled
    in the Curriculum and Teaching Ph.D. program. They will share insights into their
    engagement with and utilization of these advanced technologies, providing a window
    into the role of AI in higher education and research.
  id: totrans-244
  prefs: []
  type: TYPE_NORMAL
  zh: 在接下来的章节中，我们将探讨两位博士研究生的亲身经历，他们正在利用ChatGPT和其他AI工具进行学术之旅。他们都正在堪萨斯大学的课程与教学博士项目中攻读博士学位。他们将分享他们对这些先进技术的参与和利用的见解，为高等教育和研究中的AI角色提供一扇窗口。
- en: 1.3.1 Graduate Student 1
  id: totrans-245
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1.3.1 研究生1
- en: '*Male, 30–32 Years Old, White. Undertaking Ph.D. at the University Of Kanas.*'
  id: totrans-246
  prefs: []
  type: TYPE_NORMAL
  zh: '*男性，30-32岁，白人。在堪萨斯大学攻读博士学位。*'
- en: In 2023, ChatGPT reached its first anniversary since its public debut and as
    a graduate student, I find it hard to imagine my daily routine without it. Having
    been immersed in technology from a young age and having taught an introductory
    course on technology for over seven years, not to mention my research in the field,
    it is safe to say that the launch of ChatGPT immediately captured my attention.
    I eagerly explored every possible way to integrate it into my work. Now, it feels
    like a day hardly counts unless I have posed at least 20 questions to ChatGPT.
    It has become such a cornerstone of my daily activities that if I had not interacted
    with it, I might as well have not turned on my computer. In this section, I will
    outline how, as a graduate student, I engage with and leverage ChatGPT to streamline
    my workflow, enhance efficiency, and expand my capabilities as a graduate student
    and researcher.
  id: totrans-247
  prefs: []
  type: TYPE_NORMAL
  zh: 2023年，ChatGPT迎来了其公开亮相以来的第一个周年纪念日，作为一名研究生，我很难想象没有它的日常生活。从小我就沉浸在科技中，并且已经教授了超过七年的科技入门课程，更不用说我在该领域的研究了，因此可以说ChatGPT的发布立即引起了我的注意。我急切地探索了将ChatGPT整合到我的工作中的每一种可能的方式。现在，除非我至少向ChatGPT提出了20个问题，否则我觉得一天过得不算数。它已经成为我日常活动的一个基石，如果没有与之互动，我可能还不如不开电脑。在本节中，我将概述作为一名研究生，我是如何参与并利用ChatGPT来简化我的工作流程、提高效率和扩展我的研究生和研究能力。
- en: 1.3.1.1 Academic Purposes (In Class and Research)
  id: totrans-248
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 1.3.1.1 学术目的（课堂和科研）
- en: In my daily academic practice, I engage with ChatGPT as if it were my 24/7 personal
    assistant, employing it for many purposes. Primarily, I utilize ChatGPT to refine
    and edit emails and texts. This typically involves requests such as “refine this
    paragraph” or inquiries into the tone of an email. While I initiate drafts personally,
    I frequently enlist ChatGPT’s capabilities to enhance or contextualize these drafts
    appropriately. Beyond these routine tasks, ChatGPT is pivotal in my research and
    teaching endeavors. In the context of my dissertation work, ChatGPT significantly
    reduces the time required for code review and debugging. Queries like “What is
    wrong with this code?” or “Diagnose the error in this code,” which once demanded
    extensive manual effort, are now swiftly addressed by ChatGPT. Moreover, I leverage
    ChatGPT to synthesize research paper summaries and outlines or review theoretical
    frameworks and seek frameworks I had not previously engaged with. I also engage
    with ChatGPT to stay abreast of recent scholarly publications in my field by creating
    alerts for newly published articles. ChatGPT assists in concisely refining abstracts
    and simulating potential questions for oral examinations based on answers provided
    in the written comprehensive exams. Additionally, ChatGPT serves as an interactive
    tool for navigating my research documentation. Rather than meticulously perusing
    extensive dissertations, I utilize ChatGPT to swiftly retrieve specific information
    by querying, for example, “What was [specific content X]?” or “How did I articulate
    the rationale for [a particular topic]?”
  id: totrans-249
  prefs: []
  type: TYPE_NORMAL
  zh: 在我的日常学术实践中，我将ChatGPT视为我的全天候个人助理，并用于多种目的。主要来说，我利用ChatGPT来精炼和编辑电子邮件和文本。这通常涉及“精炼这一段落”或询问电子邮件的语气。虽然我亲自发起草稿，但我经常请求ChatGPT的能力来适当增强或具体化这些草稿。在这些常规任务之外，ChatGPT在我的研究和教学工作中至关重要。在我的论文工作中，ChatGPT显著减少了代码审查和调试所需的时间。以前需要大量手动工作的查询，如“这段代码有什么问题？”或“诊断这段代码中的错误”，现在可以迅速由ChatGPT解决。此外，我利用ChatGPT来综合研究论文的摘要和提纲或审查理论框架，并寻找我之前未曾接触过的框架。我还与ChatGPT互动，以了解我领域内的最新学术出版物，通过为新发表的文章创建警报。ChatGPT帮助简洁地精炼摘要，并基于书面综合考试中的答案模拟口头考试可能提出的问题。此外，ChatGPT还作为导航我的研究文档的交互式工具。我不再仔细阅读大量的论文，而是利用ChatGPT通过查询，例如“[具体内容X]是什么？”或“我是如何阐述[特定主题]的推理的？”来迅速检索特定信息。
- en: While I acknowledge ChatGPT’s significant potential in data analytics, I have
    not yet fully delved into this aspect. As a PhD candidate, I believe having a
    firm grasp of qualitative and quantitative data analysis is crucial, including
    the ability to generate and code my findings independently. This skill is vital
    for my future career. Nevertheless, using ChatGPT to verify and validate my analyses
    has been beneficial. It boosts my confidence by affirming areas where I excel
    and highlighting instances where further analysis might be necessary.
  id: totrans-250
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然我承认ChatGPT在数据分析方面的巨大潜力，但我还没有深入探讨这一方面。作为一名博士生，我认为掌握定性和定量数据分析至关重要，包括独立生成和编码我的发现的能力。这项技能对我的未来职业至关重要。尽管如此，使用ChatGPT来验证和确认我的分析已经是有益的。它通过确认我擅长的领域并突出需要进一步分析的情况来增强我的信心。
- en: In addition to its practical applications, ChatGPT serves as a subject of my
    academic research. My fascination with technology, especially in the context of
    technology adoption and the diffusion of innovations theory, has guided this focus.
    As [Rogers (2003](#ch09.xhtml#r005), p. 12) defines, “An innovation is an idea,
    practice, or object that is perceived as new by an individual or other unit of
    adoption.” This theory helps us understand how an idea or product like ChatGPT
    gradually gains momentum and spreads across a specific population ([Dearing &
    Cox, 2018](#ch09.xhtml#r004)).
  id: totrans-251
  prefs: []
  type: TYPE_NORMAL
  zh: 除了其实际应用之外，ChatGPT还成为了我学术研究的主题。我对技术的迷恋，尤其是在技术采用和创新扩散理论背景下，引导了这一研究焦点。正如[Rogers
    (2003](#ch09.xhtml#r005), p. 12)所定义的，“创新是一个被个人或其他采用单位视为新的想法、实践或对象。”这一理论帮助我们理解像ChatGPT这样的想法或产品是如何逐渐获得动力并在特定人群中传播的([Dearing
    & Cox, 2018](#ch09.xhtml#r004))。
- en: My colleagues and I have conducted extensive studies, since ChatGPT’s initial
    release in November 2023, examining its usage, implications, and ethical considerations
    in higher education, as documented in our publications ([Parker et al., 2024a](#ch09.xhtml#r010),
    [2024b](#ch09.xhtml#r011)). Additionally, my research extends to exploring the
    effectiveness of ChatGPT in addressing high school exams. Overall, ChatGPT has
    presented remarkable opportunities for research and exploration in various educational
    contexts.
  id: totrans-252
  prefs: []
  type: TYPE_NORMAL
  zh: 自2023年11月ChatGPT首次发布以来，我和我的同事进行了广泛的研究，考察了其在高等教育中的使用、影响和伦理考量，这些内容已记录在我们的出版物中（[Parker等人，2024a](#ch09.xhtml#r010)，[2024b](#ch09.xhtml#r011)）。此外，我的研究还扩展到探索ChatGPT在应对高中考试中的有效性。总的来说，ChatGPT为各种教育环境中的研究和探索提供了显著的机会。
- en: 1.3.1.2 Teaching Purposes
  id: totrans-253
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 1.3.1.2 教学目的
- en: In the sphere of graduate teaching, my instructional strategies have been significantly
    enriched by the integration of ChatGPT. Initially, I leveraged ChatGPT to analyze
    the course syllabus and required instructional guidelines, creating a checklist
    that ensures all educational objectives are met without manually rescanning every
    page to ensure syllabus guidelines are met. In my classes, students were traditionally
    tasked with developing a basic game using Scratch Jr, which is a basic coding
    app to build games, including creating rudimentary design diagrams and hand-drawn
    mockups. However, with the introduction of ChatGPT, they can now produce highly
    detailed, hyperrealistic game design documents and storyboards with a click of
    a button. This advanced approach has transformed how students troubleshoot and
    refine their coding projects. Students are encouraged to engage with ChatGPT to
    address specific programming challenges, asking questions like, “How do I add
    a new level to my game?” This shift enables me as the teacher to ensure that students’
    progress through the course efficiently without needing extensive individual attention,
    which is typically a significant drain on time. Moreover, the use of ChatGPT extends
    to career preparation, where students align their resumes with teaching job descriptions
    and generate tailored mock interview questions based on their credentials. I am
    developing a ChatGPT-based chatbot encompassing comprehensive course materials,
    syllabi, study guides, and example assessments. This tool is designed to offer
    undergraduate students a 24/7 resource for course-related inquiries, particularly
    when I am not immediately available to respond to emails.
  id: totrans-254
  prefs: []
  type: TYPE_NORMAL
  zh: 在研究生教学领域，我的教学策略通过整合ChatGPT得到了显著丰富。最初，我利用ChatGPT来分析课程大纲和必要的教学指导方针，创建了一个清单，确保所有教育目标都得到满足，而无需手动重新扫描每一页来确保大纲指导方针得到遵守。在我的课堂上，学生传统上被要求使用Scratch
    Jr开发一个基本游戏，这是一个用于构建游戏的初级编码应用程序，包括创建基本的设计图和手绘原型。然而，随着ChatGPT的引入，他们现在可以一键生成高度详细、高度逼真的游戏设计文档和分镜脚本。这种高级方法已经改变了学生解决和改进他们的编码项目的方式。学生被鼓励与ChatGPT互动，以解决特定的编程挑战，例如，“我如何给我的游戏添加新关卡？”这种转变使我作为教师能够确保学生高效地完成课程，而无需大量的个别关注，这通常是一个耗时的过程。此外，ChatGPT的使用还扩展到职业准备，学生将他们的简历与教学职位描述相匹配，并根据他们的资历生成定制的模拟面试问题。我正在开发一个基于ChatGPT的聊天机器人，它包含全面的教学材料、课程大纲、学习指南和示例评估。这个工具旨在为本科生提供一个24/7的课程相关查询资源，尤其是在我无法立即回复电子邮件时。
- en: 'Finally, I utilize ChatGPT to calibrate the feedback provided on undergraduate
    assessments. This ensures a balanced delivery of constructive criticism and positive
    reinforcement, essential for fostering a productive learning environment. The
    integration of ChatGPT into my classroom has enhanced student engagement, participation,
    and the quality of work. According to a study that my fellow graduate colleagues
    and I conducted ([Parker et al., 2024a](#ch09.xhtml#r010)), which reflects on
    experiences across the use of ChatGPT within two classes in 2023, approximately
    40% of students reported using AI tools like ChatGPT during my specific course.
    Further analysis revealed that over 20% of these students incorporated AI into
    their assessment tasks. Although there was no explicit policy prohibiting AI use,
    a notable trend emerged: the more I discussed and introduced AI in the classroom,
    the more students engaged with it in their learning and assessment processes.
    This correlation raises a critical question: while the usage of AI in educational
    contexts is increasing, does it unequivocally enhance the learning experience,
    or are there more complex implications to consider? In my assessment, even within
    a span of merely one year, ChatGPT has exhibited the capacity to fundamentally
    transform the domains of learning and teaching in a lasting manner. Despite the
    critiques associated with its growing utilization, ChatGPT will become deeply
    integrated into all aspects of education. Its widespread adoption will come to
    be viewed as a natural and representative element of our continually evolving
    educational landscape.'
  id: totrans-255
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，我利用ChatGPT来校准对本科生评估提供的反馈。这确保了建设性批评和积极强化的平衡传递，这对于培养富有成效的学习环境至关重要。ChatGPT融入我的课堂提高了学生的参与度、参与度和工作质量。根据我和我的研究生同事们进行的一项研究([帕克等，2024a](#ch09.xhtml#r010))，该研究回顾了2023年在两门课程中使用ChatGPT的经验，大约40%的学生报告说在我特定的课程中使用了像ChatGPT这样的AI工具。进一步分析显示，超过20%的学生将这些AI工具融入了他们的评估任务中。尽管没有明确禁止使用AI的政策，但出现了一个显著的趋势：我在课堂上讨论和介绍AI越多，学生在学习和评估过程中就越积极地与之互动。这种相关性引发了一个关键问题：尽管在教育环境中使用AI的数量在增加，但这是否明确地增强了学习体验，或者还有更多复杂的含义需要考虑？在我的评估中，即使仅仅在一年时间内，ChatGPT已经显示出能够从根本上以持久的方式改变学习和教学领域。尽管其日益广泛的使用伴随着批评，但ChatGPT将深入融入教育的各个方面。其广泛采用将被视为我们不断演变的
    educational landscape 的自然和代表性元素。
- en: 1.3.1.3 Ethical, Practical, and Accessibility Challenges in the AI-Enabled Classroom
  id: totrans-256
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 1.3.1.3 在人工智能赋能的课堂中面临的伦理、实用性和可及性挑战
- en: As a graduate student teaching in higher education, recognizing the influence
    of ChatGPT on students and faculty is crucial. It is essential to ensure that
    its application caters to the diverse needs of all students across various disciplines
    while accommodating different learning styles. My teaching, learning, and research
    practices deeply integrate AI, yet I am acutely aware of the ethical and practical
    challenges posed by AI-enabled classrooms. Many tenured professors likened the
    advent of ChatGPT to the rise of Wikipedia in the early 2000s—a revolutionary
    tool met with skepticism and concern about its reliability. This analogy reflects
    the current apprehension as schools debate the extent to which such technologies
    should be integrated into educational settings. Issuing the first AI executive
    order for creating safeguards and the involvement of leading AI companies globally
    underscore the need for caution and responsible use. My primary concerns center
    around potential misuse, such as unquestioningly trusting AI without verifying
    its accuracy, plagiarism, academic integrity issues, and an overdependence on
    technology that might overshadow traditional learning methods. While AI, undoubtedly,
    is set to reshape educational paradigms, its impact could veer toward either the
    positive or the negative.
  id: totrans-257
  prefs: []
  type: TYPE_NORMAL
  zh: 作为高等教育中的研究生教师，认识到ChatGPT对学生和教师的影响至关重要。确保其应用满足不同学科所有学生的多样化需求，同时适应不同的学习风格，这一点至关重要。我的教学、学习和研究实践深度融合了人工智能，但我对人工智能赋能课堂带来的伦理和实际挑战有着敏锐的认识。许多终身教授将ChatGPT的出现比作2000年代初维基百科的兴起——一个革命性的工具，遭到了怀疑和对其可靠性的担忧。这种类比反映了当前学校在讨论此类技术应如何融入教育环境时的担忧。发布首个AI行政命令以创建安全措施，以及全球领先AI公司的参与，凸显了谨慎和负责任使用的重要性。我的主要担忧集中在潜在的滥用上，例如未经核实就盲目信任AI，剽窃，学术诚信问题，以及对技术过度依赖可能掩盖传统学习方法的问题。尽管人工智能无疑将重塑教育范式，但其影响可能走向积极或消极的两极。
- en: 1.3.1.4 Conclusion
  id: totrans-258
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 1.3.1.4 结论
- en: ChatGPT is not just a fleeting phenomenon but a transformative force in the
    educational landscape. While it brings many benefits and challenges, its profound
    influence is undeniable. We must approach it with open arms, ready to embrace
    its potential, yet remain vigilant, discerning when to accept and when to resist
    its applications. It is about navigating this new terrain with a balanced mindset,
    saying “yes” to innovation and “no” to compromise as we shape the future of learning.
  id: totrans-259
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT不仅仅是一个短暂的现象，它正在教育领域产生变革性的影响。虽然它带来了许多好处和挑战，但其深远的影响是无可否认的。我们必须张开双臂，准备好拥抱其潜力，同时保持警惕，辨别何时接受何时抵制其应用。这是关于以平衡的心态在这个新领域导航，当我们塑造学习的未来时，说“是”于创新，说“不”于妥协。
- en: 1.3.2 Graduate Student 2
  id: totrans-260
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1.3.2 研究生2号
- en: '*Female, 40–42 Years Old, White. Ph.D. Candidate at the University Of Kanas.*'
  id: totrans-261
  prefs: []
  type: TYPE_NORMAL
  zh: '*女性，40-42岁，白人。堪萨斯大学博士候选人。*'
- en: My introduction to ChatGPT occurred at the outset of 2023, and as the year draws
    to a close, I can reflect upon the evolution of my view of this new AI tool. Initially,
    I viewed ChatGPT through the lens of a former English teacher, harboring reservations
    about its potential impact on student writing; however, as the fall semester of
    2023 commenced, I recognized its prevalence and potential warranted a different
    perspective. ChatGPT was now on everyone’s minds at our university. Anecdotally,
    from colleagues, I noticed a fair bit of both skepticism and ignorance of its
    capabilities, which remained in them and in me. My interactions with undergraduates
    and my own exploration of the AI software gradually revealed its potential as
    a valuable tool akin to a calculator. I began to see the time-saving measures
    it could offer for K–12 teachers and college professors. I even began to see the
    potential positive ways students could utilize the new technology while still
    maintaining the ethical standards of their schools and universities. In this section,
    I outline how I engage with and utilize ChatGPT to increase efficiency and brainstorm
    ideas in my graduate teaching assistant role.
  id: totrans-262
  prefs: []
  type: TYPE_NORMAL
  zh: 我接触ChatGPT是在2023年初，随着年底的临近，我可以回顾一下我对这个新AI工具的看法是如何演变的。最初，我作为一个曾经的英语老师，对它对学生写作可能产生的影响持有保留意见；然而，随着2023年秋季学期的开始，我意识到它的普及和潜力需要一种不同的视角。ChatGPT现在是我们大学每个人的心头事。从同事那里，我注意到他们对它的能力既有怀疑也有无知，这种态度在他们和我自己身上都存在。我与本科生互动以及我对AI软件的探索逐渐揭示了它作为类似计算器的有用工具的潜力。我开始看到它能为K–12教师和大学教授节省时间。我甚至开始看到学生如何利用这项新技术，同时仍然保持他们学校和大学的道德标准，这种潜在的积极方式。在本节中，我概述了我是如何在与我的研究生助教角色中与ChatGPT互动并利用它来提高效率和激发想法的。
- en: 1.3.2.1 Academic Purposes (In Class and Research)
  id: totrans-263
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 1.3.2.1 学术目的（课堂和研究中）
- en: Currently, I engage with ChatGPT a few times during the work week. I utilize
    ChatGPT to create examples of prompts, questions, or the like for my undergraduate
    students. I have used it to create stock emails, spot-check student work for punctuation
    errors, and create stock grading comments I can then use and modify when I grade
    student papers. This typically involves requests such as “grade the following
    paragraph for commas” or “create an example of an email” for a specific purpose.
    It does save me time during the week.
  id: totrans-264
  prefs: []
  type: TYPE_NORMAL
  zh: 目前，我在工作周中与ChatGPT互动几次。我利用ChatGPT为我的本科生创建提示、问题或类似内容的示例。我用它来创建库存电子邮件，检查学生的标点符号错误，并创建我可以使用和修改的库存评分评论，以便在评分学生论文时使用。这通常涉及像“对以下段落进行逗号评分”或“为特定目的创建一个电子邮件示例”这样的请求。这确实在周内为我节省了时间。
- en: Outside of my teaching work, I have collaborated with colleagues on ChatGPT-focused
    research. Our work on this spans 2023, so we have seen the evolution of perception
    at our college in our own students, each others’ students, and the faculty with
    whom we work. We have conducted in-depth studies examining ChatGPT usage, repercussions,
    and ethical concerns in higher education; these can be found in our publications
    ([Parker et al., 2023](#ch09.xhtml#r009), [2024a](#ch09.xhtml#r010), [2024b](#ch09.xhtml#r011),
    [2024c](#ch09.xhtml#r9001)).
  id: totrans-265
  prefs: []
  type: TYPE_NORMAL
  zh: 在我的教学工作之外，我与同事合作进行了以ChatGPT为重点的研究。我们的这项工作贯穿了2023年，因此我们见证了在我们学院中，我们自己的学生、彼此的学生以及我们合作的教师对ChatGPT的看法是如何演变的。我们进行了深入研究，考察了高等教育中ChatGPT的使用、影响和伦理问题；这些可以在我们的出版物中找到（[Parker等人，2023](#ch09.xhtml#r009)，[2024a](#ch09.xhtml#r010)，[2024b](#ch09.xhtml#r011)，[2024c](#ch09.xhtml#r9001)）。
- en: My dissertation focus of study is truancy and how to reduce student truancy.
    Specifically, I am studying the educational and legal professionals who work directly
    with truant students at the district, community, and county levels. By learning
    about the capabilities of ChatGPT, I now see rich areas of study in how AI tools
    like ChatGPT could be utilized in efforts to collect, record, and analyze attendance
    records as well as outcomes for students who are truant and/or chronically absent
    from their K–12 schools.
  id: totrans-266
  prefs: []
  type: TYPE_NORMAL
  zh: 我的博士论文研究重点是逃学和如何减少学生的逃学。具体来说，我正在研究在区、社区和县级层面上直接与逃学学生工作的教育和法律专业人士。通过了解ChatGPT的能力，我现在看到，在如何利用像ChatGPT这样的AI工具来收集、记录和分析出勤记录以及逃学或长期缺课的学生的结果方面，有丰富的研究领域。
- en: '1.3.2.2 Teaching Purposes: Ethical and Otherwise'
  id: totrans-267
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 1.3.2.2 教学目的：伦理及其他
- en: As a professor of preservice educators, I find it necessary to have in-depth,
    ethical discussions about using ChatGPT by secondary students in junior high and
    high school settings. This involvement extends beyond mere exploration to the
    comprehensive analysis of both its positive and negative implications. My goal
    is to provide a safe discussion space for my students. The hope is that those
    conversations catalyze these preservice ELA teachers to reflect critically and
    begin to develop their understandings of and opinions of ChatGPT in schools. Their
    careers will begin in only the second full year of ChatGPT being available to
    all of us; they will spend a good portion of their careers now navigating the
    ever-evolving educational technology landscape.
  id: totrans-268
  prefs: []
  type: TYPE_NORMAL
  zh: 作为一名职前教育工作者教授，我认为有必要就中学生在中学和高中环境中使用ChatGPT进行深入的伦理讨论。这种参与不仅限于探索，还包括对其正面和负面影响的全面分析。我的目标是为学生提供一个安全的讨论空间。希望这些对话能够激发这些职前ELA教师进行批判性反思，并开始形成他们对ChatGPT在学校中的理解和观点。他们的职业生涯将在ChatGPT对所有我们开放的第二完整年开始；他们将在职业生涯中花费大量时间现在正在导航不断演变的科技教育景观。
- en: Our discussions often center on the potential positive effects secondary students
    could experience from using ChatGPT. The reasons my undergraduate students have
    offered include ChatGPT, which can be a powerful tool for enhancing writing skills,
    assisting in generating ideas, and aiding in refining compositions. The way ChatGPT
    provides immediate feedback is a strong positive for this AI tool. Secondary students,
    we discussed, could benefit from the tool’s ability to offer constructive suggestions,
    correct grammatical errors, and improve overall coherence and structure. Secondary
    students may feel less pressure or less anxiety about getting feedback from a
    nonhuman—and thus, perceived or real bias is reduced in the writing process. ChatGPT,
    my student further discussed, can assist students in brainstorming ideas and approaching
    complex topics from multiple angles. It could help students develop their critical
    thinking skills as they evaluate the AI-generated responses and make informed
    decisions about incorporating suggested changes into their work. This may also
    be an equity issue for students as many children do not have adequate support
    outside of school to succeed; ChatGPT can be there when parents, tutors, time,
    and other resources are unavailable.
  id: totrans-269
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的讨论通常集中在使用ChatGPT可能对中学生产生的潜在积极影响。我的本科生们提出的原因包括ChatGPT，它可以是一个强大的工具，用于提升写作技能，协助生成想法，并帮助润色作品。ChatGPT提供即时反馈的方式是这个AI工具的一个强烈正面因素。我们讨论到，中学生可以从工具提供建设性建议、纠正语法错误以及提高整体连贯性和结构的能力中受益。中学生可能对从非人类那里获得反馈的压力或焦虑感会减少——因此，在写作过程中感知到的或真实存在的偏见会减少。我的学生进一步讨论到，ChatGPT可以帮助学生进行头脑风暴，从多个角度接近复杂话题。它可以帮助学生在评估AI生成的响应并就建议的更改融入他们的作品中做出明智决定时发展他们的批判性思维技能。这也许对学生来说也是一个公平问题，因为许多孩子在学校之外没有足够的支持来成功；当父母、导师、时间和其他资源不可用时，ChatGPT可以出现。
- en: We equally address the ethical dilemmas and potential drawbacks associated with
    any students using ChatGPT. While the tool can offer substantial assistance, its
    use also raises plagiarism and academic integrity concerns. My preservice teachers
    have explored scenarios where students might misuse ChatGPT by directly copying
    its responses without critical engagement or appropriate citation. We discuss
    the importance of teaching students about ethical research and citation practices,
    as well as grading not only the final written product but the entire drafting
    process as well. Another concern I have raised with my students is the risk, for
    any of us, of developing an overreliance on ChatGPT, potentially hindering students’
    independent development of writing skills. Students may become overly dependent
    on the tool for generating ideas and crafting their compositions, diminishing
    their creativity, critical thinking abilities, and even self-esteem issues. Our
    discussions delve into privacy and data security issues, as high school students
    may unknowingly share sensitive information while interacting with AI systems.
    I encourage my preservice teachers to consider the implications of data privacy
    in the digital age and how they can educate their students about responsible online
    behavior.
  id: totrans-270
  prefs: []
  type: TYPE_NORMAL
  zh: 我们同样关注任何使用ChatGPT的学生所面临的伦理困境和潜在弊端。虽然这个工具可以提供实质性的帮助，但其使用也引发了剽窃和学术诚信的问题。我的职前教师们探讨了学生可能通过直接复制其回应而不进行批判性参与或适当引用来滥用ChatGPT的情景。我们讨论了教育学生关于伦理研究和引用实践的重要性，以及不仅要评估最终书面成果，还要评估整个草拟过程的评分。我还向我的学生提出了一个担忧，那就是我们任何人都可能对ChatGPT产生过度依赖，这可能会阻碍学生写作技能的独立发展。学生可能会过度依赖这个工具来生成想法和撰写他们的作品，这会削弱他们的创造力、批判性思维能力，甚至引发自尊问题。我们的讨论深入到隐私和数据安全问题，因为高中生在与人工智能系统互动时可能无意中分享敏感信息。我鼓励我的职前教师考虑数字时代数据隐私的后果，以及他们如何教育学生关于负责任的在线行为。
- en: 1.3.2.3 Ethical, Practical, and Accessibility Challenges in the AI-Enabled Classroom
  id: totrans-271
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 1.3.2.3 人工智能赋能课堂中的伦理、实际和可访问性挑战
- en: Recognizing, as a GTA, the influence of ChatGPT on students and faculty is crucial.
    Its application caters to the diverse needs of all students across various disciplines
    while accommodating different learning styles. As of this year, my teaching, learning,
    and research practices integrate AI on the margins, yet, I am acutely aware that
    AI is causing a monumental change in how we all learn and work, and thus, I need
    to stay current, be flexible, and be welcoming to the changes still to come. I
    also need to focus on the ethical and practical challenges AI-enabled classrooms
    pose. For my work in particular, I will need to consider ways to guide my preservice
    teachers to consider how they and their future students can function with integrity
    now that ChatGPT has entered the educational sphere in this way. My primary concerns
    center around potential misuse, accuracy issues, plagiarism, academic integrity,
    fairness, access, overuse, and overdependence.
  id: totrans-272
  prefs: []
  type: TYPE_NORMAL
  zh: 作为一名助教，认识到ChatGPT对学生和教师的影响至关重要。它的应用满足了来自各个学科所有学生的多样化需求，同时适应了不同的学习风格。截至今年，我的教学、学习和研究实践在边缘整合了人工智能，然而，我敏锐地意识到人工智能正在对我们所有人学习和工作的方式造成巨大的变革，因此，我需要保持与时俱进，保持灵活性，并欢迎即将到来的变化。我还需要关注人工智能赋能的课堂带来的伦理和实际挑战。特别是对于我的工作，我需要考虑如何引导我的职前教师思考，在ChatGPT以这种方式进入教育领域后，他们及其未来的学生如何能够保持诚信地运作。我的主要担忧集中在潜在的滥用、准确性问题、剽窃、学术诚信、公平性、可访问性、过度使用和过度依赖等方面。
- en: 1.4 Faculty Use of Artificial Intelligence
  id: totrans-273
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 1.4 人工智能在教师中的应用
- en: In the upcoming section, we explore the firsthand accounts of two experienced
    professors incorporating ChatGPT and other AI tools into their daily teaching
    and research activities at the University of Kansas. Both esteemed academics are
    deeply involved in various capacities, from departments to teaching centers. They
    will share insights into their engagement with and utilization of these advanced
    technologies, providing a window into the evolving role of AI in higher education
    and research.
  id: totrans-274
  prefs: []
  type: TYPE_NORMAL
  zh: 在接下来的章节中，我们将探讨两位经验丰富的教授在堪萨斯大学将ChatGPT和其他人工智能工具融入他们日常教学和研究活动中的第一手资料。这两位备受尊敬的学者在各个层面都深度参与，从系到教学中心。他们将分享他们与这些先进技术的互动和利用的见解，为人工智能在高等教育和研究中的演变角色提供一扇窗口。
- en: 1.4.1 Faculty Member 1
  id: totrans-275
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1.4.1 教师成员1
- en: '*Male, 55–64 years old, White. Holds a Ph.D. and was previously chair of a
    large teaching department for 10+ years.*'
  id: totrans-276
  prefs: []
  type: TYPE_NORMAL
  zh: '*男性，55-64岁，白人。拥有博士学位，曾担任大型教学部门主席10年以上。*'
- en: 1.4.1.1 Initial Perceptions and Challenges of AI in Higher Education
  id: totrans-277
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 1.4.1.1 高等教育中人工智能的初始感知和挑战
- en: As with many of my colleagues in higher education, I first heard of ChatGPT
    through information sources that arrive in my email inbox that discuss news, trends,
    and issues that occur in higher education. Information from these sources at first
    focused on the negative aspects of the use of AI by students on assignments that
    were to be submitted for course grades, how professors could work around student
    use of AI for assignments, what tools could be created to detect if a student’s
    submitted assignment had been created by AI, to what ethical concerns were raised
    by student use of AI on assignments. Many of my colleagues were problem-solving
    ways to address student use of AI with suggestions of returning to having students
    bring notebook paper to class and having them handwrite assignments to ensure
    that what was being graded was students’ thoughts and knowledge on the subjects.
  id: totrans-278
  prefs: []
  type: TYPE_NORMAL
  zh: 就像我高等教育中的许多同事一样，我第一次通过电子邮件收件箱中到达的信息来源了解到ChatGPT，这些来源讨论了高等教育中发生的新闻、趋势和问题。最初，这些来源的信息集中在学生使用人工智能在提交课程成绩的作业中的负面方面，教授们如何绕过学生使用人工智能完成作业，可以创建哪些工具来检测学生提交的作业是否由人工智能创建，以及学生使用人工智能在作业中引发了哪些伦理问题。许多同事提出了解决问题的方法，建议学生回到课堂上携带笔记本纸张，并让他们手写作业，以确保被评分的是学生对学科的思想和知识。
- en: 1.4.1.2 Faculty Responses to Emerging AI Technologies
  id: totrans-279
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 1.4.1.2 教师对新兴人工智能技术的反应
- en: An additional sense of confusion among my colleagues arose when discussing the
    use of AI on assignments with graduate students within our programs, indicating
    that they knew of other graduate students who were or had been using AI-supported
    writing tools prior to ChatGPT being at the forefront of discussions in higher
    education. There was a bit of shock among faculty that AI had evolved to a level
    of providing appropriate and, sometimes, what faculty would consider excellent
    responses to questions posed by faculty on written assignments not only for coursework
    but possibly also for exams that led to the awarding of a degree. Discussions
    among faculty and several graduate students who are more tech-savvy focused on
    how to detect the use of AI on students’ assignments and how to address the issue
    of using AI with students in an appropriate manner without appearing to be accusatory
    of committing academic misconduct.
  id: totrans-280
  prefs: []
  type: TYPE_NORMAL
  zh: 当讨论我们项目中研究生使用人工智能在作业中的应用时，我的同事中产生了一种额外的困惑感，这表明他们知道有其他研究生在ChatGPT成为高等教育讨论前沿之前就已经使用或正在使用人工智能支持的写作工具。教师们对人工智能已经发展到能够提供适当甚至有时是教师认为出色的回答来回答教师提出的书面作业问题感到有些震惊，这不仅限于课程作业，可能还包括可能导致学位授予的考试。教师和几位更懂技术的学生之间的讨论集中在如何检测学生作业中使用人工智能，以及如何以适当的方式处理学生使用人工智能的问题，同时避免显得是在指责学术不端行为。
- en: 1.4.1.3 Exploring the Educational Potential of AI Tools
  id: totrans-281
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 1.4.1.3 探索人工智能工具的教育潜力
- en: As my colleagues and I began exploring ChatGPT and other AI tools, it became
    apparent that there was potential to use these tools to support student learning
    and faculty in developing learning activities and assessments of student learning.
    One colleague suggested that undergraduates in teacher education programs use
    AI tools to create lesson plans to be implemented in a field experience learning
    activity with elementary-age children. The professor had students generate lesson
    plans in science and then assess the lesson plan based on the Next Generation
    Science Standards. The idea that as a first-year teacher, having a tool that can
    help plan appropriate grade-level learning activities and then matching those
    activities with standards, would be a time-saving measure that would help lessen
    the workload. I began exploring the idea of using ChatGPT to create assignment
    rubrics. By providing AI with a description of the assignment, I found that ChatGPT
    was useful in creating descriptors for levels of student performance and identifying
    key factors that would contribute to what I considered high-quality work. Using
    ChatGPT to create rubrics led to exploring how to use AI to provide feedback and
    suggestions for improvement on student work. When grading assignments, I often
    repeat the same feedback to several students. Learning Management Systems such
    as Canvas and Blackboard even have features where you can copy a feedback response
    to use when grading other students’ work, pasting the saved comment in the feedback
    box for other students’ graded work. Feedback generated by ChatGPT was often more
    specific and was helpful in providing suggestions for improvement on the assignment.
  id: totrans-282
  prefs: []
  type: TYPE_NORMAL
  zh: 当我和我的同事们开始探索ChatGPT和其他AI工具时，很明显，这些工具有潜力被用来支持学生学习，以及帮助教师开发学习活动和评估学生学习成果。一位同事建议，在教师教育项目中，本科生可以使用AI工具来创建将在小学年龄儿童中实施的现场体验学习活动的教学计划。教授让学生们生成科学学科的教学计划，然后根据下一代科学标准评估这些计划。作为一个新任教师，拥有一个可以帮助规划适当年级学习活动并匹配这些活动的工具的想法，将是一种节省时间的措施，有助于减轻工作量。我开始探索使用ChatGPT创建作业评分标准（rubrics）的想法。通过向AI提供作业的描述，我发现ChatGPT在创建学生表现不同级别的描述以及识别有助于我认为是高质量工作的关键因素方面非常有用。使用ChatGPT创建评分标准导致探索如何使用AI为学生作业提供反馈和改进建议。在批改作业时，我经常对几个学生重复相同的反馈。像Canvas和Blackboard这样的学习管理系统甚至有可以复制用于批改其他学生作业的反馈响应的功能，将保存的评论粘贴到其他学生已评分作业的反馈框中。ChatGPT生成的反馈通常更具体，有助于在作业上提供改进建议。
- en: 1.4.1.4 AI Integration in Advanced Educational Settings
  id: totrans-283
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 1.4.1.4 高级教育设置中的AI集成
- en: Advising a current doctoral student who has a keen interest in technology and,
    more recently, the use of AI in educational settings has led to many conversations
    and training sessions on features of ChatGPT. First was the introduction to ChatGPT
    and search features, then learning about plugins that can focus your searches
    in specific areas, and now discussions of GPTs that can be individualized to create
    systems that support students in multiple ways, creating opportunities for student
    success. I feel like our conversations take us down the metaphoric “rabbit hole”
    as to possibilities that are provided in using AI tools to support students, most
    of whom are, or will be, teachers in K–12 classrooms. There is a great deal of
    fascination on my part as to what is the potential of supporting learners, kindergarten
    through doctoral level coursework, so everyone is successful in their program
    and accomplishes their goals. Being able to use ChatGPT to search for research
    articles in Scholar AI, to search for descriptions of research methodology when
    designing a research study, to have AI define a term and examine the multiple
    definitions to better support an international student’s understanding of the
    word or concept, and to use AI to help refine students’ research questions has
    helped support and advise my graduate students.
  id: totrans-284
  prefs: []
  type: TYPE_NORMAL
  zh: 咨询一位对技术有浓厚兴趣的当前博士生，最近还涉及教育环境中AI的使用，导致了许多关于ChatGPT功能的对话和培训课程。首先是介绍ChatGPT和搜索功能，然后了解可以专注于特定领域的插件，现在则是讨论可以个性化以创建支持学生在多方面成功的系统的GPT。我感觉我们的对话就像进入了象征性的“兔子洞”，探索使用AI工具支持学生的可能性，其中大多数学生，或者将成为，K-12课堂中的教师。我对支持学习者，从幼儿园到博士课程，以及每个人都能在他们的项目中成功并实现他们的目标的可能性非常着迷。能够使用ChatGPT在Scholar
    AI中搜索研究文章，在设计研究时搜索研究方法描述，让AI定义一个术语并检查多个定义以更好地支持国际学生理解单词或概念，以及使用AI帮助细化学生的研究问题，这些都帮助支持和指导我的研究生。
- en: 1.4.1.5 Navigating Ethical Considerations in AI Use
  id: totrans-285
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 1.4.1.5 在AI使用中导航伦理考量
- en: The use of AI tools such as ChatGPT does bring about some ethical dilemmas concerning
    using AI technology. Having conversations with students about being transparent
    in using AI tools and helping them understand that these tools are just that,
    tools that can be used but should not be considered appropriate for replacing
    their own thoughts and knowledge. Additionally, AI responses are generated by
    using algorithms and natural language processing to produce a text-based response.
    As such, students should use critical thinking to evaluate and assess the responses
    received when using AI tools to determine if the response is appropriate and use
    the response within their own personal/professional experience to determine if
    the response generated is useful. Other ethical concerns have been discussed,
    such as whether AI systems are biased and have the potential to discriminate when
    used. Further research is needed to address issues of bias and discrimination
    against AI tools; however, making students aware of the potential for bias and
    discrimination to occur is essential in discussing the use of AI tools in education.
  id: totrans-286
  prefs: []
  type: TYPE_NORMAL
  zh: 使用AI工具，如ChatGPT，确实会带来一些关于使用AI技术的伦理困境。与学生们讨论在使用AI工具时保持透明度，并帮助他们理解这些工具只是工具，可以被使用，但不应该被视为可以替代他们自己的思考和知识的合适选择。此外，AI的回应是通过使用算法和自然语言处理来生成基于文本的回应。因此，学生们在使用AI工具时应运用批判性思维来评估和评估收到的回应，以确定回应是否适当，并在他们自己的个人/专业经验中使用这些回应，以确定生成的回应是否有用。其他伦理问题也已讨论，例如AI系统是否存在偏见，以及在使用时是否有歧视的潜力。需要进一步的研究来解决AI工具的偏见和歧视问题；然而，在讨论教育中使用AI工具时，使学生意识到偏见和歧视发生的可能性是至关重要的。
- en: 1.4.1.6 Personal Experiences and Reflections on AI Utilization
  id: totrans-287
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 1.4.1.6 关于AI利用的个人经验和反思
- en: My experience and use of AI and ChatGPT have been limited up to this point in
    time. I have mainly used ChatGPT when working with graduate students, and it is
    interesting that in our conversations, when I say, “Let’s see what ChatGPT has
    to tell us about this topic,” students often laugh and are surprised that I use
    it as a tool of reference to something that we want to explore more in-depth.
    I am willing to take my students down the “rabbit hole” and explore what we can
    learn from a new technology tool. Discussing the generated responses and questioning
    whether they were appropriate or if it was our crafting of the prompt or search
    question that needed more precision and specificity serves, in my view, as an
    effective model for approaching the diverse topics that each student is eager
    to learn more about. Being transparent in using AI tools and their potential to
    help us and support our learning is important, in my opinion, as we accept another
    advancement in technology that will be with us from now on. I think about this
    as I plan to leave my chair and place my half-full coffee mug in the microwave
    to reheat and respond to a colleague’s text message on my mobile phone. Technology
    evolves and becomes tools that we use daily. It is up to us to figure out how
    to use it to its best potential.
  id: totrans-288
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，我的AI和ChatGPT的使用经验有限。我主要在指导研究生时使用ChatGPT，有趣的是，在我们的对话中，当我提到，“让我们看看ChatGPT对这个话题有什么要说的”时，学生们常常会笑并惊讶于我将它作为参考工具来深入探讨我们想要更深入了解的事物。我愿意带着我的学生进入“兔子洞”，探索我们可以从新技术工具中学到什么。讨论生成的响应，并质疑它们是否适当，或者是否是我们对提示或搜索问题的构思需要更多的精确性和具体性，在我看来，这是一个有效的模式，可以用来接近每个学生都渴望了解更多关于的多样化主题。在我看来，在使用AI工具及其帮助我们和支持我们的学习的潜力方面保持透明度非常重要，因为我们接受技术进步的又一新阶段，它将伴随我们至今。当我计划离开我的位置，把半满的咖啡杯放入微波炉加热，并在我的手机上回复同事的短信时，我在想这件事。技术不断发展，成为我们日常使用的工具。如何利用它发挥最大潜力，这取决于我们。
- en: 1.4.2 Faculty Member 2
  id: totrans-289
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1.4.2 教师成员2
- en: '*Male, 55–64 years old, White. Holds a Ph.D. and serves as an Associate Director
    at the Teaching Center.*'
  id: totrans-290
  prefs: []
  type: TYPE_NORMAL
  zh: '*男性，55-64岁，白人。持有博士学位，担任教学中心副总监。*'
- en: 1.4.2.1 Initial Perceptions and Challenges of AI in Higher Education
  id: totrans-291
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 1.4.2.1 高等教育中人工智能的初始印象和挑战
- en: ChatGPT provided more evolution than a revolution in how I work and teach. Teaching
    with technology is one of my specialties at our teaching center, and I constantly
    test software and hardware to see how new tools might benefit teaching and learning.
    I had experimented with an AI-powered writing app for about a year before ChatGPT
    was released and created a search bot for our teaching center’s website. I had
    also started work on what I hoped would become a university chatbot, a project
    that died during the pandemic along with the search bot.
  id: totrans-292
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT给我的工作和教学方式带来的变化，更多的是进化而非革命。在技术教学方面，这是我们在教学中心的一个专长，我不断测试软件和硬件，看看新工具可能如何造福教学和学习。在ChatGPT发布之前，我尝试了一个AI驱动的写作应用大约一年，并为我们的教学中心网站创建了一个搜索机器人。我还开始了一个我希望能成为大学聊天机器人的项目，但这个项目在疫情期间与搜索机器人一起失败了。
- en: 1.4.2.2 Exploring the Educational Potential of AI Tools
  id: totrans-293
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 1.4.2.2 探索人工智能工具的教育潜力
- en: Over winter break after ChatGPT was released, I spent hours experimenting, trying
    various approaches to prompting, analyzing answers, and trying to better understand
    what it could and could not do. I also read whatever I could find about large
    language models and generative AI. I did not see the real value of generative
    AI until Bing Chat (later renamed Copilot) was released in February 2023\. Bing’s
    integration with the Edge browser and its access to the internet made it not just
    a sometimes tool but a constant research companion. I started keeping the Bing
    sidebar open, asking it for help with everything from the mundane (When is fall
    break?) to the complex (How do I configure Docker to work with code I installed
    with Power Shell?). I use it to provide information about web pages I visit and
    summarize PDFs, which it does well. I showed students how it could create narratives
    from sports statistics, and I found it greatly effective in summarizing qualitative
    information. For instance, a colleague asked how to make sense of hundreds of
    comments from student surveys of teaching; I uploaded the anonymized data (with
    his permission) and prompted ChatGPT to categorize the responses (both positive
    and negative) and create a word cloud of all the information (something that required
    a paid account and a plugin). I have also experimented with Bard (which I found
    unreliable) and Claude 2 (which I have had better luck with). I have found both
    ChatGPT and Copilot excellent tools for learning and idea generation. I also use
    them to check my thinking as I write or prepare for workshops or speeches about
    AI. For instance, when the Rotary Club recently asked me to speak about generative
    AI and education, I asked Copilot and ChatGPT what Rotarians might be curious
    about. The answers contained nothing I had not already considered, but that was
    OK. I just needed another opinion.
  id: totrans-294
  prefs: []
  type: TYPE_NORMAL
  zh: 在ChatGPT发布后的寒假期间，我花了很多时间进行实验，尝试了各种提示方法，分析了答案，并试图更好地理解它能做什么，不能做什么。我还阅读了我能找到的所有关于大型语言模型和生成式人工智能的内容。直到2023年2月Bing
    Chat（后来更名为Copilot）发布，我才看到了生成式人工智能的真实价值。Bing与Edge浏览器的集成以及它对互联网的访问使其不仅仅是一个偶尔使用的工具，而是一个持续的研究伴侣。我开始保持Bing侧边栏的开启状态，向它寻求从日常（何时是秋季假期？）到复杂（我如何配置Docker与Power
    Shell安装的代码一起工作？）的各种帮助。我使用它来提供我访问的网页的信息，并总结PDF文件，它在这方面做得很好。我向学生展示了它如何从体育统计数据中创建叙事，并发现它在总结定性信息方面非常有效。例如，一位同事询问如何理解学生对教学进行的数百条评论；我上传了匿名数据（在他的许可下），并提示ChatGPT对（正面和负面的）回应进行分类，并创建所有信息的词云（这需要付费账户和插件）。我还尝试了Bard（我发现它不可靠）和Claude
    2（我在它上面运气更好）。我发现ChatGPT和Copilot都是学习和思想生成的优秀工具。我还使用它们来检查我在写作或准备关于人工智能的研讨会或演讲时的思考。例如，当最近旋转俱乐部邀请我谈论生成式人工智能和教育时，我向Copilot和ChatGPT询问罗宾汉可能好奇的事情。答案中没有包含我尚未考虑的内容，但这没关系。我只是需要另一个观点。
- en: 1.4.2.3 Ethical and Practical Dimensions of AI in Academic Writing
  id: totrans-295
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 1.4.2.3 学术写作中人工智能的伦理和实践维度
- en: The one function of generative AI I have yet to use regularly is writing. I
    am a journalist and a historian, and I have long used writing as a way to express
    ideas, hone my thinking, find flaws in my reasoning, and flex my creativity. I
    have always found writing to be a fundamentally human activity, one that frustrates
    me immensely at times but that ultimately brings great satisfaction once I get
    it right. The idea of turning that over to a chatbot seems unnatural. In a way,
    I suppose, I feel like a librarian colleague who said that using a chatbot for
    writing felt like cheating. Others, though, especially faculty in non-humanities
    fields and those for whom English is not a first language, rave about the capabilities
    of generative AI to help with writing. I understand that and support it, and I
    see the co-creation of written work, coding, and other materials as an inevitable
    evolution in how we all work. Even so, I have not found a natural way to work
    the writing of chatbots into my workflow.
  id: totrans-296
  prefs: []
  type: TYPE_NORMAL
  zh: 我还没有定期使用生成式人工智能的一个功能是写作。我是一个记者和历史学家，长期以来我一直把写作作为一种表达思想、锤炼我的思考、发现推理中的缺陷和发挥我的创造力的方式。我始终认为写作是一种基本的人类活动，有时会让我非常沮丧，但一旦我做得正确，最终会带来极大的满足感。将这项工作交给聊天机器人似乎是不自然的。从某种意义上说，我可能觉得自己像一位图书馆同事，他说使用聊天机器人进行写作感觉像是在作弊。然而，其他人，尤其是非人文学科的教师以及那些英语不是母语的人，都对生成式人工智能在写作方面的能力赞不绝口。我理解这一点，并支持它，我认为书面工作、编码和其他材料的共同创作是我们所有人工作方式的一个不可避免的发展。即便如此，我还没有找到将聊天机器人的写作融入我的工作流程的自然方法。
- en: 1.4.2.4 Innovative Teaching and Learning with AI
  id: totrans-297
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 1.4.2.4 利用人工智能进行创新的教学和学习
- en: 'My experimentation, both successful and not, has helped me better advise faculty
    and staff colleagues, and students, something that became increasingly important
    by early 2023\. Concern about the misuse of AI in classes grew, something I understood
    but found misguided. Generative AI looked like it had the power to change education,
    and it was clear that our teaching center needed to help faculty navigate a new,
    ever-shifting landscape. I took a positive approach in workshops and in my writing,
    trying to convince faculty that AI was not a fad and, at one point, writing: “The
    bots are here to stay. Do we deny, or do we adapt?” Clearly, we had to adapt,
    and most faculty gradually began to accept that. They kept asking the same question,
    though: How?'
  id: totrans-298
  prefs: []
  type: TYPE_NORMAL
  zh: 我的实验，无论是成功的还是不成功的，都帮助我更好地向教师和员工同事以及学生提供建议，这一点在2023年初变得越来越重要。对课堂上人工智能误用的担忧日益增加，我理解这一点，但认为这种担忧是错误的。生成式人工智能看起来有改变教育的力量，而且很明显，我们的教学中心需要帮助教师导航一个新、不断变化的景观。我在研讨会和我的写作中采取了积极的态度，试图说服教师人工智能不是一种时尚，在某个时刻，我写道：“机器人已经在这里了。我们是拒绝还是适应？”显然，我们必须适应，而且大多数教师逐渐开始接受这一点。尽管如此，他们仍然不断提出同样的问题：如何？
- en: 'I offered several approaches: having students experiment with bots in assignments,
    giving students AI-generated material to evaluate, having students add reflection
    sections to assignments, using brief meetings with students to check their understanding,
    and using AI to generate discussion questions, case studies, and other material
    for classes. Above all, instructors needed to talk with students about generative
    AI and set clear policies for its use. By the fall, as most faculty still wavered,
    I pushed for broader adoption of AI. With the help of the director of the university
    writing center, I broke down the steps involved in written assignments and encouraged
    faculty to consider where the boundaries of AI use were. We all agreed that it
    was wrong for students to copy and paste from a chatbot and turn that material
    in as their own work. After that, though, the boundaries became murky. Was creating
    an outline acceptable? Creating an introduction? An ending? Few complained about
    the use of spell-checkers or grammar checkers. We encouraged students to get help
    from the writing center. We gave students feedback ourselves on assignments. So,
    how was the feedback from generative AI different?'
  id: totrans-299
  prefs: []
  type: TYPE_NORMAL
  zh: 我提出了几种方法：让学生在作业中尝试使用机器人，给学生提供由人工智能生成的材料进行评估，让学生在作业中添加反思部分，通过与学生简短的会议来检查他们的理解，以及使用人工智能生成课堂讨论问题、案例研究和其他材料。最重要的是，教师需要与学生讨论生成式人工智能，并为其使用制定明确的政策。到了秋季，尽管大多数教师仍然犹豫不决，我还是推动了人工智能的更广泛采用。在大学写作中心主任的帮助下，我分解了书面作业涉及的步骤，并鼓励教师考虑人工智能使用的界限。我们都认为，学生从聊天机器人那里复制粘贴并以此作为自己的作品是不对的。然而，在那之后，界限变得模糊。创建大纲可以接受吗？创建引言？结尾？很少有人对拼写检查器或语法检查器的使用提出异议。我们鼓励学生从写作中心寻求帮助。我们自己也在作业上给学生提供反馈。那么，生成式人工智能的反馈有何不同？
- en: 1.4.2.5 Personal Experiences and Reflections on AI Utilization
  id: totrans-300
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 1.4.2.5 关于人工智能应用的个人经验和反思
- en: 'That is still an open question among faculty, many of whom—perhaps most—approach
    generative AI with trepidation. The more I listened and tried to help, the more
    I recognized the bigger challenge the education system was facing: We were trying
    to integrate 21st-century technology into a 19th-century academic structure. That
    structure was created during a time of scarce and slow-moving information, and
    learning was primarily measured by seat time, memorization, and regurgitation.
    Like most structures, it resists change. So when generative AI emerged, time-pinched
    faculty sought easy ways of detecting student use of generative AI in assignments,
    much as they had done years earlier with plagiarism checkers. Both tools attack
    symptoms rather than addressing the complex underlying motivations: students working
    many hours to pay for school, pressures to maintain high grades, and education
    being seen as a consumer product rather than a process of learning, just to name
    a few. Beneath them all, though, is a swelling ocean of information eroding a
    static system that desperately needs an overhaul. Generative AI is not the problem.
    It is simply the messenger. Until we rethink our approaches to teaching and learning
    and build flexibility into our educational systems, we will continually struggle
    with AI and whatever technologies follow.'
  id: totrans-301
  prefs: []
  type: TYPE_NORMAL
  zh: 这仍然是一个在教师中存在争议的问题，其中许多人——也许大多数——对生成式人工智能持谨慎态度。我越听越想帮忙，就越意识到教育系统面临的更大挑战：我们试图将21世纪的科技整合到19世纪的学术结构中。这个结构是在信息稀缺和缓慢流动的时代创建的，学习主要通过坐席时间、记忆和复述来衡量。像大多数结构一样，它抵制变革。因此，当生成式人工智能出现时，时间紧迫的教师们寻求简单的方法来检测学生在作业中使用生成式人工智能，就像他们多年前使用抄袭检测器时所做的那样。这两种工具都针对症状而不是解决复杂的潜在动机：学生长时间工作以支付学费，保持高成绩的压力，以及将教育视为消费品而不是学习过程，仅举几个例子。然而，在所有这些之下，是一个不断膨胀的信息海洋，侵蚀着迫切需要改革的静态系统。生成式人工智能不是问题。它只是使者。除非我们重新思考我们的教学和学习方法，并在我们的教育系统中融入灵活性，否则我们将不断与人工智能以及随后的技术作斗争。
- en: 1.5 Future Research
  id: totrans-302
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 1.5 未来研究
- en: The imperative of ongoing and future research is underscored, especially in
    the context of emergent fields, where the landscape of inquiry is vast and the
    potential for scholarly exploration is expansive, such as in AI. This chapter
    has outlined the modalities through which undergraduate and graduate students,
    alongside faculty members, interact with and incorporate AI into their academic
    endeavors. Scholars must embark on comparative studies across diverse academic
    institutions to augment the emerging knowledge within this domain. Such investigations
    would ascertain whether adoption and attitudes toward AI occur uniformly across
    different educational settings. Moreover, this analysis was predicated on input
    from a limited cohort comprising merely two representatives from each designated
    category. To extrapolate these findings to a broader spectrum, it is advisable
    to extend the research demographic. This could involve an entire academic department
    or university in a survey to determine if the trends identified herein reflect
    a more widespread sentiment. Additionally, the opportunity presented by longitudinal
    studies cannot be overstated in gauging the evolution of perceptions and applications
    of AI within academic circles.
  id: totrans-303
  prefs: []
  type: TYPE_NORMAL
  zh: 持续和未来研究的重要性不容忽视，尤其是在新兴领域，那里的研究领域广阔，学术探索的潜力巨大，例如在人工智能领域。本章概述了本科生、研究生以及教师如何与人工智能互动并将其纳入他们的学术活动。学者们必须开展跨不同学术机构的比较研究，以增强该领域内正在出现的知识。这样的调查将确定人工智能的采用和态度是否在不同教育环境中普遍存在。此外，这次分析基于一个有限的群体，仅包括每个指定类别中的两个代表。为了将这些发现推广到更广泛的范围，建议扩大研究人群。这可能涉及整个学术部门或大学进行的一项调查，以确定本章中确定的趋势是否反映了更普遍的情绪。此外，纵向研究提供的机遇在衡量学术界对人工智能感知和应用演变方面不容小觑。
- en: Another avenue of scholarly research relates to examining faculty integration
    of and adaptation to AI technologies. This chapter has showcased examples of faculty
    members who have enthusiastically adopted AI, yet a thorough investigation into
    the factors driving faculty adaptation to AI presents a rich field for further
    exploration. These propositions merely skim the surface of potential research
    endeavors from the initial findings of this chapter. The dynamic and multifaceted
    nature of AI’s integration into higher education necessitates a varied approach
    to research, one that embraces interdisciplinary methodologies and perspectives
    to capture the nuances of this technological paradigm shift fully.
  id: totrans-304
  prefs: []
  type: TYPE_NORMAL
  zh: 另一条学术研究的途径是考察教师对人工智能技术的整合和适应。本章展示了积极采用人工智能的教师案例，然而，对推动教师适应人工智能的因素进行彻底调查，为进一步的探索提供了丰富的领域。这些命题仅仅触及了本章初始发现中潜在研究努力的表面。人工智能融入高等教育的动态和多面性需要采用多样化的研究方法，这种方法应接纳跨学科的方法和视角，以充分捕捉这一技术范式转变的细微之处。
- en: 1.6 Limitations
  id: totrans-305
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 1.6 局限性
- en: 'While this study offers insightful observations and prompts significant inquiries
    about AI’s utilization in higher education, it is constrained by several limitations.
    Initially, the research encompasses three distinct groups: undergraduates, graduates,
    and faculty members. This scope does not capture the full array of perspectives
    and experiences across the wider academic and administrative spectrum. Moreover,
    the study’s participant count is limited to six individuals. Expanding the sample
    size is imperative to enhance the representativeness of the findings and establish
    broader connections within the academic community.'
  id: totrans-306
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管这项研究提供了有洞察力的观察并引发了关于人工智能在高等教育中应用的重大疑问，但它受到几个局限性的制约。首先，这项研究涵盖了三个不同的群体：本科生、研究生和教师。这个范围没有捕捉到更广泛学术和行政领域的全部观点和经验。此外，研究参与者的数量限制为六人。扩大样本量对于提高发现的可代表性和在学术社区中建立更广泛的联系至关重要。
- en: Additionally, the methodological approach of this investigation presents further
    limitations. The reliance on six individual case studies as the sole source of
    participant input restricts the depth of the research. A more robust methodological
    framework, incorporating both surveys and interviews for each participant, would
    significantly enrich the insights garnered from this chapter.
  id: totrans-307
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，这项调查的方法论方法也提出了进一步的局限性。仅依靠六个个别案例研究作为参与者输入的唯一来源限制了研究的深度。一个更稳健的方法论框架，包括对每个参与者进行问卷调查和访谈，将显著丰富本章获得的见解。
- en: A richer, more detailed exploration of AI’s role within academic environments
    can be achieved by addressing these identified limitations in future research
    initiatives. Such efforts would undoubtedly yield valuable contributions, enriching
    the discourse for policymakers, educators, and technologists and fostering a deeper
    understanding of the complexities surrounding AI’s integration into educational
    practices.
  id: totrans-308
  prefs: []
  type: TYPE_NORMAL
  zh: 通过解决未来研究计划中确定的这些局限性，可以更深入、更详细地探索人工智能在学术环境中的作用。这样的努力无疑会带来宝贵的贡献，丰富政策制定者、教育工作者和技术人员的讨论，并加深对人工智能融入教育实践周围复杂性的理解。
- en: 1.7 Conclusion
  id: totrans-309
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 1.7 结论
- en: The findings of our investigation, which examined the integration and utilization
    of ChatGPT and other AI technologies in higher education among undergraduate and
    graduate students and faculty at the University of Kansas, have revealed a mixed
    landscape of attitudes and experiences. Despite varying levels of familiarity,
    participants universally acknowledged the potential of AI technologies, a sentiment
    echoed by [Adıgüzel et al. (2023)](#ch09.xhtml#r001), [Bearman et al. (2023)](#ch09.xhtml#r002),
    and [Crompton and Burke (2023)](#ch09.xhtml#r003). This chapter reveals that irrespective
    of their academic standing—undergraduate, graduate, or faculty—individuals perceive
    ChatGPT as a tool to bolster productivity, aid in research, and streamline educational
    tasks. Even as relative newcomers to AI in their professional pursuits, they have
    effectively harnessed AI to enhance efficiency and extend their capabilities.
    At the same time, there exists a significant degree of apprehension and concern
    among the participants of this study due to this being a relatively new tool in
    the academic world at the professor and student levels. Participants noted worries
    about the rapid advancements in AI and the potential ethical dilemmas associated
    with its use. They are wary of the implications of relying too heavily on AI for
    tasks traditionally performed by humans and plagiarism concerns. The apprehensions
    surrounding AI’s integration into education are not novel within the scholarly
    discourse. [Pisica et al. (2023)](#ch09.xhtml#r012) delved into the perceptions
    of Romanian academics on the infusion of AI in higher education, uncovering concerns
    paralleling those associated with plagiarism in academia. Similarly, [Hockly (2023)](#ch09.xhtml#r007)
    highlights a spectrum of ethical quandaries linked to AI, encompassing issues
    of information privacy, anonymity, surveillance, autonomy, and the ownership of
    information. These investigations underscore a broader academic apprehension toward
    the ethical implications of AI deployment in educational settings, reflecting
    a critical need for ongoing scrutiny and dialogue within this rapidly evolving
    technological landscape.
  id: totrans-310
  prefs: []
  type: TYPE_NORMAL
  zh: 我们对堪萨斯大学本科生、研究生和教师中ChatGPT及其他人工智能技术在高等教育中的整合与利用进行的调查发现，参与者对人工智能技术的态度和经验呈现出复杂多样的局面。尽管熟悉程度各异，但参与者普遍认可人工智能技术的潜力，这一观点与[Adıgüzel等人（2023）](https://wiki.example.org/ch09.xhtml#r001)、[Bearman等人（2023）](https://wiki.example.org/ch09.xhtml#r002)和[Crompton和Burke（2023）](https://wiki.example.org/ch09.xhtml#r003)的研究相呼应。本章揭示，无论其学术地位是本科生、研究生还是教师，个人都将ChatGPT视为提高生产力、辅助研究和简化教育任务的工具。尽管他们在专业追求中相对较新接触人工智能，但他们已经有效地利用人工智能来提高效率和扩展他们的能力。同时，由于这是在教授和学生层面相对较新的工具，因此参与者中存在相当程度的担忧和关切。他们关注人工智能的快速发展及其使用可能带来的伦理困境。他们担心过度依赖人工智能来完成传统上由人类完成的任务，以及抄袭的担忧。关于人工智能在教育中整合的担忧在学术讨论中并不新颖。[Pisica等人（2023）](https://wiki.example.org/ch09.xhtml#r012)深入探讨了罗马尼亚学者对高等教育中人工智能融入的看法，发现与学术抄袭相关联的担忧。同样，[Hockly（2023）](https://wiki.example.org/ch09.xhtml#r007)强调了与人工智能相关的伦理困境的广泛范围，包括信息隐私、匿名性、监控、自主性和信息所有权等问题。这些调查强调了更广泛的学术界对人工智能在教育环境中部署的伦理影响的担忧，反映了在这个快速发展的技术领域中持续审查和对话的迫切需要。
- en: 'Despite these divergent perspectives, a common thread runs through all participants’
    responses: recognition of the potential usefulness of ChatGPT and AI in education.
    Even those who approach AI with skepticism acknowledge its value when used judiciously.
    They emphasize the importance of carefully considering ethical implications, privacy
    concerns, and the need for responsible AI development and implementation in educational
    settings. [Neumann et al. (2023)](#ch09.xhtml#r008) emphasize the necessity of
    reviewing AI-generated content prior to its application, a sentiment that resonates
    with numerous discussions presented in this chapter. Adopting a cautious stance
    toward utilizing AI outputs is advocated as a prudent measure, underscoring the
    importance of critical engagement with technology to ensure accuracy and reliability.'
  id: totrans-311
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管存在这些不同的观点，但所有参与者的回答中有一条共同的主线：认识到ChatGPT和人工智能在教育中的潜在有用性。即使那些对人工智能持怀疑态度的人也承认，如果谨慎使用，它是有价值的。他们强调仔细考虑伦理影响、隐私问题以及教育环境中负责任的人工智能开发和实施的重要性。[Neumann等人（2023）](#ch09.xhtml#r008)
    强调在应用之前审查人工智能生成内容的重要性，这与本章中提出的许多讨论产生了共鸣。倡导谨慎对待人工智能输出是一种谨慎的措施，强调了与技术进行批判性互动的重要性，以确保准确性和可靠性。
- en: This research highlights the nuanced nature of AI adoption in higher education.
    While there are varying degrees of enthusiasm and apprehension, all participants
    acknowledge the transformative potential of ChatGPT and similar AI technologies.
    Educational institutions and policymakers must address these mixed findings by
    developing clear guidelines and ethical frameworks to ensure responsible AI use
    in academia, fostering a balanced and constructive technology integration into
    the educational landscape. Doing so requires nimbleness, flexibility, and a dedication
    to revisiting this issue due to the dynamism of technology. It is essential to
    monitor and adapt to the evolving relationship between AI and education, striving
    to harness its benefits while mitigating potential risks. The world of collegiate
    academia may not be designed to move and change in such ways.
  id: totrans-312
  prefs: []
  type: TYPE_NORMAL
  zh: 这项研究突出了人工智能在高等教育中应用的微妙性质。尽管存在不同程度的热情和担忧，所有参与者都承认ChatGPT和类似人工智能技术的变革潜力。教育机构和政策制定者必须通过制定明确的指南和伦理框架来应对这些混合结果，以确保学术界负责任地使用人工智能，促进平衡且建设性的技术融入教育环境。这样做需要敏捷性、灵活性和对技术动态性的持续关注。监测和适应人工智能与教育之间不断变化的关系至关重要，力求发挥其益处同时减轻潜在风险。大学学术界的运作方式可能并不适合以这种方式移动和改变。
