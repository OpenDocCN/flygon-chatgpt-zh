  id: totrans-359
  prefs: []
  type: TYPE_NORMAL
  zh: '**人工智能**是**工作世界**中**先前**的重大**转变**之一，它来自**自动化**，其中机器接管了以前由人类完成的**重复性工业工作**。我们可以将**人工智能**最近的**进步**视为消除重复的“**智力**”工作和任务，例如对数据进行**分类**或通过大型数据集**筛选**以获取特定信息或趋势。这**释放**了我们的时间，并帮助我们以**更快、更高效、更智能**的方式工作。'
