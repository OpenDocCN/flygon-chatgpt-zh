- en: '2.'
  id: totrans-238
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '2.'
- en: This is the text box that allows you to input the text to send to ChatGPT as
    a prompt.
  id: totrans-239
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 这是一个文本框，允许您输入要发送给ChatGPT作为提示的文本。
- en: '3.'
  id: totrans-240
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '3.'
