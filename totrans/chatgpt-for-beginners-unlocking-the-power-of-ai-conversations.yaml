- en: '****Ch**eck** ****f**or** ****Orig**inalit**y:  ****U**se** ****plag**iaris**m
    ****dete**ctio**n ****to**ols** ****t**o** ****en**sur**e ****th**at** ****gene**rate**d
    ****con**ten**t ****i**s** ****un**iqu**e.'
  id: totrans-808
  prefs: []
  type: TYPE_NORMAL
  zh: '**检查原创性：** 使用抄袭检测工具来确保生成的内容是独特的。'
- en: '****Ci**te** ****Sou**rce**s:  ****I**f** ****Cha**tGP**T ****pro**vide**s
    ****spe**cifi**c ****info**rmatio**n ****o**r** ****refe**rence**s, ****ma**ke**
    ****su**re** ****t**o** ****attr**ibut**e ****th**ose** ****sou**rce**s ****appro**priate**ly.'
  id: totrans-809
  prefs: []
  type: TYPE_NORMAL
  zh: '**引用来源：** 如果 ChatGPT 提供了特定的信息或参考文献，确保适当地归因于这些来源。'
- en: '****Enh**anc**e, ****D**on**’****t**** ****Rep**lac**e:  ****U**se** ****Cha**tGP**T
    ****t**o** ****comp**lemen**t ****yo**ur** ****cre**ativ**e ****o**r** ****aca**demi**c
    ****wo**rk**, ****ra**the**r ****th**an** ****a**s** ****a**** ****subs**titut**e
    ****f**or** ****ori**gina**l ****thi**nkin**g.'
  id: totrans-810
  prefs: []
  type: TYPE_NORMAL
  zh: '**增强，而非替代：** 使用 ChatGPT 来补充你的创意或学术工作，而不是作为原创思考的替代品。'
- en: '****B**y** ****main**tainin**g ****th**ese** ****stan**dard**s, ****y**ou**
    ****res**pec**t ****inte**llectu**al ****pro**pert**y ****ri**ght**s ****a**nd**
    ****up**hol**d ****inte**grit**y ****i**n** ****yo**ur** ****wo**rk**.'
  id: totrans-811
  prefs: []
  type: TYPE_NORMAL
  zh: 通过维持这些标准，您尊重知识产权并在工作中维护诚信。
