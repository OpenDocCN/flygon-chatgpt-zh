    ****ses**sio**n ****wi**th** ****a**** ****br**ief** ****sum**mar**y ****o**f**
    ****t**he** ****con**tex**t ****t**o** ****qui**ckl**y ****rees**tablis**h ****t**he**
    ****conv**ersati**on.'
  id: totrans-884
  prefs: []
  type: TYPE_NORMAL
  zh: '**使用总结性提示**：每次会话开始时，用一个简短的总结来快速建立对话。'
- en: '****Ba**tch** ****Ta**sks**:  ****Whe**neve**r ****pos**sibl**e, ****a**im**
    ****t**o** ****com**plet**e ****rel**ate**d ****ta**sks** ****wi**thi**n ****a****
    ****si**ngl**e ****ses**sio**n ****t**o** ****av**oid** ****nee**din**g ****t**o**
    ****r**e**-****exp**lai**n ****con**tex**t.'
  id: totrans-885
  prefs: []
  type: TYPE_NORMAL
  zh: '**批量任务**：尽可能在单个会话中完成相关任务，以避免需要重新解释上下文。'
- en: '****B**y** ****under**standi**ng ****th**is** ****limi**tatio**n, ****y**ou**
