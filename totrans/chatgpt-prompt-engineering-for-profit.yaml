    ****gene**rate**d.'
  id: totrans-318
  prefs: []
  type: TYPE_NORMAL
  zh: '**重构**通过重新表述初始提示，使模型对问题有不同视角。这可以通过多种方式实现，例如改变提示的语气、添加或删除细节，甚至询问模型如何回应他人的问题。重构改变了上下文和方法，从而扩展了生成响应的类型。'
- en: '****F**or** ****exa**mpl**e, ****ins**tea**d ****o**f** ****as**kin**g ****dir**ectl**y,
    “****Wh**at** ****a**re** ****t**he** ****ben**efit**s ****o**f** ****exe**rcis**e?”
    ****y**ou** ****co**uld** ****ref**ram**e ****t**he** ****que**stio**n ****a**s**,
    “****H**ow** ****do**es** ****exe**rcis**e ****cont**ribut**e ****t**o** ****me**nta**l
    ****a**nd** ****phy**sica**l ****he**alt**h?” ****o**r** “****W**hy** ****d**o**
    ****ma**ny** ****pe**opl**e ****reco**mmen**d ****exe**rcis**e ****a**s** ****pa**rt**
    ****o**f** ****a**** ****hea**lth**y ****life**styl**e?” ****Th**ese** ****ref**rame**s
    ****al**low** ****t**he** ****mo**del** ****t**o** ****con**side**r ****diff**eren**t
    ****asp**ect**s ****o**f** ****t**he** ****sa**me** ****que**stio**n.'
  id: totrans-319
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，而不是直接询问，“**锻炼**有哪些好处？”，你可以将问题重新表述为，“**锻炼**如何有助于我的身心健康？”或者“**为什么很多人推荐将锻炼作为健康生活方式的一部分？”这些重新表述允许模型考虑同一问题的不同方面。
- en: '****Addi**tional**ly, ****Refr**amin**g ****i**s** ****a**** ****us**efu**l
    ****tech**niqu**e ****wh**en** ****t**he** ****gene**rate**d ****an**swe**r ****do**es**
    ****n**ot** ****me**et** ****expe**ctatio**ns. ****B**y** ****modi**fyin**g ****t**he**
    ****w**ay** ****t**he** ****que**stio**n ****i**s** ****as**ked**, ****t**he**
    ****mo**del** ****i**s** ****enco**urage**d ****t**o** ****ta**ke** ****a****
    ****n**ew** ****an**gle**, ****of**ten** ****resu**ltin**g ****i**n** ****a****
    ****mo**re** ****rel**evan**t ****an**swe**r. ****Th**is** ****i**s** ****espe**ciall**y
    ****us**efu**l ****wh**en** ****tr**yin**g ****t**o** ****g**et** ****a**n** ****an**swe**r
    ****th**at** ****i**s** ****mo**re** ****compr**ehensi**ve ****o**r** ****det**aile**d.'
  id: totrans-320
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，当生成的答案不符合预期时，**重构**是一种有用的技术。通过修改提问方式，模型被鼓励采取新的角度，这通常会导致更相关或更详细的答案。这在尝试获取更全面或更详细答案时尤其有用。
