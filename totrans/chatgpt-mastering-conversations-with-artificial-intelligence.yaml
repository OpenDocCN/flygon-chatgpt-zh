  id: totrans-486
  prefs: []
  type: TYPE_NORMAL
  zh: '*结合市场研究、竞争对手分析和环保生产策略。*'
- en: 'Desired Output:'
  id: totrans-487
  prefs: []
  type: TYPE_NORMAL
  zh: 所需输出：
- en: '*Deliver a comprehensive document with headings, subheadings, and a persuasive
    tone, targeted at potential investors.*'
  id: totrans-488
  prefs: []
  type: TYPE_NORMAL
  zh: '*提供一份包含标题、副标题和说服性语调的全面文档，针对潜在投资者。*'
- en: 'Comparative Analysis Prompt:'
  id: totrans-489
  prefs: []
  type: TYPE_NORMAL
  zh: 比较分析提示：
- en: 'Context:'
  id: totrans-490
  prefs: []
  type: TYPE_NORMAL
  zh: 上下文：
- en: '*You are a health-conscious individual looking to adopt a new exercise routine.*'
  id: totrans-491
  prefs: []
  type: TYPE_NORMAL
  zh: '*你是一位希望采用新锻炼计划的注重健康的人。*'
- en: 'Assistant Role:'
  id: totrans-492
  prefs: []
  type: TYPE_NORMAL
  zh: 助理角色：
- en: '*GPT Assistant, serve as a fitness advisor.*'
  id: totrans-493
  prefs: []
  type: TYPE_NORMAL
  zh: '*GPT 助手，担任健身顾问。*'
- en: 'Assistant Task:'
  id: totrans-494
  prefs: []
  type: TYPE_NORMAL
  zh: 助理任务：
- en: '*Compare the benefits and drawbacks of cardio workouts versus strength training.*'
  id: totrans-495
  prefs: []
  type: TYPE_NORMAL
  zh: '*比较有氧运动与力量训练的利弊。*'
- en: 'Task Instructions:'
  id: totrans-496
  prefs: []
  type: TYPE_NORMAL
  zh: 任务说明：
- en: '*Provide evidence-based information from recent fitness studies.*'
  id: totrans-497
  prefs: []
  type: TYPE_NORMAL
  zh: '*提供来自最近健身研究的基于证据的信息。*'
- en: 'Desired Output:'
  id: totrans-498
  prefs: []
  type: TYPE_NORMAL
  zh: 所需输出：
- en: '*Generate a well-structured table or chart highlighting the pros and cons of
    each type of exercise, aiming readers interested in improving their fitness regimen.*'
  id: totrans-499
  prefs: []
  type: TYPE_NORMAL
  zh: '*生成一个结构良好的表格或图表，突出每种锻炼类型的优缺点，旨在吸引那些希望改善其健身计划的人。*'
- en: '[1](#footnote-12250-1-backlink). OpenAI, "Best practices for prompt engineering
