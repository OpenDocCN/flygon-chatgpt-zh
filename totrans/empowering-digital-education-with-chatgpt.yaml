- en: Bootstrapping technique, which is another nonparametric technique for assessing
    the accuracy of the PLS estimate, was utilized to test the hypotheses. As suggested
    by [Hair et al. (2016)](#ch13.xhtml#r201), the bootstrap samples in this study
