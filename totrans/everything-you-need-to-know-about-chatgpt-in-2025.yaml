  prefs: []
  type: TYPE_NORMAL
  zh: 此外，**团队合作**和**情感智能**将继续是关键。随着人工智能系统承担更多机械任务，**人际关系**和**在多学科团队中有效工作的能力**将比以往任何时候都更加重要。人与机器之间的协作将成为未来工作环境的一个基本支柱，在那里工作者将能够从人工智能中受益，以执行重复性任务，同时专注于需要互动和同理心的任务。
