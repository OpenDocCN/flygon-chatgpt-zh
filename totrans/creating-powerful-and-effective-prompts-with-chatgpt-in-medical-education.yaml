    ****high**li**gh**tin**g ****t****h**e** ****ben**e**fi**ts** ****th****e**y**
    ****br**i**n**g** ****t****o**** ****bo****t**h** ****fac**u**l**ty** ****a****n**d**
    ****stu**d**en**ts**.'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: '**有效的提示可以改变教学体验，使任务更具互动性、实践性和相关性，对医学学生来说尤为重要。这些命令必须能够指导AI提供准确和有用的响应，适合教育背景。在本章中，我们将探讨在医学教育中创建有效提示的重要性，强调它们为教师和学生带来的益处。'
