- en: '[https://python.langchain.com/docs/integrations/text_embedding](https://python.langchain.com/docs/integrations/text_embedding)
    and [https://platform.openai.com/docs/guides/embeddings/embedding-models](https://platform.openai.com/docs/guides/embeddings/embedding-models)'
