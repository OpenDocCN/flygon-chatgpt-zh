    online reputation.
  id: totrans-1679
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 分享使你的内容与本地评论良好匹配并管理你的在线声誉的建议。
- en: Explore the idea of understanding what users are looking for and ways to make
    your content match their needs and searches.
  id: totrans-1680
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 探索理解用户在寻找什么以及如何使你的内容满足他们的需求和搜索的想法。
