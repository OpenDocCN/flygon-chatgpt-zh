- en: “I help buyers and sellers navigate the fast-paced downtown market with savvy
    tech tools and a smile 😄. Real estate should feel exciting—not overwhelming.”
  id: totrans-391
  prefs: []
  type: TYPE_NORMAL
- en: 'Quote to remember:'
  id: totrans-392
  prefs: []
  type: TYPE_NORMAL
- en: “Your brand is what people say about you when you’re not in the room.” — Jeff
    Bezos
  id: totrans-393
