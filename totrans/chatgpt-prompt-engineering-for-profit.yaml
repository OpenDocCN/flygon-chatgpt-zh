  id: totrans-112
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**要求模型计算 1 到 10 之间所有奇数的和，并解释每一步的过程**。'
- en: '****Ins**truc**t ****t**he** ****mo**del** ****t**o** ****exp**lai**n ****h**ow**
    ****t**o** ****so**lve** ****t**he** ****math**ematic**al ****expr**essio**n ****3**x**
    - ****5**** = ****1**0**. ****Ma**ke** ****su**re** ****t**he** ****mo**del**
    ****th**ink**s ****thr**oug**h ****ea**ch** ****st**ep** ****be**for**e ****prov**idin**g
    ****t**he** ****an**swe**r.'
  id: totrans-113
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**指导**模型如何解决数学表达式 3x - 5 = 10。确保模型在提供答案之前，对每个步骤进行思考。'
- en: '****A**sk** ****t**he** ****mo**del** ****h**ow** ****t**o** ****org**aniz**e
    ****a**** ****pa**rty** ****f**or** ****1**0** ****pe**opl**e, ****incl**udin**g
    ****sho**ppin**g ****li**st**, ****ve**nue** ****pla**nnin**g, ****a**nd** ****prep**aratio**n.
    ****A**sk** ****h**im** ****o**r** ****h**er** ****t**o** ****des**crib**e ****ea**ch**
    ****st**ep** ****i**n** ****de**tai**l.'
  id: totrans-114
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**要求模型如何为 10 个人组织一个派对，包括购物清单、场地规划以及准备。要求它或她详细描述每个步骤**。'
- en: '****3****. ****Ze**ro**- ****sh**ot** ****Prom**ptin**g ( ****Ze**ro** ****Exa**mple**s
    ****Pr**omp**t )'
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: '**3. 零样本提示（零示例提示）**'
- en: '[****Wh**at** ****i**s** ]'
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: '[**什么是** ]'
- en: '****Ze**ro** - ****sh**ot** ****Prom**ptin**g ****i**s** ****a**** ****pr**omp**t
    ****engi**neerin**g ****tech**niqu**e ****th**at** ****inv**olve**s ****as**kin**g
    ****t**he** ****L**LM** ****t**o** ****gen**erat**e ****a**** ****res**pons**e
    ****wit**hou**t ****prov**idin**g ****a**ny** ****pr**ior** ****exa**mple**s.
    ****T**he** ****id**ea** ****i**s** ****th**at** ****t**he** ****mo**del** ****res**pond**s
    ****ba**sed** ****o**n** ****i**ts** ****gen**era**l ****tra**inin**g ****a**nd**
    ****nat**ura**l ****lan**guag**e ****under**standi**ng, ****wit**hou**t ****nee**din**g
    ****spe**cifi**c ****sam**ple**s ****t**o** ****kn**ow** ****wh**at** ****ty**pe**
    ****o**f** ****res**pons**e ****t**o** ****ex**pec**t.'
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: '**零样本提示是提示工程的一种技术，它涉及让 LLM 生成一个不需要任何先前示例的响应。其理念是模型根据其一般训练和自然语言理解能力进行响应，而不需要特定的样本来了解期望的响应类型**。'
- en: '****T**he** ****te**rm** "****Ze**ro**- ****sh**ot** " ****re**fer**s ****t**o**
    ****t**he** ****fa**ct** ****th**at** ****n**o** ****det**aile**d ****inst**ructio**ns
    ****o**r** ****pre**viou**s ****exa**mple**s ****a**re** ****pro**vide**d ****f**or**
    ****t**he** ****mo**del** ****t**o** ****fo**llo**w, ****on**ly** ****a**** ****que**stio**n
    ****o**r** ****ta**sk** ****i**s** ****gi**ven**. ****Th**is** ****tech**niqu**e
    ****ta**kes** ****adva**ntag**e ****o**f** ****t**he** ****L**LM**''****s****
    ****abi**lit**y ****t**o** ****unde**rstan**d ****a**nd** ****pro**ces**s ****lan**guag**e
    ****wit**hou**t ****addi**tiona**l ****con**tex**t.'
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: '**术语 "零样本" 指的是没有为模型提供详细的指令或先前示例，只为模型提供一个问题或任务。这种技术利用了 LLM 在没有额外上下文的情况下理解和处理语言的能力**。'
- en: '[****Wh**at** ****i**s** ****yo**ur** ****ma**in** ****obje**ctiv**e ]'
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: '[**你的主要目标是什么** ]'
- en: '****T**he** ****ma**in** ****obje**ctiv**e ****o**f** ****Ze**ro**- ****sh**ot**
    ****Prom**ptin**g ****i**s** ****tes**tin**g ****t**he** ****mo**del**''****s****
    ****abi**lit**y ****t**o** ****res**pon**d ****accu**ratel**y ****t**o** ****a****
    ****req**ues**t ****us**ing** ****on**ly** ****i**ts** ****gen**era**l ****know**ledg**e.
    ****I**t** ****i**s** ****espe**ciall**y ****us**efu**l ****wh**en** ****t**he**
    ****us**er** ****wa**nts** ****t**o** ****g**et** ****qu**ick**, ****uncom**plicat**ed
    ****resp**onse**s ****o**r** ****wh**en** ****t**he** ****go**al** ****i**s**
    ****t**o** ****as**ses**s ****t**he** ****mo**del**''****s**** ****comp**etenc**e
    ****wit**hou**t ****ex**tra** ****he**lp**.'
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: '**Zero-shot** **Prompting** 的主要目标是测试模型仅使用其一般知识对请求做出准确响应的能力。当用户希望获得快速、简单的响应或目标是评估模型的能力而不需要额外帮助时，这特别有用。'
- en: '****Ano**the**r ****obje**ctiv**e ****o**f** ****Ze**ro**- ****sh**ot** ****Prom**ptin**g
    ****i**s** ****ab**out** ****simp**lifyin**g ****t**he** ****prom**ptin**g ****pro**ces**s
    ****b**y** ****elim**inatin**g ****t**he** ****ne**ed** ****t**o** ****th**ink**
    ****thr**oug**h ****det**aile**d ****exa**mple**s ****o**r** ****com**ple**x ****context**ualizatio**ns.
    ****Th**is** ****c**an** ****b**e** ****us**efu**l ****f**or** ****mo**re** ****straig**htforwa**rd
    ****ques**tion**s ****o**r** ****f**or** ****get**tin**g ****a**** ****fi**rst**
    ****impr**essio**n ****o**f** ****t**he** ****mo**del**''****s**** ****under**standi**ng
    ****o**f** ****a**** ****part**icula**r ****to**pic**.'
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: '**Zero-shot** **Prompting** 的另一个目标是简化提示过程，通过消除详细示例或复杂情境的思考需求。这对于更直接的问题或想要获取模型对特定主题理解的第一印象非常有用。'
- en: '[****H**ow** ****i**t** ****wo**rks** ]'
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: '[**如何工作**]'
- en: '****Ze**ro**- ****sh**ot** ****Prom**ptin**g ****wo**rks** ****b**y** ****si**mpl**y
    ****as**kin**g ****a**** ****que**stio**n ****o**r** ****prov**idin**g ****a****
    ****ta**sk** ****dir**ectl**y ****t**o** ****t**he** ****mo**del**, ****wit**hou**t
    ****a**ny** ****exa**mple**s ****o**r** ****con**tex**t ****be**yon**d ****t**he**
    ****pr**omp**t ****it**sel**f. ****T**he** ****L**LM** ****us**es** ****i**ts**
    ****pr**ior** ****know**ledg**e ****t**o** ****inte**rpre**t ****a**nd** ****res**pon**d
    ****t**o** ****t**he** ****pr**omp**t, ****ba**sed** ****o**n** ****t**he** ****pat**tern**s
    ****i**t** ****lea**rne**d ****du**rin**g ****i**ts** ****tra**inin**g.'
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: '**Zero-shot** **Prompting** works by simply asking a question or providing
    a task directly to the model, without any examples or context beyond the prompt
    itself. The LLM uses its prior knowledge to interpret and respond to the prompt,
    based on the patterns it learned during its training.'
- en: '****Si**nce** ****t**he** ****L**LM** ****i**s** ****n**ot** ****gi**ven**
    ****exa**mple**s, ****i**t** ****ne**eds** ****t**o** ****unde**rstan**d ****t**he**
