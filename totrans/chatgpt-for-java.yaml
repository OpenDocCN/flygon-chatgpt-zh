- en: '6. Adding Intelligence to Our Discord Bots, Part 1: Using the Chat Endpoint
    for Q&A'
  id: totrans-990
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 6. 为我们的 Discord 机器人添加智能，第 1 部分：使用聊天端点进行问答
- en: 'Bruce Hopkins^([1](#Aff2)  )(1)Beaverton, OR, USAAt this point, we have all
    the structure in place to make both our Discord bots that we created in the previous
    chapter to be fully functional and artificially intelligent. In the last two chapters
    of this book, we’re going to follow all the steps necessary in order to make both
    bots to be artificially intelligent. In this chapter, we’ll get started with our
    Tech Support Bot, which was called TechSupportBotDumb.java. Below are the two
    major changes that we’re going to make:'
  id: totrans-991
  prefs: []
  type: TYPE_NORMAL
  zh: 布鲁斯·霍普金斯^([1](#Aff2)  )(1)比佛顿，俄勒冈州，美国 在这一点上，我们已经拥有了所有必要的结构，使得我们在上一章中创建的两个 Discord
    机器人能够完全功能化和具有人工智能。在本书的最后两章中，我们将遵循所有必要的步骤，以便使这两个机器人变得具有人工智能。在本章中，我们将开始构建我们的技术支持机器人，它被称为
    TechSupportBotDumb.java。以下是我们要进行的两个主要更改：
- en: Modify our ChatGPTClient.java class so that the Discord bot class can ask questions
    about specific information that we provide to it. The updated class will be called
    ChatGPTClientForQAandModeration.java. It will be used for Q&A purposes in this
    chapter but will be used in the final chapter of the book as well.
  id: totrans-992
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 修改我们的 ChatGPTClient.java 类，以便 Discord 机器人类可以就我们提供给它的特定信息提出问题。更新后的类将被称为 ChatGPTClientForQAandModeration.java。它将在本章用于问答目的，但也会在本书的最后一章中使用。
- en: Modify our TechSupportBot.java class (formerly named TechSupportBotDumb.java)
    so that it can load an external text file that contains frequently asked questions
    with the answers. TechSupportBot.java will then provide the contents of the text
    file to the ChatGPTClientForQAandModeration.java class who is responsible for
    creating the prompt and of course invoking the Chat Endpoint.
  id: totrans-993
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 修改我们的 TechSupportBot.java 类（之前命名为 TechSupportBotDumb.java），使其能够加载包含常见问题和答案的外部文本文件。TechSupportBot.java
    将随后将文本文件的内容提供给 ChatGPTClientForQAandModeration.java 类，该类负责创建提示并当然调用聊天端点。
- en: Making TechSupportBot.java More Intelligent
  id: totrans-994
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使 TechSupportBot.java 更智能
- en: 'Listing [6-1](#PC1) contains the full contents of the frequently asked questions
    that the fictional customer support team has created based upon support tickets
    from users of the newly launched mobile banking application.1\. What is the Crooks
    Bank Mobile App?The Crooks Bank Mobile App is a cutting-edge mobile banking app
    that allows you to manage your finances, make transactions, and access a wide
    range of banking services conveniently from your mobile device.2\. How can I download
    the Crooks Bank Mobile App?You can download the Crooks Bank Mobile App from the
    App Store for iOS devices and Google Play for Android devices. Simply search for
    the "Crooks Bank Mobile App" and click the "Install" button.3\. Is the Crooks
    Bank Mobile App safe and secure?Yes, the Crooks Bank Mobile App prioritizes your
    security. We use state-of-the-art encryption and security protocols to protect
    your data and transactions. Your information is safe with us.4\. What features
    does the Crooks Bank Mobile App offer?The Crooks Bank Mobile App provides a variety
    of features, including:•    Account Management: View account balances, transaction
    history, and more.•    Transfer Funds: Easily transfer money between your accounts
    or to other bank accounts.•    Bill Payments: Pay bills and manage recurring payments.•    Deposit
    Checks: Snap photos of checks for remote deposit.•    ATM Locator: Find nearby
    ATMs and branches.•    Notifications: Receive alerts for account activity and
    important updates.5\. Can I link external accounts to the Crooks Bank Mobile App?Yes,
    the Crooks Bank Mobile App supports linking external accounts from other financial
    institutions. You can monitor and manage your accounts from different banks in
    one place.6\. How can I reset my password if I forget it?If you forget your password,
    simply click the "Forgot Password" option on the login screen. You''ll receive
    instructions on how to reset your password.7\. What are the fees associated with
    the Crooks Bank Mobile App?The Crooks Bank Mobile App aims to be transparent with
    its fees. You can find information on account fees, transaction charges, and other
    costs in the "Fees" section within the app or on our website.8\. Can I get customer
    support through the Crooks Bank Mobile App?Absolutely! We offer customer support
    through our in-app messaging feature. You can also find our customer service contact
    information on our website.9\. Is the Crooks Bank Mobile App available for business
    accounts?The Crooks Bank Mobile App primarily caters to personal banking needs.
    However, we have plans to introduce business banking services in the future.10\.
    How can I provide feedback or suggestions for the Crooks Bank Mobile App?We welcome
    your feedback! You can submit suggestions and feedback through the "Contact Us"
    section in the app or on our website.Listing 6-1'
  id: totrans-995
  prefs: []
  type: TYPE_NORMAL
  zh: 列表 [6-1](#PC1) 包含了虚构的客户支持团队根据新推出的移动银行应用程序用户的支持票据所创建的常见问题解答的完整内容。1. 什么是对手银行移动应用程序？对手银行移动应用程序是一款前沿的移动银行应用程序，允许您从您的移动设备方便地管理您的财务、进行交易和访问广泛的银行服务。2.
    我如何下载对手银行移动应用程序？您可以从苹果设备的App Store和安卓设备的Google Play下载对手银行移动应用程序。只需搜索“对手银行移动应用程序”并点击“安装”按钮。3.
    对手银行移动应用程序安全吗？是的，对手银行移动应用程序优先考虑您的安全。我们使用最先进的加密和安全协议来保护您的数据和交易。您的信息在我们这里是安全的。4.
    对手银行移动应用程序提供哪些功能？对手银行移动应用程序提供各种功能，包括：•    账户管理：查看账户余额、交易历史等。•    转账：轻松在您的账户之间或向其他银行账户转账。•    账单支付：支付账单和管理定期支付。•    支票存款：拍摄支票进行远程存款。•    ATM定位器：查找附近的ATM和分行。•    通知：接收账户活动和重要更新的警报。5.
    我可以将外部账户链接到对手银行移动应用程序吗？是的，对手银行移动应用程序支持从其他金融机构链接外部账户。您可以在一个地方监控和管理不同银行的账户。6. 如果我忘记密码怎么办？如果您忘记密码，只需在登录屏幕上点击“忘记密码”选项。您将收到有关如何重置密码的说明。7.
    与对手银行移动应用程序相关的费用有哪些？对手银行移动应用程序旨在对其费用保持透明。您可以在应用程序内的“费用”部分或我们的网站上找到有关账户费用、交易费用和其他费用的信息。8.
    我可以通过对手银行移动应用程序获得客户支持吗？当然可以！我们通过应用程序内的消息功能提供客户支持。您也可以在我们的网站上找到我们的客户服务联系方式。9. 对手银行移动应用程序适用于企业账户吗？对手银行移动应用程序主要针对个人银行需求。然而，我们计划在未来推出企业银行服务。10.
    我如何为对手银行移动应用程序提供反馈或建议？我们欢迎您的反馈！您可以通过应用程序内的“联系我们”部分或我们的网站提交建议和反馈。列表 6-1
- en: FAQ.txt
  id: totrans-996
  prefs: []
  type: TYPE_NORMAL
  zh: FAQ.txt
- en: 'As you can see in the Frequently Asked Questions text file in Listing [6-1](#PC1),
    there’s no magic involved here. It’s simply a list of questions and the answers.
    Now, let’s see the newly modified TechSupportBot.java class. This is represented
    in Listing [6-2](#PC2).import java.io.BufferedReader;import java.io.FileReader;import
    java.io.IOException;import java.util.EnumSet;import net.dv8tion.jda.api.JDA;import
    net.dv8tion.jda.api.JDABuilder;import net.dv8tion.jda.api.entities.Activity;import
    net.dv8tion.jda.api.entities.User;import net.dv8tion.jda.api.entities.channel.ChannelType;import
    net.dv8tion.jda.api.entities.channel.unions.MessageChannelUnion;import net.dv8tion.jda.api.events.message.MessageReceivedEvent;import
    net.dv8tion.jda.api.hooks.ListenerAdapter;import net.dv8tion.jda.api.requests.GatewayIntent;//
    This class extends a ListenerAdapter to handle message events on Discord.public
    class TechSupportBot extends ListenerAdapter {    // The bot''s Discord token
    for authentication.    static String discordToken = "";    // The name of the
    channel the bot should monitor and interact with.    static String channelToWatch
    = "q-and-a";    // Variable to store FAQ contents    static String contentsFromFAQ
    = "";    static String pathToFAQFile = "/Users/Desktop/FAQ.txt";    // the system
    message    static String systemMessage = "You are a virtual assistant that provides
    support for the Crooks Bank banking app. ".”;    // our ChatGPT client    static
    ChatGPTClientForQAandModeration chatGPTClient = null;    public static void main(String[]
    args) throws IOException {        // Set of intents declaring which types of events
    the bot intends to listen to.        EnumSet<GatewayIntent> intents = EnumSet.of(                GatewayIntent.GUILD_MESSAGES,
    // For messages in guilds.                GatewayIntent.DIRECT_MESSAGES, // For
    private direct messages.                GatewayIntent.MESSAGE_CONTENT // To allow
    access to message content.        );        // Read the contents of an external
    text file into FAQContents variable        contentsFromFAQ = readFileContents(pathToFAQFile);        //
    create a new ChatGPTClientForQAandModeration        chatGPTClient = new ChatGPTClientForQAandModeration(contentsFromFAQ,
    systemMessage);        // Initialize the bot with minimal configuration and the
    specified intents.        try {            JDA jda = JDABuilder.createLight(discordToken,
    intents)                    .addEventListeners(new TechSupportBot()) // Adding
    the current class as an event listener.                    .setActivity(Activity.customStatus("Ready
    to answer questions")) // Set the bot''s custom status.                    .build();            //
    Asynchronously get REST ping from Discord API and print it.            jda.getRestPing().queue(ping
    -> System.out.println("Logged in with ping: " + ping));            // Block the
    main thread until JDA is fully loaded.            jda.awaitReady();            //
    Print the number of guilds the bot is connected to.            System.out.println("Guilds:
    " + jda.getGuildCache().size());            System.out.println("Self user: " +
    jda.getSelfUser());        } catch (InterruptedException e) {            // Handle
    exceptions if the thread is interrupted during the awaitReady process.            e.printStackTrace();        }    }    //
    This method handles incoming messages.    @Override    public void onMessageReceived(MessageReceivedEvent
    messageEvent) {        // The ID of the sender        User senderDiscordID = messageEvent.getAuthor();        //
    The Discord channel where the message was posted        MessageChannelUnion channel
    = messageEvent.getChannel();        net.dv8tion.jda.api.entities.Message message
    = messageEvent.getMessage();        String reply = null;        // Ignore messages
    sent by the bot to prevent self-responses.        if (senderDiscordID.equals(messageEvent.getJDA().getSelfUser()))
    {            return;        } else if (messageEvent.getChannelType() == ChannelType.TEXT)
    {            // Ignore messages not in the specified "q-and-a" channel.            if
    (!channel.getName().equalsIgnoreCase(channelToWatch)) {                return;            }        }        //
    Show "typing" status while the bot is working        channel.sendTyping().queue();        //
    this line takes the question from the Discord users and asks ChatGPT        reply
    = chatGPTClient.sendMessageFromDiscordUser(message.getContentDisplay());        channel.sendMessage(reply).queue();    }    //
    New method to read file contents    private static String readFileContents(String
    filePath) {        try (BufferedReader reader = new BufferedReader(new FileReader(filePath)))
    {            StringBuilder content = new StringBuilder();            String line;            while
    ((line = reader.readLine()) != null) {                content.append(line).append("\n");            }            return
    content.toString();        } catch (IOException e) {            e.printStackTrace();            return
    "Failed to read FAQ contents.";        }    }}Listing 6-2'
  id: totrans-997
  prefs: []
  type: TYPE_NORMAL
  zh: '如您在列表 [6-1](#PC1) 中的常见问题解答文本文件中所见，这里没有涉及任何魔法。它仅仅是一个问题和答案的列表。现在，让我们看看新修改的 TechSupportBot.java
    类。这可以在列表 [6-2](#PC2) 中找到。import java.io.BufferedReader;import java.io.FileReader;import
    java.io.IOException;import java.util.EnumSet;import net.dv8tion.jda.api.JDA;import
    net.dv8tion.jda.api.JDABuilder;import net.dv8tion.jda.api.entities.Activity;import
    net.dv8tion.jda.api.entities.User;import net.dv8tion.jda.api.entities.channel.ChannelType;import
    net.dv8tion.jda.api.entities.channel.unions.MessageChannelUnion;import net.dv8tion.jda.api.events.message.MessageReceivedEvent;import
    net.dv8tion.jda.api.hooks.ListenerAdapter;import net.dv8tion.jda.api.requests.GatewayIntent;//
    这个类扩展了 ListenerAdapter 以处理 Discord 上的消息事件.public class TechSupportBot extends
    ListenerAdapter {    // 机器人的 Discord 认证令牌。    static String discordToken = "";    //
    机器人应该监控和与之交互的频道名称。    static String channelToWatch = "q-and-a";    // 用于存储常见问题解答内容的变量    static
    String contentsFromFAQ = "";    static String pathToFAQFile = "/Users/Desktop/FAQ.txt";    //
    系统消息    static String systemMessage = "您是一个为 Crooks Bank 银行应用程序提供支持的虚拟助手。 "。”;    //
    我们用于问答和管理的 ChatGPT 客户端    static ChatGPTClientForQAandModeration chatGPTClient
    = null;    public static void main(String[] args) throws IOException {        //
    声明意图集合，指定机器人打算监听哪些类型的事件。        EnumSet<GatewayIntent> intents = EnumSet.of(                GatewayIntent.GUILD_MESSAGES,
    // 用于公会中的消息。                GatewayIntent.DIRECT_MESSAGES, // 用于私人直接消息。                GatewayIntent.MESSAGE_CONTENT
    // 允许访问消息内容。        );        // 将外部文本文件的内容读取到 FAQContents 变量中        contentsFromFAQ
    = readFileContents(pathToFAQFile);        // 创建一个新的 ChatGPTClientForQAandModeration
    实例        chatGPTClient = new ChatGPTClientForQAandModeration(contentsFromFAQ,
    systemMessage);        // 使用最小配置和指定的意图初始化机器人。        try {            JDA jda
    = JDABuilder.createLight(discordToken, intents)                    .addEventListeners(new
    TechSupportBot()) // 将当前类添加为事件监听器。                    .setActivity(Activity.customStatus("Ready
    to answer questions")) // 设置机器人的自定义状态。                    .build();            //
    从 Discord API 异步获取 REST ping 并打印。            jda.getRestPing().queue(ping -> System.out.println("Logged
    in with ping: " + ping));            // 阻塞主线程，直到 JDA 完全加载。            jda.awaitReady();            //
    打印机器人连接到的公会数量。            System.out.println("Guilds: " + jda.getGuildCache().size());            System.out.println("Self
    user: " + jda.getSelfUser());        } catch (InterruptedException e) {            //
    处理在 awaitReady 过程中线程被中断时的异常。            e.printStackTrace();        }    }    //
    此方法处理传入的消息。    @Override    public void onMessageReceived(MessageReceivedEvent
    messageEvent) {        // 发送者的 ID        User senderDiscordID = messageEvent.getAuthor();        //
    消息被发布的 Discord 频道        MessageChannelUnion channel = messageEvent.getChannel();        net.dv8tion.jda.api.entities.Message
    message = messageEvent.getMessage();        String reply = null;        // 忽略机器人发送的消息，以防止自我响应。        if
    (senderDiscordID.equals(messageEvent.getJDA().getSelfUser())) {            return;        }
    else if (messageEvent.getChannelType() == ChannelType.TEXT) {            // 忽略不在指定
    "q-and-a" 频道中的消息。            if (!channel.getName().equalsIgnoreCase(channelToWatch))
    {                return;            }        }        // 在机器人工作时显示 "输入中" 状态        channel.sendTyping().queue();        //
    这一行从 Discord 用户那里获取问题并询问 ChatGPT        reply = chatGPTClient.sendMessageFromDiscordUser(message.getContentDisplay());        channel.sendMessage(reply).queue();    }    //
    新方法读取文件内容    private static String readFileContents(String filePath) {        try
    (BufferedReader reader = new BufferedReader(new FileReader(filePath))) {            StringBuilder
    content = new StringBuilder();            String line;            while ((line
    = reader.readLine()) != null) {                content.append(line).append("\n");            }            return
    content.toString();        } catch (IOException e) {            e.printStackTrace();            return
    "Failed to read FAQ contents.";        }    }}Listing 6-2'
- en: TechSupportBot.java
  id: totrans-998
  prefs: []
  type: TYPE_NORMAL
  zh: TechSupportBot.java
- en: Important Changes to Note from the Previous Version of the Tech Support Bot
  id: totrans-999
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 需要注意的从技术支持机器人前一个版本的重要变更
- en: Let’s briefly analyze TechSupportBot.java and discuss the changes that were
    made. The following code snippet contains a portion of the class definition section.    static
    String contentsFromFAQ = "";    static String pathToFAQFile = "/Users/Desktop/FAQ.txt";    static
    String systemMessage = "You are a virtual assistant that provides support for
    the Crooks Bank banking app. ";    static ChatGPTClientForQAandModeration chatGPTClient
    = null;
  id: totrans-1000
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们简要分析TechSupportBot.java并讨论所做的变更。以下代码片段包含类定义部分的一部分。    `static String contentsFromFAQ
    = "";`    `static String pathToFAQFile = "/Users/Desktop/FAQ.txt";`    `static
    String systemMessage = "您是一个为Crooks Bank银行应用程序提供支持的虚拟助手。";`    `static ChatGPTClientForQAandModeration
    chatGPTClient = null;`
- en: As you can see, we’re defining some Strings that provide a reference to the
    file path location where the frequently asked questions file is stored. We also
    have a String that will be used to contain the contents of the file itself.
  id: totrans-1001
  prefs: []
  type: TYPE_NORMAL
  zh: 如您所见，我们定义了一些String，它们提供了对存储常见问题文件路径位置的引用。我们还有一个String，将用于包含文件本身的内 容。
- en: Now, as we have learned from the previous chapters in the book, you can dramatically
    set the tone of the conversation by providing a specific message to the system
    itself in your prompt. Therefore, we have a String here as well containing the
    system message. Finally, we have a reference to a Class, ChatGPTClientForQAandModeration,
    which will be quite similar to the other ChatGPTClient classes that we use previously
    in the book.
  id: totrans-1002
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，正如我们从本书的前几章中学到的，你可以通过在提示中向系统本身提供特定的消息来极大地设定对话的基调。因此，这里也有一个包含系统消息的String。最后，我们有一个对Class的引用，即ChatGPTClientForQAandModeration，它将非常类似于我们在本书中之前使用的其他ChatGPTClient类。
- en: Updates to the onMessageReceived() Method
  id: totrans-1003
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: onMessageReceived()方法的更新
- en: Now, when a message is received, be sure to notice the following line:net.dv8tion.jda.api.entities.Message
    message = messageEvent.getMessage();
  id: totrans-1004
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，当收到一条消息时，务必注意以下行：`net.dv8tion.jda.api.entities.Message message = messageEvent.getMessage();`
- en: Here, we need to give the full package and class name of the Message class used
    by the JDA library because we already created and use a Message class for encapsulating
    and representing the JSON objects when we send HTTP requests to the Chat Endpoint.
  id: totrans-1005
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，我们需要给出JDA库中使用的Message类的完整包名和类名，因为我们已经在发送HTTP请求到Chat Endpoint时创建并使用了Message类来封装和表示JSON对象。
- en: Now let’s further examine the following three lines of code:        channel.sendTyping().queue();        reply
    = chatGPTClient.sendMessageFromDiscordUser(message.getContentDisplay());        channel.sendMessage(reply).queue();
  id: totrans-1006
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们进一步检查以下三行代码：        `channel.sendTyping().queue();`        `reply = chatGPTClient.sendMessageFromDiscordUser(message.getContentDisplay());`        `channel.sendMessage(reply).queue();`
- en: Here, we provide a nice user experience and show the user that the bot is “typing,”
    while the user’s question is being sent to ChatGPT. When the response comes back,
    we provide the reply back to the user.
  id: totrans-1007
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，我们提供了一个良好的用户体验，向用户展示机器人正在“打字”，同时用户的提问被发送到ChatGPT。当响应返回时，我们向用户提供回复。
- en: Analyzing ChatGPTClientForQAandModeration.java
  id: totrans-1008
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 分析ChatGPTClientForQAandModeration.java
- en: 'In Listing [6-2](#PC2), TechSupportBot.java instantiates ChatGPTClientForQAandModeration.java
    which (as we stated previously) is very similar to the ChatGPTClient classes we
    have used before. The complete source for ChatGPTClientForQAandModeration.java
    is shown in Listing [6-3](#PC6).import com.fasterxml.jackson.core.JsonProcessingException;import
    com.fasterxml.jackson.databind.JsonNode;import com.fasterxml.jackson.databind.ObjectMapper;import
    java.io.BufferedReader;import java.io.IOException;import java.io.InputStreamReader;import
    java.io.OutputStream;import java.net.HttpURLConnection;import java.net.URL;import
    java.util.ArrayList;import java.util.List;public class ChatGPTClientForQAandModeration
    {    //    //  OpenAI parameters that we already know how to use    //    String
    openAIKey = "";    String endpoint = "https://api.openai.com/v1/chat/completions";    String
    model = "gpt-4";    float temperature = 1.0f;    int max_tokens = 256;    float
    top_p = 1.0f;    int frequency_penalty = 0;    int presence_penalty = 0;    String
    systemMessage = null;    String initialInstructionsToChatGPT = null;    //    //
    The constructor needs to be passed the contents from the FAQ.txt file    // and
    the system message    //    public ChatGPTClientForQAandModeration(String systemMessage,
    String initialInstructionsToChatGPT) {        this.systemMessage = systemMessage;        this.initialInstructionsToChatGPT
    = initialInstructionsToChatGPT;    }    public String sendMessageFromDiscordUser(String
    discordMessageText) {        String answerFromChatGPT = "";        List<Message>
    messages = new ArrayList<>();        messages.add(new Message("system", systemMessage));        messages.add(new
    Message("user", initialInstructionsToChatGPT));        messages.add(new Message("user",
    discordMessageText));        String jsonInput = null;        try {            ObjectMapper
    mapper = new ObjectMapper();            Chat chat = Chat.builder()                .model(model)                .messages(messages)                .temperature(temperature)                .maxTokens(max_tokens)                .topP(top_p)                .frequencyPenalty(frequency_penalty)                .presencePenalty(presence_penalty)                .build();            jsonInput
    = mapper.writeValueAsString(chat);            System.out.println(jsonInput);        }
    catch (JsonProcessingException e) {            e.printStackTrace();        }        try
    {            URL url = new URL(endpoint);            HttpURLConnection connection
    = (HttpURLConnection) url.openConnection();            connection.setRequestMethod("POST");            connection.setRequestProperty("Content-Type",
    "application/json");            connection.setRequestProperty("Authorization",
    "Bearer " + openAIKey);            connection.setDoOutput(true);            OutputStream
    outputStream = connection.getOutputStream();            outputStream.write(jsonInput.getBytes());            outputStream.flush();            outputStream.close();            int
    responseCode = connection.getResponseCode();            if (responseCode == HttpURLConnection.HTTP_OK)
    {                BufferedReader reader = new BufferedReader(new InputStreamReader(connection.getInputStream()));                StringBuilder
    response = new StringBuilder();                String line;                while
    ((line = reader.readLine()) != null) {                    response.append(line);                }                reader.close();                //
    Print the response                answerFromChatGPT = extractAnswerFromJSON(response.toString());                System.out.println(answerFromChatGPT);            }
    else {                System.out.println("Error: " + responseCode);            }            connection.disconnect();        }
    catch (IOException e) {            e.printStackTrace();        }        return
    answerFromChatGPT;    }    //    // We are only interested in the "message.content"
    in the JSON response    // So here''s the easy way to extract that    //    public
    String extractAnswerFromJSON(String jsonResponse) {        String chatGPTAnswer
    = "";         try {            // Create an ObjectMapper instance            ObjectMapper
    objectMapper = new ObjectMapper();            // Parse the JSON string            JsonNode
    rootNode = objectMapper.readTree(jsonResponse);            // Extract the "content"
    parameter            JsonNode contentNode = rootNode.at("/choices/0/message/content");            chatGPTAnswer
    = contentNode.asText();            System.out.println("Content: " + chatGPTAnswer);        }
    catch (Exception e) {            e.printStackTrace();        }        return chatGPTAnswer;    }}Listing
    6-3'
  id: totrans-1009
  prefs: []
  type: TYPE_NORMAL
  zh: '在列表 [6-2](#PC2) 中，TechSupportBot.java 实例化了 ChatGPTClientForQAandModeration.java，该类（正如我们之前所述）与我们之前使用的
    ChatGPTClient 类非常相似。ChatGPTClientForQAandModeration.java 的完整源代码显示在列表 [6-3](#PC6)
    中。import com.fasterxml.jackson.core.JsonProcessingException;import com.fasterxml.jackson.databind.JsonNode;import
    com.fasterxml.jackson.databind.ObjectMapper;import java.io.BufferedReader;import
    java.io.IOException;import java.io.InputStreamReader;import java.io.OutputStream;import
    java.net.HttpURLConnection;import java.net.URL;import java.util.ArrayList;import
    java.util.List;public class ChatGPTClientForQAandModeration {    //    //  OpenAI
    参数，我们已知如何使用    //    String openAIKey = "";    String endpoint = "https://api.openai.com/v1/chat/completions";    String
    model = "gpt-4";    float temperature = 1.0f;    int max_tokens = 256;    float
    top_p = 1.0f;    int frequency_penalty = 0;    int presence_penalty = 0;    String
    systemMessage = null;    String initialInstructionsToChatGPT = null;    //    //
    构造函数需要传递来自 FAQ.txt 文件的内容以及系统消息    //    public ChatGPTClientForQAandModeration(String
    systemMessage, String initialInstructionsToChatGPT) {        this.systemMessage
    = systemMessage;        this.initialInstructionsToChatGPT = initialInstructionsToChatGPT;    }    public
    String sendMessageFromDiscordUser(String discordMessageText) {        String answerFromChatGPT
    = "";        List<Message> messages = new ArrayList<>();        messages.add(new
    Message("system", systemMessage));        messages.add(new Message("user", initialInstructionsToChatGPT));        messages.add(new
    Message("user", discordMessageText));        String jsonInput = null;        try
    {            ObjectMapper mapper = new ObjectMapper();            Chat chat =
    Chat.builder()                .model(model)                .messages(messages)                .temperature(temperature)                .maxTokens(max_tokens)                .topP(top_p)                .frequencyPenalty(frequency_penalty)                .presencePenalty(presence_penalty)                .build();            jsonInput
    = mapper.writeValueAsString(chat);            System.out.println(jsonInput);        }
    catch (JsonProcessingException e) {            e.printStackTrace();        }        try
    {            URL url = new URL(endpoint);            HttpURLConnection connection
    = (HttpURLConnection) url.openConnection();            connection.setRequestMethod("POST");            connection.setRequestProperty("Content-Type",
    "application/json");            connection.setRequestProperty("Authorization",
    "Bearer " + openAIKey);            connection.setDoOutput(true);            OutputStream
    outputStream = connection.getOutputStream();            outputStream.write(jsonInput.getBytes());            outputStream.flush();            outputStream.close();            int
    responseCode = connection.getResponseCode();            if (responseCode == HttpURLConnection.HTTP_OK)
    {                BufferedReader reader = new BufferedReader(new InputStreamReader(connection.getInputStream()));                StringBuilder
    response = new StringBuilder();                String line;                while
    ((line = reader.readLine()) != null) {                    response.append(line);                }                reader.close();                //
    打印响应                answerFromChatGPT = extractAnswerFromJSON(response.toString());                System.out.println(answerFromChatGPT);            }
    else {                System.out.println("Error: " + responseCode);            }            connection.disconnect();        }
    catch (IOException e) {            e.printStackTrace();        }        return
    answerFromChatGPT;    }    //    // 我们只对 JSON 响应中的 "message.content" 感兴趣    //
    所以这里有一个简单的方法来提取它    //    public String extractAnswerFromJSON(String jsonResponse)
    {        String chatGPTAnswer = "";         try {            // 创建 ObjectMapper
    实例            ObjectMapper objectMapper = new ObjectMapper();            // 解析
    JSON 字符串            JsonNode rootNode = objectMapper.readTree(jsonResponse);            //
    提取 "content" 参数            JsonNode contentNode = rootNode.at("/choices/0/message/content");            chatGPTAnswer
    = contentNode.asText();            System.out.println("Content: " + chatGPTAnswer);        }
    catch (Exception e) {            e.printStackTrace();        }        return chatGPTAnswer;    }}Listing
    6-3'
- en: ChatGPTClientForQAandModeration.java One of the most important things to note
    is that in the constructor, we are sending the full String of the contents of
    the frequently asked questions as well as the message that we’re going to be providing
    to the system itself.public ChatGPTClientForQAandModeration(String knowledgeBaseFileContents,
    String systemMessage) {        this.knowledgeBaseFileContents = knowledgeBaseFileContents;        this.systemMessage
    = systemMessage;    }
  id: totrans-1010
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPTClientForQAandModeration.java 需要注意的一个重要事项是，在构造函数中，我们发送了常见问题内容的完整字符串以及我们将提供给系统的消息本身.public
    ChatGPTClientForQAandModeration(String knowledgeBaseFileContents, String systemMessage)
    {        this.knowledgeBaseFileContents = knowledgeBaseFileContents;        this.systemMessage
    = systemMessage;    }
- en: This way, after we have constructed the ChatGPTClientForQAandModeration.java
    class, we can reuse the object already constructed in order to ask the individual
    questions from our users.
  id: totrans-1011
  prefs: []
  type: TYPE_NORMAL
  zh: 这样，在我们构建了 ChatGPTClientForQAandModeration.java 类之后，我们可以重用已经构建的对象来回答用户的单个问题。
- en: Every time a question has been posted on our Discord channel, TechSupportBot.java
    will call sendMessageFromDiscordUser() from ChatGPTClientForQAandModeration.java.
    In this method, we will perform all of the usual things necessary in order to
    invoke the Chat Endpoint.
  id: totrans-1012
  prefs: []
  type: TYPE_NORMAL
  zh: 每当在我们的 Discord 频道中发布一个问题，TechSupportBot.java 将会从 ChatGPTClientForQAandModeration.java
    调用 sendMessageFromDiscordUser() 方法。在这个方法中，我们将执行所有必要的常规操作，以调用 Chat 端点。
- en: Using JSONPath in Order to Extract Content Quickly in JSON Files
  id: totrans-1013
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 使用 JSONPath 快速从 JSON 文件中提取内容
- en: Sometimes, it can be a little messy writing the code necessary in order to extract
    a single node within a JSON file. Therefore, I wrote a simple method using JSONPath
    in order to extract the “message.content” node in the resulting JSON file returned
    by the Chat Endpoint. It’s all performed with this single line of code:JsonNode
    contentNode = rootNode.at("/choices/0/message/content");
  id: totrans-1014
  prefs: []
  type: TYPE_NORMAL
  zh: 有时，为了从 JSON 文件中提取单个节点，编写必要的代码可能会有些混乱。因此，我编写了一个简单的方法，使用 JSONPath 来提取由 Chat 端点返回的
    JSON 文件中的“message.content”节点。所有操作都通过这一行代码完成：JsonNode contentNode = rootNode.at("/choices/0/message/content");
- en: In my opinion, JSONPath is pretty efficient in order to extract a single node
    or group of nodes from within a JSON file, but the expressions themselves and
    the syntax necessary can be as daunting to read as regular expressions. So, if
    you’ve never used JSONPath before, or if you need help on how to write the expressions,
    then pair-program with ChatGPT!
  id: totrans-1015
  prefs: []
  type: TYPE_NORMAL
  zh: 在我看来，JSONPath 在从 JSON 文件中提取单个节点或节点组方面非常高效，但表达式本身以及必要的语法可能和正则表达式一样难以阅读。所以，如果你之前从未使用过
    JSONPath，或者需要帮助编写表达式，那么和 ChatGPT 进行结对编程吧！
- en: 'Running Our Intelligent Q&A Bot: TechSupportBot.java'
  id: totrans-1016
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 运行我们的智能问答机器人：TechSupportBot.java
- en: Now let’s run our new and improved Q&A Java Discord bot, TechSupportBot.java.
    After executing the app, be sure to return back to your Discord server, and start
    asking questions. Figure [6-1](#Fig1) shows the bot in action.![](../images/607613_1_En_6_Chapter/607613_1_En_6_Fig1_HTML.png)
  id: totrans-1017
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们运行我们新改进的问答 Java Discord 机器人，TechSupportBot.java。在执行应用程序后，请确保返回到您的 Discord
    服务器，并开始提问。图 [6-1](#Fig1) 展示了机器人的运行情况.![](../images/607613_1_En_6_Chapter/607613_1_En_6_Fig1_HTML.png)
- en: A screenshot of a Discord page with the Q and A channel open. Messages from
    Java Chat G P T and the Q and A bot are given in the conversation.
  id: totrans-1018
  prefs: []
  type: TYPE_NORMAL
  zh: 一张 Discord 页面截图，其中问答频道已打开。Java Chat G P T 和问答机器人的消息在对话中给出。
- en: Figure 6-1
  id: totrans-1019
  prefs: []
  type: TYPE_NORMAL
  zh: 图 6-1
- en: 'Having a Discussion with Our Intelligent DISCORD Q&A BOT, TechSupportBot.java
    Listing [6-4](#PC9) shows the conversation between us and the Discord Bot.**Me**:
    Hi, I''m new to this channel. What kind of questions can I ask?**Q and A Bot**:
    Hello! Welcome to our support channel. Here, you can ask us anything related to
    the Crooks Bank Mobile App, such as:1\. How to install and set up the app.2\.
    How to navigate through different features in the app, like making transactions,
    bill payments, depositing checks, etc.3\. Queries related to the safety and security
    of the app.4\. Help with troubleshooting if you''re facing any issues using our
    app.5\. Any questions related to fees associated with the app.Don''t hesitate
    to ask us anything else related to our services! We''re here to assist you.**Me:**
    I have an old Blackberry phone, is the app supported on my device?**Q and A Bot**:
    I''m sorry for the inconvenience, but at the moment, the Crooks Bank Mobile App
    is currently only available for iOS and Android devices. It is not supported on
    Blackberry or any other operating systems. You may still manage your bank accounts
    by accessing our website through your phone''s browser.**Me:** So, if I use an
    iPhone, how do I setup the app?**Q and A Bot**: Sure, here''s how you can set
    up the Crooks Bank Mobile App on your iPhone:1\. Open the App Store on your iPhone.2\.
    In the search bar at the top, type in "Crooks Bank Mobile App" and tap "Search".3\.
    Once you can see the app in the search results, simply tap on the "Get" button
    to download it.4\. After the app downloads, tap "Open".5\. You’ll have to agree
    to our Terms and Conditions upon the first launch.6\. If you''re an existing Crooks
    Bank member, you can log in using your online banking user ID and password. If
    you''re a new member, you''ll need to register for an account.7\. Once you''re
    logged in, you can set up Touch ID or Face ID for quicker, secure login in the
    future.8\. Now you can start using your Crooks Bank Mobile App to manage your
    finances, pay bills, make transactions, and more!Please make sure you update the
    app regularly to access new features and improvements. If you have any challenges
    during setup, please reach out to us through the app''s support feature or call
    our customer service.Listing 6-4'
  id: totrans-1020
  prefs: []
  type: TYPE_NORMAL
  zh: 与我们的智能 DISCORD 问答机器人 TechSupportBot.java 列表 [6-4](#PC9) 展示了我们与 Discord 机器人的对话。**我**：嗨，我是这个频道的新人。我能问些什么问题？**问答机器人**：你好！欢迎来到我们的支持频道。在这里，你可以问我们任何与
    Crooks 银行移动应用相关的问题，例如：1. 如何安装和设置应用。2. 如何在应用中浏览不同的功能，如进行交易、账单支付、支票存款等。3. 与应用的安全性和安全性相关的问题。4.
    如果你在使用我们的应用时遇到任何问题，我们可以提供帮助。5. 与应用相关的任何费用问题。不要犹豫，问我们任何与我们的服务相关的问题！我们在这里帮助你。**我**：我有一部旧的黑莓手机，这个应用支持我的设备吗？**问答机器人**：很抱歉给您带来不便，但目前
    Crooks 银行移动应用仅适用于 iOS 和 Android 设备。它不支持黑莓或其他操作系统。您可以通过手机浏览器访问我们的网站来管理您的银行账户。**我**：那么，如果我使用
    iPhone，我该如何设置这个应用？**问答机器人**：当然，以下是您如何在 iPhone 上设置 Crooks 银行移动应用的步骤：1. 打开 iPhone
    上的 App Store。2. 在顶部的搜索栏中，输入“Crooks 银行移动应用”并点击“搜索”。3. 一旦您在搜索结果中看到应用，只需点击“获取”按钮下载即可。4.
    应用下载完成后，点击“打开”。5. 在首次启动时，您需要同意我们的条款和条件。6. 如果您是 Crooks 银行的现有成员，可以使用您的在线银行用户 ID
    和密码登录。如果您是新成员，则需要注册一个账户。7. 登录后，您可以为将来更快、更安全地登录设置 Touch ID 或 Face ID。8. 现在，您可以使用
    Crooks 银行移动应用来管理您的财务、支付账单、进行交易等！请确保您定期更新应用以访问新功能和改进。如果在设置过程中遇到任何挑战，请通过应用的支持功能联系我们或拨打我们的客户服务电话。列表
    6-4
- en: Our First Conversation with the Intelligent Q&A Discord Bot
  id: totrans-1021
  prefs: []
  type: TYPE_NORMAL
  zh: 我们与智能问答 Discord 机器人的第一次对话
- en: We Have a Monumental Achievement… With One Slight Flaw
  id: totrans-1022
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 我们取得的巨大成就……但有一点小瑕疵
- en: 'OK, if you step back and examine what we have achieved so far, you should realize
    that we’re looking at what is nothing short of a monumental achievement. We have
    the following:'
  id: totrans-1023
  prefs: []
  type: TYPE_NORMAL
  zh: 好的，如果你退后一步审视我们迄今为止所取得的成就，你应该意识到我们所面对的简直是一项无与伦比的成就。我们有以下这些：
- en: A system made up of a few classes that allows users to type in questions and
    get answers about how to use our mobile application.
  id: totrans-1024
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 由几个类组成的系统，允许用户输入问题，并获取有关如何使用我们移动应用的问题和答案。
- en: Using a simple text file, we can teach our bot how to answer the questions from
    our users. This can be edited by anyone in the company and can be used as a knowledge
    base to help improve the intelligence of the bot day by day. This is amazing stuff.
  id: totrans-1025
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用一个简单的文本文件，我们可以教会我们的机器人如何回答用户的问题。这可以由公司中的任何人编辑，并可以用作知识库，以帮助机器人每天提高智能。这是了不起的事情。
- en: The system allows customers to type their questions using natural language,
    and the bot provides an intelligent answer back to them. Guess what? Customers
    don’t like reading FAQs - especially really long ones. However, using this system,
    they don’t need to! All they have to do is ask the question that is relevant to
    them.
  id: totrans-1026
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 系统允许客户使用自然语言输入问题，机器人会为他们提供智能回答。猜猜看？客户不喜欢阅读常见问题解答——尤其是特别长的那些。然而，使用这个系统，他们不需要这么做！他们只需提出与他们相关的问题即可。
- en: 'So, with all this that we have accomplished, there’s one GIGANTIC flaw that
    we can’t ignore. In Listing [6-4](#PC9), the bot said to the user:Once you''re
    logged in, you can set up Touch ID or Face ID for quicker, secure login in the
    future.No, no, no! Bad bot! In case you didn’t read the frequently asked questions
    file completely, please allow me to explain what went wrong here:'
  id: totrans-1027
  prefs: []
  type: TYPE_NORMAL
  zh: 所以，尽管我们已经取得了所有这些成就，但我们不能忽视一个巨大的缺陷。在列表[6-4](#PC9)中，机器人对用户说：“一旦您登录，您可以为未来的快速、安全登录设置Touch
    ID或Face ID。”不，不，不！坏机器人！如果您没有完全阅读常见问题解答文件，请允许我解释这里出了什么问题：
- en: '1.'
  id: totrans-1028
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '1.'
- en: The FAQ.txt file in Listing [6-1](#PC1) clearly states that the Crooks Bank
    mobile app is a mobile app. Currently, Touch ID can only be used on Apple desktop
    and laptop computers. So this doesn’t even make sense.
  id: totrans-1029
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 列表[6-1](#PC1)中的FAQ.txt文件明确指出Crooks Bank移动应用是一个移动应用。目前，Touch ID只能在苹果的桌面和笔记本电脑上使用。所以这甚至都不合理。
- en: '2.'
  id: totrans-1030
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '2.'
- en: The FAQ.txt file has no mention of Face ID for authentication to the mobile
    app at all.
  id: totrans-1031
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: FAQ.txt文件完全没有提到移动应用的身份验证中使用的Face ID。
- en: So unfortunately, ChatGPT is making up things that are simply not true and is
    assuming that certain features exist that are not present. So, for the purposes
    of true tech support, this is absolutely unacceptable.
  id: totrans-1032
  prefs: []
  type: TYPE_NORMAL
  zh: 所以，不幸的是，ChatGPT在编造一些根本不真实的事情，并假设某些功能存在，而实际上并不存在。因此，为了真正的技术支持，这是绝对不可接受的。
- en: So, how do we solve this? Think about how you could solve this problem for a
    second before reading the next section.
  id: totrans-1033
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，我们该如何解决这个问题？在阅读下一节之前，先思考一下你如何解决这个问题。
- en: Update the System Message to ChatGPT and Let’s Try Again
  id: totrans-1034
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 更新系统消息到ChatGPT并再次尝试
- en: 'Have you come up with a solution yet? One way to resolve this issue is to update
    the System Message. Refer to the following line in Listing [6-2](#PC2):static
    String systemMessage = "You are a virtual assistant that provides support for
    the Crooks Bank banking app. ";Remember that the System Message indicates to ChatGPT
    what it’s role is in the chat conversation. Right now it is told to be a helpful
    assistant, and therefore, it has taken the liberty in order to guess that certain
    features exist within the mobile application. Now, let’s ensure that ChatGPT does
    not provide any assumptions. Update the System Message to be as shown here:static
    String systemMessage = "You are a virtual assistant that provides support for
    the Crooks Bank banking app. You will be provided Information about the application,
    and users will ask you questions about the application. Your role is to answer
    questions explicitly from the training information. If you were not given an answer
    to a question, then provide an apologetic message to the user explaining that
    you do not know the answer.";And that’s it. The FAQ.txt file remains exactly the
    same as before, and all we needed to do is to update the System Message to let
    ChatGPT know it’s role in the conversation. Listing [6-5](#PC13) has the new conversation
    between us and the Discord bot.**Me**: How are you today?**Q and A Bot**: As a
    virtual assistant, I don''t have feelings or emotions, but I''m here and ready
    to assist you. How may I help you with the Crooks Bank Mobile App today?**Me:**
    I have an old Blackberry phone, is the app supported on my device?**Q and A Bot**:
    I''m sorry, but from the information provided, the Crooks Bank Mobile App can
    only be downloaded from the App Store for iOS devices and Google Play for Android
    devices. BlackBerry devices are not mentioned, therefore I cannot confirm that
    it would be compatible.**Me:** So, if I use an iPhone, how do I setup the app?**Q
    and A Bot**: To set up the Crooks Bank Mobile App on your iPhone, you can download
    it from the App Store. Simply search for "Crooks Bank Mobile App" and click the
    "Install" button. After the installation is finished, open the app and follow
    the prompts to set up your account. If you already have an account, use your login
    information to access your account through the app.Listing 6-5'
  id: totrans-1035
  prefs: []
  type: TYPE_NORMAL
  zh: 你已经想出解决方案了吗？解决这个问题的方法之一是更新系统消息。参考以下列表 [6-2](#PC2) 中的这一行：`static String systemMessage
    = "You are a virtual assistant that provides support for the Crooks Bank banking
    app. ";` 记住，系统消息会向 ChatGPT 指示其在聊天对话中的角色。目前它被指示成为一个有用的助手，因此它已经自行推测某些功能存在于移动应用程序中。现在，让我们确保
    ChatGPT 不会做出任何假设。将系统消息更新如下：`static String systemMessage = "You are a virtual assistant
    that provides support for the Crooks Bank banking app. You will be provided Information
    about the application, and users will ask you questions about the application.
    Your role is to answer questions explicitly from the training information. If
    you were not given an answer to a question, then provide an apologetic message
    to the user explaining that you do not know the answer.";` 这样就完成了。`FAQ.txt` 文件保持与之前完全相同，我们所需做的只是更新系统消息，让
    ChatGPT 知道它在对话中的角色。列表 [6-5](#PC13) 展示了我们与 Discord 机器人的新对话。**我**：你今天怎么样？**问答机器人**：作为一个虚拟助手，我没有感情或情绪，但我在这里，准备好帮助你。今天我能如何帮助你在
    Crooks Bank 移动应用程序上？**我**：我有一部旧的黑莓手机，这个应用程序在我的设备上支持吗？**问答机器人**：很抱歉，但根据提供的信息，Crooks
    Bank 移动应用程序只能从 App Store 下载用于 iOS 设备，从 Google Play 下载用于 Android 设备。没有提到黑莓设备，因此我无法确认它是否兼容。**我**：那么，如果我使用
    iPhone，我该如何设置应用程序？**问答机器人**：要在你的 iPhone 上设置 Crooks Bank 移动应用程序，你可以从 App Store
    下载。只需搜索“Crooks Bank 移动应用程序”并点击“安装”按钮。安装完成后，打开应用程序，按照提示设置您的账户。如果您已经有了账户，请使用您的登录信息通过应用程序访问您的账户。列表
    6-5
- en: Our Second and Better Conversation with the Intelligent Q&A Discord Bot
  id: totrans-1036
  prefs: []
  type: TYPE_NORMAL
  zh: 我们与智能问答 Discord 机器人的第二次更深入的对话
- en: Now that’s a lot better! Our Tech Support bot is “sticking to the script” and
    is not allowed to makeup or assume anything.
  id: totrans-1037
  prefs: []
  type: TYPE_NORMAL
  zh: 现在好多了！我们的技术支持机器人“坚持脚本”并且不允许编造或假设任何内容。
- en: Conclusion
  id: totrans-1038
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: In this chapter, we’ve accomplished a lot! We have a fully functioning Discord
    bot that can be trained by anyone without any experience in AI, NLP, or Machine
    Learning using a simple text file. We learned that a “helpful assistant” may at
    times become TOO HELPFUL and assume facts that are not true. However, we also
    reiterated the concept and the value of the System Message, which is an important
    part of Prompt Engineering.
  id: totrans-1039
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们取得了很大的成就！我们有一个完全功能齐全的 Discord 机器人，任何人都可以通过一个简单的文本文件来训练，而不需要任何 AI、NLP
    或机器学习的经验。我们了解到，“有用的助手”有时可能会变得过于有用，并假设一些不真实的事实。然而，我们也重申了系统消息的概念和价值，它是提示工程的重要组成部分。
- en: Now that we have made our Q&A Discord bot to be intelligent, now let’s find
    out how to make out Content Moderator bot to be intelligent as well!
  id: totrans-1040
  prefs: []
  type: TYPE_NORMAL
  zh: 既然我们已经使我们的问答 Discord 机器人变得智能，那么现在让我们来看看如何使内容审查机器人也变得智能！
