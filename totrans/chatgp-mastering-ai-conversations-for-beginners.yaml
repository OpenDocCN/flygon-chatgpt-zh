  prefs: []
  type: TYPE_NORMAL
  zh: '**因为这样，许多情绪研究人员认为同理心是一种能力，而不是一种情绪状态（伯克利大学，2023）。如果它是一种能力，那么这意味着它是我们需要积极努力去提高的东西。这正是ChatGPT发挥作用的地方，作为我们的非评判性、个性化的同理心训练师！让我们来看看我们可以如何使用ChatGPT通过复制真实世界的经验和特别定制的场景来发展我们的同理心。'
