    ****aud**i**en**ce**. ****A**** ****pr**o**m**pt** ****li****k**e** "****Wr**i**t**e**
    ****a**** ****5****0**0**-****wo****r**d** ****art**i**c**le** ****ab**o**u**t**
    ****t****h**e** ****ben**e**fi**ts** ****o****f**** ****medi**t**at**ion** ****f****o**r**
    ****begi**n**ne**rs**" ****i****s**** ****mu****c**h** ****mo****r**e** ****effe**c**ti**ve**
