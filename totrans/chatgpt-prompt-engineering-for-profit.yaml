    ****qua**lit**y ****a**nd** ****viab**ilit**y. ****I**f** ****y**ou** ****ne**ed**
    ****mo**re** ****exa**mple**s ****o**r** ****he**lp** ****app**lyin**g ****th**is**
    ****tech**niqu**e, ****I**** ****a**m** ****avai**labl**e ****t**o** ****he**lp**!'
  id: totrans-1380
  prefs: []
  type: TYPE_NORMAL
  zh: '**迭代头脑风暴**是生成、发展和在共同基础上完善创意想法的基本技巧，允许每个迭代将提案提升到更高水平的质量和可行性。如果您需要更多示例或帮助应用此技巧，我可以提供帮助！'
- en: '****2**5**. ****Pers**pectiv**e ****Swit**chin**g'
  id: totrans-1381
  prefs: []
  type: TYPE_NORMAL
  zh: '**25. 视角切换'
- en: '[****Wh**at** ****i**s** ]'
  id: totrans-1382
  prefs: []
  type: TYPE_NORMAL
  zh: '[**什么是**]'
- en: '****Pers**pectiv**e ****Swit**chin**g ****i**s** ****a**** ****pr**omp**t ****engi**neerin**g
    ****tech**niqu**e ****th**at** ****inv**olve**s ****as**kin**g ****t**he** ****L**LM**
    ****t**o** ****ana**lyz**e ****a**** ****pro**ble**m, ****id**ea**, ****o**r**
    ****situ**atio**n ****fr**om** ****mul**tipl**e ****diff**eren**t ****pers**pectiv**es.
    ****Th**is** ****tech**niqu**e ****al**low**s ****t**he** ****mo**del** ****t**o**
    ****app**roac**h ****a**** ****sub**jec**t ****i**n** ****a**** ****mo**re** ****compr**ehensi**ve
    ****a**nd** ****com**plet**e ****w**ay**, ****cons**iderin**g ****t**he** ****imp**act**s
    ****a**nd** ****vi**ews** ****o**f** ****diff**eren**t ****ac**tor**s ****inv**olve**d.'
  id: totrans-1383
  prefs: []
  type: TYPE_NORMAL
  zh: '**视角切换**是一种提示工程技巧，它涉及让LLM从多个不同的视角分析问题、想法或情况。这种技巧允许模型以更全面和完整的方式接近一个主题，考虑到不同参与者的影响和观点。'
- en: '****Exch**angin**g ****pers**pectiv**es ****he**lps** ****t**o** ****dev**elo**p
    ****emp**ath**y, ****t**o** ****be**tte**r ****unde**rstan**d ****t**he** ****con**tex**t
    ****a**nd** ****eff**ect**s ****o**f** ****a**n** ****is**sue** ****o**n** ****mul**tipl**e
    ****stak**eholde**rs, ****a**nd** ****t**o** ****ide**ntif**y ****pote**ntia**l
    ****conf**lict**s ****a**nd** ****conv**ergenc**es. ****I**t** ****i**s** ****espe**ciall**y
    ****us**efu**l ****wh**en** ****a**** ****ri**che**r, ****mo**re** ****multid**imension**al
    ****ana**lysi**s ****o**f** ****a**** ****pro**ble**m ****i**s** ****des**ire**d.'
  id: totrans-1384
  prefs: []
  type: TYPE_NORMAL
  zh: '**交换视角**有助于培养同理心，更好地理解一个议题对多个利益相关者的背景和影响，并识别潜在的冲突和趋同点。当需要更深入地分析问题时，这种方法尤其有用。'
- en: '[****Wh**at** ****i**s** ****yo**ur** ****ma**in** ****go**al** ?]'
  id: totrans-1385
  prefs: []
  type: TYPE_NORMAL
  zh: '[**你的主要目标是什么**？]'
- en: '****T**he** ****ma**in** ****go**al** ****o**f** ****Pers**pectiv**e ****Shi**ftin**g
    ****i**s** ****t**o** ****pro**vid**e ****a**** ****hol**isti**c ****vi**ew**
    ****o**f** ****a**** ****situ**atio**n, ****hel**pin**g ****t**he** ****us**er**
    ****unde**rstan**d ****h**ow** ****a**** ****dec**isio**n ****o**r** ****ev**ent**
    ****c**an** ****b**e** ****perc**eive**d ****a**nd** ****im**pac**t ****diff**eren**t
    ****par**tie**s. ****Th**is** ****tech**niqu**e ****pro**mote**s ****a**** ****br**oad**
    ****under**standi**ng ****o**f** ****com**ple**x ****con**text**s ****a**nd**
    ****he**lps** ****anti**cipat**e ****pote**ntia**l ****obst**acle**s ****o**r**
    ****oppor**tuniti**es ****th**at** ****mi**ght** ****n**ot** ****b**e** ****obv**iou**s
    ****fr**om** ****a**** ****si**ngl**e ****pers**pectiv**e.'
  id: totrans-1386
  prefs: []
  type: TYPE_NORMAL
  zh: '**视角转换**的主要目标是提供一个对情况的全面视角，帮助用户理解一个决策或事件如何被不同方面所感知和影响。'
- en: '****Ano**the**r ****go**al** ****i**s** ****t**o** ****en**abl**e ****a****
    ****mo**re** ****bal**ance**d ****a**nd** ****inf**orme**d ****ana**lysi**s, ****espe**ciall**y
    ****i**n** ****contr**oversi**al ****disc**ussion**s ****o**r** ****situ**ation**s
    ****invo**lvin**g ****mul**tipl**e ****stak**eholde**rs . ****Cons**iderin**g
    ****mul**tipl**e ****pers**pectiv**es ****le**ads** ****t**o** ****a**** ****fa**ire**r
    ****under**standi**ng ****a**nd** ****al**low**s ****f**or** ****t**he** ****cre**atio**n
    ****o**f** ****solu**tion**s ****th**at** ****me**et** ****t**he** ****inte**rest**s
    ****o**f** ****a**ll** ****inv**olve**d.'
  id: totrans-1387
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个目标是实现更加平衡和基于信息的分析，特别是在涉及多个利益相关者的争议性讨论或情境中。考虑多个视角有助于更公正地理解问题，并允许创造满足所有相关方利益的解决方案。
- en: '[****H**ow** ****i**t** ****wo**rks** ]'
  id: totrans-1388
  prefs: []
  type: TYPE_NORMAL
  zh: '[**它是如何工作的**]'
- en: '****Pers**pectiv**e ****Swit**chin**g ****wo**rks** ****b**y** ****as**kin**g
    ****t**he** ****L**LM** ****t**o** ****exp**lor**e ****a**n** ****is**sue** ****fr**om**
    ****sev**era**l ****diff**eren**t ****po**int**s ****o**f** ****vi**ew**. ****T**he**
    ****pr**omp**t ****of**ten** ****inc**lude**s ****inst**ructio**ns ****su**ch**
    ****a**s** “****Exp**lai**n ****th**is** ****fr**om** ****a**** ****scie**ntis**t’****s****
    ****pers**pectiv**e,” “****N**ow** ****lo**ok** ****a**t** ****i**t** ****fr**om**
    ****a**** ****con**sume**r’****s**** ****pers**pectiv**e,” ****o**r** “****H**ow**
    ****do**es** ****th**is** ****af**fec**t ****a**** ****poli**ticia**n?” ****Ea**ch**
    ****o**f** ****th**ese** ****inst**ructio**ns ****enco**urage**s ****t**he** ****mo**del**
    ****t**o** ****ta**ke** ****a**** ****n**ew** ****st**anc**e ****a**nd** ****ana**lyz**e
    ****t**he** ****is**sue** ****fr**om** ****t**he** ****pers**pectiv**e ****requ**este**d.'
  id: totrans-1389
  prefs: []
  type: TYPE_NORMAL
  zh: '**视角切换**通过让LLM探索从多个不同视角分析问题来工作。提示通常包括指令，例如“**从科学家的视角解释这一点**”，“**现在从消费者的视角来看**”或“**这如何影响政治家**？”这些指令鼓励模型采取新的立场并从所需视角分析问题。'
- en: '****F**or** ****exa**mpl**e, ****wh**en** ****disc**ussin**g “****T**he** ****Im**pac**t
    ****o**f** ****So**cia**l ****Me**dia** ****o**n** ****Soc**iet**y,” ****t**he**
    ****L**LM** ****m**ay** ****b**e** ****as**ked** ****t**o** ****ad**opt** ****diff**eren**t
    ****pers**pectiv**es: ****th**at** ****o**f** ****a**** ****tee**nage**r, ****a****
    ****psyc**hologi**st, ****a**** ****mark**etin**g ****ex**per**t, ****a**nd**
    ****a**** ****poli**cymake**r. ****I**n** ****th**is** ****w**ay**, ****ea**ch**
    ****pers**pectiv**e ****pro**vide**s ****a**** ****un**iqu**e ****an**gle** ****o**n**
    ****t**he** ****im**pac**t ****o**f** ****so**cia**l ****me**dia**, ****enri**chin**g
    ****t**he** ****us**er**’****s**** ****under**standi**ng ****o**f** ****t**he**
    ****to**pic**.'
  id: totrans-1390
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，当讨论“**社交媒体对社会的影响**”时，LLM可能被要求采取不同的视角：一个青少年的视角、一个心理学家的视角、一个营销专家的视角和一个政策制定者的视角。通过这种方式，每个视角都提供了对社交媒体影响的独特角度，从而丰富用户对该主题的理解。
- en: '****Th**is** ****app**roac**h ****i**s** ****effe**ctiv**e ****f**or** ****anal**yzin**g
    ****com**ple**x ****is**sue**s ****th**at** ****ha**ve** ****mul**tipl**e ****stak**eholde**rs,
    ****a**s** ****ea**ch** ****pers**pectiv**e ****m**ay** ****ha**ve** ****diff**eren**t
    ****con**cern**s, ****go**als**, ****a**nd** ****chal**lenge**s. ****T**he** ****tech**niqu**e
    ****ma**kes** ****i**t** ****ea**sie**r ****t**o** ****bu**ild** ****solu**tion**s
    ****th**at** ****a**re** ****mo**re** ****incl**usiv**e ****a**nd** ****tai**lore**d
    ****t**o** ****diff**eren**t ****ne**eds**.'
  id: totrans-1391
  prefs: []
  type: TYPE_NORMAL
  zh: 这种方法对于分析具有多个利益相关者的复杂问题非常有效，因为每个视角可能有不同的关注点、目标和挑战。这种技术使得构建更全面且针对不同需求定制的解决方案变得更容易。
- en: '[****Wh**en** ****t**o** ****u**se** ]'
  id: totrans-1392
  prefs: []
  type: TYPE_NORMAL
  zh: '[**何时使用**]'
- en: '****Pers**pectiv**e ****Swit**chin**g ****sh**oul**d ****b**e** ****us**ed**
    ****wh**en** ****y**ou** ****wa**nt** ****t**o** ****be**tte**r ****unde**rstan**d
    ****t**he** ****imp**act**s ****o**f** ****a**** ****situ**atio**n ****o**n**
    ****diff**eren**t ****pe**opl**e ****o**r** ****gr**oup**s. ****I**t** ****i**s**
    ****id**eal** ****f**or** ****expl**orin**g ****bus**ines**s ****pro**blem**s
    ****th**at** ****af**fec**t ****empl**oyee**s, ****cust**omer**s, ****a**nd**
    ****inve**stor**s ****diff**erentl**y, ****o**r** ****f**or** ****under**standi**ng
    ****pu**bli**c ****pol**icie**s ****th**at** ****ha**ve** ****diff**eren**t ****eff**ect**s
    ****o**n** ****diff**eren**t ****so**cia**l ****gr**oup**s.'
  id: totrans-1393
  prefs: []
  type: TYPE_NORMAL
  zh: '****当****你****想要****更好地****理解****一个****情况****对不同****人或****群体****的影响****时，****应****使用****视角****转换。****这对于****探索****影响****员工、****客户****和****投资者****不同****方式****的业务****问题****是****理想的，****或者****用于****理解****对不同****社会****群体****产生****不同****影响的****公共政策**。'
- en: '****Th**is** ****tech**niqu**e ****i**s** ****reco**mmende**d ****i**n** ****dec**isio**n-****ma**kin**g
    ****con**text**s, ****wh**ere** ****i**t** ****i**s** ****esse**ntia**l ****t**o**
    ****con**side**r ****a**ll** ****si**des** ****o**f** ****t**he** ****is**sue**
    ****t**o** ****en**sur**e ****th**at** ****t**he** ****dec**isio**n ****i**s**
    ****we**ll**-****fou**nde**d ****a**nd** ****do**es** ****n**ot** ****ha**ve**
    ****unex**pecte**d ****cons**equenc**es. ****I**t** ****i**s** ****al**so** ****ve**ry**
    ****us**efu**l ****i**n** ****im**pac**t ****ana**lysi**s ****a**nd** ****cr**isi**s
    ****mana**gemen**t, ****wh**ere** ****under**standi**ng ****t**he** ****reac**tion**s
    ****o**f** ****diff**eren**t ****stak**eholde**rs ****c**an** ****b**e** ****cru**cia**l.'
  id: totrans-1394
  prefs: []
  type: TYPE_NORMAL
  zh: '****这种****技术****在****决策****环境中****被****推荐****使用，****在这些****环境中，****考虑****问题的****所有****方面****对于****确保****决策****有****充分的****依据****并且****不会****产生****意外的****后果****至关重要。****它****在****影响****分析和****危机****管理****中也****非常有****用，****在这些****情况下，****理解****不同****利益相关者****的反应****可能是****至关****重要的**。'
- en: '****Furt**hermor**e, ****i**t** ****i**s** ****a**n** ****impo**rtan**t ****to**ol**
    ****f**or** ****tra**inin**g ****a**nd** ****educ**ationa**l ****con**text**s,
    ****hel**pin**g ****pe**opl**e ****dev**elo**p ****emp**ath**y ****a**nd** ****unde**rstan**d
    ****h**ow** ****t**he** ****sa**me** ****is**sue** ****c**an** ****b**e** ****perc**eive**d
    ****i**n** ****diff**eren**t ****wa**ys**.'
  id: totrans-1395
  prefs: []
  type: TYPE_NORMAL
  zh: '****此外，****它****还****是****一个****在****培训和****教育****环境中****非常重要的****工具，****帮助****人们****发展****同理心****并****理解****同一个****问题****可以从****不同的****角度****进行****理解**。'
- en: '[****Ti**ps** ****f**or** ****u**se**]'
  id: totrans-1396
  prefs: []
  type: TYPE_NORMAL
  zh: '[****使用****技巧****]'
- en: ● ****Cle**arl**y ****ide**ntif**y ****t**he** ****stak**eholde**rs ****wh**ose**
    ****pers**pectiv**es ****y**ou** ****wa**nt** ****t**o** ****exp**lor**e ****a**nd**
    ****de**fin**e ****th**eir** ****spe**cifi**c ****charac**teristi**cs. ****Th**is**
    ****wi**ll** ****he**lp** ****t**he** ****L**LM** ****t**o** ****add**res**s ****ea**ch**
    ****ro**le** ****mo**re** ****accu**ratel**y.
  id: totrans-1397
  prefs: []
  type: TYPE_NORMAL
  zh: ● ****清楚地****确定****你****想要****探索****其****观点****的利益相关者****，并****定义****他们的****具体****特征。****这将****帮助****LLM****更****准确地****针对****每个****角色**。
- en: ● ****U**se** ****mul**tipl**e ****iter**ation**s ****t**o** ****co**ver** ****a**ll**
    ****rel**evan**t ****an**gle**s. ****D**on**’****t**** ****ru**sh** ****t**o**
    ****g**et** ****t**he** ****an**swe**r; ****ea**ch** ****pers**pectiv**e ****c**an**
    ****re**vea**l ****impo**rtan**t ****nua**nce**s ****th**at** ****he**lp** ****sh**ape**
    ****t**he** ****sol**utio**n.
  id: totrans-1398
  prefs: []
  type: TYPE_NORMAL
  zh: ● ****使用****多次****迭代****来****涵盖****所有****相关的****角度。****不要****急于****得到****答案；****每个****观点****都可能****揭示****对****解决问题****有帮助****的重要****细节**。
- en: '[****T**he** ****diff**erenc**e ****i**n** ****tech**niqu**e ]'
  id: totrans-1399
  prefs: []
  type: TYPE_NORMAL
  zh: '[****技术****差异****]'
- en: '****Pers**pectiv**e ****Swit**chin**g ****dif**fer**s ****fr**om** ****Ro**le**
    ****Rev**ersa**l ****Prom**ptin**g ****bec**aus**e, ****wh**ile** ****Ro**le**
    ****Rev**ersa**l ****dir**ectl**y ****exp**lore**s ****a**** ****si**ngl**e ****opp**osin**g
    ****pers**pectiv**e, ****Pers**pectiv**e ****Swit**chin**g ****ai**ms** ****t**o**
    ****exp**lor**e ****mul**tipl**e ****inde**penden**t ****vi**ews** ****o**n**
    ****t**he** ****sa**me** ****is**sue**. ****Ro**le** ****Rev**ersa**l ****c**an**
    ****b**e** ****lim**ite**d ****t**o** ****t**wo** ****opp**osin**g ****vi**ews**,
    ****wh**ile** ****Pers**pectiv**e ****Swit**chin**g ****foc**use**s ****o**n**
    ****a**** ****dive**rsit**y ****o**f** ****view**point**s.'
  id: totrans-1400
  prefs: []
  type: TYPE_NORMAL
  zh: '**视角切换**与**角色反转提示**不同，因为，虽然**角色反转提示**直接探索一个对立的视角，**视角切换**旨在探索关于同一问题的多个独立观点。**角色反转提示**可能局限于两个对立的观点，而**视角切换**则专注于观点的多样性。'
- en: '****Rega**rdin**g ****Cons**ensu**s ****Bui**ldin**g ****Prom**ptin**g , ****wh**ich**
    ****se**eks** ****t**o** ****fi**nd** ****a**** ****mi**ddl**e ****gr**oun**d
    ****o**r** ****a**** ****cons**ensu**s ****bet**wee**n ****diff**eren**t ****par**tie**s,
    ****Pers**pectiv**e ****Swit**chin**g ****ai**ms** ****t**o** ****si**mpl**y ****exp**lor**e
    ****ea**ch** ****vi**ew** ****sepa**ratel**y, ****wit**hou**t ****nece**ssaril**y
    ****tr**yin**g ****t**o** ****un**ite** ****th**em** ****in**to** ****a**** ****si**ngl**e
    ****sol**utio**n. ****I**t** ****i**s** ****ab**out** ****under**standi**ng ****h**ow**
    ****ea**ch** ****pa**rty** ****perc**eive**s ****t**he** ****situ**atio**n, ****a**nd**
    ****n**ot** ****nece**ssaril**y ****rea**chin**g ****a**n** ****agre**emen**t.'
  id: totrans-1401
  prefs: []
  type: TYPE_NORMAL
  zh: 关于**共识构建提示**，它试图找到一个中间立场或不同党派之间的共识，**视角切换**旨在简单地分别探索每个观点，而不必尝试将它们统一成一个单一的解决方案。它关于理解每个党派如何感知情况，而不必
    necessarily 达成一致。
- en: '****Com**pare**d ****t**o** ****De**vil**''****s**** ****Adv**ocat**e ****Prom**ptin**g
    , ****wh**ich** ****chal**lenge**s ****a**** ****spe**cifi**c ****arg**umen**t,
    ****Pers**pectiv**e ****Swit**chin**g ****i**s** ****mo**re** ****ab**out** ****under**standi**ng
    ****mul**tipl**e ****vi**ews** ****o**f** ****t**he** ****is**sue**, ****ra**the**r
    ****th**an** ****coun**terin**g ****a**** ****spe**cifi**c ****po**int**. ****T**he**
    ****fo**cus** ****i**s** ****o**n** ****dive**rsit**y ****o**f** ****perc**eption**s,
    ****n**ot** ****o**n** ****crit**icizin**g ****o**r** ****ref**utin**g ****a**n**
    ****arg**umen**t.'
  id: totrans-1402
  prefs: []
  type: TYPE_NORMAL
  zh: 与**魔鬼的辩护者提示**相比，后者挑战一个特定的论点，**视角切换**更侧重于理解关于该问题的多个观点，而不是反驳一个特定的论点。重点是感知的多样性，而不是批评或反驳一个论点。
