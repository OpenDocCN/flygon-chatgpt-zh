  id: totrans-1476
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 最终应用程序测试完成。
- en: App store metadata optimized.
  id: totrans-1477
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 应用商店元数据优化。
- en: Marketing materials ready (e.g., social posts, emails, press releases).
  id: totrans-1478
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 营销材料准备就绪（例如，社交媒体帖子、电子邮件、新闻稿）。
- en: Analytics tools set up for tracking performance.
  id: totrans-1479
  prefs:
