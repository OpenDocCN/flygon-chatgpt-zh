  type: TYPE_NORMAL
  zh: '**使用 Seaborn 的条形图**'
- en: Seaborn provides a higher-level interface for Matplotlib, making the creation
    of stylish plots more accessible. A bar plot helps us visualize data across different
    categories. Plotting bar charts allows us to visualize categorical data.
  id: totrans-3149
  prefs: []
  type: TYPE_NORMAL
  zh: Seaborn为Matplotlib提供了一个高级接口，使得创建时尚的图表更加容易。柱状图帮助我们可视化不同类别之间的数据。绘制柱状图使我们能够可视化分类数据。
