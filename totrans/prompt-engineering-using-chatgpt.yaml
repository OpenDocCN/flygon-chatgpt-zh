- en: INTRODUCTION
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: 引言
- en: In the rapidly evolving landscape of artificial intelligence (AI), ChatGPT has
    emerged as a powerhouse, offering unprecedented capabilities in generating human-like
    text and speech. As AI becomes an integral part of various domains, understanding
    how to effectively craft prompts for ChatGPT is essential to unlock its full potential
    and achieve desired outcomes.
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 在人工智能（AI）快速发展的领域中，ChatGPT已经崛起为一个强大的工具，提供了生成类似人类文本和语音的空前能力。随着AI成为各个领域的组成部分，了解如何有效地为ChatGPT构建提示对于释放其全部潜力并实现预期结果至关重要。
- en: At the heart of this exploration lies the recognition that well-written prompts
    can ensure seamless communication with ChatGPT. Drawing a parallel to the role
    of a skilled pilot skillfully guiding an aircraft through the skies, well-constructed
    prompts take on the critical task of steering and shaping the trajectory of responses
    crafted by ChatGPT.
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 在这次探索的核心是认识到，精心编写的提示可以确保与ChatGPT的无缝沟通。将熟练的飞行员巧妙地引导飞机穿越天空的角色进行类比，精心构建的提示承担着引导和塑造ChatGPT构建的响应轨迹的关键任务。
- en: ChatGPT is a well-trained mathematical model at the forefront of conversational
    AI. At its core, it relies on the next-token mathematical model, a fundamental
    framework that underpins its remarkable conversational abilities. Operating on
    the principles of probability and deep learning, this model has been meticulously
    trained on an extensive and diverse dataset. It excels at comprehending the intricacies
    of language, allowing it to analyze the context and generate responses with remarkable
    coherence and relevance. When presented with a user’s input, it deploys intricate
    algorithms to predict the most likely next word or token, resulting in responses
    that not only feel natural, but are also tailored to the ongoing conversation.
    This mathematical foundation empowers ChatGPT to excel in a wide array of conversational
    contexts, providing users with an exceptional conversational experience that is
    coherent, contextually aware, and highly adaptable.
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT是一个在对话式AI前沿经过良好训练的数学模型。在其核心，它依赖于下一个标记的数学模型，这是一个支撑其非凡对话能力的根本框架。基于概率和深度学习的原则，这个模型在广泛且多样化的数据集上进行了精心训练。它擅长理解语言的复杂性，允许它分析上下文并生成具有非凡一致性和相关性的响应。当面对用户的输入时，它部署复杂的算法来预测最可能的下一个单词或标记，从而产生既自然又符合当前对话的响应。这个数学基础使ChatGPT能够在广泛的对话环境中表现出色，为用户提供一致、上下文感知且高度适应的卓越对话体验。
- en: Prompt engineering is the beginning of the journey into the art and science
    of shaping interactions with this cutting-edge AI language model. This book is
    your guide to mastering this orchestration, understanding the nuances of prompts,
    and harnessing their power for a wide array of applications. As we embark on this
    journey, we will uncover the intricacies of prompt engineering, delve into the
    psychology of effective communication, and discover how to make ChatGPT’s responses
    align with specific objectives. There are many possibilities, from refining the
    phrasing of a question to imbuing context into a conversation.
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 提示工程是进入塑造与这一前沿AI语言模型互动的艺术和科学的旅程的开始。这本书是您掌握这种协调、理解提示的细微差别以及利用它们的力量为各种应用提供指导。在我们踏上这段旅程时，我们将揭示提示工程的复杂性，深入研究有效沟通的心理，并发现如何使ChatGPT的响应与特定目标一致。可能性有很多，从完善问题的措辞到将上下文融入对话。
- en: Adding to this is the revolutionary emergence of GPT App Builders, platforms
    enabling individuals and organizations to design custom applications powered by
    the linguistic capabilities of GPT. These builders offer a user-friendly interface
    to create, experiment, and deploy applications tailored to specific needs or industries.
    By incorporating GPT App Builders, we can refine the conversation and revolutionize
    the application of conversational AI in various sectors. They serve as the bridge
    between technical prowess and practical application, making it possible for anyone,
    from developers to business and technical leaders, to create personalized AI-driven
    solutions.
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 除了这一点，还有GPT App Builders的革命性出现，这是一个使个人和组织能够设计由GPT的语言能力驱动的定制应用的平台。这些构建者提供了一个用户友好的界面来创建、实验和部署针对特定需求或行业的应用。通过整合GPT
    App Builders，我们可以完善对话并革命性地改变各种领域对话式AI的应用。它们是技术实力和实际应用之间的桥梁，使得从开发者到商业和技术领导者，任何人都可以创建个性化的AI驱动解决方案。
- en: Join us in unraveling the art of prompt engineering, a skill that empowers us
    to bridge the gap between human thought and AI-generated text, and to create a
    harmonious partnership that transforms the way we interact with technology.
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 加入我们，一起揭开提示工程的艺术，这是一种技能，它赋予我们连接人类思维和AI生成文本之间的差距，并创造一种和谐的合作关系，改变我们与技术互动的方式。
- en: Figure I.1 shows the relationships among AI, NLP, and other subfields.
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: 图I.1展示了AI、NLP和其他子领域之间的关系。
- en: '![](image/Fig_I_1.jpg)'
  id: totrans-186
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image/Fig_I_1.jpg)'
- en: FIGURE I.1 A flowchart showing AI and its subfields.
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: 图I.1展示AI及其子领域关系的流程图。
- en: HISTORY OF LLM AND GPT
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: LLM和GPT的历史
- en: Language Models (LMs) and Large Language Models (LLMs) like GPT (Generative
    Pre-trained Transformer) have revolutionized the field of natural language processing
    (NLP) and data science. The history of LLMs can be traced back to the early days
    of machine learning and artificial intelligence, where researchers began exploring
    methods to teach machines to understand and generate human language. Early attempts,
    such as rule-based systems and statistical language models, had limitations in
    capturing the nuances and complexities of human language.
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: 语言模型（LMs）和大型语言模型（LLMs）如GPT（生成预训练变换器）已经彻底改变了自然语言处理（NLP）和数据科学领域。LLMs的历史可以追溯到机器学习和人工智能的早期，当时研究人员开始探索教授机器理解和生成人类语言的方法。早期的尝试，如基于规则的系统和统计语言模型，在捕捉人类语言的细微差别和复杂性方面存在局限性。
- en: The breakthroughs in LLMs came in the form of deep learning and neural networks.
    The concept of pre-training, where models learn from vast amounts of text data
    before fine-tuning on specific tasks, became pivotal. In 2018, OpenAI introduced
    the first GPT model, GPT-1\. This model, with 117 million parameters, showed the
    potential of pre-trained language models for various NLP tasks. It laid the foundation
    for subsequent advancements. GPT-3, developed by OpenAI, made headlines in 2020
    for its astonishing ability to generate coherent and contextually relevant text.
    It achieved this by leveraging a massive transformer architecture with 175 billion
    parameters, allowing it to capture intricate patterns and associations within
    language. In 2023, OpenAI released GPT-4, which was trained on 1.76 trillion parameters,
    making it the most advanced system to date.
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: LLMs的突破是以深度学习和神经网络的形式出现的。预训练的概念，即模型在特定任务上进行微调之前，从大量文本数据中学习，变得至关重要。2018年，OpenAI推出了第一个GPT模型，GPT-1。这个拥有1.17亿个参数的模型展示了预训练语言模型在各个自然语言处理（NLP）任务中的潜力。它为后续的进步奠定了基础。OpenAI开发的GPT-3在2020年因其惊人的生成连贯且上下文相关的文本的能力而成为头条新闻。它通过利用具有1750亿个参数的巨大Transformer架构来实现这一点，使其能够捕捉语言中的复杂模式和关联。2023年，OpenAI发布了GPT-4，该模型在1.76万亿个参数上进行训练，使其成为迄今为止最先进的系统。
- en: Since then, the field has continued to evolve. Researchers are exploring ways
    to make LLMs more efficient, ethical, and applicable across various domains. Additionally,
    LLMs are being employed in diverse applications, including engineering and manufacturing,
    healthcare, content generation, education, and natural language understanding
    in virtual assistants. The list of applications is growing as time goes by, complemented
    with plugins for GPT-4 and multimodal models.
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: 从那时起，该领域一直在持续发展。研究人员正在探索使大型语言模型（LLMs）更加高效、道德，并适用于各个领域的方法。此外，LLMs正在被应用于各种领域，包括工程和制造、医疗保健、内容生成、教育和虚拟助手中的自然语言理解。随着时间的推移，应用列表不断增长，并伴随着GPT-4插件和多模态模型。
- en: For the latest information on LLMs and GPT technologies, readers can refer to
    recent publications in top-tier conferences such as the Conference on Neural Information
    Processing Systems (NeurIPS) and the International Conference on Machine Learning
    (ICML). These conferences feature cutting-edge research in the field and provide
    insights into the latest advancements in LLM technology.
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: 想要了解关于LLMs和GPT技术的最新信息，读者可以参考顶级会议的最新出版物，如神经信息处理系统会议（NeurIPS）和国际机器学习会议（ICML）。这些会议展示了该领域的尖端研究，并提供了关于LLM技术最新进展的见解。
- en: ABOUT THE AUTHOR
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: '**关于作者**'
- en: Dr. Mehrzad Tabatabaian is a faculty member at the Mechanical Engineering Department,
    School of Energy at the British Columbia Institute of Technology (BCIT). He has
    several years of teaching and industry experience. Dr. Tabatabaian is currently
    Chair of the BCIT School of Energy Research Committee. He has published several
    papers in scientific journals and for conferences and has written textbooks on
    Multiphysics and turbulent flow modelling, advanced thermodynamics, tensor analysis,
    direct energy conversion, the Bond Graph modelling method, and calculus. He holds
    several registered patents in the energy field, the results of years of research
    activities.
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: Mehrzad Tabatabaian博士是加拿大不列颠哥伦比亚理工学院（BCIT）能源学院机械工程系的一名教师。他拥有多年的教学和行业经验。Tabatabaian博士目前是BCIT能源研究委员会主席。他在科学期刊和会议上发表了多篇论文，并撰写了关于多物理场和湍流流动建模、高级热力学、张量分析、直接能量转换、邦图建模方法和微积分的教科书。他在能源领域拥有多项注册专利，这些专利是他多年研究活动的成果。
- en: Dr. Tabatabaian volunteered to help establish the Energy Efficiency and Renewable
    Energy Division (EERED), a new division at Engineers and Geoscientists British
    Columbia (EGBC).
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: Tabatabaian 博士自愿帮助建立能源效率和可再生能源部（EERED），这是工程师和地球科学家不列颠哥伦比亚省（EGBC）的一个新部门。
- en: Dr. Tabatabaian received his BEng from Sharif University of Technology (formerly
    AUT) and holds advanced degrees from McGill University (MEng and PhD). He has
    been an active academic, professor, and engineer in leading alternative energy,
    oil, and gas industries. Dr. Tabatabaian also has a Leadership Certificate from
    the University of Alberta and holds an EGBC P.Eng. License.
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
  zh: Tabatabaian 博士在 Sharif 工程技术大学（原名 AUT）获得学士学位，并在麦吉尔大学（MEng 和 PhD）获得高级学位。他一直活跃在领先的替代能源、石油和天然气行业，担任学术、教授和工程师。Tabatabaian
    博士还拥有阿尔伯塔大学的领导力证书，并持有 EGBC P.Eng. 许可证。
- en: CHAPTER 1
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: 第一章
- en: FOUNDATIONS OF PROMPTS
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: 提示词的基础
- en: Prompts are the guides that reveal the potential of ChatGPT/GPT, shaping its
    responses and steering conversations. This chapter provides an introduction to
    effective prompt engineering, delving into the fundamental principles that underpin
    the art of crafting prompts to elicit the desired outputs.
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: 提示词是揭示 ChatGPT/GPT 潜力的指南，塑造其回答并引导对话。本章介绍了有效的提示词工程，深入探讨了支撑提示词艺术的基本原则，这些原则有助于产生期望的输出。
- en: 1.1 THE ROLE OF PROMPTS IN INTERACTING WITH CHATGPT
  id: totrans-200
  prefs: []
  type: TYPE_NORMAL
  zh: 1.1 与 CHATGPT 交互中提示词的作用
- en: Prompts enhance AI-generated interactions, influencing the nature and quality
    of the responses. Understanding prompts as the input mechanism for ChatGPT is
    essential. We explore the intricacies of how prompts influence model behavior,
    emphasizing their significance in initiating meaningful dialogues.
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
  zh: 提示词增强了 AI 生成的交互，影响了回答的性质和质量。理解提示词作为 ChatGPT 的输入机制至关重要。我们探讨了提示词如何影响模型行为，强调了它们在启动有意义的对话中的重要性。
- en: 1.2 ANATOMY OF A WELL-CONSTRUCTED PROMPT
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
  zh: 1.2 构建良好提示词的解剖结构
- en: Effective prompts are crafted with precision, and their structure plays a pivotal
    role in yielding accurate and relevant responses. We delve into the components
    of a well-constructed prompt, from the initial query to the inclusion of context
    and any specific guidelines. Understanding these elements enhances the efficacy
    of prompt engineering.
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: 有效的提示词是精心制作的，其结构在产生准确和相关的回答中起着关键作用。我们深入探讨了一个构建良好的提示词的组成部分，从初始查询到包含上下文和任何具体指南。理解这些元素提高了提示词工程的效率。
- en: The Essence of Clarity and Specificity
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
  zh: 清晰性和具体性的本质
- en: 'A well-constructed prompt must possess clarity and specificity. There should
    be no ambiguity in the text, guiding the LLM toward the desired outcome. Consider
    this example: “Tell me about engineering.” This vague prompt is like sending an
    LLM on a journey without a map; the result is a rambling, unstructured response.
    Contrast this with a well-crafted prompt like “Provide an overview of the mechanical
    engineering discipline.” This specific prompt narrows the LLM’s focus, enabling
    it to produce a concise and informative response.'
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
  zh: 一个构建良好的提示词必须具备清晰性和具体性。文本中不应存在歧义，应引导 LLM 向期望的结果发展。考虑以下例子：“告诉我关于工程的事情。”这个模糊的提示就像在没有地图的情况下让
    LLM 去旅行；结果是漫无目的、无结构的回答。与此相对的是，一个精心设计的提示，如“提供机械工程学科的概述。”这个具体的提示缩小了 LLM 的关注点，使其能够产生简洁且信息丰富的回答。
- en: Harnessing the Power of Context
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: 利用上下文的力量
- en: Context is very important in prompt engineering. A well-constructed prompt should
    leverage context to its advantage. For instance, compare the prompts “Explain
    the theory of relativity” and “Given the context of physics, explain the theory
    of relativity.” The latter, by explicitly providing context, guides the LLM to
    generate a response that aligns with the field of physics, leading to a more relevant
    and accurate answer.
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
  zh: 上下文在提示词工程中非常重要。一个构建良好的提示词应该利用上下文的优势。例如，比较以下提示：“解释相对论的理论”和“在物理学的背景下解释相对论的理论。”后者通过明确提供上下文，引导
    LLM 生成与物理学领域相符的回答，从而得到更相关和准确的答案。
- en: Avoiding Leading or Biased Language
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
  zh: 避免引导性或偏见语言
- en: A pitfall to avoid in prompt engineering is the use of leading or biased language.
    Effective prompts maintain neutrality to obtain unbiased responses. For example,
    consider the prompts “Why are renewable energy sources superior to fossil fuels?”
    and “Compare the advantages and disadvantages of renewable energy sources and
    fossil fuels.” The first prompt subtly suggests a bias towards renewable energy,
    while the second one maintains a neutral stance, prompting a balanced response.
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
  zh: 在提示工程中需要避免的一个陷阱是使用引导性或带有偏见的语言。有效的提示应保持中立以获得无偏见的回应。例如，考虑以下提示：“可再生能源为什么比化石燃料优越？”和“比较可再生能源和化石燃料的优缺点。”第一个提示微妙地暗示了对可再生能源的偏见，而第二个提示则保持中立立场，促使得到平衡的回应。
- en: In essence, the anatomy of a well-constructed prompt hinges on clarity, specificity,
    context, and neutrality. By mastering these principles, we empower ourselves to
    navigate the vast landscape of possibilities that LLMs offer, ultimately elevating
    our interactions and enhancing our ability to extract meaningful insights.
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: 从本质上讲，一个良好构建的提示的结构取决于清晰度、具体性、上下文和中立性。通过掌握这些原则，我们能够驾驭LLM（大型语言模型）提供的广阔可能性领域，最终提升我们的互动并增强提取有意义的见解的能力。
- en: 1.3 EXPLORING DIFFERENT PROMPT STYLES
  id: totrans-211
  prefs: []
  type: TYPE_NORMAL
  zh: 1.3 探索不同的提示风格
- en: Prompt engineering is an art that goes beyond mere syntax; it encompasses style,
    tone, and structure. The choice of prompt style can significantly impact the outcome
    of interactions with LLMs such as ChatGPT3.5 and GPT-4\. In this section, we delve
    into diverse prompt styles, each with its unique strengths and applications. The
    practical examples of prompts in this chapter were developed using insights from
    recent applications of ChatGPT.
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
  zh: 提示工程是一种超越语法本身的技艺；它包括风格、语气和结构。提示风格的选择可以显著影响与LLM（如ChatGPT3.5和GPT-4）的交互结果。在本节中，我们将深入探讨不同的提示风格，每种风格都有其独特的优势和用途。本章中提示的实用示例是利用ChatGPT最近应用中的见解开发的。
- en: 'Interrogative Prompts: Seeking Direct Answers'
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
  zh: 询问式提示：寻求直接答案
- en: Interrogative prompts are question-based and are highly effective when you seek
    precise, direct responses. They frame the input as a query, prompting the LLM
    to answer concisely. For example, “What are the main components of a cell?” or
    “Can you explain the concept of blockchain technology?” Interrogative prompts
    establish a clear expectation for informative, to-the-point responses, making
    them valuable in educational contexts and information retrieval tasks.
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
  zh: 询问式提示是基于问题的，当你寻求精确、直接的回应时非常有效。它们将输入作为查询，促使LLM简洁地回答。例如，“细胞的主要组成部分是什么？”或“你能解释区块链技术的概念吗？”询问式提示为信息丰富、直接了当的回应设定了明确的期望，在教育环境和信息检索任务中非常有价值。
- en: 'Imperative Prompts: Issuing Commands'
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
  zh: 命令式提示：发布命令
- en: Imperative prompts are directive and instructive. They are used when you want
    the LLM to perform a specific action or generate content according to a set of
    guidelines. For instance, “Summarize the key findings of this research paper”
    or “Write a creative story about a time traveler.” Imperative prompts empower
    the user with control, directing the LLM’s output toward a predefined objective.
    These prompts are instrumental in content generation tasks and automating repetitive
    writing tasks.
  id: totrans-216
  prefs: []
  type: TYPE_NORMAL
  zh: 命令式提示是指导性和指示性的。当你希望LLM执行特定操作或根据一系列指南生成内容时使用。例如，“总结这篇研究论文的关键发现”或“写一个关于时间旅行者的创意故事。”命令式提示赋予用户控制权，将LLM的输出引导到预定义的目标。这些提示在内容生成任务和自动化重复写作任务中非常有用。
- en: 'Declarative Prompts: Providing Context or Information'
  id: totrans-217
  prefs: []
  type: TYPE_NORMAL
  zh: 陈述式提示：提供上下文或信息
- en: Declarative prompts are informative and provide context or background information.
    They can be especially useful when you want to guide the LLM with a specific context.
    For example, “In the context of environmental science, discuss the impact of deforestation”
    or “Given the history of the Roman Empire, analyze its fall.” Declarative prompts
    help the LLM understand the context and generate content that aligns with it,
    facilitating more informed and context-aware responses.
  id: totrans-218
  prefs: []
  type: TYPE_NORMAL
  zh: 陈述式提示是信息性的，提供上下文或背景信息。当你想用特定上下文引导LLM时，它们特别有用。例如，“在环境科学背景下，讨论森林砍伐的影响”或“鉴于罗马帝国的历史，分析其衰落。”陈述式提示帮助LLM理解上下文，并生成与之相符的内容，从而促进更信息丰富和上下文感知的回应。
- en: 'Conversational Prompts: Fostering Dialogue'
  id: totrans-219
  prefs: []
  type: TYPE_NORMAL
  zh: 对话式提示：促进对话
- en: Conversational prompts are designed to initiate and sustain a natural, interactive
    conversation with the LLM. They often include cues like “Hello” or “Tell me more
    about” to encourage the model to engage in a back-and-forth dialogue. For example,
    “Hello, can you help me understand quantum physics?” or “Tell me more about your
    thoughts on climate change.” Conversational prompts are key to creating engaging
    chatbots and virtual assistants that mimic human conversation.
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
  zh: 对话式提示旨在启动并维持与LLM的自然、互动对话。它们通常包括诸如“你好”或“告诉我更多关于”等提示，以鼓励模型参与来回对话。例如，“你好，你能帮我理解量子物理吗？”或“告诉我更多关于你对气候变化的看法。”对话式提示对于创建模拟人类对话的引人入胜的聊天机器人和虚拟助手至关重要。
- en: In conclusion, understanding different prompt styles is essential for effectively
    engaging with LLMs across various applications. The choice of prompt style should
    align with your goals and the nature of the task. By mastering the art of prompt
    style selection, you can unlock the full potential of prompt engineering and enhance
    the quality of interactions with LLMs.
  id: totrans-221
  prefs: []
  type: TYPE_NORMAL
  zh: 总之，理解不同的提示风格对于有效地与LLM在各种应用中进行交互至关重要。提示风格的选择应与你的目标和任务性质相一致。通过掌握提示风格选择的艺术，你可以充分发挥提示工程的优势，并提高与LLM交互的质量。
- en: 1.4 PROMPT EXAMPLES AND ANALYSIS
  id: totrans-222
  prefs: []
  type: TYPE_NORMAL
  zh: 1.4 提示示例与分析
- en: Crafting effective prompts is an art that requires precision and creativity.
    In this section, we explore a range of prompt examples, each tailored to specific
    domains, including engineering, to highlight the nuances and strategies behind
    their construction. These examples are grounded in the latest research and practical
    insights to illustrate the diversity of prompt styles and applications.
  id: totrans-223
  prefs: []
  type: TYPE_NORMAL
  zh: 设计有效的提示是一项需要精确性和创造力的艺术。在本节中，我们探讨了各种提示示例，每个示例都针对特定领域定制，包括工程领域，以突出其构建背后的细微差别和策略。这些示例基于最新的研究和实际见解，以展示提示风格的多样性和应用。
- en: Engineering and Technical Fields
  id: totrans-224
  prefs: []
  type: TYPE_NORMAL
  zh: 工程和技术领域
- en: 'EXAMPLE 1: “Explain the principles of aerodynamics governing the lift and drag
    forces in the context of aircraft design.”'
  id: totrans-225
  prefs: []
  type: TYPE_NORMAL
  zh: 示例1：“在飞机设计背景下，解释控制升力和阻力的空气动力学原理。”
- en: 'Analysis: This prompt exemplifies the use of declarative style in the context
    of technical fields. It provides specific context (“in the context of aircraft
    design”) and a clear directive, asking the LLM to explain the principles of aerodynamics
    related to lift and drag forces. Such prompts are instrumental in obtaining structured
    and detailed responses, making them invaluable in engineering research and education.'
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
  zh: 分析：此提示示例展示了在技术领域使用声明式风格。它提供了具体背景（“在飞机设计背景下”）和明确的指令，要求LLM解释与升力和阻力相关的空气动力学原理。此类提示对于获得结构化和详细响应至关重要，在工程研究和教育中极具价值。
- en: Creative Writing and Content Generation
  id: totrans-227
  prefs: []
  type: TYPE_NORMAL
  zh: 创意写作和内容生成
- en: 'EXAMPLE 2: “Compose a 500-word article on the future of sustainable architecture,
    emphasizing innovative materials and energy-efficient design.”'
  id: totrans-228
  prefs: []
  type: TYPE_NORMAL
  zh: 示例2：“撰写一篇500字的关于可持续建筑未来的文章，强调创新材料和节能设计。”
- en: 'Analysis: Here, an imperative prompt style is employed to direct the LLM to
    create content with specific guidelines. By specifying the word count and emphasizing
    key aspects, such as “innovative materials” and “energy-efficient design,” the
    prompt ensures that the generated article is tailored to the topic of sustainable
    architecture and serves as a foundation for further editing or publication.'
  id: totrans-229
  prefs: []
  type: TYPE_NORMAL
  zh: 分析：在此，采用了命令式提示风格，以指导LLM（大型语言模型）根据特定指南创建内容。通过指定字数并强调关键方面，如“创新材料”和“节能设计”，提示确保生成的文章针对可持续建筑的主题，并作为进一步编辑或出版的基石。
- en: 'Healthcare and Medical Research:'
  id: totrans-230
  prefs: []
  type: TYPE_NORMAL
  zh: 医疗和医学研究：
- en: 'EXAMPLE 3: “Discuss the recent advancements in gene-editing technologies like
    CRISPR-Cas9, highlighting their potential applications in treating genetic disorders.”'
  id: totrans-231
  prefs: []
  type: TYPE_NORMAL
  zh: 示例3：“讨论CRISPR-Cas9等基因编辑技术的最新进展，突出其在治疗遗传疾病方面的潜在应用。”
- en: 'Analysis: This interrogative prompt solicits a comprehensive response by asking
    the LLM to “discuss” and “highlight.” It specifies the focus on “recent advancements”
    and “potential applications,” indicating the need for an up-to-date, informative
    response. In the domain of healthcare and medical research, precision and currency
    are paramount, and this prompt style reflects that.'
  id: totrans-232
  prefs: []
  type: TYPE_NORMAL
  zh: 分析：这种疑问式提示通过要求LLM“讨论”和“突出”来征求全面的响应。它指定了关注“最近进展”和“潜在应用”，表明需要提供最新、信息丰富的响应。在医疗保健和医学研究领域，精确性和时效性至关重要，这种提示风格反映了这一点。
- en: 'Conversational AI and Virtual Assistants:'
  id: totrans-233
  prefs: []
  type: TYPE_NORMAL
  zh: 对话式AI和虚拟助手：
- en: 'EXAMPLE 4: “Hello, can you tell me about the weather forecast for this weekend
    in Vancouver City?”'
  id: totrans-234
  prefs: []
  type: TYPE_NORMAL
  zh: 示例 4：“你好，你能告诉我本周末温哥华市的天气预报吗？”
- en: 'Analysis: Conversational prompts, as seen in this example, often start with
    a friendly greeting to establish a natural conversation flow. By asking for the
    weather forecast in a specific location and timeframe, the prompt encourages the
    LLM to provide context-aware information, mimicking the interaction with a virtual
    assistant or chatbot.'
  id: totrans-235
  prefs: []
  type: TYPE_NORMAL
  zh: 分析：如本例所示，对话式提示通常以友好的问候开始，以建立自然的对话流程。通过询问特定地点和时间段的天气预报，提示鼓励LLM提供上下文感知信息，模仿与虚拟助手或聊天机器人的互动。
- en: 'Educational and Learning Applications:'
  id: totrans-236
  prefs: []
  type: TYPE_NORMAL
  zh: 教育和学习应用：
- en: 'EXAMPLE 5: “Explain the fundamental concepts of quantum mechanics in a way
    that a high school student can understand.”'
  id: totrans-237
  prefs: []
  type: TYPE_NORMAL
  zh: 示例 5：“用高中生能够理解的方式解释量子力学的基本概念。”
- en: 'Analysis: This imperative prompt combines a directive style with a specific
    audience focus (“a high school student”). It challenges the LLM to simplify complex
    subject matter for educational purposes, showcasing the adaptability of prompt
    engineering for knowledge dissemination and pedagogical applications.'
  id: totrans-238
  prefs: []
  type: TYPE_NORMAL
  zh: 分析：这种命令式提示结合了指令风格和特定的受众焦点（“高中生”）。它挑战LLM为教育目的简化复杂主题，展示了提示工程在知识传播和教学应用中的适应性。
- en: 'Role-Goal-Context Style:'
  id: totrans-239
  prefs: []
  type: TYPE_NORMAL
  zh: 角色目标上下文风格：
- en: One of the most versatile and powerful styles is the Role-Goal-Context (RGC)
    prompt style. RGC prompts excel in providing specific and context-aware interactions
    with AI models. By explicitly defining three key components (the “Role,” the “Goal,”
    and the “Context”), this prompt style can be harnessed for a wide range of applications.
  id: totrans-240
  prefs: []
  type: TYPE_NORMAL
  zh: 最灵活且功能强大的风格之一是角色目标上下文（RGC）提示风格。RGC提示在提供与AI模型的具体和上下文感知的交互方面表现出色。通过明确定义三个关键组件（“角色”、“目标”和“上下文”），这种提示风格可以用于广泛的用途。
- en: 'The RGC structure is as follows:'
  id: totrans-241
  prefs: []
  type: TYPE_NORMAL
  zh: RGC结构如下：
- en: '![](image/bull.jpg) Role: This component identifies the persona or function
    you want the AI model to adopt when generating responses. It sets the stage for
    the AI to embody a particular character, profession, or expertise. For instance,
    it could be a scientist, a teacher, or a customer support representative.'
  id: totrans-242
  prefs: []
  type: TYPE_NORMAL
  zh: '![图片](image/bull.jpg) 角色：这个组件确定了你在AI模型生成响应时希望其采用的个性或功能。它为AI设定了场景，使其能够体现特定的角色、职业或专业知识。例如，它可以是科学家、教师或客户支持代表。'
- en: '![](image/bull.jpg) Goal: The goal articulates the specific objective you want
    to achieve through the AI’s response. It defines the task, the problem to solve,
    or the information to provide. It is the “what” that you want the AI to do.'
  id: totrans-243
  prefs: []
  type: TYPE_NORMAL
  zh: '![图片](image/bull.jpg) 目标：目标明确了你希望通过AI的响应实现的具体目标。它定义了任务、要解决的问题或要提供的信息。它是你希望AI做的“什么”。'
- en: '![](image/bull.jpg) Context: Context supplies the necessary background information
    or constraints that influence the AI’s response. It can encompass situational
    details, user preferences, or any pertinent information required for the AI to
    generate a relevant and meaningful answer.'
  id: totrans-244
  prefs: []
  type: TYPE_NORMAL
  zh: '![图片](image/bull.jpg) 上下文：上下文提供影响AI响应的必要背景信息或约束。它可以包括情境细节、用户偏好或AI生成相关且有意义答案所需的任何相关信息。'
- en: The following prompt example refers to a customer support case.
  id: totrans-245
  prefs: []
  type: TYPE_NORMAL
  zh: 以下提示示例涉及一个客户支持案例。
- en: 'EXAMPLE 6: “As a customer support agent, provide troubleshooting for connectivity
    issues for a user experiencing frequent disconnections using a Wi-Fi router.”'
  id: totrans-246
  prefs: []
  type: TYPE_NORMAL
  zh: 示例 6：“作为一名客户支持代表，为经常使用Wi-Fi路由器断开连接的用户提供连接问题故障排除。”
- en: 'Analysis: In customer support, this style ensures that the AI responds with
    technical troubleshooting guidance, understanding the user’s context and issue.
    It has the following format:'
  id: totrans-247
  prefs: []
  type: TYPE_NORMAL
  zh: 分析：在客户支持中，这种风格确保AI以技术故障排除指导的方式响应，理解用户的上下文和问题。它具有以下格式：
- en: '1. Role: Customer support agent'
  id: totrans-248
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 角色：客户支持代表
- en: '2. Goal: Troubleshoot connectivity issues for a user experiencing frequent
    disconnections.'
  id: totrans-249
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 目标：为经常断开连接的用户解决连接问题。
- en: '3. Context: User is using a Wi-Fi router.'
  id: totrans-250
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 上下文：用户正在使用Wi-Fi路由器。
- en: CHAPTER 2
  id: totrans-251
  prefs: []
  type: TYPE_NORMAL
  zh: 第二章
- en: CRAFTING CONTEXTUAL PROMPTS
  id: totrans-252
  prefs: []
  type: TYPE_NORMAL
  zh: 构建上下文提示
- en: For AI-powered communication, crafting contextual prompts is akin to composing
    a well-crafted question or preparing an engaging conversation. Contextual prompts
    lay the foundation for eliciting coherent and relevant responses from ChatGPT.
    In this chapter, we delve into the art of designing prompts that effectively guide
    the model to provide nuanced and targeted replies.
  id: totrans-253
  prefs: []
  type: TYPE_NORMAL
  zh: 对于AI驱动的通信，构建上下文提示类似于撰写一个精心构思的问题或准备一场引人入胜的对话。上下文提示为从ChatGPT中获得连贯和相关的响应奠定了基础。在本章中，我们深入探讨设计提示的艺术，这些提示能够有效地引导模型提供细微和针对性的回复。
- en: 2.1 LEVERAGING CONTEXT FOR MORE RELEVANT RESPONSES
  id: totrans-254
  prefs: []
  type: TYPE_NORMAL
  zh: 2.1 利用上下文获取更相关的响应
- en: Effective communication hinges on understanding context, and ChatGPT is no exception.
    By infusing prompts with context, we guide the model to better comprehend the
    conversation’s trajectory. Whether it is referring to prior messages in a chat
    or incorporating domain-specific cues, contextual prompts empower ChatGPT to respond
    with coherence and relevance. Context encompasses the information and background
    that surrounds a conversation or a task. Effective prompt engineering involves
    framing questions or requests in a way that provides context to the LLM, aiding
    its understanding and response generation. This is especially crucial for open-domain
    conversational AI, where context can rapidly evolve within a conversation.
  id: totrans-255
  prefs: []
  type: TYPE_NORMAL
  zh: 有效的沟通依赖于理解上下文，ChatGPT也不例外。通过在提示中融入上下文，我们引导模型更好地理解对话的轨迹。无论是引用聊天中的先前消息还是结合特定领域的提示，上下文提示赋予ChatGPT以连贯和相关的回复能力。上下文包括围绕对话或任务的信息和背景。有效的提示工程涉及以提供上下文的方式构建问题或请求，以帮助LLM理解和生成响应。这对于开放域对话AI尤为重要，因为上下文可以在对话中迅速演变。
- en: 'EXAMPLE 1: Basic Context Enhancement'
  id: totrans-256
  prefs: []
  type: TYPE_NORMAL
  zh: 示例 1：基本上下文增强
- en: 'Prompt: “In the context of space exploration, explain the concept of black
    holes.”'
  id: totrans-257
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：“在太空探索的背景下，解释黑洞的概念。”
- en: 'Analysis: In this prompt, the inclusion of “in the context of space exploration”
    provides vital context to the LLM. It specifies that the discussion should revolve
    around black holes within the framework of space exploration. Without this context,
    the response could be less focused or might lack relevance to the specified domain.
    Such contextual cues are fundamental in ensuring that the LLM generates responses
    that align with the desired topic and domain.'
  id: totrans-258
  prefs: []
  type: TYPE_NORMAL
  zh: 分析：在这个提示中，包含“在太空探索的背景下”为LLM提供了至关重要的上下文。它指定了讨论应围绕太空探索框架内的黑洞展开。没有这个上下文，响应可能会不够专注或可能缺乏与指定领域的相关性。这样的上下文提示对于确保LLM生成与期望主题和领域相符的响应是基本的。
- en: 'EXAMPLE 2: Utilizing Previous Messages'
  id: totrans-259
  prefs: []
  type: TYPE_NORMAL
  zh: 示例 2：利用上一条消息
- en: 'Prompt: “What are the key ingredients for a classic Margherita pizza?”'
  id: totrans-260
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：“经典玛格丽塔披萨的关键成分是什么？”
- en: 'Previous Message:'
  id: totrans-261
  prefs: []
  type: TYPE_NORMAL
  zh: 上一条消息：
- en: 'User: “I love Italian cuisine, especially pizza.”'
  id: totrans-262
  prefs: []
  type: TYPE_NORMAL
  zh: 用户：“我喜欢意大利菜，尤其是披萨。”
- en: 'Analysis: In this scenario, the user’s previous message provides contextual
    information about their culinary preferences. The prompt leverages this context
    to tailor the response, focusing on Italian cuisine and, specifically, Margherita
    pizza. This results in a more contextually relevant answer that aligns with the
    user’s stated preference.'
  id: totrans-263
  prefs: []
  type: TYPE_NORMAL
  zh: 分析：在这个场景中，用户的上一条消息提供了关于他们烹饪偏好的上下文信息。提示信息利用这一上下文来定制响应，重点关注意大利菜系，特别是玛格丽塔披萨。这导致了一个更符合上下文、与用户声明偏好一致的答案。
- en: 'EXAMPLE 3: Dynamic Contextual Prompt'
  id: totrans-264
  prefs: []
  type: TYPE_NORMAL
  zh: 示例 3：动态上下文提示
- en: 'Prompt: “Tell me more about the history of space exploration.”'
  id: totrans-265
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：“告诉我更多关于太空探索的历史。”
- en: 'Additional User Input: “I’m particularly interested in the Apollo missions.”'
  id: totrans-266
  prefs: []
  type: TYPE_NORMAL
  zh: 用户额外输入：“我对阿波罗任务特别感兴趣。”
- en: 'Analysis: This dynamic approach adapts prompts based on evolving context within
    a conversation. The prompt adjusts based on the user’s input, becoming more specific
    by incorporating the user’s interest in the Apollo missions. This dynamic contextual
    adaptation ensures that the LLM’s response is tailored to the user’s current focus
    within the broader topic of space exploration.'
  id: totrans-267
  prefs: []
  type: TYPE_NORMAL
  zh: 分析：这种动态方法根据对话中的演变上下文调整提示。提示根据用户的输入进行调整，通过结合用户对阿波罗任务的兴趣而变得更加具体。这种动态上下文适应确保了LLM的响应是根据用户在更广泛的太空探索主题中的当前关注点定制的。
- en: In conclusion, the art of leveraging context for more relevant responses is
    a multifaceted aspect of prompt engineering. Whether through framing prompts with
    domain-specific context, utilizing conversational history, or dynamically adapting
    to real-time user input, context serves as a powerful tool in enhancing the quality
    and relevance of interactions with LLMs like ChatGPT.
  id: totrans-268
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，利用上下文来生成更相关响应的艺术是提示工程的多面性方面。无论是通过使用特定领域的上下文来构建提示，利用对话历史，还是动态适应实时用户输入，上下文都是增强与LLM（如ChatGPT）交互质量和相关性的强大工具。
- en: 2.2 HARNESSING PRIOR CHAT TURNS FOR SMOOTH CONVERSATIONS
  id: totrans-269
  prefs: []
  type: TYPE_NORMAL
  zh: 2.2 利用先前对话轮次以实现流畅对话
- en: One of the defining characteristics of modern conversational AI models, such
    as ChatGPT and its variants, is their ability to maintain context and reference
    previous chat turns. This feature facilitates seamless and coherent conversations,
    closely mirroring human interactions. In this section, we explore the art of using
    previous chat turns to enhance conversational continuity and depth, supported
    by both research findings and practical examples.
  id: totrans-270
  prefs: []
  type: TYPE_NORMAL
  zh: 现代对话式AI模型（如ChatGPT及其变体）的一个定义特征是它们维持上下文和引用先前对话轮次的能力。这一功能促进了无缝和连贯的对话，紧密模仿人类互动。在本节中，我们探讨使用先前对话轮次来增强对话连续性和深度的艺术，这得到了研究发现的实际例子的支持。
- en: 'EXAMPLE 1: Contextual Continuity'
  id: totrans-271
  prefs: []
  type: TYPE_NORMAL
  zh: 'EXAMPLE 1: 上下文连续性'
- en: 'Prompt: “Tell me about the historical significance of the Great Wall of China.”'
  id: totrans-272
  prefs: []
  type: TYPE_NORMAL
  zh: 'Prompt: “告诉我中国长城的历史意义。”'
- en: 'Previous Chat Turn:'
  id: totrans-273
  prefs: []
  type: TYPE_NORMAL
  zh: 前一对话轮次：
- en: 'User: “I’m planning a trip to China next summer.”'
  id: totrans-274
  prefs: []
  type: TYPE_NORMAL
  zh: 'User: “我计划明年夏天去中国旅行。”'
- en: 'Analysis: The user’s previous message about planning a trip to China provides
    context for the prompt. By referencing this context, the conversational AI can
    tailor the response to focus on aspects of the Great Wall of China that may be
    relevant to a traveler, such as its historical and tourist significance. This
    demonstrates how continuity enhances relevance within a conversation.'
  id: totrans-275
  prefs: []
  type: TYPE_NORMAL
  zh: 分析：用户先前关于计划去中国旅行的消息为提示提供了上下文。通过引用这个上下文，对话式AI可以定制响应，关注长城的历史和旅游意义，这可能对旅行者相关。这展示了连续性如何增强对话中的相关性。
- en: 'EXAMPLE 2: Multi-Turn Context'
  id: totrans-276
  prefs: []
  type: TYPE_NORMAL
  zh: 'EXAMPLE 2: 多轮上下文'
- en: 'Prompt: “Explain the process of photosynthesis in plants.”'
  id: totrans-277
  prefs: []
  type: TYPE_NORMAL
  zh: 'Prompt: “解释植物光合作用的过程。”'
- en: 'Previous Chat Turns:'
  id: totrans-278
  prefs: []
  type: TYPE_NORMAL
  zh: 前一对话轮次：
- en: 'User: “What is photosynthesis?”'
  id: totrans-279
  prefs: []
  type: TYPE_NORMAL
  zh: 'User: “什么是光合作用？”'
- en: 'AI: “Photosynthesis is the process by which plants convert sunlight into energy.”'
  id: totrans-280
  prefs: []
  type: TYPE_NORMAL
  zh: 'AI: “光合作用是植物将阳光转化为能量的过程。”'
- en: 'Analysis: In this example, the user’s initial question is followed by the AI’s
    explanation. The user then asks for more information, providing an opportunity
    for the AI to build upon the previous explanation. This multi-turn context enables
    the AI to provide a comprehensive response, breaking down the complex process
    of photosynthesis step by step.'
  id: totrans-281
  prefs: []
  type: TYPE_NORMAL
  zh: 分析：在这个例子中，用户的初始问题随后是AI的解释。然后用户要求更多信息，为AI提供了在先前解释的基础上进行扩展的机会。这种多轮上下文使AI能够提供全面的响应，逐步分解光合作用的复杂过程。
- en: 'EXAMPLE 3: Handling Complex Dialogue'
  id: totrans-282
  prefs: []
  type: TYPE_NORMAL
  zh: 'EXAMPLE 3: 处理复杂对话'
- en: 'Prompt: “Debate the pros and cons of renewable energy sources versus fossil
    fuels.”'
  id: totrans-283
  prefs: []
  type: TYPE_NORMAL
  zh: 'Prompt: “讨论可再生能源与化石燃料的利弊。”'
- en: 'Previous Chat Turns:'
  id: totrans-284
  prefs: []
  type: TYPE_NORMAL
  zh: 前一对话轮次：
- en: 'User: “What are the environmental benefits of renewable energy?”'
  id: totrans-285
  prefs: []
  type: TYPE_NORMAL
  zh: 'User: “可再生能源的环境效益是什么？”'
- en: 'AI: “Renewable energy sources, like wind and solar power, produce fewer greenhouse
    gas emissions.”'
  id: totrans-286
  prefs: []
  type: TYPE_NORMAL
  zh: 'AI: “可再生能源，如风能和太阳能，产生的温室气体排放更少。”'
- en: 'Analysis: In this scenario, the user initiates a discussion about renewable
    energy’s environmental benefits. The AI’s response can refer to its previous statement
    about reduced greenhouse gas emissions to begin a thoughtful debate on the broader
    topic of renewable energy versus fossil fuels.'
  id: totrans-287
  prefs: []
  type: TYPE_NORMAL
  zh: 分析：在这个场景中，用户开始讨论可再生能源的环境效益。AI的响应可以引用其关于减少温室气体排放的先前声明，开始对可再生能源与化石燃料的更广泛主题进行深思熟虑的辩论。
- en: In conclusion, using previous chat turns for seamless conversations is a cornerstone
    of effective conversational AI. By retaining and referencing context, these models
    are equipped to engage in deeper, more relevant, and more coherent dialogues.
    This capability is instrumental in creating AI systems that are not only informative
    but also capable of sustaining engaging and contextually rich interactions.
  id: totrans-288
  prefs: []
  type: TYPE_NORMAL
  zh: 总之，使用之前的聊天回合进行无缝对话是有效对话式AI的基石。通过保留和引用上下文，这些模型能够参与更深、更相关、更连贯的对话。这种能力对于创建不仅信息丰富而且能够维持吸引人和情境丰富的交互的AI系统至关重要。
- en: 2.3 INCORPORATING THE USER’S NAME AND DETAILS FOR PERSONALIZATION
  id: totrans-289
  prefs: []
  type: TYPE_NORMAL
  zh: 2.3 为个性化加入用户的姓名和详细信息
- en: Personalization in conversational AI enhances engagement and relevance. By using
    details like a user’s name and preferences, AI models can forge a stronger connection
    and deliver responses that are more customized to the individual. In this section,
    we explore the strategies and benefits of incorporating user-specific information
    into conversations, with supporting references and practical examples. One way
    of doing this is with the “Custom instructions” available in the user’s settings
    ([https://help.openai.com/en/articles/8096356-custom-instructions-for-chatgpt](https://help.openai.com/en/articles/8096356-custom-instructions-for-chatgpt)).
  id: totrans-290
  prefs: []
  type: TYPE_NORMAL
  zh: 对话式AI中的个性化增强了参与度和相关性。通过使用用户的姓名和偏好等细节，AI模型可以建立更强的联系，并提供更个性化的响应。在本节中，我们探讨了将用户特定信息纳入对话的策略和好处，包括支持引用和实际例子。实现这一目标的一种方式是使用用户设置中的“自定义指令”（[https://help.openai.com/en/articles/8096356-custom-instructions-for-chatgpt](https://help.openai.com/en/articles/8096356-custom-instructions-for-chatgpt))。
- en: There are two spaces available for providing user’s info and the way that the
    user wants ChatGPT to respond, as shown in [Figure 2.1](#fig2-1).
  id: totrans-291
  prefs: []
  type: TYPE_NORMAL
  zh: 有两个空格可以用来提供用户信息和用户希望ChatGPT的响应方式，如图[图2.1](#fig2-1)所示。
- en: '![](image/Fig_2_1.jpg)'
  id: totrans-292
  prefs: []
  type: TYPE_IMG
  zh: '![](image/Fig_2_1.jpg)'
- en: FIGURE 2.1 Custom instructions window in ChatGPT.
  id: totrans-293
  prefs: []
  type: TYPE_NORMAL
  zh: 图2.1 ChatGPT中的自定义指令窗口。
- en: 'EXAMPLE 1: Simple Personalization'
  id: totrans-294
  prefs: []
  type: TYPE_NORMAL
  zh: 'EXAMPLE 1: 简单个性化'
- en: 'Prompt: “Hello, my name is [User’s Name]. how can you assist me with [the topic]
    today?”'
  id: totrans-295
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：“你好，我叫[用户姓名]。今天我能如何帮助你处理[话题]？”
- en: 'Analysis: By incorporating the user’s name into the greeting, the AI immediately
    establishes a personal connection with the user. This simple act of recognition
    can create a positive and welcoming atmosphere, enhancing the user’s engagement
    and comfort within the conversation.'
  id: totrans-296
  prefs: []
  type: TYPE_NORMAL
  zh: 分析：通过在问候中加入用户的姓名，AI立即与用户建立了个人联系。这种简单的识别行为可以创造一个积极和欢迎的氛围，增强用户在对话中的参与感和舒适度。
- en: 'EXAMPLE 2: User Preferences'
  id: totrans-297
  prefs: []
  type: TYPE_NORMAL
  zh: 'EXAMPLE 2: 用户偏好'
- en: 'Prompt: “I noticed you’re interested in [User’s Interest]. Would you like to
    know more about the latest developments in that field?”'
  id: totrans-298
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：“我注意到你对[用户兴趣]感兴趣。你想要了解该领域的最新发展吗？”
- en: 'Previous Chat Turn:'
  id: totrans-299
  prefs: []
  type: TYPE_NORMAL
  zh: 前一聊天回合：
- en: 'User: “I’m really passionate about renewable energy.”'
  id: totrans-300
  prefs: []
  type: TYPE_NORMAL
  zh: 用户：“我对可再生能源非常热情。”
- en: 'Analysis: In this example, the AI references the user’s previously expressed
    interest in renewable energy. This reference not only demonstrates active listening
    but also tailors the subsequent conversation to the user’s preferences, potentially
    leading to a more engaging and relevant discussion.'
  id: totrans-301
  prefs: []
  type: TYPE_NORMAL
  zh: 分析：在这个例子中，AI引用了用户之前表达的对于可再生能源的兴趣。这种引用不仅展示了积极倾听，还根据用户的偏好调整了后续的对话，可能导致更有吸引力和相关的讨论。
- en: 'EXAMPLE 3: Dynamic Personalization'
  id: totrans-302
  prefs: []
  type: TYPE_NORMAL
  zh: 'EXAMPLE 3: 动态个性化'
- en: 'Prompt (Adapting to User Input): “Tell me more about your recent trip to [User’s
    Mentioned Location]. How was your experience there?”'
  id: totrans-303
  prefs: []
  type: TYPE_NORMAL
  zh: 提示（适应用户输入）：“告诉我更多关于你最近去[用户提到的位置]的旅行。那里的体验如何？”
- en: 'User Input:'
  id: totrans-304
  prefs: []
  type: TYPE_NORMAL
  zh: 用户输入：
- en: 'User: “I just returned from a trip to Paris.”'
  id: totrans-305
  prefs: []
  type: TYPE_NORMAL
  zh: 用户：“我刚从巴黎旅行回来。”
- en: 'Analysis: The prompt dynamically incorporates the user’s mentioned location
    (Paris) and their recent travel experience. This contextual personalization not
    only demonstrates attentiveness but also enables the AI to engage in a more meaningful
    conversation about the user’s trip.'
  id: totrans-306
  prefs: []
  type: TYPE_NORMAL
  zh: 分析：提示动态地结合了用户提到的位置（巴黎）和他们的最近旅行经历。这种情境个性化不仅展示了关注，还使AI能够参与更有意义的关于用户旅行的对话。
- en: 'EXAMPLE 4: Demonstrating Empathy'
  id: totrans-307
  prefs: []
  type: TYPE_NORMAL
  zh: 'EXAMPLE 4: 展示同理心'
- en: 'Prompt: “I understand that you’re a parent, [User’s Name]. How can I assist
    you in finding family-friendly activities in your area?”'
  id: totrans-308
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：“我明白你是一位家长，[用户姓名]。我如何能帮助你在你所在地区找到适合家庭的活动？”
- en: 'Analysis: In this example, the AI not only uses the user’s name but also acknowledges
    their role as a parent. This empathetic approach can help build trust and rapport,
    as the user feels understood and supported in their specific context.'
  id: totrans-309
  prefs: []
  type: TYPE_NORMAL
  zh: 分析：在这个例子中，AI不仅使用了用户的姓名，还认可了他们的父母角色。这种同理心的方法可以帮助建立信任和融洽关系，因为用户会感觉到在自己的特定环境中被理解和支持。
- en: In conclusion, incorporating user-specific details for personalization is a
    potent strategy in creating engaging and relevant AI-driven conversations. Whether
    by using the user’s name, referencing their preferences, or adapting to the conversation’s
    evolving context, personalization enhances the user experience and contributes
    to more meaningful interactions.
  id: totrans-310
  prefs: []
  type: TYPE_NORMAL
  zh: 总之，在创建引人入胜且相关的AI驱动对话中，融入用户特定的细节是一种强有力的策略。无论是使用用户的姓名、引用他们的偏好，还是适应对话不断变化的环境，个性化都能提升用户体验并促进更有意义的互动。
- en: CHAPTER 3
  id: totrans-311
  prefs: []
  type: TYPE_NORMAL
  zh: 第三章
- en: ASKING SPECIFIC QUESTIONS
  id: totrans-312
  prefs: []
  type: TYPE_NORMAL
  zh: 提出具体问题
- en: In the realm of AI-driven interactions, the ability to ask clear and specific
    questions through prompts becomes a powerful skill. [Chapter 3](chapter03.xhtml)
    explores the art of crafting prompts that not only evoke precise responses but
    also navigate the complexities of language to extract accurate information from
    ChatGPT.
  id: totrans-313
  prefs: []
  type: TYPE_NORMAL
  zh: 在AI驱动交互的领域，通过提示提出清晰和具体问题的能力是一种强大的技能。[第三章](chapter03.xhtml)探讨了制作提示的艺术，这些提示不仅能够激发精确的回答，还能够驾驭语言的复杂性，从ChatGPT中提取准确信息。
- en: 3.1 TECHNIQUES FOR ASKING CLEAR AND DIRECT QUESTIONS
  id: totrans-314
  prefs: []
  type: TYPE_NORMAL
  zh: 3.1 提出清晰和直接问题的技巧
- en: The art of asking clear and direct questions is fundamental to effective communication,
    especially when engaging with AI systems. In this section, we will explore various
    techniques and strategies for formulating precise questions that yield accurate
    and relevant responses. These techniques are informed by research findings and
    are accompanied by practical examples to illustrate their application.
  id: totrans-315
  prefs: []
  type: TYPE_NORMAL
  zh: 提出清晰和直接问题的艺术是有效沟通的基础，尤其是在与AI系统互动时。在本节中，我们将探讨制定精确问题以获得准确和相关信息的技术和策略。这些技术基于研究结果，并伴有实际示例来说明其应用。
- en: 'EXAMPLE 1: The Power of Precision'
  id: totrans-316
  prefs: []
  type: TYPE_NORMAL
  zh: 示例 1：精确力的力量
- en: 'Prompt: “Please explain the process of cellular respiration in eukaryotic cells.”'
  id: totrans-317
  prefs: []
  type: TYPE_NORMAL
  zh: 提示： “请解释真核细胞中细胞呼吸的过程。”
- en: 'Analysis: This prompt exemplifies the technique of precision. It specifies
    the topic (cellular respiration) and the context (eukaryotic cells), leaving no
    room for misinterpretation. By eliminating ambiguity, the AI can provide a concise
    and accurate response, catering to the user’s request.'
  id: totrans-318
  prefs: []
  type: TYPE_NORMAL
  zh: 分析：这个提示展示了精确技术的例子。它指定了主题（细胞呼吸）和上下文（真核细胞），没有留下误解的空间。通过消除模糊性，AI可以提供简洁准确的回答，满足用户的要求。
- en: 'EXAMPLE 2: Clarity Through Context'
  id: totrans-319
  prefs: []
  type: TYPE_NORMAL
  zh: 示例 2：通过上下文清晰度
- en: 'Prompt: “In the context of economics, what are the key principles of supply
    and demand?”'
  id: totrans-320
  prefs: []
  type: TYPE_NORMAL
  zh: 提示： “在经济学背景下，供需的关键原则是什么？”
- en: 'Analysis: This prompt leverages context to enhance clarity. By framing the
    question within the context of economics, the AI understands the user’s area of
    interest and provides a response that pertains specifically to supply and demand
    principles within that domain. Contextual framing reduces ambiguity and ensures
    relevance.'
  id: totrans-321
  prefs: []
  type: TYPE_NORMAL
  zh: 分析：这个提示利用上下文来增强清晰度。通过将问题置于经济学的背景下，AI能够理解用户的兴趣领域，并提供了与该领域内的供需原则相关的具体回答。上下文框架减少了模糊性并确保了相关性。
- en: 'EXAMPLE 3: Closed-Ended Clarity'
  id: totrans-322
  prefs: []
  type: TYPE_NORMAL
  zh: 示例 3：封闭式清晰度
- en: 'Prompt: “Is the melting point of gold higher than that of iron?”'
  id: totrans-323
  prefs: []
  type: TYPE_NORMAL
  zh: 提示： “金的熔点比铁的熔点高吗？”
- en: 'Analysis: By structuring the question as a closed-ended query, the user seeks
    a straightforward response that compares the melting points of gold and iron.
    This format eliminates the need for lengthy explanations and encourages the AI
    to provide a concise, fact-based answer.'
  id: totrans-324
  prefs: []
  type: TYPE_NORMAL
  zh: 分析：通过将问题结构化为封闭式查询，用户寻求一个直接回答，比较金和铁的熔点。这种格式消除了需要冗长解释的需要，并鼓励AI提供简洁、基于事实的回答。
- en: 'EXAMPLE 4: Ambiguity Clarified'
  id: totrans-325
  prefs: []
  type: TYPE_NORMAL
  zh: 示例 4：模糊性澄清
- en: 'Prompt: “Can you tell me about the recent advancements in AI and machine learning?”'
  id: totrans-326
  prefs: []
  type: TYPE_NORMAL
  zh: 提示： “你能告诉我关于人工智能和机器学习最近的发展情况吗？”
- en: 'Analysis: This prompt initially raises a potential issue of ambiguity. “Recent
    advancements” could refer to developments in the last year, last month, or even
    more recently. To eliminate this ambiguity, the user could specify a time frame,
    such as “Can you tell me about advancements in AI and machine learning in the
    past year?” This modification ensures a more precise response.'
  id: totrans-327
  prefs: []
  type: TYPE_NORMAL
  zh: 分析：这个提示最初提出了潜在的歧义问题。“最新进展”可能指的是过去一年、上个月甚至更近期的进展。为了消除这种歧义，用户可以指定一个时间范围，例如，“你能告诉我过去一年人工智能和机器学习的进展吗？”这种修改确保了更精确的回答。
- en: In conclusion, asking clear and direct questions is a foundational skill when
    interacting with AI systems. Employing techniques such as specificity, contextual
    framing, closed-ended queries, and ambiguity avoidance can significantly enhance
    the quality of responses received, ultimately leading to more productive and meaningful
    interactions.
  id: totrans-328
  prefs: []
  type: TYPE_NORMAL
  zh: 总之，在与人工智能系统互动时，提出清晰直接的问题是基础技能。采用诸如具体性、情境框架、封闭式查询和避免歧义等技术可以显著提高收到的回答质量，最终导致更高效和有意义的互动。
- en: '3.2 NAVIGATING AMBIGUITY: HOW TO GET PRECISE ANSWERS'
  id: totrans-329
  prefs: []
  type: TYPE_NORMAL
  zh: 3.2 导航歧义：如何获得精确答案
- en: Ambiguity is a common challenge when interacting with AI systems, but it can
    be effectively managed with the right techniques. In this section, we will explore
    strategies for navigating ambiguity to ensure that you receive precise and relevant
    answers from AI models. These strategies are grounded in research and are illustrated
    with practical examples to demonstrate their effectiveness.
  id: totrans-330
  prefs: []
  type: TYPE_NORMAL
  zh: 歧义是在与人工智能系统互动时常见的挑战，但可以通过适当的技术有效地管理。在本节中，我们将探讨导航歧义的战略，以确保您从人工智能模型中获得精确和相关的答案。这些策略基于研究，并通过实际示例展示其有效性。
- en: The Ambiguity Conundrum
  id: totrans-331
  prefs: []
  type: TYPE_NORMAL
  zh: 歧义难题
- en: Ambiguity arises when a question or request lacks clarity or specificity. AI
    models, while powerful, may struggle to provide precise responses when faced with
    ambiguous queries. To overcome this challenge, it is essential to employ techniques
    that reduce ambiguity.
  id: totrans-332
  prefs: []
  type: TYPE_NORMAL
  zh: 当一个问题或请求缺乏清晰或具体性时，就会产生歧义。尽管人工智能模型功能强大，但在面对模糊查询时可能难以提供精确的回答。为了克服这一挑战，必须采用减少歧义的技术。
- en: 'EXAMPLE 1: Dealing with Vagueness'
  id: totrans-333
  prefs: []
  type: TYPE_NORMAL
  zh: 示例 1：处理模糊性
- en: 'Prompt: “Tell me about the best restaurants.”'
  id: totrans-334
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：“告诉我关于最好的餐厅。”
- en: 'Analysis: This prompt is inherently ambiguous because it doesn’t specify criteria
    for what constitutes “best” or a location. To obtain precise answers, it’s crucial
    to provide more context or criteria. For instance, “Can you recommend the top-rated
    Italian restaurants in New York City?” narrows the scope and reduces ambiguity.'
  id: totrans-335
  prefs: []
  type: TYPE_NORMAL
  zh: 分析：这个提示本身具有歧义，因为它没有指定构成“最佳”或地点的标准。为了获得精确的答案，提供更多上下文或标准至关重要。例如，“你能推荐纽约市评分最高的意大利餐厅吗？”这缩小了范围并减少了歧义。
- en: 'EXAMPLE 2: Clarifying Scope'
  id: totrans-336
  prefs: []
  type: TYPE_NORMAL
  zh: 示例 2：明确范围
- en: 'Prompt: “Explain climate change.”'
  id: totrans-337
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：“解释气候变化。”
- en: 'Analysis: The term “climate change” can encompass various aspects, such as
    causes, impacts, or mitigation strategies. To get a precise answer, specify the
    aspect you want to know more about. For example, “Can you describe the human causes
    of climate change?” narrows the focus and reduces ambiguity.'
  id: totrans-338
  prefs: []
  type: TYPE_NORMAL
  zh: 分析：术语“气候变化”可以涵盖多个方面，例如原因、影响或缓解策略。为了获得精确的答案，请具体说明您想了解的方面。例如，“你能描述气候变化的人类原因吗？”这缩小了焦点并减少了歧义。
- en: 'EXAMPLE 3: Multi-Step Clarity'
  id: totrans-339
  prefs: []
  type: TYPE_NORMAL
  zh: 示例 3：多步骤清晰
- en: 'Prompt (Multi-Step): “First, explain the concept of quantum entanglement. Then,
    describe its implications for quantum computing.”'
  id: totrans-340
  prefs: []
  type: TYPE_NORMAL
  zh: 提示（多步骤）：“首先，解释量子纠缠的概念。然后，描述其对量子计算的影响。”
- en: 'Analysis: When dealing with complex topics like quantum physics, breaking down
    the question into two distinct steps reduces ambiguity. It ensures that each part
    of the question receives a focused and precise response.'
  id: totrans-341
  prefs: []
  type: TYPE_NORMAL
  zh: 分析：在处理像量子物理这样的复杂主题时，将问题分解为两个不同的步骤可以减少歧义。这确保了问题的每个部分都能得到专注和精确的回答。
- en: 'EXAMPLE 4: Request for Clarification'
  id: totrans-342
  prefs: []
  type: TYPE_NORMAL
  zh: 示例 4：请求澄清
- en: 'User: “Tell me about recent advancements in AI.”'
  id: totrans-343
  prefs: []
  type: TYPE_NORMAL
  zh: 用户：“告诉我关于人工智能的最新进展。”
- en: 'AI: “AI has seen significant progress recently.”'
  id: totrans-344
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能：“人工智能最近取得了显著的进步。”
- en: 'User (Seeking Clarification): “Could you provide specific examples of these
    advancements?”'
  id: totrans-345
  prefs: []
  type: TYPE_NORMAL
  zh: 用户（寻求澄清）：“你能提供这些进步的具体例子吗？”
- en: 'Analysis: When faced with a vague response, the user seeks clarification by
    requesting specific examples. This proactive approach guides the conversation
    toward a more precise and informative answer.'
  id: totrans-346
  prefs: []
  type: TYPE_NORMAL
  zh: 分析：当面对模糊的回答时，用户通过请求具体例子来寻求澄清。这种主动的方法引导对话走向更精确、更有信息量的答案。
- en: 'EXAMPLE 5: Defining Key Terms'
  id: totrans-347
  prefs: []
  type: TYPE_NORMAL
  zh: 示例5：定义关键术语
- en: 'Prompt: “Explain the role of ‘dark matter’ in astrophysics.”'
  id: totrans-348
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：“解释‘暗物质’在天文学中的作用。”
- en: 'Analysis: “Dark matter” is a term with a specific meaning in astrophysics.
    By enclosing it in quotes or providing a brief definition within the prompt, you
    reduce the risk of ambiguity and ensure the AI understands your question accurately.'
  id: totrans-349
  prefs: []
  type: TYPE_NORMAL
  zh: 分析：“暗物质”在天文学中是一个具有特定含义的术语。通过在提示中将其引号括起来或提供简短的定义，你可以降低模糊性的风险，并确保AI准确理解你的问题。
- en: In conclusion, navigating ambiguity to obtain precise answers from AI systems
    is essential for productive interactions. Employing techniques such as providing
    context and specifics, breaking down questions into multiple steps, seeking clarification,
    and defining key terms can significantly enhance the quality and accuracy of the
    responses you receive.
  id: totrans-350
  prefs: []
  type: TYPE_NORMAL
  zh: 总之，在AI系统中导航模糊性以获得精确答案对于有效的互动至关重要。采用提供上下文和具体信息、将问题分解成多个步骤、寻求澄清和定义关键术语等技术可以显著提高你收到的回答的质量和准确性。
- en: 3.3 UNCOVERING HIDDEN INFORMATION WITH WELL-FORMED QUERIES
  id: totrans-351
  prefs: []
  type: TYPE_NORMAL
  zh: 3.3 使用结构良好的查询揭示隐藏信息
- en: In the realm of conversational AI and information retrieval, the ability to
    uncover hidden or less apparent information is a valuable skill. Well-formed queries,
    structured to dig deeper or explore nuanced topics, can be the key to extracting
    valuable insights. In this section, we delve into the techniques and strategies
    for crafting well-formed queries to unearth concealed information.
  id: totrans-352
  prefs: []
  type: TYPE_NORMAL
  zh: 在对话式AI和信息检索领域，揭示隐藏或不太明显信息的能力是一项宝贵的技能。结构良好的查询，旨在深入挖掘或探索细微主题，可能是提取宝贵见解的关键。在本节中，我们深入探讨构建结构良好查询以揭示隐藏信息的技巧和策略。
- en: 'EXAMPLE 1: Probing for Details'
  id: totrans-353
  prefs: []
  type: TYPE_NORMAL
  zh: 示例1：探求细节
- en: 'Prompt: “Tell me about the history of the Eiffel Tower construction, including
    any lesser-known facts.”'
  id: totrans-354
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：“告诉我关于埃菲尔铁塔建设的历史，包括任何鲜为人知的事实。”
- en: 'Analysis: This prompt goes beyond a generic request for information and specifically
    instructs the AI to uncover lesser-known details about the Eiffel Tower’s construction
    history. By encouraging the exploration of hidden facts, the AI can provide a
    richer and more informative response.'
  id: totrans-355
  prefs: []
  type: TYPE_NORMAL
  zh: 分析：这个提示不仅超越了普通的信息请求，还特别指示AI揭示关于埃菲尔铁塔建设历史的鲜为人知细节。通过鼓励探索隐藏的事实，AI可以提供更丰富、更有信息量的回答。
- en: 'EXAMPLE 2: Open-Ended Inquiry'
  id: totrans-356
  prefs: []
  type: TYPE_NORMAL
  zh: 示例2：开放式探究
- en: 'Prompt: “What can you tell me about the cultural impact of the Beatles beyond
    their music?”'
  id: totrans-357
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：“你能告诉我关于披头士乐队除了音乐之外的文化影响吗？”
- en: 'Analysis: By asking about the cultural impact “beyond their music,” the query
    prompts the AI to delve into less obvious aspects of the Beatles’ influence, such
    as their role in shaping fashion, social movements, or popular culture.'
  id: totrans-358
  prefs: []
  type: TYPE_NORMAL
  zh: 分析：通过询问“超出他们的音乐”的文化影响，这个查询促使AI深入探索披头士乐队影响的不太明显的方面，例如他们在塑造时尚、社会运动或流行文化中的作用。
- en: 'EXAMPLE 3: Comparative Exploration'
  id: totrans-359
  prefs: []
  type: TYPE_NORMAL
  zh: 示例3：比较探索
- en: 'Prompt: “Compare and contrast the approaches of two prominent philosophers,
    Immanuel Kant and Friedrich Nietzsche, in their views on ethics.”'
  id: totrans-360
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：“比较和对比两位著名哲学家伊曼努尔·康德和弗里德里希·尼采在伦理观上的方法。”
- en: 'Analysis: This query compels the AI to explore nuanced differences and hidden
    insights within the ethical philosophies of Kant and Nietzsche. By highlighting
    the need for both comparison and contrast, it encourages the revelation of less
    evident distinctions.'
  id: totrans-361
  prefs: []
  type: TYPE_NORMAL
  zh: 分析：这个查询迫使AI探索康德和尼采伦理哲学中的细微差异和隐藏的见解。通过强调比较和对比的需要，它鼓励揭示不那么明显的区别。
- en: 'EXAMPLE 4: Request for Evidence'
  id: totrans-362
  prefs: []
  type: TYPE_NORMAL
  zh: 示例4：请求证据
- en: 'Prompt: “Provide examples of real-world applications of blockchain technology
    in industries beyond finance.”'
  id: totrans-363
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：“提供区块链技术在金融行业以外的实际应用示例。”
- en: 'Analysis: By asking for specific examples “beyond finance,” this query encourages
    the AI to uncover less obvious applications of blockchain technology, such as
    supply chain management, healthcare, or voting systems.'
  id: totrans-364
  prefs: []
  type: TYPE_NORMAL
  zh: 分析：通过请求“超出金融”的具体例子，这个查询鼓励AI揭示区块链技术的更不明显应用，例如供应链管理、医疗保健或投票系统。
- en: 'EXAMPLE 5: Historical Contextualization'
  id: totrans-365
  prefs: []
  type: TYPE_NORMAL
  zh: 示例5：历史背景化
- en: 'Prompt: “In the context of the 1960s Civil Rights Movement, discuss the contributions
    of lesser-known activists and their impact on social change.”'
  id: totrans-366
  prefs: []
  type: TYPE_NORMAL
  zh: 'Prompt: “In the context of the 1960s Civil Rights Movement, discuss the contributions
    of lesser-known activists and their impact on social change.”'
- en: 'Analysis: This query, framed within the historical context of the 1960s Civil
    Rights Movement, prompts the AI to uncover the often-overlooked contributions
    of lesser-known activists, shedding light on hidden facets of the movement.'
  id: totrans-367
  prefs: []
  type: TYPE_NORMAL
  zh: 'Analysis: This query, framed within the historical context of the 1960s Civil
    Rights Movement, prompts the AI to uncover the often-overlooked contributions
    of lesser-known activists, shedding light on hidden facets of the movement.'
- en: In conclusion, uncovering hidden information with well-formed queries is a powerful
    tool in the arsenal of conversational AI users. Techniques such as employing open-ended
    queries, encouraging comparative analysis, requesting supporting evidence, and
    using historical or contextual prompts can unearth concealed knowledge and provide
    a deeper understanding of complex topics.
  id: totrans-368
  prefs: []
  type: TYPE_NORMAL
  zh: In conclusion, uncovering hidden information with well-formed queries is a powerful
    tool in the arsenal of conversational AI users. Techniques such as employing open-ended
    queries, encouraging comparative analysis, requesting supporting evidence, and
    using historical or contextual prompts can unearth concealed knowledge and provide
    a deeper understanding of complex topics.
- en: CHAPTER 4
  id: totrans-369
  prefs: []
  type: TYPE_NORMAL
  zh: CHAPTER 4
- en: PROVIDING CONSTRAINTS AND
  id: totrans-370
  prefs: []
  type: TYPE_NORMAL
  zh: PROVIDING CONSTRAINTS AND
- en: GUIDELINES
  id: totrans-371
  prefs: []
  type: TYPE_NORMAL
  zh: GUIDELINES
- en: '[Chapter 4](chapter04.xhtml) examines the art of using ChatGPT by setting constraints
    and guidelines within prompts. By establishing boundaries, we shape the content
    generated and ensure responsible, ethical, and contextually appropriate responses.'
  id: totrans-372
  prefs: []
  type: TYPE_NORMAL
  zh: '[Chapter 4](chapter04.xhtml) examines the art of using ChatGPT by setting constraints
    and guidelines within prompts. By establishing boundaries, we shape the content
    generated and ensure responsible, ethical, and contextually appropriate responses.'
- en: 4.1 SETTING CONSTRAINTS FOR DESIRED OUTPUT
  id: totrans-373
  prefs: []
  type: TYPE_NORMAL
  zh: 4.1 SETTING CONSTRAINTS FOR DESIRED OUTPUT
- en: In the dynamic landscape of AI and natural language processing, setting constraints
    on the desired output is a strategic approach for fine-tuning responses and ensuring
    they align with specific objectives. This section delves into the nuances of constraint
    setting as a technique for refining AI-generated content. It is underpinned by
    research findings and enriched with practical examples to elucidate its applications.
  id: totrans-374
  prefs: []
  type: TYPE_NORMAL
  zh: In the dynamic landscape of AI and natural language processing, setting constraints
    on the desired output is a strategic approach for fine-tuning responses and ensuring
    they align with specific objectives. This section delves into the nuances of constraint
    setting as a technique for refining AI-generated content. It is underpinned by
    research findings and enriched with practical examples to elucidate its applications.
- en: The Role of Constraints in AI Interaction
  id: totrans-375
  prefs: []
  type: TYPE_NORMAL
  zh: The Role of Constraints in AI Interaction
- en: Constraints act as guiding principles that direct AI models to generate responses
    within defined boundaries. They are instrumental in tailoring responses to meet
    particular criteria, fostering controlled and contextually appropriate interactions.
  id: totrans-376
  prefs: []
  type: TYPE_NORMAL
  zh: Constraints act as guiding principles that direct AI models to generate responses
    within defined boundaries. They are instrumental in tailoring responses to meet
    particular criteria, fostering controlled and contextually appropriate interactions.
- en: 'EXAMPLE 1: Imposing a Length Constraint'
  id: totrans-377
  prefs: []
  type: TYPE_NORMAL
  zh: 'EXAMPLE 1: Imposing a Length Constraint'
- en: 'Prompt: “Summarize the impact of climate change on polar ice caps in 50 words
    or less.”'
  id: totrans-378
  prefs: []
  type: TYPE_NORMAL
  zh: 'Prompt: “Summarize the impact of climate change on polar ice caps in 50 words
    or less.”'
- en: 'Analysis: By stipulating a word limit of 50 words, this constraint ensures
    that the AI provides a concise summary. This is invaluable for scenarios where
    brevity is paramount, such as news headlines or social media posts.'
  id: totrans-379
  prefs: []
  type: TYPE_NORMAL
  zh: 'Analysis: By stipulating a word limit of 50 words, this constraint ensures
    that the AI provides a concise summary. This is invaluable for scenarios where
    brevity is paramount, such as news headlines or social media posts.'
- en: 'EXAMPLE 2: Format Constraint for a Poem'
  id: totrans-380
  prefs: []
  type: TYPE_NORMAL
  zh: 'EXAMPLE 2: Format Constraint for a Poem'
- en: 'Prompt: “Compose a Khayyam-style poem about the beauty of a sunset.”'
  id: totrans-381
  prefs: []
  type: TYPE_NORMAL
  zh: 'Prompt: “Compose a Khayyam-style poem about the beauty of a sunset.”'
- en: 'Analysis: By requesting a Khayyam, a traditional form of Persian poetry with
    specific syllable, the prompt guides the AI to generate content within the specified
    poetic format, resulting in a concise and structured response.'
  id: totrans-382
  prefs: []
  type: TYPE_NORMAL
  zh: 'Analysis: By requesting a Khayyam, a traditional form of Persian poetry with
    specific syllable, the prompt guides the AI to generate content within the specified
    poetic format, resulting in a concise and structured response.'
- en: 'EXAMPLE 3: Domain Constraint in Medical Context'
  id: totrans-383
  prefs: []
  type: TYPE_NORMAL
  zh: 'EXAMPLE 3: Domain Constraint in Medical Context'
- en: 'Prompt: “Explain the mechanism of action of antibiotics in treating bacterial
    infections.”'
  id: totrans-384
  prefs: []
  type: TYPE_NORMAL
  zh: 'Prompt: “Explain the mechanism of action of antibiotics in treating bacterial
    infections.”'
- en: 'Analysis: By referencing the specific drug and medical condition, this constraint
    confines the AI’s response to the domain of medicine, guaranteeing a focused and
    expert-level explanation.'
  id: totrans-385
  prefs: []
  type: TYPE_NORMAL
  zh: 'Analysis: By referencing the specific drug and medical condition, this constraint
    confines the AI’s response to the domain of medicine, guaranteeing a focused and
    expert-level explanation.'
- en: 'EXAMPLE 4: Mimicking a Literary Style'
  id: totrans-386
  prefs: []
  type: TYPE_NORMAL
  zh: 'EXAMPLE 4: Mimicking a Literary Style'
- en: 'Prompt: “Write a short story in the style of Edgar Allan Poe.”'
  id: totrans-387
  prefs: []
  type: TYPE_NORMAL
  zh: 'Prompt: “Write a short story in the style of Edgar Allan Poe.”'
- en: 'Analysis: By invoking the style of Edgar Allan Poe, this constraint directs
    the AI to craft a story characterized by Poe’s distinctive dark and atmospheric
    narrative style, offering a tailored literary experience.'
  id: totrans-388
  prefs: []
  type: TYPE_NORMAL
  zh: 分析：通过引用埃德加·爱伦·坡的风格，这个约束指导人工智能创作出具有坡独特的黑暗和氛围叙事风格的故事，提供定制的文学体验。
- en: 'EXAMPLE 5: Ensuring Ethical Responses'
  id: totrans-389
  prefs: []
  type: TYPE_NORMAL
  zh: 示例 5：确保伦理回应
- en: 'Prompt: “Please share insights regarding the ethical considerations surrounding
    interactions between robots and humans in clinical and hospital environments.”'
  id: totrans-390
  prefs: []
  type: TYPE_NORMAL
  zh: 'Prompt: “请分享关于机器人和人类在临床和医院环境中互动的伦理考量的见解。”'
- en: 'Analysis: This constraint underscores the importance of offering help and resources
    while strictly adhering to ethical guidelines in the context of health industry.'
  id: totrans-391
  prefs: []
  type: TYPE_NORMAL
  zh: 分析：这个约束强调了在医疗行业背景下提供帮助和资源的同时严格遵守伦理指南的重要性。
- en: 'EXAMPLE 6: Custom Constraint for Sensitive Topics'
  id: totrans-392
  prefs: []
  type: TYPE_NORMAL
  zh: 示例 6：敏感话题的定制约束
- en: 'Prompt: “Discuss the historical context of [sensitive topic] while avoiding
    offensive language or bias.”'
  id: totrans-393
  prefs: []
  type: TYPE_NORMAL
  zh: 'Prompt: “讨论[sensitive topic]的历史背景，同时避免使用冒犯性语言或偏见。”'
- en: 'Analysis: Here, a custom constraint is set to address a sensitive topic while
    ensuring that the response maintains a respectful and unbiased tone.'
  id: totrans-394
  prefs: []
  type: TYPE_NORMAL
  zh: 分析：在此，设置了一个定制约束来处理敏感话题，同时确保回应保持尊重和无偏见的语气。
- en: Constraints play an indispensable role in harnessing the potential of AI models
    while aligning their output with specific objectives and ethical considerations.
    Whether guiding content length, controlling domains, mimicking styles, ensuring
    safety, or implementing custom restrictions, constraints empower users to interact
    with AI in a controlled and purposeful manner.
  id: totrans-395
  prefs: []
  type: TYPE_NORMAL
  zh: 在利用人工智能模型潜力并使其输出与特定目标和伦理考量相一致的过程中，约束起着不可或缺的作用。无论是指导内容长度、控制领域、模仿风格、确保安全或实施定制限制，约束都赋予用户以控制和有目的的方式与人工智能互动的能力。
- en: 4.2 ENSURING ETHICAL AND RESPONSIBLE RESPONSES
  id: totrans-396
  prefs: []
  type: TYPE_NORMAL
  zh: 4.2 确保伦理和负责任回应
- en: Ethical and responsible AI interactions are paramount in the development and
    deployment of AI systems. This section discusses the critical aspect of ensuring
    that AI-generated responses align with ethical guidelines and societal values.
    It is supported by key research findings and real-world examples to illustrate
    the importance and application of ethical considerations in AI.
  id: totrans-397
  prefs: []
  type: TYPE_NORMAL
  zh: 在人工智能系统开发和部署中，伦理和负责任的人工智能互动至关重要。本节讨论了确保人工智能生成的回应与伦理指南和社会价值观相一致的关键方面。它得到了关键研究发现的支撑，并通过现实世界的例子来说明伦理考量在人工智能中的重要性及其应用。
- en: 'Ethics in AI: A Fundamental Imperative'
  id: totrans-398
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能中的伦理：一项基本要求
- en: 'As AI systems become increasingly integrated into various aspects of society,
    addressing ethical concerns is essential to ensure responsible AI usage. The following
    examples highlight the significance of ethical considerations in AI interactions:'
  id: totrans-399
  prefs: []
  type: TYPE_NORMAL
  zh: 随着人工智能系统越来越融入社会的各个方面，解决伦理问题对于确保负责任的人工智能使用至关重要。以下示例突出了在人工智能互动中伦理考量的重要性：
- en: 'EXAMPLE 1: Mitigating Bias'
  id: totrans-400
  prefs: []
  type: TYPE_NORMAL
  zh: 示例 1：减轻偏见
- en: 'Prompt: “Provide an overview of gender differences in leadership styles.”'
  id: totrans-401
  prefs: []
  type: TYPE_NORMAL
  zh: 'Prompt: “提供关于领导风格中性别差异的概述。”'
- en: 'Analysis: Ensuring that the AI’s response is unbiased and free from gender
    stereotypes is crucial. A responsible AI response should present a balanced view,
    acknowledging individual variation and avoiding reinforcement of gender biases.'
  id: totrans-402
  prefs: []
  type: TYPE_NORMAL
  zh: 分析：确保人工智能的回应无偏见且不受性别刻板印象的影响至关重要。负责任的人工智能回应应呈现平衡的观点，承认个体差异，避免强化性别偏见。
- en: 'EXAMPLE 2: Handling Sensitive Topics'
  id: totrans-403
  prefs: []
  type: TYPE_NORMAL
  zh: 示例 2：处理敏感话题
- en: 'Prompt: “Discuss the bombing of Hiroshima during World War II and its historical
    significance.”'
  id: totrans-404
  prefs: []
  type: TYPE_NORMAL
  zh: 'Prompt: “讨论二战期间广岛轰炸及其历史意义。”'
- en: 'Analysis: When addressing sensitive historical events like World War II, the
    AI should provide a respectful and historically accurate response.'
  id: totrans-405
  prefs: []
  type: TYPE_NORMAL
  zh: 分析：在处理像二战这样的敏感历史事件时，人工智能应提供尊重且历史准确的回应。
- en: 'EXAMPLE 3: Bullying Prevention'
  id: totrans-406
  prefs: []
  type: TYPE_NORMAL
  zh: 示例 3：预防欺凌
- en: 'Prompt: “Could you provide advice on effectively coping with feelings of being
    bullied? I’m looking for three helpful strategies.”'
  id: totrans-407
  prefs: []
  type: TYPE_NORMAL
  zh: 'Prompt: “你能提供有效应对被欺凌感受的建议吗？我需要三个有用的策略。”'
- en: 'Analysis: Responding to users in distress requires a high level of ethical
    responsibility. AI responses should prioritize immediate assistance, empathy,
    and guidance to seek help from human professionals or crisis helplines.'
  id: totrans-408
  prefs: []
  type: TYPE_NORMAL
  zh: 分析：对处于困境中的用户做出回应需要高度的伦理责任感。人工智能回应应优先考虑立即援助、同理心和指导，以寻求人类专业人士或危机热线帮助。
- en: 'EXAMPLE 4: Political Neutrality'
  id: totrans-409
  prefs: []
  type: TYPE_NORMAL
  zh: 示例 4：政治中立
- en: 'Prompt: “Explain the advantages of socialism over capitalism, and vice versa.”'
  id: totrans-410
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：“解释社会主义相对于资本主义的优点，反之亦然。”
- en: 'Analysis: To maintain political neutrality and avoid bias, AI responses should
    provide an objective analysis of both systems without promoting one over the other.
    Ethical AI should encourage critical thinking rather than imposing a particular
    viewpoint.'
  id: totrans-411
  prefs: []
  type: TYPE_NORMAL
  zh: 分析：为了保持政治中立并避免偏见，人工智能响应应提供对两种系统的客观分析，而不偏袒任何一方。道德人工智能应鼓励批判性思维，而不是强加特定的观点。
- en: 'EXAMPLE 5: Privacy and Data Security'
  id: totrans-412
  prefs: []
  type: TYPE_NORMAL
  zh: 示例 5：隐私和数据安全
- en: 'Prompt: “What personal information do you store about users, and how is it
    used?”'
  id: totrans-413
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：“您存储了哪些关于用户个人的信息，以及它是如何被使用的？”
- en: 'Analysis: Ethical AI systems prioritize transparency regarding data handling.
    Responses should explain data storage and usage practices clearly, while also
    respecting privacy regulations and user consent.'
  id: totrans-414
  prefs: []
  type: TYPE_NORMAL
  zh: 分析：道德人工智能系统在数据处理方面的透明度是优先考虑的。响应应清楚地解释数据存储和使用实践，同时尊重隐私法规和用户同意。
- en: In conclusion, ensuring ethical and responsible responses from AI systems is
    not merely a best practice; it is an ethical imperative. Mitigating bias, handling
    sensitive topics with care, responding to crises responsibly, maintaining political
    neutrality, and respecting privacy and data security are essential aspects of
    ethical AI interactions. These considerations must be integrated into the development
    and deployment of AI systems to promote responsible and ethical AI usage.
  id: totrans-415
  prefs: []
  type: TYPE_NORMAL
  zh: 总之，确保人工智能系统产生道德和负责任响应不仅是一种最佳实践，更是一项道德 imperative。减轻偏见、谨慎处理敏感话题、负责任地应对危机、保持政治中立以及尊重隐私和数据安全是道德人工智能交互的基本方面。这些考虑必须融入人工智能系统的开发和部署中，以促进负责任和道德的人工智能使用。
- en: 4.3 COMBINING CONSTRAINTS FOR TAILORED CONTENT
  id: totrans-416
  prefs: []
  type: TYPE_NORMAL
  zh: 4.3 为定制内容组合约束
- en: In the pursuit of precise and contextually relevant AI-generated content, the
    strategic combination of multiple constraints can be a potent approach. This section
    discusses the art of combining constraints to tailor AI responses, drawing from
    research insights and practical examples to illuminate the effectiveness of this
    technique.
  id: totrans-417
  prefs: []
  type: TYPE_NORMAL
  zh: 在追求精确和情境相关的人工智能生成内容的过程中，战略性地组合多个约束可以是一种强大的方法。本节讨论了组合约束以定制人工智能响应的艺术，借鉴研究洞察力和实际案例来阐明这种技术的有效性。
- en: The Synergy of Multiple Constraints
  id: totrans-418
  prefs: []
  type: TYPE_NORMAL
  zh: 多个约束的协同作用
- en: The application of multiple constraints allows for a fine-tuned approach to
    AI content generation. By carefully combining constraints, users can shape responses
    to meet specific requirements while ensuring ethical, accurate, and contextually
    appropriate interactions.
  id: totrans-419
  prefs: []
  type: TYPE_NORMAL
  zh: 通过应用多个约束，可以实现针对人工智能内容生成的精细调整方法。通过仔细组合约束条件，用户可以塑造响应以满足特定要求，同时确保道德、准确和情境适当的交互。
- en: 'EXAMPLE 1: Crafting Ethical Marketing Content'
  id: totrans-420
  prefs: []
  type: TYPE_NORMAL
  zh: 示例 1：制作道德营销内容
- en: 'Prompt: “Generate a marketing tagline for our new product, ensuring it is catchy
    but free from any offensive language or stereotypes.”'
  id: totrans-421
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：“为我们的新产品生成一个吸引人的营销标语，确保它引人注目且不包含任何冒犯性语言或刻板印象。”
- en: 'Analysis: This prompt combines constraints related to marketing effectiveness
    and ethical considerations. The resulting tagline should be both engaging and
    socially responsible, reflecting a balance between marketing goals and ethical
    standards.'
  id: totrans-422
  prefs: []
  type: TYPE_NORMAL
  zh: 分析：这个提示结合了与营销有效性和道德考虑相关的约束。生成的标语应既吸引人又具有社会责任感，反映营销目标和道德标准之间的平衡。
- en: 'EXAMPLE 2: Generating Technical Documentation'
  id: totrans-423
  prefs: []
  type: TYPE_NORMAL
  zh: 示例 2：生成技术文档
- en: 'Prompt: “Provide technical documentation for our software product in a concise
    and jargon-free manner.”'
  id: totrans-424
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：以简洁无术语的方式提供我们软件产品的技术文档。
- en: 'Analysis: This prompt blends constraints of conciseness and plain language
    use. It directs the AI to generate documentation that is both user-friendly and
    easily understandable, catering to a broader audience.'
  id: totrans-425
  prefs: []
  type: TYPE_NORMAL
  zh: 分析：这个提示结合了简洁性和使用平实语言的约束。它指导人工智能生成既用户友好又易于理解的文档，满足更广泛的受众。
- en: 'EXAMPLE 3: Crafting Sensitive Medical Content'
  id: totrans-426
  prefs: []
  type: TYPE_NORMAL
  zh: 示例 3：制作敏感医疗内容
- en: 'Prompt: “Explain the side effects of this medication, keeping the language
    simple and avoiding any alarming language.”'
  id: totrans-427
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：“解释这种药物的可能副作用，使用简单语言并避免任何令人担忧的表述。”
- en: 'Analysis: Here, constraints related to simplicity and avoiding alarmist language
    are employed. The AI response must ensure clarity while not raising undue concerns
    among users about potential side effects.'
  id: totrans-428
  prefs: []
  type: TYPE_NORMAL
  zh: 分析：在这里，与简单性和避免引起恐慌性语言相关的约束被采用。人工智能响应必须确保清晰，同时不引起用户对潜在副作用的过度担忧。
- en: 'EXAMPLE 4: Content for Education'
  id: totrans-429
  prefs: []
  type: TYPE_NORMAL
  zh: 'EXAMPLE 4: 教育内容示例'
- en: 'Prompt: “Write an educational article on climate change for middle school students,
    using language appropriate for their age and maintaining scientific accuracy.”'
  id: totrans-430
  prefs: []
  type: TYPE_NORMAL
  zh: 提示语：“为中学生撰写一篇关于气候变化的科普文章，使用适合他们年龄的语言，并保持科学准确性。”
- en: 'Analysis: This prompt combines constraints of age-appropriate language and
    scientific accuracy. The AI’s response should strike a balance, making complex
    scientific concepts accessible to a younger audience while maintaining factual
    integrity.'
  id: totrans-431
  prefs: []
  type: TYPE_NORMAL
  zh: 分析：此提示语结合了适合年龄的语言和科学准确性的约束。AI的回应应保持平衡，使复杂的科学概念对年轻观众易于理解，同时保持事实的完整性。
- en: 'EXAMPLE 5: Ethical Sales Pitch'
  id: totrans-432
  prefs: []
  type: TYPE_NORMAL
  zh: 'EXAMPLE 5: 伦理销售提案'
- en: 'Prompt: “Compose a sales pitch for our eco-friendly product, emphasizing its
    environmental benefits while avoiding greenwashing or exaggeration.”'
  id: totrans-433
  prefs: []
  type: TYPE_NORMAL
  zh: 提示语：“为我们的环保产品撰写一个销售提案，强调其环境效益，同时避免绿色洗脑或夸张。”
- en: 'Analysis: This request merges constraints related to environmental messaging
    and ethical marketing. The AI-generated sales pitch must promote the product’s
    environmental virtues transparently and honestly.'
  id: totrans-434
  prefs: []
  type: TYPE_NORMAL
  zh: 分析：这个请求结合了与环保信息和道德营销相关的约束。AI生成的销售提案必须透明、诚实地推广产品的环境优点。
- en: In summary, combining constraints for tailored content allows users to fine-tune
    AI responses to meet diverse objectives while upholding ethical, contextual, and
    user-centric considerations. The synergy of constraints can produce content that
    strikes a harmonious balance between competing requirements, resulting in responses
    that are both precise and contextually relevant.
  id: totrans-435
  prefs: []
  type: TYPE_NORMAL
  zh: 总结来说，结合针对定制内容的约束，使用户能够微调AI回应以满足多样化的目标，同时维护伦理、情境和以用户为中心的考虑。约束的协同作用可以产生在竞争性要求之间达到和谐平衡的内容，从而产生既精确又与情境相关的回应。
- en: CHAPTER 5
  id: totrans-436
  prefs: []
  type: TYPE_NORMAL
  zh: 第五章
- en: CREATIVE PROMPTS FOR DIVERSE
  id: totrans-437
  prefs: []
  type: TYPE_NORMAL
  zh: 多样化的创意提示语
- en: CONTENT
  id: totrans-438
  prefs: []
  type: TYPE_NORMAL
  zh: 内容
- en: '[Chapter 5](chapter05.xhtml) investigates creative prompt engineering, where
    the fusion of imagination and AI-generated content is important. By mastering
    the art of crafting open-ended prompts, we unlock ChatGPT’s potential to generate
    a wide range of creative outputs, from stories and poetry to innovative ideas.'
  id: totrans-439
  prefs: []
  type: TYPE_NORMAL
  zh: '[第五章](chapter05.xhtml)探讨了创意提示语工程，其中想象力和AI生成内容的融合至关重要。通过掌握制作开放式提示语的技艺，我们解锁了ChatGPT生成各种创意输出的潜力，从故事和诗歌到创新想法。'
- en: 5.1 INSPIRING CREATIVE WRITING WITH OPEN-ENDED PROMPTS
  id: totrans-440
  prefs: []
  type: TYPE_NORMAL
  zh: 5.1 使用开放式提示语激发创意写作
- en: Open-ended prompts are a catalyst for creativity in AI-driven content generation.
    This section explores the art of inspiring creative writing through open-ended
    prompts. The practical examples of prompts in this chapter were developed using
    ChatGPT application.
  id: totrans-441
  prefs: []
  type: TYPE_NORMAL
  zh: 开放式提示语是AI驱动内容生成中创造力的催化剂。本节探讨了通过开放式提示语激发创意写作的艺术。本章中提示语的实用示例是使用ChatGPT应用开发的。
- en: Fostering Creativity Through Openness
  id: totrans-442
  prefs: []
  type: TYPE_NORMAL
  zh: 通过开放性促进创造力
- en: Open-ended prompts are characterized by their inherent lack of constraints.
    They provide the creative freedom necessary for AI models to generate content
    that is imaginative, innovative, and tailored to specific creative objectives.
  id: totrans-443
  prefs: []
  type: TYPE_NORMAL
  zh: 开放式提示语的特点在于其固有的约束缺失。它们提供了必要的创造性自由，使AI模型能够生成富有想象力、创新性并针对特定创意目标的内 容。
- en: 'EXAMPLE 1: Crafting a Short Story'
  id: totrans-444
  prefs: []
  type: TYPE_NORMAL
  zh: 'EXAMPLE 1: 编写短篇小说'
- en: 'Prompt: “Write a short story that begins with the sentence: ‘The old, dusty
    book sat unopened on the shelf, waiting for someone brave enough to turn its pages.’”'
  id: totrans-445
  prefs: []
  type: TYPE_NORMAL
  zh: 提示语：“写一个以‘那本老旧、尘封的书静静地放在书架上，等待着有人勇敢地翻动它的书页’开头的短篇小说。”
- en: 'Analysis: This open-ended prompt offers the freedom to explore countless narrative
    possibilities. It sparks creativity by presenting an intriguing scenario but leaves
    the plot, characters, and themes entirely to the writer’s imagination.'
  id: totrans-446
  prefs: []
  type: TYPE_NORMAL
  zh: 分析：这个开放式提示语提供了探索无数叙事可能性的自由。它通过呈现一个引人入胜的场景来激发创造力，但将情节、人物和主题完全留给作者的想象力。
- en: 'EXAMPLE 2: Creating Poetry'
  id: totrans-447
  prefs: []
  type: TYPE_NORMAL
  zh: 'EXAMPLE 2: 创作诗歌'
- en: 'Prompt: “Compose a poem inspired by the concept of ‘silence.’”'
  id: totrans-448
  prefs: []
  type: TYPE_NORMAL
  zh: 提示语：“以‘沉默’的概念为灵感创作一首诗。”
- en: 'Analysis: Poetry often thrives in open-ended settings. This prompt invites
    writers to explore the multifaceted theme of “silence” in their own unique ways,
    allowing for diverse interpretations and poetic expressions.'
  id: totrans-449
  prefs: []
  type: TYPE_NORMAL
  zh: 分析：诗歌往往在开放式环境中蓬勃发展。此提示语邀请作家以他们独特的方式探索“沉默”的多重主题，允许有各种各样的解释和诗歌表达。
- en: 'EXAMPLE 3: Designing Artwork Descriptions'
  id: totrans-450
  prefs: []
  type: TYPE_NORMAL
  zh: 'EXAMPLE 3: 设计艺术品描述'
- en: 'Prompt: “Write a compelling description for an abstract painting that evokes
    a sense of wonder.”'
  id: totrans-451
  prefs: []
  type: TYPE_NORMAL
  zh: 提示： “为激发惊奇感的抽象画作写一段引人入胜的描述。”
- en: 'Analysis: This prompt empowers writers to craft vivid descriptions without
    prescribing specific details. It fosters creative expression by encouraging writers
    to evoke emotions and imagery through their words.'
  id: totrans-452
  prefs: []
  type: TYPE_NORMAL
  zh: 分析：这个提示让作者能够创作生动的描述，而不需要指定具体细节。它通过鼓励作者用他们的文字唤起情感和意象来培养创造性表达。
- en: 'EXAMPLE 4: Developing Dialogues'
  id: totrans-453
  prefs: []
  type: TYPE_NORMAL
  zh: 'EXAMPLE 4: 发展对话'
- en: 'Prompt: “Write a dialogue between two characters meeting for the first time
    in a bustling city park.”'
  id: totrans-454
  prefs: []
  type: TYPE_NORMAL
  zh: 提示： “写一段对话，两个在繁忙的城市公园初次见面的角色之间的对话。”
- en: 'Analysis: Dialogues are excellent vehicles for character development and storytelling.
    This open-ended prompt sets the stage for character interaction while leaving
    the nature of their conversation and the direction of the plot open to the writer’s
    imagination.'
  id: totrans-455
  prefs: []
  type: TYPE_NORMAL
  zh: 分析：对话是角色发展和讲故事的良好工具。这个开放式提示为角色互动设定了舞台，同时将对话的性质和情节方向留给作者的想象力。
- en: 'EXAMPLE 5: Crafting Innovative Solutions'
  id: totrans-456
  prefs: []
  type: TYPE_NORMAL
  zh: 'EXAMPLE 5: 构建创新解决方案'
- en: 'Prompt: “Describe a futuristic invention that revolutionizes transportation.”'
  id: totrans-457
  prefs: []
  type: TYPE_NORMAL
  zh: 提示： “描述一项革命性的交通发明。”
- en: 'Analysis: Futuristic scenarios are ideal for open-ended prompts. This prompt
    encourages writers to envision and articulate imaginative inventions, pushing
    the boundaries of innovation and creativity.'
  id: totrans-458
  prefs: []
  type: TYPE_NORMAL
  zh: 分析：未来场景是开放式提示的理想选择。这个提示鼓励作者想象并阐述富有想象力的发明，推动创新和创造性的边界。
- en: In conclusion, open-ended prompts are invaluable tools for inspiring creative
    writing. They offer writers the freedom to explore, imagine, and innovate without
    the constraints of rigid guidelines. By leveraging ambiguity, themes, emotional
    depth, character interactions, and forward-thinking concepts, open-ended prompts
    unlock the full spectrum of creative potential in AI-driven content generation.
  id: totrans-459
  prefs: []
  type: TYPE_NORMAL
  zh: 总之，开放式提示对于激发创造性写作是无价之宝。它们为作者提供了探索、想象和创新的空间，不受严格指南的约束。通过利用含糊性、主题、情感深度、角色互动和前瞻性概念，开放式提示在人工智能驱动的内容生成中释放了全部的创意潜力。
- en: 5.2 GENERATING POETRY, STORIES, AND DIALOGUES
  id: totrans-460
  prefs: []
  type: TYPE_NORMAL
  zh: 5.2 生成诗歌、故事和对话
- en: The versatility of AI in creative content generation is showcased in its ability
    to craft poetry, stories, and dialogues. This section explores how AI can be used
    to produce compelling literary works. The practical examples of prompts in this
    chapter were developed using ChatGPT application.
  id: totrans-461
  prefs: []
  type: TYPE_NORMAL
  zh: 在创意内容生成中，人工智能的多样性体现在其能够创作诗歌、故事和对话的能力。本节探讨了如何使用人工智能创作引人入胜的文学作品。本章中提示的实用例子是使用ChatGPT应用程序开发的。
- en: AI as a Creative Muse
  id: totrans-462
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能作为创意灵感的源泉
- en: AI models have emerged as a source of inspiration for poets, authors, and playwrights.
    They can generate poetry, stories, and dialogues that span a wide range of themes
    and styles, providing a wellspring of creative ideas.
  id: totrans-463
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能模型已成为诗人、作家和剧作家的灵感来源。它们可以生成跨越广泛主题和风格的诗歌、故事和对话，提供丰富的创意源泉。
- en: 'EXAMPLE 1: Poetry Generation'
  id: totrans-464
  prefs: []
  type: TYPE_NORMAL
  zh: 'EXAMPLE 1: 诗歌生成'
- en: 'Prompt: “Compose a poem that captures the essence of a serene forest at dawn.”'
  id: totrans-465
  prefs: []
  type: TYPE_NORMAL
  zh: 提示： “创作一首诗，捕捉黎明时分宁静森林的本质。”
- en: 'Analysis: AI can weave words into poetic verses, evoking the tranquil beauty
    of a forest awakening to the first light of day. Poems like these are not just
    the result of algorithms but a harmonious blend of data-driven creativity.'
  id: totrans-466
  prefs: []
  type: TYPE_NORMAL
  zh: 分析：人工智能可以将文字编织成诗意的诗句，唤起森林在第一缕晨光中苏醒的宁静美景。这样的诗歌不仅仅是算法的结果，而是数据驱动创造力的和谐融合。
- en: 'EXAMPLE 2: Storytelling'
  id: totrans-467
  prefs: []
  type: TYPE_NORMAL
  zh: 'EXAMPLE 2: 讲故事'
- en: 'Prompt: “Craft a short story about a time traveler who discovers a forgotten
    civilization in the depths of the Amazon rainforest.”'
  id: totrans-468
  prefs: []
  type: TYPE_NORMAL
  zh: 提示： “创作一个关于时间旅行者发现亚马逊雨林深处一个被遗忘文明的故事。”
- en: 'Analysis: AI-driven storytelling unfolds like a literary journey, immersing
    readers in imaginative tales that blend elements of science fiction, adventure,
    and exploration. The result is a narrative that sparks curiosity and wonder.'
  id: totrans-469
  prefs: []
  type: TYPE_NORMAL
  zh: 分析：人工智能驱动的讲故事就像一场文学之旅，将读者沉浸在融合科幻、冒险和探索元素的想象故事中。结果是激发好奇心和惊奇感的叙事。
- en: 'EXAMPLE 3: Dialogue Creation'
  id: totrans-470
  prefs: []
  type: TYPE_NORMAL
  zh: 'EXAMPLE 3: 对话创作'
- en: 'Prompt: “Write a dialogue between a wise old sage and a curious young apprentice
    discussing the secrets of the universe.”'
  id: totrans-471
  prefs: []
  type: TYPE_NORMAL
  zh: 提示： “写一段对话，一位智慧的老贤者和一位好奇的年轻学徒讨论宇宙的秘密。”
- en: 'Analysis: AI-generated dialogues breathe life into characters, enabling them
    to engage in meaningful conversations. These interactions may explore philosophical
    concepts, impart wisdom, or offer valuable insights.'
  id: totrans-472
  prefs: []
  type: TYPE_NORMAL
  zh: 分析：AI生成的对话为角色注入生命，使它们能够进行有意义的对话。这些互动可能探讨哲学概念，传授智慧，或提供有价值的见解。
- en: 'EXAMPLE 4: Collaborative Storytelling'
  id: totrans-473
  prefs: []
  type: TYPE_NORMAL
  zh: 示例4：协作故事讲述
- en: 'Prompt: “As a creative writing assistant, collaborate with me to write a fiction
    story.”'
  id: totrans-474
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：“作为一位创意写作助手，与我合作编写一部小说。”
- en: 'Analysis: Collaborative storytelling with AI is an interactive and creative
    process. It combines human imagination with AI’s ability to generate coherent
    and contextually relevant content.'
  id: totrans-475
  prefs: []
  type: TYPE_NORMAL
  zh: 分析：与AI协作讲故事是一个互动和创造性的过程。它结合了人类的想象力与AI生成连贯且与上下文相关内容的能力。
- en: 'EXAMPLE 5: Historical Dialogue Recreation'
  id: totrans-476
  prefs: []
  type: TYPE_NORMAL
  zh: 示例5：历史对话重现
- en: 'Prompt: “Create a conversation between two historical figures, Albert Einstein
    and Marie Curie, discussing their ground-breaking discoveries.”'
  id: totrans-477
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：“创造一场历史人物阿尔伯特·爱因斯坦和玛丽·居里之间的对话，讨论他们的突破性发现。”
- en: 'Analysis: AI-driven dialogue recreation can make historical figures realistic,
    allowing them to engage in hypothetical conversations that shed light on their
    thoughts, motivations, and interactions. This enriches historical storytelling
    and education.'
  id: totrans-478
  prefs: []
  type: TYPE_NORMAL
  zh: 分析：AI驱动的对话重现可以使历史人物栩栩如生，使他们能够参与假设性的对话，揭示他们的思想、动机和互动。这丰富了历史故事讲述和教育。
- en: In summary, AI’s capacity to generate poetry, stories, and dialogues opens up
    exciting possibilities for creativity. It serves as a muse, offering thematic,
    narrative, and character-driven content that can inspire writers and readers alike.
    The examples provided demonstrate how AI can be a valuable tool for creative content
    generation, fostering new avenues of literary exploration.
  id: totrans-479
  prefs: []
  type: TYPE_NORMAL
  zh: 总结来说，AI生成诗歌、故事和对话的能力为创造力开辟了令人兴奋的可能性。它作为一位缪斯，提供主题、叙事和角色驱动的内蓉，可以激发作家和读者的灵感。提供的例子展示了AI如何成为创意内容生成的宝贵工具，促进文学探索的新途径。
- en: 5.3 USING PROMPTS TO GENERATE IDEAS AND CONCEPTS
  id: totrans-480
  prefs: []
  type: TYPE_NORMAL
  zh: 5.3 使用提示生成想法和概念
- en: Prompts are powerful tools not only for generating content but also for helping
    people develop creative ideas and innovative concepts. This section explores how
    prompts can be employed to stimulate creativity and idea generation. The practical
    examples of prompts in this chapter were developed using ChatGPT application.
  id: totrans-481
  prefs: []
  type: TYPE_NORMAL
  zh: 提示不仅是生成内容的有力工具，还有助于人们发展创意想法和创新概念。本节探讨了如何利用提示来激发创造力和想法生成。本章中提示的实用示例是使用ChatGPT应用开发的。
- en: Prompts as Creative Catalysts
  id: totrans-482
  prefs: []
  type: TYPE_NORMAL
  zh: 提示作为创意催化剂
- en: Prompts serve as catalysts for inspiration, and are capable of helping people
    develop creative ideas, guiding individuals toward novel ideas and concepts.
  id: totrans-483
  prefs: []
  type: TYPE_NORMAL
  zh: 提示作为灵感的催化剂，能够帮助人们发展创意想法，引导个人走向新颖的想法和概念。
- en: 'EXAMPLE 1: Designing Futuristic Technology'
  id: totrans-484
  prefs: []
  type: TYPE_NORMAL
  zh: 示例1：设计未来科技
- en: 'Prompt: “Envision a future technology that could revolutionize communication.
    Describe its functions and user experience.”'
  id: totrans-485
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：“设想一种可能革命化通信的未来技术。描述其功能和用户体验。”
- en: 'Analysis: This prompt encourages forward-thinking and innovation in technology
    design. It challenges individuals to conceptualize breakthroughs in communication,
    blending creativity with practicality.'
  id: totrans-486
  prefs: []
  type: TYPE_NORMAL
  zh: 分析：这个提示鼓励在技术设计上进行前瞻性思考和革新。它挑战个人构思通信领域的突破，将创造性与实用性相结合。
- en: 'EXAMPLE 2: Crafting Unique Culinary Recipes'
  id: totrans-487
  prefs: []
  type: TYPE_NORMAL
  zh: 示例2：制作独特的烹饪食谱
- en: 'Prompt: “Create a recipe for a dish that combines traditional cuisine with
    modern cooking techniques.”'
  id: totrans-488
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：“创造一道结合传统烹饪与现代烹饪技术的食谱。”
- en: 'Analysis: This prompt inspires culinary creativity, merging the old with the
    new. It encourages chefs to experiment with flavors and techniques, leading to
    unique culinary creations.'
  id: totrans-489
  prefs: []
  type: TYPE_NORMAL
  zh: 分析：这个提示激发烹饪创意，将传统与现代融合。它鼓励厨师尝试口味和技术，从而产生独特的烹饪作品。
- en: 'EXAMPLE 3: Developing Business Strategies'
  id: totrans-490
  prefs: []
  type: TYPE_NORMAL
  zh: 示例3：制定商业策略
- en: 'Prompt: “Devise a business strategy for a startup that aims to use AI for social
    good.”'
  id: totrans-491
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：“为一家旨在利用AI为社会带来好处的初创企业制定商业策略。”
- en: 'Analysis: In the business world, prompts like this stimulate strategic thinking
    and entrepreneurial innovation. It challenges business minds to integrate AI technology
    with social impact initiatives.'
  id: totrans-492
  prefs: []
  type: TYPE_NORMAL
  zh: 分析：在商业界，这样的提示刺激战略思维和创业创新。它挑战商业人士将AI技术与社会影响倡议相结合。
- en: 'EXAMPLE 4: Conceptualizing Architectural Designs'
  id: totrans-493
  prefs: []
  type: TYPE_NORMAL
  zh: 示例4：构思建筑设计
- en: 'Prompt: “Design an eco-friendly residential building that blends with its natural
    surroundings.”'
  id: totrans-494
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：“设计一座与自然环境融合的环保住宅楼。”
- en: 'Analysis: This prompt encourages architects to think about sustainable design
    and harmony with nature. It fosters creativity in environmental architecture and
    green living spaces.'
  id: totrans-495
  prefs: []
  type: TYPE_NORMAL
  zh: 分析：这个提示鼓励建筑师思考可持续设计和与自然的和谐相处。它促进了环境建筑和绿色生活空间的创造力。
- en: 'EXAMPLE 5: Generating Educational Program Ideas'
  id: totrans-496
  prefs: []
  type: TYPE_NORMAL
  zh: 示例5：生成教育项目想法
- en: 'Prompt: “Develop an idea for an educational program that incorporates virtual
    reality to enhance learning.”'
  id: totrans-497
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：“提出一个结合虚拟现实以增强学习的教育项目想法。”
- en: 'Analysis: This prompt invites educators to think about the integration of technology
    in learning. It challenges them to create immersive and interactive educational
    experiences using virtual reality.'
  id: totrans-498
  prefs: []
  type: TYPE_NORMAL
  zh: 分析：这个提示邀请教育工作者思考技术在学习中的应用。它挑战他们使用虚拟现实创造沉浸式和互动式的教育体验。
- en: In conclusion, prompts are versatile tools for idea generation and concept development
    across various disciplines. By employing problem-solving frameworks, abstract
    expression, contextual challenges, genre and theme exploration, and scientific
    inquiry, individuals can leverage prompts to unlock their creative potential and
    generate innovative ideas and concepts.
  id: totrans-499
  prefs: []
  type: TYPE_NORMAL
  zh: 总之，提示是跨学科中用于创意生成和概念发展的多功能工具。通过运用问题解决框架、抽象表达、情境挑战、体裁和主题探索以及科学探究，个人可以利用提示来释放他们的创造力，生成创新的想法和概念。
- en: 5.4 EXPLORING CREATIVITY THROUGH MULTIMODAL PROMPTS
  id: totrans-500
  prefs: []
  type: TYPE_NORMAL
  zh: 5.4 通过多模态提示探索创造力
- en: The convergence of multiple modes of expression, such as text, images, and audio,
    opens new creative possibilities. This section explores how multimodal prompts
    can be used for innovative and imaginative content creation using research insights
    and practical examples. Please note that currently, Chat-GPT and GPT-4 are text
    based. Tools like OpenAI’s CLIP (Contrastive Language-Image Pre-training) and
    DALL-E are examples that combine vision and language to generate a new result.
    Recently, GPT-4 obtained the ability to utilize voice and speech as prompts. This
    feature enables users to talk with GPT-4while the conversation is saved and becomes
    available when desired. According to OpenAI, this feature allows for an AI that
    “…can see, hear, and speak.” In GPT-4, the “see-hear-speak” capability represents
    a significant advancement in the model’s multimodal abilities. While earlier versions
    primarily processed and generated text, GPT-4 integrates multiple modalities,
    allowing it to understand and generate content across visual, auditory, and textual
    domains. This means that GPT-4 can “see” by processing and interpreting images,
    “hear” by understanding auditory signals, and “speak” by producing text or potentially
    other output forms. This multimodal approach enhances the model’s versatility,
    enabling more comprehensive interactions and applications. Whether it is describing
    the contents of an image, transcribing an audio clip, or generating text based
    on multi-sensory input, the see-hear-speak feature positions GPT-4 at the forefront
    of AI capabilities.
  id: totrans-501
  prefs: []
  type: TYPE_NORMAL
  zh: 多种表达方式（如文本、图像和音频）的融合，开启了新的创意可能性。本节探讨了如何利用研究洞察力和实际案例，通过多模态提示进行创新和富有想象力的内容创作。请注意，目前Chat-GPT和GPT-4是基于文本的。像OpenAI的CLIP（对比语言-图像预训练）和DALL-E这样的工具，就是将视觉和语言结合以生成新结果的例子。最近，GPT-4获得了利用语音和语音作为提示的能力。这一功能使用户能够在对话保存的同时与GPT-4进行交谈，并在需要时提供对话内容。根据OpenAI的说法，这一功能使得AI“...能够看、听、说。”在GPT-4中，“看-听-说”能力代表了模型多模态能力的重大进步。虽然早期版本主要处理和生成文本，但GPT-4整合了多种模态，使其能够理解和生成视觉、听觉和文本领域的跨域内容。这意味着GPT-4可以通过处理和解释图像“看”，通过理解听觉信号“听”，并通过产生文本或可能的其他输出形式“说”。这种多模态方法增强了模型的多功能性，使其能够进行更全面的交互和应用。无论是描述图像内容、转录音频片段，还是基于多感官输入生成文本，see-hear-speak功能将GPT-4置于AI能力的前沿。
- en: The Power of Multimodal Creativity
  id: totrans-502
  prefs: []
  type: TYPE_NORMAL
  zh: 多模态创造力的力量
- en: Multimodal prompts combine various forms of media to inspire creativity. These
    prompts go beyond using only text and encourage individuals to engage with visual,
    auditory, and textual elements, resulting in the users enjoying more dynamic and
    enriched creative processes.
  id: totrans-503
  prefs: []
  type: TYPE_NORMAL
  zh: 多模态提示结合了各种媒体形式来激发创造力。这些提示不仅超越了仅使用文本，还鼓励个人与视觉、听觉和文本元素互动，使用户享受更动态和丰富的创作过程。
- en: 'EXAMPLE 1: Visual Storytelling'
  id: totrans-504
  prefs: []
  type: TYPE_NORMAL
  zh: 示例1：视觉叙事
- en: 'Multimodal Prompt: “Create a short story inspired by this image: [insert image
    of a mysterious forest at night]. Use both text and imagery to convey the narrative.”'
  id: totrans-505
  prefs: []
  type: TYPE_NORMAL
  zh: 多模态提示： “根据这张图片创作一个短篇故事：[插入一张夜晚神秘森林的图片]。使用文字和图像来传达故事。”
- en: 'Analysis: This multimodal prompt challenges the AI to not only craft compelling
    narratives but also incorporate the visual elements of the mysterious forest into
    its stories. The prompt and its results encourage a synergy between textual and
    visual storytelling, fostering the user’s creativity.'
  id: totrans-506
  prefs: []
  type: TYPE_NORMAL
  zh: 分析：这个多模态提示挑战AI不仅构建引人入胜的叙事，还将神秘森林的视觉元素融入其故事中。提示及其结果促进了文本和视觉叙事的协同作用，激发用户的创造力。
- en: 'Example 2: Music and Poetry Fusion'
  id: totrans-507
  prefs: []
  type: TYPE_NORMAL
  zh: 例2：音乐与诗歌融合
- en: 'Multimodal Prompt: “Compose a poem inspired by the melody of this music clip:
    [insert audio clip of a tranquil piano piece].”'
  id: totrans-508
  prefs: []
  type: TYPE_NORMAL
  zh: 多模态提示：“根据这个音乐片段的旋律创作一首诗：[插入一段宁静的钢琴曲音频片段]。”
- en: 'Analysis: This prompt asks the AI to synchronize the words of the poem with
    the mood and rhythm of the provided music clip, creating a unique fusion of auditory
    and textual results.'
  id: totrans-509
  prefs: []
  type: TYPE_NORMAL
  zh: 分析：这个提示要求AI将诗歌的文字与提供的音乐片段的情绪和节奏同步，创造独特的视听和文字结果的融合。
- en: 'EXAMPLE 3: Interactive Visual Art'
  id: totrans-510
  prefs: []
  type: TYPE_NORMAL
  zh: 例3：交互式视觉艺术
- en: 'Multimodal Prompt: “Produce an interactive digital artwork that changes in
    response to user interactions. Incorporate both visual and auditory elements to
    create an immersive experience.”'
  id: totrans-511
  prefs: []
  type: TYPE_NORMAL
  zh: 多模态提示：“制作一个根据用户交互而变化的交互式数字艺术作品。结合视觉和听觉元素以创造沉浸式体验。”
- en: 'Analysis: This multimodal prompt challenges digital artists to create dynamic
    and interactive artworks that engage users on multiple sensory levels. It encourages
    the exploration of user-driven creativity.'
  id: totrans-512
  prefs: []
  type: TYPE_NORMAL
  zh: 分析：这个多模态提示挑战数字艺术家创作动态和互动的艺术作品，在多个感官层面上吸引用户。它鼓励探索用户驱动的创造力。
- en: 'EXAMPLE 4: Podcast Scriptwriting'
  id: totrans-513
  prefs: []
  type: TYPE_NORMAL
  zh: 例4：播客脚本编写
- en: 'Multimodal Prompt: “Write a script for a podcast episode discussing the future
    of space exploration. Include not only the dialogue but also visual cues for accompanying
    animations.”'
  id: totrans-514
  prefs: []
  type: TYPE_NORMAL
  zh: 多模态提示：“为讨论太空探索未来的播客剧集编写脚本。包括对话以及伴随动画的视觉提示。”
- en: 'Analysis: This prompt combines textual elements with the anticipation of visual
    and auditory components. Podcast scriptwriters are tasked with crafting engaging
    narratives that seamlessly integrate with multimedia content, promoting a holistic
    approach to storytelling.'
  id: totrans-515
  prefs: []
  type: TYPE_NORMAL
  zh: 分析：这个提示将文本元素与视觉和听觉成分的预期相结合。播客脚本编写者被要求创作引人入胜的叙事，这些叙事能够无缝地与多媒体内容结合，促进叙事的整体方法。
- en: 'EXAMPLE 5: Visual Poetry Performance'
  id: totrans-516
  prefs: []
  type: TYPE_NORMAL
  zh: 例5：视觉诗歌表演
- en: 'Multimodal Prompt: “Create a visual poem that transforms into an audiovisual
    performance. The poem’s text should synchronize with visuals and music, immersing
    the audience in a multisensory experience.”'
  id: totrans-517
  prefs: []
  type: TYPE_NORMAL
  zh: 多模态提示：“创作一首可以转化为视听表演的视觉诗。诗歌的文字应与视觉和音乐同步，使观众沉浸在多感官体验中。”
- en: 'Analysis: This prompt asks the AI to utilize the written word to develop a
    multisensory performance combining visual aesthetics, audio compositions, and
    poetic expression. This prompt utilizes the AI’s ability to generate content other
    than that of traditional poetry.'
  id: totrans-518
  prefs: []
  type: TYPE_NORMAL
  zh: 分析：这个提示要求AI利用文字来开发一个结合视觉美学、音频创作和诗歌表达的多感官表演。这个提示利用了AI生成除传统诗歌之外内容的能力。
- en: In conclusion, multimodal prompts are potent tools for fostering creativity
    through the integration of various media forms. By employing cross-media integration,
    mood-based creation, immersive experiences, cross-medium storytelling, and sensory
    integration, creators can explore the novel suggestions generated by the AI that
    are superior to the results yielded from single-mode prompts.
  id: totrans-519
  prefs: []
  type: TYPE_NORMAL
  zh: 总之，多模态提示是培养通过整合各种媒体形式创造力的强大工具。通过采用跨媒体整合、基于情绪的创作、沉浸式体验、跨媒体叙事和感官整合，创作者可以探索AI生成的比单模态提示结果更优越的新颖建议。
- en: CHAPTER 6
  id: totrans-520
  prefs: []
  type: TYPE_NORMAL
  zh: 第六章
- en: DEBUGGING AND ITERATING
  id: totrans-521
  prefs: []
  type: TYPE_NORMAL
  zh: 调试和迭代
- en: PROMPTS
  id: totrans-522
  prefs: []
  type: TYPE_NORMAL
  zh: 提示
- en: '[Chapter 6](chapter06.xhtml) describes the process of debugging and iterating
    prompts. Just as an artisan refines a masterpiece stroke by stroke, so too must
    prompt engineers scrutinize and enhance their prompts to achieve optimal results.
    This chapter discusses the intricacies of identifying, addressing, and learning
    from the challenges that arise in prompt design.'
  id: totrans-523
  prefs: []
  type: TYPE_NORMAL
  zh: '[第6章](chapter06.xhtml)描述了调试和迭代提示的过程。正如工匠一点一点地完善杰作一样，提示工程师也必须仔细审查和改进他们的提示以实现最佳效果。本章讨论了在提示设计中识别、解决和从挑战中学习的复杂性。'
- en: 6.1 INTERPRETING AND ANALYZING MODEL RESPONSES
  id: totrans-524
  prefs: []
  type: TYPE_NORMAL
  zh: 6.1 解释和分析模型响应
- en: Understanding and interpreting model responses is a fundamental aspect of prompt
    engineering, crucial for crafting effective prompts and iteratively improving
    model performance. This section examines the nuances of interpreting model responses
    using research insights and practical examples.
  id: totrans-525
  prefs: []
  type: TYPE_NORMAL
  zh: 理解和解释模型响应是提示工程的基本方面，对于制作有效的提示和迭代改进模型性能至关重要。本节通过研究洞察力和实际示例来探讨解释模型响应的细微差别。
- en: Deciphering Model Outputs
  id: totrans-526
  prefs: []
  type: TYPE_NORMAL
  zh: 解码模型输出
- en: When working with large language models (LLMs) like ChatGPT and GPT-4, interpreting
    model responses goes beyond evaluating grammatical correctness. It involves a
    multifaceted analysis that considers factors such as relevance, coherence, bias,
    and alignment with user intent.
  id: totrans-527
  prefs: []
  type: TYPE_NORMAL
  zh: 当与像ChatGPT和GPT-4这样的大型语言模型（LLMs）合作时，对模型响应的解释不仅涉及评估语法正确性，还涉及多方面的分析，需要考虑相关性、连贯性、偏见以及与用户意图的一致性等因素。
- en: 'EXAMPLE 1: Assessing Relevance'
  id: totrans-528
  prefs: []
  type: TYPE_NORMAL
  zh: 示例 1：评估相关性
- en: 'Prompt: “Explain the concept of black holes.”'
  id: totrans-529
  prefs: []
  type: TYPE_NORMAL
  zh: 提示： “解释黑洞的概念。”
- en: 'Analysis: In this scenario, a relevant model response should provide a clear
    and accurate explanation of black holes in astrophysics. Deviations from this
    topic, such as unrelated anecdotes or off-topic content, indicate a lack of relevance
    in the model’s response.'
  id: totrans-530
  prefs: []
  type: TYPE_NORMAL
  zh: 分析：在这种情况下，一个相关的模型响应应提供对天体物理学中黑洞的清晰和准确解释。偏离这个主题，如无关的轶事或离题内容，表明模型响应缺乏相关性。
- en: 'EXAMPLE 2: Analyzing Coherence'
  id: totrans-531
  prefs: []
  type: TYPE_NORMAL
  zh: 示例 2：分析连贯性
- en: 'Prompt: “Write a story about a detective solving a mysterious murder case in
    a small coastal town.”'
  id: totrans-532
  prefs: []
  type: TYPE_NORMAL
  zh: 提示： “写一个关于侦探在一个小沿海城镇解决神秘谋杀案的故事。”
- en: 'Analysis: Coherence is vital in narrative prompts. A coherent model response
    should follow a logical storyline with well-connected plot points, characters,
    and events. Incoherent storytelling disrupts the narrative flow.'
  id: totrans-533
  prefs: []
  type: TYPE_NORMAL
  zh: 分析：在叙事提示中，连贯性至关重要。一个连贯的模型响应应遵循逻辑故事线，情节、人物和事件紧密相连。不连贯的叙事会破坏叙事流程。
- en: 'EXAMPLE 3: Identifying Bias'
  id: totrans-534
  prefs: []
  type: TYPE_NORMAL
  zh: 示例 3：识别偏见
- en: 'Prompt: “Discuss the advantages and disadvantages of a universal healthcare
    system.”'
  id: totrans-535
  prefs: []
  type: TYPE_NORMAL
  zh: 提示： “讨论普遍医疗保健系统的优缺点。”
- en: 'Analysis: Bias detection is crucial when assessing responses to prompts that
    involve opinion or analysis. Biased content may present a one-sided view or use
    emotionally charged language, undermining the objectivity of the response.'
  id: totrans-536
  prefs: []
  type: TYPE_NORMAL
  zh: 分析：在评估涉及意见或分析的建议时，偏见检测至关重要。有偏见的内容可能呈现单方面的观点或使用情绪化的语言，从而破坏响应的客观性。
- en: 'EXAMPLE 4: Evaluating Completeness'
  id: totrans-537
  prefs: []
  type: TYPE_NORMAL
  zh: 示例 4：评估完整性
- en: 'Prompt: “Explain the process of photosynthesis.”'
  id: totrans-538
  prefs: []
  type: TYPE_NORMAL
  zh: 提示： “解释光合作用的过程。”
- en: 'Analysis: Completeness involves assessing whether the model response provides
    a comprehensive explanation of the topic. Incomplete responses may omit critical
    details or steps, leaving gaps in the explanation.'
  id: totrans-539
  prefs: []
  type: TYPE_NORMAL
  zh: 分析：完整性涉及评估模型响应是否提供了对主题的全面解释。不完整的响应可能省略关键细节或步骤，留下解释中的空白。
- en: 'EXAMPLE 5: User Intent Alignment'
  id: totrans-540
  prefs: []
  type: TYPE_NORMAL
  zh: 示例 5：用户意图一致性
- en: 'Prompt: “Suggest vegetarian recipes for a family dinner party.”'
  id: totrans-541
  prefs: []
  type: TYPE_NORMAL
  zh: 提示： “为家庭晚餐聚会建议素食食谱。”
- en: 'Analysis: Alignment with user intent is essential in prompts with specific
    requests. The model’s response should offer suitable vegetarian recipes tailored
    to a family dinner party, aligning with the user’s intent.'
  id: totrans-542
  prefs: []
  type: TYPE_NORMAL
  zh: 分析：在具有特定请求的提示中，与用户意图的一致性至关重要。模型的响应应提供适合家庭晚餐聚会的合适素食食谱，与用户的意图相一致。
- en: 'In conclusion, interpreting and analyzing model responses is a multifaceted
    process that involves evaluating relevance, coherence, bias, completeness, and
    alignment with user intent. By employing these techniques, prompt engineers can
    gain deeper insights into model behavior, identify areas for improvement, and
    iteratively refine prompts to achieve more accurate and contextually relevant
    responses. We can ask ChatGPT to analyze its responses. For example, the prompt
    in Example 1 can be written as: “Explain the concept of black holes. Analyze your
    response in terms of relevance with writing a short paragraph and cite three actual
    references.”'
  id: totrans-543
  prefs: []
  type: TYPE_NORMAL
  zh: 总之，解释和分析模型响应是一个多方面的过程，涉及评估相关性、连贯性、偏见、完整性和与用户意图的一致性。通过采用这些技术，提示工程师可以更深入地了解模型行为，确定改进领域，并迭代地改进提示以实现更准确和上下文相关的响应。我们可以要求ChatGPT分析其响应。例如，示例1中的提示可以写成：“解释黑洞的概念。从相关性角度分析你的响应，写一个简短的段落并引用三个实际参考文献。”
- en: 6.2 IDENTIFYING MISUNDERSTANDINGS AND ERRORS
  id: totrans-544
  prefs: []
  type: TYPE_NORMAL
  zh: 6.2 识别误解和错误
- en: One of the key challenges in prompt engineering is the identification and rectification
    of misunderstandings and errors in model responses. This section delves into the
    critical process of recognizing and addressing these issues, drawing from research
    insights and practical examples.
  id: totrans-545
  prefs: []
  type: TYPE_NORMAL
  zh: 提示工程中的一个关键挑战是识别和纠正模型响应中的误解和错误。本节深入探讨了识别和解决这些问题的关键过程，借鉴了研究见解和实际案例。
- en: The Challenge of Misunderstandings
  id: totrans-546
  prefs: []
  type: TYPE_NORMAL
  zh: 误解的挑战
- en: Misunderstandings can occur when the model misinterprets the user’s intent,
    leading to responses that are off-topic, inaccurate, or contextually inappropriate.
    Identifying and rectifying these misunderstandings is crucial for improving the
    quality of AI-generated content.
  id: totrans-547
  prefs: []
  type: TYPE_NORMAL
  zh: 当模型误解用户的意图时，可能会发生误解，导致与主题无关、不准确或上下文不适当的响应。识别和纠正这些误解对于提高AI生成内容的质量至关重要。
- en: 'EXAMPLE 1: Ambiguity in Prompts'
  id: totrans-548
  prefs: []
  type: TYPE_NORMAL
  zh: 'EXAMPLE 1: 提示中的歧义'
- en: 'Prompt: “Explain the significance of the Big Bang.”'
  id: totrans-549
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：“解释大爆炸的重要性。”
- en: 'Analysis: This prompt, while clear to humans, contains ambiguity that an AI
    model might misinterpret. The model could interpret “Big Bang” as a reference
    to a TV show or a loud noise, leading to a response unrelated to the intended
    astrophysical concept.'
  id: totrans-550
  prefs: []
  type: TYPE_NORMAL
  zh: 分析：虽然这个提示对人类来说很清楚，但它包含了一个AI模型可能会误解的歧义。模型可能会将“大爆炸”解释为电视剧或巨大噪音的参考，从而导致与预期天体物理概念无关的响应。
- en: 'EXAMPLE 2: Handling Multimodal Prompts'
  id: totrans-551
  prefs: []
  type: TYPE_NORMAL
  zh: 'EXAMPLE 2: 处理多模态提示'
- en: 'Multimodal Prompt: “Describe the scene depicted in this image: [insert image
    of a busy city street].”'
  id: totrans-552
  prefs: []
  type: TYPE_NORMAL
  zh: 多模态提示：“描述这张图片所描绘的场景：[插入繁忙的城市街道的图片]。”
- en: 'Analysis: Multimodal prompts, which include visual elements, require carefully
    choosing the correct terminology and images. If the model cannot interpret the
    image correctly, it might produce an inaccurate description that does not align
    with the visual content.'
  id: totrans-553
  prefs: []
  type: TYPE_NORMAL
  zh: 分析：包含视觉元素的多模态提示需要仔细选择正确的术语和图像。如果模型无法正确解释图像，它可能会产生与视觉内容不一致的不准确描述。
- en: 'EXAMPLE 3: Addressing Technical Misconceptions'
  id: totrans-554
  prefs: []
  type: TYPE_NORMAL
  zh: 'EXAMPLE 3: 解决技术误解'
- en: 'Prompt: “Explain the process of nuclear fusion in stars.”'
  id: totrans-555
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：“解释恒星中核聚变的过程。”
- en: 'Analysis: In technical prompts, misunderstandings can lead to inaccuracies
    in responses. If the model misconstrues the scientific concept of nuclear fusion,
    the resulting explanation may contain errors or inaccuracies. Verification may
    be required with reliable published scientific sources and references.'
  id: totrans-556
  prefs: []
  type: TYPE_NORMAL
  zh: 分析：在技术提示中，误解可能导致响应不准确。如果模型误解了核聚变的科学概念，产生的解释可能包含错误或不准确之处。可能需要通过可靠的已发表科学来源和参考文献进行验证。
- en: 'EXAMPLE 4: User Intent Clarification'
  id: totrans-557
  prefs: []
  type: TYPE_NORMAL
  zh: 'EXAMPLE 4: 用户意图澄清'
- en: 'Prompt: “Recommend books for improving mental health.”'
  id: totrans-558
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：“推荐改善心理健康的书籍。”
- en: 'Analysis: User intent can sometimes be unclear, leading to misunderstandings.
    In this case, the user may seek books on coping with stress, while the model might
    recommend books on mental health disorders, resulting in a misalignment of intent.'
  id: totrans-559
  prefs: []
  type: TYPE_NORMAL
  zh: 分析：用户的意图有时可能不清楚，这可能导致误解。在这种情况下，用户可能寻求应对压力的书籍，而模型可能会推荐关于心理健康障碍的书籍，从而导致意图不匹配。
- en: 'EXAMPLE 5: Contextual Misalignment'
  id: totrans-560
  prefs: []
  type: TYPE_NORMAL
  zh: 'EXAMPLE 5: 上下文不匹配'
- en: 'Prompt: “Continue the story from where it left off.”'
  id: totrans-561
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：“从故事中断的地方继续。”
- en: 'Analysis: Prompts that lack specific context may cause the AI model to produce
    responses that do not align with the user’s expectations or the narrative’s continuity,
    resulting in disruptions or incoherent storytelling.'
  id: totrans-562
  prefs: []
  type: TYPE_NORMAL
  zh: 分析：缺乏具体背景的提示可能导致AI模型产生不符合用户期望或叙事连续性的响应，从而导致中断或不连贯的故事叙述。
- en: In conclusion, identifying and rectifying misunderstandings and errors in model
    responses is a crucial step in prompt engineering. By addressing ambiguity, aligning
    multimodal content, ensuring technical accuracy, clarifying user intent, and maintaining
    contextual consistency, prompt engineers can enhance the quality and reliability
    of AI-generated responses.
  id: totrans-563
  prefs: []
  type: TYPE_NORMAL
  zh: 总之，识别和纠正模型响应中的误解和错误是提示工程的关键步骤。通过解决歧义、对齐多模态内容、确保技术准确性、明确用户意图以及保持上下文一致性，提示工程师可以提高AI生成响应的质量和可靠性。
- en: 6.3 STRATEGIES FOR ITERATING AND IMPROVING PROMPTS
  id: totrans-564
  prefs: []
  type: TYPE_NORMAL
  zh: 6.3 提示的迭代和改进策略
- en: The process of prompt engineering does not end with the initial prompt design;
    it is an ongoing process of refinement and improvement. In this section, we explore
    effective strategies for iteratively enhancing prompts to achieve better model
    responses using research insights and practical examples.
  id: totrans-565
  prefs: []
  type: TYPE_NORMAL
  zh: 提示工程的过程并不随着初始提示设计而结束；它是一个持续的过程，涉及改进和提升。在本节中，我们探讨使用研究洞察力和实际案例来迭代增强提示，以实现更好的模型响应的有效策略。
- en: The Iterative Prompt Refinement Cycle
  id: totrans-566
  prefs: []
  type: TYPE_NORMAL
  zh: 迭代提示改进周期
- en: Iterating on prompts is akin to a feedback-driven loop that involves continuous
    testing, evaluation, and adjustment. This cycle is crucial for fine-tuning model
    behavior over time.
  id: totrans-567
  prefs: []
  type: TYPE_NORMAL
  zh: 迭代提示类似于一个反馈驱动的循环，涉及持续的测试、评估和调整。这个周期对于随着时间的推移微调模型行为至关重要。
- en: 'EXAMPLE 1: Addressing Ambiguity'
  id: totrans-568
  prefs: []
  type: TYPE_NORMAL
  zh: 示例 1：解决歧义
- en: 'Initial Prompt: “Explain the concept of ‘light.’”'
  id: totrans-569
  prefs: []
  type: TYPE_NORMAL
  zh: 初始提示：“解释‘光’的概念。”
- en: 'Analysis: The initial prompt is overly broad, potentially leading to responses
    about various meanings of “light,” such as the opposite of darkness or electromagnetic
    radiation. To address this, the prompt can be refined to specify the context,
    e.g., “Explain the concept of ‘light’ in the context of physics.” This clarification
    reduces ambiguity.'
  id: totrans-570
  prefs: []
  type: TYPE_NORMAL
  zh: 分析：初始提示过于宽泛，可能导致关于“光”的各种含义的响应，例如黑暗的对立面或电磁辐射。为了解决这个问题，可以将提示细化以指定上下文，例如，“在物理学的背景下解释‘光’的概念。”这种澄清减少了歧义。
- en: 'EXAMPLE 2: Correcting Misunderstandings'
  id: totrans-571
  prefs: []
  type: TYPE_NORMAL
  zh: 示例 2：纠正误解
- en: 'Initial Prompt: “Translate the following English text into French: ‘He kicked
    the ball.’”'
  id: totrans-572
  prefs: []
  type: TYPE_NORMAL
  zh: 初始提示：“将以下英文文本翻译成法语：‘他踢了球。’”
- en: 'Analysis: If the model consistently mistranslates “kicked” as “licked,” it
    indicates a misunderstanding. To correct this, the prompt can be iteratively adjusted
    by providing feedback and adding contextual cues: “Translate the following English
    text into French, ensuring that ‘kicked’ is correctly translated as ‘a donné un
    coup de pied.’” The iterative process addresses this type of error.'
  id: totrans-573
  prefs: []
  type: TYPE_NORMAL
  zh: 分析：如果模型持续将“踢”误解为“舔”，这表明存在误解。为了纠正这一点，可以通过提供反馈和添加上下文线索来迭代调整提示：“将以下英文文本翻译成法语，确保‘踢’被正确翻译为‘a
    donné un coup de pied。’”迭代过程解决了这类错误。
- en: 'EXAMPLE 3: Improving Completeness'
  id: totrans-574
  prefs: []
  type: TYPE_NORMAL
  zh: 示例 3：提高完整性
- en: 'Initial Prompt: “Describe the life of Leonardo da Vinci.”'
  id: totrans-575
  prefs: []
  type: TYPE_NORMAL
  zh: 初始提示： “描述莱昂纳多·达·芬奇的一生。”
- en: 'Analysis: The initial prompt lacks guidance on what aspects of da Vinci’s life
    to include in the results, potentially leading to incomplete responses. Iteratively
    refine the prompt by specifying the scope, e.g., “Provide a comprehensive overview
    of Leonardo da Vinci’s early life, artistic career, and inventions.” This refinement
    ensures completeness.'
  id: totrans-576
  prefs: []
  type: TYPE_NORMAL
  zh: 分析：初始提示缺乏关于在结果中包含达·芬奇生活哪些方面的指导，可能导致回答不完整。通过指定范围进行迭代改进提示，例如，“提供关于莱昂纳多·达·芬奇早年生活、艺术生涯和发明的全面概述。”这种改进确保了完整性。
- en: 'EXAMPLE 4: Clarifying User Intent'
  id: totrans-577
  prefs: []
  type: TYPE_NORMAL
  zh: 示例 4：明确用户意图
- en: 'Initial Prompt: “Find news articles about AI.”'
  id: totrans-578
  prefs: []
  type: TYPE_NORMAL
  zh: 初始提示：“查找关于AI的新闻文章。”
- en: 'Analysis: The initial prompt may yield a broad range of AI-related news articles.
    If the user’s intent is to find recent developments in AI ethics, the prompt can
    be iteratively improved with specificity: “Find news articles from the past month
    that discuss ethical concerns in AI technology.” This adjustment aligns with the
    user’s intent more effectively.'
  id: totrans-579
  prefs: []
  type: TYPE_NORMAL
  zh: 分析：初始提示可能导致一系列与AI相关的新闻文章。如果用户的意图是查找关于AI伦理的最新发展，可以通过具体化来迭代改进提示：“查找过去一个月讨论AI技术伦理问题的新闻文章。”这种调整更有效地符合用户的意图。
- en: 'EXAMPLE 5: Contextual Consistency'
  id: totrans-580
  prefs: []
  type: TYPE_NORMAL
  zh: '示例 5: 上下文一致性'
- en: 'Initial Prompt: “Continue the story from where it left off.”'
  id: totrans-581
  prefs: []
  type: TYPE_NORMAL
  zh: '初始提示: “从故事中断的地方继续。”'
- en: 'Analysis: This narrative prompt may lead to inconsistent or disjointed storytelling
    if the model lacks context from previous story segments. To maintain consistency,
    the prompt can be iteratively enhanced with contextual cues: “Continue the story
    from where it left off, where the protagonist was trapped in a mysterious cave.”
    This refinement provides essential context.'
  id: totrans-582
  prefs: []
  type: TYPE_NORMAL
  zh: '分析: 如果模型缺乏来自先前故事段落的上下文，则此叙事提示可能导致不一致或断断续续的故事讲述。为了保持一致性，提示可以通过迭代增强上下文线索：“从故事中断的地方继续，主角被困在一个神秘的洞穴中。”这种细化提供了必要上下文。'
- en: In conclusion, strategies for iterating and improving prompts are integral to
    the process of prompt engineering. By clarifying specificity, incorporating feedback,
    adjusting scope, aligning with user intent, and maintaining contextual consistency,
    prompt engineers can continually enhance prompts to optimize model responses over
    time.
  id: totrans-583
  prefs: []
  type: TYPE_NORMAL
  zh: 总之，迭代和改进提示的策略对于提示工程过程至关重要。通过明确具体性、整合反馈、调整范围、与用户意图保持一致以及维护上下文一致性，提示工程师可以持续改进提示，以优化模型响应。
- en: CHAPTER 7
  id: totrans-584
  prefs: []
  type: TYPE_NORMAL
  zh: 第7章
- en: ADVANCED PROMPT ENGINEERING
  id: totrans-585
  prefs: []
  type: TYPE_NORMAL
  zh: 高级提示工程
- en: '[Chapter 7](chapter07.xhtml) addresses advanced techniques that give users
    greater control over ChatGPT’s responses. By mastering parameter tools like temperature,
    Top-p, max tokens, and incorporating conditional logic into prompts, we explore
    the frontiers of prompt engineering for dynamic and tailored interactions.'
  id: totrans-586
  prefs: []
  type: TYPE_NORMAL
  zh: '[第7章](chapter07.xhtml) 讨论了赋予用户更多控制ChatGPT响应的高级技术。通过掌握温度、Top-p、最大标记数等参数工具，并将条件逻辑纳入提示中，我们探索了动态和定制交互的提示工程前沿。'
- en: 7.1 USING TEMPERATURE, TOP-P, AND MAX TOKENS FOR CONTROL
  id: totrans-587
  prefs: []
  type: TYPE_NORMAL
  zh: 7.1 使用温度、Top-p和最大标记数进行控制
- en: Fine-tuning the behavior of language models often requires nuanced control over
    response generation. In this section, we explore techniques such as temperature,
    top-p (nucleus sampling), and max tokens, which provide effective means to influence
    the creativity, coherence, and length of model responses. These techniques are
    instrumental for shaping the output of LLMs. The practical examples of prompts
    in this chapter were developed using ChatGPT application.
  id: totrans-588
  prefs: []
  type: TYPE_NORMAL
  zh: 微调语言模型的行为通常需要精细控制响应生成。在本节中，我们探讨了诸如温度、top-p（核采样）和最大标记数等技术，这些技术提供了有效的方法来影响模型响应的创造力、连贯性和长度。这些技术在塑造LLM输出方面至关重要。本章中提示的实用示例是使用ChatGPT应用开发的。
- en: 'Temperature: Modulating Creativity'
  id: totrans-589
  prefs: []
  type: TYPE_NORMAL
  zh: '温度: 调节创造力'
- en: In the context of AI, particularly in language models like GPT, “temperature”
    refers to a parameter that controls the randomness of the model’s responses. A
    higher temperature, such as 0.8, results in more creative and diverse responses,
    while a lower value, like 0.2, produces more deterministic and focused outputs.
    Temperature ranges from 0 to 2, with recommended default value of 1 for balance
    responses. Users can modify this parameter through OpenAI API.
  id: totrans-590
  prefs: []
  type: TYPE_NORMAL
  zh: 在AI的背景下，特别是在GPT之类的语言模型中，“温度”指的是控制模型响应随机性的参数。较高的温度，如0.8，会导致更具创造性和多样化的响应，而较低的值，如0.2，会产生更确定性和专注的输出。温度范围从0到2，建议默认值为1以平衡响应。用户可以通过OpenAI
    API修改此参数。
- en: 'EXAMPLE 1: Influencing Creativity'
  id: totrans-591
  prefs: []
  type: TYPE_NORMAL
  zh: '示例 1: 影响创造力'
- en: 'Prompt: “Write a poem about the ocean.”'
  id: totrans-592
  prefs: []
  type: TYPE_NORMAL
  zh: '提示: “写一首关于海洋的诗。”'
- en: 'Analysis: By adjusting the temperature parameter, prompt engineers can fine-tune
    the creativity of the model’s responses. A higher temperature might lead to imaginative
    and metaphor-rich poems, while a lower temperature can yield structured and conventional
    verses.'
  id: totrans-593
  prefs: []
  type: TYPE_NORMAL
  zh: '分析: 通过调整温度参数，提示工程师可以微调模型响应的创造力。较高的温度可能导致充满想象力和丰富隐喻的诗篇，而较低的温度可以产生结构化和传统的诗句。'
- en: 'Top-p (Nucleus Sampling): Ensuring Relevance'
  id: totrans-594
  prefs: []
  type: TYPE_NORMAL
  zh: 'Top-p (核采样): 确保相关性'
- en: Top-p is a technique that restricts the model’s choices during token generation.
    It selects from the top-p probability distribution of words, ensuring that generated
    text remains relevant to the context. When the model is about to predict the next
    word or token in a sequence, instead of always choosing the most probable word,
    it considers a set of the most probable words. For example, if top-p is set to
    0.9, the model will randomly pick the next word from a set of words that together
    have a cumulative probability of at least 90%. The value of Top-p is between 0
    and 1\. The higher value generates more text more random whereas a lower value
    generates word more deterministic. Typical values are set between 0.7 to 0.95.
  id: totrans-595
  prefs: []
  type: TYPE_NORMAL
  zh: Top-p 是一种限制模型在标记生成过程中选择的技术。它从单词的最高概率分布中选择，确保生成的文本与上下文保持相关性。当模型即将预测序列中的下一个单词或标记时，它不会总是选择最可能的单词，而是考虑一组最可能的单词。例如，如果
    top-p 设置为 0.9，模型将随机从一组单词中选择下一个单词，这些单词的总概率至少为 90%。Top-p 的值介于 0 和 1 之间。较高的值会产生更多更随机的文本，而较低的值会产生更确定性的单词。典型值通常设置在
    0.7 到 0.95 之间。
- en: 'EXAMPLE 2: Enhancing Relevance'
  id: totrans-596
  prefs: []
  type: TYPE_NORMAL
  zh: 示例 2：增强相关性
- en: 'Prompt: “Summarize the key findings of the latest climate change report.”'
  id: totrans-597
  prefs: []
  type: TYPE_NORMAL
  zh: 提示： “总结最新气候变化报告的关键发现。”
- en: 'Analysis: When using top-p sampling (e.g., top-p=0.7), the model is more likely
    to produce concise and contextually relevant summaries, as it focuses on the most
    probable words. This technique reduces the risk of irrelevant or verbose responses.'
  id: totrans-598
  prefs: []
  type: TYPE_NORMAL
  zh: 分析：当使用 top-p 样本（例如，top-p=0.7）时，模型更有可能产生简洁且与上下文相关的摘要，因为它专注于最可能的单词。这种技术降低了产生无关或冗长响应的风险。
- en: 'Max Tokens: Limiting Response Length'
  id: totrans-599
  prefs: []
  type: TYPE_NORMAL
  zh: 最大标记数：限制响应长度
- en: Max tokens is a parameter that restricts the length of model responses. It allows
    prompt engineers to enforce concise replies or set specific response lengths.
  id: totrans-600
  prefs: []
  type: TYPE_NORMAL
  zh: 最大标记数是一个限制模型响应长度的参数。它允许提示工程师强制执行简洁的回复或设置特定的响应长度。
- en: 'EXAMPLE 3: Controlling Response Length'
  id: totrans-601
  prefs: []
  type: TYPE_NORMAL
  zh: 示例 3：控制响应长度
- en: 'Prompt: “Explain the process of photosynthesis in 100 words.”'
  id: totrans-602
  prefs: []
  type: TYPE_NORMAL
  zh: 提示： “用 100 个字解释光合作用的过程。”
- en: 'Analysis: By specifying max tokens (e.g., max tokens=100), prompt engineers
    can ensure that the model generates concise explanations within the defined word
    limit. This technique is particularly useful for tasks requiring brevity.'
  id: totrans-603
  prefs: []
  type: TYPE_NORMAL
  zh: 分析：通过指定最大标记数（例如，max tokens=100），提示工程师可以确保模型在定义的单词限制内生成简洁的解释。这种技术在需要简洁性的任务中特别有用。
- en: In conclusion, temperature, top-p (nucleus sampling), and max tokens are versatile
    tools for controlling the behavior of language models. By adjusting these parameters,
    prompt engineers can fine-tune the creativity of the AI’s response, enhance its
    relevance, and limit the response length, effectively tailoring model outputs
    to meet specific requirements and optimize the user experience.
  id: totrans-604
  prefs: []
  type: TYPE_NORMAL
  zh: 总之，温度、top-p（核采样）和最大标记数是控制语言模型行为的通用工具。通过调整这些参数，提示工程师可以微调 AI 响应的创造力，增强其相关性，并限制响应长度，有效地定制模型输出以满足特定要求并优化用户体验。
- en: 7.2 INCORPORATING CONDITIONAL LOGIC IN PROMPTS
  id: totrans-605
  prefs: []
  type: TYPE_NORMAL
  zh: 7.2 在提示中嵌入条件逻辑
- en: The incorporation of conditional logic within prompts is a powerful technique
    for providing explicit instructions to guide model behavior. In this section,
    we explore how conditional statements and logic can be employed to influence and
    control the output of language models using research insights and practical examples.
  id: totrans-606
  prefs: []
  type: TYPE_NORMAL
  zh: 在提示中嵌入条件逻辑是一种强大的技术，用于提供明确的指令以引导模型行为。在本节中，我们探讨如何利用条件语句和逻辑，通过研究洞察力和实际案例来影响和控制语言模型的输出。
- en: 'Conditional Logic: Steering Model Responses'
  id: totrans-607
  prefs: []
  type: TYPE_NORMAL
  zh: 条件逻辑：引导模型响应
- en: Conditional logic introduces a structured framework within prompts, enabling
    prompt engineers to specify conditions that should be met for desired responses.
    These conditions can range from simple constraints to complex decision trees.
  id: totrans-608
  prefs: []
  type: TYPE_NORMAL
  zh: 条件逻辑在提示中引入了一个结构化框架，使提示工程师能够指定应满足的条件以获得期望的响应。这些条件可以从简单的约束到复杂的决策树。
- en: 'EXAMPLE 1: Controlling Tone'
  id: totrans-609
  prefs: []
  type: TYPE_NORMAL
  zh: 示例 1：控制语气
- en: 'Prompt: “Write a news article about recent climate change developments. If
    the tone is alarmist, provide counterarguments to promote balanced reporting.”'
  id: totrans-610
  prefs: []
  type: TYPE_NORMAL
  zh: 提示： “撰写一篇关于最近气候变化发展的新闻文章。如果语气是警世的，提供反驳论点以促进平衡报道。”
- en: 'Analysis: This prompt incorporates conditional logic by instructing the model
    to consider the tone of the response. If the tone seems alarmist, the model is
    guided to include counterarguments to ensure balanced reporting.'
  id: totrans-611
  prefs: []
  type: TYPE_NORMAL
  zh: 分析：这个提示通过指示模型考虑响应的语气，结合了条件逻辑。如果语气显得恐慌，模型被引导包括反论点以确保报道平衡。
- en: 'EXAMPLE 2: Customizing Output'
  id: totrans-612
  prefs: []
  type: TYPE_NORMAL
  zh: 示例 2：定制输出
- en: 'Prompt: “Generate a product description for a smartphone. If the phone has
    a high-resolution camera, emphasize its photography capabilities; otherwise, focus
    on other features.”'
  id: totrans-613
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：为智能手机生成产品描述。如果手机具有高分辨率摄像头，强调其摄影功能；否则，关注其他特性。
- en: 'Analysis: Conditional logic in this prompt tailors the response to the smartphone’s
    specific features. If a high-resolution camera is present, the model is directed
    to highlight photography capabilities; otherwise, it emphasizes other attributes.'
  id: totrans-614
  prefs: []
  type: TYPE_NORMAL
  zh: 分析：这个提示中的条件逻辑根据智能手机的具体特性定制响应。如果存在高分辨率摄像头，模型被指导突出摄影功能；否则，它强调其他属性。
- en: 'EXAMPLE 3: Error Handling'
  id: totrans-615
  prefs: []
  type: TYPE_NORMAL
  zh: 示例 3：错误处理
- en: 'Prompt: “Provide instructions for troubleshooting a Wi-Fi connectivity issue.
    If the user mentions interference from neighboring networks, suggest changing
    the channel; otherwise, advise checking the router settings.”'
  id: totrans-616
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：提供解决 Wi-Fi 连接问题的说明。如果用户提到来自相邻网络的干扰，建议更改信道；否则，建议检查路由器设置。
- en: 'Analysis: In this prompt, conditional logic handles different scenarios of
    Wi-Fi issues. If the user mentions interference, the model suggests changing the
    channel; otherwise, it provides advice on router settings.'
  id: totrans-617
  prefs: []
  type: TYPE_NORMAL
  zh: 分析：在这个提示中，条件逻辑处理 Wi-Fi 问题的不同场景。如果用户提到干扰，模型建议更改信道；否则，它提供有关路由器设置的指导。
- en: 'EXAMPLE 4: Contextual Content Generation'
  id: totrans-618
  prefs: []
  type: TYPE_NORMAL
  zh: 示例 4：上下文内容生成
- en: 'Prompt: “Write a dialogue between two characters, Alice and Bob. If the conversation
    turns argumentative, steer it towards resolution and reconciliation.”'
  id: totrans-619
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：写一段 Alice 和 Bob 两个角色之间的对话。如果对话变得有争议，引导它走向解决和和解。
- en: 'Analysis: Conditional logic in narrative prompts ensures that even if the AI-generated
    dialogue initially turns argumentative, the model is guided to transition it towards
    resolution and reconciliation, maintaining a constructive narrative.'
  id: totrans-620
  prefs: []
  type: TYPE_NORMAL
  zh: 分析：叙事提示中的条件逻辑确保即使 AI 生成的对话最初变得有争议，模型也会被引导转向解决和和解，保持建设性的叙述。
- en: 'EXAMPLE 5: Multi-Turn Conversations'
  id: totrans-621
  prefs: []
  type: TYPE_NORMAL
  zh: 示例 5：多轮对话
- en: 'Prompt: “Engage in a conversation with the user. If they mention a specific
    topic, ask follow-up questions to gather more information; otherwise, introduce
    a general topic for discussion.”'
  id: totrans-622
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：与用户进行对话。如果他们提到特定主题，提出后续问题以收集更多信息；否则，引入一个一般性话题进行讨论。
- en: 'Analysis: In multi-turn conversations, conditional logic can manage user interactions.
    If the user mentions a specific topic, the model asks follow-up questions; otherwise,
    it initiates a general discussion.'
  id: totrans-623
  prefs: []
  type: TYPE_NORMAL
  zh: 分析：在多轮对话中，条件逻辑可以管理用户交互。如果用户提到特定主题，模型会提出后续问题；否则，它开始一个一般性讨论。
- en: In conclusion, incorporating conditional logic into prompts offers a structured
    means to steer and control model responses effectively. Whether for tone guidance,
    content customization, error handling, narrative control, or dynamic user interactions,
    conditional statements empower prompt engineers to provide clear instructions
    and fine-tune model behavior.
  id: totrans-624
  prefs: []
  type: TYPE_NORMAL
  zh: 总之，将条件逻辑纳入提示提供了一种结构化的方法，以有效地引导和控制模型响应。无论是语气引导、内容定制、错误处理、叙事控制还是动态用户交互，条件语句赋予提示工程师提供明确指令和微调模型行为的能力。
- en: 7.3 DYNAMIC PROMPTS FOR INTERACTIVE EXPERIENCES
  id: totrans-625
  prefs: []
  type: TYPE_NORMAL
  zh: 7.3 用于交互式体验的动态提示
- en: Dynamic prompts introduce a level of interactivity and responsiveness to AI-generated
    content, enabling engaging and interactive experiences. In this section, we explore
    the concept of dynamic prompts and how they can be employed to create immersive
    and personalized interactions.
  id: totrans-626
  prefs: []
  type: TYPE_NORMAL
  zh: 动态提示引入了交互性和对 AI 生成内容的响应性，使体验引人入胜且交互性强。在本节中，我们探讨动态提示的概念以及它们如何被用于创建沉浸式和个性化的交互。
- en: 'Dynamic Prompts: Fostering Engagement'
  id: totrans-627
  prefs: []
  type: TYPE_NORMAL
  zh: 动态提示：促进参与
- en: Dynamic prompts are designed to respond to user input, adapt to changing contexts,
    and provide interactive and personalized experiences. They are particularly valuable
    in applications that require ongoing user interaction.
  id: totrans-628
  prefs: []
  type: TYPE_NORMAL
  zh: 动态提示旨在响应用户输入，适应不断变化的环境，并提供交互式和个性化的体验。它们在需要持续用户交互的应用程序中特别有价值。
- en: 'EXAMPLE 1: Interactive Fiction'
  id: totrans-629
  prefs: []
  type: TYPE_NORMAL
  zh: 示例 1：交互式小说
- en: 'Initial Prompt: “You are a detective investigating a murder mystery. Describe
    your first action.”'
  id: totrans-630
  prefs: []
  type: TYPE_NORMAL
  zh: 初始提示： “你是一名侦探，正在调查一桩谋杀案。描述你的第一个行动。”
- en: 'Analysis: This example demonstrates the use of dynamic prompts in interactive
    fiction. The story progresses based on the user’s decisions. For instance, if
    the user chooses to explore the crime scene, the prompt evolves accordingly: “You
    arrive at the crime scene to begin your investigation. What specific area or item
    catches your attention first?” Such adaptive prompting deepens user engagement
    by creating a responsive and evolving narrative experience.'
  id: totrans-631
  prefs: []
  type: TYPE_NORMAL
  zh: 分析：这个例子展示了在互动小说中使用动态提示。故事根据用户的决定推进。例如，如果用户选择调查犯罪现场，提示会相应地演变：“你到达犯罪现场开始调查。你首先注意到的是哪个具体区域或物品？”这种适应性提示通过创造响应性和不断发展的叙事体验来加深用户的参与度。
- en: 'EXAMPLE 2: Contextual Chatbots'
  id: totrans-632
  prefs: []
  type: TYPE_NORMAL
  zh: 示例 2：上下文聊天机器人
- en: 'AI Prompt: “Hello! How can I assist you today?”'
  id: totrans-633
  prefs: []
  type: TYPE_NORMAL
  zh: AI 提示： “你好！今天我能帮您做什么？”
- en: 'Analysis: Dynamic prompts in chatbots enable personalized interactions. If
    a user mentions they want to book a hotel, the AI prompt adapts with the following
    response: “Great! I can help you with that. When and where would you like to book
    a hotel?” This approach tailors responses to user intent.'
  id: totrans-634
  prefs: []
  type: TYPE_NORMAL
  zh: 分析：聊天机器人中的动态提示可以实现个性化交互。如果用户提到他们想要预订酒店，AI 提示会适应以下回应：“太好了！我可以帮你。你什么时候在哪里预订酒店？”这种做法使回应符合用户意图。
- en: 'EXAMPLE 3: Game-Based Learning'
  id: totrans-635
  prefs: []
  type: TYPE_NORMAL
  zh: 示例 3：基于游戏的学习
- en: 'AI Prompt: “Let’s learn about history! Which historical period interests you?”'
  id: totrans-636
  prefs: []
  type: TYPE_NORMAL
  zh: AI 提示： “让我们学习历史吧！你对哪个历史时期感兴趣？”
- en: 'Analysis: Dynamic prompts in educational applications allow users to choose
    their learning path. If a user selects “Ancient Egypt,” the AI adapts with the
    following response: “Excellent choice! Let’s explore the fascinating world of
    Ancient Egypt. What aspect would you like to learn about first?” This approach
    engages users in self-directed learning.'
  id: totrans-637
  prefs: []
  type: TYPE_NORMAL
  zh: 分析：教育应用中的动态提示允许用户选择他们的学习路径。如果用户选择了“古埃及”，AI 会适应以下回应：“选择得很好！让我们探索古埃及这个迷人的世界。你首先想了解哪个方面？”这种做法鼓励用户进行自我导向的学习。
- en: 'EXAMPLE 4: Personalized Content Recommendations'
  id: totrans-638
  prefs: []
  type: TYPE_NORMAL
  zh: 示例 4：个性化内容推荐
- en: 'User Prompt: “Recommend a movie to watch.”'
  id: totrans-639
  prefs: []
  type: TYPE_NORMAL
  zh: 用户提示： “推荐一部电影看看。”
- en: 'Analysis: Dynamic prompts for content recommendations consider user preferences.
    If a user mentions a love for science fiction, the prompt adapts: “Sure! Based
    on your interest in science fiction, I recommend watching ‘Blade Runner 2049.’
    What do you think?” This approach tailors suggestions to individual tastes.'
  id: totrans-640
  prefs: []
  type: TYPE_NORMAL
  zh: 分析：内容推荐的动态提示考虑用户偏好。如果用户提到喜欢科幻小说，提示会适应：“当然！根据你对科幻小说的兴趣，我推荐观看《银翼杀手 2049》。你怎么看？”这种做法使建议符合个人品味。
- en: 'EXAMPLE 5: Real-Time Collaboration'
  id: totrans-641
  prefs: []
  type: TYPE_NORMAL
  zh: 示例 5：实时协作
- en: 'User Prompt: “Let’s work on a collaborative story. Each of us will write one
    sentence to continue the narrative. I’ll start: Once upon a time...”'
  id: totrans-642
  prefs: []
  type: TYPE_NORMAL
  zh: 用户提示： “让我们合作写一个故事。我们每个人将写一句话来继续叙述。我先来：从前，……”
- en: 'Analysis: Dynamic prompts in collaborative storytelling adapt to user-contributed
    content. After a user’s sentence, the prompt can respond: “Great beginning! Now,
    let’s continue the story: ‘in a magical forest where...’” This approach fosters
    real-time collaboration and creativity.'
  id: totrans-643
  prefs: []
  type: TYPE_NORMAL
  zh: 分析：协作故事中的动态提示会适应用户贡献的内容。在用户的句子之后，提示可以回应：“很好的开头！现在，让我们继续故事：‘在一个神奇的森林里……’”这种做法促进了实时协作和创造力。
- en: In conclusion, dynamic prompts introduce a new dimension of interactivity and
    responsiveness to AI-driven experiences. Whether for interactive fiction, chatbots,
    educational applications, content recommendations, or real-time collaboration,
    dynamic prompts empower prompt engineers to create engaging and personalized interactions
    that adapt to user input and preferences.
  id: totrans-644
  prefs: []
  type: TYPE_NORMAL
  zh: '总结来说，动态提示为 AI 驱动的体验引入了新的交互性和响应维度。无论是在互动小说、聊天机器人、教育应用、内容推荐或实时协作中，动态提示使提示工程师能够创建适应用户输入和偏好的吸引人和个性化的交互。 '
- en: CHAPTER 8
  id: totrans-645
  prefs: []
  type: TYPE_NORMAL
  zh: 第八章
- en: EFFECTIVE USE OF PROMPTS AND
  id: totrans-646
  prefs: []
  type: TYPE_NORMAL
  zh: 提示和
- en: GPT-4 WITH PLUGINS
  id: totrans-647
  prefs: []
  type: TYPE_NORMAL
  zh: GPT-4 WITH PLUGINS
- en: As the conversation between humans and AI models continues to evolve, plugins
    have become a potent tool in the design of prompts tailored for ChatGPT (more
    specifically, GPT-4). This chapter explores the multifaceted world of plugins,
    showing their potential to revolutionize industries and redefine user experiences.
    Whether you are an experienced AI engineer or a newcomer to the realm of prompt
    engineering, the insights offered here will help you to better utilize plugins
    and discover the full potential of AI-powered conversations.
  id: totrans-648
  prefs: []
  type: TYPE_NORMAL
  zh: 随着人类与人工智能模型之间的对话不断演变，插件已成为为ChatGPT（更具体地说，GPT-4）量身定制提示的一个强大工具。本章探讨了插件的多面世界，展示了它们如何颠覆行业并重新定义用户体验。无论您是经验丰富的AI工程师还是提示工程领域的新手，这里提供的见解将帮助您更好地利用插件并发现人工智能驱动对话的完整潜力。
- en: 8.1 AN INTRODUCTION TO PLUGINS
  id: totrans-649
  prefs: []
  type: TYPE_NORMAL
  zh: 8.1 插件简介
- en: Plugins are a powerful addition to the GPT-4 ecosystem. They enhance the capabilities
    of the base model, allowing it to perform a wider range of tasks and provide more
    accurate answers. In this introductory section, we explore various plugins, unveiling
    their transformative potential in fine-tuning AI interactions. These ingenious
    tools enrich the user-AI conversational experience by introducing specialized
    functionalities. As we delve deeper into this information, you will gain an understanding
    of how plugins empower AI to excel in various domains, from language translation
    and sentiment analysis to content summarization. Through a close examination of
    real-world examples, we will uncover the versatility and ingenuity that plugins
    bring to the forefront of AI-driven conversations.
  id: totrans-650
  prefs: []
  type: TYPE_NORMAL
  zh: 插件是GPT-4生态系统中的一项强大补充。它们增强了基础模型的能力，使其能够执行更广泛的任务并提供更准确的答案。在本介绍性章节中，我们探讨了各种插件，揭示了它们在微调AI交互中的变革潜力。这些巧妙的工具通过引入专业功能丰富了用户与AI的对话体验。随着我们深入了解这些信息，您将了解插件如何赋予AI在各个领域（从语言翻译和情感分析到内容摘要）中表现出色的能力。通过详细研究现实世界案例，我们将揭示插件为人工智能驱动对话带来的多功能性和独创性。
- en: 8.2 INTEGRATING PLUGINS FOR ENHANCED AI CONVERSATIONS
  id: totrans-651
  prefs: []
  type: TYPE_NORMAL
  zh: 8.2 为增强人工智能对话集成插件
- en: In this section, we delve into the intricacies of seamlessly integrating plugins
    to augment the capabilities of GPT-4 and make AI-driven conversations more sophisticated.
    We will explore the practical aspects of acquiring, implementing, and optimizing
    plugins to fine-tune AI interactions. As we navigate the process of integration,
    we will discuss how the synergy between prompts, GPT-4, and plugins can be used
    to craft dynamic and responsive conversations that address diverse needs and domains.
    Please refer to the screen-capture video provided with the accompanied source,
    for the updated implementation process and format for Plugins.
  id: totrans-652
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，我们深入探讨无缝集成插件以增强GPT-4功能并使人工智能驱动对话更加复杂的细节。我们将探讨获取、实施和优化插件以微调AI交互的实用方面。在我们导航集成过程的同时，我们将讨论如何利用提示、GPT-4和插件之间的协同作用来构建动态和响应式的对话，以满足各种需求和领域。请参考随附源代码提供的屏幕截图视频，以获取插件更新的实现过程和格式。
- en: How To Get Plugins
  id: totrans-653
  prefs: []
  type: TYPE_NORMAL
  zh: 如何获取插件
- en: Plugins are available with subscription of GPT-4\. The following steps show
    how to install and use them.
  id: totrans-654
  prefs: []
  type: TYPE_NORMAL
  zh: 插件可通过GPT-4订阅获得。以下步骤展示了如何安装和使用它们。
- en: '1. Subscription: Ensure you have an active subscription to GPT-4\. If you do
    not, visit the official OpenAI Web site (where GPT-4 is offered) and follow the
    subscription process.'
  id: totrans-655
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 订阅：确保您拥有有效的GPT-4订阅。如果没有，请访问官方OpenAI网站（那里提供GPT-4）并遵循订阅流程。
- en: '2. Accessing Plugin Section: Once logged in, start a new chat session by clicking
    on the “+New chat” button. In the main area, hover your cursor over “GPT-4” and
    click on “Plugins.”'
  id: totrans-656
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 访问插件部分：登录后，通过点击“+新建聊天”按钮开始新的聊天会话。在主区域，将光标悬停在“GPT-4”上，然后点击“插件”。
- en: '3. Browse & Choose: Open the drop-down menu and click on “Plugin store.” Here
    you will find a library of available plugins, ranging from specialized vocabularies
    to niche domain adaptations. Browse through them and read the descriptions to
    determine which ones will benefit you the most.'
  id: totrans-657
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 浏览与选择：打开下拉菜单，点击“插件商店”。在这里，您将找到一个包含各种可用插件的库，从专业词汇到特定领域的定制。浏览它们并阅读描述，以确定哪些对您最有益。
- en: '4. Installation: To install your desired plugin, click on “Install” icon. You
    can choose and install several plugins.'
  id: totrans-658
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 安装：要安装您想要的插件，点击“安装”图标。您可以选择并安装多个插件。
- en: '5. Configuration: To enable installed plugins, click on the drop-down menu
    and select the one you want to enable. Installed plugin icons will show up in
    a list at the top of the page. You can activate maximum three for each chat session.
    Follow the accompanying documentation or guidelines on the related Web site for
    each plugin tool to get more detail information and ensure they operate correctly.'
  id: totrans-659
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 配置：要启用已安装的插件，请点击下拉菜单并选择你想要启用的插件。已安装的插件图标将显示在页面顶部的列表中。每个聊天会话最多可以激活三个。请遵循每个插件工具的相关文档或网站上的指南，以获取更多详细信息并确保它们正确运行。
- en: '6. Usage: Once installed and activated, the plugins will be employed by the
    GPT-4 or users can specify its usage by typing the name of desired plugin in the
    prompt.'
  id: totrans-660
  prefs: []
  type: TYPE_NORMAL
  zh: 6. 使用方法：一旦安装并激活，插件将由 GPT-4 使用，或者用户可以通过在提示中键入所需插件的名称来指定其使用方式。
- en: '7. Updating & Management: It is a good practice to check the “Plugins” section
    periodically for updates. Developers might release improvements or patches for
    their plugins, ensuring they remain compatible and optimized with the latest version
    of GPT-4.'
  id: totrans-661
  prefs: []
  type: TYPE_NORMAL
  zh: 7. 更新与管理：定期检查“插件”部分以查找更新是一个好习惯。开发者可能会为他们的插件发布改进或补丁，确保它们与 GPT-4 的最新版本保持兼容和优化。
- en: '8. Uninstallation: If you decide that you no longer need a particular plugin,
    navigate back to the “Plugin Store” section, and look for an “Uninstall” button.
    Clicking this button will remove the plugin from your GPT-4 instance.'
  id: totrans-662
  prefs: []
  type: TYPE_NORMAL
  zh: 8. 卸载：如果你决定不再需要某个插件，请返回到“插件商店”部分，并查找“卸载”按钮。点击此按钮将从你的 GPT-4 实例中移除插件。
- en: Remember that while plugins can enhance the capabilities of GPT-4, they might
    also introduce specific biases or focus areas. Always test new plugins to ensure
    they meet your expectations and needs.
  id: totrans-663
  prefs: []
  type: TYPE_NORMAL
  zh: 记住，虽然插件可以增强 GPT-4 的功能，但它们也可能引入特定的偏见或关注领域。始终测试新插件以确保它们符合你的期望和需求。
- en: 'EXAMPLE 1: Wolfram Plugin'
  id: totrans-664
  prefs: []
  type: TYPE_NORMAL
  zh: 示例 1：Wolfram 插件
- en: Plugins generally augment or adjust the responses from GPT-4\. For example,
    after integrating the Wolfram plugin, GPT-4 becomes proficient in handling complex
    mathematical or scientific inquiries. If you prompt GPT-4 with an enabled Wolfram
    plugin with “Calculate the integral arcsin(x) as indefinite integral,” the Wolfram-enhanced
    GPT-4 would seamlessly retrieve and present a precise answer, as shown in [Figure
    8.1](#fig8-1).
  id: totrans-665
  prefs: []
  type: TYPE_NORMAL
  zh: 插件通常增强或调整 GPT-4 的响应。例如，在集成 Wolfram 插件后，GPT-4 能够熟练处理复杂的数学或科学查询。如果你用启用了 Wolfram
    插件的“计算不定积分 arcsin(x)”提示 GPT-4，增强后的 Wolfram 提示的 GPT-4 将会无缝检索并呈现精确的答案，如[图 8.1](#fig8-1)所示。
- en: '![](image/Fig_8_1.jpg)'
  id: totrans-666
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image/Fig_8_1.jpg)'
- en: FIGURE 8.1 A Wolfram-enhanced GPT-4 response to the prompt “Calculate the integral
    arcsin(x) as indefinite integral.”
  id: totrans-667
  prefs: []
  type: TYPE_NORMAL
  zh: 图 8.1 Wolfram 增强的 GPT-4 对提示“计算不定积分 arcsin(x)”的响应。
- en: To see the code, click on the drop-down menu from the “Used Wolfram” icon. The
    [Figure 8.2](#fig8-2) shows the code used for this example.
  id: totrans-668
  prefs: []
  type: TYPE_NORMAL
  zh: 要查看代码，请点击“Used Wolfram”图标旁边的下拉菜单。[图 8.2](#fig8-2) 展示了此示例中使用的代码。
- en: '![](image/Fig_8_2.jpg)'
  id: totrans-669
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image/Fig_8_2.jpg)'
- en: FIGURE 8.2 The code used for the Wolfram example.
  id: totrans-670
  prefs: []
  type: TYPE_NORMAL
  zh: 图 8.2 用于 Wolfram 示例的代码。
- en: 'EXAMPLE 2: Prompt Perfect Plugin'
  id: totrans-671
  prefs: []
  type: TYPE_NORMAL
  zh: 示例 2：Prompt Perfect 插件
- en: Plugins generally augment or adjust the responses from GPT-4\. For example,
    after integrating the Prompt Perfect plugin, GPT-4 becomes proficient in handling
    prompts by rephrasing them to more complex and effective ones. In other words,
    it automates prompt engineering application. If you prompt GPT-4 with the prompt
    “Prompt Perfect. What is climate change?,” the Prompt-Perfect-enhanced GPT-4 would
    seamlessly retrieve and present a very precise answer. See [Figure 8.3](#fig8-3).
  id: totrans-672
  prefs: []
  type: TYPE_NORMAL
  zh: 插件通常增强或调整 GPT-4 的响应。例如，在集成 Prompt Perfect 插件后，GPT-4 能够通过重新措辞使提示变得更加复杂和有效，从而熟练地处理提示。换句话说，它自动化了提示工程应用。如果你用提示“Prompt
    Perfect. 什么是气候变化？”提示 GPT-4，增强后的 Prompt-Perfect 提示的 GPT-4 将会无缝检索并呈现一个非常精确的答案。参见[图
    8.3](#fig8-3)。
- en: '![](image/Fig_8_3.jpg)'
  id: totrans-673
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image/Fig_8_3.jpg)'
- en: FIGURE 8.3 The original prompt (top) and the engineered prompt (bottom).
  id: totrans-674
  prefs: []
  type: TYPE_NORMAL
  zh: 图 8.3 原始提示（顶部）和工程化提示（底部）。
- en: 'EXAMPLE 3: KeyMate Plugin'
  id: totrans-675
  prefs: []
  type: TYPE_NORMAL
  zh: 示例 3：KeyMate 插件
- en: The KeyMate plugin seamlessly integrates the capabilities of ChatGPT/GPT-4 with
    Google Search, introducing a persistent memory feature to chat interactions. This
    innovative approach ensures that conversations are not only informative but also
    retain context over time, enhancing the user experience and providing a more cohesive
    interaction. Furthermore, while OpenAI has stated that ChatGPT is informed by
    data up until 2021, the inclusion of the KeyMate plugin offers users a pathway
    to bypass this constraint to a certain degree. [Figure 8.4](#fig8-4) shows an
    interaction with ChatGPT enhanced with the KeyMate plugin.
  id: totrans-676
  prefs: []
  type: TYPE_NORMAL
  zh: KeyMate 插件无缝集成 ChatGPT/GPT-4 的功能与 Google 搜索，引入了持续记忆功能以增强聊天交互。这种创新方法确保了对话不仅信息丰富，而且随着时间的推移保留上下文，从而提升用户体验并提供更连贯的交互。此外，尽管
    OpenAI 表示 ChatGPT 的数据信息截止到 2021 年，但 KeyMate 插件的加入为用户提供了一种在一定程度上绕过这一限制的途径。[图 8.4](#fig8-4)
    展示了使用 KeyMate 插件增强的 ChatGPT 交互。
- en: '![](image/Fig_8_4.jpg)'
  id: totrans-677
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image/Fig_8_4.jpg)'
- en: FIGURE 8.4 KeyMate-enhanced ChatGPT’s response to the prompt “Tomorrow’s weather
    forecast in Vancouver, SI units. Express the exact date. KeyMate.”
  id: totrans-678
  prefs: []
  type: TYPE_NORMAL
  zh: 图 8.4 KeyMate 增强版 ChatGPT 对提示“温哥华明天的天气预报，使用国际单位制。表达确切的日期。KeyMate。”的响应
- en: An increasing number of plugins are being developed for GPT-4\. Notable examples
    include Expedia, Instacart, Kayak, Chatwithpdf, Visla, and Smart Slides. Users
    can conveniently access the catalog of available plugins via the Plugin Store
    within GPT-4 each time they initiate a new chat.
  id: totrans-679
  prefs: []
  type: TYPE_NORMAL
  zh: 越来越多的插件正在为 GPT-4 开发。值得注意的例子包括 Expedia、Instacart、Kayak、Chatwithpdf、Visla 和 Smart
    Slides。每次用户在 GPT-4 中启动新的聊天时，都可以方便地通过插件商店访问可用插件的目录。
- en: 8.3 BENEFITS OF USING PLUGINS
  id: totrans-680
  prefs: []
  type: TYPE_NORMAL
  zh: 8.3 使用插件的好处
- en: 'The integration of plugins with ChatGPT offers a multitude of advantages, enhancing
    its capabilities and making it more adaptable to various tasks. Some of the primary
    benefits include the following:'
  id: totrans-681
  prefs: []
  type: TYPE_NORMAL
  zh: 将插件与 ChatGPT 集成提供了许多优势，增强了其功能，使其能够适应各种任务。以下是一些主要的好处：
- en: '![](image/bull.jpg) Enhanced Knowledge Base: By utilizing external data sources,
    ChatGPT ensures that the answers it provides are grounded in the most up-to-date
    information available. This ensures accuracy and relevance in its responses.'
  id: totrans-682
  prefs: []
  type: TYPE_NORMAL
  zh: '![图片](image/bull.jpg) 扩展知识库：通过利用外部数据源，ChatGPT 确保它提供的答案基于最最新可用的信息。这确保了其回答的准确性和相关性。'
- en: '![](image/bull.jpg) Dynamic Computations: With plugins, ChatGPT is not just
    a static information provider. It can perform real-time calculations, offering
    solutions to mathematical, scientific, and other computational queries instantly.'
  id: totrans-683
  prefs: []
  type: TYPE_NORMAL
  zh: '![图片](image/bull.jpg) 动态计算：通过插件，ChatGPT 不仅仅是一个静态的信息提供者。它能够进行实时计算，即时提供数学、科学和其他计算查询的解决方案。'
- en: '![](image/bull.jpg) Integration with Third-party Services: This is perhaps
    one of the most exciting benefits. By integrating with various third-party services,
    ChatGPT can perform a wide range of tasks. Whether it is scheduling an appointment,
    obtaining the latest news, or controlling smart devices in a connected home, the
    possibilities are vast and continually expanding.'
  id: totrans-684
  prefs: []
  type: TYPE_NORMAL
  zh: '![图片](image/bull.jpg) 与第三方服务的集成：这可能是最令人兴奋的好处之一。通过集成各种第三方服务，ChatGPT 可以执行广泛的任务。无论是安排预约、获取最新新闻还是控制智能家居中的智能设备，可能性是无限的，并且持续扩展。'
- en: '![](image/bull.jpg) Customization and Flexibility: Plugins allow users to tailor
    ChatGPT’s capabilities to their specific needs. Whether it is for business analytics,
    educational purposes, or personal tasks, plugins can be added or removed to customize
    the user experience.'
  id: totrans-685
  prefs: []
  type: TYPE_NORMAL
  zh: '![图片](image/bull.jpg) 定制和灵活性：插件允许用户根据特定需求定制 ChatGPT 的功能。无论是用于商业分析、教育目的还是个人任务，都可以添加或删除插件以定制用户体验。'
- en: '![](image/bull.jpg) Continuous Learning and Improvement: With the integration
    of plugins, ChatGPT can continuously learn and update its knowledge base. This
    ensures that the AI remains at the forefront of technological advancements and
    can provide users with the most current and relevant information.'
  id: totrans-686
  prefs: []
  type: TYPE_NORMAL
  zh: '![图片](image/bull.jpg) 持续学习和改进：通过集成插件，ChatGPT 可以持续学习和更新其知识库。这确保了 AI 保持技术进步的前沿，并能为用户提供最新和最相关的信息。'
- en: '![](image/bull.jpg) Growing Library of Plugins: As the community of developers
    and users expands, so does the library of available plugins. This ensures that
    ChatGPT remains adaptable to emerging trends, technologies, and user needs. With
    a growing library, users have access to a broader range of functionalities and
    can continuously discover new ways to utilize ChatGPT.'
  id: totrans-687
  prefs: []
  type: TYPE_NORMAL
  zh: '![插件库](image/bull.jpg) 不断增长的插件库：随着开发者和用户群体的扩大，可用的插件库也在不断增长。这确保了ChatGPT能够适应新兴趋势、技术和用户需求。随着插件库的不断扩大，用户可以访问更广泛的功能，并持续发现新的利用ChatGPT的方法。'
- en: Using plugins transforms ChatGPT from a mere conversational AI to a versatile
    tool capable of assisting users in numerous ways.
  id: totrans-688
  prefs: []
  type: TYPE_NORMAL
  zh: 使用插件将ChatGPT从单纯的对话AI转变为一种多功能的工具，能够以多种方式协助用户。
- en: 8.4 POPULAR CHATGPT/GPT-4 PLUGINS
  id: totrans-689
  prefs: []
  type: TYPE_NORMAL
  zh: 8.4 流行CHATGPT/GPT-4插件
- en: Plugins are an integral part of enhancing the capabilities of various platforms.
    ChatGPT, in particular, has seen a surge in the development and adoption of plugins
    that augment its functionalities. These plugins range from Web browsing tools
    to dynamic computation modules, each designed to cater to specific user needs.
  id: totrans-690
  prefs: []
  type: TYPE_NORMAL
  zh: 插件是增强各种平台功能的重要组成部分。特别是ChatGPT，其插件的开发和采用量激增，这些插件增强了其功能。这些插件从网络浏览工具到动态计算模块不等，每个都旨在满足特定的用户需求。
- en: 'Currently, there are more than 200 plugins available on the ChatGPT Plus/GPT-4
    that aid users in their daily tasks across varying fields. Whether it is for educational
    purposes, research, cooking, or entertainment, there is likely a plugin tailored
    for the desired purpose. Here are some of the plugins that have gained popularity
    among ChatGPT Plus users:'
  id: totrans-691
  prefs: []
  type: TYPE_NORMAL
  zh: 目前，ChatGPT Plus/GPT-4上有超过200个插件可供使用，帮助用户在各个领域的日常任务中。无论是教育、研究、烹饪还是娱乐，都可能有一个针对所需目的的插件。以下是ChatGPT
    Plus用户中流行的一些插件：
- en: '1. Ask Your PDF: Tailored for researchers, this plugin allows users to directly
    ask questions and get answers from the information written in PDFs.'
  id: totrans-692
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 询问您的PDF：专为研究人员设计，此插件允许用户直接从PDF中的信息提问并获得答案。
- en: '2. Link Reader: Can read the content and extract information from all kinds
    of Web links, including Web pages, PDFs, images, and more.'
  id: totrans-693
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 链接阅读器：可以读取内容并从所有类型的网络链接中提取信息，包括网页、PDF、图片等。
- en: '3. There’s An AI For That: Offers a database of AI tools for various purposes,
    including image editing and PDF conversion.'
  id: totrans-694
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 有AI工具：提供各种用途的AI工具数据库，包括图像编辑和PDF转换。
- en: '4. Prompt Perfect: Assists users in crafting useful prompts for AI chatbots.'
  id: totrans-695
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 提示完美：帮助用户为AI聊天机器人制作有用的提示。
- en: '5. World News: Provides a well-organized list of news articles in multiple
    languages and source links.'
  id: totrans-696
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 世界新闻：提供多语言新闻文章的有序列表和来源链接。
- en: '6. Stories: Allows users to engage in the art of storytelling, generating captivating
    stories based on provided prompts.'
  id: totrans-697
  prefs: []
  type: TYPE_NORMAL
  zh: 6. 故事：允许用户参与讲故事的艺术，根据提供的提示生成吸引人的故事。
- en: '7. Show Me Diagrams: Enables users to swiftly generate visual diagrams accompanied
    by text explanations.'
  id: totrans-698
  prefs: []
  type: TYPE_NORMAL
  zh: 7. 展示图表：使用户能够迅速生成带有文本说明的视觉图表。
- en: '8. MixerBox OnePlayer: A comprehensive music compilation tool that curates
    playlists based on user preferences. MixerBox Calendar and MixerBox FindPlug are
    more plugins from this developer.'
  id: totrans-699
  prefs: []
  type: TYPE_NORMAL
  zh: 8. MixerBox OnePlayer：一个综合的音乐汇编工具，根据用户偏好创建播放列表。MixerBox Calendar和MixerBox FindPlug是该开发者提供的更多插件。
- en: '9. VoxScript: Obtains a video transcript and lets users quickly extract useful
    information.'
  id: totrans-700
  prefs: []
  type: TYPE_NORMAL
  zh: 9. VoxScript：获取视频字幕并允许用户快速提取有用信息。
- en: '10. Chat with PDF: Similar to “Ask Your PDF,” it comprehends textbooks, handouts,
    and presentations.'
  id: totrans-701
  prefs: []
  type: TYPE_NORMAL
  zh: 10. 与PDF聊天：类似于“询问您的PDF”，它理解教科书、讲义和演示文稿。
- en: '11. ScholarAI: Grants users access to a database of scholarly articles and
    academic research.'
  id: totrans-702
  prefs: []
  type: TYPE_NORMAL
  zh: 11. ScholarAI：为用户提供学术文章和学术研究的数据库访问权限。
- en: '12. VideoInsights: Analyzes video content to generate summaries, action items,
    and key highlights.'
  id: totrans-703
  prefs: []
  type: TYPE_NORMAL
  zh: 12. 视频洞察：分析视频内容以生成摘要、行动项目和关键亮点。
- en: '13. KeyMate.AI Search: Enhances your knowledge base by searching the Internet
    for the latest information on diverse subjects.'
  id: totrans-704
  prefs: []
  type: TYPE_NORMAL
  zh: 13. KeyMate.AI搜索：通过在互联网上搜索各种主题的最新信息来增强您的知识库。
- en: '14. WebPilot: Enables users to interact with, extract specific information
    from, or modify the content of Web sites.'
  id: totrans-705
  prefs: []
  type: TYPE_NORMAL
  zh: 14. WebPilot：使用户能够与网站互动，从网站中提取特定信息或修改内容。
- en: '15. Wolfram: It allows ChatGPT to perform complex calculations and access curated
    data.'
  id: totrans-706
  prefs: []
  type: TYPE_NORMAL
  zh: 15. Wolfram：允许ChatGPT执行复杂计算并访问精选数据。
- en: '16. Content Rewriter: With this plugin, ChatGPT can rewrite content from a
    given URL in its own words.'
  id: totrans-707
  prefs: []
  type: TYPE_NORMAL
  zh: 16. 内容重写器：使用此插件，ChatGPT可以用自己的话重写给定URL的内容。
- en: These plugins, among many others, showcase the versatility and adaptability
    of ChatGPT, making it a powerful tool in various domains. Users may want to check
    the growing list of plugins at the GPT-4 Plugin Store.
  id: totrans-708
  prefs: []
  type: TYPE_NORMAL
  zh: 这些插件以及其他许多插件展示了ChatGPT的多样性和适应性，使其成为各个领域中的强大工具。用户可以查看GPT-4插件商店中不断增长的插件列表。
- en: CHAPTER 9
  id: totrans-709
  prefs: []
  type: TYPE_NORMAL
  zh: 第九章
- en: REAL-WORLD APPLICATIONS
  id: totrans-710
  prefs: []
  type: TYPE_NORMAL
  zh: 现实世界应用
- en: '[Chapter 9](chapter09.xhtml) examines the myriad ways AI and prompt engineering
    technologies can be used in real-world applications. We discuss how prompt engineering
    enhances both commercial and private projects, from customer support chatbots
    streamlining user inquiries to creative writing assistance fueling novel narratives.
    We demonstrate the powerful impact of AI in domains like customer support and
    business, content generation, teaching and learning, and engineering applications,
    and explore how prompt engineering can improve the relationship between human
    intent and machine response. You will be able to observe AI’s transformative power
    in the everyday world, where theory becomes reality and innovation thrives.'
  id: totrans-711
  prefs: []
  type: TYPE_NORMAL
  zh: '[第九章](chapter09.xhtml)探讨了人工智能和提示工程技术如何在现实世界应用中的多种方式。我们讨论了提示工程如何提升商业和私人项目，从客户支持聊天机器人简化用户查询到创意写作协助推动小说叙事。我们展示了人工智能在客户支持、商业、内容生成、教学和学习以及工程应用等领域的强大影响，并探讨了提示工程如何改善人类意图与机器响应之间的关系。您将能够观察到人工智能在日常世界中的变革力量，在这里理论变为现实，创新蓬勃发展。'
- en: 9.1 APPLYING PROMPT ENGINEERING IN CUSTOMER SUPPORT
  id: totrans-712
  prefs: []
  type: TYPE_NORMAL
  zh: 9.1 在客户支持中应用提示工程
- en: Prompt engineering plays a pivotal role in customer support, elevating the quality
    and efficiency of interactions between support agents and customers. By crafting
    well-constructed prompts, customer support teams can ensure that AI models like
    GPT-4 provide accurate and helpful responses, leading to quicker issue resolution
    and improved customer satisfaction.
  id: totrans-713
  prefs: []
  type: TYPE_NORMAL
  zh: 提示工程在客户支持中扮演着关键角色，提升了支持代理与客户之间互动的质量和效率。通过精心构建的提示，客户支持团队可以确保像GPT-4这样的AI模型提供准确和有帮助的响应，从而更快地解决问题并提高客户满意度。
- en: Enhancing Customer Support with Prompt Engineering
  id: totrans-714
  prefs: []
  type: TYPE_NORMAL
  zh: 利用提示工程增强客户支持
- en: Prompt engineering in customer support enables organizations to streamline their
    support operations, delivering prompt responses, accurate information, and improved
    user experiences.
  id: totrans-715
  prefs: []
  type: TYPE_NORMAL
  zh: 客户支持中的提示工程使组织能够简化其支持操作，提供及时的响应、准确的信息和改进的用户体验。
- en: 'EXAMPLE 1: Streamlining Technical Support'
  id: totrans-716
  prefs: []
  type: TYPE_NORMAL
  zh: 示例 1：简化技术支持
- en: 'Prompt: “As a customer support agent, troubleshoot a user’s connectivity issues
    with their Wi-Fi router. User reports frequent disconnections.”'
  id: totrans-717
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：作为客户支持代表，帮助用户解决他们与Wi-Fi路由器的连接问题。用户报告了频繁的断开连接。
- en: 'Analysis: In this example, the prompt clearly defines the role, goal, and context
    for the AI model. It instructs the AI to act as a customer support agent and focus
    on resolving the user’s connectivity issues with their Wi-Fi router, with the
    understanding that the user has been experiencing frequent disconnections. Such
    prompts enable customer support agents to efficiently address specific technical
    issues, leading to smoother and more effective support interactions.'
  id: totrans-718
  prefs: []
  type: TYPE_NORMAL
  zh: 分析：在这个例子中，提示明确定义了AI模型的角色、目标和上下文。它指示AI扮演客户支持代表的角色，专注于解决用户与Wi-Fi路由器的连接问题，理解用户已经经历了频繁的断开连接。这样的提示使客户支持代理能够高效地解决具体的技术问题，从而实现更顺畅和有效的支持互动。
- en: 'EXAMPLE 2: Billing and Account Assistance'
  id: totrans-719
  prefs: []
  type: TYPE_NORMAL
  zh: 示例 2：账单和账户协助
- en: 'Prompt: “As a customer support agent, assist a user with billing and account
    inquiries. User reports discrepancies in their recent billing statement.”'
  id: totrans-720
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：作为客户支持代表，帮助用户解决账单和账户查询。用户报告了最近账单中的差异。
- en: 'Analysis: In this instance, the prompt defines the role of the AI model as
    a customer support agent, specifies the goal as assisting with billing and account
    inquiries, and provides context by highlighting the user’s concern regarding discrepancies
    in their recent billing statement. This well-crafted prompt empowers the AI to
    focus on addressing the user’s specific issues, facilitating a more productive
    interaction between the customer support agent and the user.'
  id: totrans-721
  prefs: []
  type: TYPE_NORMAL
  zh: 分析：在这个例子中，提示定义了AI模型的角色为客服代理，指定目标为协助账单和账户查询，并通过突出用户对其最近账单报表中差异的关注来提供上下文。这个精心设计的提示使AI能够专注于解决用户的具体问题，促进客服代理与用户之间更有效的互动。
- en: 'EXAMPLE 3: Product Recommendations'
  id: totrans-722
  prefs: []
  type: TYPE_NORMAL
  zh: 示例3：产品推荐
- en: 'Prompt: “As a customer support agent, offer tailored product recommendations.
    User seeks suggestions for purchasing a new laptop within a specific budget range
    and for particular use cases.”'
  id: totrans-723
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：“作为客服代理，提供定制产品推荐。用户寻求在特定预算范围内购买新笔记本电脑以及特定用途方面的建议。”
- en: 'Analysis: In this example, the prompt assigns the role of a customer support
    agent to the AI and identifies the goal of offering tailored product recommendations.
    The context specifies that the user is seeking advice on purchasing a new laptop
    within a particular budget range and for specific use cases. This well-crafted
    prompt empowers the AI to provide relevant and customized product suggestions,
    enhancing the user’s shopping experience and adding value to the customer support
    interaction.'
  id: totrans-724
  prefs: []
  type: TYPE_NORMAL
  zh: 分析：在这个例子中，提示将AI分配为客服代理的角色，并确定了提供定制产品推荐的目标。上下文指定用户正在寻求关于在特定预算范围内购买新笔记本电脑以及特定用途方面的建议。这个精心设计的提示使AI能够提供相关和定制的产品建议，从而提升用户的购物体验并增加客户支持互动的价值。
- en: In conclusion, prompt engineering in customer support helps agents to deliver
    efficient, accurate, and user-centric interactions. By employing RGC inquiry prompts,
    identity verification prompts, preference elicitation prompts, order information
    prompts, and policy clarification prompts, organizations can elevate their customer
    support capabilities, providing prompt solutions and enhancing user satisfaction.
  id: totrans-725
  prefs: []
  type: TYPE_NORMAL
  zh: 总结：在客户支持中，提示工程帮助代理提供高效、准确和以用户为中心的互动。通过采用RGC询问提示、身份验证提示、偏好诱导提示、订单信息提示和政策澄清提示，组织可以提高其客户支持能力，提供及时解决方案并提升用户满意度。
- en: 9.2 GENERATING CONTENT FOR SOCIAL MEDIA AND MARKETING
  id: totrans-726
  prefs: []
  type: TYPE_NORMAL
  zh: 9.2 为社交媒体和营销生成内容
- en: Social media and marketing can benefit from the potential of AI-driven content
    generation. In this section, we delve into how prompt engineering and language
    models are revolutionizing content creation for social media platforms and marketing
    campaigns. Drawing from research and practical examples, we unveil the pivotal
    role of AI in crafting engaging and impactful content.
  id: totrans-727
  prefs: []
  type: TYPE_NORMAL
  zh: 社交媒体和营销可以从AI驱动的内容生成的潜力中受益。在本节中，我们深入探讨提示工程和语言模型如何革命性地改变社交媒体平台和营销活动的内内容创作。通过研究和实际案例，我们揭示了AI在制作吸引人并具有影响力的内容中的关键作用。
- en: Transforming Social Media with AI-Powered Content
  id: totrans-728
  prefs: []
  type: TYPE_NORMAL
  zh: 用AI驱动的内容改变社交媒体
- en: Social media platforms thrive on fresh, engaging content. AI, powered by prompt
    engineering, has emerged as a game-changer in this arena, offering scalable content
    generation with a human touch.
  id: totrans-729
  prefs: []
  type: TYPE_NORMAL
  zh: 社交媒体平台依赖于新鲜、吸引人的内容。通过提示工程驱动的AI已经在这个领域成为变革者，提供具有人性化的可扩展内容生成。
- en: 'EXAMPLE 1: Social Media Posts'
  id: totrans-730
  prefs: []
  type: TYPE_NORMAL
  zh: 示例1：社交媒体帖子
- en: 'Prompt: “As a content creator, craft compelling social media posts. Create
    engaging posts to promote a new product launch for a tech company.”'
  id: totrans-731
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：“作为内容创作者，制作吸引人的社交媒体帖子。为一家科技公司的产品发布创建引人入胜的帖子。”
- en: 'Analysis: In this example, the prompt assigns the role of a content creator
    to the AI and sets the goal as crafting compelling social media posts. The context
    specifies that the posts should focus on promoting a new product launch for a
    tech company. This well-constructed prompt guides the AI to generate attention-grabbing
    and relevant social media content, contributing to a successful marketing campaign.'
  id: totrans-732
  prefs: []
  type: TYPE_NORMAL
  zh: 分析：在这个例子中，提示将AI分配为内容创作者的角色，并将目标设定为制作吸引人的社交媒体帖子。上下文指定帖子应专注于推广一家科技公司的新产品发布。这个精心构建的提示引导AI生成引人注目且相关的社交媒体内容，有助于成功的营销活动。
- en: 'EXAMPLE 2: Hashtag Campaigns'
  id: totrans-733
  prefs: []
  type: TYPE_NORMAL
  zh: 示例2：标签活动
- en: 'Prompt: “As a social media manager, develop an impactful hashtag campaign.
    Create the hashtag and associated content to generate buzz around an upcoming
    product release.”'
  id: totrans-734
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：作为社交媒体经理，制定一个有影响力的标签活动。创建标签及其相关内容，以围绕即将发布的产品发布产生轰动。
- en: 'Analysis: In this example, the prompt assigns the role of a social media manager
    and identifies the goal of developing an impactful hashtag campaign. The context
    specifies that the campaign should aim to create a trending hashtag and associated
    content to generate excitement and anticipation for an upcoming product release.
    This prompt provides clear direction to the AI, enabling it to generate hashtag
    ideas and campaign content that resonate with the target audience and maximize
    engagement.'
  id: totrans-735
  prefs: []
  type: TYPE_NORMAL
  zh: 分析：在这个例子中，提示将社交媒体经理的角色分配给AI，并确定了开发有影响力的标签活动的目标。上下文指定该活动应旨在创建一个热门标签及其相关内容，以产生对即将发布的产品发布的兴奋和期待。这个提示为AI提供了明确的指导，使其能够生成与目标受众产生共鸣并最大化参与度的标签想法和活动内容。
- en: 'EXAMPLE 3: Product Descriptions'
  id: totrans-736
  prefs: []
  type: TYPE_NORMAL
  zh: 示例 3：产品描述
- en: 'Prompt: “As a copywriter, create persuasive product descriptions. Generate
    captivating and informative product descriptions for a new line of tech gadgets.”'
  id: totrans-737
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：作为抄写员，创建有说服力的产品描述。为一系列新技术产品生成吸引人且信息丰富的产品描述。
- en: 'Analysis: In this example, the prompt assigns the role of a copywriter to the
    AI and identifies the goal of creating persuasive product descriptions. The context
    specifies that the task involves generating captivating and informative product
    descriptions for a new line of tech gadgets. This carefully crafted prompt guides
    the AI to produce product descriptions that interest potential buyers and provide
    valuable details about the featured tech gadgets, ultimately enhancing the e-commerce
    shopping experience.'
  id: totrans-738
  prefs: []
  type: TYPE_NORMAL
  zh: 分析：在这个例子中，提示将抄写员的角色分配给AI，并确定了创建有说服力的产品描述的目标。上下文指定任务涉及为一系列新技术产品生成吸引人且信息丰富的产品描述。这个精心设计的提示引导AI生成能够吸引潜在买家并提供有关特色技术产品的有价值细节的产品描述，从而最终提升电子商务购物体验。
- en: In summary, AI-powered content generation, driven by prompt engineering, is
    transforming social media engagement and marketing campaigns. Through engagement-focused
    prompts, trend-integrated prompts, feature-centric prompts, experience-driven
    prompts, and persuasive prompts, organizations can harness the creative potential
    of AI to craft compelling content that resonates with audiences and drives marketing
    success.
  id: totrans-739
  prefs: []
  type: TYPE_NORMAL
  zh: 总结来说，由提示工程驱动的AI内容生成正在改变社交媒体参与和营销活动。通过关注参与的提示、整合趋势的提示、以功能为中心的提示、以经验驱动的提示和说服性提示，组织可以利用AI的创造潜力来制作与受众产生共鸣并推动营销成功的引人入胜的内容。
- en: '9.3 EDUCATIONAL USE CASES: TEACHING AND LEARNING WITH CHATGPT'
  id: totrans-740
  prefs: []
  type: TYPE_NORMAL
  zh: 9.3 教育用例：使用ChatGPT进行教学和学习
- en: Education is ready for a digital revolution, and AI, particularly chatbots driven
    by prompt engineering, is at the forefront of this transformation. In this section,
    we explore how AI can revolutionize teaching and learning, drawing from research
    findings and real-world examples to illuminate its pivotal role in education.
  id: totrans-741
  prefs: []
  type: TYPE_NORMAL
  zh: 教育正准备迎接数字革命，而人工智能，尤其是由提示工程驱动的聊天机器人，正处在这一变革的前沿。在本节中，我们探讨人工智能如何通过研究结论和现实世界案例来革新教学和学习，阐明其在教育中的关键作用。
- en: Transforming Education with AI-Powered Chatbots
  id: totrans-742
  prefs: []
  type: TYPE_NORMAL
  zh: 利用AI聊天机器人转型教育
- en: AI-driven chatbots are reshaping education by providing personalized, accessible,
    and interactive learning experiences for students of all ages.
  id: totrans-743
  prefs: []
  type: TYPE_NORMAL
  zh: 由人工智能驱动的聊天机器人正在通过为所有年龄段的学生提供个性化、可访问和互动的学习体验来重塑教育。
- en: 'EXAMPLE 1: Homework Assistance'
  id: totrans-744
  prefs: []
  type: TYPE_NORMAL
  zh: 示例 1：作业帮助
- en: 'Prompt: “As a virtual tutor, aid a student in solving a calculus problem. The
    student requires step-by-step guidance on finding the derivative of a complex
    trigonometric function.”'
  id: totrans-745
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：作为虚拟导师，帮助学生解决微积分问题。学生需要逐步指导来找到复杂三角函数的导数。
- en: 'Analysis: In this example, the prompt assigns the role of a virtual tutor to
    the AI and defines the goal as aiding a student in solving a calculus problem.
    The context specifies that the student needs step-by-step guidance on finding
    the derivative of a complex trigonometric function. This thoughtfully crafted
    prompt guides the AI to provide educational support tailored to the specific academic
    needs of the student, facilitating a more effective and engaging learning experience.
    Prompts can be followed by further queries to help student to articulate their
    understanding of a problem.'
  id: totrans-746
  prefs: []
  type: TYPE_NORMAL
  zh: 分析：在这个例子中，提示将AI分配为虚拟导师的角色，并将目标定义为帮助学生在解决微积分问题。上下文指定学生需要找到复杂三角函数导数的逐步指导。这个精心设计的提示引导AI提供针对学生特定学术需求的教育支持，促进更有效和吸引人的学习体验。提示可以随后跟进一步的问题，帮助学生表达对问题的理解。
- en: 'EXAMPLE 2: Language Learning'
  id: totrans-747
  prefs: []
  type: TYPE_NORMAL
  zh: 示例 2：语言学习
- en: 'Prompt: “As a programming instructor, teach the basics of Python programming.
    Students are beginners and seek an introduction to Python, including variables,
    data types, and simple programs.”'
  id: totrans-748
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：“作为一名编程讲师，教授Python编程的基础知识。学生是初学者，寻求对Python的介绍，包括变量、数据类型和简单程序。”
- en: 'Analysis: In this example, the prompt assigns the role of programming instructor
    to the AI and defines the goal as teaching the basics of Python programming. The
    context specifies that the students are beginners who seek an introduction to
    Python, including concepts such as variables, data types, and simple programs.
    This carefully crafted prompt guides the AI to provide an effective and structured
    introduction to Python programming, catering to the students’ specific learning
    needs and objectives.'
  id: totrans-749
  prefs: []
  type: TYPE_NORMAL
  zh: 分析：在这个例子中，提示将AI分配为编程讲师的角色，并将目标定义为教授Python编程的基础知识。上下文指定学生们是初学者，寻求对Python的介绍，包括变量、数据类型和简单程序等概念。这个精心设计的提示引导AI提供有效且结构化的Python编程介绍，满足学生的特定学习需求和目标。
- en: 'EXAMPLE 3: Concept Clarification'
  id: totrans-750
  prefs: []
  type: TYPE_NORMAL
  zh: 示例 3：概念澄清
- en: 'Prompt: “As a subject matter expert, explain the principles of quantum mechanics.
    Students seek a clear and concise explanation of quantum mechanics concepts, including
    wave-particle duality and quantum states.”'
  id: totrans-751
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：“作为一名学科专家，解释量子力学的基本原理。学生们寻求对量子力学概念的清晰简洁的解释，包括波粒二象性和量子态。”
- en: 'Analysis: In this example, the prompt assigns the role of a subject matter
    expert to the AI and defines the goal as explaining the principles of quantum
    mechanics. The context specifies that the students are seeking a clear and concise
    explanation of quantum mechanics concepts, with a focus on understanding topics
    like wave-particle duality and quantum states. This thoughtfully crafted prompt
    guides the AI to provide an informative and comprehensible explanation, facilitating
    the student’s grasp of complex scientific concepts.'
  id: totrans-752
  prefs: []
  type: TYPE_NORMAL
  zh: 分析：在这个例子中，提示将AI分配为学科专家的角色，并将目标定义为解释量子力学的基本原理。上下文指定学生们寻求对量子力学概念的清晰简洁的解释，重点在于理解波粒二象性和量子态等主题。这个精心设计的提示引导AI提供信息丰富且易于理解的解释，帮助学生掌握复杂的科学概念。
- en: 'EXAMPLE 4: Test Preparation'
  id: totrans-753
  prefs: []
  type: TYPE_NORMAL
  zh: 示例 4：考试准备
- en: 'Prompt: “As an exam coach, assist a student in practicing algebraic equations.
    The student needs guided practice on solving algebraic equations involving variables,
    fractions, and simplification for an upcoming math exam.”'
  id: totrans-754
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：“作为一名考试教练，协助学生练习代数方程。学生需要指导练习解决涉及变量、分数和简化的代数方程，为即将到来的数学考试做准备。”
- en: 'Analysis: In this example, the prompt assigns the role of an exam coach to
    the AI and defines the goal as assisting a student in practicing algebraic equations.
    The context specifies that the student requires guided practice in solving algebraic
    equations that involve variables, fractions, and simplification, all in preparation
    for an upcoming math exam. This carefully crafted prompt guides the AI to provide
    tailored exercises and explanations to help the student improve their algebraic
    problem-solving skills and excel in their examination.'
  id: totrans-755
  prefs: []
  type: TYPE_NORMAL
  zh: 分析：在这个例子中，提示将AI分配为考试教练的角色，并将目标定义为协助学生练习代数方程。上下文指定学生需要指导练习解决涉及变量、分数和简化的代数方程，所有这些都是在为即将到来的数学考试做准备。这个精心设计的提示引导AI提供定制的练习和解释，帮助学生提高代数问题解决技能，并在考试中表现出色。
- en: 'EXAMPLE 5: Capstone Project Report'
  id: totrans-756
  prefs: []
  type: TYPE_NORMAL
  zh: 示例 5：毕业设计报告
- en: 'Prompt: “As an engineering advisor, provide guidance on the capstone project
    report. Students are working on a capstone project report detailing the design,
    construction, and testing of a small wind turbine for renewable energy generation.”'
  id: totrans-757
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：作为工程顾问，提供关于毕业设计报告的指导。学生正在制作一份毕业设计报告，详细介绍了用于可再生能源发电的小型风力涡轮机的设计、建造和测试。
- en: 'Analysis: In this example, the prompt assigns the role of an engineering advisor
    to the AI and identifies the goal as providing guidance on the capstone project
    report. The context specifies that the student team is working on a capstone project
    report that details the design, construction, and testing of a small wind turbine
    for renewable energy generation. This thoughtfully crafted prompt guides the AI
    to offer expert advice, insights, and feedback to help the student successfully
    complete their capstone project and report on the innovative design of a small
    wind turbine.'
  id: totrans-758
  prefs: []
  type: TYPE_NORMAL
  zh: 分析：在这个例子中，提示将工程顾问的角色分配给人工智能，并确定了目标为提供关于毕业设计报告的指导。上下文指定学生团队正在制作一份毕业设计报告，详细介绍了用于可再生能源发电的小型风力涡轮机的设计、建造和测试。这个深思熟虑的提示引导人工智能提供专业建议、见解和反馈，帮助学生成功完成毕业设计和报告，并介绍小型风力涡轮机的创新设计。
- en: In conclusion, AI-driven chatbots, guided by prompt engineering, are reshaping
    education by providing personalized and interactive learning experiences. Whether
    it is homework assistance, language learning, concept clarification, test preparation,
    or tutoring, these chatbots offer valuable support and foster skill development
    for students of all levels. As the education industry continues to evolve, AI-powered
    chatbots can become indispensable tools in the pursuit of knowledge.
  id: totrans-759
  prefs: []
  type: TYPE_NORMAL
  zh: 总结来说，由提示工程引导的人工智能聊天机器人正在通过提供个性化的互动学习体验来重塑教育。无论是家庭作业辅助、语言学习、概念澄清、考试准备还是辅导，这些聊天机器人都为学生提供了宝贵的支持，并促进了各层次学生的技能发展。随着教育行业的持续发展，人工智能驱动的聊天机器人可以成为追求知识过程中不可或缺的工具。
- en: 9.4 BUSINESS APPLICATIONS
  id: totrans-760
  prefs: []
  type: TYPE_NORMAL
  zh: 9.4 商业应用
- en: AI-powered chatbots and prompt engineering in business are causing profound
    transformations. This section explores the myriad ways in which these technologies
    are revolutionizing business operations, decision-making, and customer interactions
    using research insights and practical examples.
  id: totrans-761
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能驱动的聊天机器人和商业中的提示工程正在引起深刻的变革。本节探讨了这些技术如何通过研究洞察力和实际案例，以多种方式革新商业运营、决策和客户互动。
- en: Enhancing Business Operations with AI Chatbots
  id: totrans-762
  prefs: []
  type: TYPE_NORMAL
  zh: 利用人工智能聊天机器人增强商业运营
- en: Businesses are increasingly turning to AI chatbots to streamline operations,
    reduce costs, and improve customer service.
  id: totrans-763
  prefs: []
  type: TYPE_NORMAL
  zh: 企业越来越多地转向人工智能聊天机器人以简化运营、降低成本并改善客户服务。
- en: 'EXAMPLE 1: Customer Service Chatbots'
  id: totrans-764
  prefs: []
  type: TYPE_NORMAL
  zh: 'EXAMPLE 1: 客户服务聊天机器人'
- en: 'Prompt: “As a chatbot developer, give guidance to create an effective customer
    service chatbot. The business seeks to implement a chatbot to handle customer
    inquiries and support requests in real-time.”'
  id: totrans-765
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：作为聊天机器人开发者，指导创建一个有效的客户服务聊天机器人。企业寻求实施聊天机器人以实时处理客户咨询和支持请求。
- en: 'Analysis: In this example, the prompt assigns the role of chatbot developer
    to the AI and identifies the goal as creating an effective customer service chatbot.
    The context specifies that the business is interested in implementing a chatbot
    to handle customer inquiries and support requests in real-time. This carefully
    crafted prompt guides the AI to focus on developing a chatbot solution tailored
    to the specific needs and objectives of the business, streamlining customer support
    processes, and enhancing the overall customer experience.'
  id: totrans-766
  prefs: []
  type: TYPE_NORMAL
  zh: 分析：在这个例子中，提示将聊天机器人开发者的角色分配给人工智能，并确定了目标为创建一个有效的客户服务聊天机器人。上下文指定企业有兴趣实施聊天机器人以实时处理客户咨询和支持请求。这个精心设计的提示引导人工智能专注于开发针对企业特定需求和目标的聊天机器人解决方案，简化客户支持流程，并提升整体客户体验。
- en: 'EXAMPLE 2: Sales Assistance'
  id: totrans-767
  prefs: []
  type: TYPE_NORMAL
  zh: 'EXAMPLE 2: 销售辅助'
- en: 'Prompt: “As a sales support AI, assist customers in making purchase decisions.
    Customers are seeking guidance and recommendations for selecting the right products
    based on their preferences and needs.”'
  id: totrans-768
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：作为销售支持人工智能，协助客户做出购买决策。客户正在寻求基于他们的偏好和需求选择合适产品的指导和推荐。
- en: 'Analysis: In this example, the prompt assigns the role of a sales support AI
    to the AI and identifies the goal as assisting customers in making purchase decisions.
    The context specifies that customers are seeking guidance and recommendations
    for selecting the right products based on their preferences and needs. This thoughtfully
    crafted prompt guides the AI to offer personalized product suggestions and assistance,
    helping customers make informed purchasing decisions and contributing to increased
    sales and customer satisfaction.'
  id: totrans-769
  prefs: []
  type: TYPE_NORMAL
  zh: 分析：在这个例子中，提示将销售支持AI的角色分配给AI，并确定目标为协助客户做出购买决策。上下文指定客户正在寻求基于他们的偏好和需求选择合适产品的指导和推荐。这个精心设计的提示引导AI提供个性化的产品建议和帮助，帮助客户做出明智的购买决策，并有助于增加销售额和客户满意度。
- en: 'EXAMPLE 3: Lead Generation'
  id: totrans-770
  prefs: []
  type: TYPE_NORMAL
  zh: 'EXAMPLE 3: 领先生成'
- en: 'Prompt: “As a lead generation AI, identify and qualify potential leads. The
    business aims to leverage AI to identify and qualify potential customers who have
    expressed interest in their products or services. Use the Outbound Marketing method.”'
  id: totrans-771
  prefs: []
  type: TYPE_NORMAL
  zh: 提示： “作为潜在客户生成AI，识别和筛选潜在客户。企业旨在利用AI识别和筛选对他们的产品或服务表现出兴趣的潜在客户。使用外展营销方法。”
- en: 'Analysis: In this example, the prompt assigns the role of a lead generation
    AI to the AI and identifies the goal as identifying and qualifying potential leads.
    The context specifies that the business is looking to harness AI to identify and
    assess potential customers who have shown interest in their products or services.
    This carefully crafted prompt guides the AI to focus on processes that help identify
    and categorize potential leads efficiently, ultimately contributing to the growth
    and success of the business’s sales efforts.'
  id: totrans-772
  prefs: []
  type: TYPE_NORMAL
  zh: 分析：在这个例子中，提示将潜在客户生成AI的角色分配给AI，并确定目标为识别和筛选潜在客户。上下文指定企业正在寻求利用AI识别和评估对他们的产品或服务表现出兴趣的潜在客户。这个精心设计的提示引导AI专注于帮助高效识别和分类潜在客户的流程，最终有助于企业销售工作的增长和成功。
- en: 'EXAMPLE 4: Employee Onboarding'
  id: totrans-773
  prefs: []
  type: TYPE_NORMAL
  zh: 'EXAMPLE 4: 员工入职'
- en: 'Prompt: “As an onboarding assistant AI, streamline the employee onboarding
    process. Business aims to leverage AI to automate and enhance the employee onboarding
    experience for new hires.”'
  id: totrans-774
  prefs: []
  type: TYPE_NORMAL
  zh: 提示： “作为入职助理AI，简化员工入职流程。企业旨在利用AI自动化并提升新员工的入职体验。”
- en: 'Analysis: In this example, the prompt assigns the role of an onboarding assistant
    to the AI and identifies the goal as streamlining the employee onboarding process.
    The context specifies that the business is looking to use AI to automate and improve
    the overall employee onboarding experience for new hires. This thoughtfully crafted
    prompt guides the AI to focus on developing solutions that expedite and simplify
    the onboarding process, allowing new employees to seamlessly integrate into the
    organization, ultimately leading to increased efficiency and employee satisfaction.'
  id: totrans-775
  prefs: []
  type: TYPE_NORMAL
  zh: 分析：在这个例子中，提示将入职助理的角色分配给AI，并确定目标为简化员工入职流程。上下文指定企业正在寻求利用AI自动化并改善新员工的整体入职体验。这个精心设计的提示引导AI专注于开发加速和简化入职流程的解决方案，使新员工能够无缝融入组织，最终提高效率和员工满意度。
- en: 'EXAMPLE 5: Data Analysis'
  id: totrans-776
  prefs: []
  type: TYPE_NORMAL
  zh: 'EXAMPLE 5: 数据分析'
- en: 'Prompt: “As a data analysis AI, analyze and extract insights from complex datasets.
    Business seeks to leverage AI to process and interpret large volumes of data,
    extracting valuable insights for informed decision-making.”'
  id: totrans-777
  prefs: []
  type: TYPE_NORMAL
  zh: 提示： “作为数据分析AI，分析并从复杂的数据集中提取洞察。企业寻求利用AI处理和解释大量数据，为明智的决策提供有价值的见解。”
- en: 'Analysis: In this example, the prompt assigns the role of a data analysis AI
    to the AI and identifies the goal as analyzing and extracting insights from complex
    datasets. The context specifies that the business is interested in using AI to
    handle the processing and interpretation of large volumes of data, with the objective
    of extracting valuable insights to support informed decision-making. This carefully
    crafted prompt guides the AI to focus on data analytics tasks, enabling the business
    to make data-driven decisions and gain a competitive edge.'
  id: totrans-778
  prefs: []
  type: TYPE_NORMAL
  zh: 分析：在这个例子中，提示将数据分析AI的角色分配给AI，并确定目标为分析和从复杂的数据集中提取洞察。上下文指定企业对使用AI处理和解释大量数据感兴趣，目的是提取有价值的见解以支持明智的决策。这个精心设计的提示引导AI专注于数据分析任务，使企业能够做出基于数据的决策并获得竞争优势。
- en: In conclusion, AI chatbots empowered by prompt engineering are motivating efficiency
    and innovation across diverse business sectors. Whether it is customer service,
    sales, lead generation, employee onboarding, or data analysis, these chatbots
    are enhancing operations, improving decision-making, and elevating customer experiences.
    As businesses continue to embrace AI-driven solutions, chatbots are poised to
    become indispensable allies in achieving operational excellence.
  id: totrans-779
  prefs: []
  type: TYPE_NORMAL
  zh: 总之，由提示工程赋能的AI聊天机器人正在激发各行各业效率和创新的动力。无论是客户服务、销售、线索生成、员工入职还是数据分析，这些聊天机器人正在提升运营、改善决策并提升客户体验。随着企业继续拥抱由AI驱动的解决方案，聊天机器人有望成为实现运营卓越不可或缺的盟友。
- en: 9.5 TECHNICAL AND ENGINEERING APPLICATIONS
  id: totrans-780
  prefs: []
  type: TYPE_NORMAL
  zh: 9.5 技术与工程应用
- en: The role of prompt engineering in the technical and engineering domains has
    emerged as a transformative force. This section examines the multifaceted applications
    of prompt engineering within the realms of technology and engineering. From aiding
    in product design and structural analysis to streamlining manufacturing processes
    and fostering innovation in materials science, well-constructed prompts are indispensable
    tools for professionals and researchers alike. Here, we explore how the art of
    prompt engineering has been harnessed to drive progress, optimize operations,
    and spur innovation across various technical and engineering disciplines. Through
    a series of illustrative examples, we uncover the impact of this field on problem-solving,
    idea generation, and the pursuit of excellence in technical and engineering endeavors.
    This section examines the intersection of prompt engineering and technological
    innovation, where precision in language meets the intricacies of complex systems,
    fostering creativity, efficiency, and advancement.
  id: totrans-781
  prefs: []
  type: TYPE_NORMAL
  zh: 提示工程在技术和工程领域的角色已经崛起为一个变革性的力量。本节探讨了提示工程在技术和工程领域中的多方面应用。从协助产品设计、结构分析到简化制造流程和促进材料科学领域的创新，精心构建的提示对于专业人士和研究人员都是不可或缺的工具。在这里，我们探讨了提示工程的艺术如何被利用来推动进步、优化运营并在各个技术和工程学科中激发创新。通过一系列的实例，我们揭示了这一领域对问题解决、创意生成和在技术和工程事业中追求卓越的影响。本节探讨了提示工程与技术创新的交汇点，在这里语言的精确性与复杂系统的复杂性相遇，促进了创造力、效率和进步。
- en: 'EXAMPLE 1: Product Design'
  id: totrans-782
  prefs: []
  type: TYPE_NORMAL
  zh: 示例1：产品设计
- en: 'Prompt: “As a product designer, conceptualize a sustainable urban transportation
    solution. Design an eco-friendly and efficient mode of urban transportation that
    addresses the challenges of congestion and environmental impact.”'
  id: totrans-783
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：“作为产品设计师，构思一个可持续的城市交通解决方案。设计一种环保且高效的交通方式，以解决拥堵和环境影响的挑战。”
- en: In this example, the prompt defines the role of the AI as a product designer
    and identifies the goal as conceptualizing a sustainable urban transportation
    solution. The context specifies that the design should focus on creating an eco-friendly
    and efficient mode of urban transportation while addressing the pressing challenges
    of congestion and environmental impact. This carefully crafted prompt guides the
    AI to generate design ideas that align with sustainability goals, contributing
    to the evolution of urban transportation solutions.
  id: totrans-784
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个例子中，提示定义了AI的角色为产品设计师，并确定了目标为构思一个可持续的城市交通解决方案。上下文指定，设计应侧重于创造一种环保且高效的城市交通方式，同时解决拥堵和环境影响的紧迫挑战。这个精心设计的提示引导AI生成与可持续性目标一致的设计理念，为城市交通解决方案的演变做出贡献。
- en: 'As another example, consider the following prompt:'
  id: totrans-785
  prefs: []
  type: TYPE_NORMAL
  zh: 作为另一个例子，考虑以下提示：
- en: 'Prompt: “As an automotive component designer, innovate a high-performance car
    brake system component. Design a novel and efficient brake caliper component that
    enhances braking performance, durability, and safety in high-performance sports
    cars.”'
  id: totrans-786
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：“作为汽车零部件设计师，创新一种高性能汽车制动系统零部件。设计一种新颖且高效的制动卡钳零部件，以提升高性能运动汽车的制动性能、耐用性和安全性。”
- en: In this prompt, the AI is assigned the role of an automotive component designer
    with the goal of innovating a high-performance car brake system component. The
    context specifies that the design challenge involves creating a novel brake caliper
    component. This component should not only enhance braking performance but also
    improve durability and safety, particularly for use in high-performance sports
    cars. This well-constructed prompt guides the AI to focus on designing a cutting-edge
    brake system component, pushing the boundaries of automotive engineering for enhanced
    performance and safety.
  id: totrans-787
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个提示中，AI被分配了汽车零部件设计师的角色，目标是创新高性能汽车制动系统组件。背景说明设计挑战涉及创建一个新颖的制动卡钳组件。这个组件不仅需要提高制动性能，还要提升耐用性和安全性，尤其是在高性能运动汽车中使用。这个结构良好的提示引导AI专注于设计一个前沿的制动系统组件，推动汽车工程边界，以提升性能和安全。
- en: 'EXAMPLE 2: Structural Analysis'
  id: totrans-788
  prefs: []
  type: TYPE_NORMAL
  zh: 示例2：结构分析
- en: 'Prompt: “As a structural engineer, evaluate the load-bearing capacity of a
    steel bridge main girder. Perform a comprehensive structural analysis of the girder,
    focusing on load bearing, stress distribution, and potential areas of reinforcement.”'
  id: totrans-789
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：作为结构工程师，评估钢桥主梁的承重能力。对梁进行全面的钢结构分析，重点关注承重、应力分布和可能需要加固的区域。
- en: In this example, the prompt assigns the role of structural analyst to the AI
    and identifies the goal as evaluating the load-bearing capacity of a steel bridge
    girder. The context specifies that the analysis should be comprehensive, with
    a particular focus on load-bearing capacity, stress distribution, and identifying
    areas that may require reinforcement. This well-constructed prompt guides the
    AI to conduct a rigorous structural analysis, ensuring the safety and longevity
    of the bridge while adhering to engineering standards and best practices.
  id: totrans-790
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个例子中，提示将结构分析师的角色分配给AI，并确定目标为评估钢桥主梁的承重能力。背景说明分析应该是全面的，特别关注承重能力、应力分布以及可能需要加固的区域。这个结构良好的提示引导AI进行严格的结构分析，确保桥梁的安全性和耐久性，同时遵守工程标准和最佳实践。
- en: 'EXAMPLE 3: Computer-Aided Design (CAD)'
  id: totrans-791
  prefs: []
  type: TYPE_NORMAL
  zh: 示例3：计算机辅助设计（CAD）
- en: 'Prompt: “As a CAD designer, create the list of main features for a concept
    design for an ergonomic office chair. Develop a concept design for an ergonomic
    office chair that prioritizes user comfort, support, and aesthetic appeal while
    adhering to ergonomic principles.”'
  id: totrans-792
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：作为CAD设计师，为人体工学办公椅的概念设计列出主要功能。开发一个优先考虑用户舒适度、支撑性和美学吸引力的概念设计，同时遵守人体工学原则。
- en: 'Analysis: In this example, the prompt assigns the role of a CAD designer to
    the AI and identifies the goal as creating a concept design for an ergonomic office
    chair. The context specifies that the design should prioritize user comfort, support,
    and aesthetic appeal while adhering to ergonomic principles. This carefully constructed
    prompt guides the AI to generate a CAD design that not only encourages an innovative
    approach, but also ensures that the final product meets the highest standards
    of ergonomic design, enhancing user experience and productivity in office environments.'
  id: totrans-793
  prefs: []
  type: TYPE_NORMAL
  zh: 分析：在这个例子中，提示将CAD设计师的角色分配给AI，并确定目标为创建人体工学办公椅的概念设计。背景说明设计应优先考虑用户舒适度、支撑性和美学吸引力，同时遵守人体工学原则。这个精心构造的提示引导AI生成一个CAD设计，不仅鼓励创新方法，还确保最终产品达到最高的人体工学设计标准，提升办公环境中的用户体验和生产效率。
- en: 'EXAMPLE 4: Material Engineering and Science'
  id: totrans-794
  prefs: []
  type: TYPE_NORMAL
  zh: 示例4：材料工程与科学
- en: 'Prompt: “As a material scientist/engineer, identify and suggest a new material
    with exceptional thermal conductivity. Conduct research to discover a novel material
    with superior thermal conductivity properties for applications in electronics
    cooling and heat management.”'
  id: totrans-795
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：作为材料科学家/工程师，识别并建议一种具有卓越热导率的全新材料。进行研究以发现具有优异热导率特性的新型材料，适用于电子冷却和热管理应用。
- en: 'Analysis: In this example, the prompt assigns the role of a material scientist/engineer
    to the AI and identifies the goal as discovering a new material with exceptional
    thermal conductivity. The context specifies that the research should focus on
    finding a novel material with superior thermal conductivity properties, particularly
    for use in electronics cooling and heat management applications. This thoughtfully
    crafted prompt guides the AI to explore materials science, pushing the boundaries
    of thermal conductivity research to uncover materials that could revolutionize
    heat management solutions in various industries.'
  id: totrans-796
  prefs: []
  type: TYPE_NORMAL
  zh: 分析：在这个例子中，提示将材料科学家/工程师的角色分配给AI，并确定目标为发现具有卓越热导率的全新材料。上下文指定，研究应侧重于寻找具有优越热导率特性的新型材料，特别是用于电子冷却和热管理应用。这个深思熟虑的提示引导AI探索材料科学，推动热导率研究边界，以揭示可能彻底改变各行业热管理解决方案的材料。
- en: 'EXAMPLE 5: Environmental and Energy Engineering'
  id: totrans-797
  prefs: []
  type: TYPE_NORMAL
  zh: 'EXAMPLE 5: 环境与能源工程'
- en: 'Prompt: “As an engineer, develop an energy-efficient HVAC system for a green
    building. Design an HVAC system that maximizes energy efficiency and minimizes
    environmental impact in a LEED-certified green building project.”'
  id: totrans-798
  prefs: []
  type: TYPE_NORMAL
  zh: 'Prompt: “作为一名工程师，为绿色建筑开发节能的暖通空调系统。设计一个最大化能源效率并最小化环境影响的暖通空调系统，适用于LEED认证的绿色建筑项目。”'
- en: 'Analysis: In this example, the prompt assigns the role of engineer to the AI
    and identifies the goal as developing an energy-efficient HVAC (Heating, Ventilation,
    and Air Conditioning) system. The context specifies that the design should prioritize
    energy efficiency and environmental sustainability, particularly in the context
    of a LEED-certified green building project. This carefully crafted prompt guides
    the AI to design an HVAC system that aligns with green building standards, reducing
    energy consumption and contributing to a more sustainable and eco-friendlier environment.'
  id: totrans-799
  prefs: []
  type: TYPE_NORMAL
  zh: 分析：在这个例子中，提示将工程师的角色分配给AI，并确定目标为开发节能的暖通空调（HVAC）系统。上下文指定，设计应优先考虑能源效率和环境可持续性，特别是在LEED认证的绿色建筑项目中。这个精心设计的提示引导AI设计一个符合绿色建筑标准的暖通空调系统，减少能源消耗，为更可持续和环保的环境做出贡献。
- en: 'EXAMPLE 6: Optimization and Automation'
  id: totrans-800
  prefs: []
  type: TYPE_NORMAL
  zh: 'EXAMPLE 6: 优化与自动化'
- en: 'Prompt: “As a manufacturing automation specialist, implement an automated quality
    control system for a food packaging plant. Develop an automated solution that
    ensures precise quality checks, minimizes product waste, and enhances overall
    operational efficiency in a food packaging facility.”'
  id: totrans-801
  prefs: []
  type: TYPE_NORMAL
  zh: 'Prompt: “作为一名制造自动化专家，为一家食品包装工厂实施自动化质量控制系统。开发一个确保精确质量检查、最小化产品浪费并提高食品包装设施整体运营效率的自动化解决方案。”'
- en: 'Analysis: In this prompt, the AI is assigned the role of a Manufacturing Automation
    Specialist, and the goal is to implement an automated quality control system.
    The context specifies that the focus should be on creating an automated solution
    that ensures precise quality checks, minimizes product waste, and improves the
    overall operational efficiency of a food packaging facility. This prompt guides
    the AI to explore automation technologies and solutions to optimize the food packaging
    process, ensuring high-quality products and reduced operational costs.'
  id: totrans-802
  prefs: []
  type: TYPE_NORMAL
  zh: 分析：在这个提示中，AI被分配了制造自动化专家的角色，目标是实施自动化质量控制系统。上下文指定，重点应放在创建一个确保精确质量检查、最小化产品浪费并提高食品包装设施整体运营效率的自动化解决方案上。这个提示引导AI探索自动化技术和解决方案，以优化食品包装流程，确保高质量的产品和降低运营成本。
- en: CHAPTER 10
  id: totrans-803
  prefs: []
  type: TYPE_NORMAL
  zh: 第十章
- en: FUTURE TRENDS AND ETHICAL CONSIDERATIONS
  id: totrans-804
  prefs: []
  type: TYPE_NORMAL
  zh: 未来趋势与伦理考量
- en: The future of prompt engineering is intertwined with the evolution of AI models
    and techniques. We discuss emerging models, such as hybrid architectures and multi-modal
    approaches, that can enhance AI-generated content. By understanding these advancements,
    we prepare to leverage cutting-edge technologies in prompt engineering.
  id: totrans-805
  prefs: []
  type: TYPE_NORMAL
  zh: 提示工程的未来与AI模型和技术的演变紧密相连。我们讨论了新兴模型，如混合架构和多模态方法，这些方法可以增强AI生成的内容。通过理解这些进步，我们为利用提示工程中的尖端技术做好准备。
- en: 10.1 THE EVOLVING LANDSCAPE OF AI-GENERATED CONTENT
  id: totrans-806
  prefs: []
  type: TYPE_NORMAL
  zh: 10.1 AI生成内容的演变格局
- en: The tools involved in AI-generated content are in a state of transformation,
    marked by rapid advancements. This section discusses the tools needed for AI-generated
    content, exploring its impact on various domains and reflecting on its future.
    Drawing from research insights and real-world examples, we examine the dynamic
    nature of AI-generated content.
  id: totrans-807
  prefs: []
  type: TYPE_NORMAL
  zh: 用于人工智能生成内容的相关工具正处于转型之中，标志着快速的发展。本节讨论了人工智能生成内容所需的工具，探讨其对各个领域的影响，并反思其未来。借鉴研究洞察力和现实世界案例，我们研究人工智能生成内容的动态性质。
- en: However, it is essential to recognize the inherent complexity in forecasting
    the future of AI advances. The pace of innovation in AI often defies prediction,
    as breakthroughs can emerge unexpectedly, disrupting established paradigms. The
    multifaceted nature of AI, spanning natural language processing, computer vision,
    and other domains, further compounds this challenge. Moreover, the ethical and
    societal implications of AI progress add layers of uncertainty to the equation.
  id: totrans-808
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，认识到预测人工智能未来发展的内在复杂性是至关重要的。人工智能创新的步伐往往难以预测，因为突破可能意外出现，颠覆既定的范式。人工智能的多方面性质，涵盖自然语言处理、计算机视觉和其他领域，进一步加剧了这一挑战。此外，人工智能进步的伦理和社会影响为这个方程式增添了不确定性。
- en: Despite these complexities, our aim is to provide a forward-looking perspective
    on the evolving landscape of AI-generated content. By examining current trends
    and anticipating potential trajectories, we hope to empower readers with the insights
    needed to navigate this dynamic field and harness its transformative potential
    for the benefit of various industries and society at large.
  id: totrans-809
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管存在这些复杂性，我们的目标是提供一个前瞻性的视角，关注人工智能生成内容不断发展的格局。通过分析当前趋势和预测潜在轨迹，我们希望为读者提供必要的洞察力，以应对这个动态领域，并利用其变革潜力为各个行业和整个社会带来益处。
- en: The Unfolding Revolution of AI-Generated Content
  id: totrans-810
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能生成内容革命的展开
- en: AI-generated content is becoming increasingly pervasive, infiltrating diverse
    sectors and reshaping the way we create, interact with, and consume information.
  id: totrans-811
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能生成的内容正变得越来越普遍，渗透到各个领域，并重塑了我们创造、互动和消费信息的方式。
- en: 'EXAMPLE 1: Creative Writing'
  id: totrans-812
  prefs: []
  type: TYPE_NORMAL
  zh: 示例 1：创意写作
- en: 'Prompt: “As a poet, compose a haiku that captures the beauty of a cherry blossom
    in spring, Craft a three-line poem that evokes the ephemeral nature of nature’s
    artistry and the renewal of life with the changing seasons.”'
  id: totrans-813
  prefs: []
  type: TYPE_NORMAL
  zh: 提示： “作为一名诗人，创作一首描绘春天樱花之美的俳句，创作一首三行诗，唤起自然艺术之短暂本质以及随着季节变化的生命更新。”
- en: 'Analysis: In this example, the prompt assigns the AI the role of a poet and
    tasks it with composing a haiku, a traditional form of Japanese poetry. The goal
    is to create a three-line poem that beautifully encapsulates the essence of a
    cherry blossom in spring. The context emphasizes the haiku’s purpose: to convey
    the fleeting yet profound beauty of nature’s artistry and the cyclical renewal
    of life as the seasons change. This prompt guides the AI to generate a poetic
    masterpiece that paints a vivid picture of nature’s wonders.'
  id: totrans-814
  prefs: []
  type: TYPE_NORMAL
  zh: 分析：在这个例子中，提示将人工智能的角色定位为诗人，并要求它创作一首俳句，这是一种传统的日本诗歌形式。目标是创作一首三行诗，完美地捕捉春天樱花的精髓。上下文强调了俳句的目的：传达自然艺术的短暂而深刻的美丽以及随着季节变化的生命循环更新。这个提示引导人工智能生成一首描绘自然奇观的诗歌杰作。
- en: 'EXAMPLE 2: Content Generation'
  id: totrans-815
  prefs: []
  type: TYPE_NORMAL
  zh: 示例 2：内容生成
- en: 'Prompt: “As a content creator, compose an informative article on sustainable
    agriculture practices. Write a well-researched article that highlights the importance
    of sustainable farming methods, their environmental benefits, and their potential
    to transform the future of agriculture.”'
  id: totrans-816
  prefs: []
  type: TYPE_NORMAL
  zh: 提示： “作为一名内容创作者，撰写一篇关于可持续农业实践的科普文章。撰写一篇经过充分研究、强调可持续耕作方法的重要性、它们的环境效益以及它们改变农业未来的潜力的文章。”
- en: 'Analysis: In this example, the prompt assigns the role of content creator to
    the AI and identifies the goal as composing an informative article. The context
    specifies that the article should focus on sustainable agriculture practices,
    emphasizing their significance, environmental advantages, and potential to revolutionize
    the agricultural industry. This well-constructed prompt guides the AI to generate
    a comprehensive and engaging article that educates readers on the topic of sustainable
    farming.'
  id: totrans-817
  prefs: []
  type: TYPE_NORMAL
  zh: 分析：在这个例子中，提示将内容创作者的角色分配给了AI，并确定了目标为撰写一篇信息性文章。上下文指定了文章应侧重于可持续农业实践，强调其重要性、环境优势以及可能对农业行业产生革命性影响的潜力。这个精心构建的提示引导AI生成一篇全面且引人入胜的文章，教育读者关于可持续农业的主题。
- en: 'EXAMPLE 3: Personalization'
  id: totrans-818
  prefs: []
  type: TYPE_NORMAL
  zh: 示例3：个性化
- en: 'Prompt: “As a user experience designer, design a personalized news recommendation
    system. Develop an algorithm that assembles news articles by considering each
    user’s interests, browsing history, and preferences, enhancing their news consumption
    experience.”'
  id: totrans-819
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：“作为用户体验设计师，设计一个个性化的新闻推荐系统。开发一个算法，通过考虑每个用户的兴趣、浏览历史和偏好来组装新闻文章，增强他们的新闻消费体验。”
- en: 'Analysis: In this example, the prompt assigns the role of a user experience
    designer to the AI and identifies the goal as designing a personalized news recommendation
    system. The context specifies that the focus should be on creating an algorithm
    that tailors news article recommendations to individual users, taking into account
    their interests, browsing history, and preferences. This well-constructed prompt
    guides the AI to develop a system that enhances the user’s news consumption experience
    by delivering content that aligns with their unique tastes and interests.'
  id: totrans-820
  prefs: []
  type: TYPE_NORMAL
  zh: 分析：在这个例子中，提示将用户体验设计师的角色分配给了AI，并确定了目标为设计一个个性化的新闻推荐系统。上下文指定了重点应放在创建一个算法上，该算法根据用户的兴趣、浏览历史和偏好定制新闻文章推荐。这个精心构建的提示引导AI开发一个系统，通过提供与用户独特品味和兴趣相符的内容来增强用户的新闻消费体验。
- en: 'EXAMPLE 4: Marketing and Advertising'
  id: totrans-821
  prefs: []
  type: TYPE_NORMAL
  zh: 示例4：市场营销和广告
- en: 'Prompt: “As a marketing strategist, generate a series of engaging social media
    advertisements for a new line of eco-friendly products. Create visually appealing
    and persuasive ad content that highlights the products’ sustainability, quality,
    and their positive impact on the environment.”'
  id: totrans-822
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：“作为市场营销策略师，为一系列环保产品生成引人入胜的社交媒体广告。创建视觉吸引力和说服力的广告内容，突出产品的可持续性、质量和对环境的积极影响。”
- en: 'Analysis: In this example, the prompt assigns the role of a marketing strategist
    to the AI and identifies the goal as generating a series of engaging social media
    advertisements. The context specifies that the focus should be on creating visually
    appealing and persuasive ad content that showcases a new line of eco-friendly
    products. The ads should emphasize the products’ sustainability, quality, and
    the positive impact they have on the environment. This well-structured prompt
    guides the AI to craft advertisements that effectively communicate the product’s
    unique selling points to potential customers.'
  id: totrans-823
  prefs: []
  type: TYPE_NORMAL
  zh: 分析：在这个例子中，提示将市场营销策略师的角色分配给了AI，并确定了目标为生成一系列引人入胜的社交媒体广告。上下文指定了重点应放在创建视觉吸引力和说服力的广告内容上，展示一款新的环保产品系列。广告应强调产品的可持续性、质量和对环境的积极影响。这个精心构建的提示引导AI制作出能够有效传达产品独特卖点给潜在客户的广告。
- en: 'EXAMPLE 5: Language Translation'
  id: totrans-824
  prefs: []
  type: TYPE_NORMAL
  zh: 示例5：语言翻译
- en: 'Prompt: “As a language translator, translate a complex legal document from
    English to Spanish. Ensure accuracy, consistency, and adherence to legal terminology,
    providing a seamless and reliable translation for legal professionals.”'
  id: totrans-825
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：“作为语言翻译员，将一份复杂的法律文件从英语翻译成西班牙语。确保准确性、一致性和对法律术语的遵循，为法律专业人士提供无缝且可靠的翻译。”
- en: 'Analysis: In this example, the prompt assigns the role of a language translator
    to the AI and identifies the goal as translating a complex legal document from
    English to Spanish. The context specifies that the focus should be on ensuring
    accuracy, consistency, and adherence to legal terminology, delivering a seamless
    and reliable translation service for legal professionals. This well-constructed
    prompt guides the AI to perform a high-quality translation, maintaining the document’s
    legal integrity and making it accessible to a Spanish-speaking audience.'
  id: totrans-826
  prefs: []
  type: TYPE_NORMAL
  zh: 分析：在这个例子中，提示将AI分配为语言翻译者的角色，并确定目标为将复杂的法律文件从英语翻译成西班牙语。上下文指定了重点应放在确保准确性、一致性和遵守法律术语上，为法律专业人士提供无缝和可靠的翻译服务。这个精心构建的提示指导AI进行高质量的翻译，保持文件的法纪完整性，使其对西班牙语使用者可访问。
- en: As AI continues to change how content is generated, the future holds promise
    and challenges alike. The ethical considerations surrounding AI-generated content,
    such as plagiarism and misinformation, necessitate vigilant monitoring. However,
    the potential for creative collaboration, personalized experiences, and streamlined
    content creation positions AI-generated content as a transformative force in our
    information-driven world.
  id: totrans-827
  prefs: []
  type: TYPE_NORMAL
  zh: 随着人工智能继续改变内容生成的方式，未来既充满希望也充满挑战。围绕人工智能生成内容的伦理考量，如剽窃和虚假信息，需要警惕监控。然而，创意协作、个性化体验和内容创建流程的简化使人工智能生成内容成为我们信息驱动世界中的变革力量。
- en: 10.2 ADDRESSING BIAS AND FAIRNESS IN PROMPTS AND RESPONSES
  id: totrans-828
  prefs: []
  type: TYPE_NORMAL
  zh: 10.2 在提示和响应中解决偏见和公平性问题
- en: As AI systems become increasingly intertwined with human interactions, addressing
    bias and ensuring fairness in prompts and responses is important. This section
    delves into the crucial issue of bias in AI-generated content, exploring the challenges
    it poses and the strategies to mitigate it. Drawing from research findings and
    real-world examples, we discuss bias mitigation in prompt engineering.
  id: totrans-829
  prefs: []
  type: TYPE_NORMAL
  zh: 随着人工智能系统越来越与人类互动交织在一起，解决偏见并确保提示和响应的公平性变得重要。本节深入探讨了人工智能生成内容中的偏见这一关键问题，探讨了它带来的挑战和减轻策略。借鉴研究结果和现实世界的例子，我们讨论了提示工程中的偏见减轻。
- en: The Perils of Bias in AI-Generated Content
  id: totrans-830
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能生成内容中偏见的危害
- en: Bias in AI-generated content can perpetuate stereotypes, reinforce discrimination,
    and erode trust in AI systems. It is essential to recognize and rectify bias to
    ensure equitable and inclusive human-AI interactions.
  id: totrans-831
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能生成内容中的偏见可能会延续刻板印象，加强歧视，并侵蚀对人工智能系统的信任。识别和纠正偏见对于确保公平和包容的人机交互至关重要。
- en: 'EXAMPLE 1: Political Bias in Information Retrieval'
  id: totrans-832
  prefs: []
  type: TYPE_NORMAL
  zh: 'EXAMPLE 1: 信息检索中的政治偏见'
- en: 'Prompts: “As an AI ethics analyst, develop a prompt template for generating
    neutral news summaries. Craft a standardized prompt format that ensures balanced
    and unbiased news summaries, free from political slant or editorial influence,
    thus promoting fair and accurate information retrieval.”'
  id: totrans-833
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：“作为一名人工智能伦理分析师，制定一个生成中性新闻摘要的提示模板。创建一个标准化的提示格式，确保平衡和无偏见的新闻摘要，不受政治倾向或编辑影响，从而促进公平和准确的信息检索。”
- en: 'Analysis: In this example, the prompt assigns the AI the role of an AI ethics
    analyst and identifies the goal as developing a prompt template. The context specifies
    that the focus should be on creating a standardized prompt format that guarantees
    balanced and unbiased news summaries. The aim is to ensure that the generated
    summaries are free from political slant or editorial influence, promoting fair
    and accurate information retrieval for users seeking news content. This prompt
    guides the AI to contribute to mitigating political bias in information retrieval
    systems.'
  id: totrans-834
  prefs: []
  type: TYPE_NORMAL
  zh: 分析：在这个例子中，提示将AI分配为人工智能伦理分析师的角色，并确定目标为开发一个提示模板。上下文指定了重点应放在创建一个保证平衡和无偏见的新闻摘要的标准化的提示格式上。目标是确保生成的摘要不受政治倾向或编辑影响，促进寻求新闻内容的用户获得公平和准确的信息检索。这个提示指导AI为减轻信息检索系统中的政治偏见做出贡献。
- en: 'EXAMPLE 2: Racial and Ethnic Bias in Translation'
  id: totrans-835
  prefs: []
  type: TYPE_NORMAL
  zh: 'EXAMPLE 2: 翻译中的种族和民族偏见'
- en: 'Prompt: As an AI translator, create a prompt framework for culturally sensitive
    translation. Develop a set of guidelines and prompt templates that prioritize
    culturally nuanced and respectful translations, ensuring that the AI translation
    system avoids perpetuating racial or ethnic bias.”'
  id: totrans-836
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：作为一名人工智能翻译者，创建一个文化敏感的翻译提示框架。制定一套优先考虑文化细微差别和尊重性翻译的指南和提示模板，确保人工智能翻译系统避免延续种族或民族偏见。”
- en: 'Analysis: In this example, the prompt assigns the role of an AI translator
    to the AI and identifies the goal as creating a prompt framework. The context
    specifies that the focus should be on developing guidelines and prompt templates
    that prioritize culturally sensitive translations. The aim is to ensure that the
    AI translation system avoids perpetuating racial or ethnic bias in its translations.
    This well-constructed prompt guides the AI to contribute to fair and respectful
    cross-cultural communication by addressing bias in translation outputs.'
  id: totrans-837
  prefs: []
  type: TYPE_NORMAL
  zh: 'Analysis: 在本例中，提示将人工智能的角色指定为AI翻译者，并确定目标为创建提示框架。上下文指定应侧重于制定优先考虑文化敏感翻译的指南和提示模板。目的是确保人工智能翻译系统在翻译中避免延续种族或民族偏见。这个精心设计的提示引导人工智能通过解决翻译输出中的偏见，为公平和尊重的跨文化沟通做出贡献。'
- en: 'EXAMPLE 3: Bias Amplification in Content Generation'
  id: totrans-838
  prefs: []
  type: TYPE_NORMAL
  zh: 'EXAMPLE 3: 内容生成中的偏见放大'
- en: 'Prompt: “As a content curator, design prompts that prevent bias amplification.
    Create a series of prompt templates that promote balanced, inclusive, and unbiased
    content generation, ensuring that the AI system does not inadvertently magnify
    or perpetuate existing biases in its responses.”'
  id: totrans-839
  prefs: []
  type: TYPE_NORMAL
  zh: 'Prompt: “作为内容策展人，设计防止偏见放大的提示。创建一系列促进平衡、包容和无偏见内容生成的提示模板，确保人工智能系统在响应中不会无意中放大或延续现有偏见。”'
- en: 'Analysis: In this example, the prompt assigns the AI the role of a content
    curator and identifies the goal as designing prompts to prevent bias amplification.
    The context specifies that the focus should be on creating a series of prompt
    templates that prioritize balanced, inclusive, and unbiased content generation.
    The aim is to ensure that the AI system does not inadvertently magnify or perpetuate
    existing biases in its responses. This prompt guides the AI to contribute to content
    generation that promotes fairness and inclusivity while minimizing the risk of
    bias amplification.'
  id: totrans-840
  prefs: []
  type: TYPE_NORMAL
  zh: 'Analysis: 在本例中，提示将人工智能的角色指定为内容策展人，并确定目标为设计防止偏见放大的提示。上下文指定应侧重于创建一系列优先考虑平衡、包容和无偏见内容生成的提示模板。目的是确保人工智能系统在响应中不会无意中放大或延续现有偏见。这个提示引导人工智能为促进公平和包容的内容生成并最小化偏见放大的风险做出贡献。'
- en: 'EXAMPLE 4: Bias Detection and Redirection'
  id: totrans-841
  prefs: []
  type: TYPE_NORMAL
  zh: 'EXAMPLE 4: 偏见检测与引导'
- en: 'Prompt: “As an AI bias analyst, create prompts for bias detection and redirection.
    Develop a set of prompt templates that empower the AI system to identify biased
    content in responses and provide corrections or alternative perspectives to ensure
    a fair and unbiased exchange of information.”'
  id: totrans-842
  prefs: []
  type: TYPE_NORMAL
  zh: 'Prompt: “作为人工智能偏见分析师，创建偏见检测与引导的提示。开发一套提示模板，赋予人工智能系统识别响应中偏见内容并提供纠正或不同观点的能力，以确保信息的公平和无偏见交流。”'
- en: 'Analysis: In this example, the prompt assigns the role of an AI bias analyst
    to the AI and identifies the goal as creating prompts for bias detection and redirection.
    The context specifies that the focus should be on developing prompt templates
    that enable the AI system to identify biased content in its responses and take
    corrective actions, such as providing corrections or alternative perspectives.
    The aim is to ensure a fair and unbiased exchange of information, mitigating the
    impact of bias in AI-generated content. This prompt guides the AI to contribute
    to the detection and redirection of biased content for more balanced and inclusive
    communication.'
  id: totrans-843
  prefs: []
  type: TYPE_NORMAL
  zh: 'Analysis: 在本例中，提示将人工智能的角色指定为偏见分析师，并确定目标为创建偏见检测与引导的提示。上下文指定应侧重于开发能够使人工智能系统在其响应中识别偏见内容并采取纠正措施（如提供纠正或不同观点）的提示模板。目的是确保信息的公平和无偏见交流，减轻人工智能生成内容中偏见的影响。这个提示引导人工智能为更平衡和包容的沟通检测和引导偏见内容做出贡献。'
- en: 'EXAMPLE 5: Bias-Responsive Systems'
  id: totrans-844
  prefs: []
  type: TYPE_NORMAL
  zh: 'EXAMPLE 5: 偏见响应系统'
- en: 'Prompt: “As an AI system developer, construct prompts for building bias-responsive
    systems. Develop a set of prompt templates that allow the AI system to adapt and
    respond to feedback on bias, fostering continuous improvement and ensuring that
    the system actively addresses and mitigates bias in its outputs.”'
  id: totrans-845
  prefs: []
  type: TYPE_NORMAL
  zh: 'Prompt: “作为人工智能系统开发者，构建响应偏见的系统提示。开发一套提示模板，使人工智能系统能够适应并响应对偏见的反馈，促进持续改进，并确保系统积极应对并减轻其输出中的偏见。”'
- en: 'Analysis: In this example, the prompt assigns the role of an AI system developer
    to the AI and identifies the goal as constructing prompts for building bias-responsive
    systems. The context specifies that the focus should be on creating prompt templates
    that enable the AI system to adapt and respond to feedback related to bias. These
    prompts foster a continuous improvement process, ensuring that the AI system actively
    addresses and mitigates bias in its outputs. This prompt guides the AI to contribute
    to the development of AI systems that are responsive to bias concerns and committed
    to fairness and equity.'
  id: totrans-846
  prefs: []
  type: TYPE_NORMAL
  zh: 分析：在这个例子中，提示将人工智能系统的开发者角色分配给AI，并将目标确定为构建对偏见有响应的系统。上下文指定，重点应放在创建能够使AI系统适应并响应与偏见相关的反馈的提示模板上。这些提示促进了一个持续改进的过程，确保AI系统积极解决并减轻其输出中的偏见。这个提示指导AI为开发对偏见问题有响应并致力于公平和正义的AI系统做出贡献。
- en: 10.3 ETHICAL CONSIDERATIONS FOR PROMPT ENGINEERING
  id: totrans-847
  prefs: []
  type: TYPE_NORMAL
  zh: 10.3 人工智能提示工程中的伦理考量
- en: As prompt engineering plays a pivotal role in shaping AI interactions, ethical
    considerations are paramount. This section discusses the ethical dimensions of
    prompt engineering, exploring the responsibilities of AI developers and users
    in ensuring responsible AI usage. Drawing from ethical frameworks and real-world
    examples, we identify the complex ethics involved in prompt engineering.
  id: totrans-848
  prefs: []
  type: TYPE_NORMAL
  zh: 随着提示工程在塑造AI交互中发挥关键作用，伦理考量至关重要。本节讨论提示工程的伦理维度，探讨AI开发者和用户在确保负责任AI使用中的责任。借鉴伦理框架和现实世界案例，我们确定了提示工程中涉及的复杂伦理问题。
- en: Ethical Imperatives in Prompt Engineering
  id: totrans-849
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能提示工程中的伦理要务
- en: Prompt engineering carries ethical implications that extend beyond bias mitigation,
    encompassing broader considerations such as privacy, transparency, and accountability.
  id: totrans-850
  prefs: []
  type: TYPE_NORMAL
  zh: 提示工程不仅涉及偏见缓解的伦理影响，还包括更广泛的考量，如隐私、透明度和问责制。
- en: 'EXAMPLE 1: Privacy and Data Handling'
  id: totrans-851
  prefs: []
  type: TYPE_NORMAL
  zh: 示例1：隐私和数据处理
- en: Prompts Involving Sensitive Information
  id: totrans-852
  prefs: []
  type: TYPE_NORMAL
  zh: 涉及敏感信息的提示
- en: 'Analysis: Prompts that request or involve sensitive user data, such as medical
    history or personal identifiers, raise privacy concerns. If not handled with care,
    such prompts can lead to privacy violations and data misuse.'
  id: totrans-853
  prefs: []
  type: TYPE_NORMAL
  zh: 分析：请求或涉及敏感用户数据（如医疗历史或个人标识符）的提示会引发隐私问题。如果处理不当，此类提示可能导致隐私侵犯和数据滥用。
- en: 'Ethical Consideration 1: Informed Consent'
  id: totrans-854
  prefs: []
  type: TYPE_NORMAL
  zh: 伦理考量1：知情同意
- en: Respect user privacy by obtaining informed consent for collecting and using
    sensitive data in prompts, ensuring compliance with data protection regulations.
  id: totrans-855
  prefs: []
  type: TYPE_NORMAL
  zh: 通过在提示中收集和使用敏感数据时获得知情同意来尊重用户隐私，确保符合数据保护法规。
- en: 'EXAMPLE 2: Transparency and Ability to Explain'
  id: totrans-856
  prefs: []
  type: TYPE_NORMAL
  zh: 示例2：透明度和可解释性
- en: Opaque Prompts Leading to Confusion
  id: totrans-857
  prefs: []
  type: TYPE_NORMAL
  zh: 不透明的提示导致困惑
- en: 'Analysis: Prompts that lack clarity or context can confuse users, leading to
    unexpected AI responses. Without transparency in prompt engineering, users may
    not understand how AI-generated content is generated.'
  id: totrans-858
  prefs: []
  type: TYPE_NORMAL
  zh: 分析：缺乏清晰度或背景的提示可能会使用户困惑，导致意外的AI响应。如果没有提示工程的透明度，用户可能不会理解AI生成内容是如何生成的。
- en: 'Ethical Consideration 2: Transparent Prompts'
  id: totrans-859
  prefs: []
  type: TYPE_NORMAL
  zh: 伦理考量2：透明的提示
- en: Ensure prompts are transparent and provide users with a clear understanding
    of the AI’s capabilities and limitations to manage user expectations effectively.
  id: totrans-860
  prefs: []
  type: TYPE_NORMAL
  zh: 确保提示透明，并使用户清楚地了解AI的能力和限制，以有效地管理用户期望。
- en: 'EXAMPLE 3: Accountability in Content Generation'
  id: totrans-861
  prefs: []
  type: TYPE_NORMAL
  zh: 示例3：内容生成中的问责制
- en: Inappropriate Prompts and Content
  id: totrans-862
  prefs: []
  type: TYPE_NORMAL
  zh: 不适当的提示和内容
- en: 'Analysis: Irresponsible prompts that incite harmful or inappropriate content
    generation can result in unethical AI usage. For instance, prompts that encourage
    hate speech or misinformation propagate harmful behaviors.'
  id: totrans-863
  prefs: []
  type: TYPE_NORMAL
  zh: 分析：不负责任的提示可能引发有害或不适当的内容生成，导致不道德的AI使用。例如，鼓励仇恨言论或错误信息的提示会传播有害行为。
- en: 'Ethical Consideration 3: Ethical Guidelines'
  id: totrans-864
  prefs: []
  type: TYPE_NORMAL
  zh: 伦理考量3：伦理准则
- en: Adhere to ethical guidelines that explicitly prohibit the use of AI for harmful
    or unethical purposes and establish mechanisms for accountability in prompt creation.
  id: totrans-865
  prefs: []
  type: TYPE_NORMAL
  zh: 遵循明确禁止使用AI进行有害或不道德目的的伦理准则，并建立提示创建中的问责机制。
- en: 'EXAMPLE 4: Inclusivity and Accessibility'
  id: totrans-866
  prefs: []
  type: TYPE_NORMAL
  zh: 示例4：包容性和可访问性
- en: Exclusionary Prompts
  id: totrans-867
  prefs: []
  type: TYPE_NORMAL
  zh: 排他性提示
- en: 'Analysis: Prompts that inadvertently exclude certain groups or communities
    can perpetuate discrimination. For example, prompts that assume a specific cultural
    context may alienate users from different backgrounds.'
  id: totrans-868
  prefs: []
  type: TYPE_NORMAL
  zh: 分析：无意中排除某些群体或社区的提示可能导致歧视的持续。例如，假设特定文化背景的提示可能会使来自不同背景的用户感到疏远。
- en: 'Ethical Consideration 4: Inclusive Language'
  id: totrans-869
  prefs: []
  type: TYPE_NORMAL
  zh: 伦理考量 4：包容性语言
- en: Use inclusive language in prompts to ensure that AI-generated content is accessible
    and respectful of diverse audiences and cultures.
  id: totrans-870
  prefs: []
  type: TYPE_NORMAL
  zh: 在提示中使用包容性语言，以确保人工智能生成的内容对多元受众和文化是可访问和尊重的。
- en: 'EXAMPLE 5: Algorithmic Fairness'
  id: totrans-871
  prefs: []
  type: TYPE_NORMAL
  zh: 示例 5：算法公平性
- en: Biased Prompts and Responses
  id: totrans-872
  prefs: []
  type: TYPE_NORMAL
  zh: 偏见提示和响应
- en: 'Analysis: Prompts that carry inherent biases can lead to prejudiced AI responses.
    Ethical concerns arise when prompt engineering perpetuates systemic preconceptions
    and discrimination.'
  id: totrans-873
  prefs: []
  type: TYPE_NORMAL
  zh: 分析：带有固有偏见的提示可能导致偏见的人工智能响应。当提示工程持续传播系统性的先入之见和歧视时，会引发伦理问题。
- en: 'Ethical Consideration 5: Bias Mitigation'
  id: totrans-874
  prefs: []
  type: TYPE_NORMAL
  zh: 伦理考量 5：偏见缓解
- en: Implement robust bias mitigation strategies in prompt engineering to ensure
    fair and equitable AI interactions.
  id: totrans-875
  prefs: []
  type: TYPE_NORMAL
  zh: 在提示工程中实施强大的偏见缓解策略，以确保公平和公正的人工智能互动。
- en: In conclusion, responsible AI usage in prompt engineering is underpinned by
    a commitment to privacy, transparency, accountability, inclusivity, and fairness.
    Ethical considerations must permeate every aspect of prompt engineering, from
    the design of prompts to the deployment of AI systems. By adhering to ethical
    guidelines, respecting user privacy, ensuring transparency, fostering inclusivity,
    and mitigating bias, AI developers and users can contribute to the responsible
    and ethical evolution of AI systems.
  id: totrans-876
  prefs: []
  type: TYPE_NORMAL
  zh: 总之，负责任的人工智能在提示工程中的使用是以对隐私、透明度、问责制、包容性和公平性的承诺为基础的。伦理考量必须渗透到提示工程的各个方面，从提示的设计到人工智能系统的部署。通过遵守伦理准则，尊重用户隐私，确保透明度，促进包容性，并缓解偏见，人工智能的开发者和用户可以为人工智能系统的负责任和道德发展做出贡献。
- en: CHAPTER 11
  id: totrans-877
  prefs: []
  type: TYPE_NORMAL
  zh: 第十一章
- en: GPTS AND GPT APPLICATION
  id: totrans-878
  prefs: []
  type: TYPE_NORMAL
  zh: GPTS 和 GPT 应用程序
- en: BUILDER
  id: totrans-879
  prefs: []
  type: TYPE_NORMAL
  zh: BUILDER
- en: In November 2023, OpenAI introduced a new tool for building customized GPT models
    or GPTs (openai.com), a significant advancement in the field of artificial intelligence
    and natural language processing. In this chapter, we examine this ground-breaking
    development. This chapter is designed to guide both novice and experienced users
    through the versatile capabilities of the GPTS framework and the GPT Builder tool.
  id: totrans-880
  prefs: []
  type: TYPE_NORMAL
  zh: 2023 年 11 月，OpenAI 推出了一种用于构建定制 GPT 模型或 GPTs（openai.com）的新工具，这是人工智能和自然语言处理领域的一项重大进步。在本章中，我们将探讨这一突破性发展。本章旨在指导新手和经验丰富的用户了解
    GPTS 框架和 GPT Builder 工具的多功能性。
- en: 11.1 NEW FEATURES ANNOUNCED WITH GPTS
  id: totrans-881
  prefs: []
  type: TYPE_NORMAL
  zh: 11.1 GPTS 新功能发布
- en: We shift our focus to the API-GPT Builder, an intuitive interface that empowers
    developers to create bespoke GPT models. This section goes through the step-by-step
    process of model creation, from defining parameters and training datasets to fine-tuning
    models for specific tasks or industry requirements. Practical examples and case
    studies are provided to illustrate how customized models can significantly enhance
    performance in tasks such as content generation, data analysis, and customer service
    automation.
  id: totrans-882
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将重点转向 API-GPT Builder，这是一个直观的界面，使开发者能够创建定制的 GPT 模型。本节将逐步介绍模型创建的过程，从定义参数和训练数据集到针对特定任务或行业需求进行模型微调。提供了一些实际示例和案例研究，以说明定制模型如何显著提高内容生成、数据分析和服务自动化等任务的表现。
- en: The information included here can serve as a vital resource for those looking
    to utilize the full potential of OpenAI’s latest contributions to artificial intelligence.
  id: totrans-883
  prefs: []
  type: TYPE_NORMAL
  zh: 这里包含的信息可以为那些希望充分利用 OpenAI 人工智能最新贡献的人提供宝贵的资源。
- en: 11.2 HOW TO BUILD GPTS
  id: totrans-884
  prefs: []
  type: TYPE_NORMAL
  zh: 11.2 如何构建 GPTs
- en: The following steps guide users to build a GPT app. For this purpose, a paid
    subscription to GPT-4 is necessary.
  id: totrans-885
  prefs: []
  type: TYPE_NORMAL
  zh: 以下步骤指导用户构建 GPT 应用程序。为此，需要 GPT-4 的付费订阅。
- en: 1. Sign in to GPT, and from the sidebar, select and click on “Explore,” as shown
    in [Figure 11.1](#fig11-1).
  id: totrans-886
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 登录 GPT，并从侧边栏中选择并点击“探索”，如图 [图 11.1](#fig11-1) 所示。
- en: '![](image/Fig_11_1.jpg)'
  id: totrans-887
  prefs: []
  type: TYPE_IMG
  zh: '![](image/Fig_11_1.jpg)'
- en: FIGURE 11.1 “Explore” icon in the ChatGPT-4 sidebar.
  id: totrans-888
  prefs: []
  type: TYPE_NORMAL
  zh: 图 11.1 ChatGPT-4 侧边栏中的“探索”图标。
- en: 2. In the main window, “MY GPTs” shows up with the “Create a GPT” tool, as shown
    in [Figure 11.2](#fig11-2).
  id: totrans-889
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 在主窗口中，“MY GPTs”显示“创建 GPT”工具，如图 [图 11.2](#fig11-2) 所示。
- en: '![](image/Fig_11_2.jpg)'
  id: totrans-890
  prefs: []
  type: TYPE_IMG
  zh: '![](image/Fig_11_2.jpg)'
- en: FIGURE 11.2 Create a GPT icon in ChatGPT-4.
  id: totrans-891
  prefs: []
  type: TYPE_NORMAL
  zh: 图 11.2 在 ChatGPT-4 中创建 GPT 图标。
- en: Underneath, any GPTs previously built by the user and those made by OpenAI are
    also listed.
  id: totrans-892
  prefs: []
  type: TYPE_NORMAL
  zh: 在下方，列出了用户之前构建的任何 GPT 以及 OpenAI 创建的 GPT。
- en: 3. Hover over the “Create a GPT” icon and click. A new window will show up,
    as shown in [Figure 11.3](#fig11-3).
  id: totrans-893
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 将鼠标悬停在“创建 GPT”图标上并点击。会出现一个新窗口，如图 [图 11.3](#fig11-3) 所示。
- en: '![](image/Fig_11_3.jpg)'
  id: totrans-894
  prefs: []
  type: TYPE_IMG
  zh: '![](image/Fig_11_3.jpg)'
- en: FIGURE 11.3 Window showing the interface for building GPTs.
  id: totrans-895
  prefs: []
  type: TYPE_NORMAL
  zh: 图 11.3 显示构建 GPT 界面的窗口。
- en: Read the information provided in this window. There are two ways to go forward
    from this point, 1) a quick way by using the “Create” option and start typing
    in the “Message GPT Builder…” area or 2) a longer way by using the “Configure”
    tool/button. The former functions as a wizard, guiding users in constructing their
    GPT app through an interactive conversation. To initiate this feature, type in
    a short description of what you want to build in the “Message GPT Builder…” space
    area.
  id: totrans-896
  prefs: []
  type: TYPE_NORMAL
  zh: 阅读此窗口提供的信息。从这一点开始有两种前进的方式，1) 通过使用“创建”选项并在“消息 GPT 构建器...”区域开始键入的快速方式，或 2) 通过使用“配置”工具/按钮的较慢方式。前者作为一个向导，通过交互式对话引导用户构建他们的
    GPT 应用。要启动此功能，请在“消息 GPT 构建器...”空间区域键入您想要构建的简短描述。
- en: It is also sometimes feasible to combine both options and go back and forth
    between “Create” and “Configure” selections. We continue with using the “Configure”
    option.
  id: totrans-897
  prefs: []
  type: TYPE_NORMAL
  zh: 有时也可以结合这两种选项，在“创建”和“配置”选择之间来回切换。我们继续使用“配置”选项。
- en: '4. Click on the “Configure” button. A new window appears, as shown in [Figure
    11.4](#fig11-4). This window has two main areas: the “GPT Builder” and the “Preview.”
    Fill in the space areas provided under “Name,” “Description,” and “Instructions.”
    The remaining are optional features to use. By clicking on the “+” icon, users
    can upload a photo or use DALL-E to create a profile picture or logo.'
  id: totrans-898
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 点击“配置”按钮。会出现一个新窗口，如图 [图 11.4](#fig11-4) 所示。此窗口有两个主要区域：“GPT 构建器”和“预览”。在“名称”、“描述”和“说明”下填写提供的空间区域。其余的是可选功能。通过点击“+”图标，用户可以上传照片或使用
    DALL-E 创建个人资料图片或标志。
- en: '![](image/Fig_11_4.jpg)'
  id: totrans-899
  prefs: []
  type: TYPE_IMG
  zh: '![](image/Fig_11_4.jpg)'
- en: FIGURE 11.4 Configuring the icon and the related window in ChatGPT-4.
  id: totrans-900
  prefs: []
  type: TYPE_NORMAL
  zh: 图 11.4 配置 ChatGPT-4 中的图标和相关窗口。
- en: 5. Click on the “Create” button and provide the information required for your
    GPT in the space provided.
  id: totrans-901
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 点击“创建”按钮，并在提供的空间中提供您 GPT 所需的信息。
- en: '6. When complete, click on the “Save” button. There are three options for saving
    a GPT app: “Only me,” “Anyone with a link,” and “Public.” The latter could be
    used if users want to list their app in the GPT Store.'
  id: totrans-902
  prefs: []
  type: TYPE_NORMAL
  zh: 6. 完成后，点击“保存”按钮。保存 GPT 应用有三个选项：“仅我”、“有链接的任何人”和“公开”。后者可以用于用户想要在 GPT 商店中列出他们的应用。
- en: 'More instructions, how-to information, and guides for building GPTs can be
    found through the following URLs (as of December 2023):'
  id: totrans-903
  prefs: []
  type: TYPE_NORMAL
  zh: 更多说明、构建 GPT 的如何操作信息和指南可以通过以下 URL 获取（截至 2023 年 12 月）：
- en: '[https://help.openai.com/en/articles/8554397-creating-a-gpt](https://help.openai.com/en/articles/8554397-creating-a-gpt)
    [https://youtu.be/5--JexprHuk](https://youtu.be/5--JexprHuk) [https://www.youtube.com/watch?v=R3X6rk1bWF0](https://www.youtube.com/watch?v=R3X6rk1bWF0)'
  id: totrans-904
  prefs: []
  type: TYPE_NORMAL
  zh: '[https://help.openai.com/en/articles/8554397-creating-a-gpt](https://help.openai.com/en/articles/8554397-creating-a-gpt)
    [https://youtu.be/5--JexprHuk](https://youtu.be/5--JexprHuk) [https://www.youtube.com/watch?v=R3X6rk1bWF0](https://www.youtube.com/watch?v=R3X6rk1bWF0)'
- en: LinkedIn Learning provides some courses on this topic, available to their subscribed
    users.
  id: totrans-905
  prefs: []
  type: TYPE_NORMAL
  zh: LinkedIn Learning 为订阅用户提供了一些关于此主题的课程。
- en: 11.3 EXAMPLE 1- A GPT APP FOR COLORING PAGES
  id: totrans-906
  prefs: []
  type: TYPE_NORMAL
  zh: 11.3 示例 1 - 彩绘页面 GPT 应用
- en: In this example, we build a GPT app called “Color Muse” for creating adult coloring
    pages. A screen-capture video available through the companion Web site demonstrates
    how to build this app along with some results. To re-create this app, a subscription
    to GPT-4 is required.
  id: totrans-907
  prefs: []
  type: TYPE_NORMAL
  zh: 在此示例中，我们构建了一个名为“彩绘缪斯”的 GPT 应用，用于创建成人彩绘页面。通过配套网站上的屏幕截图视频演示了如何构建此应用以及一些结果。要重新创建此应用，需要订阅
    GPT-4。
- en: '![](image/Fig_11_5.jpg)'
  id: totrans-908
  prefs: []
  type: TYPE_IMG
  zh: '![](image/Fig_11_5.jpg)'
- en: FIGURE 11.5 App logo for Color Muse.
  id: totrans-909
  prefs: []
  type: TYPE_NORMAL
  zh: 图 11.5 Color Muse 的应用标志。
- en: 'When building this App, you can use the following:'
  id: totrans-910
  prefs: []
  type: TYPE_NORMAL
  zh: 在构建此应用时，你可以使用以下功能：
- en: 'Name: Coloring Muse'
  id: totrans-911
  prefs: []
  type: TYPE_NORMAL
  zh: 名称：彩绘缪斯
- en: 'Description: Creative assistant for adult coloring designs'
  id: totrans-912
  prefs: []
  type: TYPE_NORMAL
  zh: 描述：成人彩绘设计的创意助手
- en: 'Instructions: Color Muse is tailored to assist with creating coloring pictures
    focused exclusively on cars, buildings, and natural scenes. It will reject requests
    unrelated to these themes, ensuring specialized experience. Color Muse will offer
    a variety of car models, buildings, and natural landscapes, providing artistic
    guidance on intricacy and style. It will also suggest color palettes that complement
    these specific scenes, ensuring the final artwork is harmonious and appealing.
    The interaction will be professional, engaging, and tailored to adult preferences
    in coloring, emphasizing relaxation and creativity within the theme bounds. For
    each picture that you create, provide some suggestion for the colors suitable
    to the picture built.'
  id: totrans-913
  prefs: []
  type: TYPE_NORMAL
  zh: 指令：Color Muse 专为创建专注于汽车、建筑和自然场景的填色图片而设计。它将拒绝与这些主题无关的请求，确保提供专业化的体验。Color Muse
    将提供各种车型、建筑和自然景观，提供关于复杂性和风格的美术指导。它还将建议与这些特定场景相匹配的色彩调色板，确保最终的艺术作品和谐且吸引人。交互将专业、吸引人，并针对成年人的填色偏好进行定制，强调在主题范围内的放松和创造力。对于您创建的每一幅图片，请提供一些适合该图片构建的颜色建议。
- en: 'Conversation starters:'
  id: totrans-914
  prefs: []
  type: TYPE_NORMAL
  zh: 对话起始点：
- en: '![](image/bull.jpg) Suggest a mandala design'
  id: totrans-915
  prefs: []
  type: TYPE_NORMAL
  zh: '![图片](image/bull.jpg) 提出一个曼荼罗设计'
- en: '![](image/bull.jpg) Create a cityscape theme'
  id: totrans-916
  prefs: []
  type: TYPE_NORMAL
  zh: '![图片](image/bull.jpg) 创建城市景观主题'
- en: '![](image/bull.jpg) Help me choose colors for a nature scene'
  id: totrans-917
  prefs: []
  type: TYPE_NORMAL
  zh: '![图片](image/bull.jpg) 帮助我选择自然场景的颜色'
- en: '![](image/bull.jpg) Create a coloring page of a classic car'
  id: totrans-918
  prefs: []
  type: TYPE_NORMAL
  zh: '![图片](image/bull.jpg) 创建一辆经典汽车的填色页面'
- en: 'Capabilities: check-in the boxes for Web Browsing and DALL.E Image Generation
    items.'
  id: totrans-919
  prefs: []
  type: TYPE_NORMAL
  zh: 功能：勾选 Web 浏览和 DALL.E 图像生成项目。
- en: Note that the instructions given to the GPT for this app restrict it to creating
    images of buildings, cars, and nature. Any other types of requests will be rejected.
  id: totrans-920
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，为此应用程序提供的 GPT 指令限制它只能创建建筑、汽车和自然图像。任何其他类型的请求都将被拒绝。
- en: 'Now, after building this app, we can use it. For example, enter the following
    prompt in the message area space:'
  id: totrans-921
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，在构建此应用程序之后，我们可以使用它。例如，在消息区域空间中输入以下提示：
- en: 'Prompt: “Create a coloring page for an image of a classic car on a road with
    spring scene in the background.”'
  id: totrans-922
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：为背景有春季场景的道路上的经典汽车图片创建一个填色页面。
- en: After a few minutes, a picture appears ([Figure 11.6](#fig11-6)). You can save
    or print this picture and start coloring it.
  id: totrans-923
  prefs: []
  type: TYPE_NORMAL
  zh: 几分钟后，出现一张图片([图 11.6](#fig11-6))。您可以保存或打印这张图片并开始填色。
- en: '![](image/Fig_11_6.jpg)'
  id: totrans-924
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image/Fig_11_6.jpg)'
- en: FIGURE 11.6 The first coloring page generated by the app.
  id: totrans-925
  prefs: []
  type: TYPE_NORMAL
  zh: 图 11.6 应用程序生成的第一个填色页面。
- en: As another application example, let’s try the following prompt.
  id: totrans-926
  prefs: []
  type: TYPE_NORMAL
  zh: 作为另一个应用示例，让我们尝试以下提示。
- en: 'Prompt: “Create a modern car parked in front of a historical building.”'
  id: totrans-927
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：创建一辆停放在历史建筑前的现代汽车。
- en: After a few minutes, the picture shown in [Figure 11.7](#fig11-7) appears. You
    can save or print this picture and start coloring it.
  id: totrans-928
  prefs: []
  type: TYPE_NORMAL
  zh: 几分钟后，[图 11.7](#fig11-7) 中所示的图片出现。您可以保存或打印这张图片并开始填色。
- en: '![](image/Fig_11_7.jpg)'
  id: totrans-929
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image/Fig_11_7.jpg)'
- en: FIGURE 11.7 The second coloring page generated by the app.
  id: totrans-930
  prefs: []
  type: TYPE_NORMAL
  zh: 图 11.7 应用程序生成的第二个填色页面。
- en: 11.4 EXAMPLE 2- A GPT APP FOR STORY WRITERS
  id: totrans-931
  prefs: []
  type: TYPE_NORMAL
  zh: 11.4 示例 2- 为故事作家设计的 GPT 应用程序
- en: In this example, we build a GPT app called “Tale Spinner” for assisting story
    writers creating stories. A screen-capture video available through the companion
    Web site demonstrates how to build this app along with some results. To re-create
    this app, a subscription to GPT-4 is required.
  id: totrans-932
  prefs: []
  type: TYPE_NORMAL
  zh: 在此示例中，我们构建了一个名为“Tale Spinner”的 GPT 应用程序，以帮助故事作家创作故事。通过配套网站提供的屏幕截图视频演示了如何构建此应用程序以及一些结果。要重新创建此应用程序，需要订阅
    GPT-4。
- en: '![](image/Fig_11_8.jpg)'
  id: totrans-933
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image/Fig_11_8.jpg)'
- en: FIGURE 11.8 App logo for Tale Spinner.
  id: totrans-934
  prefs: []
  type: TYPE_NORMAL
  zh: 图 11.8 Tale Spinner 的应用程序标志。
- en: 'When building this App, you can use the following:'
  id: totrans-935
  prefs: []
  type: TYPE_NORMAL
  zh: 在构建此应用程序时，您可以使用以下内容：
- en: 'Name: Tale Spinner'
  id: totrans-936
  prefs: []
  type: TYPE_NORMAL
  zh: 名称：Tale Spinner
- en: 'Description: A Creative Storyteller'
  id: totrans-937
  prefs: []
  type: TYPE_NORMAL
  zh: 描述：创意故事讲述者
- en: 'Instructions: Tale Spinner will maintain a formal yet engaging and friendly
    tone, offering suggestions and feedback in a manner that is respectful and encouraging.
    It will personalize its interactions to align with the user’s narrative style
    and preferences, providing a supportive and constructive environment for storytelling.
    Its dialogue will be characterized by professionalism and warmth, aiming to inspire
    and facilitate the creative process of each user.'
  id: totrans-938
  prefs: []
  type: TYPE_NORMAL
  zh: 指令：Tale Spinner 将保持正式而吸引人且友好的语气，以尊重和鼓励的方式提供建议和反馈。它将个性化其交互，以与用户的叙事风格和偏好保持一致，为讲故事提供一个支持性和建设性的环境。其对话将具有专业性和温暖感，旨在激发和促进每个用户的创造性过程。
- en: 'Conversation starters:'
  id: totrans-939
  prefs: []
  type: TYPE_NORMAL
  zh: 对话起始点：
- en: '![](image/bull.jpg) Start a tale about a lost city'
  id: totrans-940
  prefs: []
  type: TYPE_NORMAL
  zh: '![牛头图片](image/bull.jpg) 开始一个关于失落城市的传说'
- en: '![](image/bull.jpg) Expand on the character’s dilemma'
  id: totrans-941
  prefs: []
  type: TYPE_NORMAL
  zh: '![牛头图片](image/bull.jpg) 扩展角色的困境'
- en: '![](image/bull.jpg) Suggest a twist for the story'
  id: totrans-942
  prefs: []
  type: TYPE_NORMAL
  zh: '![牛头图片](image/bull.jpg) 为故事提出一个转折'
- en: '![](image/bull.jpg) How should it end?'
  id: totrans-943
  prefs: []
  type: TYPE_NORMAL
  zh: '![牛头图片](image/bull.jpg) 它应该如何结束？'
- en: 'Capabilities: check-in the boxes for Web Browsing item.'
  id: totrans-944
  prefs: []
  type: TYPE_NORMAL
  zh: 功能：勾选网页浏览项。
- en: 'Now, after building this app, we can use it. For example, enter the following
    prompt in the message space area:'
  id: totrans-945
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，在构建了这个应用程序之后，我们可以使用它。例如，在消息空间区域输入以下提示：
- en: 'Prompt: “Once upon a time, there was a baby fox in the woods during the winter...”'
  id: totrans-946
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：“从前，冬天森林里有一只小狐狸……”
- en: After a few minutes a story, as shown below, appears. You can save, print this
    story, or prompt the Tale Spinner to modify it as you like.
  id: totrans-947
  prefs: []
  type: TYPE_NORMAL
  zh: 几分钟后，会出现以下故事。您可以保存、打印这个故事，或者提示故事旋转器按您喜欢的样子修改它。
- en: “Once upon a time, in the heart of a vast and whispering forest, as winter unfurled
    its white blanket over the land, there was a baby fox. This little fox, with fur
    as red as the setting sun, found itself alone amid the sprawling tapestry of snow
    and ice. The forest, usually a symphony of sounds and life, was now quiet, save
    for the gentle rustling of the pine trees swaying in the cold breeze.
  id: totrans-948
  prefs: []
  type: TYPE_NORMAL
  zh: “从前，在一个广阔而低语森林的深处，当冬天展开它的白色毯子覆盖大地时，有一只小狐狸。这只小狐狸，毛色像落日的红一样，发现自己在这片蔓延的雪和冰的织锦中孤独。森林，通常是一首声音和生命的交响曲，现在却很安静，只有松树在冷风中轻轻摇曳的沙沙声。
- en: Despite the starkness of the season, the baby fox was not afraid. It was born
    of the wild, with a heart full of curiosity and eyes that sparkled with the promise
    of adventure. Each day, it ventured a little further from its den, paw prints
    painting stories in the snow, learning the secrets of the winter woods.
  id: totrans-949
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管季节的荒凉，小狐狸并不害怕。它是从野外出生的，心中充满了好奇心，眼睛里闪烁着冒险的承诺。每天，它都从自己的洞穴里向外探索得更远，爪印在雪地上描绘着故事，学习冬天的森林的秘密。
- en: The baby fox discovered the tracks of other animals—a dance of life on the white
    canvas of the forest floor. It learned to listen for the whisper of wings above,
    signaling the presence of birds, and to watch for the shadows that moved just
    beyond sight, hinting at the presence of fellow forest dwellers.
  id: totrans-950
  prefs: []
  type: TYPE_NORMAL
  zh: 小狐狸发现了其他动物的踪迹——生命在森林地面的白色画布上的舞蹈。它学会了倾听上方翅膀的低语，这是鸟儿存在的信号，并注意那些刚刚超出视线移动的阴影，暗示着森林居民的在场。
- en: As the days passed, the baby fox grew stronger and more confident. It learned
    the art of silence, moving like a shadow among the trees, and the joy of play,
    tumbling in the snow and chasing its own tail in circles.
  id: totrans-951
  prefs: []
  type: TYPE_NORMAL
  zh: 随着日子的过去，小狐狸变得更加强壮和自信。它学会了沉默的艺术，在树木间像影子一样移动，以及玩耍的乐趣，在雪地里打滚，追逐自己的尾巴。
- en: But winter in the forest is not just a time of beauty and play; it is a season
    of survival. The baby fox learned to forage for food, nibbling on frozen berries
    and digging for roots beneath the snow. It encountered challenges too, like bitter
    cold nights and the scarcity of food, but with each challenge, it grew wiser and
    more resilient.
  id: totrans-952
  prefs: []
  type: TYPE_NORMAL
  zh: 但森林的冬天不仅仅是美丽和玩耍的季节；它是一个生存的季节。小狐狸学会了寻找食物，啃着冻硬的浆果，在雪下挖根。它也遇到了挑战，比如寒冷的夜晚和食物的稀缺，但每一次挑战，它都变得更聪明、更坚韧。
- en: One day, as the sun began to linger a little longer in the sky, signaling the
    approach of spring, the baby fox came upon a clearing where the snow had begun
    to melt, revealing the tender shoots of new life. There, in the middle of the
    clearing, stood a majestic deer, its breath visible in the cold air, a symbol
    of the forest’s enduring strength and grace.
  id: totrans-953
  prefs: []
  type: TYPE_NORMAL
  zh: 一天，随着太阳在天空中停留得稍久一些，预示着春天的到来，小狐狸来到了一个雪开始融化的空地，露出了新生命的嫩芽。在那里，空地中央，站着一头雄伟的鹿，它的呼吸在寒冷的空气中可见，象征着森林永恒的力量和优雅。
- en: The deer looked at the baby fox with gentle eyes, and in that moment, an unspoken
    understanding passed between them. The fox realized it was no longer just a baby;
    it had grown, learned, and survived the winter. It was now a creature of the forest,
    wise and free.
  id: totrans-954
  prefs: []
  type: TYPE_NORMAL
  zh: 鹿用温柔的眼神看着小狐狸，那一刻，他们之间传递了一种不言而喻的理解。狐狸意识到它不再只是一个孩子；它已经长大，学习，并度过了冬天。现在，它是一只森林生物，聪明而自由。
- en: As spring unfurled its green fingers through the land, the fox took its place
    within the tapestry of the forest, a small but vital thread in the ever-unfolding
    story of the wild. And so, the cycle continued, with the forest nurturing and
    challenging all who call it home, each season bringing new stories of life, survival,
    and growth. Thus concludes our tale of the baby fox in the winter woods, a story
    of adventure, learning, and the enduring beauty of the natural world.”
  id: totrans-955
  prefs: []
  type: TYPE_NORMAL
  zh: 当春天展开它的绿色手指覆盖大地时，狐狸在森林的织锦中找到了自己的位置，它是这个不断展开的野生动物故事中不可或缺的一小部分。因此，这个循环继续进行，森林滋养并挑战着所有称之为家的生物，每个季节都带来新的生命、生存和成长的故事。因此，我们关于冬日森林中幼狐的故事就此结束，这是一个关于冒险、学习和自然世界永恒之美的故事。”
- en: 11.5 WINDING DOWN THE CHATGPT PLUGINS
  id: totrans-956
  prefs: []
  type: TYPE_NORMAL
  zh: 11.5 结束ChatGPT插件
- en: Recently, OpenAI announced a transition from plugins to API, a change set to
    commence on March 19, 2024, and become fully effective for existing conversations
    utilizing plugins by April 9, 2024\. As a result, users are encouraged to adopt
    GPT apps, with many prominent plugin developers pivoting to create GPT-centric
    applications. An example of this shift is seen with Wolfram. In the following
    section, we will utilize this app as a case study, among others.
  id: totrans-957
  prefs: []
  type: TYPE_NORMAL
  zh: 最近，OpenAI宣布从插件过渡到API，这一变化计划于2024年3月19日开始，并于2024年4月9日对使用插件的现有对话完全生效。因此，鼓励用户采用GPT应用，许多著名的插件开发者正在转向创建以GPT为中心的应用。Wolfram就是这一转变的例子之一。在接下来的部分中，我们将利用这个应用作为案例研究之一。
- en: 'Besides offering tools for creating custom-designed GPTs, a variety of pre-built
    models are accessible with a GPT-4 subscription. The GPTs’ Web page ([openai.com](http://openai.com))
    showcases these applications, organizing them into two main categories: weekly
    Top Picks and a comprehensive list created by the ChatGPT team. Obviously, these
    lists may overlap and change as more apps are created and listed.'
  id: totrans-958
  prefs: []
  type: TYPE_NORMAL
  zh: 除了提供创建定制GPT的工具外，GPT-4订阅还提供了各种预构建模型。GPT的网页([openai.com](http://openai.com))展示了这些应用，将它们组织成两大类：每周精选和ChatGPT团队创建的完整列表。显然，随着更多应用的创建和列出，这些列表可能会重叠并发生变化。
- en: A. Top Picks
  id: totrans-959
  prefs: []
  type: TYPE_NORMAL
  zh: A. 精选
- en: '![](image/bull.jpg) Featured'
