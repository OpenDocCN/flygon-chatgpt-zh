- en: Conclusion
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In this chapter, we looked at how ChatGPT can be used to convert various file
    formats and content such as documents, recipes, and even photos. In the next chapter,
    we’re going to be looking at how ChatGPT can be used to rewrite and rephrase text
    for various purposes, such as redacting sensitive information from documents,
    changing the tone of an email or complaint, and even taking a difficult subject
    and explain it on a level a child could understand.
  prefs: []
  type: TYPE_NORMAL
- en: © The Author(s), under exclusive license to APress Media, LLC, part of Springer
    Nature 2025L. EvelynMaking ChatGPT Work for You[https://doi.org/10.1007/979-8-8688-1445-7_11](https://doi.org/10.1007/979-8-8688-1445-7_11)
  prefs: []
  type: TYPE_NORMAL
- en: 11. Revise and Rewrite with ChatGPT to Edit More Efficiently
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Lydia Evelyn^([1](#Aff2)  )(1)Catalonia, Spain
  prefs: []
  type: TYPE_NORMAL
- en: As a writer, I can tell you that one of the most daunting parts of writing anything
    is often the editing process. This is especially true when you’re having to modify
    written content to meet *changing* requirements. If you’re someone who’s written
    white papers or newsletters or has done content writing of any kind with editors,
    you know what it’s like to be told you have to rewrite the *entire* document because
    of something going on above you.
  prefs: []
  type: TYPE_NORMAL
- en: Oops, we’re not offering that service anymore; take all mention of it out. Ah,
    we’re not supposed to mention that individual’s name; refer to them as “a representative”
    throughout the article. Oh, instead of writing about our new product, we’re going
    to talk about new features on an existing product.
  prefs: []
  type: TYPE_NORMAL
- en: If you have to go through *multiple* revisions, there are only so many mistakes
    you can catch by using “find and replace” with your text editing software. The
    reason? Because if you search for “Mrs. Johnson” because it turns out you should
    refer to them as “the company’s representative,” you not only have to replace
    all mention of “Mrs. Johnson,” you *also* have to rewrite any “she/her” pronouns
    and replace them all with “they/them.” All these mistakes add up and result in
    endless back-and-forth versioning with editors or, even worse, a professional
    document riddled with embarrassing errors.
  prefs: []
  type: TYPE_NORMAL
- en: Using ChatGPT to rephrase written text to fit a different context is a massive
    time-saver. For this chapter, we did a little out-of-the-box thinking with our
    prompts to really show you how efficient ChatGPT is with rewriting content for
    a *wide* variety of uses—from redacting sensitive information to rewriting a child’s
    story to feature completely different protagonists in a different setting.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s stop showing up to our editors with documents covered in leftover fragments
    from a previous version and use ChatGPT to make us look a little more put together.
  prefs: []
  type: TYPE_NORMAL
- en: 'What will be covered in this chapter:'
  prefs: []
  type: TYPE_NORMAL
- en: You need to be careful when handling sensitive information. Using ChatGPT to
    redact sensitive information from a signup sheet for a bank.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Admittedly, a lot of Americans could use this explanation. Asking ChatGPT to
    explain the contents of the American constitution in a way that a fifth grader
    would understand.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: This is just plain fun. Seeing ChatGPT translate a song from French to English
    while maintaining the cadence and rhythm.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Help kids identify with stories by making it about them! Rewriting popular children’s
    tales to feature one’s own family and friends as protagonists.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Handling Personally Identifiable Information and Complying with European GDPR
    Laws
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Today’s markets are global. Because of the Internet, you’re not just creating
    products or services for your domestic market. Both small businesses and large
    corporations have to be concerned with how they conduct business with international
    clients. This is especially true for handling things like payments or personal
    information for European clients. Why Europe? Well, that’s because European customers
    are protected by GDPR (General Data Protection Regulation) laws.
  prefs: []
  type: TYPE_NORMAL
- en: GDPR laws were implemented in 2018 in the EU to protect user data for residents
    living in Europe. These laws require any companies doing business in Europe to
    ask for consent from European users to use their personal information. Companies
    must also clearly state what user data will be used for. These laws were implemented
    to help protect user privacy and have been rigorously protected as a result.
  prefs: []
  type: TYPE_NORMAL
- en: Not complying with GDPR laws can lead to **extremely** costly fines. Companies
    could have to pay a **minimum of €10 million** or 2% of their global annual revenue,
    depending on which is higher. Meta, the company that owns Facebook, Instagram,
    and WhatsApp, ran into this issue in 2023 and had to pay **€1.2 billion** to Ireland
    for an infraction against GDPR laws.
  prefs: []
  type: TYPE_NORMAL
- en: Clearly, data protection is taken very seriously in Europe, and if you’re doing
    business internationally, it’s critical to understand how to manage user data
    properly to comply with GDPR standards.
  prefs: []
  type: TYPE_NORMAL
- en: So, how do we deal with this? Do we just give up on doing business in Europe?
    Not quite.
  prefs: []
  type: TYPE_NORMAL
- en: Anonymizing Data to Comply with European GDPR Laws
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Thankfully, handling user data safely doesn’t have to be overly complicated.
    Let’s take an example that would require heavy data protection, like signing up
    for a bank. Clearly, this deals with highly sensitive information, including a
    user’s name, ID, place of residence, and date of birth. All of this information
    is detrimentally important to keep safe; therefore, banks that do business in
    Europe are required to *anonymize* the data when they store it. This means that
    upon submission, all of the sensitive information within is censored. And, interestingly
    enough, ChatGPT is actually capable of providing that service.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s take a look at how that works.
  prefs: []
  type: TYPE_NORMAL
- en: Giving ChatGPT an Example of a Bank Form That Would Need to Be Anonymized
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In Prompt [11-1](#PC1), we’re asking ChatGPT to anonymize sensitive information
    from a fictitious bank form.
  prefs: []
  type: TYPE_NORMAL
- en: Note
  prefs: []
  type: TYPE_NORMAL
- en: This is only an example of how ChatGPT can be used to anonymize data; however,
    for ChatGPT to be used for actual anonymizing of sensitive data, the process should
    be handled programmatically by software developers using ChatGPT. What’s provided
    in Prompt [11-1](#PC1) is an example to show how ChatGPT can recognize specific
    types of information and rewrite it to conform to GDPR standards.
  prefs: []
  type: TYPE_NORMAL
- en: 'Anonymize this information to comply with European GDPR laws:###Personal Information:-
    Full Name: Peter P. Piper- Date of Birth: 01/01/1990- Address: 123 Pickled Pepper
    Drive, Springfield, IL 62704- Phone Number: (123) 456-7890- Email: peter-piper@pickedapeck.comIdentification:-
    SSN: 123-45-6789Employment Information:- Employer: Self-Employed- Job Title: Seller
    of Canned Goods- Annual Income: $80Account Preferences:- Account Type: Savings-
    Initial Deposit Amount: $10.00- Online Banking: YesPrompt 11-1'
  prefs: []
  type: TYPE_NORMAL
- en: Giving ChatGPT information that needs to be censored
  prefs: []
  type: TYPE_NORMAL
- en: 'Obviously, all of the information in Prompt [11-1](#PC1) is filler content
    provided for the sake of this example. In Response [11-1](#PC2), however, ChatGPT
    proves itself capable of recognizing the context, regardless of how ridiculous
    the provided sensitive information would seem to us, and sensoring it as per the
    instructions we gave it in the prompt.To comply with GDPR laws, the personal information
    provided should be anonymized by removing or redacting all directly identifying
    details. Here''s an anonymized version of the information:---**Anonymized Information:****Personal
    Information:**- **Full Name**: Redacted- **Date of Birth**: Redacted- **Address**:
    Redacted- **Phone Number**: Redacted- **Email**: Redacted**Identification:**-
    **SSN**: Redacted**Employment Information:**- **Employer**: Self-Employed- **Job
    Title**: Seller of Goods- **Annual Income**: Redacted**Account Preferences:**-
    **Account Type**: Savings- **Initial Deposit Amount**: Redacted- **Online Banking**:
    Yes---This version removes or generalizes all directly identifiable information,
    ensuring compliance with GDPR. Only non-sensitive, generalized details remain.Response
    11-1'
  prefs: []
  type: TYPE_NORMAL
- en: ChatGPT anonymizes sensitive information presented in a bank form
  prefs: []
  type: TYPE_NORMAL
- en: Now, as stated before, actual sensitive information should be properly handled,
    and there are ways to programmatically integrate ChatGPT into a company’s infrastructure
    to safely manage sensitive data. But this goes into technical details that are
    beyond the scope of this book. Our example here only serves to show how ChatGPT
    can recognize sensitive data and modify the text to keep the information anonymous.
  prefs: []
  type: TYPE_NORMAL
- en: That aside, let’s look at a more easily understood example.
  prefs: []
  type: TYPE_NORMAL
- en: Explaining the American Constitution to a Fifth Grader
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Let’s tell the truth. While the American constitution is an important and integral
    part of US society, many American citizens don’t understand its contents or what
    all it entails. So, let’s challenge ChatGPT to take something as dense as the
    American constitution and make it understandable to a fifth grader. And, honestly,
    we might learn a thing or two ourselves.
  prefs: []
  type: TYPE_NORMAL
- en: 'But first, the constitution is a quite sizable text, so we’re going to do what
    we’ve done in previous chapters and upload a PDF of the constitution in our prompt.
    In Figure [11-1](#Fig1), you’ll see what it looked like when we prompted ChatGPT
    with a PDF attached to the prompt.![Screenshot of a chat interface displaying
    a summary of the United States Constitution. The top section shows a PDF icon
    labeled "The Constitution of the United States" with a prompt asking to explain
    each article of the American Constitution. Below, the summary includes the Preamble,
    which outlines the Constitution''s purpose, and Article I, detailing the Legislative
    Branch. Article I is divided into sections: Section 1 establishes Congress, Section
    2 defines the House of Representatives, and Section 3 defines the Senate.](../images/641691_1_En_11_Chapter/641691_1_En_11_Fig1_HTML.jpg)'
  prefs: []
  type: TYPE_NORMAL
- en: Figure 11-1
  prefs: []
  type: TYPE_NORMAL
- en: Prompting ChatGPT with a PDF attached to the prompt The text used in our prompt
    is in Prompt [11-2](#PC3).Explain each article of the American constitution. I've
    attached a PDF of the constitution for reference.Prompt 11-2
  prefs: []
  type: TYPE_NORMAL
- en: Telling ChatGPT to reference a PDF
  prefs: []
  type: TYPE_NORMAL
- en: 'Response [11-2](#PC4) shows the response we got back from ChatGPT.Here''s a
    summary of each article of the United States Constitution:---**Preamble**Sets
    the purpose of the Constitution: to form a more perfect union, establish justice,
    ensure domestic tranquility, provide for the common defense, promote general welfare,
    and secure liberty for future generations.---**Article I: Legislative Branch****-
    Section 1:** Establishes Congress, composed of the Senate and House of Representatives.**-
    Section 2:** Defines the House of Representatives (elections every two years,
    age and residency requirements, and apportionment of representatives).**- Section
    3:** Defines the Senate (two senators per state, terms of six years, and the Vice
    President as President of the Senate).**- Section 4:** Provides guidelines for
    congressional elections and mandates at least one session of Congress per year.**-
    Section 5:** Details rules and procedures for each house of Congress.**- Section
    6:** Outlines privileges, restrictions, and compensation for members of Congress.**-
    Section 7:** Describes the process for passing bills into law.**- Section 8:**
    Lists the powers of Congress (e.g., taxation, regulation of commerce, declaring
    war, and creating laws).**- Section 9:** Limits the powers of Congress (e.g.,
    no suspension of habeas corpus except in emergencies).**- Section 10:** Prohibits
    certain actions by states (e.g., entering treaties or coining money).---**Article
    II: Executive Branch****- Section 1:** Vests executive power in the President,
    establishes the Electoral College, and lists qualifications for the presidency.**-
    Section 2:** Outlines the President''s powers, including commander-in-chief, treaty-making
    (with Senate approval), and appointments.**- Section 3:** Details presidential
    duties, such as delivering the State of the Union and ensuring laws are faithfully
    executed.**- Section 4:** Allows for impeachment and removal of the President,
    Vice President, and other civil officers for high crimes and misdemeanors.---**Article
    III: Judicial Branch****- Section 1:** Vests judicial power in the Supreme Court
    and other inferior courts established by Congress.**- Section 2:** Defines the
    jurisdiction of the federal courts.**- Section 3:** Provides a definition of treason
    and outlines how it can be punished.---**Article IV: States'' Powers and Limits****-
    Section 1:** Mandates that states honor the laws and judicial rulings of other
    states (Full Faith and Credit Clause).**- Section 2:** Ensures citizens'' privileges
    across states and governs extradition of criminals.**- Section 3:** Establishes
    procedures for admitting new states and governing territories.**- Section 4:**
    Guarantees a republican form of government for all states and protection against
    invasion or rebellion.---**Article V: Amendment Process**Describes the process
    for amending the Constitution, requiring proposals by two-thirds of Congress or
    a constitutional convention and ratification by three-fourths of the states.---**Article
    VI: Federal Power**- Establishes the Constitution, federal laws, and treaties
    as the supreme law of the land.- Mandates an oath to support the Constitution
    but prohibits religious tests for public office.---**Article VII: Ratification**Outlines
    the procedure for ratification, requiring nine states to approve the Constitution
    for it to take effect.---Let me know if you''d like further details or specific
    sections elaborated upon!Response 11-2'
  prefs: []
  type: TYPE_NORMAL
- en: ChatGPT summarizes the American constitution
  prefs: []
  type: TYPE_NORMAL
- en: Well… this certainly looks like the contents of a constitution. However, like
    the constitution, it’s very dense and hard to read, especially if we’re trying
    to educate a fifth grader. So let’s ask ChatGPT to explain this content in simpler
    terms (Prompt [11-3](#PC5)).Now explain that in a way a fifth grader would understand.Prompt
    11-3
  prefs: []
  type: TYPE_NORMAL
- en: Instructing ChatGPT to explain the American constitution
  prefs: []
  type: TYPE_NORMAL
- en: 'Response [11-3](#PC6) shows the answer we got back from ChatGPT.Sure! Here''s
    the U.S. Constitution explained for a fifth grader:---**Preamble**This part is
    like the introduction. It says why the Constitution was written: to make the country
    better, keep things fair, keep peace, protect everyone, help people live good
    lives, and make sure freedom lasts for future generations.---**Article I: Rules
    for Congress (the people who make laws)****- Section 1:** Congress has two parts:
    the Senate and the House of Representatives.**- Section 2:** The House of Representatives
    is made up of people chosen every two years. They decide how many representatives
    each state gets based on population.**- Section 3:** The Senate has two people
    from each state who serve for six years. The Vice President is in charge of the
    Senate but only votes to break ties.**- Section 4-6:** Congress decides when elections
    happen and how they meet. Members get paid and have some special rules, like they
    can''t get arrested for things they say in Congress.**- Section 7:** This explains
    how laws are made. Congress writes them, and the President signs them to make
    them official. If the President doesn''t like a law, they can say "no" (veto),
    but Congress can still make it a law with enough votes.**- Section 8:** Lists
    things Congress can do, like collect taxes, make money, declare war, and create
    post offices.**- Section 9-10:** These sections say what Congress and states are
    not allowed to do, like make unfair laws or create their own money.---**Article
    II: Rules for the President (the person in charge)****- Section 1:** The President
    is chosen every four years. They must be at least 35 years old and born in the
    U.S.**- Section 2-3:** The President is in charge of the military, can make treaties
    with other countries (with help from Congress), and hires important officials
    like judges.**- Section 4:** If the President or other leaders do really bad things,
    they can lose their job (this is called impeachment).---**Article III: Rules for
    Courts (judges)****- Section 1:** There''s one big court called the Supreme Court.
    Congress can make smaller courts, too.**- Section 2:** The courts handle cases
    about laws, disagreements between states, and other big issues.**- Section 3:**
    Treason is when someone helps enemies or fights against the U.S., and it''s a
    very serious crime.---**Article IV: Rules for States****- Section 1:** States
    have to respect each other''s laws and decisions.**- Section 2:** People can''t
    run away to another state to escape punishment. States also have to treat visitors
    fairly.**- Section 3:** New states can be added to the country, but they need
    permission from Congress.**- Section 4:** Every state will have a government chosen
    by the people, and the country will protect them from attacks.---**Article V:
    Changing the Rules**This explains how to make changes (amendments) to the Constitution.
    It takes a lot of agreement—two-thirds of Congress and three-fourths of the states
    must say yes.---**Article VI: The Constitution is the Boss**This part says the
    Constitution is the highest law in the country. Everyone in government must follow
    it. People can have any religion they want, and no one has to follow a religion
    to get a government job.---**Article VII: Starting the Constitution**This part
    says the Constitution would start once nine states agreed to it.---It''s like
    a set of rules for how the country works, so everything is fair and everyone knows
    their job! Let me know if there''s a part you want to talk about more.Response
    11-3'
  prefs: []
  type: TYPE_NORMAL
- en: ChatGPT succinctly explains each chapter of the American constitution
  prefs: []
  type: TYPE_NORMAL
- en: This is a great response! It’s easier for a child to understand, and truthfully,
    it makes a very intimidating document easier for anyone to understand. This is
    a great example of how ChatGPT can be used to help educate younger people on key
    concepts that otherwise seem hard to grasp. It can even help an adult become better
    educated on the way their government and political system works.
  prefs: []
  type: TYPE_NORMAL
- en: Now, for a change of pace, let’s look at some more fun use cases for ChatGPT’s
    ability to rewrite text.
  prefs: []
  type: TYPE_NORMAL
- en: Asking ChatGPT to Rewrite a Song in French to English
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Now, we’ve already seen multiple examples of how ChatGPT can translate text.
    However, it’s very difficult, even for skilled musicians, to translate a song
    and maintain the cadence and rhythm of the beat. However, ChatGPT is capable of
    keeping up with the syllable count within song lyrics, which is key to maintaining
    the rhythm.
  prefs: []
  type: TYPE_NORMAL
- en: If you’ve never heard of the artist Indila, she’s a French singer and songwriter
    with a very soft voice and a style like the artist Enya, an Irish New Age singer
    some Americans might be a little more familiar with. One of her songs, *Love Story*,
    is a very sweet song about the different love stories of the protagonists in the
    narrative.
  prefs: []
  type: TYPE_NORMAL
- en: To truly appreciate the song, let’s ask ChatGPT to translate it and retain the
    rhyming scheme of the original, as you can see in Prompt [11-4](#PC7).These are
    the lyrics to "Love Story" by Indila. I want you to take them and translate them
    to English, maintaining the sentiment of the song while using similar rhyming
    conventions and maintaining the cadence. Try to match the syllable count to the
    original verses.###[Paroles de "Love Story"][Couplet 1]L'âme en peineIl vit, mais
    parle à peineIl attendDevant cette photo d'antanIl, il n'est pas fouIl y croit
    c'est toutIl la voit partoutIl l'attend deboutUne rose à la mainÀ part elle, il
    n'attend rien[Couplet 2]Rien autour n'a de sensEt l'air est lourdLe regard absentIl
    est seul et lui parle souventIl, il n'est pas fouIl l'aime c'est toutIl la voit
    partoutIl l'attend deboutDebout une rose à la mainNon, non plus rien ne le retient[Refrain]Dans
    sa love storyDans sa love storyDans sa love storySa love story[Couplet 3]Prends
    ma mainPromets-moi que tout ira bienSerre-moi fortPrès de toi, je rêve encoreOui,
    oui, je veux resterMais je ne sais plus aimerJ'ai été trop bêteJe t'en prie, arrêteArrête,
    comme je regretteNon, je ne voulais pas tout ça[Pre-refrain]Je serai richeEt je
    t'offrirai tout mon orEt si tu t'en fichesJe t'attendrai sur le portEt si tu m'ignoresJe
    t'offrirai mon dernier souffle de vie[Refrain]Dans ma love storyDans ma love storyDans
    ma love storyMa love story[Couplet 4]Une bougiePeut illuminer la nuitUn sourirePeut
    bâtir tout un empireEt il y a toiEt il y a moiEt personne n'y croitMais l'amour
    fait d'un fou un roiEt si tu m'ignoresJ'me battrais encore et encore[Refrain]C'est
    ta love storyC'est ta love storyC'est l'histoire d'une vieLove story[Outro]Des
    cris de joieQuelques larmes on s'en vaOn vit dans cette love storyLove story,
    love story, love storyPrompt 11-4
  prefs: []
  type: TYPE_NORMAL
- en: Prompting ChatGPT to translate the French lyrics from “Love Story” by Indila
    Now, I was personally very impressed by the results ChatGPT came up with. The
    translation rhymes, yet the word choice here retains the simplistic yet emotional
    tone of the original (Response [11-4](#PC8)).Here is an English adaptation of
    "Love Story" by Indila, maintaining the sentiment, rhyming, cadence, and similar
    syllable counts:---**[Lyrics of "Love Story"]****[Verse 1]**A heart in pain,He
    lives but speaks in vain.He just waits,Before this photo of old days.No, no, he's
    not mad,He believes, and that's all he has.He sees her everywhere,He's standing
    there,A rose in his hand,For her alone, he'll always stand.---**[Verse 2]**Nothing
    near has meaning,The air feels heavy, fleeting.With an empty stare,He's alone,
    yet speaks to her there.No, no, he's not mad,He loves her, that's all he has.He
    sees her everywhere,He's standing there,Still with a rose in his hand.No, nothing
    else can make him stand.---**[Chorus]**In his love story,In his love story,In
    his love story,His love story.---**[Verse 3]**Take my hand,Promise me we'll make
    it again.Hold me tight,Near to you, I'll dream all night.Yes, yes, I want to stay,But
    I don't know love's way.I was such a fool,Please stop, be cruel.Stop now, I regret
    it all.No, I never meant for us to fall.---**[Pre-Chorus]**I'll be rich,And I'll
    give you all my gold.If you don't care,I'll wait for you at the shore.And if you
    ignore,I'll give you my last breath of life.---**[Chorus]**In my love story,In
    my love story,In my love story,My love story.---**[Verse 4]**A candle flameCan
    brighten up the darkest plain.A single smileCan build an empire mile by mile.And
    there is you,And there is me,No one believes,But love turns a fool to royalty.And
    if you ignore,I'll fight for us forevermore.---**[Chorus]**It's your love story,It's
    your love story,It's the tale of a life,Love story.---**[Outro]**Cheers and cries,And
    tears fill our goodbye.We live in this love story,Love story, love story, love
    story.---This adaptation keeps the poetic rhythm while retaining the emotional
    depth and imagery of the original French lyrics. Let me know if you'd like any
    further refinements!Response 11-4
  prefs: []
  type: TYPE_NORMAL
- en: A beautifully translated version of Indila’s “Love Story” in English
  prefs: []
  type: TYPE_NORMAL
- en: ChatGPT was able to successfully translate these beautiful song lyrics. As a
    polyglot (meaning a person that speaks several languages), I can personally attest
    to how well this translation adheres to the original meaning and intent of the
    song while maintaining the rhyming scheme very well. *C’est formidable.*
  prefs: []
  type: TYPE_NORMAL
- en: But that’s not the only way we can alter media to suit our own purposes. Have
    you ever gifted a loved one with something personalized just for them? Things
    like mugs or throw pillows with a family member’s face on them are great presents
    because the personal touch makes them sentimental.
  prefs: []
  type: TYPE_NORMAL
- en: So, let’s look at how we can change a story to personalize it for a young child
    that would love to see a story tailored just for them.
  prefs: []
  type: TYPE_NORMAL
- en: Making the Tale of Goldilocks and the Three Bears More Personal
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Telling children stories before bed is a beautiful way to bond, and there’s
    nothing that excites them more than seeing themselves in the protagonist of the
    story. With ChatGPT, we can take these stories and make them catered to your own
    close loved ones. Try this out with your favorite bedtime story to tell your kids!
  prefs: []
  type: TYPE_NORMAL
- en: For this example, we’re going to ask ChatGPT to tell us the story of Goldilocks
    and the Three Bears (Prompt [11-5](#PC9)).Tell me the story of Goldilocks and
    the Three BearsPrompt 11-5
  prefs: []
  type: TYPE_NORMAL
- en: 'Getting ChatGPT to tell us a story In Response [11-5](#PC10), you’ll see how
    ChatGPT recounts the story for us.The story of **Goldilocks and the Three Bears**
    is a classic fairy tale with many versions, but here''s a popular retelling:---**Goldilocks
    and the Three Bears**Once upon a time, in a cozy little cottage in the forest,
    there lived three bears: a big Papa Bear, a medium-sized Mama Bear, and a tiny
    Baby Bear. Each bear had their own bowl for porridge, their own chair, and their
    own bed.One morning, the bears made porridge for breakfast, but it was too hot
    to eat. They decided to go for a walk in the forest while it cooled.Nearby, a
    curious little girl named Goldilocks was wandering through the woods. She stumbled
    upon the bears'' cottage and, finding the door open, decided to go inside.---**The
    Porridge**In the kitchen, Goldilocks saw three bowls of porridge. She tasted the
    first bowl."Too hot!" she exclaimed.She tried the second bowl."Too cold!"Finally,
    she tasted the porridge in the smallest bowl."Just right!" she said happily, and
    she ate it all up.---**The Chairs**Feeling full, Goldilocks went into the living
    room and saw three chairs. She sat in the first chair."Too hard!" she said.She
    tried the second chair."Too soft!"Then she sat in the smallest chair."Just right!"
    she said. But as she sat back to relax, the little chair broke into pieces.---**The
    Beds**Now feeling sleepy, Goldilocks went upstairs to the bedroom. She lay down
    on the first bed."Too hard!"She tried the second bed."Too soft!"Then she lay down
    on the smallest bed."Just right!" she sighed and fell fast asleep.---**The Bears
    Return**Soon, the three bears came home from their walk. They noticed someone
    had been in their house."Someone''s been eating my porridge!" growled Papa Bear."Someone''s
    been eating my porridge!" said Mama Bear."Someone''s been eating my porridge,
    and they ate it all up!" cried Baby Bear.In the living room, they found the chairs."Someone''s
    been sitting in my chair!" growled Papa Bear."Someone''s been sitting in my chair!"
    said Mama Bear."Someone''s been sitting in my chair, and they broke it!" cried
    Baby Bear.When they went upstairs, they saw the beds."Someone''s been sleeping
    in my bed!" growled Papa Bear."Someone''s been sleeping in my bed!" said Mama
    Bear."Someone''s been sleeping in my bed, and she''s still there!" cried Baby
    Bear.---**Goldilocks Wakes Up**Goldilocks woke up and saw the three bears staring
    at her. She screamed, jumped out of bed, and ran as fast as she could out of the
    house and into the forest. She never returned to the bears'' cottage again.---And
    from that day on, Goldilocks learned to be more careful about wandering into houses
    that weren''t hers.**The End.**Response 11-5'
  prefs: []
  type: TYPE_NORMAL
- en: ChatGPT tells the story of Goldilocks and the Three Bears
  prefs: []
  type: TYPE_NORMAL
- en: Now let’s ask ChatGPT to customize the story for us. I encourage you to try
    this for yourself by changing the protagonist, the bears, the setting, or anything
    else to make it more personal. In the meantime, check out how we did it in Prompt
    [11-6](#PC11).I have two sons named Charlie and Emmett, and I want to tell them
    the story with the two of them as the protagonists. I want them to relate to the
    story on a personal level, so I want the story to take place in a small neighborhood
    in Oregon. Instead of bears, I'd like them to go into the house of several characters
    from Rick and Morty.Prompt 11-6
  prefs: []
  type: TYPE_NORMAL
- en: Asking ChatGPT to give us a personalized version of Goldilocks and the Three
    Bears
  prefs: []
  type: TYPE_NORMAL
- en: In Response [11-6](#PC12), ChatGPT does an excellent job of integrating the
    changes we asked for, as well as adding flair based upon the *Rick and Morty*
    TV show.Here's a customized version of the story for Charlie and Emmett, set in
    a small Oregon neighborhood featuring characters from **Rick and Morty**:---**Charlie
    and Emmett's Adventure**One sunny afternoon in a quiet neighborhood in Oregon,
    Charlie and Emmett decided to go exploring while their parents were busy gardening.
    The brothers loved adventure, and they never knew what they might discover.As
    they wandered down a quiet street, they came upon a strange house at the end of
    the block. It looked like something out of a sci-fi movie, with gadgets sticking
    out of the roof and green glowing lights in the windows."Do you think anyone lives
    here?" asked Charlie."I don't know," said Emmett, "but we should check it out!"---**The
    House of Rick and Morty**The boys knocked on the door, but no one answered. They
    pushed it open cautiously and stepped inside. The house was messy, filled with
    weird inventions and strange smells. Unbeknownst to them, the house belonged to
    Rick, Morty, and Summer, who had gone on an interdimensional adventure and left
    the door unlocked.---**The Snacks**In the kitchen, Charlie and Emmett found three
    bowls of something that looked like glowing cereal.Charlie tried the first bowl.
    "Too spicy!" he exclaimed, sticking out his tongue. It was clearly one of Rick's
    crazy experiments.Emmett tried the second bowl. "Too sour!" he said, his face
    scrunching up.Then they both tried the smallest bowl, which looked normal."Just
    right!" they said together, and they ate it all up.---**The Chairs**Next, they
    went into the living room, which was cluttered with futuristic furniture. There
    were three chairs.Charlie sat in the first chair. "Too stiff!" he said, standing
    up quickly.Emmett tried the second chair. "Too wobbly!" he said as it started
    spinning uncontrollably.Then they both tried the third chair, a cozy recliner
    in the corner. "Just right!" they said, curling up together. But when they pulled
    the lever, the chair launched them halfway across the room!---**The Beds**After
    recovering from the chair fiasco, the boys found a staircase leading to the bedrooms.
    Upstairs, there were three beds.Charlie flopped onto the first bed. "Too hard!"
    he said, rubbing his back.Emmett tried the second bed, which was covered in glowing
    slime. "Too sticky!" he said, hopping off immediately.Then they both crawled into
    the third bed, which was soft and smelled like freshly washed blankets."Just right!"
    they said, yawning. Before they knew it, they were fast asleep.---**The Return
    of Rick, Morty, and Summer**Meanwhile, Rick, Morty, and Summer returned from their
    interdimensional trip, carrying strange gadgets and arguing loudly."Why is the
    door open?!" Rick growled.As they walked into the house, they noticed the glowing
    cereal had been eaten. "Someone's been eating my toxic cereal!" Rick shouted."And
    someone sat in my hover chair!" complained Morty.When they went upstairs, Summer
    stopped and pointed. "Uh, Rick? Someone's sleeping in my bed…and it's two kids!"Charlie
    and Emmett woke up to find the three staring at them. Rick was holding a portal
    gun, and Morty looked panicked."Uh, hi?" said Charlie nervously."Kids, you've
    got about three seconds to explain yourselves before I send you to another dimension!"
    Rick barked.---**A Quick Escape**Terrified, Charlie and Emmett scrambled out of
    bed and ran down the stairs. They darted past the strange gadgets, through the
    glowing kitchen, and out the front door."Let's never go in that house again!"
    said Emmett, panting as they ran home."Agreed!" said Charlie, laughing now that
    they were safe.From that day on, Charlie and Emmett stuck to exploring places
    that didn't look like they belonged in a sci-fi cartoon. But they always remembered
    their wild adventure in the house at the end of the block.**The End.**---What
    do you think? Would you like to tweak anything to make it even more personal?Response
    11-6
  prefs: []
  type: TYPE_NORMAL
- en: ChatGPT gives us a personalized story that’s sure to delight
  prefs: []
  type: TYPE_NORMAL
- en: As you can see from Response [11-6](#PC12), ChatGPT comes up with a very entertaining
    story that still resembles the setup from Goldilocks and the Three Bears while
    adding the personal touch of making two young boys the protagonists. It also makes
    the story a joy to read for fans of *Rick and Morty*.
  prefs: []
  type: TYPE_NORMAL
- en: Conclusion
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In this chapter, we looked at how ChatGPT can be used to rewrite and rephrase
    text for business, translation, and even the customization of a bedtime story
    to make it more personal. In the next chapter, we’re going to be looking at how
    ChatGPT can be used to extract data for various uses, from conducting research
    based on blog reviews to creating a budget plan based upon actual buying habits.
  prefs: []
  type: TYPE_NORMAL
- en: © The Author(s), under exclusive license to APress Media, LLC, part of Springer
    Nature 2025L. EvelynMaking ChatGPT Work for You[https://doi.org/10.1007/979-8-8688-1445-7_12](https://doi.org/10.1007/979-8-8688-1445-7_12)
  prefs: []
  type: TYPE_NORMAL
- en: 12. Budget Planning, Product Research, and Writing an Article with ChatGPT
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Lydia Evelyn^([1](#Aff2)  )(1)Catalonia, Spain
  prefs: []
  type: TYPE_NORMAL
- en: At this point, we know that ChatGPT is good at handling large quantities of
    data—whether it be text, documents, or even photos. A good rule of thumb is that
    any time you’re dealing with a lot of information, *it’s the perfect opportunity
    to use ChatGPT*. ChatGPT performs the best with as much information as possible.
    Because of this, if you’re conducting research on large quantities of information
    or are trying to sort through data for specific information, you know which tool
    to rely on.
  prefs: []
  type: TYPE_NORMAL
- en: In this chapter, we’re looking at how ChatGPT can be used to extract data and
    do something with it. What do we mean by this? Well, for example, if you’re conducting
    product research, it’s unlikely you’re just going to collect that information
    and then proceed to do nothing else. You’re probably going to write up a report,
    create a marketing strategy, or use the information and write about it. If you’re
    looking at financial information like bills and payment stubs, you’re likely to
    then start making a budget, manage your spending habits, or categorize payments
    so that they’re easier to sort through in the future.
  prefs: []
  type: TYPE_NORMAL
- en: 'So, to save ourselves some time, we’re going to use ChatGPT to reduce the effort
    needed to pour over large quantities of text and numbers by having ChatGPT follow
    two steps: analyze the material, then do something with it.'
  prefs: []
  type: TYPE_NORMAL
- en: 'What will be covered in this chapter:'
  prefs: []
  type: TYPE_NORMAL
- en: Planning on writing a novel? Get to know your audience first! Conducting product
    research on fantasy novels.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Get the most out of what you learned by sharing with others. Writing about writing
    based upon great examples.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Take the guessing out of budget planning. Using ChatGPT o1 to take photos of
    actual receipts and make an effective budget plan to accurately cut spending costs.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Conducting Product Research Based on Blog Reviews
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: If you’re selling a product of any kind, product research is crucial for understanding
    what interested consumers are looking for. You need to understand how other products
    may or may not be meeting their needs, what impresses your potential clients,
    and find out what’s trending. Going through customer reviews, however, is extremely
    tedious.
  prefs: []
  type: TYPE_NORMAL
- en: Besides, not all reviews are the same. Imagine you’re managing a cooking blog,
    and one of your readers leaves a bad review, but they rarely cook. Trying to impress
    that kind of reader isn’t going to help your research in the long run if you’re
    looking through your comments for feedback. You want people that enjoy cooking
    often to enjoy your blog, because they’re the ones that will keep coming back.
    From a business perspective, the enthusiast’s opinion matters more than someone
    that only dabs in cooking on occasion.
  prefs: []
  type: TYPE_NORMAL
- en: For this reason, in this example, we’re going to be looking at how ChatGPT can
    be used to extract content from blog reviews that are directly related to the
    subject we’re interested in. For this example, we’re going to be examining reviews
    and critiques of popular fantasy novels. Blog reviewers are not only sure to be
    dedicated to the product they’re discussing, they also have the ability to influence
    people interested in the topic they’re discussing. Finding out about their opinion
    is much more efficient than, for example, just going through Amazon reviews of
    popular novels arbitrarily. So, let’s get started.
  prefs: []
  type: TYPE_NORMAL
- en: Using ChatGPT to Compare Popular Fantasy Novels
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In this example, we’re going to examine the reviews of different fantasy novels
    and find out what reviewers agree are the common highlights and downfalls of each.
    We’re going to use ChatGPT to find different bloggers to conduct our research
    and save time.
  prefs: []
  type: TYPE_NORMAL
- en: This example will consist of a back-and-forth conversation with ChatGPT that
    will use its web search abilities as well as reference previous points in the
    same conversation. The approach here will resemble concepts covered in Chapter
    [4](641691_1_En_4_Chapter.xhtml), so if you want a reminder on how you can use
    ChatGPT to write content based upon information it was taught as reference, you
    can check that out. Now, let’s get started with Prompt [12-1](#PC1).I want you
    to find some book bloggers that have reviewed the book Game of Thrones, by George
    R. R. Martin. Give me the links to their blogs. Find bloggers that wrote negatively
    about the book, as well as bloggers that wrote positively about it. Give me a
    list. Make sure that the bloggers you find mostly read fantasy.Prompt 12-1
  prefs: []
  type: TYPE_NORMAL
- en: Using ChatGPT to conduct product research for fantasy novels As you can see
    from our prompt, we’re enlisting ChatGPT to find various sources to obtain information
    from bloggers that have reviewed *Game of Thrones* by George R. R. Martin. Not
    only are we trying to get their opinions, we’re trying to specifically get the
    opinions that matter most to us—fans of fantasy. This will give us the viewpoint
    of an already-engaged audience in this genre. Response [12-1](#PC2) shows the
    answer we got from ChatGPT.Here is a list of book bloggers who have reviewed *A
    Game of Thrones* by George R.R. Martin, with both negative and positive perspectives,
    focusing on bloggers who primarily review fantasy literature:**Negative Reviews:**1\.
    **Kelson Vibber** - On the blog *Hyperborea*, Kelson Vibber found *A Game of Thrones*
    difficult to get into, describing it as a "tedious" read with characters he struggled
    to care about. He compared it unfavorably to other epic fantasies like *The Wheel
    of Time*.2\. **John Daulton** - On his blog *John Daulton Books*, Daulton criticized
    the book for its unnecessary sexual content and inconsistent dialogue, though
    he did praise its descriptive passages and character depth.3\. **Fantasy Book
    Review** - A reviewer on *Fantasy Book Review* expressed frustration with the
    character development, stating that the emphasis on morally gray characters made
    it hard to care about them, ultimately finding the book boring despite its creative
    world-building.**Positive Reviews:**1\. **Books of Brilliance** - *Books of Brilliance*
    praised *A Game of Thrones* as a must-read for fantasy lovers, emphasizing its
    detailed world-building and its importance in redefining the fantasy genre.2\.
    **Tommye** - On *The Fantasy Review*, Tommye praised *A Game of Thrones* for its
    complex politics and intricate character relationships, ranking it as one of the
    top epic fantasies.3\. **Fantasy Book Review** - Another review on *Fantasy Book
    Review* from a different reviewer lauded the novel as one of the greatest fantasy
    works, highlighting its suspenseful narrative and emotional depth.These bloggers
    provide a balanced view of the book, with some focusing on its flaws and others
    on its strengths, all within the context of the fantasy genre.Response 12-1
  prefs: []
  type: TYPE_NORMAL
- en: ChatGPT finds various book reviews of various opinions on Game of Thrones, by
    George R. R. Martin
  prefs: []
  type: TYPE_NORMAL
- en: In Response [12-1](#PC2), ChatGPT provides a variety of sources to draw from
    in our search for critical opinions on *Game of Thrones*. Now, you’ll see in Prompt
    [12-2](#PC3) that we’re continuing our conversation with ChatGPT and asking it
    to follow the same procedure for another book, this one entitled *Sword Catcher*
    by Cassandra Clare.Now do the same for the Sword Catcher by Cassandra ClarePrompt
    12-2
  prefs: []
  type: TYPE_NORMAL
- en: Asking ChatGPT to do more research Our prompt is very simple because we’re using
    our earlier prompt as a guide. You’ll see in Response [12-2](#PC4) that ChatGPT
    easily understands what we’re asking for and complies.Here are some book bloggers
    who have reviewed *Sword Catcher* by Cassandra Clare, with both negative and positive
    perspectives, focusing on those who typically review fantasy literature:**Negative
    Reviews:**1\. **GeekDad** - While acknowledging the strong world-building in *Sword
    Catcher*, the reviewer found the book to be somewhat slow-paced, with much of
    the narrative feeling like setup for future installments. The feeling of being
    left hanging after so many pages was a drawback, although the depth of the characters
    and setting did leave the reviewer interested in what comes next.2\. **Before
    We Go Blog** - This review highlighted some clunky aspects of Clare’s use of languages
    and cultural inspirations, which occasionally took the reviewer out of the story.
    Additionally, the in-world mythos interludes were seen as redundant, though the
    book's strong character development and intriguing plot were praised.**Positive
    Reviews:**1\. **WinterIsComing.net** - This blog praised *Sword Catcher* as possibly
    Cassandra Clare's best work yet, appreciating its refreshing departure from her
    previous YA series. The detailed world-building, complex character relationships,
    and the novel's ability to surprise even seasoned Clare readers were highlighted
    as major strengths.2\. **Fantasy Book Critic** - The reviewer commended the book
    for its solid blend of character-driven and plot-driven elements. The evolving
    relationships between characters like Kel and Lin, as well as the intrigue surrounding
    the political machinations in the city of Castellane, were particularly well-received.These
    bloggers provide a mix of perspectives on *Sword Catcher*, offering insights into
    both its strengths and potential weaknesses within the fantasy genre.Response
    12-2
  prefs: []
  type: TYPE_NORMAL
- en: ChatGPT gives a list of bloggers and reviews for Cassandra Clare's Sword Catcher
  prefs: []
  type: TYPE_NORMAL
- en: We have more blogs and reviews to examine! We’re going to follow the same steps
    and get bloggers and reviews for one more book, this time for *The Ruin of Kings*
