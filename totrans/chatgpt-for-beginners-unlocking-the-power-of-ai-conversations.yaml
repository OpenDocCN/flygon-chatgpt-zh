    ****cri**tica**l ****det**ail**s ****aga**ins**t ****rel**iabl**e ****sou**rce**s.
    ****F**or** ****ins**tanc**e, ****i**f** ****Cha**tGP**T ****pro**vide**s ****stat**istic**s
