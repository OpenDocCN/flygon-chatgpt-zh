  zh: '![一本书的封面  自动生成的描述](image_rsrc462.jpg)'
- en: 'Chapter 10:'
  id: totrans-2402
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第10章：
- en: Advanced Topics and Future Trends
  id: totrans-2403
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 高级主题和未来趋势
- en: A bustling marketplace, with vendors shouting their wares and buyers haggling,
    is a microcosm of the larger, vibrant economy. Each unique interaction adds value
    to the collective system. In machine learning model evaluation and optimization,
    diverse metrics and techniques help refine and enhance model performance in much
    the same way. As AI continues to evolve and permeate various industries, understanding
    these advanced evaluation methods becomes crucial for anyone looking to excel
    in the field. Whether you're a student eager to learn more or a seasoned professional
    aiming to optimize your projects, mastering these techniques can give you a competitive
    edge and ensure your models are functional and exceptional.
  id: totrans-2404
  prefs: []
  type: TYPE_NORMAL
  zh: 一个熙熙攘攘的市场，摊贩们高声叫卖，买家讨价还价，是更大、更充满活力的经济的缩影。每一次独特的互动都为整个系统增加了价值。在机器学习模型评估和优化中，各种指标和技术帮助改进和增强模型性能，方式几乎相同。随着人工智能继续发展和渗透到各个行业，理解这些高级评估方法对于任何希望在领域内脱颖而出的人来说变得至关重要。无论你是渴望学习更多知识的学生，还是希望优化项目的资深专业人士，掌握这些技术可以给你带来竞争优势，并确保你的模型功能强大且出色。
- en: 10.1 Hyperparameter Tuning
  id: totrans-2405
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 10.1 超参数调整
- en: When it comes to evaluating machine learning models, accuracy alone doesn’t
    cut it, especially when dealing with imbalanced datasets or complex classification
    tasks. Fortunately, we have advanced evaluation metrics that can assess a model's
    performance. The F1 score, which balances precision (the ability of the model
    to avoid false positives) and recall (the ability to capture all relevant cases),
    is particularly useful when the cost of false positives and false negatives is
    high because it can offer a more nuanced view of a model’s performance. Similarly,
    the ROC-AUC (Receiver Operating Characteristic - Area Under Curve) provides a
    graphical representation of a model’s ability to distinguish between classes,
    with the AUC representing the degree of separability. A model with an AUC close
    to 1 can effectively differentiate between classes, making it a vital metric for
    binary classification problems. For multi-class classification scenarios, the
    confusion matrix becomes indispensable. It outlines the true positives, false
    positives, false negatives, and true negatives for each class, providing a comprehensive
    overview of a model's classification prowess. By dissecting these metrics, you
    gain insights into a model's strengths and weaknesses, allowing for targeted improvements.
  id: totrans-2406
  prefs: []
  type: TYPE_NORMAL
  zh: 当涉及到评估机器学习模型时，仅仅准确性是不够的，尤其是在处理不平衡数据集或复杂的分类任务时。幸运的是，我们有先进的评估指标来评估模型的表现。F1分数，它平衡了精确度（模型避免假阳性的能力）和召回率（捕获所有相关案例的能力），在假阳性和假阴性的成本很高时特别有用，因为它可以提供一个更细致的模型性能视图。同样，ROC-AUC（接收者操作特征
    - 曲线下面积）提供了一个图形表示，展示了模型区分类别的能力，其中AUC代表分离程度。AUC接近1的模型可以有效地区分类别，这使得它成为二元分类问题的重要指标。对于多类分类场景，混淆矩阵变得不可或缺。它概述了每个类别的真正阳性、假阳性、假阴性和真正阴性，为模型分类能力提供了一个全面的概述。通过分析这些指标，你可以深入了解模型的优势和劣势，从而进行有针对性的改进。
- en: Once you’ve assessed your model’s performance, the next step is optimization.
    Hyperparameter tuning is the process of selecting the optimal set of hyperparameters
    for a machine learning model to improve its performance. It works much like fine-tuning
    a musical instrument—small adjustments to settings can significantly optimize
    its performance. Common techniques include grid search and random search. Grid
    search involves defining a set of hyperparameters and exhaustively searching through
    all possible combinations. While comprehensive, it can be computationally expensive
    for large parameter spaces. Random search, on the other hand, randomly samples
    hyperparameter combinations, often yielding good results with fewer iterations.
    For those seeking a more efficient approach, Bayesian optimization offers a sophisticated
    alternative by building a probabilistic model of the function mapping hyperparameters
    to the objective function. It intelligently explores hyperparameter space, focusing
    on promising areas to find the optimal settings more quickly. These techniques
    are crucial for enhancing model performance, specifically the accuracy and efficiency
    of your algorithms.
  id: totrans-2407
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦你评估了你的模型性能，下一步就是优化。超参数调整是选择机器学习模型的最佳超参数集的过程，以提高其性能。它的工作方式类似于调整乐器——对设置的微小调整可以显著优化其性能。常见的技巧包括网格搜索和随机搜索。网格搜索涉及定义一组超参数，并彻底搜索所有可能的组合。虽然全面，但对于大型参数空间来说，它可能计算成本高昂。另一方面，随机搜索随机采样超参数组合，通常在较少的迭代中产生良好的结果。对于那些寻求更有效方法的人来说，贝叶斯优化提供了一个复杂的替代方案，通过构建一个将超参数映射到目标函数的概率模型。它智能地探索超参数空间，专注于有希望的领域，以更快地找到最佳设置。这些技术对于增强模型性能至关重要，特别是算法的准确性和效率。
- en: Model validation is another cornerstone of robust machine learning practice.
    K-fold cross-validation is a popular technique that divides the dataset into k
    subsets, using k-1 subsets for training and the remaining one for testing. This
    process repeats k times, ensuring that each subset serves as a test set once.
    This method provides reliable performance estimates, reducing the risk of overfitting.
    Bootstrapping, another validation technique, involves randomly sampling with replacement
    from the dataset to create multiple training sets. This approach helps assess
    the variability of model predictions, offering insights into how the model might
    perform with different data samples. These validation strategies enhance model
    robustness, ensuring it generalizes well to new, unseen data.
  id: totrans-2408
  prefs: []
  type: TYPE_NORMAL
  zh: 模型验证是稳健机器学习实践的另一个基石。K折交叉验证是一种流行的技术，它将数据集分为k个子集，使用k-1个子集进行训练，剩余的一个用于测试。这个过程重复k次，确保每个子集都作为一次测试集。这种方法提供了可靠的性能估计，降低了过拟合的风险。Bootstrapping，另一种验证技术，涉及从数据集中随机有放回地采样以创建多个训练集。这种方法有助于评估模型预测的变异性，为模型在不同数据样本上的表现提供见解。这些验证策略增强了模型的稳健性，确保它能够很好地泛化到新的、未见过的数据。
- en: In the quest for higher accuracy, ensemble methods prove invaluable. These techniques
    combine multiple models to improve prediction accuracy, akin to harnessing the
    power of a diverse team to solve a problem. Bagging, or bootstrap aggregating,
    involves training several models independently using random subsets of the data
    and averaging their predictions. Random forests, a popular bagging method, use
    decision trees as base models, enhancing accuracy and reducing overfitting. Boosting,
    another ensemble technique, trains models sequentially, with each model correcting
    the errors of its predecessor. Gradient boosting machines (GBM) and their variant,
    XGBoost, are renowned for their ability to improve model accuracy by focusing
    on difficult-to-classify examples. These ensemble methods offer a powerful way
    to enhance model performance, ensuring that predictions are both accurate and
    reliable.
  id: totrans-2409
  prefs: []
  type: TYPE_NORMAL
  zh: 在追求更高准确性的过程中，集成方法证明是无价的。这些技术通过结合多个模型来提高预测准确性，类似于利用一个多元化的团队来解决一个问题。Bagging，或称为自助聚合，涉及使用数据的随机子集独立训练多个模型，并平均它们的预测。随机森林，一种流行的Bagging方法，使用决策树作为基础模型，提高了准确性并减少了过拟合。Boosting，另一种集成技术，按顺序训练模型，每个模型都纠正其前一个模型的错误。梯度提升机（GBM）及其变体XGBoost因其专注于难以分类的示例来提高模型准确性的能力而闻名。这些集成方法提供了一种强大的方法来增强模型性能，确保预测既准确又可靠。
- en: 'Interactive Element: Hyperparameter Tuning Exercise'
  id: totrans-2410
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 交互元素：超参数调整练习
- en: Experiment with tuning hyperparameters for a machine learning model using grid
    search and random search. Use a dataset of your choice and evaluate the impact
    of different hyperparameter settings on model performance. Consider parameters
    like learning rate, the number of trees (for ensemble methods), and maximum depth.
    Document your process and results, reflecting on how different settings influence
    accuracy and generalization. This exercise will deepen your understanding of hyperparameter
    tuning, providing hands-on experience with essential optimization techniques.
  id: totrans-2411
  prefs: []
  type: TYPE_NORMAL
  zh: 通过网格搜索和随机搜索调整机器学习模型的超参数进行实验。使用你选择的数据库集，评估不同超参数设置对模型性能的影响。考虑学习率、树的数量（用于集成方法）和最大深度等参数。记录你的过程和结果，反思不同的设置如何影响准确性和泛化。这项练习将加深你对超参数调整的理解，为你提供必要的优化技术的实际经验。
- en: By exploring these advanced evaluation and optimization techniques, you equip
    yourself with the tools needed to develop robust, high-performing machine learning
    models that can handle real-world data and deliver accurate and reliable predictions.
    As AI continues to advance and influence various industries, staying abreast of
    these developments will be key to your success in this dynamic field.
  id: totrans-2412
  prefs: []
  type: TYPE_NORMAL
  zh: 通过探索这些高级评估和优化技术，你将装备自己开发稳健、高性能的机器学习模型所需的工具，这些模型可以处理现实世界的数据，并交付准确和可靠的预测。随着人工智能的持续进步和影响各个行业，跟上这些发展将是你在这一动态领域取得成功的关键。
- en: 10.2 Exploring Generative Adversarial Networks (GANs)
  id: totrans-2413
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 10.2 探索生成对抗网络（GANs）
- en: 'Imagine a world where machines can create art, synthesize new images, or even
    generate realistic human faces. This is a fascinating reality, thanks to generative
    adversarial networks, or GANs. At the heart of GANs lies an innovative dual-component
    architecture consisting of two neural networks: the generator and the discriminator.
    Think of the generator as an artist, tasked with creating new data samples, such
    as images or sounds, from scratch. Its goal is to produce outputs that are indistinguishable
    from real data. On the other side, the discriminator acts as the critic. It evaluates
    the generated samples against real data, determining their authenticity. This
    setup creates an adversarial game where the generator strives to fool the discriminator,
    while the discriminator aims to improve at spotting fakes. This back-and-forth
    process is called adversarial training, where both networks improve through competition.
    Over time, the generator learns to produce increasingly realistic samples, pushing
    the boundaries of what machines can create.'
  id: totrans-2414
  prefs: []
  type: TYPE_NORMAL
  zh: 想象一个机器能够创造艺术、合成新图像，甚至生成逼真的人类面孔的世界。这得益于生成对抗网络（GANs），这是一个迷人的现实。GANs的核心是一个创新的由两个神经网络组成的双组件架构：生成器和判别器。将生成器想象成一个艺术家，其任务是从头开始创建新的数据样本，例如图像或声音。它的目标是产生与真实数据无法区分的输出。另一方面，判别器充当评论员。它评估生成的样本与真实数据之间的差异，确定其真实性。这种设置创造了一个对抗游戏，其中生成器试图欺骗判别器，而判别器则试图提高识别假样本的能力。这种来回的过程称为对抗训练，其中两个网络通过竞争而提高。随着时间的推移，生成器学会产生越来越逼真的样本，推动机器创造边界的扩展。
- en: The applications of GANs are diverse and transformative, touching various fields
    and industries. In image synthesis, GANs have revolutionized the ability to generate
    high-quality, realistic images from scratch. This capability is invaluable in
    industries like advertising and entertainment, where visual content is king. GANs
    also excel in data augmentation, a technique used to expand training datasets
    by generating new, synthetic examples. This is particularly useful for training
    deep learning models, where large datasets are crucial for performance. Furthermore,
    GANs have found a creative outlet in style transfer, an artistic application where
    the style of one image, such as a painting, is applied to another, like a photograph.
    This opens up new possibilities in digital art, providing tools for designers
    and artists to explore new creative directions. These applications illustrate
    the power of GANs in both practical and imaginative domains.
  id: totrans-2415
  prefs: []
  type: TYPE_NORMAL
  zh: GANs的应用多样且具有变革性，触及了各个领域和行业。在图像合成方面，GANs彻底改变了从头开始生成高质量、逼真图像的能力。这种能力在广告和娱乐等行业中极为宝贵，在这些行业中，视觉内容是王。GANs在数据增强方面也表现出色，这是一种通过生成新的、合成的示例来扩展训练数据集的技术。这对于训练深度学习模型特别有用，在这些模型中，大量数据集对于性能至关重要。此外，GANs在风格迁移方面找到了一个创意出口，这是一种艺术应用，其中一种图像（如绘画）的风格被应用于另一种图像（如照片）。这为数字艺术开辟了新的可能性，为设计师和艺术家提供了探索新创意方向的工具。这些应用展示了GANs在实用和想象领域中的力量。
- en: However, working with GANs can present challenges. One common issue is mode
    collapse, where the generator produces a limited variety of outputs, which fails
    to capture the full diversity of the data distribution. This results in repetitive
    or overly similar samples, reducing the GAN's effectiveness. To combat this, techniques
    such as minibatch discrimination and feature matching can be employed to encourage
    diversity in the generated outputs and produce a wider range of data samples.
    Additionally, stabilizing GAN training can be a daunting task. The adversarial
    nature of GANs can lead to oscillations or failure to converge, hindering the
    training process. Implementing techniques like Wasserstein loss, which provides
    a more stable training objective, or using spectral normalization to maintain
    balanced network weights, can help achieve consistent outputs. These strategies
    are crucial for overcoming the inherent instability of GANs and ensuring reliable
    performance.
  id: totrans-2416
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，与GANs一起工作可能会带来挑战。一个常见问题是模式崩溃，其中生成器产生有限种类的输出，无法捕捉数据分布的全部多样性。这导致重复或过度相似的样本，降低了GAN的有效性。为了解决这个问题，可以采用如小批量判别和特征匹配等技术来鼓励生成输出的多样性，并产生更广泛的数据样本。此外，稳定GAN训练可能是一项艰巨的任务。GANs的对抗性可能导致振荡或无法收敛，阻碍训练过程。实施如Wasserstein损失等技术，它提供更稳定的训练目标，或使用频谱归一化来保持网络权重的平衡，可以帮助实现一致的输出。这些策略对于克服GANs固有的不稳定性并确保可靠性能至关重要。
- en: Practical implementations of GANs showcase their incredible potential. One notable
    example is the generation of realistic human faces, a task that has captured public
    imagination and demonstrated GANs' capabilities. By training on extensive datasets
    of human faces, GANs can produce lifelike images indistinguishable from real photographs.
    This application has implications in industries ranging from gaming to virtual
    reality, where realistic digital characters are essential. Another area where
    GANs shine is in developing super-resolution images. Here, GANs enhance low-resolution
    images by adding fine details and improving clarity. This application benefits
    fields like medical imaging and satellite photography, where high-quality images
    are critical for analysis and decision-making. These examples highlight the versatility
    and impact of GANs in creating and enhancing visual data.
  id: totrans-2417
  prefs: []
  type: TYPE_NORMAL
  zh: GANs的实用实现展示了它们惊人的潜力。一个引人注目的例子是生成逼真的人类面孔，这项任务吸引了公众的想象力，并展示了GANs的能力。通过在大量的人类面孔数据集上训练，GANs可以生成与真实照片难以区分的逼真图像。这一应用在从游戏到虚拟现实等需要逼真数字角色的行业中具有影响。GANs在开发超分辨率图像方面也表现出色。在这里，GANs通过添加精细细节和提高清晰度来增强低分辨率图像。这一应用对医学成像和卫星摄影等领域有益，在这些领域中，高质量图像对于分析和决策至关重要。这些例子突出了GANs在创建和增强视觉数据方面的多功能性和影响力。
- en: A deep understanding of GANs' innovative design and practical applications is
    key to optimizing their potential. The generator-discriminator dynamic not only
    drives the creation of realistic data but also opens new avenues in artistic and
    commercial domains. Challenges like mode collapse and training instability present
    opportunities for innovation and refinement, pushing the boundaries of what GANs
    can achieve. Through practical examples like creating human faces or enhancing
    image resolution, GANs continue to redefine the possibilities of artificial intelligence,
    blending creativity and technology in groundbreaking ways.
  id: totrans-2418
  prefs: []
  type: TYPE_NORMAL
  zh: 深入理解生成对抗网络（GANs）的创新设计和实际应用是优化其潜力的关键。生成器-判别器动态不仅推动了真实数据的创造，还在艺术和商业领域开辟了新的途径。如模式坍塌和训练不稳定等挑战为创新和改进提供了机会，推动了生成对抗网络所能达到的边界。通过创建人脸或增强图像分辨率等实际示例，生成对抗网络继续重新定义人工智能的可能性，以开创性的方式融合创造力和技术。
- en: '10.3 The Future of AI: Trends and Innovations'
  id: totrans-2419
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 10.3 人工智能的未来：趋势和创新
- en: The realm of artificial intelligence is constantly shifting, driven by the emergence
    of novel technologies and methodologies that redefine what's possible. One such
    groundbreaking development is quantum computing, which holds the promise of revolutionizing
    AI by tackling problems that are currently beyond the reach of classical computers.
    Imagine a world where complex simulations, like climate modeling or drug discovery,
    are executed in seconds rather than years. Quantum computers leverage the unique
    properties of quantum bits, or qubits, to process information in ways that traditional
    computers can't. This capability has the potential to elevate AI algorithms, improving
    their efficiency and effectiveness in solving highly intricate problems.
  id: totrans-2420
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能领域不断变化，由新兴技术和方法的涌现推动，这些技术和方法重新定义了可能性的界限。其中一项突破性发展是量子计算，它通过解决目前经典计算机无法触及的问题，有望通过革命性地改变人工智能。想象一下，在一个复杂模拟，如气候建模或药物发现，可以在几秒钟内而不是几年内完成的世界上。量子计算机利用量子比特的独特性质来处理信息，这是传统计算机无法做到的。这种能力有可能提升人工智能算法，提高它们解决高度复杂问题的效率和效果。
- en: In tandem with quantum computing, advances in neuromorphic computing are steering
    AI toward more brain-like processing. Neuromorphic systems mimic the human brain's
    structure and function, utilizing specialized hardware to perform complex tasks
    with remarkable energy efficiency. These systems are designed to recognize patterns
    and process sensory data in real time, making them ideal for applications requiring
    rapid decision-making, such as autonomous vehicles or robotic surgery. By emulating
    the brain's neural pathways, neuromorphic computing offers a paradigm shift in
    AI, enabling machines to learn and adapt in ways that closely resemble human cognition.
  id: totrans-2421
  prefs: []
  type: TYPE_NORMAL
  zh: 与量子计算并行，神经形态计算的发展正在引导人工智能向更类似大脑的处理方式转变。神经形态系统模仿人脑的结构和功能，利用专用硬件以非凡的能源效率执行复杂任务。这些系统旨在实时识别模式和处理感官数据，使它们非常适合需要快速决策的应用，如自动驾驶汽车或机器人手术。通过模拟大脑的神经网络，神经形态计算为人工智能提供了一种范式转变，使机器能够以与人类认知相似的方式学习和适应。
- en: '![A diagram of the future of ai  Description automatically generated](image_rsrc463.jpg)'
  id: totrans-2422
  prefs: []
  type: TYPE_IMG
  zh: '![人工智能未来的图解  自动生成的描述](image_rsrc463.jpg)'
- en: As AI continues to evolve, its influence is expanding into emerging industries,
    offering innovative solutions to some of the world's most pressing challenges.
    In the realm of sustainable energy, AI algorithms optimize energy consumption
    and improve the efficiency of renewable energy systems. By analyzing vast datasets
    from wind turbines or solar panels, AI can predict energy production, manage power
    grids, and reduce waste, contributing to a more sustainable future. Similarly,
    in the field of space exploration, AI plays a crucial role in developing autonomous
    systems capable of navigating the limits of outer space. From robotic rovers exploring
    distant planets to AI-driven satellites monitoring Earth's climate, these technologies
    enhance our understanding of the universe and support critical scientific endeavors.
  id: totrans-2423
  prefs: []
  type: TYPE_NORMAL
  zh: 随着人工智能的持续发展，其影响力正在扩展到新兴行业，为世界面临的一些最紧迫的挑战提供创新的解决方案。在可持续能源领域，人工智能算法优化能源消耗并提高可再生能源系统的效率。通过分析风力涡轮机或太阳能电池板的大量数据集，人工智能可以预测能源产量，管理电网，减少浪费，为更加可持续的未来做出贡献。同样，在太空探索领域，人工智能在开发能够穿越外层空间极限的自主系统中发挥着关键作用。从探索遥远行星的机器人漫游车到监测地球气候的人工智能驱动的卫星，这些技术增强了我们对宇宙的理解，并支持了关键的科学研究。
- en: Yet, as AI's capabilities grow, so do the ethical and societal implications
    of its widespread adoption. One of the most significant concerns is job displacement,
    as AI-driven automation transforms industries and alters the nature of work. While
    AI can enhance productivity and create new opportunities, it also poses challenges
    for workers in roles susceptible to automation, particularly those involving repetitive
    tasks or data processing. To mitigate these impacts, it's crucial to prioritize
    education and retraining programs that equip individuals with the skills needed
    to thrive in an AI-driven economy. Moreover, as AI systems become more autonomous,
    ensuring their ethical development and deployment is paramount. This includes
    establishing guidelines that promote fairness, transparency, and accountability,
    particularly in critical areas like healthcare and autonomous vehicles, where
    AI decisions can have far-reaching consequences.
  id: totrans-2424
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，随着人工智能能力的增长，其广泛应用的伦理和社会影响也在增加。最重大的担忧之一是就业岗位的流失，因为由人工智能驱动的自动化正在改变行业和工作的性质。虽然人工智能可以提高生产力和创造新的机会，但它也给那些容易自动化的工作岗位的工人带来了挑战，尤其是那些涉及重复性任务或数据处理的工作岗位。为了减轻这些影响，优先考虑教育和再培训计划，使个人具备在人工智能驱动经济中茁壮成长的技能至关重要。此外，随着人工智能系统变得更加自主，确保其道德发展和部署至关重要。这包括建立促进公平、透明度和问责制的指南，特别是在医疗保健和自动驾驶汽车等关键领域，因为人工智能的决定可能产生深远的影响。
- en: At the cutting edge of AI research, efforts in explainable AI (XAI) seek to
    address the "black box" problem, where AI systems make decisions that are difficult
    for humans to understand. XAI aims to create models that provide clear, interpretable
    explanations of their predictions, fostering trust and facilitating collaboration
    between humans and machines. By enabling users to comprehend the rationale behind
    AI decisions, XAI enhances transparency and supports ethical AI deployment across
    various domains. Additionally, the pursuit of artificial general intelligence
    (AGI) represents a frontier in AI research, with the goal of developing machines
    that possess the cognitive abilities and adaptability of human intelligence. While
    AGI remains a distant prospect, ongoing research explores the fundamental principles
    and architectures needed to achieve this level of machine intelligence.
  id: totrans-2425
  prefs: []
  type: TYPE_NORMAL
  zh: 在人工智能研究的前沿，可解释人工智能（XAI）的努力旨在解决“黑箱”问题，即人工智能系统做出人类难以理解的决定。XAI旨在创建提供清晰、可解释预测解释的模型，促进人类与机器之间的信任和协作。通过使用户能够理解人工智能决策背后的逻辑，XAI增强了透明度，并支持了跨各个领域的道德人工智能部署。此外，追求通用人工智能（AGI）代表了人工智能研究的前沿，目标是开发具有人类认知能力和适应性的机器。尽管AGI仍然是一个遥远的愿景，但持续的研究正在探索实现这一层次机器智能所需的基本原理和架构。
- en: As we navigate the future landscape of AI, these trends and innovations will
    continue to remind us of the transformative potential of this technology, as well
    as the responsibilities that come with its advancement. By embracing these developments
    and addressing the challenges they present, we can harness AI's power to drive
    positive change across society, paving the way for a more intelligent, equitable,
    and sustainable world.
  id: totrans-2426
  prefs: []
  type: TYPE_NORMAL
  zh: 随着我们探索AI的未来格局，这些趋势和创新将继续提醒我们这一技术的变革潜力，以及其进步带来的责任。通过拥抱这些发展并解决它们带来的挑战，我们可以利用AI的力量推动社会产生积极变化，为更智能、公平和可持续的世界铺平道路。
- en: '10.4 Hands-On With AI: Exploring Advanced Topics and Future Trends in AI'
  id: totrans-2427
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 10.4 亲身体验AI：探索AI的先进主题和未来趋势
- en: Instructions for Effective Practice
  id: totrans-2428
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 有效实践指南
- en: '●       Access ChatGPT: Visit [https://chatgpt.com](https://chatgpt.com) and
    create a free account if needed.'
  id: totrans-2429
  prefs: []
  type: TYPE_NORMAL
  zh: ●       访问ChatGPT：访问[https://chatgpt.com](https://chatgpt.com)并创建一个免费账户（如有需要）。
- en: '● Engage with prompts: Enter the prompts, modify them, and experiment to see
    varied responses.'
  id: totrans-2430
  prefs: []
  type: TYPE_NORMAL
  zh: ● 与提示互动：输入提示，修改它们，并尝试不同的响应以观察结果。
- en: '●       Evaluate responses: Check clarity and relevance against what you’ve
    learned.'
  id: totrans-2431
  prefs: []
  type: TYPE_NORMAL
  zh: ●       评估响应：检查清晰度和相关性，与所学知识进行对比。
- en: '●       Experiment and reflect: Adjust prompts to deepen understanding and
    explore AI’s capabilities.'
  id: totrans-2432
  prefs: []
  type: TYPE_NORMAL
  zh: ●       实验和反思：调整提示以深化理解并探索AI的能力。
- en: Prompts to Reinforce Learning in This Section
  id: totrans-2433
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 本节学习巩固提示
- en: 'Prompt 1: “What are the most critical hyperparameters in training deep learning
    models, and how do they affect performance?”'
  id: totrans-2434
  prefs: []
  type: TYPE_NORMAL
  zh: 提示1：“在训练深度学习模型时，哪些是最关键的超参数，它们如何影响性能？”
- en: 'Prompt 2: “Explain how GANs work using an analogy about an artist and a critic.
    Discuss their iterative learning process.”'
  id: totrans-2435
  prefs: []
  type: TYPE_NORMAL
  zh: 提示2：“使用关于艺术家和评论家的类比解释GAN的工作原理。讨论它们的迭代学习过程。”
- en: 'Prompt 3: “How can AI be optimized for edge devices like smartphones and IoT
    sensors? Discuss trade-offs in performance and efficiency.”'
  id: totrans-2436
  prefs: []
  type: TYPE_NORMAL
  zh: 提示3：“如何优化AI以适应智能手机和物联网传感器等边缘设备？讨论性能和效率的权衡。”
- en: 'Prompt 4: “What are the benefits of deploying AI models on edge devices versus
    cloud platforms? Provide examples from real-world applications.”'
  id: totrans-2437
  prefs: []
  type: TYPE_NORMAL
  zh: 提示4：“在边缘设备上部署AI模型与云平台相比有哪些好处？提供来自现实世界应用的例子。”
- en: 'Prompt 5: “What are multi-modal AI systems, and how do they integrate data
    from text, images, and audio? Provide use cases.”'
  id: totrans-2438
  prefs: []
  type: TYPE_NORMAL
  zh: 提示5：“什么是多模态AI系统，它们是如何整合文本、图像和音频数据的？提供用例。”
- en: 'Prompt 6: “What are the key methods for achieving explainability in AI models?
    Include examples like SHAP and LIME.”'
  id: totrans-2439
  prefs: []
  type: TYPE_NORMAL
  zh: 提示6：“实现AI模型可解释性的关键方法有哪些？包括SHAP和LIME等例子。”
- en: 'Prompt 7: “Why is explainability important in high-stakes fields like finance
    or healthcare? Discuss ethical and practical implications.”'
  id: totrans-2440
  prefs: []
  type: TYPE_NORMAL
  zh: 提示7：“为什么在金融或医疗保健等高风险领域，可解释性很重要？讨论伦理和实际影响。”
- en: 'Prompt 8: “How can quantum computing enhance machine learning algorithms? Provide
    examples of potential breakthroughs.”'
  id: totrans-2441
  prefs: []
  type: TYPE_NORMAL
  zh: 提示8：“量子计算如何增强机器学习算法？提供潜在突破的例子。”
- en: 'Prompt 9: “What are the current limitations of quantum AI, and how might they
    be addressed in the next decade?”'
  id: totrans-2442
  prefs: []
  type: TYPE_NORMAL
  zh: 提示9：“量子AI目前的局限性是什么，如何在下一个十年中解决这些问题？”
- en: 'Prompt 10: “Design an AI system to predict supply chain disruptions using multi-modal
    data. What challenges would you face, and how could you solve them?”'
  id: totrans-2443
  prefs: []
  type: TYPE_NORMAL
  zh: 提示10：“设计一个使用多模态数据预测供应链中断的AI系统。你将面临哪些挑战，如何解决它们？”
- en: The Essentials Of AI Deep Learning – Conclusion
  id: totrans-2444
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 人工智能深度学习的基础知识 – 结论
- en: As we reach the end of our journey together, let's take a moment to reflect
    on the path we've traveled. We've navigated the fascinating terrain of artificial
    intelligence and machine learning, starting from the foundational concepts that
    form the backbone of AI. We've explored how machines learn and adapt, focusing
    on neural networks and the intricate architectures of deep learning. These tools
    power today’s most advanced AI systems, and now, they're part of your skillset.
  id: totrans-2445
  prefs: []
  type: TYPE_NORMAL
  zh: 随着我们共同旅程的结束，让我们花一点时间回顾我们所走过的道路。我们探索了人工智能和机器学习的迷人领域，从构成AI骨架的基础概念开始。我们研究了机器是如何学习和适应的，重点关注神经网络和深度学习的复杂架构。这些工具为当今最先进的AI系统提供了动力，现在，它们也成为了你的技能组合的一部分。
- en: Throughout this book, we've highlighted how AI is not just a collection of theories
    but a transformative force across industries. From healthcare and finance to robotics
    and entertainment, AI technologies are reshaping how we live and work. You've
    seen real-world examples and case studies illustrating AI's impact, and you've
    engaged in project-based learning that mirrors professional scenarios. These experiences
    have equipped you with practical skills to apply neural network techniques effectively.
  id: totrans-2446
  prefs: []
  type: TYPE_NORMAL
  zh: 在整本书中，我们强调了AI不仅仅是一系列理论，而是在各个行业中具有变革性的力量。从医疗保健和金融到机器人技术和娱乐，AI技术正在重塑我们的生活和工作的方式。您已经看到了展示AI影响的真实世界案例研究和案例研究，并参与了模拟专业场景的项目式学习。这些经历使您具备了有效应用神经网络技术的实际技能。
- en: But as powerful as AI is, it comes with responsibilities. We've discussed the
    ethical considerations vital for developing fair and accountable AI systems. Bias,
    transparency, and accountability aren't just buzzwords; they are crucial elements
    that guarantee AI benefits everyone. Your awareness and understanding of these
    issues are essential.
  id: totrans-2447
  prefs: []
  type: TYPE_NORMAL
  zh: 但尽管AI强大，它也伴随着责任。我们已经讨论了开发公平和负责任的AI系统所必需的伦理考量。偏见、透明度和问责制不仅仅是口号；它们是确保AI惠及每个人的关键要素。您对这些问题的认识和了解至关重要。
- en: We've also touched on career advancement strategies and the importance of community
    engagement. Whether you're a beginner or a professional pivoting into AI, knowing
    how to build a strong portfolio and network within tech communities is invaluable.
    Engaging with peers, mentors, and industry leaders will open doors and provide
    you with ongoing learning opportunities.
  id: totrans-2448
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还谈到了职业发展策略和社区参与的重要性。无论您是AI领域的初学者还是转向AI的专业人士，了解如何构建强大的个人作品集和在科技社区中建立网络是无价的。与同行、导师和行业领袖的互动将打开大门，为您提供持续的学习机会。
- en: So, what are the key takeaways? You should now have a solid grasp of AI fundamentals
    and feel confident implementing neural network solutions. You're aware of the
    ethical landscape and ready to approach AI development responsibly. Most importantly,
    you have the tools and insights to embark on your own AI projects and advance
    your career.
  id: totrans-2449
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，关键收获是什么？您现在应该对AI基础有扎实的掌握，并自信地实施神经网络解决方案。您了解伦理格局，并准备好负责任地开展AI开发。最重要的是，您拥有了开始自己的AI项目和推进职业生涯的工具和见解。
- en: This book is just the beginning. I encourage you to take what you've learned
    and apply it. Start small projects, experiment with different models, and don't
    be afraid to fail. Each step is a learning opportunity. Dive into AI communities,
    share your experiences, and learn from others. Stay curious and keep up with the
    latest advancements. AI is a rapidly evolving field, and being part of this community
    means you're never learning alone.
  id: totrans-2450
  prefs: []
  type: TYPE_NORMAL
  zh: 这本书只是个开始。我鼓励您将所学应用到实践中。从小项目开始，尝试不同的模型，不要害怕失败。每一步都是学习的机会。投身于AI社区，分享您的经验，并向他人学习。保持好奇心，跟上最新的进展。AI是一个快速发展的领域，成为这个社区的一员意味着您永远不会孤单地学习。
- en: Looking to the future, the potential for AI to drive innovation and address
    global challenges is immense. From combating climate change to advancing healthcare,
    AI holds the promise of transformative solutions. I hope you're inspired to contribute
    to this future by developing ethical, innovative AI systems that make a positive
    impact.
  id: totrans-2451
  prefs: []
  type: TYPE_NORMAL
  zh: 展望未来，人工智能推动创新和解决全球挑战的潜力巨大。从应对气候变化到推进医疗保健，人工智能承诺带来变革性的解决方案。我希望你能通过开发道德的、创新的AI系统，为这个未来做出贡献而受到启发。
- en: Thank you for joining me on this journey through the world of AI. Your curiosity
    and commitment are commendable, and I'm grateful for the opportunity to guide
    you. As the founder of NextGen AI Publications, my mission is to empower individuals
    like you with the knowledge and skills to excel in this exciting field. I encourage
    you to continue exploring, learning, and pushing the boundaries of what's possible
    with AI. The world is waiting for your contributions, and I can't wait to see
    what you'll achieve.
  id: totrans-2452
  prefs: []
  type: TYPE_NORMAL
  zh: 感谢您加入我在这趟AI世界的旅程。您的求知欲和承诺值得赞扬，我很感激有机会引导您。作为NextGen AI Publications的创始人，我的使命是赋予像您这样的人知识和技能，以在这样一个激动人心的领域中脱颖而出。我鼓励您继续探索、学习和挑战AI可能性的边界。世界期待着您的贡献，我迫不及待地想看到您将取得的成就。
- en: Glossary
  id: totrans-2453
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 术语表
- en: 'Chapter 1: Foundations of Machine Learning and AI'
  id: totrans-2454
  prefs: []
  type: TYPE_NORMAL
  zh: 第一章：机器学习和人工智能的基础
- en: '● Artificial intelligence (AI): The simulation of human intelligence in machines
    that can perform tasks such as learning, reasoning, and problem-solving.'
  id: totrans-2455
  prefs: []
  type: TYPE_NORMAL
  zh: ● 人工智能（AI）：在机器中模拟人类智能，可以执行学习、推理和解决问题的任务。
- en: '● Machine learning: A type of artificial intelligence that allows computers
    to learn from data without being explicitly programmed.'
  id: totrans-2456
  prefs: []
  type: TYPE_NORMAL
  zh: ● 机器学习：一种人工智能类型，允许计算机从数据中学习，而无需明确编程。
- en: '● Deep learning: An AI method that mimics the structure and function of the
    human brain. These artificial neural networks can perform image recognition, natural
    language processing, and speech recognition.'
  id: totrans-2457
  prefs: []
  type: TYPE_NORMAL
  zh: ● 深度学习：一种模仿人类大脑结构和功能的人工智能方法。这些人工神经网络可以进行图像识别、自然语言处理和语音识别。
- en: '● Neural network: A model in AI inspired by the human brain, made up of layers
    of neurons that work together to recognize patterns and make decisions.'
  id: totrans-2458
  prefs: []
  type: TYPE_NORMAL
  zh: ● 神经网络：一种受人类大脑启发的AI模型，由多层神经元组成，它们协同工作以识别模式和做出决策。
- en: '● Decision tree: A model that makes decisions by splitting data into branches
    based on certain features, with each branch representing a possible outcome or
    decision.'
  id: totrans-2459
  prefs: []
  type: TYPE_NORMAL
  zh: ● 决策树：一种通过根据某些特征将数据分割成分支来做出决策的模型，每个分支代表一个可能的输出或决策。
- en: '● Random forest: An ensemble method in machine learning that uses many decision
    trees to make more accurate and stable predictions by combining the results of
    multiple trees.'
  id: totrans-2460
  prefs: []
  type: TYPE_NORMAL
  zh: ● 随机森林：一种机器学习集成方法，通过结合多个决策树的结果，使用许多决策树来做出更准确和稳定的预测。
- en: '● Overfitting: An issue that arises when a model learns too much from the training
    data, making it less effective at generalizing to new, unseen data.'
  id: totrans-2461
  prefs: []
  type: TYPE_NORMAL
  zh: ● 过拟合：当模型从训练数据中学习过多时出现的问题，使其在泛化到新的、未见过的数据时变得不那么有效。
- en: 'Chapter 2: Delving Into Neural Networks'
  id: totrans-2462
  prefs: []
  type: TYPE_NORMAL
  zh: 第2章：深入神经网络
- en: '● Perceptron: An algorithm for supervised learning of binary classifiers. It
    simulates a single neuron and forms the foundation for more complex neural networks.'
  id: totrans-2463
  prefs: []
  type: TYPE_NORMAL
  zh: ● 感知器：一种用于监督学习二元分类器的算法。它模拟单个神经元，并为更复杂的神经网络奠定了基础。
- en: '● Multilayer perceptron (MLP): A type of neural network with multiple layers
    of nodes, allowing for more complex pattern recognition beyond simple linear separations.'
  id: totrans-2464
  prefs: []
  type: TYPE_NORMAL
  zh: ● 多层感知器（MLP）：一种具有多个层节点的神经网络，允许进行比简单线性分离更复杂的模式识别。
- en: '● Backpropagation: A learning process in neural networks where errors are sent
    back through the network to adjust the weights and optimize the neural network
    performance.'
  id: totrans-2465
  prefs: []
  type: TYPE_NORMAL
  zh: ● 反向传播：神经网络中的一种学习过程，其中错误被发送回网络以调整权重并优化神经网络性能。
- en: '● Activation functions: Functions used in neural networks to introduce nonlinearity
    so the network can capture complex patterns (e.g., ReLU, sigmoid, tanh).'
  id: totrans-2466
  prefs: []
  type: TYPE_NORMAL
  zh: ● 激活函数：在神经网络中使用以引入非线性，使网络能够捕捉复杂模式（例如，ReLU、sigmoid、tanh）的函数。
- en: 'Chapter 3: Deep Learning Architectures'
  id: totrans-2467
  prefs: []
  type: TYPE_NORMAL
  zh: 第3章：深度学习架构
- en: '● Convolutional neural networks (CNNs): A deep learning architecture used primarily
    for image recognition and classification, where convolution layers extract features
    from images by scanning for patterns.'
  id: totrans-2468
  prefs: []
  type: TYPE_NORMAL
  zh: ● 卷积神经网络（CNNs）：一种主要用于图像识别和分类的深度学习架构，其中卷积层通过扫描模式从图像中提取特征。
- en: '● Recurrent neural networks (RNNs): A type of neural network designed to handle
    sequential data, where each input influences the next, making it ideal for tasks
    like time series forecasting or language processing.'
  id: totrans-2469
  prefs: []
  type: TYPE_NORMAL
  zh: ● 循环神经网络（RNNs）：一种设计用于处理序列数据的神经网络类型，其中每个输入都会影响下一个输入，使其非常适合时间序列预测或语言处理等任务。
- en: '● Transformers: Advanced deep learning models that use self-attention mechanisms
    to process data and capture complex relationships within sequences.'
  id: totrans-2470
  prefs: []
  type: TYPE_NORMAL
  zh: ● 转换器：使用自注意力机制处理数据并捕捉序列中复杂关系的先进深度学习模型。
- en: '● Autoencoders: Unsupervised learning models that compress input data and then
    decode it back to its original representation.'
  id: totrans-2471
  prefs: []
  type: TYPE_NORMAL
  zh: ● 自动编码器：无监督学习模型，它压缩输入数据，然后将其解码回原始表示。
- en: 'Chapter 4: Practical Applications and Industry Impact'
  id: totrans-2472
  prefs: []
  type: TYPE_NORMAL
  zh: 第4章：实际应用和行业影响
- en: '● AI-driven diagnostics: The use of artificial intelligence to analyze medical
    images, detecting issues more quickly and accurately than humans can.'
  id: totrans-2473
  prefs: []
  type: TYPE_NORMAL
  zh: ● 人工智能驱动诊断：使用人工智能分析医学图像，比人类更快、更准确地检测问题。
- en: '● Predictive analytics: Using AI to analyze data and predict future events,
    such as health risks or financial trends, before they occur.'
  id: totrans-2474
  prefs: []
  type: TYPE_NORMAL
  zh: ● 预测分析：使用人工智能分析数据并预测未来事件，如健康风险或金融趋势，在它们发生之前。
- en: '● AI-powered automation: The use of AI in robots and machines to carry out
    tasks, such as delivery or surgery, without human intervention.'
  id: totrans-2475
  prefs: []
  type: TYPE_NORMAL
  zh: ● 人工智能驱动的自动化：在机器人或机器中使用AI执行任务，如交付或手术，无需人工干预。
- en: 'Chapter 5: Data Analysis and Visualization'
  id: totrans-2476
  prefs: []
  type: TYPE_NORMAL
  zh: 第五章：数据分析与可视化
- en: '● Imputation: The process of filling in missing data with estimated values,
    typically based on statistical methods or available information from other data
    points.'
  id: totrans-2477
  prefs: []
  type: TYPE_NORMAL
  zh: ● 补值：用估计值填充缺失数据的过程，通常基于统计方法或来自其他数据点的可用信息。
- en: '● Normalization: A data transformation technique that adjusts the scale of
    features so that no single variable dominates the model’s learning process, often
    by rescaling the data to a common range.'
  id: totrans-2478
  prefs: []
  type: TYPE_NORMAL
  zh: ● 归一化：一种数据转换技术，通过调整特征的比例，使没有任何单个变量主导模型的学习过程，通常通过将数据缩放到公共范围来实现。
- en: '● Exploratory data analysis (EDA): The process of analyzing and summarizing
    a dataset’s characteristics using statistical graphics, plots, and information
    tables to uncover patterns, anomalies, and relationships within the data.'
  id: totrans-2479
  prefs: []
  type: TYPE_NORMAL
  zh: ● 探索性数据分析（EDA）：使用统计图形、图表和信息表分析并总结数据集特征的过程，以揭示数据中的模式、异常和关系。
- en: '● Correlation matrix: A table or heatmap that displays the relationship between
    multiple variables, showing the strength and direction of correlations to aid
    in feature selection and model design.'
  id: totrans-2480
  prefs: []
  type: TYPE_NORMAL
  zh: ● 相关系数矩阵：一个表格或热图，显示多个变量之间的关系，显示相关性的强度和方向，有助于特征选择和模型设计。
- en: 'Chapter 6: Ethical Considerations and Responsible AI'
  id: totrans-2481
  prefs: []
  type: TYPE_NORMAL
  zh: 第五章：伦理考量与负责任的人工智能
- en: '● Algorithmic bias: The systematic and repeated errors embedded in AI algorithms
    due to biased data, which leads to unfair outcomes that disadvantage certain demographic
    groups.'
  id: totrans-2482
  prefs: []
  type: TYPE_NORMAL
  zh: ● 算法偏差：由于数据偏差而嵌入到AI算法中的系统性和重复性错误，导致不公平的结果，损害某些人口群体的利益。
- en: '● Explainability: The practice of making AI systems'' decision-making processes
    transparent, understandable, and trustworthy to humans. This involves providing
    clear explanations for how and why decisions are made.'
  id: totrans-2483
  prefs: []
  type: TYPE_NORMAL
  zh: ● 可解释性：使AI系统的决策过程对人类透明、可理解且值得信赖的实践。这包括提供关于如何以及为什么做出决策的明确解释。
- en: 'Chapter 7: Enhancing Skills With AI Toolkits'
  id: totrans-2484
  prefs: []
  type: TYPE_NORMAL
  zh: 第五章：使用AI工具包提升技能
- en: '● TensorFlow: A comprehensive framework for machine learning, featuring TensorFlow
    Hub for pretrained models and TensorFlow Extended (TFX) for deployment.'
  id: totrans-2485
  prefs: []
  type: TYPE_NORMAL
  zh: ● TensorFlow：一个机器学习综合框架，包括TensorFlow Hub用于预训练模型和TensorFlow Extended（TFX）用于部署。
- en: '● PyTorch: A  machine learning library based on the Torch library. It offers
    flexibility with dynamic computation graphs, making it suitable for research and
    experimentation.'
  id: totrans-2486
  prefs: []
  type: TYPE_NORMAL
  zh: ● PyTorch：基于Torch库的机器学习库。它通过动态计算图提供灵活性，使其适合研究和实验。
- en: '● Keras: An open-source library for implementing neural networks. It offers
    experimentation, hyperparameter tuning, and real-time model adjustments through
    callbacks.'
  id: totrans-2487
  prefs: []
  type: TYPE_NORMAL
  zh: ● Keras：一个用于实现神经网络的开源库。它通过回调提供实验、超参数调整和实时模型调整。
- en: 'Chapter 8: Project-Based Learning and Real-World Applications'
  id: totrans-2488
  prefs: []
  type: TYPE_NORMAL
  zh: 第五章：基于项目的学习和实际应用
- en: '● Sentiment analysis: A branch of natural language processing (NLP) focused
    on categorizing emotions and opinions within text data, useful for understanding
    public sentiment and customer feedback.'
  id: totrans-2489
  prefs: []
  type: TYPE_NORMAL
  zh: ● 情感分析：自然语言处理（NLP）的一个分支，专注于对文本数据中的情感和观点进行分类，有助于理解公众情绪和客户反馈。
- en: '● Image classification system: A machine learning model that categorizes images
    into predefined classes based on their visual features.'
  id: totrans-2490
  prefs: []
  type: TYPE_NORMAL
  zh: ● 图像分类系统：一个机器学习模型，根据图像的视觉特征将其分类到预定义的类别中。
- en: '● Recommender system: A system that suggests products, content, or services
    to users based on their past behavior or preferences.'
  id: totrans-2491
  prefs: []
  type: TYPE_NORMAL
  zh: ● 推荐系统：一个基于用户过去行为或偏好的系统，向用户推荐产品、内容或服务。
- en: 'Chapter 9: Career Advancement and Community Engagement'
  id: totrans-2492
  prefs: []
  type: TYPE_NORMAL
  zh: 第五章：职业发展与社区参与
- en: '● GitHub: A collaborative software platform that allows developers to create,
    store, and share their code.'
  id: totrans-2493
  prefs: []
  type: TYPE_NORMAL
  zh: ● GitHub：一个协作软件平台，允许开发者创建、存储和分享他们的代码。
- en: 'Chapter 10: Advanced Topics and Future Trends'
  id: totrans-2494
  prefs: []
  type: TYPE_NORMAL
  zh: 第五章：高级主题和未来趋势
- en: '● Evaluation metrics: Quantitative measures used to assess the performance
    and accuracy of a machine learning model or algorithm, helping determine how well
    it meets specific objectives.'
  id: totrans-2495
  prefs: []
  type: TYPE_NORMAL
  zh: ● 评估指标：用于评估机器学习模型或算法的性能和准确性的定量措施，有助于确定其满足特定目标的好坏。
- en: '● Hyperparameter tuning: The process of adjusting the hyperparameters (settings
    that control the learning process) of a machine learning model to optimize its
    performance.'
  id: totrans-2496
  prefs: []
  type: TYPE_NORMAL
  zh: ● 超参数调整：调整机器学习模型超参数（控制学习过程的设置）的过程，以优化其性能。
- en: '● Generative adversarial network (GAN): An AI model that consists of two neural
    networks—a generator and a discriminator—that work in opposition to create realistic
    outputs.'
  id: totrans-2497
  prefs: []
  type: TYPE_NORMAL
  zh: ● 生成对抗网络（GAN）：一个由两个神经网络组成的AI模型——一个生成器和判别器——它们相互对立以创建逼真的输出。
