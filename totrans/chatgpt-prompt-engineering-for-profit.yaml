    ****i**n** ****Pro**ble**m ****Decom**positi**on, ****t**he** ****fo**cus** ****i**s**
    ****o**n** ****div**idin**g ****a**** ****spe**cifi**c ****is**sue** ****in**to**
    ****sma**lle**r ****comp**onent**s ****f**or** ****reso**lutio**n, ****wh**ile**
    ****Go**al** ****Decom**positi**on ****i**s** ****mo**re** ****ab**out** ****bre**akin**g
    ****a**** ****go**al** ****do**wn** ****in**to** ****pa**rts** ****t**o** ****ma**ke**
    ****i**t** ****ea**sie**r ****t**o** ****ach**iev**e ****th**at** ****go**al**.'
  id: totrans-1244
  prefs: []
  type: TYPE_NORMAL
  zh: '****关于目标分解，这两种技术都共享了分解的思想。然而，在问题分解中，重点是将一个特定问题分解成更小的组成部分以进行解决，而目标分解则更多地关于将目标分解成更易于实现的部分。'
- en: '****Com**pare**d ****t**o** ****Iter**ativ**e ****Refi**nemen**t , ****wh**ere**
    ****impr**ovemen**t ****i**s** ****ma**de** ****i**n** ****iter**ation**s, ****t**he**
    ****Pro**ble**m ****Brea**kdow**n ****i**s** ****mo**re** ****ab**out** ****ana**lysi**s
    ****a**nd** ****div**isio**n ****u**p** ****fr**ont**, ****wit**hou**t ****t**he**
    ****ne**ed** ****t**o** ****cont**inuall**y ****rev**isi**t ****ea**ch** ****comp**onen**t.
    ****Ea**ch** ****subp**roble**m ****i**s** ****so**lve**d ****sepa**ratel**y,
    ****a**nd** ****th**en** ****th**ey** ****a**re** ****bro**ugh**t ****tog**ethe**r.'
