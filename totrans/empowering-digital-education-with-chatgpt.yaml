- en: 'Vocabulary analysis *(PR) I am a b1 student of Italian and I need to analyse
    the following text syntactically “Al cinema, questa sera, danno finalmente il
    film che Vittoria sogna di vedere da almeno un anno. Ne aveva sentito parlare
    anche Anna ed entrambe sono delle grandi fan del bell’attore protagonista e non
    vedono l’ora di scoprire se la love story tra lui e la protagonista femminile
    avrà un lieto fine oppure no.”* (CG) Sentence 1: “At the cinema, tonight, they’re
    finally showing the movie that Vittoria has been dreaming of seeing for at least
    a year.”'
  id: totrans-1762
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 'Análisis de vocabulario *(PR) Soy un estudiante de italiano nivel b1 y necesito
    analizar sintácticamente el siguiente texto: “Al cine, esta noche, finalmente
    proyectan la película que Vittoria ha soñado ver durante al menos un año. También
    Anna la había oído hablar y ambas son grandes fanáticas del bonito actor protagonista
    y no pueden esperar para descubrir si la historia de amor entre él y la protagonista
    femenina tendrá un final feliz o no.”* (CG) Oración 1: “En el cine, esta noche,
    finalmente proyectan la película que Vittoria ha estado soñando ver durante al
    menos un año.”'
- en: 'General Structure: Subject + Verb + Direct Object + Circumstantial Location
    + Circumstantial Time.'
  id: totrans-1763
