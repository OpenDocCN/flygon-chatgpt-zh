  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个已经彻底改变了自然语言处理（NLP）的神经网路架构。在2017年发表的文章“**注意力是所有你需要的东西**”中引入的，**Transformer**架构允许模型更高效地处理和生成文本，比之前的架构更有效。它基于注意力机制，这有助于模型专注于文本的不同部分，以便在生成响应时更加关注。
- en: '****7****. ****Atte**n**ti**on**:'
