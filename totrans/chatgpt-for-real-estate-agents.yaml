  id: totrans-414
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Draft email pitches for vendors or partners
  id: totrans-415
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Prompt example:'
  id: totrans-416
  prefs: []
  type: TYPE_NORMAL
