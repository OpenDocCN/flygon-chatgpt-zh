  type: TYPE_NORMAL
  zh: 这位多产的科幻小说作家提出了三条法则，至今仍被视为模板，或者至少是机器人、机器学习和人工智能发展到今天所受到的最低限度的灵感指导。2007年，韩国政府甚至基于阿西莫夫的法则创建了他们的《机器人伦理宪章》。虽然它们可能需要为21世纪进行更新（因为阿西莫夫不可能预测AI将如何远和快地发展），但它们仍然构成了学习机器学习和人工智能的基础工作的重要组成部分。阿西莫夫的三条法则是：
