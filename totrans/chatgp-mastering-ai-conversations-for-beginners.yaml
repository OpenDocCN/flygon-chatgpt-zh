    ****n**ot** ****go**ing** ****t**o** ****se**ek** ****o**ut** ****he**lp** ****o**r**
    ****trea**tmen**t.'
  id: totrans-608
  prefs: []
  type: TYPE_NORMAL
  zh: '**The** **next** **common** **barrier** **preventing** **people** **from**
    **getting** **the** **help** **they** **need** **for** **their** **mental** **health**
    **is** **the** **lack** **of** **education** **and** **awareness** **out** **there**
    **about** **it**. **As** **we** **have** **mentioned**, **mental** **health**
    **is** **one** **of** **the** **catchwords** **of** **the** **modern** **age**.
    **But** **it** **hasn’t** **always** **been** **that** **way**. **In** **fact**,
    **until** **pretty** **recently**, **mental** **health** **issues** **were** **by-and-large**
    **ignored**, **even** **by** **the** **people** **that** **suffered** **from**
    **them**! **When** **we** **hurt** **ourselves** **or** **get** **sick**, **there**
    **are** **usually** **physical** **signs** **and** **symptoms** **that** **make**
    **it** **clear** **we** **are** **not** **doing** **so** **great**. **It** **also**
    **shows** **to** **other** **people**, **who** **can** **encourage** **the** **injured**
    **or** **ill** **person** **to** **get** **help**. **Mental** **health** **issues**,
    **on** **the** **other** **hand**, **can** **be** **quite** **tricky** **to**
    **recognize**. **The** **symptoms** **of** **such** **problems** **are** **often**
    **very** **subtle** **and** **can** **often** **be** **glossed** **over** **as**
    **being** **“just** **who** **the** **person** **is,”** **or** **as** **an** **“attitude**
    **problem.”** **Worst** **of** **all**, **the** **person** **suffering** **from**
    **the** **mental** **health** **problem** **can** **convince** **themselves**
    **that** **it** **is** **just** **who** **they** **are**, **or** **that** **it**
    **is** **normal** **to** **feel** **mentally** **drained** **and** **slightly**
    **deranged** **the** **way** **they** **do**. **The** **more** **aware** **people**
    **become** **of** **the** **different** **mental** **disorders** **out** **there**,
    **as** **well** **as** **their** **clinical** **symptoms**, **the** **more** **likely**
    **they** **are** **to** **realize** **that** **the** **way** **they** **feel**
    **does** **not** **have** **to** **be** **the** **status** **quo** **and** **can**
    **improve**. **But**, **without** **more** **easily** **accessible** **(and**
    **understandable**) **information** **on** **mental** **health** **awareness**
    **to** **educate** **them** **on** **their** **condition**, **many** **people**
    **are** **not** **going** **to** **seek** **out** **help** **or** **treatment**.'
