    ****i**f** ****th**ey** ****se**em** ****obv**iou**s.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: ● ****如****果****你****需****要****一****个****非****常****详****细****的****答****案****，****请****确****保****指****示****模****型****不****要****跳****过****步****骤****，****即****便****它****们****看****起****来****很****明****显****。
- en: '[****T**he** ****diff**erenc**e ****o**f** ****t**he** ****tech**niqu**e ]'
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: '[****该****技****术****的****差****异****]'
- en: '****Ch**ain** ****o**f** ****Tho**ugh**t ****Pr**omp**t ****dif**fer**s ****fr**om**
    ****mo**re** ****di**rec**t ****tech**nique**s ****su**ch** ****a**s** ****Ze**ro**-
    ****sh**ot** ****o**r** ****Ro**le** ****Pl**ay** ****i**n** ****th**at** ****i**t**
    ****foc**use**s ****o**n** ****t**he** ****tho**ugh**t ****pro**ces**s. ****Wh**ile**
    ****ot**her** ****pro**mpt**s ****a**im** ****t**o** ****el**ici**t ****a**n**
    ****imme**diat**e ****an**swe**r, ****Tho**ugh**t ****Pr**omp**t ****se**eks**
    ****t**o** ****unde**rstan**d ****t**he** "****h**ow**" ****a**nd** " ****w**hy**
    " ****o**f** ****t**he** ****an**swe**r ****b**y** ****bre**akin**g ****i**t**
    ****do**wn** ****in**to** ****sequ**entia**l, ****ea**sil**y ****under**standab**le
    ****st**eps**.'
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: '****链****接****思****维****提****示****与****更****多****的****直****接****技术****，****如****零****次****提示****或****角色****扮演****，****不同****之处****在于****它****更****注重****思****维****过****程****。****而****其他****提****示****旨在****诱****导****一****个****即****时****答****案****，****思****维****提****示****则****试图****通过****将****答****案****分解****为****连续****、****易于****理解****的****步****骤****，****来****理解****答****案的****"****如****何****"****和****"****为****什****么****"****。'
- en: '****Com**pare**d ****t**o** ****F**ew**-****sh**ot** ****Prom**ptin**g , ****wh**ere**
    ****exa**mple**s ****a**re** ****gi**ven** ****f**or** ****t**he** ****mo**del**,
    ****t**he** ****Ch**ain** ****o**f** ****Tho**ugh**t ****us**es** ****ea**ch**
    ****st**ep** ****o**f** ****reas**onin**g ****incre**mental**ly, ****wh**ich**
    ****n**ot** ****on**ly** ****imp**rove**s ****under**standi**ng ****b**ut** ****al**so**
    ****ma**kes** ****i**t** ****ea**sie**r ****f**or** ****t**he** ****us**er** ****t**o**
    ****le**arn** ****ab**out** ****t**he** ****stru**ctur**e ****o**f** ****t**he**
    ****pro**ble**m. ****F**ew**-****sh**ot** ****c**an** ****sh**ow** ****h**ow**
    ****t**o** ****d**o** ****some**thin**g, ****b**ut** ****Ch**ain** ****o**f**
    ****Tho**ugh**t ****re**all**y ****exp**lain**s ****t**he** ****pro**ces**s.'
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: '****与****少****次****提示****相比****，****在****少****次****提示****中****，****模****型****会****接****收****到****一****些****例****子****，****而****链****接****思****维****则****利****用****每****一****步****推****理****的****递****增****方式****，****这不仅****能****提****高****理****解****，****还****使****用****户****更****容****易****学****习****问****题****的****结****构****。****少****次****提示****可以****展示****如何****做****某****事****，****但****链****接****思****维****真****正****解****释****了****过****程****。'
- en: '****Ch**ain** ****o**f** ****Tho**ugh**t ****i**s** ****ther**efor**e ****a****
    ****de**epe**r ****a**nd** ****mo**re** ****anal**ytica**l ****tech**niqu**e,
    ****hel**pin**g ****bo**th** ****i**n** ****deve**lopin**g ****t**he** ****an**swe**r
    ****a**nd** ****i**n** ****prov**idin**g ****cla**rit**y ****f**or** ****t**he**
    ****us**er**. ****B**y** ****sho**win**g ****h**ow** ****t**he** ****mo**del**
    ****arr**ive**s ****a**t** ****t**he** ****an**swe**r, ****th**is** ****app**roac**h
    ****en**ds** ****u**p** ****be**ing** ****mo**re** ****rel**iabl**e ****a**nd**
    ****le**ss** ****pr**one** ****t**o** ****er**ror**s.'
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: '****链****接****思****维****因此****是一****种****更****深****入****、****更****具****分析****性的****技****术****，****它****在****发****展****答****案****和****为****用****户****提****供****清****晰****性****方****面****都****有****帮助****。****通过****展示****模****型****如何****到达****答****案****，****这种****方法****更****可靠****，****也更****少****出错****。'
- en: '[****Exa**mple**s]'
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: '[****示例****]'
- en: '● ****Ba**sic** : "****Wh**at** ****i**s** ****t**he** ****s**um** ****o**f**
    ****t**he** ****num**ber**s ****1**** ****t**o** ****5****? ****Th**ink** ****st**ep**
    ****b**y** ****st**ep** ****be**for**e ****answ**erin**g. "'
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: '● 基础: "****1 到 5 的数字之和是多少？****一步一步思考后再回答。"'
- en: '○ ****An**swe**r : "****Fi**rst**, ****w**e** ****a**dd** ****1**** + ****2****
    = ****3****. ****Th**en**, ****3**** + ****3**** = ****6****. ****Ne**xt**, ****6****
    + ****4**** = ****1**0**. ****Fin**all**y, ****1**0** + ****5**** = ****1**5**.
    ****Ther**efor**e, ****t**he** ****an**swe**r ****i**s** ****1**5**. "'
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: '○ 答案: "****首先，我们将 1 + 2 = 3。然后，3 + 3 = 6。接下来，6 + 4 = 10。最后，10 + 5 = 15。因此，答案是
    15。"'
- en: '● ****Inte**rmedia**te : "****H**ow** ****d**o** ****y**ou** ****so**lve**
    ****t**he** ****pro**ble**m ****o**f** ****1**2** ****div**ide**d ****b**y** ****4****
    , ****a**nd** ****th**en** ****sub**trac**t ****3**** ****fr**om** ****t**he**
    ****re**sul**t? ****Exp**lai**n ****ea**ch** ****st**ep**."'
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: '● 中级: "****如何解 12 除以 4 的问题，然后从结果中减去 3？****解释每一步。"'
- en: '○ ****An**swe**r : "****Fi**rst**, ****l**et**''****s**** ****di**vid**e ****1**2**
    ****b**y** ****4**** , ****wh**ich** ****eq**ual**s ****3****. ****Th**en** ****w**e**
    ****sub**trac**t ****3**** ****fr**om** ****t**he** ****re**sul**t, ****a**nd**
    ****th**at** ****eq**ual**s ****0****."'
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: '○ 答案: "****首先，让我们将 12 除以 4，结果是 3。然后，我们从结果中减去 3，那等于 0。" '
- en: '● ****Adv**ance**d : "****Exp**lai**n ****h**ow** ****t**o** ****so**lve**
    ****t**he** ****equ**atio**n ****2**x** + ****3**** = ****1**1**. ****Th**ink**
    ****ab**out** ****ea**ch** ****st**ep** ****un**til** ****y**ou** ****re**ach**
    ****t**he** ****va**lue** ****o**f** ****x****. "'
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: '● 高级: "****解释如何解方程 2x + 3 = 11。****思考每一步直到你得到 x 的值。"'
- en: '○ ****An**swe**r : "****Fi**rst**, ****l**et**''****s**** ****sub**trac**t
    ****3**** ****fr**om** ****bo**th** ****si**des** ****o**f** ****t**he** ****equ**atio**n:
    ****2**x** + ****3**** - ****3**** = ****1**1** - ****3****, ****resu**ltin**g
    ****i**n** ****2**x** = ****8****. ****Af**ter** ****th**at**, ****w**e** ****di**vid**e
    ****bo**th** ****si**des** ****b**y** ****2****, ****s**o** ****x**** = ****4****."'
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: '○ 答案: "****首先，让我们从等式的两边减去 3：2x + 3 - 3 = 11 - 3，结果是 2x = 8。之后，我们将等式的两边都除以 2，所以
    x = 4。"'
- en: '[****Stru**ctur**e ****o**f** ****t**he** ****tech**niqu**e ****us**ed** ****ab**ove**]'
