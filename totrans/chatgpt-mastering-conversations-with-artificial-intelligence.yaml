  prefs: []
  type: TYPE_NORMAL
- en: '*Text Elements:*'
  prefs: []
  type: TYPE_NORMAL
- en: '*Title: ''[Title of the infographic, e.g., ''Harnessing the Power of Nature'']''.
    Font: [font style, e.g., ''bold Helvetica''], Size: [size, e.g., ''36pt''], Color:
    [color, e.g., ''dark green''], Position: [position, e.g., ''top center''].*'
  prefs: []
