- en: '"Write Python code to create a plugin for ChatGPT that integrates with a third-party
    API (e.g., weather or stock market). Include steps for setting up API keys and
    handling user queries. Discuss how plugins extend AI capabilities."'
  id: totrans-1179
  prefs: []
  type: TYPE_NORMAL
  zh: '"编写Python代码以创建一个ChatGPT插件，该插件与第三方API（例如天气或股市）集成。包括设置API密钥和处理用户查询的步骤。讨论插件如何扩展AI功能。"'
- en: '27: Building an Autodesk Maya Plugin'
  id: totrans-1180
  prefs: []
  type: TYPE_NORMAL
  zh: '27: 构建Autodesk Maya插件'
- en: 'Prompt:'
  id: totrans-1181
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Write Python code to create an Autodesk Maya plugin that automates the creation
    of 3D models with specific attributes. Include examples of interacting with Maya’s
    scripting API. Discuss how plugins enhance 3D modeling workflows."'
  id: totrans-1182
  prefs: []
  type: TYPE_NORMAL
  zh: '"编写Python代码创建一个Autodesk Maya插件，自动化具有特定属性的3D模型的创建。包括与Maya的脚本API交互的示例。讨论插件如何增强3D建模工作流程。"'
- en: '28: Writing a Telegram Bot Plugin'
  id: totrans-1183
  prefs: []
  type: TYPE_NORMAL
  zh: '28: 编写Telegram Bot插件'
- en: 'Prompt:'
  id: totrans-1184
  prefs: []
  type: TYPE_NORMAL
  zh: 'Prompt:'
- en: '"Write a Python script using the Telegram Bot API to create a plugin for scheduling
    group messages. Include examples of handling user commands and integrating with
    external services. Discuss the role of plugins in improving user interaction."'
  id: totrans-1185
  prefs: []
  type: TYPE_NORMAL
  zh: '"编写一个使用Telegram Bot API的Python脚本，创建一个用于安排群组消息的插件。包括处理用户命令和集成外部服务的示例。讨论插件在提高用户交互中的作用。"'
- en: '29: Creating a Visual Studio Plugin'
  id: totrans-1186
  prefs: []
  type: TYPE_NORMAL
  zh: '29: 创建Visual Studio插件'
- en: 'Prompt:'
  id: totrans-1187
  prefs: []
  type: TYPE_NORMAL
  zh: 'Prompt:'
- en: '"Write C# code to create a Visual Studio plugin that provides auto-completion
    for a specific domain language. Include examples of integrating with IntelliSense.
    Discuss how IDE plugins improve productivity for niche programming tasks."'
  id: totrans-1188
  prefs: []
  type: TYPE_NORMAL
  zh: '"编写C#代码创建一个Visual Studio插件，为特定领域语言提供自动完成功能。包括与IntelliSense集成的示例。讨论IDE插件如何提高特定编程任务的生产力。"'
- en: '30: Building a Unity Asset Pipeline Plugin'
  id: totrans-1189
  prefs: []
  type: TYPE_NORMAL
  zh: '30: 构建Unity资产管道插件'
- en: 'Prompt:'
  id: totrans-1190
  prefs: []
  type: TYPE_NORMAL
  zh: 'Prompt:'
- en: '"Write C# code to create a Unity plugin that automates importing and organizing
    assets into predefined folders. Include steps for testing and integrating the
    plugin with existing projects. Discuss how plugins enhance asset management in
    game development."'
  id: totrans-1191
  prefs: []
  type: TYPE_NORMAL
  zh: '"编写C#代码创建一个Unity插件，自动化将资产导入和组织到预定义文件夹中。包括测试和将插件集成到现有项目的步骤。讨论插件如何增强游戏开发中的资产管理。"'
- en: Cybersecurity and Encryption
  id: totrans-1192
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 密码学和加密
- en: In a world where data breaches are commonplace, cybersecurity is more critical
    than ever. Tech advancement has made it easy for us to work, but saving the data
    from breaches has become difficult. This chapter provides prompts that focus on
    building secure applications, implementing encryption, and protecting sensitive
    information from potential threats.
  id: totrans-1193
  prefs: []
  type: TYPE_NORMAL
  zh: 在数据泄露司空见惯的世界里，网络安全比以往任何时候都更加关键。技术进步使我们的工作变得容易，但保护数据免受泄露变得困难。本章提供了专注于构建安全应用程序、实施加密和保护敏感信息免受潜在威胁的提示。
- en: '1: Understanding Cryptography Fundamentals'
  id: totrans-1194
  prefs: []
  type: TYPE_NORMAL
  zh: '1: 理解密码学基础'
- en: 'Prompt:'
  id: totrans-1195
  prefs: []
  type: TYPE_NORMAL
  zh: 'Prompt:'
- en: '"Explain the basic concepts of cryptography, including symmetric and asymmetric
    encryption, hashing, and digital signatures. Provide examples of algorithms used
    in each category and discuss their typical applications in securing data."'
  id: totrans-1196
  prefs: []
  type: TYPE_NORMAL
  zh: '"解释密码学的基本概念，包括对称加密、非对称加密、哈希和数字签名。提供每个类别中使用的算法示例，并讨论它们在保护数据中的典型应用。"'
- en: '2: Implementing AES Encryption in Python'
  id: totrans-1197
  prefs: []
  type: TYPE_NORMAL
  zh: '2: 在Python中实现AES加密'
- en: 'Prompt:'
  id: totrans-1198
  prefs: []
  type: TYPE_NORMAL
  zh: 'Prompt:'
- en: '"Write a Python script to encrypt and decrypt data using the Advanced Encryption
    Standard (AES) algorithm from the pycryptodome library. Include steps for generating
    a secure key, initializing the cipher, and handling padding. Discuss the importance
    of key management in encryption."'
  id: totrans-1199
  prefs: []
  type: TYPE_NORMAL
  zh: '"编写一个Python脚本，使用pycryptodome库中的高级加密标准（AES）算法加密和解密数据。包括生成安全密钥、初始化加密器和处理填充的步骤。讨论密钥管理在加密中的重要性。"'
- en: '3: Secure Password Storage with Hashing'
  id: totrans-1200
  prefs: []
  type: TYPE_NORMAL
  zh: '3: 使用哈希存储安全密码'
- en: 'Prompt:'
  id: totrans-1201
  prefs: []
  type: TYPE_NORMAL
  zh: 'Prompt:'
- en: '"Explain how to securely store passwords using hashing algorithms like bcrypt
    or Argon2\. Write code in [Python/Node.js/etc.] to hash a password and verify
    it during user authentication. Discuss why plain text storage is insecure and
    the role of salts in preventing rainbow table attacks."'
  id: totrans-1202
  prefs: []
  type: TYPE_NORMAL
  zh: '"解释如何使用bcrypt或Argon2等哈希算法安全地存储密码。在[Python/Node.js等]中编写代码以哈希密码并在用户认证过程中验证它。讨论明文存储的不安全性以及盐在防止彩虹表攻击中的作用。"'
- en: '4: Understanding Public Key Infrastructure (PKI)'
  id: totrans-1203
  prefs: []
  type: TYPE_NORMAL
  zh: '4: 理解公钥基础设施（PKI）'
- en: 'Prompt:'
  id: totrans-1204
  prefs: []
  type: TYPE_NORMAL
  zh: 'Prompt:'
- en: '"Describe the components of a Public Key Infrastructure, including certificates,
    certificate authorities (CAs), and trust chains. Discuss how PKI is used to establish
    secure communications over the internet, such as in SSL/TLS protocols."'
  id: totrans-1205
  prefs: []
  type: TYPE_NORMAL
  zh: '"描述公钥基础设施（PKI）的组成部分，包括证书、证书颁发机构（CA）和信任链。讨论PKI如何用于在互联网上建立安全通信，例如在SSL/TLS协议中。"'
- en: '5: Implementing SSL/TLS in Web Applications'
  id: totrans-1206
  prefs: []
  type: TYPE_NORMAL
  zh: '5: 在Web应用程序中实现SSL/TLS'
- en: 'Prompt:'
  id: totrans-1207
  prefs: []
  type: TYPE_NORMAL
  zh: 'Prompt:'
- en: '"Write a guide on how to configure SSL/TLS encryption for a web server using
    [Apache/Nginx/etc.]. Include steps for generating a self-signed certificate, installing
    it, and enforcing HTTPS connections. Discuss the importance of SSL/TLS in protecting
    data in transit."'
  id: totrans-1208
  prefs: []
  type: TYPE_NORMAL
  zh: '"编写指南，说明如何使用[Apache/Nginx等]配置Web服务器的SSL/TLS加密。包括生成自签名证书、安装它并强制执行HTTPS连接的步骤。讨论SSL/TLS在保护传输中的数据的重要性。"'
- en: '6: Secure Coding Practices'
  id: totrans-1209
  prefs: []
  type: TYPE_NORMAL
  zh: '6: 安全编码实践'
- en: 'Prompt:'
  id: totrans-1210
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"List and explain secure coding practices that developers should follow to
    prevent common vulnerabilities like SQL injection, cross-site scripting (XSS),
    and buffer overflows. Provide code examples in [Python/Java/etc.] that demonstrate
    how to mitigate these risks."'
  id: totrans-1211
  prefs: []
  type: TYPE_NORMAL
  zh: '"列出并解释开发者应遵循的确保编码实践，以防止常见的漏洞，如SQL注入、跨站脚本（XSS）和缓冲区溢出。请提供[Python/Java等]代码示例，展示如何减轻这些风险。"'
- en: '7: Understanding the OWASP Top Ten'
  id: totrans-1212
  prefs: []
  type: TYPE_NORMAL
  zh: '7: 理解OWASP Top Ten'
- en: 'Prompt:'
  id: totrans-1213
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Explain the OWASP Top Ten security risks for web applications. For each risk,
    provide a brief description and suggest mitigation strategies. Discuss how awareness
    of these risks can improve the security posture of web applications."'
  id: totrans-1214
  prefs: []
  type: TYPE_NORMAL
  zh: '"解释OWASP Top Ten针对Web应用程序的安全风险。针对每个风险，提供简要描述并建议缓解策略。讨论对这些风险的意识如何提高Web应用程序的安全态势。"'
- en: '8: Implementing Two-Factor Authentication (2FA)'
  id: totrans-1215
  prefs: []
  type: TYPE_NORMAL
  zh: '8: 实现双因素认证（2FA）'
- en: 'Prompt:'
  id: totrans-1216
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Write code in [Python/Node.js/etc.] to implement two-factor authentication
    in a web application. Include steps for integrating with an authentication app
    like Google Authenticator, generating and verifying tokens. Discuss how 2FA enhances
    account security."'
  id: totrans-1217
  prefs: []
  type: TYPE_NORMAL
  zh: '"使用[Python/Node.js等]编写代码，在Web应用程序中实现双因素认证。包括与认证应用（如Google Authenticator）集成、生成和验证令牌的步骤。讨论2FA如何增强账户安全性。"'
- en: '9: Encrypting Data at Rest in Databases'
  id: totrans-1218
  prefs: []
  type: TYPE_NORMAL
  zh: '9: 在数据库中加密静态数据'
- en: 'Prompt:'
  id: totrans-1219
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Explain the methods for encrypting data at rest in databases. Provide examples
    of using Transparent Data Encryption (TDE) in SQL databases or field-level encryption
    in NoSQL databases like MongoDB. Discuss the trade-offs between security and performance."'
  id: totrans-1220
  prefs: []
  type: TYPE_NORMAL
  zh: '"解释在数据库中加密静态数据的方法。提供使用SQL数据库中的透明数据加密（TDE）或NoSQL数据库（如MongoDB）中的字段级加密的示例。讨论安全与性能之间的权衡。"'
- en: '10: Understanding Network Security Protocols'
  id: totrans-1221
  prefs: []
  type: TYPE_NORMAL
  zh: '10: 理解网络安全协议'
- en: 'Prompt:'
  id: totrans-1222
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Describe common network security protocols such as IPsec, SSL/TLS, SSH, and
    HTTPS. Explain how each protocol works to secure data transmission over networks,
    and provide examples of their typical use cases."'
  id: totrans-1223
  prefs: []
  type: TYPE_NORMAL
  zh: '"描述常见的网络安全协议，如IPsec、SSL/TLS、SSH和HTTPS。解释每个协议如何工作以在网络中确保数据传输的安全，并提供它们典型用例的示例。"'
- en: '11: Implementing Secure API Authentication'
  id: totrans-1224
  prefs: []
  type: TYPE_NORMAL
  zh: '11: 实现安全的API认证'
- en: 'Prompt:'
  id: totrans-1225
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Write code to implement secure API authentication using OAuth 2.0 or JWT (JSON
    Web Tokens). Include examples of issuing tokens, validating them, and refreshing
    expired tokens. Discuss best practices for securing APIs against unauthorized
    access."'
  id: totrans-1226
  prefs: []
  type: TYPE_NORMAL
  zh: '"编写代码，使用OAuth 2.0或JWT（JSON Web令牌）实现安全的API认证。包括发行令牌、验证它们和刷新过期令牌的示例。讨论保护API免受未经授权访问的最佳实践。"'
- en: '12: Understanding Firewalls and Intrusion Detection Systems'
  id: totrans-1227
  prefs: []
  type: TYPE_NORMAL
  zh: '12: 理解防火墙和入侵检测系统'
- en: 'Prompt:'
  id: totrans-1228
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Explain the role of firewalls and intrusion detection/prevention systems (IDS/IPS)
    in network security. Describe how they monitor and control incoming and outgoing
    network traffic based on security rules, and discuss their importance in defending
    against network attacks."'
  id: totrans-1229
  prefs: []
  type: TYPE_NORMAL
  zh: '"解释防火墙和入侵检测/预防系统（IDS/IPS）在网络安全中的作用。描述它们如何根据安全规则监控和控制进出网络流量，并讨论它们在防御网络攻击中的重要性。"'
- en: '13: Secure File Transfer with SFTP'
  id: totrans-1230
  prefs: []
  type: TYPE_NORMAL
  zh: '13: 使用SFTP进行安全文件传输'
- en: 'Prompt:'
  id: totrans-1231
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Write a guide on how to securely transfer files using SFTP (Secure File Transfer
    Protocol). Include examples of setting up an SFTP server, configuring user permissions,
    and using command-line tools or software clients to transfer files securely."'
  id: totrans-1232
  prefs: []
  type: TYPE_NORMAL
  zh: '"编写指南，说明如何使用SFTP（安全文件传输协议）安全地传输文件。包括设置SFTP服务器、配置用户权限和使用命令行工具或软件客户端安全传输文件的示例。"'
- en: '14: Implementing Role-Based Access Control (RBAC)'
  id: totrans-1233
  prefs: []
  type: TYPE_NORMAL
  zh: '14: 实现基于角色的访问控制（RBAC）'
- en: 'Prompt:'
  id: totrans-1234
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Explain how to implement role-based access control in an application. Provide
    code examples in [Python/Node.js/etc.] showing how to assign roles to users and
    restrict access to resources based on those roles. Discuss the importance of the
    principle of least privilege."'
  id: totrans-1235
  prefs: []
  type: TYPE_NORMAL
  zh: '"解释如何在应用程序中实现基于角色的访问控制。提供[Python/Node.js等]代码示例，展示如何分配角色给用户并根据这些角色限制对资源的访问。讨论最小权限原则的重要性。"'
- en: '15: Understanding Common Encryption Algorithms'
  id: totrans-1236
  prefs: []
  type: TYPE_NORMAL
  zh: '15: 理解常见加密算法'
- en: 'Prompt:'
  id: totrans-1237
  prefs: []
  type: TYPE_NORMAL
  zh: 'Prompt:'
- en: '"Compare and contrast common encryption algorithms such as AES, RSA, DES, and
    ECC. Discuss their key features, security levels, and typical use cases. Explain
    why some algorithms are preferred over others in modern applications."'
  id: totrans-1238
  prefs: []
  type: TYPE_NORMAL
  zh: '"比较和对比常见的加密算法，如 AES、RSA、DES 和 ECC。讨论它们的关键特性、安全级别和典型用例。解释为什么某些算法在现代应用中比其他算法更受欢迎。"'
- en: '16: Securing Communications with VPNs'
  id: totrans-1239
  prefs: []
  type: TYPE_NORMAL
  zh: '16: 使用 VPN 保护通信'
- en: 'Prompt:'
  id: totrans-1240
  prefs: []
  type: TYPE_NORMAL
  zh: 'Prompt:'
- en: '"Describe how Virtual Private Networks (VPNs) work to secure communications
    over public networks. Explain the differences between site-to-site and remote
    access VPNs, and discuss the protocols used (e.g., IPsec, OpenVPN)."'
  id: totrans-1241
  prefs: []
  type: TYPE_NORMAL
  zh: '"描述虚拟专用网络（VPN）如何在工作公共网络上保护通信。解释站点到站点和远程访问 VPN 的区别，并讨论使用的协议（例如，IPsec、OpenVPN）。"'
- en: '17: Implementing Data Integrity Checks with Hash Functions'
  id: totrans-1242
  prefs: []
  type: TYPE_NORMAL
  zh: '17: 使用哈希函数实施数据完整性检查'
- en: 'Prompt:'
  id: totrans-1243
  prefs: []
  type: TYPE_NORMAL
  zh: 'Prompt:'
- en: '"Write code to generate and verify data integrity checks using hash functions
    like SHA-256\. Include examples in [Python/Java/etc.] of how to detect if data
    has been altered. Discuss the role of hashing in ensuring data integrity."'
  id: totrans-1244
  prefs: []
  type: TYPE_NORMAL
  zh: '"编写代码以使用哈希函数（如 SHA-256）生成和验证数据完整性检查。包括在 [Python/Java 等] 中的示例，说明如何检测数据是否已被篡改。讨论哈希在确保数据完整性中的作用。"'
- en: '18: Understanding Social Engineering Attacks'
  id: totrans-1245
  prefs: []
  type: TYPE_NORMAL
  zh: '18: 理解社会工程学攻击'
- en: 'Prompt:'
  id: totrans-1246
  prefs: []
  type: TYPE_NORMAL
  zh: 'Prompt:'
- en: '"Explain what social engineering attacks are and how they compromise security.
    Provide examples of common attacks like phishing, pretexting, and baiting. Discuss
    strategies for educating users and preventing such attacks."'
  id: totrans-1247
  prefs: []
  type: TYPE_NORMAL
  zh: '"解释社会工程学攻击是什么以及它们如何破坏安全性。提供常见攻击的示例，如钓鱼、预设话术和诱饵。讨论教育用户和预防此类攻击的策略。"'
- en: '19: Implementing Security Headers in Web Applications'
  id: totrans-1248
  prefs: []
  type: TYPE_NORMAL
  zh: '19: 在 Web 应用程序中实施安全头'
- en: 'Prompt:'
  id: totrans-1249
  prefs: []
  type: TYPE_NORMAL
  zh: 'Prompt:'
- en: '"Write a guide on configuring security headers (e.g., Content-Security-Policy,
    X-Frame-Options, X-Content-Type-Options) in web applications to protect against
    common vulnerabilities. Include examples for [Apache/Nginx/etc.] and explain the
    purpose of each header."'
  id: totrans-1250
  prefs: []
  type: TYPE_NORMAL
  zh: '"编写一个指南，介绍如何在 Web 应用程序中配置安全头（例如，内容安全策略 Content-Security-Policy、X-Frame-Options、X-Content-Type-Options）以防止常见漏洞。包括
    [Apache/Nginx 等] 的示例，并解释每个头的目的。"'
- en: '20: Secure Software Development Lifecycle (SSDLC)'
  id: totrans-1251
  prefs: []
  type: TYPE_NORMAL
  zh: '20: 安全软件开发生命周期（SSDLC）'
- en: 'Prompt:'
  id: totrans-1252
  prefs: []
  type: TYPE_NORMAL
  zh: 'Prompt:'
- en: '"Describe the Secure Software Development Lifecycle and its phases. Discuss
    how integrating security practices into each phase of development can lead to
    more secure applications. Provide examples of activities like threat modeling,
    code reviews, and security testing."'
  id: totrans-1253
  prefs: []
  type: TYPE_NORMAL
  zh: '"描述安全软件开发生命周期及其阶段。讨论如何将安全实践整合到开发的每个阶段，以创建更安全的应用程序。提供威胁建模、代码审查和安全测试等活动示例。"'
- en: '21: Understanding Zero Trust Security Models'
  id: totrans-1254
  prefs: []
  type: TYPE_NORMAL
  zh: '21: 理解零信任安全模型'
- en: 'Prompt:'
  id: totrans-1255
  prefs: []
  type: TYPE_NORMAL
  zh: 'Prompt:'
- en: '"Explain the principles of a Zero Trust security model. Discuss how it differs
    from traditional perimeter-based security, and describe how organizations can
    implement Zero Trust architectures to enhance security."'
  id: totrans-1256
  prefs: []
  type: TYPE_NORMAL
  zh: '"解释零信任安全模型的原则。讨论它与基于边界的传统安全模型的区别，并描述组织如何实施零信任架构以增强安全性。"'
- en: '22: Implementing Logging and Monitoring for Security'
  id: totrans-1257
  prefs: []
  type: TYPE_NORMAL
  zh: '22: 实施日志和监控以保障安全'
- en: 'Prompt:'
  id: totrans-1258
  prefs: []
  type: TYPE_NORMAL
  zh: 'Prompt:'
- en: '"Write a guide on setting up logging and monitoring to detect security incidents.
    Include examples of configuring logs in applications, using tools like ELK Stack
    or Splunk, and setting up alerts for suspicious activities. Discuss the importance
    of timely detection and response."'
  id: totrans-1259
  prefs: []
  type: TYPE_NORMAL
  zh: '"编写一个指南，介绍如何设置日志和监控以检测安全事件。包括在应用程序中配置日志的示例，使用 ELK Stack 或 Splunk 等工具，以及设置可疑活动的警报。讨论及时检测和响应的重要性。"'
- en: '23: Secure Email Communication with PGP/GPG'
  id: totrans-1260
  prefs: []
  type: TYPE_NORMAL
  zh: '23: 使用 PGP/GPG 进行安全电子邮件通信'
- en: 'Prompt:'
  id: totrans-1261
  prefs: []
  type: TYPE_NORMAL
  zh: 'Prompt:'
- en: '"Explain how to use PGP/GPG for secure email communication. Include steps for
    generating key pairs, sharing public keys, encrypting and decrypting messages.
    Discuss the challenges and best practices of using PGP/GPG in everyday communication."'
  id: totrans-1262
  prefs: []
  type: TYPE_NORMAL
  zh: '"解释如何使用 PGP/GPG 进行安全电子邮件通信。包括生成密钥对、共享公钥、加密和解密消息的步骤。讨论在日常通信中使用 PGP/GPG 的挑战和最佳实践。"'
- en: '24: Understanding Denial-of-Service (DoS) Attacks'
  id: totrans-1263
  prefs: []
  type: TYPE_NORMAL
  zh: '24: 理解拒绝服务（DoS）攻击'
- en: 'Prompt:'
  id: totrans-1264
  prefs: []
  type: TYPE_NORMAL
  zh: 'Prompt:'
- en: '"Describe what Denial-of-Service attacks are and how they can affect network
    services. Discuss common types of DoS attacks, such as SYN floods and amplification
    attacks, and explain mitigation strategies to protect against them."'
  id: totrans-1265
  prefs: []
  type: TYPE_NORMAL
  zh: '"描述拒绝服务（DoS）攻击是什么以及它们如何影响网络服务。讨论常见的 DoS 攻击类型，如 SYN 洪水攻击和放大攻击，并解释缓解策略以保护免受其影响。"'
- en: '25: Implementing Secure Coding in Mobile Applications'
  id: totrans-1266
  prefs: []
  type: TYPE_NORMAL
  zh: '25: 在移动应用程序中实施安全编码'
- en: 'Prompt:'
  id: totrans-1267
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Write guidelines for implementing secure coding practices in mobile app development
    for [Android/iOS]. Discuss how to handle sensitive data, manage permissions, and
    protect against common vulnerabilities specific to mobile platforms."'
  id: totrans-1268
  prefs: []
  type: TYPE_NORMAL
  zh: '"编写在 [Android/iOS] 移动应用开发中实施安全编码实践的指南。讨论如何处理敏感数据、管理权限以及保护针对移动平台常见的漏洞。"'
- en: '26: Understanding Security Token Services (STS)'
  id: totrans-1269
  prefs: []
  type: TYPE_NORMAL
  zh: '26: 理解安全令牌服务（STS）'
- en: 'Prompt:'
  id: totrans-1270
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Explain what Security Token Services are and how they facilitate secure authentication
    and authorization. Discuss how STS works with protocols like SAML and OAuth, and
    provide examples of implementing STS in enterprise environments."'
  id: totrans-1271
  prefs: []
  type: TYPE_NORMAL
  zh: '"解释安全令牌服务（Security Token Services，简称 STS）是什么以及它们如何促进安全的身份验证和授权。讨论 STS 如何与 SAML
    和 OAuth 等协议一起工作，并提供在企业环境中实现 STS 的示例。"'
- en: '27: Conducting a Security Risk Assessment'
  id: totrans-1272
  prefs: []
  type: TYPE_NORMAL
  zh: '27: 进行安全风险评估'
- en: 'Prompt:'
  id: totrans-1273
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Describe the process of conducting a security risk assessment for an organization.
    Include steps like identifying assets, threats, vulnerabilities, and calculating
    risk levels. Discuss how risk assessments inform security planning and resource
    allocation."'
  id: totrans-1274
  prefs: []
  type: TYPE_NORMAL
  zh: '"描述对一个组织进行安全风险评估的过程。包括识别资产、威胁、漏洞和计算风险等级的步骤。讨论风险评估如何指导安全规划和资源分配。"'
- en: '28: Implementing Secure Session Management'
  id: totrans-1275
  prefs: []
  type: TYPE_NORMAL
  zh: '28: 实施安全的会话管理'
- en: 'Prompt:'
  id: totrans-1276
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Write code examples demonstrating secure session management in web applications.
    Include practices like using secure, HttpOnly cookies, regenerating session IDs,
    and proper session termination. Discuss the risks of poor session management."'
  id: totrans-1277
  prefs: []
  type: TYPE_NORMAL
  zh: '"编写代码示例，展示在 Web 应用程序中实现安全的会话管理。包括使用安全的 HttpOnly 饼干、重新生成会话 ID 和正确终止会话等实践。讨论不良会话管理的风险。"'
- en: '29: Understanding Malware Types and Protection'
  id: totrans-1278
  prefs: []
  type: TYPE_NORMAL
  zh: '29: 理解恶意软件类型和保护'
- en: 'Prompt:'
  id: totrans-1279
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"List and describe different types of malware, such as viruses, worms, trojan
    horses, ransomware, and spyware. Discuss how malware spreads and provide strategies
    for individuals and organizations to protect against malware infections."'
  id: totrans-1280
  prefs: []
  type: TYPE_NORMAL
  zh: '"列出并描述不同类型的恶意软件，如病毒、蠕虫、特洛伊木马、勒索软件和间谍软件。讨论恶意软件的传播方式，并为个人和组织提供防止恶意软件感染的战略。"'
- en: '30: Ethical Hacking and Penetration Testing Fundamentals'
  id: totrans-1281
  prefs: []
  type: TYPE_NORMAL
  zh: '30: 道德黑客和渗透测试基础'
- en: 'Prompt:'
  id: totrans-1282
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Explain the role of ethical hacking and penetration testing in cybersecurity.
    Discuss the legal and ethical considerations, the methodologies used (e.g., reconnaissance,
    scanning, exploitation), and how penetration testing helps improve security defenses."'
  id: totrans-1283
  prefs: []
  type: TYPE_NORMAL
  zh: '"解释道德黑客和渗透测试在网络安全中的作用。讨论法律和伦理考量，使用的方法（例如，侦察、扫描、利用），以及渗透测试如何帮助提高安全防御能力。"'
- en: Performance Optimization
  id: totrans-1284
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 性能优化
- en: Due to rising competition, and complexities, it has become difficult for us
    to deliver on-time results, that’s why we need performance optimization. Performance
    optimization is about delivering more with less. In this chapter, I share prompts
    to help you analyze, optimize, and enhance the efficiency of your code. Whether
    it’s reducing load times or improving computational efficiency, these prompts
    will guide you every step of the way.
  id: totrans-1285
  prefs: []
  type: TYPE_NORMAL
  zh: 由于竞争加剧和复杂性增加，我们难以按时交付结果，这就是为什么我们需要性能优化。性能优化是关于用更少的资源做更多的事情。在本章中，我分享了一些提示，以帮助您分析、优化和提升代码的效率。无论是减少加载时间还是提高计算效率，这些提示都会在每一步引导您。
- en: '1: Understanding the Basics of Performance Optimization'
  id: totrans-1286
  prefs: []
  type: TYPE_NORMAL
  zh: '1: 理解性能优化的基础知识'
- en: 'Prompt:'
  id: totrans-1287
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Explain the concept of performance optimization in software development. Discuss
    why optimization is essential for scalability, user experience, and cost efficiency.
    Provide examples of scenarios where performance improvements had a significant
    impact."'
  id: totrans-1288
  prefs: []
  type: TYPE_NORMAL
  zh: '"解释软件开发中性能优化的概念。讨论为什么优化对于可扩展性、用户体验和成本效率至关重要。提供性能改进对场景产生重大影响的例子。"'
- en: '2: Optimizing SQL Queries'
  id: totrans-1289
  prefs: []
  type: TYPE_NORMAL
  zh: '2: 优化 SQL 查询'
- en: 'Prompt:'
  id: totrans-1290
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Write SQL queries to optimize a report generation process by using indexing,
    avoiding SELECT *, and reducing joins. Include examples of measuring query performance
    with EXPLAIN plans and analyzing results. Discuss best practices for writing efficient
    SQL queries."'
  id: totrans-1291
  prefs: []
  type: TYPE_NORMAL
  zh: '"编写 SQL 查询，通过使用索引、避免使用 SELECT * 和减少连接来优化报告生成过程。包括使用 EXPLAIN 计划测量查询性能和分析结果的例子。讨论编写高效
    SQL 查询的最佳实践。"'
- en: '3: Reducing Web Page Load Times'
  id: totrans-1292
  prefs: []
  type: TYPE_NORMAL
  zh: '3: 减少网页加载时间'
- en: 'Prompt:'
  id: totrans-1293
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Write a step-by-step guide to reduce the load time of a web page. Include
    techniques like minifying CSS and JavaScript, optimizing images, and leveraging
    browser caching. Discuss how performance impacts SEO and user retention."'
  id: totrans-1294
  prefs: []
  type: TYPE_NORMAL
  zh: '"编写一个分步指南，减少网页的加载时间。包括最小化CSS和JavaScript、优化图像和利用浏览器缓存等技术。讨论性能如何影响SEO和用户保留率。"'
- en: '4: Improving API Response Times'
  id: totrans-1295
  prefs: []
  type: TYPE_NORMAL
  zh: '4: 提高API响应时间'
- en: 'Prompt:'
  id: totrans-1296
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Write a Python/Node.js script to improve API response times by implementing
    caching (e.g., Redis) and pagination. Include examples of measuring response times
    before and after optimization. Discuss the role of caching in performance improvement."'
  id: totrans-1297
  prefs: []
  type: TYPE_NORMAL
  zh: '"编写Python/Node.js脚本，通过实现缓存（例如Redis）和分页来提高API响应时间。包括优化前后响应时间的示例。讨论缓存在性能提升中的作用。"'
- en: '5: Optimizing Database Performance'
  id: totrans-1298
  prefs: []
  type: TYPE_NORMAL
  zh: '5: 优化数据库性能'
- en: 'Prompt:'
  id: totrans-1299
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Write a guide on optimizing database performance by normalizing tables, implementing
    indexing strategies, and partitioning large datasets. Include SQL examples and
    discuss the trade-offs between normalization and denormalization."'
  id: totrans-1300
  prefs: []
  type: TYPE_NORMAL
  zh: '"编写一个指南，通过规范化表、实现索引策略和分区大数据集来优化数据库性能。包括SQL示例，并讨论规范化和反规范化的权衡。"'
- en: '6: Identifying Performance Bottlenecks'
  id: totrans-1301
  prefs: []
  type: TYPE_NORMAL
  zh: '6: 识别性能瓶颈'
- en: 'Prompt:'
  id: totrans-1302
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Write a guide to identify performance bottlenecks in an application using
    tools like APM (Application Performance Monitoring) or profiling libraries. Include
    examples of analyzing CPU usage, memory consumption, and disk I/O. Discuss how
    bottlenecks impact scalability."'
  id: totrans-1303
  prefs: []
  type: TYPE_NORMAL
  zh: '"编写一个指南，使用APM（应用程序性能监控）或分析库等工具来识别应用程序中的性能瓶颈。包括分析CPU使用、内存消耗和磁盘I/O的示例。讨论瓶颈如何影响可扩展性。"'
- en: '7: Improving Front-End Performance'
  id: totrans-1304
  prefs: []
  type: TYPE_NORMAL
  zh: '7: 提高前端性能'
- en: 'Prompt:'
  id: totrans-1305
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Write JavaScript code to optimize front-end performance by implementing lazy
    loading of images and preloading critical assets. Include examples of measuring
    improvements using browser developer tools. Discuss how these optimizations improve
    user experience."'
  id: totrans-1306
  prefs: []
  type: TYPE_NORMAL
  zh: '"编写JavaScript代码，通过实现图像的懒加载和关键资源的预加载来优化前端性能。包括使用浏览器开发者工具测量改进的示例。讨论这些优化如何提高用户体验。"'
- en: '8: Parallelizing Tasks for Performance'
  id: totrans-1307
  prefs: []
  type: TYPE_NORMAL
  zh: '8: 并行化任务以提高性能'
- en: 'Prompt:'
  id: totrans-1308
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Write Python code to parallelize computationally intensive tasks using multiprocessing.
    Include examples of splitting work across multiple processes and aggregating results.
    Discuss the challenges of parallelism and when to use it effectively."'
  id: totrans-1309
  prefs: []
  type: TYPE_NORMAL
  zh: '"编写Python代码，使用多进程并行化计算密集型任务。包括在多个进程中分配工作和汇总结果的示例。讨论并行化的挑战以及何时有效使用它。"'
- en: '9: Reducing Memory Usage'
  id: totrans-1310
  prefs: []
  type: TYPE_NORMAL
  zh: '9: 减少内存使用'
- en: 'Prompt:'
  id: totrans-1311
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Write a guide on reducing memory usage in a Python/Java application by using
    efficient data structures, avoiding memory leaks, and reusing objects. Include
    examples of measuring memory usage before and after optimization."'
  id: totrans-1312
  prefs: []
  type: TYPE_NORMAL
  zh: '"编写一个指南，通过使用高效的数据结构、避免内存泄漏和重用对象来减少Python/Java应用程序的内存使用。包括优化前后内存使用的示例。"'
- en: '10: Scaling Web Applications'
  id: totrans-1313
  prefs: []
  type: TYPE_NORMAL
  zh: '10: 扩展Web应用程序'
- en: 'Prompt:'
  id: totrans-1314
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Write a step-by-step guide to scale a web application horizontally using load
    balancers and distributed architecture. Include examples of deploying additional
    instances and balancing traffic. Discuss the benefits and challenges of horizontal
    scaling."'
  id: totrans-1315
  prefs: []
  type: TYPE_NORMAL
  zh: '"编写一个分步指南，使用负载均衡器和分布式架构水平扩展Web应用程序。包括部署额外实例和平衡流量的示例。讨论水平扩展的好处和挑战。"'
- en: '11: Using CDN for Faster Content Delivery'
  id: totrans-1316
  prefs: []
  type: TYPE_NORMAL
  zh: '11: 使用CDN实现更快的内容分发'
- en: 'Prompt:'
  id: totrans-1317
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Explain how Content Delivery Networks (CDNs) improve website performance.
    Write a guide on integrating a CDN for static assets and analyzing the impact
    on load times. Discuss scenarios where CDNs provide the most benefit."'
  id: totrans-1318
  prefs: []
  type: TYPE_NORMAL
  zh: '"解释内容分发网络（CDN）如何提高网站性能。编写一个关于集成CDN以优化静态资产和分析加载时间影响的指南。讨论CDN在哪些场景下提供最大利益。"'
- en: '12: Optimizing JavaScript Execution'
  id: totrans-1319
  prefs: []
  type: TYPE_NORMAL
  zh: '12: 优化JavaScript执行'
- en: 'Prompt:'
  id: totrans-1320
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Write JavaScript code to optimize execution by using debouncing and throttling
    for event listeners. Include examples of optimizing scroll and input events. Discuss
    how these techniques reduce unnecessary computations."'
  id: totrans-1321
  prefs: []
  type: TYPE_NORMAL
  zh: '"编写JavaScript代码以优化执行，通过使用防抖和节流技术来优化事件监听器。包括优化滚动和输入事件的示例。讨论这些技术如何减少不必要的计算。"'
- en: '13: Performance Testing with JMeter'
  id: totrans-1322
  prefs: []
  type: TYPE_NORMAL
  zh: '13: 使用JMeter进行性能测试'
- en: 'Prompt:'
  id: totrans-1323
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Write a step-by-step guide to use JMeter for testing the performance of a
    web application under varying loads. Include examples of setting up test plans,
    running tests, and analyzing results. Discuss how performance testing informs
    optimization strategies."'
  id: totrans-1324
  prefs: []
  type: TYPE_NORMAL
  zh: '"编写一个逐步指南，使用JMeter测试Web应用在不同负载下的性能。包括设置测试计划、运行测试和分析结果的示例。讨论性能测试如何指导优化策略。"'
- en: '14: Improving Mobile App Performance'
  id: totrans-1325
  prefs: []
  type: TYPE_NORMAL
  zh: '14: 提高移动应用性能'
- en: 'Prompt:'
  id: totrans-1326
  prefs: []
  type: TYPE_NORMAL
  zh: 'Prompt:'
- en: '"Write a guide on optimizing mobile app performance by reducing network requests,
    compressing resources, and optimizing animations. Include examples for [Android/iOS]
    and discuss the impact of performance on user retention."'
  id: totrans-1327
  prefs: []
  type: TYPE_NORMAL
  zh: '"编写一份指南，介绍如何通过减少网络请求、压缩资源和优化动画来优化移动应用性能。包括[Android/iOS]的示例，并讨论性能对用户留存率的影响。"'
- en: '15: Leveraging Database Indexing'
  id: totrans-1328
  prefs: []
  type: TYPE_NORMAL
  zh: '15: 利用数据库索引'
- en: 'Prompt:'
  id: totrans-1329
  prefs: []
  type: TYPE_NORMAL
  zh: 'Prompt:'
- en: '"Write SQL code to create and analyze indexes on a table to optimize query
    performance. Include examples of measuring query execution times with and without
    indexes. Discuss the scenarios where indexing provides the most benefit."'
  id: totrans-1330
  prefs: []
  type: TYPE_NORMAL
  zh: '"编写SQL代码，在表上创建和分析索引以优化查询性能。包括在有索引和无索引的情况下测量查询执行时间的示例。讨论索引提供最大利益的场景。"'
- en: '16: Profiling Python Code'
  id: totrans-1331
  prefs: []
  type: TYPE_NORMAL
  zh: '16: 分析Python代码'
- en: 'Prompt:'
  id: totrans-1332
  prefs: []
  type: TYPE_NORMAL
  zh: 'Prompt:'
- en: '"Write a Python script to identify performance bottlenecks using the cProfile
    module. Include examples of profiling functions and analyzing the output to optimize
    code execution. Discuss how profiling aids in targeted optimization."'
  id: totrans-1333
  prefs: []
  type: TYPE_NORMAL
  zh: '"编写一个Python脚本，使用cProfile模块来识别性能瓶颈。包括分析函数和输出以优化代码执行的示例。讨论如何通过分析帮助进行有针对性的优化。"'
- en: '17: Optimizing E-Commerce Checkout Process'
  id: totrans-1334
  prefs: []
  type: TYPE_NORMAL
  zh: '17: 优化电子商务结账流程'
- en: 'Prompt:'
  id: totrans-1335
  prefs: []
  type: TYPE_NORMAL
  zh: 'Prompt:'
- en: '"Write a guide to optimize the checkout process of an e-commerce application
    by simplifying form inputs, enabling autofill, and minimizing server calls. Discuss
    how an optimized checkout process reduces cart abandonment."'
  id: totrans-1336
  prefs: []
  type: TYPE_NORMAL
  zh: '"编写一份指南，介绍如何通过简化表单输入、启用自动填充和最小化服务器调用来优化电子商务应用的结账流程。讨论优化结账流程如何减少购物车放弃率。"'
- en: '18: Reducing Latency in Distributed Systems'
  id: totrans-1337
  prefs: []
  type: TYPE_NORMAL
  zh: '18: 降低分布式系统中的延迟'
- en: 'Prompt:'
  id: totrans-1338
  prefs: []
  type: TYPE_NORMAL
  zh: 'Prompt:'
- en: '"Explain how to reduce latency in distributed systems by using techniques like
    edge computing, caching, and optimizing communication protocols. Include examples
    of measuring and minimizing latency in a microservices architecture."'
  id: totrans-1339
  prefs: []
  type: TYPE_NORMAL
  zh: '"解释如何通过使用边缘计算、缓存和优化通信协议等技术来降低分布式系统的延迟。包括在微服务架构中测量和最小化延迟的示例。"'
- en: '19: Improving Query Performance with Partitioning'
  id: totrans-1340
  prefs: []
  type: TYPE_NORMAL
  zh: '19: 通过分区提高查询性能'
- en: 'Prompt:'
  id: totrans-1341
  prefs: []
  type: TYPE_NORMAL
  zh: 'Prompt:'
- en: '"Write SQL code to partition a large database table by range or hash to improve
    query performance. Include examples of querying partitioned tables and discuss
    how partitioning handles large datasets efficiently."'
  id: totrans-1342
  prefs: []
  type: TYPE_NORMAL
  zh: '"编写SQL代码，通过范围或散列分区来分割大型数据库表以提高查询性能。包括查询分区表的示例，并讨论分区如何有效地处理大型数据集。"'
- en: '20: Analyzing and Reducing Network Traffic'
  id: totrans-1343
  prefs: []
  type: TYPE_NORMAL
  zh: '20: 分析和减少网络流量'
- en: 'Prompt:'
  id: totrans-1344
  prefs: []
  type: TYPE_NORMAL
  zh: 'Prompt:'
- en: '"Write a guide on reducing network traffic for a web application by compressing
    responses with Gzip, using HTTP/2, and reducing API payload sizes. Include tools
    for measuring network traffic and analyzing improvements."'
  id: totrans-1345
  prefs: []
  type: TYPE_NORMAL
  zh: '"编写一份指南，介绍如何通过使用Gzip压缩响应、采用HTTP/2以及减少API有效负载大小来降低Web应用的网络流量。包括用于测量网络流量和分析改进的工具。"'
- en: '21: Optimizing Back-End Algorithms'
  id: totrans-1346
  prefs: []
  type: TYPE_NORMAL
  zh: '21: 优化后端算法'
- en: 'Prompt:'
  id: totrans-1347
  prefs: []
  type: TYPE_NORMAL
  zh: 'Prompt:'
- en: '"Write Python/Java code to optimize a back-end algorithm by reducing its time
    complexity from O(n^2) to O(n log n). Include examples of analyzing the performance
    impact and discuss the importance of algorithmic efficiency in back-end systems."'
  id: totrans-1348
  prefs: []
  type: TYPE_NORMAL
  zh: '"编写Python/Java代码，通过将算法的时间复杂度从O(n^2)降低到O(n log n)来优化后端算法。包括分析性能影响和讨论算法效率在后端系统中的重要性。"'
- en: '22: Using Message Queues for Scalability'
