- en: 1.3 Overview of GPT-4 Architecture
  id: totrans-129
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 1.3 GPT-4架构概述
- en: '![image](d2d_images/chapter_title_below.png)'
  id: totrans-130
  prefs: []
  type: TYPE_IMG
  zh: '![image](d2d_images/chapter_title_below.png)'
- en: Architecture and Scale
  id: totrans-131
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 架构和规模
- en: GPT-4, the latest iteration, builds upon the foundation laid by its predecessors.
    While the exact number of parameters in GPT-4 has not been disclosed(*), it is
    expected to surpass GPT-3 significantly, leveraging even more data and computational
    power. The architecture retains the core principles of Transformers while incorporating
    refinements and optimizations to enhance performance.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: GPT-4，作为最新的迭代版本，建立在前辈的基础上。尽管GPT-4的确切参数数量尚未公开(*)，但预计将显著超过GPT-3，利用更多的数据和计算能力。该架构保留了Transformer的核心原则，同时融入了改进和优化以提高性能。
- en: '![Lightbulb outline](d2d_images/image017.png)^(The number of parameters in
    GPT4 would likely be in the range of 500 billion to 1 trillion parameters.)'
  id: totrans-133
  prefs: []
  type: TYPE_IMG
  zh: '![Lightbulb outline](d2d_images/image017.png)^(GPT4的参数数量可能在大约500亿到1万亿参数的范围内。)'
- en: Training and Data
  id: totrans-134
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 训练和数据
- en: GPT-4's training involves exposure to an even larger and more diverse dataset
    than GPT-3\. This dataset includes a wide array of text sources, enabling the
    model to acquire a broad and nuanced understanding of language. The training process
    is computationally intensive, requiring advanced hardware and significant energy
    resources.
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: GPT-4的训练涉及接触比GPT-3更大、更多样化的数据集。这个数据集包括广泛的文本来源，使模型能够获得广泛而细腻的语言理解。训练过程计算密集，需要先进的硬件和大量的能源资源。
- en: Capabilities and Applications
  id: totrans-136
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 能力和应用
- en: GPT-4 enhances the capabilities demonstrated by GPT-3, offering improvements
    in contextual understanding, coherence, and versatility. It can generate highly
    sophisticated text, engage in more natural and meaningful conversations, and perform
    complex tasks across various domains. Applications range from customer support
    and content creation to programming assistance and educational tools.
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: GPT-4增强了GPT-3所展示的能力，在上下文理解、连贯性和多功能性方面有所改进。它可以生成高度复杂的文本，进行更自然、更有意义的对话，并在各个领域执行复杂任务。应用范围从客户支持、内容创作到编程辅助和教育工具。
