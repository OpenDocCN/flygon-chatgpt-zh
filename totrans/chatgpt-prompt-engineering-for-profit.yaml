    ****w**ay**, ****w**e** ****enco**urag**e ****t**he** ****u**se** ****o**f** ****pu**bli**c
    ****tran**spor**t ****a**nd**, ****a**t** ****t**he** ****sa**me** ****ti**me**,
    ****of**fer** ****a**** ****vi**abl**e ****sol**utio**n ****f**or** ****ri**de**-****hai**lin**g
    ****dri**ver**s. "'
  id: totrans-949
  prefs: []
  type: TYPE_NORMAL
  zh: '**共识构建**："**我们可以增加公交路线数量，并为骑手司机提供使用混合动力或电动汽车的激励措施。这样，我们既鼓励使用公共交通，同时为骑手司机提供可行的解决方案**。"'
