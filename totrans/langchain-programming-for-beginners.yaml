- en: The next step is to include a requirements.txt file in the project folder.
  id: totrans-1603
  prefs: []
  type: TYPE_NORMAL
  zh: 下一步是将 requirements.txt 文件包含在项目文件夹中。
- en: This file will be used by Streamlit to install the dependencies needed to run
    the application.
  id: totrans-1604
  prefs: []
  type: TYPE_NORMAL
  zh: 此文件将由 Streamlit 用于安装运行应用程序所需的依赖项。
