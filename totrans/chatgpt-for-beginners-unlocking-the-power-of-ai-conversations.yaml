  zh: '**生成冒犯性或歧视性内容**。'
- en: '****Spre**adin**g ****fa**lse** ****info**rmatio**n ****o**r** ****prop**agand**a.'
  id: totrans-828
  prefs: []
  type: TYPE_NORMAL
  zh: '**散布虚假信息或宣传**。'
- en: '****Cre**atin**g ****mali**ciou**s ****co**de** ****o**r** ****inst**ructio**ns
    ****f**or** ****ill**ega**l ****acti**vitie**s.'
