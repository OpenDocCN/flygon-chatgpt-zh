- en: Getting Started with Image Generation in ChatGPT 4o
  id: totrans-57
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 在ChatGPT 4中开始使用图像生成
- en: Users on the free tier can generate three images a day, more if you are a Plus
    version or a Team subscriber. You also have to have a browser that's compatible
    with ChatGPT - or use the ChatGPT mobile app.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 免费层级的用户每天可以生成三张图像，如果你是Plus版本或团队订阅者，则可以生成更多。你还需要有一个与ChatGPT兼容的浏览器——或者使用ChatGPT移动应用。
- en: 'Setting Up for Success: Image Generation Basics'
  id: totrans-59
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 为成功设置：图像生成基础知识
- en: Ideally, if you're trying to create images, use a bigger screen, so you need
    a desktop rather than trying to make them on your mobile device. As an author,
    when I’m at home, I always use the monitor, rather than the laptop screen. The
    latter I keep for travelling.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 理想情况下，如果您试图创建图像，请使用更大的屏幕，因此您需要一个桌面而不是在您的移动设备上制作它们。作为一个作者，当我在家时，我总是使用显示器，而不是笔记本电脑屏幕。后者我保留用于旅行。
- en: To get started, open a new chat with ChatGPT and choose the 4o model.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 要开始，打开一个新的ChatGPT聊天并选择4o模型。
- en: Have a simple conversation about the image that you need.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 就您需要的图像进行简单对话。
- en: 'For example, if you are an author who works with seniors who are writing a
    book, you might prompt something like this:'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，如果您是一位与资深人士合作写作书籍的作者，您可能会提示如下：
- en: 'Prompt:'
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '*“Create an image of a senior woman author happily typing on her laptop in
    a sunlit home office in the Himalayas Include cozy décor and a coffee mug on her
    <desk>.”*'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: '*“创建一张图片，展示一位资深女性作者在喜马拉雅山脉阳光明媚的家庭办公室里快乐地敲击笔记本电脑。包括舒适的装饰和她的<桌子>上的咖啡杯。”*'
- en: 'When you do this, you might get a result like this to work with as a starting
    point:'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 当您这样做时，您可能会得到以下结果作为起点来工作：
- en: '![](Image00001.jpg)'
  id: totrans-67
  prefs: []
  type: TYPE_IMG
  zh: '![](Image00001.jpg)'
- en: Notice how it got things right, like the hands and specific requests for Himalayas
    and a coffee cup on the desk.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 注意它如何正确地处理了一些事情，比如手和具体要求在桌子上要有喜马拉雅山脉和咖啡杯。
- en: 'Hint: You can try this on your own, or with me. Follow along on the challenge
    - [https://<wbr> susanjagannath.<wbr> gumroad.<wbr> com/<wbr> l/<wbr> TCA-1](https://susanjagannath.gumroad.com/l/TCA-1)'
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：您可以自己尝试，或者和我一起尝试。跟随挑战——[https://<wbr> susanjagannath.<wbr> gumroad.<wbr>
    com/<wbr> l/<wbr> TCA-1](https://susanjagannath.gumroad.com/l/TCA-1)
- en: '3'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: '3'
- en: Mastering Image Prompts
  id: totrans-71
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 精通图像提示
- en: Communicating clearly with AI should be easy for us as authors, after all we
    are masters of word, storytelling and instruction – all we have to learn is how
    to wield our words to create concrete visual images. If we authors can create
    worlds, people, plots and passions via our books, why not do it AI?
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 对于我们这些作者来说，与AI清晰沟通应该是容易的，毕竟我们是文字、故事讲述和指导的大师——我们唯一需要学习的是如何运用我们的文字来创造具体的视觉图像。如果我们这些作者可以通过我们的书籍创造世界、人物、情节和激情，为什么不能通过AI来做呢？
- en: Here’s how to twist AI to our genius.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是如何将AI扭转为我们天才的方法。
- en: Let’s take a look at the basic anatomy of the prompt.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看提示的基本结构。
- en: Basic Prompt
  id: totrans-75
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 基本提示
- en: '*Create an image of <a senior woman author> <happily> <typing on her laptop>
    in a <sunlit home office in the Himalayas> Include <cozy décor> and <a coffee
    mug> on her <desk.>*'
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: '*创建一张图片，<一位资深女性作者> <快乐地> <在笔记本电脑上敲击>，在一个<喜马拉雅山脉阳光明媚的家庭办公室>。包括<舒适的装饰>和<一个咖啡杯>在她的<桌子上>。*'
- en: 'All the content within brackets can be changed – from left to right, these
    specify the:'
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 方括号内的所有内容都可以更改——从左到右，这些指定了：
- en: person
  id: totrans-78
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 人物
- en: emotion
  id: totrans-79
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 情感
- en: action
  id: totrans-80
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 动作
- en: setting
  id: totrans-81
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 环境
- en: 'Note: Do not include the <> in your prompt.'
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 注意：在您的提示中不要包含<>。
- en: Now let’s get Chat to improve or change this image.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们让Chat改进或更改这张图片。
- en: 'Maybe she is a bit too senior and you want an image that will apply to a wider
    age group:'
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 也许她有点太资深了，您想要一张适用于更广泛年龄段的图片：
- en: Prompt
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 提示
- en: '*Make her a bit younger and with salt and pepper hair*'
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: '*让她看起来年轻一些，头发带有盐和胡椒色*'
- en: You'll wait a few seconds for the results to process, and then you can either
    accept the changes or ask for some more tweaks.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 您将等待几秒钟，让结果进行处理，然后您可以接受更改或要求进行一些调整。
- en: '![](Image00002.jpg)'
  id: totrans-88
  prefs: []
  type: TYPE_IMG
  zh: '![](Image00002.jpg)'
- en: You decide that you want to use this image for a post to promote a writing retreat
    in the Himalayas.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 您决定您想要使用这张图片来推广喜马拉雅山脉的写作 retreat。
- en: 'So, you prompt Chat:'
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，您提示Chat：
- en: '*Include floating text - Come to the Writing Retreat in the Himalayas.*'
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: '*包含浮动文字 - 来喜马拉雅山脉的写作 retreat。*'
- en: '![Include floating text - Come to the Writing Retreat in the Himalayas.](Image00003.jpg)'
  id: totrans-92
  prefs: []
  type: TYPE_IMG
  zh: '![包含浮动文字 - 来喜马拉雅山脉的写作 retreat。](Image00003.jpg)'
- en: You can get the results you're looking for via a simple conversation with the
    image interface. You don’t have to learn coding or hire an expert!
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以通过与图像界面的简单对话来获得您想要的结果。您不需要学习编码或雇佣专家！
- en: Notice how AI kept the character and most other elements the same, rather than
    starting from scratch?
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 注意AI如何保持了角色和大多数其他元素不变，而不是从头开始？
- en: You can also change many different things, such as telling it to change it from
    a senior female to a senior male or having them work on their laptop on a wraparound
    porch outside rather than an indoor home office.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 您还可以更改许多不同的事情，例如告诉它将其从资深女性更改为资深男性，或者让他们在环绕阳台外而不是室内家庭办公室的笔记本电脑上工作。
- en: You can also change the emotion. You can pretty much use this prompt to get
    infinite different images.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 你也可以改变情绪。你几乎可以用这个提示来获取无限不同的图片。
- en: As you can see from the previous example, ChatGPT 4o is much easier than some
    of the more complex image generating tools online. But you still must know how
    to prompt for what you need and want. You’re a writer – so begin with being specific
    and thinking from a visual standpoint as well as a strategic one for your marketing
    efforts.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 如前例所示，ChatGPT 4o比一些更复杂的图像生成工具要简单得多。但你还必须知道如何提示你所需要和想要的。你是一位作家——所以从具体和视觉角度以及战略角度开始思考你的营销工作。
- en: The best way to get a prompt is to imagine there is a human graphic designer
    sitting in front of you and you have to tell them what you need. You would never
    simply tell someone to “make a powerful marketing image.” That's not enough for
    it to go on.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 获取最佳提示的方法是想象有一个人类图形设计师坐在你面前，你必须告诉他们你需要什么。你永远不会简单地告诉某人“制作一张强大的营销图片。”这不足以让它继续下去。
- en: 'You want to specify :'
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 你想要指定：
- en: what emotion the image should convey,
  id: totrans-100
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 图片应该传达的情绪，
- en: any camera angles you may want,
  id: totrans-101
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你可能想要的任何摄像机角度，
- en: the lighting in the picture,
  id: totrans-102
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 图片中的光线，
- en: the background or lack of background if you want it transparent, the colour
    palette to be used,
  id: totrans-103
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你想要的背景或不需要背景（如果你想要透明背景），要使用的色彩调色板，
- en: any specific objects you want in the image,
  id: totrans-104
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你想在图片中包含的任何特定物体，
- en: the style.
  id: totrans-105
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 风格。
- en: 'Blog and Social Media Images: Visual Content That Engages Instantly'
  id: totrans-106
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 博客和社交媒体图片：瞬间吸引人的视觉内容
- en: For example, if you are writing a weight loss book, you need an image for your
    weight loss blog post, the more detail you can give it, the more accurate your
    output will be. If you need content for a specific social media platform, you
    might also add something about the size and shape of your image, such as a square
    image or, if you want something for a Facebook header, for example, you would
    specify the size.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，如果你正在写一本减肥书，你需要为你的减肥博客文章提供一张图片，你提供的信息越详细，你的输出就会越准确。如果你需要为特定的社交媒体平台提供内容，你也可以添加一些关于你图片的大小和形状的信息，比如一个方形的图片，或者如果你想为Facebook的头像做些东西，例如，你会指定大小。
- en: 'Let’s prompt something like this:'
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们提示一些类似的内容：
- en: Prompt
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 提示
- en: '*Create an image of a woman in her 30s wearing athletic clothing and smiling
    as she goes on a morning walk on the sidewalk. The background shows a tree lined
    suburban street in Australia on a bright and sunny day with a blue sky. She''s
    holding a water bottle and is very confident looking*'
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: '*创建一张30多岁女性穿着运动服，面带微笑，在人行道上晨走的图片。背景显示澳大利亚一个阳光明媚、蓝天白云的树篱郊区街道。她拿着水瓶，看起来非常自信*'
- en: '![Create an image of a woman in her 30s wearing athletic clothing and smiling
    as she goes on a morning walk on the sidewalk. The background shows a tree lined
    suburban street in Australia on a bright and sunny day with a blue sky. She''s
    holding a water bottle and is very confident looking](Image00004.jpg)'
  id: totrans-111
  prefs: []
  type: TYPE_IMG
  zh: '![创建一张30多岁女性穿着运动服，面带微笑，在人行道上晨走的图片。背景显示澳大利亚一个阳光明媚、蓝天白云的树篱郊区街道。她拿着水瓶，看起来非常自信](Image00004.jpg)'
- en: One of the great things about using this new image generation feature is that
    you can add text that will be (mostly) accurate.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 使用这个新的图像生成功能的一个好处是，你可以添加将（大部分）准确的文字。
- en: 'For example, you might ask it to add some floating text in the image that says:
    “Walking for Weight Loss – Get Your 10k Steps in Today!”.'
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，你可以要求它在图片中添加一些浮动文字，上面写着：“步行减肥——今天走一万步！”。
- en: 'Prompt:'
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '*Add the floating text "Walking for Weight Loss – Get Your 10k Steps in Today!*'
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: '*在图片中添加浮动文字“步行减肥——今天走一万步！”*'
- en: '![](Image00005.jpg)'
  id: totrans-116
  prefs: []
  type: TYPE_IMG
  zh: '![](Image00005.jpg)'
- en: No more having to manually buy stock images and then go to another tool and
    add text yourself. ChatGPT’s 4o can do it for you.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 你不再需要手动购买库存图片，然后去另一个工具添加文字。ChatGPT的4o可以为你完成这一切。
- en: This was done in seconds. No need for complex tools for images that wipe away
    your budget and valuable writing time.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 这是在几秒钟内完成的。不需要复杂的工具，这些工具会耗尽你的预算和宝贵的写作时间。
- en: 'Hint: You can try this on your own, or with me. Follow along on the challenge
    - [https://<wbr> susanjagannath.<wbr> gumroad.<wbr> com/<wbr> l/<wbr> TCA-1](https://susanjagannath.gumroad.com/l/TCA-1)'
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：你可以自己尝试，或者和我一起尝试。跟随挑战——[https://<wbr> susanjagannath.<wbr> gumroad.<wbr>
    com/<wbr> l/<wbr> TCA-1](https://susanjagannath.gumroad.com/l/TCA-1)
- en: '4'
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: '4'
- en: 'Book Covers and Product Graphics: Create Stunning Covers With or Without a
    Designer'
  id: totrans-121
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 书籍封面和产品图形：无需设计师也能创建令人惊叹的封面
- en: The other thing that takes up your time as an author is covers, either for books,
    bonuses or blogs.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 作为作者，占用你时间的事情还有封面，无论是书籍、赠品还是博客。
- en: This is where I often struggle for ideas or time or budget.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是我经常为想法、时间或预算而挣扎的地方。
- en: To use ChatGPT to create an info product cover, you want to include other details
    such as
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 要使用ChatGPT创建一个信息产品封面，你想要包括其他细节，例如
- en: the product you are selling
  id: totrans-125
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你正在销售的产品
- en: the niche you are in, and
  id: totrans-126
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你所在的细分市场，
- en: the emotional tone you're trying to convey.
  id: totrans-127
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你试图传达的情感基调。
- en: 'You''ll also specify:'
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 你还将指定：
- en: what the title should be and
  id: totrans-129
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 标题应该是什么，以及
- en: where it should be placed or which type of font you want.
  id: totrans-130
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它应该放置的位置或你想要的字体类型。
- en: the background image that should be used.
  id: totrans-131
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 应该使用的背景图片。
- en: For example, you might say something like this where you tell Chat exactly what
    you want.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，你可能会这样说，告诉Chat你确切想要什么。
- en: Prompt
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 提示
- en: '*Create a full-size e-book cover for the book titled “Easy Images for Authors
    Who Can’t Draw.”*'
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: '*为名为“不会画画的作者简易图像”的书籍创建一个全尺寸的电子书封面。*'
- en: '*Use a **clean, modern sans-serif font** for the title at the top.*'
  id: totrans-135
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*为顶部的标题使用**干净、现代的无衬线字体**。*'
- en: '*In the centre, place a **badly drawn doodle** of a sun, crooked house, and
    stick tree.*'
  id: totrans-136
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*在中间，放置一个**糟糕的涂鸦**，画有太阳、歪斜的房子和棍状树。*'
- en: '*Make the doodle appear like a **floating sticker or hologram** , with subtle
    drop shadow or glow.*'
  id: totrans-137
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*让涂鸦看起来像**漂浮的贴纸或全息图**，带有细微的阴影或光晕。*'
- en: '*Use a **light blue textured background** (no white).*'
  id: totrans-138
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*使用**浅蓝色纹理背景**（不要白色）。*'
- en: '*At the bottom, place “Your Name” in a **refined script font.***'
  id: totrans-139
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*在底部，用**精致的脚本字体**放置“你的名字”。***'
- en: '*Ensure professional layout, spacing, and proportion (6x9 aspect ratio).*'
  id: totrans-140
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*确保专业布局、间距和比例（6x9宽高比）。*'
- en: And this is the result – you could use this directly or you could use this to
    give to your book cover designer. That alone will save you a lot of time and money,
    as most designers will only do a limited number of iterations of your book cover
    before they have to ask you for more fees.
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是结果——你可以直接使用它，或者你可以把它给封面设计师。仅此一项就能为你节省大量的时间和金钱，因为大多数设计师在需要你支付更多费用之前，只会对你的封面进行有限的修改次数。
- en: '![Create a full-size e-book cover for the book titled “Easy Images for Authors
    Who Can’t Draw.”](Image00006.jpg)'
  id: totrans-142
  prefs: []
  type: TYPE_IMG
  zh: '![为名为“不会画画的作者简易图像”的书籍创建一个全尺寸的电子书封面。](Image00006.jpg)'
- en: You can play around with it to get what you want, whether it’s a different font,
    layout, or graphic.
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以随意调整，以获得你想要的效果，无论是不同的字体、布局还是图形。
- en: You can also ask Chat to share the prompt it created to generate the images.
    Yes, I know, you gave it a simple prompt, but Chat creates its own prompt and
    then generates the image.
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 你也可以要求Chat分享它创建的用于生成图像的提示。是的，我知道，你给出了一个简单的提示，但Chat会创建自己的提示然后生成图像。
- en: 'So now let’s use that to add a subtitle:'
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 所以现在让我们用这个来添加一个副标题：
- en: Prompt
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 提示
- en: '*Create a full size vertical e-book cover for a book titled "Easy Images for
    Authors Who Can’t Draw".*'
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: '*为名为“不会画画的作者简易图像”的书籍创建一个全尺寸的垂直电子书封面。*'
- en: '*Use the following design elements:*'
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: '*使用以下设计元素：*'
- en: '***Title** at the top in a **clean, modern sans-serif font** , bold and centre-aligned*'
  id: totrans-149
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
