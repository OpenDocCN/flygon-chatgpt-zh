  prefs: []
  type: TYPE_NORMAL
  zh: Seaborn 的 clustermap 是一个二维矩阵数据集表示，其中行和列都是按层次聚类的。这允许从复杂数据集中出现模式。我们可以以聚类图格式可视化层次聚类关系。
