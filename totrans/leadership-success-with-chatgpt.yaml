  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**Prompt 5: Ethical scenario role-play**'
  prefs: []
  type: TYPE_NORMAL
- en: “Act as a tough investor pressuring GlobeGrid’s management to hide a delayed
    project milestone. Challenge my responses until I provide a clear, ethical stance
    that aligns with our values.”
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Think of ChatGPT as your ethical sounding board, ready whenever you need a gut-check.
  prefs: []
  type: TYPE_NORMAL
- en: 5\. Signs integrity is genuinely part of your culture
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'When ethics become second nature, you''ll see clear signs:'
  prefs: []
  type: TYPE_NORMAL
- en: Employees speak up immediately about questionable practices—without fear.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Customers publicly praise your honesty and transparency, even when things go
