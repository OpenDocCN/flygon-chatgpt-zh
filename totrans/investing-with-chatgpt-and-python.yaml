- en: 'def moving_average_signal(data, short_window, long_window):'
  id: totrans-1613
  prefs: []
  type: TYPE_NORMAL
  zh: 'def moving_average_signal(data, short_window, long_window):'
- en: data['Short_MA'] = data['close'].rolling(window=short_window).mean()
  id: totrans-1614
  prefs: []
  type: TYPE_NORMAL
  zh: data['Short_MA'] = data['close'].rolling(window=short_window).mean()
- en: data['Long_MA'] = data['close'].rolling(window=long_window).mean()
  id: totrans-1615
  prefs: []
  type: TYPE_NORMAL
  zh: data['Long_MA'] = data['close'].rolling(window=long_window).mean()
- en: data['Signal'] = 0
  id: totrans-1616
  prefs: []
  type: TYPE_NORMAL
  zh: data['Signal'] = 0
- en: data['Signal'][short_window:] = np.where(data['Short_MA'][short_window:] > data['Long_MA'][short_window:],
    1, 0)
  id: totrans-1617
  prefs: []
  type: TYPE_NORMAL
  zh: data['Signal'][short_window:] = np.where(data['Short_MA'][short_window:] > data['Long_MA'][short_window:],
    1, 0)
- en: data['Position'] = data['Signal'].diff()
  id: totrans-1618
  prefs: []
  type: TYPE_NORMAL
  zh: data['Position'] = data['Signal'].diff()
- en: return data
