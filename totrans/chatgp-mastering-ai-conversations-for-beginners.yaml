    ****t**he** ****ho**od** ****o**f** ****A**I** ****conve**rsatio**ns ****a**s**
    ****w**e** ****co**ver** ****h**ow** ****t**o** ****ma**ke** ****yo**ur** ****cha**tbot**s
    ****mo**re** ****acce**ssibl**e ****t**o** ****t**he** ****ave**rag**e ****pe**rso**n.
    ****Wi**th** ****t**he** ****adva**ncemen**ts ****t**o** ****A**I** ****th**at**
    ****ha**ve** ****be**en** ****bro**ugh**t ****ab**out** ****b**y** ****Cha**tGP**T
    ****a**nd** ****t**he** ****bi**rth** ****o**f** ****LL**Ms**, ****th**ere** ****h**as**
    ****be**en** ****a**** ****fund**amenta**l ****ch**ang**e ****i**n** ****t**he**
    ****w**ay** ****th**at** ****us**er** ****inte**rface**s ****a**re** ****des**igne**d.
    ****A**** ****us**er** ****inte**rfac**e (****U**I** ****f**or** ****sh**ort**)
    ****re**fer**s ****t**o** ****t**he** ****pl**ace** ****wh**ere** ****hu**man**s
    ****a**nd** ****comp**uter**s ****int**erac**t ****a**nd** ****inc**lude**s ****techn**ologic**al
    ****dev**ice**s ****li**ke** ****dis**pla**y ****scr**een**s, ****keyb**oard**s,
    ****a**nd** ****mi**ce**. ****U**I** ****al**so** ****inc**lude**s ****t**he**
    ****w**ay** ****pe**opl**e ****u**se** ****a**nd** “****comm**unicat**e” ****wi**th**
    ****ap**ps** ****a**nd** ****web**site**s. ****Tradi**tional**ly, ****th**is**
    ****commu**nicati**on ****h**as** ****be**en** ****des**igne**d ****t**o** ****b**e**
    ****pr**ett**y ****o**ne**-****si**ded**, ****wi**th** ****t**he** ****us**er**
    ****ent**erin**g ****com**mand**s ****o**r** ****cont**rollin**g ****t**he** ****te**ch**
    ****t**o** ****com**plet**e ****cer**tai**n ****ta**sks** ****o**r** ****per**for**m
    ****spe**cifi**c ****func**tion**s. ****B**ut**, ****li**ke** ****ma**ny** ****ot**her**
    ****sph**ere**s ****o**f** ****t**he** ****te**chn**o ****wo**rld**, ****U**I**
    ****i**s** ****curr**entl**y ****get**tin**g ****a**** ****ma**jor** ****fac**elif**t,
    ****a**nd** ****i**t**’****s**** ****a**ll** ****th**ank**s ****t**o** ****o**ur**
    ****revol**utiona**ry ****de**ep**-****lea**rnin**g ****la**rge** ****lan**guag**e
    ****mo**del**, ****Cha**tGP**T.'
  id: totrans-1059
  prefs: []
  type: TYPE_NORMAL
  zh: 在概述并定义了对话式设计的原则之后，现在是时候在人工智能对话的背景下进一步深入研究了。我们将介绍如何使您的聊天机器人更加易于普通人的使用。随着 ChatGPT
    和 LLM 的诞生所带来的 AI 的发展，用户界面设计的方式发生了根本性的变化。用户界面（简称 UI）指的是人类和计算机交互的地方，包括显示屏、键盘和麦克风等技术设备。UI
    还包括人们如何使用和“与”应用程序和网站“沟通”的方式。传统上，这种沟通被设计成相当单方面的，用户输入命令或控制技术以完成特定任务或执行特定功能。但是，就像技术世界的许多其他领域一样，UI
    目前正在经历一次重大的变革，这一切都归功于我们的革命性深度学习大型语言模型，ChatGPT。
