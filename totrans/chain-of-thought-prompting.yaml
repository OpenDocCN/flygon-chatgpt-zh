- en: Chapter 12\. Solving Causal Problems with CoT Prompting
  id: totrans-663
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第 12 章\. 使用 CoT 提示解决因果问题
- en: A common problem-solving method that relates to scenarios in which “one thing
    follows another” is Business Process Analysis.
  id: totrans-664
  prefs: []
  type: TYPE_NORMAL
  zh: 一种与“一件事接着另一件事”的情景相关的问题解决方法是业务流程分析。
- en: Classically, Business Process Analysis is used in businesses or manufacturing
    environments to determine the optimum chain of discrete activities which will
    result in the creation of the desired service or manufactured item. We can however,
    repurpose Business Process Analysis for our needs and use it as a problem solving
    methodology for general cause-and-effect problems.
  id: totrans-665
  prefs: []
  type: TYPE_NORMAL
  zh: 传统上，业务流程分析在商业或制造环境中用于确定将导致所需服务或制造项目创建的优化离散活动链。然而，我们可以重新利用业务流程分析来满足我们的需求，并将其用作一般原因和效果问题的解决问题的方法。
- en: This chapter provides a high level introduction to business processes in general
    and Business Process Analysis in particular.
  id: totrans-666
  prefs: []
  type: TYPE_NORMAL
  zh: 本章提供了对一般业务流程和特别是业务流程分析的概述。
- en: Introduction to Business Processes
  id: totrans-667
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 业务流程简介
- en: A business process is a structured set of activities or tasks, organised to
    produce a specific service or product within an organisation. Business processes
    guide organisations to producing consistent and reliable results; the foundation
    of all successful corporations is well-defined business processes.
  id: totrans-668
  prefs: []
  type: TYPE_NORMAL
  zh: 业务流程是一组结构化的活动或任务，组织起来在组织内生产特定的服务或产品。业务流程指导组织产生一致和可靠的结果；所有成功企业的基石是定义良好的业务流程。
- en: 'When business processes are well defined:'
  id: totrans-669
  prefs: []
  type: TYPE_NORMAL
  zh: 当业务流程定义良好时：
- en: Staff know what they are meant to be doing.
  id: totrans-670
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 员工知道他们应该做什么。
- en: Quality goods and services are provided in a predictable manner.
  id: totrans-671
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 以可预测的方式提供优质商品和服务。
- en: Each step in the business process can be measured, optimised and have rough
    edges smoothed out.
  id: totrans-672
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 业务流程中的每一步都可以衡量、优化，并且可以平滑边缘。
- en: The work flowing through each step of a business process can be measured, controlled
    and optimally routed.
  id: totrans-673
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过每个业务流程的每个步骤流动的工作可以衡量、控制和优化路由。
- en: '| ![](image_rsrc6FJ.jpg)The term "Business Process" often refers to a set of
    interrelated activities in an office or a services company.However, this term
    can also be applied in a manufacturing context, where it refers to the methods
    involved in producing goods and services. This could include the steps in a factory
    assembly line, the steps in quality control mechanisms, or the steps in supply
    chain management. |'
  id: totrans-674
  prefs: []
  type: TYPE_TB
  zh: '| ![图片](image_rsrc6FJ.jpg)“商业流程”一词通常指办公室或服务公司中一系列相互关联的活动。然而，这个术语也可以应用于制造环境，其中它指的是生产商品和服务涉及的方法。这可能包括工厂装配线中的步骤、质量控制机制中的步骤或供应链管理中的步骤。
    |'
- en: Basic Ideas of a Business Process
  id: totrans-675
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 商业流程的基本理念
- en: The most fundamental idea of a business process is the decomposition of a required
    activity into sequential and discrete steps. This simplifies complex tasks and
    ensures that each step effectively contributes towards the ultimate goal.
  id: totrans-676
  prefs: []
  type: TYPE_NORMAL
  zh: 商业流程最基本的思想是将所需活动分解为顺序和离散的步骤。这简化了复杂任务，并确保每个步骤有效地为最终目标做出贡献。
- en: 'For example, we could just consider welding a car door in a car factory as
    one step that is performed by the factory, or we could split it up into multiple
    discrete steps, as follows:'
  id: totrans-677
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，我们可以在汽车工厂中将焊接车门视为工厂执行的一个步骤，或者我们可以将其拆分为多个离散的步骤，如下所示：
- en: '| Automated Welding Process Business Processi. Programming the Welding Robots:
    Before welding starts, robots are programmed with precise welding paths. This
    includes the welding speed, angle, and duration for each weld.ii. Positioning
    the Door Panel: The door panel is positioned accurately within the welding station.
    Clamps and sensors are used to ensure the panel is held in place correctly during
    the welding process.iii. Welding Execution: The robots execute the welding process,
    joining the smaller parts to the door panel. Each weld is monitored for quality,
    such as depth and strength.iv. Cooling: Post-welding, the door undergoes a cooling
    period. After cooling, each weld is inspected for defects like cracks or weak
    joints.v. Finishing Touches: After welding, any excess material (like welding
    splatter) is cleaned off, and the weld areas are polished or ground down if necessary.vi.
    Final Inspection: The welds are inspected with a combination of visual checks
    and testing methods like ultrasonic testing, to ensure quality. |'
  id: totrans-678
  prefs: []
  type: TYPE_TB
  zh: '| 自动焊接工艺商业流程i. 编程焊接机器人：在焊接开始之前，机器人被编程为精确的焊接路径。这包括每个焊接的速度、角度和持续时间。ii. 定位车门面板：车门面板被精确地定位在焊接站内。夹具和传感器用于确保在焊接过程中面板被正确地固定。iii.
    焊接执行：机器人执行焊接过程，将较小的部件焊接到位面板。每个焊接点都经过质量监控，如深度和强度。iv. 冷却：焊接后，车门经过冷却期。冷却后，每个焊接点都检查是否存在缺陷，如裂纹或薄弱的接合处。v.
    收尾工作：焊接后，任何多余的物料（如焊接飞溅）被清理掉，如果需要，焊接区域将被抛光或磨平。vi. 最终检查：使用视觉检查和如超声波测试等测试方法对焊接进行检查，以确保质量。
    |'
- en: The advantage of splitting up the welding into discrete steps is that we can
    then concentrate on the efficiency, quality and throughput of each step separately,
    as well as optimising the way that work-in-progress parts flow from one step to
    the next.
  id: totrans-679
  prefs: []
  type: TYPE_NORMAL
  zh: 将焊接拆分为离散步骤的优势在于，我们可以分别关注每个步骤的效率、质量和吞吐量，以及优化在制品从一步流向下一步的方式。
- en: Actions, Inputs and Outputs
  id: totrans-680
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 行动、输入和输出
- en: For a business process to function effectively, every step must be clearly defined
    in terms of its inputs, outputs, and actions.
  id: totrans-681
  prefs: []
  type: TYPE_NORMAL
  zh: 为了使商业流程有效运行，每个步骤都必须在输入、输出和行动方面明确界定。
- en: Actions are the tasks or activities performed in the step. They represent the
    transformation that takes place in the step, where inputs are converted into outputs.
  id: totrans-682
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 行动是在步骤中执行的任务或活动。它们代表了步骤中发生的转换，其中输入被转换为输出。
- en: In the welding step, the “action” is the actual welding performed by robots.
  id: totrans-683
  prefs: []
  type: TYPE_NORMAL
  zh: 在焊接步骤中，“行动”是由机器人实际执行的焊接。
- en: 'Inputs are the precursors of a process step; they can be any or all of the
    following:'
  id: totrans-684
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 输入是流程步骤的前驱；它们可以是以下任何或所有内容：
- en: '➢        Materials: Raw materials or components needed for the process.'
  id: totrans-685
  prefs: []
  type: TYPE_NORMAL
  zh: ➢        材料：过程所需的原材料或组件。
- en: '➢        Information: Data, instructions, or guidelines necessary to carry
    out the step.'
  id: totrans-686
  prefs: []
  type: TYPE_NORMAL
  zh: ➢        信息：执行步骤所需的数据、指令或指南。
- en: '➢        Resources: Tools, equipment, and human resources essential for the
    task.'
  id: totrans-687
  prefs: []
  type: TYPE_NORMAL
  zh: ➢        资源：执行任务所需的工具、设备和人力资源。
- en: The quality and availability of inputs directly impact the effectiveness of
    the process. For instance, in a welding process, the quality of the welding robots
    determines the quality of the weld that they will produce.
  id: totrans-688
  prefs: []
  type: TYPE_NORMAL
  zh: 输入的质量和可用性直接影响流程的有效性。例如，在焊接过程中，焊接机器人的质量决定了它们将产生的焊接质量。
- en: 'Outputs are the products or results of the process step. They can be:'
  id: totrans-689
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 输出是流程步骤的产品或结果。它们可以是：
- en: '➢        Physical Products: Like a welded car door.'
  id: totrans-690
  prefs: []
  type: TYPE_NORMAL
  zh: ➢ 物理产品：例如焊接的汽车门。
- en: '➢ Services: In service industries, outputs could be the delivery of a service.
    For example, the output of a mail delivery service is that a letter has been delivered
    to the recipient.'
  id: totrans-691
  prefs: []
  type: TYPE_NORMAL
  zh: ➢ 服务：在服务行业中，输出可能是服务的交付。例如，邮件递送服务的输出是信件已送达收件人。
- en: '➢        Information: Reports, updates, or feedback for the next steps.'
  id: totrans-692
  prefs: []
  type: TYPE_NORMAL
  zh: ➢ 信息：报告、更新或对下一步的反馈。
- en: Outputs must meet predefined quality standards and be ready for the next stage
    of the process or for delivery to the customer.
  id: totrans-693
  prefs: []
  type: TYPE_NORMAL
  zh: 输出必须满足预定义的质量标准，并准备好进入下一个流程阶段或交付给客户。
- en: By thoroughly structuring each step in the process, Business Process Analysis
    allows us to identify areas for improvement, manage resources more effectively,
    and ensure that each step contributes optimally towards the final goal of producing
    a high-quality product.
  id: totrans-694
  prefs: []
  type: TYPE_NORMAL
  zh: 通过彻底结构化流程中的每一步，业务流程分析使我们能够识别改进区域，更有效地管理资源，并确保每一步都最大限度地贡献于最终目标——生产高质量的产品。
- en: '![](image_rsrc6FR.jpg)'
  id: totrans-695
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrc6FR.jpg)'
- en: Welding Robot. Wikimedia Commons
  id: totrans-696
  prefs: []
  type: TYPE_NORMAL
  zh: 焊接机器人。维基媒体共享
- en: Chapter 13\. CoT Prompting using Business Process Analysis
  id: totrans-697
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第13章\. 使用业务流程分析进行CoT提示
- en: Casting Causal Problems as a Business Process
  id: totrans-698
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 将因果问题作为业务流程
- en: In Chapter 8\. Framing Problems, we talked about the idea of framing (or “casting”)
    a real-world problem as a specific problem type. We can cast any problem that
    involves a sequence of problem-solving steps in terms of a business process.
  id: totrans-699
  prefs: []
  type: TYPE_NORMAL
  zh: 在第8章“问题框架”中，我们讨论了将现实世界问题作为特定问题类型框架（或“铸造”）的想法。我们可以将任何涉及一系列问题解决步骤的问题用业务流程来表示。
- en: In other words, we can get an AI to think of a general problem as a “pseudo-business
    process” and solve it using business process analysis.
  id: totrans-700
  prefs: []
  type: TYPE_NORMAL
  zh: 换句话说，我们可以让一个AI将一个通用问题视为一个“伪业务流程”，并使用业务流程分析来解决问题。
- en: Doing this forces the AI to break down the initial problem into a series of
    steps that have to be solved each on its own merits, and then join the steps together,
    to reach the correct answer.
  id: totrans-701
  prefs: []
  type: TYPE_NORMAL
  zh: 这样做迫使AI将初始问题分解为一系列必须单独解决的步骤，然后将这些步骤组合起来，以达到正确答案。
- en: The Hugging Face GAIA Dataset
  id: totrans-702
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Hugging Face GAIA数据集
- en: The Hugging Face GAIA (general AI assistant) Dataset ([https://huggingface.co/datasets/gaia-benchmark/GAIA](https://huggingface.co/datasets/gaia-benchmark/GAIA))
    is a AI benchmark designed to evaluate the abilities of next-generation Language
    Models (LLMs).
  id: totrans-703
  prefs: []
  type: TYPE_NORMAL
  zh: Hugging Face GAIA（通用人工智能助手）数据集（[https://huggingface.co/datasets/gaia-benchmark/GAIA](https://huggingface.co/datasets/gaia-benchmark/GAIA)）是一个AI基准，旨在评估下一代语言模型（LLMs）的能力。
- en: 'The GAIA dataset includes challenges with three levels of difficulty:'
  id: totrans-704
  prefs: []
  type: TYPE_NORMAL
  zh: GAIA数据集包括三个难度级别的挑战：
- en: 'Level 1: Questions that generally require no extra tools besides the AI reasoning
    engine itself; or at most one tool but no more than 5 steps.'
  id: totrans-705
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 第1级：通常只需要AI推理引擎本身以外的额外工具；或者最多一个工具，但不超过5步。
- en: 'Level 2: Questions that generally involve more steps, roughly between 5 and
    10, and combine the need to use different extra tools in addition to the actual
    AI reasoning engine.'
  id: totrans-706
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 第2级：通常涉及更多步骤，大约在5到10步之间，并需要结合使用实际AI推理引擎以外的不同额外工具。
- en: 'Level 3: Questions for a near perfect general AI assistant. These questions
    require the ability to take arbitrarily long sequences of actions, use any number
    of tools, and access worldwide information in general.'
  id: totrans-707
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 第3级：针对几乎完美的通用人工智能助手的提问。这些问题需要能够执行任意长度的动作序列，使用任何数量的工具，并访问一般性的全球信息。
- en: Let’s see if we can lift ChatGPT 4’s ability to meet the Hugging Face GAIA challenge.
  id: totrans-708
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看我们是否能够提升ChatGPT 4应对Hugging Face GAIA挑战的能力。
- en: Finding Nemo
  id: totrans-709
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 寻找尼莫
- en: For example, let’s take an AI-thinking challenge from the Hugging Face General
    AI Assistant dataset ([https://huggingface.co/datasets/gaia-benchmark/GAIA?row=1](https://huggingface.co/datasets/gaia-benchmark/GAIA?row=1)).
  id: totrans-710
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，让我们从Hugging Face通用人工智能助手数据集（[https://huggingface.co/datasets/gaia-benchmark/GAIA?row=1](https://huggingface.co/datasets/gaia-benchmark/GAIA?row=1)）中选取一个AI思维挑战。
- en: '| I’m researching species that became invasive after people who kept them as
    pets released them. There’s a certain species of fish that was popularised as
    a pet by being the main character of the movie Finding Nemo. According to the
    USGS, where was this fish found as a non-native species, before the year 2020?
    I need the answer formatted as the five-digit zip codes of the places the species
    was found, separated by commas if there is more than one place. |'
  id: totrans-711
  prefs: []
  type: TYPE_TB
  zh: '| 我正在研究那些被作为宠物饲养后释放而成为入侵物种的物种。有一种鱼类，因为它是电影《海底总动员》的主角而成为受欢迎的宠物。根据美国地质调查局（USGS）的数据，在2020年之前，这种鱼作为非本地物种在哪里被发现？我需要将答案格式化为该物种被发现地点的五位数字邮政编码，如果有一个以上的地点，则用逗号分隔。
    |'
- en: Let’s see what happens if we pose this question directly to ChatGPT 4.
  id: totrans-712
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看如果我们直接向ChatGPT 4提出这个问题会发生什么。
- en: '| UserSolve: I’m researching species that became invasive after people who
    kept them as pets released them. There’s a certain species of fish that was popularised
    as a pet by being the main character of the movie Finding Nemo. According to the
    USGS, where was this fish found as a non-native species, before the year 2020?
    I need the answer formatted as the five-digit zip codes of the places the species
    was found, separated by commas if there is more than one place.ChatGPTError analysingI
    attempted to retrieve the ZIP codes for the locations where the clownfish (popularised
    by the movie "Finding Nemo") was found as a non-native species according to the
    USGS. However, due to the constraints of my environment, I''m unable to directly
    access the internet or external databases, including the USGS database.To find
    the specific ZIP codes where the clownfish was found as a non-native species,
    you can manually search the USGS database for records of clownfish sightings or
    reports. Once you have the locations, you can then use an online tool or map service
    to convert these location names into their corresponding five-digit ZIP codes.If
    you can provide me with the specific locations from the USGS database, I can then
    assist you in finding the corresponding ZIP codes. |'
  id: totrans-713
  prefs: []
  type: TYPE_TB
  zh: '| 用户解决：我正在研究那些被作为宠物饲养后释放而成为入侵物种的物种。有一种鱼类，因为它是电影《海底总动员》的主角而成为受欢迎的宠物。根据美国地质调查局（USGS）的数据，在2020年之前，这种鱼作为非本地物种在哪里被发现？我需要将答案格式化为该物种被发现地点的五位数字邮政编码，如果有一个以上的地点，则用逗号分隔。ChatGPT错误分析我试图检索根据美国地质调查局（USGS）的数据，作为非本地物种发现的
    clownfish（由电影《海底总动员》推广）的邮政编码。然而，由于我环境中的限制，我无法直接访问互联网或外部数据库，包括USGS数据库。要找到clownfish作为非本地物种被发现的具体邮政编码，您可以手动搜索USGS数据库中关于clownfish目击或报告的记录。一旦您有了这些地点，您可以使用在线工具或地图服务将这些地点名称转换为相应的五位数字邮政编码。如果您能提供USGS数据库中的具体地点，我可以帮助您找到相应的邮政编码。
    |'
- en: ChatGPT fails to find the answer and claims that the required data is unavailable.
  id: totrans-714
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT未能找到答案，并声称所需数据不可用。
- en: Now let’s use a GPT called Process Designer ([https://t.ly/9rJVk](https://t.ly/9rJVk))
    to break down the original problem into discrete steps, framed as a business process.
  id: totrans-715
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们使用一个名为Process Designer的GPT（[https://t.ly/9rJVk](https://t.ly/9rJVk)）将原始问题分解为离散步骤，将其构建为一个业务流程。
- en: '| YouBreak up this problem into multiple steps in a business process, for each
    step specify input, processing and output: I’m researching species that became
    invasive after people who kept them as pets released them. There’s a certain species
    of fish that was popularised as a pet by being the main character of the movie
    Finding Nemo. According to the USGS, where was this fish found as a non-native
    species, before the year 2020? I need the answer formatted as the five-digit zip
    codes of the places the species was found, separated by commas if there is more
    than one place.Process DesignerI understand, let''s break down your original problem
    into a detailed business process with specific references to your query:Business
    Process: Tracking Invasive Species Spread Due to Pet Release1\. Problem Identification'
  id: totrans-716
  prefs: []
  type: TYPE_NORMAL
  zh: '| 您将这个问题分解为业务流程中的多个步骤，对每个步骤指定输入、处理和输出：我正在研究那些被作为宠物饲养后释放而成为入侵物种的物种。有一种鱼类，因为它是电影《海底总动员》的主角而成为受欢迎的宠物。根据美国地质调查局（USGS）的数据，在2020年之前，这种鱼作为非本地物种在哪里被发现？我需要将答案格式化为该物种被发现地点的五位数字邮政编码，如果有一个以上的地点，则用逗号分隔。Process
    Designer我明白了，让我们将您原始问题分解为一个详细的业务流程，并具体参考您的查询：业务流程：追踪宠物释放导致的入侵物种传播1. 问题识别'
- en: 'Input: The need to research a specific species that became invasive due to
    pet release.'
  id: totrans-717
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 输入：研究因宠物释放而成为入侵物种的特定物种的需求。
- en: 'Processing: Identifying the species as the one popularised by the movie "Finding
    Nemo."'
  id: totrans-718
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 处理：确定物种为电影《海底总动员》推广的物种。
- en: 'Output: A clear research goal focused on tracking the non-native spread of
    this particular fish species.'
  id: totrans-719
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 输出：一个明确的研究目标，专注于追踪这种特定鱼类物种的非本地扩散。
- en: 2\. Data Sourcing
  id: totrans-720
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 数据来源
- en: 'Input: The specified fish species from "Finding Nemo."'
  id: totrans-721
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 输入：来自《海底总动员》的指定鱼类物种。
- en: 'Processing: Determining USGS as the authoritative source for geographical data
    on the species.'
  id: totrans-722
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 处理：确定美国地质调查局（USGS）为该物种地理数据的权威来源。
- en: 'Output: Selection of USGS as the primary data source for this research.'
  id: totrans-723
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 输出：选择美国地质调查局（USGS）作为本研究的首选数据源。
- en: 3\. Data Collection
  id: totrans-724
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 数据收集
- en: 'Input: USGS as the selected data source.'
  id: totrans-725
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 输入：美国地质调查局（USGS）作为选定的数据源。
- en: 'Processing: Collecting data from USGS regarding the non-native occurrences
    of the specified fish species. Ensure the data timeframe is limited to before
    2020\.'
  id: totrans-726
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 处理：从美国地质调查局（USGS）收集有关指定鱼类物种非本地出现的资料。确保数据时间范围限制在2020年之前。
- en: 'Output: A dataset from USGS detailing where the species was found as a non-native
    species before 2020\.'
  id: totrans-727
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 输出：一份来自美国地质调查局（USGS）的资料集，详细说明该物种在2020年之前作为非本地物种出现的地点。
- en: 4\. Data Analysis
  id: totrans-728
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 数据分析
- en: 'Input: USGS dataset on the non-native occurrences of the species.'
  id: totrans-729
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 输入：美国地质调查局（USGS）关于该物种非本地出现的资料集。
- en: 'Processing: Extracting specific instances and locations of non-native occurrences
    from the dataset.'
  id: totrans-730
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 处理：从数据集中提取非本地出现的特定实例和位置。
- en: 'Output: A list of locations (potentially in various geographical formats) where
    the species was found.'
  id: totrans-731
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 输出：一个地点列表（可能以各种地理格式），其中发现了该物种。
- en: 5\. Data Formatting
  id: totrans-732
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 数据格式化
- en: 'Input: List of locations where the species was found.'
  id: totrans-733
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 输入：发现该物种的地点列表。
- en: 'Processing: Converting the locations into their corresponding five-digit zip
    codes. If a location does not directly correspond to a zip code, additional geographical
    cross-referencing might be required.'
  id: totrans-734
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 处理：将地点转换为相应的五位数邮政编码。如果地点不直接对应邮政编码，可能需要额外的地理交叉引用。
- en: 'Output: A formatted list of five-digit zip codes, separated by commas if multiple
    locations are identified.'
  id: totrans-735
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 输出：一个格式化的五位数邮政编码列表，如果识别出多个地点，则用逗号分隔。
- en: 6\. Verification and Validation
  id: totrans-736
  prefs: []
  type: TYPE_NORMAL
  zh: 6. 验证和验证
- en: 'Input: Formatted list of zip codes.'
  id: totrans-737
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 输入：格式化的邮政编码列表。
- en: 'Processing: Cross-checking the accuracy of the zip codes against the original
    data and geographical standards.'
  id: totrans-738
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 处理：交叉核对邮政编码的准确性与原始数据和地理标准。
- en: 'Output: A verified and validated list of zip codes where the species was found.'
  id: totrans-739
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 输出：一个经过验证和验证的发现地点的邮政编码列表。
- en: 7\. Documentation and Reporting
  id: totrans-740
  prefs: []
  type: TYPE_NORMAL
  zh: 7. 文档编制和报告
- en: 'Input: Verified list of zip codes and research data.'
  id: totrans-741
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 输入：经过验证的邮政编码列表和研究数据。
- en: 'Processing: Compiling the findings into a formal report with methodology, sources,
    and observations.'
  id: totrans-742
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 处理：将研究结果编制成一份正式报告，包括方法、来源和观察结果。
- en: 'Output: A comprehensive report detailing the non-native zip codes of the species''
    occurrence.'
  id: totrans-743
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 输出：一份详细的报告，详细说明物种出现的非本地邮政编码。
- en: '|'
  id: totrans-744
  prefs: []
  type: TYPE_NORMAL
  zh: '|'
- en: 'Now let’s go back to ChatGPT 4 and ask it to solve the original problem using
    the business process defined by the Process Designer GPT:'
  id: totrans-745
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们回到ChatGPT 4，并要求它使用Process Designer GPT定义的业务流程解决原始问题：
- en: '| UserSolve this problem: "I’m researching species that became invasive after
    people who kept them as pets released them…" using this method "Business Process:
    Tracking Invasive Species Spread Due to Pet Release 1\. Problem Identification
    Input…"ChatGPTThe species of fish popularised by the movie "Finding Nemo" is the
    clown anemonefish, scientifically known as Amphiprion ocellaris. This species,
    noted for its striking orange coloration with three white bars, is native to the
    Indo-Pacific Ocean, typically found in tropical marine habitats associated with
    rocky or coral reefs.Regarding its non-native occurrences in the United States,
    the USGS Nonindigenous Aquatic Species Database provides specific information.
    This database monitors, records, and analyses sightings of nonindigenous aquatic
    plant and animal species throughout the United States. It''s a comprehensive source
    for tracking the spread of non-native species, including the clown anemonefish.According
    to the USGS data, there was a recorded instance of Amphiprion ocellaris in the
    United States prior to 2020\. This occurrence was in Florida, specifically in
    Pinellas County. The fish was collected in July 2018 at Fred Howard Park. The
    USGS database categorises this introduction as likely due to an aquarium release.
    Following its discovery, the specimen was removed alive and transferred to the
    Clearwater Marine Aquarium.For the purpose of your research which requires zip
    codes, the relevant zip code for Fred Howard Park, Pinellas County, Florida, where
    the clown anemonefish was found, is 34689.It''s important to note that the USGS
    database is a dynamic tool, regularly updated with new data to ensure accuracy
    and relevance. It includes not only occurrences but also interactive maps, species
    profiles, and detailed information about each species'' introduction and impact
    on local ecosystems.This information underscores the importance of responsible
    pet ownership and the potential ecological impacts of releasing non-native species
    into local environments. The spread of such species can have unforeseen and often
    detrimental effects on native biodiversity and ecosystems.For further details
    and research, you can explore the USGS Nonindigenous Aquatic Species Database
    directly[ here](http://nas.er.usgs.gov/). |'
  id: totrans-746
  prefs: []
  type: TYPE_TB
  zh: '| 用户解决以下问题：“我正在研究那些被人们作为宠物饲养后释放而成为入侵物种的物种……”使用这种方法“业务流程：追踪宠物释放导致的入侵物种传播 1.
    问题识别输入……”ChatGPT电影《海底总动员》中流行的鱼类物种是拟态海葵鱼，学名为Amphiprion ocellaris。这种物种以其醒目的橙色和三条白色条纹而著称，原产于印度-太平洋
    Ocean，通常生活在与岩石或珊瑚礁相关的热带海洋栖息地。关于其在美国的非本地发生情况，美国地质调查局非本地水生物种数据库提供了具体信息。该数据库监控、记录和分析美国全境非本地水生植物和动物物种的发现。它是追踪非本地物种传播的全面资源，包括拟态海葵鱼。根据美国地质调查局的数据，在2020年之前记录了Amphiprion
    ocellaris在美国的实例。这一发生是在佛罗里达州，具体在皮内拉斯县。该鱼于2018年7月在弗雷德·霍华德公园被收集。美国地质调查局数据库将该引入归类为可能由于水族馆释放。在其发现之后，该样本被活捉并转移到了清水海洋水族馆。为了您的研究需要，您需要找到佛罗里达州皮内拉斯县弗雷德·霍华德公园的邮政编码，该公园是发现拟态海葵鱼的地方，邮政编码为34689。值得注意的是，美国地质调查局数据库是一个动态工具，定期更新新数据以确保准确性和相关性。它不仅包括发生情况，还包括交互式地图、物种简介以及每个物种引入和对其当地生态系统影响的详细信息。这些信息强调了负责任宠物饲养的重要性以及将非本地物种释放到当地环境中的潜在生态影响。这种物种的传播可能对本地生物多样性和生态系统产生不可预见且往往有害的影响。有关更多细节和研究，您可以直接探索美国地质调查局非本地水生物种数据库[这里](http://nas.er.usgs.gov/)。
    |'
- en: This time, ChatGPT’s answer of 34689, is exactly correct.
  id: totrans-747
  prefs: []
  type: TYPE_NORMAL
  zh: 这次，ChatGPT给出的答案34689，完全正确。
- en: By decomposing the original problem statement into a discrete sequence of steps
    that the AI must solve to reach the answer (i.e. by creating a pseudo-business
    process) we allow ChatGPT to think the problem through step-by-step and to reach
    the correct answer.
  id: totrans-748
  prefs: []
  type: TYPE_NORMAL
  zh: 通过将原始问题陈述分解为AI必须解决以到达答案的离散步骤序列（即通过创建伪业务流程），我们允许ChatGPT逐步思考问题并达到正确答案。
- en: This effectively demonstrates that by using CoT Prompting we can “amplify” the
    power of a generative AI such as ChatGPT 4, and allow it to solve problems that
    appear out of its reach initially.
  id: totrans-749
  prefs: []
  type: TYPE_NORMAL
  zh: 这有效地证明了通过使用CoT提示，我们可以“放大”像ChatGPT 4这样的生成式AI的力量，并允许它解决最初看似超出其能力范围的问题。
