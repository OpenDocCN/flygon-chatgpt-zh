    are 3x2, followed by a set of invocations of the reshape() method that reshapes
    the contents of x. The first invocation of the reshape() method changes the shape
    of x from 3x2 to 2x3\. The second invocation changes the shape of x from 2x3 to
    6x1\. The third invocation changes the shape of x from 1x6 to 6x1\. The final
    invocation changes the shape of x from 6x1 to 1x6 again.'
  id: totrans-907
  prefs: []
  type: TYPE_NORMAL
  zh: '[列表 2.17](#list2-17) 包含一个名为 x 的 NumPy 数组，其维度为 3x2，随后是一系列对 reshape() 方法的调用，这些调用改变了
    x 的内容。第一次调用 reshape() 方法将 x 的形状从 3x2 改变为 2x3。第二次调用将 x 的形状从 2x3 改变为 6x1。第三次调用将
    x 的形状从 1x6 改变为 6x1。最后一次调用将 x 的形状再次从 6x1 改变为 1x6。'
- en: 'Each invocation of the reshape() method is followed by a print() statement
