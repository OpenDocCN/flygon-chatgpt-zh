- en: '13'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Writing and Maintaining Unit Tests
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: The task of software engineering can be interpreted as the ability to deliver
    quality products that contribute to the business value of customers. In this age
    of technology, customers have high standards and demand excellence.
  prefs: []
  type: TYPE_NORMAL
- en: 'The notion of quality has been interpreted in different ways over the years.
    However, here are two key aspects:'
  prefs: []
  type: TYPE_NORMAL
- en: That it must meet the user requirements
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: It must be free of defects
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: These two requirements are captured by verification and validation processes,
    which assert that the software achieves the intended goal without any defects.
    There are many software engineering techniques that aim to achieve these goals,
    including code reviews, pair programming, and so on, but the most common is testing.
    Although there are many books that focus on the art and practice of software testing,
    this chapter focuses on unit testing, which is the most widely used approach.
    **Test-driven development** (**TDD**) is a popular agile approach for software
    development. Rather than writing the code first and ensuring it functions correctly
    with unit tests, TDD involves writing the unit test cases first and subsequently
    writing the minimum code that passes the tests. Proponents of the practice claim
    superior code quality and an inherently testable design. In this chapter, we will
    refer to the primary code under development as the **implementation code**, and
    the unit tests as the **test code**.
  prefs: []
  type: TYPE_NORMAL
- en: With GenAI coding, one can argue that testing is even more critical than conventional
    programming. The generative AI process involves crafting code based on comments
    and/or method signatures from other code, which lacks the precision that a developer
    would normally apply, given the trade-off for supercharged, faster coding. Unit
    testing serves as a check that the code functions correctly, as specified by tests.
    Combined with code inspection while creating the code, it offers a check of correctness.
  prefs: []
  type: TYPE_NORMAL
- en: 'This chapter is dedicated to working with both GitHub Copilot and ChatGPT to
    supercharge our creation of unit tests. In this chapter, we will cover the following
    topics:'
  prefs: []
  type: TYPE_NORMAL
- en: Unit tests with GenAI
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Data-driven tests
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Test-driven development
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Sample data creation with GenAI
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Practical insights
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Technical requirements
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'To get the most out of this chapter, ensure you have the following:'
  prefs: []
  type: TYPE_NORMAL
- en: A GitHub account
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Access to your preferred IDE – either VS Code or PyCharm
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Access to the book’s repository available at [https://github.com/PacktPublishing/Supercharged-Coding-with-Gen-AI](https://github.com/PacktPublishing/Supercharged-Coding-with-Gen-AI)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A virtual environment set up in your preferred IDE, VS Code, or PyCharm
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: For assistance setting up a GitHub Copilot account, refer to [*Chapter 3*](Chapter_3.xhtml#_idTextAnchor108).
    For instructions on setting up OpenAI API access and token generation, see [*Chapter
    2*](Chapter_2.xhtml#_idTextAnchor061). If you need help creating an OpenAI account
    or setting up a virtual environment in your IDE, refer to the *Appendix* for detailed
    guidance.
  prefs: []
  type: TYPE_NORMAL
- en: Unit tests with GenAI
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: GenAI can save considerable time in writing unit tests. As the name suggests,
    each unit test is designed to test a single unit or aspect of the code. In fact,
    they are focused on the smallest fragments of code that can be separated and tested
    in isolation. Together, they provide confidence that the code functions correctly
    at the component level and provide an early signal of issues when the code is
    refactored. The same developer typically writes the code implementation and unit
    tests. The unit tests prove that the code functions correctly, as understood,
    and may also help define the requirements.
  prefs: []
  type: TYPE_NORMAL
- en: By their nature, unit tests require a deep understanding of the business and
    software requirements and how each method fulfills those requirements. One must
    consider the intended functionality as well as the variety of edge cases for each
    method separately and incorporate those into the test framework. This includes
    decisions on the test framework, method call, test nomenclature, assertion form,
    and the actual test. IDEs can certainly help with the test framework, but the
    actual test requires developer time, thought, and perhaps a strategy. These often
    become hurdles for junior or less motivated developers who perhaps see them as
    superfluous to the core software coding task. The current GenAI tools provide
    two-way functionality in writing unit tests for existing code as a common approach
    or writing code from existing unit tests, which is TDD.
  prefs: []
  type: TYPE_NORMAL
- en: The GenAI capability is not a substitute for testers or testing, but makes skilled
    testers much more efficient. The developer can write more tests in less time and
    focus on the more complex cases. The generic and simpler unit tests can be written
    by GenAI, usually with high accuracy. However, if the resulting tests are incomplete,
    one can request or prompt the GenAI to create additional tests to provide better
    coverage and confidence in the code.
  prefs: []
  type: TYPE_NORMAL
- en: 'As example code, we use the concept of creating n-grams for a given text string,
    which we introduced in [*Chapter 6*](Chapter_6.xhtml#_idTextAnchor249). **N-grams**
    are simply adjacent groups of N letters starting at any and every point within
    a string without exceeding the left or right side of the string. For example,
    the 3-grams from the sequence “abcde” are [“abc”, “bcd”, “cde”]. Since we wanted
    to limit the range of possible characters, we only considered lowercase letters
    and spaces, but left tabs and line feeds. Uppercase letters were converted to
    lowercase, and both numbers and symbols were removed. Additionally, since English
    type uses single spaces, we replaced all adjacent spaces with a single space.
    This portion of the code is as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE272]'
  prefs: []
  type: TYPE_PRE
- en: 'The output of this function is a list of 3-grams that span the text input string:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE273]'
  prefs: []
  type: TYPE_PRE
- en: 'If we start unit testing and have not set up the testing framework, we can
    use GitHub Copilot Chat with the prompt `@workspace /setupTests`, which will present
    an option to use either of the two main frameworks: `pytest` or `unittest`, as
    shown in *Figure 13.1*. The instructions are useful if you are installing unittest
    for the first time.'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 13.1: @workspace /setupTests provides a choice of the two main test
    frameworks](../Images/B31534_13_1.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 13.1: @workspace /setupTests provides a choice of the two main test
    frameworks'
  prefs: []
  type: TYPE_NORMAL
- en: 'To generate unit tests, first select a single method from the implementation
    code, such as the `lowercase_remove_punct_numbers` code. Then, type the `@workspace
    /tests generate unit tests` command. Alternatively, explicitly type the name of
    the target method, such as `@workspace /tests generate unit tests for lowercase_remove_punct_numbers`,
    into the GitHub Copilot Chat. It will first explain the tests that it will generate
    and then write the corresponding unit test file. The test explanation is shown
    in *Figure 13.2*:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 13.2: The test plan from GitHub Copilot is provided along with the
    code for the method](../Images/B31534_13_2.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 13.2: The test plan from GitHub Copilot is provided along with the code
    for the method'
  prefs: []
  type: TYPE_NORMAL
- en: 'The user will be prompted to save the resulting test file. The following code
    shows an example of what the output unit tests may look like, although it will
    vary in order and even the number of tests:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE274]'
  prefs: []
  type: TYPE_PRE
- en: The test code is quite reasonable in the sense that it mostly proves that the
    regular expressions and lowercase are correct. The tests can be run from the parent
    level using the `python -m unittest test_lowercase_remove_punct_numbers.py` command.
  prefs: []
  type: TYPE_NORMAL
- en: 'Creating tests is an iterative process, and some of the test functions created
    by GenAI may be unnecessary or incorrect. In other cases, additional tests may
    be warranted, and the GitHub Copilot Editor Inline Chat is useful for creating
    those tests from within the test file. As an example, we used `/tests` with a
    request to include 10-digit phone numbers to prove they would be correctly handled,
    which produced inline code in the test file. This process is shown in *Figure
    13.3*:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 13.3: Using Editor Inline Chat within the test code to add a new test](../Images/B31534_13_3.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 13.3: Using Editor Inline Chat within the test code to add a new test'
  prefs: []
  type: TYPE_NORMAL
- en: In some cases, the Editor Inline Chat is more convenient since it will add directly
    to the code, whereas GitHub Copilot Chat may create a new test file. In either
    case, a request for a single test, such as a phone number or punctuation, may
    result in multiple additional tests. The developer can accept or reject these
    tests individually with the click of a button. Reviewing tests is important since
    the accuracy of the tests relates to the correctness of the code.
  prefs: []
  type: TYPE_NORMAL
- en: Rather than write tests for each method separately, the entire file can be converted
    into unit tests. Using GitHub Copilot chat and the `@workspace /tests create unit
    tests for ngrams.py` command, Copilot will often, but not always, produce a test
    plan for each of the methods in `ngrams.py`. Then, it will create an output test
    file that you must name to save. Using the `unittest` conventions, each method
    will have its own class of one or more unit tests within that file. The full set
    of tests is not shown here but can be found in the `test_ngrams.py` file in the
    book’s GitHub repository.
  prefs: []
  type: TYPE_NORMAL
- en: 'There are guidelines for adding additional tests to the test file using a comment
    format. By typing a comment (starting with `#` in Python), GitHub Copilot reads
    the comment and suggests code. Although it should be equivalent, we have found
    this approach to sometimes be less accurate than using the Editor Inline Chat
    or GitHub Copilot Chat. As shown in *Figure 13.4*, the expected answer incorrectly
    includes numbers that should have been removed:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 13.4: This test, generated from the #comment, incorrectly includes
    numbers](../Images/B31534_13_4.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 13.4: This test, generated from the #comment, incorrectly includes numbers'
  prefs: []
  type: TYPE_NORMAL
- en: Revising the test with the `#test create_ngrams with a 10-digit phone number
    and make sure the numbers are removed` request resulted in fewer numbers included
    in the test. However, the variability of the unit tests with correct and incorrect
    responses means that checking them must be part of the verification process.
  prefs: []
  type: TYPE_NORMAL
- en: If we repeat a similar process of adding a zip code of the form 12345-6789 using
    the Editor Inline Chat feature, the results are more promising, as shown in *Figure
    13.5*. Not only did it correctly produce the test, but it also added several additional
    tests. However, as a note of caution, the Inline Chat did not always produce accurate
    tests and sometimes incorrectly included numbers.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 13.5: The tests from Editor Inline Chat produced a correct test and
    others as well](../Images/B31534_13_5.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 13.5: The tests from Editor Inline Chat produced a correct test and
    others as well'
  prefs: []
  type: TYPE_NORMAL
- en: This section has described how GitHub Copilot can create unit tests from the
    implementation code, either for a single method or an entire file. The next section
    describes how ChatGPT can achieve similar results.
  prefs: []
  type: TYPE_NORMAL
- en: ChatGPT for testing
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'ChatGPT can also be used to write unit tests. An example prompt to write Python
    unit tests is as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE275]'
  prefs: []
  type: TYPE_PRE
- en: Applying this template to the `ngrams.py` code produced seven different tests
    without further elaboration. The file is listed in `test_ngrams_chatgpt.py` in
    the GitHub repository for the book. One of the tests created was incorrect and
    subsequently failed, as shown in *Figure 13.6*. The test incorrectly suggests
    that a `$` and `s` are equivalent, instead of replacing the dollar symbol with
    a space.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 13.6: ChatGPT produced one incorrect test out of seven for ngrams.py](../Images/B31534_13_6.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 13.6: ChatGPT produced one incorrect test out of seven for ngrams.py'
  prefs: []
  type: TYPE_NORMAL
- en: 'When prompted `Are there additional tests that should be included?`, ChatGPT
    produced an additional set of tests shown in *Figure 13.7*, each with code, and
    offered to convert them into a code library:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 13.7: Additional ChatGPT tests that it suggested when prompted](../Images/B31534_13_7.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 13.7: Additional ChatGPT tests that it suggested when prompted'
  prefs: []
  type: TYPE_NORMAL
- en: 'As a supplement to the unit tests, additional tests can also be run directly
    within ChatGPT and included in the overall test suite. The `test_ngrams_chatgpt_extra.py`
    file in the GitHub repository shows the tests generated. In addition to running
    the tests in ChatGPT, this platform also explains why tests fail. *Figure 13.8*
    presents a valuable discussion of the test failure and the handling of tabs and
    newlines, which could be a failed test or an issue with the original code. Such
    insight into the code will help improve the overall quality. ChatGPT made suggestions
    to change the tests and rerun them:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 13.8: Explanation of a failed text from ChatGPT](../Images/B31534_13_8.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 13.8: Explanation of a failed text from ChatGPT'
  prefs: []
  type: TYPE_NORMAL
- en: ChatGPT is clearly effective at writing unit tests, even if it requires multiple
    requests. It is also possible to write other kinds of tests, such as data-driven
    tests, which is the topic of the next section.
  prefs: []
  type: TYPE_NORMAL
- en: Data-driven tests
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'The GitHub Copilot or ChatGPT prompt can enable data-driven or random testing
    that supplements the unit test coverage. Using the `Generate data driven tests
    for lowercase_remove_punct_numbers` prompt with Copilot gave the following code:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE276]'
  prefs: []
  type: TYPE_PRE
- en: This file can be found as `test_data_driven_ngrams.py` in the book’s GitHub
    repository. This example and the unit tests in the previous section show how GenAI
    can create tests from the implementation code. GitHub Copilot and ChatGPT use
    this code to identify meaningful test cases, including many edge cases. To improve
    the coverage, additional tests can be written manually, semi-manually with GenAI,
    or by simply requesting additional tests. These unit tests can be extended similarly
    to other types of testing, such as integration testing, performance testing, and
    A/B testing.
  prefs: []
  type: TYPE_NORMAL
- en: As discussed in these two sections, both unit tests and data-driven tests can
    be written using GenAI from the implementation code. While creating test code
    from the implementation code works, one should consider writing the tests first
    rather than the implementation. This approach is called test-driven development
    and is described in the next section.
  prefs: []
  type: TYPE_NORMAL
- en: Test-driven development
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: '**Test-driven development** (**TDD**) is one component of the **Extreme Programming**
    (**XP**) agile software methodology proposed by Kent Beck in the 1990s. Two of
    his books can be found in the *Further reading* section. The main concept of TDD
    is that the unit tests are written first and subsequently fail since there is
    no code to support them. The software engineer then writes the code until the
    tests pass. It is widely accepted that this practice improves code design and
    enhances testability. Empirical studies such as that by Mäkinen & Jürgen Münch
    ([https://link.springer.com/chapter/10.1007/978-3-319-03602-1_10](https://link.springer.com/chapter/10.1007/978-3-319-03602-1_10))
    generally support the value of TDD. The approach also focuses the software engineer
    on passing tests rather than adding other features.'
  prefs: []
  type: TYPE_NORMAL
- en: Whether to write tests first or last often becomes a religious debate with devout
    followers on either side. We will not attempt to resolve the issue here. If we
    believe that GenAI always writes perfect code that exactly and cleanly meets all
    the requirements, then it does not matter whether the tests or the code are used
    to write the other. A recent 2024 IEEE study by Jiri et al. ([https://ieeexplore.ieee.org/document/10685204](https://ieeexplore.ieee.org/document/10685204))
    showed that unit tests written by humans have fewer errors than unit tests by
    GenAI, but the technology is advancing rapidly and closing this gap. This leaves
    us with a conundrum that the code may be flawed, and the tests may not be perfect,
    yet we need both to be accurate. The more common convention of software engineers
    is to write the code using GenAI and then use GenAI to write the tests, which
    mirrors their development practice. With TDD, there is a potential to write the
    perfect tests, perhaps with GenAI, and then use GenAI to prove that the implementation
    passes the tests and their perceived requirements. In fact, we can go further
    and use GenAI to iterate and craft the code that meets these requirements.
  prefs: []
  type: TYPE_NORMAL
- en: 'As an example for this section, we will use the intersection of two rectangles
    problem, which simply identifies the overlapping area between two rectangles.
    To simplify the problem, we restrict the rectangle definition to use two points—the
    *x* and *y* coordinates of the lower-left and upper-right corners of the rectangle.
    In our notation, the rectangle is represented as (*xll*, *yll,* *xur*, *yur*)
    as shown in *Figure 13.9*:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 13.9: Intersecting rectangle problem](../Images/B31534_13_9.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 13.9: Intersecting rectangle problem'
  prefs: []
  type: TYPE_NORMAL
- en: 'Rather than immediately start coding the result, we will instead consider the
    various test cases, which are broken down into the following:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Intersecting rectangles (*Figure 13.10*):'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 13.10: Example test cases for overlapping rectangles](../Images/B31534_13_10.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 13.10: Example test cases for overlapping rectangles'
  prefs: []
  type: TYPE_NORMAL
- en: 'Non-intersecting rectangles (*Figure 13.11*):'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 13.11: Example test cases for non-overlapping rectangles](../Images/B31534_13_11.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 13.11: Example test cases for non-overlapping rectangles'
  prefs: []
  type: TYPE_NORMAL
- en: 'Invalid rectangles (*Figure 13.12*):'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 13.12: Example test cases for invalid rectangles that fail our definition](../Images/B31534_13_12.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 13.12: Example test cases for invalid rectangles that fail our definition'
  prefs: []
  type: TYPE_NORMAL
- en: 'As part of the TDD process, we begin by coding the unit tests using GenAI.
    Using descriptive test names facilitates the accurate creation of the test code.
    A few tests are shown to illustrate the idea in the following code snippet (the
    full file with 21 unit tests is available in the book’s GitHub repository as `test_rectangle_intersection.py`):'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE277]'
  prefs: []
  type: TYPE_PRE
- en: 'For the tests to appropriately fail as the next step of the TDD process, we
    need a stub file, `rectangle_intersection.py`, containing `rect_intersection_area(rect1,
    rect)`, which arbitrarily returns `None`. An example of this code is shown as
    follows and is stored as `rectangle_intersection.py` in the same folder. These
    names are based on the `import` statement at the beginning of the preceding test
    file code, as shown:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE278]'
  prefs: []
  type: TYPE_PRE
- en: With the TDD process, we have encoded the requirements of the code as tests.
    The only missing piece is the actual implementation. Normally, we would iterate
    between writing the implementation and running the tests to ensure that the code
    functions as expected. Using GenAI, we can replace this process with a request
    to GenAI to iteratively write the code until it passes all the tests. We will
    discuss how this can be achieved using GitHub Copilot in both VS Code and PyCharm
    IDEs, and then show the TDD approach using ChatGPT.
  prefs: []
  type: TYPE_NORMAL
- en: TDD using GitHub Copilot within VS Code
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'The TDD approach within VS Code is arguably the most straightforward. First,
    we ensure that both `rectangle_intersection.py` and `test_rectangle_intersection.py`
    are open, then run the latter unit test file. Then, we can use this command in
    the Copilot chat window:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE279]'
  prefs: []
  type: TYPE_PRE
- en: 'This produces an updated set of code in the same chat window that we copied
    and pasted as a replacement for the `rectangle_intersection.py` implementation.
    This is shown as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE280]'
  prefs: []
  type: TYPE_PRE
- en: Running the same unit tests against this new implementation reduced the number
    of tests that failed from 21 to 9\. Most of the failures are caused by the lack
    of exceptions raised for invalid rectangles. These were included in the tests
    but ignored by the GenAI.
  prefs: []
  type: TYPE_NORMAL
- en: 'We repeated the process with the same `/fix` command to produce the next iteration
    of code implementation, but the errors persisted. In some cases, running the process
    two or three times resolved the errors. In other cases, we needed to manually
    revise the `/fix` command with more explicit instructions:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE281]'
  prefs: []
  type: TYPE_PRE
- en: 'The generated implementation passed all the unit tests and is shown as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE282]'
  prefs: []
  type: TYPE_PRE
- en: In this section, we used a simple one-line command within the VS Code chat to
    create an implementation. It uses the implementation code, unit tests, and the
    output of the tests directly to write an improved version of the implementation
    code.
  prefs: []
  type: TYPE_NORMAL
- en: TDD using GitHub Copilot within PyCharm
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Using the TDD approach within PyCharm is not quite as simple as with VS Code.
    As of January 2025, GitHub Copilot cannot access PyCharm’s terminal window, which
    means it cannot access the failed unit tests directly. The output of failed tests
    informs Copilot what needs to be fixed in the implementation, and so this is a
    critical component. As a solution, we can paste the error message of the failed
    messages into the GitHub Copilot chat window:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE283]'
  prefs: []
  type: TYPE_PRE
- en: This prompt, whether used in an inline chat or a chat window, should generate
    a fully functional implementation that passes the unit tests.
  prefs: []
  type: TYPE_NORMAL
- en: For TDD with PyCharm, we need to use a more complete template call within the
    chat that passes the output of the failed unit tests. With this information, as
    well as the implementation and test code, a new version of the implementation
    code aims to solve the issues and pass the unit tests. A similar approach can
    be used with ChatGPT, which will be described next.
  prefs: []
  type: TYPE_NORMAL
- en: TDD using ChatGPT
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'As part of the TDD process, ChatGPT can also be used to generate improved implementation
    code based on the combination of the existing implementation code, unit test code,
    and the errors or results of the unit test execution. We use triple brackets to
    enclose each of these components:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE284]'
  prefs: []
  type: TYPE_PRE
- en: In this instance, ChatGPT produced the following output code, which is similar
    but mildly different from the GitHub Copilot output. ChatGPT explained the implementation,
    and all the created tests passed in the first iteration.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE285]'
  prefs: []
  type: TYPE_PRE
- en: If the tests had not passed, the new code would need to be copied and pasted
    into the IDE, replacing the previous version. The unit tests would need to be
    rerun against the new code. The revised implementation code and resulting unit
    test errors must be copied again into the ChatGPT template.
  prefs: []
  type: TYPE_NORMAL
- en: The advantage of the TDD approach is that it asserts that the implementation
    is correct based on the fact that the code passes the unit tests. The code produced
    in this simple example is quite reasonable, but more complex tasks may produce
    functional code of lower quality. In such cases, the code should be refactored.
    However, this is much easier with a full set of tests that continue to prove the
    code is meeting the functional requirements.
  prefs: []
  type: TYPE_NORMAL
- en: Whether TDD is the ideal strategy is still up for debate. Without TDD, the user
    focuses on the implementation, from which the GenAI can certainly create reasonable
    tests. As we observed, some of the tests may fail, and some may indicate limitations
    of the implementation. The software developer must then understand all the tests
    and provide enough logical coverage to be confident in the implementation. With
    TDD, the cognitive effort is in assuring the tests are sufficient, from which
    code can be generated. If the GenAI provides an implementation, the most the developer
    will have to do is refactor the code.
  prefs: []
  type: TYPE_NORMAL
- en: Whether the code or tests are written first, the tests often require meaningful
    datasets. The next section describes how GenAI can be used to create realistic
    data.
  prefs: []
  type: TYPE_NORMAL
- en: Sample data creation with GenAI
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'One aspect of testing is the availability of data that is representative of
    the kind you will encounter in the wild. If you have been involved in creating
    mock data in years past, you will certainly appreciate GenAI approaches to this
    problem. The new techniques can create a variety of types of data with as specific
    a prompt as you need. For example, the following prompt works in either ChatGPT
    or GitHub Copilot:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE286]'
  prefs: []
  type: TYPE_PRE
- en: The resulting table output is shown in *Figure 13.13*, which includes typical
    names, address formats, diseases, and so on. This kind of data can be saved to
    a file and used for testing. Although such data could be generated on the fly,
    the purpose of unit testing is to create repeatable tests that achieve consistent
    results. Tests are usually added to a **regression test** package as part of the
    CI/CD methodology and rerun periodically to ensure that past errors do not recur
    as code versions evolve. Therefore, the data should be stored and reused.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 13.13: Example table of mock data produced by GitHub Copilot](../Images/B31534_13_13.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 13.13: Example table of mock data produced by GitHub Copilot'
  prefs: []
  type: TYPE_NORMAL
- en: 'Of course, the data is not limited to addresses but can be more technical,
    such as the `Create a FASTA file with 3 sequences of length 15 to 25 nucleotides`
    prompt, which returns three bioinformatics DNA sequences as shown in *Figure 13.14*:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 13.14: A FASTA bioinformatics sequence file with three DNA sequences](../Images/B31534_13_14.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 13.14: A FASTA bioinformatics sequence file with three DNA sequences'
  prefs: []
  type: TYPE_NORMAL
- en: As can be seen from the previous output, it suggests saving the file as a `.fasta`
    file. In fact, it can create and save data in any format, including tables, JSON,
    CSV, and so on.
  prefs: []
  type: TYPE_NORMAL
- en: 'Another use case that is often convenient when scripting is to create some
    temporary data for a function, perhaps in a Jupyter notebook. Consider the Euclidean
    distance method:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE287]'
  prefs: []
  type: TYPE_PRE
- en: 'GitHub Copilot used the `Create sample inputs for get_``euclidean``_distance()`
    prompt to produce a few samples of inputs that can be directly applied, as shown
    in *Figure 13.15*:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 13.15: GitHub Copilot creates example inputs for functions for informal
    testing](../Images/B31534_13_15.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 13.15: GitHub Copilot creates example inputs for functions for informal
    testing'
  prefs: []
  type: TYPE_NORMAL
- en: In the TDD process, developers write the unit test code first, and the implementation
    code is written to pass the unit tests. The unit tests can be written by developers
    using standard GenAI approaches to verify that the implementation code will meet
    the requirements. From either VS Code or PyCharm, GitHub Copilot can iteratively
    create the implementation code from the unit test code alone. ChatGPT offers similar
    functionality through a prompt template. The next section provides recommendations
    on how GenAI approaches can best be used to complete the implementation and test
    code.
  prefs: []
  type: TYPE_NORMAL
- en: Practical insights
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Testing has been a focus of technology from the templates of “vintage AI” to
    the present time with GenAI. There has always been a tendency to write the code
    and eventually write the tests to make it acceptable to your organization. These
    new GenAI tools can definitely increase the velocity of the coding process. The
    verification process to check the code should not be just a one-time visual inspection
    but should involve unit tests that can be applied repeatedly to assert the correctness
    of the code.
  prefs: []
  type: TYPE_NORMAL
- en: The different GenAI solutions produce slightly different results, but we generally
    prefer GitHub Copilot for creating tests since the close integration with the
    code and iterative approach is easier using the single tool within the IDE, whether
    VS Code or PyCharm. By keeping similar test code open in the browser, accuracy
    and style improve due to the extra context.
  prefs: []
  type: TYPE_NORMAL
- en: Regardless of the particular GenAI tool used, it is critical to check the implementation
    and test code. Using GenAI to create the test code from the implementation or
    vice versa helps minimize errors since the implementation code that passes unit
    tests achieves at least a first level of requirement verification. Failing unit
    tests provide a chance to rethink code requirements for the implementation and
    test code.
  prefs: []
  type: TYPE_NORMAL
- en: Summary
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: In this chapter, we explored various aspects of testing using GenAI. Although
    there are many types of tests and they are the topic of many books, the most common
    tests are unit tests. In unit testing, each test should test a single point of
    functionality and should be independent of other tests. Together, a complete set
    of unit tests proves that the code implementation functions as expected. If the
    code is refactored, augmented, or integrated in the future, the same unit tests
    assert the correctness of the functionality.
  prefs: []
  type: TYPE_NORMAL
- en: The chapter described a few approaches to creating tests from the implementation.
    GitHub Copilot and ChatGPT can both be used to easily write unit tests for a single
    method or an entire Python file. Both techniques have some variability in terms
    of the types of tests and coverage that they provide in a first pass. In some
    cases, the tests may not be correct and may need additional prompting or manual
    correction. In other scenarios, prompting may be useful to add further tests to
    improve the coverage of the edge cases. Developers must be cautious that the tests
    accurately capture the requirements and are sufficient to assert the correctness
    of the code.
  prefs: []
  type: TYPE_NORMAL
- en: TDD is a methodology from Extreme Programming where unit tests are written first
    and, by definition, fail. The implementation code is written to pass all the unit
    tests. GenAI can help suggest the test code, especially when descriptive method
    names are used. Using a set of tests, either GitHub Copilot or ChatGPT can iteratively
    generate the implementation code automatically. The process repeats until the
    unit tests pass. By writing the full set of tests first, the developer conveys
    the scope of the tests and behavior in various edge cases. The only required interaction
    with the generated implementation code is possibly refactoring it to improve quality,
    which is easier to achieve with the unit tests.
  prefs: []
  type: TYPE_NORMAL
- en: Two additional topics were covered in the chapter, which involved enriching
    data for tests. GenAI can create more elaborate tests by synthesizing different
    scenarios. Data-driven testing creates test pairs for inputs and outputs to test
    multiple scenarios. In addition, the technology can create realistic test sets
    applicable to a wide range of disciplines.
  prefs: []
  type: TYPE_NORMAL
- en: In the next chapter, we introduce ways that GenAI can identify capacity limits
    in terms of execution speed and memory management. We will also show how GenAI
    can optimize code to improve performance under these two constraints.
  prefs: []
  type: TYPE_NORMAL
- en: Quiz time
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'Before you proceed to the next chapter, make sure that you can confidently
    answer the following questions:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Question 1**: What are the advantages of TDD?'
  prefs: []
  type: TYPE_NORMAL
- en: '**Answer**: TDD, or test-driven development, is a methodology where the tests
    are written first, and the implementation code follows. The tests cover the range
    of required functionality and edge cases to ensure they meet expectations. Using
    TDD ensures that the tests are written and that the code (written by humans or
    GenAI) functions correctly. Empirical results show that the implementations are
    generally structured better and are more amenable to tests.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Question 2**: If software includes both implementation and unit tests, does
    it need to be manually verified?'
  prefs: []
  type: TYPE_NORMAL
- en: '**Answer**: Without question, a full set of unit tests and correct implementation
    help identify failures or misinterpretations of the requirements. A failed test
    is likely due to a flawed test or a flawed implementation and provides an opportunity
    to review the requirements. While testing helps identify such issues, we have
    observed many cases where the generated tests lack full coverage and may be incorrect.
    Similarly, there are numerous examples of incorrect implementations. The authors
    recommend manual verification in addition to complete unit tests.'
  prefs: []
  type: TYPE_NORMAL
- en: Further reading
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'Kent Beck’s book on extreme programming. 2000\. *Extreme Programming Explained:
    Embrace Change*.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Kent Beck’s book on test-driven development. 2002\. *Test-Driven Development
    by Example*.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Effects of Test-Driven Development: A Comparative Analysis of Empirical Studies*.
    Simo Mäkinen & Jürgen Münch: [https://link.springer.com/chapter/10.1007/978-3-319-03602-1_10](https://link.springer.com/chapter/10.1007/978-3-319-03602-1_10)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Leveraging Large Language Models for Python Unit Test*. Medlen Jiri, Bari
    Emese, Patrick Medlen. 2024: [https://ieeexplore.ieee.org/document/10685204](https://ieeexplore.ieee.org/document/10685204).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '|'
