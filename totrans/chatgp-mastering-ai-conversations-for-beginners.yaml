  id: totrans-884
  prefs: []
  type: TYPE_NORMAL
  zh: '**底部行文说明**：ChatGPT会记录你的对话。因此，任何个人信息、上传的文件或你输入到聊天框中的提示线程都会保留在那里。在获取了大量关于ChatGPT因这一特性可能带来的网络安全风险的反馈后，OpenAI已经添加了一些方式，让你在使用他们的聊天框时，至少能保留一定程度的对隐私的控制。如果你进入ChatGPT的设置并滚动到数据控制，你会找到一个名为“聊天历史和训练”的选项。如果你禁用此选项，那么你与生成式AI的聊天历史将不会记录。这一功能是在2023年4月20日引入的，标志着OpenAI在尝试并帮助你使用他们的软件时保持安全和安全方面迈出的重要一步。然而，即使你禁用了此功能，仍然不建议与聊天框分享任何个人信息或敏感信息。'
