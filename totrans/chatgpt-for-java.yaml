  zh: 响应。ChatGPTClient.java
- en: As you examine the preceding code listing, you see that the HTTP calls are done
    using pure Java APIs and not using any external libraries – just like I requested
    in the prompt. Note, however, that creating and parsing JSON objects in pure Java
    can be a pain, so I personally specified that the Jackson API should be used,
    which (as you can see) is reflected in the imports statements and the code itself.
  id: totrans-293
  prefs: []
  type: TYPE_NORMAL
  zh: 当你检查前面的代码列表时，你会发现 HTTP 调用是使用纯 Java API 完成的，而不是使用任何外部库——正如我在提示中请求的那样。然而，请注意，在纯
    Java 中创建和解析 JSON 对象可能会很痛苦，所以我个人指定了应该使用 Jackson API，这在导入语句和代码本身中都有体现。
- en: The resulting code includes two inner classes, Chat and Message, which can easily
    be separated into separate Java files. I can either do that manually myself, or
    add a new “User” message to ChatGPT to request the inner classes to be separated
    into distinct Java files.
  id: totrans-294
