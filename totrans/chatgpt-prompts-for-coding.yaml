  id: totrans-514
  prefs: []
  type: TYPE_NORMAL
  zh: '"编写移动银行应用资金转账功能的测试用例。包括有效和无效输入、网络断开和 UI 响应性的场景。讨论测试移动应用时独特的挑战。"'
- en: '20: Automating Regression Tests'
  id: totrans-515
  prefs: []
  type: TYPE_NORMAL
  zh: '20: 自动化回归测试'
- en: 'Prompt:'
  id: totrans-516
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Write a script to automate regression testing of a product search feature
    in a web application. Include steps for setting up the test environment, running
    the tests, and validating results. Discuss the benefits of automating regression
    tests in agile development."'
  id: totrans-517
  prefs: []
  type: TYPE_NORMAL
  zh: '"编写自动化测试一个网络应用中产品搜索功能的脚本。包括设置测试环境、运行测试和验证结果的步骤。讨论在敏捷开发中自动化回归测试的好处。"'
- en: '21: Testing Data Integrity in Databases'
  id: totrans-518
  prefs: []
  type: TYPE_NORMAL
  zh: '21: 测试数据库中的数据完整性'
- en: 'Prompt:'
  id: totrans-519
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Write a plan for testing the integrity of data in a customer database. Include
