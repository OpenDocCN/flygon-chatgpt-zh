  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Managing Timeframes: Use Copilot for quick adjustments in data timeframes.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Creating and Customizing Visualizations: Request specific types of charts and
    further customize them as needed.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Leveraging Machine Learning for Formatting: Apply conditional formatting and
