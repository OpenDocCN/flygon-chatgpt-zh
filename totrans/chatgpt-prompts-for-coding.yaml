  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: '"用[Python/JavaScript等]编写一个程序，实现一个基本的计算器，具有加法、减法、乘法和除法等操作。包括对无效输入和除以零的错误处理。"'
- en: '22: Understanding Logical Operators'
