- en: '[9](15580-0006.xhtml#en17r). The intelligence of parrots is actually remarkable.
    Alex, a fully autonomous African gray parrot, was taught by Irene Pepperberg to
    recognize a variety of different colors, objects, materials, and actions, and
    could identify them in English with a vocabulary of over 100 words. Alex knew
    at least fifty individual objects, could count quantities of up to six, and understood
    the concept of zero. “Alex (parrot),” Wikipedia, accessed April 11, 2024, [https://en.wikipedia.org/wiki/Alex_(parrot)](https://en.wikipedia.org/wiki/Alex_(parrot)).'
  id: totrans-1776
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '[9](15580-0006.xhtml#en17r). 鹦鹉的智慧实际上非常惊人。Alex，一只完全自主的非洲灰鹦鹉，由Irene Pepperberg教授教它识别各种不同的颜色、物体、材料和动作，并能用超过100个单词的词汇用英语识别它们。Alex至少知道五十个不同的物体，能数到六的数量，并理解零的概念。“Alex（鹦鹉）,”
    维基百科，2024年4月11日查阅，[https://en.wikipedia.org/wiki/Alex_(parrot)](https://en.wikipedia.org/wiki/Alex_(parrot)).'
