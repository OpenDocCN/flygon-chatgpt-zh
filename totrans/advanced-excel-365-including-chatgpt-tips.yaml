- en: ■Creating Pivot Tables Using Power Pivot
  id: totrans-1458
  prefs: []
  type: TYPE_NORMAL
  zh: ■使用 Power Pivot 创建数据透视表
- en: Objectives
  id: totrans-1459
  prefs: []
  type: TYPE_NORMAL
  zh: 目标
- en: After studying this chapter, the reader will be able to create pivot tables,
    make different reports using pivot tables, and use advanced features of pivot
    tables.
  id: totrans-1460
  prefs: []
  type: TYPE_NORMAL
  zh: 学习本章后，读者将能够创建数据透视表，使用数据透视表制作不同的报告，并使用数据透视表的高级功能。
- en: Examining Pivot Tables
  id: totrans-1461
  prefs: []
  type: TYPE_NORMAL
  zh: 检查数据透视表
- en: The data on which a pivot table is based is called the Source Data. Each column
    represents a field or category of information, which you can assign to different
    parts of the pivot table to determine how the data is arranged. You can add four
    types of fields, which are further explained in [Table 9.1](#tab9-1).
  id: totrans-1462
  prefs: []
  type: TYPE_NORMAL
  zh: 数据透视表基于的数据称为源数据。每一列代表一个字段或信息类别，您可以将它们分配到数据透视表的不同部分以确定数据的排列方式。您可以添加四种类型的字段，这些字段在[表
    9.1](#tab9-1)中进一步解释。
- en: TABLE 9.1 Types of Field in Pivot Tables
  id: totrans-1463
  prefs: []
  type: TYPE_NORMAL
  zh: 表 9.1 数据透视表中的字段类型
- en: '| Field | Description |'
  id: totrans-1464
  prefs: []
  type: TYPE_TB
  zh: '| 字段 | 描述 |'
- en: '| Report Filter | Filter summarized data in PivotTable. If you select an item
    in the report filter, the view of PivotTable varies only to display summarized
    data related to that item. For example, if the area is a report filter, you can
    display short data for North, West, or all areas. |'
  id: totrans-1465
  prefs: []
  type: TYPE_TB
  zh: '| 报告过滤器 | 在数据透视表中筛选汇总数据。如果您在报告过滤器中选择一个项目，数据透视表视图将仅更改以显示与该项目相关的汇总数据。例如，如果该区域是报告过滤器，您可以显示北部、西部或所有区域的简短数据。|'
- en: '| Row Labels | Row shows items in the field as labels. For example, the row
    label quarters field contains values, which means that the table shows a line
    for each quarter. |'
  id: totrans-1466
  prefs: []
  type: TYPE_TB
  zh: '| 行标签 | 行显示字段中的项目作为标签。例如，行标签季度字段包含值，这意味着表格为每个季度显示一行。|'
- en: '| Column Labels | Column labels are the value of the product field, which means
    that the table shows a column for each product, in the field that displays the
    item as a column label. |'
  id: totrans-1467
  prefs: []
  type: TYPE_TB
  zh: '| 列标签 | 列标签是产品字段的值，这意味着表格为每个产品显示一个列，在显示项目作为列标签的字段中。|'
- en: '| ∑ Values | Summary data are included. These fields usually contain numeric
    data, such as sales and inventory. The area where the data appears is called the
    data area. |'
  id: totrans-1468
  prefs: []
  type: TYPE_TB
  zh: '| ∑ 值 | 包含汇总数据。这些字段通常包含数值数据，如销售和库存。数据出现的地方称为数据区域。|'
- en: 'Refer to [Figure 9.1](#fig9-1):'
  id: totrans-1469
  prefs: []
  type: TYPE_NORMAL
  zh: 参考图9.1：
- en: '![image](image/Figure_9.1.jpg)'
  id: totrans-1470
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image/Figure_9.1.jpg)'
- en: Figure 9.1 Fields of Pivot Tables
  id: totrans-1471
  prefs: []
  type: TYPE_NORMAL
  zh: 图9.1 数据透视表字段
- en: Select any cell in a data range that includes a heading for each column in the
    top row. In the Tables group, click the PivotTable button, or click the PivotTable
    list and select PivotTable. In the Table/Range box, select the range that contains
    the data to be used in the pivot table. Select the location for the pivot table.
    You can place the pivot table in a new or existing worksheet. Click OK to create
    the pivot table.
  id: totrans-1472
  prefs: []
  type: TYPE_NORMAL
  zh: 选择数据范围中的任何单元格，该范围包括顶部行中每列的标题。在“表格”组中，单击“数据透视表”按钮，或单击“数据透视表”列表并选择“数据透视表”。在“表格/范围”框中，选择包含要用于数据透视表中的数据的范围。选择数据透视表的位置。您可以将数据透视表放置在新工作表或现有工作表中。单击“确定”以创建数据透视表。
- en: You can add fields to a pivot table to specify the data you want to display.
    The fields of the source data appear in the “PivotTable Field List” task pane.
    To add fields, drag the relevant field from the top of the PivotTable Field List
    to one of the four areas at the bottom. You can add more than one field to an
    area, and you do not need to add all fields to the table.
  id: totrans-1473
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以向数据透视表添加字段以指定要显示的数据。源数据字段显示在“数据透视表字段列表”任务窗格中。要添加字段，将相关的字段从数据透视表字段列表的顶部拖动到底部四个区域之一。您可以将多个字段添加到区域中，并且不需要将所有字段添加到表中。
- en: 'To display data, use data in Row Labels list and numeric in Values:'
  id: totrans-1474
  prefs: []
  type: TYPE_NORMAL
  zh: 要显示数据，请使用行标签列表中的数据和值中的数值：
- en: 1. Activate the Insert tab, to open the Create PivotTable dialog box.
  id: totrans-1475
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 激活“插入”选项卡，以打开创建数据透视表对话框。
- en: 2. Add fields to headings. You need to place at least one field in the S Values
    area.
  id: totrans-1476
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 添加字段到标题。您需要在S值区域放置至少一个字段。
- en: After the field is in place, you can filter the information that appears in
    the table by selecting from the report in the Filter column, the filter rows,
    or the filter list. For example, you can show all the data values or restrict
    PivotTable to summarize just a few of them.
  id: totrans-1477
  prefs: []
  type: TYPE_NORMAL
  zh: 字段就位后，您可以通过从报告中的筛选列、筛选行或筛选列表中选择来筛选表中显示的信息。例如，您可以显示所有数据值或限制数据透视表仅汇总其中的一些。
- en: Recommended Pivot Table
  id: totrans-1478
  prefs: []
  type: TYPE_NORMAL
  zh: 推荐的数据透视表
- en: Check the recommendations for pivot. To see the recommendations, select the
    database and click the Insert tab. Click on the recommended pivot table options,
    as shown in [Figure 9.2](#fig9-2).
  id: totrans-1479
  prefs: []
  type: TYPE_NORMAL
  zh: 检查数据透视表的推荐。要查看推荐，请选择数据库并单击“插入”选项卡。单击如图9.2所示的推荐数据透视表选项。
- en: '![image](image/Figure_9.2.jpg)'
  id: totrans-1480
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image/Figure_9.2.jpg)'
- en: Figure 9.2 Recommended Pivot Table
  id: totrans-1481
  prefs: []
  type: TYPE_NORMAL
  zh: 图9.2 推荐的数据透视表
- en: Alternatively, simply select the data to make the pivot table. Click on the
    button in the lower right corner and select the table option to create the pivot
    report.
  id: totrans-1482
  prefs: []
  type: TYPE_NORMAL
  zh: 或者，只需选择数据以创建数据透视表。单击右下角的按钮，并选择表格选项以创建数据透视报表。
- en: Creating a Pivot Table
  id: totrans-1483
  prefs: []
  type: TYPE_NORMAL
  zh: 创建数据透视表
- en: To begin our analysis, we will create a pivot table using the provided sales
    data. Follow the steps mentioned earlier to set up a pivot table with the necessary
    fields, including REP, CUSTNAME, PRODUCT, DATE, QTY, CP, S.P., and NET. We will
    use these fields to analyze the sales data from various perspectives.
  id: totrans-1484
  prefs: []
  type: TYPE_NORMAL
  zh: 为了开始我们的分析，我们将使用提供的销售数据创建一个数据透视表。按照前面提到的步骤设置数据透视表，包括必要的字段，如REP、CUSTNAME、PRODUCT、DATE、QTY、CP、S.P.和NET。我们将使用这些字段从不同角度分析销售数据。
- en: Follow the steps below.
  id: totrans-1485
  prefs: []
  type: TYPE_NORMAL
  zh: 按照以下步骤操作。
- en: 1. Select the entire range of data, including headers. You can do this by clicking
    and dragging your cursor across the data or by using keyboard shortcuts (for example,
    Ctrl+A). Refer to [Figure 9.3](#fig9-3).
  id: totrans-1486
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 选择整个数据范围，包括标题行。您可以通过点击并拖动鼠标跨过数据或使用键盘快捷键（例如，Ctrl+A）来完成此操作。请参阅[图9.3](#fig9-3)。
- en: '![image](image/Figure_9.3.jpg)'
  id: totrans-1487
  prefs: []
  type: TYPE_IMG
  zh: '![image](image/Figure_9.3.jpg)'
- en: Figure 9.3 Sales Data
  id: totrans-1488
  prefs: []
  type: TYPE_NORMAL
  zh: 图9.3 销售数据
- en: 2. In Excel, go to the Insert tab on the ribbon menu, and then click on the
    PivotTable button, as shown in [Figure 9.4](#fig9-4).
  id: totrans-1489
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 在Excel中，转到功能区上的“插入”标签，然后单击“数据透视表”按钮，如图[图9.4](#fig9-4)所示。
- en: '![image](image/Figure_9.4.jpg)'
  id: totrans-1490
  prefs: []
  type: TYPE_IMG
  zh: '![image](image/Figure_9.4.jpg)'
- en: Figure 9.4 Insert PivotTable
  id: totrans-1491
  prefs: []
  type: TYPE_NORMAL
  zh: 图9.4 插入数据透视表
- en: 3. A Create PivotTable dialog box will appear. Ensure that the range of data
    you selected is correct, then choose where you want to place the pivot table (for
    example, a new worksheet or an existing worksheet). Refer to [Figure 9.5](#fig9-5).
  id: totrans-1492
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 将会弹出一个“创建数据透视表”对话框。确保您选择的数据范围正确，然后选择您想要放置数据透视表的位置（例如，新工作表或现有工作表）。请参阅[图9.5](#fig9-5)。
- en: 4. Click OK to create the pivot table.
  id: totrans-1493
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 点击“确定”以创建数据透视表。
- en: '![image](image/Figure_9.5.jpg)'
  id: totrans-1494
  prefs: []
  type: TYPE_IMG
  zh: '![image](image/Figure_9.5.jpg)'
- en: Figure 9.5 Table/Range
  id: totrans-1495
  prefs: []
  type: TYPE_NORMAL
  zh: 图9.5 表/范围
- en: 5. The pivot table field list will appear on the right side of the screen. This
    list contains the column headers from your sales data. Refer to [Figure 9.6](#fig9-6).
  id: totrans-1496
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 数据透视表字段列表将出现在屏幕的右侧。此列表包含您的销售数据中的列标题。请参阅[图9.6](#fig9-6)。
- en: '![image](image/Figure_9.6.jpg)'
  id: totrans-1497
  prefs: []
  type: TYPE_IMG
  zh: '![image](image/Figure_9.6.jpg)'
- en: Figure 9.6 Customer Quantity
  id: totrans-1498
  prefs: []
  type: TYPE_NORMAL
  zh: 图9.6 客户数量
- en: 6. Drag and drop the desired fields from the field list into the different areas
    of the pivot table.
  id: totrans-1499
  prefs: []
  type: TYPE_NORMAL
  zh: 6. 将所需的字段从字段列表拖放到数据透视表的不同区域。
- en: 7. Drag the CUSTNAME field to the Rows area to group the data by customer names.
  id: totrans-1500
  prefs: []
  type: TYPE_NORMAL
  zh: 7. 将CUSTNAME字段拖动到“行”区域以按客户名称分组数据。
- en: 8. Drag the QTY field to the Values area to calculate the total quantity sold.
  id: totrans-1501
  prefs: []
  type: TYPE_NORMAL
  zh: 8. 将QTY字段拖动到“值”区域以计算销售总量。
- en: Refer to [Figure 9.7](#fig9-7).
  id: totrans-1502
  prefs: []
  type: TYPE_NORMAL
  zh: 请参阅[图9.7](#fig9-7)。
- en: '![image](image/Figure_9.7.jpg)'
  id: totrans-1503
  prefs: []
  type: TYPE_IMG
  zh: '![image](image/Figure_9.7.jpg)'
- en: Figure 9.7 Value Field Settings
  id: totrans-1504
  prefs: []
  type: TYPE_NORMAL
  zh: 图9.7 值字段设置
- en: 9. You can change the summary function by clicking on the drop-down arrow next
    to the field name in the “Values” area and selecting a different calculation (for
    example, average, count). Refer to [Figure 9.8](#fig9-8).
  id: totrans-1505
  prefs: []
  type: TYPE_NORMAL
  zh: 9. 您可以通过点击“值”区域中字段名称旁边的下拉箭头并选择不同的计算（例如，平均值、计数）来更改汇总函数。请参阅[图9.8](#fig9-8)。
- en: '![image](image/Figure_9.8.jpg)'
  id: totrans-1506
  prefs: []
  type: TYPE_IMG
  zh: '![image](image/Figure_9.8.jpg)'
- en: Figure 9.8 Sum and Average
  id: totrans-1507
  prefs: []
  type: TYPE_NORMAL
  zh: 图9.8 总计和平均值
- en: Percent of Grand Total
  id: totrans-1508
  prefs: []
  type: TYPE_NORMAL
  zh: 总计百分比
- en: 'To find the percent of grand total, follow these steps:'
  id: totrans-1509
  prefs: []
  type: TYPE_NORMAL
  zh: 要查找总百分比，请按照以下步骤操作：
- en: 1. Right-click on any value in the Qty column of the pivot table.
  id: totrans-1510
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 在数据透视表的“数量”列中的任何值上右键单击。
- en: 2. Select Value Field Settings or Value Settings from the context menu.
  id: totrans-1511
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 从上下文菜单中选择“值字段设置”或“值设置”。
- en: 3. In the dialog box that appears, choose the option for % of Grand Total or
    Percentage of the total (exact wording may vary depending on your spreadsheet
    software).
  id: totrans-1512
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 在出现的对话框中，选择“总计百分比”或“总百分比”（确切措辞可能因您的电子表格软件而异）。
- en: 4. Click OK to apply the calculation.
  id: totrans-1513
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 点击“确定”以应用计算。
- en: 5. The pivot table will now display the percentage of the grand total for each
    customer or grouping in the Qty column.
  id: totrans-1514
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 现在，数据透视表将显示每个客户或分组在“数量”列中的总百分比。
- en: 'Refer to [Figure 9.9](#fig9-9):'
  id: totrans-1515
  prefs: []
  type: TYPE_NORMAL
  zh: 请参阅[图9.9](#fig9-9)：
- en: '![image](image/Figure_9.9.jpg)'
  id: totrans-1516
  prefs: []
  type: TYPE_IMG
  zh: '![image](image/Figure_9.9.jpg)'
- en: Figure 9.9 Percent of Grand Total
  id: totrans-1517
  prefs: []
  type: TYPE_NORMAL
  zh: 图9.9 总计百分比
- en: Group Items in a Pivot Table
  id: totrans-1518
  prefs: []
  type: TYPE_NORMAL
  zh: 在数据透视表中分组项目
- en: If you want to prepare a report based on the current data for the year or the
    yearly quarter, then you can use the group option in the pivot table. Follow the
    steps below.
  id: totrans-1519
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您想根据当前年度或年度季度数据准备报告，则可以使用数据透视表中的分组选项。请按照以下步骤操作。
- en: 1. Select any cell in a data range.
  id: totrans-1520
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 选择数据范围中的任何单元格。
- en: 2. Activate the Option tab.
  id: totrans-1521
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 激活“选项”标签。
- en: 3. Click on Group Field.
  id: totrans-1522
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 点击“分组字段”。
- en: 4. In the By box, click one or more time periods for the groups.
  id: totrans-1523
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 在“按”框中，单击一个或多个时间段以分组。
- en: Grouping of Dates
  id: totrans-1524
  prefs: []
  type: TYPE_NORMAL
  zh: 日期分组
- en: 'To group dates, follow these steps:'
  id: totrans-1525
  prefs: []
  type: TYPE_NORMAL
  zh: 要分组日期，请按照以下步骤操作：
- en: 1. Assuming you already have a pivot table created with the Date field in the
    Rows or Columns area, proceed to the next step.
  id: totrans-1526
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 假设您已经创建了一个包含日期字段在“行”或“列”区域的数据透视表，请继续下一步。
- en: 2. Right-click on any date value in the Date column of the pivot table.
  id: totrans-1527
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 在数据透视表的“日期”列中的任何日期值上右键单击。
- en: 3. In the context menu that appears, select Group or Group Field (the specific
    wording may vary depending on your spreadsheet software).
  id: totrans-1528
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 在出现的上下文菜单中，选择“分组”或“分组字段”（具体措辞可能因你的电子表格软件而异）。
- en: 4. In the Grouping dialog box, choose the Months option.
  id: totrans-1529
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 在“分组”对话框中，选择“月份”选项。
- en: 5. Click OK to apply the grouping.
  id: totrans-1530
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 点击“确定”以应用分组。
- en: 6. The pivot table will now display the Date column grouped by month, with each
    month appearing as a separate item in the pivot table.
  id: totrans-1531
  prefs: []
  type: TYPE_NORMAL
  zh: 6. 数据透视表现在将按月分组显示日期列，每个月份在数据透视表中作为一个单独的项目出现。
- en: Refer to [Figure 9.10](#fig9-10).
  id: totrans-1532
  prefs: []
  type: TYPE_NORMAL
  zh: 参考图[图9.10](#fig9-10)。
- en: '![image](image/Figure_9.10.jpg)'
  id: totrans-1533
  prefs: []
  type: TYPE_IMG
  zh: '![image](image/Figure_9.10.jpg)'
- en: Figure 9.10 Grouping of Dates
  id: totrans-1534
  prefs: []
  type: TYPE_NORMAL
  zh: 图9.10 日期分组
- en: Monthly Report
  id: totrans-1535
  prefs: []
  type: TYPE_NORMAL
  zh: 月度报告
- en: The monthly report can be seen in the following [Figure 9.11](#fig9-11).
  id: totrans-1536
  prefs: []
  type: TYPE_NORMAL
  zh: 月度报告可以在以下[图9.11](#fig9-11)中查看。
- en: '![image](image/Figure_9.11.jpg)'
  id: totrans-1537
  prefs: []
  type: TYPE_IMG
  zh: '![image](image/Figure_9.11.jpg)'
- en: Figure 9.11 Monthly Report
  id: totrans-1538
  prefs: []
  type: TYPE_NORMAL
  zh: 图9.11 月度报告
- en: Create a Graph Using Pivot Data
  id: totrans-1539
  prefs: []
  type: TYPE_NORMAL
  zh: 使用数据透视表创建图表
- en: You can use a PivotChart to graphically display data from a PivotTable. A single
    PivotChart provides different views of the same data. When you create a PivotChart,
    the row fields of the PivotTable become the categories, and the column fields
    become the series.
  id: totrans-1540
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以使用数据透视表图表来图形化显示数据透视表中的数据。单个数据透视表图表提供了相同数据的多个视图。当你创建数据透视表图表时，数据透视表的行字段成为类别，列字段成为系列。
- en: To create a PivotChart, select any cell within a PivotTable, and click Chart
    in the Tools group on the Options tab. Select Options for the chart as you would
    for a standard chart, then click OK. You can also create a new PivotChart and
    PivotTable at the same time by selecting a cell in the source data and selecting
    PivotChart from the PivotTable list in the Tables group on the Insert tab. Refer
    to [Figure 9.12](#fig9-12).
  id: totrans-1541
  prefs: []
  type: TYPE_NORMAL
  zh: 要创建数据透视表图表，选择数据透视表中的任何单元格，然后在选项卡的“工具”组中点击“图表”。像标准图表一样选择图表选项，然后点击“确定”。你还可以通过在源数据中选择一个单元格，并在插入选项卡的“表格”组中选择“数据透视表图表”来同时创建新的数据透视表图表和数据透视表。参考[图9.12](#fig9-12)。
- en: '![image](image/Figure_9.12.jpg)'
  id: totrans-1542
  prefs: []
  type: TYPE_IMG
  zh: '![image](image/Figure_9.12.jpg)'
- en: Figure 9.12 Monthly Chart
  id: totrans-1543
  prefs: []
  type: TYPE_NORMAL
  zh: 图9.12 月度图表
- en: 'To group the Date column in your pivot table by both month and year:'
  id: totrans-1544
  prefs: []
  type: TYPE_NORMAL
  zh: 要按月份和年份同时分组你的数据透视表中的日期列：
- en: 1. Right-click on any date value in the Date column of the pivot table and select
    Group.
  id: totrans-1545
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 在数据透视表的“日期”列中的任何日期值上右键单击并选择“分组”。
- en: 2. In the Grouping dialog box, choose the Months option and the Years option.
    Finally, click OK to apply the grouping.
  id: totrans-1546
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 在“分组”对话框中，选择“月份”选项和“年份”选项。最后，点击“确定”以应用分组。
- en: Refer to [Figure 9.13](#fig9-13).
  id: totrans-1547
  prefs: []
  type: TYPE_NORMAL
  zh: 参考图[图9.13](#fig9-13)。
- en: '![image](image/Figure_9.13.jpg)'
  id: totrans-1548
  prefs: []
  type: TYPE_IMG
  zh: '![image](image/Figure_9.13.jpg)'
- en: Figure 9.13 Grouping by Year and Month
  id: totrans-1549
  prefs: []
  type: TYPE_NORMAL
  zh: 图9.13 按年月分组
- en: 'To group the Date column in your pivot table by both year and Qtr, follow these
    steps:'
  id: totrans-1550
  prefs: []
  type: TYPE_NORMAL
  zh: 要按年份和季度同时分组你的数据透视表中的日期列，按照以下步骤操作：
- en: 1. Right-click on any date value in the Date column of the pivot table and select
    Group.
  id: totrans-1551
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 在数据透视表的“日期”列中的任何日期值上右键单击并选择“分组”。
- en: 2. In the Grouping dialog box, choose the Qtr option and the Years option. Finally,
    click OK to apply the grouping. (Qtr1 refers here to January, February, and March.)
  id: totrans-1552
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 在“分组”对话框中，选择“季度”选项和“年份”选项。最后，点击“确定”以应用分组。（Qtr1在这里指的是一月、二月和三月。）
- en: Refer to [Figure 9.14](#fig9-14).
  id: totrans-1553
  prefs: []
  type: TYPE_NORMAL
  zh: 参考图[图9.14](#fig9-14)。
- en: '![image](image/Figure_9.14.jpg)'
  id: totrans-1554
  prefs: []
  type: TYPE_IMG
  zh: '![image](image/Figure_9.14.jpg)'
- en: Figure 9.14 Grouping by Year and Quarter
  id: totrans-1555
  prefs: []
  type: TYPE_NORMAL
  zh: 图9.14 按年季度分组
- en: Weekly Report
  id: totrans-1556
  prefs: []
  type: TYPE_NORMAL
  zh: 周报
- en: If you have grouping on the date field, you can group items by weeks. Click
    Days in the By box, and make sure that Days is the only time period selected.
    Then click on seven in the Number of days box.
  id: totrans-1557
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你在日期字段上有分组，你可以按周分组项目。在“按”框中点击“天”，并确保“天”是唯一选择的时间段。然后点击“天数”框中的“七”。
- en: Refer to [Figure 9.15](#fig9-15).
  id: totrans-1558
  prefs: []
  type: TYPE_NORMAL
  zh: 参考图[图9.15](#fig9-15)。
- en: '![image](image/Figure_9.15.jpg)'
  id: totrans-1559
  prefs: []
  type: TYPE_IMG
  zh: '![image](image/Figure_9.15.jpg)'
- en: Figure 9.15 Grouping by Day
  id: totrans-1560
  prefs: []
  type: TYPE_NORMAL
  zh: 图9.15 按日分组
- en: The pivot table will now display the data grouped by days, allowing you to see
    the weekly report with data summarized on a daily basis, as shown in [Figure 9.16](#fig9-16).
  id: totrans-1561
  prefs: []
  type: TYPE_NORMAL
  zh: 数据透视表现在将按日分组显示数据，让你可以看到按日汇总的周报，如图[图9.16](#fig9-16)所示。
- en: '![image](image/Figure_9.16.jpg)'
  id: totrans-1562
  prefs: []
  type: TYPE_IMG
  zh: '![image](image/Figure_9.16.jpg)'
- en: Figure 9.16 Weekly Report
  id: totrans-1563
  prefs: []
  type: TYPE_NORMAL
  zh: 图9.16 周报
- en: Grouping of Numbers (Creating Slabs)
  id: totrans-1564
  prefs: []
  type: TYPE_NORMAL
  zh: 数字分组（创建层）
- en: 'For grouping of numbers, follow these steps:'
  id: totrans-1565
  prefs: []
  type: TYPE_NORMAL
  zh: 对于数字的分组，按照以下步骤操作：
- en: 1. Right-click on any value in the Net column of the pivot table.
  id: totrans-1566
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 在数据透视表的“净”列中的任何值上右键单击。
- en: 2. From the context menu, select Group or Group Field option. Refer to [Figure
    9.17](#fig9-17).
  id: totrans-1567
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 从上下文菜单中选择“分组”或“分组字段”选项。参考[图9.17](#fig9-17)。
- en: '![image](image/Figure_9.17.jpg)'
  id: totrans-1568
  prefs: []
  type: TYPE_IMG
  zh: '![image](image/Figure_9.17.jpg)'
- en: Figure 9.17 Grouping by Numbers
  id: totrans-1569
  prefs: []
  type: TYPE_NORMAL
  zh: 图 9.17 按数字分组
- en: 3. In the Grouping dialog box, specify the starting value for your grouping
    slabs. For example, if you want to start with 0, enter 0 in the Starting at field.
  id: totrans-1570
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 在“分组”对话框中，指定分组板块的起始值。例如，如果您想从 0 开始，请在“起始值”字段中输入 0。
- en: 4. In the By field, enter the slab size you want to use. In this case, enter
    1000.
  id: totrans-1571
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 在“按”字段中，输入您想要使用的板块大小。在本例中，输入 1000。
- en: 5. Click OK to apply the grouping.
  id: totrans-1572
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 点击“确定”以应用分组。
- en: The pivot table will now display the Net column with values grouped into slabs
    of 1000\. This grouping allows you to analyze the Qty values based on the defined
    slabs.
  id: totrans-1573
  prefs: []
  type: TYPE_NORMAL
  zh: PivotTable 现在将显示包含值分组为 1000 个板块的净列。这种分组允许您根据定义的板块分析数量值。
- en: Slicer
  id: totrans-1574
  prefs: []
  type: TYPE_NORMAL
  zh: 切片器
- en: Slicers are easy-to-use filtering components. They contain a set of buttons
    that enable you to quickly filter the data in a PivotTable report, without the
    need to open dropdown lists to find the items that you want to filter. When you
    use a regular PivotTable report filter to filter multiple items, the filter indicates
    that multiple items are filtered, but you have to open a dropdown list to find
    the filtering details. A slicer clearly labels the filter that is applied and
    provides details so that you can easily understand the data that is displayed
    in the filtered PivotTable report. Refer to [Figure 9.18](#fig9-18).
  id: totrans-1575
  prefs: []
  type: TYPE_NORMAL
  zh: 切片器是易于使用的筛选组件。它们包含一组按钮，允许您快速筛选 PivotTable 报告中的数据，无需打开下拉列表来查找要筛选的项目。当您使用常规的 PivotTable
    报告筛选器筛选多个项目时，筛选器会指示已筛选多个项目，但您必须打开下拉列表来查找筛选详细信息。切片器清楚地标记了应用的筛选器并提供详细信息，以便您轻松理解筛选后的
    PivotTable 报告中显示的数据。请参阅[图 9.18](#fig9-18)。
- en: '![image](image/Figure_9.18.jpg)'
  id: totrans-1576
  prefs: []
  type: TYPE_IMG
  zh: '![image](image/Figure_9.18.jpg)'
- en: Figure 9.18 Grouping by Day
  id: totrans-1577
  prefs: []
  type: TYPE_NORMAL
  zh: 图 9.18 按日分组
- en: 'Follow these steps:'
  id: totrans-1578
  prefs: []
  type: TYPE_NORMAL
  zh: 按照以下步骤操作：
- en: 1. Select any cell within your pivot table.
  id: totrans-1579
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 选择您的 PivotTable 中的任何单元格。
- en: 2. Go to the PivotTable Analyze or Analyze tab in the Excel ribbon.
  id: totrans-1580
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 在 Excel 标题栏中转到 PivotTable 分析或分析选项卡。
- en: 3. Locate the Filter group and click on the Insert Slicer button.
  id: totrans-1581
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 定位到筛选器组并单击“插入切片器”按钮。
- en: 4. In the Insert Slicers dialog box, check the box next to Custname to select
    it. Refer to [Figure 9.19](#fig9-19).
  id: totrans-1582
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 在“插入切片器”对话框中，勾选“Custname”旁边的复选框以选择它。请参阅[图 9.19](#fig9-19)。
- en: '![image](image/Figure_9.19.jpg)'
  id: totrans-1583
  prefs: []
  type: TYPE_IMG
  zh: '![image](image/Figure_9.19.jpg)'
- en: Figure 9.19 Slicer
  id: totrans-1584
  prefs: []
  type: TYPE_NORMAL
  zh: 图 9.19 切片器
- en: 5. Click on the OK button to insert the slicer. Refer to [Figure 9.20](#fig9-20).
  id: totrans-1585
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 点击“确定”按钮以插入切片器。请参阅[图 9.20](#fig9-20)。
- en: '![image](image/Figure_9.20.jpg)'
  id: totrans-1586
  prefs: []
  type: TYPE_IMG
  zh: '![image](image/Figure_9.20.jpg)'
- en: Figure 9.20 Customer Slicer
  id: totrans-1587
  prefs: []
  type: TYPE_NORMAL
  zh: 图 9.20 客户切片器
- en: 6. A slicer will be added to your worksheet. You can resize and reposition it
    as needed.
  id: totrans-1588
  prefs: []
  type: TYPE_NORMAL
  zh: 6. 切片器将被添加到您的工作表中。您可以根据需要调整大小和重新定位它。
- en: 7. Use the slicer to filter the data in your pivot table by selecting the specific
  id: totrans-1589
  prefs: []
  type: TYPE_NORMAL
  zh: 7. 使用切片器通过选择特定的
- en: Custname values you want to include or exclude.
  id: totrans-1590
  prefs: []
  type: TYPE_NORMAL
  zh: 您想要包含或排除的客户名称值。
- en: Timeline
  id: totrans-1591
  prefs: []
  type: TYPE_NORMAL
  zh: 时间线
- en: Instead of playing around with filters to show dates, you can now use a PivotTable
    timeline. It is a box you can add to your pivot table that lets you filter by
    time and zoom in on the period you want. Click Analyze | Insert Timeline to call
    it up. Refer to [Figure 9.21](#fig9-21).
  id: totrans-1592
  prefs: []
  type: TYPE_NORMAL
  zh: 您现在可以使用 PivotTable 时间线而不是玩弄筛选器来显示日期，它是一个您可以添加到您的 PivotTable 中的框，允许您按时间筛选并放大您想要的时期。点击“分析”|“插入时间线”来调用它。请参阅[图
    9.21](#fig9-21)。
- en: '![image](image/Figure_9.21.jpg)'
  id: totrans-1593
  prefs: []
  type: TYPE_IMG
  zh: '![image](image/Figure_9.21.jpg)'
- en: Figure 9.21 Timeline
  id: totrans-1594
  prefs: []
  type: TYPE_NORMAL
  zh: 图 9.21 时间线
- en: '[Figure 9.22](#fig9-22) shows the date timeline.'
  id: totrans-1595
  prefs: []
  type: TYPE_NORMAL
  zh: '[图 9.22](#fig9-22) 显示了日期时间线。'
- en: '![image](image/Figure_9.22.jpg)'
  id: totrans-1596
  prefs: []
  type: TYPE_IMG
  zh: '![image](image/Figure_9.22.jpg)'
- en: Figure 9.22 Date Timeline
  id: totrans-1597
  prefs: []
  type: TYPE_NORMAL
  zh: 图 9.22 日期时间线
- en: Power View
  id: totrans-1598
  prefs: []
  type: TYPE_NORMAL
  zh: Power View
- en: The Power View add-in allows you to define visually attractive summaries of
    your worksheet with special emphasis on the variables that you require. With a
    separate tab, you have the option to view data in the way that best suits you.
    After defining the relevant power fields, Power View extracts the information
    from the selected worksheet to give you a complete overview with respect to the
    viewing filters specified.
  id: totrans-1599
  prefs: []
  type: TYPE_NORMAL
  zh: Power View 插件允许您通过特别强调您所需的变量来定义您工作表的视觉吸引力的摘要。通过一个单独的选项卡，您可以选择以最适合您的方式查看数据。在定义相关
    Power 字段后，Power View 从所选工作表中提取信息，为您提供有关指定查看筛选器的完整概述。
- en: Moreover, you can choose a new theme, background, transparency, pictures, and
    other content with the freedom to insert, modify, arrange, and analyze relationships
    effectively. Follow the steps below.
  id: totrans-1600
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，您可以选择新的主题、背景、透明度、图片和其他内容，并自由地插入、修改、排列和分析关系，从而有效地进行数据模型构建。请按照以下步骤操作。
- en: 1. Select the data.
  id: totrans-1601
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 选择数据。
- en: 2. Click on Insert tab.
  id: totrans-1602
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 点击“插入”选项卡。
- en: 3. Click on Power View option.
  id: totrans-1603
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 点击“Power View”选项。
- en: 4. You can see the images power view look with Field list with data.
  id: totrans-1604
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 您可以看到带有字段列表和数据的Power View图像。
- en: Make use of the filter button, which is on the right side of this data. It will
    allow you to filter the data as desired with the help of all the column fields.
  id: totrans-1605
  prefs: []
  type: TYPE_NORMAL
  zh: 利用位于此数据右侧的筛选按钮，它将允许您通过所有列字段的帮助，按需筛选数据。
- en: You can make use of the field list to see various calculations such as sum,
    min, max, average, and more. Moreover, by using a salary parameter, you can check
    and see the data according to your selected range. This is the overview of the
    Power View option.
  id: totrans-1606
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以利用字段列表查看各种计算，如总和、最小值、最大值、平均值等。此外，通过使用薪资参数，您可以根据所选范围检查并查看数据。这是Power View选项的概述。
- en: Power Pivot
  id: totrans-1607
  prefs: []
  type: TYPE_NORMAL
  zh: Power Pivot
- en: 'Power Pivot is an add-in, which we can use to perform powerful data analysis
    in Excel. The add-in is built into Excel, but it is not enabled. To enable Power
    Pivot, follow these steps:'
  id: totrans-1608
  prefs: []
  type: TYPE_NORMAL
  zh: Power Pivot是一个插件，我们可以使用它来在Excel中执行强大的数据分析。该插件已内置到Excel中，但未启用。要启用Power Pivot，请按照以下步骤操作：
- en: 1. Go to the File tab.
  id: totrans-1609
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 转到“文件”选项卡。
- en: 2. Click on Option | Add-Ins.
  id: totrans-1610
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 点击“选项”|“插件”。
- en: 3. In the Manage box, click on Com Add-ins.
  id: totrans-1611
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 在“管理”框中，点击“COM插件”。
- en: 4. Check the MS Office Power Pivot in COM Add-ins box.
  id: totrans-1612
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 在COM插件框中勾选MS Office Power Pivot。
- en: This is a user-friendly way to perform data analysis using familiar Excel features
    that you already know, such as the Office Fluent user interface, PivotTable and
    PivotChart views, and slicers. With Power Pivot, we can mash up large volumes
    of data from various sources, perform information analysis rapidly, and share
    insights easily.
  id: totrans-1613
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个用户友好的方式来使用您已经熟悉的Excel功能进行数据分析，例如Office Fluent用户界面、数据透视表和数据透视图视图以及切片器。使用Power
    Pivot，我们可以将来自不同来源的大量数据混合在一起，快速进行信息分析，并轻松分享见解。
- en: Benefits of Data Model
  id: totrans-1614
  prefs: []
  type: TYPE_NORMAL
  zh: 数据模型的好处
- en: In both Excel and PowerPoint, you can create a data model, which is a collection
    of tables with relationships. The data model, which is seen in a workbook in Excel,
    is a similar data model that you see in the power pivot window. Any data you import
    into Excel is available in PowerPoint, and vice versa.
  id: totrans-1615
  prefs: []
  type: TYPE_NORMAL
  zh: 在Excel和PowerPoint中，您都可以创建数据模型，这是一个包含相关关系的表格集合。在Excel工作簿中看到的数据模型，与在Power Pivot窗口中看到的数据模型相似。您导入到Excel中的任何数据都可在PowerPoint中使用，反之亦然。
- en: Data Model is a collection of tables and their relationships that reflect real-world
    relations between business operations and processes; for example, how the product
    relates to inventory and sales.
  id: totrans-1616
  prefs: []
  type: TYPE_NORMAL
  zh: 数据模型是表格及其关系的集合，反映了业务运营和流程之间的现实世界关系；例如，产品与库存和销售之间的关系。
- en: Follow the steps below.
  id: totrans-1617
  prefs: []
  type: TYPE_NORMAL
  zh: 请按照以下步骤操作。
- en: 1. Convert the data into a table.
  id: totrans-1618
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 将数据转换为表格。
- en: 2. Import the Excel table into Power Pivot.
  id: totrans-1619
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 将Excel表导入Power Pivot。
- en: a. The table field list can have more than one table in the pivot table.
  id: totrans-1620
  prefs: []
  type: TYPE_NORMAL
  zh: a. 数据透视表中的表字段列表可以包含多个表。
- en: b. We can build the relationships between tables based on one common field so
    that you do not have to use lookup.
  id: totrans-1621
  prefs: []
  type: TYPE_NORMAL
  zh: b. 我们可以根据一个共同的字段建立表格之间的关系，这样您就不必使用查找。
- en: c. Power view is enabled by Data Model.
  id: totrans-1622
  prefs: []
  type: TYPE_NORMAL
  zh: c. Power View是通过数据模型启用的。
- en: Creating a Pivot Table Using Power Pivot
  id: totrans-1623
  prefs: []
  type: TYPE_NORMAL
  zh: 使用Power Pivot创建数据透视表
- en: 'We have four data sets in four different sheets: city, customer, order, and
    order details. We need to create a city report regarding the total quantity sold.
    We need to follow these steps:'
  id: totrans-1624
  prefs: []
  type: TYPE_NORMAL
  zh: 我们在四个不同的工作表中拥有四个数据集：城市、客户、订单和订单详情。我们需要创建一份关于总销售量的城市报告。我们需要遵循以下步骤：
- en: 1. Select the data
  id: totrans-1625
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 选择数据
- en: a. Go to the Home tab.
  id: totrans-1626
  prefs: []
  type: TYPE_NORMAL
  zh: a. 转到“开始”选项卡。
- en: b. Select the Styles group.
  id: totrans-1627
  prefs: []
  type: TYPE_NORMAL
  zh: b. 选择“样式”组。
- en: c. Format as table.
  id: totrans-1628
  prefs: []
  type: TYPE_NORMAL
  zh: c. 格式化为表格。
- en: d. Click on the Design tab.
  id: totrans-1629
  prefs: []
  type: TYPE_NORMAL
  zh: d. 点击“设计”选项卡。
- en: e. In the Properties group, give a name to the table.
  id: totrans-1630
  prefs: []
  type: TYPE_NORMAL
  zh: e. 在“属性”组中，给表格命名。
- en: 2. Select the Power Pivot tab.
  id: totrans-1631
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 选择“Power Pivot”选项卡。
- en: a. Go to the Tables group.
  id: totrans-1632
  prefs: []
  type: TYPE_NORMAL
  zh: a. 转到“表格”组。
- en: b. Add to Data Model. The table will be added to the data model.
  id: totrans-1633
  prefs: []
  type: TYPE_NORMAL
  zh: b. 添加到数据模型。表格将被添加到数据模型中。
- en: 3. Define the relationship
  id: totrans-1634
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 定义关系
- en: a. Go to the Home tab in Power Pivot view.
  id: totrans-1635
  prefs: []
  type: TYPE_NORMAL
  zh: a. 在Power Pivot视图中转到“开始”选项卡。
- en: b. Select the Diagram view from the View tab.
  id: totrans-1636
  prefs: []
  type: TYPE_NORMAL
  zh: b. 从视图选项卡中选择图表视图。
- en: c. Drag and drop common fields to create the link between two tables.
  id: totrans-1637
  prefs: []
  type: TYPE_NORMAL
  zh: c. 将常用字段拖放到两个表之间创建链接。
- en: 4. Select Data view in the View tab.
  id: totrans-1638
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 在视图选项卡中选择数据视图。
- en: 5. Click on Pivot table on the Home tab.
  id: totrans-1639
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 在“开始”选项卡上单击“数据透视表”。
- en: 6. Create the pivot table.
  id: totrans-1640
  prefs: []
  type: TYPE_NORMAL
  zh: 6. 创建数据透视表。
- en: 7. Choose the field from the table (Active and all). A black border around the
    table means it is linked with some other table.
  id: totrans-1641
  prefs: []
  type: TYPE_NORMAL
  zh: 7. 从表格中选择字段（活动字段和所有字段）。表格周围的黑色边框表示它与某个其他表有链接。
- en: 8. Select city name from city detail, and quantity from order details.
  id: totrans-1642
  prefs: []
  type: TYPE_NORMAL
  zh: 8. 从城市详情中选择城市名称，从订单详情中选择数量。
- en: Conclusion
  id: totrans-1643
  prefs: []
  type: TYPE_NORMAL
  zh: 结论
- en: In conclusion, the chapter on pivot tables has provided a comprehensive understanding
    of this powerful tool in Excel, which can be used for data analysis and reporting.
    Pivot tables allow users to summarize and analyze large amounts of data quickly
    and efficiently, providing different perspectives and insights into the data.
  id: totrans-1644
  prefs: []
  type: TYPE_NORMAL
  zh: 总之，关于数据透视表的章节提供了对Excel中这一强大工具的全面理解，它可以用于数据分析与报告。数据透视表允许用户快速有效地汇总和分析大量数据，提供对数据的多种视角和见解。
- en: The chapter covered various topics, including examining pivot tables, recommended
    pivot table options, formatting pivot table reports, creating graphs using pivot
    data, utilizing slicers and timelines for filtering data, and exploring advanced
    features, such as Power View and Power Pivot.
  id: totrans-1645
  prefs: []
  type: TYPE_NORMAL
  zh: 本章涵盖了各种主题，包括检查数据透视表、推荐的透视表选项、格式化数据透视表报告、使用数据透视数据创建图表、利用切片器和时间轴进行数据筛选，以及探索高级功能，如Power
    View和Power Pivot。
- en: By following the step-by-step instructions and examples provided in the chapter,
    readers can learn how to create pivot tables, customize them according to their
    analysis requirements, and utilize advanced features to enhance their data analysis
    and reporting capabilities.
  id: totrans-1646
  prefs: []
  type: TYPE_NORMAL
  zh: 通过遵循章节中提供的逐步说明和示例，读者可以学习如何创建数据透视表，根据他们的分析需求进行自定义，并利用高级功能来增强他们的数据分析与报告能力。
- en: Overall, pivot tables offer a flexible and dynamic way to explore and present
    data, enabling users to gain valuable insights and make informed decisions based
    on the summarized information. By mastering pivot tables, users can efficiently
    analyze data, uncover trends, and communicate their findings effectively.
  id: totrans-1647
  prefs: []
  type: TYPE_NORMAL
  zh: 总体而言，数据透视表提供了一种灵活且动态的方式来探索和展示数据，使用户能够从汇总信息中获得有价值的见解并做出明智的决策。通过掌握数据透视表，用户可以高效地分析数据，发现趋势，并有效地传达他们的发现。
- en: Exercises
  id: totrans-1648
  prefs: []
  type: TYPE_NORMAL
  zh: 练习
- en: 1. Open the provided Excel spreadsheet containing sales data.
  id: totrans-1649
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 打开包含销售数据的提供的Excel电子表格。
- en: 2. Create a pivot table to calculate the total sales revenue for each product
    category.
  id: totrans-1650
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 创建一个数据透视表来计算每个产品类别的总销售收入。
- en: 3. Format the pivot table to make it visually appealing and easy to read.
  id: totrans-1651
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 格式化数据透视表，使其易于阅读且具有视觉吸引力。
- en: 4. Create a pivot chart to represent the sales revenue by product category.
  id: totrans-1652
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 创建一个数据透视图来表示按产品类别划分的销售收入。
- en: 5. Create another pivot table to determine the region with the highest sales
    revenue.
  id: totrans-1653
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 创建另一个数据透视表来确定销售收入最高的地区。
- en: 6. Create a pivot chart to visualize the sales revenue by region.
  id: totrans-1654
  prefs: []
  type: TYPE_NORMAL
  zh: 6. 创建一个数据透视图来可视化按地区划分的销售收入。
- en: 7. Create a pivot table to analyze the monthly sales revenue.
  id: totrans-1655
  prefs: []
  type: TYPE_NORMAL
  zh: 7. 创建一个数据透视表来分析月度销售收入。
- en: 8. Use conditional formatting to highlight any significant changes or trends.
  id: totrans-1656
  prefs: []
  type: TYPE_NORMAL
  zh: 8. 使用条件格式突出显示任何显著的变化或趋势。
- en: 9. Create a pivot table to calculate the average sales revenue per product category.
  id: totrans-1657
  prefs: []
  type: TYPE_NORMAL
  zh: 9. 创建一个数据透视表来计算每个产品类别的平均销售收入。
- en: CHAPTER  10
  id: totrans-1658
  prefs: []
  type: TYPE_NORMAL
  zh: 第 10 章
- en: Conditional Formatting
  id: totrans-1659
  prefs: []
  type: TYPE_NORMAL
  zh: 条件格式
- en: Introduction
  id: totrans-1660
  prefs: []
  type: TYPE_NORMAL
  zh: 引言
- en: Conditional formatting in Excel allows us to apply formatting rules to cells
    or ranges based on specific conditions. It helps us highlight important information,
    visualize data trends, and make our worksheets more visually appealing. In this
    chapter, we will explore the different types of conditional formatting, such as
    formatting based on cell values or formulas, working with icon sets, and applying
    conditional formatting to real-world scenarios using a database case study. By
    the end of this chapter, you will have a solid understanding of how to use conditional
    formatting effectively to enhance your data analysis in Excel.
  id: totrans-1661
  prefs: []
  type: TYPE_NORMAL
  zh: Excel中的条件格式允许我们根据特定条件对单元格或范围应用格式规则。它帮助我们突出显示重要信息，可视化数据趋势，并使我们的工作表更具视觉吸引力。在本章中，我们将探讨不同类型的条件格式，例如基于单元格值或公式的格式化，使用图标集，以及通过数据库案例研究应用条件格式到实际场景。到本章结束时，您将牢固掌握如何有效地使用条件格式来增强Excel中的数据分析。
- en: Structure
  id: totrans-1662
  prefs: []
  type: TYPE_NORMAL
  zh: 结构
- en: 'In this chapter, we will go over the following topics:'
  id: totrans-1663
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将讨论以下主题：
- en: ■Conditional formatting
  id: totrans-1664
  prefs: []
  type: TYPE_NORMAL
  zh: ■条件格式化
- en: •Conditional formatting using cell values (column-based conditional formatting)
  id: totrans-1665
  prefs: []
  type: TYPE_NORMAL
  zh: •使用单元格值进行条件格式化（基于列的条件格式化）
- en: •Conditional formatting using formulas (record-based conditional formatting)
  id: totrans-1666
  prefs: []
  type: TYPE_NORMAL
  zh: •使用公式进行条件格式化（基于记录的条件格式化）
- en: ■Icon Set
  id: totrans-1667
  prefs: []
  type: TYPE_NORMAL
  zh: ■图标集
- en: ■Formulas with multiple conditions
  id: totrans-1668
  prefs: []
  type: TYPE_NORMAL
  zh: ■具有多个条件的公式
- en: Objectives
  id: totrans-1669
  prefs: []
  type: TYPE_NORMAL
  zh: 目标
- en: After studying this chapter, the reader will be able to define conditional formatting
    and identify the ways to apply conditional formatting. They will also learn how
    to apply formulas with multiple conditions.
  id: totrans-1670
  prefs: []
  type: TYPE_NORMAL
  zh: 学习本章后，读者将能够定义条件格式化并识别应用条件格式化的方法。他们还将学习如何应用具有多个条件的公式。
- en: Conditional Formatting
  id: totrans-1671
  prefs: []
  type: TYPE_NORMAL
  zh: 条件格式化
- en: When data needs to be formatted based on certain conditions, we may use conditional
    formatting. It is easy to highlight cells or a range of cells, emphasize unusual
    values, and visualize data by using data bars, color scales, or icon sets. Conditional
    Formatting changes the appearance of a cell range, based on a condition (or criterion).
    If the condition is true, the cell range is formatted based on that condition.
    If the conditional is false, the cell range is not formatted. Refer to [Figure
    10.1](#fig10-1).
  id: totrans-1672
  prefs: []
  type: TYPE_NORMAL
  zh: 当需要根据某些条件对数据进行格式化时，我们可以使用条件格式化。使用数据条、颜色刻度或图标集可以轻松突出显示单元格或单元格范围，强调异常值，并通过可视化数据。条件格式化根据条件（或标准）更改单元格范围的外观。如果条件为真，则根据该条件格式化单元格范围。如果条件为假，则单元格范围不进行格式化。请参阅[图10.1](#fig10-1)。
- en: '![image](image/Figure_10.1.jpg)'
  id: totrans-1673
  prefs: []
  type: TYPE_IMG
  zh: '![image](image/Figure_10.1.jpg)'
- en: Figure 10.1 Conditional Formatting
  id: totrans-1674
  prefs: []
  type: TYPE_NORMAL
  zh: 图10.1 条件格式化
- en: 'You can select any of the following types of formatting, as required:'
  id: totrans-1675
  prefs: []
  type: TYPE_NORMAL
  zh: 根据需要，您可以选择以下任何一种格式化类型：
- en: ■Format all cells by using a two-color scale.
  id: totrans-1676
  prefs: []
  type: TYPE_NORMAL
  zh: ■使用双色刻度格式化所有单元格。
- en: ■Format all cells by using a three-color scale.
  id: totrans-1677
  prefs: []
  type: TYPE_NORMAL
  zh: ■使用三色刻度格式化所有单元格。
- en: ■Format all cells by using data bars.
  id: totrans-1678
  prefs: []
  type: TYPE_NORMAL
  zh: ■使用数据条格式化所有单元格。
- en: ■Format all cells by using an icon set.
  id: totrans-1679
  prefs: []
  type: TYPE_NORMAL
  zh: ■使用图标集格式化所有单元格。
- en: ■Format only cells that contain text, number, or date or time values.
  id: totrans-1680
  prefs: []
  type: TYPE_NORMAL
  zh: ■仅格式化包含文本、数字或日期或时间值的单元格。
- en: ■Format only top- or bottom-ranked values.
  id: totrans-1681
  prefs: []
  type: TYPE_NORMAL
  zh: ■仅格式化排名最高或最低的值。
- en: ■Format only values that are above or below average.
  id: totrans-1682
  prefs: []
  type: TYPE_NORMAL
  zh: ■仅格式化高于或低于平均值的值。
- en: ■Format only unique or duplicate values.
  id: totrans-1683
  prefs: []
  type: TYPE_NORMAL
  zh: ■仅格式化唯一或重复的值。
- en: ■Compare table columns to determine which cells to format.
  id: totrans-1684
  prefs: []
  type: TYPE_NORMAL
  zh: ■比较表格列以确定要格式化的单元格。
- en: ■Use a formula to determine which cells to format.
  id: totrans-1685
  prefs: []
  type: TYPE_NORMAL
  zh: ■使用公式确定要格式化的单元格。
- en: ■Clear conditional formats.
  id: totrans-1686
  prefs: []
  type: TYPE_NORMAL
  zh: ■清除条件格式。
- en: For example, you can highlight in green all sales figures that exceed 75,000\.
    Conditional Formatting can be applied based on a cell value or a formula.
  id: totrans-1687
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，您可以突出显示所有超过75,000的销售数字的绿色。条件格式化可以根据单元格值或公式应用。
- en: Note The area that you select before applying Conditional Formatting determines
    the area in the worksheet to which the format will be applied.
  id: totrans-1688
  prefs: []
  type: TYPE_NORMAL
  zh: 注意：在应用条件格式化之前选择的区域将确定工作表中应用格式的区域。
- en: Conditional Formatting Using Cell Values (Column-based Conditional Formatting)
  id: totrans-1689
  prefs: []
  type: TYPE_NORMAL
  zh: 使用单元格值进行条件格式化（基于列的条件格式化）
- en: To use conditional formatting to apply shading based on cell values, follow
    the steps below.
  id: totrans-1690
  prefs: []
  type: TYPE_NORMAL
  zh: 要使用基于单元格值的条件格式化应用着色，请按照以下步骤操作。
- en: 1. Select the cells to which you want to apply the Conditional Shading.
  id: totrans-1691
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 选择要应用条件着色的单元格。
- en: 2. Activate the Sheet ribbon tab.
  id: totrans-1692
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 激活“工作表”选项卡。
- en: 3. In the Style group, click Conditional Formatting.
  id: totrans-1693
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 在“样式”组中，单击“条件格式化”。
- en: 4. From the gallery that appears, select Highlight Cell Rules.
  id: totrans-1694
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 从出现的画廊中选择“突出显示单元格规则”。
- en: 5. From the menu, select a condition for the value in the cell or select More
    Rules.
  id: totrans-1695
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 从菜单中选择单元格中的条件或选择“更多规则”。
- en: 6. Specify a condition and cell shading.
  id: totrans-1696
  prefs: []
  type: TYPE_NORMAL
  zh: 6. 指定条件和单元格着色。
- en: 7. Click OK to apply the format.
  id: totrans-1697
  prefs: []
  type: TYPE_NORMAL
  zh: 7. 单击“确定”以应用格式。
- en: Conditional Formatting Using Formula (Record-based Conditional Formatting)
  id: totrans-1698
  prefs: []
  type: TYPE_NORMAL
  zh: 使用公式进行条件格式化（基于记录的条件格式化）
- en: To apply conditional formatting based on formulas, follow the steps below.
  id: totrans-1699
  prefs: []
  type: TYPE_NORMAL
  zh: 要根据公式应用条件格式化，请按照以下步骤操作。
- en: 1. Select the cells to which you want to apply the formatting.
  id: totrans-1700
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 选择要应用格式的单元格。
- en: 2. In the Style ribbon group, click Conditional Formatting.
  id: totrans-1701
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 在“样式”选项卡组中，单击“条件格式化”。
- en: 3. From the menu, select Conditional Formatting Rules Legend to open the Formatting
    Rules Legend dialog box.
  id: totrans-1702
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 从菜单中选择“条件格式化规则图例”以打开格式化规则图例对话框。
- en: 4. Click New Rule to open the Add Formatting Rule dialog box.
  id: totrans-1703
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 单击“新建规则”以打开添加格式化规则对话框。
- en: 5. In the Select a Rule Type box, select Use a formula to determine which cells
    to format.
  id: totrans-1704
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 在“选择规则类型”框中，选择“使用公式确定要格式化的单元格”。
- en: 6. In the Format Values Where This Formula is True box, enter a formula that
    evaluates a value to be True or False.
  id: totrans-1705
  prefs: []
  type: TYPE_NORMAL
  zh: 6. 在“格式值，其中此公式为真”框中，输入一个评估值为真或假的公式。
- en: 7. Click Format to open the Format Cells dialog box, as shown in [Figure 10.2](#fig10-2).
  id: totrans-1706
  prefs: []
  type: TYPE_NORMAL
  zh: 7. 点击“格式”以打开“格式单元格”对话框，如图10.2 [Figure 10.2](#fig10-2)所示。
- en: 8. In the Format Cells dialog box, specify the format in which the cells satisfying
    the condition should appear, and click OK.
  id: totrans-1707
  prefs: []
  type: TYPE_NORMAL
  zh: 8. 在“格式单元格”对话框中，指定满足条件的单元格应出现的格式，然后点击“确定”。
- en: 9. Click OK to close the Add Formatting Rule dialog box.
  id: totrans-1708
  prefs: []
  type: TYPE_NORMAL
  zh: 9. 点击“确定”以关闭“添加格式化规则”对话框。
- en: 10. Click OK to close the Formatting Rules Legend dialog box and apply the format.
  id: totrans-1709
  prefs: []
  type: TYPE_NORMAL
  zh: 10. 点击“确定”以关闭“格式化规则图例”对话框并应用格式。
- en: Note If the format needs to be applied to the entire database, select the database
    with or without the header before applying conditional formatting. The formula
    should be applied to the first row in the selection, however.
  id: totrans-1710
  prefs: []
  type: TYPE_NORMAL
  zh: 注意：如果需要将格式应用于整个数据库，在应用条件格式化之前，选择带有或不带有标题的数据库。但是，公式应应用于选择中的第一行。
- en: 'Example:'
  id: totrans-1711
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：
- en: '[Figure 10.2](#fig10-2) depicts the formula to highlight the records of everyone
    in the sales department if the selection is made along with the column headers.'
  id: totrans-1712
  prefs: []
  type: TYPE_NORMAL
  zh: 图10.2 [Figure 10.2](#fig10-2)展示了如果选择包括列标题，则突出显示销售部门所有人的记录的公式。
- en: 'If we have selected the database without the header, and want to highlight
    the records of the person who earns the highest salary, we need to use the following
    formula:'
  id: totrans-1713
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们已选择不带标题的数据库，并想突出显示收入最高的记录，我们需要使用以下公式：
- en: =$h2=max($H$2:$H$101)
  id: totrans-1714
  prefs: []
  type: TYPE_NORMAL
  zh: =$$h2=max($H$2:$H$101$$)
- en: Refer to [Figure 10.2](#fig10-2).
  id: totrans-1715
  prefs: []
  type: TYPE_NORMAL
  zh: 参考图10.2 [Figure 10.2](#fig10-2)。
- en: '![image](image/Figure_10.2.jpg)'
  id: totrans-1716
  prefs: []
  type: TYPE_IMG
  zh: '![image](image/Figure_10.2.jpg)'
- en: Figure 10.2 New Formatting Rules
  id: totrans-1717
  prefs: []
  type: TYPE_NORMAL
  zh: 图10.2 新建格式化规则
- en: Icon Set
  id: totrans-1718
  prefs: []
  type: TYPE_NORMAL
  zh: 图标集
- en: In Excel, you have access to more icon sets, including triangles, stars, and
    boxes. You can also mix and match icons from different sets and more easily hide
    icons from view. For example, you might choose to show icons only for high profit
    values and omit them for middle and lower values.
  id: totrans-1719
  prefs: []
  type: TYPE_NORMAL
  zh: 在Excel中，你可以访问更多的图标集，包括三角形、星号和方框。你还可以混合搭配来自不同集合的图标，并更轻松地隐藏图标。例如，你可能只想为高利润值显示图标，而对于中等和低值则省略它们。
- en: Formulas with Multiple Conditions
  id: totrans-1720
  prefs: []
  type: TYPE_NORMAL
  zh: 带有多个条件的公式
- en: 'If we want to highlight only the Sales Department from the East region, we
    can change the formula by following these steps:'
  id: totrans-1721
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们只想突出显示来自东部地区的销售部门，我们可以通过以下步骤更改公式：
- en: 1. Select the range without the heading.
  id: totrans-1722
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 选择不带标题的范围。
- en: 2. Click on the Home tab.
  id: totrans-1723
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 点击“开始”选项卡。
- en: 3. Select Conditional Formatting.
  id: totrans-1724
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 选择“条件格式化”。
- en: 4. Click on New Rule.
  id: totrans-1725
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 点击“新建规则”。
- en: 5. Type the formula =AND($D2=”Sales”,$E2=”East”)
  id: totrans-1726
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 输入公式 =AND($D2="Sales"$$,$E2="East"$$)
- en: 6. Choose the desired format.
  id: totrans-1727
  prefs: []
  type: TYPE_NORMAL
  zh: 6. 选择所需的格式。
- en: 7. Click OK to apply and close.
  id: totrans-1728
  prefs: []
  type: TYPE_NORMAL
  zh: 7. 点击“确定”以应用并关闭。
- en: Apply a Conditional Formula Based on a Different Sheet’s Cell Reference
  id: totrans-1729
  prefs: []
  type: TYPE_NORMAL
  zh: 根据不同工作表的单元格引用应用条件公式
- en: 'Suppose we want to highlight the records by using the cell reference of another
    sheet. In that case, follow these steps:'
  id: totrans-1730
  prefs: []
  type: TYPE_NORMAL
  zh: 假设我们想通过另一个工作表的单元格引用来突出显示记录，那么请按照以下步骤操作：
- en: 1. Select the entire data without the heading.
  id: totrans-1731
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 选择不带标题的整个数据。
- en: 2. Click on Home Tab | Conditional Formatting | Manage Rule.
  id: totrans-1732
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 点击“开始”选项卡 | “条件格式化” | “管理规则”。
- en: 3. Click on New Rule.
  id: totrans-1733
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 点击“新建规则”。
- en: 4. Select the Rule types as Use a formula to determine which cell to format.
  id: totrans-1734
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 选择规则类型为“使用公式确定要格式化的单元格”。
- en: '5. In the Edit Rule description, type the formula as: =$D2=’cross sheet’!$B$'
  id: totrans-1735
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 在“编辑规则描述”中，输入公式如下：=$$D2='cross sheet'!$$B$$
- en: 6. Choose the desired format.
  id: totrans-1736
  prefs: []
  type: TYPE_NORMAL
  zh: 6. 选择所需的格式。
- en: 7. Click OK to apply and close the dialog box.
  id: totrans-1737
  prefs: []
  type: TYPE_NORMAL
  zh: 7. 点击“确定”以应用并关闭对话框。
- en: Conclusion
  id: totrans-1738
  prefs: []
  type: TYPE_NORMAL
  zh: 结论
- en: In summary, conditional formatting in Excel is a valuable feature that allows
    us to apply formatting based on specific conditions. It helps us highlight important
    data, visualize trends, and enhance the presentation of our worksheets. By mastering
    conditional formatting techniques, we can make our data more visually appealing
    and gain valuable insights.
  id: totrans-1739
  prefs: []
  type: TYPE_NORMAL
  zh: 总结，Excel中的条件格式化是一个非常有用的功能，它允许我们根据特定条件应用格式。它帮助我们突出显示重要数据，可视化趋势，并增强工作表的展示效果。通过掌握条件格式化技术，我们可以使我们的数据更具视觉吸引力，并获得宝贵的见解。
- en: Exercises
  id: totrans-1740
  prefs: []
  type: TYPE_NORMAL
  zh: 练习
- en: 'Open the worksheet of Invoice from Excel_Basic from the practice folder and
    get the result according to the following steps:'
  id: totrans-1741
  prefs: []
  type: TYPE_NORMAL
  zh: 打开练习文件夹中的Excel_Basic工作簿中的发票工作表，并按照以下步骤获取结果：
- en: 1. Get the Type of the customer and Rate using VLOOKUP.
  id: totrans-1742
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 使用VLOOKUP获取客户类型和利率。
- en: 2. Create six copies of the Invoice worksheet and solve the other question.
  id: totrans-1743
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 创建六份发票工作表的副本并解决其他问题。
- en: '3. Sort the Record: Retailer or Direct Wholesaler.'
  id: totrans-1744
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 对记录进行排序：零售商或直接批发商。
- en: 4. Filter the Records for June based on sales prices between 3000-5000.
  id: totrans-1745
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 根据销售价格在3000-5000之间过滤6月的记录。
- en: 5. Filter the Records for retailer and wholesaler qty between 100-150 and 250-500.
  id: totrans-1746
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 过滤记录以获取零售商和批发商的100-150和250-500之间的数量。
- en: 6. Subtotal Records according to Type and customer by Total Qty and Total Amt.
  id: totrans-1747
  prefs: []
  type: TYPE_NORMAL
  zh: 6. 根据类型和客户按总数量和总金额汇总记录。
- en: 7. Create a summary Report by Month and customer that covers Total Qty/Total
    Amt and % of Amt.
  id: totrans-1748
  prefs: []
  type: TYPE_NORMAL
  zh: 7. 通过月份和客户创建一个汇总报告，涵盖总数量/总金额和金额百分比。
- en: 8. Highlight the row for Type of customer with the name Direct.
  id: totrans-1749
  prefs: []
  type: TYPE_NORMAL
  zh: 8. 高亮显示名为Direct的客户类型的行。
- en: CHAPTER  11
  id: totrans-1750
  prefs: []
  type: TYPE_NORMAL
  zh: 第 11 章
- en: What-if Analysis
  id: totrans-1751
  prefs: []
  type: TYPE_NORMAL
  zh: 假设分析
- en: Introduction
  id: totrans-1752
  prefs: []
  type: TYPE_NORMAL
  zh: 简介
- en: 'In many situations, you may have to use several different sets of values in
    one or more formulas in order to explore all the various results. In this case,
    manual interference may increase, leading to errors. The What-if Analysis tools
    can come to your rescue in such situations. There are three What-if Analysis tools
    in Excel, namely:'
  id: totrans-1753
  prefs: []
  type: TYPE_NORMAL
  zh: 在许多情况下，你可能需要在公式中使用多个不同的值集，以便探索所有不同的结果。在这种情况下，人工干预可能会增加，导致错误。在这种情况下，假设分析工具可以为你提供帮助。Excel中有三个假设分析工具，分别是：
- en: ■Goal Seek
  id: totrans-1754
  prefs: []
  type: TYPE_NORMAL
  zh: ■目标寻求
- en: ■Data Tables
  id: totrans-1755
  prefs: []
  type: TYPE_NORMAL
  zh: ■数据表
- en: ■Scenario Manager
  id: totrans-1756
  prefs: []
  type: TYPE_NORMAL
  zh: ■情景管理器
- en: Structure
  id: totrans-1757
  prefs: []
  type: TYPE_NORMAL
  zh: 结构
- en: 'In this chapter, we will go over the following topics:'
  id: totrans-1758
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将讨论以下主题：
- en: ■Goal Seek
  id: totrans-1759
  prefs: []
  type: TYPE_NORMAL
  zh: ■目标寻求
- en: ■Projecting figures using a data table
  id: totrans-1760
  prefs: []
  type: TYPE_NORMAL
  zh: ■使用数据表预测数字
- en: ■One-variable data tables
  id: totrans-1761
  prefs: []
  type: TYPE_NORMAL
  zh: ■单变量数据表
- en: ■Two-variable data tables
  id: totrans-1762
  prefs: []
  type: TYPE_NORMAL
  zh: ■双变量数据表
- en: ■What-if Scenarios
  id: totrans-1763
  prefs: []
  type: TYPE_NORMAL
  zh: ■假设情景
- en: ■Creating scenarios
  id: totrans-1764
  prefs: []
  type: TYPE_NORMAL
  zh: ■创建场景
- en: ■Merging scenarios from another worksheet
  id: totrans-1765
  prefs: []
  type: TYPE_NORMAL
  zh: ■从另一个工作表合并情景
- en: Objectives
  id: totrans-1766
  prefs: []
  type: TYPE_NORMAL
  zh: 目标
- en: After studying this chapter, the reader will be able to understand goal seek,
    define data tables, and use scenario manager.
  id: totrans-1767
  prefs: []
  type: TYPE_NORMAL
  zh: 学习本章后，读者将能够理解目标寻求、定义数据表和使用情景管理器。
- en: Goal Seek
  id: totrans-1768
  prefs: []
  type: TYPE_NORMAL
  zh: 目标寻求
- en: Let us assume you have created a formula to calculate PMT. You want to know
    the number of months you need in order to complete the installment, provided you
    pay x amount per month. For this kind of reverse analysis, you may use the Goal
    Seek utility. This type of analysis involves changing the values in a worksheet
    and observing how these changes affect the results of the formulas. You use Goal
    Seek to solve problems that have one variable.
  id: totrans-1769
  prefs: []
  type: TYPE_NORMAL
  zh: 假设你已经创建了一个计算PMT的公式。你想要知道你需要多少个月才能完成分期付款，前提是你每月支付x金额。对于这种反向分析，你可以使用目标寻求实用程序。这种分析涉及更改工作表中的值并观察这些更改如何影响公式的结果。你使用目标寻求来解决只有一个变量的问题。
- en: The Goal Seek feature in Excel helps us compute a value for the spreadsheet
    input that makes the value for the given formula match the goal you specify. Goal
    Seek saves you from performing time-consuming trial-and-error analysis.
  id: totrans-1770
  prefs: []
  type: TYPE_NORMAL
  zh: Excel中的目标寻求功能帮助我们计算一个值，使得给定公式的值与指定的目标相匹配。目标寻求可以节省你进行耗时的大量试错分析。
- en: Using the Goal Seek Command
  id: totrans-1771
  prefs: []
  type: TYPE_NORMAL
  zh: 使用目标寻求命令
- en: To find a specific value that solves a formula, follow the steps below.
  id: totrans-1772
  prefs: []
  type: TYPE_NORMAL
  zh: 要找到一个特定值以解决公式，请按照以下步骤操作。
- en: 1. Select the cell containing the formula.
  id: totrans-1773
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 选择包含公式的单元格。
- en: 2. Activate the Data tab.
  id: totrans-1774
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 激活“数据”选项卡。
- en: 3. In the Data Tools group, click What-if Analysis and choose Goal Seek to open
    the Goal Seek dialog box.
  id: totrans-1775
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 在“数据工具”组中，单击“假设分析”并选择“目标寻求”以打开目标寻求对话框。
- en: 4. In the Set cell box, specify the cell that contains the formula you want
    to solve.
  id: totrans-1776
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 在“设置单元格”框中，指定包含要解决的公式的单元格。
- en: 5. In the To Value field, enter the result you want.
  id: totrans-1777
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 在“目标值”字段中输入你想要的结果。
- en: 6. In the By Changing Cell field, specify the cell that contains the value you
    want to adjust.
  id: totrans-1778
  prefs: []
  type: TYPE_NORMAL
  zh: 6. 在“更改单元格”字段中，指定包含要调整的值的单元格。
- en: 7. Click OK.
  id: totrans-1779
  prefs: []
  type: TYPE_NORMAL
  zh: 7. 点击“确定”。
- en: For example, a person takes a loan of 100,000 for 36 months, and the EMI [PMT]
    is 3250\. If he pays $5000 per month, in how many months would he complete his
    payment?
  id: totrans-1780
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，一个人贷款10万美元，期限为36个月，每月的EMI [PMT]为3250美元。如果他每月支付5000美元，他将在多少个月内完成付款？
- en: Refer to [Table 11.1](#tab11-1).
  id: totrans-1781
  prefs: []
  type: TYPE_NORMAL
  zh: 参考表 11.1 [Table 11.1](#tab11-1)。
- en: TABLE 11.1 Data for Problem
  id: totrans-1782
  prefs: []
  type: TYPE_NORMAL
  zh: 表 11.1 问题数据
- en: '|  | A | B |'
  id: totrans-1783
