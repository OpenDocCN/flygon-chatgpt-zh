- en: Introduction
  id: totrans-97
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 简介
- en: Artificial intelligence has come a long way since its inception, and one of
    the most remarkable advancements in this field is the development of language
    models. Among these, the GPT (Generative Pre-trained Transformer) series stands
    out for its capabilities in understanding and generating human-like text. In this
    chapter, we will explore the origins, evolution, and underlying principles of
    the GPT models, culminating in the sophisticated architecture of GPT-4, which
    powers ChatGPT.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能自诞生以来已经取得了长足的进步，该领域最引人注目的进步之一是语言模型的发展。在这些模型中，GPT（生成预训练变换器）系列因其理解和生成类似人类文本的能力而脱颖而出。在本章中，我们将探讨GPT模型的起源、演变和基本原理，最终探讨GPT-4这一复杂架构，它是ChatGPT背后的动力。
- en: '| ![image](d2d_images/chapter_title_corner_decoration_left.png) |  | ![image](d2d_images/chapter_title_corner_decoration_right.png)
    |'
  id: totrans-99
  prefs: []
  type: TYPE_TB
  zh: '| ![image](d2d_images/chapter_title_corner_decoration_left.png) |  | ![image](d2d_images/chapter_title_corner_decoration_right.png)
    |'
