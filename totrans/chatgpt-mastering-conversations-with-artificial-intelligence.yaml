- en: '**Basic Terminology**'
  id: totrans-1695
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '**基本术语**'
- en: Getting started with a revolutionary technology like Generative AI (GenAI) can
    be overwhelming. A key element is to establish a common terminology. It is essential
    to allow a more accurate, effective, and knowledgeable use of this modern technology.
    To my knowledge, as of now, September 2023, there are no universal definitions
    of Artificial Intelligence and Machine Learning.
  id: totrans-1696
  prefs: []
  type: TYPE_NORMAL
  zh: 开始使用像生成式AI（GenAI）这样的革命性技术可能会让人感到不知所措。关键要素是建立共同术语。这对于更准确、有效和知识性地使用这项现代技术至关重要。据我所知，截至2023年9月，目前还没有关于人工智能和机器学习的通用定义。
- en: 'ARTIFICIAL INTELLIGENCE (AI): Field of study that focuses on creating computer
    systems capable of performing tasks that would require human intelligence. These
    tasks include problem-solving, learning, and decision-making.'
  id: totrans-1697
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能（AI）：专注于创建能够执行需要人类智能的任务的计算机系统的研究领域。这些任务包括解决问题、学习和决策。
- en: 'ARTIFICIAL NEURAL NETWORK: Computing system inspired by the human brain. It
    is a web of nodes, or "neurons," connected by lines, called "synapses." Data flows
    through these connections. Each node processes the data, like a mini-decision
    maker. Layer by layer, they work together to solve a problem or make a prediction.
    Simple tasks need just a few layers. Complex ones, many layers. It represents
    the backbone of modern AI.'
  id: totrans-1698
  prefs: []
  type: TYPE_NORMAL
  zh: 人工神经网络：受人类大脑启发的计算系统。它是由线条连接的节点或“神经元”组成的网络，这些线条被称为“突触”。数据通过这些连接流动。每个节点处理数据，就像一个微型决策者。一层层地，它们共同工作以解决问题或做出预测。简单的任务只需要几层。复杂的任务需要许多层。它是现代AI的骨架。
- en: '![ArtificialNeuralNetwork.tif](../Images/ArtificialNeuralNetwork_fmt.png)'
  id: totrans-1699
  prefs: []
  type: TYPE_IMG
  zh: '![人工神经网络.tif](../Images/ArtificialNeuralNetwork_fmt.png)'
- en: 'ATTENTION: Tool in computer algorithms that helps focus on important parts
    of data. In the context of AI and language models like ChatGPT, it helps the system
    pay attention to keywords or phrases to make better sense of long sentences.'
  id: totrans-1700
  prefs: []
  type: TYPE_NORMAL
  zh: 注意：计算机算法中的工具，有助于关注数据的重要部分。在AI和ChatGPT等语言模型的背景下，它帮助系统关注关键词或短语，以便更好地理解长句。
- en: 'MULTI-HEAD ATTENTION: Advanced form of attention that uses multiple "focus
    points" to understand different parts of data at the same time. It is like reading
    a sentence and understanding the meaning, tone, and context all at once.'
  id: totrans-1701
  prefs: []
  type: TYPE_NORMAL
  zh: 多头注意力：一种高级的注意力形式，使用多个“焦点”同时理解数据的不同部分。这就像同时阅读一个句子并理解其意义、语气和上下文。
- en: 'CLASSIFICATION: Task in machine learning where the goal is to sort data into
    specific categories. Picture sorting fruits into baskets labeled ''apples'' or
    ''bananas'' based on their color. That is a classification. You are putting things
    into categories. For example, it can help decide if a medical test shows a dangerous
    tumor or a harmless one. (Image adapted from Oracle.) LLMs are also able to execute
    classification tasks like classifying the reviews (positive or negative) of a
    product using customer reviews.'
  id: totrans-1702
  prefs: []
  type: TYPE_NORMAL
  zh: 分类：机器学习中的任务，其目标是将数据分类到特定的类别中。想象一下根据颜色将水果分类到标有“苹果”或“香蕉”的篮子里，那就是分类。你是在将事物归类。例如，它可以帮助判断医学测试显示的是危险的肿瘤还是无害的肿瘤。（图像改编自Oracle。）LLMs也能够执行分类任务，例如使用客户评论对产品的评论（正面或负面）进行分类。
- en: '![Classification.tif](../Images/Classification_fmt.png)'
  id: totrans-1703
  prefs: []
  type: TYPE_IMG
  zh: '![分类.tif](../Images/Classification_fmt.png)'
- en: 'CLUSTERING: Task that groups things based on their similarities without you
    labelling them. Think of it as a toy organization. You group your cars, dolls,
    and action figures into separate piles based on what they look like. (Image adapted
    from Oracle.) LLMs are also able to execute clustering tasks. E.g., clustering
    customer feedback based on their preferences by grouping feedback based on similar
    features or issues.'
  id: totrans-1704
  prefs: []
  type: TYPE_NORMAL
  zh: 聚类：根据相似性对事物进行分组而不需要你标记的任务。想象成玩具组织。你根据外观将汽车、娃娃和动作人偶分成单独的堆。 (图像改编自Oracle。) 大型语言模型（LLMs）也能执行聚类任务。例如，根据相似特征或问题对客户反馈进行聚类。
- en: '![Clustering.tif](../Images/Clustering_fmt.png)'
  id: totrans-1705
  prefs: []
  type: TYPE_IMG
  zh: '![Clustering.tif](../Images/Clustering_fmt.png)'
- en: 'CONTEXT WINDOW: Range of words or data points that a machine learning model,
    like ChatGPT, looks at to understand what is currently being discussed. It is
    like the model''s short-term memory, helping it to make sense of the words or
    phrases it is currently focused on.'
  id: totrans-1706
  prefs: []
  type: TYPE_NORMAL
  zh: 上下文窗口：机器学习模型（如ChatGPT）查看以理解当前讨论内容的单词或数据点范围。它类似于模型的短期记忆，帮助其理解当前关注的单词或短语。
- en: '![Figure_3.3.tif](../Images/Figure_3.3_fmt1.png)'
  id: totrans-1707
  prefs: []
  type: TYPE_IMG
  zh: '![Figure_3.3.tif](../Images/Figure_3.3_fmt1.png)'
- en: 'CORPUS OF DATA: Collection of information that a computer uses to learn or
    make decisions. This can include text, images, sounds, or numbers. Think of it
    as the "study material" for a machine learning model.'
  id: totrans-1708
  prefs: []
  type: TYPE_NORMAL
  zh: 数据集：计算机用于学习或做出决策的信息集合。这可以包括文本、图像、声音或数字。将其视为机器学习模型的“学习材料”。
- en: 'CUTOFF DATE: The last day the training data was updated. After that, we cannot
    access new information. ChatGPT cutoff date, as of September 2023, is January
    2022\. To access more recent information, you can use plugins that add browsing
    capabilities or access to private resources.'
  id: totrans-1709
  prefs: []
  type: TYPE_NORMAL
  zh: 截止日期：训练数据最后更新的日期。之后，我们无法访问新信息。截至2023年9月，ChatGPT的截止日期是2022年1月。要获取更近期的信息，可以使用添加浏览功能或访问私有资源的插件。
- en: 'DATA MINING: The act of digging through a lot of data to find useful information
    or patterns. It helps make sense of messy or random info, like lots of text or
    pictures.'
  id: totrans-1710
  prefs: []
  type: TYPE_NORMAL
  zh: 数据挖掘：挖掘大量数据以寻找有用信息或模式的行为。它有助于理解混乱或随机的信息，如大量的文本或图片。
- en: 'DEEP LEARNING (DL): Type of machine learning, based on neural networks, that
    is good at finding subtle patterns in lots of data. It uses layers of calculations
    to get better and more detailed insights. Imagine a smart box that can tell if
    a picture is a dog or a cat. The box has multiple layers that look for different
    traits like fur or ears to figure out the animal. It is not perfect at first but
    gets better with more data.'
  id: totrans-1711
  prefs: []
  type: TYPE_NORMAL
  zh: 深度学习（DL）：基于神经网络的一种机器学习类型，擅长在大量数据中找到微妙的模式。它使用计算层来获得更好和更详细的见解。想象一个智能盒子，可以判断一张图片是狗还是猫。盒子有多个层，寻找不同的特征，如毛发或耳朵，以确定动物。它一开始并不完美，但随着数据的增加而变得更好。
- en: 'DECODER: Transformer component that takes a sequence of input representations
    and produces a sequence of output tokens. (see TRANSFORMER ARCHITECTURE)'
  id: totrans-1712
  prefs: []
  type: TYPE_NORMAL
  zh: 解码器：Transformer组件，它接受一系列输入表示并生成一系列输出标记。（参见转换器架构）
- en: 'DIFFUSION MODELS: Generative AI models that create images in a process similar
    to the one of a sculptor molding clay. It starts with a raw, undefined canvas
    and gradually shapes it, refining every requested detail until the desired output
    is attained.'
  id: totrans-1713
  prefs: []
  type: TYPE_NORMAL
  zh: 扩散模型：生成式AI模型，其创建图像的过程类似于雕塑家塑造粘土的过程。它从一个原始、未定义的画布开始，逐渐塑造它，细化每个请求的细节，直到达到所需的输出。
- en: The training process starts with a dataset of clean, structured images. New
    images are created by gradually "adding noise" over a series of steps until the
    data is completely random noise. The model learns how to reverse the diffusion
    process by learning the parameters that define the denoising process at each step.
  id: totrans-1714
  prefs: []
  type: TYPE_NORMAL
  zh: 训练过程从一组干净、结构化的图像数据集开始。通过一系列步骤逐渐“添加噪声”来创建新图像，直到数据完全变为随机噪声。模型通过学习定义每个步骤去噪过程的参数来学习如何逆转扩散过程。
- en: '![Dogs1.tif](../Images/Dogs1_fmt.png)'
  id: totrans-1715
  prefs: []
  type: TYPE_IMG
  zh: '![Dogs1.tif](../Images/Dogs1_fmt.png)'
- en: '![Dogs.tif](../Images/Dogs_fmt.png)'
  id: totrans-1716
  prefs: []
  type: TYPE_IMG
  zh: '![Dogs.tif](../Images/Dogs_fmt.png)'
- en: The training dataset is labeled. The words "dog, Cocker Spaniel, sitting" act
    like a "cue" telling the model what it is expected to generate.
  id: totrans-1717
  prefs: []
  type: TYPE_NORMAL
  zh: 训练数据集已标记。单词“狗，Cocker Spaniel，坐着”像是一个“提示”，告诉模型它期望生成的内容。
- en: Image generation tools that utilize diffusion models can generate images that
    are variations on the themes found in their training datasets, which can be astonishingly
    realistic or artistically stylized.
  id: totrans-1718
  prefs: []
  type: TYPE_NORMAL
  zh: 利用扩散模型生成图像的工具可以生成在其训练数据集中找到的主题的变体，这些图像可以是惊人的逼真或艺术化风格化。
- en: 'EMBEDDING: Feature for turning words or symbols into a set of numbers, known
    as vectors, that a computer can understand. These number sets help the machine
    get the meaning, context, or importance of each word.'
  id: totrans-1719
  prefs: []
  type: TYPE_NORMAL
  zh: 嵌入：将单词或符号转换为计算机可以理解的数字集合（称为向量）的功能。这些数字集合帮助机器获取每个单词的意义、上下文或重要性。
- en: 'ENCODER: Transformer component that takes a sequence of input tokens and produces
    a sequence of hidden representations. (see TRANSFORMER ARCHITECTURE)'
  id: totrans-1720
  prefs: []
  type: TYPE_NORMAL
  zh: 编码器：Transformer组件，它接受一系列输入标记并产生一系列隐藏表示。（参见Transformer架构）
- en: 'EXPLAINABLE AI (XAI): Techniques that attempt to make AI''s inference process
    more transparent, interpretable, and understandable by humans.'
  id: totrans-1721
  prefs: []
  type: TYPE_NORMAL
  zh: 可解释人工智能（XAI）：试图使人工智能的推理过程对人类更加透明、可解释和可理解的技巧。
- en: 'FINE-TUNING: An add-on that comes after the model is built. Fine-tuning is
    about specialization, and refining the skills of a language model. It is about
    taking a general-purpose Language Model (a FOUNDATION MODEL) and making it an
    expert in something specific. The goal is to teach the model new tricks or to
    improve its skills in certain fields. You make the "adjustment" by training the
    Foundation Model on a specific dataset.'
  id: totrans-1722
  prefs: []
  type: TYPE_NORMAL
  zh: 微调：在模型构建之后的一个附加功能。微调是关于专业化的，它涉及到对语言模型技能的细化。它涉及到将一个通用语言模型（一个基础模型）变成某个特定领域的专家。目标是教会模型新的技巧或提高它在某些领域的技能。你通过在特定数据集上训练基础模型来进行“调整”。
- en: 'FOUNDATION MODEL: Type of language machine trained on a huge amount of data,
    like text and code. It serves as a starting point for creating more specialized
    AI tools.'
  id: totrans-1723
  prefs: []
  type: TYPE_NORMAL
  zh: 基础模型：在大量数据（如文本和代码）上训练的语言机器类型。它作为创建更多专用人工智能工具的起点。
- en: 'GENERATIVE AI: Type of AI that creates new content, such as text, images, or
    sounds. While the term "generate" is used, it is worth noting that AI is not inventing
    from scratch but rearranging existing data it has learned from.'
  id: totrans-1724
  prefs: []
  type: TYPE_NORMAL
  zh: 生成式人工智能：一种创建新内容的人工智能类型，如文本、图像或声音。虽然使用了“生成”这个术语，但值得注意的是，人工智能并不是从头开始发明，而是重新排列它从所学数据中获取的现有数据。
- en: 'HALLUCINATION: When a generative AI, like a language model, produces something
    that is not based on given facts or data. One mistake the machine can make.'
  id: totrans-1725
  prefs: []
  type: TYPE_NORMAL
  zh: 幻觉：当生成式人工智能（如语言模型）产生基于给定事实或数据之外的东西时。机器可能犯的一个错误。
- en: 'INFERENCE: In AI''s world, this means making educated guesses based on existing
    data. While it is called "reasoning," it is more about finding patterns in the
    data and making predictions, rather than true logical thought.'
  id: totrans-1726
  prefs: []
  type: TYPE_NORMAL
  zh: 推理：在人工智能的世界里，这意味着基于现有数据进行有根据的猜测。虽然这被称为“推理”，但它更多的是在数据中寻找模式并做出预测，而不是真正的逻辑思考。
- en: '"KNOWLEDGE" TRANSFER (LEARNING TRANSFER): Pre-trained language model has already
    learned a lot from tons of data. When you fine-tune it, you are letting the new
    model inherit that broad knowledge, and then specialize in a certain field. This
    way, the fine-tuned model gets a head start in its own training.'
  id: totrans-1727
  prefs: []
  type: TYPE_NORMAL
  zh: “知识”迁移（学习迁移）：预训练的语言模型已经从大量数据中学习了很多。当你对其进行微调时，你是在让新的模型继承这种广泛的知识，然后在某个特定领域进行专业化。这样，微调的模型在它自己的训练中就取得了先机。
- en: '![KnowwledgeTransfer.tif](../Images/KnowwledgeTransfer_fmt.png)'
  id: totrans-1728
  prefs: []
  type: TYPE_IMG
  zh: '![知识迁移.tif](../Images/KnowwledgeTransfer_fmt.png)'
- en: 'LANGUAGE: Set of symbols or sounds used for communication and, to some extent,
    thinking. People use it to share ideas, emotions, and information. It can be spoken,
    written, or signed and varies in complexity.'
  id: totrans-1729
  prefs: []
  type: TYPE_NORMAL
  zh: 语言：用于交流和在一定程度上用于思考的符号或声音集合。人们用它来分享想法、情感和信息。它可以口头表达、书面表达或手势表达，并且具有不同的复杂性。
- en: 'LANGUAGE MODEL (LM): Type of AI trained to mimic human-like text or speech.
    It learns from a vast "corpus" of textual data and uses those patterns to generate
    language that sounds like it comes from a person.'
  id: totrans-1730
  prefs: []
  type: TYPE_NORMAL
  zh: 语言模型（LM）：一种训练成模仿人类类似文本或语音的人工智能类型。它从大量的文本数据“语料库”中学习，并使用这些模式生成听起来像来自人的语言。
- en: '![Language_Model.tif](../Images/Language_Model_fmt.png)'
  id: totrans-1731
  prefs: []
  type: TYPE_IMG
  zh: '![语言模型.tif](../Images/Language_Model_fmt.png)'
- en: 'LANGUAGE MODEL PARAMETERS: The numbers a language model learns while training.
    These numbers, like weights and biases, guide how the model turns what it is given
    into an answer or text. For example, 187 billion parameters were used to train
    ChatGPT.'
  id: totrans-1732
  prefs: []
  type: TYPE_NORMAL
  zh: 语言模型参数：语言模型在训练过程中学习到的数字。这些数字，如权重和偏差，指导模型如何将所提供的内容转换为答案或文本。例如，ChatGPT的训练使用了1870亿个参数。
- en: 'LANGUAGE MODEL PRE-TRAINED: Language model that has already been trained on
    a huge amount of data before you even use it. This means it can start generating
    text or answering questions without needing extra training first.'
  id: totrans-1733
  prefs: []
  type: TYPE_NORMAL
  zh: 语言模型预训练：在使用之前已经在大量数据上训练过的语言模型。这意味着它可以在不需要额外训练的情况下开始生成文本或回答问题。
- en: '![Language_Model_Pretrained.tif](../Images/Language_Model_Pretrain_fmt.png)'
  id: totrans-1734
  prefs: []
  type: TYPE_IMG
  zh: '![Language_Model_Pretrained.tif](../Images/Language_Model_Pretrain_fmt.png)'
- en: 'LANGUAGE MODEL, FINE-TUNED: Pre-trained language model that has been further
    trained on specific data. This makes it better at handling tasks or questions
    in a certain field.'
  id: totrans-1735
  prefs: []
  type: TYPE_NORMAL
  zh: 语言模型，微调：在特定数据上进一步训练的预训练语言模型。这使得它在处理特定领域的任务或问题时表现得更好。
- en: '![Language_Model_Finetuned.tif](../Images/Language_Model_Finetune_fmt.png)'
  id: totrans-1736
  prefs: []
  type: TYPE_IMG
  zh: '![Language_Model_Finetuned.tif](../Images/Language_Model_Finetune_fmt.png)'
- en: 'LAYER: The building blocks in a language model''s architecture. Think of these
    as steps in a language model''s brain. Each layer learns a bit about the data,
    makes some changes, and passes it on. They represent how the model learns what
    it knows.'
  id: totrans-1737
  prefs: []
  type: TYPE_NORMAL
  zh: 层：语言模型架构中的构建块。将这些视为语言模型大脑中的步骤。每一层都会学习有关数据的一些信息，进行一些更改，并将其传递下去。它们代表了模型如何学习其知识。
- en: '![Transformer_ArchitectureLayers.tif](../Images/Transformer_Architectur_fmt.png)'
  id: totrans-1738
  prefs: []
  type: TYPE_IMG
  zh: '![Transformer_ArchitectureLayers.tif](../Images/Transformer_Architectur_fmt.png)'
- en: 'MACHINE LEARNING (ML): The science of how to make computers learn on their
    own. Instead of being told what to do (i.e., programmed what to do), they use
    statistics to find patterns in data like numbers, words, or pictures.'
  id: totrans-1739
  prefs: []
  type: TYPE_NORMAL
  zh: 机器学习（ML）：研究如何让计算机自主学习。它们不是被告诉做什么（即，被编程做什么），而是使用统计学在数据（如数字、文字或图片）中寻找模式。
- en: 'MESSAGE: Texts exchanged between AI and user. Conversations can be as short
    as one message or many back-and-forth turns.'
  id: totrans-1740
  prefs: []
  type: TYPE_NORMAL
  zh: 消息：AI和用户之间交换的文本。对话可以短至一条消息，也可以是许多来回的回合。
- en: 'NATURAL LANGUAGE PROCESSING (NLP): Part of AI that helps computers get our
    language. It builds tools so computers can read, understand, and even write like
    us. It handles stuff like translating languages and answering questions.'
  id: totrans-1741
  prefs: []
  type: TYPE_NORMAL
  zh: 自然语言处理（NLP）：AI的一部分，帮助计算机理解我们的语言。它构建工具，使计算机能够像我们一样阅读、理解和甚至写作。它处理诸如翻译语言和回答问题等任务。
- en: 'PLUGIN: Software tools used to extend or add new capabilities to a system,
    that otherwise would not be able to do. In the ChatGPT case, plugins are pieces
    of software that allow ChatGPT to access third-party resources or functionalities.
    Only install plugins that come from trusted sources that respect your privacy
    and do not re-use your data.'
  id: totrans-1742
  prefs: []
  type: TYPE_NORMAL
  zh: 插件：用于扩展或添加系统新功能的软件工具，否则系统将无法完成这些功能。在ChatGPT的情况下，插件是允许ChatGPT访问第三方资源或功能的软件组件。仅安装来自可信赖来源且尊重您隐私且不重复使用您数据的插件。
- en: '![Figure_5.2.tif](../Images/Figure_5.2_fmt1.png)'
  id: totrans-1743
  prefs: []
  type: TYPE_IMG
  zh: '![Figure_5.2.tif](../Images/Figure_5.2_fmt1.png)'
- en: 'PROMPT: Question or statement that you give to an AI model to get a response.
    OpenAI documentation highlights the importance of providing context and preferences
    to tailor AI''s responses to your needs. The additional information could be structured
    using the Prompt Components Framework.'
  id: totrans-1744
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：您提供给AI模型以获得响应的问题或陈述。OpenAI文档强调了提供上下文和偏好以定制AI响应以满足您需求的重要性。这些附加信息可以使用提示组件框架进行结构化。
- en: '![Figure_3.1.tif](../Images/Figure_3.1_fmt1.png)'
  id: totrans-1745
  prefs: []
  type: TYPE_IMG
  zh: '![Figure_3.1.tif](../Images/Figure_3.1_fmt1.png)'
- en: PROMPT DESIGN (see PROMPT ENGINEERING)
  id: totrans-1746
  prefs: []
  type: TYPE_NORMAL
  zh: 提示设计（见提示工程）
- en: 'PROMPT ENGINEERING: Often referred to as PROMPT DESIGN, represents the art
    of asking AI (LLMs like ChatGPT, Bard, and more) the right way. You study how
    to frame your questions to get the best, most accurate answers from the model.
    It is all about finding the sweet spot through trial and error.'
  id: totrans-1747
  prefs: []
  type: TYPE_NORMAL
  zh: 提示工程：通常被称为提示设计，代表询问AI（如ChatGPT、Bard等）的正确方式的艺术。您研究如何构建问题以从模型中获得最佳、最准确的答案。这完全是通过试错来找到最佳点。
- en: 'REGRESSION: Special task in machine learning where the computer tries to predict
    a specific number. Imagine guessing someone''s age by their height. You plot age
    against height on a graph and use this to predict a new person''s age. So, regression
    helps you make number-based guesses.'
  id: totrans-1748
  prefs: []
  type: TYPE_NORMAL
  zh: 回归：机器学习中的一个特殊任务，计算机试图预测一个特定的数字。想象一下通过一个人的身高来猜测他们的年龄。您在图表上绘制年龄与身高，并使用此信息来预测新人的年龄。因此，回归帮助您进行基于数字的猜测。
- en: '![Regression.tif](../Images/Regression_fmt.png)'
  id: totrans-1749
  prefs: []
  type: TYPE_IMG
  zh: '![Regression.tif](../Images/Regression_fmt.png)'
- en: 'REINFORCEMENT LEARNING FROM HUMAN FEEDBACK (RLHF): Feature to make AI smarter
    using human input. You give feedback, and the model learns from it.'
  id: totrans-1750
  prefs: []
  type: TYPE_NORMAL
  zh: 基于人类反馈的强化学习（RLHF）：通过人类输入使AI变得更智能的功能。您提供反馈，模型从中学习。
- en: 'SELF-ATTENTION: Feature that lets a model like ChatGPT pay close attention
    to different parts of what it is reading, even if those parts are far apart.'
  id: totrans-1751
  prefs: []
  type: TYPE_NORMAL
  zh: SELF-ATTENTION：允许模型（如ChatGPT）对所阅读的不同部分给予密切关注的特性，即使这些部分相隔很远。
- en: 'SUPERVISED LEARNING (SL): Type of ML in which a computer, given problems and
    the correct answers (labeled data), learns over time to solve similar problems
    on its own. Think of it as a tutor-student setup. The computer gets a bunch of
    questions and their answers. It studies them so it can answer similar questions
    on its own later.'
  id: totrans-1752
  prefs: []
  type: TYPE_NORMAL
  zh: SUPERVISED LEARNING (SL)：一种机器学习类型，其中计算机在给定问题和正确答案（标记数据）的情况下，随着时间的推移学习自己解决类似问题。将其视为导师-学生设置。计算机得到一系列问题和它们的答案。它研究它们，以便以后能够自己回答类似的问题。
- en: 'UNSUPERVISED LEARNING (USL): Type of machine learning that does not require
    labeled data. Picture a detective piecing together a puzzle without a guide. The
    computer scours through data, finding patterns all on its own.'
  id: totrans-1753
  prefs: []
  type: TYPE_NORMAL
  zh: UNSUPERVISED LEARNING (USL)：一种不需要标记数据的机器学习类型。想象一下侦探在没有指南的情况下拼凑拼图。计算机通过数据，自己找到模式。
- en: 'TEXT NORMALIZATION: The process of converting text to a standard format, such
    as lowercasing all text, removing special characters, and converting numbers to
    their written form.'
  id: totrans-1754
  prefs: []
  type: TYPE_NORMAL
  zh: TEXT NORMALIZATION：将文本转换为标准格式的过程，例如将所有文本转换为小写，删除特殊字符，并将数字转换为它们的文字形式。
- en: 'TOKEN: The smallest semantic unit that makes up the input and output sequences
    processed by a language model. Tokens typically represent individual words or
    sub-words, although they can also include characters or other linguistic units.
    Each token is assigned a unique identifier (usually integers).'
  id: totrans-1755
  prefs: []
  type: TYPE_NORMAL
  zh: TOKEN：构成语言模型处理输入和输出序列的最小语义单元。标记通常代表单个单词或子词，尽管它们也可以包括字符或其他语言单元。每个标记都被分配了一个唯一的标识符（通常是整数）。
- en: 'TOKENIZATION: The process of breaking down text into individual units, such
    as words or phrases. This is an important step in preparing text data for NLP
    tasks.'
  id: totrans-1756
  prefs: []
  type: TYPE_NORMAL
  zh: TOKENIZATION：将文本分解成单个单元的过程，如单词或短语。这是为NLP任务准备文本数据的重要步骤。
- en: 'TRANSFORMER ARCHITECTURE: Blueprint for building advanced AI tools like ChatGPT.
    It consists of two main parts: an encoder that understands the input and a decoder
    that creates the output. Many transformers are pre-trained, meaning they have
    already learned from a large set of data before they are fine-tuned for specific
    tasks.'
  id: totrans-1757
  prefs: []
  type: TYPE_NORMAL
  zh: TRANSFORMER ARCHITECTURE：构建高级AI工具（如ChatGPT）的蓝图。它由两个主要部分组成：一个理解输入的编码器和一个创建输出的解码器。许多transformer是预训练的，这意味着它们在微调特定任务之前已经从大量数据中学习过。
- en: '![Transformer_Architecture_b.tif](../Images/Transformer_Architectu_fmt1.png)'
  id: totrans-1758
  prefs: []
  type: TYPE_IMG
  zh: '![Transformer_Architecture_b.tif](../Images/Transformer_Architectu_fmt1.png)'
- en: 'PRE-TRAINED NEURAL NETWORK: Neural network that has already been trained on
    a large dataset to recognize general patterns in data. It forms the basis of specific
    AI tools like ChatGPT and can be fine-tuned for specialized tasks.'
  id: totrans-1759
  prefs: []
  type: TYPE_NORMAL
  zh: PRE-TRAINED NEURAL NETWORK：已经在大型数据集上训练过的神经网络，以识别数据中的通用模式。它是特定AI工具（如ChatGPT）的基础，并且可以针对特定任务进行微调。
- en: 'TRANSFORMER LANGUAGE MODEL: Language model that is built using the transformer
    architecture. The transformer enables the Language Model to capture contextual
    information effectively.'
  id: totrans-1760
  prefs: []
  type: TYPE_NORMAL
  zh: TRANSFORMER LANGUAGE MODEL：使用transformer架构构建的语言模型。transformer使语言模型能够有效地捕获上下文信息。
- en: '![GlosarLipsa1.tif](../Images/GlosarLipsa1_fmt1.png)'
  id: totrans-1761
  prefs: []
  type: TYPE_IMG
  zh: '![GlosarLipsa1.tif](../Images/GlosarLipsa1_fmt1.png)'
- en: 'TRANSFORMER (GENERATIVE PRE-TRAINED TRANSFORMER, GPT): Special type of transformer.
    Unlike standard transformers with encoders and decoders, GPT uses just the decoder.
    It is trained on a heap of text, the goal being to excel at understanding and
    to be a pro at crafting human-like text.'
  id: totrans-1762
  prefs: []
  type: TYPE_NORMAL
  zh: TRANSFORMER (GENERATIVE PRE-TRAINED TRANSFORMER, GPT)：一种特殊的transformer类型。与具有编码器和解码器的标准transformer不同，GPT只使用解码器。它在一堆文本上训练，目标是擅长理解和擅长创作类似人类的文本。
- en: 'TUNING (FINE-TUNING): The process of further training a pre-trained language
    model, like ChatGPT, on a smaller dataset to adapt it to a specific task or domain
    (e.g., health care). The model already knows a lot from its general training.
    But fine-tuning makes it an expert in, for example, healthcare or cooking recipes.
    It is about mastering the details.'
  id: totrans-1763
  prefs: []
  type: TYPE_NORMAL
  zh: TUNING (FINE-TUNING)：进一步训练预训练的语言模型（如ChatGPT）的过程，在较小的数据集上进行，以适应特定任务或领域（例如，医疗保健）。模型已经从其一般训练中知道了很多。但是微调使其成为医疗保健或烹饪食谱等领域的专家。这是关于掌握细节。
- en: 'TRAINING: The process of teaching a Language Model, like ChatGPT, to perform
    a specific task by exposing it to large amounts of data. It is like teaching a
    young mind. You feed a language model heap of data, and the model picks up patterns
    and grasps the rhythm of words.'
  id: totrans-1764
  prefs: []
  type: TYPE_NORMAL
  zh: 训练：通过向语言模型，如ChatGPT，展示大量数据来教授它执行特定任务的过程。这就像教育一个年轻的大脑。你向语言模型提供大量数据，模型从中提取模式并掌握词语的节奏。
- en: 'VECTOR: The numerical representation of a word in the context of the phrase.
    Basically, it is a list of numbers representing different aspects of the word.
    Let''s make an analogy between a word and a person. Think of a vector like a digital
    ID for a word. Imagine each word as a person, and the vector as their profile—height,
    age, and hobbies, all converted into numbers. This profile helps the computer
    understand the word''s role in a sentence. So, in a world of numbers, a vector
    is a word''s identity card.'
  id: totrans-1765
  prefs: []
  type: TYPE_NORMAL
  zh: 向量：在短语语境中一个词的数值表示。基本上，它是一系列代表词不同方面的数字。让我们将词与人的类比。想象向量就像一个词的数字身份证。想象每个词就像一个人，向量就像他们的档案——身高、年龄和爱好，所有这些都转换成了数字。这个档案帮助计算机理解词在句子中的作用。所以，在数字的世界里，向量是词的身份证。
