- en: This extended example demonstrates how classes can significantly improve the
    structure and functionality of your VBA projects. By encapsulating conversation
    management within a class, your code becomes more organized, easier to maintain,
    and more powerful.
  id: totrans-300
  prefs: []
  type: TYPE_NORMAL
  zh: 此扩展示例演示了类如何显著提高VBA项目的结构和功能。通过将对话管理封装在类中，您的代码变得更加有序、易于维护和强大。
- en: 'Chapter 15: Testing and Troubleshooting'
  id: totrans-301
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第15章：测试和故障排除
- en: Before deploying your ChatGPT-powered assistant, thorough testing is essential
    to ensure it works as expected. This chapter covers various testing strategies
    and troubleshooting tips.
  id: totrans-302
  prefs: []
  type: TYPE_NORMAL
  zh: 在部署ChatGPT驱动的助手之前，彻底测试是必不可少的，以确保其按预期工作。本章涵盖了各种测试策略和故障排除技巧。
- en: Testing Strategies
  id: totrans-303
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 测试策略
- en: Systematic testing helps you identify and fix issues before they reach end users.
  id: totrans-304
  prefs: []
  type: TYPE_NORMAL
  zh: 系统性测试有助于您在问题到达最终用户之前发现并修复它们。
- en: • **Unit Testing:**– Test individual functions or procedures to ensure they
    work correctly in isolation. vba Sub TestSendToChatGPT()  Dim result As String 
    result = SendToChatGPT("Test input")  Debug.Print result End Sub• **Integration
    Testing:**– Test how different parts of your assistant work together, particularly
    the interaction between the UserForm and the API calls.• **User Acceptance Testing
    (UAT):**– Have real users test your assistant in various scenarios to ensure it
    meets their needs and is easy to use.
  id: totrans-305
  prefs: []
  type: TYPE_NORMAL
  zh: • **单元测试：**– 测试单个函数或过程，以确保它们在隔离状态下正确工作。vba Sub TestSendToChatGPT()  Dim result
    As String  result = SendToChatGPT("测试输入")  Debug.Print result End Sub• **集成测试：**– 测试助手的不同部分如何协同工作，特别是UserForm和API调用之间的交互。• **用户验收测试（UAT）：**– 让真实用户在各种场景下测试您的助手，以确保它满足他们的需求且易于使用。
- en: Common Issues and Fixes
  id: totrans-306
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 常见问题和解决方案
- en: Address common problems that might arise during the development and testing
    process.
  id: totrans-307
  prefs: []
  type: TYPE_NORMAL
  zh: 解决在开发和测试过程中可能出现的问题。
- en: • **Network Errors:**– Ensure that your assistant can handle network interruptions
    gracefully, possibly by implementing retries or timeout settings. vba http.setTimeouts
    10000, 10000, 10000, 10000 ' Set timeouts for different stages of the request• **Invalid
    API Responses:**– Implement checks to validate the API responses before using
    them, avoiding errors caused by unexpected data. vba If Not jsonResponse("choices")
    Is Nothing Then  reply = jsonResponse("choices")(1)("message")("content") Else 
    MsgBox "Invalid response from API" End If• **Performance Issues:**– Optimize code
    to reduce delays, such as by reducing the frequency of API calls or using more
    efficient data structures.
  id: totrans-308
  prefs: []
  type: TYPE_NORMAL
  zh: • **网络错误：**– 确保你的助手能够优雅地处理网络中断，可能通过实现重试或超时设置。 vba http.setTimeouts 10000, 10000,
    10000, 10000 ' 为请求的不同阶段设置超时• **无效API响应：**– 在使用API响应之前进行验证检查，以避免由意外数据引起的错误。 vba If
    Not jsonResponse("choices") Is Nothing Then  reply = jsonResponse("choices")(1)("message")("content") Else 
    MsgBox "Invalid response from API" End If• **性能问题：**– 优化代码以减少延迟，例如通过减少API调用频率或使用更高效的数据结构。
- en: User Testing
  id: totrans-309
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 用户测试
- en: Conduct user testing to gather feedback and identify any usability issues.
  id: totrans-310
  prefs: []
  type: TYPE_NORMAL
  zh: 进行用户测试以收集反馈并识别任何可用性问题。
- en: • **Test Scenarios:**– Create test cases for typical, edge, and stress scenarios
    to evaluate how your assistant performs under different conditions.• **Feedback
    Collection:**– Provide users with a way to submit feedback, such as through a
    survey or direct email.
  id: totrans-311
  prefs: []
  type: TYPE_NORMAL
  zh: • **测试场景：**– 为典型、边缘和压力场景创建测试用例，以评估你的助手在不同条件下的表现。• **反馈收集：**– 为用户提供提交反馈的方式，例如通过调查或直接电子邮件。
- en: 'Chapter 16: Deploying Your VBA Project'
  id: totrans-312
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第16章：部署你的VBA项目
- en: Once your project is complete and thoroughly tested, it's time to deploy it.
    This chapter covers how to share your ChatGPT-powered assistant with others.
  id: totrans-313
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦你的项目完成并经过彻底测试，就到了部署它的时刻。本章将介绍如何与他人分享你的ChatGPT助手。
- en: Packaging Your Project
  id: totrans-314
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 打包你的项目
- en: When you’re ready to distribute your VBA project, you’ll need to package it
    correctly.
  id: totrans-315
  prefs: []
  type: TYPE_NORMAL
  zh: 当你准备好分发你的VBA项目时，你需要正确地打包它。
- en: • **Saving as a Macro-Enabled Document:**– Save your Word document with a .docm
    extension to ensure it retains the VBA code. vba ActiveDocument.SaveAs2 "ChatGPTAssistant.docm",
    wdFormatXMLDocumentMacroEnabled• **Exporting UserForms and Modules:**– If sharing
    code or forms separately, export them as .frm and .bas files from the VBA editor.
  id: totrans-316
  prefs: []
  type: TYPE_NORMAL
  zh: • **保存为宏启用文档：**– 将你的Word文档保存为.docm扩展名，以确保它保留VBA代码。 vba ActiveDocument.SaveAs2
    "ChatGPTAssistant.docm", wdFormatXMLDocumentMacroEnabled• **导出用户表单和模块：**– 如果单独分享代码或表单，从VBA编辑器中将它们导出为.frm和.bas文件。
- en: Sharing with Others
  id: totrans-317
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 与他人分享
- en: There are several ways to share your project, depending on your audience.
  id: totrans-318
  prefs: []
  type: TYPE_NORMAL
  zh: 根据你的受众，有几种方式可以分享你的项目。
- en: • **Email:**– Send the .docm file via email, ensuring recipients know how to
    enable macros.• **Corporate Distribution:**– For corporate environments, consider
    using a document management system or an internal network drive.• **Online Platforms:**– Upload
    the file to a cloud storage service like Google Drive or Dropbox and share the
    link.
  id: totrans-319
  prefs: []
  type: TYPE_NORMAL
  zh: • **电子邮件：**– 通过电子邮件发送.docm文件，确保收件人知道如何启用宏。• **企业分发：**– 对于企业环境，考虑使用文档管理系统或内部网络驱动器。• **在线平台：**– 将文件上传到云存储服务，如Google
    Drive或Dropbox，并分享链接。
- en: Deployment Best Practices
  id: totrans-320
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 部署最佳实践
- en: Ensure a smooth rollout by following best practices for deployment.
  id: totrans-321
  prefs: []
  type: TYPE_NORMAL
  zh: 通过遵循部署的最佳实践来确保平稳推出。
- en: • **Documentation:**– Provide clear instructions on how to install and use the
    assistant, including any prerequisites like enabling macros or installing the
    JSONConverter.• **User Training:**– Consider providing a brief tutorial or guide
    to help users get started with your assistant.• **Ongoing Support:**– Offer support
    options, such as an email address for troubleshooting or a FAQ document.
  id: totrans-322
  prefs: []
  type: TYPE_NORMAL
  zh: • **文档：**– 提供关于如何安装和使用助手的清晰说明，包括任何先决条件，如启用宏或安装JSONConverter。• **用户培训：**– 考虑提供简短的教程或指南，帮助用户开始使用你的助手。• **持续支持：**– 提供支持选项，例如用于故障排除的电子邮件地址或FAQ文档。
- en: 'Chapter 17: Real-World Application Example'
  id: totrans-323
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第17章：实际应用示例
- en: In this chapter, we will walk through a robust, real-world example of how to
    use the techniques and tools covered in this book to create a practical solution.
    This example will guide you through building a document review assistant for legal
    professionals. This assistant will help automate the process of analyzing contracts,
    identifying key clauses, and suggesting improvements.
  id: totrans-324
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将通过一个稳健的、现实世界的例子来展示如何使用本书中介绍的技术和工具来创建一个实用解决方案。此示例将指导您构建一个法律专业人士的文档审查助手。此助手将帮助自动化分析合同、识别关键条款和提出改进建议的过程。
- en: 'Scenario: Document Review Assistant for Legal Professionals'
  id: totrans-325
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 场景：法律专业人士的文档审查助手
- en: Legal professionals often spend a significant amount of time reviewing contracts
    and other legal documents. This process involves identifying critical clauses,
    checking for missing terms, and ensuring that the language used is precise and
    consistent. By leveraging VBA and the OpenAI API, you can build a document review
    assistant that streamlines this process.
  id: totrans-326
  prefs: []
  type: TYPE_NORMAL
  zh: 法律专业人士通常花费大量时间审查合同和其他法律文件。这个过程涉及识别关键条款、检查缺失条款并确保使用的语言精确且一致。通过利用VBA和OpenAI API，您可以构建一个文档审查助手，简化这一过程。
- en: Key Features of the Document Review Assistant
  id: totrans-327
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 文档审查助手的关键特性
- en: '**Clause Identification:** Automatically identify and highlight key clauses
    in legal documents, such as confidentiality, termination, and liability clauses.'
  id: totrans-328
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**条款识别：** 自动识别并突出显示法律文件中的关键条款，例如保密条款、终止条款和责任条款。'
- en: '**Missing Clause Detection:** Flag documents that are missing essential clauses
    based on a predefined checklist.'
  id: totrans-329
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**缺失条款检测：** 根据预定义清单标记缺少必要条款的文件。'
- en: '**Clause Comparison:** Compare the identified clauses with a standard template
    or previous contracts to ensure consistency.'
  id: totrans-330
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**条款比较：** 将识别出的条款与标准模板或先前合同进行比较，以确保一致性。'
- en: '**Suggestion Engine:** Use ChatGPT to suggest improvements or alternative phrasing
    for certain clauses.'
  id: totrans-331
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**建议引擎：** 使用ChatGPT为某些条款提出改进或替代措辞。'
- en: 'Step 1: Setting Up the Environment'
  id: totrans-332
  prefs: []
  type: TYPE_NORMAL
  zh: 第一步：设置环境
- en: 'Before we begin, ensure that you have completed the setup as described in earlier
    chapters. You should have:'
  id: totrans-333
  prefs: []
  type: TYPE_NORMAL
  zh: '在我们开始之前，请确保您已按照前面章节中描述的设置完成。您应该有： '
- en: • Microsoft Word installed with macros enabled.• The JSONConverter library installed.• An
    OpenAI API key stored securely using an environment variable.
  id: totrans-334
  prefs: []
  type: TYPE_NORMAL
  zh: • 已安装带有宏启用的Microsoft Word。• 已安装JSONConverter库。• 使用环境变量安全存储OpenAI API密钥。
- en: 'Step 2: Building the Core VBA Functionality'
  id: totrans-335
  prefs: []
  type: TYPE_NORMAL
  zh: 第二步：构建核心VBA功能
- en: First, let’s create the core functionality to identify and highlight key clauses
    in a Word document.
  id: totrans-336
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，让我们创建一个核心功能，用于在Word文档中识别和突出显示关键条款。
- en: '**Create a New Module in VBA:**'
  id: totrans-337
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**在VBA中创建新模块：**'
- en: In the VBA editor, insert a new module and name it ModuleReviewAssistant.
  id: totrans-338
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在VBA编辑器中，插入一个新模块，并将其命名为ModuleReviewAssistant。
- en: '**Define Key Clauses and Patterns:**'
  id: totrans-339
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**定义关键条款和模式：**'
- en: Create a list of key clauses and corresponding keywords or patterns to search
    for in the document.
  id: totrans-340
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 创建一个关键条款列表及其在文档中搜索的对应关键词或模式。
- en: vba‘The following three declarations go at the very top of the module, just
    below the first line, Option Explicit. Private KeyClauses As Scripting.Dictionary Private
    RequiredClauses As Collection Private StandardClauses As Scripting.Dictionary vba Sub
    InitializeKeyClauses()  Set KeyClauses = New Dictionary  KeyClauses.Add "Confidentiality",
    "confidentiality"  KeyClauses.Add "Termination", "termination"  KeyClauses.Add
    "Liability", "liability"   KeyClauses.Add "Non-disclosure", "non-disclosure" 
    KeyClauses.Add "End of agreement", "end of agreement"  KeyClauses.Add "Indemnification",
    "indemnification" End Sub
  id: totrans-341
  prefs: []
  type: TYPE_NORMAL
  zh: vba‘以下三个声明应放在模块的顶部，紧接在第一行Option Explicit之后： Private KeyClauses As Scripting.Dictionary Private
    RequiredClauses As Collection Private StandardClauses As Scripting.Dictionary vba Sub
    InitializeKeyClauses()  Set KeyClauses = New Dictionary  KeyClauses.Add "Confidentiality",
    "confidentiality"  KeyClauses.Add "Termination", "termination"  KeyClauses.Add
    "Liability", "liability"  KeyClauses.Add "Non-disclosure", "non-disclosure"  KeyClauses.Add
    "End of agreement", "end of agreement"  KeyClauses.Add "Indemnification", "indemnification" 
    End Sub
- en: '**Search and Highlight Clauses:**'
  id: totrans-342
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**搜索和突出显示条款：**'
- en: Write a function to search for these clauses in the document and highlight them.
  id: totrans-343
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 编写一个函数在文档中搜索这些条款并突出显示它们。
- en: vba Sub HighlightClauses()  InitializeKeyClauses  Dim clause As Variant  Dim
    rng As Range   For Each clause In KeyClauses  Set rng = ActiveDocument.Content 
    With rng.Find  .Text = clause  .MatchWildcards = True  Do While .Execute(FindText:=clause,
    Forward:=True) = True  rng.HighlightColorIndex = wdYellow  rng.InsertAfter vbCrLf
    & "[" & clause & "]"  rng.Collapse wdCollapseEnd  Loop  End With  Next clause End
    Sub
  id: totrans-344
  prefs: []
  type: TYPE_NORMAL
  zh: vba Sub HighlightClauses() InitializeKeyClauses Dim clause As Variant Dim rng
    As Range For Each clause In KeyClauses Set rng = ActiveDocument.Content With rng.Find
    .Text = clause .MatchWildcards = True Do While .Execute(FindText:=clause, Forward:=True)
    = True rng.HighlightColorIndex = wdYellow rng.InsertAfter vbCrLf & "[" & clause
    & "]" rng.Collapse wdCollapseEnd Loop End With Next clause End Sub
- en: 'Step 3: Implementing the Missing Clause Detection'
  id: totrans-345
  prefs: []
  type: TYPE_NORMAL
  zh: 'Step 3: Implementing the Missing Clause Detection'
- en: Next, we will implement a feature to detect if any key clauses are missing from
    the document.
  id: totrans-346
  prefs: []
  type: TYPE_NORMAL
  zh: Next, we will implement a feature to detect if any key clauses are missing from
    the document.
- en: '**Define a Checklist of Required Clauses:**'
  id: totrans-347
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**Define a Checklist of Required Clauses:** '
- en: vba Sub InitializeRequiredClauses()  Set RequiredClauses = New Collection  RequiredClauses.Add
    "Confidentiality"  RequiredClauses.Add "Termination"  RequiredClauses.Add "Liability" End
    Sub
  id: totrans-348
  prefs: []
  type: TYPE_NORMAL
  zh: vba Sub InitializeRequiredClauses() Set RequiredClauses = New Collection RequiredClauses.Add
    "Confidentiality" RequiredClauses.Add "Termination" RequiredClauses.Add "Liability"
    End Sub
- en: '**Check for Missing Clauses:**'
  id: totrans-349
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**Check for Missing Clauses:** '
- en: vba Sub CheckForMissingClauses()  InitializeKeyClauses  InitializeRequiredClauses 
    Dim clause As Variant   Dim rng As Range  Dim isFound As Boolean  Dim report As
    String  report = "Missing Clauses:" & vbCrLf  For Each clause In RequiredClauses 
    isFound = False   Set rng = ActiveDocument.Content  With rng.Find  .Text = clause 
    .MatchWildcards = True  Do While .Execute(FindText:=clause, Forward:=True) = True 
    rng.Collapse wdCollapseEnd  isFound = True  Loop  End With  If Not isFound Then 
    report = report & clause & vbCrLf  End If   Next clause  If Len(report) > Len("Missing
    Clauses:" & vbCrLf) Then  MsgBox report, vbExclamation  Else  MsgBox "All required
    clauses are present.", vbInformation  End If End Sub
  id: totrans-350
  prefs: []
  type: TYPE_NORMAL
  zh: vba Sub CheckForMissingClauses() InitializeKeyClauses InitializeRequiredClauses
    Dim clause As Variant Dim rng As Range Dim isFound As Boolean Dim report As String
    report = "Missing Clauses:" & vbCrLf For Each clause In RequiredClauses isFound
    = False Set rng = ActiveDocument.Content With rng.Find .Text = clause .MatchWildcards
    = True Do While .Execute(FindText:=clause, Forward:=True) = True rng.Collapse
    wdCollapseEnd isFound = True Loop End With If Not isFound Then report = report
    & clause & vbCrLf End If Next clause If Len(report) > Len("Missing Clauses:" &
    vbCrLf) Then MsgBox report, vbExclamation Else MsgBox "All required clauses are
    present.", vbInformation End If End Sub
- en: 'Step 4: Clause Comparison and Suggestions'
  id: totrans-351
  prefs: []
  type: TYPE_NORMAL
  zh: 'Step 4: Clause Comparison and Suggestions'
- en: For this step, we'll use the OpenAI API to compare identified clauses with a
    standard template and provide suggestions for improvement.
  id: totrans-352
  prefs: []
  type: TYPE_NORMAL
  zh: For this step, we'll use the OpenAI API to compare identified clauses with a
    standard template and provide suggestions for improvement.
- en: '**Standard Clauses:**'
  id: totrans-353
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**Standard Clauses:** '
- en: Define standard versions of the key clauses. You can find these in the example
    file “Web-Design-Contract.docx”
  id: totrans-354
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: Define standard versions of the key clauses. You can find these in the example
    file “Web-Design-Contract.docx”
- en: vba Sub InitializeStandardClauses()  Set StandardClauses = New Scripting.Dictionary 
    StandardClauses.Add "Confidentiality", "Your secrets are safe with Us. This includes
    your proprietary information (things like trade secrets, know-how, or any other
    confidential information that is not publicly available). We promise We won't
    sell your proprietary information to a third-party, no matter how much they offer
    Us."  StandardClauses.Add "Termination", "We would really hate to see You go.
    If You decide We aren't your cup of coffee (or wine), You can end this Agreement
    by giving Us a ten (10) day written notice and paying Us for the Services that
    We have completed." & String(2, vbCrLf) & _  "If either Party fails to follow
    through with their responsibilities or obligations under this Agreement, the other
    Party can end this Agreement by giving a ten (10) day written notice." & String(2,
    vbCrLf) & _  "This Agreement will automatically terminate when both Parties have
    performed all of their obligations under the Agreement and all payments have been
    made."  StandardClauses.Add "Liability", "Your liability to Us is only for the
    costs payable under this Agreement. You will not be liable to Us, or any third-party,
    for damages like lost profits, lost savings, incidental damages, consequential
    damages, or special damages." End Sub
  id: totrans-355
  prefs: []
  type: TYPE_NORMAL
  zh: vba Sub InitializeStandardClauses() Set StandardClauses = New Scripting.Dictionary
    StandardClauses.Add "Confidentiality", "您的秘密在我们这里是安全的。这包括您的专有信息（例如商业机密、技术知识或任何其他非公开的机密信息）。我们承诺，无论第三方提供多少报酬，我们都不会将您的专有信息出售给第三方。"
    StandardClauses.Add "Termination", "我们真的不愿意看到您离开。如果您决定我们不是您的咖啡（或酒）杯，您可以通过给我们十（10）天的书面通知并支付我们已完成的服务费用来终止此协议。"
    & String(2, vbCrLf) & _ "如果任何一方未能履行本协议下的责任或义务，另一方可以通过给出十（10）天的书面通知来终止此协议。" & String(2,
    vbCrLf) & _ "当双方都已履行本协议下的所有义务，并且所有付款都已完成后，本协议将自动终止。" StandardClauses.Add "Liability",
    "您对我们的责任仅限于本协议项下应付的费用。您不会对我们或任何第三方承担因利润损失、储蓄损失、偶然损失、后果损失或特殊损失造成的损害赔偿责任。" End Sub
- en: '**Compare Clauses and Generate Suggestions:**'
  id: totrans-356
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**比较条款并生成建议：**'
- en: 'vba Sub CompareClausesAndSuggestImprovements()  InitializeKeyClauses   Dim
    clause As Variant  Dim foundText As Variant  Dim selectedText As Range  Dim response
    As String  Dim newComment As Comment   For Each clause In KeyClauses  foundText
    = GetClauseText(clause)  If Not IsEmpty(foundText) Then  response = GetImprovementSuggestion(clause,
    foundText(0))  If response <> "" Then  '' Add comment with the explanation  ''
    Get the selected text  Set selectedText = foundText(1)  Set newComment = selectedText.Comments.Add(Range:=selectedText,
    Text:="Suggestion for " & clause & ":" & vbCrLf & response)  '' Set the author
    of the comment  newComment.Author = "Sage-Mind AI"  End If  End If  Next clause End
    Sub Function GetClauseText(ByVal pattern As String) As Variant  InitializeStandardClauses 
    Dim rng As Range  Set rng = ActiveDocument.Content  With rng.Find  .Text = pattern 
    .MatchWildcards = True  Do While .Execute(FindText:=pattern, Forward:=True) =
    True  GetClauseText = Array(StandardClauses(rng.Text), rng)  Loop  End With End
    Function Function GetImprovementSuggestion(ByVal clause As String, ByVal clauseText
    As String) As String  '' Example using the OpenAI API to generate improvement
    suggestions   Dim json As Object  Dim http As Object  Set http = CreateObject("MSXML2.ServerXMLHTTP") 
    http.Open "POST", "https://api.openai.com/v1/chat/completions", False  http.setRequestHeader
    "Content-Type", "application/json"  http.setRequestHeader "Authorization", "Bearer
    " & Environ("OPENAI_API_KEY")  Set json = JsonConverter.ParseJson("{}")  json("model")
    = "gpt-4o"  json("messages") = Array( _  JsonConverter.ParseJson("{""role"": ""system"",
    ""content"": ""You are a legal assistant.""}"), _  JsonConverter.ParseJson("{""role"":
    ""user"", ""content"": ""Here is a clause: " & clauseText & " Suggest improvements
    or alternatives based on the standard clause: " & StandardClauses(clause) & """}")
    _  )  Dim jsonString As String  jsonString = JsonConverter.ConvertToJson(json) 
    http.send jsonString  Dim response As String  response = http.responseText  Dim
    jsonResponse As Object  Set jsonResponse = JsonConverter.ParseJson(response) 
    GetImprovementSuggestion = jsonResponse("choices")(1)("message")("content") End
    Function'
  id: totrans-357
  prefs: []
  type: TYPE_NORMAL
  zh: 'vba Sub CompareClausesAndSuggestImprovements() 初始化关键条款 Dim clause As Variant
    Dim foundText As Variant Dim selectedText As Range Dim response As String Dim
    newComment As Comment For Each clause In KeyClauses foundText = GetClauseText(clause)
    If Not IsEmpty(foundText) Then response = GetImprovementSuggestion(clause, foundText(0))
    If response <> "" Then '' 添加带有解释的注释 '' 获取选定的文本 Set selectedText = foundText(1)
    Set newComment = selectedText.Comments.Add(Range:=selectedText, Text:="对 " & clause
    & " 的建议：" & vbCrLf & response) '' 设置注释的作者 newComment.Author = "Sage-Mind AI" End
    If End If Next clause End Sub Function GetClauseText(ByVal pattern As String)
    As Variant 初始化标准条款 Dim rng As Range Set rng = ActiveDocument.Content With rng.Find
    .Text = pattern .MatchWildcards = True Do While .Execute(FindText:=pattern, Forward:=True)
    = True GetClauseText = Array(StandardClauses(rng.Text), rng) Loop End With End
    Function Function GetImprovementSuggestion(ByVal clause As String, ByVal clauseText
    As String) As String '' 使用OpenAI API生成改进建议 Dim json As Object Dim http As Object
    Set http = CreateObject("MSXML2.ServerXMLHTTP") http.Open "POST", "https://api.openai.com/v1/chat/completions",
    False http.setRequestHeader "Content-Type", "application/json" http.setRequestHeader
    "Authorization", "Bearer " & Environ("OPENAI_API_KEY") Set json = JsonConverter.ParseJson("{}")
    json("model") = "gpt-4o" json("messages") = Array( _ JsonConverter.ParseJson("{""role"":
    ""system"", ""content"": ""You are a legal assistant.""}"), _ JsonConverter.ParseJson("{""role"":
    ""user"", ""content"": ""Here is a clause: " & clauseText & " Suggest improvements
    or alternatives based on the standard clause: " & StandardClauses(clause) & """}")
    _ ) Dim jsonString As String jsonString = JsonConverter.ConvertToJson(json) http.send
    jsonString Dim response As String response = http.responseText Dim jsonResponse
    As Object Set jsonResponse = JsonConverter.ParseJson(response) GetImprovementSuggestion
    = jsonResponse("choices")(1)("message")("content") End Function'
- en: 'Step 5: Testing and Implementation'
  id: totrans-358
  prefs: []
  type: TYPE_NORMAL
  zh: 第5步：测试和实施
- en: 'Now that all the features are implemented, test the Document Review Assistant:'
  id: totrans-359
  prefs: []
  type: TYPE_NORMAL
  zh: 现在所有功能都已实现，测试文档审查助手：
- en: '**Load a Sample Document:** Open the example legal document (*Web-Design-Contract.docx*)
    in Word.'
  id: totrans-360
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**加载示例文档**：在Word中打开示例法律文档（*Web-Design-Contract.docx）。'
- en: 'Run the Assistant: Use the HighlightClauses, CheckForMissingClauses, and CompareClausesAndSuggestImprovements
    macros to review the document.'
  id: totrans-361
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 运行助手：使用HighlightClauses、CheckForMissingClauses和CompareClausesAndSuggestImprovements宏来审查文档。
- en: '**Review the Output:** The assistant should highlight key clauses, report any
    missing clauses, and suggest improvements for the identified clauses.'
  id: totrans-362
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**审查输出**：助手应突出显示关键条款，报告任何缺失的条款，并为识别出的条款提出改进建议。'
- en: 'Step 6: Deploying the Document Review Assistant'
  id: totrans-363
  prefs: []
  type: TYPE_NORMAL
  zh: 第6步：部署文档审查助手
- en: 'Once you are satisfied with the assistant’s performance:'
  id: totrans-364
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦你对助手的性能感到满意：
- en: 'Package the Project: Save the Word document as a macro-enabled document (.docm).'
  id: totrans-365
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 打包项目：将Word文档保存为启用宏的文档（.docm）。
- en: '**Document the Features:** Provide instructions for users on how to enable
    macros and use the assistant.'
  id: totrans-366
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**记录功能：** 为用户提供有关如何启用宏和使用助手的说明。'
- en: '**Distribute the Document:** Share the document with legal professionals in
    your organization or as a tool for clients.'
  id: totrans-367
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**分发文档：** 与您组织中的法律专业人士或作为客户工具共享文档。'
- en: Benefits of the Document Review Assistant
  id: totrans-368
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 文档审查助手的好处
- en: • **Time Savings:** Automating clause identification and comparison significantly
    reduces the time required to review legal documents.• **Consistency:** Ensures
    that all contracts adhere to predefined standards, reducing the likelihood of
    errors.• **Enhanced Productivity:** Allows legal professionals to focus on more
    complex tasks while the assistant handles routine checks and suggestions.
  id: totrans-369
  prefs: []
  type: TYPE_NORMAL
  zh: • **节省时间：** 自动化条款识别和比较显著减少了审查法律文件所需的时间。
- en: 'Chapter 18: Frequently Asked Questions (FAQs)'
  id: totrans-370
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第18章：常见问题解答（FAQs）
- en: As you work through the process of integrating ChatGPT with Microsoft Word using
    VBA and the OpenAI API, you may encounter various questions and challenges. This
    chapter addresses common questions, providing detailed answers to help you troubleshoot
    and optimize your project.
  id: totrans-371
  prefs: []
  type: TYPE_NORMAL
  zh: 在使用VBA和OpenAI API将ChatGPT与Microsoft Word集成的过程中，您可能会遇到各种问题和挑战。本章解决常见问题，提供详细的答案，以帮助您排除故障和优化项目。
- en: General FAQs
  id: totrans-372
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 常见问题解答（FAQs）
- en: 'Q1: What is ChatGPT, and how does it differ from other AI models?'
  id: totrans-373
  prefs: []
  type: TYPE_NORMAL
  zh: 'Q1: ChatGPT是什么，它与其他AI模型有何不同？'
- en: '**A1:** ChatGPT is a language model developed by OpenAI, based on the GPT (Generative
    Pretrained Transformer) architecture. It’s designed to understand and generate
    human-like text based on the input it receives. Unlike basic AI models that may
    be limited to specific tasks, ChatGPT can engage in more dynamic and context-aware
    conversations, making it versatile for various applications, including customer
    support, content generation, and interactive assistants.'
  id: totrans-374
  prefs: []
  type: TYPE_NORMAL
  zh: '**A1:** ChatGPT是由OpenAI开发的语言模型，基于GPT（生成预训练变换器）架构。它旨在根据接收到的输入理解并生成类似人类的文本。与可能仅限于特定任务的简单AI模型不同，ChatGPT可以参与更动态和上下文感知的对话，使其适用于各种应用，包括客户支持、内容生成和交互式助手。'
- en: 'Q2: Why should I integrate ChatGPT with Microsoft Word using VBA?'
  id: totrans-375
  prefs: []
  type: TYPE_NORMAL
  zh: 'Q2: 为什么我应该使用VBA将ChatGPT与Microsoft Word集成？'
- en: '**A2:** Integrating ChatGPT with Microsoft Word using VBA allows you to enhance
    Word’s functionality by automating complex tasks and introducing AI-driven content
    generation directly within your documents. This integration can save time, improve
    productivity, and provide more intelligent tools for writing, editing, and analyzing
    text.'
  id: totrans-376
  prefs: []
  type: TYPE_NORMAL
  zh: '**A2:** 使用VBA将ChatGPT与Microsoft Word集成，允许您通过自动化复杂任务和在文档中直接引入AI驱动的生成内容来增强Word的功能。这种集成可以节省时间，提高生产力，并为写作、编辑和分析文本提供更智能的工具。'
- en: 'Q3: How does the OpenAI API work in this integration?'
  id: totrans-377
  prefs: []
  type: TYPE_NORMAL
  zh: 'Q3: 在此集成中，OpenAI API是如何工作的？'
- en: '**A3:** The OpenAI API allows you to send text prompts to the ChatGPT model
    and receive responses. In this integration, VBA acts as the intermediary that
    sends requests to the OpenAI API and processes the responses within Microsoft
    Word. This setup enables you to create custom tools that leverage AI to automate
    tasks and generate content within your documents.'
  id: totrans-378
  prefs: []
  type: TYPE_NORMAL
  zh: '**A3:** OpenAI API允许您向ChatGPT模型发送文本提示并接收响应。在此集成中，VBA充当中介，向OpenAI API发送请求并在Microsoft
    Word中处理响应。这种设置使您能够创建利用AI自动化任务并在文档中生成内容的自定义工具。'
- en: Technical FAQs
  id: totrans-379
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 技术问题解答（FAQs）
- en: 'Q4: How do I enable macros in Microsoft Word to run VBA scripts?'
  id: totrans-380
  prefs: []
  type: TYPE_NORMAL
  zh: 'Q4: 我如何启用Microsoft Word中的宏以运行VBA脚本？'
- en: '**A4:** To enable macros in Microsoft Word:'
  id: totrans-381
  prefs: []
  type: TYPE_NORMAL
  zh: '**A4:** 要在Microsoft Word中启用宏：'
- en: Go to File > Options.
  id: totrans-382
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 转到“文件”>“选项”。
- en: In the Word Options window, select Trust Center from the sidebar.
  id: totrans-383
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在“Word选项”窗口中，从侧边栏选择“信任中心”。
- en: Click on Trust Center Settings.
  id: totrans-384
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 点击“信任中心设置”。
- en: Select Macro Settings.
  id: totrans-385
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 选择宏设置。
- en: Choose Enable all macros (not recommended for general use) or Disable all macros
    with notification to allow macro execution only after your confirmation.
  id: totrans-386
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 选择“启用所有宏（不推荐用于通用用途）”或“禁用所有宏并通知”，以允许在确认后执行宏。
- en: Click OK to save your settings.
  id: totrans-387
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 点击“确定”以保存您的设置。
- en: Enabling macros is essential for running VBA scripts, but ensure you trust the
    source of the documents before enabling this feature.
  id: totrans-388
  prefs: []
  type: TYPE_NORMAL
  zh: 启用宏对于运行VBA脚本至关重要，但在启用此功能之前，请确保您信任文档的来源。
- en: 'Q5: I’m getting an error when trying to run my VBA script. How can I debug
    it?'
  id: totrans-389
  prefs: []
  type: TYPE_NORMAL
  zh: 'Q5: 当尝试运行我的VBA脚本时，我遇到了错误。我该如何调试它？'
- en: '**A5:** Debugging VBA scripts can be done using several tools available in
    the VBA editor:'
  id: totrans-390
  prefs: []
  type: TYPE_NORMAL
  zh: '**A5:** 可以使用VBA编辑器中提供的几个工具来调试VBA脚本：'
- en: 'Immediate Window: Use the Immediate Window (Ctrl + G) to test individual lines
    of code. For example, if you suspect a variable isn’t being set correctly, type
    ?variableName to check its current value.'
  id: totrans-391
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 立即窗口：使用立即窗口（Ctrl + G）来测试代码的单独行。例如，如果你怀疑一个变量没有被正确设置，输入 ?variableName 来检查其当前值。
- en: '**Breakpoints:** Set breakpoints in your code by clicking in the left margin
    of the code window. This will pause execution at that line, allowing you to inspect
    the state of your variables and the flow of your script.'
  id: totrans-392
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**断点：** 通过在代码窗口的左侧边缘单击来设置代码中的断点。这将暂停执行，让你能够检查变量的状态和脚本的流程。'
- en: 'Step Execution: Use F8 to step through your code line by line. This is useful
    for observing how your script behaves at each stage of execution.'
  id: totrans-393
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 步骤执行：使用F8逐行执行你的代码。这有助于观察你的脚本在执行过程中的每个阶段的行为。
- en: '**Watch Window:** Add variables to the Watch Window to monitor their values
    as your code runs. This helps you see how variables change throughout the script.'
  id: totrans-394
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**监视窗口：** 将变量添加到监视窗口以监控它们的值，当你的代码运行时。这有助于你看到变量在整个脚本中的变化。'
- en: 'Error Handling: Use On Error statements to catch and handle errors gracefully.
    For example:'
  id: totrans-395
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 错误处理：使用On Error语句来捕获并优雅地处理错误。例如：
- en: 'vba On Error GoTo ErrorHandler '' Your code here Exit Sub ErrorHandler: MsgBox
    "An error occurred: " & Err.Description'
  id: totrans-396
  prefs: []
  type: TYPE_NORMAL
  zh: 'vba On Error GoTo ErrorHandler '' 在此处编写代码 Exit Sub ErrorHandler: MsgBox "发生了一个错误:
    " & Err.Description'
- en: 'Q6: How do I access the OpenAI API securely in VBA without exposing my API
    key?'
  id: totrans-397
  prefs: []
  type: TYPE_NORMAL
  zh: 'Q6: 我如何在VBA中安全地访问OpenAI API而不暴露我的API密钥？'
- en: 'A6: The most secure way to access the OpenAI API in VBA without exposing your
    API key is by using environment variables. Set your API key as an environment
    variable and retrieve it in your VBA code using the Environ function:'
  id: totrans-398
  prefs: []
  type: TYPE_NORMAL
  zh: 'A6: 在VBA中安全访问OpenAI API而不暴露你的API密钥的最安全方法是使用环境变量。将你的API密钥设置为环境变量，并在你的VBA代码中使用Environ函数检索它：'
- en: '**Set the Environment Variable:**'
  id: totrans-399
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**设置环境变量：**'
- en: 'On Windows: Set the variable through System Properties > Environment Variables.'
  id: totrans-400
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在Windows上：通过系统属性 > 环境变量设置变量。
- en: '**Access the Variable in VBA:**'
  id: totrans-401
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**在VBA中访问变量：**'
- en: vba Dim apiKey As String apiKey = Environ("OPENAI_API_KEY")
  id: totrans-402
  prefs: []
  type: TYPE_NORMAL
  zh: vba Dim apiKey As String apiKey = Environ("OPENAI_API_KEY")
- en: This method keeps your API key out of your codebase, reducing the risk of accidental
    exposure.
  id: totrans-403
  prefs: []
  type: TYPE_NORMAL
  zh: 这种方法将你的API密钥从代码库中移除，减少了意外暴露的风险。
- en: Troubleshooting FAQs
  id: totrans-404
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 故障排除常见问题
- en: 'Q7: The assistant isn’t responding to my inputs. What could be wrong?'
  id: totrans-405
  prefs: []
  type: TYPE_NORMAL
  zh: 'Q7: 助手对我的输入没有响应。可能出了什么问题？'
- en: '**A7:** If your assistant isn’t responding, consider the following troubleshooting
    steps:'
  id: totrans-406
  prefs: []
  type: TYPE_NORMAL
  zh: '**A7:** 如果你的助手没有响应，请考虑以下故障排除步骤：'
- en: '**Check API Connectivity:** Ensure that your VBA script is successfully sending
    requests to the OpenAI API. Use the Immediate Window or Debug.Print to log the
    response status:'
  id: totrans-407
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**检查API连接性：** 确保你的VBA脚本成功地向OpenAI API发送请求。使用立即窗口或Debug.Print来记录响应状态：'
- en: vba Debug.Print http.Status A status code of 200 indicates a successful request,
    while other codes may indicate issues like authentication errors (status code
    401) or connectivity problems.
  id: totrans-408
  prefs: []
  type: TYPE_NORMAL
  zh: vba Debug.Print http.Status 一个状态码为200表示请求成功，而其他代码可能表示问题，如认证错误（状态码401）或连接问题。
- en: '**Verify API Key:** Ensure that your API key is correct and that it has been
    set as an environment variable properly. You can test this by printing the key
    in the Immediate Window:'
  id: totrans-409
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**验证API密钥：** 确保你的API密钥是正确的，并且已经正确地设置为环境变量。你可以在立即窗口中打印密钥来测试：'
- en: vba Debug.Print Environ("OPENAI_API_KEY")
  id: totrans-410
  prefs: []
  type: TYPE_NORMAL
  zh: vba Debug.Print Environ("OPENAI_API_KEY")
- en: '**Inspect the JSON Payload:** Use Debug.Print to examine the JSON payload being
    sent to the API. Ensure that the data structure matches the API’s requirements:'
  id: totrans-411
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**检查JSON负载：** 使用Debug.Print来检查发送到API的JSON负载。确保数据结构与API的要求相匹配：'
- en: vba Debug.Print jsonString
  id: totrans-412
  prefs: []
  type: TYPE_NORMAL
  zh: vba Debug.Print jsonString
- en: '**Handle Errors Gracefully:** Add error handling in your script to capture
    any issues during the API call:'
  id: totrans-413
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**优雅地处理错误：** 在你的脚本中添加错误处理来捕获API调用期间出现的任何问题：'
- en: 'vba On Error GoTo ErrorHandler '' API call code here Exit Sub ErrorHandler: MsgBox
    "An error occurred: " & Err.Description'
  id: totrans-414
  prefs: []
  type: TYPE_NORMAL
  zh: 'vba On Error GoTo ErrorHandler '' API调用代码在此处 Exit Sub ErrorHandler: MsgBox
    "发生了一个错误: " & Err.Description'
- en: 'Q8: How do I update the assistant to use a different AI model?'
  id: totrans-415
  prefs: []
  type: TYPE_NORMAL
  zh: 'Q8: 我如何更新助手以使用不同的AI模型？'
- en: 'A8: To update your assistant to use a different AI model, change the model
    parameter in the JSON payload you send to the OpenAI API. For example, to switch
    from gpt-4o to gpt-3.5-turbo:'
  id: totrans-416
  prefs: []
  type: TYPE_NORMAL
  zh: A8：要更新您的助手以使用不同的AI模型，请更改发送到OpenAI API的JSON有效负载中的模型参数。例如，要从gpt-4o切换到gpt-3.5-turbo：
- en: vba
  id: totrans-417
  prefs: []
  type: TYPE_NORMAL
  zh: vba
- en: json("model") = "gpt-3.5-turbo"
  id: totrans-418
  prefs: []
  type: TYPE_NORMAL
  zh: json("model") = "gpt-3.5-turbo"
- en: You can set this parameter dynamically based on user input or other criteria
    by modifying the model property in your code.
  id: totrans-419
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以通过修改代码中的模型属性，根据用户输入或其他标准动态设置此参数。
- en: 'Q9: How can I optimize my VBA code for better performance?'
  id: totrans-420
  prefs: []
  type: TYPE_NORMAL
  zh: Q9：我如何优化我的VBA代码以提高性能？
- en: '**A9:** Here are some tips to optimize your VBA code for better performance:'
  id: totrans-421
  prefs: []
  type: TYPE_NORMAL
  zh: '**A9：以下是一些优化您的VBA代码以提高性能的技巧：**'
- en: '**Reduce API Calls:** Minimize the number of API calls by batching requests
    or managing conversation history efficiently within your script.'
  id: totrans-422
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**减少API调用：通过批量请求或高效管理脚本中的会话历史记录来最小化API调用次数。**'
- en: '**Avoid Unnecessary Screen Updates:** Disable screen updating during macro
    execution to speed up the process:'
  id: totrans-423
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**避免不必要的屏幕更新：在宏执行期间禁用屏幕更新以加快处理速度：**'
- en: vba Application.ScreenUpdating = False ' Your code here Application.ScreenUpdating
    = True
  id: totrans-424
  prefs: []
  type: TYPE_NORMAL
  zh: vba Application.ScreenUpdating = False ' 在此处编写您的代码 Application.ScreenUpdating
    = True
- en: '**Use Efficient Data Structures:** Opt for arrays or dictionaries over multiple
    variables when dealing with large datasets or iterative operations.'
  id: totrans-425
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**使用高效的数据结构：处理大型数据集或迭代操作时，选择数组或字典而不是多个变量。**'
- en: '**Clean Up Resources:** Ensure that all objects (e.g., HTTP requests, JSON
    objects) are properly released after use:'
  id: totrans-426
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**清理资源：确保在使用后正确释放所有对象（例如，HTTP请求、JSON对象）：**'
- en: vba Set http = Nothing Set jsonResponse = Nothing
  id: totrans-427
  prefs: []
  type: TYPE_NORMAL
  zh: vba Set http = Nothing Set jsonResponse = Nothing
- en: 'Use Early Binding Where Possible: Early binding (declaring specific object
    types) can improve performance compared to late binding (using As Object):'
  id: totrans-428
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 尽可能使用早期绑定：与后期绑定（使用As Object）相比，早期绑定（声明特定对象类型）可以提高性能：
- en: vba Dim http As MSXML2.ServerXMLHTTP60 Set http = New MSXML2.ServerXMLHTTP60
  id: totrans-429
  prefs: []
  type: TYPE_NORMAL
  zh: vba Dim http As MSXML2.ServerXMLHTTP60 Set http = New MSXML2.ServerXMLHTTP60
- en: 'Q10: How can I share my ChatGPT-powered assistant with others?'
  id: totrans-430
  prefs: []
  type: TYPE_NORMAL
  zh: Q10：我如何与他人分享我的ChatGPT助手？
- en: '**A10:** To share your assistant:'
  id: totrans-431
  prefs: []
  type: TYPE_NORMAL
  zh: '**A10：要分享您的助手：**'
- en: 'Save as a Macro-Enabled Document: Save your Word document with a .docm extension
    to retain the VBA code.'
  id: totrans-432
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 保存为宏启用文档：将您的Word文档保存为.docm扩展名以保留VBA代码。
- en: '**Document the Setup:** Provide instructions for users on how to enable macros
    and set up the environment variables.'
  id: totrans-433
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**记录设置：为用户提供启用宏和设置环境变量的说明。**'
- en: '**Package Additional Resources:** If your project relies on external libraries
    like JSONConverter, include them and provide installation instructions.'
  id: totrans-434
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**打包附加资源：如果您的项目依赖于外部库如JSONConverter，请包括它们并提供安装说明。**'
- en: '**Provide User Training:** Consider creating a user guide or video tutorial
    to help others understand how to use the assistant effectively.'
  id: totrans-435
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**提供用户培训：考虑创建用户指南或视频教程，帮助他人有效理解如何使用助手。**'
- en: '**Test Deployment:** Test the document on a different machine to ensure that
    all dependencies are correctly configured.'
  id: totrans-436
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**测试部署：在不同的机器上测试文档，以确保所有依赖项都正确配置。**'
