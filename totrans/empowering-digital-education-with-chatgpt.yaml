- en: 9ChatGPT Strategies for Personalized Learning in Second Language Acquisition
    (Italian B1)
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Rubén González Vallejo
  prefs: []
  type: TYPE_NORMAL
- en: 'DOI: [10.1201/9781032716350-9](http://doi.org/10.1201/9781032716350-9)'
  prefs: []
  type: TYPE_NORMAL
- en: 9.1 Introduction to the Development of AI
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Since the first reference to artificial intelligence (AI) appeared in 1956,
    there has been exponential technological progress that has accompanied the evolution
    of the current industrial fabric and has culminated in significant advances that
    represent a useful guide for many of the automated activities that surround us.
    Symbolizing productivity and digitization, the so-called fourth industrial revolution
    proposes the use of different disruptive technologies, such as the Internet of
    Things, big data, augmented and virtual reality, cloud services, and AI.
  prefs: []
  type: TYPE_NORMAL
- en: 'Today, AI has enjoyed widespread application in recent years in various sectors,
    from the healthcare sector, through its presence in drug development and personalized
    treatments, to the industry, with the creation of materials; in addition to other
    areas such as business, finance, logistics, and the environment (MINECO). In the
    field of education, it had a significant impact from the second millennium, with
    deep learning, data analysis, and the development of chatbots, which fostered
    text and image recognition and generation, assessment in teaching, interaction,
    immersive learning, and the creation of virtual assistants ([Sanabria-Navarro
    et al., 2023](#ch17.xhtml#r383)). Likewise, in recent years, ICT has significantly
    modified computer-assisted language learning (CALL), and the transition to intelligent
    CALL (ICALL) has provided the adaptation and personalization that characterize
    current teaching, as we witness networked environments where the integration of
    natural language processing (NLP) and AI potentials has a significant impact on
    language teaching ([Kannan and Munday 2018](#ch17.xhtml#r367)). Such has been
    its application that there have been numerous studies on the application of ChatGPT
    in education: post-editing ([González Vallejo 2023](#ch17.xhtml#r363)); automatic
    translation ([Lee 2023](#ch17.xhtml#r370)), for academic editing ([Castillo-González
    et al. 2022](#ch17.xhtml#r352)), student feedback ([Steiss et al. 2023](#ch17.xhtml#r387);
    [Dai et al. 2023](#ch17.xhtml#r358)), as a virtual tutor ([Limo et al. 2023](#ch17.xhtml#r371))
    and language teaching utilizing AR, voice bots and ChatGPT ([Topsakal and Topsakal
    2022](#ch17.xhtml#r388)), among others.'
  prefs: []
  type: TYPE_NORMAL
- en: This significant advancement in AI has been made possible thanks to factors
    such as the exponential increase in usage data, technological progress in computer
    systems, and the development of algorithm research and machine learning (MINECO).
    However, its multiple facets and the continuous field studies to which it is subjected
    raise concerns about its correct use and uncertainties about its long-term impact,
    as reflected by [Kannan and Munday (2018)](#ch17.xhtml#r367), who assert that
    it will be under constant research, as further investigation is needed in affective
    computing, to analyze and leverage the affective aspects of learning.
  prefs: []
  type: TYPE_NORMAL
- en: Next, the applications of AI in education are presented with the aim of understanding
    its main uses by educational institutions; the potentials and challenges of ChatGPT
    in the educational field, where the most common uses of the program will be highlighted;
    and finally, the learning strategies with ChatGPT, in order to emphasize the functionalities
    that ChatGPT offers during Italian language learning through preliminary support,
    support during learning, and evaluative support strategies.
  prefs: []
  type: TYPE_NORMAL
- en: 9.1.1 Chapter Organization
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'The rest of the chapter is organized as follows: [Section 9.2](#ch17.xhtml#h1-054)
    presents the applications of AI in education, aiming to understand what its main
    uses are by educational institutions. [Section 9.3](#ch17.xhtml#h1-055) highlights
    the potentials and challenges of ChatGPT in the educational field, focusing on
    its most common uses. [Section 9.4](#ch17.xhtml#h1-056) presents learning strategies
    with ChatGPT, aiming to highlight the functionalities offered by ChatGPT during
    Italian learning through preliminary support strategies, support during learning,
    and evaluative support. Finally, [Sections 9.5](#ch17.xhtml#h1-057) and [9.6](#ch17.xhtml#h1-058)
    conclude the chapter with discussions and conclusions.'
  prefs: []
  type: TYPE_NORMAL
- en: 9.2 Applications of AI in Education
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In recent years, Artificial Intelligence in Education (AEID) has taken center
    stage by offering greater adaptation and personalization of educational content
    through its applications. With this purpose, it can enhance teaching by increasing
    study hours, providing more resources, and revamping traditional assessment methods,
    thus transforming the traditional classroom into an interactive learning environment
    ([Luo and Cheng 2020](#ch17.xhtml#r373)). Specifically, AI aims to address open
    challenges in education by innovating educational practices and promoting inclusion,
    equality, and quality. All of this is geared towards shaping a new critical and
    autonomous student immersed in technology, particularly within the multidirectional
    and (a) asynchronous system represented by distance education ([García Villarroel
    2021](#ch17.xhtml#r362)).
  prefs: []
  type: TYPE_NORMAL
- en: Evidence of this shift can be seen in various available alternatives that have
    emerged in developing countries, embodying these principles. In China, Liulishuo
    aims to teach English with a capacity to accommodate 600,000 students, and the
    Superteacher answers 500 million questions during Gaokao preparation. In Uruguay,
    the adaptive learning platform PAM focuses on personalized feedback in mathematics
    teaching. Brazil’s Mec Flix is an educational platform for national exam preparation,
    while Daptio in Cape Town is software that adapts learning by analyzing students’
    competencies. M-Shule in Kenya is used to deliver content via SMS based on the
    national curriculum, among others (United Nations 2019).
  prefs: []
  type: TYPE_NORMAL
- en: The significant technological revolution witnessed in the education system has
    been made possible by the so-called fifth generation of computers, based on AI,
    robotics, expert systems, chips, and the implementation of machine learning, deep
    learning, and data analysis. These technologies have enabled the creation of applications
    that support the development of NLP, enhancing capabilities such as information
    classification and search, among others.[³](#fn3) In essence, the potential of
    AI lies in its ability to “solve complex problems by applying advanced programming
    techniques without the need to establish predefined steps or instructions, as
    is the case with conventional computer programs” (MINECO, p. 3).[⁴](#fn4) Moreover,
    AI integrates techniques from foundational educational theories such as behaviorism,
    connectivism, discovery learning, and constructivism ([Escobar Hernández 2021](#ch17.xhtml#r359)).
  prefs: []
  type: TYPE_NORMAL
- en: In this context, [Ma (2021)](#ch17.xhtml#r374) examines the English learning
    experience of two groups of university students. While the control group uses
    a traditional method, the experimental group receives training through virtual
    reality technology based on constructivist theory. Given the importance of working
    on the learner’s experience and meaning construction, the immersive experience
    in the experimental group yielded superior results and satisfaction compared to
    the control group. Consequently, we agree that AIED “enables the adjustment and/or
    adaptation of a user’s learning pathways through inductive processes based on
    data extracted from formative evidence generated throughout their school life”
    ([Magal-Royo and García Laborda 2017](#ch17.xhtml#r375), p. 1). To such an extent
    that AI has even been proposed as an effective strategy for addressing learning
    problems, as seen in the case of students with dyslexia ([Chassignol et al. 2018](#ch17.xhtml#r353)).
    [Table 9.1](#ch17.xhtml#t19) presents some applications of Generative AI in education.
  prefs: []
  type: TYPE_NORMAL
- en: '[Table 9.1](#ch17.xhtml#t19b) Applications of AI in education'
  prefs: []
  type: TYPE_NORMAL
- en: '| Administration | • Perform the administrative tasks faster that consume much
    of instructors’ time, such as grading exams and providing feedback. • Identify
    the learning styles and preferences of each of their students, helping them build
    personalized learning plans. • Assist instructors in decision support and data-driven
    work. • Give feedback and work with students timely and directly. |'
  prefs: []
  type: TYPE_TB
- en: '| Instruction | • Anticipate how well a student exceeds expectations in projects
    and exercises and the odds of dropping out of school. • Analyze the syllabus and
    course material to propose customized content. • Allow instruction beyond the
    classroom and into the higher-level education, supporting collaboration. • Tailor
    teaching methods for each student based on their personal data. • Help instructors
    create personalized learning plans for each student. |'
  prefs: []
  type: TYPE_TB
- en: '| Learning | • Uncover the learning shortcomings of students and address them
    early in education. • Customize the university course election for students. •
    Predict the career path for each student by gathering studying data. • Detect
    learning state and apply intelligent adaptive intervention to students. |'
  prefs: []
  type: TYPE_TB
- en: Note. From [Chen et al. (2020](#ch17.xhtml#r354), p. 75272).
  prefs: []
  type: TYPE_NORMAL
- en: In Spain, the objective of the National Artificial Intelligence Strategy (ENIA)
    is to coordinate the actions of different administrations, serving as a reference
    point for both the public and private sectors (MINECO). Among its strategic goals,
    emphasis is placed on promoting the Spanish language and its use in AI technologies.
    To this end, [Cuenca (2021)](#ch17.xhtml#r356) reflects on the development of
    AI in Spanish compared to English. Specifically, it suggests that there is a common
    interest among institutions, businesses, science, and citizens in narrowing the
    gap between the two languages. While acknowledging that this delay is, in part,
    a disadvantage, it allows for learning from the implementation of technologies
    and anticipating future developments. As a solution for bridging this gap, the
    proposal involves “public-private collaboration and the connection between scientists,
    engineers, business developers, entrepreneurs, and public administrations” ([Cuenca
    2021](#ch17.xhtml#r356), p. 13).
  prefs: []
  type: TYPE_NORMAL
- en: Finally, the collection of massive data, enabling the feeding of AI systems
    applied to education, raises concerns about the management and compilation of
    such data. [Regan and Jesse (2018](#ch17.xhtml#r382), cited in [Hockly 2023](#ch17.xhtml#r364))
    question the extent to which the user controls their data (privacy), which data
    are anonymized (anonymity), the purpose of monitoring users (surveillance), how
    much autonomy the user has in the system (autonomy), what non-discrimination measures
    are in place (non-discrimination), and who owns control of the data (information
    ownership).[⁵](#fn5) All of this leads us to discuss the numerous challenges that
    the rapid implementation of AI in the educational field has brought about. According
    to [Hwang et al. (2020)](#ch17.xhtml#r366), important considerations in AIED include
    the development of learning models that align with educational objectives, the
    performance of students learning with AI systems, a redefinition of educational
    theories through a new conception of education based on new learning systems,
    big data analysis focused on education, the development of ethical practices,
    and collaboration between humans and AI. On the other hand, [Owoc et al. (2021)](#ch17.xhtml#r379)
    highlight challenges in establishing strategies agreed upon by all stakeholders
    based on specific goals and timelines; achieving maturity in the adoption of AI
    technologies; controlling data to feed systems through quality, access, and data
    lifecycle principles; and addressing infrastructure problems arising from the
    compatibility and integration of different technologies. Finally, [Zawacki-Richter
    et al. (2019)](#ch17.xhtml#r391), in their analysis of research on AI applications
    in higher education, argue that there is a lack of critical reflection on the
    ethical issues, risks, and challenges posed by AI in education, and a lack of
    robustness with theoretical pedagogical approaches.
  prefs: []
  type: TYPE_NORMAL
- en: 9.3 Potentials and Challenges of ChatGPT
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: While the functionalities offered by ChatGPT in language comprehension and production
    are undeniable, and it appears to be suitable for both personal and professional
    use, it has garnered significant media attention regarding data privacy, the reliability
    of its massive pretraining, and its environmental cost. As an example, in recent
    months, Italy has blocked access to ChatGPT due to concerns about data protection
    ([Planas Bou 2023](#ch17.xhtml#r380)). Some companies, such as Deloitte, have
    instructed their employees not to share confidential information through ChatGPT
    due to the risk of leaks ([Sánchez 2023](#ch17.xhtml#r384)). Universities, like
    the University of Copenhagen, have studied its environmental impact, concluding
    that its pretraining cost approximately 85,000 kilograms of CO[2] ([Muñoz 2023](#ch17.xhtml#r378)).
  prefs: []
  type: TYPE_NORMAL
- en: Despite these concerns, ChatGPT remains one of the most widely used chatbots.
    In terms of its potential, notable features include the platform’s intuitiveness,
    its usability across various devices, dynamic language learning, and a system
    particularly beneficial for shy students ([Schmidt and Strasser 2022](#ch17.xhtml#r385)),
    making it useful in all educational stages. To such a purpose, [Kasneci et al.
    (2023)](#ch17.xhtml#r368) analyze the application of ChatGPT in different educational
    stages. In primary education, it could be useful for developing writing and reading
    skills, along with critical thinking through adaptive questioning. At the university
    level, it can assist in research tasks and the generation of summaries and outlines,
    fostering quicker comprehension. In professional training, beyond language study
    for specific purposes, it can contribute to other tasks such as report writing
    or project management.
  prefs: []
  type: TYPE_NORMAL
- en: On the other hand, regarding the challenges it presents, we find issues such
    as the lack of data privacy, inefficient use in high-performance scenarios, and
    the cost of full versions ([Schmidt and Strasser 2022](#ch17.xhtml#r385)).[⁶](#fn6)
    Additionally, we can add other challenges, such as effective language understanding,
    as nuances or colloquialisms can pose a challenge in information management. The
    lack of human-like interaction, which only a native speaker can provide to communication,
    and the importance of offering universal access to these systems to bridge the
    digital divide ([Chicaiza et al. 2023](#ch17.xhtml#r355)) are also significant
    challenges. Continuous human supervision is essential, and there is a risk of
    potential misinformation in the system’s responses if the corpus is not reliable.
    Another challenge relates to the responses provided when the information does
    not meet the user’s satisfaction threshold, known as reinforcement learning. This
    process involves the algorithm generating different responses and learning from
    the most appropriate suggestions ([Mijwil et al. 2022](#ch17.xhtml#r376)). The
    inefficiency in addressing certain questions is linked to the fact that the chatbot
    works contextually and semantically in its responses based on information extracted
    from the texts in its massive pretraining. This means it understands the relationships
    and dependencies between words but lacks an understanding of how these concepts
    correspond to the real world, despite the surprising generalizations it can generate
    ([Cuenca 2021](#ch17.xhtml#r356)). Moreover, the fact that ChatGPT operates in
    English raises questions about the reliability of using other languages without
    developing specific language models (LLMs). Implementing such technology is a
    consideration due to factors like limited transparency, high maintenance costs,
    and various short-term risks, among others ([Dac Lai et al. 2023](#ch17.xhtml#r357)).
  prefs: []
  type: TYPE_NORMAL
- en: 9.4 Learning Strategies with ChatGPT
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'AI offers significant advantages in the educational field, such as personalized
    curriculum plans, adaptation to the student’s pace, attention to individual needs,
    and the use of intelligent tutoring systems. Its application is shared by all
    stakeholders in the educational system: teachers apply AI from a pedagogical perspective
    to foster student motivation and performance; students leverage it to analyze
    their performance and receive academic assistance; and researchers not only create
    platforms but also study the implications of their use ([Hwang et al. 2020](#ch17.xhtml#r366)).
    However, it is important to note that sometimes the use of technology creates
    dependence on the part of teachers, who turn to computer tools with the aim of
    imparting the same knowledge through technology without changing their methodology.
    In this regard, [Kasneci et al. (2023)](#ch17.xhtml#r368) warn of the risks of
    teacher dependence on AI and propose a series of recommendations to mitigate the
    danger: AI is only a supplement, continuous training for critical thinking, evaluation
    of its use in the classroom, and promotion of educational strategies that involve
    characters and problem-solving activities.'
  prefs: []
  type: TYPE_NORMAL
- en: Concerning the use of second languages, there is a lack of practical studies
    analyzing the potentials of ChatGPT in language classrooms. Among them, [Kohnke
    et al. (2023)](#ch17.xhtml#r369) study the advantages and disadvantages, as well
    as the digital competencies of both teachers and students, in its use for language
    study. [Barrot (2023)](#ch17.xhtml#r351) analyzes the benefits and challenges
    of using ChatGPT in writing the second language (L2). [Shaikh et al. (2023)](#ch17.xhtml#r386)
    qualitatively study the effectiveness of ChatGPT in the formal learning of English
    through questionnaires, and finally, [Young and Shishido (2023)](#ch17.xhtml#r390)
    examine the quality of dialogues produced by the chatbot in English as a Foreign
    Language (EFL) students, asserting that the most suitable audience is those at
    an A2 level of proficiency.
  prefs: []
  type: TYPE_NORMAL
- en: 'For all these reasons, and with the aim of providing a comprehensive study
    of the actions that ChatGPT offers for language learning, we will now present
    a taxonomy of the strategies identified based on the preparation for the Italian
    B1 level. To do this, we have used the activities and language skills required
    for the official test at that level (CELI 2) of the Università per Stranieri di
    Perugia as a reference for the content of the prompts. We have focused, due to
    space constraints, on language skills and written production. The language teaching
    strategies offered by ChatGPT have been classified into three groups: preliminary
    support, support during learning, and evaluative support. For each strategy, we
    will indicate the prompt used (PR), the program’s response (CG), and, at times,
    the presence of more than one interaction by the user with the program (H), as
    in the case of written production and interaction. The results generated by ChatGPT
    will be shown only in part, for space reasons, and in English when possible, relying
    on ChatGPT’s translation, which, as demonstrated in other studies, is superior
    compared to other commercial translation engines ([Gao et al. 2023](#ch17.xhtml#r361)).
    [Table 9.2](#ch17.xhtml#t20) presents specific forms of digital competence needed
    to use ChatGPT. This justification is based on the occasional need to keep the
    text in Italian unchanged for the study of errors in understanding the response.
    Finally, a concluding section is provided dedicated to the limitations detected
    in the program’s functions.'
  prefs: []
  type: TYPE_NORMAL
- en: '[Table 9.2](#ch17.xhtml#t20b) Strategies with ChatGPT based on language teaching'
  prefs: []
  type: TYPE_NORMAL
- en: '| Preliminary support | — Lesson planning and objectives — Creation of didactic
    materials (exercises, dialogues, specific textual genres, and general reading
    comprehension) |'
  prefs: []
  type: TYPE_TB
- en: '| Support during learning | — Creation of mind maps — Written production and
    interaction in real and authentic contexts — Gamification — Text analysis — Automatic
    translation — Definition of words — Language for specific purposes (and different
    language registers) — Pronunciation — Grammar correction — Vocabulary analysis
    — Grammar explanations — Summaries and paraphrasing — Writing tips — Adaptation
    of texts and levels |'
  prefs: []
  type: TYPE_TB
- en: '| Evaluative support | — Evaluation and feedback — Error correction — Research
    |'
  prefs: []
  type: TYPE_TB
- en: 9.4.1 Preliminary support
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Lesson planning and objectives *(PR) I am a student of Italian at B1 level
    and I need to plan the contents of this level for a self-study of 12 weeks, 4
    hours a week. Can you plan the contents and objectives for learning B1 Italian?*
    (CG) Weeks 3–4: Past Tense and Thematic Vocabulary Objectives:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Learn the simple past tense of regular and irregular verbs.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Expand vocabulary in themes such as travel, food, and leisure. Activities:'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Practice conjugating verbs in the past.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Read texts related to the mentioned themes.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Engage in brief conversations about past experiences.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Creation of didactic materials (exercises, dialogues, specific textual genres,
    and general reading comprehension) *(PR) I am an Italian B1 student and I need
    to create a set of questions on this economics text adapted to B1 level to work
    on reading comprehension.* (CG) Nell’Unione europea si producono ogni anno più
    di 2,2 miliardi di tonnellate di rifiuti. L’UE sta aggiornando la legislazione
    sulla gestione dei rifiuti per promuovere la transizione verso un’economia circolare,
    in alternativa all’attuale modello economico lineare. A marzo 2020 la Commissione
    europea ha presentato, sotto il Green deal europeo in linea con la proposta per
    la nuova strategia industriale, il piano d’azione per una nuova economia circolare
    che include proposte sulla progettazione di prodotti più sostenibili, sulla riduzione
    dei rifiuti e sul dare più potere ai cittadini, come per esempio attraverso il
    ‘diritto alla riparazione’ […] (European Union, 2023).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Quanti rifiuti produce ogni anno l’Unione europea?
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: Meno di 1 miliardo di tonnellate
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: Circa 2 miliardi di tonnellate
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: Più di 2,2 miliardi di tonnellate
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: 1,5 miliardi di tonnellate
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: Perché l’UE sta aggiornando la legislazione sulla gestione dei rifiuti?
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: Per promuovere un’economia basata sul modello lineare
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: Per ridurre la produzione di rifiuti
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: Per favorire un’economia circolare
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: Per aumentare la produzione di rifiuti
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: 9.4.2 Support during learning
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Creation of mind maps *(PR) I am an Italian B1 student and I need a concept
    map of this text for my study. Would it be possible?* Benefici: perché è necessaria
    una transizione verso l’economia circolare? Il riutilizzo e il riciclaggio dei
    prodotti rallenterebbe l’uso delle risorse naturali, ridurrebbe la distruzione
    del paesaggio e degli habitat e contribuirebbe a limitare la perdita di biodiversità.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Un altro vantaggio dell’economia circolare è la riduzione delle emissioni annuali
    totali di gas a effetto serra. Secondo l’Agenzia europea dell’ambiente, i processi
    industriali e l’uso dei prodotti sono responsabili del 9,10% delle emissioni di
    gas serra nell’UE, mentre la gestione dei rifiuti rappresenta il 3,32%.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: Creare prodotti più efficienti e sostenibili fin dall’inizio aiuterebbe a ridurre
    il consumo di energia e risorse, poiché si stima che oltre l’80% dell’impatto
    ambientale di un prodotto sia determinato durante la fase di progettazione […]
    (Unión Europea, 2023).
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '(CG) Explanation of the Concept Map:'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: 'Environmental Protection:'
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: Reuse and recycling reduce the use of natural resources.
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Limits the loss of biodiversity.
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Reduces greenhouse gas emissions.
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Efficiency and Sustainability:'
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: Creating more efficient products from the start.
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Reduction in energy and resource consumption.
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Design of more sustainable products.
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Written production and interaction in real and authentic contexts *(PR) I am
    a b1 level student of Italian and I need to practice the oral part, can we talk
    about the sport and then you can correct my mistakes?* (CG) Certo! Sono qui per
    aiutarvi. Iniziamo parlando di sport: quale sport ti piace o pratichi? (H) prima
    faceo atletica, ma ora non più perché lavori troppo'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: (CG) È un peccato che tu non possa più praticare l’atletica a causa del lavoro.
    Posso capire che impegni lavorativi intensi possano rendere difficile dedicare
    del tempo agli sport. Tuttavia, è importante trovare un equilibrio tra il lavoro
    e le attività che ti piacciono. Hai qualche altro sport che ti interessi o che
    vorresti provare in futuro?
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: (H) Non per ora, ma sarò interessato alle pallavolo se un giorno avrò tempo
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: (CG) Ora, per quanto riguarda la tua espressione in italiano, “prima faceo atletica”
    andrebbe corretto in “prima praticavo atletica” per rendere corretta la coniugazione
    del verbo “praticare” al passato.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: 'Gamification *(PR) I am a b1 level student of italian and I need to gamify
    some grammatical contents to learn in a more dynamic way. can you gamify the way
    to learn the conditional?* (CG) Objective: Travel through time and use conditional
    structures correctly in Italian. Materials needed:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Cards with hypothetical situations.
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: Game board (can be virtual or printed).
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: Player tokens.
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Dice. Preparation:'
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Create cards with hypothetical situations that require the use of the conditional.
    For example: “If you win the lottery, what would you do?” or “If you could travel
    anywhere, where would you go?”'
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Design a game board with squares representing different moments in time (past,
    present, future).
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Place the cards face down near the board. […]
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Text analysis (PR) *Soy un estudiante y necesito analizar el siguiente texto
    periodístico titulado “Non solo Gaza, in Cisgiordania l’altra guerra “invisibile”
    d’Israele. Record di morti palestinesi dal 7 ottobre: sono 163, più di 5 al giorno”.
    ¿Podrías realizar un análisis?* (CG) This journalistic text addresses the situation
    in the West Bank amid the conflict between Israel and Hamas in Gaza. Here is an
    analysis of the content: Summary of the Text:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'General Context: The article points out that international attention has focused
    on the war in Gaza, but there is an “invisible” conflict in the West Bank that
    has heightened tensions and the number of Palestinian deaths.'
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Casualties in the West Bank: From October 7th to November 7th, 163 Palestinian
    deaths were recorded in the West Bank, with an average of approximately 5.5 per
    day. This increase is attributed to the intensification of “anti-terrorism operations”
    by the Israel Defense Forces (IDF) and actions by illegal settlers in the Occupied
    Territories.'
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Aggravating Factors: Israel’s response to Hamas’ attack has given more freedom
    of action to the IDF, leading to an increase in arrests and deaths, including
    civilians. Additionally, an increase in gun permit applications in Israel is mentioned,
    and the Minister of National Security has ordered the purchase of more weapons
    for civilians. […]'
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Automatic translation *(PR) Soy un estudiante de italiano de nivel B1 y necesito
    traducir un texto del italiano al español que no entiendo. ¿podrías traducirlo?*
    (CG) Article 49 Todos los ciudadanos tienen el derecho de asociarse libremente
    en partidos con el fin de contribuir de manera democrática a la determinación
    de la política nacional. La jurisprudencia considera a los partidos políticos
    como instrumentos privilegiados “a través de los cuales se concreta una relación
    estable entre la soberanía popular y las instituciones.” En 2006, el Tribunal
    Constitucional declaró que los partidos están garantizados por la Constitución
    como “instrumentos de representación de intereses políticamente organizados.”
    Los partidos contribuyen a realizar “la estructura democrática” e identifican
    la voluntad general “a través de la actividad de agregar las voluntades y necesidades
    de los individuos presentes en la sociedad”: por estas razones, la legislación
    debe garantizar una “verdadera igualdad de oportunidades para cada formación política
    en la competencia electoral”'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[...] (Hub Scuola, n.d.)'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: Definition of words *(PR) I am a B1 level student of Italian and I would like
    to know the meaning of some Italian words such as “panettone” and “pandoro.”*
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Panettone: Panettone is a type of sweet bread originating from Italy, specifically
    from Milan. It is traditionally consumed during the Christmas season. It’s a soft
    and fluffy bread that typically contains candied fruits, citrus peels, and raisins.
    It is served in slices and is often accompanied by a cup of hot chocolate or wine.'
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Pandoro: Like panettone, pandoro is another type of Italian sweet bread associated
    with the Christmas season. It originated in Verona. Unlike panettone, pandoro
    does not contain fruits or raisins. It has a conical shape, resembling a tower,
    and is dusted with powdered sugar before serving. It is often accompanied by cream
    or chocolate.'
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Language for specific purposes (and different language registers) *(PR) I am
    a student of Italian B1 for specific purposes. It is a course dedicated to Italian
    in catering. Could you give me a text to work on the compound conditional with
    specific vocabulary of this field and some questions to solve?* (CG) Text: The
    Perfect Dinner Welcome to the “Gusto Divino” restaurant! Our chef, Marco, has
    prepared an exceptional dinner for you. Last night, if we had had fresh fish,
    we would have served a delicious fish soup as an appetizer. Unfortunately, there
    were no fresh supplies, so we opted for a mixed salad with goat cheese and toasted
    nuts.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: For the first course, we would have cooked spaghetti with clams if the clam
    supply had not been delayed. Instead, we chose to prepare a mushroom risotto,
    a classic that always succeeds among our customers.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '[…]'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: 'Questions:'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: What was the originally planned appetizer for the dinner? Why wasn’t it served?
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: What would the restaurant have cooked as the first course if there had been
    no delay in the supply? […]
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Pronunciation *(PR) I am a student of Italian level b1 and I need to know how
    to pronounce the words “balia,” “ancora” and “alice” in Italian.* (CG) “Sure!
    Here’s the approximate pronunciation of the words in Italian:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: “Balia” is pronounced roughly as **bah-lee-ah**.
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: “Ancora” is pronounced approximately as **ahn-koh-rah**.
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: “Alice” is pronounced approximately as **ah-lee-che**.
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: Grammar correction *(PR) I am a b1 level student of Italian. could you please
    correct the grammar of the following text?* (CG) Le due amiche si ritrovo puntualissimi
    davanti all’entrata del cinema. I posti le hanno già prenotati. La fila centrale
    è la migliore, un po’ perché permette una visiva ottimale, un po’ perché si possono
    allungare tranquillamente le gambe senza toccare i seggiolino davanti. Le due
    ragazze comprano una generosa porzione di corn e prendono anche una bevanda gassata
    e un pacchetto di caramelle. Si accomodano sulle loro poltroncine e sono pronte
    a godersi lo spettacolo offerto dal grande schermo. “Le due amiche si ritrovano
    puntualissime davanti all’entrata del cinema. I posti le hanno già prenotati.
    La fila centrale è la migliore, un po’ perché permette una visuale ottimale, un
    po’ perché si possono allungare tranquillamente le gambe senza toccare il seggiolino
    davanti. Le due ragazze comprano una generosa porzione di popcorn e prendono anche
    una bevanda gassata e un pacchetto di caramelle. Si accomodano sulle loro poltroncine
    e sono pronte a godersi lo spettacolo offerto dal grande schermo.”
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Cambios realizados:'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: “si ritrovo” → “si ritrovano” (concordancia de número)
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: “corn” → “popcorn” (corrección de la palabra)
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: “seggiolino” → “seggiolino” (singular, ya que se refiere al asiento directamente
    en frente de ellas)
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: “sulle loro” → “sulle loro” (corrección de concordancia de género)
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Vocabulary analysis *(PR) I am a b1 student of Italian and I need to analyse
    the following text syntactically “Al cinema, questa sera, danno finalmente il
    film che Vittoria sogna di vedere da almeno un anno. Ne aveva sentito parlare
    anche Anna ed entrambe sono delle grandi fan del bell’attore protagonista e non
    vedono l’ora di scoprire se la love story tra lui e la protagonista femminile
    avrà un lieto fine oppure no.”* (CG) Sentence 1: “At the cinema, tonight, they’re
    finally showing the movie that Vittoria has been dreaming of seeing for at least
    a year.”'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'General Structure: Subject + Verb + Direct Object + Circumstantial Location
    + Circumstantial Time.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Detailed Analysis:'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Subject: “che Vittoria sogna di vedere da almeno un anno.”'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Verb: “danno” (third person plural of the verb “dare” in the present indicative).'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Direct Object: “il film.”'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Circumstantial Location: “Al cinema.”'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Circumstantial Time: “questa sera.” […]'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Grammar explanations *(PR) I am a B1 level student of Italian and I need to
    know how to use the particle ci in Italian.* (CG) Ci:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Use as a personal pronoun:'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'It is commonly used as a reflexive pronoun. For example: “Ci vediamo domani”
    (We’ll see each other tomorrow).'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'It can also be used as a pronoun of place to indicate a nearby or distant place.
    For example: “Vado al cinema, ci vieni?” (I’m going to the cinema, are you coming?).'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'In some cases, it is used to replace a phrase indicating a place or direction
    already mentioned. For example: “Vado in centro a fare shopping, vieni anche tu?”
    (I’m going downtown for shopping, are you coming too?).'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Summaries and paraphrasing *(PR) I am a b1 student of Italian and I need to
    paraphrase this text in Italian.* (CG) Raffaello Sanzio (1483–1520), formato nella
    bottega del padre Giovanni Santi, cresce a Urbino nel fervido clima culturale
    della corte dei Montefeltro. Dopo le premature morti dei genitori, Raffaello entra
    in contatto con Perugino, lavora a Città di Castello e a soli quindici anni dimostra
    piena padronanza nella gestione della bottega paterna. A inizio ‘500, il giovane
    è già tra gli artisti più richiesti in Umbria; dopo brevi soggiorni a Firenze
    e Roma, raggiunge Pinturicchio (1454–1513) a Siena e realizza per l’amico alcuni
    cartoni destinati agli affreschi della *Libreria Piccolomini*. Nel 1504, anno
    del celebre *Sposalizio della Vergine*, si trasferisce a Firenze, la vicinanza
    di Leonardo e Michelangelo è visibile nelle straordinarie opere di *devozione
    privata* e nei ritratti per ricchi borghesi. […] (RAI Cultura).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Raffaello Sanzio (1483–1520), cresciuto nell’ambiente artistico della bottega
    di suo padre Giovanni Santi a Urbino, si sviluppa nella fervente atmosfera culturale
    della corte dei Montefeltro. Dopo la prematura scomparsa dei suoi genitori, entra
    in contatto con Perugino e lavora a Città di Castello; già a quindici anni dimostra
    una piena competenza nella gestione dell’atelier di famiglia. All’inizio del XVI
    secolo, Raffaello è già uno degli artisti più richiesti in Umbria. Dopo brevi
    soggiorni a Firenze e Roma, raggiunge Pinturicchio a Siena, realizzando cartoni
    destinati agli affreschi della Libreria Piccolomini. Nel 1504, anno del celebre
    Sposalizio della Vergine, si trasferisce a Firenze, dove la vicinanza con Leonardo
    e Michelangelo si riflette nelle straordinarie opere di devozione privata e nei
    ritratti per la borghesia ricca.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '[…]'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: 'Writing tips *(PR) I am a B1 student and I need advice on how to improve a
    text. Could you give me writing tips from the above text about Raffaello?* (CG)
    Overall, your biography of Raphael Sanzio is informative and well-structured.
    Here are some writing tips to enhance it:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Clarity and Flow:'
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: Ensure that ideas flow coherently and logically. Use connectors and transition
    phrases to facilitate smooth reading.
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Variety in Sentence Structure:'
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: Diversify sentence structures to avoid repetition and make the text more dynamic.
    Combine short and long sentences, for example, to maintain the reader’s interest.
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Expansion of Details:'
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: Add additional details about some of Raphael’s most prominent works. This will
    provide readers with a more comprehensive understanding of his artistic contribution.
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Use of Specific Terms:'
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: Consider using specific terms related to art and painting to describe Raphael’s
    techniques and styles more detailedly. […]
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Here’s an example of how you could implement some of these tips:'
  prefs: []
  type: TYPE_NORMAL
- en: Raphael Sanzio, born in 1483 and trained in his father Giovanni Santi’s workshop,
    emerged as an artistic prodigy in the flourishing cultural scene of the Montefeltro
    court in Urbino. After the premature loss of his parents, Raphael, at the age
    of fifteen, displayed complete mastery in managing his father’s workshop. In the
    early years of the 16th century, he became one of the most sought-after artists
    in Umbria. His artistic journey took him to Città di Castello, Florence, and Rome,
    where his influence intertwined with that of Leonardo and Michelangelo, giving
    rise to devotional works and impressive portraits for the bourgeois elite.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Adaptation of texts and levels *(PR) I am a b1 level student of Italian and
    I have found a C1 level text. Could you help me to adapt the text to B1 level
    in order to be able to understand it?*
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: (CG) Uno degli studi più importanti condotti sui benefici alla salute derivanti
    dall’andare a lavorare in bicicletta è stato realizzato dal Copenhagen Center
    Prospective Population Studies. Durante un periodo di molti anni, lo studio ha
    preso in considerazione 13.375 donne e 17.265 uomini. Nel corso della ricerca
    diverse persone morirono e le loro età vennero registrate, ne risultò che chi
    utilizzava abitualmente la bicicletta per i suoi spostamenti aveva un’aspettativa
    di vita più lunga. Inoltre, secondo quanto riportato dall’International Journal
    of Obesity, c’è un legame significativo tra l’utilizzo abituale dell’automobile
    e l’essere soprappeso o obesi. I rischi per la salute di uno stile di vita sedentaria
    sono enormi, reali ed in costante aumento. Pedalare per andare a lavoro si traduce
    in grandi benefici per il sistema cardiovascolare; è molto più facile rimanere
    in forma quando si fa esercizio fisico ogni giorno. […] ([Loescher Editore 2014](#ch17.xhtml#r372)).
  prefs: []
  type: TYPE_NORMAL
- en: Uno degli studi più importanti sulle cose positive per la salute che vengono
    dal andare a lavorare in bicicletta è stato fatto dal Copenhagen Center Prospective
    Population Studies. Per molti anni, hanno studiato 13.375 donne e 17.265 uomini.
    Durante la ricerca, alcune persone sono morte e hanno segnato le loro età. Hanno
    scoperto che chi usa la bicicletta regolarmente per i trasporti vive di più. Inoltre,
    secondo un articolo sull’International Journal of Obesity, c’è una connessione
    importante tra l’uso abituale dell’auto e il sovrappeso o l’obesità. I rischi
    per la salute di uno stile di vita sedentario sono grandi, reali e sempre in aumento.
    Andare in bicicletta per andare al lavoro porta grandi benefici per il cuore;
    è più facile rimanere in forma quando fai esercizio ogni giorno.
  prefs: []
  type: TYPE_NORMAL
- en: 9.4.3 Evaluative support
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Evaluation and feedback *(PR) I am a student of Italian b1 and I have produced
    a written production on a free topic which I have to hand in. If I give you the
    text, could you give me a mark from 1 to 10 according to the B1 level of Italian
    along with advice on how to improve?* (CG) Riccardo, un alunno della scuola media,
    ha sempre avuto problemi con i compiti da svolgere a casa. Li fa abbastanza regolarmente,
    ma, essendo un tipo distratto e disordinato, spesso finisce per scrivere testi
    poco comprensibili per gli altri. A scuola questo gli complica la vita, perché
    gli riesce difficile correggere gli errori, ritrovare un certo testo a distanza
    di tempo, scambiare dei lavori con i compagni di classe – non trova niente nel
    suo disordine. Evaluation: 7/10 (Nivel B1)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Positive aspects:'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: The text has a clear and coherent structure.
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: Vocabulary use is suitable for B1 level.
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: Tense usage is correct.
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: 'The story is understandable and follows a logical sequence. Áreas for improvement:'
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: Some sentences are quite long and could be divided to improve the text’s fluency.
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: There are minor grammatical errors, such as the incorrect use of “essendo” instead
    of “poiché” to express cause.
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: The use of the subjunctive could be improved in some constructions, such as
    “finché il suo insegnante gli ha proposto.”
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: Instead of “per tanto tempo,” you can use “per molto tempo” for more accuracy.
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: Consider word choice variation to avoid repetitions. […]
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Error correction *(PR) I am an Italian B1 student and I have a text in Italian
    with errors that I need to correct. Can you correct the text by dividing the errors
    into grammatical, syntactical and spelling errors?* (CG) Negli ultimi mesi sono
    aumentate le e-mail di protesta indirizzate alla redazione del País: sempre piu
    lettori si lamentano per lo stile trascurato e leccesso di refusi negli articoli.
    L 11 settembre Milagros Pérez Oliva, la difensora dei lettori, si e occupata della
    questione. In un editoriale intitolato Errores y horrores de agosto ha elencato
    gli strafalcioni usciti durante lestate e ha ammesso che il quotidiano ha un problema.
    Ledizione on-line e la piu colpita. E non importa se sul web basta un minuto per
    correggere un errore: “Il danno ormai e fatto.” Grammatical Errors:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: “sempre piu” → “sempre più” (addition of accent on ‘ù’)
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: “lo stile trascurato e leccesso” → “lo stile trascurato e l’eccesso” (apostrophe
    added to avoid vowel sequence)
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: “si e occupata” → “si è occupata” (accent added on ‘è’)
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: “Errores y horrores de agosto” → “Errori e orrori di agosto” (correct translation)
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: '“strafulconi” → “strafalcioni” (corrected word) Syntactic Errors:'
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: “indirizzate alla redazione del País” → “indirizzate alla redazione de El País”
    (addition of the article ‘de’ before “El País”)
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: “la piu colpita” → “la più colpita” (accent added on ‘ù’) […]
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: Research *(PR) I am a student of Italian b1 and I need scientific material for
    an article on false friends in Spanish and Italian for an academic paper at the
    university. Is it possible to get references of articles online in Spanish?*
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Comparative Linguistics: Authors focusing on comparative linguistics between
    Spanish and Italian can provide valuable information about the similarities and
    differences between both languages.'
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Translation Studies: Researchers in the field of translation might address
    specific challenges related to false friends when translating between Spanish
    and Italian.'
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Books on Linguistics and Lexicology: Look for books on linguistics and lexicology
    that focus on the relationship between words in different languages, especially
    those addressing false friends.'
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Articles in Academic Journals: Use academic databases to search for articles
    in journals specialized in linguistics, translation, or language studies. Include
    terms like “falsos amigos español italiano” in your searches.'
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Specialized Dictionaries: Examine specialized dictionaries that address translation
    between Spanish and Italian. Some dictionaries may include sections dedicated
    to false friends.'
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Relevant Authors: Look for works by recognized authors in the field of linguistics
    and translation who have addressed topics related to false friends. You could
    explore the works of linguists such as Steven Pinker, Umberto Eco, or specific
    researchers in the field of translation and linguistic exchange.'
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: 9.5 Discussion
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: ChatGPT proves to be a great resource finder for autonomous language learning
    in most of the tasks assigned to it. Consider the creation of didactic material,
    where it also provides immediate feedback to the student, or in-text analyses.
    The power of its reformulation allows for practice with authentic texts that develop
    language skills in comprehension and production. Specifically, notable is the
    interaction it fosters in real and authentic conversations, as it not only engages
    with the user on any topic that suits their learning but also provides grammatical
    correction and final feedback. Additionally, for those students who may struggle
    to understand a text, either due to the level of technicalities present or because
    they have less developed language skills, text analysis, automatic translation,
    or text and level adaptation represent valuable strategies.
  prefs: []
  type: TYPE_NORMAL
- en: On the other hand, some limitations are detected that go beyond the program’s
    characteristics, namely, space limitations in responses, limitations of the outdated
    free version 3.5, and robustness issues as it doesn’t always respond consistently,
    as evidenced in previous studies ([González Vallejo 2023](#ch17.xhtml#r363)).
    Initially, these limitations relate to the lack of graphical representation, which
    would allow for better acquisition of mental maps, as it only highlights important
    concepts in a text list, and gamification strategies, since images play an important
    role in rule comprehension. Likewise, ChatGPT lacks accessibility features such
    as audio description or font size adaptation in responses, which reduces learning
    diversity. Furthermore, while most functions prove efficient for autonomous study
    at the B1 level of Italian, other learning limitations are apparent.
  prefs: []
  type: TYPE_NORMAL
- en: Regarding preliminary support, in class planning and goal setting, the program
    indicates the need to study past tenses but does not specify grammatical topics
    and also does not provide specific B1 vocabulary topics that are referenced in
    all Italian as a foreign language books. Interestingly, and with access to the
    internet, it could provide the contents specified for language learning in any
    book or institutional website.
  prefs: []
  type: TYPE_NORMAL
- en: Regarding support during learning, as a text model, it does not have the ability
    to directly create graphics or concept maps. This hinders a more dynamic concept
    hierarchy. However, it can provide a textual description of the main parts of
    a text to subsequently create a concept map. On the other hand, when asked for
    explanations about pronunciation, it does not differentiate between homographs
    such as “balia,” “ancora,” and “alice” in Italian, as it simply describes phonologically,
    but without phonetic symbols, the sounds.
  prefs: []
  type: TYPE_NORMAL
- en: Lastly, concerning evaluative support, it only offers advice on how to research
    a topic but does not provide references or useful information on a specific topic,
    in this case, false friends between Italian and Spanish, as an assistant would.
    [Figure 9.1](#ch17.xhtml#f28) presents the strategy analysis with ChatGPT.
  prefs: []
  type: TYPE_NORMAL
- en: '![A diagram depicts a rectangular box at the top labeled strategy analysis
    with Chat G P T, with dashed lines connected to three boxes at the bottom labeled
    highlighted strategies, program limitations, and strategy deficiency. Each box
    at the bottom consists of five points.](html/images/9781032716084_C009_001.jpg)'
  prefs: []
  type: TYPE_IMG
- en: '[Figure 9.1](#ch17.xhtml#f28b) Strategy analysis with ChatGPT.'
  prefs: []
  type: TYPE_NORMAL
- en: 9.6 Conclusions
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The application of AI in education has represented a paradigm shift by presenting
    technology not only as a support during learning but also as an assistant that
    promotes autonomous learning. The integration of different techniques and technologies
    enables problem-solving through its advanced language model. Therefore, this chapter
    has outlined the learning strategies that this language model can offer, identified
    using ChatGPT as an assistant for teaching, given the lack of studies on personalized
    strategies derived from the use of this chatbot. The effectiveness of some of
    its functions is undeniable, such as the creation of didactic material based on
    both internet access and its powerful reformulation capability. This allows for
    the generation of a wide variety of reading comprehension exercises, dialogues,
    and specific textual genres. Likewise, the production and written interaction
    in real and authentic contexts are notable. This facilitates interaction with
    immediate feedback in natural conversations, which can substitute for the role
    of a teacher, provided that the grammar and corrections provided are accurate
    and precise. Therefore, a specific use of prompts must be made to avoid error
    margins, as in some contexts, the program still needs improvement, exhibiting
    deviations, and sometimes requiring different responses.
  prefs: []
  type: TYPE_NORMAL
- en: References
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '[Barrot, Jessie S](#ch17.xhtml#r351b). 2023\. “Using ChatGPT for second language
    writing: Pitfalls and potentials.” Assessing Writing 57:100745\. [https://doi.org/10.1016/j.asw.2023.100745](https://doi.org/10.1016/j.asw.2023.100745)'
  prefs:
  - PREF_UL
