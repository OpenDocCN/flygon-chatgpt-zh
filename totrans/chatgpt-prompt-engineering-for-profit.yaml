    ****a**nd** ****an**swe**r). ****A**sk** ****t**he** ****mo**del** ****t**o**
    ****exp**lai**n ****a**** ****n**ew** ****re**cip**e ****foll**owin**g ****t**he**
    ****sa**me** ****pat**ter**n ****a**nd** ****st**yle** ****a**s** ****t**he**
    ****exa**mple**s ****pro**vide**d.'
  id: totrans-213
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**创建两个简单的食谱示例（问题和答案）。然后要求模型解释一个新食谱，遵循提供的示例相同的模式和风格。**'
- en: '****5****. ****Se**lf**- ****Refl**ectiv**e ****Prom**ptin**g ( ****Mo**del**
    ****Se**lf**-****Refl**ectio**n )'
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
  zh: '**5. 自我反思提示（模型自我反思**）'
- en: '[****Wh**at** ****i**s** ]'
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
  zh: '[**什么是**]'
- en: '****Se**lf**- ****Refl**ectiv**e ****Prom**ptin**g , ****o**r** ****Mo**del**
    ****Se**lf**-****Refl**ectio**n , ****i**s** ****a**** ****pr**omp**t ****engi**neerin**g
    ****tech**niqu**e ****th**at** ****enco**urage**s ****t**he** ****L**LM** ****t**o**
    ****ref**lec**t ****o**n** ****t**he** ****qua**lit**y ****a**nd** ****acc**urac**y
    ****o**f** ****i**ts** ****o**wn** ****res**pons**e. ****I**n** ****th**is** ****app**roac**h,
    ****t**he** ****mo**del** ****i**s** ****pro**mpte**d ****t**o** ****eva**luat**e
    ****it**sel**f, ****cor**rec**t ****pote**ntia**l ****er**ror**s, ****a**nd**
    ****imp**rov**e ****t**he** ****res**pons**e ****be**for**e ****pres**entin**g
    ****i**t** ****a**s** ****fi**nal**. ****I**t** ****i**s** ****a**** ****ki**nd**
    ****o**f** " ****se**lf**-****edi**tin**g ", ****wh**ich** ****ai**ms** ****t**o**
    ****imp**rov**e ****t**he** ****conf**idenc**e ****a**nd** ****acc**urac**y ****o**f**
    ****t**he** ****pro**vide**d ****res**pons**e.'
  id: totrans-216
  prefs: []
  type: TYPE_NORMAL
  zh: '**自我反思提示，或模型自我反思**，是一种提示工程技巧，它鼓励LLM反思其自身响应的质量和准确性。在这种方法中，模型被提示去评估自身，纠正潜在的错误，并在呈现最终结果之前改进响应。这是一种“自我校对”的方式，旨在提高提供响应的置信度和准确性。'
- en: '****T**he** ****id**ea** ****i**s** ****th**at** ****t**he** ****mo**del**
    ****n**ot** ****on**ly** ****gene**rate**s ****a**** ****res**pons**e, ****b**ut**
    ****al**so** ****rev**iew**s ****wh**at** ****y**ou**’****v**e** ****wri**tte**n,
    ****loo**kin**g ****f**or** ****incons**istenci**es ****o**r** ****info**rmatio**n
    ****th**at** ****mi**ght** ****b**e** ****inco**rrec**t. ****Th**is** ****le**ads**
    ****t**o** ****mo**re** ****acc**urat**e ****inte**ractio**n, ****incr**easin**g
    ****t**he** ****ch**anc**e ****o**f** ****rel**iabl**e, ****qua**lit**y ****resp**onse**s.'
  id: totrans-217
  prefs: []
  type: TYPE_NORMAL
  zh: '**理念是模型不仅生成一个响应，而且还回顾你所写的内容，寻找不一致性或可能不正确的信息。这导致更准确的交互，增加可靠、高质量响应的机会**。'
- en: '[****Wh**at** ****i**s** ****yo**ur** ****ma**in** ****obje**ctiv**e ]'
  id: totrans-218
  prefs: []
  type: TYPE_NORMAL
  zh: '[**你的主要目标是什么**]'
- en: '****T**he** ****ma**in** ****obje**ctiv**e ****o**f** ****Se**lf**- ****Refl**ectiv**e
    ****Prom**ptin**g ****imp**rove**s ****t**he** ****qua**lit**y ****o**f** ****t**he**
    ****res**pons**e ****pro**vide**d ****b**y** ****t**he** ****mo**del** ****b**y**
    ****prom**ptin**g ****i**t** ****t**o** ****re**vie**w ****a**nd** ****imp**rov**e
    ****i**ts** ****o**wn** ****reas**onin**g ****be**for**e ****pres**entin**g ****i**t**
    ****a**s** ****defi**nitiv**e. ****B**y** ****ma**kin**g ****t**he** ****mo**del**
    ****ref**lec**t ****o**n** ****wh**at** ****i**t** ****h**as** ****gene**rate**d,
    ****i**t** ****incr**ease**s ****t**he** ****poss**ibilit**y ****o**f** ****iden**tifyin**g
    ****er**ror**s ****a**nd** ****ad**din**g ****rel**evan**t ****det**ail**s ****th**at**
    ****m**ay** ****ha**ve** ****be**en** ****forg**otte**n.'
  id: totrans-219
  prefs: []
  type: TYPE_NORMAL
  zh: '**自我提示的主要目标是通过提示模型回顾和改进其推理，在将其作为最终呈现之前，提高模型提供的响应质量。通过使模型反思其生成的内容，它增加了识别错误和添加可能被遗忘的相关细节的可能性**。'
- en: '****Ano**the**r ****go**al** ****i**s** ****t**o** ****pro**mot**e ****mo**re**
    ****cri**tica**l ****a**nd** ****car**efu**l ****reas**onin**g, ****ens**urin**g
    ****th**at** ****t**he** ****an**swe**r ****i**s** ****appr**opriat**e, ****coh**eren**t
    ****a**nd** ****cl**ear**. ****Th**is** ****tech**niqu**e ****i**s** ****espe**ciall**y
    ****val**uabl**e ****i**n** ****con**text**s ****wh**ere** ****acc**urac**y ****a**nd**
    ****cons**istenc**y ****a**re** ****esse**ntia**l, ****su**ch** ****a**s** ****wh**en**
    ****answ**erin**g ****com**ple**x ****ques**tion**s ****o**r** ****wh**ere** ****th**ere**
    ****i**s** ****a**** ****ne**ed** ****t**o** ****en**sur**e ****th**at** ****t**he**
    ****info**rmatio**n ****pro**vide**d ****i**s** ****cor**rec**t.'
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
  zh: '**另一个目标**是促进更多批判性和细致的推理，确保答案的适当性、一致性和清晰性。这种技术在准确性一致至关重要的环境中特别有价值，例如在回答复杂问题时或需要确保提供的信息正确时。'
- en: '[****H**ow** ****i**t** ****wo**rks** ]'
  id: totrans-221
  prefs: []
  type: TYPE_NORMAL
  zh: '[**它是如何工作的**]'
- en: '****Se**lf**- ****Refl**ectiv**e ****Prom**ptin**g ****wo**rks** ****b**y**
    ****as**kin**g ****t**he** ****L**LM** ****t**o** ****crit**icall**y ****ana**lyz**e
    ****t**he** ****res**pons**e ****af**ter** ****gene**ratin**g ****a**n** ****ini**tia**l
    ****res**pons**e. ****T**he** ****ana**lysi**s ****sh**oul**d ****con**side**r
    ****whe**the**r ****t**he** ****res**pons**e ****i**s** ****cl**ear**, ****com**plet**e,
    ****a**nd** ****cor**rec**t. ****B**y** ****intr**oducin**g ****th**is** “****refl**ectio**n”
    ****st**ep**, ****t**he** ****L**LM** ****i**s** ****enco**urage**d ****t**o**
    ****re**vie**w ****t**he** ****det**ail**s ****a**nd**, ****i**f** ****nece**ssar**y,
    ****ma**ke** ****adju**stment**s, ****impr**ovin**g ****t**he** ****fi**nal**
    ****qua**lit**y ****o**f** ****t**he** ****res**pons**e.'
  id: totrans-222
  prefs: []
  type: TYPE_NORMAL
  zh: '**自我反思提示****通过****让****LLM****对****生成****的****初始****响应****进行****批判性****分析****。****分析****应****考虑****响应****是否****清晰****、****完整****、****正确****。****通过****引入****“****反思****”****这一****步骤****，****LLM****被****鼓励****审查****细节****，****并在****必要时****进行调整****，****从而****提高****最终****响应****的质量****。'
- en: '****T**o** ****ap**ply** ****th**is** ****tech**niqu**e, ****t**he** ****pr**omp**t
    ****i**s** ****usu**all**y ****div**ide**d ****in**to** ****t**wo** ****pa**rts**:
    ****fi**rst**, ****a**** ****req**ues**t ****f**or** ****t**he** ****mo**del**
    ****t**o** ****an**swe**r ****t**he** ****que**stio**n; ****a**nd** ****th**en**
    ****a**** ****req**ues**t ****f**or** ****i**t** ****t**o** ****eva**luat**e ****t**he**
    ****an**swe**r ****i**t** ****ju**st** ****pro**vide**d. ****T**he** ****mo**del**
    ****sh**oul**d ****lo**ok** ****f**or** ****ga**ps** ****o**r** ****pote**ntia**l
    ****pro**blem**s, ****su**ch** ****a**s** ****mis**sin**g ****det**ail**s, ****incons**istenci**es,
    ****o**r** ****fac**tua**l ****er**ror**s.'
  id: totrans-223
  prefs: []
  type: TYPE_NORMAL
  zh: '**要****应用****这种****技术****，****提示****通常****被****分为****两部分****：****首先****，****要求****模型****回答****问题****；****然后****，****要求****它****评估****刚刚****提供的****答案****。****模型****应****寻找****漏洞****或****潜在****问题****，****例如****缺失****细节****、****不一致性****、****或****事实****错误****。'
- en: '****Addi**tional**ly, ****th**is** ****app**roac**h ****c**an** ****al**so**
    ****b**e** ****us**ed** ****t**o** ****enco**urag**e ****de**epe**r ****refl**ectio**n
    ****o**n** ****ques**tion**s ****o**f** ****opi**nio**n ****o**r** ****ana**lysi**s
    ****b**y** ****ha**vin**g ****t**he** ****mo**del** ****con**side**r ****diff**eren**t
    ****pers**pectiv**es ****a**nd** ****jus**tif**y ****i**ts** ****cho**ice**s.
    ****I**n** ****th**is** ****w**ay**, ****t**he** ****tech**niqu**e ****c**an**
    ****n**ot** ****on**ly** ****imp**rov**e ****t**he** ****an**swe**r, ****b**ut**
    ****al**so** ****pro**vid**e ****a**** ****ri**che**r ****ins**igh**t ****in**to**
    ****t**he** ****sub**jec**t.'
  id: totrans-224
  prefs: []
  type: TYPE_NORMAL
  zh: '**此外**，**这种****方法****也可以****用来****鼓励****对****观点****或****分析****问题****进行****更深入的****反思****，通过让模型考虑不同的****视角****并****证明****其****选择****的****合理性****。****这样****一来****，****技术****不仅****能****够****改进****答案****，****还能****提供****对****主题****的****更丰富****的****见解****。'
- en: '[****Wh**en** ****t**o** ****u**se** ]'
  id: totrans-225
  prefs: []
  type: TYPE_NORMAL
  zh: '[**何时使用**]'
- en: '****Se**lf**- ****Refl**ectiv**e ****Prom**ptin**g ****i**s** ****us**efu**l
    ****wh**en** ****acc**urac**y ****a**nd** ****qua**lit**y ****a**re** ****a****
    ****pri**orit**y. ****I**f** ****t**he** ****que**stio**n ****req**uire**s ****a****
    ****det**aile**d ****an**swe**r ****o**r** ****wh**ere** ****a**** ****mis**tak**e
    ****co**uld** ****ha**ve** ****ser**iou**s ****cons**equenc**es, ****su**ch**
    ****a**s** ****i**n** ****t**he** ****med**ica**l ****fi**eld**, ****sci**enc**e,
    ****o**r** ****wh**en** ****anal**yzin**g ****a**** ****to**pic** ****i**n** ****de**pth**,
    ****us**ing** ****th**is** ****tech**niqu**e ****he**lps** ****min**imiz**e ****pote**ntia**l
    ****er**ror**s.'
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
  zh: '**自我反思提示****在****准确性和****质量****是****首要****考虑因素时****很有****用****。****如果****问题****需要****详细****的****答案****，****或者****错误****可能****产生****严重****后果****，****例如****在****医疗****领域****、****科学****领域****，****或者****在****深入****分析****一个****主题****时****，****使用****这种****技术****有助于****最小化****潜在****错误****。'
- en: '****I**t** ****i**s** ****al**so** ****us**efu**l ****wh**en** ****y**ou**
    ****wa**nt** ****t**he** ****mo**del** ****t**o** ****pro**vid**e ****a**** ****mo**re**
    ****ro**bus**t ****an**swe**r, ****si**nce** ****se**lf**-****refl**ectio**n ****pro**mpt**s
    ****t**he** ****L**LM** ****t**o** ****a**dd** ****det**ail**s ****th**at** ****m**ay**
    ****n**ot** ****ha**ve** ****be**en** ****inc**lude**d ****i**n** ****t**he**
    ****ini**tia**l ****an**swe**r. ****I**t** ****i**s** ****a**** ****val**uabl**e
    ****app**roac**h ****f**or** ****us**ers** ****w**ho** ****wa**nt** ****t**o**
    ****g**et** ****a**** ****mo**re** ****det**aile**d ****o**r** ****rev**ise**d
    ****re**sul**t ****wit**hou**t ****ha**vin**g ****t**o** ****man**uall**y ****re**vis**e
    ****i**t**.'
  id: totrans-227
  prefs: []
  type: TYPE_NORMAL
  zh: '****当您希望模型****提供****更****稳健****的回答时，这也很有用，因为自我反思会促使LLM添加初始回答中可能未包含的细节。这对于希望获得更详细或修订结果的用户来说是一种有价值的方法，而无需手动进行修订。'
- en: '****Wh**en** ****dea**lin**g ****wi**th** ****com**ple**x, ****lo**ng** ****info**rmatio**n
    ****o**r** ****info**rmatio**n ****th**at** ****c**an** ****ha**ve** ****mul**tipl**e
    ****interp**retatio**ns, ****Se**lf**- ****Refl**ectiv**e ****Prom**ptin**g ****c**an**
    ****en**sur**e ****th**at** ****t**he** ****mo**del** ****pre**sent**s ****t**he**
    ****an**swe**r ****i**n** ****a**** ****mo**re** ****stru**cture**d ****a**nd**
    ****le**ss** ****ambi**guou**s ****w**ay**, ****prov**idin**g ****a**** ****mo**re**
    ****rel**iabl**e ****a**nd** ****veri**fiabl**e ****expl**anatio**n.'
  id: totrans-228
  prefs: []
  type: TYPE_NORMAL
  zh: '****当处理复杂、长信息或可能具有多种解释的信息时，自我反思提示可以确保模型以更结构化和更不模糊的方式呈现答案，提供更可靠和可验证的解释。'
- en: '[****Ti**ps** ****f**or** ****u**se**]'
  id: totrans-229
  prefs: []
  type: TYPE_NORMAL
  zh: '[****使用提示****]'
- en: ● ****Ma**ke** ****a**** ****cl**ear** ****req**ues**t ****f**or** ****t**he**
    ****mo**del** ****t**o** ****re**vie**w ****t**he** ****an**swe**r, ****su**ch**
    ****a**s** "****Pl**eas**e ****re**vie**w ****yo**ur** ****an**swe**r ****a**nd**
    ****cor**rec**t ****a**ny** ****er**ror**s." ****T**he** ****mo**re** ****spe**cifi**c
    ****yo**ur** ****req**ues**t ****f**or** ****re**vie**w, ****t**he** ****be**tte**r
    ****t**he** ****re**sul**t ****wi**ll** ****b**e**.
  id: totrans-230
  prefs: []
  type: TYPE_NORMAL
  zh: ● ****请****为****模型****提出****清晰****的****审阅请求，例如“****请****审阅****您的****回答****并****纠正****任何****错误。”****您的****审阅请求越具体，结果越好。
- en: ● ****Enco**urag**e ****t**he** ****mo**del** ****t**o** ****th**ink** ****ab**out**
    ****t**he** ****cla**rit**y ****a**nd** ****comp**letene**ss ****o**f** ****t**he**
    ****an**swe**r. ****Ques**tion**s ****su**ch** ****a**s** “ ****I**s** ****th**is**
    ****an**swe**r ****com**plet**e?” ****o**r** “****I**s** ****th**ere** ****any**thin**g
    ****impo**rtan**t ****mis**sin**g?” ****c**an** ****he**lp** ****gu**ide** ****se**lf**-****refl**ectio**n
    .
  id: totrans-231
  prefs: []
  type: TYPE_NORMAL
  zh: ● ****鼓励****模型****思考****回答****的****清晰度和完整性。例如，问题“****这个****回答****完整吗？”或“****有什么****重要****的信息****遗漏了吗？”可以促进自我反思。
- en: '[****T**he** ****diff**erenc**e ****o**f** ****t**he** ****tech**niqu**e ]'
  id: totrans-232
  prefs: []
  type: TYPE_NORMAL
  zh: '[****技术差异****]'
- en: '****Se**lf**- ****Refl**ectiv**e ****Prom**ptin**g ****i**s** ****diff**eren**t
    ****fr**om** ****ot**her** ****tech**nique**s, ****su**ch** ****a**s** ****Ch**ain**
    ****o**f** ****Tho**ugh**t , ****a**s** ****i**t** ****i**s** ****n**ot** ****foc**use**d
    ****o**n** ****gene**ratin**g ****a**** ****st**ep**-****b**y**-****st**ep** ****expl**anatio**n
    ****ri**ght** ****fr**om** ****t**he** ****st**art**, ****b**ut** ****ra**the**r
    ****o**n** ****revi**ewin**g ****t**he** ****reas**onin**g ****alr**ead**y ****do**ne**
    ****a**nd** ****impr**ovin**g ****i**t**. ****Wh**ile** ****Ch**ain** ****o**f**
    ****Tho**ugh**t ****ai**ms** ****t**o** ****gu**ide** ****t**he** ****tho**ugh**t
    ****pro**ces**s ****fr**om** ****begi**nnin**g ****t**o** ****e**nd**, ****Se**lf**-
    ****Refl**ectiv**e ****Prom**ptin**g ****app**lie**s ****af**ter** ****a**n**
    ****ini**tia**l ****res**pons**e ****i**s** ****gene**rate**d.'
  id: totrans-233
  prefs: []
  type: TYPE_NORMAL
  zh: '****自**我**反**省**激**励**与**其他**技术，如**思维链**，**不同**，因为它**不**是**专注于**生成**一**步**一**步**的解释**，**而是**在**审**查**已经**做**的**理**由**并**改**进**它**。**虽然**思维链**试图**从**开始**到**结束**引导**思维**过程，**自我反省激励**在**一个**初始**答**案**被**生成**后**应**用**。'
- en: '****Com**pare**d ****t**o** ****F**ew**-****sh**ot** ****Prom**ptin**g , ****wh**ere**
    ****exa**mple**s ****a**re** ****pro**vide**d ****t**o** ****gu**ide** ****t**he**
    ****fo**rma**t ****o**f** ****t**he** ****res**pons**e, ****Se**lf**- ****Refl**ectiv**e
    ****Prom**ptin**g ****foc**use**s ****o**n** ****re**vie**w. ****Th**at** ****i**s**,
    ****t**he** ****fo**cus** ****he**re** ****i**s** ****n**ot** ****o**n** ****prov**idin**g
    ****exa**mple**s, ****b**ut** ****o**n** ****ens**urin**g ****th**at** ****t**he**
    ****mo**del** ****c**an** ****eva**luat**e ****a**nd** ****imp**rov**e ****i**ts**
    ****o**wn** ****res**pons**e.'
  id: totrans-234
  prefs: []
  type: TYPE_NORMAL
  zh: 与**少量**提示**相比**，**其中**提供**例子**来**指导**答**案**的**格式**，**自我反省激励****侧重**于**审**查**。**也就是说**，**这里**的**重点**不是**提供**例子，**而是**确**保**模型**能**够**评**价**并**改**进**它**的**答**案**。
- en: '****Un**lik**e ****Ro**le** ****Pl**ay**, ****wh**ere** ****t**he** ****L**LM**
    ****ass**ume**s ****a**** ****spe**cifi**c ****ro**le**, ****Se**lf**- ****Refl**ectiv**e
    ****Prom**ptin**g ****as**ks** ****t**he** ****mo**del** ****t**o** ****crit**icall**y
    ****eva**luat**e ****wh**at** ****h**as** ****be**en** ****pro**duce**d, ****wit**hou**t
    ****ado**ptin**g ****a**** ****per**son**a. ****Th**is** ****ma**kes** ****th**is**
    ****tech**niqu**e ****effe**ctiv**e ****f**or** ****impr**ovin**g ****acc**urac**y
    ****a**nd** ****cons**istenc**y, ****ra**the**r ****th**an** ****sha**pin**g ****st**yle**
    ****o**r** ****to**ne**.'
  id: totrans-235
  prefs: []
  type: TYPE_NORMAL
  zh: 与**角色扮演**不同，**其中**LLM**承**担**一个**特定**的**角色**，**自我反省激励**要求**模型**对**已**产**生**的**内容**进行**批判性**评**价**，**而不**是**采取**一个**人**的**角**色**。**这使得**这种**技术**对于**提高**准确性和**一致性****有效**，**而**不是**改变**风格**或**语气**。
- en: '[****Exa**mple**s]'
  id: totrans-236
  prefs: []
  type: TYPE_NORMAL
  zh: '[****例**子**]'
