    [AI Bias effects on the responses](toc.xhtml#s137a)    The quote from the following
    blog link states "*ChatGPT''s odds of getting code questions correct are worse
    than a coin flip*"    They analyzed the ChatGPT responses as follows:    *"52
    percent of ChatGPT answers are incorrect and 77 percent are verbose”*    See **[https://www.theregister.com/AMP/2023/08/07/chatgpt_stack_overflow_ai/](https://www.theregister.com/AMP/2023/08/07/chatgpt_stack_overflow_ai/)**    The
    preceding link also describes how the AI response language style is very convincing,
    making even the incorrect responses sound plausible.    The preceding article
    references a research paper available at the following link, which concludes:    “*These
    findings underscore the need for meticulous error correction in ChatGPT while
    also raising awareness among users about the potential risks associated with seemingly
    accurate answers*.”    See **[https://arxiv.org/abs/2308.02312](https://arxiv.org/abs/2308.02312)**    (Or,
    download the paper from **[https://arxiv.org/pdf/2308.02312.pdf](https://arxiv.org/pdf/2308.02312.pdf))**    **Note:**    We
    have used a number of references and free pdf downloads from **arXiv:**    **“***This
    is a community of volunteer authors, readers, moderators, advisory board members,
    supporting members, donors, and third-party collaborators that are supported by
    staff at **Cornell University**.*”    # [ChatGPT taking Jobs from People](toc.xhtml#s138a)    The
    following article lists the 10 jobs most likely to be replaced by AI technology:    **[https://www.businessinsider.com/chatgpt-jobs-at-risk-replacement-artificial-intelligence-ai-labor-trends-2023-02?r=US&IR=T](https://www.businessinsider.com/chatgpt-jobs-at-risk-replacement-artificial-intelligence-ai-labor-trends-2023-02?r=US&IR=T)**    They
    stated the findings of an earlier study, in 2013, by the University of Oxford
    (see: **[https://www.oxfordmartin.ox.ac.uk/downloads/academic/future-of-employment.pdf](https://www.oxfordmartin.ox.ac.uk/downloads/academic/future-of-employment.pdf)).**    This
    study found that 47% of US jobs could be eliminated by AI over the next 20 years.    This
    estimate appears to have been completely revised, so a more recent estimate from
    Goldman Sachs estimated that generative AI tools could impact 300 million full-time
    jobs worldwide! (see: **[https://www.businessinsider.com/generative-ai-chatpgt-300-million-full-time-jobs-goldman-sachs-2023-3](https://www.businessinsider.com/generative-ai-chatpgt-300-million-full-time-jobs-goldman-sachs-2023-3))**    #
    [Building a Custom ChatGPT with Your Own Additional Data](toc.xhtml#s139a)    CodeProject
    AI is a local server-based free Open-Source AI server for any platform and any
    language. It claims to be sandboxed, so does not upload any data. It is self-contained
    with no dependencies, running either as a Windows Service or a Docker container.    For
    further information, you can refer to the following sources:    **CodeProject.AI
    Server**: AI the easy way - CodeProject (3 Aug 2023)    Version 2.1.10\. Our fast,
    free, self-hosted Artificial Intelligence Server for any platform and any language    **[https://www.codeproject.com/Article.aspx?tag=2.NTMyMjU1NzowOjYzODI3MjY1OTkxNDgyNDcyNw&_z=534](https://www.codeproject.com/Article.aspx?tag=2.NTMyMjU1NzowOjYzODI3MjY1OTkxNDgyNDcyNw&_z=534)**    For
    a Docker container, we can run:    docker run -p 32168:32168 --name CodeProject.AI-Server
    -d codeproject/ai-server    Then select the last repo option, using the down arrow
    key and press return:    docker.io/codeproject/ai-server:latest    Using:    **http://localhost:32168**    From
    their website:    *“CodeProject.AI Server is a locally installed, self-hosted,
    fast, free and Open Source Artificial Intelligence server for any platform, any
    language. No off-device or out of network data transfer, no messing around with
    dependencies, and able to be used from any platform, any language. Runs as a Windows
    Service or a Docker container.”*    # [Using AI Transfer Learning](toc.xhtml#s140a)    Transfer
    learning is the term used in AI machine learning to describe the process of reusing
    a pre-trained model on a new problem. In transfer learning, an **AI** program
    uses the knowledge gained from a previous **LLM** model starting point and augments
    it for a new and similar task to generate an improved **LLM** model.    # [IBM
    and Generative AI With Watsonx](toc.xhtml#s141a)    IBM also has collaborations
    with other specialist AI-based companies, and **SingleStore** is active in this
    area:    [https://www.singlestore.com/blog/ibm-data-replication-and-singlestoredb-real-time-applications/?utm_source=thenewstack&utm_medium=website](https://www.singlestore.com/blog/ibm-data-replication-and-singlestoredb-real-time-applications/?utm_source=thenewstack&utm_medium=website)    The
    blog describes the use of the **IBM Data Replication CDC** (Change Data Capture)
    tool and the Cloud-based **SingleStore** system **([https://docs.singlestore.com/managed-service/en/getting-started-with-singlestoredb-cloud.html](https://docs.singlestore.com/managed-service/en/getting-started-with-singlestoredb-cloud.html))**,
    supported by **IBM InfoSphere** Data Replication (**[https://www.ibm.com/products/data-replication](https://www.ibm.com/products/data-replication)**).    The
    SingleStore company’s **About** webpage states:    “A business’ ability to operate
    with true intelligence at speed can be the deciding factor in success or failure.
    SingleStore helps companies deliver value at higher velocity so they can make
    the most of every moment.    SingleStore handles transactions and analytics, effortlessly,
    at the same time. Structured, semi-structured or unstructured. Streaming and historical
    alike. Unified through a single-pane-of-glass experience to make timely, accurate
    insight accessible for every worker and every workload.    Giving you a business
    intelligence ecosystem to develop products and services with real-time analytics,
    machine learning, AI — breaking down data silos that stifle innovation. The pace
    of business is only accelerating.”    # [Security Threats and Privacy Concerns](toc.xhtml#s142a)    There
    is a perceived (and possibly real) issue with the impact of AI systems on personal
    user security and the issue of fraud.    There are several publicized cases of
    AI systems used to simulate a video message using a celebrity (for example, Martin
    Lewis) to fraudulently suggest investments in spoof Financial Institutions.    *   For
    further information, you can refer to the following links: **[https://www.moneysavingexpert.com/news/2023/07/beware-terrifying-new--deepfake--martin-lewis-video-scam-promoti/](https://www.moneysavingexpert.com/news/2023/07/beware-terrifying-new--deepfake--martin-lewis-video-scam-promoti/)**
    *   [https://zapier.com/blog/ai-security-risks/](https://zapier.com/blog/ai-security-risks/)    #
    [Alternative Code Assistant AI Software - ChatGPT Alternatives for Coding Programs
    Automatically](toc.xhtml#s143a)    Here are some alternative code assistant AI
    software options that serve as alternatives to ChatGPT for automatically coding
    programs:    # [Llama 2 code AI free use](toc.xhtml#s144a)    **Code Llama** is
    a programming language **AI** version of **Llama 2,** introduced by **Meta** (formerly,
    **Facebook** Inc., co-founded by **Mark Zuckerberg**). The **Llama 2, Code Llama**
    system (**[https://ai.meta.com/llama/](https://ai.meta.com/llama/))**, was created
    by using **Llama 2** as the starting **LLM** (large Language Model), with Meta’s
    code-specific datasets and by training more code-based data    (**Llama 2** Version
    Release Date: July 18, 2023).    **Code Llama**, built on top of **Llama 2**,
    has enhanced coding capabilities. It generates program code and describes the
    code produced using an input of program code and the normal prompts (e.g., “Have
    you got a Java program for demonstrating the Binary Search algorithm?”).    It
    can also be used for code syntax checking, code completion, and debugging. Some
    of the key features of **Code Llama** are as follows:    *   Allows commercial
    use *   Uses a 4096 default context window (can be expanded) (Context length refers
    to the number of tokens a language model can process as input for a response.
    LLMs process text by breaking it down into tokens and average 4 characters with
    many words being a single token). *   Trained on 2 trillion tokens of text data
    *   The 70B model uses the grouped-query attention (GQA) architecture *   Available
    on Hugging Face Hub    **Note:**    **Perplexity** has both the 7B and 13B LLaMA
    2 models accessible through the conversational AI demo.    **Code Llama** supports
    most of the common modern programming languages, including Java, Python, C++,
    C#, PHP, JavaScript, and Linux Bash script.    For more information, please refer
    to “Introducing Code Llama, a state-of-the-art large language model for coding
    (meta.com)”    **[https://ai.meta.com/blog/code-llama-large-language-model-coding/](https://ai.meta.com/blog/code-llama-large-language-model-coding/)**    The
    **Llama2** **LLM** models can be downloaded locally, as shown in *[Figure 12.1](#fig12_1):*    **[https://ai.meta.com/llama/](https://ai.meta.com/llama/)**  ![](images/Figure12.1.jpg)  **Figure
    12.1:** Download the Model button is selected to load the Llama 2 LLM models    The
    next Meta webpage displays the form to be filled to get the required access, as
    shown in *[Figure 12.2](#fig12_2):*  ![](images/Figure12.2.jpg)  **Figure 12.2:**
    **Meta Llama 2** form to be filled in to get the required access to the LLMs    Next,
    we select the **LLM** models we can use, as shown in *[Figure 12.3](#fig12_3):*  ![](images/Figure12.3.jpg)  **Figure
