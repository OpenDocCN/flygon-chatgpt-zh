  type: TYPE_NORMAL
  zh: chartObj.Chart.ChartTitle.Text = "按地区和产品销售"
- en: ''' Format the PivotChart'
  id: totrans-1682
  prefs: []
  type: TYPE_NORMAL
  zh: ''' 格式化PivotChart'
- en: chartObj.Chart.Axes(xlCategory).TickLabels.Orientation = xlUpward
  id: totrans-1683
  prefs: []
  type: TYPE_NORMAL
  zh: chartObj.Chart.Axes(xlCategory).TickLabels.Orientation = xlUpward
- en: chartObj.Chart.ApplyLayout 4
  id: totrans-1684
  prefs: []
  type: TYPE_NORMAL
  zh: chartObj.Chart.ApplyLayout 4
- en: chartObj.Chart.ChartStyle = 2
  id: totrans-1685
  prefs: []
  type: TYPE_NORMAL
  zh: chartObj.Chart.ChartStyle = 2
- en: End Sub
  id: totrans-1686
  prefs: []
  type: TYPE_NORMAL
  zh: End Sub
- en: 'Steps to Add VBA Code:'
  id: totrans-1687
  prefs: []
  type: TYPE_NORMAL
  zh: 添加VBA代码的步骤：
- en: '1 Open VBA Editor: Press Alt + F11 to open the VBA Editor.'
  id: totrans-1688
  prefs: []
  type: TYPE_NORMAL
  zh: 1 打开VBA编辑器：按Alt + F11打开VBA编辑器。
- en: '2 Insert Module: Go to "Insert" > "Module" to create a new module.'
  id: totrans-1689
  prefs: []
  type: TYPE_NORMAL
  zh: 2 插入模块：转到“插入”>“模块”以创建一个新的模块。
- en: '3 Enter Code: Copy and paste the provided VBA code into the module.'
  id: totrans-1690
  prefs: []
  type: TYPE_NORMAL
  zh: 3 输入代码：将提供的VBA代码复制并粘贴到模块中。
- en: '4 Run the Macro: Close the VBA Editor and run the macro by pressing Alt + F8,
    selecting "CreatePivotChart," and clicking "Run."'
  id: totrans-1691
  prefs: []
  type: TYPE_NORMAL
  zh: 运行宏：关闭VBA编辑器，通过按Alt + F8，选择“CreatePivotChart”，然后点击“运行”来运行宏。
- en: This macro creates a PivotTable that summarizes sales data by region and product
    and then creates a clustered column PivotChart based on that PivotTable.
  id: totrans-1692
  prefs: []
  type: TYPE_NORMAL
  zh: 此宏创建了一个按地区和产品汇总销售数据的PivotTable，然后基于该PivotTable创建了一个簇状柱形PivotChart。
- en: Integrating Automation into Your Workflow
  id: totrans-1693
  prefs: []
  type: TYPE_NORMAL
  zh: Integrating Automation into Your Workflow
- en: 'Integrating automated PivotTable and PivotChart creation into your workflow
    can improve efficiency and consistency in your reporting processes. Here are some
    best practices to consider:'
  id: totrans-1694
  prefs: []
  type: TYPE_NORMAL
  zh: 将自动化的PivotTable和PivotChart创建集成到你的工作流程中可以提高报告过程的效率和一致性。以下是一些值得考虑的最佳实践：
- en: '1 Centralize Data Sources: Ensure your data is centralized and easily accessible
    to simplify the automation process.'
  id: totrans-1695
  prefs: []
  type: TYPE_NORMAL
  zh: 1 集中数据源：确保你的数据是集中的并且易于访问，以简化自动化过程。
- en: '2 Modularize VBA Code: Break down complex automation tasks into smaller, reusable
    VBA procedures to make your code easier to manage and debug.'
  id: totrans-1696
  prefs: []
  type: TYPE_NORMAL
  zh: 2 模块化VBA代码：将复杂的自动化任务分解成更小、可重用的VBA过程，以使代码更容易管理和调试。
- en: '3 Use Dynamic Ranges: Use dynamic named ranges or VBA code to handle varying
    data sizes automatically.'
  id: totrans-1697
  prefs: []
  type: TYPE_NORMAL
  zh: 3 使用动态范围：使用动态命名范围或 VBA 代码来自动处理变化的数据大小。
- en: '4 Schedule Macros: Use Windows Task Scheduler or other automation tools to
    run your VBA macros at scheduled times, ensuring your reports are always up-to-date.'
  id: totrans-1698
  prefs: []
  type: TYPE_NORMAL
  zh: 4 安排宏：使用 Windows 任务计划程序或其他自动化工具在预定时间运行 VBA 宏，确保报告始终保持最新状态。
- en: '5 Document Your Code: Add comments to your VBA code to explain each step and
    make it easier for others (or yourself) to understand and maintain in the future.'
  id: totrans-1699
  prefs: []
  type: TYPE_NORMAL
  zh: 5 记录代码文档：在 VBA 代码中添加注释以解释每一步，使其他人（或你自己）在未来更容易理解和维护。
- en: By automating the creation of PivotTables and PivotCharts with VBA and leveraging
    the guidance from ChatGPT, you can streamline your data analysis process, reduce
    manual effort, and enhance the consistency and accuracy of your reports. The next
    sections will cover additional advanced features and techniques to further enhance
    your Excel proficiency.
  id: totrans-1700
  prefs: []
  type: TYPE_NORMAL
  zh: 通过使用 VBA 自动创建数据透视表和数据透视图，并利用 ChatGPT 的指导，您可以简化数据分析过程，减少人工工作量，并提高报告的一致性和准确性。下一节将介绍更多高级功能和技巧，以进一步提高您的
    Excel 熟练程度。
- en: '![](image_rsrc2U3.jpg)'
  id: totrans-1701
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrc2U3.jpg)'
- en: CHAPTER 10
  id: totrans-1702
  prefs: []
  type: TYPE_NORMAL
  zh: 第 10 章
- en: OPTIMIZING EXCEL PERFORMANCE
  id: totrans-1703
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 优化 EXCEL 性能
- en: '![](image_rsrc2U2.jpg)'
  id: totrans-1704
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrc2U2.jpg)'
- en: TIPS FOR IMPROVING WORKBOOK PERFORMANCE
  id: totrans-1705
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 提高工作簿性能的技巧
- en: Optimizing the performance of your Excel workbooks is crucial, especially when
    dealing with large datasets or complex calculations. Poorly designed workbooks
    can slow down your workflow, increase the risk of errors, and lead to frustration.
    This section provides practical tips and best practices to enhance the performance
    of your Excel workbooks, ensuring they run smoothly and efficiently.
  id: totrans-1706
  prefs: []
  type: TYPE_NORMAL
  zh: 优化 Excel 工作簿的性能至关重要，尤其是在处理大型数据集或复杂计算时。设计不良的工作簿可能会减慢你的工作流程，增加错误的风险，并导致沮丧。本节提供了实用的技巧和最佳实践，以增强
    Excel 工作簿的性能，确保它们运行顺畅且高效。
- en: Use Efficient Formulas
  id: totrans-1707
  prefs: []
  type: TYPE_NORMAL
  zh: 使用高效公式
- en: '1 Avoid Volatile Functions:'
  id: totrans-1708
  prefs: []
  type: TYPE_NORMAL
  zh: 1 避免使用易变函数：
- en: ◦ Volatile functions, such as NOW(), TODAY(), RAND(), OFFSET(), and INDIRECT(),
    recalculate every time a change is made, which can slow down your workbook. Use
    them sparingly.
  id: totrans-1709
  prefs: []
  type: TYPE_NORMAL
  zh: ◦ 易变函数，如 NOW()、TODAY()、RAND()、OFFSET() 和 INDIRECT()，每次更改时都会重新计算，这可能会减慢工作簿的运行速度。请谨慎使用。
- en: '◦ Alternative: Use static values or less volatile functions where possible.'
  id: totrans-1710
  prefs: []
  type: TYPE_NORMAL
  zh: ◦ 替代方案：尽可能使用静态值或不太易变的函数。
- en: '2 Minimize Array Formulas:'
  id: totrans-1711
  prefs: []
  type: TYPE_NORMAL
  zh: 2 最小化数组公式：
- en: ◦ Array formulas can be powerful but resource-intensive. Limit their use to
    when they are truly necessary.
  id: totrans-1712
  prefs: []
  type: TYPE_NORMAL
  zh: ◦ 数组公式可能很强大，但资源密集。仅在其真正必要时使用。
- en: '◦ Alternative: Break complex array formulas into simpler, individual formulas.'
  id: totrans-1713
  prefs: []
  type: TYPE_NORMAL
  zh: ◦ 替代方案：将复杂的数组公式分解成更简单、独立的公式。
- en: '3 Use SUMIFS, COUNTIFS, and AVERAGEIFS Instead of Array Formulas:'
  id: totrans-1714
  prefs: []
  type: TYPE_NORMAL
  zh: 3 使用 SUMIFS、COUNTIFS 和 AVERAGEIFS 而不是数组公式：
- en: ◦ These functions are optimized for performance and can often replace complex
    array formulas.
  id: totrans-1715
  prefs: []
  type: TYPE_NORMAL
  zh: ◦ 这些函数针对性能进行了优化，并且通常可以替换复杂的数组公式。
- en: '4 Reduce the Use of Nested IF Statements:'
  id: totrans-1716
  prefs: []
  type: TYPE_NORMAL
  zh: 4 减少嵌套 IF 语句的使用：
- en: ◦ Nested IF statements can be replaced with more efficient functions such as
    CHOOSE() or LOOKUP().
  id: totrans-1717
  prefs: []
  type: TYPE_NORMAL
  zh: ◦ 可以用更高效的函数如 CHOOSE() 或 LOOKUP() 替换嵌套的 IF 语句。
- en: 'Example: Instead of using nested IFs:'
  id: totrans-1718
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：不要使用嵌套的 IF 语句：
- en: =IF(A1=1, "One", IF(A1=2, "Two", IF(A1=3, "Three", "Other")))
  id: totrans-1719
  prefs: []
  type: TYPE_NORMAL
  zh: =IF(A1=1, "One", IF(A1=2, "Two", IF(A1=3, "Three", "Other")))
- en: 'Use CHOOSE:'
  id: totrans-1720
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 CHOOSE：
- en: =CHOOSE(A1, "One", "Two", "Three", "Other")
  id: totrans-1721
  prefs: []
  type: TYPE_NORMAL
  zh: =CHOOSE(A1, "One", "Two", "Three", "Other")
- en: Optimize Data Ranges
  id: totrans-1722
  prefs: []
  type: TYPE_NORMAL
  zh: 优化数据范围
- en: '1 Use Dynamic Named Ranges:'
  id: totrans-1723
  prefs: []
  type: TYPE_NORMAL
  zh: 1 使用动态命名范围：
- en: ◦ Dynamic named ranges automatically adjust as your data changes, which can
    improve performance and reduce the need for constant updates to ranges in your
    formulas.
  id: totrans-1724
  prefs: []
  type: TYPE_NORMAL
  zh: ◦ 动态命名范围会随着数据的变化自动调整，这可以提高性能并减少公式中范围需要不断更新的需求。
- en: '◦ Example:'
  id: totrans-1725
  prefs: []
  type: TYPE_NORMAL
  zh: ◦ 示例：
- en: =OFFSET(Sheet1!$A$1, 0, 0, COUNTA(Sheet1!$A:$A), 1)
  id: totrans-1726
  prefs: []
  type: TYPE_NORMAL
  zh: =OFFSET(Sheet1!$A$1, 0, 0, COUNTA(Sheet1!$A:$A), 1)
- en: '1 Limit the Use of Entire Column/Row References:'
  id: totrans-1727
  prefs: []
  type: TYPE_NORMAL
  zh: 1 限制整个列/行的引用使用：
- en: ◦ Referencing entire columns or rows can slow down calculations. Instead, specify
    the exact range.
  id: totrans-1728
  prefs: []
  type: TYPE_NORMAL
  zh: ◦ 引用整个列或行可能会减慢计算速度。相反，指定确切的范围。
- en: '◦ Example: Use A1:A100 instead of A:A.'
  id: totrans-1729
  prefs: []
  type: TYPE_NORMAL
  zh: ◦ 示例：使用 A1:A100 而不是 A:A。
- en: Streamline Data Layout
  id: totrans-1730
  prefs: []
  type: TYPE_NORMAL
  zh: 简化数据布局
- en: '1 Normalize Data:'
  id: totrans-1731
  prefs: []
  type: TYPE_NORMAL
  zh: 1 规范化数据：
- en: ◦ Organize data in a flat, tabular format rather than a hierarchical or nested
    structure. This simplifies formulas and reduces calculation time.
  id: totrans-1732
  prefs: []
  type: TYPE_NORMAL
  zh: ◦ 以平面、表格格式组织数据，而不是层次结构或嵌套结构。这简化了公式并减少了计算时间。
- en: '2 Remove Unnecessary Formatting:'
  id: totrans-1733
  prefs: []
  type: TYPE_NORMAL
  zh: 2 删除不必要的格式：
- en: ◦ Excessive formatting (e.g., conditional formatting, cell borders, and colors)
    can slow down your workbook. Keep formatting minimal and necessary.
  id: totrans-1734
  prefs: []
  type: TYPE_NORMAL
  zh: ◦ 过度的格式化（例如，条件格式化、单元格边框和颜色）可能会减慢你的工作簿。保持格式化最小化和必要。
- en: Efficient Use of Tables and PivotTables
  id: totrans-1735
  prefs: []
  type: TYPE_NORMAL
  zh: 高效使用表格和数据透视表
- en: '1 Use Excel Tables:'
  id: totrans-1736
  prefs: []
  type: TYPE_NORMAL
  zh: 1 使用 Excel 表格：
- en: ◦ Excel tables automatically adjust to include new data, which reduces the need
    for manual updates and improves performance.
  id: totrans-1737
  prefs: []
  type: TYPE_NORMAL
  zh: ◦ Excel 表格会自动调整以包含新数据，从而减少手动更新的需求并提高性能。
- en: '◦ Example: Convert a range to a table by selecting the range and pressing Ctrl
    + T.'
  id: totrans-1738
  prefs: []
  type: TYPE_NORMAL
  zh: ◦ 示例：通过选择范围并按 Ctrl + T 将范围转换为表格。
- en: '2 Optimize PivotTables:'
  id: totrans-1739
  prefs: []
  type: TYPE_NORMAL
  zh: 2 优化数据透视表：
- en: ◦ Refresh PivotTables manually or on-demand rather than automatically.
  id: totrans-1740
  prefs: []
  type: TYPE_NORMAL
  zh: ◦ 手动或按需刷新数据透视表，而不是自动刷新。
- en: ◦ Limit the use of complex calculations in PivotTables.
  id: totrans-1741
  prefs: []
  type: TYPE_NORMAL
  zh: ◦ 限制在数据透视表中使用复杂计算。
- en: 'Example: To refresh PivotTables manually, go to the PivotTable Tools ribbon
    and click "Refresh."'
  id: totrans-1742
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：要手动刷新数据透视表，请转到数据透视表工具栏并单击“刷新”。
- en: Control Workbook Calculation Settings
  id: totrans-1743
  prefs: []
  type: TYPE_NORMAL
  zh: 控制工作簿计算设置
- en: '1 Adjust Calculation Mode:'
  id: totrans-1744
  prefs: []
  type: TYPE_NORMAL
  zh: 1 调整计算模式：
- en: ◦ Set the workbook to manual calculation mode to avoid constant recalculations
    during data entry or changes.
  id: totrans-1745
  prefs: []
  type: TYPE_NORMAL
  zh: ◦ 将工作簿设置为手动计算模式，以避免在数据输入或更改期间进行持续重新计算。
- en: '◦ Steps:'
  id: totrans-1746
  prefs: []
  type: TYPE_NORMAL
  zh: ◦ 步骤：
- en: ▪ Go to "Formulas" > "Calculation Options" > "Manual".
  id: totrans-1747
  prefs: []
  type: TYPE_NORMAL
  zh: ▪ 转到“公式” > “计算选项” > “手动”。
- en: ▪ Press F9 to calculate the workbook when needed.
  id: totrans-1748
  prefs: []
  type: TYPE_NORMAL
  zh: ▪ 在需要时按 F9 计算工作簿。
- en: '2 Use Calculation Options Efficiently:'
  id: totrans-1749
  prefs: []
  type: TYPE_NORMAL
  zh: 2 高效使用计算选项：
- en: ◦ Consider using "Automatic Except for Data Tables" if you have many data tables
    that slow down calculations.
  id: totrans-1750
  prefs: []
  type: TYPE_NORMAL
  zh: ◦ 如果你有很多数据表会减慢计算，请考虑使用“自动（除数据表外）”。
- en: Manage External Links and Data Connections
  id: totrans-1751
  prefs: []
  type: TYPE_NORMAL
  zh: 管理外部链接和数据连接
- en: '1 Limit External Links:'
  id: totrans-1752
  prefs: []
  type: TYPE_NORMAL
  zh: 1 限制外部链接：
- en: ◦ External links can slow down workbook performance. Consolidate data within
    the workbook where possible.
  id: totrans-1753
  prefs: []
  type: TYPE_NORMAL
  zh: ◦ 外部链接可能会减慢工作簿的性能。尽可能在工作簿内合并数据。
- en: '◦ Alternative: Use Power Query to import and transform data from external sources.'
  id: totrans-1754
  prefs: []
  type: TYPE_NORMAL
  zh: ◦ 替代方案：使用 Power Query 从外部源导入和转换数据。
- en: '2 Optimize Data Connections:'
  id: totrans-1755
  prefs: []
  type: TYPE_NORMAL
  zh: 2 优化数据连接：
- en: ◦ Refresh data connections only when necessary and during off-peak times to
    avoid performance bottlenecks.
  id: totrans-1756
  prefs: []
  type: TYPE_NORMAL
  zh: ◦ 仅在必要时和在高峰时段之外刷新数据连接，以避免性能瓶颈。
- en: 'Example: To set data connections to refresh on demand, go to "Data" > "Queries
    & Connections" > "Properties" and uncheck "Enable background refresh".'
  id: totrans-1757
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：要将数据连接设置为按需刷新，请转到“数据” > “查询与连接” > “属性”并取消选中“启用后台刷新”。
- en: Reduce Workbook Size
  id: totrans-1758
  prefs: []
  type: TYPE_NORMAL
  zh: 减少工作簿大小
- en: '1 Remove Unused Worksheets and Data:'
  id: totrans-1759
  prefs: []
  type: TYPE_NORMAL
  zh: 1 删除未使用的电子表格和数据：
- en: ◦ Delete any worksheets, data ranges, or cells that are no longer needed.
  id: totrans-1760
  prefs: []
  type: TYPE_NORMAL
  zh: ◦ 删除任何不再需要的电子表格、数据范围或单元格。
- en: '2 Clear Excess Formatting:'
  id: totrans-1761
  prefs: []
  type: TYPE_NORMAL
  zh: 2 清除多余格式化：
- en: ◦ Excess formatting beyond the used range can increase file size. Use Ctrl +
    End to identify the last used cell and clear formatting beyond this point.
  id: totrans-1762
  prefs: []
  type: TYPE_NORMAL
  zh: ◦ 超出使用范围的额外格式化会增加文件大小。使用 Ctrl + End 识别最后一个使用的单元格并清除此点之后的格式化。
- en: '◦ Steps:'
  id: totrans-1763
  prefs: []
  type: TYPE_NORMAL
  zh: ◦ 步骤：
- en: ▪ Select the unused range and right-click > "Clear Contents".
  id: totrans-1764
  prefs: []
  type: TYPE_NORMAL
  zh: ▪ 选择未使用的范围，右键单击 > “清除内容”。
- en: ▪ Go to "Home" > "Editing" > "Clear" > "Clear Formats".
  id: totrans-1765
  prefs: []
  type: TYPE_NORMAL
  zh: ▪ 转到“开始” > “编辑” > “清除” > “清除格式”。
- en: '3 Compress Images:'
  id: totrans-1766
  prefs: []
  type: TYPE_NORMAL
  zh: 3 压缩图片：
- en: ◦ Compress images and graphics within the workbook to reduce file size.
  id: totrans-1767
  prefs: []
  type: TYPE_NORMAL
  zh: ◦ 压缩工作簿内的图片和图形以减小文件大小。
- en: '◦ Steps:'
  id: totrans-1768
  prefs: []
  type: TYPE_NORMAL
  zh: ◦ 步骤：
- en: ▪ Select the image, go to "Picture Tools" > "Format" > "Compress Pictures".
  id: totrans-1769
  prefs: []
  type: TYPE_NORMAL
  zh: ▪ 选择图片，转到“图片工具” > “格式” > “压缩图片”。
- en: VBA Optimization
  id: totrans-1770
  prefs: []
  type: TYPE_NORMAL
  zh: VBA 优化
- en: '1 Disable Screen Updating:'
  id: totrans-1771
  prefs: []
  type: TYPE_NORMAL
  zh: 1 禁用屏幕更新：
- en: ◦ Turning off screen updating while running VBA code can significantly speed
    up macro execution.
  id: totrans-1772
  prefs: []
  type: TYPE_NORMAL
  zh: ◦ 在运行 VBA 代码时关闭屏幕更新可以显著加快宏执行速度。
- en: '◦ Example:'
  id: totrans-1773
  prefs: []
  type: TYPE_NORMAL
  zh: ◦ 示例：
- en: Application.ScreenUpdating = False
  id: totrans-1774
  prefs: []
  type: TYPE_NORMAL
  zh: Application.ScreenUpdating = False
- en: ''' Your code here'
  id: totrans-1775
  prefs: []
  type: TYPE_NORMAL
  zh: ''' 在此处编写你的代码'
- en: Application.ScreenUpdating = True
  id: totrans-1776
  prefs: []
  type: TYPE_NORMAL
  zh: Application.ScreenUpdating = True
- en: 'Disable Automatic Calculations in VBA:'
  id: totrans-1777
  prefs: []
  type: TYPE_NORMAL
  zh: 在 VBA 中禁用自动计算：
- en: • Turn off automatic calculations during macro execution and turn it back on
    afterward.
  id: totrans-1778
  prefs: []
  type: TYPE_NORMAL
  zh: • 在宏执行期间关闭自动计算，之后再打开。
- en: '• Example:'
  id: totrans-1779
  prefs: []
  type: TYPE_NORMAL
  zh: • 示例：
- en: Application.Calculation = xlCalculationManual
  id: totrans-1780
  prefs: []
  type: TYPE_NORMAL
  zh: Application.Calculation = xlCalculationManual
- en: ''' Your code here'
  id: totrans-1781
  prefs: []
  type: TYPE_NORMAL
  zh: ''' 在此处编写你的代码'
- en: Application.Calculation = xlCalculationAutomatic
  id: totrans-1782
  prefs: []
  type: TYPE_NORMAL
  zh: Application.Calculation = xlCalculationAutomatic
- en: 'Avoid Select and Activate:'
  id: totrans-1783
  prefs: []
  type: TYPE_NORMAL
  zh: 避免选择和激活：
- en: • Directly reference ranges and cells instead of using Select and Activate.
  id: totrans-1784
  prefs: []
  type: TYPE_NORMAL
  zh: • 直接引用范围和单元格，而不是使用选择和激活。
- en: • Example
  id: totrans-1785
  prefs: []
  type: TYPE_NORMAL
  zh: • 示例
- en: ''' Instead of'
  id: totrans-1786
  prefs: []
  type: TYPE_NORMAL
  zh: ''' 替换为'
- en: Sheets("Sheet1").Select
  id: totrans-1787
  prefs: []
  type: TYPE_NORMAL
  zh: Sheets("Sheet1").Select
- en: Range("A1").Select
  id: totrans-1788
  prefs: []
  type: TYPE_NORMAL
  zh: Range("A1").Select
- en: Selection.Value = "Hello"
  id: totrans-1789
  prefs: []
  type: TYPE_NORMAL
  zh: Selection.Value = "Hello"
- en: ''' Use'
  id: totrans-1790
  prefs: []
  type: TYPE_NORMAL
  zh: ''' 使用'
- en: Sheets("Sheet1").Range("A1").Value = "Hello"
  id: totrans-1791
  prefs: []
  type: TYPE_NORMAL
  zh: Sheets("Sheet1").Range("A1").Value = "Hello"
- en: Regular Maintenance
  id: totrans-1792
  prefs: []
  type: TYPE_NORMAL
  zh: 定期维护
- en: '1 Regularly Check for Errors and Inconsistencies:'
  id: totrans-1793
  prefs: []
  type: TYPE_NORMAL
  zh: 1 定期检查错误和不一致性：
- en: ◦ Use the "Error Checking" tool to identify and correct errors.
  id: totrans-1794
  prefs: []
  type: TYPE_NORMAL
  zh: ◦ 使用“错误检查”工具来识别和纠正错误。
- en: '◦ Steps:'
  id: totrans-1795
  prefs: []
  type: TYPE_NORMAL
  zh: ◦ 步骤：
- en: ▪ Go to "Formulas" > "Error Checking".
  id: totrans-1796
  prefs: []
  type: TYPE_NORMAL
  zh: ▪ 转到“公式”>“错误检查”。
- en: '2 Perform Workbook Audits:'
  id: totrans-1797
  prefs: []
  type: TYPE_NORMAL
  zh: 2 执行工作簿审核：
- en: ◦ Periodically review and audit your workbooks for performance bottlenecks and
    areas for improvement.
  id: totrans-1798
  prefs: []
  type: TYPE_NORMAL
  zh: ◦ 定期审查和审核工作簿以查找性能瓶颈和改进区域。
- en: '3 Update Excel and Add-ins:'
  id: totrans-1799
  prefs: []
  type: TYPE_NORMAL
  zh: 3 更新 Excel 和附加组件：
- en: ◦ Keep Excel and any add-ins up to date to benefit from performance improvements
    and bug fixes.
  id: totrans-1800
  prefs: []
  type: TYPE_NORMAL
  zh: ◦ 保持 Excel 和任何附加组件的最新状态，以从性能改进和错误修复中受益。
- en: By implementing these tips, you can significantly enhance the performance of
    your Excel workbooks, ensuring they run efficiently and effectively, even with
    large datasets and complex calculations. The next sections will cover additional
    advanced features and techniques to further enhance your Excel proficiency.
  id: totrans-1801
  prefs: []
  type: TYPE_NORMAL
  zh: 通过实施这些技巧，您可以显著提高 Excel 工作簿的性能，确保它们即使在处理大量数据和复杂计算时也能高效有效地运行。下一节将介绍更多高级功能和技巧，以进一步提高您的
    Excel 熟练程度。
- en: MANAGING LARGE DATASETS EFFICIENTLY
  id: totrans-1802
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 高效管理大量数据集
- en: Handling large datasets in Excel can be challenging due to performance issues
    and complexity in data management. However, with the right techniques and tools,
    you can efficiently manage and analyze large volumes of data. This section provides
    practical tips and best practices for managing large datasets in Excel, ensuring
    smooth performance and accurate analysis.
  id: totrans-1803
  prefs: []
  type: TYPE_NORMAL
  zh: 在 Excel 中处理大量数据集可能会因为性能问题和数据管理的复杂性而具有挑战性。然而，通过使用正确的技术和工具，您可以高效地管理和分析大量数据。本节提供了在
    Excel 中管理大量数据集的实用技巧和最佳实践，以确保平稳的性能和准确的分析。
- en: Organizing Data
  id: totrans-1804
  prefs: []
  type: TYPE_NORMAL
  zh: 组织数据
- en: '1 Use Excel Tables:'
  id: totrans-1805
  prefs: []
  type: TYPE_NORMAL
  zh: 1 使用 Excel 表格：
- en: ◦ Convert your data range into an Excel Table to take advantage of features
    like automatic filtering, sorting, and structured references.
  id: totrans-1806
  prefs: []
  type: TYPE_NORMAL
  zh: ◦ 将您的数据范围转换为 Excel 表格，以利用自动筛选、排序和结构化引用等功能。
- en: '◦ Steps:'
  id: totrans-1807
  prefs: []
  type: TYPE_NORMAL
  zh: ◦ 步骤：
- en: ▪ Select your data range and press Ctrl + T to create a table.
  id: totrans-1808
  prefs: []
  type: TYPE_NORMAL
  zh: ▪ 选择您的数据范围并按 Ctrl + T 创建表格。
- en: '◦ Benefits: Tables automatically expand as you add new data, and they make
    your formulas more readable and easier to manage.'
  id: totrans-1809
  prefs: []
  type: TYPE_NORMAL
  zh: ◦ 利益：表格会随着您添加新数据而自动扩展，并且它们使您的公式更易于阅读和管理。
- en: '2 Avoid Merged Cells:'
  id: totrans-1810
  prefs: []
  type: TYPE_NORMAL
  zh: 2 避免使用合并单元格：
- en: ◦ Merged cells can cause issues with sorting, filtering, and referencing. Use
    cell alignment and formatting instead of merging cells.
  id: totrans-1811
  prefs: []
  type: TYPE_NORMAL
  zh: ◦ 合并单元格可能会引起排序、筛选和引用的问题。使用单元格对齐和格式化而不是合并单元格。
- en: '3 Use Named Ranges:'
  id: totrans-1812
  prefs: []
  type: TYPE_NORMAL
  zh: 3 使用命名范围：
- en: ◦ Named ranges can make your formulas easier to read and manage. They also help
    in avoiding errors when referencing large datasets.
  id: totrans-1813
  prefs: []
  type: TYPE_NORMAL
  zh: ◦ 命名范围可以使您的公式更容易阅读和管理。它们还有助于在引用大量数据集时避免错误。
- en: '◦ Steps:'
  id: totrans-1814
  prefs: []
  type: TYPE_NORMAL
  zh: ◦ 步骤：
- en: ▪ Select the range, go to the "Formulas" tab, and click "Define Name."
  id: totrans-1815
  prefs: []
  type: TYPE_NORMAL
  zh: ▪ 选择范围，转到“公式”选项卡，然后单击“定义名称。”
- en: Optimizing Formulas and Functions
  id: totrans-1816
  prefs: []
  type: TYPE_NORMAL
  zh: 优化公式和函数
- en: '1 Use Efficient Formulas:'
  id: totrans-1817
  prefs: []
  type: TYPE_NORMAL
  zh: 1 使用高效公式：
- en: ◦ Avoid using volatile functions (e.g., NOW(), TODAY(), RAND()) excessively,
    as they recalculate every time the worksheet changes.
  id: totrans-1818
  prefs: []
  type: TYPE_NORMAL
  zh: ◦ 避免过度使用易变函数（例如 NOW()、TODAY()、RAND()），因为它们会在工作表更改时重新计算。
- en: ◦ Use SUMIFS, COUNTIFS, and AVERAGEIFS instead of array formulas for better
    performance.
  id: totrans-1819
  prefs: []
  type: TYPE_NORMAL
  zh: ◦ 使用 SUMIFS、COUNTIFS 和 AVERAGEIFS 而不是数组公式以获得更好的性能。
- en: '2 Break Down Complex Formulas:'
  id: totrans-1820
  prefs: []
  type: TYPE_NORMAL
  zh: 2 分解复杂公式：
- en: ◦ Simplify complex formulas by breaking them into smaller, intermediate steps.
    This makes troubleshooting easier and can improve performance.
  id: totrans-1821
  prefs: []
  type: TYPE_NORMAL
  zh: ◦ 通过将复杂公式分解为更小的中间步骤来简化公式。这使得故障排除更容易，并可能提高性能。
- en: '3 Minimize the Use of Conditional Formatting:'
  id: totrans-1822
  prefs: []
  type: TYPE_NORMAL
  zh: 3 最小化使用条件格式化：
- en: ◦ Extensive use of conditional formatting can slow down your workbook. Apply
    it only where necessary and avoid applying it to entire columns or rows.
  id: totrans-1823
  prefs: []
  type: TYPE_NORMAL
  zh: ◦ 过度使用条件格式化可能会减慢工作簿的性能。仅在必要时应用，并避免将其应用于整个列或行。
- en: Efficient Data Processing
  id: totrans-1824
  prefs: []
  type: TYPE_NORMAL
  zh: 高效数据处理
- en: '1 Use Power Query:'
  id: totrans-1825
  prefs: []
  type: TYPE_NORMAL
  zh: 1 使用 Power Query：
- en: ◦ Power Query is a powerful tool for importing, cleaning, and transforming data.
    It is especially useful for handling large datasets efficiently.
  id: totrans-1826
  prefs: []
  type: TYPE_NORMAL
  zh: ◦ Power Query 是一个强大的工具，用于导入、清理和转换数据。它特别适用于高效处理大量数据集。
- en: '◦ Steps:'
  id: totrans-1827
  prefs: []
  type: TYPE_NORMAL
  zh: ◦ 步骤：
- en: ▪ Go to the "Data" tab, click "Get Data," and choose your data source.
  id: totrans-1828
  prefs: []
  type: TYPE_NORMAL
  zh: ▪ 转到“数据”选项卡，单击“获取数据”，然后选择您的数据源。
- en: ▪ Use the Power Query Editor to apply transformations and load the data into
    Excel.
  id: totrans-1829
  prefs: []
  type: TYPE_NORMAL
  zh: ▪ 使用 Power Query 编辑器应用转换并将数据加载到 Excel 中。
- en: '2 Aggregate Data:'
  id: totrans-1830
  prefs: []
  type: TYPE_NORMAL
  zh: 2 聚合数据：
- en: ◦ Summarize and aggregate your data to reduce the volume you need to work with.
    Use PivotTables or summary statistics to analyze large datasets without processing
    every individual data point.
  id: totrans-1831
  prefs: []
  type: TYPE_NORMAL
  zh: ◦ 概括和汇总您的数据以减少您需要处理的数据量。使用数据透视表或汇总统计来分析大型数据集，而无需处理每个单独的数据点。
- en: '◦ Steps:'
  id: totrans-1832
  prefs: []
  type: TYPE_NORMAL
  zh: ◦ 步骤：
- en: ▪ Select your data range, go to the "Insert" tab, and click "PivotTable."
  id: totrans-1833
  prefs: []
  type: TYPE_NORMAL
  zh: ▪ 选择您的数据范围，转到 "插入" 选项卡，并点击 "数据透视表"。
- en: '3 Filter and Sort Data:'
  id: totrans-1834
  prefs: []
  type: TYPE_NORMAL
  zh: 3 过滤和排序数据：
- en: ◦ Use filters and sorting to focus on specific subsets of your data. This can
    help you work more efficiently by reducing the amount of data you need to process
    at once.
  id: totrans-1835
  prefs: []
  type: TYPE_NORMAL
  zh: ◦ 使用筛选和排序来关注您数据的具体子集。这可以通过减少您一次需要处理的数据量来帮助您更有效地工作。
- en: '◦ Steps:'
  id: totrans-1836
  prefs: []
  type: TYPE_NORMAL
  zh: ◦ 步骤：
- en: ▪ Select your data range, go to the "Data" tab, and apply filters or sorting.
  id: totrans-1837
  prefs: []
  type: TYPE_NORMAL
  zh: ▪ 选择您的数据范围，转到 "数据" 选项卡，并应用筛选或排序。
- en: Managing Memory and Performance
  id: totrans-1838
  prefs: []
  type: TYPE_NORMAL
  zh: 管理内存和性能
- en: '1 Limit Data Range References:'
  id: totrans-1839
  prefs: []
  type: TYPE_NORMAL
  zh: 1 限制数据范围引用：
- en: ◦ Avoid referencing entire columns or rows in your formulas. Instead, specify
    the exact range of cells you need.
  id: totrans-1840
  prefs: []
  type: TYPE_NORMAL
  zh: ◦ 避免在公式中引用整个列或行。相反，指定您需要的确切单元格范围。
- en: '◦ Example: Use A1:A100 instead of A:A.'
  id: totrans-1841
  prefs: []
  type: TYPE_NORMAL
  zh: ◦ 示例：使用 A1:A100 而不是 A:A。
- en: '2 Reduce File Size:'
  id: totrans-1842
  prefs: []
  type: TYPE_NORMAL
  zh: 2 减小文件大小：
- en: ◦ Remove unnecessary data, clear unused cells, and compress images to reduce
    the size of your workbook. This can improve performance and make the file easier
    to share.
  id: totrans-1843
  prefs: []
  type: TYPE_NORMAL
  zh: ◦ 删除不必要的资料，清除未使用的单元格，并压缩图片以减小工作簿的大小。这可以提高性能并使文件更容易共享。
- en: '◦ Steps:'
  id: totrans-1844
  prefs: []
  type: TYPE_NORMAL
  zh: ◦ 步骤：
- en: ▪ Go to "File" > "Info" > "Check for Issues" > "Inspect Document" to remove
    hidden data and personal information.
  id: totrans-1845
  prefs: []
  type: TYPE_NORMAL
  zh: ▪ 转到 "文件" > "信息" > "检查问题" > "检查文档" 以删除隐藏数据和个人信息。
- en: '3 Disable Automatic Calculations:'
  id: totrans-1846
  prefs: []
  type: TYPE_NORMAL
  zh: 3 禁用自动计算：
- en: ◦ Set the calculation mode to manual when working with large datasets to avoid
    constant recalculations. Recalculate manually when needed.
  id: totrans-1847
  prefs: []
  type: TYPE_NORMAL
  zh: ◦ 在处理大型数据集时，将计算模式设置为手动以避免不断重新计算。在需要时手动重新计算。
- en: '◦ Steps:'
  id: totrans-1848
  prefs: []
  type: TYPE_NORMAL
  zh: ◦ 步骤：
- en: ▪ Go to "Formulas" > "Calculation Options" > "Manual".
  id: totrans-1849
  prefs: []
  type: TYPE_NORMAL
  zh: ▪ 转到 "公式" > "计算选项" > "手动"。
- en: ▪ Press F9 to recalculate the workbook.
  id: totrans-1850
  prefs: []
  type: TYPE_NORMAL
  zh: ▪ 按 F9 重新计算工作簿。
- en: '4 Use 64-bit Excel:'
  id: totrans-1851
  prefs: []
  type: TYPE_NORMAL
  zh: 4 使用 64 位 Excel：
- en: ◦ If you frequently work with very large datasets, consider using the 64-bit
    version of Excel, which can handle larger amounts of memory.
  id: totrans-1852
  prefs: []
  type: TYPE_NORMAL
  zh: ◦ 如果您经常处理非常大的数据集，请考虑使用 64 位版本的 Excel，它可以处理更多的内存。
- en: Utilizing External Data Tools
  id: totrans-1853
  prefs: []
  type: TYPE_NORMAL
  zh: 利用外部数据工具
- en: '1 Use Access or SQL Databases:'
  id: totrans-1854
  prefs: []
  type: TYPE_NORMAL
  zh: 1 使用 Access 或 SQL 数据库：
- en: ◦ For very large datasets, consider using a database management system like
    Microsoft Access or SQL Server. These tools are designed to handle large volumes
    of data more efficiently than Excel.
  id: totrans-1855
  prefs: []
  type: TYPE_NORMAL
  zh: ◦ 对于非常大的数据集，考虑使用 Microsoft Access 或 SQL Server 等数据库管理系统。这些工具旨在比 Excel 更高效地处理大量数据。
- en: '◦ Steps:'
  id: totrans-1856
  prefs: []
  type: TYPE_NORMAL
  zh: ◦ 步骤：
- en: ▪ Import data into Access or SQL Server and use Excel to connect to these databases
    for analysis.
  id: totrans-1857
  prefs: []
  type: TYPE_NORMAL
  zh: ▪ 将数据导入 Access 或 SQL Server，并使用 Excel 连接到这些数据库进行分析。
- en: ▪ Go to "Data" > "Get Data" > "From Database" and choose your database source.
  id: totrans-1858
  prefs: []
  type: TYPE_NORMAL
  zh: ▪ 转到 "数据" > "获取数据" > "来自数据库" 并选择您的数据库源。
- en: '2 Integrate with Power BI:'
  id: totrans-1859
  prefs: []
  type: TYPE_NORMAL
  zh: 2 与 Power BI 集成：
- en: ◦ Power BI is a powerful tool for visualizing and analyzing large datasets.
    You can connect Excel to Power BI for more advanced data analysis and visualization
    capabilities.
  id: totrans-1860
  prefs: []
  type: TYPE_NORMAL
  zh: ◦ Power BI 是一个强大的工具，用于可视化和分析大量数据集。您可以将 Excel 连接到 Power BI 以获得更高级的数据分析和可视化功能。
- en: '◦ Steps:'
  id: totrans-1861
  prefs: []
  type: TYPE_NORMAL
  zh: ◦ 步骤：
- en: ▪ Go to "File" > "Publish" > "Publish to Power BI" to share your data and reports.
  id: totrans-1862
  prefs: []
  type: TYPE_NORMAL
  zh: ▪ 转到 "文件" > "发布" > "发布到 Power BI" 以共享您的数据和报告。
- en: Automating Data Management
  id: totrans-1863
  prefs: []
  type: TYPE_NORMAL
  zh: 自动化数据管理
- en: '1 Use VBA for Automation:'
  id: totrans-1864
  prefs: []
  type: TYPE_NORMAL
  zh: 1 使用 VBA 进行自动化：
- en: ◦ Automate repetitive tasks such as data cleaning, formatting, and processing
    using VBA macros. This can save time and reduce the risk of errors.
  id: totrans-1865
  prefs: []
  type: TYPE_NORMAL
  zh: ◦ 使用 VBA 宏自动执行重复性任务，如数据清理、格式化和处理。这可以节省时间并降低出错的风险。
- en: ◦ Example
  id: totrans-1866
  prefs: []
  type: TYPE_NORMAL
  zh: ◦ 示例
- en: Sub CleanAndFormatData()
  id: totrans-1867
  prefs: []
  type: TYPE_NORMAL
  zh: Sub CleanAndFormatData()
- en: Dim ws As Worksheet
  id: totrans-1868
  prefs: []
  type: TYPE_NORMAL
  zh: Dim ws As Worksheet
- en: Set ws = ThisWorkbook.Sheets("DataSheet")
  id: totrans-1869
  prefs: []
  type: TYPE_NORMAL
  zh: Set ws = ThisWorkbook.Sheets("DataSheet")
- en: ''' Remove duplicates'
  id: totrans-1870
  prefs: []
  type: TYPE_NORMAL
  zh: ''' 删除重复项'
- en: ws.Range("A1:D100").RemoveDuplicates Columns:=Array(1, 2, 3, 4), Header:=xlYes
  id: totrans-1871
  prefs: []
  type: TYPE_NORMAL
  zh: ws.Range("A1:D100").RemoveDuplicates Columns:=Array(1, 2, 3, 4), Header:=xlYes
- en: ''' Apply consistent formatting'
  id: totrans-1872
  prefs: []
  type: TYPE_NORMAL
  zh: ''' 应用一致的格式化'
- en: ws.Range("A:D").Font.Name = "Calibri"
  id: totrans-1873
  prefs: []
  type: TYPE_NORMAL
  zh: ws.Range("A:D").Font.Name = "Calibri"
- en: ws.Range("A:D").Font.Size = 11
  id: totrans-1874
  prefs: []
  type: TYPE_NORMAL
  zh: ws.Range("A:D").Font.Size = 11
- en: ws.Columns.AutoFit
  id: totrans-1875
  prefs: []
  type: TYPE_NORMAL
  zh: ws.Columns.AutoFit
- en: End Sub
  id: totrans-1876
  prefs: []
  type: TYPE_NORMAL
  zh: End Sub
- en: '1 Schedule Data Refreshes:'
  id: totrans-1877
  prefs: []
  type: TYPE_NORMAL
  zh: 1 安排数据刷新：
- en: ◦ Use Power Query or VBA to schedule automatic data refreshes. This ensures
    your data is always up to date without manual intervention.
  id: totrans-1878
  prefs: []
  type: TYPE_NORMAL
  zh: ◦ 使用 Power Query 或 VBA 安排自动数据刷新。这确保了您的数据始终是最新的，无需手动干预。
- en: '◦ Steps:'
  id: totrans-1879
  prefs: []
  type: TYPE_NORMAL
  zh: ◦ 步骤：
- en: ▪ Use Task Scheduler to run a VBA macro at specified intervals.
  id: totrans-1880
  prefs: []
  type: TYPE_NORMAL
  zh: ▪ 使用任务计划程序在指定间隔运行 VBA 宏。
- en: By implementing these strategies, you can effectively manage large datasets
    in Excel, ensuring better performance and more efficient data processing.
  id: totrans-1881
  prefs: []
  type: TYPE_NORMAL
  zh: 通过实施这些策略，您可以在 Excel 中有效地管理大量数据集，确保更好的性能和更高效的数据处理。
