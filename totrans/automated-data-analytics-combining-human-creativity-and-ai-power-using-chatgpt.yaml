- en: '| 2017 | Google introduces Google Assistant and Duplex |'
  prefs: []
  type: TYPE_TB
- en: '| **Generative chatbots** | 2021 | Jasper AI: content platform that helps creators
    and businesses of all kinds to develop their creative potential |'
  prefs: []
  type: TYPE_TB
- en: '| 2022 | OpenAI launches GPT-3, a large language model OpenAI launches ChatGPT,
    an AI-powered conversational agent |'
  prefs: []
  type: TYPE_TB
