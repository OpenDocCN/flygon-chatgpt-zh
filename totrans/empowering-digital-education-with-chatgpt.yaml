- en: 4.3.2 Co-citation analysis
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 4.3.2.1 Publication
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'The authors conducted a comprehensive analysis of 4,275 citations generated
    from 136 publications. In order to refine the sample, a cut-off point was established,
    and a threshold of ten citations was established as the minimum number of citations
    ([McCain 1990](#ch12.xhtml#r160)). As a result, 19 publications were selected
    as the most influential. The five studies with the highest co-citation indices
    are as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Rudolph, J., Tan, S., & Tan, S. (2023). ChatGPT: Bullshit spewer or the end
    of traditional assessments in higher education?. *Journal of Applied Learning
    and Teachin*g, 6(1), 1–22.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Kasneci, E., Seßler, K., Küchemann, S., Bannert, M., Dementieva, D., Fischer,
    F., … & Kasneci, G. (2023). ChatGPT for good? On opportunities and challenges
    of large language models for education. *Learning and individual differences*,
    103(1), 1–9.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Tlili, A., Shehata, B., Adarkwah, M. A., Bozkurt, A., Hickey, D. T., Huang,
    R., & Agyemang, B. (2023). What if the devil is my guardian angel: ChatGPT as
    a case study of using chatbots in education. *Smart Learning Environments*, 10(1),
    1–24.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Cotton, D. R., Cotton, P. A., & Shipway, J. R. (2023). Chatting and cheating:
    Ensuring academic integrity in the era of ChatGPT. *Innovations in Education and
    Teaching International*, 1(1), 1–12.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Pavlik, J. V. (2023). Collaborating with ChatGPT: Considering the implications
    of generative artificial intelligence for journalism and media education. *Journalism
    & Mass Communication Educator*, 78(1), 84–93.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The authors present a co-citation network in [Figure 4.4](#ch12.xhtml#f10),
    which showcases the relationship between the selected articles based on their
    shared citations. This network is divided into three distinct clusters, each containing
    a group of publications centred around specific themes (see [Table 4.4](#ch12.xhtml#t9)).
  prefs: []
  type: TYPE_NORMAL
- en: '![A network diagram depicts interconnected scattered colored nodes labeled
    with author names and abbreviated journal titles. Some of the nodes are labeled
    as follows. Rudolph J., 2023, J Appl Learn. Cotton Dre, 2023, Innov Educ T. Kasneci
    E, 2023, Learn Individ. Dwivedi Y K, 2023, Int J Inform.](html/images/9781032716084_C004_004.jpg)'
  prefs: []
  type: TYPE_IMG
- en: '[Figure 4.4](#ch12.xhtml#f10b) Co-citation network of publications.'
  prefs: []
  type: TYPE_NORMAL
- en: Cluster 1\. ChatGPT and Academic Integrity
  prefs: []
  type: TYPE_NORMAL
- en: The studies in this first cluster primarily focus on how ChatGPT influences
    knowledge assessment and academic integrity. Topics in this group encompass the
    challenges of upholding academic integrity in a society where ChatGPT and other
    AI-enabled tools are widely utilized, the ramifications of large language models
    in the context of medical education and knowledge assessment, the connection between
    chatbots, plagiarism, and AI in higher education, and academic integrity concerns
    associated with large AI language models in the post-pandemic era.
  prefs: []
  type: TYPE_NORMAL
- en: Cluster 2\. Education’s Opportunities and Challenges
  prefs: []
  type: TYPE_NORMAL
- en: The studies in this second cluster investigate the pros and cons of employing
    large language models, particularly ChatGPT, in educational settings. Some research
    explores the specific applications of ChatGPT in these contexts. In contrast,
    others delve into large language models’ potential benefits and challenges, questioning
    whether ChatGPT benefits education. Additionally, this cluster examines the utilization
    of chatbots in education, emphasizing their role as educational aids, using ChatGPT
    as a case study. It also assesses educators’ current state of AI technology adoption
    through a systematic review of applied research in higher education.
  prefs: []
  type: TYPE_NORMAL
- en: Cluster 3\. Research and Multidisciplinary Perspectives
  prefs: []
  type: TYPE_NORMAL
- en: The articles in the third cluster explore the functionality of ChatGPT in research
    and offer interdisciplinary perspectives on how to use it. More specifically,
    the potential of ChatGPT in financial research is considered in this cluster.
    A comprehensive overview of generative conversational AI in research, practice,
    and policy is also studied alongside these technologies’ ramifications, difficulties,
    and prospects. Finally, the remaining theme in this cluster is the use of open
    AI platforms in nursing education, including the risks associated with their improper
    use and their potential as tools for academic advancement.
  prefs: []
  type: TYPE_NORMAL
