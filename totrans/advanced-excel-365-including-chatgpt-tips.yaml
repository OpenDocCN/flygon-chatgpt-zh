  prefs: []
  type: TYPE_NORMAL
- en: Private Sub cmdExit_Click()
  prefs: []
  type: TYPE_NORMAL
- en: End
  prefs: []
  type: TYPE_NORMAL
- en: End Sub
  prefs: []
  type: TYPE_NORMAL
- en: Insert a module and write a macro to show the Changecase form.
  prefs: []
  type: TYPE_NORMAL
- en: Sub show()
  prefs: []
  type: TYPE_NORMAL
- en: Changecase.show
  prefs: []
  type: TYPE_NORMAL
- en: End Sub
  prefs: []
  type: TYPE_NORMAL
- en: Creating Menu with Code
  prefs: []
  type: TYPE_NORMAL
- en: 'Refer to the following code:'
  prefs: []
  type: TYPE_NORMAL
- en: Sub auto_open()
  prefs: []
  type: TYPE_NORMAL
- en: '''This code will create a new menu in the existing menubar, which will have
    one menuitem i.e., Changecase Add-Ins'
  prefs: []
  type: TYPE_NORMAL
- en: Dim newmenu As CommandBarPopup
  prefs: []
  type: TYPE_NORMAL
- en: Dim menuitem As CommandBarButton
  prefs: []
  type: TYPE_NORMAL
- en: Set newmenu = CommandBars(1).Controls.
  prefs: []
  type: TYPE_NORMAL
- en: Add(Type:=msoControlPopup, before:=CommandBars(1). Controls("help").Index)
  prefs: []
  type: TYPE_NORMAL
- en: newmenu.Caption = "E&xtras"
  prefs: []
  type: TYPE_NORMAL
- en: '''When Changecase menuitem is selected it should show changecase form Set menuitem
    = newmenu.Controls.Add(Type:=msoControlButton) menuitem.Caption = "&Change Case"
    menuitem.OnAction = "show"'
  prefs: []
  type: TYPE_NORMAL
- en: End Sub
  prefs: []
  type: TYPE_NORMAL
- en: Sub auto_close()
  prefs: []
  type: TYPE_NORMAL
- en: '''This will remove menu when add ins is removed from the excel CommandBars(1).Controls("extras").Delete'
  prefs: []
  type: TYPE_NORMAL
- en: End Sub
  prefs: []
  type: TYPE_NORMAL
- en: 'In this example:'
  prefs: []
  type: TYPE_NORMAL
- en: '■Auto_Open(): This is the first event that is fired whenever a Workbook is
    opened.'
  prefs: []
  type: TYPE_NORMAL
- en: '■Auto_Close(): This is the last event that is fired whenever a Workbook is
    opened.'
  prefs: []
  type: TYPE_NORMAL
- en: Conclusion
  prefs: []
  type: TYPE_NORMAL
- en: In this chapter, we have explored advanced VBA techniques and best practices
    that can significantly improve the functionality and user experience of Excel
    applications. From initializing control values to handling option buttons, creating
    custom buttons and user forms, utilizing Add-ins, and creating menus through code,
    we have covered a wide range of topics. By applying these techniques and following
    the best practices outlined, readers can create more robust, efficient, and user-friendly
    Excel applications. With a solid grasp of these advanced techniques, readers will
    be well-equipped to take their VBA skills to the next level.
  prefs: []
  type: TYPE_NORMAL
- en: Exercises
  prefs: []
  type: TYPE_NORMAL
- en: Let us consider an example-based exercise that combines several of the advanced
    VBA techniques discussed in this chapter.
  prefs: []
  type: TYPE_NORMAL
- en: 'Scenario: You are working on a project management tool in Excel. The tool allows
    users to input project details, track progress, and generate reports. Your task
    is to enhance the tool by implementing the following features:'
  prefs: []
  type: TYPE_NORMAL
- en: 1. Add a UserForm called “TaskForm” that allows users to input task details,
    including task name, assigned person, start date, end date, and status (e.g.,
    “Not Started,” “In Progress,” “Completed”).
  prefs: []
  type: TYPE_NORMAL
- en: 2. Implement validation checks in the TaskForm to ensure that all required fields
    are filled and that the end date is not earlier than the start date. Display appropriate
    error messages if any validation fails.
  prefs: []
  type: TYPE_NORMAL
- en: 3. Create a custom Insert button on the TaskForm that adds the entered task
    details to a designated worksheet, such as “ProjectTasks.” Ensure that each new
    task is inserted on a new row, then clear the input fields after successful insertion.
  prefs: []
  type: TYPE_NORMAL
- en: 4. Implement a menu system using VBA code. Create a new menu item called “Project
    Management” in the Excel menu bar. Under the “Project Management” menu, add options
    to open the TaskForm, display a list of all tasks, and generate a summary report.
  prefs: []
  type: TYPE_NORMAL
- en: 5. Develop a summary report function that calculates and displays the total
    number of tasks, the number of tasks in each status category, and the percentage
    of completed tasks. The summary report should be displayed in a new worksheet
    named “TaskSummary.”
  prefs: []
  type: TYPE_NORMAL
- en: 6. Implement an Add-In called “TaskUtilities” that provides additional functions
    for task management, such as sorting tasks by name or date, filtering tasks by
    status, and generating specialized reports. Test the Add-In by using it in different
    workbooks to verify its functionality.
  prefs: []
  type: TYPE_NORMAL
- en: 7. Apply best practices for code organization, error handling, and optimization
    throughout the project to ensure clean and efficient VBA code.
  prefs: []
  type: TYPE_NORMAL
- en: CHAPTER  24
  prefs: []
  type: TYPE_NORMAL
- en: Building Custom Add-ins with VBA
  prefs: []
  type: TYPE_NORMAL
- en: Introduction
  prefs: []
  type: TYPE_NORMAL
- en: In this chapter, we will explore the process of building custom Add-ins with
    Visual Basic for Applications (VBA) in Excel. Add-ins are additional functionalities
    or tools that can be integrated into Excel to enhance its capabilities and streamline
    workflows. We will cover topics such as protecting Add-ins with a password and
    using Add-ins effectively.
  prefs: []
  type: TYPE_NORMAL
- en: Structure
  prefs: []
  type: TYPE_NORMAL
- en: 'In this chapter, we will go over the following topics:'
  prefs: []
  type: TYPE_NORMAL
- en: ■Protecting your Add-ins with a password
  prefs: []
  type: TYPE_NORMAL
- en: ■Using Add-ins
  prefs: []
  type: TYPE_NORMAL
- en: Objectives
  prefs: []
  type: TYPE_NORMAL
- en: By the end of this chapter, the reader will learn how to protect their Add-ins
    with a password, as well as how to utilize Add-ins efficiently to enhance functionality.
  prefs: []
  type: TYPE_NORMAL
- en: Protecting Your Add-ins with a Password
  prefs: []
  type: TYPE_NORMAL
- en: 'To protect your Add-ins with a password, follow these steps:'
  prefs: []
  type: TYPE_NORMAL
- en: 1. Collapse all the objects of the project (the Excel file in which you have
    inserted forms and modules for Add-ins).
  prefs: []
  type: TYPE_NORMAL
- en: 2. Right-click over that project.
  prefs: []
  type: TYPE_NORMAL
- en: 3. Select VBA project properties.
  prefs: []
  type: TYPE_NORMAL
- en: 4. Select the Protection tab.
  prefs: []
  type: TYPE_NORMAL
- en: 5. Select Lock for viewing.
  prefs: []
  type: TYPE_NORMAL
- en: 6. Set a password.
  prefs: []
  type: TYPE_NORMAL
- en: 7. Click OK.
  prefs: []
  type: TYPE_NORMAL
- en: Refer to [Figure 24.1](#fig24-1).
  prefs: []
  type: TYPE_NORMAL
- en: '![image](image/Figure_24.1.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 24.1 Adding a Password
  prefs: []
  type: TYPE_NORMAL
- en: 8. Once you are ready with the form and modules of your Add-ins, switch to the
    Excel environment.
  prefs: []
  type: TYPE_NORMAL
- en: 9. Save the current file with the type Add-ins (.xlam extension), as shown in
    [Figure 24.2](#fig24-2).
  prefs: []
  type: TYPE_NORMAL
- en: '![image](image/Figure_24.2.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 24.2 Saving the Current File
  prefs: []
  type: TYPE_NORMAL
- en: Using Add-ins
  prefs: []
  type: TYPE_NORMAL
- en: 'To use Add-ins, follow these steps:'
  prefs: []
  type: TYPE_NORMAL
- en: 1. Click on the Office Button.
  prefs: []
  type: TYPE_NORMAL
- en: 2. Click on Excel Options.
  prefs: []
  type: TYPE_NORMAL
- en: 3. Select Add-ins.
  prefs: []
  type: TYPE_NORMAL
- en: 4. Click on the Go… Button, as shown in [Figure 24.3](#fig24-3).
  prefs: []
  type: TYPE_NORMAL
- en: '![image](image/Figure_24.3.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 24.3 Selecting the Add-ins
  prefs: []
  type: TYPE_NORMAL
- en: 5. Browse to locate your Add-ins, as shown in [Figure 24.4](#fig24-4).
  prefs: []
  type: TYPE_NORMAL
- en: '![image](image/Figure_24.4.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 24.4 Locate Your Add-ins
  prefs: []
  type: TYPE_NORMAL
- en: Conclusion
  prefs: []
  type: TYPE_NORMAL
- en: In conclusion, building custom Add-ins with VBA empowers users to extend the
    functionality offered by Excel and streamline their workflows. Protecting Add-ins
    with a password ensures their security. Utilizing Add-ins effectively enhances
    productivity and enables users to access additional features and tools within
    Excel.
  prefs: []
  type: TYPE_NORMAL
- en: Exercises
  prefs: []
  type: TYPE_NORMAL
- en: 1. Open Microsoft Excel and create a new workbook.
  prefs: []
  type: TYPE_NORMAL
- en: 2. Create a simple VBA macro that formats the selected cells with a specific
    font, font size, and background color.
  prefs: []
  type: TYPE_NORMAL
- en: 3. Save the VBA macro as an add-in with an .xlam extension.
  prefs: []
  type: TYPE_NORMAL
- en: 4. Protect the Add-in with a password to ensure its security.
  prefs: []
  type: TYPE_NORMAL
- en: 5. Test the Add-in by installing it in Excel and using it to format cells in
    different worksheets.
  prefs: []
  type: TYPE_NORMAL
- en: CHAPTER  25
  prefs: []
  type: TYPE_NORMAL
- en: ChatGPT with Excel
  prefs: []
  type: TYPE_NORMAL
- en: Introduction
  prefs: []
  type: TYPE_NORMAL
- en: In this chapter, we will explore the integration of ChatGPT with Excel. Excel
    is a powerful tool for data organization and analysis, while ChatGPT is an AI
    language model that can assist in various tasks. By combining these tools, you
    can leverage the capabilities of both to enhance your Excel experience.
  prefs: []
  type: TYPE_NORMAL
- en: Structure
  prefs: []
  type: TYPE_NORMAL
- en: 'In this chapter, we will go over the following topics:'
  prefs: []
  type: TYPE_NORMAL
- en: ■Using ChatGPT with Excel
  prefs: []
  type: TYPE_NORMAL
- en: Objectives
  prefs: []
  type: TYPE_NORMAL
- en: By the end of this chapter, the reader will learn how to integrate ChatGPT with
    Excel to further leverage the power of Excel and improve efficiency in tasks such
    as data analysis, troubleshooting formulas, and formatting.
  prefs: []
  type: TYPE_NORMAL
- en: Using ChatGPT With Excel
  prefs: []
  type: TYPE_NORMAL
- en: Excel is a powerful tool for organizing and analyzing data. On the other hand,
    ChatGPT is an AI language model that can provide assistance in various domains,
    including Excel. Below are some ways you can use Excel and ChatGPT together.
  prefs: []
  type: TYPE_NORMAL
- en: ■Ask for help with Excel functions and formulas. You can ask ChatGPT for help
    with specific Excel functions or formulas that you are having trouble with. Simply
    describe the problem or provide an example, and ChatGPT can suggest a solution
    or provide a step-by-step guide, as shown in [Figure 25.1](#fig25-1).
  prefs: []
  type: TYPE_NORMAL
- en: '![image](image/Figure_25.1.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 25.1 Asking ChatGPT for Help With Excel Functions and Formulas
  prefs: []
  type: TYPE_NORMAL
- en: ■Get tips and tricks for using Excel. ChatGPT can provide tips and tricks for
    using Excel more efficiently. For example, you can ask for shortcuts, formatting
    tricks, or ways to automate tasks in Excel, as shown in [Figure 25.2](#fig25-2).
  prefs: []
  type: TYPE_NORMAL
- en: '![image](image/Figure_25.2.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 25.2 Asking ChatGPT for Tips and Tricks for Using Excel
  prefs: []
  type: TYPE_NORMAL
- en: ■Get insights from data analysis. Excel can be used to analyze data and generate
    insights, as shown in [Figure 25.3](#fig25-3). ChatGPT can help you interpret
    the results of your analysis or suggest new ways to look at your data, as shown
    in [Figure 25.4](#fig25-4).
  prefs: []
  type: TYPE_NORMAL
- en: '![image](image/Figure_25.3.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 25.3 Data on Excel
  prefs: []
  type: TYPE_NORMAL
- en: Go to ChatGPT, and in chat, write how to analyze this data. The response is
    as shown in [Figure 25.4](#fig25-4).
  prefs: []
  type: TYPE_NORMAL
- en: '![image](image/Figure_25.4.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 25.4 ChatGPT on How to Analyze This Data
  prefs: []
  type: TYPE_NORMAL
- en: ■Collaborate on Excel Spreadsheets. You can use ChatGPT to collaborate on Excel
    spreadsheets with others. For example, you can ask ChatGPT to suggest changes
    or improvements to a spreadsheet, or to provide feedback on a specific aspect
    of the data. [Figure 25.5](#fig25-5) features a spreadsheet with data.
  prefs: []
  type: TYPE_NORMAL
- en: '![image](image/Figure_25.5.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 25.5 Spreadsheet with Data
  prefs: []
  type: TYPE_NORMAL
- en: 'If you ChatGPT to provide feedback on the pivot table shown in [Figure 25.5](#fig25-5),
    the following response is generated:'
  prefs: []
  type: TYPE_NORMAL
- en: '![image](image/Figure_25.6.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 25.6 ChatGPT Response
  prefs: []
  type: TYPE_NORMAL
- en: ■For Coding in Excel. You can generate any code using ChatGPT, such as a code
    for converting numbers to words in Excel using VBA.
  prefs: []
  type: TYPE_NORMAL
- en: 'To convert words to numbers in dollars in Excel using VBA, you can create a
    custom function that uses the Microsoft Speech Object Library to convert the text
    to speech and then extract the numbers from the spoken text. Here is an example
    of how you could do this:'
  prefs: []
  type: TYPE_NORMAL
- en: 1. Open a new Excel workbook and press Alt + F11 to open the VBA editor.
  prefs: []
  type: TYPE_NORMAL
- en: 2. In the editor, go to Insert | Module, to create a new module.
  prefs: []
  type: TYPE_NORMAL
- en: 3. In the new module, copy and paste the code shown in [Figure 25.7](#fig25-7).
  prefs: []
  type: TYPE_NORMAL
- en: '![image](image/Figure_25.7.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 25.7 Code to be Copied Into the New Module
  prefs: []
  type: TYPE_NORMAL
- en: 4. Save the module and return to your Excel worksheet.
  prefs: []
  type: TYPE_NORMAL
- en: '5. In the cell where you want to convert words to numbers in dollars, enter
    the following formula:'
  prefs: []
  type: TYPE_NORMAL
- en: =WordsToNumbers(“Two thousand five hundred rupees and fifty paise only”)
  prefs: []
  type: TYPE_NORMAL
- en: 6. Press Enter to calculate the result.
  prefs: []
  type: TYPE_NORMAL
- en: 7. This formula will convert the words “Two thousand five hundred rupees and
    fifty paise only” to the number 2500.50\. You can replace the example text with
    the actual text you want to convert.
  prefs: []
  type: TYPE_NORMAL
- en: The combination of Excel and ChatGPT can help you work more efficiently and
    effectively with data and can provide new insights and perspectives on your work.
    Let us say that you have a spreadsheet with sales data for your company. You want
    to calculate the total sales for each month and create a chart to visualize the
    data. To do that, you need to follow the steps below.
  prefs: []
  type: TYPE_NORMAL
- en: 1. First, you can use Excel to create a new column and use the MONTH function
    to extract the month from the date in your sales data.
  prefs: []
  type: TYPE_NORMAL
- en: 2. Next, you can use the SUMIFS function to calculate the total sales for each
    month. You will need to specify the criteria for the function to use to sum the
    sales data for each month.
  prefs: []
  type: TYPE_NORMAL
- en: 3. Once you have your totals, you can create a chart to visualize the data.
    Select your data and go to the Insert tab, then choose the type of chart you want
    to create.
  prefs: []
  type: TYPE_NORMAL
- en: 4. If you are not sure which chart type to use or how to format the chart, you
    can ask ChatGPT for suggestions. For example, you could ask, “What’s the best
    chart type for visualizing sales data by month?” or “How can I make my chart more
    visually appealing?”
  prefs: []
  type: TYPE_NORMAL
- en: 5. ChatGPT can provide suggestions based on best practices and design principles.
    You can also ask ChatGPT to explain specific features or settings in Excel if
    you are not sure how to use them. Refer to [Figure 25.8](#fig25-8) for an example.
  prefs: []
  type: TYPE_NORMAL
- en: '![image](image/Figure_25.8.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 25.8 Asking ChatGPT for Help With Specific Features or Settings in Excel
  prefs: []
  type: TYPE_NORMAL
- en: Using Excel and ChatGPT together can help you work more efficiently and effectively
    with data and can provide new insights and perspectives on your work.
  prefs: []
  type: TYPE_NORMAL
- en: Conclusion
  prefs: []
  type: TYPE_NORMAL
- en: In conclusion, integrating ChatGPT with Excel provides valuable assistance and
    guidance for users. By leveraging the power of Excel functions and formulas, along
    with ChatGPT’s capabilities, users can improve their efficiency in tasks such
    as data analysis, troubleshooting formulas, and formatting. ChatGPT can also provide
    tips, tricks, and insights for using Excel more effectively. Additionally, the
    ability to collaborate on spreadsheets and seek feedback from ChatGPT enhances
    the overall experience of working with Excel. By combining these tools, users
    can optimize their data management and analysis workflows, leading to enhanced
    productivity and better decision-making.
  prefs: []
  type: TYPE_NORMAL
- en: Exercises
  prefs: []
  type: TYPE_NORMAL
- en: 1. Open Microsoft Excel and create a new workbook.
  prefs: []
  type: TYPE_NORMAL
- en: 2. Enter the following sample sales data in a worksheet.
  prefs: []
  type: TYPE_NORMAL
- en: TABLE 25.1 Sample Sales Data
  prefs: []
  type: TYPE_NORMAL
- en: '| Dates | Sales |'
  prefs: []
  type: TYPE_TB
- en: '| 01-01-2023 | $500 |'
  prefs: []
  type: TYPE_TB
- en: '| 05-01-2023 | $300 |'
  prefs: []
  type: TYPE_TB
- en: '| 10-02-2023 | $750 |'
  prefs: []
  type: TYPE_TB
- en: '| 15-02-2023 | $600 |'
  prefs: []
  type: TYPE_TB
- en: '| 03-03-2023 | $900 |'
  prefs: []
  type: TYPE_TB
- en: '| 07-03-2023 | $400 |'
  prefs: []
  type: TYPE_TB
- en: '3. Create a VBA macro that performs the following tasks:'
  prefs: []
  type: TYPE_NORMAL
- en: a. Calculate the total sales for each month.
  prefs: []
  type: TYPE_NORMAL
- en: b. Identify the month with the highest sales.
  prefs: []
  type: TYPE_NORMAL
- en: c. Display the calculated totals and the month with the highest sales in a message
    box.
  prefs: []
  type: TYPE_NORMAL
