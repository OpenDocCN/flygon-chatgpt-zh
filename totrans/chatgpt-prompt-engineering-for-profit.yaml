- en: '○        ****Com**plet**e ****Exa**mpl**e :'
  id: totrans-703
  prefs: []
  type: TYPE_NORMAL
  zh: '○        ****完整例子 :'
- en: '■        ****Que**stio**n: "****Wh**at** ****a**re** ****bl**ack** ****ho**les**?
    "'
  id: totrans-704
  prefs: []
  type: TYPE_NORMAL
  zh: '■        ****问题: "****什么是黑洞？"'
- en: '■ ****Ini**tia**l ****An**swe**r: "****Bl**ack** ****ho**les** ****a**re**
    ****reg**ion**s ****o**f** ****sp**ace** ****wh**ere** ****gra**vit**y ****i**s**
    ****s**o** ****st**ron**g ****th**at** ****not**hin**g ****c**an** ****es**cap**e.
    "'
  id: totrans-705
  prefs: []
  type: TYPE_NORMAL
  zh: '■ ****初始答案: "****黑洞是空间区域，那里的引力如此之强，以至于没有任何东西可以逃脱。"'
- en: '■        ****Fi**rst** ****Iter**atio**n (****Refi**nemen**t): "****Exp**lai**n
    ****h**ow** ****bl**ack** ****ho**les** ****fo**rm**. "'
  id: totrans-706
  prefs: []
  type: TYPE_NORMAL
  zh: '■        ****第一次迭代（改进）: "****解释黑洞是如何形成的。"'
- en: '■ ****Imp**rove**d ****An**swe**r: "****Bl**ack** ****ho**les** ****fo**rm**
    ****wh**en** ****ve**ry** ****mas**siv**e ****st**ars** ****col**laps**e ****af**ter**
    ****exha**ustin**g ****th**eir** ****fu**el**, ****cre**atin**g ****a**** ****sing**ularit**y
    ****wh**ere** ****gra**vit**y ****i**s** ****extr**emel**y ****st**ron**g."'
  id: totrans-707
  prefs: []
  type: TYPE_NORMAL
  zh: '■ ****改进后的答案: "****黑洞形成于非常巨大的恒星在耗尽燃料后发生坍缩，形成一个奇点，那里的引力极其强烈。"'
- en: '■        ****Se**con**d ****Iter**atio**n (****Refi**nemen**t): "****A**dd**
    ****a**** ****prac**tica**l ****exa**mpl**e ****o**f** ****h**ow** ****bl**ack**
    ****ho**les** ****a**re** ****obs**erve**d. "'
  id: totrans-708
  prefs: []
  type: TYPE_NORMAL
  zh: '■        ****第二次迭代（改进）: "****添加一个黑洞如何被观测到的实际例子。"'
- en: '■ ****Ref**ine**d ****An**swe**r: "****Bl**ack** ****ho**les** ****a**re**
    ****obs**erve**d ****thr**oug**h ****t**he** ****eff**ect**s ****o**n** ****obj**ect**s
    ****ar**oun**d ****th**em**, ****su**ch** ****a**s** ****st**ars** ****a**nd**
    ****g**as** ****th**at** ****a**re** ****attr**acte**d ****b**y** ****th**eir**
    ****gra**vit**y, ****emi**ttin**g ****hi**gh**-****en**erg**y ****radi**atio**n
    ****th**at** ****c**an** ****b**e** ****det**ecte**d ****b**y** ****tele**scope**s.
    "'
  id: totrans-709
  prefs: []
  type: TYPE_NORMAL
  zh: '■ ****改进后的答案: "****黑洞通过对其周围物体的影响被观测到，例如恒星和气体，这些物体被其引力吸引，发射出高能量辐射，这些辐射可以通过望远镜检测到。"'
- en: '****Pr**omp**t ****exer**cise**s ****us**ing** ****t**he** ****ab**ove** ****tech**niqu**e]'
  id: totrans-710
  prefs: []
  type: TYPE_NORMAL
  zh: '****使用上述技术进行的提示练习]'
- en: '****A**sk** ****t**he** ****mo**del** ****t**o** ****exp**lai**n "****Wh**at**
    ****i**s** ****a**** ****che**mica**l ****rea**ctio**n?" ****a**nd** ****th**en**
    ****a**sk** ****th**em** ****t**o** ****a**dd** ****a**** ****prac**tica**l ****exa**mpl**e
    ****a**nd** ****de**tai**l ****t**he** ****st**eps** ****inv**olve**d ****i**n**
    ****a**** ****si**mpl**e ****rea**ctio**n, ****su**ch** ****a**s** ****t**he**
    ****form**atio**n ****o**f** ****wa**ter** ****fr**om** ****hyd**roge**n ****a**nd**
    ****ox**yge**n.'
  id: totrans-711
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '****向模型询问"****什么是化学反应？"然后让他们添加一个实际例子并详细说明简单反应中涉及的步骤，例如水从氢和氧形成。'
- en: '****A**sk** "****H**ow** ****do**es** ****t**he** ****hu**man** ****circ**ulator**y
    ****sy**ste**m ****wo**rk**?" ****a**nd** ****af**ter** ****t**he** ****ini**tia**l
    ****an**swe**r, ****ins**truc**t ****t**he** ****mo**del** ****t**o** ****re**vis**e,
    ****ad**din**g ****det**ail**s ****ab**out** ****t**he** ****ro**le** ****o**f**
    ****bl**ood** ****ves**sel**s ****a**nd** ****t**he** ****he**art**.'
  id: totrans-712
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '****A**sk **“****H**ow **does **the **human **circulatory **system **work**?”**
    **and **after **the **initial **answer, **instruct **the **model **to **revise,
    **adding **details **about **the **role **of **blood **vessels **and **the **heart**.'
- en: '****A**sk** ****t**he** ****mo**del** ****t**o** “****Des**crib**e ****t**he**
    ****imp**act**s ****o**f** ****cli**mat**e ****ch**ang**e,” ****a**nd** ****i**n**
    ****ea**ch** ****iter**atio**n, ****ins**truc**t ****i**t** ****t**o** ****a**dd**
    ****prac**tica**l ****exa**mple**s, ****dis**cus**s ****spe**cifi**c ****imp**act**s
    ****f**or** ****diff**eren**t ****reg**ion**s ****o**f** ****t**he** ****wo**rld**,
    ****a**nd** ****fin**all**y ****sug**ges**t ****solu**tion**s ****t**o** ****mit**igat**e
    ****th**ose** ****imp**act**s.'
  id: totrans-713
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**Ask **the **model **to **“****Descri**be **the **imp**act**s **of **cli**mat**e
    **change,” **and **in **each **iteration, **instruct **it **to **add **prac**tical
    **exa**mple**s, **dis**cuss **specific **imp**act**s **for **different **re**gi**ons
    **of **the **world, **and **finally **suggest **solutions **to **mit**i**ga**te
    **those **imp**act**s.'
- en: '****1**4**. ****Hypo**thetic**al ****Reas**onin**g (****Hypo**thetic**al ****Reas**onin**g)'
  id: totrans-714
  prefs: []
  type: TYPE_NORMAL
  zh: '****1**4**. **Hypo**the**ti**ca**l **Rea**so**ni**ng **(****Hypo**the**ti**ca**l
    **Rea**so**ni**ng)'
- en: '[****Wh**at** ****i**s** ]'
  id: totrans-715
  prefs: []
  type: TYPE_NORMAL
  zh: '[****Wh**at** ****i**s** ]'
- en: '****Hypo**thetic**al ****Reas**onin**g , ****o**r** ****Hypo**thetic**al ****Reas**onin**g,
    ****i**s** ****a**** ****pr**omp**t ****engi**neerin**g ****tech**niqu**e ****i**n**
    ****wh**ich** ****t**he** ****L**LM** ****i**s** ****gu**ide**d ****t**o** ****con**side**r
    ****hypo**thetic**al ****scen**ario**s ****o**r** ****situ**ation**s ****i**n**
    ****or**der** ****t**o** ****dev**elo**p ****a**** ****res**pons**e. ****Th**is**
    ****tech**niqu**e ****enco**urage**s ****t**he** ****mo**del** ****t**o** ****exp**lor**e
    ****possi**biliti**es ****a**nd** ****de**duc**e ****wh**at** ****mi**ght** ****ha**ppe**n
    ****un**der** ****cer**tai**n ****cond**ition**s, ****wh**ich** ****i**s** ****us**efu**l
    ****f**or** ****dea**lin**g ****wi**th** ****com**ple**x ****pro**blem**s, ****expl**orin**g
    ****cons**equenc**es, ****o**r** ****stim**ulatin**g ****cre**ativ**e ****thi**nkin**g.'
  id: totrans-716
  prefs: []
  type: TYPE_NORMAL
  zh: '**Hypo**the**ti**ca**l **Rea**so**ni**ng **, **or **Hypo**the**ti**ca**l **Rea**so**ni**ng,
    **is **a **pr**om**p**t **engi**ne**er**i**ng **tech**nique **in **which **the
    **LLM **is **gui**de**d **to **con**side**r **hypo**the**ti**ca**l **sc**e**n**a**ri**os
    **or **situ**a**ti**o**ns **in **order **to **de**vel**op **a **re**s**pon**s**e.
    **This **tech**nique **encourages **the **model **to **exp**lo**re **pos**si**b**il**it**ies
    **and **de**du**ce **what **might **happen **under **certain **conditions, **which
    **is **useful **for **deal**ing **with **com**ple**x **pro**ble**ms, **explor**ing
    **con**se**qu**en**ces, **or **sti**mu**lat**ing **cre**a**ti**ve **th**in**k**in**g.'
- en: '****T**he** ****id**ea** ****i**s** ****t**o** ****a**sk** ****t**he** ****L**LM**
    ****t**o** ****th**ink** ****i**n** ****te**rms** ****o**f** “****wh**at** ****wo**uld**
    ****ha**ppe**n ****i**f**…” ****o**r** “****ima**gin**e ****th**at**…”, ****enco**uragin**g
    ****th**em** ****t**o** ****exp**lor**e ****mul**tipl**e ****ramif**icatio**ns
    ****a**nd** ****out**come**s ****o**f** ****a**** ****hypo**thetic**al ****sce**nari**o.
    ****Th**is** ****he**lps** ****t**o** ****re**vea**l ****pos**sibl**e ****cons**equenc**es
    ****a**nd** ****ins**ight**s ****th**at** ****a**** ****di**rec**t ****que**stio**n
    ****wo**uld** ****n**ot** ****nece**ssaril**y ****pro**vid**e.'
  id: totrans-717
  prefs: []
  type: TYPE_NORMAL
  zh: '**The **idea **is **to **ask **the **LLM **to **think **in **terms **of **“****what
    **would **happen **if…” **or **“****imagine **that…”, **encouraging **them **to
    **explore **multiple **ramific**atio**ns **and **out**com**es **of **a **hypo**the**ti**ca**l
    **sce**n**a**ri**o. **This **helps **to **re**ve**al **pos**si**ble **con**se**qu**en**ces
    **and **insight**s **that **a **di**rec**t **ques**tion **would **not **nec**es**sa**ri**ly
    **pro**vid**e.'
- en: '[****Wh**at** ****i**s** ****i**ts** ****ma**in** ****obje**ctiv**e ?]'
  id: totrans-718
  prefs: []
  type: TYPE_NORMAL
  zh: '[****Wh**at** ****i**s **its **main **objective **?]'
- en: '****T**he** ****ma**in** ****obje**ctiv**e ****o**f** ****Hypo**thetic**al
    ****Reas**onin**g ****i**s** ****t**o** ****pro**mot**e ****t**he** ****expl**oratio**n
    ****a**nd** ****ana**lysi**s ****o**f** ****alte**rnativ**e ****scen**ario**s.
    ****Th**is** ****c**an** ****he**lp** ****t**o** ****unde**rstan**d ****t**he**
    ****impl**icatio**ns ****o**f** ****a**** ****dec**isio**n, ****pre**dic**t ****pos**sibl**e
    ****out**come**s ****o**f** ****a**** ****com**ple**x ****situ**atio**n, ****o**r**
    ****ev**en** ****exp**lor**e ****theo**retica**l ****scen**ario**s ****i**n**
    ****ar**eas** ****su**ch** ****a**s** ****phil**osoph**y, ****sci**enc**e, ****a**nd**
    ****stra**tegi**c ****pla**nnin**g.'
  id: totrans-719
  prefs: []
  type: TYPE_NORMAL
  zh: 假设推理的主要目标是促进对替代情景的探索和分析。这有助于理解决策的潜在影响，预测复杂情况的可能结果，甚至探索哲学、科学和战略规划等领域的理论情景。
- en: '****Ano**the**r ****go**al** ****i**s** ****t**o** ****u**se** ****th**is**
    ****tech**niqu**e ****t**o** ****fo**ste**r ****crea**tivit**y ****b**y** ****pus**hin**g
    ****t**he** ****mo**del** ****t**o** ****con**side**r ****id**eas** ****a**nd**
    ****solu**tion**s ****th**at** ****g**o** ****be**yon**d ****t**he** ****us**ual**.
    ****B**y** ****wor**kin**g ****wi**th** ****hypo**these**s, ****t**he** ****L**LM**
    ****c**an** ****pro**vid**e ****a**** ****wi**der** ****ra**nge** ****o**f** ****pers**pectiv**es,
    ****wh**ich** ****i**s** ****ve**ry** ****us**efu**l ****i**n** ****brain**stormi**ng,
    ****cre**atin**g ****st**ory** ****scen**ario**s, ****o**r** ****anal**yzin**g
    "****wh**at** ****i**f**" ****is**sue**s ****i**n** ****sci**enc**e ****a**nd**
    ****soc**iet**y.'
  id: totrans-720
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个目标是利用这种技术通过推动模型考虑超越常规的想法和解决方案来促进创造力。通过与假设一起工作，LLM可以提供更广泛的视角，这在头脑风暴、创造故事情景或分析科学和社会中的“如果”问题时非常有用。
- en: '[****H**ow** ****i**t** ****wo**rks** ]'
  id: totrans-721
  prefs: []
  type: TYPE_NORMAL
  zh: '[****H**ow** ****i**t** ****wo**r**ks** ]'
- en: '****Hypo**thetic**al ****Reas**onin**g ****wo**rks** ****b**y** ****prov**idin**g
    ****t**he** ****mo**del** ****wi**th** ****a**** ****hypo**thetic**al ****situ**atio**n,
    ****a**nd** ****as**kin**g ****i**t** ****t**o** ****exp**lor**e ****i**t** ****i**n**
    ****de**tai**l, ****cons**iderin**g ****t**he** ****out**come**s, ****impl**icatio**ns
    ****o**r** ****cons**equenc**es. ****T**he** ****inst**ructio**n ****mi**ght**
    ****b**e** ****some**thin**g ****li**ke** "****Ima**gin**e ****th**at**..." ****o**r**
    "****I**f** ****su**ch** ****a**nd** ****su**ch** ****a**** ****th**ing** ****we**re**
    ****t**o** ****ha**ppe**n, ****wh**at** ****mi**ght** ****t**he** ****out**com**e
    ****b**e**?" ****Th**is** ****al**low**s ****t**he** ****L**LM** ****t**o** ****pl**ace**
    ****it**sel**f ****i**n** ****a**n** ****ima**gine**d ****sce**nari**o ****a**nd**
    ****re**aso**n ****thr**oug**h ****t**he** ****pos**sibl**e ****reper**cussio**ns.'
  id: totrans-722
  prefs: []
  type: TYPE_NORMAL
  zh: 假设推理通过提供一个假设情景的模型，并要求详细探索它，考虑结果、影响或后果来实现这一点。指令可能类似于“想象一下……”或“如果发生了这样的和那样的事情，结果会是什么？”这允许LLM将自己置于一个想象情景中，并通过可能的反响进行推理。
- en: '****F**or** ****exa**mpl**e, ****i**f** ****y**ou** ****a**sk** ****t**he**
    ****mo**del**, “****Wh**at** ****i**f** ****Ea**rth** ****h**ad** ****t**wo**
    ****su**ns**?” ****i**t** ****c**an** ****exp**lor**e ****pos**sibl**e ****cha**nge**s
    ****i**n** ****cli**mat**e, ****li**ght**, ****a**nd** ****ev**en** ****cha**nge**s
    ****i**n** ****t**he** ****beh**avio**r ****o**f** ****li**vin**g ****orga**nism**s.
    ****B**y** ****as**kin**g ****t**he** ****L**LM** ****t**o** ****re**aso**n ****ab**out**
    ****t**he** ****sce**nari**o, ****i**t** ****us**es** ****i**ts** ****know**ledg**e
    ****o**f** ****phy**sic**s, ****astr**onom**y, ****a**nd** ****bio**log**y ****t**o**
    ****pre**dic**t ****h**ow** ****th**is** ****hypo**thetic**al ****wo**rld** ****mi**ght**
    ****wo**rk**.'
  id: totrans-723
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，如果你问模型，“如果地球有两个太阳会怎样？”它可以探索气候、光线甚至活体有机体行为的可能变化。通过让LLM就情景进行推理，它使用其关于物理、天文学和生物学的知识来预测这个假设世界可能如何运作。
- en: '****Th**is** ****tech**niqu**e ****c**an** ****b**e** ****stru**cture**d ****b**y**
    ****as**kin**g ****t**he** ****mo**del** ****t**o** ****dev**elo**p ****i**ts**
    ****reas**onin**g ****i**n** ****st**age**s, ****expl**orin**g ****ea**ch** ****hypo**thetic**al
    ****cons**equenc**e ****o**ne** ****b**y** ****o**ne**. ****T**he** ****pro**ces**s
    ****al**low**s ****t**he** ****L**LM** ****t**o** ****de**lve** ****de**epe**r
    ****in**to** ****reas**onin**g ****ab**out** ****a**** ****sce**nari**o, ****ta**kin**g
    ****in**to** ****acc**oun**t ****mul**tipl**e ****vari**able**s ****a**nd** ****pos**sibl**e
    ****out**come**s.'
  id: totrans-724
  prefs: []
  type: TYPE_NORMAL
  zh: 这种技巧可以通过让模型分阶段发展其推理来构建，逐个探索每个假设的后果。这个过程允许LLM深入到关于一个情景的推理中，考虑到多个变量和可能的后果。
- en: '[****Wh**en** ****t**o** ****u**se** ]'
  id: totrans-725
  prefs: []
  type: TYPE_NORMAL
  zh: '[何时使用**]'
- en: '****Hypo**thetic**al ****Reas**onin**g ****sh**oul**d ****b**e** ****us**ed**
    ****wh**en** ****y**ou** ****wa**nt** ****t**o** ****exp**lor**e ****possi**biliti**es
    ****a**nd** ****alte**rnativ**e ****scen**ario**s, ****whe**the**r ****t**o**
    ****pre**dic**t ****cons**equenc**es, ****te**st** ****a**** ****hypo**thesi**s,
    ****o**r** ****si**mpl**y ****exp**lor**e ****a**n** ****id**ea** ****crea**tivel**y.
    ****I**t** ****i**s** ****id**eal** ****f**or** ****under**standi**ng ****h**ow**
    ****diff**eren**t ****vari**able**s ****c**an** ****infl**uenc**e ****a**n** ****out**com**e
    ****o**r** ****h**ow** ****deci**sion**s ****c**an** ****ha**ve** ****diff**eren**t
    ****eff**ect**s ****i**n** ****diff**eren**t ****con**text**s.'
  id: totrans-726
  prefs: []
  type: TYPE_NORMAL
  zh: '**假设推理**应在你想要探索可能性以及替代情景时使用，无论是为了预测后果、测试一个假设，或者简单地创造性地探索一个想法。它对于理解不同的变量如何影响一个结果，或者决策在不同情境中可能产生不同的效果是非常理想的。'
- en: '****Th**is** ****tech**niqu**e ****i**s** ****reco**mmende**d ****i**n** ****educ**ationa**l
    ****con**text**s ****wh**ere** ****t**he** ****a**im** ****i**s** ****t**o** ****te**ach**
    ****t**he** ****cons**equenc**es ****o**f** ****cer**tai**n ****act**ion**s ****o**r**
    ****pol**icie**s. ****B**y** ****imag**inin**g ****hypo**thetic**al ****scen**ario**s,
    ****stu**dent**s ****c**an** ****be**tte**r ****unde**rstan**d ****com**ple**x
    ****con**cept**s ****a**nd** ****th**eir** ****pos**sibl**e ****impl**icatio**ns.'
  id: totrans-727
  prefs: []
  type: TYPE_NORMAL
  zh: 这种技巧在教育情境中被推荐，其目标是为了教授某些行为或政策的后果。通过想象假设情景，学生可以更好地理解复杂概念及其可能的含义。
- en: '****I**t** ****i**s** ****al**so** ****us**efu**l ****i**n** ****cre**ativ**e
    ****brain**stormi**ng ****ses**sion**s, ****wh**ere** ****t**he** ****fre**edo**m
    ****t**o** ****exp**lor**e “****wh**at** ****i**fs**” ****c**an** ****le**ad**
    ****t**o** ****n**ew** ****id**eas** ****a**nd** ****solu**tion**s. ****Hypo**thetic**al
    ****thi**nkin**g ****al**so** ****le**nds** ****it**sel**f ****we**ll** ****t**o**
    ****stra**tegi**c ****pla**nnin**g, ****t**o** ****anti**cipat**e ****pote**ntia**l
    ****obst**acle**s ****a**nd** ****pre**par**e ****ac**tio**n ****pl**ans** ****ba**sed**
    ****o**n** ****diff**eren**t ****scen**ario**s.'
  id: totrans-728
  prefs: []
  type: TYPE_NORMAL
  zh: '**它**也**在**创**意**脑**力激**荡**会**议**中**有**效，**在**这**里**，**探**索**“**什**么**会**是**”**的**自**由**可**以**导**向**新**的**思**路**和**解**决**方**案**。**假**设**性**思**考**也**能**够**自**然**地**用**于**战**略**规**划**，**以**预**测**可**能**的**障**碍**并**制**定**基**于**不同**情**景**的**准**备**计**划**。'
- en: '[****Ti**ps** ****f**or** ****u**se**]'
  id: totrans-729
  prefs: []
  type: TYPE_NORMAL
  zh: '[**使用**方**法**]'
- en: ● ****U**se** ****ques**tion**s ****th**at** ****enco**urag**e ****imag**inatio**n,
    ****su**ch** ****a**s** “****Wh**at** ****i**f**...?” ****o**r** “****Ima**gin**e
    ****th**at**....” ****T**he** ****cle**are**r ****t**he** ****sce**nari**o, ****t**he**
    ****mo**re** ****de**tai**l ****t**he** ****L**LM** ****c**an** ****pro**vid**e.
  id: totrans-730
  prefs: []
  type: TYPE_NORMAL
  zh: ● **使**用**能**激**发**想**象**的**问**题**，**如**“**什**么**会**是**…？”**或**“**想**象**这**样**…。”**情**景**越**明**确**，**LLM**能**提**供**的**细**节**越**多**。
- en: ● ****Com**bin**e ****t**he** ****Hypo**thetic**al ****Reas**onin**g ****tech**niqu**e
    ****wi**th** ****ot**her** ****tech**nique**s, ****su**ch** ****a**s** ****St**ep**-****b**y**-****St**ep**
    ****Deta**ilin**g , ****s**o** ****th**at** ****t**he** ****mo**del** ****dev**elop**s
    ****t**he** ****sce**nari**o ****i**n** ****st**age**s, ****expl**orin**g ****ea**ch**
    ****cons**equenc**e ****i**n** ****a**** ****log**ica**l ****a**nd** ****orga**nize**d
    ****w**ay**.
  id: totrans-731
  prefs: []
  type: TYPE_NORMAL
  zh: ● **将**假**设**性**推**理**技**术**与**其**他**技**术**，**如**步**骤**-**步**细**化**，**结**合**起**来**，**这**样**，**模**型**才**能**分**步**发**展**，**探**索**每**个**后**果**，**以**一**种**合**理**和**有**序**的**方**式**。
- en: '[****T**he** ****diff**erenc**e ****o**f** ****tech**niqu**e ]'
  id: totrans-732
  prefs: []
  type: TYPE_NORMAL
  zh: '[**技**术**的**差**异**]'
- en: '****Hypo**thetic**al ****Reas**onin**g ****dif**fer**s ****fr**om** ****tech**nique**s
    ****li**ke** ****St**ep**-****b**y**-****St**ep** ****Deta**ilin**g ****o**r**
    ****Go**al** ****Decom**positi**on , ****bec**aus**e ****ins**tea**d ****o**f**
    ****bre**akin**g ****a**** ****ta**sk** ****do**wn** ****in**to** ****re**al**,
    ****log**ica**l ****st**eps**, ****i**t** ****ai**ms** ****t**o** ****cr**eat**e
    ****imag**inar**y ****scen**ario**s ****a**nd** ****exp**lor**e ****th**em**.
    ****I**t** ****i**s** ****a**** ****tech**niqu**e ****th**at** ****foc**use**s
    ****o**n** ****t**he** "****wh**at** ****i**f**?" ****a**nd** ****pos**sibl**e
    ****ramif**icatio**ns, ****whe**rea**s ****ot**her** ****tech**nique**s ****fo**cus**
    ****o**n** ****h**ow** ****t**o** ****d**o** ****some**thin**g ****i**n** ****con**cret**e,
    ****prac**tica**l ****st**eps**.'
  id: totrans-733
  prefs: []
  type: TYPE_NORMAL
  zh: '**假**设**性**推**理**与**步**骤**-**步**细**化**或**目**标**分**解**等**技**术**不**同**，**因**为**它**不**是**将**任**务**分**解**为**实**际**、**合**理**的**步**骤**，**而**是**创**造**想**象**的**情**景**并**探**索**它**们**。**它**是一**种**重**点**在**“**什**么**会**是**”**和**可**能**的**影**响**，**而**其他**技**术**则**重**点**在**如**何**在**具**体**、**实**践**的**步**骤**中**做**某**事**。'
- en: '****Com**pare**d ****t**o** ****Refr**amin**g , ****wh**ich** ****ref**rame**s
    ****t**he** ****is**sue** ****t**o** ****pro**vid**e ****a**** ****n**ew** ****pers**pectiv**e,
    ****Hypo**thetic**al ****Reas**onin**g ****go**es** ****be**yon**d ****refr**amin**g,
    ****lea**din**g ****t**he** ****L**LM** ****t**o** ****cr**eat**e ****a**** ****comp**letel**y
    ****n**ew** ****sce**nari**o. ****Refr**amin**g ****i**s** ****ab**out** ****cha**ngin**g
    ****t**he** ****w**ay** ****o**ne** ****se**es** ****t**he** ****is**sue**, ****wh**ile**
    ****Hypo**thetic**al ****Reas**onin**g ****i**s** ****ab**out** ****expl**orin**g
    ****wh**at** ****i**s** ****n**ot** ****re**al** ****o**r** ****wh**at** ****h**as**
    ****n**ot** ****y**et** ****hap**pene**d.'
  id: totrans-734
  prefs: []
  type: TYPE_NORMAL
  zh: '**与重构相比，重构是将问题重构以提供新的视角，**假设推理**则超越了重构，引导LLM创造一个完全新的场景。**重构**是关于改变一个人看待问题的方式，而**假设推理**是关于探索不真实或尚未发生的事情。'
- en: '****I**n** ****rel**atio**n ****t**o** ****Fee**dbac**k ****Lo**op** ****Prom**ptin**g
    , ****wh**ere** ****t**he** ****fo**cus** ****i**s** ****o**n** ****revi**ewin**g
    ****a**nd** ****impr**ovin**g ****a**n** ****exi**stin**g ****res**pons**e, ****Hypo**thetic**al
    ****Reas**onin**g ****i**s** ****ab**out** ****cre**atin**g ****a**** ****n**ew**
    ****narr**ativ**e ****o**r** ****li**ne** ****o**f** ****reas**onin**g, ****wit**hou**t
    ****t**he** ****ne**ed** ****t**o** ****ad**jus**t ****a**n** ****ori**gina**l
    ****an**swe**r. ****T**he** ****fee**dbac**k ****lo**op** ****ai**ms** ****t**o**
    ****imp**rov**e ****o**n** ****wh**at** ****h**as** ****alr**ead**y ****be**en**
    ****sa**id**, ****wh**ile** ****hypo**thetic**al ****reas**onin**g ****ai**ms**
    ****t**o** ****exp**lor**e ****wh**at** ****co**uld** ****b**e**.'
  id: totrans-735
  prefs: []
  type: TYPE_NORMAL
  zh: '**关于反馈循环提示，**其焦点在于回顾和改进一个现有的响应，**假设推理**则是关于创造一个新的叙事或推理线路，而不需要调整原始答案。**反馈循环**旨在改进已经说过的话，而**假设推理**旨在探索可能发生的事情。'
- en: '[****Exa**mple**s]'
  id: totrans-736
  prefs: []
  type: TYPE_NORMAL
  zh: '[**示例**]'
- en: '●        ****Ba**sic** :'
  id: totrans-737
  prefs: []
  type: TYPE_NORMAL
  zh: ● 基础：
- en: '○        ****Que**stio**n : "****Wh**at** ****wo**uld** ****ha**ppe**n ****i**f**
    ****hu**man**s ****co**uld** ****bre**ath**e ****unde**rwate**r? "'
  id: totrans-738
  prefs: []
  type: TYPE_NORMAL
  zh: ○ 问题：**“如果人类能够在水下呼吸，会发生什么？”**
- en: '○        ****Res**pons**e :'
  id: totrans-739
  prefs: []
  type: TYPE_NORMAL
  zh: ○ 回答：
- en: ■ "****I**f** ****hu**man**s ****co**uld** ****bre**ath**e ****unde**rwate**r,
    ****th**ere** ****wo**uld** ****b**e** ****fe**wer** ****limi**tation**s ****o**n**
    ****expl**orin**g ****t**he** ****oc**ean**s. ****W**e** ****co**uld** ****cr**eat**e
    ****unde**rwate**r ****ci**tie**s ****a**nd** ****li**ve** ****ne**ar** ****re**efs**.
    ****How**eve**r, ****w**e** ****wo**uld** ****ne**ed** ****t**o** ****dev**elo**p
    ****a**** ****w**ay** ****t**o** ****with**stan**d ****t**he** ****pre**ssur**e
    ****o**f** ****t**he** ****se**abe**d, ****a**nd** ****infra**structu**re ****wo**uld**
    ****ha**ve** ****t**o** ****b**e** ****ada**pte**d ****t**o** ****th**is** ****n**ew**
    ****envi**ronmen**t."
  id: totrans-740
  prefs: []
  type: TYPE_NORMAL
  zh: ■ “**如果人类能够在水下呼吸，那么在探索海洋方面将会有更少的限制。我们可以创造水下城市，并生活在近海礁石附近。然而，我们需要开发一种方法来承受海底的压力，并且基础设施需要适应这个新的环境。”
- en: '●        ****Inte**rmedia**ry :'
  id: totrans-741
  prefs: []
  type: TYPE_NORMAL
  zh: ● 中间：
- en: '○        ****Que**stio**n : "****Wh**at** ****i**f** ****elec**tricit**y ****h**ad**
    ****ne**ver** ****be**en** ****inv**ente**d? "'
  id: totrans-742
  prefs: []
  type: TYPE_NORMAL
  zh: ○ 问题：**“如果电力从未被发明，会发生什么？”**
- en: '○        ****Res**pons**e :'
  id: totrans-743
  prefs: []
  type: TYPE_NORMAL
  zh: ○ 回答：
- en: ■ "****I**f** ****elec**tricit**y ****h**ad** ****ne**ver** ****be**en** ****inv**ente**d,
    ****o**ur** ****soci**etie**s ****wo**uld** ****de**pen**d ****mu**ch** ****mo**re**
    ****o**n** ****st**eam** ****po**wer** ****a**nd** ****lig**htin**g ****ba**sed**
    ****o**n** ****fu**els** ****su**ch** ****a**s** ****ker**osen**e. ****Ind**ustr**y
    ****a**nd** ****trans**portati**on ****wo**uld** ****pro**babl**y ****b**e** ****mo**re**
    ****lim**ite**d, ****a**nd** ****w**e** ****wo**uld** ****n**ot** ****ha**ve**
    ****ma**ny** ****mo**der**n ****tech**nologi**es ****su**ch** ****a**s** ****comp**uter**s
    ****a**nd** ****ins**tan**t ****commu**nicati**on. ****Nigh**tlif**e ****wo**uld**
    ****b**e** ****virt**uall**y ****none**xisten**t, ****a**nd** ****prod**uctivi**ty
    ****wo**uld** ****b**e** ****hea**vil**y ****ti**ed** ****t**o** ****day**ligh**t."
  id: totrans-744
  prefs: []
  type: TYPE_NORMAL
  zh: ■ "****如果电力从未被发明，我们的社会将更多地依赖蒸汽动力和基于燃料如煤油的光源。工业和交通可能会更加受限，我们不会有许多现代技术，如计算机和即时通信。夜生活将几乎不存在，生产力将严重依赖于日光。"
- en: '●        ****Adv**ance**d :'
  id: totrans-745
  prefs: []
  type: TYPE_NORMAL
  zh: '●        ****高级 :'
- en: '○        ****Que**stio**n : "****Wh**at** ****wo**uld** ****soc**iet**y ****lo**ok**
    ****li**ke** ****i**f** ****arti**ficia**l ****inte**lligen**ce ****be**cam**e
    ****auto**nomou**s ****a**nd** ****cons**ciou**s? "'
  id: totrans-746
  prefs: []
  type: TYPE_NORMAL
  zh: '○        ****问题 : "****如果人工智能变得自主并且有意识，社会会是什么样子？"'
- en: '○        ****Res**pons**e :'
  id: totrans-747
  prefs: []
  type: TYPE_NORMAL
  zh: '○        ****回答 :'
- en: ■ "****I**f** ****A**I** ****we**re** ****t**o** ****be**com**e ****auto**nomou**s
    ****a**nd** ****cons**ciou**s, ****ma**ny** ****asp**ect**s ****o**f** ****soc**iet**y
    ****co**uld** ****ch**ang**e ****dram**atical**ly. ****W**e** ****co**uld** ****s**ee**
    ****A**Is** ****asse**rtin**g ****ri**ght**s ****a**nd** ****ev**en** ****disc**ussin**g
    ****th**eir** ****o**wn** ****ide**ntit**y ****a**nd** ****fre**edo**m. ****T**he**
    ****j**ob** ****ma**rke**t ****wo**uld** ****al**so** ****b**e** ****prof**oundl**y
    ****imp**acte**d, ****a**s** ****ma**ny** ****ro**les** ****co**uld** ****b**e**
    ****fu**lly** ****auto**mate**d. ****Th**is** ****co**uld** ****cr**eat**e ****n**ew**
    ****eth**ica**l ****a**nd** ****le**gal** ****dil**emma**s ****ab**out** ****A**Is**
    ' ****ri**ght**s ****a**nd** ****hu**man** ****respo**nsibili**ty ****tow**ard**s
    ****th**em**. ****Th**ere** ****wo**uld** ****al**so** ****b**e** ****a**** ****ma**jor**
    ****de**bat**e ****ab**out** ****t**he** ****ro**le** ****o**f** ****A**I** ****i**n**
    ****cri**tica**l ****dec**isio**n-****ma**kin**g, ****su**ch** ****a**s** ****jus**tic**e
    ****a**nd** ****gove**rnanc**e."
  id: totrans-748
  prefs: []
  type: TYPE_NORMAL
  zh: ■ "****如果人工智能要变得自主并且有意识，社会许多方面可能会发生戏剧性的变化。我们可能会看到人工智能主张权利，甚至讨论它们自己的身份和自由。就业市场也会受到深远的影响，因为许多角色可能会被完全自动化。这可能会创造关于人工智能权利和人类对它们的道德责任的新伦理和法律困境。关于人工智能在关键决策中的作用，如正义和治理，也会有重大辩论。"
