    by invoking the describe() method that is available for any NumPy DataFrame. The
    describe() method is very useful: you will see various statistical quantities,
    such as the mean, standard deviation minimum, and maximum performed column wise
    (not row wise), along with values for the 25th, 50th, and 75th percentiles. The
    output of [Listing 3.2](#list3-2) is here:'
  id: totrans-1137
  prefs: []
