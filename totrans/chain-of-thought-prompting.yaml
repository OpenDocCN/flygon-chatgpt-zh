  zh: 生成上述输出的 Python 代码可在以下链接找到：github.com/edwardchalk/SimulatingThought. [https://github.com/edwardchalk/SimulatingThought/](https://github.com/edwardchalk/SimulatingThought/)
- en: You will need to add in your ChatGPT API access token and organisation ID into
    the beginning of the Python script.
  id: totrans-1614
