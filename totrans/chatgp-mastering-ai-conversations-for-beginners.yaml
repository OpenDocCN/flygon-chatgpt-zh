    ****lea**rnin**g ****al**low**s ****comp**uter**s ****t**o** ****le**arn** ****thr**oug**h
    ****expe**rienc**e ****a**nd** ****imp**rov**e ****th**eir** ****sys**tem**s ****wit**hou**t
    ****prog**rammer**s ****upd**atin**g ****th**eir** ****co**de**. ****Th**is**
    ****le**ads** ****A**I** ****t**o** ****be**ing** ****mo**re** ****acc**urat**e
    ****i**n** ****i**ts** ****abi**lit**y ****t**o** ****pre**dic**t ****out**come**s
    ****rel**ate**d ****t**o** ****i**ts** ****cen**tra**l ****fun**ctio**n. ****Th**ere**
    ****a**re** ****ma**ny** ****func**tiona**l ****appl**icatio**ns ****f**or** ****mac**hin**e
    ****lea**rnin**g ****i**n** ****al**mos**t ****ev**ery** ****ind**ustr**y ****o**ut**
    ****th**ere**, ****fr**om** ****se**lf**-****dri**vin**g ****ca**rs** ****t**o**
    ****so**cia**l ****me**dia** ****mark**etin**g. ****I**t**’****s**** ****al**so**
    ****t**he** ****re**aso**n ****w**hy** ****w**e** ****ha**ve** ****EL**IZA**,
    ****PA**RRY**, ****a**nd** ****o**f** ****co**urs**e, ****Cha**tGP**T ****i**n**
    ****t**he** ****fi**rst** ****pl**ace**!'
  id: totrans-317
  prefs: []
  type: TYPE_NORMAL
  zh: '**Let’s** **start** **with** **the** **definition**. **A** **branch** **of**
    **artificial** **intelligence**, **machine** **learning** **allows** **computers**
    **to** **learn** **through** **experience** **and** **improve** **their** **systems**
    **without** **programmers** **updating** **their** **code**. **This** **leads**
    **AI** **to** **be** **more** **accurate** **in** **its** **ability** **to** **predict**
    **outcomes** **related** **to** **its** **central** **function**. **There** **are**
    **many** **functional** **applications** **for** **machine** **learning** **in**
    **almost** **every** **industry** **out** **there**, **from** **self-driving**
    **cars** **to** **social** **media** **marketing**. **It’s** **also** **the**
    **reason** **why** **we** **have** **EL**IZA**, **PA**RRY**, **and** **of** **course**,
    **ChatGPT** **in** **the** **first** **place**!'
- en: '****Acco**rdin**g ****t**o** ****a**** ****20**20** ****su**rve**y ****cond**ucte**d
    ****b**y** ****Del**oitt**e, ****o**ne** ****o**f** ****t**he** “****b**ig** ****fo**ur**”
    ****acco**untin**g ****fi**rms**, ****mo**re** ****th**an** ****6**7**% ****o**f**
    ****comp**anie**s ****oper**atin**g ****to**day** ****u**se** ****so**me** ****fo**rm**
    ****o**f** ****mac**hin**e ****lea**rnin**g ****i**n** ****th**eir** ****da**ily**
    ****oper**ation**s, ****wi**th** ****th**at** ****perc**entag**e ****gro**win**g
    ****ye**ar**-****i**n**, ****ye**ar**-****o**ut** (****Br**own**, ****20**21**).
    ****A**s** ****w**e** ****s**aw** ****fr**om** ****t**he** ****Tu**rin**g ****Te**st**
