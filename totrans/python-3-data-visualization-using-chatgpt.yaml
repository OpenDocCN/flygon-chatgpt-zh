- en: '*PREFACE*'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '**WHAT IS THE PRIMARY VALUE PROPOSITION FOR THIS BOOK?**'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: This book is designed to show readers the concepts of Python 3 programming and
    the art of data visualization. [Chapter 1](ch01.xhtml) introduces the essentials
    of Python, covering a vast array of topics from basic data types, loops, and functions
    to more advanced constructs like dictionaries, sets, and matrices. In [Chapter
    2](ch02.xhtml), the focus shifts to NumPy and its powerful array operations, leading
    into the world of data visualization using prominent libraries such as Matplotlib.
    [Chapter 6](ch06.xhtml) includes Seaborn’s rich visualization tools, offering
    insights into datasets like Iris and Titanic. Further, the book covers other visualization
    tools and techniques, including SVG graphics, D3 for dynamic visualizations, and
    more. [Chapter 7](ch07.xhtml) covers information about the main features of ChatGPT
    and GPT-4, as well as some of their competitors. [Chapter 8](ch08.xhtml) contains
    examples of using ChatGPT in order to perform data visualization, such as charts
    and graphs that are based on datasets (e.g., the Titanic dataset). From foundational
    Python concepts to the intricacies of data visualization, this book serves as
    a comprehensive resource for both beginners and seasoned professionals.
  prefs: []
  type: TYPE_NORMAL
- en: '**THE TARGET AUDIENCE**'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: This book is intended primarily for people who have worked with Python and are
    interested in learning about graphics effects with Python libraries. This book
    is also intended to reach an international audience of readers with highly diverse
    backgrounds in various age groups. Consequently, this book uses standard English
    rather than colloquial expressions that might be confusing to those readers. This
    book provides a comfortable and meaningful learning experience for the intended
    readers.
  prefs: []
  type: TYPE_NORMAL
- en: '**WHY ARE THE CODE SAMPLES PRIMARILY IN PYTHON?**'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Most of the code samples are short (usually less than one page and sometimes
    less than half a page), and if necessary, you can easily and quickly copy/paste
    the code into a new Jupyter notebook. For the Python code samples that reference
    a CSV file, you do not need any additional code in the corresponding Jupyter notebook
    to access the CSV file. Moreover, the code samples execute quickly, so you won’t
    need to avail yourself of the free GPU that is provided in Google Colaboratory.
  prefs: []
  type: TYPE_NORMAL
- en: 'If you do decide to use Google Colaboratory, you can easily copy/paste the
    Python code into a notebook, and also use the upload feature to upload existing
    Jupyter notebooks. Keep in mind the following point: if the Python code references
    a CSV file, make sure that you include the appropriate code snippet (details are
    available online) to access the CSV file in the corresponding Jupyter notebook
    in Google Colaboratory.'
  prefs: []
  type: TYPE_NORMAL
- en: '**WHY DOES THIS BOOK INCLUDE SKLEARN MATERIAL?**'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: First, keep in mind that the Sklearn material in this book is minimalistic because
    this book is not about machine learning. Second, the Sklearn material is located
    in [Chapter 6](ch06.xhtml) where you will learn about some of the Sklearn built-in
    datasets. If you decide to delve into machine learning, you will have already
    been introduced to some aspects of Sklearn.
  prefs: []
  type: TYPE_NORMAL
- en: '**GETTING THE MOST FROM THIS BOOK**'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Some programmers learn well from prose, others learn well from sample code (and
    lots of it), which means that there’s no single style that can be used for everyone.
  prefs: []
  type: TYPE_NORMAL
- en: Moreover, some programmers want to run the code first, see what it does, and
    then return to the code to delve into the details (and others use the opposite
    approach).
  prefs: []
  type: TYPE_NORMAL
- en: 'Consequently, there are various types of code samples in this book: some are
    short, some are long, and other code samples “build” from earlier code samples.'
  prefs: []
  type: TYPE_NORMAL
- en: '**WHAT DO I NEED TO KNOW FOR THIS BOOK?**'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Current knowledge of Python 3.x is the most helpful skill. Knowledge of other
    programming languages (such as Java) can also be helpful because of the exposure
    to programming concepts and constructs. The less technical knowledge that you
    have, the more diligence will be required in order to understand the various topics
    that are covered.
  prefs: []
  type: TYPE_NORMAL
- en: As for the non-technical skills, it’s important to have a strong desire to learn
    about data visualization, along with the motivation and discipline to read and
    understand the code samples.
  prefs: []
  type: TYPE_NORMAL
- en: '**DO THE COMPANION FILES OBVIATE THE NEED FOR THIS BOOK?**'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The companion files contain all the code samples to save you time and effort
    from the error-prone process of manually typing code into a text file. In addition,
    there are situations in which you might not have easy access to the companion
    disc. Furthermore, the code samples in the book provide explanations that are
    not available on the companion files.
  prefs: []
  type: TYPE_NORMAL
- en: '**DOES THIS BOOK CONTAIN PRODUCTION-LEVEL CODE SAMPLES?**'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The primary purpose of the code samples in this book is to show you Python-based
    libraries for data visualization. Clarity has higher priority than writing more
    compact code that is more difficult to understand (and possibly more prone to
    bugs). If you decide to use any of the code in this book in a production website,
    you ought to subject that code to the same rigorous analysis as the other parts
    of your code base.
  prefs: []
  type: TYPE_NORMAL
- en: '**HOW DO I SET UP A COMMAND SHELL?**'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'If you are a Mac user, there are three ways to do so. The first method is to
    use Finder to navigate to Applications > Utilities and then double click on the
    Utilities application. Next, if you already have a command shell available, you
    can launch a new command shell by typing the following command:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: A second method for Mac users is to open a new command shell on a MacBook from
    a command shell that is already visible simply by clicking command+n in that command
    shell, and your Mac will launch another command shell.
  prefs: []
  type: TYPE_NORMAL
- en: If you are a PC user, you can install Cygwin (open source *https://cygwin.com/*)
    that simulates bash commands, or use another toolkit such as MKS (a commercial
    product). Please read the online documentation that describes the download and
    installation process. Note that custom aliases are not automatically set if they
    are defined in a file other than the main start-up file (such as .bash_login).
  prefs: []
  type: TYPE_NORMAL
- en: '**COMPANION FILES**'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: All the code samples and figures in this book may be obtained by writing to
    the publisher at *info@merclearning.com*.
  prefs: []
  type: TYPE_NORMAL
- en: '**WHAT ARE THE “NEXT STEPS” AFTER FINISHING THIS BOOK?**'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The answer to this question varies widely, mainly because the answer depends
    heavily on your objectives. If you are interested primarily in NLP, then you can
    learn more advanced concepts, such as attention, transformers, and the BERT-related
    models.
  prefs: []
  type: TYPE_NORMAL
- en: 'If you are primarily interested in machine learning, there are some subfields
    of machine learning, such as deep learning and reinforcement learning (and deep
    reinforcement learning) that might appeal to you. Fortunately, there are many
    resources available, and you can perform an Internet search for those resources.
    One other point: the aspects of machine learning for you to learn depend on who
    you are: the needs of a machine learning engineer, data scientist, manager, student
    or software developer are all different.'
  prefs: []
  type: TYPE_NORMAL
- en: '**O. Campesato**'
  prefs: []
  type: TYPE_NORMAL
- en: '**December 2023**'
  prefs: []
  type: TYPE_NORMAL
- en: CHAPTER 1
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '*INTRODUCTION TO PYTHON*'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This chapter contains an introduction to Python, with information about useful
    tools for installing modules, basic constructs, and how to work with some data
    types.
  prefs: []
  type: TYPE_NORMAL
- en: The first part of this chapter covers how to install Python, some environment
    variables, and how to use the interpreter. You will see code samples and also
    how to save code in text files that you can launch from the command line. The
    second part of this chapter shows you how to work with simple data types, such
    as numbers, fractions, and strings. The final part of this chapter discusses exceptions
    and how to use them in scripts.
  prefs: []
  type: TYPE_NORMAL
- en: '**NOTE** *The Python files in this book are for Python 3.x.*'
  prefs: []
  type: TYPE_NORMAL
- en: '**TOOLS FOR PYTHON**'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The Anaconda Python distribution available for Windows, Linux, and Mac is downloadable
    at *[http://continuum.io/downloads](http://continuum.io/downloads)*.
  prefs: []
  type: TYPE_NORMAL
- en: Anaconda is well-suited for modules such as numpy and scipy, and if you are
    a Windows user, Anaconda appears to be a better alternative.
  prefs: []
  type: TYPE_NORMAL
- en: '**easy_install and pip**'
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'Both easy_install and pip are easy to use when you need to install Python modules.
    Whenever you need to install a module (and there are many in this book), use either
    easy_install or pip with the following syntax:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: '**NOTE** *Python-based modules are easier to install, whereas modules with
    code written in C are usually faster but more difficult in terms of installation.*'
  prefs: []
  type: TYPE_NORMAL
- en: '**virtualenv**'
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: The virtualenv tool enables you to create isolated Python environments, and
    its home page is at *[http://www.virtualenv.org/en/latest/virtualenv.html](http://www.virtualenv.org/en/latest/virtualenv.html)*.
  prefs: []
  type: TYPE_NORMAL
- en: virtualenv addresses the problem of preserving the correct dependencies and
    versions (and indirectly, permissions) for different applications. If you are
    a Python novice, you might not need virtualenv right now, but keep this tool in
    mind.
  prefs: []
  type: TYPE_NORMAL
- en: '**IPython**'
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'Another very good tool is IPython (which won a Jolt award), and its home page
    is at *[http://ipython.org/install.html](http://ipython.org/install.html)*. Two
    very nice features of IPython are tab expansion and “?” (textual assistance).
    An example of tab expansion is shown here:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: 'In the preceding session, if you type the characters di, IPython responds with
    the following line that contains all the functions that start with the letters
    di:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: 'If you enter a question mark (“?”), IPython provides textual assistance, the
    first part of which is here:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: The next section shows you how to check whether Python is installed on your
    machine, and also where you can download Python.
  prefs: []
  type: TYPE_NORMAL
- en: '**PYTHON INSTALLATION**'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Before you download anything, check if you have Python already installed on
    your machine (which is likely if you have a MacBook or a Linux machine) by typing
    the following command in a command shell:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: 'The output for the MacBook used in this book is here:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: '**NOTE** *Install Python 3.9 (or as close as possible to this version) on your
    machine so that you will have the same version of Python that was used to test
    the Python files in this book.*'
  prefs: []
  type: TYPE_NORMAL
- en: 'If you need to install Python on your machine, navigate to the Python home
    page and select the downloads link or navigate directly to this website:'
  prefs: []
  type: TYPE_NORMAL
- en: '*[http://www.python.org/download/](http://www.python.org/download/)*'
  prefs: []
  type: TYPE_NORMAL
- en: 'In addition, PythonWin is available for Windows, and its home page is here:'
  prefs: []
  type: TYPE_NORMAL
- en: '*[http://www.cgl.ucsf.edu/Outreach/pc204/pythonwin.html](http://www.cgl.ucsf.edu/Outreach/pc204/pythonwin.html)*'
  prefs: []
  type: TYPE_NORMAL
- en: Use any text editor that can create, edit, and save Python scripts, and save
    them as plain text files (do not use Microsoft Word). After you have Python installed
    and configured on your machine, you are ready to work with the Python scripts
    in this book.
  prefs: []
  type: TYPE_NORMAL
- en: '**SETTING THE PATH ENVIRONMENT VARIABLE (WINDOWS ONLY)**'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'The PATH environment variable specifies a list of directories that are searched
    whenever you specify an executable program from the command line. The following
    URL has a useful guide to setting up your environment so that the Python executable
    is always available in every command shell:'
  prefs: []
  type: TYPE_NORMAL
- en: '*[http://www.blog.pythonlibrary.org/2011/11/24/python-101-setting-up-python-on-windows/](http://www.blog.pythonlibrary.org/2011/11/24/python-101-setting-up-python-on-windows/)*'
  prefs: []
  type: TYPE_NORMAL
- en: '**LAUNCHING PYTHON ON YOUR MACHINE**'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'There are three different ways to launch Python:'
  prefs: []
  type: TYPE_NORMAL
- en: Use the Python Interactive Interpreter.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Launch Python scripts from the command line.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Use an IDE.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The next section shows you how to launch the Python interpreter from the command
    line, and later in this chapter you will learn how to launch scripts from the
    command line and also about IDEs.
  prefs: []
  type: TYPE_NORMAL
- en: '**NOTE** *The emphasis in this book is to launch Python scripts from the command
    line or to enter code in the Python interpreter.*'
  prefs: []
  type: TYPE_NORMAL
- en: '**The Python Interactive Interpreter**'
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'Launch the interactive interpreter from the command line by opening a command
    shell and typing the following command:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: 'You will see the following prompt (or something similar):'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: 'Now type the expression 2 + 7 at the prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  prefs: []
  type: TYPE_PRE
- en: 'Python displays the following result:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE10]'
  prefs: []
  type: TYPE_PRE
- en: Press ctrl-d to exit the Python shell.
  prefs: []
  type: TYPE_NORMAL
- en: 'You can launch any Python script from the command line by preceding it with
    the word “python.” For example, if you have a script myscript.py that contains
    commands, launch the script as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE11]'
  prefs: []
  type: TYPE_PRE
- en: 'As a simple illustration, suppose that the script myscript.py contains the
    following code:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE12]'
  prefs: []
  type: TYPE_PRE
- en: 'When you launch the preceding script, you will see the following output:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE13]'
  prefs: []
  type: TYPE_PRE
- en: '**PYTHON IDENTIFIERS**'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'An *identifier* is the name of a variable, function, class, module, or other
    Python object, and a valid identifier conforms to the following rules:'
  prefs: []
  type: TYPE_NORMAL
- en: starts with a letter A to Z or a to z or an underscore (_)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: zero or more letters, underscores, and digits (0 to 9)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**NOTE** *Python identifiers cannot contain characters such as @, $, and %.*'
  prefs: []
  type: TYPE_NORMAL
- en: 'Python is a case-sensitive language, so Abc and abc are different identifiers
    in Python. In addition, Python has the following naming conventions:'
  prefs: []
  type: TYPE_NORMAL
- en: Class names start with an uppercase letter and all other identifiers with a
    lowercase letter
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: An initial underscore is used for private identifiers.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Two initial underscores are used for strongly private identifiers.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A Python identifier with two initial underscores and two trailing underscore
    characters indicates a language-defined special name.
  prefs: []
  type: TYPE_NORMAL
- en: '**LINES, INDENTATION, AND MULTI-LINE COMMENTS**'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Unlike other programming languages (such as Java or Objective-C), Python uses
    indentation instead of curly braces for code blocks. Indentation must be consistent
    in a code block, as shown here:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE14]'
  prefs: []
  type: TYPE_PRE
- en: 'Multi-line statements in Python can terminate with a new line or the backslash
    (“\”) character, as shown here:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE15]'
  prefs: []
  type: TYPE_PRE
- en: Obviously, you can place x1, x2, and x3 on the same line, so there is no reason
    to use three separate lines; however, this functionality is available in case
    you need to add a set of variables that do not fit on a single line.
  prefs: []
  type: TYPE_NORMAL
- en: 'You can specify multiple statements in one line by using a semicolon (“;”)
    to separate each statement, as shown here:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE16]'
  prefs: []
  type: TYPE_PRE
- en: 'The output of the preceding code snippet is here:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE17]'
  prefs: []
  type: TYPE_PRE
- en: '**NOTE** *The use of semi-colons and the continuation character are discouraged
    in Python.*'
  prefs: []
  type: TYPE_NORMAL
- en: '**QUOTATIONS AND COMMENTS IN PYTHON**'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Python allows single (''), double ("), and triple ('''''' or """) quotation
    marks for string literals, provided that they match at the beginning and the end
    of the string. You can use triple quotation marks for strings that span multiple
    lines. The following examples are legal Python strings:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE18]'
  prefs: []
  type: TYPE_PRE
- en: 'A string literal that begins with the letter “r” (for “raw”) treats everything
    as a literal character and “escapes” the meaning of meta characters, as shown
    here:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE19]'
  prefs: []
  type: TYPE_PRE
- en: 'The output of the preceding code block is here:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE20]'
  prefs: []
  type: TYPE_PRE
- en: 'You can embed a single quotation mark in a pair of double quotation marks (and
    vice versa) to display a single quotation mark or double quotation marks. Another
    way to accomplish the same result is to precede single or double quotation marks
    with a backslash (“\”) character. The following code block illustrates these techniques:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE21]'
  prefs: []
  type: TYPE_PRE
- en: 'The output of the preceding code block is here:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE22]'
  prefs: []
  type: TYPE_PRE
- en: 'A hash sign (#) that is not inside a string literal is the character that indicates
    the beginning of a comment. Moreover, all characters after the # and up to the
    physical line end are part of the comment (and ignored by the Python interpreter).
    Consider the following code block:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE23]'
  prefs: []
  type: TYPE_PRE
- en: 'This will produce following result:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE24]'
  prefs: []
  type: TYPE_PRE
- en: 'A comment may be on the same line after a statement or expression:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE25]'
  prefs: []
  type: TYPE_PRE
- en: 'You can comment multiple lines as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE26]'
  prefs: []
  type: TYPE_PRE
- en: A blank line in Python is a line containing only whitespace, a comment, or both.
  prefs: []
  type: TYPE_NORMAL
- en: '**SAVING YOUR CODE IN A MODULE**'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Earlier you saw how to launch the Python interpreter from the command line
    and then enter commands. However, everything you type in the Python interpreter
    is only valid for the current session: if you exit the interpreter and then launch
    the interpreter again, your previous definitions are no longer valid. Fortunately,
    Python enables you to store code in a text file, as discussed in the next section.'
  prefs: []
  type: TYPE_NORMAL
- en: A *module* in Python is a text file that contains Python statements. In the
    previous section, you saw how the interpreter enables you to test code snippets
    whose definitions are valid for the current session. If you want to retain the
    code snippets and other definitions, place them in a text file so that you can
    execute that code outside of the interpreter.
  prefs: []
  type: TYPE_NORMAL
- en: The outermost statements in a Python program are executed from top to bottom
    when the module is imported for the first time, which will then set up its variables
    and functions.
  prefs: []
  type: TYPE_NORMAL
- en: 'A Python module can be run directly from the command line, as shown here:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE27]'
  prefs: []
  type: TYPE_PRE
- en: 'As an illustration, place the following two statements in a text file called
    first.py:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE28]'
  prefs: []
  type: TYPE_PRE
- en: 'Now type the following command:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE29]'
  prefs: []
  type: TYPE_PRE
- en: The output from the preceding command is 3, which is the same as executing the
    preceding code from the interpreter.
  prefs: []
  type: TYPE_NORMAL
- en: 'When a module is run directly, the special variable __name__ is set to __main__.
    You will often see the following type of code in a module:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE30]'
  prefs: []
  type: TYPE_PRE
- en: The preceding code snippet enables Python to determine if a module was launched
    from the command line or imported into another module.
  prefs: []
  type: TYPE_NORMAL
- en: '**SOME STANDARD MODULES IN PYTHON**'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The Python Standard Library provides many modules that can simplify your own
    scripts. A list of the Standard Library modules is at *[http://www.python.org/doc/](http://www.python.org/doc/)*.
  prefs: []
  type: TYPE_NORMAL
- en: Some of the most important modules include cgi, math, os, pickle, random, re,
    socket, sys, time, and urllib.
  prefs: []
  type: TYPE_NORMAL
- en: 'The code samples in this book use the modules math, os, random, re, socket,
    sys, time, and urllib. You need to import these modules to use them in your code.
    For example, the following code block shows you how to import 4 standard Python
    modules:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE31]'
  prefs: []
  type: TYPE_PRE
- en: The code samples in this book import one or more of the preceding modules, as
    well as other Python modules.
  prefs: []
  type: TYPE_NORMAL
- en: '**THE help() AND dir() FUNCTIONS**'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'An Internet search for Python-related topics usually returns a number of links
    with useful information. Alternatively, you can check the official Python documentation
    site: *[docs.python.org](http://docs.python.org)*.'
  prefs: []
  type: TYPE_NORMAL
- en: In addition, Python provides the help() and dir() functions that are accessible
    from the interpreter. The help() function displays documentation strings, whereas
    the dir() function displays defined symbols.
  prefs: []
  type: TYPE_NORMAL
- en: For example, if you type help(sys) you will see documentation for the sys module,
    whereas dir(sys) displays a list of the defined symbols.
  prefs: []
  type: TYPE_NORMAL
- en: 'Type the following command in the interpreter to display the string-related
    methods in Python:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE32]'
  prefs: []
  type: TYPE_PRE
- en: 'The preceding command generates the following output:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE33]'
  prefs: []
  type: TYPE_PRE
- en: The preceding list gives you a consolidated “dump” of built-in functions (including
    some that are discussed later in this chapter). Although the max() function obviously
    returns the maximum value of its arguments, the purpose of other functions such
    as filter() or map() is not immediately apparent (unless you have used them in
    other programming languages). The preceding list provides a starting point for
    finding out more about various Python built-in functions that are not discussed
    in this chapter.
  prefs: []
  type: TYPE_NORMAL
- en: 'Note that while dir() does not list the names of built-in functions and variables,
    you can obtain this information from the standard module __builtin__ that is automatically
    imported under the name __builtins__:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE34]'
  prefs: []
  type: TYPE_PRE
- en: 'The following command shows you how to get more information about a function:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE35]'
  prefs: []
  type: TYPE_PRE
- en: 'The output from the preceding command is here:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE36]'
  prefs: []
  type: TYPE_PRE
- en: Check the online documentation and also experiment with help() and dir() when
    you need additional information about a particular function or module.
  prefs: []
  type: TYPE_NORMAL
- en: '**COMPILE TIME AND RUNTIME CODE CHECKING**'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Python performs some compile-time checking, but most checks (including type,
    name, and so forth) are *deferred* until code execution. Consequently, if your
    Python code references a user-defined function that does not exist, the code will
    compile successfully. In fact, the code will fail with an exception *only* when
    the code execution path references the non-existent function.
  prefs: []
  type: TYPE_NORMAL
- en: 'As a simple example, consider the following function myFunc that references
    the non-existent function called DoesNotExist:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE37]'
  prefs: []
  type: TYPE_PRE
- en: The preceding code will only fail when the myFunc function has passed the value
    3, after which Python raises an error.
  prefs: []
  type: TYPE_NORMAL
- en: In [Chapter 2](ch02.xhtml), you will learn how to define and invoke user-defined
    functions, along with an explanation of the difference between local versus global
    variables in Python.
  prefs: []
  type: TYPE_NORMAL
- en: Now that you understand some basic concepts (such as how to use the Python interpreter)
    and how to launch your custom modules, the next section discusses primitive data
    types.
  prefs: []
  type: TYPE_NORMAL
- en: '**SIMPLE DATA TYPES**'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Python supports primitive data types, such as numbers (integers, floating point
    numbers, and exponential numbers), strings, and dates. Python also supports more
    complex data types, such as lists (or arrays), tuples, and dictionaries, all of
    which are discussed in [Chapter 3](ch03.xhtml). The next several sections discuss
    some of the Python primitive data types, along with code snippets that show you
    how to perform various operations on those data types.
  prefs: []
  type: TYPE_NORMAL
- en: '**WORKING WITH NUMBERS**'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Python provides arithmetic operations for manipulating numbers in a straightforward
    manner that is similar to other programming languages. The following examples
    involve arithmetic operations on integers:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE38]'
  prefs: []
  type: TYPE_PRE
- en: 'The following example assigns numbers to two variables and computes their product:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE39]'
  prefs: []
  type: TYPE_PRE
- en: 'The following examples demonstrate arithmetic operations involving integers:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE40]'
  prefs: []
  type: TYPE_PRE
- en: 'Notice that division (“/”) of two integers is actually truncation in which
    only the integer result is retained. The following example converts a floating
    point number into exponential form:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE41]'
  prefs: []
  type: TYPE_PRE
- en: 'You can use the int() function and the float() function to convert strings
    to numbers:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE42]'
  prefs: []
  type: TYPE_PRE
- en: 'The output from the preceding code block is here:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE43]'
  prefs: []
  type: TYPE_PRE
- en: 'Alternatively, you can use the eval() function:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE44]'
  prefs: []
  type: TYPE_PRE
- en: If you attempt to convert a string that is not a valid integer or a floating
    point number, Python raises an exception, so it is advisable to place your code
    in a try/except block.
  prefs: []
  type: TYPE_NORMAL
- en: '**Working with Other Bases**'
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'Numbers in Python are in base 10 (the default), but you can easily convert
    numbers to other bases. For example, the following code block initializes the
    variable x with the value 1234, and then displays that number in base 2, 8, and
    16:'
