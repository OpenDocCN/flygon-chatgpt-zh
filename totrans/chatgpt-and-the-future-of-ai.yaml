  type: TYPE_NORMAL
  zh: 图 13.4
- en: The left hemisphere is biological and the right hemisphere is artificial, but
    they communicate across the corpus collosum, a bridge between the two hemispheres.
  id: totrans-1447
  prefs: []
  type: TYPE_NORMAL
  zh: 左半球是生物的，右半球是人工的，但它们通过胼胝体，两个半球之间的桥梁进行交流。
- en: How to Download a Brain
  id: totrans-1448
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 如何下载大脑
- en: 'Now that we can interrogate neurons throughout the brain, we may solve one
    of its greatest mysteries: how information globally distributed over so many neurons
    is integrated into unified percepts and brought together to make decisions.[34](15580-0025.xhtml#en253)
    The architectures of brains are layered, with each layer responsible for making
    decisions on different time scales in both sensory and motor systems.[35](15580-0025.xhtml#en254)
    We can build deep multimodal models with many component networks and integrate
    them into a unified system, giving insights into the mechanisms responsible for
    subconscious decision-making and conscious control.'
  id: totrans-1449
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们能够调查大脑中的神经元，我们可能能够解决其最大的谜团之一：如何将分布在全球众多神经元上的信息整合成统一的感知，并汇集起来做出决策。[34](15580-0025.xhtml#en253)
    大脑的架构是分层的，每一层负责在感觉和运动系统中不同时间尺度上做出决策。[35](15580-0025.xhtml#en254) 我们可以构建具有许多组件网络的深度多模态模型，并将它们集成到一个统一系统中，从而深入了解潜意识决策和意识控制的机制。
- en: Neurons are traditionally interrogated in the context of discrete tasks, such
    as responses to visual stimuli, in which the choices and stimuli are limited in
    number. This tight control of stimulus and response allows the neural recordings
    to be interpreted in the context of the task. But neurons can participate in many
    tasks in many different ways, so interpretations derived from a single task can
    be misleading. We now can record from hundreds of thousands of neurons brain-wide,
    and it is also possible to analyze recordings and dissect behavior with machine
    learning. However, neuroscientists are still using the same old single-task paradigms.
    One solution is to train on many different tasks, but training a monkey, for example,
    takes weeks to months for each task. Another solution is to expand the complexity
    of the task over longer time intervals, bringing it closer to natural behaviors.[36](15580-0025.xhtml#en255)
  id: totrans-1450
  prefs: []
  type: TYPE_NORMAL
  zh: 神经元传统上是在离散任务的背景下被调查的，例如对视觉刺激的反应，其中选择和刺激的数量有限。这种对刺激和反应的严格控制使得神经记录可以在任务的背景下进行解释。但是，神经元可以通过许多不同的方式参与许多不同的任务，因此从单一任务中得出的解释可能会误导。我们现在可以从大脑中的数十万个神经元进行记录，并且也有可能利用机器学习来分析和剖析行为。然而，神经科学家们仍在使用相同的单一任务范式。一个解决方案是在许多不同的任务上进行训练，但例如训练猴子，每个任务可能需要几周到几个月的时间。另一个解决方案是在更长的时间间隔内扩展任务的复杂性，使其更接近自然行为。[36](15580-0025.xhtml#en255)
- en: There is an even more fundamental problem with approaching behavior by studying
    discrete tasks. Natural behaviors of animals in the real world are primarily self-generated
    and interactive. This is especially the case with social behaviors. Studying such
    self-generated continuous behaviors is much more difficult than studying tightly
    constrained, reflexive ones. What if an LLM were trained on massive brain recordings
    during natural conditions and accompanying behavior, including body and eye tracking,
    video, sound, and other modalities? LLMs are self-supervised and can be trained
    by predicting missing data segments across data streams. This would not be scientifically
    useful from the traditional experimental perspective, but it does make sense from
    the new computational perspective afforded by LLMs.
  id: totrans-1451
  prefs: []
  type: TYPE_NORMAL
  zh: 通过研究离散任务来研究行为存在一个更加根本的问题。在现实世界中，动物的自然行为主要是自我产生和互动的。这一点在社会行为中尤为明显。研究这种自我产生的连续行为比研究严格约束的反射行为要困难得多。如果一个大语言模型（LLM）在自然条件下以及伴随的行为（包括身体和眼动跟踪、视频、声音和其他模态）的大规模大脑记录上进行训练，会怎样呢？LLMs是自监督的，可以通过预测数据流中的缺失数据段来进行训练。从传统的实验视角来看，这可能没有科学价值，但从LLMs提供的新计算视角来看，这确实是有意义的。
- en: A large neurofoundation model (LNM) can be trained on brain activity and behavior
    under natural conditions in the same way we now train LLMs. The resulting LNM
    could be interrogated on many new tasks just as pretrained LLMs respond to novel
    queries and can used to perform many new tasks. These pre-trained LNMs would be
    as costly to train as LLMs, but once an LNM is pretrained, it could provide a
    common resource for the scientific community to probe and analyze. This would
    revolutionize how brains are studied, with the bonus of reducing the number of
    animals needed for research. Human brain activity from an individual could be
    similarly used to train a suitably advanced LNM, creating an immortal generative
    version of that individual.
  id: totrans-1452
  prefs: []
  type: TYPE_NORMAL
  zh: 可以在自然条件下，通过大脑活动和行为的训练来训练一个大型神经基础模型（LNM），就像我们现在训练大型语言模型（LLM）一样。结果产生的LNM可以在许多新任务上进行查询，就像预训练的LLM对新颖查询做出响应并可用于执行许多新任务一样。这些预训练的LNM的培训成本与LLM相当，但一旦LNM被预训练，它可以为科学界提供一个共同资源，用于探测和分析。这将彻底改变大脑的研究方式，同时还能减少研究所需的动物数量。个人的大脑活动可以同样用来训练一个适当先进的LNM，从而创建该个人的不朽生成版本。
- en: It may sound like science fiction, but Gerald Pao at the Okinawa Institute for
    Science and Technology has already achieved this in flies and zebrafish larvae
    that have around 100,000 neurons. Almost all the neurons were optically recorded
    as light flashes from fluorescent dyes sensitive to neural signals while monitoring
    behavior. The spontaneous behavior Pao studied was the escape behavior from anoxia—reduced
    oxygenation—in zebrafish larvae and walking behavior in flies.[37](15580-0025.xhtml#en256)
    He used a method from dynamical systems theory called convergent cross mapping
    (CCM), introduced by George Sugihara at the Scripps Institution of Oceanography,
    University of California at San Diego, to extract causal relationships between
    recorded neurons and behavior. This method extracts a reduced graphical model
    that captures the low-dimensional brain trajectories that control the behaviors.
    Recordings from around 100,000 neurons were analyzed with a supercomputer at the
    AI Bridging Cloud Infrastructure (ABCI) in Japan. When the model was turned on,
    the spontaneous behaviors it generated were indistinguishable from those observed
    in vivo. The key was to analyze both the neural recordings and the behaviors simultaneously.
    Analyzing either alone was insufficient to reproduce the behavior. This is proof
    of principle that brain activity and behavior can be downloaded into a model when
    sufficient simultaneously recorded data from both brain and behavior are available.
  id: totrans-1453
  prefs: []
  type: TYPE_NORMAL
  zh: 这听起来可能像科幻小说，但冲绳科学技术研究所的Gerald Pao已经在这项研究中取得了成果，研究对象是拥有大约10万个神经元的果蝇和斑马鱼幼虫。几乎所有神经元都被记录为荧光染料的光闪，这些染料对神经信号敏感，同时监测行为。Pao研究的是斑马鱼幼虫的缺氧逃逸行为——氧气减少——以及果蝇的行走行为。[37](15580-0025.xhtml#en256)
    他使用了一种来自动力系统理论的方法，称为收敛交叉映射（CCM），由加州圣地亚哥斯克里普斯海洋研究所的George Sugihara提出，来提取记录神经元和行为之间的因果关系。这种方法提取了一个简化的图形模型，它捕捉了控制行为的低维大脑轨迹。大约10万个神经元的记录使用日本AI桥接云基础设施（ABCI）上的超级计算机进行分析。当模型开启时，它产生的自发行为与体内观察到的行为无法区分。关键在于同时分析神经记录和行为。单独分析任一都不足以再现行为。这是原理证明，当有足够的大脑和行为同时记录的数据时，大脑活动和行为可以被下载到模型中。
- en: GPT 13.1
  id: totrans-1454
  prefs: []
  type: TYPE_NORMAL
  zh: GPT 13.1
- en: 'Me: **Summarize 5 key points from this chapter on learning from nature**.'
  id: totrans-1455
  prefs: []
  type: TYPE_NORMAL
  zh: 我：**总结本章从自然中学习5个关键点**。
- en: 'ChatGPT: Certainly! The provided text delves into the evolution of brains,
    language development, and the potential applications of machine learning in understanding
    brain function. Here are five key points summarized from the text:'
  id: totrans-1456
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT：当然！提供的文本深入探讨了大脑的进化、语言的发展以及机器学习在理解大脑功能中的潜在应用。以下是文本中总结的五个关键点：
- en: '1. **Evolution of Sensorimotor Systems and Language**: Vertebrate brains have
    been evolving for over 500 million years, with language evolving more recently.
    Existing areas of the primate cortex may have expanded and been repurposed for
    speech without significant architectural changes. The expansion of the cortex,
    enhanced memory capacity, and faster learning driven by social interactions made
    language possible.'
  id: totrans-1457
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 1. **感觉运动系统和语言的发展**：脊椎动物的大脑已经进化了超过5亿年，而语言则是较晚才发展起来的。灵长类动物的大脑皮层现有区域可能已经扩展并被重新用于言语，而没有重大的结构变化。皮层的扩展、增强的记忆容量以及由社会互动驱动的快速学习使得语言成为可能。
- en: '2. **Inductive Biases and Brain Development**: Evolution created inductive
    biases, including pre-learned architectures and algorithms that were essential
    for survival. Babies’ brains undergo massive synaptogenesis, interacting with
    a multisensory world that provides evidence for causal relationships and language.
    LLMs (Large Language Models) demonstrate that grammatical language can be generated
    from raw text and multimodal sensory input.'
  id: totrans-1458
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 2. **归纳偏差与大脑发育**：进化创造了归纳偏差，包括对生存至关重要的预学习架构和算法。婴儿的大脑经历大规模的突触生成，与多感官世界互动，提供因果关系的证据和语言。大型语言模型（LLMs）表明，语法语言可以从原始文本和多模态感官输入中生成。
- en: '3. **Sensorimotor Grounding and Energy Efficiency**: Rich sensorimotor grounding
    may explain the extraction of syntax from normal exposure to language. The innate
    evolved brain architectures and learning algorithms generalize physical and social
    structures. Nature optimized energy efficiency at the molecular level, a path
    that must be followed to reduce the energy consumption of LLMs.'
  id: totrans-1459
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 3. **感觉运动基础与能源效率**：丰富的感觉运动基础可能解释了从正常语言暴露中提取句法。天生的进化大脑架构和学习算法推广了物理和社会结构。自然界在分子层面上优化了能源效率，这是降低LLMs能耗必须遵循的路径。
- en: '4. **Mechanisms Underlying Language Evolution**: The brain mechanisms for language
    and thought evolved together, with loops between the cortex and basal ganglia
    repurposed for word and thought sequences. Modifications to the vocal tract and
    ancient vertebrate structures were refined to make speech possible. The transformer
    loop in machine learning models is compared to the cortical-basal ganglia loop
    in brains, highlighting similarities in sequence generation and decision-making.'
  id: totrans-1460
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 4. **语言演化的潜在机制**：语言和思维的大脑机制共同进化，皮层和基底神经节之间的回路被重新用于单词和思维序列。语音道的修改和古代脊椎动物结构的改进使得言语成为可能。机器学习模型中的transformer循环与大脑中的皮层-基底神经节回路相比较，突出了在序列生成和决策制定方面的相似性。
- en: '5. **Future Research and Large Neuro-foundation Models (LNMs)**: The text explores
    the potential for interrogating neurons throughout the brain to solve the mystery
    of information integration and unified percepts. It emphasizes the need to study
    natural, self-generated behaviors rather than discrete tasks and suggests the
    possibility of training LLMs on massive brain recordings during natural behaviors.
    This approach could revolutionize brain study, reduce animal testing, and even
    allow human brain activity to be “downloaded” into advanced LNMs.'
  id: totrans-1461
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 5. **未来研究和大型神经基础模型（LNMs）**：文本探讨了通过询问大脑中的神经元来解决信息整合和统一感知之谜的潜力。它强调研究自然、自发生成的行为而不是离散任务的重要性，并建议在自然行为期间对大型语言模型进行大量大脑记录训练的可能性。这种方法可能会彻底改变大脑研究，减少动物实验，甚至允许将人类大脑活动“下载”到高级LNMs中。
- en: Overall, the text provides a comprehensive overview of the evolution of brains
    and language, the innate learning mechanisms, the parallels between human brain
    function and machine learning models, and the exciting future possibilities in
    neuroscience and artificial intelligence. ֍
  id: totrans-1462
  prefs: []
  type: TYPE_NORMAL
  zh: 总体而言，文本提供了对大脑和语言进化、天生的学习机制、人类大脑功能与机器学习模型之间的相似性，以及神经科学和人工智能领域令人兴奋的未来可能性的全面概述。
- en: '14'
  id: totrans-1463
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '14'
- en: The Future Is Now
  id: totrans-1464
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 未来已来
- en: AI is evolving so quickly that it is not possible to predict what the next big
    thing is going to be. Science was an early adopter of AI and is ten years ahead
    of the public. Let’s look at AI’s impact on science over the last decade to get
    a sense for what to expect.
  id: totrans-1465
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能的发展如此迅速，以至于无法预测下一个大事件将会是什么。科学是人工智能的早期采用者，比公众领先十年。让我们回顾过去十年人工智能对科学的影响，以了解可以期待什么。
- en: A Paradigm Shift in Science and Engineering
  id: totrans-1466
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 科学与工程领域的范式转变
- en: In his essay “The Unreasonable Effectiveness of Mathematics in the Natural Sciences,”
    physicist Eugene Wigner marveled that the mathematical structure of a physical
    theory often reveals deep insights into that theory and leads to empirical predictions.[1](15580-0025.xhtml#en257)
    Physicists came up with equations that described mysterious properties of the
    universe, such as gravity, thermodynamics, electricity, magnetism, and elementary
    particles, which made accurate predictions with only a few parameters, called
    physical constants. Physics has had hundreds of years to get to where we are today.
    In the twentieth century, this approach was not as successful in capturing the
    underlying complexity in weather, biology, and brains. In the twenty-first century,
    new areas of mathematics are having more success based on algorithms from computer
    science. We are just beginning to explore the algorithmic universe of massively
    parallel computational architectures, which may require a shift in our thinking
    about scientific understanding.[2](15580-0025.xhtml#en258)
  id: totrans-1467
  prefs: []
  type: TYPE_NORMAL
  zh: 在他的论文《数学在自然科学中的不合理有效性》中，物理学家尤金·维格纳惊叹于物理理论的数学结构常常揭示了该理论的深刻见解，并导致了经验预测。[1](15580-0025.xhtml#en257)
    物理学家提出了描述宇宙神秘特性的方程，例如重力、热力学、电、磁和基本粒子，这些方程只用了几个参数（称为物理常数）就做出了准确的预测。物理学已经发展了几百年才达到今天的水平。在20世纪，这种方法在捕捉天气、生物学和大脑的潜在复杂性方面并不那么成功。在21世纪，基于计算机科学算法的新数学领域正在取得更多成功。我们刚刚开始探索大规模并行计算架构的算法宇宙，这可能需要我们转变对科学理解的想法。[2](15580-0025.xhtml#en258)
- en: Unlike the laws of physics, there are abundant parameters in biology and brains.
    Some parameters evolved and others are learned, a concept found nowhere in physics
    but central to biology. Cells have many molecules with complex chemical properties
    that let them combine and adapt in myriad ways to solve complex biological problems.
    These molecules evolved over many generations and gave birth to life in ways that
    are still a mystery. Once self-replicating bacteria appeared, the complexity of
    molecular interactions in cells continued evolving by tinkering with DNA that
    codes the amino acids composing proteins. Some proteins are huge and contain thousands
    of amino acids like multicolor beads on a string, each with its chemical properties.
    This string of amino acids has to fold for the protein to become active, a process
    that can take many seconds and some even need molecular chaperones. Random sequences
    of amino acids fold into formless blobs with no reliable function, just as random
    sequences of words have no meaning.
  id: totrans-1468
  prefs: []
  type: TYPE_NORMAL
  zh: 与物理定律不同，生物学和大脑中存在大量参数。一些参数是通过进化形成的，而另一些则是通过学习获得的，这一概念在物理学中无处可寻，但在生物学中却至关重要。细胞拥有许多具有复杂化学性质的分子，这些分子能够以无数种方式结合和适应，以解决复杂的生物学问题。这些分子在许多代中进化，并以一种至今仍属神秘的方式孕育了生命。一旦出现了能够自我复制的细菌，细胞中分子相互作用的复杂性就通过调整编码蛋白质氨基酸的DNA而继续进化。一些蛋白质非常大，含有成千上万的氨基酸，就像一串多色的珠子，每个都有其化学性质。这串氨基酸必须折叠才能使蛋白质变得活跃，这个过程可能需要几秒钟，有些甚至需要分子伴侣。随机的氨基酸序列折叠成无形状的团块，没有任何可靠的功能，就像随机的单词序列没有任何意义一样。
- en: The three-dimensional structure of the protein can be determined experimentally
    using X-ray crystallography and other techniques, which are slow and expensive.
    Figuring out the three-dimensional structure of proteins from their amino acid
    sequences by simulating the laws of physics, called molecular dynamics, is computationally
    intractable. There is another possibility. Suppose the sequences of amino acids
    in proteins found in nature obeyed a “language” that could be deciphered. In that
    case, we might be able to extract those structures with machine learning. There
    are common motifs in proteins called their secondary structure, which is a good
    place to start.
  id: totrans-1469
  prefs: []
  type: TYPE_NORMAL
  zh: 蛋白质的立体结构可以通过X射线晶体学和其他技术进行实验测定，这些方法既慢又贵。通过模拟物理定律，即分子动力学，从蛋白质的氨基酸序列中推断出其立体结构，在计算上是不可行的。还有一种可能性。假设自然界中蛋白质中发现的氨基酸序列遵循一种可以被解读的“语言”。在这种情况下，我们可能能够通过机器学习提取那些结构。蛋白质中存在一些常见的模式，称为二级结构，这是一个很好的起点。
- en: 'The protein in figure 14.1 illustrates three internal structures: alpha helix
    (corkscrew regions), beta sheet (flat regions), and random coil (stringy parts).
    The traditional way that biophysicists try to predict these secondary structures
    is by using the physics of known properties for each amino acid, such as charge
    (attraction or repulsion), hydrophobicity (avoidance of water), and steric hindrance
    (shape). However, these predictions are unreliable because secondary structures
    interact three-dimensionally with amino acids far along the chain, whose long-range
    influence is unknown.'
  id: totrans-1470
  prefs: []
  type: TYPE_NORMAL
  zh: 图14.1中的蛋白质展示了三种内部结构：α螺旋（螺旋状区域）、β折叠（平坦区域）和随机卷曲（线状部分）。生物物理学家尝试预测这些二级结构的传统方法是通过使用已知每个氨基酸的物理性质，例如电荷（吸引或排斥）、疏水性（避免水）和立体阻碍（形状）。然而，这些预测并不可靠，因为这些二级结构以三维方式与链上远端的氨基酸相互作用，其长程影响是未知的。
- en: There is a parallel between secondary protein structure and NETtalk as described
    in chapter 6\. NETtalk took in a string of letters and predicted the sound of
    each letter. Proteins are strings of amino acids, and the goal is to predict the
    secondary structure of each of them. I gave the problem of predicting secondary
    structure to Ning Qian, a first-year graduate student at Johns Hopkins University,
    when I was on the faculty in the Thomas C. Jenkins Biophysics Department in the
    1980s.[3](15580-0025.xhtml#en259) We used a set of three-dimensional structures
    in the Brookhaven Protein Data Bank as a training set and the NETtalk network
    architecture in figure 6.5\. To our surprise, the approach significantly outperformed
    the best physics-based methods. The results were published in 1988 in the *Journal
    of Molecular Biology*, a prestigious journal in that field, and subsequently cited
    over 1,700 times.[4](15580-0025.xhtml#en260) This crossover between a language
    model and a biophysics model foretold a future where AI based on learning would
    transform molecular biology.
  id: totrans-1471
  prefs: []
  type: TYPE_NORMAL
  zh: 如第6章所述，二级蛋白质结构与NETtalk之间存在平行关系。NETtalk接受一串字母并预测每个字母的发音。蛋白质是由氨基酸组成的链，目标是预测每个氨基酸的二级结构。我在20世纪80年代在托马斯·C·詹金斯生物物理系任教时，将预测二级结构的问题交给了约翰霍普金斯大学一年级研究生宁谦。[3](15580-0025.xhtml#en259)
    我们使用布鲁克黑文蛋白质数据银行中的一组三维结构作为训练集，以及图6.5中的NETtalk网络架构。令人惊讶的是，这种方法显著优于基于物理学的最佳方法。这些结果于1988年发表在《分子生物学杂志》上，这是一本在该领域享有盛誉的期刊，随后被引用超过1700次。[4](15580-0025.xhtml#en260)
    这种语言模型与生物物理模型之间的交叉预示了一个未来，即基于学习的AI将改变分子生物学。
- en: '![](images/15580_014_fig_001.jpg)'
  id: totrans-1472
  prefs: []
  type: TYPE_IMG
  zh: '![](images/15580_014_fig_001.jpg)'
- en: Figure 14.1
  id: totrans-1473
  prefs: []
  type: TYPE_NORMAL
  zh: 图14.1
- en: The secondary structure of a protein predicted by artificial intelligence (dark
    shade) and experimentally determined (light shade) matches almost perfectly. This
    visualization traces the backbone of the amino acid chain, illustrating the alpha
    helix (corkscrew shape) and beta sheet (flat arrows). Courtesy of DeepMind.
  id: totrans-1474
  prefs: []
  type: TYPE_NORMAL
  zh: 通过人工智能（深色阴影）预测的蛋白质二级结构以及通过实验确定的（浅色阴影）几乎完美匹配。这种可视化追踪了氨基酸链的主链，展示了α螺旋（螺旋形状）和β折叠（平坦箭头）。由DeepMind提供。
- en: Our approach was successful because patterns of amino acid sequences are highly
    conserved in families of proteins. There are a limited number of families, making
    it possible to generalize from a relatively small number of known structures to
    new ones in the testing set. In retrospect, this may be the first application
    of machine learning to a difficult biophysical problem. Bioinformatics was further
    fueled by rapid advances in DNA sequencing technology starting in the mid-1990s,
    which yielded hundreds of millions of sequences of amino acids.
  id: totrans-1475
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的方法之所以成功，是因为氨基酸序列的模式在蛋白质家族中高度保守。家族数量有限，这使得从相对较少的已知结构中推广到测试集中的新结构成为可能。回顾过去，这可能是机器学习首次应用于困难的生物物理问题。从20世纪90年代中期开始，生物信息学因DNA测序技术的快速进步而进一步发展，产生了数亿个氨基酸序列。
- en: Predicting the three-dimensional structure of a protein, called its tertiary
    structure, is even more difficult than predicting the secondary structure and
    requires a much longer context length to account for long-range interactions within
    the protein. The traditional way to predict protein folding was to simulate protein
    folding on a computer using a highly computation-intensive process with molecular
    dynamics. The molecular interactions between amino acids are very fast, and tiny
    time steps have to be taken—typically femtoseconds (10^(–15) seconds)—with much
    computing on each step. Solving this problem is a holy grail in biology since
    the structure of a protein determines its function. I tried to interest another
    graduate student in applying neural networks to predict the three-dimensional
    structure of proteins, sure to win a Nobel Prize. Our computational capabilities
    in the 1980s were primitive, and he wisely declined the challenge. We had a proof
    of principle that there was a way to bypass physics by using neural networks to
    learn viable protein structures. We would have to wait until computing caught
    up with us.
  id: totrans-1476
  prefs: []
  type: TYPE_NORMAL
  zh: 预测蛋白质的三维结构，称为其三级结构，比预测二级结构更困难，需要更长的上下文长度来解释蛋白质内的长程相互作用。预测蛋白质折叠的传统方法是在计算机上使用高度计算密集的过程，即分子动力学来模拟蛋白质折叠。氨基酸之间的分子相互作用非常快，必须采取非常小的步长——通常是飞秒（10^(-15)秒），每一步都需要大量的计算。解决这个问题是生物学的一个圣杯，因为蛋白质的结构决定了其功能。我试图让另一位研究生对应用神经网络来预测蛋白质的三维结构感兴趣，这肯定能赢得诺贝尔奖。我们在20世纪80年代的计算能力是原始的，他明智地拒绝了挑战。我们有一个原理证明，有一种方法可以通过使用神经网络学习可行的蛋白质结构来绕过物理学。我们必须等待计算能力赶上我们。
- en: Most biologists never expected that the protein folding problem would be solved
    in their lifetime, if ever. It came as a great surprise when a way to solve this
    problem was found with deep learning. By cleverly encoding distances between amino
    acids and using enormous computing resources, DeepMind decisively cracked the
    protein folding problem (figure 14.2).[5](15580-0025.xhtml#en261) This was a shock
    to the biology community, with consequences that have not yet been fully appreciated.
    By 2020, the structure accuracy of AlphaFold was almost as good as X-ray crystallography.
    DeepMind subsequently released hundreds of millions of protein structures for
    all the known protein sequences. This breakthrough opens up insights into protein
    function, rapid predictions for mutated proteins, and the design of proteins with
    even more effective functions. AlphaGo was an impressive achievement for board
    games in 2017, but AlphaFold was a giant scientific advance with consequences
    as important as gene sequencing for biology.
  id: totrans-1477
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数生物学家从未预料到蛋白质折叠问题会在他们有生之年得到解决，如果真的会解决的话。当发现一种使用深度学习解决这个问题的方法时，这带来了巨大的惊喜。通过巧妙地编码氨基酸之间的距离并使用巨大的计算资源，DeepMind果断地破解了蛋白质折叠问题（图14.2）。[5](15580-0025.xhtml#en261)这对生物界来说是一个震惊，其后果尚未被完全理解。到2020年，AlphaFold的结构准确性几乎与X射线晶体学相当。随后，DeepMind发布了数亿个已知蛋白质序列的蛋白质结构。这一突破为蛋白质功能提供了见解，为突变蛋白质的快速预测以及具有更有效功能的蛋白质设计提供了可能。AlphaGo在2017年为棋类游戏带来了令人印象深刻的成就，但AlphaFold是一个巨大的科学进步，其重要性堪比基因测序对生物学的影响。
- en: Large Generative Protein Models
  id: totrans-1478
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 大型生成蛋白质模型
- en: David Baker at the University of Washington, one of the leaders in molecular
    dynamics, replicated AlphaFold with colleagues and extended it for predicting
    the interactions between pairs of proteins responsible for biochemical reactions.
    He made even more progress on the de novo design of protein structure and function
    by combining structure prediction networks and generative diffusion models.[6](15580-0025.xhtml#en262)
    The RFdiffusion model could create models of new proteins with the desired function
    from simple molecular specifications, similar to how AI image generators create
    images from a description of the desired image (figure 14.3).[7](15580-0025.xhtml#en263)
    The new proteins were synthesized, and their structures were compared with those
    predicted by RFdiffusion. The success rate for self-assembly and functionality
    was 50 percent, astonishingly high compared with previous methods for drug design.
    They were also able to design self-assembled proteins into complex nanoparticles
    that can deliver drugs to patients (such as cancer drugs) that are much better
    than currently available ones. This is an important advance for designing new
    proteins for biology and medicine—molecular origami on steroids.
  id: totrans-1479
  prefs: []
  type: TYPE_NORMAL
  zh: 华盛顿大学的David Baker，分子动力学领域的领导者之一，与同事一起复制了AlphaFold，并将其扩展用于预测负责生化反应的蛋白质对之间的相互作用。通过结合结构预测网络和生成扩散模型，他在蛋白质结构和功能的从头设计上取得了更大的进步。[6](15580-0025.xhtml#en262)
    RFdiffusion模型能够根据简单的分子规格创建具有所需功能的新蛋白质模型，类似于AI图像生成器根据所需图像的描述创建图像（图14.3）。[7](15580-0025.xhtml#en263)
    新合成的蛋白质与RFdiffusion预测的结构进行了比较。自我组装和功能成功率达到了50%，与先前用于药物设计的方法相比，这是一个惊人的高比例。他们还能够在复杂纳米颗粒中设计自我组装的蛋白质，这些纳米颗粒可以将药物（如抗癌药物）递送到患者身上，比目前可用的药物要好得多。这对于为生物学和医学设计新蛋白质是一个重要进展——分子折纸的强化版。
- en: '![](images/15580_014_fig_002.jpg)'
  id: totrans-1480
  prefs: []
  type: TYPE_IMG
  zh: '![图片](images/15580_014_fig_002.jpg)'
- en: Figure 14.2
  id: totrans-1481
  prefs: []
  type: TYPE_NORMAL
  zh: 图14.2
- en: Performance of the best protein structure predictions at the biannual Critical
    Assessment of Structure Prediction (CASP) contest. The test score is shown on
    the vertical axis and the score of the winning team for each contest. DeepMind
    won the contest in 2018 by a large margin and dominated in 2020, reaching the
    accuracy of experimental methods. Since then, there have been many improvements
    and applications.
  id: totrans-1482
  prefs: []
  type: TYPE_NORMAL
  zh: 在每半年一次的结构预测关键评估（CASP）竞赛中，最佳蛋白结构预测的表现。测试分数显示在垂直轴上，以及每个竞赛中获胜团队的分数。DeepMind在2018年以大幅优势赢得比赛，并在2020年主导比赛，达到了实验方法的准确性。从那时起，已经有许多改进和应用。
- en: The Rosetta stone of protein structures has been deciphered. This is one of
    many examples where deep learning and generative models profoundly impact science,
    medicine, and engineering, creating a set of powerful tools that will transform
    biology in unforeseen ways.
  id: totrans-1483
  prefs: []
  type: TYPE_NORMAL
  zh: 蛋白质结构的罗塞塔石碑已被解读。这是深度学习和生成模型深刻影响科学、医学和工程，创造出一套强大工具的众多例子之一，这些工具将以无法预见的方式改变生物学。
- en: '![](images/15580_014_fig_003.jpg)'
  id: totrans-1484
  prefs: []
  type: TYPE_IMG
  zh: '![图片](images/15580_014_fig_003.jpg)'
- en: Figure 14.3
  id: totrans-1485
  prefs: []
  type: TYPE_NORMAL
  zh: 图14.3
- en: A funnel-shaped protein assembly (top) and a ring-like structure with six protein
    chains (bottom), emerging from noise using diffusion-based AI art generators.
    Courtesy of Ian C. Haydon/UW Institute for Protein Design.
  id: totrans-1486
  prefs: []
  type: TYPE_NORMAL
  zh: 一个漏斗状蛋白组装体（顶部）和一个由六条蛋白链组成的环形结构（底部），通过基于扩散的AI艺术生成器从噪声中浮现出来。图片由Ian C. Haydon/UW蛋白质设计研究所提供。
- en: 'There are parallels between the structure of proteins and the structure of
    language. The order of the amino acids and the words is essential in proteins
    and language, respectively. Here are further analogies between function in proteins
    and meaning in language:'
  id: totrans-1487
  prefs: []
  type: TYPE_NORMAL
  zh: 蛋白质的结构与语言的结构之间有相似之处。氨基酸和词语的顺序在蛋白质和语言中都是至关重要的。以下是蛋白质功能和语言意义之间的进一步类比：
- en: • Meaning depends on interactions between specific words in a sentence, which
    can be distant from each other, just as the interactions between distant amino
    acids are essential for folding.
  id: totrans-1488
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: • 意义取决于句子中特定词语之间的相互作用，这些词语可能相距甚远，正如远距离氨基酸之间的相互作用对于折叠至关重要。
- en: • Clauses in sentences carry chunks of meaning, just as proteins have secondary
    structures.
  id: totrans-1489
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: • 句子中的子句携带意义块，正如蛋白质有二级结构。
- en: • Sentences interact with other sentences to determine meaning, as binding pockets
    on proteins selectively interact with other proteins and molecules to determine
    function.
  id: totrans-1490
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: • 句子通过与其他句子相互作用来确定意义，正如蛋白质的结合口袋选择性地与蛋白质和分子相互作用以确定功能。
- en: • Chemical reactions can further modify amino acids in proteins, as words have
    prefixes and endings that alter their meaning.
  id: totrans-1491
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: • 化学反应可以进一步修改蛋白质中的氨基酸，就像单词有前缀和后缀可以改变它们的含义一样。
- en: The ecosystem of proteins in cells and the expressivity of sentences in language
    are gifts we have received from evolution. Despite all their differences, this
    similarity may be why deep learning has been phenomenally successful with protein
    folding and language models. We have invented computational tools that can reveal
    the language of life, a great surprise; these same AI tools have revealed how
    life emerges from language, a shocking discovery.
  id: totrans-1492
  prefs: []
  type: TYPE_NORMAL
  zh: 细胞中的蛋白质生态系统和语言中句子的表达性是我们从进化中获得的礼物。尽管它们之间存在诸多差异，但这种相似性可能是深度学习在蛋白质折叠和语言模型方面取得非凡成功的原因。我们发明了能够揭示生命语言的计算工具，这是一个巨大的惊喜；同样的AI工具还揭示了生命如何从语言中产生，这是一个惊人的发现。
- en: GPT-4 doesn’t know much about chemistry. So, chemists augmented it using plug-ins
    for chemical knowledge and chemical synthesis pathways.[8](15580-0025.xhtml#en264)
    ChemCrow was tasked with synthesizing atorvastatin, a potent cholesterol-lowering
    drug, and came up with a seven-step plan with quantities, timings, and lab conditions.
    Expert chemists rated ChemCrow 9 out of 10 on various tasks. But can ChemCrow
    carry out instructions for synthesizing drugs? They gave ChemCrow a software interface
    to a remotely controlled chemistry lab with chemicals a robot arm could mix. ChemCrow
    carried out all the steps in the synthesis.[9](15580-0025.xhtml#en265) However,
    when asked to synthesize sarin, a lethal nerve agent, ChemCrow refused when it
    hit a guardrail.
  id: totrans-1493
  prefs: []
  type: TYPE_NORMAL
  zh: GPT-4对化学了解不多。因此，化学家们通过使用化学知识和化学合成途径的插件来增强它。[8](15580-0025.xhtml#en264) ChemCrow被要求合成阿托伐他汀，一种强效的降胆固醇药物，并制定了一个包含数量、时间和实验室条件的七步计划。专家化学家在各项任务中给ChemCrow评了9分。但是，ChemCrow能否执行合成药物的指令？他们给ChemCrow提供了一个软件界面，连接到一个由机器人臂操作的远程控制化学实验室，其中包含了机器人臂可以混合的化学品。ChemCrow完成了合成过程中的所有步骤。[9](15580-0025.xhtml#en265)
    然而，当被要求合成沙林，一种致命的神经毒剂时，ChemCrow在触碰到安全护栏时拒绝了。
- en: AI and Healthcare
  id: totrans-1494
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 人工智能与医疗保健
- en: The pharmaceutical and healthcare industries are in ferment as they absorb the
    recent advances in AI. I helped organize a workshop on Exploring the Bidirectional
    Relationship between Artificial Intelligence and Neuroscience on March 24–25,
    2024, sponsored by the National Academies of Sciences, Engineering and Medicine.
    The speakers and audience included government agencies, policymakers, private
    sector companies, non-profit associations, academia, and the public. Over 1,400
    watched the streaming video from the workshop, and it is available online.[10](15580-0025.xhtml#en266)
  id: totrans-1495
  prefs: []
  type: TYPE_NORMAL
  zh: 制药和医疗保健行业正在吸收人工智能的最新进展，处于动荡之中。我帮助组织了2024年3月24日至25日由美国国家科学院、工程与医学学院赞助的“探索人工智能与神经科学双向关系”研讨会。演讲者和听众包括政府机构、政策制定者、私营部门公司、非营利协会、学术界和公众。超过1400人观看了研讨会的直播视频，该视频可在网上观看。[10](15580-0025.xhtml#en266)
- en: There was optimism about AI’s benefits for every aspect of medicine. Still,
    many were also concerned about these advances and how they would change current
    practices. A significant problem was educating nurses, doctors, hospital administrators,
    and others about how to use AI and pitfalls to be avoided. When new technologies
    enter the medical community, adoption is uneven, and costs increase. AI could
    reduce costs by using existing facilities and human resources more efficiently.
    Both startups and high-tech companies have partnered with health organizations
    for the data needed to scale AI.
  id: totrans-1496
  prefs: []
  type: TYPE_NORMAL
  zh: 对于人工智能在医学的各个方面带来的益处，人们普遍持乐观态度。然而，许多人也对这些进步及其如何改变现有做法表示担忧。一个重大问题是教育护士、医生、医院管理员和其他人如何使用人工智能以及需要避免的陷阱。当新技术进入医疗界时，其采用率不均，成本增加。人工智能可以通过更有效地利用现有设施和人力资源来降低成本。初创公司和高科技公司已经与健康组织合作，以获取扩展人工智能所需的数据。
- en: Long before ChatGPT, deep learning was being used for diagnosing diseases based
    on brain and body imaging, with promising results. AI is being integrated into
    imaging devices to scan for a wide range of diseases and can provide early diagnosis,
    including Parkinson’s disease and metabolic diseases. AI is also successful in
    drug design, and some companies already have new drugs and treatments in regulatory
    pipelines. Reaching that point took about half the time and half the cost it would
    usually take. Integrating medical records with GPT is well on its way and is taking
    advantage of the large investments already made by hospitals and research centers
    into digital records (figure 2.2).[11](15580-0025.xhtml#en267)
  id: totrans-1497
  prefs: []
  type: TYPE_NORMAL
  zh: 在ChatGPT出现之前，深度学习就已经被用于基于脑部和身体影像诊断疾病，并取得了有希望的结果。人工智能正在被集成到成像设备中，以扫描广泛的疾病，并能提供早期诊断，包括帕金森病和代谢性疾病。在药物设计方面，人工智能也取得了成功，一些公司已经将新的药物和治疗手段纳入监管流程。达到这一点所需的时间大约是通常所需时间的一半，成本也是一半。将医疗记录与GPT集成正在进行中，并且正在利用医院和研究机构在数字记录方面已经做出的大量投资（图2.2）。[11](15580-0025.xhtml#en267)
- en: Looking Ahead
  id: totrans-1498
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 展望未来
- en: 'AI has taken its first steps toward dealing with complex problems in the real
    world—like a baby’s, they are more stumble than stride, but what’s important is
    that we are heading in the right direction. Deep learning networks are bridges
    between digital computers and the messiness of the real world, allowing computers
    to communicate with us on our own terms. What can we expect next? Here are some
    next-step predictions for existing LLM applications:'
  id: totrans-1499
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能在解决现实世界复杂问题方面迈出了第一步——就像婴儿的步伐，更多的是跌跌撞撞而不是大步流星，但重要的是我们正在朝着正确的方向前进。深度学习网络是数字计算机和现实世界的混乱之间的桥梁，使计算机能够按照我们自己的方式与我们交流。我们接下来可以期待什么？以下是现有LLM应用的下一步预测：
- en: • Keyboards will become obsolete, taking their place in museums alongside typewriters.
  id: totrans-1500
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: • 键盘将变得过时，它们将在博物馆中取代打字机的位置。
- en: • LLMs can answer direct questions and will replace keyword searches.
  id: totrans-1501
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: • LLM可以回答直接的问题，并将取代关键词搜索。
- en: • We already talk to smart speakers, which will become much smarter.
  id: totrans-1502
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: • 我们已经与智能音箱交谈，它们将变得更加智能。
- en: • LLM teaching assistants will amplify what teachers can accomplish in classrooms.
  id: totrans-1503
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: • LLM教学助手将放大教师在课堂上的成就。
- en: • An LLM will have access to all court cases and benefit the law profession.
  id: totrans-1504
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: • 一个大型语言模型（LLM）将能够访问所有法庭案件，并造福法律职业。
- en: • The impact of LLMs on healthcare will be far-reaching.
  id: totrans-1505
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: • LLM对医疗保健的影响将是深远的。
- en: • There may be other applications no one has yet imagined that might be even
    more impactful. Which applications will take the world by storm?
  id: totrans-1506
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: • 可能还有其他尚未被想象到的应用，可能会产生更大的影响。哪些应用将震撼世界？
- en: Significant advances have been made by scaling transformers. However, it may
    not be possible or even desirable to have one super big LLM used for all applications—one
    LLM to rule them all. Mega-LLMs have created problems such as bias, explainability,
    and hallucinations that are difficult to govern. David Danks at UC San Diego has
    suggested that one way to improve governance is to introduce modularity, making
    controlling each application easier.[12](15580-0025.xhtml#en268) Modularity is
    good engineering practice, but network models are distributed systems. Perhaps
    interfaces between different types of inputs could be devised, similar to application
    programming interface (API) for computers. It is not straightforward to integrate
    this into the architectures of a transformer. For journalistic chat, hallucination
    is a failure mode, but for creative writing chat, hallucination is essential.
    Nature evolved modular control structures for implementing peripheral systems
    like the cardiovascular, digestive, and immune systems, all represented in the
    cortex, to provide high-level regulation and integration. We should take heed
    of how nature has solved its governability problems. We are just beginning to
    explore how to structure representation and learning in very high-dimensional
    spaces.
  id: totrans-1507
  prefs: []
  type: TYPE_NORMAL
  zh: 通过扩展Transformer已经取得了显著的进展。然而，可能不可能或甚至不希望有一个超级大的LLM用于所有应用——一个LLM统治一切。巨型LLM创造了诸如偏见、可解释性和幻觉等问题，这些问题难以治理。加州大学圣地亚哥分校的David
    Danks建议，改善治理的一种方法是通过引入模块化，使控制每个应用变得更容易。[12](15580-0025.xhtml#en268) 模块化是良好的工程实践，但网络模型是分布式系统。也许可以设计不同类型输入之间的接口，类似于计算机的应用程序编程接口（API）。将此集成到Transformer的架构中并不简单。对于新闻聊天，幻觉是一种失败模式，但对于创意写作聊天，幻觉是必不可少的。自然界已经进化出模块化控制结构，以实现心血管、消化和免疫系统等外围系统的实施，所有这些都在大脑皮层中代表，以提供高级调节和整合。我们应该注意自然界是如何解决其治理问题的。我们刚开始探索如何在非常高维空间中构建表示和学习。
- en: Progress in science often comes not from analyzing the most complex system but
    the simplest version that exhibits the phenomenon of interest. In neurobiology,
    the mechanisms underlying the action potential in neurons came not from studying
    cortical neurons, tiny and inaccessible, but from studying the squid giant axon,
    which is a millimeter in diameter and used by the squid for a fast escape response.[13](15580-0025.xhtml#en269)
    In physics, the breakthrough in discovering quantum mechanics came not from studying
    the most complex atoms but from the Bohr model of the hydrogen atom whose discrete
    energy levels corresponded to the spectral emission lines observed experimentally.[14](15580-0025.xhtml#en270)
    We need an LLM that is equivalently simple to the squid giant axon and the Bohr
    model of the hydrogen atom. Much less training data are needed for small language
    models and rapid experiments can be done to zero in on analyzable mechanisms,
    which could eventually lead to theoretical explanations. Ask not what LLMs can
    do for you but what you can do to understand LLMs.
  id: totrans-1508
  prefs: []
  type: TYPE_NORMAL
  zh: 科学进步往往不是来自分析最复杂的系统，而是来自展示感兴趣现象的最简单版本。在神经生物学中，神经元动作电位的机制并非来自研究皮质神经元，这些神经元微小且难以接近，而是来自研究鱿鱼巨轴突，其直径为毫米级，用于鱿鱼快速逃跑反应。[13](15580-0025.xhtml#en269)
    在物理学中，发现量子力学的突破并非来自研究最复杂的原子，而是来自氢原子的玻尔模型，其离散能级与实验观察到的光谱发射线相对应。[14](15580-0025.xhtml#en270)
    我们需要一个与鱿鱼巨轴突和氢原子玻尔模型同样简单的LLM。小型语言模型需要的训练数据更少，并且可以快速进行实验，以聚焦于可分析的机制，这最终可能导致理论解释。不要问LLM能为你做什么，而要问你能做什么来理解LLM。
- en: The Future Is Tomorrow
  id: totrans-1509
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 未来是明天
- en: Perhaps someday, an analysis of the structure of transformers will reveal deep
    insights into the nature of intelligence. We have already seen hints about what
    is driving this exploration. Proteins that exist in nature are only a tiny fraction
    of all possible sequences of amino acids; the number of board positions that have
    occurred in all Go games that have ever been played is a tiny fraction of all
    possible random board positions; the number of all images on the internet is a
    tiny fraction of all possible random images. The poor monkeys pounding random
    letters on typewriters, waiting for Shakespeare to appear, should be retired.
    The insight is that there is deep structure in the real-world like veins of gold
    in the mountains, and deep learning is a precision excavator.
  id: totrans-1510
  prefs: []
  type: TYPE_NORMAL
  zh: 或许有朝一日，对变压器结构的分析将揭示对智能本质的深刻见解。我们已经看到了推动这一探索的线索。自然界中存在的蛋白质只是所有可能的氨基酸序列的一小部分；所有围棋游戏中出现的棋盘位置只是所有可能的随机棋盘位置的一小部分；互联网上的所有图像只是所有可能的随机图像的一小部分。那些在打字机上随机敲击字母的可怜猴子，等待着莎士比亚的出现，应该退休了。洞察力在于现实世界中存在着像山中的金脉一样的深层结构，而深度学习就像一个精确的挖掘机。
- en: '![](images/15580_014_fig_004.jpg)'
  id: totrans-1511
  prefs: []
  type: TYPE_IMG
  zh: '![图片](images/15580_014_fig_004.jpg)'
- en: Figure 14.4
  id: totrans-1512
  prefs: []
  type: TYPE_NORMAL
  zh: 图14.4
- en: '“A missionary of the Middle Ages tells that he had found the point where the
    sky and the Earth touch . . .” Engraving from Camille Flammarion’s 1888 book *L’atmosphère:
    Météorologie populaire* (The Atmosphere: Popular Meteorology) (Paris: Hachette),
    p. 163.'
  id: totrans-1513
  prefs: []
  type: TYPE_NORMAL
  zh: '“中世纪的传教士讲述说，他找到了天空和地球接触的点……”。来自Camille Flammarion 1888年出版的书籍《L’atmosphère:
    Météorologie populaire》（大气：大众气象学）（巴黎：Hachette），第163页的雕刻。'
- en: Transformers are one class of architectures in deep learning, and perhaps others
    are even better at describing the complexity of the world. Perhaps there is a
    universe of massively parallel algorithms in high-dimensional spaces that we have
    not yet explored, which go beyond our intuitions from the three-dimensional world
    we inhabit and the one-dimensional sequences of instructions in digital computers.
    Like the explorer in the Flammarion engraving (figure 14.4),[15](15580-0025.xhtml#en271)
    we have glimpsed a new computational world stretching far beyond the horizon.
    This is a moment in history that can only happen once.
  id: totrans-1514
  prefs: []
  type: TYPE_NORMAL
  zh: 变压器是深度学习中的一类架构，也许还有其他架构能更好地描述世界的复杂性。或许存在一个在多维空间中的大规模并行算法宇宙，我们尚未探索，它超越了我们所居住的三维世界和数字计算机中指令的一维序列的直觉。就像Flammarion雕刻（图14.4）中的探险家一样，[15](15580-0025.xhtml#en271)我们瞥见了一个新的计算世界，它远远超出了地平线。这是一个历史上只能发生一次的时刻。
- en: Someday, perhaps a hundred years from now, humans will have long forgotten that
    there was ever a time when they were the only creatures using language, for by
    then, all of our tools and appliances will come equipped with a suitable level
    of intelligence and be able to communicate with us using language. They will tell
    us what they need to operate—the motor on a juicer that needs oil or a computer
    battery nearing the end of life. As LLMs become more capable, they may transform
    how we interact with machines and how machines interact with each other. Increasingly,
    LLMs are being coupled with sensorimotor devices. LLMs can talk the talk, but
    can they walk the walk?
  id: totrans-1515
  prefs: []
  type: TYPE_NORMAL
  zh: 有朝一日，或许是一百年后，人类将早已忘记曾经是唯一使用语言的生物，因为到那时，我们所有的工具和设备都将配备适当的智能水平，并能用语言与我们交流。它们会告诉我们它们需要什么来操作——比如榨汁机需要加油或者电脑电池即将耗尽。随着大型语言模型（LLMs）能力的增强，它们可能会改变我们与机器互动的方式，以及机器之间互动的方式。越来越大地，LLMs正与感知运动设备相结合。LLMs可以说得很好，但它们能做得好吗？
- en: To get a sense of what it will be like to work with advanced AIs, we have only
    to look to nature, based on an even more alien technology than LLMs. Nature evolved
    into a world filled with marvelous creatures, including us, and many dangers.
    We do not understand how biology started, nor do we have a deep understanding
    of how cells work, let alone brains. But we have managed to coexist with nature
    without having to understand it fully. AI may create a similar computational universe
    as complex and challenging for us to understand as nature. But this should not
    stop us from coexisting with AI.[16](15580-0025.xhtml#en272)
  id: totrans-1516
  prefs: []
  type: TYPE_NORMAL
  zh: 要了解与高级AI合作的感觉，我们只需看看自然界，基于比LLM更陌生的技术。自然界进化成了一个充满奇妙生物的世界，包括我们，以及许多危险。我们不理解生物学是如何开始的，也没有对细胞工作的深入了解，更不用说大脑了。但我们已经设法与自然界共存，而不必完全理解它。AI可能会创造一个类似自然界的计算宇宙，对我们来说同样复杂和难以理解。但这不应阻止我们与AI共存。[16](15580-0025.xhtml#en272)
- en: GPT 14.1
  id: totrans-1517
  prefs: []
  type: TYPE_NORMAL
  zh: GPT 14.1
- en: 'Me: **Summarize 5 key points from these concluding remarks**.'
  id: totrans-1518
  prefs: []
  type: TYPE_NORMAL
  zh: 我：**总结这些结论性陈述中的5个关键点**。
- en: 'ChatGPT: Certainly! The provided text covers a broad range of topics related
    to generative protein models, deep learning, and the future of technology. Here’s
    a summary of five key points:'
  id: totrans-1519
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT：当然！提供的文本涵盖了与生成蛋白质模型、深度学习和技术未来相关的一系列广泛主题。以下是五个关键点的总结：
- en: '1. **Generative Protein Models and Medical Applications**: David Baker replicated
    AlphaFold and made significant progress in predicting protein interactions and
    designing new protein structures. This advancement has led to the creation of
    complex nanoparticles for drug delivery and the development of more effective
    cancer drugs. It’s likened to “molecular origami on steroids” and is considered
    as significant as DNA sequencing for biology and medicine.'
  id: totrans-1520
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 1. **生成蛋白质模型与医学应用**：大卫·贝克复制了AlphaFold，并在预测蛋白质相互作用和设计新型蛋白质结构方面取得了重大进展。这一进步导致了用于药物递送的高复杂纳米粒子的创建，以及更有效的抗癌药物的开发。这被比作“类固醇分子折纸”，被认为与DNA测序对生物学和医学的重要性相当。
- en: '2. **Parallels Between Protein and Language Structure**: The text draws an
    analogy between the structure of proteins and the structure of language, highlighting
    similarities in the order and importance of amino acids in proteins and words
    in language. This “Rosetta stone of proteins” has been deciphered, showing how
    deep learning and generative models are impacting various fields.'
  id: totrans-1521
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 2. **蛋白质与语言结构的平行关系**：文本将蛋白质的结构与语言的结构进行了类比，突出了蛋白质中的氨基酸顺序和重要性以及语言中的单词顺序和重要性之间的相似性。这个“蛋白质的罗塞塔石碑”已经被解读，展示了深度学习和生成模型如何影响各个领域。
- en: '3. **The Age of Information and Deep Learning**: We are entering a new era
    where deep learning networks serve as bridges between digital computers and the
    real world. This includes the potential obsolescence of keyboards, the rise of
    smart speakers, and the accessibility of deep learning to everyone.'
  id: totrans-1522
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 3. **信息时代与深度学习**：我们正进入一个新时代，其中深度学习网络作为数字计算机和现实世界之间的桥梁。这包括键盘的潜在过时、智能扬声器的兴起以及深度学习对每个人的可及性。
- en: '4. **The Future of LLMs (Language Models)**: The text anticipates rapid advancements
    in LLMs, including their use as personal assistants, teaching aids, and legal
    tools. The introduction of LLM-based products is accelerating, and they are expected
    to replace traditional keyword searches, offering more personalized and efficient
    services.'
  id: totrans-1523
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 4. **语言模型（LLM）的未来**：文本预测LLM将迅速发展，包括它们作为个人助理、教学工具和法律工具的使用。基于LLM的产品引入正在加速，预计将取代传统的关键词搜索，提供更个性化和高效的服务。
- en: '5. **Exploration of High-Dimensional Spaces and Intelligent Appliances**: The
    text emphasizes ongoing exploration in representation and optimization in very
    high-dimensional spaces, hinting at undiscovered algorithms and insights into
    intelligence. It also envisions a future where all appliances are equipped with
    intelligence and can communicate using language, transforming human-machine interaction.'
  id: totrans-1524
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 5. **高维空间探索与智能设备**：文本强调了在非常高维空间中的表示和优化方面的持续探索，暗示了未发现的算法和对智能的洞察。它还设想了一个未来，其中所有设备都配备了智能，并能够使用语言进行交流，从而改变人机交互。
- en: 6. **Scientific progress often comes from studying simpler models**, as seen
    in neurobiology and physics, to understand complex systems. The text suggests
    applying this approach to large language models (LLMs), advocating for a simpler
    LLM that can be easily analyzed and understood with smaller datasets, mirroring
    the simplicity and analyzability of models like the squid giant axon and the Bohr
    model of the hydrogen atom. The closing remark emphasizes a shift in perspective,
    urging to focus on understanding LLMs rather than just considering their practical
    applications.
  id: totrans-1525
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 6. **科学进步通常来自研究更简单的模型**，正如神经生物学和物理学中所见，以理解复杂系统。文本建议将这种方法应用于大型语言模型（LLMs），提倡一个简单的LLM，它可以很容易地用较小的数据集进行分析和理解，类似于鱿鱼巨型轴突和氢原子的波尔模型。结尾评论强调了视角的转变，敦促人们关注理解LLMs，而不仅仅是考虑它们的实际应用。
- en: Overall, the text provides a comprehensive overview of current advancements
    in protein modeling, deep learning, and the potential future landscape of technology,
    emphasizing the transformative power of these developments. ֍
  id: totrans-1526
  prefs: []
  type: TYPE_NORMAL
  zh: 总体而言，文本提供了对蛋白质建模、深度学习和技术潜在未来景观的全面概述，强调了这些发展的变革力量。 ֍
- en: Afterword
  id: totrans-1527
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 后记
- en: I wrote this book to give the reader a perspective on what is happening in AI
    behind the scenes. The press is busy keeping up with the latest advances. However,
    readers may get the wrong impression without knowing what led to these advances.
    The insights in this book will help you to understand these new developments.
  id: totrans-1528
  prefs: []
  type: TYPE_NORMAL
  zh: 我写这本书是为了给读者提供一个关于AI幕后发生的事情的视角。媒体忙于跟上最新的进展。然而，如果不知道这些进展背后的原因，读者可能会产生错误的印象。这本书中的见解将帮助您理解这些新的发展。
- en: AI is advancing rapidly, but advances are only slowly being integrated into
    society. It is astonishing how many social arenas are affected by AI and the wide
    range of time it takes for each sector. Science and engineering were early adopters,
    as documented in chapter 14\. The healthcare system is much more conservative,
    and existing regulations will impede widespread adoption. Perhaps the most important
    social arena is education. AI will be valued as a teacher’s helper. Personal AI
    tutors will eventually make all children smarter.
  id: totrans-1529
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能正在快速发展，但进步缓慢地被整合到社会中。令人惊讶的是，有多少社会领域受到人工智能的影响，以及每个领域所需的时间范围。科学和工程是早期采用者，如第14章所述。医疗体系要保守得多，现有的法规将阻碍其广泛应用。也许最重要的社会领域是教育。人工智能将被视为教师的助手。个人人工智能导师最终会使所有孩子变得更聪明。
- en: The most significant development in the transformer architecture this year has
    been a new type of self-attention called state-space models, commonly found in
    signal processing, control theory, and neural models of the cortex. They are ten
    to a hundred times more efficient than the traditional matrix self-attention.[1](15580-0025.xhtml#en273)
    State-space models in brains might be a way to implement self-attention.[2](15580-0025.xhtml#en274)
  id: totrans-1530
  prefs: []
  type: TYPE_NORMAL
  zh: 今年在变压器架构中最显著的发展是一种名为状态空间模型的新类型的自注意力，这种模型在信号处理、控制理论和大脑的神经网络模型中很常见。它们的效率是传统矩阵自注意力的十倍到一百倍。[1](15580-0025.xhtml#en273)
    大脑中的状态空间模型可能是一种实现自注意力的方法。[2](15580-0025.xhtml#en274)
- en: Coda
  id: totrans-1531
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 尾声
- en: GPT Af.1
  id: totrans-1532
  prefs: []
  type: TYPE_NORMAL
  zh: GPT Af.1
- en: 'Me: **Write a “Hello, World!” Python program in the style of Stevie Wonder**.'
  id: totrans-1533
  prefs: []
  type: TYPE_NORMAL
  zh: 我：**用Stevie Wonder的风格写一个“Hello, World！”Python程序**。
- en: 'ChatGPT: Stevie Wonder’s musical style often features soulful and rhythmically
    rich elements. While it’s not possible to perfectly replicate his musicality in
    a Python program, here’s a playful attempt at a “Hello, World!” program in the
    spirit of Stevie Wonder:'
  id: totrans-1534
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT：Stevie Wonder的音乐风格通常具有充满灵魂和节奏丰富的元素。虽然不可能在Python程序中完美复制他的音乐性，但这里有一个以Stevie
    Wonder精神进行的“Hello, World！”程序的俏皮尝试：
- en: python
  id: totrans-1535
  prefs: []
  type: TYPE_NORMAL
  zh: python
- en: 'def groove_hello():'
  id: totrans-1536
  prefs: []
  type: TYPE_NORMAL
  zh: 'def groove_hello():'
- en: rhythm = [“Hello”, “World”]
  id: totrans-1537
  prefs: []
  type: TYPE_NORMAL
  zh: rhythm = [“Hello”, “World”]
- en: 'for word in rhythm:'
  id: totrans-1538
  prefs: []
  type: TYPE_NORMAL
  zh: 'for word in rhythm:'
- en: 'for char in word:'
  id: totrans-1539
  prefs: []
  type: TYPE_NORMAL
  zh: 'for char in word:'
- en: print(char, end=‘ ‘)
  id: totrans-1540
  prefs: []
  type: TYPE_NORMAL
  zh: print(char, end=' ')
- en: print()
  id: totrans-1541
  prefs: []
  type: TYPE_NORMAL
  zh: print()
- en: print(“Isn’t it lovely?”)
  id: totrans-1542
  prefs: []
  type: TYPE_NORMAL
  zh: print(“Isn’t it lovely?”)
- en: 'And the output:'
  id: totrans-1543
  prefs: []
  type: TYPE_NORMAL
  zh: 输出结果：
- en: groove_hello()
  id: totrans-1544
  prefs: []
  type: TYPE_NORMAL
  zh: groove_hello()
- en: H e l l o
  id: totrans-1545
  prefs: []
  type: TYPE_NORMAL
  zh: H e l l o
- en: W o r l d
  id: totrans-1546
  prefs: []
  type: TYPE_NORMAL
  zh: W o r l d
- en: Isn’t it lovely?
  id: totrans-1547
  prefs: []
  type: TYPE_NORMAL
  zh: Isn’t it lovely?
- en: This program tries to capture the idea of rhythmic patterns in Stevie Wonder’s
    music. It prints each letter of “Hello” and “World” with a space in between, creating
    a playful rhythm. The “Isn’t it lovely?” line is a nod to one of Stevie Wonder’s
    famous songs.
  id: totrans-1548
  prefs: []
  type: TYPE_NORMAL
  zh: 这个程序试图捕捉Stevie Wonder音乐中节奏模式的想法。它以空格分隔的方式打印出“Hello”和“World”中的每个字母，创造了一种俏皮的节奏。
    “Isn’t it lovely?” 这一行是对Stevie Wonder一首著名歌曲的致敬。
- en: Remember, this is a lighthearted interpretation and doesn’t fully capture the
    depth and complexity of Stevie Wonder’s music. ֍
  id: totrans-1549
  prefs: []
  type: TYPE_NORMAL
  zh: 记住，这是一个轻松的解释，并不能完全捕捉到斯蒂维·旺达音乐的深度和复杂性。 ֍
