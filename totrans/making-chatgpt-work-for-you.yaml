  prefs: []
  type: TYPE_NORMAL
- en: In Response [12-3](#PC6), you’ll see ChatGPT once again adheres to what was
    requested in our short prompt.Here are some book bloggers who have reviewed *The
    Ruin of Kings* by Jenn Lyons, with both negative and positive perspectives, focusing
    on those who primarily review fantasy literature:**Negative Reviews:**1\. **Novel
    Notions** - The reviewer found *The Ruin of Kings* overly complex and felt that
    the narrative structure, which jumps between timelines and perspectives, was unnecessarily
    convoluted. They appreciated the world-building and side characters but were not
    as invested in the main character, Kihrin, which affected their overall enjoyment
    of the book.2\. **Fantasy Book Review** - The reviewer noted that while parts
    of the book were exceptional, the dual narrative format and the complexity of
    the plot could be confusing. They also mentioned that the ending felt somewhat
    rushed and overwhelming, making it difficult to fully grasp the story's conclusion.**Positive
    Reviews:**1\. **Dragonmount** - This blog praised *The Ruin of Kings* for its
    intricate world-building and complex characters. The reviewer appreciated the
    depth of the story and the way it tackled themes like fate and destiny. They found
    the novel engaging and are eager to read the next installment in the series.2\.
    **Reading Reality** - The reviewer highlighted the rich, well-developed world
    and the compelling narrative. They enjoyed the complex plot and the layers of
    mythology that Jenn Lyons incorporated into the story, finding it a rewarding
    read for fans of epic fantasy.These reviews provide a balanced view of *The Ruin
    of Kings*, offering insights into both its strengths and potential weaknesses
    within the fantasy genre.Response 12-3
  prefs: []
  type: TYPE_NORMAL
- en: ChatGPT finds diverse reviews for The Ruin of Kings by Jenn Lyons
  prefs: []
  type: TYPE_NORMAL
- en: Perfect. Now that we have gathered reviews and bloggers covering several fantasy
    novels, let’s put all this information to use.
  prefs: []
  type: TYPE_NORMAL
- en: Summarizing Information Based upon Product Research
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Now that we have conducted a little product research, let’s ask ChatGPT to
    answer two questions: What were the most common complaints by these avid readers,
    and what did they enjoy the most about these books? We''re using Prompt [12-4](#PC7)
    to find out.Based upon all the books we''ve examined, what would you say is most
    important to readers of these books and genres? What are they looking for, and
    what are they hoping to avoid?Prompt 12-4'
  prefs: []
  type: TYPE_NORMAL
- en: Using ChatGPT to conclude our research ChatGPT’s answer can be seen in Response
    [12-4](#PC8).Based on the reviews and analysis of *A Game of Thrones* by George
    R.R. Martin, *Sword Catcher* by Cassandra Clare, and *The Ruin of Kings* by Jenn
    Lyons, several key factors stand out as being particularly important to readers
    of epic and high fantasy. Here's what they generally look for and hope to avoid:**What
    Readers Are Looking For:**1\. **Complex World-Building:**   - Readers of these
    genres highly value intricate and well-developed worlds. They appreciate settings
    that feel immersive and real, with rich histories, detailed political systems,
    and diverse cultures. For example, *The Ruin of Kings* was praised for its "layered
    and intricate" world-building, while *Sword Catcher* was noted for its "seamless
    diversity" and multicultural influences.2\. **Engaging Characters:**   - Well-drawn,
    multifaceted characters are crucial. Readers enjoy characters who are complex,
    flawed, and relatable. Protagonists with depth, as well as well-crafted side characters,
    can significantly enhance a reader's connection to the story. *The Ruin of Kings*
    received praise for its memorable characters and the engaging banter between them.3\.
    **Intriguing Plot and Narrative Structure:**   - An engaging, well-paced plot
    is essential, but readers also appreciate creative narrative structures that add
    depth to the story. However, there is a fine line; if the narrative becomes too
    convoluted, it can detract from the experience. *A Game of Thrones* was lauded
    for its political intrigue and complex character relationships, while *The Ruin
    of Kings* was both praised and criticized for its dual timelines.4\. **Themes
    of Power and Morality:**   - Themes like power, fate, and morality resonate deeply
    with fantasy readers. They are drawn to stories that explore these concepts in
    nuanced ways, often through the lens of political intrigue or moral dilemmas.
    The exploration of these themes in *The Ruin of Kings* was particularly noted
    for making readers reflect on the nature of fate and control.**What Readers Hope
    to Avoid:**1\. **Overly Convoluted Storytelling:**   - While readers appreciate
    complexity, they can be put off by storytelling that feels overly complicated
    or difficult to follow. This was a common criticism of *The Ruin of Kings*, where
    some found the narrative structure confusing and hard to engage with.2\. **Slow
    Pacing:**   - Readers often express frustration with books that have slow pacing,
    particularly in the opening sections. If the plot takes too long to develop or
    feels bogged down by excessive detail, it can lead to disengagement. For instance,
    some reviewers of *Sword Catcher* found the pacing slow, especially in a book
    with as many pages as it had.3\. **Unnecessary Complexity or Jargon:**   - While
    detailed world-building is appreciated, readers do not favor excessive use of
    made-up languages or complex jargon that can interrupt the flow of reading. This
    was a minor critique in *Sword Catcher*, where some felt the use of multiple languages
    could be distracting.4\. **Dark or Overly Grim Tones:**   - Although many readers
    are drawn to the darker aspects of epic fantasy, such as themes of war, betrayal,
    and moral ambiguity, there's a balance to be struck. When these elements are overemphasized
    without moments of relief or hope, it can become overwhelming. *A Game of Thrones*
    is often discussed in this context, where the relentless grimness can be a turn-off
    for some.In summary, readers of these genres seek a balance of rich, immersive
    world-building, complex and relatable characters, and a plot that is engaging
    without being overly convoluted. They appreciate depth and complexity but are
    wary of anything that detracts from the clarity and enjoyment of the story.Response
    12-4
  prefs: []
  type: TYPE_NORMAL
- en: ChatGPT summarizes important information from its research
  prefs: []
  type: TYPE_NORMAL
- en: We’ve given ourselves an excellent summary of what are essentially customer
    reviews of very popular fantasy novels, which can give us a guide to follow when
    writing something on our own. This is an excellent summary for product research.
    If you wanted, you could go deeper into this analysis, look into the original
    blogs ChatGPT is referencing, and ask more questions about keywords these novels
    use or the audiences that resonated the most with these novels.
  prefs: []
  type: TYPE_NORMAL
- en: But here’s an idea. We have a lot of valuable insights to work with for ourselves.
    Wouldn’t other writers be invested in understanding these insights as well? This
    would be a perfect opportunity to take something we’ve learned and use it for
    yet another purpose by writing a blog post we can share with like-minded individuals
    and grow a community for marketing purposes. So, let’s take this a step further
    and ask ChatGPT to write a guide to writing like the greats.
  prefs: []
  type: TYPE_NORMAL
- en: Creating a Guide to Writing Fantasy Inspired by the Greats
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In our next prompt, we’re going to ask ChatGPT to take all the information we’ve
    gathered thus far—bloggers, links, and critical reviews—and write a guide to writing
    fantasy for beginners. Not only is this a great resource for us, we can turn it
    into interesting content for fellow writers looking to improve their craft. In
    our prompt, we’ve also given ChatGPT specific instructions on the tone to use
    in its writing to ensure it has a decent readability and doesn’t sound like a
    standard response from ChatGPT that can sound disingenuous. This is exactly what
    we did in Chapter [5](641691_1_En_5_Chapter.xhtml), which is where you can find
    more information on how to prompt ChatGPT to adjust its writing tone.Now, based
    upon all of the information you've gathered from various book bloggers, I want
    you to write a guide to writing high fantasy for beginners. Write it in prose,
    in a conversational tone. Using these books and reviews as points of reference,
    explain to readers how they can avoid pitfalls that can make their writing weaker.
    I also want you to detail how aspiring authors should take these great works of
    fiction as inspiration by referencing the strongest points in the critical reviews
    we've examined thus far.Prompt 12-5
  prefs: []
  type: TYPE_NORMAL
- en: 'Using ChatGPT to turn the results of our research into an article As you can
    see, in Response [12-5](#PC10), ChatGPT writes an excellent guide for aspiring
    writers and veterans alike.**A Beginner''s Guide to Writing High Fantasy: Lessons
    from Great Works**Writing high fantasy is like stepping into a vast, untamed wilderness
    of your own creation. It’s a genre that allows for the deepest exploration of
    human nature, the most intricate of worlds, and the grandest of tales. But with
    such freedom comes the responsibility to craft a story that captivates, resonates,
    and remains accessible to your readers. To help you on your journey, here’s a
    guide based on the lessons learned from some of the genre''s most notable works
    and the critiques they''ve received from seasoned readers and reviewers.**1\.
    Build an Immersive World, But Beware of Overloading**World-building is the cornerstone
    of high fantasy. Your readers want to be transported to a place that feels as
    real as their own, yet filled with magic, dragons, and ancient prophecies.**Lesson
    from** ***The Ruin of Kings*** **by Jenn Lyons:**Reviewers have praised Lyons
    for her rich, layered world-building. However, some also felt that the complexity
    of her world sometimes made the narrative difficult to follow. The key takeaway
    here is to ensure your world-building enhances the story rather than overwhelms
    it. Introduce your world gradually, weaving in details as they become relevant
    to the plot, rather than bombarding your readers with information all at once.
    This will keep them engaged without feeling lost.**2\. Craft Complex Characters
    with Relatable Motivations**In high fantasy, your characters are often the lens
    through which readers experience your world. They should be as complex and multifaceted
    as the world around them.**Lesson from** ***A Game of Thrones*** **by George R.R.
    Martin:**Martin''s characters are renowned for their depth and moral ambiguity.
    This complexity keeps readers invested because they can see shades of themselves
    in the characters'' struggles. However, it''s important to balance this with characters
    that readers can still root for. While moral grayness is compelling, your characters
    need to have clear, relatable motivations that drive the story forward.**3\. Engage
    with Intriguing Plotlines, But Keep It Coherent**An intricate plot with twists
    and turns is a hallmark of high fantasy. Your readers should feel like they’re
    piecing together a grand puzzle, with each revelation bringing them closer to
    the truth.**Lesson from** ***Sword Catcher*** **by Cassandra Clare:**Clare''s
    *Sword Catcher* was praised for its intricate plot and the relationships between
    characters, which kept readers hooked. However, some reviewers noted that the
    pacing could be slow, especially in such a long book. This highlights the importance
    of maintaining a balance between complexity and coherence. Your plot should be
    engaging, but it should also be clear enough that readers can follow without getting
    lost. If you have multiple storylines, ensure they converge in a way that feels
    natural and satisfying.**4\. Use Unique Narrative Structures, But Don''t Overcomplicate**High
    fantasy often experiments with narrative structures, such as dual timelines or
    multiple points of view. These can add depth and variety to your storytelling,
    but they can also confuse readers if not handled carefully.**Lesson from** ***The
    Ruin of Kings*** **by Jenn Lyons:**The dual narrative and non-linear timeline
    in *The Ruin of Kings* were both praised for their creativity and criticized for
    their complexity. If you choose to use such structures, be sure they serve the
    story. Consider how each narrative choice helps to reveal character, develop the
    plot, or enhance the theme. And always keep your readers in mind—clarity should
    never be sacrificed for the sake of experimentation.**5\. Tackle Dark Themes with
    Care**Themes like power, corruption, and moral ambiguity are staples of high fantasy.
    These elements add gravitas to your story, making it resonate on a deeper level.**Lesson
    from** ***A Game of Thrones*** **by George R.R. Martin:**Martin''s exploration
    of dark themes like betrayal, power struggles, and the consequences of honor have
    become iconic. However, some readers find the relentless grimness overwhelming.
    It''s important to balance dark themes with moments of hope or levity. This not
    only makes your story more palatable but also highlights the darkness by contrast.**6\.
    Engage with Readers’ Expectations, Then Subvert Them**High fantasy readers often
    come with certain expectations, whether it''s the hero''s journey, epic battles,
    or magical quests. Playing with these tropes can make your story feel fresh and
    exciting.**Lesson from** ***Sword Catcher*** **by Cassandra Clare:**Clare’s work
    was noted for subverting the typical expectations of fantasy romance, offering
    something different that intrigued readers. Consider how you can take familiar
    elements of the genre and twist them in unexpected ways. This keeps your story
    engaging and helps it stand out in a crowded field.**7\. Pacing: Maintain Momentum,
    Avoid Drag**High fantasy can span thousands of pages and multiple volumes, so
    maintaining a good pace is crucial. Readers should feel like the story is always
    moving forward, even during quieter moments.**Lesson from** ***The Ruin of Kings***
    **and** ***Sword Catcher*****:**Both books received feedback about pacing—*The
    Ruin of Kings* was noted for its thrilling middle section but had a slower beginning
    and a somewhat rushed ending, while *Sword Catcher* was critiqued for slow pacing
    in parts. Aim to keep your narrative rhythm consistent. Use slower moments to
    build tension, develop characters, or deepen the world, but ensure these moments
    serve the story and lead to something significant.**Conclusion: Crafting a Compelling
    High Fantasy**Writing high fantasy is a challenging but rewarding endeavor. By
    focusing on immersive world-building, complex characters, and engaging plots while
    avoiding common pitfalls like excessive complexity and uneven pacing, you can
    craft a story that resonates with readers. Take inspiration from the works of
    Martin, Clare, and Lyons—learn from their strengths and understand where they
    stumbled. Remember, your goal is to create a world that feels real, characters
    that readers care about, and a story that keeps them turning the pages.Most importantly,
    have fun with it. High fantasy offers a playground for your imagination—so let
    your creativity soar, but keep your readers in mind as you do. Happy writing!Response
    12-5'
  prefs: []
  type: TYPE_NORMAL
- en: ChatGPT writes the ultimate guide to writing fantasy based upon the greats
  prefs: []
  type: TYPE_NORMAL
- en: This short article ChatGPT has written is fantastic for informing authors on
    ways they can improve their writing. And with the information we’ve given ChatGPT
    both through its own research inspired by our prompts, we could continue to create
    more content. We could go on to create more guides, reports, presentations, and
    more.
  prefs: []
  type: TYPE_NORMAL
- en: 'Now we’re going to look at how we can give ChatGPT information that’s even
    harder to sift through: numbers. We’re going to use ChatGPT to create a budget
    plan based upon actual spending habits from pictures of receipts.'
  prefs: []
  type: TYPE_NORMAL
- en: Using ChatGPT o1 to Make a Budget Plan
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Budgeting is hard because the most you can ever do is work with estimates when
    you’re trying to examine your spending habits—that is, unless you’re willing to
    pore over every receipt you’ve ever gotten and break out the calculator.
  prefs: []
  type: TYPE_NORMAL
- en: But as we know, ChatGPT can analyze images! This means that we can send ChatGPT
    an image of our receipt and let it do the rest. So, we’re going to do just that.
    We’re going to ask ChatGPT to tell us about our spending habits by sending photos
    of actual receipts. Not only will ChatGPT be able to read and itemize our spending
    habits based upon factual data, it will then be able to tell us about where we’re
    spending the most and how we can reduce costs.
  prefs: []
  type: TYPE_NORMAL
- en: But let’s answer the question that I’m sure is on your mind. Why are we using
    ChatGPT o1 this time? First, let’s talk about what ChatGPT o1 is and what it does.
  prefs: []
  type: TYPE_NORMAL
- en: What Is ChatGPT o1? What Is It Used For?
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: ChatGPT o1 is the model that takes longer to *think* about its answer before
    providing it. What this means is that rather than prioritizing providing a quick
    answer, it prioritizes an answer that accurately completes your request. “Under
    the hood,” it takes more processing power and therefore isn’t as appealing if
    you’re looking for a quick answer. Also, because it isn’t as cost effective, it
    also tends to provide shorter answers than other ChatGPT models.
  prefs: []
  type: TYPE_NORMAL
- en: But, because this functionality takes a longer amount of time coming up with
    a precise answer, it’s more useful for our purpose—namely, crunching numbers and
    calculating savings based upon photos of receipts. We want accurate numbers and
    calculations, and we really want ChatGPT to take its time analyzing the text from
    the photo so that there aren’t any errors in interpreting the information.
  prefs: []
  type: TYPE_NORMAL
- en: In Figure [12-1](#Fig1), you’ll see that the ChatGPT o1 model actually tells
    you how long it spent “thinking.”![Screenshot of a text notification with an icon
    on the left. The text reads, "Thought about vegan grocery cost-saving tips for
    8 seconds."](../images/641691_1_En_12_Chapter/641691_1_En_12_Fig1_HTML.jpg)
  prefs: []
  type: TYPE_NORMAL
- en: Figure 12-1
  prefs: []
  type: TYPE_NORMAL
- en: The ChatGPT o1 model tells you how long it spent thinking about its answer.
    For some reason, I find this funny
  prefs: []
  type: TYPE_NORMAL
- en: With that in mind, let's move on to our example. Remember to switch over to
    ChatGPT o1 for this example if you’re following along!
  prefs: []
  type: TYPE_NORMAL
- en: Giving ChatGPT Receipts to Analyze for Budget Planning
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: To begin with, we’re going to upload a photo of a grocery receipt that we want
    ChatGPT to analyze. We’ll be giving ChatGPT a receipt from an organic grocery
    store so we can get an idea of how we can save money based upon common spending
    habits. Figure [12-2](#Fig2) shows the image of the receipt we used for our prompt.![Receipt
    showing a grocery purchase totaling USD $96.06\. Items include crispy cocoa rice,
    extra creamy oat milk, Italian soda, organic chicken broth, green tea, and pure
    fruit snack. Voided items are listed, such as organic black tea. Other categories
    include deli with cheddar mac & cheese, bulk with sunflower seeds, meat with organic
    ground beef, poultry with chicken thigh, bakery with brownies, books with bracelets,
    and frozen items like chicken potstickers. Prices are listed next to each item.](../images/641691_1_En_12_Chapter/641691_1_En_12_Fig2_HTML.jpg)
  prefs: []
  type: TYPE_NORMAL
- en: Figure 12-2
  prefs: []
  type: TYPE_NORMAL
- en: A receipt from a natural food grocery store
  prefs: []
  type: TYPE_NORMAL
- en: Now that we’ve uploaded our photo, let’s look at Prompt [12-6](#PC11).This receipt
    represents what I spent on groceries on my last trip. I'm trying to save money,
    and I'd like to find a way to spend at least 10$ less on my next shopping trip.
    Help me figure out where I can cut costs.Prompt 12-6
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompting ChatGPT to help us save money on groceries The answer we got from
    ChatGPT can be seen in Response [12-6](#PC12).Here''s an analysis of your receipt
    and suggestions to help you save at least $10 on your next trip:——Higher-Cost
    Non-Essential Items1\. Amethyst Bracelet – $7.992\. Zorbitz Bracelet – $8.99   •
    Suggestion: Skip these purchases next time, saving $16.98\. Jewelry items aren''t
    essential for groceries.——Snacks & Treats1\. Two Bite Brownies – $6.992\. Two
    Bite Dessert – $4.99   • Suggestion: Limit to one dessert item or skip altogether,
    saving at least $6.99.——Pre-Made Deli Items1\. Cheddar Mac & Cheese – $7.392\.
    Garlic Roasted Potatoes – $4.873\. Tempura Shrimp Roll – $10.99   • Suggestion:
    Consider making these at home or reducing deli purchases. Skipping the shrimp
    roll could save $10.99.——Potential Savings Summary   • Skipping jewelry: $16.98   •
    Reducing desserts: $6.99   • Cutting one deli item (shrimp roll): $10.99Total
    Potential Savings: $34.96 (well over your $10 goal)——Other Ideas for Reducing
    Costs   • Organic Products: Consider swapping some organic items for non-organic.
    For example, non-organic chicken broth could be cheaper.   • Snacks: Reduce or
    skip packaged snacks, like the organic pure fruit snack ($5.00 for two).   • Buy
    in Bulk: Items like pasta and sunflower seeds can be bought in bulk for long-term
    savings.   • Compare Prices: Check if local stores have lower prices for staples
    like tea, meat, and pasta.Would you like more suggestions, like meal planning
    strategies to save even more?Response 12-6'
  prefs: []
  type: TYPE_NORMAL
- en: ChatGPT calculates where we can save on grocery bills
  prefs: []
  type: TYPE_NORMAL
- en: As you can see, we’ve been able to calculate savings that exceed our goal of
    saving $10! We even get some saving tips for future shopping trips, like where
    to buy products at the best prices.
  prefs: []
  type: TYPE_NORMAL
- en: Additional Tips on Budgeting with ChatGPT
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: From here, you can ask ChatGPT any number of questions about your spending habits.
    Obviously, we wouldn’t show here any actual spending details like bank statements,
    credit card statements, or the like. But for your personal use, you can make ChatGPT
    even more useful for calculating general saving costs with even more accuracy
    by providing these documents for analysis. Just make sure sensitive information
    is blacked out!
  prefs: []
  type: TYPE_NORMAL
- en: Conclusion
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In this chapter, we went over the different ways that ChatGPT can be used to
    extract information online, inform future decisions, create a blog post from collected
    information, make a budget planner, and get insights on future purchases. In the
    next chapter, we’re going to finalize everything by having fun generating images
    and videos with ChatGPT and Sora.
  prefs: []
  type: TYPE_NORMAL
- en: © The Author(s), under exclusive license to APress Media, LLC, part of Springer
    Nature 2025L. EvelynMaking ChatGPT Work for You[https://doi.org/10.1007/979-8-8688-1445-7_13](https://doi.org/10.1007/979-8-8688-1445-7_13)
  prefs: []
  type: TYPE_NORMAL
- en: 13. Visualize Your Ideas with ChatGPT’s DALL-E and Sora
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Lydia Evelyn^([1](#Aff2)  )(1)Catalonia, Spain
  prefs: []
  type: TYPE_NORMAL
- en: At this point, we’ve covered all of the amazing features included in ChatGPT
    except for one of the most exciting—image and video generation. This chapter is
    going to be fun. We’re going to use ChatGPT’s DALL-E’s model to help us visualize
    our ideas by creating beautiful artwork and almost eerily realistic videos with
    the help of ChatGPT’s Sora model.
  prefs: []
  type: TYPE_NORMAL
- en: Now, there’s a lot of controversy surrounding the use of AI-generated art. In
    this book, we’re not encouraging people to stop hiring artists. Rather, we’re
    trying to encourage people to help themselves visualize the concepts they would
    otherwise struggle to imagine. We feel it’s best to use these tools to better
    collaborate with team members—artists included—and find inspiration. It should
    be our responsibility to not replace human beings, but use tools that better help
    us work together. That is what we’ll be covering in this chapter.
  prefs: []
  type: TYPE_NORMAL
- en: Likewise, we’re going to cover how we can use the short videos we can create
    with Sora to make content that is **not** meant to **impersonate** or **deceive**
    by any means. Rather, we’re going to create videos that can make content creation
    look more professional by adding short clips to make YouTube videos more engaging
    or adding movement to a website’s landing page.
  prefs: []
  type: TYPE_NORMAL
- en: So let’s get started!
  prefs: []
  type: TYPE_NORMAL
- en: 'What’s covered in this chapter:'
  prefs: []
  type: TYPE_NORMAL
- en: How do we use ChatGPT to create images anyway? Looking at how to use ChatGPT
    to generate images.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: When you can’t find the words, paint a picture. Seeing how we can use ChatGPT’s
    image generation capabilities to collaborate with team members for work.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Get ideas and create assets for your own personal projects. Conceptualizing
    ideas for creative projects.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Go crazy! Having fun generating cool art.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Sora is completely different from everything we’ve done so far! Let’s find out
    how to use it.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Lights, camera, action! Direct Sora to make a smooth, lifelike video for websites
    and content creation.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Being responsible with AI-generated content—the dos and don’ts of using AI-generated
    images and videos.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: How Do We Use ChatGPT to Generate Images?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Well, it’s actually quite simple. To get ChatGPT to create images for us, we’re
    going to do the exact same thing we’ve been doing this whole time. We just ask.
    Let’s start with Prompt [13-1](#PC1).Create an image of an applePrompt 13-1
  prefs: []
  type: TYPE_NORMAL
- en: Using ChatGPT to generate images for the first time
  prefs: []
  type: TYPE_NORMAL
- en: Notice that all we had to do was say “create an image.” You could also phrase
    this slightly differently and say “make a photograph” or “generate artwork.” Regardless
    of how you say it, you only need to ask ChatGPT in some way within the prompt
    to create this image for you.
  prefs: []
  type: TYPE_NORMAL
- en: The image ChatGPT generated as a result can be seen in Figure [13-1](#Fig1).![A
    vibrant red apple with a smooth, glossy surface sits on a light gray background.
    The apple has a small brown stem and two green leaves attached, casting a soft
    shadow to the left. The image highlights the apple's fresh and natural appearance.](../images/641691_1_En_13_Chapter/641691_1_En_13_Fig1_HTML.jpg)
  prefs: []
  type: TYPE_NORMAL
- en: Figure 13-1
  prefs: []
  type: TYPE_NORMAL
- en: 'ChatGPT creates the image of a nice, ripe-looking apple.Disclaimer: Figure
    [13-1](#Fig1) is an AI-generated image'
  prefs: []
  type: TYPE_NORMAL
- en: Would you just look at the detail! There are even a few droplets of moisture
    on the skin of the apple in this photo. Already this is quite impressive, but
    what if this isn’t quite what we were looking for? We got an apple, but it’s sitting
    in a pretty plain setting. Why don’t we ask ChatGPT to try again, with a slight
    alteration? Like before, we’re just going to ask for the change in Prompt [13-2](#PC2).Actually,
    I want the apple to be on a wooden table.Prompt 13-2
  prefs: []
  type: TYPE_NORMAL
- en: Telling ChatGPT to make a change to the image it created Now that we’ve asked
    for our adjustment, you’ll notice that DALL-E generates a whole new image for
    us and abides by our request (Figure [13-2](#Fig2)).![A red apple with a single
    green leaf on its stem sits on a wooden table. The apple is glossy and round,
    casting a shadow on the table. The wood grain of the table is visible, adding
    texture to the scene. The lighting highlights the apple's smooth surface and vibrant
    color.](../images/641691_1_En_13_Chapter/641691_1_En_13_Fig2_HTML.jpg)
  prefs: []
  type: TYPE_NORMAL
- en: Figure 13-2
  prefs: []
  type: TYPE_NORMAL
- en: 'ChatGPT creates a new image, this time with the apple on a table.Disclaimer:
    Figure [13-2](#Fig2) is an AI-generated image'
  prefs: []
  type: TYPE_NORMAL
- en: So now that we know how to get ChatGPT to generate images, let's have some fun.
    ChatGPT can not only create images, but it can also create art in different styles,
    create realistic-looking photos of different scenarios, and more. Let’s get started!
  prefs: []
  type: TYPE_NORMAL
- en: Using ChatGPT to Generate Images for Work
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In the workplace, even when you have a graphic artist on the team, creating
    graphic art is often a constant back-and-forth discussion as everyone tries to
    get on the same page creating the visuals. With ChatGPT, non-artistic people can
    get their point across by showing a workable example of what they want or even
    get the job done themselves by making a few adjustments to a response from ChatGPT.
  prefs: []
  type: TYPE_NORMAL
- en: For scenarios like these, you can treat ChatGPT like an extra coworker that
    can get drafts done quickly. And like a coworker, ChatGPT works best when you
    give it the whole story, with as many details as possible. Let’s look at different
    scenarios for using ChatGPT to help with graphic design projects.
  prefs: []
  type: TYPE_NORMAL
- en: Advertising a Cleaning Product
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In this scenario, a graphic designer needs to create a piece for a company that
    produces cleaning products. We need to tell ChatGPT what we’re creating and the
    look we’re trying to achieve in the final product (Prompt [13-3](#PC3)).I'm creating
    graphic art for a brand that makes cleaning products. I need an illustration of
    a mop sweeping across the floor of a kitchen, leaving a trail of sparkles.Prompt
    13-3
  prefs: []
  type: TYPE_NORMAL
- en: Telling ChatGPT to create graphic art for advertising
  prefs: []
  type: TYPE_NORMAL
- en: Figure [13-3](#Fig3) shows the image ChatGPT generated in its response.![A stylized
    illustration of a pristine kitchen with white cabinets, a stove, and a range hood.
    The floor is being swept by a broom, surrounded by sparkling effects, emphasizing
    cleanliness. The scene conveys a sense of order and tidiness, with utensils hanging
    on the wall and potted plants on the counter.](../images/641691_1_En_13_Chapter/641691_1_En_13_Fig3_HTML.jpg)
  prefs: []
  type: TYPE_NORMAL
- en: Figure 13-3
  prefs: []
  type: TYPE_NORMAL
- en: 'A graphic for advertising a mop.Disclaimer: Figure [13-3](#Fig3) is an AI-generated
    image As you can see in Figure [13-3](#Fig3), ChatGPT has given us a great starting
    point, but personally, I don’t quite like the fact that the mop is an illustration,
    but the kitchen behind it is in 3D. Now, in order to correct this, I’m actually
    not going to give ChatGPT a lengthy description of what to or not to do. Sometimes
    you just need a refresh. Check out what I mean in Prompt [13-4](#PC4).Not quite.
    Try againPrompt 13-4'
  prefs: []
  type: TYPE_NORMAL
- en: Sometimes getting different results from ChatGPT is very simple ChatGPT’s fresh
    take on our request can be seen in Figure [13-4](#Fig4).![A mop cleaning a shiny
    kitchen floor, with sparkling effects emphasizing cleanliness. The kitchen features
    gray cabinets, a stove, and a window with natural light. The scene conveys a sense
    of freshness and tidiness.](../images/641691_1_En_13_Chapter/641691_1_En_13_Fig4_HTML.jpg)
  prefs: []
  type: TYPE_NORMAL
- en: Figure 13-4
  prefs: []
  type: TYPE_NORMAL
- en: 'ChatGPT creates a much more cohesive image for our graphic image.Disclaimer:
    Figure [13-4](#Fig4) is an AI-generated image'
  prefs: []
  type: TYPE_NORMAL
- en: In my opinion, Figure [13-4](#Fig4) much more closely resembles what we’d be
    looking for in a graphic advertising cleaning products. The style is consistent
    because the kitchen is 3D, but the mop now looks much more realistic.
  prefs: []
  type: TYPE_NORMAL
- en: Drafting Up a Prototype
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: When you’re collaborating with other people, it helps to get everyone on the
    same page with a visual. For example, imagine a production team needs an image
    to work with to create a prototype product. But the people that know how the product
    is supposed to work aren’t usually the same people that know what it should look
    like. And sometimes, if it feels like you’ve been banging your head against a
    wall, you just need new ideas. So let’s look at how we can prompt ChatGPT to create
    concept art for a smart watch prototype (Prompt [13-5](#PC5)).I'm making a promotion
    for a tech company making a new smart watch with a simplistic design. We need
    some concept art to hand to the team responsible for designing the prototype.
    Generate a few images to give us ideas for how the minimalistic smart watch might
    look like.Prompt 13-5
  prefs: []
  type: TYPE_NORMAL
- en: Instructing ChatGPT to create concept art for a smart watch
  prefs: []
  type: TYPE_NORMAL
- en: Figure [13-5](#Fig5) shows the image ChatGPT generated in its response.![A sleek,
    modern wristwatch with a round, black face and silver bezel. The watch displays
    the time with white hour and minute hands, and minimalist hour markers. The strap
    is black and adjustable, with a simple clasp. The watch face shows the time as
    7:18.](../images/641691_1_En_13_Chapter/641691_1_En_13_Fig5_HTML.jpg)
  prefs: []
  type: TYPE_NORMAL
- en: Figure 13-5
  prefs: []
  type: TYPE_NORMAL
- en: 'ChatGPT creates concept art for a minimalistic smart watch design.Disclaimer:
    Figure [13-5](#Fig5) is an AI-generated image This is fantastic! ChatGPT has created
    exactly the kind of image we wanted. But let’s say the team is having a hard time
    visualizing what the prototype would look like in different colors while keeping
    a minimalistic look. We’re going to ask ChatGPT for changes in Prompt [13-6](#PC6).This
    is great! Now give us options in different muted colorsPrompt 13-6'
  prefs: []
  type: TYPE_NORMAL
- en: Telling ChatGPT to give us options in different colors Figure [13-6](#Fig6)
    shows the image ChatGPT generated in its response.![Three smartwatches with round
    faces and minimalist designs are displayed. The central watch has a grey band
    and a black face with simple white markings and two subdials. The text "Grey"
    and "Soft Grey" is visible near the watch. The watches on either side have similar
    designs with different colored bands. The image highlights the sleek and modern
    aesthetic of the watches.](../images/641691_1_En_13_Chapter/641691_1_En_13_Fig6_HTML.jpg)
  prefs: []
  type: TYPE_NORMAL
- en: Figure 13-6
  prefs: []
  type: TYPE_NORMAL
- en: 'DALL-E offers different color options for our smart watch… but something isn’t
    right.Disclaimer: Figure [13-6](#Fig6) is an AI-generated image'
  prefs: []
  type: TYPE_NORMAL
- en: In Figure [13-6](#Fig6), we got what we were looking for in that we were offered
    other color variations for our smart watch prototype, but they’re cut out of focus,
    and it’s hard to really see what they look like. Let’s ask ChatGPT to make another
    adjustment, which you can see in Prompt [13-7](#PC7).Make sure the different color
    options are easy to seePrompt 13-7
  prefs: []
  type: TYPE_NORMAL
- en: 'Making sure we can see other options properly Figure [13-7](#Fig7) shows the
    image ChatGPT generated in its response.![Three modern wristwatches with round
    faces and minimalist designs are displayed. Each watch has a different colored
    strap: beige, gray, and green. The watch faces show the time with simple white
    hour and minute hands, and the numbers 10, 12, and 2 are visible. The date is
    displayed in a small circle at the bottom of each face. The watches are arranged
    diagonally on a smooth surface.](../images/641691_1_En_13_Chapter/641691_1_En_13_Fig7_HTML.jpg)'
  prefs: []
  type: TYPE_NORMAL
- en: Figure 13-7
  prefs: []
  type: TYPE_NORMAL
- en: 'DALL-E expands on the image it created to allow us to see the results better.Disclaimer:
    Figure [13-7](#Fig7) is an AI-generated image'
  prefs: []
  type: TYPE_NORMAL
- en: This worked out well! As you can see, using ChatGPT to create images isn’t so
    different from how we’ve been using it thus far. It requires a little back-and-forth
    at times to get what you want, but when you use the right prompts, you can get
    results you can be happy with.
  prefs: []
  type: TYPE_NORMAL
- en: Creating a Hero Image for an Article or Blog Post
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: If you’re the writer for a personal blog or an editorial, chances are you don’t
    care too much about the hero image as long as it looks good. But most of the time,
    the images most relevant to what you’re creating are copyrighted stock images
    that you need to pay for, and the prices can get surprisingly steep.
  prefs: []
  type: TYPE_NORMAL
- en: In this example, we’re creating a hero image for a blog post about upcycling
    t-shirts to reduce waste. Thankfully, ChatGPT can make this process pretty simple.
    We instruct ChatGPT to create this image in Prompt [13-8](#PC8).I need you to
    make the hero image for a blog post I'm writing on how to up-cycle old t-shirts
    for various DIY projects. I need an image of a bunch of laid out t-shirts. It
    should look like a stock image photo.Prompt 13-8
  prefs: []
  type: TYPE_NORMAL
- en: Creating a hero image for a blog post
  prefs: []
  type: TYPE_NORMAL
- en: In Figure [13-8](#Fig8), you’ll see that ChatGPT got it right the first time!![A
    collection of 28 folded t-shirts arranged in a grid pattern, each featuring various
    graphic designs and text. The shirts display a range of colors, including blues,
    reds, oranges, and neutrals, with some featuring logos, vintage-style graphics,
    and text like "Old Shirt" and "Sevgoens & Brions." At the bottom center, a pair
    of blue jeans with a brown leather patch is visible. The image showcases a variety
    of casual clothing styles.](../images/641691_1_En_13_Chapter/641691_1_En_13_Fig8_HTML.jpg)
  prefs: []
  type: TYPE_NORMAL
- en: Figure 13-8
  prefs: []
  type: TYPE_NORMAL
- en: 'ChatGPT generates a very well-created stock image for our blog post.Disclaimer:
    Figure [13-8](#Fig8) is an AI-generated image'
  prefs: []
  type: TYPE_NORMAL
- en: This is a great hero image for a blog that perfectly expresses the concept we
    gave ChatGPT to work with.
  prefs: []
  type: TYPE_NORMAL
- en: Now let’s look at more use cases that can be used for more creatively expressive
    purposes, like creating art for book covers and promotional illustrations.
  prefs: []
  type: TYPE_NORMAL
- en: Using ChatGPT to Help Visualize Concepts for Book Promotion
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Speaking from experience, I can tell you that rarely ever is a good author also
    a good designer. More than that, while an author isn’t usually a designer, they
    *very often* want their ideas made manifest in art. Nothing is more exciting than
    imagining an epic scene and then seeing it actually “happen” in a piece of artwork.
    Likewise, when it comes to other things like promoting the book, authors often
    find themselves at a loss when it comes time to create promotional graphics, especially
    if they’re working on their own.
  prefs: []
  type: TYPE_NORMAL
- en: For this reason, ChatGPT is fantastic for visualizing ideas and take the author
    one step closer to actually seeing the radical ideas that play out in their minds.
    So let’s make some creative artwork for a fantasy book.
  prefs: []
  type: TYPE_NORMAL
- en: Visualizing a Scene from a Steampunk Fantasy Book
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Steampunk is one of those niche genres that is so uniquely distinct, yet hard
    to come across too often. Writers and readers of the genre alike love any iteration
    of art that depicts steampunk because of how hard it can be to find sources of
    inspiration. For this example, we’re going to have ChatGPT illustrate an epic
    scene for a steampunk fantasy novel (Prompt [13-9](#PC9)).I'm writing a steampunk
    fantasy novel and I want to visualize the scene where a big blimp crashes into
    the Eiffel tower. Create an image depicting this in the realism art style, at
    night, with an explosion as the blimp crashes into the tower.Prompt 13-9
  prefs: []
  type: TYPE_NORMAL
- en: Asking ChatGPT to illustrate a scene from a book
  prefs: []
  type: TYPE_NORMAL
- en: Figure [13-9](#Fig9) shows the image ChatGPT generated in its response.![A dramatic
    and surreal artwork depicting the Eiffel Tower engulfed in flames and smoke, with
    a large airship hovering nearby. The scene is set against a dark, starry sky,
    creating a stark contrast with the bright, fiery explosion. Debris and smaller
    explosions are visible around the base of the tower, adding to the chaotic atmosphere.
    The image conveys a sense of destruction and fantasy, blending historical elements
    with imaginative visuals.](../images/641691_1_En_13_Chapter/641691_1_En_13_Fig9_HTML.jpg)
  prefs: []
  type: TYPE_NORMAL
- en: Figure 13-9
  prefs: []
  type: TYPE_NORMAL
- en: 'DALL-E creates a fantastic image of a blimp crashing into the Eiffel tower.Disclaimer:
    Figure [13-9](#Fig9) is an AI-generated image'
  prefs: []
  type: TYPE_NORMAL
- en: The image DALL-E has given us is already fantastic. The explosion, in particular,
    looks incredible. And the blimp itself also looks like it fits the genre perfectly.
    But what if we prefer a more illustrated look? Something that looks a little less
    like a movie poster and more like a painting. We ask ChatGPT to accomplish this
    in Prompt [13-10](#PC10).Actually, now I want the art to look more like an illustration
    than an imagePrompt 13-10
  prefs: []
  type: TYPE_NORMAL
- en: Don’t be afraid to change your mind and ask for alterations on the fly Figure
    [13-10](#Fig10) shows the image ChatGPT generated in its response.![A dramatic
    illustration depicting a zeppelin explosion near the Eiffel Tower at night. The
    scene is filled with vibrant flames and smoke, casting an intense glow against
    the dark sky. A crescent moon is visible, and a biplane flies nearby. The river
    below reflects the fiery chaos, while buildings line the riverbank. The artwork
    captures a sense of historical fantasy and action.](../images/641691_1_En_13_Chapter/641691_1_En_13_Fig10_HTML.jpg)
  prefs: []
  type: TYPE_NORMAL
- en: Figure 13-10
  prefs: []
  type: TYPE_NORMAL
- en: 'DALL-E recreates our epic scene in a beautiful illustration.Disclaimer: Figure
    [13-10](#Fig10) is an AI-generated image'
  prefs: []
  type: TYPE_NORMAL
- en: Truly, either option looks fantastic. This just goes to show that some art is
    up to the viewer’s perspective, but ChatGPT offers the ability to explore all
    the options.
  prefs: []
  type: TYPE_NORMAL
- en: Conceptualizing a Book Cover with DALL-E
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: For authors, traditionally published and self-published alike, getting cover
    art can be the most exciting part of publishing. Working with the cover artist
    is a thrilling process, but when an author has a specific idea in mind that the
    artist isn’t understanding, the situation goes from exciting to frustrating. Even
    traditionally published authors, who will have little to do with the final cover
    art, are still asked for their opinion on how the end product will look like.
  prefs: []
  type: TYPE_NORMAL
- en: Again, ChatGPT offers itself as a wonderful means of communicating a vision
    within individuals trying to collaborate. In this example, we’re going to look
    at how DALL-E can help an author visualize a cover for their romance book (Prompt
    [13-11](#PC11)).I'm writing a romance book, and I want inspiration for what the
    cover will look like so I can give the actual cover artist an idea of what I'm
    looking for. Create an image with the dimensions of a book cover of a woman and
    a man from the 1800s holding each other, with looks on their faces as though they
    know they shouldn't be doing what they're about to do. The image should show them
    from the waist up. The color scheme should be rich and warm. This is a sensual
    but heart-warming story. Generate the imagePrompt 13-11
  prefs: []
  type: TYPE_NORMAL
- en: Conceptualizing a book cover for a romance novel
  prefs: []
  type: TYPE_NORMAL
- en: Figure [13-11](#Fig11) shows the image ChatGPT generated in its response.![A
    romantic painting depicting a couple in an elegant embrace. The woman wears a
    Victorian-style dress with lace and rich fabric, while the man is dressed in a
    tailored suit with a cravat. They stand closely, gazing into each other's eyes,
    under a softly lit chandelier. The background features draped curtains, adding
    to the intimate and classic atmosphere.](../images/641691_1_En_13_Chapter/641691_1_En_13_Fig11_HTML.jpg)
  prefs: []
  type: TYPE_NORMAL
- en: Figure 13-11
  prefs: []
  type: TYPE_NORMAL
- en: 'A perfect mock-up of a romance book cover that romance readers would fawn over.Disclaimer:
    Figure [13-11](#Fig11) is an AI-generated image'
  prefs: []
  type: TYPE_NORMAL
- en: Creating Promotional Graphics for a Book Cover Reveal
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: If you read a lot of fiction and follow fiction authors on social media, you
    know that an exciting new release isn’t complete without a cover reveal. This
    is when the author shows the audience what the beautiful book cover will look
    like ahead of release, and in some cases, the cover release is so successful that
    readers will buy out the preorders and the bookstores when the book goes on sale
    officially.
  prefs: []
  type: TYPE_NORMAL
- en: However, for all of this to go as planned, one has to prepare the social media
    posts that will advertise the book to an excited audience. For this reason, authors
    will often provide a backdrop to the cover art they’re presenting for their audience.
    For this example, we’re going to ask ChatGPT to create the backdrop of an Instagram
    post for a cover reveal (Prompt [13-12](#PC12)).I'm about to do a cover reveal
    on Instagram for a new fantasy book and I need a background. I will later put
    the cover image on top. But I need a background that looks cozy. Include fairy
    lights, flowers, and a knit blanket in the image, essentially framing the center,
    where the book will go. Again, do not add the book in yourself. Ensure that the
    center has enough blank space for me to include the cover image myself later.Prompt
    13-12
  prefs: []
  type: TYPE_NORMAL
- en: Using Copilot to create a graphic for an Instagram post
  prefs: []
  type: TYPE_NORMAL
- en: Figure [13-12](#Fig12) shows the image ChatGPT generated in its response.![A
    cozy scene featuring a blank beige frame adorned with vibrant flowers, including
    pink roses and purple blooms, set against a textured background. Warm fairy lights
    hang above, casting a soft glow. A lit candle and a small, wrapped gift with twine
    are placed on a knitted surface, adding to the inviting atmosphere.](../images/641691_1_En_13_Chapter/641691_1_En_13_Fig12_HTML.jpg)
  prefs: []
  type: TYPE_NORMAL
- en: Figure 13-12
  prefs: []
  type: TYPE_NORMAL
- en: 'A very cozy and magical backdrop of a cover reveal Instagram post.Disclaimer:
    Figure [13-12](#Fig12) is an AI-generated image'
  prefs: []
  type: TYPE_NORMAL
- en: This is such a cozy-looking photo that would go great with a picture of a soft
    fantasy novel with a nice caption on an Instagram post.
  prefs: []
  type: TYPE_NORMAL
- en: Now let's look at how ChatGPT can generate images for graphic art!
  prefs: []
  type: TYPE_NORMAL
- en: Creating Graphic Art for Musical and Performing Artists
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: For indie musical and performing artists, resources can be hard to come by,
    especially when funds are low and there are other expenses to cover. This is why
    ChatGPT is a great tool for indie artists that simply need low-cost alternatives
    until they can afford illustrators or graphic designers that can craft a piece
    to fit their needs. So we’ll be looking at how we can use DALL-E to create posters
    and album art covers.
  prefs: []
  type: TYPE_NORMAL
- en: Creating a Poster for a Flamenco Dance Concert Event
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: It’s very exciting to be part of the process for creating graphics for a local
    event; whether it’s hosted by the city or a small school, it’s fun to just be
    part of the process. It’s even more rewarding when you feel like you can offer
    a product that looks high in quality that cost these institutions that run on
    low funds very little. Let’s give ChatGPT Prompt [13-13](#PC13), where we explain
    our situation a little.I'm creating graphic art for an upcoming concert where
    there will be live flamenco dancers performing on stage. I need you to make a
    poster featuring a vibrant illustration of a flamenco dancer with a flower in
    her hair, dancing with a partner dressed in all black.Prompt 13-13
  prefs: []
  type: TYPE_NORMAL
- en: Creating graphic art for a poster
  prefs: []
  type: TYPE_NORMAL
- en: 'Figure [13-13](#Fig13) shows the image ChatGPT generated in its response.![Illustration
    of a flamenco dancer and guitarist. The dancer, in a flowing red dress, strikes
    a dynamic pose with one arm raised, adorned with a red flower in her hair. The
    guitarist, dressed in black with a hat, plays a red guitar. The background features
    swirling red and black patterns, enhancing the sense of movement and passion.
    Keywords: flamenco, dance, guitar, art, illustration.](../images/641691_1_En_13_Chapter/641691_1_En_13_Fig13_HTML.jpg)'
  prefs: []
  type: TYPE_NORMAL
- en: Figure 13-13
  prefs: []
  type: TYPE_NORMAL
- en: 'DALL-E makes a beautiful poster advertising a flamenco dance concert.Disclaimer:
    Figure [13-13](#Fig13) is an AI-generated image'
  prefs: []
  type: TYPE_NORMAL
- en: This is such a dynamic image! And as you can see, the art style differs greatly
    from anything we’ve requested thus far. This is because we were so specific in
    our prompt about what this art would be used for, as well as the style we were
    looking for.
  prefs: []
  type: TYPE_NORMAL
- en: Speaking of different art styles, let's see what happens when we ask ChatGPT
    to depict more abstract concepts, like you might do for album cover art.
  prefs: []
  type: TYPE_NORMAL
- en: Creating an Album Art Cover for an Indie Rock Band
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Indie rock is a genre that embraces odd aesthetics and out-of-the-box thinking.
    For this reason, the abstract concepts ChatGPT can generate are perfect for album
    covers. We used Prompt [13-14](#PC14) to create a cover for an indie rock band
    called Red Horizon getting ready for their debut album entitled Genesis.We are
    an indie rock band called Red Horizon and we're coming out with our debut album
    called Genesis. Genesis features gentle rock music and lyrics that focus on coming
    out of depression and likening the process to a seed sprouting from the soil and
    emerging as a sprout. We need an album cover that reflects this. We'd love floral
    details, but add a little grunge. Because our band is called Red Horizon, we were
    thinking about featuring roses and vines in the image, as well as a color scheme
    that reflect colors of the dawn. We want the album cover to have a lot of contrast
    and rough edges. We want it to stand out. Generate this image.Prompt 13-14
  prefs: []
  type: TYPE_NORMAL
- en: Generating a cover for an indie rock band
  prefs: []
  type: TYPE_NORMAL
- en: Figure [13-14](#Fig14) shows the image ChatGPT generated in its response.![A
    vibrant, surreal artwork depicting a blooming rose at the center, surrounded by
    swirling vines and leaves. The background features a circular gradient of colors
    transitioning from purple to red, creating a dynamic and mystical atmosphere.
    The intricate details of the rose and vines are highlighted against a textured,
    abstract backdrop, emphasizing themes of growth and nature.](../images/641691_1_En_13_Chapter/641691_1_En_13_Fig14_HTML.jpg)
  prefs: []
  type: TYPE_NORMAL
- en: Figure 13-14
  prefs: []
  type: TYPE_NORMAL
- en: 'A beautifully abstract and rough-looking album.Disclaimer: Figure [13-14](#Fig14)
    is an AI-generated image'
  prefs: []
  type: TYPE_NORMAL
- en: This is a wonderfully expressive piece of artwork! Even if you weren’t completely
    satisfied with the colors or wanted minor changes, this gives you a great starting
    point that you can edit any way you want.
  prefs: []
  type: TYPE_NORMAL
- en: So, let's try generating an album cover for a completely different genre and
    see how ChatGPT holds up.
  prefs: []
  type: TYPE_NORMAL
- en: Creating an Album Art Cover for a Jazz Band
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: While an indie rock band might look for ingenuity in a sometimes-messy way,
    we’re going to try to create a cleaner design. Jazz is a genre that embraces and
    understands the ties between strong retro vibes and feelings of nostalgia. For
    this example, we’re going to ask ChatGPT to create an album cover for a jazz band
    called Constance’s Constellation for their album Harmony in the Routine. In our
    example, we’re expressing to ChatGPT what the album aims to do and what we’re
    looking for in cover art. We’re being much more specific, as you can see in Prompt
    [13-15](#PC15).I'm Constance Laurence and I'm the leader of the jazz band Constance's
    Constellation. We're coming up with an album called Harmony in the Routine that
    we want to reflect the feeling of hard working people that need inspiration for
    the backdrop of tasks they do on a day-to-day basis. For that reason, the songs
    on our album are high-tempo, rhythmic, and upbeat. We want a cover that emphasizes
    simple things, so it should feature an illustration of a vintage car. The image
    needs to have a vibrant color scheme that uses white and yellow, with blue highlights.
    The image should pop, but be simplistic and minimal. Generate this album cover
    art.Prompt 13-15
  prefs: []
  type: TYPE_NORMAL
- en: Now we're generating an album cover for a jazz band Figure [13-15](#Fig15) shows
    the image ChatGPT generated in its response.![Illustration of a vintage car with
    a stylized design, featuring geometric patterns on the side. The background includes
    abstract mountains and a sunburst effect in vibrant yellow and blue tones, creating
    a retro aesthetic. The image combines elements of classic automotive design with
    artistic flair.](../images/641691_1_En_13_Chapter/641691_1_En_13_Fig15_HTML.jpg)
  prefs: []
  type: TYPE_NORMAL
- en: Figure 13-15
  prefs: []
  type: TYPE_NORMAL
- en: 'DALL-E creates an album cover for a jazz band.Disclaimer: Figure [13-15](#Fig15)
    is an AI-generated image'
  prefs: []
  type: TYPE_NORMAL
- en: As you can see, ChatGPT is capable of navigating different art styles when prompted
    to do so. Oftentimes, getting “wonky-looking” images from ChatGPT comes out of
    not knowing how to prompt it well or not being specific enough. But the best way
    to get better at anything is to practice. So get creative! Try different prompts
    and request different art styles (like cubism, vector, and pixelated; never ask
    for art in the style of living artists). Think out of the box and ask for different
    “camera” angles or expressions on your subjects’ faces. The possibilities are
    endless.
  prefs: []
  type: TYPE_NORMAL
- en: Now, Let’s Talk About ChatGPT’s Sora Model
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The images we’ve made so far have been with the help of ChatGPT’s image generation
    model, DALL-E. However, ChatGPT also has a video generation model called Sora.
    Sora is able to generate short videos between 5 and 10 seconds long for anyone
    with a Plus membership and up to 20 seconds for those with Pro membership. Like
    with the image generation prompts we used, Sora can be prompted to generate surreal
    lifelike videos or even create a 3D animation style video as well.
  prefs: []
  type: TYPE_NORMAL
- en: Now, you might be wondering what you’d even do with such a short video. Even
    at 20 seconds, that’s barely a TikTok video. Well, rather than thinking of creating
    something like, say, a movie or animated skit, think of allowing the video to
    *complement* other content. I’ll explain what I mean by this, but first let’s
    look at the interface for Sora, because it’s different from everything we’ve seen
    so far.
  prefs: []
  type: TYPE_NORMAL
- en: Exploring the Sora Website
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Now, while Sora is a ChatGPT model, it does have its own website, which can
    be accessed at [https://sora.com](https://sora.com). You’ll log in with your ChatGPT
    Plus account, which we’ve done in Chapter [1](641691_1_En_1_Chapter.xhtml). Once
    you’re in, you should see the Sora home page, as shown in Figure [13-16](#Fig16),
    which will showcase all of the most popular videos created by the community, along
    with the prompts they used. I highly recommend scrolling through the home page
    for a while to get inspiration!![A screenshot of a media library interface displaying
    a grid of diverse images. The top row includes a desert landscape with rock formations,
    a cup of coffee with latte art, and a mouse in a tunnel. The middle row shows
    a cloud in a room, a person in black and white with shadows, and a person meditating.
    The bottom row features a blue background, sharks swimming underwater, and a koala
    in a bathtub with a rubber duck. The left sidebar contains navigation options
    like Explore, Library, and New Folder. A control bar at the bottom allows video
    description and settings adjustments.](../images/641691_1_En_13_Chapter/641691_1_En_13_Fig16_HTML.jpg)
  prefs: []
  type: TYPE_NORMAL
- en: Figure 13-16
  prefs: []
  type: TYPE_NORMAL
- en: 'Behold the Sora home page!Disclaimer: Figure [13-16](#Fig16) contains AI-generated
    images'
  prefs: []
  type: TYPE_NORMAL
- en: Now, this might look a little overwhelming at first. But in reality, using Sora
    is almost identical to using ChatGPT. Let’s briefly break down what we’re looking
    at here.
  prefs: []
  type: TYPE_NORMAL
- en: A Numbered Guide to the Sora Home Page
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: As we’ve done several times already now, we’ve included a numbered guide to
    the Sora home page, as you can see in Figure [13-17](#Fig17).![A screenshot of
    a video platform interface displaying a grid of diverse video thumbnails. The
    top row includes an image of a desert landscape, a cup of coffee with latte art,
    and a mouse in a tunnel. The middle row shows a cloud in a room, a person in black
    and white lighting, and a person meditating. The bottom row features an underwater
    scene with sharks and a koala in a bathtub. The left sidebar includes navigation
    options like Explore, Library, and New Folder. A control bar at the bottom allows
    video description and settings adjustments.](../images/641691_1_En_13_Chapter/641691_1_En_13_Fig17_HTML.jpg)
  prefs: []
  type: TYPE_NORMAL
- en: Figure 13-17
  prefs: []
  type: TYPE_NORMAL
- en: 'A numbered guide to the Sora home page.Disclaimer: Figure [13-17](#Fig17) contains
    AI-generated images Navigating the home page is very simple. As I said before,
    using it is very similar to using ChatGPT.'
  prefs: []
  type: TYPE_NORMAL
- en: '1.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: This is the text box that allows you to send a prompt to Sora and get a video
    in the response. More on this in a minute.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '2.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: This is the explore feed that allows you to see recently created videos by the
    community, popular videos, and videos that you’ve hit “like” on.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '3.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: This is your personal library where you can see all of your favorited videos,
    videos you’ve generated, and videos you’ve archived.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: Now, the text box we’re using to actually make the prompts has a few interesting
    settings I’d like to cover before we move on, so let’s take a look at Figure [13-18](#Fig18).![Screenshot
    of a video editing interface with text instructions for creating a cozy, rustic
    B-roll. The text suggests capturing close-ups of a rolling pin over dough, flour
    being sifted in slow motion, and using smooth pans, tilts, and zoom-ins for transitions.
    It also mentions adding time-lapse effects to show dough rising. Below the text
    are icons for video settings, including aspect ratio, resolution, duration, and
    storyboard options.](../images/641691_1_En_13_Chapter/641691_1_En_13_Fig18_HTML.jpg)
  prefs: []
  type: TYPE_NORMAL
- en: Figure 13-18
  prefs: []
  type: TYPE_NORMAL
- en: Check out the Sora text box to look at your options for prompt settings
  prefs: []
  type: TYPE_NORMAL
- en: At the bottom of the text box are a few settings that can be used to modify
    the quality and length of the video, as well as the size and dimensions. You can
    also allow Sora to generate two videos from the same prompt, which gives you the
    ability to choose which video you like best. It’s up to you and the purposes you
    want your video to serve to determine how you want to adjust these settings. But
    be aware that you have a limited amount of credits you can use per month.
  prefs: []
  type: TYPE_NORMAL
- en: Ah, I’m sure you’re now wondering what credits are. Allow me to explain.
  prefs: []
  type: TYPE_NORMAL
- en: What Are Credits, and What Are They Used For?
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Depending on your subscription tier, you’re allowed a certain number of “credits”
    per month. These credits represent how many videos you can create based upon the
    quality and length of the video. Shorter, lower resolution videos spend the least
    amount of credits. Short, high-quality videos spend a little more. A longer, low
    resolution video spends a little more than that, and a long, high resolution video
    will spend up the most.
  prefs: []
  type: TYPE_NORMAL
- en: ChatGPT Plus members get 1000 credits a month, which, according to their website,
    will equate to *about* 50 videos. But, it goes without saying that this number
    will be slightly lower or higher based upon the settings you use.
  prefs: []
  type: TYPE_NORMAL
- en: In my personal opinion, it’s best to try out the shorter, lower resolution settings
    when you’re just getting used to Sora. That way, when you’re ready to use the
    software for actual products, you have a little more experience and will waste
    less credits on videos that look a little too wonky to use.
  prefs: []
  type: TYPE_NORMAL
- en: 'Believe me, in some of my first tries, I asked for an ice cream with chocolate
    syrup being poured over it. For some reason, I ended up with what I can only describe
    as an ice cream on a cone with a slight… balding problem (Figure [13-19](#Fig19)).![A
    close-up photo of a vanilla ice cream cone with chocolate syrup drizzled over
    the top. The ice cream is in a waffle cone, and the background is a neutral shade.
    The top of the image includes text: "All videos - Sweet Temptation, 480p, Jan
    14, 1:55PM."](../images/641691_1_En_13_Chapter/641691_1_En_13_Fig19_HTML.jpg)'
  prefs: []
  type: TYPE_NORMAL
- en: Figure 13-19
  prefs: []
  type: TYPE_NORMAL
- en: 'I still don’t quite know how I ended up with this.Disclaimer: Figure [13-19](#Fig19)
    is an AI-generated image'
  prefs: []
  type: TYPE_NORMAL
- en: Alright, with all that out of the way, let’s talk about *why* you would even
    want to make these very short videos.
  prefs: []
  type: TYPE_NORMAL
- en: Using Sora for Sleek and Modern Content Creation and Graphic Design
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Nowadays, it’s harder than ever to keep the attention of potential customers
    that are taking in most of their content through apps they’re constantly swiping
    through. Getting them to click on links is hard enough. We also want to retain
    their attention and keep them from clicking off right away.
  prefs: []
  type: TYPE_NORMAL
- en: With this in mind, it’s a good idea to use short videos in our content creation
    to maintain attention, whether that be on a website or portfolio landing page,
    or short clips in between YouTube videos; a little break from the monotony goes
    a long way in getting a viewer interested in paying attention to you.
  prefs: []
  type: TYPE_NORMAL
- en: So let’s look at how we can make our content creation more interesting by using
    videos we make from Sora.
  prefs: []
  type: TYPE_NORMAL
- en: Using Sora to Create a B-Roll for a Cooking Video on YouTube
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Do you know what A- and B-rolls are in film? Well, it’s a simple concept. The
    A-roll features the main content of the video, whether it be a tutorial, an interview,
    or a person talking to a virtual audience on a platform like YouTube.
  prefs: []
  type: TYPE_NORMAL
- en: B-rolls are short clips that often show content related to the subject material
    of the video. Let’s say the main video is an interview between the interviewer
    and a popular author. To break up parts of the conversation, the videographer
    might include footage of the author doing different things, like typing at their
    laptop, taking notes, or sitting at a cafe and people-watching for inspiration.
  prefs: []
  type: TYPE_NORMAL
- en: That said, you can see that although you currently can’t use Sora to make longer
    content, it’s certainly usable for scene breaks between footage. It can add a
    professional touch to otherwise monotonous videos. So let’s try it out.
  prefs: []
  type: TYPE_NORMAL
- en: Crafting a Prompt for Sora to Create a Cozy Video of a Baker Kneading Dough
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: For our first example, we’re going to be looking at how we can use Sora to create
    a B-roll for a YouTube video about making bread. We used Prompt [13-16](#PC16).A
    close-up shot captures hands gently kneading dough on a rustic wooden table. The
    surface is lightly dusted with flour, and the warm lighting casts a cozy glow,
    highlighting the textures of both the dough and the grain of the wooden table.Prompt
    13-16
  prefs: []
  type: TYPE_NORMAL
- en: Giving Sora a detailed prompt to create a short video
  prefs: []
  type: TYPE_NORMAL
- en: You might have noticed that our prompt is very detailed. To get good results
    from Sora, it’s best to be as descriptive as possible. After all, this isn’t just
    an image we’re talking about. We want to be specific. Where should the angle of
    the “camera” be? What does the lighting look like? What’s happening in the video?
  prefs: []
  type: TYPE_NORMAL
- en: 'This might seem difficult at first, but try this: watch a YouTube video—it
    doesn’t matter what the video is about; just pick one. Watch the first couple
    seconds of the video and imagine how you might describe it to someone that has
    blindfolds on. This kind of thinking will help you practice describing your concepts
    to Sora when it comes time to give it a prompt. Because, really, that’s what you’re
    doing. Sora clearly can’t see what’s in your mind’s eye, and you have to be as
    descriptive as possible to get the result you’re looking for.'
  prefs: []
  type: TYPE_NORMAL
- en: It’s Magic! Sora Generates an Uncanny Video of Someone Kneading Dough
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Anyway, let’s move on to see how Sora responds, as you’ll see in Figure [13-20](#Fig20).![Screenshot
    of a storyboard titled "Rustic Dough Kneading." It features two panels. Panel
    1 shows a description: "A close-up shot captures hands gently kneading dough on
    a rustic wooden table. The surface is lightly dusted with flour, and the warm
    lighting casts a cozy glow, highlighting the textures of both the dough and the
    grain of the wooden table." Panel 2 describes: "The scene cuts to a slow tilt
    up to a sieve above the dough, releasing a gentle snowfall of flour in slow motion,
    each particle catching the light." The timeline below indicates the sequence and
    duration of each scene.](../images/641691_1_En_13_Chapter/641691_1_En_13_Fig20_HTML.jpg)'
  prefs: []
  type: TYPE_NORMAL
- en: Figure 13-20
  prefs: []
  type: TYPE_NORMAL
- en: Whoa, what’s all this? What’s storyboard mode? Note
  prefs: []
  type: TYPE_NORMAL
- en: If you’re having trouble coming up with prompts, try describing what you want
    to create to ChatGPT, then ask it to give you a prompt for Sora!
  prefs: []
  type: TYPE_NORMAL
- en: Don’t let this new screen scare you. It looks complicated, but the only thing
    that’s happening is that Sora is giving you the ability to describe each scene
    of the video as it happens.
  prefs: []
  type: TYPE_NORMAL
- en: Now, I’m going to be honest. I didn’t find much use in this feature. If the
    video you’re making is only 5–10 seconds long, there really isn’t much room for
    a transition between scenes. I feel as though this feature is more useful for
    those paying for the Pro version that can make 20-second videos. That’s why for
    our purposes, we’re going to skip using this feature.
  prefs: []
  type: TYPE_NORMAL
- en: When Sora enters this storyboard mode, it essentially fleshes out the prompt
    you gave it and shows you what kind of video it’s going to make. After a few attempts,
    I decided that my prompt worked better, so I deleted Sora’s suggestions and went
    with my original prompt.
  prefs: []
  type: TYPE_NORMAL
- en: The process of creating a video you’re happy with is very similar to how we
    created images, meaning sometimes you can get a great result on the first try;
    other times, you’re going to have to make modifications.
  prefs: []
  type: TYPE_NORMAL
- en: 'Figure [13-21](#Fig21) is a screenshot of the video I created with Sora that
    I liked best.![A person kneads dough on a flour-dusted wooden table, with hands
    pressing and shaping the dough. The scene is warmly lit, highlighting the texture
    of the dough and the grain of the wood. The image is titled "Kneading Warmth"
    and includes a caption: "Make the hands move slowly. They need to calmly and smoothly
    press into the dough to knead it." Various editing options are visible at the
    bottom of the screen.](../images/641691_1_En_13_Chapter/641691_1_En_13_Fig21_HTML.jpg)'
  prefs: []
  type: TYPE_NORMAL
- en: Figure 13-21
  prefs: []
  type: TYPE_NORMAL
- en: 'Sora creates a video of a person kneading dough on a lightly floured surface.Disclaimer:
    Figure [13-21](#Fig21) is an AI-generated image'
  prefs: []
  type: TYPE_NORMAL
- en: 'Now, if you notice, at the bottom of the screen is the truncated version of
    a longer prompt I’d used to critique what Sora produced the first few tries. However,
    in Figures [13-22](#Fig22) and [13-23](#Fig23), you can see the kind of prompts
    I used to modify the videos Sora generated.![Screenshot of a video editing interface
    with text instructions: "Make the hands slowly. They need to calmly and smoothly
    press into the dough to knead it. Make the video in slow motion." Below the text
    are options including "1v," "480p," "Strong remix," and a "Remix" button.](../images/641691_1_En_13_Chapter/641691_1_En_13_Fig22_HTML.jpg)'
  prefs: []
  type: TYPE_NORMAL
- en: Figure 13-22
  prefs: []
  type: TYPE_NORMAL
- en: Asking Sora to modify the video it generated of a person kneading dough
  prefs: []
  type: TYPE_NORMAL
- en: '![Screenshot of a user interface with text input reading, "Let the hands push
    deeper into the dough and stretch it out more." Below the text, there are buttons
    labeled "2v," "480p," "Strong remix," and a question mark icon. A "Remix" button
    is on the right side. The background is dark, and the text is white.](../images/641691_1_En_13_Chapter/641691_1_En_13_Fig23_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 13-23
  prefs: []
  type: TYPE_NORMAL
- en: Asking Sora to modify the video again
  prefs: []
  type: TYPE_NORMAL
- en: Generating B-rolls for YouTube videos is just one way that videos made with
    Sora can be useful. You can also use it to make an animated background for a landing
    page or generate GIFs. You can add short clips to promotional videos or create
    a short concept to present to a videographer or graphic designer. Or if you’re
    a graphic designer yourself, you can use Sora to draft concepts before you dedicate
    time to creating drafts on your own.
  prefs: []
  type: TYPE_NORMAL
- en: The possibilities abound. However, let’s talk about what Sora *or* DALL-E should
    *not* be used for.
  prefs: []
  type: TYPE_NORMAL
- en: Using Sora and DALL-E Ethically
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'With the surging popularity of AI-generated content that comes closer and closer
    to producing lifelike results, an important question arises: How do we protect
    people from being harmed by this technology? Harm doesn’t have to look like a
    robot takeover. Harm also comes in the form of impersonation, spreading misinformation,
    and replacing real people with something computer generated. These are real concerns,
    and thus it is up to us to be responsible for what we create when using these
    technologies. Therefore, we’re going to be looking at some dos and don’ts when
    we’re using DALL-E or Sora to generate content, though the same could be said
    for any content created using generative AI.'
  prefs: []
  type: TYPE_NORMAL
- en: '*Don’t* Impersonate'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: This is imperatively important. **NEVER** impersonate a real person with the
    use of Sora or DALL-E. There are too many cases of the likeness of celebrities
    being used to generate content that can mislead the public into believing they
    did things that they didn’t or using their likeness in ways they didn’t approve
    of. This has happened to Taylor Swift, Steve Harvey, and Megan Thee Stallion,
    to name a few. I believe this to be highly unethical and would never support the
    generation of content that the people these images and videos are based upon did
    not consent to.
  prefs: []
  type: TYPE_NORMAL
- en: '*Don’t* Spread Misinformation'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Just as videos and images of real people can harm the individuals being impersonated,
    videos and images meant to deceive the public into believing something that isn’t
    true are extremely harmful and should be discouraged by all means. Insisting upon
    making people believe that something generated by AI is real is something I don’t
    think any of us should tolerate to protect our spaces and the well-being of others.
  prefs: []
  type: TYPE_NORMAL
- en: '*Don’t* Hide the Fact You Used AI'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: I believe that many of the problems people are facing with AI content is the
    fact that it can be blended in with human-generated content, and one can be confused
    for the other. For this reason, I think it’s extremely important to be transparent
    about when AI is being used to generate content, whether it be written or visual,
    so that we’re all giving proper credit where credit is due. Transparency and accountability
    go hand in hand, and when we’re accountable for what we create with generative
    AI, we can create a safer environment for everyone.
  prefs: []
  type: TYPE_NORMAL
- en: '*Do* Generate Original Content'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: When generating content that features fictional people (and not recreations
    of real people), describe the kind of person you want in the depiction. Be as
    descriptive as possible! Again, I would encourage you to imagine you’re describing
    something you can see to a person with blindfolds on. This allows you to generate
    original content that you can use for concept art, collaborating on ideas with
    team members, and personal inspiration.
  prefs: []
  type: TYPE_NORMAL
- en: '*Do* Support Artists and Content Creators'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: As stated before, generating content with AI should never be used to replace
    an actual human being, and I would argue that it’s actually near impossible to
    do so successfully. None of the prompts used in this book could be used to replace
    a person’s creativity, and all of them required the experience and ingenuity of
    a person that knows what they’re doing to create. And in the end, humans need
    to be the ones regulating the content being created. Humans should edit generated
    text, adjust generated images, scrap ideas, and go with others.
  prefs: []
  type: TYPE_NORMAL
- en: I think that AI is best used as a collaborative tool. Share ideas with someone
    you’re working with by generating an image right quick or draft up an outline
    for an article with a few prompts and go over the concept with your editor.
  prefs: []
  type: TYPE_NORMAL
- en: Likewise, these tools are best utilized when collaborating with creative people
    that can bring these AI-generated ideas to life. In my experience, the best person
    to create generated art is an artist. The best person that can use ChatGPT to
    code is a programmer. The best person to use generated text for writing is an
    author.
  prefs: []
  type: TYPE_NORMAL
- en: Human art and creativity should always be valued over all else, and AI should
    never be an excuse to disrespect the people it should be empowering.
  prefs: []
  type: TYPE_NORMAL
- en: '*Do* Be Honest About Using AI'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Again, being open about the technologies we’re using to create content is all
    the more important the more these technologies develop. We need to develop our
    ethics along with it, and we can only achieve that by indicating when generative
    AI has been used to avoid misleading information. You become someone that others
    can trust when you’re open about your creative process, and therefore nothing
    you create can make other people feel as though they’ve been lied to.
  prefs: []
  type: TYPE_NORMAL
- en: This is why all content generated by ChatGPT in this book has been indicated
    as so. You should never attempt to deceive others through the use of AI by any
    means.
  prefs: []
  type: TYPE_NORMAL
- en: Conclusion
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In this chapter, we’ve looked at the different capabilities of ChatGPT when
    we ask it to create images. We looked at all of the different ways we can prompt
    it and critique the results to get what we’re looking for. We also looked at the
    ethical implications of AI generation and AI technology as a whole. We considered
    our responsibilities as people to protect the safety of ourselves and others while
    making use of new and exciting technologies at the same time.
  prefs: []
  type: TYPE_NORMAL
