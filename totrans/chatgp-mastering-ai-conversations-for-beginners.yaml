  zh: '**这**被称为**口碑**营销，并且是**最古老**、**最便宜**、**最有效**的方式**来**增加您的**目标**市场。**要**成为**被**人们**推荐**的**企业**，**您**所**需**要**的**就**是**一**个**优质**的**产品**和**卓越**的**客户**服务。**推荐**是**推动**销**售**的一**种**强**力**方式，**通过**让**您的**客户**为**您**做**市场**推广**工作**！**这样**，**您的**客户**就**成**为**了**品**牌**使**者**，**在**他们**的**社**会**圈**中**广**泛**传**播**关**于**您**的**企业**的**好**话**，**并**且**通**过**他**们**的**社交**圈**。**但**是**请**记**住**，**和**一**个**好的**推荐**一样**，**一个**坏的**推荐（**即**，**有人**对**您的**企业**说**出**负面**话**）**也会**造成**同样**甚**至**更**多的**损害**。'
