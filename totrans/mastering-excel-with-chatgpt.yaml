  zh: .PivotFields("Sales").Orientation = xlDataField
- en: .PivotFields("Sales").Function = xlSum
  id: totrans-1673
  prefs: []
  type: TYPE_NORMAL
  zh: .PivotFields("Sales").Function = xlSum
