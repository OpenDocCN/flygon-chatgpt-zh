- en: '**SEABORN’S KDE PLOTS FOR DENSITY ESTIMATIONS**'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Kernel Density Estimation (KDE) plots visualize the probability density of a
    continuous variable. They can be thought of as smoothed histograms and are particularly
    useful when discerning the underlying distribution of a dataset. They allow us
    to visualize data density.
  prefs: []
  type: TYPE_NORMAL
- en: '[Listing 8.24](#list8-24) displays the content of kde_plot.py that ChatGPT
    generated to render a KDE plot using Seaborn.'
  prefs: []
  type: TYPE_NORMAL
- en: '***LISTING 8.24: kde_plot.py***'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE495]'
  prefs: []
  type: TYPE_PRE
- en: '[Listing 8.24](#list8-24) starts with two import statements and the plot_kde()
    function that renders the KDE plot. The second part of [Listing 8.23](#list8-23)
    initializes the Pandas DataFrame data with the contents of the Seaborn built-in
    dataset iris, and then invokes plot_kde() with the variable data. [Figure 8.24](#fig8-24)
    displays the point plot that is rendered by launching the code in [Listing 8.24](#list8-24).'
  prefs: []
  type: TYPE_NORMAL
- en: '![Images](../images/f0288-01.jpg)'
  prefs: []
  type: TYPE_IMG
- en: '***FIGURE 8.24*** A KDE plot created with Seaborn'
  prefs: []
  type: TYPE_NORMAL
- en: '**SEABORN’S RIDGE PLOTS**'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Ridge plots are essentially a series of KDE plots displayed on top of one another,
    allowing for the comparison of distributions across categories. They allow for
    the display of overlaid distribution plots, which is useful for visualizing distribution
    changes across categories.
  prefs: []
  type: TYPE_NORMAL
- en: '[Listing 8.25](#list8-25) displays the content of ridge_plot.py that ChatGPT
    generated to render the ridge plot using Seaborn.'
  prefs: []
  type: TYPE_NORMAL
- en: '***LISTING 8.25: ridge_plot.py***'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE496]'
  prefs: []
  type: TYPE_PRE
- en: '[Listing 8.25](#list8-25) starts with two import statements and the plot_ridge()
    function that renders the ridge plot. The second part of [Listing 8.25](#list8-25)
    initializes the Pandas DataFrame data with the contents of the Seaborn built-in
    dataset diamonds, and then invokes plot_ridge() with the variable data. [Figure
    8.25](#fig8-25) displays the ridge plot that is rendered by launching the code
    in [Listing 8.25](#list8-25).'
  prefs: []
  type: TYPE_NORMAL
