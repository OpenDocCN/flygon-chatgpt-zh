  prefs: []
  type: TYPE_NORMAL
  zh: 与之相反，高级提示更加详细和结构化。它们涉及仔细的计划来引导模型向特定的结果发展，调整诸如音调、长度、格式和数学焦点等方面。例如，针对同一任务的先进提示可能如下：“写一个关于一只猫意外成为小镇市长的短篇幽默故事。它包括三个支持角色和一个意想不到的结局。”这一层面的细节不仅产生了更丰富的文本，而且展示了用户如何引导ChatGPT的创造力以实现他们的目标。
