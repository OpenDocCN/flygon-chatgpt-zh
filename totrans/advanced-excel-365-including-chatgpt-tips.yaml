- en: Preface
  id: totrans-442
  prefs: []
  type: TYPE_NORMAL
  zh: 前言
- en: This book will explore the powerful trio of ExcelTM, Visual Basic for Applications
    (VBA)TM, and ChatGPT. These tools combine the strength of data analysis, automation,
    and conversational AI to empower you in the realm of information processing and
    decision-making.
  id: totrans-443
  prefs: []
  type: TYPE_NORMAL
  zh: 本书将探讨 ExcelTM、Visual Basic for Applications (VBA)TM 和 ChatGPT 的强大组合。这些工具结合数据分析、自动化和对话式人工智能的力量，让您在信息处理和决策领域获得力量。
- en: Throughout these pages, you will be provided with practical knowledge, hands-on
    examples, and step-by-step instructions to master Excel’s data manipulation capabilities,
    unlock the potential of VBA for automation and customization, and study ChatGPT
    for natural language interactions.
  id: totrans-444
  prefs: []
  type: TYPE_NORMAL
  zh: 在这些页面中，您将获得实际知识、动手实例和逐步说明，以掌握 Excel 的数据处理能力，解锁 VBA 自动化和定制的潜力，并研究 ChatGPT 进行自然语言交互。
- en: Whether you are a beginner seeking to understand the basics, or an experienced
    user looking to enhance your skills, this book will serve as your roadmap to excel
    in these domains. It will guide you through the fundamentals of Excel, introduce
    you to the world of VBA programming, and show you how to integrate ChatGPT into
    your applications for dynamic and intelligent conversations.
  id: totrans-445
  prefs: []
  type: TYPE_NORMAL
  zh: 不论你是寻求理解基础的初学者，还是希望提升技能的资深用户，这本书都将作为你在这些领域的指南。它将引导你了解Excel的基础知识，带你进入VBA编程的世界，并展示如何将ChatGPT集成到你的应用程序中，以实现动态和智能的对话。
- en: 'This book will explore the endless possibilities of Excel, VBA, and ChatGPT.
    Here is a brief look at the various chapters:'
  id: totrans-446
  prefs: []
  type: TYPE_NORMAL
  zh: 本书将探索Excel、VBA和ChatGPT的无限可能性。以下是各章节的简要概述：
- en: '[Chapter 1: Overview of Excel 2021](chapter01.xhtml)'
  id: totrans-447
  prefs: []
  type: TYPE_NORMAL
  zh: '[第1章：Excel 2021概述](chapter01.xhtml)'
- en: Discover the new interface, components, and features of Excel 2021, including
    online file sharing, customizing the ribbon, and leveraging flash fills and instant
    data analysis for efficient data entry.
  id: totrans-448
  prefs: []
  type: TYPE_NORMAL
  zh: 发现Excel 2021的新界面、组件和功能，包括在线文件共享、自定义功能区以及利用闪电填充和即时数据分析进行高效数据输入。
- en: '[Chapter 2: Cell References and Range](chapter02.xhtml)'
  id: totrans-449
  prefs: []
  type: TYPE_NORMAL
  zh: '[第2章：单元格引用和范围](chapter02.xhtml)'
- en: Learn about several types of cell references and named ranges for easier referencing.
    Practice these concepts with hands-on exercises.
  id: totrans-450
  prefs: []
  type: TYPE_NORMAL
  zh: 了解几种类型的单元格引用和命名范围，以便更容易引用。通过实际练习练习这些概念。
- en: '[Chapter 3: Working with Formulas and Functions](chapter03.xhtml)'
  id: totrans-451
  prefs: []
  type: TYPE_NORMAL
  zh: '[第3章：使用公式和函数](chapter03.xhtml)'
- en: Master Excel’s formulas and functions, including IF variations, lookup functions,
    and dynamic VLOOKUP. Reinforce your understanding through practical exercises.
  id: totrans-452
  prefs: []
  type: TYPE_NORMAL
  zh: 掌握Excel的公式和函数，包括IF变体、查找函数和动态VLOOKUP。通过实际练习巩固你的理解。
- en: '[Chapter 4: Data Validation](chapter04.xhtml)'
  id: totrans-453
  prefs: []
  type: TYPE_NORMAL
  zh: '[第4章：数据验证](chapter04.xhtml)'
- en: Set data validation rules to ensure data accuracy. Explore custom validation
    techniques through practical exercises.
  id: totrans-454
  prefs: []
  type: TYPE_NORMAL
  zh: 设置数据验证规则以确保数据准确性。通过实际练习探索自定义验证技术。
- en: '[Chapter 5: Protection](chapter05.xhtml)'
  id: totrans-455
  prefs: []
  type: TYPE_NORMAL
  zh: '[第5章：保护](chapter05.xhtml)'
- en: Secure your Excel files by protecting worksheets, workbooks, and specific parts
    with passwords.
  id: totrans-456
  prefs: []
  type: TYPE_NORMAL
  zh: 通过保护工作表、工作簿和特定部分来使用密码保护你的Excel文件。
- en: '[Chapter 6: Sorting a Database](chapter06.xhtml)'
  id: totrans-457
  prefs: []
  type: TYPE_NORMAL
  zh: '[第6章：数据库排序](chapter06.xhtml)'
- en: Organize data efficiently using simple, multilevel, and customized sorting methods.
  id: totrans-458
  prefs: []
  type: TYPE_NORMAL
  zh: 使用简单、多级和自定义排序方法高效地组织数据。
- en: '[Chapter 7: Filtering a Database](chapter07.xhtml)'
  id: totrans-459
  prefs: []
  type: TYPE_NORMAL
