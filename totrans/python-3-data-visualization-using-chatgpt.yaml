  id: totrans-753
  prefs: []
  type: TYPE_NORMAL
  zh: 现在按照以下方式运行上述脚本：
- en: '[PRE107]'
  id: totrans-754
  prefs: []
  type: TYPE_PRE
  zh: '[PRE107]'
- en: 'This will produce following result:'
  id: totrans-755
  prefs: []
  type: TYPE_NORMAL
  zh: 这将产生以下结果：
- en: '[PRE108]'
  id: totrans-756
  prefs: []
