  zh: '**正如我们之前提到的，决策是成为企业主的一部分和全部。男孩也可以做出一些艰难的决定。你对每个选项的所有方面了解得越多，当时间来临时，你做出正确选择的可能性就越大。虽然可能无法预测你必须做出的每个决策的所有结果，但每一个小细节都很重要。换句话说，你分析的数据越多，越好。尽管在获取信息时花费更多时间，但数据分析可以节省你的时间、金钱和大量精力。没有什么比在项目或新的营销策略上落后两个月更糟糕的了，结果才发现完全可避免的疏忽在决策过程中会导致你回到第一步**。'
