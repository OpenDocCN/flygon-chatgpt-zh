- en: Introduction
  id: totrans-61
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 引言
- en: 'Welcome to “How to ChatGPT: Mastering Prompt Engineering for Effective Interactions.”
    This book is dedicated to equipping you with the skills necessary to interact
    effectively with one of today’s most advanced AI models, ChatGPT, by mastering
    the art of prompt engineering.'
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 欢迎来到“如何使用 ChatGPT：掌握提示工程以有效互动。”本书致力于为您提供与当今最先进的 AI 模型 ChatGPT 有效互动所需的技能，通过掌握提示工程的技艺。
- en: Overview of ChatGPT and Its Capabilities
  id: totrans-63
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: ChatGPT 及其功能的概述
- en: 'ChatGPT, developed by OpenAI, is part of the GPT (Generative Pre-trained Transformer)
    series of models, designed to understand and generate human-like text responses.
    This AI can perform a multitude of tasks, such as:'
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT 是由 OpenAI 开发的，它是 GPT（生成预训练变换器）系列模型之一，旨在理解和生成类似人类的文本响应。这种 AI 可以执行多种任务，例如：
- en: 'Answering Questions: From simple queries to complex inquiries.'
  id: totrans-65
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 回答问题：从简单查询到复杂查询。
- en: 'Providing Explanations: Breaking down complicated subjects in a comprehensible
    way.'
  id: totrans-66
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提供解释：以可理解的方式分解复杂主题。
- en: 'Generating Creative Writing: Crafting stories, poems, and more.'
  id: totrans-67
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 生成创意写作：创作故事、诗歌等。
- en: 'Simulating Dialogue: Engaging in conversation that mimics human interaction.'
  id: totrans-68
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 模拟对话：进行模仿人类互动的对话。
- en: 'Translating Languages: Offering multilingual capabilities without active internet
    searches.'
  id: totrans-69
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 翻译语言：提供多语言能力，无需主动进行网络搜索。
- en: ChatGPT’s abilities are rooted in its training on a vast corpus of text from
    the internet, though it does not access or retrieve information online in real-time.
    It’s tuned to understand the nuances of prompt instructions and to respond in
    a conversational manner, which makes it an invaluable tool for any context requiring
    natural language processing.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT的能力源于其对互联网上大量文本语料库的训练，尽管它不会在实时在线访问或检索信息。它被调整以理解提示指令的细微差别，并以对话方式回应，这使得它成为任何需要自然语言处理的场景中无价的工具。
- en: Importance of Prompt Design in Eliciting Useful Responses from AI
  id: totrans-71
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 提示设计在引发AI有用响应中的重要性
- en: 'The way you interact with ChatGPT significantly influences the quality and
    relevance of its responses. Effective prompt design is crucial because:'
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 您与ChatGPT的互动方式将显著影响其响应的质量和相关性。有效的提示设计至关重要，因为：
- en: 'Precision: Clear and specific prompts are more likely to yield accurate and
    relevant responses.'
  id: totrans-73
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 精确性：清晰和具体的提示词更有可能产生准确和相关的响应。
- en: 'Contextual Clarity: Providing context helps the AI understand the bigger picture,
    enhancing the quality of its responses.'
  id: totrans-74
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 上下文清晰性：提供上下文有助于AI理解整体情况，提高其响应的质量。
- en: 'Engagement: Well-crafted prompts result in more engaging and dynamic interactions,
    enriching the user experience.'
  id: totrans-75
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 互动性：精心设计的提示词能带来更吸引人和动态的互动，丰富用户体验。
- en: How This Book is Structured to Help You Become Proficient in Prompt Engineering
  id: totrans-76
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 本书如何结构化以帮助您精通提示工程
- en: 'This book is meticulously organized to guide you through every aspect of prompt
    engineering:'
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 本书精心组织，旨在引导您了解提示工程的所有方面：
- en: 'Basic Principles: Early chapters introduce the foundational aspects of crafting
    prompts, including clarity and specificity.'
  id: totrans-78
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 基本原则：早期章节介绍了制作提示的基础方面，包括清晰性和具体性。
- en: 'Intermediate Techniques: Building on the basics, these chapters cover more
    complex interactions, such as managing ambiguous questions or incorporating context
    effectively.'
  id: totrans-79
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 中级技巧：在基础知识的基础上，这些章节涵盖了更复杂的互动，例如管理含糊不清的问题或有效融入上下文。
- en: 'Advanced Strategies: Later sections delve into sophisticated techniques that
    refine your ability to elicit detailed and creative responses.'
  id: totrans-80
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 高级策略：后续章节深入探讨复杂技术，以提升您引发详细和创意响应的能力。
- en: 'Practical Applications: Each chapter is supplemented with practical examples,
    exercises, and templates to illustrate concepts and allow hands-on practice.'
  id: totrans-81
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 实际应用：每一章都附有实际例子、练习和模板，以说明概念并允许动手实践。
- en: By the end of this book, you will not only be well-versed in the theory behind
    effective prompt design but will also possess the practical skills to apply these
    principles across various scenarios, ensuring every interaction with ChatGPT is
    optimized for the best possible outcome. Let’s begin this journey to enhance your
    conversational engagements with AI.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 到本书结束时，您不仅将精通有效提示设计的理论，还将具备将这些原则应用于各种场景的实践技能，确保每次与ChatGPT的互动都能达到最佳效果。让我们开始这段提升您与AI对话互动的旅程。
- en: 'Chapter 1: Understanding the Basics'
  id: totrans-83
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第一章：理解基础知识
- en: In this opening chapter, we’ll lay the foundation for effective prompt engineering
    by understanding what prompts are, their significance in interactions with AI
    like ChatGPT, and the essential components of crafting successful prompts. We
    will also explore common pitfalls in prompt creation and provide examples with
    detailed analysis to illustrate these concepts.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将通过了解提示词是什么，它们在与ChatGPT等AI互动中的重要性，以及成功提示的必要组成部分，为有效的提示工程奠定基础。我们还将探讨提示创建中的常见陷阱，并提供带有详细分析的示例来说明这些概念。
- en: What are Prompts and Why are They Important?
  id: totrans-85
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 什么是提示词以及为什么它们很重要？
- en: What Are Prompts?
  id: totrans-86
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 什么是提示词？
- en: A prompt is a user-provided input that directs the AI to generate a specific
    output or response. It acts as a guide for the AI, informing it of the user’s
    intentions and the type of information or interaction desired.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 提示是一个用户提供的输入，它指导AI生成特定的输出或响应。它充当AI的指南，告知AI用户的意图和所需的信息或交互类型。
- en: Why Are They Important?
  id: totrans-88
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 为什么它们很重要？
- en: Prompts are crucial because they directly influence the AI’s behavior and the
    quality of its responses. A well-constructed prompt results in accurate, relevant,
    and valuable outputs, while a poorly formulated prompt can lead to responses that
    are unhelpful or off-topic. Effective prompting is especially important in scenarios
    where precision and relevancy are critical, such as educational settings, professional
    tasks, or technical support.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 提示至关重要，因为它们直接影响AI的行为和其响应的质量。一个构建良好的提示会产生准确、相关和有价值的输出，而一个构建不良的提示可能导致无帮助或离题的响应。在需要精确性和相关性的场景中，如教育环境、专业任务或技术支持，有效的提示尤其重要。
- en: Basic Components of Effective Prompts
  id: totrans-90
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 有效提示的基本要素
- en: 'Effective prompts typically include several key components:'
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 有效的提示通常包括几个关键要素：
- en: 'Clarity: The prompt should be clear and unambiguous to avoid any confusion
    about what is asked.'
  id: totrans-92
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 清晰：提示应该清晰明确，以避免对所提要求的任何混淆。
- en: 'Specificity: Specific details should be included to guide the AI in generating
    the desired response.'
  id: totrans-93
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 明确性：应包含具体细节以引导AI生成所需的响应。
- en: 'Brevity: While detail is important, prompts should also be concise to maintain
    focus and efficiency.'
  id: totrans-94
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 简洁：虽然细节很重要，但提示也应该简洁，以保持专注和效率。
- en: 'Context: Providing context helps the AI understand the broader scenario in
    which the question or request is made.'
  id: totrans-95
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 上下文：提供上下文有助于AI理解问题或请求提出的更广泛场景。
- en: Incorporating these elements ensures that the AI has all the necessary information
    to produce a response that meets the user’s needs.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 包含这些要素确保AI拥有生成满足用户需求响应所需的所有必要信息。
- en: Common Mistakes to Avoid in Prompt Creation
  id: totrans-97
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 避免在提示创建中犯的常见错误
- en: 'Several common mistakes can detract from the effectiveness of a prompt:'
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 几个常见的错误会降低提示的有效性：
- en: 'Overloading the Prompt: Including too much information or too many questions
    in a single prompt can overwhelm the AI, leading to scattered or incomplete responses.'
  id: totrans-99
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提示过载：在一个提示中包含过多信息或过多问题可能会使AI感到不知所措，导致回答散乱或不完整。
- en: 'Being Too Vague: Lack of detail can result in generic or irrelevant responses
    as the AI tries to fill in the gaps.'
  id: totrans-100
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 过于模糊：缺乏细节可能导致AI在填补空白时给出泛泛或无关的回应。
- en: 'Using Ambiguous Language: Ambiguities in the prompt can mislead the AI, causing
    it to misinterpret the request.'
  id: totrans-101
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用模糊语言：提示中的模糊性可能会误导AI，导致其误解请求。
- en: 'Ignoring Context: Not providing enough background information can prevent the
    AI from understanding the full scope of the prompt.'
  id: totrans-102
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 忽略上下文：不提供足够的背景信息可能会阻止AI理解提示的全貌。
- en: Avoiding these errors will significantly enhance the quality of interactions
    with ChatGPT.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 避免这些错误将显著提高与ChatGPT交互的质量。
- en: Example Prompts and Their Analysis
  id: totrans-104
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 示例提示及其分析
- en: 'To illustrate these points, let’s analyze a few example prompts:'
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 为了说明这些观点，让我们分析几个示例提示：
- en: 'Example 1: Asking for a Recipe'
  id: totrans-106
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 示例1：请求食谱
- en: 'Poor Prompt: “How do I cook something tasty?”'
  id: totrans-107
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 糟糕的提示：“我如何烹饪美味的东西？”
- en: 'Analysis: This prompt is vague and subjective. What is “tasty” can vary greatly.'
  id: totrans-108
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 分析：这个提示模糊且主观。对“美味”的定义可能大相径庭。
- en: 'Improved Prompt: “What is a simple recipe for a vegetarian pasta dish for two?”'
  id: totrans-109
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 改进的提示：“为两人制作一份简单的素食意面食谱是什么？”
- en: 'Analysis: This prompt is specific, clear, and concise. It provides specific
    dietary preferences and the number of servings, which helps in tailoring the response
    accurately.'
  id: totrans-110
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 分析：这个提示具体、清晰且简洁。它提供了具体的饮食偏好和所需份量，这有助于准确定制响应。
- en: 'Example 2: Requesting Travel Advice'
  id: totrans-111
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 示例2：请求旅游建议
- en: 'Poor Prompt: “Planning a trip.”'
  id: totrans-112
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 糟糕的提示：“计划一次旅行。”
- en: 'Analysis: This prompt lacks actionable details and context.'
  id: totrans-113
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 分析：这个提示缺乏可操作的细节和上下文。
- en: 'Improved Prompt: “What are the top five tourist attractions to visit in Paris
    during the spring?”'
  id: totrans-114
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 改进的提示：“在春季访问巴黎的前五个旅游景点是什么？”
- en: 'Analysis: The revised prompt is specific about the location, number of recommendations,
    and time of visit, making it easier for the AI to provide useful and relevant
    information.'
  id: totrans-115
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 分析：修改后的提示具体说明了地点、推荐的数量和访问时间，这使得AI提供有用且相关的信息变得更容易。
- en: 'Example 3: Technical Support Inquiry'
  id: totrans-116
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 示例3：技术支持咨询
- en: 'Poor Prompt: “Computer issue.”'
  id: totrans-117
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 差劲的提示：“电脑问题。”
- en: 'Analysis: This prompt is too general and provides no details about the actual
    problem.'
  id: totrans-118
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 分析：此提示过于笼统，没有提供关于实际问题的任何细节。
- en: 'Improved Prompt: “How do I resolve a startup error on a Windows 10 laptop?”'
  id: totrans-119
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 改进的提示：“如何在Windows 10笔记本电脑上解决启动错误？”
- en: 'Analysis: This prompt specifies the operating system and the nature of the
    issue, directing the AI to generate a focused and appropriate response.'
  id: totrans-120
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 分析：此提示指定了操作系统和问题的性质，指导AI生成专注且适当的回复。
- en: Through these examples, we see how refining a prompt by incorporating clarity,
    specificity, brevity, and context can greatly improve the responses from ChatGPT.
    This chapter serves as an introduction to the principles that will be built upon
    in the following chapters, guiding you towards becoming proficient in prompt engineering.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 通过这些示例，我们看到通过结合清晰度、特定性、简洁性和上下文来精炼提示，可以极大地改善ChatGPT的回复。本章作为后续章节将要建立的原则的介绍，指导你成为提示工程的高手。
- en: 'Chapter 2: Clarity and Precision in Prompts'
  id: totrans-122
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第二章：提示的清晰度和精确度
- en: Effective communication with ChatGPT hinges on the clarity and precision of
    the prompts you provide. This chapter explores how to craft clear and precise
    prompts, examines the impact of specific versus vague language, and offers practical
    examples to transform an unclear prompt into a specific and actionable one.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 与ChatGPT的有效沟通取决于你提供的提示的清晰度和精确度。本章探讨了如何构建清晰和精确的提示，分析了特定语言与模糊语言的影响，并提供了将不明确的提示转化为具体和可操作提示的实用示例。
- en: How to Craft Clear and Precise Prompts
  id: totrans-124
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 如何构建清晰和精确的提示
- en: 'Creating clear and precise prompts involves a few key techniques:'
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 创建清晰和精确的提示涉及几个关键技术：
- en: 'Be Direct: Use straightforward language. Avoid ambiguity by stating exactly
    what you need from ChatGPT.'
  id: totrans-126
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 直接表达：使用直接的语言。通过明确表达你需要ChatGPT提供的内容来避免歧义。
- en: 'Use Specific Details: Incorporate relevant details that can guide the AI to
    understand the context and deliver a more tailored response.'
  id: totrans-127
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用具体细节：融入相关细节，以引导AI理解上下文并提供更定制化的回复。
- en: 'Define the Scope: Clearly outline the boundaries of your inquiry. Specify any
    constraints or conditions that should apply to the response.'
  id: totrans-128
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 定义范围：明确界定你的查询界限。指定任何应适用于回复的约束或条件。
- en: 'Set the Format: If you have a preference for how the information should be
    presented (e.g., a list, a detailed explanation, a summary), mention this in your
    prompt.'
  id: totrans-129
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 设置格式：如果你对信息呈现方式有偏好（例如，列表、详细解释、摘要），请在你的提示中提及这一点。
- en: By adhering to these guidelines, you enhance the likelihood of receiving a response
    that meets your expectations without the need for further clarification.
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 通过遵循这些指南，你提高收到符合你期望的回复的可能性，无需进一步澄清。
- en: The Impact of Specific vs. Vague Language
  id: totrans-131
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 特定语言与模糊语言的影响
- en: 'The specificity of language in a prompt significantly affects the quality of
    the AI’s response:'
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 提示中的语言特定性显著影响AI回复的质量：
- en: 'Specific Language: Prompts that use specific language tend to receive responses
    that are directly relevant to the query. Specificity helps the AI understand the
    exact nature of the information or output desired, minimizing the risk of irrelevant
    or overly general answers.'
  id: totrans-133
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 特定语言：使用特定语言的提示往往收到与查询直接相关的回复。特定性有助于AI理解所需信息的确切性质或输出，最小化无关或不切实际的答案的风险。
- en: 'Vague Language: Vague prompts often lead to vague responses. When the AI lacks
    clear direction, it must make assumptions about the intent of the prompt, which
    can lead to answers that may not be useful or that diverge from the user’s actual
    needs.'
  id: totrans-134
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 模糊语言：模糊的提示往往导致模糊的回复。当AI缺乏明确的方向时，它必须对提示的意图做出假设，这可能导致不有用或偏离用户实际需求的答案。
- en: Understanding the impact of your word choice helps in structuring prompts that
    lead to more satisfactory interactions with the AI.
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 理解你的词汇选择的影响有助于构建导致与AI更满意互动的提示。
- en: Examples of Transforming a Vague Prompt into a Specific One
  id: totrans-136
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 将模糊提示转化为具体提示的示例
- en: 'To illustrate the importance of precision and clarity, let’s examine a few
    examples of vague prompts transformed into specific ones:'
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 为了说明精确性和清晰性的重要性，让我们考察几个将模糊提示转化为具体提示的例子：
- en: Example 1
  id: totrans-138
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 示例1
- en: 'Vague Prompt: “Tell me about dogs.”'
  id: totrans-139
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 模糊提示：“告诉我关于狗的事情。”
- en: 'Specific Prompt: “Can you provide an overview of the dietary needs and common
    health issues of Labrador Retrievers?”'
  id: totrans-140
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 具体提示： “你能概述一下拉布拉多寻回犬的饮食需求和常见健康问题吗？”
- en: Example 2
  id: totrans-141
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 示例2
- en: 'Vague Prompt: “How do I make a cake?”'
  id: totrans-142
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 模糊提示： “我该如何制作蛋糕？”
- en: 'Specific Prompt: “What are the steps and ingredients needed to bake a gluten-free
    chocolate cake for eight people?”'
  id: totrans-143
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 具体提示： “制作八人份无麸质巧克力蛋糕需要哪些步骤和原料？”
- en: Example 3
  id: totrans-144
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 示例3
- en: 'Vague Prompt: “Something about World War II.”'
  id: totrans-145
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 模糊提示： “关于第二次世界大战的一些内容。”
- en: 'Specific Prompt: “What were the major causes of World War II, and how did they
    contribute to the start of the war in 1939?”'
  id: totrans-146
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 具体提示： “第二次世界大战的主要原因是哪些，它们是如何导致1939年战争的开始的？”
- en: In each of these cases, the specific prompt provides clear direction to ChatGPT,
    allowing it to generate a more focused and useful response. This demonstrates
    how the precision of your prompt directly influences the effectiveness and relevance
    of the AI’s response.
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 在这些情况下，具体的提示为ChatGPT提供了明确的指导，使其能够生成更专注和有用的回答。这展示了你提示的精确性如何直接影响AI回答的有效性和相关性。
- en: By mastering the art of crafting clear and precise prompts, you empower yourself
    to harness the full capabilities of ChatGPT, ensuring that every interaction yields
    useful and enjoyable results. This chapter serves as a foundational guide to developing
    the skills necessary to communicate effectively with AI, setting the stage for
    more advanced interactions in subsequent chapters.
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 通过掌握构建清晰和精确提示的艺术，你能够充分利用ChatGPT的全部功能，确保每次互动都能产生有用和愉快的成果。本章作为一项基础指南，旨在培养与AI有效沟通所需的技能，为后续章节中更高级的互动奠定基础。
- en: 'Chapter 3: Prompting for Detailed Responses'
  id: totrans-149
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第三章：请求详细回答的提示
- en: When interacting with AI like ChatGPT, obtaining detailed and comprehensive
    answers is essential for tasks that require depth of understanding or nuanced
    information. This chapter delves into techniques to elicit such responses, the
    strategic use of open-ended versus closed questions, and provides sample prompts
    with analyses to demonstrate how these approaches yield depth and detail.
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 当与像ChatGPT这样的AI互动时，获得详细和全面的回答对于需要深度理解或细微信息的任务至关重要。本章深入探讨了引发此类回答的技巧，开放式问题与封闭式问题的战略使用，并提供带有分析的示例提示，以展示这些方法如何产生深度和细节。
- en: Techniques to Elicit Detailed and Comprehensive Answers
  id: totrans-151
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 引发详细和全面回答的技巧
- en: 'To encourage ChatGPT to provide detailed responses, consider the following
    techniques:'
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 为了鼓励ChatGPT提供详细的回答，可以考虑以下技巧：
- en: 1\. Frame the Prompt with Explicit Requests for Detail
  id: totrans-153
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1. 用明确要求详细内容的提示来构建提示
- en: Specify that you want a detailed response. For example, use phrases like “Can
    you explain in detail…” or “Provide a comprehensive overview of…” to signal your
    need for depth.
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 明确表示你想要详细的回答。例如，使用像“你能详细解释一下...”或“提供...的全面概述...”这样的短语来表明你需要深度信息。
- en: 2\. Ask Follow-Up Questions
  id: totrans-155
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2. 提出后续问题
- en: Build on the information provided by the AI with follow-up questions that delve
    deeper into the topic. This iterative approach often uncovers more layers of information.
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 通过提出深入主题的后续问题来构建AI提供的信息，这种迭代方法通常能揭示更多层次的信息。
- en: 3\. Provide Context
  id: totrans-157
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3. 提供背景信息
- en: Giving context not only helps the AI understand the prompt better but also frames
    the kind of detail you’re seeking. The more context you provide, the more tailored
    and specific the AI’s responses can be.
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 提供背景信息不仅有助于AI更好地理解提示，而且也框定了你寻求的细节类型。你提供的背景信息越多，AI的回答就越具体和个性化。
- en: 4\. Request Examples or Illustrations
  id: totrans-159
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4. 请求示例或说明
- en: Asking for examples or asking the AI to illustrate a point can lead to more
    concrete and detailed explanations.
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 请求示例或要求AI说明一个观点可以导致更具体和详细的解释。
- en: 5\. Use Specificity in Your Questions
  id: totrans-161
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 5. 在你的问题中使用具体性
- en: Asking very specific questions can force the AI to leave generic responses behind
    and provide precise information.
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 提出非常具体的问题可以迫使AI放弃泛泛的回答，并提供精确的信息。
- en: Use of Open-Ended vs. Closed Questions
  id: totrans-163
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 开放式问题与封闭式问题的使用
- en: 'Understanding when to use open-ended versus closed questions can significantly
    impact the level of detail in the responses:'
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 理解何时使用开放式问题与封闭式问题可以显著影响回答的详细程度：
- en: Open-Ended Questions
  id: totrans-165
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 开放式问题
- en: 'These questions are designed to elicit a longer response and invite discussion
    or explanation. They are essential when you need comprehensive information or
    various perspectives on a topic. For example:'
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 这些问题旨在引发较长的回应，并邀请讨论或解释。当需要关于某个主题的全面信息或不同观点时，它们是必不可少的。例如：
- en: “What are the implications of blockchain technology for data security?”
  id: totrans-167
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “区块链技术对数据安全有哪些影响？”
- en: Closed Questions
  id: totrans-168
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 封闭式问题
- en: 'Closed questions typically solicit short or single-word answers and are useful
    for gathering specific facts or confirming details. They are not typically conducive
    to eliciting detailed responses unless combined with follow-up questions. For
    example:'
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 封闭式问题通常要求简短或单字回答，用于收集具体事实或确认细节。除非与后续问题结合，否则通常不利于引发详细回应。例如：
- en: “Is blockchain technology secure?”
  id: totrans-170
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “区块链技术是否安全？”
- en: In practice, a combination of both types of questions within a conversation
    can help maintain a natural flow and gather both broad and specific types of information.
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 在实际对话中，结合这两种类型的问题可以帮助保持自然的对话流程，并收集广泛和具体类型的信息。
- en: Sample Prompts and Responses Demonstrating Depth and Detail
  id: totrans-172
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 展示深度和细节的示例提示和回应
- en: To illustrate how these techniques work in practice, let’s look at some sample
    prompts and the type of detailed responses they might elicit from ChatGPT.
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 为了说明这些技术在实践中的工作方式，让我们看看一些示例提示和它们可能从ChatGPT那里引发的详细回应。
- en: 'Example 1: Environmental Impact of Electric Cars'
  id: totrans-174
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 示例 1：电动汽车的环境影响
- en: 'Prompt: “Can you explain in detail the environmental impacts of electric cars,
    including both positive and negative aspects?”'
  id: totrans-175
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提示：“你能详细解释电动汽车的环境影响，包括正面和负面的方面吗？”
- en: 'Response: “Electric cars are touted for their benefits in reducing exhaust
    emissions compared to conventional vehicles. Positively, they contribute to lower
    levels of pollutants like nitrogen oxides and particulates in the air. However,
    they also have drawbacks, such as the environmental cost of mining lithium for
    batteries, which can lead to habitat destruction and water pollution. Additionally,
    the carbon footprint associated with the production of electric vehicles, particularly
    the batteries, remains a significant challenge…”'
  id: totrans-176
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 回应：“电动汽车因其与传统车辆相比减少尾气排放的好处而受到赞誉。正面来看，它们有助于降低空气中的氮氧化物和颗粒物等污染物的水平。然而，它们也存在一些缺点，例如开采电池所需的锂的环境成本，这可能导致栖息地破坏和水污染。此外，电动汽车生产（尤其是电池）相关的碳足迹仍然是一个重大挑战……”
- en: 'Example 2: Historical Events Influencing Modern Politics'
  id: totrans-177
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 示例 2：影响现代政治的历史事件
- en: 'Prompt: “What are some key historical events that have shaped modern political
    systems, and can you provide specific examples of their influence today?”'
  id: totrans-178
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提示：“有哪些关键历史事件塑造了现代政治体系，你能提供一些具体例子说明它们对今天的具体影响吗？”
- en: 'Response: “Numerous historical events have profoundly influenced modern political
    systems. For instance, the French Revolution in the late 18th century introduced
    ideas of liberty, equality, and fraternity, which have become foundational principles
    of many modern democracies. Another example is the Cold War, which established
    the prevalence of the two-party system seen in the United States today, as ideologies
    battled for dominance…”'
  id: totrans-179
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 回应：“许多历史事件对现代政治体系产生了深远的影响。例如，18世纪末的法国大革命引入了自由、平等和博爱的理念，这些理念已成为许多现代民主国家的基础性原则。另一个例子是冷战，它确立了今天美国所看到的两党制的普遍性，因为意识形态在争夺主导地位……”
- en: 'Example 3: Advances in Medical Technology'
  id: totrans-180
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 示例 3：医学技术的进步
- en: 'Prompt: “Provide a comprehensive overview of recent advances in medical technology,
    especially those that improve patient care.”'
  id: totrans-181
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提示：“提供对近期医学技术进步的全面概述，特别是那些改善患者护理的技术。”
- en: 'Response: “Recent advances in medical technology have revolutionized patient
    care in several ways. Telemedicine has expanded access to healthcare services,
    allowing patients and doctors to communicate effectively despite geographical
    barriers. Artificial intelligence in diagnostics has improved the accuracy and
    speed of disease detection. Wearable health devices monitor patient vitals in
    real-time, enabling proactive management of conditions…”'
  id: totrans-182
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 回应：“近期医学技术的进步在几个方面彻底改变了患者护理。远程医疗扩大了医疗服务的可及性，使患者和医生能够在地理障碍的情况下有效沟通。人工智能在诊断方面的应用提高了疾病检测的准确性和速度。可穿戴健康设备实时监测患者的生命体征，使条件的前瞻性管理成为可能……”
- en: These examples showcase how crafting your prompts with clear intent for depth
    and employing strategic questioning techniques can greatly enhance the quality
    and substance of the responses from ChatGPT. This approach is crucial for leveraging
    AI effectively in more complex or information-rich inquiries.
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 这些例子展示了如何通过明确意图为深度制作提示，并采用战略性的提问技巧，可以极大地提高ChatGPT响应的质量和内容。
- en: 'Chapter 4: Creative Prompting'
  id: totrans-184
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第四章：创意提示
- en: Harnessing the creative capabilities of AI like ChatGPT can be incredibly rewarding.
    This chapter focuses on strategies to prompt AI for generating creative content
    such as stories, poems, and dialogues. We’ll explore how to effectively guide
    AI’s creativity with constraints and provide examples of creative prompts alongside
    their intriguing outputs.
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: 利用ChatGPT等AI的创造力能力可以非常有益。本章重点介绍提示AI生成故事、诗歌和对话等创意内容的策略。我们将探讨如何有效地通过限制引导AI的创造力，并提供创意提示及其引人入胜的输出的示例。
- en: Tips for Prompting AI to Generate Creative Content
  id: totrans-186
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 指导AI生成创意内容的技巧
- en: 1\. Define the Creative Format
  id: totrans-187
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1. 定义创意格式
- en: Start by clearly specifying the type of creative content you desire—be it a
    story, a poem, a script, or a dialogue. This helps the AI understand the framework
    within which to operate.
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: 首先明确指定你想要的创意内容类型——无论是故事、诗歌、剧本还是对话。这有助于AI理解其操作的框架。
- en: 2\. Set the Tone and Style
  id: totrans-189
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2. 设置语气和风格
- en: Indicate the tone (e.g., humorous, serious, whimsical) and style (e.g., modern,
    classical, abstract) you are aiming for. This guides the AI in matching the mood
    and approach you envision.
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: 指明你希望达到的语气（例如，幽默、严肃、古怪）和风格（例如，现代、古典、抽象）。这指导AI匹配你预想的情绪和方法。
- en: 3\. Incorporate Specific Themes or Elements
  id: totrans-191
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3. 结合特定的主题或元素
- en: Mention any themes (e.g., love, adventure, mystery) or specific elements (e.g.,
    a talking cat, a haunted house) you want included. This seeds the AI’s creative
    process with distinct ideas to develop.
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: 提及任何你希望包含的主题（例如，爱情、冒险、神秘）或特定元素（例如，会说话的猫、一个闹鬼的房子）。这为AI的创意过程播种了独特想法以发展。
- en: 4\. Use Inspirational Seeds
  id: totrans-193
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4. 使用灵感种子
- en: Provide a line of text, an image, or a scenario as a starting point. Such seeds
    can spark more nuanced and focused creative expressions from the AI.
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: 提供一行文本、一个图像或一个场景作为起点。这样的种子可以激发AI更细腻和专注的创意表达。
- en: 5\. Limitations Are Your Friends
  id: totrans-195
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 5. 局限是你的朋友
- en: Set boundaries or limitations (e.g., a poem with a specific rhyme scheme, a
    story of exactly 100 words). Constraints can actually enhance creativity by focusing
    it within a defined scope.
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
  zh: 设定边界或限制（例如，一首具有特定韵律的诗，一个恰好100个单词的故事）。限制实际上可以通过将创造力集中在定义的范围内来增强创造力。
- en: How to Guide AI’s Creativity with Constraints
  id: totrans-197
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 如何通过限制引导AI的创造力
- en: 'Guiding AI’s creativity involves not just asking it to create, but directing
    its creative energies in productive ways. Here’s how you can use constraints effectively:'
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: 引导AI的创造力不仅涉及要求它创造，还要以富有成效的方式引导其创造力。以下是如何有效地使用限制：
- en: 1\. Structural Constraints
  id: totrans-199
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1. 结构限制
- en: Define a structure for the content, such as a sonnet for a poem or a three-act
    format for a story. These frameworks give the AI a clear template to fill with
    creative details.
  id: totrans-200
  prefs: []
  type: TYPE_NORMAL
  zh: 为内容定义一个结构，例如诗歌的十四行诗或故事的三幕格式。这些框架为AI提供了一个清晰的模板，以填充创意细节。
- en: 2\. Thematic Constraints
  id: totrans-201
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2. 主题限制
- en: Specify themes or motifs that the content should revolve around. This ensures
    that the AI maintains focus on relevant ideas and integrates them throughout the
    creative work.
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
  zh: 明确指定内容应围绕的主题或主题。这确保AI专注于相关想法，并在整个创作工作中整合它们。
- en: 3\. Character and Setting Constraints
  id: totrans-203
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3. 角色和场景限制
- en: For narratives, define characters and settings. This might include character
    backstories, relationships, or specific settings, guiding the AI to develop a
    consistent and coherent world.
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
  zh: 对于叙事，定义角色和场景。这可能包括角色的背景故事、关系或特定的场景，引导AI发展一个一致且连贯的世界。
- en: 4\. Linguistic Constraints
  id: totrans-205
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4. 语言限制
- en: Impose linguistic styles or the use of specific vocabulary or dialects. This
    can be particularly effective in poetry or dialogues where the choice of words
    significantly impacts the tone and authenticity.
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: 强制使用特定的语言风格或词汇或方言。这在诗歌或对话中尤其有效，因为词汇的选择会显著影响语气和真实性。
- en: Examples of Creative Prompts and the Resulting Outputs
  id: totrans-207
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 创意提示和结果输出的示例
- en: 'To illustrate these strategies in action, here are some creative prompts along
    with AI-generated outputs:'
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
  zh: 为了说明这些策略的实际应用，以下是一些创意提示以及AI生成的输出：
- en: 'Example 1: A Modern Fairy Tale'
  id: totrans-209
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 示例1：一个现代童话
- en: 'Prompt: “Write a short fairy tale about a knight who rescues a dragon from
    a princess. The story should be whimsical and set in a magical forest, using modern
    slang.”'
  id: totrans-210
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提示：“写一个关于骑士从公主手中拯救龙的短篇童话。故事应该是奇妙的，并设定在一个魔法森林中，使用现代俚语。”
- en: 'Output: “Once upon a gnarly time, in the rad woods of Wondermore, Sir Lancelittle,
    a knight with mad skateboarding skills, embarked on a dope quest. His mission?
    To rescue Sparky, the chill dragon, from Princess Gnarlina, who was totally harshing
    his mellow…”'
  id: totrans-211
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 输出结果：“在一个崎岖的时代，在沃德莫尔的美丽森林中，兰斯利特爵士，一个拥有疯狂滑板技巧的骑士，开始了他的疯狂冒险。他的任务是什么？从公主格纳琳那里拯救冷静的龙斯帕基，她完全破坏了他的平静……”
- en: 'Example 2: An Abstract Poem'
  id: totrans-212
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 示例2：一首抽象诗
- en: 'Prompt: “Create a poem that explores the theme of solitude using an abstract
    style and incorporating the imagery of the ocean. The poem should not rhyme but
    must use alliteration.”'
  id: totrans-213
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提示：“创作一首探讨孤独主题的诗歌，采用抽象风格，并融入海洋的意象。这首诗不应押韵，但必须使用头韵。”
- en: 'Output: “Silent seas sway, softly singing solitary songs. Waves whisper to
    the wind, weaving woes into water. Alone, the azure abyss holds heartbeats hidden
    beneath her hull.”'
  id: totrans-214
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 输出结果：“寂静的大海摇摆，轻柔地唱着孤独的歌曲。波浪向风低语，将忧伤编织进水中。独自一人，蔚蓝的深渊在她船体下隐藏着心跳。”
- en: 'Example 3: Dialogue for a Script'
  id: totrans-215
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 示例3：剧本对话
- en: 'Prompt: “Write a dialogue between two astronauts discovering an alien civilization
    on Mars. The conversation should reveal their surprise and incorporate scientific
    jargon.”'
  id: totrans-216
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提示：“写一段对话，描述两位宇航员在火星上发现外星文明。对话应揭示他们的惊讶，并融入科学术语。”
- en: 'Output: “Astronaut 1: ‘Do you see what I see? Those structures, they’re not
    natural formations. They’re geometric, symmetrical.’Astronaut 2: ‘Incredible!
    The spectrograph readings suggest advanced alloy compositions. This isn’t just
    a discovery; it’s first contact!’”'
  id: totrans-217
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 输出结果：“宇航员1：‘你看到我看到的了吗？那些结构，它们不是自然形成的。它们是几何的，对称的。’宇航员2：‘太令人难以置信了！光谱仪读数表明是高级合金成分。这不仅仅是一个发现；这是首次接触！’”
- en: These examples demonstrate how specific prompts can guide AI to produce creative,
    engaging, and relevant content. By mastering the art of creative prompting, you
    can leverage AI to generate unique and imaginative works, pushing the boundaries
    of what automated systems can create.
  id: totrans-218
  prefs: []
  type: TYPE_NORMAL
  zh: 这些例子展示了如何通过具体的提示引导AI生成具有创意、吸引力和相关性的内容。通过掌握创意提示的艺术，你可以利用AI生成独特和富有想象力的作品，推动自动化系统可以创造边界的极限。
- en: 'Chapter 5: Technical and Informational Prompting'
  id: totrans-219
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第五章：技术和信息提示
- en: Engaging with AI like ChatGPT to obtain technical explanations or factual information
    demands a different approach compared to creative or conversational prompting.
    This chapter explores the best practices for crafting such prompts, strategies
    for structuring prompts to maximize data accuracy and relevancy, and provides
    examples of well-crafted technical and informational prompts with their optimal
    responses.
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
  zh: 与ChatGPT等AI进行互动以获取技术解释或事实信息需要与创意或对话提示不同的方法。本章探讨了制作此类提示的最佳实践，结构化提示以最大化数据准确性和相关性的策略，并提供了精心制作的具有最佳响应的技术和信息提示示例。
- en: Best Practices for Prompts Requiring Technical Explanations or Factual Information
  id: totrans-221
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 需要技术解释或事实信息提示的最佳实践
- en: 1\. Be Explicit About the Desired Detail Level
  id: totrans-222
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1. 明确所需的详细程度
- en: Clarify whether you need a high-level overview or a detailed technical explanation.
    This helps the AI adjust the complexity of its response to suit your requirements.
  id: totrans-223
  prefs: []
  type: TYPE_NORMAL
  zh: 明确你需要的概述是高级的还是详细的解释。这有助于AI调整其响应的复杂性以满足你的要求。
- en: 2\. Use Precise and Technical Language
  id: totrans-224
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2. 使用精确和技术的语言
- en: When seeking technical information, use specific terms related to the subject
    matter. This precision guides the AI to engage with the topic at the appropriate
    level of expertise.
  id: totrans-225
  prefs: []
  type: TYPE_NORMAL
  zh: 当寻求技术信息时，使用与主题相关的特定术语。这种精确性指导AI在适当的专家水平上与主题互动。
- en: 3\. Contextualize the Question
  id: totrans-226
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3. 上下文化问题
- en: Provide background information or context that can help the AI understand the
    scope and relevance of your query. This is particularly important in fields like
    medicine or engineering where the context can significantly influence the information.
  id: totrans-227
  prefs: []
  type: TYPE_NORMAL
  zh: 提供背景信息或上下文，这有助于AI理解查询的范围和相关性。这在医学或工程等领域尤为重要，因为上下文可以显著影响信息。
- en: 4\. Clarify Any Assumptions
  id: totrans-228
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4. 明确任何假设
- en: State any assumptions that should be considered in the AI’s response, such as
    specific conditions, scenarios, or constraints. This helps prevent misunderstandings
    and ensures the response is applicable to your situation.
  id: totrans-229
  prefs: []
  type: TYPE_NORMAL
  zh: 明确AI响应中应考虑的任何假设，例如特定条件、场景或约束。这有助于防止误解并确保响应适用于你的情况。
- en: 5\. Request Sources or References
  id: totrans-230
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 5. 请求来源或参考文献
- en: For factual information, ask the AI to include references or explain the basis
    of its information. This can lend credibility to the response and allow for further
    exploration if needed.
  id: totrans-231
  prefs: []
  type: TYPE_NORMAL
  zh: 对于事实信息，请要求AI包含参考文献或解释其信息的基础。这可以增加响应的可信度，并在需要时允许进一步探索。
- en: How to Structure a Prompt to Maximize Data Accuracy and Relevancy
  id: totrans-232
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 如何构建提示以最大化数据准确性和相关性
- en: 1\. Direct the Focus
  id: totrans-233
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1. 指导焦点
- en: Use the prompt to clearly define the focus of the AI’s response. For example,
    rather than asking “How do solar panels work?” you might ask, “Can you explain
    the role of photovoltaic cells in solar panel technology?”
  id: totrans-234
  prefs: []
  type: TYPE_NORMAL
  zh: 使用提示明确定义AI响应的焦点。例如，与其问“太阳能板是如何工作的？”不如问，“你能解释光伏电池在太阳能板技术中的作用吗？”
- en: 2\. Segment Complex Questions
  id: totrans-235
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2. 分段复杂问题
- en: If you have a complex inquiry, break it down into smaller, manageable parts.
    This not only makes it easier for the AI to provide accurate information but also
    helps in organizing the response into a coherent narrative.
  id: totrans-236
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你有一个复杂的问题，将其分解成更小、更易于管理的部分。这不仅使AI提供准确信息变得更容易，还有助于将响应组织成一个连贯的叙述。
- en: 3\. Use Enumerated or Bulleted Questions
  id: totrans-237
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3. 使用编号或项目符号问题
- en: When several questions are involved, listing them as bullet points or numbered
    items can help ensure none are overlooked and each is addressed thoroughly.
  id: totrans-238
  prefs: []
  type: TYPE_NORMAL
  zh: 当涉及多个问题时，将它们列成项目符号或编号项可以帮助确保没有遗漏，并且每个问题都得到了充分解答。
- en: 4\. Specify the Desired Format of the Answer
  id: totrans-239
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4. 指定所需答案格式
- en: If you need the information presented in a particular format (e.g., a list,
    a table, a detailed paragraph), specify this in your prompt to guide the AI’s
    output structure.
  id: totrans-240
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你需要以特定格式（例如列表、表格、详细段落）呈现信息，请在提示中指定，以指导AI的输出结构。
- en: Examples of Informational Prompts and Their Optimal Responses
  id: totrans-241
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 信息提示示例及其最佳响应
- en: 'To demonstrate these techniques, here are some example prompts designed for
    technical accuracy and optimal responses:'
  id: totrans-242
  prefs: []
  type: TYPE_NORMAL
  zh: 为了展示这些技术，以下是一些为技术准确性和最佳响应设计的示例提示：
- en: 'Example 1: Understanding Quantum Computing'
  id: totrans-243
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 示例 1：理解量子计算
- en: 'Prompt: “Please provide a detailed explanation of how quantum computing differs
    from classical computing, focusing on quantum bits versus binary bits.”'
  id: totrans-244
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提示：请提供量子计算与经典计算差异的详细解释，重点关注量子比特与二进制比特。
- en: 'Response: “Quantum computing differs fundamentally from classical computing
    in its use of quantum bits, or qubits, versus binary bits. While binary bits can
    exist only in states of 0 or 1, qubits can exist simultaneously in multiple states
    due to quantum superposition. This allows quantum computers to process vast amounts
    of probabilities simultaneously, making them potentially capable of solving complex
    problems that are infeasible for classical computers…”'
  id: totrans-245
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 响应：“量子计算与经典计算在量子比特或qubits的使用上存在根本区别，与二进制比特不同。由于量子叠加，量子比特可以同时存在于多个状态，这使得量子计算机能够同时处理大量的概率，从而可能解决经典计算机无法解决的复杂问题。”
- en: 'Example 2: The Impact of AI on Healthcare'
  id: totrans-246
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 示例 2：人工智能对医疗保健的影响
- en: 'Prompt: “Discuss the impact of artificial intelligence on modern healthcare,
    specifically in diagnostics and patient data analysis, including any existing
    concerns.”'
  id: totrans-247
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提示：请讨论人工智能对现代医疗保健的影响，特别是在诊断和患者数据分析方面，包括任何现有担忧。
- en: 'Response: “Artificial intelligence has significantly transformed modern healthcare,
    particularly in diagnostics and patient data analysis. AI algorithms can analyze
    complex medical data much faster than human counterparts, leading to quicker and
    often more accurate diagnoses. Concerns include data privacy, as AI systems require
    access to large amounts of personal health information, and the potential for
    AI to perpetuate existing biases in medical treatment recommendations…”'
  id: totrans-248
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 响应：“人工智能显著改变了现代医疗保健，特别是在诊断和患者数据分析方面。AI算法可以比人类同行更快地分析复杂医疗数据，从而实现更快、通常更准确的诊断。担忧包括数据隐私，因为AI系统需要访问大量个人健康信息，以及AI在医疗治疗建议中可能持续存在的偏见。”
- en: 'Example 3: Environmental Effects of Deforestation'
  id: totrans-249
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 示例 3：森林砍伐的环境影响
- en: 'Prompt: “Explain the environmental effects of deforestation in the Amazon rainforest,
    focusing on its impact on biodiversity and climate change. Include any relevant
    data or studies.”'
  id: totrans-250
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提示： “解释亚马逊雨林砍伐森林的环境影响，重点关注其对生物多样性和气候变化的影响。包括任何相关的数据或研究。”
- en: 'Response: “Deforestation in the Amazon rainforest has profound environmental
    effects, notably on biodiversity and climate change. It leads to the loss of habitat
    for thousands of species, many of which are endemic to the region, thereby reducing
    biodiversity. This deforestation also contributes to climate change, as the Amazon’s
    dense forests act as a major carbon sink. Studies, such as those by the World
    Wildlife Fund, have documented that areas deforested in the Amazon release significant
    amounts of carbon dioxide, exacerbating global warming…”'
  id: totrans-251
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 回复： “亚马逊雨林砍伐森林对环境有深远的影响，特别是在生物多样性和气候变化方面。它导致数千种物种的栖息地丧失，其中许多物种是该地区的特有物种，从而减少了生物多样性。这种砍伐森林还导致气候变化，因为亚马逊的茂密森林是主要的碳汇。世界野生动物基金会等机构的研究表明，亚马逊砍伐森林的地区释放了大量的二氧化碳，加剧了全球变暖……”
- en: These examples show how well-structured prompts lead to detailed, accurate,
    and highly relevant AI responses. By applying these strategies, users can effectively
    leverage AI capabilities to gain insights and information that are both precise
    and applicable to their specific needs.
  id: totrans-252
  prefs: []
  type: TYPE_NORMAL
  zh: 这些示例展示了结构良好的提示如何导致详细、准确且高度相关的AI响应。通过应用这些策略，用户可以有效地利用AI能力，获得既精确又适用于其特定需求的信息。
- en: 'Chapter 6: Handling Ambiguity and Complexity'
  id: totrans-253
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第6章：处理模糊性和复杂性
- en: Navigating ambiguity and complexity in questions posed to AI systems like ChatGPT
    is a crucial skill in prompt engineering. This chapter delves into strategies
    for dealing with ambiguous queries, techniques for breaking down complex topics
    into simpler, manageable prompts, and provides concrete examples demonstrating
    how effectively restructuring a prompt can lead to more precise and clearer responses.
  id: totrans-254
  prefs: []
  type: TYPE_NORMAL
  zh: 在ChatGPT等AI系统中导航模糊问题和复杂性是提示工程中的关键技能。本章深入探讨了处理模糊查询的策略、将复杂主题分解为更简单、可管理的提示的技术，并提供了具体示例，说明如何有效地重构提示可以导致更精确和清晰的响应。
- en: Strategies for Dealing with Ambiguous Queries
  id: totrans-255
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 应对模糊查询的策略
- en: 'Ambiguity in prompts can lead to broad, unfocused, or irrelevant responses
    from AI. To mitigate this, consider the following strategies:'
  id: totrans-256
  prefs: []
  type: TYPE_NORMAL
  zh: 提示中的模糊性可能导致AI提供广泛、不集中或不相关的响应。为了减轻这种情况，请考虑以下策略：
- en: 1\. Clarify Ambiguities
  id: totrans-257
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1. 澄清模糊之处
- en: Before submitting your prompt, identify any ambiguous terms or phrases and replace
    them with specific information. If the ambiguity stems from multiple interpretations,
    define the context or scope you are interested in.
  id: totrans-258
  prefs: []
  type: TYPE_NORMAL
  zh: 在提交提示之前，确定任何模糊的术语或短语，并用具体信息替换它们。如果模糊性源于多种解释，请定义您感兴趣的上下文或范围。
- en: 2\. Ask for Clarifications
  id: totrans-259
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2. 要求澄清
- en: When dealing with inputs that have inherent ambiguities, structure your prompt
    to request clarification from the AI. For example, if the topic is broad, you
    might ask the AI to list possible interpretations and then focus on one.
  id: totrans-260
  prefs: []
  type: TYPE_NORMAL
  zh: 当处理具有固有模糊性的输入时，构建您的提示以请求AI进行澄清。例如，如果主题范围广泛，您可以要求AI列出可能的解释，然后专注于其中之一。
- en: 3\. Use Follow-Up Questions
  id: totrans-261
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3. 使用后续问题
- en: If an initial response is ambiguous, use follow-up questions to narrow down
    the focus and guide the AI towards the desired clarity.
  id: totrans-262
  prefs: []
  type: TYPE_NORMAL
  zh: 如果初始响应模糊不清，请使用后续问题来缩小焦点，并引导AI向期望的清晰度发展。
- en: How to Break Down Complex Topics into Simpler, Manageable Prompts
  id: totrans-263
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 如何将复杂主题分解为更简单、可管理的提示
- en: 'Complex topics often require detailed exploration, which can be challenging
    to manage in a single prompt. Break down these topics by:'
  id: totrans-264
  prefs: []
  type: TYPE_NORMAL
  zh: 复杂的主题通常需要详细探讨，这在单个提示中可能难以管理。通过以下方式分解这些主题：
- en: 1\. Segmenting the Topic
  id: totrans-265
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1. 分割主题
- en: Identify the main components or subtopics of the main issue. This allows you
    to approach each segment individually, making the overall topic more digestible.
  id: totrans-266
  prefs: []
  type: TYPE_NORMAL
  zh: 确定主要问题的主要组成部分或子主题。这使您能够单独处理每个部分，从而使整个主题更容易理解。
- en: 2\. Prioritizing Information
  id: totrans-267
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2. 优先处理信息
- en: Decide what information is most crucial to your understanding or goals and tailor
    your prompts to focus on these elements first.
  id: totrans-268
  prefs: []
  type: TYPE_NORMAL
  zh: 决定对您理解或目标最重要的信息，并调整您的提示以首先关注这些元素。
- en: 3\. Using a Sequential Approach
  id: totrans-269
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3. 采用顺序方法
- en: Craft a series of prompts that build on each other. Start with foundational
    questions and gradually move towards more detailed inquiries as the basics are
    clarified.
  id: totrans-270
  prefs: []
  type: TYPE_NORMAL
  zh: 设计一系列层层递进的提示。从基础问题开始，随着基本知识的澄清，逐渐转向更详细的问题。
- en: Examples Showing How Restructuring a Prompt Can Lead to Clearer Responses
  id: totrans-271
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 展示如何通过重构提示获得更清晰回复的例子
- en: To illustrate the impact of well-structured prompts, here are examples of complex
    and ambiguous prompts that are restructured for clarity and simplicity.
  id: totrans-272
  prefs: []
  type: TYPE_NORMAL
  zh: 为了说明结构良好的提示的影响，以下是一些复杂和模糊的提示的例子，这些提示被重新构建以增强清晰性和简单性。
- en: 'Example 1: Understanding Economic Theories'
  id: totrans-273
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 示例 1：理解经济理论
- en: 'Ambiguous Prompt: “Tell me about economics.”'
  id: totrans-274
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 模糊提示：“告诉我关于经济学的事情。”
- en: 'Restructured Prompt: “What are the key principles of Keynesian economic theory,
    and how do they propose to manage economic recessions?”'
  id: totrans-275
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 重新构建的提示： “凯恩斯经济理论的关键原则是什么，以及它们是如何提出管理经济衰退的？”
- en: 'Response: “Keynesian economic theory argues that private sector decisions sometimes
    lead to inefficient macroeconomic outcomes and therefore advocates active policy
    responses by the public sector, including monetary policy actions by the central
    bank and fiscal policy actions by the government to stabilize output over the
    business cycle. Specifically, during recessions, Keynesian theory supports government
    spending to offset decreased private spending, aiming to mitigate the economic
    downturn.”'
  id: totrans-276
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 回复： “凯恩斯经济理论认为，私营部门的决策有时会导致宏观经济效率低下，因此主张公共部门采取积极政策反应，包括中央银行的货币政策和政府的财政政策来稳定商业周期中的产出。具体来说，在经济衰退期间，凯恩斯理论支持政府支出以抵消私人支出的减少，旨在减轻经济衰退。”
- en: 'Example 2: Exploring Climate Change'
  id: totrans-277
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 示例 2：探索气候变化
- en: 'Complex Prompt: “How is climate changing?”'
  id: totrans-278
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 复杂的提示： “气候是如何变化的？”
- en: 'Restructured Prompts:'
  id: totrans-279
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 重新构建的提示：
- en: “What are the scientifically recognized causes of climate change?”
  id: totrans-280
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: “气候变化的科学公认原因是什么？”
- en: “What are the major effects of climate change observed in the last decade?”
  id: totrans-281
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: “在过去十年中观察到的气候变化的主要影响是什么？”
- en: “What mitigation strategies are most effective in combating climate change?”
  id: totrans-282
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: “在应对气候变化方面，哪些缓解策略最为有效？”
- en: 'Response to Prompt 1: “The primary cause of recent climate change is the increase
    in greenhouse gases, such as CO2, released by human activities like deforestation
    and burning fossil fuels. These gases trap heat in the atmosphere, leading to
    a warming effect known as the greenhouse effect.”'
  id: totrans-283
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对提示 1 的回复：“最近气候变化的主要原因是人类活动（如森林砍伐和燃烧化石燃料）释放的温室气体（如二氧化碳）的增加。这些气体在大气中捕获热量，导致温室效应，即增温效应。”
- en: 'Example 3: Technological Advancements'
  id: totrans-284
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 示例 3：技术进步
- en: 'Broad Prompt: “Tell me about technology.”'
  id: totrans-285
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 广泛的提示： “告诉我关于技术的事情。”
- en: 'Structured Prompts:'
  id: totrans-286
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 结构化提示：
- en: “What are the latest advancements in renewable energy technologies as of this
    year?”
  id: totrans-287
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: “截至今年，可再生能源技术的最新进展是什么？”
- en: “How have these advancements impacted energy costs?”
  id: totrans-288
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: “这些进步如何影响了能源成本？”
- en: 'Response to Prompt 1: “In the current year, major advancements in renewable
    energy technologies include improvements in solar panel efficiency, the development
    of larger and more cost-effective wind turbines, and advances in battery storage
    capabilities, allowing for better energy retention from intermittent sources like
    solar and wind.”'
  id: totrans-289
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对提示 1 的回复：“在当前年份，可再生能源技术的重大进展包括太阳能电池效率的提高、更大、成本效益更高的风力涡轮机的开发，以及电池储能能力的提升，从而能够更好地从间歇性能源如太阳能和风能中保留能量。”
- en: These examples demonstrate how specific, well-structured prompts not only reduce
    ambiguity but also compartmentalize complex topics into manageable pieces, facilitating
    more focused and informative responses from AI. This approach ensures that users
    can navigate intricate subjects effectively, making the most out of their interactions
    with AI.
  id: totrans-290
  prefs: []
  type: TYPE_NORMAL
  zh: 这些例子展示了具体、结构良好的提示不仅减少了模糊性，而且将复杂主题分解成可管理的部分，从而促进了更专注和更有信息量的AI回复。这种方法确保用户能够有效地导航复杂主题，最大限度地发挥与AI互动的效益。
- en: 'Chapter 7: Interactive Prompting'
  id: totrans-291
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第 7 章：交互式提示
- en: Interactive prompting involves crafting prompts that facilitate an engaging
    and dynamic dialogue between the user and AI, like ChatGPT. This chapter focuses
    on techniques to create prompts that enhance conversation flow and coherence,
    and provides examples of conversational prompts that effectively maintain dialogue
    continuity.
  id: totrans-292
  prefs: []
  type: TYPE_NORMAL
  zh: 交互式提示涉及构建促进用户和AI之间引人入胜且动态对话的提示，例如ChatGPT。本章重点介绍创建增强对话流畅性和连贯性的提示的技术，并提供了有效维持对话连续性的对话提示示例。
- en: Techniques for Creating Prompts That Facilitate an Engaging and Interactive
    Dialogue
  id: totrans-293
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 创建促进引人入胜和互动对话的提示的技术
- en: 'Creating an engaging dialogue with AI requires thoughtful prompt design that
    encourages a continuous exchange of information. Here are some techniques to achieve
    this:'
  id: totrans-294
  prefs: []
  type: TYPE_NORMAL
  zh: 与AI创建引人入胜的对话需要深思熟虑的提示设计，以鼓励信息的持续交流。以下是一些实现这一目标的技术：
- en: 1\. Use Open-Ended Questions
  id: totrans-295
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1. 使用开放式问题
- en: Open-ended questions encourage the AI to provide more detailed responses and
    keep the conversation going. These questions typically start with “how,” “what,”
    “why,” or “tell me more about…”
  id: totrans-296
  prefs: []
  type: TYPE_NORMAL
  zh: 开放式问题鼓励AI提供更详细的回答，并保持对话进行。这些问题通常以“如何”、“什么”、“为什么”或“告诉我更多关于……”开头。
- en: 2\. Employ Follow-Up Questions
  id: totrans-297
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2. 使用后续问题
- en: Building on previous answers with follow-up questions not only deepens the dialogue
    but also shows that the AI’s responses are being considered thoughtfully. This
    technique helps in exploring topics in depth.
  id: totrans-298
  prefs: []
  type: TYPE_NORMAL
  zh: 通过后续问题在先前答案的基础上进行构建不仅深化了对话，而且表明AI的回答正在被深思熟虑地考虑。这种技术有助于深入探讨话题。
- en: 3\. Echo Back
  id: totrans-299
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3. 回应
- en: Repeat or paraphrase part of the AI’s last response in your next question. This
    technique confirms understanding and ties responses together, enhancing coherence
    in the conversation.
  id: totrans-300
  prefs: []
  type: TYPE_NORMAL
  zh: 在你的下一个问题中重复或改述AI最后回答的部分。这种技术确认了理解并将回答联系起来，增强了对话的连贯性。
- en: 4\. Guide the Conversation with Specific Topics
  id: totrans-301
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4. 用特定主题引导对话
- en: Direct the flow of the conversation by introducing specific topics or steering
    the discussion towards areas of interest. This keeps the dialogue focused and
    prevents it from veering off into less relevant territories.
  id: totrans-302
  prefs: []
  type: TYPE_NORMAL
  zh: 通过引入特定主题或引导讨论到感兴趣的区域来直接引导对话的流程。这使对话保持专注，并防止其偏离不太相关的领域。
- en: 5\. Introduce Hypothetical Scenarios
  id: totrans-303
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 5. 引入假设情景
- en: Incorporate hypothetical scenarios to explore creative or complex ideas. This
    can make the dialogue more engaging and reveal deeper insights into the discussed
    topics.
  id: totrans-304
  prefs: []
  type: TYPE_NORMAL
  zh: 通过引入假设情景来探索创造性的或复杂的思想。这可以使对话更加引人入胜，并揭示对讨论话题的更深入见解。
- en: 6\. Request Examples or Explanations
  id: totrans-305
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 6. 请求示例或解释
- en: Asking for examples or explanations can extend conversations and provide clarity,
    adding layers to the discussion.
  id: totrans-306
  prefs: []
  type: TYPE_NORMAL
  zh: 请求示例或解释可以延长对话并提供清晰度，为讨论增加层次。
- en: Examples of Conversational Prompts and How They Maintain Flow and Coherence
  id: totrans-307
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 对话提示示例及其如何维持流畅性和连贯性的例子
- en: 'To demonstrate these techniques in action, here are some examples of conversational
    prompts along with an analysis of how they contribute to maintaining dialogue
    flow and coherence:'
  id: totrans-308
  prefs: []
  type: TYPE_NORMAL
  zh: 为了展示这些技术的实际应用，以下是一些对话提示示例及其如何有助于维持对话流畅性和连贯性的分析：
- en: 'Example 1: Discussing Technological Advancements'
  id: totrans-309
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 示例 1：讨论技术进步
- en: 'Initial Prompt: “What are the latest advancements in AI technology?”'
  id: totrans-310
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 初始提示：“人工智能技术的最新进展是什么？”
- en: 'Follow-Up Prompt: “How do these advancements impact everyday life for users?”'
  id: totrans-311
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 后续提示：“这些进步如何影响用户日常生活的方方面面？”
- en: 'Echo Back and Further Inquiry: “You mentioned AI in healthcare improvements.
    Can you explain how AI is specifically transforming patient care?”'
  id: totrans-312
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 回应和进一步探究：“你提到了AI在医疗改进中的应用。你能解释AI是如何具体改变患者护理的吗？”
- en: 'Analysis: The initial prompt sets a broad topic, allowing the AI to introduce
    recent developments. Each follow-up question narrows the focus, maintains the
    topic relevance, and builds on the previous information, creating a coherent thread
    of conversation.'
  id: totrans-313
  prefs: []
  type: TYPE_NORMAL
  zh: 分析：初始提示设定了一个广泛的话题，允许AI介绍最新进展。每个后续问题都缩小了焦点，保持了话题的相关性，并建立在先前信息的基础上，创建了一个连贯的对话线索。
- en: 'Example 2: Exploring Environmental Issues'
  id: totrans-314
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 示例 2：探讨环境问题
- en: 'Initial Prompt: “Why is biodiversity important for ecosystems?”'
  id: totrans-315
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 初始提示：“为什么生物多样性对生态系统很重要？”
- en: 'Follow-Up Prompt: “Can you give an example of a region where biodiversity has
    helped maintain ecological balance?”'
  id: totrans-316
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 后续提示：“你能举一个生物多样性帮助维持生态平衡的地区例子吗？”
- en: 'Introduce Hypothetical Scenario: “Imagine a scenario where biodiversity is
    significantly reduced in that region. What might be the consequences?”'
  id: totrans-317
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 引入假设情景：“想象一个该地区生物多样性显著减少的情景。可能会有什么后果？”
- en: 'Analysis: Starting with a why-question opens up a detailed explanation, followed
    by a request for a specific example that grounds the discussion in real-world
    terms. Introducing a hypothetical scenario invites speculative thinking and deepens
    the engagement on the topic.'
  id: totrans-318
  prefs: []
  type: TYPE_NORMAL
  zh: 分析：从一个“为什么”问题开始，展开详细解释，然后请求一个具体的例子，将讨论基于现实世界的术语。引入一个假设情景可以激发推测性思维，并深化对该主题的参与。
- en: 'Example 3: A Dialogue on Historical Events'
  id: totrans-319
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 示例 3：关于历史事件的对话
- en: 'Initial Prompt: “Tell me about the causes of the American Revolution.”'
  id: totrans-320
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 初始提示：“告诉我美国革命的起因。”
- en: 'Request for Details: “What were some of the major events leading up to the
    revolution?”'
  id: totrans-321
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 请求详细信息：“革命前有哪些重大事件？”
- en: 'Guide Conversation: “Focus on the role of the Boston Tea Party. Why was it
    significant?”'
  id: totrans-322
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 引导对话：“关注波士顿倾茶事件的作用。为什么它很重要？”
- en: 'Analysis: The conversation begins with a broad historical question, narrows
    down to major events, and then zooms in on a specific incident. Each step provides
    a deeper layer of detail and ensures that the AI’s responses are interconnected,
    providing a structured and coherent narrative.'
  id: totrans-323
  prefs: []
  type: TYPE_NORMAL
  zh: 分析：对话从广泛的历史问题开始，缩小到主要事件，然后聚焦于一个具体事件。每一步都提供了更深层次的细节，并确保AI的响应相互关联，提供结构化和连贯的叙述。
- en: These examples show that by carefully structuring prompts and employing specific
    conversational techniques, it is possible to engage AI in meaningful, detailed,
    and coherent dialogues. Such interactions not only make the conversation more
    interesting but also enhance the informational value of the responses.
  id: totrans-324
  prefs: []
  type: TYPE_NORMAL
  zh: 这些示例表明，通过精心构建提示和采用特定的对话技巧，可以与AI进行有意义的、详细的和连贯的对话。这种互动不仅使对话更有趣，还增强了响应的信息价值。
- en: 'Chapter 8: Advanced Prompt Engineering'
  id: totrans-325
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第 8 章：高级提示工程
- en: Advanced prompt engineering involves leveraging sophisticated techniques that
    enhance the interaction with AI, such as ChatGPT, by encouraging it to provide
    more insightful, nuanced, or creative responses. This chapter will delve into
    advanced techniques like leading questions, hypothetical scenarios, and conditional
    phrasing. We will also explore examples of advanced prompts and the sophisticated
    responses they generate, demonstrating how these techniques can be applied effectively.
  id: totrans-326
  prefs: []
  type: TYPE_NORMAL
  zh: 高级提示工程涉及利用复杂的技术来增强与AI（如ChatGPT）的互动，通过鼓励它提供更有洞察力、更细腻或更有创造性的响应。本章将深入探讨高级技术，如引导性问题、假设情景和条件句式。我们还将探索高级提示的例子和它们产生的复杂响应，展示这些技术如何有效应用。
- en: Leveraging Advanced Techniques
  id: totrans-327
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 利用高级技术
- en: 1\. Leading Questions
  id: totrans-328
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1. 引导性问题
- en: Leading questions are formulated to guide the AI in a specific direction or
    to a particular conclusion. This can be useful in scenarios where you want to
    explore a specific perspective or outcome.
  id: totrans-329
  prefs: []
  type: TYPE_NORMAL
  zh: 引导性问题旨在引导AI走向特定方向或得出特定结论。这在想要探索特定观点或结果的情况下非常有用。
- en: 2\. Hypothetical Scenarios
  id: totrans-330
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2. 假设情景
- en: Using hypothetical scenarios allows for exploring possibilities and implications
    beyond current realities. This technique is particularly valuable for problem-solving,
    innovation, and creative thinking.
  id: totrans-331
  prefs: []
  type: TYPE_NORMAL
  zh: 使用假设情景可以探索超越当前现实的可能性和影响。这种技术在问题解决、创新和创造性思维中特别有价值。
- en: 3\. Conditional Phrasing
  id: totrans-332
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3. 条件句式
- en: Conditional phrasing involves constructing prompts that include conditions that
    must be met within the response. This can help in testing how changes in certain
    variables could affect outcomes, encouraging deeper analysis from the AI.
  id: totrans-333
  prefs: []
  type: TYPE_NORMAL
  zh: 条件句式涉及构建包含必须满足条件的提示。这有助于测试某些变量变化可能对结果产生的影响，鼓励AI进行更深入的分析。
- en: Examples of Advanced Prompts and the Sophisticated Responses They Generate
  id: totrans-334
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 高级提示和复杂响应的示例
- en: To illustrate the power of advanced prompt engineering, here are several examples
    that utilize the aforementioned techniques and the types of responses they can
    elicit.
  id: totrans-335
  prefs: []
  type: TYPE_NORMAL
  zh: 为了说明高级提示工程的力量，以下是一些利用上述技术和它们能引发的响应类型的示例。
- en: 'Example 1: Exploring Economic Policies with Leading Questions'
  id: totrans-336
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 示例 1：使用引导性问题探索经济政策
- en: 'Prompt: “Considering the high inflation rates, how might increasing interest
    rates help stabilize the economy?”'
  id: totrans-337
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提示： “考虑到高通胀率，提高利率如何有助于稳定经济？”
- en: 'Response: “Increasing interest rates can potentially stabilize the economy
    by curbing inflation. This approach works by raising the cost of borrowing, which
    can lead to decreased spending and slowed economic growth. Consequently, this
    might reduce the inflationary pressures. However, it could also risk slowing down
    economic activity and increasing unemployment rates, which needs careful consideration.”'
  id: totrans-338
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 响应：“提高利率有可能通过抑制通货膨胀来稳定经济。这种方法通过提高借贷成本来实现，这可能导致消费减少和经济增长放缓。因此，这可能会减轻通货膨胀压力。然而，这也可能风险减缓经济活动并增加失业率，这需要仔细考虑。”
- en: 'Analysis: The prompt leads the AI to consider a specific economic strategy
    (increasing interest rates) and its potential effects, guiding the conversation
    towards a targeted analysis of economic policies.'
  id: totrans-339
  prefs: []
  type: TYPE_NORMAL
  zh: 分析：这个提示引导AI考虑特定的经济策略（提高利率）及其潜在影响，引导对话针对经济政策进行有针对性的分析。
- en: 'Example 2: Hypothetical Scenario in Environmental Policy'
  id: totrans-340
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 示例2：环境政策中的假设场景
- en: 'Prompt: “Imagine a world where all cars are electric by 2030\. What would be
    the environmental and urban impacts of this change?”'
  id: totrans-341
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提示：“想象一下，到2030年所有汽车都变成电动车的世界。这种变化对环境和城市会有什么影响？”
- en: 'Response: “In a hypothetical scenario where all cars are electric by 2030,
    significant environmental benefits would include reductions in greenhouse gas
    emissions and air pollutants, contributing to improved air quality and mitigating
    climate change. Urban impacts might involve an overhaul of infrastructure, with
    increased demand for electric charging stations and updates to the electrical
    grid. There could also be shifts in noise pollution levels, with cities becoming
    quieter due to less noisy engines.”'
  id: totrans-342
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 响应：“在一个假设场景中，到2030年所有汽车都变成电动车，显著的环境效益包括减少温室气体排放和空气污染物，有助于改善空气质量并缓解气候变化。城市影响可能包括基础设施的彻底改造，对电动车充电站的需求增加和对电网的更新。噪声污染水平也可能发生变化，由于发动机噪音减少，城市可能会变得更加安静。”
- en: 'Analysis: This prompt uses a hypothetical scenario to explore broad and profound
    changes, pushing the AI to think through complex implications and future possibilities.'
  id: totrans-343
  prefs: []
  type: TYPE_NORMAL
  zh: 分析：这个提示使用一个假设场景来探索广泛而深刻的变化，推动AI思考复杂的影响和未来可能性。
- en: 'Example 3: Conditional Phrasing in Technology Advancement'
  id: totrans-344
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 示例3：技术进步中的条件句法
- en: 'Prompt: “If quantum computing becomes mainstream in the next five years, what
    could be the potential impacts on data security?”'
  id: totrans-345
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提示：“如果量子计算在未来五年内成为主流，对数据安全可能产生什么潜在影响？”
- en: 'Response: “If quantum computing were to become mainstream within the next five
    years, it could revolutionize data security. The immense processing power of quantum
    computers might break many of the cryptographic algorithms currently used to secure
    data. However, it could also lead to the development of quantum-resistant encryption
    methods that offer far greater security than today’s standards. Additionally,
    quantum computing could enable new forms of secure communication through quantum
    key distribution, which is theoretically unhackable.”'
  id: totrans-346
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 响应：“如果量子计算在未来五年内成为主流，它可能会彻底改变数据安全。量子计算机的巨大处理能力可能会破解目前用于保护数据的许多加密算法。然而，它也可能导致量子抗性加密方法的发展，这些方法提供的安全性远高于今天的标准。此外，量子计算可以通过量子密钥分发实现新的安全通信形式，这在理论上是无法被黑客攻击的。”
- en: 'Analysis: The conditional phrasing in this prompt challenges the AI to analyze
    the consequences of an emerging technology, focusing on specific aspects like
    data security, and projecting both positive and negative outcomes.'
  id: totrans-347
  prefs: []
  type: TYPE_NORMAL
  zh: 分析：这个提示中的条件句法挑战AI分析新兴技术的后果，关注特定方面如数据安全，并预测积极和消极的结果。
- en: These examples demonstrate how advanced prompt engineering techniques can be
    strategically employed to guide AI responses, explore innovative ideas, and provoke
    thoughtful analysis. By mastering these techniques, users can significantly enhance
    the depth and breadth of their interactions with AI, making them more productive
    and insightful.
  id: totrans-348
  prefs: []
  type: TYPE_NORMAL
  zh: 这些例子展示了如何战略性地使用高级提示工程技术来引导AI响应，探索创新想法，并激发深入分析。通过掌握这些技术，用户可以显著增强与AI互动的深度和广度，使它们更加高效和有洞察力。
- en: 'Chapter 9: Evaluating AI Responses'
  id: totrans-349
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第九章：评估AI响应
- en: Evaluating the responses of AI like ChatGPT is crucial to ensure that the information
    provided is accurate, relevant, and useful. This chapter focuses on how to assess
    the quality of AI responses, offers tips on refining prompts based on AI’s previous
    answers, and presents case studies that illustrate iterative prompt refinement
    for optimized interaction.
  id: totrans-350
  prefs: []
  type: TYPE_NORMAL
  zh: 评估像ChatGPT这样的AI的响应对于确保提供的信息准确、相关和有用至关重要。本章重点介绍如何评估AI响应的质量，提供基于AI先前答案优化提示的技巧，并展示说明迭代提示优化以实现优化互动的案例研究。
- en: How to Assess the Quality of AI Responses
  id: totrans-351
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 如何评估AI响应的质量
- en: 'Evaluating AI responses involves several key considerations:'
  id: totrans-352
  prefs: []
  type: TYPE_NORMAL
  zh: 评估AI响应涉及几个关键考虑因素：
- en: 1\. Accuracy
  id: totrans-353
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1. 准确性
- en: Verify the factual accuracy of the response. Cross-reference with trusted sources
    where possible, especially for technical or specialized information.
  id: totrans-354
  prefs: []
  type: TYPE_NORMAL
  zh: 核实响应的事实准确性。在可能的情况下，与可信来源进行交叉核对，特别是对于技术或专业信息。
- en: 2\. Relevance
  id: totrans-355
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2. 相关性
- en: Assess whether the response directly addresses the questions or topics specified
    in the prompt. The response should be focused and on-topic without deviating into
    unrelated areas.
  id: totrans-356
  prefs: []
  type: TYPE_NORMAL
  zh: 评估响应是否直接针对提示中指定的疑问或主题。响应应聚焦于主题，避免偏离无关领域。
- en: 3\. Completeness
  id: totrans-357
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3. 完整性
- en: Check if the response covers all aspects of the prompt. It should answer all
    parts of the question and not leave any important elements unanswered.
  id: totrans-358
  prefs: []
  type: TYPE_NORMAL
  zh: 检查响应是否涵盖了提示的所有方面。它应该回答问题的所有部分，不要遗漏任何重要元素。
- en: 4\. Clarity
  id: totrans-359
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4. 清晰度
- en: Ensure the response is clear and understandable. Complex topics should be broken
    down into digestible parts without oversimplification that might lead to loss
    of critical information.
  id: totrans-360
  prefs: []
  type: TYPE_NORMAL
  zh: 确保响应清晰易懂。复杂主题应分解为可消化的部分，避免过度简化可能导致关键信息丢失。
- en: 5\. Coherence
  id: totrans-361
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 5. 一致性
- en: The response should be logically organized and coherent. It should flow naturally
    from one point to the next, making it easy to follow the line of reasoning or
    narrative.
  id: totrans-362
  prefs: []
  type: TYPE_NORMAL
  zh: 响应应逻辑组织并保持一致。它应该自然地从一点到另一点流动，使人们容易跟随推理或叙述的线索。
- en: Tips on Refining Prompts Based on AI’s Previous Answers
  id: totrans-363
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 基于AI先前答案优化提示的技巧
- en: 'Improving the effectiveness of your prompts based on the AI’s previous responses
    can greatly enhance the quality of future interactions:'
  id: totrans-364
  prefs: []
  type: TYPE_NORMAL
  zh: 根据AI的先前响应改进提示的有效性可以大大提高未来互动的质量：
- en: 1\. Identify Gaps
  id: totrans-365
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1. 识别差距
- en: Review the AI’s responses for any missing information or areas that were not
    covered as expected. Use these gaps as a basis for refining the next set of prompts.
  id: totrans-366
  prefs: []
  type: TYPE_NORMAL
  zh: 检查AI的响应中是否有缺失的信息或未按预期覆盖的领域。将这些差距作为优化下一组提示的基础。
- en: 2\. Clarify Ambiguities
  id: totrans-367
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2. 澄清歧义
- en: If a response contains ambiguities, revise the prompt to clarify any vague points
    or to ask for specific details that were previously overlooked.
  id: totrans-368
  prefs: []
  type: TYPE_NORMAL
  zh: 如果响应包含歧义，修改提示以澄清任何模糊点或请求之前被忽视的具体细节。
- en: 3\. Adjust Complexity
  id: totrans-369
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3. 调整复杂性
- en: If the AI’s response was too technical or too simplistic, adjust the complexity
    of your next prompt to better match your information needs.
  id: totrans-370
  prefs: []
  type: TYPE_NORMAL
  zh: 如果AI的响应过于技术化或过于简单化，调整下一个提示的复杂性以更好地匹配您的信息需求。
- en: 4\. Follow-Up Questions
  id: totrans-371
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4. 后续问题
- en: Use follow-up questions that build directly on the AI’s last response. This
    technique is particularly useful for exploring a topic more deeply or shifting
    the focus to a related area that emerged from the initial interaction.
  id: totrans-372
  prefs: []
  type: TYPE_NORMAL
  zh: 使用直接基于AI上次响应的后续问题。这种技术特别适用于深入探讨一个主题或转向从初始互动中出现的相关领域。
- en: Case Studies Showing Iterative Prompt Refinement
  id: totrans-373
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 展示迭代提示优化的案例研究
- en: 'The following case studies illustrate how iterative refinement of prompts can
    lead to progressively better AI responses:'
  id: totrans-374
  prefs: []
  type: TYPE_NORMAL
  zh: 以下案例研究说明了迭代优化提示如何导致AI响应的逐步改善：
- en: 'Case Study 1: Market Analysis'
  id: totrans-375
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 案例研究1：市场分析
- en: 'Initial Prompt:'
  id: totrans-376
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 初始提示：
- en: “How is the tech market performing?”
  id: totrans-377
  prefs: []
  type: TYPE_NORMAL
  zh: “科技市场表现如何？”
- en: 'Initial Response:'
  id: totrans-378
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 初始响应：
- en: “The tech market is showing growth this year.”
  id: totrans-379
  prefs: []
  type: TYPE_NORMAL
  zh: “今年科技市场正在增长。”
- en: 'Assessment:'
  id: totrans-380
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 评估：
- en: The response is too general and lacks specific details.
  id: totrans-381
  prefs: []
  type: TYPE_NORMAL
  zh: 响应过于笼统，缺乏具体细节。
- en: 'Refined Prompt:'
  id: totrans-382
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 优化后的提示：
- en: “Can you provide specific growth statistics and factors driving the tech market
    performance in 2023?”
  id: totrans-383
  prefs: []
  type: TYPE_NORMAL
  zh: “你能提供2023年科技市场具体增长统计数据以及推动市场表现的因素吗？”
- en: 'Improved Response:'
  id: totrans-384
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 改进的响应：
- en: “In 2023, the tech market has grown by approximately 7%. Key factors include
    increased demand for remote work technologies and advancements in AI and machine
    learning.”
  id: totrans-385
  prefs: []
  type: TYPE_NORMAL
  zh: “到 2023 年，科技市场增长了约 7%。关键因素包括对远程工作技术的需求增加以及人工智能和机器学习的进步。”
- en: 'Case Study 2: Environmental Policy'
  id: totrans-386
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 案例研究 2：环境政策
- en: 'Initial Prompt:'
  id: totrans-387
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 初始提示：
- en: “What are the current trends in environmental policy?”
  id: totrans-388
  prefs: []
  type: TYPE_NORMAL
  zh: “当前环境政策有哪些趋势？”
- en: 'Initial Response:'
  id: totrans-389
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 初始回复：
- en: “Many countries are focusing on reducing carbon emissions.”
  id: totrans-390
  prefs: []
  type: TYPE_NORMAL
  zh: “许多国家正在致力于减少碳排放。”
- en: 'Assessment:'
  id: totrans-391
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 评估：
- en: The response does not specify regions or policies.
  id: totrans-392
  prefs: []
  type: TYPE_NORMAL
  zh: 回复没有指定地区或政策。
- en: 'Refined Prompt:'
  id: totrans-393
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 精炼提示：
- en: “Which countries are leading in implementing carbon reduction policies, and
    what specific strategies are they using?”
  id: totrans-394
  prefs: []
  type: TYPE_NORMAL
  zh: “哪些国家在实施碳减排政策方面处于领先地位，他们采取了哪些具体策略？”
- en: 'Improved Response:'
  id: totrans-395
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 改进后的回复：
- en: “European countries like Denmark and Sweden are at the forefront. Denmark has
    implemented extensive carbon taxes and renewable energy projects, while Sweden
    has invested heavily in green public transportation and energy-efficient technologies.”
  id: totrans-396
  prefs: []
  type: TYPE_NORMAL
  zh: “欧洲国家如丹麦和瑞典处于前沿。丹麦实施了广泛的碳税和可再生能源项目，而瑞典则大力投资绿色公共交通和节能技术。”
- en: 'Case Study 3: Historical Event'
  id: totrans-397
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 案例研究 3：历史事件
- en: 'Initial Prompt:'
  id: totrans-398
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 初始提示：
- en: “Tell me about the causes of World War I.”
  id: totrans-399
  prefs: []
  type: TYPE_NORMAL
  zh: “告诉我第一次世界大战的原因。”
- en: 'Initial Response:'
  id: totrans-400
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 初始回复：
- en: “World War I was caused by a complex set of factors including militarism, alliances,
    imperialism, and nationalism.”
  id: totrans-401
  prefs: []
  type: TYPE_NORMAL
  zh: “第一次世界大战是由一系列复杂因素引起的，包括军国主义、联盟、帝国主义和民族主义。”
- en: 'Assessment:'
  id: totrans-402
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 评估：
- en: The response lists factors but does not explain them.
  id: totrans-403
  prefs: []
  type: TYPE_NORMAL
  zh: 回复列出了因素，但没有解释它们。
- en: 'Refined Prompt:'
  id: totrans-404
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 精炼提示：
- en: “Can you explain how militarism and alliances contributed to the start of World
    War I?”
  id: totrans-405
  prefs: []
  type: TYPE_NORMAL
  zh: “你能解释军国主义和联盟如何导致第一次世界大战的爆发吗？”
- en: 'Improved Response:'
  id: totrans-406
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 改进后的回复：
- en: “Militarism led to an arms race among the great powers, creating a tense environment.
    The system of alliances, especially between the Central and Allied Powers, meant
    that any conflict between two countries could quickly involve others, escalating
    into a full-scale war.”
  id: totrans-407
  prefs: []
  type: TYPE_NORMAL
  zh: “军国主义导致大国之间的军备竞赛，创造了一个紧张的环境。联盟体系，特别是中央和协约国之间的联盟，意味着任何两个国家之间的冲突都可能迅速涉及其他国家，升级为全面战争。”
- en: These case studies show that by evaluating and refining prompts based on AI’s
    responses, users can significantly enhance the accuracy, relevance, and depth
    of the information provided, leading to more effective and meaningful AI interactions.
  id: totrans-408
  prefs: []
  type: TYPE_NORMAL
  zh: 这些案例研究表明，通过评估和改进基于人工智能回复的提示，用户可以显著提高提供信息的准确性、相关性和深度，从而实现更有效和有意义的人工智能交互。
- en: 'Chapter 10: Ethical Considerations and Best Practices'
  id: totrans-409
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第 10 章：伦理考虑和最佳实践
- en: As the use of AI in everyday life becomes more prevalent, ethical considerations
    and best practices in prompt engineering are crucial to ensure responsible and
    effective interactions. This chapter explores the ethical implications of prompt
    engineering, outlines best practices for the responsible use of AI, and discusses
    the importance of transparency and honesty in interactions with AI.
  id: totrans-410
  prefs: []
  type: TYPE_NORMAL
  zh: 随着人工智能在日常生活中的应用越来越普遍，伦理考虑和提示工程的最佳实践对于确保负责任和有效的人工智能交互至关重要。本章探讨了提示工程的伦理影响，概述了负责任使用人工智能的最佳实践，并讨论了在与人工智能交互中的透明度和诚实的重要性。
- en: Understanding the Ethical Implications of Prompt Engineering
  id: totrans-411
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 理解提示工程的伦理影响
- en: 'Prompt engineering can influence the behavior and outputs of AI systems significantly,
    raising several ethical concerns:'
  id: totrans-412
  prefs: []
  type: TYPE_NORMAL
  zh: 提示工程可以显著影响人工智能系统的行为和输出，引发一些伦理问题：
- en: 1\. Bias and Fairness
  id: totrans-413
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1. 偏见与公平
- en: AI systems can perpetuate and amplify biases present in their training data.
    Prompt engineers must be aware of these biases and strive to mitigate them by
    carefully crafting prompts that encourage fair and unbiased responses.
  id: totrans-414
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能系统可能会持续和放大其训练数据中存在的偏见。提示工程师必须意识到这些偏见，并通过精心设计提示来鼓励公平和无偏见的回复，以努力减轻这些偏见。
- en: 2\. Privacy and Data Security
  id: totrans-415
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2. 隐私和数据安全
- en: When prompts involve processing personal data, there are concerns about privacy
    and the security of that data. It is crucial to ensure that prompts do not inadvertently
    expose or misuse personal information.
  id: totrans-416
  prefs: []
  type: TYPE_NORMAL
  zh: 当提示涉及处理个人数据时，存在关于隐私和数据安全性的担忧。确保提示不会无意中泄露或滥用个人信息至关重要。
- en: 3\. Manipulation and Misinformation
  id: totrans-417
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3. 操纵和虚假信息
- en: Prompts can be engineered to manipulate AI responses or spread misinformation.
    Ethical prompt engineering involves ensuring that information solicited and disseminated
    by AI is accurate and not misleading.
  id: totrans-418
  prefs: []
  type: TYPE_NORMAL
  zh: 提示可以被设计来操纵人工智能响应或传播错误信息。道德的提示工程涉及确保人工智能收集和传播的信息是准确的，并且不是误导性的。
- en: 4\. Dependence and Decision-Making
  id: totrans-419
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4. 依赖性和决策
- en: Over-reliance on AI for decision-making can be problematic, especially if AI’s
    limitations are not fully understood. Users must be educated on the capabilities
    and limitations of AI to prevent inappropriate dependence.
  id: totrans-420
  prefs: []
  type: TYPE_NORMAL
  zh: 过度依赖人工智能进行决策可能存在问题，特别是如果人工智能的局限性没有得到充分理解。用户必须了解人工智能的能力和局限性，以防止不适当的依赖。
- en: Best Practices for Responsible Use of AI in Generating Prompts
  id: totrans-421
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 负责任使用人工智能生成提示的最佳实践
- en: 'To address these ethical concerns, several best practices should be followed:'
  id: totrans-422
  prefs: []
  type: TYPE_NORMAL
  zh: 为了解决这些道德问题，应遵循以下最佳实践：
- en: 1\. Diversity and Inclusion
  id: totrans-423
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1. 多样性和包容性
- en: Ensure that the datasets used for training AI are diverse and representative
    of different demographics to reduce bias in AI responses.
  id: totrans-424
  prefs: []
  type: TYPE_NORMAL
  zh: 确保用于训练人工智能的数据集具有多样性，并代表不同的群体，以减少人工智能响应中的偏见。
- en: 2\. Transparency in AI Use
  id: totrans-425
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2. 人工智能使用中的透明度
- en: Be clear about the use of AI, especially when its outputs might affect decision-making
    or when used in sensitive contexts. Users should understand when they are interacting
    with AI and not humans.
  id: totrans-426
  prefs: []
  type: TYPE_NORMAL
  zh: 在使用人工智能时，特别是当其输出可能影响决策或用于敏感环境时，必须明确。用户应了解何时在与人工智能互动而非与人类互动。
- en: 3\. Consent and Privacy
  id: totrans-427
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3. 同意和隐私
- en: Respect user consent and privacy when AI processes personal data. Ensure that
    data is handled securely and in compliance with relevant laws and regulations.
  id: totrans-428
  prefs: []
  type: TYPE_NORMAL
  zh: 在人工智能处理个人数据时尊重用户同意和隐私。确保数据安全处理，并符合相关法律法规。
- en: 4\. Regular Review and Testing
  id: totrans-429
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4. 定期审查和测试
- en: Continuously review and test AI outputs to identify and correct errors or biases.
    This involves regular updates to AI models and their training datasets.
  id: totrans-430
  prefs: []
  type: TYPE_NORMAL
  zh: 持续审查和测试人工智能输出，以识别和纠正错误或偏见。这涉及到对人工智能模型及其训练数据集的定期更新。
- en: 5\. Educational Outreach
  id: totrans-431
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 5. 教育推广
- en: Provide education on AI capabilities and limitations to users. This helps prevent
    misinformation and builds a realistic understanding of what AI can and cannot
    do.
  id: totrans-432
  prefs: []
  type: TYPE_NORMAL
  zh: 向用户提供关于人工智能能力和局限性的教育。这有助于防止错误信息，并建立对人工智能可以做什么和不能做什么的现实理解。
- en: The Role of Transparency and Honesty in Interactions with AI
  id: totrans-433
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 人工智能互动中透明度和诚实的作用
- en: 'Transparency and honesty are foundational to ethical AI interactions:'
  id: totrans-434
  prefs: []
  type: TYPE_NORMAL
  zh: 透明度和诚实是道德人工智能互动的基础：
- en: 1\. Disclosure of AI Involvement
  id: totrans-435
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1. 人工智能参与的披露
- en: Users should always know when they are interacting with AI. This prevents the
    blurring of lines between human and machine-generated content and maintains trust.
  id: totrans-436
  prefs: []
  type: TYPE_NORMAL
  zh: 用户应始终了解他们何时在与人工智能互动。这防止了人类和机器生成内容之间的界限模糊，并维持了信任。
- en: 2\. Honest Representation of Capabilities
  id: totrans-437
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2. 能力的诚实表述
- en: It is vital to accurately represent what AI can reliably achieve and what might
    still be experimental or prone to errors. This honesty ensures that expectations
    are aligned with reality.
  id: totrans-438
  prefs: []
  type: TYPE_NORMAL
  zh: 准确表述人工智能可以可靠实现的内容以及可能仍处于实验阶段或容易出错的内容至关重要。这种诚实确保了期望与现实相一致。
- en: 3\. Clarity in Communication
  id: totrans-439
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3. 沟通清晰
- en: Communicate clearly about how AI-generated responses are derived and the potential
    for inaccuracies. This transparency helps users make informed decisions based
    on AI interactions.
  id: totrans-440
  prefs: []
  type: TYPE_NORMAL
  zh: 明确沟通人工智能生成响应的来源和可能的不准确性。这种透明度有助于用户根据人工智能互动做出明智的决定。
- en: Conclusion
  id: totrans-441
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: Ethical considerations in prompt engineering are critical to fostering trust
    and effectiveness in AI applications. By adhering to best practices and prioritizing
    transparency and honesty, developers and users can ensure that AI tools are used
    responsibly and ethically, enhancing their utility and acceptance in society.
    This chapter not only underscores the importance of ethics in AI interactions
    but also provides a roadmap for implementing ethical practices in prompt engineering.
  id: totrans-442
  prefs: []
  type: TYPE_NORMAL
  zh: 在提示工程中的道德考量对于培养人工智能应用的信任和有效性至关重要。通过遵守最佳实践并优先考虑透明度和诚实，开发者和用户可以确保人工智能工具负责任且道德地使用，增强其在社会中的效用和接受度。本章不仅强调了人工智能互动中的道德重要性，还提供了在提示工程中实施道德实践的路线图。
- en: Conclusion
  id: totrans-443
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 结论
- en: 'As we reach the conclusion of “How to ChatGPT: Mastering Prompt Engineering
    for Effective Interactions,” it’s important to reflect on the journey we’ve embarked
    upon. This book has provided a comprehensive guide to mastering the art of prompt
    engineering, delivering insights and techniques designed to enhance your interactions
    with AI. Here, we recap the key techniques and principles discussed, encourage
    ongoing experimentation and learning, and offer some final thoughts on the evolving
    landscape of AI and prompt engineering.'
  id: totrans-444
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们到达“如何ChatGPT：掌握提示工程以实现有效互动”的结尾时，反思我们所开始的旅程是很重要的。本书为掌握提示工程的艺术提供了全面的指南，提供了旨在增强你与AI互动的见解和技术。在此，我们回顾了讨论的关键技术和原则，鼓励持续实验和学习，并对AI和提示工程不断发展的领域提出一些最后的思考。
- en: Recap of Key Techniques and Principles for Effective Prompt Engineering
  id: totrans-445
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 有效提示工程的关键技术和原则概述
- en: 'Throughout this book, we’ve explored various aspects of prompt engineering,
    each crucial for optimizing the performance of AI models like ChatGPT:'
  id: totrans-446
  prefs: []
  type: TYPE_NORMAL
  zh: 在本书中，我们探讨了提示工程的各个方面，每个方面对于优化ChatGPT等AI模型的性能都至关重要：
- en: 'Clarity and Specificity: Being clear and specific in your prompts helps the
    AI understand exactly what is expected, reducing the likelihood of irrelevant
    or inaccurate responses.'
  id: totrans-447
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 清晰和具体：在提示中保持清晰和具体有助于AI确切了解期望的内容，从而降低获得无关或不准确回应的可能性。
- en: 'Contextual Information: Providing sufficient background information enables
    the AI to generate responses that are contextually appropriate and more precisely
    tailored to your needs.'
  id: totrans-448
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 上下文信息：提供足够的背景信息，使AI能够生成符合上下文且更精确满足你需求的回应。
- en: 'Open-Ended vs. Closed Questions: Understanding when to use open-ended questions
    to elicit detailed responses and closed questions for concise information is key
    to effective communication.'
  id: totrans-449
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 开放式问题与封闭式问题：了解何时使用开放式问题以获取详细回应，以及何时使用封闭式问题以获取简洁信息，对于有效沟通至关重要。
- en: 'Creativity and Constraints: Using creative prompts and setting constraints
    can guide the AI’s creativity, leading to richer and more focused outputs.'
  id: totrans-450
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 创造性和约束：使用创造性的提示并设置约束可以引导AI的创造力，从而产生更丰富和更专注的输出。
- en: 'Iterative Refinement: Iteratively refining prompts based on previous responses
    can dramatically improve the quality and relevance of AI interactions.'
  id: totrans-451
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 逐步改进：根据之前的回应逐步改进提示可以显著提高AI互动的质量和相关性。
- en: 'Ethical Considerations: Ethically crafting prompts and responsibly using AI
    are essential to ensuring that interactions are fair, unbiased, and respectful
    of privacy and data security.'
  id: totrans-452
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 道德考量：道德地构建提示和负责任地使用AI对于确保互动公平、无偏见，并尊重隐私和数据安全至关重要。
- en: Encouragement to Experiment and Continuously Learn from Interactions
  id: totrans-453
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 鼓励实验并从互动中持续学习
- en: 'Prompt engineering is both an art and a science. As AI technology continues
    to evolve, so too will the strategies for interacting with it. Experimentation
    is key:'
  id: totrans-454
  prefs: []
  type: TYPE_NORMAL
  zh: 提示工程既是艺术也是科学。随着AI技术的持续发展，与之互动的策略也将随之发展。实验是关键：
- en: 'Try Different Approaches: Don’t hesitate to try various types of prompts and
    observe how changes in your input affect the AI’s output. Each interaction is
    an opportunity to learn and refine your technique.'
  id: totrans-455
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 尝试不同的方法：不要犹豫尝试各种类型的提示，并观察你的输入变化如何影响AI的输出。每一次互动都是学习和完善你技巧的机会。
- en: 'Learn from Responses: Analyze the AI’s responses for insights into how it understands
    and processes information. Use this knowledge to adjust your prompting strategies.'
  id: totrans-456
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 从回应中学习：分析AI的回应，以了解其理解和处理信息的方式。利用这些知识来调整你的提示策略。
- en: 'Stay Informed: Keep abreast of the latest developments in AI technology and
    prompt engineering techniques. The field is rapidly evolving, with continual improvements
    in AI capabilities.'
  id: totrans-457
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 保持最新信息：关注AI技术和提示工程技术的最新发展。该领域正在快速发展，AI能力持续改进。
- en: Final Thoughts on the Evolving Landscape of AI and Prompt Engineering
  id: totrans-458
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 对AI和提示工程不断发展的领域的最后思考
- en: The landscape of AI is dynamic and ever-changing. Prompt engineering, as a discipline,
    is becoming increasingly important as more industries and sectors adopt AI technologies.
    The skills you’ve developed through this book will not only enhance your current
    interactions with AI but also prepare you for future advancements.
  id: totrans-459
  prefs: []
  type: TYPE_NORMAL
  zh: AI的领域是动态且不断变化的。随着更多行业和领域采用AI技术，提示工程作为一门学科正变得越来越重要。通过本书你培养的技能不仅能增强你与AI的当前互动，还能为你未来的进步做好准备。
- en: As AI systems become more sophisticated, the complexity of effective prompt
    engineering will likely increase. However, the fundamental principles of clarity,
    context, and creativity will remain essential. Looking ahead, we can anticipate
    even greater integration of AI in our daily lives and work. This integration promises
    to bring new challenges but also unprecedented opportunities to innovate and improve
    efficiency.
  id: totrans-460
  prefs: []
  type: TYPE_NORMAL
  zh: 随着AI系统变得更加复杂，有效提示工程的复杂性可能会增加。然而，清晰、上下文和创造性的基本原则将始终至关重要。展望未来，我们可以预见AI在我们日常生活和工作中的更大融合。这种融合承诺带来新的挑战，但也为创新和提升效率提供了前所未有的机会。
- en: In conclusion, the journey of mastering prompt engineering does not end with
    this book. It is an ongoing process of learning, experimenting, and adapting.
    By continuing to refine your skills and understanding of AI, you can ensure that
    your interactions are not only effective but also innovative and forward-thinking.
    Embrace the future of AI with curiosity and enthusiasm, and let your knowledge
    guide you in navigating this exciting and evolving field.
  id: totrans-461
  prefs: []
  type: TYPE_NORMAL
  zh: 总结来说，掌握提示工程（prompt engineering）的旅程并不止步于这本书。它是一个持续的学习、实验和适应的过程。通过不断磨练你的技能和对人工智能（AI）的理解，你可以确保你的互动不仅有效，而且具有创新性和前瞻性。以好奇心和热情拥抱人工智能的未来，让你的知识引导你在这一激动人心且不断发展的领域中航行。
- en: Appendix
  id: totrans-462
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 附录
- en: 'This appendix serves as a resource to enhance your understanding and application
    of the principles discussed in “How to ChatGPT: Mastering Prompt Engineering for
    Effective Interactions.” It includes a glossary of terms used throughout the book,
    a curated list of additional resources for further learning, and practical prompt
    templates and checklists to aid in your prompt engineering endeavors.'
  id: totrans-463
  prefs: []
  type: TYPE_NORMAL
  zh: 本附录旨在增强你对“如何ChatGPT：掌握提示工程以实现有效互动”中讨论的原则的理解和应用。它包括全书使用的术语表，一个用于进一步学习的精选资源列表，以及实用的提示模板和清单，以帮助你进行提示工程实践。
- en: Glossary of Terms Used in the Book
  id: totrans-464
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 书中使用的术语表
- en: 'AI (Artificial Intelligence): Systems or machines that mimic human intelligence
    to perform tasks and can iteratively improve themselves based on the information
    they collect.'
  id: totrans-465
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: AI（人工智能）：模拟人类智能以执行任务并能够根据收集到的信息迭代自我改进的系统或机器。
- en: 'ChatGPT: A variant of the GPT (Generative Pre-trained Transformer) model specifically
    fine-tuned for understanding and generating human-like text in a conversational
    manner.'
  id: totrans-466
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: ChatGPT：GPT（生成预训练变换器）模型的一个变体，专门针对理解和生成类似人类的对话文本进行微调。
- en: 'Prompt: The input given to an AI model designed to elicit a specific type of
    response.'
  id: totrans-467
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提示：提供给AI模型以激发特定类型响应的输入。
- en: 'Prompt Engineering: The art and science of crafting prompts that effectively
    communicate the user’s intent to the AI, optimizing the quality of the AI’s responses.'
  id: totrans-468
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提示工程：构建能够有效传达用户意图给AI的艺术和科学，优化AI响应的质量。
- en: 'Open-Ended Questions: Questions that cannot be answered with a simple “yes”
    or “no” and encourage a detailed or explanatory response.'
  id: totrans-469
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 开放式问题：不能简单地用“是”或“否”回答的问题，鼓励详细的或解释性的回答。
- en: 'Closed Questions: Questions that can be answered with a simple “yes,” “no,”
    or other minimal information.'
  id: totrans-470
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 封闭式问题：可以用简单的“是”、“否”或其他最小信息回答的问题。
- en: 'Bias: Systematic errors in AI processing that can lead to unfair outcomes,
    often reflecting existing prejudices in the data used to train the model.'
  id: totrans-471
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 偏见：AI处理中的系统性错误，可能导致不公平的结果，通常反映了用于训练模型的数据中存在的偏见。
- en: 'Iterative Refinement: The process of gradually improving prompts based on feedback
    from previous AI responses.'
  id: totrans-472
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 迭代优化：基于先前AI响应的反馈，逐步改进提示的过程。
- en: Additional Resources for Further Learning
  id: totrans-473
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 进一步学习的资源
- en: Books
  id: totrans-474
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 书籍
- en: '“Artificial Intelligence: A Guide for Thinking Humans” by Melanie Mitchell'
  id: totrans-475
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '《人工智能：人类思考指南》（“Artificial Intelligence: A Guide for Thinking Humans”）由Melanie
    Mitchell著'
- en: Provides a deep dive into the capabilities and challenges of current AI technologies.
  id: totrans-476
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 深入探讨了当前AI技术的功能和挑战。
- en: '“Superintelligence: Paths, Dangers, Strategies” by Nick Bostrom'
  id: totrans-477
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '《超级智能：路径、危险、策略》（“Superintelligence: Paths, Dangers, Strategies”）由Nick Bostrom著'
- en: Discusses the future prospects of AI and the ethical considerations it entails.
  id: totrans-478
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 讨论了AI的未来前景及其所涉及的伦理考量。
- en: Articles
  id: totrans-479
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 文章
- en: “The Prompts That Work Best with AI” (available on various tech blogs)
  id: totrans-480
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 《与AI配合最佳的提示》（可在各种技术博客上找到）
- en: Explores effective strategies for interacting with AI models like ChatGPT.
  id: totrans-481
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 探索与ChatGPT等AI模型互动的有效策略。
- en: “Understanding GPT-3 and Its Implications for the Future of AI” (published in
    ‘AI Magazine’)
  id: totrans-482
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “理解GPT-3及其对AI未来影响的启示”（发表于《AI杂志》）
- en: Offers a comprehensive overview of how advanced AI models are developed and
    their potential impact.
  id: totrans-483
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提供了高级AI模型开发和它们潜在影响的全面概述。
- en: Online Courses
  id: totrans-484
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 在线课程
- en: “AI For Everyone” by Andrew Ng on Coursera
  id: totrans-485
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “面向所有人的AI”由Andrew Ng在Coursera上提供
- en: A beginner-friendly course that outlines the applications of AI in various industries.
  id: totrans-486
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一门适合初学者的课程，概述了AI在各个行业的应用。
- en: “Deep Learning Specialization” on Coursera
  id: totrans-487
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Coursera上的“深度学习专业课程”
- en: Provides an in-depth exploration of deep learning, the technology behind many
    modern AI systems.
  id: totrans-488
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 深入探讨了深度学习，这是许多现代AI系统背后的技术。
- en: Prompt Templates and Checklists for Quick Reference
  id: totrans-489
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 提示模板和快速参考清单
- en: Prompt Templates
  id: totrans-490
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 提示模板
- en: 'Informational Prompt: “What are the known scientific challenges to [specific
    technology or process], and what solutions are currently being explored?”'
  id: totrans-491
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 信息性提示：“[特定技术或过程]已知的科学挑战是什么，目前正在探索哪些解决方案？”
- en: 'Creative Prompt: “Write a short story about a [character type] who discovers
    a [mysterious object] in a world where [specific condition or rule applies].”'
  id: totrans-492
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 创意提示：“写一个关于一个[角色类型]在一个[特定条件或规则适用]的世界中发现一个[神秘物体]的短故事。”
- en: Checklists for Crafting Effective Prompts
  id: totrans-493
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 构建有效提示的清单
- en: 'Clarity Checklist:'
  id: totrans-494
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 清晰度清单：
- en: Is the prompt clear and free of ambiguous terms?
  id: totrans-495
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提示是否清晰且没有模糊的术语？
- en: Does it specify the type of response desired (e.g., detailed explanation, list,
    summary)?
  id: totrans-496
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 是否指明了期望的响应类型（例如，详细解释、列表、总结）？
- en: 'Relevance Checklist:'
  id: totrans-497
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 相关性清单：
- en: Does the prompt focus on the relevant topic or question?
  id: totrans-498
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提示是否关注相关主题或问题？
- en: Are there any unnecessary details that could divert the AI’s focus?
  id: totrans-499
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 是否有任何可能分散AI注意力的不必要细节？
- en: 'Context Checklist:'
  id: totrans-500
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 上下文清单：
- en: Is there sufficient background information to guide the AI’s response?
  id: totrans-501
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 是否有足够的背景信息来引导AI的回答？
- en: Have any necessary constraints or limitations been clearly stated?
  id: totrans-502
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 是否已经清楚地说明了任何必要的约束或限制？
- en: This appendix should serve as a handy reference to enhance your proficiency
    in prompt engineering, providing you with the tools and resources to continue
    developing your skills in this evolving field. Whether you’re drafting prompts
    for professional use or personal exploration, these resources will support your
    journey in mastering effective communication with AI.
  id: totrans-503
  prefs: []
  type: TYPE_NORMAL
  zh: 本附录应作为方便的参考，以增强你在提示工程方面的熟练度，为你提供工具和资源，以继续在这个不断发展的领域中发展你的技能。无论你是为专业用途还是个人探索起草提示，这些资源都将支持你在与AI有效沟通方面的旅程。
