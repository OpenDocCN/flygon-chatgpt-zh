    ****a**nd** ****resc**heduli**ng ****so**me** ****appo**intmen**ts.'
  id: totrans-502
  prefs: []
  type: TYPE_NORMAL
  zh: '**首先，LLMs训练的数据量以及它们在实时生成类似人类句子的能力，使它们在成为你完美虚拟助理的候选人方面领先于其他应用。为了测试ChatGPT作为你一站式数字PA的完美程度，纽约时报的消费者科技主编和Tech
    Fix专栏作家Brian Chen决定对其进行测试。他制定了一系列不同的任务，这些任务会被要求一个虚拟助理（无论是人类还是AI）完成，包括帮助他准备会议、总结会议笔记、规划商务旅行和创建行程表，以及管理他的日历，包括预订会议和重新安排一些约会。'
