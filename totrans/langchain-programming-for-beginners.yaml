  id: totrans-1585
  prefs: []
  type: TYPE_NORMAL
  zh: st.title("Ask YouTube Video")
- en: 'with st.sidebar:'
  id: totrans-1586
  prefs: []
  type: TYPE_NORMAL
  zh: 'with st.sidebar:'
- en: st.title("Add Your API Key First")
  id: totrans-1587
  prefs: []
  type: TYPE_NORMAL
  zh: st.title("Add Your API Key First")
- en: openai_key = st.text_input("OpenAI API Key", type="password")
  id: totrans-1588
  prefs: []
  type: TYPE_NORMAL
  zh: openai_key = st.text_input("OpenAI API Key", type="password")
- en: 'if not openai_key:'
  id: totrans-1589
  prefs: []
  type: TYPE_NORMAL
  zh: 'if not openai_key:'
- en: st.info("Enter your OpenAI API Key to continue")
  id: totrans-1590
  prefs: []
  type: TYPE_NORMAL
  zh: st.info("Enter your OpenAI API Key to continue")
- en: st.stop()
  id: totrans-1591
  prefs: []
  type: TYPE_NORMAL
  zh: st.stop()
- en: llm = ChatOpenAI(model="gpt-4o", api_key=openai_key)
  id: totrans-1592
  prefs: []
  type: TYPE_NORMAL
  zh: llm = ChatOpenAI(model="gpt-4o", api_key=openai_key)
- en: In the code above, we created a sidebar using the with st.sidebar syntax, then
    added the title and text input elements to the sidebar.
  id: totrans-1593
  prefs: []
  type: TYPE_NORMAL
  zh: 在上面的代码中，我们使用 with st.sidebar 语法创建了一个侧边栏，然后向侧边栏添加了标题和文本输入元素。
- en: When the openai_key variable is empty, we run the st.info() method to display
    an instruction to the user, then call the st.stop() method so that Streamlit stops
    further execution of your Python code.
  id: totrans-1594
  prefs: []
  type: TYPE_NORMAL
  zh: 当 openai_key 变量为空时，我们运行 st.info() 方法向用户显示指令，然后调用 st.stop() 方法，这样 Streamlit 就会停止执行您的
    Python 代码。
- en: 'This way, the rest of the interface won’t show until an API key is added:'
