- en: Preface
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: As authors, we pour our hearts and souls into crafting stories that inspire,
    entertain, and enlighten readers. But let's be real—writing an exceptional book
    is only step one. To actually sell our masterpieces, we authors need to become
    savvy marketers and illustrators. And if you're anything like me, that can feel
    overwhelming, because frankly, they're entirely different skill sets.
  prefs: []
  type: TYPE_NORMAL
- en: Traditionally, many new authors dream of landing publishing deals, seduced by
    the promise of professionals handling all that marketing and illustration stuff.
    Imagine just writing, while someone else magically transforms your words into
    a beautifully packaged product that practically sells itself. Sounds dreamy, right?
    But in reality, scoring a traditional publishing deal can be harder than writing
    the book itself, especially for emerging authors or less-famous experts. That's
    why so many of us have stepped into the wild, wonderful world of self-publishing.
    It’s liberating, exciting—and, let’s admit it, sometimes a little terrifying.
  prefs: []
  type: TYPE_NORMAL
- en: Sure, editing and feedback often come easily from our supportive networks of
    family and friends (or the occasional brutally honest reviewer). But professional-quality
    graphics? That’s another beast entirely. Skilled illustrators are incredible,
    but their rates can quickly empty our coffee budgets (and we authors love our
    coffee).
  prefs: []
  type: TYPE_NORMAL
- en: Thankfully, the creative landscape is shifting in our favour. Enter AI technologies
    like ChatGPT. Suddenly, graphically-challenged authors (yes, I’m raising my hand
    here) can whip up stunning visuals simply by writing clear, creative prompts.
    True, human illustrators remain unmatched, but AI offers a practical, affordable
    way for indie authors to generate eye-catching visuals consistently, helping our
    books stand out in a crowded market.
  prefs: []
  type: TYPE_NORMAL
- en: Welcome to this exciting new era, my fellow authors, where authors—even those
    of us who can barely draw a stick figure—can become visual storytellers, enhancing
    our books and captivating readers through the magic of images.
  prefs: []
  type: TYPE_NORMAL
- en: '1'
  prefs: []
  type: TYPE_NORMAL
- en: Why AI Art is your Book’s Best Friend
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Authors can write awesome books, but to actually sell them, authors need to
    be marketers and illustrators too, and that can be a problem because these are
    different skillsets.
  prefs: []
  type: TYPE_NORMAL
- en: That’s why so many new authors assume that they need a traditional publishing
    deal where the publisher takes care of all the marketing paraphernalia – sounds
    good – all I have to do is write and the publisher takes care of all the details
    of turning your words into a tangible product – a book that sells. Unfortunately,
    because getting a traditional publisher is difficult for new authors or not so
    famous experts, many of us have successfully tried and thrived with self-publishing.
  prefs: []
  type: TYPE_NORMAL
- en: However, while you can get your friends to help with editing, and feedback –
    you still need to get an expert who can create compelling graphic, and they are
    expensive because of the huge value graphics bring to turning you book into a
    product. Until now - graphically challenged authors like me were delighted with
    AI prompts made it possible to write an instruction and have an artist follow
    it. While human illustrators have always been the best option, they tend to be
    expensive and out of reach for most indie authors, especially as we need a lot
    of visuals for marketing our books. Without marketing our books will struggle
    to find the readers who will love the book.
  prefs: []
  type: TYPE_NORMAL
- en: When ChatGPT introduced DALL-E, authors and others were excited until they ran
    into the many roadblocks that came with trying to produce images with this tool.
    I know I bought credits for it, that are still lying unused somewhere in the dark
    chasms of the internet, or my hard drive. It was very difficult to prompt DALL-E
    and get anything resembling what you were hoping to have. Not only could it not
    master any type of text addition to images, but more frustrating was that you
    couldn't iterate and tweak an image to make it better without it completely changing
    the image to something brand new.
  prefs: []
  type: TYPE_NORMAL
- en: Now, instead of being a hit or miss feature, OpenAI has changed from DALL-E
    to native image generation with ChatGPT 4o. This means you can stop paying for
    additional AI image tools for your online marketing needs. While there is a limit
    of images a day that you can generate with a free account, you now have access
    to an image creator that is responsive and can engage in a conversation with you
    rather than forcing you to start over from scratch with every single alteration.
  prefs: []
  type: TYPE_NORMAL
- en: This makes the image process much faster and targeted to the needs of your niche,
    regardless of what platform you plan to post the graphics on. We're going to dig
    into how you can use this new update to add to your collateral for your content.
    As this is a relatively new feature, so you may run into some quirks. But the
    good news is, it's much easier to refine and correct any type of small failure,
    just as you can in some of the other more advanced image generation AI tools.
  prefs: []
  type: TYPE_NORMAL
- en: In addition, think of the time you will save, instead of learning new graphics
    tools, testing, re-testing and regenerating, you can spend that time writing your
    next book.
  prefs: []
  type: TYPE_NORMAL
- en: It exponentially speeds up your time to market.
  prefs: []
  type: TYPE_NORMAL
- en: '[You can get the workbook here.](https://alsoby.me/r/amazon/B0FB161D8Q?fc=au&ds=1)'
  prefs: []
  type: TYPE_NORMAL
- en: '2'
  prefs: []
  type: TYPE_NORMAL
- en: Getting Started with Image Generation in ChatGPT 4o
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Users on the free tier can generate three images a day, more if you are a Plus
    version or a Team subscriber. You also have to have a browser that's compatible
    with ChatGPT - or use the ChatGPT mobile app.
  prefs: []
  type: TYPE_NORMAL
- en: 'Setting Up for Success: Image Generation Basics'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Ideally, if you're trying to create images, use a bigger screen, so you need
    a desktop rather than trying to make them on your mobile device. As an author,
    when I’m at home, I always use the monitor, rather than the laptop screen. The
    latter I keep for travelling.
  prefs: []
  type: TYPE_NORMAL
- en: To get started, open a new chat with ChatGPT and choose the 4o model.
  prefs: []
  type: TYPE_NORMAL
- en: Have a simple conversation about the image that you need.
  prefs: []
  type: TYPE_NORMAL
- en: 'For example, if you are an author who works with seniors who are writing a
    book, you might prompt something like this:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: '*“Create an image of a senior woman author happily typing on her laptop in
    a sunlit home office in the Himalayas Include cozy décor and a coffee mug on her
    <desk>.”*'
  prefs: []
  type: TYPE_NORMAL
- en: 'When you do this, you might get a result like this to work with as a starting
    point:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](Image00001.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Notice how it got things right, like the hands and specific requests for Himalayas
    and a coffee cup on the desk.
  prefs: []
  type: TYPE_NORMAL
- en: 'Hint: You can try this on your own, or with me. Follow along on the challenge
    - [https://<wbr> susanjagannath.<wbr> gumroad.<wbr> com/<wbr> l/<wbr> TCA-1](https://susanjagannath.gumroad.com/l/TCA-1)'
  prefs: []
  type: TYPE_NORMAL
- en: '3'
  prefs: []
  type: TYPE_NORMAL
- en: Mastering Image Prompts
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Communicating clearly with AI should be easy for us as authors, after all we
    are masters of word, storytelling and instruction – all we have to learn is how
    to wield our words to create concrete visual images. If we authors can create
    worlds, people, plots and passions via our books, why not do it AI?
  prefs: []
  type: TYPE_NORMAL
- en: Here’s how to twist AI to our genius.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s take a look at the basic anatomy of the prompt.
  prefs: []
  type: TYPE_NORMAL
- en: Basic Prompt
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '*Create an image of <a senior woman author> <happily> <typing on her laptop>
    in a <sunlit home office in the Himalayas> Include <cozy décor> and <a coffee
    mug> on her <desk.>*'
  prefs: []
  type: TYPE_NORMAL
- en: 'All the content within brackets can be changed – from left to right, these
    specify the:'
  prefs: []
  type: TYPE_NORMAL
- en: person
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: emotion
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: action
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: setting
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Note: Do not include the <> in your prompt.'
  prefs: []
  type: TYPE_NORMAL
- en: Now let’s get Chat to improve or change this image.
  prefs: []
  type: TYPE_NORMAL
- en: 'Maybe she is a bit too senior and you want an image that will apply to a wider
    age group:'
  prefs: []
  type: TYPE_NORMAL
- en: Prompt
  prefs: []
  type: TYPE_NORMAL
- en: '*Make her a bit younger and with salt and pepper hair*'
  prefs: []
  type: TYPE_NORMAL
- en: You'll wait a few seconds for the results to process, and then you can either
    accept the changes or ask for some more tweaks.
  prefs: []
  type: TYPE_NORMAL
- en: '![](Image00002.jpg)'
  prefs: []
  type: TYPE_IMG
- en: You decide that you want to use this image for a post to promote a writing retreat
    in the Himalayas.
  prefs: []
  type: TYPE_NORMAL
- en: 'So, you prompt Chat:'
  prefs: []
  type: TYPE_NORMAL
- en: '*Include floating text - Come to the Writing Retreat in the Himalayas.*'
  prefs: []
  type: TYPE_NORMAL
- en: '![Include floating text - Come to the Writing Retreat in the Himalayas.](Image00003.jpg)'
  prefs: []
  type: TYPE_IMG
- en: You can get the results you're looking for via a simple conversation with the
    image interface. You don’t have to learn coding or hire an expert!
  prefs: []
  type: TYPE_NORMAL
- en: Notice how AI kept the character and most other elements the same, rather than
    starting from scratch?
  prefs: []
  type: TYPE_NORMAL
- en: You can also change many different things, such as telling it to change it from
    a senior female to a senior male or having them work on their laptop on a wraparound
    porch outside rather than an indoor home office.
  prefs: []
  type: TYPE_NORMAL
- en: You can also change the emotion. You can pretty much use this prompt to get
    infinite different images.
  prefs: []
  type: TYPE_NORMAL
- en: As you can see from the previous example, ChatGPT 4o is much easier than some
    of the more complex image generating tools online. But you still must know how
    to prompt for what you need and want. You’re a writer – so begin with being specific
    and thinking from a visual standpoint as well as a strategic one for your marketing
    efforts.
  prefs: []
  type: TYPE_NORMAL
- en: The best way to get a prompt is to imagine there is a human graphic designer
    sitting in front of you and you have to tell them what you need. You would never
    simply tell someone to “make a powerful marketing image.” That's not enough for
    it to go on.
  prefs: []
  type: TYPE_NORMAL
- en: 'You want to specify :'
  prefs: []
  type: TYPE_NORMAL
- en: what emotion the image should convey,
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: any camera angles you may want,
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: the lighting in the picture,
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: the background or lack of background if you want it transparent, the colour
    palette to be used,
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: any specific objects you want in the image,
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: the style.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Blog and Social Media Images: Visual Content That Engages Instantly'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: For example, if you are writing a weight loss book, you need an image for your
    weight loss blog post, the more detail you can give it, the more accurate your
    output will be. If you need content for a specific social media platform, you
    might also add something about the size and shape of your image, such as a square
    image or, if you want something for a Facebook header, for example, you would
    specify the size.
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s prompt something like this:'
  prefs: []
  type: TYPE_NORMAL
- en: Prompt
  prefs: []
  type: TYPE_NORMAL
- en: '*Create an image of a woman in her 30s wearing athletic clothing and smiling
    as she goes on a morning walk on the sidewalk. The background shows a tree lined
    suburban street in Australia on a bright and sunny day with a blue sky. She''s
    holding a water bottle and is very confident looking*'
  prefs: []
  type: TYPE_NORMAL
- en: '![Create an image of a woman in her 30s wearing athletic clothing and smiling
    as she goes on a morning walk on the sidewalk. The background shows a tree lined
    suburban street in Australia on a bright and sunny day with a blue sky. She''s
    holding a water bottle and is very confident looking](Image00004.jpg)'
  prefs: []
  type: TYPE_IMG
- en: One of the great things about using this new image generation feature is that
    you can add text that will be (mostly) accurate.
  prefs: []
  type: TYPE_NORMAL
- en: 'For example, you might ask it to add some floating text in the image that says:
    “Walking for Weight Loss – Get Your 10k Steps in Today!”.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: '*Add the floating text "Walking for Weight Loss – Get Your 10k Steps in Today!*'
  prefs: []
  type: TYPE_NORMAL
- en: '![](Image00005.jpg)'
  prefs: []
  type: TYPE_IMG
- en: No more having to manually buy stock images and then go to another tool and
    add text yourself. ChatGPT’s 4o can do it for you.
  prefs: []
  type: TYPE_NORMAL
- en: This was done in seconds. No need for complex tools for images that wipe away
    your budget and valuable writing time.
  prefs: []
  type: TYPE_NORMAL
- en: 'Hint: You can try this on your own, or with me. Follow along on the challenge
    - [https://<wbr> susanjagannath.<wbr> gumroad.<wbr> com/<wbr> l/<wbr> TCA-1](https://susanjagannath.gumroad.com/l/TCA-1)'
  prefs: []
  type: TYPE_NORMAL
- en: '4'
  prefs: []
  type: TYPE_NORMAL
- en: 'Book Covers and Product Graphics: Create Stunning Covers With or Without a
    Designer'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: The other thing that takes up your time as an author is covers, either for books,
    bonuses or blogs.
  prefs: []
  type: TYPE_NORMAL
- en: This is where I often struggle for ideas or time or budget.
  prefs: []
  type: TYPE_NORMAL
- en: To use ChatGPT to create an info product cover, you want to include other details
    such as
  prefs: []
  type: TYPE_NORMAL
- en: the product you are selling
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: the niche you are in, and
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: the emotional tone you're trying to convey.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'You''ll also specify:'
  prefs: []
  type: TYPE_NORMAL
- en: what the title should be and
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: where it should be placed or which type of font you want.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: the background image that should be used.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: For example, you might say something like this where you tell Chat exactly what
    you want.
  prefs: []
  type: TYPE_NORMAL
- en: Prompt
  prefs: []
  type: TYPE_NORMAL
- en: '*Create a full-size e-book cover for the book titled “Easy Images for Authors
    Who Can’t Draw.”*'
  prefs: []
  type: TYPE_NORMAL
- en: '*Use a **clean, modern sans-serif font** for the title at the top.*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*In the centre, place a **badly drawn doodle** of a sun, crooked house, and
    stick tree.*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Make the doodle appear like a **floating sticker or hologram** , with subtle
    drop shadow or glow.*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Use a **light blue textured background** (no white).*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*At the bottom, place “Your Name” in a **refined script font.***'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Ensure professional layout, spacing, and proportion (6x9 aspect ratio).*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: And this is the result – you could use this directly or you could use this to
    give to your book cover designer. That alone will save you a lot of time and money,
    as most designers will only do a limited number of iterations of your book cover
    before they have to ask you for more fees.
  prefs: []
  type: TYPE_NORMAL
- en: '![Create a full-size e-book cover for the book titled “Easy Images for Authors
    Who Can’t Draw.”](Image00006.jpg)'
  prefs: []
  type: TYPE_IMG
- en: You can play around with it to get what you want, whether it’s a different font,
    layout, or graphic.
  prefs: []
  type: TYPE_NORMAL
- en: You can also ask Chat to share the prompt it created to generate the images.
    Yes, I know, you gave it a simple prompt, but Chat creates its own prompt and
    then generates the image.
  prefs: []
  type: TYPE_NORMAL
- en: 'So now let’s use that to add a subtitle:'
  prefs: []
  type: TYPE_NORMAL
- en: Prompt
  prefs: []
  type: TYPE_NORMAL
- en: '*Create a full size vertical e-book cover for a book titled "Easy Images for
    Authors Who Can’t Draw".*'
  prefs: []
  type: TYPE_NORMAL
- en: '*Use the following design elements:*'
  prefs: []
  type: TYPE_NORMAL
- en: '***Title** at the top in a **clean, modern sans-serif font** , bold and centre-aligned*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*A **subtitle** just below the title in smaller sans-serif font:*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*“Visual Content Creation for Writers Who’d Rather Just Write”*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*In the centre, a **badly drawn doodle** of a sun, crooked house, and stick
    tree.*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Make the doodle appear to **float slightly** , with a subtle glow or shadow.*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Use a **light blue watercolour-textured background** —not plain white.*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*At the bottom, place **"Your Name"** in an **elegant script font.***'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Ensure clean layout, whitespace balance, and professional proportions.*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![Create a full size vertical e-book cover for a book titled "Easy Images for
    Authors Who Can’t Draw".](Image00007.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Now you can download the image and send it to your book cover designer.
  prefs: []
  type: TYPE_NORMAL
- en: Or keep creating. (but don’t spend too much time!)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Or use it for your product graphics in your marketing directly.
