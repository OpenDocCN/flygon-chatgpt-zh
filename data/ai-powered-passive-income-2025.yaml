  type: TYPE_NORMAL
  zh: '"[城市名称]赛博朋克霓虹招牌，发光的灯光，未来感，超详细 –v 6"（例如：“东京赛博朋克霓虹招牌，发光的灯光，未来感，超详细 –v 6”）*'
