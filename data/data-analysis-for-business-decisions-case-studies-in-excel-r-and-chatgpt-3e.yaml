  type: TYPE_NORMAL
  zh: 将WDIAnnotatedData.xlsx保存为csv文件，然后将WDIAnnotatedData.csv文件上传到带有Code Interpreter插件的ChatGPT-4。使用以下提示，你应该会得到与[图8.11](#fig8-11)中显示的类似的结果。
- en: 'Prompt: “Create a scatterplot using 2012[YR2012] (from the Internet users sheet)
    on the x-axis and 2012 [YR2012] from the population sheet as 2012 pop [YR2012]
    on the y-axis to show the distribution associated with population and Internet
    user penetration.”'
