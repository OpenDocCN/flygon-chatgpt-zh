- en: 'About the Author: Jackie Bolen'
  id: totrans-69
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 关于作者：杰基·博伦
- en: I taught English in South Korea for a decade to every level and type of student,
    including every age from kindergarten kids to adults. These days, I'm living in
    Vancouver and teaching English to a variety of students. In my spare time, you
    can usually find me outside surfing, biking, hiking or on the hunt for the most
    delicious kimchi I can find.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 我在韩国教了十年英语，教授过各个年龄段和类型的学生，包括从幼儿园孩子到成年人。如今，我住在温哥华，教授各种英语学生。在空闲时间，你通常可以在户外冲浪、骑自行车、徒步旅行，或者寻找我能找到的最美味的泡菜。
- en: In case you were wondering what my academic qualifications are, I hold a Master
    of Arts in Psychology. During my time in Korea, I completed both the Cambridge
    CELTA and DELTA certification programs. With the combination of 20 years teaching
    ESL/EFL learners of all ages and levels, and the more formal teaching qualifications
    I've obtained, I have a solid foundation on which to offer teaching advice. I
    truly hope that you find this book useful and would love it if you sent me an
    email with any questions or feedback that you might have (jb.business.online@gmail.com).
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想知道我的学术资格，我拥有心理学硕士学位。在韩国期间，我完成了剑桥CELTA和DELTA认证项目。结合20年教授各个年龄段和水平的ESL/EFL学习者的经验，以及我获得的更正式的教学资格，我拥有提供教学建议的坚实基础。我真心希望这本书对你有所帮助，如果你有任何问题或反馈，欢迎通过电子邮件（jb.business.online@gmail.com）与我联系。
