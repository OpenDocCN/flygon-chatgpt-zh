- en: Combining Styles for Unique Results
  id: totrans-1325
  prefs: []
  type: TYPE_NORMAL
  zh: 结合风格以获得独特效果
- en: 'DALL·E 3 allows you to blend styles in ways that are nearly impossible in traditional
    mediums. For example:'
  id: totrans-1326
  prefs: []
  type: TYPE_NORMAL
  zh: DALL·E 3 允许你以在传统媒介中几乎不可能的方式混合风格。例如：
- en: “A medieval knight in a sci-fi cityscape, painted in the style of Van Gogh.”
  id: totrans-1327
  prefs: []
  type: TYPE_NORMAL
  zh: “用梵高的风格绘制的科幻城市中的中世纪骑士。”
- en: 'This kind of prompt fuses time, genre, and artist influence into something
    new and compelling. Try mixing:'
  id: totrans-1328
  prefs: []
  type: TYPE_NORMAL
  zh: 这种提示将时间、类型和艺术家影响融合成新的、引人入胜的东西。尝试混合：
- en: Historical eras with modern themes
  id: totrans-1329
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 历史时期与现代主题的结合
