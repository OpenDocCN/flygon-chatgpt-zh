  prefs: []
  type: TYPE_NORMAL
  zh: '[何时使用]'
- en: '****Refr**amin**g ****sh**oul**d ****b**e** ****us**ed** ****wh**en** ****t**he**
    ****an**swe**r ****init**iall**y ****pro**vide**d ****se**ems** ****lim**ite**d
    ****o**r** ****do**es** ****n**ot** ****exp**lor**e ****t**he** ****to**pic**
