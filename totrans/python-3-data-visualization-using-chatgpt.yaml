- en: '**WHAT IS BOKEH?**'
  id: totrans-2212
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**什么是 BOKEH？**'
- en: Bokeh is an open source project that depends on Matplotlib as well as Scikit-learn.
    As you will see in the subsequent code sample, Bokeh generates an HTML Web page
    that is based on Python code, and then launches that Web page in a browser. Bokeh
    and D3.js (which is a JavaScript layer of abstraction over SVG) both provide elegant
    visualization effects that support animation effects and user interaction.
  id: totrans-2213
  prefs: []
  type: TYPE_NORMAL
  zh: Bokeh 是一个开源项目，它依赖于 Matplotlib 以及 Scikit-learn。正如你将在后续的代码示例中看到的那样，Bokeh 生成一个基于
    Python 代码的 HTML 网页，然后在浏览器中打开该网页。Bokeh 和 D3.js（它是 SVG 之上的 JavaScript 抽象层）都提供了优雅的视觉效果，支持动画效果和用户交互。
- en: Bokeh enables the rapid creation statistical visualization, and it works with
    other tools with as Python Flask and Django. In addition to Python, Bokeh supports
    Julia, Lua, and R (JSON files are generated instead of HTML Web pages).
  id: totrans-2214
  prefs: []
  type: TYPE_NORMAL
  zh: Bokeh 能够快速创建统计可视化，并且与 Python Flask 和 Django 等其他工具一起工作。除了 Python 之外，Bokeh 还支持
    Julia、Lua 和 R（生成 JSON 文件而不是 HTML 网页）。
- en: '[Listing 6.11](#list6-11) displays the contents bokeh_trig.py that illustrates
    how to create a graphics effect using various Bokeh APIs.'
  id: totrans-2215
  prefs: []
  type: TYPE_NORMAL
  zh: '[列表 6.11](#list6-11) 展示了 bokeh_trig.py 的内容，该内容说明了如何使用各种 Bokeh API 创建图形效果。'
- en: '***LISTING 6.11: bokeh_trig.py***'
  id: totrans-2216
  prefs: []
  type: TYPE_NORMAL
  zh: '***列表 6.11: bokeh_trig.py***'
- en: '[PRE441]'
  id: totrans-2217
  prefs: []
  type: TYPE_PRE
  zh: '[PRE441]'
- en: '[Listing 6.11](#list6-11) starts with a commented out pip3 code snippet that
    you can launch from the command line in order to install Bokeh (in case you haven’t
    done so already).'
  id: totrans-2218
  prefs: []
  type: TYPE_NORMAL
  zh: '[列表 6.11](#list6-11) 以一个注释掉的 pip3 代码片段开始，你可以从命令行启动它来安装 Bokeh（如果你还没有这样做的话）。'
- en: The next code block contains several Bokeh -related statements as well as NumPy
    and Math.
  id: totrans-2219
  prefs: []
  type: TYPE_NORMAL
  zh: 下一个代码块包含几个与 Bokeh 相关的语句以及 NumPy 和 Math。
- en: Notice that the variable white is defined as an (R,G,B) triple of integers,
    which represents the red, green, and blue components of a color. In particular,
    (255,255,255) represents the color white (check online if you are unfamiliar with
    RGB). The next portion of [Listing 6.11](#list6-11) initializes some scalar variables
    that are used in the two for loops that are in the second half of [Listing 6.11](#list6-11).
  id: totrans-2220
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，变量 white 被定义为表示颜色红色、绿色和蓝色成分的整数 (R,G,B) 三元组。特别是，(255,255,255) 代表白色（如果你不熟悉
    RGB，请在线检查）。列表 6.11 的下一部分初始化了一些标量变量，这些变量用于列表 6.11 第二半部分的两个 for 循环中。
- en: Next, the NumPy variable x is a range of values from 0 to math.PI/3, with an
    increment of 0.05 between successive values. Then the NumPy variables y1 and y2
    are defined as the sine and cosine values, respectively, of the values in x. The
    next code snippet initializes the variable fig1 that represents a context in which
    the graphics effects will be rendered. This completes the initialization of the
    variables that are used in the two for loops.
  id: totrans-2221
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，NumPy 变量 x 是从 0 到 math.PI/3 的值范围，相邻值之间的增量是 0.05。然后，NumPy 变量 y1 和 y2 分别定义为
    x 中值的正弦和余弦值。接下来的代码片段初始化了变量 fig1，它代表图形效果将被渲染的上下文。这完成了在两个 for 循环中使用的变量的初始化。
- en: The next portion of [Listing 6.11](#list6-11) contains the first for loop that
    creates a gradient-like effect by defining (R,G,B) triples whose values are based
    partially on the value of the loop variable i. For example, the variable rgb1
    ranges in a linear fashion from (0,0,0) to (255,0,0), which represent the colors
    black and red, respectively. The variable rgb2 ranges in a linear fashion from
    (0,0,0) to (255,255,0), which represent the colors black and yellow, respectively.
    The next portion of the for loop contains two invocations of the fig1.line() API
    that renders a sine wave and a cosine wave in the context variable fig1.
  id: totrans-2222
  prefs: []
  type: TYPE_NORMAL
  zh: 列表 6.11 的下一部分包含第一个 for 循环，通过定义基于循环变量 i 的值的 (R,G,B) 三元组来创建类似渐变的视觉效果。例如，变量 rgb1
    以线性方式从 (0,0,0) 到 (255,0,0) 变化，分别代表黑色和红色。变量 rgb2 以线性方式从 (0,0,0) 到 (255,255,0) 变化，分别代表黑色和黄色。for
    循环的下一部分包含两次对 fig1.line() API 的调用，在上下文变量 fig1 中渲染正弦波和余弦波。
- en: 'The second for loop is similar to the first for loop: the main difference is
    that the variable rgb1 varies from black to blue, and the variable rgb2 variables
    from black to green. The final code snippet in [Listing 6.13](#list6-13) invokes
    the show() method that generates an HTML Web page (with the same prefix as the
    Python file) and then launches the Web page in a browser.'
  id: totrans-2223
  prefs: []
  type: TYPE_NORMAL
  zh: 第二个 for 循环与第一个 for 循环类似：主要区别是变量 rgb1 从黑色变为蓝色，而变量 rgb2 从黑色变为绿色。列表 6.13 的最后代码片段调用了
    show() 方法，该方法生成一个基于 Python 代码的 HTML 网页（与 Python 文件具有相同的名称前缀），然后在浏览器中打开该网页。
- en: '[Figure 6.8](#fig6-8) displays the graphics effect based on the code in [Listing
    6.11](#list6-11). If this image is displayed as black and white, launch the code
    from the command line and you will see the gradient-like effects in the image.'
  id: totrans-2224
  prefs: []
  type: TYPE_NORMAL
  zh: '[图6.8](#fig6-8) 显示了基于[列表6.11](#list6-11)中代码的图形效果。如果这个图像以黑白显示，请在命令行中运行代码，你将看到图像中的渐变效果。'
- en: '![Images](../images/f0205-01.jpg)'
  id: totrans-2225
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/f0205-01.jpg)'
