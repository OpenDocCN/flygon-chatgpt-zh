    ****se**nse** ****o**f** ****wh**at** ****som**eon**e ****i**s** ****sa**yin**g
    ****t**o** ****u**s**, ****w**e** ****u**se** ****a**** ****l**ot** ****mo**re**
    ****so**cia**l ****cu**es** ****th**an** ****ju**st** ****t**he** ****wo**rds**
    ****th**at** ****th**ey** ****s**ay**. ****W**e** ****re**ly** ****o**n** ****th**eir**
    ****to**ne** ****o**f** ****vo**ice**, ****fa**cia**l ****ges**ture**s, ****a**nd**
    ****bo**dy** ****lan**guag**e, ****a**s** ****we**ll** ****a**s** ****t**he**
    ****his**tor**y ****o**f** ****o**ur** ****rela**tionsh**ip ****wi**th** ****t**he**
    ****pe**rso**n ****spe**akin**g ****a**nd** ****h**ow** ****th**ey** ****f**it**
    ****in**to** ****o**ur** ****li**ves**. ****Cha**tGP**T ****mi**ght** ****ha**ve**
    ****a**** ****he**ap** ****o**f** ****da**ta**, ****b**ut** ****i**t** ****ju**st**
    ****do**esn**’****t**** ****ha**ve** ****wh**at** ****i**t** ****ta**kes** ****t**o**
    ****br**ing** ****con**tex**t ****t**o** ****t**he** ****ta**ble** ****o**n**
    ****i**ts** ****o**wn**. ****En**ter** ****pr**omp**t ****engi**neerin**g, ****wh**ere**
    ****w**e** ****hu**man**s ****ta**ke** ****ca**re** ****o**f** ****t**he** ****con**tex**t
    ****pro**ble**m ****f**or** ****o**ur** ****anti**socia**l ****cha**tbo**t.'
  id: totrans-438
  prefs: []
  type: TYPE_NORMAL
  zh: '**ChatGPT** 已经改变了人工智能的游戏规则，它能够生成文本、图像或其他媒体，但并非完美。它严重缺乏的东西之一就是精确地理解我们人类真正关注的内容：**语境**。为了理解某人对我们说的话，我们使用的不仅仅是他们所说的词语，而是需要更多的社会语境。我们依赖于他们的语调、面部表情、肢体语言，以及我们与说话者关系的背景历史，以及他们如何融入我们的生活。ChatGPT
    可能拥有大量数据，但它仅仅没有具备将语境带到桌面上所需的东西。**企业提示工程**，其中我们人类负责解决我们反社交聊天机器人的语境问题。'
- en: '****Thr**oug**h ****deve**lopin**g ****a**n** ****under**standi**ng ****o**f**
    ****pr**omp**t ****engi**neerin**g, ****y**ou**’****l**l** ****b**e** ****ab**le**
    ****t**o** ****care**full**y ****stru**ctur**e ****yo**ur** ****in**put**s, ****ens**urin**g
    ****th**at** ****Cha**tGP**T ****h**as** ****a**ll** ****t**he** ****con**tex**t
    ****i**t** ****ne**eds** ****t**o** ****b**e** ****t**he** ****depe**ndabl**e
    ****a**nd** ****us**efu**l ****dig**ita**l ****P**A** ****o**f** ****yo**ur**
    ****dr**eam**s.'
  id: totrans-439
  prefs: []
  type: TYPE_NORMAL
  zh: 通过对提示工程的理解，你将能够仔细地构建你的输入，确保ChatGPT拥有所有它需要的语境，以成为你梦想中可靠和有用的数字PA（个人助理）。
- en: '****H**ow** ****Do**es** ****I**t** ****Wo**rk**?'
  id: totrans-440
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**它是如何工作的**？'
- en: '****T**he** ****b**ig** ****pu**sh** ****in**to** ****pr**omp**t ****engi**neerin**g
    ****be**gan** ****wi**th** ****a**** ****pa**per** ****publ**ishe**d ****b**y**
    ****com**pute**r ****scie**ntis**t ****As**his**h ****Vas**wan**i ****a**nd**
    ****coll**eague**s ****ti**tle**d ****Atte**ntio**n ****I**s** ****A**ll** ****Y**ou**
    ****Ne**ed** (****Vas**wan**i ****e**t** ****a**l**., ****20**17**). ****Th**is**
    ****pa**per** ****intr**oduce**d ****some**thin**g ****ca**lle**d ****t**he**
    ****atte**ntio**n ****mech**anis**m, ****wh**ich** ****w**as** ****intr**oduce**d
    ****t**o** ****ove**rcom**e ****t**he** ****ne**ura**l ****mac**hin**e ****tran**slatio**n
    (****N**MT**) ****pro**ble**m. ****I**n** ****si**mpl**e ****te**rms**, ****Vas**wan**i
    ****a**nd** ****c**o**. ****ai**med** ****t**o** ****so**lve** ****t**he** ****pro**ble**m
    ****o**f** ****h**ow** ****t**o** ****ke**ep** ****t**he** ****resp**onse**s ****rec**eive**d
    ****fr**om** ****gene**rativ**e ****A**I** ****acc**urat**e ****a**nd** ****foc**use**d,
    ****wh**ich** ****w**as** ****a**** ****part**icula**r ****pro**ble**m ****wh**en**
    ****as**kin**g ****i**t** ****f**or** ****mo**re** ****comp**licate**d ****o**r**
    ****len**gth**y ****resp**onse**s. ****T**he** ****atte**ntio**n ****mech**anis**m
    ****ena**ble**d ****LL**Ms** ****t**o** ****fo**cus** ****o**n** ****mo**re**
    ****th**an** ****ju**st** ****t**he** ****la**st** ****pr**omp**t ****th**at**
    ****i**t** ****w**as** ****gi**ven**, ****all**owin**g ****th**em** ****t**o**
    ****ta**ke** ****in**to** ****acc**oun**t ****t**he** ****en**tir**e ****seq**uenc**e
    ****o**f** ****pro**mpt**s ****gi**ven** ****i**n** ****a**** ****th**rea**d,
    ****a**nd** ****t**o** ****we**igh** ****u**p** ****t**he** ****impo**rtanc**e
    ****o**f** ****diff**eren**t ****pro**mpt**s (****f**or** ****exa**mpl**e, ****put**tin**g
    ****mo**re** ****emp**hasi**s ****o**n** ****acc**urac**y ****th**an** ****o**n**
    ****prod**ucin**g ****any**thin**g ****th**at** ****i**t** ****c**an** ****fi**nd**
    ****o**n** ****t**he** ****to**pic**).'
  id: totrans-441
  prefs: []
  type: TYPE_NORMAL
  zh: '**大规模**推入**提示工程**始于一篇由计算机科学家Ashish Vaswani及其同事发表的论文，标题为**注意力即是全部所需**（Vaswani
    et al., 2017）。这篇论文引入了一种称为**注意力机制**的概念，旨在克服神经机器翻译（NMT）问题。简单来说，Vaswani及其同事旨在解决如何保持从生成式AI接收到的响应既准确又专注的问题，这在需要更复杂或更长的响应时尤其是一个问题。注意力机制使得LLMs能够关注不仅仅是它们被给出的最后一个提示，而是允许它们考虑整个线程中给出的所有提示序列，并权衡不同提示的重要性（例如，将更多重点放在准确性上，而不是生产任何它可以在主题上找到的东西）。'
- en: '****T**he** ****atte**ntio**n ****mech**anis**m ****ma**kes** ****u**se** ****o**f**
    ****wh**at** ****pe**eps** ****i**n** ****t**he** ****gene**rativ**e ****A**I**
    ****fi**eld** ****ca**ll** ****t**he** ****tran**sforme**r. ****Tran**sforme**rs
    ****a**re** ****a**** ****gr**oup** ****o**r** “****fa**mil**y” ****o**f** ****mac**hin**e
    ****lea**rnin**g ****archi**tectur**es ****th**at** ****al**low** ****LL**Ms**
    ****li**ke** ****Cha**tGP**T ****t**o** ****dete**rmin**e ****t**he** ****impo**rtanc**e
    ****o**f** ****t**he** ****indi**vidua**l ****wo**rds** ****i**n** ****t**he**
    ****pro**mpt**s ****w**e** ****en**ter**. ****I**t** ****do**es** ****th**is**
    ****us**ing** ****wh**at**’****s**** ****kn**own** ****a**s** ****a**** ****se**lf**-****atte**ntio**n
    ****mech**anis**m. ****Th**is** ****mech**anis**m ****we**igh**s ****u**p** ****yo**ur**
    ****pr**omp**t ****acco**rdin**g ****t**o** ****th**ree** ****mat**rice**s: ****qu**ery**,
    ****k**ey**, ****a**nd** ****va**lue** (****Mu**ñoz**, ****20**20**). ****N**ot**
    ****on**ly** ****th**at**, ****b**ut** ****i**t** ****al**so** ****we**igh**s
    ****u**p** ****i**ts** ****res**pons**e ****t**o** ****yo**ur** ****pr**omp**t
    ****us**ing** ****th**ese** ****k**ey** ****ele**ment**s ****t**oo**, ****s**o**
    ****th**at** ****i**t** ****c**an** ****gi**ve** ****y**ou** ****mo**re** ****acc**urat**e
    ****res**ult**s ****a**s** ****t**he** ****ch**at** ****th**rea**d ****prog**resse**s.
    ****Th**is** ****i**s** ****kn**own** ****a**s** ****t**he** “****se**lf**-****atte**ntio**n”
    ****mech**anis**m ****o**f** ****t**he** ****A**I**. ****Th**is** ****a**ll**
    ****ad**ds** ****u**p** (****o**r** ****i**s** ****ad**ded** ****u**p** ****b**y**
    ****t**he** ****A**I**) ****t**o** ****a**** ****cha**tbo**t ****th**at** ****i**s**
    ****cap**abl**e ****o**f** ****under**standi**ng ****so**me** ****o**f** ****t**he**
    ****con**tex**t ****surr**oundin**g ****t**he** ****que**stio**n, ****ra**the**r
    ****th**an** ****ju**st** ****rel**yin**g ****o**n** ****t**he** ****wo**rds**
    ****i**n** ****t**he** ****pr**omp**t. ****Us**ing** ****t**he** ****atte**ntio**n
