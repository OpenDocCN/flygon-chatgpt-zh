  prefs: []
  type: TYPE_NORMAL
  zh: '"恭喜！你握有解锁AI全部创造潜能的钥匙。这本日记不是关于取代你的想象力——它是关于放大它。无论你是在与写作障碍作斗争，与空白画布作斗争，还是陷入内容困境，这90个提示将帮助你："'
