  type: TYPE_PRE
- en: '**NUMPY AND THE LENGTH OF VECTORS**'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The *norm* of a vector (or an array of numbers) is the length of a vector, which
    is the square root of the dot product of a vector with itself. NumPy also provides
    the “sum” and “square” functions that you can use to calculate the norm of a vector.
  prefs: []
  type: TYPE_NORMAL
