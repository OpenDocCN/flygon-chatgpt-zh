- en: About the Author
  id: totrans-174
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 关于作者
- en: 'Lydia Evelyn![Lydia Evelyn is smiling outdoors, standing on grass with a dirt
    path and wooden fence in the background. She is wearing a white shirt and has
    shoulder-length hair. The setting appears to be a sunny day.](../images/641691_1_En_BookFrontmatter_Figb_HTML.jpg)is
    the author of *Beginning ChatGPT for Python: Build Intelligent Applications with
    OpenAI APIs*. She is a proficient technical writer and a skilled Python developer
    with a professional background in ChatGPT. She has effectively utilized ChatGPT,
    coupled with prompt engineering, in multiple client projects within the realm
    of technical publishing. Lydia boasts extensive programming expertise in both
    Python and Java.© The Author(s), under exclusive license to APress Media, LLC,
    part of Springer Nature 2025L. EvelynMaking ChatGPT Work for You[https://doi.org/10.1007/979-8-8688-1445-7_1](https://doi.org/10.1007/979-8-8688-1445-7_1)'
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: Lydia Evelyn![Lydia Evelyn在户外微笑，站在草地上，背景是泥土小径和木栅栏。她穿着白色衬衫，肩部长发。环境看起来是一个阳光明媚的日子。](../images/641691_1_En_BookFrontmatter_Figb_HTML.jpg)是《Python入门：使用OpenAI
    API构建智能应用》一书的作者。她是一位熟练的技术作家和熟练的Python开发者，拥有ChatGPT的专业背景。她在技术出版领域内的多个客户项目中有效地利用了ChatGPT，并结合提示工程。Lydia在Python和Java编程方面拥有丰富的专业知识。©
    作者，独家授权给APress Media, LLC，Springer Nature的一部分，2025L. Evelyn让ChatGPT为您工作[https://doi.org/10.1007/979-8-8688-1445-7_1](https://doi.org/10.1007/979-8-8688-1445-7_1)
- en: 1. Sorry, but You’re (Probably) Not Using the Best Prompts to Use ChatGPT to
    Its Highest Potential
  id: totrans-176
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 1. 对不起，但您（可能）没有使用最佳的提示来发挥ChatGPT的最大潜力
- en: Lydia Evelyn^([1](#Aff2)  )(1)Catalonia, Spain
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: Lydia Evelyn^([1](#Aff2)  )(1)加泰罗尼亚，西班牙
- en: Since the inception of ChatGPT, it’s been seen and touted as a miracle drug.
    If you believe all the hype, it can create an entire anthology of books from a
    single prompt! Don’t believe the hype.
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: 自ChatGPT问世以来，它一直被视为一种奇迹药物。如果您相信所有的炒作，它可以从一个提示中创建整个书库！不要相信炒作。
- en: I personally had the opportunity to use it in multiple professional contexts,
    from marketing to engineering and from software development to database analysis.
    And for many business professionals, they’re using ChatGPT **the wrong way**.
    For some, using ChatGPT for work gets frustrating when it doesn’t produce the
    miraculous results they were expecting. For others, I’ve seen that users may not
    know how to properly fact-check results from ChatGPT. This results in work tasks
    that have embarrassingly obvious errors. That may even be why you picked up this
    book!
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 我个人有机会在多个专业环境中使用它，从市场营销到工程，从软件开发到数据库分析。对于许多商业专业人士来说，他们使用ChatGPT的方式**是错误的**。对于一些人来说，当ChatGPT没有产生他们预期的神奇结果时，使用ChatGPT进行工作会感到沮丧。对于其他人，我看到用户可能不知道如何正确地核实ChatGPT的结果。这导致工作任务中出现了令人尴尬的明显错误。这也许就是您拿起这本书的原因！
- en: Things You May (or May Not) Know That ChatGPT Can Do
  id: totrans-180
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 您可能（或可能不知道）ChatGPT能做什么的事情
- en: Here’s a list of some really cool things you can do with ChatGPT.
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一些您可以用ChatGPT做的非常酷的事情列表。
- en: Real Interview Prep with Practice Questions
  id: totrans-182
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 实际面试准备与练习问题
- en: Did you know that you can use ChatGPT in order to prep yourself for a job interview?
    Yes, seriously. You can actually have a one-on-one **verbal** conversation with
    ChatGPT and have it to play the role of the job recruiter from the HR department
    of the company you want to work for. It will ask you relevant questions about
    the job, giving you the opportunity to practice and hone your responses for the
    real thing. Be sure to check out Chapter [8](641691_1_En_8_Chapter.xhtml), which
    is all about chatting and conversing with ChatGPT for productivity.
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 你知道你可以使用 ChatGPT 来准备面试吗？是的，真的。你实际上可以与 ChatGPT 进行一对一的**口头**对话，让它扮演你想要工作的公司的人力资源部门的招聘人员。它会就工作提出相关问题，给你一个练习和磨练真实面试中回答的机会。务必查看第
    [8](641691_1_En_8_Chapter.xhtml) 章，它全部关于如何与 ChatGPT 进行聊天和对话以提高生产力。
- en: Take the Pain Out of Reading Really Long Documents
  id: totrans-184
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 减少阅读真正长篇文档的痛苦
- en: Did you know that you can leverage ChatGPT to analyze your documents? What that
    means is if you have a document—be it a Word document, an Excel file, or even
    a PDF—you can send it to ChatGPT for analysis. You can then ask questions about
    the contents of the file itself. For some business professionals, this is a game-changer
    because you can take a marketing brief or a white paper and ask ChatGPT **anything**
    about the contents. For example, have you seen the terms and conditions of the
    apps that you use every day? You almost need a lawyer to read them for you before
    you hit that “Accept” button. Well, in Chapter [6](641691_1_En_6_Chapter.xhtml),
    we do the next best thing—we’re taking the Terms and Conditions for Facebook as
    a PDF file, and we’re going to ask ChatGPT what they’re *really* asking you to
    accept.
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: 你知道你可以利用 ChatGPT 来分析你的文档吗？这意味着如果你有一个文档——无论是 Word 文档、Excel 文件，甚至是 PDF 文件——你都可以将其发送给
    ChatGPT 进行分析。然后你可以就文件内容本身提出问题。对于一些商业专业人士来说，这是一个颠覆性的变化，因为你可以拿一份营销简报或白皮书，向 ChatGPT
    提出关于其内容的任何问题。例如，你看到过你每天使用的应用程序的使用条款和条件吗？在点击“接受”按钮之前，你几乎需要一位律师帮你阅读它们。在第 [6](641691_1_En_6_Chapter.xhtml)
    章，我们做了下一件最好做的事情——我们将 Facebook 的使用条款和条件作为 PDF 文件，并询问 ChatGPT 它们实际上要求你接受什么。
- en: Create the Exact Image That You Need for Your Project
  id: totrans-186
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 创建你项目所需的精确图像
- en: Did you know that you can generate really professional-looking photos, images,
    icons, and illustrations using ChatGPT? You can use these images for any purpose
    you want and share what you’ve made with marketing teams, graphic designers, or
    managers and communicate your ideas in a more visual way that helps get everyone
    on the same page. If you’re curious about how to do this **well**, be sure to
    check out Chapter [13](641691_1_En_13_Chapter.xhtml) where we go through all of
    the steps to crafting the right prompt for image generation.
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: 你知道你可以使用 ChatGPT 生成看起来非常专业的照片、图像、图标和插图吗？你可以将这些图像用于任何目的，并与市场营销团队、图形设计师或经理分享你制作的内容，以更直观的方式传达你的想法，帮助大家达成共识。如果你对如何做到这一点**很好**感兴趣，务必查看第
    [13](641691_1_En_13_Chapter.xhtml) 章，我们将详细介绍制作正确提示以生成图像的所有步骤。
- en: Write Engaging Long-Form Content with the Canvas Feature
  id: totrans-188
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 使用画布功能撰写引人入胜的长篇内容
- en: Of course, you know that you can write an article with the help of ChatGPT,
    but did you know that you can use ChatGPT’s Canvas feature to take it to another
    level? This incredible feature allows you to be able to write with ChatGPT side
    by side, in a collaborative window called a “Canvas” that helps you make changes
    and critiques with ChatGPT. Think of it as your very own collaboration partner
    for writing articles, documents, or even book chapters. Be sure to check out Chapter
    [5](641691_1_En_5_Chapter.xhtml) to see this in action!
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，你知道你可以借助 ChatGPT 来撰写文章，但你是否知道你可以使用 ChatGPT 的画布功能将其提升到另一个层次？这个令人难以置信的功能让你能够与
    ChatGPT 并排写作，在一个称为“画布”的协作窗口中，它可以帮助你与 ChatGPT 一起进行修改和批评。把它想象成你自己的写作文章、文档甚至书籍章节的协作伙伴。务必查看第
    [5](641691_1_En_5_Chapter.xhtml) 章，看看这个功能是如何实际应用的！
- en: Ensure You’re Getting Factual and Accurate Results from ChatGPT
  id: totrans-190
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 确保你从 ChatGPT 获得事实和准确的结果
- en: Everyone knows that ChatGPT can provide mistaken results. But did you know that
    you can circumvent this issue entirely simply by making ChatGPT cite its sources?
    ChatGPT can search the Internet and provide relevant links when requested, allowing
    you to double-check the information yourself. Not only is this a handy feature
    that allows you to ensure your information comes from reliable sources, we consider
    this to be one of the best practices of using ChatGPT. Find out more about all
    of the best practices of using ChatGPT to get accurate results in Chapters [3](641691_1_En_3_Chapter.xhtml)
    and [4](641691_1_En_4_Chapter.xhtml).
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: 每个人都知道ChatGPT可能会提供错误的结果。但你是否知道，你只需让ChatGPT引用其来源，就可以完全规避这个问题？当被要求时，ChatGPT可以在互联网上搜索并提供相关链接，让你自己核实信息。这不仅是一个方便的功能，让你确保你的信息来自可靠来源，我们还认为这是使用ChatGPT的最佳实践之一。更多关于使用ChatGPT获取准确结果的最佳实践，请参阅第[3](641691_1_En_3_Chapter.xhtml)章和第[4](641691_1_En_4_Chapter.xhtml)章。
- en: All of this is just the beginning. ChatGPT is a powerful tool that can do some
    amazing things when used properly. Now having that stated, who are you, dear reader?
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: 所有这些只是开始。ChatGPT是一个强大的工具，当正确使用时，它可以做一些令人惊叹的事情。现在，既然已经说到了这一点，亲爱的读者，你是谁呢？
- en: Who Is This Book For?
  id: totrans-193
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 这本书是为谁准备的？
- en: This book is for ***anyone*** who wants to use ChatGPT for ***any*** reason—whether
    it’s boosting productivity at work, saving time and energy for content creation,
    or even saving yourself the brainpower on a daily basis by letting a chatbot plan
    and suggest things for you. This book is the only book you’ll ever need to coax
    ChatGPT into making your life much easier by creating, dissecting, sorting, and
    understanding information in ways that can accommodate any use case you can imagine.
    More than that, we’re going to explore some little-known features that have a
    great impact on your productivity.
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: 这本书是为任何想要出于任何原因使用ChatGPT的人准备的——无论是提高工作效率，节省内容创作的时间和精力，还是通过让聊天机器人为你规划和建议事情来节省你日常的脑力。这本书是你需要的唯一一本书，通过创建、剖析、分类和理解信息，它可以帮助你使生活变得更加轻松，适应任何你能想象的使用场景。不仅如此，我们还将探索一些影响你生产力的不为人知的功能。
- en: Note
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: You will need a subscription to ChatGPT Plus to follow most of the tutorials
    in this book. While the concepts of prompt engineering will apply across the board,
    many specific features that will be covered in this book will require a subscription
    to ChatGPT Plus to access. If you don’t know how to subscribe, an explanation
    on the process will be provided later in this chapter.
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
  zh: 你需要订阅ChatGPT Plus才能跟随本书中的大多数教程。虽然提示工程的概念将适用于所有领域，但本书将涵盖的许多特定功能将需要订阅ChatGPT Plus才能访问。如果你不知道如何订阅，本章后面将提供关于订阅过程的解释。
- en: To be perfectly clear, you don’t need to know anything about AI or chatbots
    to get started with this book. In this chapter, we’re even going to walk you through
    the process of signing up for a ChatGPT account. This book will guide you with
    step-by-step tutorials and teach you prompt engineering techniques (if you’ve
    never heard that term before, stay tuned—Chapter [2](641691_1_En_2_Chapter.xhtml)
    has you covered). You’ll learn how to use ChatGPT for various tasks and projects,
    discover abilities of ChatGPT you never knew existed, and even generate images.
    We’re also going to address the elephant in the room. ChatGPT will never take
    your job. Instead, knowing how to use it properly will make you more productive
    and creative so you can work on projects and ideas efficiently.
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: 要完全清楚，你不需要了解任何关于AI或聊天机器人的知识就可以开始这本书。在本章中，我们甚至将带你完成注册ChatGPT账户的过程。这本书将提供逐步教程，并教你提示工程技巧（如果你之前从未听说过这个术语，请保持关注——第[2](641691_1_En_2_Chapter.xhtml)章将为你解答）。你将学习如何使用ChatGPT完成各种任务和项目，发现你从未知晓的ChatGPT能力，甚至生成图像。我们还将解决一个悬而未决的问题。ChatGPT永远不会取代你的工作。相反，正确使用它的知识将使你更加高效和有创造力，这样你就可以高效地处理项目和想法。
- en: But before we dive into all that, let’s start with the basics.
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: 但在我们深入所有这些内容之前，让我们从基础知识开始。
- en: 'Let’s Talk About ChatGPT: What Is It?'
  id: totrans-199
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 让我们谈谈ChatGPT：它是什么？
- en: I’m pretty sure that everyone knows that AI stands for “artificial intelligence,”
    but how does it actually work? In the simplest of terms, when a software application
    needs to make a decision **without being instructed to do so**, it’s using some
    form of artificial intelligence, or an algorithm. Let’s talk about what’s going
    on behind the scenes when you hit “like” on a TikTok video. Essentially, besides
    indicating to the creator and others that you enjoyed what you saw, you’re also
    inadvertently telling TikTok to find another video just like it. Additionally,
    you’re also informing TikTok various other things, such as
  id: totrans-200
  prefs: []
  type: TYPE_NORMAL
  zh: 我很确定每个人都知道AI代表“人工智能”，但它实际上是如何工作的呢？用最简单的话说，当软件应用需要做出决定**而不需要被指示这样做**时，它正在使用某种形式的人工智能，或者算法。让我们谈谈当你点击TikTok视频上的“点赞”按钮时幕后发生了什么。本质上，除了向创作者和其他人表明你喜欢你所看到的内容外，你还无意中告诉TikTok找到另一段与之类似的视频。此外，你还向TikTok传达了各种其他信息，例如
- en: How long did you watch the video?
  id: totrans-201
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你看了多长时间的视频？
- en: Did you watch it multiple times?
  id: totrans-202
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你看了几次？
- en: What hashtags were used?
  id: totrans-203
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用了哪些话题标签？
- en: TikTok’s algorithm takes all this information, processes it, and then suggests
    videos it thinks you’ll enjoy. It also looks at what other people with similar
    interests liked. This is the “intelligence” part of “AI”—it’s software that uses
    lots of data to make suggestions or decisions.
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
  zh: TikTok的算法收集所有这些信息，进行处理，然后推荐你认为会喜欢的视频。它还会查看具有相似兴趣的其他人喜欢的内容。这是“人工智能”中的“智能”部分——它是使用大量数据来提供建议或做出决定的软件。
- en: The same principle applies for applications across the board. Spotify’s recommendations
    are based upon the songs you play, how often you play them, and what other listeners
    with similar tastes enjoy. Spell-check works similarly by considering common typos,
    sentence structure, and context to correct your writing.
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
  zh: 同样的原则适用于所有应用。Spotify的推荐基于你播放的歌曲、你播放的频率以及具有相似口味的其他听众喜欢的内容。拼写检查通过考虑常见的拼写错误、句子结构和上下文来纠正你的写作。
- en: So, AI isn’t a robot behind the scenes doing everything for you. It’s smart
    software that learns from data and makes educated guesses to help you out. By
    breaking it down this way, we can see that AI is all about using data to make
    smart decisions.
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，人工智能并不是幕后机器人为你做所有事情。它是通过学习数据并做出明智的猜测来帮助你的人工智能软件。通过这种方式将其分解，我们可以看到人工智能的全部都是关于使用数据来做出明智的决定。
- en: What ChatGPT Can Do (and What It Can’t Do)
  id: totrans-207
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: ChatGPT能做什么（以及它不能做什么）
- en: AI is everywhere, but it’s only recently that it’s become a hot topic outside
    the tech world. This is largely due to ChatGPT’s breakout success with GPT 3 in
    late 2022\. Since then, the technology has only continued to advance. Some are
    thrilled and excited about ChatGPT, while others, particularly in the workforce,
    find the software intimidating and worry that AI might replace their jobs. After
    all, we’re seeing AI create images that look like complex artwork, songs that
    sound like they’re sung by real singers, and articles and stories that seem to
    have been written in minutes by a piece of software—sometimes even quicker than
    that.
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能无处不在，但直到最近，它才成为科技世界之外的热门话题。这主要归功于ChatGPT在2022年底GPT 3的成功突破。从那时起，这项技术一直在不断发展。有些人对ChatGPT感到兴奋和激动，而其他人，尤其是在职场中，觉得这款软件令人畏惧，担心人工智能可能会取代他们的工作。毕竟，我们看到了人工智能创造出的看起来像复杂艺术品的图像、听起来像真实歌手演唱的歌曲，以及似乎由软件在几分钟内写成的文章和故事——有时甚至更快。
- en: However, it’s not as simple as asking ChatGPT to create a masterpiece like Da
    Vinci or the next great American novel with the press of a button. Creating something
    amazing with ChatGPT requires thoughtful input that leverages its massive collection
    of data to produce the desired result.
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，这并不像按一下按钮让ChatGPT创作出达芬奇或下一部伟大的美国小说那样简单。用ChatGPT创作出令人惊叹的作品需要深思熟虑的输入，利用它庞大的数据集来产生期望的结果。
- en: In other words, ChatGPT is only as creative as the person using it. How does
    all of this work? Well, it all starts with a prompt.
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: 换句话说，ChatGPT的创造力取决于使用它的人。这一切是如何工作的呢？嗯，一切始于一个提示词。
- en: So, What’s a Prompt?
  id: totrans-211
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 那么，什么是提示词？
- en: Simply put, a prompt is the input text you give to ChatGPT. That’s it. You don’t
    have to be a tech whiz in order to use ChatGPT competently. It’s actually very
    easy to get ChatGPT to do something as simple as creating a vegan meal plan for
    the week ahead or as complex as planning a mailing list campaign for a marketing
    team. The key to getting useful results is knowing how to give ChatGPT the right
    input in order to receive an output that fits your needs.
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
  zh: 简而言之，提示（prompt）是你提供给 ChatGPT 的输入文本。仅此而已。你不需要成为技术高手就能熟练使用 ChatGPT。实际上，让 ChatGPT
    做一些简单的事情，比如为下周制定一个素食餐单，或者为营销团队策划一个邮寄列表活动，都是非常简单的。获得有用结果的关键在于知道如何给 ChatGPT 提供正确的输入，以便得到符合你需求的输出。
- en: Now that we know what ChatGPT is, how to use it, and what a prompt is, let’s
    create an account with OpenAI, the company that owns ChatGPT.
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
  zh: 既然我们已经了解了 ChatGPT 是什么，如何使用它，以及什么是提示，那么让我们创建一个 OpenAI 的账户，OpenAI 是拥有 ChatGPT
    的公司。
- en: We would—except... we want to cover one more thing first.
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
  zh: 我们本可以这么做——但是……我们首先还想讨论一个额外的问题。
- en: What Does Nondeterminism Mean, and What Does It Have to Do with ChatGPT?
  id: totrans-215
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 非确定性是什么意思，它与 ChatGPT 有什么关系？
- en: When you use ChatGPT, you’ll notice that if you ask the same question multiple
    times, you get slightly different answers each time. This is actually by design.
    ChatGPT can generate a variety of responses, and this ability to respond differently
    to the same prompt multiple times is called nondeterminism.
  id: totrans-216
  prefs: []
  type: TYPE_NORMAL
  zh: 当你使用 ChatGPT 时，你会注意到，如果你多次提出相同的问题，每次都会得到略微不同的答案。这实际上是设计上的考虑。ChatGPT 可以生成各种不同的回答，这种对同一提示多次做出不同反应的能力被称为非确定性。
- en: Why Is Nondeterminism Important?
  id: totrans-217
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 非确定性为什么重要？
- en: Imagine talking to a friend who gives you the exact same response every time
    you ask a question. It would feel very unnatural and robotic, right? Nondeterminism
    helps ChatGPT seem more like a real person, making conversations more natural
    and engaging.
  id: totrans-218
  prefs: []
  type: TYPE_NORMAL
  zh: 想象一下和一个每次回答你问题时都给出完全相同回答的朋友交谈。这会感觉非常不自然和机械，对吧？非确定性帮助 ChatGPT 看起来更像一个真人，使对话更加自然和吸引人。
- en: Besides sounding more human, nondeterminism makes ChatGPT more useful. Sometimes
    there are several good ways to answer a question or respond to a prompt. When
    you’re using ChatGPT for productivity, nondeterminism helps you explore different
    possibilities and gives you more options if you don’t get the answer you’re looking
    for the first time.
  id: totrans-219
  prefs: []
  type: TYPE_NORMAL
  zh: 除了听起来更像人类之外，非确定性还使 ChatGPT 更加有用。有时有几种好的方式来回答一个问题或响应一个提示。当你使用 ChatGPT 提高生产力时，非确定性帮助你探索不同的可能性，如果你第一次没有得到你想要的答案，它为你提供了更多的选择。
- en: 'Listing [1-1](#PC1) shows an example of what this looks like.User: ″What''s
    a good way to spend a weekend?"ChatGPT: ″You could go hiking in a nearby park.″User:
    ″What''s a good way to spend a weekend?"ChatGPT: "How about visiting a museum
    or going to a movie?″User: ″What''s a good way to spend a weekend?"ChatGPT: "You
    might enjoy having a relaxing day at home with a good book.″Listing 1-1'
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
  zh: 列表 [1-1](#PC1) 展示了这样的一个例子。用户：”有什么好方法度过周末？”ChatGPT：”你可以在附近的公园徒步旅行。”用户：”有什么好方法度过周末？”ChatGPT：”去博物馆或者看电影怎么样？”用户：”有什么好方法度过周末？”ChatGPT：”你可能会喜欢在家享受一个与好书相伴的悠闲日子。”列表
    1-1
- en: Even if you barrage ChatGPT with the same question, you’ll get a different response
    every time
  id: totrans-221
  prefs: []
  type: TYPE_NORMAL
  zh: 即使你连续不断地向 ChatGPT 提出相同的问题，你也会每次得到不同的回答。
- en: All these answers are good, but they’re different. This variety makes ChatGPT
    more helpful and fun to use because it offers diverse suggestions rather than
    repeating the same thing over and over.
  id: totrans-222
  prefs: []
  type: TYPE_NORMAL
  zh: 所有这些回答都很好，但它们是不同的。这种多样性使得 ChatGPT 更加有用和有趣，因为它提供了多样化的建议，而不是反复重复同样的事情。
- en: Alright, now for real this time. Let’s create an account with OpenAI and start
    using ChatGPT for ourselves.
  id: totrans-223
  prefs: []
  type: TYPE_NORMAL
  zh: 好的，现在我们真的开始了。让我们在 OpenAI 上创建一个账户，并开始自己使用 ChatGPT。
- en: 'Let’s Get Started: How to Create an Account with ChatGPT'
  id: totrans-224
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 让我们开始吧：如何创建 ChatGPT 账户
- en: Now that we’ve covered the basics of what ChatGPT is and how to use it, let’s
    get you set up with your own account. Creating an account with OpenAI is simple
    and straightforward. Follow these steps, and you’ll be ready to start using ChatGPT.
  id: totrans-225
  prefs: []
  type: TYPE_NORMAL
  zh: 既然我们已经了解了 ChatGPT 的基本概念和使用方法，那么让我们帮你设置自己的账户。在 OpenAI 上创建账户是简单直接的。按照以下步骤操作，你就可以开始使用
    ChatGPT 了。
- en: In order to create an account, simply go to [https://chatgpt.com/](https://chatgpt.com/)
    and sign up, as shown in Figure [1-1](#Fig1).![Screenshot of a webpage with a
    dark blue and black background. On the left, text reads, "Suggest fun activities
    for a family of 4 to do indoors on a rainy day." On the right, there are buttons
    labeled "Log in" and "Sign up" under the heading "Get started." The OpenAI logo
    is at the bottom with links to "Terms of use" and "Privacy policy."](../images/641691_1_En_1_Chapter/641691_1_En_1_Fig1_HTML.jpg)
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
  zh: 为了创建账户，只需访问[https://chatgpt.com/](https://chatgpt.com/)并注册，如图[1-1](#Fig1)所示。![带有深蓝色和黑色背景的网页截图。左侧的文字为“在雨天室内为4口之家建议有趣的活动。”右侧有“开始”标题下的“登录”和“注册”按钮。底部有OpenAI标志，以及“使用条款”和“隐私政策”的链接。](../images/641691_1_En_1_Chapter/641691_1_En_1_Fig1_HTML.jpg)
