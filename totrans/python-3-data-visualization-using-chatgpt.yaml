    by the NumPy array asquare and the numeric values asqsum, anorm1, anorm2, and
    anorm3. The NumPy array asquare contains the square of the elements in the NumPy
    array a, and the numeric value asqsum contains the sum of the elements in the
    NumPy array asquare.'
  id: totrans-891
  prefs: []
  type: TYPE_NORMAL
  zh: '[列表 2.15](#list2-15) 包含一个初始的 NumPy 数组 a，后面跟着 NumPy 数组 asquare 和数值 asqsum、anorm1、anorm2
    和 anorm3。NumPy 数组 asquare 包含 NumPy 数组 a 中元素的平方，而数值 asqsum 包含 NumPy 数组 asquare
    中元素的总和。'
- en: Next, the numeric value anorm1 equals the square root of the sum of the square
    of the elements in a. The numeric value anorm2 is the same as anorm1, computed
    in a slightly different fashion. Finally, the numeric value anorm3 is equal to
    anorm2, but as you can see, anorm3 is calculated via a single NumPy method, whereas
    anorm2 requires a succession of NumPy methods.
  id: totrans-892
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，数值 anorm1 等于 a 中元素平方和的平方根。数值 anorm2 与 anorm1 相同，但计算方式略有不同。最后，数值 anorm3 等于
    anorm2，但如您所见，anorm3 通过单个 NumPy 方法计算，而 anorm2 需要一系列 NumPy 方法。
- en: 'The last portion of [Listing 2.15](#list2-15) consists of six print() statements,
    each of which displays the computed values. The output from launching [Listing
    2.15](#list2-15) is here:'
  id: totrans-893
  prefs: []
  type: TYPE_NORMAL
  zh: '[列表 2.15](#list2-15) 的最后部分由六个 print() 语句组成，每个语句都显示了计算出的值。启动 [列表 2.15](#list2-15)
    的输出如下：'
- en: '[PRE141]'
  id: totrans-894
  prefs: []
  type: TYPE_PRE
  zh: '[PRE141]'
- en: '**NUMPY AND OTHER OPERATIONS**'
  id: totrans-895
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**NUMPY 和其他操作**'
- en: NumPy provides the “*” operator to multiply the components of two vectors to
    produce a third vector whose components are the products of the corresponding
    components of the initial pair of vectors. This operation is called a *Hadamard
    product*, which is the name of a famous mathematician. If you then add the components
    of the third vector, the sum is equal to the inner product of the initial pair
    of vectors.
  id: totrans-896
  prefs: []
  type: TYPE_NORMAL
  zh: NumPy 提供了“*”运算符，用于将两个向量的分量相乘，产生一个第三向量，其分量是初始一对向量对应分量的乘积。这种操作称为 *Hadamard 积*，这是著名数学家的名字。如果您然后将第三向量的分量相加，总和等于初始一对向量的内积。
- en: '[Listing 2.16](#list2-16) displays the content of otherops.py that illustrates
    how to perform other operations on a NumPy array.'
  id: totrans-897
  prefs: []
  type: TYPE_NORMAL
  zh: '[列表 2.16](#list2-16) 展示了 otherops.py 的内容，该内容说明了如何在 NumPy 数组上执行其他操作。'
- en: '***LISTING 2.16: otherops.py***'
  id: totrans-898
  prefs: []
  type: TYPE_NORMAL
  zh: '***列表 2.16: otherops.py***'
