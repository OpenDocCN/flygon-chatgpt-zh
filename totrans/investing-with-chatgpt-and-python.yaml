  prefs: []
  type: TYPE_NORMAL
  zh: 概述：Kraken 是一个知名的加密货币交易所，以其安全性和广泛的加密货币选择而闻名。
- en: 'API: Kraken''s API allows you to access market data, place orders and retrieve
