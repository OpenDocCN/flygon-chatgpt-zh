  prefs: []
  type: TYPE_NORMAL
  zh: 高影响力提示模板
- en: 1\. The “5-Step Guide” Prompt
  id: totrans-723
  prefs: []
  type: TYPE_NORMAL
  zh: 1. “5步指南”提示
- en: “Create a how-to article with an intro, 5 numbered steps, a brief conclusion,
    and one motivational quote in bold.”
  id: totrans-724
  prefs: []
  type: TYPE_NORMAL
  zh: “创建一个包含引言、5个编号步骤、简短结论和一个加粗的励志引语的如何文章。”
- en: 2\. The “Comparison Table” Prompt
  id: totrans-725
  prefs: []
  type: TYPE_NORMAL
  zh: 2. “比较表”提示
- en: “Compare GPT-3.5 and GPT-4 across 4 criteria (speed, accuracy, cost, tone) in
    a table format.”
  id: totrans-726
  prefs: []
  type: TYPE_NORMAL
  zh: “在表格格式中比较GPT-3.5和GPT-4在4个标准（速度、准确性、成本、语气）上的差异。”
- en: 3\. The “Listicle” Prompt
  id: totrans-727
  prefs: []
  type: TYPE_NORMAL
  zh: 3. “列表”提示
- en: “List 7 surprising benefits of using AI for solopreneurs, with each benefit
    as a bold subheading followed by a short paragraph.”
  id: totrans-728
  prefs: []
  type: TYPE_NORMAL
  zh: “列出使用AI为自由职业者带来的7个令人惊讶的好处，每个好处作为一个加粗的副标题，后面跟着一个简短的段落。”
- en: Formatting + Tone = Maximum Impact
  id: totrans-729
  prefs: []
  type: TYPE_NORMAL
  zh: 格式化+语气=最大影响力
- en: 'The way something is structured should support the way it sounds. For example:'
  id: totrans-730
  prefs: []
  type: TYPE_NORMAL
  zh: 内容的结构应该支持其声音。例如：
- en: Use clean, formal formats for professional reports
  id: totrans-731
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用干净、正式的格式撰写专业报告
- en: Use conversational spacing for casual blogs or emails
  id: totrans-732
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在休闲博客或电子邮件中使用对话式间距
- en: Use emotive formatting (bold reactions, short paragraphs) for storytelling
  id: totrans-733
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用情感化的格式（加粗反应，简短段落）进行故事叙述
- en: Formatting enhances not just the look but the feel of your message.
  id: totrans-734
  prefs: []
  type: TYPE_NORMAL
  zh: 格式化不仅增强了信息的视觉效果，也增强了其感觉。
- en: Pro Tips for Format-Focused Prompting
  id: totrans-735
  prefs: []
  type: TYPE_NORMAL
  zh: 格式化提示的专业技巧
- en: Be explicit about the output format
  id: totrans-736
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 明确输出格式
- en: Give examples of how you want it styled
  id: totrans-737
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提供你希望其呈现的例子
- en: Test different versions to see what engages your audience
  id: totrans-738
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 测试不同的版本，看看什么能吸引你的受众
- en: Use Markdown or HTML for copy-pasting into web tools
  id: totrans-739
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用Markdown或HTML进行复制粘贴到网络工具
- en: 'Ask the AI to format previous text if needed:'
  id: totrans-740
  prefs: []
  type: TYPE_NORMAL
  zh: 如果需要，请让AI格式化之前的文本：
- en: “Now reformat the above into a clean FAQ layout.”
  id: totrans-741
  prefs: []
  type: TYPE_NORMAL
  zh: “现在将上述内容重新格式化为一个干净的FAQ布局。”
- en: 'Conclusion: Form Shapes Function'
  id: totrans-742
  prefs: []
  type: TYPE_NORMAL
  zh: 结论：形式塑造功能
- en: AI gives you the clay—but formatting is how you mold it into something sharp,
    readable, and magnetic. The difference between good content and great content
    often lies in how it’s presented.
  id: totrans-743
  prefs: []
  type: TYPE_NORMAL
  zh: AI给你提供粘土——但格式化是你将其塑造成锐利、易读和吸引人的东西的方式。优质内容与优秀内容之间的区别往往在于其呈现方式。
- en: Don’t just ask for information. Ask for information with impact.
  id: totrans-744
  prefs: []
  type: TYPE_NORMAL
  zh: 不要只是询问信息。要询问有影响力的信息。
- en: 'Chapter 13: Persona-Driven Prompts'
  id: totrans-745
  prefs: []
  type: TYPE_NORMAL
  zh: 第13章：基于角色的提示
- en: One of the most powerful ways to shape AI output is by assigning it a persona—a
    specific identity, background, or perspective from which it responds. Instead
    of giving the AI generic instructions, you give it a role to play.
  id: totrans-746
  prefs: []
  type: TYPE_NORMAL
  zh: 形塑AI输出的最有力的方式之一是分配给它一个角色——一个特定的身份、背景或视角，从该视角进行回应。你不再只是给AI提供通用指令，而是给它一个角色来扮演。
- en: This simple shift turns average outputs into tailored, voice-rich, and context-aware
    conversations.
  id: totrans-747
  prefs: []
  type: TYPE_NORMAL
  zh: 这种简单的转变将平均输出转变为定制化、声音丰富和情境感知的对话。
- en: What Is a Persona-Driven Prompt?
  id: totrans-748
  prefs: []
  type: TYPE_NORMAL
  zh: 什么是基于角色的提示？
- en: 'A persona-driven prompt asks the AI to respond as if it were someone else.
    This could be:'
  id: totrans-749
  prefs: []
  type: TYPE_NORMAL
  zh: 基于角色的提示要求AI以他人的身份回应。这可能是：
- en: A professional (e.g., “You are a career coach…”)
  id: totrans-750
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个专业角色（例如，“你是一位职业导师……”）
- en: A fictional character (e.g., “Speak like Sherlock Holmes…”)
  id: totrans-751
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个虚构角色（例如，“像福尔摩斯那样说话……”）
- en: A demographic (e.g., “Answer like a Gen Z student…”)
  id: totrans-752
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个人口统计特征（例如，“像一位Z世代学生那样回答……”）
- en: A tone or mindset (e.g., “Speak like a supportive mentor…”)
  id: totrans-753
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个语气或心态（例如，“像一位支持性的导师那样说话……”）
- en: By giving the AI an identity, you unlock a layer of nuance, tone, and insight
    that standard prompts can’t match.
  id: totrans-754
  prefs: []
  type: TYPE_NORMAL
  zh: 通过为AI赋予一个身份，你可以解锁标准提示无法匹配的细微差别、语气和洞察力。
- en: Why Personas Work So Well
  id: totrans-755
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么角色如此有效
- en: 'Personas tap into:'
  id: totrans-756
  prefs: []
  type: TYPE_NORMAL
  zh: 角色触及：
- en: 'Tone Control: A teacher will sound different than a marketer.'
  id: totrans-757
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 语气控制：教师的声音与营销人员的声音不同。
- en: 'Point of View: A child, historian, or therapist will interpret the same prompt
    differently.'
  id: totrans-758
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 观点：一个孩子、历史学家或治疗师会对同一个提示有不同的解读。
- en: 'Audience Alignment: You can match your AI’s voice to the expectations of your
    audience.'
  id: totrans-759
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 受众对齐：你可以让你的AI的声音与受众的期望相匹配。
- en: 'Creative Direction: Personas open the door to imaginative, stylized, or genre-specific
    responses.'
  id: totrans-760
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 创意方向：角色可以开启富有想象力、风格化或特定类型的回应之门。
- en: Examples of Persona-Driven Prompts
  id: totrans-761
  prefs: []
  type: TYPE_NORMAL
  zh: 基于角色的提示示例
- en: 1\. Professional Roles
  id: totrans-762
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 专业角色
- en: “You are a productivity consultant. Write a one-page action plan to overcome
    procrastination.”
  id: totrans-763
  prefs: []
  type: TYPE_NORMAL
  zh: “你是一位生产力顾问。写一份一页的行动计划来克服拖延症。”
- en: 2\. Character Styles
  id: totrans-764
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 角色风格
- en: “Pretend you’re a pirate giving career advice. Make it funny but surprisingly
    insightful.”
  id: totrans-765
  prefs: []
  type: TYPE_NORMAL
  zh: “假装你是一位海盗，提供职业建议。让它既有趣又出人意料地有洞察力。”
- en: 3\. Expert Mindsets
  id: totrans-766
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 专家心态
- en: “Answer like a Harvard-trained economist explaining inflation to a high school
    student.”
  id: totrans-767
  prefs: []
  type: TYPE_NORMAL
  zh: “像一位哈佛大学培养的经济学家向高中生解释通货膨胀一样回答。”
- en: 4\. Emotional Tones
  id: totrans-768
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 情感基调
- en: “Act as a caring friend offering encouragement to someone who just failed an
    exam.”
  id: totrans-769
  prefs: []
  type: TYPE_NORMAL
  zh: “扮演一位关心朋友的角色，鼓励那些刚刚考试失败的人。”
- en: 5\. Fictional Scenarios
  id: totrans-770
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 虚构情境
- en: “You’re an AI lawyer in the year 2070\. Explain how digital identity is protected
    by law.”
  id: totrans-771
  prefs: []
  type: TYPE_NORMAL
  zh: “你是一位2070年的AI律师。解释数字身份是如何受到法律保护的。”
- en: How to Create a Strong Persona Prompt
  id: totrans-772
  prefs: []
  type: TYPE_NORMAL
  zh: 如何创建强大的角色提示
- en: 'Follow this simple structure:'
  id: totrans-773
  prefs: []
  type: TYPE_NORMAL
  zh: 按照这个简单的结构进行：
- en: 1\. Assign a Role
  id: totrans-774
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 分配角色
- en: “You are a veteran copywriter…”
  id: totrans-775
  prefs: []
  type: TYPE_NORMAL
  zh: “你是一位经验丰富的文案撰写者……”
- en: 2\. Define the Voice or Tone
  id: totrans-776
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 定义语气或风格
- en: “…with a sharp, witty, and persuasive writing style…”
  id: totrans-777
  prefs: []
  type: TYPE_NORMAL
  zh: “……以敏锐、机智和有说服力的写作风格……”
- en: 3\. Specify the Task or Context
  id: totrans-778
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 指定任务或情境
- en: “…writing a 3-line product description for a new smart water bottle.”
  id: totrans-779
  prefs: []
  type: TYPE_NORMAL
  zh: “……为一种新的智能水瓶写一个3行的产品描述。”
- en: 4\. Add Constraints or Style Notes (Optional)
  id: totrans-780
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 添加约束或风格说明（可选）
- en: “Use short, punchy sentences. No technical jargon.”
  id: totrans-781
  prefs: []
  type: TYPE_NORMAL
  zh: “使用简短、有力的句子。不要使用技术术语。”
- en: Persona Prompt Template
  id: totrans-782
  prefs: []
  type: TYPE_NORMAL
  zh: 角色提示模板
- en: “You are [role] with [style/experience].
  id: totrans-783
  prefs: []
  type: TYPE_NORMAL
  zh: “你是[角色]拥有[风格/经验]。”
- en: Your task is to [objective].
  id: totrans-784
  prefs: []
  type: TYPE_NORMAL
  zh: 你的任务是[目标]。
- en: Speak in a [tone] and [structure/style].”
  id: totrans-785
  prefs: []
  type: TYPE_NORMAL
  zh: 用[语调]和[结构/风格]说话。”
- en: 'Example:'
  id: totrans-786
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：
- en: “You are a minimalist productivity coach with 10+ years of experience.
  id: totrans-787
  prefs: []
  type: TYPE_NORMAL
  zh: “你是一位拥有10年以上经验的简约生产力教练。”
- en: Your task is to write a tweet that inspires action without sounding preachy.
  id: totrans-788
  prefs: []
  type: TYPE_NORMAL
  zh: 你的任务是写一条能激发行动但又不显得说教的推文。
- en: Speak in a calm, clear, and motivating tone using no more than 20 words.”
  id: totrans-789
  prefs: []
  type: TYPE_NORMAL
  zh: 用冷静、清晰、鼓舞人心的语调，不超过20个字。”
- en: Using Multiple Personas for Better Ideas
  id: totrans-790
  prefs: []
  type: TYPE_NORMAL
  zh: 使用多个角色以获得更好的想法
- en: 'AI can switch personas in real time. You can use this to:'
  id: totrans-791
  prefs: []
  type: TYPE_NORMAL
  zh: AI可以实时切换角色。你可以用这个来：
- en: 'Compare opinions:'
  id: totrans-792
  prefs: []
  type: TYPE_NORMAL
  zh: 比较意见：
- en: “What would a scientist say? Now what would a spiritual teacher say?”
  id: totrans-793
  prefs: []
  type: TYPE_NORMAL
  zh: “科学家会说什么？现在精神导师会说什么？”
- en: 'Refine tone:'
  id: totrans-794
  prefs: []
  type: TYPE_NORMAL
  zh: 精炼语调：
- en: “Make this same paragraph sound like it came from a stand-up comedian.”
  id: totrans-795
  prefs: []
  type: TYPE_NORMAL
  zh: “让这个段落听起来像是从一个单口喜剧演员那里来的。”
- en: 'Spark creativity:'
  id: totrans-796
  prefs: []
  type: TYPE_NORMAL
  zh: 激发创造力：
- en: “Imagine five personas giving their take on the future of AI in education.”
  id: totrans-797
  prefs: []
  type: TYPE_NORMAL
  zh: “想象五个角色对AI在教育中未来的看法。”
- en: Common Use Cases
  id: totrans-798
  prefs: []
  type: TYPE_NORMAL
  zh: 常见用例
- en: 'Marketing & Branding: Match the tone of your brand to a persona (e.g., “Playful
    Gen Z influencer”)'
  id: totrans-799
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 市场营销与品牌：将品牌语调与角色匹配（例如，“爱玩儿的Z世代影响者”）
- en: 'Writing & Editing: Get feedback from a “grumpy editor,” “curious reader,” or
    “strict professor”'
  id: totrans-800
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 写作与编辑：从“脾气暴躁的编辑”、“好奇的读者”或“严格的教授”那里获得反馈
- en: 'Teaching & Coaching: Have AI play a patient instructor or a fast-paced expert'
  id: totrans-801
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 教学与辅导：让AI扮演耐心导师或快速专家
- en: 'Entertainment: Let AI act as characters for screenwriting, games, or fiction'
  id: totrans-802
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 娱乐：让AI扮演编剧、游戏或小说中的角色
- en: 'Business Strategy: Get opinions from the view of a CEO, investor, or customer'
  id: totrans-803
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 商业策略：从CEO、投资者或客户的角度获取意见
- en: Quick Persona Ideas to Try
  id: totrans-804
  prefs: []
  type: TYPE_NORMAL
  zh: 快速角色想法尝试
- en: Old-school detective
  id: totrans-805
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 旧式侦探
- en: Silicon Valley startup founder
  id: totrans-806
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 硅谷初创公司创始人
- en: Stoic philosopher
  id: totrans-807
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 斯多葛哲学家
- en: Motivational sports coach
  id: totrans-808
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 激励型体育教练
- en: AI ethics professor
  id: totrans-809
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 人工智能伦理教授
- en: Futuristic astronaut journalist
  id: totrans-810
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 未来派宇航员记者
- en: Disappointed parent
  id: totrans-811
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 失望的父母
- en: Quirky YouTube content creator
  id: totrans-812
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 古怪的视频内容创作者
- en: 'Conclusion: Turning AI into Someone Useful'
  id: totrans-813
  prefs: []
  type: TYPE_NORMAL
  zh: 结论：将AI变成有用之人
- en: When you give your AI a persona, you’re not just improving the prompt—you’re
    directing a performance. It becomes less like a machine, and more like a character
    who understands your needs, your tone, and your audience.
  id: totrans-814
  prefs: []
  type: TYPE_NORMAL
  zh: 当你给你的AI一个角色时，你不仅改进了提示，而且指导了一场表演。它不再像一台机器，更像是一个理解你的需求、语调和受众的角色。
- en: The magic lies not just in what you say, but who the AI becomes when it answers.
  id: totrans-815
  prefs: []
  type: TYPE_NORMAL
  zh: 魔法不仅在于你说了什么，而在于AI回答时变成了谁。
- en: 'Chapter 14: Scenario Simulation'
  id: totrans-816
  prefs: []
  type: TYPE_NORMAL
  zh: 第14章：情景模拟
- en: Imagine practicing a sales pitch before the real meeting, testing how a customer
    might react to your product, or rehearsing a difficult conversation. With AI,
    you're not limited to theory—you can simulate real-world scenarios.
  id: totrans-817
  prefs: []
  type: TYPE_NORMAL
  zh: 想象在真正会议之前练习销售演讲，测试客户可能对你产品的反应，或者排练一次困难的对话。有了AI，你不仅限于理论——你可以模拟现实世界的情况。
- en: Scenario simulation is a powerful technique that allows you to model conversations,
    events, and decision-making environments to explore outcomes, prepare responses,
    and enhance creativity or critical thinking.
  id: totrans-818
  prefs: []
  type: TYPE_NORMAL
  zh: 情景模拟是一种强大的技术，它允许你模拟对话、事件和决策环境，以探索结果、准备回应并增强创造力或批判性思维。
- en: What Is Scenario Simulation?
  id: totrans-819
  prefs: []
  type: TYPE_NORMAL
  zh: 什么是情景模拟？
- en: Scenario simulation involves instructing the AI to act out a specific situation
    or environment, allowing you to interact with it as if the moment were real.
  id: totrans-820
  prefs: []
  type: TYPE_NORMAL
  zh: 情景模拟涉及指导AI模拟特定情况或环境，让你能够像真实时刻一样与之互动。
- en: 'Instead of a simple Q&A, you''re initiating a dynamic, interactive dialogue.
    It’s like roleplay with a goal: to test strategies, improve skills, or explore
    possibilities.'
  id: totrans-821
  prefs: []
  type: TYPE_NORMAL
  zh: 这不仅仅是一个简单的问答，你正在启动一个动态的、互动的对话。这就像角色扮演，目的是测试策略、提高技能或探索可能性。
- en: Why Use Scenario Simulations?
  id: totrans-822
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么使用情景模拟？
- en: 'Scenario-based prompts help you:'
  id: totrans-823
  prefs: []
  type: TYPE_NORMAL
  zh: 基于情景的提示帮助你：
- en: Practice responses in interviews, debates, negotiations, or public speaking
  id: totrans-824
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在面试、辩论、谈判或公开演讲中练习回应
- en: Prepare for challenges like objections in sales or tough client feedback
  id: totrans-825
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 准备应对销售中的反对意见或客户反馈的挑战
- en: Explore “what ifs” in decision-making, crisis management, or storytelling
  id: totrans-826
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在决策、危机管理或讲故事中探索“如果...会怎样”
- en: Develop empathy by walking through situations from different perspectives
  id: totrans-827
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过从不同角度经历情况来培养同理心
- en: Sharpen communication by testing clarity and persuasion under pressure
  id: totrans-828
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过在压力下测试清晰度和说服力来磨练沟通技巧
- en: Types of Scenarios You Can Simulate
  id: totrans-829
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以模拟的情景类型
- en: 1\. Professional Practice
  id: totrans-830
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 专业实践
- en: “Simulate a job interview for a marketing manager role at a tech startup.”
  id: totrans-831
  prefs: []
  type: TYPE_NORMAL
  zh: “模拟一家科技初创公司市场经理职位的求职面试。”
- en: 2\. Conflict Resolution
  id: totrans-832
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 冲突解决
- en: “Act as an upset customer complaining about a delayed order. I’ll try to resolve
    the issue.”
  id: totrans-833
  prefs: []
  type: TYPE_NORMAL
  zh: “扮演一位不满的客户，抱怨订单延迟。我会尝试解决这个问题。”
- en: 3\. Public Speaking Rehearsal
  id: totrans-834
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 公共演讲排练
- en: “Pretend you’re a live audience at a startup pitch. Interrupt with questions
    after each slide.”
  id: totrans-835
  prefs: []
  type: TYPE_NORMAL
  zh: “假装你是初创公司路演现场的一名现场观众。在每张幻灯片之后提出问题。”
- en: 4\. Crisis Simulation
  id: totrans-836
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 危机模拟
- en: “Simulate a cyberattack scenario. I am the IT director handling the response.”
  id: totrans-837
  prefs: []
  type: TYPE_NORMAL
  zh: “模拟网络攻击场景。我是负责应对的IT总监。”
- en: 5\. Sales Conversation
  id: totrans-838
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 销售对话
- en: “Play the role of a skeptical potential client. Let’s walk through a sales call
    for B2B software.”
  id: totrans-839
  prefs: []
  type: TYPE_NORMAL
  zh: “扮演一位怀疑的潜在客户。让我们一起走过一次B2B软件的销售电话。”
- en: 6\. Creative Writing Prompt
  id: totrans-840
  prefs: []
  type: TYPE_NORMAL
  zh: 6. 创意写作提示
- en: “Simulate the final battle scene in a fantasy novel between the queen and the
    dark mage.”
  id: totrans-841
  prefs: []
  type: TYPE_NORMAL
  zh: “模拟一部奇幻小说中女王与黑暗法师之间的最终战斗场景。”
- en: How to Structure a Scenario Simulation Prompt
  id: totrans-842
  prefs: []
  type: TYPE_NORMAL
  zh: 如何构建场景模拟提示
- en: 'A strong simulation prompt includes:'
  id: totrans-843
  prefs: []
  type: TYPE_NORMAL
  zh: 一个强大的模拟提示包括：
- en: 'Context: The setting or situation'
  id: totrans-844
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 背景：环境或情况
- en: 'Roles: Who is involved (you and the AI)'
  id: totrans-845
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 角色：涉及的人员（你和AI）
- en: 'Objective: What you''re trying to do'
  id: totrans-846
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 目标：你试图做什么
- en: 'Constraints: Rules, time limits, or special challenges'
  id: totrans-847
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 约束：规则、时间限制或特殊挑战
- en: 'Template:'
  id: totrans-848
  prefs: []
  type: TYPE_NORMAL
  zh: 模板：
- en: “Simulate a [situation] between [role A] and [role B]. The goal is to [objective].
    Keep it realistic and respond naturally.”
  id: totrans-849
  prefs: []
  type: TYPE_NORMAL
  zh: “模拟[角色A]和[角色B]之间的[情况]。目标是[目标]。保持真实并自然回应。”
- en: 'Example:'
  id: totrans-850
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：
- en: “Simulate a mentorship session between a senior software engineer and a junior
    developer. The goal is to walk through debugging a complex error.”
  id: totrans-851
  prefs: []
  type: TYPE_NORMAL
  zh: “模拟一位资深软件工程师与一位初级开发者的导师会话。目标是逐步调试一个复杂的错误。”
- en: Tips for Better Simulations
  id: totrans-852
  prefs: []
  type: TYPE_NORMAL
  zh: 更好模拟的技巧
- en: 'Ask for Realism: Tell the AI to act like a real person—give it a backstory,
    tone, or personality.'
  id: totrans-853
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 要求真实性：告诉AI像真实的人一样行动——给它一个背景故事、语气或个性。
- en: 'Use Iterative Feedback: After each response, say things like “That’s not realistic—try
    again” or “Make it more aggressive.”'
  id: totrans-854
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用迭代反馈：在每次回应后，说些像“这不现实——再试一次”或“让它更具有侵略性”的话。
- en: 'Escalate Gradually: Ask the AI to simulate increasingly challenging scenarios,
    such as moving from a friendly customer to a frustrated one.'
  id: totrans-855
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 逐步升级：要求AI模拟越来越具有挑战性的场景，例如从友好的客户转变为沮丧的客户。
- en: 'Stay in Character: Treat the simulation seriously to get better results.'
  id: totrans-856
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 保持角色：认真对待模拟以获得更好的结果。
- en: 'Switch Roles: Ask the AI to switch roles so you can see both sides of the scenario.'
  id: totrans-857
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 切换角色：要求AI切换角色，以便你可以看到场景的双方。
- en: Use Case Ideas for Scenario Simulation
  id: totrans-858
  prefs: []
  type: TYPE_NORMAL
  zh: 场景模拟用例想法
- en: 'Leadership training: Handle a tough meeting with a rebellious team member'
  id: totrans-859
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 领导力培训：处理与叛逆团队成员的艰难会议
- en: 'Customer service practice: Resolve a shipping delay or pricing complaint'
  id: totrans-860
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 客户服务练习：解决运输延迟或定价投诉
- en: 'Startup pitch rehearsal: Respond to investor objections'
  id: totrans-861
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 初创公司路演排练：回应投资者的反对意见
- en: 'Language learning: Practice speaking with a native French waiter'
  id: totrans-862
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 语言学习：与一位母语为法国的餐厅服务员练习说话
- en: 'Parenting scenarios: Talk to a child about online safety'
  id: totrans-863
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 父母场景：与孩子谈论网络安全
- en: 'Therapy simulation: Roleplay both therapist and client for self-awareness'
  id: totrans-864
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 治疗模拟：扮演治疗师和客户以增强自我意识
- en: 'Legal prep: Simulate a courtroom cross-examination'
  id: totrans-865
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 法律准备：模拟法庭交叉审问
- en: Using Simulations to Boost Creativity
  id: totrans-866
  prefs: []
  type: TYPE_NORMAL
  zh: 使用模拟来提升创造力
- en: Beyond training, simulations can be used to explore creative story arcs, invent
    plot twists, or build dialogue between characters. Treat the AI as a scene partner
    in your writing process.
  id: totrans-867
  prefs: []
  type: TYPE_NORMAL
  zh: 除了训练之外，模拟还可以用来探索创意故事弧、发明情节转折或构建角色之间的对话。将AI视为你写作过程中的场景伙伴。
- en: 'Example:'
  id: totrans-868
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：
- en: “Simulate a conversation between a time-traveling philosopher and a modern-day
    AI engineer debating the meaning of consciousness.”
  id: totrans-869
  prefs: []
  type: TYPE_NORMAL
  zh: “模拟一位时间旅行哲学家与现代人工智能工程师之间的对话，讨论意识的含义。”
- en: 'Conclusion: Prepare, Practice, Predict'
  id: totrans-870
  prefs: []
  type: TYPE_NORMAL
  zh: 结论：准备、练习、预测
- en: Scenario simulation turns your AI into a training partner, rehearsal coach,
    and creative ally. Whether you're solving a problem, building confidence, or crafting
    a compelling story, this technique lets you explore outcomes before they happen.
  id: totrans-871
  prefs: []
  type: TYPE_NORMAL
  zh: 场景模拟将你的AI变成训练伙伴、排练教练和创意盟友。无论你是解决问题、建立信心还是创作引人入胜的故事，这种技术都让你在事情发生之前探索结果。
- en: The best part? You can rewind, repeat, and refine—something real life rarely
    offers.
  id: totrans-872
  prefs: []
  type: TYPE_NORMAL
  zh: 最好的部分？你可以回放、重复和改进——这是现实生活中很少能提供的。
- en: 'Chapter 15: Prompt Chains for Complex Tasks'
  id: totrans-873
  prefs: []
  type: TYPE_NORMAL
  zh: 第15章：复杂任务的提示链条
- en: Most real-world tasks aren't one-step questions—they're multi-step journeys.
    From writing a book to solving business problems, complex goals often require
    breaking things down and feeding the AI step-by-step.
  id: totrans-874
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数现实世界的任务都不是一步到位的问题——它们是多步骤的旅程。从写书到解决商业问题，复杂的目标通常需要分解并逐步向AI提供。
- en: 'This is where prompt chains come in: a method of linking multiple prompts together
    to create a structured, intelligent workflow.'
  id: totrans-875
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是提示链条发挥作用的地方：一种将多个提示链接在一起以创建结构化、智能工作流程的方法。
- en: What Are Prompt Chains?
  id: totrans-876
  prefs: []
  type: TYPE_NORMAL
  zh: 什么是提示链条？
- en: 'Prompt chains are sequences of prompts where each step builds on the output
    of the previous one. They mimic how humans work: gather ideas → sort them → plan
    → execute → revise.'
  id: totrans-877
  prefs: []
  type: TYPE_NORMAL
  zh: 提示链条是一系列提示，其中每个步骤都建立在之前步骤的输出之上。它们模仿人类的工作方式：收集想法 → 分类 → 规划 → 执行 → 修订。
- en: Rather than expecting one perfect answer from one prompt, you create a guided
    process, enabling higher quality and more consistent results.
  id: totrans-878
  prefs: []
  type: TYPE_NORMAL
  zh: 而不是期望从一个提示中得出一个完美的答案，你创建一个引导过程，从而实现更高质量和更一致的结果。
- en: Why Use Prompt Chains?
  id: totrans-879
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么使用提示链条？
- en: 'Prompt chains help you:'
  id: totrans-880
  prefs: []
  type: TYPE_NORMAL
  zh: 提示链条帮助你：
- en: Handle complex projects with multiple components (e.g., writing, planning, analysis)
  id: totrans-881
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 处理具有多个组件的复杂项目（例如，写作、规划、分析）
- en: Improve clarity and depth in each phase of a task
  id: totrans-882
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提高任务每个阶段的清晰度和深度
- en: Enable logical thinking and idea refinement
  id: totrans-883
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 启用逻辑思维和想法精炼
- en: Mimic real-world workflows with iterations and checkpoints
  id: totrans-884
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过迭代和检查点模拟现实世界的流程
- en: 'Simple Example: Writing an Article with Prompt Chains'
  id: totrans-885
  prefs: []
  type: TYPE_NORMAL
  zh: 简单示例：使用提示链条撰写文章
- en: 1\. Step 1 – Brainstorm Ideas
  id: totrans-886
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 第1步 – 思考想法
- en: “List 10 article ideas about sustainable living for millennials.”
  id: totrans-887
  prefs: []
  type: TYPE_NORMAL
  zh: “列出10个关于千禧一代可持续生活的文章想法。”
- en: 2\. Step 2 – Choose One & Expand
  id: totrans-888
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 第2步 – 选择一个并扩展
- en: '“Take the idea: ‘Zero-Waste Kitchen Tips.’ Outline 5 key points to cover.”'
  id: totrans-889
  prefs: []
  type: TYPE_NORMAL
  zh: “以‘零浪费厨房小贴士’这个想法为例。概述5个关键点来涵盖。”
- en: 3\. Step 3 – Draft
  id: totrans-890
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 第3步 – 草稿
- en: “Write a 500-word article based on the outline provided.”
  id: totrans-891
  prefs: []
  type: TYPE_NORMAL
  zh: “根据提供的提纲撰写一篇500字的文章。”
- en: 4\. Step 4 – Refine Style
  id: totrans-892
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 第4步 – 精炼风格
- en: “Rewrite the article in a conversational tone with a touch of humor.”
  id: totrans-893
  prefs: []
  type: TYPE_NORMAL
  zh: “将文章改写成对话风格，并加入一点幽默。”
- en: 5\. Step 5 – Add Headline & CTA
  id: totrans-894
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 第5步 – 添加标题和CTA
- en: “Suggest a catchy title and a closing call-to-action.”
  id: totrans-895
  prefs: []
  type: TYPE_NORMAL
  zh: “建议一个吸引人的标题和结束语。”
- en: Each output feeds the next step—resulting in more focused and polished content.
  id: totrans-896
  prefs: []
  type: TYPE_NORMAL
  zh: 每个输出都为下一步提供信息——从而产生更专注和精炼的内容。
- en: Designing Effective Prompt Chains
  id: totrans-897
  prefs: []
  type: TYPE_NORMAL
  zh: 设计有效的提示链条
- en: 'To build effective chains:'
  id: totrans-898
  prefs: []
  type: TYPE_NORMAL
  zh: 要构建有效的链条：
- en: 'Break the task into phases: Think steps like research → organize → generate
    → polish'
  id: totrans-899
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将任务分解为阶段：思考步骤如研究 → 组织 → 生成 → 精炼
- en: 'Be specific at each step: Give the AI a clear goal and context'
  id: totrans-900
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在每个步骤中都要具体：给AI一个清晰的目标和上下文
- en: 'Reference previous outputs: Use summaries or key points from earlier steps'
  id: totrans-901
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 参考之前的输出：使用早期步骤的摘要或关键点
- en: 'Iterate: Add revision stages to refine outputs'
  id: totrans-902
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 迭代：添加修订阶段以精炼输出
- en: 'Add decision points: “Give me 3 options and I’ll choose one to continue”'
  id: totrans-903
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 添加决策点：“给我3个选项，我会选择一个继续”
- en: Use Cases for Prompt Chains
  id: totrans-904
  prefs: []
  type: TYPE_NORMAL
  zh: 提示链条的应用案例
- en: 1\. Business Planning
  id: totrans-905
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 商业规划
- en: Idea generation
  id: totrans-906
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 想法生成
- en: SWOT analysis
  id: totrans-907
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: SWOT分析
- en: Market positioning
  id: totrans-908
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 市场定位
- en: Elevator pitch
  id: totrans-909
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 梯度演讲
- en: Strategic roadmap
  id: totrans-910
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 战略路线图
- en: 2\. Book Writing
  id: totrans-911
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 写作书籍
- en: Topic brainstorm
  id: totrans-912
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 主题思考
- en: Chapter structure
  id: totrans-913
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 章节结构
- en: Chapter drafting
  id: totrans-914
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 章节草拟
- en: Editing and tone adjustment
  id: totrans-915
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 编辑和语气调整
- en: Back cover blurb creation
  id: totrans-916
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 创建背面简介
- en: 3\. Learning New Skills
  id: totrans-917
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 学习新技能
- en: Define learning goals
  id: totrans-918
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 定义学习目标
- en: Break down topics
  id: totrans-919
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 分解主题
- en: Generate study plans
  id: totrans-920
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 生成学习计划
- en: Create quiz questions
  id: totrans-921
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 创建测验问题
- en: Summarize key takeaways
  id: totrans-922
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 总结关键要点
- en: 4\. Coding Projects
  id: totrans-923
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 编码项目
- en: Define app idea
  id: totrans-924
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 定义应用想法
- en: List technical requirements
  id: totrans-925
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 列出技术要求
- en: Generate initial code
  id: totrans-926
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 生成初始代码
- en: Test and debug
  id: totrans-927
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 测试和调试
- en: Document with comments
  id: totrans-928
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 带注释的文档
- en: 'Advanced: Branching Chains'
  id: totrans-929
  prefs: []
  type: TYPE_NORMAL
  zh: 高级：分支链条
- en: Chains don’t have to be linear. You can design branching paths based on different
    options.
  id: totrans-930
  prefs: []
  type: TYPE_NORMAL
  zh: 链条不必是线性的。你可以根据不同的选项设计分支路径。
- en: 'Example for Marketing:'
  id: totrans-931
  prefs: []
  type: TYPE_NORMAL
  zh: 市场营销示例：
- en: “Give me three branding strategies for a health food product.”
  id: totrans-932
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “给我三个健康食品产品的品牌策略。”
- en: (Choose one)
  id: totrans-933
  prefs: []
  type: TYPE_NORMAL
  zh: （选择一个）
- en: “Now create a 30-day content calendar for that strategy.”
  id: totrans-934
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “现在为该策略创建一个30天的内容日历。”
- en: “Now draft 5 sample posts for Instagram.”
  id: totrans-935
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “现在为Instagram草拟5篇样文。”
- en: This structure gives you creative control while guiding AI through multi-path
    logic.
  id: totrans-936
  prefs: []
  type: TYPE_NORMAL
  zh: 这种结构为你提供了创意控制，同时引导AI通过多路径逻辑。
- en: Tips for Prompt Chain Success
  id: totrans-937
  prefs: []
  type: TYPE_NORMAL
  zh: 提示链条成功的技巧
- en: Label steps so you can track progress
  id: totrans-938
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 标记步骤以便跟踪进度
- en: Use summaries when outputs get long
  id: totrans-939
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当输出变长时使用摘要
- en: Clarify transitions between stages (e.g., “Now take the previous outline and
    expand each point”)
  id: totrans-940
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 澄清阶段之间的过渡（例如，“现在将前面的大纲扩展到每个点”）
- en: Don’t skip validation—review AI’s logic and add corrections if needed
  id: totrans-941
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 不要跳过验证——审查 AI 的逻辑并在需要时添加更正
- en: Reuse chains for repeatable tasks (e.g., blog writing, product descriptions)
  id: totrans-942
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 重复性任务（例如，博客写作、产品描述）的重用链
- en: Prompt Chain Template (Modular Structure)
  id: totrans-943
  prefs: []
  type: TYPE_NORMAL
  zh: 提示链模板（模块化结构）
- en: Step 1 – Define the Objective
  id: totrans-944
  prefs: []
  type: TYPE_NORMAL
  zh: 第 1 步 – 定义目标
- en: “I want to create a digital course on productivity.”
  id: totrans-945
  prefs: []
  type: TYPE_NORMAL
  zh: “我想创建一个关于生产力的数字课程。”
- en: Step 2 – Research
  id: totrans-946
  prefs: []
  type: TYPE_NORMAL
  zh: 第 2 步 – 研究
- en: “List 10 key problems people face with productivity.”
  id: totrans-947
  prefs: []
  type: TYPE_NORMAL
  zh: “列出人们面临的 10 个关键生产力问题。”
- en: Step 3 – Structure
  id: totrans-948
  prefs: []
  type: TYPE_NORMAL
  zh: 第 3 步 – 结构
- en: “Turn these problems into a 5-module course outline.”
  id: totrans-949
  prefs: []
  type: TYPE_NORMAL
  zh: “将这些问题转化为一个 5 模块的课程大纲。”
- en: Step 4 – Draft Content
  id: totrans-950
  prefs: []
  type: TYPE_NORMAL
  zh: 第 4 步 – 草稿内容
- en: “Write the script for Module 1, based on the outline.”
  id: totrans-951
  prefs: []
  type: TYPE_NORMAL
  zh: “根据大纲编写模块 1 的脚本。”
- en: Step 5 – Revise
  id: totrans-952
  prefs: []
  type: TYPE_NORMAL
  zh: 第 5 步 – 修订
- en: “Edit this script to include real-life examples and a motivating tone.”
  id: totrans-953
  prefs: []
  type: TYPE_NORMAL
  zh: “编辑这个脚本，包括真实生活中的例子和激励性的语气。”
- en: Step 6 – Finalize
  id: totrans-954
  prefs: []
  type: TYPE_NORMAL
  zh: 第 6 步 – 完成
- en: “Summarize this module in 3 key takeaways and one action step.”
  id: totrans-955
  prefs: []
  type: TYPE_NORMAL
  zh: “总结这个模块的 3 个关键要点和一个行动步骤。”
- en: 'Conclusion: Complexity Made Simple'
  id: totrans-956
  prefs: []
  type: TYPE_NORMAL
  zh: 结论：复杂化简化
- en: Prompt chaining is how you move from simple questions to sophisticated systems.
    It mirrors how humans work on big projects—one manageable step at a time.
  id: totrans-957
  prefs: []
  type: TYPE_NORMAL
  zh: 提示链是您从简单问题过渡到复杂系统的方式。它反映了人类处理大型项目的方式——一次处理一个可管理的步骤。
- en: Once you learn to break down complex tasks and link them intelligently, AI becomes
    not just a tool, but a collaborative partner in execution.
  id: totrans-958
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦你学会了如何智能地分解复杂任务并将它们联系起来，AI 就不仅仅是一个工具，而是一个执行中的协作伙伴。
- en: PART IV  UNDERSTANDING GPT-4 AND BEYOND
  id: totrans-959
  prefs: []
  type: TYPE_NORMAL
  zh: 第四部分  理解 GPT-4 及以上版本
- en: 'Chapter 16: Accessing Advanced Models'
  id: totrans-960
  prefs: []
  type: TYPE_NORMAL
  zh: 第 16 章：访问高级模型
- en: With each new generation of AI, the possibilities expand. From GPT-3.5 to GPT-4
    and beyond, the models are becoming more intelligent, nuanced, and capable of
    handling increasingly complex queries.
  id: totrans-961
  prefs: []
  type: TYPE_NORMAL
  zh: 每一代新的 AI 都会扩大可能性。从 GPT-3.5 到 GPT-4 以及更远，模型变得越来越智能、细腻，并且能够处理越来越复杂的查询。
- en: This chapter is your gateway to understanding how to access and leverage the
    full potential of advanced AI models—and why it matters.
  id: totrans-962
  prefs: []
  type: TYPE_NORMAL
  zh: 本章是您了解如何访问和利用高级 AI 模型的全面潜力的门户——以及为什么这很重要。
- en: Why Model Versions Matter
  id: totrans-963
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么模型版本很重要
- en: 'Each version of a language model brings improvements in:'
  id: totrans-964
  prefs: []
  type: TYPE_NORMAL
  zh: 语言模型的每个版本都会在以下方面带来改进：
- en: Understanding context
  id: totrans-965
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 理解上下文
- en: Following complex instructions
  id: totrans-966
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 遵循复杂指令
- en: Retaining conversational memory
  id: totrans-967
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 保留对话记忆
- en: Handling specialized domains (e.g., law, coding, medicine)
  id: totrans-968
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 处理专业领域（例如，法律、编码、医学）
- en: Producing more natural, human-like responses
  id: totrans-969
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 生成更自然、更类似人类的声音
- en: The difference between models can significantly affect output quality. For example,
    GPT-4 often offers deeper reasoning and more structured answers than its predecessors.
  id: totrans-970
  prefs: []
  type: TYPE_NORMAL
  zh: 模型的差异可能会显著影响输出质量。例如，GPT-4 通常比其前辈提供更深入的推理和更有结构的答案。
- en: Understanding Model Access Tiers
  id: totrans-971
  prefs: []
  type: TYPE_NORMAL
  zh: 理解模型访问层级
- en: 'Different AI tools (like ChatGPT, Claude, Gemini, or Perplexity) use various
    models and offer tiered access:'
  id: totrans-972
  prefs: []
  type: TYPE_NORMAL
  zh: 不同的 AI 工具（如 ChatGPT、Claude、Gemini 或 Perplexity）使用不同的模型并提供分层访问：
- en: Free tiers often run GPT-3.5 or similar models
  id: totrans-973
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 免费层通常运行 GPT-3.5 或类似模型
- en: Pro/Paid subscriptions unlock GPT-4 or Claude Opus
  id: totrans-974
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Pro/付费订阅解锁 GPT-4 或 Claude Opus
- en: Enterprise tools may provide access to fine-tuned or dedicated models
  id: totrans-975
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 企业工具可能提供访问微调或专用模型
- en: If you’re serious about using AI for writing, strategy, development, or research—upgrading
    is worth it.
  id: totrans-976
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你认真考虑使用 AI 进行写作、策略、开发或研究——升级是值得的。
- en: How to Access GPT-4 and Beyond
  id: totrans-977
  prefs: []
  type: TYPE_NORMAL
  zh: 如何访问 GPT-4 及以上版本
- en: 'Here’s how to get started with advanced models:'
  id: totrans-978
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是如何开始使用高级模型：
- en: 1\. ChatGPT Pro (OpenAI)
  id: totrans-979
  prefs: []
  type: TYPE_NORMAL
  zh: 1\. ChatGPT Pro (OpenAI)
- en: GPT-4-turbo (faster, cheaper variant of GPT-4)
  id: totrans-980
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: GPT-4-turbo（GPT-4 的更快、更便宜的变体）
- en: $20/month (as of writing)
  id: totrans-981
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: $20/月（截至写作时）
- en: Access via chat.openai.com
  id: totrans-982
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过 chat.openai.com 访问
- en: Offers tools like memory, code interpreter, image analysis
  id: totrans-983
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提供如记忆、代码解释器、图像分析等工具
- en: 2\. Microsoft Copilot (Bing & Office)
  id: totrans-984
  prefs: []
  type: TYPE_NORMAL
  zh: 2\. Microsoft Copilot (Bing & Office)
- en: Integrates GPT-4 into search and Office tools (Word, Excel, Outlook)
  id: totrans-985
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将 GPT-4 集成到搜索和 Office 工具（Word、Excel、Outlook）中
- en: Built-in with certain Microsoft 365 subscriptions
  id: totrans-986
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 内置于某些 Microsoft 365 订阅中
- en: 3\. API Access via OpenAI Platform
  id: totrans-987
  prefs: []
  type: TYPE_NORMAL
  zh: 3\. 通过 OpenAI 平台进行 API 访问
- en: Allows developers to use GPT-4 in apps or automation
  id: totrans-988
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 允许开发者将 GPT-4 用于应用程序或自动化
- en: Pay-as-you-go pricing
  id: totrans-989
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 按需付费定价
- en: Best for custom tools, bots, or AI-powered services
  id: totrans-990
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 最佳用于定制工具、机器人或 AI 驱动的服务
- en: 4\. Third-Party Tools Using GPT-4
  id: totrans-991
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 使用GPT-4的第三方工具
- en: Notion AI, Grammarly, Jasper, Writesonic, and others integrate GPT models
  id: totrans-992
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Notion AI、Grammarly、Jasper、Writesonic和其他集成GPT模型
- en: Many combine models with unique features or templates
  id: totrans-993
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 许多模型结合了独特的功能或模板
- en: When to Use an Advanced Model
  id: totrans-994
  prefs: []
  type: TYPE_NORMAL
  zh: 何时使用高级模型
- en: 'Use GPT-4 or similar models when:'
  id: totrans-995
  prefs: []
  type: TYPE_NORMAL
  zh: 当使用GPT-4或类似模型时：
- en: You need precise logic or technical accuracy
  id: totrans-996
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你需要精确的逻辑或技术准确性
- en: You’re working with sensitive or detailed content
  id: totrans-997
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你正在处理敏感或详细的内容
- en: You require longer context windows (for larger documents)
  id: totrans-998
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你需要更长的上下文窗口（用于更大的文档）
- en: You want better tone, style, and formatting
  id: totrans-999
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你想要更好的语气、风格和格式
- en: You need multi-step reasoning or analysis
  id: totrans-1000
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你需要多步骤推理或分析
- en: Model Behavior Differences (at a Glance)
  id: totrans-1001
  prefs: []
  type: TYPE_NORMAL
  zh: 模型行为差异（一览）
- en: Model Behavior Differences (at a Glance)
  id: totrans-1002
  prefs: []
  type: TYPE_NORMAL
  zh: 模型行为差异（一览）
- en: When comparing GPT-3.5 and GPT-4 Turbo, the differences are noticeable in several
    key areas. GPT-3.5 tends to offer moderate context understanding, which works
    well for simpler tasks, but GPT-4 Turbo handles much deeper and more nuanced conversations.
    In terms of memory, GPT-3.5 doesn't retain previous interactions, whereas GPT-4
    Turbo—especially within ChatGPT Pro—can remember user preferences and past discussions,
    allowing for more personalized and consistent interactions.
  id: totrans-1003
  prefs: []
  type: TYPE_NORMAL
  zh: 当比较GPT-3.5和GPT-4 Turbo时，在几个关键领域可以明显看出差异。GPT-3.5倾向于提供适度的上下文理解，这对于简单任务来说效果很好，但GPT-4
    Turbo处理更深入和更细微的对话。在内存方面，GPT-3.5不保留之前的交互，而GPT-4 Turbo——尤其是在ChatGPT Pro中——可以记住用户偏好和过去的讨论，从而实现更个性化和一致的交互。
- en: Creativity also sees a boost in GPT-4, producing more fluid, contextually aware,
    and stylistically rich content. While GPT-3.5 is generally faster in delivering
    responses, GPT-4 trades a bit of speed for significantly improved reasoning, structure,
    and detail. Accuracy is another key upgrade—GPT-4 is far more reliable in handling
    technical or factual queries. Lastly, on the cost front, GPT-3.5 is more affordable
    (especially via API), while GPT-4’s higher capabilities come with a higher price
    point, whether through subscriptions or API usage.
  id: totrans-1004
  prefs: []
  type: TYPE_NORMAL
  zh: 创造力在GPT-4中也得到了提升，产生了更流畅、上下文感知和风格丰富的内容。虽然GPT-3.5在提供响应方面通常更快，但GPT-4以牺牲一点速度为代价，在推理、结构和细节方面得到了显著改进。准确性也是另一个关键升级——GPT-4在处理技术或事实查询方面远比GPT-3.5更可靠。最后，在成本方面，GPT-3.5更实惠（尤其是通过API），而GPT-4的更高能力伴随着更高的价格点，无论是通过订阅还是API使用。
- en: The Role of Prompting with Advanced Models
  id: totrans-1005
  prefs: []
  type: TYPE_NORMAL
  zh: 高级模型提示的作用
- en: Even with smarter models, your prompting still matters. Better models don’t
    replace structure—they amplify it.
  id: totrans-1006
  prefs: []
  type: TYPE_NORMAL
  zh: 即使有更智能的模型，你的提示仍然很重要。更好的模型不会取代结构——它们会放大它。
- en: 'For example:'
  id: totrans-1007
  prefs: []
  type: TYPE_NORMAL
  zh: 例如：
- en: 'GPT-3.5: “Write a business plan” – Might return a vague draft'
  id: totrans-1008
  prefs: []
  type: TYPE_NORMAL
  zh: GPT-3.5：“撰写一份商业计划” – 可能返回一个模糊的草案
- en: 'GPT-4: Same prompt – Returns a well-structured, industry-specific plan with
    insights'
  id: totrans-1009
  prefs: []
  type: TYPE_NORMAL
  zh: GPT-4：相同的提示 – 返回一个结构良好、行业特定的计划，并包含见解
- en: 'But:'
  id: totrans-1010
  prefs: []
  type: TYPE_NORMAL
  zh: 但：
- en: “Write a 10-slide business pitch for a plant-based food startup, including funding
    ask, market size, and competitive edge.” – This prompt will unlock GPT-4’s full
    potential.
  id: totrans-1011
  prefs: []
  type: TYPE_NORMAL
  zh: “为一家植物基食品初创公司撰写一份10页的商业提案，包括资金请求、市场规模和竞争优势。” – 这个提示将解锁GPT-4的全部潜力。
- en: 'Beyond GPT-4: What’s Coming'
  id: totrans-1012
  prefs: []
  type: TYPE_NORMAL
  zh: GPT-4之外的未来：即将到来
- en: 'Models are evolving fast. Expect new capabilities like:'
  id: totrans-1013
  prefs: []
  type: TYPE_NORMAL
  zh: 模型正在快速发展。期待新的功能，如：
- en: Real-time learning (with memory and updates)
  id: totrans-1014
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 实时学习（带有记忆和更新）
- en: Multimodal interactions (text, image, audio, video in one conversation)
  id: totrans-1015
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 多模态交互（在一个对话中包含文本、图像、音频、视频）
- en: Personalization based on preferences or usage history
  id: totrans-1016
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 基于偏好或使用历史进行个性化
- en: Agentic behavior – AI acting independently within guardrails
  id: totrans-1017
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 代理行为——AI在护栏内独立行动
- en: The future may involve persistent digital assistants that understand your style,
    goals, and workflows intimately—transforming the way we work, learn, and create.
  id: totrans-1018
  prefs: []
  type: TYPE_NORMAL
  zh: 未来可能涉及理解你的风格、目标和工作流程的持久数字助手——改变我们工作、学习和创造的方式。
- en: 'Conclusion: Unlocking AI’s True Potential'
  id: totrans-1019
  prefs: []
  type: TYPE_NORMAL
  zh: 结论：释放AI的真实潜力
- en: Accessing advanced models like GPT-4 is like upgrading from a bicycle to a high-performance
    vehicle. You can go faster, farther, and with more control—but only if you know
    how to drive it well.
  id: totrans-1020
  prefs: []
  type: TYPE_NORMAL
  zh: 访问像GPT-4这样的高级模型就像是从自行车升级到高性能车辆。你可以更快、更远、更有控制力——但前提是你知道如何熟练驾驶。
- en: Treat model access as an investment. With the right tools and techniques, it
    becomes not just an assistant, but an intelligent partner.
  id: totrans-1021
  prefs: []
  type: TYPE_NORMAL
  zh: 将模型访问视为一项投资。有了正确的工具和技术，它不仅是一个助手，而是一个智能伙伴。
- en: 'Chapter 17: Myths vs. Reality of GPT-4'
  id: totrans-1022
  prefs: []
  type: TYPE_NORMAL
  zh: 第17章：GPT-4的神话与现实
- en: With the rise of GPT-4, the buzz has exploded. Everywhere you look, people are
    either overhyping it as a magical genius or downplaying it as just another chatbot.
    As with most powerful tools, the truth lies somewhere in between. In this chapter,
    we’ll bust common myths and uncover the real strengths—and limitations—of GPT-4.
  id: totrans-1023
  prefs: []
  type: TYPE_NORMAL
  zh: 随着GPT-4的兴起，炒作已经爆炸。无论你往哪里看，人们要么过分吹捧它为神奇的天才，要么贬低它只是另一个聊天机器人。与大多数强大的工具一样，真相介于两者之间。在本章中，我们将打破常见的误区，揭示GPT-4的真实优势和局限。
- en: 'Myth 1: GPT-4 Thinks Like a Human'
  id: totrans-1024
  prefs: []
  type: TYPE_NORMAL
  zh: 误区1：GPT-4像人类一样思考
- en: 'Reality: GPT-4 mimics human language patterns but doesn’t “think” or “understand”
    like we do. It doesn’t have beliefs, consciousness, emotions, or intentions. It
    predicts words based on patterns in data—not because it "knows" things the way
    humans do.'
  id: totrans-1025
  prefs: []
  type: TYPE_NORMAL
  zh: 现实：GPT-4模仿人类语言模式，但并不“思考”或“理解”像我们一样。它没有信仰、意识、情感或意图。它根据数据中的模式预测单词——并不是因为它“知道”像人类一样的事情。
- en: 'Myth 2: GPT-4 Can Learn on the Fly'
  id: totrans-1026
  prefs: []
  type: TYPE_NORMAL
  zh: 误区2：GPT-4可以即时学习
- en: 'Reality: GPT-4 does not learn during your conversation unless it''s a memory-enabled
    session (like in ChatGPT Pro). Even then, its “learning” is not real-time education—it’s
    remembering preferences and facts you’ve told it. The model itself doesn’t evolve
    unless retrained by its developers.'
  id: totrans-1027
  prefs: []
  type: TYPE_NORMAL
  zh: 现实：GPT-4在与你对话时不会学习，除非是启用了记忆功能的会话（如ChatGPT Pro）。即使如此，它的“学习”也不是实时教育——它只是在记住你告诉它的偏好和事实。除非由开发者重新训练，否则模型本身不会进化。
- en: 'Myth 3: GPT-4 Is Always Accurate'
  id: totrans-1028
  prefs: []
  type: TYPE_NORMAL
  zh: 误区3：GPT-4总是准确的
- en: 'Reality: GPT-4 is significantly more accurate than its predecessors, but it
    can still "hallucinate"—a term for when the model confidently outputs false or
    made-up information. This is especially true in niche or highly technical areas.
    Always verify critical facts independently.'
  id: totrans-1029
  prefs: []
  type: TYPE_NORMAL
  zh: 现实：GPT-4比其前辈们显著更准确，但它仍然可能“产生幻觉”——这是一个指模型自信地输出错误或虚构信息的术语。这在细分或高度技术化的领域尤为如此。始终要独立验证关键事实。
- en: 'Myth 4: GPT-4 Understands Context Like a Human'
  id: totrans-1030
  prefs: []
  type: TYPE_NORMAL
  zh: 误区4：GPT-4像人类一样理解上下文
- en: 'Reality: GPT-4 is excellent at simulating contextual understanding, especially
    with longer input memory (up to 128K tokens in GPT-4 Turbo). However, it doesn''t
    possess real comprehension—it identifies patterns and probabilities, not meaning.
    It can lose track if not guided clearly.'
  id: totrans-1031
  prefs: []
  type: TYPE_NORMAL
  zh: 现实：GPT-4在模拟上下文理解方面非常出色，尤其是在较长的输入记忆（GPT-4 Turbo中高达128K个标记）的情况下。然而，它并不具备真正的理解——它识别模式和概率，而不是意义。如果没有明确的引导，它可能会失去方向。
- en: 'Myth 5: GPT-4 Can Replace All Human Jobs'
  id: totrans-1032
  prefs: []
  type: TYPE_NORMAL
  zh: 误区5：GPT-4可以取代所有人类工作
- en: 'Reality: While GPT-4 is transforming workflows—especially in writing, customer
    service, coding, and research—it works best in collaboration with humans. It automates
    parts of work but still relies on human judgment, decision-making, creativity,
    and oversight.'
  id: totrans-1033
  prefs: []
  type: TYPE_NORMAL
  zh: 现实：虽然GPT-4正在改变工作流程——特别是在写作、客户服务、编码和研究方面——但它最好与人类协作。它自动化了工作的一部分，但仍依赖于人类的判断、决策、创造力和监督。
- en: 'Myth 6: GPT-4 Is Just GPT-3.5 With a New Name'
  id: totrans-1034
  prefs: []
  type: TYPE_NORMAL
  zh: 误区6：GPT-4只是GPT-3.5换了个名字
- en: 'Reality: GPT-4 is a major leap in capabilities. It’s better at reasoning, managing
    complex prompts, following nuanced instructions, and maintaining structure across
    long conversations. While both models are built on similar foundations, the difference
    in performance is substantial in practice.'
  id: totrans-1035
  prefs: []
  type: TYPE_NORMAL
  zh: 现实：GPT-4在能力上是一个重大飞跃。它在推理、管理复杂提示、遵循细微指令以及在整个对话中保持结构方面表现得更好。虽然这两个模型都建立在相似的基础上，但在实际应用中，性能差异是显著的。
- en: 'Myth 7: The Model Knows Everything on the Internet'
  id: totrans-1036
  prefs: []
  type: TYPE_NORMAL
  zh: 误区7：该模型知道互联网上的所有信息
- en: 'Reality: GPT-4 is trained on a large dataset from the internet, but it’s not
    connected to the live web (unless tools like browsing are enabled). It doesn’t
    have up-to-the-minute knowledge unless integrated with real-time data sources.
    For current events, it can quickly become outdated.'
  id: totrans-1037
  prefs: []
  type: TYPE_NORMAL
  zh: 现实：GPT-4是在来自互联网的大量数据集上训练的，但它没有连接到实时网络（除非启用了如浏览等工具）。除非与实时数据源集成，否则它不具备最新的知识。对于当前事件，它可能会迅速过时。
- en: 'Myth 8: You Don’t Need to Learn Prompting with GPT-4'
  id: totrans-1038
  prefs: []
  type: TYPE_NORMAL
  zh: 误区8：你不需要学习提示与GPT-4一起使用
- en: 'Reality: Even though GPT-4 is more forgiving and intelligent, prompt engineering
    still matters. The clearer and more structured your prompts, the better the output.
    Prompting is the art of communicating with AI, and GPT-4 just expands the possibilities—it
    doesn’t eliminate the need for skill.'
  id: totrans-1039
  prefs: []
  type: TYPE_NORMAL
  zh: 现实：尽管GPT-4更加宽容和智能，但提示工程仍然很重要。你的提示越清晰、结构化，输出就越好。提示是与AI沟通的艺术，GPT-4只是扩展了可能性——它并没有消除对技能的需求。
- en: 'Myth 9: GPT-4 Is Fully Secure and Private'
  id: totrans-1040
  prefs: []
  type: TYPE_NORMAL
  zh: 误区9：GPT-4完全安全和私密
- en: 'Reality: While major platforms like OpenAI take security seriously, GPT-4 is
    not inherently private or encrypted end-to-end. Sensitive data should be avoided
    unless you''re using secure enterprise environments. Always check the data policies
    of the platform you''re using.'
  id: totrans-1041
  prefs: []
  type: TYPE_NORMAL
  zh: 现实：虽然像OpenAI这样的主要平台非常重视安全，但GPT-4本身并不是天生私密或端到端加密的。除非你使用的是安全的企业环境，否则应避免敏感数据。始终检查你使用的平台的数据政策。
- en: 'Myth 10: AI Like GPT-4 Is a Passing Trend'
  id: totrans-1042
  prefs: []
  type: TYPE_NORMAL
  zh: 神话10：像GPT-4这样的AI是一个短暂的潮流
- en: 'Reality: GPT-4 is not a gimmick—it’s part of a larger wave of generative AI
    changing how we live and work. From education to design, entrepreneurship to entertainment,
    these tools are shaping a new digital era. It’s not a question of “if” they’ll
    matter—but “how” you’ll use them.'
  id: totrans-1043
  prefs: []
  type: TYPE_NORMAL
  zh: 现实：GPT-4不是一个噱头——它是改变我们生活和工作的生成式AI浪潮的一部分。从教育到设计，从创业到娱乐，这些工具正在塑造一个新的数字时代。这不是一个“是否”它们会重要的问题——而是“如何”使用它们的问题。
- en: 'Conclusion: Grounded in Truth'
  id: totrans-1044
  prefs: []
  type: TYPE_NORMAL
  zh: 结论：基于事实
- en: Understanding GPT-4 means seeing it clearly—not as a magic wand, and not as
    an overhyped toy. It’s a powerful tool, capable of enhancing creativity, productivity,
    and innovation—if you use it wisely and with awareness. Myths fade, but skillful
    use of real capabilities creates lasting value.
  id: totrans-1045
  prefs: []
  type: TYPE_NORMAL
  zh: 理解GPT-4意味着清楚地看待它——不是一根魔杖，也不是一个过度炒作的玩具。它是一个强大的工具，能够增强创造力、生产力和创新——如果你明智且警觉地使用它。神话会消失，但熟练运用实际能力可以创造持久的价值。
- en: 'Chapter 18: Why More Context = Better Results'
  id: totrans-1046
  prefs: []
  type: TYPE_NORMAL
  zh: 第18章：为什么更多的上下文意味着更好的结果
- en: 'If there’s one secret behind getting exceptional output from AI like GPT-4,
    it’s this: context is everything.'
  id: totrans-1047
  prefs: []
  type: TYPE_NORMAL
  zh: 如果从AI如GPT-4获得卓越输出的秘诀只有一个，那就是这个：上下文至关重要。
- en: In human conversations, we naturally rely on context—previous interactions,
    shared knowledge, and subtle cues. AI models are no different. The more relevant
    detail you give them, the more powerful and accurate their responses become.
  id: totrans-1048
  prefs: []
  type: TYPE_NORMAL
  zh: 在人类对话中，我们自然会依赖上下文——之前的互动、共享的知识和微妙的线索。AI模型也不例外。你提供给它们的细节越相关，它们的回应就越强大、越准确。
- en: What Does “Context” Mean for AI?
  id: totrans-1049
  prefs: []
  type: TYPE_NORMAL
  zh: “上下文”对AI意味着什么？
- en: 'In AI interactions, “context” refers to the information provided within the
    conversation or prompt that helps the model understand what you''re asking. This
    includes:'
  id: totrans-1050
  prefs: []
  type: TYPE_NORMAL
  zh: 在AI交互中，“上下文”指的是对话或提示中提供的信息，有助于模型理解你提出的问题。这包括：
- en: Background details
  id: totrans-1051
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 背景细节
- en: Your goals or audience
  id: totrans-1052
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你的目标或受众
- en: Examples or structure
  id: totrans-1053
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 例子或结构
- en: Tone and formatting instructions
  id: totrans-1054
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 语气和格式说明
- en: Prior messages in a conversation
  id: totrans-1055
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对话中的先前信息
- en: GPT-4 doesn’t have real comprehension like humans. Instead, it relies on pattern
    prediction—and patterns need data. The richer the input, the more focused and
    relevant the output.
  id: totrans-1056
  prefs: []
  type: TYPE_NORMAL
  zh: GPT-4没有像人类那样的真正理解能力。相反，它依赖于模式预测——而模式需要数据。输入越丰富，输出就越专注、越相关。
- en: Why Context Matters More in GPT-4
  id: totrans-1057
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么在GPT-4中上下文更重要
- en: GPT-4, especially the Turbo variant, can process far more tokens than GPT-3.5\.
    That means you can include longer prompts, reference materials, previous outputs,
    and more complex instructions—without losing coherence.
  id: totrans-1058
  prefs: []
  type: TYPE_NORMAL
  zh: GPT-4，尤其是Turbo变体，可以处理比GPT-3.5更多的标记。这意味着你可以包含更长的提示、参考资料、之前的输出和更复杂的指令——而不会失去连贯性。
- en: 'With a longer memory window (up to 128,000 tokens), GPT-4 can track:'
  id: totrans-1059
  prefs: []
  type: TYPE_NORMAL
  zh: 使用更长的记忆窗口（高达128,000个标记），GPT-4可以跟踪：
- en: Entire conversations
  id: totrans-1060
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 整个对话
- en: Multiple documents
  id: totrans-1061
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 多份文档
- en: Detailed instructions
  id: totrans-1062
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 详细说明
- en: Long narratives or datasets
  id: totrans-1063
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 长篇叙述或数据集
- en: 'This makes it ideal for tasks like:'
  id: totrans-1064
  prefs: []
  type: TYPE_NORMAL
  zh: 这使它非常适合以下任务：
- en: Writing books or reports
  id: totrans-1065
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 写书或报告
- en: Simulating business strategies
  id: totrans-1066
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 模拟商业策略
- en: Coding entire applications
  id: totrans-1067
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 编写整个应用程序
- en: Reviewing long-form legal or technical content
  id: totrans-1068
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 审阅长篇法律或技术内容
- en: 'Examples: With vs. Without Context'
  id: totrans-1069
  prefs: []
  type: TYPE_NORMAL
  zh: 例子：有上下文与无上下文
- en: 'Without Context:'
  id: totrans-1070
  prefs: []
  type: TYPE_NORMAL
  zh: 缺乏上下文：
- en: “Write an introduction.”
  id: totrans-1071
  prefs: []
  type: TYPE_NORMAL
  zh: “写一个引言。”
- en: 'Result: Generic, vague, and unfocused.'
  id: totrans-1072
  prefs: []
  type: TYPE_NORMAL
  zh: 结果：泛泛而谈、模糊不清、缺乏焦点。
- en: 'With Context:'
  id: totrans-1073
  prefs: []
  type: TYPE_NORMAL
  zh: 有上下文：
- en: “Write an engaging introduction for a 10-chapter AI guide aimed at digital creators
    who want to use GPT-4 for writing, ideation, and productivity. Keep the tone friendly
    but professional.”
  id: totrans-1074
  prefs: []
  type: TYPE_NORMAL
  zh: “为面向希望使用GPT-4进行写作、构思和生产力提升的数字创作者的10章AI指南写一个引人入胜的引言。保持语气友好但专业。”
- en: 'Result: Targeted, relevant, and high quality.'
  id: totrans-1075
  prefs: []
  type: TYPE_NORMAL
  zh: 结果：目标明确、相关性强、质量高。
- en: More Context = Fewer Misunderstandings
  id: totrans-1076
  prefs: []
  type: TYPE_NORMAL
  zh: 上下文越多，误解越少
- en: 'Lack of context leads to:'
  id: totrans-1077
  prefs: []
  type: TYPE_NORMAL
  zh: 缺乏上下文会导致：
- en: Misaligned tone or style
  id: totrans-1078
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 不一致的语气或风格
- en: Irrelevant content
  id: totrans-1079
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 不相关的内容
- en: Repetition or confusion
  id: totrans-1080
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 重复或混淆
- en: Incomplete answers
  id: totrans-1081
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 不完整的答案
- en: Providing context isn’t just about “feeding more text”—it’s about guiding the
    AI toward your intent.
  id: totrans-1082
  prefs: []
  type: TYPE_NORMAL
  zh: 提供上下文不仅仅是“提供更多文本”——它是引导AI向你意图的方向。
- en: What to Include for Better Results
  id: totrans-1083
  prefs: []
  type: TYPE_NORMAL
  zh: 为了获得更好的结果，应该包含什么
- en: 'Here’s how to structure your inputs for clarity:'
  id: totrans-1084
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是如何构建你的输入以保持清晰的结构：
- en: '1\. Purpose: What is the goal of the task?'
  id: totrans-1085
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 目的：任务的目的是什么？
- en: '2\. Audience: Who is this for?'
  id: totrans-1086
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 受众：这是为谁准备的？
- en: '3\. Format: Should it be a list, paragraph, outline, or code block?'
  id: totrans-1087
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 格式：应该是列表、段落、大纲还是代码块？
- en: '4\. Voice & Tone: Formal, friendly, persuasive, technical?'
  id: totrans-1088
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 语气与语调：正式、友好、有说服力、技术性？
- en: '5\. Examples: Give one or two samples if possible.'
  id: totrans-1089
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 示例：如果可能的话，提供一到两个样本。
- en: '6\. Constraints: Word count, language, topics to avoid, etc.'
  id: totrans-1090
  prefs: []
  type: TYPE_NORMAL
  zh: 6. 约束：字数、语言、避免的主题等。
- en: Prompt Expansion Strategy
  id: totrans-1091
  prefs: []
  type: TYPE_NORMAL
  zh: 提示扩展策略
- en: 'If a basic prompt yields average output, try this strategy:'
  id: totrans-1092
  prefs: []
  type: TYPE_NORMAL
  zh: 如果一个基本的提示产生了平均的输出，尝试这个策略：
- en: Start with a general idea
  id: totrans-1093
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 从一个一般性的想法开始
- en: Add specifics about the goal and audience
  id: totrans-1094
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 添加关于目标和受众的具体信息
- en: Layer in examples or a sample structure
  id: totrans-1095
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 添加例子或样本结构
- en: Include references to earlier content if available
  id: totrans-1096
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果可用，包含对先前内容的引用
- en: Clarify how you want the output formatted
  id: totrans-1097
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 明确你希望输出如何格式化
- en: This method turns a rough idea into a complete blueprint the AI can follow with
    precision.
  id: totrans-1098
  prefs: []
  type: TYPE_NORMAL
  zh: 这种方法将一个粗略的想法转化为AI可以精确遵循的完整蓝图。
- en: 'Memory and Context: A Powerful Duo'
  id: totrans-1099
  prefs: []
  type: TYPE_NORMAL
  zh: 记忆和上下文：强大的组合
- en: If you're using a memory-enabled system like ChatGPT Pro, your past preferences
    and facts are remembered automatically. Combine this with strong prompting, and
    the AI feels more personalized and intelligent over time.
  id: totrans-1100
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你使用的是具有记忆功能的系统，如ChatGPT Pro，你的过去偏好和事实会自动记住。结合强大的提示，AI会随着时间的推移感觉更加个性化和智能。
- en: 'Conclusion: Feed It Well, Reap the Rewards'
  id: totrans-1101
  prefs: []
  type: TYPE_NORMAL
  zh: 结论：给它提供丰富的营养，收获回报
- en: AI isn’t magic—it’s a reflection of what you put into it. Just like teaching
    a student, the more clearly and richly you explain something, the better the response.
    GPT-4 rewards users who provide context. The result? Smarter outputs, fewer revisions,
    and a tool that feels less like a bot and more like a partner.
  id: totrans-1102
  prefs: []
  type: TYPE_NORMAL
  zh: AI不是魔法——它是你投入其中的反映。就像教学生一样，你解释得越清楚、越丰富，响应就越好。GPT-4奖励那些提供上下文的用户。结果是，输出更智能，修订更少，工具感觉更像是一个伙伴而不是机器人。
- en: 'Chapter 19: Working with Images and Text'
  id: totrans-1103
  prefs: []
  type: TYPE_NORMAL
  zh: 第19章：与图像和文本一起工作
- en: One of the most groundbreaking capabilities of advanced AI models like GPT-4
    is their ability to understand and generate not just text, but multimodal content—especially
    the combination of images and text. This opens the door to entirely new forms
    of interaction, creativity, and problem-solving.
  id: totrans-1104
  prefs: []
  type: TYPE_NORMAL
  zh: 先进AI模型如GPT-4最令人瞩目的能力之一是理解和生成不仅仅是文本，而是多模态内容——特别是图像和文本的结合。这为全新的交互、创造力和问题解决方式打开了大门。
- en: What Is Multimodal AI?
  id: totrans-1105
  prefs: []
  type: TYPE_NORMAL
  zh: 什么是多模态AI？
- en: 'Multimodal AI refers to models that can process and respond to multiple types
    of input—not just written language, but images, code, charts, and more. GPT-4
    with vision capabilities can:'
  id: totrans-1106
  prefs: []
  type: TYPE_NORMAL
  zh: 多模态AI指的是能够处理和响应多种类型输入的模型——不仅仅是书面语言，还包括图像、代码、图表等。具有视觉能力的GPT-4可以：
- en: Analyze and describe images
  id: totrans-1107
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 分析和描述图像
- en: Read charts, diagrams, and tables
  id: totrans-1108
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 阅读图表、图解和表格
- en: Interpret handwritten notes or sketches
  id: totrans-1109
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 解释手写的笔记或草图
- en: Combine visual and textual information to solve problems
  id: totrans-1110
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 结合视觉和文本信息解决问题
- en: This allows for conversations that are visual and contextual, making AI more
    accessible and powerful.
  id: totrans-1111
  prefs: []
  type: TYPE_NORMAL
  zh: 这使得对话既视觉又上下文相关，使AI更加易于访问和强大。
- en: How You Can Use Image + Text Inputs
  id: totrans-1112
  prefs: []
  type: TYPE_NORMAL
  zh: 你如何使用图像+文本输入
- en: 'Here are some common and creative ways users leverage multimodal functionality:'
  id: totrans-1113
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一些常见的和创造性的方式，用户利用多模态功能：
- en: 'Document Analysis: Upload a PDF or image of a report, and ask the AI to summarize
    it.'
  id: totrans-1114
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 文档分析：上传PDF或报告的图像，并要求AI总结。
- en: 'Design Feedback: Upload a webpage or graphic and ask for design critique or
    improvement suggestions.'
  id: totrans-1115
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 设计反馈：上传网页或图形，并要求设计评论或改进建议。
- en: 'Math & Diagrams: Send a hand-drawn math problem or geometric figure and get
    a step-by-step solution.'
  id: totrans-1116
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 数学与图解：发送一个手绘的数学问题或几何图形，并获得逐步解决方案。
- en: 'Data Visualization: Input a screenshot of a chart and ask for trend analysis
    or forecasting.'
  id: totrans-1117
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 数据可视化：输入图表的截图，并要求进行趋势分析或预测。
- en: 'Code & UI Mockups: Share sketches or wireframes and generate code or UI suggestions.'
  id: totrans-1118
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 代码与UI原型：分享草图或线框，并生成代码或UI建议。
- en: Prompting with Images
  id: totrans-1119
  prefs: []
  type: TYPE_NORMAL
  zh: 使用图像进行提示
- en: 'To get the best results from an image + text interaction:'
  id: totrans-1120
  prefs: []
  type: TYPE_NORMAL
  zh: 要从图像+文本交互中获得最佳结果：
- en: '1\. Describe the Image Context: Don’t rely on the image alone. Briefly explain
    what it is or why you’re sharing it.'
  id: totrans-1121
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 描述图像背景：不要仅依赖图像。简要解释它是什么或为什么你要分享它。
- en: '2\. State Your Goal Clearly: Whether you want a summary, analysis, improvement,
    or transformation, spell it out.'
  id: totrans-1122
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 明确你的目标：无论你想要摘要、分析、改进还是转换，都要清楚地表达出来。
- en: '3\. Use Follow-Up Questions: After the first response, dig deeper or ask for
    clarification.'
  id: totrans-1123
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 使用后续问题：在第一次回应之后，深入挖掘或请求澄清。
- en: 'Example Prompt:'
  id: totrans-1124
  prefs: []
  type: TYPE_NORMAL
  zh: 示例提示：
- en: “This is a wireframe for a mobile app homepage. Can you suggest three layout
    improvements for better usability and cleaner design?”
  id: totrans-1125
  prefs: []
  type: TYPE_NORMAL
  zh: “这是一个移动应用主页的线框图。你能提出三个布局改进，以提升可用性和更简洁的设计吗？”
- en: Understanding Limitations
  id: totrans-1126
  prefs: []
  type: TYPE_NORMAL
  zh: 理解局限性
- en: 'While powerful, the image capabilities of GPT-4 still have some boundaries:'
  id: totrans-1127
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然功能强大，但GPT-4的图像能力仍有一些限制：
- en: 'No Real-Time Object Recognition: It’s not a live camera or sensor—it processes
    static images only.'
  id: totrans-1128
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 没有实时物体识别：它不是一个实时摄像头或传感器——它只处理静态图像。
- en: 'Limited Visual Memory: It doesn''t retain images between sessions or “remember”
    past visual references.'
  id: totrans-1129
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 视觉记忆有限：它不会在会话之间保留图像或“记住”过去的视觉参考。
- en: 'Complex Graphics May Require Guidance: Highly detailed visuals (e.g., dense
    infographics) might need you to guide the AI toward what to focus on.'
  id: totrans-1130
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 复杂图形可能需要指导：高度详细的可视化（例如，密集的信息图表）可能需要你引导AI关注什么。
- en: Responsible Use of Images
  id: totrans-1131
  prefs: []
  type: TYPE_NORMAL
  zh: 负责任地使用图像
- en: 'Always consider privacy and ethical concerns when uploading images:'
  id: totrans-1132
  prefs: []
  type: TYPE_NORMAL
  zh: 在上传图像时始终考虑隐私和道德问题：
- en: Avoid sensitive personal data
  id: totrans-1133
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 避免敏感的个人数据
- en: Don’t upload content you don’t have rights to
  id: totrans-1134
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 不要上传你没有权利的内容
- en: Respect platform guidelines for safe and ethical usage
  id: totrans-1135
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 遵守平台指南，确保安全和道德的使用
- en: 'Remember: AI can analyze content, but you are responsible for what you feed
    it.'
  id: totrans-1136
  prefs: []
  type: TYPE_NORMAL
  zh: 记住：AI可以分析内容，但你对其输入的内容负有责任。
- en: 'Conclusion: Visual Intelligence Expands the Horizon'
  id: totrans-1137
  prefs: []
  type: TYPE_NORMAL
  zh: 结论：视觉智能拓展了视野
- en: Combining images and text transforms how we work with AI. It’s no longer limited
    to chat or code—it can now see, interpret, and collaborate visually. For creators,
    educators, analysts, designers, and innovators, this is a major leap. With smart
    prompting and ethical use, GPT-4 becomes not just a writing tool—but a visual
    partner in creation and understanding.
  id: totrans-1138
  prefs: []
  type: TYPE_NORMAL
  zh: 将图像和文本结合起来改变了我们与AI合作的方式。它不再局限于聊天或代码——现在它可以观察、解释和视觉上协作。对于创作者、教育者、分析师、设计师和革新者来说，这是一个巨大的飞跃。通过智能提示和道德使用，GPT-4不仅仅是一个写作工具——而是创作和理解中的视觉伙伴。
- en: 'Chapter 20: Realistic vs. Probabilistic AI'
  id: totrans-1139
  prefs: []
  type: TYPE_NORMAL
  zh: 第20章：逼真性与概率性AI
- en: One of the biggest misconceptions about AI—especially models like GPT-4—is that
    it aims to be “realistic,” as if it understands the world like humans do. In truth,
    its foundation is probabilistic, not realistic. Understanding this difference
    is key to mastering how and why AI behaves the way it does.
  id: totrans-1140
  prefs: []
  type: TYPE_NORMAL
  zh: 关于AI的最大误解之一——特别是像GPT-4这样的模型——是它旨在“逼真”，好像它像人类一样理解世界。实际上，它的基础是概率性的，而不是逼真的。理解这种差异是掌握AI如何以及为什么以这种方式行为的关键。
- en: What Does “Probabilistic” Mean in AI?
  id: totrans-1141
  prefs: []
  type: TYPE_NORMAL
  zh: 在AI中，“概率性”是什么意思？
- en: 'At its core, GPT-4 doesn’t “know” facts or “think” like a human. Instead, it
    generates output based on probability: the likelihood of a certain word, phrase,
    or structure following what came before.'
  id: totrans-1142
  prefs: []
  type: TYPE_NORMAL
  zh: 在本质上，GPT-4并不“知道”事实或“像人类一样思考”。相反，它根据概率生成输出：某个特定单词、短语或结构跟随之前内容的可能性。
- en: When you ask it a question, the model is not retrieving an answer from memory
    like a search engine or a human recalling knowledge. It’s predicting what text
    is most likely to come next—based on patterns it learned from vast amounts of
    data.
  id: totrans-1143
  prefs: []
  type: TYPE_NORMAL
  zh: 当你向它提问时，模型并不是像搜索引擎或人类回忆知识那样从记忆中检索答案。它是预测最有可能出现的文本——基于从大量数据中学习到的模式。
- en: Realism Is an Illusion
  id: totrans-1144
  prefs: []
  type: TYPE_NORMAL
  zh: 逼真性是一种错觉
- en: GPT-4 can generate highly realistic-sounding responses—stories, arguments, summaries,
    conversations. But this realism is a surface-level effect. The model doesn’t actually
    “know” if something is true, accurate, ethical, or logical. It mimics the form
    of human expression, not the underlying thought process.
  id: totrans-1145
  prefs: []
  type: TYPE_NORMAL
  zh: GPT-4可以生成高度逼真的响应——故事、论点、摘要、对话。但这种逼真性只是表面现象。模型实际上并不“知道”某件事是否真实、准确、道德或逻辑。它模仿的是人类表达的形式，而不是背后的思维过程。
- en: 'This is why it’s possible for the AI to:'
  id: totrans-1146
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是为什么AI可以：
- en: Sound confident while being factually wrong
  id: totrans-1147
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在事实错误的同时保持自信
- en: Produce completely made-up sources or quotes
  id: totrans-1148
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 制作完全虚构的来源或引用
- en: Suggest impractical or unrealistic solutions to real-world problems
  id: totrans-1149
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对现实世界问题提出不切实际或不切实际的解决方案
- en: It’s not because the model is trying to deceive—it’s because plausibility beats
    truth in its architecture.
  id: totrans-1150
  prefs: []
  type: TYPE_NORMAL
  zh: 这并不是因为模型试图欺骗——而是因为在其架构中，可能性胜过事实。
- en: 'Probabilistic Outputs: Strengths and Pitfalls'
  id: totrans-1151
  prefs: []
  type: TYPE_NORMAL
  zh: 概率性输出：优点和缺点
- en: 'Strengths:'
  id: totrans-1152
  prefs: []
  type: TYPE_NORMAL
  zh: 优点：
- en: Extremely versatile
  id: totrans-1153
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 极其灵活
- en: Adapts to many tones, formats, and use cases
  id: totrans-1154
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 适应多种语气、格式和用例
- en: Can produce human-like creativity, nuance, and coherence
  id: totrans-1155
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 可以产生类似人类的创造力、细微差别和连贯性
- en: Learns style and structure without needing rigid rules
  id: totrans-1156
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 无需严格规则就能学习风格和结构
- en: 'Pitfalls:'
  id: totrans-1157
  prefs: []
  type: TYPE_NORMAL
  zh: 危险：
- en: Can hallucinate or fabricate facts
  id: totrans-1158
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 可能会虚构或编造事实
- en: Sometimes repeats or generalizes too much
  id: totrans-1159
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 有时重复过多或过于概括
- en: May miss deeper meaning or logic behind tasks
  id: totrans-1160
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 可能会错过任务背后的深层含义或逻辑
- en: Struggles with edge cases, ambiguity, or contradictory data
  id: totrans-1161
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在边缘案例、模糊性或矛盾数据上挣扎
- en: Why This Matters for Users
  id: totrans-1162
  prefs: []
  type: TYPE_NORMAL
  zh: 这对用户有什么意义
- en: If you treat AI like it always produces factual truth, you’re setting yourself
    up for frustration or even harm.
  id: totrans-1163
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你将AI视为总是产生事实真理，你可能会感到沮丧，甚至受到伤害。
- en: 'But if you understand it as a language model predicting likely patterns, you
    can:'
  id: totrans-1164
  prefs: []
  type: TYPE_NORMAL
  zh: 但如果你将其视为一个预测可能模式的语言模型，你就可以：
- en: Guide it more effectively with better prompts
  id: totrans-1165
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 用更好的提示更有效地引导它
- en: Spot and correct errors more quickly
  id: totrans-1166
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 快速发现和纠正错误
- en: Use it as a collaborator, not a substitute for critical thinking
  id: totrans-1167
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将其作为合作者，而不是批判性思维的替代品
- en: Know when to trust its output—and when to fact-check
  id: totrans-1168
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 知道何时相信其输出——何时进行事实核查
- en: 'Realistic AI: A Future Goal?'
  id: totrans-1169
  prefs: []
  type: TYPE_NORMAL
  zh: 现实主义人工智能：一个未来目标？
- en: Some research aims to combine probabilistic models with symbolic reasoning,
    logic systems, or external knowledge bases. The goal is to create AI that’s not
    just fluent, but also reasoned and grounded in truth.
  id: totrans-1170
  prefs: []
  type: TYPE_NORMAL
  zh: 一些研究旨在将概率模型与符号推理、逻辑系统或外部知识库相结合。目标是创建不仅流利，而且有理有据、基于事实的人工智能。
- en: But for now, even the most advanced language models—including GPT-4—remain fundamentally
    probabilistic.
  id: totrans-1171
  prefs: []
  type: TYPE_NORMAL
  zh: 但目前，即使是最高级的语言模型——包括GPT-4——在本质上仍然是概率性的。
- en: How to Work with Probabilistic AI Effectively
  id: totrans-1172
  prefs: []
  type: TYPE_NORMAL
  zh: 如何有效地与概率性人工智能合作
- en: 'Frame Your Inputs Clearly: Avoid ambiguity in prompts.'
  id: totrans-1173
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 明确你的输入：在提示中避免歧义。
- en: 'Give Examples: Show what kind of answers you expect.'
  id: totrans-1174
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 举例说明：展示你期望的答案类型。
- en: 'Refine Outputs: Be ready to re-prompt or edit responses.'
  id: totrans-1175
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 精炼输出：准备好重新提示或编辑响应。
- en: 'Use External Verification: Cross-check factual claims.'
  id: totrans-1176
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用外部验证：交叉检查事实陈述。
- en: 'Combine with Tools: Use plugins or third-party sources when accuracy matters.'
  id: totrans-1177
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 结合工具：当准确性很重要时，使用插件或第三方资源。
- en: 'Conclusion: Embrace the Probability, Shape the Output'
  id: totrans-1178
  prefs: []
  type: TYPE_NORMAL
  zh: 结论：拥抱概率，塑造输出
- en: GPT-4 doesn’t aim to be “right.” It aims to be convincing. That’s both its genius
    and its greatest risk. By understanding that you’re working with a probabilistic
    generator—not a reasoning machine—you unlock deeper control and better results.
    It’s not about making the AI perfect—it’s about becoming a better pilot of its
    power.
  id: totrans-1179
  prefs: []
  type: TYPE_NORMAL
  zh: GPT-4的目标不是“正确”，而是“令人信服”。这既是它的天才，也是它最大的风险。通过理解你正在与一个概率性生成器——而不是一个推理机器——合作，你可以获得更深入的控制和更好的结果。这并不是要使人工智能完美——而是要成为其力量的更好驾驭者。
- en: 'PART V  VISUAL AI: DALL·E EXPLAINED'
  id: totrans-1180
  prefs: []
  type: TYPE_NORMAL
  zh: 第五部分  视觉人工智能：DALL·E 解析
- en: 'Chapter 21: Visual Thinking with Text'
  id: totrans-1181
  prefs: []
  type: TYPE_NORMAL
  zh: 第二十一章：用文字进行视觉思维
- en: We often think in images. Our imaginations paint scenes, sketches, and compositions
    long before our words catch up. DALL·E—OpenAI’s image generation model—taps into
    this natural instinct and turns text into visuals with stunning creativity and
    precision. This is where AI shifts from interpreting words to illustrating them.
  id: totrans-1182
  prefs: []
  type: TYPE_NORMAL
  zh: 我们常常用图像思考。我们的想象力在语言之前就能描绘出场景、草图和构图。DALL·E——OpenAI的图像生成模型——利用这种自然本能，以惊人的创造力和精确度将文本转化为视觉图像。这就是人工智能从解释文字转变为展示文字的地方。
- en: What Is Visual Thinking?
  id: totrans-1183
  prefs: []
  type: TYPE_NORMAL
  zh: 什么是视觉思维？
- en: 'Visual thinking is the process of using images to understand, create, or communicate
    ideas. It’s how:'
  id: totrans-1184
  prefs: []
  type: TYPE_NORMAL
  zh: 视觉思维是使用图像来理解、创造或传达思想的过程。它是如何：
- en: Designers brainstorm interfaces
  id: totrans-1185
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 设计师进行界面头脑风暴
- en: Writers map out scenes
  id: totrans-1186
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 作家绘制场景图
- en: Entrepreneurs pitch ideas
  id: totrans-1187
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 企业家提出想法
- en: Teachers simplify complex topics
  id: totrans-1188
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 教师简化复杂主题
- en: Traditionally, this requires drawing skills or expensive design software. With
    AI like DALL·E, that barrier disappears. Now, anyone can turn a vivid idea into
    a visual asset—just by describing it in words.
  id: totrans-1189
  prefs: []
  type: TYPE_NORMAL
  zh: 传统上，这需要绘画技巧或昂贵的设计软件。有了像DALL·E这样的AI，这个障碍就消失了。现在，任何人都可以通过文字描述将一个生动的想法变成视觉资产。
- en: 'From Language to Image: How It Works'
  id: totrans-1190
  prefs: []
  type: TYPE_NORMAL
  zh: 从语言到图像：它是如何工作的
- en: DALL·E doesn’t "draw" images in the traditional sense. Instead, it uses deep
    learning to analyze your text prompt, break it into components, and then generate
    a realistic or stylized image pixel by pixel.
  id: totrans-1191
  prefs: []
  type: TYPE_NORMAL
  zh: DALL·E 并不是在传统意义上“绘制”图像。相反，它使用深度学习来分析你的文本提示，将其分解成组件，然后逐像素生成逼真或风格化的图像。
- en: 'It works through:'
  id: totrans-1192
  prefs: []
  type: TYPE_NORMAL
  zh: 它通过以下方式工作：
- en: 'Concept interpretation: Understanding objects, relationships, styles, colors,
    and spatial logic.'
  id: totrans-1193
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 概念解释：理解物体、关系、风格、颜色和空间逻辑。
- en: 'Visual synthesis: Blending multiple concepts together into a coherent image.'
  id: totrans-1194
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 视觉合成：将多个概念融合成一个连贯的图像。
- en: 'Stylistic flexibility: Supporting various aesthetics—photorealism, cartoons,
    3D renderings, pencil sketches, and more.'
  id: totrans-1195
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 风格灵活性：支持各种美学——逼真、卡通、3D渲染、铅笔素描等。
- en: 'Example:'
  id: totrans-1196
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：
- en: 'Prompt: “A futuristic city skyline at sunset, in the style of digital watercolor.”'
  id: totrans-1197
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：“日落时分，未来城市天际线，采用数字水彩风格。”
- en: DALL·E will render that sentence as a visually rich artwork—often better than
    you imagined.
  id: totrans-1198
  prefs: []
  type: TYPE_NORMAL
  zh: DALL·E 将将这句话渲染成一幅视觉丰富的艺术品——通常比你想象的还要好。
- en: Why Visual Thinking with AI Matters
  id: totrans-1199
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么与AI进行视觉思考很重要
- en: 'AI-powered visual generation isn’t just fun—it’s transformative across fields:'
  id: totrans-1200
  prefs: []
  type: TYPE_NORMAL
  zh: AI驱动的视觉生成不仅仅是有趣的——它在各个领域都具有变革性：
- en: 'Creative Workflows: Writers use DALL·E to visualize characters or settings.'
  id: totrans-1201
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 创意工作流程：作家使用DALL·E来可视化角色或场景。
- en: 'Marketing: Marketers generate custom product mockups, social media graphics,
    or ad concepts instantly.'
  id: totrans-1202
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 营销：营销人员可以立即生成定制的产品原型、社交媒体图形或广告概念。
- en: 'Education: Teachers illustrate abstract concepts with simple prompts.'
  id: totrans-1203
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 教育：教师用简单的提示来阐述抽象概念。
- en: 'Innovation: Entrepreneurs pitch ideas with quick visuals of apps, inventions,
    or spaces.'
  id: totrans-1204
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 创新：企业家通过快速展示应用程序、发明或空间的视觉来提出想法。
- en: 'Accessibility: Non-designers can now create stunning images without needing
    artistic skill.'
  id: totrans-1205
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 可访问性：非设计师现在可以创建令人惊叹的图像，而无需艺术技能。
- en: The model empowers idea-driven creativity, not skill-restricted execution.
  id: totrans-1206
  prefs: []
  type: TYPE_NORMAL
  zh: 该模型赋予以想法驱动的创造力，而不是技能限制的执行。
- en: Best Practices for Text-to-Image Prompts
  id: totrans-1207
  prefs: []
  type: TYPE_NORMAL
  zh: 文本到图像提示的最佳实践
- en: 'To make DALL·E understand and generate better visuals, follow these tips:'
  id: totrans-1208
  prefs: []
  type: TYPE_NORMAL
  zh: 要使DALL·E理解并生成更好的视觉图像，请遵循以下提示：
- en: '1\. Be Descriptive: Mention key visual elements—colors, setting, style, mood.'
  id: totrans-1209
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 描述详细：提及关键视觉元素——颜色、场景、风格、氛围。
- en: '2\. Specify Style: Include terms like “digital painting,” “pixel art,” “80s
    comic book,” “minimalist icon.”'
  id: totrans-1210
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 指定风格：包括“数字绘画”、“像素艺术”、“80年代漫画”、“极简图标”等术语。
- en: '3\. Add Composition Details: Foreground, background, angles, lighting.'
  id: totrans-1211
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 添加构图细节：前景、背景、角度、照明。
- en: '4\. Combine Objects Thoughtfully: Think about how items relate—spatially and
    thematically.'
  id: totrans-1212
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 考虑性地组合物体：考虑物品之间的关联——空间和主题上。
- en: 'Bad Prompt:'
  id: totrans-1213
  prefs: []
  type: TYPE_NORMAL
  zh: 差劲的提示：
- en: “A dragon.”
  id: totrans-1214
  prefs: []
  type: TYPE_NORMAL
  zh: “一条龙。”
- en: 'Better Prompt:'
  id: totrans-1215
  prefs: []
  type: TYPE_NORMAL
  zh: 更好的提示：
- en: “A golden Chinese dragon soaring above misty mountains, cinematic lighting,
    in the style of traditional ink wash painting.”
  id: totrans-1216
  prefs: []
  type: TYPE_NORMAL
  zh: “一条在中国龙腾云驾雾，雾气缭绕的山峦之上，电影般的照明，采用传统水墨画风格。”
- en: The Human + AI Creative Loop
  id: totrans-1217
  prefs: []
  type: TYPE_NORMAL
  zh: 人+AI 创意循环
- en: 'Visual thinking with DALL·E isn’t about one-and-done generations. It’s a dialogue
    between you and the AI:'
  id: totrans-1218
  prefs: []
  type: TYPE_NORMAL
  zh: 使用DALL·E进行视觉思考不仅仅是单次生成。这是你与AI之间的对话：
- en: 1\. Imagine
  id: totrans-1219
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 想象
- en: 2\. Describe
  id: totrans-1220
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 描述
- en: 3\. Refine
  id: totrans-1221
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 精炼
- en: 4\. Visualize again
  id: totrans-1222
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 再次可视化
- en: Each iteration sharpens the idea. The model becomes a creative co-pilot—not
    just a tool.
  id: totrans-1223
  prefs: []
  type: TYPE_NORMAL
  zh: 每一次迭代都会使想法更加清晰。该模型成为了一个创意副驾驶——而不仅仅是工具。
- en: 'Conclusion: A New Creative Language'
  id: totrans-1224
  prefs: []
  type: TYPE_NORMAL
  zh: 结论：一种新的创意语言
- en: With DALL·E, we enter a world where words become visuals—quickly, easily, and
    beautifully. Visual thinking is no longer reserved for designers or illustrators.
    Now, anyone with a clear idea and the right words can create powerful imagery,
    enhance their storytelling, or communicate complex ideas instantly.
  id: totrans-1225
  prefs: []
  type: TYPE_NORMAL
  zh: 使用DALL·E，我们进入了一个世界，在这个世界里，文字变成了视觉——快速、简单、美丽。视觉思考不再是设计师或插画师的专属。现在，任何有清晰想法和正确用词的人都可以创建强大的图像，增强他们的故事叙述，或立即传达复杂的思想。
- en: This is the dawn of creative literacy through AI.
  id: totrans-1226
  prefs: []
  type: TYPE_NORMAL
  zh: 这标志着通过AI进行创意素养的黎明。
- en: 'Chapter 22: Prompting DALL·E 3 Intelligently'
  id: totrans-1227
  prefs: []
  type: TYPE_NORMAL
  zh: 第22章：智能提示DALL·E 3
- en: Creating stunning images with DALL·E 3 is not just about imagination—it’s about
    precision. The difference between an average output and a breathtaking visual
    often comes down to how intelligently you prompt. This chapter explores how to
    craft smarter, more intentional prompts that give DALL·E 3 the clarity it needs
    to create exactly what you envision.
  id: totrans-1228
  prefs: []
  type: TYPE_NORMAL
  zh: 使用DALL·E 3创建令人惊叹的图像不仅仅是关于想象力——它关乎精确。平均输出和令人叹为观止的视觉效果之间的区别往往在于你如何智能地提示。本章探讨了如何制作更智能、更有意图的提示，以便DALL·E
    3能够清晰地创造出你想象中的东西。
- en: What Makes DALL·E 3 Special?
  id: totrans-1229
  prefs: []
  type: TYPE_NORMAL
  zh: DALL·E 3的独特之处在哪里？
- en: 'Unlike earlier versions, DALL·E 3 is deeply integrated with ChatGPT, allowing
    for conversational refinement of images. It better understands nuance, context,
    and stylistic instruction embedded in natural language. This means:'
  id: totrans-1230
  prefs: []
  type: TYPE_NORMAL
  zh: 与早期版本不同，DALL·E 3与ChatGPT深度融合，允许通过对话式地细化图像。它更好地理解自然语言中嵌入的细微差别、上下文和风格指导。这意味着：
- en: You don’t need to speak in rigid prompt language.
  id: totrans-1231
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你不需要用刻板的提示语言说话。
- en: The model can interpret descriptive, story-like prompts more accurately.
  id: totrans-1232
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 模型可以更准确地解释描述性、故事性的提示。
- en: It captures detail, layout, and emotion with higher fidelity.
  id: totrans-1233
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它以更高的保真度捕捉细节、布局和情感。
- en: But to get the most out of it, you still need to guide it with well-structured,
    strategic prompting.
  id: totrans-1234
  prefs: []
  type: TYPE_NORMAL
  zh: 但要充分利用它，你仍然需要用结构良好、战略性的提示来引导它。
- en: The 5 Pillars of Smart Prompting
  id: totrans-1235
  prefs: []
  type: TYPE_NORMAL
  zh: 智能提示的五大支柱
- en: 1\. Subject + Action
  id: totrans-1236
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 主题 + 行动
- en: Start with what the image should depict and what’s happening.
  id: totrans-1237
  prefs: []
  type: TYPE_NORMAL
  zh: 从图像应该描绘的内容和正在发生的事情开始。
- en: 'Example: “A child flying a red kite in a field of tall sunflowers.”'
  id: totrans-1238
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：“一个孩子在一片高高的向日葵田里放飞红色的风筝。”
- en: 2\. Environment + Mood
  id: totrans-1239
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 环境 + 氛围
- en: Set the scene and emotional tone.
  id: totrans-1240
  prefs: []
  type: TYPE_NORMAL
  zh: 设置场景和情感基调。
- en: 'Example: “During golden hour with warm lighting and a peaceful sky.”'
  id: totrans-1241
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：“在黄金时段，温暖的灯光和平静的天空下。”
- en: 3\. Style + Medium
  id: totrans-1242
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 风格 + 媒介
- en: Specify the desired artistic feel.
  id: totrans-1243
  prefs: []
  type: TYPE_NORMAL
  zh: 指定所需的审美感觉。
- en: 'Example: “In the style of Studio Ghibli watercolor animation.”'
  id: totrans-1244
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：“以吉卜力工作室水彩动画的风格。”
- en: 4\. Composition Details
  id: totrans-1245
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 构图细节
- en: Mention layout, angles, positioning.
  id: totrans-1246
  prefs: []
  type: TYPE_NORMAL
  zh: 提及布局、角度、位置。
- en: 'Example: “Wide-angle shot with the child in the foreground and mountains behind.”'
  id: totrans-1247
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：“广角镜头，孩子在前景，山脉在后。”
- en: 5\. Optional Enhancers
  id: totrans-1248
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 可选增强器
- en: Include camera types, film grain, lighting effects, or design terms.
  id: totrans-1249
  prefs: []
  type: TYPE_NORMAL
  zh: 包括相机类型、胶片颗粒、照明效果或设计术语。
- en: 'Example: “Soft focus, shallow depth of field, natural lens flare.”'
  id: totrans-1250
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：“柔和焦点，浅景深，自然镜头光晕。”
- en: Prompting Mistakes to Avoid
  id: totrans-1251
  prefs: []
  type: TYPE_NORMAL
  zh: 需要避免的提示错误
- en: 'Being too vague: “A bird in nature” gives little to work with.'
  id: totrans-1252
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 过于模糊：“自然界中的一只鸟”提供的可操作空间很小。
- en: 'Overloading the prompt: Stuffing too many ideas can confuse the model.'
  id: totrans-1253
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提示过载：塞入太多想法可能会让模型困惑。
- en: 'Skipping style cues: Without direction, it defaults to generic aesthetics.'
  id: totrans-1254
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 跳过风格提示：没有方向，它默认为通用美学。
- en: 'Not iterating: The first generation is rarely the best—refine!'
  id: totrans-1255
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 不进行迭代：第一代很少是最好的——需要改进！
- en: 'From Prompt to Perfection: Iteration in Action'
  id: totrans-1256
  prefs: []
  type: TYPE_NORMAL
  zh: 从提示到完美：迭代在行动
- en: 'Let’s walk through an intelligent prompting example:'
  id: totrans-1257
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们通过一个智能提示的例子来了解一下：
- en: 'Basic Prompt:'
  id: totrans-1258
  prefs: []
  type: TYPE_NORMAL
  zh: 基本提示：
- en: “A woman standing on a cliff at sunset.”
  id: totrans-1259
  prefs: []
  type: TYPE_NORMAL
  zh: “一位女性站在日落时的悬崖上。”
- en: 'Improved Prompt:'
  id: totrans-1260
  prefs: []
  type: TYPE_NORMAL
  zh: 改进的提示：
- en: “A young woman in a flowing red dress stands on a cliff edge, gazing over a
    calm ocean during sunset. Soft golden light reflects off the waves. Realistic
    painting style with cinematic contrast and soft shadows.”
  id: totrans-1261
  prefs: []
  type: TYPE_NORMAL
  zh: “一位年轻女性穿着飘逸的红色连衣裙站在悬崖边缘，在日落时分凝视着平静的大海。柔和的金色光芒在波浪上反射。现实主义绘画风格，具有电影般的对比度和柔和的阴影。”
- en: 'Refinement Request (via ChatGPT + DALL·E):'
  id: totrans-1262
  prefs: []
  type: TYPE_NORMAL
  zh: 精细请求（通过ChatGPT + DALL·E）：
- en: “Can you move the sun slightly lower, add some wind in her hair, and make the
    scene feel more romantic, like a film still?”
  id: totrans-1263
  prefs: []
  type: TYPE_NORMAL
  zh: “你能把太阳稍微移低一点，在她头发上增加一些风，让场景感觉更浪漫，像电影剧照一样吗？”
- en: This iterative, conversational control is a game-changer in visual storytelling.
  id: totrans-1264
  prefs: []
  type: TYPE_NORMAL
  zh: 这种迭代、对话式的控制是视觉叙事中的变革者。
- en: Advanced Tips
  id: totrans-1265
  prefs: []
  type: TYPE_NORMAL
  zh: 高级技巧
- en: Use metaphorical descriptions (e.g., “sky painted in fire and silk”) to evoke
    emotion.
  id: totrans-1266
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用隐喻性的描述（例如，“天空被火焰和丝绸描绘”）来唤起情感。
- en: Mention specific artists, time periods, or genres to nail a style (e.g., “inspired
    by 1920s Art Deco posters”).
  id: totrans-1267
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提及具体的艺术家、时期或流派以确定风格（例如，“受20世纪20年代装饰艺术海报的启发”）。
- en: Describe light sources and materials to enhance realism.
  id: totrans-1268
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 描述光源和材料以增强现实主义。
- en: Prompt Templates You Can Use
  id: totrans-1269
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以使用的提示模板
- en: 'Template 1: Fantasy Concept Art'
  id: totrans-1270
  prefs: []
  type: TYPE_NORMAL
  zh: 模板1：幻想概念艺术
- en: “A [character] in a [setting], lit by [lighting], in the style of [style]. Add
    [props/mood elements].”
  id: totrans-1271
  prefs: []
  type: TYPE_NORMAL
  zh: “一个[角色]在一个[场景]中，被[照明]照亮，以[风格]的风格。添加[道具/氛围元素]。”
- en: 'Template 2: Product Mockup'
  id: totrans-1272
  prefs: []
  type: TYPE_NORMAL
  zh: 模板 2：产品原型
- en: “A [product] placed on a [surface] with [background style], photographed with
    [camera type], and soft shadows.”
  id: totrans-1273
  prefs: []
  type: TYPE_NORMAL
  zh: “将[产品]放置在[表面]上，使用[背景风格]拍摄，并带有柔和的阴影。”
- en: 'Template 3: Educational Diagram'
  id: totrans-1274
  prefs: []
  type: TYPE_NORMAL
  zh: 模板 3：教育图表
- en: “A clear, labeled visual diagram of [concept], using [color scheme], [style],
    and minimal clutter.”
  id: totrans-1275
  prefs: []
  type: TYPE_NORMAL
  zh: “使用[色彩方案]，[风格]和最小杂乱的[概念]的清晰、标注的视觉图解。”
- en: 'Conclusion: Direct the Scene, Don’t Just Describe It'
  id: totrans-1276
  prefs: []
  type: TYPE_NORMAL
  zh: 结论：指导场景，而不仅仅是描述它
- en: Prompting DALL·E 3 isn’t just about what you say—it’s about how you compose
    your vision. Think like a director, not just a describer. Tell the AI the story,
    the feeling, the style, and the visual priorities. Treat your words as brushstrokes,
    and you’ll unlock imagery that resonates, inspires, and communicates with depth.
  id: totrans-1277
  prefs: []
  type: TYPE_NORMAL
  zh: 提示 DALL·E 3 不只是关于你说了什么——而是关于你如何构思你的愿景。像导演一样思考，而不仅仅是描述者。告诉 AI 故事、感觉、风格和视觉重点。把你的话当作画笔，你将解锁共鸣、启发和深度沟通的图像。
- en: 'Chapter 23: Exploring Creative Art Styles'
  id: totrans-1278
  prefs: []
  type: TYPE_NORMAL
  zh: 第 23 章：探索创意艺术风格
- en: DALL·E 3 isn’t just a tool for generating images—it’s a gateway to exploring
    the vast world of artistic expression. With the right prompts, you can experiment
    with hundreds of visual styles, from ancient calligraphy to futuristic 3D renderings.
    This chapter is your guide to unleashing that creative power through stylistic
    exploration.
  id: totrans-1279
  prefs: []
  type: TYPE_NORMAL
  zh: DALL·E 3 不只是生成图像的工具——它是探索广阔艺术表达世界的门户。有了正确的提示，你可以尝试数百种视觉风格，从古代书法到未来主义 3D 渲染。这一章节是你的指南，通过风格探索释放这种创造力。
- en: Why Art Style Matters in Visual AI
  id: totrans-1280
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么艺术风格在视觉 AI 中很重要
- en: 'The same prompt—say, “a cat sitting on a windowsill”—can look dramatically
    different depending on the art style you specify:'
  id: totrans-1281
  prefs: []
  type: TYPE_NORMAL
  zh: 同样的提示——比如，“一只猫坐在窗台上”——根据你指定的艺术风格，可以看起来截然不同：
- en: 'Photorealistic: Crisp shadows, fine texture, and real-world accuracy.'
  id: totrans-1282
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 写实主义：清晰的阴影，细腻的纹理，和现实世界的准确性。
- en: 'Cartoon: Exaggerated features, bold lines, and simplified forms.'
  id: totrans-1283
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 卡通：夸张的特征，粗线条，和简化的形式。
- en: 'Oil Painting: Rich textures, brushstroke patterns, and moodier lighting.'
  id: totrans-1284
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 油画：丰富的纹理，笔触图案，和更暗淡的照明。
- en: 'Cyberpunk: Neon colors, high-tech themes, and urban dystopia.'
  id: totrans-1285
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 网络朋克：霓虹色，高科技主题，和城市反乌托邦。
- en: 'Minimalist: Clean lines, negative space, and visual focus.'
  id: totrans-1286
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 极简主义：干净的线条，负空间，和视觉焦点。
- en: Each style tells a different story—and your choice of style shapes how your
    audience feels.
  id: totrans-1287
  prefs: []
  type: TYPE_NORMAL
  zh: 每种风格都讲述着不同的故事——而你选择的风格塑造了你的观众感受。
- en: Popular Art Styles to Try
  id: totrans-1288
  prefs: []
  type: TYPE_NORMAL
  zh: 值得尝试的流行艺术风格
- en: 'Here are some styles you can include in your prompts to achieve distinctive
    aesthetics:'
  id: totrans-1289
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一些你可以包含在提示中以实现独特美学的风格：
- en: 1\. Realism & Photography
  id: totrans-1290
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 现实主义与摄影
- en: Photorealistic
  id: totrans-1291
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 写实主义
- en: DSLR-style
  id: totrans-1292
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 单反相机风格
- en: Cinematic lighting
  id: totrans-1293
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 电影照明
- en: Macro photography
  id: totrans-1294
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 微距摄影
- en: 2\. Traditional Art
  id: totrans-1295
  prefs: []
