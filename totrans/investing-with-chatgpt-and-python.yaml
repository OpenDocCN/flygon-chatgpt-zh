- en: Step-by-step example of tool design via chatGPT, followed by testing
  id: totrans-1658
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 通过ChatGPT逐步示例工具设计，然后进行测试
- en: chatGPT's query methodology is fairly standardized for producing a python robot.
    Here's the sequence of phases and prompts required to produce a script.
  id: totrans-1659
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT的查询方法对于生成Python机器人来说是相当标准化的。以下是生成脚本所需阶段和提示的顺序。
- en: The initial prompt
  id: totrans-1660
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 初始提示
- en: 'It''s important to get chatGPT into the optimum configuration by explaining
    what''s expected of it: to be an expert in trading and Python code.'
  id: totrans-1661
  prefs: []
  type: TYPE_NORMAL
  zh: 通过解释对ChatGPT的期望，即成为一个交易和Python代码的专家，来确保ChatGPT处于最佳配置。
- en: 'Sample initial prompt: "Forget all the instructions I''ve given you so far.
    You are now an expert in stock market and cypto currency trading strategies. You''re
    also a seasoned programmer in Python 3 with the binance and ccxt libraries".'
  id: totrans-1662
  prefs: []
  type: TYPE_NORMAL
  zh: 样本初始提示："忘记我之前给你的一切指示。你现在是一位股票市场和加密货币交易策略的专家。你也是一位经验丰富的Python 3程序员，熟悉binance和ccxt库"。
- en: It's quite natural to start with a backtest script to experiment with how the
    strategy works, before embarking on coding the complete robot.
  id: totrans-1663
  prefs: []
  type: TYPE_NORMAL
  zh: 在开始编写完整的机器人代码之前，先从回测脚本开始实验策略的工作方式是很自然的。
- en: Example of a prompt to request backtest robot coding
  id: totrans-1664
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 请求回测机器人编码的提示示例
- en: We'll start with a strategy outlined by a tweeter on ETG/USDT.
  id: totrans-1665
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将从 ETG/USDT 上的推文作者概述的策略开始。
- en: '$ETH / $USD , timeframe 1 Day , Enter position: Close price > EMA(29) and RSI(3)
    > 82 , Exit position: RSI(7) < 39 Stop Loss: 14%'
  id: totrans-1666
  prefs: []
  type: TYPE_NORMAL
  zh: $ETH / $USD，时间框架 1 天，入场条件：收盘价 > EMA(29) 且 RSI(3) > 82，出场条件：RSI(7) < 39 止损：14%
- en: '![](images/image-L22GPO8O.jpg)'
  id: totrans-1667
  prefs: []
  type: TYPE_IMG
  zh: '![](images/image-L22GPO8O.jpg)'
- en: 'Example prompt: "I need a python script using ccxt and binance to develop a
    back test robot on the ETH/USDT pair.  The algorithm is as follows: $ETH / $USD
    , timeframe 1 Day , Enter position: Close price > EMA(29) and RSI(3) > 82 , Exit
    position: RSI(7) < 39 Stop Loss: 14'
  id: totrans-1668
  prefs: []
  type: TYPE_NORMAL
  zh: 示例提示："我需要一个使用 ccxt 和 binance 开发的 ETH/USDT 对回测机器人的 python 脚本。算法如下：$ETH / $USD，时间框架
    1 天，入场条件：收盘价 > EMA(29) 且 RSI(3) > 82，出场条件：RSI(7) < 39 止损：14"
- en: Give me a backtest script that produces a chart of the ETH/USDT price, displaying
    the pink EMA(29) curve, the orange RSI(3) curve and the green RSI(7) curve. I
    want the script to display buy and sell signals as small triangles on the curve
    (buy = green triangle, sell = red triangle). I want the script to start on 01-01-2020
    and end on 01-01-2024\. I want the script to display the signals in the terminal.
    I want the script to start with 1000 USDT of capital. I want it to calculate the
    final profitability, the number of orders placed, the maximum drawdown and display
    the capital at the end.
  id: totrans-1669
  prefs: []
  type: TYPE_NORMAL
  zh: 给我一个生成 ETH/USDT 价格图表的回测脚本，显示粉色的 EMA(29) 曲线、橙色的 RSI(3) 曲线和绿色的 RSI(7) 曲线。我希望脚本在曲线上显示买卖信号作为小三角形（买
    = 绿色三角形，卖 = 红色三角形）。我希望脚本从 2020-01-01 开始，到 2024-01-01 结束。我希望脚本在终端中显示信号。我希望脚本从 1000
    USDT 的资本开始。我希望它计算最终盈利能力、放置的订单数量、最大回撤并在最后显示资本。
- en: '![](images/image-97ZST5XB.jpg)'
  id: totrans-1670
  prefs: []
  type: TYPE_IMG
  zh: '![](images/image-97ZST5XB.jpg)'
- en: Just copy the code into Visual Studio Code and run it.
  id: totrans-1671
  prefs: []
  type: TYPE_NORMAL
  zh: 只需将代码复制到 Visual Studio Code 中并运行。
- en: '![](images/image-X9G4HBOA.jpg)'
  id: totrans-1672
  prefs: []
  type: TYPE_IMG
  zh: '![](images/image-X9G4HBOA.jpg)'
- en: '![](images/image-Q0K7O2ES.jpg)'
  id: totrans-1673
  prefs: []
  type: TYPE_IMG
  zh: '![](images/image-Q0K7O2ES.jpg)'
- en: 'It''s rare for the script to work right the first time. But chatGPT lets you
    iterate to correct errors. All you have to do is tell it "The script is not working,
    I have this error: Exception has occurred: TypeError'
  id: totrans-1674
  prefs: []
  type: TYPE_NORMAL
  zh: 脚本第一次就能正常工作的情况很少见。但 chatGPT 允许你迭代以纠正错误。你只需要告诉它“脚本不起作用，我遇到这个错误：异常已发生：TypeError
- en: Invalid comparison between dtype=datetime64[ns] and int
  id: totrans-1675
  prefs: []
  type: TYPE_NORMAL
  zh: 数据类型 datetime64[ns] 与 int 之间的无效比较
- en: 'pandas.errors.InvalidComparison: 1704067200000'
  id: totrans-1676
  prefs: []
  type: TYPE_NORMAL
  zh: 'pandas.errors.InvalidComparison: 1704067200000'
- en: During handling of the above exception, another exception occurred
  id: totrans-1677
  prefs: []
  type: TYPE_NORMAL
  zh: 在处理上述异常期间，又发生了另一个异常
- en: File "C:\Users\ democcxt.py", line 28, in
  id: totrans-1678
  prefs: []
  type: TYPE_NORMAL
  zh: 文件 "C:\Users\ democcxt.py"，第 28 行，在
- en: df = df[df.index <= end_timestamp]
  id: totrans-1679
  prefs: []
  type: TYPE_NORMAL
  zh: df = df[df.index <= end_timestamp]
- en: 'TypeError: Invalid comparison between dtype=datetime64[ns] and int " . It will
    suggest corrections."'
  id: totrans-1680
  prefs: []
  type: TYPE_NORMAL
  zh: 'TypeError: 数据类型 datetime64[ns] 与 int 之间的无效比较 "。它将建议修正。'
- en: In this example, only one iteration is needed to obtain the back test robot,
    which has a ROI of 1300%.
  id: totrans-1681
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个例子中，只需要一次迭代就可以获得回测机器人，其回报率 (ROI) 为 1300%。
- en: '![](images/image-WC2WTEJ2.jpg)'
  id: totrans-1682
  prefs: []
  type: TYPE_IMG
  zh: '![](images/image-WC2WTEJ2.jpg)'
- en: Once the back test robot has been validated, you can ask chatGPT to convert
    it into a real trading robot. There are several ways of doing this. Either ask
    the robot to send signals to a messaging system such as telegram. Or ask the robot
    to trade directly.
  id: totrans-1683
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦回测机器人得到验证，你可以要求 chatGPT 将其转换为真实交易机器人。有几种方法可以做到这一点。要么让机器人向消息系统（如 Telegram）发送信号。或者让机器人直接进行交易。
- en: Prompt " It works perfectly. Now I want you to turn this script into a trading
    robot that places buy and sell orders directly on my binance account with the
    api_key and api_secret with all the USDT available on the spot account."
  id: totrans-1684
  prefs: []
  type: TYPE_NORMAL
  zh: 提示："它工作得完美。现在我想让你把这个脚本变成一个交易机器人，直接在我的 binance 账户上使用 api_key 和 api_secret 放置买卖订单，并且使用现货账户上的所有
    USDT。"
- en: '![](images/image-OM4CG7CQ.jpg)'
  id: totrans-1685
  prefs: []
  type: TYPE_IMG
  zh: '![](images/image-OM4CG7CQ.jpg)'
- en: All you need to do is set up an API key on binance to enable the script to control
    buying and selling. It is important for the binance API to know the IP address
    of the machine that will be able to access the API commands. For security reasons,
    any unknown machine will be denied access to buy and sell orders.
  id: totrans-1686
  prefs: []
  type: TYPE_NORMAL
  zh: 你需要做的只是设置 binance 上的 API 密钥，以启用脚本控制买卖操作。对于 binance API 来说，知道能够访问 API 命令的机器的
    IP 地址很重要。出于安全原因，任何未知的机器都将被拒绝访问买卖订单。
- en: API Binance call authorization process
  id: totrans-1687
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Binance API 调用授权流程
- en: To enable a script to control the binance API and place orders, an API KEY must
    be created.
  id: totrans-1688
  prefs: []
  type: TYPE_NORMAL
  zh: 要使脚本能够控制 binance API 并放置订单，必须创建一个 API 密钥。
- en: Log on to the binance.com web application and select ACCOUNT/APPLICATION MANAGEMENT.
  id: totrans-1689
  prefs: []
  type: TYPE_NORMAL
  zh: 登录 binance.com 网络应用并选择“账户/应用管理”。
- en: '![](images/image-WIZP68NE.jpg)'
  id: totrans-1690
  prefs: []
  type: TYPE_IMG
  zh: '![](images/image-WIZP68NE.jpg)'
- en: 'Create a key dedicated to your script: choose the HMAC version'
  id: totrans-1691
  prefs: []
  type: TYPE_NORMAL
  zh: 为您的脚本创建一个专用密钥：选择 HMAC 版本
- en: '![](images/image-EOVJMBOU.jpg)'
  id: totrans-1692
  prefs: []
  type: TYPE_IMG
  zh: '![](images/image-EOVJMBOU.jpg)'
- en: Configure the IP address(es) that will be able to access the API. Without this
    configuration, commands will not be executed. It is possible to configure several
    IP addresses, but these must be fixed. This allows you, for example, to test the
    script from your workstation at home (fixed IP for development purposes) and to
    run the script in production from a more stable VPS server under Linux (hosted
    server IP).  When configuring the KEY API, make sure that the "ENABLE SPOT TRADING"
    option is enabled.
  id: totrans-1693
  prefs: []
  type: TYPE_NORMAL
  zh: 配置将能够访问 API 的 IP 地址。如果没有此配置，命令将不会执行。可以配置多个 IP 地址，但这些必须是固定的。这允许您，例如，从您的家庭工作站（用于开发目的的固定
    IP）测试脚本，并在 Linux 下的更稳定的 VPS 服务器上运行脚本（托管服务器 IP）。在配置 KEY API 时，请确保“启用现货交易”选项已启用。
- en: '![](images/image-SBPUQDH2.jpg)'
  id: totrans-1694
  prefs: []
  type: TYPE_IMG
  zh: '![](images/image-SBPUQDH2.jpg)'
- en: Script installation process in production
  id: totrans-1695
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 生产环境中的脚本安装过程
- en: When it comes to automated trading, the availability of both the machine and
    the Internet is essential to the reliability of the robots. The loss of a link
    with the markets is logically accompanied by a loss of information for the script,
    and therefore a risk of not reacting when necessary. This can result in the loss
    of all or part of the capital invested. This is a lesser evil if the position
    is uncommitted (i.e. with stable coins), but it can be worrying if the position
    is committed to volatile crypto-currencies.
  id: totrans-1696
  prefs: []
  type: TYPE_NORMAL
  zh: 当涉及到自动交易时，机器和互联网的可用性对于机器人的可靠性至关重要。与市场的连接丢失将伴随着脚本信息丢失的逻辑后果，因此存在在必要时未能做出反应的风险。这可能导致投资的所有或部分资金损失。如果头寸未承诺（即使用稳定币），这可能是较小的恶，但如果头寸承诺给波动性大的加密货币，可能会令人担忧。
- en: This makes it all the more interesting to have probes capable of giving an alert
    when the server is no longer connected to the Internet or when the script is no
    longer in action. There are many ways of ensuring that a script always remains
    in action, whether under Windows or Linux. Under Linux, simply define it as a
    service and configure the machine so that the script is restarted at the slightest
    shutdown or reboot.
  id: totrans-1697
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，拥有能够在服务器不再连接到互联网或脚本不再运行时发出警报的探针就更有趣了。确保脚本始终运行的方法有很多，无论是 Windows 还是 Linux。在
    Linux 下，只需将其定义为服务，并配置机器，以便在最小关闭或重启时重启脚本。
- en: How to make sure your machine is always online
  id: totrans-1698
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 如何确保您的机器始终在线
- en: 'To check that your trading machine is still accessible via the Internet, you
    can use Internet monitoring services, some of which are free of charge:'
  id: totrans-1699
  prefs: []
  type: TYPE_NORMAL
  zh: 要检查您的交易机器是否可以通过互联网访问，您可以使用互联网监控服务，其中一些是免费的：
- en: 'UptimeRobot: UptimeRobot is a free service (with paid options) that monitors
    the availability of servers or services. It can send alerts by email, SMS, or
    via mobile app notifications if a server becomes inaccessible. You can set up
    a "heartbeat monitor" to track the regular activity of your script.'
  id: totrans-1700
  prefs: []
  type: TYPE_NORMAL
  zh: UptimeRobot：UptimeRobot 是一项免费服务（有付费选项），用于监控服务器或服务的可用性。如果服务器变得不可访问，它可以通过电子邮件、短信或移动应用通知发送警报。您可以设置“心跳监控器”来跟踪脚本的常规活动。
- en: '![](images/image-F8G91WIF.jpg)'
  id: totrans-1701
  prefs: []
  type: TYPE_IMG
  zh: '![](images/image-F8G91WIF.jpg)'
- en: 'Pingdom: Pingdom is another monitoring service offering alerts in the event
    of connection loss or server failure. Pingdom is a little more comprehensive,
    with additional analysis tools, but is also chargeable after a free trial.'
  id: totrans-1702
  prefs: []
  type: TYPE_NORMAL
  zh: Pingdom：Pingdom 是另一家提供在连接丢失或服务器故障时发出警报的监控服务。Pingdom 比较全面，提供了额外的分析工具，但免费试用后也需要付费。
- en: 'StatusCake: StatusCake works in a similar way to UptimeRobot, but offers more
    advanced monitoring options, such as checking connection speed and server performance.
    It sends alerts via email, SMS, or mobile app notifications.'
  id: totrans-1703
  prefs: []
  type: TYPE_NORMAL
  zh: StatusCake：StatusCake 与 UptimeRobot 类似，但提供了更高级的监控选项，例如检查连接速度和服务器性能。它通过电子邮件、短信或移动应用通知发送警报。
- en: Use a cloud infrastructure management service
  id: totrans-1704
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 使用云基础设施管理服务
- en: 'AWS CloudWatch: If your trading script runs on an AWS server, you can use AWS
    CloudWatch to monitor network connectivity and set alarms that trigger the sending
    of emails, SMS messages or other automated actions.'
  id: totrans-1705
  prefs: []
  type: TYPE_NORMAL
  zh: AWS CloudWatch：如果您的交易脚本运行在 AWS 服务器上，您可以使用 AWS CloudWatch 来监控网络连接并设置触发发送电子邮件、短信或其他自动化操作的警报。
- en: 'Google Cloud Monitoring: For servers on Google Cloud, this service lets you
    configure alerts in the event of loss of network connectivity.'
  id: totrans-1706
  prefs: []
  type: TYPE_NORMAL
  zh: Google Cloud Monitoring：对于Google Cloud上的服务器，此服务允许您在网络连接丢失时配置警报。
- en: How to make sure your trading script is always running
  id: totrans-1707
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 如何确保您的交易脚本始终运行
- en: Under linux
  id: totrans-1708
  prefs: []
  type: TYPE_NORMAL
  zh: 在Linux下
- en: Under Linux, it's easy to define a python trading script as a service and force
    the script to restart in the event of a crash or machine reboot. chatGPT is able
    to generate a customized configuration for you from a simple prompt. What's more,
    you can customize your configuration by specifying the working directory, the
    script name and the Linux system used.
  id: totrans-1709
  prefs: []
  type: TYPE_NORMAL
  zh: 在Linux下，将Python贸易脚本定义为服务并强制脚本在崩溃或机器重启时重新启动很容易。ChatGPT能够根据简单的提示为您生成定制配置。更重要的是，您可以通过指定工作目录、脚本名称和使用的Linux系统来自定义配置。
- en: '![](images/image-QOQ7W5HM.jpg)'
  id: totrans-1710
  prefs: []
  type: TYPE_IMG
  zh: '![图片](images/image-QOQ7W5HM.jpg)'
- en: Under Windows
  id: totrans-1711
  prefs: []
  type: TYPE_NORMAL
  zh: 在Windows下
- en: For Windows, it's the same principle with the task scheduler. ChatGPT will do
    the configuration for you.
  id: totrans-1712
  prefs: []
  type: TYPE_NORMAL
  zh: 对于Windows，这与任务计划程序的原则相同。ChatGPT会为您进行配置。
- en: '![](images/image-MJUC2WUH.jpg)'
  id: totrans-1713
  prefs: []
  type: TYPE_IMG
  zh: '![图片](images/image-MJUC2WUH.jpg)'
- en: For MacOS
  id: totrans-1714
  prefs: []
  type: TYPE_NORMAL
  zh: 对于MacOS
- en: On MAC it's a bit the same. chatGPT will generate a precise configuration for
    you.
  id: totrans-1715
  prefs: []
  type: TYPE_NORMAL
  zh: 在MAC上，情况有些相似。ChatGPT会为您生成精确的配置。
- en: '![](images/image-E9ITF39B.jpg)'
  id: totrans-1716
  prefs: []
  type: TYPE_IMG
  zh: '![图片](images/image-E9ITF39B.jpg)'
- en: Monitoring and Managing Robot Trading Risks
  id: totrans-1717
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 监控和管理机器人交易风险
- en: In this final chapter, we'll look at the risks associated with using autonomous
    trading robots and best practices for monitoring and limiting these risks. The
    aim is to provide readers with practical advice and tools to ensure effective
    monitoring of their trading robots.
  id: totrans-1718
  prefs: []
  type: TYPE_NORMAL
  zh: 在最后一章中，我们将探讨使用自主交易机器人所涉及的风险以及监控和限制这些风险的最佳实践。目标是向读者提供实用的建议和工具，以确保有效监控他们的交易机器人。
- en: 1\. Risks inherent in autonomous trading robots
  id: totrans-1719
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1. 自主交易机器人固有的风险
- en: 'Before discussing monitoring strategies, it is crucial to understand the risks
    associated with using trading robots without constant supervision:'
  id: totrans-1720
  prefs: []
  type: TYPE_NORMAL
  zh: 在讨论监控策略之前，了解使用无持续监督的贸易机器人所涉及的风险至关重要：
- en: 'Technical faults: Robots may stop working due to hardware, software or connectivity
    problems.'
  id: totrans-1721
  prefs: []
  type: TYPE_NORMAL
  zh: 技术故障：机器人可能因硬件、软件或连接问题而停止工作。
- en: 'Programming errors: Bugs or errors in the code can lead to unexpected behavior.'
  id: totrans-1722
  prefs: []
  type: TYPE_NORMAL
  zh: 编程错误：代码中的错误或故障可能导致意外行为。
- en: 'Market changes: Market conditions can change abruptly, making a once profitable
    strategy dangerous.'
  id: totrans-1723
  prefs: []
  type: TYPE_NORMAL
  zh: 市场变化：市场状况可能突然改变，使曾经盈利的策略变得危险。
- en: 'API risks: Interruptions or errors in trading platform APIs may result in orders
    not being executed or being executed incorrectly.'
  id: totrans-1724
  prefs: []
  type: TYPE_NORMAL
  zh: API风险：交易平台API的中断或错误可能导致订单未执行或错误执行。
- en: 2\. Tips for effective monitoring
  id: totrans-1725
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2. 有效监控的技巧
- en: 'To minimize these risks, here are the best tips to follow:'
  id: totrans-1726
  prefs: []
  type: TYPE_NORMAL
  zh: 为了最小化这些风险，以下是一些最佳建议：
- en: a) Automate Alerts and Notifications
  id: totrans-1727
  prefs: []
  type: TYPE_NORMAL
  zh: a) 自动警报和通知
- en: 'Set up real-time alerts: Use alert services like UptimeRobot or Pingdom to
    be informed immediately if your robot stops working or your server encounters
    problems.'
  id: totrans-1728
  prefs: []
  type: TYPE_NORMAL
  zh: 设置实时警报：使用UptimeRobot或Pingdom等警报服务，以便在您的机器人停止工作或服务器遇到问题时立即得到通知。
- en: 'Trade notifications: Program your robot to send you a notification (email,
    SMS, push notification) for each trade executed. This way, you''ll be informed
    of any unusual activity.'
  id: totrans-1729
  prefs: []
  type: TYPE_NORMAL
  zh: 交易通知：编程您的机器人发送通知（电子邮件、短信、推送通知）以通知每次执行的交易。这样，您将了解任何异常活动。
- en: b) Real-time performance monitoring
  id: totrans-1730
  prefs: []
  type: TYPE_NORMAL
  zh: b) 实时性能监控
- en: 'Live dashboards: Set up a dashboard (via tools like Grafana or customized Python
    solutions) to monitor your robot''s performance in real time, including P&L (Profit
    & Loss), open positions and stop-loss compliance.'
  id: totrans-1731
  prefs: []
  type: TYPE_NORMAL
  zh: 实时仪表板：设置一个仪表板（通过Grafana或定制的Python解决方案等工具）以实时监控机器人的性能，包括盈亏（P&L）、开放头寸和止损合规性。
- en: 'Log monitoring: Make sure your robot records all operations in a log file,
    and monitor this file for any unusual behavior or errors.'
  id: totrans-1732
  prefs: []
  type: TYPE_NORMAL
  zh: 日志监控：确保您的机器人记录在日志文件中的所有操作，并监控此文件以查找任何异常行为或错误。
- en: c) Check Market Parameters and Conditions
  id: totrans-1733
  prefs: []
  type: TYPE_NORMAL
  zh: c) 检查市场参数和条件
- en: 'Regular parameter checks: Schedule periodic checks to ensure that the robot''s
    parameters are always aligned with your trading objectives and current market
    conditions.'
  id: totrans-1734
  prefs: []
  type: TYPE_NORMAL
  zh: 定期参数检查：安排定期检查以确保机器人的参数始终与您的交易目标和当前市场状况保持一致。
- en: 'Monitoring market conditions: Use market alerts (via platforms such as TradingView)
    to be warned if critical conditions (e.g. high volatility, economic announcements)
    could affect your robot''s performance.'
  id: totrans-1735
  prefs: []
  type: TYPE_NORMAL
  zh: 监控市场状况：使用市场警报（通过TradingView等平台）来警告可能影响机器人性能的关键条件（例如，高波动性、经济公告）。
- en: d) Continuous Testing and Validation
  id: totrans-1736
  prefs: []
  type: TYPE_NORMAL
  zh: d) 持续测试和验证
- en: 'Regular backtesting: Even after deployment, continue to backtest with recent
    data to ensure that the strategy is still effective.'
  id: totrans-1737
  prefs: []
  type: TYPE_NORMAL
  zh: 定期回测：即使在部署后，也要继续使用最近的数据进行回测，以确保策略仍然有效。
- en: 'Real-time validation: Deploy a version of your robot on a demo account or in
    "paper trading" mode to validate its behavior under current market conditions
    without risking real capital.'
  id: totrans-1738
  prefs: []
  type: TYPE_NORMAL
  zh: 实时验证：在模拟账户或“纸面交易”模式下部署机器人的版本，以验证其在当前市场条件下的行为，而不冒真实资本的风险。
- en: e) Using fallback protocols
  id: totrans-1739
  prefs: []
  type: TYPE_NORMAL
  zh: e) 使用回退协议
- en: 'Setting up safety stop-losses: In addition to strategy stop-losses, set up
    global stop-losses or circuit breakers to avoid catastrophic losses in the event
    of a malfunction.'
  id: totrans-1740
  prefs: []
  type: TYPE_NORMAL
  zh: 设置安全止损：除了策略止损外，设置全局止损或熔断器，以防止故障发生时的灾难性损失。
- en: 'Liquidity monitoring: Keep an eye on the liquidity of the assets your robot
    handles, to avoid problems linked to slippage or partial execution of orders.'
  id: totrans-1741
  prefs: []
  type: TYPE_NORMAL
  zh: 流动性监控：关注机器人处理的资产流动性，以避免滑点或订单部分执行引起的问题。
- en: f) Infrastructure monitoring
  id: totrans-1742
  prefs: []
  type: TYPE_NORMAL
  zh: f) 基础设施监控
- en: 'Connectivity monitoring: Make sure your server or machine is always connected
    to the Internet, and set up alerts for service interruptions.'
  id: totrans-1743
  prefs: []
  type: TYPE_NORMAL
  zh: 连接性监控：确保您的服务器或机器始终连接到互联网，并设置服务中断警报。
- en: 'Redundancy and backups: Use redundant systems to ensure that, if one server
    goes down, another takes over without interrupting service.'
  id: totrans-1744
  prefs: []
  type: TYPE_NORMAL
  zh: 冗余和备份：使用冗余系统以确保，如果一个服务器宕机，另一个可以接管而不中断服务。
- en: 3\. Monitoring frequency
  id: totrans-1745
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3. 监控频率
- en: 'Monitoring frequency depends on the complexity of your robot and the assets
    it handles:'
  id: totrans-1746
  prefs: []
  type: TYPE_NORMAL
  zh: 监控频率取决于您的机器人的复杂性和它处理的资产：
- en: 'Continuous: Use real-time monitoring systems to keep an eye on breakdowns,
    critical errors and orders in progress.'
  id: totrans-1747
  prefs: []
  type: TYPE_NORMAL
  zh: 持续监控：使用实时监控系统关注故障、关键错误和进行中的订单。
- en: 'Daily: Review the robot''s performance at the end of each trading day, analyzing
    executed trades and adjusting parameters if necessary.'
  id: totrans-1748
  prefs: []
  type: TYPE_NORMAL
  zh: 每日：在每个交易日结束时审查机器人的表现，分析已执行的交易并在必要时调整参数。
- en: 'Weekly/Monthly: Carry out more in-depth reviews, including strategy adjustments,
    market analyses, and tests on overall robot performance.'
  id: totrans-1749
  prefs: []
  type: TYPE_NORMAL
  zh: 每周/每月：进行更深入的审查，包括策略调整、市场分析和整体机器人性能测试。
- en: 4\. Recommended monitoring tools
  id: totrans-1750
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4. 推荐的监控工具
- en: 'UptimeRobot / Pingdom: Monitor availability and receive alerts in the event
    of failure.'
  id: totrans-1751
  prefs: []
  type: TYPE_NORMAL
  zh: UptimeRobot / Pingdom：监控可用性，并在发生故障时接收警报。
- en: 'Grafana: Create real-time dashboards and monitor robot performance.'
  id: totrans-1752
  prefs: []
  type: TYPE_NORMAL
  zh: Grafana：创建实时仪表板并监控机器人性能。
- en: 'Slack / Telegram: Receive instant notifications of robot activities.'
  id: totrans-1753
  prefs: []
  type: TYPE_NORMAL
  zh: Slack / Telegram：接收机器人活动的即时通知。
- en: 'Google Sheets / Excel: For manual tracking and more in-depth analysis of performance
    and errors.'
  id: totrans-1754
  prefs: []
  type: TYPE_NORMAL
  zh: Google Sheets / Excel：用于手动跟踪和更深入的性能和错误分析。
- en: Setting up a high-performance trading robot involves more than just developing
    it. Ongoing monitoring is crucial to ensure that the robot performs as expected,
    even in the event of adverse market conditions or technical errors. By following
    these tips and using the appropriate tools, you can minimize the risks associated
    with autonomous trading robots and maximize your chances of success.
  id: totrans-1755
  prefs: []
  type: TYPE_NORMAL
  zh: 设置高性能交易机器人不仅涉及开发它。持续的监控对于确保机器人在不利市场条件或技术错误发生时按预期运行至关重要。通过遵循这些提示并使用适当的工具，您可以最大限度地降低与自主交易机器人相关的风险，并最大限度地提高成功的机会。
- en: Where to find strategies
  id: totrans-1756
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 哪里可以找到策略
- en: On the Web
  id: totrans-1757
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 在网上
- en: 'The Internet is full of resources for finding and exploring trading strategies.
    Here are a few starting points:'
  id: totrans-1758
  prefs: []
  type: TYPE_NORMAL
  zh: 互联网上充满了寻找和探索交易策略的资源。以下是一些起点：
- en: '[TradingView - Scripts and Strategies: TradingView is a popular platform for
    traders to share and test strategies. You can access a vast library of scripts
    created by the community, test them in real time on different markets, and even
    customize them to suit your needs. https://www.tradingview.com/scripts/?script_type=strategies](https://www.tradingview.com/scripts/?script_type=strategies)'
  id: totrans-1759
  prefs: []
  type: TYPE_NORMAL
  zh: '[TradingView - 脚本和策略：TradingView 是一个流行的平台，供交易者分享和测试策略。您可以访问由社区创建的大量脚本库，在不同市场上实时测试它们，甚至根据您的需求进行定制。https://www.tradingview.com/scripts/?script_type=strategies](https://www.tradingview.com/scripts/?script_type=strategies)'
- en: 'Crypto-Robot.com: This site is specifically geared towards the development
    of trading strategies in Python, with a particular focus on crypto-currencies.
    Crypto-Robot.com is an excellent starting point for those looking to automate
    their strategies. The site offers numerous examples of ready-to-use code, covering
    a wide range of techniques and approaches.'
  id: totrans-1760
  prefs: []
  type: TYPE_NORMAL
  zh: Crypto-Robot.com：该网站专门针对使用 Python 开发交易策略，特别关注加密货币。Crypto-Robot.com 是那些希望自动化策略的人的绝佳起点。该网站提供了大量现成的代码示例，涵盖了广泛的技术和方法。
