  zh: '○        ****完整示例 :'
- en: '■        ****Ma**in** ****Que**stio**n: "****Wh**at** ****i**s** ****t**he**
    ****im**pac**t ****o**f** ****cli**mat**e ****ch**ang**e ****o**n** ****coa**sta**l
    ****comm**unitie**s? "'
  id: totrans-912
  prefs: []
  type: TYPE_NORMAL
  zh: '■        ****主要问题: "****气候变化对沿海社区的影响是什么？"'
- en: '■ ****Ini**tia**l ****Res**pons**e (****Pa**per** ****A**** - ****Envir**onment**al
    ****Scie**ntis**t): "****Cli**mat**e ****ch**ang**e ****i**s** ****incr**easin**g
    ****s**ea** ****le**vel**s, ****lea**din**g ****t**o** ****coa**sta**l ****ero**sio**n
    ****a**nd** ****t**he** ****ri**sk** ****o**f** ****flo**odin**g ****th**at**
    ****aff**ect**s ****coa**sta**l ****comm**unitie**s. ****Th**is** ****al**so**
    ****imp**act**s ****ma**rin**e ****a**nd** ****terr**estria**l ****biod**iversi**ty.
    "'
  id: totrans-913
  prefs: []
  type: TYPE_NORMAL
  zh: '■ ****初始响应（论文A - 环境科学家）: "****气候变化正在导致海平面上升，导致海岸侵蚀和洪水风险增加，这影响了沿海社区。这也影响了海洋和陆地生物多样性。"'
- en: '■ ****Ro**le** ****Rev**ersa**l (****Ro**le** ****B**** - ****Lo**cal** ****Res**iden**t):
    "****Ta**ke** ****t**he** ****pers**pectiv**e ****o**f** ****a**** ****lo**cal**
    ****res**iden**t ****conc**erne**d ****ab**out** ****cli**mat**e ****ch**ang**e.
    "'
  id: totrans-914
  prefs: []
  type: TYPE_NORMAL
  zh: ■ **角色反转**（**角色B - 当地居民）**：“**从一个对气候变化感到担忧的当地居民的角度来看。”**
- en: '■ ****Rev**erse**d ****Res**pons**e: "****A**s** ****a**** ****res**iden**t
    ****o**f** ****a**** ****coa**sta**l ****ar**ea**, ****I**** ****a**m** ****conc**erne**d
    ****ab**out** ****lo**sin**g ****m**y** ****ho**me** ****t**o** ****ero**sio**n
    ****a**nd** ****ri**sin**g ****s**ea** ****le**vel**s. ****Comm**unit**y ****infra**structu**re
    ****su**ch** ****a**s** ****sch**ool**s ****a**nd** ****ro**ads** ****a**re**
    ****incr**easing**ly ****thre**atene**d, ****a**nd** ****th**ere** ****i**s**
    ****a**** ****con**stan**t ****fe**ar** ****o**f** ****st**orm**s ****th**at**
    ****a**re** ****n**ow** ****mo**re** ****se**ver**e. "'
  id: totrans-915
  prefs: []
  type: TYPE_NORMAL
  zh: ■ **反向响应**：“**作为一名沿海地区的居民，我担心我的家园被侵蚀和海平面上升。社区基础设施，如学校和道路，越来越多地受到威胁，而且对现在更加严重的风暴的恐惧是持续的。”**
- en: '****Pr**omp**t ****exer**cise**s ****us**ing** ****t**he** ****ab**ove** ****tech**niqu**e]'
  id: totrans-916
  prefs: []
  type: TYPE_NORMAL
  zh: '**使用上述技术**进行**提示**练习。'
- en: '****A**sk** ****t**he** ****mo**del** ****t**o** "****Des**crib**e ****t**he**
    ****eff**ect**s ****o**f** ****globa**lizati**on." ****Fi**rst**, ****h**e** ****o**r**
    ****s**he** ****sh**oul**d ****ad**opt** ****t**he** ****po**int** ****o**f**
    ****vi**ew** ****o**f** ****a**** ****multi**nation**al ****busi**nessma**n (****Ro**le**
    ****A****). ****Th**en**, ****a**sk** ****h**im** ****o**r** ****h**er** ****t**o**
    ****ad**opt** ****t**he** ****po**int** ****o**f** ****vi**ew** ****o**f** ****a****
    ****sm**all** ****lo**cal** ****busi**nessma**n (****Ro**le** ****B****) ****a**nd**
    ****com**par**e.'
  id: totrans-917
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**请**问模型“**描述全球化的**影响**。”**首先，他应该采用**跨国企业家的**观点（**角色A**）。然后，要求他或她采用**小型本地企业家**的观点（**角色B**）并比较。'
- en: '****A**sk** “****Wh**at** ****i**s** ****t**he** ****im**pac**t ****o**f**
    ****wor**kin**g ****fr**om** ****ho**me** ****o**n** ****comp**anie**s?” ****a**nd**
    ****a**sk** ****t**he** ****mo**del** ****t**o** ****fi**rst** ****res**pon**d
    ****a**s** ****a**n** ****emp**loye**r (****Ro**le** ****A****) ****a**nd** ****th**en**
    ****a**s** ****a**n** ****emp**loye**e ****w**ho** ****fi**nds** ****i**t** ****diff**icul**t
    ****t**o** ****sep**arat**e ****wo**rk** ****a**nd** ****per**sona**l ****li**fe**
    (****Ro**le** ****B****).'
  id: totrans-918
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**请**问“**在家工作对公司的**影响**是什么？”**并要求模型首先以**雇主**（**角色A**）的身份回答，然后以**一个发现难以将工作和个人生活分开的员工**（**角色B**）的身份回答。'
- en: '****A**sk** ****t**he** ****mo**del** ****t**o** “****Exp**lai**n ****t**he**
    ****ben**efit**s ****o**f** ****on**lin**e ****educ**atio**n.” ****Fi**rst**,
    ****h**e** ****o**r** ****s**he** ****sh**oul**d ****res**pon**d ****a**s** ****a****
    ****stu**den**t ****w**ho** ****h**as** ****ea**sy** ****ac**ces**s ****t**o**
    ****t**he** ****int**erne**t (****Ro**le** ****A****), ****th**en** ****a**s**
    ****a**** ****stu**den**t ****w**ho** ****h**as** ****lim**ite**d ****o**r** ****uns**tabl**e
    ****ac**ces**s ****t**o** ****tech**nolog**y (****Ro**le** ****B****).'
  id: totrans-919
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**请**问模型“**解释在线教育的**好处**。”**首先，他应该以**一个容易访问互联网的学生**（**角色A**）的身份回答，然后以**一个对技术访问有限或不稳定的学生**（**角色B**）的身份回答。'
- en: '****T**he** ****Ro**le** ****Rev**ersa**l ****Prom**ptin**g ****i**s** ****a****
    ****pow**erfu**l ****tech**niqu**e ****f**or** ****ens**urin**g ****th**at** ****resp**onse**s
    ****a**re** ****bal**ance**d ****a**nd** ****th**at** ****a**ll** ****po**int**s
    ****o**f** ****vi**ew** ****a**re** ****cons**idere**d, ****prov**idin**g ****a****
    ****de**epe**r ****a**nd** ****mo**re** ****cri**tica**l ****under**standi**ng
    ****o**f** ****ea**ch** ****que**stio**n. ****I**f** ****y**ou** ****ne**ed**
    ****mo**re** ****det**ail**s ****o**r** ****ha**ve** ****a**ny** ****ques**tion**s
    ****ab**out** ****h**ow** ****t**o** ****ap**ply** ****th**is** ****tech**niqu**e,
    ****I**** ****a**m** ****ha**ppy** ****t**o** ****he**lp**!'
  id: totrans-920
  prefs: []
  type: TYPE_NORMAL
  zh: '**角色反转提示**是一种**强大的**技术，用于确保**响应**是**平衡**的，并且所有**观点**都**被考虑**，从而提供对每个问题的**更深入**和**更批判性**的理解。如果您需要**更多**细节或**有任何**关于如何**应用**这项技术的**问题**，我很乐意**帮助**您！'
- en: '****1**8**. ****Cons**ensu**s ****Bui**ldin**g ****Prom**ptin**g (****Cons**ensu**s
    ****Bui**ldin**g)'
  id: totrans-921
  prefs: []
  type: TYPE_NORMAL
  zh: '**18**. **共识构建提示**（**共识构建**）'
- en: '[****Wh**at** ****i**s** ]'
  id: totrans-922
  prefs: []
  type: TYPE_NORMAL
  zh: '[**什么是**]'
- en: '****Cons**ensu**s ****Bui**ldin**g ****Prom**ptin**g , ****o**r** ****Cons**ensu**s
    ****Bui**ldin**g, ****i**s** ****a**** ****pr**omp**t ****engi**neerin**g ****tech**niqu**e
    ****th**at** ****inv**olve**s ****as**kin**g ****t**he** ****L**LM** ****t**o**
    ****synt**hesiz**e ****diff**eren**t ****view**point**s ****o**r** ****opi**nion**s
    ****t**o** ****re**ach** ****a**** ****cons**ensu**s ****o**r** ****a**** ****sol**utio**n
    ****th**at** ****sati**sfie**s ****mul**tipl**e ****stak**eholde**rs. ****Ra**the**r
    ****th**an** ****foc**usin**g ****o**n** ****a**** ****si**ngl**e ****pers**pectiv**e,
    ****t**he** ****mo**del** ****i**s** ****ori**ente**d ****tow**ard**s ****comb**inin**g
    ****mul**tipl**e ****vi**ews**, ****iden**tifyin**g ****po**int**s ****o**f**
    ****conv**ergenc**e, ****a**nd** ****prop**osin**g ****a**** ****pa**th** ****th**at**
    ****c**an** ****b**e** ****acc**epte**d ****b**y** ****a**ll** ****stak**eholde**rs.'
  id: totrans-923
  prefs: []
  type: TYPE_NORMAL
  zh: '**共识构建提示**，或称为**共识构建**，是一种**提示工程**技术，涉及**要求**LLM**合成**不同的**观点**或**意见**，以**达成**一个**共识**或**解决方案**，该解决方案**满足**多个**利益相关者**。**而不是**关注于**采用**单一**视角，该模型**旨在**结合**多个**观点**，**识别**共同**点**，并提出**一条**所有**利益相关者**都可以**接受**的**路径**。'
- en: '****Th**is** ****tech**niqu**e ****i**s** ****ba**sed** ****o**n** ****t**he**
    ****id**ea** ****o**f** ****nego**tiatio**n ****a**nd** ****medi**atio**n, ****hel**pin**g
    ****t**o** ****fi**nd** ****co**mmo**n ****gr**oun**d ****bet**wee**n ****dive**rgen**t
    ****vi**ews**. ****I**t** ****i**s** ****us**efu**l ****f**or** ****expl**orin**g
    ****coop**erativ**e ****a**nd** ****inte**grativ**e ****solu**tion**s, ****wh**ere**
    ****ea**ch** ****pa**rty** ****inv**olve**d ****c**an** ****cont**ribut**e ****t**o**
    ****t**he** ****fi**nal** ****re**sul**t.'
  id: totrans-924
  prefs: []
  type: TYPE_NORMAL
  zh: '**这种**技术**基于**谈判和调解**的理念，**帮助**找到不同观点之间的共同**基础**。它**对于**探索合作和整合解决方案**非常有用**，其中每个参与方都可以**对**最终**结果**做出**贡献**。'
- en: '[****Wh**at** ****i**s** ****yo**ur** ****ma**in** ****obje**ctiv**e ]'
  id: totrans-925
  prefs: []
  type: TYPE_NORMAL
  zh: '[**你的**主要**目标**是什么]'
- en: '****T**he** ****ma**in** ****obje**ctiv**e ****o**f** ****Cons**ensu**s ****Bui**ldin**g
    ****Prom**ptin**g ****i**s** ****ab**out** ****cre**atin**g ****a**** ****bal**ance**d
    ****sol**utio**n ****th**at** ****ta**kes** ****in**to** ****acc**oun**t ****t**he**
    ****inte**rest**s ****a**nd** ****con**cern**s ****o**f** ****a**ll** ****par**tie**s
    ****inv**olve**d ****i**n** ****a**n** ****is**sue**. ****Th**is** ****i**s**
    ****part**icular**ly ****us**efu**l ****i**n** ****situ**ation**s ****o**f** ****con**flic**t
    ****o**r** ****de**bat**e, ****wh**ere** ****th**ere** ****a**re** ****mul**tipl**e
    ****dive**rgen**t ****po**int**s ****o**f** ****vi**ew** ****a**nd** ****a**n**
    ****ef**for**t ****t**o** ****fi**nd** ****co**mmo**n ****gr**oun**d.'
  id: totrans-926
  prefs: []
  type: TYPE_NORMAL
  zh: '**共识构建提示**的主要目标是创建一个平衡的解决方案，该解决方案考虑到所有参与问题的利益和关切。这在冲突或辩论的情况下特别有用，其中存在多个分歧观点和寻找共同基础的努力。'
- en: '****Ano**the**r ****go**al** ****i**s** ****t**o** ****pro**mot**e ****colla**borati**ve
    ****pro**ble**m-****sol**vin**g. ****B**y** ****iden**tifyin**g ****po**int**s
    ****o**f** ****conv**ergenc**e ****a**nd** ****ar**eas** ****o**f** ****dive**rgenc**e,
    ****t**he** ****mo**del** ****c**an** ****he**lp** ****form**ulat**e ****prop**osal**s
    ****th**at** ****min**imiz**e ****diff**erence**s ****a**nd** ****max**imiz**e
    ****ben**efit**s ****f**or** ****a**ll** ****par**tie**s. ****Th**is** ****app**roac**h
    ****i**s** ****esse**ntia**l ****i**n** ****con**text**s ****o**f** ****stra**tegi**c
    ****pla**nnin**g, ****gr**oup** ****dec**isio**n-****ma**kin**g, ****a**nd** ****reso**lutio**n
    ****o**f** ****so**cia**l ****o**r** ****organ**ization**al ****conf**lict**s.'
  id: totrans-927
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个目标是促进协作性问题解决。通过识别趋同点和分歧领域，模型可以帮助制定减少差异并最大化所有各方利益的提案。这种方法在战略规划、群体决策制定和组织或社会冲突解决等背景下至关重要。
- en: '[****H**ow** ****i**t** ****wo**rks** ]'
  id: totrans-928
  prefs: []
  type: TYPE_NORMAL
  zh: '[**它是如何工作的**]'
- en: '****Cons**ensu**s ****Bui**ldin**g ****Prom**ptin**g ****wo**rks** ****b**y**
    ****as**kin**g ****t**he** ****L**LM** ****t**o** ****ana**lyz**e ****t**he**
    ****diff**eren**t ****po**int**s ****o**f** ****vi**ew** ****pres**ente**d ****a**nd**
    ****se**ek** ****cons**ensu**s. ****T**he** ****pr**omp**t ****mi**ght** ****inc**lud**e
    ****req**uest**s ****su**ch** ****a**s** “****Com**bin**e ****t**he** ****po**int**s
    ****o**f** ****vi**ew** ****t**o** ****fi**nd** ****a**** ****sol**utio**n ****th**at**
    ****sati**sfie**s ****bo**th** ****par**tie**s” ****o**r** “****Ide**ntif**y ****ar**eas**
    ****o**f** ****agre**emen**t ****a**nd** ****pro**pos**e ****a**n** ****ac**tio**n
    ****pl**an** ****th**at** ****acco**mmodat**es ****bo**th** ****pers**pectiv**es.”'
  id: totrans-929
  prefs: []
  type: TYPE_NORMAL
  zh: '**共识构建提示**通过询问LLM分析所呈现的不同观点并寻求共识来工作。提示可能包括诸如“结合观点以找到满足双方解决方案”或“识别共识领域并提出一个既能适应双方观点的行动计划”之类的请求。'
- en: '****F**or** ****exa**mpl**e, ****i**f** ****y**ou** ****pre**sen**t ****a****
    ****que**stio**n ****ab**out** “****t**he** ****be**st** ****w**ay** ****t**o**
    ****re**duc**e ****ca**rbo**n ****emis**sion**s”, ****t**he** ****L**LM** ****co**uld**
    ****b**e** ****as**ked** ****t**o** ****con**side**r ****t**he** ****vi**ews**
    ****o**f** ****bo**th** ****environ**mentalis**ts ****a**nd** ****ind**ustr**y
    ****repres**entativ**es. ****T**he** ****mo**del** ****co**uld** ****th**en**
    ****lo**ok** ****f**or** ****a**** ****sol**utio**n ****th**at** ****wo**uld**
    ****al**low** ****emis**sion**s ****t**o** ****b**e** ****red**uce**d ****i**n**
    ****a**n** ****enviro**nmental**ly ****sust**ainabl**e ****w**ay**, ****wh**ile**
    ****al**so** ****be**ing** ****vi**abl**e ****f**or** ****ind**ustr**y, ****su**ch**
    ****a**s** ****a**** ****gra**dua**l ****tran**sitio**n ****wi**th** ****fina**ncia**l
    ****ince**ntive**s.'
  id: totrans-930
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，如果你提出一个关于“**减少碳排放**的最佳方式”的问题，LLM可以要求考虑**环保主义者**和**工业代表**的观点。模型随后可以寻找一种解决方案，这种解决方案能够在**环境可持续**的同时，对**工业**也是**可行**的，例如通过**财政激励**实现**渐进式**过渡。
- en: '****Th**is** ****tech**niqu**e ****i**s** ****effe**ctiv**e ****i**n** ****fost**erin**g
    ****coop**eratio**n, ****espe**ciall**y ****i**n** ****con**text**s ****wh**ere**
    ****th**ere** ****a**re** ****cl**ear** ****diff**erence**s ****a**nd** ****ea**ch**
    ****pa**rty** ****h**as** ****i**ts** ****o**wn** ****prio**ritie**s. ****B**y**
    ****see**kin**g ****po**int**s ****o**f** ****conv**ergenc**e, ****t**he** ****mo**del**
    ****c**an** ****he**lp** ****tran**sfor**m ****conf**lict**s ****in**to** ****oppor**tuniti**es
    ****f**or** ****colla**borati**on.'
  id: totrans-931
  prefs: []
  type: TYPE_NORMAL
  zh: 这种技术在**促进合作**方面**有效**，尤其是在存在**明显差异**且每个参与者都有其**自身优先事项**的背景下。通过寻找**共同点**，模型可以帮助将**冲突**转化为**合作**的机会。
- en: '[****Wh**en** ****t**o** ****u**se** ]'
  id: totrans-932
  prefs: []
  type: TYPE_NORMAL
  zh: '[**何时使用**]'
- en: '****Cons**ensu**s ****Bui**ldin**g ****Prom**ptin**g ****sh**oul**d ****b**e**
