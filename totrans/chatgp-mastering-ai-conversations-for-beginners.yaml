  zh: 我们将开始探索历史年鉴，回到**石器时代**。**不是**我们人类数千年前的那个时代，而是我们的创造——**人工智能**——最近才经历的时代。一旦我们谈到了计算机的大小，以及艾伦·图灵关于“**能思考的机器**”的突破性概念，我们就会踏上一段旅程，穿越早期的处理语言，其演变成机器学习算法，最终，在**人工智能聊天机器人**（**无需担心终结者接管**，我确信你这么想过！）兴起于现代的背景下结束。在那之后，我们将解码一些你前进和了解所需的知识术语，并概述我们友好邻居**人工智能**的特点。
