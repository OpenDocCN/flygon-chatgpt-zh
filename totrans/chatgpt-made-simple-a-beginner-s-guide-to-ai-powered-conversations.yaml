  type: TYPE_NORMAL
  zh: '****2****. ****神经网络'
- en: '****Cha**tGP**T’****s**** “****br**ain**” ****i**s** ****ma**de** ****u**p**
    ****o**f** ****some**thin**g ****ca**lle**d ****a**** *****ne**ura**l ****net**wor**k*.
