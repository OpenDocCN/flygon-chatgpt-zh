- en: Foreword
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 前言
- en: Having had the pleasure of knowing Bruce for a few years now, I’ve witnessed
    his ability to take cutting-edge concepts and problems and make them accessible
    to programmers from a myriad of different backgrounds and abilities. Bruce’s experience
    is particularly suitable for the task of breaking down many of the latest AI technologies,
    like ChatGPT, into core components that developers can use in their day-to-day
    problem-solving. He is the co-author of *Bluetooth for Java*, which came out just
    four years after Bluetooth made its way into the market, and he is the author
    of numerous technical guides written for major technology companies who needed
    their newest inventions to be adopted by developers.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 在过去几年中，我有幸认识布鲁斯，亲眼目睹了他将尖端概念和问题转化为来自不同背景和能力的程序员能够理解的能力。布鲁斯的经验特别适合将许多最新的AI技术，如ChatGPT，分解成开发者可以在日常问题解决中使用的核心组件。他是《Bluetooth
    for Java》的合著者，这本书在蓝牙进入市场后仅四年就出版了，他还是为需要其最新发明被开发者采用的各大科技公司撰写的大量技术指南的作者。
- en: 'As the co-founder and CEO of a Microsoft-backed AI company, called Private
    AI, I have the privilege of speaking with developers, managers, and C-level executives
    from organizations around the world not only about the implementation of responsible
    use of data but about the questions they have around generative AI, what kinds
    of problems to tackle, and where to start. Technology like ChatGPT is so new that
    the underlying model architecture allowing it to perform as well as it does –
    the Transformer architecture, that is – only came out in 2017 in the research
    paper titled “Attention Is All You Need.” As a result, a lot of the key questions
    that managers are struggling with are also questions developers are avidly diving
    into, including “What can I do with this technology?”, “How and where should I
    implement it?”, “Where should I start?”, “What are the pitfalls?”, and the ever-gnawing
    question when a lot of attention is placed on new inventions: “Is this all just
    hype?”'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 作为一家由微软支持的AI公司Private AI的联合创始人和CEO，我有幸与世界各地的开发者、经理和C级高管交谈，不仅关于数据的负责任使用实施，还关于他们对生成式AI的疑问，要解决哪些问题，以及从哪里开始。像ChatGPT这样的技术如此新颖，使其能够表现得如此出色的底层模型架构——即Transformer架构——仅在2017年的一篇名为“Attention
    Is All You Need”的研究论文中首次出现。因此，管理者们所面临的大量关键问题也是开发者们热衷于深入探讨的问题，包括“我能用这项技术做什么？”，“我应该在何处以及如何实施它？”，“我应该从哪里开始？”，“有哪些陷阱？”，以及当大量关注点集中在新的发明上时，始终存在的疑问：“这只是一场炒作吗？”
- en: Happily, many of these questions are addressed in concrete ways within this
    book, which is a crucial step toward cutting through to the core of what a new
    technology is actually useful for. In the same way that learning a programming
    language teaches you how to think in a completely different way than when using
    natural language, learning how to make the best use of AI makes you think in a
    completely different way than programming. In natural languages, the key is learning
    vocabulary, grammar, syntax, and semantics. In programming languages, it is logic,
    mathematics, syntax, scale, and significantly more of a first principles understanding
    of the world. In Artificial Intelligence, it’s all about the data and how they
    relate to the task at hand. You can have the most powerful models in the world
    for generating text, for navigating roads, for generating art, but if you apply
    them to a task they were not meant for, prepare to be disappointed. However, if
    you understand fundamentally what they were built to do and use them accordingly,
    prepare to be amazed.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 幸运的是，本书中具体地解决了许多这些问题，这是深入理解新技术实际用途的关键步骤。就像学习编程语言教会你以一种与使用自然语言完全不同的方式思考一样，学习如何充分利用AI会使你以一种与编程完全不同的方式思考。在自然语言中，关键是学习词汇、语法、句法和语义。在编程语言中，是逻辑、数学、句法和规模，以及更多关于世界第一原理的理解。在人工智能中，一切都关于数据和它们与手头任务的关系。你可以拥有世界上最强大的用于生成文本、导航道路、生成艺术等任务的模型，但如果你将它们应用于它们本不应完成的任务，准备失望吧。然而，如果你从根本上理解它们被构建来做什么，并相应地使用它们，准备惊讶吧。
- en: The concise, practical examples in this book will not only allow for you to
    quickly start building projects with ChatGPT, but will also start honing your
    intuition around how to think about this technology. Indeed, while the focus is
    working in Java, developers who use any programming language will benefit from
    diving in.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 本书中的简洁、实用的示例不仅可以帮助你快速开始使用ChatGPT构建项目，还可以开始磨练你对如何思考这项技术的直觉。确实，虽然重点是使用Java进行工作，但任何编程语言的使用者都能从深入研究这项技术中受益。
