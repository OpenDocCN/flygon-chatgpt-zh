  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 以邮件新闻稿撰写者的身份，为[特定领域]创建一个200字的邮件，包含基于故事的开头和号召性用语。
- en: '**Prompt 10 — Carousel Copy (Instagram/LinkedIn)**'
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: '**提示10 — 轮播文案（Instagram/LinkedIn）**'
- en: Write copy for a 7-slide carousel post teaching [specific skill]. Make each
    slide concise, bold, and actionable.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 为一个7页的轮播帖子撰写文案，教授[特定技能]。使每一页简洁、加粗且具有可操作性。
- en: '**Prompt 11 — CTA Variations List**'
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: '**提示11 — 召唤性用语变化列表**'
- en: List 10 unique call-to-action phrases I can use at the end of my videos to increase
    shares and saves.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 列出10个独特的号召性用语短语，我可以在视频结尾使用，以增加分享和保存。
- en: '**Prompt 12 — Trend Hijack Formula**'
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: '**提示12 — 趋势劫持公式**'
- en: 'Show me 3 ways I can use this current trend: “[insert trend]” to promote my
    [product/service] on TikTok.'
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 展示我如何使用当前趋势：“[插入趋势]”来在TikTok上推广我的[产品/服务]的3种方法。
- en: '**Prompt 13 — Storytelling Framework**'
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: '**提示13 — 故事框架**'
- en: Using the PAS (Problem, Agitation, Solution) formula, write a short story post
    to connect with my audience about [pain point].
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 使用PAS（问题、激怒、解决方案）公式，写一篇简短的故事帖子，与我的受众建立联系，关于[痛点]。
- en: '**Prompt 14 — Daily Posting Template**'
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: '**提示14 — 每日发布模板**'
- en: 'Create a repeatable daily post structure for Instagram that includes: hook,
    body, CTA — tailored to [niche].'
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 为Instagram创建一个可重复的每日帖子结构，包括：钩子、正文、CTA — 专为[特定领域]定制。
- en: '**Prompt 15 — Hook + Headline Swipe File**'
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: '**提示15 — 钩子+标题滑动文件**'
- en: Give me 10 high-converting headlines or hooks I can use in YouTube titles about
    [topic].
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 给我10个高转化率的标题或钩子，我可以在YouTube标题中使用[主题]。
- en: '**Prompt 16 — Quote-to-Caption Transformer**'
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: '**提示16 — 引言到配文转换器**'
- en: Take this quote “[insert quote]” and turn it into 3 impactful social media captions
    with a story or insight attached.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 将这个引言“[插入引言]”转变为3个有影响力的社交媒体配文，附上故事或见解。
- en: '**Prompt 17 — FAQ-Based Content Generator**'
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: '**提示17 — 基于常见问题内容生成器**'
- en: Give me 10 content ideas based on the most common questions people ask about
    [insert product/niche].
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 给我10个基于人们关于[插入产品/特定领域]最常见问题的内容想法。
- en: '**Prompt 18 — Audience Engagement Booster**'
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: '**提示18 — 观众参与度提升器**'
- en: Give me 5 interactive post ideas (polls, questions, challenges) to boost engagement
    with my followers in the [niche] space.
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 给我5个互动帖子想法（投票、问题、挑战），以提升[特定领域]空间中对我的粉丝的参与度。
- en: '**Prompt 19 — Content Series Plan**'
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: '**提示19 — 内容系列计划**'
- en: Plan a 5-part content series for Instagram on the topic of [insert topic]. Include
    each post title and a summary.
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 为[插入主题]的主题制定一个5部分的内容系列计划，包括每个帖子的标题和摘要。
- en: '**Prompt 20 — Long-Form to Short-Form Repurposing**'
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: '**提示20 — 长篇到短篇内容重新利用**'
- en: Show me how to break this 1,000-word article into 5 social media posts. Add
    hooks and CTAs for each.
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 展示如何将这篇1000字的文章拆分为5个社交媒体帖子。为每个帖子添加钩子和CTA。
- en: '**Chapter 4: Marketing & Sales Prompts (15 Prompts)**'
  id: totrans-141
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**第四章：营销与销售提示（15个提示）**'
- en: These prompts are designed to help you build magnetic o ers, write persuasive
    copy, and convert attention into income — faster and smarter with AI.
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 这些提示旨在帮助您构建有吸引力的优惠，撰写有说服力的文案，并将注意力转化为收入 — 使用AI更快、更智能。
- en: '**Prompt 21 — O er Clarity Breakdown**'
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: '**提示21 — 优惠清晰分解**'
- en: 'Break down my o er: [insert o er] using the 4P formula (Problem, Promise, Proof,
    Price) to clarify and strengthen it.'
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 将我的提议分解：[插入提议] 使用 4P 公式（问题、承诺、证据、价格）来澄清并加强它。
- en: '**Prompt 22 — Sales Page Copywriter** Act as a 7-figure copywriter. Write a
    full landing page for [product name], targeting [audience], using the AIDA structure.'
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: '**提示 22 — 销售页面文案撰写者** 扮演一位七位数文案撰写者。为 [产品名称] 撰写一个完整的着陆页面，针对 [受众]，使用 AIDA 结构。'
- en: '**Prompt 23 — Sales Funnel Map**'
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: '**提示 23 — 销售漏斗图**'
- en: Create a 3-step sales funnel for my [digital/physical] product. Include lead
    magnet idea, email sequence, and o er upsell.
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 为我的 [数字/实体] 产品创建一个 3 步销售漏斗。包括吸引潜在客户的诱饵想法、电子邮件序列和附加销售。
- en: '**Prompt 24 — Email Sequence Builder**'
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: '**提示 24 — 电子邮件序列构建器**'
- en: Write a 5-day email sequence to warm up leads and sell [product/service]. Each
    email should focus on value, trust, and emotional connection.
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 编写一个 5 天的电子邮件序列来预热潜在客户并销售 [产品/服务]。每封电子邮件都应该侧重于价值、信任和情感联系。
- en: '**Prompt 25 — Persuasion Power Words**'
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: '**提示 25 — 说服力关键词**'
- en: Give me 30 high-converting words or phrases proven to increase conversions in
    digital product sales.
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 给我 30 个经过验证的高转化率词汇或短语，这些词汇或短语可以增加数字产品销售的转化率。
- en: '**Prompt 26 — Copy Rewrite for Conversions** Take this paragraph [insert paragraph]
    and rewrite it to be more persuasive, emotionally charged, and conversion-focused.'
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: '**提示 26 — 转化率文案重写** 将此段落 [插入段落] 重写，使其更具说服力、情感化并专注于转化。'
- en: '**Prompt 27 — Product Description Optimizer**'
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: '**提示 27 — 产品描述优化器**'
- en: Optimize this product description [insert text] for clarity, urgency, and emotional
    appeal to boost conversions.
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 优化此产品描述 [插入文本]，以提高清晰度、紧迫感和情感吸引力，从而提高转化率。
- en: '**Prompt 28 — Problem-Aware Ad Copy**'
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: '**提示 28 — 问题意识广告文案**'
- en: 'Write 3 Facebook ad versions for an audience that knows their problem but doesn’t
    yet know my product exists. Topic: [insert topic].'
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 为那些知道他们的问题但还不知道我的产品存在的受众撰写 3 个 Facebook 广告版本。主题：[插入主题]。
- en: '**Prompt 29 — Testimonial Enhancer**'
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: '**提示 29 — 测试imonials 增强器**'
- en: Rewrite this customer review to sound more emotionally compelling and results-oriented,
    without making it inauthentic.
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 重写此客户评价，使其听起来更具情感吸引力且以结果为导向，同时又不失真实性。
- en: '**Prompt 30 — Niche Positioning Statement** Craft a brand positioning statement
    for a [type of business] that clearly states: who it’s for, what it solves, and
    why it’s di erent.'
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: '**提示 30 — 利基定位声明** 为一种 [业务类型] 制定一个品牌定位声明，明确指出：它是为谁而设，解决了什么问题，以及为什么它与众不同。'
- en: '**Prompt 31 — One-Liner Pitch Generator**'
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: '**提示 31 — 一句话推销生成器**'
- en: Write 5 powerful one-liner pitches I can use to describe my product in conversations,
    podcasts, or bios.
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 写出 5 个强有力的单行推销语，我可以用它来在对话、播客或个人简介中描述我的产品。
- en: '**Prompt 32 — Scarcity/Urgency Copy**'
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: '**提示 32 — 稀缺/紧迫性文案**'
- en: Give me 5 short urgency-driven copy blocks I can add to a landing page or email
    to create FOMO and increase conversions.
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 给我 5 个简短的紧迫性文案块，我可以将其添加到着陆页面或电子邮件中，以创造 FOMO 并提高转化率。
- en: '**Prompt 33 — Objection Crusher Script**'
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: '**提示 33 — 反对意见破坏脚本**'
- en: List the top 5 objections my potential buyers may have for [product], and give
    me persuasive rebuttals for each one.
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 列出我的潜在买家可能对 [产品] 有前 5 个反对意见，并为每个提供一个有说服力的反驳。
- en: '**Prompt 34 — High-Converting O er Name Ideas** Brainstorm 10 irresistible
    names for my online program/course about [topic], each under 5 words and emotionally
    sticky.'
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: '**提示 34 — 高转化率优惠名称创意** 为我的关于 [主题] 的在线程序/课程构思 10 个不可抗拒的名称，每个名称不超过 5 个单词，且具有情感粘性。'
- en: '**Prompt 35 — Upsell & Cross-Sell Ideas**'
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: '**提示 35 — 附加销售 & 交叉销售想法**'
- en: 'Suggest 5 smart upsell or cross-sell ideas to add revenue to my main product:
    [insert product].'
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 为我的主要产品 [插入产品] 提出 5 个聪明的附加销售或交叉销售想法，以增加收入。
- en: '**Chapter 5: Business & Productivity Prompts (15 Prompts)**'
  id: totrans-169
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**第 5 章：商业与生产力提示（15 个提示）**'
- en: Use these prompts to streamline your thinking, organize your workflow, delegate
    smarter, and make faster, better business decisions with AI as your co-pilot.
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 使用这些提示来简化你的思考，组织你的工作流程，更智能地委派，并作为你的副驾驶，用 AI 做出更快、更好的商业决策。
- en: '**Prompt 36 — Business Brainstorm Buddy**'
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: '**提示 36 — 商业头脑风暴伙伴**'
- en: Give me 10 business ideas that combine [your passion/skill] and solve problems
    for [target audience].
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 给我 10 个结合 [你的热情/技能] 并为 [目标受众] 解决问题的商业想法。
- en: '**Prompt 37 — 90-Day Business Roadmap**'
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: '**提示 37 — 90 天商业路线图**'
- en: Act as a business strategist. Build me a 90-day action plan to grow my [type
    of business] from $0 to $10k/month.
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 扮演一位商业策略家。为我制定一个 90 天行动计划，将我的 [业务类型] 从 $0 增长到每月 $10k。
- en: '**Prompt 38 — Time Audit Analyzer**'
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: '**提示 38 — 时间审计分析器**'
- en: Help me audit my daily schedule. Show me where I waste time and how to restructure
    my routine for deep focus.
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 帮助我审计我的日常日程。向我展示我浪费时间的地方以及如何重构我的日常安排以实现深度专注。
- en: '**Prompt 39 — Daily CEO Dashboard**'
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: '**提示 39 — 每日CEO仪表板**'
- en: Create a simple daily dashboard I can use to track my top 3 goals, key metrics,
    and 1 big win.
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个简单的每日仪表板，我可以用它来跟踪我的前3个目标、关键指标和1个重大胜利。
- en: '**Prompt 40 — SOP Generator (Standard Operating Procedure)**'
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: '**提示 40 — SOP生成器（标准操作程序）**'
- en: Write an SOP for [task/process], including tools needed, steps, and frequency,
    so I can delegate it to a VA.
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 为[任务/流程]编写SOP，包括所需工具、步骤和频率，以便我可以将其委派给VA。
- en: '**Prompt 41 — Task Prioritization Matrix**'
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: '**提示 41 — 任务优先级矩阵**'
- en: 'Organize this list of tasks [insert tasks] using the Eisenhower Matrix: Urgent/Important,
    Not Urgent/Important, etc.'
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 使用艾森豪威尔矩阵：紧急/重要、不紧急/重要等，组织这份任务清单[插入任务]。
- en: '**Prompt 42 — Meeting Agenda Optimizer**'
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: '**提示 42 — 会议议程优化器**'
- en: Create a tight 30-minute meeting agenda for my weekly team call focused on clarity,
    accountability, and next steps.
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 为我的每周团队会议创建一个紧凑的30分钟会议议程，重点是清晰、问责制和下一步行动。
- en: '**Prompt 43 — Business Name Generator**'
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: '**提示 43 — 商业名称生成器**'
- en: Generate 10 unique, brandable business names for my project in the [industry]
    space. Must be under 3 words and .com available.
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: 为我的项目在[行业]空间中生成10个独特、可注册的品牌名称。必须少于3个单词，并且.com域名可用。
- en: '**Prompt 44 — Decision-Making Framework**'
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: '**提示 44 — 决策框架**'
- en: Help me decide between [Option A] and [Option B] using a logical and emotional
    framework that includes long-term outcomes.
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: 帮助我使用包括长期结果在内的逻辑和情感框架在[选项A]和[选项B]之间做出决定。
- en: '**Prompt 45 — Productivity Ritual Design**'
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: '**提示 45 — 生产力仪式设计**'
- en: Design a powerful 60-minute morning ritual that helps me focus, prioritize,
    and activate my best energy.
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: 设计一个强大的60分钟早晨仪式，帮助我集中注意力、优先排序并激活我最好的能量。
- en: '**Prompt 46 — Delegation Clarity Prompt**'
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: '**提示 46 — 委派清晰提示**'
- en: 'Identify 5 recurring tasks I should delegate immediately in my business based
    on this list: [insert task list].'
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: 根据这份清单[插入任务清单]，确定我应该在业务中立即委派的5个重复性任务。
- en: '**Prompt 47 — KPI Setup Prompt**'
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: '**提示 47 — KPI设置提示**'
- en: What are the 5 most important KPIs (key performance indicators) I should track
    weekly in a service-based business?
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: 我应该每周跟踪哪些5个最重要的关键绩效指标（KPI）在一个基于服务的业务中？
- en: '**Prompt 48 — AI-Assisted Decision Tree**'
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: '**提示 48 — AI辅助决策树**'
- en: Create a simple decision tree to help me know when to invest, automate, delegate,
    or say no.
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个简单的决策树，帮助我知道何时投资、自动化、委派或拒绝。
- en: '**Prompt 49 — Productivity Blocker Identifier**'
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: '**提示 49 — 生产力障碍识别器**'
- en: Based on these habits [insert habits], show me which ones are slowing me down
    and how to replace them with higher-leverage habits.
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: 根据这些习惯[插入习惯]，向我展示哪些习惯正在减缓我的步伐，以及如何用更高杠杆的习惯来替代它们。
- en: '**Prompt 50 — 80/20 Business Audit**'
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: '**提示 50 — 80/20业务审计**'
- en: Run a simulated 80/20 audit. Show me which 20% of my tasks, clients, or actions
    are driving 80% of my results — or stress.
  id: totrans-200
  prefs: []
  type: TYPE_NORMAL
  zh: 进行一次模拟的80/20审计。向我展示哪些20%的任务、客户或行动推动了80%的结果——或压力。
- en: '**Chapter 6: Visual & Design Prompts (15 Prompts for Midjourney, DALL·E & More)**'
  id: totrans-201
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**第6章：视觉与设计提示（15个Midjourney、DALL·E等提示）**'
- en: Use these prompts to create stunning images, branding elements, illustrations,
    product mockups, and visual content — even if you’re not a designer.
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
  zh: 使用这些提示创建令人惊叹的图像、品牌元素、插图、产品原型和视觉内容——即使你不是设计师。
- en: '**Prompt 51 — Minimalist Logo Design Prompt (DALL·E / Midjourney)**'
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: '**提示 51 — 极简主义标志设计提示（DALL·E / Midjourney）**'
- en: “Create a minimalist, modern logo for a [type of brand] called [brand name],
    using neutral tones and clean lines.”
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
  zh: “为名为[品牌名称]的[品牌类型]创建一个简约、现代的标志，使用中性色调和干净的线条。”
- en: '**Prompt 52 — Product Mockup Generator**'
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
  zh: '**提示 52 — 产品原型生成器**'
- en: “Generate a high-resolution mockup of an eBook cover displayed on a tablet,
    laying on a wooden desk with soft lighting.”
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: “生成一个高分辨率的电子书封面原型，显示在平板电脑上，放在木质桌子上，光线柔和。”
- en: '**Prompt 53 — Instagram Carousel Visuals Prompt**'
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
  zh: '**提示 53 — Instagram轮播视觉提示**'
- en: “Design 5 visually consistent Instagram carousel slides with bold typography,
    high contrast, and a sleek personal brand feel.”
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
  zh: “设计5张视觉上统一的Instagram轮播幻灯片，具有醒目的字体、高对比度和简洁的个人品牌感。”
- en: '**Prompt 54 — AI Avatar Creator Prompt**'
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
  zh: '**提示 54 — AI形象创建提示**'
- en: “Create a professional-looking digital avatar for a [job title] in a realistic
    style, facing forward, light background.”
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: “创建一个面向前方、背景光亮的真实风格的[职位名称]专业数字形象。”
- en: '**Prompt 55 — YouTube Thumbnail Prompt**'
  id: totrans-211
  prefs: []
  type: TYPE_NORMAL
  zh: '**提示 55 — YouTube缩略图提示**'
- en: “Design a high-contrast, emotionally expressive YouTube thumbnail for a video
    titled ‘How I Made $10K in 10 Days.’ Include shocked facial expression and bold
    red headline.”
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
  zh: “为名为‘How I Made $10K in 10 Days’的视频设计一个高对比度、情感表达强烈的 YouTube 缩略图，包括震惊的表情和醒目的红色标题。”
- en: '**Prompt 56 — Book Cover Design Prompt**'
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
  zh: '**提示 56 — 书籍封面设计提示**'
- en: “Design a premium self-help eBook cover titled ‘Unstoppable Mode’ — clean layout,
    bold title font, dark modern color palette.”
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
  zh: “设计一个名为‘Unstoppable Mode’的精品自助电子书封面——简洁布局，粗体标题字体，深色调现代色彩方案。”
- en: '**Prompt 57 — Concept Art Prompt**'
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
  zh: '**提示 57 — 概念艺术提示**'
- en: “Create atmospheric concept art of a futuristic city at sunset with glowing
    buildings and flying vehicles in cinematic style.”
  id: totrans-216
  prefs: []
  type: TYPE_NORMAL
  zh: “以电影风格创作一个未来城市日落时分的氛围概念艺术，有发光的建筑和飞行交通工具。”
- en: '**Prompt 58 — Pinterest-Style Infographic Prompt**'
  id: totrans-217
  prefs: []
  type: TYPE_NORMAL
  zh: '**提示 58 — Pinterest 风格信息图表提示**'
- en: “Generate a vertical infographic for Pinterest titled ‘7 Steps to Manifest Wealth’
    with feminine aesthetic and pastel color palette.”
  id: totrans-218
  prefs: []
  type: TYPE_NORMAL
  zh: “为 Pinterest 生成一个名为‘7 Steps to Manifest Wealth’的垂直信息图表，具有女性审美和柔和色彩方案。”
- en: '**Prompt 59 — Apparel Mockup Prompt**'
  id: totrans-219
  prefs: []
  type: TYPE_NORMAL
  zh: '**提示 59 — 服装模拟提示**'
- en: “Create a lifestyle mockup of a white hoodie with custom streetwear graphic
    art, modeled by a person in an urban setting.”
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
  zh: “创建一个白色连帽衫的生活风格模拟，上面有定制的街头服饰图形艺术，由一个在都市环境中的模特展示。”
- en: '**Prompt 60 — Brand Identity Moodboard Prompt**'
  id: totrans-221
  prefs: []
  type: TYPE_NORMAL
  zh: '**提示 60 — 品牌识别调色板提示**'
- en: “Generate a brand moodboard for a luxury wellness brand using earth tones, natural
    textures, elegant serif fonts, and clean visuals.”
  id: totrans-222
  prefs: []
  type: TYPE_NORMAL
  zh: “使用地球色调、自然纹理、优雅的无衬线字体和干净的视觉元素，为奢华健康品牌生成一个品牌调色板。”
- en: '**Prompt 61 — Illustration Prompt (Flat Style)**'
  id: totrans-223
  prefs: []
  type: TYPE_NORMAL
  zh: '**提示 61 — 插画提示（平面风格**）'
- en: “Illustrate a woman working on a laptop at a co ee shop in flat, vector-style
    art — bright, cheerful, minimal details.”
  id: totrans-224
  prefs: []
  type: TYPE_NORMAL
  zh: “以平面矢量风格艺术描绘一位女性在咖啡馆使用笔记本电脑的场景——明亮、愉快，细节简约。”
- en: '**Prompt 62 — Digital Poster Prompt**'
  id: totrans-225
  prefs: []
  type: TYPE_NORMAL
  zh: '**提示 62 — 数字海报提示**'
- en: “Design a bold digital poster with the phrase ‘Discipline Over Everything’ in
    a gritty, streetwear-inspired aesthetic.”
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
  zh: “设计一个大胆的数字海报，上面有‘Discipline Over Everything’的短语，采用粗砺、街头服饰风格的审美。”
- en: '**Prompt 63 — Product Label Prompt**'
  id: totrans-227
  prefs: []
  type: TYPE_NORMAL
  zh: '**提示 63 — 产品标签提示**'
- en: “Create a premium label design for an organic skincare product called ‘Glow
    Ritual’ — soft fonts, botanical line art, beige palette.”
  id: totrans-228
  prefs: []
  type: TYPE_NORMAL
  zh: “为名为‘Glow Ritual’的有机护肤产品设计一个精品标签设计——柔和字体，植物线条艺术，米色色调。”
- en: '**Prompt 64 — Website Hero Image Prompt**'
  id: totrans-229
  prefs: []
  type: TYPE_NORMAL
  zh: '**提示 64 — 网站英雄图像提示**'
- en: “Generate a clean hero image for a productivity app landing page, showing a
    user dashboard on a laptop in a modern workspace.”
  id: totrans-230
  prefs: []
  type: TYPE_NORMAL
  zh: “为生产力应用程序的着陆页生成一个干净的英雄图像，展示笔记本电脑上的用户仪表板，在现代工作空间中。”
- en: '**Prompt 65 — 3D Object Prompt**'
  id: totrans-231
  prefs: []
  type: TYPE_NORMAL
  zh: '**提示 65 — 3D 对象提示**'
- en: “Render a 3D model of a futuristic wireless headphone in matte black finish,
    shown from multiple angles on a white background.”
  id: totrans-232
  prefs: []
  type: TYPE_NORMAL
  zh: “渲染一个未来派无线耳机 3D 模型，采用哑光黑色处理，在白色背景上从多个角度展示。”
- en: '**Chapter 7: Learning & Personal Growth Prompts (10 Prompts)**'
  id: totrans-233
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**第 7 章：学习与个人成长提示（10 个提示**）'
- en: Use these prompts to expand your thinking, learn mais rápido, tomar decisões
    conscientes e evoluir como criador e ser humano.
  id: totrans-234
  prefs: []
  type: TYPE_NORMAL
  zh: 使用这些提示来扩展你的思维，快速学习，做出明智的决定，并作为创造者和人类进化。
- en: '**Prompt 66 — Accelerated Learning Plan**'
  id: totrans-235
  prefs: []
  type: TYPE_NORMAL
  zh: '**提示 66 — 加速学习计划**'
- en: “Act as a personal learning coach. Create a 30-day study plan to master [topic]
    in under 1 hour a day.”
  id: totrans-236
  prefs: []
  type: TYPE_NORMAL
  zh: “扮演个人学习教练的角色。创建一个 30 天的学习计划，每天不到 1 小时掌握[主题]。”
- en: '**Prompt 67 — Book Summary Generator**'
  id: totrans-237
  prefs: []
  type: TYPE_NORMAL
  zh: '**提示 67 — 书籍摘要生成器**'
- en: “Summarize the key ideas from the book ‘[Book Title]’ in 10 bullet points with
    examples for practical application.”
  id: totrans-238
  prefs: []
  type: TYPE_NORMAL
  zh: “用 10 个要点总结书籍‘[书名]’的关键思想，并提供实际应用的例子。”
- en: '**Prompt 68 — Daily Reflection Coach**'
  id: totrans-239
  prefs: []
  type: TYPE_NORMAL
  zh: '**提示 68 — 每日反思教练**'
- en: “Act as a reflective journaling coach. Ask me 3 deep questions to process my
    day emotionally and mentally.”
  id: totrans-240
  prefs: []
  type: TYPE_NORMAL
  zh: “扮演反思式日记记录教练的角色。问我 3 个深入的问题，以情感和心智上处理我的日子。”
- en: '**Prompt 69 — Growth Mindset Rewiring**'
  id: totrans-241
  prefs: []
  type: TYPE_NORMAL
  zh: '**提示 69 — 成长心态重连**'
- en: “Give me 10 a rmations and reframes to overcome fear of failure and embody a
    growth mindset in high-pressure situations.”
  id: totrans-242
  prefs: []
  type: TYPE_NORMAL
  zh: “给我 10 个肯定和重构，以克服失败恐惧，并在高压情况下体现成长心态。”
- en: '**Prompt 70 — Decision-Making Coach**'
  id: totrans-243
  prefs: []
  type: TYPE_NORMAL
  zh: '**提示 70 — 决策教练**'
- en: “Guide me through a self-awareness decision framework to help me choose between
    [Option A] and [Option B] with alignment.”
  id: totrans-244
  prefs: []
  type: TYPE_NORMAL
  zh: “引导我通过自我意识决策框架，帮助我在[选项 A]和[选项 B]之间做出一致的选择。”
- en: '**Prompt 71 — Values Discovery Prompt**'
  id: totrans-245
  prefs: []
  type: TYPE_NORMAL
  zh: '**提示 71 — 价值观发现提示**'
- en: “Help me discover my top 5 core personal values through a simple, guided self-assessment
    process.”
  id: totrans-246
  prefs: []
  type: TYPE_NORMAL
  zh: “通过一个简单、引导式的自我评估过程，帮助我发现我前 5 个核心个人价值观。”
- en: '**Prompt 72 — Limiting Belief Identifier**'
  id: totrans-247
  prefs: []
  type: TYPE_NORMAL
  zh: '**提示 72 — 限制性信念识别器**'
- en: “Based on this behavior [insert behavior], help me identify what limiting belief
    might be behind it and how to shift it.”
  id: totrans-248
  prefs: []
  type: TYPE_NORMAL
  zh: “基于这种行为[插入行为]，帮助我识别可能隐藏在背后的限制性信念以及如何转变它。”
- en: '**Prompt 73 — Emotional Regulation Coach**'
  id: totrans-249
  prefs: []
  type: TYPE_NORMAL
  zh: '**提示73 — 情绪调节教练**'
- en: “Act as a mindset mentor. Teach me 3 techniques to regulate anxiety and return
    to clarity when I feel overwhelmed.”
  id: totrans-250
  prefs: []
  type: TYPE_NORMAL
  zh: “扮演心态导师的角色。教我3种调节焦虑并在我感到不知所措时恢复清晰的方法。”
- en: '**Prompt 74 — Identity Reinforcement Prompt**'
  id: totrans-251
  prefs: []
  type: TYPE_NORMAL
  zh: '**提示74 — 身份强化提示**'
- en: “Write a first-person future-self letter as if I already achieved my goal of
    [insert goal], describing how I feel and who I became.”
  id: totrans-252
  prefs: []
  type: TYPE_NORMAL
  zh: “写一封第一人称的未来自我信件，仿佛我已经实现了[插入目标]的目标，描述我的感受和成为的人。”
- en: '**Prompt 75 — 80/20 Life Focus Audit**'
  id: totrans-253
  prefs: []
  type: TYPE_NORMAL
  zh: '**提示75 — 80/20生活焦点审查**'
- en: “Help me audit my current habits and priorities. What 20% of actions give me
    80% of fulfillment and growth?”
  id: totrans-254
  prefs: []
  type: TYPE_NORMAL
  zh: “帮助我审查我的当前习惯和优先事项。哪些20%的行动给我带来80%的满足感和成长？”
- en: '**Chapter 8: Social Media Growth Prompts (10 Prompts)**'
  id: totrans-255
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**第8章：社交媒体增长提示（10个提示**）'
- en: Estes prompts foram criados para te ajudar a crescer no Instagram, TikTok, YouTube,
    X (Twitter) e outras plataformas — com mais alcance, autoridade e engajamento
    usando IA.
  id: totrans-256
  prefs: []
  type: TYPE_NORMAL
  zh: 这些提示是为了帮助你增长在Instagram、TikTok、YouTube、X（Twitter）和其他平台上的影响力——使用人工智能实现更广泛的覆盖、权威和参与度。
- en: '**Prompt 76 — Personal Brand Bio Builder**'
  id: totrans-257
  prefs: []
  type: TYPE_NORMAL
  zh: '**提示76 — 个人品牌简介构建器**'
- en: “Write a high-impact Instagram bio for a [profession] who helps [target audience]
    achieve [result], in under 150 characters.”
  id: totrans-258
  prefs: []
  type: TYPE_NORMAL
  zh: “为一位帮助[目标受众]实现[结果]的[职业]撰写一个不超过150个字符的高影响力Instagram个人简介。”
- en: '**Prompt 77 — Viral Hook + Caption Combo**'
  id: totrans-259
  prefs: []
  type: TYPE_NORMAL
  zh: '**提示77 — 病毒式钩子+标题组合**'
- en: “Create 3 viral post hooks and captions for a personal brand in the [niche]
    space. Use emotional language, storytelling, and a CTA.”
  id: totrans-260
  prefs: []
  type: TYPE_NORMAL
  zh: “为[细分市场]空间中的个人品牌创建3个病毒式帖子钩子和标题。使用情感语言、故事讲述和CTA。”
- en: '**Prompt 78 — Growth Strategy Plan (Platform-Specific)**'
  id: totrans-261
  prefs: []
  type: TYPE_NORMAL
  zh: '**提示78 — 成长策略计划（特定平台）**'
- en: “Design a 30-day organic content growth strategy for TikTok aimed at helping
    [audience] with [goal]. Include post types and frequency.”
  id: totrans-262
  prefs: []
  type: TYPE_NORMAL
  zh: “为TikTok设计一个针对帮助[受众]实现[目标]的30天有机内容增长策略。包括帖子类型和频率。”
- en: '**Prompt 79 — Niche Hashtag Set Builder** “Give me 20 niche-specific hashtags
    for [industry or theme] that are a mix of trending, mid-size, and low-competition.”'
  id: totrans-263
  prefs: []
  type: TYPE_NORMAL
  zh: '**提示79 — 利基标签集构建器** “给我20个针对[行业或主题]的利基特定标签，这些标签是趋势、中等规模和低竞争的混合。”'
- en: '**Prompt 80 — Social Proof Amplifier**'
  id: totrans-264
  prefs: []
  type: TYPE_NORMAL
  zh: '**提示80 — 社会证明放大器**'
- en: “Write 3 short social media posts that turn testimonials into powerful social
    proof using emotional storytelling and transformation framing.”
  id: totrans-265
  prefs: []
  type: TYPE_NORMAL
  zh: “撰写3篇简短的社会媒体帖子，将见证转化为强大的社会证明，使用情感故事讲述和转型框架。”
- en: '**Prompt 81 — Engaging Story Prompt**'
  id: totrans-266
  prefs: []
  type: TYPE_NORMAL
  zh: '**提示81 — 吸引人的故事提示**'
- en: “Give me a 5-part Instagram Story script that teaches something quick, adds
    value, and ends with a poll or CTA to DM me.”
  id: totrans-267
  prefs: []
  type: TYPE_NORMAL
  zh: “给我一个5部分的Instagram故事脚本，教授一些快速的知识，增加价值，并以投票或CTA邀请私信我结束。”
- en: '**Prompt 82 — YouTube Channel Kickstart Prompt**'
  id: totrans-268
  prefs: []
  type: TYPE_NORMAL
  zh: '**提示82 — YouTube频道启动提示**'
- en: “Help me outline the first 5 video ideas to grow a YouTube channel about [topic],
    including titles and thumbnails that boost CTR.”
  id: totrans-269
  prefs: []
  type: TYPE_NORMAL
  zh: “帮助我概述前5个关于[主题]的YouTube频道增长视频的想法，包括提升点击率的标题和缩略图。”
- en: '**Prompt 83 — Content Remix Prompt** “Take this Instagram caption [paste caption]
    and repurpose it for a Twitter thread, a LinkedIn post, and a TikTok video script.”'
  id: totrans-270
  prefs: []
  type: TYPE_NORMAL
  zh: '**提示83 — 内容混搭提示** “将这个Instagram标题[粘贴标题]重新用于Twitter帖子、LinkedIn帖子以及TikTok视频脚本。”'
- en: '**Prompt 84 — Value Series Generator**'
  id: totrans-271
  prefs: []
  type: TYPE_NORMAL
  zh: '**提示84 — 价值系列生成器**'
- en: “Create a 3-part social media value series that builds momentum, solves a specific
    pain, and leads into a soft product pitch.”
  id: totrans-272
  prefs: []
  type: TYPE_NORMAL
  zh: “创建一个3部分的社会媒体价值系列，以建立势头、解决特定痛点并引导到软产品推广。”
- en: '**Prompt 85 — Story-Based Growth Post**'
  id: totrans-273
  prefs: []
  type: TYPE_NORMAL
  zh: '**提示85 — 基于故事的增长帖子**'
- en: “Write a first-person story post (under 300 words) that describes a before-and-after
    transformation related to [insert topic], ending with a CTA.”
  id: totrans-274
  prefs: []
  type: TYPE_NORMAL
  zh: “撰写一篇不超过300字的第一人称故事帖子，描述与[插入主题]相关的前后变化，并以CTA结束。”
- en: '**Chapter 9: Copywriting & Persuasion Prompts (10 Prompts)**'
  id: totrans-275
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**第9章：文案与说服提示（10个提示**）'
- en: Use esses prompts para criar textos que vendem, comunicam com clareza e despertam
    desejo real — em anúncios, e-mails, sites, posts e lançamentos.
  id: totrans-276
  prefs: []
  type: TYPE_NORMAL
  zh: 使用这些提示来创建具有销售力、清晰沟通并能激发真实欲望的文本——用于广告、电子邮件、网站、帖子和新产品发布。
- en: '**Prompt 86 — High-Converting Headline Creator**'
  id: totrans-277
  prefs: []
  type: TYPE_NORMAL
  zh: '**提示86 — 高转化率标题创建器**'
- en: “Give me 10 high-converting headlines for a sales page promoting a [product/service]
    that helps [audience] solve [pain point].”
  id: totrans-278
  prefs: []
  type: TYPE_NORMAL
  zh: “给我10个高转化率的销售页面标题，用于推广一个帮助[受众]解决[痛点]的[产品/服务]。”
- en: '**Prompt 87 — Pain-Driven Email Copy Prompt**'
  id: totrans-279
  prefs: []
  type: TYPE_NORMAL
  zh: '**提示 87 — 疼痛驱动的电子邮件副本提示**'
- en: “Write a 3-paragraph email for [niche] that begins by amplifying the reader’s
    frustration with [problem], then positions my [o er] as the solution.”
  id: totrans-280
  prefs: []
  type: TYPE_NORMAL
  zh: “为[利基]写一封3段落的电子邮件，首先放大读者对[问题]的挫败感，然后把我[提议]定位为解决方案。”
- en: '**Prompt 88 — Emotional CTA Generator**'
  id: totrans-281
  prefs: []
  type: TYPE_NORMAL
  zh: '**提示 88 — 情感号召性用语生成器**'
- en: “Give me 10 emotional, urgency-based call-to-action phrases to use in social
    media captions or sales pages.”
  id: totrans-282
  prefs: []
  type: TYPE_NORMAL
  zh: “给我10个情感和紧迫性号召性用语，用于社交媒体标题或销售页面。”
- en: '**Prompt 89 — 3-Step Value Proposition Builder**'
  id: totrans-283
  prefs: []
  type: TYPE_NORMAL
  zh: '**提示 89 — 3步价值主张构建器**'
- en: '“Help me create a clear and compelling value proposition for my o er using:
    1) who it’s for, 2) what it does, 3) why it’s di erent.”'
  id: totrans-284
  prefs: []
  type: TYPE_NORMAL
  zh: “帮助我使用以下方式为我的提议创建一个清晰而有吸引力的价值主张：1) 它是为谁准备的，2) 它做什么，3) 它为什么不同。”
- en: '**Prompt 90 — O er Comparison Persuasion Prompt**'
  id: totrans-285
  prefs: []
  type: TYPE_NORMAL
  zh: '**提示 90 — 提供比较说服提示**'
- en: “Write persuasive copy that compares my o er to the typical alternatives — highlighting
    the unique benefits and downplaying objections.”
  id: totrans-286
  prefs: []
  type: TYPE_NORMAL
  zh: “写一篇有说服力的副本，将我的提议与典型替代方案进行比较——突出独特的好处，并淡化反对意见。”
- en: '**Prompt 91 — One-Liner Elevator Pitch Prompt**'
  id: totrans-287
  prefs: []
  type: TYPE_NORMAL
  zh: '**提示 91 — 一行电梯演讲提示**'
- en: “Create 3 one-liner pitches for a [product/service] using the ‘Help X do Y without
    Z’ formula.”
  id: totrans-288
  prefs: []
  type: TYPE_NORMAL
  zh: “使用‘帮助X做Y而不做Z’的公式，为[产品/服务]创建3个一行推销语。”
- en: '**Prompt 92 — Testimonial Rewrite Prompt**'
  id: totrans-289
  prefs: []
  type: TYPE_NORMAL
  zh: '**提示 92 — 测试imonials重写提示**'
- en: '“Take this raw client feedback: [insert testimonial] and rewrite it as a polished,
    conversion-boosting testimonial for my landing page.”'
  id: totrans-290
  prefs: []
  type: TYPE_NORMAL
  zh: “将这个原始客户反馈：[插入推荐语]重写为一份经过润色、能提高转化率的推荐语，用于我的着陆页。”
- en: '**Prompt 93 — Scarcity & FOMO Copy Prompt**'
  id: totrans-291
  prefs: []
  type: TYPE_NORMAL
  zh: '**提示 93 — 稀缺性与FOMO副本提示**'
- en: “Write 5 copy blocks I can use to create urgency around a limited-time o er
    — without sounding pushy or desperate.”
  id: totrans-292
  prefs: []
  type: TYPE_NORMAL
  zh: “写5个副本块，我可以用来围绕限时优惠创造紧迫感——同时不会听起来过于推诿或绝望。”
- en: '**Prompt 94 — Visual Metaphor Creator Prompt**'
  id: totrans-293
  prefs: []
  type: TYPE_NORMAL
  zh: '**提示 94 — 视觉隐喻创建提示**'
- en: “Create 3 visual metaphors or analogies I can use to explain the importance
    of [insert concept] in a more emotional, story-based way.”
  id: totrans-294
  prefs: []
  type: TYPE_NORMAL
  zh: “创建3个视觉隐喻或类比，我可以用来以更情感、基于故事的方式解释[插入概念]的重要性。”
- en: '**Prompt 95 — Objection Handling Email Prompt**'
  id: totrans-295
  prefs: []
  type: TYPE_NORMAL
  zh: '**提示 95 — 异议处理电子邮件提示**'
- en: '“Write a persuasive follow-up email that handles the objection: ‘I’m not sure
    this will work for me’ — for a [type of product].”'
  id: totrans-296
  prefs: []
  type: TYPE_NORMAL
  zh: “写一封有说服力的后续电子邮件，处理异议：‘我不确定这对我是否有用’——针对[产品类型]。”
- en: '**Chapter 10: Bonus — Create Your Own Prompt Templates (5 Meta-Prompts)**'
  id: totrans-297
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**第10章：额外内容 — 创建您自己的提示模板（5个元提示）**'
- en: You’ve used 95 ready-made prompts.
  id: totrans-298
  prefs: []
  type: TYPE_NORMAL
  zh: 你已经使用了95个现成的提示。
- en: Now it’s time to create your own — based on your unique goals, business, and
    voice.
  id: totrans-299
  prefs: []
  type: TYPE_NORMAL
  zh: 现在是时候根据你独特的目标、业务和声音创建自己的了。
- en: These meta-prompts will help you train ChatGPT or any other AI to think with
    you, not just for you.
  id: totrans-300
  prefs: []
  type: TYPE_NORMAL
  zh: 这些元提示将帮助你训练ChatGPT或任何其他AI与你一起思考，而不仅仅是为你服务。
- en: '**Prompt 96 — Prompt-Builder Assistant**'
  id: totrans-301
  prefs: []
  type: TYPE_NORMAL
  zh: '**提示 96 — 提示构建助手**'
- en: “Act as a prompt engineering assistant. Ask me 3 questions about my goal, platform,
    and audience — then generate a tailored prompt for that use.”
  id: totrans-302
  prefs: []
  type: TYPE_NORMAL
  zh: “扮演一个提示工程助手的角色。问我关于我的目标、平台和受众的3个问题——然后为该用途生成一个定制提示。”
- en: '**Prompt 97 — Repeatable Prompt Generator** “Create a prompt template I can
    use every time I want to [desired outcome] in [context]. Include variables I can
    easily replace.”'
  id: totrans-303
  prefs: []
  type: TYPE_NORMAL
  zh: '**提示 97 — 可重复的提示生成器** “创建一个提示模板，每次我想在[情境]中实现[期望结果]时都可以使用。包括我可以轻松替换的变量。”'
- en: 'Example output:'
  id: totrans-304
  prefs: []
  type: TYPE_NORMAL
  zh: 示例输出：
- en: “Write a [type of post] for [target audience] that teaches [topic] using [tone/style],
    with a clear call-to-action.”
  id: totrans-305
  prefs: []
  type: TYPE_NORMAL
  zh: “为[目标受众]写一篇[类型]帖子，使用[语气/风格]教授[主题]，并包含明确的号召性用语。”
- en: '**Prompt 98 — Role-Based Prompt Structure**'
  id: totrans-306
  prefs: []
  type: TYPE_NORMAL
  zh: '**提示 98 — 基于角色的提示结构**'
- en: '“Show me how to structure a high-performance prompt using the format: ‘Act
    as [role]. Do [task]. Use [style]. Deliver in [format].’”'
  id: totrans-307
  prefs: []
  type: TYPE_NORMAL
  zh: “展示如何使用以下格式构建高性能提示：'扮演[角色]。执行[任务]。使用[风格]。以[格式]呈现。'”
- en: This formula is your best friend when customizing prompts for writing, business,
    design, or personal development.
  id: totrans-308
  prefs: []
  type: TYPE_NORMAL
  zh: 当你为写作、商业、设计或个人发展定制提示时，这个公式是你的最佳拍档。
- en: '**Prompt 99 — Self-Learning Prompt Template**'
  id: totrans-309
  prefs: []
  type: TYPE_NORMAL
  zh: '**提示 99 — 自学习提示模板**'
- en: “Design a prompt that helps me learn from my past prompts and AI conversations.
    I want to improve my prompt engineering weekly.”
  id: totrans-310
  prefs: []
  type: TYPE_NORMAL
  zh: “设计一个提示，帮助我从过去的提示和AI对话中学习。我想每周提高我的提示工程技能。”
- en: AI can reflect on what worked and didn’t, helping you grow your skills like
    a real assistant.
  id: totrans-311
  prefs: []
  type: TYPE_NORMAL
  zh: AI可以反思哪些有效，哪些无效，帮助你像真正的助手一样提高技能。
- en: '**Prompt 100 — Personal Prompt System Builder**'
  id: totrans-312
  prefs: []
  type: TYPE_NORMAL
  zh: '**提示 100 — 个人提示系统构建器**'
- en: “Help me create a Notion/Google Doc template to organize and categorize my best-performing
    prompts by use case, platform, and result.”
  id: totrans-313
  prefs: []
  type: TYPE_NORMAL
  zh: “帮助我创建一个Notion/Google Doc模板，以用例、平台和结果来组织和分类我表现最好的提示。”
- en: Now you’re not just using AI — you’re building your own AI productivity system.
  id: totrans-314
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，你不仅在使用AI——你正在构建自己的AI生产力系统。
- en: '**Final Thought**'
  id: totrans-315
  prefs: []
  type: TYPE_NORMAL
  zh: '**最后思考**'
- en: This isn’t just a book of commands — it’s a launchpad.
  id: totrans-316
  prefs: []
  type: TYPE_NORMAL
  zh: 这不仅仅是一本命令手册——它是一个启动平台。
- en: The future doesn’t belong to coders or robots.
  id: totrans-317
  prefs: []
  type: TYPE_NORMAL
  zh: 未来不属于程序员或机器人。
- en: It belongs to humans who ask better questions.
  id: totrans-318
  prefs: []
  type: TYPE_NORMAL
  zh: 它属于那些提出更好问题的人类。
- en: With the right prompt, you can build a brand, scale a business, automate tasks,
    and express creativity like never before.
  id: totrans-319
  prefs: []
  type: TYPE_NORMAL
  zh: 用正确的提示，你可以打造品牌，扩展业务，自动化任务，以前所未有的方式表达创造力。
- en: So save these. Reuse them. Tweak them. And most importantly…
  id: totrans-320
  prefs: []
  type: TYPE_NORMAL
  zh: 所以保存这些。重复使用它们。调整它们。最重要的是……
- en: Keep prompting forward.
  id: totrans-321
  prefs: []
  type: TYPE_NORMAL
  zh: 继续提出提示。
