  id: totrans-787
  prefs: []
  type: TYPE_NORMAL
  zh: '○        ****回答** :'
- en: ■ "****Ca**ts** ****a**re** ****mo**re** ****inde**penden**t ****a**nd** ****d**on**'****t****
    ****ne**ed** ****a**s** ****mu**ch** ****atte**ntio**n ****a**s** ****do**gs**.
    ****Do**gs**, ****o**n** ****t**he** ****ot**her** ****ha**nd**, ****a**re** ****mo**re**
    ****so**cia**l ****a**nd** ****te**nd** ****t**o** ****b**e** ****mo**re** ****att**ache**d
    ****t**o** ****th**eir** ****ow**ner**s. ****Bo**th** ****a**re** ****gr**eat**
    ****pe**ts**, ****b**ut** ****ca**ts** ****a**re** ****be**tte**r ****su**ite**d
    ****f**or** ****th**ose** ****wi**th** ****bu**sy** ****sche**dule**s, ****wh**ile**
    ****do**gs** ****a**re** ****be**tte**r ****su**ite**d ****f**or** ****th**ose**
    ****w**ho** ****li**ke** ****t**o** ****sp**end** ****mo**re** ****ti**me** ****pla**yin**g
    ****a**nd** ****ca**rin**g ****f**or** ****a**** ****p**et**."
  id: totrans-788
  prefs: []
  type: TYPE_NORMAL
  zh: ■ "****猫比狗更独立，不需要那么多的关注。狗，另一方面，更社交，倾向于更依恋它们的的主人。两者都是伟大的宠物，但猫更适合那些日程繁忙的人，而狗更适合那些喜欢花更多时间玩耍和照顾宠物的人。"
