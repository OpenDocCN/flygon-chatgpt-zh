  id: totrans-765
  prefs: []
  type: TYPE_NORMAL
  zh: 根据Salesforce发布的名为《连接客户状态》的研究报告，89%的在线客户在从他们购买网站获得愉快的体验后，更愿意或更有可能再次购买（Afshar，2023）。正如在线世界一样，物理世界也是如此。把它想象成第一次约会。如果你是严格意义上的商人，想要尽快成交，你可能会采取一些一锤子买卖的行动，但机会是你不太可能得到第二次约会。然而，如果你让第一次约会成为一个难忘的经历，你更有可能按常规完成交易。即使你第一次没有做成销售，也有机会会有第二次、第三次，甚至第四次互动，在那之后你可能会做成交易。底线：你的客户服务技能越好，客户回头购买的可能性就越大。
