- en: 'Creating the Next Discord Bot: ContentModeratorBotDumb.java'
  id: totrans-972
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 创建下一个 Discord 机器人：ContentModeratorBotDumb.java
- en: The role of the content moderator is to make sure that unwanted content is not
    posted in the Discord server. Just like the previous bot that we created earlier
    in this chapter, this bot will not (yet) be artificially intelligent. In its current
    state, the bot will indiscriminately delete any message posted anywhere in the
    server that contains the word “puppies.”
  id: totrans-973
  prefs: []
  type: TYPE_NORMAL
  zh: 内容审核员的角色是确保不希望的内容不会发布在 Discord 服务器上。就像我们在本章前面创建的之前的机器人一样，这个机器人目前（还）不是人工智能。在其当前状态下，机器人将无差别地删除服务器上任何地方发布的包含单词“puppies”的消息。
- en: It’s not because puppies are inherently evil. However, they do have a tendency
    to destroy your favorite pair of shoes when left alone. In all honesty, we simply
    need something to test our code in Discord when we run our bot.
  id: totrans-974
  prefs: []
  type: TYPE_NORMAL
  zh: 这并不是因为小狗天生就是邪恶的。然而，当它们被单独留下时，它们确实有破坏你最喜欢的鞋子的倾向。坦白说，我们只是需要一些东西来在我们运行机器人时在 Discord
    上测试我们的代码。
- en: 'Listing [5-2](#PC5) is the code for ContentModeratorBotDumb.java.import java.io.IOException;import
    java.util.EnumSet;import net.dv8tion.jda.api.JDA;import net.dv8tion.jda.api.JDABuilder;import
    net.dv8tion.jda.api.entities.Activity;import net.dv8tion.jda.api.entities.Message;import
    net.dv8tion.jda.api.entities.User;import net.dv8tion.jda.api.entities.channel.unions.MessageChannelUnion;import
    net.dv8tion.jda.api.events.message.MessageReceivedEvent;import net.dv8tion.jda.api.hooks.ListenerAdapter;import
    net.dv8tion.jda.api.requests.GatewayIntent;// This class extends a ListenerAdapter
    to handle message events on Discord.public class ContentModeratorBotDumb extends
    ListenerAdapter {    // The bot''s Discord token for authentication.    static
    String discordToken = "YOUR_DISCORD_BOT_TOKEN";    static String bannedWord =
    "puppies";    public static void main(String[] args) throws IOException {        //
    Set of intents declaring which types of events the bot intends to listen to.        EnumSet<GatewayIntent>
    intents = EnumSet.of(                GatewayIntent.GUILD_MEMBERS,   // to get
    access to the members of the Discord server                GatewayIntent.GUILD_MODERATION,
    // to ban and unban members                GatewayIntent.GUILD_MESSAGES, // For
    messages in guilds                GatewayIntent.MESSAGE_CONTENT // To allow access
    to message content        );        // Initialize the bot with minimal configuration
    and the specified intents.        try {            JDA jda = JDABuilder.createLight(discordToken,
    intents)                    .addEventListeners(new ContentModeratorBotDumb())
    // Adding the current class as an event listener.                    .setActivity(Activity.customStatus("Helping
    to keep a friendly Discord server")) // Set the bot''s custom status.                    .build();            //
    Asynchronously get REST ping from Discord API and print it.            jda.getRestPing().queue(ping
    -> System.out.println("Logged in with ping: " + ping));            // Block the
    main thread until JDA is fully loaded.            jda.awaitReady();            //
    Print the number of guilds the bot is connected to.            System.out.println("Guilds:
    " + jda.getGuildCache().size());            // Print the Discord userID of the
    bot            System.out.println("Bot''s ID: " + jda.getSelfUser());        }
    catch (InterruptedException e) {            // Handle exceptions if the thread
    is interrupted during the awaitReady process.            e.printStackTrace();        }    }    @Override    public
    void onMessageReceived(MessageReceivedEvent messageEvent){        User senderDiscordID
    = messageEvent.getAuthor();        MessageChannelUnion channel = messageEvent.getChannel();        Message
    message = messageEvent.getMessage();        // Check whether the message was sent
    in a guild / server        if (messageEvent.isFromGuild()){            String
    content = message.getContentDisplay();            // Check if the message contains
    the banned word            if (content.contains(bannedWord)){                //
    Delete the message                message.delete().queue();                //
    Mention the user who sent the inappropriate message                String authorMention
    = senderDiscordID.getAsMention();                // Send a message mentioning
    the user and explaining why it was inappropriate                channel.sendMessage(authorMention
    + " This comment was deemed inappropriate for this channel. " +                        "If
    you believe this to be in error, please contact one of the human server moderators.").queue();            }        }    }   }Listing
    5-2'
  id: totrans-975
  prefs: []
  type: TYPE_NORMAL
  zh: '列表 [5-2](#PC5) 是 `ContentModeratorBotDumb.java` 的代码。`import java.io.IOException;
    import java.util.EnumSet; import net.dv8tion.jda.api.JDA; import net.dv8tion.jda.api.JDABuilder;
    import net.dv8tion.jda.api.entities.Activity; import net.dv8tion.jda.api.entities.Message;
    import net.dv8tion.jda.api.entities.User; import net.dv8tion.jda.api.entities.channel.unions.MessageChannelUnion;
    import net.dv8tion.jda.api.events.message.MessageReceivedEvent; import net.dv8tion.jda.api.hooks.ListenerAdapter;
    import net.dv8tion.jda.api.requests.GatewayIntent; // This class extends a ListenerAdapter
    to handle message events on Discord. public class ContentModeratorBotDumb extends
    ListenerAdapter { // The bot''s Discord token for authentication. static String
    discordToken = "YOUR_DISCORD_BOT_TOKEN"; static String bannedWord = "puppies";
    public static void main(String[] args) throws IOException { // Set of intents
    declaring which types of events the bot intends to listen to. EnumSet<GatewayIntent>
    intents = EnumSet.of( GatewayIntent.GUILD_MEMBERS, // to get access to the members
    of the Discord server GatewayIntent.GUILD_MODERATION, // to ban and unban members
    GatewayIntent.GUILD_MESSAGES, // For messages in guilds GatewayIntent.MESSAGE_CONTENT
    // To allow access to message content ); // Initialize the bot with minimal configuration
    and the specified intents. try { JDA jda = JDABuilder.createLight(discordToken,
    intents) .addEventListeners(new ContentModeratorBotDumb()) // Adding the current
    class as an event listener. .setActivity(Activity.customStatus("Helping to keep
    a friendly Discord server")) // Set the bot''s custom status. .build(); // Asynchronously
    get REST ping from Discord API and print it. jda.getRestPing().queue(ping -> System.out.println("Logged
    in with ping: " + ping)); // Block the main thread until JDA is fully loaded.
    jda.awaitReady(); // Print the number of guilds the bot is connected to. System.out.println("Guilds:
    " + jda.getGuildCache().size()); // Print the Discord userID of the bot System.out.println("Bot''s
    ID: " + jda.getSelfUser()); } catch (InterruptedException e) { // Handle exceptions
    if the thread is interrupted during the awaitReady process. e.printStackTrace();
    } } @Override public void onMessageReceived(MessageReceivedEvent messageEvent){
    User senderDiscordID = messageEvent.getAuthor(); MessageChannelUnion channel =
    messageEvent.getChannel(); Message message = messageEvent.getMessage(); // Check
    whether the message was sent in a guild / server if (messageEvent.isFromGuild()){
    String content = message.getContentDisplay(); // Check if the message contains
    the banned word if (content.contains(bannedWord)){ // Delete the message message.delete().queue();
    // Mention the user who sent the inappropriate message String authorMention =
    senderDiscordID.getAsMention(); // Send a message mentioning the user and explaining
    why it was inappropriate channel.sendMessage(authorMention + " This comment was
    deemed inappropriate for this channel. " + "If you believe this to be in error,
    please contact one of the human server moderators.").queue(); } } } Listing 5-2'
- en: ContentModeratorBotDumb.java
  id: totrans-976
  prefs: []
  type: TYPE_NORMAL
  zh: ContentModeratorBotDumb.java
- en: Handling Messages Sent to the Discord Server
  id: totrans-977
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 处理发送到 Discord 服务器的消息
- en: Again, let’s focus our attention on the onMessageReceived() method, since it’s
    called asynchronously every time a message is posted to the Discord server. As
    you can see, if the message posted to the server contains the banned word, then
    we delete the message, and warn the sender with a @mention message in the same
    channel where the offending message was posted.
  id: totrans-978
  prefs: []
  type: TYPE_NORMAL
  zh: 再次，让我们将注意力集中在 onMessageReceived() 方法上，因为它在每次向 Discord 服务器发布消息时都会异步调用。如您所见，如果发布到服务器的消息包含被禁止的单词，则我们删除该消息，并在发布违规消息的同一条频道中通过
    @mention 消息警告发送者。
- en: 'Success Again! Running Your Second Discord Bot: ContentModeratorBotDumb.java'
  id: totrans-979
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 再次成功！运行您的第二个 Discord 机器人：ContentModeratorBotDumb.java
- en: Now let’s run our second Java Discord bot. After executing the app, be sure
    to return back to your Discord server, and type a message in any channel that
    contains the offending word. Figure [5-17](#Fig17) shows the bot in action.![](../images/607613_1_En_5_Chapter/607613_1_En_5_Fig17_HTML.png)
  id: totrans-980
  prefs: []
  type: TYPE_NORMAL
  zh: 现在让我们运行我们的第二个 Java Discord 机器人。在执行应用程序后，务必返回到您的 Discord 服务器，并在任何包含违规单词的频道中输入一条消息。图
    [5-17](#Fig17) 展示了机器人在行动中的样子！![图 5-17](../images/607613_1_En_5_Chapter/607613_1_En_5_Fig17_HTML.png)
