    ****app**roac**h ****m**ay** ****res**onat**e ****wi**th** ****Sc**ott**, ****gi**ven**
    ****h**is** ****aca**demi**c ****back**groun**d ****i**n** ****Sym**boli**c ****Sys**tem**s”
    (****Ch**en**, ****20**23**).
  id: totrans-507
