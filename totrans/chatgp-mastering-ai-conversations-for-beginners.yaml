  id: totrans-316
  prefs: []
  type: TYPE_NORMAL
  zh: '**The** **above** **conversation** **between** **these** **two** **early**
    **language** **processing** **systems** **might** **seem** **like** **a** **funny**
    **chat** **between** **a** **disinterested** **psychologist** **and** **a** **grumpy**
    **schizo**, **but** **it** **was** **pretty** **revolutionary** **in** **terms**
    **of** **what** **it** **meant** **for** **the** **world** **of** **computing**
    **and** **A**I**. **And**, **while** **many** **debate** **whether** **EL**IZA**
    **and** **PA**RRY** **really** **passed** **the** **Turing** **Test** **due**
    **to** **Turing’s** **thesis** **that** **they** **should** **be** **able** **to**
    **repeatedly** **fool** **people** **into** **thinking** **they** **are** **actually**
    **human** **rather** **than** **just** **a** **once** **off**, **they** **marked**
    **a** **definite** **advance** **in** **artificial** **intelligence** **and**
    **machine** **learning**. **But** **what** **exactly** **does** **the** **term**
    **“** **machine** **learning”** **mean**? **And** **why** **was** **it** **so**
    **revolutionary** **for** **the** **advancement** **of** **robotics**? **(****Oh**,
    **and** **humankind** **too**!**)'
- en: '****L**et**’****s**** ****st**art** ****wi**th** ****t**he** ****defi**nitio**n.
