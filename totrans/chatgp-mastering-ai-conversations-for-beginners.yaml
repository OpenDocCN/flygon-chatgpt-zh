  zh: '****当**你**应**该**确**保**你**的**聊天**机器人**友**好**、**协**作**，**并且**在**可能**的**范围内**具**有**语境**意识**时，**记**得**你**的**客户**并不**是**为了**一**个**好**的**对话**而**与**你**的**机器人**交**谈**。**聊天**机器人**被**创**造**出来**以**帮**助**你**的**客户**，**通过**为**他**们**提**供**解**决**方**案**，**确保**他**们**能**够**快**速**、**高效**地**做**到**这**一点**。**时间**终**归**是**金钱**，**确保**你**不**会**因**为**使**用**你**的**聊天**机器人**的**回**答**无**需**要**地**冗**长**、**复杂**或**诗意**而**浪**费**。**对话**设计**的**最**好**用**途**是**使**用**简**单**、**直**观**的**语**言**，**并**且**回**答**应**该**跟**随**合**理**的**逻辑**顺序**，**而**不**是**使用**长**篇**大**论**和**含**糊**的**逻辑**。**底线**：**直**达**要**点**。'
