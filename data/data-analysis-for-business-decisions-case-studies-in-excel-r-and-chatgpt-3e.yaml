  zh: 图 10.17 预测机场各个区域客户满意度分数的线性回归模型的系数结果，以预测总体满意度分数 Q7ALL
- en: ChatGPT Answer to the Framed Analytical Question
  id: totrans-1557
  prefs: []
  type: TYPE_NORMAL
  zh: 针对构建的解析问题的 ChatGPT 回复
- en: As we have done previously, we can use the Generative AI model to answer the
    questions framed in this case.
  id: totrans-1558
  prefs: []
  type: TYPE_NORMAL
  zh: 如我们之前所做的那样，我们可以使用生成式 AI 模型来回答这个案例中构建的问题。
- en: 'Prompt: “Create a multivariate regression model to predict the overall score
    Q7ALL someone will give given selected sub-question scores (Q7FOOD, Q7STORE, Q7SIGN,
    Q7SCREENS, and Q7WIFI).”'
  id: totrans-1559
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：创建一个多元回归模型，以预测给定选定的子问题得分（Q7FOOD、Q7STORE、Q7SIGN、Q7SCREENS 和 Q7WIFI）的人将给出的总体分数
    Q7ALL。
- en: 'Response from ChatGPT:'
  id: totrans-1560
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT 的回复：
- en: The model uses the scores from Q7FOOD, Q7STORE, Q7SIGN, Q7SCREENS, and Q7WIFI
    as predictors to estimate the overall score Q7ALL. The model has been fitted using
    the available data, and the coefficients have been determined. Here is the regression
    equation based on the model.
  id: totrans-1561
  prefs: []
  type: TYPE_NORMAL
  zh: 该模型使用 Q7FOOD、Q7STORE、Q7SIGN、Q7SCREENS 和 Q7WIFI 的得分作为预测因子来估计总体分数 Q7ALL。模型已经根据可用数据进行拟合，并确定了系数。以下是基于模型的回归方程。
- en: Q7ALL=1.358+0.095×Q7FOOD+0.057×Q7STORE+0.198×Q7SIGN+0.211×Q7SCREENS+0.067×Q7WIFI
  id: totrans-1562
  prefs: []
  type: TYPE_NORMAL
  zh: Q7ALL=1.358+0.095×Q7FOOD+0.057×Q7STORE+0.198×Q7SIGN+0.211×Q7SCREENS+0.067×Q7WIFI
- en: CHAPTER 11
  id: totrans-1563
  prefs: []
  type: TYPE_NORMAL
  zh: 第十一章
- en: FORECASTING AND TIME SERIES
  id: totrans-1564
  prefs: []
  type: TYPE_NORMAL
  zh: 预测和时序
- en: '![image](images/pg235.jpg)'
  id: totrans-1565
  prefs: []
  type: TYPE_IMG
  zh: '![image](images/pg235.jpg)'
- en: This chapter introduces analysts to the essential concepts of forecasting and
    time series analysis, building upon the regression techniques explored in previous
    chapters. This chapter focuses on how to analyze and predict trends in data that
    are collected over time, a crucial skill in many fields, including business, economics,
    and environmental science.
  id: totrans-1566
  prefs: []
  type: TYPE_NORMAL
  zh: 本章向分析师介绍了预测和时序分析的基本概念，这些概念建立在之前章节中探讨的回归技术之上。本章重点介绍如何分析和预测随时间收集的数据中的趋势，这在许多领域（包括商业、经济学和环境科学）都是一个关键技能。
- en: Forecasting is the process of making predictions about future events based on
    historical data and current trends. Time series analysis, the foundation of forecasting,
    involves studying data points collected at regular intervals over time. This chapter
    will explore how to identify patterns, trends, and seasonality in time series
    data, and how to use this information to make informed predictions about future
    outcomes.
  id: totrans-1567
  prefs: []
  type: TYPE_NORMAL
  zh: 预测是基于历史数据和当前趋势对未来事件进行预测的过程。时序分析，预测的基础，涉及研究在时间上定期收集的数据点。本章将探讨如何识别时序数据中的模式、趋势和季节性，以及如何利用这些信息对未来结果做出明智的预测。
- en: 'These techniques answer the following business questions: “What is the trend
    line for this time series?” and “Can we forecast into future time periods? What
    is the nature of the trend: linear, exponential, or some other form?”'
  id: totrans-1568
  prefs: []
  type: TYPE_NORMAL
  zh: 这些技术回答以下商业问题：“这个时间序列的趋势线是什么？”和“我们能否预测到未来的时间段？趋势的性质是线性的、指数的，还是其他形式？”
- en: 'The chapter begins by introducing the basic components of a time series: trend,
    seasonality, cyclical patterns, and random fluctuations. You will learn how to
    recognize these components and understand their significance in the context of
    forecasting. We discuss various techniques for visualizing time series data, including
    line plots and scatter plots, which help in identifying patterns and potential
    outliers.'
  id: totrans-1569
  prefs: []
  type: TYPE_NORMAL
  zh: 本章首先介绍了时间序列的基本组成部分：趋势、季节性、周期性模式和随机波动。你将学习如何识别这些组成部分，并理解它们在预测背景下的重要性。我们讨论了可视化时间序列数据的不同技术，包括折线图和散点图，这些有助于识别模式和潜在的异常值。
- en: Next, we consider different forecasting methods, starting with simple techniques
    like moving averages and exponential smoothing. These methods provide a foundation
    for understanding how past data can be used to predict future values.
  id: totrans-1570
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们考虑不同的预测方法，从简单的移动平均和指数平滑技术开始。这些方法为理解如何使用过去的数据来预测未来的值提供了基础。
- en: Throughout the chapter, we emphasize the importance of model selection and validation.
    You learn how to choose appropriate forecasting models based on the characteristics
    of their data and how to evaluate the accuracy of their predictions using metrics
    like Mean Absolute Error (MAE) and Root Mean Square Error (RMSE).
  id: totrans-1571
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们强调了模型选择和验证的重要性。你将学习如何根据数据特征选择合适的预测模型，以及如何使用如平均绝对误差（MAE）和均方根误差（RMSE）等指标来评估预测的准确性。
- en: The chapter also addresses the limitations and challenges of forecasting. We
    discuss the concept of forecast uncertainty and how to communicate this uncertainty
    effectively to stakeholders. We consider the dangers of overfitting and the importance
    of distinguishing between in-sample and out-of-sample forecasting performance.
  id: totrans-1572
  prefs: []
  type: TYPE_NORMAL
  zh: 本章还讨论了预测的局限性和挑战。我们讨论了预测不确定性的概念以及如何有效地向利益相关者传达这种不确定性。我们考虑了过度拟合的危险以及区分样本内和样本外预测性能的重要性。
- en: Practical applications are a focus of this chapter, with examples drawn from
    various industries to illustrate how forecasting is used in real-world decision-making.
    We explore case studies in areas such as sales forecasting, demand prediction,
    and economic forecasting, demonstrating how time series analysis can inform strategic
    planning and resource allocation.
  id: totrans-1573
  prefs: []
  type: TYPE_NORMAL
  zh: 实际应用是本章的重点，通过从各个行业抽取的例子来说明预测在现实世界决策中的应用。我们探讨了销售预测、需求预测和经济预测等领域的案例研究，展示了时间序列分析如何为战略规划和资源配置提供信息。
- en: We also examine some of the common software tools used in forecasting, including
    Excel’s built-in forecasting functions and more specialized statistical software.
    Step-by-step guidance is provided on how to implement different forecasting techniques
    using these tools, with a focus on practical applications in business settings.
  id: totrans-1574
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还考察了一些在预测中常用的软件工具，包括Excel内置的预测函数和更专业的统计软件。提供了逐步指导，说明如何使用这些工具实现不同的预测技术，重点关注商业环境中的实际应用。
- en: By the end of the chapter, you should have a solid understanding of the principles
    of forecasting and time series analysis. You will be equipped with the skills
    to analyze time-dependent data, choose appropriate forecasting methods, and interpret
    the results critically. This knowledge will be directly applicable in many professional
    contexts where data-driven decision-making is crucial.
  id: totrans-1575
  prefs: []
  type: TYPE_NORMAL
  zh: 到本章结束时，你应该对预测和时间序列分析的原则有扎实的理解。你将具备分析时间依赖数据、选择合适的预测方法和批判性地解释结果的能力。这些知识将在许多需要数据驱动决策的专业环境中直接适用。
- en: We use a combination of theoretical explanations, practical examples, and hands-on
    exercises to reinforce learning. You will have opportunities to work with real
    datasets, applying the techniques they have learned to solve realistic forecasting
    problems. This practical experience will be invaluable in preparing you to apply
    these skills effectively in your current roles and future projects.
  id: totrans-1576
  prefs: []
  type: TYPE_NORMAL
  zh: 我们结合理论解释、实际例子和动手练习来强化学习。你将有机会使用真实数据集，将所学技术应用于解决实际的预测问题。这种实践经验将对你有效地应用这些技能于当前角色和未来项目中非常有价值。
- en: Forecasting and Time Series Analysis
  id: totrans-1577
  prefs: []
  type: TYPE_NORMAL
  zh: 预测与时间序列分析
- en: What are Forecasting and Time Series Analysis?
  id: totrans-1578
  prefs: []
  type: TYPE_NORMAL
  zh: 什么是预测和时间序列分析？
- en: Forecasting is the process of making predictions about the future based on past
    and present data. It is a common technique in various fields such as economics,
    weather prediction, and supply chain management. Time series, a crucial element
    in forecasting, refers to a sequence of data points recorded at regular time intervals.
    This data is analyzed to understand long-term patterns and trends, which are vital
    in making informed forecasts. The objective of forecasting is to provide a basis
    for decision-making and planning by predicting what is likely to happen in the
    future.
  id: totrans-1579
  prefs: []
  type: TYPE_NORMAL
  zh: 预测是基于过去和现在的数据对未来进行预测的过程。它在经济学、天气预报和供应链管理等各个领域都是一种常见的技巧。时间序列是预测中的一个关键要素，指的是在固定时间间隔记录的一系列数据点。通过分析这些数据，可以理解长期模式和趋势，这对于做出明智的预测至关重要。预测的目标是通过预测未来可能发生的事情，为决策和规划提供依据。
- en: Time series analysis, an integral part of forecasting, involves statistical
    techniques to model and explain the time-dependent nature of the data. This analysis
    helps in identifying consistent patterns like seasonality or trends, as well as
    detecting anomalies. These models account for different components of the data,
    such as trends, seasonality, and error components, to make accurate predictions.
    The accuracy of forecasting models is crucial and is often assessed using techniques
    like cross-validation and performance metrics.
  id: totrans-1580
  prefs: []
  type: TYPE_NORMAL
  zh: 时间序列分析是预测的一个组成部分，它涉及统计技术来建模和解释数据的时序特性。这种分析有助于识别一致的模式，如季节性或趋势，以及检测异常。这些模型考虑了数据的不同组成部分，如趋势、季节性和误差成分，以做出准确的预测。预测模型的准确性至关重要，通常使用交叉验证和性能指标等技术进行评估。
- en: Forecasting and time series analysis are widely used in practical applications
    such as stock market predictions, inventory control, budget planning, and demand
    forecasting. For example, in finance, time series analysis helps in predicting
    stock prices, while in meteorology, it aids in weather forecasting. Big data and
    machine learning have expanded the scope of forecasting, incorporating complex
    algorithms for better precision. However, forecasting is not infallible and is
    influenced by uncertainties and external factors, so it is important to continuously
    refine models with new data. Overall, forecasting and time series analysis are
    powerful tools for making data-driven decisions across various industries.
  id: totrans-1581
  prefs: []
  type: TYPE_NORMAL
  zh: 预测和时间序列分析在诸如股票市场预测、库存控制、预算规划和需求预测等实际应用中得到了广泛的应用。例如，在金融领域，时间序列分析有助于预测股价，而在气象学领域，它有助于天气预报。大数据和机器学习扩展了预测的范围，引入了更复杂的算法以提高精度。然而，预测并非总是可靠的，它受到不确定性和外部因素的影响，因此，使用新数据不断改进模型是很重要的。总的来说，预测和时间序列分析是跨各种行业做出数据驱动决策的强大工具。
- en: What are the Elements of Forecasting and Time Series Analysis?
  id: totrans-1582
  prefs: []
  type: TYPE_NORMAL
  zh: 预测和时间序列分析的基本要素是什么？
- en: 'Forecasting and time series analysis involve several important elements that
    contribute to their effectiveness and accuracy:'
  id: totrans-1583
  prefs: []
  type: TYPE_NORMAL
  zh: 预测和时间序列分析涉及几个重要的要素，这些要素有助于提高其有效性和准确性：
- en: '**1.**Data collection: This is the first and foundational step in time series
    analysis. It involves gathering relevant historical data, which is typically sequential
    and recorded over regular time intervals. The quality and granularity of this
    data directly impact the accuracy of the forecasting.'
  id: totrans-1584
  prefs: []
  type: TYPE_NORMAL
  zh: '**1.** 数据收集：这是时间序列分析的第一步，也是基础步骤。它涉及收集相关的历史数据，这些数据通常是按顺序记录的，并且是在固定时间间隔内记录的。这些数据的质量和粒度直接影响预测的准确性。'
- en: '**2.**Trend analysis: Trends represent the general direction in which the data
    is moving over a long period. Identifying trends is crucial for making long-term
    forecasts. Trends can be upward, downward, or even horizontal (stationary), reflecting
    different dynamics in the underlying process.'
  id: totrans-1585
  prefs: []
  type: TYPE_NORMAL
  zh: '**2.** 趋势分析：趋势代表了数据在长时间内移动的一般方向。识别趋势对于做出长期预测至关重要。趋势可以是上升的、下降的，甚至是水平的（平稳的），反映了基础过程中的不同动态。'
- en: '**3.**Seasonality: This element refers to patterns that repeat at regular intervals,
    such as daily, weekly, monthly, or yearly. Seasonal effects are vital in many
    areas, like retail sales, which often see predictable fluctuations at certain
    times of the year.'
  id: totrans-1586
  prefs: []
  type: TYPE_NORMAL
  zh: '**3.** 季节性：这个要素指的是在固定时间间隔重复出现的模式，如每日、每周、每月或每年。季节性效应在许多领域都很重要，例如零售销售，这些领域在一年中的某些时间通常会看到可预测的波动。'
- en: '**4.**Cyclic patterns: Unlike seasonality, cyclic patterns do not follow a
    fixed schedule but are still repetitive. These cycles can be caused by economic,
    environmental, or social factors and can span over years or even decades.'
  id: totrans-1587
  prefs: []
  type: TYPE_NORMAL
  zh: '**4.**周期性模式：与季节性不同，周期性模式不遵循固定的日程安排，但仍然是重复的。这些周期可能由经济、环境或社会因素引起，并可能跨越数年甚至数十年。'
- en: '**5.**Noise or random variation: This refers to the irregular or unpredictable
    fluctuations in the data that cannot be attributed to trend, seasonality, or cycles.
    Noise makes it challenging to extract meaningful insights from the data and is
    an inherent part of most time series datasets.'
  id: totrans-1588
  prefs: []
  type: TYPE_NORMAL
  zh: '**5.**噪声或随机变化：这指的是数据中无法归因于趋势、季节性或周期的不可预测的波动。噪声使得从数据中提取有意义的见解变得具有挑战性，并且是大多数时间序列数据集的固有部分。'
- en: '**6.**Model selection and building: Depending on the characteristics of the
    time series data, different models like ARIMA, Exponential Smoothing, or more
    complex machine learning models are used. The choice of model is critical and
    depends on the nature of the data and the specific forecasting objectives.'
  id: totrans-1589
  prefs: []
  type: TYPE_NORMAL
  zh: '**6.**模型选择和构建：根据时间序列数据的特征，使用不同的模型，如ARIMA、指数平滑或更复杂的机器学习模型。模型的选择至关重要，并取决于数据的性质和具体的预测目标。'
- en: '**7.**Model fitting and diagnostic checks: This involves adjusting the model
    parameters to best fit the historical data and performing checks to ensure the
    model adequately captures the underlying patterns without overfitting.'
  id: totrans-1590
  prefs: []
  type: TYPE_NORMAL
  zh: '**7.**模型拟合和诊断检查：这涉及到调整模型参数以最佳拟合历史数据，并执行检查以确保模型充分捕捉到潜在的模式而不过度拟合。'
- en: '**8.**Forecasting: Once the model is built and validated, it is used to make
    predictions about future values. This step involves projecting the identified
    patterns forward in time.'
  id: totrans-1591
  prefs: []
  type: TYPE_NORMAL
  zh: '**8.**预测：一旦模型构建并验证，它就用于对未来值进行预测。这一步骤涉及到将识别出的模式向前投射到时间上。'
- en: An Example of Analyzing a Time Series and Forecasting for a Dataset
  id: totrans-1592
  prefs: []
  type: TYPE_NORMAL
  zh: 分析时间序列和为数据集进行预测的示例
- en: 'Here is an example of forecasting and creating a time series for WDISelectedData.xlsx
    dataset found in the Case Data folder:'
  id: totrans-1593
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是一个预测和为案例数据文件夹中找到的WDISelectedData.xlsx数据集创建时间序列的示例：
- en: '![image](images/pg240.jpg)'
  id: totrans-1594
  prefs: []
  type: TYPE_IMG
  zh: '![image](images/pg240.jpg)'
- en: FIGURE 11.1 Example of forecasting and creating a time series showing the GDP
    of China
  id: totrans-1595
  prefs: []
  type: TYPE_NORMAL
  zh: 图11.1 预测和创建显示中国GDP的时间序列的示例
- en: In the example from our dataset, we have visualized the Gross Domestic Product
    (GDP) of China from the year 2000 to 2012\. This data presents a classic time
    series, with each data point representing the GDP for a specific year. The graph
    plotted ([Figure 11.1](#fig11-1)), which displays the GDP growth over time, is
    an essential first step in time series analysis.
  id: totrans-1596
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们的数据集的示例中，我们已经可视化了2000年至2012年中国国内生产总值（GDP）。这些数据呈现了一个经典的时间序列，每个数据点代表特定年份的GDP。绘制的图表（[图11.1](#fig11-1)），显示了GDP随时间的变化，是时间序列分析的重要第一步。
- en: Looking at the graph, we can observe a clear upward trend in China’s GDP, indicating
    consistent economic growth over these years. This trend is one of the critical
    elements in time series analysis, as it helps in understanding the general direction
    in which the variable (in this case, GDP) is moving. Furthermore, this data can
    be utilized for forecasting future GDP values. Forecasting involves using historical
    data to predict future outcomes. In this context, we would use the GDP data from
    2000 to 2012 to forecast China’s GDP in the subsequent years.
  id: totrans-1597
  prefs: []
  type: TYPE_NORMAL
  zh: 从图表中可以看出，中国GDP呈现明显的上升趋势，表明这些年来持续的经济增长。这一趋势是时间序列分析中的关键要素，因为它有助于理解变量（在本例中为GDP）移动的一般方向。此外，这些数据可以用于预测未来的GDP值。预测涉及使用历史数据来预测未来结果。在这种情况下，我们将使用2000年至2012年的GDP数据来预测随后的年份的中国GDP。
- en: 'Analysis Case 11.1: Forecasting and Time Series Analysis'
  id: totrans-1598
  prefs: []
  type: TYPE_NORMAL
  zh: 分析案例11.1：预测和时间序列分析
- en: Analysis with Excel
  id: totrans-1599
  prefs: []
  type: TYPE_NORMAL
  zh: 使用Excel进行分析
- en: We can use linear regression and other forms of curve fitting to create forecasting
    models. Using the Case Dataset files, find the file WDISelectedData.xlsx. Open
    WDISelectedData.xlsx using Excel.
  id: totrans-1600
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以使用线性回归和其他形式的曲线拟合来创建预测模型。使用案例数据集文件，找到文件WDISelectedData.xlsx。使用Excel打开WDISelectedData.xlsx。
- en: 'We are going to answer these questions:'
  id: totrans-1601
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将回答以下问题：
- en: What is the growth rate of the Chinese GDP and the growth rate of the US GDP?
  id: totrans-1602
  prefs: []
  type: TYPE_NORMAL
  zh: 中国和美国的GDP增长率是多少？
- en: When do you project the Chinese GDP to catch up with the US GDP?
  id: totrans-1603
  prefs: []
  type: TYPE_NORMAL
  zh: 你预计何时中国的GDP将赶上美国的GDP？
- en: As per our standard practice of not altering raw data, we will create a formatted
    file for our analysis in a new spreadsheet. First, select the title row from the
    original file and copy it into the new spreadsheet. Then, do the same for the
    GDP data rows for both the US and China. This will result in a simple table ([Figure
    11.2](#fig11-2)).
  id: totrans-1604
  prefs: []
  type: TYPE_NORMAL
  zh: 根据我们不更改原始数据的标准做法，我们将创建一个新的电子表格中的格式化文件进行分析。首先，从原始文件中选择标题行并将其复制到新电子表格中。然后，为美国和中国的
    GDP 数据行执行相同的操作。这将产生一个简单的表格（[图 11.2](#fig11-2)）。
- en: '![image](images/pg241.jpg)'
  id: totrans-1605
  prefs: []
  type: TYPE_IMG
  zh: '![image](images/pg241.jpg)'
- en: FIGURE 11.2 Scraped and cleaned data for the US vs. China GDP analysis
  id: totrans-1606
  prefs: []
  type: TYPE_NORMAL
  zh: 图 11.2 美国与中国 GDP 分析的抓取和清洗数据
- en: To create a properly shaped file, delete the first two columns and the column
    with country abbreviations. Replace the dates on the top row with simple dates
    (2000, 2001, 2002, etc.). Create another two rows with the country data normalized
    by dividing by 1 trillion (1,000,000,000,000). This gives us numbers we can easily
    recognize. Swap “China” and “US” so the US is in the first row of data (so the
    colors of the resulting bars are semantically correct). Select the data rows and
    insert a bar chart into the spreadsheet. Enter the titles of each series and put
    the dates into the x-axis. Move the legend on the chart to the bottom.
  id: totrans-1607
  prefs: []
  type: TYPE_NORMAL
  zh: 要创建一个形状合适的文件，删除前两列和带有国家缩写的列。将顶部行的日期替换为简单的日期（2000、2001、2002 等）。创建另外两行，用除以 1 万亿（1,000,000,000,000）的方式对国家数据进行标准化。这给了我们容易识别的数字。交换“中国”和“美国”，使美国成为数据的第一行（这样结果的条形图颜色在语义上是正确的）。选择数据行，在电子表格中插入条形图。输入每个系列标题，并将日期放入
    x 轴。将图例移到图表底部。
- en: Now, let’s create a predictive model. Right-click on the US data points on the
    chart (make sure all data points for the US series are selected). Click on “Add
    a Trend line.” Make sure also to click to have the R-squared factor added. You
    will get a linear model. ([Figure 11.3](#fig11-3)). Repeat for China. Make it
    a linear model as well. What is the R-squared factor for each linear model? Acceptable?
    How does the linear model look like a good fit for China’s GDP trend? Click on
    the data for China once again and add another trend line. Select an exponential
    model for this new trend line. Make sure to ask for R-squared, and change the
    color of this trend line to red. Does it fit the data better?
  id: totrans-1608
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们创建一个预测模型。在图表上的美国数据点处右键单击（确保选择了 US 系列的所有数据点）。点击“添加趋势线”。确保还点击以添加 R 平方因子。你将得到一个线性模型。（[图
    11.3](#fig11-3)）。对中国重复此操作。也使其成为线性模型。每个线性模型的 R 平方因子是多少？可接受吗？线性模型如何看起来适合中国 GDP 的趋势？再次点击中国的数据，并添加另一个趋势线。为这个新的趋势线选择指数模型。确保要求
    R 平方，并将此趋势线的颜色改为红色。它更适合数据吗？
- en: Let’s use these as forecasts. Click on the US linear model and select “Format
    Trend line.” In the middle of the dialog box, you can add a forecast. Note that
    the data is in years. That indicates that the “periods” in a forecast will be
    “years.” In the trend line dialog box, find the “periods” section and enter five
    periods (years in this case). Repeat for the Chinese exponential model. Where
    do the lines cross? What is the answer to our question?
  id: totrans-1609
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们把这些用作预测。点击美国线性模型并选择“格式趋势线”。在对话框中间，你可以添加一个预测。注意数据是按年计算的。这表明预测中的“周期”将是“年”。在趋势线对话框中，找到“周期”部分并输入五个周期（在这种情况下是年）。为中国指数模型重复此操作。线在哪里交叉？我们问题的答案是什么？
- en: Repeat for the Chinese GDP linear model and see what sort of five-year forecast
    it creates ([Figure 11.4](#fig11-4)).
  id: totrans-1610
  prefs: []
  type: TYPE_NORMAL
  zh: 对中国 GDP 线性模型重复此操作，看看它创造了什么样的五年预测（[图 11.4](#fig11-4)）。
- en: '![image](images/pg242.jpg)'
  id: totrans-1611
  prefs: []
  type: TYPE_IMG
  zh: '![image](images/pg242.jpg)'
- en: FIGURE 11.3 Setting up the trend line in Excel
  id: totrans-1612
  prefs: []
  type: TYPE_NORMAL
  zh: 图 11.3 在 Excel 中设置趋势线
- en: '![image](images/pg243.jpg)'
  id: totrans-1613
  prefs: []
  type: TYPE_IMG
  zh: '![image](images/pg243.jpg)'
- en: FIGURE 11.4 Steps in creating forecasts to compare US and Chinese GDP and analyze
    for crossover
  id: totrans-1614
  prefs: []
  type: TYPE_NORMAL
  zh: 图 11.4 创建预测以比较 US 和 Chinese GDP 并进行分析的步骤
- en: Analysis with R
  id: totrans-1615
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 R 进行分析
- en: Using the Case Dataset files provided, find the WDISelectedData.xlsx. Use the
    function in Jamovi with the settings shown in [Figure 11.5](#fig11-5), and [Figure
    11.6](#fig11-6) for the analysis in R.
  id: totrans-1616
  prefs: []
  type: TYPE_NORMAL
  zh: 使用提供的案例数据集文件，找到 WDISelectedData.xlsx。使用 Jamovi 中的功能，并按照 [图 11.5](#fig11-5) 和
    [图 11.6](#fig11-6) 中的设置进行 R 的分析。
- en: '![image](images/pg243_1.jpg)'
  id: totrans-1617
  prefs: []
  type: TYPE_IMG
  zh: '![image](images/pg243_1.jpg)'
- en: FIGURE 11.5 Parameters set in Jamovi
  id: totrans-1618
  prefs: []
  type: TYPE_NORMAL
  zh: 图 11.5 在 Jamovi 中设置的参数
- en: '![image](images/pg244.jpg)'
  id: totrans-1619
  prefs: []
  type: TYPE_IMG
  zh: '![image](images/pg244.jpg)'
- en: FIGURE 11.6 Visualization showing the comparison of GDP between China and the
    US
  id: totrans-1620
