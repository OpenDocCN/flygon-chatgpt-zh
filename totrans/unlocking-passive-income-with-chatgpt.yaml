  type: TYPE_IMG
  zh: '![image](d2d_images/chapter_title_above.png)'
- en: Exploring Cutting-Edge AI Technologies
  id: totrans-1238
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 探索尖端人工智能技术
- en: '![image](d2d_images/chapter_title_below.png)'
  id: totrans-1239
  prefs: []
  type: TYPE_IMG
  zh: '![image](d2d_images/chapter_title_below.png)'
- en: 'These are the top 10 cutting-edge AI-integrated EdTech Tools that you should
    try:'
  id: totrans-1240
  prefs: []
  type: TYPE_NORMAL
  zh: 这些是您应该尝试的10个顶尖的AI集成教育技术工具：
- en: Brainly
  id: totrans-1241
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: Brainly
- en: Say hello to your new AI buddy! Brainly is the ultimate problem-solving pal.
    You can take advantage of its smart tech and moderating abilities to quickly give
    you helpful answers.
  id: totrans-1242
  prefs: []
  type: TYPE_NORMAL
  zh: 向您的AI伙伴问好！Brainly是终极问题解决伙伴。您可以利用其智能技术和监管能力，快速获得有用的答案。
- en: Cognii
  id: totrans-1243
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: Cognii
- en: Cognii makes learning easier - it’s like having a great virtual tutor right
    by your side at all times! Cognii understands your language and provides personalized
    feedback and assessments for optimal growth. Plus, it can be integrated into any
    type of Learning Management System.
  id: totrans-1244
  prefs: []
  type: TYPE_NORMAL
  zh: Cognii让学习变得更简单——它就像始终有位优秀的虚拟导师在您身边！Cognii理解您的语言，并提供个性化的反馈和评估以实现最佳增长。此外，它还可以集成到任何类型的课程管理系统。
- en: Duolingo
  id: totrans-1245
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: Duolingo
- en: Duolingo makes learning languages fun and free. With over 40 different languages
    available, you’ll feel like playing a game while earning points towards unlocking
    achievements during each course journey. Created by the brilliant minds of Luis
    von Ahn and Severin Hacker, Duolingo has utilized NLP chatbots that allow users
    to communicate within their target language along with clever ML algorithms analyzing
    user input which helps pinpoint mistakes as well as providing tailor-made guidance
    for maximum results.
  id: totrans-1246
  prefs: []
  type: TYPE_NORMAL
  zh: Duolingo让语言学习变得有趣且免费。提供超过40种不同的语言，您在学习过程中会感觉像在玩游戏一样，同时赚取积分以解锁每个课程旅程中的成就。由Luis
    von Ahn和Severin Hacker的杰出智慧创造，Duolingo利用了NLP聊天机器人，允许用户在目标语言中进行交流，以及巧妙的机器学习算法分析用户输入，帮助指出错误并提供量身定制的指导，以实现最佳效果。
- en: Knewton
  id: totrans-1247
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: Knewton
- en: Knewton, established in 2008, provides students with tailored learning solutions.
    Leveraging AI and ML algorithms, they are able to analyze students’ study habits
    and generate personalized content recommendations - from lesson plans to study
    strategies - that optimize each individual’s academic journey. All of this comes
    together for an educational experience that feels made just for you. No more one-size
    fits all; Knewton has got your back when it comes to getting the most out of your
    studies.
  id: totrans-1248
  prefs: []
  type: TYPE_NORMAL
  zh: Knewton成立于2008年，为学生提供定制的学习解决方案。利用AI和机器学习算法，他们能够分析学生的学习习惯，并生成个性化的内容推荐——从课程计划到学习策略——以优化每个个体的学术旅程。所有这些结合在一起，为您带来一种感觉就像是为您量身定制的教育体验。不再是一刀切；当您需要从学习中获取最大收益时，Knewton会支持您。
- en: Grammarly
  id: totrans-1249
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: Grammarly
- en: Grammarly, your reliable AI-powered writing assistant! This tool is here to
    give you an edge in perfecting your prose and making sure every word counts. From
    catching pesky typos to schooling you on grammar rules, Grammarly has everything
    covered.
  id: totrans-1250
  prefs: []
  type: TYPE_NORMAL
  zh: Grammarly，您的可靠AI写作助手！这个工具旨在帮助您在完善散文和确保每个词都算数方面取得优势。从捕捉讨厌的错别字到教授您语法规则，Grammarly无所不包。
- en: But wait, there’s more; with some cutting-edge algorithms and natural language
    processing, this powerhouse will analyze all of your text in real-time, giving
    precious feedback on how to improve any document or email masterpiece – no matter
    the genre you write in. Students, professionals, and writers alike are making
    this their go-to when they need wordsmithing help.
  id: totrans-1251
  prefs: []
  type: TYPE_NORMAL
  zh: 但是等等，还有更多；凭借一些尖端算法和自然语言处理技术，这个强大的工具将实时分析您的所有文本，提供宝贵的反馈，告诉您如何改进任何文档或电子邮件杰作——无论您写的是哪种体裁。学生、专业人士和作家都将它作为他们需要文字处理帮助时的首选。
- en: Quillbot
  id: totrans-1252
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: Quillbot
- en: Quillbot is a revolutionary AI-powered paraphrasing tool. Whether you need help
    with one sentence or an entire article, this innovative technology has got your
    back. It quickly understands your content and provides relevant rephrasings that
    will take your writing to new heights. And don’t forget about its modes like conventional,
    fluency, formal, simple, and imaginative - just choose what works best for you.
  id: totrans-1253
  prefs: []
  type: TYPE_NORMAL
  zh: Quillbot是一款革命性的AI驱动的改写工具。无论你需要帮助的是一句话还是一整篇文章，这项创新技术都能为你提供支持。它快速理解你的内容，并提供相关的改写，让你的写作达到新的高度。别忘了它的模式，如常规、流畅、正式、简单和富有想象力——只需选择最适合你的。
- en: Quillbot doesn’t stop there. It also broadens your vocabulary and generates
    logical pieces of text. Plus? You can adjust the synonym usage as much as you’d
    like until you get exactly what you need.
  id: totrans-1254
  prefs: []
  type: TYPE_NORMAL
  zh: Quillbot不会止步于此。它还扩展了你的词汇量，并生成逻辑性强的文本。此外？你可以根据需要调整同义词的使用，直到你得到你想要的精确结果。
- en: Speechify
  id: totrans-1255
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: Speechify
- en: Say goodbye to boring lectures and tedious studying - Speechify is here to revolutionize
    your learning experience. This AI tool has the power to transform any written
    text into audio, allowing you to absorb educational material with ease.
  id: totrans-1256
  prefs: []
  type: TYPE_NORMAL
  zh: 再见，无聊的讲座和枯燥的学习——Speechify即将革新你的学习体验。这个AI工具可以将任何书面文本转换为音频，让你轻松吸收教育材料。
- en: From short notes and long paragraphs, all the way up to entire books - Speechify
    can handle it all without breaking a sweat. So forget about straining your eyes
    from reading for hours on end; now is the time to kick back, relax, and let this
    amazing technology do its thing!
  id: totrans-1257
  prefs: []
  type: TYPE_NORMAL
  zh: 从简短的笔记到长段落，再到整本书——Speechify都能轻松应对，无需费劲。所以，别再长时间阅读而让眼睛疲劳了；现在是时候放松，让这项惊人的技术发挥其作用了！
- en: Nearpod
  id: totrans-1258
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: Nearpod
- en: Ready to take your learning experience to the next level? Look no further than
    Nearpod – an AI-powered platform that will blow you away with its virtual reality,
    3D models, and incredible group activities. This tool is designed to give you
    a dynamic and engaging education that’s sure to leave lasting impressions.
  id: totrans-1259
  prefs: []
  type: TYPE_NORMAL
  zh: 准备将你的学习体验提升到下一个层次？无需再寻找，Nearpod——一个由AI驱动的平台，将用其虚拟现实、3D模型和令人难以置信的团队活动震撼你。这个工具旨在为你提供动态且引人入胜的教育，确保留下深刻的印象。
- en: StepWise Math
  id: totrans-1260
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: StepWise Math
- en: If math has been giving you trouble, say hello to StepWise Math – it’ll make
    all those tricky equations seem simple in no time, thanks to its personalized
    instructions and feedback powered by state-of-the-art AI technology. Get ready
    for an out-of-this-world tutoring journey as you work towards solving all your
    math problems with ease.
  id: totrans-1261
  prefs: []
  type: TYPE_NORMAL
  zh: 如果数学让你感到困扰，那么欢迎StepWise Math的到来——它将使所有那些棘手的方程式在短时间内变得简单，这得益于其由最先进的AI技术驱动的个性化指导和反馈。准备好开始一段超越时空的辅导之旅，轻松解决你所有的数学问题。
- en: '| ![image](d2d_images/chapter_title_corner_decoration_left.png) |  | ![image](d2d_images/chapter_title_corner_decoration_right.png)
    |'
  id: totrans-1262
  prefs: []
  type: TYPE_TB
  zh: '| ![image](d2d_images/chapter_title_corner_decoration_left.png) |  | ![image](d2d_images/chapter_title_corner_decoration_right.png)
    |'
- en: '![image](d2d_images/chapter_title_above.png)'
  id: totrans-1263
  prefs: []
  type: TYPE_IMG
  zh: '![image](d2d_images/chapter_title_above.png)'
- en: AI and the Internet of Things (IoT)
  id: totrans-1264
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 人工智能与物联网（IoT）
- en: '![image](d2d_images/chapter_title_below.png)'
  id: totrans-1265
  prefs: []
  type: TYPE_IMG
  zh: '![image](d2d_images/chapter_title_below.png)'
- en: The Internet of Things (IoT) facilitates the connection of billions of devices,
    industrial machinery, processes, and users to share data seamlessly without centralized
    control. However, managing large data sets is extremely intricate during storage,
    processing, and inference.
  id: totrans-1266
  prefs: []
  type: TYPE_NORMAL
  zh: 物联网（IoT）促进了数十亿设备、工业机械、流程和用户之间的连接，以无缝共享数据，无需集中控制。然而，在存储、处理和推理过程中管理大量数据集极其复杂。
- en: Therefore, AI has emerged as a highly promising combination with IoT to improve
    data usage, storage, and decision-making by mitigating uncertainty. AI plays a
    significant role in IoT. It enhances the value of diverse data types collected
    by IoT devices.
  id: totrans-1267
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，AI已成为与IoT高度有前景的结合，通过减轻不确定性来改善数据使用、存储和决策。AI在IoT中发挥着重要作用。它增强了IoT设备收集的多种数据类型的价值。
- en: Proper utilization of this diverse data offers efficient solutions for product
    plus service development that meet user expectations across various sectors. Despite
    the various benefits of integrating AI with intelligent systems for industrial
    applications, applying AI effectively presents challenges related to data quality,
    volume, integration, and accuracy of inferences.
  id: totrans-1268
  prefs: []
  type: TYPE_NORMAL
  zh: 正确利用这些多样化的数据，为满足各行业用户期望的产品加服务开发提供高效解决方案。尽管将AI与工业应用中的智能系统集成具有各种好处，但有效地应用AI仍面临与数据质量、数量、集成和推理准确性相关的挑战。
- en: 'ML methods and technologies have emerged in AI in recent years: the convergence
    of ML and IoT will mutually enhance the impact and availability of services in
    areas like healthcare, supply chain, transportation, and power sectors.'
  id: totrans-1269
  prefs: []
  type: TYPE_NORMAL
  zh: 近年来，人工智能中出现了机器学习方法和技术：机器学习和物联网的融合将相互增强在医疗保健、供应链、交通和电力等领域的服务和可用性。
- en: 'Quantum Computing: Unleashing the Power within AI'
  id: totrans-1270
  prefs: []
  type: TYPE_NORMAL
  zh: 量子计算：释放人工智能中的内在力量
- en: Quantum computing is not your everyday run-of-the-mill computing. It goes beyond
    the ordinary and delves into the wondrous world of atoms and molecules. But hold
    on to your hats because it doesn’t stop there! It takes a closer look at the teeny-tiny
    subatomic properties of atoms that can actually be in multiple states at the same
    time. These quantum mechanics principles let subatomic particles exist as both
    particles and waves simultaneously.
  id: totrans-1271
  prefs: []
  type: TYPE_NORMAL
  zh: 量子计算并非日常的普通计算。它超越了普通计算，深入到原子和分子的奇妙世界。但请抓好你的帽子，因为它不仅仅如此！它更深入地研究了原子那微小到几乎同时存在于多种状态的亚原子特性。这些量子力学原理使得亚原子粒子可以同时以粒子和波的形式存在。
- en: Now, these principles might seem a bit out of place in computing. Then, why
    is this even a thing? Well, they throw the traditional “binary bits” (that is
    the 0’s and 1’s) out the window. Quantum computers can store and process data
    not only in the “on” or “off” states but also in superposed combinations. By harnessing
    these principles, quantum computers can quickly crack complex problems.
  id: totrans-1272
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，这些原则在计算领域可能显得有些格格不入。那么，这究竟是怎么回事呢？好吧，它们摒弃了传统的“二进制位”（即0和1）。量子计算机不仅可以存储和处理“开启”或“关闭”状态的数据，还可以处理叠加组合。通过利用这些原则，量子计算机可以迅速破解复杂问题。
- en: How does that benefit you? It means they can uncover hidden patterns in behemoth-sized
    data sets that stumped conventional computers! Prepare to have your mind blown
    - because quantum computers are truly in a league of their own.
  id: totrans-1273
  prefs: []
  type: TYPE_NORMAL
  zh: 这将如何惠及你？这意味着它们可以揭示出那些让传统计算机束手无策的巨量数据集中的隐藏模式！准备好让你的思维受到震撼——因为量子计算机确实独树一帜。
- en: And guess what? AI just got a serious upgrade. Quantum computing can analyze
    a wide range of data types and reach more accurate conclusions than present-day
    computers. While those regular computers are stuck in the binary universe, quantum
    computers can process information with “qubits” that can exist in multiple states
    all at once. The result? A quantum leap in data analysis and smarter, more insightful
    conclusions.
  id: totrans-1274
  prefs: []
  type: TYPE_NORMAL
  zh: 猜猜看？人工智能刚刚经历了一次重大升级。量子计算能够分析广泛的数据类型，并比现在的计算机得出更准确的结论。当那些常规计算机被困在二进制宇宙中时，量子计算机可以处理“量子比特”信息，这些量子比特可以同时存在于多种状态。结果呢？数据分析实现了量子飞跃，得出的结论更加智能和有洞察力。
- en: So buckle up because quantum computing is here to revolutionize the way the
    mysteries of the universe are tackled; it’s time to unleash its power and embark
    on an extraordinary journey through the quantum realm. Get ready for a computing
    experience like no other!
  id: totrans-1275
  prefs: []
  type: TYPE_NORMAL
  zh: 所以，系好安全带，因为量子计算即将革命性地改变我们解决宇宙奥秘的方式；是时候释放它的力量，踏上量子领域的非凡之旅。准备好体验前所未有的计算体验！
- en: How Will Quantum Computing Change AI?
  id: totrans-1276
  prefs: []
  type: TYPE_NORMAL
  zh: 量子计算将如何改变人工智能？
- en: AI has really come a long way. It can whip up realistic 3D images and videos,
    and now it’s getting cozy with quantum computing. Yes, that’s right- quantum AI
    is on the horizon. AI has now tapped into the power of quantum computers, and
    let me tell you, this integration is going to be mind-blowing!
  id: totrans-1277
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能已经走了很长的路。它能够制作出逼真的3D图像和视频，现在它正与量子计算亲密接触。是的，没错——量子人工智能即将到来。人工智能已经利用了量子计算机的力量，让我告诉你，这种集成将会令人震惊！
- en: This next section will be all about the advantages of using quantum AI in creative
    industries.
  id: totrans-1278
  prefs: []
  type: TYPE_NORMAL
  zh: 下一个部分将全部关于在创意产业中使用量子人工智能的优势。
- en: Edge Computing in AI
  id: totrans-1279
  prefs: []
  type: TYPE_NORMAL
  zh: 边缘计算在人工智能中的应用
- en: Feeling overwhelmed? Let Edge AI be your digital sidekick! Combining Edge Computing
    and Artificial Intelligence, this tech supercharges your device with lightning-fast
    data processing. No internet connection is necessary - you can get instant results
    without waiting for a slow response from the cloud. Plus, its ML algorithms are
    incredibly energy efficient.
  id: totrans-1280
  prefs: []
  type: TYPE_NORMAL
  zh: 感到不知所措？让边缘人工智能成为你的数字伙伴！结合边缘计算和人工智能，这项技术通过闪电般的快速数据处理能力为你的设备超级充电。无需互联网连接——你可以在不等待云端的缓慢响应的情况下立即获得结果。此外，它的机器学习算法非常节能。
- en: Unraveling the Magic of Edge AI
  id: totrans-1281
  prefs: []
  type: TYPE_NORMAL
  zh: 揭示边缘人工智能的神奇之处
- en: So what’s so great about Edge AI? It creates an intelligent system right on
    your own hardware that can analyze data in real time. With it powering up your
    gadgets and machines, you’ll experience ultra-smart performance like never before.
    Think of it as having a tiny computer inside each one of them, making decisions
    quickly and accurately!
  id: totrans-1282
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，边缘人工智能有什么如此出色之处呢？它能在你的硬件上创建一个智能系统，能够实时分析数据。有了它为你的小工具和机器提供动力，你将体验到前所未有的超智能性能。想象一下，每个设备内部都有一台微型计算机，能够快速准确地做出决策！
- en: There’s something truly magical about harnessing the power of edge computing
    with Artificial Intelligence – especially when put into action by savvy machine
    learning algorithms. Its ability to deliver immediate analytics is seriously impressive
    while reducing lag significantly – talk about speed demon efficiency levels!
  id: totrans-1283
  prefs: []
  type: TYPE_NORMAL
  zh: 利用边缘计算与人工智能的力量确实有一种真正的神奇之处——尤其是在精明的机器学习算法的推动下。它提供即时分析的能力令人印象深刻，同时显著减少延迟——这就是速度恶魔级别的效率！
- en: 'And don’t forget: these powerful programs work on all sorts of devices, big
    or small - just like Iron Man’s Jarvis but way cooler (and less expensive!). So,
    if you want superhuman smartness ready at your fingertips 24/7, then look no further
    than Edge AI; let its awesomeness take over, and watch how things start going
    more smoothly immediately.'
  id: totrans-1284
  prefs: []
  type: TYPE_NORMAL
  zh: 不要忘记：这些强大的程序可以在各种设备上运行，无论大小——就像钢铁侠的贾维斯一样，但更加酷炫（而且更便宜！）所以，如果你想随时随地拥有超凡的智能，那么就无需再寻找其他选择，只需关注边缘人工智能；让它的神奇力量接管一切，看看事情是如何立即变得更加顺利的。
- en: Unveiling the Secrets of Edge AI Software
  id: totrans-1285
  prefs: []
  type: TYPE_NORMAL
  zh: 揭示边缘人工智能软件的秘密
- en: Ready to explore the incredible world of Edge AI software? Think of it as a
    hidden chest packed with unbelievable ML algorithms that can do some mind-blowing
    stuff on your device - no internet connection/remote servers required! You will
    be astonished by real-time data like never before; just forget about having to
    use extra systems.
  id: totrans-1286
  prefs: []
  type: TYPE_NORMAL
  zh: 准备探索边缘人工智能软件的神奇世界吗？把它想象成一个装满了令人难以置信的机器学习算法的隐藏宝箱，这些算法可以在你的设备上做一些令人惊叹的事情——无需互联网连接/远程服务器！你将以前所未有的方式对实时数据感到惊讶；只需忘记需要使用额外系统即可。
- en: '| ![image](d2d_images/chapter_title_corner_decoration_left.png) |  | ![image](d2d_images/chapter_title_corner_decoration_right.png)
    |'
  id: totrans-1287
  prefs: []
  type: TYPE_TB
  zh: '| ![image](d2d_images/chapter_title_corner_decoration_left.png) |  | ![image](d2d_images/chapter_title_corner_decoration_right.png)
    |'
- en: '![image](d2d_images/chapter_title_above.png)'
  id: totrans-1288
  prefs: []
  type: TYPE_IMG
  zh: '![image](d2d_images/chapter_title_above.png)'
- en: Exploring the Wonders of Edge AI Hardware
  id: totrans-1289
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 探索边缘人工智能硬件的奇迹
- en: '![image](d2d_images/chapter_title_below.png)'
  id: totrans-1290
  prefs: []
  type: TYPE_IMG
  zh: '![image](d2d_images/chapter_title_below.png)'
- en: Edge AI can conquer any hardware platform, from regular MCUs to super-advanced
    neural processing devices. These devices use embedded algorithms to monitor their
    behavior, collect and process data and make decisions. And the best part? They
    do it all without needing a human touch.
  id: totrans-1291
  prefs: []
  type: TYPE_NORMAL
  zh: 边缘人工智能可以征服任何硬件平台，从常规的微控制器到超级先进的神经处理设备。这些设备使用嵌入式算法来监控其行为，收集和处理数据并做出决策。而且最好的部分是？它们全部无需人工干预。
- en: Smartphones, laptops, smart cars, and Raspberry PIs are just a few examples
    of the star-studded lineup of Edge AI devices.
  id: totrans-1292
  prefs: []
  type: TYPE_NORMAL
  zh: 智能手机、笔记本电脑、智能汽车和树莓派只是边缘人工智能设备星光璀璨的阵容中的几个例子。
- en: Discovering the Benefits of Edge AI
  id: totrans-1293
  prefs: []
  type: TYPE_NORMAL
  zh: 探索边缘人工智能的益处
- en: With Edge AI, data is processed locally, eliminating the time-consuming back-and-forth
    with the cloud. Real-time analytics become a breeze as high-performance computing
    meets sensors and IoT devices on the edge.
  id: totrans-1294
  prefs: []
  type: TYPE_NORMAL
  zh: 边缘人工智能实现了本地数据处理，消除了与云端的耗时往返。实时分析变得轻而易举，因为高性能计算与边缘的传感器和物联网设备相结合。
- en: Say goodbye to sluggish processing speeds. Edge AI turbocharges your data processing;
    the data is processed right where it’s generated, resulting in lightning-fast
    speeds.
  id: totrans-1295
  prefs: []
  type: TYPE_NORMAL
  zh: 再见，缓慢的处理速度。边缘人工智能加速了你的数据处理；数据就在其生成的地方进行处理，从而实现闪电般的速度。
- en: Speaking of speeds, Edge AI significantly reduces bandwidth requirements and
    costs - by processing data locally, it cuts down on the need for hefty internet
    bandwidth and expensive cloud storage.
  id: totrans-1296
  prefs: []
  type: TYPE_NORMAL
  zh: 说到速度，边缘人工智能显著降低了带宽需求和成本——通过本地处理数据，它减少了大量互联网带宽和昂贵云存储的需求。
- en: Data security gets an upgrade with Edge AI. With most data processing happening
    on the edge device itself, sensitive information stays far away from the prying
    eyes of cyber-criminals.
  id: totrans-1297
  prefs: []
  type: TYPE_NORMAL
  zh: 数据安全随着边缘人工智能的升级而得到提升。由于大部分数据处理都发生在边缘设备本身，敏感信息远离了网络犯罪分子的窥探之眼。
- en: When it comes to scalability, Edge AI is a heavyweight. It effortlessly handles
    vast amounts of data - so there’s no need to simultaneously burden the cloud with
    transferring video image data from multiple sources.
  id: totrans-1298
  prefs: []
  type: TYPE_NORMAL
  zh: 当谈到可扩展性时，边缘AI是重量级的。它轻松处理大量数据——因此无需同时将云负担于从多个来源传输视频图像数据。
- en: Reliability gets a boost with Edge AI. The combination of heightened security
    and lightning-fast speed ensures a seamless and trustworthy experience with your
    Edge AI system.
  id: totrans-1299
  prefs: []
  type: TYPE_NORMAL
  zh: 边缘AI提升了可靠性。增强的安全性和闪电般的速度确保了与您的边缘AI系统无缝且值得信赖的体验。
- en: Say hello to cost efficiency! AI processing at the edge is incredibly cost-effective,
    as only the essential and valuable data is sent to the cloud - no more wasting
    resources on unnecessary data.
  id: totrans-1300
  prefs: []
  type: TYPE_NORMAL
  zh: 问候成本效益！边缘AI处理极具成本效益，因为只有必要和有价值的数据被发送到云端——不再浪费资源在无关数据上。
- en: Edge AI Examples
  id: totrans-1301
  prefs: []
  type: TYPE_NORMAL
  zh: 边缘AI示例
- en: Edge artificial intelligence (AI) refers to the use of AI and machine learning
    models at the edge of the network, closest to where data is generated and actions
    must be taken. Rather than sending all data to the cloud for processing, edge
    AI performs computational tasks locally - on IoT devices, mobile devices, gateways,
    or micro data centers.
  id: totrans-1302
  prefs: []
  type: TYPE_NORMAL
  zh: 边缘人工智能（AI）指的是在网络的边缘使用AI和机器学习模型，最接近数据生成和必须采取行动的地方。而不是将所有数据发送到云端进行处理，边缘AI在本地执行计算任务——在物联网设备、移动设备、网关或微型数据中心上。
- en: Edge AI offers various benefits, like lower latency, reduced bandwidth usage,
    improved privacy and security, and the ability to operate independently without
    an internet connection. As a result, it is being adopted across multiple industries
    and use cases.
  id: totrans-1303
  prefs: []
  type: TYPE_NORMAL
  zh: 边缘AI提供了各种好处，如降低延迟、减少带宽使用、提高隐私和安全，以及无需互联网连接即可独立运行的能力。因此，它被广泛应用于多个行业和用例。
- en: Industrial IoT remains a major focus for edge AI, with edge devices acting as
    ‘brains’ for sensors that monitor equipment health, detect anomalies and enable
    predictive maintenance. However, edge AI solutions are also being applied in DevOps,
    using AI models to identify anomalies and optimize code deployment processes.
  id: totrans-1304
  prefs: []
  type: TYPE_NORMAL
  zh: 工业物联网仍然是边缘AI的主要关注点，边缘设备作为监测设备健康状况、检测异常和实现预测性维护的“大脑”。然而，边缘AI解决方案也正在DevOps中应用，使用AI模型来识别异常并优化代码部署流程。
- en: Edge AI is also powering the next generation of consumer devices, from smartphones
    with faster face recognition to smart home assistants with always-on capabilities.
    Edge AI is even enabling new frontiers in robotics research by allowing robots
    to process sensor data, make inferences and take actions in real time.
  id: totrans-1305
  prefs: []
  type: TYPE_NORMAL
  zh: 边缘AI也在推动下一代消费设备的进步，从具有更快面部识别功能的智能手机到始终在线的智能家居助手。边缘AI甚至通过允许机器人实时处理传感器数据、进行推理和采取行动，正在开启机器人研究的新前沿。
- en: Amazing Health Monitoring Devices
  id: totrans-1306
  prefs: []
  type: TYPE_NORMAL
  zh: 令人惊叹的健康监测设备
- en: Want to bring the power of AI to the world of healthcare but don’t want to compromise
    patient privacy? Well, guess what? Edge AI is here to save the day! With this
    awesome technology, hospitals and healthcare providers can analyze all that valuable
    data from health monitoring devices right on the premises - this means real-time
    analytics for better patient care while keeping their privacy intact!
  id: totrans-1307
  prefs: []
  type: TYPE_NORMAL
  zh: 想要将AI的力量带入医疗保健领域，但又不想牺牲患者隐私？好吧，猜猜看？边缘AI就在这里拯救这一天！凭借这项令人惊叹的技术，医院和医疗保健提供者可以直接在场所分析来自健康监测设备的所有有价值数据——这意味着实时分析以改善患者护理，同时保持他们的隐私不受侵犯！
- en: Edge AI Software Like No Other
  id: totrans-1308
  prefs: []
  type: TYPE_NORMAL
  zh: 无与伦比的边缘AI软件
- en: Allsbrook is a company that specializes in implementing edge AI in industrial
    IoT devices. Their platform, Onyx, allows companies to make sense of all that
    live IoT data without having to go through the hassle of creating new models or
    hiring countless data scientists. Plus, it’s so flexible that it supports multiple
    languages and various tools.
  id: totrans-1309
  prefs: []
  type: TYPE_NORMAL
  zh: Allsbrook是一家专注于在工业物联网设备中实施边缘AI的公司。他们的平台Onyx允许公司无需创建新模型或雇佣无数数据科学家就能理解所有实时物联网数据。此外，它非常灵活，支持多种语言和各种工具。
- en: Self-Driving Cars
  id: totrans-1310
  prefs: []
  type: TYPE_NORMAL
  zh: 自动驾驶汽车
- en: Say goodbye to the days of manual driving - self-driving cars are here and they’re
    making waves on the roads with their cutting-edge AI capabilities. They can stay
    one step ahead of any tricky situation, ensuring your ride is safe and reliable
    every time you get behind the wheel.
  id: totrans-1311
  prefs: []
  type: TYPE_NORMAL
  zh: 告别手动驾驶的日子——自动驾驶汽车已经到来，它们凭借其尖端的AI能力在道路上掀起波澜。它们可以提前一步应对任何复杂情况，确保每次您上车时都能享受到安全可靠的驾驶体验。
- en: Security Cameras
  id: totrans-1312
  prefs: []
  type: TYPE_NORMAL
  zh: 安全摄像头
- en: 'Thanks to their sophisticated Edge AI technology, you won’t believe what these
    security cameras can do: detect objects, recognize faces, and even have two-way
    audio for when you need to hear what’s happening outside your home or business.
    Vmukti has some seriously impressive models that make surveillance easy.'
  id: totrans-1313
  prefs: []
  type: TYPE_NORMAL
  zh: 多亏了它们复杂的边缘人工智能技术，你不会相信这些安全摄像头能做什么：检测物体、识别面孔，甚至在需要听到家中或商业区外发生的事情时，还能进行双向音频通话。Vmukti有一些真正令人印象深刻的型号，让监控变得简单。
- en: Smart Homes are Here to Stay
  id: totrans-1314
  prefs: []
  type: TYPE_NORMAL
  zh: 智能家居将长久存在
- en: The ultimate smart home setup isn’t just a dream anymore - it’s totally achievable
    with Edge AI taking over all data processing needs right there at your doorstep
    with voice-controlled lightbulbs, video doorbells that sync up with fridges, and
    more working together seamlessly.
  id: totrans-1315
  prefs: []
  type: TYPE_NORMAL
  zh: 最理想的智能家居配置不再是梦想，而是完全可行的——有了边缘人工智能（Edge AI）在门口处理所有数据处理需求，通过语音控制灯泡、与冰箱同步的视频门铃以及更多无缝协作的功能。
