  id: totrans-453
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: Press ctrl-d to exit the Python shell.
  id: totrans-454
  prefs: []
  type: TYPE_NORMAL
  zh: 按 ctrl-d 退出 Python 壳。
