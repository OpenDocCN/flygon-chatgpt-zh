  id: totrans-282
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经知道了那些引领现代计算机诞生的工具和设备的起源，是时候回顾人工智能和聊天机器人的历史了。我们将从人工智能的石器时代讲起，一直谈到现代，包括图灵革命以及第一次机器被认为能够思考的时刻。之后，我们将转向最早的语言处理系统的创建以及机器学习的革命性概念。随着现代时代的到来，我们将结束这个历史课程，通过探讨我们今天使用人工智能的各种方式，展示我们的创造是如何从我们上面提到的早期计算设备中演变而来的。准备好你的思考大脑，因为这将涉及到让机器变得人工智能起来！
