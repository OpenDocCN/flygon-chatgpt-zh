  prefs: []
  type: TYPE_NORMAL
  zh: '■ ****问题: "****什么是****月****食****？"'
- en: '****An**swe**r: "****A**** ****lu**nar** ****ecl**ips**e ****oc**cur**s ****wh**en**
    ****t**he** ****Ea**rth** ****i**s** ****bet**wee**n ****t**he** ****S**un** ****a**nd**
    ****t**he** ****Mo**on**, ****blo**ckin**g ****sun**ligh**t ****fr**om** ****rea**chin**g
    ****t**he** ****Mo**on**."'
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
  zh: '****答案: "****当****地球****位于****太阳****和****月亮****之间****时****，****发生****月****食****，****阻挡****太阳****光线****，****无法****照射****到****月亮****。"'
- en: '■ ****Que**stio**n: "****Wh**at** ****i**s** ****t**he** ****diff**erenc**e
    ****bet**wee**n ****a**** ****me**teo**r ****a**nd** ****a**** ****mete**orit**e?
    "'
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
  zh: ■ **问题：** “**流星和陨石有什么区别？**”
