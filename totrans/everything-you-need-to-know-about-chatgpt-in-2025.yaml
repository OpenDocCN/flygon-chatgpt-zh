  zh: '**人工智能**（**AI**）已经从科幻小说中的遥远承诺变成了改变世界的强大力量，重新定义了我们与世界互动的方式。从推荐我们喜欢的电视剧的算法到能够推动先进医疗诊断的系统，**AI**已经深深地嵌入到我们的日常生活中。但**人工智能**究竟是什么？本质上，**AI**是开发出能够执行通常需要人类智能干预的任务的计算系统。这些任务包括从视觉感知和语言处理到决策制定和问题解决的一切。'
