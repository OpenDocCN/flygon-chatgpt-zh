  prefs: []
  type: TYPE_NORMAL
- en: Write a function to calculate DA based on region. DA is 5% if the region is
    either east or west, or else it will be 10%. Use the OR Operator to check multiple
    conditions.
  prefs: []
  type: TYPE_NORMAL
