  type: TYPE_NORMAL
  zh: 例如，我传递了视频的URL到[https://youtu.be/Sr4KeW078P4](https://youtu.be/Sr4KeW078P4)，该URL解释了JavaScript
    Promise语法：
- en: '![13 ask youtube result](image_rsrc1ZS.jpg)'
