- en: 'Chapter 1: AI—The Two-Letter Revolution'
  id: totrans-339
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第1章：AI——双字母革命
- en: '![image](d2d_images/chapter_title_below.png)'
  id: totrans-340
  prefs: []
  type: TYPE_IMG
  zh: '![image](d2d_images/chapter_title_below.png)'
- en: Have you ever been at a loss for what to watch on Netflix, only to find the
    ideal show that you had no idea existed? Has Google ever amazed you with its pinpoint
    accuracy, as if it could read your mind and provide the exact results you sought?
    Behind all these evident achievements is not magic but rather a revolution in
    AI that is happening right in front of our very eyes.
  id: totrans-341
  prefs: []
  type: TYPE_NORMAL
  zh: 你是否曾经为在Netflix上要看什么而感到困惑，最终发现了一个你从未意识到的理想剧集？谷歌是否曾以其精确的定位让你感到惊讶，仿佛它能读懂你的心思并提供你寻求的确切结果？所有这些显而易见的成就背后，不是魔法，而是一场就在我们眼前发生的AI革命。
- en: The term “artificial intelligence” may bring to mind HAL 9000’s icy plans for
    our destruction or Skynet’s invading armies of robots. The truth, however, is
    considerably less dramatic—and fortunately, a lot less lethal. Forget about Hollywood’s
    end-of-the-world stories. AI isn’t primarily about taking over the world; rather,
    it’s about creating smart machines that can work alongside humans to improve our
    lives in ways we won’t believe are possible.
  id: totrans-342
  prefs: []
  type: TYPE_NORMAL
  zh: “人工智能”这个术语可能会让你想起HAL 9000冰冷的毁灭计划或Skynet入侵的机器人军队。然而，事实远没有这么戏剧化——幸运的是，致命性也小得多。忘掉好莱坞的世界末日故事吧。AI的主要目的不是征服世界；相反，它是关于创造能够与人类并肩工作、以我们无法相信的方式改善我们生活的智能机器。
- en: But to really understand how big this change is, we need to get past the hype
    and look at AI in its purest form. This chapter’s goal is to explain the different
    types of intelligence that exist, from the highly focused experts that run your
    everyday apps to the far-off goal of making robots that think like humans. Welcome
    to a mind-bending exploration of AI, uncovering its secrets and revealing its
    potential to reshape not just our technology but our very understanding of what
    it means to be human!
  id: totrans-343
  prefs: []
  type: TYPE_NORMAL
  zh: 但要真正理解这个变化有多大，我们需要超越炒作，看看AI最纯粹的形式。本章的目标是解释存在的不同类型的智能，从运行你日常应用的专注专家到制造出像人类一样思考的机器人的遥远目标。欢迎来到一个令人脑洞大开的AI探索之旅，揭示其秘密并展示其重塑我们技术乃至我们对人类本质理解的潜力！
- en: What Is AI?
  id: totrans-344
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 什么是AI？
- en: Forget about HAL singing scary songs or robots planning the end of the world.
    The actual revolution brought about by AI is considerably more exciting—and significantly
    less dangerous. Imagine your smartphone suddenly evolving into a highly intelligent
    companion, picking up on your habits, predicting your needs, and even making lighthearted
    comments as you walk. That is AI.
  id: totrans-345
  prefs: []
  type: TYPE_NORMAL
  zh: 忘掉HAL唱着恐怖歌曲或机器人策划世界末日的场景吧。AI带来的实际革命要有趣得多——并且危险程度显著降低。想象一下，你的智能手机突然进化成一个高度智能的伴侣，捕捉你的习惯，预测你的需求，甚至在你走路时做出轻松的评论。这就是AI。
- en: Allow me to explain it in simpler terms before you imagine intelligent machines
    assuming control (don’t worry, we’ll address it later). At its core, AI is all
    about programming computers to think and act like humans. Being able to learn,
    adapt, and even make decisions similar to a human, rather than just linearly processing
    data (like a computer) or mechanically (like a washing machine).
  id: totrans-346
  prefs: []
  type: TYPE_NORMAL
  zh: 在你想象智能机器接管控制之前（别担心，我们稍后会讨论这个问题），让我用更简单的术语来解释一下。从本质上讲，人工智能就是编程计算机以像人类一样思考和行动。能够学习、适应，甚至做出类似于人类的决策，而不仅仅是线性处理数据（像计算机一样）或机械地（像洗衣机一样）。
- en: AI is essentially the study and creation of computer systems with the ability
    to mimic human intellect. From learning and problem-solving to comprehending natural
    language and identifying patterns, these tasks cover it all. Essentially, the
    goal of AI is to push computing to its traditional limits by building machines
    that can perform cognitive processes.
  id: totrans-347
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能本质上是研究和创造具有模仿人类智能能力的计算机系统的学科。从学习和解决问题到理解自然语言和识别模式，这些任务都包括在内。本质上，人工智能的目标是通过构建能够执行认知过程的机器来推动计算的传统极限。
- en: Alan Turing and John McCarthy, two trailblazers in the field of AI, established
    themselves in the middle of the 20th century (Pigro, 2021). Initially, AI was
    all about rule-based systems and symbolic reasoning. But, with the introduction
    of deep learning and machine learning (ML), the subject has undergone tremendous
    change, particularly in the last several years. Unlike traditional computers,
    which need to be explicitly programmed, AI systems learn and change based on data.
    This lets them do highly complex tasks swiftly.
  id: totrans-348
  prefs: []
  type: TYPE_NORMAL
  zh: Alan Turing和John McCarthy是人工智能领域的两位先驱，他们在20世纪中叶确立了他们的地位（Pigro，2021）。最初，人工智能完全是基于规则系统和符号推理。但随着深度学习和机器学习（ML）的引入，这个领域经历了巨大的变化，尤其是在最近几年。与需要明确编程的传统计算机不同，人工智能系统根据数据学习和改变。这使得它们能够迅速完成高度复杂的工作。
- en: Think about how much easier it would be if your toaster could detect when bread
    is becoming too brown, or if your car could adapt to your driving style and handle
    rush hour with ease. AI offers that kind of magic. It wasn’t invented overnight,
    though. What would later be known as AI began in the 1950s when a group of bright
    minds got together to discuss how to program computers to “think” (Pigro, 2021).
    It was like training a kid to tie its shoes—quite sluggish at the start, but AI
    has acquired some very remarkable feats over the years. It is now capable of real-time
    language translation, pinpoint medical diagnosis, and even defeating international
    chess champions.
  id: totrans-349
  prefs: []
  type: TYPE_NORMAL
  zh: 想象一下，如果你的烤面包机能够检测到面包变得太焦，或者如果你的汽车能够适应你的驾驶风格，轻松应对高峰时段，那会多么方便。人工智能就能提供这样的魔力。然而，它并非一夜之间发明出来的。后来被称为人工智能的东西，始于20世纪50年代，当时一群聪明的人聚在一起讨论如何编程计算机以“思考”（Pigro，2021）。这就像训练一个孩子系鞋带——一开始相当缓慢，但人工智能在过去的几十年里已经取得了非常显著的成就。现在，它能够进行实时语言翻译、精确的医学诊断，甚至击败国际象棋冠军。
- en: Types of AI
  id: totrans-350
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 人工智能的类型
- en: AI has been introduced to the world in mainly three different forms. Each one
    has its own set of capabilities and limitations. Let’s discuss them and see where
    each one shines and works around us. The three types are narrow, general, and
    super AI.
  id: totrans-351
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能主要以三种不同的形式被引入世界。每一种都有自己的能力和局限性。让我们来讨论它们，看看每一种在哪里发光，如何在我们周围发挥作用。这三种类型是窄人工智能、通用人工智能和超级人工智能。
- en: Narrow AI
  id: totrans-352
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 窄人工智能
- en: Narrow AI, often called weak AI, is a specialized AI that can only do one or
    two things well and lacks the general intelligence present in humans. Think of
    it as an expert who works hard at becoming very good at what it does. Siri, Alexa,
    and other virtual personal assistants, as well as the recommendation algorithms
    used by video-sharing websites like YouTube and Netflix, are all examples of narrow
    AI.
  id: totrans-353
  prefs: []
  type: TYPE_NORMAL
  zh: 窄人工智能，通常被称为弱人工智能，是一种专门的人工智能，它只能擅长做一两个事情，并且缺乏人类所具有的通用智能。可以把它想象成一个努力成为自己领域专家的人。Siri、Alexa以及其他虚拟个人助理，以及YouTube和Netflix等视频分享网站使用的推荐算法，都是窄人工智能的例子。
- en: 'Example: Virtual Personal Assistants'
  id: totrans-354
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 示例：虚拟个人助理
- en: '●  Siri: Personal digital assistant developed by Apple that can be asked questions,
    send messages, and set reminders with voice commands.'
  id: totrans-355
  prefs: []
  type: TYPE_NORMAL
  zh: ●  Siri：苹果公司开发的一款个人数字助理，可以通过语音命令提问、发送消息和设置提醒。
- en: '●  Alexa: A virtual assistant developed by Amazon that can control smart home
    gadgets, give you the weather, and play music when you want it to.'
  id: totrans-356
  prefs: []
  type: TYPE_NORMAL
  zh: ●  Alexa：由亚马逊开发的一款虚拟助手，可以控制智能家居设备，提供天气预报，并在你想要的时候播放音乐。
- en: Gaining knowledge of narrow AI is important because it is the basis for many
    everyday uses. Within this area, you’ll find specialized systems for image recognition,
    language translation, and chatbots.
  id: totrans-357
  prefs: []
  type: TYPE_NORMAL
  zh: 了解窄人工智能很重要，因为它是许多日常应用的基础。在这个领域，你会发现专门用于图像识别、语言翻译和聊天机器人的系统。
- en: General AI
  id: totrans-358
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 通用人工智能
- en: One branch of AI, general AI (also called strong AI), seeks to imitate human
    intelligence in its broadest sense. General AI, in contrast to narrow AI, can
    comprehend, learn, and apply information across various disciplines; it is not
    task-specific. Mastering general AI is no easy feat; it requires teaching computers
    to understand the world in the same way that we humans do.
  id: totrans-359
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能的一个分支，通用人工智能（也称为强人工智能），旨在以最广泛的意义模仿人类智能。与窄人工智能不同，通用人工智能可以跨学科理解、学习和应用信息；它不是针对特定任务的。掌握通用人工智能并非易事；它需要教会计算机以与我们人类相同的方式理解世界。
- en: 'Example: Human-Like Robots'
  id: totrans-360
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 示例：类人机器人
- en: Sophia, a Hanson Robotics creation, is a humanoid robot with the ability to
    mimic human speech, facial expressions, and body language.
  id: totrans-361
  prefs: []
  type: TYPE_NORMAL
  zh: Sophia，汉森机器人公司的一个创造，是一个能够模仿人类语言、面部表情和肢体语言的类人机器人。
- en: Recognizing general AI is critical because it stands for the idea of computers
    possessing a human-like, all-encompassing knowledge of the world. Even if we haven’t
    seen general AI in action just yet, talking about it raises concerns regarding
    its possible social effects and ethical ramifications.
  id: totrans-362
  prefs: []
  type: TYPE_NORMAL
  zh: 认识到通用人工智能的重要性，因为它代表了计算机拥有类似人类、全面的世界知识的理念。即使我们还没有看到通用人工智能的实际应用，讨论它也引发了对其可能的社会影响和伦理后果的担忧。
- en: Super AI
  id: totrans-363
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 超级人工智能
- en: Superintelligent AI, often called super AI, is a quantum leap beyond anything
    that humans are currently capable of creating. In the long run, we want computers
    to be smarter and more efficient than humans in every aspect of thinking and solving
    problems, not just the ones where people really shine (narrow AI). Super AI is
    currently in its infancy, and there are many valid ethical questions about how
    it should be developed.
  id: totrans-364
  prefs: []
  type: TYPE_NORMAL
  zh: 超级智能AI，通常称为超级人工智能，是人类目前能够创造出的任何事物的一次质的飞跃。从长远来看，我们希望计算机在思考和解决问题的各个方面都比人类更聪明、更高效，而不仅仅是那些人类真正擅长的地方（窄AI）。超级人工智能目前还处于起步阶段，关于其如何发展有许多有效的伦理问题。
- en: 'Example: Speculative and Theoretical'
  id: totrans-365
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 示例：推测性和理论性
- en: There may not be any super AIs in the actual world just yet, but you’ll see
    them in science fiction films like Ex Machina and Her.
  id: totrans-366
  prefs: []
  type: TYPE_NORMAL
  zh: 在实际世界中可能还没有超级人工智能，但你会在《机械姬》和《她》等科幻电影中看到它们。
- en: Due to the potential societal effects and the necessity to give serious consideration
    to ethical, safety, and governance systems, it is critical to comprehend super
    AI. It is important to discuss acceptable ways to develop and use AI as it continues
    to advance. This is particularly the case for those considering solutions driven
    by AI, such as chatbots. To ensure that AI systems adhere to human goals and ideals,
    it is helpful to categorize them as either narrow, general, or super AI. This
    will guide designers and engineers toward more practical and ethical considerations.
  id: totrans-367
  prefs: []
  type: TYPE_NORMAL
  zh: 由于潜在的社会影响以及必须认真考虑伦理、安全和治理体系，理解超级人工智能至关重要。随着人工智能的不断发展，讨论可接受的AI开发和利用方式同样重要。这对于那些考虑由AI驱动的解决方案，如聊天机器人，的人来说尤其如此。为了确保AI系统遵循人类的目标和理想，将其分类为窄AI、通用AI或超级AI是有帮助的。这将引导设计师和工程师朝着更实际和道德的考虑方向前进。
- en: Differentiating the Types
  id: totrans-368
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 区分类型
- en: Those interested in chatbots and other AI-driven solutions would do well to
    familiarize themselves with the several forms of AI. The classification of AI
    into narrow, general, and super AI helps to define the present and future state
    of the technology. Businesses and developers exploring AI-driven apps, such as
    chatbots, would do well to familiarize themselves with these kinds to guarantee
    proper technology selection and deployment.
  id: totrans-369
  prefs: []
  type: TYPE_NORMAL
  zh: 对于聊天机器人和其他AI驱动解决方案感兴趣的人，熟悉几种AI形式会大有裨益。将AI分类为窄AI、通用AI和超级AI有助于定义当前和未来的技术状态。探索AI驱动应用，如聊天机器人，的企业和开发者熟悉这些类型将有助于确保适当的技术选择和部署。
- en: Chatbots built for certain roles, such as customer support or data retrieval,
    are well-suited to narrow AI due to their specialized skill, which is perfect
    for focused jobs. Theoretically, general AI is a source of motivation for developing
    chatbots with the ability to learn and adapt to new situations, allowing them
    to provide a more natural user experience. To foresee future developments and
    possible ethical concerns, it is essential to acknowledge the ambitious goals
    of super AI.
  id: totrans-370
  prefs: []
  type: TYPE_NORMAL
  zh: 为特定角色（如客户支持或数据检索）构建的聊天机器人，由于它们的专长技能非常适合窄域人工智能，这些技能非常适合专注于特定的工作。从理论上讲，通用人工智能是开发能够学习和适应新情况、提供更自然用户体验的聊天机器人的动力源泉。为了预见未来的发展和可能的伦理问题，承认超级人工智能雄心勃勃的目标是至关重要的。
- en: For chatbots to work at their best and make users happy, it’s important to match
    the type of AI with its intended usage. With this detailed knowledge, programmers
    can fully utilize AI’s capabilities, making chatbots that can adapt to new technology
    while still satisfying users’ needs.
  id: totrans-371
  prefs: []
  type: TYPE_NORMAL
  zh: 为了让聊天机器人发挥最佳效果并让用户满意，重要的是要匹配人工智能的类型与其预期用途。有了这种详细的知识，程序员可以充分利用人工智能的能力，制作出能够适应新技术同时满足用户需求的聊天机器人。
- en: 'AI in Daily Life: How You’re Already Using It'
  id: totrans-372
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 人工智能在日常生活中的应用：你已经在使用它了
- en: When you hear about AI in the news, it’s tempting to dismiss it as irrelevant
    to your life. You could think that AI is just the purview of large tech companies
    and that it has no bearing on your daily life. AI is something that the majority
    of people deal with every single day. You may see AI in action every day in these
    top instances.
  id: totrans-373
  prefs: []
  type: TYPE_NORMAL
  zh: 当你在新闻中听到关于人工智能的消息时，可能会觉得它与你生活无关，从而产生忽视它的冲动。你可能会认为人工智能只是大型科技公司的专属领域，对你的日常生活没有影响。实际上，人工智能是大多数人每天都要打交道的东西。你可能会在这些顶级实例中每天都能看到人工智能的实际应用。
- en: The Voice Assistants
  id: totrans-374
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 语音助手
- en: It’s hard to imagine the 21st century without AI personal assistants like Alexa,
    Siri, and Google Assistant. They are more than just search engines that respond
    to voice commands; they represent how AI is becoming an integral part of our lives.
    It takes more than simply issuing a command for Siri to understand your language
    and context when you ask it to set a reminder or seek the weather.
  id: totrans-375
  prefs: []
  type: TYPE_NORMAL
  zh: 想象没有像Alexa、Siri和Google Assistant这样的AI个人助手，21世纪是难以想象的。它们不仅仅是响应语音命令的搜索引擎；它们代表了人工智能正成为我们生活的一个不可或缺的部分。当Siri被要求设置提醒或查询天气时，它理解你的语言和上下文，这不仅仅是发出命令那么简单。
- en: Google Maps and the AI Odyssey
  id: totrans-376
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Google Maps 和人工智能奥德赛
- en: Google Maps is more than meets the eye; at first glance, it appears to be a
    simple navigating tool. It’s about AI acting as an intuitive copilot, not merely
    about finding the shortest route. Through the analysis of real-time traffic data,
    personal driving behaviors, and route adjustments, AI elevates the ordinary process
    of commuting to a level of efficiency befitting a symphony.
  id: totrans-377
  prefs: []
  type: TYPE_NORMAL
  zh: Google Maps 远不止表面看起来那么简单；乍一看，它似乎只是一个简单的导航工具。它不仅仅是关于找到最短路线，而是人工智能作为直观的副驾驶。通过分析实时交通数据、个人驾驶行为和路线调整，人工智能将普通的通勤过程提升到了一个交响乐般的效率水平。
- en: Natural Language Processing
  id: totrans-378
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 自然语言处理
- en: Conversations with AI seem to be simple because of natural language processing
    (NLP), which is often overlooked. It’s about more than just word recognition;
    it’s about understanding the complexities of human language. It’s like talking
    to a friend when you talk to Siri or Google Assistant. They not only hear you
    but also understand what you’re saying, which makes the conversation feel very
    real.
  id: totrans-379
  prefs: []
  type: TYPE_NORMAL
  zh: 由于自然语言处理（NLP）的存在，与人工智能的对话似乎很简单，这往往被忽视。这不仅仅是关于单词识别，更是关于理解人类语言的复杂性。就像你与Siri或Google
    Assistant交谈时，就像是在和朋友聊天。它们不仅听到你的声音，还能理解你在说什么，这使得对话感觉非常真实。
- en: Streaming With AI
  id: totrans-380
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 使用人工智能进行流媒体播放
- en: The capacity of your streaming platform to suggest content that is highly relevant
    to your tastes is not due to random chance but rather to AI magic. Your streaming
    experience becomes a personalized trip with the help of AI, which analyzes your
    viewing patterns, predicts your potential interests, and offers tailored suggestions.
    It’s almost as if your remote control has a sixth sense.
  id: totrans-381
  prefs: []
  type: TYPE_NORMAL
  zh: 你的流媒体平台能够根据你的喜好推荐高度相关的内容，这并非偶然，而是人工智能的魔力。在人工智能的帮助下，你的流媒体体验变成了一次个性化的旅行，它分析你的观看模式，预测你的潜在兴趣，并提供定制化的建议。几乎就像你的遥控器有了第六感一样。
- en: AI in Your Feed
  id: totrans-382
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 人工智能在你的信息流中
- en: When you log into one of your social media accounts, do you ever feel like your
    feed is personalized just for you? That’s AI’s artfully curated digital experience,
    working behind the scenes. It uses algorithms to offer you posts that are relevant
    to your interests, going beyond simple chronological presentation. With the help
    of AI, your online content explorations become personalized adventures rather
    than mindless browsing.
  id: totrans-383
  prefs: []
  type: TYPE_NORMAL
  zh: 当你登录你的社交媒体账户时，你是否曾觉得你的信息流是为你量身定制的？这就是人工智能巧妙策划的数字体验，在幕后工作。它使用算法为你提供与你兴趣相关的帖子，超越了简单的按时间顺序展示。借助人工智能，你的在线内容探索变成了个性化的冒险，而不是无目的的浏览。
- en: AI as Your Email Bouncer
  id: totrans-384
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 人工智能作为你的电子邮件拦截者
- en: Thanks to AI taking over the function of your email bouncer, the days of sifting
    through an ocean of spam emails are over. AI keeps your inbox clean of clutter
    by learning from your interactions, identifying patterns, and distinguishing between
    junk and valuable content. To avoid the tiresome chore of manual filtering, it’s
    like if you had a devoted helper who worked around the clock to sort through your
    emails.
  id: totrans-385
  prefs: []
  type: TYPE_NORMAL
  zh: 多亏了人工智能接管了你的电子邮件拦截功能，筛选大量垃圾邮件的日子已经过去了。人工智能通过学习你的互动，识别模式，区分垃圾邮件和有价值的内容，使你的收件箱保持整洁。为了避免繁琐的手动过滤，它就像你有一个全天候工作的忠实助手，帮你整理电子邮件。
- en: Facial Recognition Feats
  id: totrans-386
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 面部识别的壮举
- en: Once thought of as something futuristic, facial recognition is now widespread.
    It’s not only about getting into your phone; it’s also about protecting major
    events, finding risks, and making it easier to tag friends in social media posts.
    When it comes to facial recognition, AI is like a digital Sherlock Holmes; it
    quickly analyzes and interprets elements of the face without the use of a pipe
    or traditional Sherlock hat.
  id: totrans-387
  prefs: []
  type: TYPE_NORMAL
  zh: 曾经被认为是未来科技的面部识别现在已经普及。它不仅关乎进入你的手机；它还关乎保护重大事件、发现风险以及更容易在社交媒体帖子中标记朋友。当涉及到面部识别时，人工智能就像一个数字福尔摩斯；它快速分析并解释面部元素，而不使用烟斗或传统的福尔摩斯帽子。
- en: More Than Mimicry, It’s Mastery
  id: totrans-388
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 不仅仅是模仿，而是精通
- en: The real distinguishing feature of AI is not merely its capacity to imitate
    human actions, but also to excel at them. Computer programs cannot experience
    the Monday blues or forget things every once in a while, unlike people. Instead,
    it’s always analyzing, learning, and improving, adding a little enchantment and
    a touch of seamless efficiency to our digital encounters.
  id: totrans-389
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能的真实区别特征并不仅仅是其模仿人类行为的能力，而是超越这种能力，达到精通。计算机程序无法体验到周一综合症或偶尔忘记事情，这与人类不同。相反，它们总是分析、学习和改进，为我们的数字互动增添一点魔力，并带来无缝的效率。
- en: 'The Future: Beyond the Tip of the AI Iceberg'
  id: totrans-390
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 未来：超越人工智能冰山一角
- en: It is important to remember that our interactions with AI tools like Siri, Google
    Maps, and tailored suggestions are just the beginning. Even more technological
    advancements are on the horizon, and the road ahead looks nothing short of spectacular.
    AI is going to change the way we live, work, and interact in a lot of different
    ways, from healthcare innovations to automation. Enjoy the experience—you’re not
    simply interacting with technology; you’re getting a taste of the everyday wonders
    of AI—whether you’re asking for the weather or using Google Maps as your guide.
  id: totrans-391
  prefs: []
  type: TYPE_NORMAL
  zh: 记住这一点很重要：我们与Siri、Google Maps和个性化建议等人工智能工具的互动只是开始。更多的技术进步正在地平线上，前方的道路看起来无与伦比。人工智能将以许多不同的方式改变我们的生活方式、工作方式和互动方式，从医疗创新到自动化。享受这段经历吧——你不仅仅是在与技术互动；你正在品尝人工智能日常奇迹的味道——无论你是询问天气还是使用Google
    Maps作为你的向导。
- en: Understanding ML and NLP
  id: totrans-392
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 理解机器学习（ML）和自然语言处理（NLP）
- en: Learning the ins and outs of ML and NLP could feel like negotiating a technical
    maze. Rest assured, I will explain these ideas in a way that is more appropriate
    for a casual conversation than a formal data science conference.
  id: totrans-393
  prefs: []
  type: TYPE_NORMAL
  zh: 学习机器学习（ML）和自然语言处理（NLP）的细节可能感觉像是在技术迷宫中谈判。请放心，我会以更适合闲聊而不是正式数据科学会议的方式解释这些概念。
- en: Demystifying ML
  id: totrans-394
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 揭秘机器学习（ML）
- en: Let’s start with ML. What it boils down to is the science and art of computer
    learning and decision-making without the need for direct programming. You’re not
    giving your computer a precise script, but rather facts, and then you’re letting
    it work things out on its own.
  id: totrans-395
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们从机器学习（ML）开始。它的本质是计算机学习和决策的科学和艺术，无需直接编程。你不是给你的计算机一个精确的脚本，而是事实，然后你让它自己解决问题。
- en: 'Example: Spam Filter'
  id: totrans-396
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 示例：垃圾邮件过滤器
- en: You might want to think about the spam filter on your email. The filter learns
    what you consider spam based on your behavior, rather than being taught specifically
    what is spam. As it learns more and more, it becomes better at preventing spam
    from reaching your inbox.
  id: totrans-397
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能想要考虑一下你电子邮件中的垃圾邮件过滤器。该过滤器根据你的行为学习你认为是垃圾邮件的内容，而不是被具体地教导什么是垃圾邮件。随着它不断学习，它变得越来越擅长阻止垃圾邮件进入你的收件箱。
- en: Unraveling NLP
  id: totrans-398
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 揭示NLP
- en: Now let’s talk about NLP. It’s what makes computers able to understand, analyze,
    and make up a language that sounds natural. Imagine it like instructing your computer
    to understand and use English fluently.
  id: totrans-399
  prefs: []
  type: TYPE_NORMAL
  zh: 现在让我们来谈谈NLP。它是使计算机能够理解、分析和构建听起来自然的语言的能力。想象一下，就像指导你的电脑流利地理解和使用英语一样。
- en: 'Example: Virtual Assistants'
  id: totrans-400
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 示例：虚拟助手
- en: NLP is on display whenever you have a conversation with an AI like Alexa, Tim,
    or Siri. With the help of these virtual assistants, you may have natural-sounding
    conversations with them. They can comprehend what you say or write, understand
    the context, and answer accordingly. It’s about understanding the finer points
    of language, not merely finding keywords.
  id: totrans-401
  prefs: []
  type: TYPE_NORMAL
  zh: 当你与像Alexa、Tim或Siri这样的AI进行对话时，自然语言处理（NLP）就会展现出来。借助这些虚拟助手，你可以与他们进行自然流畅的对话。他们可以理解你说的话或写的文字，理解上下文，并据此回答。这关乎理解语言的细微之处，而不仅仅是找到关键词。
- en: Practical Use in a Range of Industries
  id: totrans-402
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 在众多行业中的实际应用
- en: Here are some real-world examples of how ML and NLP are revolutionizing various
    industries to help put these concepts into perspective.
  id: totrans-403
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一些现实世界的例子，说明了机器学习和NLP如何革命性地改变各个行业，以帮助将这些概念置于正确的视角。
- en: 'Healthcare: Predictive Diagnostics'
  id: totrans-404
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 医疗保健：预测性诊断
- en: When it comes to predictive diagnosis, ML is really making a splash in the medical
    field. By evaluating massive datasets, ML models can foretell future health problems,
    paving the way for proactive and individualized medical treatments. In a way,
    it’s similar to having a digital health assistant that is able to predict issues
    before they get worse.
  id: totrans-405
  prefs: []
  type: TYPE_NORMAL
  zh: 当涉及到预测性诊断时，机器学习在医疗领域确实引起了轰动。通过评估大量数据集，机器学习模型可以预测未来的健康问题，为主动和个性化的医疗治疗铺平道路。从某种意义上说，它就像有一个数字健康助手，能够在问题恶化之前预测问题。
- en: 'Example: IBM Watson for Oncology'
  id: totrans-406
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 示例：IBM Watson for Oncology
- en: IBM Watson for Oncology uses ML to determine the best course of treatment for
    each individual patient by analyzing their medical history, results from clinical
    trials, and other literature. This is a perfect illustration of how ML may improve
    healthcare decision-making.
  id: totrans-407
  prefs: []
  type: TYPE_NORMAL
  zh: IBM Watson for Oncology通过分析每个患者的医疗历史、临床试验结果和其他文献，使用机器学习来确定每个患者的最佳治疗方案。这是机器学习如何改善医疗决策的一个完美示例。
- en: Dealing With Financial Fraud
  id: totrans-408
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 应对金融欺诈
- en: When it comes to spotting instances of fraud in the banking industry, ML algorithms
    are like superheroes. They scan all of your financial transactions for unusual
    trends and flag them before you even realize there’s a problem.
  id: totrans-409
  prefs: []
  type: TYPE_NORMAL
  zh: 在银行行业中检测欺诈行为时，机器学习（ML）算法就像超级英雄。它们扫描你所有的金融交易，寻找异常趋势，并在你意识到有问题之前标记出来。
- en: 'Example: Credit Card Fraud Detection'
  id: totrans-410
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 示例：信用卡欺诈检测
- en: Banks use ML models that can swiftly identify unusual spending patterns after
    learning your spending habits. In many cases, the system may raise an alarm to
    avoid fraudulent transactions if your card is suddenly used for a purchase at
    an unexpected place or for an unusual amount.
  id: totrans-411
  prefs: []
  type: TYPE_NORMAL
  zh: 银行使用机器学习模型，在了解你的消费习惯后，能够迅速识别不寻常的消费模式。在许多情况下，如果您的卡在意外地点或以不寻常的金额进行购买，系统可能会发出警报，以避免欺诈交易。
- en: 'Online Shopping: Tailored Suggestions'
  id: totrans-412
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 在线购物：个性化建议
- en: How is it that your go-to online retailer always seems to have the perfect item
    in stock for you? That’s ML in action in the ecommerce realm, providing you with
    tailored suggestions according to your past actions.
  id: totrans-413
  prefs: []
  type: TYPE_NORMAL
  zh: 你为什么觉得你经常光顾的在线零售商似乎总能为你提供完美的商品？这就是电子商务领域机器学习的实际应用，根据你的过去行为为你提供个性化建议。
- en: 'Example: Amazon Recommendations'
  id: totrans-414
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 示例：Amazon Recommendations
- en: Your search history, Amazon purchases, and the purchases of other customers
    with similar tastes are all inputted into the recommendation engine. For a more
    tailored buying experience, it proposes items you might like.
  id: totrans-415
  prefs: []
  type: TYPE_NORMAL
  zh: 你的搜索历史、亚马逊购买记录以及具有相似口味的其他客户的购买记录都被输入到推荐引擎中。为了提供更个性化的购物体验，它建议你可能喜欢的商品。
- en: The Important Role in Chatbot Development
  id: totrans-416
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 在聊天机器人开发中的重要作用
- en: Resuming our original topic, let’s talk about how to make chatbots that are
    both intelligent and easy to interact with.
  id: totrans-417
  prefs: []
  type: TYPE_NORMAL
  zh: 恢复我们原来的话题，让我们谈谈如何制作既智能又易于交互的聊天机器人。
- en: Understanding User Intent With NLP
  id: totrans-418
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 利用自然语言处理（NLP）理解用户意图
- en: NLP is the game-changer when it comes to chatbots. Chatbots can comprehend human
    intent, interpret conversational context, and respond naturally thanks to NLP.
    It’s about understanding the complexities of language, not merely matching keywords.
  id: totrans-419
  prefs: []
  type: TYPE_NORMAL
  zh: 自然语言处理（NLP）是聊天机器人领域的变革者。聊天机器人能够理解人类意图，解释对话情境，并自然地做出响应，这都得益于自然语言处理（NLP）。这关乎理解语言的复杂性，而不仅仅是匹配关键词。
- en: 'Example: Chatbot for Customer Support'
  id: totrans-420
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 示例：客户支持聊天机器人
- en: Just picture a chatbot that answers questions for an online company. It comprehends
    user requests in any form or phrase thanks to NLP. The chatbot learns the user’s
    preferences and requirements and adjusts its responses accordingly, rather than
    giving a set of generic answers.
  id: totrans-421
  prefs: []
  type: TYPE_NORMAL
  zh: 想象一下，一个为在线公司解答问题的聊天机器人。由于自然语言处理（NLP），它能够理解任何形式或用语的用户请求。聊天机器人学习用户的偏好和需求，并相应地调整其响应，而不是给出一系列通用的答案。
- en: Enhancing User Experience With ML
  id: totrans-422
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 利用机器学习提升用户体验
- en: To round up NLP, ML trains chatbots to get smarter with use. They don’t mindlessly
    follow a script; instead, they learn from interactions and become better at understanding
    and responding to different conversations.
  id: totrans-423
  prefs: []
  type: TYPE_NORMAL
  zh: 为了总结自然语言处理（NLP），机器学习训练聊天机器人变得更聪明。它们不会盲目遵循脚本；相反，它们从互动中学习，并在理解和回应不同对话方面变得更好。
- en: 'Example: Virtual Shopping Assistant'
  id: totrans-424
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 示例：虚拟购物助手
- en: Think about a chatbot that can help you shop online. The more people use it,
    the more ML algorithms learn about their tastes, buying habits, and comments.
    The chatbot improves with time at making personalized product recommendations,
    making shopping more interesting and unique.
  id: totrans-425
  prefs: []
  type: TYPE_NORMAL
  zh: 想象一下，一个可以帮助你在线购物的聊天机器人。随着越来越多的人使用它，机器学习算法就会更多地了解他们的口味、购买习惯和评论。聊天机器人随着时间的推移在提供个性化产品推荐方面变得越来越好，使购物更有趣和独特。
- en: Significance in Chatbot Evolution
  id: totrans-426
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 聊天机器人演变中的重要性
- en: A new era has begun in chatbot development with the integration of ML and NLP.
    With these advancements, chatbots can go beyond being basic rule-based responses
    and become fully functional conversational agents.
  id: totrans-427
  prefs: []
  type: TYPE_NORMAL
  zh: 随着机器学习和自然语言处理（NLP）的集成，聊天机器人开发进入了一个新时代。有了这些进步，聊天机器人可以超越基本的基于规则的响应，成为完全功能性的对话代理。
- en: Customization and Flexibility
  id: totrans-428
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 定制化和灵活性
- en: With the help of ML, chatbots may learn to respond to different types of user
    input and language. They are capable of responding to a wide range of questions,
    improving their answers over time based on user feedback. Because of their versatility,
    chatbots can adapt to different situations and continue to be productive.
  id: totrans-429
  prefs: []
  type: TYPE_NORMAL
  zh: 在机器学习的帮助下，聊天机器人可能学会对不同类型的用户输入和语言做出响应。它们能够回答广泛的问题，并根据用户反馈随着时间的推移改进其答案。由于它们的通用性，聊天机器人可以适应不同的情境并保持生产力。
- en: Ongoing Learning for Improved Performance
  id: totrans-430
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 持续学习以提升性能
- en: Chatbots are not immutable things when it comes to ML. Learning comes easily
    to them. Their capacity to comprehend human intent and provide more precise and
    context-aware responses is improved with each interaction since their knowledge
    base grows. It’s pretty much like having a chatbot that becomes more proficient
    in its role as the conversations progress.
  id: totrans-431
  prefs: []
  type: TYPE_NORMAL
  zh: 当涉及到机器学习时，聊天机器人并非一成不变的事物。它们很容易学习。随着知识库的增长，它们理解人类意图和提供更精确、更具情境意识的响应的能力在每次互动中都会得到提升。这就像有一个随着对话的进行而在其角色上变得越来越熟练的聊天机器人。
- en: Efficiency in Handling Large Volumes
  id: totrans-432
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 处理大量信息的高效性
- en: ML-powered chatbots manage high numbers of questions in chatbot-using businesses
    such as customer assistance. While keeping a casual and conversational tone, they
    can quickly sort and prioritize messages, allowing for the speedy resolution of
    critical concerns.
  id: totrans-433
  prefs: []
  type: TYPE_NORMAL
  zh: 由机器学习驱动的聊天机器人能够处理大量在客户服务等领域使用聊天机器人的业务中的问题。在保持轻松对话的语气的同时，它们可以快速排序和优先处理信息，从而迅速解决关键问题。
- en: The Role of AI in Chatbots
  id: totrans-434
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 人工智能在聊天机器人中的作用
- en: When it comes to real-world AI applications, chatbots are changing the game
    for how companies engage with customers. Chatbots are a concrete example of AI;
    they use ML and NLP to understand human questions and provide instantaneous responses.
    They provide better customer service, streamline operations, and even allow for
    more personalized user experiences by acting as virtual assistants.
  id: totrans-435
  prefs: []
  type: TYPE_NORMAL
  zh: 当涉及到现实世界的AI应用时，聊天机器人正在改变公司如何与客户互动的方式。聊天机器人是人工智能的一个具体例子；它们使用机器学习和自然语言处理（NLP）来理解人类问题并提供即时响应。它们提供更好的客户服务，简化运营，甚至通过充当虚拟助手允许更个性化的用户体验。
- en: When AI is integrated with chatbots, they are upgraded from programmed replies
    to conversational agents that can learn and adapt based on user interactions.
    In a world where instantaneous communication is key, chatbots are the next big
    thing in using AI to make people more responsive and efficient.
  id: totrans-436
  prefs: []
  type: TYPE_NORMAL
  zh: 当人工智能与聊天机器人结合时，它们从预设的回复升级为能够根据用户互动学习和适应的对话代理。在一个即时通讯至关重要的世界里，聊天机器人是利用人工智能使人们更加响应和高效的大事。
- en: Chatbots have been a game-changer in several sectors, providing businesses with
    flexible and effective solutions while also steadily raising the bar for consumer
    interaction. The question is, though, when is a chatbot most useful?
  id: totrans-437
  prefs: []
  type: TYPE_NORMAL
  zh: 聊天机器人在多个行业中都是一个颠覆性的变革，为商业提供了灵活有效的解决方案，同时也在稳步提高消费者互动的标准。然而，问题是，聊天机器人何时最有用？
- en: Apple and Amazon
  id: totrans-438
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 苹果和亚马逊
- en: Apple and Amazon, two industry heavyweights, have made chatbots an integral
    part of their customer support strategies. A lot of businesses are using chatbots
    to help customers with things like answering questions, resolving issues, and
    getting immediate responses. These IT companies demonstrate the real-world effect
    of AI in customer care by increasing customer happiness through the use of chatbots
    in their customer support operations.
  id: totrans-439
  prefs: []
  type: TYPE_NORMAL
  zh: 苹果和亚马逊这两大行业巨头已经将聊天机器人作为其客户支持策略的重要组成部分。许多企业正在使用聊天机器人帮助客户解答问题、解决问题和获得即时响应。这些IT公司通过在客户支持运营中使用聊天机器人来提高客户满意度，展示了人工智能在客户关怀中的实际效果。
- en: Babylon Health
  id: totrans-440
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 巴比伦健康
- en: Chatbots have revolutionized healthcare. Babylon Health is one of several platforms
    that use chatbots to provide instant medical advice and assistance. Appointment
    setting, medication reminders, and symptom evaluation are just a few of the many
    uses for these interactive digital assistants. Chatbots used by Babylon Health
    show how AI may help make healthcare more accessible and faster, which is good
    for everyone involved.
  id: totrans-441
  prefs: []
  type: TYPE_NORMAL
  zh: 聊天机器人已经彻底改变了医疗保健行业。巴比伦健康是几个使用聊天机器人提供即时医疗建议和帮助的平台之一。预约设置、药物提醒和症状评估只是这些互动式数字助手众多用途中的几个。巴比伦健康使用的聊天机器人展示了人工智能如何帮助使医疗保健更加便捷和快速，这对所有相关方都有好处。
- en: Wells Fargo
  id: totrans-442
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 富国银行
- en: To improve the client service they provide for activities like checking account
    balances, transaction histories, and financial advice, financial institutions
    have started using chatbots. For example, Wells Fargo uses chatbots to help clients
    with money management. By utilizing chatbots in the banking industry, companies
    can provide prompt and tailored assistance, demonstrating how AI can adapt to
    meet various demands in the field.
  id: totrans-443
  prefs: []
  type: TYPE_NORMAL
  zh: 为了提高他们在检查账户余额、交易历史和财务建议等活动上提供的服务质量，金融机构已经开始使用聊天机器人。例如，富国银行使用聊天机器人帮助客户进行财务管理。通过在银行业务中利用聊天机器人，公司可以提供及时和定制化的帮助，展示了人工智能如何适应以满足该领域的各种需求。
- en: Georgia State University’s “Pounce”
  id: totrans-444
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 乔治亚州立大学的“Pounce”
- en: Chatbots have discovered a home in the education industry, specifically in areas
    such as individualized tutoring, course information distribution, and student
    support services. “Pounce,” the chatbot at Georgia State University, helps students
    with campus life. It demonstrates how chatbots can simplify education and increase
    student participation by providing information about classes, resources, and campus
    facilities.
  id: totrans-445
  prefs: []
  type: TYPE_NORMAL
  zh: 聊天机器人已经在教育行业找到了自己的位置，特别是在个性化辅导、课程信息分发和学生支持服务等领域。“Pounce”是乔治亚州立大学的聊天机器人，帮助学生处理校园生活。它展示了聊天机器人如何通过提供关于课程、资源和校园设施的信息来简化教育和提高学生参与度。
- en: The practical applications of chatbots in these examples show how they may improve
    customer service, simplify processes, and boost productivity across many sectors.
    A new age of intelligent and responsive digital interactions across several sectors
    is about to dawn, thanks to chatbot integration, which is predicted to expand
    in tandem with technology.
  id: totrans-446
  prefs: []
  type: TYPE_NORMAL
  zh: 这些例子中聊天机器人的实际应用展示了它们如何改善客户服务、简化流程并提高多个行业的生产力。随着聊天机器人的集成，一个智能和响应式的数字互动新时代即将到来，预计将与技术的发展同步扩展。
- en: How Deep AI Knowledge Is Essential for Chatbot Success
  id: totrans-447
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 深度人工智能知识对于聊天机器人成功的重要性
- en: The full potential of chatbots can only be realized with a deep comprehension
    of AI. Chatbots, enabled by AI, progress from preprogrammed responses to fully
    formed conversational beings. Chatbots are powered by the twin engines—ML and
    NLP—that only those with a deep understanding of AI can fully understand. Those
    with a grasp of ML are better able to train chatbots, which allows them to evolve
    and improve in response to user input. Chatbots that can grasp user intent and
    encourage natural, context-aware discussions cannot be built without expertise
    in NLP.
  id: totrans-448
  prefs: []
  type: TYPE_NORMAL
  zh: 要充分发挥聊天机器人的潜力，需要深刻理解AI。由AI驱动的聊天机器人从预编程的响应发展到完整的对话实体。聊天机器人由机器学习和自然语言处理这两个引擎驱动，只有对AI有深刻理解的人才能完全理解。掌握机器学习的人能够更好地训练聊天机器人，这使它们能够根据用户输入进行演变和改进。没有自然语言处理的专业知识，无法构建能够理解用户意图并鼓励自然、情境感知讨论的聊天机器人。
- en: To top it all off, picking and using the correct chatbot technologies requires
    a mastery of AI. Skilled AI users can make chatbots work for their purposes by
    using rule-based systems or complex ML models. For humans to fully harness the
    potential of chatbots in many industries and applications, they need a solid grasp
    of AI as their compass in the ever-changing world of chatbot creation.
  id: totrans-449
  prefs: []
  type: TYPE_NORMAL
  zh: 更重要的是，选择和使用正确的聊天机器人技术需要掌握AI。熟练的AI用户可以通过使用基于规则的系统或复杂的机器学习模型，使聊天机器人服务于他们的目的。为了在许多行业和应用中充分利用聊天机器人的潜力，人们需要深刻理解AI，将其作为在不断变化的聊天机器人创造世界中的指南针。
- en: Generative AI
  id: totrans-450
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 生成式AI
- en: Generative AI is a state-of-the-art area that allows computers to do more than
    just understand; it also allows them to create. This new technology is going to
    revolutionize the game since it lets AI models create data that is similar to
    the data they were trained on but also has some artistic flair. It would be like
    having an AI artist on staff who can generate completely original ideas, whether
    they be visual or textual, broadening the scope of AI’s potential.
  id: totrans-451
  prefs: []
  type: TYPE_NORMAL
  zh: 生成式AI是一个前沿领域，它不仅允许计算机理解，还允许它们创造。这项新技术将彻底改变游戏规则，因为它让AI模型能够创建与它们训练数据相似但具有一些艺术风格的数据。这就像拥有一个AI艺术家，他可以生成完全原创的想法，无论是视觉的还是文本的，从而拓宽AI潜力的范围。
- en: 'OpenAI’s most recent Generative Pre-trained Transformer 4 (GPT-4) is a model
    of excellence in the field of generative AI. In terms of language power, GPT-4
    is head and shoulders above the competition. It is an incredibly powerful tool
    for chatbots since it can produce human-like text with an exceptional grasp of
    context and subtleties. Picture this: You ask your virtual assistant a question,
    and it comes up with an original answer, tailoring its vocabulary to fit the tone
    of the conversation.'
  id: totrans-452
  prefs: []
  type: TYPE_NORMAL
  zh: OpenAI最新推出的生成式预训练变换器4（GPT-4）在生成式AI领域是一个卓越的模型。在语言能力方面，GPT-4在竞争中遥遥领先。它是一个极其强大的聊天机器人工具，因为它能够以非凡的语境和细微差别掌握能力生成类似人类的文本。想象一下：你向你的虚拟助手提出一个问题，它会给出一个原创的答案，调整其词汇以适应对话的语气。
- en: DALL-E, created by OpenAI, is another shining star in the field of generative
    AI. This model goes beyond the usual way of making images by generating images
    from words. If you were to tell DALL-E to create an image of “a futuristic cityscape
    with floating buildings,” for example, it would come up with a one-of-a-kind rendering
    that matched your description. All of this exemplifies how generative AI is revolutionizing
    the creative process.
  id: totrans-453
  prefs: []
  type: TYPE_NORMAL
  zh: 由OpenAI创建的DALL-E是生成式AI领域的另一颗璀璨明星。这个模型超越了传统的图像生成方式，通过文字生成图像。例如，如果你告诉DALL-E创建一个“一个未来城市景观，有悬浮建筑的图像”，它就会根据你的描述生成一个独一无二的渲染效果。所有这些都展示了生成式AI如何正在改变创意过程。
- en: In chatbots, generative AI changes the way people talk. Chatbots enabled by
    generative AI can generate text on the fly, improving the engagement and naturalness
    of conversations compared to those driven by predefined responses. As chatbots
    mimic human conversational styles, tones, and circumstances, users perceive a
    natural flow to the interaction.
  id: totrans-454
  prefs: []
  type: TYPE_NORMAL
  zh: 在聊天机器人中，生成式AI改变了人们的交流方式。由生成式AI驱动的聊天机器人可以即时生成文本，与那些由预定义响应驱动的聊天机器人相比，提高了对话的参与度和自然度。随着聊天机器人模仿人类的对话风格、语气和情境，用户会感觉到互动的自然流畅。
- en: Generative AI’s influence goes well beyond that of art and chatbots. Making
    music, writing essays, and even code snippets are all examples of content creation.
    It’s as if you have a creative partner who works with you on multiple projects
    and adds their own flare to each one.
  id: totrans-455
  prefs: []
  type: TYPE_NORMAL
  zh: 生成式人工智能的影响远远超出了艺术和聊天机器人的范畴。创作音乐、撰写文章，甚至代码片段都是内容创作的例子。就好像你有一个创意伙伴，与你共同参与多个项目，并为每个项目增添自己的特色。
- en: But being creatively powerful also means being responsible. The hard part is
    making sure that the material that is generated is moral and doesn’t reinforce
    biases that were present in the training data. Finding a happy medium between
    technological advancement and moral concerns is becoming more important as generative
    AI develops further.
  id: totrans-456
  prefs: []
  type: TYPE_NORMAL
  zh: 但创造力强大也意味着要负责任。难点在于确保生成的材料是道德的，并且不会强化训练数据中存在的偏见。随着生成式人工智能的进一步发展，在技术进步和道德关注之间找到平衡点变得越来越重要。
- en: Next up, we tackle the chatbot gold rush, with a particular focus on ChatGPT.
  id: totrans-457
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们将解决聊天机器人淘金热的问题，特别关注ChatGPT。
- en: '| ![image](d2d_images/chapter_title_corner_decoration_left.png) |  | ![image](d2d_images/chapter_title_corner_decoration_right.png)
    |'
  id: totrans-458
  prefs: []
  type: TYPE_TB
  zh: '| ![image](d2d_images/chapter_title_corner_decoration_left.png) |  | ![image](d2d_images/chapter_title_corner_decoration_right.png)
    |'
- en: '![image](d2d_images/chapter_title_above.png)'
  id: totrans-459
  prefs: []
  type: TYPE_IMG
  zh: '![image](d2d_images/chapter_title_above.png)'
- en: 'Chapter 2: The Chatbot Gold Rush—What You Need to Know'
  id: totrans-460
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第二章：聊天机器人淘金热——你需要知道的信息
- en: '![image](d2d_images/chapter_title_below.png)'
  id: totrans-461
  prefs: []
  type: TYPE_IMG
  zh: '![image](d2d_images/chapter_title_below.png)'
- en: Welcome to the forefront of AI innovation with ChatGPT, a groundbreaking success
    in the world of language models by OpenAI. ChatGPT represents a giant leap for
    conversational AI. What follows is an analysis of ChatGPT that will clarify its
    features and reveal its many potential uses in many fields.
  id: totrans-462
  prefs: []
  type: TYPE_NORMAL
  zh: 欢迎来到ChatGPT的AI创新前沿，这是OpenAI在语言模型领域的突破性成功。ChatGPT代表了对话人工智能的一个巨大飞跃。以下是对ChatGPT的分析，将阐明其特性并揭示其在许多领域的许多潜在用途。
- en: Furthermore, we will explore the rise of the so-called “GPT gold rush,” defined
    by the promising revenue opportunities linked to ChatGPT. By looking closely,
    we will find out how engaged users are, how industries have changed, and learn
    from real-life success stories. This will give us a more complete picture of the
    real benefits of incorporating ChatGPT into modern processes. Let’s dive right
    in!
  id: totrans-463
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，我们将探讨所谓的“GPT淘金热”的兴起，这是由与ChatGPT相关的有前景的收入机会所定义的。通过仔细观察，我们将了解活跃用户的情况，了解行业如何变化，并从现实生活中的成功故事中学习。这将让我们对将ChatGPT纳入现代流程的实际益处有一个更全面的了解。让我们直接深入吧！
- en: What Is ChatGPT and Why It Matters
  id: totrans-464
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 什么是ChatGPT以及为什么它很重要
- en: ChatGPT signifies a paradigm shift in chatbot and AI development. Developed
    by OpenAI, ChatGPT is essentially an enhanced language model. But what does that
    really mean?
  id: totrans-465
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT标志着聊天机器人和人工智能发展的一个范式转变。由OpenAI开发，ChatGPT本质上是一个增强的语言模型。但这究竟意味着什么呢？
- en: To put it simply, ChatGPT is an advanced tool that does an excellent job of
    both understanding and producing writing that sounds natural. It’s very much like
    chatting with a virtual friend who understands what you’re saying and replies
    in a really natural way. The “chat” in ChatGPT refers to its main purpose, which
    is to have chats or dialogues with users. Picture it as the online version of
    chatting with a friend who is an expert on a wide range of subjects.
  id: totrans-466
  prefs: []
  type: TYPE_NORMAL
  zh: 简单来说，ChatGPT是一个高级工具，它非常擅长理解和生成听起来自然的写作。它非常像与一个理解你在说什么并以非常自然的方式回复的虚拟朋友聊天。ChatGPT中的“chat”指的是其主要目的，即与用户进行聊天或对话。想象一下，它是与一个在广泛主题上都是专家的朋友在线聊天的版本。
- en: Why It Matters
  id: totrans-467
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 为什么它很重要
- en: Let’s get started by diving into the significance of ChatGPT within the broader
    context of AI and chatbots.
  id: totrans-468
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们从深入了解ChatGPT在人工智能和聊天机器人更广泛背景下的重要性开始吧。
- en: Natural and Dynamic Conversations
  id: totrans-469
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 自然且动态的对话
- en: The remarkable conversational abilities of ChatGPT set it apart. The responses
    that ChatGPT makes are not prewritten like those from standard chatbots. Instead,
    they are generated on the fly by advanced language models like GPT, the engine
    running ChatGPT. Because of this, it can learn many ways of speaking, which makes
    interacting with it feel incredibly natural.
  id: totrans-470
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT卓越的对话能力使其脱颖而出。ChatGPT做出的回应不像标准聊天机器人那样是预先编写的。相反，它们是由像GPT这样的高级语言模型即时生成的，GPT是运行ChatGPT的引擎。正因为如此，它可以学习许多说话方式，这使得与之互动感觉非常自然。
- en: Part in the Bigger Picture of AI
  id: totrans-471
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: AI更大图景的一部分
- en: As it helps advance conversational AI, ChatGPT is an essential gear in the vast
    AI ecosystem. Machines can now comprehend and even produce coherent, contextually
    appropriate text, marking a significant advance in NLP. Particularly in chatbots,
    where understanding user input and providing meaningful responses is key to effective
    communication.
  id: totrans-472
  prefs: []
  type: TYPE_NORMAL
  zh: 在推动对话式AI发展的过程中，ChatGPT是庞大AI生态系统中的一个关键齿轮。机器现在能够理解和甚至产生连贯、上下文适当的文本，标志着NLP的重大进步。特别是在聊天机器人领域，理解用户输入并提供有意义的回应是有效沟通的关键。
- en: Advancements in Language Models
  id: totrans-473
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 语言模型的发展
- en: The idea of language models is central to ChatGPT’s capabilities. By being pretrained
    on massive datasets, these models—particularly the GPT series—are exposed to a
    wide variety of linguistic patterns and structures. Thanks to this pretraining,
    ChatGPT has a solid grasp of context and can now produce responses that match
    the subtleties of a conversation.
  id: totrans-474
  prefs: []
  type: TYPE_NORMAL
  zh: 语言模型的概念是ChatGPT能力核心。通过在大量数据集上进行预训练，这些模型——尤其是GPT系列——接触到了广泛的语料库和结构。得益于这种预训练，ChatGPT对上下文有了坚实的把握，现在能够产生与对话细微差别相匹配的回应。
- en: Uses in Different Areas
  id: totrans-475
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 不同领域的应用
- en: The influence of ChatGPT reaches far and wide, changing the way people and companies
    engage with AI-driven platforms. It can improve the speed and accuracy of responding
    to customer service inquiries, which in turn saves time and effort. As a virtual
    tutor, it can help students learn and spread knowledge in the classroom. Additionally,
    ChatGPT’s adaptability is demonstrated by its usage in content development, creative
    writing, and code generation.
  id: totrans-476
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT的影响广泛深远，改变了人们和公司与AI驱动平台互动的方式。它可以提高响应客户服务咨询的速度和准确性，从而节省时间和精力。作为虚拟导师，它可以帮助学生在课堂上学习和传播知识。此外，ChatGPT的适应性通过其在内容开发、创意写作和代码生成中的应用得到体现。
- en: User-Friendly AI Interaction
  id: totrans-477
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 用户友好的AI交互
- en: The ease of use of ChatGPT is a major factor in its significance. People can
    engage with AI systems through it even if they don’t have detailed technical understanding.
    Thanks to the widespread availability of AI interaction, more individuals than
    ever before may tap into the capabilities of sophisticated language models for
    anything from finding specific information to creating captivating content.
  id: totrans-478
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT的易用性是其重要性的一个主要因素。即使人们没有详细的技术理解，他们也可以通过它与AI系统互动。多亏了AI交互的广泛可用性，现在比以往任何时候都有更多的人能够利用复杂语言模型的能力，无论是为了查找特定信息还是创建引人入胜的内容。
- en: Lifelong Education and Modification
  id: totrans-479
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 终身教育和改进
- en: ChatGPT’s initial capabilities and its capacity for continuous learning and
    modification contribute to its significance. The GPT model gets smarter and better
    with time as users interact with ChatGPT, giving it input and making it work better
    for them. By adjusting to the ever-changing dynamics of language use, ChatGPT
    guarantees that it will always be current and responsive.
  id: totrans-480
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT的初始能力和持续学习和修改的能力使其具有重要意义。随着用户与ChatGPT的互动，GPT模型会随着时间的推移变得更加智能和出色。通过适应语言使用的不断变化，ChatGPT保证了它始终处于最新状态并能够做出响应。
- en: Ethical Considerations and Mitigations
  id: totrans-481
  prefs: []
  type: TYPE_NORMAL
  zh: 道德考量与缓解措施
- en: There are moral questions that arise with the development of advanced language
    models like ChatGPT. We must pay close attention to matters of prejudice, false
    information, and possible abuse. In light of these difficulties, OpenAI has implemented
    safety measures and is actively seeking user feedback to fix bugs and make responsible
    improvements to the technology.
  id: totrans-482
  prefs: []
  type: TYPE_NORMAL
  zh: 随着像ChatGPT这样的高级语言模型的发展，出现了道德问题。我们必须密切关注偏见、虚假信息和可能的滥用问题。鉴于这些困难，OpenAI已经实施了安全措施，并积极寻求用户反馈以修复错误并对技术做出负责任的改进。
- en: ChatGPT’s Remarkable Impact
  id: totrans-483
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: ChatGPT的显著影响
- en: OpenAI’s ChatGPT was one of the first examples of AI, and it has quickly become
    a major player in the field, changing the way customer service, business, and
    many other fields work. Let’s dive into the impressive numbers that highlight
    its success and its crucial role in the global AI ecosystem.
  id: totrans-484
  prefs: []
  type: TYPE_NORMAL
  zh: OpenAI的ChatGPT是AI领域的第一个例子之一，它迅速成为该领域的主要参与者，改变了客户服务、商业以及许多其他领域的工作方式。让我们深入了解凸显其成功及其在全球AI生态系统中的关键作用的令人印象深刻的数据。
- en: Engagement With Users and Global Reach
  id: totrans-485
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 与用户互动和全球影响力
- en: With an astounding 180.5 million users worldwide, ChatGPT has established itself
    as a top AI tool (Mahajan, 2023). Its broad popularity is shown by the weekly
    participation of 100 million users, which includes 92% of Fortune 500 firms (Porter,
    2023). The United States accounts for 46.75% of this user base, and no single
    region is restricted to this user base (Nerdynav, 2022).
  id: totrans-486
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT 在全球拥有惊人的 1.805 亿用户，已成为顶级 AI 工具（马哈贾恩，2023）。其广泛的受欢迎程度体现在每周有 1 亿用户的参与，其中包括
    92% 的《财富》500 强公司（波特，2023）。美国占用户基础的 46.75%，没有任何单一地区被限制在这个用户基础中（纳尔丁纳夫，2022）。
- en: Enjoying 90% Customer Satisfaction
  id: totrans-487
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 享受 90% 的客户满意度
- en: The capacity of a chatbot to deliver happy customers is a good indicator of
    its success. OpenAI has polled ChatGPT users multiple times to figure out their
    level of satisfaction. By 2023, ChatGPT had proven itself effective in providing
    consumers with accurate and individualized responses, with a customer satisfaction
    percentage of over 90% (Paul, 2023).
  id: totrans-488
  prefs: []
  type: TYPE_NORMAL
  zh: 聊天机器人带给快乐顾客的能力是其成功的好指标。OpenAI 多次对 ChatGPT 用户进行了调查，以了解他们的满意度水平。到 2023 年，ChatGPT
    已经证明自己在向消费者提供准确和个性化的回应方面是有效的，客户满意度百分比超过 90%（保罗，2023）。
- en: Gender Demographics
  id: totrans-489
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 性别人口统计
- en: Although a majority of ChatGPT users are male (65.68%), the platform’s adaptability
    makes it suitable for females as well (Nerdynav, 2022). This breakdown by gender
    is reflective of the vast industries and fields of endeavor that ChatGPT may facilitate.
  id: totrans-490
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管大多数 ChatGPT 用户是男性（65.68%），但该平台的适应性使其也适合女性（纳尔丁纳夫，2022）。这种按性别划分的细分反映了 ChatGPT
    可能促进的广泛行业和努力领域。
- en: Subscription Models and Revenue Projections
  id: totrans-491
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 订阅模式和收入预测
- en: ChatGPT has a free and a premium version. The premium version, powered by GPT-4
    (the latest in the GPT series), is 82% safer and 40% more accurate (Terrasi, 2023).
    This premium service has attracted a lot of attention due to its $20 monthly price.
    With $200 million in revenue by 2023, ChatGPT has grown into a significant player
    in user interactions and a profitable enterprise for OpenAI (Panharith, 2023).
  id: totrans-492
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT 有免费版和付费版。付费版由 GPT-4（GPT 系列的最新版本）提供支持，比免费版安全 82%，准确 40%（特拉斯西，2023）。由于其每月
    20 美元的定价，这项付费服务吸引了大量关注。到 2023 年，ChatGPT 的收入达到 2 亿美元，已成为用户互动的重要参与者，也是 OpenAI 的盈利企业（帕哈里特，2023）。
- en: Value and Operational Expenses
  id: totrans-493
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 价值和运营成本
- en: Running ChatGPT comes with a hefty price tag, costing OpenAI $700,000 daily
    (Mustafa, 2023). But the platform’s impact shows that the investment was worthwhile.
    Rising platform revenues and increasing clout in the AI space are driving estimates
    that OpenAI’s worth might reach $90 billion in the next few years (Bohannon, 2023).
  id: totrans-494
  prefs: []
  type: TYPE_NORMAL
  zh: 运行 ChatGPT 需要高昂的成本，OpenAI 每天花费 70 万美元（穆斯塔法，2023）。但该平台的影响表明，这笔投资是值得的。平台收入的增长和在
    AI 领域影响力的增加推动了对 OpenAI 价值可能在未来几年达到 900 亿美元的估计（博哈纳恩，2023）。
- en: Industry-Wide Flexibility
  id: totrans-495
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 行业范围内的灵活性
- en: ChatGPT has an impact in many different fields, including data analysis, education,
    automation, and coding. Because of its versatility, it has become a popular choice
    for businesses and individuals that want to improve efficiency and output.
  id: totrans-496
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT 在许多不同的领域都有影响，包括数据分析、教育、自动化和编码。由于其多功能性，它已成为那些希望提高效率和产出的企业和个人的热门选择。
- en: Benefits to the Company and Savings
  id: totrans-497
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 对公司和节省的好处
- en: A survey conducted in 2023 shed light on the concrete advantages that American
    organizations have gained from incorporating ChatGPT into their processes. In
    the range of $50,000 to $75,000 in revenue, 25% of businesses claimed savings,
    with an astounding 11% reporting savings of $100,000 or more (Thormundsson, 2023).
    These numbers highlight the efficiency and cost-effectiveness gains that have
    been made by using the platform.
  id: totrans-498
  prefs: []
  type: TYPE_NORMAL
  zh: 2023 年进行的一项调查揭示了美国组织从将 ChatGPT 纳入其流程中获得的实际优势。在 50,000 至 75,000 美元的收入范围内，25%
    的企业声称节省了成本，其中令人震惊的 11% 报告节省了 100,000 美元或更多（索尔蒙德松，2023）。这些数字突显了使用该平台所取得的效率提升和成本效益。
- en: Progress Toward Artificial General Intelligence
  id: totrans-499
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 向通用人工智能的进步
- en: Part of a larger path toward general AI or artificial general intelligence (AGI),
    ChatGPT isn’t merely about present success. It was reported by Reuters that OpenAI
    researchers saw Q*, an additional internal model, as a major advancement toward
    AGI (Tong et al., 2023). This further proves that ChatGPT is a state-of-the-art
    technology that is propelling progress in AI research.
  id: totrans-500
  prefs: []
  type: TYPE_NORMAL
  zh: 作为通向通用人工智能或人工通用智能（AGI）更大路径的一部分，ChatGPT 不仅仅关乎当前的成功。路透社报道，OpenAI 研究人员将 Q*，一个额外的内部模型，视为向
    AGI 的重要进步（Tong 等人，2023）。这进一步证明了 ChatGPT 是一项尖端技术，正在推动人工智能研究的发展。
- en: Making Money With GPT-4
  id: totrans-501
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 利用 GPT-4 赚钱
- en: As the field of AI continues to develop, GPT-4 stands out as a remarkable technological
    achievement and a promising prospect for anyone interested in exploring financial
    possibilities. Developed by OpenAI, this state-of-the-art language model is more
    than simply a chatbot; it opens doors to multiple sources of income. Let’s explore
    the ways to make money with GPT-4, the possible earnings, and the first steps
    to start making money with this app.
  id: totrans-502
  prefs: []
  type: TYPE_NORMAL
  zh: 随着人工智能领域的不断发展，GPT-4 作为一项显著的技术成就和探索财务可能性的有希望的前景脱颖而出。由 OpenAI 开发的这项尖端语言模型不仅仅是一个聊天机器人；它打开了多个收入来源的大门。让我们探讨利用
    GPT-4 赚钱的途径、可能的收入以及开始使用此应用程序赚钱的第一步。
- en: Email Drafting
  id: totrans-503
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 电子邮件草稿
- en: Think about how much effort goes into writing an email. By creating consistent
    and tailored email drafts, GPT-4 can simplify this procedure. People and companies
    may be ready to shell out cash for this service if it means more efficient communication
    and less time wasted.
  id: totrans-504
  prefs: []
  type: TYPE_NORMAL
  zh: 想想写电子邮件需要投入多少努力。通过创建一致且定制的电子邮件草稿，GPT-4 可以简化这一过程。如果这意味着更高效的沟通和更少的时间浪费，人们和公司可能会愿意为此服务支付费用。
- en: Writing High-Quality Content
  id: totrans-505
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 编写高质量内容
- en: GPT-4 is a master at it. Using this technology, content creators and freelance
    writers may easily draft marketing copy, blog posts, and articles. Offering content
    production services is a great way for individuals to capitalize on the demand
    for interesting and engaging written material.
  id: totrans-506
  prefs: []
  type: TYPE_NORMAL
  zh: GPT-4 在此方面堪称大师。使用这项技术，内容创作者和自由职业作家可以轻松起草营销文案、博客文章和文章。提供内容制作服务是个人利用对有趣和引人入胜的书面材料需求的一种很好的方式。
- en: Social Media Management
  id: totrans-507
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 社交媒体管理
- en: Creating interesting content for social media platforms might take a lot of
    time. With the help of GPT-4, you can easily create engaging and pertinent material
    for social media. People who own tiny enterprises, are just starting out, or want
    to make a big splash on the internet could benefit from this kind of service.
  id: totrans-508
  prefs: []
  type: TYPE_NORMAL
  zh: 为社交媒体平台创建有趣的内容可能需要花费大量时间。借助 GPT-4，您可以轻松创建吸引人且相关的社交媒体内容。那些拥有小型企业、刚开始创业或希望在互联网上大出风头的人可以从中受益。
- en: Develop an App or Chrome Extension
  id: totrans-509
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 开发应用程序或 Chrome 扩展程序
- en: Make the most of GPT-4’s features to build cutting-edge apps or extensions for
    Chrome. Making and selling apps, whether they’re for translating languages, creating
    content, or providing tailored support, may be a profitable business.
  id: totrans-510
  prefs: []
  type: TYPE_NORMAL
  zh: 充分利用 GPT-4 的功能来构建前沿的应用程序或 Chrome 扩展程序。无论是用于翻译语言、创建内容还是提供定制支持，制作和销售应用程序都可能是利润丰厚的业务。
- en: Marketing Campaigns
  id: totrans-511
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 营销活动
- en: GPT-4 can help you create engaging and successful marketing content. Companies
    frequently look for innovative ways to approach their marketing, which is why
    ChatGPT is a great asset. Assist businesses in increasing their reach and interaction
    by managing their marketing campaigns.
  id: totrans-512
  prefs: []
  type: TYPE_NORMAL
  zh: GPT-4 可以帮助您创建吸引人且成功的营销内容。公司经常寻找创新的方法来接近他们的营销，这就是为什么 ChatGPT 是一项宝贵的资产。通过管理他们的营销活动，帮助企业扩大其影响力和互动。
- en: Web Design
  id: totrans-513
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 网页设计
- en: Capitalize on the need for intuitive websites. For all your website needs, including
    content generation and style ideas, GPT-4 is here to help. Those sole proprietors
    and small companies looking to launch an internet presence would discover this
    service to be priceless.
  id: totrans-514
  prefs: []
  type: TYPE_NORMAL
  zh: 充分利用对直观网站的需求。对于您的所有网站需求，包括内容生成和风格灵感，GPT-4 都在这里为您提供帮助。那些寻求建立互联网存在感的个体经营者和小型公司会发现这项服务无价。
- en: Personalized AI Chatbots
  id: totrans-515
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 定制化人工智能聊天机器人
- en: Design AI chatbots that are customized to meet the needs of specific industries
    or businesses. These chatbots can provide users with dynamic and interesting conversations
    with helpful information or support thanks to GPT-4’s linguistic capabilities.
  id: totrans-516
  prefs: []
  type: TYPE_NORMAL
  zh: 设计定制化以满足特定行业或企业需求的 AI 聊天机器人。这些聊天机器人可以借助 GPT-4 的语言能力，为用户提供动态且有趣的对话，提供有用的信息或支持。
- en: Affiliate Marketing
  id: totrans-517
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 联盟营销
- en: Combine material generated by GPT-4 with affiliate marketing methods. It is
    possible to earn money from user interactions and conversions by seamlessly embedding
    affiliate links and promotions into your content.
  id: totrans-518
  prefs: []
  type: TYPE_NORMAL
  zh: 将GPT-4生成的材料与联盟营销方法相结合。通过无缝嵌入联盟链接和促销活动到你的内容中，你可以从用户互动和转化中获得收入。
- en: An Anonymous YouTube Channel
  id: totrans-519
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 匿名YouTube频道
- en: Make use of GPT-4 to create videos for an anonymous YouTube channel. Tap into
    the platform’s massive audience by exploring a wide variety of themes, from educational
    films to amusing material.
  id: totrans-520
  prefs: []
  type: TYPE_NORMAL
  zh: 利用GPT-4为匿名YouTube频道制作视频。通过探索从教育影片到娱乐内容等广泛的主题，利用平台的庞大观众群体。
- en: Snapshot of Potential Income
  id: totrans-521
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 收入潜力快照
- en: 'Much like any other business venture, the amount of money you can make with
    GPT-4 depends on the strategy you choose, how big your operations are, and how
    much value you offer. An overview of possible profits from various endeavors is
    presented here:'
  id: totrans-522
  prefs: []
  type: TYPE_NORMAL
  zh: 与任何其他商业冒险一样，你可以用GPT-4赚取的金额取决于你选择的策略、你的业务规模以及你提供的价值。以下展示了各种尝试可能带来的利润概述：
- en: '●  Freelance writing: $68,690 per year (ZipRecruiter, 2020).'
  id: totrans-523
  prefs: []
  type: TYPE_NORMAL
  zh: ●  自由写作：每年68690美元（ZipRecruiter，2020年）。
- en: '●  Social media management: Rates can vary widely, but skilled social media
    managers can earn from $50,000 to $100,000 or more annually (Habibi, 2023).'
  id: totrans-524
  prefs: []
  type: TYPE_NORMAL
  zh: ●  社交媒体管理：费用差异很大，但熟练的社交媒体经理每年可以赚取从50000美元到100000美元或更多的收入（Habibi，2023年）。
- en: '●  App or Chrome extension development: Depending on the popularity and functionality
    of the application, revenue can range from a few thousand dollars to several million
    dollars.'
  id: totrans-525
  prefs: []
  type: TYPE_NORMAL
  zh: ●  应用程序或Chrome扩展开发：根据应用程序的流行度和功能，收入可以从几千美元到几百万美元不等。
- en: '●  Marketing campaigns: Marketing professionals can earn substantial fees,
    ranging from $1,000 to $10,000 per campaign or more.'
  id: totrans-526
  prefs: []
  type: TYPE_NORMAL
  zh: ●  营销活动：营销专业人士可以赚取可观的费用，每次活动费用从1000美元到10000美元或更多。
- en: '●  Custom AI chatbots: Prices for custom chatbot development can vary, with
    businesses often willing to pay thousands of dollars for a well-designed and functional
    solution.'
  id: totrans-527
  prefs: []
  type: TYPE_NORMAL
  zh: ●  定制AI聊天机器人：定制聊天机器人开发的费用可能有所不同，企业通常愿意为设计精良且功能齐全的解决方案支付数千美元。
- en: '●  Affiliate marketing: Affiliate marketers can earn commissions ranging from
    a few dollars to hundreds or even thousands for successful conversions.'
  id: totrans-528
  prefs: []
  type: TYPE_NORMAL
  zh: ●  联盟营销：联盟营销人员可以从每次成功的转化中获得几美元到几百甚至几千美元的佣金。
- en: '●  Faceless YouTube channel: YouTube ad revenue varies, but successful channels
    can earn thousands to millions of dollars annually.'
  id: totrans-529
  prefs: []
  type: TYPE_NORMAL
  zh: ●  无名YouTube频道：YouTube广告收入各不相同，但成功的频道每年可以赚取数千到数百万美元。
- en: Taking Advantage of the Financial Opportunity
  id: totrans-530
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 利用财务机会
- en: 'You need to put some thought and strategy into taking advantage of this money
    potential with GPT-4\. To fully realize this potential, here are the first steps:'
  id: totrans-531
  prefs: []
  type: TYPE_NORMAL
  zh: 你需要思考并制定策略来利用GPT-4的这种金钱潜力。为了完全实现这一潜力，以下是第一步：
- en: '●  Gain a mastery of GPT-4: Get to know GPT-4’s ins and outs, test its features,
    and learn how to make the most of it in various situations. Get to know the features
    that work with the way you want to make money.'
  id: totrans-532
  prefs: []
  type: TYPE_NORMAL
  zh: ●  掌握GPT-4：了解GPT-4的方方面面，测试其功能，并学习如何在各种情况下充分利用它。了解那些能帮助你赚钱的功能。
- en: '●  Find your specialty: Find the market segment or field where your skills
    will be most appreciated. Whether you’re into app development, social media management,
    or content creation, being focused will make you more marketable.'
  id: totrans-533
  prefs: []
  type: TYPE_NORMAL
  zh: ●  找到你的专长：找到最能欣赏你技能的市场细分或领域。无论你是热衷于应用程序开发、社交媒体管理还是内容创作，专注会让你更具市场吸引力。
- en: '●  Develop skills: Develop your skills to enhance GPT-4’s features. If you
    want to stand out in your industry, whether it’s marketing, coding, or content
    creation, you need to constantly improve your talents.'
  id: totrans-534
  prefs: []
  type: TYPE_NORMAL
  zh: ●  提升技能：提升你的技能以增强GPT-4的功能。无论你是在市场营销、编程还是内容创作领域，如果你想在你所在的行业脱颖而出，你需要不断地提升你的才能。
- en: '●  Build a portfolio: Put together a portfolio that highlights your skills
    and work from the past. When people can see actual samples of your work, they
    are more likely to hire you or work with you.'
  id: totrans-535
  prefs: []
  type: TYPE_NORMAL
  zh: ●  建立作品集：整理一个突出你技能和过往工作的作品集。当人们能够看到你实际工作的样本时，他们更有可能雇佣你或与你合作。
- en: '●  Price your services competitively: Find out what other people are paying
    for similar services and set fair prices. Take into account the worth of what
    you’re offering and set prices that are competitive with similar products while
    also reflecting the special benefits of GPT-4.'
  id: totrans-536
  prefs: []
  type: TYPE_NORMAL
  zh: ●  竞争性定价：了解其他人支付类似服务的费用，并设定合理的价格。考虑您所提供服务的价值，并设定与类似产品具有竞争力的价格，同时反映 GPT-4 的特殊优势。
- en: '●  Network and collaborate: Network with professionals in your chosen field
    and explore collaboration opportunities. The more people you know, the more opportunities
    you’ll have to generate more money through partnerships, clients, and projects.'
  id: totrans-537
  prefs: []
  type: TYPE_NORMAL
  zh: ●  建立网络和合作：与您选择领域的专业人士建立联系，探索合作机会。您认识的人越多，您通过合作伙伴关系、客户和项目创造更多收入的机会就越多。
- en: '●  Stay updated: Never miss a beat on news about ChatGPT and associated industry
    developments. By keeping yourself informed, you can easily adjust to new features,
    discover new trends, and stay ahead of the competition.'
  id: totrans-538
  prefs: []
  type: TYPE_NORMAL
  zh: ●  保持更新：不要错过有关 ChatGPT 及相关行业发展的新闻。通过保持信息灵通，您可以轻松适应新功能，发现新趋势，并保持竞争优势。
- en: The GPT Gold Rush and Why You Need to Be Part of It
  id: totrans-539
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: GPT 矿金潮及其为何您需要成为其中一员
- en: The GPT gold rush is caused by powerful GPT models, with ChatGPT being the best
    example powered by this. The excitement and sense of urgency around the discovery
    of unrealized potential in the AI ecosystem can be summed up by the gold rush
    analogy.
  id: totrans-540
  prefs: []
  type: TYPE_NORMAL
  zh: GPT 矿金潮是由强大的 GPT 模型引起的，ChatGPT 就是其中的佼佼者，由这一模型驱动。围绕 AI 生态系统中未实现潜力的发现所引发的兴奋感和紧迫感可以用淘金潮的比喻来概括。
- en: During past gold rushes, like the California Gold Rush in the 1800s, a lot of
    people came looking for gold in areas that hadn’t been explored yet. In the same
    way, the GPT gold rush refers to a new area of technology where people, companies,
    and entrepreneurs are rushing to find out what GPT models like ChatGPT can do.
    This modern gold rush is driven by the desire to strike digital gold, which includes
    new apps and financial success.
  id: totrans-541
  prefs: []
  type: TYPE_NORMAL
  zh: 在过去如 19 世纪加利福尼亚淘金热等淘金潮中，许多人来到尚未被探索的地区寻找金子。同样，GPT 矿金潮指的是一个新技术领域，人们、公司和企业家都在急于了解
    GPT 模型如 ChatGPT 能做什么。这场现代淘金潮是由寻找数字金子的愿望驱动的，这包括新应用和财务成功。
- en: GPT models, which are powered by advanced ML methods, can understand and write
    text that sounds like it was written by a person. This ability to change things
    can be used in many areas, from making content and helping customers to making
    apps and more. In the GPT gold rush, people are taking advantage of this huge
    increase in technology to start new businesses, change fields, and make huge amounts
    of money online.
  id: totrans-542
  prefs: []
  type: TYPE_NORMAL
  zh: 由先进的机器学习方法驱动的 GPT 模型可以理解和撰写听起来像是人类所写文本。这种改变事物的能力可以应用于许多领域，从制作内容、帮助客户到开发应用等。在
    GPT 矿金潮中，人们利用这种技术的大幅增长来开展新业务、改变领域并在网上赚取大量金钱。
- en: Wondering why now is the prime time to get involved? Let’s get to the bottom
    of it!
  id: totrans-543
  prefs: []
  type: TYPE_NORMAL
  zh: 想知道为什么现在是参与的最佳时机吗？让我们一探究竟！
- en: Improvements in Technology
  id: totrans-544
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 技术改进
- en: The latest version of GPT-4 shows how quickly GPT models are changing, which
    makes it even more important to act quickly. These models are always getting better,
    which makes them better at understanding words, coming up with new ideas, and
    adapting. By taking part in the GPT gold rush, people can get the newest technologies
    and stay ahead in the technological race.
  id: totrans-545
  prefs: []
  type: TYPE_NORMAL
  zh: GPT-4 的最新版本展示了 GPT 模型变化的迅速，这使得迅速行动变得更加重要。这些模型始终在变得更好，这使得它们在理解词语、提出新想法和适应方面更加出色。通过参与
    GPT 矿金潮，人们可以获取最新技术，并在技术竞赛中保持领先。
- en: Growing User Base
  id: totrans-546
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 用户基础增长
- en: As the number of people using GPT models grows—for example, ChatGPT has 180.5
    million users around the world—so does the need for AI-driven solutions. As more
    people and businesses use these models in their daily work, there are more chances
    for service providers and business owners to serve this growing market. By getting
    involved now, you can set yourself up in a way that will help you serve the growing
    number of users.
  id: totrans-547
  prefs: []
  type: TYPE_NORMAL
  zh: 随着使用 GPT 模型的人数增加——例如，ChatGPT 在全球拥有 1.805 亿用户——对 AI 驱动解决方案的需求也在增长。随着越来越多的人和企业将这些模型融入日常工作，服务提供商和商家有更多机会服务于这个不断增长的市场。通过现在参与，您可以为自己设定一种方式，帮助您服务于不断增长的用户数量。
- en: Market Potential and Monetization
  id: totrans-548
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 市场潜力和货币化
- en: The many ways to make money that were talked about in terms of ChatGPT’s uses
    show how big the market for digital goods is in the GPT gold rush. There is a
    good chance of making a lot of money, whether you give content creation services,
    make apps, or try your hand at marketing. Early learners can become leaders in
    their fields and make the most of the many ways to make money that are available.
  id: totrans-549
  prefs: []
  type: TYPE_NORMAL
  zh: 在讨论ChatGPT用途的各种赚钱方式中，展示了在GPT淘金热中数字商品市场的巨大规模。无论是提供内容创作服务、开发应用程序，还是尝试市场营销，都有很大的机会赚很多钱。早期学习者可以成为他们领域的领导者，并充分利用各种赚钱方式。
- en: Accessibility and Democratization
  id: totrans-550
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 可访问性和民主化
- en: Making GPT models easier to get has changed the game. With OpenAI’s plans to
    offer both free and paid versions, these advanced AI features can be used by more
    people. Because AI is now more open to everyone, people with different levels
    of technical knowledge can now join the GPT gold rush. The obstacles to entry
    have been greatly dropped, making it easier for many new ideas to spread.
  id: totrans-551
  prefs: []
  type: TYPE_NORMAL
  zh: 使GPT模型更容易获取已经改变了游戏规则。随着OpenAI计划提供免费和付费版本，这些先进的AI功能可以由更多人使用。因为AI现在对每个人更加开放，不同技术水平的人现在可以加入GPT淘金热。进入门槛大大降低，使得许多新想法更容易传播。
- en: Competitive Advantage
  id: totrans-552
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 竞争优势
- en: In the fast-paced and competitive world of technology, getting an edge over
    your competitors is very important. People and companies who are part of the GPT
    gold rush are at the cutting edge of AI innovation. People who are the first to
    use new technologies, come up with new solutions, and become experts in GPT-driven
    fields have a clear economic advantage that can help them succeed in the long
    run.
  id: totrans-553
  prefs: []
  type: TYPE_NORMAL
  zh: 在技术快速发展和竞争激烈的世界中，超越竞争对手非常重要。GPT淘金热中的人和公司处于AI创新的尖端。那些首先使用新技术、提出新解决方案并成为GPT驱动领域的专家的人，拥有明显的经济优势，这有助于他们在长期内取得成功。
- en: GPT Gold Rush Success Stories From the Digital Frontier
  id: totrans-554
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 来自数字前线的GPT淘金热成功故事
- en: The GPT gold rush is picking up speed, and people from all kinds of fields are
    finding success stories by using the changing power of models like ChatGPT. In
    this new digital territory, where AI-driven innovations open the door to financial
    success, these stories show the real and profitable chances that are out there.
  id: totrans-555
  prefs: []
  type: TYPE_NORMAL
  zh: GPT淘金热正在加速，来自各个领域的人们都在通过使用ChatGPT等模型的变化力量找到成功故事。在这个新的数字领域，AI驱动的创新打开了通往财务成功的大门，这些故事展示了真正有利可图的机遇。
- en: $1,000 Monthly From Blog Content Creation
  id: totrans-556
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 从博客内容创作中获得每月1000美元
- en: Sharing their experience of using ChatGPT to compose blog posts during the GPT
    gold rush, a Reddit member helped others use the platform. This person added ChatGPT
    to their content creation process to get more done and make better content. Impressively,
    the individual was able to generate a hefty $1,000 every month as a result of
    these efforts.
  id: totrans-557
  prefs: []
  type: TYPE_NORMAL
  zh: 在GPT淘金热期间分享他们使用ChatGPT撰写博客文章的经验，一位Reddit成员帮助他人使用该平台。这个人将ChatGPT添加到他们的内容创作过程中，以完成更多工作并制作更好的内容。令人印象深刻的是，这位个人通过这些努力每月能够赚取高达1000美元。
- en: To see how ChatGPT may improve efficiency and effectiveness in content production,
    just look at this case study. The user was able to satisfy their content needs
    and turn it into a reliable source of income by utilizing ChatGPT’s language-generating
    capabilities. This story demonstrates how the GPT gold rush was really a feasible
    possibility for making money by using AI for content creation.
  id: totrans-558
  prefs: []
  type: TYPE_NORMAL
  zh: 要了解ChatGPT如何提高内容生产的效率和效果，只需看看这个案例研究。用户能够满足他们的内容需求，并通过利用ChatGPT的语言生成能力将其转化为可靠的收入来源。这个故事展示了GPT淘金热实际上是通过使用AI进行内容创作来赚钱的可行可能性。
- en: $500 Monthly From Ecommerce Product Descriptions
  id: totrans-559
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 从电子商务产品描述中获得每月500美元
- en: One more impressive success story came from a Reddit user who used ChatGPT to
    write product details for their online store. This user turned AI-generated video
    into something that could make money, and they said it was making them $500 a
    month. When it comes to meeting the needs of businesses, ChatGPT can do a lot
    of different things, from writing blog posts to writing copy for ecommerce sites.
  id: totrans-560
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个令人印象深刻的成功故事来自一位Reddit用户，他们使用ChatGPT为他们的在线商店编写产品详情。这位用户将AI生成的视频变成了可以赚钱的东西，并表示这让他们每月赚取500美元。当涉及到满足企业的需求时，ChatGPT可以完成许多不同的事情，从撰写博客文章到为电子商务网站撰写文案。
- en: That person who used ChatGPT to describe their products not only saved time
    but also made their online store ads more appealing. This success story exemplifies
    how people can find possibilities inside the larger GPT gold rush, and it also
    proves how GPT models can be applied to various business contexts.
  id: totrans-561
  prefs: []
  type: TYPE_NORMAL
  zh: 那个用 ChatGPT 描述其产品的人不仅节省了时间，还使他们的在线商店广告更具吸引力。这个成功故事展示了人们如何在 GPT 大淘金潮中找到可能性，同时也证明了
    GPT 模型可以应用于各种商业场景。
- en: In the next chapter, we look at the background of ChatGPT’s creation and the
    basics of using the software.
  id: totrans-562
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一章中，我们将探讨 ChatGPT 的创建背景和软件的基本使用方法。
- en: '| ![image](d2d_images/chapter_title_corner_decoration_left.png) |  | ![image](d2d_images/chapter_title_corner_decoration_right.png)
    |'
  id: totrans-563
  prefs: []
  type: TYPE_TB
  zh: '| ![image](d2d_images/chapter_title_corner_decoration_left.png) |  | ![image](d2d_images/chapter_title_corner_decoration_right.png)
    |'
- en: '![image](d2d_images/chapter_title_above.png)'
  id: totrans-564
  prefs: []
  type: TYPE_IMG
  zh: '![image](d2d_images/chapter_title_above.png)'
- en: 'Chapter 3: Starting From Scratch'
  id: totrans-565
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第 3 章：从头开始
- en: '![image](d2d_images/chapter_title_below.png)'
  id: totrans-566
  prefs: []
  type: TYPE_IMG
  zh: '![image](d2d_images/chapter_title_below.png)'
- en: This part takes you into the changing world of AI and tells a story that goes
    beyond conventional boundaries. We are about to start a trip through the vast
    world of digital intelligence, led by the most recent revolutionary advances in
    AI. From visionary founders to transformative models, we look at the roots, achievements,
    and dual role of an organization that has not only pushed the limits of theoretical
    research but also made AI’s transformative power available to a wide range of
    users. Come explore the complex world of AI, as I highlight the phenomenally user-friendly
    ChatGPT!
  id: totrans-567
  prefs: []
  type: TYPE_NORMAL
  zh: 这一部分将带您进入不断变化的 AI 世界，讲述一个超越传统边界的传奇故事。我们即将开始一段穿越数字智能广阔世界的旅程，由 AI 最新的革命性进展引领。从有远见的创始人到变革性的模型，我们探讨了这样一个组织的根源、成就和双重角色：它不仅推动了理论研究的前沿，还将
    AI 的变革力量带给广泛的用户。一起来探索 AI 的复杂世界，我将重点介绍现象级的用户友好的 ChatGPT！
- en: A Brief Introduction to OpenAI
  id: totrans-568
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: OpenAI 简介
- en: When it comes to AI, OpenAI is a shining example of new ideas and moral study.
    Known for its innovative models such as ChatGPT, OpenAI is more than simply a
    company; it is a forward-thinking entity with a mission to advance AI and make
    sure that everyone can profit from it. This investigation dives into OpenAI’s
    history, goals, and achievements as well as its AI-powered offerings, with an
    emphasis on the revolutionary GPT models.
  id: totrans-569
  prefs: []
  type: TYPE_NORMAL
  zh: 当谈到 AI 时，OpenAI 是新思想和道德研究的典范。以其创新模型如 ChatGPT 而闻名，OpenAI 不仅仅是一家公司；它是一个具有前瞻性思维的组织，其使命是推进
    AI 的发展，并确保每个人都能从中受益。这项调查深入探讨了 OpenAI 的历史、目标和成就，以及其 AI 驱动的产品，重点介绍了革命性的 GPT 模型。
- en: Foundations of OpenAI
  id: totrans-570
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: OpenAI 的基础
- en: 'OpenAI, which was established in December 2015 (Hashemi-Pour, n.d.), is not
    your average technology company. The organization stands out as a nonprofit AI
    research group with a distinct mission: to improve digital intelligence for the
    greater good of humanity, free from the conventional constraints of profit maximization.
    Being nonprofit enables OpenAI to focus on research that aims to improve human
    well-being rather than pursue financial gain.'
  id: totrans-571
  prefs: []
  type: TYPE_NORMAL
  zh: OpenAI 成立于 2015 年 12 月（Hashemi-Pour，n.d.），并非一家普通的技术公司。该组织以其独特的使命——为了人类更大的福祉，改善数字智能，摆脱利润最大化的传统约束——而脱颖而出。作为非营利组织，OpenAI
    能够专注于旨在改善人类福祉的研究，而不是追求经济利益。
- en: Visionary Founders
  id: totrans-572
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 有远见的创始人
- en: A lot of tech gurus worked together to start OpenAI, including Elon Musk, Sam
    Altman, Greg Brockman, Ilya Sutskever, Wojciech Zaremba, and John Schulman. These
    people got together to make an organization that would lead the way in creating
    new technologies for digital intelligence, without being limited by the need to
    make money. Elon Musk’s participation brought to the fore his forward-thinking
    views on technology and how AI might affect people.
  id: totrans-573
  prefs: []
  type: TYPE_NORMAL
  zh: 许多技术大师共同创立了 OpenAI，包括埃隆·马斯克、山姆·奥特曼、格雷格·布罗克曼、伊利亚·苏茨克维、沃伊切赫·扎伦巴和约翰·舒尔曼。这些人聚集在一起，创建了一个能够引领数字智能新技术发展的组织，而无需受制于赚钱的需求。埃隆·马斯克的参与凸显了他对技术的前瞻性观点以及
    AI 可能对人类产生的影响。
- en: Mission
  id: totrans-574
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 使命
- en: OpenAI’s aim goes beyond normal goals and is at the heart of its existence.
    OpenAI wants to make sure that AGI systems, which are smarter than humans, help
    everyone, not just a few people. This dedication shows that you recognize AI’s
    revolutionary potential and are working hard to use it ethically for the benefit
    of society.
  id: totrans-575
  prefs: []
  type: TYPE_NORMAL
  zh: OpenAI 的目标超越了普通目标，是其存在的核心。OpenAI 希望确保比人类更聪明的 AGI 系统能够帮助每个人，而不仅仅是少数人。这种奉献精神表明，你认识到
    AI 的革命性潜力，并正努力以道德的方式为社会谋福利。
- en: Contributions to the AI Landscape
  id: totrans-576
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 对人工智能领域的贡献
- en: There is no denying that OpenAI has had a huge effect on the field of AI. It
    has made groundbreaking efforts that have changed the game. For OpenAI, creating
    GPT models is a major accomplishment. These models, like GPT-3, have changed the
    way NLP is done by letting computers write text that sounds like it was written
    by a person, understand context, and do many other language-related tasks.
  id: totrans-577
  prefs: []
  type: TYPE_NORMAL
  zh: 无法否认，OpenAI 对人工智能领域产生了巨大的影响。它做出了开创性的努力，改变了游戏规则。对于 OpenAI 来说，创建 GPT 模型是一项重大成就。这些模型，如
    GPT-3，通过让计算机写出听起来像是由人写的文本、理解上下文以及执行许多其他与语言相关的任务，改变了自然语言处理的方式。
- en: GPT models are a big step forward in AI because they use pretraining methods
    to give the model a broad understanding of language. The development of GPT models,
    which have become standards for AIs to understand and create natural language,
    shows OpenAI’s dedication to highly advanced research.
  id: totrans-578
  prefs: []
  type: TYPE_NORMAL
  zh: GPT 模型是人工智能的一大步，因为它们使用预训练方法使模型对语言有广泛的理解。GPT 模型的开发，这些模型已成为人工智能理解和创建自然语言的标准，显示了
    OpenAI 对高度先进研究的承诺。
- en: OpenAI’s Dual Role
  id: totrans-579
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: OpenAI 的双重角色
- en: The domains of research are not the only ones that OpenAI explores. Not only
    does OpenAI lead the way in AI developments, but it also expands its reach through
    products and services powered by AI. By fulfilling both functions, the organization
    can help more people reap the benefits of AI by closing the gap between research
    in theory and its actual implementation.
  id: totrans-580
  prefs: []
  type: TYPE_NORMAL
  zh: OpenAI 探索的研究领域并非唯一。OpenAI 不仅在人工智能发展中走在前列，而且通过人工智能驱动的产品和服务的扩展来扩大其影响力。通过履行这两个功能，该组织可以帮助更多的人通过缩小理论与实践实施之间的差距来获得人工智能的好处。
- en: 'ChatGPT: An Exemplar of AI Accessibility'
  id: totrans-581
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: ChatGPT：人工智能可访问性的典范
- en: Among OpenAI’s AI-powered offerings, ChatGPT is a prime example of the company’s
    dedication to equal access. The ChatGPT language model allows humans to have discussions
    with AI using natural language. It demonstrates, with stunning clarity, how powerful
    AI can be used to build intuitive interfaces, opening up the advantages of AI
    to a wider audience.
  id: totrans-582
  prefs: []
  type: TYPE_NORMAL
  zh: 在 OpenAI 的基于人工智能的产品中，ChatGPT 是公司致力于平等访问的典范。ChatGPT 语言模型允许人类使用自然语言与人工智能进行对话。它以惊人的清晰度展示了人工智能如何被用来构建直观的界面，将人工智能的优势带给更广泛的受众。
- en: Model and Services for the GPT-3 Model
  id: totrans-583
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: GPT-3 模型的模型和服务
- en: OpenAI’s GPT-3 language model is the crown jewel of the AI services it offers
    to businesses and developers. An interactive platform called the GPT-3 Playground
    and a robust developer interface called the OpenAI API make GPT-3’s capabilities
    accessible to users. Innovative ideas can be explored across several industries
    with the help of these services, which enable developers to include advanced language
    processing skills in their apps.
  id: totrans-584
  prefs: []
  type: TYPE_NORMAL
  zh: OpenAI 的 GPT-3 语言模型是其向企业和开发者提供的人工智能服务的瑰宝。一个名为 GPT-3 Playground 的交互式平台和一个名为 OpenAI
    API 的强大开发者界面使 GPT-3 的功能对用户可访问。借助这些服务，开发者可以在多个行业中探索创新想法，这些服务使开发者能够在他们的应用程序中包含高级语言处理技能。
- en: The Effects of OpenAI on the AI Industry’s Moral Framework
  id: totrans-585
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: OpenAI 对人工智能行业道德框架的影响
- en: The impact of OpenAI on the ethical climate of AI extends far beyond its technical
    accomplishments. OpenAI sets an example for ethical behavior in the AI research
    community by staying true to its nonprofit model and focusing on the responsible
    growth of AGI. The organization works to make AI research more open, accountable,
    and safe, addressing worries about bias, safety, and how advanced AI systems will
    affect society.
  id: totrans-586
  prefs: []
  type: TYPE_NORMAL
  zh: OpenAI 对人工智能伦理气候的影响远远超出了其技术成就。OpenAI 通过坚持其非营利模式并专注于通用人工智能（AGI）的负责任增长，为人工智能研究社区树立了道德行为的典范。该组织致力于使人工智能研究更加开放、透明和安全，解决关于偏见、安全以及高级人工智能系统如何影响社会的担忧。
- en: Challenges and Considerations in OpenAI’s Journey
  id: totrans-587
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: OpenAI 旅程中的挑战和考虑
- en: Even though OpenAI has accomplished a lot, it hasn’t been an easy journey. As
    AI develops, the organization must constantly weigh the ethical implications,
    risks of abuse, and the need to ensure that AI serves the greater good of all
    people. Maintaining a delicate equilibrium between pushing the limits of AI research
    and ethical concerns is an ongoing challenge for OpenAI.
  id: totrans-588
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管 OpenAI 取得了许多成就，但这条路并不容易。随着人工智能的发展，该组织必须不断权衡伦理影响、滥用的风险以及确保人工智能服务于所有人的更大福祉的需要。在推动人工智能研究极限和伦理关注之间保持微妙的平衡是
    OpenAI 面临的持续挑战。
- en: Fundamentally, OpenAI is a leader in AI, with a mission to use AI for good.
    In an environment where business drives most decisions, it stands out due to its
    nonprofit status, forward-thinking founders, and dedication to ethically doing
    research. AI can improve people’s lives, and OpenAI’s work, especially the GPT
    models, has shown this.
  id: totrans-589
  prefs: []
  type: TYPE_NORMAL
  zh: 基本上，OpenAI是AI的领导者，其使命是利用AI做好事。在一个商业驱动大多数决策的环境中，它因其非营利地位、前瞻性的创始人以及对道德研究的承诺而脱颖而出。AI可以改善人们的生活，OpenAI的工作，特别是GPT模型，已经证明了这一点。
- en: OpenAI takes a comprehensive approach to expanding the boundaries of AI since
    it is both a research organization and a distributor of products driven by AI.
    As ChatGPT shows, OpenAI isn’t only about expanding the frontiers of theoretical
    study; it’s also about ensuring that people from all walks of life have access
    to AI’s revolutionary potential.
  id: totrans-590
  prefs: []
  type: TYPE_NORMAL
  zh: OpenAI采取全面的方法来扩展AI的边界，因为它既是一个研究机构，也是一个由AI驱动的产品分销商。正如ChatGPT所展示的，OpenAI不仅关于扩展理论研究的前沿，还关于确保各行各业的人都能接触到AI的革命性潜力。
- en: Not only will the code that OpenAI develops be an important part of the story
    of AI in the future, but so will the good it hopes to do. The path to AGI is long
    and winding, but with pioneers like OpenAI leading the charge, we may look forward
    to a future where AI seamlessly weaves into human development.
  id: totrans-591
  prefs: []
  type: TYPE_NORMAL
  zh: 不仅OpenAI开发的代码将是未来AI故事的重要组成部分，它希望带来的好处也将如此。通往通用人工智能（AGI）的道路漫长而曲折，但有了像OpenAI这样的先驱引领，我们可能期待一个AI无缝融入人类发展的未来。
- en: How to Access ChatGPT
  id: totrans-592
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 如何访问ChatGPT
- en: Starting your journey with ChatGPT is a smooth process that makes it easy for
    users to use this advanced language model’s features. Here is a quick guide on
    how to get to ChatGPT and use normal language to communicate.
  id: totrans-593
  prefs: []
  type: TYPE_NORMAL
  zh: 开始您的ChatGPT之旅是一个顺畅的过程，使用户能够轻松使用这个高级语言模型的功能。以下是如何到达ChatGPT和使用正常语言进行交流的快速指南。
- en: 'Open your web browser: First, open your favorite online browser to start using
    ChatGPT. It doesn’t matter if you like Chrome, Firefox, Safari, or any other browser—just
    open it to move on to the next step.'
  id: totrans-594
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 打开您的网络浏览器：首先，打开您喜欢的在线浏览器以开始使用ChatGPT。无论您喜欢Chrome、Firefox、Safari还是任何其他浏览器，只需打开它，然后继续下一步。
- en: 'Navigate to OpenAI’s ChatGPT website: In the address bar of your computer,
    type or copy the following URL:'
  id: totrans-595
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 导航到OpenAI的ChatGPT网站：在您的计算机地址栏中，输入或复制以下URL：
- en: www.openai.com/chatgpt
  id: totrans-596
  prefs: []
  type: TYPE_NORMAL
  zh: www.openai.com/chatgpt
- en: This will take you straight to OpenAI’s ChatGPT website, where the trip starts.
  id: totrans-597
  prefs: []
  type: TYPE_NORMAL
  zh: 这将直接带您到OpenAI的ChatGPT网站，您的旅程从这里开始。
- en: 'Sign up for an account: Before you can use ChatGPT’s talking features, you’ll
    need to make an account. The registration button on the website is generally called
    “Sign Up” or “Register.” After you click on it, an easy-to-use form will ask you
    for your information.'
  id: totrans-598
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 注册账户：在您可以使用ChatGPT的语音功能之前，您需要创建一个账户。网站上的注册按钮通常称为“注册”或“注册。”点击它后，一个易于使用的表单将要求您提供信息。
- en: 'Verify your email: OpenAI will send a verification email to the address you
    gave after you fill out the signup form. Go to your email account and look for
    the verification message. To confirm and start using your account, click on the
    link in the email that asks you to verify your identity.'
  id: totrans-599
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 验证您的电子邮件：在您填写注册表单后，OpenAI将向您提供的地址发送验证电子邮件。请访问您的电子邮件账户，寻找验证消息。为了确认并开始使用您的账户，请点击电子邮件中的链接，该链接要求您验证您的身份。
- en: 'Log in to your account: Now that your email has been checked, go back to the
    OpenAI website.'
  id: totrans-600
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 登录您的账户：现在您的电子邮件已经验证，请返回OpenAI网站。
- en: www.openai.com
  id: totrans-601
  prefs: []
  type: TYPE_NORMAL
  zh: www.openai.com
- en: Find the “Log In” or “Sign In” button. Type in your email address and password
    that you used to sign up for an account to get into your ChatGPT account.
  id: totrans-602
  prefs: []
  type: TYPE_NORMAL
  zh: 找到“登录”或“签到”按钮。输入您用于注册账户的电子邮件地址和密码，以进入您的ChatGPT账户。
- en: 'Explore ChatGPT’s features: Congratulations! You’ve successfully accessed ChatGPT.
    You can now discover the world of AI that can talk to you. Start by interacting
    with the model typing questions and getting a feel for how natural language interactions
    work. ChatGPT is made to react based on the situation, making the experience dynamic
    and easy to use.'
  id: totrans-603
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 探索ChatGPT的功能：恭喜！您已成功访问ChatGPT。现在您可以探索可以与您交谈的AI世界。开始通过向模型提问并与自然语言交互的感觉互动。ChatGPT旨在根据情况做出反应，使体验动态且易于使用。
- en: 'Get creative and communicative: Feel free to try out different themes and questions
    as you move around ChatGPT. ChatGPT is here to help you with creative writing,
    find information about a wide range of topics, or just have a casual chat. The
    model’s flexibility and depth of understanding will become clear as you work with
    it more.'
  id: totrans-604
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 发挥创意和沟通能力：在ChatGPT中移动时，请随意尝试不同的主题和问题。ChatGPT旨在帮助您进行创意写作，查找关于广泛主题的信息，或者只是进行轻松聊天。随着您与它的更多合作，模型的灵活性和理解深度将变得清晰。
- en: 'Stay informed about updates: Watch out for OpenAI’s news and statements. The
    field of AI is always changing, and OpenAI is always adding new tools and making
    improvements to ChatGPT. You can make the most of the latest changes to this conversational
    AI tool by staying up-to-date.'
  id: totrans-605
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 关注更新：关注OpenAI的新闻和声明。AI领域总是在变化，OpenAI总是在添加新工具并对ChatGPT进行改进。通过保持最新，您可以充分利用这个对话AI工具的最新变化。
- en: With just a few easy steps, you can access ChatGPT, an amazing AI tool made
    to make exchanges smooth and natural. ChatGPT is a flexible tool that can be used
    for anything from coming up with ideas to asking for information. Now, go ahead
    and look into the life-changing options that ChatGPT has to offer for yourself!
  id: totrans-606
  prefs: []
  type: TYPE_NORMAL
  zh: 只需几个简单的步骤，您就可以访问ChatGPT，这是一个旨在使交流流畅自然的惊人AI工具。ChatGPT是一个灵活的工具，可用于从想出想法到获取信息等任何事情。现在，请自行探索ChatGPT提供的改变生活的选项！
- en: Simple Prompts to Test
  id: totrans-607
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 简单的提示进行测试
- en: A prompt tells the AI what to say next, which determines how you connect with
    it. A prompt, which could be a question, an order, or even some information, is
    the language key that lets this conversational AI do all of its amazing things.
    It’s important to understand how important a well-written prompt is because it
    directly affects the quality and depth of the answers you get.
  id: totrans-608
  prefs: []
  type: TYPE_NORMAL
  zh: 提示告诉AI接下来要说的话，这决定了您如何与之连接。提示，可能是问题、命令甚至一些信息，是让这个对话AI做所有神奇事情的语言密钥。理解一个精心编写的提示的重要性很重要，因为它直接影响到您得到的答案的质量和深度。
- en: What you ask the chatbot are called “prompts.” Even though it sounds easy, the
    key to directing the AI’s output is asking the right questions. Given its proficiency
    in NLP, ChatGPT is capable of providing excellent responses to queries regarding
    virtually any topic imaginable, so long as they do not infringe upon OpenAI’s
    content guideline, which prohibits questions pertaining to violence, bigotry,
    and similar topics.
  id: totrans-609
  prefs: []
  type: TYPE_NORMAL
  zh: 您向聊天机器人提出的问题被称为“提示”。尽管听起来很简单，但引导AI输出的关键在于提出正确的问题。鉴于其在NLP方面的熟练程度，ChatGPT能够对几乎所有可想象的主题的查询提供出色的回应，只要它们不违反OpenAI的内容指南，该指南禁止涉及暴力、偏见和类似主题的问题。
- en: 'With the correct set of questions, you can direct the discussion toward particular
    subjects, try out different ideas, or even ask for help with writing, brainstorming,
    or solving problems. There are no limits to what you can ask it to do: make people
    more aware of your brand in an ad campaign, come up with key messages for your
    audience, write explanations for hard topics, include personal tales in stories,
    or make a text-based adventure game.'
  id: totrans-610
  prefs: []
  type: TYPE_NORMAL
  zh: 使用正确的问题集，您可以引导讨论走向特定主题，尝试不同的想法，甚至请求在写作、头脑风暴或解决问题方面的帮助。您可以向它提出任何要求，没有限制：在广告活动中提高人们对您品牌的认识，为您的受众想出关键信息，为复杂话题撰写解释，将个人故事融入故事中，或者制作基于文本的冒险游戏。
- en: Mastering the Art of ChatGPT Prompts
  id: totrans-611
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 掌握ChatGPT提示的艺术
- en: To get the most out of this chatbot, ChatGPT requires a dynamic approach based
    on the capacity to create intelligent prompts, run insightful tests, and understand
    the results. Here, we’ll go over everything you need to know to create prompts
    that make an impression, why it’s important to test several versions of an interaction,
    and how to create examples that always work.
  id: totrans-612
  prefs: []
  type: TYPE_NORMAL
  zh: 为了充分利用这个聊天机器人，ChatGPT需要一种基于创建智能提示、运行有洞察力的测试和理解结果的能力的动态方法。在这里，我们将介绍您需要了解的关于创建给人留下深刻印象的提示的所有内容，为什么测试多个版本的交互很重要，以及如何创建始终有效的例子。
- en: Crafting Simple, Effective Prompts
  id: totrans-613
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 精心打造简单有效的提示
- en: 'Effective prompting is an art that balances clarity, specificity, and context.
    A well-crafted prompt serves as a roadmap, guiding ChatGPT to deliver responses
    that align with your intentions. Important things to keep in mind when making
    prompts are:'
  id: totrans-614
  prefs: []
  type: TYPE_NORMAL
  zh: 有效的提示是一种平衡清晰度、具体性和上下文的艺术。一个精心制作的提示就像一张路线图，引导ChatGPT提供与您的意图相符的回应。在制作提示时需要记住的重要事项包括：
- en: '●  Clarity and simplicity: Be as explicit and direct as possible when expressing
    your questions or needs. To make sure the AI understands your goal correctly,
    try to avoid vagueness.'
  id: totrans-615
  prefs: []
  type: TYPE_NORMAL
  zh: ●  清晰和简洁：在表达你的问题或需求时尽可能明确和直接。为了确保AI正确理解你的目标，尽量避免含糊不清。
- en: '●  Specify context: Give your prompts some background. If your question is
    about a certain business, situation, or setting, be sure to include those details.
    This helps ChatGPT produce more accurate and situationally relevant replies.'
  id: totrans-616
  prefs: []
  type: TYPE_NORMAL
  zh: ●  明确上下文：给你的提示提供一些背景信息。如果你的问题是关于某个商业、情况或环境，确保包括这些细节。这有助于ChatGPT生成更准确和情境相关的回复。
- en: '●  Question phrasing: Asking questions framed as prompts can help you get more
    information. Control the AI’s output with directive statements when you need it
    to be innovative. Find the most successful method by experimenting with alternative
    phrasings.'
  id: totrans-617
  prefs: []
  type: TYPE_NORMAL
  zh: ●  问题的措辞：以提示的形式提问可以帮助你获取更多信息。当需要AI创新时，使用指令性语句控制AI的输出。通过实验不同的措辞来找到最成功的方法。
- en: '●  Take a shot at length: Although brief instructions are usually enough, further
    background information could be helpful for certain jobs. Try out different prompt
    lengths until you discover the one that works best for your needs.'
  id: totrans-618
  prefs: []
  type: TYPE_NORMAL
  zh: ●  尝试不同的长度：尽管简短的指令通常足够，但对于某些任务，更多的背景信息可能有所帮助。尝试不同的提示长度，直到找到最适合你需求的一个。
- en: Fine-Tuning Interactions for Best Results
  id: totrans-619
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 调整交互以获得最佳结果
- en: 'One important thing you can do to improve how you use ChatGPT is to try out
    different tasks. By trying out different questions over and over, you can learn
    what the model can do and then change your queries to get better results. A methodical
    way to run tests is shown below:'
  id: totrans-620
  prefs: []
  type: TYPE_NORMAL
  zh: 提高你使用ChatGPT的方式的一个重要方法就是尝试不同的任务。通过反复尝试不同的问题，你可以了解模型能做什么，然后改变你的查询以获得更好的结果。以下是一个运行测试的有序方法：
- en: '●  Start with baseline prompts: Start by asking simple, general questions to
    get a sense of what the norm is. This gives you a chance to test ChatGPT’s normal
    behavior and learn how it reacts in a neutral setting.'
  id: totrans-621
  prefs: []
  type: TYPE_NORMAL
  zh: ●  从基线提示开始：先提出简单、一般的问题，以了解正常情况。这给了你测试ChatGPT正常行为和在正常环境下的反应的机会。
- en: '●  Iterate and refine: Based on the first results, you can change or add to
    your prompts to make them more detailed. Change one thing at a time to see how
    each change affects the quality of the answers.'
  id: totrans-622
  prefs: []
  type: TYPE_NORMAL
  zh: ●  迭代和细化：根据第一次结果，你可以更改或添加提示，使其更详细。一次改变一个因素，看看每个变化如何影响答案的质量。
- en: '●  Explore different task types: Try out different prompts for different kinds
    of tasks, like finding knowledge and writing creatively. This lets you find out
    what the model does well and not so well in different areas.'
  id: totrans-623
  prefs: []
  type: TYPE_NORMAL
  zh: ●  探索不同的任务类型：尝试不同类型的任务的不同提示，如寻找知识和创造性写作。这让你可以了解模型在不同领域的表现如何。
- en: '●  Consider prompt engineering: Use methods for prompt engineering, like giving
    examples or telling the model to think in steps. These strategies can help the
    model do better at certain jobs.'
  id: totrans-624
  prefs: []
  type: TYPE_NORMAL
  zh: ●  考虑提示工程：使用提示工程的方法，如提供示例或告诉模型分步骤思考。这些策略可以帮助模型在某些任务上做得更好。
- en: '●  Evaluate context handling: Check to see how well ChatGPT keeps track of
    the conversation’s context as it goes around the room. Making prompts that refer
    to previous messages helps keep conversations on track and current.'
  id: totrans-625
  prefs: []
  type: TYPE_NORMAL
  zh: ●  评估上下文处理：检查ChatGPT在房间内移动时跟踪对话上下文的能力。制作引用先前信息的提示有助于使对话保持轨道和当前状态。
- en: Interpreting Outcomes
  id: totrans-626
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 解释结果
- en: 'To interpret results, you have to look at the answers that ChatGPT gave you
    and find patterns, strengths, and places where you can improve. When judging results,
    think about the following:'
  id: totrans-627
  prefs: []
  type: TYPE_NORMAL
  zh: 为了解释结果，你必须查看ChatGPT给出的答案，并寻找模式、优势和你可以改进的地方。在评估结果时，考虑以下因素：
- en: '●  Relevance to the prompt: Check to see if the answers directly answer the
    questions. Think about how relevant and consistent the information given is.'
  id: totrans-628
  prefs: []
  type: TYPE_NORMAL
  zh: ●  提示的相关性：检查答案是否直接回答了问题。思考提供的信息的相关性和一致性。
- en: '●  Understanding in context: Check out how well ChatGPT understands and keeps
    track of the conversation’s background. Responses that work should build on what
    was said before and be aware of the situation.'
  id: totrans-629
  prefs: []
  type: TYPE_NORMAL
  zh: ●  在上下文中理解：检查ChatGPT理解和跟踪对话背景的能力。有效的回复应该建立在之前所说的基础上，并意识到情况。
- en: '●  Creativity and adaptability: For creative projects, test the model’s ability
    to come up with creative content that fits the task. The AI should be encouraged
    to be creative and flexible by a strong prompt.'
  id: totrans-630
  prefs: []
  type: TYPE_NORMAL
  zh: ●  创造力和适应性： 对于创意项目，测试模型生成符合任务要求的创意内容的能力。通过强有力的提示鼓励AI具有创造性和灵活性。
- en: '●  Correctness and accuracy: Check to see if the facts that ChatGPT gives you
    are correct. The AI should be able to give correct and reliable answers by being
    given prompts that put accuracy first.'
  id: totrans-631
  prefs: []
  type: TYPE_NORMAL
  zh: ●  正确性和准确性：检查ChatGPT给出的信息是否正确。通过给出将准确性放在首位的提示，AI应该能够提供正确和可靠的答案。
- en: Examples of Proven Prompts
  id: totrans-632
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 有效的提示示例
- en: 'Just to show what we’ve been talking about, here are some examples of prompts
    that have worked well in the past to get good answers from ChatGPT:'
  id: totrans-633
  prefs: []
  type: TYPE_NORMAL
  zh: 只为展示我们一直在讨论的内容，以下是一些过去在ChatGPT中有效获取良好答案的提示示例：
- en: '●  Information retrieval:'
  id: totrans-634
  prefs: []
  type: TYPE_NORMAL
  zh: ●  信息检索：
- en: '○  Baseline prompt: “Tell me about the history of artificial intelligence.”'
  id: totrans-635
  prefs: []
  type: TYPE_NORMAL
  zh: ○  基准提示： “告诉我人工智能的历史。”
- en: '○  Refined prompt: “Provide a concise overview of the development milestones
    in the field of artificial intelligence, highlighting key breakthroughs and influential
    figures.”'
  id: totrans-636
  prefs: []
  type: TYPE_NORMAL
  zh: ○  精炼提示： “提供人工智能领域发展里程碑的简洁概述，突出关键突破和有影响力的人物。”
- en: '●  Creative writing:'
  id: totrans-637
  prefs: []
  type: TYPE_NORMAL
  zh: ●  创意写作：
- en: '○  Baseline prompt: “Write a short story about a mysterious island.”'
  id: totrans-638
  prefs: []
  type: TYPE_NORMAL
  zh: ○  基准提示： “写一个关于神秘岛屿的短篇小说。”
- en: '○  Refined prompt: “Craft an engaging short story set on a mysterious island,
    incorporating elements of suspense, exploration, and unexpected discoveries.”'
  id: totrans-639
  prefs: []
  type: TYPE_NORMAL
  zh: ○  精炼提示： “创作一个设定在神秘岛屿上的引人入胜的短篇小说，融入悬疑、探险和意外发现等元素。”
- en: '●  Problem-solving:'
  id: totrans-640
  prefs: []
  type: TYPE_NORMAL
  zh: ●  问题解决：
- en: '○  Baseline prompt: “Help me brainstorm ideas for a new mobile app.”'
  id: totrans-641
  prefs: []
  type: TYPE_NORMAL
  zh: ○  基准提示： “帮助我构思一个新移动应用的想法。”
- en: '○  Refined prompt: “Generate innovative concepts for a mobile app focused on
    enhancing productivity, considering user-friendly features and potential market
    demand.”'
  id: totrans-642
  prefs: []
  type: TYPE_NORMAL
  zh: ○  精炼提示： “为专注于提高生产力的移动应用生成创新概念，考虑用户友好功能和潜在市场需求。”
- en: '●  Technical assistance:'
  id: totrans-643
  prefs: []
  type: TYPE_NORMAL
  zh: ●  技术支持：
- en: '○  Baseline prompt: “Explain the process of setting up a secure VPN.”'
  id: totrans-644
  prefs: []
  type: TYPE_NORMAL
  zh: ○  基准提示： “解释设置安全VPN的过程。”
- en: '○  Refined prompt: “Provide step-by-step instructions for configuring a secure
    VPN, emphasizing best practices for encryption and network protection.”'
  id: totrans-645
  prefs: []
  type: TYPE_NORMAL
  zh: ○  精炼提示： “提供配置安全VPN的逐步说明，强调加密和网络保护的最佳实践。”
- en: '●  Interactive fiction:'
  id: totrans-646
  prefs: []
  type: TYPE_NORMAL
  zh: ●  交互式小说：
- en: '○  Baseline prompt: “Create a dialogue between two characters in a futuristic
    setting.”'
  id: totrans-647
  prefs: []
  type: TYPE_NORMAL
  zh: ○  基准提示： “创作一个设定在未来背景下的两个角色之间的对话。”
- en: '○  Refined prompt: “Compose a dialogue between a curious explorer and an AI
    companion in a futuristic world, exploring themes of technological advancement
    and human-machine interaction.”'
  id: totrans-648
  prefs: []
  type: TYPE_NORMAL
  zh: ○  精炼提示： “在一个未来世界中，创作一个好奇的探险家和AI伴侣之间的对话，探讨技术进步和人类-机器交互的主题。”
- en: 'Here are 10 additional examples of proven prompts that have demonstrated effectiveness
    in eliciting insightful and useful responses from ChatGPT:'
  id: totrans-649
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是10个额外的有效提示示例，这些提示已证明在从ChatGPT获取有洞察力和有用的回答方面是有效的：
- en: '●  Industry-specific insight: “Share key trends and challenges in the renewable
    energy sector, focusing on technological advancements and their impact on sustainability.”'
  id: totrans-650
  prefs: []
  type: TYPE_NORMAL
  zh: ●  行业特定见解： “分享可再生能源领域的关键趋势和挑战，重点关注技术进步及其对可持续性的影响。”
- en: '●  Content ideation: “Generate unique ideas for blog posts in the fitness niche,
    emphasizing current trends, motivational content, and practical workout tips.”'
  id: totrans-651
  prefs: []
  type: TYPE_NORMAL
  zh: ●  内容构思： “为健身领域的博客文章生成独特想法，强调当前趋势、励志内容和实用的锻炼技巧。”
- en: '●  Programming assistance: “Provide a step-by-step guide for troubleshooting
    common errors in Python programming, with an emphasis on debugging best practices.”'
  id: totrans-652
  prefs: []
  type: TYPE_NORMAL
  zh: ●  编程辅助： “提供解决Python编程中常见错误的逐步指南，重点在于调试最佳实践。”
- en: '●  Historical perspective: “Explore the historical significance of a pivotal
    event in the 20th century, analyzing its global impact and lasting implications.”'
  id: totrans-653
  prefs: []
  type: TYPE_NORMAL
  zh: ●  历史视角： “探讨20世纪一个关键事件的历史意义，分析其全球影响和持久影响。”
- en: '●  Philosophical inquiry: “Engage in a philosophical discussion about the nature
    of consciousness, exploring different perspectives on the mind-body problem and
    theories of self-awareness.”'
  id: totrans-654
  prefs: []
  type: TYPE_NORMAL
  zh: ●  哲学探究： “参与关于意识本质的哲学讨论，探讨关于身心问题的不同观点和自我意识理论。”
- en: '●  Marketing strategy: “Develop a comprehensive marketing strategy for a small
    ecommerce business, considering digital channels, customer engagement, and brand
    positioning.”'
  id: totrans-655
  prefs: []
  type: TYPE_NORMAL
  zh: ●  市场营销策略： “为一家小型电子商务业务制定全面的营销策略，考虑数字渠道、客户参与和品牌定位。”
- en: '●  Language translation: “Translate a short paragraph from English to Spanish,
    maintaining clarity and cultural nuances in the translated text.”'
  id: totrans-656
  prefs: []
  type: TYPE_NORMAL
  zh: ●  语言翻译： “将一段简短的英文段落翻译成西班牙语，保持译文清晰并保留文化细微差别。”
- en: '●  Educational content creation: “Craft engaging content for a high school
    physics lesson on the principles of electromagnetism, incorporating real-world
    examples and interactive demonstrations.”'
  id: totrans-657
  prefs: []
  type: TYPE_NORMAL
  zh: ●  教育内容创作： “为高中物理课程制作关于电磁学原理的引人入胜的内容，结合现实世界例子和互动演示。”
- en: '●  Medical information synthesis: “Compile a summary of recent advancements
    in cancer research, highlighting breakthrough treatments and their potential impact
    on patient outcomes.”'
  id: totrans-658
  prefs: []
  type: TYPE_NORMAL
  zh: ●  医学信息综合： “总结癌症研究领域的最新进展，突出突破性治疗及其对患者预后的潜在影响。”
- en: '●  Scenario exploration: “Imagine a future society where AI plays a central
    role in governance. Describe the positive and negative implications of such a
    scenario on individual freedoms and societal structures.”'
  id: totrans-659
  prefs: []
  type: TYPE_NORMAL
  zh: ●  场景探索： “想象一个未来社会，其中AI在治理中扮演核心角色。描述这种场景对个人自由和社会结构的积极和消极影响。”
- en: The coming chapter will focus solely on the prompt engineering discussion, from
    the basics to more technical aspects.
  id: totrans-660
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来的章节将专注于prompt engineering的讨论，从基础知识到更技术性的方面。
