- en: So, What Exactly Is ChatGPT and Why Do I Need to Use the OpenAI APIs?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Simply stated, ChatGPT is a group of **language models** (which are the result
    of training deep learning algorithms) developed by OpenAI that is capable of generating
    human-like text responses based on given **prompts**. So what’s a prompt? A prompt
    is simply the input text that you give to ChatGPT. So let’s kick things off by
    giving ChatGPT a prompt to ask how well it’s familiar with Java design patterns
    (Listing [1-1](#PC1)).Describe 3 commonly used design patterns used by Java developers
    and why those patterns are importantListing 1-1
  prefs: []
  type: TYPE_NORMAL
- en: PROMPT. A Simple Prompt with ChatGPT About Java Design Patterns
  prefs: []
  type: TYPE_NORMAL
- en: 'If you’ve had the opportunity to work at a company using Java professionally,
    then you’ve probably received a question very similar to the prompt above in an
    interview. Listing [1-2](#PC2) is ChatGPT’s response.![](../images/607613_1_En_1_Chapter/607613_1_En_1_Figb_HTML.gif)The
    chat G P T logo.Certainly! Design patterns are reusable solutions to common problems
    that arise in software design. They are best practices that experienced developers
    have discovered and refined over time. Java developers frequently utilize design
    patterns due to the language''s object-oriented nature. Here are three commonly
    used design patterns in Java:1\. Singleton Pattern:   - Purpose: This pattern
    ensures that a class has only one instance and provides a global point of access
    to that instance. It''s particularly useful when you want to control access to
    shared resources, such as configuration managers or connection pools.   - Importance:
    The Singleton pattern is important because it provides a controlled mechanism
    to prevent creating multiple instances of a class, which can save memory and synchronize
    access to resources. Moreover, it ensures that operations using the singleton
    are using the same instance and data, which is critical in scenarios where consistent
    state or coordinated actions are required.2\. Observer Pattern:   - Purpose: This
    pattern defines a one-to-many dependency between objects. When one object (known
    as the subject or observable) changes its state, all of its dependents (observers)
    are notified and updated automatically. It''s the underlying principle behind
    the Model-View-Controller (MVC) architecture, where the model is the subject and
    the views are observers.   - Importance: The Observer pattern is vital for building
    systems that are modular and decoupled. Changes in one part of the system don''t
    directly affect others, allowing for easier maintenance and scalability. This
    pattern also makes it easier to add new observers without modifying existing code,
    enhancing the system''s extensibility.3\. Factory Pattern:   - Purpose: The Factory
    pattern provides an interface for creating instances of a class, but it''s up
    to the derived subclasses to implement the method and determine which class to
    instantiate. It promotes the loose coupling by eliminating the need to bind application-specific
    classes into the code. Instead, the code interacts only with the resulting interface
    or abstract class, so the system can evolve without altering the calling code.   -
    Importance: Using the Factory pattern, a system can be more flexible and scalable.
    If there''s a need to introduce a new product or modify an existing one, it can
    be done without disturbing the existing code. It encapsulates the object creation
    process and separates it from the main logic of the program, promoting the Single
    Responsibility Principle. This ensures that a class is only responsible for one
    reason to change.All these patterns, and many more, provide a vocabulary for developers,
    making it easier to communicate complex software designs and concepts. They embody
    solutions to recurring problems and can significantly speed up the development
    process, reduce errors, and improve code quality.Listing 1-2'
  prefs: []
  type: TYPE_NORMAL
- en: RESPONSE. ChatGPT’s Response to the Prompt in Listing [1-1](#PC1)
  prefs: []
  type: TYPE_NORMAL
- en: Not bad, huh? ChatGPT was not only able to provide a list of common design patterns
    used by Java developers, but also explain valid reasons on why they are important
    – all done in Natural Language.
  prefs: []
  type: TYPE_NORMAL
- en: So, at the end of the day, what does this mean for Java developers? Well, it’s
    actually a big deal. That’s because developers are now able to create applications
    that can have some type of “understanding” of text in Natural Language. Before
    the advent of AI tools like ChatGPT, developers typically had to create regular
    expressions (also called “regex”) in order to perform rudimentary character and
    String pattern matching within a body of text. However, pattern matching and Natural
    Language Understanding are two totally different things.
  prefs: []
  type: TYPE_NORMAL
- en: 'Regex vs. ChatGPT: Fight!'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '**Note**'
  prefs: []
  type: TYPE_NORMAL
- en: If you already know that a regular expression can’t perform Natural Language
    Understanding or sentiment analysis, then feel free to skip this section.
  prefs: []
  type: TYPE_NORMAL
- en: I’m thoroughly convinced that every programmer somewhere in their lifetime has
    met *some guy* who happens to be an expert in writing regular expressions. Regular
    expressions are great because they serve the purpose of being able to parse large
    amounts of text in order to find patterns within the text programmatically.
  prefs: []
  type: TYPE_NORMAL
- en: However, one of the biggest downsides to regular expressions is that once they
    have been written, they are extremely difficult to read (in my opinion, even by
    the developer who originally wrote it).
  prefs: []
  type: TYPE_NORMAL
- en: So let’s see how regex holds up against ChatGPT, which has Natural Language
    Processing (NLP) and Natural Language Understanding (NLU) capabilities.
  prefs: []
  type: TYPE_NORMAL
- en: 'Listing [1-3](#PC3) is a story of an impractically sad situation. However,
    it drives home the point that although regular expressions can be used to find
    words and phrases within a body of text, it can’t be used to provide any type
    of NLU.In the city of Buttersville,USA on Milkmaid street, there’s a group of
    three friends: Marion Yogurt, Janelle de Queso, and Steve Cheeseworth III. On
    a hot summer’s day, they heard the music from an ice cream truck, and decided
    to buy something to eat.Marion likes strawberries, Janelle prefers chocolate,
    and Steve is lactose intolerant. That day, only two kids ate ice cream, and one
    of them bought a bottle of room-temperature water. The ice cream truck was fully
    stocked with the typical flavors of ice cream.Listing 1-3'
  prefs: []
  type: TYPE_NORMAL
- en: Sadstory.txt - A Sad Story About a Kid Who Didn’t Eat Ice Cream
  prefs: []
  type: TYPE_NORMAL
- en: 'Analysis Question #1: Who Didn’t Get Any Ice Cream and Why?'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Now let’s analyze this for a bit and ask some questions among ourselves. First
    of all, who didn’t get any ice cream and why? The obvious answer is that Steve
    did not get any ice cream because of his lactose intolerance. However, since the
    story did not directly say that Steve did not buy ice cream, there’s no way for
    a regular expression to match a text pattern in the story.
  prefs: []
  type: TYPE_NORMAL
- en: The regular expression could look for keywords such as “didn’t have,” “no ice
    cream,” or the names of the kids. However, it would only be able to provide a
    response based on the presence of these patterns. For example, if the regular
    expression matches the pattern “didn’t have” or “no ice cream” with Steve’s name,
    it could show you the result of the text pattern. However, it certainly wouldn’t
    be able to explain **why** Steve was the one who didn’t have ice cream or provide
    any context-specific reasoning.
  prefs: []
  type: TYPE_NORMAL
- en: 'Now, let’s provide the same story to ChatGPT and ask the question, “Who didn’t
    get any ice cream?” Listing [1-4](#PC4) takes our question and the preceding story
    and puts both together as a prompt.Using the information in the following story,
    who didn''t get any ice cream and why?###In the city of Buttersville,USA on Milkmaid
    street, there’s a group of three friends: Marion Yogurt, Janelle de Queso, and
    Steve Cheeseworth III. On a hot summer’s day, they heard the music from an ice
    cream truck, and decided to buy something to eat.Marion likes strawberries, Janelle
    prefers chocolate, and Steve is lactose intolerant. That day, only two kids ate
    ice cream, and one of them bought a bottle of room-temperature water. The ice
    cream truck was fully stocked with the typical flavors of ice cream.Listing 1-4'
  prefs: []
  type: TYPE_NORMAL
- en: PROMPT. The Sad Story Put into a Prompt
  prefs: []
  type: TYPE_NORMAL
- en: Notice how it is a best practice to provide some type of separation, in this
    case, “###”, when creating a prompt (like the one above) where you have both instructions
    and data together. Later on, when we start using either the Playground or Java
    to programmatically invoke the ChatGPT API, you’ll see that there’s a much better
    way to provide that separation.
  prefs: []
  type: TYPE_NORMAL
- en: So, after sending the prompt, ChatGPT will provide you an answer as shown in
    Listing [1-5](#PC5).![](../images/607613_1_En_1_Chapter/607613_1_En_1_Figc_HTML.gif)The
    chat G P T logo.Based on the given information, Steve is lactose intolerant and
    therefore cannot eat ice cream. Therefore, Steve is the one who didn't get any
    ice cream.Listing 1-5
  prefs: []
  type: TYPE_NORMAL
- en: 'RESPONSE. ChatGPT’s Answer to Analysis Question #1'
  prefs: []
  type: TYPE_NORMAL
- en: As you can see, ChatGPT can utilize NLP and NLU, and therefore it can *understand*
    (artificially intelligently, that is) the context of the scenario. It can interpret
    the relationships between the kids, their preferences, and Steve’s lactose intolerance.
    It is able to understand that the last names of the children, the street name,
    and the city name are the names of dairy products, but are obviously irrelevant
    to the question at hand.
  prefs: []
  type: TYPE_NORMAL
- en: 'Analysis Question #2: Which Kid Was Probably Left Sad?'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Now, to further prove the point that a regular expression is unable to provide
    any type of NLP or NLU, now let’s use a new term called **sentiment analysis**.
    Therefore, after the ice cream truck drove away, which kid was left sad?
  prefs: []
  type: TYPE_NORMAL
- en: Since the story had no mention of any of the children’s feelings or emotions,
    there is no text pattern that would allow any regular expression to return a match.
  prefs: []
  type: TYPE_NORMAL
- en: However, if you posed the same question to ChatGPT, it will return a response
    as shown in Listing [1-6](#PC6).![](../images/607613_1_En_1_Chapter/607613_1_En_1_Figd_HTML.gif)The
    chat G P T logo.Since Steve is lactose intolerant and cannot eat ice cream, he
    would be the kid left sad because he couldn't enjoy the ice cream like Marion
    and Janelle.Listing 1-6
  prefs: []
  type: TYPE_NORMAL
- en: 'RESPONSE. ChatGPT’s Answer to Analysis Question #2'
  prefs: []
  type: TYPE_NORMAL
- en: Therefore, ChatGPT is able to comprehend the scenario, reason through the information,
    and provide a correct answer along with an *explanation* for that answer.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s Unlearn Some Words in Order to Learn More About the ChatGPT API
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: First of all, before you get started working with the ChatGPT and OpenAI APIs,
    there are few words and terms that you should be familiar with first; otherwise,
    things won’t exactly make sense. So let’s make sure that we’re all clear on the
    definition of Models, Prompts, Tokens, and Temperature when using ChatGPT programmatically.
  prefs: []
  type: TYPE_NORMAL
- en: Models. Models? Models!!!
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: As a Java developer, when you hear the term “model,” you may immediately think
    of object-oriented programming and the representation of real-world entities in
    your Java class, right? For example, think of the term, “object model.” Additionally,
    if you’re ever worked with any type of database before, then the term “model”
    may ALSO conjure into your mind the idea of the representation of data and their
    relationships in your database. For example, think of the term, “data model.”
  prefs: []
  type: TYPE_NORMAL
- en: However, when working with the ChatGPT APIs (and artificial intelligence in
    general, for that matter), you need to forget both of those definitions, because
    they don’t apply. In the realm of artificial intelligence, a “model” is a pre-trained
    **neural network**.
  prefs: []
  type: TYPE_NORMAL
- en: Remember, as I mentioned earlier, you won’t need a PhD in Machine Learning in
    order to read this book. So what’s a neural network? Simply stated, a neural network
    is a fundamental component of artificial intelligence systems, because they are
    designed to simulate the way the human brain works by using interconnected layers
    of artificial neurons to process and analyze data. These networks can be trained
    on vast amounts of data to learn patterns, relationships, and to make predictions.![](../images/607613_1_En_1_Chapter/607613_1_En_1_Fig1_HTML.png)
  prefs: []
  type: TYPE_NORMAL
- en: A graphic illustrates how the various data sources are connected to a Chat G
    P T model employed with Chat G P T.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-1
  prefs: []
  type: TYPE_NORMAL
- en: An AI Model Is Trained on Vast Amounts of Data
  prefs: []
  type: TYPE_NORMAL
- en: In the context of AI, a “pre-trained model” refers to a neural network that
    has been trained on a specific task or dataset before being made available for
    use by developers. This training process involves exposing the model to large
    amounts of labeled and categorized (also called, “annotated”) data and adjusting
    its internal parameters to optimize its performance on the given task.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s look at some of the models provided by OpenAI for developers to use to
    AI-enable their applications.
  prefs: []
  type: TYPE_NORMAL
- en: '| GPT-4 | GPT-4 is the latest generation of OpenAI’s GPT set of models. GPT
    stands for Generative Pre-trained Transformer, and these models have been trained
    to understand natural language as well as multiple programming languages. The
    GPT-4 models take text and images as inputs as the prompt and provide text as
    the output.Some of the GPT-4 models available are• gpt-4• gpt-4-32k• gpt-4-vision
    |'
  prefs: []
  type: TYPE_TB
- en: '| GPT-3.5 | GPT-3.x is the previous generation of OpenAI’s GPT set of models.
    The original ChatGPT released to the public in November 2022 used GPT 3.Some of
    the GPT-3 models available are• gpt-3.5-turbo• gpt-3.5-turbo-16k |'
  prefs: []
  type: TYPE_TB
- en: '| DALL·E | The DALL·E model can generate and edit images given a natural language
    prompt.Later in this book in Chapter [4](607613_1_En_4_Chapter.xhtml), we’re going
    to have some fun with the DALL·E model to visualize the conversation of what is
    being discussed in your favorite podcast episode.Some of the DALL·E models available
    are• dall-e-3• dall-e-2 |'
  prefs: []
  type: TYPE_TB
- en: '| TTS | The TTS model takes text and converts it to audio with surprisingly
    good results. In most cases, the audio is almost indistinguishable from a human
    voice.Some of the TTS models available are• tts-1• tts-1-hd |'
  prefs: []
  type: TYPE_TB
- en: '| Whisper | Simply stated, the Whisper model converts audio into text.In this
    book, we’re going to use the Whisper model to search for text in a podcast episode.
    |'
  prefs: []
  type: TYPE_TB
- en: '| Embeddings | The Embeddings model can convert large amounts of text into
    a numerical representation of how the Strings in the text are related. So how
    is that useful? Embeddings allows developers to do specific tasks using custom
    datasets. Yes, this means that you can train the embeddings model on specific
    data that is relevant to your application. This allows you to do operations such
    as• Searching within your own body of text• Clustering data so that Strings of
    text are grouped by their similarity• Getting Recommendations (where items with
    related text strings are recommended)• Detecting Anomalies (where outliers with
    little relatedness are identified)• Measuring Diversity (where similarity distributions
    are analyzed)• Classifying Data (where text strings are classified by their most
    similar label) |'
  prefs: []
  type: TYPE_TB
- en: '| Moderation | The moderation models are fine-tuned models that can detect
    whether text may be sensitive or unsafe. These models can analyze text content
    and classify it according to the following categories:• Hate• Hate/threatening• Harassment• Harassment/threatening• Self-harm• Self-harm/intent• Self-harm/instructions• Sexual• Sexual/minors• Violence• Violence/graphicThe
    moderation models available are• Text-moderation-latest• Text-moderation-stable
    |'
  prefs: []
  type: TYPE_TB
- en: '| Legacy and Deprecated | Since the debut of ChatGPT, OpenAI has continued
    to support their older AI models, but they have been labeled as “legacy”  or “deprecated”
    models. These models continue to exist; however they have released other models
    that are more accurate, faster, and cheaper to use. |'
  prefs: []
  type: TYPE_TB
- en: Note
  prefs: []
  type: TYPE_NORMAL
- en: This is by no means an exhaustive list of models available for developers provided
    by OpenAI! As newer models are released, the older models will be marked as legacy
    or deprecated. Therefore, it’s important to stay up to date by checking the list
    of available models on the OpenAI documentation list of models:[https://platform.openai.com/docs/models](https://platform.openai.com/docs/models)
  prefs: []
  type: TYPE_NORMAL
- en: When We Talk About Tokens, Think About the StringTokenizer and Not Access Tokens
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: When using a third-party API, you might think of a token in the same sense as
    an access token, which is typically a UUID that allows you to identify yourself
    and maintain a session with the service. Well, forget that definition for now.
  prefs: []
  type: TYPE_NORMAL
- en: Now, as a Java developer, you’ve probably had the opportunity to use the class,
    java.util.StringTokenizer, in order to take a String and split it up into an Array
    of smaller Strings so that you can iterate over it for whatever purpose you need.
    For example, if you had a paragraph of text, you could let your delimiter be “.”
    in order to get an Array of sentences in the paragraph.
  prefs: []
  type: TYPE_NORMAL
- en: The good news is that the OpenAI API concept of a **token** is very familiar
    to the Java concept in the sense that it is a fragment of text. For the OpenAI
    APIs, a token is a chunk of a text that is approximately 4 characters long. That’s
    it – nothing else special.
  prefs: []
  type: TYPE_NORMAL
- en: So if a token is approximately a 4-character chunk of text, then why do we care
    about it?
  prefs: []
  type: TYPE_NORMAL
- en: When working with the OpenAI textual models, developers need to be aware of
    token limitations, because they impact the cost and performance of API calls.
    For example, the gpt-3.5-turbo model has a token limitation of 4096 tokens, while
    the gpt-4-vision model has a limitation of 128,000 tokens (which is approximately
    the size of a 300-page novel). Token limitations for models are called **context
    windows**.
  prefs: []
  type: TYPE_NORMAL
- en: As a result, developers need to take into account the length of the prompts
    as inputs and outputs to the models, ensuring that they fit within the model’s
    token constraints.
  prefs: []
  type: TYPE_NORMAL
- en: Table [1-1](#Tab1) provides a list of some of the most current models with the
    token limitations and their pricing.Table 1-1
  prefs: []
  type: TYPE_NORMAL
- en: List of Models with Their Token Limitations and the Cost Per Token
  prefs: []
  type: TYPE_NORMAL
- en: '| Model | Max Tokens | Cost of Token Input | Cost of Token Output |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- | --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '| gpt-4 | 8,192 | $0.03 / 1K tokens | $0.06 / 1K tokens |'
  prefs: []
  type: TYPE_TB
- en: '| gpt-4-32k | 32,768 | $0.06 / 1K tokens | $0.12 / 1K tokens |'
  prefs: []
  type: TYPE_TB
- en: '| gpt-4-vision | 128,000 | $0.01 / 1K tokens | $0.03 / 1K tokens |'
  prefs: []
  type: TYPE_TB
- en: '| gpt-3.5-turbo-instruct | 4,096 | $0.0015 / 1K tokens | $0.002 / 1K tokens
    |'
  prefs: []
  type: TYPE_TB
- en: '| gpt-3.5-turbo-16k | 16,384 | $0.0010 / 1K tokens | $0.002 / 1K tokens |'
  prefs: []
  type: TYPE_TB
- en: '| text-embedding-ada-002 | 8192 | $0.0001 / 1K tokens |'
  prefs: []
  type: TYPE_TB
- en: Temperature Is All About Creativity
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Of course, ChatGPT isn’t sentient, so it’s incapable of thinking as we humans
    do. However, by adjusting the **temperature** setting in your prompts to the ChatGPT
    API, you can enable the responses to be more creative. But understanding what
    *it* understands is crucial if you want to make best use of its potential.![](../images/607613_1_En_1_Chapter/607613_1_En_1_Fig2_HTML.png)
  prefs: []
  type: TYPE_NORMAL
- en: A graphic of a thermometer measures the temperature of a glowing bulb from not
    creative and very predictable to very creative and very random.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-2
  prefs: []
  type: TYPE_NORMAL
- en: Modify the Temperature in Order to Get More (or Less) Creative Responses
  prefs: []
  type: TYPE_NORMAL
- en: Getting Started with the OpenAI Playground
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Now it’s time to take the concepts that we’ve learned so far and start to put
    them to good use! However, we need to do first things first, and therefore, you
    will need to have a developer account with OpenAI and create an API key.
  prefs: []
  type: TYPE_NORMAL
- en: 'Head over to the following URL to create your dev account and API key:'
  prefs: []
  type: TYPE_NORMAL
- en: '[https://platform.openai.com/account/api-keys](https://platform.openai.com/account/api-keys)'
  prefs: []
  type: TYPE_NORMAL
- en: As you can see from the image in Figure [1-3](#Fig3), you can name your API
    key anything that you want.![](../images/607613_1_En_1_Chapter/607613_1_En_1_Fig3_HTML.png)
  prefs: []
  type: TYPE_NORMAL
- en: A screenshot of the Chapt G P T page is overlayed by the Create new secret keys
    popup box. It displays the name with the create secret key button selected. The
    name is given as the developer key for Java apps.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-3
  prefs: []
  type: TYPE_NORMAL
- en: Before You Can Access the Playground or Make API Calls, You Need to Have an
    API Key
  prefs: []
  type: TYPE_NORMAL
- en: You should be aware that as a requirement to create an API key, you will need
    to provide to OpenAI a credit card so that you can be billed for usage of their
    models.
  prefs: []
  type: TYPE_NORMAL
- en: 'Now that you’ve got your API key, let’s go straight to the Chat Playground
    at the following URL:'
  prefs: []
  type: TYPE_NORMAL
- en: '[https://platform.openai.com/playground](https://platform.openai.com/playground)'
  prefs: []
  type: TYPE_NORMAL
- en: Upon entering the Playground, click the combobox at the top and select Chat
    the option to end the Chat Playground, as shown in Figure [1-4](#Fig4).![](../images/607613_1_En_1_Chapter/607613_1_En_1_Fig4_HTML.jpg)
  prefs: []
  type: TYPE_NORMAL
- en: A screenshot of the Chapt G P T page displays the details under the playground
    tab. A dropdown is listed, where the assistants option is selected.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-4
  prefs: []
  type: TYPE_NORMAL
- en: After Entering the Playground, Select the Chat Option
  prefs: []
  type: TYPE_NORMAL
- en: Figure [1-5](#Fig5) depicts the Chat Playground, with certain parts numbered
    so that they can be easily identified.![](../images/607613_1_En_1_Chapter/607613_1_En_1_Fig5_HTML.png)
  prefs: []
  type: TYPE_NORMAL
- en: A screenshot of the Chat G P T page displays the get started interface. The
    system is selected from the playground, which lists the user, assistant, and add
    message. The view code button is selected, which displays the model as g p t 4,
    temperature details, and maximum length.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-5
  prefs: []
  type: TYPE_NORMAL
- en: The Chat Playground Can Be a Little Daunting at First Glance
  prefs: []
  type: TYPE_NORMAL
- en: 1\. System
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: As you can see, the user interface for the Chat Playground is vastly more complex
    than the ChatGPT website that everyone else uses. So let’s talk about the **System**
    field (see Figure [1-5](#Fig5), item 1).
  prefs: []
  type: TYPE_NORMAL
- en: In my opinion, ChatGPT can be described as “a vastly powerful form of artificial
    intelligence… with amnesia.” Therefore, when you’re using ChatGPT programmatically,
    you need to inform the system who it is in the conversation!
  prefs: []
  type: TYPE_NORMAL
- en: Figure [1-6](#Fig6), shown as follows, gives you a glimpse of the thousands
    of different roles that ChatGPT can play in a conversation.![](../images/607613_1_En_1_Chapter/607613_1_En_1_Fig6_HTML.png)
  prefs: []
  type: TYPE_NORMAL
- en: A page displays a message that reads, System, You are a, ellipses followed by
    the following graphics. An economist with a graph and dollar sign, a blogger with
    a message cloud, a fifteenth-century poet with an ink pot, and a chef with a chef
    cap.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-6
  prefs: []
  type: TYPE_NORMAL
- en: The System Field in the Chat Playground Allows You to Set the Role That ChatGPT
    Will Play in the Conversation
  prefs: []
  type: TYPE_NORMAL
- en: 2\. User
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The **User** field (Figure [1-5](#Fig5), item 2) in the ChatGPT Playground is
    where you type your prompt to ChatGPT, which can be anything that you want, for
    example, “describe how telemedicine will affect the medical industry.”
  prefs: []
  type: TYPE_NORMAL
- en: 3\. Assistant (Optional)
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: When you initially load the Chat Playground, the Assistant field (Figure [1-5](#Fig5),
    item 3) is not visible. In order to make it appear, you need to click the “**+**”
    symbol next to “Add Message.” Now, you may be asking yourself, “Why is this field
    needed at all?” Well, that’s a fine question. If you want ChatGPT to remember
    something that it has already told you in a previous conversation, then you need
    to type into the **Assistant** field anything that it has already told you that
    you think is relevant in order to continue with the conversation. Remember, it
    is a vastly powerful AI, but it has amnesia!
  prefs: []
  type: TYPE_NORMAL
- en: 4\. Add Message (Optional)
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The **Add Message** “**+**” symbol (Figure [1-5](#Fig5), item 4) is where you’d
    click in order to add either an **Assistant** message to the conversation, or
    another **User** message. Now, you may ask, “What’s the point of adding yet another
    **User** message to the conversation when I can type what I want in the original
    **User** field above?” Good question.
  prefs: []
  type: TYPE_NORMAL
- en: If you wanted to separate your command from your data, then you would use a
    separate **User** message for that.
  prefs: []
  type: TYPE_NORMAL
- en: Do you remember in Listing [1-4](#PC4) earlier in this chapter, where we had
    to use the “###” to separate the command to ChatGPT from the data that we wanted
    it to analyze? Well, this is now no longer needed because the command would be
    the 1st **User** message, the data would be the 2nd **User** message.
  prefs: []
  type: TYPE_NORMAL
- en: 5\. View Code (Optional)
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: After you have submitted your prompt using the playground, you can click the
    **View code** button (Figure [1-5](#Fig5), item 5) in order to see the code necessary
    to send the same prompt using any of the languages that they support.
  prefs: []
  type: TYPE_NORMAL
- en: You may notice that Java is not an officially supported language, but we’ll
    fix that in Chapter [2](607613_1_En_2_Chapter.xhtml), when we use ChatGPT as a
    pair programmer and port their REST interface to Java ourselves.
  prefs: []
  type: TYPE_NORMAL
- en: 6\. Model (Optional)
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Earlier in this chapter, we talked about the various models that are available
    for developers. Click the model field in order to see a list of models that are
    available.
  prefs: []
  type: TYPE_NORMAL
- en: You may also see that some models have a month and day associated with their
    name, which is simply a snapshot of that model. Programmatically selecting a snapshot
    enables developers to have some sort of predictability in the responses that they
    will receive from ChatGPT, because the current models are always updated.
  prefs: []
  type: TYPE_NORMAL
- en: 7\. Temperature (Optional)
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: As noted earlier in this chapter, the temperature selector ranges between 0
    and 2 and allows you to select the “randomness” of the response.
  prefs: []
  type: TYPE_NORMAL
- en: 8\. Maximum Length (Optional)
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Do you remember the discussion earlier in this chapter about tokens? By selecting
    anything in the range for this item, you can adjust the number of tokens (which
    directly affects the number of words) in the response.
  prefs: []
  type: TYPE_NORMAL
- en: Try It Now! Experimenting with the “System” Role
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Now that we’re familiar with several of the features of the Chat Playground,
    let’s send our first prompt using the settings discussed above. Listings [1-7](#PC7)
    and [1-8](#PC8) use the same prompt asking ChatGPT to give a few paragraphs on
    telemedicine, but the role of the system is vastly different from each other.**System**:
    You are a strictly factual researcher**User**: Write 3 paragraphs on pros and
    cons of telemedicineListing 1-7'
  prefs: []
  type: TYPE_NORMAL
- en: PROMPT. The Pros and Cons of Telemedicine as a Researcher
  prefs: []
  type: TYPE_NORMAL
- en: '**System**: You are a highly opinionated health blogger who always has stories
    with first hand experience**User**: Write 3 paragraphs on pros and cons of telemedicineListing
    1-8'
  prefs: []
  type: TYPE_NORMAL
- en: PROMPT. The Pros and Cons of Telemedicine as an Opinionated Health Blogger
  prefs: []
  type: TYPE_NORMAL
- en: You are encouraged to try these two prompts yourself and see what the responses
    are. Adjust the settings for the temperature and token length to get familiar
    with how those parameters affect the outcome.
  prefs: []
  type: TYPE_NORMAL
- en: Conclusion
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: You just learned more about how ChatGPT can be used by developers. We covered
    some of the basics of the Chat Playground, which is a web interface for developers
    to interact with the ChatGPT API.
  prefs: []
  type: TYPE_NORMAL
- en: We talked about how to set the system, user, and assistant roles in the Chat
    Playground and how to adjust settings such as the temperature and maximum length
    of output.
  prefs: []
  type: TYPE_NORMAL
- en: You learned about some of the parameters and terminology necessary to use the
    Chat Playground, such as the model, the temperature, and tokens. Getting familiar
    with the parameters of the Chat Playground is essential to knowing how to use
    the REST API since the Playground is a subset of capabilities offered by the REST
    API.
  prefs: []
  type: TYPE_NORMAL
- en: In the next chapter, we’ll see how to use ChatGPT as your “pair programmer”
    and port the officially supported ChatGPT REST interface to Java.
  prefs: []
  type: TYPE_NORMAL
- en: © The Author(s), under exclusive license to APress Media, LLC, part of Springer
    Nature 2024B. HopkinsChatGPT for Java[https://doi.org/10.1007/979-8-8688-0116-7_2](https://doi.org/10.1007/979-8-8688-0116-7_2)
  prefs: []
  type: TYPE_NORMAL
- en: 2. Using ChatGPT As Your Java Pair-Programmer
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Bruce Hopkins^([1](#Aff2)  )(1)Beaverton, OR, USA
  prefs: []
  type: TYPE_NORMAL
- en: I’m a big fan of some of the practices of XP (eXtreme Programming), and especially
    pair-programming. No matter what flavor of pair-programming that you prefer, it
    involves two engineers sitting down at the same screen and solving the same problem
    together. One of the biggest benefits that you get is a fresh set of eyes on a
    problem, and of course, you now have two engineers who have “touched” the codebase
    instead of one. Sometimes you can have one engineer write the code and the other
    write the tests and the comments. No matter how you slice it, it’s all good stuff.
  prefs: []
  type: TYPE_NORMAL
- en: Now, the OpenAI REST APIs for ChatGPT and their other models are officially
    supported in Python, Typescript, and of course, cURL (which is the de facto standard
    for REST APIs).
  prefs: []
  type: TYPE_NORMAL
- en: There are a few Java APIs that exist that were created by third-party developers,
    but the biggest problem (in my opinion) is that this space is rapidly changing.
    OpenAI is constantly updating both their models and their HTTP interfaces, and
    as a result, they are adding or deprecating features and functionality frequently.
    If you choose to use a third-party Java API for your project, you risk the problem
    of using an API that is outdated or rout of sync with the OpenAI REST API.
  prefs: []
  type: TYPE_NORMAL
- en: So, in this chapter, we’re going to use ChatGPT as our pair-programmer and simply
    port the official OpenAI REST APIs directly to Java. Every time OpenAI makes any
    changes to their officially supported languages and interfaces, we have everything
    needed to update our own library instantly. Let’s do this!
  prefs: []
  type: TYPE_NORMAL
- en: 'Creating Your First Java ChatGPT App: ListModels.java'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: We’re actually going to accomplish two tasks at once here. We’re going to create
    a basic application in Java using the OpenAI APIs, and in the process, we’re going
    to verify that we’ve properly obtained an API key. So, needless to say, in case
    you haven’t done so already, follow the instructions in Chapter [1](607613_1_En_1_Chapter.xhtml)
    to create your OpenAI developer account and obtain your API key. Going forward,
    all the code samples in this book require a valid API key.
  prefs: []
  type: TYPE_NORMAL
- en: List Models Endpoint
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: One of the most basic (but also essential) services that we can call is the
    **List Models** endpoint. Why, you may ask? The List Models endpoint allows you
    to get a list of all the AI models that are currently available for use by developers
    via the REST API.
  prefs: []
  type: TYPE_NORMAL
- en: Creating the Request
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Table [2-1](#Tab1) lists all the HTTP parameters necessary to call the List
    Models endpoint.Table 2-1
  prefs: []
  type: TYPE_NORMAL
- en: The HTTP Parameters Necessary to Call the List Models Endpoint
  prefs: []
  type: TYPE_NORMAL
- en: '| HTTP Param | Description |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '| Endpoint URL | [https://api.openai.com/v1/models](https://api.openai.com/v1/models)
    |'
  prefs: []
  type: TYPE_TB
- en: '| Method | GET |'
  prefs: []
  type: TYPE_TB
- en: '| Header | Authorization: Bearer **$OPENAI_API_KEY** |'
  prefs: []
  type: TYPE_TB
- en: Handling the JSON Response
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: After successfully invoking the List Models endpoint, the service will provide
    a JSON response with the structure shown in Table [2-2](#Tab2).
  prefs: []
  type: TYPE_NORMAL
- en: Model (JSON)
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Table 2-2
  prefs: []
  type: TYPE_NORMAL
- en: The Structure of the Model JSON Object
  prefs: []
  type: TYPE_NORMAL
- en: '| Field | Type | Description |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '| object | String | This always returns the literal, "list" |'
  prefs: []
  type: TYPE_TB
- en: '| data | Array | A list of AI models offered by OpenAI |'
  prefs: []
  type: TYPE_TB
- en: '|   ↳ id | String | The unique ID of the AI model, which is essentially the
    full name of the model |'
  prefs: []
  type: TYPE_TB
- en: '|   ↳ object | String | This always returns the literal, "model" |'
  prefs: []
  type: TYPE_TB
- en: '|   ↳ created | integer | The creation date for the model |'
  prefs: []
  type: TYPE_TB
- en: '|   ↳ owned_by | String | The name of the organization that owns the model
    |'
  prefs: []
  type: TYPE_TB
- en: '| permission | Array | This is an array of metadata for the permissions for
    the model |'
  prefs: []
  type: TYPE_TB
- en: '| root | String | This is typically a copy of the data.id field, which is the
    model’s name |'
  prefs: []
  type: TYPE_TB
- en: '| parent | String | This is currently an unused field |'
  prefs: []
  type: TYPE_TB
- en: Note
  prefs: []
  type: TYPE_NORMAL
- en: Since JSON objects can contain arrays (which can be hard to represent in a table),
    we’re using the notation “ ↳ ” to indicate the elements of an array. As you can
    see from the previous table, “id,” “object,” “created,” and “owned_by” are all
    elements of the “data” array in the JSON response.
  prefs: []
  type: TYPE_NORMAL
- en: 'Now that we have the details of the HTTP request and response, we can now create
    the ListModel.java app using the prompt shown in Listing [2-1](#PC1).**System**:
    You are a Java developer**User**: Take the following cURL command and convert
    it to Java. Name the file, "ListModels.java"**User**: curl https://api.openai.com/v1/models
    \  -H "Authorization: Bearer $OPENAI_API_KEY"Listing 2-1'
  prefs: []
  type: TYPE_NORMAL
- en: PROMPT. Using ChatGPT to Create the ListModels.java App
  prefs: []
  type: TYPE_NORMAL
- en: 'So, after sending the prompt, ChatGPT will provide you an answer as shown in
    Listing [2-2](#PC2).![](../images/607613_1_En_2_Chapter/607613_1_En_2_Figa_HTML.gif)A
    logo of open A I.import java.io.BufferedReader;import java.io.InputStreamReader;import
    java.net.HttpURLConnection;import java.net.URL;public class ListModels {        public
    static void main(String[] args) {        try {            // Create URL object
    for the API endpoint            URL url = new URL("https://api.openai.com/v1/models");            //
    Create HttpURLConnection object            HttpURLConnection conn = (HttpURLConnection)
    url.openConnection();            // Set request method            conn.setRequestMethod("GET");            //
    Set Authorization header            conn.setRequestProperty("Authorization", "Bearer
    $OPENAI_API_KEY");            // Get response code            int responseCode
    = conn.getResponseCode();            // If the request was successful (status
    code 200)            if (responseCode == HttpURLConnection.HTTP_OK) {                //
    Read the response from the API                BufferedReader in = new BufferedReader(new
    InputStreamReader(conn.getInputStream()));                String inputLine;                StringBuilder
    response = new StringBuilder();                while ((inputLine = in.readLine())
    != null) {                response.append(inputLine);                }                in.close();                //
    Print the response                System.out.println(response.toString());            }
    else {                System.out.println("Request failed. Response Code: " + responseCode);            }            //
    Close the connection            conn.disconnect();        } catch (Exception e)
    {            e.printStackTrace();        }        }}Listing 2-2'
  prefs: []
  type: TYPE_NORMAL
- en: RESPONSE. ListModels.java
  prefs: []
  type: TYPE_NORMAL
- en: Fantastic! Now all you have to do is to replace “$OPENAI_API_KEY” with the value
    of your actual API key.
  prefs: []
  type: TYPE_NORMAL
- en: 'After running this class, you’ll get a JSON file that contains all the models
    offered by OpenAI’s API, as shown in Listing [2-3](#PC3).![](../images/607613_1_En_2_Chapter/607613_1_En_2_Figb_HTML.gif)A
    logo of open A I.{  "object": "list",  "data": [    {      "id": "text-search-babbage-doc-001",      "object":
    "model",      "created": 1651172509,      "owned_by": "openai-dev"    },    {      "id":
    "gpt-4",      "object": "model",      "created": 1687882411,      "owned_by":
    "openai"    },    {      "id": "gpt-3.5-turbo-16k",      "object": "model",      "created":
    1683758102,      "owned_by": "openai-internal"    },    {      "id": "curie-search-query",      "object":
    "model",      "created": 1651172509,      "owned_by": "openai-dev"    },    {      "id":
    "text-davinci-003",      "object": "model",      "created": 1669599635,      "owned_by":
    "openai-internal"    },    {      "id": "text-search-babbage-query-001",      "object":
    "model",      "created": 1651172509,      "owned_by": "openai-dev"    },    {      "id":
    "babbage",      "object": "model",      "created": 1649358449,      "owned_by":
    "openai"    },...Listing 2-3'
  prefs: []
  type: TYPE_NORMAL
- en: RESPONSE. The Partial JSON Response After Running ListModels.java
  prefs: []
  type: TYPE_NORMAL
- en: Listing [2-3](#PC3) is a partial list due to the sheer size of the number of
    models available for developers to use! The good news, however, is that the full
    response is provided as a table in the Appendix.
  prefs: []
  type: TYPE_NORMAL
- en: Now that we can programmatically get a list of models available to use, it’s
    time to send prompts to ChatGPT using Java. This is accomplished using the Chat
    Endpoint.
  prefs: []
  type: TYPE_NORMAL
- en: Chat Endpoint
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The Chat Endpoint (formerly called, “Chat Completion”) is a REST service that’s
    basically a 1-to-1 representation of what you can do in the Chat Playground; therefore,
    this service should feel like second nature to you.
  prefs: []
  type: TYPE_NORMAL
- en: Creating the Request
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Table [2-3](#Tab3) lists all the HTTP parameters necessary to call the Chat
    Endpoint.Table 2-3
  prefs: []
  type: TYPE_NORMAL
- en: The HTTP Parameters for the Chat Endpoint
  prefs: []
  type: TYPE_NORMAL
- en: '| HTTP Param | Description |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '| Endpoint URL | https://api.openai.com/v1/chat/completions |'
  prefs: []
  type: TYPE_TB
- en: '| Method | POST |'
  prefs: []
  type: TYPE_TB
- en: '| Header | Authorization: Bearer **$OPENAI_API_KEY** |'
  prefs: []
  type: TYPE_TB
- en: '| Content-Type | application/json |'
  prefs: []
  type: TYPE_TB
- en: Table [2-4](#Tab4) describes the format of the JSON object necessary for the
    request body for the Chat Endpoint. After a quick glance, you can see that only
    a few fields are actually required in order to successfully invoke the service.
  prefs: []
  type: TYPE_NORMAL
- en: Chat (JSON)
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Table 2-4
  prefs: []
  type: TYPE_NORMAL
- en: The Structure of the Chat JSON Object
  prefs: []
  type: TYPE_NORMAL
- en: '| Field | Type | Required? | Description |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- | --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '| model | String | Required | The ID of the model you want to use for Chat
    Completion. Compatible models include• gpt-4• gpt-4-0613• gpt-4-32k• gpt-4-32k-0613• gpt-3.5-turbo• gpt-3.5-turbo-0613• gpt-3.5-turbo-16k• gpt-3.5-turbo-16k-0613
    |'
  prefs: []
  type: TYPE_TB
- en: '| messages | Array | Required | An array of messages that are a part of the
    ongoing conversation.Each message in the array has two properties: "role" and
    "content." |'
  prefs: []
  type: TYPE_TB
- en: '|   ↳ role | String | Required | Specifies the role of the message, which can
    be any of the following:• "system"• "user"• "assistant"• "tool" |'
  prefs: []
  type: TYPE_TB
- en: '|   ↳ content | String | Required | Contains the text of the message for the
    specified role. |'
  prefs: []
  type: TYPE_TB
- en: '| tools | Array | Optional | This allows you to specify a list of tools that
    the model can call. Currently, the only supported type of tool is a function.This
    parameter enables you to define a set of functions for which the model can generate
    JSON inputs. |'
  prefs: []
  type: TYPE_TB
- en: '|   ↳ type | String | Required | This is type of the tool, which can be any
    of the following:• "function" |'
  prefs: []
  type: TYPE_TB
- en: '|   ↳ function | Array | Optional | An array of functions that the model may
    use to call in the Chat Completion. |'
  prefs: []
  type: TYPE_TB
- en: '|   ↳↳ name | String | Required | The name of the function to be called.Valid
    names must be a-z, A-Z, 0-9, or contain underscores and dashes.The maximum length
    is 64 characters. |'
  prefs: []
  type: TYPE_TB
- en: '|   ↳↳ description | String | Optional | A description of what the function
    does.This helps the model to decide whether to call the function in the Chat Completion.
    |'
  prefs: []
  type: TYPE_TB
- en: '|   ↳↳ parameters | JSON object | Required | The parameters the function accepts
    in the format of a JSON Schema object. |'
  prefs: []
  type: TYPE_TB
- en: '| tool_choice | String or JSON objectdefault:"none" when no functions are included
    in the request"auto" when functions are included in the request | Optional | This
    allows you to determine which, if any, function the model should invoke.When set
    to "none," the model will refrain from calling any function and will solely generate
    a message response.When set to "auto," the model has the flexibility to choose
    between generating a message response or invoking a function based on its internal
    decision-making process. |'
  prefs: []
  type: TYPE_TB
- en: '| temperature | Number or nulldefault: 1 | Optional | Valid values range between
    0 and 2.Controls the randomness of the model’s output.The best practice is to
    adjust the top_p or temperature, but not both. |'
  prefs: []
  type: TYPE_TB
- en: '| top_p | Number or nulldefault: 1 | Optional | Valid values range between
    0 and 1.Indicates whether to consider few possibilities (0) or all possibilities
    (1).The best practice is to adjust the top_p or temperature, but not both. |'
  prefs: []
  type: TYPE_TB
- en: '| n | integer or nulldefault: 1 | Optional | Specifies how many Chat Completion
    choices the model should generate for each input message. |'
  prefs: []
  type: TYPE_TB
- en: '| stream | Boolean or nulldefault: false | Optional | If "stream" is set to
    "true," partial message updates will be sent as server-sent events.This means
    tokens will be sent as data-only events as they become available, and the stream
    will end with a "data: [DONE]" message |'
  prefs: []
  type: TYPE_TB
- en: '| stop | String / array / nulldefault: null | Optional | You can provide up
    to 4 sequences where the API should stop generating further tokens.This can be
    useful for controlling the length or content of responses. |'
  prefs: []
  type: TYPE_TB
- en: '| max_tokens | integer or nulldefault: inf | Optional | This parameter sets
    the maximum number of tokens that the generated Chat Completion can have. |'
  prefs: []
  type: TYPE_TB
- en: '| response_format | JSON object | Optional | You have two options:{ "type":
    "json_object" }  for a JSON object responseor{ "type": "text" } for a text response
    |'
  prefs: []
  type: TYPE_TB
- en: '| seed | integer or null | Optional | By specifying a seed, the system will
    make an attempt to generate repeatable results.In theory, this means that if you
    make repeated requests with the same seed and parameters, you should expect to
    receive the same result.In order to get the seed value to put in the subsequent
    request, copy the system_fingerprint from your last response. |'
  prefs: []
  type: TYPE_TB
- en: '| presence_penalty | Number or nulldefault: 0 | Optional | A number between
    -2.0 and 2.0.Positive values penalize new tokens based on whether they appear
    in the conversation history, encouraging the model to talk about new topics. |'
  prefs: []
  type: TYPE_TB
- en: '| frequency_penalty | Number or nulldefaults: 0 | Optional | A number between
    -2.0 and 2.0.Positive values penalize tokens based on their existing frequency
    in the conversation history, reducing the likelihood of repeating the same lines
    verbatim. |'
  prefs: []
  type: TYPE_TB
- en: '| logit_bias | JSON Mapdefault: null | Optional | Allows you to modify the
    likelihood of specific tokens appearing in the completion.You provide a JSON object
    that maps tokens (specified by their token ID in the tokenizer) to associated
    bias values from -100 to 100.This bias is added to the model’s logits before sampling.
    |'
  prefs: []
  type: TYPE_TB
- en: '| user | String | Optional | This is a unique ID that you can optionally generate
    to represent your end user. This will help OpenAI monitor and detect abuse. |'
  prefs: []
  type: TYPE_TB
- en: Note
  prefs: []
  type: TYPE_NORMAL
- en: In this book, we’re going to be working with the “stream” parameter set to its
    default setting, which is false. This means that we are going to receive the results
    from ChatGPT all at once as a single HTTP response.
  prefs: []
  type: TYPE_NORMAL
- en: However, there are cases where you would want this setting to be set true. Let’s
    say that you’re building, for example, an interactive voice-enabled chat bot.
    Let’s also say that you’re interested in converting the text from ChatGPT to audio
    so that your users can hear an audible response. In such a case, then you’d definitely
    want to set the “stream” parameter to be true. Why is this so? When the response
    is streamed back to your Java application, you have the opportunity at that moment
    to convert the text snippet to audio. This will enable you to work in parallel
    with converting text snippets to audio while receiving more text simultaneously.
    This will make the response seem more natural to the end user and help the conversation
    feel like an **actual** conversation.
  prefs: []
  type: TYPE_NORMAL
- en: 'Listing [2-4](#PC4) is an example of what the JSON object would look like in
    order to properly invoke the Chat Endpoint.{  "model": "gpt-3.5-turbo",  "messages":
    [    {      "role": "system",      "content": "You are a product marketer"    },    {      "role":
    "user",      "content": "Explain why Java is so widely used in the enterprise
    "    }  ],  "temperature": 1,  "max_tokens": 256,  "top_p": 1,  "frequency_penalty":
    0,  "presence_penalty": 0}Listing 2-4'
  prefs: []
  type: TYPE_NORMAL
- en: Example of the Chat JSON Object
  prefs: []
  type: TYPE_NORMAL
- en: Handling the Response
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: After successfully invoking the Chat Endpoint, the API will respond with a Chat
    Completion object or a stream of completion chunks if streaming is enabled. Here’s
    a breakdown of the Chat Completion object.
  prefs: []
  type: TYPE_NORMAL
- en: Chat Completion (JSON)
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Table 2-5
  prefs: []
  type: TYPE_NORMAL
- en: The Structure of the Chat Competion JSON Object
  prefs: []
  type: TYPE_NORMAL
- en: '| Field | Type | Description |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '| id | String | The unique identifier for the Chat Completion. |'
  prefs: []
  type: TYPE_TB
- en: '| object | String | This always returns the literal, "chat.completion." |'
  prefs: []
  type: TYPE_TB
- en: '| system_fingerprint | String | Use this parameter as the "seed" in a subsequent
    request if you want to reproducible results in from a previous conversation. |'
  prefs: []
  type: TYPE_TB
- en: '| created | integer | The timestamp of the Chat Completion. |'
  prefs: []
  type: TYPE_TB
- en: '| model | String | The model used for the Chat Completion. |'
  prefs: []
  type: TYPE_TB
- en: '| choices | Array | A list of Chat Completion choices available.You can get
    more than one choice of messages if you specify the desired number of responses
    you want with the "n" parameter in the Chat JSON request. See Table [2-4](#Tab4).
    |'
  prefs: []
  type: TYPE_TB
- en: '|   ↳ index | integer | The index of the choice in the list. |'
  prefs: []
  type: TYPE_TB
- en: '|   ↳ message | Array | A chat completion message generated by the model. |'
  prefs: []
  type: TYPE_TB
- en: '|   ↳ finish_reason | String | Every response will include a finish_reason.
    The possible values for finish_reason arestop: The API returned complete message,
    or a message terminated by one of the stop sequences provided via the stop parameter.length:
    The model output was incomplete due to the max_tokens parameter in the request
    or token limit of the model itself.tool_call: The model called a tool, such as
    a fucntion.content_filter: The response was terminated due to a violation of the
    content filters.null: The API response still in progress or incomplete. |'
  prefs: []
  type: TYPE_TB
- en: '| usage | Array | Usage statistics for the completion request, including the
    number of tokens in the prompt, completion, and total request. |'
  prefs: []
  type: TYPE_TB
- en: '|   ↳ prompt_tokens | integer | The number of tokens used in the prompt. |'
  prefs: []
  type: TYPE_TB
- en: '|   ↳ completion_tokens | integer | The number of tokens used in the response.
    |'
  prefs: []
  type: TYPE_TB
- en: '|   ↳ total_tokens | integer | The sum total of all token in the request and
    response. |'
  prefs: []
  type: TYPE_TB
- en: 'Listing [2-5](#PC5) is an example of the JSON response after invoking the Chat
    Endpoint.![](../images/607613_1_En_2_Chapter/607613_1_En_2_Figc_HTML.gif)A logo
    of open A I.{  "id": "chatcmpl-7wUOFQ3S34scDLmrLdWTTqvHmXztQ",  "object": "chat.completion",  "created":
    1694174199,  "model": "gpt-3.5-turbo-0613",  "choices": [    {      "index": 0,      "message":
    {        "role": "assistant",        "content": "Java is widely used in the enterprise
    because it is platform-independent, allowing applications to run on any system.
    Additionally, Java has a large and mature ecosystem with a vast array of libraries,
    frameworks, and tools, making it easier for developers to build robust and scalable
    enterprise applications."      },      "finish_reason": "stop"    }  ],  "usage":
    {    "prompt_tokens": 32,    "completion_tokens": 55,    "total_tokens": 87  }}Listing
    2-5'
  prefs: []
  type: TYPE_NORMAL
- en: The Chat Completion JSON Object
  prefs: []
  type: TYPE_NORMAL
- en: Wait, How Many Tokens Are in My Prompt?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: At a certain point, you’re going to start thinking about the prompts that you
    plan to send to ChatGPT and give considerable thought to the token limitations
    (and the costs) regarding the model that you want to use. In case you forgot,
    be sure to refer back to Table 1-1 for a list of models and the price of the tokens.
    Additionally, OpenAI created a simple to use website that allows you to see how
    many tokens are in your prompt, as shown in Figure [2-1](#Fig1).
  prefs: []
  type: TYPE_NORMAL
- en: ChatGPT Token Counter
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '[https://platform.openai.com/tokenizer](https://platform.openai.com/tokenizer)![](../images/607613_1_En_2_Chapter/607613_1_En_2_Fig1_HTML.jpg)'
  prefs: []
  type: TYPE_NORMAL
- en: A page titled Tokenizer has a few paragraphs to learn about language model tokenization.
    A text box reads, How many tokens are in this line of text? The answer is given
    at the bottom as 10 tokens and 41 characters.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 2-1
  prefs: []
  type: TYPE_NORMAL
- en: The ChatGPT Tokenizer Can Give You a Quick Count of the Tokens in Your Prompt
  prefs: []
  type: TYPE_NORMAL
- en: 'Creating the Next Java App: ChatGPTClient.java'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Now it’s time to build our own ChatGPTClient. Let’s simply dive right in, and
    provide the ChatGPT the information it needs via the ChatGPT Playground.**System**:
    You are a Java developer**User**: Convert the following cURL command to Java.
    Make sure the URL and API keys to the API are variables. I want to use the Jackson
    library to create the JSON object in the request. Name the main class, ChatGPTClient,
    and create helper classes if necessary.**User:**curl https://api.openai.com/v1/chat/completions
    \  -H "Content-Type: application/json" \  -H "Authorization: Bearer $OPENAI_API_KEY"
    \  -d ''{  "model": "gpt-3.5-turbo",  "messages": [    {      "role": "system",      "content":
    "You are a product marketer"    },    {      "role": "user",      "content": "Explain
    why Java is so widely used in the enterprise "    }  ],  "temperature": 1,  "max_tokens":
    256,  "top_p": 1,  "frequency_penalty": 0,  "presence_penalty": 0}''Listing 2-6'
  prefs: []
  type: TYPE_NORMAL
- en: The Initial Conversation to Create ChatGPTClient.java
  prefs: []
  type: TYPE_NORMAL
- en: 'The response from ChatGPT was a good start, but didn’t have everything exactly
    as I wanted it. Now, since I didn’t specify exactly how the HTTP calls should
    have been made, ChatGPT decided to use the Apache HTTPClient library. Therefore,
    I added the following User message (Listing [2-7](#PC7)).**User**: I have a Java
    11 environment, so use Java 11 HTTP classes for the API calls. I''d rather use
    pure Java instead of Apache HttpClientListing 2-7'
  prefs: []
  type: TYPE_NORMAL
- en: PROMPT. Adding Additional Information to the Conversation to Create ChatGPTClient.java
  prefs: []
  type: TYPE_NORMAL
- en: The goal here is to have a conversation. It’s impractical to expect ChatGPT
    to produce exactly what you want in a single prompt. Even developers don’t do
    that! Therefore, feel free to have the conversation with ChatGPT, and clarify
    to it things that it may have guessed or assumed incorrectly.
  prefs: []
  type: TYPE_NORMAL
- en: 'Listing [2-8](#PC8) shows the final result for ChatGPTClient.java.![](../images/607613_1_En_2_Chapter/607613_1_En_2_Figd_HTML.gif)A
    logo of open A I.import com.fasterxml.jackson.core.JsonProcessingException;import
    com.fasterxml.jackson.databind.ObjectMapper;import com.fasterxml.jackson.annotation.JsonProperty;import
    java.io.BufferedReader;import java.io.IOException;import java.io.InputStreamReader;import
    java.io.OutputStream;import java.net.HttpURLConnection;import java.net.URL;import
    java.util.ArrayList;import java.util.List;public class ChatGPTClient {        public
    static void main(String[] args) {        String openAIKey = "insert your API key
    here";        String endpoint = "https://api.openai.com/v1/chat/completions";        String
    model = "gpt-3.5-turbo";        float temperature = 1.0f;        int max_tokens
    = 256;        float top_p = 1.0f;        int frequency_penalty = 0;        int
    presence_penalty = 0;        List<Message> messages = new ArrayList<>();        messages.add(new
    Message("system", "You are a product marketer."));        messages.add(new Message("user",
    "Explain why Java is so widely used in the enterprise"));        String jsonInput
    = null;        try {            ObjectMapper mapper = new ObjectMapper();            Chat
    chat = new Chat(model, messages, temperature, max_tokens, top_p, frequency_penalty,
    presence_penalty);            jsonInput = mapper.writeValueAsString(chat);        }
    catch (JsonProcessingException e) {            e.printStackTrace();        }        try
    {            URL url = new URL(endpoint);            HttpURLConnection connection
    = (HttpURLConnection) url.openConnection();            connection.setRequestMethod("POST");            connection.setRequestProperty("Content-Type",
    "application/json");            connection.setRequestProperty("Authorization",
    "Bearer " + openAIKey);            connection.setDoOutput(true);            OutputStream
    outputStream = connection.getOutputStream();            outputStream.write(jsonInput.getBytes());            outputStream.flush();            outputStream.close();            int
    responseCode = connection.getResponseCode();            if (responseCode == HttpURLConnection.HTTP_OK)
    {                BufferedReader reader = new BufferedReader(new InputStreamReader(connection.getInputStream()));                StringBuilder
    response = new StringBuilder();                String line;                while
    ((line = reader.readLine()) != null) {                    response.append(line);                }                reader.close();                //
    Print the response                System.out.println(response.toString());            }
    else {                System.out.println("Error: " + responseCode);            }            connection.disconnect();        }
    catch (IOException e) {            e.printStackTrace();        }    }    // Helper
    class to represent the Chat object    static class Chat {        @JsonProperty("model")        private
    String model;        @JsonProperty("messages")        private List<Message> messages;        @JsonProperty("temperature")        private
    float temperature;        @JsonProperty("max_tokens")        private int max_tokens;        @JsonProperty("top_p")        private
    float top_p;        @JsonProperty("frequency_penalty")        private int frequency_penalty;        @JsonProperty("presence_penalty")        private
    int presence_penalty;        public Chat(String model, List<Message> messages,
    float temperature, int max_tokens, float top_p, int frequency_penalty, int presence_penalty)
    {            this.model = model;            this.messages = messages;            this.temperature
    = temperature;            this.max_tokens = max_tokens;            this.top_p
    = top_p;            this.frequency_penalty = frequency_penalty;            this.presence_penalty
    = presence_penalty;        }        // Getters and setters (optional, but can
    be useful if you need to modify the object later)        }    // Helper class
    to represent the Chat Message    static class Message {        @JsonProperty("role")        private
    String role;        @JsonProperty("content")        private String content;        public
    Message(String role, String content) {            this.role = role;            this.content
    = content;        }    }}Listing 2-8'
  prefs: []
  type: TYPE_NORMAL
- en: RESPONSE. ChatGPTClient.java
  prefs: []
  type: TYPE_NORMAL
- en: As you examine the preceding code listing, you see that the HTTP calls are done
    using pure Java APIs and not using any external libraries – just like I requested
    in the prompt. Note, however, that creating and parsing JSON objects in pure Java
    can be a pain, so I personally specified that the Jackson API should be used,
    which (as you can see) is reflected in the imports statements and the code itself.
  prefs: []
  type: TYPE_NORMAL
- en: The resulting code includes two inner classes, Chat and Message, which can easily
    be separated into separate Java files. I can either do that manually myself, or
    add a new “User” message to ChatGPT to request the inner classes to be separated
    into distinct Java files.
  prefs: []
  type: TYPE_NORMAL
- en: 'After executing ChatGPTClient.java, Listing [2-9](#PC9) has the response.![](../images/607613_1_En_2_Chapter/607613_1_En_2_Fige_HTML.gif)A
    logo of open A I.{  "id": "chatcmpl-7xIRvjByGobmWH9Vo7OObHCSSwzgI",  "object":
    "chat.completion",  "created": 1694366627,  "model": "gpt-3.5-turbo-0613",  "choices":
    [    {      "index": 0,      "message": {        "role": "assistant",        "content":
    "Java is widely used in the enterprise primarily due to its numerous benefits
    and features that make it a popular choice among large organizations. Here are
    some key reasons why Java is so widely adopted in the enterprise:\n\n1\. Platform
    Independence: One of the biggest advantages of Java is its platform independence.
    Java programs can run on any operating system, making it highly adaptable across
    a wide range of devices and platforms. This makes it easier for enterprises to
    develop applications that can be deployed on different systems without any major
    modifications.\n\n2\. Robustness and Stability: Java is known for its strong emphasis
    on reliability, stability, and error handling. It has a built-in memory management
    system that prevents memory leaks and ensures robust performance. This stability
    is highly valued in enterprise environments where systems need to run consistently
    without disruptions.\n\n3\. Scalability: Java offers excellent scalability, making
    it suitable for large-scale enterprise applications. It provides robust support
    for multi-threading, allowing applications to handle a large number of concurrent
    users smoothly. Java''s ability to handle high traffic loads and distribute processing
    across multiple servers makes it ideal for enterprise-level systems.\n\n4\. Rich
    Standard Library and Frameworks: Java comes with a comprehensive standard library,
    offering a wide range of pre-built functions and classes that simplify development.
    Additionally, Java has a"      },      "finish_reason": "length"    }  ],  "usage":
    {    "prompt_tokens": 28,    "completion_tokens": 256,    "total_tokens": 284  }}Listing
    2-9'
  prefs: []
  type: TYPE_NORMAL
- en: RESPONSE. The Results from Calling ChatGPTClient.java
  prefs: []
  type: TYPE_NORMAL
- en: Did you notice in the preceding listing that the answer to my prompt was truncated?
    “Additionally, Java has a" is not a full sentence, but since I requested that
    no more than 256 tokens should be used in the response, it didn’t go beyond that
    limitation.
  prefs: []
  type: TYPE_NORMAL
- en: Conclusion
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Contrary to popular belief, ChatGPT is not a mind-reader! It doesn’t have the
    ability to replace developers and architects because it’s (gasp!) artificially
    intelligent. It’s very useful to ask a single question and receive an immediate,
    straightforward response. It definitely can be used to convert a natural language
    prompt (or request) into code, but you definitely need a developer to make the
    judgment call if the resulting code should be used, refined, or completely disregarded.
  prefs: []
  type: TYPE_NORMAL
- en: © The Author(s), under exclusive license to APress Media, LLC, part of Springer
    Nature 2024B. HopkinsChatGPT for Java[https://doi.org/10.1007/979-8-8688-0116-7_3](https://doi.org/10.1007/979-8-8688-0116-7_3)
  prefs: []
  type: TYPE_NORMAL
- en: 3. Using AI in the Enterprise! Creating a Text Summarizer for Slack Messages
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Bruce Hopkins^([1](#Aff2)  )(1)Beaverton, OR, USA
  prefs: []
  type: TYPE_NORMAL
- en: In today’s corporate world, it’s extremely common for companies to have an instance
    of Slack (or Microsoft Teams) to organize themselves, and use it as a central
    place of communication to everyone in the company. Now, if you’ve ever used Slack
    before, I think you know how easily a channel can become flooded with a ton of
    messages because **SOME** important thing happened **SOMEWHERE** in the company
    or the world.
  prefs: []
  type: TYPE_NORMAL
- en: Of course, the more responsibility that you have within the company (i.e., manager,
    team leader, architect, etc.), the more channels you’re expected to participate
    in. In my opinion, Slack is a double-edged sword. You need to use it to do your
    job, but as a developer, you definitely can’t attend a daily standup meeting and
    say, “Yesterday, uh, I spent all day reading Slack. No roadblocks.”
  prefs: []
  type: TYPE_NORMAL
- en: Additionally, if you work for a company with clients in various time zones (which
    is quite common nowadays) it’s pretty daunting to open Slack in the morning and
    see a ton of messages that were posted while you were away from the keyboard.
  prefs: []
  type: TYPE_NORMAL
- en: So, in this chapter, we’re going to apply AI in the enterprise to make Slack
    more useful. We’ll leverage the code in the previous chapter and create a Slack
    bot in Java that will summarize the important conversations in a Slack channel.
    We’re going to be utilizing ChatGPT’s capabilities for text summarization and
    focus a bit more on **Prompt Engineering**.
  prefs: []
  type: TYPE_NORMAL
- en: So, What Is Prompt Engineering?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Simply stated, Prompt Engineering is the process of carefully crafting and refining
    prompts and input parameters to instruct and guide the behavior of ChatGPT and
    other AI models. It’s basically the industry-wide term for creating the right
    input in order to get the result that you’re looking for.
  prefs: []
  type: TYPE_NORMAL
- en: However, before we can continue, let’s do a little housekeeping and improve
    our ChatGPTClient.java from the previous chapter.
  prefs: []
  type: TYPE_NORMAL
- en: Updating ChatGPTClient.java (and Related Classes) with the Builder Pattern
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: So, in the previous chapter, we created ChatGPTClient.java as a basic app to
    send our prompts to the Chat Endpoint. It was a good start, but there was definitely
    some room for improvement.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s first look at the constructor for the Chat object, which models the JSON
    Chat object that is sent to the Chat Endpoint as seen in Listing [3-1](#PC1).        public
    Chat(String model, List<Message> messages, float temperature,                    int
    max_tokens, float top_p, int frequency_penalty,                    int presence_penalty)
    {            this.model = model;            this.messages = messages;            this.temperature
    = temperature;            this.max_tokens = max_tokens;            this.top_p
    = top_p;            this.frequency_penalty = frequency_penalty;            this.presence_penalty
    = presence_penalty;        }Listing 3-1
  prefs: []
  type: TYPE_NORMAL
- en: The Constructor for the Chat Object
  prefs: []
  type: TYPE_NORMAL
- en: So, if you refer back to Table 2-4 in Chapter [2](607613_1_En_2_Chapter.xhtml),
    you see that only the model and messages parameters are actually required to successfully
    invoke the Chat Endpoint. All the other parameters are optional, and some of them
    have their own built-in defaults if you don’t specify anything. Those are the
    reasons why we didn’t need to “model out” the entire Chat JSON object.
  prefs: []
  type: TYPE_NORMAL
- en: So, this constructor is basically begging to be refactored using the Builder
    Pattern. The Builder Pattern allows us to get an instance of the object that we
    want, while ONLY specifying the parameters that we care about.
  prefs: []
  type: TYPE_NORMAL
- en: Additionally, it makes sense that the Chat and Message objects are no longer
    inner classes, and exist in their own .java files. Listing [3-2](#PC2) shows how
    we can get an instance of the Chat object which has been modified using the Builder
    Pattern.    Chat chat = Chat.builder()        .model(model)        .messages(messages)        .temperature(temperature)        .maxTokens(max_tokens)        .topP(top_p)        .frequencyPenalty(frequency_penalty)        .presencePenalty(presence_penalty)        .build();Listing
    3-2
  prefs: []
  type: TYPE_NORMAL
- en: Getting an Instance of the Chat Object
  prefs: []
  type: TYPE_NORMAL
- en: Since the request to the Chat Endpoint MUST has a model and message specified
    in the Chat JSON object, some defaults have been added to the Chat.java class
    in order to make it safer to use (safer in the sense of being less error prone
    to users of the class). Listing [3-3](#PC3) is the new Chat.java file.import java.util.List;import
    java.util.ArrayList;import com.fasterxml.jackson.annotation.JsonProperty;public
    class Chat {    @JsonProperty("model")    private String model;    @JsonProperty("messages")    private
    List<Message> messages;    @JsonProperty("temperature")    private float temperature;    @JsonProperty("max_tokens")    private
    int max_tokens;    @JsonProperty("top_p")    private float top_p;    @JsonProperty("frequency_penalty")    private
    int frequency_penalty;    @JsonProperty("presence_penalty")    private int presence_penalty;    private
    Chat(ChatBuilder builder) {        this.model = builder.model;        this.messages
    = builder.messages;        this.temperature = builder.temperature;        this.max_tokens
    = builder.max_tokens;        this.top_p = builder.top_p;        this.frequency_penalty
    = builder.frequency_penalty;        this.presence_penalty = builder.presence_penalty;    }    public
    static ChatBuilder builder() {        // we need a default message here to avoid
    400 errors from the API        List<Message> messages = new ArrayList<>();        messages.add(new
    Message("system", "You are a helpful assistant"));        messages.add(new Message("user",
    "hello"));        return new ChatBuilder().messages(messages);    }    public
    static class ChatBuilder {        private String model = "gpt-3.5-turbo";        private
    List<Message> messages = null;        private float temperature = 1.0f;        private
    int max_tokens = 2048;        private float top_p = 0f;        private int frequency_penalty
    = 0;        private int presence_penalty = 0;        private ChatBuilder() {        }        public
    ChatBuilder model(String model) {            this.model = model;            return
    this;        }        public ChatBuilder messages(List<Message> messages) {            this.messages
    = messages;            return this;        }        public ChatBuilder temperature(float
    temperature) {            this.temperature = temperature;            return this;        }        public
    ChatBuilder maxTokens(int max_tokens) {            this.max_tokens = max_tokens;            return
    this;        }        public ChatBuilder topP(float top_p) {            this.top_p
    = top_p;            return this;        }        public ChatBuilder frequencyPenalty(int
    frequency_penalty) {            this.frequency_penalty = frequency_penalty;            return
    this;        }        public ChatBuilder presencePenalty(int presence_penalty)
    {            this.presence_penalty = presence_penalty;            return this;        }        public
    Chat build() {            return new Chat(this);        }    }}Listing 3-3
  prefs: []
  type: TYPE_NORMAL
- en: Chat.java Now Using the Builder Pattern
  prefs: []
  type: TYPE_NORMAL
- en: This class (with this design pattern) is flexible enough for you to add or remove
    parameters that you need to invoke the Chat Endpoint. If at any time OpenAI adds
    new parameters and features to the Chat Endpoint, you can modify this class to
    support the new requirements.
  prefs: []
  type: TYPE_NORMAL
- en: For completeness, Listing [3-4](#PC4) shows the Message.java class.import com.fasterxml.jackson.annotation.JsonProperty;public
    class Message {    @JsonProperty("role")    private String role;    @JsonProperty("content")    private
    String content;    public Message(String role, String content) {        this.role
    = role;        this.content = content;    }}Listing 3-4
  prefs: []
  type: TYPE_NORMAL
- en: Message.java
  prefs: []
  type: TYPE_NORMAL
- en: ChatGPT Is Here to Take Away Everyone’s Jobs (Not Really)
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: It is my humble opinion that every company in the world is sitting on a gold
    mine of untapped information. If you are using any system that keeps a log of
    exchanges between employees, a database of support requests from your customers,
    or any large repository of text (yes, this includes your email, Microsoft Exchange,
    and corporate Gmail), then you have a large repository of unstructured text that
    is waiting to be utilized.
  prefs: []
  type: TYPE_NORMAL
- en: Therefore, the best use of ChatGPT is not to eliminate anyone’s jobs. It should
    be used in order to augment and extend what team members in your company are already
    doing. As we saw in the previous chapter, as a programmer, ChatGPT can work as
    a very effective Pair-Programmer. It is also very good at performing certain difficult
    tasks very efficiently and quickly. So, let’s see a practical example of what
    can be done in order to make useful a large source of unstructured text.
  prefs: []
  type: TYPE_NORMAL
- en: 'Examining a Real World Problem: Customer Support for a Software Company'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'One of the most grueling tasks in software development is providing tech support.
    Imagine the joys of fielding calls and messages all day from people who might
    be frustrated, confused, or just in need of a solution while using your software.
    Here’s some of the reasons why customer support is a tough nut to crack:'
  prefs: []
  type: TYPE_NORMAL
- en: Your end users and your customers are notoriously bad at explaining problems
    with your software.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Level 1 technicians, often the first line of defense, typically handle the most
    basic issues or user errors. But when problems get more complex, users are escalated
    to Level 2.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The mid-tier is a tricky place, because they have more knowledge and experience
    than the tech support staff at Level 1; however, they don’t have the opportunity
    to directly get answers from the end user.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Really bad problems get escalated to Level 3; however, these are the most expensive
    tech support staff because they have the most knowledge and experience. They have
    hands-on experience with the code as well as the servers and the infrastructure.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'So let’s work with a real world example of a typical conversation within a
    typical tech support channel within Slack. Below is a list of the team members
    and their roles within a fictional company:'
  prefs: []
  type: TYPE_NORMAL
- en: Fatima (Customer Service Representative)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: John (Software Engineer)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Dave (PM)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Keith (CTO)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Listing [3-5](#PC5) provides an example of a conversation between the team
    members at a software startup. Fatima, the customer service representative, lets
    the team know that their app is crashing immediately after launching (not a good
    problem to have). Keith, the CTO, steps in immediately to escalate the issue.Fatima
    [16:00 | 02/08/2019]: Hey everyone, I have an urgent issue to discuss. I just
    got off a call with a client who''s experiencing app crashes as soon as they load
    it. They''re really frustrated. Can we get this sorted ASAP? ![](../images/607613_1_En_3_Chapter/607613_1_En_3_Figa_HTML.gif)A
    crying emoji with eyes closed and mouth opened.Keith [16:01 | 02/08/2019]: Thanks
    for bringing this to our attention, Fatima. Let''s jump on this right away. @John,
    can you take the lead in investigating the issue since our architect is out sick
    today?John [16:02 | 02/08/2019]: Sure thing, Keith. I''ll dive into the codebase
    and see if I can find any potential culprits for the crashes.John [16:02 | 02/08/2019]:
    Fatima, could you gather some additional information from the client? Ask them
    about the specific device, operating system, and any recent updates they might
    have installed.Fatima [16:03 | 02/08/2019]: Absolutely, John. I''ll reach out
    to the client immediately and gather those details. Will update you all once I
    have them.Dave [16:04 | 02/08/2019]: I understand the urgency here. Let''s make
    sure we keep the client informed about our progress ![](../images/607613_1_En_3_Chapter/607613_1_En_3_Figb_HTML.gif)A
    crying emoji with eyes closed and mouth opened. Fatima. We don''t want them feeling
    left in the dark during this troubleshooting process.Fatima [16:04 | 02/08/2019]:
    Definitely, Dave. ![](../images/607613_1_En_3_Chapter/607613_1_En_3_Figc_HTML.gif)A
    thumbs-up icon. I''ll keep the client updated at regular intervals, providing
    them with any relevant information we uncover.John [16:20 | 02/08/2019]: I''ve
    checked the codebase, and so far, I haven''t found any obvious issues. It''s strange
    that the app is crashing on load. Could it be a memory-related issue? Keith, do
    we have any recent reports of memory leaks or high memory usage?Keith [16:22 |
    02/08/2019]: I''ll pull up the monitoring logs, John, and check if there have
    been any memory-related anomalies in recent releases. Let me get back to you on
    that.Fatima [17:01 | 02/08/2019]: Quick update, everyone. The client is using
    an iPhone X running iOS 15.1\. They mentioned that the issue started after updating
    their app a few days ago ![](../images/607613_1_En_3_Chapter/607613_1_En_3_Figd_HTML.gif)A
    thinking emoji.Keith [17:05 | 02/08/2019]: Thanks for the update, Fatima. That''s
    helpful information. John, let''s focus on testing the latest app update on an
    iPhone X simulator with iOS 15.1 to see if we can replicate the issue.John [17:06
    | 02/08/2019]: Good idea, Keith. I''ll set up the emulator and run some tests
    right away.Keith [17:30 | 02/08/2019]: John, any progress on replicating the issue
    on the emulator?John [17:32 | 02/08/2019]: Yes, Keith. I managed to reproduce
    the crash on the emulator. It seems to be related to a compatibility issue with
    iOS 15.1 ![](../images/607613_1_En_3_Chapter/607613_1_En_3_Fige_HTML.gif)An exploding
    head emoji.. I suspect it''s due to a deprecated method call. I''ll fix it and
    run more tests to confirm.John [18:03 | 02/08/2019]: Fixed the deprecated method
    issue, and the app is no longer crashing on load. It looks like we''ve identified
    and resolved the problem. I''ll prepare a patch and send it to you, Keith, for
    review and deployment.Keith [18:04 | 02/08/2019]: ![](../images/607613_1_En_3_Chapter/607613_1_En_3_Figf_HTML.gif)Three
    emojis of clapping hands. Thank you, please provide me with the patch as soon
    as possible. Once I review it, we''ll deploy the fix to the app store.Dave [18:06
    | 02/08/2019]: Great job, team! ![](../images/607613_1_En_3_Chapter/607613_1_En_3_Figg_HTML.gif)An
    emoji with a triangular face and curly hair. John, please keep the client informed
    about the progress and let them know we have a fix ready for them on the next
    app update. Can someone make sure the release notes reflect this?John [18:07 |
    02/08/2019]: Will do, Dave. I''ll update the client and ensure they''re aware
    of the upcoming fix.Keith [18:27 | 02/08/2019]: Patch reviewed and approved, John.
    Please proceed with updating the app in the store. Let''s aim to have it done
    within the next hour.John [18:26 | 02/08/2019]: Understood, Keith. I''m in the
    process of uploading it now.Fatima [18:38 | 02/08/2019]: I just informed the client
    about the fix. They''re relieved and grateful for our prompt response. Thanks,
    everyone, for your collaboration and quick action. It''s a pleasure working with
    such a competent team!Dave [18:40 | 02/08/2019]: Well done, team! Your efforts
    are greatly appreciated. We managed to turn this urgent problem around in record
    time. Let''s keep up the good work! ![](../images/607613_1_En_3_Chapter/607613_1_En_3_Figh_HTML.gif)A
    thumbs-up emoji.Listing 3-5'
  prefs: []
  type: TYPE_NORMAL
- en: Team Members Within a Slack Channel Trying to Analyze a Customer’s Problem
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt Engineering 101: Text Summarization'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: So, needless to say, no one wants to spend their day constantly scrolling through
    Slack channels reading about issues and problems that are on fire. We’re going
    to utilize the capabilities of ChatGPT for text summarization. To keep things
    simple, let’s try a few prompts to send the entire listing of the chat messages
    to ChatGPT in order for it to give us a usable summary of all the events that
    have happened.
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt #1: “tl;dr”'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'This prompt is short, sweet, and to the point. In case you’re not familiar
    with it, it’s a term used online frequently to briefly summarize a long article.
    It literally stands for “Too Long; Didn’t Read,” which is how I feel about a lot
    of conversations on Slack when I’m swamped with work. Conveniently, ChatGPT can
    understand this simple term (I wouldn’t necessarily call it a word) as a prompt,
    and the results are pretty impressive.**System**: You are a helpful assistant**User**:  Fatima
    [16:00 | 02/08/2019]: Hey everyone, I have an urgent ...**User**: Tl;dr**Model**:
    gpt-4**Temperature**: 1**Maximum length:** 360**Top P:** 1**Frequency penalty:**
    0**Presence penalty:** 0Listing 3-6'
  prefs: []
  type: TYPE_NORMAL
- en: PROMPT. Asking for a Summarized Version of a Longer Conversation
  prefs: []
  type: TYPE_NORMAL
- en: Note
  prefs: []
  type: TYPE_NORMAL
- en: You have two options now on how to send the preceding prompt to ChatGPT. The
    first option is to use the ChatGPTClient.java app and its supporting classes.
    The second option is to use the Chat Playground. In either case, be sure that
    the first User message contains all of the text that is in Listing [3-5](#PC5).
    It’s truncated in Listing [3-6](#PC6) to make it more readable.
  prefs: []
  type: TYPE_NORMAL
- en: Notice how the number of tokens is kept small, at 360, which will ultimately
    help ChatGPT to create a short response. Also see that the temperature is left
    at 1 (the default value), but the Top P is increased all the way to its maximum
    (which is 1). Therefore, it’s important to play around with temperature and other
    settings to control the tone and variety of ChatGPT’s responses.
  prefs: []
  type: TYPE_NORMAL
- en: Listing [3-7](#PC7) shows ChatGPT’s summarization of the conversation from Listing
    [3-5](#PC5).![](../images/607613_1_En_3_Chapter/607613_1_En_3_Figi_HTML.gif)The
    Chat G P T logo.The team quickly responds to a client's app crashing issue. John
    investigates the codebase while Fatima gathers information from the client. They
    discover a compatibility issue with iOS 15.1 and John fixes it. The patch is reviewed
    and approved, and the app is updated in the store. The client is informed and
    grateful for the quick resolution. The team is praised for their collaboration
    and prompt action.Listing 3-7
  prefs: []
  type: TYPE_NORMAL
- en: RESPONSE. Getting a Summarized Version of a Very Long Conversation
  prefs: []
  type: TYPE_NORMAL
- en: That’s fantastic! It reduced that extremely long conversation down to a simple
    and brief summary of only 68 words. As you can see, ChatGPT is not replacing a
    job here; however, it will definitely make someone more productive. Now, let’s
    try a few more prompts, shall we?
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt #2: “Explain This in 3 Sentences or Less”'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'So, If “tl;dr” doesn’t provide a brief enough explanation for you, then we
    can tell ChatGPT to make things even simpler. ChatGPT does well with parameters,
    so let’s specify that the explanation shouldn’t be any longer than 3 sentences
    as shown in Listing [3-8](#PC8).**System**: You are a helpful assistant**User**:  Fatima
    [16:00 | 02/08/2019]: Hey everyone, I have an urgent ...**User**: Explain this
    in 3 sentences or less.**Model**: gpt-4**Temperature**: 1**Maximum length:** 250**Top
    P:** 0**Frequency penalty:** 0**Presence penalty:** 0Listing 3-8'
  prefs: []
  type: TYPE_NORMAL
- en: PROMPT. Asking for a Shorter Version of a Longer Conversation
  prefs: []
  type: TYPE_NORMAL
- en: As you may have noticed, the temperature is set to 0.82 in this example. We
    really want ChatGPT to give us a concise answer here, so the “drier” the better.![](../images/607613_1_En_3_Chapter/607613_1_En_3_Figj_HTML.gif)The
    Chat G P T logo.A customer reported an urgent issue of app crashes to the team.
    John investigates the issue and asks Fatima to gather additional information from
    the client. They discover that the issue is related to a compatibility problem
    with iOS 15.1\. John fixes the problem and Keith approves the deployment of the
    fix to the client's production environment.Listing 3-9
  prefs: []
  type: TYPE_NORMAL
- en: RESPONSE. Getting a 3 Sentence Summary
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt #3: “I’m a Manager. Explain to Me What Happened”'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'When you don’t want to sound like the one person that doesn’t understand, ChatGPT
    has the capability to rephrase what has been said and break it down until it’s
    very simple (Listing [3-10](#PC10)).**System**: You are a helpful assistant**User**:  Fatima
    [16:00 | 02/08/2019]: Hey everyone, I have an urgent ...**User**: Summarize this
    conversation and explain it to me like I''m a manager with little technical experience.**Model**:
    gpt-3.5-turbo**Temperature**: 0.82**Maximum length:** 750**Top P:** 1**Frequency
    penalty:** 0**Presence penalty:** 0Listing 3-10'
  prefs: []
  type: TYPE_NORMAL
- en: PROMPT. Asking for a Simplified Version of a More Complex Conversation
  prefs: []
  type: TYPE_NORMAL
- en: Again, the temperature is set below 1.0 so that ChatGPT can keep the answer
    brief and easy to understand. We increased the token length so that ChatGPT can
    take the time to explain some potentially technical concepts.![](../images/607613_1_En_3_Chapter/607613_1_En_3_Figk_HTML.gif)The
    Chat G P T logo.In this conversation, Fatima brings up an urgent issue with a
    client who is experiencing app crashes as soon as they load it. Keith assigns
    John to investigate the issue since their architect is out sick. John asks Fatima
    to gather additional information from the client about their device, operating
    system, and recent updates. Dave emphasizes the importance of keeping the client
    informed throughout the troubleshooting process.John checks the codebase but doesn't
    find any obvious issues, so he suspects it could be a memory-related problem.
    Keith agrees to check for memory-related anomalies in recent releases. Fatima
    provides an update that the client is using an iPhone X running iOS 15.1 and mentioned
    that the issue started after updating the app. Keith suggests testing the latest
    app update on an iPhone X simulator with iOS 15.1 to replicate the issue.John
    successfully reproduces the crash on the emulator and identifies a compatibility
    issue with iOS 15.1, possibly due to a deprecated method call. He fixes the issue
    and prepares a patch for review and deployment. Keith approves the patch and asks
    John to update the app in the store. Dave requests that the client be kept informed
    and that the release notes reflect the upcoming fix.John uploads the patch and
    informs the client about the fix. Keith reviews and approves the patch, and John
    proceeds with updating the app in the store. Fatima informs the client about the
    fix, and they express relief and gratitude for the prompt response. Dave commends
    the team for their collaboration and quick action, emphasizing the importance
    of maintaining good work.In summary, the team quickly addressed an urgent issue
    where a client's app was crashing on load. They investigated the issue, identified
    a compatibility problem with iOS 15.1, fixed it, and prepared a patch for deployment.
    The client was kept informed throughout the process, and the fix was successfully
    implemented, resulting in a relieved and grateful client.Listing 3-11
  prefs: []
  type: TYPE_NORMAL
- en: RESPONSE. Getting a Simplified Version of a More Complex Conversation
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt #4: “Give Me Suggestions on Next Steps”'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'In addition to making a summary that’s easier to understand, ChatGPT can explain
    in different styles and “tones.” We’re going to increase the top P to 0.75 because
    we want ChatGPT to think of more possibilities than what is the default. We are
    also going to increase the presence penalty to 0.5 because we want to encourage
    a versatile response.**System**: You are a helpful assistant**User**:  Fatima
    [16:00 | 02/08/2019]: Hey everyone, I have an urgent ...**User**: I''m a QA engineer
    at the company. Give me suggestions on next steps.**Model**: gpt-4**Temperature**:
    1**Maximum length:** 1200**Top P:** 0.75**Frequency penalty:** 0**Presence penalty:**
    0.5Listing 3-12'
  prefs: []
  type: TYPE_NORMAL
- en: PROMPT. Asking to ChatGPT for Advice on the Best Next Steps
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/607613_1_En_3_Chapter/607613_1_En_3_Figl_HTML.gif)The Chat G
    P T logo.As a QA engineer, here are some suggestions for next steps:1\. Test the
    patch: Once the patch has been deployed to the app store, thoroughly test it on
    various devices and operating systems to ensure that the issue has been resolved
    and there are no new bugs or regressions introduced.2\. Conduct regression testing:
    In addition to testing the specific issue, perform a comprehensive regression
    test to ensure that the fix does not have any unintended side effects on other
    functionalities of the app.3\. Communicate the fix to the client: Keep the client
    updated on the progress and let them know that the fix is available in the latest
    app update. Provide them with clear instructions on how to update their app and
    encourage them to test it on their end as well.4\. Monitor user feedback: Keep
    an eye on user feedback after the fix has been deployed. Encourage users to report
    any issues they encounter, and be proactive in addressing them promptly.5\. Document
    the issue and resolution: Create a detailed report documenting the issue, the
    steps taken to reproduce and resolve it, and any other relevant information. This
    will serve as a reference for future troubleshooting and help improve the development
    process.6\. Conduct a post-mortem analysis: After the issue has been resolved
    and the fix has been deployed, schedule a post-mortem meeting with the team to
    discuss the root cause, lessons learned, and any process improvements that can
    be implemented to prevent similar issues in the future.7\. Continuous improvement:
    Use this incident as an opportunity to identify areas of improvement in the development
    and testing processes. Evaluate if there are any changes that can be made to prevent
    similar issues from occurring in the future.Remember, open communication, collaboration,
    and continuous learning are key to ensuring the highest quality of your app and
    maintaining a strong relationship with your clients.Listing 3-13'
  prefs: []
  type: TYPE_NORMAL
- en: RESPONSE. Suggestions from ChatGPT on Possible Next Steps
  prefs: []
  type: TYPE_NORMAL
- en: Now, of course, ChatGPT (like every other form of artificial intelligence on
    the planet) is not entirely perfect. For instance, recommendation number 3 is
    a valid item to do, except for the fact that it’s not usually the responsibility
    of a QA person in order to communicate anything directly to the client or customer.
    That communication can be done either through tech support, or with a product
    manager who has those communication channels (especially if they are a significant
    customer). So, the suggestion is fine, but it’s not appropriate for a person with
    that role within a company.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s Talk About Real Prompt Engineering
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: If you Google the term, “prompt engineering,” you’ll find a ton of examples,
    blogs, and even full websites with subscription plans that will try to convince
    you that the perfect prompts can be created by simply only using text. As you
    have seen from the examples above, prompt engineering cannot be accomplished solely
    by merely crafting textual inputs.
  prefs: []
  type: TYPE_NORMAL
- en: In reality, the process is quite similar to cooking a sophisticated meal. Imagine
    trying to cook, for example, beef bourguignon using only salt as the seasoning,
    and neglecting all other ingredients and spices! Honestly, the result would pale
    in comparison to the actual dish.
  prefs: []
  type: TYPE_NORMAL
- en: Similarly, try assembling an entire orchestra but only use one instrument and
    one musician. That’s an embarrassing “one man band.” Therefore, simply adjusting
    the text to the prompt isn’t enough in order to truly perform prompt engineering.
    The parameters such as the model’s temperature, which controls randomness; the
    top-p, impacting token probability; the specific model used; the number of tokens;
    and the other parameters to the endpoint all play highly pivotal roles in getting
    a great response.
  prefs: []
  type: TYPE_NORMAL
- en: This book is not about prompt engineering, since (as you can see from the explanation
    above) it truly involves several factors that don’t have anything to do with Java.
    However, you are highly encouraged to experiment with ALL the parameters to the
    models and endpoints provided by OpenAI to find what works best for your use case.
  prefs: []
  type: TYPE_NORMAL
- en: Registering a Slack Bot App
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Now that we know the various ways for ChatGPT to summarize a large body of text
    for us, let’s see what’s necessary in order to create a simple bot in Java that
    will programmatically grab all the messages from a channel within a Slack instance.
  prefs: []
  type: TYPE_NORMAL
- en: Note
  prefs: []
  type: TYPE_NORMAL
- en: In order to accomplish the steps, you will need to have administrative access
    to a Slack workspace. Most developers will **NOT** have these levels of permissions;
    therefore, in order to fully experiment, I recommend that you create your own
    personal Slack workspace for testing purposes. This way, you will have all the
    rights and privileges to install your Slack bot.
  prefs: []
  type: TYPE_NORMAL
- en: But one step at a time. First, we’re going to make our Slack bot app, so head
    over to Slack API website (Figure [3-1](#Fig1)).
  prefs: []
  type: TYPE_NORMAL
- en: '[https://api.slack.com/](https://api.slack.com/)![](../images/607613_1_En_3_Chapter/607613_1_En_3_Fig1_HTML.png)'
  prefs: []
  type: TYPE_NORMAL
- en: A screenshot of the Slack a p i interface. It displays the home screen with
    the dropdown under the Your Apps tab at the top.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 3-1
  prefs: []
  type: TYPE_NORMAL
- en: In Order to Create a Slack Bot, Go to the Slack API Website
  prefs: []
  type: TYPE_NORMAL
- en: Of course, you’ll need to have a Slack account in order for this to work, so
    if you don’t have one, then you need to create one first.
  prefs: []
  type: TYPE_NORMAL
- en: After you have logged in, go to the top-right of the page and navigate to “**Your
    apps ➤ Create your first app**”, as shown in Figure [3-1](#Fig1). In Slack terminology,
    a “bot” is an “app,” and bots are not allowed to run on a Slack instance unless
    they have been registered with Slack first.![](../images/607613_1_En_3_Chapter/607613_1_En_3_Fig2_HTML.png)
  prefs: []
  type: TYPE_NORMAL
- en: A screenshot of the Slack a p i interface is overlayed by the create an app
    popup box. It lists the options to create the app from scratch and the app manifest.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 3-2
  prefs: []
  type: TYPE_NORMAL
- en: Creating a New Bot App for Slack
  prefs: []
  type: TYPE_NORMAL
- en: As shown in Figure [3-2](#Fig2), you’ll be taken to the **Your Apps** page where
    you can manage your Slack apps. Immediately, you’ll see a popup to **Create an
    App** button in the middle of the screen.
  prefs: []
  type: TYPE_NORMAL
- en: Select the option to create your app **from scratch**. This is because we want
    to be able to manipulate all of the details of the application ourselves without
    overcomplicating things with a bunch of default settings.
  prefs: []
  type: TYPE_NORMAL
- en: Afterward, you’ll be prompted to specify a name for your bot and to select the
    workspace that you want your bot to have access to, as shown in Figure [3-3](#Fig3).
  prefs: []
  type: TYPE_NORMAL
- en: Click the **Create App** button to proceed.![](../images/607613_1_En_3_Chapter/607613_1_En_3_Fig3_HTML.png)
  prefs: []
  type: TYPE_NORMAL
- en: A screenshot of the Slack a p i interface is overlayed by the Name App and Choose
    workspace popup box. It lists the fields to enter the name and workspace to develop
    the app with cancel and create app buttons.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 3-3
  prefs: []
  type: TYPE_NORMAL
- en: Creating a New Bot App for Slack
  prefs: []
  type: TYPE_NORMAL
- en: Specifying What Your Bot Can (and Can’t) Do By Setting the Scope
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Now, you’ll be presented with a screen that has a ton of options for bots for
    Slack workspaces. The first thing you need to do, however, is from the sidebar
    on the left, click **OAuth & Permissions**.
  prefs: []
  type: TYPE_NORMAL
- en: Our bot is going to be pretty simple; all it needs to do is read the messages
    from a channel in order to give us a summary of what was said. In addition to
    reading the messages, we also need to know the names of the people in the Slack
    workspace; otherwise, we’ll get a UUID representation of the person instead of
    their name, which is meaningless to us.
  prefs: []
  type: TYPE_NORMAL
- en: So, scroll down and be sure to add the following OAuth Scopes to your Slack
    Bot, as shown in Figure [3-4](#Fig4).
  prefs: []
  type: TYPE_NORMAL
- en: channels:history
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: channels:read
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: users:read
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![](../images/607613_1_En_3_Chapter/607613_1_En_3_Fig4_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A screenshot of the Slack a p i interface. It displays the applications under
    the scopes. It lists the O Auth scope and description under the Bot token scopes.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 3-4
  prefs: []
  type: TYPE_NORMAL
- en: Adding Scopes for the Slack Bot App
  prefs: []
  type: TYPE_NORMAL
- en: Confirming Your Settings
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: After you’ve added the appropriate scopes for your bot, scroll back up and click
    **Basic Information** from the left side bar.
  prefs: []
  type: TYPE_NORMAL
- en: On the page that follows, you’ll see that there’s now a green checkmark beside
    “Add features and functionality,” which confirms that you’ve added your scopes
    correctly, as shown in Figure [3-5](#Fig5).![](../images/607613_1_En_3_Chapter/607613_1_En_3_Fig5_HTML.png)
  prefs: []
  type: TYPE_NORMAL
- en: A screenshot of the Slack a p i interface. The block information is selected
    under the settings that display the basic information. It reads the following
    options. Add features and functionality, install the app, and manage distribution.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 3-5
  prefs: []
  type: TYPE_NORMAL
- en: Confirm Your Settings
  prefs: []
