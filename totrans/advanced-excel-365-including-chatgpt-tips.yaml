- en: CHAPTER    1
  id: totrans-509
  prefs: []
  type: TYPE_NORMAL
  zh: 第一章
- en: Overview of Excel 2021
  id: totrans-510
  prefs: []
  type: TYPE_NORMAL
  zh: Excel 2021概述
- en: Introduction
  id: totrans-511
  prefs: []
  type: TYPE_NORMAL
  zh: 引言
- en: 'Excel 2021 is a subscription-based version of Microsoft Excel that is part
    of the Microsoft 365 suite of productivity tools. It is a cloud-based version
    of Excel that provides users with access to the latest features and updates. Here
    is an overview of some of the key features of Excel 2021:'
  id: totrans-512
  prefs: []
  type: TYPE_NORMAL
  zh: Excel 2021是微软Excel的订阅版，它是微软365生产力工具套件的一部分。这是一个基于云的Excel版本，为用户提供访问最新功能和更新的途径。以下是Excel
    2021的一些关键功能的概述：
- en: '■Collaborative Editing: Excel 2021 allows multiple users to edit a spreadsheet
    simultaneously, making it easier for teams to work together on projects.'
  id: totrans-513
  prefs: []
  type: TYPE_NORMAL
  zh: ■协作编辑：Excel 2021允许多个用户同时编辑电子表格，这使得团队更容易共同完成项目。
- en: '■Cloud Storage: Excel 2021 files are stored in the cloud, which means they
    can be accessed from anywhere with an internet connection.'
  id: totrans-514
  prefs: []
  type: TYPE_NORMAL
  zh: ■云存储：Excel 2021文件存储在云端，这意味着只要有互联网连接，就可以从任何地方访问。
- en: '■Power Query: Excel 2021 includes Power Query, a tool that allows users to
    connect to and import data from a variety of sources.'
  id: totrans-515
  prefs: []
  type: TYPE_NORMAL
  zh: ■Power Query：Excel 2021包括Power Query工具，它允许用户连接到并从各种来源导入数据。
- en: '■Dynamic Arrays: With dynamic arrays, users can perform calculations on a range
    of values and return multiple results in a single cell.'
  id: totrans-516
  prefs: []
  type: TYPE_NORMAL
  zh: ■动态数组：使用动态数组，用户可以对一系列值进行计算，并在单个单元格中返回多个结果。
- en: '■Artificial Intelligence: Excel 2021 includes AI-powered features that can
    analyze data and provide insights. This includes tools such as the Ideas feature,
    which suggests charts, graphs, and other visualizations.'
  id: totrans-517
  prefs: []
  type: TYPE_NORMAL
  zh: ■人工智能：Excel 2021包括AI驱动的功能，可以分析数据并提供见解。这包括如“想法”功能这样的工具，它建议图表、图形和其他可视化。
- en: '■New Chart Types: Excel 2021 includes new chart types, such as the funnel chart
    and the map chart, which allow users to display data in new and interesting ways.'
  id: totrans-518
  prefs: []
  type: TYPE_NORMAL
  zh: ■新的图表类型：Excel 2021包括新的图表类型，如漏斗图和地图图，允许用户以新的和有趣的方式展示数据。
- en: '■Improved Data Analysis: Excel 2021 includes new data analysis tools, such
    as the Data Types feature, which allow users to convert raw data into structured
    data that can be used in calculations and analysis.'
  id: totrans-519
  prefs: []
  type: TYPE_NORMAL
  zh: ■改进数据分析：Excel 2021包括新的数据分析工具，如数据类型功能，它允许用户将原始数据转换为可用于计算和分析的结构化数据。
- en: MS Excel is a spreadsheet software, which is a tool used to record data, support
    plotting, and analyze the entered data. This is a powerful tool with numerous
    features that can be used to track a budget, create a record of sales or invoices
    or maintain a training log. You can store the details of your products or service
    inquiries, or explore its other business applications.
  id: totrans-520
  prefs: []
  type: TYPE_NORMAL
  zh: MS Excel是一种电子表格软件，它是一种用于记录数据、支持绘图和分析输入数据的工具。这是一个功能强大的工具，具有许多功能，可用于跟踪预算、创建销售或发票记录或维护培训日志。您可以存储您产品的详细信息或服务查询，或探索其其他商业应用。
- en: As in the previous version, this version has a set of menus at the top of the
    window known as the Ribbon. All the Excel commands are present on the menu. An
    Excel document is known as a Workbook, and each Workbook is divided into a set
    of rows and columns. An intersection of this tabular structure is known as a Cell.
    Data is entered into cells. In fact, all operations performed in the spreadsheet
    are applied to the cells. MS Excel has a set of tools by which users can format
    data, perform analysis, and create charts.
  id: totrans-521
  prefs: []
  type: TYPE_NORMAL
  zh: 与之前版本一样，本版本在窗口顶部有一组称为功能区（Ribbon）的菜单。所有Excel命令都显示在菜单上。Excel文档称为工作簿（Workbook），每个工作簿都分为一组行和列。这种表格结构的交叉点称为单元格。数据输入到单元格中。实际上，在电子表格中执行的所有操作都应用于单元格。MS
    Excel有一套工具，用户可以使用这些工具格式化数据、执行分析和创建图表。
