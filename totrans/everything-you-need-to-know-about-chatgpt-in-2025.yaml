    ****o****n**** ****a**** ****la**r**g**e** ****sc**a**l**e**.'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 在2019年，OpenAI推出了**GPT-2**，这是一个显著更大的模型，拥有15亿个参数。这种规模的增长导致了文本生成质量和一致性的显著提升。首次，用户可以与一个能够产生令人惊讶的人类响应的AI进行交互，尽管它在理解复杂语境或长期一致性方面存在限制。**GPT-2**的推出并非没有争议；OpenAI最初出于对其误用的担忧而保留了模型的完整版本，例如在大规模上生成虚假信息。
