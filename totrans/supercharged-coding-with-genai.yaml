  type: TYPE_TB
- en: '16'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Architecture, Design, and the Future
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'It seems that every discussion about the future of **artificial intelligence**
    (**AI**) bears considering the famous quote of Niels Bohr: “*Prediction is very
    difficult, especially if it’s about the future*.” When it comes to AI, though,
    we already have ideas about what the future will bring. That is, we have read
    various science fiction books by Asimov and other authors. We have watched *The
    Terminator* and other futuristic movies and TV shows. Even cartoons across different
    generations embody different versions of the future, whether it’s *The Jetsons*,
    *Futurama*, or various anime. We have conceptions of what the future looks like;
    the uncertainty rests on how long it will take to get there.'
  prefs: []
  type: TYPE_NORMAL
- en: With the increasing investments in AI and their exponential growth, the fields
    of AI and GenAI continue to evolve and bring new capabilities faster than most
    practitioners expect, let alone can keep up with. The landscape of software engineering
    is changing as a result of the new capabilities brought about by AI and GenAI
    for coding. Before we can look forward and estimate the timeframes for advancements
    in the future, it is useful to look back and understand the major technological
    advances that have accelerated the transformation over the past 10 years. This
    chapter briefly reviews these major advances as a conceptual framework for what
    happens next.
  prefs: []
  type: TYPE_NORMAL
- en: This book enables readers to embrace these changes and gain the skills to effectively
    use them for not just coding but a range of software engineering skills. As we
    all continue to learn, it is useful to understand the impact of these advances
    on the industry. These include the impact on software engineers and their companies,
    as well as what the future might bring.
  prefs: []
  type: TYPE_NORMAL
- en: 'In this chapter, we explore the following topics:'
  prefs: []
  type: TYPE_NORMAL
- en: The rapid rise of GenAI
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The economics of faster software development
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The shifting landscape of software developers
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Will GenAI change programming languages?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The future of GenAI in software engineering
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The rapid rise of GenAI
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: It was only in late 2012 that Thomas Davenport and DJ Patil declared that data
    science is the “*sexiest job of the 21st century*” in their Harvard Business Review
    article ([https://hbr.org/2012/10/data-scientist-the-sexiest-job-of-the-21st-century](https://hbr.org/2012/10/data-scientist-the-sexiest-job-of-the-21st-century)).
    Just over a decade later, the pace of transformation in the industry has been
    nothing short of remarkable.
  prefs: []
  type: TYPE_NORMAL
- en: In the same period of the last decade, neural networks were finally making their
    third resurgence after a couple of AI winters. Although neural network research
    started back in the 1950s, it faced difficulties in reaching its extremely hyped
    expectations, which resulted in periods of minimal funding and research known
    as the “AI winters.” By 2012, new neural network architectures had emerged. AlexNet,
    a type of **convolutional neural network** (**CNN**), drew widespread attention
    from the computer vision community after winning the **ImageNet Large Scale Visual
    Recognition Challenge** (**ILSVRC**) in 2012 by a wide margin. This changed the
    course of computer vision as all image understanding work quickly shifted to CNNs.
    The ensuing research over the next few years led to the ability of CNNs to extract
    information from images as accurately as humans by 2016, according to the ILSVRC
    competition, although human accuracy levels are still disputed.
  prefs: []
  type: TYPE_NORMAL
- en: While computer vision work was advancing through the CNN architecture, the **transformer
    architecture** was introduced through a 2017 paper from Google. This *Attention
    Is All You Need* paper ([https://arxiv.org/abs/1706.03762](https://arxiv.org/abs/1706.03762))
    describes an **attention mechanism** and the transformer architecture. In the
    years since, this architecture has had a massive impact on neural networks and
    the field of AI. Although it has improved solutions for many diverse problems
    within AI, its primary beneficiary has been the subfield of **natural language
    processing** (**NLP**). The work of this paper led to the adoption of **large
    language models** (**LLMs**).
  prefs: []
  type: TYPE_NORMAL
- en: LLMs have had a profound impact on the public perception of AI, though the early
    generations of this technology were far less impressive. GPT-1 and GPT-2 were
    released by OpenAI in 2018 and 2019 and served as a step forward in LLMs. These
    models are essentially prediction models trained on large volumes of text to predict
    the next word. The transformer architecture learned the relationship between the
    words in a sentence to predict the next word. Empirical research found that the
    LLMs performed significantly well with ever larger models trained on ever more
    data. GPT-3 was released in 2020 with 175 billion parameters as compared to the
    1.5 billion parameters of GPT-2\. GPT-4, released in March 2023, scaled up to
    an estimated 1.76 trillion parameters, a 10-fold increase over GPT-3.
  prefs: []
  type: TYPE_NORMAL
- en: InstructGPT and ChatGPT were developed as new tools that utilize underlying
    GPT LLMs. InstructGPT was designed to generate text for specific tasks that follow
    user instructions. These tasks could be emails, summaries, or even code. InstructGPT
    included AI predictions based on training data as well as a **reinforcement learning**
    technique based on human feedback to adjust the next word predictions based on
    a human feedback mechanism. In contrast, the release of OpenAI’s **ChatGPT** in
    November 2022 was based on GPT-3.5 and was arguably the first time an average
    user could interact with an LLM without having to program. It focused on conversations
    with users and general dialogue but also included the reinforcement learning method.
    These two tools developed many of the LLM methods that led to the **prompting
    techniques** field.
  prefs: []
  type: TYPE_NORMAL
- en: The LLM and ChatGPT methods focus on accurately predicting the next words across
    languages. The same models have opened other research avenues by training on other
    types of data. Instead of training on text, researchers in biology have found
    that the same results can be applied to genomes and protein sequence predictions.
    Chemists are using the technology to create new drugs and chemical substances
    with specialized properties. This book, of course, is based on the same idea of
    applying the same prediction techniques to code by training on public code bases.
  prefs: []
  type: TYPE_NORMAL
- en: A few years ago, AI was rarely discussed in the media. Today, the financial
    news seems to focus on the recent technology advances and their implications for
    the markets and the larger economy. The next section discusses some of the economic
    issues that GenAI coding may offer.
  prefs: []
  type: TYPE_NORMAL
- en: Economics of faster software development
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Software development is one of the key enablers of technology and the digital
    economy. Software impacts many aspects of modern society, from governments to
    businesses. Most industries rely on software. Software is closely tied to the
    productivity of workers across the globe, making it a key economic measure.
  prefs: []
  type: TYPE_NORMAL
- en: The field of software economics researches and estimates the value provided
    by software against the costs associated with its development. Software platforms
    and tools are designed to provide incremental business/economic value to the organizations
    using them. The key decisions of buying **commercial off-the-shelf** (**COTS**)
    software, licensing software, customizing third-party software, or building it
    in-house are based on the estimated incremental value proposition.
  prefs: []
  type: TYPE_NORMAL
- en: With GenAI, software engineers can write quality code substantially faster.
    With the techniques described in this book, the efficiency in writing code should
    improve and the quality of the produced code should remain quite high. The ability
    to automate the testing and documentation further reduces the costs of software
    development. In financial terms, the use of GenAI by the same workforce would
    result in an increased supply of software. The current costs for the GenAI coding
    empowerment remain $25/month or under, which is arguably a bargain. The reduced
    cost will increase the demand for software, creating greater automation and adding
    value for businesses. There are always more problems to solve, and the lower development
    cost barrier will alter the economics of software engineering. To reap these benefits,
    software engineers need to begin using this technology, which is discussed in
    the next section.
  prefs: []
  type: TYPE_NORMAL
- en: Will GenAI be adopted by software engineers?
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: The improved efficiency, speed, and capability that GenAI brings for software
    engineers is at least a paradigm shift but may be a revolution in the way that
    software is being developed. As discussed in this book, the current capabilities
    of GenAI include many of the tasks that software engineers engage in daily. These
    include writing code and tests, generating documentation, refactoring, and optimizing
    code. GenAI aids with the cognitively complex tasks of code debugging down to
    the less mindful tasks of conforming to code style.
  prefs: []
  type: TYPE_NORMAL
- en: Gartner predicts that 50% of software engineers will use AI-powered coding tools
    by 2027, which is up from the 5% in 2023 when GenAI was at the peak of the hype
    cycle ([https://www.gartner.com/en/newsroom/press-releases/2023-11-28-gartner-hype-cycle-shows-ai-practices-and-platform-engineering-will-reach-mainstream-adoption-in-software-engineering-in-two-to-five-years](https://www.gartner.com/en/newsroom/press-releases/2023-11-28-gartner-hype-cycle-shows-ai-practices-and-platform-engineering-will-reach-mainstream-adoption-in-software-engineering-in-two-to-five-years)).
    Over the last two years, GenAI tools have rapidly shifted from marginally useful
    due to their many errors to widespread tools that software engineers and corporations
    find valuable. In this brief period, KPMG claims that GenAI has become a software
    engineer’s most valuable coding partner ([https://kpmg.com/us/en/articles/2023/generative-artificial-intelligence.html](https://kpmg.com/us/en/articles/2023/generative-artificial-intelligence.html)).
    Over the next few years, these tools will continue to evolve and produce ever
    higher quality code, test instances, docstrings, and documentation.
  prefs: []
  type: TYPE_NORMAL
- en: Given the improved accuracy and overall efficiency that GenAI coding provides,
    the effect may not be uniform across all ranks of developers. The next section
    examines how the tools may affect different classes of programmers.
  prefs: []
  type: TYPE_NORMAL
- en: Shifting landscape of software developers
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: At the current market pricing, GenAI tools are generally available to all developers.
    It is interesting to speculate how the software engineer landscape may change
    due to this recent technology. Some have suggested that GenAI tools will level
    the playing field since any developer will be able to program with increased efficiency
    in any language. They argue that junior developers may take over more roles and
    increase the volume of code delivered, and more senior developers will be pushed
    out of organizations. Others argue the opposite.
  prefs: []
  type: TYPE_NORMAL
- en: The rise of GenAI tools has also lowered the barrier for software development.
    Programming in each language has a steep learning curve since it includes syntax,
    algorithms, libraries, **integrated development environments** (**IDEs**), compiler
    messages, and more. Printing the “hello world” message in any language is usually
    the first accomplishment. If coding a new language is like reading the front page
    of a foreign language newspaper, GenAI for coding is a tutor that shows the meaning
    of all words and explains the grammar upon request. For coding alone, a junior
    developer may quickly become productive in straightforward coding.
  prefs: []
  type: TYPE_NORMAL
- en: Tools such as ChatGPT and GitHub Copilot will empower developers to quickly
    learn and become productive in new programming languages. There are always new
    languages and frameworks that all software engineers must continually learn and
    apply to projects. The implication is that developers can more quickly get up
    to speed with new languages and frameworks and become productive in far less time.
    This has implications for not only new languages but also older languages such
    as COBOL, FORTRAN, and others that are still running in legacy systems, described
    later in this section.
  prefs: []
  type: TYPE_NORMAL
- en: Our perception is that the landscape will shift toward senior developers, and
    more junior developers may be displaced by the GenAI tools. If we consider a typical
    software engineering or computer science undergraduate curriculum, the primary
    technical courses include calculus, programming, data structures, algorithms,
    and maybe software engineering. The more advanced courses will include networking,
    compilers, operating systems, big data, AI, programming language theory, optimizations,
    cloud computing, and much more.
  prefs: []
  type: TYPE_NORMAL
- en: Junior developers tend to focus more on writing code, tests, and documentation,
    while the more senior developers focus on the complex interplay between the system
    requirements, stakeholders, architecture, design, and other aspects that tend
    to require more experience. The GenAI efficiencies clearly overlap the skillsets
    of the junior developers, but not the senior developers.
  prefs: []
  type: TYPE_NORMAL
- en: GenAI as related to the Software Engineering Body of Knowledge
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Another viewpoint is that GenAI performs very well within a limited scope of
    coding within software engineering. The IEEE Computer Society produces a **Software
    Engineering Body of Knowledge** (**SWEBOK**). The current version, developed in
    2024, captures the collective skills, methodologies, knowledge, and so on for
    the software engineering profession. It has been curated by experts with the goal
    of reaching a consensus on the core body of knowledge. *Table 16.1* lists the
    18 **knowledge areas** (**KAs**) found in the SWEBOK guide, available at [https://www.computer.org/education/bodies-of-knowledge/software-engineering](https://www.computer.org/education/bodies-of-knowledge/software-engineering):'
  prefs: []
  type: TYPE_NORMAL
- en: '| **Software requirements** | **Software architecture** | **Software design**
    |'
  prefs: []
  type: TYPE_TB
- en: '| Software construction | Software testing | Software engineering operations
    |'
  prefs: []
  type: TYPE_TB
- en: '| Software maintenance | Software configuration management | Software engineering
    management |'
  prefs: []
  type: TYPE_TB
- en: '| Software engineering process | Software engineering models and methods |
    Software quality |'
  prefs: []
  type: TYPE_TB
- en: '| Software security | Software engineering professional practice | Software
    engineering economics |'
  prefs: []
  type: TYPE_TB
- en: '| Computing foundations | Mathematical foundations | Engineering foundations
    |'
  prefs: []
  type: TYPE_TB
- en: 'Table 16.1: Software Engineering Body of Knowledge (SWEBOK) 2024 V4'
  prefs: []
  type: TYPE_NORMAL
- en: Compared to the SWEBOK, GenAI enhances a few processes but only a fraction of
    the overall skillset currently. Specifically, it directly enhances software construction
    and software testing. Indirectly, it helps support software maintenance and software
    quality KAs.
  prefs: []
  type: TYPE_NORMAL
- en: Democratization of software engineers
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The GenAI tools will help a wider audience than many people expect. We have
    discussed how junior software engineers and those getting up to speed in a new
    language can receive help with their programming. Senior developers can leverage
    their architectural, design, and other software systems experience. There is a
    wide class of former developers who have software experience but have shifted
    into other roles in computational biology, finance, business, or management.
  prefs: []
  type: TYPE_NORMAL
- en: Former programmers who have left the field to take on different responsibilities
    may return to coding in the near future with the GenAI tools. If they have been
    out of programming for several years, they would need to learn new languages,
    cloud computing, new IDEs, and so on. Normally, they would be unlikely to invest
    considerable time learning this multitude of new skills. However, with GenAI,
    they are now empowered to write niche applications within their specific roles
    that use their expertise. The implications are that part of software engineering
    may shift somewhat from being a domain-independent technical skill to an extra
    skill of domain experts. That is, rather than hiring expert software engineers
    who have traditionally applied their technical skills to write code for banking,
    healthcare, or other industries, these industries may turn to experienced practitioners
    in their field who can also program. We started to experience some of this with
    **robotic process automation** (**RPA**), where the subject matter experts learned
    the tools and drove specific workflows. In the last couple of years, we have seen
    similar domain experts learning prompt engineering to leverage LLMs in their workflow
    pipelines. We see a similar shift in the democratization of AI, where subject
    matter experts may be replaced by subject matter experts with AI experience.
  prefs: []
  type: TYPE_NORMAL
- en: Legacy software and flexible teams
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: With the explainability and guidance of GenAI technology, software development
    will certainly change corporate and industry approaches to software, especially
    legacy systems. Many companies and industries rely on legacy software systems
    developed decades ago and continue to run. The systems may be decades old and
    written in a language that only one or two people in the company have ever learned.
    The software systems pose a significant risk to organizations. They may run on
    legacy hardware, but they are still part of existing workflows. Efforts to understand,
    let alone rewrite, such systems have been cost-prohibitive.
  prefs: []
  type: TYPE_NORMAL
- en: GenAI systems can now be trained on the code bases and both provide support
    for understanding the code and perhaps enable them to be quickly rewritten. Using
    similar technology to human language translation, the code can use GenAI techniques
    to efficiently rewrite the full code base, adhere to the more recent documentation
    and testing strategies, and eliminate the risk. In terms of staffing, this would
    reduce the need to keep developers with specialized language ability or experience
    with these legacy systems.
  prefs: []
  type: TYPE_NORMAL
- en: As the barriers with legacy systems decrease, software engineers may become
    empowered to work on a wider set of projects. While subject matter knowledge in
    the industry domain is critical, the coding implementation has become more accessible
    through GenAI.
  prefs: []
  type: TYPE_NORMAL
- en: With GenAI, coders can more quickly get up to speed with new code bases and
    become productive, but this has implications. The speed provided by GenAI increases
    the flexibility of developer teams. Developers can shift more quickly between
    projects and gear up for new projects. With agile project development practices
    and changing requirements, this is certainly a positive outcome. However, this
    flexibility would also presumably lead to increased outsourcing of code development
    since offshore teams could also quickly ramp up to tackle projects in a similar
    fashion. This is not a new trend, and many teams still rely on senior developers,
    designers, and business analysts who interact with customers.
  prefs: []
  type: TYPE_NORMAL
- en: This section focused on the people involved in software engineering and the
    impact of GenAI on the field. The next section discusses the potential opportunities
    for computer languages to change based on GenAI capabilities.
  prefs: []
  type: TYPE_NORMAL
- en: Will GenAI change programming languages?
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: The traditional art and science of writing software involves creating a set
    of instructions that a computer can follow. This communication currently occurs
    through a specific programming language. The instructions usually include combinations
    of data structures that store and manipulate data. The instructions may include
    algorithms that efficiently sort, manipulate, or transform data to add business
    value. Most programming languages can perform these operations, but their true
    power is only achieved when using added libraries or packages that enable user
    interfaces, networking, database interaction, and much more.
  prefs: []
  type: TYPE_NORMAL
- en: Our GenAI coding tools today focus on writing and modifying our code. That is,
    ChatGPT, OpenAI API, and GitHub Copilot serve as programming assistants that guess
    the specific programming language code lines from the method signature. While
    this speeds up our programming at the method level, it requires that the developer
    have knowledge of how the problem breaks down into multiple methods and the transmission
    of information between the methods as dictated by their signature.
  prefs: []
  type: TYPE_NORMAL
- en: We can draw parallels between writing a document using an LLM and writing code
    using GenAI. ChatGPT and other LLMs are remarkable at rephrasing text for technical
    audiences, doctors, or children. This is equivalent to refactoring code. To write
    a letter from scratch, it’s not a single command but a series of prompts that
    map out the instructions and sequence. Similarly, one does not write the entire
    code file but must break it down into a series of commands that can each be developed
    into code. Throughout this book, we have provided many examples that illustrate
    that GenAI will usually write reasonable functional code. However, by breaking
    functions into smaller units, the GenAI will produce higher-quality and more readable
    code that is easier to maintain.
  prefs: []
  type: TYPE_NORMAL
- en: The next stage of GenAI software development is possibly a more natural language
    way of communicating with computers. While computer languages emphasize the precision
    of commands, they require an unnatural and more formal structure for communicating
    ideas. This requires a learning curve and arguably slows down development. Natural
    language could speed up the translation into computer-readable form and enable
    greater accessibility to software.
  prefs: []
  type: TYPE_NORMAL
- en: The rise of natural languages for computer instructions will likely require
    some time and face some hurdles that can be overcome with pseudocode. Three of
    the formal steps of computer languages are sequences, iterations, and selection
    (conditions). The interaction of these elements is the formal control flow of
    computer programs. Natural language can handle the sequences and conditional flows
    reasonably well, but the notion of iteration loops is arguably not commonly part
    of languages. Pseudocode represents a somewhat arbitrary syntax but captures the
    three formal steps well. General pseudocode that can be interpreted by LLMs to
    produce formal programming languages may further empower a wider set of developers.
  prefs: []
  type: TYPE_NORMAL
- en: The future of GenAI in software engineering
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: This section first discusses vibe coding and then breaks down the future of
    software engineering into two different horizons. The shorter term considers the
    next few years, and the longer term considers what the field might look like in
    five or more years.
  prefs: []
  type: TYPE_NORMAL
- en: Vibe coding
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Vibe coding is a recent trend where the developer describes what they want to
    do in natural language and leaves the technical coding aspects up to the LLM.
    Using LLMs to write code is certainly a theme of this book, and vibe coding essentially
    takes this to an extreme. Essentially, vibe coding provides a form of rapid prototyping
    that is a valuable part of the overall software engineering process, particularly
    in defining requirements. We believe the software community will come to recognize
    its value as such. However, for larger projects, code quality is important since
    most of the costs associated with software are in its maintenance, such as adding
    new features. Many unhappy memes describe the difficulty of “vibe debugging” the
    relatively poor-quality code produced by vibe coding. we expect a future that
    lands somewhere between where we are now and vibe coding. We will describe the
    shorter- and longer-term expectations next.
  prefs: []
  type: TYPE_NORMAL
- en: Shorter term
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Over the last year, the GenAI market has blossomed, and many developers are
    now working with this technology. It is available as a VSCode extension, Jetbrains
    products including PyCharm plugin, and other integrated development environments
    (IDEs) so it’s readily available. In addition, new IDEs with built-in GenAI capabilities
    have entered the market, including Cursor, Windsurf, and Replit. Other tools,
    such as AWS CodeWhisperer and Tabnine, offer code suggestions for multiple languages.
    All of these are offered at a low price, compared to the potential savings of
    developer time. In the short term, all of these will increase their accuracy and
    lead to the creation of better software in less time.
  prefs: []
  type: TYPE_NORMAL
- en: Longer term
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: After many have adopted the GenAI coding approaches and can use them effectively,
    the technology push will focus on trying to move from formal requirements and
    specifications to code. As one of the first steps in the software development
    life cycle, requirements gathering is a formal process to understand the intended
    goals, the user interfaces, non-functional requirements, and so on. In many organizations,
    there are more formal diagrams, such as **Unified Markup Language** (**UML**),
    that describe the design. Others include sample user interface designs from **Balsamiq**
    and **Figma**. Efforts are underway to automatically convert these diagrams directly
    into code.
  prefs: []
  type: TYPE_NORMAL
- en: GenAI has not solved many of the other aspects of software development processes.
    The planning, designing, higher-level integration, DevOps, deployment, orchestration,
    and other aspects of software have had minimal impact from GenAI. We are excited
    about the long-term prospects, but do not have an opinion on when GenAI techniques
    will make meaningful strides in these areas.
  prefs: []
  type: TYPE_NORMAL
- en: Will AI replace software engineering?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The need for software engineering will continue for two reasons. First, we know
    that GenAI is much more effective at writing parts rather than full end-to-end
    content. For prose text, we don’t expect GenAI to draft full reports, but we can
    break it down into sections and paragraphs and use prompt engineering. It’s no
    surprise that some of the main use cases are web searches and summarization, which
    have weak parallels in software engineering and improving text, which is essentially
    refactoring. With software engineering, knowledge of software structure and supporting
    architectures is needed to break code into modules, files, and succinct methods.
    The need for human skills for these tasks will likely continue for several years,
    even though individual methods may be fully crafted using GenAI. Humans will shift
    to roles in architecture, design, and integration, and will still ultimately be
    responsible for validating the code.
  prefs: []
  type: TYPE_NORMAL
- en: The second reason is that GenAI is most effective when working with widely available
    code bases but often fails without such expansive sets of examples. Most software
    engineers need to learn a new language every 3–5 years on average. Certainly,
    some of this is due to switching jobs. However, new languages, frameworks, and
    new versions of both continue to emerge—none of which begin with sufficiently
    large code bases for training GenAI models. Domain-specific languages are another
    good example of limited training data. In addition, the newest technologies in
    databases, cybersecurity, quantum computing, and so on need software engineers
    since their respective code bases are still being written.
  prefs: []
  type: TYPE_NORMAL
- en: Risk and governance
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Humans are currently ultimately responsible for the code that is produced, but
    the use of GenAI raises a number of challenges. In heavily regulated industries
    such as transportation, banking, and healthcare, the use of AI will undergo significant
    scrutiny. The ability to provide explainability and understanding of which programmers,
    agents, or AI created different sections of code will likely become standard.
    The risks, legal responsibilities, and ethical considerations will need to address
    responsibilities and safeguards for software. The ethical, moral, and legal issues
    around self-driving cars today provide a good example of some of the considerations.
    MIT’s trolley problem ([https://en.wikipedia.org/wiki/Trolley_problem](https://en.wikipedia.org/wiki/Trolley_problem))
    and the Moral Machine ([https://en.wikipedia.org/wiki/Moral_Machine](https://en.wikipedia.org/wiki/Moral_Machine))
    provide further examples of the challenges.
  prefs: []
  type: TYPE_NORMAL
- en: Another challenge is the copyright issue of software. For regular texts, News
    Corp, the Financial Times, the Associated Press, and other media companies have
    negotiated agreements to license their text to OpenAI. Microsoft and Google have
    also negotiated with content providers to scale their training sets without violating
    copyright laws. For software code, the laws are less clear since it’s a relatively
    new problem that has not yet been resolved. It is certainly possible that the
    GenAI could duplicate copyrighted code. Since the accuracy of the GenAI depends
    in part on the size of the training set, more code licensing may be required to
    improve performance.
  prefs: []
  type: TYPE_NORMAL
- en: The education in programming languages and the evaluation of skills must also
    adapt. Schools and universities have taught programming skills for decades. Just
    as spelling and grammar checkers are standard practice for writing reports, GenAI
    is likely to eventually not just be accepted but be a required part of software
    development. Universities have tended to focus more on the language nuances and
    syntax rather than the set of available tools, such as compilers, debuggers, and
    linters. However, ignoring GenAI will be difficult since it will be used extensively.
    Job interviewers have often used LeetCode forms of technical questions to weed
    out candidates, even though many of the questions are more academic than common
    industry practices. With GenAI, such low-level coding skills have become even
    less relevant, and we expect these forms of interview questions to evolve as well.
  prefs: []
  type: TYPE_NORMAL
- en: Summary
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: AI and GenAI capabilities have advanced rapidly over the past several years
    through a number of major technology innovations. With GenAI’s boost in software
    engineering productivity at a low price point, it will increase the volume of
    code written and lower the overall costs. This will change the software engineer
    landscape, perhaps to favor more senior developers with more experience in architecture,
    design, and SWEBOK. It may also enable specialists with deep domain experience
    to develop more code. Legacy systems may be rewritten with GenAI support, which
    will free companies to use software developers across projects in a more agile
    manner.
  prefs: []
  type: TYPE_NORMAL
- en: There is a strong movement toward adopting GenAI for coding, and it has already
    been integrated into many IDEs. In the longer term, we will see how it surpasses
    the coding tasks and enters more aspects of software engineering. GenAI still
    requires the communication of commands to computers, and natural language may
    eventually supplement or replace programming languages, but pseudocode may be
    the next frontier. The world will still need software engineers for the foreseeable
    future. There are still many issues to manage, from risk to compliance, but GenAI
    has arrived and is already supercharging software engineering.
  prefs: []
  type: TYPE_NORMAL
