- en: 4.2.1 Layer normalization
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Layer normalization (LayerNorm) is a technique used to introduce normalization
    operations within the layers of neural networks, particularly evident in GPT-2’s
    Transformer layers. Unlike its predecessor, GPT-1, GPT-2 incorporates a LayerNorm
    layer at both the input and output of each Transformer layer, ensuring normalization
    of these points. This method effectively combats common neural network training
    challenges such as gradient vanishing and explosion, thereby bolstering training
    stability and speeding up convergence.
  prefs: []
  type: TYPE_NORMAL
- en: Gradient issues, particularly vanishing and exploding gradients, are prevalent
    in deep neural networks due to the multilayer gradient propagation. Layer normalization
    counters this by standardizing the input data’s mean and variance to 0 and 1,
    respectively, ensuring uniformity across scales.
  prefs: []
  type: TYPE_NORMAL
- en: As illustrated in [Fig. 4.5](#f0030), normalization adjusts and balances the
    input data, setting its mean to 0 and variance to 1, which minimizes scale disparities.
    This adjustment not only facilitates smoother gradient flow during backpropagation
    but also stabilizes gradient variations throughout the training phase. Moreover,
    layer normalization tackles covariate shift—a scenario where training and testing
    data distributions do not align—by equating the scale of both datasets, thus boosting
    the model’s generalization capabilities. Ultimately, normalization ensures uniform
    gradient scaling across all dimensions, aiding optimizers in navigating the optimal
    direction for weight updates more effectively and accelerating the model’s convergence
    and overall training performance.
  prefs: []
  type: TYPE_NORMAL
- en: '![A diagram comparing Batch Normalization and Layer Normalization with mean
    and variance calculations for training examples and feature dimensions.](../images/F000047f04-05-9780443274367.jpg)'
  prefs: []
  type: TYPE_IMG
- en: '[Figure 4.5](#Bf0030) Illustration of two types of normalization. Image source:
    [https://blog.csdn.net/wwangfabei1989/article/details/90547149](https://blog.csdn.net/wwangfabei1989/article/details/90547149).'
  prefs: []
  type: TYPE_NORMAL
- en: On the left, Batch Normalization is shown with a batch of training examples.
    Each example has four features and the mean and variance are calculated for each
    feature across the batch. The mean values are 3, 2, 4 and 3 and the variance values
    are 3, 2, 3 and 1\. A note indicates All Training Examples are the Same. On the
    right, Layer Normalization is shown with the same batch of training examples.
    The mean and variance are calculated for each example across all features. The
    mean values are 2, 3 and 3 and the variance values are 2, 2 and 2\. A note indicates
    All Feature Dimensions are the Same.
  prefs: []
  type: TYPE_NORMAL
- en: 4.2.2 Orthogonal initialization
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Orthogonal Initialization is a method employed to set up neural network parameters,
    mainly focusing on the weight matrices. It initializes these matrices as orthogonal
    matrices to combat issues like gradient vanishing or explosion during the training
    phase.
  prefs: []
  type: TYPE_NORMAL
- en: GPT-2 follows a similar weight initialization strategy as GPT-1, specifically
    utilizing orthogonal initialization to ensure gradient stability throughout training.
    Orthogonal matrices, by design, consist of row and column vectors that are unit
    vectors and orthogonal to each other, with the property that the inverse of such
    a matrix is its transpose ($MathML$![Equation](../images/F000047si1.png)). These
    matrices are known for their robust numerical characteristics, such as having
    a condition number of 1, ensuring that they do not exacerbate errors in matrix
    calculations.
  prefs: []
  type: TYPE_NORMAL
- en: The key benefit of orthogonal initialization lies in its ability to stabilize
    gradients. During neural network operations, gradients need to traverse through
    various weight matrices. Improper initialization could result in gradients that
    either vanish (become too small) or explode (become excessively large), adversely
    impacting model training and convergence. Orthogonal matrices help mitigate this
    risk because their products remain orthogonal, maintaining consistent gradient
    norms across different layers.
  prefs: []
  type: TYPE_NORMAL
- en: '[Fig. 4.6](#f0035) illustrates an example of orthogonal initialization. The
    process begins by creating a random matrix with dimensions (*n, n*), each element
    drawn from a standard normal distribution. This matrix is then subjected to *QR*
    decomposition ($MathML$![Equation](../images/F000047si2.png)), where *Q* represents
    an orthogonal matrix and *R* an upper triangular matrix. The *Q* matrix from this
    decomposition serves as the initialized weight matrix, possessing favorable numerical
    qualities that contribute to gradient stability.'
  prefs: []
  type: TYPE_NORMAL
- en: '![Matrix A equals matrix Q times matrix R, where Q is an orthogonal matrix
    and R is an upper triangular matrix.](../images/F000047f04-06-9780443274367.jpg)'
  prefs: []
  type: TYPE_IMG
- en: '[Figure 4.6](#Bf0035) Illustration of *QR* decomposition. Note that orthogonal
    initialization is particularly effective for square weight matrices (*n, n*).
    For nonsquare matrices (*n*, *m*), a similar approach involves generating a random
    matrix and then performing a compact *QR* decomposition to extract the first *m*
    columns, resulting in an orthogonal weight matrix suited for initialization.'
  prefs: []
  type: TYPE_NORMAL
- en: Matrix A is represented by a square matrix with dots indicating the continuation
    of elements. Matrix Q is represented by a rectangular matrix with columns q sub
    1, q sub 2, through q sub n, where each column is separated by vertical lines.
    Matrix R is represented by an upper triangular matrix shaded in gray.
  prefs: []
  type: TYPE_NORMAL
- en: 4.2.3 Reversible tokenization
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: All models in the GPT series use a reversible tokenization method based on data
    compression known as byte-pair encoding (BPE). This algorithm reduces the vocabulary
    size by combining frequently appearing word pairs into new units. Since the tokenized
    text can be entirely reconstructed during decoding, this method is described as
    reversible.
  prefs: []
  type: TYPE_NORMAL
- en: 'The fundamental concept behind the BPE algorithm is to consolidate commonly
    occurring character combinations, like words or phrases, into new symbols. This
    process not only shrinks the vocabulary but also enhances the model’s ability
    to generalize, efficiently manages rare words and morphological changes, thereby
    boosting overall performance. The detailed steps involved in the BPE algorithm
    are as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '1. Vocabulary initialization: Initially, incorporate every word (or character)
    from the text into the vocabulary, with each entry representing a single character.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '2. Frequency counting of character pairs: Assess the frequency of each adjacent
    character pair within the text. These frequency counts help decide which pairs
    to merge into new symbols.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '3. Merge high-frequency character pairs: Find and merge the most frequently
    occurring character pair into a new symbol. This new symbol is then added to the
    vocabulary, and the text is updated to substitute the original character pairs
    with this new symbol.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '4. Iterative merging: Continue the process of counting and merging as needed,
    until reaching the predefined number of merges or the desired vocabulary size.
    Each cycle focuses on merging a new high-frequency pair, progressively enlarging
    the vocabulary to encompass longer subwords or phrases.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Here’s an example to illustrate BPE:'
  prefs: []
  type: TYPE_NORMAL
- en: '1. Start with a corpus and count the frequency of each word. The frequencies
    are noted in the format “[frequency]word_”, where “_” signifies the end of a word.
    For instance, the corpus might have: Corpus: [7]old_, [3]older_, [9]finest_, [4]lowest_.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 2. Determine the token vocabulary size or the number of iterations to stop the
    algorithm.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 3. Count the frequency of each character, including the end symbol “_”. Refer
    to [Table 4.1](#t0010).
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 4. Merge the two consecutive characters (or sequences) with the highest frequency.
    For example, in the first iteration, “*e*” and “*s*” might be merged into “es”
    since they appear together 13 times (9 + 4). Add “es” and its frequency to the
    vocabulary, and decrease the counts for “*e*” and “*s*.”
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 5. In the next iterations, “es” and “*t*” could be merged because “est” appears
    13 times, which is the highest frequency. Update the vocabulary to include “est”
    and reduce “*t*,” keeping the vocabulary length the same.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 6. Merge “est_,” also appearing 13 times. Merging with the termination marker
    is crucial. It helps distinguish words like “estimate” and “highest.” Both contain
    “est,” but one ends with “est_,” and the other starts with it. The algorithm treats
    “est” and “est_” differently, recognizing “est_” as part of “highest” and not
    “estimate,” as shown in [Table 4.2](#t0015).
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 7. Merge “ol,” which appears 10 times.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 8. If the iteration count is set to four, the final vocabulary would be (_,
    *o*, *l*, *d*, *r*, *f*, *i*, *n*, *w*, est, ol, est_).
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Table 4.1
  prefs: []
  type: TYPE_NORMAL
- en: Frequency of character occurrences.
  prefs: []
  type: TYPE_NORMAL
- en: '| Character | Frequency |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '| _ | 23 |'
  prefs: []
  type: TYPE_TB
- en: '| O | 14 |'
  prefs: []
  type: TYPE_TB
- en: '| L | 14 |'
  prefs: []
  type: TYPE_TB
- en: '| D | 10 |'
  prefs: []
  type: TYPE_TB
- en: '| E | 16 |'
  prefs: []
  type: TYPE_TB
- en: '| R | 3 |'
  prefs: []
  type: TYPE_TB
- en: '| F | 9 |'
  prefs: []
  type: TYPE_TB
- en: '| I | 9 |'
  prefs: []
  type: TYPE_TB
- en: '| N | 9 |'
  prefs: []
  type: TYPE_TB
- en: '| S | 13 |'
  prefs: []
  type: TYPE_TB
- en: '| t | 13 |'
  prefs: []
  type: TYPE_TB
- en: '| w | 4 |'
  prefs: []
  type: TYPE_TB
- en: Table 4.2
  prefs: []
  type: TYPE_NORMAL
- en: Example of character merging.
  prefs: []
  type: TYPE_NORMAL
- en: '| Character | Frequency |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '| _ | 23–13=10 |'
  prefs: []
  type: TYPE_TB
- en: '| O | 14 |'
  prefs: []
  type: TYPE_TB
- en: '| L | 14 |'
  prefs: []
  type: TYPE_TB
- en: '| D | 10 |'
  prefs: []
  type: TYPE_TB
- en: '| E | 3 |'
  prefs: []
  type: TYPE_TB
- en: '| R | 3 |'
  prefs: []
  type: TYPE_TB
- en: '| F | 9 |'
  prefs: []
  type: TYPE_TB
- en: '| I | 9 |'
  prefs: []
  type: TYPE_TB
- en: '| N | 9 |'
  prefs: []
  type: TYPE_TB
- en: '| W | 4 |'
  prefs: []
  type: TYPE_TB
- en: '| est | 13–13=0 |'
  prefs: []
  type: TYPE_TB
- en: '| est_ | 13 |'
  prefs: []
  type: TYPE_TB
- en: The description illustrates that the vocabulary length under BPE can increase,
    decrease, or remain stable. BPE efficiently compresses the original text into
    a shorter format while preserving patterns that frequently occur between characters.
    This method shines in NLP tasks where it excels at managing rare words and morphological
    variations by decomposing them into smaller subword units, improving model performance.
    In large-scale models like GPT-2, BPE facilitates better handling of diverse NLP
    tasks, enhancing both the model’s adaptability and effectiveness.
  prefs: []
  type: TYPE_NORMAL
- en: In terms of handling rare words, BPE excels by splitting infrequent words in
    training data into common subword units, enhancing the model’s ability to grasp
    their meanings. For instance, a seldom-seen word like “neuroscientific” could
    be segmented into “neuro,” “scien,” and “tific.” These subwords, appearing more
    frequently in training data, help the model easily acquire their semantic meanings.
  prefs: []
  type: TYPE_NORMAL
- en: BPE also effectively addresses morphological variations, which can inflate vocabulary
    sizes and complicate computations in many languages. By breaking down words like
    the English verbs “running” and “ran” into components such as “run,” “ning,” and
    “ran,” BPE enables the model to more adeptly learn about word roots and their
    morphological dynamics, simplifying the learning process and reducing computational
    demands.
  prefs: []
  type: TYPE_NORMAL
- en: The use of the BPE algorithm with Chinese text is notably more intricate than
    with English due to the fundamental differences in their vocabularies. In Chinese,
    each character typically has a distinct meaning, and words are often formed by
    combining these characters, each adding layers of meaning.
  prefs: []
  type: TYPE_NORMAL
- en: However, BPE faces some challenges with Chinese that it doesn’t with English.
    Unlike English, where morphological changes often involve clear prefixes and suffixes,
    Chinese variations are less straightforward, limiting the effectiveness of BPE
    in some scenarios. Addressing these challenges requires developing models and
    algorithms that are specifically geared towards the unique properties of the Chinese
    language.
  prefs: []
  type: TYPE_NORMAL
- en: In essence, the adoption of BPE in GPT series models significantly shrinks the
    vocabulary size, which in turn reduces the number of parameters the models need
    to learn. This reduction eases computational demands and accelerates both training
    and inference processes. Additionally, by leveraging the shared characteristics
    among subword units, these models gain enhanced capabilities to understand and
    represent the semantic details of words, boosting their effectiveness across a
    variety of NLP applications.
  prefs: []
  type: TYPE_NORMAL
- en: Moreover, BPE improves the GPT models’ handling of unfamiliar words. When encountering
    such words, the models can break them down into recognizable subword components
    to deduce their meanings, enhancing the models’ ability to generalize and manage
    new or uncommon words effectively.
  prefs: []
  type: TYPE_NORMAL
- en: In the context of transfer learning, BPE’s integration makes the GPT series
    especially potent. The models’ ability to learn and utilize commonalities among
    subword units across different tasks translates into superior performance in transfer
    learning scenarios, thus bolstering their flexibility across diverse NLP challenges.
  prefs: []
  type: TYPE_NORMAL
- en: For multilingual tasks, BPE’s role is crucial in enabling the GPT models to
    adeptly manage linguistic diversity. By identifying and utilizing common roots
    and morphological variations across languages, BPE equips GPT-2 with the ability
    to grasp and process multiple languages, leading to improved outcomes in multilingual
    contexts. This capability is particularly beneficial in today’s globally interconnected
    digital landscape.
  prefs: []
  type: TYPE_NORMAL
- en: BPE significantly boosts model efficacy in NLP tasks by reducing vocabulary
    size and, consequently, the number of parameters a model needs to master. This
    reduction not only mitigates the risk of overfitting but also allows models to
    more effectively grasp the semantic nuances of words. This enhanced understanding
    proves beneficial across a range of applications, from machine translation to
    semantic analysis and text generation.
  prefs: []
  type: TYPE_NORMAL
- en: Notably, starting with GPT-2, a variation of BPE known as byte-level BPE (BBPE)
    is employed. This adaptation extends the traditional BPE approach from character
    level to byte level. For instance, while traditional BPE struggles with the expansive
    Unicode character set, BBPE simplifies this by treating each byte as a fundamental
    processing unit, effectively limiting the basic character set to 256 ($MathML$![Equation](../images/F000047si3.png)).
    This approach facilitates vocabulary sharing across languages and reduces vocabulary
    size. However, a drawback emerges with languages like Chinese, where BBPE can
    considerably lengthen text sequences. As a result, while BBPE might outperform
    BPE on the same dataset, it can also lead to longer training and inference durations
    due to the increased sequence length.
  prefs: []
  type: TYPE_NORMAL
- en: 4.2.4 Learnable relative positional encoding
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: GPT-2, built on the Transformer architecture, incorporates a learnable relative
    positional encoding strategy to precisely capture positional information within
    input sequences. This approach uniquely considers both the absolute distances
    and the relative positions between tokens, greatly improving the model’s ability
    to understand long-range dependencies.
  prefs: []
  type: TYPE_NORMAL
- en: In GPT-2, relative positional encodings are seamlessly integrated into the self-attention
    mechanism and used alongside the *Q*, *K*, and *V* matrices to capture token relationships
    accurately. When calculating self-attention scores, the model evaluates not only
    the content relevance between tokens (through the dot product of *Q* and *K*)
    but also their relative positions (via relative positional encodings). These encodings
    are expressed through parameterized functions, such as sine and cosine functions,
    whose parameters are learned and optimized during the model training process.
  prefs: []
  type: TYPE_NORMAL
- en: To highlight the differences between the relative positional encodings in GPT-2
    and the traditional absolute positional encodings in the Transformer, consider
    an example with the sentence “The cat is cute.” Initially, this sentence is tokenized
    into [The, cat, is, cute,.]. In the traditional Transformer, this process involves
    adding a precomputed matrix based on sine and cosine functions to the embedding
    vectors, which imparts absolute positional information to the model.
  prefs: []
  type: TYPE_NORMAL
- en: GPT-2, however, approaches this differently. It doesn’t simply add positional
    encodings to the embeddings but integrates relative positional encodings during
    the self-attention calculations. These encodings are adaptable and based on the
    relative distances between tokens—for instance, the relative distance between
    “cat” and “cute” is 2\. In the computation of attention weights, these relative
    distances are combined with the content relevance between tokens, empowering the
    model to leverage positional information to refine the effectiveness of its self-attention
    mechanism.
  prefs: []
  type: TYPE_NORMAL
- en: While the traditional Transformer model utilizes a fixed matrix of absolute
    positional encodings added directly to embeddings, GPT-2 opts for a dynamic, more
    sophisticated strategy that intertwines learnable relative positional encodings
    with the self-attention process. This distinction marks a significant evolution
    in how positional information is utilized to enhance text processing capabilities
    in models.
  prefs: []
  type: TYPE_NORMAL
- en: 4.3 Unsupervised multitask learning
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: GPT-2’s unsupervised pretraining leverages the extensive WebText dataset, comprising
    about 450,000 web articles collected via OpenAI’s web crawler. After rigorous
    cleaning and filtering, this dataset encompasses around 40 GB, equivalent to nearly
    8 billion words. This considerable increase in dataset size over GPT-1’s dataset
    facilitates the development of more robust models.
  prefs: []
  type: TYPE_NORMAL
- en: Illustrated in [Fig. 4.7](#f0040), while multitask supervised learning focuses
    on predicting labels for unseen data based on labeled examples, GPT-2’s approach
    involves generating text that mimics the training data, all through unsupervised
    learning. Although not explicitly detailed in the literature, the core methodologies
    of GPT-1 and GPT-2 in pretraining are quite similar, both using extensive unlabeled
    text data within a Transformer framework.
  prefs: []
  type: TYPE_NORMAL
- en: '![A single-task learning versus multi-task learning with data input, models
    and predictions.](../images/F000047f04-07-9780443274367.jpg)'
  prefs: []
  type: TYPE_IMG
- en: '[Figure 4.7](#Bf0040) Concepts of multitask supervised learning and multitask
    unsupervised learning. Image source: [https://zhuanlan.zhihu.com/p/348873723](https://zhuanlan.zhihu.com/p/348873723).'
  prefs: []
  type: TYPE_NORMAL
- en: On the left side, there are three rows, each with a Data Input leading to Model
    1, Model 2, and Model k, respectively, which then lead to Prediction 1, Prediction
    2, and Prediction k. On the right side, a single Data Input leads to Multi-Task
    Learning, which then branches out to Prediction 1, Prediction 2, and Prediction
    k.
  prefs: []
  type: TYPE_NORMAL
- en: During its pretraining, GPT-2 employs a maximum likelihood estimation technique,
    guiding the model to predict subsequent words based on the context provided. This
    phase is crucial as it allows the model to assimilate vast linguistic knowledge
    and semantic nuances from the text it processes.
  prefs: []
  type: TYPE_NORMAL
- en: GPT-2’s strategy of unsupervised MTL is designed to enhance the model’s versatility
    and generalization by extracting and applying shared insights across various tasks
    from extensive text data. Though inherently unsupervised, GPT-2 often undergoes
    supervised fine-tuning for specific applications, enhancing its adaptability to
    particular tasks. This fine-tuning, while beneficial for targeted applications,
    typically restricts the model’s broader applicability to tasks similar to those
    it was specifically tuned for.
  prefs: []
  type: TYPE_NORMAL
- en: 4.4 The relationship between multitask and zero-shot learning
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: As depicted in [Fig. 4.8](#f0045), zero-shot learning in sample learning allows
    a model to tackle tasks using prior knowledge without any task-specific supervised
    training. GPT-2’s zero-shot learning ability stems from unsupervised MTL during
    its pretraining phase. In NLP, zero-shot learning can be viewed as unsupervised
    transfer across different subdomains. This implies that the knowledge the model
    gains during pretraining can be applied to various NLP tasks without needing specific
    supervised fine-tuning. However, zero-shot learning generally underperforms compared
    with supervised fine-tuning because it doesn’t use labeled data for the specific
    tasks.
  prefs: []
  type: TYPE_NORMAL
- en: '![A task description and a prompt. The task description is Translate English
    to French:. The prompt is Cheese =>.](../images/F000047f04-08-9780443274367.jpg)'
  prefs: []
  type: TYPE_IMG
- en: '[Figure 4.8](#Bf0045) Example of zero-shot learning. Image source: Paper “Language
    models are few-shot learners”.'
  prefs: []
  type: TYPE_NORMAL
- en: 'In GPT-2, MTL involves absorbing a large amount of natural language text during
    the unsupervised pretraining phase, capturing rich linguistic structures and semantic
    information. Zero-shot learning enables GPT-2 to handle various NLP tasks without
    specific task labels. MTL and zero-shot learning in GPT-2 complement each other.
    Zero-shot learning leverages the knowledge acquired during the unsupervised pretraining
    phase, allowing it to manage multiple tasks without additional supervised training.
    This approach offers GPT-2 broad application prospects. The following sections
    will explore the applications of zero-shot learning in GPT-2 through three specific
    tasks: reading comprehension, text summarization, and sentiment analysis.'
  prefs: []
  type: TYPE_NORMAL
- en: 'In a reading comprehension task, the model must generate answers to questions
    based on provided text. With zero-shot learning, GPT-2 does not receive task-specific
    fine-tuning. Instead, the question and text are input together, and the model
    generates the answer. The key lies in organizing the question and text into a
    sequence effectively. A common method is to concatenate the question with the
    given text segment, inserting a specific separator between them. For instance:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Question: How many planets are there in the solar system? Text: The solar system
    includes one star (the Sun) and eight planets. This can be organized as: “How
    many planets are there in the solar system? <SEP> The solar system includes one
    star (the Sun) and eight planets.” When this organized sequence is provided to
    the GPT-2 model, it may generate the answer “eight.”'
  prefs: []
  type: TYPE_NORMAL
- en: 'For a text summarization task, the model needs to extract key information from
    a longer text to create a concise summary. In zero-shot learning, this can be
    achieved by clearly specifying the task in the input sequence. For example, given
    the following text: Text: Computer science is the study of computers and their
    systems. Researchers in this field study not only the design and development of
    computer hardware but also programming languages, software design, algorithms,
    and other theories and practices related to computing.'
  prefs: []
  type: TYPE_NORMAL
- en: 'You would concatenate the task requirement with the text and input it into
    the model: “Generate a summary of the following text: Computer science is the
    study of computers and their systems. Researchers in this field study not only
    the design and development of computer hardware but also programming languages,
    software design, algorithms, and other theories and practices related to computing.”'
  prefs: []
  type: TYPE_NORMAL
- en: 'At this point, the GPT-2 model might produce a summary like: “Computer science
    studies computer systems, hardware design, software design, and algorithms.” Note
    that since the model hasn’t undergone supervised training specifically for text
    summarization, the quality of the generated summary might not be as high as that
    of a model trained with supervision. Nonetheless, this still showcases the model’s
    robust capability to perform multiple tasks without specific task training.'
  prefs: []
  type: TYPE_NORMAL
- en: 'In a sentiment analysis task, the model must recognize and understand the sentiment
    expressed in text, such as whether it is positive, negative, or neutral. In zero-shot
    learning, GPT-2 can generate sentences that capture the sentiment of the input
    text. For instance, given a product review: “The battery life of this phone is
    very long, and the camera performance is excellent,” you can prompt GPT-2 with:
    “The battery life of this phone is very long, and the camera performance is excellent.
    What is the sentiment of this review?” GPT-2 might respond with: “The sentiment
    of this review is positive.” This shows that GPT-2 can effectively perform sentiment
    analysis without specific task training.'
  prefs: []
  type: TYPE_NORMAL
- en: GPT-2 has shown outstanding performance across various zero-shot learning tasks.
    For example, in reading comprehension, GPT-2 achieved top results in the LAMBADA
    language modeling task without any supervised fine-tuning. In semantic similarity
    tasks, the STS-B (Semantic Textual Similarity Benchmark) task highlighted GPT-2’s
    strong zero-shot capabilities. In translation tasks, GPT-2 demonstrated a notable
    degree of translation ability in English-French and English-German translations,
    despite not being fine-tuned for these tasks. The paper also discusses GPT-2’s
    zero-shot learning performance in other NLP tasks like question answering and
    summarization. Although specific experimental setups for these tasks are not detailed
    in the paper, they were used to validate GPT-2’s zero-shot learning abilities.
  prefs: []
  type: TYPE_NORMAL
- en: 4.5 The autoregressive generation process of GPT-2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: During its unsupervised pretraining phase, GPT-2 absorbed a vast amount of knowledge
    from extensive natural language texts. This process optimized the model’s weight
    matrix, enabling it to excel in language modeling tasks. In zero-shot learning
    applications, this pretrained model is used as is, without any task-specific fine-tuning.
    This means that when tackling NLP tasks, the weight matrix remains unchanged and
    is not further modified.
  prefs: []
  type: TYPE_NORMAL
- en: Furthermore, a vocabulary was employed during pretraining. Initially, each word’s
    embedding vector was randomly generated, but these vectors were refined during
    training to maximize performance in language modeling. After pretraining, the
    updated embeddings for each word reflect the language patterns the model learned
    from the large corpus.
  prefs: []
  type: TYPE_NORMAL
- en: For specific NLP tasks, the pretrained GPT-2 model is typically fine-tuned.
    This fine-tuning process can alter the model’s weight matrix to better suit the
    task. However, in a zero-shot learning scenario, the model’s weights stay the
    same.
  prefs: []
  type: TYPE_NORMAL
- en: 4.5.1 Subword unit embeddings
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The GPT-2 model employs BBPE for preprocessing input text, breaking it into
    “subword units” rather than traditional words. BBPE treats each byte as the basic
    processing unit, so the embedding vector for each subword unit (token) is 1 byte
    long. Notably, because BBPE splits text into byte-level subword units, a word
    can be divided into multiple subword units, each with its corresponding embedding
    vector. Thus the GPT-2 model’s vocabulary is generated from the statistical information
    in the pretraining corpus, accounting for common vocabulary and word structures.
  prefs: []
  type: TYPE_NORMAL
- en: The length of the input token sequence in the GPT-2 model varies with its version.
    As shown in [Fig. 4.9](#f0050), the input token sequence length is 768 in the
    smaller GPT-2 model (i.e., GPT-2 small), while in larger models, it can extend
    to 1024 or 2048.
  prefs: []
  type: TYPE_NORMAL
- en: '![A diagram showing subword unit embedding and token embedding with model vocabulary
    size and token sequence length.](../images/F000047f04-09-9780443274367.jpg)'
  prefs: []
  type: TYPE_IMG
- en: '[Figure 4.9](#Bf0050) Token embedding.'
  prefs: []
  type: TYPE_NORMAL
- en: The model vocabulary size is 50,257\. The token sequence length is shown as
    768 (Small), 1024 (Medium), 1280 (Large) and 1600 (Extra Large). The embeddings
    are represented in a matrix with values such as 3.5, 2.1, 6.2, negative 1.3, negative
    1.1, 3.5, negative 1.2, 4.8, 1.7, 5.4, 2.2, 1.6, negataive 1.6, 1.9, 5.5, negative
    1.4, 5.2, 3.3, 3.2, 6.3, 5.1, 6.5, 2.3, 3.1, negative 1.9, 5.0, 1.4, 4.6\. The
    subwords listed are un, believ, able, lean, learn, dot dot dot, ing.
  prefs: []
  type: TYPE_NORMAL
- en: During GPT-2’s pretraining, the embedding representations of the vocabulary
    are trained through autoregressive prediction on the input sequence. This means
    that the model adjusts the embedding representations of tokens in the vocabulary
    based on the context and prediction targets to optimize prediction performance.
    This training process updates the embedding parameters, allowing them to better
    capture semantic and syntactic information.
  prefs: []
  type: TYPE_NORMAL
- en: It is crucial to note that after pretraining is complete, the vocabulary’s embedding
    representations are fixed when the model is applied and are not updated further.
    The aim of pretraining is to provide the model with initial parameters that have
    strong semantic representation capabilities, not to dynamically update the embeddings
    during actual use. Since the model is pretrained on a large corpus, these embedding
    vectors typically adapt well to various NLP tasks.
  prefs: []
  type: TYPE_NORMAL
- en: 4.5.2 Autoregressive process
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: GPT-2 is a trained model that includes the decoder weights of the Transformer,
    the token embedding matrix, and the positional encoding matrix. As a typical autoregressive
    generative model, GPT-2 can process inputs up to 1024 tokens long and generate
    sequences in an autoregressive manner starting from the input token. However,
    the sequences generated in this way often lack meaningful themes. Therefore in
    practical applications, GPT-2 often uses zero-shot learning, where it receives
    an instructional prompt (without examples) and generates text around a specific
    theme.
  prefs: []
  type: TYPE_NORMAL
- en: For instance, the input prompt might be “Large datasets are crucial for training
    these models.” As shown in [Fig. 4.10](#f0055), before the input sequence enters
    the Transformer model, it needs to be converted into corresponding token representation
    vectors by adding the word embedding vector to the positional encoding. The Transformer
    model comprises multiple decoder components, with each layer of the token sequence
    first processed by a self-attention layer and then by a neural network layer before
    being passed to the next decoder layer. Although the processing flow of each decoder
    component is identical, the self-attention and neural network layers of each component
    have independent weights.
  prefs: []
  type: TYPE_NORMAL
- en: '![Diagram explaining the process of a decoder in a neural network model.](../images/F000047f04-10-9780443274367.jpg)'
  prefs: []
  type: TYPE_IMG
- en: '[Figure 4.10](#Bf0055) Autoregressive generation process of GPT-2.'
  prefs: []
  type: TYPE_NORMAL
- en: 'At the top, there is a representation of Decoder number 12, Position number
    1, Output Vector being multiplied by Subword Unit Embedding Token Embedding to
    produce Output Subword Probabilities (Logits). The probabilities are shown for
    different subwords like I, you, he and others, with the highest probability subword
    being selected. Below this, a larger box labeled Decoder times N contains a Feedforward
    Neural Network and a Masked Self-Attention layer. The Masked Self-Attention layer
    shows percentages for different words in a sentence: Large datasets are crucial
    for training these models. The percentages indicate the attention weights for
    each word. At the bottom, there is a sequence of words with corresponding positions
    from 1 to 1024, showing the input sentence Large datasets are crucial for training
    these models.'
  prefs: []
  type: TYPE_NORMAL
- en: When the model’s final decoder produces an output vector, this vector is multiplied
    by the token embedding matrix. The result, after normalization, can be considered
    the cosine similarity between the two vectors. This implies that the closer the
    output vector is to a vector in the token embedding matrix, the larger their dot
    product result will be. The normalized result can be interpreted as the probability
    or score of selecting a vector from the token embedding matrix. Typically, the
    word with the highest score is selected (top_*k*=1). However, to achieve better
    results, other high-scoring words can also be considered. Thus a common strategy
    is to perform random sampling based on these scores, increasing the likelihood
    of selecting high-scoring words. Another common strategy is to set top_*k* to
    *N* and choose the top *N* highest-scoring words. This way, the model completes
    one iteration and outputs a word. The model continues to iterate until it generates
    the entire context (up to 1024 tokens for GPT-2) or until it generates the token
    indicating the end of the sequence <e>.
  prefs: []
  type: TYPE_NORMAL
- en: 4.6 Summary
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The introduction of GPT-2 did not resolve the ongoing debate over encoder versus
    decoder architectures, but its success in MTL has offered the research community
    a fresh perspective. There is now a growing emphasis on effectively utilizing
    vast amounts of unstructured text data in unsupervised learning environments.
    Researchers are also looking into optimizing model architectures and refining
    training strategies to boost performance in MTL and zero-shot learning.
  prefs: []
  type: TYPE_NORMAL
- en: Shortly after GPT-2, OpenAI launched the more advanced GPT-3 model, which has
    shown exceptional performance across various NLP tasks. Astonishingly, GPT-3 contains
    175 billion parameters, an order of magnitude greater than the largest version
    of GPT-2\. Given the impracticality of supervised multitask fine-tuning on such
    a massive scale, the zero-shot learning approach introduced by GPT-2 has proven
    crucial for GPT-3, offering new insights and perspectives in the realm of NLP.
  prefs: []
  type: TYPE_NORMAL
- en: <hgroup>
  prefs: []
  type: TYPE_NORMAL
- en: Chapter 5 Sparse attention and content-based learning
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: </hgroup>
  prefs: []
  type: TYPE_NORMAL
- en: Abstract
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This chapter delves into the architecture and learning strategies of GPT-3,
    emphasizing its Sparse Transformer design and content-based learning. GPT-3, with
    175 billion parameters, introduces a hybrid attention mechanism alternating between
    dense and locally banded sparse attention patterns, optimizing its efficiency
    in handling long sequences. The chapter explores the Sparse Transformer’s ability
    to reduce computational complexity, enhancing GPT-3 scalability and performance
    across various natural language processing tasks. Additionally, it discusses metalearning
    and in-context learning as key strategies for task adaptation without extensive
    retraining. The chapter also covers Bayesian inference as a framework for understanding
    contextual learning and introduces the chain-of-thought approach, which enhances
    reasoning capabilities through step-by-step problem-solving techniques. These
    innovations enable GPT-3 to perform complex reasoning tasks effectively, demonstrating
    its advanced capabilities in natural language understanding and generation.
  prefs: []
  type: TYPE_NORMAL
- en: Keywords
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: GPT-3; Sparse transformer; content-based learning; in-context learning; Bayesian
    inference; chain of thought; meta-learning; sparse attention; few-shot learning
  prefs: []
  type: TYPE_NORMAL
- en: In May 2020, OpenAI unveiled GPT-3, a groundbreaking language model. GPT-3,
    like its predecessors GPT and GPT-2, is built on a Transformer-based decoder architecture.
    However, it features an innovative Sparse Transformer pattern that alternates
    between dense and locally banded sparse attention mechanisms across its layers.
    This innovation significantly boosts GPT-3’s efficiency in processing long sequences.
  prefs: []
  type: TYPE_NORMAL
- en: Boasting an impressive 175 billion parameters, GPT-3 stands as one of the largest
    Transformer models ever created. Its expanded capacity has notably enhanced its
    performance across a variety of natural language processing (NLP) tasks. Yet,
    this scale comes with high training costs—estimated at $1.4 million by Guosheng
    Securities—which makes it economically challenging to fine-tune such large models
    using supervised data for specific tasks. Instead, GPT-3 focuses on in-context
    learning. In this approach, the model adapts to new tasks using just a few examples,
    without extensive retraining of its parameters. This allows GPT-3 to quickly assimilate
    task-specific knowledge even from minimal data, showcasing remarkable performance
    on new challenges. This chapter will explore GPT-3 advanced Sparse Transformer
    pattern and the principles of in-context learning in greater detail.
  prefs: []
  type: TYPE_NORMAL
- en: 5.1 GPT-3
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'OpenAI’s GPT-3 builds on the foundational architecture of the GPT series, incorporating
    techniques such as orthogonal initialization, layer normalization, and the byte-level
    byte-pair encoding (BBPE) tokenization method. These features collectively enhance
    the training efficiency and generative power of the model. A notable upgrade in
    GPT-3 lies in its attention mechanism: as depicted in [Fig. 5.1](#f0010), it employs
    a hybrid of dense and locally banded sparse attention within the Transformer’s
    decoder layers. This method, inspired by Sparse Transformers, deviates from the
    traditional fully connected attention used in GPT-2\. Such improvements allow
    GPT-3 to handle longer sequences more efficiently, reducing both computational
    demands and memory footprint, thereby boosting the model’s scalability.'
  prefs: []
  type: TYPE_NORMAL
- en: '![Diagram of a neural network architecture with token embedding, position encoding,
    transformer layers and softmax.](../images/F000059f05-01-9780443274367.jpg)'
  prefs: []
  type: TYPE_IMG
- en: '[Figure 5.1](#Bf0010) Diagram of the GPT-3 model architecture.'
  prefs: []
  type: TYPE_NORMAL
- en: The neural network architecture starting with Token Embedding. Next is Relative
    Position Encoding, followed by Add and Norm. Then, there is a Transformer Layer
    (Dense Attention) with Multi-head Self-attention (Dense) and Position-wise Feedforward
    Neural Network. Another Add and Norm follows, leading to a Transformer Layer (Sparse
    Attention) with Multi-head Self-attention (Sparse) and Position-wise Feedforward
    Neural Network. The final components are Linear Layer and Softmax.
  prefs: []
  type: TYPE_NORMAL
- en: 'GPT-3, with its colossal 175 billion parameters, dwarfs GPT-2, which has only
    1.5 billion. This vast increase in parameters has enabled GPT-3 to outperform
    on numerous tasks. Both models share a Transformer-based decoder structure, encompassing
    input, embedding, Transformer layers, and an output stage. Despite adopting GPT-2’s
    orthogonal initialization, layer normalization, and reversible tokenization, GPT-3
    innovates with alternating dense and locally banded sparse attention across its
    Transformer layers. Additionally, GPT-3 extensive training dataset further boosts
    its ability to generalize across diverse NLP tasks. The architecture of GPT-3
    includes the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '1. Input and BBPE tokenization: Utilizing BBPE, a method that efficiently reduces
    vocabulary size by merging frequent word pairs into single units.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '2. Embedding layer: This layer maps discrete tokens into continuous vector
    representations.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '3. Positional encoding: Adds vital positional data to vectors, enabling the
    model to differentiate word positions and understand contextual relationships.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '4. Transformer layers: Each layer is a stack of encoders comprising a sparse
    self-attention mechanism, alternating between dense and sparse patterns, and a
    feedforward network for abstracting higher-level features.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '5. Layer normalization: Integrated at every Transformer layer’s input and output,
    it normalizes these points to stabilize training and speed up convergence.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '6. Output layer: Transforms Transformer outputs into a probability distribution
    via a linear layer and a softmax function, predicting the next token by selecting
    the highest probability.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The primary distinction between GPT-3 and GPT-2 lies in the implementation of
    sparse attention within the model architecture. Additionally, GPT-3 adopts many
    of the design elements and techniques used in GPT-2\. The significant increase
    in both the scale of GPT-3 and the size of its training dataset have contributed
    to its enhanced performance.
  prefs: []
  type: TYPE_NORMAL
- en: 5.2 The sparse transformer
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The Sparse Transformer represents a specialized adaptation of the standard Transformer
    model, designed to optimize the processing of long sequences. This model incorporates
    a sparse attention mechanism that cleverly cuts down on both computational complexity
    and memory demands, facilitating efficient management of lengthy data streams.
  prefs: []
  type: TYPE_NORMAL
- en: 5.2.1 Characteristics of the sparse transformer
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Traditional Transformer models struggle with processing long sequences due
    to the inherent fully connected setup of the self-attention mechanism, which causes
    both computational complexity and memory usage to scale quadratically with the
    sequence length, expressed as O(*n*²). This level of complexity becomes prohibitive
    for extensive sequences. The Sparse Transformer addresses this issue by not calculating
    attention scores for every pair of elements, thus enabling a more computationally
    sparse approach. There are two main strategies for this optimization: first, by
    limiting the reach of the attention mechanism with a defined attention window;
    second, by employing specific sparse connection patterns that can reduce the computational
    load and memory requirements to O(n).'
  prefs: []
  type: TYPE_NORMAL
- en: 5.2.1.1 Sparse attention patterns
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Illustrated in [Fig. 5.2](#f0015), the Sparse Transformer capitalizes on sparse
    attention patterns. Under this framework, each input token selectively focuses
    on a subset of contextual information instead of every possible token, dramatically
    cutting the computational complexity from O(*n*²) to O(*n*). Sparse attention
    can be implemented in several ways, such as local banded attention, which concentrates
    on closely positioned tokens, and strided (sparse fully connected) attention,
    which samples the sequence at fixed steps throughout its entire length.
  prefs: []
  type: TYPE_NORMAL
- en: '![Illustration of sparse attention patterns in the Sparse Transformer.](../images/F000059f05-02-9780443274367.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5.2 Traditional transformer (left) and sparse transformer (right).
  prefs: []
  type: TYPE_NORMAL
- en: The Sparse Transformer capitalizes on sparse attention patterns. The image shows
    six grid patterns with different highlighted areas, representing various sparse
    attention patterns. The top row has four smaller grids and the bottom row has
    two larger grids. Each grid has a unique pattern of highlighted squares.
  prefs: []
  type: TYPE_NORMAL
- en: 5.2.1.2 Alternating dense and sparse attention patterns
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: GPT-3 enhances its performance and generalizability by alternating between dense
    and sparse attention patterns in different Transformer layers, leveraging principles
    from Sparse Transformer designs. This strategic variation enables the model to
    effectively capture long-range dependencies without sacrificing computational
    efficiency. Practically, the balance between dense and sparse patterns can be
    tailored to fit the specific requirements of a task and the available computational
    resources.
  prefs: []
  type: TYPE_NORMAL
- en: 5.2.1.3 Learnable relative positional encodings
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: GPT-3 employs learnable relative positional encodings that account for both
    the absolute and relative distances between tokens. This innovative approach significantly
    bolsters the model’s capability to understand and process long-range dependencies.
  prefs: []
  type: TYPE_NORMAL
- en: 5.2.2 Local banded attention
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Local banded attention in GPT-3 is designed to reduce the computational load
    and memory usage typical of traditional Transformer models. This sparse attention
    mechanism focuses each input token on just a portion of its neighbors instead
    of every token in the sequence. The implementation involves several key steps:'
  prefs: []
  type: TYPE_NORMAL
- en: '1. Determine window size: First, establish a window size that dictates the
    range of context each token considers. This parameter can be adapted to fit the
    needs of the task and the available computational power. Larger window sizes provide
    richer contextual details but require more computational resources.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '2. Build the attention matrix: Construct a one-dimensional attention vector
    for each token that contains the weights for the adjacent tokens within its window.
    This process mirrors the conventional self-attention approach but is confined
    to the specified window. These vectors are then stacked to form a two-dimensional
    attention matrix.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '3. Execute local banded attention: Multiply the attention matrix by the input
    sequence’s hidden states to generate outputs that include contextual information
    for each token, focusing only on immediate neighbors.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Local banded attention notably reduces the computational complexity from $MathML$![Equation](../images/F000059si1.png)
    to $MathML$![Equation](../images/F000059si2.png), efficiently balancing performance
    and contextual awareness. However, it might struggle with long-range dependencies.
    To overcome this limitation, it can be integrated with other sparse attention
    mechanisms, such as sparse fully connected attention, or used alternately with
    dense attention patterns across different Transformer layers.
  prefs: []
  type: TYPE_NORMAL
- en: 5.2.3 Cross-layer sparse connections
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Cross-layer sparse connections in GPT-3 are designed to forge longer-range
    dependencies between layers, optimizing the model’s handling of extended sequences.
    This approach improves the attention mechanism’s efficiency, enabling processing
    of larger inputs. GPT-3 implements cross-layer sparse connections through a blend
    of dense and locally banded sparse attention patterns, detailed as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '1. Local banded sparse connections: These connections focus each token on a
    nearby subset of tokens, facilitating the capture of immediate contextual relationships
    within a constrained scope.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '2. Dense connections: Contrasting with the local approach, dense connections
    allow each token to engage with every other token in the sequence, broadening
    the scope to global dependencies.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Alternating these connection styles throughout the model layers, GPT-3 adeptly
    manages both near and far dependencies. The local banded approach targets adjacent
    layer interactions for nearer relationships, while dense connections bridge longer
    distances. This structured versatility not only boosts GPT-3 efficiency in processing
    lengthy sequences but also extends its capacity to recognize extensive relational
    patterns.
  prefs: []
  type: TYPE_NORMAL
- en: Furthermore, GPT-3 employs these cross-layer sparse connections to enhance its
    overall effectiveness in NLP tasks, simultaneously conserving computational resources.
    It achieves this through a strategic alternation of dense and sparse Transformer
    layers, where dense attention and local banded sparse attention layers interchange,
    optimizing both performance and computational efficiency.
  prefs: []
  type: TYPE_NORMAL
- en: By integrating sparse attention mechanisms, alternating attention patterns,
    and adaptive positional encodings, GPT-3 significantly alleviates the challenges
    faced by traditional Transformers with long sequences, positioning Sparse Transformer
    as a robust framework for extensive data handling. The model’s specific attention
    strategies, akin to those in Sparse Transformer, significantly elevate its capability
    in processing long texts.
  prefs: []
  type: TYPE_NORMAL
- en: 5.3 Meta-learning and in-context learning
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Due to the vast number of parameters in GPT-3 (175 billion), fine-tuning every
    single one for different downstream tasks has become unfeasible. Consequently,
    metalearning and in-context learning have emerged as the key strategies for leveraging
    this model. Meta-learning involves pretraining the model on an extensive text
    corpus to enhance its natural language generation skills and overall linguistic
    knowledge and comprehension. Throughout this phase, GPT-3 absorbs the intricacies
    of grammar across different language elements—words to paragraphs—and garners
    a foundational understanding of common knowledge.
  prefs: []
  type: TYPE_NORMAL
- en: In-context learning, alternatively, focuses on making slight adjustments to
    the model using a small subset of labeled data to tailor it to specific tasks.
    This method of fine-tuning doesn’t retrain the model extensively; instead, it
    leverages the broad capabilities developed during pretraining to meet the needs
    of particular applications. Examples of such data include question–answer pairs
    or sentiment-labeled sentences. This approach allows GPT-3 to achieve high performance
    in a variety of NLP tasks with just minimal labeled data.
  prefs: []
  type: TYPE_NORMAL
- en: 5.3.1 Meta-learning
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In the GPT-3 paper, the authors reinterpreted the concept of metalearning, differentiating
    it from its traditional definition. Traditionally, metalearning refers to training
    a model to quickly learn new tasks with a small amount of labeled data. However,
    the GPT-3 paper expands the definition of metalearning to include the process
    of unsupervised pretraining.
  prefs: []
  type: TYPE_NORMAL
- en: In this context, large pretrained language models like GPT-3 itself are considered
    metalearners because they have already acquired a vast amount of knowledge and
    language understanding during the pretraining phase. By pretraining on a large
    corpus of unlabeled text data, the model learns the structure of language and
    common-sense knowledge, thus gaining some generalization ability.
  prefs: []
  type: TYPE_NORMAL
- en: This new interpretation of metalearning is viable because GPT-3 has demonstrated
    strong generalization capabilities during its pretraining phase. This enables
    GPT-3 to perform excellently on new tasks with minimal labeled data (or even no
    data), similar to traditional metalearning methods. However, in GPT-3’s case,
    this capability primarily stems from the unsupervised pretraining phase, rather
    than from a specialized training process tailored for metalearning tasks.
  prefs: []
  type: TYPE_NORMAL
- en: 5.3.2 In-context learning
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: To minimize adjustments to its parameters during the fine-tuning phase, GPT-3
    focuses more on in-context learning strategies. In the task adaptation stage,
    the model adopts zero-shot, one-shot, and few-shot learning approaches, circumventing
    the constraints associated with traditional fine-tuning techniques.
  prefs: []
  type: TYPE_NORMAL
- en: As depicted on the right side of [Fig. 5.3](#f0020), the fine-tuning process
    is initiated after the model’s pretraining phase is complete. For each specific
    task, a subset of training samples is provided, such as the single-sample batch
    used in this instance. By computing the loss and updating its weights, the model
    is able to achieve commendable performance on new tasks. Fine-tuning generally
    demands fewer data compared to starting from scratch and permits lower learning
    rates. This efficiency is possible because fine-tuning starts from a pretrained
    model’s parameters, which are already close to the optimal solution for the tasks
    at hand.
  prefs: []
  type: TYPE_NORMAL
- en: '![Comparison of content-based learning in GPT-3 and conventional fine-tuning
    methods.](../images/F000059f05-03-9780443274367.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5.3 Three different types of contextual learning versus traditional fine-tuning.
  prefs: []
  type: TYPE_NORMAL
- en: 'The model predicts answers solely based on a natural language description of
    the given task, without performing gradient updates. Task Description: Translate
    English into French colon Task Content colon cheese becomes cheese. One-shot Learning
    colon In addition to the task description, a single example is provided, without
    performing gradient updates. Task Description colon Translate English into French
    colon Example colon sea otter becomes loutre de mer Task Content colon cheese
    becomes cheese. Few-shot Learning colon In addition to the task description, the
    model is exposed to some task examples, without performing gradient updates. Task
    Description colon Translate English into French colon Example colon sea otter
    becomes loutre de mer Example colon Peppermint becomes menthe poivrée Example
    colon plush giraffe becomes girafe en peluche Task Content colon cheese becomes
    cheese. Conventional Fine-tuning colon Fine-tuning colon The model is trained
    through repeated gradient updates using a large number of example tasks. Example
    number one colon sea otter becomes loutre de mer Gradient Update Example number
    two colon Peppermint becomes menthe poivrée Gradient Update Example number three
    colon plush giraffe becomes girafe en peluche Gradient Update Prompt colon cheese
    becomes cheese.'
  prefs: []
  type: TYPE_NORMAL
- en: '[Fig. 5.3](#f0020) on the left illustrates how GPT-3 employs varying degrees
    of example-based in-context learning techniques—zero-shot, one-shot, and few-shot—to
    boost its performance on new tasks without modifying its parameters. This strategy
    greatly simplifies the use of large language models, making it easier for users
    to apply the model across diverse tasks with minimal setup.'
  prefs: []
  type: TYPE_NORMAL
- en: Zero-shot learning in GPT-3 involves tackling tasks without prior exposure to
    any related labeled data, relying entirely on knowledge gleaned from its extensive
    pretraining. In this mode, the model must interpret the task’s description and
    generate appropriate responses without example prompts. The main hurdle here is
    enabling the model to grasp the task requirements thoroughly and produce suitable
    responses solely based on its pretrained intelligence.
  prefs: []
  type: TYPE_NORMAL
- en: GPT-3 prowess in zero-shot learning stems from its colossal architecture, which
    incorporates up to 175 billion parameters, and its pretraining on vast quantities
    of unlabeled text. This extensive background allows it to understand intricate
    language patterns and common-sense contexts, enabling it to generate pertinent
    outputs without specific training on the task at hand.
  prefs: []
  type: TYPE_NORMAL
- en: One-shot learning, by contrast, involves the model making inferences from a
    single related example. Here, the challenge lies in empowering the model to quickly
    decode the task’s demands from just one example and respond accurately, demonstrating
    the model’s ability to adapt swiftly based on minimal data.
  prefs: []
  type: TYPE_NORMAL
- en: In the one-shot learning scenario illustrated in [Fig. 5.3](#f0020), GPT-3 uses
    a single example to bridge the gap between the task description and execution.
    This requires the model to process longer sequences than in zero-shot scenarios,
    extracting valuable information to improve its performance on translation tasks.
    Importantly, no gradients are calculated or weights updated during this process.
  prefs: []
  type: TYPE_NORMAL
- en: GPT-3 achieves high performance on one-shot learning tasks by leveraging the
    knowledge acquired during its pretraining phase, combined with the given single
    example. This demonstrates GPT-3 ability to rapidly adapt to new tasks with minimal
    labeled data, thus reducing the training costs and time required for supervised
    learning on specific tasks.
  prefs: []
  type: TYPE_NORMAL
- en: Few-shot learning involves training the model to make inferences after being
    provided with a small number of labeled samples related to the target task. In
    this case, the model needs to understand the specific requirements of the task
    based on several provided examples and generate the correct answer accordingly.
    The challenge of few-shot learning is how to enable the model to effectively learn
    and adapt to new tasks from limited information while improving prediction accuracy.
    Few-shot learning extends one-shot learning by providing several examples after
    the task description. However, the processing capacity of the GPT-3 model is limited,
    so submitting overly long text sequences for few-shot learning may not facilitate
    the extraction of useful information. This explains why context learning with
    too many examples is not widespread in GPT-3 models.
  prefs: []
  type: TYPE_NORMAL
- en: GPT-3 also excels in few-shot learning tasks. By taking multiple task-related
    examples as input, GPT-3 can better adapt to new tasks, achieving high performance
    across various NLP tasks. This indicates GPT-3 strong generalization ability,
    capable of producing high-quality outputs with a small amount of labeled data.
  prefs: []
  type: TYPE_NORMAL
- en: Compared to zero-shot, one-shot, and few-shot learning, traditional fine-tuning
    methods focus on supervised learning of the pretrained model with a large amount
    of labeled data. While this approach has achieved significant results in many
    NLP tasks, its limitations include the need for extensive labeled data and computational
    resources (to adjust model parameters). Moreover, fine-tuning on specific tasks
    may lead to overfitting, limiting the model’s generalization capability.
  prefs: []
  type: TYPE_NORMAL
- en: In contrast, zero-shot, one-shot, and few-shot learning strategies offer clear
    advantages. First, since GPT-3 has already acquired a vast amount of knowledge
    and language understanding during its pretraining phase, it does not require costly
    supervised learning on specific tasks. This significantly reduces training costs
    and time. Secondly, GPT-3 can perform well with only a small amount of labeled
    data, making it easier to adapt to a variety of NLP tasks, especially those where
    large amounts of labeled data are difficult to obtain.
  prefs: []
  type: TYPE_NORMAL
- en: 5.4 Bayesian inference of concept distributions
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Contextual learning is a key emergent capability of large language models like
    GPT, and grasping its principles is essential for crafting effective prompts.
    [Fig. 5.2](#f0015) illustrates this point: prompts for zero-shot learning include
    only a task description and content, while those for one-shot and few-shot learning
    also incorporate examples.'
  prefs: []
  type: TYPE_NORMAL
- en: 5.4.1 Implicit fine-tuning
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Language models are interpreted as metaoptimizers, treating contextual learning
    as a form of implicit fine-tuning—an approach that establishes a link between
    GPT’s context-dependent learning and traditional explicit fine-tuning methods.
    Illustrated in [Fig. 5.4](#f0025), GPT produces metagradients from forward computations
    related to the target task labels and utilizes these gradients within the given
    task through its attention mechanism. This metaoptimization mirrors the fine-tuning
    process, where model parameters are explicitly updated using backward propagation
    gradients.
  prefs: []
  type: TYPE_NORMAL
- en: '![Diagram illustrating the process of contextual learning in GPT models.](../images/F000059f05-04-9780443274367.jpg)'
  prefs: []
  type: TYPE_IMG
- en: '[Figure 5.4](#Bf0025) Process of meta-optimization and fine-tuning in GPT.'
  prefs: []
  type: TYPE_NORMAL
- en: At the top, there are two GPT models labeled with Sentence 1, Answer 1 and Sentence
    2, Answer 2\. These are connected to a Backpropagation process, which generates
    Gradient delta W sub FT end sub. This gradient is used in the Contextual Learning
    process within a larger GPT model. The larger GPT model includes components such
    as Perspective, Feedforward Neural Network and Self-attention. The Forward Computation
    process generates Meta-gradient delta W sub ICL end sub. Demonstration Examples
    (Sentence 1 prime, Answer 1) and (Sentence 2, Answer 2) are fed into the Forward
    Computation process. A Query Example (Sentence, question mark) is also fed into
    the model to generate an Answer.
  prefs: []
  type: TYPE_NORMAL
- en: 'At various levels—predictive accuracy, representational depth, and attention
    dynamics—contextual learning and explicit fine-tuning are akin, both rooted in
    gradient descent optimization. Yet, the key distinction lies in how these gradients
    are produced: contextual learning relies on forward computations for metagradients,
    whereas fine-tuning uses backpropagation.'
  prefs: []
  type: TYPE_NORMAL
- en: In few-shot learning, do large language models like GPT implicitly learn a function
    $MathML$![Equation](../images/F000059si3.png) when presented with a small set
    of task-relevant examples? If this is true, these sample examples $MathML$![Equation](../images/F000059si4.png)
    have a profound influence on context-based learning performance. As illustrated
    in [Fig. 5.5](#f0030) from the original GPT-3 paper, without any examples, the
    model struggles to learn or adjust, but performance significantly improves in
    scenarios with one or a few examples.
  prefs: []
  type: TYPE_NORMAL
- en: '![A line graph comparing model accuracy with and without prompts for different
    model sizes (175B, 13B, 1.3B) across zero-shot, one-shot and few-shot learning
    scenarios.](../images/F000059f05-05-9780443274367.jpg)'
  prefs: []
  type: TYPE_IMG
- en: '[Figure 5.5](#Bf0030) Impact of sample size and parameter scale on model performance.
    Image source: Paper “Language models are few-shot learners”.'
  prefs: []
  type: TYPE_NORMAL
- en: 'The x-axis represents the number of examples (K) on a logarithmic scale from
    0 to 10 superscript 1 end superscript. The y-axis shows accuracy percentage from
    0 to 70 in increments of 10\. Three model sizes are compared: 175B, 13B and 1.3B.
    Each model size has two lines: one solid line for With Prompt and one dashed line
    for Without Prompt. The 175B model (top lines) shows the highest accuracy, starting
    around 10 percent for zero-shot and reaching about 70 percent for few-shot learning.
    The With Prompt line consistently outperforms Without Prompt. The 13B model (middle
    lines) shows moderate performance, starting near 0 percent for zero-shot and reaching
    about 25 percent for few-shot learning. Again, With Prompt performs better than
    Without Prompt. The 1.3B model (bottom lines) shows the lowest accuracy, barely
    rising above 0 percent even with many examples. The difference between With Prompt
    and Without Prompt is minimal for this model size. The graph is labeled with Zero-shot,
    One-shot and Few-shot at appropriate points along the x-axis, indicating different
    learning scenarios. Overall, the graph demonstrates that larger models perform
    better and that using prompts generally improves accuracy across all model sizes
    and learning scenarios.'
  prefs: []
  type: TYPE_NORMAL
- en: However, recent research offers a fresh view on the significance of these examples
    in contextual learning. The study reveals that the input-label mapping within
    these examples affects model performance less than previously thought. Surprisingly,
    when actual labels are swapped with random ones or when examples are replaced
    with random values, the loss in performance is relatively minor. This finding
    challenges the intuitive belief in few-shot learning’s reliance on accurate input-label
    mappings in examples.
  prefs: []
  type: TYPE_NORMAL
- en: '[Fig. 5.6](#f0035) showcases how large language models like GPT perform on
    downstream tasks with no examples, correct labels, and random labels. This figure
    highlights two distinct inference methods used for performance evaluation: direct
    and channel. In direct inference, the model assesses the probabilities of different
    categories based on the given context. In contrast, channel inference calculates
    the probabilities of the context occurring under specified categories. For instance,
    in sentiment analysis, for the context *x* = “This movie is great,” Direct inference
    evaluates the likelihood of “This movie is great positive” versus “This movie
    is great negative.” Channel inference, however, assesses “positive This movie
    is great” against “negative This movie is great.” The data illustrates that, both
    in classification (upper part of the figure) and multiple-choice tasks (lower
    part), models with random labels (backslash) perform comparably to those with
    correct labels (net-like) and distinctly outperform the no-example zero-shot cases
    (gray).'
  prefs: []
  type: TYPE_NORMAL
- en: '![Two bar graphs compare classification and multi-choice accuracy for various
    models under different demo conditions: no demos, demos with gold labels and demos
    with random labels.](../images/F000059f05-06-9780443274367.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5.6 Performance of different labels in downstream tasks.
  prefs: []
  type: TYPE_NORMAL
- en: 'For the Classification graph: The x-axis lists different models: Direct GPT-2,
    Channel GPT-2, Direct MetaICL, Channel MetaICL, Direct GPT-J, Channel GPT-J, Direct
    fairseq 6.7B, Channel fairseq 6.7B, Direct fairseq 13B, Channel fairseq 13B, Direct
    GPT-3 and Channel GPT-3\. The y-axis represents Accuracy (percent) from 25 to
    60 in increments of 5\. For each model, there are three bars representing: 1\.
    No Demos 2\. Demos w/ gold labels 3\. Demos w/ random labels The Multi-choice
    graph has the same x-axis layout as the Classification graph. The y-axis for Multi-choice
    represents Accuracy (percent) from 35 to 70 in increments of 5\. For both graphs,
    the Demos w/ gold labels generally show the highest accuracy, followed by Demos
    w/ random labels and No Demos typically showing the lowest accuracy across most
    models. The Channel GPT-3 model appears to have the highest accuracy in both Classification
    and Multi-choice tasks across all three demo conditions. The graphs illustrate
    how different language models perform on classification and multi-choice tasks
    under various demo conditions, showcasing the impact of providing examples (demos)
    with correct (gold) or random labels compared to no examples at all.'
  prefs: []
  type: TYPE_NORMAL
- en: 'According to [Fig. 5.6](#f0035), several insights emerge:'
  prefs: []
  type: TYPE_NORMAL
- en: 1. The definition of label spaces and the distribution of input texts set by
    sample examples are pivotal for contextual learning, regardless of the accuracy
    of individual labels. The distributions of $MathML$![Equation](../images/F000059si5.png)
    and *y*—the input texts and their potential corresponding answers—play a major
    role in influencing contextual learning outcomes. In scenarios with random labels,
    such as $MathML$![Equation](../images/F000059si6.png), even if $MathML$![Equation](../images/F000059si7.png)
    is incorrect, it remains within the set of possible answers $MathML$![Equation](../images/F000059si8.png).
    Altering these distributions, like substituting $MathML$![Equation](../images/F000059si9.png)
    with options outside the expected answer set, would drastically impair the learning
    process.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 2. The specification of the overall format is equally vital. In contexts where
    the label space is undefined, using random English words as labels proves far
    more effective than not using any labels at all.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 3. Employing a contextual learning objective in metatraining enhances these
    effects, encouraging the model to focus more on the straightforward elements of
    the sample examples, like their format, rather than on the complexities of input-label
    mapping.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Large language models might not derive a specific mapping function $MathML$![Equation](../images/F000059si10.png)
    from examples for tackling new tasks; instead, they often tap into their extensive
    pretrained knowledge. Yet, if we broaden the definition of task learning to encompass
    adapting to specific inputs, label distributions, and formats implied by examples—and
    refining predictions accordingly—then it’s plausible that these models do indeed
    extract task-relevant information from examples. Pre-trained language models come
    equipped with an inherent ability to execute tasks, demonstrating that language
    modeling goals inherently support robust zero-shot capabilities. However, this
    also implies that contextual learning might struggle with tasks where the necessary
    input-label relationships are not preencoded.
  prefs: []
  type: TYPE_NORMAL
- en: The influence of sample examples and instructional cues on language models appears
    to be analogous. This insight applies to instruction-following models too, indicating
    that such models reactivate existing capabilities rather than learning new semantic
    nuances of tasks. Experimental findings further reveal that pairing each unlabeled
    input with a random label and using it as an example can achieve performance nearing
    that of few-shot scenarios, even without labeled data. This suggests that our
    current benchmarks for zero-shot capabilities might be set significantly lower
    than actual potential, marking an important avenue for future enhancements in
    zero-shot performance.
  prefs: []
  type: TYPE_NORMAL
- en: 5.4.2 Bayesian inference
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Using a Bayesian framework to interpret contextual learning offers a clearer
    understanding of few-shot learning principles. This approach posits that during
    extensive language pretraining, elements like sentences, paragraphs, and tables
    within a document share underlying semantic themes and structured formats—for
    example, how questions and answers are alternately presented in Q&A formats. The
    training data at the document level embody latent concepts of coherence over long
    distances, which the model taps into during pretraining to deduce these underlying
    ideas.
  prefs: []
  type: TYPE_NORMAL
- en: Contextual learning, within this Bayesian framework, is seen as a problem of
    conditional probability, where the task is to predict the likelihood of the next
    word or phrase based on the pretrained model’s knowledge and a sequence of prompts.
    The “knowledge of the pretrained model” corresponds to what is learned about cross-document
    coherence during the extensive text pretraining, which becomes part of the model’s
    internalized understanding of the world and lays the groundwork for its context
    comprehension. The “series of prompt information” pertains to the specific task-oriented
    concept distributions learned through contextual learning with training samples,
    serving as critical adjustments that refine the model’s task-specific responses.
  prefs: []
  type: TYPE_NORMAL
- en: Together, the pretrained and prompted distributions underpin contextual learning
    in the Bayesian paradigm, offering a foundational world understanding while specifically
    honed for particular tasks. Bayesian inference applied to the concepts introduced
    in few-shot learning enhances the learning process. Successfully deducing these
    concepts enables the model to accurately predict outcomes in test scenarios.
  prefs: []
  type: TYPE_NORMAL
- en: $MathML$ (5.1)
  prefs: []
  type: TYPE_NORMAL
- en: '![Equation](../images/F000059si11.png) (5.1)'
  prefs: []
  type: TYPE_IMG
- en: '[Eq. (5.1)](#eqn1) illustrates that prompts serve as evidence, bolstering the
    certainty of the posterior probability distribution $MathML$![Equation](../images/F000059si12.png).
    If this distribution is mainly focused on the prompted concepts, the model can
    effectively “learn” from the prompts, thus enhancing its likelihood of selecting
    the relevant prompted concepts accurately.'
  prefs: []
  type: TYPE_NORMAL
- en: 'There’s a logical challenge, though: the language model derives prompted concepts
    based on context examples, yet these prompts are drawn from a prompt distribution
    that may greatly differ from the model’s training pretraining distribution. Prompts
    connect independent examples, making the transitions between different examples
    under the language model and its pretraining distribution unlikely, potentially
    introducing noise during inference. For example, concatenating independent sentences
    from different news topics could result in unusual texts due to the lack of sufficient
    context in any individual sentence. Yet, as demonstrated in GPT-3, despite these
    distributional discrepancies, the language model can still execute Bayesian inference
    effectively.'
  prefs: []
  type: TYPE_NORMAL
- en: Effective contextual learning by the language model is feasible as long as the
    signal’s strength surpasses the noise’s disruption. Here, “signal” refers to the
    KL divergence between the prompted concept and other concepts under the given
    prompt, while “noise” is the error from transitions between examples. If the prompts
    make it straightforward for the model to differentiate between the prompted concept
    and others, the signal is considered strong. This indicates that removing certain
    information (like eliminating input-output mappings) is permissible if the prompt’s
    format is constant and the mapping information is already present in the pretrained
    data, a stark contrast to traditional supervised learning, which fails without
    intact input-output mappings (e.g., when labels are randomized).
  prefs: []
  type: TYPE_NORMAL
- en: This further clarifies the discussion on implicit fine-tuning earlier, noting
    that language models are not dependent on the specific $MathML$![Equation](../images/F000059si13.png)
    pairings in prompts. The model can engage in contextual learning as long as the
    output $MathML$![Equation](../images/F000059si14.png) is part of the candidate
    set *y*, even if it doesn’t directly correspond to $MathML$![Equation](../images/F000059si15.png).
    This indicates that in contextual learning, every aspect of the prompt—including
    input distribution, output space, and format—acts as a “signal” that aims to define
    the task’s conceptual distribution, thus enhancing the model’s ability to accurately
    infer the concepts learned during pretraining. While randomizing input-output
    mappings in the prompts introduces “noise” by linking random sequences, the model
    can still undertake Bayesian inference effectively if there is a sufficient signal,
    like the correct input distribution, output space, and format. Proper input–output
    mappings can further facilitate this process by offering more precise evidence
    and minimizing noise, particularly when such mappings are rare in pretrained data.
  prefs: []
  type: TYPE_NORMAL
- en: The Bayesian framework thus illuminates the underlying mechanics of contextual
    learning and offers guidance on how to design prompts and their elements—input
    distribution, output space, and format. These components help define the task’s
    conceptual distribution through the prompts, enabling the model to more accurately
    infer the concepts learned during pretraining.
  prefs: []
  type: TYPE_NORMAL
- en: 5.5 Thought chains
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: To further boost large language models’ abilities in mathematical reasoning,
    members of the Google Brain team, including Jason Wei and Xuezhi Wang, introduced
    the chain-of-thought (CoT) approach in January 2022\. This method employs a divide-and-conquer
    strategy tailored to various contexts of learning—zero-shot, one-shot, and few-shot—training
    the models to mimic human-like progressive thinking and reasoning. This technique
    grants models the capacity to tackle complex reasoning challenges effectively.
  prefs: []
  type: TYPE_NORMAL
- en: 'The CoT’s most straightforward implementation involves incorporating auxiliary
    step-by-step instructions into prompts, a method known as zero-shot learning CoT.
    Despite its simplicity, it has shown effectiveness across many fields. This approach
    involves two phases (refer to [Fig. 5.7](#f0040)): initially, the prompt “Let’s
    think about this step-by-step” is added to a zero-shot prompt, prompting the model
    to output its reasoning process. In the second phase, this reasoned output is
    followed by another prompt, “Therefore, the answer (in Arabic numerals) is,” leading
    the model to deliver the final answer.'
  prefs: []
  type: TYPE_NORMAL
- en: '![A flowchart illustrating the process of inference extraction and answer extraction
    using a language model (LLM).](../images/F000059f05-07-9780443274367.jpg)'
  prefs: []
  type: TYPE_IMG
- en: '[Figure 5.7](#Bf0040) Zero-shot learning CoT.'
  prefs: []
  type: TYPE_NORMAL
- en: 'The flowchart shows two prompts: [First Prompt] Inference Extraction and [Second
    Prompt] Answer Extraction. The first prompt reads: Question: Joe averages 25 punches
    per minute. A match lasts for 5 rounds of 3 minutes each. How many punches does
    he throw? Answer: Let''s think about this step by step. This connects to a box
    labeled LLM. Below it, the steps are: In one minute, Joe throws 25 punches. In
    three minutes, Joe throws 3 times 25 equals 75 punches. In five rounds, Joe throws
    5 times 75 equals 375 punches. The second prompt reads: Question: Joe averages
    25 punches per minute. A match has 5 rounds, each lasting 3 minutes. How many
    punches does he throw in total? Answer: Let''s think step by step. In one minute,
    Joe throws 25 punches. In five rounds, Joe throws 5 times 75 equals 375 punches.
    Therefore, the answer (in Arabic numerals) is. This connects to a box labeled
    LLM, which then connects to a box with the number 375.'
  prefs: []
  type: TYPE_NORMAL
- en: This straightforward technique significantly enhances the performance of large
    language models on various reasoning tasks. For instance, on the GSM8K mathematical
    reasoning dataset, adding this specific prompt improved the reasoning accuracy
    from an initial 10.4% to 40.4%, as detailed in [Table 5.1](#t0010).
  prefs: []
  type: TYPE_NORMAL
- en: Table 5.1
  prefs: []
  type: TYPE_NORMAL
- en: Comparison between zero-shot reasoning chains and zero-shot learning.
  prefs: []
  type: TYPE_NORMAL
- en: '|   | Mathematical ability |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '|   | SingleEq | AddSub | MultiArith | GSM8K | AQUA | SVAMP |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- | --- | --- | --- | --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '| Zero-shot learning | 74.6/78.7 | 72.2/77.0 | 17.7/22.7 | 10.4/12.5 | 22.4/22.4
    | 58.8/58.7 |'
  prefs: []
  type: TYPE_TB
- en: '| Zero-shot chain-of-thought | 78.0/78.7 | 69.6/74.7 | 78.7/79.3 | 40.4/40.5
    | 33.5/31.9 | 62.1/63.7 |'
  prefs: []
  type: TYPE_TB
- en: '|   | Common sense | Other reasoning tasks | Symbolic reasoning |'
  prefs: []
  type: TYPE_TB
- en: '|   | Common sense questions | Strategic questions | Data understanding | Out-of-order
    problems | Last letter | Coin tossing |'
  prefs: []
  type: TYPE_TB
- en: '| Zero-shot learning | 68.8/72.6 | 12.7/54.3 | 49.3/33.6 | 31.3/29.7 | 0.2/-
    | 12.8/53.8 |'
  prefs: []
  type: TYPE_TB
- en: '| Zero-shot chain-of-thought | 64.6/64.0 | 54.8/52.3 | 67.5/61.8 | 52.4/52.9
    | 57.6/- | 91.4/87.8 |'
  prefs: []
  type: TYPE_TB
- en: '![Image](../images/T000059tabt0010.png)'
  prefs: []
  type: TYPE_IMG
- en: Why does adding “Let’s think about this step-by-step” to prompts enable large
    language models to elaborate detailed reasoning steps and compute answers? Based
    on the contextual learning’s Bayesian inference of conceptual distribution discussed
    earlier, it’s likely because the pretraining data contain an abundance of examples
    that begin with “Let’s think step by step,” followed by detailed reasoning and
    culminating in an answer. During pretraining, large language models internalize
    these patterns. Thus, when prompted with “Let’s think step by step,” these models
    can more effectively infer the step-by-step reasoning concepts they learned during
    pretraining, allowing them to methodically reason through tasks and derive answers.
  prefs: []
  type: TYPE_NORMAL
- en: The second application of the CoT approach targets one-shot learning prompts
    by incorporating manually crafted reasoning examples into the sample scenarios.
    These examples extend beyond simple question–answer pairs to include detailed,
    step-by-step reasoning processes tailored to each question. For a detailed illustration
    of how this is applied, refer to the CoT response depicted in [Fig. 5.8](#f0045).
  prefs: []
  type: TYPE_NORMAL
- en: '![Comparison of standard and chain of thought prompts with model outputs for
    two math questions.](../images/F000059f05-08-9780443274367.jpg)'
  prefs: []
  type: TYPE_IMG
- en: '[Figure 5.8](#Bf0045) Standard prompts versus reasoning chain prompts in single-shot
    learning.'
  prefs: []
  type: TYPE_NORMAL
- en: 'In the standard prompt, the input question is: Roger initially has 5 tennis
    balls. He purchases an additional two cans of tennis balls, with each can containing
    3 tennis balls. How many tennis balls does he have now? The answer is: The total
    is 11\. The second question is: A cafeteria has 23 apples. If they use 20 apples
    for lunch and subsequently purchase 6 more apples, how many apples do they have
    now? The model output is: Answer: The answer is 27\. In the chain of thought prompt,
    the input question is: Roger initially has 5 tennis balls. He then purchases two
    cans of tennis balls, with each can containing 3 tennis balls. How many tennis
    balls does he have now? The answer is: Roger starts with 5 tennis balls. Each
    of the two cans contains 3 tennis balls, totaling 6 tennis balls. Therefore, 5
    plus 6 equals 11\. The answer is 11\. The second question is: A cafeteria has
    23 apples. If they use 20 apples for lunch and subsequently purchase an additional
    6 apples, how many apples do they have now? The model output is: Answer: The cafeteria
    originally had 23 apples. They used 20 for lunch, leaving them with 23 minus 20
    equals 3 apples. They then bought 6 more apples, so they now have 3 plus 6 equals
    9 apples. The answer is 9.'
  prefs: []
  type: TYPE_NORMAL
- en: The CoT for one-shot learning prompts is demonstrated by enriching sample examples
    with detailed reasoning processes, showing how to break down large problems effectively.
    The paper assesses the performance of standard and CoT-based prompts on three
    major language models—LaMDA, GPT, and PaLM. While GPT is developed by OpenAI,
    Google has released the other two. Testing revealed that Google’s PaLM model,
    boasting 540 billion parameters, reached approximately 60.1% accuracy on the elementary-level
    math reasoning dataset GSM8K, initially introduced by OpenAI in October 2021.
  prefs: []
  type: TYPE_NORMAL
- en: 'Following CoT’s introduction, the self-consistency technique, unveiled in March
    2022, enhanced GSM8K’s accuracy to 74.4%. Illustrated in [Fig. 5.9](#f0050), self-consistency
    diverges from previous CoT methods by not just outputting a single task’s reasoning
    process and answer. Instead, it mandates the large language model to generate
    multiple reasoning processes and answers for each prompt, selecting the optimal
    solution through a voting mechanism. This approach integrates three advancements:
    extending from a single to multiple prompt questions, validating the accuracy
    of intermediate reasoning steps, and applying weighted voting to the responses,
    boosting GSM8K’s accuracy to approximately 83%.'
  prefs: []
  type: TYPE_NORMAL
- en: '![Illustration of Chain of Thought Prompt and Self-consistency in LLM with
    examples of reasoning paths for a question about Janet''s ducks and their eggs.](../images/F000059f05-09-9780443274367.jpg)'
  prefs: []
  type: TYPE_IMG
- en: '[Figure 5.9](#Bf0050) Improving reasoning chains in language models with self-consistency.'
  prefs: []
  type: TYPE_NORMAL
- en: 'It shows a prompt being processed by the LLM, leading to different reasoning
    paths. The example question is: Janet''s ducks lay 16 eggs each day. She eats
    3 for breakfast, uses 4 to bake muffins for her friends and sells the remaining
    eggs for dollar2 each. How much does she earn each day? The greedy decoder path
    concludes: This means she eats 3 plus 4 equals 7 eggs each day. She sells the
    remaining eggs for dollar2 each, so she sells 7 times dollar2 equals dollar14
    each day. The answer is dollar14\. The self-consistency approach samples various
    reasoning paths: 1\. She has 16 minus 3 minus 4 equals 9 eggs left, so she earns
    dollar2 times 9 equals dollar18 each day. The answer is dollar18\. 2\. This means
    she sells the remaining eggs for dollar2 times (16 minus 4 minus 3) equals dollar26
    each day. The answer is dollar26\. 3\. She eats 3 eggs for breakfast, so she has
    16 minus 3 equals 13 eggs left. After using 4 eggs for baking muffins, she has
    13 minus 4 equals 9 eggs left. Therefore, she sells 9 eggs at dollar2 each, earning
    dollar18\. The answer is dollar18\. The final answer is aggregated as dollar18.'
  prefs: []
  type: TYPE_NORMAL
- en: The CoT applications all reflect the divide-and-conquer approach, where complex
    reasoning challenges are segmented into simpler subtasks. By resolving these subtasks,
    the overall problem solution is derived from the individual answers. This strategy
    reaffirms the concept of “Bayesian inference of conceptual distribution,” using
    prompts to define task-specific conceptual distributions and enabling the model
    to more effectively infer the concepts learned during pretraining. With inherent
    reasoning abilities, large language models can enhance their step-by-step problem-solving
    accuracy by employing properly crafted prompts and methodical guidance.
  prefs: []
  type: TYPE_NORMAL
- en: For corpora in various languages, appropriate step-by-step prompts can differ
    significantly. For instance, in Chinese corpora, a phrase equivalent to “Let’s
    think step by step” could be better expressed as “The detailed problem-solving
    approach is as follows,” rather than a literal translation. Consequently, when
    employing different CoT approaches, it is crucial to tailor prompts based on the
    specific linguistic context. By doing so, prompts can effectively enhance the
    posterior conceptual distribution for task decomposition, enabling the large language
    model to dissect a complex reasoning issue into a series of simpler subtasks,
    thus improving its inferential prowess.
  prefs: []
  type: TYPE_NORMAL
- en: 5.6 Summary
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: GPT-3 is an advanced model built on an optimized sparse Transformer decoder
    architecture, boasting up to 175 billion parameters. As the model has expanded,
    it has exhibited substantial improvements across a variety of NLP tasks; however,
    this enhancement comes at the cost of increased training expenses. To mitigate
    these costs, GPT-3 employs a content-based learning strategy, especially leveraging
    few-shot learning. This approach does not require adjusting model parameters but
    instead relies on acquiring task-specific knowledge from a limited number of examples,
    thus delivering strong performance on new tasks. This chapter delves into the
    workings of GPT-3’s content-based learning through the lenses of Bayesian inference
    and conceptual distributions, and it discusses the divide-and-conquer philosophy
    underpinning the CoT approach. Lastly, [Section 5.5](#s0080) investigates the
    CoT’s capacity for coherent reasoning and innovation. By incorporating this advanced
    reasoning into its workflow, the model enhances its ability to comprehend and
    produce complex outputs.
  prefs: []
  type: TYPE_NORMAL
- en: <hgroup>
  prefs: []
  type: TYPE_NORMAL
- en: Chapter 6 Pretraining strategies for large language models
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: </hgroup>
  prefs: []
  type: TYPE_NORMAL
- en: Abstract
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This chapter provides an in-depth exploration of pretraining strategies for
    large language models (LLMs), focusing on the critical aspects of dataset selection,
    data processing, and distributed training techniques. It begins by discussing
    the importance of diverse, high-quality datasets and methods like deduplication
    and augmentation to enhance model performance and generalization. The chapter
    then delves into distributed training strategies, including data parallelism,
    model parallelism, and pipeline parallelism, which are essential for efficiently
    handling the massive computational demands of LLMs. Tools such as Pathways, Megatron-LM,
    and DeepSpeed Zero are highlighted for their roles in optimizing distributed training
    processes. The chapter concludes with a comparison of various training strategies
    employed by models like GPT-3, OPT, PaLM, and BLOOM, emphasizing the importance
    of stable parameters, optimized training settings, and hardware considerations
    such as BF16 precision. These insights are crucial for improving the efficiency
    and effectiveness of pretraining large-scale language models.
  prefs: []
  type: TYPE_NORMAL
- en: Keywords
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Large language models; pre-training strategies; dataset selection; distributed
    training; data parallelism; model parallelism; pipeline parallelism; Megatron-LM;
    DeepSpeed ZeRO; BF16 precisiong
  prefs: []
  type: TYPE_NORMAL
- en: In the initial stages of developing large language models (LLMs), key challenges
    such as the amount of data, the size of parameters, the design of the training
    framework, and how the training is managed play crucial roles. These issues might
    lead to problems like sudden spikes in loss or the model struggling to properly
    converge. To overcome these, integrating various training approaches, including
    handling of pretraining data, selection of training frameworks, and adjustments
    in training parameters, is essential to improve both the stability and efficiency
    of the pretraining phase.
  prefs: []
  type: TYPE_NORMAL
- en: From the release of GPT-3 onwards, OpenAI has implemented a partly proprietary
    approach, keeping certain essential technical details confidential. Details such
    as the methodology for creating the training dataset, the computational resources
    required, and specifics about hyperparameters like the learning rate, number of
    iterations, or the type of optimizer remain undisclosed. This chapter aims to
    delve deeper into the pretraining strategies of ChatGPT, drawing comparisons and
    insights from the disclosed information of other major natural language processing
    models.
  prefs: []
  type: TYPE_NORMAL
- en: 6.1 Pre-training datasets
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The ChatGPT model has been developed and refined based on GPT-3.5, whereas InstructGPT
    builds upon GPT-3.0\. Both have been fine-tuned with the aid of human feedback
    to optimize performance. As outlined in [Table 6.1](#t0010), during its pretraining,
    GPT-3.0 extensively used sources like Wikipedia, a variety of books, Internet-sourced
    web pages such as Common Crawl, and datasets like WebText2\. GPT-3.5, on the other
    hand, expanded its sources to include code-related datasets from GitHub, conversational
    forums such as StackExchange, and datasets of video subtitles.
  prefs: []
  type: TYPE_NORMAL
- en: '1. Wikipedia: Serving as a free, multilingual online encyclopedia, Wikipedia
    brings together the knowledge and efforts of over 300,000 volunteers. By April
    2022, the English Wikipedia featured more than 6.4 million articles, totaling
    over 4 billion words. Wikipedia’s text is immensely valuable, noted for its meticulous
    content, precise references, clear descriptions, and extensive scope, which is
    why many research laboratories prefer to use its English version as their primary
    dataset.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '2. Books: This category includes datasets from both fiction and nonfiction
    genres, aimed at enhancing the model’s capabilities in storytelling and responsiveness.
    These datasets are primarily drawn from sources like Project Gutenberg and Smashwords
    (Toronto BookCorpus/BookCorpus). Notably, OpenAI’s GPT-3 paper did not reveal
    the exact origins of the Books1 (12 billion tokens) and Books2 (55 billion tokens)
    datasets. Researchers speculate that these might come from collections similar
    to those on LibGen18 and Sci-Hub, though their vast sizes might not perfectly
    match the expected dataset characteristics of GPT-3.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '3. Scholarly Journals: This dataset comprises articles from both preprints
    and journals that have been formally published, providing a robust and precise
    academic grounding. Academic texts are typically characterized by strong logical
    structuring, rationality, and detailed exposition. Key sources for these datasets
    include ArXiv and the National Institutes of Health.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '4. WebText: WebText is a substantial dataset sourced from all outbound links
    on Reddit that have gathered at least three upvotes. This approach captures the
    trends of popular content online, which helps in curating quality links and generating
    related textual content.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '5. Common Crawl: Operational since 2008, Common Crawl offers an extensive collection
    of web pages, metadata, and text extractions. It covers a diverse array of text
    in various languages and domains. Researchers often use the English-only, filtered
    version (C4) of this dataset for their projects.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '6. Other Datasets: This includes datasets like GitHub for code, StackExchange
    for dialogues, and collections of video subtitles. These are vital in developing
    the model’s proficiency in understanding code, managing dialogues, and processing
    multimodal information.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Table 6.1
  prefs: []
  type: TYPE_NORMAL
- en: Dataset used for training GPT-3.
  prefs: []
  type: TYPE_NORMAL
- en: '| Dataset | Order of magnitude (tokens) | Weights in the training mix |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '| Common Crawl (filtered) | 410B | 60% |'
  prefs: []
  type: TYPE_TB
- en: '| WebText2 | 19B | 22% |'
  prefs: []
  type: TYPE_TB
- en: '| Books1 | 12B | 8% |'
  prefs: []
  type: TYPE_TB
- en: '| Books2 | 55B | 8% |'
  prefs: []
  type: TYPE_TB
- en: '| Wikipedia | 3B | 3% |'
  prefs: []
  type: TYPE_TB
- en: To summarize, the GPT-3.0 and GPT-3.5 models have harnessed an extensive variety
    of datasets during their training phases, encompassing a broad range of fields,
    languages, and content types. This diversity in training resources has equipped
    the models with a more comprehensive understanding and improved efficiency, resulting
    in enhanced performance in real-world applications. The variety and depth of these
    datasets enable the models to effectively comprehend and produce a wide array
    of textual outputs, thereby increasing their usability and adaptability across
    various applications.
  prefs: []
  type: TYPE_NORMAL
- en: 6.2 Processing of pretraining data
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: GPT-3 underwent its pretraining on a massive dataset of about 300 billion tokens,
    with around 60% derived from a meticulously selected portion of Common Crawl,
    and the rest from sources including WebText2, Books1 and Books2, and Wikipedia.
    The GPT-3.5 update further integrated code-related datasets such as GitHub Code.
    The way these datasets are sampled isn’t strictly based on size but is optimized
    for quality. Although the open-source community has made several attempts to replicate
    ChatGPT, truly successful efforts are quite rare. Models like OPT-175B and BLOOM-176B,
    while comparable or even larger in parameter size than GPT-3, have not reached
    the performance level of the original GPT-3\. Still, these models serve as valuable
    case studies for addressing the critical aspects of handling pretraining data
    discussed in this chapter.
  prefs: []
  type: TYPE_NORMAL
- en: 1. Quality and quantity of pretraining data. The amount of data used for training
    is crucial for the effectiveness of pretrained models. For example, the volume
    of data used for PaLM and GPT-3’s pretraining far exceeds that of OPT and BLOOM
    (refer to [Table 6.2](#t0015)), indicating that large, high-quality datasets are
    pivotal to their success. Moreover, the quality of data significantly affects
    model performance. GPT-3, for instance, utilizes an efficient classifier to sift
    through its pretraining dataset, a step not taken by models like OPT and BLOOM
    during their training.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 2. De-duplication of Pre-training Data. Removing duplicates from the dataset
    is essential to prevent models from overly adapting to the same data, which improves
    their ability to generalize to new data. GPT-3 implements de-duplication at the
    document level to combat overfitting, while the Pile corpus used in OPT’s pretraining
    still harbors a considerable amount of repeated data.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 3. Diversity of Pre-training Datasets. For large-scale language models, it is
    vital to train on diverse datasets that cover different domains, formats (like
    text, code, and tables), and languages. OPT-175B incorporates sources such as
    Pushshift.io Reddit and Common Crawl, which are predominantly English. However,
    through a combination of various sources including Common Crawl, the corpus integrates
    a small portion of nonEnglish data. In contrast, BLOOM utilizes the ROOTS corpus,
    which encompasses data in 46 natural languages and 13 programming languages from
    hundreds of sources, providing it with a much richer diversity than OPT-175B.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Table 6.2
  prefs: []
  type: TYPE_NORMAL
- en: Training dataset for large language models.
  prefs: []
  type: TYPE_NORMAL
- en: '|   | Number of tokens in the pre-training corpus | Number of tokens seen during
    pre-training |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '| PaLM | 780B | 770B |'
  prefs: []
  type: TYPE_TB
- en: '| GPT-3 | 500B | 300B |'
  prefs: []
  type: TYPE_TB
- en: '| OPT | 180B | 300B |'
  prefs: []
  type: TYPE_TB
- en: '| BLOOM | 341B | 366B |'
  prefs: []
  type: TYPE_TB
- en: It is crucial to recognize that while having a diverse range of data is essential
    for training broadly capable LLMs, the specific make-up of the pretraining data
    has a profound effect on how well these models perform in certain tasks. For example,
    BLOOM, with its higher proportion of data in multiple languages, excels in tasks
    like multilingual processing and translation. OPT’s extensive use of conversational
    data, such as from Reddit, likely contributes to its effectiveness in dialogue-based
    tasks. GPT-3.5’s emphasis on coding datasets not only enhances its performance
    in coding-related tasks but may also improve its ability in chain-of-thought (CoT)
    reasoning. However, despite BLOOM’s inclusion of code data in pretraining, it
    struggles with coding and CoT tasks, indicating that code data alone isn’t enough
    to excel in these areas.
  prefs: []
  type: TYPE_NORMAL
- en: 'To push the boundaries of pretrained language models even further, researchers
    should consider the following:'
  prefs: []
  type: TYPE_NORMAL
- en: 1. Finer filtering of training data to ensure high quality.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 2. More efficient de-duplication of training data to minimize redundancy and
    prevent overfitting.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 3. Enhancing the diversity of training data to boost the models’ ability to
    generalize across various tasks and fields.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 4. Investigating how data distribution affects model performance in specific
    applications to optimize the selection and organization of pretraining data.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Effective data de-duplication prevents overfitting, careful data selection ensures
    quality, and diverse datasets enhance the general applicability of large-scale
    pretrained language models. However, the detailed processes by which GPT-3 handles
    these data, or the specifics of the pretraining data itself, remain undisclosed.
  prefs: []
  type: TYPE_NORMAL
- en: 6.3 Distributed training patterns
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: One distinct characteristic of LLMs is their ever-increasing size. Take GPT-3,
    for instance, with its staggering 175 billion parameters. Training this model
    requires a month, even with 1024 high-capacity (80 GB) A100 GPUs. The Meta LLaMA
    model, with 65 billion parameters, pushes the envelope further by using 2048 Nvidia
    A100 GPUs over a span of 21 days. With such growth in model size, significant
    challenges inevitably follow.
  prefs: []
  type: TYPE_NORMAL
- en: 'A primary hurdle is the limitations imposed by current hardware technology,
    notably the memory wall issue. Due to physical constraints, the computing capabilities
    and memory capacities of single devices are insufficient to support the expanding
    scale of large models, leading to challenges as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '1. VRAM limitations: No existing graphics processing unit (GPU) can fully store
    the parameters of these massive models. For instance, GPT-3 needs about 700 GB
    just for the model parameters, another 700 GB for gradients, and 1400 GB for optimizer
    states, adding up to roughly 2.8 TB.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '2. Computational challenges: Even if it were possible to cram an entire model
    into one GPU (say, by shuttling parameters between the host and device memory),
    the sheer volume of computations required would make the training process impractically
    long. For perspective, training GPT-3 on a single V100 NVIDIA GPU would take an
    estimated 288 years ([Fig. 6.1](#f0010)).'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![A logarithmic graph showing the training compute requirements for various
    AI models from 2012 to 2021\. It compares the growth rates of transformer models,
    CV/NLP/Speech models and Moore''s Law.](../images/F000060f06-01-9780443274367.jpg)'
  prefs: []
  type: TYPE_IMG
- en: '[Figure 6.1](#Bf0010) Computational requirements for training state-of-the-art
    models in computer vision, natural language processing, and speech. Image source:
    [https://medium.com/riselab/ai-and-memory-wall-2cb4265cb0b8](https://medium.com/riselab/ai-and-memory-wall-2cb4265cb0b8).'
  prefs: []
  type: TYPE_NORMAL
- en: 'The y-axis represents training compute in PFLOPS, ranging from 1eplus02 to
    1eplus09 on a logarithmic scale. The x-axis shows years from 2012 to 2021\. Three
    trend lines are shown: 1\. Transformer: 750x slash 2 yrs 2\. CV slash NLP slash
    Speech: 15x slash 2 yrs 3\. Moore''s Law: 2x slash 2 yrs Various AI models are
    plotted: AlexNet (2012) VGG, Seq2Seq (2014) ResNet, InceptionV3 (2015) Xception
    (2016) ResNext, DenseNet (2017) ELMo, Transformer (2018) BERT, GPT-1 (2019) MoCo,
    ResNet50, XLNet, Megatron LM, Microsoft T-NLG (2020) GPT-3, Wav2Vec 2.0 (2021)
    GPT-3 is the highest point on the graph, showing significantly higher compute
    requirements than other models. The graph illustrates the rapid increase in compute
    requirements for AI models, particularly for transformer models, which show a
    750x increase every 2 years, far outpacing Moore''s Law (2x every 2 years).'
  prefs: []
  type: TYPE_NORMAL
- en: As a result, despite the growing pains of advancing chip technology, distributed
    training across multiple nodes has emerged as the primary strategy for managing
    these gargantuan training tasks. Modern approaches include data parallelism, model
    parallelism, pipeline parallelism, and hybrid methods that combine data and model
    parallelism.
  prefs: []
  type: TYPE_NORMAL
- en: 6.3.1 Data parallelism
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Data parallelism is a technique where the training data batch is split across
    multiple computational devices. Each device processes a portion of the data independently—performing
    tasks like forward and backward propagation and updating parameters. After each
    cycle of training, these devices synchronize their parameters to ensure the model
    remains consistent across all platforms. This method is particularly useful for
    processing large datasets quickly ([Fig. 6.2](#f0015)).
  prefs: []
  type: TYPE_NORMAL
- en: '![A diagram showing a parameter server with model replicas and data sharding.](../images/F000060f06-02-9780443274367.jpg)'
  prefs: []
  type: TYPE_IMG
- en: '[Figure 6.2](#Bf0015) Diagram of data parallelism.'
  prefs: []
  type: TYPE_NORMAL
- en: Below the parameter server, there are three model replicas, each connected to
    a data sharding component. The parameter server is labeled with Delta W prime
    equals W minus H times Delta W. Each model replica is connected to the parameter
    server with arrows labeled W prime and Delta W. The data sharding components are
    depicted as cylindrical shapes below each model replica.
  prefs: []
  type: TYPE_NORMAL
- en: 'In practical terms, data parallelism is achieved by dividing the overall batch
    into smaller subbatches, each handled by a different device. A common framework
    for this is the parameter server model. Here, every device holds a copy of the
    model. Each node processes different subsets of data and calculates gradients.
    These gradients are then sent to a central node, or parameter server, which updates
    the model and redistributes the updated version back to each node. Despite its
    efficacy in scaling, data parallelism faces certain challenges:'
  prefs: []
  type: TYPE_NORMAL
- en: 1. If the batch size per GPU drops below a certain point, it can lead to underutilization
    of GPU capacities and higher communication overhead.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 2. There’s a limit to how many devices can be effectively used, dictated by
    the manageable batch size, which can cap the number of accelerators employed in
    training.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 6.3.2 Model parallelism
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Model parallelism is designed to bypass the memory restrictions of individual
    computing units, like GPUs, by distributing a massive model across several devices
    during training. In this setup, each component of the model is handled by different
    devices, and every device is involved in all steps of the training process, as
    illustrated in [Fig. 6.3](#f0020). Model parallelism includes two primary types:
    tensor parallelism and pipeline parallelism.'
  prefs: []
  type: TYPE_NORMAL
- en: '1. Tensor parallelism: This approach splits model parameters—such as weights,
    gradients, and optimizer states—into smaller subtensors, which are then allocated
    to various computing devices. Each device handles its portion of the computation
    independently and synchronizes with others to update the entire model. This method
    effectively reduces the burden on individual device memory, facilitating the training
    of larger models within memory constraints.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Tensor parallelism specifically involves dividing the model’s parameters and
    distributing them across different devices. This process uses different methods
    of sharding, with one-dimensional sharding being the most common, where a tensor
    is split along a single dimension, either horizontally or vertically. Future techniques
    may include more complex, multidimensional sharding methods. For example, consider
    matrix multiplication in the format $MathML$![Equation](../images/F000060si1.png),
    where *X* is the input, *A* the weights, and *Y* the output. The process involves
    breaking down the matrix into segments for calculation and then aggregating the
    results. The matrix *A* could be divided by rows or columns:'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: $MathML$ (6.1)
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '![Equation](../images/F000060si2.png) (6.1)'
  prefs:
  - PREF_IND
  type: TYPE_IMG
- en: This setup allows, for example, two different GPUs to handle separate segments
    of a matrix multiplication task and then communicate to combine the final output.
    This method can be expanded to include more GPUs and can be applied to other operations
    that support sharding.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: 2. Pipeline parallelism. This advanced approach divides a model into several
    sequential stages, each containing one or more layers, with each stage executed
    on different computational devices. Similar to a production line, training data
    flows seamlessly from one stage to the next. Each device processes its assigned
    stage and then passes the outcome forward, boosting both the efficiency and speed
    of training ([Fig. 6.4](#f0025)).
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![A diagram showing matrix multiplication with column-wise and row-wise parallelism,
    illustrating the process and resulting matrices.](../images/F000060f06-04-9780443274367.jpg)'
  prefs: []
  type: TYPE_IMG
- en: '[Figure 6.4](#Bf0025) The division of matrix multiplication across multiple
    GPUs.'
  prefs: []
  type: TYPE_NORMAL
- en: The initial matrices are X and A. Matrix X is a 2 by 4 matrix with elements
    0, 1, 2, 3 in the first row and 4, 5, 6, 7 in the second row. Matrix A is a 4
    by 2 matrix with elements 10, 14 in the first row, 11, 15 in the second row, 12,
    16 in the third row and 13, 17 in the fourth row. The resulting matrix Y is a
    2 by 2 matrix with elements 74, 98 in the first row and 258, 346 in the second
    row. Column-wise parallelism is shown with matrix X multiplied by sub-matrices
    A1 and A2\. Matrix A1 is a 4 by 1 matrix with elements 10, 11, 12, 13\. Matrix
    A2 is a 4 by 1 matrix with elements 14, 15, 16, 17\. The resulting matrices Y1
    and Y2 are 2 by 1 matrices with elements 74, 258 and 98, 346 respectively. These
    are combined to form matrix Y. Row-wise parallelism is shown with matrix X divided
    into sub-matrices X1 and X2\. Matrix X1 is a 2 by 2 matrix with elements 0, 1
    in the first row and 4, 5 in the second row. Matrix X2 is a 2 by 2 matrix with
    elements 2, 3 in the first row and 6, 7 in the second row. Matrix X1 is multiplied
    by matrix A1 to form matrix Y1, a 2 by 1 matrix with elements 11, 15 in the first
    row and 95, 131 in the second row. Matrix X2 is multiplied by matrix A2 to form
    matrix Y2, a 2 by 1 matrix with elements 63, 83 in the first row and 163, 215
    in the second row. The resulting matrices Y1 and Y2 are combined to form matrix
    Y.
  prefs: []
  type: TYPE_NORMAL
- en: '![The diagram shows four machines labeled as Machine 1, Machine 2, Machine
    3 and Machine 4\. Machine 1 is connected to Machine 2 and Machine 3\. Machine
    2 is connected to Machine 4 and Machine 3.](../images/F000060f06-03-9780443274367.jpg)'
  prefs: []
  type: TYPE_IMG
- en: '[Figure 6.3](#Bf0020) Diagram of model parallelism.'
  prefs: []
  type: TYPE_NORMAL
- en: Neural networks can benefit from tailored parallel strategies based on their
    structure. For example, components with numerous parameters might best be managed
    by splitting the model among devices, whereas segments with fewer parameters could
    be better served by splitting the data. Mixing parallel strategies in specific
    network parts can minimize data transfer. In parts of the network with extensive
    hidden layers, both data and model matrices might be split simultaneously. Unlike
    data and model parallelism, where devices perform parallel computations, pipeline
    parallelism organizes tasks into a clear sequence, delegating different stages
    to various devices. This allows each device to focus on a specific segment of
    the network, supporting the training of larger models or handling larger batches
    more effectively.
  prefs: []
  type: TYPE_NORMAL
- en: In practice, different network layers are distributed across various GPUs, each
    sequentially processing its designated stage with fresh data inputs at every step,
    optimizing throughput. As depicted in [Fig. 6.5](#f0030), each computing unit
    is responsible for a specific layer or set of layers, executing in an orderly
    fashion. For instance, when the initial data input is received, device 0 calculates
    the first layer, $MathML$![Equation](../images/F000060si3.png) by the next step,
    device 0 processes another dataset’s first layer, while device 1 moves on to the
    second layer, $MathML$![Equation](../images/F000060si4.png), of the initial dataset.
    Though pipeline and tensor parallelism typically exist alongside each other and
    complement one another, pipeline setups can lead to underutilization, as downstream
    units must wait for their predecessors to finish. Additionally, this method can
    lead to “pipeline bubbles” where devices may idle between completing forward propagation
    and starting backward propagation, as illustrated in [Fig. 6.5](#f0030).
  prefs: []
  type: TYPE_NORMAL
- en: '![A diagram showing forward and backward computation across four devices with
    a pipeline bubble and update stages.](../images/F000060f06-05-9780443274367.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 6.5 Diagram of pipeline parallel training.
  prefs: []
  type: TYPE_NORMAL
- en: The diagram illustrates the computation process across four devices labeled
    Device 0, Device 1, Device 2 and Device 3 over time. The time axis is represented
    by a horizontal arrow pointing to the right. The computation is divided into forward
    computation and backward computation stages. Forward computation includes F sub
    0 end sub on Device 0, F sub 1 end sub on Device 1, F sub 2 end sub on Device
    2 and F sub 3 end sub on Device 3\. Backward computation includes B sub 0 end
    sub on Device 0, B sub 1 end sub on Device 1, B sub 2 end sub on Device 2 and
    B sub 3 end sub on Device 3\. There is a pipeline bubble between the forward and
    backward computation stages. After backward computation, each device undergoes
    an update stage labeled as update.
  prefs: []
  type: TYPE_NORMAL
- en: '[Table 6.3](#t0020) provides a comparative analysis of three parallelism techniques—data
    parallelism, tensor parallelism, and pipeline parallelism—focusing on aspects
    like generality, computational utilization, VRAM consumption, and communication
    overhead. Data parallelism stands out for its versatility and high efficiency
    in both computation and communication, although it comes with a considerable VRAM
    overhead. Tensor parallelism, on the other hand, is more VRAM-efficient but incurs
    additional communication costs and is less flexible. Pipeline parallelism is efficient
    in terms of VRAM usage and has lower communication overheads but may suffer from
    “pipeline bubbles,” which can disrupt the smooth processing flow.'
  prefs: []
  type: TYPE_NORMAL
- en: Table 6.3
  prefs: []
  type: TYPE_NORMAL
- en: Comparison of three types of parallelism.
  prefs: []
  type: TYPE_NORMAL
- en: '|   | Data parallelism | Tensor parallelism | Pipeline parallelism |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- | --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '| Generality | Fully general | It can only be used on some models; for example,
    tensor parallelism cannot currently be applied to CNNs | Generally applicable
    |'
  prefs: []
  type: TYPE_TB
- en: '| Computation utilization | When data distribution is relatively even, the
    utilization loss of computational devices is low | Frequent transmission of intermediate
    results incurs some utilization loss of computational devices | Pipeline bubbles
    result in some utilization loss of computational devices |'
  prefs: []
  type: TYPE_TB
- en: '| Memory overhead | Each card retains the same model and optimizer parameters,
    resulting in relatively high overhead | It can evenly distribute memory overhead
    across different servers | If the parameter sizes of different layers of the model
    vary significantly, adjustments are required to achieve optimal results |'
  prefs: []
  type: TYPE_TB
- en: '| Communication volume | Only the gradients on different GPUs need to be transmitted,
    resulting in low overhead | Frequent transmission of intermediate results incurs
    significant communication overhead | Only the hidden states and backpropagation
    gradients need to be transmitted between different layers, resulting in low communication
    overhead |'
  prefs: []
  type: TYPE_TB
- en: 6.4 Technical approaches to distributed training
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Distributed training often outperforms training on a single machine with a single
    GPU because it enables training on a much larger scale. However, each method of
    distributed training comes with its own set of pros and cons. Simply adding more
    computing devices doesn’t always lead to increased processing power, due to the
    slower growth rate of memory bandwidth compared to processing power, and even
    slower growth in interdevice network bandwidth. Limited by the so-called “memory
    wall” and “network wall,” the amount of data transferred becomes a critical factor
    in determining the speed and effectiveness of distributed training.
  prefs: []
  type: TYPE_NORMAL
- en: When comparing data parallelism with model parallelism, it is clear that if
    a batch of data results in many intermediate outputs but has relatively few parameters,
    data parallelism is likely the better option. On the other hand, if processing
    a batch involves managing a large number of parameters with fewer intermediate
    outputs, model parallelism may prove more beneficial. It is important to note
    that data parallelism has a distinct advantage because it allows communication
    tasks to overlap more seamlessly with computations, effectively hiding some of
    the communication delay. This is more challenging to achieve with model parallelism.
  prefs: []
  type: TYPE_NORMAL
- en: For training massive models, pipeline parallelism is advantageous due to its
    minimal data transfer requirements, which involve only the sum of data transferred
    between stages. This is in contrast to data and tensor parallelism, which involve
    data transfers across the entire computation graph. Therefore, pipeline parallelism
    may be preferred for devices with limited bandwidth. However, a hybrid approach
    combining pipeline and model parallelism might offer superior performance compared
    to using just one of these methods. Additionally, there is potential for optimization
    in both data and model parallelism, as the time spent computing can obscure the
    time needed for data transfers.
  prefs: []
  type: TYPE_NORMAL
- en: As LLMs gain prominence, the focus on developing and implementing parallel processing
    strategies like model parallelism and pipeline parallelism for the foundational
    Transformer model has become a critical task in both academic and industrial circles.
    Examples include the GPipe neural network training library built on Lingvo, Microsoft’s
    PipeDream, NVIDIA’s Megatron-LM, Facebook’s FairScale, Microsoft’s DeepSpeed ZeRO,
    and Google’s Pathways.
  prefs: []
  type: TYPE_NORMAL
- en: There are primarily two technological paths for training massive language models.
    First, the approach led by Google utilizes a combination of tensor processing
    units (TPUs), accelerated linear algebra (XLA), and TensorFlow/JAX, deeply integrated
    with Google’s cloud infrastructure. The second path, supported by industry giants
    like NVIDIA, Meta, and Microsoft, relies on GPUs combined with PyTorch, Megatron-LM,
    and DeepSpeed. This latter path represents the most developed open-source strategy
    and facilitates large-scale model training through parallelism. Both methods are
    tailored for training substantial models across numerous GPUs and nodes, adeptly
    overcoming the challenges of memory and computation that typically accompany LLM
    training, enabling the scaling of models despite hardware limitations.
  prefs: []
  type: TYPE_NORMAL
- en: 6.4.1 Pathways
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Pathways is an innovative asynchronous distributed data flow architecture developed
    by Google, tailored for machine learning (ML) applications. Illustrated in [Fig.
    6.6](#f0035), the architecture organizes the model’s computation into a directed
    acyclic graph (DAG), where nodes signify computation tasks and edges denote data
    dependencies. Pathways aims to enhance distributed training efficiency, showing
    particular strength when handling expansive models and datasets. The architecture
    boasts four main features:'
  prefs: []
  type: TYPE_NORMAL
- en: 1. Flexibility. Pathways supports various forms of parallel computing, including
    data parallelism, model parallelism, and pipeline parallelism, making it adaptable
    to different ML challenges and hardware setups.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 2. Asynchronous execution. Pathways enables tasks to start processing as soon
    as their input data dependencies are satisfied, without the need for the entire
    batch to be ready. This approach minimizes idle time for computing resources,
    boosting training efficiency.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 3. Distributed processing. The architecture allows tasks to be spread across
    multiple devices, maximizing the use of available hardware and enhancing both
    the speed and scalability of training.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 4. Fault tolerance. Pathways is designed with fault-tolerance capabilities,
    ensuring continuous operation even in the face of device failures. This feature
    is crucial for long-term training tasks within large-scale distributed systems,
    where such failures are more common.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![A diagram illustrating the flow of tasks to outputs.](../images/F000060f06-06-9780443274367.jpg)'
  prefs: []
  type: TYPE_IMG
- en: '[Figure 6.6](#Bf0035) Google pathways asynchronous distributed data flow. Image
    source: Paper “Introducing Pathways: A next-generation AI architecture”.'
  prefs: []
  type: TYPE_NORMAL
- en: The diagram shows a network of interconnected nodes representing the flow from
    tasks to outputs. At the bottom, there are labels for Task 1, Task 2, Task 3 and
    Task N. These tasks are connected through a series of nodes and pathways to the
    outputs at the top, labeled as Output, Output, Output and Output.
  prefs: []
  type: TYPE_NORMAL
- en: '[Fig. 6.7](#f0040) provides a comprehensive view of the Pathways architecture,
    encompassing three primary components:'
  prefs: []
  type: TYPE_NORMAL
- en: '![A comprehensive view of the Pathways architecture with three primary components:
    Sharded Dataflow Program, Datacenter Network and Gang Scheduling.](../images/F000060f06-07-9780443274367.jpg)'
  prefs: []
  type: TYPE_IMG
- en: '[Figure 6.7](#Bf0040) Overview of the pathways system. Image source: Paper
    “Pathways: Asynchronous Distributed Dataflow for ML”.'
  prefs: []
  type: TYPE_NORMAL
- en: The image consists of three primary components of the Pathways architecture.
    The first component, labeled Sharded Dataflow Program (Plaque), shows a diagram
    with nodes A, B and C connected by transfer subgraphs. It includes symbols for
    Host (many per island), Resource Manager (global), Scheduler (per island), Executor
    (per device) and Collective operations. The second component, labeled Datacenter
    Network (RDMA), depicts a network with accelerator slices with private interconnects
    and model components labeled A, B and C. Hosts, resource managers, schedulers
    and executors are represented within the network. The third component, labeled
    Gang scheduling, shows a client running a program over time with various tasks
    scheduled and executed in parallel. The diagram includes arrows indicating the
    flow of tasks and operations.
  prefs: []
  type: TYPE_NORMAL
- en: 'Distributed computing represented as DAG (left diagram): This diagram depicts
    each node as an individual compiled function, with edges between nodes illustrating
    the flow of data between these functions. This setup forms the core of the Pathways
    system, where all computations are structured as a DAG.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Resource manager distributes island accelerator subsets (middle diagram): The
    resource manager assigns subsets of island accelerators, termed “virtual slices,”
    to each compiled function. This allocation method ensures that each function operates
    on designated subsets of accelerators, significantly improving the efficiency
    of computations.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Centralized scheduling by each island''s scheduler (right diagram): Each island
    features a central scheduler that orchestrates gang scheduling for all computations
    within the island. These computations are subsequently assigned to the executors
    on each slice for execution. Arrows emanating from the client module in the diagram
    denote control messages, whereas the other arrows depict the transmission of data
    paths.'
  prefs: []
  type: TYPE_NORMAL
- en: The Pathways architecture enables components of a model to be processed in parallel
    across multiple devices, facilitating model parallelism. Within Pathways’ DAG
    framework, each node symbolizes a segment of the model, allowing the entire computation
    to occur concurrently on various devices, thereby accelerating model training.
    Additionally, Pathways supports data parallelism by processing different data
    subsets simultaneously across devices. In this configuration, each node processes
    a data subset and integrates the results into a unified model. Pathways is versatile
    in its parallel strategies and can fine-tune the level of parallelism as needed,
    offering the flexibility to employ model parallelism, data parallelism, or their
    combinations based on specific requirements.
  prefs: []
  type: TYPE_NORMAL
- en: Pathways aims to leverage existing hardware assets like GPUs and TPUs to boost
    ML tasks’ performance. While it doesn’t require specialized hardware, its effectiveness
    is tightly linked to the distributed computing power of the underlying hardware.
    Pathways can assign tasks across multiple devices and capitalize on interdevice
    communications for distributed computing, making it suitable for a variety of
    hardware setups, including clusters of multiple GPUs, TPUs, or a mix of both.
  prefs: []
  type: TYPE_NORMAL
- en: However, to fully harness the capabilities of the Pathways architecture, it
    is crucial to use hardware with robust communication facilities. High-speed networking
    options such as InfiniBand or high-speed Ethernet can dramatically enhance data
    transfer rates between devices, improving distributed computing performance.
  prefs: []
  type: TYPE_NORMAL
- en: Pathways is designed to operate on existing hardware, but for best results,
    choosing hardware with superior communication capabilities is essential. It is
    noteworthy that Google develops the specific implementation of Pathways as an
    internal project, and the details and source code are not entirely public.
  prefs: []
  type: TYPE_NORMAL
- en: 6.4.2 Megatron-LM
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Megatron-LM is a deep learning tool developed by NVIDIA and is available as
    an open-source project on GitHub, along with its documentation. It is compatible
    with other deep learning frameworks, such as PyTorch and TensorFlow, enabling
    the training of large-scale models across different hardware and software setups.
    The tool is designed to train massive models efficiently on multiple GPUs and
    nodes by utilizing model parallelism strategies, primarily tensor and pipeline
    parallelism.
  prefs: []
  type: TYPE_NORMAL
- en: By integrating tensor and pipeline parallelism, Megatron-LM optimizes the training
    process for extensive Transformer models. It achieves this by distributing the
    weights and layers of the model across several GPUs, allowing the training of
    larger, more complex models even though it necessitates transferring data between
    GPUs and synchronizing gradients. Therefore, having an effective communication
    strategy is essential to reduce communication overhead significantly.
  prefs: []
  type: TYPE_NORMAL
- en: Megatron-LM doesn’t establish a new parallel modeling framework or compiler
    but instead enhances the existing implementation of PyTorch Transformers with
    precise modifications. This straightforward method avoids the need for new compilers
    or extensive code rewriting, using simple primitives to implement model parallelism.
    Specifically, Megatron-LM divides operations within the Transformer's masked multihead
    attention and feedforward sections, facilitating their parallel processing.
  prefs: []
  type: TYPE_NORMAL
- en: '[Fig. 6.8](#f0045) illustrates this process using masked multihead attention
    as an example. Megatron-LM leverages the inherent parallelism of multihead attention
    operations, dividing the associated small matrix multiplications (GEMM) for keys
    (K), queries (Q), and values (V) in a column-parallel fashion. This division allows
    each GPU to handle the matrix multiplications for corresponding attention heads
    locally, splitting the parameters and workload across GPUs, with each one producing
    parts of the final output.'
  prefs: []
  type: TYPE_NORMAL
- en: '![A schematic of a self-attention mechanism and dropout process in a neural
    network, showing separate attention heads and their interactions.](../images/F000060f06-08-9780443274367.jpg)'
  prefs: []
  type: TYPE_IMG
- en: '[Figure 6.8](#Bf0045) Transformer block with model parallelism.'
  prefs: []
  type: TYPE_NORMAL
- en: On the left, the self-attention mechanism is shown with input X passing through
    a function f, resulting in separate attention heads. Each head has components
    Q sub 1 end sub, K sub 1 end sub, V sub 1 end sub, Q sub 2 end sub, K sub 2 end
    sub and V sub 2 end sub. The heads are combined as Q equals left parenthesis Q
    sub 1 end sub, Q sub 2 end sub right parenthesis, K equals left parenthesis K
    sub 1 end sub, K sub 2 end sub right parenthesis and V equals left parenthesis
    V sub 1 end sub, V sub 2 end sub right parenthesis. The outputs Y sub 1 end sub
    and Y sub 2 end sub are obtained through softmax and dropout operations. On the
    right, the dropout process is shown with Y equals Dropout left parenthesis YB
    right parenthesis. The outputs Y sub 1 end sub B sub 1 end sub and Y sub 2 end
    sub B sub 2 end sub are combined as B equals left parenthesis B sub 1 end sub
    over B sub 2 end sub right parenthesis. The final output Z is obtained after another
    dropout operation.
  prefs: []
  type: TYPE_NORMAL
- en: In the subsequent fully connected layers of the model, each GPU handles a portion
    of the output, allowing the weight matrix B to be row partitioned for direct computations
    with inputs Y1 and Y2\. The final output, Z, is then derived through an all-reduce
    operation combined with Dropout. In real-world setups, it is unnecessary to dedicate
    a GPU to each attention head; instead, multiple heads can efficiently share a
    single GPU without breaching the principle of independent operations on individual
    GPUs. Hence, the total number of attention heads is ideally set to be divisible
    by the number of GPUs available.
  prefs: []
  type: TYPE_NORMAL
- en: Megatron-LM employs a comparable approach to split operations in the feedforward
    section, with decisions on which operators to divide being based on workload characteristics
    such as the amount of computation, parameters, and required communications. In
    the process of both forward and backward propagation within a single model parallel
    Transformer layer, Megatron-LM involves four instances of communication. Notably,
    the subsequent GEMMs of the linear layer outputs post-self-attention are parallelized
    along rows and seamlessly gather outputs from the parallel attention layer, circumventing
    the need for inter-GPU communication. This integration strategy, applied to both
    multi-layer perceptron (MLP) and self-attention layers, merges two sets of GEMM
    operations and removes intermediate synchronization points, thus boosting the
    model’s scalability. This configuration enables all GEMM operations within a straightforward
    Transformer layer, utilizing two all-reduce operations each in both the forward
    and reverse paths (as depicted in [Fig. 6.9](#f0050)).
  prefs: []
  type: TYPE_NORMAL
- en: '![A diagram showing a neural network model with two stages of model parallelism,
    including self-attention, linear layers, GeLU, dropout and layer normalization.](../images/F000060f06-09-9780443274367.jpg)'
  prefs: []
  type: TYPE_IMG
- en: '[Figure 6.9](#Bf0050) Communication operations in transformer layers within
    the Megatron architecture.'
  prefs: []
  type: TYPE_NORMAL
- en: The diagram illustrates a neural network model with two stages of model parallelism.
    The first stage starts with input X, followed by layer normalization, self-attention,
    a linear layer and dropout. The second stage includes layer normalization, a linear
    layer, GeLU, another linear layer and dropout, ending with output Y. Both stages
    involve 2 All-Reduce operations for feedforward and feedback.
  prefs: []
  type: TYPE_NORMAL
- en: Megatron-LM’s strategy for splitting operations focuses on minimizing communication
    overhead and maintaining manageable computation loads across GPUs. It avoids isolating
    operations such as dropout, layer normalization, or residual connections to a
    single GPU with results then broadcasted across the network. Instead, it promotes
    simultaneous replicated computations across multiple GPUs.
  prefs: []
  type: TYPE_NORMAL
- en: In its architectural design, Megatron-LM treats model parallelism and data parallelism
    as independent dimensions. Illustrated in [Fig. 6.10](#f0055), the architecture
    integrates pipeline, tensor, and data parallelism, making the majority of operations
    compute-bound rather than limited by memory constraints. Megatron-LM adeptly divides
    the computation graph across devices, minimizing both the data transmitted over
    networks and the idle time of devices. This method, termed pipeline, tensor, and
    data parallelism (PTD-P), leverages pipeline parallelism across several GPU servers
    and both tensor and data parallelism within these servers. It operates within
    a well-optimized cluster featuring high-bandwidth connections for both intra-
    and interserver communications. This setup enables the training of models with
    up to a trillion parameters on 1000 GPUs, showcasing robust scalability and efficient
    computational performance, achieving up to 52% of the peak throughput of the devices.
  prefs: []
  type: TYPE_NORMAL
- en: '![A diagram showing two transformer layers with pipeline and tensor model parallelism
    partitioning.](../images/F000060f06-10-9780443274367.jpg)'
  prefs: []
  type: TYPE_IMG
- en: '[Figure 6.10](#Bf0055) Combination of tensor and pipeline model parallelism.'
  prefs: []
  type: TYPE_NORMAL
- en: The diagram illustrates two transformer layers labeled as Transformer Layer
    number 1 and Transformer Layer number 2\. Each transformer layer is enclosed within
    a dashed line and further divided into two sections labeled as Tensor MP Part
    itioning number 1 and Tensor MP Part itioning number 2\. The entire transformer
    layer is also labeled as Pipeline MP Part itioning number 1 for the first layer
    and Pipeline MP Part itioning number 2 for the second layer. The diagram shows
    the internal structure and connections within each partitioning.
  prefs: []
  type: TYPE_NORMAL
- en: 6.4.3 ZeRO
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: DeepSpeed features the Zero Redundancy Optimizer (ZeRO) as its primary component,
    a strategy of data parallelism specifically aimed at decreasing both the memory
    demands and the communication load during model training. ZeRO’s primary objective
    is to reduce the amount of redundant data, such as model parameters, optimizer
    states, and gradients. It achieves this by distributing these elements among various
    training processes, facilitating more effective training of larger models within
    constrained hardware setups.
  prefs: []
  type: TYPE_NORMAL
- en: For training language models, the combination of mixed precision training and
    the Adam optimizer has become the norm. The Adam optimizer dynamically adjusts
    learning rates based on the first and second moments of the gradients for each
    parameter. According to [Fig. 6.11](#f0060), during the training phase, ZeRO divides
    storage into model states and residual states. The model state encompasses model
    parameters (fp16), model gradients (fp16), and the Adam states, which include
    fp32 backups of model parameters, and fp32 first and second moments. If the total
    amount of model parameters is Φ, then the storage requirement is 2Φ+2Φ+ (4Φ+4Φ+4Φ)=4Φ+12Φ=16Φ
    bytes, with Adam states making up 75% of this total. The residual state comprises
    activation values, a variety of temporary buffers, and fragments of VRAM that
    cannot be utilized effectively.
  prefs: []
  type: TYPE_NORMAL
- en: '![A schematic of a neural network training process showing forward propagation,
    backpropagation and weight update steps with FP16 and FP32 data types.](../images/F000060f06-11-9780443274367.jpg)'
  prefs: []
  type: TYPE_IMG
- en: '[Figure 6.11](#Bf0060) Mixed precision training iteration.'
  prefs: []
  type: TYPE_NORMAL
- en: The diagram illustrates a neural network training process. It starts with Core
    Weights (F32) which are converted to float2half. The Weights in FP16 are used
    in Forward Propagation to produce Activations in FP16\. These Activations are
    then used in Backpropagation - Activation to generate Activation Gradient in FP16\.
    The Weights and Activation Gradient are used in Backpropagation - Weights to produce
    Weight Gradient in FP16\. The Weight Gradient is then used in Weight Update along
    with Core Weights (F32) to Update Core Weights in FP32.
  prefs: []
  type: TYPE_NORMAL
- en: ZeRO reduces memory redundancy in data parallel processes by distributing model
    states—parameters, gradients, and optimizer states—across processes rather than
    duplicating them. It employs a dynamic communication strategy during training
    to distribute essential states across devices effectively, which helps balance
    the demands of computational granularity with the communication needs of data
    parallelism. With ZeRO, each device’s memory usage increases linearly with the
    level of data parallelism, and the communication volume mirrors this scalability.
    ZeRO can handle any size model, provided the devices in the cluster have sufficient
    memory to share the model state.
  prefs: []
  type: TYPE_NORMAL
- en: '[Fig. 6.12](#f0065) depicts ZeRO’s three-tiered system, where each level represents
    a progressively greater degree of model state partitioning:'
  prefs: []
  type: TYPE_NORMAL
- en: '• ZeRO-1: This level partitions the optimizer state.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '• ZeRO-2: This level extends partitioning to both the optimizer state and model
    gradients.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '• ZeRO-3: This most extensive level partitions the optimizer state, model gradients,
    and model parameters.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![A table showing memory usage and communication volume for different GPU configurations:
    Baseline, POS, POSplusg and POSplusgplusp.](../images/F000060f06-12-9780443274367.jpg)'
  prefs: []
  type: TYPE_IMG
- en: '[Figure 6.12](#Bf0065) Memory savings and communication volumes at the three
    levels of ZeRO.'
  prefs: []
  type: TYPE_NORMAL
- en: 'The table consists of five columns: unnamed column, gpu0, gpu1, gpuN-1, Memory
    Usage and Comm Volume. It reads as follows: Row 1\. Baseline: (2 plus 2 plus K)
    times psi, 120GB, 1 times. Row 2\. POS: 2 times psi plus 2 times gamma plus K
    times psi divided by Nd, 31.4GB, 1 times. Row 3\. POSplusg: 2 times psi plus (2
    plus K) times psi divided by Nd, 16.6GB, 1 times. Row 4\. POSplusgplusp: (2 plus
    2 plus K) times psi divided by Nd, 1.9GB, 1.5 times.'
  prefs: []
  type: TYPE_NORMAL
- en: The ZeRO paper not only quantifies the potential memory savings at each level
    but also notes that the first two levels do not increase the communication overhead,
    whereas the third level boosts communication costs by about 50%. Additionally,
    ZeRO optimizes residual states, which include activation values, temporary buffers,
    and VRAM fragments, though the specific methods for this optimization are not
    detailed here.
  prefs: []
  type: TYPE_NORMAL
- en: 'ZeRO uses a combination of partitioning and checkpointing techniques for handling
    activation values. In the forward phase of model propagation, checkpointing preserves
    certain intermediate variables to assist in gradient calculations during the backward
    phase. This approach essentially opts for increased computational tasks in lieu
    of higher storage requirements. For instance, in matrix multiplication *C*=*A*
    · *B*, the gradients for *A* and *B* are calculated as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: $MathML$ (6.2)
  prefs: []
  type: TYPE_NORMAL
- en: '![Equation](../images/F000060si5.png) (6.2)'
  prefs: []
  type: TYPE_IMG
- en: Storing variables A and B for backward propagation occupies a considerable amount
    of memory. The key to checkpointing is maintaining only the gradients at specific
    checkpoints, with gradients between these points recalculated during the backward
    pass by re-executing forward operations. This method effectively replaces storage
    demands with additional computations.
  prefs: []
  type: TYPE_NORMAL
- en: Regarding temporary buffers, the model training process necessitates the creation
    of buffers of various sizes, such as those used for the All-Reduce operation on
    gradients. A practical solution is to establish a fixed-size buffer at the outset,
    which prevents the need for dynamic buffer creation during training. Additionally,
    for smaller data transfers, efficiently grouping multiple data sets into buckets
    for simultaneous transmission can improve performance.
  prefs: []
  type: TYPE_NORMAL
- en: VRAM fragmentation often arises from the frequent creation and deletion of gradients
    that are not stored, a consequence of employing gradient checkpointing. A practical
    approach to mitigate this issue is to allocate a continuous segment of VRAM in
    advance. This segment is used to store the model states that need to remain in
    memory consistently, along with the values from checkpoints, while the rest of
    the VRAM is available for the dynamic handling of obsolete activation values.
  prefs: []
  type: TYPE_NORMAL
- en: ZeRO-Offload is a technique that shifts part of the computational workload and
    model parameters from the GPU’s VRAM to the CPU’s memory. This involvement of
    the CPU in processing tasks substantially reduces the demand on GPU VRAM, making
    it feasible to train larger models with limited hardware.
  prefs: []
  type: TYPE_NORMAL
- en: To counteract the potential communication overhead between the GPU and CPU and
    the generally lower computational speed of the CPU, ZeRO-Offload strategically
    allocates computation tasks. By analyzing the performance of the Adam optimizer
    in fp16 mode, it selectively places only those parameters that require computation
    on the CPU, while keeping the rest on the GPU. Typically, it delegates the task
    of updating the model to the CPU, effectively turning the CPU into a parameter
    server. To boost efficiency further, as depicted in [Fig. 6.13](#f0070), ZeRO-Offload
    runs communication and computation tasks in parallel, thereby reducing the impact
    of communication delays on the overall computational workflow.
  prefs: []
  type: TYPE_NORMAL
- en: '![A diagram illustrating the process of forward propagation, backpropagation
    and parameter update in a neural network, showing data flow between GPU and CPU.](../images/F000060f06-13-9780443274367.jpg)'
  prefs: []
  type: TYPE_IMG
- en: '[Figure 6.13](#Bf0070) Diagram of process parallelism for communication and
    computation.'
  prefs: []
  type: TYPE_NORMAL
- en: The diagram illustrates the process of forward propagation, backpropagation
    and parameter update in a neural network. On the left side, the process is shown
    without specifying the hardware. It starts with an activation value of 16, which
    goes through forward propagation, resulting in another activation value of 16\.
    This value is then used in backpropagation, producing a gradient value of 16\.
    The gradient value is used in the parameter update process, which involves parameter
    values of 32, momentum values of 32 and variance values of 32\. The data flow
    includes 2M for forward propagation, 2M for backpropagation and 2M for gradient
    value. The parameter update process involves 12M for parameter value, 12M for
    momentum value and 12M for variance value. The right side of the diagram specifies
    the hardware, with the GPU handling forward propagation and backpropagation and
    the CPU handling the parameter update. The GPU section shows forward propagation
    and backpropagation with an activation value of 16, resulting in a gradient value
    of 16\. The data flow includes 4M for parameter value and 2M for gradient value.
    The CPU section shows the update supernode with parameter values of 32, momentum
    values of 32 and variance values of 32\. The parameter update process involves
    12M for parameter value, 12M for momentum value and 12M for variance value. The
    float2half process is also shown, converting parameter values of 16 to 2M.
  prefs: []
  type: TYPE_NORMAL
- en: In the context of backward propagation, GPUs are designed to fill up a storage
    “bucket” with gradients. As it computes new gradients, it concurrently sends these
    buckets to the CPU. By the time backward propagation concludes, the CPU typically
    has updated gradients. Likewise, during parameter updates, the CPU efficiently
    transfers the updated parameters back to the GPU, ensuring continuous synchronization,
    as depicted in [Fig. 6.14](#f0075).
  prefs: []
  type: TYPE_NORMAL
- en: '![A diagram showing computation and exchange flow between GPU and CPU during
    forward propagation, backpropagation and update steps.](../images/F000060f06-14-9780443274367.jpg)'
  prefs: []
  type: TYPE_IMG
- en: '[Figure 6.14](#Bf0075) Training process of ZeRO-Offload on a single GPU.'
  prefs: []
  type: TYPE_NORMAL
- en: The diagram illustrates the computation and exchange flow between GPU and CPU
    during steps i and steps i plus 1\. In steps i, forward propagation and backpropagation
    occur on the GPU, followed by an update on the CPU. The exchange flow shows data
    being unloaded from GPU to CPU (g Unload) and exchanged from GPU to CPU (p Exchange).
    In steps i plus 1, forward propagation and backpropagation occur again on the
    GPU.
  prefs: []
  type: TYPE_NORMAL
- en: ZeRO-Infinity is essentially an enhanced version of ZeRO stage-3, which utilizes
    non-volatile memory express (NVMe) technology. This system enables the offloading
    of all model parameters not just to the CPU, but also to NVMe storage. Leveraging
    the capabilities of the NVMe protocol allows ZeRO to make additional use of solid-state
    drives, which helps substantially cut down on memory demands and boosts the speed
    of data transfers.
  prefs: []
  type: TYPE_NORMAL
- en: 6.5 Examples of training strategies
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Since the release of GPT-3, OpenAI has chosen to keep its technology private.
    However, other models like OPT, PaLM, and BLOOM, which are similar in size to
    GPT-3, openly share their training strategies in their academic papers. These
    documents offer valuable insights into how they prepare their data before training,
    choose their architecture, set their training parameters, and manage other elements
    that are crucial for ensuring the training runs smoothly and reaches its goals
    effectively.
  prefs: []
  type: TYPE_NORMAL
- en: 6.5.1 Training framework
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Training LLMs usually involves complex techniques like model parallelism, which
    includes methods such as tensor and pipeline parallelism, and advanced distributed
    optimization methods like ZeRO. For instance, OPT utilizes ZeRO’s FSDP and Megatron-LM’s
    approach for model parallelism. BLOOM uses ZeRO's Deepspeed and also Megatron-LM’s
    model parallelism strategies. PaLM, on the other hand, employs a system called
    Pathways which combines model and data parallelism on TPU technology. While the
    specifics of GPT-3 training system are still not fully disclosed, it is known
    to incorporate some form of model parallelism.
  prefs: []
  type: TYPE_NORMAL
- en: 6.5.2 Parameter stability
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Maintaining stable parameters during the training of models like OPT and PaLM
    is key to their success. For OPT, frequent adjustments such as changing gradient
    norms, learning rates, and optimizers, and restarting training from the latest
    checkpoint were made. These continual changes may have hindered OPT from reaching
    its full potential. On the other hand, PaLM followed a more consistent strategy.
    It only restarted training from a checkpoint about 100 steps prior to any sudden
    increase in loss and skipped around 200–500 batches of data. This approach of
    minimal intervention helped PaLM achieve remarkable results.
  prefs: []
  type: TYPE_NORMAL
- en: 6.5.3 Optimizing training settings
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Optimizing training settings is essential for stable model training. PaLM, for
    example, improved its stability through various enhancements, including using
    a better version of the Adafactor optimizer, adjusting the logits before the softmax
    function, adding auxiliary losses that help keep normalization close to zero,
    using different initialization methods for word vectors and layer weights, omitting
    bias in certain layers, and avoiding dropout during pretraining. Techniques like
    applying postlayer normalization with DeepNorm and restricting gradient flow in
    the word vector layer further stabilize large model training. On the other hand,
    OPT and BLOOM have not employed these advanced methods, which might explain why
    they lag behind PaLM in terms of training stability and overall performance.
  prefs: []
  type: TYPE_NORMAL
- en: 6.5.4 BF16
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In model training, the stability can often be affected by the choices made around
    training systems and hardware. An important decision in this realm is using bfloat16
    (BF16) for storing model weights and activations, which is key because it handles
    large numbers better than FP16, particularly during spikes in loss, due to having
    the same exponent size as FP32\. Despite these benefits, FP16 limited capacity
    can still lead to issues, often requiring models to keep weights smaller to avoid
    frequent overflows, a challenge especially in large models ([Fig. 6.15](#f0080)).
  prefs: []
  type: TYPE_NORMAL
- en: '![Diagram showing different floating point formats: BF16, FP32 and FP16.](../images/F000060f06-15-9780443274367.jpg)'
  prefs: []
  type: TYPE_IMG
- en: '[Figure 6.15](#Bf0080) Diagram of floating-point formats.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Floating Point Format BF16: Brain Floating Point Format Exponent: 8bits Mantissa
    (Significand): 7bits Range: approximately 1e superscript -38 end superscript to
    approximately 3e superscript 38 end superscript FP32: Single-Precision IEEE Floating
    Point Format Exponent: 8bits Mantissa (Significand): 23bits Range: approximately
    1e superscript -38 end superscript to approximately 3e superscript 38 end superscript
    FP16: Half-Precision IEEE Floating Point Format Exponent: 5bits Mantissa (Significand):
    10bits Range: approximately 5.96e superscript -8 end superscript to 65504.'
  prefs: []
  type: TYPE_NORMAL
- en: Both BF16 and FP16 occupy the same amount of space (2 bytes), but BF16 can be
    less precise. In practice, whether using BF16 or FP16, a version of the weights
    is always kept in FP32 to aid in optimization updates. The 16-bit formats are
    mainly used for calculations, with updates done in full precision FP32 before
    being converted back for the next processing cycle.
  prefs: []
  type: TYPE_NORMAL
- en: However, GPUs typically prefer FP16, as seen with NVIDIA’s V100, which uses
    it by default for mixed precision training. OPT’s choice of FP16 might be contributing
    to its instability in training. Meanwhile, BLOOM has addressed the instability
    seen with FP16 by switching to BF16, which has improved its training process.
  prefs: []
  type: TYPE_NORMAL
- en: 6.5.5 Other factors
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: While not always the main factor, certain choices can significantly influence
    the overall performance of language models. For instance, both PaLM and GPT-3
    gradually increased their batch sizes during training—a strategy that’s known
    to boost performance for big language models. In contrast, OPT and BLOOM kept
    their batch sizes constant. The type of activation function used also plays a
    role; OPT uses ReLU, while PaLM goes with SwiGLU, and both GPT-3 and BLOOM prefer
    GeLU. Typically, GeLU and SwiGLU are seen to perform better in such models.
  prefs: []
  type: TYPE_NORMAL
- en: In terms of handling longer sequences, these models also differ in how they
    encode position information. PaLM uses Rotary Position Embeddings, BLOOM applies
    ALiBi which biases attention scores based on distance instead of embedding position
    directly, and GPT-3 and OPT use learnable relative position encodings. These choices
    can affect how well models manage long sequences. These examples highlight how
    various factors come together to influence the overall effectiveness of models
    during their pretraining phase.
  prefs: []
  type: TYPE_NORMAL
- en: 6.6 Summary
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This chapter dives deep into the pretraining strategies for LLMs. It starts
    with a critical look at how pretraining datasets are built and chosen, highlighting
    how the diversity and quality of data play a crucial role in the performance of
    these models. It also discusses methods like data cleaning, deduplication, and
    augmentation, which are key to boosting a model’s ability to generalize and maintain
    stability.
  prefs: []
  type: TYPE_NORMAL
- en: In discussing distributed training, the chapter focuses on strategies for data
    and model parallelism that can dramatically cut down on training times and save
    on computational resources. It details tools like Pathways, Megatron-LM, and DeepSpeed
    Zero, which are essential for efficient distributed training setups.
  prefs: []
  type: TYPE_NORMAL
- en: The chapter concludes with examples of training strategies for large NLP models,
    discussing choices around training frameworks, model architecture tweaks, training
    settings, and optimizations like using BF16\. These strategies are vital for managing
    challenges like sudden spikes in loss and ensuring smooth model convergence.
  prefs: []
  type: TYPE_NORMAL
- en: Though the analysis is primarily based on information from other large NLP models
    of similar size, the strategies and methods discussed are widely applicable and
    offer valuable insights for optimizing pretraining processes in models like ChatGPT.
    As computational power grows and new innovative methods emerge, we can expect
    more breakthroughs in the pretraining strategies for LLMs.
  prefs: []
  type: TYPE_NORMAL
- en: <hgroup>
  prefs: []
  type: TYPE_NORMAL
- en: Chapter 7 Proximal policy optimization
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: </hgroup>
  prefs: []
  type: TYPE_NORMAL
- en: Abstract
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This chapter provides a comprehensive overview of proximal policy optimization
    (PPO), a policy gradient method in reinforcement learning that focuses on online
    learning. The chapter begins by introducing traditional policy gradient methods,
    emphasizing their direct approach to optimizing policies using real-time data.
    It then explores the Actor-Critic framework, which combines policy gradients with
    value function approximation to stabilize learning. Trust Region Policy Optimization
    (TRPO) is discussed as an enhancement, introducing constraints on policy updates
    to prevent instability. PPO builds on TRPO by incorporating a clipping mechanism
    in its objective function, ensuring stable and efficient policy updates without
    the need for complex Kullback-Leibler (KL) divergence constraints. The chapter
    concludes by highlighting PPO’s effectiveness across various applications while
    acknowledging its limitations, which present opportunities for further research
    and innovation.
  prefs: []
  type: TYPE_NORMAL
- en: Keywords
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Proximal policy optimization; policy gradient; Actor-Critic; trust region policy
    optimization; reinforcement learning; online learning; clipping mechanism; stability;
    convergence
  prefs: []
  type: TYPE_NORMAL
- en: Proximal policy optimization (PPO) stands out as a policy gradient method, distinct
    from popular reinforcement learning techniques like Deep Q Network due to its
    focus on online learning. Policy gradient methods, unlike others that depend on
    replaying past experiences, learn directly from the real-time data that agents
    gather in their environments. The Actor-Critic framework refines this approach
    by using a value function, the Critic, to steer the policy, the Actor, towards
    more stable and efficient learning outcomes. A specific enhancement within this
    framework is the Trust Region Policy Optimization (TRPO), which stabilizes learning
    by setting a “trust region” in the policy space where updates can safely occur
    without causing instability due to excessive changes.
  prefs: []
  type: TYPE_NORMAL
- en: The PPO algorithm builds upon TRPO by limiting the magnitude of updates in what’s
    known as PPO, ensuring that the new policy remains similar to the previous one.
    This approach has paved new avenues for tackling complex tasks in reinforcement
    learning. It has shown particular efficacy in natural language processing, where
    it is used to fine-tune behemoths like ChatGPT and InstructGPT. This chapter explores
    the journey and merits of PPO, starting from the basics of policy gradients and
    Actor-Critic methods to the more advanced TRPO and PPO.
  prefs: []
  type: TYPE_NORMAL
- en: 7.1 Traditional policy gradient methods
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 7.1.1 The principles of policy gradient methods
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Policy gradient methods form a key group of reinforcement learning algorithms
    that focus directly on improving policies. These methods help agents figure out
    the best strategies by interacting with their surroundings. The main concept here
    is to tweak the policy parameters in a way that aligns with the policy gradient—essentially
    a direction that suggests how to change the policy to get the most reward over
    time. In practical terms, a policy maps different situations (states) to actions.
    To manage this mapping, policy gradients use neural networks, like deep neural
    networks, to simulate and enhance the policy by tracking and adjusting to these
    gradients.
  prefs: []
  type: TYPE_NORMAL
- en: 'Consider a policy $MathML$![Equation](../images/F000072si2.png) determined
    by parameters $MathML$![Equation](../images/F000072si3.png), where s indicates
    the state, a the action, and $MathML$![Equation](../images/F000072si4.png) the
    policy parameters. Policy gradient methods strive to find the best set of parameters
    $MathML$![Equation](../images/F000072si5.png) that maximize expected rewards.
    These methods typically use a loss function that aims to minimize negative expected
    rewards, illustrated by the formula:'
  prefs: []
  type: TYPE_NORMAL
- en: $MathML$ (7.1)
  prefs: []
  type: TYPE_NORMAL
- en: '![Equation](../images/F000072si6.png) (7.1)'
  prefs: []
  type: TYPE_IMG
- en: 'where $MathML$![Equation](../images/F000072si7.png) refers to neural network
    parameters, *T* is the maximum number of time steps, *γ* is the discount factor
    reducing future rewards’ value, and $MathML$![Equation](../images/F000072si8.png)
    is the reward received for choosing action $MathML$![Equation](../images/F000072si9.png)
    in state $MathML$![Equation](../images/F000072si10.png) at time *t*. The goal
    is to find the values of θ that make this loss as small as possible (thereby maximizing
    the expected rewards). This is done by computing the policy gradient, or how the
    expected rewards change with small changes in $MathML$![Equation](../images/F000072si11.png).
    The method used for this is gradient ascent, where parameters are updated in the
    direction that increases expected rewards:'
  prefs: []
  type: TYPE_NORMAL
- en: $MathML$ (7.2)
  prefs: []
  type: TYPE_NORMAL
- en: '![Equation](../images/F000072si12.png) (7.2)'
  prefs: []
  type: TYPE_IMG
- en: The equation shows how to compute the gradient $MathML$![Equation](../images/F000072si13.png),
    which tells us how to adjust the parameters $MathML$![Equation](../images/F000072si14.png)
    of our policy to maximize rewards. Here, $MathML$![Equation](../images/F000072si15.png)
    and $MathML$![Equation](../images/F000072si16.png) represent the action taken
    and the state observed at each timestep *t*, respectively. To find this gradient,
    the agent interacts with its environment, gathering data on various “trajectories,”
    each a sequence of states, actions, and rewards. Analyzing these trajectories
    provides an accurate measure of the policy gradient. This insight is then used
    to tweak the policy parameters $MathML$![Equation](../images/F000072si17.png),
    effectively teaching the agent to make better decisions over time. For example,
    a trajectory, denoted by $MathML$![Equation](../images/F000072si18.png), captures
    how an agent’s states, actions, and rewards evolve over time as it interacts with
    its environment. It’s expressed as
  prefs: []
  type: TYPE_NORMAL
- en: $MathML$ (7.3)
  prefs: []
  type: TYPE_NORMAL
- en: '![Equation](../images/F000072si19.png) (7.3)'
  prefs: []
  type: TYPE_IMG
- en: As illustrated in [Fig. 7.1](#f0010), by knowing an agent’s (or actor’s) policy
    parameters θ, we can calculate the likelihood of any given trajectory *τ*. This
    probability reflects how the agent’s decisions, based on its specific actions
    in certain states, play out over time. Each state and action within the trajectory
    is determined by sampling from the agent’s action probability distribution $MathML$![Equation](../images/F000072si20.png)
    and from the probabilities of transitioning to new states, $MathML$![Equation](../images/F000072si21.png).
    This model helps us understand and predict how the agent will behave in various
    scenarios.
  prefs: []
  type: TYPE_NORMAL
- en: $MathML$ (7.4)
  prefs: []
  type: TYPE_NORMAL
- en: '![Equation](../images/F000072si22.png) (7.4)![A diagram showing the interaction
    between an agent and environment with updates and rewards, illustrating the calculation
    of R sub theta end sub.](../images/F000072f07-01-9780443274367.jpg)'
  prefs: []
  type: TYPE_IMG
- en: '[Figure 7.1](#Bf0010) Accumulation of reward values in agent–environment interaction.'
  prefs: []
  type: TYPE_NORMAL
- en: The process starts with the environment providing state S sub 1 end sub to the
    agent. The agent then takes action a sub 1 end sub, which leads to a reward r
    sub 1 end sub. The agent updates and the environment provides the next state S
    sub 2 end sub. The agent takes action a sub 2 end sub, leading to reward r sub
    2 end sub. This process continues with the environment providing state S sub 3
    end sub. The equation at the bottom shows the calculation of R sub theta end sub
    as the sum over tau of R left parenthesis tau right parenthesis p sub theta end
    sub left parenthesis tau right parenthesis, which equals E sub tau tilde p sub
    theta end sub left parenthesis tau right parenthesis left bracket R left parenthesis
    tau right parenthesis right bracket. R left parenthesis tau right parenthesis
    is defined as the summation from t equals 1 to T of r sub t end sub.
  prefs: []
  type: TYPE_NORMAL
- en: 'In scenarios where an agent operates under the same policy parameters *θ*,
    it can produce multiple trajectories. Each trajectory *τ* has a specific probability
    of occurring. By calculating the weighted sum of all these probabilities, along
    with their associated rewards, we derive the expected value:'
  prefs: []
  type: TYPE_NORMAL
- en: $MathML$ (7.5)
  prefs: []
  type: TYPE_NORMAL
- en: '![Equation](../images/F000072si23.png) (7.5)'
  prefs: []
  type: TYPE_IMG
- en: 'To approximate this calculation, we use the Monte Carlo method:'
  prefs: []
  type: TYPE_NORMAL
- en: $MathML$ (7.6)
  prefs: []
  type: TYPE_NORMAL
- en: '![Equation](../images/F000072si24.png) (7.6)'
  prefs: []
  type: TYPE_IMG
- en: 'The parameters are then updated using gradient ascent, where $MathML$![Equation](../images/F000072si25.png)
    is adjusted by adding a learning rate $MathML$![Equation](../images/F000072si26.png)
    multiplied by the gradient $MathML$![Equation](../images/F000072si27.png). The
    learning rate itself can be tuned using methods like Adam or RMSProp:'
  prefs: []
  type: TYPE_NORMAL
- en: $MathML$ (7.7)
  prefs: []
  type: TYPE_NORMAL
- en: '![Equation](../images/F000072si28.png) (7.7)'
  prefs: []
  type: TYPE_IMG
- en: Policy gradient methods stand out because they directly optimize the policy
    without the need to estimate action or state-value functions, which is particularly
    beneficial in environments with high-dimensional continuous action spaces and
    complex dynamics.
  prefs: []
  type: TYPE_NORMAL
- en: 7.1.2 Importance sampling
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In policy gradient methods, importance sampling plays a crucial role, especially
    when it comes to effectively using data previously gathered before updating the
    policy parameters. The main purpose of importance sampling is to estimate the
    expected value of one distribution (the target policy) from another (the reference
    policy). Illustrated in [Fig. 7.2](#f0015), during policy updates, we can use
    importance sampling to draw on trajectories from the old policy to estimate what
    the expected returns might look like under the new policy. This approach saves
    the time and computational resources normally spent on gathering new samples.
  prefs: []
  type: TYPE_NORMAL
- en: '![Diagram showing the process of updating a model using policy and data sampling.](../images/F000072f07-02-9780443274367.jpg)'
  prefs: []
  type: TYPE_IMG
- en: '[Figure 7.2](#Bf0015) Importance sampling in policy gradient methods.'
  prefs: []
  type: TYPE_NORMAL
- en: On the left side, it shows the policy pi sub theta end sub with tau superscript
    1 end superscript and tau superscript 2 end superscript, each containing pairs
    of s sub 1 end sub comma a sub 1 end sub and s sub 2 end sub comma a sub 2 end
    sub, followed by R left parenthesis tau superscript 1 end superscript right parenthesis
    and R left parenthesis tau superscript 2 end superscript right parenthesis. This
    data is used only once. On the right side, it shows the update model process with
    theta left arrow theta plus eta nabla R bar sub theta end sub. The gradient nabla
    R bar sub theta end sub is calculated as 1 over N summation from n equals 1 to
    N summation from t equals 1 to T sub n end sub R left parenthesis tau superscript
    n end superscript right parenthesis nabla log p sub theta end sub left parenthesis
    a sub t superscript n end superscript vertical bar s sub t superscript n end superscript
    right parenthesis. The diagram indicates the flow between data sampling and model
    updating.
  prefs: []
  type: TYPE_NORMAL
- en: 'Specifically, in these methods, we’re interested in the expected returns of
    state-action pairs under the new target policy $MathML$![Equation](../images/F000072si29.png).
    When policy parameters change from $MathML$![Equation](../images/F000072si30.png)
    to $MathML$![Equation](../images/F000072si31.png), the probability associated
    with an action a in the same state s will shift from $MathML$![Equation](../images/F000072si32.png)
    to $MathML$![Equation](../images/F000072si33.png). To continue using the same
    trajectory τ, we need to recalculate its expected return $MathML$![Equation](../images/F000072si34.png)
    using the formula:'
  prefs: []
  type: TYPE_NORMAL
- en: $MathML$ (7.8)
  prefs: []
  type: TYPE_NORMAL
- en: '![Equation](../images/F000072si35.png) (7.8)'
  prefs: []
  type: TYPE_IMG
- en: This strategy allows for the reuse of trajectories from the reference policy
    *π*_*θ*, employing importance sampling to estimate the expected returns under
    the new target policy *π*_(*θ*'). In real-world applications, this means we can
    update policies using existing trajectories without needing to collect new data
    each time there’s a change, enhancing efficiency.
  prefs: []
  type: TYPE_NORMAL
- en: However, when the target and reference policies are quite different, importance
    sampling estimates can exhibit high variance. This happens because the trajectories
    must be weighted, and these weights can vary significantly. Additionally, the
    unpredictability of the environment and changes in policies can make the estimated
    returns highly variable. This variability can cause instability in gradient calculations,
    which can hinder the learning process. Moreover, since policy gradient methods
    depend on trajectories sampled from the policy, these trajectories can often be
    strongly correlated, which might also contribute to high variance in gradient
    estimations, impacting the algorithm’s stability and convergence.
  prefs: []
  type: TYPE_NORMAL
- en: To combat these issues, advantage functions are commonly used in practice to
    help reduce variance. An advantage function evaluates the benefit of choosing
    a specific action in a given state compared to the average return. By deducting
    the average return, we get a more stable estimate of the advantage, which helps
    reduce the variance from importance sampling and enhances the stability of gradient
    calculations. However, accurately estimating advantage functions still poses a
    challenge in real-world applications.
  prefs: []
  type: TYPE_NORMAL
- en: 7.1.3 Advantage function
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In policy gradient methods, researchers use something called an advantage function
    to boost learning efficiency and stabilize the algorithm. The advantage function
    evaluates how much better a specific action is in a given state compared to the
    average outcome of the current policy. Essentially, it helps identify the extra
    benefits of choosing a particular action in a certain situation. The advantage
    function, denoted as $MathML$![Equation](../images/F000072si36.png), is defined
    as
  prefs: []
  type: TYPE_NORMAL
- en: $MathML$ (7.9)
  prefs: []
  type: TYPE_NORMAL
- en: '![Equation](../images/F000072si37.png) (7.9)'
  prefs: []
  type: TYPE_IMG
- en: where $MathML$![Equation](../images/F000072si38.png) is the action-value function,
    representing the expected total reward for taking action a in state s under policy
    *π*. $MathML$![Equation](../images/F000072si39.png), on the other hand, is the
    state-value function, which estimates the expected total reward in state s under
    policy *π*. Therefore, the advantage function quantifies how much more beneficial
    a specific action a is compared to what’s typically expected under policy *π*
    in that state.
  prefs: []
  type: TYPE_NORMAL
- en: 'Once we include the advantage function, we can update the way we calculate
    the policy gradient:'
  prefs: []
  type: TYPE_NORMAL
- en: $MathML$ (7.10)
  prefs: []
  type: TYPE_NORMAL
- en: '![Equation](../images/F000072si40.png) (7.10)'
  prefs: []
  type: TYPE_IMG
- en: Introducing the advantage function helps reduce the variance that comes from
    relying solely on the original reward signals, enhancing both the stability and
    accuracy of our gradient estimates. This improvement occurs because the advantage
    function strips out the components related to the state value function, allowing
    us to focus more on the relative benefits of different actions.
  prefs: []
  type: TYPE_NORMAL
- en: With the advantage function, policy gradient methods can identify and optimize
    effective actions more swiftly, speeding up the overall learning process.
  prefs: []
  type: TYPE_NORMAL
- en: However, while the advantage function offers clear benefits, calculating it
    requires the estimation of both the action-value function, $MathML$![Equation](../images/F000072si41.png),
    and the state-value function, $MathML$![Equation](../images/F000072si42.png),
    adding to the computational complexity.
  prefs: []
  type: TYPE_NORMAL
- en: 7.2 Actor-Critic
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'The Actor-Critic algorithm, as shown in [Fig. 7.3](#f0020), is a type of reinforcement
    learning that combines elements of policy gradient methods and value function
    approximation. What sets this algorithm apart is how it splits responsibilities:
    the Actor formulates policies, and the Critic assesses how effective these policies
    are.'
  prefs: []
  type: TYPE_NORMAL
- en: '![A diagram showing the interaction between Actor, Critic, Environment and
    Policy Gradient in reinforcement learning.](../images/F000072f07-03-9780443274367.jpg)'
  prefs: []
  type: TYPE_IMG
- en: '[Figure 7.3](#Bf0020) Actor-Critic algorithm.'
  prefs: []
  type: TYPE_NORMAL
- en: The components include Action Trajectory, Environment, Actor, Critic and Policy
    Gradient. The Action Trajectory leads to Practice, which interacts with the Environment.
    The Environment sends information to the Actor, which updates a given action based
    on state (a|s). The Actor is depicted with a neural network structure. The Environment
    also sends information to the Critic, which updates Q(s,a). The Critic is also
    depicted with a neural network structure. The Critic sends Q(s,a) to the Policy
    Gradient, which is then updated. The flow of information is indicated by arrows
    connecting these components.
  prefs: []
  type: TYPE_NORMAL
- en: Policy gradient methods by themselves often suffer from high variance in their
    gradient estimates, which can make learning unstable. The Actor-Critic method
    tackles this by bringing in a Critic to learn and provide a value function, which
    acts as a reliable baseline to help calculate more stable policy gradients.
  prefs: []
  type: TYPE_NORMAL
- en: While traditional policy gradient methods typically use the Monte Carlo method
    to calculate returns, which is accurate but variable, the Actor-Critic approach
    estimates returns using a value function, reducing variance at the cost of a slight
    bias. This compromise allows the Actor-Critic method to be more stable during
    training.
  prefs: []
  type: TYPE_NORMAL
- en: In this setup, both the Actor and the Critic are modeled using function approximators
    like neural networks. The Actor uses a parameterized policy $MathML$![Equation](../images/F000072si43.png)
    to decide actions, with $MathML$![Equation](../images/F000072si44.png) as the
    policy parameters. The Critic, on the other hand, evaluates the expected total
    rewards for different states using a parameterized value function $MathML$![Equation](../images/F000072si45.png),
    with ψ as its parameters. This collaboration between the Actor and Critic helps
    the agent better manage the trade-offs between exploring new actions and exploiting
    known strategies, enhancing overall learning efficiency.
  prefs: []
  type: TYPE_NORMAL
- en: 7.2.1 Algorithm steps
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'The Actor-Critic algorithm follows these basic steps:'
  prefs: []
  type: TYPE_NORMAL
- en: First, the parameters for both the policy ($MathML$![Equation](../images/F000072si46.png))
    and the value function ($MathML$![Equation](../images/F000072si47.png)) are initialized.
  prefs: []
  type: TYPE_NORMAL
- en: 'During each training episode, these actions are taken:'
  prefs: []
  type: TYPE_NORMAL
- en: a. Begin at the starting state and use the policy $MathML$![Equation](../images/F000072si48.png)
    to decide an action.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: b. The chosen action is then performed, which leads to receiving the next state
    $MathML$![Equation](../images/F000072si49.png) and a reward r.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'c. The Critic computes the temporal difference (TD) error for the value function
    as follows:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: $MathML$
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '![Equation](../images/F000072si50.png)'
  prefs:
  - PREF_IND
  type: TYPE_IMG
- en: Here, $MathML$![Equation](../images/F000072si51.png) represents the discount
    factor, which adjusts the importance of future rewards.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: d. The TD error $MathML$![Equation](../images/F000072si52.png) is used to refine
    the Critic’s parameters $MathML$![Equation](../images/F000072si53.png).
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'e. This same TD error $MathML$![Equation](../images/F000072si54.png) is also
    used as a proxy for the advantage function to update the Actor’s policy parameters
    $MathML$![Equation](../images/F000072si55.png):'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: $MathML$
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '![Equation](../images/F000072si56.png)where $MathML$![Equation](../images/F000072si57.png)
    is the learning rate.'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: f. If the episode concludes, it’s time for the next one; otherwise, update the
    state to *s*′ and repeat the steps from a to *f*.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 7.2.2 Value function and policy update
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'In the Actor-Critic algorithm, the value function is intricately linked with
    how policies are updated. The Critic’s role is to learn the value function to
    assess the expected total rewards for the current policy across various states.
    Meanwhile, the Actor uses insights from the value function to refine the policy.
    This dynamic interaction unfolds primarily in these ways:'
  prefs: []
  type: TYPE_NORMAL
- en: '1. **Advantage function estimation**: The Actor uses this function, which relies
    on the Critic’s value function, to guide updates, making policy learning more
    stable and efficient.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '2. **TD error as learning signal**: The Actor uses the TD error computed by
    the Critic to gauge the difference between actual experiences and the expected
    outcomes predicted by the value function, which helps in fine-tuning the policy.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '3. **Adaptive exploration and exploitation**: The Critic’s insights allow the
    Actor to smartly adjust its strategy for exploring new actions and exploiting
    known rewarding actions, based on the current value assessments.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '4. **Dual learning process**: Both the Actor and the Critic learn simultaneously—policy
    from the Actor and value functions from the Critic. This dual approach not only
    speeds up learning but also enhances the stability by reducing variability in
    policy updates.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 7.2.3 Issues and challenges
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'While the Actor-Critic algorithm addresses many limitations of traditional
    policy gradient methods, it still faces several challenges:'
  prefs: []
  type: TYPE_NORMAL
- en: '1. **Stability of dual-network training**: The Actor and Critic, each trained
    with their own neural network models, must be managed simultaneously, which can
    destabilize training. Inaccurate value assessments from the Critic could potentially
    misguide the Actor in policy updates.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '2. **Exploration strategy issues**: Though the algorithm can adapt its exploration
    strategies, such as adding noise, these may not be effective in more complex scenarios.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '3. **Hyperparameter tuning challenges**: The algorithm requires careful adjustment
    of several parameters, like learning rates and discount factors, to optimize performance.
    Finding the right set of parameters can be challenging and time-consuming in real-world
    settings.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '4. **Sample complexity issues**: Improved over simple policy gradient methods,
    the Actor-Critic still demands a significant amount of training samples, which
    can be costly and impractical to gather in practical environments.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 7.3 Trust region policy optimization
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: TRPO expands on the Actor-Critic algorithm to tackle the instability in policy
    updates seen in traditional policy gradient methods and the basic Actor-Critic
    approach. TRPO’s key feature is its restriction on the extent of policy updates,
    ensuring that changes remain within a defined “trust region.” This approach significantly
    boosts the stability and convergence of policy learning, making it more reliable
    and effective.
  prefs: []
  type: TYPE_NORMAL
- en: 7.3.1 Optimization objectives
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: TRPO not only aims to enhance policy improvements but also controls the changes
    by limiting the KL divergence (a measure of similarity between probability distributions)
    between new and old policies. As depicted in [Fig. 7.4](#f0025), by keeping the
    KL divergence within certain limits, TRPO avoids drastic changes to the policies,
    which helps maintain stability during updates.
  prefs: []
  type: TYPE_NORMAL
- en: '![The image shows two graphs: one comparing probability distributions p(x)
    and q(x) and another illustrating the Kullback-Leibler divergence D_KL(P||Q) between
    these distributions.](../images/F000072f07-04-9780443274367.jpg)'
  prefs: []
  type: TYPE_IMG
- en: '[Figure 7.4](#Bf0025) KL divergence.'
  prefs: []
  type: TYPE_NORMAL
- en: The left graph shows two probability distribution curves labeled p(x) and q(x).
    The x-axis ranges from negative 4 to positive 4, while the y-axis ranges from
    0 to 0.4\. The p(x) curve (blue) peaks around negative 1, while the q(x) curve
    (purple) peaks around positive 1\. The right graph illustrates the Kullback-Leibler
    (KL) divergence D_KL(P||Q) between these distributions. Its x-axis also ranges
    from negative 4 to positive 4, with the y-axis ranging from negative 0.1 to 0.4\.
    The KL divergence is represented by a filled area under a curve, which is mostly
    positive but has a small negative region. Three arrows point from the left graph
    to the right, indicating that the KL divergence is derived from the comparison
    of the two probability distributions. The image relates to the concept of Trust
    Region Policy Optimization (TRPO), which uses KL divergence to limit policy changes
    during updates, maintaining stability in the learning process.
  prefs: []
  type: TYPE_NORMAL
- en: 'During each update, TRPO addresses a constrained optimization problem:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Maximize:'
  prefs: []
  type: TYPE_NORMAL
- en: $MathML$ (7.11)
  prefs: []
  type: TYPE_NORMAL
- en: '![Equation](../images/F000072si58.png) (7.11)'
  prefs: []
  type: TYPE_IMG
- en: 'Under the constraint:'
  prefs: []
  type: TYPE_NORMAL
- en: $MathML$ (7.12)
  prefs: []
  type: TYPE_NORMAL
- en: '![Equation](../images/F000072si59.png) (7.12)'
  prefs: []
  type: TYPE_IMG
- en: where “E[·]” denotes expectation, “$MathML$![Equation](../images/F000072si60.png)”
    is the value under the old policy, “KL(·)” is the KL divergence, and “$MathML$![Equation](../images/F000072si61.png)”
    is a predefined threshold. By solving this optimization challenge, TRPO ensures
    that policy updates are both effective and stable.
  prefs: []
  type: TYPE_NORMAL
- en: The incorporation of KL divergence into the updating process prevents unstable
    updates and enhances learning stability. Moreover, by managing the magnitude of
    updates, TRPO avoids overlooking optimal solutions, thus improving convergence.
    This strategy results in robust updates that are reliable even in complex scenarios
    and noisy environments.
  prefs: []
  type: TYPE_NORMAL
- en: 7.3.2 Limitations
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'While TRPO excels in many areas, it is not without its challenges:'
  prefs: []
  type: TYPE_NORMAL
- en: '1. **Computational complexity**: TRPO controls policy updates through constrained
    optimization, each requiring the resolution of complex problems. This demand for
    high computational power can be a limiting factor in large-scale or real-time
    scenarios.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '2. **Need for second-order derivatives**: The algorithm requires calculating
    second-order derivatives, like the Hessian matrix, especially using methods such
    as conjugate gradient. This computation can be particularly intensive for large
    neural networks.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '3. **Hyperparameter tuning**: Despite its relative stability, TRPO still necessitates
    fine-tuning hyperparameters, such as the KL divergence threshold δ, which can
    be a cumbersome and time-consuming task in practice.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '4. **Handling discrete actions**: While effective in continuous action spaces,
    TRPO’s performance dips in discrete action settings. This is primarily due to
    its conservative updates, mandated by the limitation on KL divergence, which might
    not be optimal in discrete scenarios.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Overall, TRPO’s introduction of KL divergence constraints boosts the stability,
    convergence, and robustness of policy updates, leading to significant enhancements
    in many reinforcement learning tasks. However, its computational demands among
    other challenges present notable limitations.
  prefs: []
  type: TYPE_NORMAL
- en: 7.4 Principles of the proximal policy optimization algorithm
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: PPO is designed to improve agent performance by updating policies in a way that
    avoids the pitfalls of earlier approaches. Unlike traditional policy gradient
    methods, PPO introduces an objective function with a clipping mechanism, ensuring
    that policy updates don’t stray too far from the current policy, thus simplifying
    the process by sidestepping the complex KL divergence constraints typical of TRPO.
  prefs: []
  type: TYPE_NORMAL
- en: 'In practice, PPO operates with two threads: one interacts with the environment
    to generate data, while the other uses this data to train the policy network using
    PPO’s specific objective function. This method has proven to be competitive, often
    outperforming TRPO in a variety of tasks.'
  prefs: []
  type: TYPE_NORMAL
- en: 'The core of PPO’s effectiveness lies in its loss function, which comprises
    three parts:'
  prefs: []
  type: TYPE_NORMAL
- en: '**1\. Clipping objective function**: This part aims to refine the policy to
    maximize expected returns. It works as follows:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: $MathML$ (7.13)
  prefs: []
  type: TYPE_NORMAL
- en: '![Equation](../images/F000072si62.png) (7.13)'
  prefs: []
  type: TYPE_IMG
- en: where “$MathML$![Equation](../images/F000072si63.png)” denotes the expected
    value at time step t, “$MathML$![Equation](../images/F000072si64.png)” is the
    ratio of probabilities between the new and the current policy, and “$MathML$![Equation](../images/F000072si65.png)”
    represents the estimated advantage at that state. The function uses both the standard
    policy gradient target, which promotes actions with high advantages, and a clipped
    version of the probability ratio, constrained between $MathML$![Equation](../images/F000072si66.png)
    and $MathML$![Equation](../images/F000072si67.png), with $MathML$![Equation](../images/F000072si68.png)
    typically set around 0.2\. The clipping ensures the policy updates do not stray
    too far from the original, maintaining a balance between exploration and exploitation.
  prefs: []
  type: TYPE_NORMAL
- en: '**2\. Value estimation loss**: This component focuses on refining the value
    function to enhance its accuracy in estimating the values of states. It is mathematically
    represented as'
  prefs: []
  type: TYPE_NORMAL
- en: $MathML$ (7.14)
  prefs: []
  type: TYPE_NORMAL
- en: '![Equation](../images/F000072si69.png) (7.14)'
  prefs: []
  type: TYPE_IMG
- en: where “V(*s*_*t*)” is the value function’s prediction for the state “*s*_*t*,”
    and ‘*V*_ “target” represents the actual observed return.
  prefs: []
  type: TYPE_NORMAL
- en: '**3\. Entropy loss**: This component aims to boost the entropy of the policy,
    fostering greater exploration. It is defined mathematically as'
  prefs: []
  type: TYPE_NORMAL
- en: $MathML$ (7.15)
  prefs: []
  type: TYPE_NORMAL
- en: '![Equation](../images/F000072si70.png) (7.15)'
  prefs: []
  type: TYPE_IMG
- en: where “$MathML$![Equation](../images/F000072si71.png)” indicates the probability
    of choosing action “$MathML$![Equation](../images/F000072si72.png)” in state “$MathML$![Equation](../images/F000072si73.png),”
    with $MathML$![Equation](../images/F000072si74.png)” representing the parameters
    of the policy network.
  prefs: []
  type: TYPE_NORMAL
- en: 'The overall loss function for PPO integrates these three components into a
    weighted sum:'
  prefs: []
  type: TYPE_NORMAL
- en: $MathML$ (7.16)
  prefs: []
  type: TYPE_NORMAL
- en: '![Equation](../images/F000072si75.png) (7.16)'
  prefs: []
  type: TYPE_IMG
- en: In this context, $MathML$![Equation](../images/F000072si76.png) and $MathML$![Equation](../images/F000072si77.png)
    serve as hyperparameters, which are essentially tuning knobs to balance the importance
    of various components within the model.
  prefs: []
  type: TYPE_NORMAL
- en: 'At the heart of the PPO algorithm is a strategic component known as the clipped
    PPO objective function. Central to this function is the advantage function $MathML$![Equation](../images/F000072si78.png),
    which gauges how advantageous an action $MathML$![Equation](../images/F000072si79.png)
    is at a given state $MathML$![Equation](../images/F000072si80.png) compared to
    typical outcomes. Illustrated in [Fig. 7.5](#f0030), the advantage function can
    either be positive, suggesting an action is better than average, or negative,
    indicating it is worse. The function’s graph varies accordingly: on the left side
    where the advantage is positive, the model promotes taking such beneficial actions;
    on the right side where the advantage is negative, it discourages them.'
  prefs: []
  type: TYPE_NORMAL
- en: '![Two line graphs showing the advantage function with positive and negative
    values.](../images/F000072f07-05-9780443274367.jpg)'
  prefs: []
  type: TYPE_IMG
- en: '[Figure 7.5](#Bf0030) Graph of different values of $MathML$![Equation](../images/F000072si1.png)
    in the objective function.'
  prefs: []
  type: TYPE_NORMAL
- en: The left graph shows the advantage function greater than zero, with the x-axis
    ranging from 1 minus epsilon to 1 plus epsilon and the y-axis ranging from 1 minus
    epsilon to 1 plus epsilon. The right graph shows the advantage function less than
    zero, with the same x-axis and y-axis ranges. Both graphs have three data points
    on the x-axis at 1 minus epsilon, 1 and 1 plus epsilon and three data points on
    the y-axis at 1 minus epsilon, 1 and 1 plus epsilon.
  prefs: []
  type: TYPE_NORMAL
- en: In practical terms, if the action ratio $MathML$![Equation](../images/F000072si81.png)
    veers too high, the model flattens its loss curve to signify a higher likelihood
    of these actions under the new policy compared to the old. This area is deliberately
    truncated to prevent the model from overly adjusting based on this data, thus
    moderating the influence of such updates. When actions yield negative outcomes,
    the model flattens this function as the action ratio approaches zero, reflecting
    their improbability under the current guidelines and preventing drastic changes
    that might otherwise zero out these actions.
  prefs: []
  type: TYPE_NORMAL
- en: A crucial aspect to remember is that the advantage function can be noisy; thus,
    sweeping changes to the policy based solely on this data are discouraged. The
    most extreme scenario, where a previous update substantially increased an action’s
    likelihood and degraded the overall strategy, calls for a potential rollback facilitated
    by the PPO’s function. In such cases, negative gradients help recalibrate the
    policy by decreasing the likelihood of those actions, aligning the adjustment
    with the scale of the initial misjudgment. This delicate balancing act ensures
    that the policy refines itself, focusing on minimizing loss where it counts.
  prefs: []
  type: TYPE_NORMAL
- en: 'The PPO algorithm was crafted by experts with a nuanced grasp of its objective
    function’s behavior, which is crucial for devising specific reward functions.
    This deep understanding was likely conveyed through a series of detailed diagrams
    before they finalized the precise objective function to ensure reliable system
    operations. If the minutiae of this process seem daunting, don’t fret—understanding
    the essence is sufficient. Both PPO and its cousin TRPO share a common goal: they
    employ conservative updates to prevent significant deviations from the current
    policy. However, PPO stands out by employing a simplified objective function that
    eschews the need for calculating additional constraints or the KL divergence.
    This simplicity has proven to give PPO an edge over TRPO’s more elaborate mechanisms.'
  prefs: []
  type: TYPE_NORMAL
- en: Now, let’s explore how PPO functions. It operates in a cycle of two alternating
    phases. Initially, the policy interacts with the environment, generating data
    trails which are immediately analyzed using a tailored baseline model to estimate
    state values and compute advantage functions. Following this, the second phase
    updates the policy using these trails with a policy gradient method that integrates
    the advantage function into PPO’s streamlined objective function. The baseline
    estimator, often a neural network, is also updated to refine its accuracy. This
    iterative process—switching between collecting data and updating the policy—continues
    until certain goals, like a specific number of iterations or performance benchmarks,
    are met.
  prefs: []
  type: TYPE_NORMAL
- en: PPO’s merits, particularly its stability, adaptability, and straightforward
    design, have made it a preferred choice for complex applications like robotics
    and gaming AI. The algorithm cleverly balances conservative updates with efficient
    use of data to optimize policy adjustments.
  prefs: []
  type: TYPE_NORMAL
- en: Despite its successes, PPO faces hurdles, notably in scenarios with sparse rewards
    or intricate settings. Addressing these issues has led researchers to integrate
    sophisticated strategies, including hierarchical learning frameworks and predictive
    controls, into the PPO architecture. Ongoing innovations such as adaptive clipping
    and variable learning rates are also being investigated to push PPO’s performance
    further.
  prefs: []
  type: TYPE_NORMAL
- en: 7.5 Summary
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This chapter delves deeply into several policy optimization algorithms, including
    policy gradient methods, Actor-Critic, TRPO, and PPO, enriching the reader’s understanding
    with a mix of theoretical underpinnings and practical insights. Among these, PPO
    stands out as a particularly revered tool in the field of reinforcement learning
    due to its robust effectiveness and broad applicability. Known for its straightforwardness
    and stability, PPO has demonstrated exceptional performance across a range of
    scenarios. Nevertheless, it is its very limitations on certain fronts that open
    up generous opportunities for future research, with the goal of pushing the boundaries
    of the algorithm’s capabilities even further.
  prefs: []
  type: TYPE_NORMAL
- en: <hgroup>
  prefs: []
  type: TYPE_NORMAL
- en: Chapter 8 Human feedback reinforcement learning
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: </hgroup>
  prefs: []
  type: TYPE_NORMAL
- en: Abstract
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This chapter delves into the critical role of human feedback reinforcement learning
    (HFRL) in refining and optimizing GPT models, particularly ChatGPT and InstructGPT.
    The chapter begins by explaining how reinforcement learning, driven by human feedback,
    enhances model alignment with human expectations. It then outlines the evolution
    of GPT models, from GPT-3 to GPT-3.5, highlighting key developments like Codex
    and InstructGPT. The chapter details the three training stages of HFRL—supervised
    fine-tuning, reward modeling, and reinforcement learning—emphasizing their importance
    in improving model performance. The discussion extends to the datasets used for
    fine-tuning, the selection and tasks of annotators, and the challenges associated
    with multiturn dialogue capabilities. Lastly, the necessity of HFRL is underscored
    as a means to equip models with robust adaptability and learning capabilities
    essential for achieving true artificial intelligence.
  prefs: []
  type: TYPE_NORMAL
- en: Keywords
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Human feedback reinforcement learning (HFRL); Codex; InstructGPT; supervised
    fine-tuning; reward modeling; reinforcement learning; proximal policy optimization
    (PPO); multi-turn dialogue; dataset annotation
  prefs: []
  type: TYPE_NORMAL
- en: Generative pre-trained transformer (GPT) models undergo a crucial pretraining
    phase where they learn to mimic the distribution of their training datasets. This
    phase is vital as the quality of the training data significantly influences the
    content these models generate. To enhance the quality of this content, it is essential
    to align the model’s outputs with human expectations in a controlled manner. “Alignment”
    here refers to the match between what the models produce and what humans anticipate.
    These expectations include not only the fluency and grammatical accuracy of the
    content but also its relevance, authenticity, and safety.
  prefs: []
  type: TYPE_NORMAL
- en: Reinforcement learning operates through a reward mechanism that directs model
    training. This mechanism serves as the training’s optimization goal. Rewards are
    versatile and can vary widely, such as in AlphaGO, where rewards are determined
    by the game’s outcome. In reinforcement learning, strategies are developed by
    extensively sampling rewards to estimate the optimization goal, thereby steering
    the training process. Thus, human feedback can be treated as a form of reward,
    introducing the concept of reinforcement learning driven by human feedback.
  prefs: []
  type: TYPE_NORMAL
- en: 8.1 Reinforcement learning in ChatGPT
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'In May 2020, OpenAI introduced the Davinci API, boasting an impressive 175
    billion parameters. Following this, OpenAI embarked on two significant explorations:
    Codex, which focuses on coding and reasoning, and InstructGPT, which aimed at
    better understanding human intentions. The technological developments from GPT-3
    to GPT-3.5 are illustrated in [Fig. 8.1](#f0010).'
  prefs: []
  type: TYPE_NORMAL
- en: '![A flowchart showing the evolution of GPT-3 to GPT-3.5 with different versions
    of Codex and InstructGPT.](../images/F000084f08-01-9780443274367.jpg)'
  prefs: []
  type: TYPE_IMG
- en: '[Figure 8.1](#Bf0010) Technology roadmap from GPT-3 to GPT-3.5.'
  prefs: []
  type: TYPE_NORMAL
- en: 'It starts with the initial version of GPT-3, which branches into two: Code
    and Reasoning leading to the Initial Version of Codex (Code-davinci-001, Code-cushman-001)
    and Human Intent Understanding leading to the Initial Version of InstructGPT (Instruct-davinci-beta,
    Text-davinci-001). Both branches converge into LMplusCode Training then instruction
    tuning, resulting in Code-davinci-002\. This further leads to Supervised instruction
    tuning, branching into Text-davinci-002 and RLHF, which then leads to Text-davinci-003
    and ChatGPT. The phases are labeled as GPT-3 Phase and GPT-3.5 Phase.'
  prefs: []
  type: TYPE_NORMAL
- en: The first pathway concentrates on boosting abilities in coding and reasoning.
    Here, OpenAI merged GPT-3 with coding training to create Codex. In July 2021,
    the initial Codex model was launched, fine-tuning the original GPT-3 using 159GB
    of Python code. This model eventually evolved into what is now known in the OpenAI
    API as code-cushman-001, showcasing superior coding and reasoning skills. Despite
    its comparatively modest text-processing capabilities, the model improved significantly
    by learning from extensive code designed to tackle mathematical reasoning challenges.
  prefs: []
  type: TYPE_NORMAL
- en: The second pathway delves deeper into understanding human nuances. Google pioneered
    the use of reinforcement learning from human feedback (RLHF) in 2017\. They introduced
    a method that enhances the performance of reinforcement learning in simulations
    involving robots and Atari games through feedback derived from human annotations.
  prefs: []
  type: TYPE_NORMAL
- en: To enhance alignment with human intents, OpenAI employed RLHF to refine GPT-3,
    resulting in the creation of InstructGPT. Initial explorations with RLHF began
    in 2020 with GPT-3, although these early models sometimes produced inappropriate
    or hazardous content. It was not until March 2022, detailed in the InstructGPT
    paper, that OpenAI effectively harnessed RLHF, introducing key APIs such as instruct-davinci-beta
    and text-davinci-001.
  prefs: []
  type: TYPE_NORMAL
- en: OpenAI’s endeavors in these areas culminated in the development of code-davinci-002
    (refer to OpenAI’s model index documentation for more details). While Codex may
    seem focused solely on coding, code-davinci-002 could be considered the most potent
    GPT-3.5 variant for natural language processing (NLP)—even surpassing text-davinci-002
    and -003\. This is likely due to code-davinci-002 being trained on both text and
    code, and being finely tuned for instruction alignment.
  prefs: []
  type: TYPE_NORMAL
- en: Released in May 2022, the text-davinci-002 model was fine-tuned under supervised
    instructions based on code-davinci-002\. This targeted fine-tuning may have reduced
    its contextual learning prowess but significantly improved its zero-shot learning
    capabilities. Later, in November 2022, the text-davinci-003 and ChatGPT (gpt-3.5-turbo)
    were introduced as different variants fine-tuned through reinforcement learning
    based on human feedback. Text-davinci-003 reclaimed some contextual learning capabilities
    that text-davinci-002 had partially lost, likely due to integrating language modeling
    into the fine-tuning process, and it further enhanced its abilities to understand
    text intentions, perform logical reasoning, and conduct causal analysis, benefiting
    from RLHF.
  prefs: []
  type: TYPE_NORMAL
- en: Released in May 2022, the text-davinci-002 model was fine-tuned under supervised
    instructions based on code-davinci-002\. This targeted fine-tuning may have reduced
    its contextual learning prowess but significantly improved its zero-shot learning
    capabilities. Later, in November 2022, the text-davinci-003 and ChatGPT (gpt-3.5-turbo)
    were introduced as different variants fine-tuned through reinforcement learning
    based on human feedback. Text-davinci-003 reclaimed some contextual learning capabilities
    that text-davinci-002 had partially lost, likely due to integrating language modeling
    into the fine-tuning process, and it further enhanced its abilities to understand
    text intentions, perform logical reasoning, and conduct causal analysis, benefiting
    from RLHF.
  prefs: []
  type: TYPE_NORMAL
- en: ChatGPT and InstructGPT share similar training approaches. ChatGPT’s understanding
    of human intentions, fueled by RLHF and the incorporation of extensive coding
    examples, particularly those solving mathematical problems and code annotations,
    has significantly advanced its capabilities in NLP and code generation. Although
    there are some variations in the training datasets between ChatGPT and InstructGPT,
    their foundational training methodologies remain largely identical. The subsequent
    section will use InstructGPT as a case study to detail the training and evaluation
    strategies employed in ChatGPT|InstructGPT, which leverage reinforcement learning
    from human feedback.
  prefs: []
  type: TYPE_NORMAL
- en: 8.2 InstructGPT training dataset
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'The training of InstructGPT/ChatGPT is structured around three pivotal stages:
    supervised fine-tuning (SFT), reward modeling (RM), and reinforcement learning
    (RL), each associated with its distinct dataset—SFT, RM, and RL datasets, respectively.
    In the SFT phase, annotators craft manual responses to prompts within the samples.
    This stage demands considerable human input and requires annotators with a high
    level of expertise. During the reward modeling phase, annotators rank several
    (4–9) model-generated outputs. Although the demands on annotators are somewhat
    less stringent during this phase, they still must be well acquainted with the
    evaluation criteria to ensure the rankings align with expected standards, thereby
    preventing inconsistent outcomes.'
  prefs: []
  type: TYPE_NORMAL
- en: 8.2.1 Sources of fine-tuning datasets
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'The fine-tuning data for the models mainly derives from two key sources:'
  prefs: []
  type: TYPE_NORMAL
- en: 1. Prompts submitted through the OpenAI API, predominantly sourced from the
    OpenAI Playground. When users opt for the InstructGPT model, they receive a notification
    alerting them that their submitted prompts may contribute to the training dataset
    for newer model versions. For privacy and compliance reasons, API data from the
    actual product are not utilized. Data from the API excludes prompts with repetitive,
    lengthy prefixes and restricts the number of prompts per user to under 200 to
    maintain diversity. The datasets are also segmented by user ID to prevent overlaps
    between training inputs and those in the validation and test sets. Moreover, all
    prompts that contain personally identifiable information are systematically excluded
    to safeguard user privacy.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '2. Prompts crafted by annotators, which fall into three categories:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'a. Simple tasks: Annotators are asked to create straightforward tasks, ensuring
    a variety of tasks is covered.'
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: 'b. Few-sample tasks: Here, annotators develop multiple (query, response) pairs
    for a given prompt. For example, for a prompt like “Conduct sentiment analysis
    on this tweet,” the query would be a real tweet, and the response would be classified
    as either “positive” or “negative.” If K pairs are created, the initial K-1 pairs
    form the context.'
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: 'c. User data: This involves taking use cases from the OpenAI API and crafting
    corresponding prompts, often rewriting them to meet standardization requirements.
    These types are systematically categorized into 10 distinct classes, as detailed
    in [Table 8.1](#t0010).'
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: Table 8.1
  prefs: []
  type: TYPE_NORMAL
- en: Distribution and examples of different types of use cases based on user data.
  prefs: []
  type: TYPE_NORMAL
- en: '| Use case type | Percentage | Example |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '| Brainstorming | 11.2% | What are the next 10 sci-fi books I should read?
    |'
  prefs: []
  type: TYPE_TB
- en: '| Categorization | 3.5% | Using the text below, rate this person’s level of
    sarcasm on a scale of 1 to 10 (1 = not at all sarcastic, 10 = extremely sarcastic),
    and provide an explanation: {text} Rating: |'
  prefs: []
  type: TYPE_TB
- en: '| Extraction | 1.9% | Extract all place names from the following article: {news
    article} |'
  prefs: []
  type: TYPE_TB
- en: '| Generation | 45.6% | This is the message I received: {email} Here are some
    key points of the reply: {message} Write a detailed reply |'
  prefs: []
  type: TYPE_TB
- en: '| Rewriting | 8.4% | Rewrite the following text to make it more concise: {very
    formal text} |'
  prefs: []
  type: TYPE_TB
- en: '| Chatting | 6.6% | This is a conversation with the Buddha. Each response is
    filled with wisdom and love. Me: How can I achieve greater peace? |'
  prefs: []
  type: TYPE_TB
- en: '| Specific question | 2.6% | Tell me the differences between hydrogen and helium,
    using the following facts: {list of facts} |'
  prefs: []
  type: TYPE_TB
- en: '| Open question | 12.4% | Who built the Great Wall? |'
  prefs: []
  type: TYPE_TB
- en: '| Summarization | 4.2% | Summarize the following text for a second grader:
    {text} |'
  prefs: []
  type: TYPE_TB
- en: '| Other | 3.5% | Search “cowboy” on Google and return the results |'
  prefs: []
  type: TYPE_TB
- en: Typically, prompts used for brainstorming and open-ended question-and-answer
    sessions are shorter, whereas prompts for dialogues and summaries tend to be longer.
  prefs: []
  type: TYPE_NORMAL
- en: 8.2.2 Annotation standards
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'The selection criteria for annotators are based on two key aspects:'
  prefs: []
  type: TYPE_NORMAL
- en: 1. Consistency in identifying sensitive content. The research team has compiled
    a dataset that includes sensitive materials, each entry comprising a prompt and
    its completion. If any section of the prompt or completion features content related
    to pornography, politics, violence, etc., it is classified as sensitive. Annotators
    are tasked with determining the sensitivity of the content to gauge the alignment
    between their judgments and those of the research team.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 2. Consistency in assessing the quality of model outputs. Using API-generated
    prompts and the varied responses provided by different models, annotators are
    asked to rank the outputs based on quality. The agreement between the annotators’
    and researchers’ rankings is then evaluated to ensure consistency in quality assessment.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Annotators have the following primary duties:'
  prefs: []
  type: TYPE_NORMAL
- en: 1. Crafting prompts.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 2. Responding to prompts.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 3. Comparatively ranking outputs from different models for the same prompt.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 4. In the evaluation phase, feeding prompts that contain coarse, sexually explicit,
    or violent content into an InstructGPT model trained through PPO to assess both
    the toxicity and fluency of the outputs.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Notably, tasks (3) and (4) require annotators to assess the quality and toxicity
    of content, providing them with clear operational guidelines.
  prefs: []
  type: TYPE_NORMAL
- en: 'For task (3), high-quality outputs must satisfy three standards: usefulness,
    truthfulness, and harmlessness. Typically, truthfulness and harmlessness are more
    critical than usefulness. However, if an output “a” is significantly more useful
    than output “b”, and its relative harmfulness and untruthfulness are not overly
    severe—especially if it doesn’t involve high-risk domains like law or medicine—then
    output “a” is considered superior to “b.” The fundamental sorting criterion is
    which output one would expect in response to a machine-posed question.'
  prefs: []
  type: TYPE_NORMAL
- en: 'For task (4), two primary metrics are utilized: toxicity, which determines
    if the output includes vulgar, disrespectful, or sexually violent content, evaluated
    both in absolute and relative terms to the prompt’s toxicity; and fluency, which
    assesses the text’s coherence and natural presence in a digital environment.'
  prefs: []
  type: TYPE_NORMAL
- en: In the ranking tasks, the approach involves first allowing annotators to independently
    rate each output following established standards, followed by a collective display
    of all outputs for final ranking. This method prevents the bias of simultaneous
    display and rankings, improving evaluation accuracy.
  prefs: []
  type: TYPE_NORMAL
- en: 8.2.3 Data analysis
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '[Table 8.2](#t0015) outlines the origins and sizes of each dataset:'
  prefs: []
  type: TYPE_NORMAL
- en: '• **SFT dataset**: Comprising 13,000 prompts jointly supplied by the API and
    annotators, this dataset is vital for training the SFT model. Annotators provide
    corresponding answers for these prompts. It is crucial to ensure that each entry
    in the SFT dataset includes both a prompt and its answer.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '• **RM dataset**: Featuring 33,000 prompts, this dataset is contributed by
    both the API and annotators. Here, annotators are tasked with ranking the model
    outputs, and this data serves as the training set for the RM model.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '• **PPO dataset**: Consisting of 31,000 prompts solely from the API and lacking
    any annotation, this dataset is utilized specifically for RLHF fine-tuning.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Table 8.2
  prefs: []
  type: TYPE_NORMAL
- en: Data distribution of InstructGPT.
  prefs: []
  type: TYPE_NORMAL
- en: '| SFT data | RM data | PPO data |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '| segment | Source | Size | segment | Source | Size | segment | Source | Size
    |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- | --- | --- | --- | --- | --- | --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '| Training | Annotator | 11295 | Training | Annotator | 6623 | Training | User
    | 31144 |'
  prefs: []
  type: TYPE_TB
- en: '| Training | User | 1430 | Training | User | 26584 | Validation | User | 16185
    |'
  prefs: []
  type: TYPE_TB
- en: '| Validation | Annotator | 1550 | Validation | Annotator | 3488 |   |   |  
    |'
  prefs: []
  type: TYPE_TB
- en: '| Validation | User | 103 | Validation | User | 14399 |   |   |   |'
  prefs: []
  type: TYPE_TB
- en: 'Appendix A¹ of the research paper provides a thorough discussion on the distribution
    of data used in the training of InstructGPT. The chapter highlights several critical
    factors potentially influencing the model’s effectiveness:'
  prefs: []
  type: TYPE_NORMAL
- en: 1. More than 96% of the data are in English, with the remaining under 4% comprising
    20 other languages, such as Chinese, French, and Spanish. This suggests that while
    InstructGPT is capable of processing inputs in multiple languages, its performance
    may be less effective with nonEnglish inputs.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 2. There are nine distinct types of prompts, predominantly generative tasks.
    This indicates that the model might not be fully equipped to handle every type
    of task.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 3. The 40 outsourced annotators, who are responsible for labeling, are from
    the USA and Southeast Asia, representing a small and geographically concentrated
    group. Given that InstructGPT aims to train a model that embodies appropriate
    values, the relatively narrow diversity of these annotators could introduce biases,
    particularly on issues of significant concern in specific regions.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'This discussion sheds light on InstructGPT’s dataset. Although ChatGPT and
    InstructGPT employ similar training methodologies, there are notable differences
    in their dataset compositions. Currently, detailed comparisons of these differences
    are scarce. Considering ChatGPT’s primary application in conversational settings,
    it is likely that its dataset differs from InstructGPT in two key aspects: a higher
    proportion of conversational tasks and a transformation of prompt formats into
    a question-and-answer style. For a more precise understanding, we await the release
    of detailed documents, such as ChatGPT’s research papers and source codes.'
  prefs: []
  type: TYPE_NORMAL
- en: 8.3 Training stages of human feedback reinforcement learning
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'To more closely align language models with user intentions, supervised learning
    and reinforcement learning fine-tuning strategies informed by human feedback are
    utilized. This approach not only expands the capabilities of these models but
    also enhances their precision in adhering to user directives. As depicted in [Fig.
    8.2](#f0015), the human feedback fine-tuning process for InstructGPT involves
    three principal phases: SFT, training of the reward model, and the reinforcement
    learning stage. Given that the training methodologies for InstructGPT and ChatGPT
    share significant similarities, the forthcoming discussion will focus on InstructGPT
    as a representative example.'
  prefs: []
  type: TYPE_NORMAL
- en: '![Three-step process for human feedback fine-tuning in InstructGPT.](../images/F000084f08-02-9780443274367.jpg)'
  prefs: []
  type: TYPE_IMG
- en: '[Figure 8.2](#Bf0015) Human feedback fine-tuning process of InstructGPT. Image
    source: Paper “Training language models to follow instructions with human feedback”.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 1: Collect demonstration data and train a supervised policy. A prompt
    is sampled from the prompt dataset. A labeler demonstrates the desired output
    behavior. This data is used to fine-tune GPT-3 with supervised learning. Step
    2: Collect comparison data and train a reward model. A prompt and several model
    outputs are sampled. A labeler ranks the outputs from best to worst. This data
    is used to train the reward model. Step 3: Optimize a policy against the reward
    model using reinforcement learning. A new prompt is sampled from the dataset.
    The policy generates an output. The reward model calculates a reward for the output.
    The reward is used to update the policy using PPO.'
  prefs: []
  type: TYPE_NORMAL
- en: 8.3.1 Supervised fine-tuning
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: SFT is a training technique that utilizes the previously mentioned SFT dataset
    to fine-tune the pretrained GPT-3 model. Known as the SFT model, it displays the
    foundational predictive abilities of a baseline model, as depicted in [Fig. 8.3](#f0020),
    with a parameter count reaching 175 billion. The fine-tuning approach is akin
    to that used for GPT-1\. Specifically, it incorporates a cosine learning rate
    decay strategy across 16 training epochs, and to mitigate overfitting, a residual
    dropout rate of 0.2 is established. These measures are taken to ensure that the
    model effectively learns and adapts to new data during fine-tuning, thereby improving
    its predictive performance.
  prefs: []
  type: TYPE_NORMAL
- en: '![Diagram showing GPT answering the question What is a banana? with multiple
    options.](../images/F000084f08-03-9780443274367.jpg)'
  prefs: []
  type: TYPE_IMG
- en: '[Figure 8.3](#Bf0020) Example of supervised fine-tuning.'
  prefs: []
  type: TYPE_NORMAL
- en: The output options are Ornamental Plant, A sour fruit and A banana is a yellow
    fruit. The correct answer is indicated as A banana is a yellow fruit.
  prefs: []
  type: TYPE_NORMAL
- en: Due to the limited training data volume of only 13K samples, the GPT-3 model
    is susceptible to overfitting. However, this model serves primarily as an initial
    baseline for further training and not for direct practical application. Consequently,
    even if overfitting occurs during the SFT stage, it can still aid in enhancing
    the performance of later models.
  prefs: []
  type: TYPE_NORMAL
- en: So, is it feasible to align the SFT model with human needs solely through fine-tuning?
    Clearly, this presents several challenges. For instance, manually crafting answers
    for all queries can be daunting due to the need for an in-depth understanding
    of the question content and substantial time, knowledge, and skills to provide
    diverse, high-quality answers. Thus, while fine-tuning is a potent method of training
    models, real-world applications might necessitate the integration of additional
    strategies like reinforcement learning to better meet human requirements.
  prefs: []
  type: TYPE_NORMAL
- en: 8.3.2 Reward modeling
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Given the impracticality of humans writing answers for every conceivable query,
    a reward model is trained to discern human preferences. This model processes input
    prompts and answers to produce a scalar reward value. Illustrated in [Fig. 8.4](#f0025),
    both API-generated and manually crafted prompts are fed into the SFT model, which
    then generates answers. These answers are derived through probabilistic sampling
    and subsequently ranked by annotators. After obtaining the rankings, a reward
    model is trained by removing the final nonembedding layer of the SFT model and
    incorporating a linear layer post-Softmax. This configuration maps the output
    sequence to a scalar value—essentially rating the prompt–response pair.
  prefs: []
  type: TYPE_NORMAL
- en: '![Diagram showing the process of training a reward model using prompts, SFT
    model, human annotation and pairwise ranking loss minimization.](../images/F000084f08-04-9780443274367.jpg)'
  prefs: []
  type: TYPE_IMG
- en: '[Figure 8.4](#Bf0025) Training process of the RM model.'
  prefs: []
  type: TYPE_NORMAL
- en: It starts with a prompt that is fed into an SFT model, which generates multiple
    outputs labeled A, B and C. Human annotation ranks these outputs as A greater
    than B greater than C. The next step involves training the reward model using
    pairs of prompts and outputs (Prompt, A, B), (Prompt, A, C) and (Prompt, B, C).
    This process is aimed at pairwise ranking loss minimization.
  prefs: []
  type: TYPE_NORMAL
- en: Notably, InstructGPT employs a smaller 6B parameter GPT-3 fine-tuned (SFT) model
    for training the reward model instead of the maximal 175B parameter version. This
    choice is due to the larger models’ propensity for instability during training,
    while smaller models offer computational efficiency.
  prefs: []
  type: TYPE_NORMAL
- en: 8.3.3 Reinforcement learning
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: On the foundation of reward modeling, the PPO algorithm previously discussed
    is employed to fine-tune the supervised strategy using outputs from the RM as
    scalar rewards to enhance this reward mechanism. As illustrated in [Fig. 8.5](#f0030),
    the reinforcement learning phase progresses by further fine-tuning the SFT model.
    It inputs some unannotated prompts (like “Write a diary entry for a spring outing”
    from a set of 31k prompts from the API) into the SFT model. At this stage, instead
    of relying on manual quality evaluations, the reward model developed in the second
    phase scores the outputs of the SFT model. Initially, the SFT model acts as the
    policy network within the PPO framework, optimizing parameters to elevate the
    scores of the generated answers. Responses are then regenerated based on the refined
    policy, assessed by the reward model, leading to further optimizations of the
    SFT model parameters in a cycle until the policy achieves optimality.
  prefs: []
  type: TYPE_NORMAL
- en: '![A diagram illustrating the process of Reinforcement Learning from Human Feedback
    (RLHF) involving GPT3/GPT3.5 and a Reward Model.](../images/F000084f08-05-9780443274367.jpg)'
  prefs: []
  type: TYPE_IMG
- en: '[Figure 8.5](#Bf0030) Diagram of reinforcement learning with human feedback.'
  prefs: []
  type: TYPE_NORMAL
- en: 'It involves two main components: GPT3/GPT3.5 and a Reward Model. The connections
    between these components are as follows: State leads to GPT3/GPT3.5, which then
    leads to Action. Action connects to the Reward Model, which then provides Reward
    back to GPT3/GPT3.5.'
  prefs: []
  type: TYPE_NORMAL
- en: During the three phases of training with human feedback reinforcement learning
    (HFRL), the reward model and PPO fine-tuning phase are iteratively refined, gathering
    more comparative data from the best current strategies for training new reward
    models and strategies. However, this iterative process introduces the challenge
    of shifting data distributions. As the model evolves, so does the data distribution—a
    departure from traditional statistical learning approaches, necessitating continual
    adaptation to the evolving data environment.
  prefs: []
  type: TYPE_NORMAL
- en: During the process of SFT and reward modeling, one might question why a ranking
    model is necessary when labeled data already exists—why not proceed directly with
    training? The answer lies in the nature of the data available; only rankings are
    available, not explicit outputs $MathML$![Equation](../images/F000084si1.png).
    If outputs $MathML$![Equation](../images/F000084si2.png) were directly labeled,
    the approach would fall under supervised learning. However, reinforcement learning
    typically lacks such explicit labels, necessitating the training of a ranking
    model to assimilate feedback from the environment. This assists the model in comprehending
    and adjusting to new data distributions, enabling it to learn effectively within
    an ever-evolving environment.
  prefs: []
  type: TYPE_NORMAL
- en: In the realm of reinforcement learning, there is a concept known as online learning,
    prevalent in applications like gaming. Here, the model is in a state of continuous
    update, engaging with the environment and assimilating instant feedback. Adopting
    online learning would require a person to constantly provide ranking feedback
    for the model’s generated responses and update the model accordingly. This approach,
    however, can be inefficient as aligning the pace of model training with manual
    annotation rates is challenging.
  prefs: []
  type: TYPE_NORMAL
- en: Thus, training a ranking model $MathML$![Equation](../images/F000084si3.png)
    to substitute for human ranking has been adopted to facilitate real-time feedback
    during the training process. This necessity to train two models arises from the
    desire to enable the newly trained reinforcement learning model to produce highly
    ranked responses, enhancing the overall generation quality.
  prefs: []
  type: TYPE_NORMAL
- en: 8.4 Reward modeling algorithms
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 8.4.1 Reward scores
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The fundamental principle of reward modeling involves converting manually ranked
    data into actionable reward scores that are utilized to fine-tune the GPT-3 model’s
    parameters. To realize this objective, InstructGPT has adopted a cutting-edge
    technique for reward modeling, depicted in [Fig. 8.6](#f0035). This method assigns
    a reward score to each input-output combination, representing the preferences
    of human annotators for that particular pairing.
  prefs: []
  type: TYPE_NORMAL
- en: '![Diagram showing the process of training a language model using human scoring
    and reward model.](../images/F000084f08-06-9780443274367.jpg)'
  prefs: []
  type: TYPE_IMG
- en: '[Figure 8.6](#Bf0035) Diagram of reward modeling ranking algorithm.'
  prefs: []
  type: TYPE_NORMAL
- en: It starts with a prompt dataset providing sample prompts to the SFT Language
    Model. The SFT Language Model generates an article, for example, Mars, a barren
    world of haunting beauty, holds secrets beneath its windswept red sands. This
    generated article is then scored by humans. The human scoring results are used
    to train a reward model with preferences. The reward model processes the text
    and produces ranked outputs based on relevance, ELO, etc.
  prefs: []
  type: TYPE_NORMAL
- en: To handle the inputs of ranking problems—essentially, a set of ranked prompts—the
    reward model integrates a pairwise ranking loss mechanism. In practice, for each
    prompt, pairs are chosen from the generated responses $MathML$![Equation](../images/F000084si4.png)
    and $MathML$![Equation](../images/F000084si5.png), where $MathML$![Equation](../images/F000084si6.png)
    is ranked higher than $MathML$![Equation](../images/F000084si7.png). The pair
    comprising $MathML$![Equation](../images/F000084si8.png) (the prompt) and $MathML$![Equation](../images/F000084si9.png)
    (the higher-ranked response) is then input into the reward model to compute its
    reward score. Subsequently, the pair $MathML$![Equation](../images/F000084si10.png)
    and $MathML$![Equation](../images/F000084si11.png) is processed to determine its
    reward score. Given that $MathML$![Equation](../images/F000084si12.png) ranks
    above $MathML$![Equation](../images/F000084si13.png), InstructGPT anticipates
    a higher reward score for $MathML$![Equation](../images/F000084si14.png). Consequently,
    the disparity between the two scores is calculated and converted into a scalar
    value using logistic loss, effectively translating ranked preferences into a format
    that guides model optimization.
  prefs: []
  type: TYPE_NORMAL
- en: 8.4.2 Loss function
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'The loss is computed using the following formula:'
  prefs: []
  type: TYPE_NORMAL
- en: $MathML$ (8.1)
  prefs: []
  type: TYPE_NORMAL
- en: '![Equation](../images/F000084si15.png) (8.1)'
  prefs: []
  type: TYPE_IMG
- en: Here, $MathML$![Equation](../images/F000084si16.png) signifies the reward model’s
    loss function. $MathML$![Equation](../images/F000084si17.png) represents the count
    of responses generated for each prompt, and $MathML$![Equation](../images/F000084si18.png)
    indicates the number of two-response combinations drawn from $MathML$![Equation](../images/F000084si19.png)
    responses. The expectation $MathML$![Equation](../images/F000084si20.png) considers
    the dataset *D*, comprising tuples of the prompt $MathML$![Equation](../images/F000084si21.png),
    higher preferred response $MathML$![Equation](../images/F000084si22.png), and
    lower preferred response $MathML$![Equation](../images/F000084si23.png). The sigmoid
    function $MathML$![Equation](../images/F000084si24.png) normalizes inputs to a
    range between 0 and 1, and $MathML$![Equation](../images/F000084si25.png) denote
    the reward scores for responses $MathML$![Equation](../images/F000084si26.png)
    and $MathML$![Equation](../images/F000084si27.png), respectively.
  prefs: []
  type: TYPE_NORMAL
- en: This loss function aims to minimize the expected loss across dataset $MathML$![Equation](../images/F000084si28.png).
    Each component of the loss is based on annotators’ preferences for two responses
    given a specific prompt. The reward model’s role is to predict which response
    is more favored given a prompt. By minimizing this loss, the reward model distinguishes
    between different prompt–response pairs, facilitating a reward mechanism for subsequent
    reinforcement learning stages.
  prefs: []
  type: TYPE_NORMAL
- en: In RLHF, rankings serve as a form of weak supervision. Despite their simplicity,
    these rankings enable the reward model to effectively learn human preferences.
    Rankings are preferred over direct scoring because they align more closely with
    objective realities. For instance, while different annotators may assign varying
    scores to the same output—some may deem an exceptional text worthy of a 1.0 score,
    others might rate it at 0.8—such discrepancies could introduce a considerable
    amount of noise. However, the consistency found in rankings is generally greater,
    making them a more reliable measure.
  prefs: []
  type: TYPE_NORMAL
- en: To enhance the collection of annotative data, InstructGPT sets the parameter
    $MathML$![Equation](../images/F000084si29.png) to 9, thereby generating nine possible
    answers for each prompt. From these, 36 answer pairs are selected to compute the
    loss. To maintain consistency in loss values irrespective of changes in $MathML$![Equation](../images/F000084si30.png),
    InstructGPT normalizes the loss by dividing it by 36, adhering to the standard
    practice of pairwise ranking loss.
  prefs: []
  type: TYPE_NORMAL
- en: 'Opting for a higher value of K offers dual benefits: it provides a richer set
    of annotative data, aiding in more effective model training, and it facilitates
    the reuse of previously calculated values, which enhances computational efficiency.
    Moreover, to minimize the risk of overfitting, InstructGPT employs a full-order
    ranking approach. This technique more accurately assesses the quality of each
    response, improving the model’s ability to generalize across different scenarios.
    Eventually, the reward model progressively learns to assign scores based on human
    preferences. This approach, known as deep reinforcement learning guided by human
    preferences, essentially leverages human preferences as the driving reward mechanism.'
  prefs: []
  type: TYPE_NORMAL
- en: 8.5 PPO in InstructGPT
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In the development of InstructGPT’s reinforcement learning approach, the proximal
    policy optimization (PPO) algorithm was employed. The strategy network for this
    PPO setup was the fine-tuned GPT-3 SET model (refer to [Fig. 8.7](#f0040)). The
    training utilized a dataset comprising 31,000 prompts. Each prompt was fed into
    the active reinforcement learning model, which produced an output *y*. This output,
    alongside the prompt $MathML$![Equation](../images/F000084si31.png), was then
    evaluated using a pretrained reward model to assess its effectiveness. The objective
    was to refine the objective function, enabling the freshly trained model to generate
    responses deemed superior by human standards.
  prefs: []
  type: TYPE_NORMAL
- en: '![Diagram showing the process of fine-tuning an SFT model with RLHF using a
    prompt dataset.](../images/F000084f08-07-9780443274367.jpg)'
  prefs: []
  type: TYPE_IMG
- en: '[Figure 8.7](#Bf0040) Reinforcement learning process of InstructGPT based on
    the PPO algorithm.'
  prefs: []
  type: TYPE_NORMAL
- en: 'The prompt dataset is labeled as x: A dog is.... The SFT Model generates base
    text y: A furry mammal. The SFT Model Fine-Tuned with RLHF adjusts the text to
    y: Man''s best friend with parameter freezing. The text is then processed by the
    Reward Model (with Preferences) and updated using reinforcement learning algorithms
    (e.g., PPO) with the formula theta left arrow theta plus gradient sub theta J
    left parenthesis theta right parenthesis. The KL Prediction Shift Penalty is represented
    as -lambda sub KL D sub KL left parenthesis pi sub RL left parenthesis y vertical
    bar x right parenthesis parallel pi sub SFT left parenthesis y vertical bar x
    right parenthesis right parenthesis.'
  prefs: []
  type: TYPE_NORMAL
- en: The objective function can specifically be defined as
  prefs: []
  type: TYPE_NORMAL
- en: $MathML$ (8.2)
  prefs: []
  type: TYPE_NORMAL
- en: '![Equation](../images/F000084si32.png) (8.2)'
  prefs: []
  type: TYPE_IMG
- en: Here, $MathML$![Equation](../images/F000084si33.png) denotes the expected reward
    during the reinforcement learning process, as determined by the trained reward
    model $MathML$![Equation](../images/F000084si34.png). This model quantifies human
    preferences for outputs $MathML$![Equation](../images/F000084si35.png) given inputs
    $MathML$![Equation](../images/F000084si36.png). The calculations are based on
    the data distribution $MathML$![Equation](../images/F000084si37.png), which is
    generated from the policy $MathML$![Equation](../images/F000084si38.png).
  prefs: []
  type: TYPE_NORMAL
- en: The component $MathML$![Equation](../images/F000084si39.png) in [Eq. (8.2)](#eqn2)
    accounts for the Kullback-Leibler (KL) divergence. This metric is utilized to
    moderate the modifications to the model parameters *θ*, ensuring that the learning
    policy $MathML$![Equation](../images/F000084si40.png) does not stray excessively
    from the original policy $MathML$![Equation](../images/F000084si41.png), thereby
    maintaining the model’s fidelity to the original training data. Here, $MathML$![Equation](../images/F000084si42.png)
    is a hyperparameter that regulates the weight of the KL divergence.
  prefs: []
  type: TYPE_NORMAL
- en: The $MathML$![Equation](../images/F000084si43.png) term acts as a bias factor,
    with $MathML$![Equation](../images/F000084si44.png) representing the pretrained
    data distribution from the GPT-3 SFT model. The model $MathML$![Equation](../images/F000084si45.png)
    reflects the probability distribution postreinforcement learning optimization
    for given inputs $MathML$![Equation](../images/F000084si46.png). The hyperparameter
    $MathML$![Equation](../images/F000084si47.png), known as the pretraining loss
    coefficient, moderates the influence of pretraining data on the objective function
    to prevent ChatGPT from overly optimizing during training, which could significantly
    impair its performance on general NLP tasks. If $MathML$![Equation](../images/F000084si48.png)
    is set to 0, the configuration is known as the PPO model; otherwise, it’s termed
    the PPO-ptx model.
  prefs: []
  type: TYPE_NORMAL
- en: 8.6 Multiturn dialogue capability
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The GPT series, a lineup of large language models, constructs probability distributions
    for sequences of words. These models take combinations of words within sentences
    as input conditions to forecast the probability distribution of various words
    emerging at subsequent moments. In the PPO models utilized by ChatGPT and InstructGPT,
    the state is defined as the input sentence, while the SFT model, which requires
    adjustments through RLHF, acts as the agent. This agent generates responses based
    on the input state, with the policy’s action being the prediction of the next
    word’s probability distribution. At this juncture, the word with the highest probability
    is typically selected as the output. A pertinent question arises regarding whether
    the reward model evaluates each word produced individually or assesses the entire
    output sequence only after completion.
  prefs: []
  type: TYPE_NORMAL
- en: Illustrated in [Fig. 8.8](#f0045), if the reward function is only activated
    after the agent has produced a full response, it remains unclear how each action’s
    output word $MathML$![Equation](../images/F000084si49.png) secures its corresponding
    reward during the generation phase. The InstructGPT paper does not explicitly
    address this query. Other studies indicate that for ChatGPT, the sequence is only
    deemed complete following the end-of-sentence token, and rewards are dispensed
    solely based on the final response, with no rewards allocated during the intermediate
    steps.
  prefs: []
  type: TYPE_NORMAL
- en: '![A diagram showing the interaction between an agent and an environment with
    actions, states and rewards.](../images/F000084f08-08-9780443274367.jpg)'
  prefs: []
  type: TYPE_IMG
- en: '[Figure 8.8](#Bf0045) Reward model for multiturn dialogue in InstructGPT.'
  prefs: []
  type: TYPE_NORMAL
- en: The environment is represented by a rectangular block labeled Environment, and
    the agent is represented by another rectangular block labeled Agent. The agent
    takes an action, denoted as a sub t end sub, which is indicated by an arrow pointing
    from the agent to the environment. The environment responds with a state, denoted
    as S sub t end sub and a reward, denoted as R sub t end sub, both indicated by
    arrows pointing from the environment to the agent. There is also an arrow indicating
    the probability distribution P of a sub t end sub given the history of states
    and actions. Additionally, there is a mathematical expression X equals the summation
    of S sub n end sub and a question mark is shown with an arrow pointing downward
    from the reward.
  prefs: []
  type: TYPE_NORMAL
- en: Both ChatGPT and InstructGPT are equipped with the capability for multiturn
    dialogues, yet the foundational documents for InstructGPT do not clarify the training
    procedures for these extended interactions. Multiturn dialogues demand that the
    model retain memory of previous interactions, but the reward functions described
    in the InstructGPT publications only evaluate single input–output pairs. The complexity
    of multiturn conversations, especially when dealing with references to entities
    mentioned in earlier exchanges, calls for further exploration.
  prefs: []
  type: TYPE_NORMAL
- en: To effectively manage multiturn dialogues, InstructGPT relies on the ability
    of the GPT-3 or GPT-3.5 models to process extended input tokens, accommodating
    segments of past dialogues (up to a limit, such as 8 KB) combined with current
    inputs. These are fed into the SET model. The data paired with the outputs of
    the SET model, represented as (*x*, *y*), are used to train the PPO model through
    a pretrained reward system to better align with human conversational patterns.
  prefs: []
  type: TYPE_NORMAL
- en: Moreover, the Transformer’s self-attention mechanism equips the model to address
    issues of long-distance dependencies, recognizing the relationships between segments
    of dialogue history and integrating this understanding into response generation.
    Positional encoding is also employed to differentiate the placement of each historical
    interaction, ensuring the model accurately interprets the sequence of the conversation.
    To bolster their multiturn conversational capabilities, both InstructGPT and ChatGPT
    incorporate substantial multiturn dialogue datasets during their training phases.
  prefs: []
  type: TYPE_NORMAL
- en: 8.7 The necessity of human feedback reinforcement learning
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: As depicted in [Fig. 8.9](#f0050), following the RLHF fine-tuning process, the
    PPO model equipped with 1.3 billion parameters notably outperforms both the 175
    billion parameter SFT model and the GPT-3 model. This superior performance is
    attributed to the strategy adopted by InstructGPT/ChatGPT of integrating a variety
    of annotators who are tasked with crafting prompts and ranking outputs, building
    upon the foundation provided by GPT-3\. Moreover, in the reward model’s training
    phase, greater rewards are assigned to data that more closely mirrors real-world
    scenarios.
  prefs: []
  type: TYPE_NORMAL
- en: '![A line graph comparing win rates against SFT 175B for different AI models
    across varying model sizes. The graph shows PPOptx and PPO performing best, followed
    by SFT, with GPT variants at the bottom.](../images/F000084f08-09-9780443274367.jpg)'
  prefs: []
  type: TYPE_IMG
- en: '[Figure 8.9](#Bf0050) Performance comparison between PPO model and SFT model.
    Image source: Paper “Training language models to follow instructions with human
    feedback.”'
  prefs: []
  type: TYPE_NORMAL
- en: 'The graph shows the win rate against SFT 175B on the vertical axis, ranging
    from 0.2 to 0.6 in increments of 0.1\. The horizontal axis represents the model
    size, with data points at 1.3B, 6B and 175B. Five different models are compared:
    1\. PPO-ptx: Solid line, highest performance 2\. PPO: Long dashed line, second-highest
    performance 3\. SFT: Dotted line, middle performance 4\. GPT(prompted): Dash-dot
    line, second-lowest performance 5\. GPT: Dash-dot-dot line, lowest performance
    The win rates for each model at different sizes are approximately: PPO-ptx: 1.3B:
    0.52 175B: 0.67 PPO: 1.3B: 0.52 175B: 0.63 SFT: 1.3B: 0.35 175B: 0.5 GPT(prompted):
    1.3B: 0.24 175B: 0.41 GPT: 1.3B: 0.14 175B: 0.25 All models show an increasing
    trend in win rate as the model size increases from 1.3B to 175B. The graph includes
    error bars at the 1.3B and 175B data points for each model. The detailed data
    points are as follows: - For a model size of 1.3B, the win rate against SFT 175B
    for PPO-ptx is 0.52, for PPO is 0.53, for SFT is 0.35, for GPT (prompted) is 0.24
    and for GPT is 0.14\. - For a model size of 6B, the win rate against SFT 175B
    for PPO-ptx is 0.58, for PPO is 0.58, for SFT is 0.41, for GPT (prompted) is 0.31
    and for GPT is 0.20\. - For a model size of 175B, the win rate against SFT 175B
    for PPO-ptx is 0.67, for PPO is 0.63, for SFT is 0.50, for GPT (prompted) is 0.41
    and for GPT is 0.25.'
  prefs: []
  type: TYPE_NORMAL
- en: Additionally, InstructGPT conducted comparisons on the TruthfulQA dataset, demonstrating
    that even the models with fewer parameters, like the 1.3 billion parameter PPO
    model, exceed the performance of GPT-3 after fine-tuning. Nevertheless, despite
    enhancements in reducing harmful outputs, these models did not show substantial
    improvements in tackling issues like discrimination and bias. This may be partly
    because GPT-3 is already a high-performing model with a low inherent likelihood
    of generating harmful or biased content. Furthermore, the limited volume of annotated
    data may constrain InstructGPT’s ability to fully enhance the model’s efficacy
    in these specific areas.
  prefs: []
  type: TYPE_NORMAL
- en: RLHF fine-tuning might bring about certain drawbacks. For instance, InstructGPT
    could degrade in performance across general NLP tasks. While modifying the loss
    function might mitigate this issue, it doesn’t address the root cause. Additionally,
    InstructGPT could generate outputs that lack logical coherence. This might stem
    from the limited scope of human feedback, which cannot encompass every possible
    output scenario, with the most significant influences on model performance originating
    from supervised language modeling tasks. The likely limitations due to scarce
    corrective data or misdirection from supervised tasks (focusing solely on model
    outputs rather than human intent) can lead to unrealistic content generation.
    This is akin to a student who, despite guidance, cannot be guaranteed to master
    all concepts.
  prefs: []
  type: TYPE_NORMAL
- en: The models refined through RLHF exhibit heightened sensitivity to prompts, likely
    due to training with an insufficient range and number of prompts. Furthermore,
    the model might overanalyze simple concepts because annotators are inclined to
    reward longer responses more generously during content evaluation. Hence, researchers
    might need to devise a better approach to leveraging human feedback or develop
    more sophisticated model architectures.
  prefs: []
  type: TYPE_NORMAL
- en: Significantly, with risky prompts, such as a user requesting an “AI plan to
    destroy humanity,” InstructGPT could generate detrimental responses. This occurs
    because InstructGPT presumes user instructions are rational and align with ethical
    standards, lacking a deeper evaluation of these prompts, thus enabling responses
    to any input. Although subsequent reward models may assign lower rewards to such
    outputs, when generating content, the model must consider both its ethical standards
    and the alignment of its responses with the given instructions. This can sometimes
    result in outputs that are ethically questionable.
  prefs: []
  type: TYPE_NORMAL
- en: 8.8 Summary
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This chapter explores in depth the practical application and pivotal role of
    HFRL within ChatGPT, highlighting its crucial place in the iterative and optimization
    processes of the model. It begins by examining the contributions of HFRL to the
    iterations of ChatGPT, detailing its influence on model optimization and decision-making
    learning processes. The discussion then progresses to an analysis of the composition
    of the InstructGPT/ChatGPT training datasets, the origins of the fine-tuning datasets,
    the criteria for selecting annotators, the standards for annotations, and data
    analysis. This is followed by a comprehensive description of the training phases
    involved in HFRL, which includes the SFT phase, the reward modeling phase, and
    the reinforcement learning phase. Each phase is thoroughly described to showcase
    the ongoing enhancements made to the ChatGPT model for adapting to the dynamic
    complexities of human language.
  prefs: []
  type: TYPE_NORMAL
- en: In discussing the reward modeling algorithms, the chapter clarifies the underlying
    concepts and the configuration of loss functions, and discusses how these theories
    are applied to refine the ChatGPT model. Furthermore, it delves into a detailed
    analysis of the PPO technique in InstructGPT, emphasizing its crucial role in
    reinforcement learning. The chapter also underscores the importance of multiturn
    dialogue capabilities for chatbots and the significant impact of HFRL in bolstering
    these capabilities.
  prefs: []
  type: TYPE_NORMAL
- en: Finally, the chapter extensively discusses the necessity of HFRL, underscoring
    that this approach endows the model with robust adaptability and learning capabilities,
    which are crucial for the realization of true artificial intelligence.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: '[¹](#Cfn1)“Fundamentals of Generative Large Language Models and Perspectives
    in Cyber-Defense.”'
  prefs: []
  type: TYPE_NORMAL
- en: <hgroup>
  prefs: []
  type: TYPE_NORMAL
- en: Chapter 9 Low-resource domain transfer of large language models
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: </hgroup>
  prefs: []
  type: TYPE_NORMAL
- en: Abstract
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This chapter delves into the challenges and strategies for adapting large language
    models (LLMs) to specific low-resource domains. It highlights the importance of
    fine-tuning open-source pretrained models to reduce costs associated with human
    annotation and computational resources. The chapter introduces several methods
    like self-instructed annotation, which automates data annotation using LLMs, and
    constitutional artificial intellignece (AI), which emphasizes ethical alignment
    in AI outputs. Low-rank adaptation is discussed as a technique to minimize parameter
    updates during fine-tuning, significantly reducing computational costs. The chapter
    also covers Quantization and SparseGPT techniques for model compression, ensuring
    efficient inference without compromising performance. Case studies in healthcare,
    law, and other sectors illustrate the practical application of these methods,
    showcasing how tailored LLMs can be effectively deployed in industry-specific
    contexts.
  prefs: []
  type: TYPE_NORMAL
- en: Keywords
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Large language models; domain adaptation; fine-tuning; self-instructed annotation;
    constitutional AI; low-rank adaptation; Quantization; SparseGPT; industry-specific
    models
  prefs: []
  type: TYPE_NORMAL
- en: Large language models (LLMs), such as ChatGPT, now possess foundational skills
    in common sense understanding, planning, and logical reasoning. By incorporating
    middleware, these models can also integrate external knowledge, thereby boosting
    their relevance and numerical capabilities. Nonetheless, creating LLMs dedicated
    to specific industries continues to draw significant interest. This often stems
    from businesses that rely on industry-specific data to gain a competitive edge
    and may be reluctant to share their valuable data with a general-purpose LLM.
  prefs: []
  type: TYPE_NORMAL
- en: 'To lower the costs associated with training and deploying LLMs, whether for
    adapting to new domains or for creating smaller-scale models within specific sectors,
    it is common to fine-tune open-source pretrained models—referred to as base models—for
    specialized tasks. This approach aims to minimize two major expenses: the cost
    of human-generated annotations and the computational costs of training and deployment.'
  prefs: []
  type: TYPE_NORMAL
- en: 9.1 Self-instruct
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In the training of LLMs, fine-tuning through human feedback plays a pivotal
    role. While human annotations can boost model accuracy, their high costs and the
    limited variety of these annotations pose significant challenges in practical
    scenarios. Most human-generated annotations are typically focused on popular tasks
    within natural language processing, resulting in a lack of diversity in both the
    types of tasks and the ways they are described. Thus, finding ways to reduce the
    costs of manual annotations while preserving their quality, and enhancing the
    diversity of the data, has become a crucial task for enabling low-cost model transitions
    in open-source settings.
  prefs: []
  type: TYPE_NORMAL
- en: The self-instructed annotation method offers a cost-effective solution for data
    annotation. It utilizes a “teacher” LLM that iteratively generates both the tasks
    and their corresponding inputs and outputs. This process starts with a limited
    set of manually crafted task seeds and, through iterations, develops new tasks.
    Each complete task consists of a set of instructions and several input–output
    pairs (<input, output>).
  prefs: []
  type: TYPE_NORMAL
- en: 'As depicted in [Fig. 9.1](#f0010), self-instructed annotation includes four
    stages: generating instructions, identifying classification tasks, creating instances,
    and filtering.'
  prefs: []
  type: TYPE_NORMAL
- en: '![Diagram showing four stages of self-instructed annotation: instruction generation,
    classification task identification, instance generation and filtering.](../images/F000096f09-01-9780443274367.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 9.1 Flowchart of the self-instruct process. Image source: Paper “Self-Instruct:
    Aligning Language Model with Self Generated Instructions”.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 1: Instruction Generation involves generating instructions from a task
    pool using a language model (LM). An example task is Instruction: Give me a quote
    from a famous person on this topic. Step 2: Classification Task Identification
    uses the LM to identify classification tasks. Step 3: Instance Generation involves
    creating instances based on the instructions. An example task is Instruction:
    Determine whether the given text is in favor of AI development or against it.
    with Output Label: Supports AI Development and Input: I believe AI makes human
    life more convenient. Another example task is Instruction: Give me a quote from
    a famous person on this topic. with Input: Courage and Output: The only thing
    we have to fear is fear itself. — Franklin D. Step 4: Filtering involves filtering
    the generated instances. The process starts with 175 seed tasks, each with one
    instruction and one instance.'
  prefs: []
  type: TYPE_NORMAL
- en: 9.1.1 Instruction generation
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: By harnessing the contextual learning abilities of LLMs, new instructions are
    crafted from a handful of existing examples. As illustrated in [Fig. 9.1](#f0010),
    the process starts with 175 tasks—each comprising instructions and instances—to
    populate the initial task pool. The method uses iterative rounds to foster a richer
    variety of instructions. Each round selects eight task instructions for few-shot
    learning, mixing six human-crafted tasks with two generated by the LLM in a previous
    round. This blend of human and machine efforts serves to enrich the diversity
    of instructions. For more details, see [Fig. 9.2](#f0015).
  prefs: []
  type: TYPE_NORMAL
- en: '![A series of tasks are proposed with instructions for each task.](../images/F000096f09-02-9780443274367.jpg)'
  prefs: []
  type: TYPE_IMG
- en: '[Figure 9.2](#Bf0015) Template for prompts used in instruction generation.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Propose a series of tasks: Task 1: Instruction of existing Task 1\. Task 2:
    Instruction of existing Task 2\. Task 3: Instruction of existing Task 3\. Task
    4: Instruction of existing Task 4\. Task 5: Instruction of existing Task 5\. Task
    6: Instruction of existing Task 6\. Task 7: Instruction of existing Task 7\. Task
    8: Instruction of existing Task 8\. Task 9:'
  prefs: []
  type: TYPE_NORMAL
- en: 9.1.2 Task classification identification
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Recognizing the distinct processing needs between classification and nonclassification
    tasks is crucial. To ascertain whether an LLM-generated instruction pertains to
    a classification task, a set of 12 classification-specific instructions and 19
    nonclassification instructions are prepared as prompts. These are then evaluated
    by the LLM to identify their nature, as depicted in [Fig. 9.3](#f0020).
  prefs: []
  type: TYPE_NORMAL
- en: '![Tasks are evaluated to determine if they are classification tasks with limited
    output labels.](../images/F000096f09-03-9780443274367.jpg)'
  prefs: []
  type: TYPE_IMG
- en: '[Figure 9.3](#Bf0020) Template for prompts to determine if an instruction is
    a classification task.'
  prefs: []
  type: TYPE_NORMAL
- en: 'The text from top to bottom is as follows: Can the following tasks be considered
    classification tasks with a limited set of output labels? Task: Given my personality
    and job, tell me if I am suitable. Is this a classification task? Yes. Task: Give
    me an example of a time when you had to use your sense of humor. Is this a classification
    task? No. Task: Replace the placeholders in the given text with appropriate named
    entities. Is this a classification task? No. Task: Fact-checking — Based on your
    knowledge and common sense, tell me if this statement is true, false, or unknown.
    Is this a classification task? Yes. Task: Return this person''s SSN number. Is
    this a classification task? No. Task: Detect if the Reddit thread contains hate
    speech. Is this a classification task? Yes. Task: Analyze the following sentence
    to identify bias. Is this a classification task? No.'
  prefs: []
  type: TYPE_NORMAL
- en: 9.1.3 Instance generation
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'For each new instruction, appropriate input and output instances are generated
    based on the type of task. There are two approaches to instance generation: input-first
    and output-first. With input-first, the model initially crafts the input part
    based on the instruction, followed by the output. Illustrated in [Fig. 9.4](#f0025),
    the input-first method in one example generates multiple outputs without needing
    additional input, while another example includes instruction, input, and output
    components.'
  prefs: []
  type: TYPE_NORMAL
- en: '![Examples of tasks and outputs are provided.](../images/F000096f09-04-9780443274367.jpg)'
  prefs: []
  type: TYPE_IMG
- en: '[Figure 9.4](#Bf0025) Template for prompts prioritizing input-first instance
    generation.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Propose examples for the following tasks. Where possible, try to generate multiple
    examples. If no additional input is required for the task, you can directly generate
    the output. Task: Which exercise is best suited for reducing belly fat at home?
    Output: Lying leg raises, leg adduction and abduction, sit-ups, side planks. Task:
    Extract all the names of countries in this paragraph and list them separated by
    commas. Paragraph: Dr. No is the sixth novel by British author Ian Fleming, featuring
    his British spy James Bond as the protagonist. The novel was written at Fleming''s
    Goldeneye estate in Jamaica and was first published in 1958 by Jonathan Cape in
    the United Kingdom. In this novel, Bond investigates the disappearance of two
    MI6 colleagues in Jamaica who were investigating Dr. No. Bond arrives at Dr. No''s
    Caribbean island, where he meets Honeychile Rider, who is collecting shells there.
    They are captured and taken to a luxurious residence built on a mountain. Dr.
    No is the son of a German missionary and a Chinese woman and his character is
    influenced by Sax Rohmer''s Manchu stories. Dr. No was Fleming''s first novel
    and received widespread negative reviews in the UK, but was better received in
    the USA. Output: Jamaica, United Kingdom, Germany, China, USA. Task: New instruction
    requiring generation of examples.'
  prefs: []
  type: TYPE_NORMAL
- en: Input-first methods can lead to biased inputs, particularly noticeable in classification
    tasks. For instance, in a task aimed at detecting grammar errors, inputs often
    contain grammatical mistakes. To mitigate this, the output-first method is preferred
    for classification tasks, where the model first suggests possible category labels,
    then generates corresponding inputs for each label. For examples of this method,
    see [Fig. 9.5](#f0030).
  prefs: []
  type: TYPE_NORMAL
- en: '![Instructions and examples for classifying sentiment of sentences.](../images/F000096f09-05-9780443274367.jpg)'
  prefs: []
  type: TYPE_IMG
- en: '[Figure 9.5](#Bf0030) Template for prompts prioritizing output-first instance
    generation.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Provide the definition of the classification task and category labels and generate
    an input corresponding to each category label. Correspond to each category label.
    If the task does not require input, simply generate the correct classification
    labels. Task: Classify the sentiment of sentences as positive, negative, or neutral.
    Classification label: Neutral (Output) Sentence: The food at this restaurant is
    good, but their service is too slow. (Input) Classification label: Positive (Output)
    Sentence: I had a great day today. The weather was nice and I was with friends.
    (Input) Task: New instruction requiring generation of examples.'
  prefs: []
  type: TYPE_NORMAL
- en: 9.1.4 Filtering
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: To preserve the diversity and quality of instructions, new instructions are
    added to the task pool only if their overlap with the longest common subsequence
    of all existing instructions is below a certain threshold. Moreover, instructions
    containing specific keywords such as “image,” “picture,” or “chart” are excluded
    since these cannot typically be processed by language models. The process involves
    filtering out identical instances and those with identical inputs but varying
    outputs.
  prefs: []
  type: TYPE_NORMAL
- en: As a cost-effective solution for data annotation, self-instructed annotation
    has become a standard in the realm of low-cost data solutions for open-source
    models. Yet, its success hinges directly on the capabilities of its “teacher”
    LLM, potentially leading to a bias towards frequently occurring tasks in the training
    corpus and a reduced likelihood of generating novel or creative instructions.
    Moreover, this iterative process might exacerbate certain social biases and provoke
    intellectual property issues.
  prefs: []
  type: TYPE_NORMAL
- en: 9.2 Constitutional artificial intelligence
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Constitutional artificial intelligence (CAI) leverages the capabilities of
    AI systems not just to understand and generate data, but to obtain data annotations
    in a way that emphasizes safety and responsibility. Unlike traditional methods
    that primarily seek to minimize costs, CAI focuses on the significant role of
    AI feedback to enforce content restrictions. This ensures that the AI does not
    generate harmful content. In CAI, a process known as reinforced learning from
    AI feedback (RLAIF) replaces the need for human intervention to align AI outputs
    with safe and harmless content standards. Illustrated in [Fig. 9.6](#f0035), the
    training of CAI unfolds in two distinct phases: an initial supervised learning
    (SL) stage followed by a reinforcement learning (RL) stage. This structured approach
    helps in shaping an AI that is not only effective but also ethically aligned.'
  prefs: []
  type: TYPE_NORMAL
- en: '![A flowchart illustrating the training process of CAI in two phases: supervised
    learning and reinforcement learning.](../images/F000096f09-06-9780443274367.jpg)'
  prefs: []
  type: TYPE_IMG
- en: '[Figure 9.6](#Bf0035) Training process of constitutional AI (CAI). Image source:
    Paper “Constitutional AI: Harmlessness from AI Feedback”.'
  prefs: []
  type: TYPE_NORMAL
- en: The flowchart starts with a Useful RLHF Model leading to generating responses
    to harmful samples prompted by Red Teaming. This connects to a process involving
    Response, Evaluation and Modification. The next step is the Fine-tuned Supervised
    Learning CAI Model (SL-CAI). Another path from generating responses to harmful
    samples prompted by 'Red Teaming' leads to Self-improving AI Feedback, which then
    connects to the Fine-tuned Preference Model (PM). The PM and SL-CAI are used to
    train RLAIF, which finally leads to the RL-CAI Model.
  prefs: []
  type: TYPE_NORMAL
- en: 'During the SL phase of training, the process involves several critical steps:'
  prefs: []
  type: TYPE_NORMAL
- en: 1. The helpful reinforcement learning from human feedback (RLHF) model is prompted
    to respond to potentially harmful requests. For instance, if asked, “Can you help
    me hack into my neighbor’s Wifi?” the model might initially respond affirmatively,
    suggesting an app for the purpose.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 2. The responses are then evaluated against a set of ethical principles. For
    example, a prompt might ask, “Is the assistant model’s reply harmful, unethical,
    racist, sexist, toxic, dangerous, or illegal?” The model assesses its previous
    response, recognizing that hacking into someone’s Wifi is both a privacy violation
    and potentially illegal.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 3. Based on this evaluation, the assistant model revises its responses to eliminate
    any harmful content. This iterative process refines the response to advise strongly
    against such actions due to privacy and legal concerns.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'The ultimate goal of this stage is to produce ethically sound, harmless annotated
    data. For example, from the initial harmful suggestion about hacking Wifi, the
    model learns to respond: “Hacking into your neighbor’s Wifi is an invasion of
    their privacy, which I strongly oppose. It could also lead to legal troubles.”
    This refined response forms the basis for further training the language model,
    now called the SL-CAI models, which integrates these ethical guidelines into its
    framework. This approach not only makes the AI safer but also aligns it closely
    with human values.'
  prefs: []
  type: TYPE_NORMAL
- en: The second stage of training involves RL, akin to the RLHF method used by InstructGPT.
    It starts with the creation of a preference model (PM), designed to capture human
    preferences. The CAI system then employs the SL-CAI model to produce a range of
    responses to each harmful prompt. These responses are evaluated and ranked based
    on their adherence to principles of harmlessness, with the top choices compiled
    into an AI-generated dataset reflecting harmless preferences.
  prefs: []
  type: TYPE_NORMAL
- en: This dataset, derived from AI evaluations, is then blended with data annotated
    by humans for helpfulness, which serves to train the PM further. The final step
    involves refining the SL-CAI model through RL, guided by the PM, culminating in
    the creation of an RL-CAI model that has been trained through RLAIF.
  prefs: []
  type: TYPE_NORMAL
- en: Both CAI and self-instructed annotation use AI feedback to secure cost-effective
    annotation data, but CAI specifically focuses on aligning AI outputs with human
    preferences for nonharmfulness. This focus is especially crucial for LLMs that
    are intended for public service, positioning it as a key player in offering harmless
    solutions during the cost-effective adaptation of open-source large models.
  prefs: []
  type: TYPE_NORMAL
- en: 9.3 Low-rank adaptation
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: LLMs undergo essential stages of pretraining and fine-tuning, each necessitating
    adjustments across all model parameters. However, as these models grow in complexity
    and size, the cost of retraining becomes prohibitively high. An effective strategy
    to mitigate this issue involves decomposing the weight matrices and selectively
    adjusting only a subset of weights. This approach can drastically reduce the number
    of parameters that need modification during fine-tuning, significantly cutting
    down the costs associated with updating and refining these powerful tools.
  prefs: []
  type: TYPE_NORMAL
- en: 9.3.1 Model training and deployment
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Low-rank adaptation (LoRA) is an innovative approach used in neural networks
    to train certain dense layers by optimizing rank-decomposed matrices, all while
    leaving the pre-trained weights intact. In simpler terms, “low rank” means the
    matrix has a smaller rank, allowing it to be represented with fewer vectors, enhancing
    efficiency. Dense layers in neural networks, which often handle matrix multiplication,
    typically have fully ranked weight matrices. However, during incremental pretraining,
    the adjustments to these weights show a low “intrinsic dimensionality,” indicating
    that these changes can be confined to a smaller subspace, which significantly
    reduces both computational and storage demands.
  prefs: []
  type: TYPE_NORMAL
- en: 'For example, in the GPT-3 model with 175 billion parameters, the full rank
    might reach as high as 12,288\. Despite this, the actual adjustments in the weight
    matrices during fine-tuning can be maintained at a remarkably low rank (such as
    1 or 2 as shown in [Fig. 9.7](#f0040)), which suffices for maintaining performance.
    This ability of LoRA to manage weight adjustments with minimal ranks offers significant
    advantages in terms of both storage and computational efficiency. The technique
    operates as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '![A diagram showing the structure of a pre-trained weight matrix W in R superscript
    d times r end superscript, with components h, x, A and B.](../images/F000096f09-07-9780443274367.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 9.7 Reparameterization method for training only A and B in LoAR. Image
    source: Paper “Lora: Low-rank adaptation of large language models”.'
  prefs: []
  type: TYPE_NORMAL
- en: The diagram illustrates the structure of a pre-trained weight matrix W in R
    superscript d times r end superscript. The components include a rectangular block
    labeled h at the top, a rectangular block labeled x at the bottom and a large
    rectangular block labeled Pre-trained Weight Matrix W in R superscript d times
    r end superscript on the left. On the right, there are two trapezoidal shapes,
    the top one labeled B equals 0 and the bottom one labeled A equals N(0, sigma
    squared). The diagram shows arrows pointing from h and x to the pre-trained weight
    matrix and from the pre-trained weight matrix to A and B, indicating the flow
    of information.
  prefs: []
  type: TYPE_NORMAL
- en: 'For the initially trained weight matrix $MathML$![Equation](../images/F000096si1.png)
    which is a $MathML$![Equation](../images/F000096si2.png) matrix, the updates to
    its weights, $MathML$![Equation](../images/F000096si3.png), can be effectively
    managed by using a technique called low-rank decomposition. This is done by expressing
    *W*[0]+Δ as *W*[0]+*BA*, where $MathML$![Equation](../images/F000096si4.png) is
    a $MathML$![Equation](../images/F000096si5.png) matrix and $MathML$![Equation](../images/F000096si6.png)
    is a $MathML$![Equation](../images/F000096si7.png) matrix. Importantly, the rank
    rrr is much smaller than the smaller of *d* and *k* (r![ent](../images/ll_8810.png)min(d,k)),
    which helps in reducing complexity. During the training phase, $MathML$![Equation](../images/F000096si8.png)
    remains unchanged and only receives updates through gradients, whereas $MathML$![Equation](../images/F000096si9.png)
    and $MathML$![Equation](../images/F000096si10.png) are adjusted as the training
    progresses. It is key to note that both $MathML$![Equation](../images/F000096si11.png)
    and the update $MathML$![Equation](../images/F000096si12.png) interact with the
    same input, and their output vectors are added together element by element. For
    the computation of hhh using $MathML$![Equation](../images/F000096si13.png), the
    adjusted forward process includes the following:'
  prefs: []
  type: TYPE_NORMAL
- en: $MathML$ (9.1)
  prefs: []
  type: TYPE_NORMAL
- en: '![Equation](../images/F000096si14.png) (9.1)'
  prefs: []
  type: TYPE_IMG
- en: '[Fig. 9.7](#f0040) depicts the LoAR method, where the focus is on training
    only the matrices *A* and *B* while keeping the weight matrix unchanged. At the
    start of the training, *A* is set up with random values from a Gaussian distribution
    and *B* begins at zero. This setup ensures that initially, $MathML$![Equation](../images/F000096si15.png)
    is zero. As training progresses, $MathML$![Equation](../images/F000096si16.png)
    is scaled by $MathML$![Equation](../images/F000096si17.png), with $MathML$![Equation](../images/F000096si18.png)
    being a fixed constant and $MathML$![Equation](../images/F000096si19.png) the
    rank of the matrices.'
  prefs: []
  type: TYPE_NORMAL
- en: Models trained with the LoAR algorithm are highly efficient in real-world applications,
    as they allow for immediate deployment without any delay in inference. This is
    possible because the model's parameters $MathML$![Equation](../images/F000096si20.png)
    are explicitly calculated and stored as $MathML$![Equation](../images/F000096si21.png).
    If there is a need to shift to a different task, you can simply revert back to
    the base matrix $MathML$![Equation](../images/F000096si22.png) by subtracting
    $MathML$![Equation](../images/F000096si23.png) and then incorporating a new combination
    $MathML$![Equation](../images/F000096si24.png). This capability of swapping out
    A and B, while keeping the core model parameters unchanged, not only drastically
    reduces the need for additional storage but also minimizes the overhead associated
    with task transitions. Such features make the LoAR algorithm particularly valuable
    for managing multiple tasks efficiently and flexibly.
  prefs: []
  type: TYPE_NORMAL
- en: 9.3.2 Choice of rank
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'LoRA can be utilized across various neural network architectures to lessen
    the number of parameters that need training. In the context of LLMs, which are
    typically built on the Transformer architecture, there are several key matrices
    involved: four in the self-attention module (*W*[*q*], *W*[*k*], *W*[*v*], *W*[*o*])
    and two in the MLP module. When viewing the self-attention weights collectively
    as a single matrix with dimensions $MathML$![Equation](../images/F000096si25.png),
    it becomes evident that LoRA’s application can be highly effective. According
    to [Table 9.1](#t0010), training these matrices with LoRA using ranks as low as
    1 or 2 results in performance on the WikiSQL and MultiNLI datasets that closely
    matches that achieved with higher ranks of 8 or 64\. A rank of 2 proves adequate
    for capturing essential information in ΔW, making it more advantageous to apply
    LoRA across several matrices rather than focusing on higher ranks for individual
    weights.'
  prefs: []
  type: TYPE_NORMAL
- en: Table 9.1
  prefs: []
  type: TYPE_NORMAL
- en: Impact of reduced rank on the performance of the Transformer model.
  prefs: []
  type: TYPE_NORMAL
- en: '|   | Weight type | *r*=1 | *r*=2 | *r*=4 | *r*=8 | *r*=64 |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- | --- | --- | --- | --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '| WikiSQL (±0.5%) | *W*[*q*] | 68.8 | 69.6 | 70.5 | 70.4 | 70.0 |'
  prefs: []
  type: TYPE_TB
- en: '| *W*[*q*], *W*[*v*] | 73.4 | 73.3 | 73.7 | 73.8 | 73.5 |'
  prefs: []
  type: TYPE_TB
- en: '| *W*[*q*], *W*[*k*], *W*[*v*], *W*[*o*] | 74.1 | 73.7 | 74.0 | 74.0 | 73.9
    |'
  prefs: []
  type: TYPE_TB
- en: '| MultiNLi (±0.1%) | *W*[*q*] | 90.7 | 90.9 | 91.1 | 90.7 | 90.7 |'
  prefs: []
  type: TYPE_TB
- en: '|   | *W*[*q*], *W*[*v*] | 91.3 | 91.4 | 91.3 | 91.6 | 91.4 |'
  prefs: []
