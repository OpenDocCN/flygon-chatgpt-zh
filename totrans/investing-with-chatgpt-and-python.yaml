  id: totrans-1300
  prefs: []
  type: TYPE_NORMAL
  zh: 安装 Python：
- en: sudo apt install python3.10 python3.10-venv python3.10-dev
  id: totrans-1301
  prefs: []
  type: TYPE_NORMAL
  zh: sudo apt install python3.10 python3.10-venv python3.10-dev
