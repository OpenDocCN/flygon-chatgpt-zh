- en: Preface
  id: totrans-27
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 前言
- en: Artificial intelligence is evolving at an unprecedented pace, and new breakthroughs
    continue to reshape the way we interact with technology. While OpenAI’s ChatGPT
    has dominated the AI space, a new contender has emerged—DeepSeek AI, an innovative
    and powerful language model that challenges the status quo.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能正在以前所未有的速度发展，新的突破不断重塑我们与技术互动的方式。尽管 OpenAI 的 ChatGpt 在人工智能领域占据主导地位，但一个新的竞争者已经出现——DeepSeek
    AI，这是一个创新且强大的语言模型，挑战了现状。
- en: 'This book, Mastering DeepSeek AI: Step-by-Step Guide to the ChatGPT Challenger,
    is designed to be your ultimate guide to understanding, comparing, and utilizing
    DeepSeek AI. Whether you’re an AI enthusiast, a researcher, or someone looking
    to harness AI for business or personal use, this book will provide the insights
    you need.'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 本书《掌握 DeepSeek AI：ChatGpt 挑战者的逐步指南》旨在成为您理解、比较和利用 DeepSeek AI 的终极指南。无论您是人工智能爱好者、研究人员，还是希望将人工智能用于商业或个人用途的人，本书都将为您提供所需的见解。
- en: We begin by exploring the DeepSeek phenomenon, discussing what makes it special,
    and uncovering the technology behind it. We then compare DeepSeek AI with ChatGPT,
    analyzing their strengths and weaknesses. For those eager to get hands-on experience,
    we provide step-by-step guides on using DeepSeek across different platforms, including
    mobile and desktop. Additionally, we delve into the DeepSeek-R1 model, its open-source
    nature, and the impact of DeepSeek on the global AI industry.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 我们首先探讨 DeepSeek 现象，讨论其独特之处，并揭示其背后的技术。然后，我们将 DeepSeek AI 与 ChatGpt 进行比较，分析它们的优缺点。对于那些渴望获得实践经验的人，我们提供了在不同平台（包括移动和桌面）上使用
    DeepSeek 的逐步指南。此外，我们还深入探讨了 DeepSeek-R1 模型、其开源性质以及 DeepSeek 对全球人工智能产业的影响。
- en: As China continues to invest heavily in artificial intelligence, DeepSeek AI
    represents a significant milestone in the country’s AI revolution. We examine
    its implications for the tech industry, global competition, and the future of
    AI development.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 随着中国继续在人工智能领域大量投资，DeepSeek AI 代表了该国人工智能革命的一个重要里程碑。我们探讨了其对科技行业、全球竞争和人工智能发展未来的影响。
- en: By the end of this book, you will have a deep understanding of DeepSeek AI and
    its capabilities. More importantly, you will be equipped with the knowledge to
    integrate it into your workflows, enhance your AI-driven projects, and stay ahead
    in this rapidly evolving field.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 到这本书的结尾，你将深入理解 DeepSeek AI 及其功能。更重要的是，你将具备将 DeepSeek 集成到你的工作流程中、增强你的 AI 驱动的项目并在这个快速发展的领域中保持领先的知识。
- en: Let’s embark on this journey into the world of DeepSeek AI and discover what
    the future of artificial intelligence holds.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们开始这段探索 DeepSeek AI 世界之旅，发现人工智能的未来将有何等前景。
- en: — [Dr. Wasim Akram Mandal]
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: — [瓦西姆·阿克拉姆·曼达尔博士]
