- en: '|  **Signif. codes** |  **0 ‘***’** |  **0.001 ‘**’** |  **0.01 ‘*’** |  **0.05
    ‘.’** |  **0.1 ‘ ’** |'
  id: totrans-2640
  prefs: []
  type: TYPE_TB
