- en: Glossary of Terms
  id: totrans-611
  prefs: []
  type: TYPE_NORMAL
  zh: 术语表
- en: 'Artificial Intelligence (AI): The simulation of human intelligence processes
    by machines, especially computer systems. These processes include learning, reasoning,
    and self-correction.'
  id: totrans-612
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能（AI）：通过机器模拟人类智能过程的系统，特别是计算机系统。这些过程包括学习、推理和自我校正。
- en: 'Machine Learning (ML): A subset of AI that involves the study of computer algorithms
    that improve automatically through experience.'
  id: totrans-613
  prefs: []
  type: TYPE_NORMAL
  zh: 机器学习（ML）：人工智能的一个子集，涉及研究计算机算法，这些算法通过经验自动改进。
- en: 'Natural Language Processing (NLP): A branch of AI that gives machines the ability
    to read, understand, and derive meaning from human languages.'
  id: totrans-614
  prefs: []
  type: TYPE_NORMAL
  zh: 自然语言处理（NLP）：人工智能的一个分支，赋予机器阅读、理解和从人类语言中提取意义的能力。
- en: 'Neural Networks: A series of algorithms that attempt to recognize underlying
    relationships in a set of data through a process that mimics the way the human
    brain operates.'
  id: totrans-615
  prefs: []
  type: TYPE_NORMAL
  zh: 神经网络：一系列算法，通过模拟人脑运作的方式，试图在数据集中识别潜在的关联关系。
- en: 'Deep Learning: A subset of machine learning in artificial neural networks that
    has networks capable of learning unsupervised from data that is unstructured or
    unlabeled.'
  id: totrans-616
  prefs: []
  type: TYPE_NORMAL
  zh: 深度学习：人工神经网络中机器学习的一个子集，其网络能够从非结构化或未标记的数据中无监督地学习。
- en: 'API (Application Programming Interface): A set of rules and definitions for
    building and integrating application software, allowing programs to communicate
    with each other.'
  id: totrans-617
  prefs: []
  type: TYPE_NORMAL
  zh: API（应用程序编程接口）：构建和集成应用程序软件的一组规则和定义，允许程序相互通信。
