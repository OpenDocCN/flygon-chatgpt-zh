  id: totrans-581
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 当前项目：
- en: 'Goals:'
  id: totrans-582
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 目标：
- en: How would you like ChatGPT to respond?
  id: totrans-583
  prefs: []
  type: TYPE_NORMAL
  zh: 您希望ChatGPT如何回应？
- en: 'Tone and Formality:'
  id: totrans-584
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 语气和正式程度：
- en: 'Level of Detail:'
  id: totrans-585
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 详细程度：
- en: 'Types of Suggestions:'
  id: totrans-586
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 建议类型：
- en: 'Resources References:'
  id: totrans-587
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 资源引用：
- en: 'Bias Awareness:'
  id: totrans-588
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 偏见意识：
- en: Language Preferences
  id: totrans-589
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 语言偏好
- en: Custom Instructions are accessible via the sidebar menu in the bottom left corner
    of the ChatGPT interface. When you click on your name, you will see a Customize
    ChatGPT button.
  id: totrans-590
  prefs: []
  type: TYPE_NORMAL
  zh: 自定义指令可通过ChatGPT界面左下角的侧边栏菜单访问。当您点击您的名字时，您将看到一个自定义ChatGPT按钮。
- en: Creating Custom Instructions Personas
  id: totrans-591
  prefs: []
  type: TYPE_NORMAL
  zh: 创建自定义指令角色
- en: If you want to use ChatGPT to its fullest, I suggest creating custom instructions
    personas. These personas are predefined sets of instructions tailored to specific
    roles, scenarios, or objectives, encapsulating the essence of how individuals
    in these contexts wish ChatGPT to respond. Creating and applying such personas
    can immensely benefit you by streamlining your interactions with ChatGPT, ensuring
    consistency in responses, and saving significant time.
  id: totrans-592
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想充分发挥ChatGPT的潜力，我建议创建定制的指令角色。这些角色是针对特定角色、场景或目标预定义的指令集合，封装了在这些情境中个人希望ChatGPT如何响应的精髓。创建和应用这些角色可以极大地帮助你，通过简化与ChatGPT的互动，确保响应的一致性，并节省大量时间。
- en: Why is this approach so effective? For starters, different scenarios often require
    distinct types of information, tones, and details. A researcher looking for in-depth
    analysis will have different needs than a fiction writer seeking creative inspiration.
    By defining personas based on these unique requirements, you can quickly apply
    a set of custom instructions that align with your current task without the need
    to specify your preferences anew each time.
  id: totrans-593
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么这种方法如此有效？首先，不同的场景通常需要不同类型的信息、语气和细节。一个寻求深入分析的研究者与寻求创意灵感的小说家将有不同的需求。通过根据这些独特需求定义角色，你可以快速应用一组与当前任务相匹配的定制指令，而无需每次都重新指定你的偏好。
- en: Moreover, personas can help maintain consistent quality and relevance in the
    responses received. Whether it's a marketing strategist needing insights with
    specific jargon or a software developer seeking technical solutions, personas
    ensure that the language, examples, and resources provided by ChatGPT match the
    user's expertise level and expectations. This alignment not only enhances the
    efficiency of the interaction but also reduces the cognitive load on the user,
    making the experience more intuitive and satisfying.
  id: totrans-594
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，角色可以帮助保持收到的响应的一致质量和相关性。无论是需要特定术语的营销策略家还是寻求技术解决方案的软件开发者，角色确保ChatGPT提供的语言、示例和资源与用户的专长水平和期望相匹配。这种一致性不仅提高了互动的效率，还减少了用户的认知负荷，使体验更加直观和满意。
- en: Additionally, for teams or individuals juggling multiple projects or roles,
    personas can act as a switchboard, enabling them to shift gears seamlessly between
    different types of inquiries. This versatility is particularly valuable in professional
    settings where time is of the essence, and the ability to quickly obtain tailored
    advice or information can be a game-changer.
  id: totrans-595
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，对于同时处理多个项目或角色的团队或个人，角色可以作为交换台，使他们能够在不同类型的查询之间无缝切换。这种多功能性在专业环境中尤其有价值，因为时间至关重要，能够快速获得定制建议或信息可能是一次变革。
- en: Below is a template for a Human Resources Manager Persona already filled in.
    Feel free to use it as is or to make any changes according to your needs.
  id: totrans-596
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是一个已填写完毕的人力资源经理角色模板。请随意使用它，或者根据你的需求进行任何修改。
- en: Template for a Human Resources Manager Persona
  id: totrans-597
  prefs: []
  type: TYPE_NORMAL
  zh: 人力资源经理角色模板
- en: What would you like ChatGPT to know about you to provide better responses?
  id: totrans-598
  prefs: []
  type: TYPE_NORMAL
  zh: 你希望ChatGPT了解哪些关于你的信息，以便提供更好的响应？
- en: 'Profession/Role: Human Resources Manager'
  id: totrans-599
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 职业/角色：人力资源经理
- en: 'Key Responsibilities: Recruiting, onboarding, employee relations, policy formulation.'
  id: totrans-600
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 主要职责：招聘、入职、员工关系、政策制定。
- en: 'Knowledge or Expertise: Employment law, performance management systems, employee
    engagement strategies.'
  id: totrans-601
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 知识或专长：雇佣法、绩效管理系统、员工参与策略。
- en: 'Typical Challenges: Enhancing company culture, managing remote work policies,
    and resolving conflicts.'
  id: totrans-602
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 典型挑战：提升公司文化、管理远程工作政策以及解决冲突。
- en: 'Current Projects: Implementing a new employee performance review system.'
  id: totrans-603
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当前项目：实施新的员工绩效评估系统。
- en: 'Jargon or Terminology: [List relevant HR terminologies, e.g., EEO, L&D, Employee
    Retention].'
  id: totrans-604
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 行话或术语：[列出相关的HR术语，例如EEO、L&D、员工保留]。
- en: 'Goals and Objectives: Improve employee satisfaction and streamline recruitment
    processes.'
  id: totrans-605
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 目标和目标：提高员工满意度和简化招聘流程。
- en: 'Interactions: Works closely with department heads, employees, and external
    recruitment agencies.'
  id: totrans-606
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 互动：与部门负责人、员工和外部招聘机构紧密合作。
- en: How would you like ChatGPT to respond?
  id: totrans-607
  prefs: []
  type: TYPE_NORMAL
  zh: 你希望ChatGPT如何响应？
- en: 'Tone and Formality: Professional and empathetic.'
  id: totrans-608
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 语气和正式程度：专业且富有同情心。
- en: 'Level of Detail: Broad overviews followed by detailed action plans.'
  id: totrans-609
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 详细程度：先提供广泛的概述，然后是详细的行动计划。
- en: 'Preferred References: Case studies of successful HR practices and the latest
    trends in workplace management.'
  id: totrans-610
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 偏好参考文献：成功的人力资源实践案例研究和最新工作场所管理趋势。
- en: 'Avoidance of Ambiguity: Clear guidelines and actionable HR strategies.'
  id: totrans-611
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 避免歧义：明确的指南和可操作的HR策略。
- en: 'Resource Links: Trusted sources on HR best practices, legal updates, and professional
    development.'
  id: totrans-612
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 资源链接：关于人力资源最佳实践、法律更新和专业发展的可信来源。
- en: 'Follow-Up Questions: Offers to delve deeper into specific HR challenges or
    project details.'
  id: totrans-613
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 跟进问题：提供深入了解特定人力资源挑战或项目细节的机会。
- en: 'Bias Awareness: Ensure recommendations avoid any hiring biases.'
  id: totrans-614
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 偏见意识：确保推荐避免任何招聘偏见。
- en: 'Exercise: Crafting Your Custom Instructions Persona'
  id: totrans-615
  prefs: []
  type: TYPE_NORMAL
  zh: 练习：构建您的自定义指令角色
- en: I encourage you to unleash your creativity by crafting your own Custom Instructions
    Personas and tailoring ChatGPT to meet your unique needs and objectives.
  id: totrans-616
  prefs: []
  type: TYPE_NORMAL
  zh: 我鼓励您通过构建自己的自定义指令角色并调整ChatGPT以满足您独特的需求和目标来发挥您的创造力。
- en: 'Objective: To create a persona for custom instructions tailored to your specific
    needs, enhancing your interaction with ChatGPT. This exercise will guide you through
    defining a persona and using it to direct ChatGPT''s responses more effectively.'
  id: totrans-617
  prefs: []
  type: TYPE_NORMAL
  zh: 目标：创建一个针对您特定需求的自定义指令角色，以增强您与ChatGPT的互动。这个练习将指导您定义一个角色，并使用它更有效地指导ChatGPT的响应。
- en: 'Step 1: Identify Your Scenario. Choose a scenario in which you frequently use
    ChatGPT. It could be related to your profession, a hobby, or a project you''re
    working on. For example, a scenario could involve "researching historical events
    for writing a novel."'
  id: totrans-618
  prefs: []
  type: TYPE_NORMAL
  zh: 第1步：确定您的场景。选择一个您经常使用ChatGPT的场景。这可能与您的职业、爱好或您正在进行的某个项目相关。例如，一个场景可能涉及“为撰写小说研究历史事件。”
- en: 'Step 2: Define the Persona. Based on your chosen scenario, outline the persona
    by answering the following questions:'
  id: totrans-619
  prefs: []
  type: TYPE_NORMAL
  zh: 第2步：定义角色。根据您选择的场景，通过回答以下问题来概述角色：
- en: 'Profession/Role: What is your role in this scenario? (e.g., Novelist)'
  id: totrans-620
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 职业/角色：在这个场景中您的角色是什么？（例如，小说家）
- en: 'Key Responsibilities: What are your main tasks or goals? (e.g., To gather accurate
    historical information)'
  id: totrans-621
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 主要职责：您的核心任务或目标是什么？（例如，收集准确的历史信息）
- en: 'Knowledge or Expertise: What level of knowledge do you have, and what areas
    are you interested in? (e.g., Intermediate, focused on medieval Europe)'
  id: totrans-622
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 知识或专长：您具备什么水平的知识，您对哪些领域感兴趣？（例如，中级，专注于中世纪欧洲）
- en: 'Typical Challenges: What challenges do you often face in this scenario? (e.g.,
    Finding reliable sources)'
  id: totrans-623
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 典型挑战：在这个场景中您经常面临哪些挑战？（例如，寻找可靠的来源）
- en: 'Goals and Objectives: What do you want to achieve? (e.g., Enhance the historical
    accuracy of my novel)'
  id: totrans-624
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 目标和目标：您想实现什么？（例如，提高我小说的历史准确性）
- en: 'Preferences: Any specific preferences for the tone, detail level, or types
    of responses? (e.g., Detailed responses with sources)'
  id: totrans-625
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 偏好：对语气、详细程度或响应类型有特定的偏好吗？（例如，带有来源的详细响应）
- en: 'Other information: Any other information you think could be relevant. Go back
    to the previous sections for guidance.'
  id: totrans-626
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 其他信息：您认为可能相关的其他信息。请回到前面的部分以获取指导。
- en: 'Step 3: Craft Your Custom Instructions. Using the persona defined, craft a
    set of custom instructions for ChatGPT that encapsulates all the aspects you outlined.
    Ensure it''s clear, concise, and directly related to your scenario.'
  id: totrans-627
  prefs: []
  type: TYPE_NORMAL
  zh: 第3步：构建您的自定义指令。使用定义的角色，为ChatGPT构建一套自定义指令，涵盖您概述的所有方面。确保它清晰、简洁，并且与您的场景直接相关。
- en: 'Step 4: Test and Compare'
  id: totrans-628
  prefs: []
  type: TYPE_NORMAL
  zh: 第4步：测试和比较
- en: 'Without Instructions: First, ask ChatGPT a question related to your scenario
    without providing any custom instructions.'
  id: totrans-629
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 无指令：首先，就与您的场景相关的问题向ChatGPT提问，但不提供任何自定义指令。
- en: 'With Instructions: Repeat the same question, but this time include the custom
    instructions you crafted.'
  id: totrans-630
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 有指令：重复相同的问题，但这次包括您构建的自定义指令。
- en: 'Step 5: Reflect and Refine. Compare the responses from ChatGPT with and without
    the custom instructions. Reflect on how the persona-based instructions influenced
    the relevance, accuracy, and usefulness of ChatGPT''s responses. Use this insight
    to refine your custom instructions further.'
  id: totrans-631
  prefs: []
  type: TYPE_NORMAL
  zh: 第5步：反思和改进。比较带有和没有自定义指令的ChatGPT的响应。反思基于角色的指令如何影响了ChatGPT响应的相关性、准确性和实用性。利用这些见解进一步改进您的自定义指令。
- en: This exercise is a practical step towards mastering the use of custom instructions
    with ChatGPT. By comparing the responses, you'll see firsthand the impact well-crafted
    instructions can have on the quality of interaction. It showcases the power of
    personalization and how it can be used to meet your needs more effectively. Don't
    hesitate to iterate on your persona and instructions based on your findings to
    enhance future interactions.
  id: totrans-632
  prefs: []
  type: TYPE_NORMAL
  zh: 这个练习是掌握使用ChatGPT定制指令的实用步骤。通过比较响应，你将亲眼看到精心设计的指令对交互质量的影响。它展示了个性化的力量以及如何更有效地满足你的需求。不要犹豫，根据你的发现迭代你的角色和指令，以增强未来的交互。
- en: Key Takeaways from Chapter 8
  id: totrans-633
  prefs: []
  type: TYPE_NORMAL
  zh: 第8章的关键要点
- en: Tailoring ChatGPT's responses through custom instructions significantly improves
    the AI's outputs' relevance, accuracy, and personalization, making interactions
    more effective and aligned with your specific needs.
  id: totrans-634
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过定制指令调整ChatGPT的响应，显著提高了AI输出的相关性、准确性和个性化，使交互更加有效，并与你的具体需求保持一致。
- en: Sharing relevant background information about your profession, role, knowledge
    level, and challenges enables ChatGPT to tailor its responses more precisely,
    ensuring they directly apply to your situation.
  id: totrans-635
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 分享关于你的职业、角色、知识水平和挑战的相关背景信息，使ChatGPT能够更精确地定制其响应，确保它们直接适用于你的情况。
- en: Clearly defining how you want ChatGPT to respond, including tone, detail level,
    and format, guides the AI to meet your expectations in the output, enhancing the
    usefulness of the information provided.
  id: totrans-636
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 明确定义你希望ChatGPT如何响应，包括语气、细节水平和格式，指导AI满足你对输出的期望，增强提供信息的实用性。
- en: Using templates to structure custom instructions ensures a comprehensive approach,
    covering all necessary aspects to inform ChatGPT about your preferences and requirements
    effectively.
  id: totrans-637
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用模板来构建定制指令确保了一种全面的方法，涵盖了告知ChatGPT你的偏好和需求的所有必要方面。
- en: Developing custom instruction personas for different scenarios or roles streamlines
    the process of customizing interactions, saving time and ensuring consistency
    in the AI's responses across various contexts.
  id: totrans-638
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为不同场景或角色开发定制的指令角色可以简化定制交互的过程，节省时间并确保AI在不同情境下的响应一致性。
- en: Crafting effective custom instructions is an iterative process that may require
    adjustments based on the responses received. Continuously refining your instructions
    based on outcomes enhances future interactions.
  id: totrans-639
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 设计有效的定制指令是一个迭代的过程，可能需要根据收到的响应进行调整。根据结果持续优化你的指令可以增强未来的交互。
- en: Engaging with exercises, such as crafting your custom instructions persona,
    provides practical experience using the feature and demonstrates the tangible
    benefits of personalized AI interactions.
  id: totrans-640
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过参与如定制指令角色这样的练习，可以获得使用该功能的实际经验，并展示了个性化AI交互的切实利益。
- en: 'Chapter 9: Custom GPTs'
  id: totrans-641
  prefs: []
  type: TYPE_NORMAL
  zh: 第9章：定制GPT
- en: Introduction to Custom GPTs
  id: totrans-642
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 定制GPT简介
- en: Custom GPTs are specialized versions of ChatGPT tailored to perform specific
    tasks or understand particular domains with exceptional accuracy. Unlike their
    general-purpose counterparts, Custom GPTs are fine-tuned with targeted data, instructions,
    and objectives, making them highly effective for unique applications. Whether
    it's generating industry-specific content or solving niche problems, Custom GPTs
    provide personalized AI solutions. These models empower you to harness the power
    of advanced AI technology, adapting it to your specific needs and challenges,
    thus enabling more precise, efficient, and relevant outcomes across various fields
    and interests.
  id: totrans-643
  prefs: []
  type: TYPE_NORMAL
  zh: 定制GPT是针对特定任务或以卓越的准确性理解特定领域的ChatGPT的专用版本。与通用目的的对应版本不同，定制GPT通过目标数据、指令和目标进行微调，使其在独特应用中非常有效。无论是生成行业特定内容还是解决利基问题，定制GPT提供个性化的AI解决方案。这些模型使你能够利用先进AI技术的力量，根据你的具体需求和挑战进行适应，从而在各个领域和兴趣点上实现更精确、高效和相关的结果。
- en: What sets Custom GPTs apart is their accessibility. If you have a GPT Plus subscription
    (ChatGPT-4), diving into the world of Custom GPTs is straightforward. And creating
    your own customized model isn't just for tech experts but it's designed to be
    approachable for anyone. I'll show you exactly how to do that in this chapter.
  id: totrans-644
  prefs: []
  type: TYPE_NORMAL
  zh: 区分定制GPT的特点在于其易用性。如果你拥有GPT Plus订阅（ChatGPT-4），进入定制GPT的世界将非常简单。而且创建自己的定制模型不仅限于技术专家，它旨在让任何人都能接触。在本章中，我将向你展示如何做到这一点。
- en: The GPTs Store serves as your portal to explore these personalized AI solutions.
    This marketplace is teeming with a variety of Custom GPTs, each developed with
    particular skills and knowledge areas. Whether you're after an assistant who can
    help you with creative writing or coding, the GPTs Store is where you'll find
    your perfect AI match. I encourage you to take a look at it and consider how a
    Custom GPT could be integrated into your work or hobbies. It's an opportunity
    to leverage the latest in AI technology in a way that's directly relevant and
    beneficial to you.
  id: totrans-645
  prefs: []
  type: TYPE_NORMAL
  zh: GPT 商店是你的门户，用于探索这些个性化的 AI 解决方案。这个市场充满了各种自定义 GPT，每个都针对特定的技能和知识领域进行了开发。无论你是需要一个能帮助你进行创意写作或编码的助手，还是在
    GPT 商店中找到你的完美 AI 匹配，你都会在这里找到。我鼓励你看看它，并考虑如何将自定义 GPT 集成到你的工作或爱好中。这是一个利用最新 AI 技术直接相关且对你有益的机会。
- en: In the next section, we'll explore two methods for creating your Custom GPT.
    Whatever your purpose, I'll guide you through the steps to bring your custom AI
    to life.
  id: totrans-646
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一节中，我们将探讨创建自定义 GPT 的两种方法。无论你的目的是什么，我都会引导你完成步骤，让你的自定义 AI 生命化。
- en: Creating Your Custom GPT
  id: totrans-647
  prefs: []
  type: TYPE_NORMAL
  zh: 创建你的自定义 GPT
- en: Creating your own Custom GPT might sound daunting at first, but with the right
    guidance, it's a straightforward process that opens up a world of possibilities.
    Let's break down a beginner-friendly method that leverages the GPT builder interface
    and a more advanced one. Trust me when I say that anyone, regardless of their
    technical background, can craft a Custom GPT tailored to their needs. You'll also
    have the option to share your GPTs with the world by making them publicly available
    in the GPT store.
  id: totrans-648
  prefs: []
  type: TYPE_NORMAL
  zh: 创造你自己的自定义 GPT 可能一开始会让人觉得有些令人畏惧，但有了正确的指导，这是一个简单直接的过程，为你打开了一个充满可能性的世界。让我们分解一个适合初学者的方法，它利用了
    GPT 构建器界面，以及一个更高级的方法。请相信我，无论你的技术背景如何，任何人都可以根据他们的需求定制一个自定义 GPT。你还可以选择通过在 GPT 商店中公开它们来与世界分享你的
    GPT。
- en: Beginner Friendly Method
  id: totrans-649
  prefs: []
  type: TYPE_NORMAL
  zh: 适合初学者的方法
- en: 'Step 1: Explore GPTs'
  id: totrans-650
  prefs: []
  type: TYPE_NORMAL
  zh: 第 1 步：探索 GPT
- en: Log into your ChatGPT-4 platform and navigate to the "Explore GPTs" section
    in the sidebar menu. This area showcases a variety of pre-built models, offering
    a glimpse into the potential applications of Custom GPTs.
  id: totrans-651
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 登录你的 ChatGPT-4 平台，并在侧边栏菜单中导航到“探索 GPT”部分。这个区域展示了各种预构建模型，让你一窥自定义 GPT 的潜在应用。
- en: 'Step 2: Create a GPT'
  id: totrans-652
  prefs: []
  type: TYPE_NORMAL
  zh: 第 2 步：创建 GPT
- en: Look for the "Create a GPT" button. Clicking this takes you to the GPT builder
    interface, a user-friendly environment where your custom AI journey starts. Here,
    you're not alone; the GPT builder is designed to walk you through each step, ensuring
    a smooth creation process.
  id: totrans-653
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 寻找“创建 GPT”按钮。点击此按钮将带你进入 GPT 构建器界面，这是一个用户友好的环境，你的自定义 AI 之旅从这里开始。在这里，你并不孤单；GPT
    构建器旨在引导你完成每个步骤，确保创建过程顺利。
- en: 'Step 3: Talk to the GPT Builder'
  id: totrans-654
  prefs: []
  type: TYPE_NORMAL
  zh: 第 3 步：与 GPT 构建器对话
- en: The GPT builder acts as your guide. It simplifies the customization process
    by asking you questions and providing suggestions, helping you make informed decisions
    about your Custom GPT's capabilities and functions. The GPT builder will start
    creating your GPT as you answer its questions.
  id: totrans-655
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: GPT 构建器充当你的向导。通过提问和建议简化了定制过程，帮助你做出关于你的自定义 GPT 能力和功能的明智决定。当你回答它的问题时，GPT 构建器将开始创建你的
    GPT。
- en: More advance method
  id: totrans-656
  prefs: []
  type: TYPE_NORMAL
  zh: 更高级的方法
- en: 'Step 4: Dive into Configuration'
  id: totrans-657
  prefs: []
  type: TYPE_NORMAL
  zh: 第 4 步：深入配置
- en: For a truly tailored experience, navigate to the "Configure" tab within the
    GPT builder. This is where the magic happens. Configuration allows you to set
    the parameters that define your Custom GPT's behavior and capabilities.
  id: totrans-658
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为了获得真正定制化的体验，请在 GPT 构建器中导航到“配置”标签页。这里就是魔法发生的地方。配置允许你设置定义你的自定义 GPT 行为和能力的参数。
- en: 'Step 5: Fill in the Details'
  id: totrans-659
  prefs: []
  type: TYPE_NORMAL
  zh: 第 5 步：填写详细信息
- en: In the "Configure" section, you'll find fields to input the "Name," "Description,"
    and, most importantly, "Instructions" for your Custom GPT. The name and description
    help you and others understand the purpose and scope of your Custom GPT at a glance.
    However, it's the instructions that are crucial. They act as the guiding principles
    for your Custom GPT, determining how it interprets and responds to prompts.
  id: totrans-660
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在“配置”部分，你可以找到输入自定义 GPT 的“名称”、“描述”和最重要的“指令”的字段。名称和描述帮助你和其他人一眼就能理解自定义 GPT 的目的和范围。然而，指令才是关键。它们作为你的自定义
    GPT 的指导原则，决定了它如何解释和回应提示。
- en: 'Name: Choose a name that reflects the function or the area of expertise of
    your Custom GPT.'
  id: totrans-661
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 名称：选择一个反映你的自定义 GPT 功能或专业领域的名称。
- en: 'Description: Provide a concise description that outlines what your Custom GPT
    is designed to do.'
  id: totrans-662
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 描述：提供一个简洁的描述，概述你的自定义GPT旨在做什么。
- en: 'Instructions: This is where precision is key. The more detailed and specific
    your instructions, the more accurate and relevant your Custom GPT''s outputs will
    be. Think of this as teaching your GPT exactly how you want it to perform its
    tasks.'
  id: totrans-663
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 说明：这是精确性的关键所在。你的说明越详细、越具体，你的自定义GPT的输出就越准确、越相关。把这看作是教你的GPT按照你希望的方式执行任务。
- en: 'Step 6: Uploading Knowledge Files'
  id: totrans-664
  prefs: []
  type: TYPE_NORMAL
  zh: 第6步：上传知识文件
- en: Knowledge files equip your GPT with a rich base of content to draw from, ensuring
    the material it creates is well-informed and reliable. Think subject-specific
    text and documents, FAQs, policy documents, guidelines, *etc.*
  id: totrans-665
  prefs: []
  type: TYPE_NORMAL
  zh: 知识文件为你的GPT提供丰富的内容基础，确保其创建的内容信息丰富且可靠。考虑特定主题的文本和文档、常见问题解答、政策文件、指南等*等*。
- en: 'Step 7: Setting Conversation Starters'
  id: totrans-666
  prefs: []
  type: TYPE_NORMAL
  zh: 第7步：设置对话起始点
- en: Conversation starters are your way of pre-defining how interactions with your
    GPT might begin. They should be brief, direct prompts that initiate specific interactions
    or guide the GPT toward desired dialogue paths.
  id: totrans-667
  prefs: []
  type: TYPE_NORMAL
  zh: 对话起始点是预先定义与你的GPT交互方式的方式。它们应该是简短、直接的提示，以启动特定的交互或引导GPT走向期望的对话路径。
- en: 'Step 8: Enabling Capabilities'
  id: totrans-668
  prefs: []
  type: TYPE_NORMAL
  zh: 第8步：启用功能
- en: Here, you can enable web browsing, DALL-E image generation, and code interpreter
    for your GPT.
  id: totrans-669
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，你可以为你的GPT启用网络浏览、DALL-E图像生成和代码解释器。
- en: 'Step 9: Saving your GPT'
  id: totrans-670
  prefs: []
  type: TYPE_NORMAL
  zh: 第9步：保存你的GPT
- en: 'Once finished, you will have three options for saving your GPT: Publish to
    Only me, Publish to Only people with a link, and Public (available for everyone
    in the GPT Store).'
  id: totrans-671
  prefs: []
  type: TYPE_NORMAL
  zh: 完成后，你将有三种保存你的GPT的方式：仅对我公开、仅对有链接的人公开和公开（GPT商店中所有人可见）。
- en: 'Step 10: Testing and Refinement'
  id: totrans-672
  prefs: []
  type: TYPE_NORMAL
  zh: 第10步：测试和优化
- en: The creation of your GPT is just the beginning. Testing its outputs and refining
    its configuration based on real-world performance is crucial for achieving the
    desired results.
  id: totrans-673
  prefs: []
  type: TYPE_NORMAL
  zh: 创建你的GPT只是开始。根据实际表现测试其输出并优化其配置对于实现预期结果至关重要。
- en: Why Instructions Matter
  id: totrans-674
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么说明很重要
- en: As you already know, being specific with ChatGPT is key. By meticulously filling
    out the instructions, you're essentially programming your Custom GPT to understand
    its purpose and how best to serve your needs.
  id: totrans-675
  prefs: []
  type: TYPE_NORMAL
  zh: 如你所知，与ChatGPT的明确性至关重要。通过仔细填写说明，你实际上是在编程你的自定义GPT，使其理解其目的以及如何最好地满足你的需求。
- en: In the following section, we will build together EduContent Creator, a GPT specializing
    in crafting educational content. I'll share a complete set of custom instructions
    tailored for the EduContent Creator GPT. This example will serve as a foundation
    that you can customize according to your specific needs, offering a practical
    starting point to dive into the advanced customization of GPTs.
  id: totrans-676
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一节中，我们将一起构建EduContent Creator，这是一个专注于制作教育内容的GPT。我将分享一套为EduContent Creator
    GPT量身定制的自定义指令。这个例子将作为一个基础，你可以根据你的具体需求进行定制，为你提供一个实用的起点，以便深入了解GPT的高级定制。
- en: Finally, in the last section of this chapter, I will provide an accurate ChatGPT
    prompt designed to help you generate a set of instructions for building your own
    GPTs. This will empower you to harness ChatGPT's full capabilities for any project
    you have in mind, ensuring you have all the tools necessary to create a GPT that
    meets your exact requirements.
  id: totrans-677
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，在本章的最后部分，我将提供一个准确的ChatGPT提示，旨在帮助你生成一组构建你自己的GPT的说明。这将使你能够利用ChatGPT的全部能力来完成任何项目，确保你拥有创建满足你确切要求的GPT所需的所有工具。
- en: Building EduContent Creator GPT together
  id: totrans-678
  prefs: []
  type: TYPE_NORMAL
  zh: 一起构建EduContent Creator GPT
- en: 'Step 1: Define Your GPT''s Identity'
  id: totrans-679
  prefs: []
  type: TYPE_NORMAL
  zh: 第1步：定义你的GPT身份
- en: 'Name: "EduContent Creator"'
  id: totrans-680
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 名称：“EduContent Creator”
- en: 'Description: This GPT specializes in crafting educational content that is engaging
    and informative, tailored to a variety of subjects and learning levels.'
  id: totrans-681
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 描述：这个GPT专注于制作引人入胜且信息丰富的教育内容，针对各种主题和学习水平。
- en: 'Step 2: Crafting Detailed Instructions'
  id: totrans-682
  prefs: []
  type: TYPE_NORMAL
  zh: 第2步：制定详细说明
- en: The cornerstone of your GPT's effectiveness lies in its instructions. This is
    the most crucial part of the GPT configuration, where "the more precise the input,
    the more precise the output." For the EduContent Creator, your instructions might
    outline the need for accuracy, adherence to educational standards, and incorporating
    engaging elements to foster learning.
  id: totrans-683
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 您 GPT 效果的基础在于其指令。这是 GPT 配置中最关键的部分，“输入越精确，输出越精确”。对于 EduContent Creator，您的指令可能概述了准确性、遵守教育标准和融入吸引人的元素以促进学习的需求。
- en: 'Step 3: Setting Conversation Starters'
  id: totrans-684
  prefs: []
  type: TYPE_NORMAL
  zh: 第 3 步：设置对话启动点
- en: Conversation starters are your way of pre-defining how interactions with your
    GPT might begin. Examples for EduContent Creator could include "Create a quiz
    on photosynthesis for high school students" and "Outline a lesson plan for beginner's
    Spanish."
  id: totrans-685
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对话启动点是您预先定义与您的 GPT 交互开始方式的方法。对于 EduContent Creator 的例子可能包括“为高中生创建关于光合作用的测验”和“概述初学者西班牙语的课程计划”。
- en: 'Step 4: Uploading Knowledge Files'
  id: totrans-686
  prefs: []
  type: TYPE_NORMAL
  zh: 第 4 步：上传知识文件
- en: Knowledge files equip your GPT with a rich base of content to draw from, ensuring
    the educational material it creates is well-informed and reliable. For EduContent
    Creator, this might include academic journals and curriculum standards.
  id: totrans-687
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 知识文件为您的 GPT 提供丰富的内容基础，确保其创建的教育材料信息丰富且可靠。对于 EduContent Creator，这可能包括学术期刊和课程标准。
- en: 'Step 5: Bringing Your GPT to Life'
  id: totrans-688
  prefs: []
  type: TYPE_NORMAL
  zh: 第 5 步：使您的 GPT 活起来
- en: With all elements defined, head to the "Create a GPT" option on your GPT-4 platform.
    Input the name and description, carefully enter your detailed instructions and
    conversation starters, and upload any relevant knowledge files.
  id: totrans-689
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在所有元素定义完毕后，前往 GPT-4 平台上的“创建 GPT”选项。输入名称和描述，仔细输入详细的指令和对话启动点，并上传任何相关的知识文件。
- en: 'Step 6: Testing and Refinement'
  id: totrans-690
  prefs: []
  type: TYPE_NORMAL
  zh: 第 6 步：测试和优化
- en: Don't forget that testing and refining your GPT configuration based on real-world
    performance is crucial for achieving the desired results.
  id: totrans-691
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 不要忘记根据实际表现测试和优化您的 GPT 配置对于实现预期结果至关重要。
- en: 'EduContent Creator GPT Specific Instructions:'
  id: totrans-692
  prefs: []
  type: TYPE_NORMAL
  zh: EduContent Creator GPT 特定说明：
- en: 'Professional Role Acknowledgement: Recognize the user as an educator, focusing
    on developing engaging and informative educational material.'
  id: totrans-693
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 专业角色认可：将用户视为教育者，专注于开发吸引人和信息丰富的教育材料。
- en: Tailor support to enhance the user's ability to create diverse educational content,
    from lesson plans to interactive quizzes.
  id: totrans-694
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 定制支持以增强用户创建多样化教育内容的能力，从课程计划到互动测验。
- en: 'Content Creation and Adaptation: Generate educational content across various
    subjects, tailored to different age groups and learning levels.'
  id: totrans-695
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 内容创作和改编：生成涵盖各种学科的教育内容，针对不同年龄段和学习水平进行定制。
- en: Adapt content format and complexity based on specified target audience, such
    as elementary school students, high schoolers, or adult learners.
  id: totrans-696
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 根据指定的目标受众调整内容格式和复杂度，例如小学生、高中生或成人学习者。
- en: 'Curriculum Alignment and Standards Adherence: Ensure content aligns with current
    educational standards and curriculum requirements, incorporating core concepts
    and learning objectives.'
  id: totrans-697
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 课程对齐和标准遵守：确保内容与当前的教育标准和课程要求相一致，包括核心概念和学习目标。
- en: Provide examples and explanations that meet educational benchmarks for clarity,
    depth, and engagement.
  id: totrans-698
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提供符合教育基准的示例和解释，确保清晰度、深度和参与度。
- en: 'Interactive and Engaging Learning Experiences: Suggest interactive elements,
    such as quizzes, discussion prompts, and hands-on activities, to incorporate into
    the content.'
  id: totrans-699
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 互动和吸引人的学习体验：建议将互动元素，如测验、讨论提示和动手活动，融入内容中。
- en: Emphasize the creation of material that encourages active learning and student
    participation.
  id: totrans-700
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 强调创建鼓励主动学习和学生参与的资料。
- en: 'Incorporation of Educational Tools and Resources: Recommend digital tools,
    platforms, and resources to enhance the learning experience, including multimedia
    elements, online quizzes, and educational software.'
  id: totrans-701
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 教育工具和资源的整合：推荐数字工具、平台和资源以增强学习体验，包括多媒体元素、在线测验和教育软件。
- en: 'Diverse Learning Styles and Accessibility: Create content that caters to diverse
    learning styles, including visual, auditory, reading/writing, and kinesthetic
    learners.'
  id: totrans-702
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 多样化的学习风格和可访问性：创建满足多样化学习风格的内容，包括视觉、听觉、阅读/写作和动觉学习者。
- en: Ensure all content is accessible, providing alternatives for students with different
    needs and abilities.
  id: totrans-703
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 确保所有内容都易于访问，为不同需求和能力的用户提供替代方案。
- en: 'Feedback and Improvement Loop: Offer strategies for gathering student feedback
    on educational content and using this feedback to improve material iteratively.'
  id: totrans-704
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 反馈和改进循环：提供收集学生对教育内容反馈的策略，并利用这些反馈迭代地改进材料。
- en: Encourage the use of assessment tools to measure learning outcomes and content
    effectiveness.
  id: totrans-705
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 鼓励使用评估工具来衡量学习成果和内容的有效性。
- en: 'Up-to-date Educational Trends and Technologies: Stay informed about the latest
    educational trends, technologies, and pedagogical strategies to update and innovate
    content creation continuously.'
  id: totrans-706
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 最新教育趋势和技术：了解最新的教育趋势、技术和教学法策略，以持续更新和创新内容创作。
- en: 'Customization for Specific Subjects or Themes: Allow for detailed content customization
    based on specific subjects, themes, or projects, integrating subject-specific
    terminology and concepts as needed.'
  id: totrans-707
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 根据特定科目、主题或项目进行定制：允许根据需要详细定制内容，整合特定科目的术语和概念。
- en: 'Professional Development and Continuous Learning: Provide resources and suggestions
    for professional development in education and content creation.'
  id: totrans-708
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 专业发展和持续学习：提供教育资源和建议，以促进教育和内容创作的专业发展。
- en: Encourage exploration of new pedagogical theories, educational technologies,
    and content creation methodologies.
  id: totrans-709
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 鼓励探索新的教学法理论、教育技术和内容创作方法。
- en: 'Response Configuration:'
  id: totrans-710
  prefs: []
  type: TYPE_NORMAL
  zh: 响应配置：
- en: 'Response Format:'
  id: totrans-711
  prefs: []
  type: TYPE_NORMAL
  zh: 响应格式：
- en: Structure responses in formats that best suit educational content, including
    bullet points for summaries, concise paragraphs for explanations, and step-by-step
    guides for activities.
  id: totrans-712
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 以最适合教育内容的方式构建响应格式，包括总结的要点、解释的简洁段落和活动的逐步指南。
- en: 'Tone Setting:'
  id: totrans-713
  prefs: []
  type: TYPE_NORMAL
  zh: 调性设定：
- en: Maintain an informative yet engaging tone that appeals to a broad educational
    audience, from students to educators, making learning enjoyable.
  id: totrans-714
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 保持信息丰富且引人入胜的调性，吸引从学生到教育者的广泛教育受众，使学习变得愉快。
- en: 'Detail Level:'
  id: totrans-715
  prefs: []
  type: TYPE_NORMAL
  zh: 详细程度：
- en: Provide detailed explanations and descriptions where necessary, especially for
    complex topics, ensuring content is understandable and accessible.
  id: totrans-716
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在必要时提供详细的解释和描述，特别是对于复杂主题，确保内容易于理解和获取。
- en: 'Suggestions Provision:'
  id: totrans-717
  prefs: []
  type: TYPE_NORMAL
  zh: 建议提供：
- en: Offer creative and practical suggestions for lesson activities, content engagement
    strategies, and educational tools that enhance learning experiences.
  id: totrans-718
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提供创意和实用的建议，以改进课程活动、内容参与策略和教育工具，从而增强学习体验。
- en: 'Inquisitive Challenges:'
  id: totrans-719
  prefs: []
  type: TYPE_NORMAL
  zh: 好奇心挑战：
- en: Pose questions or challenges within content to stimulate critical thinking and
    deepen understanding of the subject matter among learners.
  id: totrans-720
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在内容中提出问题或挑战，以刺激批判性思维并加深学习者对主题内容的理解。
- en: 'Ethical and Effective Strategies Assurance:'
  id: totrans-721
  prefs: []
  type: TYPE_NORMAL
  zh: 道德和有效策略保证：
- en: Ensure all educational strategies and content suggested are ethically sound,
    promoting a positive and effective learning environment.
  id: totrans-722
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 确保所有建议的教育策略和内容都是道德上可行的，促进积极有效的学习环境。
- en: 'Resource References:'
  id: totrans-723
  prefs: []
  type: TYPE_NORMAL
  zh: 资源引用：
- en: Include references to credible sources, additional reading materials, and educational
    resources to support content validity and encourage further exploration.
  id: totrans-724
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 包含对可信来源、额外阅读材料和教育资源的引用，以支持内容的有效性并鼓励进一步探索。
- en: 'Critical Thinking Engagement:'
  id: totrans-725
  prefs: []
  type: TYPE_NORMAL
  zh: 批判性思维参与：
- en: Encourage the development of critical thinking abilities through problem-solving
    activities, debate topics, and analytical questions related to the content.
  id: totrans-726
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过解决问题的活动、辩论主题和与内容相关的分析问题来鼓励培养批判性思维能力。
- en: 'Creativity in Problem-Solving:'
  id: totrans-727
  prefs: []
  type: TYPE_NORMAL
  zh: 解决问题的创造力：
- en: Advocate for innovative learning and understanding approaches, encouraging educators
    and learners to think outside the box.
  id: totrans-728
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 倡导创新的学习和理解方法，鼓励教育者和学习者跳出思维定式。
- en: 'Data-Driven Problem-Solving Emphasis:'
  id: totrans-729
  prefs: []
  type: TYPE_NORMAL
  zh: 数据驱动问题解决强调：
- en: Highlight the importance of evidence-based teaching and learning strategies,
    incorporating data and research findings into content creation when applicable.
  id: totrans-730
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 强调基于证据的教学和学习策略的重要性，在适用的情况下将数据和研究成果纳入内容创作中。
- en: 'Bias Awareness:'
  id: totrans-731
  prefs: []
  type: TYPE_NORMAL
  zh: 偏见意识：
- en: Maintain an impartial stance on educational theories and practices, providing
    balanced views and acknowledging multiple perspectives.
  id: totrans-732
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在教育理论和实践中保持公正立场，提供平衡的观点并承认多种观点。
- en: 'Language Clarity:'
  id: totrans-733
  prefs: []
  type: TYPE_NORMAL
  zh: 语言清晰：
- en: Use clear, straightforward language, making complex concepts accessible without
    oversimplification and reserving technical terminology for topics that require
    it.
  id: totrans-734
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用清晰、直接的语言，在不过度简化的同时使复杂概念易于理解，并在需要时保留技术术语。
- en: 'Crafting Custom GPTs: A Prompt Guide'
  id: totrans-735
  prefs: []
  type: TYPE_NORMAL
  zh: 定制GPT的构建：提示指南
- en: 'You can use the following prompt to generate a complete set of instructions
    for building custom GPTs like EduContent Creator. This prompt is designed to guide
    ChatGPT in creating detailed, actionable instructions tailored to specific roles
    or objectives. I suggest you first give ChatGPT the information and instructions
    about EduContent Creator to use as a reference. Then Copy/Paste the following
    prompt, filling in the placeholders according to your needs:'
  id: totrans-736
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以使用以下提示来生成构建自定义GPT（如EduContent Creator）的完整指令集。此提示旨在指导ChatGPT创建针对特定角色或目标的详细、可操作的指令。我建议您首先向ChatGPT提供有关EduContent
    Creator的信息和指令，作为参考。然后复制/粘贴以下提示，根据您的需求填写占位符：
- en: 'Prompt:'
  id: totrans-737
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Create a detailed set of instructions for building a custom GPT model tailored
    to [SPECIFIC ROLE OR OBJECTIVE], similar to the EduContent Creator. The instructions
    should cover the following areas:'
  id: totrans-738
  prefs: []
  type: TYPE_NORMAL
  zh: '"创建一套详细的指令，用于构建一个针对[特定角色或目标]的自定义GPT模型，类似于EduContent Creator。指令应涵盖以下领域：'
- en: 'Professional Role Acknowledgement: Define how the GPT should recognize and
    adapt to the user''s professional role or the objective it''s designed to achieve.'
  id: totrans-739
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 专业角色认可：定义GPT应如何识别和适应用户的职业角色或其设计要实现的目标。
- en: 'Task and Objective-Specific Support: Outline how the GPT can provide targeted
    support and actionable insights for tasks or challenges related to the role or
    objective.'
  id: totrans-740
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 任务和目标特定支持：概述GPT如何为与角色或目标相关的任务或挑战提供有针对性的支持和可操作的见解。
- en: 'Interest and Knowledge Expansion: Describe how the GPT should encourage exploration
    and deeper understanding of relevant topics or skills.'
  id: totrans-741
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 兴趣和知识拓展：描述GPT应如何鼓励探索和深入了解相关主题或技能。
- en: 'Values and Principles Adherence: Explain how the GPT should uphold the core
    values and principles central to the role or objective.'
  id: totrans-742
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 价值观和原则遵守：解释GPT应如何维护与角色或目标相关的核心价值观和原则。
- en: 'Learning Style Integration: Specify how the GPT should tailor its responses
    to accommodate different learning styles or preferences.'
  id: totrans-743
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 学习风格整合：指定GPT应如何调整其响应以适应不同的学习风格或偏好。
- en: 'Background and Goals Incorporation: Detail how the GPT should consider the
    user''s background and goals in its responses.'
  id: totrans-744
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 背景和目标融入：详细说明GPT在其响应中应如何考虑用户的背景和目标。
- en: 'Tool Preferences Consideration: List how the GPT should recommend or utilize
    tools preferred by the user or essential for the role.'
  id: totrans-745
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 工具偏好考虑：列出GPT应推荐或利用用户偏好的工具或对角色至关重要的工具。
- en: 'Language and Communication Proficiency: Indicate the language and communication
    style the GPT should employ, including any necessary terminology.'
  id: totrans-746
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 语言和沟通能力：指出GPT应采用的语言和沟通风格，包括任何必要的术语。
- en: 'Additionally, include a Response Configuration section that specifies:'
  id: totrans-747
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，还包括一个响应配置部分，具体说明：
- en: 'Response Format: The preferred format for the GPT''s responses (e.g., bullet
    points, concise paragraphs).'
  id: totrans-748
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 响应格式：GPT响应的首选格式（例如，项目符号，简洁的段落）。
- en: 'Tone Setting: The tone the GPT should maintain (e.g., professional, innovative,
    encouraging).'
  id: totrans-749
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 调调设定：GPT应保持的调调（例如，专业，创新，鼓励）。
- en: 'Detail Level: How detailed the GPT''s responses should be, especially in key
    areas related to the role or objective.'
  id: totrans-750
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 详细程度：GPT的响应应有多详细，特别是在与角色或目标相关的关键领域。
- en: 'Suggestions Provision: Guidance on how the GPT should offer suggestions, insights,
    or strategies.'
  id: totrans-751
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 建议提供：GPT应如何提供建议、见解或策略的指导。
- en: 'Inquisitive Challenges: Ways the GPT can pose questions or challenges to provoke
    thought or exploration.'
  id: totrans-752
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 好奇心挑战：GPT提出问题或挑战以激发思考或探索的方式。
- en: 'Ethical and Effective Strategies Assurance: Ensure the GPT suggests only ethical
    and effective strategies.'
  id: totrans-753
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 道德和有效策略保证：确保GPT只建议道德和有效的策略。
- en: 'Resource References: How the GPT should include references to resources, trends,
    or tools.'
  id: totrans-754
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 资源引用：GPT应如何包含对资源、趋势或工具的引用。
- en: 'Critical Thinking Engagement: Encourage the GPT to engage users in critical
    thinking and problem-solving.'
  id: totrans-755
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 批判性思维参与：鼓励GPT让用户参与批判性思维和问题解决。
- en: 'Creativity in Problem-Solving: Guide the GPT to offer creative yet practical
    solutions.'
  id: totrans-756
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 解决问题的创造力：指导GPT提供既创新又实用的解决方案。
- en: 'Data-Driven Problem-Solving Emphasis: Emphasize the importance of data-backed
    insights in the GPT''s suggestions.'
  id: totrans-757
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 数据驱动问题解决重点：强调在 GPT 的建议中重视数据支持的见解。
- en: 'Bias Awareness: Instruct the GPT to provide impartial advice, avoiding undue
    preference for specific tools or methods unless supported by data.'
  id: totrans-758
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 偏见意识：指示 GPT 提供无偏见的建议，除非有数据支持，否则避免对特定工具或方法给予不适当的偏好。
- en: 'Language Clarity: Direct the GPT to use clear, accessible language, reserving
    technical jargon for appropriate contexts."'
  id: totrans-759
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 语言清晰度：指导 GPT 使用清晰、易于理解的语言，在适当的情况下保留技术术语。
- en: The prompt should be adjusted to reflect the specific role, objective, or area
    you're interested in. By filling in the placeholders and providing additional
    context as needed, you can guide ChatGPT in generating a comprehensive and customized
    set of instructions for any specialized GPT model you wish to create. You're welcome!
  id: totrans-760
  prefs: []
  type: TYPE_NORMAL
  zh: 提示应该调整以反映您感兴趣的特定角色、目标或领域。通过填写占位符并根据需要提供额外上下文，您可以引导 ChatGPT 生成一套全面定制的指令，用于您希望创建的任何专业
    GPT 模型。欢迎您！
- en: Maximizing the Effectiveness of Custom GPTs
  id: totrans-761
  prefs: []
  type: TYPE_NORMAL
  zh: 最大化定制 GPT 的有效性
- en: Navigating the creation and optimization of these GPT models comes with its
    own set of challenges. Understanding how to overcome these hurdles is key to unlocking
    the full potential of Custom GPTs and ensuring they serve your needs effectively.
  id: totrans-762
  prefs: []
  type: TYPE_NORMAL
  zh: 在创建和优化这些 GPT 模型时，会带来自己的一套挑战。了解如何克服这些障碍是解锁定制 GPT 的全部潜力并确保它们有效满足您需求的关键。
- en: 'Identifying Precise Objectives: One of the primary challenges in working with
    Custom GPTs is defining clear, actionable objectives for your model. The precision
    of your goal directly influences the model''s effectiveness. Begin by outlining
    specific tasks you expect the GPT to perform, which will guide the customization
    process and ensure that the AI''s outputs align with your expectations.'
  id: totrans-763
  prefs: []
  type: TYPE_NORMAL
  zh: 确定精确目标：与定制 GPT 一起工作的主要挑战之一是定义模型的可操作目标。您目标的确切性直接影响模型的有效性。首先，概述您期望 GPT 执行的具体任务，这将指导定制过程并确保
    AI 的输出与您的期望一致。
- en: 'Data Quality and Availability: The success of a Custom GPT largely depends
    on the quality and relevance of the data used for its training. High-quality,
    relevant data ensures that the model can generate accurate and contextually appropriate
    responses. Invest time in curating a set of instructions and knowledge files that
    reflect the output you want.'
  id: totrans-764
  prefs: []
  type: TYPE_NORMAL
  zh: 数据质量和可用性：定制 GPT 的成功很大程度上取决于用于其训练的数据的质量和相关性。高质量、相关的数据确保模型能够生成准确和上下文适当的响应。投入时间精心制作一套反映您期望输出的指令和知识文件。
- en: 'Iterative Testing and Feedback: Custom GPTs require continuous testing and
    refinement to achieve optimal performance. Regularly evaluate the model''s outputs
    against your objectives, providing specific feedback to fine-tune its responses.
    This iterative process allows for adjustments that gradually enhance the model''s
    accuracy and usefulness.'
  id: totrans-765
  prefs: []
  type: TYPE_NORMAL
  zh: 迭代测试和反馈：定制 GPT 需要持续测试和改进以达到最佳性能。定期评估模型的输出是否符合您的目标，并提供具体反馈以微调其响应。这个迭代过程允许进行调整，逐渐提高模型的准确性和实用性。
- en: 'User Interaction Design: A well-designed interface for interacting with your
    Custom GPT can significantly enhance its utility. Focus on creating intuitive
    prompts and clear guidelines for users, which can help elicit more precise and
    valuable responses from the AI. This user-centric approach ensures that the GPT
    can be effectively integrated into workflows, making it a powerful tool for achieving
    your goals.'
  id: totrans-766
  prefs: []
  type: TYPE_NORMAL
  zh: 用户交互设计：一个精心设计的与您的定制 GPT 交互的界面可以显著提高其效用。专注于创建直观的提示和清晰的指南，这有助于从 AI 获取更精确和有价值的响应。这种以用户为中心的方法确保
    GPT 可以有效地集成到工作流程中，成为实现您目标的有力工具。
- en: Key Takeaways from Chapter 9
  id: totrans-767
  prefs: []
  type: TYPE_NORMAL
  zh: 第 9 章要点
- en: Customizing GPTs for specific tasks or domains significantly increases their
    effectiveness, providing tailored solutions that meet individual or industry-specific
    needs.
  id: totrans-768
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为特定任务或领域定制 GPT 可以显著提高其有效性，提供满足个人或行业特定需求的定制解决方案。
- en: The process of creating Custom GPTs is accessible, with tools and interfaces
    that guide users of all technical levels through customization.
  id: totrans-769
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 创建定制 GPT 的过程是可访问的，有工具和界面引导所有技术水平的用户进行定制。
- en: Crafting precise instructions is crucial in shaping the behavior and outputs
    of Custom GPTs, highlighting the need for clarity and specificity in defining
    objectives.
  id: totrans-770
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 构建精确的指令对于塑造定制 GPT 的行为和输出至关重要，强调了在定义目标时需要清晰和具体。
- en: Developing Custom GPTs is an iterative process, requiring ongoing testing, feedback,
    and refinement to optimize performance and accuracy.
  id: totrans-771
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 开发定制 GPT 是一个迭代的过程，需要持续测试、反馈和改进，以优化性能和准确性。
- en: Custom GPTs offer versatile applications across various fields, demonstrating
    the potential of personalized AI to revolutionize content generation, problem-solving,
    and more.
  id: totrans-772
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 定制 GPT 在各个领域提供多用途的应用，展示了个性化 AI 革命化内容生成、问题解决等领域的潜力。
- en: 'Chapter 10: DALL-E'
  id: totrans-773
  prefs: []
  type: TYPE_NORMAL
  zh: 第 10 章：DALL-E
- en: Introduction to DALL-E
  id: totrans-774
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: DALL-E 简介
- en: Named with a nod to the famous surrealist artist Salvador Dalí and the Pixar
    robot WALL-E, DALL-E is designed to generate images from textual descriptions,
    enabling users to create visuals that are limited only by their imagination. This
    feature, built natively on ChatGPT-4, bridges the gap between textual concepts
    and visual representation.
  id: totrans-775
  prefs: []
  type: TYPE_NORMAL
  zh: DALL-E 的名字是对著名超现实主义艺术家萨尔瓦多·达利和皮克斯机器人 WALL-E 的致敬，它被设计成能够根据文本描述生成图像，使用户能够创造出仅受想象力限制的视觉作品。这一功能是在
    ChatGPT-4 上原生构建的，它弥合了文本概念和视觉表现之间的差距。
- en: At its core, DALL-E operates on complex algorithms that interpret the nuances
    of language to visualize and create images that match the given descriptions.
    When a user inputs a textual description, DALL-E processes this information, tapping
    into a vast database of learned visual concepts to generate an image that aligns
    with the user's request. This process involves understanding context, abstract
    concepts, and even humor in the text, showcasing the AI's advanced grasp of language
    and imagery.
  id: totrans-776
  prefs: []
  type: TYPE_NORMAL
  zh: 在其核心，DALL-E 运行在复杂的算法上，这些算法解释语言的细微差别，以视觉化和创建与给定描述相匹配的图像。当用户输入文本描述时，DALL-E 处理这些信息，利用一个庞大的学习视觉概念数据库来生成符合用户请求的图像。这个过程涉及理解上下文、抽象概念，甚至文本中的幽默，展示了
    AI 对语言和图像的先进理解。
- en: Similarly to ChatGPT, DALL-E was trained on a diverse dataset of images and
    their corresponding descriptions to learn to recognize and replicate complex visual
    patterns, textures, and elements in response to textual prompts.
  id: totrans-777
  prefs: []
  type: TYPE_NORMAL
  zh: 与 ChatGPT 类似，DALL-E 是在图像及其相应描述的多样化数据集上训练的，以学习识别和复制复杂的视觉模式、纹理和元素，以响应文本提示。
- en: DALL-E's capability to generate images from text opens up new avenues for creative
    expression. Graphic designers, for example, can use DALL-E to quickly bring conceptual
    ideas to visual form, aiding in the brainstorming and creative process. In marketing,
    DALL-E can be used to generate unique visuals for campaigns or social media content
    tailored specifically to the brand's messaging and audience's interests.
  id: totrans-778
  prefs: []
  type: TYPE_NORMAL
  zh: DALL-E 从文本生成图像的能力为创意表达开辟了新的途径。例如，平面设计师可以使用 DALL-E 快速将概念想法转化为视觉形式，帮助进行头脑风暴和创意过程。在市场营销中，DALL-E
    可以用来为活动或社交媒体内容生成独特的视觉图像，这些内容专门针对品牌的传播信息和受众的兴趣。
- en: Furthermore, the intuitive nature of interacting with DALL-E through textual
    prompts eliminates the steep learning curve typically associated with advanced
    design software, making high-quality visual content creation more inclusive.
  id: totrans-779
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，通过文本提示与 DALL-E 交互的直观性消除了与高级设计软件相关的陡峭学习曲线，使得高质量视觉内容创作更具包容性。
- en: How to Create Compelling Prompts for DALL-E
  id: totrans-780
  prefs: []
  type: TYPE_NORMAL
  zh: 如何为 DALL-E 创建吸引人的提示词
- en: 'Crafting compelling prompts for DALL-E combines creativity with specificity
    to harness its full potential. A well-constructed prompt not only guides DALL-E
    to generate images that closely match your vision but also explores the boundaries
    of its creative capabilities. Here are some strategies to master prompt engineering
    for DALL-E:'
  id: totrans-781
  prefs: []
  type: TYPE_NORMAL
  zh: 为 DALL-E 设计吸引人的提示词需要将创造力和具体性结合起来，以充分发挥其潜力。一个构建良好的提示词不仅能够引导 DALL-E 生成与您的愿景紧密匹配的图像，还能探索其创造能力的边界。以下是一些掌握
    DALL-E 提示词工程策略的方法：
- en: '1\. Start with Clear, Descriptive Language: Clarity and detail are the foundation
    of a compelling prompt. Describe the scene, object, or concept you envision with
    as much specificity as possible. Include descriptions of the setting, emotions,
    colors, lighting, and any specific objects or characters. For example, instead
    of saying "a cat," specify "a fluffy orange cat with wide green eyes sitting on
    a sunny windowsill."'
  id: totrans-782
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 从清晰、描述性的语言开始：清晰和细节是引人入胜的提示的基础。尽可能具体地描述你构想的场景、物体或概念。包括对环境、情感、颜色、光线以及任何特定物体或人物的描述。例如，与其说“一只猫”，不如具体描述“一只毛茸茸的橙色猫，有着宽阔的绿色眼睛，坐在阳光明媚的窗台上。”
- en: '2\. Incorporate Artistic Styles or Influences: DALL-E can generate images in
    the style of certain art movements or famous artists (keeping in mind the limitations
    regarding modern and copyrighted styles). If you''re seeking an image with a particular
    aesthetic, include this in your prompt. For instance, "a vibrant cityscape at
    sunset in the style of Impressionism" directs DALL-E to apply specific artistic
    techniques to your image.'
  id: totrans-783
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 结合艺术风格或影响：DALL-E 可以生成某些艺术运动或著名艺术家的风格图像（注意现代和版权风格的相关限制）。如果你在寻找具有特定美学的图像，请将其包含在提示中。例如，“在印象派风格中，日落时分充满活力的城市景观”的提示会指导
    DALL-E 将特定的艺术技巧应用于你的图像。
- en: '3\. Use Analogies and Metaphors: DALL-E can interpret creative language, so
    using analogies or metaphors can lead to unique and surprising outputs. A prompt
    like "a castle made of dreams, floating on a cloud" encourages DALL-E to translate
    abstract concepts into visual form, often with stunning results.'
  id: totrans-784
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 使用类比和隐喻：DALL-E 能够理解创造性语言，因此使用类比或隐喻可以导致独特且令人惊讶的输出。一个像“一座由梦想构成的城堡，漂浮在云朵上”的提示会鼓励
    DALL-E 将抽象概念转化为视觉形式，通常会有令人惊叹的结果。
- en: '4\. Balance Specificity with Open-Endedness: While detail is crucial, leaving
    room for DALL-E''s creativity can yield fascinating outcomes. Specify the key
    elements of your image, but avoid micromanaging every aspect. This balance allows
    DALL-E to fill in the gaps with its own creative interpretations.'
  id: totrans-785
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 平衡具体性和开放性：虽然细节至关重要，但给 DALL-E 的创造力留出空间可以产生迷人的结果。指定你图像的关键元素，但避免微观管理每个方面。这种平衡允许
    DALL-E 用它自己的创造性解释来填补空白。
- en: '5\. Experiment with Different Perspectives and Angles: Specifying a particular
    viewpoint or angle in your prompt can add dynamism to your image. For example,
    "an aerial view of a labyrinth garden at dawn" suggests a specific perspective
    that shapes how DALL-E constructs the scene.'
  id: totrans-786
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 尝试不同的视角和角度：在提示中指定特定的视角或角度可以为你的图像增添活力。例如，“黎明时分空中鸟瞰迷宫花园”的描述暗示了一个特定的视角，这决定了
    DALL-E 如何构建场景。
- en: '6\. Leverage Contextual Information: If your image is part of a larger narrative
    or concept, include this context in your prompt. Context helps DALL-E understand
    the purpose behind the image, enabling it to generate images that are not just
    visually appealing but also meaningful within a larger story or theme.'
  id: totrans-787
  prefs: []
  type: TYPE_NORMAL
  zh: 6. 利用上下文信息：如果你的图像是更大叙事或概念的一部分，请在你的提示中包含这个上下文。上下文有助于 DALL-E 理解图像背后的目的，使其能够生成不仅视觉上吸引人，而且在更大故事或主题中也有意义的图像。
- en: '7\. Iterate and Refine: Creating the perfect image often requires several attempts.
    Use your initial results to refine your prompts, adjusting language and details
    based on what DALL-E produces. This iterative process will lead to increasingly
    accurate and creative outputs.'
  id: totrans-788
  prefs: []
  type: TYPE_NORMAL
  zh: 7. 迭代和精炼：创建完美的图像通常需要多次尝试。使用你的初始结果来精炼你的提示，根据 DALL-E 产生的结果调整语言和细节。这个迭代过程将导致越来越准确和富有创造性的输出。
- en: '8\. Stay Informed of Limitations and Guidelines: Familiarize yourself with
    DALL-E''s content guidelines and technical limitations. Understanding what DALL-E
    can and cannot do will help you craft feasible prompts within the tool''s capabilities.'
  id: totrans-789
  prefs: []
  type: TYPE_NORMAL
  zh: 8. 了解限制和指南：熟悉 DALL-E 的内容指南和技术限制。了解 DALL-E 能做什么和不能做什么将帮助你在这个工具的能力范围内制定可行的提示。
- en: Mastering prompt engineering for DALL-E involves a blend of precision, creativity,
    and experimentation. By following these strategies, you can unlock DALL-E's full
    creative potential, transforming your textual descriptions into captivating visual
    art that resonates with your vision.
  id: totrans-790
  prefs: []
  type: TYPE_NORMAL
  zh: 掌握 DALL-E 的提示工程需要精确、创造性和实验的结合。通过遵循这些策略，你可以解锁 DALL-E 的全部创造潜力，将你的文本描述转化为与你的愿景产生共鸣的引人入胜的视觉艺术。
- en: 'Example Prompt:'
  id: totrans-791
  prefs: []
  type: TYPE_NORMAL
  zh: 示例提示：
- en: '"Create an image of an ancient library in the heart of a dense, enchanted forest
    during autumn. The library is built from aged stone and wood, with ivy climbing
    its walls and large, arched windows that glow warmly from within. Inside, shelves
    stretch high into the shadows, filled with ancient books and scrolls. A clear,
    starry night sky is visible through the openings in the canopy above, casting
    soft light on a winding path leading to the library''s ornate wooden door. The
    scene should blend elements of fantasy and realism, capturing a sense of magic
    and serenity, with a focus on rich, autumnal colors and intricate details that
    invite the viewer to explore the depths of the forest and the mysteries within
    the library."'
  id: totrans-792
  prefs: []
  type: TYPE_NORMAL
  zh: '"在秋天，在一片茂密、神秘的森林中心创建一个古老图书馆的图像。图书馆由古老的石头和木材建造，墙上爬满了常春藤，宽敞的拱形窗户从内部散发出温暖的光芒。内部，书架延伸到阴影深处，摆满了古老的书籍和卷轴。透过树冠上的开口，可以看到一个清晰的、星光灿烂的夜空，它将柔和的光线投射在通往图书馆装饰华丽的木门蜿蜒小路上。这个场景应该融合幻想和现实元素，捕捉到一种魔法和宁静的感觉，重点在于丰富的秋色和复杂的细节，邀请观众探索森林的深处和图书馆内的奥秘。"'
- en: 'This prompt incorporates several key strategies:'
  id: totrans-793
  prefs: []
  type: TYPE_NORMAL
  zh: 这个提示包含了几种关键策略：
- en: 'Specificity in Description: It provides detailed descriptions of the library,
    the forest, and the overall setting, guiding DALL-E to generate an image with
    specific elements.'
  id: totrans-794
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 描述的明确性：它提供了对图书馆、森林和整体环境的详细描述，引导 DALL-E 生成具有特定元素的图像。
- en: 'Incorporation of Artistic Styles: The prompt suggests blending fantasy with
    realism, encouraging a creative and imaginative interpretation.'
  id: totrans-795
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 融入艺术风格：提示建议将幻想与现实融合，鼓励创造性和富有想象力的解释。
- en: 'Definition of Composition: It outlines the composition by positioning the library
    within a forest, detailing the interior and exterior aspects, and suggesting how
    these elements should be arranged.'
  id: totrans-796
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 构图的定义：它通过将图书馆定位在森林中，详细描述内部和外部方面，并建议如何安排这些元素来概述构图。
- en: 'Use of Color and Lighting Descriptions: The prompt specifies the time (night)
    and season (autumn), suggesting colors (rich, autumnal colors) and lighting (glow
    from within, soft light from the sky) to set the tone.'
  id: totrans-797
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 颜色和光线描述的使用：提示指定了时间（夜晚）和季节（秋天），暗示了颜色（丰富的秋色）和光线（从内部发出的光芒，来自天空的柔和光线）以设定基调。
- en: 'Contextualizing with Scenarios: The enchanted forest setting and the ancient,
    magical library provide a narrative context, adding depth to the visual story.'
  id: totrans-798
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过场景进行情境化：神秘的森林环境和古老的、魔幻的图书馆提供了一个叙事背景，为视觉故事增添了深度。
- en: 'Adjust and Refine: While this is an initial prompt, I encourage you to adjust
    details based on the results, experimenting with different descriptions or elements
    to refine the outcome.'
  id: totrans-799
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 调整和细化：虽然这是一个初始提示，但我鼓励您根据结果调整细节，尝试不同的描述或元素以细化结果。
- en: This example shows you how detailed and thoughtful prompts can significantly
    influence the creativity and relevance of the images DALL-E generates, offering
    you a powerful tool for visual exploration and storytelling.
  id: totrans-800
  prefs: []
  type: TYPE_NORMAL
  zh: 这个例子展示了如何通过详细和深思熟虑的提示，显著影响 DALL-E 生成的图像的创造力和相关性，为您提供了强大的视觉探索和叙事工具。
- en: What Kind of Images You Can Generate with DALL-E
  id: totrans-801
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以使用 DALL-E 生成哪些类型的图像
- en: DALL-E allows you to generate a wide array of images, from the strikingly realistic
    to the whimsically surreal. This versatility makes it an invaluable tool for professionals
    across various fields and for enthusiasts exploring the bounds of their imagination.
  id: totrans-802
  prefs: []
  type: TYPE_NORMAL
  zh: DALL-E 允许您生成各种图像，从令人惊叹的现实主义到异想天开的超现实。这种多功能性使其成为各个领域专业人士和探索想象极限的爱好者不可或缺的工具。
- en: 'Realistic Images: DALL-E can produce high-quality, realistic images that are
    indistinguishable from photographs. This includes detailed landscapes, lifelike
    portraits, and product mockups.'
  id: totrans-803
  prefs: []
  type: TYPE_NORMAL
  zh: 现实主义图像：DALL-E 可以生成高质量、逼真的图像，这些图像与照片难以区分。这包括详细的风景、逼真的肖像和产品原型。
- en: 'Example Prompt:'
  id: totrans-804
  prefs: []
  type: TYPE_NORMAL
  zh: 示例提示：
- en: '"Generate a high-resolution image of a cozy, modern living room at dusk, with
    natural light filtering through large windows. The room should showcase a comfortable
    sofa, a wooden coffee table, and a bookshelf filled with books. It should also
    have soft, warm lighting to create a welcoming atmosphere."'
  id: totrans-805
  prefs: []
  type: TYPE_NORMAL
  zh: '"生成一个黄昏时分的舒适、现代客厅的高分辨率图像，自然光线透过大窗户过滤进来。房间应该展示一个舒适的沙发、一个木制咖啡桌和一个摆满书籍的书架。它还应具有柔和、温暖的光线，以营造欢迎的氛围。"'
- en: 'Artistic Creations: By incorporating specific art styles or movements into
    your prompts, you can direct DALL-E to generate artwork that mimics the techniques
    of renowned artists or explores particular aesthetics. Whether you''re interested
    in impressionism, surrealism, or pixel art, DALL-E can translate these styles
    into unique creations.'
  id: totrans-806
  prefs: []
  type: TYPE_NORMAL
  zh: 艺术创作：通过在你的提示中融入特定的艺术风格或运动，你可以指导DALL-E生成模仿著名艺术家技巧或探索特定美学的艺术品。无论你对印象派、超现实主义还是像素艺术感兴趣，DALL-E都能将这些风格转化为独特的创作。
- en: 'Example Prompt:'
  id: totrans-807
  prefs: []
  type: TYPE_NORMAL
  zh: 示例提示：
- en: '"Create an image in the style of Vincent van Gogh, depicting a bustling café
    terrace at night, with vibrant colors and bold, expressive brush strokes. The
    scene should capture the lively atmosphere of the café with people dining under
    the starry sky."'
  id: totrans-808
  prefs: []
  type: TYPE_NORMAL
  zh: '"以文森特·梵高的风格创作一幅图像，描绘夜晚熙熙攘攘的咖啡馆露台，色彩鲜艳，笔触大胆、富有表现力。场景应捕捉咖啡馆的活跃气氛，人们在繁星点点的夜空下用餐。"'
- en: 'Conceptual Visuals: DALL-E excels at bringing abstract concepts to life. Whether
    it''s visualizing the future of technology, depicting metaphors, or creating visual
    puns, it can interpret complex ideas and present them in insightful and engaging
    ways.'
  id: totrans-809
  prefs: []
  type: TYPE_NORMAL
  zh: 概念视觉：DALL-E擅长将抽象概念变为现实。无论是可视化技术的未来、描绘隐喻，还是创造视觉双关语，它都能解释复杂的思想并以洞察力和吸引力的方式呈现。
- en: 'Example Prompt:'
  id: totrans-810
  prefs: []
  type: TYPE_NORMAL
  zh: 示例提示：
- en: '"Visualize the concept of ''time as a river'' in a surrealistic style. Show
    a river flowing through an ancient clock face, with the river''s currents twisting
    and turning around the numbers, seamlessly blending the elements of water and
    time."'
  id: totrans-811
  prefs: []
  type: TYPE_NORMAL
  zh: '"以超现实风格可视化‘时间如河流’的概念。展示一条河流穿过古老的钟面，河流的潮流在数字周围扭曲、转弯，无缝地融合了水和时间的元素。"'
- en: 'Surreal and Imaginative Scenes: One of DALL-E''s most captivating applications
    is its ability to generate images that blend elements from disparate realms into
    cohesive, imaginative scenes. Users can craft scenarios that defy the laws of
    physics, merge different historical periods, or combine species from different
    ecosystems.'
  id: totrans-812
  prefs: []
  type: TYPE_NORMAL
  zh: 超现实和富有想象力的场景：DALL-E最吸引人的应用之一是它能够将来自不同领域的元素融合成连贯、富有想象力的场景。用户可以构建违反物理定律、合并不同的历史时期或结合来自不同生态系统的物种的场景。
- en: 'Example Prompt:'
  id: totrans-813
  prefs: []
  type: TYPE_NORMAL
  zh: 示例提示：
- en: '"Imagine a scene where the ocean meets the sky in a seamless horizon, with
    flying fish transitioning into birds as they leap out of the water. The boundary
    between sea and air should be indistinguishable, creating a dreamlike realm where
    the rules of gravity and nature are bent."'
  id: totrans-814
  prefs: []
  type: TYPE_NORMAL
  zh: '"想象一个场景，海洋与天空在无缝的地平线上相遇，飞鱼跃出水面时变成鸟儿。海与空的界限应难以分辨，创造出一个梦幻般的领域，在这里，重力和自然的规则被弯曲了。"'
- en: 'Custom Illustrations for Specific Needs: DALL-E can tailor illustrations to
    fit specific needs, such as creating visuals for articles, blog posts, educational
    materials, and social media content. By providing detailed descriptions, you can
    receive custom illustrations that accurately reflect your topic, tone, and message.'
  id: totrans-815
  prefs: []
  type: TYPE_NORMAL
  zh: 针对特定需求的定制插图：DALL-E可以根据特定需求定制插图，例如为文章、博客文章、教育材料和社交媒体内容创建视觉内容。通过提供详细的描述，你可以收到准确反映你的主题、语气和信息的定制插图。
- en: 'Example Prompt:'
  id: totrans-816
  prefs: []
  type: TYPE_NORMAL
  zh: 示例提示：
- en: '"Design an illustration for a blog post about sustainable living. The image
    should depict a futuristic green city with rooftop gardens, solar panels, and
    people commuting on bicycles and electric vehicles. The cityscape should embody
    harmony between urban living and nature conservation."'
  id: totrans-817
  prefs: []
  type: TYPE_NORMAL
  zh: '"设计一篇关于可持续生活的博客文章的插图。图片应描绘一个未来绿色城市，有屋顶花园、太阳能板，以及人们骑自行车和电动汽车通勤的景象。城市景观应体现城市生活和自然保护之间的和谐。"'
- en: Navigating Limitations and Ethical Considerations
  id: totrans-818
  prefs: []
  type: TYPE_NORMAL
  zh: 探索局限性和伦理考量
- en: While DALL-E's capabilities present revolutionary opportunities for creativity
    and innovation, they also introduce a range of ethical considerations and limitations.
    Addressing these concerns is crucial to ensuring responsible use and understanding
    of AI's broader implications in the creative industries.
  id: totrans-819
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管DALL-E的功能为创造力和创新提供了革命性的机会，但也引入了一系列伦理考虑和限制。解决这些担忧对于确保负责任地使用和理解AI在创意产业中的更广泛影响至关重要。
- en: 'AI-Generated Art vs. Human Creativity: The advent of AI-generated imagery challenges
    traditional notions of artistry and creativity. While DALL-E enables the creation
    of visually stunning pieces that might not be feasible by human hands alone, it
    raises questions about the role of the artist and the origin of creativity. Is
    the creator the one who designs the prompt, or is the AI executing the vision?
    This debate touches on the essence of artistic ownership and the value of human
    touch in art. Striking a balance between leveraging AI to enhance human creativity
    without diminishing the role of the artist is essential.'
  id: totrans-820
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能生成艺术与人类创造力：人工智能生成图像的出现挑战了传统的艺术和创造力观念。虽然DALL-E能够创建视觉上令人惊叹的作品，这些作品可能仅凭人类双手难以实现，但它也引发了关于艺术家角色和创造力起源的问题。是设计提示的人是创造者，还是AI在执行愿景？这场辩论触及了艺术所有权本质和人类触感在艺术中的价值。在利用AI增强人类创造力而不贬低艺术家角色的同时保持平衡是至关重要的。
- en: 'Copyright Concerns: DALL-E''s ability to generate images based on vast datasets
    of existing artwork and photographs brings copyright issues to the forefront.
    Ensuring that generated images do not infringe on the copyrights of original works
    is a complex challenge. Users must be mindful of the sources DALL-E has been trained
    on and consider the legal implications of derivative works, especially in commercial
    contexts.'
  id: totrans-821
  prefs: []
  type: TYPE_NORMAL
  zh: 版权问题：DALL-E基于大量现有艺术作品和照片的数据集生成图像的能力，将版权问题推到了前沿。确保生成的图像不侵犯原创作品的版权是一个复杂的挑战。用户必须留意DALL-E训练的来源，并考虑派生作品的合法影响，尤其是在商业环境中。
- en: 'Potential for Misuse: DALL-E''s power to create realistic and convincing images
    can be misused to generate deceptive or harmful content. This includes the creation
    of deepfakes, misleading information, or content that violates privacy and ethical
    standards. Implementing safeguards and ethical guidelines for use is crucial to
    prevent misuse and promote a positive impact on society.'
  id: totrans-822
  prefs: []
  type: TYPE_NORMAL
  zh: 滥用潜力：DALL-E创建逼真和令人信服图像的能力可能被滥用，以生成欺骗性或有害的内容。这包括创建深度伪造、误导性信息或违反隐私和伦理标准的内容。实施使用保障和伦理指南对于防止滥用并促进对社会产生积极影响至关重要。
- en: 'Impact on Creative Industries: DALL-E and similar technologies can potentially
    transform creative industries by democratizing access to high-quality visual content
    creation. However, this democratization also poses challenges for professionals
    whose livelihoods depend on traditional content-creation methods. Navigating the
    impact on employment, skill development, and the economic value of creativity
    is essential for a fair transition into this new era.'
  id: totrans-823
  prefs: []
  type: TYPE_NORMAL
  zh: 对创意产业的影响：DALL-E和类似技术通过民主化高质量视觉内容创作的访问，有可能转变创意产业。然而，这种民主化也给依赖传统内容创作方法的职业人士带来了挑战。导航这一影响对就业、技能发展和创造力的经济价值，对于公平过渡到这个新时代至关重要。
- en: By fostering an environment of ethical awareness and responsibility, we can
    harness the benefits of AI-generated imagery while mitigating its risks and ensuring
    that it serves to enrich human creativity rather than replace it.
  id: totrans-824
  prefs: []
  type: TYPE_NORMAL
  zh: 通过培养一个具有伦理意识和责任感的氛围，我们可以利用人工智能生成图像的好处，同时减轻其风险，并确保它服务于丰富人类创造力，而不是取代它。
- en: Key takeaways from Chapter 10
  id: totrans-825
  prefs: []
  type: TYPE_NORMAL
  zh: 第10章的关键要点
- en: DALL-E enables users to create images from textual descriptions, leveraging
    advanced algorithms to understand and visualize concepts.
  id: totrans-826
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: DALL-E使用户能够根据文本描述创建图像，利用先进的算法来理解和可视化概念。
- en: Clear, detailed, imaginative prompts are key to harnessing DALL-E's full potential.
  id: totrans-827
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 清晰、详细、富有想象力的提示是发挥DALL-E全部潜力的关键。
- en: DALL-E's ability to produce a wide range of images, from realistic to surreal,
    offers vast possibilities for professionals and enthusiasts alike, allowing for
    the creation of unique visual content across various fields.
  id: totrans-828
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: DALL-E能够生成从现实主义到超现实的各种图像，为专业人士和爱好者 alike提供了广阔的可能性，允许在各个领域创建独特的视觉内容。
- en: Users must navigate ethical considerations, including copyright issues, potential
    misuse, and the impact on creative industries, to ensure responsible use of DALL-E's
    capabilities.
  id: totrans-829
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 用户必须考虑伦理考量，包括版权问题、潜在滥用以及创意产业的影响，以确保DALL-E能力的负责任使用。
- en: 'Chapter 11: Ethical Considerations in Prompt Engineering'
  id: totrans-830
  prefs: []
  type: TYPE_NORMAL
  zh: 第11章：提示工程中的伦理考量
- en: The Potential for Bias in AI Responses
  id: totrans-831
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能响应中的潜在偏见
- en: 'When it comes to prompt engineering within AI technologies like ChatGPT, we''re
    confronted with a complex and critical issue: the potential for bias in responses.
    This bias reflects the data these models have been trained on, which in turn mirrors
    the vast and varied human experience, including its prejudices and inequalities.'
  id: totrans-832
  prefs: []
  type: TYPE_NORMAL
  zh: 当涉及到像ChatGPT这样的AI技术中的提示工程时，我们面临着复杂且关键的问题：响应中可能存在的偏见。这种偏见反映了这些模型所训练的数据，反过来又反映了广泛而多样的人类经验，包括其偏见和不平等。
- en: As you already know, AI models, including ChatGPT, are trained on extensive
    datasets gathered from the internet, books, articles, and other media. These datasets
    encompass a broad spectrum of human knowledge and culture but also carry the biases
    present in their sources. When AI generates responses, it does so based on patterns
    it has learned from this data. Consequently, if the training data is skewed or
    unrepresentative, the AI's responses can inadvertently perpetuate stereotypes
    or present biased viewpoints.
  id: totrans-833
  prefs: []
  type: TYPE_NORMAL
  zh: 正如你所知道的那样，AI模型，包括ChatGPT，是在从互联网、书籍、文章和其他媒体收集的大量数据集上训练的。这些数据集涵盖了广泛的人类知识和文化，但也携带了其来源中的偏见。当AI生成响应时，它是基于从这些数据中学到的模式。因此，如果训练数据有偏差或不具有代表性，AI的响应可能会无意中延续刻板印象或呈现有偏见的观点。
- en: Acknowledging the possibility of bias is the first step toward addressing it.
    As users of AI, we must be vigilant and proactive in identifying bias in its outputs.
    This involves continuously monitoring and evaluating the responses generated by
    AI. The goal is to ensure that these technologies serve as inclusive and fair
    tools that reflect the diversity of human perspectives and experiences.
  id: totrans-834
  prefs: []
  type: TYPE_NORMAL
  zh: 承认偏见的可能性是解决偏见的第一步。作为AI的使用者，我们必须在识别AI输出的偏见方面保持警惕和主动。这涉及到持续监控和评估AI生成的响应。目标是确保这些技术作为包容和公平的工具，反映人类观点和经验的多样性。
- en: Moreover, addressing AI bias requires a multifaceted approach, including diversifying
    training datasets, implementing fairness measures in AI algorithms, and fostering
    an ethical AI development culture. By acknowledging the potential for bias and
    actively working to mitigate it, we can harness the power of AI in a way that
    respects and uplifts all members of society.
  id: totrans-835
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，解决AI偏见需要多方面的方法，包括多样化训练数据集，在AI算法中实施公平措施，以及培养道德的AI开发文化。通过承认偏见的可能性并积极努力减轻它，我们可以以尊重并提升社会所有成员的方式利用AI的力量。
- en: As we proceed through this chapter, we'll explore strategies for identifying
    and reducing bias in AI responses, ensuring that prompt engineering practices
    contribute to developing ethical and equitable AI systems.
  id: totrans-836
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们继续本章内容的过程中，我们将探讨识别和减少AI响应中偏见的方法，确保提示工程实践有助于开发道德和公平的AI系统。
- en: Privacy and Data Protection Concerns
  id: totrans-837
  prefs: []
  type: TYPE_NORMAL
  zh: 隐私和数据保护问题
- en: In the digital age, privacy and data protection emerge as paramount concerns,
    especially as we integrate AI technologies like ChatGPT into our daily lives.
    These concerns have tangible implications for both individuals and society at
    large. As we entrust AI with increasing amounts of personal information, questions
    about how this data is used, stored, and protected become increasingly urgent.
  id: totrans-838
  prefs: []
  type: TYPE_NORMAL
  zh: 在数字时代，隐私和数据保护成为首要关注的问题，尤其是在我们将ChatGPT等AI技术整合到日常生活中时。这些问题对个人和社会整体都有实际的含义。随着我们越来越多地信任AI处理个人信息，关于如何使用、存储和保护这些数据的问题变得越来越紧迫。
- en: AI systems, including ChatGPT, require vast datasets to learn and improve. This
    often includes data derived from user interactions, which can range from benign
    queries to deeply personal disclosures. The potential for misuse of this sensitive
    information raises significant privacy concerns. Users must be assured that their
    data is secure and used in a manner that respects their privacy and autonomy.
  id: totrans-839
  prefs: []
  type: TYPE_NORMAL
  zh: 包括ChatGPT在内的AI系统需要大量的数据集来学习和改进。这通常包括来自用户交互的数据，这些数据可以从良性的查询到深度的个人披露不等。这种敏感信息的滥用可能性引发了重大的隐私担忧。必须确保用户的数据是安全的，并且以尊重他们的隐私和自主权的方式使用。
- en: Data protection laws and regulations aim to safeguard personal information,
    but the rapid advancement of AI technologies presents new challenges. Ensuring
    compliance and adapting to these evolving standards is crucial for developers
    and users alike. Moreover, the global nature of the internet means that data protection
    must be considered across different legal jurisdictions, adding another layer
    of complexity to privacy concerns.
  id: totrans-840
  prefs: []
  type: TYPE_NORMAL
  zh: 数据保护法律和法规旨在保护个人信息，但人工智能技术的快速发展带来了新的挑战。确保合规并适应这些不断变化的标准对于开发者和用户来说都至关重要。此外，互联网的全球性质意味着数据保护必须考虑不同的法律管辖区域，这给隐私问题增加了另一层复杂性。
- en: Transparency plays a critical role in addressing these concerns. Users should
    be informed about what data is collected, how it is used, and the measures in
    place to keep their privacy safe. Additionally, offering users control over their
    data, including the ability to opt out of data collection or delete their information,
    can empower individuals and foster trust.
  id: totrans-841
  prefs: []
  type: TYPE_NORMAL
  zh: 透明度在解决这些担忧方面发挥着关键作用。用户应被告知收集了哪些数据，如何使用这些数据，以及采取哪些措施来保护他们的隐私安全。此外，提供用户对其数据的控制权，包括选择退出数据收集或删除其信息的能力，可以赋予个人权力并培养信任。
- en: As we delve deeper into integrating AI into our lives, balancing innovation
    with the imperative to protect privacy and data becomes increasingly critical.
    This section highlights the importance of proactive measures, robust data protection
    policies, and a commitment to ethical AI development to ensure that technological
    advancements do not come at the expense of individual privacy.
  id: totrans-842
  prefs: []
  type: TYPE_NORMAL
  zh: 随着我们更深入地将人工智能融入我们的生活，平衡创新与保护隐私和数据安全的必要性变得越来越关键。本节强调了主动措施、稳健的数据保护政策和致力于道德人工智能发展的承诺的重要性，以确保技术进步不会以牺牲个人隐私为代价。
- en: Ethical Guidelines for Prompt Engineering
  id: totrans-843
  prefs: []
  type: TYPE_NORMAL
  zh: 提示工程道德指南
- en: Prompt engineering necessitates a framework of ethical guidelines to navigate
    its complexities responsibly. This discipline goes beyond technical prowess, touching
    upon the moral implications of the prompts we design and the responses they elicit.
    Here, we lay down foundational ethical guidelines to steer prompt engineering
    toward positive and constructive outcomes.
  id: totrans-844
  prefs: []
  type: TYPE_NORMAL
  zh: 提示工程需要一套道德指导框架来负责任地应对其复杂性。这一学科不仅涉及技术能力，还触及我们设计的提示及其引发的响应的道德影响。在此，我们制定了基础道德指导原则，以引导提示工程朝着积极和建设性的结果发展。
- en: 'Transparency and Intent: It is vital to be transparent about the nature and
    intentions behind your prompts. This means clearly communicating the purpose of
    the prompt and the expected type of response, ensuring no deception or manipulation
    is involved, especially in applications that interact directly with the public.'
  id: totrans-845
  prefs: []
  type: TYPE_NORMAL
  zh: 透明度和意图：清楚地了解您提示的性质和意图至关重要。这意味着明确传达提示的目的和预期的响应类型，确保没有欺骗或操纵，尤其是在直接与公众互动的应用中。
- en: 'Respect for Privacy: When designing prompts that might lead ChatGPT to generate
    responses based on personal data or sensitive information, you must prioritize
    user privacy. This includes avoiding prompts that could inadvertently reveal personal
    details or relying on data that users have not consented to use.'
  id: totrans-846
  prefs: []
  type: TYPE_NORMAL
  zh: 尊重隐私：当设计可能导致ChatGPT基于个人数据或敏感信息生成响应的提示时，您必须优先考虑用户隐私。这包括避免可能导致无意中透露个人细节的提示，或依赖用户未同意使用的数据。
- en: 'Avoiding Bias and Promoting Fairness: As we''ve seen, AI models can perpetuate
    or amplify biases present in their training data. You should strive to create
    inputs that are mindful of this potential, working actively to mitigate bias and
    promote fairness. This involves testing and refining prompts to ensure they do
    not lead to discriminatory or prejudiced outputs.'
  id: totrans-847
  prefs: []
  type: TYPE_NORMAL
  zh: 避免偏见和促进公平：正如我们所看到的，人工智能模型可能会持续或放大其训练数据中存在的偏见。您应努力创建对此潜在性有所考虑的输入，积极减轻偏见并促进公平。这包括测试和改进提示，以确保它们不会导致歧视性或偏见性的输出。
- en: 'Safety and Harm Avoidance: Prompts should be crafted with the safety of the
    end-users in mind, avoiding outputs that could cause harm, spread misinformation,
    or incite violence. You are responsible for anticipating the potential misuse
    of your prompts and implementing safeguards against such outcomes.'
  id: totrans-848
  prefs: []
  type: TYPE_NORMAL
  zh: 安全和避免伤害：提示应考虑到最终用户的安危，避免可能造成伤害、传播错误信息或煽动暴力的输出。您有责任预见您提示的潜在滥用，并实施防范此类结果的安全措施。
- en: 'Continual Learning and Improvement: The field of AI is rapidly evolving, as
    are societal norms and ethical considerations. You should commit to ongoing learning
    and adaptation, incorporating new insights and feedback to refine your ethical
    guidelines.'
  id: totrans-849
  prefs: []
  type: TYPE_NORMAL
- en: By adhering to these ethical guidelines, as a prompt engineer, you can ensure
    that your work contributes positively to the development of AI technologies. Ethical
    prompt engineering not only enhances the reliability and usefulness of AI models
    but also upholds our collective responsibility to foster technology that benefits
    society as a whole.
  id: totrans-850
  prefs: []
  type: TYPE_NORMAL
- en: Avoiding Manipulation and Ensuring Transparency
  id: totrans-851
  prefs: []
  type: TYPE_NORMAL
- en: It is crucial to maintain a commitment to avoiding manipulation and ensuring
    transparency. This commitment is the foundation of trust between AI developers,
    their technology, and users. Balancing these ethical priorities is essential,
    given AI's significant influence on decision-making and perceptions.
  id: totrans-852
  prefs: []
  type: TYPE_NORMAL
- en: 'Preventing Manipulative Practices: Prompt design and implementation must be
    free from intentions to deceive or manipulate users. This means creating prompts
    that generate responses based on factual, unbiased information and clearly communicating
    the AI''s limitations to avoid misleading users. Engineers should be vigilant
    against crafting prompts that could sway decisions or opinions under false pretenses,
    prioritizing integrity in every interaction.'
  id: totrans-853
  prefs: []
  type: TYPE_NORMAL
- en: 'Transparency as a Cornerstone: Transparency involves openly sharing how AI
    systems operate, the nature of the data they use, and the logic behind the responses
    they generate. This clarity is essential for user trust and fostering an environment
    where users can make informed decisions about their engagement with AI. It includes
    disclosing the source and nature of the training data, any filters or modifications
    applied, and the potential biases inherent in the model.'
  id: totrans-854
  prefs: []
  type: TYPE_NORMAL
- en: 'User Empowerment through Information: Equally important is empowering users
    with the knowledge to understand AI interactions. This involves providing accessible
    explanations about how prompts are processed, and responses are generated. By
    demystifying the AI''s workings, users are better positioned to critically assess
    the information provided and the technology''s role in their decision-making processes.'
  id: totrans-855
  prefs: []
  type: TYPE_NORMAL
- en: 'Commitment to Ethical Standards: Upholding these principles requires a steadfast
    commitment to ethical standards from all involved in AI development. It''s about
    building and maintaining a culture that values honesty, respects user autonomy,
    and continually strives for improvement.'
  id: totrans-856
  prefs: []
  type: TYPE_NORMAL
- en: By prioritizing the avoidance of manipulation and ensuring transparency, AI
    technologies like ChatGPT can be developed and used in ways that respect and enhance
    human autonomy, fostering a healthier relationship between humans and the machines
    designed to serve them.
  id: totrans-857
  prefs: []
  type: TYPE_NORMAL
- en: Key Takeaways from Chapter 11
  id: totrans-858
  prefs: []
  type: TYPE_NORMAL
- en: Identifying and mitigating bias in AI responses is crucial for developing fair
    and equitable AI systems. This requires diversifying datasets and implementing
    fairness measures.
  id: totrans-859
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 识别和缓解AI响应中的偏见对于开发公平和均衡的AI系统至关重要。这需要多样化数据集和实施公平措施。
- en: Safeguarding user privacy and protecting personal data are paramount in AI development
    and use. Transparency, user control over data, and adherence to data protection
    laws are essential practices.
  id: totrans-860
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在AI开发和利用中保护用户隐私和保护个人数据至关重要。透明度、用户对数据的控制以及遵守数据保护法律是基本实践。
- en: Prompt engineering should follow ethical guidelines that emphasize transparency,
    respect for privacy, bias mitigation, safety, and harm avoidance, contributing
    to the responsible development and use of AI technologies.
  id: totrans-861
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提示工程应遵循强调透明度、尊重隐私、偏见缓解、安全和避免伤害的道德准则，以促进AI技术的负责任开发和利用。
- en: AI developers and users must commit to ethical standards that prevent manipulative
    practices and prioritize transparency, thereby fostering trust and informed engagement
    with AI technologies.
  id: totrans-862
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: AI的开发者和用户必须承诺遵守道德标准，防止操纵性做法，并优先考虑透明度，从而促进对AI技术的信任和知情参与。
- en: 'Chapter 12: Additional Resources and Glossary'
  id: totrans-863
  prefs: []
  type: TYPE_NORMAL
  zh: 第12章：附加资源和词汇表
- en: Additional Resources for Continued Learning
  id: totrans-864
  prefs: []
  type: TYPE_NORMAL
  zh: 持续学习的附加资源
- en: 'For those of you interested in prompt engineering and model training, here
    are some of the best resources available online to deepen your understanding and
    enhance your skills:'
  id: totrans-865
  prefs: []
  type: TYPE_NORMAL
  zh: 对于对提示工程和模型训练感兴趣的人来说，以下是一些在线上可用的最佳资源，以加深你的理解并提高你的技能：
- en: 'LambdaTest''s Blog on Prompt Engineering: Offers a comprehensive guide that
    explains the benefits of prompt engineering, including enhancing AI''s creativity,
    precision, and adaptability. It discusses basic concepts and types of prompts,
    providing a solid introduction to the field. It can be found on lambdatest.com
    —> Resources —>Learning Hub —>Prompt Engineering Tutorial.'
  id: totrans-866
  prefs: []
  type: TYPE_NORMAL
  zh: LambdaTest的提示工程博客：提供了一本全面的指南，解释了提示工程的益处，包括增强AI的创造力、精确性和适应性。它讨论了基本概念和提示类型，为该领域提供了坚实的介绍。可以在lambdatest.com
    —> 资源 —> 学习中心 —> 提示工程教程找到。
- en: 'Learnprompting.org: This is touted as one of the largest and most comprehensive
    courses on prompt engineering available on the internet. It''s built by diverse
    researchers and prompt engineers, offering a solid foundation in prompt engineering
    and covering everything from the basics of AI communication to more advanced techniques.'
  id: totrans-867
  prefs: []
  type: TYPE_NORMAL
  zh: Learnprompting.org：被誉为互联网上最大和最全面的提示工程课程之一。它由多元化的研究人员和提示工程师构建，提供了提示工程的坚实基础，涵盖了从AI通信的基础到更高级技术的一切内容。
- en: 'Real Python Tutorial: Provides a practical example of prompt engineering using
    OpenAI''s GPT models. This tutorial is especially useful for Python developers
    looking to apply prompt engineering techniques to real-world scenarios, covering
    everything from basic prompt design to more complex applications like sentiment
    analysis. It can be found on realpython.com.'
  id: totrans-868
  prefs: []
  type: TYPE_NORMAL
  zh: Real Python教程：提供了一个使用OpenAI的GPT模型进行提示工程的实际示例。本教程对于希望将提示工程技术应用于现实场景的Python开发者特别有用，涵盖了从基本的提示设计到更复杂的应用（如情感分析）的一切内容。可以在realpython.com找到。
- en: 'FreeCodeCamp''s Full Course on Prompt Engineering: This course is available
    on the freeCodeCamp.org YouTube channel. It focuses on understanding prompt engineering
    strategies to enhance the effectiveness of Large Language Models (LLMs) like ChatGPT,
    making it ideal for those looking to diversify their AI skills.'
  id: totrans-869
  prefs: []
  type: TYPE_NORMAL
  zh: FreeCodeCamp的提示工程完整课程：本课程可在freeCodeCamp.org YouTube频道上找到。它侧重于理解提示工程策略以增强大型语言模型（LLMs）如ChatGPT的有效性，对于那些希望多样化他们的AI技能的人来说是理想的。
- en: 'Udemy''s Complete Prompt Engineering for AI Bootcamp (2024): This course teaches
    practical coding skills for working with AI, including GPT-4, and covers the "Five
    Principles of Prompting." It''s updated monthly with fresh content, ensuring learners
    stay on top of the latest in AI and prompt engineering.'
  id: totrans-870
  prefs: []
  type: TYPE_NORMAL
  zh: Udemy的AI Bootcamp完整课程（2024年）：本课程教授与AI（包括GPT-4）一起工作的实用编码技能，并涵盖“提示的五大原则”。它每月更新新鲜内容，确保学习者跟上AI和提示工程领域的最新动态。
- en: 'PromptPerfect by Jina AI: A dynamic tool designed to optimize your interactions
    with AI models, especially in prompt engineering. PromptPerfect guides users through
    the process of crafting effective prompts that improve the accuracy and relevance
    of AI responses. It''s a practical resource for anyone looking to refine their
    skills in prompt engineering, offering insights into the methodology behind effective
    prompt creation. It can be found on promptperfect.jina.ai.'
  id: totrans-871
  prefs: []
  type: TYPE_NORMAL
  zh: Jina AI的PromptPerfect：一个旨在优化您与人工智能模型交互的动态工具，尤其是在提示工程方面。PromptPerfect引导用户通过制作有效的提示来提高人工智能响应的准确性和相关性。它是一个实用的资源，为那些想要提高提示工程技能的人提供见解，并揭示了有效提示创建背后的方法论。它可以在promptperfect.jina.ai找到。
- en: 'Civitai on Discord: A large resource-sharing hub for the Generative AI art
    community, offering free, open-source resources and continuous improvements.'
  id: totrans-872
  prefs: []
  type: TYPE_NORMAL
  zh: Discord上的Civitai：一个大型资源分享中心，为生成人工智能艺术社区提供免费、开源资源以及持续改进。
- en: 'r/ChatGPT on Reddit: A forum to discuss everything about ChatGPT, not officially
    affiliated with OpenAI but a vibrant community for sharing insights and questions.'
  id: totrans-873
  prefs: []
  type: TYPE_NORMAL
  zh: Reddit上的r/ChatGPT：一个讨论ChatGPT所有内容的论坛，非官方与OpenAI关联，但是一个分享见解和提问的活跃社区。
- en: 'Awesome ChatGPT Prompts on GitHub: An extensive collection of ChatGPT prompts
    to explore and experiment with. It is a valuable resource that compiles a diverse
    range of prompts across different themes and applications, perfect for those looking
    to dive deeper into the capabilities of ChatGPT.'
  id: totrans-874
  prefs: []
  type: TYPE_NORMAL
  zh: GitHub上的出色ChatGPT提示：一个广泛的ChatGPT提示集合，用于探索和实验。这是一个宝贵的资源，汇集了不同主题和应用的不同提示，非常适合那些想要深入了解ChatGPT能力的人。
- en: Glossary of Technical Terms Used in the Book
  id: totrans-875
  prefs: []
  type: TYPE_NORMAL
  zh: 书中使用的术语表
- en: This glossary provides definitions for key technical terms encountered throughout
    the book. It's designed to help you understand fundamental concepts related to
    AI and prompt engineering.
  id: totrans-876
  prefs: []
  type: TYPE_NORMAL
  zh: 本词汇表提供了全书遇到的关键技术术语的定义。它旨在帮助您理解与人工智能和提示工程相关的基本概念。
- en: 'Artificial Intelligence (AI): The simulation of human intelligence processes
    by machines, particularly computer systems. These processes include learning (acquiring
    information and rules to use the information), reasoning (using rules to reach
    approximate or definite conclusions), and self-correction. AI encompasses various
    technologies, including NLP, machine learning, and robotics.'
  id: totrans-877
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 人工智能（AI）：通过机器模拟人类智能过程，尤其是计算机系统。这些过程包括学习（获取信息和规则以使用信息）、推理（使用规则得出近似或确定的结论）和自我校正。人工智能包括各种技术，如自然语言处理、机器学习和机器人技术。
- en: 'Attention Mechanism: A feature in neural networks that allows models to focus
    on different parts of their input for generating a response, improving the accuracy
    of tasks like translation and content generation.'
  id: totrans-878
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 注意力机制：神经网络中的一个特性，允许模型在生成响应时关注其输入的不同部分，提高翻译和内容生成等任务的准确性。
- en: 'Autoregressive Text Generation: A process where models generate text by predicting
    the next word in a sequence based on the previous ones, often used in language
    models like GPT.'
  id: totrans-879
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 自回归文本生成：一种模型通过根据前一个序列中的单词预测下一个单词来生成文本的过程，常用于像GPT这样的语言模型。
- en: 'Bias in AI: Systematic and unfair discrepancies in AI decisions, reflecting
    existing societal prejudices arising from factors like biased data or subjective
    human decision-making in AI development.'
  id: totrans-880
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 人工智能中的偏差：人工智能决策中的系统性和不公平的差异，反映了由数据偏差或人工智能开发中的人类决策的主观性等因素引起的社会偏见。
- en: 'Data Protection: Policies and practices ensuring the privacy and security of
    personal data against unauthorized access, use, or disclosure, especially in digital
    formats.'
  id: totrans-881
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 数据保护：确保个人数据隐私和安全的政策和实践，防止未经授权的访问、使用或披露，尤其是在数字格式中。
- en: 'Embeddings: Numerical representations of words or tokens that capture their
    meaning, context, relationships, and properties in a vector space, used in natural
    language processing.'
  id: totrans-882
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 嵌入：在向量空间中捕获单词或标记的意义、上下文、关系和属性数值表示，用于自然语言处理。
- en: 'Generative Pretrained Transformer (GPT): An advanced type of large language
    model developed by OpenAI. GPT models are pre-trained on diverse internet text
    and fine-tuned for specific tasks, enabling them to generate coherent, contextually
    relevant text based on prompts.'
  id: totrans-883
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 生成预训练变换器（GPT）：由OpenAI开发的一种高级大型语言模型。GPT模型在多样化的互联网文本上预训练，并针对特定任务进行微调，使它们能够根据提示生成连贯、上下文相关的文本。
- en: 'Large Language Models (LLM): Advanced AI models trained on vast datasets to
    understand and generate human-like text, capable of answering questions and creating
    content across various topics.'
  id: totrans-884
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 大型语言模型（LLM）：在大量数据集上训练的高级AI模型，能够理解和生成类似人类的文本，能够回答问题并创建涵盖各种主题的内容。
- en: 'Machine Learning: A subset of AI that enables systems to learn and improve
    automatically from experience without being explicitly programmed, using algorithms
    to parse data, learn from it, and make decisions.'
  id: totrans-885
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 机器学习：AI的一个子集，它使系统能够从经验中自动学习和改进，而不需要明确编程，使用算法解析数据、从中学习并做出决策。
- en: 'Natural Language Processing (NLP): A branch of AI focused on the interaction
    between computers and humans using natural language, aiming to read, understand,
    and make sense of human languages in a valuable manner.'
  id: totrans-886
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 自然语言处理（NLP）：AI的一个分支，专注于计算机与人类使用自然语言的交互，旨在以有价值的方式阅读、理解和理解人类语言。
- en: 'Neural Networks: Computer systems modeled on the human brain''s network of
    neurons. These models are used to recognize patterns and solve complex problems
    in areas including image and speech recognition, medical diagnosis, and AI. Neural
    networks consist of layers of nodes, or "neurons," that process inputs and pass
    their outputs to subsequent layers.'
  id: totrans-887
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 神经网络：基于人类大脑神经元网络的计算机系统。这些模型用于识别模式并解决包括图像和语音识别、医疗诊断和AI在内的复杂问题。神经网络由处理输入并将输出传递给后续层的节点或“神经元”层组成。
- en: 'Prompt: A user-provided input or instruction to an AI model designed to elicit
    a specific response or output based on the model''s training.'
  id: totrans-888
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提示：用户提供给AI模型的输入或指令，旨在根据模型的学习产生特定的响应或输出。
- en: 'Prompt Engineering: The practice of designing and refining the inputs given
    to AI models, particularly LLMs like GPT, to elicit specific desired outputs.
    This involves strategically crafting prompts to guide the AI in generating accurate,
    relevant, and creative responses.'
  id: totrans-889
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提示工程：设计和改进提供给AI模型（尤其是GPT等LLM）的输入的实践，以产生特定的期望输出。这涉及策略性地构建提示来引导AI生成准确、相关和创造性的响应。
- en: 'Reinforcement Learning from Human Feedback (RLHF): A training approach combining
    reinforcement learning algorithms and human feedback to fine-tune AI models, enhancing
    their performance and alignment with human preferences.'
  id: totrans-890
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 来自人类反馈的强化学习（RLHF）：一种结合强化学习算法和人类反馈的训练方法，用于微调AI模型，提高其性能并与人类偏好保持一致。
- en: 'Robotics: The branch of technology that designs, constructs, operates, and
    uses robots, combining disciplines like mechanical and electrical engineering,
    and computer science to create machines that can assist or replicate human actions.'
  id: totrans-891
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 机器人技术：设计、构建、操作和使用机器人的技术分支，结合机械和电气工程以及计算机科学，以创建能够协助或复制人类行为的机器。
- en: 'Sentiment Analysis: A technique used in NLP to identify, extract, and quantify
    subjective information from text data. It determines the sentiment expressed in
    a piece of text, categorizing it as positive, negative, or neutral.'
  id: totrans-892
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 情感分析：在NLP中使用的技巧，用于从文本数据中识别、提取和量化主观信息。它确定文本中表达的情感，将其分类为正面、负面或中性。
- en: 'Token: The smallest unit of processing in NLP, which can be a word, part of
    a word, or a symbol, used as input for language models.'
  id: totrans-893
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 令牌：NLP中最小的处理单元，可以是单词、单词的一部分或符号，用作语言模型的输入。
- en: Encouragement to Engage with the Prompt Engineering Community
  id: totrans-894
  prefs: []
  type: TYPE_NORMAL
  zh: 鼓励参与提示工程社区
- en: Embarking on a journey into AI, ChatGPT, and prompt engineering is about becoming
    part of a vibrant, evolving community. As you delve deeper into these fields,
    remember that the landscape of AI is as much about collaboration and shared learning
    as it is about technological advancements. Engaging with the prompt engineering
    community can exponentially enhance your understanding, skills, and enthusiasm
    for AI.
  id: totrans-895
  prefs: []
  type: TYPE_NORMAL
  zh: 开始探索AI、ChatGPT和提示工程之旅，意味着成为充满活力、不断发展的社区的一部分。当你深入这些领域时，请记住，AI的领域不仅关乎技术进步，也关乎协作和共同学习。与提示工程社区互动可以指数级地增强你对AI的理解、技能和热情。
- en: Communities, whether found on forums like Reddit, Discord channels, or specialized
    platforms like GitHub, offer invaluable resources. Here, you can find prompt libraries
    shared by others, discussions on best practices, and solutions to common challenges.
    Participating in these communities broadens your knowledge base and connects you
    with like-minded people who share your passion for AI and innovation.
  id: totrans-896
  prefs: []
  type: TYPE_NORMAL
  zh: 社区，无论是在Reddit、Discord频道还是在GitHub等专门平台上找到的，都提供了宝贵的资源。在这里，您可以找到他人分享的提示库，讨论最佳实践，以及解决常见挑战的解决方案。参与这些社区可以拓宽您的知识库，并让您与有共同兴趣、热爱AI和创新的人建立联系。
- en: Moreover, continuous learning is key in a field as dynamic as AI. The technology
    evolves rapidly, with new models, applications, and ethical considerations emerging
    regularly. Staying engaged with the community keeps you at the forefront of these
    developments. It encourages a culture of lifelong learning, where each discovery
    or advancement drives you to explore further.
  id: totrans-897
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，在如此动态的AI领域，持续学习至关重要。技术迅速发展，新的模型、应用和伦理考量不断涌现。与社区保持互动让您始终处于这些发展的前沿。它鼓励终身学习的文化，每一次发现或进步都驱使您进一步探索。
- en: Take advantage of workshops, webinars, and conferences that bring together AI
    enthusiasts, researchers, and professionals. These events can provide deep insights
    into specific topics, offering insights not always available in online forums
    or publications. They also present networking opportunities that can lead to collaborations,
    projects, or even career advancements.
  id: totrans-898
  prefs: []
  type: TYPE_NORMAL
  zh: 利用研讨会、网络研讨会和会议，这些活动将人工智能爱好者、研究人员和专业人士聚集在一起。这些活动可以提供对特定主题的深入见解，提供在线论坛或出版物中不总是可用的见解。它们还提供了可以导致合作、项目或甚至职业发展的网络机会。
- en: Finally, remember that your journey into AI and prompt engineering is a contribution
    to the field. Your questions, experiments, successes, and even failures enrich
    the community's collective knowledge. By engaging, sharing, and collaborating,
    you help shape the future of AI, making it more inclusive, innovative, and impactful.
  id: totrans-899
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，请记住，您在人工智能和提示工程领域的旅程是对这一领域的贡献。您的问题、实验、成功，甚至失败，都丰富了社区的集体知识。通过参与、分享和协作，您帮助塑造了人工智能的未来，使其更加包容、创新和有影响力。
- en: So, I encourage you to dive in, connect, share, and continue learning. The world
    of AI is vast and filled with opportunities. Your engagement with the community
    fuels your growth and contributes to the broader development of ethical and effective
    AI technologies.
  id: totrans-900
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我鼓励您深入其中，建立联系，分享，并继续学习。人工智能的世界广阔无垠，充满了机遇。您与社区的互动推动了您的成长，并为道德和有效的AI技术的更广泛发展做出了贡献。
- en: THANK YOU
  id: totrans-901
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 谢谢
- en: Dear Reader,
  id: totrans-902
  prefs: []
  type: TYPE_NORMAL
  zh: 亲爱的读者，
- en: As we conclude our exploration, I wish to express my sincere gratitude for joining
    me on this journey. Your curiosity has brought this adventure to life.
  id: totrans-903
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们结束探索之际，我想表达我对您加入这一旅程的衷心感谢。您的好奇心让这次冒险变得生动。
- en: 'If this guide has enriched your knowledge, I kindly ask for a moment of your
    time to leave a review on Amazon. You can do so by simply scanning the QR code
    below: ![Review QR code ](image_rsrc3ZE.jpg)'
  id: totrans-904
  prefs: []
  type: TYPE_NORMAL
  zh: 如果本指南丰富了您的知识，我恳请您抽出一点时间在亚马逊上留下评论。您可以通过简单地扫描下面的二维码来完成：![评论二维码](image_rsrc3ZE.jpg)
- en: Your insights are invaluable in aiding my growth as an author and also helping
    guide fellow seekers on their path to discovery.
  id: totrans-905
  prefs: []
  type: TYPE_NORMAL
  zh: 您的见解对于帮助我作为作者的成长以及指导其他探索者发现之路至关重要。
- en: Thank you once again for your support. Felix
  id: totrans-906
  prefs: []
  type: TYPE_NORMAL
  zh: 再次感谢您的支持。Felix
- en: Conclusion
  id: totrans-907
  prefs: []
  type: TYPE_NORMAL
  zh: 结论
- en: Reflections on the Journey
  id: totrans-908
  prefs: []
  type: TYPE_NORMAL
  zh: 对旅程的反思
- en: As we reach the end of this guide, it's worth taking a moment to reflect on
    the journey we've embarked upon together. Starting with the basics of ChatGPT,
    we've traversed through the nuances of prompt engineering, unlocking the secrets
    to crafting effective prompts that harness the full potential of this groundbreaking
    AI. Through each chapter, we've built a foundation, layer by layer, turning the
    initially daunting task of prompt engineering into a manageable, even enjoyable,
    endeavor.
  id: totrans-909
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们到达本指南的结尾时，花一点时间反思我们共同踏上的旅程是值得的。从ChatGPT的基础知识开始，我们穿越了提示工程的微妙之处，揭开了制作有效提示以发挥这一开创性人工智能全部潜能的秘密。在每一章中，我们一层层地构建了基础，将最初令人生畏的提示工程任务转变为可管理的，甚至是有趣的尝试。
- en: We began by demystifying ChatGPT, exploring its history, workings, and the revolutionary
    role of large language models in AI. Chapter by chapter, we delved deeper, from
    crafting your first prompt with clarity and intent to mastering advanced techniques
    that bring sophistication to your interactions with ChatGPT. Along the way, we
    explored the innovative features of ChatGPT and introduced the concept of Custom
    GPTs, opening up new avenues for personalized AI applications.
  id: totrans-910
  prefs: []
  type: TYPE_NORMAL
  zh: 我们从揭示ChatGPT的神秘面纱开始，探讨了其历史、工作原理以及大型语言模型在人工智能中的革命性作用。一章接一章，我们深入探讨，从用清晰和意图明确地编写你的第一个提示到掌握与ChatGPT互动的高级技巧，使你的互动更加精致。在这个过程中，我们探索了ChatGPT的创新功能，并介绍了自定义GPT的概念，为个性化人工智能应用开辟了新的途径。
- en: Your journey through the chapters was designed to inspire you to experiment,
    refine your approach, and view challenges as opportunities for growth. The iterative
    process of crafting, testing, and refining prompts mirrors the broader journey
    of learning and adaptation. This journey doesn't end with the closing of this
    book but continues as you apply these insights.
  id: totrans-911
  prefs: []
  type: TYPE_NORMAL
  zh: 您在章节中的旅程旨在激发您进行实验，完善您的策略，并将挑战视为成长的机会。编写、测试和改进提示的迭代过程与更广泛的学习和适应之旅相呼应。这本书的结尾并不意味着这段旅程的结束，而是当你应用这些见解时，它将继续下去。
- en: As we reflect on this journey, it's important to recognize the power of the
    knowledge you've acquired. Prompt engineering is not just about interacting with
    an AI; it's about thinking critically, asking the right questions, and continuously
    striving for better, more meaningful interactions. Once honed, prompt engineering
    can unlock not just the capabilities of ChatGPT but also a deeper understanding
    of how we communicate with and through technology.
  id: totrans-912
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们反思这段旅程时，认识到你获得的知识的力量是很重要的。提示工程不仅仅是与人工智能互动；它关乎批判性思维，提出正确的问题，并不断追求更好、更有意义的互动。一旦磨练，提示工程不仅能解锁ChatGPT的能力，还能更深入地理解我们如何通过技术进行沟通。
- en: So, as you move forward, remember that each prompt you craft is a step in your
    ongoing journey of exploration and discovery in the ever-evolving landscape of
    artificial intelligence.
  id: totrans-913
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，当你继续前进时，请记住，你编写的每一个提示都是你在人工智能不断演变的领域中探索和发现之旅中的一步。
- en: The Future of AI and Prompt Engineering
  id: totrans-914
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能与提示工程的未来
- en: As we contemplate the future of AI and prompt engineering, we're on the cusp
    of groundbreaking advancements with developments like OpenAI's Sora and the anticipated
    arrival of GPT-5\. Sora represents a significant leap forward, introducing a text-to-video
    model that enables the generation of videos from descriptive prompts. This model,
    which has not yet been released to the public at the time of writing, can create
    videos by extending existing footage or generating new content from still images,
    showcasing an impressive capacity for creative video production.
  id: totrans-915
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们思考人工智能和提示工程的未来时，我们正处于突破性进展的前沿，这得益于OpenAI的Sora以及GPT-5的预期到来。Sora代表了一个重大的飞跃，引入了一种从描述性提示生成视频的文本到视频模型。这个模型在撰写本文时尚未向公众发布，可以通过扩展现有视频或从静态图像生成新内容来创建视频，展示了其在创意视频制作方面的惊人能力。
- en: Sora's unique approach combines diffusion models with a transformer architecture,
    facilitating the generation of the high-level layout of video frames and the intricate
    details within those frames. This blend allows Sora to maintain temporal consistency
    across video frames, ensuring that moving objects remain consistent even as they
    move in and out of view. Furthermore, it employs a recaptioning technique to enhance
    the fidelity of videos, allowing it to capture the essence of prompts with remarkable
    accuracy.
  id: totrans-916
  prefs: []
  type: TYPE_NORMAL
  zh: Sora的独特方法结合了扩散模型和Transformer架构，这有助于生成视频帧的高级布局以及这些帧内的复杂细节。这种结合使得Sora能够在视频帧之间保持时间一致性，确保移动物体在进入和离开视野时保持一致性。此外，它还采用了一种重新描述技术来提高视频的保真度，使其能够以惊人的准确性捕捉提示的本质。
- en: As we look even further ahead, the anticipation around GPT-5 suggests a continued
    evolution toward even more sophisticated and capable AI models. While specific
    details about GPT-5 remain speculative at this point, the trajectory of advancements
    from GPT-3 to GPT-4, and now towards GPT-5, hints at enhanced understanding, greater
    contextual awareness, and perhaps even more nuanced interactions between AI and
    users.
  id: totrans-917
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们展望更远的未来时，对GPT-5的期待表明了向更加复杂和有能力的人工智能模型持续演进的态势。虽然关于GPT-5的具体细节目前仍属推测，但从GPT-3到GPT-4，再到现在的GPT-5的进步轨迹，暗示了增强的理解力、更大的上下文意识，以及AI与用户之间可能更加细腻的互动。
- en: The developments of Sora and the progression towards GPT-5 underscore the rapid
    pace of innovation in AI. These advancements promise to expand the possibilities
    of creative expression, information synthesis, and problem-solving, offering tools
    that are more powerful, intuitive, and accessible to a broader audience. As these
    technologies evolve, they challenge us to reimagine the boundaries of what's possible,
    pushing us to explore new horizons in AI and prompt engineering.
  id: totrans-918
  prefs: []
  type: TYPE_NORMAL
  zh: Sora的发展以及向GPT-5的迈进突显了人工智能创新速度的快速。这些进步承诺将扩展创造性表达、信息综合和问题解决的可能性，为更强大、更直观、更易于更广泛受众使用的工具提供支持。随着这些技术的演变，它们挑战我们重新想象可能性的边界，推动我们在人工智能和提示工程的新领域探索新的前沿。
- en: 'Final Words: Empowering Through Knowledge'
  id: totrans-919
  prefs: []
  type: TYPE_NORMAL
  zh: 最后的话：通过知识赋权
- en: In our final words, we look back on a journey focused on the art of prompt engineering
    with ChatGPT. My aim has been to inform and empower you with knowledge—a tool
    that opens doors to limitless possibilities.
  id: totrans-920
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们最后的言语中，我们回顾了专注于ChatGPT提示工程艺术的旅程。我的目标一直是通过知识来告知和赋权你们——这是一个开启无限可能性的工具。
- en: As we stand on the brink of AI's ever-expanding future, the knowledge you've
    acquired through this book is your key to unlocking those possibilities. The potential
    of AI, from the current capabilities of ChatGPT to the anticipated innovations
    of Sora and GPT-5, hints at a future where the boundaries between human creativity
    and artificial intelligence blur, fostering a new era of collaboration that we're
    just beginning to envision.
  id: totrans-921
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们站在人工智能不断扩展的未来边缘时，通过这本书你获得的知识是解锁这些可能性的钥匙。从ChatGPT的当前能力到Sora和GPT-5预期的创新，人工智能的潜力预示着一个未来，在那里人类创造力和人工智能之间的界限变得模糊，孕育着一个我们刚开始构想的新的合作时代。
- en: I encourage you to be active participants in this unfolding narrative. With
    the foundations in this book, challenge yourself to craft prompts that reflect
    the depth of your understanding, your creativity, and the height of your aspirations.
    Let the knowledge you've gained empower you to navigate the ever-evolving landscape
    of AI with confidence, curiosity, and a sense of responsibility.
  id: totrans-922
  prefs: []
  type: TYPE_NORMAL
  zh: 我鼓励你积极参与这个正在展开的故事。凭借这本书中的基础，挑战自己构建反映你理解深度、创造力和抱负高度的提示。让你所获得的知识赋权你，以自信、好奇心和责任感来导航人工智能不断变化的景观。
- en: Each question you ask and every prompt you craft enrich the dialogue between
    humans and AI. This interaction is a testament to the power of learning, the importance
    of asking the right questions, and the incredible potential that lies in the answers.
    So, I invite you to continue this conversation with ChatGPT, armed with your insights,
    questions, and readiness to explore the unknown.
  id: totrans-923
  prefs: []
  type: TYPE_NORMAL
  zh: 你提出的每个问题和构建的每个提示都丰富了人类与人工智能之间的对话。这种互动是对学习力量的证明，提出正确问题的重要性，以及答案中蕴含的巨大潜力。因此，我邀请你带着你的见解、问题和准备探索未知的心态，继续与ChatGPT进行这次对话。
- en: In the end, this book is but a stepping stone on your journey with AI. The real
    adventure begins with your next prompt and your next discovery. Empowered through
    knowledge, may you navigate this exciting frontier with wisdom, creativity, and
    an unwavering commitment to ethical principles. Here's to the journey ahead—may
    it be as enlightening as it is endless.
  id: totrans-924
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，这本书只是你在人工智能旅程中的一个垫脚石。真正的冒险从你的下一个提示和你的下一个发现开始。通过知识的赋权，愿你在这个激动人心的前沿地带以智慧、创造力和对道德原则坚定不移的承诺来导航。为即将到来的旅程干杯——愿它既启迪人心又永无止境。
