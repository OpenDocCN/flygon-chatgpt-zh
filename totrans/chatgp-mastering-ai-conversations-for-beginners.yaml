  id: totrans-1061
  prefs: []
  type: TYPE_NORMAL
  zh: '**对话式AI**的兴起不仅让用户界面更加直观和人性化，而且还让它们比以往任何时候都更容易访问。在过去，如果你在视觉、身体、认知或听觉方面有任何障碍，网站和应用都非常难以导航和使用。全世界约有16%的人口生活在某种形式的残疾中（据2023年统计），这使得大量的人无法参与到我们日益科技化的世界中。对话式AI虽然不能完全解决这个可访问性问题（至少目前还不能），但它正在增强残疾人士获取更多互联网资源的能力，比以往任何时候都要多。'
