- en: • Generate an onboarding email for customers after they have made a purchase.
    The email should start with a greeting that includes the customer's name, express
    gratitude for their purchase of **[insert your
  id: totrans-289
  prefs: []
  type: TYPE_NORMAL
- en: product/service name]**, and provide a list of recommended onboarding steps,
    including **[insert your first step],** **[insert your second step]**, and **[insert
    your third step]**. The email should also offer assistance from your team and
    provide contact information for them to get in touch, including **[insert your
    preferred method of contact]** and **[insert your team's email address or phone
    number]**. Use **[insert your name]** as the signoff for the email.
  id: totrans-290
  prefs: []
  type: TYPE_NORMAL
- en: • Write a welcome email to my customers after they purchased **[name of the
    product]**.
  id: totrans-291
  prefs: []
