- en: Introduction to ChatGPT Hacks
  id: totrans-36
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: ChatGPT技巧入门
- en: ChatGPT, developed by OpenAI, is a powerful language model capable of generating
    human-like text. Understanding how to harness its full potential can significantly
    improve the efficiency and effectiveness of your projects. In this chapter, we'll
    explore some advanced techniques and hacks to maximize ChatGPT's utility.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT是由OpenAI开发的，是一个强大的语言模型，能够生成类似人类的文本。了解如何充分利用其全部潜力可以显著提高你项目的效率和效果。在本章中，我们将探讨一些高级技术和技巧，以最大化ChatGPT的实用性。
- en: Optimizing Prompt Engineering
  id: totrans-38
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 优化提示工程
- en: Prompt engineering is the art of crafting inputs that yield the best possible
    outputs from ChatGPT. This involves careful consideration of how prompts are structured
    and worded.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 提示工程是制作出ChatGPT最佳输出的艺术。这涉及到对提示的结构和措辞的仔细考虑。
- en: Clear and Specific Instructions
  id: totrans-40
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 清晰具体的指令
- en: When instructing ChatGPT, specificity is key. For instance, instead of asking
    a vague question, provide clear context and desired outcomes.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 当指导ChatGPT时，具体性是关键。例如，与其提出一个模糊的问题，不如提供清晰的环境和期望的结果。
- en: // Less effective prompt
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: // 较低效的提示
- en: '"Tell me about Python."'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: '"告诉我关于Python的信息。"'
- en: // More effective prompt
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: // 更有效的提示
- en: '"Provide a summary of Python''s history and its most notable features."'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: '"提供Python的历史总结及其最显著的特点。"'
- en: Using System Messages
  id: totrans-46
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 使用系统消息
- en: Utilize system messages to set the behavior or tone of the ChatGPT responses.
    This can be particularly useful in maintaining consistency across interactions.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 利用系统消息来设置ChatGPT响应的行为或语气。这在保持交互一致性方面特别有用。
- en: '{'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: '{'
- en: '"role": "system",'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: '"role": "system",'
- en: '"content": "You are a helpful assistant that provides concise and accurate
    information."'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: '"content": "你是一个提供简洁准确信息的有帮助的助手。"'
- en: '}'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: '}'
- en: Controlling Response Length
  id: totrans-52
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 控制响应长度
- en: One common challenge is controlling the length of responses. ChatGPT can be
    instructed to provide brief or detailed answers based on the requirements.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 一个常见的挑战是控制响应的长度。ChatGPT可以根据需求被指示提供简短或详细的答案。
- en: Adjusting Verbosity
  id: totrans-54
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 调整详尽程度
- en: Specify the desired length directly in your prompt.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 直接在提示中指定所需的长度。
- en: // Requesting a brief response
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: // 请求简短响应
- en: '"Explain recursion in programming in a few sentences."'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: '"用几句话解释编程中的递归。"'
- en: // Requesting a detailed response
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: // 请求详细响应
- en: '"Provide a comprehensive explanation of recursion in programming with examples."'
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: '"提供编程中递归的全面解释，包括示例。"'
- en: Handling Ambiguity
  id: totrans-60
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 处理模糊性
- en: Ambiguity in prompts can lead to unintended responses. It's crucial to predict
    areas of potential confusion and clarify them within the prompt.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 提示中的模糊性可能导致意外的响应。预测潜在的混淆区域并在提示中澄清它们至关重要。
- en: Clarifying Ambiguous Queries
  id: totrans-62
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 澄清模糊查询
- en: When asking a question that can have multiple interpretations, specify the context
    or area of focus.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 当提出可能有多种解释的问题时，请指定上下文或关注领域。
- en: // Ambiguous prompt
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: // 模糊提示
- en: '"Explain Java."'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: '"解释Java。"'
- en: // Clarified prompt
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: // 清晰的提示
- en: '"Explain the Java programming language, including its primary uses and advantages."'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: '"解释Java编程语言，包括其主要用途和优势。"'
- en: Utilizing Temperature Settings
  id: totrans-68
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 利用温度设置
- en: The temperature parameter controls the randomness of ChatGPT's responses. Lower
    values make the output more deterministic, while higher values increase variability.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 温度参数控制ChatGPT响应的随机性。较低的值使输出更确定，而较高的值增加变异性。
- en: Setting the Temperature
  id: totrans-70
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 设置温度
- en: Choose a temperature setting that aligns with your project goals.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 选择与项目目标相符的温度设置。
- en: // Deterministic response
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: // 确定性响应
- en: '"Set temperature to 0.2 for factual and concise answers."'
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: '"将温度设置为0.2以获得事实性和简洁的答案。"'
- en: // Creative response
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: // 创造性响应
- en: '"Set temperature to 0.8 for more creative or exploratory answers."'
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: '"将温度设置为0.8以获得更具创造性和探索性的答案。"'
- en: Conclusion
  id: totrans-76
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 结论
- en: By mastering these hacks and techniques, you can significantly enhance the performance
    and reliability of ChatGPT in your applications. Whether it's through effective
    prompt engineering, managing response length, or setting appropriate temperature
    levels, these strategies will enable you to leverage the full capabilities of
    ChatGPT.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 通过掌握这些技巧和技术，你可以显著提高ChatGPT在应用中的性能和可靠性。无论是通过有效的提示工程、管理响应长度还是设置适当的温度级别，这些策略都将使你能够充分利用ChatGPT的全部功能。
- en: Using Short Prompts for Fast Results
  id: totrans-78
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 使用简短提示快速获得结果
- en: Introduction to Short Prompts
  id: totrans-79
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 简短提示简介
- en: Short prompts are concise instructions or queries used to quickly obtain specific
    results from a system or program. They are particularly useful in environments
    where time and precision are critical, such as command-line interfaces or when
    interacting with AI models.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 简短提示是简洁的指令或查询，用于快速从系统或程序中获得特定结果。它们在时间和精度至关重要的环境中特别有用，例如命令行界面或与AI模型交互时。
- en: Benefits of Short Prompts
  id: totrans-81
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 简短提示的好处
- en: 'Efficiency:  Short prompts reduce the time needed to communicate with a system,
    enabling faster responses.'
  id: totrans-82
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 效率：简短提示减少了与系统通信所需的时间，从而实现更快的响应。
- en: 'Clarity:  They focus on essential details, minimizing ambiguity and potential
    misunderstandings.'
  id: totrans-83
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 清晰性：它们关注关键细节，最大限度地减少模糊性和可能的误解。
- en: 'Resource Management:  By limiting the scope of a task, short prompts help in
    efficient resource allocation.'
  id: totrans-84
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 资源管理：通过限制任务的范围，简短提示有助于有效分配资源。
- en: Designing Effective Short Prompts
  id: totrans-85
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 设计有效的简短提示
- en: 'When crafting short prompts, consider the following strategies:'
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 当制作简短的提示时，请考虑以下策略：
- en: 1\. Be Direct
  id: totrans-87
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1. 直接
- en: Use straightforward language to convey your request. Avoid unnecessary words
    that do not add value.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 使用直接的语言来表达你的请求。避免使用不必要的、不增加价值的词语。
- en: 2\. Specify Context
  id: totrans-89
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2. 指定上下文
- en: 'Include enough context to ensure the system understands the scope and objective
    of the prompt. For example:'
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 提供足够的信息以确保系统理解提示的范围和目标。例如：
- en: Find files created after January 2021
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 查找2021年1月之后创建的文件
- en: 3\. Use Action Words
  id: totrans-92
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3. 使用行动词
- en: Incorporate verbs that clearly define the action you want taken, such as "list,"
    "create," or "update."
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 结合动词，明确定义你想要采取的行动，例如“列出”、“创建”或“更新”。
- en: Examples of Short Prompts
  id: totrans-94
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 短提示示例
- en: 'Example 1: Command-Line Interfaces'
  id: totrans-95
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 示例 1：命令行界面
- en: 'Consider a scenario where you need to list all files in a directory:'
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑一个场景，你需要列出目录中的所有文件：
- en: ls
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: ls
- en: This simple command provides a quick listing of files without additional information.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 这个简单的命令提供了快速列出文件的功能，不包含额外信息。
- en: 'Example 2: Database Queries'
  id: totrans-99
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 示例 2：数据库查询
- en: 'To retrieve specific data from a database, a short SQL prompt might look like:'
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 要从数据库中检索特定数据，一个简短的SQL提示可能如下所示：
- en: SELECT name FROM employees WHERE department = 'Sales';
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: SELECT name FROM employees WHERE department = 'Sales';
- en: This query succinctly retrieves names of all employees in the Sales department.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 此查询简洁地检索销售部门的员工姓名。
- en: Conclusion
  id: totrans-103
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: Short prompts are powerful tools for obtaining fast results when interacting
    with systems. By focusing on clarity and brevity, you can enhance efficiency and
    productivity in your workflow. Practice crafting these prompts to improve your
    skills in various technical environments.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 简短的提示是获取快速结果的强大工具，当与系统交互时。通过关注清晰和简洁，你可以提高你的工作流程中的效率和生产力。练习制作这些提示以提升你在各种技术环境中的技能。
- en: Saving Your Best Prompts
  id: totrans-105
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 保存你的最佳提示
- en: Introduction to Prompt Management
  id: totrans-106
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 提示管理简介
- en: In the world of software development, especially with the rise of AI and machine
    learning, prompts play a crucial role in interacting with models. Saving and managing
    these prompts efficiently can enhance productivity and ensure consistency across
    projects.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 在软件开发的世界里，尤其是在人工智能和机器学习的兴起中，提示在模型交互中起着至关重要的作用。有效地保存和管理这些提示可以提高生产力并确保项目之间的连贯性。
- en: Why Save Prompts?
  id: totrans-108
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 为什么保存提示？
- en: 'There are several reasons to save your best prompts:'
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 保存最佳提示有几种原因：
- en: 'Reusability:  Good prompts can be reused across different projects, saving
    time.'
  id: totrans-110
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 可重用性：好的提示可以在不同的项目中重用，节省时间。
- en: 'Consistency:  Ensures uniformity in interactions with AI models.'
  id: totrans-111
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一致性：确保与AI模型交互的统一性。
- en: 'Optimization:  Allows you to iterate and improve prompts over time.'
  id: totrans-112
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 优化：允许你随着时间的推移迭代和改进提示。
- en: Methods for Saving Prompts
  id: totrans-113
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 保存提示的方法
- en: 'There are various methods to organize and save your prompts effectively:'
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 有多种方法可以有效地组织和保存你的提示：
- en: 1\. Using a Simple Text File
  id: totrans-115
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1. 使用简单文本文件
- en: This is the simplest way to start. You can create a plain text file where each
    prompt is stored on a new line.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 这是开始的最简单方式。你可以创建一个纯文本文件，其中每个提示存储在新的一行上。
- en: Prompt Examples
  id: totrans-117
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 提示示例
- en: 'Generate a summary of the following text: ...'
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 生成以下文本的摘要：...
- en: 'What are the key insights from: ...'
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 以下文本的关键见解是什么：...
- en: 'Translate the following into French: ...'
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 将以下内容翻译成法语：...
- en: 2\. Using JSON Format
  id: totrans-121
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2. 使用JSON格式
- en: For more structured storage, JSON is a great option. You can save prompts with
    additional metadata.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 为了更结构化的存储，JSON是一个很好的选择。你可以保存带有额外元数据的提示。
- en: '{'
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: '{'
- en: '"prompts": ['
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: '"prompts": ['
- en: '{'
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: '{'
