- en: Save the WDIAnnotatedData.xlsx as csv file, then upload the WDIAnnotatedData.csv
    file into ChatGPT-4 with the Code Interpreter plugin. Use the following prompt,
    and you should obtain results similar to those shown in [Figure 8.11](#fig8-11).
  id: totrans-1250
