  type: TYPE_NORMAL
- en: '*Start with a central image representing [main theme, e.g., ''glowing Earth''].*'
  prefs: []
  type: TYPE_NORMAL
- en: '*Incorporate visuals for [specific elements related to the topic, e.g., ''solar
