  type: TYPE_NORMAL
  zh: '**SQLiteDict（可选）**'
- en: 'SQLiteDict is an open source tool that is a wrapper around sqlite3, and it’s
    downloadable here:'
  id: totrans-1787
  prefs: []
  type: TYPE_NORMAL
  zh: SQLiteDict 是一个开源工具，它是 sqlite3 的包装器，并且可以在此处下载：
