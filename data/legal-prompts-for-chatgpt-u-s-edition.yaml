- en: Sample Prompt Output
  id: totrans-485
  prefs: []
  type: TYPE_NORMAL
  zh: 样本提示输出
- en: 'Prompt:'
  id: totrans-486
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: “Summarise Miranda v. Arizona in plain English.”
  id: totrans-487
  prefs: []
  type: TYPE_NORMAL
  zh: “用通俗易懂的语言总结Miranda v. Arizona案。”
- en: 'Sample AI Output:'
  id: totrans-488
  prefs: []
  type: TYPE_NORMAL
  zh: 样本AI输出：
- en: Miranda v. Arizona (1966) established that anyone arrested must be informed
    of their rights before being questioned by police. These include the right to
    remain silent and the right to an attorney. If the police don’t give this warning,
    statements made may be excluded from court. This ruling created what we now call
    “Miranda Rights.”
  id: totrans-489
  prefs: []
  type: TYPE_NORMAL
  zh: 在Miranda v. Arizona (1966)案中，确立了被捕者在被警方审问之前必须被告知他们的权利。这些权利包括保持沉默的权利和获得律师的权利。如果警方没有给出这个警告，所做的陈述可能会被排除在法庭之外。这项裁决创造了我们现在所说的“米兰达权利”。
