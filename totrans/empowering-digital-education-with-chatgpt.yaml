- en: 4.3.1.5 Country
  id: totrans-906
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 4.3.1.5 国家
- en: The results of the bibliographic coupling analysis revealed that the United
    States of America, Australia, China, the UK, and Germany had the highest number
    of ChatGPT in education research. The distribution of the studies among these
    countries is displayed in [Table 4.3](#ch12.xhtml#t8).
