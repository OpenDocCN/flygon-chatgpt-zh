- en: '[PRE345]'
  prefs: []
  type: TYPE_PRE
- en: '**WHAT IS SQLITE?**'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'SQLite is a light weight, portable, and open source RDBMS that is available
    on Windows, Linux, and MacOS, as well as Android and iOS. The official website
    is here:'
  prefs: []
  type: TYPE_NORMAL
- en: '[*https://www.sqlite.org*](https://www.sqlite.org)'
  prefs: []
  type: TYPE_NORMAL
- en: 'Here is where you can find a tutorial for some of the most commonly used SQLite
    commands:'
  prefs: []
  type: TYPE_NORMAL
- en: '*[https://www.sqlitetutorial.net/sqlite-commands/](https://www.sqlitetutorial.net/sqlite-commands/)*'
  prefs: []
  type: TYPE_NORMAL
- en: In addition, SQLite is ACID-compliant and also implements most SQL standards.
    Let’s look at some features of SQLite and the installation process, both of which
    are discussed in two subsections.
  prefs: []
  type: TYPE_NORMAL
- en: '**SQLite Features**'
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'SQLite provides several useful features, some of which are listed below:'
  prefs: []
  type: TYPE_NORMAL
- en: doesn’t require a separate server process or system to operate
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: no system administration
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: no external dependencies
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: can operate in a serverless environment.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: available in multiple platforms (Unix, Linux, Mac, Windows)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: ACID transactions
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: full support for all features in SQL92
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**SQLite Installation**'
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'Navigate to the following Web site and download the distribution for your operating
    system:'
  prefs: []
  type: TYPE_NORMAL
- en: '*[https://www.sqlite.org/download.html](https://www.sqlite.org/download.html)*'
  prefs: []
  type: TYPE_NORMAL
- en: The second step is to unzip the downloaded file in a convenient location, which
    we’ll assume is the directory $HOME/sqlite3_home.
  prefs: []
  type: TYPE_NORMAL
- en: 'Note that if you have a MacBook then the directory that contains the sqlite3
    executable is automatically in the PATH variable. Just to be sure, type the following
    command to see if the sqlite3 is accessible:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE346]'
  prefs: []
  type: TYPE_PRE
- en: 'If the preceding command returns a blank line, then you need to include the
    path to the bin directory where sqlite3 is located. For example, if the preceding
    directory is $HOME/sqlite3_home/bin, then update the PATH environment variable
    as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE347]'
  prefs: []
  type: TYPE_PRE
