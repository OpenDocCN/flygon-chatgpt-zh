- en: '12'
  prefs: []
  type: TYPE_NORMAL
- en: AI GENERATED VIDEOS - ARE THEY ANY GOOD
  prefs: []
  type: TYPE_NORMAL
- en: Text-to-video AI models are rapidly advancing, enabling businesses and content
    creators to produce professional-grade videos without needing a full crew or technical
    skills. Tools like OpenAI’s Sora and Shengshu Technology’s Vidu and apps like
    Runway and Lightricks’ LTX Studio are leading the charge.
  prefs: []
  type: TYPE_NORMAL
- en: '![open ai sora](image_rsrc206.jpg)'
  prefs: []
  type: TYPE_IMG
- en: But there are already some decent tools to generate videos for some specific
    tasks.
  prefs: []
  type: TYPE_NORMAL
- en: AI-generated videos are great at depicting natural phenomena like fire, weather,
    or city landscapes with impressive realism. They’re also useful for generating
    sweeping, high-level footage—think aerial city views or crowds—that would otherwise
    be time-consuming and costly to capture or create using CGI.
  prefs: []
  type: TYPE_NORMAL
- en: AI models are getting better at maintaining character consistency, meaning unique
    characters maintain their style across frames and scenes. Plus, AI helps manage
    dynamic elements like camera angles, lighting, and motion, enabling video creators
    to bring their storytelling to life exactly as they envision it.
  prefs: []
  type: TYPE_NORMAL
- en: Synthesia ([synthesia.io](http://synthesia.io)) specializes in creating AI videos
    - a good way is to onboard new team members or for mandatory training that you
    go through in companies - these are long, boring, and need to be updated frequently.
    Hence, they are the pretty perfect candidates for AI-generated videos.
  prefs: []
  type: TYPE_NORMAL
- en: '![Synthesia](image_rsrc207.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Creating AI Videos with Runway ML
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '![runwayml](image_rsrc208.jpg)'
  prefs: []
  type: TYPE_IMG
- en: What is Runway ML?
  prefs: []
  type: TYPE_NORMAL
- en: Runway ML ([runwayml.com](http://runwayml.com)) is an AI-powered tool that makes
    video creation and editing easier for everyone—from entrepreneurs to content creators—regardless
    of technical skills. It allows users to create, edit, and animate videos by simply
    describing what they want through text prompts.
  prefs: []
  type: TYPE_NORMAL
- en: Step-by-Step Guide to Making AI Videos
  prefs: []
  type: TYPE_NORMAL
- en: 1\. Sign Up & Explore the Interface
  prefs: []
  type: TYPE_NORMAL
- en: • Go to Runway ML’s website, sign up, and explore the easy-to-navigate dashboard.
    You’ll find a variety of creative AI models for video, text-to-image, and more.
  prefs: []
  type: TYPE_NORMAL
- en: 2\. Choose a Model for Video Generation
  prefs: []
  type: TYPE_NORMAL
- en: • Select “Gen-3,” the text-to-video model that allows you to generate a video
    from scratch using a text prompt. You can also choose video-to-video if you want
    to enhance or modify an existing clip.
  prefs: []
  type: TYPE_NORMAL
- en: 3\. Write a Detailed Prompt
  prefs: []
  type: TYPE_NORMAL
- en: • Be descriptive! If you’re generating a beach scene, specify elements like
    “a sunny beach with gentle waves, people playing volleyball, and seagulls flying.”
    The more detail, the more refined your output will be.
  prefs: []
  type: TYPE_NORMAL
- en: 4\. Adjust Video Settings
  prefs: []
  type: TYPE_NORMAL
- en: • Set the length, frame rate, and resolution based on how long you want the
    video to be and how you plan to use it (social media, ads, etc.).
  prefs: []
  type: TYPE_NORMAL
- en: 5\. Preview & Generate
  prefs: []
  type: TYPE_NORMAL
- en: • Runway ML will process your prompt and show you a preview. You can make tweaks
    to refine details until you’re happy with the result.
  prefs: []
  type: TYPE_NORMAL
- en: 6\. Export & Share
  prefs: []
  type: TYPE_NORMAL
- en: • Once you’re satisfied with the video, export it in the format you need. You
    can download it for your own use or share it directly on your social media platforms.
  prefs: []
  type: TYPE_NORMAL
- en: Best Practices for AI Video Creation
  prefs: []
  type: TYPE_NORMAL
- en: '• Iterate on Prompts: If the video doesn’t come out perfect on the first try,
    modify your prompt for more detail or a slightly different focus.'
  prefs: []
  type: TYPE_NORMAL
- en: '• Combine with Existing Clips: Runway ML can enhance or modify your existing
    footage. This works great if you need consistent branding or style across all
    your videos.'
  prefs: []
  type: TYPE_NORMAL
- en: '• Experiment with Effects & Styles: Runway ML’s variety of styles allows you
    to generate anything from realistic videos to more abstract, artistic scenes.'
  prefs: []
  type: TYPE_NORMAL
- en: Use Cases for Entrepreneurs and Creators
  prefs: []
  type: TYPE_NORMAL
- en: '• Social Media Content: Quickly generate eye-catching clips to grab attention
    on Instagram, TikTok, or LinkedIn.'
  prefs: []
  type: TYPE_NORMAL
- en: '• Product Demos: Animate a product feature without needing a full production
    team.'
  prefs: []
  type: TYPE_NORMAL
- en: '• Marketing Materials: Create tailored ads with AI that fit your brand voice
    and aesthetic.'
  prefs: []
  type: TYPE_NORMAL
- en: Challenges and Limitations
  prefs: []
  type: TYPE_NORMAL
- en: While impressive, AI-generated video still has some limitations. The biggest
    hurdle is Realistic human characters. While still images are now unrecognizable
    as artificial, AI struggles with faces, hands, gestures, and natural human movement
    in videos, leading to what’s known as the “uncanny valley”—a phenomenon where
    almost human characters feel unsettled. A study from the University of Cambridge
    found that these deviations from realism can negatively affect viewer perception,
    making it a big challenge for AI-generated video content.
  prefs: []
  type: TYPE_NORMAL
- en: Why Do These Gaps Exist?
  prefs: []
  type: TYPE_NORMAL
- en: The main issue is data quality and diversity. Generative AI models require vast,
    varied datasets for training, and there just isn’t enough high-quality, unbiased
    data to teach AI how to recreate complex human traits like facial expressions,
    gestures, and contextual movement.
  prefs: []
  type: TYPE_NORMAL
- en: The training datasets lack cultural nuances, creativity, and complex decision-making
    examples; AI struggles to replicate these aspects authentically. A study by MIT
    found that models trained on biased data produce equally biased results, further
    complicating efforts to create realistic human representations.
  prefs: []
  type: TYPE_NORMAL
- en: The Data to train these models
  prefs: []
  type: TYPE_NORMAL
- en: 'Getting more high-quality data (basically videos) seems like the answer, but
    it’s not so simple. Some suggest using synthetic (AI-generated videos) as the
    answer, but research indicates that training AI on AI-generated data creates a
    feedback loop that degrades image quality over time. A more viable option might
    be video-to-video generation: using CGI tools to supplement missing data and letting
    AI handle complex aspects like human eyes.'
  prefs: []
  type: TYPE_NORMAL
- en: '![Video to video editing](image_rsrc209.jpg)'
  prefs: []
  type: TYPE_IMG
- en: The Future of Generative AI Video
  prefs: []
  type: TYPE_NORMAL
- en: AI video generation has the potential to revolutionize creativity and productivity,
    offering tools that make high-quality video creation accessible to everyone. As
    more innovators and developers dive into AI and solve the challenges around training
    data, we’re likely to see even more impressive advances.
  prefs: []
  type: TYPE_NORMAL
- en: The journey of generative AI video is just beginning, and though we’ve made
    incredible progress, there’s still a long road ahead. By the time we reach the
    peak, the creative potential of AI will likely exceed anything we can imagine
    today.
  prefs: []
  type: TYPE_NORMAL
- en: 'Key Takeaways:'
  prefs: []
  type: TYPE_NORMAL
- en: '• Realism is Here: AI models can create stunning, ultra-realistic visual content.'
  prefs: []
  type: TYPE_NORMAL
- en: '• Great for Big Picture Scenes: AI shines at generating high-level, wide-area
    footage.'
  prefs: []
  type: TYPE_NORMAL
- en: '• Character Consistency: Maintaining the visual style of characters is getting
    better, making storytelling more fluid.'
  prefs: []
  type: TYPE_NORMAL
- en: '• Data Gaps & Biases: Quality and diverse data are needed to improve human-like
    motions and interactions.'
  prefs: []
  type: TYPE_NORMAL
- en: '• Bright Future: Progress is happening quickly, and generative AI’s creative
    potential is still expanding.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc1YX.jpg)'
  prefs: []
  type: TYPE_IMG
- en: If you’re in video production, advertising or simply want to explore a new way
    to create visual content, these emerging AI video tools could be game-changers.
    Stay tuned.
  prefs: []
  type: TYPE_NORMAL
- en: '13'
  prefs: []
  type: TYPE_NORMAL
- en: CODING HAS NEVER BEEN THIS EASY
  prefs: []
  type: TYPE_NORMAL
- en: Ok, so the coding has been really, really good for the latest o1 model.
  prefs: []
  type: TYPE_NORMAL
- en: ChatGPT was already pretty decent at coding, but this one is so good that it’s
    winning coding competitions.
  prefs: []
  type: TYPE_NORMAL
- en: To test it out, I asked it to create a nice-looking Tetris game in HTML - and
    it generated 400 lines of code and made it look really nice, too (I did have to
    ask it to do that) in less than a minute!
  prefs: []
  type: TYPE_NORMAL
- en: You still have to be really clear about what you want. For example, the first
    iteration didn’t work with touchscreens, but I told it that, and it generated
    code that did work on touchscreens.
  prefs: []
  type: TYPE_NORMAL
- en: Writing this would have taken me hours, if not days, and it would have taken
    longer to make it look good.
  prefs: []
  type: TYPE_NORMAL
- en: '![tetris game](image_rsrc20A.jpg)'
  prefs: []
  type: TYPE_IMG
- en: You can check it out yourself on [neildagger.com/tetris](http://neildagger.com/tetris)
    - you play it using the arrow keys.
  prefs: []
  type: TYPE_NORMAL
- en: It’s ridiculous that it’s not going to replace developers just yet (it’s getting
    close) because every time you face issues, you can just take a screenshot and
    troubleshoot, ask it for novice step-by-step instructions to set up the software
    and copy and paste the code.
  prefs: []
  type: TYPE_NORMAL
- en: There are videos of 8-year-olds using ChatGPT with a coding tool like Cursor
    to create a website from scratch with an AI chatbot - that’s ridiculous - honestly,
    there’s no excuse now; any coding idea you had that would have cost thousands
    to do before you can use ChatGPT to do it - it.
  prefs: []
  type: TYPE_NORMAL
- en: The easiest way to code anything - Cursor
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '![cursor](image_rsrc20B.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Normally, when you use ChatGPT to code, it gives you code. You copy it, open
    a new tool, paste it, and then when you have issues, you go back and forth copying
    and pasting the error messages to figure it out and the new code —you end up doing
    this many, many times.
  prefs: []
  type: TYPE_NORMAL
- en: Cursor is a groundbreaking tool that integrates ChatGPT (and other LLMs) into
    the coding editor itself. So you can directly ask it to create code. It goes straight
    in there—and issues—and again, it just makes the changes itself without you having
    to go back and forth.
  prefs: []
  type: TYPE_NORMAL
- en: The really helpful thing here is that you can talk to it in natural language,
    which opens up coding to a lot more people. It’s really good even for seasoned
    software developers since learning new programming languages is a real pain.
  prefs: []
  type: TYPE_NORMAL
- en: It doesn’t sound like much, but it really eliminates a lot of the frustration
    of using ChatGPT to write code.
  prefs: []
  type: TYPE_NORMAL
- en: Setting Up Cursor AI
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
