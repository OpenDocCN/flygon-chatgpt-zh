  id: totrans-899
  prefs: []
  type: TYPE_PRE
  zh: '[PRE142]'
- en: '[Listing 2.16](#list2-16) contains two NumPy arrays called a and b followed
    five print() statements that display the contents of a and b, their Hadamard product,
    and their inner product that is calculated in two different ways. The output from
    launching [Listing 2.16](#list2-16) is here:'
