- en: Thirty Advanced Commands You Can Use with Ideogram Prompts
  id: totrans-349
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 您可以使用 Ideogram 提示的 30 个高级命令
- en: Here are 10 useful Ideogram commands that work similarly to --ar (aspect ratio)
    and --dof (depth of field), allowing you to fine-tune and enhance AI-generated
    images.
  id: totrans-350
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 这里是 10 个有用的 Ideogram 命令，它们与 --ar（宽高比）和 --dof（景深）类似，允许您微调和增强 AI 生成的图像。
- en: --q (Quality) – Controls the rendering quality of the image. Higher values like
    --q 2 generate more detailed images but take longer to process.
  id: totrans-351
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: --q（质量） – 控制图像的渲染质量。更高的值如 --q 2 生成更详细的图像，但处理时间更长。
- en: '--v (Version) – Specifies which version of the AI model to use. Example: --v
    5.2 ensures the latest and most refined model is used.'
  id: totrans-352
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: --v（版本） – 指定要使用的 AI 模型版本。例如：--v 5.2 确保使用最新和最精细的模型。
- en: '--stylize (Artistic Style Intensity) – Adjusts how much artistic flair is added
    to the image. Example: --stylize 1000 adds more creative interpretation.'
  id: totrans-353
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: --stylize (艺术风格强度) – 调整添加到图像中的艺术风格程度。例如：--stylize 1000 添加更多创意解释。
- en: --chaos (Creativity and Variation) – Controls randomness in generation. Higher
    values like --chaos 50 produce more unexpected and unique outputs.
  id: totrans-354
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: --chaos（创造性和变化） – 控制生成中的随机性。更高的值如 --chaos 50 产生更多意外和独特的输出。
- en: '--sref (Style Reference) – Applies a specific style reference from an existing
    image or dataset. Example: --sref 12345 mimics a particular visual style.'
  id: totrans-355
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: --sref（风格参考） – 从现有图像或数据集中应用特定的风格参考。例如：--sref 12345 模仿特定的视觉风格。
- en: --tile (Seamless Pattern Mode) – Generates seamless, repeating patterns useful
    for textures and backgrounds.
  id: totrans-356
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: --tile（无缝图案模式） – 生成无缝、重复的图案，适用于纹理和背景。
- en: '--no (Negative Prompting) – Excludes unwanted elements from the image. Example:
    --no text removes text from the final output.'
  id: totrans-357
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: --no（负提示） – 从图像中排除不需要的元素。例如：--no text 从最终输出中移除文本。
- en: --w and --h (Width and Height Customization) – Defines precise width and height
    in pixels for image output.
  id: totrans-358
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: --w 和 --h（宽度高度自定义） – 定义图像输出的精确宽度和高度（以像素为单位）。
- en: '--seed (Randomization Control) – Uses a fixed seed number to ensure consistent
    image outputs for similar prompts. Example: --seed 12345 generates the same image
    structure every time.'
  id: totrans-359
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: --seed（随机化控制） – 使用固定的种子数字以确保类似提示的图像输出的一致性。例如：--seed 12345 每次都生成相同的图像结构。
- en: --bw (Black and White Mode) – Converts the generated image into a monochrome,
    black-and-white style.
  id: totrans-360
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: --bw（黑白模式） – 将生成的图像转换为单色、黑白风格。
- en: These commands allow users to have greater control over image generation, making
    Ideogram more flexible for professional and artistic projects.
  id: totrans-361
  prefs: []
  type: TYPE_NORMAL
  zh: 这些命令使用户能够对图像生成有更大的控制权，使 Ideogram 更适合专业和艺术项目。
- en: Here are 10 more Ideogram commands to further refine and customize AI-generated
    images.
  id: totrans-362
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 这里还有 10 个更多的 Ideogram 命令，可以进一步精炼和自定义 AI 生成的图像。
- en: 11\. --hdr (High Dynamic Range Mode) – Enhances contrast and color vibrancy,
    making the image appear more vivid and realistic.
  id: totrans-363
  prefs: []
  type: TYPE_NORMAL
  zh: 11. --hdr（高动态范围模式） – 增强对比度和色彩鲜艳度，使图像看起来更加生动和逼真。
- en: 12\. --sharp (Sharpness Control) – Increases the sharpness and clarity of details
    in the image, useful for fine textures and intricate designs.
  id: totrans-364
  prefs: []
  type: TYPE_NORMAL
  zh: 12. --sharp（锐度控制） – 增加图像中细节的清晰度和锐度，适用于精细纹理和复杂设计。
- en: 13\. --blur (Soft Focus Effect) – Adds a slight blur to soften edges and create
    a dreamy, cinematic effect.
  id: totrans-365
  prefs: []
  type: TYPE_NORMAL
  zh: 13\. --blur (柔焦效果) – 添加轻微的模糊以柔化边缘并创造梦幻、电影般的效果。
- en: 14\. --cam (Camera Perspective Control) – Adjusts the camera angle and depth,
    allowing you to specify perspectives like "wide-angle," "macro shot," or "close-up."
  id: totrans-366
  prefs: []
  type: TYPE_NORMAL
  zh: 14\. --cam (相机视角控制) – 调整相机角度和深度，允许您指定“广角”、“微距”或“特写”等视角。
- en: 15\. --light (Lighting Adjustment) – Controls the intensity and direction of
    lighting in the image, useful for dramatic or moody effects.
  id: totrans-367
  prefs: []
  type: TYPE_NORMAL
  zh: 15\. --light (光照调整) – 控制图像中的光照强度和方向，适用于戏剧或情绪化效果。
- en: 16\. --contrast (Contrast Boost) – Enhances contrast levels, making highlights
    brighter and shadows deeper for a more dynamic look.
  id: totrans-368
  prefs: []
  type: TYPE_NORMAL
  zh: 16\. --contrast (对比度增强) – 增强对比度级别，使高光更亮，阴影更深，以实现更动态的外观。
- en: 17\. --sat (Saturation Control) – Increases or decreases the intensity of colors
    in the image, making it more vibrant or muted.
  id: totrans-369
  prefs: []
  type: TYPE_NORMAL
  zh: 17\. --sat (饱和度控制) – 增加或减少图像中颜色的强度，使其更加鲜艳或柔和。
- en: 18\. --motion (Motion Blur Effect) – Simulates movement within the image, creating
    a dynamic, action-oriented scene.
  id: totrans-370
  prefs: []
  type: TYPE_NORMAL
  zh: 18\. --motion (动态模糊效果) – 在图像中模拟运动，创造动态、动作导向的场景。
- en: 19\. --grain (Film Grain Effect) – Adds a subtle grainy texture for a vintage,
    cinematic, or retro aesthetic.
  id: totrans-371
  prefs: []
  type: TYPE_NORMAL
  zh: 19\. --grain (胶片颗粒效果) – 添加微妙的颗粒纹理，以实现复古、电影或怀旧美学。
- en: 20\. --glow (Glow Effect) – Adds a soft or intense glow around elements, useful
    for neon lighting, sci-fi, and fantasy effects.
  id: totrans-372
  prefs: []
  type: TYPE_NORMAL
  zh: 20\. --glow (发光效果) – 在元素周围添加柔和或强烈的发光，适用于霓虹灯、科幻和奇幻效果。
- en: These additional commands allow for even greater control over the style, lighting,
    and realism of images in Ideogram, making them more cinematic, artistic, or dramatic
    depending on your needs.
  id: totrans-373
  prefs: []
  type: TYPE_NORMAL
  zh: 这些附加命令允许对象形文字中图像的风格、光照和现实感有更大的控制，根据您的需求使其更加电影化、艺术化或戏剧化。
- en: Here are 10 more advanced Ideogram commands to further refine and enhance AI-generated
    images.
  id: totrans-374
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是10个更高级的象形文字命令，以进一步精炼和增强AI生成的图像。
- en: 21\. --bg (Background Customization) – Allows you to specify the type of background,
    such as --bg solid black, --bg blurred, or --bg transparent.
  id: totrans-375
  prefs: []
  type: TYPE_NORMAL
  zh: 21\. --bg (背景定制) – 允许您指定背景类型，例如 --bg solid black、--bg blurred 或 --bg transparent。
- en: 22\. --depth (Depth Mapping) – Enhances the depth of field effect, making foreground
    elements stand out while the background appears more distant or blurred.
  id: totrans-376
  prefs: []
  type: TYPE_NORMAL
  zh: 22\. --depth (深度映射) – 增强景深效果，使前景元素突出，而背景看起来更加遥远或模糊。
- en: '23\. --ambient (Ambient Light Control) – Adjusts the ambient lighting in the
    image to create soft, evenly spread illumination. Example: --ambient warm glow.'
  id: totrans-377
  prefs: []
  type: TYPE_NORMAL
  zh: 23\. --ambient (环境光照控制) – 调整图像中的环境光照以创建柔和、均匀分布的照明。例如：--ambient warm glow。
- en: '24\. --reflect (Reflection Effect) – Adds realistic reflections on surfaces
    such as glass, water, or metal. Example: --reflect high increases the effect.'
  id: totrans-378
  prefs: []
  type: TYPE_NORMAL
  zh: 24\. --reflect (反射效果) – 在玻璃、水或金属等表面添加逼真的反射。例如：--reflect high增加效果。
- en: 25\. --outline (Edge Definition) – Enhances the outline of objects for a sharper
    or more stylized appearance.
  id: totrans-379
  prefs: []
  type: TYPE_NORMAL
  zh: 25\. --outline (边缘定义) – 增强物体的轮廓，使其外观更加锐利或风格化。
- en: 26\. --metallic (Metallic Texture Boost) – Enhances the metallic sheen on surfaces,
    making them appear more reflective and realistic.
  id: totrans-380
  prefs: []
  type: TYPE_NORMAL
  zh: 26\. --metallic (金属纹理增强) – 增强表面上的金属光泽，使其看起来更加反光和逼真。
- en: 27\. --symmetry (Symmetrical Image Generation) – Forces symmetrical balance
    in the image composition, useful for portraits, logos, and abstract art.
  id: totrans-381
  prefs: []
  type: TYPE_NORMAL
  zh: 27\. --symmetry (对称图像生成) – 强制图像构图中的对称平衡，适用于肖像、标志和抽象艺术。
- en: 28\. --fog (Atmospheric Fog Effect) – Adds fog or mist to the image, creating
    a sense of mystery, depth, or cinematic atmosphere.
  id: totrans-382
  prefs: []
  type: TYPE_NORMAL
  zh: 28\. --fog (大气雾效) – 向图像添加雾或雾气，营造出神秘、深度或电影般的氛围。
- en: 29\. --halftone (Comic Book/Graphic Print Effect) – Applies a halftone shading
    pattern to make images look like comic book or printed graphics.
  id: totrans-383
  prefs: []
  type: TYPE_NORMAL
  zh: 29\. --halftone (漫画/图形印刷效果) – 应用半色调阴影图案，使图像看起来像漫画或印刷图形。
- en: 30\. --neon (Glowing Neon Effect) – Intensifies neon glow effects, ideal for
    cyberpunk, sci-fi, or retro-futuristic aesthetics.
  id: totrans-384
  prefs: []
  type: TYPE_NORMAL
  zh: 30\. --neon (霓虹发光效果) – 强化霓虹发光效果，非常适合赛博朋克、科幻或复古未来主义美学。
- en: These commands provide more control over lighting, reflections, depth, symmetry,
    and textures, allowing users to create highly polished, stylized, or dramatic
    visuals in Ideogram.
  id: totrans-385
  prefs: []
  type: TYPE_NORMAL
  zh: 这些命令提供了更多对光照、反射、深度、对称和纹理的控制，使用户能够在象形文字中创建高度抛光、风格化或戏剧性的视觉效果。
- en: Best Practices for Using Ideogram
  id: totrans-386
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用象形文字的最佳实践
- en: To create high-quality AI images, start with a clear objective to ensure the
    AI understands what you are trying to generate. Using specific contextual details
    such as colors, lighting, and composition leads to more refined outputs. Requesting
    multiple versions of an image allows for comparisons and selection of the best
    result.
  id: totrans-387
  prefs: []
  type: TYPE_NORMAL
  zh: 为了创建高质量的AI图像，从明确的目标开始，确保AI理解你试图生成的内容。使用具体的上下文细节，如颜色、照明和构图，可以导致更精细的输出。请求多个版本的图像允许比较和选择最佳结果。
- en: Experimentation is key to achieving the best results. Adjust prompts slightly
    and compare different outputs to see which variations work best for your artistic
    goals.
  id: totrans-388
  prefs: []
  type: TYPE_NORMAL
  zh: 实验是取得最佳结果的关键。稍微调整提示，比较不同的输出，看看哪种变化最适合你的艺术目标。
- en: AI-generated images can be refined further using editing tools. While Ideogram
    produces high-quality results, minor touch-ups using Photoshop or other image
    editing software can enhance the final output.
  id: totrans-389
  prefs: []
  type: TYPE_NORMAL
  zh: 使用编辑工具可以进一步精炼AI生成的图像。虽然象形文字产生高质量的结果，但使用Photoshop或其他图像编辑软件进行的小幅修改可以增强最终输出。
- en: Final Thoughts
  id: totrans-390
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 最后的想法
- en: Ideogram is a powerful tool for generating visually stunning AI images across
    different artistic styles and themes. By crafting detailed and structured prompts,
    experimenting with styles and lighting, and refining the AI-generated results,
    users can create unique and high-quality artwork for various purposes.
  id: totrans-391
  prefs: []
  type: TYPE_NORMAL
  zh: 象形文字是生成视觉上令人惊叹的AI图像的强大工具，跨越不同的艺术风格和主题。通过制作详细和结构化的提示，尝试不同的风格和照明，以及精炼AI生成的结果，用户可以为各种目的创建独特和高质量的艺术作品。
- en: Whether creating professional graphics, fantasy landscapes, character portraits,
    or promotional images, Ideogram provides an intuitive and effective way to bring
    creative visions to life. Experiment with different prompts and styles to fully
    explore the potential of AI-generated art.
  id: totrans-392
  prefs: []
  type: TYPE_NORMAL
  zh: 无论是在创建专业图形、幻想景观、人物肖像还是促销图像，象形文字都提供了一种直观而有效的方式，将创意愿景变为现实。尝试不同的提示和风格，充分探索AI生成艺术的可能性。
- en: Your Review Can Help Someone Like You!
  id: totrans-393
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 你的评价可以帮助像你这样的人！
- en: A Small Act That Makes a Big Difference
  id: totrans-394
  prefs: []
  type: TYPE_NORMAL
  zh: 一件小事能带来巨大的改变
- en: '"Even a little light can help someone find their way." – Anonymous'
  id: totrans-395
  prefs: []
  type: TYPE_NORMAL
  zh: “即使是一点点光也能帮助某人找到方向。” —— 匿名
- en: Hi there, friend!
  id: totrans-396
  prefs: []
  type: TYPE_NORMAL
  zh: 嗨，朋友！
- en: Thanks so much for reading The AI Handbook for Everyone. I hope it helped make
    things feel a little clearer and a lot more possible.
  id: totrans-397
  prefs: []
  type: TYPE_NORMAL
  zh: 非常感谢你阅读《人人AI手册》。我希望它有助于让事情感觉更清晰，可能性更大。
- en: I have a small favor to ask—but it’s a powerful one.
  id: totrans-398
  prefs: []
  type: TYPE_NORMAL
  zh: 我有一个小小的请求——但它很强大。
- en: Would you help someone you don’t even know…
  id: totrans-399
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 你愿意帮助一个你甚至不认识的人……
- en: '...if it only took you one minute?'
  id: totrans-400
  prefs: []
  type: TYPE_NORMAL
  zh: '...如果只需要你一分钟？'
- en: They’re someone kind of like you. Maybe younger. Maybe just getting started.
    Maybe nervous to try new things with AI. They want to learn, to grow, and to feel
    more confident.
  id: totrans-401
  prefs: []
  type: TYPE_NORMAL
  zh: 他们是有点像你的人。可能更年轻。可能刚开始。可能对用AI尝试新事物感到紧张。他们想要学习，成长，并感到更加自信。
- en: But right now, they’re not sure where to begin.
  id: totrans-402
  prefs: []
  type: TYPE_NORMAL
  zh: 但现在，他们不确定从哪里开始。
- en: That’s where you come in.
  id: totrans-403
  prefs: []
  type: TYPE_NORMAL
  zh: 那就是你的作用所在。
- en: Most people decide to read a book based on the reviews. Your words could be
    the reason someone like you gives this book a try—and learns something that changes
    their life.
  id: totrans-404
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数人决定读书是基于评价。你的话可能是像你这样的人尝试这本书并学习到改变他们生活的知识的原因。
- en: 'Just imagine your review helping someone:'
  id: totrans-405
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 想象一下你的评价如何帮助某人：
- en: Get better at their job
  id: totrans-406
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提升他们的工作能力
- en: Learn a cool new skill
  id: totrans-407
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 学习一项酷炫的新技能
- en: Build something they’ve always dreamed of
  id: totrans-408
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 实现他们一直梦寐以求的事情
- en: Or just feel a little less lost in the world of AI
  id: totrans-409
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 或者只是感觉在AI的世界里不那么迷茫
- en: And it only takes less than a minute to leave a review.
  id: totrans-410
  prefs: []
  type: TYPE_NORMAL
  zh: 留下评价只需要不到一分钟。
- en: 'Here’s how to leave one:'
  id: totrans-411
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 这就是如何留下一条评价：
- en: Go to the page where you bought the book (like Amazon)
  id: totrans-412
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 去你购买书籍的页面（比如亚马逊）
- en: Scroll down to the “Customer Reviews” section
  id: totrans-413
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 滚动到“客户评价”部分
- en: Click “Write a Review”
  id: totrans-414
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 点击“写评价”
- en: Here is the Amazon Review [Link](http://www.amazon.com/review/createreview?asin=B0DYDGVF7N)
    [http://www.amazon.com/review/createreview?asin=B0DYDGVF7N](http://www.amazon.com/review/createreview?asin=ASIN)
  id: totrans-415
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 这里是亚马逊评价链接 [链接](http://www.amazon.com/review/createreview?asin=B0DYDGVF7N) [http://www.amazon.com/review/createreview?asin=B0DYDGVF7N](http://www.amazon.com/review/createreview?asin=ASIN)
- en: Say one or two things you liked and why it helped
  id: totrans-416
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 说一两件你喜欢的事情以及为什么它有帮助
- en: Click submit — and that’s it!
  id: totrans-417
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 点击提交——就这样！
- en: Seriously—that’s all it takes to be a helper.
  id: totrans-418
  prefs: []
  type: TYPE_NORMAL
  zh: 严肃地说——这就是成为帮助者的全部。
- en: 'If you do leave a review, thank you! You just became part of the mission: making
    AI simple, helpful, and friendly for everyone.'
  id: totrans-419
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您留下评论，谢谢！您已经成为使命的一部分：让AI对每个人来说都简单、有用和友好。
- en: Let’s keep going. There’s so much more to learn and do. I’m cheering you on.
  id: totrans-420
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们继续前进。还有更多要学习和做的事情。我在为您加油。
- en: – Your friend,
  id: totrans-421
  prefs: []
  type: TYPE_NORMAL
  zh: – 您的朋友，
- en: PJ Chavaux
  id: totrans-422
  prefs: []
  type: TYPE_NORMAL
  zh: PJ Chavaux
- en: P.S. Did you like the book? Share it with someone who needs it. That’s another
    easy way to help—and you never know what difference it might make.
  id: totrans-423
  prefs: []
  type: TYPE_NORMAL
  zh: P.S. 你喜欢这本书吗？和需要它的人分享。这是另一种简单的方法来帮助——你永远不知道它可能会带来什么不同。
- en: Chapter six
  id: totrans-424
  prefs: []
  type: TYPE_NORMAL
  zh: 第六章
- en: 'Canva Tutorial: A Complete Guide to Designing Like a Pro'
  id: totrans-425
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Canva教程：专业设计的完整指南
- en: Introduction to Canva
  id: totrans-426
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Canva简介
- en: Canva is a powerful and user-friendly design tool that allows users to create
    stunning graphics, presentations, social media posts, marketing materials, and
    much more. Whether you're a beginner or an experienced designer, Canva provides
    an intuitive interface, pre-made templates, and advanced customization options
    to help you create visually appealing content effortlessly.
  id: totrans-427
  prefs: []
  type: TYPE_NORMAL
  zh: Canva是一个强大且用户友好的设计工具，允许用户轻松创建令人惊叹的图形、演示文稿、社交媒体帖子、营销材料等等。无论您是初学者还是有经验的平面设计师，Canva都提供了一个直观的界面、预制的模板和高级定制选项，帮助您轻松创建视觉上吸引人的内容。
- en: This tutorial will guide you through the basics of using Canva, from setting
    up an account to utilizing templates and designing from scratch.
  id: totrans-428
  prefs: []
  type: TYPE_NORMAL
  zh: 本教程将指导您了解使用Canva的基本知识，从设置账户到利用模板和从零开始设计。
- en: Getting Started with Canva
  id: totrans-429
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 开始使用Canva
- en: 1\. Creating an Account
  id: totrans-430
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1. 创建账户
- en: 'To start using Canva, follow these steps:'
  id: totrans-431
  prefs: []
  type: TYPE_NORMAL
  zh: 要开始使用Canva，请按照以下步骤操作：
- en: Visit [Canva's website](https://www.canva.com/).
  id: totrans-432
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 访问[Canva网站](https://www.canva.com/)。
- en: Click on Sign up and choose to register using an email, Google, or Facebook
    account.
  id: totrans-433
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 点击右上角的“注册”并选择使用电子邮件、Google或Facebook账户注册。
- en: Once registered, log in and you will be taken to the Canva dashboard.
  id: totrans-434
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 注册后，登录并您将被带到Canva仪表板。
- en: 2\. Navigating the Dashboard
  id: totrans-435
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2. 导航仪表板
- en: 'The Canva dashboard includes:'
  id: totrans-436
  prefs: []
  type: TYPE_NORMAL
  zh: Canva仪表板包括：
- en: 'Home: Browse templates and recent projects.'
  id: totrans-437
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 主页：浏览模板和最近的项目。
- en: 'Templates: Access thousands of free and premium templates.'
  id: totrans-438
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 模板：访问数千个免费和高级模板。
- en: 'Projects: Find all your saved designs.'
  id: totrans-439
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 项目：查找您保存的所有设计。
- en: 'Brand Kit: Customize fonts, colors, and logos (Pro feature).'
  id: totrans-440
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 品牌工具包：自定义字体、颜色和标志（专业功能）。
- en: 'Apps & Integrations: Connect Canva with third-party tools.'
  id: totrans-441
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 应用程序和集成：将Canva与第三方工具连接。
- en: Using Canva Templates
  id: totrans-442
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用Canva模板
- en: One of Canva’s standout features is its extensive template library. Templates
    provide pre-designed layouts that can be customized to fit your needs.
  id: totrans-443
  prefs: []
  type: TYPE_NORMAL
  zh: Canva的一个突出特点是它广泛的模板库。模板提供预设计的布局，可以根据您的需求进行定制。
- en: 3\. Choosing a Template
  id: totrans-444
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3. 选择模板
- en: Click on Templates from the dashboard.
  id: totrans-445
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 从仪表板点击“模板”。
- en: Use the search bar to find specific templates (e.g., “Instagram Post,” “Presentation,”
    “Business Card”).
  id: totrans-446
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用搜索栏查找特定模板（例如，“Instagram帖子”，“演示文稿”，“名片”）。
- en: Select a template that suits your needs.
  id: totrans-447
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 选择适合您需求的模板。
- en: 4\. Customizing a Template
  id: totrans-448
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4. 个性化模板
- en: 'Once you''ve chosen a template, you can modify it:'
  id: totrans-449
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦您选择了模板，您可以对其进行修改：
- en: 'Text: Click on any text box to edit the text.'
  id: totrans-450
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 文本：点击任何文本框以编辑文本。
- en: 'Fonts: Change font style, size, and color from the toolbar.'
  id: totrans-451
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 字体：从工具栏中更改字体样式、大小和颜色。
- en: 'Images: Replace template images with your own or use Canva’s free images.'
  id: totrans-452
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 图片：用您自己的图片替换模板图片或使用Canva的免费图片。
- en: 'Elements: Add shapes, lines, stickers, or illustrations.'
  id: totrans-453
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 元素：添加形状、线条、贴纸或插图。
- en: 'Colors: Customize colors to match your brand.'
  id: totrans-454
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 颜色：自定义颜色以匹配您的品牌。
- en: Designing from Scratch
  id: totrans-455
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 从零开始设计
- en: 'If you want to create a unique design without using a template, follow these
    steps:'
  id: totrans-456
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您想在不使用模板的情况下创建独特的设计，请按照以下步骤操作：
- en: 5\. Starting a New Design
  id: totrans-457
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 5. 开始新设计
- en: Click on Create a design in the upper-right corner.
  id: totrans-458
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 点击右上角的“创建设计”。
- en: 'Select a predefined size (e.g., Instagram post: 1080x1080px) or enter custom
    dimensions.'
  id: totrans-459
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 选择预定义的大小（例如，Instagram帖子：1080x1080像素）或输入自定义尺寸。
- en: 6\. Adding Elements to Your Design
  id: totrans-460
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 6. 向您的设计中添加元素
- en: Click Elements to add shapes, lines, and icons.
  id: totrans-461
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 点击元素以添加形状、线条和图标。
- en: Use the Text tab to insert text boxes with predefined styles.
  id: totrans-462
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用“文本”选项卡插入具有预定义样式的文本框。
- en: Upload your own images under the Uploads tab.
  id: totrans-463
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在“上传”选项卡下上传您自己的图片。
- en: Drag and resize elements as needed.
  id: totrans-464
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 根据需要拖动和调整元素的大小。
- en: 7\. Adjusting Layers and Positioning
  id: totrans-465
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 7. 调整图层和位置
- en: Right-click on an element to bring forward or send backward.
  id: totrans-466
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 右键单击元素以将其向前或向后移动。
- en: Use the Position tool to align objects.
  id: totrans-467
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用“位置”工具对齐对象。
- en: Group multiple elements together to move them as a unit.
  id: totrans-468
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将多个元素组合在一起以作为一个单元移动。
- en: Enhancing Your Design
  id: totrans-469
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 增强您的设计
- en: 'Canva offers various features to take your design to the next level:'
  id: totrans-470
  prefs: []
  type: TYPE_NORMAL
  zh: Canva提供各种功能，将您的设计提升到下一个层次：
- en: 8\. Using AI-Powered Features
  id: totrans-471
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 8. 使用AI功能
- en: 'Canva incorporates artificial intelligence (AI) to simplify and enhance the
    design process:'
  id: totrans-472
  prefs: []
  type: TYPE_NORMAL
  zh: Canva集成了人工智能（AI）以简化并增强设计过程：
- en: 'Magic Write: An AI-powered text generator for quick content creation.'
  id: totrans-473
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 魔法写作：用于快速内容创建的AI文本生成器。
- en: 'Background Remover: AI-driven tool to remove backgrounds from images.'
  id: totrans-474
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 背景移除：用于从图像中移除背景的AI驱动工具。
- en: 'Text-to-Image: AI-generated images based on textual descriptions.'
  id: totrans-475
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 文本到图像：基于文本描述的AI生成图像。
- en: 'Design Suggestions: AI-driven recommendations for layouts and elements.'
  id: totrans-476
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 设计建议：布局和元素的AI驱动推荐。
- en: 9\. Using Filters and Effects
  id: totrans-477
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 9. 使用滤镜和效果
- en: Click on an image and select Edit Image to apply filters.
  id: totrans-478
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 点击图片并选择“编辑图片”以应用滤镜。
- en: Use effects like Background Remover (Pro feature) to enhance visuals.
  id: totrans-479
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用如背景移除（专业功能）等效果来增强视觉效果。
- en: Adjust brightness, contrast, and saturation manually.
  id: totrans-480
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 手动调整亮度、对比度和饱和度。
- en: 10\. Adding Animations
  id: totrans-481
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 10. 添加动画
- en: Click Animate in the top menu to add motion effects.
  id: totrans-482
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在顶部菜单中点击“动画”以添加运动效果。
- en: Choose from animations like Fade, Pan, Rise, and Tumble.
  id: totrans-483
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 从淡入、平移、上升和翻滚等动画中选择。
- en: Use animated elements for social media posts or presentations.
  id: totrans-484
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用动画元素制作社交媒体帖子或演示文稿。
- en: Saving and Exporting Your Design
  id: totrans-485
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 保存和导出您的设计
- en: 11\. Downloading Your Design
  id: totrans-486
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 11. 下载您的设计
- en: Click the Share button in the top-right corner.
  id: totrans-487
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 点击右上角的“分享”按钮。
- en: 'Select Download and choose the preferred file format:'
  id: totrans-488
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 选择下载并选择首选的文件格式：
- en: 'PNG: Best for high-quality images.'
  id: totrans-489
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: PNG：适用于高质量图像。
- en: 'JPG: Smaller file size with decent quality.'
  id: totrans-490
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: JPG：文件大小较小，质量尚可。
- en: 'PDF: Ideal for print materials.'
  id: totrans-491
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: PDF：适用于印刷材料。
- en: 'MP4/GIF: For animated designs.'
  id: totrans-492
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: MP4/GIF：用于动画设计。
- en: Click Download to save your design to your device.
  id: totrans-493
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 点击下载以将您的设计保存到您的设备。
- en: 12\. Sharing Your Design
  id: totrans-494
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 12. 分享您的设计
- en: Share directly via email or link.
  id: totrans-495
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 直接通过电子邮件或链接分享。
- en: Post on social media platforms like Facebook, Instagram, or Twitter.
  id: totrans-496
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在Facebook、Instagram或Twitter等社交媒体平台上发布。
- en: Use Canva Print to order physical copies of your design.
  id: totrans-497
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用Canva Print订购您设计的物理副本。
- en: Unleashing Your Creativity with Magic Media
  id: totrans-498
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用魔法媒体释放您的创造力
- en: Canva's Magic Media is a powerful tool that uses AI to generate images and videos
    from text prompts. This tutorial will guide you through the process, helping you
    bring your creative visions to life.
  id: totrans-499
  prefs: []
  type: TYPE_NORMAL
  zh: Canva的魔法媒体是一个强大的工具，它使用AI从文本提示生成图像和视频。本教程将指导您完成这个过程，帮助您将创意愿景变为现实。
- en: 'Part 1: Accessing Magic Media'
  id: totrans-500
  prefs: []
  type: TYPE_NORMAL
  zh: 第一部分：访问魔法媒体
- en: 'Open Canva: Launch Canva in your web browser or open the Canva app.'
  id: totrans-501
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 打开Canva：在您的网络浏览器中启动Canva或打开Canva应用。
- en: 'Create a Design: Choose any design type (e.g., social media post, presentation,
    flyer). You can start with a blank canvas or select a template.'
  id: totrans-502
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 创建设计：选择任何设计类型（例如，社交媒体帖子、演示文稿、传单）。您可以从空白画布开始，或选择模板。
- en: 'Find Magic Media: In the left-hand menu, look for the "Apps" tab. Click it,
    and search for "Magic Media." Select it to open the Magic Media panel.'
  id: totrans-503
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 查找魔法媒体：在左侧菜单中，找到“应用”标签。点击它，并搜索“魔法媒体”。选择它以打开魔法媒体面板。
- en: 'Part 2: Generating Images with Magic Media'
  id: totrans-504
  prefs: []
  type: TYPE_NORMAL
  zh: 第二部分：使用魔法媒体生成图像
- en: 'Enter Your Prompt: In the text box within the Magic Media panel, describe the
    image you want to create. Be as specific as possible! The more details you provide,
    the better the results. For example, instead of "a dog," try "a golden retriever
    puppy playing fetch in a sunny park." Consider adding artistic styles like "photorealistic,"
    "painting," or "cartoon" to influence the image.'
  id: totrans-505
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 输入您的提示：在魔法媒体面板中的文本框中，描述您想要创建的图片。尽可能具体！您提供的细节越多，结果越好。例如，与其说“一只狗”，不如说“一只金毛猎犬在阳光明媚的公园里玩接球。”考虑添加如“逼真”、“绘画”或“卡通”等艺术风格来影响图片。
- en: 'Generate: Click the "Generate" button. Canva''s AI will process your prompt
    and create several image variations.'
  id: totrans-506
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 生成：点击“生成”按钮。Canva的AI将处理您的提示并创建几个图像变体。
- en: 'Review and Select: Browse the generated images. If you don''t see what you''re
    looking for, you can refine your prompt and generate again. You can also choose
    a slightly different variation of your original prompt to see what other options
    are available.'
  id: totrans-507
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 查看并选择：浏览生成的图片。如果您没有看到您想要的内容，您可以细化您的提示并再次生成。您还可以选择您原始提示的略微不同的变体，以查看其他可用的选项。
- en: 'Add to Design: Once you''ve found an image you like, click it to add it to
    your design.'
  id: totrans-508
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 添加到设计中：一旦找到您喜欢的图像，点击它将其添加到您的设计中。
- en: 'Edit and Adjust: Just like any other element in Canva, you can resize, reposition,
    and edit the generated image. You can also apply filters, adjust brightness and
    contrast, and make other modifications.'
  id: totrans-509
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 编辑和调整：就像Canva中的任何其他元素一样，您可以调整大小、重新定位和编辑生成的图像。您还可以应用过滤器、调整亮度和对比度以及进行其他修改。
- en: 'Part 3: Generating Videos with Magic Media (currently in beta/preview)'
  id: totrans-510
  prefs: []
  type: TYPE_NORMAL
  zh: 第3部分：使用Magic Media生成视频（目前处于beta/preview阶段）
- en: 'Note: The video generation feature of Magic Media is often in beta or preview,
    so the interface and functionality might change.'
  id: totrans-511
  prefs: []
  type: TYPE_NORMAL
  zh: 注意：Magic Media的视频生成功能通常处于beta或preview阶段，因此界面和功能可能会发生变化。
- en: 'Access Video Generation: Similar to image generation, ensure you are in the
    Magic Media section of the Apps tab. There should be a toggle or separate section
    for Video.'
  id: totrans-512
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 访问视频生成：与图像生成类似，确保您位于Apps标签页的Magic Media部分。应该有一个切换按钮或单独的视频部分。
- en: 'Enter Your Prompt: Describe the video you want to create. Be very descriptive
    about the scene, characters, actions, and mood. For example, "A majestic eagle
    soaring over snow-capped mountains at sunrise, with dramatic orchestral music."'
  id: totrans-513
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 输入您的提示：描述您想要创建的视频。请尽可能详细地描述场景、人物、动作和氛围。例如，“一只雄伟的老鹰在日出时分翱翔在覆盖着雪的山峰上，伴随着戏剧性的管弦乐。”
- en: 'Generate: Click the "Generate" button. Canva''s AI will process your prompt
    and create a short video clip.'
  id: totrans-514
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 生成：点击“生成”按钮。Canva的AI将处理您的提示并创建一个短视频剪辑。
- en: 'Review and Select: Preview the generated video. If you''re not happy with the
    result, refine your prompt and generate again. Experiment with different prompts
    to achieve the desired outcome.'
  id: totrans-515
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 审查和选择：预览生成的视频。如果您对结果不满意，请调整您的提示并再次生成。尝试不同的提示以达到期望的结果。
- en: 'Add to Design: Click the video to add it to your design. You can then trim
    the video, add other elements, and apply effects.'
  id: totrans-516
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 添加到设计中：点击视频将其添加到您的设计中。然后您可以修剪视频、添加其他元素并应用效果。
- en: 'Customize: You may be able to customize the video further, depending on the
    current features of Magic Media''s video generation. This might include changing
    the music, adding text overlays, or adjusting the pacing.'
  id: totrans-517
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 定制：根据Magic Media视频生成的当前功能，您可能可以进一步定制视频。这可能包括更改音乐、添加文字叠加或调整节奏。
- en: 'Part 4: Tips for Best Results'
  id: totrans-518
  prefs: []
  type: TYPE_NORMAL
  zh: 第4部分：最佳结果技巧
- en: 'Be Specific: The more details you provide in your prompt, the better the results
    will be.'
  id: totrans-519
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 详尽具体：您在提示中提供的细节越多，结果越好。
- en: 'Experiment: Try different prompts and variations to see what works best.'
  id: totrans-520
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 尝试：尝试不同的提示和变体，看看哪个效果最好。
- en: 'Use Keywords: Include relevant keywords in your prompts to guide the AI.'
  id: totrans-521
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用关键词：在您的提示中包含相关关键词以引导AI。
- en: 'Iterate: Don''t be afraid to regenerate images or videos multiple times until
    you get the desired outcome.'
  id: totrans-522
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 迭代：不要害怕多次重新生成图像或视频，直到达到您期望的结果。
- en: 'Combine with Other Canva Features: Use Magic Media in conjunction with Canva''s
    other design tools to create truly unique and stunning visuals.'
  id: totrans-523
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 结合其他Canva功能：将Magic Media与其他Canva设计工具结合使用，以创建真正独特和令人惊叹的视觉效果。
- en: 'Check for Updates: Magic Media is constantly evolving, so keep an eye out for
    new features and improvements.'
  id: totrans-524
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 检查更新：Magic Media不断进化，因此请留意新功能和改进。
- en: 'Part 5: Troubleshooting'
  id: totrans-525
  prefs: []
  type: TYPE_NORMAL
  zh: 第5部分：故障排除
- en: 'Slow Generation: Generating images and videos can take some time, especially
    for complex prompts. Be patient.'
  id: totrans-526
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 生成缓慢：生成图像和视频可能需要一些时间，尤其是对于复杂的提示。请耐心等待。
- en: 'Unexpected Results: AI is still under development, so sometimes the results
    might not be exactly what you expected. Refine your prompt and try again.'
  id: totrans-527
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 预期之外的结果：AI仍在开发中，因此有时结果可能不会完全符合您的预期。调整您的提示并再次尝试。
- en: 'Limited Functionality: The video generation feature is often in beta. Be aware
    of its limitations and expect changes.'
  id: totrans-528
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 功能有限：视频生成功能通常处于beta测试阶段。了解其限制并预期会有变化。
- en: By following this tutorial, you'll be well on your way to mastering Canva's
    Magic Media and creating amazing visuals for all your projects. Have fun exploring
    its creative potential!
  id: totrans-529
  prefs: []
  type: TYPE_NORMAL
  zh: 通过遵循本教程，您将很快掌握Canva的Magic Media，并为您的所有项目创建令人惊叹的视觉效果。享受探索其创造力的潜力吧！
- en: Five Sample Magic Media Prompts You Can Build On
  id: totrans-530
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 五个您可以构建的Magic Media提示样本
- en: 'Product Demo Video: A dynamic video showcasing a new noise-canceling headphone,
    highlighting its features like crystal-clear audio, comfortable design, and long
    battery life, with upbeat music and sleek visuals. Focus on lifestyle shots of
    people using the headphones in different scenarios.'
  id: totrans-531
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 产品演示视频：一部动态视频，展示一款新的降噪耳机，突出其功能，如水晶般清晰的音频、舒适的设计和长电池寿命，配以欢快的音乐和流畅的视觉效果。聚焦于人们在不同场景中使用耳机的日常生活照片。
- en: '2\. Social Media Ad for a Fitness App: A short, motivational video ad for a
    fitness app, featuring diverse individuals working out and achieving their fitness
    goals, with energetic music and text overlays highlighting the app''s key features
    and a clear call to action ("Download Now").'
  id: totrans-532
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 健身应用社交媒体广告：一段简短、励志的视频广告，展示不同的人锻炼并实现他们的健身目标，配以充满活力的音乐和文字叠加，突出应用的关键功能和清晰的行动号召（“立即下载”）。
- en: '3\. Explainer Video for SaaS Product: A concise and engaging animated explainer
    video for a project management SaaS platform, illustrating how it simplifies workflows,
    improves team collaboration, and boosts productivity, using clear visuals and
    a friendly voiceover.'
  id: totrans-533
  prefs: []
  type: TYPE_NORMAL
  zh: 3. SaaS 产品说明视频：一个简洁且吸引人的动画说明视频，用于项目管理 SaaS 平台，展示其简化工作流程、改善团队协作和提升生产力的方式，使用清晰的视觉和友好的旁白。
- en: '4\. Customer Testimonial Video: A heartwarming video featuring a satisfied
    customer sharing their success story using a meal delivery service, showcasing
    the convenience, healthy options, and positive impact it has had on their life,
    with genuine testimonials and relatable visuals.'
  id: totrans-534
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 客户评价视频：一部温馨的视频，展示一位满意的客户分享他们使用餐递服务的成功故事，展示其便利性、健康选择及其对生活的积极影响，配有真诚的评价和相关的视觉画面。
- en: '5\. Brand Story Video: A visually stunning video showcasing the history and
    values of a sustainable clothing brand, highlighting their commitment to ethical
    sourcing, eco-friendly materials, and positive social impact, with inspiring music
    and authentic footage of their production process.'
  id: totrans-535
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 品牌故事视频：一部视觉震撼的视频，展示可持续服装品牌的历史和价值观，突出其对道德采购、环保材料和积极社会影响的承诺，配以鼓舞人心的音乐和其生产过程的真实镜头。
- en: Six Magic Media Prompts to Generate Business Related Images
  id: totrans-536
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 生成与商业相关图像的六个神奇媒体提示
- en: 'Here are 6 Magic Media prompts geared towards sales and marketing visuals,
    covering logos, office workers, and headshots:'
  id: totrans-537
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是六个针对销售和营销视觉的神奇媒体提示，涵盖标志、办公室工作人员和半身照：
- en: 1\. Modern Logo Design
  id: totrans-538
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 现代标志设计
- en: A sleek and minimalist logo design incorporating abstract shapes and vibrant
    gradients, conveying innovation and forward-thinking for a tech startup.
  id: totrans-539
  prefs: []
  type: TYPE_NORMAL
  zh: 一种简洁而极简的标志设计，融入抽象形状和鲜艳的渐变，传达科技初创公司的创新和前瞻性思维。
- en: 2\. Dynamic Team Collaboration
  id: totrans-540
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 动态团队协作
- en: Realistic, photo quality office workers collaborating energetically around a
    table, brainstorming ideas with animated gestures and focused expressions, showcasing
    teamwork and creativity.
  id: totrans-541
  prefs: []
  type: TYPE_NORMAL
  zh: 真实、照片质量的办公室工作人员围坐在桌旁，充满活力地协作，用动画手势和专注的表情进行头脑风暴，展示团队合作和创造力。
- en: 3\. Professional Headshot
  id: totrans-542
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 专业半身照
- en: A confident and approachable headshot of a business professional, with a warm
    smile and a professional yet friendly background, emphasizing trustworthiness
    and expertise.
  id: totrans-543
  prefs: []
  type: TYPE_NORMAL
  zh: 一张自信且平易近人的商务专业人士的半身照，面带温暖的微笑，背景专业而友好，强调可靠性和专业知识。
- en: 4\. Social Media Ad Graphic
  id: totrans-544
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 社交媒体广告图形
- en: An eye-catching graphic for a social media ad campaign, featuring a special
    offer or promotion with clear call-to-action buttons and visually appealing typography.
  id: totrans-545
  prefs: []
  type: TYPE_NORMAL
  zh: 一种引人注目的社交媒体广告图形，展示特别优惠或促销活动，具有清晰的行动号召按钮和视觉上吸引人的排版。
- en: 5\. Website Banner Design
  id: totrans-546
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 网站横幅设计
- en: A captivating website banner design for an e-commerce store, promoting a seasonal
    sale with attractive product images and a clear call to action.
  id: totrans-547
  prefs: []
  type: TYPE_NORMAL
  zh: 一个吸引人的电子商务店铺网站横幅设计，推广季节性促销活动，配有吸引人的产品图片和清晰的行动号召。
- en: 6\. Business Card Design
  id: totrans-548
  prefs: []
  type: TYPE_NORMAL
  zh: 6. 名片设计
- en: A modern and professional business card design, incorporating the company logo
    and contact information in a clean and memorable layout.
  id: totrans-549
  prefs: []
  type: TYPE_NORMAL
  zh: 一种现代而专业的名片设计，将公司标志和联系信息融入整洁且易于记忆的布局中。
- en: Exploring Canva Pro Features
  id: totrans-550
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 探索 Canva Pro 功能
- en: 'While Canva’s free version is powerful, Canva Pro offers additional features:'
  id: totrans-551
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然 Canva 的免费版本功能强大，但 Canva Pro 提供了更多功能：
- en: 'Brand Kit: Save brand colors, fonts, and logos.'
  id: totrans-552
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 品牌工具包：保存品牌颜色、字体和标志。
- en: 'Magic Resize: Instantly adjust design dimensions.'
  id: totrans-553
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 魔法尺寸调整：即时调整设计尺寸。
- en: 'Background Remover: Remove image backgrounds with one click.'
  id: totrans-554
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 背景移除器：一键移除图像背景。
- en: 'Premium Templates & Elements: Access exclusive design resources.'
  id: totrans-555
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 付费模板与元素：访问独家设计资源。
- en: 'Collaboration Tools: Work on designs with a team.'
  id: totrans-556
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 协作工具：与团队一起工作设计。
- en: Tips and Tricks for Better Designs
  id: totrans-557
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 提高设计质量的技巧和窍门
- en: 'Use Consistent Fonts & Colors: Maintain uniformity in design.'
  id: totrans-558
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用一致的字体和颜色：保持设计的一致性。
- en: 'Utilize Grid & Alignment Tools: Ensure elements are perfectly placed.'
  id: totrans-559
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 利用网格与对齐工具：确保元素放置完美。
- en: 'Keep It Simple: Avoid overcrowding your design with too many elements.'
  id: totrans-560
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 简洁明了：避免在设计中添加过多元素。
- en: 'Experiment with Transparency: Create depth by adjusting element opacity.'
  id: totrans-561
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 尝试透明度：通过调整元素的不透明度来创造深度。
- en: 'Incorporate Icons & Illustrations: Enhance visual appeal with Canva’s extensive
    library.'
  id: totrans-562
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 添加图标与插图：利用Canva丰富的图库增强视觉吸引力。
- en: Conclusion
  id: totrans-563
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: Canva is an incredibly versatile tool that makes designing accessible to everyone,
    regardless of experience level. With its vast selection of templates, customization
    options, and AI-powered features, you can create professional-quality designs
    in minutes. Whether you’re designing for personal use, business branding, or social
    media, Canva provides all the tools you need.
  id: totrans-564
  prefs: []
  type: TYPE_NORMAL
  zh: Canva是一个极其灵活的工具，让每个人都能轻松设计，无论经验水平如何。凭借其庞大的模板选择、定制选项和AI功能，你可以在几分钟内创建专业质量的设计。无论是个人使用、商业品牌还是社交媒体，Canva都提供了你需要的所有工具。
- en: Now that you have a solid understanding of Canva, start exploring, get creative,
    and design something amazing!
  id: totrans-565
  prefs: []
  type: TYPE_NORMAL
  zh: 现在你已经对Canva有了扎实的理解，开始探索吧，发挥创意，设计一些令人惊叹的作品！
- en: Chapter seven
  id: totrans-566
  prefs: []
  type: TYPE_NORMAL
  zh: 第七章
- en: 'Unleash Your Inner Artist: A DALL-E 2 Tutorial for Stunning Business Graphics'
  id: totrans-567
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 激发你的内在艺术家：DALL-E 2教程，打造令人惊叹的商业图形
- en: DALL-E 2, OpenAI's revolutionary AI image generator, empowers you to create
    breathtaking visuals from simple text descriptions. This tutorial will guide you
    through the basics of DALL-E 2, focusing on generating stunning graphics for your
    business, including logos, web marketing ads, and more. We'll also explore the
    powerful image editing capabilities, including the regular edit feature.
  id: totrans-568
  prefs: []
  type: TYPE_NORMAL
  zh: DALL-E 2，OpenAI的革命性AI图像生成器，让你能够从简单的文本描述中创造出令人叹为观止的视觉效果。本教程将引导你了解DALL-E 2的基础知识，重点关注为你的商业活动生成令人惊叹的图形，包括标志、网络营销广告等。我们还将探索强大的图像编辑功能，包括常规编辑功能。
- en: What is DALL-E 2?
  id: totrans-569
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 什么是DALL-E 2？
- en: DALL-E 2 is an AI system that generates realistic and creative images from natural
    language descriptions, called "prompts." You provide the text, and DALL-E 2 interprets
    it, producing unique visuals. It's a powerful tool for brainstorming, prototyping,
    and creating final artwork.
  id: totrans-570
  prefs: []
  type: TYPE_NORMAL
  zh: DALL-E 2是一个AI系统，可以从自然语言描述（称为“提示”）生成逼真和富有创意的图像。你提供文本，DALL-E 2进行解读，产生独特的视觉作品。它是一个强大的工具，用于头脑风暴、原型制作和创建最终艺术作品。
- en: 'Getting Started:'
  id: totrans-571
  prefs: []
  type: TYPE_NORMAL
  zh: 开始使用：
- en: 'Access: You''ll need access to DALL-E 2\. While initially invite-only, access
    is becoming increasingly available. Check OpenAI''s website for the latest information.'
  id: totrans-572
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 访问权限：你需要访问DALL-E 2。虽然最初是邀请制，但访问权限正在变得越来越容易获得。请查看OpenAI的网站获取最新信息。
- en: 'The Prompt is Key: The quality of your generated image hinges on the clarity
    and detail of your prompt. Think of it as giving precise instructions to a human
    artist.'
  id: totrans-573
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提示是关键：生成的图像质量取决于提示的清晰度和细节。把它想象成向人类艺术家给出精确指令。
- en: 'Iteration is Your Friend: Don''t expect perfection from the first try. Experiment
    with different prompts, variations, and edits to refine your results.'
  id: totrans-574
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 迭代是你的朋友：不要期望第一次尝试就完美。通过不同的提示、变体和编辑来实验，以完善你的结果。
- en: 'Crafting Effective Prompts:'
  id: totrans-575
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 编写有效的提示：
- en: 'A good prompt is specific, descriptive, and imaginative. Consider these elements:'
  id: totrans-576
  prefs: []
  type: TYPE_NORMAL
  zh: 一个好的提示必须是具体的、描述性的和富有想象力的。考虑以下要素：
- en: 'Subject: What is the main focus of the image? (e.g., "a logo," "a website banner,"
    "a social media post")'
  id: totrans-577
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 主题：图像的主要焦点是什么？（例如，“一个标志”、“一个网站横幅”、“一个社交媒体帖子”）
- en: 'Style: What artistic style do you want? (e.g., "minimalist," "abstract," "photorealistic,"
    "watercolor," "pop art")'
  id: totrans-578
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 风格：你想要哪种艺术风格？（例如，“极简主义”、“抽象”、“逼真”、“水彩”、“波普艺术”）
- en: 'Composition: How should the elements be arranged? (e.g., "close-up," "wide
    shot," "centered," "diagonal")'
  id: totrans-579
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 构图：元素应该如何排列？（例如，“特写”、“全景”、“居中”、“对角线”）
- en: 'Color Palette: What colors should be dominant? (e.g., "vibrant," "pastel,"
    "monochromatic," "red and blue")'
  id: totrans-580
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 色彩调色板：应该以什么颜色为主？（例如，“鲜艳”、“柔和”、“单色”、“红色和蓝色”）
- en: 'Mood/Atmosphere: What feeling should the image evoke? (e.g., "professional,"
    "playful," "serious," "exciting")'
  id: totrans-581
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 情绪/氛围：图像应该唤起什么样的感觉？（例如，“专业”、“活泼”、“严肃”、“激动”）
- en: 'Specific Details: The more details you provide, the better DALL-E 2 can understand
    your vision. (e.g., "with geometric shapes," "with a futuristic background," "featuring
    a smiling person")'
  id: totrans-582
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 具体细节：你提供的细节越多，DALL-E 2 就能更好地理解你的愿景。（例如，“带有几何形状”，“带有未来背景”，“展示一个微笑的人”）
- en: 'Using DALL-E 2''s Features:'
  id: totrans-583
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用 DALL-E 2 的功能：
- en: 'Image Generation: Simply type your prompt into the text box and let DALL-E
    2 work its magic.'
  id: totrans-584
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 图像生成：只需将你的提示输入到文本框中，让 DALL-E 2 施展魔法。
- en: 'Variations: Once you have a good image, you can generate variations to explore
    different options.'
  id: totrans-585
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 变体：一旦你有一个好的图像，你可以生成变体来探索不同的选项。
- en: 'Edits (Including Inpainting and the Regular Edit Feature): DALL-E 2 offers
    two main ways to edit images:'
  id: totrans-586
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 编辑（包括修复编辑和常规编辑功能）：DALL-E 2 提供两种主要的图像编辑方式：
- en: 'Inpainting: This allows you to select a specific area of an image and regenerate
    it based on a new prompt. It''s ideal for adding, removing, or significantly altering
    parts of the image.'
  id: totrans-587
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 修复编辑：这允许你选择图像的特定区域，并根据新的提示重新生成它。它非常适合添加、删除或显著改变图像的某些部分。
- en: 'Regular Edit: This feature allows you to upload your own image or use a previously
    generated one and then provide a prompt describing how you want to modify the
    entire image. DALL-E 2 will attempt to make changes while preserving the existing
    style and overall composition. This is excellent for broader changes like adjusting
    lighting, adding a background, or changing the overall theme.'
  id: totrans-588
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 常规编辑：此功能允许你上传自己的图像或使用之前生成的图像，然后提供描述你想要如何修改整个图像的提示。DALL-E 2 将尝试进行更改，同时保留现有风格和整体构图。这对于调整照明、添加背景或更改整体主题等更广泛的变化非常出色。
- en: 'Upscaling: Improve the resolution of your generated images for higher-quality
    output.'
  id: totrans-589
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 超分辨率：提高生成图像的分辨率，以获得更高品质的输出。
- en: 'Editing Images with DALL-E 2 (Regular Edit):'
  id: totrans-590
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用 DALL-E 2 编辑图像（常规编辑）：
- en: 'Upload or Select an Image: You can either upload your own image or choose one
    you''ve already generated in DALL-E 2.'
  id: totrans-591
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 上传或选择图像：你可以上传自己的图像或选择你在 DALL-E 2 中已经生成的图像。
- en: 'Describe the Change: Enter a prompt describing the modification you want to
    make to the entire image. For example, if you have a product photo on a white
    background and want to place it on a wooden table, your prompt might be: "A product
    photo on a rustic wooden table."'
  id: totrans-592
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 描述更改：输入一个提示，描述你想要对整个图像进行的修改。例如，如果你有一张白色背景的产品照片，想要将其放置在木桌上，你的提示可能是：“一张放置在乡村木桌上的产品照片。”
- en: 'Maintaining Style During Edits: This is crucial for consistent branding. Try
    to preserve the existing style by referencing elements like "same product," "original
    lighting," "similar composition," or specific colors in your prompt. Example:
    "The same product photo, now on a rustic wooden table, maintaining the original
    lighting and perspective." This helps DALL-E 2 understand that you want to keep
    the core elements of the image intact while changing the background.'
  id: totrans-593
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在编辑过程中保持风格：这对于保持一致的品牌至关重要。尝试通过引用“相同的产品”、“原始照明”、“类似的构图”或提示中的特定颜色来保留现有风格。例如：“同样的产品照片，现在放置在乡村木桌上，保持原始照明和视角。”这有助于
    DALL-E 2 理解你希望保持图像的核心元素不变，同时更改背景。
- en: 'Editing Images with DALL-E 2 (Inpainting): See the previous response for details
    on using the inpainting feature.'
  id: totrans-594
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 DALL-E 2 编辑图像（修复编辑）：请参阅之前关于使用修复编辑功能的说明。
- en: 10 Example Prompts for Business Graphics (Including Regular and Inpainting Edits)
  id: totrans-595
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 10 个商业图形示例提示（包括常规和修复编辑）
- en: 'Logo: "A minimalist logo for a tech startup, featuring a stylized circuit board,
    in a clean sans-serif font, using a color palette of blue and white." Regular
    Edit: "The same logo, now with a subtle glow effect." Inpainting Edit: Select
    the text and prompt: "The same logo, but with the text in a bold, futuristic sans-serif
    font."'
  id: totrans-596
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 标志：一个为科技初创公司设计的简约标志，特色为一个风格化的电路板，采用干净的无衬线字体，使用蓝色和白色的调色板。常规编辑：与之前的标志相同，现在添加了微妙的发光效果。修复编辑：选择文本并提示：“同样的标志，但文本采用粗体、未来感的无衬线字体。”
- en: 'Website Banner: "A vibrant website banner for a travel agency, showcasing a
    tropical beach at sunset, with the text ''Book Your Dream Vacation'' in a bold,
    modern font."'
  id: totrans-597
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 网站横幅：“一家旅行社充满活力的网站横幅，展示日落时分的热带海滩，文字‘预订你的梦想假期’采用粗体、现代字体。”
- en: 'Social Media Post: "A playful social media post for a coffee shop, featuring
    a cartoon illustration of a steaming cup of coffee, with the text ''Wake Up and
    Smell the Coffee!'' in a handwritten font."'
  id: totrans-598
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 社交媒体帖子：“一家咖啡馆的俏皮社交媒体帖子，展示一个蒸汽腾腾的咖啡卡通插画，文字‘醒来闻咖啡香！’采用手写字体。”
- en: 'Product Packaging: "Photorealistic image of product packaging for organic honey,
    featuring a honeycomb pattern and a vintage-style label, with the text ''Pure
    Honey'' in a classic serif font."'
  id: totrans-599
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 产品包装：一款有机蜂蜜产品包装的逼真图像，特色为蜂巢图案和复古风格的标签，文字“纯蜂蜜”采用经典的衬线字体。"
- en: 'Infographic: "An infographic illustrating the benefits of using cloud computing,
    with icons representing data storage, security, and accessibility, using a clean
    and modern design."'
  id: totrans-600
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 信息图表：一款展示使用云计算好处的信息图表，使用代表数据存储、安全和可访问性的图标，采用干净、现代的设计风格。"
- en: 'Business Card: "A professional business card design for a graphic designer,
    featuring a geometric pattern and the contact information in a sleek, minimalist
    font, using a color scheme of black and white."'
  id: totrans-601
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 名片设计：一款专业的设计师名片设计，特色为几何图案和简洁、极简风格的联系方式，采用黑白色彩方案。"
- en: 'Marketing Ad: "A dynamic marketing ad for a fitness app, featuring a person
    running on a treadmill with a futuristic cityscape in the background, with the
    text ''Achieve Your Fitness Goals'' in a bold, energetic font." Regular Edit:
    "The same ad, but with the cityscape at night."'
  id: totrans-602
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 市场广告：一款健身应用的动态广告，背景为未来派城市景观，画面中有人正在跑步机上跑步，广告文字“实现您的健身目标”采用醒目、充满活力的字体。"常规编辑：与原图相同的广告，但背景为夜景。"
- en: 'Presentation Slide: "A visually appealing presentation slide for a sales pitch,
    featuring a graph showing sales growth, with a clean and professional design,
    using a color palette of green and white."'
  id: totrans-603
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 演示文稿幻灯片：一款用于销售演示的视觉吸引人的幻灯片，特色为显示销售增长的图表，设计简洁专业，采用绿色和白色的色彩方案。"
- en: 'Blog Post Image: "An eye-catching image for a blog post about sustainable living,
    featuring a lush green forest with a clear blue sky, with the text ''Go Green''
    in a natural, earthy font."'
  id: totrans-604
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 博客文章图片：一款关于可持续生活的博客文章的引人注目的图片，特色为郁郁葱葱的绿色森林和清澈的蓝天，文字“绿色生活”采用自然、大地的字体。"
- en: 'App Icon: "A simple and memorable app icon for a language learning app, featuring
    a stylized speech bubble, using a vibrant color palette and a modern, geometric
    design." Inpainting Edit: Select the speech bubble and prompt: "The same icon,
    but with the speech bubble redesigned as a stylized open book."'
  id: totrans-605
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 应用图标：一款语言学习应用的简单且易于记忆的图标，特色为一个风格化的话泡，采用鲜艳的色彩搭配和现代、几何的设计风格。"修复编辑：选择话泡并提示：“与原图相同的图标，但将话泡重新设计为一个风格化的打开的书本。”
- en: Tips for Success
  id: totrans-606
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 成功技巧
- en: 'Be Specific: The more specific you are, the better the results.'
  id: totrans-607
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 要具体：您越具体，结果越好。
- en: 'Experiment: Don''t be afraid to try different prompts and variations.'
  id: totrans-608
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 实验：不要害怕尝试不同的提示和变化。
- en: 'Iterate: Refine your prompts based on the results you get.'
  id: totrans-609
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 迭代：根据您获得的结果改进您的提示。
- en: 'Use References: If you have a specific style in mind, reference it in your
    prompt.'
  id: totrans-610
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用参考：如果您有特定的风格，请在您的提示中引用它。
- en: 'Combine Prompts: You can combine multiple prompts to create complex images.'
  id: totrans-611
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 组合提示：您可以组合多个提示来创建复杂的图像。
- en: 'Maintain Style During Edits: Use language that connects the edit back to the
    original image to preserve consistency. Distinguish between the inpainting edits
    (for localized changes) and regular edits (for whole image changes).'
  id: totrans-612
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在编辑过程中保持风格：使用将编辑与原始图像联系起来的语言，以保持一致性。区分修复编辑（用于局部更改）和常规编辑（用于整个图像更改）。"
- en: DALL-E 2 is a powerful tool for generating stunning business graphics. By mastering
    the art of prompt engineering and leveraging the edit features, you can unlock
    its full potential and create visuals that will elevate your brand and marketing
    efforts. Start experimenting, and unleash your creativity!
  id: totrans-613
  prefs: []
  type: TYPE_NORMAL
  zh: DALL-E 2 是生成令人惊叹的商业图形的强大工具。通过掌握提示工程的艺术并利用编辑功能，您可以解锁其全部潜力，并创建能够提升您品牌和营销努力的视觉作品。开始实验，释放您的创造力！"
- en: Chapter eight
  id: totrans-614
  prefs: []
  type: TYPE_NORMAL
  zh: 第八章
- en: 'MidJourney Tutorial: How to Create Stunning AI-Generated Images'
  id: totrans-615
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: MidJourney 教程：如何创建令人惊叹的 AI 生成的图像
- en: Introduction to MidJourney
  id: totrans-616
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: MidJourney 简介
- en: MidJourney is a powerful AI-driven image generation tool that allows users to
    create stunning visuals from simple text prompts. It is widely used by artists,
    designers, and enthusiasts who want to bring their creative visions to life with
    minimal effort. Whether you are looking to create fantasy landscapes, sci-fi scenes,
    serene seashores, or realistic images of people in everyday settings, MidJourney
    can help you generate high-quality artwork in seconds.
  id: totrans-617
  prefs: []
  type: TYPE_NORMAL
  zh: MidJourney 是一个强大的 AI 驱动的图像生成工具，允许用户通过简单的文本提示创建令人惊叹的视觉效果。它被艺术家、设计师和爱好者广泛使用，他们希望通过最小努力将他们的创意愿景变为现实。无论你是想创建幻想风景、科幻场景、宁静的海岸，还是在日常环境中拍摄逼真的图像，MidJourney
    都可以帮助你在几秒钟内生成高质量的艺术作品。
- en: In this tutorial, you’ll learn how to use MidJourney effectively and explore
    10 sample prompts to create breathtaking images in different categories.
  id: totrans-618
  prefs: []
  type: TYPE_NORMAL
  zh: 在本教程中，你将学习如何有效地使用 MidJourney，并探索 10 个示例提示，以创建不同类别中令人叹为观止的图像。
- en: Getting Started with MidJourney
  id: totrans-619
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 开始使用 MidJourney
- en: 'Step 1: Access MidJourney'
  id: totrans-620
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 第一步：访问 MidJourney
- en: 'MidJourney is now available as a standalone web application, eliminating the
    need for Discord. To start using it:'
  id: totrans-621
  prefs: []
  type: TYPE_NORMAL
  zh: MidJourney 现已作为独立的网络应用程序提供，无需使用 Discord。要开始使用它：
- en: Visit the [MidJourney website](https://www.midjourney.com/).
  id: totrans-622
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 访问 [MidJourney 网站](https://www.midjourney.com/)。
- en: Sign up or log in to your account.
  id: totrans-623
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 注册或登录您的账户。
- en: Subscribe to a MidJourney plan to gain access to the image generation features.
  id: totrans-624
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 订阅 MidJourney 计划以获取图像生成功能。
- en: 'Step 2: Use the Prompt System'
  id: totrans-625
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 第二步：使用提示系统
- en: 'Once inside the MidJourney web app:'
  id: totrans-626
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦进入 MidJourney 网络应用程序：
- en: Locate the prompt input field.
  id: totrans-627
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 定位提示输入字段。
- en: Type a descriptive text prompt for the image you want to generate.
  id: totrans-628
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 输入你想要生成的图像的描述性文本提示。
- en: Press the generate button, and MidJourney will create four variations of the
    image based on your description.
  id: totrans-629
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 点击生成按钮，MidJourney 将根据你的描述创建图像的四个变体。
- en: Use the available options to upscale or refine your chosen image.
  id: totrans-630
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用可用的选项来提升或细化你选择的图像。
- en: 'Step 3: Adjust Settings for Better Results'
  id: totrans-631
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 第三步：调整设置以获得更好的结果
- en: 'Aspect Ratio: Use --ar to adjust width and height (e.g., --ar 16:9 for widescreen
    images).'
  id: totrans-632
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 比例：使用 --ar 调整宽度和高度（例如，--ar 16:9 用于宽屏图像）。
- en: 'Quality: Use --q to set quality (higher values use more processing time, e.g.,
    --q 2).'
  id: totrans-633
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 质量：使用 --q 设置质量（更高的值使用更多的处理时间，例如，--q 2）。
- en: 'Style: Use --s to adjust artistic style (e.g., --s 500 for a highly detailed
    image).'
  id: totrans-634
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 风格：使用 --s 调整艺术风格（例如，--s 500 用于高度详细的图像）。
- en: 'Version: Use --v to specify which version of MidJourney’s AI you want to use.'
  id: totrans-635
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 版本：使用 --v 指定你想要使用的 MidJourney 的 AI 版本。
- en: Now that you know the basics, let’s explore 10 sample prompts!
  id: totrans-636
  prefs: []
  type: TYPE_NORMAL
  zh: 现在你已经了解了基础知识，让我们探索 10 个示例提示！
- en: 10 Sample MidJourney Prompts
  id: totrans-637
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 10 个 MidJourney 示例提示
- en: 1\. Fantasy Landscape
  id: totrans-638
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1. 幻想风景
- en: '"A majestic floating island with cascading waterfalls, lush green forests,
    and ancient ruins glowing with magical runes, ethereal mist in the background,
    cinematic lighting --ar 16:9 --q 2 --s 500 --v 5"'
  id: totrans-639
  prefs: []
  type: TYPE_NORMAL
  zh: '"一个壮丽的漂浮岛屿，瀑布飞流直下，郁郁葱葱的绿色森林，以及散发着魔法符文的古老遗迹，背景中飘着空灵的薄雾，电影般的照明 --ar 16:9 --q
    2 --s 500 --v 5"'
- en: This prompt will generate a breathtaking fantasy environment perfect for storytelling
    or concept art.
  id: totrans-640
  prefs: []
  type: TYPE_NORMAL
  zh: 此提示将生成一个令人叹为观止的幻想环境，非常适合讲故事或概念艺术。
- en: 2\. Sci-Fi Cityscape
  id: totrans-641
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2. 科幻城市景观
- en: '"A futuristic cyberpunk city with neon-lit skyscrapers, flying cars, bustling
    streets filled with humanoid robots and people wearing cybernetic enhancements,
    dramatic lighting, ultra-detailed --ar 16:9 --q 2 --s 750 --v 5"'
  id: totrans-642
  prefs: []
  type: TYPE_NORMAL
  zh: '"一个未来派的赛博朋克城市，霓虹灯照亮的摩天大楼，飞行汽车，熙熙攘攘的街道上充满了类人机器人以及穿着电子增强设备的人们，戏剧性的照明，超详细 --ar
    16:9 --q 2 --s 750 --v 5"'
- en: This prompt will produce an intense, high-tech cityscape with strong sci-fi
    aesthetics.
  id: totrans-643
  prefs: []
  type: TYPE_NORMAL
  zh: 此提示将生成一个充满高科技美学元素、强烈的科幻城市景观。
- en: 3\. Majestic Mountain Range
  id: totrans-644
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3. 壮丽的山脉
- en: '"A stunning snow-capped mountain range with golden sunlight illuminating the
    peaks, a peaceful valley below with a winding river, dramatic clouds, ultra-realistic
    --ar 16:9 --q 2 --s 500 --v 5"'
  id: totrans-645
  prefs: []
  type: TYPE_NORMAL
  zh: '"一个令人惊叹的雪山山脉，金色的阳光照亮了山顶，下面是一个宁静的山谷，蜿蜒的河流，戏剧性的云彩，超逼真 --ar 16:9 --q 2 --s 500
    --v 5"'
- en: This is great for creating breathtaking nature photography-style images.
  id: totrans-646
  prefs: []
  type: TYPE_NORMAL
  zh: 这非常适合创建令人叹为观止的自然摄影风格图像。
- en: 4\. Serene Seashore at Sunset
  id: totrans-647
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4. 日落时分的宁静海岸
- en: '"A tranquil seashore with soft golden sand, gentle waves crashing against rocky
    cliffs, a lighthouse glowing in the distance, pink and orange sunset hues reflecting
    on the water, dreamy atmosphere --ar 16:9 --q 2 --s 600 --v 5"'
  id: totrans-648
  prefs: []
  type: TYPE_NORMAL
  zh: '"一个宁静的海岸，柔软的金色沙滩，温柔的波浪拍打着岩石悬崖，远处一座灯塔闪烁着光芒，粉色和橙色的日落色调在水中反射，梦幻般的氛围 --ar 16:9
    --q 2 --s 600 --v 5"'
- en: A perfect prompt for capturing the beauty and peace of the ocean.
  id: totrans-649
  prefs: []
  type: TYPE_NORMAL
  zh: 一个捕捉海洋美丽与宁静的完美提示。
- en: 5\. People in a Park on a Sunny Day
  id: totrans-650
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 5. 阳光明媚的日子里公园里的人们
- en: '"A lively city park with people jogging, children playing, families having
    picnics, tall green trees providing shade, bright sunny day, ultra-realistic photography
    style --ar 16:9 --q 2 --s 400 --v 5"'
  id: totrans-651
  prefs: []
  type: TYPE_NORMAL
  zh: '"一个充满活力的城市公园，人们慢跑，孩子们玩耍，家庭野餐，高大的绿树提供阴凉，阳光明媚的一天，超逼真的摄影风格 --ar 16:9 --q 2 --s
    400 --v 5"'
- en: This will generate an image that feels warm, inviting, and full of life.
  id: totrans-652
  prefs: []
  type: TYPE_NORMAL
  zh: 这将生成一种温暖、欢迎且充满生机的图像。
- en: 6\. Family Walking Down a New York City Street
  id: totrans-653
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 6. 纽约市街道上的家庭行走
- en: '"A young family walking down a bustling New York City street, parents pushing
    a stroller with a baby, tall skyscrapers, yellow cabs, pedestrians, realistic
    lighting, urban energy, detailed architecture --ar 16:9 --q 2 --s 700 --v 5"'
  id: totrans-654
  prefs: []
  type: TYPE_NORMAL
  zh: '"一个年轻家庭在繁忙的纽约市街道上行走，父母推着婴儿车，高耸的摩天大楼，黄色的出租车，行人，逼真的灯光，城市活力，详细的建筑 --ar 16:9 --q
    2 --s 700 --v 5"'
- en: A fantastic way to capture everyday city life with high realism.
  id: totrans-655
  prefs: []
  type: TYPE_NORMAL
  zh: 一种捕捉日常生活高真实感城市生活的绝佳方式。
- en: 7\. Mystical Forest with Hidden Secrets
  id: totrans-656
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 7. 隐藏秘密的神秘森林
- en: '"A dense mystical forest with ancient towering trees, glowing fireflies, an
    enchanted pathway leading to an old wooden bridge, soft magical mist, dreamlike
    lighting --ar 16:9 --q 2 --s 600 --v 5"'
  id: totrans-657
  prefs: []
  type: TYPE_NORMAL
  zh: '"一片密集的神秘森林，古树参天，萤火虫闪烁，一条通往古老木桥的魔幻小径，柔和的魔法薄雾，梦幻般的灯光 --ar 16:9 --q 2 --s 600
    --v 5"'
- en: This prompt creates a fantasy forest scene ideal for fairytales or magical storytelling.
  id: totrans-658
  prefs: []
  type: TYPE_NORMAL
  zh: 这个提示创建了一个理想的童话或魔法故事幻想森林场景。
- en: 8\. Dystopian Post-Apocalyptic Ruins
  id: totrans-659
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 8. 反乌托邦末日废墟
- en: '"A desolate post-apocalyptic city overgrown with nature, abandoned skyscrapers
    covered in vines, rusted vehicles, a lone survivor with a gas mask walking through,
    moody and cinematic --ar 16:9 --q 2 --s 750 --v 5"'
  id: totrans-660
  prefs: []
  type: TYPE_NORMAL
  zh: '"一个荒凉的末日废墟城市，自然生长，被藤蔓覆盖的废弃摩天大楼，生锈的车辆，一个戴着防毒面具的幸存者独自穿过，情绪化和电影化 --ar 16:9 --q
    2 --s 750 --v 5"'
- en: This generates a haunting yet visually stunning dystopian environment.
  id: totrans-661
  prefs: []
  type: TYPE_NORMAL
  zh: 这生成了一种令人毛骨悚然但视觉上令人惊叹的反乌托邦环境。
- en: 9\. Epic Battle Scene
  id: totrans-662
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 9. 史诗般的战斗场景
- en: '"A massive battle between armored knights and fire-breathing dragons, dust
    and smoke rising, intense action, cinematic lighting, dynamic composition, ultra-detailed
    fantasy art --ar 16:9 --q 2 --s 800 --v 5"'
  id: totrans-663
  prefs: []
  type: TYPE_NORMAL
  zh: '"一场装甲骑士与喷火龙的激烈战斗，尘土和烟雾弥漫，紧张的动作场面，电影般的灯光，动态构图，超详细幻想艺术 --ar 16:9 --q 2 --s 800
    --v 5"'
- en: This will create an action-packed fantasy battle scene with high visual impact.
  id: totrans-664
  prefs: []
  type: TYPE_NORMAL
  zh: 这将创建一个充满动作的幻想战斗场景，视觉效果强烈。
- en: 10\. Cozy Winter Cabin in the Mountains
  id: totrans-665
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 10. 山中的温馨小屋
- en: '"A warm and cozy wooden cabin in a snowy mountain landscape, soft glowing lights
    from the windows, smoke rising from the chimney, tall evergreen trees covered
    in snow, peaceful night sky with twinkling stars --ar 16:9 --q 2 --s 600 --v 5"'
  id: totrans-666
  prefs: []
  type: TYPE_NORMAL
  zh: '"一座位于雪地山景中的温暖舒适的木屋，窗户透出的柔和灯光，烟囱升起的烟雾，覆盖着雪的高大常绿树，宁静的夜空中有闪烁的星星 --ar 16:9 --q
    2 --s 600 --v 5"'
- en: This prompt generates a picturesque and comforting winter scene.
  id: totrans-667
  prefs: []
  type: TYPE_NORMAL
  zh: 这个提示生成了一幅如画且令人舒适的冬日景象。
- en: Conclusion
  id: totrans-668
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: MidJourney is a powerful tool for creating beautiful AI-generated images. By
    using descriptive prompts and adjusting parameters like aspect ratio, quality,
    and style, you can fine-tune your results for incredible artwork. Whether you
    are interested in fantasy, sci-fi, nature, or everyday realism, MidJourney provides
    endless creative possibilities.
  id: totrans-669
  prefs: []
  type: TYPE_NORMAL
  zh: MidJourney 是一个强大的工具，用于创建美丽的 AI 生成的图像。通过使用描述性提示和调整如纵横比、质量和风格等参数，你可以微调你的结果以获得令人难以置信的艺术作品。无论你对幻想、科幻、自然还是日常生活现实主义感兴趣，MidJourney
    都提供了无限的创意可能性。
- en: Try experimenting with different prompts and parameters to unlock your unique
    artistic style. Happy generating!
  id: totrans-670
  prefs: []
  type: TYPE_NORMAL
  zh: 尝试使用不同的提示和参数进行实验，以解锁你独特的艺术风格。祝您创作愉快！
- en: Help Others with Your Review
  id: totrans-671
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 用你的评论帮助他人
- en: Make AI Easy for Everyone
  id: totrans-672
  prefs: []
  type: TYPE_NORMAL
  zh: 让人工智能对每个人来说都变得简单
- en: '"A little help goes a long way." - Anonymous'
  id: totrans-673
  prefs: []
  type: TYPE_NORMAL
  zh: '"一点小小的帮助就能走得很远。" - 匿名'
- en: The best way to learn is by sharing what we know. When we take a moment to help
    someone else, we make the world a little better—not just for them, but for ourselves
    too.
  id: totrans-674
  prefs: []
  type: TYPE_NORMAL
  zh: 学习的最佳方式是分享我们所知。当我们花时间帮助他人时，我们使世界变得更好——不仅对他们，也对我们自己。
- en: So, I have a question for you…
  id: totrans-675
  prefs: []
  type: TYPE_NORMAL
  zh: 所以，我有一个问题要问你……
- en: Would you help a stranger if it cost you nothing?
  id: totrans-676
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你什么都不用付出，你会帮助一个陌生人吗？
- en: This person is like you—curious about AI, eager to understand it, but maybe
    not sure where to start. They want to use AI to make life easier, work smarter,
    and stay ahead in a fast-changing world.
  id: totrans-677
  prefs: []
  type: TYPE_NORMAL
  zh: 这个人就像您一样——对AI充满好奇，渴望理解它，但可能不确定从哪里开始。他们希望使用AI让生活更轻松，工作更智能，并在快速变化的世界中保持领先。
- en: That’s why The AI Handbook for Everyone exists—to make AI simple, clear, and
    useful for everyday people. But to reach more readers, we need your help.
  id: totrans-678
  prefs: []
  type: TYPE_NORMAL
  zh: 正因如此，《人人AI手册》存在——让AI变得简单、清晰，对普通人有用。但为了吸引更多读者，我们需要您的帮助。
- en: A quick review of the book—just a few words about what you liked—can help someone
    decide to take that first step into AI.
  id: totrans-679
  prefs: []
  type: TYPE_NORMAL
  zh: 对本书的简要评论——只需几句话谈谈您喜欢的内容——就能帮助某人决定迈出进入AI的第一步。
- en: Review Link – [https://www.amazon.com/review/create-review/?ie=UTF8&channel=glance-detail&asin=B0DXSH3Y4J](https://www.amazon.com/review/create-review/?ie=UTF8&channel=glance-detail&asin=B0DXSH3Y4J)
  id: totrans-680
  prefs: []
  type: TYPE_NORMAL
  zh: 复审链接 – [https://www.amazon.com/review/create-review/?ie=UTF8&channel=glance-detail&asin=B0DXSH3Y4J](https://www.amazon.com/review/create-review/?ie=UTF8&channel=glance-detail&asin=B0DXSH3Y4J)
- en: If this book has helped you, inspired you, or made AI a little less confusing,
    your review can do the same for someone else.
  id: totrans-681
  prefs: []
  type: TYPE_NORMAL
  zh: 如果这本书帮助了您，激发了您，或让AI变得不那么令人困惑，您的评论也能对其他人产生同样的影响。
- en: And that’s how we grow together.
  id: totrans-682
  prefs: []
  type: TYPE_NORMAL
  zh: 就这样我们一起成长。
- en: Thank you for being part of this journey.
  id: totrans-683
  prefs: []
  type: TYPE_NORMAL
  zh: 感谢您成为这段旅程的一部分。
- en: Chapter nine
  id: totrans-684
  prefs: []
  type: TYPE_NORMAL
  zh: 第九章
- en: 100 ChatGPT Prompts for Everyday Use
  id: totrans-685
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 100个日常使用的ChatGPT提示
- en: Top 10 Tasks On ChatGPT
  id: totrans-686
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: ChatGPT上的前10大任务
- en: 'ChatGPT has become a versatile tool for users across various domains, assisting
    with a wide range of tasks. Based on user reports and studies, here are the top
    10 activities consumers frequently utilize ChatGPT for:'
  id: totrans-687
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT已成为跨领域用户的多功能工具，协助完成各种任务。根据用户报告和研究，以下是消费者经常使用ChatGPT的前10项活动：
- en: 'Writing Extended Prose: Users employ ChatGPT to draft essays, articles, and
    other long-form content, benefiting from its ability to generate coherent and
    contextually relevant text.'
  id: totrans-688
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 撰写长篇散文：用户利用ChatGPT起草文章、文章和其他长篇内容，受益于其生成连贯且与上下文相关的文本的能力。
- en: 'Composing Emails and Letters: The AI assists in crafting professional and personal
    correspondence, ensuring clarity and appropriate tone.'
  id: totrans-689
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 撰写电子邮件和信件：AI协助撰写专业和个人通讯，确保清晰和适当的语气。
- en: 'Creative Writing: From poetry to storytelling, users leverage ChatGPT''s creative
    capabilities to brainstorm ideas and develop narratives.'
  id: totrans-690
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 创意写作：从诗歌到讲故事，用户利用ChatGPT的创意能力来激发想法和发展叙事。
- en: 'Social Media Content Creation: ChatGPT aids in generating engaging posts and
    captions tailored for various social media platforms.'
  id: totrans-691
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 社交媒体内容创作：ChatGPT协助生成针对各种社交媒体平台的吸引人帖子和大标题。
- en: 'Academic Assistance: Students utilize ChatGPT for explanations of complex concepts,
    drafting essays, and solving problems, making it a valuable educational tool.'
  id: totrans-692
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 学术援助：学生利用ChatGPT解释复杂概念、起草文章和解决问题，使其成为宝贵的教育工具。
- en: 'Translation Services: The AI provides translations between languages, helping
    users understand and communicate across linguistic barriers.'
  id: totrans-693
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 翻译服务：AI提供语言之间的翻译，帮助用户理解和跨越语言障碍进行沟通。
- en: 'Job Application Support: Job seekers use ChatGPT to write and refine résumés
    and cover letters, enhancing their professional profiles.'
  id: totrans-694
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 求职申请支持：求职者使用ChatGPT撰写和改进简历和求职信，提升他们的专业形象。
- en: 'Coding and Programming Help: Developers turn to ChatGPT for writing code snippets,
    debugging, and understanding programming concepts.'
  id: totrans-695
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 编程和编程帮助：开发者转向ChatGPT编写代码片段、调试和理解编程概念。
- en: 'Idea Generation and Brainstorming: Users seek ChatGPT''s assistance in generating
    ideas for projects, content, and problem-solving scenarios.'
  id: totrans-696
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 想象力和头脑风暴：用户寻求ChatGPT在项目、内容和问题解决场景中生成想法的帮助。
- en: 'Personalized Recommendations: ChatGPT offers tailored suggestions for books,
    movies, travel destinations, and more, based on user preferences.'
  id: totrans-697
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 定制推荐：ChatGPT根据用户偏好提供针对书籍、电影、旅行目的地等的定制建议。
- en: 'These activities can be categorized into the following top 10 domains:'
  id: totrans-698
  prefs: []
  type: TYPE_NORMAL
  zh: 这些活动可以归类为以下前10个领域：
- en: 'Content Creation: Encompasses writing articles, essays, and creative pieces.'
  id: totrans-699
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 内容创作：包括撰写文章、文章和创意作品。
- en: 'Communication: Involves drafting emails, letters, and social media content.'
  id: totrans-700
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 沟通：涉及撰写电子邮件、信件和社交媒体内容。
- en: 'Education: Includes academic assistance, explanations, and learning support.'
  id: totrans-701
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 教育：包括学术援助、解释和学习支持。
- en: 'Programming: Covers coding help, debugging, and code generation.'
  id: totrans-702
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 编程：涵盖编码帮助、调试和代码生成。
- en: 'Translation: Pertains to converting text between languages.'
  id: totrans-703
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 翻译：涉及在语言之间转换文本。
- en: 'Professional Development: Focuses on job applications, résumé building, and
    cover letter writing.'
  id: totrans-704
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 职业发展：专注于求职、简历构建和求职信写作。
- en: 'Creative Arts: Relates to poetry, storytelling, and other artistic endeavors.'
  id: totrans-705
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 创意艺术：与诗歌、讲故事和其他艺术活动相关。
- en: 'Idea Generation: Involves brainstorming and developing new concepts.'
  id: totrans-706
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 灵感生成：涉及头脑风暴和发展新概念。
- en: 'Personal Assistance: Offers recommendations and planning for personal activities.'
  id: totrans-707
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 个人助理：提供个人活动的建议和规划。
- en: 'Social Interaction: Assists with composing messages and improving interpersonal
    communications.'
  id: totrans-708
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 社交互动：帮助撰写信息和改善人际沟通。
- en: 100 ChatGPT Prompts for Everyday Use
  id: totrans-709
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 100个日常使用的ChatGPT提示
- en: These categories highlight the diverse applications of ChatGPT, reflecting its
    integration into both personal and professional aspects of users' lives.
  id: totrans-710
  prefs: []
  type: TYPE_NORMAL
  zh: 这些类别突出了ChatGPT的多样化应用，反映了它融入用户个人和职业生活的各个方面。
- en: Writing Prose
  id: totrans-711
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 写散文
- en: Personal Journal Entry
  id: totrans-712
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 个人日记条目
- en: '"I want to write a personal journal entry reflecting on my day. My main activities
    included [describe your day], and I felt [describe emotions]. Please write a thoughtful
    and engaging journal entry in the first person, capturing my thoughts and feelings.
    Keep it introspective yet conversational."'
  id: totrans-713
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '"我想写一篇反思我一天的日记。我的主要活动包括[描述你的日子]，我感到[描述情绪]。请写一篇深思熟虑且引人入胜的日记，用第一人称捕捉我的思想和感受。保持内省且对话式。"'
- en: Storytelling for Kids
  id: totrans-714
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 儿童故事讲述
- en: '"I need to tell a bedtime story to a [age] year-old child about a brave [animal
    or character] who embarks on an adventure in a magical land. The story should
    be engaging, age-appropriate, and include a moral lesson about [kindness, bravery,
    honesty, etc.]. Please write a short, imaginative story with dialogue."'
  id: totrans-715
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '"我需要给一个[年龄]岁的孩子讲一个关于一个勇敢的[动物或角色]在神奇的土地上开始冒险的睡前故事。这个故事应该引人入胜，适合年龄，并包括关于[善良、勇敢、诚实等]的道德教训。请写一个简短、富有想象力的故事，包括对话。"'
- en: Reflective Letter to My Future Self
  id: totrans-716
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 给未来的自己的反思信
- en: '"I’d like to write a letter to my future self, one year from today. In this
    letter, I want to reflect on my current struggles, dreams, and goals. I also want
    to include words of encouragement, reminders of important values, and a few questions
    to reflect on. Please write this letter in a warm and inspiring tone."'
  id: totrans-717
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '"我想写一封给一年后自己的信。在这封信中，我想反思我目前的挣扎、梦想和目标。我还想包括一些鼓励的话语，提醒重要的价值观，以及一些反思的问题。请用温暖和鼓舞人心的语调写这封信。"'
- en: Captivating Social Media Post
  id: totrans-718
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 吸引人的社交媒体帖子
- en: '"I want to create an engaging social media post about [topic—travel, food,
    productivity, self-care, etc.]. The post should have a compelling hook, a relatable
    story, and a call to action that encourages engagement (e.g., asking followers
    for their experiences). Please make it conversational and engaging, suitable for
    Instagram/Facebook."'
  id: totrans-719
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '"我想创建一个关于[主题—旅行、食物、生产力、自我照顾等]的引人入胜的社交媒体帖子。帖子应该有一个吸引人的钩子，一个容易引起共鸣的故事，以及一个鼓励参与的行动号召（例如，向粉丝询问他们的经历）。请让它对话式且引人入胜，适合Instagram/Facebook。"'
- en: Personal Essay for Self-Improvement
  id: totrans-720
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 自我提升的个人散文
- en: '"I am reflecting on an important life lesson I recently learned: [describe
    lesson]. I’d like to turn this into a personal essay that tells a short anecdote,
    explains the lesson learned, and provides insights that others might find valuable.
    Please make it engaging and thought-provoking, around 500 words."'
  id: totrans-721
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '"我正在反思我最近学到的一个重要生活教训：[描述教训]。我想把它变成一篇个人散文，讲述一个简短的故事，解释学到的教训，并提供其他人可能认为有价值的见解。请让它引人入胜且发人深省，大约500字。"'
- en: Motivational Speech for a Small Audience
  id: totrans-722
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 小型听众的励志演讲
- en: '"I need to give a short motivational speech to a small group of friends or
    colleagues about overcoming challenges. The speech should start with a personal
    anecdote, introduce a universal lesson, and end with an inspiring call to action.
    Please write this in a passionate yet conversational tone, around 3-5 minutes
    long."'
  id: totrans-723
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '"我需要为一个小团体中的朋友或同事做一个关于克服挑战的简短励志演讲。演讲应该从一个个人轶事开始，介绍一个普遍的教训，并以一个鼓舞人心的行动号召结束。请用充满激情且对话式的语调写，大约3-5分钟长。"'
- en: Wedding or Special Occasion Toast
  id: totrans-724
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 婚礼或特殊场合祝酒词
- en: '"I have to give a toast at [wedding, birthday, retirement, anniversary, etc.].
    The toast should be heartfelt, a little humorous, and express my deep appreciation
    for [person’s name]. Include a personal story, a warm message, and a memorable
    closing. Please make it lighthearted and sincere."'
  id: totrans-725
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '"我必须在[婚礼、生日、退休、周年纪念日等]上发表祝酒词。祝酒词应充满深情，略带幽默，并表达我对[人名]的深深感激。包括一个个人故事，一条温暖的信息，以及一个难忘的结束语。请让它轻松愉快且真诚。"'
- en: Engaging Travel Blog Post
  id: totrans-726
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 引人入胜的旅行博客文章
- en: '"I recently visited [destination] and want to write a travel blog post about
    my experience. The post should include a vivid description of the location, highlights
    of the trip, cultural insights, and practical tips for future travelers. Please
    make it engaging, informative, and immersive."'
  id: totrans-727
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '"我最近访问了[目的地]，想写一篇关于我的旅行体验的博客文章。文章应包括对地点的生动描述，旅行的亮点，文化洞察，以及为未来旅行者提供的实用建议。请让它引人入胜、信息丰富且身临其境。"'
- en: Thought-Provoking Opinion Piece
  id: totrans-728
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 发人深省的评论文章
- en: '"I’d like to write an opinion piece on [current event, social issue, lifestyle
    trend, etc.]. It should present a clear argument, provide supporting evidence
    or examples, and invite discussion. Please write it in a compelling and well-structured
    way, with a strong introduction and conclusion."'
  id: totrans-729
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '"我想就[当前事件、社会问题、生活方式趋势等]写一篇评论文章。它应提出明确的论点，提供支持证据或例子，并邀请讨论。请以引人入胜和结构良好的方式撰写，有强大的引言和结论。"'
- en: Heartfelt Thank You Letter
  id: totrans-730
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 深情感谢信
- en: '"I want to write a thank-you letter to [someone important—teacher, mentor,
    friend, family member] who has made a difference in my life. The letter should
    express my deep gratitude, include specific examples of their impact, and be warm
    and personal. Please write this in a sincere and appreciative tone."'
  id: totrans-731
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '"我想给[重要人物——老师、导师、朋友、家庭成员]写一封感谢信，他们在我的生活中做出了改变。信中应表达我的深切感激，包括他们影响的特定例子，并温暖而个人化。请以真诚和感激的语调撰写。"'
- en: Composing Emails and Letters
  id: totrans-732
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 编写邮件和信件
- en: Professional Email Request
  id: totrans-733
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 专业邮件请求
- en: '"I need to write a professional email requesting [specific request] from [recipient].
    The email should be clear, concise, and polite, with a strong subject line and
    a call to action. Please structure it professionally while maintaining a warm
    and respectful tone."'
  id: totrans-734
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '"我需要写一封专业邮件，向[收件人]请求[具体请求]。邮件应清晰、简洁、礼貌，有强烈的主题行和行动号召。请在保持温暖和尊重的语调的同时，专业地构建它。"'
- en: Follow-Up Email After a Meeting
  id: totrans-735
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 会议后续邮件
- en: '"I recently had a meeting with [person or company], and I want to send a follow-up
    email summarizing key points, expressing gratitude, and outlining next steps.
    Please craft a professional yet friendly email that reinforces our discussion
    and encourages continued engagement."'
  id: totrans-736
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '"我最近与[人或公司]举行了一次会议，我想发送一封后续邮件总结要点，表达感激，并概述下一步行动。请撰写一封专业而友好的邮件，加强我们的讨论并鼓励持续参与。"'
- en: Apology Letter for a Mistake
  id: totrans-737
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 因错误而道歉的信
- en: '"I need to write an apology letter to [recipient] for [describe mistake]. The
    letter should express sincere regret, take responsibility, and offer a solution
    or plan to prevent future issues. Please make it professional yet empathetic."'
  id: totrans-738
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '"我需要给[收件人]写一封道歉信，针对[描述错误]。信中应表达真诚的歉意，承担责任，并提出防止未来问题的解决方案或计划。请让它既专业又富有同理心。"'
- en: Job Application Cover Letter
  id: totrans-739
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 职位申请求职信
- en: '"I’m applying for a [job title] position at [company name]. My key qualifications
    include [list relevant skills/experience]. Please write a compelling cover letter
    that highlights my strengths, aligns with the job description, and conveys enthusiasm
    for the role."'
  id: totrans-740
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '"我正在申请[公司名称]的[职位名称]职位。我的主要资格包括[列出相关技能/经验]。请写一封引人注目的求职信，突出我的优势，与职位描述相符，并传达对该职位的热情。"'
- en: Resignation Letter
  id: totrans-741
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 辞职信
- en: '"I am resigning from my position at [company name] as [job title], effective
    [date]. I’d like to express gratitude for my time at the company while maintaining
    professionalism. Please write a polite and appreciative resignation letter that
    leaves a positive impression."'
  id: totrans-742
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '"我作为[公司名称]的[职位名称]，从[日期]起辞职。我想对我的公司时光表示感激，同时保持专业态度。请写一封礼貌且感激的辞职信，留下积极的印象。"'
- en: Networking Email for Career Opportunities
  id: totrans-743
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 职业机会的联络邮件
- en: '"I want to reach out to [recipient] to explore potential career opportunities
    and seek advice. Please draft a professional and engaging email that introduces
    myself, expresses admiration for their work, and politely requests a conversation
    or mentorship."'
  id: totrans-744
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '"我想联系[收件人]探讨潜在的职业机会并寻求建议。请起草一封专业且引人入胜的电子邮件，介绍我自己，表达对他们工作的钦佩，并礼貌地请求对话或指导。"'
- en: Letter of Recommendation
  id: totrans-745
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 推荐信
- en: '"I am writing a letter of recommendation for [name] for [job, school, award,
    etc.]. They have demonstrated [list qualities, skills, and achievements]. Please
    write a compelling and detailed letter that highlights their strengths and qualifications."'
  id: totrans-746
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '"我正在为[姓名]写一封推荐信，用于[工作、学校、奖项等]。他们已经展示了[列出品质、技能和成就]。请写一封引人入胜且详细的信，突出他们的优势和资格。"'
- en: Customer Complaint Email
  id: totrans-747
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 客户投诉电子邮件
- en: '"I need to write a formal complaint email to [company] about [issue with product/service].
    The email should be firm but polite, clearly explaining the problem, requesting
    a resolution, and providing necessary details. Please make it professional and
    solution-oriented."'
  id: totrans-748
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '"我需要写一封正式的投诉电子邮件给[公司]，关于[产品/服务的问题]。这封电子邮件应该坚定但礼貌，清楚地解释问题，要求解决方案，并提供必要细节。请让它专业且以解决问题为导向。"'
- en: Holiday or Thank You Card Message
  id: totrans-749
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 假日或感谢卡信息
- en: '"I want to write a heartfelt holiday/thank you message to [recipient]. The
    message should be warm, personal, and appreciative, expressing gratitude for their
    kindness, support, or friendship. Please make it meaningful and engaging."'
  id: totrans-750
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '"我想为[收件人]写一封充满感情的假日/感谢信息。信息应该温暖、个人化且感激，表达对他们的善意、支持或友谊的感激之情。请让它有意义且引人入胜。"'
- en: Invitation Email for an Event
  id: totrans-751
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 活动邀请电子邮件
- en: '"I’m hosting [event type] on [date] at [location] and want to invite [recipient/group].
    The email should be engaging, provide clear event details, and include an RSVP
    request. Please make it friendly yet professional, suitable for the audience."'
  id: totrans-752
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '"我将在[日期]在[地点]举办[活动类型]，并希望邀请[收件人/群体]。这封电子邮件应该引人入胜，提供明确的活动细节，并包含RSVP请求。请让它既友好又专业，适合受众。"'
- en: Creative Writing
  id: totrans-753
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 创意写作
- en: Short Story Prompt
  id: totrans-754
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 短篇小说提示
- en: '"I want to write a short story about [theme or idea]. The story should include
    a compelling protagonist, a clear conflict, and a satisfying resolution. Please
    craft an engaging and imaginative story with strong character development and
    vivid descriptions."'
  id: totrans-755
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '"我想写一个关于[主题或想法]的短篇小说。故事应该包括一个引人入胜的主人公，一个清晰的冲突，以及一个令人满意的解决方案。请创作一个引人入胜且富有想象力的故事，具有强烈的角色发展和生动的描述。"'
- en: Poem on a Personal Experience
  id: totrans-756
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 关于个人经历的诗歌
- en: '"I’d like to write a poem about [specific experience, emotion, or theme]. The
    poem should be expressive, thought-provoking, and use vivid imagery. Please write
    it in a style that conveys deep emotion, whether free verse, rhyming, or haiku,
    based on the theme."'
  id: totrans-757
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '"我想写一首关于[特定经历、情感或主题]的诗。这首诗应该富有表现力，引人深思，并使用生动的意象。请以传达深刻情感的风格来写它，无论是自由诗、押韵诗还是俳句，基于主题。"'
- en: Dialogue Between Two Characters
  id: totrans-758
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 两个角色之间的对话
- en: '"I need to write a realistic and engaging dialogue between two characters discussing
    [topic]. One character is [describe personality], and the other is [describe personality].
    The conversation should feel natural, reveal character traits, and create tension
    or resolution."'
  id: totrans-759
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '"我需要写一段两个角色关于[主题]的逼真且引人入胜的对话。一个角色是[描述性格]，另一个角色是[描述性格]。对话应该感觉自然，揭示角色特点，并创造紧张或解决。"'
- en: Fantasy World-Building Description
  id: totrans-760
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 奇幻世界构建描述
- en: '"I am creating a fantasy world with unique landscapes, cultures, and magic
    systems. Please write a detailed description of this world, including geography,
    society, and any mystical elements, making it immersive and vivid for storytelling."'
  id: totrans-761
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '"我正在创造一个拥有独特景观、文化和魔法系统的奇幻世界。请为这个世界写一个详细的描述，包括地理、社会和任何神秘元素，使其对讲故事来说既沉浸又生动。"'
- en: Mystery Story Opening Scene
  id: totrans-762
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 悬疑故事开场场景
- en: '"I need an intriguing opening scene for a mystery story. The scene should introduce
    the main character, hint at the central mystery, and set a suspenseful tone. Please
    write a compelling beginning that immediately hooks the reader."'
  id: totrans-763
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '"我需要一个引人入胜的悬疑故事开场场景。场景应该介绍主要角色，暗示核心谜团，并设定紧张的氛围。请写一个吸引人的开头，立即抓住读者的注意力。"'
- en: Letter from One Fictional Character to Another
  id: totrans-764
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一个虚构角色给另一个角色的信
- en: '"I want to write a letter from [fictional character] to [another fictional
    character] about [situation]. The letter should reflect the character’s voice,
    emotions, and relationship with the recipient. Please make it engaging and authentic
    to the character’s personality."'
  id: totrans-765
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '"我想写一封来自[虚构角色]给[另一个虚构角色]的信，关于[情况]。信应该反映角色的声音、情感和与收件人的关系。请让它引人入胜并符合角色的个性。"'
- en: Science Fiction Story Concept
  id: totrans-766
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 科幻故事概念
- en: '"I’d like to develop a science fiction story set in the year [future date].
    The plot should involve [main theme, e.g., AI, space travel, dystopian society].
    Please create a unique concept with an engaging premise and world-building elements."'
  id: totrans-767
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '"我想开发一个设定在[未来日期]的科幻故事。情节应该涉及[主要主题，例如，人工智能、太空旅行、反乌托邦社会]。请创造一个独特的概念，具有吸引人的前提和世界构建元素。"'
- en: Comedic Scene with Witty Banter
  id: totrans-768
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 有趣的对话场景
- en: '"I need a humorous scene where two characters engage in witty banter about
    [topic]. The humor should be lighthearted and engaging, with a playful back-and-forth
    dynamic. Please write the dialogue in a way that makes the scene fun and memorable."'
  id: totrans-769
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '"我需要一个幽默的场景，其中两个角色就[话题]进行机智的对话。幽默应该是轻松愉快的，具有活泼的来回互动。请以使场景有趣和难忘的方式写对话。"'
- en: Character Backstory Development
  id: totrans-770
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 角色背景故事发展
- en: '"I want to create a backstory for my character, [name]. They are [age, personality,
    background]. Please write a compelling character history that explains their motivations,
    struggles, and key life events that shaped who they are."'
  id: totrans-771
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '"我想为我的角色[名字]，他们[年龄、个性、背景]创建一个背景故事。请写一个引人入胜的角色历史，解释他们的动机、挣扎和塑造他们是谁的关键生活事件。"'
- en: Dramatic Monologue for a Play or Story
  id: totrans-772
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 戏剧独白剧本
- en: '"I need a powerful monologue for a character facing [internal conflict]. The
    speech should be emotionally charged, revealing deep personal struggles and growth.
    Please write it in a way that feels authentic and moving for an audience."'
  id: totrans-773
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '"我需要一个关于[内部冲突]的角色有力独白的剧本。演讲应该充满情感，揭示深刻的个人挣扎和成长。请以真实和感人的方式写它。"'
- en: Social Media Content Creation
  id: totrans-774
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 社交媒体内容创作
- en: Engaging Instagram Caption
  id: totrans-775
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 吸引人的Instagram标题
- en: '"I want to write an engaging Instagram caption for a post about [topic—travel,
    food, fitness, motivation, etc.]. The caption should include a compelling hook,
    a personal touch, and a call to action to encourage comments. Please keep it concise
    and impactful."'
  id: totrans-776
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '"我想为关于[话题—旅行、美食、健身、动力等]的帖子写一个吸引人的Instagram标题。标题应包括一个引人入胜的钩子、个人特色和鼓励评论的行动号召。请保持简洁并具有影响力。"'
- en: Inspirational Twitter/X Post
  id: totrans-777
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 鼓舞人心的Twitter/X帖子
- en: '"I need a short but powerful Twitter/X post about [theme—motivation, success,
    mindfulness, etc.]. It should be under 280 characters, include a thought-provoking
    message, and encourage engagement through a question or call to action."'
  id: totrans-778
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '"我需要一个简短但有力的Twitter/X帖子，关于[主题—动力、成功、正念等]。它应该少于280个字符，包括一个引人深思的信息，并通过提问或行动号召鼓励参与。"'
- en: LinkedIn Post on Professional Growth
  id: totrans-779
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 关于职业成长的LinkedIn帖子
- en: '"I want to write a LinkedIn post sharing insights on [professional topic—career
    growth, leadership, productivity, networking]. The post should include a personal
    experience, a key lesson, and a question to encourage discussion. Please make
    it professional yet relatable."'
  id: totrans-780
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '"我想写一篇LinkedIn帖子，分享关于[专业话题—职业成长、领导力、生产力、人脉]的见解。帖子应包括个人经历、一个关键教训和一个鼓励讨论的问题。请让它既专业又亲切。"'
- en: Facebook Post About a Personal Achievement
  id: totrans-781
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 关于个人成就的Facebook帖子
- en: '"I want to share a Facebook post about a recent achievement in [career, fitness,
    personal life]. The post should be uplifting, share the journey behind the success,
    and inspire others to reflect on their own goals. Please make it engaging and
    heartfelt."'
  id: totrans-782
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '"我想分享一个关于[职业、健身、个人生活]近期成就的Facebook帖子。帖子应该是鼓舞人心的，分享成功的背后旅程，并激励他人反思自己的目标。请让它引人入胜并充满感情。"'
- en: TikTok/YouTube Video Script for Storytelling
  id: totrans-783
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: TikTok/YouTube视频剧本用于讲故事
- en: '"I need a short script for a TikTok or YouTube video where I tell a story about
    [topic—funny moment, life lesson, travel experience, etc.]. The script should
    have a captivating opening, a relatable middle, and a strong ending that leaves
    an impact."'
  id: totrans-784
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '"我需要一个简短的剧本，用于TikTok或YouTube视频，讲述关于[话题—有趣时刻、生活教训、旅行经历等]的故事。剧本应该有一个吸引人的开头、一个亲切的中段和一个强有力的结尾，留下深刻印象。"'
- en: Engaging Poll or Question for Audience Engagement
  id: totrans-785
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 吸引观众的互动投票或问题
- en: '"I want to create an interactive social media post that encourages my followers
    to engage. It should be a thought-provoking question or a fun poll related to
    [topic]. Please craft a post that sparks curiosity and invites people to comment
    or vote."'
  id: totrans-786
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '"我想创建一个互动的社交媒体帖子，鼓励我的粉丝参与。它应该是一个引人深思的问题或与[主题]相关的有趣投票。请创作一个激发好奇心并邀请人们评论或投票的帖子。"'
- en: Educational Thread for Twitter/X
  id: totrans-787
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: Twitter/X教育帖子
- en: '"I want to create a Twitter/X thread that educates my audience on [topic—tech,
    history, health, finance, etc.]. The first tweet should have a strong hook, and
    each following tweet should break down key points in a clear and engaging way.
    Please structure it for readability and impact."'
  id: totrans-788
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '"我想创建一个Twitter/X帖子，让我的观众了解[主题—科技、历史、健康、金融等]。第一条推文应有一个强烈的钩子，接下来的每条推文应以清晰和引人入胜的方式分解关键点。请为可读性和影响力进行结构化。"'
- en: Behind-the-Scenes Instagram Story Script
  id: totrans-789
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 背后故事Instagram故事脚本
- en: '"I need a script for an Instagram Story where I share behind-the-scenes insights
    about [project, daily routine, special event]. It should be casual and engaging,
    encouraging viewers to respond or ask questions. Please keep it conversational
    and fun."'
  id: totrans-790
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '"我需要一个Instagram故事的脚本，分享关于[项目、日常惯例、特别事件]的幕后洞察。它应该是轻松有趣的，鼓励观众回应或提问。请保持对话和有趣。"'
- en: Product or Service Promotion Post
  id: totrans-791
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 产品或服务推广帖子
- en: '"I am promoting [product or service] on social media and want a post that highlights
    its benefits in an authentic way. The post should include a personal testimonial,
    key features, and a subtle call to action. Please make it engaging and not overly
    sales-focused."'
  id: totrans-792
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '"我在社交媒体上推广[产品或服务]，并希望一篇强调其真实益处的帖子。帖子应包括个人推荐、关键特性和微妙的行动号召。请使其引人入胜，不要过于侧重销售。"'
- en: Viral Meme or Trend-Based Post
  id: totrans-793
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 基于病毒性梗或趋势的帖子
- en: '"I want to create a funny and relatable post that aligns with a trending meme
    or social media trend. The post should connect to my niche [e.g., tech, fitness,
    parenting] and be shareable. Please craft a witty caption that makes the content
    fun and engaging."'
  id: totrans-794
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '"我想写一篇有趣且贴近的帖子，与流行的梗或社交媒体趋势相呼应。帖子应与我的领域[例如，科技、健身、育儿]相关，并易于分享。请创作一个机智的标题，使内容变得有趣且引人入胜。"'
- en: Academic Assistance
  id: totrans-795
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 学术援助
- en: Essay Outline and Structure
  id: totrans-796
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 论文提纲和结构
- en: '"I need help creating an outline for an academic essay on [topic]. The essay
    should follow a clear structure with an introduction, three main points, and a
    conclusion. Please provide a detailed outline with key arguments and supporting
    evidence for each section."'
  id: totrans-797
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '"我需要帮助为关于[主题]的学术论文制定大纲。论文应遵循清晰的结构，包括引言、三个主要观点和结论。请提供详细的提纲，包括每个部分的关键论点和支持证据。"'
- en: Summarizing a Complex Concept
  id: totrans-798
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 总结复杂概念
- en: '"I need a clear and concise explanation of [complex topic—e.g., quantum mechanics,
    economic theory, historical event] in simple terms. The explanation should be
    structured logically and include real-world examples to make it easier to understand."'
  id: totrans-799
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '"我需要一个简单明了的解释，解释[复杂主题—例如，量子力学、经济理论、历史事件]，用简单的话来说。解释应逻辑结构化，并包括现实世界的例子，以便更容易理解。"'
- en: Research Paper Thesis Statement
  id: totrans-800
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 研究论文论点陈述
- en: '"I am writing a research paper on [subject] and need a strong, focused thesis
    statement. The statement should be specific, debatable, and reflect the main argument
    of my paper. Please provide a few options along with a brief explanation of why
    they work."'
  id: totrans-801
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '"我正在撰写一篇关于[主题]的研究论文，并需要一个强大、专注的论点陈述。这个陈述应该是具体的、可辩论的，并反映我论文的主要论点。请提供几个选项，并简要说明为什么它们有效。"'
- en: Annotated Bibliography Entry
  id: totrans-802
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 注释文献条目
- en: '"I am compiling an annotated bibliography for my research on [topic]. Please
    provide a properly formatted entry for the source [book, article, or website],
    including a summary of its main points, its relevance to my research, and its
    credibility."'
  id: totrans-803
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '"我正在为关于[主题]的研究整理注释文献，请为来源[书籍、文章或网站]提供一个格式正确的条目，包括其主要观点的摘要、其与我研究的相关性以及其可信度。"'
- en: Mathematical Problem Explanation
  id: totrans-804
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 数学问题解释
- en: '"I am struggling to understand how to solve this math problem: [insert problem].
    Please explain the step-by-step process in a way that makes it easy to follow,
    along with the reasoning behind each step."'
  id: totrans-805
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '"我正在努力理解如何解决这个数学问题：[插入问题]。请以易于跟随的方式解释逐步过程，并说明每一步的理由。"'
- en: Study Guide for Exam Preparation
  id: totrans-806
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 考试准备学习指南
- en: '"I need a study guide for an upcoming exam on [subject]. The guide should include
    key concepts, important definitions, and sample questions with answers. Please
    make it structured and easy to review."'
  id: totrans-807
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '"我需要一个即将到来的[学科]考试的复习指南。指南应包括关键概念、重要定义和带答案的样题。请确保其结构化且易于复习。"'
- en: Scientific Report Conclusion
  id: totrans-808
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 科学报告结论
- en: '"I am writing a scientific report on [experiment or study] and need a strong
    conclusion. The conclusion should summarize the key findings, discuss their significance,
    and suggest potential areas for further research."'
  id: totrans-809
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '"我正在撰写关于[实验或研究]的科学报告，并需要一个强有力的结论。结论应该总结关键发现，讨论其重要性，并提出进一步研究的潜在领域。"'
- en: Comparative Analysis of Two Theories
  id: totrans-810
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 两种理论的比较分析
- en: '"I need a comparative analysis of [Theory A] and [Theory B] in the field of
    [subject]. Please outline their key similarities and differences, provide examples
    of how they are applied, and conclude with an evaluation of which is more effective
    in a given context."'
  id: totrans-811
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '"我需要在[学科]领域对[理论A]和[理论B]进行对比分析。请概述它们的关键相似之处和不同之处，提供它们应用的例子，并在结论中评估在特定情境下哪个更有效。"'
- en: Critical Analysis of a Literary Work
  id: totrans-812
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 文学作品的批判性分析
- en: '"I am analyzing [book, poem, or play] by [author] and need a critical analysis
    of its themes, characters, and literary techniques. Please provide an insightful
    discussion that includes evidence from the text."'
  id: totrans-813
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '"我正在分析[作者]的[书籍、诗歌或剧本]，并需要对其主题、人物和文学技巧进行批判性分析。请提供包含文本证据的深入讨论。"'
- en: Lab Report Discussion Section
  id: totrans-814
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 实验报告讨论部分
- en: '"I am writing the discussion section of my lab report on [experiment topic].
    The discussion should interpret the results, compare them with expected outcomes,
    and address any sources of error. Please make it clear, logical, and concise."'
  id: totrans-815
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '"我在撰写我的实验报告的讨论部分，主题为[实验主题]。讨论部分应该解释结果，将它们与预期结果进行比较，并解决任何错误来源。请确保内容清晰、逻辑性强且简洁。"'
- en: Translation Services
  id: totrans-816
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 翻译服务
- en: Everyday Conversation Translation
  id: totrans-817
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 日常对话翻译
- en: '"Please translate the following everyday conversation from [source language]
    to [target language]: ''[insert text].'' Ensure that the translation is natural,
    culturally appropriate, and suitable for informal spoken dialogue."'
  id: totrans-818
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '"请将以下日常对话从[源语言]翻译成[目标语言]：''[插入文本]''。确保翻译自然、文化适宜，并适合非正式口语对话。"'
- en: Professional Email Translation
  id: totrans-819
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 专业电子邮件翻译
- en: '"I need to translate a professional email from [source language] to [target
    language]. The email should maintain a formal tone, proper grammar, and cultural
    appropriateness while keeping the message clear and polite. Here is the text:
    ''[insert email].''"'
  id: totrans-820
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '"我需要将一封来自[源语言]的专业电子邮件翻译成[目标语言]。电子邮件应保持正式的语气、正确的语法和文化适宜性，同时保持信息的清晰和礼貌。以下是文本：''[插入电子邮件]''。"'
- en: Social Media Post Translation
  id: totrans-821
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 社交媒体帖子翻译
- en: '"I want to post on social media in [target language] about [topic]. Please
    translate the following message into [target language] while keeping it engaging
    and culturally relevant: ''[insert text].''"'
  id: totrans-822
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '"我想在[目标语言]社交媒体上发布关于[主题]的内容。请将以下信息翻译成[目标语言]，同时保持其吸引力和文化相关性：''[插入文本]''。"'
- en: Tourist Phrase Guide Translation
  id: totrans-823
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 旅行短语指南翻译
- en: '"I am traveling to [destination] and need a list of useful phrases translated
    from [source language] to [target language]. The phrases should include greetings,
    ordering food, asking for directions, and emergency situations."'
  id: totrans-824
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '"我将前往[目的地]，需要一份从[源语言]翻译到[目标语言]的有用短语列表。这些短语应包括问候语、点餐、询问方向和紧急情况。"'
- en: Website Content Translation
  id: totrans-825
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 网站内容翻译
- en: '"I need to translate a section of my website from [source language] to [target
    language]. The translation should be professional, user-friendly, and optimized
    for readability. Here is the text: ''[insert content].''"'
  id: totrans-826
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '"我需要将我网站的一部分从[源语言]翻译成[目标语言]。翻译应专业、用户友好，并优化可读性。以下是文本：''[插入内容]''。"'
- en: Book or Article Excerpt Translation
  id: totrans-827
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 书籍或文章摘录翻译
- en: '"I need to translate a passage from a book or article from [source language]
    to [target language]. The translation should preserve the tone, meaning, and style
    of the original text. Here is the passage: ''[insert excerpt].''"'
  id: totrans-828
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '"我需要将一本书或文章的摘录从[源语言]翻译成[目标语言]。翻译应保留原文的语气、意义和风格。以下是摘录：''[插入摘录]''。"'
- en: Subtitles for a Video
  id: totrans-829
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 视频字幕
- en: '"I need to create subtitles in [target language] for a video that is in [source
    language]. The translation should be accurate, natural, and concise to fit within
    subtitle timing constraints. Here is the transcript: ''[insert dialogue].''"'
  id: totrans-830
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '"我需要为[目标语言]的[源语言]视频创建字幕。翻译应准确、自然、简洁，以适应字幕时间限制。以下是台词：''[插入对话]''。"'
- en: Medical or Legal Document Translation
  id: totrans-831
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 医疗或法律文件翻译
- en: '"I need a precise and professional translation of a [medical or legal] document
    from [source language] to [target language]. Please ensure accuracy and proper
    use of technical terminology while maintaining a formal and official tone. Here
    is the text: ''[insert document].''"'
  id: totrans-832
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '"我需要将一份[医疗或法律]文件从[源语言]精确且专业地翻译成[目标语言]。请确保准确性，正确使用技术术语，并保持正式和官方的语气。以下是文本：''[插入文件]''。"'
- en: Poem or Song Lyrics Translation
  id: totrans-833
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 诗歌或歌曲歌词翻译
- en: '"Please translate this poem/song from [source language] to [target language]
    while preserving its rhythm, meaning, and emotional tone. Feel free to make slight
    adaptations if necessary for cultural relevance. Here is the text: ''[insert lyrics
    or poem].''"'
  id: totrans-834
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '"请将这首诗/歌词从[源语言]翻译成[目标语言]，同时保留其节奏、意义和情感基调。如有必要，为了文化相关性，可以进行轻微的调整。以下是文本：''[插入歌词或诗歌]''。"'
- en: Instruction Manual Translation
  id: totrans-835
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 指示手册翻译
- en: '"I need to translate an instruction manual for [product or process] from [source
    language] to [target language]. The translation should be clear, precise, and
    easy to follow. Here is the text: ''[insert manual section].''"'
  id: totrans-836
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '"我需要将[产品或过程]的指示手册从[源语言]翻译成[目标语言]。翻译应清晰、精确且易于理解。以下是手册部分：''[插入手册部分]''。"'
- en: Professional Development
  id: totrans-837
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 职业发展
- en: Résumé Rewrite and Optimization
  id: totrans-838
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 简历重写和优化
- en: '"I need to rewrite my résumé for a job in [industry or role]. Please format
    it professionally, highlight my key skills and achievements, and ensure it is
    ATS-friendly. Here is my current résumé: ''[insert text or key details].''"'
  id: totrans-839
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '"我需要为[行业或角色]的工作重新撰写简历。请专业格式化，突出我的关键技能和成就，并确保它适合ATS。以下是我的当前简历：''[插入文本或关键细节]''。"'
- en: Cover Letter for Job Application
  id: totrans-840
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 求职信
- en: '"I am applying for a [job title] position at [company name]. My experience
    includes [list relevant skills and accomplishments]. Please write a compelling
    cover letter that emphasizes my strengths, aligns with the job description, and
    conveys enthusiasm for the role."'
  id: totrans-841
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '"我正在申请[公司名称]的[职位名称]职位。我的经验包括[列出相关技能和成就]。请撰写一封引人入胜的求职信，强调我的优势，与职位描述相符，并传达对该角色的热情。"'
- en: LinkedIn Profile Summary
  id: totrans-842
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 领英个人简介
- en: '"I want to update my LinkedIn profile summary to reflect my expertise in [industry
    or skill]. The summary should be professional, engaging, and highlight my career
    achievements while keeping a personal touch. Please keep it under 300 words."'
  id: totrans-843
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '"我希望更新我的领英个人简介，以反映我在[行业或技能]方面的专业知识。简介应专业、吸引人，突出我的职业成就，同时保持个人风格。请确保字数不超过300字。"'
- en: Networking Email for Career Growth
  id: totrans-844
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 职业成长网络邮件
- en: '"I want to reach out to [professional contact] to explore potential career
    opportunities or mentorship. Please draft a professional yet friendly networking
    email that introduces myself, expresses admiration for their work, and politely
    requests a meeting or conversation."'
  id: totrans-845
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '"我想联系[专业联系人]以探索潜在的职业生涯机会或导师关系。请起草一封专业而友好的网络邮件，介绍自己，表达对他们工作的钦佩，并礼貌地请求会面或交谈。"'
- en: Personal Statement for Graduate School
  id: totrans-846
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 研究生院校个人陈述
- en: '"I am applying to [graduate program] at [university] and need a strong personal
    statement. It should highlight my academic background, research interests, and
    career goals while showing my passion for the field. Please make it compelling
    and well-structured."'
  id: totrans-847
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '"我正在申请[大学]的[研究生项目]，需要一份强有力的个人陈述。它应突出我的学术背景、研究兴趣和职业目标，同时展示我对该领域的热情。请确保它引人入胜且结构良好。"'
- en: Salary Negotiation Email
  id: totrans-848
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 薪资谈判邮件
- en: '"I received a job offer from [company name] for the position of [job title].
    While I’m excited about the opportunity, I would like to negotiate a higher salary
    based on my experience and market rates. Please draft a polite and persuasive
    salary negotiation email."'
  id: totrans-849
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '"我收到了[公司名称]提供的[职位名称]职位的职位邀请。虽然我对这个机会感到兴奋，但我希望根据我的经验和市场标准协商更高的薪水。请起草一封礼貌而有说服力的薪资谈判邮件。"'
- en: Conference or Public Speaking Proposal
  id: totrans-850
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 会议或公开演讲提案
- en: '"I want to submit a proposal to speak at [conference/event] on the topic of
    [subject]. The proposal should clearly outline my expertise, the key takeaways
    for the audience, and why this topic is valuable. Please write a compelling and
    professional proposal."'
  id: totrans-851
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '"我想提交一个关于[主题]的[会议/活动]演讲提案。提案应清楚地概述我的专业知识、对观众的要点以及为什么这个主题有价值。请写一个引人入胜且专业的提案。"'
- en: Performance Review Self-Assessment
  id: totrans-852
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 绩效评估自我评估
- en: '"I need to write a self-assessment for my annual performance review at work.
    It should highlight my accomplishments, contributions to the team, and areas for
    growth. Please make it professional, balanced, and results-oriented."'
  id: totrans-853
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '"我需要为工作中的年度绩效评估写一份自我评估。它应该突出我的成就、对团队的贡献和成长领域。请让它专业、平衡且以结果为导向。"'
- en: Business Introduction Email
  id: totrans-854
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 商务介绍电子邮件
- en: '"I am introducing myself and my business, [business name], to a potential client
    or partner. The email should be professional, engaging, and clearly explain what
    my business offers while encouraging further discussion. Please write a strong
    introduction email."'
  id: totrans-855
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '"我正在向潜在客户或合作伙伴介绍我自己和我的业务，[公司名称]。电子邮件应该是专业、引人入胜的，并清楚地解释我的业务提供的内容，同时鼓励进一步的讨论。请写一个强有力的介绍电子邮件。"'
- en: Career Change Justification Letter
  id: totrans-856
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 职业转变理由信
- en: '"I am transitioning from [current career field] to [new career field] and need
    to explain my motivation and transferable skills in a cover letter or statement.
    Please craft a persuasive and professional justification that highlights my strengths
    and adaptability."'
  id: totrans-857
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '"我正在从[当前职业领域]过渡到[新职业领域]，需要在求职信或声明中解释我的动机和可转移技能。请撰写一个有说服力且专业的理由，突出我的优势和适应性。"'
- en: Creative Arts
  id: totrans-858
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 创意艺术
- en: Writing a Song Lyrics Draft
  id: totrans-859
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 写歌曲歌词草稿
- en: '"I want to write a song about [theme—love, heartbreak, resilience, adventure,
    etc.]. The lyrics should be emotional and structured with verses, a chorus, and
    a bridge. Please make it poetic and engaging, fitting the genre of [pop, country,
    rock, etc.]."'
  id: totrans-860
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '"我想写一首关于[主题—爱情、心碎、韧性、冒险等]的歌曲。歌词应该是情感丰富的，并结构化有节、副歌和桥段。请让它诗意且引人入胜，适合[流行、乡村、摇滚等]流派。"'
- en: Script for a Short Film or Play Scene
  id: totrans-861
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 短片或戏剧场景剧本
- en: '"I need a script for a short film/play scene about [theme or conflict]. The
    scene should have strong dialogue, emotional depth, and a clear beginning, middle,
    and end. Please include stage directions or camera cues where necessary."'
  id: totrans-862
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '"我需要一个关于[主题或冲突]的短片/戏剧场景剧本。场景应该有强烈的对话、情感深度，并有明确的开始、中间和结束。如有必要，请包括舞台指示或摄像机提示。"'
- en: Descriptive Painting or Photography Caption
  id: totrans-863
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 描述性绘画或摄影标题
- en: '"I have a painting/photograph of [describe artwork], and I need a compelling
    caption that explains its meaning and evokes emotion in the audience. Please make
    it poetic and thought-provoking."'
  id: totrans-864
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '"我有一幅[描述艺术品]的画/照片，我需要一个引人入胜的标题来解释其意义并激发观众的情感。请让它诗意且引人深思。"'
- en: Artistic Statement for an Exhibition
  id: totrans-865
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 展览艺术声明
- en: '"I am showcasing my artwork at an exhibition and need an artist’s statement.
    It should describe my artistic style, inspirations, and the message behind my
    work. Please make it clear, engaging, and professional."'
  id: totrans-866
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '"我在展览中展示我的艺术品，需要一个艺术家的声明。它应该描述我的艺术风格、灵感以及作品背后的信息。请让它清晰、引人入胜且专业。"'
- en: Poetry Inspired by a Personal Memory
  id: totrans-867
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 由个人记忆激发的诗歌
- en: '"I want to write a poem inspired by a memory of [describe memory—childhood,
    love, loss, etc.]. The poem should be vivid, emotional, and use strong imagery.
    Please keep it in free verse or rhyming form based on what fits best."'
  id: totrans-868
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '"我想写一首由[描述记忆—童年、爱情、失落等]激发的诗歌。诗歌应该生动、情感丰富，并使用强烈的意象。请根据最适合的形式保持自由诗或押韵诗。"'
- en: Monologue for a Theater Performance
  id: totrans-869
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 戏剧表演独白
- en: '"I need a dramatic monologue for a character who is experiencing [emotion—grief,
    joy, anger, hope, etc.]. The monologue should be powerful, introspective, and
    showcase deep character development."'
  id: totrans-870
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '"我需要一个关于经历[情感—悲伤、快乐、愤怒、希望等]的角色独白。独白应该有力、内省，并展示角色的深度发展。"'
- en: Children’s Book Story Idea
  id: totrans-871
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 儿童书故事想法
- en: '"I want to write a children’s book about [theme—friendship, bravery, kindness,
    etc.]. The story should be simple, engaging, and have a clear moral lesson. Please
    provide a brief outline and a sample opening paragraph."'
  id: totrans-872
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '"我想写一本关于[主题—友谊、勇敢、善良等]的儿童书。故事应该简单、引人入胜，并有一个明确的道德教训。请提供简要大纲和样本开头段落。"'
- en: Calligraphy or Typography Quote Creation
  id: totrans-873
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 书法或排版引言创作
- en: '"I am designing a piece of calligraphy/typography with the phrase ''[insert
