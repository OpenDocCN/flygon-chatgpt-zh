  prefs: []
  type: TYPE_NORMAL
  zh: '24: 测试国际化（i18n）'
- en: 'Prompt:'
  id: totrans-528
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Write a plan for testing the internationalization (i18n) of a multi-language
