  prefs: []
  type: TYPE_NORMAL
  zh: 在机器学习中，一个特别有前景的分支领域出现了：深度学习。受人类大脑结构的启发，深度学习使用人工神经网络在多层处理信息。这项技术使得革命性的进步成为可能，例如图像识别、机器翻译，当然还有生成模型。
