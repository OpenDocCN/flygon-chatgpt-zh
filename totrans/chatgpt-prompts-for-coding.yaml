- en: Automation and Scripting
  id: totrans-916
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 自动化和脚本编写
- en: Time is your most valuable resource, and automation is the key to maximizing
    it. This chapter provides prompts to automate repetitive tasks and streamline
    workflows. With these tools, you’ll free up time for innovation and strategic
    thinking. Instead of using your time for repeated tasks, use the time to bring
    new ideas, that will be the optimum use of your time.
  id: totrans-917
  prefs: []
  type: TYPE_NORMAL
  zh: 时间是你最宝贵的资源，而自动化是最大化它的关键。本章提供了自动化重复性任务和简化工作流程的提示。有了这些工具，你将释放时间用于创新和战略思考。不要将时间用于重复性任务，而是用时间带来新想法，这将是最优的时间使用方式。
