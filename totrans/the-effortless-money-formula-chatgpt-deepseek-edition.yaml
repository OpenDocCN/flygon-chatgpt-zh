  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
- en: 'Define Your Content Goals: Identify the type of content you need and the goals
    you want to achieve.'
  id: totrans-33
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
