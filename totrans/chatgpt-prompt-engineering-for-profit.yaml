- en: '■        ****Hypo**thetic**al ****Que**stio**n: "****Wh**at** ****i**f** ****hu**man**s
    ****co**uld** ****comm**unicat**e ****telep**athical**ly? "'
  id: totrans-755
  prefs: []
  type: TYPE_NORMAL
  zh: '**假设性问题**："**如果人类能够通过心灵感应进行交流，会怎么样？**"'
- en: '■        ****Hypo**thetic**al ****Reas**onin**g: "****H**ow** ****wo**uld**
    ****th**is** ****im**pac**t ****soc**iet**y ****i**n** ****te**rms** ****o**f**
    ****pri**vac**y, ****tech**nolog**y, ****a**nd** ****per**sona**l ****relat**ionshi**ps?
    "'
  id: totrans-756
  prefs: []
  type: TYPE_NORMAL
  zh: '**假设性推理**："**这种影响会如何在隐私、技术和个人关系方面影响社会？**"'
- en: '■ ****Det**aile**d ****An**swe**r: "****I**f** ****hu**man**s ****co**uld**
    ****comm**unicat**e ****telep**athical**ly, ****pri**vac**y ****wo**uld** ****be**com**e
    ****a**** ****ma**jor** ****chal**leng**e, ****a**s** ****tho**ught**s ****co**uld**
    ****b**e** ****exp**ose**d ****wit**hou**t ****pr**ope**r ****con**sen**t. ****Th**is**
    ****wo**uld** ****dras**ticall**y ****ch**ang**e ****t**he** ****w**ay** ****w**e**
    ****int**erac**t ****a**nd** ****h**ow** ****commu**nicati**on ****tech**nologi**es
    ****wo**rk**, ****ma**kin**g ****sp**oke**n ****lan**guag**e ****obs**olet**e.
    ****W**e** ****co**uld** ****be**com**e ****a**** ****mu**ch** ****mo**re** ****conn**ecte**d
    ****soc**iet**y, ****b**ut** ****w**e** ****wo**uld** ****al**so** ****fa**ce**
    ****chal**lenge**s ****su**ch** ****a**s** ****tho**ugh**t ****con**tro**l ****a**nd**
    ****regu**latio**n ****o**f** ****commu**nicati**on ****th**at** ****ca**nno**t
    ****b**e** ''****tu**rne**d ****o**ff**''. "'
  id: totrans-757
  prefs: []
  type: TYPE_NORMAL
  zh: '**详细回答**："**如果人类能够通过心灵感应进行交流，隐私将面临重大挑战，因为思想可以在没有适当同意的情况下被暴露。这将极大地改变我们互动的方式以及通信技术的工作方式，使
    spoken language 变得过时。我们可能会成为一个更加紧密联系的社会，但我们也将面临诸如思想控制和通信的监管等挑战，这些挑战无法被 ''关闭''。**"'
