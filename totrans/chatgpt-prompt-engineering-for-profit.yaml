- en: '****F**ew**-****sh**ot** ****Prom**ptin**g ****i**s** ****a**** ****pr**omp**t
    ****engi**neerin**g ****tech**niqu**e ****th**at** ****con**sist**s ****o**f**
    ****prov**idin**g ****t**he** ****L**LM** ****wi**th** ****so**me** ****sa**mpl**e
    ****ques**tion**s ****a**nd** ****ans**wer**s ****be**for**e ****as**kin**g ****i**t**
    ****t**o** ****gen**erat**e ****a**** ****res**pons**e ****f**or** ****a**** ****n**ew**
    ****ca**se**. ****T**he** ****exa**mple**s ****pro**vide**d ****se**rve** ****t**o**
    ****gu**ide** ****t**he** ****mo**del** ****o**n** ****wh**at** ****ty**pe** ****o**f**
    ****res**pons**e ****t**o** ****ex**pec**t ****a**nd** ****wh**at** ****fo**rma**t
    ****i**s** ****id**eal**. ****Th**ese** ****exa**mple**s ****a**ct** ****a**s**
    ****a**** ****gu**ide**, ****hel**pin**g ****t**he** ****L**LM** ****unde**rstan**d
    ****t**he** ****pat**ter**n ****a**nd** ****ad**apt** ****i**ts** ****resp**onse**s
    ****acco**rdingl**y.'
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: '****Few-****shot** ****Prom**pting** **is** **a** ****prompt** **engineering**
    **technique** **that** **consists** **of** **providing** **the** ****LLM** **with**
    **some** ****sample** ****questions** **and** ****answers** **before** **asking**
    **it** **to** **generate** **a** ****response** **for** **a** ****new** ****case**.
    **The** ****examples** **provided** **serve** **to** **guide** **the** ****model**
    **on** **what** **type** **of** **response** **to** **expect** **and** **what**
    **format** **is** **ideal**. **These** ****examples** **act** **as** **a** ****guide**,
    **helping** **the** ****LLM** **understand** **the** ****pattern** **and** **adapt**
    **its** ****responses** **accordingly**.'
- en: '****Th**is** ****tech**niqu**e ****i**s** ****espe**ciall**y ****us**efu**l
    ****f**or** ****gui**din**g ****t**he** ****L**LM** ****thr**oug**h ****ta**sks**
    ****th**at** ****a**re** ****nua**nce**d ****o**r** ****req**uir**e ****a****
    ****spe**cifi**c ****res**pons**e, ****wit**hou**t ****ha**vin**g ****t**o** ****pro**vid**e
    ****len**gth**y ****inst**ructio**ns. ****B**y** ****prov**idin**g ****appr**opriat**e
    ****exa**mple**s, ****y**ou** ****inc**reas**e ****t**he** ****acc**urac**y ****a**nd**
    ****rele**vanc**e ****o**f** ****t**he** ****L**LM**’****s**** ****res**pons**e.'
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: '****This** ****technique** **is** ****especially** ****useful** **for** ****guiding**
    **the** ****LLM** **through** **tasks** **that** **are** ****nuanced** **or**
    **require** **a** ****specific** ****response**, **without** **having** **to**
    **provide** ****lengthy** ****instructions**. **By** **providing** ****appropriate**
    ****examples**, **you** **increase** **the** ****accuracy** **and** ****relevance**
    **of** **the** ****LLM** **’** **s** ****responses**.'
- en: '[****Wh**at** ****i**s** ****yo**ur** ****ma**in** ****obje**ctiv**e ]'
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: '[****What** ****is** ****your** ****main** ****obje**ctiv**e****]'
- en: '****T**he** ****ma**in** ****obje**ctiv**e ****o**f** ****F**ew**-****sh**ot**
    ****Prom**ptin**g ****i**s** ****impr**ovin**g ****t**he** ****qua**lit**y ****o**f**
    ****t**he** ****L**LM** ****res**pons**e ****b**y** ****prov**idin**g ****so**me**
    ****exa**mple**s ****th**at** ****s**et** ****t**he** ****to**ne**, ****fo**rma**t,
    ****a**nd** ****ty**pe** ****o**f** ****res**pons**e ****th**at** ****i**s** ****exp**ecte**d.
    ****Th**is** ****w**ay**, ****ev**en** ****i**f** ****t**he** ****ini**tia**l
    ****req**ues**t ****i**s** ****mo**re** ****com**ple**x, ****t**he** ****mo**del**
    ****wi**ll** ****ha**ve** ****a**** ****mo**re** ****so**lid** ****ba**sis** ****f**or**
    ****form**ulatin**g ****i**ts** ****resp**onse**s.'
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: '****The** ****main** ****obje**ctiv**e **of** ****Few-****shot** ****Prom**pting**
    **is** **improving** **the** ****quality** **of** **the** ****LLM** **response**
    **by** **providing** **some** ****examples** **that** **set** **the** ****tone**,
    ****format**, **and** ****type** **of** **response** **that** **is** **expected**.
    **This** ****way**, **even** **if** **the** ****initial** ****request** **is**
    **more** **complex**, **the** ****model** **will** **have** **a** ****more** **solid**
    ****basis** **for** **formulating** **its** ****responses**.'
- en: '****Ano**the**r ****impo**rtan**t ****go**al** ****i**s** ****t**o** ****re**duc**e
    ****res**pons**e ****ambi**guit**y. ****Wh**en** ****t**he** ****mo**del** ****i**s**
    ****gi**ven** ****exa**mple**s, ****i**t** ****h**as** ****a**** ****be**tte**r
    ****under**standi**ng ****o**f** ****t**he** ****ty**pe** ****o**f** ****app**roac**h
    ****a**nd** ****st**yle** ****i**t** ****sh**oul**d ****fo**llo**w. ****Th**is**
    ****he**lps** ****min**imiz**e ****inco**rrec**t ****resp**onse**s ****o**r**
    ****resp**onse**s ****th**at** ****fa**ll** ****out**sid**e ****t**he** ****int**ende**d
    ****sc**ope**. ****Th**is** ****i**s** ****espe**ciall**y ****effe**ctiv**e ****f**or**
    ****ta**sks** ****th**at** ****req**uir**e ****a**** ****cer**tai**n ****form**attin**g
    ****pat**ter**n, ****su**ch** ****a**s** ****li**sts**, ****summ**arie**s, ****o**r**
    ****dial**ogue**s.'
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: '****A**n**o**t**h**e**r **i**m**p**o**r**t**a**n**t **g**o**a**l **i**s **t**o
    **r**e**d**u**c**e **r**e**s**p**o**n**s**e **a**m**b**i**g**u**i**t**y**. ****W**h**e**n**
    **t**h**e** **m**o**d**e**l **i**s **g**i**v**e**n **e**x**a**m**p**l**e**s, **i**t
    **h**a**s** **a** **b**e**t**t**e**r **u**n**d**e**r**s**t**a**n**d**i**n**g **o**f
    **t**h**e **t**y**p**e **o**f **a** **p**r**o**a**c**h **a**n**d **s**t**y**l**e
    **i**t **s **s**h**o**u**l**d **f**o**l**l**o**w**. **T**h**i**s **h**e**l**p**s
    **m**i**n**i**m**i**z**e **i**n**c**o**r**r**e**c**t **r**e**s**p**o**n**s**e**s
    **o**r **r**e**s**p**o**n**s**e**s **t**h**a**t **f**a**l**l **o**u**t**s**i**d**e
    **o**f **t**h**e **i**n**t**e**n**d**e**d **s**c**o**p**e**. **T**h**i**s **i**s
    **e**s**p**e**c**i**a**l**l**y **e**f**f**e**c**t**i**v**e **f**o**r **t**a**s**k**s
    **t**h**a**t **r**e**q**u**i**r**e **a** **c**e**r**t**a**i**n **f**o**r**m**a**t**t**i**n**g
    **p**a**t**t**e**r**n**, **s**u**ch **a**s **l**i**s**t**s**, **s**u**m**m**a**r**i**e**s**,
    **o**r **d**i**a**l**o**g**u**e**s**.'
