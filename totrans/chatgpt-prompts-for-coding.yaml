  id: totrans-520
  prefs: []
  type: TYPE_NORMAL
  zh: '"编写测试客户数据库数据完整性的计划。包括验证数据一致性、唯一性和表之间的关系。讨论数据库测试如何确保准确可靠的数据存储。"'
- en: '22: Writing Cross-Browser Tests'
  id: totrans-521
  prefs: []
  type: TYPE_NORMAL
  zh: '22: 编写跨浏览器测试'
