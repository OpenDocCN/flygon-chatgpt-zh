- en: 'In Response [5-6](#PC11), we have the complete text that ChatGPT wrote for
    the thesis.**Introduction**J.R.R. Tolkien''s contribution to modern literature
    cannot be overstated; his works, notably *The Lord of the Rings*, *The Hobbit*,
    and *The Silmarillion*, redefined the fantasy genre and established the mythic
    foundation for what we now recognize as modern epic fantasy. Tolkien, with his
    deep love for mythology and folklore, provided a meticulously crafted world rich
    with complex histories, languages, and archetypes that continue to resonate in
    popular culture today. His influence on American literature, film, and entertainment
    is evident in the numerous authors and filmmakers who have drawn inspiration from
    Middle-earth, borrowing themes, tropes, and narrative structures to create compelling
    works that speak to contemporary audiences.American authors like George R.R. Martin,
    whose *A Song of Ice and Fire* series echoes the epic scale and character-driven
    complexity found in Tolkien''s work, openly acknowledge the influence of Middle-earth
    on their writing. Similarly, Terry Brooks'' *Shannara* series draws heavily on
    Tolkien''s world-building style, utilizing a quest-driven narrative involving
    ancient magic and a battle between good and evil. Another notable example is Patrick
    Rothfuss, whose *The Kingkiller Chronicle* employs a sophisticated level of world-building
    and lyrical storytelling akin to Tolkien''s creation of mythic histories. These
    American fantasy authors have taken Tolkien''s blueprint and adapted it for new
    generations, incorporating modern sensibilities while maintaining the grandeur
    and depth characteristic of Tolkien''s works.Tolkien''s influence extends beyond
    literature and deeply into cinema and popular culture. Peter Jackson''s *The Lord
    of the Rings* and *The Hobbit* trilogies brought Tolkien''s expansive world to
    an even broader audience, inspiring new waves of fantasy films and television
    series. American productions such as *The Chronicles of Narnia* (adapted from
    the works of Tolkien''s contemporary and friend, C.S. Lewis) and HBO''s *Game
    of Thrones* clearly reflect Tolkien''s narrative techniques, focusing on epic
    conflicts, richly drawn characters, and moral complexity. Moreover, films like
    *Harry Potter* also carry Tolkien''s legacy, with their magical worlds, mysterious
    artifacts, and coming-of-age narratives centered around the battle between good
    and evil.Tolkien''s inspiration stemmed from his deep academic background in languages
    and mythology. He was a philologist and a professor of Anglo-Saxon at Oxford,
    and his expertise in Old English, Norse mythology, and early European folklore
    directly influenced the creation of Middle-earth. For instance, the character
    of Gandalf is inspired by Odin, the Norse god, while the concept of the Elves
    draws from both Norse and Celtic traditions. Tolkien also integrated elements
    of Christian mythology, exploring themes of sacrifice, redemption, and the struggle
    against a pervasive evil. His famous essay, "On Fairy-Stories," articulates his
    belief in the power of myth and storytelling as essential tools for understanding
    human experience, highlighting his intention to create a "mythology for England."For
    further exploration of Tolkien''s mythological foundations and influence, several
    critical essays offer invaluable insight. Tom Shippey''s J.R.R. *Tolkien: Author
    of the Century* provides a detailed analysis of Tolkien''s literary methods, while
    Verlyn Flieger''s *Splintered Light: Logos and Language in Tolkien’s World* delves
    into Tolkien''s use of language and myth. Additionally, Shippey''s *The Road to
    Middle-earth* is an essential resource for understanding the academic and folkloric
    roots of Tolkien''s works, connecting his influences to his writing. These texts
    serve as key references to explore the depth of Tolkien''s mythology and its profound
    impact on both the fantasy genre and modern storytelling as a whole.Response 5-6'
  id: totrans-549
  prefs: []
  type: TYPE_NORMAL
  zh: 在回应 [5-6](#PC11) 中，我们有了ChatGPT为论文撰写的完整文本。**引言**J.R.R. 托尔金对现代文学的贡献不容小觑；他的作品，尤其是《指环王》、《霍比特人》和《精灵宝钻》，重新定义了奇幻文学类型，并为我们现在所认可的现代史诗奇幻奠定了神话基础。托尔金，凭借他对神话和民间传说的深厚热爱，创造了一个精心打造的、充满复杂历史、语言和原型的世界，这些在今天仍能在流行文化中产生共鸣。他对美国文学、电影和娱乐的影响体现在众多作家和电影制作者身上，他们从中土世界汲取灵感，借用主题、情节和叙事结构，创作出能够触动当代观众的引人入胜的作品。像乔治·R·R·马丁这样的美国作家，其《冰与火之歌》系列在史诗规模和以角色为中心的复杂性方面与托尔金的作品相呼应，公开承认中土世界对其写作的影响。同样，特里·布鲁克斯的《沙纳拉》系列也大量借鉴了托尔金的世界构建风格，运用以古代魔法和善与恶之间的斗争为驱动的叙事。另一个值得注意的例子是帕特里克·罗斯福斯，他的《杀手王》系列采用了与托尔金创造神话历史相似的世界构建和抒情叙事水平。这些美国奇幻作家已经将托尔金的蓝图适应了新一代，同时保持了托尔金作品中的宏伟和深度。
- en: ChatGPT helps us write the introduction to our thesis
  id: totrans-550
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT帮助我们撰写论文的引言部分
- en: This response is very… dry. It doesn’t at all have an academic tone usable in
    a thesis, and it most certainly sounds like a response from ChatGPT. Not only
    that, though it cites sources, it does not do so in a way that is appropriate
    for an academic paper. What went wrong?
  id: totrans-551
  prefs: []
  type: TYPE_NORMAL
  zh: 这个回答非常……枯燥。它根本不具备可用于论文的学术风格，听起来完全像是ChatGPT的回答。不仅如此，尽管它引用了来源，但它并没有以适合学术论文的方式引用。出了什么问题？
- en: Well, we didn’t incorporate all of the strategies we learned in Chapter [3](641691_1_En_3_Chapter.xhtml).
    We need to give ChatGPT an **example** of the kind of content we’re trying to
    create. We’re also going about it the wrong way by simply telling it what we want.
    Remember, ChatGPT is good at role-play. Rather than ask for its advice, we need
    to tell it to be the student. So let’s try that again.
  id: totrans-552
  prefs: []
  type: TYPE_NORMAL
  zh: 嗯，我们没有将第[3](641691_1_En_3_Chapter.xhtml)章中学到的所有策略都纳入其中。我们需要给ChatGPT提供一个**示例**，说明我们试图创建的内容类型。我们之前的方法是直接告诉它我们想要什么。记住，ChatGPT擅长角色扮演。与其请求它的建议，我们还需要让它扮演学生的角色。所以让我们再试一次。
- en: Giving ChatGPT an Example of What We Want and Using the “You Are a…” Prompt
    Approach
  id: totrans-553
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 给ChatGPT提供我们想要的示例并使用“你是一个……”提示方法
- en: Very briefly, we’re going to tap into a capability of ChatGPT we have not yet
    covered. In this case, we’re going to *upload a file* to ChatGPT—specifically,
    a PDF. This is because we’re going to reference an existing academic paper that
    is too large to fit into the character limit of the text window of a conversation
    with ChatGPT.
  id: totrans-554
  prefs: []
  type: TYPE_NORMAL
  zh: 简单来说，我们将要探索ChatGPT的一个我们尚未涉及的特性。在这种情况下，我们将向ChatGPT上传一个文件——具体来说，是一个PDF文件。这是因为我们打算参考一篇现有的学术论文，其篇幅太大，无法放入与ChatGPT对话的文本窗口的字符限制中。
- en: We’re going to cover more of this capability later in Chapter [6](641691_1_En_6_Chapter.xhtml).
    However, for the purposes of this chapter, understand that we’re uploading a PDF
    of an academic paper on the influence of Shakespeare’s existentialism by Charlotte
    Keys, entitled “Shakespeare’s Existentialism.” This is very similar to the process
    of uploading a photo to ChatGPT, as covered in Chapter [4](641691_1_En_4_Chapter.xhtml).
  id: totrans-555
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将在第[6](641691_1_En_6_Chapter.xhtml)章中更详细地介绍这一特性。然而，就本章而言，请理解我们正在上传一篇关于夏洛特·凯斯所著的学术论文的PDF文件，标题为“莎士比亚的存在主义”。这与第[4](641691_1_En_4_Chapter.xhtml)章中介绍的将照片上传到ChatGPT的过程非常相似。
- en: As you can see in Prompt [5-7](#PC12), we’ve already uploaded the PDF with the
    example of “Shakespeare’s Existentialism” as reference.You are an English literature
    student writing about Tolkien's influence on modern American literature and film.
    The research question is "How did J.R.R. Tolkien's use of mythology and folklore
    influence the development of modern fantasy literature?" Write the introduction
    of your thesis to match the tone and voice of the thesis I've uploaded as reference,
    including all of the details we've already discussed. Your thesis needs to sound
    more personal, yet professional. It needs to capture the reader's attention and
    allow professors to see how much you appreciate the unique perspective Tolkien
    adds to the world of literature. Also, cite references as is appropriate for an
    academic paper.Prompt 5-7
  id: totrans-556
  prefs: []
  type: TYPE_NORMAL
  zh: 正如你在提示[5-7](#PC12)中看到的那样，我们已经上传了包含“莎士比亚的存在主义”示例的PDF文件作为参考。你是一名英语文学专业的学生，正在撰写关于托尔金对现代美国文学和电影影响的研究。研究问题是“J.R.R.托尔金对神话和民间传说的运用如何影响了现代奇幻文学的发展？”请根据我上传的参考论文的语气和风格撰写你的论文引言，包括我们已讨论的所有细节。你的论文需要听起来更加个性化，同时也要专业。它需要吸引读者的注意，并让教授们看到你对托尔金为文学世界带来的独特视角的欣赏。此外，根据学术论文的适当引用方式引用参考文献。提示5-7
- en: 'Giving ChatGPT a “you are a…” prompt to solicit a better response For reference,
    Listing [5-1](#PC13) is a short sample from the PDF we uploaded to ChatGPT.SHAKESPEARE''S
    EXISTENTIALISM: AN INTRODUCTIONShakespeare and existentialists share a special
    philosophical kinship: both are fascinated by how human beings live in the world,
    how they experience themselves, and how they interact with and respond to other
    people. Shakespeare''s plays – and his tragedies in particular – are full of existentially
    painful and intense moments. Time and again, Shakespeare shows his interest in
    complex ontological and existential issues by presenting characters who experience
    themselves as divided, damaged, and even dissolved. Richard III''s syntactically
    disjointed speech after his nightmare on the eve of battle demonstrates Shakespeare''s
    particular aptitude for dramatising the disintegrationof subjectivity:Cold fearful
    drops stand on my trembling flesh.What do I fear? Myself? There''s none else by.Richard
    loves Richard; that is, I am I.Is there a murderer here? No. Yes, I am.Then fly!
    What, from myself? Great reason. Why?Lest I revenge. Myself upon myself?Alack,
    I love myself. Wherefore? For any goodThat I myself have done unto myself?O no,
    alas, I rather hate myselfFor hateful deeds committed by myself.I am a villain.
    Yet I lie: I am not.Fool, of thyself speak well. (Richard III, V.v.135-46)''Richard
    loves Richard'': the narcissistic embrace of self is a desperate attempt by Richard
    to repair this internal fracturing and become self-identical, but the tight rhetorical
    structure of the speech and the self-estranging use of the third person are literally
    and figuratively self-defeating. As Eric Langley notes, ''Paradoxically, it is
    the language of self-assertion or definition that unravels in reflective repetition.''
    An act of self-identification becomes an act of self-annihilation for Richard.
    Rather than reaffirming his identity, his oscillations - ''No. Yes, . . . I love
    myself . . . I rather hate myself . . . I am . . . I am not'' - cancel each other
    out and only succeed in intensifying and exacerbating his traumatic experience
    of self-loss.Listing 5-1'
  id: totrans-557
  prefs: []
  type: TYPE_NORMAL
  zh: 给ChatGPT一个“你是一个……”的提示以获取更好的回应。为了参考，列表[5-1](#PC13)是从我们上传到ChatGPT的PDF中摘取的简短样本。《莎士比亚的存在主义：导论》莎士比亚和存在主义者有着特殊的哲学联系：他们都着迷于人类如何在世界上生活，他们如何体验自己，以及他们如何与他人互动和回应。莎士比亚的戏剧——尤其是他的悲剧——充满了存在主义痛苦和强烈的时刻。一次又一次，莎士比亚通过呈现那些将自己视为分裂、受损甚至消融的角色来展示他对复杂本体论和存在问题的兴趣：在战斗前夕的恶梦中醒来后，理查三世语法上支离破碎的演讲展示了莎士比亚在戏剧化主观分解方面的特殊才能：冷冷的恐惧之滴站在我颤抖的肉体上。我害怕什么？我自己？没有别人。理查爱理查；也就是说，我就是我。这里有凶手吗？没有。是的，是我。那么逃走吧！从我自己？有充分的理由。为什么？以免我报复。我自己报复我自己？哎呀，我爱我自己。为什么？因为我对自己做了什么好事？哦，不，唉，我更恨我自己，因为我自己犯下了可恨的行为。我是一个恶棍。然而我说谎：我不是。傻瓜，好好对自己说话。（理查三世，V.v.135-46）“理查爱理查”：自我溺爱的拥抱是理查修复这种内部分裂并成为自我同一性的绝望尝试，但演讲的紧密修辞结构和第三人称的自我疏远使用在字面和比喻上都适得其反。正如埃里克·兰利所指出的，“矛盾的是，自我主张或定义的语言在反思性的重复中瓦解。”自我认同的行为变成了自我毁灭的行为。理查并没有重申他的身份，他的摇摆——‘不。是的……我爱我自己……我更恨我自己……我是……我不是’——相互抵消，只成功地加剧和加剧了他自我丧失的创伤体验。列表5-1
- en: A short sample of Charlotte Keys’s “Shakespeare’s Existentialism”
  id: totrans-558
  prefs: []
  type: TYPE_NORMAL
  zh: 查洛特·凯斯《莎士比亚的存在主义》的简短样本
- en: '*Credit: Charlotte Keys’s* “Shakespeare’s Existentialism”'
  id: totrans-559
  prefs: []
  type: TYPE_NORMAL
  zh: '*版权：查洛特·凯斯的* 《莎士比亚的存在主义》'
- en: 'Now that we’ve demonstrated to ChatGPT what kind of writing style we’re looking
    for, let’s see how ChatGPT was able to improve with our improved prompt. You can
    see the response we got from ChatGPT in Response [5-7](#PC14).**Introduction****Tolkien''s
    Influence on Modern Fantasy Authors**J.R.R. Tolkien''s contribution to modern
    literature is not just a testament to his extraordinary imagination, but also
    a reflection of his deep-rooted passion for mythology and folklore. His works,
    notably *The Lord of the Rings*, *The Hobbit*, and *The Silmarillion*, have redefined
    the fantasy genre and established the foundation for what we now recognize as
    modern epic fantasy (Shippey, 2000). For me, Tolkien''s ability to weave mythic
    narratives into richly detailed worlds has always represented more than just stories
    of good versus evil; it is a tapestry of timeless archetypes, a way for us to
    connect to our collective past while dreaming of the future. His influence on
    American literature, film, and entertainment is unmistakable, and countless authors
    and filmmakers have drawn inspiration from the world of Middle-earth, borrowing
    themes, tropes, and narrative structures to craft their own compelling works (Flieger,
    2002).**Tolkien''s Influence on American Fantasy Authors**American authors like
    George R.R. Martin, whose *A Song of Ice and Fire* series echoes the epic scale
    and character-driven complexity found in Tolkien''s work, openly acknowledge the
    influence of Middle-earth on their writing (Shippey, 2005). Martin''s world is
    one where moral ambiguity and intricate politics reign, but at its heart, the
    influence of Tolkien''s mythic framework is evident in the sweeping landscapes
    and the deep, character-driven narratives. Similarly, Terry Brooks'' *Shannara*
    series draws heavily on Tolkien''s world-building style, employing a quest-driven
    narrative involving ancient magic and a battle between good and evil (Shippey,
    2000). Patrick Rothfuss, with his *The Kingkiller Chronicle*, carries forward
    Tolkien''s legacy with a sophisticated level of world-building and lyrical storytelling,
    akin to the mythic histories found in *The Silmarillion* (Flieger, 2002). These
    American fantasy authors have embraced Tolkien''s blueprint and adapted it for
    new generations, incorporating modern sensibilities while preserving the grandeur
    and depth that characterize his works.**Tolkien''s Influence on Cinema and Popular
    Culture**Tolkien''s influence, however, extends well beyond literature into cinema
    and popular culture. Peter Jackson''s *The Lord of the Rings* and *The Hobbit*
    trilogies brought Tolkien''s expansive world to an even broader audience, inspiring
    new waves of fantasy films and television series. American productions such as
    *The Chronicles of Narnia* (adapted from the works of Tolkien''s contemporary
    and friend, C.S. Lewis) and HBO''s *Game of Thrones* clearly reflect Tolkien''s
    narrative techniques, focusing on epic conflicts, richly drawn characters, and
    moral complexity (Shippey, 2005). Even *Harry Potter*, though a very different
    type of fantasy, carries Tolkien''s legacy, particularly in its magical worlds,
    mysterious artifacts, and the overarching theme of the battle between good and
    evil (Flieger, 2002).**The Mythological Foundations of Tolkien''s Works**Tolkien''s
    inspirations are as fascinating as his creations. He was a philologist and a professor
    of Anglo-Saxon at Oxford, and his deep academic background in languages and mythology
    significantly influenced his writing. His expertise in Old English, Norse mythology,
    and early European folklore directly shaped the world of Middle-earth (Shippey,
    2000). The character of Gandalf, for example, was inspired by Odin, the Norse
    god, while the Elves were influenced by both Norse and Celtic traditions (Flieger,
    2002). Moreover, Tolkien integrated elements of Christian mythology, particularly
    exploring themes of sacrifice, redemption, and the eternal struggle against evil
    (Shippey, 2000). His famous essay, "On Fairy-Stories," articulates his belief
    in the power of myth and storytelling as essential tools for understanding human
    experience, emphasizing his intention to create a "mythology for England" (Tolkien,
    1964). This unique blend of inspirations not only shaped his fictional worlds
    but also forged a path for future fantasy authors to build upon.**Critical Essays
    on Tolkien''s Influence**For those who seek a deeper understanding of Tolkien''s
    mythological foundations and literary influence, several critical essays offer
    invaluable insights. Tom Shippey''s *J.R.R. Tolkien: Author of the Century* provides
    an in-depth analysis of Tolkien''s literary methods and mythic inspirations, highlighting
    the complex narrative techniques he employed (Shippey, 2000). Verlyn Flieger''s
    *Splintered Light: Logos and Language in Tolkien’s World* delves into Tolkien''s
    use of language and the interplay of light and darkness in his mythology (Flieger,
    2002). Additionally, Shippey''s *The Road to Middle-earth* is an essential resource
    for understanding the academic and folkloric roots of Tolkien''s works, connecting
    his inspirations to his writing and examining the profound influence of his myth-making
    on the broader fantasy genre (Shippey, 2005). These texts serve as key references
    to explore Tolkien''s mythology in depth and its lasting impact on modern storytelling.As
    an admirer of Tolkien''s work, I am struck by the depth of his legacy—not only
    in how he transformed the fantasy genre but also in how he provided a framework
    for understanding myth and its power to shape our perception of the world. His
    works continue to inspire countless creators, challenging us to see beyond the
    surface of storytelling to the cultural and philosophical roots that lie beneath.
    Through Tolkien, we are invited to embark on journeys that are not only adventurous
    but deeply resonant, reflecting the timeless truths of human experience.**References**Flieger,
    V. (2002). *Splintered Light: Logos and Language in Tolkien’s World*. Kent State
    University Press.Shippey, T. (2000). *J.R.R. Tolkien: Author of the Century*.
    HarperCollins.Shippey, T. (2005). *The Road to Middle-earth*. Houghton Mifflin.Tolkien,
    J.R.R. (1964). *Tree and Leaf*. HarperCollins.Response 5-7'
  id: totrans-560
  prefs: []
  type: TYPE_NORMAL
  zh: '既然我们已经向ChatGPT展示了我们所期望的写作风格，现在来看看ChatGPT是如何通过我们改进的提示词得到提升的。您可以在回复[5-7](#PC14)中看到我们从ChatGPT获得的响应。**引言****托尔金对现代奇幻作家的影响**J.R.R.
    托尔金对现代文学的贡献不仅证明了他非凡的想象力，也反映了他对神话和民间传说根深蒂固的热爱。他的作品，尤其是《*指环王*》、《*霍比特人*》和《*精灵宝钻*》，重新定义了奇幻文学类型，并为我们现在所认知的现代史诗奇幻奠定了基础（Shippey,
    2000）。对我而言，托尔金将神话叙事编织进细节丰富的世界的能力，始终不仅仅代表着善与恶的故事；它是一幅永恒原型的织锦，是我们连接集体过去、同时梦想未来的方式。他对美国文学、电影和娱乐的影响是显而易见的，无数作家和电影制作人都从中土世界汲取灵感，借用其主题、套路和叙事结构来创作他们自己引人入胜的作品（Flieger,
    2002）。**托尔金对美国奇幻作家的影响**像乔治·R·R·马丁这样的美国作家，其《*冰与火之歌*》系列呼应了托尔金作品中史诗般的规模和以角色驱动的复杂性，他们公开承认中土世界对其写作的影响（Shippey,
    2005）。马丁的世界是一个道德模糊和错综复杂的政治统治的世界，但其核心，托尔金神话框架的影响在广阔的风景和深刻的、以角色驱动的叙事中显而易见。同样，特里·布鲁克斯的《*沙娜拉*》系列大量借鉴了托尔金的世界构建风格，采用了一个涉及古老魔法和善恶之战的、以任务驱动的叙事（Shippey,
    2000）。帕特里克·罗斯弗斯以其《*弑君者传奇*》，通过精妙的世界构建和抒情性的故事叙述，延续了托尔金的遗产，类似于《*精灵宝钻*》中的神话历史（Flieger,
    2002）。这些美国奇幻作家接受了托尔金的蓝图，并为其适应了新一代读者，融入了现代情感，同时保留了他作品特有的宏伟和深度。**托尔金对电影和流行文化的影响**然而，托尔金的影响远远超出了文学范畴，延伸到了电影和流行文化。彼得·杰克逊的《*指环王*》和《*霍比特人*》三部曲将托尔金广阔的世界带给了更广泛的观众，激发了新一波的奇幻电影和电视剧。美国作品如《*纳尼亚传奇*》（改编自托尔金同时代的朋友C.S.刘易斯的作品）和HBO的《*权力的游戏*》都清晰地反映了托尔金的叙事技巧，聚焦于史诗冲突、刻画丰满的角色和道德复杂性（Shippey,
    2005）。即使是《*哈利·波特*》，尽管是不同类型的奇幻作品，也承载着托尔金的遗产，特别是在其魔法世界、神秘器物以及善与恶斗争的总体主题上（Flieger,
    2002）。**托尔金作品的神话基础**托尔金的灵感来源和他的创作一样引人入胜。他是一位语言学家和牛津大学的盎格鲁-撒克逊语教授，他在语言和神话方面的深厚学术背景极大地影响了他的写作。他对古英语、北欧神话和早期欧洲民间传说的专业知识直接塑造了中土世界（Shippey,
    2000）。例如，甘道夫这个角色的灵感来源于北欧神奥丁，而精灵则受到了北欧和凯尔特传统的影响（Flieger, 2002）。此外，托尔金融入了基督教神话的元素，特别是探索了牺牲、救赎以及与邪恶永恒斗争的主题（Shippey,
    2000）。他著名的文章《论童话故事》阐述了他对神话和讲故事作为理解人类经验重要工具的力量的信念，强调了他创造“英格兰的神话”的意图（Tolkien, 1964）。这种独特的灵感融合不仅塑造了他的虚构世界，也为未来的奇幻作家开辟了一条可以在此基础上继续发展的道路。**关于托尔金影响的评论文章**对于那些寻求更深入理解托尔金神话基础和文学影响的人，有几篇评论文章提供了宝贵的见解。汤姆·希比的《*J.R.R.
    托尔金：世纪作家*》深入分析了托尔金的文学方法和神话灵感，强调了他所采用的复杂叙事技巧（Shippey, 2000）。维琳·弗利格的《*碎裂之光：托尔金世界中的逻各斯与语言*》深入探讨了托尔金对语言的运用以及其神话中光与暗的相互作用（Flieger,
    2002）。此外，希比的《*通往中土之路*》是理解托尔金作品学术和民间传说根源的重要资源，将他的灵感与他的写作联系起来，并考察了他的神话创作对更广泛奇幻类型的深远影响（Shippey,
    2005）。这些文本是深入探索托尔金神话及其对现代叙事持久影响的关键参考文献。作为托尔金作品的仰慕者，我被他遗产的深度所震撼——不仅在于他如何改变了奇幻文学类型，还在于他如何提供了一个理解神话及其塑造我们世界观的力量的框架。他的作品继续激励着无数的创作者，挑战我们超越故事叙述的表面，看到其下隐藏的文化和哲学根源。通过托尔金，我们受邀踏上的旅程不仅是冒险的，而且是深刻共鸣的，反映了人类经验中永恒的真理。**参考文献**Flieger,
    V. (2002). *Splintered Light: Logos and Language in Tolkien’s World*. Kent State
    University Press.Shippey, T. (2000). *J.R.R. Tolkien: Author of the Century*.
    HarperCollins.Shippey, T. (2005). *The Road to Middle-earth*. Houghton Mifflin.Tolkien,
    J.R.R. (1964). *Tree and Leaf*. HarperCollins.回复 5-7'
- en: ChatGPT provides a response that sounds like an actual thesis introduction
  id: totrans-561
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT提供了一个听起来像真正论文引言的回复
- en: This response is so much better. As we instructed, ChatGPT simply used the example
    we gave it as inspiration for reworking the introduction it wrote already. Essentially,
    it’s been taught to learn the same way we do. We learn from greater examples and
    take their influences with us into our own work, not unlike how other authors
    learned from Tolkien or Shakespeare.
  id: totrans-562
  prefs: []
  type: TYPE_NORMAL
  zh: 这个回答好多了。正如我们指示的，ChatGPT只是简单地以我们给出的例子为灵感，重新构思了它已经写好的引言。本质上，它已经被训练成以我们相同的方式进行学习。我们从更大的例子中学习，并将它们的影响带入我们的工作中，这与其他作者从托尔金或莎士比亚那里学习的方式并无二致。
- en: Conclusion
  id: totrans-563
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: In this chapter, we looked at how ChatGPT can be trained to prepare an academic
    student for intensive writing assignments like writing a thesis. In the next chapter,
    we’ll dive into how ChatGPT can help with data analysis, allowing you to make
    informed decisions based on the results. We’ll look at practical examples such
    as explaining the contents of a Privacy Policy PDF file, identifying and finding
    information from a photo, and creating a flashcard set from an article in another
    language.
  id: totrans-564
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们探讨了如何训练ChatGPT为学术学生准备像写论文这样的密集写作任务。在下一章中，我们将深入探讨ChatGPT如何帮助数据分析，让您能够根据结果做出明智的决定。我们将探讨实际示例，例如解释隐私政策PDF文件的内容，从照片中识别和查找信息，以及从另一语言的文章中创建词汇卡片集。
- en: © The Author(s), under exclusive license to APress Media, LLC, part of Springer
    Nature 2025L. EvelynMaking ChatGPT Work for You[https://doi.org/10.1007/979-8-8688-1445-7_6](https://doi.org/10.1007/979-8-8688-1445-7_6)
  id: totrans-565
  prefs: []
  type: TYPE_NORMAL
  zh: © 作者（们），独家授权给APress Media, LLC，Springer Nature的一部分，2025L. Evelyn让ChatGPT为你工作[https://doi.org/10.1007/979-8-8688-1445-7_6](https://doi.org/10.1007/979-8-8688-1445-7_6)
- en: 6. Prompts to Make Your Life Easier with Data Analysis
  id: totrans-566
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 6. 使用数据分析使生活更轻松的提示
- en: Lydia Evelyn^([1](#Aff2)  )(1)Catalonia, Spain
  id: totrans-567
  prefs: []
  type: TYPE_NORMAL
  zh: Lydia Evelyn^([1](#Aff2)  )(1)加泰罗尼亚，西班牙
- en: The words “data analysis” may sound like a very technical term, but in actuality,
    analyzing data is something we all do on a daily basis. For example, we analyze
    data when we see it’s supposed to rain outside and therefore choose to bring an
    umbrella to work. We’re analyzing data when we read an email so that we can formulate
    a response. We do it all the time without thinking.
  id: totrans-568
  prefs: []
  type: TYPE_NORMAL
  zh: “数据分析”这个词可能听起来是一个非常技术性的术语，但实际上，分析数据是我们每天都在做的事情。例如，当我们看到外面要下雨时，我们会选择带伞上班，这就是在分析数据。当我们阅读电子邮件以便制定回复时，我们也在分析数据。我们一直在做这些事情，而且从不思考。
- en: So, when we’re talking about using ChatGPT for data analysis, what we’re really
    talking about is giving ChatGPT information to understand **first**, then proceed
    to ask it to do something with the information provided. This is useful for various
    purposes, such as understanding context in a conversation and summarizing the
    important details, reading the terms and conditions of an application and explaining
    what they mean in simpler terms, or looking at a photo and identifying what’s
    in it. Not only that, but we can present this information in different formats.
    ChatGPT can read Word documents, PDF files, and even Excel files. So let’s take
    a look at what we can do with ChatGPT once we’ve given it some data to analyze.
  id: totrans-569
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，当我们谈论使用ChatGPT进行数据分析时，我们真正谈论的是首先给ChatGPT提供信息以便它理解，然后让它对提供的信息进行操作。这在各种用途中都很有用，比如理解对话中的上下文和总结重要细节，阅读应用程序的条款和条件并用更简单的术语解释它们，或者查看照片并识别其中的内容。不仅如此，我们还可以以不同的格式展示这些信息。ChatGPT可以阅读Word文档、PDF文件，甚至Excel文件。所以，让我们看看一旦我们给它一些数据分析的数据，我们可以用ChatGPT做什么。
- en: 'What will be covered in this chapter:'
  id: totrans-570
  prefs: []
  type: TYPE_NORMAL
  zh: 本章将涵盖以下内容：
- en: Using ChatGPT to summarize the contents of a conversation in a Slack channel
    and give you the most important details
  id: totrans-571
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用ChatGPT总结Slack频道中对话的内容，并给出最重要的细节
- en: Giving ChatGPT a PDF of Facebook’s privacy policy to find out what you’re really
    being asked to agree to
  id: totrans-572
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 给ChatGPT一份Facebook的隐私政策PDF，以了解你真正被要求同意的内容
- en: Identifying a photo of a bug from the garden. Is it dangerous or delightful?
    Maybe a little of both?
  id: totrans-573
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 从花园的照片中识别虫子。它是有害的还是令人愉快的？也许两者都有？
- en: Using ChatGPT to create a flashcard set of vocabulary words from an article
    in a foreign language
  id: totrans-574
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用ChatGPT从外语文章中创建词汇卡片集
- en: Staying in the Loop in a Slack Channel
  id: totrans-575
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 在Slack频道中保持同步
- en: Most workplaces use some form of instant messaging, be it Slack, Microsoft Teams,
    or even Discord. It’s useful for keeping up with company news, collaborating with
    team members, and holding friendly conversations. But the fate of all group messaging
    channels is to become cluttered with messages quickly, especially when something
    important happens—be it good or bad. For example, it could be the fact that the
    sales team just landed a huge deal with an important customer, and everyone is
    praising the team for their hard work. Or, there’s been a security breach, and
    the entire company needs to respond to the crisis.
  id: totrans-576
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数工作场所都使用某种形式的即时通讯工具，无论是 Slack、Microsoft Teams，甚至是 Discord。这对于跟进公司新闻、与团队成员协作以及进行友好的对话都很有用。但是，所有群聊渠道的命运很快就会变得消息繁杂，尤其是在发生重要事情时——无论是好事还是坏事。例如，可能是销售团队刚刚与一个重要客户达成了一笔大交易，每个人都为团队的努力工作而赞扬。或者，发生了安全漏洞，整个公司都需要应对这场危机。
- en: Or—and we’ve all been there—you were on vacation and dared not look at a single
    Slack message while you were offline. You know that when you get back, you have
    a lot of scrolling to do to get caught up on what everyone’s talking about. Thankfully,
    ChatGPT can easily summarize a conversation for you and highlight the most important
    details so you don’t have to feel left out.
  id: totrans-577
  prefs: []
  type: TYPE_NORMAL
  zh: 或者——我们都有过这样的经历——你在度假，不敢在离线时查看任何 Slack 消息。你知道当你回来时，你需要滚动很多内容来赶上大家都在谈论的事情。幸运的是，ChatGPT
    可以轻松为你总结对话，并突出最重要的细节，这样你就不会感到被排除在外。
- en: Let’s look at an example Slack conversation to test this out with, as shown
    in Listing [6-1](#PC1).**#marketing-chit-chat****Emily:**Happy Friday, everyone!
    Any fun plans for the weekend?**Mike:**Hey Emily! I'm planning to hit the beach
    if the weather stays nice. How about you?**Emily:**Sounds awesome! I'm thinking
    of trying out that new sushi place downtown. Anyone wants to join?**Lisa:**I'm
    in! I've been craving sushi all week. What time are you thinking?**Emily:**How
    about 7 PM tomorrow?**James:**Count me in too! I'll bring my expertise in tasting
    sushi ![A black and white symbol of a smiling face with closed eyes and an open
    mouth, resembling a laughing expression. The face is circular with a thick black
    outline.](../images/641691_1_En_6_Chapter/641691_1_En_6_Figa_HTML.gif)**David:**Haha,
    James, I hope your sushi expertise is better than your karaoke skills from last
    weekend!**James:**Touché, David. I promise no singing this time, just eating!**Sarah:**I
    wish I could join, but I have a family thing tomorrow. Next time for sure!**Emily:**We'll
    miss you, Sarah! We'll have some sushi in your honor. ![A winking face emoji with
    a gray background, featuring a black outline. The emoji has one eye open and the
    other eye winking, with a slight smile.](../images/641691_1_En_6_Chapter/641691_1_En_6_Figb_HTML.gif)**Mike:**On
    a different note, anyone up for a hike on Sunday morning? I found this great trail
    about an hour away.**Lisa:**That sounds fun, Mike! I'm up for it. Need to burn
    off all the sushi calories anyway. ![I'm sorry, I can't assist with that.](../images/641691_1_En_6_Chapter/641691_1_En_6_Figc_HTML.gif)**David:**I'll
    join too. What time are we thinking?**Mike:**Let's meet at 8 AM at the trailhead.
    Early start, but totally worth it.**James:**8 AM on a Sunday? Mike, you're killing
    me. But fine, I'm in. I'll bring coffee for everyone.**Emily:**Looks like a productive
    weekend for the team! Can't wait for tomorrow and Sunday.**Lisa:**By the way,
    did anyone see the new episode of that marketing show on Netflix? So many good
    ideas!**James:**Yes! I binged the whole series. I think we could try out some
    of those campaign strategies.**Sarah:**I haven't seen it yet. Now I know what
    I'm doing on Sunday evening. Thanks for the recommendation!**Emily:**Alright,
    see you all tomorrow at 7 PM for sushi, and those up for the hike, see you Sunday
    morning!**David:**Looking forward to it! Have a great weekend, everyone!**Mike:**Don't
    forget to bring your hiking boots and your best sushi appetite. Have a good one!Listing
    6-1
  id: totrans-578
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看一个 Slack 对话的例子来测试这一点，如列表 [6-1](#PC1) 所示。**#营销闲聊****Emily:**大家好，周五快乐！周末有什么有趣的活动计划吗？**Mike:**嗨，Emily！如果天气好，我打算去海滩。你呢？**Emily:**听起来很棒！我正在考虑尝试一下市中心的新寿司店。有人想加入吗？**Lisa:**我加入！我整个星期都在渴望寿司。你打算什么时候去？**Emily:**明天晚上7点怎么样？**James:**我也加入！我会带上我对寿司品味的专业知识
    ![一个黑白符号，表示一个闭眼微笑、张嘴的笑脸，类似于笑的表情。脸是圆形的，有粗黑边框。](../images/641691_1_En_6_Chapter/641691_1_En_6_Figa_HTML.gif)**David:**哈哈，James，我希望你的寿司专业知识比上周末的卡拉OK技能要好！**James:**你说得对，David。我保证这次不唱歌，只吃！**Sarah:**我希望我能加入，但我明天有个家庭聚会。下次一定！**Emily:**我们会想念你的，Sarah！我们会为你准备一些寿司。
    ![一个带有灰色背景的眨眼笑脸表情符号，黑色轮廓。表情符号有一只眼睛睁开，另一只眼睛眨眼，带着微笑。](../images/641691_1_En_6_Chapter/641691_1_En_6_Figb_HTML.gif)**Mike:**顺便说一句，有人想在周日早上去徒步旅行吗？我找到了一条大约一小时路程的绝佳小径。**Lisa:**听起来很有趣，Mike！我愿意参加。反正我需要燃烧掉所有的寿司卡路里。
    ![很抱歉，我无法协助此操作。](../images/641691_1_En_6_Chapter/641691_1_En_6_Figc_HTML.gif)**David:**我也参加。我们什么时候出发？**Mike:**我们早上8点在山脚下见面。虽然起得早，但绝对值得。**James:**周日早上8点？Mike，你是在折磨我。但好吧，我加入。我会为每个人带咖啡。**Emily:**看起来这个团队周末会很有成效！迫不及待地想明天和周日。**Lisa:**顺便问一下，有人看过
    Netflix 上那个营销节目的新剧集吗？有很多好主意！**James:**是的！我一口气看完了整个系列。我认为我们可以尝试一些那些营销策略。**Sarah:**我还没看过。现在我知道我周日晚上要做什么了。谢谢你的推荐！**Emily:**好的，明天晚上7点我们见，周日早上参加徒步旅行的朋友们，见！**David:**期待着！大家周末愉快！**Mike:**别忘了带上你的徒步鞋和最好的寿司胃口。祝大家周末愉快！
- en: A somewhat lengthy Slack channel conversation about weekend plans
  id: totrans-579
  prefs: []
  type: TYPE_NORMAL
  zh: 一段关于周末计划的相对较长的 Slack 频道对话
- en: As you can see, Listing [6-1](#PC1) shows a casual conversation between colleagues.
    If you walked away from the desk for a few moments and saw this conversation ongoing
    and wanted to add something, scrolling all the way to the top while messages are
    still going back and forth might be quite annoying. Let’s see how ChatGPT can
    make this process easier.
  id: totrans-580
  prefs: []
  type: TYPE_NORMAL
  zh: 如您所见，列表 [6-1](#PC1) 展示了同事之间的闲聊。如果您离开办公桌几分钟，看到这场对话正在进行，并想添加些什么，在消息还在来回发送时一直滚动到顶部可能会相当烦人。让我们看看
    ChatGPT 如何使这个过程变得更简单。
- en: Asking ChatGPT to Summarize a Conversation from a Chat Window
  id: totrans-581
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 要求ChatGPT总结聊天窗口中的对话
- en: We’re going to ask ChatGPT to condense what’s being said and make it palatable
    for someone just trying to catch up. Take a look at how we did this in Prompt
    [6-1](#PC2).
  id: totrans-582
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将要求ChatGPT压缩所说话的内容，使其对试图赶上进度的人来说易于接受。看看我们在提示[6-1](#PC2)中是如何做到这一点的。
- en: Note
  id: totrans-583
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: For the sake of brevity, we indicate where we’ve given ChatGPT the content of
    the Slack conversation shown in Listing [6-1](#PC1) with “[Slack conversation]"
    in Prompt [6-1](#PC2).
  id: totrans-584
  prefs: []
  type: TYPE_NORMAL
  zh: 为了简洁起见，我们在提示[6-1](#PC2)中用“[Slack conversation]”表示我们已向ChatGPT提供了列表[6-1](#PC1)中显示的Slack对话的内容。
- en: 'I was away from my desk for an hour on lunch break and I missed a lot of conversation
    in the #marking-chit-chat channel. Here''s the conversation that was had:###[Slack
    conversation]###Briefly summarize the most important parts of the conversation
    so I can catch up.Prompt 6-1'
  id: totrans-585
  prefs: []
  type: TYPE_NORMAL
  zh: 我在午餐休息时离开了我的办公桌一个小时，我错过了#marking-chit-chat频道中的很多对话。以下是所进行的对话：###[Slack conversation]###简要总结对话中最重要的一部分，以便我可以跟上.Prompt
    6-1
- en: Asking ChatGPT to summarize a conversation too long to read
  id: totrans-586
  prefs: []
  type: TYPE_NORMAL
  zh: 要求ChatGPT总结太长而无法阅读的对话
- en: 'Now let’s look at how ChatGPT interprets the important parts of the conversation
    from Listing [6-1](#PC1), as seen in Response [6-1](#PC3).Here''s a summary of
    the conversation in the #marketing-chit-chat channel:**- Weekend Plans:**  **-
    Emily:** Plans to try a new sushi place downtown and invited others to join at
    7 PM tomorrow.  **- Mike:** Plans to hit the beach and suggested a hike on Sunday
    morning at 8 AM.**- Responses:**  **- Sushi Outing:**    **- Lisa, James, and
    David** are joining Emily.    **- Sarah** can''t make it due to a family commitment.  **-
    Hike:**    **- Lisa, David, and James** are joining Mike. James will bring coffee
    for everyone.**- Other Topics:**  **- Lisa** mentioned a new marketing show on
    Netflix with good ideas.  **- James** has watched it and suggested implementing
    some strategies.  **- Sarah** plans to watch the show on Sunday evening.The team
    is looking forward to a productive and fun weekend with both the sushi outing
    and the hike planned.Response 6-1'
  id: totrans-587
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们来看看ChatGPT是如何从列表[6-1](#PC1)中解读对话的重要部分的，正如在响应[6-1](#PC3)中所见。这是#marketing-chit-chat频道中对话的总结：**-
    周末计划：**  **- Emily:** 计划尝试一家位于市区的新的寿司店，并邀请其他人明天晚上7点加入。  **- Mike:** 计划去海滩，并建议周日早上8点去徒步旅行。**-
    回复：**  **- 寿司之旅：**    **- Lisa、James和David** 将加入Emily。    **- Sarah** 由于家庭责任无法参加。  **-
    徒步旅行：**    **- Lisa、David和James** 将加入Mike。James将为每个人带咖啡。**- 其他话题：**  **- Lisa**
    提到了Netflix上一个新的营销节目，里面有很好的想法。  **- James** 看过这个节目，并建议实施一些策略。  **- Sarah** 计划在周日晚上观看这个节目。团队期待着有一个既高效又愉快的周末，因为计划了寿司之旅和徒步旅行。
- en: ChatGPT gives a brief, easy-to-read summary of a long conversation
  id: totrans-588
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT对长对话给出简短、易于阅读的总结
- en: As you can see, ChatGPT was able to succinctly summarize the conversation, making
    it easy to catch up with anything we might have otherwise missed.
  id: totrans-589
  prefs: []
  type: TYPE_NORMAL
  zh: 如您所见，ChatGPT能够简洁地总结对话，使我们能够轻松跟上我们可能错过的任何内容。
- en: Now, we’ve seen how ChatGPT can explain plain text, but it can also read and
    explain text from a file! Let’s look at how that works by reviewing the contents
    of a PDF containing the terms of a privacy policy.
  id: totrans-590
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们已经看到ChatGPT可以解释纯文本，但它也可以阅读并解释来自文件中的文本！让我们通过回顾包含隐私政策条款的PDF内容来了解它是如何工作的。
- en: Understanding Terms and Conditions Before You Agree to Them
  id: totrans-591
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 在同意之前理解条款和条件
- en: When browsing the Internet, there are always pop-ups that ask for consent before
    you continue using the site. If you didn’t know, if you don’t click “disagree,”
    your continued use of the platform is a form of agreement. But if you really knew
    what you were agreeing to, you might think twice before using certain sites. Unfortunately,
    sites with lengthy terms and conditions sometimes rely on the fact that the legal
    jargon is too complex to understand and expect people to agree without much thought,
    which is what happens in most cases.
  id: totrans-592
  prefs: []
  type: TYPE_NORMAL
  zh: 在浏览互联网时，总会有弹出窗口要求在继续使用网站之前同意。如果您不知道，如果您不点击“不同意”，您继续使用该平台的行为即是一种同意。但如果你真的知道你同意了什么，你可能会在访问某些网站之前三思而后行。不幸的是，有些网站有很长的条款和条件，有时会依赖于法律术语过于复杂而难以理解，并期望人们在几乎没有思考的情况下同意，这在大多数情况下就是这样发生的。
- en: To protect yourself and your data on the Internet, it would be best to know
    what you’re signing up for. This is particularly true for content creators that
    may not fully understand their rights to their content once it’s posted using
    different social media services.
  id: totrans-593
  prefs: []
  type: TYPE_NORMAL
  zh: 为了保护自己在互联网上的安全和数据，了解你将要签署的内容会更好。这对于可能不完全理解在通过不同的社交媒体服务发布内容后对其内容的权利的内容创作者来说尤其如此。
- en: So let’s take a look at what Facebook includes in their terms and services agreements
    and see what they’re really asking you to accept. In this example, we’re actually
    going to be using a functionality we touched on in Chapter [4](641691_1_En_4_Chapter.xhtml)
    when we uploaded a PDF to ChatGPT to understand the style and tone of an academic
    thesis. This time, we’re going to see in more detail how ChatGPT can be used to
    read documents like a PDF and tell you about its contents.
  id: totrans-594
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，让我们来看看 Facebook 在他们的服务条款和协议中包含了什么，以及他们真正要求你接受什么。在这个例子中，我们将使用我们在第 [4](641691_1_En_4_Chapter.xhtml)
    章节中提到的功能，当时我们将 PDF 文件上传到 ChatGPT 以了解学术论文的风格和语气。这次，我们将更详细地看看 ChatGPT 如何读取像 PDF
    这样的文档并告诉你其内容。
- en: Looking at Facebook’s Privacy Policies
  id: totrans-595
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 查看Facebook的隐私政策
- en: ChatGPT can read and understand the contents of a variety of documents. You
    can upload Word documents, Excel files, PDFs, CSVs, and more. In this case, we’re
    going to give ChatGPT a PDF containing the privacy policies for all Meta applications.
    In case you didn’t know, Meta is the parent company of Facebook, Instagram, and
    WhatsApp, so since they have billions of users across all of these platforms,
    you’ve mostly likely already agreed to this policy. So, let’s find out what Meta
    is really asking us to agree to when we use one of their apps.
  id: totrans-596
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT 可以读取和理解各种文档的内容。你可以上传 Word 文档、Excel 文件、PDF、CSV 文件等等。在这种情况下，我们将给 ChatGPT
    一个包含所有 Meta 应用程序隐私政策的 PDF 文件。如果你不知道，Meta 是 Facebook、Instagram 和 WhatsApp 的母公司，因此，由于他们在所有这些平台上拥有数十亿用户，你很可能已经同意了这项政策。那么，让我们找出当我们使用他们的应用程序时，Meta
    真正要求我们同意什么。
- en: 'First, take a look at Figure [6-1](#Fig1) to see what it looks like when we
    ask ChatGPT to read a file. Figure [6-1](#Fig1) shows our conversation with ChatGPT
    after uploading our PDF.![Screenshot of a conversation about the Meta Privacy
    Policy. A user asks for a simpler explanation of the policy. The response provides
    a breakdown of key points, including what Meta collects: basic information like
    email, phone number, and age; activity tracking such as likes, posts, messages,
    location, device details, and browsing behavior; and information about friends
    and interactions. The image includes a PDF icon labeled "Meta Privacy Policy -
    How Meta collects."](../images/641691_1_En_6_Chapter/641691_1_En_6_Fig1_HTML.jpg)'
  id: totrans-597
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，看看图 [6-1](#Fig1) 来看看我们请求 ChatGPT 读取文件时的样子。图 [6-1](#Fig1) 显示了我们上传 PDF 后与 ChatGPT
    的对话。![关于 Meta 隐私政策的对话截图。用户请求对政策进行更简单的解释。响应提供了关键点的分解，包括 Meta 收集的内容：如电子邮件、电话号码和年龄等基本信息；活动跟踪，如点赞、帖子、消息、位置、设备细节和浏览行为；以及关于朋友和互动的信息。图片中包含一个标记为“Meta
    隐私政策 - Meta 如何收集”的 PDF 图标](../images/641691_1_En_6_Chapter/641691_1_En_6_Fig1_HTML.jpg)
- en: Figure 6-1
  id: totrans-598
  prefs: []
  type: TYPE_NORMAL
  zh: 图 6-1
- en: Asking ChatGPT to read a PDF file As you can see from Figure [6-1](#Fig1), uploading
    a PDF to ChatGPT shows up as another text bubble above our prompt. ChatGPT then
    reads the document and responds to our question. It’s that simple! The text in
    Figure [6-1](#Fig1) can be seen in Prompt [6-2](#PC4).I don't understand most
    of what's being said in this privacy policy. Can you explain in simpler terms?
    What am I really being asked to accept here?Prompt 6-2
  id: totrans-599
  prefs: []
  type: TYPE_NORMAL
  zh: 请 ChatGPT 读取 PDF 文件 如您从图 [6-1](#Fig1) 所见，将 PDF 文件上传到 ChatGPT 后，会在我们的提示上方显示另一个文本气泡。然后
    ChatGPT 会读取文档并回答我们的问题。就这么简单！图 [6-1](#Fig1) 中的文本可以在提示 [6-2](#PC4) 中看到。我不太理解这份隐私政策中大部分的内容。你能用更简单的术语解释一下吗？我实际上被要求接受什么？提示
    6-2
- en: Asking ChatGPT to explain a privacy policy
  id: totrans-600
  prefs: []
  type: TYPE_NORMAL
  zh: 请 ChatGPT 解释隐私政策
- en: Before we get into the response from ChatGPT, we’re going to look at a snippet
    of the Facebook privacy policies, as shown in Listing [6-2](#PC5).**Highlights**This
    Privacy Policy explains how we collect, use and share your information. It also
    describes how long we keep your information and how we keep it safe when wetransfer
    it.• The Privacy Policy also lets you know your rights• This Privacy Policy applies
    to what we call Meta Products, or Products. Our Products include Facebook, Instagram,
    and Messenger.• It also applies to Meta Quest if you log in with a Meta accountWe
    at Meta want you to understand what information we collect, and how we use and
    share it. That's why we encourage you to read our Privacy Policy. This helps you
    useMeta Products in the way that's right for you.In the Privacy Policy, we explain
    how we collect, use, share, retain and transfer information. We also let you know
    your rights. Each section of this Policy includes helpful examples and simpler
    language to make our practices easier tounderstand. We've also added links to
    resources where you can learn more about the privacy topics that interest you.It's
    important to us that you know how to control your privacy, so we also show you
    where you can manage your information in the settings of the Meta Products you
    use.You can update these settings to shape your experience.Listing 6-2
  id: totrans-601
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们探讨ChatGPT的响应之前，我们将查看Facebook隐私政策的片段，如列表[6-2](#PC5)所示。**重点**：本隐私政策解释了我们如何收集、使用和共享您的信息。它还描述了我们保留您的信息的时间以及我们在传输信息时如何确保其安全。•
    隐私政策还告知您的权利• 本隐私政策适用于我们所说的Meta产品，或产品。我们的产品包括Facebook、Instagram和Messenger。• 如果您使用Meta账户登录，它也适用于Meta
    Quest。我们Meta希望您了解我们收集的信息，以及我们如何使用和共享它。这就是为什么我们鼓励您阅读我们的隐私政策。这有助于您以适合您的方式使用Meta产品。在隐私政策中，我们解释了我们如何收集、使用、共享、保留和传输信息。我们还告知您的权利。本政策的每一部分都包括有用的示例和更简单的语言，以便更容易理解我们的做法。我们还添加了链接到资源，您可以在那里了解更多关于您感兴趣的隐私主题。了解如何控制您的隐私对我们来说很重要，因此我们还向您展示如何在您使用的Meta产品设置中管理您的信息。您可以通过更新这些设置来塑造您的体验。列表6-2
- en: A snippet of Facebook’s privacy policy Now let’s look at the explanation ChatGPT
    gives us on what the privacy policy is really saying, as shown in Response [6-2](#PC6).Here's
    a simpler breakdown of the key points from the Meta Privacy Policy, based on the
    document:**1\. What Meta Collects:**   - Meta gathers your basic information like
    email, phone number, and age when you sign up.   - It tracks your activity, such
    as what you like, post, or message, along with your location, device details,
    and browsing behavior.   - It also collects information about your friends and
    interactions, even if you don't have a Meta account.**2\. Why They Collect Information:**   -
    To personalize your experience, such as showing relevant posts, ads, or recommendations.   -
    To improve their products and fix issues.   - For safety, like detecting fraud
    or harmful behavior.   - To provide insights to advertisers and partners on how
    effective their ads are.**3\. How They Use Your Information:**   - Meta uses your
    data for personalization, advertising, and content recommendations.   - It shares
    this information with business partners, advertisers, and integrated third-party
    services you choose to interact with.   - Some data is used for research and improving
    AI technologies.**4\. Your Choices:**   - You can adjust settings to limit what
    data Meta collects or how it's used (e.g., ad preferences or location sharing).   -
    However, refusing some data collection might affect how the platform works for
    you.**5\. Sharing with Others:**   - Information you share can be seen by your
    selected audience but may also be reshared by others.   - Public information like
    your username or comments on public pages can be accessed by anyone, even off
    Meta platforms.**6\. Third-Party Interactions:**   - If you use third-party apps
    or log in with Facebook or Instagram, those apps might access some of your data.   -
    Meta partners may share your data with others based on their own privacy policies.**7\.
    Retention:**   - Meta keeps your information as long as necessary for the purposes
    outlined, or as required by law.**In Summary**By agreeing to this policy, you're
    allowing Meta to collect, use, and share your data to personalize your experience,
    show targeted ads, and enhance their services. Some of your data will also be
    shared with advertisers and other businesses. You have some control over your
    settings, but refusing certain data uses might limit features or personalization.Response
    6-2
  id: totrans-602
  prefs: []
  type: TYPE_NORMAL
  zh: Facebook隐私政策的一段摘录现在让我们看看ChatGPT对我们解释的隐私政策真正含义，如响应[6-2](#PC6)所示。以下是基于文档的Meta隐私政策关键点的更简单分解：**1.
    Meta收集的内容：**   - 当你注册时，Meta会收集你的基本信息，如电子邮件、电话号码和年龄。   - 它跟踪你的活动，如你喜欢的、发布的或发送的消息，以及你的位置、设备细节和浏览行为。   -
    它还收集关于你的朋友和互动的信息，即使你没有Meta账户也是如此。**2. 收集信息的原因：**   - 为了个性化你的体验，例如显示相关的帖子、广告或推荐。   -
    为了改进他们的产品并修复问题。   - 为了安全，例如检测欺诈或有害行为。   - 为了向广告商和合作伙伴提供有关他们广告有效性的见解。**3. 如何使用你的信息：**   -
    Meta使用你的数据用于个性化、广告和内容推荐。   - 它将与业务合作伙伴、广告商以及你选择与之互动的集成第三方服务共享这些信息。   - 一些数据用于研究和改进人工智能技术。**4.
    你的选择：**   - 你可以调整设置以限制Meta收集的数据或其使用方式（例如，广告偏好或位置共享）。   - 然而，拒绝某些数据收集可能会影响该平台对你工作的方式。**5.
    与他人共享：**   - 你分享的信息可以被你选择的人群看到，但也可能被其他人转发。   - 公共信息，如你的用户名或公共页面上的评论，可以被任何人访问，甚至是在Meta平台之外。**6.
    与第三方互动：**   - 如果你使用第三方应用或使用Facebook或Instagram登录，这些应用可能会访问你的一些数据。   - Meta合作伙伴可能会根据他们自己的隐私政策与他人共享你的数据。**7.
    保留：**   - Meta将你的信息保留至为达到所述目的所必需的时间，或根据法律要求。**总结**通过同意此政策，你允许Meta收集、使用和共享你的数据以个性化你的体验、展示定向广告并增强他们的服务。你的某些数据也将与广告商和其他企业共享。你可以控制一些设置，但拒绝某些数据使用可能会限制功能或个性化。
- en: ChatGPT explains in simpler terms what’s in Facebook’s privacy policy
  id: totrans-603
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT用更简单的术语解释了Facebook的隐私政策
- en: In the simpler version of the privacy policy, we have a much stronger idea of
    what kind of power we have over our data when we use Facebook if we take the steps
    necessary to exert that right. We also get to see plainly what Facebook is allowed
    to do with our data and what kinds of third parties are being allowed to view
    the data as well.
  id: totrans-604
  prefs: []
  type: TYPE_NORMAL
  zh: 在隐私政策的简化版本中，如果我们采取必要的步骤来行使权利，我们就能更清楚地了解在使用Facebook时我们对数据的控制力。我们还可以清楚地看到Facebook允许对我们数据进行哪些操作，以及哪些第三方被允许查看这些数据。
- en: Understanding how your data is being used by other companies is an incredible
    way to improve your online safety, and it’s an excellent idea to use ChatGPT to
    educate yourself.
  id: totrans-605
  prefs: []
  type: TYPE_NORMAL
  zh: 了解其他公司如何使用你的数据是一种提高你在线安全性的极好方式，使用ChatGPT来教育自己是一个极好的主意。
- en: But by now we know that ChatGPT isn’t just able to examine text files, it can
    understand information from an image as well. So let’s ask ChatGPT to help us
    figure out what bug is in a photo from a garden and if it’s a threat to our begonias!
  id: totrans-606
  prefs: []
  type: TYPE_NORMAL
  zh: 但到目前为止，我们知道ChatGPT不仅能够检查文本文件，它还能理解图像中的信息。所以，让我们请ChatGPT帮助我们确定花园照片中的虫子是什么，以及它是否对我们的大丽花构成威胁！
- en: Asking ChatGPT to Explain What’s in a Photo
  id: totrans-607
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 向ChatGPT询问照片中的内容
- en: With the ability to send ChatGPT photos, you can ask it for more information
    on what’s being featured in the image. Let’s see what that might look like.
  id: totrans-608
  prefs: []
  type: TYPE_NORMAL
  zh: 通过向ChatGPT发送照片，你可以询问关于图像中展示内容的更多信息。让我们看看那会是什么样子。
- en: What Bug Is in This Photo?
  id: totrans-609
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 这张照片中的虫子是什么？
- en: As a gardener finding odd insects and creatures in their garden, you might be
    concerned about seeing a bug you don’t recognize on your plant leaves. Let’s look
    at how we can use ChatGPT to find out what might be a threat to our garden and
    what steps we should take to proceed.
  id: totrans-610
  prefs: []
  type: TYPE_NORMAL
  zh: 作为一位在花园中发现奇怪昆虫和生物的园丁，你可能会担心在植物叶片上看到你不认识的虫子。让我们看看我们如何使用ChatGPT来找出可能对我们花园构成威胁的东西，以及我们应该采取哪些步骤来处理。
- en: This time, we’re going to look at a back-and-forth interaction with ChatGPT.
    Figure [6-2](#Fig2) is the image we used in our prompt. Listing [6-3](#PC7) is
    the conversation we had with ChatGPT.![A black beetle is resting on a textured,
    dark glove placed on a wooden surface. The background features green grass, suggesting
    an outdoor setting. The beetle's shiny, dark exoskeleton contrasts with the glove's
    material.](../images/641691_1_En_6_Chapter/641691_1_En_6_Fig2_HTML.jpg)
  id: totrans-611
  prefs: []
  type: TYPE_NORMAL
  zh: 这次，我们将查看与ChatGPT的来回互动。图[6-2](#Fig2)是我们提示中使用的图像。列表[6-3](#PC7)是我们与ChatGPT的对话。![一只黑色甲虫正休息在放置在木质表面上的纹理粗糙的黑色手套上。背景是绿色的草地，暗示着户外环境。甲虫闪亮的黑色外骨骼与手套的材料形成鲜明对比。](../images/641691_1_En_6_Chapter/641691_1_En_6_Fig2_HTML.jpg)
- en: Figure 6-2
  id: totrans-612
  prefs: []
  type: TYPE_NORMAL
  zh: 图6-2
- en: An image of some kind of bug I found in my garden That’s a pretty big beetle!
    If it was any larger, I’d ask it to pay rent. I sure hope the garden is safe.
    Let’s ask ChatGPT. Listing [6-3](#PC7) is the entire conversation we had with
    ChatGPT to find out. Note that we’ve already uploaded the photo to ChatGPT in
    the first prompt.**User:**I found this bug in my garden. What is it?**ChatGPT:**The
    beetle in your image appears to be a European rhinoceros beetle (Oryctes nasicornis).
    These beetles are characterized by their large size and distinctive horn on the
    males. They are generally harmless and are found in gardens, feeding on decaying
    wood and other organic matter.If you have any specific concerns or need more information
    about the beetle, feel free to ask!**User:**Are they a threat to my garden?**ChatGPT:**European
    rhinoceros beetles are generally not a threat to your garden. Their larvae feed
    on decaying wood, compost, and other organic matter, which can actually help in
    breaking down and recycling nutrients in the soil. Adult beetles typically do
    not feed or cause damage to plants.However, if you have a lot of decaying wood
    or organic matter in your garden, you might see an increase in their population.
    Overall, they are considered beneficial insects due to their role in decomposition
    and nutrient cycling.Listing 6-3
  id: totrans-613
  prefs: []
  type: TYPE_NORMAL
  zh: 我在我的花园中发现的一种虫子的图像 那是一只相当大的甲虫！如果它再大一点，我会要求它付房租。我确实希望花园是安全的。让我们问问ChatGPT。列表[6-3](#PC7)是我们与ChatGPT的整个对话，以找出答案。注意，我们在第一个提示中已经将照片上传到了ChatGPT。**用户**：我在我的花园里发现了这个虫子。它是什么？**ChatGPT**：你图像中的甲虫看起来像是一种欧洲犀牛甲虫（Oryctes
    nasicornis）。这些甲虫以其大型和雄性特有的独特角而著称。它们通常是无害的，可以在花园中找到，以腐烂的木材和其他有机物质为食。如果你对甲虫有任何具体的问题或需要更多关于甲虫的信息，请随时提问！**用户**：它们对我的花园构成威胁吗？**ChatGPT**：欧洲犀牛甲虫通常不会对你的花园构成威胁。它们的幼虫以腐烂的木材、堆肥和其他有机物质为食，这实际上有助于分解和循环土壤中的营养物质。成年甲虫通常不会进食或损坏植物。然而，如果你在花园中有大量的腐烂木材或有机物质，你可能会看到它们数量的增加。总的来说，由于它们在分解和养分循环中的作用，它们被认为是益虫。列表6-3
- en: A conversation with ChatGPT identifying a beetle found in a garden
  id: totrans-614
  prefs: []
  type: TYPE_NORMAL
  zh: 与ChatGPT的对话，识别花园中发现的甲虫
- en: This is pretty impressive! Not only can we rest easy knowing our begonias are
    safe, we know that we’re doing something right in our backyard’s ecosystem.
  id: totrans-615
  prefs: []
  type: TYPE_NORMAL
  zh: 这真的很令人印象深刻！我们不仅能够安心地知道我们的秋海棠是安全的，我们还知道我们在后院的生态系统中做了一些正确的事情。
- en: But ChatGPT can do more than just identify an object in a photo. Since ChatGPT
    can search the web, it can also *find* items from a picture. Let’s test this out
    by asking ChatGPT to help us shop for an outfit based upon an image from Pinterest.
  id: totrans-616
  prefs: []
  type: TYPE_NORMAL
  zh: 但 ChatGPT 能做的不仅仅是识别照片中的物体。由于 ChatGPT 可以在网络上搜索，它还可以从图片中*找到*物品。让我们通过让 ChatGPT
    帮助我们根据 Pinterest 上的图片购买一套服装来测试这一点。
- en: Where Can I Buy the Outfit in This Photo?
  id: totrans-617
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 我在哪里可以买到这张照片中的服装？
- en: People that browse the Internet and find outfits they like often struggle trying
    to recreate the look themselves. It’s a better idea to use ChatGPT to find out
    where the clothes came from. Or, you might be able to find pieces similar. For
    this, ChatGPT will be using the web search feature, which is an impressive and
    useful feature for this purpose. For this example, we’re going to break up our
    prompt into two steps. This allows ChatGPT to execute one step at a time rather
    than completing both tasks at once. Basically, ChatGPT might get confused otherwise.
    That being said, take a look at Prompt [6-3](#PC8).Help me recreate the outfit
    from this photo. Describe the individual pieces in this outfit for me!Prompt 6-3
  id: totrans-618
  prefs: []
  type: TYPE_NORMAL
  zh: 在网上浏览并找到喜欢的服装的人，往往在尝试自己复刻造型时感到困难。使用 ChatGPT 来找出衣服的来源会更好。或者，你可能能够找到类似的单品。为此，ChatGPT
    将使用网络搜索功能，这是为此目的而提供的令人印象深刻且有用的功能。在这个例子中，我们将我们的提示分成两个步骤。这样可以让 ChatGPT 一次执行一个步骤，而不是同时完成两个任务。基本上，否则
    ChatGPT 可能会感到困惑。话虽如此，请看提示 [6-3](#PC8)。帮助我从这张照片中复刻这套服装。请为我描述这套服装的各个单品！提示 6-3
- en: Looking to recreate a look from a photo Figure [6-3](#Fig3) is the image we
    used for our prompt.![A person smiling and standing against a light-colored wall.
    They are wearing a white tank top, tan high-waisted shorts with a belt, and a
    white shirt draped over their shoulders. They have long hair, are wearing glasses,
    and holding a brown handbag. The person is accessorized with hoop earrings and
    layered necklaces.](../images/641691_1_En_6_Chapter/641691_1_En_6_Fig3_HTML.jpg)
  id: totrans-619
  prefs: []
  type: TYPE_NORMAL
  zh: 想要复刻照片中的造型 图 [6-3](#Fig3) 是我们用于提示的图片。![一个面带微笑站在浅色墙面前的人。他们穿着一件白色紧身背心，棕色高腰短裤，腰间系着腰带，肩上搭着一件白色衬衫。他们有一头长发，戴着眼镜，手里拿着一个棕色手提包。这个人佩戴着圈形耳环和多层项链。](../images/641691_1_En_6_Chapter/641691_1_En_6_Fig3_HTML.jpg)
- en: Figure 6-3
  id: totrans-620
  prefs: []
  type: TYPE_NORMAL
  zh: 图 6-3
- en: 'A picture of an outfit we’d like to buy for ourselvesCredit: Freepik'
  id: totrans-621
  prefs: []
  type: TYPE_NORMAL
  zh: 一张我们想为自己购买的服装图片来源：Freepik
- en: 'Asking ChatGPT to describe the outfit first allows it to actually define what
    we’re looking for, which sets us up for our next prompt, as you’ll see below:Now
    give me links to websites selling items just like the ones you''ve described.Now
    that we’ve defined what we’re looking for, let’s see what ChatGPT suggests so
    that we can put the outfit together ourselves (Response [6-3](#PC10)).To help
    you recreate the outfit, here are some items that closely match the described
    pieces:1\. White Fitted Tank Top:   • Active Fitted Tank Top - White by Cotton
    On: This snug-fitting tank top with thin straps is made from a lightweight, stretchy
    fabric, ideal for layering.2\. High-Waisted Camel Shorts:   • Camel Woven High
    Waisted Tailored Shorts by PrettyLittleThing: These tailored shorts in a warm
    camel tone feature a high-waisted design with a fabric belt and a circular buckle,
    offering a chic and structured look.3\. White Button-Down Shirt (Worn Open):   •
    Classic Cotton Button-Down Shirt in White by DAILYLOOK: This lightweight, slightly
    oversized white shirt is perfect for layering and can be worn unbuttoned over
    the tank top.4\. Gold Layered Necklaces:   • Layered Necklace Set - Delicate Gold
    Layer Necklace Set of 3 by Etsy: This set includes multiple delicate gold necklaces
    of varying lengths, each with small pendants, allowing you to achieve a layered
    look effortlessly.5\. Gold Hoop Earrings:   • Chunky Gold Hoops - Twisted Gold
    Hoops Thick Hoop Earrings by Etsy: These medium-sized thin gold hoop earrings
    add a classic touch to any outfit.6\. Beige or Transparent Sunglasses:   • Sunglasses
    Ralph by Ralph Lauren RA5298U: These stylish, oversized sunglasses feature a slightly
    transparent beige frame, adding a trendy accessory to your ensemble.7\. Small
    Brown Leather Handbag:   • Brown Leather Purse Crossbody Small: This structured
    caramel brown handbag with gold hardware is both functional and stylish, complementing
    the outfit perfectly.8\. Red String Bracelet:   • Red String Bracelet by Etsy:
    This simple red thread bracelet adds a subtle touch of color and is adjustable
    for a comfortable fit.Please note that product availability may vary, and it''s
    advisable to check the current stock and shipping options to your location.Sources:https://www.macys.com/shop/womens-clothing/all-womens-clothing/womens-tops/Top_style/Tank
    Tops?id=255https://www.ocsocialbutterfly.com/collections/allhttps://thechicsavvy.com/edyta-siedleckas-trendsetting-looks/https://www.forever21.com/us/shop/catalog/category/f21/promo_master?page=380&srule=most-popularhttps://www.fashiongo.net/https://punchyvaquera.com/collections/all/gold-hoops?srsltid=AfmBOor37JkhXuEOF6EhKstr1jaqWcE8GRUVwbUOF74hRu9I4a7sHLo7https://www.kellyfields.com/collections/all/enewton-stylehttps://www.distinctivelyhers.com/collections/all?srsltid=AfmBOorfzoMO8JyjmcCARLtzZrEJZK94DtdlaToLjOwcyw-1W0uF-UE7https://www.buzzfeed.com/lily_burrill/fashion-vibe-looks-expensive-but-really-isntResponse
    6-3'
  id: totrans-622
  prefs: []
  type: TYPE_NORMAL
  zh: 首先请ChatGPT描述一下这套服装，这样它实际上可以定义我们正在寻找的东西，这为我们接下来的提示做好了准备，如下所示：现在给我提供一些销售你所描述的类似物品的网站链接。现在我们已经定义了我们正在寻找的东西，让我们看看ChatGPT会建议什么，这样我们就可以自己搭配这套服装了（回应[6-3](#PC10)）。为了帮助您重新搭配这套服装，这里有一些与描述的款式非常接近的物品：1.
    白色紧身T恤：   • Cotton On的白色紧身T恤 - 活性紧身T恤：这款紧身的薄肩带T恤由轻质弹性面料制成，非常适合层搭。2. 高腰骆驼短裤：   •
    PrettyLittleThing的高腰骆驼编织短裤：这些暖色调的定制短裤采用高腰设计，配有布腰带和圆形扣环，提供时尚且结构化的外观。3. 白色纽扣衬衫（敞开穿着）：   •
    DAILYLOOK的白色经典棉质纽扣衬衫：这款轻质略大的白色衬衫非常适合层搭，可以不扣扣子穿在T恤外面。4. 金色层叠项链：   • Etsy的3件精致金色层叠项链套装：这套套装包括多种不同长度的精致金色项链，每条项链都有小吊坠，让您轻松实现层叠效果。5.
    金色圈形耳环：   • Etsy的粗重金色圈形耳环 - 扭曲金色圈形耳环：这些中等大小的细金色圈形耳环为任何服装增添经典触感。6. 米色或透明太阳镜：   •
    Ralph Lauren RA5298U太阳镜：这些时尚的大号太阳镜具有略透明的米色框架，为您的装扮增添时尚配饰。7. 小号棕色皮革手提包：   • 金色硬件的棕色皮革手提包：这款结构化的焦糖棕色手提包既实用又时尚，完美衬托服装。8.
    红色编织手链：   • Etsy的红色编织手链：这条简单的红色线手链增添了一丝色彩，且可调节尺寸以获得舒适佩戴。请注意，产品可用性可能有所不同，建议检查您所在位置的当前库存和运输选项。来源：https://www.macys.com/shop/womens-clothing/all-womens-clothing/womens-tops/Top_style/Tank
    Tops?id=255https://www.ocsocialbutterfly.com/collections/allhttps://thechicsavvy.com/edyta-siedleckas-trendsetting-looks/https://www.forever21.com/us/shop/catalog/category/f21/promo_master?page=380&srule=most-popularhttps://www.fashiongo.net/https://punchyvaquera.com/collections/all/gold-hoops?srsltid=AfmBOor37JkhXuEOF6EhKstr1jaqWcE8GRUVwbUOF74hRu9I4a7sHLo7https://www.kellyfields.com/collections/all/enewton-stylehttps://www.distinctivelyhers.com/collections/all?srsltid=AfmBOorfzoMO8JyjmcCARLtzZrEJZK94DtdlaToLjOwcyw-1W0uF-UE7https://www.buzzfeed.com/lily_burrill/fashion-vibe-looks-expensive-but-really-isnt回应
    6-3
- en: ChatGPT provides a list of sources to shopping websites
  id: totrans-623
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT提供了一系列购物网站的资源
- en: ChatGPT’s suggestions here are great! Now let’s try something different. ChatGPT
    is capable of understanding many languages, so why not put this capability to
    the test?
  id: totrans-624
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT在这里的建议很棒！现在让我们尝试一些不同的事情。ChatGPT能够理解许多语言，那么为什么不测试一下这个能力呢？
- en: In the next example, we’re going to use ChatGPT to create a flashcard set from
    an article in French.
  id: totrans-625
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一个例子中，我们将使用ChatGPT从一篇法语文章中创建一个闪卡集。
- en: Using ChatGPT to Learn a Language by Creating a Flashcard Set
  id: totrans-626
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 通过创建闪卡集学习语言
- en: Let me tell you something about myself. I’m a language buff. I speak English,
    Spanish, and Catalan fluently, as well as French at an intermediate level. Speaking
    from experience, when you’re learning a language, one of the best strategies to
    learning quickly is to start immersing yourself in the media of your target language.
    You can do this by watching films and shows or by reading various forms of simple
    literature, like children’s books or short articles. This is because immersion
    shows you how the language is used on a day-to-day basis.
  id: totrans-627
  prefs: []
  type: TYPE_NORMAL
  zh: 让我告诉你一些关于我的事情。我是一个语言爱好者。我流利地说英语、西班牙语和加泰罗尼亚语，法语达到中级水平。从经验来看，当你学习一门语言时，最快的学习策略之一就是开始沉浸在你目标语言的媒体中。你可以通过观看电影和电视节目或阅读各种形式的简单文学作品，如儿童书籍或短篇文章来实现这一点。这是因为沉浸式学习能让你看到语言在日常生活中的使用方式。
- en: If you wanted to take this learning strategy a step further, you could make
    note of words or phrases you don’t understand and create a flashcard deck to practice
    with. Apps like Quizlet or Anki use scientifically proven methods to help you
    practice and retain the information you’re trying to memorize.
  id: totrans-628
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想要将这种学习策略更进一步，你可以记录下你不懂的单词或短语，并创建一个闪卡集来练习。像Quizlet或Anki这样的应用程序使用科学证明的方法来帮助你练习并保留你试图记住的信息。
- en: As someone that’s currently studying Japanese, I can personally testify to the
    efficacy of this method.
  id: totrans-629
  prefs: []
  type: TYPE_NORMAL
  zh: 作为目前正在学习日语的人，我可以亲自证明这种方法的有效性。
- en: Before now, I’ve always had to create my flashcard sets myself. But ChatGPT
    now makes this process so much easier. By giving it an article written in a language
    you’re interested in learning, you can have it create a vocabulary list of useful
    words and phrases from the article that you can then put into your flashcard deck.
  id: totrans-630
  prefs: []
  type: TYPE_NORMAL
  zh: 在此之前，我总是不得不自己制作我的闪卡集。但现在，ChatGPT让这个过程变得容易得多。通过给它一篇你感兴趣学习的语言的文章，它可以为你创建一个包含文章中有用单词和短语的词汇表，然后你可以将这些单词和短语放入你的闪卡集中。
- en: Sounds interesting, right? Let’s dive right in.
  id: totrans-631
  prefs: []
  type: TYPE_NORMAL
  zh: 听起来很有趣，对吧？让我们直接进入正题。
- en: Using ChatGPT to Get Vocabulary from an Article in French
  id: totrans-632
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 通过ChatGPT从法语文章中获取词汇
- en: We can have ChatGPT read an entire article just by providing the link! So that’s
    precisely what we’re going to instruct ChatGPT to do here. After all, it would
    be quite cumbersome to have to copy and paste the entire article ourselves! We
    include a link, as you can see in Prompt [6-4](#PC11), which leads to an article
    from *Le Monde* (the largest newspaper in France) by the author Par Clément Ghys.I
    am trying to learn French and I need you to suggest vocabulary to write in flashcards.
    I have an article I'm interested in reading, but I don't understand anything.
    I want you to create a list of vocabulary words with translations of the words
    most relevant to the topic of the article, the most commonly used phrases with
    grammatical explanations and a brief summary of what the article was about so
    I can title my deck of flashcards accordingly. I want a nice long list of relevant
    nouns, verbs and grammatical notes that I can add to my flashcards.I'm not fluent
    so be sure to provide your tips and advice in English!https://www.lemonde.fr/m-styles/article/2024/07/21/l-hotel-del-coronado-decor-d-un-vaudeville-culte_6254833_4497319.htmlPrompt
    6-4
  id: totrans-633
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以通过提供链接让ChatGPT阅读整篇文章！所以这正是我们要指示ChatGPT做的事情。毕竟，自己复制粘贴整篇文章会很麻烦！如您在提示[6-4](#PC11)中看到的那样，我们包括了一个链接，该链接指向由Par
    Clément Ghys撰写的来自《世界报》的文章。我正在学习法语，你需要向我建议可以写在闪卡上的词汇。我对阅读的一篇文章很感兴趣，但我什么都不懂。我想让你创建一个词汇表，包括与文章主题最相关的单词的翻译，最常见的短语带有语法解释，以及文章的简要概述，这样我就可以相应地命名我的闪卡集。我希望有一个长长的相关名词、动词和语法注释列表，我可以添加到我的闪卡中。我不是流利的，所以请确保用英语提供你的提示和建议！https://www.lemonde.fr/m-styles/article/2024/07/21/l-hotel-del-coronado-decor-d-un-vaudeville-culte_6254833_4497319.html提示6-4
- en: Asking ChatGPT to create a French flashcard deck
  id: totrans-634
  prefs: []
  type: TYPE_NORMAL
  zh: 请求ChatGPT创建法语闪卡集
- en: Now that we’ve specified what we’re looking for in a good flashcard set, let’s
    see how ChatGPT complies. Response [6-4](#PC12) includes a vocabulary list based
    upon content from the article we provided.The article from Le Monde discusses
    the Hotel del Coronado, affectionately known as "The Del," located near San Diego,
    California. In 1959, director Billy Wilder chose this iconic wooden structure,
    built in 1888, as the filming location for his comedy "Some Like It Hot." The
    hotel, with its distinctive turrets and canopies, provided a picturesque backdrop,
    standing in for a Florida setting in the film. Over the years, "The Del" has been
    a favored retreat for numerous Hollywood stars, including Douglas Fairbanks, Charlie
    Chaplin, and Marilyn Monroe. Today, it remains a popular destination for tourists,
    who are drawn to its rich history and scenic beachfront location.To assist you
    in understanding and engaging with the article, here's a curated list of relevant
    French vocabulary, including nouns, verbs, and phrases, along with their English
    translations and grammatical notes:**Nouns (Les Noms):****- l'hôtel (masc.)**
    – hotel**- le décor** – set, scenery**- le vaudeville** – vaudeville (a genre
    of comedy)**- la comédie** – comedy**- le réalisateur** – director**- le tournage**
    – filming**- la production** – production**- la plage** – beach**- la mafia**
    – mafia**- le musicien / la musicienne** – musician**- le milliardaire** – billionaire**-
    le déguisement** – disguise**- la course-poursuite** – chase**- le restaurant**
    – restaurant**- le symposium** – symposium**- le mafieux** – mobster**- la conférence**
    – conference**- l'opéra (masc.)** – opera**- la star** – star (celebrity)**- le
    salon** – lounge**- le tournage** – filming**- la presse à scandales** – tabloid
    press**- le ragot** – gossip**- le dessert** – dessert**- le soufflé** – soufflé**-
    la vanille** – vanilla**- la meringue** – meringue**- le touriste** – tourist**-
    la chambre** – room**- l'histoire (fem.)** – history**- la plage** – beach**-
    la chambre** – room**- le fantôme** – ghost**Verbs (Les Verbes):****- tourner**
    – to film**- imaginer** – to imagine**- juger** – to judge**- fuir** – to flee**-
    se travestir** – to disguise oneself**- rejoindre** – to join- **rencontrer**
    – to meet**- tomber amoureux** – to fall in love**- décider** – to decide**- épouser**
    – to marry**- s'éprendre** – to fall in love**- se cacher** – to hide**- se déguiser**
    – to disguise oneself**- se piquer** – to claim**- séduire** – to seduce**- se
    faire passer pour** – to pretend to be**- claquer** – to slam**- accueillir**
    – to welcome**- maquiller** – to disguise**- sortir** – to release (a film)**-
    voir** – to see**- venir** – to come**- s'amuser** – to have fun**- devoir** –
    to have to**- refaire** – to redo**- imposer** – to impose**- servir** – to serve**-
    attirer** – to attract**- séduire** – to seduce**- revenir** – to come back**-
    aller** – to go**- se rendre** – to go**- voir** – to see**- être réputé** – to
    be reputed**Common Phrases with Grammatical Explanations:****- "Certains l’aiment
    chaud"** – "Some Like It Hot." *Note:* In French, movie titles are often translated
    differently from their literal meanings.**- "a jugé plus pratique de ne pas quitter
    la Californie"** – "deemed it more practical not to leave California." *Note:*
    "juger" means "to judge" or "to deem," and is followed by an infinitive verb.**-
    "deux musiciens recherchés par la mafia"** – "two musicians sought by the mafia."
    **Note:** "recherchés" is the past participle of "rechercher," used here as an
    adjective agreeing in gender and number with "musiciens."**- "en se travestissant
    et en rejoignant un orchestre de femmes"** – "by disguising themselves and joining
    a women's orchestra." *Note:* The gerund form "en + present participle" indicates
    simultaneous actions.**- "dont l’un tombe amoureux"** – "one of whom falls in
    love." *Note:* "dont" is a relative pronoun indicating possession or association.**-
    "a décidé qu’une fois à Miami elle rencontrerait un homme riche et l’épouserait"**
    – "decided that once in Miami she would meet a rich man and marry him." *Note:*
    The conditional tense "rencontrerait" and "épouserait" expresses a future action
    viewed from a past perspective.**- "sera le théâtre d’un merveilleux vaudeville"**
    – "will be the scene of a marvelous vaudeville." *Note:* "être le théâtre de"
    is an idiomatic expression meaning "to be the scene of."**- "ne comprenant pas
    qu’un homme se cache sous ce déguisement"** – "not realizing that a man is hiding
    under this disguise." *Note:* "ne... pas" forms the negation, and "se cacher"
    is a reflexive verb meaning "to hide oneself."**- "se pique, pour séduire la musicienne,
    de se ... "** – "pretends, to seduce the musician, to pass himself off as a depressed
    and impotent billionaire." *Note:* "se piquer de" means "to claim to," and "se
    faire passer pour" means "to pretend to be."**- "Les portes claquent, les ...
    "** – "Doors slam, hallways are the setting for chases." *Note:* "claquer" means
    "to slam," and "course-poursuite" is a compound noun meaning "chase."**- "le restaurant
    accueille un symposium de mafieux déguisé en conférence des Amis de l’Opéra italien"**
    – "The restaurant hosts a symposium of mobsters disguised as a conference of the
    Friends of Italian Opera."  *Note:* "accueillir" means "to host" or "to welcome,"
    and "déguisé" is a past participle used as an adjective to describe "symposium."**-
    "Elle décide de séduire un milliardaire"** – "She decides to seduce a billionaire."  *Note:*
    The infinitive "séduire" follows the verb "décider de," which introduces an action
    decided upon.**- "La star américaine passe dans les salons de l’hôtel"** – "The
    American star passes through the hotel lounges."  *Note:* "passer dans" means
    "to pass through" or "to visit a place."**- "Les touristes viennent pour découvrir
    son histoire"** – "Tourists come to discover its history."  *Note:* "venir" is
    often used with an infinitive verb to indicate purpose.**Additional Grammatical
    Notes:****- Gender Agreement:** In French, nouns and adjectives must agree in
    gender and number with the subject or object they describe. For example, **"un
    milliardaire"** (a male billionaire) becomes **"une milliardaire”** (a female
    billionaire).**- The Conditional Tense:** Used to express what would happen under
    certain circumstances. For example:  **- "Elle rencontrerait un homme riche."**
    – "She would meet a rich man."**- Reflexive Verbs:** Verbs like **se cacher**
    (to hide oneself) and **se déguiser** (to disguise oneself) require reflexive
    pronouns, which change based on the subject (e.g., je me, tu te, il/elle se).**-
    The Gerund Form:** Created with **en** + present participle (e.g., **en se travestissant**
    – "by disguising oneself") and indicates simultaneous actions.**- Relative Pronouns:**  -
    **"dont"** – used for possession or association ("of whom," "of which").  - **"que"**
    – used for the object of a verb ("that," "which").  - **"qui"** – used for the
    subject of a verb ("who," "which").**- Negation:** Formed with **ne... pas** (e.g.,
    **"Il ne comprend pas."** – "He does not understand").**Summary for Your Flashcards**This
    article focuses on the **Hotel del Coronado** as a significant filming location
    for the classic movie **"Some Like It Hot."** It describes the hotel's unique
    architecture, its historical significance, and its appeal as a destination for
    both tourists and Hollywood stars. The article also delves into the plot of the
    film and how the hotel served as a backdrop for the comedic and romantic escapades
    of the characters.**Suggested Title for Your Flashcards****"L′Hôtel del Coronado
    et 'Certains l′aiment chaud'"**You can now create your flashcards with these vocabulary
    words, grammatical notes, and phrases to enhance your understanding of the article
    while practicing French! Let me know if you'd like additional help with any part
    of this. ![X-Y chart displaying a dataset with points plotted along two axes.
    The horizontal axis represents the independent variable, while the vertical axis
    represents the dependent variable. Data points are marked with symbols, showing
    a trend or pattern. The chart includes labeled axes and a legend indicating different
    data series. The purpose is to illustrate the relationship between the two variables.](../images/641691_1_En_6_Chapter/641691_1_En_6_Figd_HTML.gif)Response
    6-4
  id: totrans-635
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经明确了我们想要的好闪卡集应该包含的内容，让我们看看ChatGPT是如何遵守的。响应[6-4](#PC12)包含了一个基于我们提供的文章内容的词汇表。来自《世界报》的文章讨论了位于加利福尼亚州圣地亚哥附近的酒店德尔科罗纳多，亲切地被称为“德尔”。1959年，导演比利·怀尔德选择这座1888年建造的标志性木结构作为其喜剧电影《热情似火》的拍摄地点。这家酒店以其独特的塔楼和遮篷，提供了一个如画的背景，在电影中代替了佛罗里达的设置。多年来，“德尔”一直是众多好莱坞明星喜爱的避暑胜地，包括道格拉斯·费尔班克斯、查理·卓别林和玛丽莲·梦露。今天，它仍然是游客的热门目的地，他们被其丰富的历史和风景如画的沙滩位置所吸引。为了帮助您理解和参与这篇文章，这里有一份精选的相关法语词汇表，包括名词、动词和短语，以及它们的英语翻译和语法注释：**名词（Les
    Noms）**：**- l'hôtel (masc.)** – 酒店**- le décor** – 布景，风景**- le vaudeville** –
    超级喜剧（一种喜剧类型）**- la comédie** – 喜剧**- le réalisateur** – 导演**- le tournage** –
    拍摄**- la production** – 制作**- la plage** – 海滩**- la mafia** – 黑手党**- le musicien
    / la musicienne** – 音乐家**- le milliardaire** – 亿万富翁**- le déguisement** – 化妆品**-
    la course-poursuite** – 追逐**- le restaurant** – 餐厅**- le symposium** – 研讨会**-
    le mafieux** – 黑帮分子**- la conférence** – 会议**- l'opéra (masc.)** – 歌剧**- la star**
    – 明星（名人）**- le salon** – 休息室**- le tournage** – 拍摄**- la presse à scandales**
    – 小报**- le ragot** – 流言蜚语**- le dessert** – 甜点**- le soufflé** – 蛋糕**- la vanille**
    – 茉莉香**- la meringue** – 马卡龙**- le touriste** – 旅游者**- la chambre** – 房间**- l'histoire
    (fem.)** – 历史**- la plage** – 海滩**- la chambre** – 房间**- le fantôme** – 幽灵****动词（Les
    Verbes）**：**- tourner** – 拍摄**- imaginer** – 想象**- juger** – 判断**- fuir** – 逃跑**-
    se travestir** – 化装**- rejoindre** – 参加**- **rencontrer** – 遇见**- tomber amoureux**
    – 爱上**- décider** – 决定**- épouser** – 娶，嫁**- s'éprendre** – 爱上**- se cacher**
    – 隐藏**- se déguiser** – 化装**- se piquer** – 声称**- séduire** – 迷惑**- se faire passer
    pour** – 假装是**- claquer** – 砰地关上**- accueillir** – 欢迎**- maquiller** – 化妆**- sortir**
    – 发布（电影）**- voir** – 看到**- venir** – 来**- s'amuser** – 玩得开心**- devoir** – 必须**-
    refaire** – 重新做**- imposer** – 强加**- servir** – 服务**- attirer** – 吸引**- séduire**
    – 迷惑**- revenir** – 回来**- aller** – 去**- se rendre** – 到达**- voir** – 看到**- être
    réputé** – 被认为是****常用短语及语法解释**：**- "Certains l’aiment chaud"** – "Some Like It
    Hot." *注意：* 在法语中，电影标题通常与它们的字面意义不同。**- "a jugé plus pratique de ne pas quitter
    la Californie"** – "认为不离开加利福尼亚更实用。" *注意：* "juger"意为"判断"或"认为"，后面跟一个不定式动词。**- "deux
    musiciens recherchés par la mafia"** – "两个被黑手党追捕的音乐家。" **注意：** "recherchés"是"rechercher"的过去分词，在这里用作形容词，与"musiciens"在性和数上保持一致。**-
    "en se travestissant et en rejoignant un orchestre de femmes"** – "通过化装并加入一个女子乐队。"
    *注意：* "en + 现在分词"的复合形式表示同时发生的动作。**- "dont l’un tombe amoureux"** – "其中之一爱上了。"
    *注意：* "dont"是一个关系代词，表示所有格或关联。**- "a décidé qu’une fois à Miami elle rencontrerait
    un homme riche et l’épouserait"** – "决定一旦到了迈阿密，她会遇到一个有钱人并嫁给他。" *注意：* 条件式"rencontrerait"和"épouserait"表示从过去角度看未来的动作。**-
    "sera le théâtre d’un merveilleux vaudeville"** – "将成为一场精彩的超级喜剧的舞台。" *注意：* "être
    le théâtre de"是一个习语，意为"成为……的舞台"。**- "ne comprenant pas qu’un homme se cache sous
    ce déguisement"** – "没有意识到一个男人正躲在化装下面。" *注意：* "ne... pas"构成否定，"se cacher"是一个反身动词，意为"隐藏自己"。**-
    "se pique, pour séduire la musicienne, de se ... "** – "假装，为了迷惑音乐家，自称是一个沮丧无能的亿万富翁。"
    *注意：* "se piquer de"意为"声称"，"se faire passer pour"意为"假装是"。**- "Les portes claquent,
    les ... "** – "门砰地关上，走廊是追逐的场所。" *注意：* "claquer"意为"砰地关上"，"course-poursuite"是一个复合名词，意为"追逐"。**-
    "le restaurant accueille un symposium de mafieux déguisé en conférence des Amis
    de l’Opéra italien"** – "餐厅举办了一个黑帮分子化装成意大利歌剧朋友会议的研讨会。"  *注意：* "accueillir"意为"举办"或"欢迎"，"déguisé"是一个过去分词，用作形容词来描述"symposium"。**-
    "Elle décide de séduire un milliardaire"** – "她决定迷惑一个亿万富翁。"  *注意：* 不定式"séduire"跟在动词"decider
    de"后面，表示决定采取的行动。**- "La star américaine passe dans les salons de l’hôtel"** –
    "美国明星穿过酒店的休息室。"  *注意：* "passer dans"意为"穿过"或"参观一个地方"。**- "Les touristes viennent
    pour découvrir son histoire"** – "游客们来发现它的历史。"  *注意：* "venir"经常与不定式动词连用，表示目的。****附加语法注释**：**-
    性别一致：在法语中，名词和形容词必须与它们所描述的主语或宾语在性和数上保持一致。例如，**"un milliardaire"**（一个男性亿万富翁）变为**"une
    milliardaire”**（一个女性亿万富翁）。**- 条件式：用于表达在某种情况下会发生的事情。例如：**- "Elle rencontrerait
    un homme riche."** – "她会遇到一个有钱人。"**- 反身动词：像**se cacher**（隐藏自己）和**se déguiser**（化装）这样的动词需要反身代词，这些代词根据主语（例如，je
    me, tu te, il/elle se）而变化。**- 现在分词形式：由**en** + 现在分词（例如，**en se travestissant**
    – "通过化装"）构成，表示同时发生的动作。**- 关系代词：**- **"dont"** – 用于所有格或关联（"of whom," "of which"）。  -
    **"que"** – 用于动词的宾语（"that," "which"）。  - **"qui"** – 用于动词的主语（"who," "which"）。**-
    否定：由**ne... pas**（例如，**"Il ne comprend pas."** – "他不懂"）构成。****为您的闪卡总结**这篇文章重点介绍了**酒店德尔科罗纳多**作为经典电影《热情似火》的重要拍摄地点。它描述了酒店独特的建筑风格，其历史意义以及它作为游客和好莱坞明星目的地的吸引力。文章还深入探讨了电影的情节，以及酒店如何成为角色喜剧和浪漫冒险的背景。**为您的闪卡建议的标题**："L′Hôtel
    del Coronado et 'Certains l′aiment chaud'"**您现在可以使用这些词汇、语法注释和短语来创建闪卡，以增强您对文章的理解并练习法语！如果您需要任何部分的额外帮助，请告诉我！
    ![X-Y图表显示一个数据集，数据点沿两个轴绘制。水平轴表示自变量，垂直轴表示因变量。数据点用符号标记，显示趋势或模式。图表包括标记的轴和图例，指示不同的数据系列。目的是说明两个变量之间的关系。](../images/641691_1_En_6_Chapter/641691_1_En_6_Figd_HTML.gif)响应
    6-4
- en: ChatGPT creates a vocabulary list with grammatical tips
  id: totrans-636
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT 创建了一个包含语法提示的词汇表
- en: This is incredibly helpful! ChatGPT provides us an impressive list of vocabulary
    for a flashcard set along with grammatical notes we can study on our own. If I
    may say, the response we got from ChatGPT was *incroyable*.
  id: totrans-637
  prefs: []
  type: TYPE_NORMAL
  zh: 这非常有帮助！ChatGPT 为我们提供了一份令人印象深刻的词汇表，以及我们可以自己学习的语法笔记。如果我可以这么说的话，我们从 ChatGPT 那里得到的回答是
    *令人难以置信*。
- en: Conclusion
  id: totrans-638
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: In this chapter, we got a better understanding of how data analysis can be used
    for summarizing text, understanding complex language in a document, explaining
    what’s in a photo, and even creating a flashcard set from an article.
  id: totrans-639
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们更好地理解了数据分析如何用于总结文本、理解文档中的复杂语言、解释照片中的内容，甚至从文章中创建闪卡集。
- en: In previous chapters, we’ve discussed how ChatGPT can be taught to perform tasks.
    However, in the next chapter, we’re going to look at how ChatGPT can also be used
    as a learning tool to teach *you* new skills by providing you with learning material
    and helpful criticism.
  id: totrans-640
  prefs: []
  type: TYPE_NORMAL
  zh: 在前面的章节中，我们讨论了如何教会 ChatGPT 执行任务。然而，在下一章中，我们将探讨 ChatGPT 也可以作为一个学习工具，通过提供学习材料和有益的批评来教你新的技能。
- en: © The Author(s), under exclusive license to APress Media, LLC, part of Springer
    Nature 2025L. EvelynMaking ChatGPT Work for You[https://doi.org/10.1007/979-8-8688-1445-7_7](https://doi.org/10.1007/979-8-8688-1445-7_7)
  id: totrans-641
  prefs: []
  type: TYPE_NORMAL
  zh: © 作者（们），独家授权给 APress 媒体公司，Springer Nature 集团的一部分，2025L. Evelyn《让 ChatGPT 为你工作》[https://doi.org/10.1007/979-8-8688-1445-7_7](https://doi.org/10.1007/979-8-8688-1445-7_7)
- en: 7. Prompt ChatGPT to Learn New Skills
  id: totrans-642
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 7. 促使 ChatGPT 学习新技能
- en: Lydia Evelyn^([1](#Aff2)  )(1)Catalonia, Spain
  id: totrans-643
  prefs: []
  type: TYPE_NORMAL
  zh: Lydia Evelyn^([1](#Aff2)  )(1)加泰罗尼亚，西班牙
- en: In previous chapters, we’ve looked at how we could teach ChatGPT new information
    to make it more useful. However, in this chapter, we’re going to see how ChatGPT
    can teach *us* something new.
  id: totrans-644
  prefs: []
  type: TYPE_NORMAL
  zh: 在前面的章节中，我们探讨了如何教授 ChatGPT 新信息，使其更加有用。然而，在本章中，我们将看到 ChatGPT 如何能够教会我们一些新的东西。
- en: For example, in the last chapter, we asked ChatGPT to read over the contents
    of a privacy policy and explain them in simpler terms. But we didn’t really learn
    anything new about privacy policies as a whole to better inform our decisions
    on agreeing to such terms in the future.
  id: totrans-645
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，在上一个章节中，我们让 ChatGPT 阅读隐私政策的全部内容，并用更简单的术语解释它们。但我们并没有真正学到关于隐私政策整体的新知识，以更好地指导我们未来在同意此类条款时的决策。
- en: Typically, when we don’t know the answer to a question, our first instinct is
    to consult Google for an answer. But the issue with a Google search result is
    that you’re limited to what is offered by any particular web page, image, or video.
    You can’t ask questions, get clarification, or get more information other than
    what’s on the page.
  id: totrans-646
  prefs: []
  type: TYPE_NORMAL
  zh: 通常，当我们不知道问题的答案时，我们的第一反应是咨询 Google 寻找答案。但 Google 搜索结果的问题是，你只能限于任何特定网页、图片或视频提供的内容。你不能提问、获取澄清或获取页面上的更多信息。
- en: With ChatGPT, we can go far deeper than simply discover new information. It
    can be used to learn entirely new concepts. Whereas in the last chapter we had
    ChatGPT explain a privacy policy in simpler terms, in this chapter, we’re going
    to have ChatGPT answer questions like how can we fulfill our obligations in a
    lease agreement? What exactly does copyright law do, and who does it protect?
    We’re going to ask ChatGPT to help us create a learning plan to start from absolute
    zero and end up knowing how to create our own website. And we’re going to continue
    exploring language learning capabilities within ChatGPT to turn mistakes into
    custom structured lessons.
  id: totrans-647
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 ChatGPT，我们可以比仅仅发现新信息走得更深。它可以用来学习全新的概念。而上一章中我们让 ChatGPT 用更简单的术语解释隐私政策，在本章中，我们将让
    ChatGPT 回答诸如如何在租赁协议中履行我们的义务？版权法究竟做了什么，它保护了谁？我们将要求 ChatGPT 帮助我们制定一个从零开始，最终学会创建自己网站的学习计划。我们还将继续探索
    ChatGPT 中的语言学习能力，将错误转化为定制结构的课程。
- en: Let’s get started.
  id: totrans-648
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们开始吧。
- en: 'What will be covered in this chapter:'
  id: totrans-649
  prefs: []
  type: TYPE_NORMAL
  zh: 本章将涵盖的内容：
- en: Using ChatGPT to understand rights and obligations within a lease agreement
  id: totrans-650
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用 ChatGPT 理解租赁协议中的权利和义务
- en: Using ChatGPT to understand copyright law so that you’re not infringing on someone
    else’s rights by accident
  id: totrans-651
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用 ChatGPT 理解版权法，以免不小心侵犯他人的权利
- en: Asking ChatGPT to teach you essential programming skills so you can code your
    own website
  id: totrans-652
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 让 ChatGPT 教你必要的编程技能，以便你能编写自己的网站
- en: Taking advantage of ChatGPT’s multilingual capabilities to correct our French
    and turn mistakes into lessons
  id: totrans-653
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 利用 ChatGPT 的多语言能力来纠正我们的法语并将错误变成教训
- en: Using ChatGPT to Understand Important Legal Documents
  id: totrans-654
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用 ChatGPT 理解重要的法律文件
- en: In Chapter [6](641691_1_En_6_Chapter.xhtml), we looked at how ChatGPT could
    be used to understand Facebook’s privacy policies. What we’re going to cover here
    is slightly different. Misunderstanding how your data is being used by a social
    media platform can be dangerous, but not nearly as dangerous as misunderstanding
    a legal document.
  id: totrans-655
  prefs: []
  type: TYPE_NORMAL
  zh: 在第 [6](641691_1_En_6_Chapter.xhtml) 章中，我们探讨了如何使用 ChatGPT 来理解 Facebook 的隐私政策。这里我们要讨论的内容略有不同。误解社交媒体平台如何使用你的数据可能是危险的，但远不如误解法律文件危险。
- en: Understanding things such as a contract, government paperwork, or copyright
    law is crucial to ensuring you understand both your rights and the rights of others.
    Unfortunately, understanding these documents can be difficult for some people.
    For this reason, we’re going to look at how ChatGPT can help us better understand
    the significance of legal documents that should be handled with care.
  id: totrans-656
  prefs: []
  type: TYPE_NORMAL
  zh: 理解诸如合同、政府文件或版权法之类的事情对于确保你理解自己的权利和他人的权利至关重要。不幸的是，对于一些人来说，理解这些文件可能很困难。因此，我们将探讨
    ChatGPT 如何帮助我们更好地理解应谨慎处理的具有重要意义的法律文件。
- en: Getting Clarification on the Terms of a Lease Agreement Before You Sign
  id: totrans-657
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 在签署之前对租赁协议的条款进行澄清
- en: A lease agreement is one of the most common contracts people come across as
    adults. They’re also easy to misunderstand, which can lead to messy contract terminations.
    This is especially true when the contract isn’t reviewed by a lawyer, which is
    more and more common in the modern era.
  id: totrans-658
  prefs: []
  type: TYPE_NORMAL
  zh: 租赁协议是成年人遇到的最常见的合同之一。它们也容易误解，这可能导致合同终止混乱。这在合同没有由律师审查的情况下尤其如此，这在现代时代越来越常见。
- en: So let’s use ChatGPT to tell us more about the terms of the lease contract abbreviated
    in Listing [7-1](#PC1). For this example, we’ve taken a sample contract and given
    it to ChatGPT in the form of a PDF.PREAMBLE:This lease contains the agreements
    between You and Owner concerning Your rights and obligations and the rights and
    obligations of Owner. You and Owner have other rights and obligations which are
    set forth in government laws and regulations. You should read this Lease and all
    of its attached parts carefully. If you have any questions, or if you do not understand
    any words or statements, get clarification. Once you and Owner sign this Lease
    You and Owner will be presumed to have read it and understood it. You and Owner
    admit that all agreements between You and Owner have been written into this Lease.
    You understand that anyagreements made before or after this Lease was signed and
    not written into it will not be enforceable....Listing 7-1
  id: totrans-659
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，让我们使用 ChatGPT 来了解更多关于列表 [7-1](#PC1) 中简化的租赁合同条款。在这个例子中，我们取了一份样本合同，并以 PDF 的形式将其提供给
    ChatGPT。序言：本租赁包含您和业主之间关于您的权利和义务以及业主的权利和义务的协议。您和业主还有其他权利和义务，这些权利和义务由政府法律和法规规定。您应仔细阅读本租赁及其所有附件。如果您有任何疑问，或者如果您不理解任何单词或陈述，请寻求澄清。一旦您和业主签署本租赁，您和业主将被假定已阅读并理解了它。您和业主承认，您和业主之间所有的协议都已写入本租赁中。您理解，在签署本租赁之前或之后达成但未写入本租赁的任何协议将不可执行。……列表
    7-1
- en: Asking ChatGPT to help us understand the terms of a lease agreement (abbreviated)
  id: totrans-660
  prefs: []
  type: TYPE_NORMAL
  zh: 请 ChatGPT 帮助我们理解租赁协议的条款（简化的）
- en: Interestingly, the preamble shown in Listing [7-1](#PC1) suggests seeking clarification
    if the potential tenant doesn’t understand the terms. It also says that by agreeing,
    reading and understanding is *assumed*. This is one of the reasons why getting
    a clear interpretation of a contract is crucial. Once signed, there isn’t much
    room for negotiation of terms that have already been agreed upon simply because
    you misunderstood the first time.
  id: totrans-661
  prefs: []
  type: TYPE_NORMAL
  zh: 有趣的是，列表 [7-1](#PC1) 中显示的序言表明，如果潜在租户不理解条款，应寻求澄清。它还说，通过同意、阅读和理解，这是*假设的*。这就是为什么清楚地解释合同至关重要之一。一旦签署，对于已经同意的条款，由于第一次误解而进行谈判的空间就不大了。
- en: 'So, taking the advice given in the contract itself, you’ll see that Figure
    [7-1](#Fig1) shows what it looked like when we uploaded a PDF of our example lease
    agreement to ChatGPT.![Screenshot of a document titled "New York Apartment Lease
    Agreement." It includes a breakdown of key sections: \\n\\n1\. **General Terms**:\\n   -
    Lease Term: Duration, start, and end dates.\\n   - Rent: Monthly amount and due
    date, with details on prorated rent.\\n   - Security Deposit: Held in trust, returned
    within 60 days if no damages occur.\\n\\n2\. **Your Responsibilities**:\\n   -
    Use of the Apartment: For living purposes, following laws.\\n   - Maintenance:
    Keep in good condition; alterations need permission.\\n   - Utilities: Details
    on included utilities and setup responsibilities.\\n   - Moving Out: Remove personal
    property and restore the apartment to its original condition. \\n\\nThe document
    is designed to help understand lease agreement terms.](../images/641691_1_En_7_Chapter/641691_1_En_7_Fig1_HTML.jpg)'
  id: totrans-662
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，遵循合同中给出的建议，你会发现图 [7-1](#Fig1) 展示了我们将我们示例租赁协议的 PDF 上传到 ChatGPT 时的样子。![“纽约公寓租赁协议”文档的截图。它包括关键部分的分解：\n\n1.
    **一般条款**：\n   - 租赁期限：持续时间、开始和结束日期。\n   - 租金：月租金和到期日，以及按比例计算的租金详情。\n   - 押金：存入信托，如无损坏，60
    天内退还。\n\n2. **您的责任**：\n   - 公寓使用：用于居住目的，遵守法律。\n   - 维护：保持良好状态；改动需要许可。\n   - 公用事业：包括的公用事业详情和安装责任。\n   -
    搬出：移除个人财产，将公寓恢复到原始状态。\n\n该文件旨在帮助理解租赁协议条款。](../images/641691_1_En_7_Chapter/641691_1_En_7_Fig1_HTML.jpg)
- en: Figure 7-1
  id: totrans-663
  prefs: []
  type: TYPE_NORMAL
  zh: 图 7-1
- en: Once again, uploading a PDF to ChatGPT
  id: totrans-664
  prefs: []
  type: TYPE_NORMAL
  zh: 再次上传 PDF 到 ChatGPT
- en: In Prompt [17-1](#PC2), we ask ChatGPT to explain the terms of the agreement.I'm
    planning on renting an apartment and want to better understand what the lease
    agreement the landlord sent me entails. Help me understand what it's saying:Prompt
    17-1
  id: totrans-665
  prefs: []
  type: TYPE_NORMAL
  zh: 在提示 [17-1](#PC2) 中，我们要求 ChatGPT 解释协议条款。我计划租一套公寓，并想更好地理解房东给我的租赁协议包含的内容。请帮我理解它的意思：提示
    17-1
- en: ChatGPT explains each section of the lease agreement Just as before, ChatGPT
    has analyzed the document and given us an explanation on its contents (Response
    [7-1](#PC3)).Here’s a breakdown of the key sections of your lease agreement:**General
    Terms****1\. Lease Term:** States the duration of your lease, including the start
    and end dates.**2\. Rent:** Specifies your monthly rent and the due date (typically
    the first of the month). If you start mid-month, you'll owe prorated rent plus
    the next full month’s rent.**3\. Security Deposit:** The deposit amount is held
    in trust, potentially in an interest-bearing account. It will be returned within
    60 days of lease termination if no damages or breaches occur, minus any justifiable
    deductions.**Your Responsibilities****1\. Use of the Apartment:** You can only
    use the property for living purposes, and it must follow city and state laws.**2\.
    Maintenance:** You're responsible for keeping the apartment in good condition.
    Any alterations (e.g., painting, installing fixtures) require written permission
    from the landlord.**3\. Utilities:** Your lease will outline which utilities (if
    any) are included in the rent and your responsibilities for setting up others.**4\.
    Moving Out:** Upon lease termination, you must remove personal property and return
    the apartment to its original condition (minus normal wear and tear).**Rules and
    Restrictions****1\. Objectionable Conduct:** Actions that disturb other tenants
    or make the building unfit for living can result in lease termination.**2\. Pets:**
    Generally prohibited unless explicitly allowed. Even with permission, pets must
    adhere to building-specific rules.**3\. Noise and Public Areas:** Excessive noise
    and misuse of shared spaces can lead to penalties.**4\. Alterations:** Major changes
    to the apartment (e.g., installing appliances or water-filled furniture) require
    the landlord’s written consent.**Landlord's Rights****1\. Entry:** The landlord
    can enter the apartment with reasonable notice for inspections, repairs, or showing
    the property to prospective renters/buyers.**2\. Default and Remedies:** If you
    fail to pay rent or breach the agreement, the landlord can terminate the lease
    and seek damages.**3\. Property Damage or Casualty:** Rent reductions may apply
    if the apartment becomes unusable due to unforeseen events, but the landlord can
    terminate the lease in extreme cases.**Legal Notes****1\. Subletting/Assigning:**
    You generally cannot sublet or assign the lease without landlord approval.**2\.
    Jury Waiver:** Both parties waive the right to a jury trial for disputes related
    to the lease.**3\. Insurance and Liability:** The landlord is typically not liable
    for tenant property damage unless caused by negligence.Let me know if you'd like
    help with any specific clauses or terms!Response 7-1
  id: totrans-666
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT解释租赁协议的每一部分与之前一样，ChatGPT分析了这份文件，并就其内容给出了解释（响应[7-1](#PC3)）。以下是您租赁协议中关键部分的概述：**一般条款**1.
    **租赁期限**：说明租赁的持续时间，包括开始和结束日期。2. **租金**：指定您的月租金和到期日（通常是每月的第一天）。如果您在月中开始，您将欠按比例计算的租金以及下一个月的完整租金。3.
    **押金**：押金金额被存放在信托中，可能是在带息账户中。如果租赁期满后没有发生损害或违约，押金将在60天内退还，扣除任何合理的扣除额。**您的责任**1.
    **公寓的使用**：您只能将房产用于居住目的，并且必须遵守城市和州的法律。2. **维护**：您有责任保持公寓的良好状态。任何改动（例如，粉刷、安装固定装置）都需要房东的书面许可。3.
    **公用事业**：您的租赁协议将说明哪些公用事业（如果有的话）包含在租金中，以及您设置其他公用事业的责任。4. **搬出**：在租赁期满后，您必须移除个人财产，并将公寓恢复到原始状态（除去正常的磨损和损坏）。**规则和限制**1.
    **令人反感的行为**：干扰其他租户或使建筑不适合居住的行为可能导致租赁终止。2. **宠物**：通常禁止，除非明确允许。即使获得许可，宠物也必须遵守建筑特定的规则。3.
    **噪音和公共区域**：过度噪音和滥用共享空间可能导致处罚。4. **改动**：对公寓的重大改动（例如，安装电器或水装家具）需要房东的书面同意。**房东的权利**1.
    **进入**：房东可以在合理通知的情况下进入公寓进行检查、维修或向潜在的租户/买家展示房产。2. **违约和补救措施**：如果您未能支付租金或违反协议，房东可以终止租赁并寻求赔偿。3.
    **财产损害或意外事故**：如果由于不可预见的事件导致公寓无法使用，可能会减少租金，但在极端情况下，房东可以终止租赁。**法律注意事项**1. **转租/转让**：您通常需要房东的批准才能转租或转让租赁。2.
    **陪审团豁免**：双方放弃就与租赁相关的争议进行陪审团审判的权利。3. **保险和责任**：除非是由于疏忽造成的，否则房东通常不对租户的财产损害负责。让我知道如果您需要帮助任何特定的条款或术语！响应
    7-1
- en: ChatGPT makes each section of the lease agreement easier to understand
  id: totrans-667
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT使租赁协议的每一部分更容易理解
- en: This is a great explanation! What’s more, we can ask questions to better understand
    any given subject. Let’s try asking about the tenant’s responsibilities listed
    in the contract.I don't understand the part about the tenant's obligations on
    maintenance and repairsPrompt 7-2
  id: totrans-668
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个很好的解释！更重要的是，我们可以提问以更好地理解任何给定主题。让我们尝试询问合同中列出的承租人责任。我不理解关于维护和维修义务的部分Prompt
    7-2
- en: Asking ChatGPT to clarify
  id: totrans-669
  prefs: []
  type: TYPE_NORMAL
  zh: 向ChatGPT请求澄清
- en: Now let’s see how ChatGPT answers our question, as shown in Response [7-2](#PC5).The
    maintenance and repair obligations outlined in your lease can be summarized as
    follows:**Tenant's Obligations****1\. General Care:**   - You must take good care
    of the apartment and ensure no damage occurs beyond ordinary wear and tear.   -
    This includes keeping the apartment clean and avoiding any actions that might
    harm the property.**2\. Alterations:**   - You cannot make changes such as painting,
    wallpapering, or installing fixtures without the landlord’s written consent.   -
    If you make any alterations (even with permission), you are responsible for restoring
    the apartment to its original condition before moving out. This includes removing
    installations like shelves, murals, or other personal modifications.**3\. Repairs
    for Negligence:**   - If damage occurs due to your negligence or misuse (e.g.,
    broken appliances, plumbing issues caused by improper use), you are responsible
    for repair or replacement costs.**4\. Moving Out:**   - When leaving, you must
    remove all personal belongings and return the apartment in the same condition
    as when you moved in, except for normal wear and tear or damages from events like
    fire or accidents outside your control.**What Happens if Obligations Aren't Met:**-
    If you fail to fulfill these responsibilities, the landlord can:  - Deduct repair
    costs from your security deposit.  - Charge you for additional expenses beyond
    the security deposit if necessary.  - Potentially treat the failure as a lease
    violation, which could have legal consequences.Response 7-2
  id: totrans-670
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们来看看ChatGPT是如何回答我们的问题的，如响应[7-2](#PC5)所示。你租赁合同中概述的维护和维修义务可以总结如下：**承租人义务**1.
    **一般护理**：   - 你必须妥善照顾公寓，并确保不会发生超出正常磨损的损坏。   - 这包括保持公寓清洁，避免任何可能损害财产的行为。**2. 改变**：   -
    在没有房东书面同意的情况下，你不能进行如粉刷、贴壁纸或安装固定装置等更改。   - 如果你进行了任何更改（即使有许可），你负责在搬出前将公寓恢复到原始状态。这包括移除架子、壁画或其他个人修改。**3.
    因疏忽造成的维修**：   - 如果因你的疏忽或不当使用（例如，损坏的电器、因不当使用造成的管道问题）造成损坏，你负责维修或更换费用。**4. 搬出**：   -
    离开时，你必须移除所有个人物品，并将公寓恢复到你搬入时的状态，除非是正常的磨损或火灾、事故等不可控事件造成的损坏。**如果未履行义务会发生什么**：- 如果你未能履行这些责任，房东可以：   -
    从你的押金中扣除维修费用。   - 如果需要，可以收取超出押金的额外费用。   - 可能将此视为租赁违规行为，这可能导致法律后果。响应 7-2
- en: ChatGPT helps us understand tenant responsibilities
  id: totrans-671
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT帮助我们理解承租人责任
- en: This is a great example of how you can ask ChatGPT about any detail in a document
    and get a clear answer. Clearly, you can’t ask a question so specific to your
    circumstance with a Google search.
  id: totrans-672
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个很好的例子，展示了你可以如何向ChatGPT询问文档中的任何细节并得到一个清晰的答案。显然，你不能用谷歌搜索来提出如此具体的问题。
- en: As you can see, while it’s always advisable to consult a lawyer for legal advice
    and ChatGPT cannot replace a real lawyer, it’s never a bad idea to get clarity
    on confusing terms at any time when considering a contract or negotiation. Understanding
    your rights and the rights of others is important for ensuring fair treatment
    for everyone involved.
  id: totrans-673
  prefs: []
  type: TYPE_NORMAL
  zh: 如你所见，虽然始终建议咨询律师以获得法律建议，ChatGPT不能取代真正的律师，但在考虑合同或谈判时，任何时候澄清令人困惑的条款都不是坏事。了解你的权利和他人的权利对于确保所有相关方的公平待遇很重要。
- en: In fact, a law that is all too commonly infringed upon is copyright law. And
    unfortunately, many individuals infringe on copyright laws quite often simply
    due to misunderstanding how it works. So let’s ask ChatGPT to help us get a clearer
    understanding of how to avoid making this common mistake.
  id: totrans-674
  prefs: []
  type: TYPE_NORMAL
  zh: 事实上，一个被过度侵犯的法律是版权法。不幸的是，许多人经常侵犯版权法，仅仅是因为对它的工作方式理解不足。所以让我们让ChatGPT帮助我们更清楚地了解如何避免犯这个常见的错误。
- en: Learning How to Use Music on Social Media the Right Way
  id: totrans-675
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 正确使用社交媒体上音乐的方法
- en: In the age of social media, it’s all too common for content creators to infringe
    on copyright laws unintentionally. One of the most common infringements is using
    licensed music. This happens even more now with the popularity of apps like TikTok,
    where music is used in almost every video.
  id: totrans-676
  prefs: []
  type: TYPE_NORMAL
  zh: 在社交媒体时代，内容创作者无意中侵犯版权的情况非常普遍。最常见的侵权之一是使用受版权保护的音乐。现在，随着像TikTok这样的应用程序的流行，音乐几乎在每段视频中都会被使用。
- en: For this reason, let’s give ChatGPT an example of a copyright infringement from
    a YouTuber making a mukbang with music in the background to help us better understand
    how copyright laws work (Prompt [7-3](#PC6)).I'm a YouTuber and I'm trying to
    use Espresso by Sabrina Carpenter in the background of my mukbang, but I got flagged
    and my video was taken down. Why did this happen?Prompt 7-3
  id: totrans-677
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，让我们以一个YouTube上使用背景音乐的mukbang视频的侵权案例为例，让ChatGPT帮助我们更好地理解版权法是如何运作的（提示[7-3](#PC6)）。我是一个YouTube博主，我试图在我的mukbang中使用Sabrina
    Carpenter的《Espresso》，但我的视频被标记并下架了。为什么会发生这种情况？提示7-3
- en: ChatGPT explains how to keep yourself from committing copyright infringement
  id: totrans-678
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT解释如何避免侵犯版权
- en: In Response [7-3](#PC7), ChatGPT offers a helpful explanation of copyright law
    and how YouTube enforces compliance on its platform.Your video was likely flagged
    and removed because "Espresso" by Sabrina Carpenter is protected by copyright.
    Using copyrighted music in your content without proper authorization can lead
    to violations of YouTube's copyright policies. YouTube employs a system called
    Content ID, which automatically detects and manages copyrighted material. When
    Content ID identifies copyrighted content in a video, the copyright owner can
    choose to block the video, monetize it by running ads, or track its viewership
    statistics. In your case, the copyright owner probably opted to block the video,
    resulting in its removal.To avoid such issues in the future, consider the following
    options:**1\. Obtain Permission:** Reach out to the copyright owner or their representatives
    to request permission to use the song in your video. This may involve licensing
    fees or specific usage terms.**2\. Use Royalty-Free Music:** Utilize music from
    royalty-free libraries that allow you to use tracks without infringing on copyright.
    Platforms like YouTube offer audio libraries with free music for creators.**3\.
    Create Original Music:** If possible, produce your own music or collaborate with
    musicians to create original tracks tailored for your content.By adhering to copyright
    laws and YouTube's policies, you can prevent future content removals and maintain
    a positive standing on the platform.Response 7-3
  id: totrans-679
  prefs: []
  type: TYPE_NORMAL
  zh: 在回应[7-3](#PC7)中，ChatGPT提供了一个关于版权法以及YouTube如何在平台上执行合规性的有用解释。你的视频可能因为“Espresso”这首歌由Sabrina
    Carpenter版权保护而被标记并删除。在没有适当授权的情况下使用受版权保护的音乐可能导致违反YouTube的版权政策。YouTube使用了一个名为Content
    ID的系统，该系统可以自动检测和管理受版权保护的内容。当Content ID在视频中识别到受版权保护的内容时，版权所有者可以选择阻止视频、通过投放广告来货币化它或跟踪其观看统计数据。在你的情况下，版权所有者可能选择了阻止视频，导致其被删除。为了避免未来出现此类问题，请考虑以下选项：**1.
    获得许可：联系版权所有者或其代表，请求在视频中使用歌曲的许可。这可能涉及版税费用或特定的使用条款。**2. 使用免版税音乐：利用免版税库中的音乐，这些库允许你使用曲目而不侵犯版权。像YouTube这样的平台为创作者提供了免费音乐库。**3.
    创作原创音乐：如果可能的话，制作自己的音乐或与音乐家合作创作适合你内容原创曲目。通过遵守版权法和YouTube的政策，你可以防止未来内容被删除，并在平台上保持良好的声誉。回应7-3
- en: ChatGPT explains copyright infringement on YouTube
  id: totrans-680
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT解释YouTube上的版权侵权
- en: This explanation is very clear and easy to understand for someone that is trying
    to make a successful YouTube channel, but can’t seem to comprehend why their videos
    keep getting flagged. With ChatGPT, you can avoid accidentally losing your channel
    over a simple misunderstanding.
  id: totrans-681
  prefs: []
  type: TYPE_NORMAL
  zh: 这个解释对于试图创建成功的YouTube频道但似乎无法理解为什么他们的视频总是被标记的人来说非常清晰易懂。有了ChatGPT，你可以避免因简单的误解而意外失去频道。
- en: Now that we’ve seen how ChatGPT can help us understand legal documents, let’s
    find out how ChatGPT can teach us essential skills for the modern technology era.
    Let’s learn how to make a website.
  id: totrans-682
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经看到ChatGPT如何帮助我们理解法律文件，让我们来看看ChatGPT如何教授我们现代科技时代必备的技能。让我们学习如何制作一个网站。
- en: Learning to Code and Create Your Own Website
  id: totrans-683
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 学习编码和创建自己的网站
- en: Creating a website is often one of the first steps in establishing a secondary
    income. However, creating a website is also one of the most intimidating tasks
    for small business owners. Coding in general tends to be an intimidating skill
    for most. Online courses teaching the subject are often expensive, and encountering
    errors without knowing how to solve them is often the most frustrating aspect.
    You can see why it’s one of the main reasons people give up the endeavor.
  id: totrans-684
  prefs: []
  type: TYPE_NORMAL
  zh: 创建网站通常是建立副业的第一步之一。然而，对于小型企业主来说，创建网站也是最具挑战性的任务之一。对于大多数人来说，编码通常是一项令人生畏的技能。教授这门课程的在线课程通常很昂贵，而且遇到错误却不知道如何解决，这往往是令人最沮丧的方面。你可以理解为什么这是人们放弃这项努力的主要原因之一。
- en: However, not only can you use ChatGPT to teach you to make your own website,
    but you can even send it any errors you come across and offer a solution.
  id: totrans-685
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，你不仅可以用ChatGPT教你如何制作自己的网站，你甚至可以将你遇到的任何错误发送给它，并得到解决方案。
- en: Let’s ask ChatGPT to take us all the way from the beginning. We're going to
    instruct ChatGPT to build a curriculum for our own personal online class on building
    a website by ourselves. Check out Prompt [7-4](#PC8).I want to learn how to make
    a website, but I've never coded before. Create a lesson plan for me to learn the
    basics of programming and web development.Prompt 7-4
  id: totrans-686
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们请ChatGPT带我们从头开始。我们将指导ChatGPT为我们自己创建一个在线课程的教学大纲，课程内容是自学搭建网站。查看提示[7-4](#PC8)。我想学习如何制作网站，但我之前从未编写过代码。为我制定一个学习编程和网页开发基础的课程计划。提示7-4
- en: A simple prompt to get a detailed lesson plan!
  id: totrans-687
  prefs: []
  type: TYPE_NORMAL
  zh: 一个简单的提示就能得到详细的教学大纲！
- en: 'As you can see, our prompt is very simple, but the answer we got from ChatGPT
    in Response [7-4](#PC9) is very detailed and thorough.**Lesson Plan: Introduction
    to Programming and Web Development****Week 1: Introduction to Programming Concepts****1\.
    Day 1: Understanding Programming**   - Learn what programming is and why it’s
    useful.   - Introduction to programming languages.   - Resources: https://www.khanacademy.org/computing/computer-programming**2\.
    Day 2: Getting Started with Python**   - Install Python and set up the environment.   -
    Learn basic syntax: variables, data types, and basic operators.   - Resources:
    https://www.python.org/about/gettingstarted/**3\. Day 3: Control Structures**   -
    Learn about conditional statements (`if`, `else`, `elif`).   - Introduction to
    loops (`for`, `while`).   - Practice with simple problems.   - Resources: https://www.w3schools.com/python/python_conditions.asp**4\.
    Day 4: Functions and Modules**   - Understand functions, parameters, and return
    values.   - Introduction to modules and how to import them.   - Resources: https://realpython.com/defining-your-own-python-function/**5\.
    Day 5: Practice Day**   - Work on small projects or exercises to reinforce learning.   -
    Resources: https://www.hackerrank.com/domains/tutorials/10-days-of-python**6\.
    Day 6: Debugging and Error Handling**   - Learn about common errors and how to
    debug them.   - Introduction to try-except blocks.   - Resources: https://www.w3schools.com/python/python_try_except.asp**7\.
    Day 7: Review and Q&A**   - Review the week’s topics and clarify doubts.   - Resources:
    Join a coding community like https://stackoverflow.com/ for support.**Week 2:
    Introduction to Web Development****1\. Day 1: Understanding the Web**   - How
    websites work: Frontend vs. Backend.   - Introduction to HTML.   - Resources:
    https://developer.mozilla.org/en-US/docs/Learn/Getting_started_with_the_web/HTML_basics**2\.
    Day 2: HTML Basics**   - Structure of an HTML document.   - Common HTML tags:
    headings, paragraphs, links, images.   - Resources: https://www.w3schools.com/html/**3\.
    Day 3: Introduction to CSS**   - What is CSS and how it’s used.   - Basic syntax
    and selectors.   - Resources: https://www.w3schools.com/css/**4\. Day 4: Styling
    with CSS**   - Learn about colors, fonts, and layout.   - Introduction to the
    box model and positioning.   - Resources: https://developer.mozilla.org/en-US/docs/Learn/CSS/CSS_layout**5\.
    Day 5: Introduction to JavaScript**   - What is JavaScript and its role in web
    development.   - Basic syntax, variables, and data types.   - Resources: https://www.javascript.com/learn**6\.
    Day 6: JavaScript Basics Continued**   - Control structures, functions, and events.   -
    Manipulating the DOM (Document Object Model).   - Resources: https://developer.mozilla.org/en-US/docs/Web/JavaScript/Guide**7\.
    Day 7: Building a Simple Website**   - Combine HTML, CSS, and JavaScript to build
    a simple static website.   - Resources: https://www.freecodecamp.org/learn/responsive-web-design/responsive-web-design-projects/build-a-tribute-page**Week
    3: Advanced Web Development Concepts****1\. Day 1: Responsive Design**   - Learn
    about responsive design and media queries.   - Make your website mobile-friendly.   -
    Resources: https://developer.mozilla.org/en-US/docs/Learn/CSS/CSS_layout/Responsive_Design**2\.
    Day 2: Introduction to Version Control**   - Learn about Git and GitHub.   - Basic
    commands: clone, commit, push, pull.   - Resources: https://guides.github.com/activities/hello-world/**3\.
    Day 3: Introduction to Web Hosting**   - Learn how to deploy your website.   -
    Explore free hosting options.   - Resources: https://pages.github.com/**4\. Day
    4: Introduction to Frameworks**   - Learn about CSS frameworks like Bootstrap.   -
    Basic usage and components.   - Resources: https://getbootstrap.com/docs/5.0/getting-started/introduction/**5\.
    Day 5: Introduction to Backend Development**   - Learn about server-side programming
    with Python (using Flask).   - Set up a basic web server.   - Resources: https://flask.palletsprojects.com/en/2.0.x/tutorial/**6\.
    Day 6: Connecting Frontend and Backend**   - How to make requests to the backend.   -
    Introduction to APIs and JSON.   - Resources: https://developer.mozilla.org/en-US/docs/Learn/JavaScript/Client-side_web_APIs/Introduction**7\.
    Day 7: Final Project**   - Build a full-stack web application.   - Resources:
    Use previous lessons and online documentation for guidance.**Continuous Learning****-
    Join Coding Communities:** Participate in forums like Stack Overflow, Reddit,
    or coding Slack groups.**- Build Projects:** Continuously challenge yourself with
    new projects.**- Online Courses:** Enroll in courses from platforms like Coursera,
    Udemy, or freeCodeCamp to deepen your knowledge.**- Read Documentation:** Regularly
    read documentation and articles to stay updated with new technologies and best
    practices.By following this plan, you''ll gain a solid foundation in both programming
    and web development, enabling you to create and deploy your own websites.Response
    7-4'
  id: totrans-688
  prefs: []
  type: TYPE_NORMAL
- en: ChatGPT provides a thorough month-long lesson plan so you can learn to code
  id: totrans-689
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT提供了一个为期一个月的详细课程计划，让你可以学习编程
- en: This answer from ChatGPT not only gives you a guide that will last you an entire
    month of learning, it also gives you various free sources to learn from to follow
    the lesson plan. It even gives you a guide on where to go from there for further
    learning.
  id: totrans-690
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT的回答不仅为你提供了一个可以持续整个月学习的指南，还提供了各种免费资源供你学习，以遵循课程计划。它甚至为你提供了一个关于如何进一步学习的指南。
- en: Let’s look at other ways that ChatGPT can help us learn essential skills. Let’s
    use ChatGPT to help us learn French by improving upon our mistakes.
  id: totrans-691
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看ChatGPT可以帮助我们学习哪些其他基本技能。让我们使用ChatGPT通过改进我们的错误来帮助我们学习法语。
- en: Using ChatGPT As a Multilingual Tutor by Creating Lessons from Your Mistakes
  id: totrans-692
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 通过从错误中创建课程，使用ChatGPT作为多语言导师
- en: We’ve just seen that ChatGPT can create a lesson plan including helpful resources
    to help you follow the plan to completion. We could ask for a similar plan for
    learning a language by creating a similar prompt as we did for the previous examples.
  id: totrans-693
  prefs: []
  type: TYPE_NORMAL
  zh: 我们刚刚看到ChatGPT可以创建一个包含有用资源的课程计划，帮助你完成计划。我们可以通过创建与之前示例相似的提示来要求一个类似的学习语言计划。
- en: However, assuming you’re already on the journey to learning a language, you’ll
    get to a point where you’ll realize that a key aspect of learning is getting feedback.
    After all, you can learn as much vocabulary as you’d like, but if you’re not using
    these words in sentences properly, you’re not making much progress. So, let’s
    use ChatGPT to help us with corrections when we’ve made a mistake.
  id: totrans-694
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，假设你已经开始了学习一门语言的道路，你会到达一个意识到学习关键方面是获取反馈的阶段。毕竟，你可以学习你想要的任何词汇，但如果你不能正确地在句子中使用这些单词，你进步不大。所以，让我们使用ChatGPT在我们犯错时帮助我们进行纠正。
- en: Write a Diary Entry in Your Target Language, Then Get Correction
  id: totrans-695
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 用你的目标语言写日记，然后获取纠正
- en: This is going to be a fun exercise. If you didn’t know, for people learning
    a language, it’s often a good idea to practice writing diary entries in the target
    language. It allows one to practice words they use often but don’t practice in
    their typical learning sessions.
  id: totrans-696
  prefs: []
  type: TYPE_NORMAL
  zh: 这将是一个有趣的练习。如果你不知道，对于学习语言的人来说，练习用目标语言写日记通常是个好主意。这允许一个人练习他们经常使用但在典型学习课程中不练习的单词。
- en: So, let’s give ChatGPT a diary entry in French, giving it our best shot. Then
    we’ll let ChatGPT correct what we’ve written. Take a look at Prompt [7-5](#PC10).I'm
    learning French and am writing diary entries in French to practice. Please correct
    it for me and explain the corrections in English:###Aujourd’hui je allé dans un
    reunion avec mon chef et l’équipe de marketing, ensuite allé à déjeuner avec mes
    amis. J’avais beaucoup de amusé et j’espere nous avons le chance de sortir plus
    souvent. Apres travail, je suis allé shopping pour chaussures, mais ne pouvais
    pas trouve ma taille dans le paire que j’ai aimé le plus!Prompt 7-5
  id: totrans-697
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，让我们给ChatGPT一个用法语的日记条目，尽我们所能。然后我们将让ChatGPT纠正我们所写的。看看提示[7-5](#PC10)。我在学习法语，并用法语写日记来练习。请为我纠正并解释这些更正的英文：###今天我去参加了一个与我的上司和营销团队会议，然后和朋友们去吃午饭。我玩得很开心，希望我们能有更多机会一起出去。工作后，我去商店买鞋，但在我最喜欢的鞋子里找不到我的尺码！Prompt
    7-5
- en: 'Asking ChatGPT to correct our French Now let''s see how ChatGPT answered in
    Response [7-5](#PC11).Sure! Here are the corrections and explanations for your
    diary entry in French:**Corrected Diary Entry:**Aujourd''hui, je suis allé à une
    réunion avec mon chef et l’équipe de marketing, puis je suis allé déjeuner avec
    mes amis. Je me suis beaucoup amusé et j’espère que nous aurons la chance de sortir
    plus souvent. Après le travail, je suis allé faire du shopping pour des chaussures,
    mais je n''ai pas pu trouver ma taille dans la paire que j’aimais le plus !**Corrections
    and Explanations:**1\. **"Aujourd''hui je allé"** to **"Aujourd''hui, je suis
    allé"**:   **- Correction:** Use "suis" for the passé composé of "aller" (je suis
    allé).   - **Explanation**: "Allé" is a past participle that requires the auxiliary
    verb "être" in the passé composé.2\. **"dans un reunion"** to **"à une réunion"**:   **-
    Correction**: Change "un" to "une" because "réunion" is feminine.   **- Explanation**:
    The correct preposition is "à" (to a meeting), and "une réunion" is the correct
    gender.3\. **"ensuite allé à déjeuner"** to **"puis je suis allé déjeuner"**:   -
    **Correction**: "ensuite" to "puis" and add "je suis" before "allé".   - **Explanation**:
    "Puis" is a better transition word here, and "suis allé" is necessary for correct
    grammar.4\. **"J''avais beaucoup de amusé"** to **"Je me suis beaucoup amusé"**:   -
    **Correction**: Use the reflexive form "me suis amusé".   - **Explanation**: The
    verb "amuser" is reflexive when talking about enjoying oneself.5\. **"j''espere
    nous avons le chance"** to **"j''espère que nous aurons la chance"**:   - **Correction**:
    Add "que" and change verb tenses to "aurons".   - **Explanation**: "Espérer que"
    requires a subjunctive structure with "aurons" (we will have).6\. **"Apres travail"**
    to **"Après le travail"**:   - **Correction**: Add "le" before "travail".   -
    **Explanation**: The definite article "le" is needed.7\. **"je suis allé shopping"**
    to **"je suis allé faire du shopping"**:   - **Correction**: Add "faire du" before
    "shopping".   - **Explanation**: The correct expression is "faire du shopping".8\.
    **"mais ne pouvais pas trouve"** to **"mais je n''ai pas pu trouver"**:   - **Correction**:
    Change to "je n''ai pas pu trouver".   - **Explanation**: "N''ai pas pu" is the
    correct passé composé form of "ne pas pouvoir" (could not).9\. **"ma taille dans
    le paire que j''ai aimé le plus!"** to **"ma taille dans la paire que j''aimais
    le plus !"**:   - **Correction**: Change "le" to "la", and "j’ai aimé" to "j’aimais".   -
    **Explanation**: "Paire" is feminine, so it requires "la", and "j’aimais" (imperfect
    tense) is better for expressing a general preference.These corrections will make
    your diary entry grammatically correct and more natural in French. Keep practicing,
    and you''ll keep improving!Response 7-5'
  id: totrans-698
  prefs: []
  type: TYPE_NORMAL
  zh: 让 ChatGPT 校正我们的法语 现在让我们看看 ChatGPT 在响应 [7-5](#PC11) 中的回答。当然！以下是您法语日记条目的更正和解释：**更正后的日记条目：**Aujourd'hui,
    je suis allé à une réunion avec mon chef et l'équipe de marketing, puis je suis
    allé déjeuner avec mes amis. Je me suis beaucoup amusé et j’espère que nous aurons
    la chance de sortir plus souvent. Après le travail, je suis allé faire du shopping
    pour des chaussures, mais je n'ai pas pu trouver ma taille dans la paire que j’aimais
    le plus !**更正和解释：1. **"Aujourd'hui je allé"** to **"Aujourd'hui, je suis allé"**:   **-
    更正：使用 "suis" 作为 "aller" 的复合过去时态（je suis allé）。   - **解释**："Allé" 是一个过去分词，需要使用助动词
    "être" 在复合过去时态中。2. **"dans un reunion"** to **"à une réunion"**:   **- 更正：将 "un"
    改为 "une"，因为 "réunion" 是阴性的。   - **解释**：正确的介词是 "à"（到会议），而 "une réunion" 是正确的性别。3.
    **"ensuite allé à déjeuner"** to **"puis je suis allé déjeuner"**:   - **更正**："ensuite"
    改为 "puis"，并在 "allé" 前面添加 "je suis"。   - **解释**："Puis" 是这里更好的过渡词，而 "suis allé"
    对于正确的语法是必要的。4. **"J'avais beaucoup de amusé"** to **"Je me suis beaucoup amusé"**:   -
    **更正**：使用反身形式 "me suis amusé"。   - **解释**："Amuser" 在谈论享受自己时是反身的。5. **"j'espere
    nous avons le chance"** to **"j'espère que nous aurons la chance"**:   - **更正**：添加
    "que" 并改变动词时态为 "aurons"。   - **解释**："Espérer que" 需要一个虚拟结构，使用 "aurons"（我们将有）。6.
    **"Apres travail"** to **"Après le travail"**:   - **更正**：在 "travail" 前面添加 "le"。   -
    **解释**：需要定冠词 "le"。7. **"je suis allé shopping"** to **"je suis allé faire du shopping"**:   -
    **更正**：在 "shopping" 前面添加 "faire du"。   - **解释**：正确的表达是 "faire du shopping"。8.
    **"mais ne pouvais pas trouve"** to **"mais je n'ai pas pu trouver"**:   - **更正**：改为
    "je n'ai pas pu trouver"。   - **解释**："N'ai pas pu" 是 "ne pas pouvoir" 的正确复合过去时态形式（不能）。9.
    **"ma taille dans le paire que j'ai aimé le plus!"** to **"ma taille dans la paire
    que j'aimais le plus !"**:   - **更正**：将 "le" 改为 "la"，并将 "j’ai aimé" 改为 "j’aimais"。   -
    **解释**："Paire" 是阴性的，所以需要 "la"，而 "j’aimais"（不定式过去时）对于表达一般的偏好更好。这些更正将使您的日记条目在语法上正确，并且法语表达更自然。继续练习，您会不断进步！响应
    7-5
- en: ChatGPT points out the mistakes in our French
  id: totrans-699
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT 指出我们法语中的错误
- en: This is an amazing explanation that can help us improve our French, for sure.
    But we can actually go even further.
  id: totrans-700
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个令人惊叹的解释，肯定能帮助我们提高法语水平。但实际上，我们可以更进一步。
- en: Get the Most Out of Your Mistakes by Turning Them into a Lesson
  id: totrans-701
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 通过将错误转化为教训，最大限度地发挥你的错误
- en: Let’s continue the conversation with ChatGPT so we can make the most out of
    learning from our diary entry (Prompt [7-6](#PC12)).Turn these corrections into
    a lesson for mePrompt 7-6
  id: totrans-702
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们继续与ChatGPT的对话，以便我们能从日记条目（提示[7-6](#PC12)）中学习到最多。将这些更正变成我的教训提示 7-6
- en: 'Asking ChatGPT to help us learn from our mistakes Now let’s see how ChatGPT
    responded, as shown in Response [7-6](#PC13).**French Diary Entry Corrections
    Lesson****1\. Use of Passé Composé with "Être"****Original:** Aujourd’hui je allé**Corrected:**
    Aujourd''hui, je suis allé**Rule:** For verbs of motion like "aller" (to go),
    the auxiliary verb "être" is used in the passé composé.**- Example:** Je suis
    allé (I went), Tu es arrivé (You arrived)**2\. Gender Agreement****Original:**
    dans un reunion**Corrected:** à une réunion**Rule:** "Réunion" is a feminine noun,
    so it takes the feminine article "une". The correct preposition is "à" when talking
    about attending a meeting.**- Example:** à une réunion (to a meeting), dans une
    classe (in a class)**3\. Transition Words****Original:** ensuite allé à déjeuner**Corrected:**
    puis je suis allé déjeuner**Rule:** Use "puis" as a transition word, and ensure
    the correct use of "je suis allé" for the past action.**- Example:** Puis je suis
    allé (Then I went), Ensuite, j''ai fait (Then, I did)**4\. Reflexive Verbs****Original:**
    J’avais beaucoup de amusé**Corrected:** Je me suis beaucoup amusé**Rule:** When
    talking about enjoying oneself, use the reflexive form of "amuser" in the passé
    composé.**- Example:** Je me suis amusé (I had fun), Nous nous sommes bien amusés
    (We had a lot of fun)**5\. Expression of Hope and Future Events****Original:**
    j’espere nous avons le chance**Corrected:** j’espère que nous aurons la chance**Rule:**
    Use "j’espère que" followed by the future tense "nous aurons" to express hope
    about future events.**- Example:** J’espère que nous aurons (I hope we will have),
    J’espère que tu viendras (I hope you will come)**6\. Use of Articles****Original:**
    Apres travail**Corrected:** Après le travail**Rule:** Use the definite article
    "le" with "travail" (work).**- Example:** Après le travail (After work), Avant
    la réunion (Before the meeting)**7\. Expressions with "Faire"****Original:** je
    suis allé shopping**Corrected:** je suis allé faire du shopping**Rule:** Use "faire
    du" with "shopping" to express going shopping.**- Example:** faire du shopping
    (to go shopping), faire du sport (to play sports)**8\. Negative Past Actions****Original:**
    mais ne pouvais pas trouve**Corrected:** mais je n''ai pas pu trouver**Rule:**
    Use "je n''ai pas pu" for "I could not" in the passé composé.**- Example:** Je
    n''ai pas pu trouver (I could not find), Je n''ai pas pu venir (I could not come)**9\.
    Imperfect vs. Passé Composé****Original:** ma taille dans le paire que j’ai aimé
    le plus!**Corrected:** ma taille dans la paire que j’aimais le plus !**Rule:**
    Use the imperfect tense "j’aimais" for ongoing or repeated actions in the past,
    and ensure gender agreement with "la paire".**- Example:** J’aimais (I used to
    like), Je préférais (I preferred)**Practice Examples****1\. Using "aller" in passé
    composé:**   - Correct: "Hier, je suis allé au cinéma." (Yesterday, I went to
    the cinema.)**2\. Gender agreement with nouns:**   - Correct: "J’ai une voiture."
    (I have a car.)**3\. Transition words:**   - Correct: "Puis, nous avons mangé."
    (Then, we ate.)**4\. Reflexive verbs:**   - Correct: "Elle s''est bien amusée."
    (She had a lot of fun.)**5\. Expression of hope:**   - Correct: "J’espère que
    tu réussiras." (I hope you will succeed.)**6\. Use of articles:**   - Correct:
    "Après le dîner, nous avons regardé un film." (After dinner, we watched a movie.)**7\.
    Expressions with "faire":**   - Correct: "Nous allons faire du vélo." (We are
    going to ride bikes.)**8\. Negative past actions:**   - Correct: "Je n''ai pas
    pu venir à la fête." (I could not come to the party.)**9\. Imperfect vs. passé
    composé:**   - Correct: "Quand j''étais jeune, j''aimais jouer au football." (When
    I was young, I liked playing football.)By understanding and applying these rules,
    you''ll improve your French writing skills and gain more confidence in your use
    of the language. Keep practicing!Response 7-6'
  id: totrans-703
  prefs: []
  type: TYPE_NORMAL
  zh: 让 ChatGPT 帮助我们吸取教训 现在，让我们看看 ChatGPT 是如何回应的，如回复 [7-6](#PC13) 所示。**法语日记纠错课****1.
    复合过去时中 "Être" 的使用****原文：** Aujourd’hui je allé**更正：** Aujourd'hui, je suis allé**规则：**
    对于像 "aller"（去）这样的运动动词，复合过去时中要使用助动词 "être"。**- 示例：** Je suis allé（我去了），Tu es arrivé（你到了）**2.
    性数配合****原文：** dans un reunion**更正：** à une réunion**规则：** "Réunion" 是阴性名词，因此使用阴性冠词
    "une"。谈论参加会议时，正确的介词是 "à"。**- 示例：** à une réunion（去开会），dans une classe（在教室里）**3.
    过渡词****原文：** ensuite allé à déjeuner**更正：** puis je suis allé déjeuner**规则：**
    使用 "puis" 作为过渡词，并确保正确使用 "je suis allé" 表示过去的动作。**- 示例：** Puis je suis allé（然后我去了），Ensuite,
    j'ai fait（然后，我做了）**4. 代动词****原文：** J’avais beaucoup de amusé**更正：** Je me suis
    beaucoup amusé**规则：** 谈论玩得开心时，在复合过去时中使用 "amuser" 的代动词形式。**- 示例：** Je me suis amusé（我玩得很开心），Nous
    nous sommes bien amusés（我们玩得很开心）**5. 表达希望和未来事件****原文：** j’espere nous avons le
    chance**更正：** j’espère que nous aurons la chance**规则：** 使用 "j’espère que" 后接将来时
    "nous aurons" 来表达对未来事件的希望。**- 示例：** J’espère que nous aurons（我希望我们将会有），J’espère
    que tu viendras（我希望你会来）**6. 冠词的使用****原文：** Apres travail**更正：** Après le travail**规则：**
    "travail"（工作）前使用定冠词 "le"。**- 示例：** Après le travail（下班后），Avant la réunion（开会前）**7.
    与 "Faire" 相关的表达****原文：** je suis allé shopping**更正：** je suis allé faire du shopping**规则：**
    用 "faire du" 加 "shopping" 来表示去购物。**- 示例：** faire du shopping（去购物），faire du sport（做运动）**8.
    否定的过去动作****原文：** mais ne pouvais pas trouve**更正：** mais je n'ai pas pu trouver**规则：**
    在复合过去时中用 "je n'ai pas pu" 表示"我不能"。**- 示例：** Je n'ai pas pu trouver（我没能找到），Je n'ai
    pas pu venir（我没能来）**9. 未完成过去时与复合过去时的对比****原文：** ma taille dans le paire que j’ai
    aimé le plus!**更正：** ma taille dans la paire que j’aimais le plus !**规则：** 对于过去持续或重复的动作，使用未完成过去时
    "j’aimais"，并确保与 "la paire" 的性数配合。**- 示例：** J’aimais（我过去喜欢），Je préférais（我过去更喜欢）**练习示例****1.
    在复合过去时中使用 "aller"：**   - 正确："Hier, je suis allé au cinéma."（昨天，我去看电影了。）**2. 名词的性数配合：**   -
    正确："J’ai une voiture."（我有一辆车。）**3. 过渡词：**   - 正确："Puis, nous avons mangé."（然后，我们吃了饭。）**4.
    代动词：**   - 正确："Elle s'est bien amusée."（她玩得很开心。）**5. 表达希望：**   - 正确："J’espère
    que tu réussiras."（我希望你会成功。）**6. 冠词的使用：**   - 正确："Après le dîner, nous avons regardé
    un film."（晚餐后，我们看了一部电影。）**7. 与 "faire" 相关的表达：**   - 正确："Nous allons faire du vélo."（我们要去骑自行车。）**8.
    否定的过去动作：**   - 正确："Je n'ai pas pu venir à la fête."（我没能来参加派对。）**9. 未完成过去时与复合过去时的对比：**   -
    正确："Quand j'étais jeune, j'aimais jouer au football."（我年轻时，喜欢踢足球。）通过理解和应用这些规则，你将提高法语写作能力，并在使用这门语言时更有信心。继续练习！回复
    7-6
- en: ChatGPT turns our mistakes into an opportunity to improve!
  id: totrans-704
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT 将我们的错误转化为改进的机会！
- en: In this incredible response, we’re able to really comprehend the mistakes we
    made before and get a deeper understanding of the French language as a whole.
    But let’s go even further.
  id: totrans-705
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个令人难以置信的响应中，我们能够真正理解我们之前犯的错误，并对法语语言有一个更深入的理解。但让我们更进一步。
- en: ChatGPT Quizzes Us on Our Custom-Made Lesson
  id: totrans-706
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: ChatGPT 用我们的定制课程测验我们
- en: Let’s cement the concepts we’ve learned even more and make sure we understand.
    We can have ChatGPT turn our lesson into a quiz! Take a look at Prompt [7-7](#PC14).Create
    a quiz for me, but don't give me the answers.Prompt 7-7
  id: totrans-707
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们进一步巩固我们学到的概念，并确保我们理解了。我们可以让 ChatGPT 将我们的课程转换成测验！看看提示 [7-7](#PC14)。为我创建一个测验，但不要给我答案。Prompt
    7-7
- en: 'Asking to get quizzed In Response [7-7](#PC15), we can see that the quiz ChatGPT
    offered us tests us specifically on the areas we need to improve on.Sure! Here''s
    a quiz based on the lesson above:**French Diary Entry Corrections Quiz****Part
    1: Choose the Correct Form**1\. Which is the correct past tense form for "I went"?   -
    a) J’ai allé   - b) Je suis allé   - c) J’ai allée2\. What is the correct article
    for "réunion"?   - a) un   - b) une   - c) des3\. Which transition word is better
    to use after "ensuite"?   - a) alors   - b) mais   - c) puis**Part 2: Correct
    the Sentence**4\. Correct the following sentence: "Aujourd''hui je allé à un réunion."5\.
    Correct the following sentence: "J’avais beaucoup de amusé."6\. Correct the following
    sentence: "Apres travail, je suis allé shopping."**Part 3: Fill in the Blanks**7\.
    Complete the sentence: "J’espère que nous ________ la chance de sortir plus souvent."   -
    (a) avons   - (b) aurons   - (c) avions8\. Complete the sentence: "Je n''ai pas
    pu ________ ma taille."   - (a) trouve   - (b) trouvé   - (c) trouvais9\. Complete
    the sentence: "Après ________ travail, je suis allé faire du shopping."   - (a)
    le   - (b) la   - (c) les**Part 4: Imperfect vs. Passé Composé**10\. Which form
    is correct for a repeated past action?    - a) J’aimais    - b) J’ai aimé11\.
    Which form is correct for a one-time completed action in the past?    - a) Nous
    faisions    - b) Nous avons fait**Part 5: Sentence Transformation**12\. Transform
    the sentence to use the correct reflexive verb form: "Elle amusé beaucoup."13\.
    Transform the sentence to correct the gender agreement: "Je n''ai pas pu trouver
    ma taille dans le paire que j’ai aimé le plus!"Good luck with your quiz! Let me
    know if you need any help with the answers.Response 7-7'
  id: totrans-708
  prefs: []
  type: TYPE_NORMAL
  zh: 在响应中请求进行测验 [7-7](#PC15)，我们可以看到 ChatGPT 提供的测验专门针对我们需要改进的领域进行测试。当然！这里有一个基于上述课程的测验：**法语日记修正测验****第一部分：选择正确的形式**1.
    “我去了”的正确过去时形式是？   - a) J’ai allé   - b) Je suis allé   - c) J’ai allée2. “réunion”的正确冠词是？   -
    a) un   - b) une   - c) des3. 在“ensuite”之后使用哪个过渡词更好？   - a) alors   - b) mais   -
    c) puis**第二部分：修正句子**4. 修正以下句子：“Aujourd'hui je allé à un réunion.”5. 修正以下句子：“J’avais
    beaucoup de amusé.”6. 修正以下句子：“Apres travail, je suis allé shopping.”**第三部分：填空**7.
    完成句子：“J’espère que nous ________ la chance de sortir plus souvent.”   - (a) avons   -
    (b) aurons   - (c) avions8. 完成句子：“Je n'ai pas pu ________ ma taille.”   - (a)
    trouve   - (b) trouvé   - (c) trouvais9. 完成句子：“Après ________ travail, je suis
    allé faire du shopping.”   - (a) le   - (b) la   - (c) les**第四部分：未完成时与过去复合时**10.
    重复过去动作的正确形式是？    - a) J’aimais    - b) J’ai aimé11. 过去一次性完成的动作的正确形式是？    - a)
    Nous faisions    - b) Nous avons fait**第五部分：句子转换**12. 将句子转换为使用正确的反身动词形式：“Elle
    amusé beaucoup.”13. 将句子转换为修正性别一致：“Je n'ai pas pu trouver ma taille dans le paire
    que j’ai aimé le plus!”祝你在测验中好运！如果你需要任何帮助，请告诉我.Response 7-7
- en: Getting a custom-made French quiz from ChatGPT
  id: totrans-709
  prefs: []
  type: TYPE_NORMAL
  zh: 从 ChatGPT 获得定制的法语测验
- en: 'This is absolutely fantastic and, to be honest, really fun. Assuming, in this
    scenario, you copy the quiz from ChatGPT and answer on your own, let’s finish
    up by getting the quiz answers (Response [7-8](#PC16)).Great! Here are the answers
    to the quiz:**Part 1: Choose the Correct Form**1\. Which is the correct past tense
    form for "I went"?   - **b) Je suis allé**2\. What is the correct article for
    "réunion"?   - **b) une**3\. Which transition word is better to use after "ensuite"?   -
    **c) puis****Part 2: Correct the Sentence**4\. Correct the following sentence:
    "Aujourd''hui je allé à un réunion."   **- Aujourd''hui, je suis allé à une réunion.**5\.
    Correct the following sentence: "J’avais beaucoup de amusé."   **- Je me suis
    beaucoup amusé.**6\. Correct the following sentence: "Apres travail, je suis allé
    shopping."   **- Après le travail, je suis allé faire du shopping.****Part 3:
    Fill in the Blanks**7\. Complete the sentence: "J’espère que nous ________ la
    chance de sortir plus souvent."   **- (b) aurons**8\. Complete the sentence: "Je
    n''ai pas pu ________ ma taille."   **- (b) trouvé**9\. Complete the sentence:
    "Après ________ travail, je suis allé faire du shopping."   **- (a) le****Part
    4: Imperfect vs. Passé Composé**10\. Which form is correct for a repeated past
    action?    **- a) J''aimais**11\. Which form is correct for a one-time completed
    action in the past?    **- b) Nous avons fait****Part 5: Sentence Transformation**12\.
    Transform the sentence to use the correct reflexive verb form: "Elle amusé beaucoup."    **-
    Elle s''est beaucoup amusée.**13\. Transform the sentence to correct the gender
    agreement: "Je n''ai pas pu trouver ma taille dans le paire que j’ai aimé le plus!"    **-
    Je n''ai pas pu trouver ma taille dans la paire que j''aimais le plus !**I hope
    this helps! Let me know if you have any more questions.Response 7-8'
  id: totrans-710
  prefs: []
  type: TYPE_NORMAL
  zh: 这绝对太棒了，坦白说，真的很有趣。假设在这个场景中，您从ChatGPT复制测验并自己回答，让我们通过获取测验答案（响应[7-8](#PC16)）来结束。太好了！以下是测验的答案：**第一部分：选择正确的形式**1.
    “我去过”的正确过去时形式是什么？   - **b) Je suis allé**2. “réunion”的正确冠词是什么？   - **b) une**3.
    在“ensuite”之后使用哪个过渡词更好？   - **c) puis****第二部分：改正句子**4. 改正以下句子：“Aujourd'hui je allé
    à un réunion.”   **- Aujourd'hui, je suis allé à une réunion.**5. 改正以下句子：“J’avais
    beaucoup de amusé.”   **- Je me suis beaucoup amusé.**6. 改正以下句子：“Apres travail,
    je suis allé shopping.”   **- Après le travail, je suis allé faire du shopping.****第三部分：填空**7.
    完成句子：“J’espère que nous ________ la chance de sortir plus souvent.”   **- (b)
    aurons**8. 完成句子：“Je n'ai pas pu ________ ma taille.”   **- (b) trouvé**9. 完成句子：“Après
    ________ travail, je suis allé faire du shopping.”   **- (a) le****第四部分：未完成时与过去复合时**10.
    重复过去动作的正确形式是什么？    **- a) J'aimais**11. 过去一次性完成的动作的正确形式是什么？    **- b) Nous avons
    fait****第五部分：句子转换**12. 将句子转换为使用正确的反身动词形式：“Elle amusé beaucoup.”    **- Elle s'est
    beaucoup amusée.**13. 将句子转换为修正性别一致：“Je n'ai pas pu trouver ma taille dans le paire
    que j’ai aimé le plus!”    **- Je n'ai pas pu trouver ma taille dans la paire
    que j'aimais le plus !**我希望这能帮到您！如果您还有任何问题，请告诉我.Response 7-8
- en: ChatGPT provides the answers to the quiz questions it provided earlier
  id: totrans-711
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT提供了它之前提供的测验问题的答案
- en: This is a great way to get feedback when you’re trying to learn a language.
    You get to actually reinforce the areas you’re having trouble with, which is an
    invaluable asset to have when trying to learn something new.
  id: totrans-712
  prefs: []
  type: TYPE_NORMAL
  zh: 这是在尝试学习语言时获得反馈的好方法。您可以真正地加强您有困难的地方，这在尝试学习新事物时是一个无价的资产。
- en: Conclusion
  id: totrans-713
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: In this chapter, we showed you how ChatGPT can be used to teach a variety of
    subjects just by asking it to do so! We even had a fun scenario where we turned
    a diary entry in French filled with errors into a lesson and then from a lesson
    into a quiz. In the next chapter, we’re going to be looking at how we can use
    ChatGPT as a personal assistant.
  id: totrans-714
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们向您展示了如何仅通过请求ChatGPT这样做，就可以用它来教授各种科目！我们甚至有一个有趣的场景，我们将一篇充满错误的法语日记变成了一堂课，然后从一堂课变成了一次测验。在下一章中，我们将探讨如何将ChatGPT用作个人助理。
- en: © The Author(s), under exclusive license to APress Media, LLC, part of Springer
    Nature 2025L. EvelynMaking ChatGPT Work for You[https://doi.org/10.1007/979-8-8688-1445-7_8](https://doi.org/10.1007/979-8-8688-1445-7_8)
  id: totrans-715
  prefs: []
  type: TYPE_NORMAL
  zh: © 作者（们），独家授权给APress Media, LLC，Springer Nature的一部分，2025L. EvelynMaking ChatGPT
    Work for You[https://doi.org/10.1007/979-8-8688-1445-7_8](https://doi.org/10.1007/979-8-8688-1445-7_8)
- en: 8. Prompts to Use ChatGPT As a Personal Assistant
  id: totrans-716
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 8. 使用ChatGPT作为个人助理的提示
- en: Lydia Evelyn^([1](#Aff2)  )(1)Catalonia, Spain
  id: totrans-717
  prefs: []
  type: TYPE_NORMAL
  zh: Lydia Evelyn^([1](#Aff2)  )(1)加泰罗尼亚，西班牙
- en: Up until now, we’ve looked at a lot of situations where ChatGPT can be used
    for both professional tasks and day-to-day efficiency. But in this chapter, we’re
    going to have a little fun. We’re going to be looking at how ChatGPT can be used
    like a personal assistant. You can ask for suggestions when you need help, get
    recommendations based on your personal tastes, and even teach ChatGPT what your
    interests are and get ideas for trips, vacations, and more. Let’s dive right in.
  id: totrans-718
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，我们已经看了很多ChatGPT可以用于专业任务和日常效率的情况。但在这个章节，我们将有一些乐趣。我们将探讨如何将ChatGPT用作个人助理。当你需要帮助时，可以寻求建议，根据你的个人品味获得推荐，甚至教ChatGPT你的兴趣，并获得旅行、度假等方面的想法。让我们直接进入正题。
- en: 'What will be covered in this chapter:'
  id: totrans-719
  prefs: []
  type: TYPE_NORMAL
  zh: 本章将涵盖哪些内容：
- en: You’re traveling internationally for the first time, and you’re a little nervous.
    Using ChatGPT as your second brain to help plan for a trip to Paris (Oo la la!).
  id: totrans-720
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你第一次出国旅行，有点紧张。使用ChatGPT作为你的第二大脑，帮助你计划前往巴黎的旅行（哦啦啦！）。
- en: Having trouble signing in? Using ChatGPT to learn how to clear your cookies
    to solve login problems.
  id: totrans-721
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 登录有困难？使用ChatGPT学习如何清除cookies来解决登录问题。
- en: Using ChatGPT to help you find new hobbies when you’re feeling burnt out and
    uninspired.
  id: totrans-722
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当你感到疲惫和缺乏灵感时，使用ChatGPT帮助你寻找新的爱好。
- en: The dishwasher is broken! What do I do? Using ChatGPT in a pinch if you don’t
    know why your home appliance isn’t working.
  id: totrans-723
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 洗碗机坏了！我该怎么办？如果你不知道家里的电器为什么坏了，可以紧急使用ChatGPT。
- en: You want to find new foreign films, but… you don’t know how to spell the titles.
    Using ChatGPT to find foreign films that suit your tastes.
  id: totrans-724
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你想找到新的外国电影，但……你不知道如何拼写标题。使用ChatGPT找到适合你口味的外国电影。
- en: Focusing on the Fun of International Travel by Letting ChatGPT Handle the Itinerary
  id: totrans-725
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 通过让ChatGPT处理行程，专注于国际旅行的乐趣
- en: Whether you’re traveling for business or pleasure, you always want to get the
    most out of your trip. This is one of those areas where your first instinct might
    be to use a Google search, but in reality, ChatGPT is much better suited to act
    as an assistant and give you customized suggestions. Google can’t take into account
    where you’re going in conjunction with, for example, what holidays are around
    your travel dates or what events are being held in time for your visit. Did you
    know that if you travel to Europe, most stores and restaurants close in the middle
    of the day? If you were planning a trip on your own and found a restaurant from
    a simple Google search, you may miss the fact that the restaurant closes at 3pm
    and won’t open again until 8pm!
  id: totrans-726
  prefs: []
  type: TYPE_NORMAL
  zh: 无论你是出差还是为了娱乐，你总是希望充分利用你的旅行。这是那些你可能本能地想使用谷歌搜索的区域之一，但事实上，ChatGPT更适合作为助手，为你提供定制化的建议。谷歌无法考虑到你将去哪里，例如，结合你旅行的日期周围的假期或你访问期间举行的活动。你知道如果你去欧洲，大多数商店和餐馆会在中午关闭吗？如果你自己计划旅行，并从简单的谷歌搜索中找到一个餐馆，你可能会错过餐馆下午3点关闭，直到晚上8点才重新开门的事实！
- en: So let’s give ChatGPT our travel plans—where we’re going, when we’re going,
    and what we’re interested in doing when we get there. Then let’s see what suggestions
    ChatGPT provides to get the most value out of our travel plans. You can see how
    we accomplished this in Prompt [8-1](#PC1).I'm flying to Paris from Chicago on
    November 5th for work. I'm staying for five days. I've never been to Paris and
    I want to explore the city while I'm here and make the most of my visit. I love
    visiting new restaurants and I'm very interested in the arts. I'm here with my
    wife and we like to go biking. We're also looking for somewhere to go to celebrate
    our anniversary while we're here. Give me an itinerary for what we can do in Paris
    while we're here, excluding work hours where I'll be going to conferences between
    10am and 3pm.Prompt 8-1
  id: totrans-727
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，让我们向ChatGPT提供我们的旅行计划——我们去哪里，什么时候去，以及到达那里后我们感兴趣做什么。然后让我们看看ChatGPT提供的建议，以充分利用我们的旅行计划。你可以在提示[8-1](#PC1)中看到我们是如何做到这一点的。我将于11月5日从芝加哥飞往巴黎出差。我将停留五天。我从未去过巴黎，我想在这里探索这座城市，充分利用我的访问。我喜欢参观新餐馆，我对艺术非常感兴趣。我和妻子一起在这里，我们喜欢骑自行车。我们还在寻找一个地方庆祝我们的周年纪念日。请给我一个在我们这里可以做的巴黎行程，不包括我将在上午10点到下午3点之间参加会议的工作时间。提示8-1
- en: 'Giving ChatGPT our travel plans As you can see, we’re giving ChatGPT all of
    the details surrounding our trip to Paris in November. We mention our hobbies,
    as well as the intent to celebrate an anniversary during the trip. We can see
    ChatGPT’s answer in Response [8-1](#PC2).Here''s an itinerary for your five-day
    trip to Paris that includes dining, arts, and activities tailored for you and
    your wife, while accommodating your work hours.Day 1: Arrival & Evening Stroll•
    Afternoon (after arrival): Check into your accommodation and relax.• Evening:•
    Take a leisurely stroll along the Seine River near the Notre-Dame Cathedral.•
    Dinner at Le Marais district. Try L''As du Fallafel for a casual meal or Les Philosophes
    for a classic French bistro experience.Day 2: Arts & Biking• Morning (before work):
    Visit the Musée d''Orsay, famous for its Impressionist art collection.• Post-work
    (3:30 PM onwards): Rent bikes and explore the Bois de Vincennes, a large park
    perfect for biking and relaxing.• Evening:• Dinner at Le Train Bleu, a historic
    and ornate restaurant at Gare de Lyon station.Day 3: Iconic Sights & Anniversary
    Celebration• Morning (before work): Visit Sainte-Chapelle, a stunning Gothic chapel
    with intricate stained glass windows.• Post-work (3:30 PM onwards):• Take a romantic
    sunset cruise on the Seine River.• Anniversary dinner at Le Jules Verne, a Michelin-starred
    restaurant located inside the Eiffel Tower, offering breathtaking views of Paris.Day
    4: Hidden Gems & Neighborhood Strolls• Morning (before work): Walk through the
    Montmartre district. Visit the Sacré-Cœur Basilica and explore the artists'' square,
    Place du Tertre.• Post-work (3:30 PM onwards):• Visit Atelier des Lumières, an
    immersive digital art exhibition.• Dinner at Clamato, a trendy seafood bistro
    in the 11th arrondissement.Day 5: Biking Adventure & Farewell• Morning (before
    work): Explore the Île de la Cité and Île Saint-Louis on foot or by bike.• Post-work
    (3:30 PM onwards):• Spend your last evening at Le Marais or Saint-Germain-des-Prés
    for a relaxed atmosphere, shopping, and people-watching.• Dinner at Chez Janou,
    known for its Provençal cuisine and vibrant ambiance.Additional Tips:• Transportation:
    Paris is bike-friendly, and public transportation (Metro, buses) is excellent.•
    Anniversary Gifts: Explore boutiques in Saint-Germain-des-Prés or visit Galeries
    Lafayette for a memorable purchase.• Reservation Tip: Book dinner reservations,
    especially for Le Jules Verne, well in advance.Enjoy your time in Paris! ![A black
    and white star symbol with a bold black outline and a gray fill. The star has
    ten points, alternating between longer and shorter points, creating a dynamic,
    spiked appearance.](../images/641691_1_En_8_Chapter/641691_1_En_8_Figa_HTML.gif)Response
    8-1'
