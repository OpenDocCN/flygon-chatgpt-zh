  id: totrans-1390
  prefs: []
  type: TYPE_NORMAL
  zh: process_youtube_url(youtube_url)
- en: Next, create the process_youtube_url() function which replaces the process_file()
    function.
  id: totrans-1391
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，创建process_youtube_url()函数，该函数替换process_file()函数。
- en: 'Instead of importing different loaders to load the documents, you can use the
    YoutubeLoader to create a document from the YouTube url as follows:'
  id: totrans-1392
  prefs: []
  type: TYPE_NORMAL
  zh: 而不是导入不同的加载器来加载文档，你可以使用YoutubeLoader从YouTube URL创建文档，如下所示：
- en: 'def process_youtube_url(url):'
  id: totrans-1393
  prefs: []
  type: TYPE_NORMAL
  zh: 'def process_youtube_url(url):'
- en: 'with st.spinner("Processing YouTube video..."):'
  id: totrans-1394
  prefs: []
  type: TYPE_NORMAL
  zh: 'with st.spinner("处理YouTube视频..."):'
- en: loader = YoutubeLoader.from_youtube_url(url)
  id: totrans-1395
  prefs: []
  type: TYPE_NORMAL
  zh: loader = YoutubeLoader.from_youtube_url(url)
- en: docs = loader.load()
  id: totrans-1396
  prefs: []
  type: TYPE_NORMAL
  zh: docs = loader.load()
- en: text_splitter = RecursiveCharacterTextSplitter(
  id: totrans-1397
  prefs: []
  type: TYPE_NORMAL
  zh: text_splitter = RecursiveCharacterTextSplitter(
