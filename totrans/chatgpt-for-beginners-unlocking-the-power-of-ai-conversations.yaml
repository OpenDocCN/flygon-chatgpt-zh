    ****b**y** ****gene**ratin**g ****prio**ritize**d ****ta**sk** ****li**sts**:'
  id: totrans-343
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT可以通过生成优先级任务列表来帮助规划你的日程：
