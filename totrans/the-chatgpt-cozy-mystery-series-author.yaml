  id: totrans-2759
  prefs: []
  type: TYPE_NORMAL
  zh: 感谢您阅读《ChatGPT温馨神秘系列作者》。
- en: I love sharing my experience with other independent publishers who are looking
    for the best way to share their work online, but need help with the overwhelming
    amount of information available.
  id: totrans-2760
  prefs: []
  type: TYPE_NORMAL
  zh: 我喜欢与其他寻找最佳在线分享作品方式但需要帮助处理大量可用信息的独立出版商分享我的经验。
- en: If you enjoyed this book and found it helpful, I would appreciate it if you
    would leave a review, no matter how short, at the online bookstore where you bought
    your copy.
  id: totrans-2761
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您喜欢这本书并觉得它有帮助，我非常感谢您在购买副本的在线书店留下评论，无论多短。
- en: YOU are the key to this book’s success!
  id: totrans-2762
  prefs: []
  type: TYPE_NORMAL
  zh: YOU是本书成功的关键！
- en: I read every review, and they do make an enormous difference. Reviews help other
    readers discover the kind of books and guides they want to read and are a wonderful
    way to support authors.
  id: totrans-2763
  prefs: []
  type: TYPE_NORMAL
  zh: 我阅读了每一篇评论，它们确实产生了巨大的影响。评论帮助其他读者发现他们想要阅读的书籍和指南，并且是支持作者的一种美妙方式。
- en: Thank you.
  id: totrans-2764
  prefs: []
  type: TYPE_NORMAL
  zh: 感谢。
- en: About the Author
  id: totrans-2765
  prefs: []
  type: TYPE_NORMAL
  zh: 关于作者
- en: Nina Harrington grew up in rural Northumberland, England. She decided at age
    eleven that her dream job was to be a librarian because then she could read all
    the books in the public library whenever she wanted!
  id: totrans-2766
  prefs: []
  type: TYPE_NORMAL
  zh: Nina Harrington在英国农村的诺森伯兰郡长大。她在11岁时决定她的梦想工作是成为一名图书管理员，因为那样她就可以随时阅读公共图书馆里的所有书籍！
- en: Nina writes fun, award-winning contemporary romance for HarperCollins, including
    the Mills and Boon Modern Tempted and Harlequin Romance lines. Over 1.7 million
    copies of her books have been sold in 28 countries and translated into 23 languages.
    Nina also writes cozy mysteries under the pen name of Sophie Brent.
  id: totrans-2767
  prefs: []
  type: TYPE_NORMAL
  zh: Nina为HarperCollins撰写有趣的获奖当代浪漫小说，包括Mills and Boon Modern Tempted和Harlequin Romance系列。她的书籍在28个国家销售了超过170万册，并被翻译成23种语言。Nina还以Sophie
    Brent的笔名撰写温馨神秘小说。
- en: Nina is the creator of the bestselling Fast-Track Guides series of books and
    online courses for writers.
  id: totrans-2768
  prefs: []
  type: TYPE_NORMAL
  zh: Nina是畅销书Fast-Track Guides系列书籍和在线课程的创作者。
- en: 'Find out more about Nina at: [https://ninaharrington.com/](https://ninaharrington.com/)'
  id: totrans-2769
  prefs: []
  type: TYPE_NORMAL
  zh: 了解更多关于Nina的信息：[https://ninaharrington.com/](https://ninaharrington.com/)
