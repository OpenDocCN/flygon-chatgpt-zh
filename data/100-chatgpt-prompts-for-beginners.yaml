  prefs: []
  type: TYPE_NORMAL
  zh: 'console.log(double(5)); // 输出: 10'
- en: Maintaining State in Asynchronous Operations
  id: totrans-177
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 维护异步操作中的状态
- en: Closures are particularly useful in asynchronous programming, where they can
    be used to maintain state between asynchronous calls.
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: 闭包在异步编程中特别有用，它们可以在异步调用之间维护状态。
