- en: Create a macro which will extract records from different departments and regions.
    The user will type the required department and region and click on the filter
    button, as shown in [Figure 15.8](#fig15-8).
  id: totrans-2395
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个宏，该宏将从不同的部门和地区提取记录。用户将输入所需的部门和地区，然后点击筛选按钮，如图 [图15.8](#fig15-8) 所示。
