- en: 'Creating The First Discord Bot: TechSupportBotDumb.java'
  id: totrans-913
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 创建第一个Discord机器人：TechSupportBotDumb.java
- en: This is the first of two Discord bots that we’re creating in this chapter. This
    bot, TechSupportBotDumb.java, will be responsible for watching the messages in
    the “q-and-a” channel in our Discord server.
  id: totrans-914
  prefs: []
  type: TYPE_NORMAL
  zh: 这是本章中我们创建的两个 Discord 机器人中的第一个。这个机器人，TechSupportBotDumb.java，将负责监视我们 Discord
    服务器中“问答”频道的信息。
- en: Later on in this chapter, we’ll create another bot that will be responsible
    for moderating ALL CONTENT in the Discord server for unwanted content, including
    the “q-and-a” channel. The goal here is to follow the architectural pattern of
    “separation of concerns.” Rather than creating a gigantic Java Discord bot that
    performs all the moderation needs for the Discord server, we’re going to separate
    the functionality into two different apps.
  id: totrans-915
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章的后面部分，我们将创建另一个机器人，该机器人将负责在 Discord 服务器中管理所有内容，包括“问答”频道中的不受欢迎的内容。这里的目的是遵循“关注点分离”的架构模式。而不是创建一个庞大的
    Java Discord 机器人，该机器人执行 Discord 服务器所有管理需求，我们将功能分为两个不同的应用程序。
- en: We’re also going to take things step by step and focus this chapter on getting
    past the learning curve for the Discord capabilities in Java. In the final chapter
    of this book, we’ll enhance both bots and make them artificially intelligent using
    the Open AI APIs.
  id: totrans-916
  prefs: []
  type: TYPE_NORMAL
  zh: 我们也将逐步进行，并将本章的重点放在克服 Java 中 Discord 功能的学习曲线。在本书的最后一章，我们将增强机器人和使用 Open AI API
    使其具有人工智能。
- en: 'Listing [5-1](#PC1) is the code that we need to create a basic Discord bot
    that watches all the messages posted in a single channel and provides an answer.import
    java.io.IOException;import java.util.EnumSet;import net.dv8tion.jda.api.JDA;import
    net.dv8tion.jda.api.JDABuilder;import net.dv8tion.jda.api.entities.Activity;import
    net.dv8tion.jda.api.entities.User;import net.dv8tion.jda.api.entities.channel.ChannelType;import
    net.dv8tion.jda.api.events.message.MessageReceivedEvent;import net.dv8tion.jda.api.hooks.ListenerAdapter;import
    net.dv8tion.jda.api.requests.GatewayIntent;// This class extends a ListenerAdapter
    to handle message events on Discord.public class TechSupportBotDumb extends ListenerAdapter
    {    // The bot''s Discord token for authentication.    static String discordToken
    = "YOUR_DISCORD_BOT_TOKEN";    // The name of the channel the bot should monitor
    and interact with.    static String channelToWatch = "q-and-a";    public static
    void main(String[] args) throws IOException {        // Set of intents declaring
    which types of events the bot intends to listen to.        EnumSet<GatewayIntent>
    intents = EnumSet.of(                GatewayIntent.GUILD_MESSAGES, // For messages
    in guilds.                GatewayIntent.DIRECT_MESSAGES, // For private direct
    messages.                GatewayIntent.MESSAGE_CONTENT // To allow access to message
    content.        );        // Initialize the bot with minimal configuration and
    the specified intents.        try {            JDA jda = JDABuilder.createLight(discordToken,
    intents)                    .addEventListeners(new TechSupportBotDumb()) // Adding
    the current class as an event listener.                    .setActivity(Activity.customStatus("Ready
    to answer questions")) // Set the bot''s custom status.                    .build();            //
    Asynchronously get REST ping from Discord API and print it.             jda.getRestPing().queue(ping
    ->   System.out.println("Logged in with ping: " + ping) );            // Block
    the main thread until JDA is fully loaded.            jda.awaitReady();            //
    Print the number of guilds the bot is connected to.            System.out.println("Guilds:
    " + jda.getGuildCache().size());        } catch (InterruptedException e) {            //
    Handle exceptions if the thread is interrupted during the awaitReady process.            e.printStackTrace();        }    }    //
    This method handles incoming messages.    @Override    public void onMessageReceived(MessageReceivedEvent
    messageEvent) {        // The ID of the sender.        User senderDiscordID =
    messageEvent.getAuthor();        // Ignore messages sent by the bot to prevent
    self-responses.        if (senderDiscordID.equals(messageEvent.getJDA().getSelfUser()))
    {            return;        } else if (messageEvent.getChannelType() == ChannelType.TEXT)
    {            // Ignore messages not in the specified "q-and-a" channel.            if
    (!messageEvent.getChannel().getName().equalsIgnoreCase(channelToWatch)) {                return;            }        }        //
    Send a greeting response to the user who sent the message.        String reply
    = "hi <@" + senderDiscordID.getId() + ">, I can help you with that!";        messageEvent.getChannel().sendMessage(reply).queue();    }}Listing
    5-1'
  id: totrans-917
  prefs: []
  type: TYPE_NORMAL
  zh: '列表 [5-1](#PC1) 是我们创建一个基本的 Discord 机器人所需的代码，该机器人会监视单个频道中发布的所有消息并提供答案.import
    java.io.IOException;import java.util.EnumSet;import net.dv8tion.jda.api.JDA;import
    net.dv8tion.jda.api.JDABuilder;import net.dv8tion.jda.api.entities.Activity;import
    net.dv8tion.jda.api.entities.User;import net.dv8tion.jda.api.entities.channel.ChannelType;import
    net.dv8tion.jda.api.events.message.MessageReceivedEvent;import net.dv8tion.jda.api.hooks.ListenerAdapter;import
    net.dv8tion.jda.api.requests.GatewayIntent;// 这个类扩展了 ListenerAdapter 以处理 Discord
    上的消息事件.public class TechSupportBotDumb extends ListenerAdapter {    // 机器人的 Discord
    认证令牌。    static String discordToken = "YOUR_DISCORD_BOT_TOKEN";    // 机器人应监视和交互的频道名称。    static
    String channelToWatch = "q-and-a";    public static void main(String[] args) throws
    IOException {        // 声明意图集合，指定机器人打算监听哪些类型的事件。        EnumSet<GatewayIntent>
    intents = EnumSet.of(                GatewayIntent.GUILD_MESSAGES, // 用于公会中的消息。                GatewayIntent.DIRECT_MESSAGES,
    // 用于私人直接消息。                GatewayIntent.MESSAGE_CONTENT // 允许访问消息内容。        );        //
    使用最小配置和指定的意图初始化机器人。        try {            JDA jda = JDABuilder.createLight(discordToken,
    intents)                    .addEventListeners(new TechSupportBotDumb()) // 将当前类添加为事件监听器。                    .setActivity(Activity.customStatus("Ready
    to answer questions")) // 设置机器人的自定义状态。                    .build();            //
    从 Discord API 异步获取 REST ping 并打印。             jda.getRestPing().queue(ping ->   System.out.println("Logged
    in with ping: " + ping) );            // 阻塞主线程，直到 JDA 完全加载。            jda.awaitReady();            //
    打印机器人连接到的公会数量。            System.out.println("Guilds: " + jda.getGuildCache().size());        }
    catch (InterruptedException e) {            // 处理在 awaitReady 过程中线程被中断时的异常。            e.printStackTrace();        }    }    //
    此方法处理传入的消息。    @Override    public void onMessageReceived(MessageReceivedEvent
    messageEvent) {        // 发送者的 ID。        User senderDiscordID = messageEvent.getAuthor();        //
    忽略机器人发送的消息，以防止自我响应。        if (senderDiscordID.equals(messageEvent.getJDA().getSelfUser()))
    {            return;        } else if (messageEvent.getChannelType() == ChannelType.TEXT)
    {            // 忽略不在指定 "q-and-a" 频道中的消息。            if (!messageEvent.getChannel().getName().equalsIgnoreCase(channelToWatch))
    {                return;            }        }        // 向发送消息的用户发送问候回复。        String
    reply = "hi <@" + senderDiscordID.getId() + ">, I can help you with that!";        messageEvent.getChannel().sendMessage(reply).queue();    }}列表
    5-1'
- en: TechSupportBotDumb.java
  id: totrans-918
  prefs: []
  type: TYPE_NORMAL
  zh: TechSupportBotDumb.java
- en: 'In our class, we need to extend the ListenerAdapter class from the JDA API
    in order to get things to work. Now, as you analyze TechSupportBotDumb.java, you
    should see that we kept things really simple, and therefore we only have two methods
    to worry about: main() and onMessageReceived().'
  id: totrans-919
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们的类中，我们需要扩展 JDA API 中的 ListenerAdapter 类，以便使一切正常工作。现在，当你分析 TechSupportBotDumb.java
    时，你应该看到我们保持了简单性，因此我们只需要关注两个方法：main() 和 onMessageReceived()()。
- en: At beginning of the class, you should also notice that we specify the channel
    that we are interested in monitoring with the “channelToWatch” variable.
  id: totrans-920
  prefs: []
  type: TYPE_NORMAL
  zh: 在类开始时，你应该也会注意到我们使用“channelToWatch”变量指定了我们感兴趣要监控的频道。
- en: Note
  id: totrans-921
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: For some reason, Discord’s own terminology sometimes refers to Discord servers
    as “guilds.” Therefore, the JDA library will also use the word, guild, when referring
    to a Discord server. However, from our perspective, a guild is simply a Discord
    server.
  id: totrans-922
  prefs: []
  type: TYPE_NORMAL
  zh: 由于某种原因，Discord 自己的术语有时将 Discord 服务器称为“公会”。因此，JDA 库在提到 Discord 服务器时也会使用这个词，然而，从我们的角度来看，公会只是一个
    Discord 服务器。
- en: In the main() method we have a Collection (specifically, it’s an EnumSet, but
    at the end of the day, it’s still a Collection) of GatewayIntents. As you may
    remember, you use Intents to specify explicitly the type of information that you’re
    interested in. In our case, we’re interested in
  id: totrans-923
  prefs: []
  type: TYPE_NORMAL
  zh: 在 main() 方法中，我们有一个集合（具体来说，它是一个 EnumSet，但最终它仍然是一个集合）的 GatewayIntents。你可能记得，你使用
    Intents 来明确指定你感兴趣的信息类型。在我们的情况下，我们感兴趣的是
- en: Messages sent to the server (guild messages)
  id: totrans-924
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 发送到服务器的消息（公会消息）
- en: Messages sent directly to the bot from a user (direct messages)
  id: totrans-925
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 用户直接向机器人发送的消息（直接消息）
- en: The content of the messages sent (message content)
  id: totrans-926
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 发送消息的内容（消息内容）
- en: Afterward, we again use the Builder Pattern with the JDABuilder class with our
    discordToken and the intents that we’re interested in with the following call:JDA
    jda = JDABuilder.createLight(discordToken, intents)
  id: totrans-927
  prefs: []
  type: TYPE_NORMAL
  zh: 之后，我们再次使用 Builder 模式与 JDABuilder 类以及我们的 discordToken 和我们感兴趣的意图，通过以下调用：JDA jda
    = JDABuilder.createLight(discordToken, intents)
- en: Loving the Lambda Expression to Simplify Code
  id: totrans-928
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 爱上 Lambda 表达式以简化代码
- en: 'Within the main() method, we’re using a Lambda expression to send a ping request
    to the Discord servers using the JDA library asynchronously. Like all network
    requests, if this is not done asynchronously, then our main thread will be blocked
    until the response is received, which is a bad thing. Therefore, after the ping
    response is received, we execute the println() statement to show how long the
    ping request takes to get to the server. Using a Java Lambda expression, this
    is accomplished usingjda.getRestPing().queue(ping ->   System.out.println("Logged
    in with ping: " + ping) );So what if we didn’t use a Lambda expression to get
    the ping time to Discord’s servers? The code would look more like this:// instantiate
    a new PingConsumerjda.getRestPing().queue(new PingConsumer());...// define the
    PingConsumer as an inner classclass PingConsumer implements Consumer<Long> {    @Override    public
    void accept(Long ping) {        System.out.println("Logged in with ping: " + ping);    }}'
  id: totrans-929
  prefs: []
  type: TYPE_NORMAL
  zh: '在 main() 方法中，我们使用 Lambda 表达式异步地通过 JDA 库向 Discord 服务器发送 ping 请求。像所有网络请求一样，如果不异步执行，则我们的主线程将被阻塞，直到收到响应，这是不好的。因此，在收到
    ping 响应后，我们执行 println() 语句以显示 ping 请求到达服务器所需的时间。使用 Java Lambda 表达式，这是通过以下方式实现的：jda.getRestPing().queue(ping
    -> System.out.println("Logged in with ping: " + ping)); 所以，如果我们没有使用 Lambda 表达式来获取
    Discord 服务器的 ping 时间，代码将看起来更像是这样：// 实例化一个新的 PingConsumerjda.getRestPing().queue(new
    PingConsumer());...// 定义 PingConsumer 为一个内部类class PingConsumer implements Consumer<Long>
    {    @Override    public void accept(Long ping) {        System.out.println("Logged
    in with ping: " + ping);    }}'
- en: Without the Lambda, we’d need to create an inner class implementing the Consumer
    interface (which honestly, we don’t really care about). By implementing the interface,
    we need to implement the accept() method, which will be asynchronously called
    when the response comes back. We would then create a new PingConsumer instance
    in the jda.getRestPing().queue() method call.
  id: totrans-930
  prefs: []
  type: TYPE_NORMAL
  zh: 没有 Lambda，我们需要创建一个实现 Consumer 接口的内部类（老实说，我们并不真正关心这个）。通过实现接口，我们需要实现 accept()
    方法，该方法将在响应返回时异步调用。然后，我们会在 jda.getRestPing().queue() 方法调用中创建一个新的 PingConsumer 实例。
- en: Handling Messages Sent to the Discord Server
  id: totrans-931
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 处理发送到 Discord 服务器的消息
- en: As we wrap things up for this first Java Discord bot, we need to talk about
    the onMessageReceived() method. This method is called asynchronously for every
    single message the Discord server, as well as for messages from users sent directly
    to the bot itself as a DM.
  id: totrans-932
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们结束这个第一个 Java Discord 机器人的讨论时，我们需要谈谈 onMessageReceived() 方法。这个方法在 Discord
    服务器中的每一条消息以及用户直接向机器人发送的私信中都会异步调用。
- en: Note
  id: totrans-933
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: Did you know that when the bot sends an answer to a person’s question in the
    Discord server, Discord will invoke the onMessageReceived() method of the bot
    to give the bot the message that the bot just sent. This sounds like a recipe
    for an infinite loop, doesn’t it? Therefore, we have logic in place for the bot
    to ignore messages sent from itself.
  id: totrans-934
  prefs: []
  type: TYPE_NORMAL
  zh: 您知道吗，当机器人在 Discord 服务器中向某人的问题发送答案时，Discord 会调用机器人的 onMessageReceived() 方法，将机器人刚刚发送的消息传递给机器人。这听起来像是一个无限循环的配方，不是吗？因此，我们已经在机器人中设置了逻辑，使其忽略来自自身的消息。
- en: In the final lines of the onMessageReceived() method, we make sure that we give
    a friendly reply to the original sender of the message by “@ tagging” them in
    the response. As we mentioned before, this first version of the Q&A Bot is dumb.
    It will respond to your question when posted in the Discord server, but the response
    won’t actually answer your question.
  id: totrans-935
  prefs: []
  type: TYPE_NORMAL
  zh: 在 onMessageReceived() 方法的最后几行，我们确保通过在回复中“@ 标记”原始信息发送者，向他们提供一个友好的回复。正如我们之前提到的，这个问答机器人的第一个版本是愚蠢的。当您在
    Discord 服务器中发布问题时，它会响应，但实际上的回复并不会回答您的问题。
