- en: THE EXPLORATORY ANALYSIS
  prefs: []
  type: TYPE_NORMAL
- en: 'Exploratory data analysis (EDA) is an approach to analyzing datasets, often
    prior to formal modeling or hypothesis testing. The main goal of EDA is to understand
    the data, its structure, outliers, and patterns, and to identify potential anomalies
    or peculiarities. Here is a structured description of the EDA process for the
    death.csv dataset:'
  prefs: []
  type: TYPE_NORMAL
- en: 1. Univariate Analysis
  prefs: []
  type: TYPE_NORMAL
- en: Analyze one variable at a time. For numeric variables, describe the central
    tendency (mean, median) and dispersion (range, variance, standard deviation).
    Histograms, box plots, and density plots can be useful. For categorical variables,
    use bar plots to understand the frequency or proportion of each category.
  prefs: []
  type: TYPE_NORMAL
- en: 2. Bivariate Analysis
  prefs: []
  type: TYPE_NORMAL
- en: Analyze the relationship between two variables. Use scatter plots for continuous-continuous
    pairs. Use box plots for categorical-continuous pairs. Use stacked column charts
    or mosaic plots for categorical-categorical pairs.
  prefs: []
  type: TYPE_NORMAL
- en: 3. Multivariate Analysis
  prefs: []
  type: TYPE_NORMAL
- en: Analyze more than two variables simultaneously. Use correlation matrices or
    heatmaps to understand relationships between continuous variables. Use pair plots
    or 3D scatter plots for a visual representation of relationships.
  prefs: []
  type: TYPE_NORMAL
- en: 4. Checking for Missing Values
  prefs: []
  type: TYPE_NORMAL
- en: Identify columns with missing values. Analyze patterns of “missingness.” Are
    they missing at random or is there a pattern?
  prefs: []
  type: TYPE_NORMAL
- en: 5. Outlier Detection
  prefs: []
  type: TYPE_NORMAL
- en: Detect unusual or suspicious values. Use visual methods (e.g., box plots or
    scatter plots) or statistical methods (e.g., IQR or Z-scores).
  prefs: []
  type: TYPE_NORMAL
- en: 6. Feature Engineering
  prefs: []
  type: TYPE_NORMAL
- en: Create new variables from existing ones. For example, from the dataset, one
    could derive a feature indicating if a county’s death rate is above or below the
    national average.
  prefs: []
  type: TYPE_NORMAL
- en: 7. Data Quality Checks
  prefs: []
  type: TYPE_NORMAL
- en: Ensure that data is consistent, accurate, and reliable. For instance, FIPS codes
    should be unique to each county.
  prefs: []
  type: TYPE_NORMAL
- en: 8. Correlation Analysis
  prefs: []
  type: TYPE_NORMAL
- en: This helps us understand how different continuous variables move in relation
    to each other. Use the Pearson correlation for continuous variables and Cramér’s
    V for categorical variables.
  prefs: []
  type: TYPE_NORMAL
- en: 9. Trend Analysis
  prefs: []
  type: TYPE_NORMAL
- en: This is especially relevant for the recent_5_year_trend_2_in_death_rates feature
    in our dataset. This analysis helps to show upward or downward trends in data
    over time
  prefs: []
  type: TYPE_NORMAL
- en: 10. Distribution Analysis
  prefs: []
  type: TYPE_NORMAL
- en: This allows us to examine the distribution of key metrics (e.g., age_adjusted_death_rate).
    This allows us to check for normality, skewness, and kurtosis.
  prefs: []
  type: TYPE_NORMAL
- en: 11. Geospatial Analysis
  prefs: []
  type: TYPE_NORMAL
- en: Since the dataset contains county information, it would be possible (with additional
    geographic data) to visualize metrics on a map, highlighting regions of interest.
  prefs: []
  type: TYPE_NORMAL
- en: 12. Summary Reports
  prefs: []
  type: TYPE_NORMAL
- en: This allows us to summarize the findings, perhaps in the form of a dashboard
    or a report, highlighting important insights from the data.
  prefs: []
  type: TYPE_NORMAL
- en: 13. Hypothesis Generation
  prefs: []
  type: TYPE_NORMAL
- en: Based on the findings, this allows us to generate hypotheses to be tested in
    subsequent analyses or modeling. After EDA, the analyst should have a deeper understanding
    of the dataset’s characteristics and its potential limitations. It provides insights
    that can guide the subsequent modeling process and ensures that the assumptions
    made during modeling are valid.
  prefs: []
  type: TYPE_NORMAL
