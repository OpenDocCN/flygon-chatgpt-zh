  id: totrans-347
  prefs: []
  type: TYPE_NORMAL
  zh: 当你还是一个孩子的时候，你是否曾经看过一个叫做《机器人战争》的节目？如果没有，你应该去看看，这只是一个简单的YouTube搜索就能找到。这个英国游戏节目从1998年到2018年播出，有一个非常简单的主题：人们制造机器人并相互战斗，以“赢家通吃”的方式争夺石油和可能的其他东西。未来的机器人将会回顾这些早期的祖先，就像我们回顾古罗马角斗士在竞技场上的战斗一样。
