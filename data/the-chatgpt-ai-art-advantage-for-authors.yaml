- en: '*Use a **light blue watercolour-textured background** —not plain white.*'
  id: totrans-154
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*使用**浅蓝色水彩纹理背景**——不要纯白色。*'
- en: '*At the bottom, place **"Your Name"** in an **elegant script font.***'
  id: totrans-155
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*在底部，用**优雅的脚本字体**放置**“你的名字”**。***'
- en: '*Ensure clean layout, whitespace balance, and professional proportions.*'
  id: totrans-156
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*确保布局整洁、空白平衡和专业比例。*'
- en: '![Create a full size vertical e-book cover for a book titled "Easy Images for
    Authors Who Can’t Draw".](Image00007.jpg)'
  id: totrans-157
  prefs: []
  type: TYPE_IMG
  zh: '![为名为“不会画画的作者简易图像”的书籍创建一个全尺寸垂直电子书封面。](Image00007.jpg)'
- en: Now you can download the image and send it to your book cover designer.
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 现在你可以下载图片并发送给你的封面设计师。
- en: Or keep creating. (but don’t spend too much time!)
  id: totrans-159
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 或者继续创作。（但不要花太多时间！）
- en: Or use it for your product graphics in your marketing directly.
  id: totrans-160
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 或者直接用于你的产品图形营销。
- en: Or generate promotional images
  id: totrans-161
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 或者生成推广图片
- en: Or create an image for a related book, such as book covers of a series that
    you haven not yet created, but you want to place at the end of the book so that
    users can buy it when it is ready.
  id: totrans-162
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 或者为相关书籍创建图像，例如你尚未创建但希望放在书末以便用户购买的书系列封面。
- en: 'Or we can use this to create the cover for a related book product, like a workbook
    based on the book:'
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 或者我们可以用这个来创建相关图书产品的封面，比如基于这本书的工作簿：
- en: Prompt
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 提示
- en: '*Create a full 6x9 vertical e-book/workbook cover titled: **“Easy Images for
    Authors Who Can’t Draw"***'
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: '*创建一个全6x9垂直的电子书/工作簿封面，标题为：**“不会画画的作者简易图像”***'
- en: '*Include a **subtitle** beneath the title:*'
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: '*在标题下方添加一个**副标题**：*'
- en: '"Workbook: Practice Prompts, AI Hacks & Visual Planning Pages"'
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: '"Workbook: Practice Prompts, AI Hacks & Visual Planning Pages"'
- en: '*Use the following layout and design:*'
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: '*使用以下布局和设计：*'
- en: '***Dark blue watercolour background** with a soft, artistic texture.*'
  id: totrans-169
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '***深蓝色水彩背景**，带有柔和的艺术纹理。'
- en: '*Title in a **clean, modern sans-serif font** , bold and cantered at the top.*'
  id: totrans-170
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*标题使用**干净、现代的无衬线字体**，加粗并居中在顶部。*'
- en: '*Subtitle in a **smaller sans-serif font** , directly below the title.*'
  id: totrans-171
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*标题下方使用**较小的无衬线字体**。*'
- en: '*A **childlike doodle** in black line art (sun, house, tree) floating near
    the centre.*'
  id: totrans-172
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*在中心附近漂浮一个**儿童般的涂鸦**，以黑色线条艺术（太阳、房子、树）。*'
- en: '*At the bottom, place the author''s name: **Susan Jagannath** in an **elegant
    script font.***'
  id: totrans-173
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*在底部放置作者的名字：**Susan Jagannath**，使用**优雅的书法字体**。*'
- en: '*Ensure good spacing, layout harmony, and visual clarity for e-book platforms
    like Amazon.*'
  id: totrans-174
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*确保为电子书平台如亚马逊提供良好的间距、布局和谐和视觉清晰度。*'
- en: 'And the resulting image could be:'
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 结果的图片可能是这样的：
- en: '![Create a full 6x9 vertical e-book/workbook cover titled: “Easy Images for
    Authors Who Can’t Draw" Include a subtitle beneath the title: "Workbook: Practice
    Prompts, AI Hacks & Visual Planning Pages"](Image00008.jpg)'
  id: totrans-176
  prefs: []
  type: TYPE_IMG
  zh: '![创建一个全6x9垂直的电子书/工作簿封面，标题为：“不会画画的作者简易图像”。在标题下方添加副标题：“Workbook: Practice Prompts,
    AI Hacks & Visual Planning Pages”](Image00008.jpg)'
- en: 'Hint: You can try this on your own, or with me. Follow along on the challenge
    - [https://<wbr> susanjagannath.<wbr> gumroad.<wbr> com/<wbr> l/<wbr> TCA-1](https://susanjagannath.gumroad.com/l/TCA-1)'
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：你可以自己尝试，或者和我一起。跟随挑战 - [https://<wbr> susanjagannath.<wbr> gumroad.<wbr> com/<wbr>
    l/<wbr> TCA-1](https://susanjagannath.gumroad.com/l/TCA-1)
- en: '5'
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: '5'
- en: 'Marketing Ads and Infographics: Captivate Your Audience with Compelling Graphics'
  id: totrans-179
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 营销广告和信息图表：用引人入胜的图形吸引你的观众
- en: You can also use ChatGPT 4o for paid ad campaign graphics, a series of posts.
    Yes, I know, most authors flinch at the word “Ads”, but we do need them, and now
    we don’t need fear them!
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 你也可以使用ChatGPT 4o为付费广告活动图形、一系列帖子。是的，我知道，大多数作者对“广告”这个词感到退缩，但我们确实需要它们，现在我们不需要害怕它们了！
- en: '**Let’s Create some Ads**'
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: '**让我们创建一些广告**'
- en: 'For example, you might prompt for an ad with this:'
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，你可以用以下内容来创建广告：
- en: Prompt
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 提示
- en: '*Create a Facebook-style ad featuring a **frustrated woman author** in her
    30s or 40s, sitting at a messy desk with papers, notebooks, and a laptop. She
    is **looking directly at the viewer** with a tired, overwhelmed expression.*'
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: '*创建一个以30多岁或40多岁的**沮丧女性作者**为特色的Facebook风格广告，她坐在一个杂乱的桌子前，桌上放着纸张、笔记本和笔记本电脑。她**直视观众**，表情疲惫、不堪重负。*'
- en: '*Add **bold red text at the top** that says:*'
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: '*在顶部添加**粗体红色文字**：*'
- en: '***"Escape the Book Marketing Nightmare"***'
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: '***"逃离图书营销噩梦"***'
- en: '*Add **smaller black or Gray text** below:*'
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: '*在下方添加**较小的黑色或灰色文字**：*'
- en: '*"Reach more readers with stunning images"*'
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: '*"用惊人的图像吸引更多读者"*'
- en: '*At the **bottom** , include a **large green button** that clearly says:*'
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: '*在底部，包含一个**大绿色按钮**，上面清楚地写着：*'
- en: '***"Join the Challenge"***'
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: '***"加入挑战"***'
- en: '![Create a Facebook-style ad featuring a frustrated woman author in her 30s
    or 40s, sitting at a messy desk with papers, notebooks, and a laptop. She is looking
    directly at the viewer with a tired, overwhelmed expression. Add bold red text
    at the top that says: "Escape the Book Marketing Nightmare" Add smaller black
    or Gray text below: "Reach more readers with stunning images" At the bottom, include
    a large green button that clearly says: "Join the Challenge"](Image00009.jpg)'
  id: totrans-191
  prefs: []
  type: TYPE_IMG
  zh: '![创建一个以30多岁或40多岁的沮丧女性作者为特色的Facebook风格广告，她坐在一个杂乱的桌子前，桌上放着纸张、笔记本和笔记本电脑。她直视观众，表情疲惫、不堪重负。顶部添加粗体红色文字：“逃离图书营销噩梦”，下方添加较小的黑色或灰色文字：“用惊人的图像吸引更多读者”。底部包含一个清晰的大绿色按钮：“加入挑战”(Image00009.jpg)'
- en: The image that it initially gives you can be either your starting point., or
    exactly what you want.
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: 它最初给出的图片可以是你的起点，或者正好是你想要的。
- en: Notice that the green button CTA (Call to Action) is cropped. Let’s fix this.
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: 注意到绿色的按钮CTA（Call to Action）被裁剪了。让我们来修复这个问题。
- en: 'Prompt:'
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '*Ensure the button is **fully visible***'
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: '*确保按钮**完全可见***'
- en: '![Ensure the button is fully visible](Image00010.jpg)'
  id: totrans-196
  prefs: []
  type: TYPE_IMG
  zh: '![确保按钮完全可见](Image00010.jpg)'
- en: And there it is!
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: 就这样！
- en: With ChatGPT 4o, you can now iterate the prompt and have a conversation to get
    that image the way you want it. But notice the text and spelling is exactly the
    way we asked it to be. If you want to change that image and put her in a busy
    office with coworkers in a high-rise downtown, you can do that.
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: 使用ChatGPT 4o，你现在可以迭代提示并进行对话，以获得你想要的图像。但请注意文本和拼写与我们要求的一模一样。如果你想改变这张图片，把她放在一个繁忙的办公室里，与高楼大厦中的同事在一起，你可以做到。
- en: '**Infographics**'
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: '**信息图表**'
- en: Infographics are a visual way of communicating information is an almost instant
    way.
  id: totrans-200
  prefs: []
  type: TYPE_NORMAL
  zh: 信息图表是一种几乎瞬间就能传达信息的视觉方式。
- en: They are effective in social marketing and as images embedded in your blog.
    You can also have ChatGPT create infographics for you – creating the image and
    even the content for easy images.
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
  zh: 它们在社交媒体营销和作为博客中嵌入的图片中都很有效。你也可以让ChatGPT为你创建信息图表——创建图像甚至内容，以便于制作易于理解的图像。
- en: 'For example, you might prompt it like this:'
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，你可以这样提示：
- en: Prompt
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: 提示
- en: '*Create a vertical infographic for Pinterest that shows five book marketing
    tips. Use bold headers, icons for each tip, and sophisticated colours of the year.
    Include a title at the top that says: “Book Marketing Tips” in a professional
    script.*'
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
  zh: '*为Pinterest创建一个垂直信息图表，展示五个书籍营销技巧。使用粗体标题，每个技巧的图标，以及当年的复杂色彩。在顶部包含一个标题，用专业字体写着：“书籍营销技巧”*。'
- en: '![Create a vertical infographic for Pinterest that shows five book marketing
    tips. Use bold headers, icons for each tip, and sophisticated colours of the year.
    Include a title at the top that says: “Book Marketing Tips” in a professional
    script](Image00011.jpg)'
  id: totrans-205
  prefs: []
  type: TYPE_IMG
  zh: '![为Pinterest创建一个垂直信息图表，展示五个书籍营销技巧。使用粗体标题，每个技巧的图标，以及当年的复杂色彩。在顶部包含一个标题，用专业字体写着：“书籍营销技巧”](Image00011.jpg)'
- en: In this case, we're not even giving AI the specific tips or icons to include,
    but we could. This is another time saving hack you can use to get the kind of
    graphics you need for your online marketing business without having to spend additional
    effort to gather the information.
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: 在这种情况下，我们甚至没有给AI提供具体提示或图标来包含，但我们完全可以做到。这是另一个节省时间的技巧，你可以用它来获取你在线营销业务所需的图形，而无需额外努力去收集信息。
- en: Whenever possible, make sure you AI what type of style, colour, and composition
    you want. If you want something very minimalist looking, you have to say that.
    If you want something sleek and modern, you have to say that.
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
  zh: 在可能的情况下，确保你告诉AI你想要的风格、颜色和构图类型。如果你想看起来非常简约，你必须说清楚。如果你想看起来时尚现代，你必须说清楚。
- en: 'YouTube Branding: Thumbnails That Demand Attention'
  id: totrans-208
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: YouTube品牌化：吸引注意力的缩略图
- en: So, you decided it was easier to just create videos rather than worrying about
    all the visuals you need for marketing your book – then you realised that you
    needed good thumbnails!
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
  zh: 所以，你决定创建视频比担心所有用于营销书籍的视觉元素要容易，然后你意识到你需要好的缩略图！
- en: Fear not, Chat can help you there, creating a personalised thumbnail that merges
    your headshot and title into an eye-catching image.
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: 不要担心，Chat可以帮助你，创建一个将你的头像和标题合并成引人注目图像的个性化缩略图。
- en: Don't just give AI a generic prompt like, “Make a YouTube thumbnail.”
  id: totrans-211
  prefs: []
  type: TYPE_NORMAL
  zh: 不要只是给AI一个通用的提示，比如，“制作一个YouTube缩略图。”
- en: If you want the output to be impressive, you have to prompt it and include specific
    details.
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你希望输出令人印象深刻，你必须提示它，并包括具体细节。
- en: '**Creating Thumbnails**'
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
  zh: '**创建缩略图**'
- en: That simple sounding word that can be a quagmire if you don’t know how to blend
    words, fonts, images and emotions. Fortunately, we can do that with some prompts.
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
  zh: 这个听起来简单的词，如果你不知道如何融合文字、字体、图像和情感，可能会陷入困境。幸运的是，我们可以通过一些提示来完成这个任务。
- en: Prompt
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
  zh: 提示
- en: '*Create a **YouTube thumbnail (16:9 aspect ratio)** showing a **shocked or
    frustrated author** —man or woman—**holding a book** and looking confused or upset.*'
  id: totrans-216
  prefs: []
  type: TYPE_NORMAL
  zh: '*创建一个**YouTube缩略图（16:9宽高比**），展示一个**震惊或沮丧的作者**——男性或女性——**拿着一本书**，看起来困惑或沮丧*。'
- en: '*Use a **blurred city background** to create isolation or overwhelm, and apply
    **high-contrast lighting** for emotional intensity.*'
  id: totrans-217
  prefs: []
  type: TYPE_NORMAL
  zh: '*使用**模糊的城市背景**来创造隔离感或压倒感，并应用**高对比度照明**以增强情感强度*。'
- en: '*Add **bold red uppercase text** that says:*'
  id: totrans-218
  prefs: []
  type: TYPE_NORMAL
  zh: '*添加**粗体大写红色文字**，写着：*'
- en: '***“WHY IS NO ONE BUYING MY BOOK?”***'
  id: totrans-219
  prefs: []
  type: TYPE_NORMAL
  zh: '***“为什么没有人买我的书？”***'
- en: '*Optionally, include a **script-style subtitle** in the bottom corner that
    reads: “Author Confessions”*'
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
  zh: '*可选地，在底部角落包含一个**脚本式字幕**，内容为：“作者忏悔”*'
- en: '*The image should convey the emotional pain of self-doubt and lack of sales—perfect
    for authors struggling with visibility or marketing.*'
  id: totrans-221
  prefs: []
  type: TYPE_NORMAL
  zh: '*图像应传达自我怀疑和缺乏销售带来的情感痛苦——非常适合那些在可见性或营销方面挣扎的作者。*'
- en: 'The result could be like this:'
  id: totrans-222
  prefs: []
  type: TYPE_NORMAL
  zh: 结果可能如下所示：
- en: '![Create a YouTube thumbnail (16:9 aspect ratio) showing a shocked or frustrated
    author—man or woman—holding a book and looking confused or upset.](Image00012.jpg)'
  id: totrans-223
  prefs: []
  type: TYPE_IMG
  zh: '![创建一个显示震惊或沮丧的作者（男性或女性）手持一本书，看起来困惑或生气的YouTube缩略图（16:9宽高比）](Image00012.jpg)'
- en: You can also ask ChatGPT 4o’s new AI feature to create things like logos, banners,
    and other visual branding graphics for you.
  id: totrans-224
  prefs: []
  type: TYPE_NORMAL
  zh: 你还可以要求ChatGPT 4o的新AI功能为你创建像标志、横幅和其他视觉品牌图形这样的东西。
- en: Just be clear about what you want and specific. If you ever need help, you can
    give AI an example of the type of style you're looking for, and ask it to help
    you create the right prompt for what you need.
  id: totrans-225
  prefs: []
  type: TYPE_NORMAL
  zh: 只需明确你想要什么，具体说明。如果你需要帮助，你可以给AI一个你想要的风格类型的例子，并要求它帮助你创建正确的提示语来满足你的需求。
- en: Continuity in Prompting
  id: totrans-226
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 提示语的连续性
- en: As you can see, it doesn’t always get it perfect on the first try. No image
    generator does that all the time because it’s not able to read your mind. But
    with a few small tweak prompts, you can get what you want.
  id: totrans-227
  prefs: []
  type: TYPE_NORMAL
  zh: 如你所见，它并不总是第一次就能做到完美。没有哪个图像生成器总是能这么做，因为它无法读取你的思想。但通过几个小的调整提示，你可以得到你想要的东西。
- en: 'Nobody wants to have to start from scratch, and now you don''t have to. Just
    type your instructions like you would revisions to a human designer, whether it''s
    a small or large adjustment using a follow-up prompt. If you want to keep most
    of the image but just change certain things or one element, be very direct in
    telling it to: “Keep everything about this image, but change [item] to [preference].”'
  id: totrans-228
  prefs: []
  type: TYPE_NORMAL
  zh: 没有人想从头开始，现在你不必这么做。就像对人类设计师进行修订一样，输入你的指令，无论是使用后续提示进行小的还是大的调整。如果你想保留大部分图像但只改变某些事物或一个元素，请非常直接地告诉它：“保留这张图像的每一部分，但将[项目]改为[偏好]。”
- en: ChatGPT now understands that you are referencing the previous image, which is
    something DALL-E didn't grasp. You don't have to retype your entire original prompt
    or redescribe anything.
  id: totrans-229
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT现在能理解你在引用之前的图像，这是DALL-E无法掌握的。你不必重新输入整个原始提示或重新描述任何内容。
- en: You can be specific about whether or not you want to zoom in or zoom out of
    the picture, add more white space, correct a hand that may have too many fingers
    or a weird facial expression, and more.
  id: totrans-230
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以具体说明是否想要放大或缩小图片，添加更多空白空间，纠正可能手指过多或面部表情奇怪的手，等等。
- en: Sometimes, you may want AI to start over from scratch. If that's the case, clean
    up your prompt instead of trying to patch up the original output. You can even
    ask AI to help you revise the prompt so that it gives you more of what you're
    looking for.
  id: totrans-231
  prefs: []
  type: TYPE_NORMAL
  zh: 有时，你可能想让AI从头开始。如果是这种情况，清理你的提示语而不是试图修补原始输出。你甚至可以要求AI帮助你修改提示语，以便它能给你更多你想要的东西。
- en: 'Prompt:'
  id: totrans-232
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '*Create a digital image of a distressed woman in her 30s with shoulder-length,
    wavy brown hair standing in a city setting. She is holding a book titled "MY PRODUCT",
    with the entire title clearly visible (no cropping). Her expression should show
    frustration or confusion—wide eyes, furrowed brow, parted lips. Use a blurred
    urban background and bold red text that reads: “WHY IS NO ONE BUYING MY PRODUCT?”
    The book title must be fully legible and uncropped.*'
  id: totrans-233
  prefs: []
  type: TYPE_NORMAL
  zh: '*创建一张30多岁、肩部长发波浪状棕发的焦虑女性的数字图像，她站在城市环境中。她手持一本名为“我的产品”的书，整本书名清晰可见（无裁剪）。她的表情应表现出挫败或困惑——睁大的眼睛，皱眉，嘴唇分开。使用模糊的城市背景和醒目的红色文字，内容为：“为什么没有人买我的产品？”书名必须完全可辨认且无裁剪。*'
- en: 'The resulting image:'
  id: totrans-234
  prefs: []
  type: TYPE_NORMAL
  zh: 生成的图像：
- en: '![Create a digital image of a distressed woman in her 30s with shoulder-length,
    wavy brown hair standing in a city setting. She is holding a book titled "MY PRODUCT",](Image00013.jpg)'
  id: totrans-235
  prefs: []
  type: TYPE_IMG
  zh: '![创建一张30多岁、肩部长发波浪状棕发的焦虑女性的数字图像，她站在城市环境中。她手持一本名为“我的产品”的书，](Image00013.jpg)'
- en: Another great thing for marketers is that this feature has upscaling built into
    the ChatGPT 4o image generator. That means you can ask for a higher resolution
    version or for it to sharpen the image so you can use it a variety of ways.
  id: totrans-236
  prefs: []
  type: TYPE_NORMAL
  zh: 对于营销人员来说，另一个好处是ChatGPT 4o图像生成器内置了升级功能。这意味着你可以要求更高分辨率的版本，或者让它锐化图像，以便以多种方式使用。
- en: 'As with your text content in ChatGPT, you can also ask for split test variations.
    For example, you can prompt it like this:'
  id: totrans-237
  prefs: []
  type: TYPE_NORMAL
  zh: 就像你在ChatGPT中的文本内容一样，你还可以要求进行分割测试变体。例如，你可以这样提示：
- en: Prompt
  id: totrans-238
  prefs: []
  type: TYPE_NORMAL
  zh: 提示
- en: '*Give me 4 variations of this image ad with different colors for the background,”
    or “Show me 5 alternate poses using the same model.*'
  id: totrans-239
  prefs: []
  type: TYPE_NORMAL
  zh: '*给我这个图像广告的4种不同背景颜色的变体，”或者“用同一模型展示5个不同的姿势。*'
- en: Resulting in 4 images of the same author in different poses.
  id: totrans-240
  prefs: []
  type: TYPE_NORMAL
  zh: 结果产生了4张同一作者的不同姿势的图片。
- en: '![Give me 4 variations of this image ad with different colors for the background](Image00014.jpg)'
  id: totrans-241
  prefs: []
  type: TYPE_IMG
  zh: '![给我这个图像广告的4种不同背景颜色的变体](Image00014.jpg)'
- en: This way, you can test out the various attention-grabbing elements and even
    the psychology of your consumer without having to rebuild an entire image each
    and every time.
  id: totrans-242
  prefs: []
  type: TYPE_NORMAL
  zh: 这样，你可以测试各种吸引注意力的元素，甚至消费者的心理学，而无需每次都重建整个图像。
- en: 'Hint: You can try this on your own, or with me. Follow along on the challenge
    - [https://<wbr> susanjagannath.<wbr> gumroad.<wbr> com/<wbr> l/<wbr> TCA-1](https://susanjagannath.gumroad.com/l/TCA-1)'
  id: totrans-243
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：你可以自己尝试，或者和我一起。跟随挑战——[https://<wbr> susanjagannath.<wbr> gumroad.<wbr> com/<wbr>
    l/<wbr> TCA-1](https://susanjagannath.gumroad.com/l/TCA-1)
- en: '6'
  id: totrans-244
  prefs: []
  type: TYPE_NORMAL
  zh: '6'
- en: Creating Images That Tell Your Brand Story
  id: totrans-245
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 创建讲述品牌故事的照片
- en: By now, you probably have the basics down when it comes to using ChatGPT 4o
    for your online image needs. Next, you can start leveraging some of the more advanced
    concepts for your online creativity.
  id: totrans-246
  prefs: []
  type: TYPE_NORMAL
  zh: 到现在为止，你可能已经掌握了使用ChatGPT 4o满足你的在线图像需求的基础。接下来，你可以开始利用一些更高级的概念来发挥你的在线创造力。
- en: 'Storytelling: Images That Tell Your Brand''s Story'
  id: totrans-247
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 故事讲述：用图片讲述你的品牌故事
- en: For example, maybe you want some storytelling sequence images instead of a single
    image that takes the reader of your content on a journey with a visual progression.
    For example, you might want to publishing a carousel post on Facebook and you
    want the first image to show a person who looks stressed out at their workplace
    desk. The second image could show them discovering an online solution. And the
    third can show them confidently working from their laptop at home or on a beach.
  id: totrans-248
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，你可能想要一些故事讲述序列图像，而不是单一图像，后者将读者的内容通过视觉进展带入旅程。例如，你可能想在Facebook上发布一个轮播帖子，你希望第一张图像显示一个在办公桌前看起来压力很大的作者。第二张图像可以显示他们在喜马拉雅山脉的作家
    retreat。第三张可以显示他们自信地在家或海滩上的笔记本电脑前工作。
- en: 'Here is the prompt I used:'
  id: totrans-249
  prefs: []
  type: TYPE_NORMAL
  zh: 这是我在这里使用的提示：
- en: Prompt
  id: totrans-250
  prefs: []
  type: TYPE_NORMAL
  zh: 提示
- en: '*Hi chat, I want some storytelling sequence images instead of a single image
    that takes the reader of my content on a journey with a visual progression. Create
    a carousel post on Facebook and I want the first image to show an author who looks
    stressed out at their workplace desk. The second image could show them at a writers
    retreat in the Himalayas. And the third can show them confidently holding a completed
    book. Do you need any more info from me?*'
  id: totrans-251
  prefs: []
  type: TYPE_NORMAL
  zh: '*嗨Chat，我想要一些故事讲述序列图像，而不是单一图像，后者将读者的内容通过视觉进展带入旅程。创建一个Facebook的轮播帖子，我想要第一张图像显示一个在办公桌前看起来压力很大的作者。第二张图像可以显示他们在喜马拉雅山脉的作家retreat。第三张可以显示他们自信地拿着一本完成的书籍。你需要从我这里得到更多信息吗？*'
- en: 'Chat then asked me for size, gender, book title. I responded:'
  id: totrans-252
  prefs: []
  type: TYPE_NORMAL
  zh: Chat随后问我需要什么尺寸、性别、书名。我回答：
- en: Prompt
  id: totrans-253
  prefs: []
  type: TYPE_NORMAL
  zh: 提示
- en: '*Make it a middle-aged woman, make the book cover generic "My Book", size for
    1:1.” Yes add a caption for each*'
  id: totrans-254
  prefs: []
  type: TYPE_NORMAL
  zh: '*将其制作成一个中年女性的形象，封面为通用的“我的书”，尺寸为1:1。”是的，为每个都添加一个标题*'
- en: 'AI can deliver all 3 images for you to use, so that your storytelling creates
    an arc in pictures for the audience, not just text. This keeps them immersed on
    a more layered, and in-depth basis – grabbing (and retaining) their attention.
    This is what I got and it was right first time:'
  id: totrans-255
  prefs: []
  type: TYPE_NORMAL
  zh: AI可以为你提供所有3张图片供你使用，这样你的故事讲述就能在图片中创造一个弧线，而不仅仅是文字。这能让观众更加沉浸，在更深层的基础上抓住（并保持）他们的注意力。这是我第一次得到的结果，而且完全正确：
- en: '![Hi chat, I want some storytelling sequence images instead of a single image
    that takes the reader of my content on a journey with a visual progression. Create
    a carousel post on Facebook and I want the first image to show an author who looks
    stressed out at their workplace desk. The second image could show them at a writers
    retreat in the Himalayas. And the third can show them confidently holding a completed
    book. Do you need any more info from me?](Image00015.jpg)'
  id: totrans-256
  prefs: []
  type: TYPE_IMG
  zh: '![嗨Chat，我想要一些故事讲述序列图像，而不是单一图像，后者将读者的内容通过视觉进展带入旅程。创建一个Facebook的轮播帖子，我想要第一张图像显示一个在办公桌前看起来压力很大的作者。第二张图像可以显示他们在喜马拉雅山脉的作家retreat。第三张可以显示他们自信地拿着一本完成的书籍。你需要从我这里得到更多信息吗？](Image00015.jpg)'
- en: And here’s a secret - I then asked Chat to share the prompt it had created.
  id: totrans-257
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一个秘密——我随后要求Chat分享它创建的提示。
- en: 'This is the prompt that ChatGPT created for itself:'
  id: totrans-258
  prefs: []
  type: TYPE_NORMAL
  zh: 这是ChatGPT为自己创建的提示：
- en: '*Create a **square 1:1 triptych** of three cohesive, semi-realistic digital
    illustrations showing the transformation of a **middle-aged woman author** .*'
  id: totrans-259
  prefs: []
  type: TYPE_NORMAL
  zh: '*创建一个**1:1比例的三联画**，展示三个连贯、半现实主义的数字插画，展示**中年女作家**的转变。*'
- en: '***Panel 1 – ‘Stuck and Stressed’** : She sits at a cluttered office desk,
    looking frustrated or overwhelmed. There are scattered papers, coffee cups, a
    blinking laptop screen, and dim indoor lighting. She''s wearing office clothes.
    The mood is tense.*'
  id: totrans-260
  prefs: []
  type: TYPE_NORMAL
  zh: '***第一部分 – ‘陷入困境和压力’**： 她坐在一个杂乱的办公桌前，看起来沮丧或不知所措。散落着纸张、咖啡杯、闪烁的笔记本电脑屏幕，室内光线昏暗。她穿着办公室服装。氛围紧张。'
- en: '***Panel 2 – ‘Escape to Clarity’** : The same woman, now relaxed and inspired,
    sits at a wooden table with a notebook or journal, writing peacefully. The setting
    is a Himalayan retreat—misty mountains in the background, natural wooden structures,
    lush greenery, warm natural light. She''s in casual, cozy outdoor wear.*'
  id: totrans-261
  prefs: []
  type: TYPE_NORMAL
  zh: '***第二部分 – ‘逃向清晰’**： 同样的女人，现在放松且充满灵感，坐在一张木桌上，手里拿着笔记本或日记本，平静地写着。背景是喜马拉雅山避难所——背景中是雾蒙蒙的山峦，自然木结构，郁郁葱葱的绿色植被，温暖的自然光线。她穿着休闲舒适的户外服装。'
- en: '***Panel 3 – ‘Triumphant Author’** : The same woman, smiling confidently, proudly
    holds a completed book titled ‘My Book’. She stands in a bright, welcoming space
    like a small bookstore or home library. Copies of her book are displayed behind
    her. The mood is celebratory and peaceful.*'
  id: totrans-262
  prefs: []
  type: TYPE_NORMAL
  zh: '***第三部分 – ‘胜利的作家’**： 同样的女人，自信地微笑着，自豪地拿着一本名为《我的书》的完成书籍。她站在一个明亮、欢迎的空间里，像一个小书店或家庭图书馆。她的书在背后展示。氛围庆祝且平和。'
- en: '*Keep the character consistent in all three panels (same face, hair, outfit
    variations). Use a warm, natural colour palette. The style should be semi-realistic,
    soft and storytelling driven. Add a faint caption title in each panel: ‘Stuck
    and Stressed’, ‘Escape to Clarity’, and ‘Triumphant Author’.* "'
  id: totrans-263
  prefs: []
  type: TYPE_NORMAL
  zh: '*在所有三个画板中保持角色的一致性（相同的面孔、发型、服装变化）。使用温暖、自然的色彩调色板。风格应该是半现实主义的、柔和的、以叙事为驱动。在每个画板中添加一个微弱的标题字幕：‘陷入困境和压力’，‘逃向清晰’，和‘胜利的作家’。*'
- en: 'Here’s a personalised one: wait for this – that ChatGPT suggested! It asked
    if I wanted a personalised one!'
  id: totrans-264
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一个个性化的例子：等等看——ChatGPT建议的！它问我是否想要一个个性化的提示！
- en: The latest version of Chat remembers previous chats where I had uploaded my
    image, and it remembers that I write books about the Camino.
  id: totrans-265
  prefs: []
  type: TYPE_NORMAL
  zh: Chat的最新版本记得我之前上传过图片的聊天，并且记得我写过关于圣地亚哥朝圣之路的书。
- en: '![Hi chat, I want some storytelling sequence images instead of a single image
    that takes the reader of my content on a journey with a visual progression. Create
    a carousel post on Facebook and I want the first image to show an author who looks
    stressed out at their workplace desk. The second image could show them at a writers
    retreat in the Himalayas. And the third can show them confidently holding a completed
    book.](Image00016.jpg)'
  id: totrans-266
  prefs: []
  type: TYPE_IMG
  zh: '![Hi chat, 我想要一系列的叙事序列图像，而不是一张读者可以通过视觉进展体验的单一图像。在Facebook上创建一个轮播帖子，我想第一张图像展示一个在办公桌前看起来压力很大的作者。第二张图像可以展示他们在喜马拉雅山的作家避难所。第三张可以展示他们自信地拿着一本完成的书籍。](Image00016.jpg)'
- en: 'Metaphors: Powerful Visual Metaphors Made Easy'
  id: totrans-267
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 隐喻：轻松制作强大的视觉隐喻
- en: 'There are many images in the online marketing world that show a type of metaphor.
    You can use AI to create images that represent things like an author finally writing
    his book. You might prompt something like this:'
  id: totrans-268
  prefs: []
  type: TYPE_NORMAL
  zh: 在网络营销界有许多图像展示了某种隐喻。你可以使用AI创建代表诸如作者最终完成他的书之类的图像。你可能会有这样的提示：
- en: Prompt
  id: totrans-269
  prefs: []
  type: TYPE_NORMAL
  zh: 提示
- en: '*Show a metaphorical image of a person stepping through a concrete wall into
    a beautiful, brilliantly bright space showcasing their breakthrough.*'
  id: totrans-270
  prefs: []
  type: TYPE_NORMAL
  zh: '*展示一个人穿过混凝土墙进入一个美丽、明亮的空间的隐喻图像，展示他们的突破。*'
- en: ChatGPT 4o can take an emotional or metaphorical concept and turn it into a
    visual that a regular stock photograph could not do for you. Or you would have
    to search long and hard for it.
  id: totrans-271
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT 4o可以将情感或隐喻概念转化为普通股票照片无法为你做到的视觉图像。或者你可能需要长时间且艰苦地寻找。
- en: In this case, as I have been generating images for authors, Chat has added “Writer’s
    Block” to the image.
  id: totrans-272
  prefs: []
  type: TYPE_NORMAL
  zh: 在这种情况下，因为我一直在为作者生成图像，Chat在图像中添加了“写作障碍”。
- en: This is great for your social media content, emails, lead magnets, and other
    items.
  id: totrans-273
  prefs: []
  type: TYPE_NORMAL
  zh: 这非常适合你的社交媒体内容、电子邮件、吸引潜在客户的工具和其他物品。
- en: '![Show a metaphorical image of a person stepping through a concrete wall into
    a beautiful, brilliantly bright space showcasing their breakthrough.](Image00017.jpg)'
  id: totrans-274
  prefs: []
  type: TYPE_IMG
  zh: '![展示一个人穿过混凝土墙进入一个美丽、明亮的空间的隐喻性图像，展示他们的突破。](Image00017.jpg)'
- en: Slideshows or Online courses
  id: totrans-275
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 演示文稿或在线课程
- en: 'If you are like me, you’ve probably avoided things like webinars or online
    courses simply because they require images. Slideshows, thumbnails, backgrounds—it
    can feel like a design headache waiting to happen. But here’s the truth: **you
    don’t need to be a designer** anymore. AI tools can now generate slide visuals,
    video backgrounds, and course graphics that follow a consistent theme—matching
    your topic, tone, or even your book’s aesthetic.'
  id: totrans-276
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你像我一样，你可能因为需要图片而避免像网络研讨会或在线课程这样的东西。幻灯片、缩略图、背景——这可能感觉像是一个即将到来的设计头痛。但事实是：**你不再需要是一名设计师**。现在，AI工具可以生成遵循一致主题的幻灯片视觉、视频背景和课程图形——匹配你的主题、语气，甚至是你书的审美。
- en: Prompt
  id: totrans-277
  prefs: []
  type: TYPE_NORMAL
  zh: 提示
- en: '*Create a **16:9 landscape** parchment background with warm golden texture
    and soft light from the top left.*'
  id: totrans-278
  prefs: []
  type: TYPE_NORMAL
  zh: '*创建一个**16:9的风景**羊皮纸背景，具有温暖的金色纹理和从左上角发出的柔和光线。*'
- en: '*Place a **tiny, minimalist line drawing** of a **vintage typewriter** at the
    **exact bottom centre** , with **no shadow** and **no heavy realism** — only simple,
    elegant ink-style lines.*'
  id: totrans-279
  prefs: []
  type: TYPE_NORMAL
  zh: '*将一张**微型、简约的线条绘图**的**复古打字机**放置在**底部正中央**，**无阴影**和**无厚重现实主义**——只有简单、优雅的墨水风格线条。*'
- en: '![Create a 16:9 landscape parchment background with warm golden texture and
    soft light from the top left. Place a tiny, minimalist line drawing of a vintage
    typewriter at the exact bottom centre, with no shadow and no heavy realism — only
    simple, elegant ink-style lines.](Image00018.jpg)'
  id: totrans-280
  prefs: []
  type: TYPE_IMG
