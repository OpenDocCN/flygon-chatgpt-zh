    ****a**re** ****t**he** ****pos**itiv**e ****imp**act**s ****o**f** ****recy**clin**g
    ****o**n** ****t**he** ****envi**ronmen**t?"'
  id: totrans-403
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '****Gi**ve** ****t**he** ****mo**del** ****t**he** ****con**tex**t "****Recy**clin**g****is****a****n****im**po**rt**a**n**t****pro**ce**s**s****f**or****so**li**d****w**a**s**t**e****m**a**n**a**g**e**m**e**n**t****,****re**d**u**c**i**n**g****t**he****a**m**o**u**n**t****o**f****w**a**s**t**e****t**h**a**t****g**o**e**s****t**o****l**a**n**d**f**i**l**l**s."****a**nd****a**sk****t**he****mo**d**e**l****t**o****e**x**p**l**a**i**n****"****Wh**at****a**re****t**he****p**o**s**i**t**i**v**e****i**m**p**a**c**t**s****o**f****r**e**c**y**c**l**i**n**g****o**n****t**he****e**n**v**i**r**o**n**m**e**n**t**?"**'
- en: '****Gi**ve** ****t**he** ****mo**del** ****t**he** ****con**tex**t "****Poll**inatin**g
    ****ani**mal**s, ****su**ch** ****a**s** ****be**es**, ****pl**ay** ****a****
    ****vi**tal** ****ro**le** ****i**n** ****t**he** ****repr**oducti**on ****o**f**
    ****ma**ny** ****pl**ant**s, ****ens**urin**g ****fo**od** ****prod**uctio**n."
    ****a**nd** ****th**en** ****a**sk** "****W**hy** ****i**s** ****prot**ectin**g
    ****be**es** ****cru**cia**l ****f**or** ****agri**cultur**e?"'
  id: totrans-404
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**给出模型上下文“传粉动物，如蜜蜂，在许多植物的繁殖中扮演着至关重要的角色，确保食物生产。”然后问“为什么保护蜜蜂对农业至关重要？”**'
- en: '****Pro**vid**e ****con**tex**t "****Arti**ficia**l ****inte**lligen**ce ****i**s**
    ****incr**easing**ly ****pre**sen**t ****i**n** ****o**ur** ****da**ily** ****li**ves**,
    ****fr**om** ****vir**tua**l ****assi**stant**s ****t**o** ****med**ica**l ****diag**nostic**s."
    ****a**nd** ****a**sk** "****Wh**at** ****a**re** ****t**he** ****ben**efit**s
    ****a**nd** ****chal**lenge**s ****o**f** ****app**lyin**g ****arti**ficia**l
    ****inte**lligen**ce ****i**n** ****med**icin**e?"'
  id: totrans-405
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**提供上下文“人工智能日益在我们的日常生活中出现，从虚拟助手到医疗诊断。”然后问“应用人工智能在医学中的好处和挑战是什么？”**'
- en: '****9****. ****Elim**inatio**n'
  id: totrans-406
  prefs: []
  type: TYPE_NORMAL
  zh: '**9**. **消除**'
- en: '[****Wh**at** ****i**s** ]'
  id: totrans-407
  prefs: []
  type: TYPE_NORMAL
  zh: '[**什么是**]'
- en: '****Elim**inatio**n , ****o**r** ****Elim**inatio**n, ****i**s** ****a****
    ****pr**omp**t ****engi**neerin**g ****tech**niqu**e ****th**at** ****con**sist**s
    ****o**f** ****expl**icitl**y ****lim**itin**g ****t**he** ****info**rmatio**n
    ****o**r** ****pers**pectiv**es ****th**at** ****sh**oul**d ****n**ot** ****b**e**
    ****inc**lude**d ****i**n** ****t**he** ****L**LM** ****res**pons**e. ****T**he**
    ****fo**cus** ****i**s** ****o**n** ****filt**erin**g ****o**ut** ****irre**levan**t
    ****info**rmatio**n ****o**r** ****elim**inatin**g ****unw**ante**d ****appr**oache**s,
    ****s**o** ****th**at** ****t**he** ****mo**del** ****gene**rate**s ****a****
    ****res**pons**e ****ali**gne**d ****wi**th** ****wh**at** ****re**all**y ****mat**ter**s.'
  id: totrans-408
  prefs: []
  type: TYPE_NORMAL
  zh: '**消除**，或称为**消除法**，是一种**提示工程**技术，它包括明确限制不应包含在LLM响应中的信息或视角。**重点**在于过滤掉无关信息或消除不希望的方法，从而使模型生成的响应与真正重要的事项保持一致。'
- en: '****T**he** ****elim**inatio**n ****tech**niqu**e ****inv**olve**s ****as**kin**g
    ****t**he** ****L**LM** ****t**o** ****disr**egar**d ****cer**tai**n ****ele**ment**s,
    ****te**rms**, ****o**r** ****det**ail**s ****wh**ile** ****cra**ftin**g ****t**he**
    ****res**pons**e. ****Th**is** ****app**roac**h ****i**s** ****espe**ciall**y
    ****us**efu**l ****f**or** ****narr**owin**g ****t**he** ****sc**ope** ****o**f**
    ****t**he** ****res**pons**e ****a**nd** ****ens**urin**g ****th**at** ****t**he**
    ****con**ten**t ****i**s** ****hi**ghl**y ****foc**use**d ****a**nd** ****fr**ee**
    ****o**f** ****dist**ractio**ns ****o**r** ****ambi**guitie**s.'
  id: totrans-409
  prefs: []
  type: TYPE_NORMAL
  zh: '**消除技术涉及让LLM在构建响应时忽略某些元素、术语或细节。这种方法特别适用于缩小响应范围并确保内容高度聚焦，不受干扰或歧义的影响。**'
- en: '[****Wh**at** ****i**s** ****yo**ur** ****ma**in** ****go**al** ?]'
  id: totrans-410
  prefs: []
  type: TYPE_NORMAL
  zh: '[**你的主要目标是什么**？]'
- en: '****T**he** ****ma**in** ****go**al** ****o**f** ****Elim**inatio**n ****i**s**
    ****t**o** ****inc**reas**e ****t**he** ****rele**vanc**e ****a**nd** ****cla**rit**y
    ****o**f** ****t**he** ****L**LM** ****res**pons**e ****b**y** ****rem**ovin**g
    ****fr**om** ****t**he** ****con**tex**t ****a**ny** ****ty**pe** ****o**f** ****no**ise**
    ****o**r** ****ele**ment**s ****th**at** ****co**uld** ****le**ad** ****t**o**
    ****a**n** ****ov**erl**y ****br**oad** ****o**r** ****scat**tere**d ****res**pons**e.
    ****Of**ten**, ****t**he** ****mo**del** ****m**ay** ****inc**lud**e ****info**rmatio**n
    ****th**at**, ****alt**houg**h ****cor**rec**t, ****i**s** ****n**ot** ****us**efu**l
    ****f**or** ****t**he** ****us**er**''****s**** ****spe**cifi**c ****pur**pos**e.
    ****T**he** ****elim**inatio**n ****tech**niqu**e ****he**lps** ****t**o** ****av**oid**
    ****th**is**.'
  id: totrans-411
  prefs: []
  type: TYPE_NORMAL
  zh: '**消除**的主要目标是通过对上下文中任何可能导致答案过于宽泛或分散的噪音或元素进行移除，从而提高LLM响应的相关性和清晰度。通常，模型可能包含对用户特定目的来说虽然正确但并非有用的信息。消除技术有助于避免这种情况。'
- en: '****Ano**the**r ****go**al** ****i**s** ****t**o** ****ma**ke** ****yo**ur**
    ****an**swe**r ****mo**re** ****effi**cien**t ****a**nd** ****t**o** ****t**he**
    ****po**int**. ****Th**is** ****i**s** ****espe**ciall**y ****impo**rtan**t ****i**n**
    ****situ**ation**s ****wh**ere** ****th**ere** ****i**s** ****a**** ****l**ot**
    ****o**f** ****info**rmatio**n ****o**n** ****a**** ****to**pic**, ****b**ut**
    ****y**ou** ****ju**st** ****wa**nt** ****a**** ****foc**use**d, ****spe**cifi**c
    ****an**swe**r. ****T**he** ****tech**niqu**e ****c**an** ****al**so** ****b**e**
    ****us**ed** ****t**o** ****av**oid** ****cer**tai**n ****an**gle**s ****th**at**
    ****y**ou** ****d**on**’****t**** ****wa**nt**, ****su**ch** ****a**s** ****elim**inatin**g
    ****scie**ntifi**c ****ja**rgo**n ****wh**en** ****yo**ur** ****aud**ienc**e ****i**s**
    ****a**** ****layp**erso**n.'
  id: totrans-412
  prefs: []
  type: TYPE_NORMAL
  zh: '**另一个**目标是使你的答案更加高效和具体。这在信息量很大，但你只想得到一个专注、具体答案的情况下尤为重要。该技术还可以用来避免你不想涉及的某些角度，例如，当你的听众是非专业人士时，消除科学术语。'
- en: '[****H**ow** ****i**t** ****wo**rks** ]'
  id: totrans-413
  prefs: []
  type: TYPE_NORMAL
  zh: '[**如何工作**]'
- en: '****Elim**inatio**n ****wo**rks** ****b**y** ****incl**udin**g ****a**** ****pr**omp**t
    ****i**n** ****t**he** ****pr**omp**t ****expl**icitl**y ****indi**catin**g ****wh**ich**
    ****ele**ment**s ****sh**oul**d ****b**e** ****avo**ide**d. ****T**he** ****us**er**
    ****inst**ruct**s ****t**he** ****L**LM** ****n**ot** ****t**o** ****men**tio**n
    ****o**r** ****con**side**r ****cer**tai**n ****asp**ect**s, ****wh**ich** ****nar**row**s
    ****t**he** ****sc**ope** ****o**f** ****t**he** ****res**pons**e. ****Th**is**
    ****m**ay** ****inc**lud**e ****te**rms**, ****to**pic**s, ****exa**mple**s, ****o**r**
    ****lan**guag**e ****st**yle**s ****th**at** ****sh**oul**d ****n**ot** ****b**e**
    ****us**ed**.'
  id: totrans-414
  prefs: []
  type: TYPE_NORMAL
  zh: '**消除**通过在提示中包含一个提示来实现，该提示明确指出应避免哪些元素。用户指示LLM不要提及或考虑某些方面，这缩小了响应的范围。这可能包括术语、主题、示例或不应使用的语言风格。'
- en: '****F**or** ****exa**mpl**e, ****i**f** ****y**ou**’****r**e** ****loo**kin**g
    ****f**or** ****a**** ****simp**lifie**d ****expl**anatio**n ****o**f** ****gra**vit**y
    ****f**or** ****a**** ****ch**ild**, ****y**ou** ****mi**ght** ****a**sk** ****t**he**
    ****L**LM** ****t**o**: “****Exp**lai**n ****wh**at** ****gra**vit**y ****i**s**,
    ****b**ut** ****d**on**’****t**** ****u**se** ****com**ple**x ****scie**ntifi**c
    ****te**rms**.” ****Ano**the**r ****exa**mpl**e ****mi**ght** ****b**e**: “****Wh**at**
    ****a**re** ****t**he** ****ben**efit**s ****o**f** ****a**** ****vege**taria**n
    ****di**et**, ****b**ut** ****d**on**’****t**** ****men**tio**n ****envir**onment**al
    ****asp**ect**s.” ****Th**is** ****ty**pe** ****o**f** ****pr**omp**t ****ens**ure**s
    ****th**at** ****t**he** ****an**swe**r ****i**s** ****foc**use**d ****o**n**
    ****exa**ctl**y ****wh**at** ****t**he** ****us**er** ****ne**eds**, ****wit**hou**t
    ****dist**ractin**g ****info**rmatio**n.'
  id: totrans-415
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，如果你在为一个孩子寻找关于引力的简化解释，你可能会要求LLM说：“**解释什么是引力，但不要使用复杂的科学术语**。”另一个例子可能是：“**素食饮食有哪些好处，但不要提及环境方面。”**这种类型的提示确保答案专注于用户确切需要的内容，而不包含分散信息。
- en: '****Th**is** ****tech**niqu**e ****c**an** ****al**so** ****b**e** ****us**efu**l
    ****f**or** ****avo**idin**g ****info**rmatio**n ****th**at** ****m**ay** ****b**e**
    ****sens**itiv**e ****o**r** ****n**ot** ****pert**inen**t ****t**o** ****t**he**
    ****con**tex**t. ****Th**is** ****he**lps** ****t**o** ****ke**ep** ****t**he**
    ****res**pons**e ****appr**opriat**e ****f**or** ****t**he** ****spe**cifi**c
    ****aud**ienc**e ****a**nd** ****av**oid**s ****unw**ante**d ****info**rmatio**n,
    ****ma**kin**g ****t**he** ****inte**ractio**n ****mo**re** ****cont**rolle**d.'
  id: totrans-416
  prefs: []
  type: TYPE_NORMAL
  zh: 这种**技术**也可以用来避免包含敏感或不相关的信息。这有助于保持对特定受众的回应适当，并避免不必要的信息，使互动更加可控。
- en: '[****Wh**en** ****t**o** ****u**se** ]'
  id: totrans-417
  prefs: []
  type: TYPE_NORMAL
  zh: '[**何时使用**]'
- en: '****Elim**inatio**n ****sh**oul**d ****b**e** ****us**ed** ****wh**en** ****t**he**
    ****to**pic** ****h**as** ****a**** ****l**ot** ****o**f** ****pos**sibl**e ****info**rmatio**n,
    ****b**ut** ****y**ou** ****ne**ed** ****a**n** ****an**swe**r ****foc**use**d
    ****o**n** ****on**ly** ****o**ne** ****spe**cifi**c ****as**pec**t. ****Th**is**
    ****i**s** ****us**efu**l, ****f**or** ****exa**mpl**e, ****wh**en** ****expl**ainin**g
    ****com**ple**x ****con**cept**s ****t**o** ****a**n** ****aud**ienc**e ****th**at**
    ****do**esn**''****t**** ****ne**ed** ****tech**nica**l ****det**ail**s, ****o**r**
    ****t**o** ****ke**ep** ****t**he** ****an**swe**r ****ali**gne**d ****wi**th**
    ****a**** ****spe**cifi**c ****pur**pos**e.'
  id: totrans-418
  prefs: []
  type: TYPE_NORMAL
  zh: 当话题包含大量可能的信息，但你只需要一个专注于单一特定方面的答案时，应使用**排除法**。这在例如向不需要技术细节的受众解释复杂概念或保持答案与特定目的一致时很有用。
- en: '****I**t** ****i**s** ****reco**mmende**d ****wh**en** ****y**ou** ****wa**nt**
    ****t**o** ****elim**inat**e ****ambi**guit**y. ****Of**ten**, ****t**he** ****L**LM**
    ****c**an** ****inc**lud**e ****a**** ****lo**ng** ****an**swe**r ****th**at**
    ****addr**esse**s ****a**ll** ****asp**ect**s ****o**f** ****a**** ****to**pic**.
    ****I**f** ****y**ou** ****a**re** ****inte**reste**d ****i**n** ****ju**st**
    ****o**ne** ****pers**pectiv**e ****o**r** ****i**n** ****qu**ick**, ****di**rec**t
    ****ans**wer**s, ****us**ing** ****Elim**inatio**n ****he**lps** ****y**ou** ****li**mit**
    ****t**he** ****info**rmatio**n ****t**o** ****wh**at** ****i**s** ****tr**uly**
    ****rel**evan**t.'
  id: totrans-419
  prefs: []
  type: TYPE_NORMAL
  zh: 当你想要消除歧义时，**推荐使用**。通常，LLM可能会包含一个长答案，涵盖话题的所有方面。如果你只对某一特定视角或快速、直接的答案感兴趣，使用排除法可以帮助你将信息限制在真正相关的内容上。
- en: '****Th**is** ****tech**niqu**e ****i**s** ****al**so** ****effe**ctiv**e ****wh**en**
    ****y**ou** ****ne**ed** ****t**o** ****ad**apt** ****yo**ur** ****an**swe**r
    ****t**o** ****t**he** ****aud**ienc**e’****s**** ****le**vel** ****o**f** ****under**standi**ng.
    ****F**or** ****exa**mpl**e, ****wh**en** ****expl**ainin**g ****a**** ****scie**ntifi**c
    ****con**cep**t ****t**o** ****chi**ldre**n, ****y**ou** ****mi**ght** ****a**sk**
    ****th**em** ****n**ot** ****t**o** ****u**se** ****tech**nica**l ****te**rms**
    ****o**r** ****om**it** ****com**ple**x ****det**ail**s.'
  id: totrans-420
  prefs: []
  type: TYPE_NORMAL
  zh: 这种技巧在需要根据听众的理解水平调整你的回答时也同样有效。例如，当向孩子们解释一个科学概念时，你可能会要求他们不要使用技术术语或省略复杂细节。
- en: '[****Ti**ps** ****f**or** ****u**se**]'
  id: totrans-421
  prefs: []
  type: TYPE_NORMAL
  zh: '[**使用技巧的提示**]'
- en: ● ****B**e** ****spe**cifi**c ****ab**out** ****wh**at** ****sh**oul**d ****b**e**
    ****avo**ide**d. ****T**he** ****cle**are**r ****y**ou** ****a**re** ****ab**out**
    ****wh**at** ****sh**oul**d ****n**ot** ****b**e** ****inc**lude**d, ****t**he**
    ****mo**re** ****foc**use**d ****t**he** ****L**LM**’****s**** ****res**pons**e
    ****wi**ll** ****b**e**.
  id: totrans-422
  prefs: []
  type: TYPE_NORMAL
  zh: ● 关于应该避免的内容要具体明确。你越清楚不应该包含什么，LLM 的回答就会越聚焦。
- en: ● ****Com**bin**e ****Elim**inatio**n ****wi**th** ****ot**her** ****tech**nique**s
    ****t**o** ****inc**reas**e ****acc**urac**y. ****F**or** ****exa**mpl**e, ****pro**vid**e
    ****con**tex**t (****con**tex**t ****expa**nsio**n) ****a**nd** ****th**en** ****elim**inat**e
    ****asp**ect**s ****th**at** ****a**re** ****n**ot** ****rel**evan**t ****t**o**
    ****t**he** ****sce**nari**o ****pres**ente**d.
  id: totrans-423
  prefs: []
  type: TYPE_NORMAL
  zh: 将消除法与其他技巧结合使用可以提高准确性。例如，提供上下文（上下文扩展）然后消除与所呈现场景无关的方面。
- en: '[****T**he** ****diff**erenc**e ****o**f** ****t**he** ****tech**niqu**e ]'
  id: totrans-424
  prefs: []
  type: TYPE_NORMAL
  zh: '[**技巧的区别**]'
- en: '****Elim**inatio**n ****dif**fer**s ****fr**om** ****ot**her** ****tech**nique**s
    ****su**ch** ****a**s** ****Con**tex**t ****Expa**nsio**n , ****bec**aus**e ****wh**ile**
    ****con**tex**t ****expa**nsio**n ****ad**ds** ****info**rmatio**n ****t**o**
    ****en**ric**h ****t**he** ****an**swe**r, ****elim**inatio**n ****rem**ove**s
    ****cer**tai**n ****ele**ment**s ****t**o** ****na**rro**w ****t**he** ****sc**ope**.
    ****Th**is** ****ma**kes** ****t**he** ****an**swe**r ****tar**gete**d ****t**o**
    ****t**he** ****nece**ssar**y ****po**int**, ****elim**inatin**g ****irre**levan**t
    ****ele**ment**s.'
  id: totrans-425
  prefs: []
  type: TYPE_NORMAL
  zh: 消除法与其他技巧，如上下文扩展不同，因为虽然上下文扩展通过添加信息来丰富答案，消除法则是移除某些元素以缩小范围。这使得答案针对必要点，消除不相关元素。
- en: '****Com**pare**d ****t**o** ****Refr**amin**g , ****wh**ich** ****cha**nge**s
    ****t**he** ****pers**pectiv**e ****o**f** ****t**he** ****que**stio**n ****t**o**
    ****exp**lor**e ****a**** ****n**ew** ****po**int** ****o**f** ****vi**ew**, ****Elim**inatio**n
    ****si**mpl**y ****rem**ove**s ****unw**ante**d ****info**rmatio**n ****fr**om**
    ****t**he** ****con**tex**t ****o**f** ****t**he** ****an**swe**r. ****I**t**
    ****i**s** ****a**** ****tech**niqu**e ****th**at** ****ai**ms** ****t**o** ****re**duc**e
    ****t**he** ****sc**ope** ****a**nd** ****av**oid** ****det**ail**s ****th**at**
    ****a**re** ****n**ot** ****us**efu**l, ****wh**ile** ****Refr**amin**g ****tr**ies**
    ****t**o** ****ch**ang**e ****t**he** ****an**gle** ****o**f** ****t**he** ****pro**ble**m.'
  id: totrans-426
  prefs: []
  type: TYPE_NORMAL
  zh: 与重新审视相比，后者改变问题的视角以探索新的观点，消除法只是从答案的上下文中移除不必要的信息。它是一种旨在缩小范围和避免不相关细节的技术，而重新审视则试图改变问题的角度。
- en: '****Rega**rdin**g ****Inst**ructio**n-****ba**sed** ****Prom**ptin**g , ****wh**ere**
    ****spe**cifi**c ****inst**ructio**ns ****a**re** ****gi**ven** ****ab**out**
    ****t**he** ****fo**rma**t ****o**f** ****t**he** ****an**swe**r, ****Elim**inatio**n
    ****i**s** ****foc**use**d ****o**n** ****ens**urin**g ****wh**at** ****sh**oul**d
    ****n**ot** ****b**e** ****inc**lude**d, ****wh**ile** ****Inst**ructio**n-****ba**sed**
    ****Prom**ptin**g ****foc**use**s ****o**n** ****h**ow** ****t**he** ****res**pons**e
    ****sh**oul**d ****b**e** ****stru**cture**d. ****Elim**inatio**n ****ai**ms**
    ****t**o** ****en**sur**e ****th**at** ****t**he** ****res**pons**e ****i**s**
    ****acc**urat**e ****b**y** ****avo**idin**g ****dist**ractin**g ****ele**ment**s,
    ****wh**ile** ****de**tai**l-****ba**sed** ****inst**ructio**ns ****gu**ide**
    ****wh**at** ****sh**oul**d ****b**e** ****do**ne**.'
  id: totrans-427
  prefs: []
  type: TYPE_NORMAL
