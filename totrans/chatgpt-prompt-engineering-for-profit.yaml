    "****th**ink** ****st**ep** ****b**y** ****st**ep**," "****exp**lai**n ****ea**ch**
    ****ph**ase**," ****o**r** "****li**st** ****ea**ch** ****st**ep**."
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: ● ****使****用****鼓****励****模****型****详****细****说****明****其****步****骤****的****词****语****，****如****"****逐****步****思****考****"****、****"****解****释****每****个****阶****段****"****或****"****列****出****每****个****步****骤****"。
- en: ● ****I**f** ****y**ou** ****ne**ed** ****a**** ****ve**ry** ****det**aile**d
    ****an**swe**r, ****b**e** ****su**re** ****t**o** ****ins**truc**t ****t**he**
