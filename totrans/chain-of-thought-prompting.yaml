- en: Foreword
  id: totrans-185
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 前言
- en: The Dawn of AI
  id: totrans-186
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 人工智能的曙光
- en: We are currently at the start of a new age in IT, the age of AI. Bill Gates
    has described the invention of generative AI as revolutionary as personal computers,
    mobile phones, and the Internet.
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: 我们目前正处于信息技术新时代的开始，即人工智能时代。比尔·盖茨将生成式人工智能的发明描述为与个人电脑、移动电话和互联网一样具有革命性。
- en: As with the start of all technological revolutions, what is happening currently
    in the world of AI is a process of experimentation and discovery. The aim of this
    book is to explore this new frontier, and to become a part of this technological
    revolution.
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: 正如所有技术革命开始时一样，目前世界人工智能领域正在经历一个实验和发现的过程。本书的目的是探索这个新的前沿领域，并成为这场技术革命的一部分。
- en: Chain of Thought
  id: totrans-189
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 思维链
- en: Currently, most interactions with ChatGPT are done in a simple “one-shot” way.
    The user provides one input, such as a question, and the AI gives a single output.
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: 目前，与ChatGPT的互动大多以简单的“一次性”方式进行。用户提供一个输入，例如一个问题，人工智能给出一个单一输出。
- en: 'There are significant drawbacks to this simple way of using AI:'
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: 这种简单使用人工智能的方式存在显著的缺点：
- en: 'a) Transparency: We don’t know why the AI said what it said, since we can’t
    see the training data that made the AI give that specific response.'
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: a) 透明度：我们不知道人工智能为什么会说出那样的话，因为我们无法看到使人工智能给出那个特定响应的训练数据。
- en: 'b) Processing power: The processing power that the AI allocates to answering
    one question is limited to the processing power limits imposed by the company
    that provides it. If determining the correct answer requires more processing power
    than allocated, the AI will always give the wrong answer.'
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: b) 处理能力：人工智能用于回答一个问题的处理能力仅限于提供该服务的公司所设定的处理能力限制。如果确定正确答案需要超过分配的处理能力，人工智能将始终给出错误答案。
- en: 'c) Control: There is no way to control the way that the AI processes the initial
    question. In other words, it is impossible to guide the way that the AI thinks
    about the best way to provide an answer.'
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: c) 控制：无法控制人工智能处理初始问题的方式。换句话说，不可能引导人工智能思考提供答案的最佳方式。
- en: Another reason to think that this is not the best way to use AI is that it is
    not the way that we ourselves think and solve problems.
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个认为这不是最佳使用人工智能方式的原因是，这并不是我们自己思考和解决问题的方法。
- en: When we are presented with a complex problem, we first break the problem down
    into discrete steps, and then we solve each step to arrive at the correct conclusion.
    In other words, we follow a chain of thought. However, when an AI is presented
    with a problem and is expected to arrive at the solution “in one go”, it is not
    given the opportunity to break down its own thinking processes into discrete steps,
    before solving the problem.
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们面对一个复杂问题时，我们首先将问题分解成离散的步骤，然后解决每个步骤以达到正确的结论。换句话说，我们遵循思维链。然而，当人工智能面对一个问题并期望一次性得出解决方案时，它并没有机会在解决问题之前将其思考过程分解成离散的步骤。
- en: Therefore, instead of expecting an AI to magically give us the right answer
    to anything we ask it, it may instead be necessary to engage with AI in multiple
    problem-solving steps and guide the AI on the correct path to complete its task.
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们不应该期望人工智能能神奇地给出我们问的任何问题的正确答案，相反，可能需要与人工智能进行多步骤的问题解决互动，并引导人工智能走上正确的路径以完成其任务。
- en: That means, we can use Chain of Thought Prompting to guide the AI in creating
    its own chain of thought, and so simulate the human problem-solving process. By
    doing this we can unlock the true potential of a generative AI such as ChatGPT,
    and demonstrate that its abilities extend well beyond those which are obvious
    at first sight.
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: 这意味着，我们可以使用思维链提示来引导人工智能创建自己的思维链，从而模拟人类的问题解决过程。通过这样做，我们可以释放生成式人工智能（如ChatGPT）的真正潜力，并证明其能力远远超出了初看时的明显能力。
- en: '| ![](image_rsrc6F9.jpg) | CoT Prompting is an abbreviation of Chain of Thought
    Prompting. |'
  id: totrans-199
  prefs: []
  type: TYPE_TB
  zh: '| ![图片](image_rsrc6F9.jpg) | CoT Prompting是思维链提示的缩写。|'
- en: Structure of this Book
  id: totrans-200
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 本书结构
- en: 'This book is divided into the following sections:'
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
  zh: 本书分为以下几部分：
- en: Section I (General Problem Solving Overview) explains how people solve problems,
    and discusses how these problem-solving methods can be applied by AI.
  id: totrans-202
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 第一部分（通用问题解决概述）解释了人们是如何解决问题的，并讨论了这些问题解决方法如何被人工智能应用。
- en: Section II (Solving Hard Problems) delves into using CoT Prompting to solve
    “hard” problems, that is questions which relate to factors in the real-world.
  id: totrans-203
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 第二部分（解决难题）深入探讨了使用CoT Prompting来解决“难题”，即与现实世界因素相关的问题。
- en: Section III (Copying the Experts) explores using AI’s ability to boost its problem
    solving capabilities by simulating responses from people who are experts in the
    problem domain.
  id: totrans-204
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 第三部分（模仿专家）探讨了利用人工智能的能力通过模拟来自在问题领域内是专家的人的回应来增强其问题解决能力。
- en: Section IV (Introduction to Psychoanalysis) provides a high level introduction
    to psychoanalysis and discusses the possibility of using AI to simulate the inner
    workings of the human mind.
  id: totrans-205
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 第四部分（心理分析简介）提供了对心理分析的高级介绍，并讨论了使用人工智能模拟人类心智内部运作的可能性。
- en: Section V (Psychoanalysis using AI) uses ChatGPT 4 to perform psychoanalysis.
  id: totrans-206
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 第五部分（使用AI进行心理分析）使用ChatGPT 4进行心理分析。
- en: Section VI (Synthesizing the Human Mind) uses  a combination Transactional Analysis
    theory and ChatGPT to synthesize patterns of human thought.
  id: totrans-207
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 第六部分（综合人类心智）结合交易分析理论和ChatGPT来综合人类思维模式。
- en: Section VII (Revisiting Systems Analysis) takes a new look at systems analysis
    in a way that is more suitable for the way that AI processes information.
  id: totrans-208
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 第七部分（重新审视系统分析）以一种更适合人工智能处理信息的方式重新审视系统分析。
- en: ChatGPT 4
  id: totrans-209
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: ChatGPT 4
- en: The theory presented in this book applies to generative AI in general, however
    the worked examples in this book use ChatGPT 4\. This is because ChatGPT 4 follows
    instructions accurately, as opposed to other generative AI platforms that often
    ignore instructions and “do their own thing”.
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: 本书提出的理论适用于所有生成式人工智能，然而本书中的工作示例使用ChatGPT 4。这是因为ChatGPT 4能够准确遵循指令，而其他生成式人工智能平台往往忽视指令并“自行其是”。
- en: Join the Conversation
  id: totrans-211
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 加入对话
- en: Join the discussion on LinkedIn ([linkedin.com/groups/9586057/](https://www.linkedin.com/groups/9586057/)),
    or email me at [edward@fleetingswallow.com](mailto:edward@fleetingswallow.com).
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
  zh: 加入LinkedIn上的讨论组([linkedin.com/groups/9586057/](https://www.linkedin.com/groups/9586057/))，或通过电子邮件[edward@fleetingswallow.com](mailto:edward@fleetingswallow.com)联系我。
- en: Thank you for reading this book, I hope it repays your interest.
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
  zh: 感谢您阅读这本书，希望它能回报您的兴趣。
- en: Edward Chalk
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
  zh: Edward Chalk
- en: Section I – General Problem Solving Overview
  id: totrans-215
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第一部分 – 通用问题解决概述
- en: Discusses general principles of human problem-solving and how these principles
    can be applied by AI.
  id: totrans-216
  prefs: []
  type: TYPE_NORMAL
  zh: 讨论人类问题解决的一般原则以及这些原则如何被人工智能应用。
- en: '![](image_rsrc6FA.jpg)'
  id: totrans-217
  prefs: []
  type: TYPE_IMG
  zh: '![image_rsrc6FA](image_rsrc6FA.jpg)'
- en: This image shows Talos, the first mythical automaton, patrolling a beach. Forged
    by Hephaestus, Talos was a bronze giant tasked with protecting Crete from invaders.
    Created by Bing.
  id: totrans-218
  prefs: []
  type: TYPE_NORMAL
  zh: 这张图片展示了泰洛斯，第一个神话般的自动机器人，在海滩上巡逻。由赫菲斯托斯锻造的泰洛斯是一个青铜巨人，负责保护克里特岛免受入侵者。由必应创作。
- en: Chapter 1\. Adaptive Thinking
  id: totrans-219
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第一章：适应性思维
- en: Human Versatility
  id: totrans-220
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 人类的适应性
- en: Humans are good at solving all sorts of different problems that come their way
    in everyday life and at work. This is because they are versatile in their approach
    to solving problems and adapt their problem-solving approach to suit the challenge
    at hand.
  id: totrans-221
  prefs: []
  type: TYPE_NORMAL
  zh: 人类擅长解决日常生活中和工作中的各种问题。这是因为他们在解决问题的方法上具有适应性，并根据手头的挑战调整他们的解决问题的方法。
- en: This adaptability is called adaptive thinking.
  id: totrans-222
  prefs: []
  type: TYPE_NORMAL
  zh: 这种适应性被称为适应性思维。
- en: '| ![](image_rsrc6F9.jpg) | Adaptive thinking is the human capacity to assume
    the mode of thinking that is best suited to solve the immediate problem, and so
    achieve the optimum outcome. |'
  id: totrans-223
  prefs: []
  type: TYPE_TB
  zh: '| ![image_rsrc6F9](image_rsrc6F9.jpg) | 适应性思维是人类假设最适合解决即时问题的思维模式，从而实现最佳结果的能力。'
- en: Contextual Adaptability in AI
  id: totrans-224
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 人工智能中的情境适应性
- en: It follows that if we have to adjust our thinking mode to suit the problem at
    hand, then AI must also be trained to do the same thing, if we want it to reach
    the optimal conclusion. A generative AI model (such as ChatGPT) does this automatically,
    to a limited extent. This means that the AI automatically adjusts its mode of
    reasoning, depending on the question asked.
  id: totrans-225
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，如果我们必须调整我们的思维模式以适应手头的问题，那么如果想让人工智能达到最佳结论，它也必须接受同样的训练。生成式人工智能模型（如ChatGPT）在这方面会自动进行，但程度有限。这意味着人工智能会根据所提问题自动调整其推理模式。
- en: AI works this way because the training data that the AI references in order
    to answer the question, not only includes the information needed to answer the
    question, but also includes the sort of thinking needed for that type of question.
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能之所以这样做，是因为人工智能为了回答问题而参考的训练数据，不仅包括回答问题所需的信息，还包括回答此类问题所需的思维方式。
- en: 'For example:'
  id: totrans-227
  prefs: []
  type: TYPE_NORMAL
  zh: 例如：
- en: If an AI is asked to answer a maths question, it references training data that
    contains both the actual mathematical information that the AI needs to answer
    the question, and also the patterns of thinking used in mathematics.
  id: totrans-228
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果要求人工智能回答一个数学问题，它会参考包含人工智能回答问题所需的实际数学信息和数学中使用的思维模式的训练数据。
- en: On the other hand, if an AI is asked to write a poem, then the AI shifts to
    a less methodological approach by referencing free-style training data that contains
    information about poetry, and also the loosely structured patterns of thought
    of the creative arts.
  id: totrans-229
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 另一方面，如果要求人工智能写一首诗，那么人工智能会通过参考包含诗歌信息的自由式训练数据和创造性艺术的松散思维模式，转向一种不那么系统的方法。
- en: This AI flexibility is called Contextual Adaptability, which means that the
    AI adjusts its mode of response based on the query’s context.
  id: totrans-230
  prefs: []
  type: TYPE_NORMAL
  zh: 这种人工智能的灵活性被称为情境适应性，这意味着人工智能会根据查询的上下文调整其响应模式。
- en: Limitations of AI Contextual Adaptability
  id: totrans-231
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 人工智能情境适应性的局限性
- en: Although a generative AI such as ChatGPT 4 attempts to adjust its thinking mode
    to suit the question, there are limitations to this capability, for the following
    reasons.
  id: totrans-232
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管像ChatGPT 4这样的生成式人工智能试图调整其思维模式以适应问题，但这种能力存在局限性，原因如下。
- en: 'Limited input: The AI may have difficulty in fully understanding the type of
    problem it’s facing. This is because humans use a mixture of contextual cues,
    prior knowledge, and intuitive understanding to classify problems and decide on
    the best approach. AI, however, can only go on the text in which the user asked
    the question.'
  id: totrans-233
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 输入有限：人工智能可能难以完全理解它面临的问题类型。这是因为人类使用情境线索、先验知识和直觉理解来分类问题和决定最佳方法。然而，人工智能只能根据用户提问的文本进行。
- en: 'Limitations of NLP: The AI may also not exactly grasp nuances in the way it
    is being asked a question, due to limitations in its NLP (Natural Language Processing)
    capabilities, and its inability to decode the exact communication style of the
    questioner.'
  id: totrans-234
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 自然语言处理（NLP）的局限性：由于人工智能在自然语言处理能力上的局限性，它可能无法完全理解提问方式中的细微差别，并且无法解码提问者的确切沟通风格。
- en: Subsequently, we need to actively encourage the AI by specifying the type of
    thinking required, to match the problem we are presenting it.
  id: totrans-235
  prefs: []
  type: TYPE_NORMAL
  zh: 随后，我们需要通过指定所需的思维类型来积极鼓励AI，以匹配我们向其展示的问题。
- en: '![](image_rsrc6FB.jpg)'
  id: totrans-236
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc6FB.jpg)'
- en: A robot that can't quite understand a question asked by a human, by ChatGPT
  id: totrans-237
  prefs: []
  type: TYPE_NORMAL
  zh: 一个无法完全理解人类提出的问题的机器人，由ChatGPT提供
- en: Chapter 2\. Hard and Soft Problems
  id: totrans-238
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第二章：难题与软问题
- en: The first decision we make when faced with a real-life problem is deciding whether
    we have a hard problem or a soft problem on our hands. These two different types
    of problems require entirely different problem-solving approaches.
  id: totrans-239
  prefs: []
  type: TYPE_NORMAL
  zh: 面对现实生活中的问题时，我们首先做出的决定是判断我们是否面临一个难题或软问题。这两种不同类型的问题需要完全不同的解决问题的方法。
- en: Hard Problems
  id: totrans-240
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 难题
- en: The term hard problem as used here does not mean that the problem is difficult
    to solve. Instead it means that we are talking about a problem that can be exactly
    defined; “Is it true, or is it false?”.
  id: totrans-241
  prefs: []
  type: TYPE_NORMAL
  zh: 这里使用的“难题”一词并不意味着问题难以解决。相反，它意味着我们正在讨论一个可以精确定义的问题；“这是真的还是假的？”。
- en: Hard problems generally relate to the external world, and include physical,
    technical or data-driven issues.
  id: totrans-242
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 难题通常与外部世界相关，包括物理、技术或数据驱动的问题。
- en: Solving hard problems requires exact methods, logical reasoning and accurate
    data.
  id: totrans-243
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 解决难题需要精确的方法、逻辑推理和准确的数据。
- en: The answers to hard problems are specific, precise and measurable.
  id: totrans-244
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 难题的答案具体、精确且可衡量。
- en: Soft Problems
  id: totrans-245
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 软问题
- en: Soft problems are problems that cannot be exactly defined. They relate to qualitative
    problems or personal questions such as opinions, emotions and relationships; “Is
    it good, or is it bad?”
  id: totrans-246
  prefs: []
  type: TYPE_NORMAL
  zh: 软问题是无法精确定义的问题。它们与定性问题或个人问题相关，例如观点、情感和关系；“这是好的还是坏的？”
- en: Soft problems often occur in relation to the human condition; for example in
    fashion design, in organisational behaviour and in personal decision-making.
  id: totrans-247
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 软问题通常与人类状况相关；例如在时尚设计、组织行为和个人决策中。
- en: There is often not one correct single answer to soft problems. Instead solving
    soft problems involves subjective judgment, emotional intelligence and an understanding
    of human behaviour.
  id: totrans-248
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 软问题通常没有唯一正确的答案。解决软问题涉及主观判断、情商和对人类行为的理解。
- en: Solutions to soft problems tend not to be clear-cut and require a nuanced subtle
    approach to balance the competing needs of human complexity.
  id: totrans-249
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 软问题的解决方案往往不是明确的，需要细微而微妙的方法来平衡人类复杂性的竞争需求。
- en: '| ![](image_rsrc6FC.jpg)Magical thinking occurs when a person misidentifies
    a hard problem as a soft problem.In this case they may think that they can make
    the problem “go away” by applying soft-problem solving methods, which is incorrect.The
    term “being hard-headed” refers to the ability to correctly identify a hard problem
    as a hard problem, which must be addressed with rigorous, not wishful, thinking.
    |'
  id: totrans-250
  prefs: []
  type: TYPE_TB
  zh: '| ![图片](image_rsrc6FC.jpg)当一个人将一个难题误认为是软问题，就会产生魔幻思维。在这种情况下，他们可能会认为可以通过应用软问题解决方法来使问题“消失”，这是不正确的。“固执己见”这个术语指的是正确地将难题识别为难题的能力，这需要严谨而非愿望性的思考。
    |'
- en: 'Many scenarios necessitate addressing both hard and soft problems, for instance:'
  id: totrans-251
  prefs: []
  type: TYPE_NORMAL
  zh: 许多场景需要解决难题和软问题，例如：
- en: Implementing a new IT system involves the hard problem of development and deployment
    and the soft problem of change management.
  id: totrans-252
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 实施新的IT系统涉及开发和部署的难题以及变革管理的软问题。
- en: Developing a luxury product requires first defining what customers are likely
    to be attracted to, and then engineering and manufacturing the required product.
  id: totrans-253
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 开发奢侈品首先需要定义客户可能被吸引的东西，然后设计和制造所需的产品。
- en: '![](image_rsrc6FD.jpg)'
  id: totrans-254
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc6FD.jpg)'
- en: Computer systems in a luxury car, bbc.co.uk
  id: totrans-255
  prefs: []
  type: TYPE_NORMAL
  zh: 奢侈车中的计算机系统，bbc.co.uk
- en: Chapter 3\. Types of Hard Problems
  id: totrans-256
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第三章：难题的类型
- en: Conceptual and Empirical Problem-Solving
  id: totrans-257
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 概念性与经验性问题解决
- en: '| ![](image_rsrc6FC.jpg)The word empirical refers to knowledge or methods based
    on observation, experience, or experimentation rather than theory or pure logic.In
    the context of problem solving, empirical means relying on real-world data to
    draw conclusions. |'
  id: totrans-258
  prefs: []
  type: TYPE_TB
  zh: '| ![图片](image_rsrc6FC.jpg)“经验”一词指的是基于观察、经验或实验的知识或方法，而不是理论或纯逻辑。在解决问题的背景下，经验意味着依赖于现实世界的数据来得出结论。
    |'
- en: Generally speaking, within the category of hard problems, we can identify two
    further general categories, based on the approach used to solve the problem.
  id: totrans-259
  prefs: []
  type: TYPE_NORMAL
  zh: 一般而言，在难题的范畴内，我们可以根据解决问题的方法进一步识别两个更一般的类别。
- en: 'Conceptual problem-solving:  These are scenarios where the main thrust of finding
    a solution to the problem comes through thinking and the intellect.'
  id: totrans-260
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 概念性问题解决：在这些情况下，解决问题的主要推动力是通过思考和智力来找到问题的解决方案。
- en: 'Empirical problem-solving: These are scenarios where the problem solving approach
    is primarily based on real-world data.'
  id: totrans-261
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 经验性问题解决：在这些情况下，问题解决方法主要基于现实世界的数据。
- en: These categories serve as umbrella terms, under which we can further identify
    specific problem types.
  id: totrans-262
  prefs: []
  type: TYPE_NORMAL
  zh: 这些类别作为总称，我们可以在其下进一步识别具体的难题类型。
- en: Types of Conceptual Problems
  id: totrans-263
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 概念性问题的类型
- en: 'Types of hard problems that are mainly solved through thinking include:'
  id: totrans-264
  prefs: []
  type: TYPE_NORMAL
  zh: 主要通过思考解决的难题类型包括：
- en: 'Analytical Problems: These involve dissecting a problem into smaller parts,
    addressing each component individually, and then synthesizing an overall solution.'
  id: totrans-265
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 分析问题：这些问题涉及将问题分解成更小的部分，分别处理每个组成部分，然后综合出一个整体解决方案。
- en: 'Causal Reasoning Problems: Solving these problems requires tracing a chain
    of cause and effect, from the initial cause to the final outcome.'
  id: totrans-266
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 因果推理问题：解决这些问题需要追踪因果链，从初始原因到最终结果。
- en: Causal reasoning problems can range from simple “A leads to B” scenarios to
    complex chains of events involving multiple steps and interactions between various
    factors.
  id: totrans-267
  prefs: []
  type: TYPE_NORMAL
  zh: 因果推理问题可以从简单的“A导致B”场景到涉及多个步骤和多种因素之间相互作用的复杂事件链。
- en: '| ![](image_rsrc6FE.jpg)Causal reasoning relates to the fundamental idea of
    cause and effect, and  involves identifying the factors (causes) that lead to
    certain outcomes (effects).For example, if a car won''t start, we use causal reasoning
    to investigate the possible reasons behind the issue, such as a flat battery or
    an overheated engine, to find a solution to the problem. |'
  id: totrans-268
  prefs: []
  type: TYPE_TB
  zh: '| ![image_rsrc6FE.jpg](image_rsrc6FE.jpg) 因果推理与因果关系的基本概念相关，涉及识别导致特定结果（效果）的因素（原因）。例如，如果一辆车无法启动，我们使用因果推理来调查问题背后的可能原因，例如电池电量不足或发动机过热，以找到解决问题的方法。
    |'
- en: 'Theoretical Problems: These problems relate to the understanding and development
    of theoretical frameworks and require abstract thinking and mathematical modelling
    to solve them.'
  id: totrans-269
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 理论问题：这些问题与理解和发展理论框架相关，需要抽象思维和数学建模来解决。
- en: Types of Empirical Problems
  id: totrans-270
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 经验性问题的类型
- en: 'Types of hard problems whose solutions are based on facts include:'
  id: totrans-271
  prefs: []
  type: TYPE_NORMAL
  zh: 基于事实的难题类型包括：
- en: 'Technical Problems: Involving the repair or creation of technological systems,
    these problems demand specific technical knowledge and skills, from fixing a washing
    machine to engineering spacecraft components.'
  id: totrans-272
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 技术问题：涉及技术系统的维修或创建，这些问题需要特定的技术知识和技能，从修理洗衣机到设计航天器组件。
- en: Solving technical problems requires an understanding of the relevant technology
    and the ability to apply practical skills and innovative thinking to create, fix,
    or improve technological solutions.
  id: totrans-273
  prefs: []
  type: TYPE_NORMAL
  zh: 解决技术问题需要理解相关技术，以及将实际技能和创新思维应用于创造、修复或改进技术解决方案的能力。
- en: 'Methodological Problems: Developing new techniques or tools to study the natural
    world or improve experiments, such as inventing new instruments or computational
    methods.'
  id: totrans-274
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 方法论问题：开发新的技术或工具来研究自然世界或改进实验，例如发明新的仪器或计算方法。
- en: Quantitative Problems
  id: totrans-275
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 定量问题
- en: Maths is an essential skill required to solve the quantitative problems (problems
    based on numbers) that can arise in all hard-problem areas.
  id: totrans-276
  prefs: []
  type: TYPE_NORMAL
  zh: 数学是解决所有难题领域可能出现的定量问题（基于数字的问题）所必需的基本技能。
- en: For conceptual problems, maths provides the framework for developing theoretical
    models that can predict outcomes, propose new theories, and explore the implications
    of various hypotheses.
  id: totrans-277
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于概念性问题，数学提供了构建可以预测结果、提出新理论以及探索各种假设含义的理论模型框架。
- en: On the other hand, in empirical problem-solving, maths is needed for designing
    experiments, analysing data, and interpreting results. It allows researchers to
    quantify observations, apply statistical tests, and draw reliable conclusions
    based on empirical data.
  id: totrans-278
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 另一方面，在经验性问题解决中，数学对于设计实验、分析数据和解释结果是必需的。它允许研究人员量化观察结果，应用统计测试，并基于经验数据得出可靠的结论。
- en: Mathematics forces problem-solvers to ensure that their solutions are both theoretically
    sound and can also be independently verified.
  id: totrans-279
  prefs: []
  type: TYPE_NORMAL
  zh: 数学迫使问题解决者确保他们的解决方案在理论上合理，并且也可以独立验证。
- en: '![Studying... | An old picture from, I think, when I was study… | Flickr](image_rsrc6FF.jpg)'
  id: totrans-280
  prefs: []
  type: TYPE_IMG
  zh: '![学习... | 我想这是我在学习时的老照片 | Flickr](image_rsrc6FF.jpg)'
- en: Maths, Flickr
  id: totrans-281
  prefs: []
  type: TYPE_NORMAL
  zh: 数学，Flickr
- en: Chapter 4\. Combined Hard Problem Types
  id: totrans-282
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第四章\. 硬科学问题类型组合
- en: Real-world problems often require the combination of various thinking styles,
    three examples are presented in this chapter.
  id: totrans-283
  prefs: []
  type: TYPE_NORMAL
  zh: 现实世界中的问题通常需要结合各种思维方式，本章中介绍了三个例子。
- en: Systems Analysis
  id: totrans-284
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 系统分析
- en: Systems problems demand an understanding of how different components interact
    within a system to produce a holistic result that is greater than the sum of its
    parts.
  id: totrans-285
  prefs: []
  type: TYPE_NORMAL
  zh: 系统问题要求理解系统内不同组件如何相互作用，以产生一个整体结果，这个结果大于其各部分之和。
- en: 'Systems thinking requires:'
  id: totrans-286
  prefs: []
  type: TYPE_NORMAL
  zh: 系统思维需要：
- en: Understanding the behaviour of each element in the system,
  id: totrans-287
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 理解系统中每个元素的行为，
- en: understanding how the elements interact with each other, and
  id: totrans-288
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 理解各个元素之间如何相互作用，
- en: understanding how the overall system behaves as a whole.
  id: totrans-289
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 理解整体系统如何作为一个整体运行。
- en: Examples of system thinking problems occur in software systems development,
    environmental conservation, organisational change management, public health management
    and urban planning. In all these cases, we need to understand the behaviour of
    the system as a whole, the behaviours of all the component elements of the system
    and their interactions with each other.
  id: totrans-290
  prefs: []
  type: TYPE_NORMAL
  zh: 系统思维问题的例子出现在软件开发、环境保护、组织变革管理、公共卫生管理和城市规划中。在这些所有情况下，我们需要理解整个系统的行为，系统的所有组成部分的行为以及它们之间的相互作用。
- en: Systems analysis includes both conceptual problem-solving and also empirical
    problem-solving.
  id: totrans-291
  prefs: []
  type: TYPE_NORMAL
  zh: 系统分析包括概念性问题解决和经验性问题解决。
- en: This is because, at a high level, a system represents the embodiment of an idea
    or concept. Therefore from a high level perspective, conceptual problem-solving
    is required to understand the initial idea, how the idea is represented in the
    system, and how the system’s output corresponds to the initial thinking behind
    the system.
  id: totrans-292
  prefs: []
  type: TYPE_NORMAL
  zh: 这是因为，从高层次来看，一个系统代表了某个想法或概念的体现。因此，从高层次的角度来看，需要概念性问题解决来理解初始想法，想法如何在系统中表示，以及系统的输出如何与系统背后的初始思考相对应。
- en: On the other hand, empirical methods are needed to observe, measure, and manipulate
    the system's working parts, in real-world applications.
  id: totrans-293
  prefs: []
  type: TYPE_NORMAL
  zh: 另一方面，在现实应用中，需要经验方法来观察、测量和操作系统的运行部分。
- en: The Hard Sciences
  id: totrans-294
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 硬科学
- en: The hard sciences includes areas of study such as physics, chemistry, biology
    and mathematics. Within the hard sciences, a range of different types of problems
    can be encountered, which require specific problem-solving strategies.
  id: totrans-295
  prefs: []
  type: TYPE_NORMAL
  zh: 硬科学包括物理学、化学、生物学和数学等研究领域。在硬科学领域，可以遇到各种不同类型的问题，需要特定的解决策略。
- en: The following types of problems are common within the hard sciences.
  id: totrans-296
  prefs: []
  type: TYPE_NORMAL
  zh: 在硬科学领域，以下类型的问题很常见。
- en: Empirical problems require observation, experimentation, and data collection
    to solve. These problems are grounded in the physical world and often require
    the formulation of hypotheses, which are then tested through experiments or observational
    studies.
  id: totrans-297
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 经验性问题需要观察、实验和数据收集来解决。这些问题基于物理世界，通常需要制定假设，然后通过实验或观察研究来测试这些假设。
- en: Theoretical problems involve the development or refinement of scientific theories
    to explain empirical observations. These problems require abstract thinking and
    the application of mathematical models to describe the natural world.
  id: totrans-298
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 理论问题涉及开发或完善科学理论来解释经验观察。这些问题需要抽象思维和将数学模型应用于描述自然世界。
- en: Computational problems in the hard sciences involve using algorithms and computational
    models to solve scientific questions.
  id: totrans-299
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 硬科学中的计算问题涉及使用算法和计算模型来解决科学问题。
- en: Methodological problems involve the development of new techniques or tools to
    study the natural world. These can include the invention of new instruments, the
    improvement of experimental procedures, or the creation of novel computational
    methods.
  id: totrans-300
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 方法论问题涉及开发新技术或工具来研究自然世界。这可以包括新仪器的发明、实验程序的改进或新型计算方法的创造。
- en: Solving methodological problems enables scientists to make new discoveries and
    to measure phenomena with greater accuracy and precision. For instance, developing
    a more sensitive telescope allows astronomers to observe distant galaxies, while
    creating a more accurate time-measurement tool can enhance the precision of experiments
    in physics.
  id: totrans-301
  prefs: []
  type: TYPE_NORMAL
  zh: 解决方法论问题使科学家能够做出新的发现，并以更高的准确性和精度测量现象。例如，开发更灵敏的望远镜允许天文学家观察遥远的星系，而创建更精确的时间测量工具可以提高物理实验的精度。
- en: Interdisciplinary problems sit at the junction of multiple scientific disciplines
    and require a synthesis of concepts and methods from each to be solved. These
    problems reflect the complexity of the natural world, which does not adhere to
    the boundaries defined by academic disciplines.
  id: totrans-302
  prefs: []
  type: TYPE_NORMAL
  zh: 跨学科问题位于多个科学学科的交汇处，需要综合每个学科的概念和方法来解决。这些问题反映了自然世界的复杂性，它不遵循学术学科定义的边界。
- en: Examples of interdisciplinary problems include understanding the brain’s functioning,
    which requires knowledge from biology, chemistry, psychology, and computer science;
    or tackling climate change, which involves insights from environmental science,
    computer science, physics, chemistry, and economics.
  id: totrans-303
  prefs: []
  type: TYPE_NORMAL
  zh: 跨学科问题的例子包括理解大脑的功能，这需要生物学、化学、心理学和计算机科学的知识；或者应对气候变化，这涉及到环境科学、计算机科学、物理学、化学和经济学的研究成果。
- en: Many of the great scientific challenges are comprised of interdisciplinary problems.
    This is why a scientist may have to apply a number of the above problem solving
    techniques in order to achieve a true scientific breakthrough.
  id: totrans-304
  prefs: []
  type: TYPE_NORMAL
  zh: 许多重大的科学挑战都是由跨学科问题组成的。这就是为什么科学家可能必须应用上述多种问题解决技术，才能实现真正的科学突破。
- en: '![](image_rsrc6FG.jpg)'
  id: totrans-305
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc6FG.jpg)'
- en: U.S. supercomputers for weather and climate forecasts, National Oceanic and
    Atmospheric Administration, U.S. Department of Commerce
  id: totrans-306
  prefs: []
  type: TYPE_NORMAL
  zh: 美国超级计算机用于天气和气候预报，美国商务部国家海洋和大气管理局
- en: Algorithmic Problems
  id: totrans-307
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 算法问题
- en: This category includes problems that are addressed through the application of
    computer code or manual algorithms. Algorithmic problem-solving is a hybrid area
    that intersects with both conceptual and empirical problem-solving approaches,
    depending on the nature of the problem and the data involved.
  id: totrans-308
  prefs: []
  type: TYPE_NORMAL
  zh: 这个类别包括通过应用计算机代码或手动算法解决的问题。算法问题解决是一个交叉领域，它根据问题的性质和涉及的数据与概念性和经验性问题解决方法相交。
- en: The essence of algorithmic problem-solving lies in its systematic approach to
    tackling challenges by breaking them down into smaller, more manageable parts,
    each of which can be addressed through specific, logical steps.
  id: totrans-309
  prefs: []
  type: TYPE_NORMAL
  zh: 算法解决问题的本质在于其系统性地通过将问题分解成更小、更易于管理的部分来应对挑战，每个部分都可以通过特定的、逻辑性的步骤来解决。
- en: 'Types of Algorithmic Problems include:'
  id: totrans-310
  prefs: []
  type: TYPE_NORMAL
  zh: 算法问题的类型包括：
- en: 'Classic Computational Problems: Tasks that are inherently suited to computation,
    such as sorting lists, searching databases, or optimizing routes.'
  id: totrans-311
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 经典计算问题：本质上适合计算的任务，如排序列表、搜索数据库或优化路线。
- en: 'Data-Driven Problems: With the advent of cheap access to reliable databases,
    many problems now require sorting through vast datasets to find patterns, make
    predictions, or derive insights.'
  id: totrans-312
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 数据驱动问题：随着可靠数据库低成本访问的出现，许多问题现在需要通过筛选大量数据集来寻找模式、做出预测或得出见解。
- en: 'Optimisation Problems: These are challenges that seek the best solution from
    a set of possible solutions, given certain constraints or criteria. Examples include
    scheduling tasks, allocating resources, or designing networks.'
  id: totrans-313
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 优化问题：这些是在给定某些约束或标准的情况下，从一系列可能的解决方案中寻求最佳解决方案的挑战。例如包括任务调度、资源分配或网络设计。
- en: 'Decision-Making Problems: These problems require evaluating multiple options
    and making choices based on certain, given criteria.'
  id: totrans-314
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 决策问题：这些问题需要评估多个选项，并根据某些给定的标准做出选择。
- en: Almost all programming languages implement the basic types of algorithms, such
    as sorting algorithms, searching algorithms and recursive algorithms.
  id: totrans-315
  prefs: []
  type: TYPE_NORMAL
  zh: 几乎所有编程语言都实现了基本类型的算法，如排序算法、搜索算法和递归算法。
- en: These basic types of algorithms provide the building blocks for the more complex
    and specialised algorithms required by the programmer.
  id: totrans-316
  prefs: []
  type: TYPE_NORMAL
  zh: 这些基本类型的算法为程序员所需的更复杂和专业的算法提供了构建块。
- en: Chapter 5\. AI’s Unique Problem Solving Capabilities
  id: totrans-317
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第5章\. 人工智能的独特问题解决能力
- en: Using AI to Solve Quantitative Problems
  id: totrans-318
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用人工智能解决定量问题
- en: When we start to consider what type of hard problems we can solve using a generative
    AI, such as ChatGPT, the conversation veers in the direction of considering what
    Chat GPT actually does when we ask it a question.
  id: totrans-319
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们开始考虑我们可以使用生成式AI（如ChatGPT）解决哪种类型的问题时，对话转向了考虑当我们向Chat GPT提问时，它实际上在做什么。
- en: Is Chat GPT primarily functioning as a useful search engine, which amalgamates
    data and stops us having to trawl through multiple web pages?
  id: totrans-320
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Chat GPT主要是在作为一个有用的搜索引擎吗？它整合数据，使我们不必在多个网页中搜索？
- en: Or is Chat GPT effectively acting as a “thinking engine” which can work out
    problems for us?
  id: totrans-321
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 或者Chat GPT是否有效地充当了一个“思考引擎”，为我们解决难题？
- en: For example, in the area of technical problems, it’s obvious that AI does not
    have good technical skills. AI is unable to handle tools and intuitively feel
    its way through carefully crafting a machine component. However, AI can be incredibly
    useful in finding the right technical information to apply to a particular problem.
    In this case we can think of AI as an intelligent search engine.
  id: totrans-322
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，在技术问题领域，很明显AI没有良好的技术技能。AI无法处理工具，也不能直观地通过精心设计机器组件。然而，AI在找到适用于特定问题的正确技术信息方面可以非常有用。在这种情况下，我们可以将AI视为一个智能搜索引擎。
- en: On the other hand, generative AI is very good at solving numerical problems
    described in natural language, as demonstrated in the following example.
  id: totrans-323
  prefs: []
  type: TYPE_NORMAL
  zh: 另一方面，生成式AI在解决用自然语言描述的数值问题方面非常出色，以下是一个示例。
- en: '| Problem Statement: The Effect of Introducing a Homework Support Program on
    Student PerformanceScenario DescriptionA local middle school has introduced a
    new after-school Homework Support Program (HSP) aimed at improving student performance
    in mathematics. The program provides students with access to tutors, resources,
    and a structured environment for completing homework. The school aims to evaluate
    the effectiveness of the HSP in enhancing students'' mathematics grades.ObjectiveDetermine
    if participation in the Homework Support Program impacts students'' mathematics
    grades, using a simple before-and-after comparison within participants and non-participants
    groups.Data Provided'
  id: totrans-324
  prefs: []
  type: TYPE_NORMAL
  zh: '| 问题陈述：引入家庭作业支持项目对学生表现的影响情景描述当地一所中学引入了一项新的课后家庭作业支持项目（HSP），旨在提高学生在数学方面的成绩。该项目为学生提供辅导、资源和完成作业的结构化环境。学校旨在评估HSP在提高学生数学成绩方面的有效性。目标确定参与家庭作业支持项目是否会影响学生的数学成绩，通过在参与者和非参与者群体中进行简单的前后比较来评估。提供的数据
    |'
- en: 'Participants: 20 students, with 11 participating in the HSP (treatment group)
    and 9 not participating (control group).'
  id: totrans-325
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 参与者：20名学生，其中11名参与HSP（处理组）和9名未参与（对照组）。
- en: 'Mathematics Grades: Collected for each student before (pre-program) and after
    (post-program) the HSP introduction.'
  id: totrans-326
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 数学成绩：收集了每个学生在HSP引入前（程前）和引入后（程后）的成绩。
