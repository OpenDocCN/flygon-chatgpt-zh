  id: totrans-1765
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**使用 SQLITE3 工具**'
- en: 'The previous two sections showed you how to work directly with sqlite3, either
    through the sqlite3 prompt or from the command line. The following subsections
    briefly discuss the following useful tools for working with sqlite3:'
  id: totrans-1766
  prefs: []
  type: TYPE_NORMAL
  zh: 前两个部分向您展示了如何直接使用 sqlite3，无论是通过 sqlite3 提示符还是从命令行。以下小节简要讨论了以下用于与 sqlite3 一起工作的有用工具：
- en: SQLiteStudio
  id: totrans-1767
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: SQLiteStudio
- en: DB Browser
  id: totrans-1768
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: DB 浏览器
- en: SQLiteDict
  id: totrans-1769
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: SQLiteDict
- en: '**SQLiteStudio Installation**'
  id: totrans-1770
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '**SQLiteStudio 安装**'
- en: 'SQLiteStudio is an open source IDE for SQLite that enables you to perform many
    database operations, such as creating, updating, and dropping tables and views.
    Navigate to the following Web site, download the distribution for your operating
    system, and perform the specified installation steps:'
  id: totrans-1771
  prefs: []
  type: TYPE_NORMAL
  zh: SQLiteStudio 是一个开源的 SQLite 集成开发环境，它允许你执行许多数据库操作，例如创建、更新和删除表和视图。导航到以下网站，下载适用于您操作系统的发行版，并执行指定的安装步骤：
- en: '*[https://sqlitestudio.pl/](https://sqlitestudio.pl/)*'
  id: totrans-1772
  prefs: []
  type: TYPE_NORMAL
  zh: '*[https://sqlitestudio.pl/](https://sqlitestudio.pl/)*'
- en: '*[https://mac.softpedia.com/get/Developer-Tools/SQLiteStudio.shtml](https://mac.softpedia.com/get/Developer-Tools/SQLiteStudio.shtml)*'
  id: totrans-1773
  prefs: []
  type: TYPE_NORMAL
  zh: '*[https://mac.softpedia.com/get/Developer-Tools/SQLiteStudio.shtml](https://mac.softpedia.com/get/Developer-Tools/SQLiteStudio.shtml)*'
