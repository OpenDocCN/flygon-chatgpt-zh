    **t**o**** **t**h**e**** **c**o**m**m**o**n**** **c**o**n**s**e**n**s**u**s****
    **o**r**** **p**r**e**v**a**l**i**n**g**** **p**e**r**s**p**e**c**t**i**v**e****
    **o**n**** **a**** ****g**i**v**e**n**** **i**s**s**u**e**.****T**h**e**** **g**o**a**l****
    **i**s**** **t**o**** **c**h**a**l**l**e**n**g**e**** **e**s**t**a**b**l**i**s**h**e**d****
    **o**p**i**n**i**o**n**s**** **a**n**d**** **e**x**p**l**o**r**e**** **p**o**s**s**i**b**i**l**i**t**i**e**s****
    **o**r**** **v**i**e**w**s**** ****t**h**a**t**** **a**r**e**** **n**o**t****
