  zh: 一个 GitHub Copilot 账户
- en: An **integrated development environment** (**IDE**) – either VS Code or PyCharm
  id: totrans-2275
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个**集成开发环境**（**IDE**）- 要么是 VS Code，要么是 PyCharm
- en: An OpenAI account with access to ChatGPT and OpenAI API
  id: totrans-2276
  prefs:
