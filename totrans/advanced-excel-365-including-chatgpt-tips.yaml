- en: 1. Write a VBA macro named “PrintNumbers” that prints numbers from 1 to 100
    in the Immediate Window.
  id: totrans-3277
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 编写一个名为“PrintNumbers”的VBA宏，该宏在立即窗口中打印从1到100的数字。
- en: 2. Create a VBA macro named “CalculateSum” that calculates the sum of numbers
    from 1 to 10 and displays the result in a message box.
  id: totrans-3278
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 创建一个名为“CalculateSum”的VBA宏，该宏计算从1到10的数字之和，并在消息框中显示结果。
- en: 3. Write a VBA macro named “EvenNumbers” that prints all even numbers from 1
    to 20 in the Immediate Window.
  id: totrans-3279
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 编写一个名为“EvenNumbers”的VBA宏，该宏在立即窗口中打印从1到20的所有偶数。
- en: 4. Create a VBA macro named “Factorial” that calculates the factorial of a given
    number. The macro should prompt the user to enter a number, then display the factorial
    result in a message box.
  id: totrans-3280
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 创建一个名为“Factorial”的VBA宏，该宏计算给定数字的阶乘。该宏应提示用户输入一个数字，然后在消息框中显示阶乘结果。
- en: 5. Write a VBA macro named “ReverseString” that prompts the user to enter a
    string, then prints the reverse of the string in the Immediate Window.
  id: totrans-3281
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 编写一个名为“ReverseString”的VBA宏，提示用户输入一个字符串，然后在立即窗口中打印该字符串的逆序。
- en: 6. Create a VBA macro named “TableOfSquares” that generates a table of squares
    from 1 to 10\. The macro should display the number and its square in separate
    columns in a new worksheet.
  id: totrans-3282
  prefs: []
  type: TYPE_NORMAL
  zh: 6. 创建一个名为“TableOfSquares”的 VBA 宏，生成从 1 到 10 的平方表。该宏应在新的工作表中分别显示数字及其平方，并在不同的列中。
- en: 7. Write a VBA macro named “CountCharacters” that counts the number of characters
    in a given string. The macro should prompt the user to enter a string, then display
    the count in a message box.
  id: totrans-3283
  prefs: []
  type: TYPE_NORMAL
  zh: 7. 编写一个名为“CountCharacters”的 VBA 宏，用于计算给定字符串中的字符数。该宏应提示用户输入一个字符串，然后在消息框中显示计数。
- en: CHAPTER  20
  id: totrans-3284
  prefs: []
  type: TYPE_NORMAL
  zh: 第 20 章
- en: Arrays and Collections in VBA
  id: totrans-3285
  prefs: []
  type: TYPE_NORMAL
  zh: VBA 中的数组和集合
- en: Introduction
  id: totrans-3286
  prefs: []
  type: TYPE_NORMAL
  zh: 简介
- en: Arrays and Collections are essential components in VBA programming, enabling
    efficient storage and manipulation of multiple values. In this chapter, we will
    explore their concepts, learn how to declare and use them, understand array indexing
    and dynamic arrays, and examine practical examples of their application in VBA.
  id: totrans-3287
  prefs: []
  type: TYPE_NORMAL
  zh: 数组和集合是 VBA 编程中的基本组件，能够高效地存储和操作多个值。在本章中，我们将探讨它们的概念，学习如何声明和使用它们，了解数组索引和动态数组，并检查它们在
    VBA 中的应用实例。
- en: Structure
  id: totrans-3288
  prefs: []
  type: TYPE_NORMAL
  zh: 结构
- en: 'In this chapter, we will discuss the following topics:'
  id: totrans-3289
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将讨论以下主题：
- en: ■Arrays
  id: totrans-3290
  prefs: []
  type: TYPE_NORMAL
  zh: ■数组
- en: ■Declaring the Arrays
  id: totrans-3291
  prefs: []
  type: TYPE_NORMAL
  zh: ■声明数组
- en: ■Using Arrays
  id: totrans-3292
  prefs: []
  type: TYPE_NORMAL
  zh: ■使用数组
- en: ■Array Indexing
  id: totrans-3293
  prefs: []
  type: TYPE_NORMAL
  zh: ■数组索引
- en: ■Declaring a Dynamic Array
  id: totrans-3294
  prefs: []
  type: TYPE_NORMAL
  zh: ■声明动态数组
- en: ■Resizing a Dynamic Array
  id: totrans-3295
  prefs: []
  type: TYPE_NORMAL
  zh: ■调整动态数组大小
- en: Objectives
  id: totrans-3296
  prefs: []
  type: TYPE_NORMAL
  zh: 目标
- en: By the end of this chapter, the reader will learn the purpose of arrays and
    collections in VBA programming, learn how to declare, resize, and use arrays efficiently,
    and understand the advantages of collections over arrays for advanced data manipulation
    tasks.
  id: totrans-3297
  prefs: []
  type: TYPE_NORMAL
  zh: 到本章结束时，读者将了解 VBA 编程中数组和使用集合的目的，学习如何声明、调整大小和高效使用数组，并了解集合在高级数据操作任务中相对于数组的优势。
- en: Arrays
  id: totrans-3298
  prefs: []
  type: TYPE_NORMAL
  zh: 数组
- en: Arrays are a set of sequentially indexed elements having the same intrinsic
    data type. Each element of an array has a unique identifying index number.
  id: totrans-3299
  prefs: []
  type: TYPE_NORMAL
  zh: 数组是一组具有相同内在数据类型的顺序索引元素。数组的每个元素都有一个唯一的标识索引号。
- en: 'Changes made to one element of an array do not affect the other elements. The
    different types of arrays are as follows:'
  id: totrans-3300
  prefs: []
  type: TYPE_NORMAL
  zh: 对数组中一个元素的更改不会影响其他元素。不同类型的数组如下：
- en: ■An array whose size is specified is a fixed-size array.
  id: totrans-3301
  prefs: []
  type: TYPE_NORMAL
  zh: ■大小已指定的数组是固定大小的数组。
- en: ■An array whose size can be changed while a program is running is a dynamic
    array.
  id: totrans-3302
  prefs: []
  type: TYPE_NORMAL
  zh: ■在程序运行时可以更改大小的数组是动态数组。
- en: ■A single dimension array contains only rows.
  id: totrans-3303
  prefs: []
  type: TYPE_NORMAL
  zh: ■单维数组只包含行。
- en: ■A multiple dimension array uses rows and columns.
  id: totrans-3304
  prefs: []
  type: TYPE_NORMAL
  zh: ■一个多维数组使用行和列。
- en: Declaring the Arrays
  id: totrans-3305
  prefs: []
  type: TYPE_NORMAL
  zh: 声明数组
- en: Arrays are declared the same way as other variables.
  id: totrans-3306
  prefs: []
  type: TYPE_NORMAL
  zh: 数组的声明方式与其他变量相同。
- en: 'Syntax:'
  id: totrans-3307
  prefs: []
  type: TYPE_NORMAL
  zh: 语法：
- en: Dim name_Of_array(Size) As Data_Type
  id: totrans-3308
  prefs: []
  type: TYPE_NORMAL
  zh: Dim name_Of_array(Size) As Data_Type
- en: Example
  id: totrans-3309
  prefs: []
  type: TYPE_NORMAL
  zh: 示例
- en: 'Single dimension: Declaring a single dimension array variable of row size 10,
    which can store integer items.'
  id: totrans-3310
  prefs: []
  type: TYPE_NORMAL
  zh: 单维：声明一个行大小为 10 的单维数组变量，可以存储整数值。
- en: Dim Myarray(10) As Integer
  id: totrans-3311
  prefs: []
  type: TYPE_NORMAL
  zh: Dim Myarray(10) As Integer
- en: 'Multiple dimension (Max 60 dimensions): Declaring a multiple dimension array
    variable of three rows and five columns, which can store 15 integer items.'
  id: totrans-3312
  prefs: []
  type: TYPE_NORMAL
  zh: 多维（最大 60 维）：声明一个三行五列的多维数组变量，可以存储 15 个整数值。
- en: Dim Myarray(3 , 5) As Integer
  id: totrans-3313
  prefs: []
  type: TYPE_NORMAL
  zh: Dim Myarray(3, 5) As Integer
- en: Using Arrays
  id: totrans-3314
  prefs: []
  type: TYPE_NORMAL
  zh: 使用数组
- en: Using arrays can be explained with an example. To store daily expenses for each
    day of the month, you can declare one array variable with 31 elements, rather
    than declaring 31 variables.
  id: totrans-3315
  prefs: []
  type: TYPE_NORMAL
  zh: 使用数组可以通过一个示例来解释。为了存储每月每一天的日常开支，你可以声明一个包含 31 个元素的数组变量，而不是声明 31 个变量。
- en: Each element in an array contains one value.
  id: totrans-3316
  prefs: []
  type: TYPE_NORMAL
  zh: 数组中的每个元素包含一个值。
- en: Sub Single_array()
  id: totrans-3317
  prefs: []
  type: TYPE_NORMAL
  zh: Sub Single_array()
- en: Dim curExpense(31) As Currency
  id: totrans-3318
  prefs: []
  type: TYPE_NORMAL
  zh: Dim curExpense(31) As Currency
- en: Dim intI As Integer
  id: totrans-3319
  prefs: []
  type: TYPE_NORMAL
  zh: Dim intI As Integer
- en: For intI = 0 to 31
  id: totrans-3320
  prefs: []
  type: TYPE_NORMAL
  zh: For intI = 0 to 31
- en: curExpense(intI) = 20
  id: totrans-3321
  prefs: []
  type: TYPE_NORMAL
  zh: curExpense(intI) = 20
- en: Next
  id: totrans-3322
  prefs: []
  type: TYPE_NORMAL
  zh: Next
- en: End Sub
  id: totrans-3323
  prefs: []
  type: TYPE_NORMAL
  zh: End Sub
- en: Note In the above example, array index will start from zero.
  id: totrans-3324
  prefs: []
  type: TYPE_NORMAL
  zh: 注意：在上面的示例中，数组索引将从零开始。
- en: Array Indexing
  id: totrans-3325
  prefs: []
  type: TYPE_NORMAL
  zh: 数组索引
- en: All array indexes begin at zero. Whether an array is indexed from 0 or 1 depends
    on the setting of the Option Base statement.
  id: totrans-3326
  prefs: []
  type: TYPE_NORMAL
  zh: 所有数组索引从零开始。数组是否从 0 或 1 索引取决于 Option Base 语句的设置。
- en: If Option Base 1 is not specified, all array indexes begin at zero.
  id: totrans-3327
  prefs: []
  type: TYPE_NORMAL
  zh: 如果未指定 Option Base 1，则所有数组索引从零开始。
- en: Example
  id: totrans-3328
  prefs: []
  type: TYPE_NORMAL
  zh: 示例
- en: Option Base 1
  id: totrans-3329
  prefs: []
  type: TYPE_NORMAL
  zh: Option Base 1
- en: Sub Single_array()
  id: totrans-3330
  prefs: []
  type: TYPE_NORMAL
  zh: Sub Single_array()
- en: Dim curExpense(31) As Currency
  id: totrans-3331
  prefs: []
  type: TYPE_NORMAL
  zh: Dim curExpense(31) As Currency
- en: Dim intI As Integer
  id: totrans-3332
  prefs: []
  type: TYPE_NORMAL
  zh: Dim intI As Integer
- en: For intI = 1 to 31
  id: totrans-3333
  prefs: []
  type: TYPE_NORMAL
  zh: For intI = 1 to 31
- en: curExpense(intI) = 20
  id: totrans-3334
  prefs: []
  type: TYPE_NORMAL
  zh: curExpense(intI) = 20
- en: Next
  id: totrans-3335
  prefs: []
  type: TYPE_NORMAL
  zh: Next
- en: End Sub
  id: totrans-3336
  prefs: []
  type: TYPE_NORMAL
  zh: End Sub
- en: Note In the above example, array index will start from one.
  id: totrans-3337
  prefs: []
  type: TYPE_NORMAL
  zh: 注意：在上面的例子中，数组索引将从1开始。
- en: Declaring a Dynamic Array
  id: totrans-3338
  prefs: []
  type: TYPE_NORMAL
  zh: 声明动态数组
- en: By declaring a dynamic array, you can size the array while the code is running.
    Use a Dim statement to declare an array, leaving the parentheses empty.
  id: totrans-3339
  prefs: []
  type: TYPE_NORMAL
  zh: 通过声明动态数组，您可以在代码运行时调整数组大小。使用Dim语句声明数组，留空括号。
- en: 'Syntax:'
  id: totrans-3340
  prefs: []
  type: TYPE_NORMAL
  zh: 语法：
- en: Dim Name_Of_Array() As Data_Type
  id: totrans-3341
  prefs: []
  type: TYPE_NORMAL
  zh: Dim Name_Of_Array() As Data_Type
- en: Resizing a Dynamic Array
  id: totrans-3342
  prefs: []
  type: TYPE_NORMAL
  zh: 调整动态数组大小
- en: Use the ReDim statement to declare an array implicitly within a procedure.
  id: totrans-3343
  prefs: []
  type: TYPE_NORMAL
  zh: 在过程中使用ReDim语句隐式声明数组。
- en: Be careful not to misspell the name of the array when you use the ReDim statement.
  id: totrans-3344
  prefs: []
  type: TYPE_NORMAL
  zh: 使用ReDim语句时，请注意不要拼写数组名称错误。
- en: Array Example
  id: totrans-3345
  prefs: []
  type: TYPE_NORMAL
  zh: 数组示例
- en: Option Base 1 ' Initializing the array index 1
  id: totrans-3346
  prefs: []
  type: TYPE_NORMAL
  zh: Option Base 1 ' 初始化数组索引为1
- en: Sub Searchdata()
  id: totrans-3347
  prefs: []
  type: TYPE_NORMAL
  zh: Sub Searchdata()
- en: Dim mycell_array() As String ' Declaring the dynamic array
  id: totrans-3348
  prefs: []
  type: TYPE_NORMAL
  zh: Dim mycell_array() As String ' 声明动态数组
- en: Dim a, i As Long
  id: totrans-3349
  prefs: []
  type: TYPE_NORMAL
  zh: Dim a, i As Long
- en: i = 1
  id: totrans-3350
  prefs: []
  type: TYPE_NORMAL
  zh: i = 1
- en: Sheets(1).Select
  id: totrans-3351
  prefs: []
  type: TYPE_NORMAL
  zh: Sheets(1).Select
- en: a = Range("a65536").End(xlUp).Row - 1
  id: totrans-3352
  prefs: []
  type: TYPE_NORMAL
  zh: a = Range("a65536").End(xlUp).Row - 1
- en: ReDim mycell_array(a) ' Redeclaring the array size
  id: totrans-3353
  prefs: []
  type: TYPE_NORMAL
  zh: ReDim mycell_array(a) ' 重新声明数组大小
- en: Range("a2", Range("a2").End(xlDown)).Select
  id: totrans-3354
  prefs: []
  type: TYPE_NORMAL
  zh: Range("a2", Range("a2").End(xlDown)).Select
- en: For Each mycell In Selection mycell_array(i) = mycell i
  id: totrans-3355
  prefs: []
  type: TYPE_NORMAL
  zh: For Each mycell In Selection mycell_array(i) = mycell i
- en: = i + 1
  id: totrans-3356
  prefs: []
  type: TYPE_NORMAL
  zh: = i + 1
- en: Next
  id: totrans-3357
  prefs: []
  type: TYPE_NORMAL
  zh: Next
- en: Sheets("database").Select
  id: totrans-3358
  prefs: []
  type: TYPE_NORMAL
  zh: Sheets("database").Select
- en: Range("a2", Range("a2").End(xlDown)).Select
  id: totrans-3359
  prefs: []
  type: TYPE_NORMAL
  zh: Range("a2", Range("a2").End(xlDown)).Select
- en: i = 1
  id: totrans-3360
  prefs: []
  type: TYPE_NORMAL
  zh: i = 1
- en: For i = 1 To a
  id: totrans-3361
  prefs: []
  type: TYPE_NORMAL
  zh: For i = 1 To a
- en: For Each mycell In Selection
  id: totrans-3362
  prefs: []
  type: TYPE_NORMAL
  zh: For Each mycell In Selection
- en: If mycell_array(i) = mycell Then
  id: totrans-3363
  prefs: []
  type: TYPE_NORMAL
  zh: If mycell_array(i) = mycell Then
- en: mycell.EntireRow.Delete 'mycell.Offset(0, 1).Value = "found"
  id: totrans-3364
  prefs: []
  type: TYPE_NORMAL
  zh: mycell.EntireRow.Delete 'mycell.Offset(0, 1).Value = "found"
- en: End If
  id: totrans-3365
  prefs: []
  type: TYPE_NORMAL
  zh: End If
- en: Next
  id: totrans-3366
  prefs: []
  type: TYPE_NORMAL
  zh: Next
- en: End Sub
  id: totrans-3367
  prefs: []
  type: TYPE_NORMAL
  zh: End Sub
- en: Conclusion
  id: totrans-3368
  prefs: []
  type: TYPE_NORMAL
  zh: 结论
- en: Arrays and Collections are powerful tools in VBA programming, facilitating the
    management of data sets and enhancing code efficiency. With a solid grasp of these
    concepts, you can optimize your VBA code, improve readability, and handle complex
    data structures effectively. Incorporating arrays and collections into your programming
    repertoire will expand your capabilities and enable you to tackle a wider range
    of VBA projects.
  id: totrans-3369
  prefs: []
  type: TYPE_NORMAL
  zh: 数组和集合是VBA编程中的强大工具，有助于管理数据集并提高代码效率。对这些概念有扎实的掌握，您可以优化VBA代码，提高可读性，并有效地处理复杂的数据结构。将数组和集合纳入您的编程工具箱将扩展您的功能，并使您能够处理更广泛的VBA项目。
- en: Exercises
  id: totrans-3370
  prefs: []
  type: TYPE_NORMAL
  zh: 练习
- en: 1. Declare a dynamic array to store the daily expenses of five employees.
  id: totrans-3371
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 声明一个动态数组以存储五个员工的每日费用。
- en: 2. Use a loop to input the expenses for each employee for a specified number
    of days.
  id: totrans-3372
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 使用循环输入指定天数内每个员工的费用。
- en: 3. Calculate the total expenses for each employee and display the result.
  id: totrans-3373
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 计算每个员工的总额并显示结果。
- en: 4. Determine the employee with the highest total expenses and print their name
    and the corresponding amount.
  id: totrans-3374
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 确定费用最高的员工并打印其姓名和相应的金额。
- en: 5. Calculate the average expenses per day for the entire team and display the
    result.
  id: totrans-3375
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 计算整个团队每天的平均费用并显示结果。
- en: CHAPTER  21
  id: totrans-3376
  prefs: []
  type: TYPE_NORMAL
  zh: 第21章
- en: Debugging and Error Handling in VBA
  id: totrans-3377
  prefs: []
  type: TYPE_NORMAL
  zh: VBA中的调试和错误处理
- en: Introduction
  id: totrans-3378
  prefs: []
  type: TYPE_NORMAL
  zh: 简介
- en: In this chapter, we will explore the important concepts of debugging and error
    handling in Visual Basic for Applications (VBA). Debugging is the process of identifying
    and resolving runtime errors and logical errors in our VBA code. Error handling
    involves implementing strategies to handle and manage errors that occur during
    the execution of our code. By understanding these concepts and utilizing appropriate
    techniques, we can create more robust and reliable VBA macros.
  id: totrans-3379
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将探讨Visual Basic for Applications (VBA)中调试和错误处理的重要概念。调试是识别和解决VBA代码中的运行时错误和逻辑错误的过程。错误处理涉及在代码执行过程中实施策略来处理和管理错误。通过理解这些概念并利用适当的技巧，我们可以创建更健壮和可靠的VBA宏。
- en: Structure
  id: totrans-3380
  prefs: []
  type: TYPE_NORMAL
  zh: 结构
- en: 'In this chapter, we will go over the following topics:'
  id: totrans-3381
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将讨论以下主题：
- en: ■Errors
  id: totrans-3382
  prefs: []
  type: TYPE_NORMAL
  zh: ■错误
- en: ■Error Handling
  id: totrans-3383
  prefs: []
  type: TYPE_NORMAL
  zh: ■错误处理
- en: ■Error Numbers
  id: totrans-3384
  prefs: []
  type: TYPE_NORMAL
  zh: ■错误编号
- en: ■Debugging the Macro
  id: totrans-3385
  prefs: []
  type: TYPE_NORMAL
  zh: ■调试宏
- en: Objectives
  id: totrans-3386
  prefs: []
  type: TYPE_NORMAL
  zh: 目标
- en: By the end of this chapter, the reader will learn about errors, error handling,
    and error numbers, which, along with debugging, are crucial in VBA.
  id: totrans-3387
  prefs: []
  type: TYPE_NORMAL
  zh: 到本章结束时，读者将了解错误、错误处理和错误编号，这些与调试一样，在VBA中至关重要。
- en: Errors
  id: totrans-3388
  prefs: []
  type: TYPE_NORMAL
  zh: 错误
- en: 'An error is generated if a statement fails. There are three types of errors:'
  id: totrans-3389
  prefs: []
  type: TYPE_NORMAL
  zh: 如果一个语句失败，将生成错误。有三种类型的错误：
- en: '■Logical: When the macro does not give the expected result. These errors can
    be handled by a change in logic and the trial and error method'
  id: totrans-3390
  prefs: []
  type: TYPE_NORMAL
  zh: ■逻辑：当宏没有给出预期结果时。这些错误可以通过逻辑更改和试错法来处理
- en: '■Technical: A runtime failure of any statement. Use the On Error statement
    to handle these errors.'
  id: totrans-3391
  prefs: []
  type: TYPE_NORMAL
  zh: ■技术：任何语句的运行时失败。使用On Error语句来处理这些错误。
- en: '■Syntax: These include incorrectly spelled keywords, mismatched parentheses,
    and a wide variety of other errors. Excel will flag your syntax errors and prevent
    the code from executing until they are corrected.'
  id: totrans-3392
  prefs: []
  type: TYPE_NORMAL
  zh: ■语法：这包括拼写错误的关键字、不匹配的括号以及各种其他错误。Excel将标记你的语法错误，并阻止代码执行，直到它们被纠正。
- en: Error Handling
  id: totrans-3393
  prefs: []
  type: TYPE_NORMAL
  zh: 错误处理
- en: 'There are three ways to handle errors:'
  id: totrans-3394
  prefs: []
  type: TYPE_NORMAL
  zh: 处理错误有三种方法：
- en: ■Whenever an error is encountered, direct the control to the specific label
    or line of code.
  id: totrans-3395
  prefs: []
  type: TYPE_NORMAL
  zh: ■每当遇到错误时，将控制权直接导向特定的标签或代码行。
- en: •On Error GoTo line / label On Error
  id: totrans-3396
  prefs: []
  type: TYPE_NORMAL
  zh: •On Error GoTo line / label On Error
- en: ■Continue with the statement immediately following the statement that caused
    the run-time error.
  id: totrans-3397
  prefs: []
  type: TYPE_NORMAL
  zh: ■继续执行导致运行时错误的语句之后的语句。
- en: •On Error Resume Next
  id: totrans-3398
  prefs: []
  type: TYPE_NORMAL
  zh: •On Error Resume Next
- en: ■Disable any enabled error handler in the current procedure.
  id: totrans-3399
  prefs: []
  type: TYPE_NORMAL
  zh: ■禁用当前过程中的任何启用的错误处理器。
- en: •On Error GoTo 0
  id: totrans-3400
  prefs: []
  type: TYPE_NORMAL
  zh: •On Error GoTo 0
- en: Note An error-handling routine is not a Sub procedure or a Function procedure.
    It is a section of code marked by a line label or line number. If you do not use
    an On Error statement, any runtime error that occurs is fatal; an error message
    is displayed and execution stops.
  id: totrans-3401
  prefs: []
  type: TYPE_NORMAL
  zh: 注意：错误处理例程不是一个子程序或函数程序。它是一段由行标签或行号标记的代码段。如果你没有使用On Error语句，任何发生的运行时错误都是致命的；将显示错误消息，并停止执行。
- en: Scenario 28
  id: totrans-3402
  prefs: []
  type: TYPE_NORMAL
  zh: 场景28
