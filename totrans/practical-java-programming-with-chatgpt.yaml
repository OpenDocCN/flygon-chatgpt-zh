    [Building a Custom ChatGPT with Your Own Additional Data](toc.xhtml#s139a)    CodeProject
    AI is a local server-based free Open-Source AI server for any platform and any
    language. It claims to be sandboxed, so does not upload any data. It is self-contained
    with no dependencies, running either as a Windows Service or a Docker container.    For
    further information, you can refer to the following sources:    **CodeProject.AI
    Server**: AI the easy way - CodeProject (3 Aug 2023)    Version 2.1.10\. Our fast,
    free, self-hosted Artificial Intelligence Server for any platform and any language    **[https://www.codeproject.com/Article.aspx?tag=2.NTMyMjU1NzowOjYzODI3MjY1OTkxNDgyNDcyNw&_z=534](https://www.codeproject.com/Article.aspx?tag=2.NTMyMjU1NzowOjYzODI3MjY1OTkxNDgyNDcyNw&_z=534)**    For
    a Docker container, we can run:    docker run -p 32168:32168 --name CodeProject.AI-Server
    -d codeproject/ai-server    Then select the last repo option, using the down arrow
    key and press return:    docker.io/codeproject/ai-server:latest    Using:    **http://localhost:32168**    From
    their website:    *“CodeProject.AI Server is a locally installed, self-hosted,
    fast, free and Open Source Artificial Intelligence server for any platform, any
    language. No off-device or out of network data transfer, no messing around with
    dependencies, and able to be used from any platform, any language. Runs as a Windows
    Service or a Docker container.”*    # [Using AI Transfer Learning](toc.xhtml#s140a)    Transfer
    learning is the term used in AI machine learning to describe the process of reusing
    a pre-trained model on a new problem. In transfer learning, an **AI** program
    uses the knowledge gained from a previous **LLM** model starting point and augments
    it for a new and similar task to generate an improved **LLM** model.    # [IBM
    and Generative AI With Watsonx](toc.xhtml#s141a)    IBM also has collaborations
