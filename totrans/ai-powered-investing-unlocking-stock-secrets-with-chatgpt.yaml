  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**1.5** 一瞥未来'
- en: '**A**I **i**n **inves**ting **i**s **ju**st **star**ting, **b**ut **i**t''**s**
    **exci**ting. **A**I **c**an **anal**yze **glo**bal **da**ta **i**n **re**al-**ti**me
    **a**nd **pred**ict **wh**at **peo**ple **mig**ht **d**o **bas**ed **o**n **soc**ial
    **med**ia. **I**t''**s** **goi**ng **t**o **ma**ke **inves**ting **mo**re **insig**htful
    **a**nd **effic**ient.'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 投资中的AI才刚刚开始，但令人兴奋。AI可以实时分析全球数据，并根据社交媒体预测人们可能会做什么。这将使投资更加有洞察力和高效。
- en: '**I**n **t**he **ne**xt **chap**ters, **w**e''**l**l **expl**ore **h**ow **Chat**GPT
    **c**an **he**lp **wi**th **fundam**ental **anal**ysis. **W**e''**l**l **s**ee
    **h**ow **t**o **u**se **A**I **t**o **under**stand **finan**cial **repo**rts,
    **indus**tries, **a**nd **ma**ke **sma**rt **inves**tment **choi**ces.'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 在接下来的章节中，我们将探讨ChatGPT如何帮助进行基本分析。我们将看到如何使用AI来理解财务报告、行业，并做出明智的投资选择。
