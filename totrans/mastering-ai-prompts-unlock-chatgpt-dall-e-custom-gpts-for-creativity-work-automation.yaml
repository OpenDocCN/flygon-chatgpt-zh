    conversational tone.”
  id: totrans-1918
  prefs: []
  type: TYPE_NORMAL
  zh: “写一篇500字的博客文章，标题为《多任务处理的隐性成本》。使用对话式的语气。”
- en: “Draft an informative article for HR managers on using AI for resume screening.”
  id: totrans-1919
  prefs: []
  type: TYPE_NORMAL
  zh: “为人力资源经理撰写一篇关于使用AI进行简历筛选的资讯文章。”
- en: Editing and Optimization
  id: totrans-1920
  prefs: []
