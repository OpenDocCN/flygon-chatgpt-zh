  id: totrans-1108
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 评估效应量和交互作用
- en: Visualization of results
  id: totrans-1109
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 结果的可视化
- en: Conclusion and next steps
  id: totrans-1110
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 结论和下一步
- en: 'Step 1: Data Verification and Preparation'
  id: totrans-1111
  prefs: []
  type: TYPE_NORMAL
  zh: 第一步：数据验证和准备
- en: 'The dataset consists of the following columns:'
  id: totrans-1112
  prefs: []
  type: TYPE_NORMAL
  zh: 数据集包含以下列：
- en: '●      ID: Identifier for each participant.'
  id: totrans-1113
  prefs: []
  type: TYPE_NORMAL
  zh: ●      ID：每个参与者的标识符。
- en: '●      Company: Categorical variable (A or B).'
  id: totrans-1114
  prefs: []
  type: TYPE_NORMAL
  zh: ●      公司：分类变量（A 或 B）。
- en: '●      Container: Categorical variable (PET bottle or Paper carton).'
  id: totrans-1115
  prefs: []
  type: TYPE_NORMAL
  zh: ●      容器：分类变量（PET瓶或纸箱）。
- en: '●      Favorability: Numerical response variable (10-point scale).'
  id: totrans-1116
  prefs: []
  type: TYPE_NORMAL
  zh: ●      喜好：数值响应变量（10 分量表）。
- en: Since each participant evaluated both companies and both container types, this
    indicates a within-subject (repeated measures) design.
  id: totrans-1117
  prefs: []
  type: TYPE_NORMAL
  zh: 由于每个参与者评估了公司和两种包装类型，这表明是一个被试内（重复测量）设计。
- en: 'Step 2: Identifying the Experimental Design'
  id: totrans-1118
  prefs: []
  type: TYPE_NORMAL
  zh: 第二步：确定实验设计
- en: '●      Factor A: Company (A vs. B)'
  id: totrans-1119
  prefs: []
  type: TYPE_NORMAL
  zh: ●      因素A：公司（A 与 B）
- en: '●      Factor B: Container (PET bottle vs. Paper carton)'
  id: totrans-1120
  prefs: []
  type: TYPE_NORMAL
  zh: ●      因素B：容器（PET瓶 vs. 纸盒）
- en: '●      Design Type: Within-subject design (each participant rated all conditions)'
  id: totrans-1121
  prefs: []
  type: TYPE_NORMAL
  zh: ●      设计类型：被试内设计（每位参与者对所有条件进行了评分）
- en: Since there are no continuous covariates, ANCOVA is not necessary in this case.
  id: totrans-1122
  prefs: []
  type: TYPE_NORMAL
  zh: 由于没有连续的协变量，在这种情况下不需要ANCOVA。
- en: 'Step 3: Checking Assumptions – Results'
  id: totrans-1123
  prefs: []
  type: TYPE_NORMAL
  zh: 第3步：检查假设 – 结果
- en: Normality Test (Shapiro-Wilk Test)
  id: totrans-1124
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 正态性检验（Shapiro-Wilk检验）
- en: '●      Company A, PET bottle: p = 0.0001 (violates normality)'
  id: totrans-1125
  prefs: []
  type: TYPE_NORMAL
  zh: ●      公司A，PET瓶：p = 0.0001（违反正态性）
- en: '●      Company A, Paper carton: p = 0.0018 (violates normality)'
  id: totrans-1126
  prefs: []
  type: TYPE_NORMAL
  zh: ●      公司A，纸盒：p = 0.0018（违反正态性）
- en: '●      Company B, PET bottle: p = 0.0063 (violates normality)'
  id: totrans-1127
  prefs: []
  type: TYPE_NORMAL
  zh: ●      公司B，PET瓶：p = 0.0063（违反正态性）
- en: '●      Company B, Paper carton: p = 0.0188 (violates normality)'
  id: totrans-1128
  prefs: []
  type: TYPE_NORMAL
  zh: ●      公司B，纸盒：p = 0.0188（违反正态性）
- en: → All conditions violate the normality assumption.
  id: totrans-1129
  prefs: []
  type: TYPE_NORMAL
  zh: → 所有条件都违反了正态性假设。
- en: Homogeneity of Variance (Levene’s Test)
  id: totrans-1130
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 方差齐性（Levene检验）
- en: ●      p = 0.589 → The assumption of equal variance is met.
  id: totrans-1131
  prefs: []
  type: TYPE_NORMAL
  zh: ●      p = 0.589 → 满足方差齐性假设。
- en: All four groups failed the normality test, but since the sample size exceeds
    30 and is sufficiently large, and the assumption of homogeneity of variance is
    met, we decided to apply ANOVA.
  id: totrans-1132
  prefs: []
  type: TYPE_NORMAL
  zh: 所有四个组都未通过正态性检验，但由于样本量超过30且足够大，且满足方差齐性假设，我们决定应用方差分析（ANOVA）。
- en: 'Step 4: Two-Way Repeated Measures ANOVA – Results'
  id: totrans-1133
  prefs: []
  type: TYPE_NORMAL
  zh: 第4步：双向重复测量方差分析 – 结果
- en: '● Company Effect: F (1, 19) = 34.01, p < 0.001 → Significant'
  id: totrans-1134
  prefs: []
  type: TYPE_NORMAL
  zh: ● 公司效应：F (1, 19) = 34.01, p < 0.001 → 显著
- en: '● Container Effect: F (1, 19) = 3.18, p = 0.091 → Not Significant'
  id: totrans-1135
  prefs: []
  type: TYPE_NORMAL
  zh: ● 容器效应：F (1, 19) = 3.18, p = 0.091 → 不显著
- en: '● Interaction (Company × Container): F (1, 19) = 46.69, p < 0.001 → Significant'
  id: totrans-1136
  prefs: []
  type: TYPE_NORMAL
  zh: ● 交互作用（公司 × 容器）：F (1, 19) = 46.69, p < 0.001 → 显著
- en: Since the interaction effect is significant, we need to conduct simple main
    effects analysis to examine under which conditions the differences occur.
  id: totrans-1137
  prefs: []
  type: TYPE_NORMAL
  zh: 由于交互效应显著，我们需要进行简单主效应分析以检查在哪些条件下发生差异。
- en: 'Step 5: Simple Main Effects Analysis – Results'
  id: totrans-1138
  prefs: []
  type: TYPE_NORMAL
  zh: 第5步：简单主效应分析 – 结果
- en: '●      Company effect within PET bottle:'
  id: totrans-1139
  prefs: []
  type: TYPE_NORMAL
  zh: ●      PET瓶内的公司效应：
- en: -       t = −10.42, p < 0.001 → Significant difference
  id: totrans-1140
  prefs: []
  type: TYPE_NORMAL
  zh: -       t = −10.42, p < 0.001 → 显著差异
- en: -       Company A vs. Company B shows a significant difference for PET bottles.
  id: totrans-1141
  prefs: []
  type: TYPE_NORMAL
  zh: -       公司A与公司B在PET瓶方面存在显著差异。
- en: '●      Company effect within Paper carton:'
  id: totrans-1142
  prefs: []
  type: TYPE_NORMAL
  zh: ●      纸盒内的公司效应：
- en: -       t = −0.195, p = 0.847 → Not significant
  id: totrans-1143
  prefs: []
  type: TYPE_NORMAL
  zh: -       t = −0.195, p = 0.847 → 不显著
- en: -       No significant difference between Company A and B for Paper cartons.
  id: totrans-1144
  prefs: []
  type: TYPE_NORMAL
  zh: -       公司A和公司B在纸盒方面没有显著差异。
- en: 'Step 6: Visualization of Interaction Effects'
  id: totrans-1145
  prefs: []
  type: TYPE_NORMAL
  zh: 第6步：交互效应的可视化
- en: '![グラフ, 折れ線グラフ  AI によって生成されたコンテンツは間違っている可能性があります。](image_rsrc243.jpg)'
  id: totrans-1146
  prefs: []
  type: TYPE_IMG
  zh: '![图形, 折线图 AI生成的内容可能存在错误](image_rsrc243.jpg)'
- en: Now, let's create a line plot  to visualize the interaction effect between Company
    and Container type. ​
  id: totrans-1147
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们创建一个折线图来可视化公司和容器类型之间的交互效应。 ​
- en: 'Step 7: Conclusion and Next Steps'
  id: totrans-1148
  prefs: []
  type: TYPE_NORMAL
  zh: 第7步：结论和下一步
- en: 'Key Findings:'
  id: totrans-1149
  prefs: []
  type: TYPE_NORMAL
  zh: 关键发现：
- en: 'Company Effect:'
  id: totrans-1150
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 公司效应：
- en: ● Significant difference in favorability between Company A and B (p < 0.001).
  id: totrans-1151
  prefs: []
  type: TYPE_NORMAL
  zh: ● 公司A和公司B之间在好感度方面存在显著差异（p < 0.001）。
- en: 'Container Effect:'
  id: totrans-1152
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 容器效应：
- en: ● No significant difference between PET bottle and Paper carton (p = 0.091).
  id: totrans-1153
  prefs: []
  type: TYPE_NORMAL
  zh: ● PET瓶与纸盒之间没有显著差异（p = 0.091）。
- en: 'Interaction Effect (Company × Container):'
  id: totrans-1154
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 交互效应（公司 × 容器）：
- en: ●      Significant interaction effect (p < 0.001).
  id: totrans-1155
  prefs: []
  type: TYPE_NORMAL
  zh: ●      显著的交互效应（p < 0.001）。
- en: '●      Simple main effects analysis showed:'
  id: totrans-1156
  prefs: []
  type: TYPE_NORMAL
  zh: ●      简单主效应分析显示：
- en: '-       For PET bottles: Company A and B differ significantly.'
  id: totrans-1157
  prefs: []
  type: TYPE_NORMAL
  zh: -       对于PET瓶：公司A和公司B存在显著差异。
- en: '-       For Paper cartons: No significant difference between companies.'
  id: totrans-1158
  prefs: []
  type: TYPE_NORMAL
  zh: -       对于纸盒：公司之间没有显著差异。
- en: 'Practical Implications:'
  id: totrans-1159
  prefs: []
  type: TYPE_NORMAL
  zh: 实际影响：
- en: ● PET bottles drive brand preference differences, while Paper cartons neutralize
    brand perception.
  id: totrans-1160
  prefs: []
  type: TYPE_NORMAL
  zh: ● PET瓶推动品牌偏好差异，而纸盒中和化了品牌感知。
- en: ● Companies might focus marketing efforts on differentiating PET bottle products,
    as they significantly impact consumer perception.
  id: totrans-1161
  prefs: []
  type: TYPE_NORMAL
  zh: ● 公司可能将营销努力集中在区分PET瓶产品上，因为它们对消费者感知有显著影响。
- en: 'Next Steps:'
  id: totrans-1162
  prefs: []
  type: TYPE_NORMAL
  zh: 下一步：
- en: ● Conduct a non-parametric alternative (Friedman test) for robustness due to
    normality violations.
  id: totrans-1163
  prefs: []
  type: TYPE_NORMAL
  zh: ● 由于违反正态性，进行非参数替代（Friedman检验）以增强稳健性。
- en: ●      Examine additional covariates if available for ANCOVA.
  id: totrans-1164
  prefs: []
  type: TYPE_NORMAL
  zh: ●      如果可用，检查ANCOVA的额外协变量。
- en: ●      Extend analysis with consumer preference segmentation.
  id: totrans-1165
  prefs: []
  type: TYPE_NORMAL
  zh: ●      扩展分析以包括消费者偏好细分。
- en: 7.5 Example Output of Analysis of Covariance (ANCOVA)
  id: totrans-1166
  prefs: []
  type: TYPE_NORMAL
  zh: 7.5 协方差分析（ANCOVA）的示例输出
- en: Below is a partial output generated by GPT after processing the dataset "ClassFormatTimeScore.csv,"
    which was downloaded from the portal site  "PsychStatsAI," using a prompt example
