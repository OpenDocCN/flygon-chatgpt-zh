- en: 'Chapter 2:'
  id: totrans-1971
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第二章：
- en: Delving Into Neural Networks
  id: totrans-1972
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 深入研究神经网络
- en: In the late 1950s, the world of computing witnessed a quiet revolution. Frank
    Rosenblatt, a psychologist and computer scientist, introduced the perceptron—a
    seemingly simple concept that marked a turning point in artificial intelligence.
    At that point in time, it was rare to see a machine learning to recognize patterns
    and make decisions like a human brain does. The perceptron was a model of a single
    neuron, capable of binary classification, where it could distinguish between two
    classes, such as differentiating between cats and dogs in an image. It did this
    by adjusting weights based on input data, a process akin to learning from experience.
    This single-layer structure laid the groundwork for what we now refer to as neural
    networks. Despite its simplicity, the perceptron captivated imaginations and fueled
    further research, even though its limitations in handling nonlinear problems led
    to a temporary lull in interest, often referred to as the "AI winter."
  id: totrans-1973
  prefs: []
  type: TYPE_NORMAL
  zh: 在20世纪50年代末，计算领域见证了一场静悄悄的革命。弗兰克·罗森布拉特（Frank Rosenblatt），一位心理学家和计算机科学家，引入了感知器——一个看似简单的概念，标志着人工智能的转折点。在那个时期，很少看到机器像人脑一样学习识别模式和做出决策。感知器是一个单神经元模型，可以进行二元分类，能够区分两个类别，例如在图像中区分猫和狗。它是通过根据输入数据调整权重来做到这一点的，这个过程类似于从经验中学习。这种单层结构为我们现在所说的神经网络奠定了基础。尽管它很简单，但感知器吸引了人们的想象力，并推动了进一步的研究，尽管它在处理非线性问题方面的局限性导致了对人工智能的兴趣暂时降温，这通常被称为“人工智能冬天”。
- en: '2.1 Introduction to Perceptrons: A Turning Point in A.I.'
  id: totrans-1974
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 2.1 感知器简介：人工智能的转折点
- en: Imagine the leap from a single perceptron to a network of interconnected perceptrons,
    each one a node in a multilayer network. This evolution involved adding more layers,
    but it also created a shift in understanding how machines could learn complex
    patterns. In the Multilayer Perceptron (MLP), multiple layers of nodes work together,
    each layer transforming the data and allowing the network to learn intricate patterns
    beyond simple linear separations. The addition of hidden layers—those sandwiched
    between the input and output layers—allowed the network to extract more abstract
    features from the input data, thus enabling it to solve more complex problems.
    Think of this process as adding more gears to a machine, each one refining the
    output until it achieves the desired precision. This architecture forms the backbone
    of modern neural networks, enabling them to handle tasks as varied as language
    translation and image recognition.
  id: totrans-1975
  prefs: []
  type: TYPE_NORMAL
  zh: 想象一下从单个感知器到相互连接的感知器网络的飞跃，每个感知器都是一个多层网络中的节点。这一进化不仅涉及添加更多层，而且还改变了我们对机器如何学习复杂模式的理解。在多层感知器（MLP）中，多个节点层协同工作，每一层都转换数据，使网络能够学习比简单线性分离更复杂的模式。隐藏层的添加——那些位于输入层和输出层之间的层——使网络能够从输入数据中提取更多抽象特征，从而使其能够解决更复杂的问题。将这个过程想象成给机器添加更多的齿轮，每个齿轮都细化输出，直到达到所需的精度。这种架构构成了现代神经网络的核心，使它们能够处理从语言翻译到图像识别等各种任务。
- en: The transition to deep learning represented a paradigm shift, driven by advancements
    in computational power and the availability of vast datasets. Deep neural networks,
    characterized by their many hidden layers, pushed the boundaries of what machines
    could achieve. These networks could now perform tasks that were once deemed impossible,
    like recognizing speech with human-like accuracy or identifying objects in images
    with unprecedented precision. The term "deep" refers to the multiple layers through
    which data passes, each layer extracting more sophisticated features. In healthcare,
    for instance, deep learning models analyze complex biomedical data, aiding in
    disease prediction and personalized treatment plans. These models excel in image
    and speech recognition, underpinning technologies like virtual assistants and
    facial recognition systems. The leap from simple perceptrons to deep networks
    has made AI an indispensable tool in our daily lives, transforming industries
    and enhancing human capabilities in ways that were once the stuff of science fiction.
  id: totrans-1976
  prefs: []
  type: TYPE_NORMAL
  zh: 深度学习的转变代表了一次范式转变，由计算能力的进步和大量数据集的可用性所驱动。具有许多隐藏层的深度神经网络推动了机器能够实现的任务的边界。这些网络现在可以执行以前被认为不可能的任务，如以类似人类的准确性识别语音或以前所未有的精度识别图像中的对象。术语“深度”指的是数据通过的多层，每一层提取更复杂的特征。例如，在医疗保健领域，深度学习模型分析复杂的生物医学数据，帮助进行疾病预测和个性化治疗方案。这些模型在图像和语音识别方面表现出色，支撑着虚拟助手和面部识别系统等技术。从简单的感知器到深度网络的飞跃使人工智能成为我们日常生活中不可或缺的工具，以科幻小说中才有的方式改变行业并增强人类能力。
- en: Yet, with great power comes great misunderstanding. One common misconception
    about neural networks is the belief that they require infinite training time and
    resources. While training deep networks can be resource-intensive, advancements
    in hardware, such as GPUs, and optimization techniques have significantly reduced
    the time and cost involved. Another frequent misunderstanding relates to overfitting,
    where a model performs exceptionally well on training data but poorly on unseen
    data. This problem arises when a network becomes too tailored to the training
    data, capturing noise rather than the underlying pattern. However, techniques
    like dropout and regularization help mitigate this, ensuring that models generalize
    well to new data. It's essential to strike a balance between model complexity
    and generalization, much like ensuring a tailored suit fits comfortably without
    being too tight. Neural networks continue to evolve, promising even greater capabilities
    and efficiencies in the future.
  id: totrans-1977
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，强大的力量也伴随着巨大的误解。关于神经网络的一个常见误解是认为它们需要无限的时间和资源进行训练。虽然训练深度网络可能需要大量资源，但硬件（如GPU）的进步和优化技术的应用已经显著减少了所需的时间和成本。另一个常见的误解与过拟合有关，即模型在训练数据上表现异常出色，但在未见过的数据上表现不佳。当网络变得过于针对训练数据，捕捉噪声而不是潜在模式时，就会出现这个问题。然而，像dropout和正则化这样的技术有助于减轻这个问题，确保模型能够很好地推广到新数据。在模型复杂性和泛化能力之间取得平衡是至关重要的，就像确保定制的西装既舒适又不太紧一样。神经网络持续发展，预示着未来将具有更大的能力和效率。
- en: 'Exercise: Exploring Perceptrons with Python'
  id: totrans-1978
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 练习：使用Python探索感知器
- en: To truly grasp the concept of perceptrons, try building one yourself using Python.
    Start by defining a simple dataset with two classes, such as points in a 2D space.
    Implement a perceptron class with methods for training and predicting. Use this
    perceptron to classify your dataset, adjusting weights based on the errors in
    predictions. Observe how the perceptron learns over iterations, gradually improving
    its accuracy. This hands-on exercise will illuminate the foundational principles
    of neural networks and lay the groundwork for exploring more complex architectures.
  id: totrans-1979
  prefs: []
  type: TYPE_NORMAL
  zh: 要真正掌握感知器的概念，请尝试使用Python自己构建一个。首先定义一个简单的数据集，例如二维空间中的点。实现一个具有训练和预测方法的感知器类。使用这个感知器对数据集进行分类，根据预测中的错误调整权重。观察感知器如何通过迭代学习，逐渐提高其准确性。这个动手练习将阐明神经网络的基础原理，并为探索更复杂的架构奠定基础。
- en: '2.2 Activation Functions: Breathing Life Into Networks'
  id: totrans-1980
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 2.2 激活函数：为网络注入活力
- en: In the world of neural networks, activation functions are like the spark that
    brings a neural network to life. These crucial components decide whether a neuron
    should "fire" or remain inactive, introducing the nonlinearity needed for complex
    pattern recognition. Imagine a scenario where every decision boundary is a straight
    line. The world isn't that simple, and neither are most datasets. Activation functions
    allow networks to capture these complexities by creating curved decision boundaries,
    much like how a skilled artist adds depth and dimension to a flat canvas. Without
    nonlinearity, a neural network would be no more powerful than a linear regression
    model, limited to solving only simple, linearly separable problems.
  id: totrans-1981
  prefs: []
  type: TYPE_NORMAL
  zh: 在神经网络的世界里，激活函数就像点燃神经网络生命的火花。这些关键组件决定神经元是“激活”还是保持不活跃，引入了复杂模式识别所需的非线性。想象一个场景，其中每个决策边界都是一条直线。世界并不那么简单，大多数数据集也是如此。激活函数允许网络通过创建曲线决策边界来捕捉这些复杂性，就像熟练的艺术家为平坦的画布增添深度和维度一样。没有非线性，神经网络将不会比线性回归模型更强大，只能解决简单、线性可分的问题。
- en: Among these functions, several have become staples in neural network design.
    The sigmoid function, one of the earliest used, outputs values between 0 and 1,
    making it ideal for binary classification tasks. However, it has fallen out of
    favor in deep networks due to the vanishing gradient problem, where gradients
    become too small for effective learning as they propagate backward. Enter ReLU
    (Rectified Linear Unit), a game-changer for deep learning. ReLU outputs the input
    directly if it's positive; otherwise, it returns zero. This simplicity allows
    for faster training and mitigates the vanishing gradient issue, making it a top
    choice in modern deep networks. Tanh, on the other hand, outputs values between
    -1 and 1, offering a zero-centered alternative that works well in hidden layers,
    providing a balance between sigmoid's smoothness and ReLU's efficiency.
  id: totrans-1982
  prefs: []
  type: TYPE_NORMAL
  zh: 在这些函数中，有几个已经成为神经网络设计中的标准。sigmoid 函数是早期使用的一种，输出值介于 0 和 1 之间，使其非常适合二分类任务。然而，由于梯度消失问题，它在深层网络中已经不再受欢迎，因为当梯度在反向传播时变得太小，无法进行有效的学习。ReLU（修正线性单元）的出现，为深度学习带来了变革。ReLU
    如果输入为正则直接输出输入值；否则，返回零。这种简单性允许更快地训练并减轻梯度消失问题，使其成为现代深层网络中的首选选择。另一方面，Tanh 输出值介于 -1
    和 1 之间，提供了一个以零为中心的替代方案，在隐藏层中表现良好，在 sigmoid 的平滑性和 ReLU 的效率之间提供了平衡。
- en: The choice of activation function can significantly impact a network's performance.
    Selecting the right function is akin to choosing the right tool for a job, as
    it influences how quickly and effectively a model learns. Sigmoid and Tanh, despite
    their historical significance, can suffer from vanishing gradients, hindering
    the learning process in deeper networks. ReLU, on the other hand, accelerates
    training and improves convergence but can lead to "dying ReLU" syndrome, where
    neurons become inactive and stop learning if inputs are consistently negative.
    Understanding these nuances helps in crafting a well-functioning neural network,
    optimizing both speed and accuracy.
  id: totrans-1983
  prefs: []
  type: TYPE_NORMAL
  zh: 激活函数的选择可以显著影响网络的性能。选择正确的函数就像为工作选择合适的工具一样，因为它影响着模型学习和的速度和效率。Sigmoid 和 Tanh 尽管在历史上具有重要意义，但可能会遭受梯度消失的问题，阻碍深层网络中的学习过程。另一方面，ReLU（修正线性单元）可以加速训练并提高收敛速度，但可能导致“死亡ReLU”综合症，即如果输入持续为负，神经元会变得不活跃并停止学习。理解这些细微差别有助于构建一个功能良好的神经网络，优化速度和准确性。
- en: When deciding on an activation function, consider factors such as the nature
    of your data, the depth of your network, and the specific task at hand. For instance,
    ReLU is often favored in deep networks due to its computational efficiency and
    ability to handle large datasets. However, in cases where negative values are
    significant, leaky ReLU—a variant that allows a small, non-zero output for negative
    inputs—might be more appropriate. In contrast, when building a network for binary
    classification, the sigmoid function could provide the necessary probabilistic
    outputs. To illustrate, consider a case study involving image recognition. A network
    initially using sigmoid struggled with convergence. Switching to ReLU accelerated
    training and improved accuracy, highlighting how the right choice can enhance
    both speed and performance.
  id: totrans-1984
  prefs: []
  type: TYPE_NORMAL
  zh: 在选择激活函数时，需要考虑诸如数据性质、网络深度以及具体任务等因素。例如，ReLU由于其计算效率和处理大数据集的能力，在深度网络中通常被优先考虑。然而，在负值有重要意义的场景中，漏斗ReLU——允许负输入有微小非零输出的变体——可能更为合适。相反，当构建用于二元分类的网络时，sigmoid函数可能提供必要的概率输出。为了说明这一点，可以考虑一个涉及图像识别的案例研究。最初使用sigmoid函数的网络在收敛方面存在困难。切换到ReLU加速了训练并提高了准确性，突显了正确选择如何同时提升速度和性能。
- en: '2.3 Understanding Layers: Hidden, Input, and Output'
  id: totrans-1985
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 2.3 理解层：隐藏层、输入层和输出层
- en: A neural network consists of a series of layers, each one playing a critical
    role in processing data. At the forefront are the input layers, which serve as
    the gateway for data entry. These layers pass the data through to the network,
    unaltered, ensuring that all necessary information is available for analysis.
    Like a funnel, they gather raw data from various sources, be it images, text,
    or numerical values, and channel it into the network for further processing. Next
    come the hidden layers, the workhorses of the network. These layers extract features
    by transforming and refining the data. They identify patterns and relationships,
    much like how a detective pieces together clues to solve a mystery. The hidden
    layers' ability to capture complex patterns is what sets neural networks apart,
    enabling them to tackle intricate tasks such as image recognition and language
    translation. Finally, the output layers deliver the network's predictions or classifications.
    They condense the processed information into a final decision or result, translating
    the network's intricate inner workings into meaningful outputs. For example, they
    can determine whether an email is spam or identify an object in a photograph,
    each time providing the network's conclusions in a clear and actionable form.
  id: totrans-1986
  prefs: []
  type: TYPE_NORMAL
  zh: 神经网络由一系列层组成，每一层在数据处理中都发挥着关键作用。最前面的是输入层，它们是数据进入的门户。这些层将数据传递到网络中，不进行任何修改，确保所有必要的信息都可用于分析。就像漏斗一样，它们从各种来源收集原始数据，无论是图像、文本还是数值，并将其引导到网络中进行进一步处理。接下来是隐藏层，网络的“工作马”。这些层通过转换和细化数据来提取特征。它们识别模式和关系，就像侦探拼凑线索来解决谜题一样。隐藏层捕捉复杂模式的能力是神经网络与众不同的地方，使它们能够处理复杂的任务，如图像识别和语言翻译。最后，输出层提供网络的预测或分类。它们将处理过的信息压缩成最终的决定或结果，将网络的复杂内部工作转化为有意义的输出。例如，它们可以确定一封电子邮件是否为垃圾邮件或在照片中识别物体，每次都以清晰和可操作的形式提供网络的结论。
- en: '![A diagram of a machine learning  Description automatically generated](image_rsrc45N.jpg)'
  id: totrans-1987
  prefs: []
  type: TYPE_IMG
  zh: '![机器学习图示 自动生成描述](image_rsrc45N.jpg)'
- en: The configuration of these layers significantly impacts a network's capabilities.
    The number and size of hidden layers, in particular, are critical factors. More
    layers often mean a greater ability to capture complex patterns, but they also
    require more data and computational resources. It's like adding more gears to
    a machine—each one improves functionality but also increases complexity. Designing
    an effective neural network architecture involves balancing depth and breadth
    to optimize performance. Too few layers might result in underfitting, where the
    model is too simplistic to capture the data's complexity. Too many, and you risk
    overfitting, where the model becomes too tailored to the training data and struggles
    to generalize to new data. Careful design and testing are required to find the
    right configuration for a given task.
  id: totrans-1988
  prefs: []
  type: TYPE_NORMAL
  zh: 这些层的配置对网络的性能有重大影响。特别是隐藏层的数量和大小是关键因素。更多的层通常意味着更大的能力来捕捉复杂模式，但它们也需要更多的数据和计算资源。这就像给机器添加更多的齿轮——每个齿轮都提高了功能，但也增加了复杂性。设计有效的神经网络架构涉及平衡深度和广度以优化性能。层太少可能会导致欠拟合，即模型过于简单，无法捕捉数据的复杂性。层太多，则风险过拟合，即模型变得过于针对训练数据，难以推广到新数据。为了找到给定任务的正确配置，需要进行仔细的设计和测试。
- en: Layer connectivity further influences a network's design. Fully connected layers,
    where every node in one layer connects to every node in the next, are common in
    many networks. This dense connectivity allows for comprehensive pattern recognition,
    as each node can influence the network's output. However, this approach can be
    computationally expensive and may lead to overfitting. Sparse connectivity, on
    the other hand, involves fewer connections, reducing complexity and computation.
    Sparse networks are beneficial in certain contexts, such as when dealing with
    large datasets where full connectivity is impractical. They can also help prevent
    overfitting by reducing the model's capacity to memorize training data. Choosing
    between fully connected and sparse layers depends on the specific requirements
    and constraints of the task at hand.
  id: totrans-1989
  prefs: []
  type: TYPE_NORMAL
  zh: 层连接进一步影响网络的设计。在许多网络中，全连接层，即一个层中的每个节点都与下一个层中的每个节点连接，是常见的。这种密集的连接性允许进行全面的模式识别，因为每个节点都可以影响网络的输出。然而，这种方法可能计算成本高昂，并可能导致过拟合。另一方面，稀疏连接涉及较少的连接，减少了复杂性和计算量。在处理大型数据集等某些情况下，稀疏网络是有益的，因为在这种情况下，全连接是不切实际的。它们还可以通过减少模型记忆训练数据的能力来帮助防止过拟合。选择全连接层和稀疏层取决于手头任务的特定要求和限制。
- en: Exploring well-known neural network models reveals various approaches to layer
    structure. Take ResNet, for example, which introduced the concept of residual
    connections to address the vanishing gradient problem. By allowing gradients to
    bypass certain layers, ResNet enables the training of very deep networks without
    losing effectiveness. Its architecture consists of multiple residual blocks, each
    with its own layer configuration, allowing it to learn intricate patterns efficiently.
    Another notable model is VGG, recognized for its simplicity and uniform architecture.
    It uses a series of small, stacked convolutional layers to capture features, followed
    by fully connected layers to make predictions. This approach allows VGG to achieve
    high accuracy in image recognition tasks despite its relatively straightforward
    design. Then there's the Long Short-Term Memory (LSTM) network, designed for sequence
    learning. LSTMs are particularly effective in tasks involving temporal data, such
    as language modeling or speech recognition. Their unique architecture, which includes
    memory cells and gating mechanisms, allows them to capture long-term dependencies
    in sequential data. Each of these models illustrates the diversity of layer configurations
    and their impact on a network's ability to learn and perform complex tasks.
  id: totrans-1990
  prefs: []
  type: TYPE_NORMAL
  zh: 探索已知的神经网络模型可以揭示出多种层结构的方法。以ResNet为例，它引入了残差连接的概念来解决梯度消失问题。通过允许梯度绕过某些层，ResNet能够在不失去有效性的情况下训练非常深的网络。其架构由多个残差块组成，每个块都有自己的层配置，使其能够高效地学习复杂的模式。另一个值得注意的模型是VGG，以其简洁和统一的架构而闻名。它使用一系列小型堆叠的卷积层来捕捉特征，随后是全连接层进行预测。这种方法使得VGG在图像识别任务中尽管设计相对简单，却能够实现高精度。然后是长短期记忆（LSTM）网络，专为序列学习设计。LSTM在涉及时间数据的任务中特别有效，如语言建模或语音识别。它们独特的架构，包括记忆单元和门控机制，使它们能够捕捉序列数据中的长期依赖关系。这些模型中的每一个都说明了层配置的多样性及其对网络学习能力和执行复杂任务能力的影响。
- en: '2.4 Backpropagation: The Learning Process'
  id: totrans-1991
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 2.4 反向传播：学习过程
- en: A neural network functions like a massive web, where each connection provides
    crucial support to the system. Backpropagation is the process that fine-tunes
    these connections, allowing the network to learn from its mistakes and improve
    over time. When you feed data into the network, it spits out predictions. These
    predictions are compared against the actual results, and the discrepancies, known
    as errors, are calculated. Backpropagation works by sending these errors back
    through the network, adjusting the weights of connections to minimize future errors.
    Imagine it as a feedback loop, constantly refining the network's accuracy. The
    mathematical backbone of this process is gradient descent, a technique that calculates
    the slope of error reduction, guiding how much each weight should be adjusted.
    The goal is to find the optimal set of weights that result in the lowest possible
    error, akin to finding the perfect recipe balance.
  id: totrans-1992
  prefs: []
  type: TYPE_NORMAL
  zh: 神经网络就像一个巨大的网络，其中每个连接都为系统提供关键的支持。反向传播是一个微调这些连接的过程，使网络能够从其错误中学习并随着时间的推移而改进。当你将数据输入网络时，它会输出预测。这些预测与实际结果进行比较，差异，即错误，被计算出来。反向传播通过将这些错误发送回网络，调整连接的权重以最小化未来的错误。想象它是一个反馈循环，不断改进网络的准确性。这个过程的理论基础是梯度下降，这是一种计算误差减少斜率的技术，指导每个权重应该如何调整。目标是找到最优的权重集，以实现最低可能的误差，类似于找到完美的食谱平衡。
- en: Now, imagine you're driving a car. The learning rate is your gas pedal. Press
    too hard, and you might overshoot your destination; press too softly, and you'll
    never get anywhere. Similarly, the learning rate in backpropagation controls how
    quickly or slowly the network learns. A high learning rate can lead to instability,
    with the network jumping around and missing the optimal solution. A low learning
    rate might make the journey unbearably slow, causing the network to get stuck
    in local minima—points that seem optimal but aren't the best solution. Striking
    the right balance is key, and adaptive learning rates can help. These techniques
    adjust the learning rate during training, speeding up when things are stable and
    slowing down when caution is needed.
  id: totrans-1993
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，想象你正在开车。学习率就像是你的油门。踩得太重，你可能会超过目的地；踩得太轻，你永远到不了任何地方。同样，反向传播中的学习率控制着网络学习的快慢。高学习率可能导致不稳定，网络四处跳跃，错过最优解。低学习率可能会使旅程变得异常缓慢，导致网络陷入局部最小值——看似最优但并非最佳解决方案的点。找到正确的平衡是关键，自适应学习率可以帮助。这些技术会在训练过程中调整学习率，在稳定时加速，在需要谨慎时减速。
- en: To enhance the efficiency of backpropagation, advanced optimization techniques
    come into play. One such method is momentum, which helps the network pass over
    small errors, much like a cyclist gaining speed on a downhill and rolling smoothly
    over bumps. Momentum considers the past gradients to smooth out updates, preventing
    the network from getting stuck in local minima. The Adam optimizer is another
    powerful tool, combining the benefits of both momentum and adaptive learning rates.
    It adjusts the learning rate for each parameter over time, enabling faster convergence
    and better performance. These optimizers act as expert navigators, guiding the
    network efficiently toward the optimal solution.
  id: totrans-1994
  prefs: []
  type: TYPE_NORMAL
  zh: 为了提高反向传播的效率，高级优化技术就派上用场了。其中一种方法是动量，它帮助网络跳过小的错误，就像骑自行车者在下坡时加速，平稳地越过障碍一样。动量考虑过去的梯度来平滑更新，防止网络陷入局部最小值。Adam优化器是另一个强大的工具，结合了动量和自适应学习率的优点。它随时间调整每个参数的学习率，实现更快收敛和更好的性能。这些优化器充当专家导航员，有效地引导网络向最优解前进。
- en: Despite its power, backpropagation faces a few hurdles. The notorious vanishing
    gradient problem arises when gradients become too small to make meaningful updates;
    this stalls learning, especially in very deep networks. On the opposite end, exploding
    gradients can cause instability, with updates becoming excessively large. Solutions
    include using activation functions like ReLU, which mitigate vanishing gradients,
    or applying gradient clipping, which prevents exploding gradients by capping their
    values. Overfitting, where the network becomes too specialized to the training
    data, is another challenge. Regularization techniques, such as dropout, where
    random neurons are ignored during training, and L1/L2 regularization, which penalizes
    overly complex models, help keep overfitting at bay. These strategies ensure that
    backpropagation remains a robust and reliable method for training neural networks,
    allowing them to adapt and excel in a wide range of tasks.
  id: totrans-1995
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管反向传播功能强大，但它也面临一些挑战。当梯度变得太小以至于无法进行有意义的更新时，就会出现臭名昭著的梯度消失问题；这会阻碍学习，尤其是在非常深的网络中。在另一端，梯度爆炸可能导致不稳定，更新变得过大。解决方案包括使用ReLU等激活函数，它可以减轻梯度消失，或者应用梯度裁剪，通过限制其值来防止梯度爆炸。过度拟合，即网络对训练数据过于专业化，是另一个挑战。正则化技术，如dropout（在训练期间忽略随机神经元）和L1/L2正则化（惩罚过于复杂的模型），有助于遏制过度拟合。这些策略确保反向传播仍然是训练神经网络的强大且可靠的方法，使它们能够在各种任务中适应并表现出色。
- en: '2.5 Hands-On: Creating a Simple Neural Network'
  id: totrans-1996
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 2.5 实践操作：创建一个简单的神经网络
- en: Building your first neural network from scratch is like assembling a puzzle
    where each piece fits perfectly to reveal a bigger picture. Let's start with setting
    up your environment. If you haven't already, download and install Python, a staple
    in the world of AI, due to its simplicity and comprehensive libraries. Once set,
    you'll need to install NumPy, a powerful Python library for numerical operations.
    Open your favorite code editor, whether it's PyCharm, VS Code, or Jupyter Notebook,
    and let's get ready to code.
  id: totrans-1997
  prefs: []
  type: TYPE_NORMAL
  zh: 从零开始构建你的第一个神经网络就像拼一个拼图，每个部件都完美地契合，揭示出一个更大的画面。让我们从设置环境开始。如果你还没有安装，请下载并安装Python，它是AI世界中的必备品，因为它简单且拥有全面的库。一旦设置好，你需要安装NumPy，这是一个用于数值运算的强大Python库。打开你喜欢的代码编辑器，无论是PyCharm、VS
    Code还是Jupyter Notebook，让我们准备编码。
- en: With your environment ready, it's time to begin coding the neural network. Begin
    by defining the architecture, which includes setting up the layers. For simplicity,
    let's consider a network with an input layer, a single hidden layer, and an output
    layer. Use NumPy to initialize weights and biases for these layers, as they are
    crucial for learning. Think of weights as the strength of connections between
    neurons and biases as thresholds that help in activation. You'll also need to
    define the activation function. For this exercise, ReLU is a good choice for the
    hidden layer due to its efficiency, while a softmax function is suitable for the
    output layer if you're working on a classification task. These components are
    the building blocks of your network, and fitting them together correctly is key
    to functionality.
  id: totrans-1998
  prefs: []
  type: TYPE_NORMAL
  zh: 当你的环境准备就绪后，是时候开始编写神经网络代码了。首先定义架构，这包括设置层。为了简单起见，让我们考虑一个包含输入层、单个隐藏层和输出层的网络。使用NumPy初始化这些层的权重和偏置，因为它们对于学习至关重要。将权重视为神经元之间连接的强度，将偏置视为有助于激活的阈值。你还需要定义激活函数。在这个练习中，由于ReLU的高效性，它对于隐藏层是一个好的选择，而如果你正在处理分类任务，softmax函数则适用于输出层。这些组件是网络的基础，正确地将它们组合在一起对于功能至关重要。
- en: With the network components in place, the next step is training your model.
    Start by loading a dataset; the MNIST dataset is a classic choice for beginners.
    It comprises thousands of handwritten digit images, providing a robust platform
    for testing your network. Preprocess the data by normalizing it, which scales
    the pixel values to a range that the network can easily digest. Initialize the
    training process by feeding the network batches of data and adjusting the weights
    using techniques like backpropagation to minimize the error. This phase is iterative,
    requiring multiple passes over the dataset to fine-tune the model's predictions.
  id: totrans-1999
  prefs: []
  type: TYPE_NORMAL
  zh: 在网络组件就绪后，下一步是训练你的模型。首先加载一个数据集；MNIST数据集是初学者的经典选择。它包含数千个手写数字图像，为测试你的网络提供了一个强大的平台。通过归一化数据来预处理数据，将像素值缩放到网络可以轻松处理的范围。通过向网络提供数据批次并使用反向传播等技术调整权重来初始化训练过程，以最小化错误。这一阶段是迭代的，需要多次遍历数据集以微调模型的预测。
- en: Assessing your network's performance is an ongoing process. After training,
    evaluate the model using a test set, which consists of data the network hasn't
    seen before. Measure accuracy, specifically the ratio of correct predictions to
    total predictions, to gauge how well the network generalizes. If the accuracy
    isn't up to par, consider tweaking hyperparameters like learning rate or layer
    architecture. Fine-tuning involves a bit of trial and error, but it's critical
    for optimizing performance. Monitoring these metrics can guide improvements, ensuring
    your model is both effective and efficient.
  id: totrans-2000
  prefs: []
  type: TYPE_NORMAL
  zh: 评估你的网络性能是一个持续的过程。在训练后，使用测试集评估模型，该测试集包含网络之前未见过的数据。测量准确性，即正确预测与总预测的比例，以衡量网络泛化的程度。如果准确性不够高，考虑调整学习率或层架构等超参数。微调涉及一些试错，但对于优化性能至关重要。监控这些指标可以指导改进，确保你的模型既有效又高效。
- en: To see your network in action, apply it to a real-world task, such as image
    classification with MNIST. The goal here is to accurately identify handwritten
    digits from images, a task that mirrors practical applications like digitizing
    handwritten forms or recognizing numbers in street signs. After training, test
    the network's ability to classify images it hasn't seen. This step highlights
    both the network's strengths and areas for improvement. You might find that some
    digits are harder to classify than others, prompting further refinements or additional
    data preprocessing. The beauty of this exercise lies in its potential for extension.
    Consider adding more layers for deeper learning or experimenting with different
    activation functions to see how they impact performance.
  id: totrans-2001
  prefs: []
  type: TYPE_NORMAL
  zh: 要看到你的网络在行动中的表现，将其应用于实际任务，例如使用MNIST进行图像分类。这里的目的是从图像中准确识别手写数字，这项任务与将手写表格数字化或识别街牌上的数字等实际应用相似。在训练后，测试网络对未见过的图像进行分类的能力。这一步骤突出了网络的优势和改进领域。你可能会发现某些数字比其他数字更难分类，这会促使进一步的改进或额外的数据预处理。这个练习的美丽之处在于其扩展的潜力。考虑添加更多层以进行更深入的学习，或者尝试不同的激活函数，看看它们如何影响性能。
- en: 2.6 AI Prompts for Deepening Your Neural Network Knowledge
  id: totrans-2002
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 2.6 深化你的神经网络知识的AI提示
