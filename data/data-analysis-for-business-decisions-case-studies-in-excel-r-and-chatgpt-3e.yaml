    using Excel.
  id: totrans-1232
  prefs: []
  type: TYPE_NORMAL
  zh: 使用案例数据集文件，找到文件 WDIAnnotatedData.xlsx。使用 Excel 打开 WDIAnnotatedData.xlsx。
- en: 'We are going to answer these framed analytical questions:'
  id: totrans-1233
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将回答以下框架化分析问题：
- en: Which of the most populous countries have the most significant Internet penetration?
  id: totrans-1234
  prefs: []
  type: TYPE_NORMAL
  zh: 哪些人口最多的国家互联网普及率最高？
- en: Which emerging economies (E7 countries) have the best Internet penetration and
    the largest population?
  id: totrans-1235
  prefs: []
  type: TYPE_NORMAL
  zh: 哪些新兴经济体（E7 国家）互联网普及率最高，人口最多？
- en: We are going to need population and Internet users per 100 for all countries
    for the year 2012\. Create a Pareto chart of the most populous countries. Prepare
    a 2x2 chart of Internet users per 100 and population in millions to determine
    the “best” countries ([Figure 8.7](#fig8-7)).
  id: totrans-1236
  prefs: []
  type: TYPE_NORMAL
  zh: 我们需要为 2012 年所有国家收集人口和每 100 人中的互联网用户数据。为人口最多的国家创建帕累托图。准备一个 2x2 图表，显示每 100 人的互联网用户数和百万人口数，以确定“最佳”国家（[图
    8.7](#fig8-7)）。
- en: '![image](images/pg176.jpg)'
  id: totrans-1237
  prefs: []
  type: TYPE_IMG
  zh: '![图片](images/pg176.jpg)'
- en: FIGURE 8.7 Elements of converting a scatterplot into a 2X2 chart to determine
    which countries “have the largest population with the largest Internet penetration”
  id: totrans-1238
  prefs: []
  type: TYPE_NORMAL
  zh: 图 8.7 将散点图转换为 2X2 图表以确定哪些国家“人口最多且互联网普及率最高”的元素
- en: Use the Internet to do some research and discover which countries are considered
    “emerging economies” (these are the E7 countries). Prepare a 2x2 chart of Internet
    users per 100 and population in millions to determine the “best” E7 country or
    countries ([Figure 8.8](#fig8-8)).
  id: totrans-1239
  prefs: []
  type: TYPE_NORMAL
  zh: 使用互联网进行一些研究，发现哪些国家被认为是“新兴经济体”（这些是 E7 国家）。准备一个 2x2 图表，显示每 100 人的互联网用户数和百万人口数，以确定“最佳”E7
    国家或国家（[图 8.8](#fig8-8)）。
- en: Since Excel does not allow you to label the countries directly, the way to identify
    the data point is by its coordinates and referring back to the table. Can you
    tell which country fits the “best” criteria?
  id: totrans-1240
  prefs: []
  type: TYPE_NORMAL
  zh: 由于 Excel 不允许您直接标记国家，识别数据点的方式是通过其坐标并参考表格。你能告诉我哪个国家符合“最佳”标准吗？
- en: '![image](images/pg177.jpg)'
  id: totrans-1241
  prefs: []
  type: TYPE_IMG
  zh: '![图片](images/pg177.jpg)'
- en: FIGURE 8.8 Steps in converting a scatterplot into a 2X2 chart to determine the
    E7 countries “with the largest population and with the largest Internet penetration.”
  id: totrans-1242
  prefs: []
  type: TYPE_NORMAL
  zh: 图 8.8 将散点图转换为 2X2 图表以确定 E7 国家“人口最多且互联网普及率最高”的步骤
