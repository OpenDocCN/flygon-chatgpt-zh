- en: '🖌️ Crafting a Sales Email :'
  id: totrans-260
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 🖌️ 销售邮件的撰写：
- en: 'FILL-IN-THE-BLANK PROMPTS:'
  id: totrans-261
  prefs: []
  type: TYPE_NORMAL
  zh: 填空提示：
- en: • Our **[product or service]** is the perfect solution for **[pain point]**
    that many of our customers are facing. It offers **[benefit 1]**, **[benefit 2]**,
    and **[benefit 3]** that make it a must-have for **[target audience X]**.
  id: totrans-262
  prefs: []
  type: TYPE_NORMAL
  zh: • 我们的**[产品或服务]**是解决许多客户面临的**[痛点]**的完美解决方案。它提供**[优点1]**，**[优点2]**，和**[优点3]**，使其成为**[目标受众X]**的必备品。
- en: Write a sales email that highlights the product/service and encourages customers
    to take action.
  id: totrans-263
  prefs: []
  type: TYPE_NORMAL
  zh: 编写一封突出产品/服务的销售邮件，并鼓励客户采取行动。
- en: • We are launching **[product].** It is designed for
  id: totrans-264
  prefs: []
  type: TYPE_NORMAL
  zh: • 我们正在推出**[产品]**。它专为
- en: '**[audience]**. These are three main features/benefits **[Item 1]**, **[Item
    2]**, **[Item 3]**. Write a sales email inviting the reader to buy a product at
    **[percentage]%** off.'
  id: totrans-265
  prefs: []
  type: TYPE_NORMAL
  zh: '**[受众]**。以下是三个主要功能/好处**[项目1]**，**[项目2]**，**[项目3]**。写一封销售邮件，邀请读者以**[百分比]%**的折扣购买产品。'
- en: '• "Generate a sales email for potential customers that includes:'
  id: totrans-266
  prefs: []
  type: TYPE_NORMAL
  zh: • “为潜在客户生成一封销售邮件，包括：
- en: '• Greeting: Hi **[recipient name]**,'
  id: totrans-267
  prefs: []
  type: TYPE_NORMAL
  zh: • 问候：嗨**[收件人姓名]**，
- en: '• Introduction: We are **[insert your business name]**, and we specialize in
    **[insert your product/service name]**.'
  id: totrans-268
  prefs: []
  type: TYPE_NORMAL
  zh: • 引言：我们是**[插入您的公司名称]**，我们专注于**[插入您的产品/服务名称]**。
- en: '• Benefits: Our **[insert your product/service name]** offers several benefits,
    including **[insert your first benefit]**, **[insert your second benefit]**, and
    **[insert your third benefit]**.'
  id: totrans-269
  prefs: []
  type: TYPE_NORMAL
  zh: • 优点：我们的**[插入您的产品/服务名称]**提供几个优点，包括**[插入您的第一个优点]**，**[插入您的第二个优点]**，和**[插入您的第三个优点]**。
- en: '• Call-to-action: **[Insert your clear and compelling call-toaction, such as
    ''Schedule a demo today'' or ''Sign up for a free trial'']**.'
  id: totrans-270
  prefs: []
  type: TYPE_NORMAL
  zh: • 行动号召：**[插入您清晰有力的行动号召，例如‘今天安排演示’或‘免费试用注册’]**。
- en: '• Sense of Urgency or Scarcity: Act now to **[insert your sense of urgency
    or scarcity, such as ''take advantage of our limited-time offer'' or ''join our
    exclusive program while spots are still available'']**.'
  id: totrans-271
  prefs: []
  type: TYPE_NORMAL
  zh: • 紧迫感或稀缺感：现在就行动，**[插入您的紧迫感或稀缺感，例如‘利用我们的限时优惠’或‘在位置还可用时加入我们的独家项目’]**。
- en: '• Contact Information: If you have any questions or need more information,
    please contact us by **[insert your preferred method of contact, such as phone,
    email, or chat]** at **[insert your team''s email address or phone number]**.'
  id: totrans-272
  prefs: []
  type: TYPE_NORMAL
  zh: • 联系信息：如果您有任何问题或需要更多信息，请通过**[插入您首选的联系方式，例如电话、电子邮件或聊天]**联系我们的团队，邮箱地址为**[插入您的团队邮箱地址或电话号码]**。
- en: '• Sign-off: Thanks, **[insert your name]**."'
  id: totrans-273
  prefs: []
  type: TYPE_NORMAL
  zh: • 结尾：谢谢，**[插入您的姓名]**。”
- en: 'QUESTION-BASED PROMPTS:'
  id: totrans-274
  prefs: []
  type: TYPE_NORMAL
  zh: 基于问题的提示：
- en: • "Can you help me write a compelling subject line that will encourage the recipient
    to open my sales email?"
  id: totrans-275
  prefs: []
  type: TYPE_NORMAL
  zh: • “你能帮我写一个能鼓励收件人打开我的销售邮件的引人入胜的主题行吗？”
- en: • "How can I create an attention-grabbing opening sentence that will hook the
    reader's interest?"
  id: totrans-276
  prefs: []
  type: TYPE_NORMAL
  zh: • “我如何创建一个能吸引读者兴趣的开场白？”
- en: • "What are some ways to establish credibility and build trust with the reader
    in a sales email?"
  id: totrans-277
  prefs: []
  type: TYPE_NORMAL
  zh: • “有哪些方法可以在销售邮件中建立信誉并建立读者的信任？”
- en: • "Can you suggest some techniques for creating a sense of urgency or scarcity
    in a sales email?"
  id: totrans-278
  prefs: []
  type: TYPE_NORMAL
- en: • "How can I use storytelling to create an emotional connection with the reader
    and persuade them to take action?"
  id: totrans-279
  prefs: []
  type: TYPE_NORMAL
- en: • "What are some effective ways to highlight the benefits and unique value of
    my product or service in a sales email?"
  id: totrans-280
  prefs: []
  type: TYPE_NORMAL
- en: • "Can you help me create a clear and compelling call-toaction that encourages
    the reader to take the next step?"
  id: totrans-281
  prefs: []
  type: TYPE_NORMAL
- en: • "What are some ways to personalize a sales email and make it more relevant
    to the recipient's needs and interests?"
  id: totrans-282
  prefs: []
  type: TYPE_NORMAL
- en: • "How can I use social proof or endorsements in a sales email to build credibility
    and trust with the reader?"
  id: totrans-283
  prefs: []
  type: TYPE_NORMAL
- en: • "Can you suggest ways to follow up and stay in touch with the reader after
    sending a sales email, without being too pushy or aggressive?"
  id: totrans-284
  prefs: []
  type: TYPE_NORMAL
