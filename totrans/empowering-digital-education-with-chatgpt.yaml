- en: Bootstrapping technique, which is another nonparametric technique for assessing
    the accuracy of the PLS estimate, was utilized to test the hypotheses. As suggested
    by [Hair et al. (2016)](#ch13.xhtml#r201), the bootstrap samples in this study
    are 5000 times. As shown in [Table 5.3](#ch13.xhtml#t12), the UE and SI have not
    influenced to ITCU ChatGPT intention (b=0.662, p>0.05; b=0.069, p>0.05). Therefore,
    the H1 and H4 hypotheses are rejected. While other factors have a significant
    and positive impacts on ITCU ChatGPT (p<0.05).
  id: totrans-1096
  prefs: []
  type: TYPE_NORMAL
  zh: 引入自举技术，这是另一种用于评估PLS估计准确性的非参数技术，被用来检验假设。正如[Hair等人（2016）](#ch13.xhtml#r201)所建议的，本研究中的自举样本是5000次。如[表5.3](#ch13.xhtml#t12)所示，UE和SI对ITCU
    ChatGPT意图（b=0.662，p>0.05；b=0.069，p>0.05）没有影响。因此，H1和H4假设被拒绝。而其他因素对ITCU ChatGPT有显著的正向影响（p<0.05）。
