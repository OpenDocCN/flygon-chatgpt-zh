- en: '**SUMMARY**'
  id: totrans-1833
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**总结**'
- en: This chapter started with some code samples that showed you how to perform data
    visualization in Pandas, such as bar charts, area charts, and line graphs. Next,
    you saw how to write Python code that contains MySQL commands.
  id: totrans-1834
  prefs: []
  type: TYPE_NORMAL
  zh: 本章开始时提供了一些代码示例，展示了如何在Pandas中执行数据可视化，例如条形图、面积图和折线图。接下来，你看到了如何编写包含MySQL命令的Python代码。
- en: Next, you learned about XML documents and JSON data, and how to read such data
    in a Pandas DataFrame.
  id: totrans-1835
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，你学习了XML文档和JSON数据，以及如何在Pandas DataFrame中读取此类数据。
- en: In addition, you learned how to combine Python and SQLite to perform database-related
    operations, such as creating a table in a sqlite3 database and then inserting
    data into such a table. Moreover, you saw how to select data from that table and
    populate a Pandas DataFrame with that data.
  id: totrans-1836
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，你还学习了如何结合Python和SQLite执行数据库相关操作，例如在sqlite3数据库中创建一个表，然后向该表中插入数据。此外，你还看到了如何从该表中选择数据，并将这些数据填充到Pandas
    DataFrame中。
- en: Finally, you learned about Beautiful Soup, along with code samples that showed
    you how to use Beautiful Soup in order to parse HTML Web pages.
  id: totrans-1837
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，你学习了Beautiful Soup，以及一些代码示例，展示了如何使用Beautiful Soup来解析HTML网页。
- en: CHAPTER 5
  id: totrans-1838
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第五章
- en: '*MATPLOTLIB AND VISUALIZATION*'
  id: totrans-1839
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '*MATPLOTLIB AND VISUALIZATION*'
- en: This chapter introduces data visualization, along with a collection of Python-based
    code samples that use Matplotlib to render charts and graphs. In addition, this
    chapter contains visualization code samples that combine Pandas and Matplotlib.
  id: totrans-1840
  prefs: []
  type: TYPE_NORMAL
  zh: 本章介绍了数据可视化，以及一系列基于Python的代码示例，这些示例使用Matplotlib来渲染图表和图形。此外，本章还包含结合Pandas和Matplotlib的可视化代码示例。
- en: 'The first part of this chapter briefly discusses data visualization, with a
    short list of some data visualization tools, and a list of various types of visualizations
    (bar graphs, pie charts, and so forth). Some introductory information can be found
    online:'
  id: totrans-1841
  prefs: []
  type: TYPE_NORMAL
  zh: 本章的第一部分简要介绍了数据可视化，列出了部分数据可视化工具，以及各种可视化类型（条形图、饼图等等）。一些入门信息可以在网上找到：
- en: '*[https://medium.datadriveninvestor.com/dont-beat-the-bush-use-chatgpt-to-visualize-your-data-94cee442cc29](https://medium.datadriveninvestor.com/dont-beat-the-bush-use-chatgpt-to-visualize-your-data-94cee442cc29)*'
  id: totrans-1842
  prefs: []
  type: TYPE_NORMAL
  zh: '*[https://medium.datadriveninvestor.com/dont-beat-the-bush-use-chatgpt-to-visualize-your-data-94cee442cc29](https://medium.datadriveninvestor.com/dont-beat-the-bush-use-chatgpt-to-visualize-your-data-94cee442cc29)*'
- en: '*[https://medium.datadriveninvestor.com/stop-wasting-times-to-learn-machine-learning-read-this-instead-5abfab230279](https://medium.datadriveninvestor.com/stop-wasting-times-to-learn-machine-learning-read-this-instead-5abfab230279)*'
  id: totrans-1843
  prefs: []
  type: TYPE_NORMAL
  zh: '*[https://medium.datadriveninvestor.com/stop-wasting-times-to-learn-machine-learning-read-this-instead-5abfab230279](https://medium.datadriveninvestor.com/stop-wasting-times-to-learn-machine-learning-read-this-instead-5abfab230279)*'
- en: The first part of this chapter contains a short introduction to Matplotlib,
    followed by code samples that display the available colors in Matplotlib.
  id: totrans-1844
  prefs: []
  type: TYPE_NORMAL
  zh: 本章的第一部分简要介绍了Matplotlib，随后是显示Matplotlib中可用颜色的代码示例。
- en: The second part of this chapter contains an assortment of Python code samples
    that render horizontal lines, slanted lines, and parallel lines. This section
    also contains a set of code samples that show you how to render a grid of points
    in several ways.
  id: totrans-1845
  prefs: []
  type: TYPE_NORMAL
  zh: 本章的第二部分包含了一系列Python代码示例，展示了如何绘制水平线、斜线和平行线。本节还包含了一系列代码示例，展示了如何以多种方式绘制点阵。
- en: The third part of this chapter shows you how to load images, display a checkerboard
    pattern, and plot a trigonometric function in Matplotlib. The fourth section contains
    examples of rendering charts and graphs in Matplotlib, which includes histograms,
    bar charts, pie charts, and heat maps.
  id: totrans-1846
  prefs: []
  type: TYPE_NORMAL
  zh: 本章的第三部分展示了如何在Matplotlib中加载图像、显示棋盘图案和绘制三角函数图。第四部分包含了在Matplotlib中渲染图表和图形的示例，包括直方图、柱状图、饼图和热图。
- en: The final section contains code samples for rendering 3D charts, financial data,
    and data from a sqlite3 database.
  id: totrans-1847
  prefs: []
  type: TYPE_NORMAL
  zh: 最后一部分包含了渲染3D图表、财务数据和sqlite3数据库数据的代码示例。
- en: '**WHAT IS DATA VISUALIZATION?**'
  id: totrans-1848
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**什么是数据可视化？**'
- en: '*Data visualization* refers to presenting data in a graphical manner, such
    as bar charts, line graphs, and heat maps. As you probably know, Big Data comprises
    massive amounts of data, which leverages data visualization tools to assist in
    making better decisions.'
  id: totrans-1849
  prefs: []
  type: TYPE_NORMAL
  zh: '*数据可视化*指的是以图形方式呈现数据，例如柱状图、折线图和热图。正如你可能所知，大数据包含大量数据，它利用数据可视化工具来辅助做出更好的决策。'
- en: Data visualization is a crucial aspect of data analysis, providing an intuitive
    understanding of the underlying patterns and relationships. With tools like Matplotlib
    and Seaborn, Python has become an efficient platform for crafting compelling visuals.
    As always, the key lies in practice and exploration.
  id: totrans-1850
  prefs: []
  type: TYPE_NORMAL
  zh: 数据可视化是数据分析的一个关键方面，它提供了对潜在模式和关系的直观理解。借助Matplotlib和Seaborn等工具，Python已成为制作引人入胜视觉的有效平台。一如既往，关键在于实践和探索。
- en: Visual representation of data enables viewers to quickly grasp complex data
    insights. Python, with its rich ecosystem of visualization libraries, provides
    tools to render data in meaningful ways. This chapter focuses on various visualization
    tasks using libraries such as Matplotlib and Seaborn.
  id: totrans-1851
  prefs: []
  type: TYPE_NORMAL
  zh: 数据的视觉表示使观众能够快速把握复杂的数据洞察。Python凭借其丰富的可视化库生态系统，提供了以有意义的方式呈现数据的方法。本章重点介绍使用Matplotlib和Seaborn等库的各种可视化任务。
- en: Python is a versatile and powerful programming language that can be used for
    various applications ranging from Web development to data analysis. In this chapter,
    we will explore solutions to common programming tasks using Python. Each task
    will have a detailed explanation and solution.
  id: totrans-1852
  prefs: []
  type: TYPE_NORMAL
  zh: Python是一种多才多艺且功能强大的编程语言，可用于从Web开发到数据分析的各种应用。在本章中，我们将探讨使用Python解决常见编程任务的解决方案。每个任务都将有详细的解释和解决方案。
- en: Advanced visualization techniques offer deeper insights and more comprehensive
    narratives from data. Tools like Matplotlib and Seaborn make these tasks more
    accessible. While these visuals are powerful, it is essential to ensure clarity
    and avoid misrepresentation. Continue experimenting and refining your visualization
    skills to tell more compelling data stories.
  id: totrans-1853
  prefs: []
  type: TYPE_NORMAL
  zh: 高级可视化技术提供了从数据中获得更深层次的洞察和更全面的叙述。像Matplotlib和Seaborn这样的工具使这些任务更容易实现。虽然这些视觉工具很强大，但确保清晰并避免误述是至关重要的。继续实验和改进你的可视化技能，以讲述更吸引人的数据故事。
- en: In the realm of data visualization, the journey from novice to expert is marked
    by the adoption of advanced techniques that can extract and depict deeper insights
    from data. In this chapter, we will explore some of these advanced visualization
    techniques and understand how they can be applied to various data scenarios.
  id: totrans-1854
  prefs: []
  type: TYPE_NORMAL
  zh: 在数据可视化的领域，从新手到专家的旅程是通过采用能够从数据中提取和描绘更深层次洞察的高级技术来标记的。在本章中，我们将探讨一些这些高级可视化技术，并了解它们如何应用于各种数据场景。
- en: Effective data visualization is about conveying complex data narratives in an
    intuitive manner. As we continue our exploration, this chapter unfolds more advanced
    visualization techniques, enabling us to represent data in a multitude of insightful
    ways.
  id: totrans-1855
  prefs: []
  type: TYPE_NORMAL
  zh: 有效的数据可视化是关于以直观的方式传达复杂的数据叙事。随着我们继续探索，本章将展开更高级的可视化技术，使我们能够以多种有洞察力的方式表示数据。
- en: 'Good data visualization tells a meaningful story, focusing on useful information
    that resides in datasets that can contain many data points (i.e., billions of
    rows of data). Another aspect of data visualization is its effectiveness: how
    well does it convey the trends that might exist in the dataset?'
  id: totrans-1856
  prefs: []
  type: TYPE_NORMAL
  zh: 良好的数据可视化讲述了一个有意义的叙事，关注数据集中包含的有用信息（即，可能包含许多数据点的数据集）。数据可视化的另一个方面是其有效性：它传达数据集中可能存在的趋势有多好？
- en: 'There are many open source data visualization tools available, some of which
    are listed here (many others are available):'
  id: totrans-1857
  prefs: []
  type: TYPE_NORMAL
  zh: 有许多开源的数据可视化工具可用，其中一些在此列出（还有许多其他工具）：
- en: Matplotlib
  id: totrans-1858
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Matplotlib
- en: Seaborn
  id: totrans-1859
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Seaborn
- en: Bokeh
  id: totrans-1860
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Bokeh
- en: YellowBrick
  id: totrans-1861
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: YellowBrick
- en: Tableau
  id: totrans-1862
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Tableau
- en: D3.js (JavaScript and SVG)
  id: totrans-1863
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: D3.js (JavaScript 和 SVG)
- en: 'In case you have not already done so, it would be helpful to install the following
    Python libraries (using pip3) on your computer so that you can launch the code
    samples in this chapter:'
  id: totrans-1864
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您尚未这样做，建议在您的计算机上安装以下 Python 库（使用 pip3），以便您可以运行本章中的代码示例：
- en: '[PRE383]'
  id: totrans-1865
  prefs: []
  type: TYPE_PRE
  zh: '[PRE383]'
- en: '**Types of Data Visualization**'
  id: totrans-1866
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '**数据可视化类型**'
- en: 'Bar graphs, line graphs, and pie charts are common ways to present data, and
    yet many other types exist, some of which are listed here:'
  id: totrans-1867
  prefs: []
  type: TYPE_NORMAL
  zh: 柱状图、折线图和饼图是常见的展示数据的方式，但还有许多其他类型，其中一些在此列出：
- en: 2D/3D Area Chart
  id: totrans-1868
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 2D/3D 面积图
- en: Bar Chart
  id: totrans-1869
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 柱状图
- en: Gantt Chart
  id: totrans-1870
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 甘特图
- en: Heat Map
  id: totrans-1871
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 热图
- en: Histogram
  id: totrans-1872
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 直方图
- en: Polar Area
  id: totrans-1873
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 极坐标面积图
- en: Scatterplot (2D or 3D)
  id: totrans-1874
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 散点图（2D 或 3D）
- en: Timeline
  id: totrans-1875
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 时间线
- en: The Python code samples in the next several sections illustrate how to perform
    visualization via rudimentary APIs from Matplotlib.
  id: totrans-1876
  prefs: []
  type: TYPE_NORMAL
  zh: 在接下来的几节中，Python 代码示例展示了如何通过 Matplotlib 的基本 API 进行可视化。
- en: '**WHAT IS MATPLOTLIB?**'
  id: totrans-1877
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**什么是 Matplotlib？**'
- en: 'Matplotlib is a plotting library that supports NumPy, SciPy, and toolkits such
    as wxPython (among others). Matplotlib supports only version 3 of Python: support
    for version 2 of Python was available only through 2020\. Matplotlib is a multi-platform
    library that is built on NumPy arrays.'
  id: totrans-1878
  prefs: []
  type: TYPE_NORMAL
  zh: Matplotlib 是一个支持 NumPy、SciPy 以及 wxPython 等工具包的绘图库。Matplotlib 仅支持 Python 3 版本：Python
    2 版本的支持仅到 2020 年。Matplotlib 是一个基于 NumPy 数组的跨平台库。
- en: 'The plotting-related code samples in this chapter use pyplot, which is a Matplotlib
    module that provides a MATLAB-like interface. Here is an example of using pyplot
    to plot a smooth curve based on negative powers of Euler’s constant e:'
  id: totrans-1879
  prefs: []
  type: TYPE_NORMAL
  zh: 本章中与绘图相关的代码示例使用 pyplot，这是一个提供类似 MATLAB 接口的 Matplotlib 模块。以下是一个使用 pyplot 基于欧拉常数
    e 的负幂次绘制平滑曲线的示例：
- en: '[PRE384]'
  id: totrans-1880
  prefs: []
  type: TYPE_PRE
  zh: '[PRE384]'
- en: 'Keep in mind that the code samples that plot line segments assume that you
    are familiar with the equation of a (non-vertical) line in the plane: y = m*x
    + b, where m is the slope and b is the y-intercept.'
  id: totrans-1881
  prefs: []
  type: TYPE_NORMAL
  zh: 请记住，绘制线段的代码示例假设您熟悉平面中（非垂直）线的方程：y = m*x + b，其中 m 是斜率，b 是 y 轴截距。
- en: Furthermore, some code samples use NumPy APIs, such as np.linspace(), np.array(),
    np.random.rand(), and np.ones(), which are discussed in [Chapter 3](ch03.xhtml),
    so you can refresh your memory regarding these APIs.
  id: totrans-1882
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，一些代码示例使用了 NumPy API，如 np.linspace()、np.array()、np.random.rand() 和 np.ones()，这些在
    [第 3 章](ch03.xhtml) 中有讨论，因此您可以刷新对这些 API 的记忆。
