  id: totrans-3403
  prefs: []
  type: TYPE_NORMAL
  zh: 打开场景22。如果数据库工作表不存在，将生成错误。修改代码以处理此错误；如果数据库工作表不存在，你的程序应添加一个新的工作表。
- en: Note Use On Error GoTo line / label.
  id: totrans-3404
  prefs: []
  type: TYPE_NORMAL
  zh: 注意：使用On Error GoTo line / label。
