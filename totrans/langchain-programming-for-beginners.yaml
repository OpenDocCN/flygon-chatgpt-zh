- en: 'If you decide to write_stream() only the "answer" key, you’ll get a ''generator''
    object is not subscriptable TypeError from Python:'
  id: totrans-1253
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你决定只写入 "answer" 键，你将得到一个来自 Python 的 'generator' 对象不可索引的 TypeError：
- en: 'st.write_stream(response["answer"]) # TypeError'
  id: totrans-1254
  prefs: []
  type: TYPE_NORMAL
  zh: 'st.write_stream(response["answer"]) # TypeError'
- en: 'To stream only the answer to the user, you need to call the pick() method and
    pass the "answer" key as follows:'
  id: totrans-1255
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你只想将答案流式传输给用户，你需要调用 pick() 方法并传递 "answer" 键，如下所示：
- en: answer_chain = conversational_rag_chain.pick("answer")
  id: totrans-1256
  prefs: []
  type: TYPE_NORMAL
  zh: answer_chain = conversational_rag_chain.pick("answer")
- en: response = answer_chain.stream(
  id: totrans-1257
  prefs: []
  type: TYPE_NORMAL
  zh: response = answer_chain.stream(
- en: '{"input": question}, config={"configurable": {"session_id": "any"}}'
  id: totrans-1258
  prefs: []
  type: TYPE_NORMAL
  zh: '{"input": question}, config={"configurable": {"session_id": "any"}}'
- en: )
  id: totrans-1259
  prefs: []
  type: TYPE_NORMAL
  zh: )
- en: The pick() method filters the returned output and only returns the content of
    the key you passed as its argument.
  id: totrans-1260
  prefs: []
  type: TYPE_NORMAL
  zh: The pick() 方法过滤返回的输出，并且只返回你传递为其参数的键的内容。
- en: 'This way, the response object is now a stream that returns only the answer:'
