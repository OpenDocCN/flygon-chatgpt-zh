- en: List of Available AI Tools
  id: totrans-1051
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 可用 AI 工具列表
- en: An AI agent can only use the tools you added when you create the agent.
  id: totrans-1052
  prefs: []
  type: TYPE_NORMAL
  zh: AI 代理只能使用你在创建代理时添加的工具。
- en: The list of tools available in LangChain can be found on the load_tools module.
  id: totrans-1053
  prefs: []
  type: TYPE_NORMAL
  zh: LangChain 中可用的工具列表可以在 load_tools 模块中找到。
- en: On the import load_tools line, press F12 while placing your cursor somewhere
    inside load_tools.
  id: totrans-1054
  prefs: []
  type: TYPE_NORMAL
  zh: 在导入 load_tools 行时，将光标放在 load_tools 内部并按 F12。
- en: You can also use the mouse by right-clicking the load_tools name and select
    'Go To Definition' from the context menu
  id: totrans-1055
  prefs: []
  type: TYPE_NORMAL
  zh: 你也可以通过右键单击 load_tools 名称并从上下文菜单中选择 '转到定义' 来使用鼠标。
- en: 'On the load_tools.py file, search for the get_all_tool_names() function as
    shown below:'
  id: totrans-1056
  prefs: []
  type: TYPE_NORMAL
  zh: 在 load_tools.py 文件中，搜索下面的 get_all_tool_names() 函数：
- en: 'def get_all_tool_names() -> List[str]:'
  id: totrans-1057
  prefs: []
  type: TYPE_NORMAL
  zh: 'def get_all_tool_names() -> List[str]:'
- en: '"""Get a list of all possible tool names."""'
  id: totrans-1058
  prefs: []
  type: TYPE_NORMAL
  zh: '"""获取所有可能的工具名称。”'
- en: return (
  id: totrans-1059
  prefs: []
  type: TYPE_NORMAL
  zh: return (
- en: list(_BASE_TOOLS)
  id: totrans-1060
  prefs: []
  type: TYPE_NORMAL
  zh: list(_BASE_TOOLS)
- en: + list(_EXTRA_OPTIONAL_TOOLS)
  id: totrans-1061
  prefs: []
  type: TYPE_NORMAL
  zh: + list(_EXTRA_OPTIONAL_TOOLS)
- en: + list(_EXTRA_LLM_TOOLS)
  id: totrans-1062
  prefs: []
  type: TYPE_NORMAL
  zh: + list(_EXTRA_LLM_TOOLS)
- en: + list(_LLM_TOOLS)
  id: totrans-1063
  prefs: []
  type: TYPE_NORMAL
  zh: + list(_LLM_TOOLS)
- en: + list(DANGEROUS_TOOLS)
  id: totrans-1064
  prefs: []
  type: TYPE_NORMAL
  zh: + list(DANGEROUS_TOOLS)
- en: )
  id: totrans-1065
  prefs: []
  type: TYPE_NORMAL
  zh: )
- en: The *_TOOLS constants above contains the name of the tool you can use.
  id: totrans-1066
  prefs: []
  type: TYPE_NORMAL
  zh: 上面的 *_TOOLS 常量包含你可以使用的工具名称。
- en: 'For example, the DuckDuckGo search is found at _EXTRA_OPTIONAL_TOOLS as shown
    below:'
  id: totrans-1067
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，DuckDuckGo 搜索可以在下面的 _EXTRA_OPTIONAL_TOOLS 中找到：
- en: '![10 available tools](image_rsrc1ZM.jpg)'
  id: totrans-1068
  prefs: []
  type: TYPE_IMG
  zh: '![10可用工具](image_rsrc1ZM.jpg)'
- en: Figure 44\. LLM Agent Available Tools
  id: totrans-1069
  prefs: []
  type: TYPE_NORMAL
  zh: 图44. LLM代理可用工具
- en: You can also see other tools like Google search and Bing search, but these tools
    require an API key to run.
  id: totrans-1070
  prefs: []
  type: TYPE_NORMAL
  zh: 您还可以看到其他工具，如Google搜索和Bing搜索，但使用这些工具需要API密钥。
- en: Types of AI Agents
  id: totrans-1071
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: AI代理类型
- en: There are several types of AI agents identified today, and the one we created
    is called a ReAct (Reason + Act) agent.
  id: totrans-1072
  prefs: []
  type: TYPE_NORMAL
  zh: 目前已经识别出几种类型的AI代理，我们创建的代理被称为ReAct（推理+行动）代理。
- en: The ReAct agent is a general-purpose agent, and there are more specialized agents
    such as the XML agent and JSON agent.
  id: totrans-1073
  prefs: []
  type: TYPE_NORMAL
  zh: ReAct代理是一种通用代理，还有更多专门的代理，如XML代理和JSON代理。
- en: You can read more about the different agent types at [https://python.langchain.com/v0.1/docs/modules/agents/agent_types/](https://python.langchain.com/v0.1/docs/modules/agents/agent_types/)
  id: totrans-1074
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以在[https://python.langchain.com/v0.1/docs/modules/agents/agent_types/](https://python.langchain.com/v0.1/docs/modules/agents/agent_types/)了解更多关于不同代理类型的信息。
- en: As LLM and LangChain improve, new types of agents might be created, so the definitions
    above won’t always be relevant.
  id: totrans-1075
  prefs: []
  type: TYPE_NORMAL
  zh: 随着LLM和LangChain的改进，可能会创建新的代理类型，因此上述定义不一定总是相关。
- en: Summary
  id: totrans-1076
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: The code for this chapter is available in the folder 10_Agents_and_Tools from
    the book source code.
  id: totrans-1077
  prefs: []
  type: TYPE_NORMAL
  zh: 本章的代码可在书籍源代码的10_Agents_and_Tools文件夹中找到。
- en: While we don’t have an autonomous robot helper (yet) in our world today, we
    can already see how the development of AI agents might one day be used as the
    brains of AI robots.
  id: totrans-1078
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管我们今天的世界中还没有自主的机器人助手（尚无），但我们已经可以看到AI代理的发展有一天可能会被用作AI机器人的大脑。
- en: AI agents are an amazing innovation that shows how a machine can come up with
    a sequence of actions to take to accomplish a goal.
  id: totrans-1079
  prefs: []
  type: TYPE_NORMAL
  zh: AI代理是一项惊人的创新，展示了机器如何提出一系列动作以实现目标。
- en: When you create an agent, the LLM is used as a reasoning engine that needs to
    come up with steps of logic to accomplish a task.
  id: totrans-1080
  prefs: []
  type: TYPE_NORMAL
  zh: 当您创建代理时，LLM用作推理引擎，需要提出逻辑步骤以完成任务。
- en: The agent can also use various tools to act, such as browsing the web or solving
    a math equation.
  id: totrans-1081
  prefs: []
  type: TYPE_NORMAL
  zh: 代理还可以使用各种工具来执行操作，例如浏览网页或解决数学方程式。
- en: More complex tasks that use multiple tools can also be executed by these agents.
  id: totrans-1082
  prefs: []
  type: TYPE_NORMAL
  zh: 这些代理还可以执行使用多个工具的更复杂任务。
- en: Sometimes, a well-trained LLM can answer directly from the training data, bypassing
    the need to use tools.
  id: totrans-1083
  prefs: []
  type: TYPE_NORMAL
  zh: 有时，经过良好训练的LLM可以直接从训练数据中回答，无需使用工具。
- en: 'Chapter 11: Interacting With Documents in LangChain'
  id: totrans-1084
  prefs: []
  type: TYPE_NORMAL
  zh: 第11章：在LangChain中与文档交互
- en: One of the most interesting AI use cases is the Chat With Document feature,
    which enables users to interact with a document using conversational queries.
  id: totrans-1085
  prefs: []
  type: TYPE_NORMAL
  zh: 最有趣的AI用例之一是“与文档聊天”功能，它使用户能够通过会话查询与文档进行交互。
- en: By simply asking questions, users can quickly find relevant information, summarize
    content, and gain insights without having to read and sort through pages of text.
  id: totrans-1086
  prefs: []
  type: TYPE_NORMAL
  zh: 通过简单地提问，用户可以快速找到相关信息，总结内容，并获得见解，而无需阅读和整理大量文本。
- en: 'Here’s an illustration of the process required to create a Chat With Document
    application:'
  id: totrans-1087
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是创建“与文档聊天”应用程序所需过程的说明：
- en: '![11 chatdoc process](image_rsrc1ZN.jpg)'
  id: totrans-1088
  prefs: []
  type: TYPE_IMG
  zh: '![11 chatdoc过程](image_rsrc1ZN.jpg)'
- en: Figure 45\. Chat With Document Application Process
  id: totrans-1089
  prefs: []
  type: TYPE_NORMAL
  zh: 图45. 与文档应用程序的聊天过程
- en: You first need to split a single document into chunks so that the document can
    be processed and indexed effectively. The chunks are then converted into vector
    embeddings.
  id: totrans-1090
  prefs: []
  type: TYPE_NORMAL
  zh: 您首先需要将单个文档分割成块，以便有效地处理和索引文档。然后，这些块被转换为向量嵌入。
- en: Vector embeddings are arrays of numbers that represent information of various
    types, including text, images, audio, and more, by capturing their features in
    a numerical format.
  id: totrans-1091
  prefs: []
  type: TYPE_NORMAL
  zh: 向量嵌入是表示各种类型信息的数字数组，包括文本、图像、音频等，通过以数值格式捕获其特征。
- en: When you give a question, LangChain will convert the query into vectors, and
    then search the document vectors for the most relevant matches.
  id: totrans-1092
  prefs: []
  type: TYPE_NORMAL
  zh: 当您提出问题时，LangChain会将查询转换为向量，然后在文档向量中搜索最相关的匹配项。
- en: LangChain then sends the user query and relevant text chunks to LLM so that
    the LLM can generate a response based on the given input.
  id: totrans-1093
  prefs: []
  type: TYPE_NORMAL
  zh: LangChain随后将用户查询和相关的文本片段发送给LLM，以便LLM可以根据给定的输入生成响应。
- en: The process of finding relevant text information and sending it to the LLM is
    also known as Retrieval Augmented Generation, or RAG for short.
  id: totrans-1094
  prefs: []
  type: TYPE_NORMAL
  zh: 寻找相关文本信息并将其发送到LLM的过程也被称为检索增强生成，简称RAG。
- en: Using LangChain and Streamlit, you can create an application that allows you
    to upload a document and ask questions relevant to the content of that document.
  id: totrans-1095
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 LangChain 和 Streamlit，你可以创建一个应用程序，允许你上传一个文档并对其内容提出相关问题。
- en: Let’s jump in.
  id: totrans-1096
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们开始吧。
- en: Getting the Document
  id: totrans-1097
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 获取文档
- en: You’re going to upload a document to the application and ask questions about
    it. You can get the text file named ai-discussion.txt from the 11_Chat_With_Document
    folder.
  id: totrans-1098
  prefs: []
  type: TYPE_NORMAL
  zh: 你将上传一个文档到应用程序并对其提问。你可以从 11_Chat_With_Document 文件夹中获取名为 ai-discussion.txt 的文本文件。
- en: The text file contains a fictional story that discusses the impact of AI on
    humanity.
  id: totrans-1099
  prefs: []
  type: TYPE_NORMAL
  zh: 该文本文件包含一个关于人工智能对人类影响的故事。
- en: Because it’s fictional, you can be sure that the LLM obtains the answer from
    the document and not from its training data.
  id: totrans-1100
  prefs: []
  type: TYPE_NORMAL
  zh: 因为它是虚构的，你可以确信 LLM 从文档中获取答案，而不是从其训练数据中获取。
- en: Installing ChromaDB
  id: totrans-1101
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 安装 ChromaDB
- en: 'To create a Chat With Document application, you need to install a package called
    ChromaDB:'
  id: totrans-1102
  prefs: []
  type: TYPE_NORMAL
  zh: 要创建一个带有文档的聊天应用程序，你需要安装一个名为 ChromaDB 的包：
- en: pip install chromadb == 0.4.18
  id: totrans-1103
  prefs: []
  type: TYPE_NORMAL
  zh: pip install chromadb == 0.4.18
- en: ChromaDB is the vector database we’re going to use to store and query vector
    data.
  id: totrans-1104
  prefs: []
  type: TYPE_NORMAL
  zh: ChromaDB 是我们将用于存储和查询向量数据的向量数据库。
- en: Building the Chat With Document Application
  id: totrans-1105
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 构建带有文档的聊天应用程序
- en: 'Create a new Python file named rag_prompt.py, then import the packages required
    for the Chat With Document application as follows:'
  id: totrans-1106
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个名为 rag_prompt.py 的新 Python 文件，然后按照以下方式导入用于带有文档的聊天应用程序所需的包：
- en: from decouple import config
  id: totrans-1107
  prefs: []
  type: TYPE_NORMAL
  zh: 从 decouple 导入 config
- en: from langchain_openai import ChatOpenAI, OpenAIEmbeddings
  id: totrans-1108
  prefs: []
  type: TYPE_NORMAL
  zh: 从 langchain_openai 导入 ChatOpenAI，OpenAIEmbeddings
- en: from langchain_core.prompts import ChatPromptTemplate
  id: totrans-1109
  prefs: []
  type: TYPE_NORMAL
  zh: 从 langchain_core.prompts 导入 ChatPromptTemplate
- en: 'New packages:'
  id: totrans-1110
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 新的包：
- en: from langchain_community.document_loaders import TextLoader
  id: totrans-1111
  prefs: []
  type: TYPE_NORMAL
  zh: 从 langchain_community.document_loaders 导入 TextLoader
- en: from langchain.text_splitter import RecursiveCharacterTextSplitter
  id: totrans-1112
  prefs: []
  type: TYPE_NORMAL
  zh: 从 langchain.text_splitter 导入 RecursiveCharacterTextSplitter
- en: from langchain_community.vectorstores import Chroma
  id: totrans-1113
  prefs: []
  type: TYPE_NORMAL
  zh: 从 langchain_community.vectorstores 导入 Chroma
- en: from langchain.chains.combine_documents import create_stuff_documents_chain
  id: totrans-1114
  prefs: []
  type: TYPE_NORMAL
  zh: 从 langchain.chains.combine_documents 导入 create_stuff_documents_chain
- en: from langchain.chains import create_retrieval_chain
  id: totrans-1115
  prefs: []
  type: TYPE_NORMAL
  zh: 从 langchain.chains 导入 create_retrieval_chain
- en: The OpenAIEmbeddings class is used to access the OpenAI embedding model.
  id: totrans-1116
  prefs: []
  type: TYPE_NORMAL
  zh: OpenAIEmbeddings 类用于访问 OpenAI 嵌入模型。
- en: The TextLoader class is used to load a text file, while RecursiveCharacterTextSplitter
    is used to split a text into small chunks so that it can be processed more efficiently
    by LLMs.
  id: totrans-1117
  prefs: []
  type: TYPE_NORMAL
  zh: TextLoader 类用于加载文本文件，而 RecursiveCharacterTextSplitter 用于将文本分割成小块，以便更有效地由 LLM
    处理。
- en: The Chroma class is used to create the vector database. The create_retrieval_chain
    retrieves a document and passes it to the create_stuff_documents_chain, which
    passes the document to the LLM.
  id: totrans-1118
  prefs: []
  type: TYPE_NORMAL
  zh: Chroma 类用于创建向量数据库。create_retrieval_chain 方法检索文档并将其传递给 create_stuff_documents_chain，该链将文档传递给
    LLM。
- en: 'With the packages imported, you can define the llm next as shown below:'
  id: totrans-1119
  prefs: []
  type: TYPE_NORMAL
  zh: 在导入包后，你可以像下面那样定义 llm：
- en: OPENAI_KEY = config("OPENAI_KEY")
  id: totrans-1120
  prefs: []
  type: TYPE_NORMAL
  zh: OPENAI_KEY = config("OPENAI_KEY")
- en: llm = ChatOpenAI(model="gpt-4o", api_key=OPENAI_KEY)
  id: totrans-1121
  prefs: []
  type: TYPE_NORMAL
  zh: llm = ChatOpenAI(model="gpt-4o", api_key=OPENAI_KEY)
- en: 'After the llm, load the text using TextLoader and pass the path to the document
    in TextLoader as follows:'
  id: totrans-1122
  prefs: []
  type: TYPE_NORMAL
  zh: 在 llm 之后，使用 TextLoader 加载文本，并按照以下方式传递文档的路径到 TextLoader：
- en: loader = TextLoader("./ai-discussion.txt")
  id: totrans-1123
  prefs: []
  type: TYPE_NORMAL
  zh: loader = TextLoader("./ai-discussion.txt")
- en: documents = loader.load()
  id: totrans-1124
  prefs: []
  type: TYPE_NORMAL
  zh: documents = loader.load()
- en: 'With the list of documents loaded, you need to create the text splitter and
    split the document into chunks:'
  id: totrans-1125
  prefs: []
  type: TYPE_NORMAL
  zh: 在加载文档列表后，你需要创建文本分割器并将文档分割成块：
- en: text_splitter = RecursiveCharacterTextSplitter(chunk_size=1000, chunk_overlap=200)
  id: totrans-1126
  prefs: []
  type: TYPE_NORMAL
  zh: text_splitter = RecursiveCharacterTextSplitter(chunk_size=1000, chunk_overlap=200)
- en: chunks = text_splitter.split_documents(documents)
  id: totrans-1127
  prefs: []
  type: TYPE_NORMAL
  zh: chunks = text_splitter.split_documents(documents)
- en: To convert the document chunks into vectors, you need to use an embedding model.
  id: totrans-1128
  prefs: []
  type: TYPE_NORMAL
  zh: 要将文档块转换为向量，你需要使用一个嵌入模型。
- en: OpenAI provides an API endpoint to turn documents into vectors, and LangChain
    provides the OpenAIEmbeddings class so that you can use this embedding easily.
  id: totrans-1129
  prefs: []
  type: TYPE_NORMAL
  zh: OpenAI 提供了一个 API 端点，可以将文档转换为向量，LangChain 提供了 OpenAIEmbeddings 类，以便你可以轻松使用此嵌入。
- en: 'Add the following code below the chunks variable:'
  id: totrans-1130
  prefs: []
  type: TYPE_NORMAL
  zh: 在 chunks 变量下方添加以下代码：
- en: embeddings = OpenAIEmbeddings(openai_api_key=OPENAI_KEY)
  id: totrans-1131
  prefs: []
  type: TYPE_NORMAL
  zh: embeddings = OpenAIEmbeddings(openai_api_key=OPENAI_KEY)
- en: vector_store = Chroma.from_documents(chunks, embeddings)
  id: totrans-1132
  prefs: []
  type: TYPE_NORMAL
  zh: vector_store = Chroma.from_documents(chunks, embeddings)
- en: retriever = vector_store.as_retriever()
  id: totrans-1133
  prefs: []
  type: TYPE_NORMAL
  zh: retriever = vector_store.as_retriever()
- en: The Chroma.from_documents() method sends the chunks and embeddings data to the
    Chroma database.
  id: totrans-1134
  prefs: []
  type: TYPE_NORMAL
  zh: Chroma.from_documents() 方法将块和嵌入数据发送到 Chroma 数据库。
- en: Then, you need to call the as_retriever() method to create a retriever object,
    which accepts the user input and returns relevant chunks of the document.
  id: totrans-1135
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，你需要调用as_retriever()方法来创建一个检索器对象，该对象接受用户输入并返回文档的相关部分。
- en: 'Next, you need to create the prompt to send to the LLM:'
  id: totrans-1136
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，你需要创建要发送到LLM的提示：
- en: system_prompt = (
  id: totrans-1137
  prefs: []
  type: TYPE_NORMAL
  zh: system_prompt = (
- en: '"You are an assistant for question-answering tasks. "'
  id: totrans-1138
  prefs: []
  type: TYPE_NORMAL
  zh: '"您是问答任务的助手。"'
- en: '"Use the following pieces of retrieved context to answer "'
  id: totrans-1139
  prefs: []
  type: TYPE_NORMAL
  zh: '"使用以下检索到的上下文来回答"'
- en: '"the question. If you don''t know the answer, say that you "'
  id: totrans-1140
  prefs: []
  type: TYPE_NORMAL
  zh: '"这个问题。如果你不知道答案，就说你"'
- en: '"don''t know. Use three sentences maximum and keep the "'
  id: totrans-1141
  prefs: []
  type: TYPE_NORMAL
  zh: '"不知道。最多用三句话，并保持简洁。"'
- en: '"answer concise."'
  id: totrans-1142
  prefs: []
  type: TYPE_NORMAL
  zh: '"回答要简洁。"'
- en: '"\n\n"'
  id: totrans-1143
  prefs: []
  type: TYPE_NORMAL
  zh: '"\n\n"'
- en: '"{context}"'
  id: totrans-1144
  prefs: []
  type: TYPE_NORMAL
  zh: '"{context}"'
- en: )
  id: totrans-1145
  prefs: []
  type: TYPE_NORMAL
  zh: )
- en: prompt = ChatPromptTemplate.from_messages(
  id: totrans-1146
  prefs: []
  type: TYPE_NORMAL
  zh: prompt = ChatPromptTemplate.from_messages(
- en: '['
  id: totrans-1147
  prefs: []
  type: TYPE_NORMAL
  zh: '['
- en: ("system", system_prompt),
  id: totrans-1148
  prefs: []
  type: TYPE_NORMAL
  zh: ("system", system_prompt),
- en: ("human", "{input}"),
  id: totrans-1149
  prefs: []
  type: TYPE_NORMAL
  zh: ("human", "{input}"),
- en: ']'
  id: totrans-1150
  prefs: []
  type: TYPE_NORMAL
  zh: ']'
- en: )
  id: totrans-1151
  prefs: []
  type: TYPE_NORMAL
  zh: ']'
- en: 'With the prompt created, you need to create a chain by calling the create_stuff_documents_chain()
    function and pass llm and prompt like this:'
  id: totrans-1152
  prefs: []
  type: TYPE_NORMAL
  zh: 通过创建提示，你需要通过调用create_stuff_documents_chain()函数来创建一个链，并像这样传递llm和prompt：
- en: question_answer_chain = create_stuff_documents_chain(llm, prompt)
  id: totrans-1153
  prefs: []
  type: TYPE_NORMAL
  zh: question_answer_chain = create_stuff_documents_chain(llm, prompt)
- en: This question_answer_chain will handle filling the prompt template and sending
    the prompt to the LLM.
  id: totrans-1154
  prefs: []
  type: TYPE_NORMAL
  zh: 这个question_answer_chain将处理填充提示模板并将提示发送到LLM。
- en: 'Next, pass the question_answer_chain to the create_retrieval_chain() function:'
  id: totrans-1155
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，将question_answer_chain传递给create_retrieval_chain()函数：
- en: rag_chain = create_retrieval_chain(retriever, question_answer_chain)
  id: totrans-1156
  prefs: []
  type: TYPE_NORMAL
  zh: rag_chain = create_retrieval_chain(retriever, question_answer_chain)
- en: The rag_chain above will pass the input to the retriever, which returns a relevant
    part of the document to the chain.
  id: totrans-1157
  prefs: []
  type: TYPE_NORMAL
  zh: 上述rag_chain将输入传递给检索器，检索器返回链的相关文档部分。
- en: The relevant part of the chain and the input are then passed to the question_answer_chain
    to get the result.
  id: totrans-1158
  prefs: []
  type: TYPE_NORMAL
  zh: 链接的相关部分和输入随后传递给question_answer_chain以获取结果。
- en: 'Now you can ask for user input, then run the invoke() method with that input:'
  id: totrans-1159
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，你可以请求用户输入，然后使用该输入运行invoke()方法：
