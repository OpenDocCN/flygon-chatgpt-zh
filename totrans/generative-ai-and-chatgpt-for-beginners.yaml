    if you want to follow along with the examples below or do your own analysis.
  id: totrans-539
  prefs: []
  type: TYPE_NORMAL
  zh: 为了给你一个例子，我使用世界幸福报告数据集进行了分析，该数据集保存为Excel工作簿。如果你想跟随下面的例子或进行自己的分析，可以在[g.codewithnathan.com/whr-data.xlsx](https://g.codewithnathan.com/whr-data.xlsx)获取数据。
