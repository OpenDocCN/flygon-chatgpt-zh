    ****eff**ect**s ****o**f** ****cli**mat**e ****ch**ang**e ****o**n** ****hu**man**
    ****popu**lation**s?” ****t**o** ****exp**lor**e ****t**he** ****im**pac**t ****o**f**
    ****t**he** ****pro**ble**m ****fr**om** ****a**** ****n**ew** ****an**gle**.'
  id: totrans-357
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**提出**“**什么导致气候变化？”**然后将其重构为“**气候变化对人类人口有什么影响？**”以探索问题的新角度。'
- en: '****8****. ****Con**tex**t ****Expa**nsio**n (****Con**tex**t ****Expa**nsio**n)'
  id: totrans-358
  prefs: []
  type: TYPE_NORMAL
  zh: '**8**. **语境扩展（语境扩展**）'
- en: '[****Wh**at** ****i**s** ]'
  id: totrans-359
  prefs: []
  type: TYPE_NORMAL
  zh: '[**什么是** ]'
- en: '****Con**tex**t ****Expa**nsio**n , ****o**r** ****Con**tex**t ****Expa**nsio**n,
    ****i**s** ****a**** ****pr**omp**t ****engi**neerin**g ****tech**niqu**e ****th**at**
    ****con**sist**s ****o**f** ****prov**idin**g ****t**he** ****L**LM** ****wi**th**
    ****a**** ****bro**ade**r ****o**r** ****mo**re** ****det**aile**d ****con**tex**t
    ****ab**out** ****t**he** ****sub**jec**t ****be**for**e ****as**kin**g ****t**he**
    ****ma**in** ****que**stio**n. ****T**he** ****go**al** ****i**s** ****t**o**
    ****en**sur**e ****th**at** ****t**he** ****mo**del** ****be**tte**r ****unde**rstand**s
    ****t**he** ****fu**ll** ****sce**nari**o, ****all**owin**g ****a**** ****mo**re**
    ****acc**urat**e ****a**nd** ****inf**orme**d ****an**swe**r.'
  id: totrans-360
  prefs: []
  type: TYPE_NORMAL
  zh: '**上下文扩展**，或称为**上下文扩展**，是一种提示工程技术，它通过在询问主要问题之前向LLM提供关于主题的更广泛或更详细的信息来实现。目标是确保模型更好地理解整个场景，从而允许更准确和更全面的信息回答。'
- en: '****Con**tex**t ****expa**nsio**n ****wo**rks** ****b**y** ****ad**din**g ****rel**evan**t
    ****info**rmatio**n ****be**for**e ****y**ou** ****dir**ectl**y ****a**sk** ****t**he**
    ****L**LM**. ****Th**is** ****c**an** ****inc**lud**e ****back**groun**d, ****addi**tiona**l
    ****desc**riptio**ns, ****te**rm** ****defi**nition**s, ****o**r** ****exa**mple**s
    ****th**at** ****he**lp** ****t**he** ****mo**del** ****be**tte**r ****unde**rstan**d
    ****t**he** ****que**stio**n. ****Ins**tea**d ****o**f** ****as**kin**g ****a****
    ****que**stio**n ****dir**ectl**y, ****y**ou** ****s**et** ****t**he** ****st**age**
    ****b**y** ****cre**atin**g ****a**** ****ri**che**r ****sce**nari**o ****f**or**
    ****t**he** ****L**LM** ****t**o** ****inte**rpre**t.'
  id: totrans-361
  prefs: []
  type: TYPE_NORMAL
  zh: '**上下文扩展**通过在你直接询问LLM之前添加相关信息来工作。这可以包括背景信息、额外的描述、术语定义或有助于模型更好地理解问题的示例。而不是直接提问，你通过为LLM创建一个更丰富的场景来设定舞台。'
- en: '[****Wh**at** ****i**s** ****yo**ur** ****ma**in** ****go**al** ?]'
  id: totrans-362
  prefs: []
  type: TYPE_NORMAL
  zh: '[你**的**主**要**目**标**是**什**么**？](https://example.org)'
- en: '****T**he** ****ma**in** ****go**al** ****o**f** ****Con**tex**t ****Expa**nsio**n
    ****i**s** ****t**o** ****imp**rov**e ****t**he** ****rele**vanc**e ****a**nd**
    ****acc**urac**y ****o**f** ****t**he** ****L**LM**''****s**** ****an**swe**r
    ****b**y** ****prov**idin**g ****h**im** ****wi**th** ****a**ll** ****t**he**
    ****info**rmatio**n ****h**e** ****ne**eds** ****t**o** ****fu**lly** ****unde**rstan**d
    ****t**he** ****que**stio**n. ****Th**is** ****i**s** ****espe**ciall**y ****impo**rtan**t
    ****wh**en** ****t**he** ****que**stio**n ****i**s** ****com**ple**x ****o**r**
    ****re**lie**s ****o**n** ****spe**cifi**c ****det**ail**s ****th**at**, ****wit**hou**t
    ****pr**ope**r ****con**tex**t, ****co**uld** ****b**e** ****misin**terpret**ed.'
  id: totrans-363
  prefs: []
  type: TYPE_NORMAL
  zh: '**上下文扩展**的主要目标是提高LLM回答的相关性和准确性，通过提供他需要理解问题所需的所有信息。这在问题复杂或依赖于特定细节时尤为重要，这些细节如果没有适当的上下文，可能会被误解。'
- en: '****Ano**the**r ****go**al** ****i**s** ****t**o** ****en**sur**e ****th**at**
    ****t**he** ****L**LM** ****res**pond**s ****appro**priate**ly ****t**o** ****a****
    ****spe**cifi**c ****ta**rge**t ****aud**ienc**e. ****B**y** ****expa**ndin**g
    ****t**he** ****con**tex**t, ****y**ou** ****c**an** ****in**for**m ****t**he**
    ****L**LM** ****ab**out** ****expe**ctatio**ns ****a**nd** ****t**he** ****ty**pe**
    ****o**f** ****lan**guag**e ****t**o** ****b**e** ****us**ed**, ****su**ch** ****a**s**
    ****whe**the**r ****t**he** ****res**pons**e ****sh**oul**d ****b**e** ****tech**nica**l
    ****o**r** ****si**mpl**e, ****o**r** ****whe**the**r ****i**t** ****sh**oul**d
    ****b**e** ****ge**are**d ****to**war**d ****chi**ldre**n ****o**r** ****exp**ert**s.'
  id: totrans-364
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个目标是确保LLM对特定目标受众做出适当的响应。通过扩展上下文，你可以向LLM提供有关期望和将要使用的语言类型的信息，例如，响应应该是技术性的还是简单的，或者它应该面向儿童还是专家。
- en: '[****H**ow** ****i**t** ****wo**rks** ]'
  id: totrans-365
  prefs: []
  type: TYPE_NORMAL
  zh: '[****H**ow** ****i**t** ****wo**rks** ]'
- en: '****Con**tex**t ****Expa**nsio**n ****wo**rks** ****b**y** ****ad**din**g ****intr**oducto**ry
    ****info**rmatio**n ****be**for**e ****t**he** ****ma**in** ****que**stio**n.
    ****Th**is** ****info**rmatio**n ****he**lps** ****t**o** "****s**et** ****u**p**"
    ****t**he** ****mo**del**, ****prov**idin**g ****a**** ****com**plet**e ****pic**tur**e
    ****o**f** ****t**he** ****to**pic**. ****Th**is** ****w**ay**, ****t**he** ****L**LM**
    ****h**as** ****mo**re** ****ele**ment**s ****t**o** ****con**side**r ****wh**en**
    ****resp**ondin**g, ****a**nd**, ****cons**equent**ly, ****gene**rate**s ****a****
    ****mo**re** ****ali**gne**d ****a**nd** ****det**aile**d ****an**swe**r.'
  id: totrans-366
  prefs: []
  type: TYPE_NORMAL
  zh: 上下文扩展通过在主要问题之前添加介绍性信息来工作。这些信息有助于“设置”模型，提供一个关于主题的完整画面。这样，LLM在回答时就有更多的元素要考虑，因此，相应地，生成更一致和详细的答案。
- en: '****F**or** ****exa**mpl**e, ****be**for**e ****as**kin**g, “****Wh**at** ****a**re**
    ****t**he** ****adva**ntage**s ****o**f** ****so**lar** ****en**erg**y?” ****y**ou**
    ****co**uld** ****ex**pan**d ****o**n** ****t**he** ****con**tex**t ****b**y**
    ****sa**yin**g, “****Gi**ven** ****th**at** ****so**lar** ****en**erg**y ****i**s**
    ****a**** ****rene**wabl**e ****fo**rm** ****o**f** ****elec**tricit**y, ****espe**ciall**y
    ****impo**rtan**t ****i**n** ****ar**eas** ****wh**ere** ****th**ere** ****i**s**
    ****a**** ****l**ot** ****o**f** ****sun**ligh**t ****thro**ughou**t ****t**he**
    ****ye**ar**, ****wh**at** ****a**re** ****t**he** ****adva**ntage**s ****o**f**
    ****th**is** ****ty**pe** ****o**f** ****en**erg**y?” ****B**y** ****prov**idin**g
    ****mo**re** ****de**tai**l ****be**for**e ****t**he** ****ma**in** ****que**stio**n,
    ****t**he** ****L**LM** ****i**s** ****gu**ide**d ****t**o** ****con**side**r
    ****th**ese** ****po**int**s ****i**n** ****th**eir** ****an**swe**r.'
  id: totrans-367
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，在询问“太阳能的优势是什么？”之前，你可以通过以下方式扩展上下文：“鉴于太阳能是一种可再生的电力形式，特别是在全年阳光充足地区非常重要，这种类型能源的优势是什么？”通过在主要问题之前提供更多细节，LLM会被引导考虑这些观点来回答。
- en: '****Ano**the**r ****exa**mpl**e ****o**f** ****h**ow** ****th**is** ****wo**rks**
    ****wo**uld** ****b**e** ****i**f** ****y**ou** ****we**re** ****expl**ainin**g
    ****a**** ****con**cep**t ****t**o** ****a**** ****ch**ild**. ****Be**for**e ****as**kin**g,
    “****Wh**at** ****i**s** ****gra**vit**y?” ****y**ou** ****mi**ght** ****s**ay**,
    “****Ima**gin**e ****th**at** ****y**ou** ****a**re** ****hol**din**g ****a****
    ****ba**ll** ****a**nd** ****y**ou** ****dr**op** ****i**t**. ****T**he** ****ba**ll**
    ****fa**lls** ****t**o** ****t**he** ****gr**oun**d ****bec**aus**e ****o**f**
    ****a**** ****fo**rce** ****ca**lle**d ****gra**vit**y. ****N**ow**, ****wh**at**
    ****i**s** ****gra**vit**y?” ****Th**is** ****ty**pe** ****o**f** ****app**roac**h
    ****cre**ate**s ****a**** ****sce**nari**o ****wh**ere** ****t**he** ****L**LM**
    ****unde**rstand**s ****th**at** ****t**he** ****an**swe**r ****sh**oul**d ****b**e**
    ****ch**ild**-****fri**endl**y.'
  id: totrans-368
  prefs: []
  type: TYPE_NORMAL
  zh: '****Ano**the**r ****exa**mpl**e ****o**f** ****h**ow** ****th**is** ****wo**rks**
    ****wo**uld** ****b**e** ****i**f** ****y**ou** ****we**re** ****expl**ainin**g
    **一个概念** **给一个孩子**。 **在问“**什么是重力？”** **之前**， **你可能会说**， **“想象一下你手里拿着一个球，然后把它扔出去。球会落回地面，因为有一个叫做重力的力。”**
    **然后，** **“现在，什么是重力？”** **这种类型的** **方法** **创建了一个场景**， **其中LLM理解答案应该是孩子友好的**。'
- en: '[****Wh**en** ****t**o** ****u**se** ]'
  id: totrans-369
  prefs: []
  type: TYPE_NORMAL
  zh: '[****Wh**en** ****t**o** ****u**se** ]'
- en: '****T**he** ****Con**tex**t ****Expa**nsio**n ****tech**niqu**e ****sh**oul**d
