  prefs: []
  type: TYPE_NORMAL
- en: '|'
  prefs: []
  type: TYPE_NORMAL
- en: '|'
  prefs: []
  type: TYPE_NORMAL
- en: Normalization
  prefs: []
  type: TYPE_NORMAL
- en: '|'
  prefs: []
  type: TYPE_NORMAL
- en: Maintaining the amplitude of a signal within fixed limits. One way to normalize
    a time-varying positive signal is to divide it by its maximum value, which is
    then bounded by 1.
  prefs: []
  type: TYPE_NORMAL
