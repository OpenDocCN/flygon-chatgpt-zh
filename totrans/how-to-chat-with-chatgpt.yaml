  prefs: []
  type: TYPE_NORMAL
- en: 'Images: You can upload pictures and ask about them'
  prefs: []
  type: TYPE_NORMAL
- en: 'Audio: You can use your voice to ask questions or give commands'
  prefs: []
  type: TYPE_NORMAL
- en: 'Video: Future updates will allow video inputs too'
  prefs: []
  type: TYPE_NORMAL
