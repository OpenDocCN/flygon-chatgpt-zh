- en: '14'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: GenAI for Runtime and Memory Management
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: In the age of big data, artificial intelligence, and intensive data processing,
    an essential characteristic of well written Python programs is their ability to
    efficiently manage both **memory usage** and **runtime performance**. As part
    of the **Software Development Life Cycle (SDLC)**, it is common practice to profile
    our programs, anticipate performance limitations and strive for efficiency in
    both aspects.
  prefs: []
  type: TYPE_NORMAL
- en: In addition to utilizing traditional tools for profiling program performance
    and addressing inefficiencies, we can leverage the **model mastery** of **Large
    Language Models** (**LLMs**) to code profile snippets, analyze maximal capacities,
    and optimize code to handle larger workloads.
  prefs: []
  type: TYPE_NORMAL
- en: 'In this chapter, we will examine two examples of inefficient implementations:
    a Fibonacci calculator with significant runtime overhead and a statistical analysis
    function that demands excessive memory for large matrices. By utilizing prompt
    precision best practices and **chaining** prompt engineering technique, we will
    demonstrate how GenAI applications can help profile performance metrics, estimate
    maximum capacities, and optimize the code to handle larger inputs effectively.'
  prefs: []
  type: TYPE_NORMAL
- en: 'The topics covered in this chapter include:'
  prefs: []
  type: TYPE_NORMAL
- en: Introducing time and space complexity analysis
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Profiling runtime and memory consumption with GitHub Copilot
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Analyzing maximal capacity with ChatGPT
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Optimizing code with chained prompts
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Technical requirements
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'To get the most out of this chapter, ensure you have the following:'
  prefs: []
  type: TYPE_NORMAL
- en: GitHub Copilot account
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: IDE – either VS Code or Pycharm
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: OpenAI account with access to ChatGPT and OpenAI API
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Access to the book’s repository available at: [https://github.com/PacktPublishing/Supercharged-Coding-with-Gen-AI](https://github.com/PacktPublishing/Supercharged-Coding-with-Gen-AI)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Virtual environment set up in VS Code or PyCharm
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: OpenAI API token
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: For assistance setting up a GitHub Copilot account, refer to [*Chapter 3*](Chapter_3.xhtml#_idTextAnchor108).
    For instructions on setting up OpenAI API access and token generation, see [*Chapter
    2*](Chapter_2.xhtml#_idTextAnchor061). If you need help creating an OpenAI account
    or setting up a virtual environment in your IDE, refer to the *Appendix* for detailed
    guidance.
  prefs: []
  type: TYPE_NORMAL
- en: Introducing time and space analysis
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: In our current technology cycle, most companies are leveraging big data and
    artificial intelligence to improve their businesses. For example, videos on the
    YouTube and TikTok platforms are viewed over a billion times per day which generates
    recommendations and advertising value. In these cases, even 1% gains in efficiency
    for storage or computation may save millions of dollars.
  prefs: []
  type: TYPE_NORMAL
- en: According to *Lambda Labs*, training the generative pre-trained transformer
    model *GPT-3* involved about 700 gigabytes of **Random Access Memory (RAM)** and
    thousands of powerful Nvidia GPUs operating in parallel, with a cumulative compute
    time equivalent to 355 years. Even a minor inefficiency in implementing these
    models could lead to substantial costs or, in the worst case, create a bottleneck
    that would prevent the model from running effectively.
  prefs: []
  type: TYPE_NORMAL
- en: The runtime of a program
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The runtime of a program refers to the time it takes to execute the tasks defined
    in the source code on a specific hardware configuration with a given input. The
    runtime duration of a program depends on factors such as the computational complexity
    (the number of operations required to complete the task) and the hardware such
    as the **central processing unit (CPU)**.
  prefs: []
  type: TYPE_NORMAL
- en: 'For example, consider an inefficient implementation of the Fibonacci number
    computation using recursion:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE288]'
  prefs: []
  type: TYPE_PRE
- en: 'In this implementation, each Fibonacci number computation involves two recursive
    calls: one for the previous number and another for the one before that. Each of
    these calls triggers two additional recursive calls, and so on, until the base
    condition `n <= 1` is met.'
  prefs: []
  type: TYPE_NORMAL
- en: 'To illustrate how quickly the runtime of this implementation grows, here are
    examples of recorded runtimes on a MacBook Pro with an M1 chip using this implementation:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Runtime for `fibonacci_recursive(5)`: 0.000006 seconds'
  prefs: []
  type: TYPE_NORMAL
- en: 'Runtime for `fibonacci_recursive(35)`: 1.7051 seconds'
  prefs: []
  type: TYPE_NORMAL
- en: 'Runtime of `fibonacci_recursive(40)`: 19.5045 seconds'
  prefs: []
  type: TYPE_NORMAL
- en: Computing the `fibonacci_recursive(100)` is estimated to take 15 trillion seconds,
    or approximately 475,000 years, making it completely impractical. This exponential
    growth represents one of the least desirable complexities in algorithm design
    as it remains inefficient regardless of the hardware used, as we will now explore.
  prefs: []
  type: TYPE_NORMAL
- en: Runtime complexity refresher
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Since computers vary in speed, it is widespread practice to measure runtime
    complexity in general terms using **Big-O notation**, denoted as ![](../Images/B31534_14_001.png).
    This notation describes how the runtime scales relatively to the size of the input
    data.
  prefs: []
  type: TYPE_NORMAL
- en: 'For instance:'
  prefs: []
  type: TYPE_NORMAL
- en: Finding the minimum number in an unsorted array of length ![](../Images/B31534_14_002.png)has
    a runtime complexity of ![](../Images/B31534_14_003.png)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Printing all ![](../Images/B31534_14_004.png)combinations of elements in an
    array of length ![](../Images/B31534_14_002.png)has a runtime complexity of ![](../Images/B31534_14_006.png).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Retrieving the nth Fibonacci number using `fibonacci_recursive` has a runtime
    complexity of ![](../Images/B31534_14_007.png).
  prefs: []
  type: TYPE_NORMAL
- en: If you need a further refresher on Big-O notation or are unfamiliar with it,
    we recommend checking the *Further Reading* section at the end of this chapter.
    Big-O notation is an essential concept for developers, both in application design
    and day-to-day problem-solving.
  prefs: []
  type: TYPE_NORMAL
- en: The space consumption of a program
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The RAM consumed by a program during execution reflects its memory space usage.
    For instance, a MacBook Pro with 16 **gigabytes (GB)** of RAM can hold about 2
    billion float64 values where each `float64` occupies 8 bytes.
  prefs: []
  type: TYPE_NORMAL
- en: 'Consider the following inefficient function `get_top_video` that reads a **comma-separated
    values (CSV)** file into memory as a *Pandas DataFrame* and returns the video
    with the highest average watch percentage:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE289]'
  prefs: []
  type: TYPE_PRE
- en: 'The input CSV file may represent a matrix as follows, where each cell indicates
    the percentage of a specific video watched by a user:'
  prefs: []
  type: TYPE_NORMAL
- en: '|  | video_1 | video_2 | video_3 | video_4 | video_5 | video_6 | ... |'
  prefs: []
  type: TYPE_TB
- en: '| user_1 |  | 0.5 |  |  |  | 1 |  |'
  prefs: []
  type: TYPE_TB
- en: '| user_2 | 0.1 |  |  | 0.7 |  | 0.9 |  |'
  prefs: []
  type: TYPE_TB
- en: If the input dataset contains 50,000 users (rows) and 50,000 videos (columns),
    this would involve loading 2.5 billion cells into memory. Such a large dataset
    exceeds the 16 GB RAM limit, leading to an **out-of-memory error** and causing
    the function to fail.
  prefs: []
  type: TYPE_NORMAL
- en: Space complexity
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: To assess memory usage, developers often use space complexity, expressed in
    Big-O notation, to describe how memory usage scales with the size of the data
    structure. For example, in `get_top_video`, the space complexity is ![](../Images/B31534_14_008.png)
    for a CSV file with ![](../Images/B31534_14_009.png)rows and ![](../Images/B31534_14_002.png)columns,
    as the function loads the entire dataset into memory.
  prefs: []
  type: TYPE_NORMAL
- en: Balancing efficiency tradeoffs
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: When designing programs, it is common to encounter tradeoffs between memory
    usage and runtime efficiency. For instance, **caching** is the process of storing
    information such as a function’s calculated output values in RAM rather than recomputing
    them. This can significantly improve the speed of repeated calculations but also
    increases memory consumption. In a program that calls `fibonacci_recursive` repeatedly
    with the same input, such as `n=35` which previously took 1.7 seconds to run,
    caching the result could save 1.7 seconds for each subsequent call.
  prefs: []
  type: TYPE_NORMAL
- en: Another tradeoff is with the `get_top_video` we read the entire file into memory
    before starting the calculations. It may be more practical to read smaller batches
    of data from disk and compute the cumulative top videos for each batch sequentially
    rather than handling the entire dataset at once. Reading and processing smaller
    chunks of large CSV files might take more time but helps avoid exceeding RAM limitations.
  prefs: []
  type: TYPE_NORMAL
- en: Now that we grasp the importance of runtime and space efficiency, how to assess
    their complexity, and the trade-offs involved, we can move forward and explore
    how GenAI can assist with each step in managing and optimizing program efficiency.
  prefs: []
  type: TYPE_NORMAL
- en: Profiling runtime and memory consumption with GitHub Copilot
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Profiling runtime and memory usage is a straightforward process. The built-in
    `time` module is useful for tracking runtime and the third-party `memory_profiler`
    library monitors memory usage. The next two sub-sections describe how GitHub Copilot
    can assist by either completing our implementation or generating the code from
    scratch for these two cases. At the end of this section, we will ask ChatGPT to
    predict runtimes and memory size constraints using these analyses as input.
  prefs: []
  type: TYPE_NORMAL
- en: Profiling runtime
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Measuring the runtime of a function in Python helps evaluate whether the time
    taken to complete the tasks in the source code aligns with acceptable thresholds
    and identifies potential areas for improvement. This can be achieved using a script
    like the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE290]'
  prefs: []
  type: TYPE_PRE
- en: By recording the time before and after execution, we can calculate the runtime
    as the difference between these times to compute the 35th Fibonacci number.
  prefs: []
  type: TYPE_NORMAL
- en: In[*Chapter 15*](Chapter_15.xhtml#_idTextAnchor610), we will explore how to
    use **decorators** to log application performance. For now, we will simply use
    `start` and `end` times to measure program runtime.
  prefs: []
  type: TYPE_NORMAL
- en: 'Since the profiling code is short and straightforward, the authors mostly use
    GitHub Copilot for such tasks. The following example demonstrates how Copilot
    can understand the purpose of our file, *profile_runtime.py*, by applying the
    five S’s for prompt precision as shown in *Figure 14.1*:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 14.1: Copilot completion](../Images/B31534_14_1.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 14.1: Copilot completion'
  prefs: []
  type: TYPE_NORMAL
- en: In this example, we named the file *profile_runtime.py* and included the necessary
    imports for the `time` package and the `fibonacci_recursive` function to establish
    a clear context for Copilot. Based on these, Copilot is likely to identify our
    goal of profiling the `fibonacci_recursive` function and suggests a complete implementation
    for runtime profiling.
  prefs: []
  type: TYPE_NORMAL
- en: 'Alternatively, we can use chat, ChatGPT or OpenAI API to generate the profiling
    script from scratch. For example, we could use the following prompt in Copilot
    chat:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE291]'
  prefs: []
  type: TYPE_PRE
- en: 'Below is a sample implementation provided by Copilot in PyCharm:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 14.2: Copilot chat to write the full method from a profiling suggestion](../Images/B31534_14_2.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 14.2: Copilot chat to write the full method from a profiling suggestion'
  prefs: []
  type: TYPE_NORMAL
- en: This code can be used as-is to profile the runtime of the function. Alternatively,
    we can make slight modifications, such as rounding the runtime value for better
    readability.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here is an output from running the suggested profiling script:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE292]'
  prefs: []
  type: TYPE_PRE
- en: While a runtime of 1.7 seconds for `n=35` might seem reasonable, the runtime
    for larger inputs, such as 50 or 100, becomes impractical. Later in this chapter,
    we will explore techniques to identify and address these challenges.
  prefs: []
  type: TYPE_NORMAL
- en: Profiling space usage
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Profiling a program’s memory usage can be achieved with the `@profile` decorator
    from the `memory_profiler` package. This lightweight tool monitors memory usage
    for every line within a function. The package should be included in the *requirements.txt*
    file of this book’s repository, so it should already be accessible in your virtual
    environment.
  prefs: []
  type: TYPE_NORMAL
- en: 'For example, to profile the function `get_top_video`, which retrieves the video
    with the highest average watch percentage, we can add the `@profile` decorator
    before the function definition. A call to the function with the file *interactions_10_000.csv*
    that records 10,000 users’ watch percentages of 10,000 videos will log the memory
    consumption for each line:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE293]'
  prefs: []
  type: TYPE_PRE
- en: 'The profiling output provides details such as line numbers, total memory usage,
    incremental memory usage, the number of times each statement was executed, and
    the content of those executions. For reference, *Figure 14.3* shows the output
    from the code above:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 14.3: Profiler output showing memory consumption by line](../Images/B31534_14_3.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 14.3: Profiler output showing memory consumption by line'
  prefs: []
  type: TYPE_NORMAL
- en: 'The file *interactions_10_000.csv* contains 10,000 x 10,000 cells of type float64,
    requiring 8 bytes each, and the expected memory usage is approximately:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/B31534_14_011.png)'
  prefs: []
  type: TYPE_IMG
- en: This aligns closely with the memory consumption recorded at line 7, where loading
    the CSV file into a Pandas DataFrame consumed 889.7 MB. This includes both the
    memory required for the cell data and the overhead associated with the Pandas
    DataFrame object such as column and row names, metadata, and type.
  prefs: []
  type: TYPE_NORMAL
- en: Having learned how to use GitHub Copilot to simplify the creation of profiling
    scripts for runtime and space complexity, we can move forward and explore how
    to use Copilot to profile multiple runs and ChatGPT to estimate the maximum input
    capacity that our functions can manage.
  prefs: []
  type: TYPE_NORMAL
- en: Analyzing maximal capacity with ChatGPT
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Identifying the maximal capacity of a function means determining the largest
    input beyond which it will fail due to either memory limitations or unacceptable
    runtime. One strategy for such predictions involves profiling its performance
    for a few input sizes, identifying the runtime or space growth, and then estimating
    the maximal capacity the function can handle. GenAI can assist in this two-step
    process by automating profiling for different inputs and using the results as
    supplementary data for a prompt to compute the maximal capacity.
  prefs: []
  type: TYPE_NORMAL
- en: Profiling runtime across multiple runs
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Copilot can assist us in creating a profiling loop for `fibonacci_recursive`
    like we did for a single profile. For instance, if we want to profile the runtime
    of the function for inputs ranging from 10 to 40 in steps of 5, we can start by
    adding the following import statements to the file:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE294]'
  prefs: []
  type: TYPE_PRE
- en: 'Then use a prompt in Copilot chat like this:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE295]'
  prefs: []
  type: TYPE_PRE
- en: 'This prompt, along with the surrounding context of the import statements in
    the file, is likely to generate a code to profile runtimes for varying arguments:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 14.4: Profiling suggestion for profiling multiple Fibonacci inputs](../Images/B31534_14_4.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 14.4: Profiling suggestion for profiling multiple Fibonacci inputs'
  prefs: []
  type: TYPE_NORMAL
- en: 'We can use the generated code as-is or make minor adjustments, such as rounding
    the recorded times to four decimal places or changing the range’s stop value to
    41\. When executed on an M1 MacBook Pro with a 16GHz CPU, the following runtime
    profiling was recorded:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE296]'
  prefs: []
  type: TYPE_PRE
- en: This runtime profiling will be used as input for a GenAI application to analyze
    the function’s complexity and determine the input size capacity.
  prefs: []
  type: TYPE_NORMAL
- en: Profiling memory consumption across multiple runs
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Profiling the memory consumption across multiple runs of `get_top_video` function
    can be done with a straightforward approach:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE297]'
  prefs: []
  type: TYPE_PRE
- en: In this example, the files *interactions_100.csv, interactions_1000.csv*, and
    *interactions_10_000.csv* represent datasets of user-video interactions of row
    and column length corresponding to the numbers in their filenames.
  prefs: []
  type: TYPE_NORMAL
- en: 'Copilot can assist by completing the `for` loop, after including the filenames,
    as shown below:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 14.5: Copilot code completion suggestion](../Images/B31534_14_5.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 14.5: Copilot code completion suggestion'
  prefs: []
  type: TYPE_NORMAL
- en: The generated code can be used as-is or modified slightly, for instance, by
    enhancing the print statement to include information about the file size.
  prefs: []
  type: TYPE_NORMAL
- en: 'For reference, running this code produced the following profiling:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 14.6: profiling memory usage output](../Images/B31534_14_6.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 14.6: profiling memory usage output'
  prefs: []
  type: TYPE_NORMAL
- en: 'The memory usage for reading the CSV files grows as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: 0.6 MB for a 100 x 100 matrix
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 29.9 MB for a 1,000 x 1,000 matrix
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 889 MB for a 10,000 x 10,000 matrix
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: This memory consumption data can be included as supplementary information in
    our prompts included as supplementary information in our prompts to estimate maximum
    matrix sizes that the function can handle, as we see next in this chapter.
  prefs: []
  type: TYPE_NORMAL
- en: Determining maximal capacity within runtime constraints
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'The *GPT-4o1* model is specifically designed to excel in chain-of-thought reasoning,
    making it highly effective for determining maximum capacities under runtime constraints.
    To leverage this capability, we can create precise prompts following the five
    S’s, including the function’s source code and associated profiling. An ideal structure
    for these prompts might look as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE298]'
  prefs: []
  type: TYPE_PRE
- en: 'For example, when using this prompt with a runtime limit of 100 seconds, the
    *GPTo1-mini* model in ChatGPT provided the following reasoning steps:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Profiling Analysis**: Repeatedly reviewed the reported profiling.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Observations**: Identified the exponential growth in runtime.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Calculations**: Computed the largest input within the time limit.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Conclusion**: Determined the maximum input to be 43.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'These reasoning steps result in the final answer, the conclusion step, as illustrated
    in *Figure 14.7*:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 14.7: GPT-4o1-mini maximal capacity conclusion](../Images/B31534_14_7.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 14.7: GPT-4o1-mini maximal capacity conclusion'
  prefs: []
  type: TYPE_NORMAL
- en: 'The model predicted a runtime of 78.5 seconds for `n=43` and 123 seconds for
    `n=44`. When we measured the actual runtime using our script, it was 81.08 seconds
    and 129.07 seconds respectively, demonstrating a close match and correct identification
    of the maximal capacity:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE299]'
  prefs: []
  type: TYPE_PRE
- en: 'For your reference, here is the full prompt used in this example:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE300]'
  prefs: []
  type: TYPE_PRE
- en: In the upcoming chapters, we will explore how to intentionally collect data
    for integration with OpenAI API as part of SDLC automation.
  prefs: []
  type: TYPE_NORMAL
- en: Determining maximal capacity within memory constraints
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'A similar prompt structure to the one used for identifying maximum capacities
    under runtime constraints can also be applied to memory constraints:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE301]'
  prefs: []
  type: TYPE_PRE
- en: Here, the cue in the prompt is adjusted slightly to `MAXIMAL ROWS / MAXIMAL
    COLUMNS`, to emphasize the 2D dimensions of the input.
  prefs: []
  type: TYPE_NORMAL
- en: 'For instance, when using this template for the `get_top_video` function in
    ChatGPT with the *GPT-4o1* model, along with recorded results from sparse matrices
    of sizes 100 x 100, 1,000 x 1,000, and 10,000 x 10,000, the model generated the
    following reasoning steps:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Profiling Analysis**: Included an understanding of the memory usage data
    and its scaling behavior.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Conclusion**: Estimated the largest input for a memory limit of 5GB.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Final Recommendation**: Suggested a matrix size of 22,000 x 22,000 as the
    largest feasible input.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'These reasoning steps result in the final answer, the final recommendation
    step, as illustrated in *Figure 14.8*:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 14.8: GPT-4o1-mini reasoning for maximal capacity](../Images/B31534_14_8.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 14.8: GPT-4o1-mini reasoning for maximal capacity'
  prefs: []
  type: TYPE_NORMAL
- en: When executing the script with a file containing a 22,000 x 22,000 matrix, the
    recorded memory usage peak was 4.63 GB, closely aligning with the model’s prediction.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 14.9: Memory usage below 5GB](../Images/B31534_14_9.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 14.9: Memory usage below 5GB'
  prefs: []
  type: TYPE_NORMAL
- en: This memory usage aligns with ChatGPT’s capacity assessment and is below the
    required 5GB RAM limit.
  prefs: []
  type: TYPE_NORMAL
- en: 'For reference, here is the complete prompt used to generate this output:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE302]'
  prefs: []
  type: TYPE_PRE
- en: The profiling information was omitted due to brevity constraints and includes
    a direct copy-paste of the terminal output, as shown in *Figure 14.6*. The full
    prompt can be found at *ch14/code_samples/chatgpt_maximum_input_prompt.txt*. This
    prompt successfully predicted a maximum input size of 22,000 rows and 22,000 columns.
  prefs: []
  type: TYPE_NORMAL
- en: In both these cases, ChatGPT is certainly extrapolating the input values to
    predict the runtime or maximum dimensions. It requires sufficient input values
    to make such a prediction and may not be as accurate as performing your own calculations,
    but it is a reasonable approximation.
  prefs: []
  type: TYPE_NORMAL
- en: Next in this chapter, we will explore how to use GenAI and increase the capacity
    of the functions such as algorithms with better runtime complexity and dealing
    with chunks.
  prefs: []
  type: TYPE_NORMAL
- en: Optimizing code with chained prompts
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: The previous examples depict the simple coding and estimation capability of
    LLMs. However, LLMs can do much more. They can create code for improved algorithms
    and even balance specific runtime and memory efficiency goals.
  prefs: []
  type: TYPE_NORMAL
- en: 'To effectively increase the input capacities, we will **chain** our optimization
    prompt to the results of the maximal capacity prompt. The initial prompt already
    provides essential details, such as the function, runtime or memory limits, and
    profiling various inputs. The optimization prompt should also include the following
    key information:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Optimization goal**: Clearly specify the primary goal, either on improving
    runtime complexity, reducing memory usage, or both. Detail the desired approach
    as much as possible, such as batching, or improving algorithm complexity.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Function docstring**: Provide a concise description of the function’s purpose,
    along with any constraints or requirements.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Input requirements**: Define the new input goals under the runtime or memory
    constraints, such as computing the 1,000,000^(th) Fibonacci number or handling
    a matrix with 100,000 rows and 100,000 columns.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: For more complex scenarios, additional details may be helpful, such as previous
    optimization attempts, dependencies on external functions or resources, frequency
    of function calls or concurrent usage patterns, and acceptable trade-offs, such
    as allowing longer runtimes in exchange for reduced memory usage.
  prefs: []
  type: TYPE_NORMAL
- en: This information will be integrated into a chained prompt, following the five
    S’s for precision and clarity.
  prefs: []
  type: TYPE_NORMAL
- en: Runtime optimization
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Let us examine a runtime optimization for the `fibonacci_recursive` function.
    Below is an example of a chained prompt, building on an initial prompt of maximal
    capacity as presented earlier in the chapter. This prompt requests an improved
    implementation with better runtime complexity to handle an input of 1,000,000:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE303]'
  prefs: []
  type: TYPE_PRE
- en: This prompt includes a docstring describing out specific task of optimizing
    runtime complexity to achieve the target input of 1,000,000\. Providing different
    constraints, such as a smaller input size, will yield a different output from
    the model.
  prefs: []
  type: TYPE_NORMAL
- en: 'A typical approach for Fibonacci calculations has a ![](../Images/B31534_14_003.png)
    complexity, however *GPT-4o1* suggested a more efficient implementation for large
    inputs, achieving a runtime complexity of ![](../Images/B31534_14_013.png) through
    the fast-doubling recursive approach:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 14.10: Fast-doubling approach for handling large inputs](../Images/B31534_14_10.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 14.10: Fast-doubling approach for handling large inputs'
  prefs: []
  type: TYPE_NORMAL
- en: 'And here is the code proposed by *GPT-4o1*:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE304]'
  prefs: []
  type: TYPE_PRE
- en: 'While this implementation also uses recursion, it makes a call to ![](../Images/B31534_14_014.png)
    (![](../Images/B31534_14_015.png)without remainder) reducing the number of function
    invocations to approximately ![](../Images/B31534_14_016.png). To illustrate its
    efficiency, here are performance comparisons for calculating the 1,000,000^(th)
    Fibonacci number:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE305]'
  prefs: []
  type: TYPE_PRE
- en: As another benchmark, computing the 10,000,000^(th) Fibonacci number with `fibonacci_fast_doubling`
    took 2.26 seconds, whereas the iterative approach did not complete within a 10-minute
    time limit.
  prefs: []
  type: TYPE_NORMAL
- en: 'This method leverages the mathematical identities:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/B31534_14_017.png)'
  prefs: []
  type: TYPE_IMG
- en: '![](../Images/B31534_14_018.png)'
  prefs: []
  type: TYPE_IMG
- en: Where ![](../Images/B31534_14_019.png) is the k-th Fibonacci number.
  prefs: []
  type: TYPE_NORMAL
- en: Using these identities, once ![](../Images/B31534_14_019.png) and ![](../Images/B31534_14_021.png)
    are calculated, ![](../Images/B31534_14_022.png) and ![](../Images/B31534_14_023.png)
    can be determined efficiently. This means we do not need to compute all Fibonacci
    numbers sequentially up to the 1,000,000^(th) number but only focus on its halves,
    significantly reducing the required computations.
  prefs: []
  type: TYPE_NORMAL
- en: Space optimization
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Like the runtime optimization prompt, we can chain a request to optimize a function
    to fit within RAM constraints. The prompt structure remains similar, but it describes
    a memory limit instead of a runtime limit, along with an optimization request
    to address memory usage.
  prefs: []
  type: TYPE_NORMAL
- en: 'For example, consider the following chained prompt requesting an optimization
    for the `get_top_video` function to handle a matrix of 100,000 rows by 100,000
    columns within a 5GB RAM limit:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE306]'
  prefs: []
  type: TYPE_PRE
- en: This prompt specifies the size of the input matrix (100,000 rows by 100,000
    columns) and builds upon the previously defined RAM limit of 5GB.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 14.11: ChatGPT suggestion for chunk-based processing](../Images/B31534_14_11.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 14.11: ChatGPT suggestion for chunk-based processing'
  prefs: []
  type: TYPE_NORMAL
- en: Based on this information, ChatGPT suggested processing the CSV file in batches
    of 1,000 rows, which is an appropriate solution for handling data of this size
    efficiently.
  prefs: []
  type: TYPE_NORMAL
- en: In this scenario, specifying the input requirements is vital. For larger matrices,
    working with a Pandas DataFrame may become impractical, necessitating an alternative
    solution. Conversely, for matrices with fewer columns, larger column chunks might
    be sufficient.
  prefs: []
  type: TYPE_NORMAL
- en: 'For your reference, here is the implementation for processing the matrix in
    chunks provided by ChatGPT with the prompt above:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE307]'
  prefs: []
  type: TYPE_PRE
- en: 'When profiling the implementation with an input of 100,000 rows and 100,000
    columns, the chunked implementation concluded with a memory usage of 4,326.1 GB:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 14.12: Improved memory utilization with chunking](../Images/B31534_14_12.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 14.12: Improved memory utilization with chunking'
  prefs: []
  type: TYPE_NORMAL
- en: In line 13, we can see that the matrix was processed in 100 chunks, with each
    chunk containing 1,000 columns.
  prefs: []
  type: TYPE_NORMAL
- en: The proposed solutions can be further refined to meet both memory and runtime
    requirements. It is always advisable to test new implementations against both
    criteria to ensure the solution is satisfactory in terms of both efficiency and
    performance.
  prefs: []
  type: TYPE_NORMAL
- en: Further runtime and space optimization
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The previous optimizations focused on single CPU algorithms. GenAI can go beyond
    these and recommend additional techniques. For instance, it may be appropriate
    to use parallelization with threads, leverage **graphical processing units** (**GPUs**),
    or adopt more efficient file formats like sparse matrices or *Apache Parquet*.
    In the function `get_top_video`, processing different videos can be performed
    in parallel by integrating threading. Further acceleration could be achieved by
    leveraging GPUs, as each column can be processed independently of others. Alternatively,
    converting the file format from CSV to a more efficient option could enhance performance.
    Formats like **compressed sparse row** (**CSR**) or **compressed sparse column**
    (**CSC**) from *SciPy* are well-suited for sparse data, while columnar storage
    formats like Apache Parquet are ideal for handling large datasets.
  prefs: []
  type: TYPE_NORMAL
- en: Summary
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: In this chapter, we explored how LLMs can assist in ensuring efficient applications
    by profiling runtime and memory usage, identifying maximal capacities, and suggesting
    optimized code to increase those capacities.
  prefs: []
  type: TYPE_NORMAL
- en: Using the recursive Fibonacci example, we saw how adopting a more efficient
    algorithm significantly reduces runtime. With the `get_top_video` function, we
    tackled large matrices under RAM constraints, assisting GenAI to optimize memory
    usage through chunking. GitHub Copilot assisted in profiling runtime and memory
    consumption and profiling runs across different inputs. ChatGPT estimated the
    maximal capacity within runtime and RAM constraints. Leveraging chained prompts,
    ChatGPT demonstrated the ability to vastly improve the implementation to achieve
    larger capacities and can do much more.
  prefs: []
  type: TYPE_NORMAL
- en: In the next chapter, we will further explore how to integrate GenAI into the
    SDLC, focusing on logging, monitoring applications, and error handling.
  prefs: []
  type: TYPE_NORMAL
- en: Quiz time
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'Before you proceed to the next chapter, make sure that you can confidently
    answer the following questions:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Question 1**: How can Copilot assist in profiling the runtime and memory
    usage of a program?'
  prefs: []
  type: TYPE_NORMAL
- en: '**Answer**: Profiling runtime and memory usage in Python can be achieved using
    the built-in `time` module and the third-party `memory-profiler` package. Copilot
    can assist by either completing a starter code or generating that functionality
    from scratch based on a precise prompt.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Question 2**: How can ChatGPT help identify maximal inputs under runtime
    or RAM constraints?'
  prefs: []
  type: TYPE_NORMAL
- en: '**Answer**: By crafting precise prompts that include the function’s source
    code, runtime or RAM constraints, and profiling results, we can utilize the *GPT-4o1*
    model, designed for chain-of-thought reasoning, to calculate the largest input
    manageable within those constraints.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Question 3**: How can chaining prompts help increase program input capacity?'
  prefs: []
  type: TYPE_NORMAL
- en: '**Answer**: After identifying the maximal input a function can handle without
    becoming a bottleneck, a chained prompt can include the desired input size and
    a specific optimization request. *GPT-4o1* can leverage this information to propose
    an optimized solution that follows the runtime and/or memory constraints.'
  prefs: []
  type: TYPE_NORMAL
- en: Further reading
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'To learn more about the topics that were covered in this chapter, look at the
    following resources:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Wikipedia, CPU: [https://en.wikipedia.org/wiki/Central_processing_unit](https://en.wikipedia.org/wiki/Central_processing_unit)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Geeks for geeks memory consumption: [https://www.geeksforgeeks.org/how-to-get-current-cpu-and-ram-usage-in-python](https://www.geeksforgeeks.org/how-to-get-current-cpu-and-ram-usage-in-python)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Introduction to memory profiling in Python: [https://www.datacamp.com/tutorial/memory-profiling-python](https://www.datacamp.com/tutorial/memory-profiling-python)'
