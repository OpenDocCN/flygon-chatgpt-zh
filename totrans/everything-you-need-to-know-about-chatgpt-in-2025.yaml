  zh: 信息管理在人道主义危机中也同样被人工智能所促进。在许多情况下，灾害受害者无法访问传统的通信渠道，或者用于传输信息的必要基础设施遭到破坏。在这里，ChatGPT可以帮助处理大量数据，例如文本消息、通话和电子邮件，以识别受影响区域，创建灾害地图，并帮助国际组织优先考虑他们的努力。
