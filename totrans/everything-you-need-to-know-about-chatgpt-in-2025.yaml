  type: TYPE_NORMAL
  zh: '**此外**，算法和自动化决策-制定的透明度是一个敏感的问题。在金融世界中，AI驱动的决策可能会对人们的生活产生重大影响，例如在贷款审批或投资管理方面。**至关重要的是**，基于AI的系统必须是透明的、可解释的和可审计的，以避免产生可能损害用户的偏见或不公平的决策。'
