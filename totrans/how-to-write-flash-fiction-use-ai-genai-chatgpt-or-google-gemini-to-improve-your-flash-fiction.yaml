- en: '24'
  id: totrans-777
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '24'
- en: The Swan by Sally Ann Melia
  id: totrans-778
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 莎莉·安·梅利亚的《天鹅》
- en: “Mum!”
  id: totrans-779
  prefs: []
  type: TYPE_NORMAL
  zh: “妈妈！”
- en: It was a two-meter-tall, candy-pink inflatable swan.
  id: totrans-780
  prefs: []
  type: TYPE_NORMAL
  zh: 它是一个两米高的，糖果粉红色的充气天鹅。
- en: and it sat squashed and sad-looking in the high street window.
  id: totrans-781
  prefs: []
  type: TYPE_NORMAL
  zh: 它坐在那里，被挤压得看起来很悲伤，在高级街道的橱窗里。
- en: “He does not belong there,” Hazel told me.
  id: totrans-782
  prefs: []
  type: TYPE_NORMAL
  zh: “他不属于那里，”海兹尔告诉我。
- en: He’s ten but he’s wise, so I agreed.
  id: totrans-783
  prefs: []
  type: TYPE_NORMAL
  zh: 他十岁了，但很聪明，所以我同意了。
- en: We walked with purpose into the shop.
  id: totrans-784
  prefs: []
  type: TYPE_NORMAL
  zh: 我们带着目的走进商店。
- en: “Sixty-two pounds,” the till girl told us.
  id: totrans-785
  prefs: []
  type: TYPE_NORMAL
  zh: “六十二磅，”收银员对我们说。
- en: “Oh dear, we can’t afford that,” I told Hazel.
  id: totrans-786
  prefs: []
  type: TYPE_NORMAL
  zh: “哦，亲爱的，我们买不起那个，”我对海兹尔说。
- en: “No, we can’t afford that,” Hazel told me.
  id: totrans-787
  prefs: []
  type: TYPE_NORMAL
  zh: “不，我们买不起那个，”海兹尔告诉我。
- en: The TV news was interrupted by advertisements from a holiday company.
  id: totrans-788
  prefs: []
  type: TYPE_NORMAL
  zh: 电视新闻被一家度假公司的广告打断。
- en: all tanned torsos, tiny bikinis and tall cocktails.
  id: totrans-789
  prefs: []
  type: TYPE_NORMAL
  zh: 全身晒得黝黑，穿着迷你比基尼，手里拿着高脚杯。
- en: And there is the swimming pool
  id: totrans-790
  prefs: []
  type: TYPE_NORMAL
  zh: 那里有游泳池
- en: was our friend, the two-meter-tall, cherry-glass-pink inflatable swan.
  id: totrans-791
  prefs: []
  type: TYPE_NORMAL
  zh: 是我们的朋友，两米高的，樱桃玻璃粉红色的充气天鹅。
- en: A group of youths shoved and fought as they tried to climb on top of him.
  id: totrans-792
  prefs: []
  type: TYPE_NORMAL
  zh: 一群年轻人推搡着，试图爬到它的上面。
- en: Our swan looked embarrassed and just a little scared.
  id: totrans-793
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的天鹅看起来很尴尬，有点害怕。
- en: “He does not belong there,” Hazel told me.
  id: totrans-794
  prefs: []
  type: TYPE_NORMAL
  zh: “他不属于那里，”海兹尔告诉我。
- en: I looked at the name of the holiday company and
  id: totrans-795
  prefs: []
  type: TYPE_NORMAL
  zh: 我看了度假公司的名字，
- en: its resorts in St. Tropez, Caprice and Martinique.
  id: totrans-796
  prefs: []
  type: TYPE_NORMAL
  zh: 它在圣特罗佩斯、卡普里和马提尼克度假村的度假村。
- en: “Well, we can’t afford that,” I told Hazel.
  id: totrans-797
  prefs: []
  type: TYPE_NORMAL
  zh: “嗯，我们买不起那个，”我对海兹尔说。
- en: “No, we can’t afford that,” Hazel told me.
  id: totrans-798
  prefs: []
  type: TYPE_NORMAL
  zh: “不，我们买不起那个，”海兹尔告诉我。
- en: It was a thin paper catalogue.
  id: totrans-799
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一本薄薄的纸制目录。
- en: with pictures of red peppers for 39p and best British beef for £1.69
  id: totrans-800
  prefs: []
  type: TYPE_NORMAL
  zh: 有红色辣椒39便士和最好的英国牛肉1.69英镑
- en: and there, amidst the Thursday specials,
  id: totrans-801
  prefs: []
  type: TYPE_NORMAL
  zh: 在周四特价商品中，
- en: for one week only.
  id: totrans-802
  prefs: []
  type: TYPE_NORMAL
  zh: 仅限一周。
- en: was our perfectly polished, candy-floss-pink, two-meter-tall, inflatable swan.
  id: totrans-803
  prefs: []
  type: TYPE_NORMAL
  zh: 我们那完美抛光的、棉花糖般的粉红色、两米高的、充气天鹅。
- en: “We can afford that,” I told Hazel.
  id: totrans-804
  prefs: []
  type: TYPE_NORMAL
  zh: “我们可以负担得起，”我对海兹尔说。
- en: “Let’s go.”
  id: totrans-805
  prefs: []
  type: TYPE_NORMAL
  zh: “我们走吧。”
- en: As the sun set,
  id: totrans-806
  prefs: []
  type: TYPE_NORMAL
  zh: 当太阳落山时，
- en: we carried him across the mudflats.
  id: totrans-807
  prefs: []
  type: TYPE_NORMAL
  zh: 我们把他带过了泥滩。
- en: that stretched out to the bay of birds and onto the sea.
  id: totrans-808
  prefs: []
  type: TYPE_NORMAL
  zh: 它一直延伸到鸟类的海湾和海洋。
- en: We set him down in the shallow, lapping waves.
  id: totrans-809
  prefs: []
  type: TYPE_NORMAL
  zh: 我们把他放在浅浅的拍打波浪中。
- en: and for one moment he hesitated; he looked back at us with delight and relief.
  id: totrans-810
  prefs: []
  type: TYPE_NORMAL
  zh: 瞬间，他犹豫了一下；他带着喜悦和释然的眼神回望我们。
- en: Until, at last, the wind caught him and he set sail.
  id: totrans-811
  prefs: []
  type: TYPE_NORMAL
  zh: 直到最后一刻，风抓住了他，他扬帆起航。
- en: “That’s where he belongs,” Hazel said.
  id: totrans-812
  prefs: []
  type: TYPE_NORMAL
  zh: “这就是他应该待的地方，”海兹尔说。
- en: And we waved goodbye to our two-meter-tall, baby-pink, inflatable swan.
  id: totrans-813
  prefs: []
  type: TYPE_NORMAL
  zh: 我们向我们的两米高、婴儿粉色的充气天鹅挥手告别。
- en: “Yes, that’s where he belongs,” I agreed.
  id: totrans-814
  prefs: []
  type: TYPE_NORMAL
  zh: “是的，这就是他应该待的地方，”我同意。
- en: “All we had to do was set him free.”
  id: totrans-815
  prefs: []
  type: TYPE_NORMAL
  zh: “我们只需要让他自由。”
- en: 'Judges’ comments:'
  id: totrans-816
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 评委的评论：
- en: This short fiction has a unique charm and a heartwarming narrative that captivates
    the reader with its simplicity and depth.
  id: totrans-817
  prefs: []
  type: TYPE_NORMAL
  zh: 这篇短篇小说具有独特的魅力和温馨的叙事，以其简洁和深度吸引着读者。
- en: Strengths
  id: totrans-818
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 优点
- en: 'Emotional Resonance:'
  id: totrans-819
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 情感共鸣：
- en: The story effectively evokes emotions, creating a strong connection between
    the readers and the characters, especially in their quest to find where the inflatable
    swan truly belongs. This emotional journey is the story’s core, resonating well
    with themes of freedom and belonging.
  id: totrans-820
  prefs: []
  type: TYPE_NORMAL
  zh: 故事有效地唤起情感，在读者和角色之间建立强烈的联系，尤其是在他们寻找充气天鹅真正归属地的过程中。这段情感之旅是故事的核心，与自由和归属的主题产生了良好的共鸣。
- en: 'Vivid Imagery:'
  id: totrans-821
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 生动的意象：
- en: The descriptions of the candy-pink inflatable swan, from being “squashed and
    sad-looking” in a shop window to “setting sail” into the sunset, are vivid and
    engaging. This strong imagery not only brings the story to life but also accentuates
    the narrative’s whimsical and magical elements.
  id: totrans-822
  prefs: []
  type: TYPE_NORMAL
  zh: 对糖果粉红色的充气天鹅的描述，从商店橱窗里“被压扁且看起来很悲伤”到“在日落时分扬帆起航”，生动而引人入胜。这种强烈的意象不仅让故事栩栩如生，还突出了叙事的幽默和魔幻元素。
- en: 'Character Relationship:'
  id: totrans-823
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 角色关系：
- en: The relationship between Hazel and the narrator is depicted with warmth and
    depth. Their interactions, characterized by shared dialogue and mirrored sentiments,
    beautifully illustrate their bond and mutual understanding, adding a rich layer
    to the story.
  id: totrans-824
  prefs: []
  type: TYPE_NORMAL
  zh: 海兹尔和叙述者之间的关系以温暖和深度描绘。他们的互动，以共享对话和共鸣的情感为特征，完美地展示了他们的纽带和相互理解，为故事增添了丰富的层次。
- en: Areas for Improvement
  id: totrans-825
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 改进领域
- en: Tighten the dialogue.
  id: totrans-826
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 紧凑对话。
- en: While the repeated dialogue between Hazel and the narrator underscores their
    relationship and the story’s themes, it could be perceived as slightly redundant.
    Refining these exchanges to make them more varied or adding subtle nuances could
    enhance their impact without sacrificing the narrative’s rhythm.
  id: totrans-827
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然海兹尔和叙述者之间重复的对话强调了他们的关系和故事的主题，但可能会被视为略微冗余。通过使这些交流更加多样化或添加细微的细微差别，可以在不牺牲叙事节奏的情况下增强它们的影响力。
- en: 'Expand on Character Development:'
  id: totrans-828
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 扩展角色发展：
- en: Although the story is short, providing a bit more background or insight into
    Hazel’s and the narrator’s lives could deepen the reader’s understanding of their
    motivations. Even a few sentences that hint at why the swan’s freedom is so meaningful
    to them can add layers to their characters.
  id: totrans-829
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然故事简短，但提供更多关于海兹尔和叙述者生活的背景或洞察可以加深读者对他们动机的理解。即使只有几句话暗示为什么天鹅的自由对他们来说如此有意义，也能为他们的角色增添层次。
- en: 'Clarify the Swan’s Perspective:'
  id: totrans-830
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 明确天鹅的视角：
- en: The story anthropomorphizes the swan, attributing emotions and reactions to
    it. While this technique adds whimsy, ensuring consistency and clarity in how
    the swan’s perspectives are presented can strengthen the narrative’s magical realism.
  id: totrans-831
  prefs: []
  type: TYPE_NORMAL
  zh: 故事将天鹅拟人化，赋予它情感和反应。虽然这种技巧增加了幽默感，但确保天鹅的视角呈现的一致性和清晰性可以加强叙事的魔幻现实主义。
- en: '25'
  id: totrans-832
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '25'
- en: My First Chocolate on Mars by Sally Ann Melia
  id: totrans-833
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 《火星上的第一块巧克力》萨莉·安·梅利亚
- en: Chocolate. I am not going to Mars without chocolate. Only chocolate is not standard
    rations for NASA astronauts. OK, the menu includes chocolate mousse as a drink
    served in an aluminum pack. But that’s not my idea of chocolate.
  id: totrans-834
  prefs: []
  type: TYPE_NORMAL
  zh: 巧克力。我不会不带巧克力去火星。好吧，菜单包括巧克力慕斯作为饮料，装在铝包装中。但这不是我的巧克力。
- en: 'My addiction is questionable. I spend a tense hour with the team psychiatrist.
    She almost persuades me to take a paperback - real books being the real luxuries
    of outer space - almost. However, this chat highlights another problem of space
    travel: personal space.'
  id: totrans-835
  prefs: []
  type: TYPE_NORMAL
  zh: 我的上瘾成瘾性值得怀疑。我和团队的心理医生紧张地度过了一个小时。她几乎说服我拿一本平装书——真正的书是太空中的真正奢侈品——几乎。然而，这次聊天突出了太空旅行中的另一个问题：个人空间。
- en: Space flight is a strange life. Cycles of two days exercise follow eight days
    of cryogenic sleep. Thirty-one cycles to reach Mars and then the work begins.
    I packed dark chocolate mint thins, thirty-four to a box. Four boxes means 132
    days when I can savour the unwrapping, the aroma and the crunch. One a day, every
    day of my space adventure.
  id: totrans-836
  prefs: []
  type: TYPE_NORMAL
  zh: 太空飞行是一种奇怪的生活。两天的锻炼周期接着是八天的低温睡眠。经过三十一周期才能到达火星，然后工作就开始了。我打包了黑巧克力薄荷薄片，每盒三十四片。四盒意味着132天，我可以慢慢品尝打开包装、闻到香气和咀嚼的声音。每天一片，每天都是我的太空冒险。
- en: But I also want to be the first woman to eat chocolate on Mars. In secret, I
    place the treat in its gold foil into my mouth, as I suit up. I hold it there
    as the capsule burns through the atmosphere down to the surface. The boosters
    roar as they break our fall. Finally, I climb through the hatch and down to stand
    on red soil.
  id: totrans-837
  prefs: []
  type: TYPE_NORMAL
  zh: 但我也想成为第一个在火星上吃巧克力的女人。在秘密中，我把这块巧克力放在金箔里，放进嘴里，当我穿上太空服时。我把它保持在嘴里，直到胶囊穿过大气层到达表面。助推器咆哮着，打破了我们的坠落。最后，我爬过舱门，站在红色的土壤上。
- en: I look around and focus on slowing my pounding heart. Meanwhile I peal the foil
    back with my teeth and spit the wrapper into my helmet. The chocolate is melting
    across my tongue. I sigh and breathe deep.
  id: totrans-838
  prefs: []
  type: TYPE_NORMAL
  zh: 我环顾四周，专注于放慢我剧烈跳动的心脏。同时，我用牙齿撕开箔纸，把包装纸吐进头盔里。巧克力在我的舌头上融化。我叹了口气，深深地呼吸了一口。
- en: Dark Chocolate. Red Planet.
  id: totrans-839
  prefs: []
  type: TYPE_NORMAL
  zh: 黑巧克力。红色星球。
- en: An alarm sounds in my helmet. A warning appears in my view. My oxygen inlet
    is blocked. I reach to my neck. The chocolate warms me from inside, but I can’t
    breathe. I cough. I crumble.
  id: totrans-840
  prefs: []
  type: TYPE_NORMAL
  zh: 我的头盔里响起警报。我的视野中出现了警告信息。我的氧气入口被堵住了。我伸手到脖子上。巧克力从内部温暖了我，但我无法呼吸。我咳嗽起来。我身体开始崩溃。
- en: I am the first woman killed by chocolate on Mars.
  id: totrans-841
  prefs: []
  type: TYPE_NORMAL
  zh: 我是第一个在火星上被巧克力夺去生命的女人。
- en: Judges’ Comments
  id: totrans-842
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 判决者评论
- en: 'This piece of fiction presents a unique blend of science fiction and a personal
    narrative cantered around the protagonist’s love for chocolate. Here are three
    strengths and three areas that could be improved for this story to stand out in
    a competition:'
  id: totrans-843
  prefs: []
  type: TYPE_NORMAL
  zh: 这篇科幻小说将科幻与围绕主角对巧克力的个人叙述的独特融合。以下是三个优点和三个可以改进的领域，以使这个故事在比赛中脱颖而出：
- en: 'Strengths:'
  id: totrans-844
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 优点：
- en: 'Original Concept:'
  id: totrans-845
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 原始概念：
- en: The idea of focusing on something as mundane as chocolate in the context of
    a high-stakes space mission to Mars is both original and engaging. It offers a
    humanizing contrast to the technological and impersonal aspects typically associated
    with space travel, making the story memorable.
  id: totrans-846
  prefs: []
  type: TYPE_NORMAL
  zh: 在火星这样高风险的太空任务背景下关注如此平凡的巧克力这一想法既原创又引人入胜。它为与太空旅行通常关联的技术和冷漠方面提供了一个人性化的对比，使故事令人难忘。
- en: 'Immersive Details:'
  id: totrans-847
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 沉浸式细节：
- en: The specifics about space travel, like the cycles of exercise and cryogenic
    sleep, alongside the description of savouring chocolate in space, effectively
    draw readers into the protagonist’s world. These details provide a solid sense
    of place and atmosphere, enhancing the story’s believability.
  id: totrans-848
  prefs: []
  type: TYPE_NORMAL
  zh: 关于太空旅行的具体细节，如锻炼和低温睡眠的周期，以及描述在太空中品尝巧克力的情景，有效地将读者带入主角的世界。这些细节提供了一个坚实的地方感和氛围感，增强了故事的可信度。
- en: 'Emotional Connection:'
  id: totrans-849
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 情感联系：
- en: The protagonist’s passion for chocolate and her determination to enjoy it on
    Mars create an emotional anchor for the reader. This connection not only humanizes
    the character but also adds a layer of relatability, as it displays how personal
    quirks and desires accompany us, even into space.
  id: totrans-850
  prefs: []
  type: TYPE_NORMAL
  zh: 主角对巧克力的热情以及她决心在火星上享受它，为读者创造了一个情感支点。这种联系不仅使角色人性化，还增加了一层可联系性，因为它展示了个人怪癖和欲望如何伴随着我们，甚至进入太空。
- en: 'Areas for Improvement:'
  id: totrans-851
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 改进领域：
- en: 'Plot Development and Clarity:'
  id: totrans-852
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 情节发展和清晰度：
- en: The twist ending, where the protagonist is endangered (and possibly killed)
    by chocolate, is sudden and somewhat confusing. While dramatic, the story could
    benefit from a clearer buildup or more hints earlier on to prepare the reader
    for this conclusion, ensuring the ending feels earned rather than abrupt.
  id: totrans-853
  prefs: []
  type: TYPE_NORMAL
  zh: 故事的转折结局，主角因巧克力而受到威胁（甚至可能被杀害），是突然的，有些令人困惑。虽然戏剧性，但故事可以从更清晰的铺垫或更早的暗示中受益，以便让读者为这个结局做好准备，确保结局感觉是应得的，而不是突然的。
- en: 'Character Depth:'
  id: totrans-854
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 角色深度：
- en: Aside from the protagonist’s love for chocolate, we get little sense of her
    personality or background. Fleshing out her character with more details about
    her life, motivations for going to Mars, or reflections on her journey could make
    readers care more deeply about her fate.
  id: totrans-855
  prefs: []
  type: TYPE_NORMAL
  zh: 除了主角对巧克力的喜爱，我们对她的人格或背景知之甚少。通过更多关于她生活、去火星的动机或对旅程的反思的细节来丰富她的角色，可以使读者更加深刻地关心她的命运。
- en: 'Technical Realism:'
  id: totrans-856
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 技术现实主义：
- en: While the focus on chocolate is engaging, the story’s realism suffers slightly
    at the end. The scenario of being killed by chocolate blocking an oxygen inlet
    might seem implausible to readers familiar with space suit technology and safety
    protocols. Ensuring scientific accuracy or providing a more detailed explanation
    of how the chocolate causes a fatal issue could enhance the story’s credibility.
  id: totrans-857
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然对巧克力的关注引人入胜，但故事在结尾处略显现实主义不足。被巧克力阻塞氧气入口而被杀的情景可能对熟悉太空服技术和安全协议的读者来说显得不太可能。确保科学准确性或提供更详细的解释，说明巧克力如何导致致命问题，可以增强故事的可信度。
- en: Overall, this piece offers a compelling glimpse into the protagonist’s unique
    experience with space travel. By refining the plot development, deepening character
    exploration, and ensuring technical accuracy, the story could strongly resonate
    in a competition setting, captivating judges and readers alike with its originality
    and emotional depth.
  id: totrans-858
  prefs: []
  type: TYPE_NORMAL
  zh: 总体来说，这篇作品为主角独特的太空旅行经历提供了一个引人入胜的视角。通过精炼情节发展，深化角色探索，并确保技术准确性，这个故事在竞赛环境中可能会产生强烈的共鸣，以其原创性和情感深度吸引评委和读者。
- en: '26'
  id: totrans-859
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '26'
- en: Tinkle Bells by Sally Ann Melia
  id: totrans-860
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 《莎莉·安·梅利亚的叮当铃声》
- en: 'It was an ancient bell of tainted brass etched with fairy figures and a single
    line of text:'
  id: totrans-861
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个古老的、被玷污的黄铜钟，上面刻有精灵图案和一行文字：
- en: Ring me once, twice, three times, or four times for your heart’s desire. The
    fifth time I ring, all will retire.
  id: totrans-862
  prefs: []
  type: TYPE_NORMAL
  zh: 按一次，两次，三次，或四次，以实现你的心愿。第五次我敲响，所有人都会离开。
- en: The family had fallen on hard times. The father was sick. The mother had lost
    her place. The children were hungry, and it was the coldest, darkest night of
    winter. The mother wondered if she might sell the bell and rang it gently.
  id: totrans-863
  prefs: []
  type: TYPE_NORMAL
  zh: 这个家庭陷入了困境。父亲生病了。母亲失去了工作。孩子们饿了，这是冬天最冷、最黑暗的夜晚。母亲想知道她是否可以卖掉这个钟，于是轻轻地敲响了它。
- en: 'A small golden fairy fell out onto the table. As she stretched, she sprinkled
    fairy dust all around, then said:'
  id: totrans-864
  prefs: []
  type: TYPE_NORMAL
  zh: 一个小金色的精灵掉到了桌子上。当她伸展时，她洒满了精灵粉末，然后说：
- en: “What is your heart’s desire?”
  id: totrans-865
  prefs: []
  type: TYPE_NORMAL
  zh: “你心愿是什么？”
- en: The mother, her fingers blue, said, “We’re so cold.”
  id: totrans-866
  prefs: []
  type: TYPE_NORMAL
  zh: 母亲，手指发蓝，说：“我们太冷了。”
- en: “Oh, that,” the fairy said dismissively and waved her wand. All at once, a fire
    roared in the stove.
  id: totrans-867
  prefs: []
  type: TYPE_NORMAL
  zh: “哦，那件事，”精灵轻蔑地说，挥了挥她的魔杖。突然，炉子里燃起了火焰。
- en: The mother stood at the heart of her warm and bright home, but her tummy rumbled.
  id: totrans-868
  prefs: []
  type: TYPE_NORMAL
  zh: 母亲站在她温暖明亮的家的中心，但她的肚子咕咕叫。
- en: She rang the bell.
  id: totrans-869
  prefs: []
  type: TYPE_NORMAL
  zh: 她敲响了钟。
- en: “We’re so hungry,” she explained.
  id: totrans-870
  prefs: []
  type: TYPE_NORMAL
  zh: “我们太饿了，”她解释说。
- en: The fairy shrugged her shoulders and said, “Oh, that.” She waved her wand, and
    the kitchen table, the counter, the stove, and the oven were stacked with food.
    There were pies and gravies, puddings and custards, wines, and cheese.
  id: totrans-871
  prefs: []
  type: TYPE_NORMAL
  zh: 精灵耸了耸肩，说，“哦，那件事。”她挥了挥魔杖，厨房的桌子、柜台、炉子和烤箱都堆满了食物。有馅饼和肉汁、布丁和奶油布丁、酒和奶酪。
- en: The children had been woken by the gurgling of their hot radiators and the smell
    of hot food, and now they saw the fairy disappear into the bell.
  id: totrans-872
  prefs: []
  type: TYPE_NORMAL
  zh: 孩子们被热水暖气片的咕咕声和热食的气味吵醒，现在他们看到精灵消失在钟里。
- en: As their mother took a tray of food to their poor, sick father, they rang the
    bell.
  id: totrans-873
  prefs: []
  type: TYPE_NORMAL
  zh: 当他们的母亲拿着一盘食物去给生病的父亲时，他们敲响了钟。
- en: The fairy was a little cross because she had almost fallen into a jug of custard,
    but she landed on the brim and skipped along the edge.
  id: totrans-874
  prefs: []
  type: TYPE_NORMAL
  zh: 精灵有点生气，因为她差点掉进了一罐奶油布丁里，但她最终落在边缘上，沿着边缘跳来跳去。
- en: “Well?” she said.
  id: totrans-875
  prefs: []
  type: TYPE_NORMAL
  zh: “嗯？”她说。
- en: “We want money,” the eldest girl said.
  id: totrans-876
  prefs: []
  type: TYPE_NORMAL
  zh: “我们想要钱，”大女儿说。
- en: “A billion, billion pounds,” the youngest girl added.
  id: totrans-877
  prefs: []
  type: TYPE_NORMAL
  zh: “一亿，一亿英镑，”最小的女孩补充道。
- en: The fairy sighed. “Well, you asked for it.” Then, when the mother returned,
    every inch of the house was stacked with wads of fifty-pound notes.
  id: totrans-878
  prefs: []
  type: TYPE_NORMAL
  zh: 精灵叹了口气。“好吧，你要求的。”然后，当母亲回来时，房子的每个角落都堆满了五十英镑的钞票。
- en: After that, they did not ring the bell for an exceedingly long time. The father
    was sent to the finest doctor, and soon he was quite well. The mother redecorated
    the extent of the house and then went into the property.
  id: totrans-879
  prefs: []
  type: TYPE_NORMAL
  zh: 之后，他们很长时间都没有再按铃。父亲被送到了最好的医生那里，不久他就完全康复了。母亲重新装饰了房子的部分，然后进入了房地产业。
- en: The eldest daughter went to Harrow, Eton, Oxford, Cambridge, and, for good measure,
    Harvard. The youngest daughter trained to be a dancer and formed her own theatre.
    All of them became adapted gamblers since casinos were the only way to convert
    their magical money into real cash.
  id: totrans-880
  prefs: []
  type: TYPE_NORMAL
  zh: 大女儿去了哈罗公学、伊顿公学、牛津大学、剑桥大学，为了保险起见，还去了哈佛。小女儿接受了舞蹈训练，并成立了自己的剧院。她们都成了适应赌博的人，因为赌场是唯一将她们的神奇金钱转换为真实现金的方式。
- en: Years later, after her fifth husband had left her, the mother sat in despair
    at the kitchen table. Her youngest daughter was a ballet star in Monte Carlo.
    Her husband owns a whisky distillery north of Edinburgh. Her eldest daughter was
    the Governor of California. It was the coldest, darkest night of the year, and
    she was alone. She rang the bell.
  id: totrans-881
  prefs: []
  type: TYPE_NORMAL
  zh: 多年后，在她第五任丈夫离开她之后，母亲绝望地坐在厨房的桌子旁。她的小女儿是蒙特卡洛的芭蕾舞星。她的丈夫在爱丁堡北部拥有一家威士忌蒸馏厂。她的大女儿是加利福尼亚州的州长。那是一年中最寒冷、最黑暗的夜晚，她独自一人。她按响了铃铛。
- en: “I want to find true love.”
  id: totrans-882
  prefs: []
  type: TYPE_NORMAL
  zh: “我想找到真爱。”
- en: “You took your time,” said the fairy. “The next person who knocks on your front
    door will be your forever love.”
  id: totrans-883
  prefs: []
  type: TYPE_NORMAL
  zh: “你来得太晚了，”仙女说。“下一个敲你前门的人将是你的永恒之爱。”
- en: It was the Christmas holiday, so for three days no one came to the door—not
    even a postman—but at last the doorbell rang, and a young man appeared with leaflets
    about Jesus and salvation. Mother let him in, made him a cup of tea, and immediately
    fell completely in love.
  id: totrans-884
  prefs: []
  type: TYPE_NORMAL
  zh: 那是圣诞节假期，所以三天里没有人来敲门——甚至没有邮递员——但最后门铃响了，一个年轻人带着关于耶稣和救赎的传单出现了。母亲让他进来，给他泡了一杯茶，然后立刻完全爱上了他。
- en: Then the young man said,
  id: totrans-885
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，年轻人说，
- en: “You have to give up all your worldly goods, all your money and all your possessions
    and turn to the light.”
  id: totrans-886
  prefs: []
  type: TYPE_NORMAL
  zh: “你必须放弃你所有的世俗财富，所有的钱和所有的财产，转向光明。”
- en: 'The mother remembered what the fairy had said:'
  id: totrans-887
  prefs: []
  type: TYPE_NORMAL
  zh: 母亲想起了仙女说过的话：
- en: Ring me once, twice, three times, or four times for your heart’s desire. The
    fifth time I ring, all will retire.
  id: totrans-888
  prefs: []
  type: TYPE_NORMAL
  zh: 为了你心中的愿望，铃铛响一声、两声、三声或四声。第五次我敲响，所有人都会离开。
- en: At that point, despite everything, the mother stood up and quietly opened the
    door, and the young man left. She picked up the bell and very carefully removed
    the clapper. The little brass bell would never be rung again.
  id: totrans-889
  prefs: []
  type: TYPE_NORMAL
  zh: 在那一刻，尽管一切都不顺利，母亲还是站了起来，静静地打开了门，年轻人离开了。她拿起铃铛，非常小心地取下了铃舌。那个小铜铃将再也不会被敲响了。
- en: For while it is true that money can’t buy you love, what is love anyway?
  id: totrans-890
  prefs: []
  type: TYPE_NORMAL
  zh: 因为虽然金钱不能买到爱，但爱究竟是什么呢？
- en: Judge’s Comments
  id: totrans-891
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 判决评论
- en: This story weaves a magical tale with a blend of fairy-tale elements and modern-day
    morals. Here are three strengths and three areas that could be improved to increase
    its chances of winning a writing competition.
  id: totrans-892
  prefs: []
  type: TYPE_NORMAL
  zh: 这个故事将一个神奇的故事与童话元素和现代道德相结合。以下是三个优点和三个可以改进的领域，以提高其赢得写作比赛的机会。
- en: 'Strengths:'
  id: totrans-893
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 优点：
- en: 'Engaging Premise:'
  id: totrans-894
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 吸引人的前提：
- en: The concept of a magical bell that grants wishes with a limit is intriguing
    and draws the reader in. This premise sets up a clear structure for the story,
    allowing the reader to anticipate the unfolding of events with each ring of the
    bell.
  id: totrans-895
  prefs: []
  type: TYPE_NORMAL
  zh: 这个神奇铃铛的概念，它以有限的条件实现愿望，非常吸引人，并吸引了读者的注意。这个前提为故事设定了一个清晰的结构，让读者可以随着铃铛的每一次响起预测事件的展开。
- en: 'Vivid Descriptions:'
  id: totrans-896
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 生动的描述：
- en: The descriptions of the fairy’s actions and the transformations she brings about
    in the family’s life are vivid and imaginative. The detail given to the food,
    the warmth, and the wealth created by the fairy’s magic makes these moments particularly
    engaging and enjoyable to read.
  id: totrans-897
  prefs: []
  type: TYPE_NORMAL
  zh: 对仙女的行为和她给家庭生活带来的变化的描述生动而富有想象力。对食物、温暖和仙女魔法创造的财富的详细描述使得这些时刻特别引人入胜和愉快阅读。
- en: 'Moral Complexity:'
  id: totrans-898
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 道德复杂性：
- en: The story explores themes of desire, greed, and the true meaning of happiness
    in a nuanced way. The twist ending, where the mother chooses to disable the bell
    after realizing the limitations of material wealth and the complexities of love,
    adds depth to the narrative and encourages reflection.
  id: totrans-899
  prefs: []
  type: TYPE_NORMAL
  zh: 这个故事以细腻的方式探讨了欲望、贪婪以及幸福的真正含义。母亲在意识到物质财富的局限性和爱情的复杂性后选择关闭铃铛的转折结局，为叙事增添了深度，并鼓励人们反思。
- en: 'Areas for improvement:'
  id: totrans-900
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 改进领域：
- en: 'Character Development:'
  id: totrans-901
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 角色发展：
- en: While the plot is engaging, the characters themselves feel somewhat flat and
    could benefit from deeper development. Providing more insight into their emotions,
    thoughts, and personalities would make the reader more invested in their journey
    and the choices they make.
  id: totrans-902
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然情节引人入胜，但角色本身感觉有些平淡，可以从更深入的发展中受益。提供更多关于他们的情感、思想和个性的洞察，会使读者更投入于他们的旅程和所做的选择。
- en: 'Pacing and Structure:'
  id: totrans-903
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 速度与结构：
- en: The story moves quickly through significant life changes, which can sometimes
    feel rushed. Expanding on key moments or transitions, and perhaps showing more
    of the family’s life and struggles before the bell’s intervention, could enhance
    the story’s emotional impact and give the narrative a more balanced pace.
  id: totrans-904
  prefs: []
  type: TYPE_NORMAL
  zh: 故事迅速地穿越了重大的生活变化，有时会感觉有些仓促。扩展关键时刻或过渡，也许展示更多在钟声干预之前家庭的生活和斗争，可以增强故事的情感影响，并为叙事提供一个更平衡的节奏。
- en: 'Ending Clarity and Impact:'
  id: totrans-905
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结尾清晰度和影响力：
- en: The conclusion aims for a philosophical reflection on love and materialism,
    which is ambitious but may come across as somewhat abrupt or unclear. Refining
    the ending to articulate the mother’s realization and emotional state more clearly,
    and perhaps offering a more nuanced contemplation of the story’s moral, would
    make the conclusion more satisfying and impactful.
  id: totrans-906
  prefs: []
  type: TYPE_NORMAL
  zh: 结尾旨在对爱情和物质主义进行哲学反思，这是雄心勃勃的，但可能显得有些突然或不够清晰。通过精炼结局，更清晰地阐述母亲的觉悟和情感状态，也许提供对故事道德的更细腻的思考，会使结局更加令人满意和有影响力。
- en: In summary, this story’s imaginative premise, rich descriptions, and exploration
    of moral themes are its key strengths. To enhance its competitiveness, focusing
    on character depth, pacing, and a more nuanced and impactful ending would be beneficial.
    With these adjustments, the story could resonate more deeply with readers and
    judges alike, making it a strong contender in a writing competition.
  id: totrans-907
  prefs: []
  type: TYPE_NORMAL
  zh: 总结来说，这个故事富有想象力的前提、丰富的描述和对道德主题的探索是其关键优势。为了增强其竞争力，关注角色深度、速度和更细腻、更有影响力的结局将是有益的。有了这些调整，故事可以更深刻地与读者和评委产生共鸣，使其成为写作竞赛的强劲竞争者。
- en: '27'
  id: totrans-908
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '27'
- en: 'The Bells of Puttenham: A Medical Science Fiction by Sally Ann Melia'
  id: totrans-909
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 《普特宁汉的钟声》：萨莉·安·梅利亚的医疗科幻小说
- en: 'The church bells rang out: the zombies were coming.'
  id: totrans-910
  prefs: []
  type: TYPE_NORMAL
  zh: 教堂的钟声响起：僵尸来了。
- en: Five years have passed since chicken flu morphed into brain flu, and humanity
    has become a horde of stumbling, carnivorous idiots, but here in Puttenham, population
    217, we have barely noticed.
  id: totrans-911
  prefs: []
  type: TYPE_NORMAL
  zh: 自从鸡流感演变成脑流感以来，已经过去了五年，人类变成了蹒跚的、食肉的傻瓜，但在这里，普特宁汉，人口217，我们几乎没注意到。
- en: On the first news of zombies, farmer George canceled all incoming deliveries
    to the farm shop and doubled local production of everything else; the landlord
    at The Good Intent refurbished his aging still and took possession of the hops
    harvest; and the post office mistress pulled out stacks of stationery and employed
    boys as runners. Whatever happened elsewhere, Puttenham would eat, drink, and
    send out invitations for high tea, intimate suppers, and glamorous balls.
  id: totrans-912
  prefs: []
  type: TYPE_NORMAL
  zh: 在得知僵尸的第一消息后，农民乔治取消了农场商店的所有 incoming deliveries，并将其他所有东西的生产翻倍；好意图酒店的老板翻新了他的老式蒸馏器，并占有了啤酒花收获；邮局的女老板拿出了一摞文具，雇佣了男孩们作为信使。无论其他地方发生了什么，普特宁汉将吃、喝，并发送邀请参加下午茶、亲密晚餐和迷人的舞会。
- en: But now the zombies were coming.
  id: totrans-913
  prefs: []
  type: TYPE_NORMAL
  zh: 但现在僵尸来了。
- en: The first defence was the village moat, stacked full of timber and soaked in
    kerosene. The zombies fell in and burned.
  id: totrans-914
  prefs: []
  type: TYPE_NORMAL
  zh: 第一道防线是村庄的护城河，堆满了木材，浸泡在煤油中。僵尸掉进去后燃烧起来。
- en: The second defence was an ancient hedge with four feet of brambles. The zombies
    struggled against thorns laced with barbed wire.
  id: totrans-915
  prefs: []
  type: TYPE_NORMAL
  zh: 第二道防线是一道古老的篱笆，上面长满了四英尺高的荆棘。僵尸们在带有刺网的荆棘中挣扎。
- en: The third defence was the high walls of their medieval ruin. The residents of
    Puttenham drew up the drawbridge, sent out flights of arrows, and dropped cauldrons
    of boiling oil.
  id: totrans-916
  prefs: []
  type: TYPE_NORMAL
  zh: 第三道防线是他们中世纪废墟的高墙。普特宁汉的居民拉起吊桥，射出箭矢，并倒下沸腾的油桶。
- en: But after five months of siege, prospects were bleak.
  id: totrans-917
  prefs: []
  type: TYPE_NORMAL
  zh: 但经过五个月的围困，前景黯淡。
- en: “We’re done for,” said farmer George. “One chicken left.”
  id: totrans-918
  prefs: []
  type: TYPE_NORMAL
  zh: “我们完了，”农民乔治说。“只剩下一只鸡了。”
- en: “Last orders,” said the pub landlord. “One pint left.”
  id: totrans-919
  prefs: []
  type: TYPE_NORMAL
  zh: “最后一轮了，”酒吧老板说。“只剩下一品脱了。”
- en: “We should write our history,” said the postmistress. “Three hundred words,”
    she handed them pages. “And ring the bells to warn the other villages.”
  id: totrans-920
  prefs: []
  type: TYPE_NORMAL
  zh: “我们应该写我们的历史，”邮递员说。“三百字，”她递给他们纸张。“并且敲钟警告其他村庄。”
- en: At dawn, they climbed the high tower to watch the sun rise one last time.
  id: totrans-921
  prefs: []
  type: TYPE_NORMAL
  zh: 在黎明时分，他们爬上高塔，最后一次观看太阳升起。
- en: However, they had not counted on the ringing of the bells, which had induced
    severe tinnitus and destroyed the last fragments of the zombies’ cerebral cortex.
    They all lay twitching and unconscious on the ground.
  id: totrans-922
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，他们没有预料到钟声的响起，钟声引起了严重的耳鸣，并摧毁了僵尸大脑皮层的最后残余。他们都躺在地上抽搐着，失去了意识。
- en: Puttenham survived the great zombie apocalypse. Thanks to the bells.
  id: totrans-923
  prefs: []
  type: TYPE_NORMAL
  zh: Puttenham幸存了这场伟大的僵尸末日。多亏了钟声。
- en: 'Judge’s comments:'
  id: totrans-924
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 评委评论：
- en: 'This short fiction piece presents an intriguing and somewhat humorous take
    on the zombie apocalypse genre, set in the small village of Puttenham. Here’s
    how it might fare in a writing competition, with three strengths and three weaknesses
    identified:'
  id: totrans-925
  prefs: []
  type: TYPE_NORMAL
  zh: 这篇短篇小说以幽默和有趣的方式对僵尸末日体裁进行了探索，背景设定在Puttenham这个小村庄。以下是它可能在写作比赛中的表现，其中确定了三个优点和三个弱点：
- en: 'Strengths:'
  id: totrans-926
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 优点：
- en: 'Originality and Humor:'
  id: totrans-927
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 原创性和幽默：
- en: The story injects humour and a sense of light-heartedness into the often-grim
    zombie apocalypse narrative. The idea that a small village barely notices the
    apocalypse due to their self-sufficiency and quirky methods of defence against
    zombies is both original and engaging. This unique angle could set the story apart
    in a competition.
  id: totrans-928
  prefs: []
  type: TYPE_NORMAL
  zh: 故事为通常阴郁的僵尸末日叙事注入了幽默和轻松感。一个小村庄几乎注意不到末日，因为它们的自给自足和独特的防御僵尸方法，这一想法既原创又引人入胜。这个独特的角度可以使故事在比赛中脱颖而出。
- en: 'Vivid Setting and Community Spirit:'
  id: totrans-929
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 生动的设定和社区精神：
- en: The setting of Puttenham is well-drawn, and the sense of community spirit in
    the face of adversity is palpable. The detailed descriptions of the village’s
    preparations and defences against the zombies showcase a tight-knit community
    that’s resourceful and resilient. This adds depth and a feel-good factor to the
    story.
  id: totrans-930
  prefs: []
  type: TYPE_NORMAL
  zh: Puttenham的设定描绘得很好，面对逆境时的社区精神触手可及。村庄对僵尸的准备工作及防御措施的详细描述展示了一个紧密团结、资源丰富且具有韧性的社区。这为故事增添了深度和令人愉悦的因素。
- en: 'Unexpected Twist:'
  id: totrans-931
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 意外的转折：
- en: The conclusion, where the zombie horde is defeated not by physical defences
    but by an accidental side effect of the church bells causing tinnitus, is unexpected
    and clever. This twist adds a layer of irony and further originality to the piece.
  id: totrans-932
  prefs: []
  type: TYPE_NORMAL
  zh: 结论部分，僵尸军团并非被物理防御击败，而是教堂钟声的意外副作用——导致耳鸣——所击败，这一转折出人意料且巧妙。这个转折为作品增添了讽刺和更多原创性。
- en: 'Weaknesses:'
  id: totrans-933
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 弱点：
- en: 'Character Development:'
  id: totrans-934
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 角色发展：
- en: The story lacks depth in character development. Characters like farmer George,
    the pub landlord, and the postmistress are mentioned briefly, but we get little
    sense of their personalities or any emotional investment in them. Fleshing out
    these characters could enhance the story’s impact and emotional resonance.
  id: totrans-935
  prefs: []
  type: TYPE_NORMAL
  zh: 故事在角色发展方面缺乏深度。像农民乔治、酒吧老板和邮政局长这样的角色被简要提及，但我们对他们的人格或对他们有任何情感投入的感觉很少。完善这些角色可以增强故事的影响力和情感共鸣。
- en: 'Pacing and detail:'
  id: totrans-936
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 节奏和细节：
- en: While the story is concise, which is often necessary for short fiction, certain
    areas could benefit from more detail or slower pacing. For instance, the transition
    from the village’s initial self-sufficiency to the siege could be explored in
    more depth, as could the final battle with the zombies. This would build tension
    and make the resolution more satisfying.
  id: totrans-937
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然故事简洁，这在短篇小说中通常是必要的，但某些区域可以受益于更多细节或更慢的节奏。例如，村庄从最初的自我依赖到围攻的转变可以更深入地探索，同样，与僵尸的最终战斗也可以如此。这将增加紧张感，使结局更加令人满意。
- en: 'Exploration of Themes:'
  id: totrans-938
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 主题探索：
- en: The story touches on themes of community, resilience, and perhaps even the unintended
    consequences of technology (in this case, church bells). However, these themes
    could be explored more deeply or explicitly to add layers of meaning to the narrative
    and give it more weight in a competitive setting.
  id: totrans-939
  prefs: []
  type: TYPE_NORMAL
  zh: 故事触及了社区、韧性和可能甚至技术（在这种情况下，教堂钟声）的意外后果等主题。然而，这些主题可以更深入或更明确地探索，以增加叙事的层次感和在竞争环境中的分量。
- en: Overall, the piece is enjoyable and memorable for its original take on a popular
    genre. To improve its chances in a competition, focusing on character development,
    pacing, and thematic exploration could make it more compelling and emotionally
    engaging for readers and judges alike.
  id: totrans-940
  prefs: []
  type: TYPE_NORMAL
  zh: 总体而言，这篇作品因其对流行体裁的独特见解而令人愉悦且难忘。为了提高在比赛中获胜的机会，关注角色发展、节奏和主题探索可以使作品对读者和评委更具吸引力。
- en: '28'
  id: totrans-941
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '28'
- en: Resources
  id: totrans-942
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 资源
- en: AI Writing Tool Websites
  id: totrans-943
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: AI写作工具网站
- en: 'OpenAI ChatGPT: (https://chat.openai.com/chat) The powerhouse behind this whole
    revolution – keep readers updated on developments.'
  id: totrans-944
  prefs: []
  type: TYPE_NORMAL
  zh: 'OpenAI ChatGPT: (https://chat.openai.com/chat) 整个革命背后的强大力量 - 保持读者对最新进展的了解。'
- en: 'Microsoft Bing AI: (https://www.bing.com/) ChatGPT’s key competitor, worth
    tracking for any unique features and capabilities.'
  id: totrans-945
  prefs: []
  type: TYPE_NORMAL
  zh: 'Microsoft Bing AI: (https://www.bing.com/) ChatGPT的主要竞争对手，值得跟踪其独特功能和能力。'
- en: 'Grammarly: (https://www.grammarly.com/) The go-to for grammar, but their AI
    analyzes tone and clarity too.'
  id: totrans-946
  prefs: []
  type: TYPE_NORMAL
  zh: 'Grammarly: (https://www.grammarly.com/) 语法检查的首选工具，但他们的AI还分析语气和清晰度。'
- en: 'Gemini Google AI: (https://gemini.google.com/) Designed for creative writing
    - make sure readers know about this one!'
  id: totrans-947
  prefs: []
  type: TYPE_NORMAL
  zh: 'Gemini Google AI: (https://gemini.google.com/) 专为创意写作设计 - 确保读者了解这个信息！'
- en: Blogs and News Sites for AI Writing Updates
  id: totrans-948
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 人工智能写作更新博客和新闻网站
- en: 'Towards Data Science: (https://towardsdatascience.com/) Covers broader AI trends,
    but often features articles focused on text generation tools.'
  id: totrans-949
  prefs: []
  type: TYPE_NORMAL
  zh: 'Towards Data Science: (https://towardsdatascience.com/) 涵盖更广泛的AI趋势，但经常有关于文本生成工具的文章。'
- en: 'The Verge - AI Section: (https://www.theverge.com/ai) Tech-oriented, but great
    for news on major breakthroughs and controversies in the field.'
  id: totrans-950
  prefs: []
  type: TYPE_NORMAL
  zh: 'The Verge - AI 部分: (https://www.theverge.com/ai) 以技术为导向，但也是了解该领域重大突破和争议的好地方。'
- en: 'AI writing tool websites’ own blogs: ChatGPT, Grammarly, and others often publish
    updates and tutorials on their own blogs.'
  id: totrans-951
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能写作工具网站的自家博客：ChatGPT、Grammarly和其他网站经常在自己的博客上发布更新和教程。
- en: Flash Fiction & Writing Communities (With AI Discussions)
  id: totrans-952
  prefs: []
  type: TYPE_NORMAL
  zh: 闪小说与写作社区（包含AI讨论）
- en: 'Reddit Communities:'
  id: totrans-953
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: Reddit 社区：
- en: 'r/WritingPrompts: ([invalid URL removed]) Often features AI-related discussions.'
  id: totrans-954
  prefs: []
  type: TYPE_NORMAL
  zh: 'r/WritingPrompts: ([无效链接已移除]) 经常会有与AI相关的讨论。'
- en: 'r/FlashFiction: ([invalid URL removed]) Look for threads about using AI as
    a creative tool.'
  id: totrans-955
  prefs: []
  type: TYPE_NORMAL
  zh: 'r/FlashFiction: ([无效链接已移除]) 寻找关于将AI作为创意工具使用的帖子。'
- en: 'Independent Flash Fiction Websites: Many have forums or sections where writers
    discuss using AI. These can be great for niche discussions (AI for sci-fi flash,
    etc.).'
  id: totrans-956
  prefs: []
  type: TYPE_NORMAL
  zh: 独立闪小说网站：许多网站都有论坛或板块，作家们在那里讨论使用AI。这些地方对于特定领域的讨论（如科幻闪小说中的AI等）非常有用。
- en: Additional Tips
  id: totrans-957
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 其他小贴士
- en: 'Local Focus: Include any local writing groups (in-person or online) where AI
    discussions are taking place.'
  id: totrans-958
  prefs: []
  type: TYPE_NORMAL
  zh: 本地关注：包括任何进行AI讨论的本地写作团体（面对面或在线）。
- en: 'Evolving Landscape: This list is a starting point! The AI writing world changes
    rapidly, so encourage readers to actively seek out new resources.'
  id: totrans-959
  prefs: []
  type: TYPE_NORMAL
  zh: 发展中的格局：这份列表只是一个起点！AI写作世界变化迅速，因此鼓励读者积极寻找新的资源。
- en: Let me know if you’d like suggestions for specific blogs or communities focused
    on a particular type of flash fiction!
  id: totrans-960
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想了解特定类型的闪小说博客或社区的建议，请告诉我！
