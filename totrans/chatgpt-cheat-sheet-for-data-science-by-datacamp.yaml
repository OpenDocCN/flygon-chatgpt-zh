  type: TYPE_IMG
  zh: '![](../images/00043.png)'
- en: '[Source: Gary Marcus](https://garymarcus.substack.com/p/how-come-gpt-can-seem-so-brilliant)'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: '[来源：加里·马库斯](https://garymarcus.substack.com/p/how-come-gpt-can-seem-so-brilliant)'
