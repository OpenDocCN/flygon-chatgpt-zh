- en: Appendix B
  id: totrans-2130
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 附录B
- en: Comparing CoT Prompting with Classical Prompt Engineering
  id: totrans-2131
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 比较CoT提示与经典提示工程
- en: When delving into the intricacies of CoT Prompting, it’s worthwhile to take
    a step back and consider how classical Prompt Engineering works. This can give
    us a deeper appreciation of the difference between classical Prompt Engineering
    and CoT Prompting.
  id: totrans-2132
  prefs: []
  type: TYPE_NORMAL
  zh: 当深入研究CoT提示的复杂性时，后退一步考虑经典提示工程的工作方式是值得的。这可以让我们更深入地理解经典提示工程和CoT提示之间的区别。
- en: Basic Principles of Prompt Engineering
  id: totrans-2133
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 提示工程的基本原则
- en: Classical Prompt Engineering involves crafting AI prompts in a way that effectively
    guides the AI’s algorithms to produce the required outputs. Different prompts
    for the same question can yield vastly different responses, even on the same AI
    model.
  id: totrans-2134
  prefs: []
  type: TYPE_NORMAL
  zh: 经典提示工程涉及以有效引导AI算法产生所需输出的方式来构建AI提示。对于同一个问题，不同的提示可以产生截然不同的回答，即使在同一AI模型上也是如此。
- en: Generally speaking, we can categorise the various types of prompt engineering
    into the following categories.
  id: totrans-2135
  prefs: []
  type: TYPE_NORMAL
  zh: 一般而言，我们可以将各种类型的提示工程分为以下几类。
- en: Widening the knowledge gap*
  id: totrans-2136
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 扩大知识差距*
- en: Introducing counterpoints
  id: totrans-2137
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 引入对立观点
- en: Demanding precision
  id: totrans-2138
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 要求精确
- en: The following sections explain each of these techniques in detail.
  id: totrans-2139
  prefs: []
  type: TYPE_NORMAL
  zh: 以下各节将详细解释这些技术的每个方面。
- en: '| ![](image_rsrc6F9.jpg)*A knowledge gap is the divide between the information
    or understanding presented in a question and the knowledge required to answer
    the question effectively.This gap is also known as the epistemic gap and is a
    fundamental concept in epistemology, the branch of philosophy that discusses the
    nature and scope of knowledge. |'
  id: totrans-2140
  prefs: []
  type: TYPE_TB
  zh: '| ![](image_rsrc6F9.jpg)*知识差距是问题中呈现的信息或理解与有效回答问题所需的知识之间的差距。这个差距也被称为认识差距，是认识论的一个基本概念，认识论是讨论知识性质和范围的哲学分支。|'
- en: Widening the Knowledge Gap
  id: totrans-2141
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 扩大知识差距
- en: The “knowledge gap” is the disconnect that exists between the information presented
    within a question and the knowledge, expertise, or resources needed to provide
    a satisfactory response or solution.
  id: totrans-2142
  prefs: []
  type: TYPE_NORMAL
  zh: “知识差距”是指问题中呈现的信息与提供满意回答或解决方案所需的知识、专长或资源之间的脱节。
- en: When a question is correctly answer, the knowledge gap has been bridged. We
    have successfully travelled from the “question state” to the “answer state”. However,
    when someone doesn’t an answer a question properly we say, “They didn’t really
    answer the question.” This means that the answer provided didn’t bridge the initial
    knowledge gap and therefore would not actually work if applied in practice.
  id: totrans-2143
  prefs: []
  type: TYPE_NORMAL
  zh: 当一个问题被正确回答时，知识差距已经弥合。我们已经成功地从“问题状态”过渡到“答案状态”。然而，当有人没有正确回答问题时，我们会说，“他们并没有真正回答问题。”这意味着提供的答案没有弥合最初的知识差距，因此如果实际应用，可能不会有效。
- en: In prompt engineering, we can explicitly broaden the knowledge gap presented
    in the question to get a more complete answer from the AI.
  id: totrans-2144
  prefs: []
  type: TYPE_NORMAL
  zh: 在提示工程中，我们可以明确地扩大问题中呈现的知识差距，以便从AI那里获得更完整的答案。
- en: This means that we can rephrase the question to emphasise the breadth and depth
    of knowledge required for an acceptable answer, thereby demanding a thorough and
    elaborate response. Doing this forces the AI to generate a more comprehensive
    and well-considered response to our prompt.
  id: totrans-2145
  prefs: []
  type: TYPE_NORMAL
  zh: 这意味着我们可以重新措辞问题，强调所需答案的知识广度和深度，从而要求一个全面而详尽的回答。这样做迫使AI对我们的提示生成更全面和经过深思熟虑的回答。
- en: Take for instance the simple question, "What is photosynthesis?" When asked
    this plain question, ChatGPT answers as follows.
  id: totrans-2146
  prefs: []
  type: TYPE_NORMAL
  zh: 以一个简单的问题为例，“什么是光合作用？”当被问到这个问题时，ChatGPT的回答如下。
- en: '| ChatGPTPhotosynthesis is a process used by plants, algae, and certain bacteria
    to convert light energy into chemical energy. This process is fundamental to life
    on Earth, as it is the primary source of energy for nearly all living organisms.
    Here''s a basic overview of how it works:'
  id: totrans-2147
  prefs: []
  type: TYPE_NORMAL
  zh: '| ChatGPT光合作用是植物、藻类和某些细菌用来将光能转化为化学能的过程。这个过程对地球上的生命至关重要，因为它是几乎所有生物体的主要能量来源。以下是它如何工作的基本概述：'
- en: 'Light Absorption: Photosynthesis starts when chlorophyll and other pigments
    in the plant cells absorb light (primarily sunlight). Chlorophyll is a key molecule
    that gives plants their green color and plays a crucial role in this process.'
  id: totrans-2148
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 光吸收：光合作用开始于植物细胞中的叶绿素和其他色素吸收光（主要是阳光）。叶绿素是一种关键分子，赋予植物绿色，并在这一过程中发挥关键作用。
- en: 'Water Splitting and Oxygen Production: In the presence of light, water molecules
    (H₂O) in the plant cells are split into oxygen (O₂) and hydrogen ions. Oxygen
    is released into the atmosphere as a by-product.'
  id: totrans-2149
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 水分解和氧气生产：在光的存在下，植物细胞中的水分子（H₂O）被分解成氧气（O₂）和氢离子。氧气作为副产品被释放到大气中。
- en: 'Carbon Dioxide Fixation: Plants take in carbon dioxide (CO₂) from the air through
    small pores in their leaves called stomata. The carbon dioxide is then used in
    the process of photosynthesis.'
  id: totrans-2150
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 二氧化碳固定：植物通过其叶片上的小孔——气孔——从空气中吸收二氧化碳（CO₂）。然后，二氧化碳被用于光合作用过程。
- en: 'Energy Conversion and Glucose Production: Using the energy absorbed from light,
    the plant converts the water and carbon dioxide into glucose (C₆H₁₂O₆), a type
    of sugar that plants use for energy and growth. This conversion also involves
    a series of complex biochemical reactions, commonly referred to as the Calvin
    cycle.'
  id: totrans-2151
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 能量转换和葡萄糖生产：利用从光中吸收的能量，植物将水和二氧化碳转化为葡萄糖（C₆H₁₂O₆），这是一种植物用于能量和生长的糖类。这种转化还涉及一系列复杂的生化反应，通常被称为卡尔文循环。
- en: 'Storage and Usage of Glucose: The glucose produced can be used immediately
    by the plant for energy, or it can be converted into other forms of stored energy,
    like starch. It can also be used to make other organic compounds necessary for
    plant growth and development.'
  id: totrans-2152
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 葡萄糖的储存和使用：产生的葡萄糖可以立即被植物用于能量，也可以转化为其他形式的储存能量，如淀粉。它还可以用于制造植物生长和发育所需的有机化合物。
- en: In summary, photosynthesis is the process by which plants use sunlight to convert
    water and carbon dioxide into oxygen and glucose, providing essential energy for
    themselves and, indirectly, for other life forms that depend on plants for food
    and oxygen. |
  id: totrans-2153
  prefs: []
  type: TYPE_NORMAL
  zh: 总结来说，光合作用是植物利用阳光将水和二氧化碳转化为氧气和葡萄糖的过程，为自身和间接为依赖植物获取食物和氧气的其他生命形式提供必需的能量。
- en: Now let’s ask ChatGPT the same question again, but this time we’ll widen the
    knowledge gap by making the gap between “the state before photosynthesis occurs”
    and “the state after photosynthesis occurs” more explicit.
  id: totrans-2154
  prefs: []
  type: TYPE_NORMAL
  zh: 现在让我们再次向ChatGPT提出相同的问题，但这次我们将通过使“光合作用发生之前的状态”和“光合作用发生之后的状态”之间的差距更加明确来扩大知识差距。
- en: '| YouHow does photosynthesis convert radiative energy from the sun into potential
    chemical energy that is used to power all forms of life?ChatGPTPhotosynthesis
    is a remarkable process that plants, algae, and certain bacteria use to convert
    solar energy into chemical energy, which is fundamental for sustaining almost
    all life on Earth. Here''s a simplified overview of how this process works:'
  id: totrans-2155
  prefs: []
  type: TYPE_NORMAL
  zh: '| 你如何将太阳的辐射能转化为用于驱动所有生命形式的潜在化学能？ChatGPT光合作用是一种非凡的过程，植物、藻类和某些细菌使用它将太阳能转化为化学能，这对于维持地球上几乎所有的生命都是基本的。以下是这个过程如何工作的简化概述：'
- en: 'Absorption of Sunlight: Photosynthesis begins in the cells of plants and algae,
    specifically within organelles called chloroplasts. These chloroplasts contain
    pigments, primarily chlorophyll, which absorb sunlight. Different pigments absorb
    different wavelengths of light, but chlorophyll mainly absorbs blue and red light,
    reflecting green light, which is why plants appear green.'
  id: totrans-2156
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 太阳能吸收：光合作用始于植物和藻类的细胞中，特别是在称为叶绿体的细胞器内。这些叶绿体含有色素，主要是叶绿素，它们吸收阳光。不同的色素吸收不同波长的光，但叶绿素主要吸收蓝光和红光，反射绿光，这就是为什么植物看起来是绿色的。
- en: 'Light-Dependent Reactions: Once the light is absorbed, it excites electrons
    in the chlorophyll. This energy from the excited electrons is used to split water
    molecules (H₂O) into oxygen (O₂) and hydrogen ions (H⁺). The oxygen is released
    into the atmosphere, which is crucial for the air we breathe. The energy captured
    is also used to create adenosine triphosphate (ATP) and nicotinamide adenine dinucleotide
    phosphate (NADPH), which are energy-carrying molecules.'
  id: totrans-2157
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 光合作用中的光反应：一旦光被吸收，它就会激发叶绿素中的电子。这些激发电子的能量被用来分解水分子（H₂O）成氧气（O₂）和氢离子（H⁺）。氧气被释放到大气中，这对于我们呼吸的空气至关重要。捕获的能量也被用来生成腺苷三磷酸（ATP）和烟酰胺腺嘌呤二核苷酸磷酸（NADPH），这些是携带能量的分子。
- en: 'Light-Independent Reactions (Calvin Cycle): This stage doesn''t require light
    directly and takes place in the stroma of the chloroplasts. Here, the energy stored
    in ATP and NADPH is used to fix carbon dioxide (CO₂) from the atmosphere. Through
    a series of reactions known as the Calvin Cycle, CO₂ is combined with a five-carbon
    sugar (ribulose bisphosphate) to produce glucose (C₆H₁₂O₆), which is a simple
    sugar.'
  id: totrans-2158
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 光独立反应（卡尔文循环）：这一阶段不需要直接的光，并且发生在叶绿体的基质中。在这里，储存于ATP和NADPH中的能量被用来固定大气中的二氧化碳（CO₂）。通过一系列被称为卡尔文循环的反应，CO₂与五碳糖（核糖二磷酸）结合，生成葡萄糖（C₆H₁₂O₆），这是一种简单的糖。
- en: 'Formation of Glucose and Oxygen: The end products of photosynthesis are glucose
    and oxygen. Glucose is a form of chemical energy that can be used by the plant
    for growth, reproduction, and other life processes. Oxygen, a byproduct, is released
    into the atmosphere.'
  id: totrans-2159
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 葡萄糖和氧气的形成：光合作用的最终产物是葡萄糖和氧气。葡萄糖是一种化学能量形式，植物可以用它来进行生长、繁殖和其他生命过程。氧气作为一种副产品，被释放到大气中。
- en: In essence, photosynthesis transforms the radiant energy of the sun into potential
    chemical energy in the form of glucose. This process is crucial because it provides
    the primary energy source for nearly all living organisms either directly (for
    herbivores) or indirectly (for carnivores). Moreover, photosynthesis is responsible
    for producing and maintaining the oxygen content of the Earth's atmosphere, making
    life as we know it possible. |
  id: totrans-2160
  prefs: []
  type: TYPE_NORMAL
  zh: 从本质上讲，光合作用将太阳的辐射能转化为葡萄糖形式的潜在化学能。这个过程至关重要，因为它为几乎所有生物提供了主要的能量来源，无论是直接（对食草动物）还是间接（对食肉动物）。此外，光合作用负责产生和维持地球大气中的氧气含量，使得我们所知的生活成为可能。
- en: By explicitly asking ChatGPT how to bridge the pre-photosynthesis state to the
    post-photosynthesis state, we have persuaded ChatGPT to provide far more detail
    in its answer.
  id: totrans-2161
  prefs: []
  type: TYPE_NORMAL
  zh: 通过明确地询问ChatGPT如何将光合作用前的状态过渡到光合作用后的状态，我们已经说服ChatGPT在其回答中提供更多的细节。
- en: You could object however, that without prior knowledge we wouldn’t have been
    able to “widen the knowledge gap” in this way, since we had to know how to phrase
    the question correctly in the first place.
  id: totrans-2162
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能会反对，然而，如果没有先前的知识，我们就无法以这种方式“扩大知识差距”，因为我们首先必须知道如何正确地表述问题。
- en: To address this issue, we can ask ChatGPT to widen the knowledge gap by itself,
    and only then proceed to answer the question.
  id: totrans-2163
  prefs: []
  type: TYPE_NORMAL
  zh: 为了解决这个问题，我们可以让ChatGPT自己扩大知识差距，然后才继续回答问题。
- en: '| YouWiden the knowledge gap in the following question and then answer it:
    What is photosynthesis?ChatGPTThe widened question would be: "How does the process
    of photosynthesis in plants convert solar energy into chemical energy, and what
    are the roles of chlorophyll, carbon dioxide, water, and light in this process?"Photosynthesis
    is a complex biochemical process that plants, algae, and some bacteria use to
    convert solar energy into chemical energy. This energy is stored in the bonds
    of sugar molecules, which are later used by the organism as a source of energy.
    The process primarily occurs in the chloroplasts of plant cells, where chlorophyll,
    a green pigment, plays a critical role.The process of photosynthesis can be broadly
    divided into two stages: the light-dependent reactions and the light-independent
    reactions (Calvin cycle).'
  id: totrans-2164
  prefs: []
  type: TYPE_NORMAL
  zh: '| 你扩大以下问题的知识差距并回答它：什么是光合作用？ChatGPT 扩大的问题将是：“植物中光合作用的过程是如何将太阳能转化为化学能的，以及叶绿素、二氧化碳、水和光在这个过程中的作用是什么？”光合作用是一种复杂的生化过程，植物、藻类和一些细菌使用它将太阳能转化为化学能。这种能量储存在糖分子的键中，随后生物体将其作为能量来源使用。这个过程主要发生在植物细胞的叶绿体中，其中叶绿素，一种绿色色素，起着关键作用。光合作用的过程可以大致分为两个阶段：光依赖反应和光独立反应（卡尔文循环）。'
- en: 'Light-Dependent Reactions: These reactions occur in the thylakoid membranes
    of the chloroplasts and require light. When sunlight strikes the chlorophyll molecules,
    it excites the electrons within these molecules, leading to a series of reactions
    that generate ATP (adenosine triphosphate) and NADPH (nicotinamide adenine dinucleotide
    phosphate). These are energy-carrying molecules that store the energy harnessed
    from sunlight. Water molecules are also split in this process, releasing oxygen
    as a byproduct.'
  id: totrans-2165
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 光合作用相关反应：这些反应发生在叶绿体的类囊体膜中，并且需要光。当阳光照射到叶绿素分子上时，它会激发这些分子内的电子，导致一系列反应，从而生成ATP（腺苷三磷酸）和NADPH（烟酰胺腺嘌呤二核苷酸磷酸）。这些是携带能量的分子，它们储存了从阳光中捕获的能量。在这个过程中，水分子也被分解，释放出氧气作为副产品。
- en: 'Light-Independent Reactions (Calvin Cycle): These reactions occur in the stroma
    of the chloroplasts and do not require light directly. Instead, they use the ATP
    and NADPH produced in the light-dependent reactions to convert carbon dioxide
    from the atmosphere into glucose, a simple sugar. This process involves a series
    of enzymatic reactions where the carbon dioxide is fixed (i.e., incorporated into
    organic molecules).'
  id: totrans-2166
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 光独立反应（卡尔文循环）：这些反应发生在叶绿体的基质中，不需要直接的光。相反，它们使用光依赖反应产生的ATP和NADPH将大气中的二氧化碳转化为葡萄糖，一种简单的糖。这个过程涉及一系列酶促反应，其中二氧化碳被固定（即，结合到有机分子中）。
- en: In summary, photosynthesis is essential for life on Earth as it provides the
    primary means of producing organic compounds from inorganic substances, using
    light as the energy source. This process not only fuels the organisms that perform
    photosynthesis but also provides oxygen and organic compounds that are crucial
    for other organisms, including humans. |
  id: totrans-2167
  prefs: []
  type: TYPE_NORMAL
  zh: 总结来说，光合作用对地球上的生命至关重要，因为它提供了从无机物质中生产有机化合物的首要手段，使用光作为能量来源。这个过程不仅为进行光合作用的生物提供燃料，还提供了对其他生物，包括人类至关重要的氧气和有机化合物。|
- en: In this case, ChatGPT itself first widened the knowledge gap in our simple question,
    and then gave a more comprehensive answer.
  id: totrans-2168
  prefs: []
  type: TYPE_NORMAL
  zh: 在这种情况下，ChatGPT本身首先在我们简单的问题中扩大了知识差距，然后给出了更全面的答案。
- en: Counterpoints
  id: totrans-2169
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 对立观点
- en: Using counterpoints in prompt engineering means that we include contrasting
    perspectives within a prompt. This stimulates the AI to apply critical thinking
    forces it to provide a more balanced response.
  id: totrans-2170
  prefs: []
  type: TYPE_NORMAL
  zh: 在提示工程中使用对立观点意味着我们在提示中包含对比的观点。这刺激AI应用批判性思维，迫使它提供更平衡的回答。
- en: Counterpoints can be introduced by playing devil’s advocate or by incorporating
    opposing viewpoints. By challenging the AI to consider multiple angles and underlying
    complexities, the AI’s answers become more comprehensive and include a higher
    level of critical thinking.
  id: totrans-2171
  prefs: []
  type: TYPE_NORMAL
  zh: 可以通过扮演魔鬼的辩护士或融入对立观点来引入对立观点。通过挑战AI考虑多个角度和潜在复杂性，AI的回答变得更加全面，并包含更高水平的批判性思维。
- en: For example, let’s first ask ChatGPT a plain question, without a counterpoint.
  id: totrans-2172
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，我们先向ChatGPT提出一个简单的问题，不附带任何对立观点。
- en: '| YouExplain the benefits of renewable energy.ChatGPTRenewable energy, which
    includes sources like solar, wind, hydroelectric, and geothermal power, offers
    several significant benefits compared to traditional fossil fuels:'
  id: totrans-2173
  prefs: []
  type: TYPE_NORMAL
  zh: '| 你解释可再生能源的好处。ChatGPT可再生能源，包括太阳能、风能、水能和地热能等，与传统的化石燃料相比，具有几个显著的好处：'
- en: 'Environmental Protection: Renewable energy sources generate far less pollution
    and greenhouse gases than fossil fuels. This reduction in air and water pollution
    is crucial for combating climate change and protecting ecosystems and biodiversity.'
  id: totrans-2174
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 环境保护：与化石燃料相比，可再生能源产生的污染和温室气体要少得多。这种减少空气和水污染对于对抗气候变化和保护生态系统和生物多样性至关重要。
- en: 'Sustainable and Inexhaustible: Unlike fossil fuels, which are finite, renewable
    energy sources are virtually inexhaustible. The sun will continue to shine, the
    wind will keep blowing, and rivers will flow for billions of years, making these
    energy sources sustainable for the long-term future.'
  id: totrans-2175
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 可持续且用之不竭：与有限的化石燃料不同，可再生能源几乎用之不竭。太阳将持续照耀，风将持续吹拂，河流将持续流淌数十亿年，使这些能源源可持续用于长期未来。
- en: 'Reduced Greenhouse Gas Emissions: Burning fossil fuels is a major contributor
    to greenhouse gas emissions, notably carbon dioxide and methane. Renewable energy
    sources produce minimal greenhouse gases, helping to mitigate climate change.'
  id: totrans-2176
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 减少温室气体排放：燃烧化石燃料是温室气体排放的主要贡献者，尤其是二氧化碳和甲烷。可再生能源产生极少的温室气体，有助于缓解气候变化。
- en: 'Energy Independence and Security: Countries can reduce their dependence on
    imported fuels by developing renewable energy resources. This enhances energy
    security and can protect nations from price fluctuations in global energy markets.'
  id: totrans-2177
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 能源独立和安全：国家可以通过开发可再生能源资源来减少对进口燃料的依赖。这增强了能源安全，并可以保护国家免受全球能源市场价格波动的冲击。
- en: 'Economic Development and Job Creation: The renewable energy sector is labour-intensive,
    which means it creates a lot of jobs. These range from manufacturing and installation
    to maintenance and engineering, contributing to economic growth.'
  id: totrans-2178
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 经济发展和就业创造：可再生能源部门劳动密集型，这意味着它创造了大量就业机会。这些工作范围从制造和安装到维护和工程，有助于经济增长。
- en: 'Decrease in Health Risks: By reducing air pollution, renewable energy sources
    can lead to a decrease in health problems caused by pollutants from fossil fuels.
    This can result in fewer health-related expenses and improved overall public health.'
  id: totrans-2179
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 健康风险降低：通过减少空气污染，可再生能源可以降低由化石燃料污染物引起的不良健康问题的风险。这可能导致与健康相关的费用减少，并改善整体公共健康。
- en: 'Technological Innovation and Cost Reduction: As technology in renewable energy
    advances, the cost of these technologies drops. Solar panels and wind turbines
    have become significantly cheaper over the past decade, making renewable energy
    more competitive with fossil fuels.'
  id: totrans-2180
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 技术创新和成本降低：随着可再生能源技术的进步，这些技术的成本正在下降。在过去十年中，太阳能电池板和风力涡轮机的价格已经显著降低，使可再生能源与化石燃料更具竞争力。
- en: 'Energy Accessibility: Renewable energy technologies can be deployed in remote
    and rural areas where it''s not economically viable to extend the traditional
    power grid. This can improve access to energy in developing countries or remote
    locations.'
  id: totrans-2181
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 能源可及性：可再生能源技术可以在传统电网扩展经济上不可行的偏远和农村地区部署。这可以改善发展中国家或偏远地区的能源获取。
- en: 'Flexibility and Scalability: Many forms of renewable energy, particularly solar
    and wind, can be scaled to fit a variety of needs, from small personal devices
    to large power plants.'
  id: totrans-2182
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 灵活性和可扩展性：许多可再生能源形式，尤其是太阳能和风能，可以根据各种需求进行扩展，从小型个人设备到大型发电厂。
- en: 'Conservation of Water Resources: Traditional power generation methods often
    require large amounts of water for cooling. Most renewable energy sources use
    significantly less water, helping to conserve this vital resource.'
  id: totrans-2183
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 水资源保护：传统的发电方法通常需要大量水进行冷却。大多数可再生能源使用的水量显著减少，有助于保护这一重要资源。
- en: In summary, renewable energy offers a sustainable, environmentally friendly,
    and economically beneficial alternative to fossil fuels, playing a crucial role
    in combating climate change, improving public health, and ensuring a more secure
    and independent energy future. |
  id: totrans-2184
  prefs: []
  type: TYPE_NORMAL
  zh: 总结来说，可再生能源提供了一种可持续、环保且经济上有益的替代化石燃料的选择，在应对气候变化、改善公共健康和确保更安全、更独立能源未来方面发挥着关键作用。
- en: In this case, ChatGPT’s response is straightforward and only focuses on positive
    aspects, as prompted. Now let’s ask the same question again, but this we’ll ask
    ChatGPT to take counterpoints into account.
  id: totrans-2185
  prefs: []
  type: TYPE_NORMAL
  zh: 在这种情况下，ChatGPT的回答是直接的，并且只关注积极的方面，正如提示的那样。现在让我们再次提出相同的问题，但这次我们将要求ChatGPT考虑反方观点。
- en: '| YouExplain the benefits of renewable energy, taking counterpoints into account.ChatGPTRenewable
    energy, derived from natural processes that are continuously replenished, includes
    sources like solar, wind, hydro, geothermal, and biomass. It offers several benefits,
    but also faces some challenges and counterpoints.Benefits of Renewable Energy'
  id: totrans-2186
  prefs: []
  type: TYPE_NORMAL
  zh: '| 请解释可再生能源的好处，同时考虑反方观点。ChatGPT可再生能源，来源于不断补充的自然过程，包括太阳能、风能、水能、地热能和生物质能。它提供了许多好处，但也面临一些挑战和反方观点。'
- en: 'Environmental Impact: Renewable energy sources produce little to no greenhouse
    gas emissions during operation, making them cleaner and safer for the environment
    compared to fossil fuels, which release carbon dioxide and other harmful pollutants.'
  id: totrans-2187
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 环境影响：在运行过程中，可再生能源产生的温室气体排放很少或没有，这使得它们比释放二氧化碳和其他有害污染物的化石燃料更清洁、更安全，对环境更有利。
- en: 'Sustainability: As renewables are based on natural resources that are either
    inexhaustible or can be replenished quickly (like wind, sun, and water), they
    offer a more sustainable energy solution than fossil fuels, which are finite.'
  id: totrans-2188
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 可持续性：由于可再生能源基于自然资源，这些资源要么是取之不尽的，要么可以迅速补充（如风、太阳和水），因此它们比有限的化石燃料提供了更可持续的能源解决方案。
- en: 'Energy Security: Using renewable sources can reduce dependence on imported
    fuels, enhancing energy security for many countries and reducing the risks associated
    with fuel supply disruptions.'
  id: totrans-2189
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 能源安全：利用可再生能源可以减少对进口燃料的依赖，增强许多国家的能源安全，并降低燃料供应中断的风险。
- en: 'Economic Benefits: The renewable energy sector can create jobs in manufacturing,
    installation, and maintenance. It also often involves local materials and labour,
    which can boost local economies.'
  id: totrans-2190
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 经济效益：可再生能源部门可以在制造、安装和维护方面创造就业机会。它通常涉及当地材料和劳动力，这可以促进当地经济的发展。
- en: 'Health Benefits: By reducing air pollution, renewables contribute to better
    health outcomes. The decrease in pollutants like sulphur dioxide and particulate
    matter can lead to fewer respiratory and cardiovascular diseases.'
  id: totrans-2191
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 健康益处：通过减少空气污染，可再生能源有助于改善健康结果。二氧化硫和颗粒物等污染物的减少可能导致呼吸系统和心血管疾病减少。
- en: Counterpoints and Challenges
  id: totrans-2192
  prefs: []
  type: TYPE_NORMAL
  zh: 对立观点和挑战
- en: 'Intermittency and Reliability: Many renewable sources like solar and wind are
    intermittent, meaning they don''t produce energy all the time. This can lead to
    reliability issues for the power grid, requiring backup systems or storage solutions.'
  id: totrans-2193
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 间歇性和可靠性：许多可再生能源，如太阳能和风能，具有间歇性，这意味着它们并非总是产生能量。这可能导致电网的可靠性问题，需要备用系统或储能解决方案。
- en: 'Energy Storage Costs: To address intermittency, energy storage systems (like
    batteries) are needed, but these can be expensive and are still in the developmental
    stage for large-scale applications.'
  id: totrans-2194
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 储能成本：为了解决间歇性问题，需要储能系统（如电池），但这些可能很昂贵，并且对于大规模应用仍处于开发阶段。
- en: 'Initial Investment: The upfront cost for renewable energy technologies can
    be higher than traditional fossil fuels. While the long-term operating costs may
    be lower, the initial investment is a barrier for many.'
  id: totrans-2195
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 初始投资：可再生能源技术的初始成本可能高于传统化石燃料。虽然长期运营成本可能较低，但初始投资是许多人的障碍。
- en: 'Environmental Impact of Production: While operating emissions are low, manufacturing
    renewable energy systems (like solar panels and wind turbines) does have an environmental
    impact, including the use of raw materials and energy.'
  id: totrans-2196
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 生产的环境影响：虽然运营排放较低，但制造可再生能源系统（如太阳能板和风力涡轮机）确实对环境有影响，包括使用原材料和能源。
- en: 'Land Use: Certain renewable energy projects, especially wind farms and large
    solar installations, require significant land use, which can lead to habitat loss
    and other environmental concerns.'
  id: totrans-2197
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 土地使用：某些可再生能源项目，尤其是风力农场和大型太阳能安装，需要大量的土地使用，这可能导致栖息地丧失和其他环境问题。
- en: 'Technological Maturity: Some renewable technologies, especially newer ones,
    are not yet as technologically mature or efficient as fossil fuel technologies,
    which have been developed and refined over a longer period.'
  id: totrans-2198
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 技术成熟度：一些可再生能源技术，尤其是较新的技术，在技术成熟度和效率上还不及经过长期发展和完善的化石燃料技术。
- en: In conclusion, while renewable energy presents a promising path towards a more
    sustainable and environmentally friendly future, it is important to address the
    accompanying challenges through technological innovations, policy support, and
    infrastructure development. Balancing the benefits and drawbacks is crucial in
    the transition to a cleaner energy future. |
  id: totrans-2199
  prefs: []
  type: TYPE_NORMAL
  zh: 总之，虽然可再生能源为走向更可持续和环保的未来提供了有希望的途径，但通过技术创新、政策支持和基础设施建设来应对伴随的挑战同样重要。在向更清洁的能源未来过渡时，平衡利弊至关重要。
    |
- en: This time, including counterpoints makes ChatGPT provide a nuanced and realistic
    understanding of the subject matter.
  id: totrans-2200
  prefs: []
  type: TYPE_NORMAL
  zh: 这次，包括对立观点使得ChatGPT能够提供对主题的细微和现实的理解。
- en: The balanced narrative includes a deeper analytical approach and a comprehensive
    grasp of the topic, which is the result of considering diverse viewpoints in the
    analysis.
  id: totrans-2201
  prefs: []
  type: TYPE_NORMAL
  zh: 平衡的叙述包括更深入的分析方法和全面掌握主题，这是在分析中考虑不同观点的结果。
- en: Demanding Precision
  id: totrans-2202
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 要求精确
- en: The basis of providing a good answer is to precisely define what is being said
    in answer to the question. If we do not express ourselves clearly then we could
    mean the right thing, but nobody will ever know that.
  id: totrans-2203
  prefs: []
  type: TYPE_NORMAL
  zh: 提供良好答案的基础是精确地定义对问题的回答。如果我们表达不清楚，那么我们可能意味着正确的事情，但没有人会知道这一点。
- en: Demanding precision from an AI requires a precise and clear formulation of both
    the question and the expected answer. The following table lists various prompt
    engineering strategies for ensuring precision in the AI’s response.
  id: totrans-2204
  prefs: []
  type: TYPE_NORMAL
  zh: 要求人工智能精确需要精确和清晰地表述问题和预期的答案。以下表格列出了确保人工智能响应精确性的各种提示工程策略。
- en: '| Technique | Explanation |'
  id: totrans-2205
  prefs: []
  type: TYPE_TB
  zh: '| 技术 | 说明 |'
- en: '| --- | --- |'
  id: totrans-2206
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- |'
- en: '| Detail-Oriented Queries | The precision of an AI’s response is directly influenced
    by the specificity of the query.For example, instead of asking "How do electric
    cars work?" we can ask "Explain which components function together to ensure the
    correct functioning of electric vehicles." |'
  id: totrans-2207
  prefs: []
  type: TYPE_TB
  zh: '| 细节导向的查询 | 人工智能的响应精度直接受查询的特定性影响。例如，我们与其问“电动汽车是如何工作的？”不如问“解释哪些组件协同工作以确保电动汽车的正确运行。”
    |'
- en: '| Set Contextual Boundaries | Clearly delineating the scope of the question
    avoids broad, generalised answers.For instance, instead of generally asking about
    the impact of renewable energy on the UK, we can ask, “How must the UK energy
    infrastructure be updated to manage renewable energy sources.” |'
  id: totrans-2208
  prefs: []
  type: TYPE_TB
  zh: '| 设置上下文界限 | 明确问题的范围可以避免给出宽泛、一般化的答案。例如，我们可以说，“为了管理可再生能源，英国能源基础设施必须如何更新？”而不是一般性地询问可再生能源对英国的影响。
    |'
- en: '| Ask for Definitions | Request specific definitions of terms or concepts.For
    example, instead of asking, "What is machine learning?" we can ask, "Can you define
    supervised and unsupervised machine learning, highlighting their differences?"
    |'
  id: totrans-2209
  prefs: []
  type: TYPE_TB
  zh: '| 请求定义 | 请求特定术语或概念的明确定义。例如，我们可以说，“你能定义监督学习和无监督学习，并突出它们之间的区别吗？”而不是简单地问，“什么是机器学习？”
    |'
- en: '| Request Examples | Ask for examples to illustrate a point.For instance, "Provide
    three specific examples of how blockchain technology is being used in finance."
    |'
  id: totrans-2210
  prefs: []
  type: TYPE_TB
  zh: '| 请求示例 | 请求举例说明一个观点。例如，“提供三个具体的例子来说明区块链技术在金融领域的应用。” |'
- en: '| Clarify Scenarios | Specify the scenario being asked about.For example, instead
    of “What are the current cybersecurity best practices?” we can ask "In the scenario
    of a data breach, what specific steps should a company follow according to current
    cybersecurity best practices?". |'
  id: totrans-2211
  prefs: []
  type: TYPE_TB
  zh: '| 明确情景 | 明确所询问的情景。例如，我们可以说，“在数据泄露的情况下，根据当前网络安全最佳实践，公司应遵循哪些具体步骤？”而不是简单地问，“当前网络安全最佳实践是什么？”
    |'
- en: '| Compare and Contrast | Ask the AI to compare and contrast ideas.For example,
    instead of asking, “Are electric cars good for the environment?” we can ask "In
    terms of environmental impact, how do electric cars compare to petrol-powered
    cars?" |'
  id: totrans-2212
  prefs: []
  type: TYPE_TB
  zh: '| 比较和对比 | 请求AI比较和对比观点。例如，我们可以说，“从环境影响的角度来看，电动汽车与燃油汽车相比如何？”而不是简单地问，“电动汽车对环境好吗？”
    |'
- en: 'In addition to the above techniques, we can simply directly ask the AI to be
    precise in its answer.  For example, compare the two following response from ChatGPT:'
  id: totrans-2213
  prefs: []
  type: TYPE_NORMAL
  zh: 除了上述技巧之外，我们还可以直接要求AI在回答中保持精确。例如，比较以下两个ChatGPT的回答：
- en: '| YouI have a persistent cough and a high fever. What might be wrong with me?ChatGPTI''m
    not a doctor, but a persistent cough and a high fever could be symptoms of various
    illnesses ranging from a common cold to more serious conditions like influenza,
    pneumonia, or even COVID-19\. These symptoms can also be associated with other
    respiratory infections or conditions.Given these symptoms, it''s important to
    consult with a healthcare professional for an accurate diagnosis and appropriate
    treatment. They might recommend rest, fluids, and over-the-counter medication
    to manage the symptoms, but a medical evaluation is crucial, especially if your
    symptoms are severe or persistent.In the meantime, it''s advisable to rest, stay
    hydrated, and monitor your symptoms. If you experience difficulty breathing, persistent
    pain or pressure in the chest, new confusion, inability to wake or stay awake,
    or bluish lips or face, seek medical attention immediately, as these could be
    signs of a more serious condition. |'
  id: totrans-2214
  prefs: []
  type: TYPE_TB
  zh: '| 你有持续的咳嗽和高烧。我可能出了什么问题？ChatGPT我不是医生，但持续的咳嗽和高烧可能是从普通感冒到更严重的疾病如流感、肺炎甚至COVID-19等疾病的症状。这些症状也可能与其他呼吸道感染或状况有关。鉴于这些症状，咨询医疗专业人员以获得准确的诊断和适当的治疗是很重要的。他们可能会建议休息、补充水分和服用非处方药来管理症状，但医学评估至关重要，尤其是如果你的症状严重或持续的话。在此期间，建议你休息、保持水分充足并监测你的症状。如果你出现呼吸困难、胸部持续疼痛或压力、新的混乱、无法醒来或保持清醒、嘴唇或面部发蓝等情况，请立即寻求医疗帮助，因为这些可能是更严重状况的迹象。
    |'
- en: 'With:'
  id: totrans-2215
  prefs: []
  type: TYPE_NORMAL
  zh: 'With:'
- en: '| YouI have a persistent cough and a high fever. What might be wrong with me?
    Be precise and rigorous.ChatGPTI''m not a doctor, but based on your symptoms of
    a persistent cough and high fever, there are several possible causes. However,
    it''s important to remember that only a healthcare professional can provide a
    definitive diagnosis after a thorough examination. Here are some common conditions
    that might present with these symptoms:'
  id: totrans-2216
  prefs: []
  type: TYPE_NORMAL
  zh: '| 你有持续的咳嗽和高烧。我可能出了什么问题？请尽量精确和严谨。ChatGPT我不是医生，但根据你持续的咳嗽和高烧的症状，可能有几种可能的原因。然而，重要的是要记住，只有经过彻底检查的医疗专业人员才能提供明确的诊断。以下是一些可能伴随这些症状的常见情况：'
- en: 'Influenza (Flu): A viral infection affecting the respiratory system. Symptoms
    often include a high fever, cough, body aches, and fatigue.'
  id: totrans-2217
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 流感（流感）：一种影响呼吸系统的病毒感染。常见症状包括高烧、咳嗽、身体疼痛和疲劳。
- en: 'Common Cold: Typically less severe than the flu, but can still cause a cough
    and low-grade fever.'
  id: totrans-2218
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 普通感冒：通常比流感轻微，但仍可能导致咳嗽和低烧。
- en: 'COVID-19: Caused by the coronavirus SARS-CoV-2, it often presents with a fever,
    cough, and sometimes shortness of breath, among other symptoms.'
  id: totrans-2219
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 新冠肺炎：由冠状病毒SARS-CoV-2引起，通常伴有发热、咳嗽，有时还有呼吸困难等症状。
- en: 'Pneumonia: An infection of the lungs that can be caused by bacteria, viruses,
    or fungi. Symptoms often include a high fever, cough (which may produce phlegm),
    and chest pain.'
  id: totrans-2220
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 肺炎：由细菌、病毒或真菌引起的肺部感染。症状通常包括高烧、咳嗽（可能产生痰液）和胸痛。
- en: 'Bronchitis: Inflammation of the bronchial tubes, which carry air to your lungs.
    It often results in a cough that may bring up mucus, as well as a low fever.'
  id: totrans-2221
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 支气管炎：支气管管（将空气输送到肺部）的炎症。它通常会导致咳嗽，可能伴有痰液，以及低烧。
- en: 'Tuberculosis: A bacterial infection that mainly affects the lungs. Symptoms
    include a persistent cough (sometimes with blood), fever, night sweats, and weight
    loss.'
  id: totrans-2222
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 结核病：一种主要影响肺部的细菌感染。症状包括持续的咳嗽（有时带血）、发热、夜间出汗和体重减轻。
- en: 'Whooping Cough (Pertussis): A highly contagious respiratory tract infection
    marked by a severe hacking cough followed by a high-pitched intake of breath that
    sounds like "whoop."'
  id: totrans-2223
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 百日咳（百日咳）：一种高度传染性的呼吸道感染，以剧烈的咳嗽为特征，随后是高音调的吸气声，听起来像“whoop”。
- en: Given the variety of potential causes, some of which are quite serious, it's
    very important to consult with a healthcare provider for a proper diagnosis and
    treatment plan. They may recommend diagnostic tests like blood tests, chest X-ray,
    or a throat swab depending on your specific symptoms and medical history. |
  id: totrans-2224
  prefs: []
  type: TYPE_NORMAL
  zh: 由于潜在原因多种多样，其中一些相当严重，因此咨询医疗保健提供者进行适当的诊断和治疗计划非常重要。他们可能会根据您的具体症状和病史推荐诊断测试，如血液检查、胸部X光或咽喉拭子。
- en: Simply by asking ChatGPT to be precise, it gave a more precise answer.
  id: totrans-2225
  prefs: []
  type: TYPE_NORMAL
  zh: 只需要求ChatGPT回答得精确一些，它就给出了更精确的答案。
