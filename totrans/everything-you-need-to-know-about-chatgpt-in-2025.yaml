  prefs: []
  type: TYPE_NORMAL
  zh: '**GPT-1**：一场革命的起点'
- en: '****Rel**e**as**ed** ****i****n**** ****20****1**8**, ****G****P**T**-****1****
    ****w****a**s** ****t****h**e** ****fi**r**s**t** ****mo**d**e**l** ****i****n****
    ****t****h**e** ****se**r**i**es** ****a****n**d** ****a**** ****pow**e**rf**ul**
