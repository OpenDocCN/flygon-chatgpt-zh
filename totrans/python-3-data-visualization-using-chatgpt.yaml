    accessing the mytools.db database, and then populates the Pandas data frame df
    with the result of executing the SQL statement contained in the variable sql.
    Now launch the code in [Listing 5.18](#list5-18), and you will see the following
    output:'
  id: totrans-2013
  prefs: []
  type: TYPE_NORMAL
  zh: '[列表 5.18](#list5-18) 以几个导入语句开始，然后初始化变量 sql，其中包含一个 SQL 语句，用于从降雨量表中选择数据。列表 5.18
