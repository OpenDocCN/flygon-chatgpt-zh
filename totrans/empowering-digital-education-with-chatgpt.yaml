- en: 4.3.1.3 Journal
  id: totrans-890
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 4.3.1.3 期刊
- en: The top five journals were found to be *Education Sciences*, with ten articles,
    followed by *Journal of Chemical Education*, with eight articles; *JMIR Medical
    Education*, with seven articles; *Education and Information Technologies*, with
    six articles; and *Journal of University Teaching and Learning Practice*, with
    six articles (see [Table 4.2](#ch12.xhtml#t7) and [Figure 4.2](#ch12.xhtml#f8)).
  id: totrans-891
  prefs: []
  type: TYPE_NORMAL
  zh: 发现前五名期刊是*教育科学*，共有10篇文章，其次是*化学教育杂志*，共有8篇文章；*JMIR医学教育*，共有7篇文章；*教育信息技术*，共有6篇文章；以及*大学教学与实践杂志*，共有6篇文章（见[表4.2](#ch12.xhtml#t7)和[图4.2](#ch12.xhtml#f8)）。
