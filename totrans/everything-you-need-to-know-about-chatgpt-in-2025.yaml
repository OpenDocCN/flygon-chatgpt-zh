  id: totrans-433
  prefs: []
  type: TYPE_NORMAL
  zh: 社会面临的真正挑战不是人工智能是否会取代人类工作，而是如何找到自动化与人类就业之间的正确平衡。劳动力市场必须以一种方式发展，既能重新获得自动化的好处，又不会失去人类工人能力和价值的光彩。
