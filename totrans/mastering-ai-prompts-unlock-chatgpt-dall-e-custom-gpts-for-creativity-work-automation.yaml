  - PREF_UL
  type: TYPE_NORMAL
- en: 'Stay in Character: Treat the simulation seriously to get better results.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Switch Roles: Ask the AI to switch roles so you can see both sides of the scenario.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
