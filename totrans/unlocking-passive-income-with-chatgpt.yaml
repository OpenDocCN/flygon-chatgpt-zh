  zh: '![image](d2d_images/chapter_title_above.png)'
- en: Generating Passive Income with AI-Powered Affiliate Marketing
  id: totrans-777
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 利用人工智能驱动的联盟营销创造被动收入
- en: '![image](d2d_images/chapter_title_below.png)'
  id: totrans-778
  prefs: []
  type: TYPE_IMG
  zh: '![image](d2d_images/chapter_title_below.png)'
- en: Now, let me tell you about another way to earn passive income. It is quite easy
    compared to the previous ones. Whether you’re a budding entrepreneur or an experienced
    businessperson, you can leverage cutting-edge tech and cash in on the rewards.
    Look into products, tools, and services related to your niche that use Artificial
    Intelligence – then join their affiliate programs for unique links. Use these
    links to promote offerings through your website, blog, or social media channels.
    Every successful sale is money in the bank! Get ahead of the competition by embracing
    AI advancements – be a 21st-century mogul and watch those profits pile up!
  id: totrans-779
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我告诉你另一种赚取被动收入的方法。与之前的方法相比，这相当简单。无论你是初出茅庐的创业者还是经验丰富的商人，你都可以利用尖端技术并从中获利。研究与你领域相关的产品、工具和服务，这些产品和服务使用人工智能——然后加入他们的联盟计划以获取独特的链接。使用这些链接通过你的网站、博客或社交媒体渠道推广产品。每一次成功的销售都是银行里的钱！通过拥抱人工智能的进步来领先于竞争对手——成为一个21世纪的巨头，看着利润堆积如山！
- en: '| ![image](d2d_images/chapter_title_corner_decoration_left.png) |  | ![image](d2d_images/chapter_title_corner_decoration_right.png)
    |'
  id: totrans-780
  prefs: []
  type: TYPE_TB
  zh: '| ![image](d2d_images/chapter_title_corner_decoration_left.png) |  | ![image](d2d_images/chapter_title_corner_decoration_right.png)
    |'
- en: '![image](d2d_images/chapter_title_above.png)'
  id: totrans-781
  prefs: []
  type: TYPE_IMG
  zh: '![image](d2d_images/chapter_title_above.png)'
- en: 'Chapter 5: Applications for Profitable Ventures'
  id: totrans-782
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第5章：盈利性企业的应用
- en: '![image](d2d_images/chapter_title_below.png)'
  id: totrans-783
  prefs: []
  type: TYPE_IMG
  zh: '![image](d2d_images/chapter_title_below.png)'
- en: This chapter delves into the realm of applications for profitable ventures,
    exploring a diverse range of industries and strategies that can pave the way for
    success. From innovative technologies and disruptive business models to sustainable
    practices and global market expansion, this chapter uncovers the key elements
    contributing to modern enterprises' profitability. Whether you are an aspiring
    entrepreneur or a seasoned business professional, the insights shared within these
    pages will empower you to navigate the competitive business landscape and unlock
    new avenues for financial growth.
  id: totrans-784
  prefs: []
  type: TYPE_NORMAL
  zh: 本章深入探讨盈利性企业的应用领域，探索各种行业和策略，这些策略可以为成功铺平道路。从创新技术到颠覆性商业模式，再到可持续实践和全球市场扩张，本章揭示了现代企业盈利的关键要素。无论你是怀揣创业梦想的创业者，还是经验丰富的商业专业人士，这些页面中分享的见解将赋予你驾驭竞争激烈的商业环境并开启新的财务增长途径的能力。
- en: '| ![image](d2d_images/chapter_title_corner_decoration_left.png) |  | ![image](d2d_images/chapter_title_corner_decoration_right.png)
    |'
  id: totrans-785
  prefs: []
  type: TYPE_TB
  zh: '| ![image](d2d_images/chapter_title_corner_decoration_left.png) |  | ![image](d2d_images/chapter_title_corner_decoration_right.png)
    |'
- en: '![image](d2d_images/chapter_title_above.png)'
  id: totrans-786
  prefs: []
  type: TYPE_IMG
  zh: '![image](d2d_images/chapter_title_above.png)'
- en: Leveraging AI in Financial Services
  id: totrans-787
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 在金融服务中利用人工智能
- en: '![image](d2d_images/chapter_title_below.png)'
  id: totrans-788
  prefs: []
  type: TYPE_IMG
  zh: '![image](d2d_images/chapter_title_below.png)'
- en: The cutthroat financial services industry (FSI) is a bloody battlefield with
    stringent rules. To stay ahead of the competition, companies need to get creative
    and employ cutting-edge tech - like AI - that analyzes past data sets to forecast
    future events and enrich customer experiences. AI has become an absolute must
    in this arena if businesses want to stand out from their rivals. So, if you’re
    looking for your business model to remain at the top of the food chain amongst
    fierce competitors, you’ve got to think outside the box and find innovative ways
    to utilize technology.
  id: totrans-789
  prefs: []
  type: TYPE_NORMAL
  zh: 激烈的金融服务行业（FSI）是一个充满严格规定的血腥战场。为了在竞争中保持领先，公司需要发挥创意并采用尖端技术——如AI——分析过去的数据集来预测未来事件并丰富客户体验。如果企业想要在竞争对手中脱颖而出，AI在这个领域已经成为绝对必需品。因此，如果您希望您的商业模式在激烈竞争的环境中保持领先地位，您必须跳出思维定式，找到利用技术的创新方法。
- en: AI-Driven Marketing
  id: totrans-790
  prefs: []
  type: TYPE_NORMAL
  zh: AI驱动营销
- en: AI’s application in marketing may seem like something out of sci-fi movies,
    but it’s already here! According to Salesforce stats, only 29% of marketers used
    AI back in 2018\. However, this number skyrocketed by 84% by 2020 - proving its
    undeniable potential as an effective tool for success.
  id: totrans-791
  prefs: []
  type: TYPE_NORMAL
  zh: AI在营销中的应用可能看起来像是科幻电影中的场景，但它已经到来！根据Salesforce的数据，2018年只有29%的营销人员使用了AI。然而，到2020年，这一数字飙升了84%，证明了它作为成功有效工具的不可否认潜力。
- en: Content Marketing
  id: totrans-792
  prefs: []
  type: TYPE_NORMAL
  zh: 内容营销
- en: Content is the heartbeat of any successful marketing strategy. With AI advancements,
    crafting content that speaks to our target market and generates real results is
    simpler than ever. Take Buzzfeed, for example - they’ve become a prime model on
    how Artificial Intelligence can be used to upgrade their operations for massive
    success. From predicting which posts will go viral, customizing user experiences,
    automating keyword selection and categorization, all the way through personalizing
    each visitor’s experience with tailored content.
  id: totrans-793
  prefs: []
  type: TYPE_NORMAL
  zh: 内容是任何成功营销策略的脉搏。随着AI的进步，制作能够吸引我们的目标市场并产生实际成果的内容比以往任何时候都要简单。以Buzzfeed为例——他们已经成为如何使用人工智能来升级他们的运营以实现巨大成功的典范。从预测哪些帖子会走红，定制用户体验，自动化关键词选择和分类，一直到为每位访客提供定制内容，个性化他们的体验。
- en: 'But beyond just using AI tools in building your content plan, there are other
    aspects too:'
  id: totrans-794
  prefs: []
  type: TYPE_NORMAL
  zh: 但在仅仅使用AI工具构建您的内容计划之外，还有其他方面：
- en: What type of material should you create?
  id: totrans-795
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 您应该创建哪种类型的材料？
- en: Where should you post it?
  id: totrans-796
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 您应该在何处发布它？
- en: How often do you release new pieces?
  id: totrans-797
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 您多久发布一次新内容？
- en: And what kind of tone or form fits best with your message?
  id: totrans-798
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 您的消息最适合哪种语气或形式？
- en: All these questions have something crucial in common. They need precise consideration
    before making decisions that could sway the future direction of your brand and
    business growth. After all, when it comes down to creating a lasting impact online,
    content is king.
  id: totrans-799
  prefs: []
  type: TYPE_NORMAL
  zh: 所有这些问题都有一个共同的关键点。在做出可能影响您品牌未来方向和业务增长的决定之前，都需要进行精确的考虑。毕竟，当涉及到在线创造持久影响时，内容是王。
- en: Given a prompt, ChatGPT can generate human-like text that's coherent and contextually
    relevant. Remember to review and edit the content to ensure it aligns with your
    brand voice and content strategy.
  id: totrans-800
  prefs: []
  type: TYPE_NORMAL
  zh: 给定一个提示，ChatGPT可以生成符合逻辑和上下文相关的人类文本。请记住，要审查和编辑内容，以确保其与您的品牌声音和内容策略保持一致。
- en: 'Input: "Write a blog post about the benefits of plant-based diets."'
  id: totrans-801
  prefs: []
  type: TYPE_NORMAL
  zh: 输入："撰写一篇关于植物性饮食益处的博客文章。"
- en: 'Output: "[Draft of a blog post]"'
  id: totrans-802
  prefs: []
  type: TYPE_NORMAL
  zh: 输出："[博客文章草稿]"
- en: If you're stuck for content ideas, ChatGPT can help. Provide it with a topic
    or theme, and it can generate a list of content ideas or titles.
  id: totrans-803
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您在寻找内容灵感时遇到困难，ChatGPT可以提供帮助。给它提供一个主题或主题，它可以生成一系列内容想法或标题。
- en: 'Input: "Generate content ideas for a gardening blog."'
  id: totrans-804
  prefs: []
  type: TYPE_NORMAL
  zh: 输入："为园艺博客生成内容想法。"
- en: 'Output: "[List of content ideas]"'
  id: totrans-805
  prefs: []
  type: TYPE_NORMAL
  zh: 输出："[内容想法列表]"
- en: ChatGPT can help optimize your content for SEO. It can suggest keywords, draft
    meta descriptions, or generate SEO-friendly headlines based on your input.
  id: totrans-806
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT可以帮助优化您的内容以适应SEO。它可以建议关键词，起草元描述，或根据您的输入生成SEO友好的标题。
- en: 'Input: "Create an SEO-friendly headline for a blog post about cryptocurrency
    trends."'
  id: totrans-807
  prefs: []
  type: TYPE_NORMAL
  zh: 输入："为关于加密货币趋势的博客文章创建一个SEO友好的标题。"
- en: 'Output: "5 Key Cryptocurrency Trends of 2023: A Comprehensive Guide"'
  id: totrans-808
  prefs: []
  type: TYPE_NORMAL
  zh: 输出："2023年5大加密货币趋势：全面指南"
- en: ChatGPT can draft emails for your marketing campaigns. It can help with creating
    engaging subject lines, drafting the body of the email, or crafting CTAs.
  id: totrans-809
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT可以为您的营销活动起草电子邮件。它可以帮助创建吸引人的主题行，起草电子邮件正文，或者制定CTA。
- en: 'Input: "Write a promotional email for our new product launch."'
  id: totrans-810
  prefs: []
  type: TYPE_NORMAL
  zh: 输入：“为我们的新产品发布撰写推广电子邮件。”
- en: 'Output: "[Draft of a promotional email]"'
  id: totrans-811
  prefs: []
  type: TYPE_NORMAL
  zh: 输出：“[推广电子邮件草稿]”
- en: From creating engaging posts to drafting responses for customer comments, ChatGPT
    can assist with managing your social media presence.
  id: totrans-812
  prefs: []
  type: TYPE_NORMAL
  zh: 从创建吸引人的帖子到为客户评论撰写回复，ChatGPT可以帮助您管理社交媒体的存在。
- en: 'Input: "Write a response to a customer who had a positive experience with our
    product."'
  id: totrans-813
  prefs: []
  type: TYPE_NORMAL
  zh: 输入：“为一位对我们产品有良好体验的客户撰写回复。”
- en: 'Output: "We''re so glad to hear you had a great experience with our product!
    Thank you for the feedback."'
  id: totrans-814
  prefs: []
  type: TYPE_NORMAL
  zh: 输出：“我们很高兴听到您对我们的产品有很好的体验！感谢您的反馈。”
- en: Public Relations
  id: totrans-815
  prefs: []
  type: TYPE_NORMAL
  zh: 公共关系
- en: Public relations has undergone a major transformation in the age of social media
    and digital influencers—and AI can help you keep up. You need to know which content
    creators, sponsored or unsponsored, are best aligned with your brand’s values
    and appeal—so why not let technology do some of the work?
  id: totrans-816
  prefs: []
  type: TYPE_NORMAL
  zh: 在社交媒体和数字影响者的时代，公共关系经历了重大变革——人工智能可以帮助您跟上步伐。您需要知道哪些内容创作者，无论是赞助还是非赞助，与您的品牌价值观和吸引力最相符合——那么为什么不让技术做一些工作呢？
- en: AI-powered platforms have made it possible to match products with people with
    an audience most likely to relate to them. Taking this even further is innovative
    chatbot tech like Lil Miquela, a totally virtual persona with millions of followers
    worldwide! Brands such as Calvin Klein and Prada pay her hefty fees for her influence,
    thanks to her highly engaged fan base.
  id: totrans-817
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能平台使得将产品与最有可能与之产生共鸣的人群相匹配成为可能。更进一步的是，像Lil Miquela这样的创新聊天机器人技术，一个完全虚拟的人物，拥有全球数百万的粉丝！卡尔文·克莱恩和普拉达等品牌支付给她高额的费用，这得益于她高度参与的粉丝群。
- en: But beyond finding influencers, Artificial Intelligence can also support other
    PR tasks like crafting press releases, optimizing external messages for maximum
    visibility across all channels (digital or otherwise), and researching ideal outlets
    for coverage opportunities. All these things require effort, but AI makes them
    much easier.
  id: totrans-818
  prefs: []
  type: TYPE_NORMAL
  zh: 但除了寻找影响者之外，人工智能还可以支持其他公关任务，如撰写新闻稿、优化外部信息以在所有渠道（数字或其他）上实现最大可见性，以及研究理想的报道机会。所有这些都需要努力，但人工智能使它们变得容易得多。
- en: Advertising
  id: totrans-819
  prefs: []
  type: TYPE_NORMAL
  zh: 广告
- en: Advertisers face the challenge of optimizing ad placements to ensure they deliver
    maximum value. To do this successfully, leveraging AI-driven advertising tools
    and platforms is important. Facebook and Google are at the forefront in terms
    of online marketing capabilities; both offer powerful features that use audience
    segmentation combined with predictive analytics.
  id: totrans-820
  prefs: []
  type: TYPE_NORMAL
  zh: 广告商面临着优化广告投放以确保其提供最大价值的挑战。为了成功做到这一点，利用人工智能驱动的广告工具和平台至关重要。Facebook和Google在在线营销能力方面处于领先地位；两者都提供强大的功能，这些功能结合了受众细分和预测分析。
- en: Segmentation divides people into distinct groups based on characteristics like
    age, gender, income level, or interests – among other criteria – while predictive
    analytics indicate which audiences would be most receptive to particular products
    or services. Advertisers can then target select customers with multiple variations
    of their ads for testing purposes. It is a process made much simpler compared
    to traditional methods such as TV commercials or print publications, where it’s
    often difficult to determine whether sales were driven by effective advertisement
    placement or external factors.
  id: totrans-821
  prefs: []
  type: TYPE_NORMAL
  zh: 分段将人们根据年龄、性别、收入水平或兴趣等特征划分为不同的群体——以及其他标准——而预测分析则表明哪些受众最可能对特定产品或服务做出积极响应。广告商随后可以针对选定客户进行广告的多种变体测试。与传统的电视广告或印刷出版物等方法相比，这是一个简化得多的过程，在后者中，通常很难确定销售是否是由有效的广告投放或外部因素驱动的。
- en: For ultimate success, though, these AI-powered solutions should be incorporated
    as part of an overall strategic plan incorporating all aspects of digital marketing
    - from content creation through optimization techniques and beyond.
  id: totrans-822
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，为了取得最终的成功，这些人工智能解决方案应该作为整体战略计划的一部分被整合，该计划涵盖了数字营销的所有方面——从内容创作到优化技术，以及更远。
- en: '| ![image](d2d_images/chapter_title_corner_decoration_left.png) |  | ![image](d2d_images/chapter_title_corner_decoration_right.png)
    |'
  id: totrans-823
  prefs: []
  type: TYPE_TB
  zh: '| ![图片](d2d_images/chapter_title_corner_decoration_left.png) |  | ![图片](d2d_images/chapter_title_corner_decoration_right.png)
    |'
- en: '![image](d2d_images/chapter_title_above.png)'
  id: totrans-824
  prefs: []
  type: TYPE_IMG
  zh: '![图片](d2d_images/chapter_title_above.png)'
- en: AI-Powered Chatbots and Virtual Assistants
  id: totrans-825
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 人工智能驱动的聊天机器人和虚拟助手
- en: '![image](d2d_images/chapter_title_below.png)'
  id: totrans-826
  prefs: []
  type: TYPE_IMG
  zh: '![图片](d2d_images/chapter_title_below.png)'
- en: Chatbots are advanced applications that interact with customers in a realistic
    way, be it through text or audio. Their primary role is to guide users by providing
    instructions on how to complete tasks as well as supplying helpful info such as
    contact details and product information. Chatbots can also arrange calendar appointments,
    connect to knowledge bases for real-time support, and access self-service portals
    - making them invaluable tools for customer service departments. In short, chatbot
    technology bridges the gap between humans and computers with their AI capabilities,
    allowing businesses to interact with customers quickly while staying engaged in
    conversations at all times.
  id: totrans-827
  prefs: []
  type: TYPE_NORMAL
  zh: 聊天机器人是高级应用，能够以真实的方式与客户互动，无论是通过文本还是音频。它们的主要作用是通过提供完成任务的操作说明以及提供有用的信息，如联系细节和产品信息来引导用户。聊天机器人还可以安排日历约会，连接到知识库以提供实时支持，并访问自助门户——使它们成为客户服务部门的宝贵工具。简而言之，聊天机器人技术通过其AI能力弥合了人类与计算机之间的差距，使企业能够快速与客户互动，同时始终保持对话的参与。
- en: These days, virtual assistants are the go-to for all the mundane tasks that
    take up so much time. From Amazon Alexa to Apple Siri and Google Assistant, these
    personal software agents are here to simplify life. They can check bookings, set
    alarms, make calls, or type messages as if they were a real human assistant! They
    even offer personalized solutions with troubleshooting in an almost conversational
    manner. Plus, Alexa has advanced features which help develop voice chatbots —
    perfect for times when you just want someone to talk it out with! Don’t let tedious
    daily tasks weigh you down - there’s a virtual buddy ready and willing to lend
    a helping hand.
  id: totrans-828
  prefs: []
  type: TYPE_NORMAL
  zh: 这些天，虚拟助手已成为处理所有耗时繁琐任务的首选。从亚马逊的Alexa到苹果的Siri和谷歌助手，这些个人软件代理旨在简化生活。它们可以检查预订、设置闹钟、打电话或发送消息，就像它们是一个真实的人类助手！它们甚至可以以近乎对话的方式提供个性化的解决方案和故障排除。此外，Alexa还拥有高级功能，有助于开发语音聊天机器人——非常适合你只想与人交谈的时候！不要让繁琐的日常任务压垮你——有一个虚拟伙伴随时准备伸出援手。
- en: 'You’re probably wondering why you should invest in a virtual assistant or chatbot.
    Having these digital tools can help your business in more ways than one, from
    boosted productivity to top-notch customer service. Here’s what sets them apart:'
  id: totrans-829
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能想知道为什么你应该投资虚拟助手或聊天机器人。拥有这些数字工具可以帮助你的业务以多种方式提升，从提高生产力到提供一流的客户服务。以下是它们与众不同的地方：
- en: The Advantages of Investing in Voice Assistants
  id: totrans-830
  prefs: []
  type: TYPE_NORMAL
  zh: 投资语音助手的优势
- en: 'Maximum Productivity: With voice assistance software, doing things takes less
    time and effort, so you don’t have to take breaks while multitasking - perfect
    for busy adults who need an extra hand (or two).'
  id: totrans-831
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 最大生产力：有了语音助手软件，做事情所需的时间和精力更少，因此在多任务处理时无需休息——非常适合需要额外帮助（或两个）的忙碌成年人。
- en: 'No More Navigation Woes: If you ever find yourself on unfamiliar roads, voice
    assistants will be there to guide the way with their seamless navigation abilities.
    Plus, they make road trips even better by offering some great entertainment options
    along the way.'
  id: totrans-832
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 没有更多的导航烦恼：如果你发现自己在不熟悉的道路上，语音助手将凭借其无缝的导航能力为你指引方向。此外，它们还通过提供一些精彩的娱乐选项来使长途旅行更加愉快。
- en: 'Unparalleled Organization: Many people love utilizing their voice assistant
    when it comes time to organize their schedule, stay up-to-date with news headlines,
    check weather conditions, and even create shopping lists.'
  id: totrans-833
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 无与伦比的组织能力：许多人喜欢在安排日程、了解新闻头条、检查天气状况甚至创建购物清单时使用他们的语音助手。
- en: 'Increased Privacy Controls: With better access due to the convenience of voice
    commands compared to typing things out manually, plus advanced security features
    that allow users an extra layer of safety from unwanted intrusions into personal
    information, making sure each user’s private data stays safe and secure has never
    been simpler thanks technology giants like Amazon Alexa and Google Home respectively.'
  id: totrans-834
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 增强的隐私控制：由于语音命令的便利性优于手动输入，加之先进的安全功能，用户可以获得额外的安全层，防止个人信息受到未授权的侵犯，因此借助像亚马逊Alexa和谷歌Home这样的技术巨头，确保每个用户的私人数据安全从未如此简单。
- en: 'Seamless User Experience: Last but not least, integrating a virtual helper
    into one’s day-to-day lifestyle offers unbeatable advantages when it comes to
    providing tailor-made recommendations based upon individualized preferences, which
    truly takes a carefree living experience next level.'
  id: totrans-835
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 无缝用户体验：最后但同样重要的是，将虚拟助手融入日常生活，在根据个性化偏好提供定制化推荐方面提供了无与伦比的优势，这真正将无忧无虑的生活体验提升到了新的水平。
- en: Benefits of Chatbot Technology
  id: totrans-836
  prefs: []
  type: TYPE_NORMAL
  zh: 聊天机器人技术的优势
- en: 'Chatbots have become a major asset for businesses in today’s digital world.
    They can be used to do everything from providing information about products and
    services, helping customers shop online, setting reminders, creating polls and
    surveys - the list goes on! Here are some of the key advantages that come with
    utilizing chatbot technology:'
  id: totrans-837
  prefs: []
  type: TYPE_NORMAL
  zh: 在当今的数字世界中，聊天机器人已成为企业的重要资产。它们可以用于提供有关产品和服务的信息，帮助客户在线购物，设置提醒，创建投票和调查——列表还在继续！以下是利用聊天机器人技术带来的关键优势：
- en: Finding what you need is very quick with chatbots. They’ll help you get answers
    quickly compared to searching manually.
  id: totrans-838
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 与手动搜索相比，使用聊天机器人快速找到所需内容非常快捷。它们会帮助您快速获得答案。
- en: AI-powered bots can understand multiple languages, so no matter where your customer
    base is located, everyone will receive accurate info right away without having
    language barriers get in their way.
  id: totrans-839
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 由AI驱动的机器人能够理解多种语言，因此无论您的客户群位于何处，每个人都能立即获得准确的信息，而不会受到语言障碍的阻碍。
- en: Automating processes means more efficiency and less time spent waiting around
    – perfect for busy people who want results fast.
  id: totrans-840
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 自动化流程意味着更高的效率和更少的等待时间——非常适合那些想要快速得到结果的人。
- en: Customers won't have trouble finding solutions with omnichannel support like
    co-browsing capabilities and video chatting options available across all channels.
  id: totrans-841
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 客户不会因为拥有全渠道支持，如跨所有渠道的协同浏览功能和视频聊天选项而难以找到解决方案。
- en: '| ![image](d2d_images/chapter_title_corner_decoration_left.png) |  | ![image](d2d_images/chapter_title_corner_decoration_right.png)
    |'
  id: totrans-842
  prefs: []
  type: TYPE_TB
  zh: '| ![image](d2d_images/chapter_title_corner_decoration_left.png) |  | ![image](d2d_images/chapter_title_corner_decoration_right.png)
    |'
- en: '![image](d2d_images/chapter_title_above.png)'
  id: totrans-843
  prefs: []
  type: TYPE_IMG
  zh: '![image](d2d_images/chapter_title_above.png)'
- en: AI for Trends Prediction
  id: totrans-844
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: AI趋势预测
- en: '![image](d2d_images/chapter_title_below.png)'
  id: totrans-845
  prefs: []
  type: TYPE_IMG
  zh: '![image](d2d_images/chapter_title_below.png)'
- en: 'The age of human-machine collaboration is here, and I wanted to know what ChatGPT
    was most excited about when it comes to the 2023 AI trends. So, I posed five questions
    – each aimed at uncovering the biggest accomplishments in 2022 and any fads that
    should be put to rest the next year, all while exploring ways for leaders to leverage
    AI without too much effort or money. Keep in mind that the answers were all prefaced
    by the model stating that it only has knowledge up until September 2021\. Here’s
    what it said:'
  id: totrans-846
  prefs: []
  type: TYPE_NORMAL
  zh: 人机协作的时代已经到来，我想知道ChatGPT对2023年AI趋势最兴奋的是什么。因此，我提出了五个问题——每个问题都旨在揭示2022年的最大成就以及任何应该在下一年被摒弃的潮流，同时探索领导者如何在不费太多力气或金钱的情况下利用AI。请记住，所有的答案都是以模型声明它只拥有截至2021年9月的知识为前提的。以下是它的回答：
- en: What is the greatest advancement in Artificial Intelligence this past year?
  id: totrans-847
  prefs: []
  type: TYPE_NORMAL
  zh: 过去一年在人工智能领域最大的进步是什么？
- en: “One notable advancement in recent years has been the development and implementation
    of GPT-3, the model on which I am based. GPT-3 (Generative Pre-trained Transformer
    3) is a highly advanced language model capable of understanding and generating
    human-like text. Its ability to perform various language-related tasks, such as
    translation, summarization, question answering, and more, has shown great promise
    in the field of natural language processing.
  id: totrans-848
  prefs: []
  type: TYPE_NORMAL
  zh: “近年来一个值得注意的进步是GPT-3的开发和实施，这是我基于的模型。GPT-3（生成式预训练变换器3）是一个高度先进的语言模型，能够理解和生成类似人类的文本。它在执行各种与语言相关的任务，如翻译、摘要、问答等，方面展现出巨大的潜力，在自然语言处理领域前景广阔。
- en: Additionally, breakthroughs have been made in the application of AI to computer
    vision tasks. Convolutional Neural Networks (CNNs) have revolutionized image recognition
    and object detection, enabling AI systems to achieve remarkable accuracy in tasks
    like image classification and object recognition. Generative models such as Generative
    Adversarial Networks (GANs) have also contributed to generating realistic images
    and videos.
  id: totrans-849
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，在AI应用于计算机视觉任务方面也取得了突破。卷积神经网络（CNNs）彻底改变了图像识别和目标检测，使AI系统在图像分类和目标识别等任务上实现了显著的准确性。生成模型，如生成对抗网络（GANs），也贡献于生成逼真的图像和视频。
- en: Advancements have also been made in AI applications across various industries,
    including healthcare, finance, autonomous vehicles, and robotics. AI is being
    utilized to improve medical diagnostics, develop more efficient trading algorithms,
    enhance self-driving cars’ capabilities, and enable robots to perform complex
    tasks.”
  id: totrans-850
  prefs: []
  type: TYPE_NORMAL
  zh: “人工智能（AI）在各行各业的应用，包括医疗保健、金融、自动驾驶汽车和机器人技术，也取得了进展。AI被用于改善医疗诊断、开发更有效的交易算法、增强自动驾驶汽车的功能，以及使机器人能够执行复杂任务。”
- en: What’s one trend you can’t wait for us to experience in 2023?
  id: totrans-851
  prefs: []
  type: TYPE_NORMAL
  zh: “你迫不及待想要体验2023年的哪一种趋势？”
- en: “One trend that has been gaining momentum and is highly anticipated is the continued
    development and adoption of augmented reality (AR) and virtual reality (VR) technologies.
    AR and VR have the potential to transform various aspects of our lives, including
    entertainment, gaming, education, training, and communication.
  id: totrans-852
  prefs: []
  type: TYPE_NORMAL
  zh: “一个正在获得动力并备受期待的趋势是增强现实（AR）和虚拟现实（VR）技术的持续发展和采用。AR和VR有潜力改变我们生活的各个方面，包括娱乐、游戏、教育、培训和通信。”
- en: In 2023, we can expect to see advancements in AR and VR hardware, software,
    and content, making these technologies more immersive, realistic, and accessible.
    This may include improvements in headsets, controllers, haptic feedback systems,
    and the development of more sophisticated and interactive virtual environments.
  id: totrans-853
  prefs: []
  type: TYPE_NORMAL
  zh: “在2023年，我们可以期待在AR和VR硬件、软件和内容方面取得进步，使这些技术更加沉浸式、逼真和易于访问。这可能包括对头戴设备、控制器、触觉反馈系统的改进，以及更复杂和交互式虚拟环境的开发。”
- en: AR and VR have the potential to revolutionize entertainment and gaming by providing
    immersive and interactive experiences. They can also enhance education and training
    by creating virtual simulations and scenarios that enable hands-on learning and
    skill development. Additionally, AR and VR can enable new forms of communication
    and collaboration, allowing people to interact in virtual spaces regardless of
    their physical location.
  id: totrans-854
  prefs: []
  type: TYPE_NORMAL
  zh: “AR和VR通过提供沉浸式和交互式体验，有可能彻底改变娱乐和游戏。它们还可以通过创建虚拟模拟和场景来增强教育和培训，这些模拟和场景允许动手学习和技能发展。此外，AR和VR可以启用新的沟通和协作方式，使人们能够在虚拟空间中互动，无论他们的物理位置如何。”
- en: Overall, the trend of AR and VR development in 2023 holds the promise of expanding
    our horizons, creating new experiences, and pushing the boundaries of what is
    possible in the realm of digital technology.”
  id: totrans-855
  prefs: []
  type: TYPE_NORMAL
  zh: 总体而言，2023年AR和VR的发展趋势预示着拓展我们的视野、创造新的体验，并推动数字技术领域可能性的边界。
- en: What are some of the most overhyped techs in recent years?
  id: totrans-856
  prefs: []
  type: TYPE_NORMAL
  zh: “近年来，哪些技术被炒作得最过度？”
- en: '“While it’s subjective to some extent, there are a few technologies that have
    garnered significant attention and hype but may not have lived up to their full
    potential or practical applications. Here are a few examples:'
  id: totrans-857
  prefs: []
  type: TYPE_NORMAL
  zh: “在某种程度上，这具有主观性，但有一些技术已经获得了显著的关注和炒作，但可能还没有达到它们的全部潜力或实际应用。以下是一些例子：
- en: 'Blockchain Technology: Blockchain technology gained immense popularity with
    the rise of cryptocurrencies like Bitcoin. While blockchain technology has its
    merits in terms of decentralized and secure transactions, the hype surrounding
    it often overshadows its limitations and practicality for many use cases. It’s
    important to assess whether blockchain is truly necessary for a given application
    before implementing it.'
  id: totrans-858
  prefs: []
  type: TYPE_NORMAL
  zh: 区块链技术：随着比特币等加密货币的兴起，区块链技术获得了巨大的流行。虽然区块链技术在去中心化和安全交易方面有其优点，但围绕它的炒作往往掩盖了它的局限性和许多用例的实用性。在实施之前，评估区块链是否真正必要是很重要的。”
- en: 'Internet of Things (IoT): The Internet of Things, which refers to the interconnection
    of everyday objects with the Internet, has been hyped as a game-changer in various
    domains, including home automation, healthcare, and industrial applications. However,
    the widespread adoption and practical implementation of IoT devices have been
    slower than initially anticipated. Challenges related to security, interoperability,
    and privacy need to be addressed for IoT to reach its full potential.'
  id: totrans-859
  prefs: []
  type: TYPE_NORMAL
  zh: “物联网（IoT）是指日常物体与互联网的互联，它被炒作为一个在家庭自动化、医疗保健和工业应用等各个领域的颠覆性变革。然而，物联网设备的广泛采用和实际实施比最初预期的要慢。为了实现物联网的潜力，需要解决与安全、互操作性和隐私相关的问题。”
- en: '3D Printing: Also known as additive manufacturing, 3D printing has been hailed
    as a revolutionary technology with the potential to transform manufacturing, prototyping,
    and personalized production. While 3D printing has made significant advancements
    and found valuable applications in certain industries, its widespread adoption
    and impact on traditional manufacturing processes have been more limited than
    initially expected.'
  id: totrans-860
  prefs: []
  type: TYPE_NORMAL
  zh: 3D打印：也称为增材制造，3D打印被誉为一项具有变革潜力的技术，有可能改变制造、原型制作和个性化生产。尽管3D打印在特定行业取得了显著进步并找到了有价值的用途，但其广泛采用和对传统制造过程的影响比最初预期的要有限。
- en: It’s important to note that while these technologies may not have met all the
    initial hype, they still hold value and continue to evolve. They may find more
    practical applications or be combined with other emerging technologies to unlock
    their full potential in the future. Evaluating the practicality, scalability,
    and real-world applications of technology is crucial to avoid unwarranted hype
    and ensure meaningful progress.”
  id: totrans-861
  prefs: []
  type: TYPE_NORMAL
  zh: 重要的是要注意，尽管这些技术可能没有达到最初的炒作，但它们仍然具有价值，并且仍在不断发展。它们可能会找到更多实际的应用，或者与其他新兴技术结合，在未来解锁它们的全部潜力。评估技术的实用性、可扩展性和实际应用至关重要，以避免不必要的炒作并确保有意义的进步。”
- en: How can decision-makers get the most value out of AI with minimal resources
    and time invested?
  id: totrans-862
  prefs: []
  type: TYPE_NORMAL
  zh: 决策者如何以最少的资源和时间投资从AI中获得最大价值？
- en: '“To get value out of AI with minimal resources and time invested, decision-makers
    can consider the following strategies:'
  id: totrans-863
  prefs: []
  type: TYPE_NORMAL
  zh: “为了以最少的资源和时间投资从AI中获得价值，决策者可以考虑以下策略：
- en: 'Define Clear Objectives: Clearly define the problem or opportunity you want
    to address with AI. Focus on specific areas where AI can provide the most value
    and align with your business objectives. This clarity helps in efficient resource
    allocation and reduces unnecessary investment in unrelated AI initiatives.'
  id: totrans-864
  prefs: []
  type: TYPE_NORMAL
  zh: 明确目标：明确你希望用AI解决的问题或机会。专注于AI可以提供最大价值的特定领域，并与你的商业目标保持一致。这种清晰性有助于有效分配资源，并减少对无关AI项目的无谓投资。
- en: 'Leverage Existing Resources: Assess your existing data and technology infrastructure.
    You may already have valuable data that can be leveraged for AI applications.
    Look for opportunities to repurpose existing tools, frameworks, or platforms to
    minimize costs and implementation time.'
  id: totrans-865
  prefs: []
  type: TYPE_NORMAL
  zh: 利用现有资源：评估你现有的数据和科技基础设施。你可能已经拥有可以用于AI应用的有价值数据。寻找机会重新利用现有的工具、框架或平台，以最小化成本和实施时间。
- en: 'Start Small and Scale Gradually: Instead of attempting large-scale AI projects
    right away, start with small, manageable pilots or proof-of-concept projects.
    This approach allows you to validate the effectiveness of AI applications in your
    specific context and identify any challenges or limitations early on. Once successful,
    you can gradually scale up the AI initiatives.'
  id: totrans-866
  prefs: []
  type: TYPE_NORMAL
  zh: 从小规模开始，逐步扩大规模：不要一开始就尝试大规模的AI项目，而是从小规模、可管理的试点项目或概念验证项目开始。这种方法允许你验证AI应用在你特定环境中的有效性，并及早识别任何挑战或限制。一旦成功，你可以逐步扩大AI项目。
- en: 'Collaborate and Partner: Seek collaborations or partnerships with AI experts,
    research institutions, or technology vendors who can provide guidance, expertise,
    or pre-existing AI models and solutions. This can save time and resources by leveraging
    their knowledge and experience.'
  id: totrans-867
  prefs: []
  type: TYPE_NORMAL
  zh: 协作与伙伴关系：寻求与AI专家、研究机构或技术供应商的合作或伙伴关系，他们可以提供指导、专业知识或现有的AI模型和解决方案。通过利用他们的知识和经验，这可以节省时间和资源。
- en: 'Emphasize Data Quality and Preparation: AI models heavily rely on high-quality
    and well-prepared data. Invest time in data cleaning, preprocessing, and augmentation
    to ensure the best possible input for AI algorithms. This can lead to improved
    performance and accuracy of AI applications.'
  id: totrans-868
  prefs: []
  type: TYPE_NORMAL
  zh: 强调数据质量和准备：AI模型高度依赖于高质量和准备良好的数据。投入时间进行数据清理、预处理和增强，以确保为AI算法提供最佳可能的输入。这可以提高AI应用的性能和准确性。
- en: 'Explore Open-Source Solutions: Open-source AI frameworks and tools, such as
    TensorFlow and PyTorch, offer a cost-effective way to leverage AI capabilities.
    These resources provide pre-built models, tutorials, and a supportive community,
    making it easier to implement AI solutions with limited resources.'
  id: totrans-869
  prefs: []
  type: TYPE_NORMAL
  zh: 探索开源解决方案：如TensorFlow和PyTorch等开源AI框架和工具，为利用AI能力提供了一种经济高效的方式。这些资源提供了预构建的模型、教程和支持性社区，使得在资源有限的情况下实施AI解决方案变得更加容易。
- en: 'Consider Cloud-Based AI Services: Cloud providers offer AI services that allow
    organizations to access AI capabilities without significant upfront infrastructure
    costs. These services provide pre-trained models, APIs, and scalable computing
    resources, making AI implementation more accessible and cost-effective.'
  id: totrans-870
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑基于云的AI服务：云服务提供商提供AI服务，允许组织在不承担重大前期基础设施成本的情况下访问AI能力。这些服务提供预训练模型、API和可扩展的计算资源，使AI实施更加易于访问和成本效益。
- en: 'Invest in AI Talent: Building internal AI capabilities may require additional
    investment but can lead to long-term value. Recruit or train employees with the
    necessary AI skills to maximize the value extracted from AI initiatives. Additionally,
    leveraging AI consultants or experts for short-term engagements can provide valuable
    guidance and accelerate progress.'
  id: totrans-871
  prefs: []
  type: TYPE_NORMAL
  zh: 投资AI人才：建立内部AI能力可能需要额外的投资，但可以带来长期价值。招聘或培训具有必要AI技能的员工，以最大化从AI项目中提取的价值。此外，利用AI顾问或专家进行短期合作可以提供宝贵的指导并加速进展。
- en: By following these strategies, decision-makers can start realizing the value
    of AI with limited resources and time, allowing for gradual and efficient adoption
    of AI technologies aligned with their specific needs and constraints.”
  id: totrans-872
  prefs: []
  type: TYPE_NORMAL
  zh: 通过遵循这些策略，决策者可以在有限的资源和时间内开始实现AI的价值，从而逐步和高效地采用与其特定需求和限制相一致的AI技术。
- en: Is there something they must stop doing today if benefits are to be expected
    tomorrow?
  id: totrans-873
  prefs: []
  type: TYPE_NORMAL
  zh: 如果期望明天看到好处，他们今天必须停止做什么？
- en: '“If decision-makers want to maximize the benefits of AI in the future, there
    are a few things they should consider stopping or avoiding:'
  id: totrans-874
  prefs: []
  type: TYPE_NORMAL
  zh: “如果决策者想要最大化未来AI的好处，他们应该考虑停止或避免以下几件事情：
- en: 'Ignoring Data Quality: Decision-makers must prioritize data quality. Relying
    on poor-quality data can lead to inaccurate or biased AI models and hinder the
    effectiveness of AI applications. It is crucial to invest in data quality control,
    data governance, and data management practices to ensure the reliability and integrity
    of the data used for AI.'
  id: totrans-875
  prefs: []
  type: TYPE_NORMAL
  zh: 忽视数据质量：决策者必须优先考虑数据质量。依赖于低质量的数据可能导致不准确或偏颇的AI模型，并阻碍AI应用的有效性。投资于数据质量控制、数据治理和数据管理实践，以确保用于AI的数据的可靠性和完整性至关重要。
- en: 'Focusing Solely on Short-Term Gains: While it’s important to see tangible benefits
    from AI in the short term, decision-makers should avoid a myopic approach that
    neglects long-term strategies. AI initiatives often require iterative development,
    experimentation, and continuous learning. By prioritizing long-term goals and
    investments, decision-makers can create sustainable AI strategies that yield lasting
    benefits.'
  id: totrans-876
  prefs: []
  type: TYPE_NORMAL
  zh: 只关注短期收益：虽然看到AI在短期内带来可感知的收益很重要，但决策者应避免忽视长期战略的短视方法。AI项目通常需要迭代开发、实验和持续学习。通过优先考虑长期目标和投资，决策者可以创建可持续的AI策略，从而带来持久的好处。
- en: 'Overlooking Ethical Considerations: Ethical implications are crucial when implementing
    AI technologies. Decision-makers must actively address potential biases, privacy
    concerns, and algorithmic fairness. By integrating ethical considerations into
    the AI development process and implementing transparent and responsible AI practices,
    organizations can build trust, mitigate risks, and ensure the long-term benefits
    of AI.'
  id: totrans-877
  prefs: []
  type: TYPE_NORMAL
  zh: 忽视伦理考量：在实施AI技术时，伦理影响至关重要。决策者必须积极应对潜在的偏见、隐私问题和算法公平性。通过将伦理考量整合到AI开发过程中，并实施透明和负责任的AI实践，组织可以建立信任、降低风险并确保AI的长期好处。
- en: 'Neglecting Human Expertise and Collaboration: AI should not replace human expertise
    but complement it. Decision-makers should recognize that AI is a tool to augment
    human capabilities and enable collaboration between humans and machines. Encouraging
    interdisciplinary teams, fostering a culture of collaboration, and promoting knowledge
    sharing between domain experts and AI specialists can lead to more effective and
    valuable AI applications.'
  id: totrans-878
  prefs: []
  type: TYPE_NORMAL
  zh: 忽视人类专业知识和协作：AI不应取代人类专业知识，而应与之互补。决策者应认识到AI是增强人类能力并促进人机协作的工具。鼓励跨学科团队、培养协作文化以及促进领域专家和AI专家之间的知识共享，可以导致更有效和有价值的AI应用。
- en: 'Disregarding Continuous Learning and Adaptation: AI technologies evolve rapidly,
    and decision-makers should embrace a mindset of continuous learning and adaptation.
    Staying informed about the latest advancements, industry trends, and best practices
    in AI is crucial to make informed decisions, identifying emerging opportunities,
    and remaining competitive in an AI-driven landscape.'
  id: totrans-879
  prefs: []
  type: TYPE_NORMAL
  zh: 忽视持续学习和适应：人工智能技术发展迅速，决策者应拥抱持续学习和适应的心态。了解最新的进展、行业趋势和人工智能的最佳实践对于做出明智的决策、识别新兴机会以及在人工智能驱动的环境中保持竞争力至关重要。
- en: By stopping or avoiding these practices, decision-makers can create a foundation
    that enables the future benefits of AI. It involves nurturing a data-driven and
    ethically conscious approach, focusing on long-term strategies, fostering collaboration,
    and embracing a culture of continuous learning and adaptation.”
  id: totrans-880
  prefs: []
  type: TYPE_NORMAL
  zh: 通过停止或避免这些做法，决策者可以建立一个能够使人工智能未来受益的基础。这涉及到培养数据驱动和道德意识的方法，关注长期战略，促进合作，并拥抱持续学习和适应的文化。
- en: '| ![image](d2d_images/chapter_title_corner_decoration_left.png) |  | ![image](d2d_images/chapter_title_corner_decoration_right.png)
    |'
  id: totrans-881
  prefs: []
  type: TYPE_TB
  zh: '| ![image](d2d_images/chapter_title_corner_decoration_left.png) |  | ![image](d2d_images/chapter_title_corner_decoration_right.png)
    |'
- en: '![image](d2d_images/chapter_title_above.png)'
  id: totrans-882
  prefs: []
  type: TYPE_IMG
  zh: '![image](d2d_images/chapter_title_above.png)'
- en: AI-Driven Fraud Detection and Risk Management
  id: totrans-883
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 人工智能驱动的欺诈检测和风险管理
- en: '![image](d2d_images/chapter_title_below.png)'
  id: totrans-884
  prefs: []
  type: TYPE_IMG
  zh: '![image](d2d_images/chapter_title_below.png)'
- en: 'With machines having an easier time processing huge datasets than humans, slicing
    and dicing through information has never been simpler. Your team can now take
    advantage of these benefits:'
  id: totrans-885
  prefs: []
  type: TYPE_NORMAL
  zh: 由于机器在处理大量数据集方面比人类更容易，对信息的切割和分解从未如此简单。现在，您的团队能够利用这些好处：
- en: 'Swift Detection: When it comes to uncovering patterns or suspicious behavior,
    AI-driven systems are light-years ahead – what would have taken months for agents
    to detect is quickly identified by machine learning algorithms.'
  id: totrans-886
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 快速检测：在揭示模式或可疑行为时，人工智能驱动的系统领先于其他系统——原本需要代理数月才能检测到的，现在通过机器学习算法可以迅速识别。
- en: 'Faster Reviews: Let automation do the heavy lifting when combing through data
    points so your human team can focus on other tasks rather than spend time manually
    reviewing information themselves.'
  id: totrans-887
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 更快的审查：当自动化在筛选数据点时，让您的团队专注于其他任务，而不是花时间手动审查信息。
- en: 'Accurate Predictions at Scale: As you feed more data into ML engines, they
    become better trained and learn how to identify trends that may be too complex
    for humans alone to find in large datasets.'
  id: totrans-888
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 大规模准确预测：随着您向机器学习引擎输入更多数据，它们会变得更好训练，并学会识别人类单独在大数据集中难以发现的趋势。
- en: 'Cost-Effective Solution: No need for additional personnel if you’ve got a top-notch
    machine handling all the info. Whether there’s a lot or only little incoming activity
    throughout the year, this system will reduce risk management costs without sacrificing
    efficiency.'
  id: totrans-889
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 经济高效的解决方案：如果您有一台处理所有信息的顶级机器，就不需要额外的人员。无论全年是否有大量或仅有少量活动，该系统都会在不牺牲效率的情况下降低风险管理成本。
- en: Last but not least, algorithms don’t need to recharge. They stay on the clock
    24/7 to detect fraud. No matter how hardworking your team of fraud managers is,
    Monday mornings can still be overwhelming with the manual reviews that piled up
    over the weekend.
  id: totrans-890
  prefs: []
  type: TYPE_NORMAL
  zh: 最后但同样重要的是，算法不需要充电。它们24/7都在运行，以检测欺诈。无论您的欺诈管理团队多么努力工作，周一早上仍然可能因为周末积累的手动审查工作而感到压力重重。
- en: Luckily, machine learning algorithms can lighten the load by sifting through
    obviously fraudulent or acceptable cases — research from computer scientists at
    the University of Jakarta has proven that these AI-driven systems are as accurate
    as 96% when it comes to fighting e-commerce scams!
  id: totrans-891
  prefs: []
  type: TYPE_NORMAL
  zh: 幸运的是，机器学习算法可以通过筛选明显欺诈或不接受的情况来减轻负担——来自雅加达大学计算机科学家的研究表明，这些人工智能驱动的系统在对抗电子商务欺诈时准确率高达96%！
- en: '| ![image](d2d_images/chapter_title_corner_decoration_left.png) |  | ![image](d2d_images/chapter_title_corner_decoration_right.png)
    |'
  id: totrans-892
  prefs: []
  type: TYPE_TB
  zh: '| ![image](d2d_images/chapter_title_corner_decoration_left.png) |  | ![image](d2d_images/chapter_title_corner_decoration_right.png)
    |'
- en: '![image](d2d_images/chapter_title_above.png)'
  id: totrans-893
  prefs: []
  type: TYPE_IMG
  zh: '![image](d2d_images/chapter_title_above.png)'
- en: AI in Healthcare
  id: totrans-894
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 医疗保健中的AI
- en: '![image](d2d_images/chapter_title_below.png)'
  id: totrans-895
  prefs: []
  type: TYPE_IMG
  zh: '![image](d2d_images/chapter_title_below.png)'
- en: AI and machine learning are revolutionizing healthcare. Health organizations
    have stockpiled massive amounts of data, ranging from medical records to population
    information, claims info, and clinical trial details.
  id: totrans-896
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能和机器学习正在改变医疗保健行业。医疗保健组织积累了大量数据，从病历到人口信息、索赔信息和临床试验细节。
- en: AI-enabled technologies can go through all this data swiftly and discover patterns
    that would elude the human eye. Deep learning algorithms leverage these insights
    to help health firms make more informed business decisions as well as better patient
    care experiences.
  id: totrans-897
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能赋能的技术可以迅速处理所有这些数据，发现人类眼睛难以察觉的模式。深度学习算法利用这些洞察力，帮助医疗公司做出更明智的商业决策，以及更好的患者护理体验。
- en: Studies show that AI may even outshine humans in some key areas like disease
    diagnosis - for example, it’s already outperforming radiologists when detecting
    cancerous growths or helping scientists build cohorts for costly clinical trials
    with ease.
  id: totrans-898
  prefs: []
  type: TYPE_NORMAL
  zh: 研究表明，人工智能在某些关键领域，如疾病诊断，甚至可能超越人类——例如，在检测癌性生长或帮助科学家轻松构建昂贵临床试验的队列时，它已经超越了放射科医生。
- en: Benefits of AI in Healthcare
  id: totrans-899
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能在医疗保健中的优势
- en: Revolutionizing User Experiences
  id: totrans-900
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 革新用户体验
- en: With the help of large datasets and advanced machine learning, healthcare systems
    can output more accurate insights, leading to improved satisfaction both internally
    and externally.
  id: totrans-901
  prefs: []
  type: TYPE_NORMAL
  zh: 在大数据集和高级机器学习的帮助下，医疗保健系统可以输出更准确的见解，从而在内部和外部都提高了满意度。
- en: Optimizing Operational Efficiency
  id: totrans-902
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 优化运营效率
- en: By using AI tech to uncover data patterns, organizations are able to maximize
    their resources which leads to an increase in efficiency for clinical processes/workflows
    and financial operations.
  id: totrans-903
  prefs: []
  type: TYPE_NORMAL
  zh: 通过使用人工智能技术揭示数据模式，组织能够最大化其资源，从而提高临床流程/工作流程和财务运营的效率。
- en: Connecting Diverse Health Data
  id: totrans-904
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 连接多样化的健康数据
- en: It’s not uncommon for healthcare information to be found on different platforms
    with various formats. Thanks to Artificial Intelligence and ML techniques, companies
    can combine this scattered data into a unified view that focuses on people instead
    of numbers.
  id: totrans-905
  prefs: []
  type: TYPE_NORMAL
  zh: 医疗保健信息出现在不同平台上的各种格式并不罕见。得益于人工智能和机器学习技术，公司可以将这些分散的数据整合成一个以人为焦点而非数字的统一视图。
- en: 'AI in Healthcare Use Case: Natural Language Processing'
  id: totrans-906
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能在医疗保健中的应用案例：自然语言处理
- en: When subject matter experts collaborate with AI algorithms to detect and sort
    data patterns representing real-world language use in the healthcare sector, they
    enable natural language processing (NLP). This allows decision-makers to quickly
    access relevant information and make informed care or business decisions.
  id: totrans-907
  prefs: []
  type: TYPE_NORMAL
  zh: 当领域专家与人工智能算法合作，检测和整理代表医疗保健领域实际语言使用的模式时，他们使自然语言处理（NLP）成为可能。这使得决策者能够快速访问相关信息，并做出明智的护理或商业决策。
- en: Healthcare Payers
  id: totrans-908
  prefs: []
  type: TYPE_NORMAL
  zh: 医疗保健支付方
- en: With NLP power, health plans can deploy virtual agents using conversational
    AI to give members personalized answers on demand.
  id: totrans-909
  prefs: []
  type: TYPE_NORMAL
  zh: 借助自然语言处理（NLP）的力量，健康计划可以部署使用对话人工智能的虚拟代理，以满足成员的个性化需求。
- en: Government Health Professionals
  id: totrans-910
  prefs: []
  type: TYPE_NORMAL
  zh: 政府卫生专业人员
- en: Caseworkers can leverage AI services for rapid assessment of case notes to better
    support their clients’ needs.
  id: totrans-911
  prefs: []
  type: TYPE_NORMAL
  zh: 社会工作者可以利用人工智能服务快速评估案例记录，以更好地支持他们的客户需求。
- en: Clinical Operations and Data Managers
  id: totrans-912
  prefs: []
  type: TYPE_NORMAL
  zh: 临床运营和数据经理
- en: Clinical trial managers can accelerate searches and medical coding validation
    through Artificial Intelligence solutions - reducing the time needed for study
    initiation/amendment/management.
  id: totrans-913
  prefs: []
  type: TYPE_NORMAL
  zh: 临床试验经理可以通过人工智能解决方案加速搜索和医疗编码验证，从而减少研究启动/修订/管理所需的时间。
- en: How AI Is Transforming Healthcare and Streamlining Clinical Decisions
  id: totrans-914
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能如何改变医疗保健并简化临床决策
- en: Gone are the days of doctors spending hours looking through medical literature
    for answers. With modern machine learning tech and biomedical data, clinicians
    can quickly access information backed by experts in the field thanks to electronic
    health records.
  id: totrans-915
  prefs: []
  type: TYPE_NORMAL
  zh: 医生花费数小时查阅医学文献寻找答案的日子已经过去了。凭借现代机器学习技术和生物医学数据，临床医生可以通过电子健康记录快速访问该领域的专家支持的信息。
- en: AI-powered clinical decision support systems with natural language processing
    capabilities provide fast responses to questions posed like you would a colleague
    in everyday conversation - no more stilted technical jargon. It’s not just about
    speed either; these solutions deliver accurate information so that healthcare
    professionals have peace of mind when providing patient-centered care.
  id: totrans-916
  prefs: []
  type: TYPE_NORMAL
  zh: 拥有自然语言处理能力的AI临床决策支持系统可以快速响应类似日常对话中与同事提出的问题——不再需要刻板的术语。这不仅关乎速度；这些解决方案还提供准确的信息，以便医疗保健专业人员在进行以患者为中心的护理时能够安心。
- en: '| ![image](d2d_images/chapter_title_corner_decoration_left.png) |  | ![image](d2d_images/chapter_title_corner_decoration_right.png)
    |'
  id: totrans-917
  prefs: []
  type: TYPE_TB
  zh: '| ![image](d2d_images/chapter_title_corner_decoration_left.png) |  | ![image](d2d_images/chapter_title_corner_decoration_right.png)
    |'
- en: '![image](d2d_images/chapter_title_above.png)'
  id: totrans-918
  prefs: []
  type: TYPE_IMG
  zh: '![image](d2d_images/chapter_title_above.png)'
- en: 'Chapter 6: Balancing Progress with Humanity'
  id: totrans-919
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第6章：平衡进步与人性
- en: '![image](d2d_images/chapter_title_below.png)'
  id: totrans-920
  prefs: []
  type: TYPE_IMG
  zh: '![image](d2d_images/chapter_title_below.png)'
- en: This chapter will go into explaining the relationship between technological
    progress and preserving humanity. In this chapter, you will get a deeper understanding
    of the ethical and social dimensions of Artificial Intelligence (AI), guiding
    you in the responsible utilization of this powerful tool.
  id: totrans-921
  prefs: []
  type: TYPE_NORMAL
  zh: 本章将探讨技术进步与保护人性之间的关系。在本章中，你将更深入地了解人工智能（AI）的伦理和社会维度，指导你负责任地使用这个强大的工具。
- en: Addressing Fairness and Bias in AI Systems
  id: totrans-922
  prefs: []
  type: TYPE_NORMAL
  zh: 解决人工智能系统中的公平性和偏见问题
- en: In the age of Artificial Intelligence, ML algorithms can offer incredible insights
    - when applied with non-biased data, of course. Unfortunately, many AI models
    are prone to prejudice that is often ingrained in their training datasets due
    to social disparities.
  id: totrans-923
  prefs: []
  type: TYPE_NORMAL
  zh: 在人工智能时代，机器学习算法在应用非偏见数据时可以提供令人难以置信的见解。不幸的是，许多AI模型容易受到偏见的影响，这种偏见通常是由于社会不平等而根植于它们的训练数据集中。
- en: For instance, Amazon’s 2018 recruitment tool was found guilty of giving male
    applicants an unfair advantage over female candidates and punishing resumes including
    terms associated with femininity (such as “women’s or feminine”). Therefore, we
    must strive for fairness and challenge bias when engineering machine learning
    systems.
  id: totrans-924
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，亚马逊2018年的招聘工具被发现给予男性申请者相对于女性候选人的不公平优势，并惩罚包含与女性相关的术语（如“女性”或“女性化”）的简历。因此，我们在设计机器学习系统时必须努力追求公平性，挑战偏见。
- en: 'To tackle this challenge successfully, a range of considerations must be taken
    into account:'
  id: totrans-925
  prefs: []
  type: TYPE_NORMAL
  zh: 要成功应对这一挑战，必须考虑以下一系列因素：
- en: 'Data Bias: It’s no secret that AI models can discriminate if the training datasets
    they draw from are biased. So, it’s key for developers to make sure whatever data
    is being used accurately represents reality - free of any hidden prejudices. Otherwise,
    you might as well be setting yourself up for failure.'
  id: totrans-926
  prefs: []
  type: TYPE_NORMAL
  zh: 数据偏见：AI模型如果从有偏见的训练数据集中抽取数据，可能会产生歧视。因此，开发者确保所使用的数据准确反映现实——没有任何隐藏的偏见——是至关重要的。否则，你可能会自设失败。
- en: 'Algorithmic Transparency: Complex deep neural networks may lack transparency,
    making it difficult for engineers to identify and mitigate biases present in the
    system – underscoring a need for more explainable AI technologies that allow us
    greater insight into how decisions made by machines were arrived at.'
  id: totrans-927
  prefs: []
  type: TYPE_NORMAL
  zh: 算法透明度：复杂的深度神经网络可能缺乏透明度，这使得工程师难以识别和减轻系统中的偏见——强调了需要更多可解释的AI技术，这些技术使我们能够深入了解机器做出的决策是如何得出的。
- en: 'Fairness Definitions and Trade-Offs: Establishing what qualifies as fair behavior
    from an algorithmic perspective isn’t easy as different fairness metrics often
    conflict with each other - requiring careful consideration not just around equitable
    decision-making but also accuracy and efficiency requirements too.'
  id: totrans-928
  prefs: []
  type: TYPE_NORMAL
  zh: 公平性定义和权衡：从算法的角度确定什么算作公平行为并不容易，因为不同的公平性指标往往相互冲突——不仅需要仔细考虑公平决策，还需要考虑准确性和效率要求。
- en: 'Accountability and Responsibility: It’s important not to lose sight of who
    ultimately has responsibility for ensuring the ethical use of technology. Appropriate
    measures should be put in place to clearly define roles and responsibilities across
    all stakeholders involved, including providers, users, regulators, etc.'
  id: totrans-929
  prefs: []
  type: TYPE_NORMAL
  zh: 责任与责任：重要的是不要忽视谁最终负责确保技术的道德使用。应采取适当的措施，明确界定所有相关利益相关者的角色和责任，包括提供者、用户、监管者等。
- en: Taking these issues seriously can create responsible Artificial Intelligence
    solutions that benefit society rather than harm it.
  id: totrans-930
  prefs: []
  type: TYPE_NORMAL
  zh: 认真对待这些问题可以创造负责任的AI解决方案，而不是危害社会。
- en: 'The Road to Ethical and Inclusive AI: Taking Action'
  id: totrans-931
  prefs: []
  type: TYPE_NORMAL
  zh: 道德和包容性AI之路：采取行动
- en: 'Data Diversity and Representation: Ensuring a diverse range of data is essential
    to avoiding biased AI systems. Achieving inclusivity should be the priority when
    collecting info - plus, pre-processing needs to be done properly.'
  id: totrans-932
  prefs: []
  type: TYPE_NORMAL
  zh: 数据多样性和代表性：确保数据的多样性对于避免有偏见的AI系统至关重要。在收集信息时实现包容性应该是优先事项——此外，预处理工作必须做得恰当。
- en: 'Fairness Techniques: To prioritize fairness, researchers have come up with
    algorithms like fairness mindful learning algos, bias controlling tactics and,
    impartiality constraints while training models.'
  id: totrans-933
  prefs: []
  type: TYPE_NORMAL
  zh: 公平技术：为了优先考虑公平，研究人员提出了公平意识学习算法、偏见控制策略以及在训练模型时的无偏见约束等算法。
- en: 'Transparency and Explainability: Enhancing transparency and explainability
    makes it simpler to detect existing biases within Artificial Intelligence programs.
    Interpretable machine-learning techniques and model-agnostic explanations allow
    for better decisions made by AI.'
  id: totrans-934
  prefs: []
  type: TYPE_NORMAL
  zh: 透明度和可解释性：提高透明度和可解释性使得检测人工智能程序中现有的偏见变得更加简单。可解释的机器学习技术和模型无关的解释使得AI做出的决策更加明智。
- en: 'Collaborative Efforts and Policy Crafting: Tackling bias in AI demands collaboration
    between experts, policymakers, and advocacy groups alike - having conversations
    and creating laws that promote accountability are key here.'
  id: totrans-935
  prefs: []
  type: TYPE_NORMAL
  zh: 协作努力和政策制定：解决AI中的偏见需要专家、政策制定者和倡导团体之间的合作——进行对话和制定促进问责制的法律是关键。
- en: Ensuring Explainability and Transparency in AI Algorithms
  id: totrans-936
  prefs: []
  type: TYPE_NORMAL
  zh: 确保AI算法的可解释性和透明度
- en: As data is increasingly being shared online, safeguarding privacy is more important
    than ever. But with Artificial Intelligence becoming more sophisticated and able
    to detect subtle patterns that humans may miss, individuals are at risk of having
    their personal information used without even realizing it. This raises serious
    concerns about violations of rights and freedoms. That leads to considering both
    positive aspects of advances in AI technology as well as potential dangers like
    unauthorized access to private data a must.
  id: totrans-937
  prefs: []
  type: TYPE_NORMAL
  zh: 随着数据越来越多地在线共享，保护隐私比以往任何时候都更重要。但随着人工智能变得更加复杂，能够检测到人类可能错过的微妙模式，个人面临的风险是他们的个人信息可能被使用，甚至他们自己都没有意识到。这引发了关于权利和自由侵犯的严重担忧。这导致考虑AI技术进步的积极方面以及潜在危险，如未经授权访问私人数据，成为必须考虑的事项。
- en: '| ![image](d2d_images/chapter_title_corner_decoration_left.png) |  | ![image](d2d_images/chapter_title_corner_decoration_right.png)
    |'
  id: totrans-938
  prefs: []
  type: TYPE_TB
  zh: '| ![image](d2d_images/chapter_title_corner_decoration_left.png) |  | ![image](d2d_images/chapter_title_corner_decoration_right.png)
    |'
- en: '![image](d2d_images/chapter_title_above.png)'
  id: totrans-939
  prefs: []
  type: TYPE_IMG
  zh: '![image](d2d_images/chapter_title_above.png)'
- en: The Potential for Violation of Privacy Rights and Freedoms
  id: totrans-940
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 隐私权和自由可能受到侵犯
- en: '![image](d2d_images/chapter_title_below.png)'
  id: totrans-941
  prefs: []
  type: TYPE_IMG
  zh: '![image](d2d_images/chapter_title_below.png)'
- en: In this digital era, safeguarding privacy rights is of paramount importance,
    especially when it comes to AI-powered tech tools like ChatGPT. We need to harness
    all available resources, which range from encryption methods and biometric authentication
    to stringent regulatory policies that monitor how businesses and organizations
    handle sensitive user data. Raising awareness about responsible data management
    practices is also crucial in ensuring the security of present and future generations
    utilizing these AI-driven tools.
  id: totrans-942
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个数字时代，保护隐私权至关重要，尤其是在涉及ChatGPT等AI驱动技术工具时。我们需要利用所有可用资源，这些资源包括加密方法、生物识别认证以及严格的监管政策，以监控企业和组织如何处理敏感用户数据。提高对负责任数据管理实践的认识也是确保利用这些AI驱动工具的当前和未来一代安全的关键。
- en: ChatGPT, being a sophisticated AI language model, can potentially have access
    to a wealth of personal information. This highlights the necessity for robust
    measures to prevent any misuse of such sensitive data. If not appropriately protected,
    unscrupulous entities could exploit this information for harmful activities, including
    identity theft or cyberbullying, emphasizing the importance of rigorous safeguards
    around personal data handled by AI tools like ChatGPT.
  id: totrans-943
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT，作为一个复杂的AI语言模型，可能有权访问大量个人信息。这突显了采取强大措施防止此类敏感数据被滥用的必要性。如果不适当保护，无良实体可能会利用这些信息进行有害活动，包括身份盗窃或网络欺凌，强调在ChatGPT等AI工具处理个人数据时实施严格安全措施的重要性。
- en: The Consequences of AI Bias and Discrimination
  id: totrans-944
  prefs: []
  type: TYPE_NORMAL
  zh: AI偏见和歧视的后果
- en: AI technology has the potential to be incredibly powerful—but it also carries
    a unique risk. Our AI algorithms must be regularly monitored for bias and trained
    with diverse datasets. Any existing bias in the data used will directly affect
    outcomes, which could result in unfair decisions based on factors such as race,
    gender, or economic status. By taking these proactive steps, one can shape an
    equitable future and protect against discrimination of any kind.
  id: totrans-945
  prefs: []
  type: TYPE_NORMAL
  zh: AI技术具有极其强大的潜力——但它也携带独特的风险。我们的AI算法必须定期监控偏见，并使用多样化的数据集进行训练。数据中存在的任何现有偏见都会直接影响结果，可能导致基于种族、性别或经济状况等因素的不公平决策。通过采取这些积极主动的措施，可以塑造一个公平的未来，并防止任何形式的歧视。
- en: While privacy might not seem related at first glance, there’s actually an intimate
    connection between the two issues of bias in AI and personal information protection.
    The reason for this lies in how many current AI technologies use data collected
    from online activities, social media posts, or public records in order to make
    decisions – which often reveals elements about a person’s life like their religious
    beliefs or political views (among others).
  id: totrans-946
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然乍一看隐私似乎与这两个问题——AI中的偏见和个人信息保护——无关，但实际上它们之间有着密切的联系。原因在于许多当前的AI技术使用从在线活动、社交媒体帖子或公共记录中收集的数据来做出决策——这通常揭示了关于一个人生活的某些元素，如他们的宗教信仰或政治观点（以及其他）。
- en: When these systems contain biases against certain groups of people – whether
    conscious or unconscious – it ultimately leads to adverse outcomes that harm individuals
    directly and perpetuate systemic injustices within society.
  id: totrans-947
  prefs: []
  type: TYPE_NORMAL
  zh: 当这些系统对某些群体的人存在偏见——无论是意识到的还是无意识的——最终会导致对个人造成伤害的不利后果，并在社会中持续系统性的不公正。
- en: 'Take hiring practices as an example: if an employer uses discriminatory AIs
    during their job application process, those belonging to certain backgrounds may
    be unfairly excluded solely because of their identity rather than any real qualifications
    they possess. That would take away potential opportunities that could have otherwise
    helped them break out into new career paths - resulting in nothing short of a
    modern-day glass ceiling for some minority communities everywhere.'
  id: totrans-948
  prefs: []
  type: TYPE_NORMAL
  zh: 以招聘实践为例：如果雇主在招聘过程中使用具有歧视性的AI，属于某些背景的人可能会因为他们的身份而不是他们所拥有的任何真实资格而被不公平地排除。这会剥夺他们本可以借此突破新职业道路的潜在机会——对某些少数族裔社区来说，这无异于现代版的玻璃天花板。
- en: 'AI and Privacy: Toeing the Line of Balance'
  id: totrans-949
  prefs: []
  type: TYPE_NORMAL
  zh: AI与隐私：平衡的边缘
- en: In this digital age, Artificial Intelligence (AI) has become a game-changer
    in multiple aspects of life. From generative AI that can create any content with
    a simple prompt to smart home devices that learn your habits and preferences,
    AI's potential is remarkable. With data growing exponentially over time, though,
    questions surrounding privacy have also been on the rise. As the exploration of
    this topic continues, it’s important to consider how exactly AI affects users’
    personal information and privacy rights.
  id: totrans-950
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个数字时代，人工智能（AI）在生活的多个方面都成为了一个变革者。从只需简单提示就能创建任何内容的生成式AI到学习你的习惯和偏好的智能家居设备，AI的潜力是显著的。然而，随着时间的推移，数据呈指数级增长，围绕隐私的问题也不断上升。随着对这个主题的探索继续进行，考虑AI如何确切地影响用户的个人信息和隐私权是非常重要的。
- en: '| ![image](d2d_images/chapter_title_corner_decoration_left.png) |  | ![image](d2d_images/chapter_title_corner_decoration_right.png)
    |'
  id: totrans-951
