  zh: '**如果你**是**父母**，那么你**也**（**希望如此**）**已经**拥有了**这些**指导性**技能**，**准备好**将它们**转移到**数字世界**的**聊天机器人**中。**而且**，**如果你**给出的**唯一**指令**就是**告诉他们**从**你的**汉堡**上**取下**番茄**，**别担心**！**只需**回想起**你的**学校**日子**，**那位**在**课堂上**最能**激发**学生**潜能**的**老师**，**运用**他们的**指导**方式，**或者**向**你的**父母**学习，**看看**他们**是如何**教育**你**的**（**再次**，**希望如此**）**，**知道**左**与**右**，**对**与**错**。'
