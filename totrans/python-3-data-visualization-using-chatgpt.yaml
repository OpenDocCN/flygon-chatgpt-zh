- en: '**WHAT IS SQLITE?**'
  id: totrans-1666
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**什么是SQLite？**'
- en: 'SQLite is a light weight, portable, and open source RDBMS that is available
    on Windows, Linux, and MacOS, as well as Android and iOS. The official website
    is here:'
  id: totrans-1667
  prefs: []
  type: TYPE_NORMAL
  zh: SQLite是一个轻量级、便携式和开源的关系型数据库管理系统，可在Windows、Linux、MacOS以及Android和iOS上使用。官方网站在此：
- en: '[*https://www.sqlite.org*](https://www.sqlite.org)'
  id: totrans-1668
  prefs: []
  type: TYPE_NORMAL
  zh: '[*https://www.sqlite.org*](https://www.sqlite.org)'
- en: 'Here is where you can find a tutorial for some of the most commonly used SQLite
    commands:'
  id: totrans-1669
  prefs: []
  type: TYPE_NORMAL
  zh: 这里你可以找到一些最常用SQLite命令的教程：
- en: '*[https://www.sqlitetutorial.net/sqlite-commands/](https://www.sqlitetutorial.net/sqlite-commands/)*'
  id: totrans-1670
  prefs: []
  type: TYPE_NORMAL
  zh: '*[https://www.sqlitetutorial.net/sqlite-commands/](https://www.sqlitetutorial.net/sqlite-commands/)*'
- en: In addition, SQLite is ACID-compliant and also implements most SQL standards.
    Let’s look at some features of SQLite and the installation process, both of which
    are discussed in two subsections.
  id: totrans-1671
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，SQLite符合ACID规范，并实现了大多数SQL标准。让我们看看SQLite的一些功能和安装过程，这两者都在两个小节中进行了讨论。
- en: '**SQLite Features**'
  id: totrans-1672
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '**SQLite功能**'
- en: 'SQLite provides several useful features, some of which are listed below:'
  id: totrans-1673
  prefs: []
  type: TYPE_NORMAL
  zh: SQLite提供了一些有用的功能，其中一些如下所示：
- en: doesn’t require a separate server process or system to operate
  id: totrans-1674
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 不需要单独的服务器进程或系统来运行
- en: no system administration
  id: totrans-1675
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 无需系统管理
- en: no external dependencies
  id: totrans-1676
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 无外部依赖
- en: can operate in a serverless environment.
  id: totrans-1677
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 可以在无服务器环境中运行。
- en: available in multiple platforms (Unix, Linux, Mac, Windows)
  id: totrans-1678
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 可在多个平台（Unix、Linux、Mac、Windows）上使用
- en: ACID transactions
  id: totrans-1679
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: ACID事务
- en: full support for all features in SQL92
  id: totrans-1680
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 完全支持SQL92的所有功能
- en: '**SQLite Installation**'
  id: totrans-1681
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '**SQLite安装**'
- en: 'Navigate to the following Web site and download the distribution for your operating
    system:'
  id: totrans-1682
  prefs: []
  type: TYPE_NORMAL
  zh: 导航到以下网站并下载适用于您操作系统的发行版：
- en: '*[https://www.sqlite.org/download.html](https://www.sqlite.org/download.html)*'
  id: totrans-1683
  prefs: []
  type: TYPE_NORMAL
  zh: '*[https://www.sqlite.org/download.html](https://www.sqlite.org/download.html)*'
- en: The second step is to unzip the downloaded file in a convenient location, which
    we’ll assume is the directory $HOME/sqlite3_home.
  id: totrans-1684
  prefs: []
  type: TYPE_NORMAL
  zh: 第二步是将下载的文件解压到方便的位置，我们假设这个位置是$HOME/sqlite3_home目录。
- en: 'Note that if you have a MacBook then the directory that contains the sqlite3
    executable is automatically in the PATH variable. Just to be sure, type the following
    command to see if the sqlite3 is accessible:'
  id: totrans-1685
  prefs: []
