  id: totrans-1268
  prefs: []
  type: TYPE_NORMAL
  zh: 打开VS Code，转到视图 > 命令面板（或按Ctrl+Shift+P）。
- en: 'Type "Python: Select Interpreter" and select the installed version of Python.'
  id: totrans-1269
  prefs: []
  type: TYPE_NORMAL
  zh: '输入“Python: 选择解释器”并选择已安装的Python版本。'
- en: '4\. Backup and security :'
  id: totrans-1270
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 备份和安全：
- en: 'Data backup :'
  id: totrans-1271
  prefs: []
  type: TYPE_NORMAL
  zh: 数据备份：
- en: Use automatic backup solutions like Déjà Dup (included in Ubuntu) or online
    storage services like Google Drive or Dropbox to ensure that your data and trading
    scripts are backed up regularly.
  id: totrans-1272
  prefs: []
  type: TYPE_NORMAL
  zh: 使用自动备份解决方案，如Déjà Dup（包含在Ubuntu中）或在线存储服务，如Google Drive或Dropbox，以确保您的数据和交易脚本定期备份。
- en: 'Security and Antivirus :'
  id: totrans-1273
  prefs: []
  type: TYPE_NORMAL
  zh: 安全和防病毒：
- en: Although Linux is generally more secure than other operating systems, it is
    always advisable to keep the operating system up to date and use security tools
    such as UFW (Uncomplicated Firewall) to reinforce protection.
  id: totrans-1274
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然Linux通常比其他操作系统更安全，但始终建议保持操作系统更新，并使用安全工具如UFW（简单防火墙）来加强保护。
- en: 'Install UFW and activate the firewall :'
  id: totrans-1275
  prefs: []
  type: TYPE_NORMAL
  zh: 安装UFW并激活防火墙：
- en: sudo apt install ufw
  id: totrans-1276
  prefs: []
  type: TYPE_NORMAL
  zh: sudo apt install ufw
- en: sudo ufw enable
  id: totrans-1277
  prefs: []
  type: TYPE_NORMAL
  zh: sudo ufw enable
- en: By following these recommendations, you can set up a stable, high-performance
    Ubuntu environment for algorithmic trading, capable of streaming data and executing
    orders without interruption. In the following sections, we'll explore configurations
    for datacenter virtual servers and other technical aspects essential to algorithmic
    trading.
  id: totrans-1278
  prefs: []
  type: TYPE_NORMAL
  zh: 通过遵循这些建议，您可以设置一个稳定、高性能的Ubuntu环境，用于算法交易，能够不间断地流式传输数据和执行订单。在以下章节中，我们将探讨数据中心虚拟服务器的配置和其他对算法交易至关重要的技术方面。
- en: 'Part 4: Hosting in a Datacenter (Physical or Virtual Server)'
  id: totrans-1279
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 第四部分：数据中心托管（物理或虚拟服务器）
- en: For traders requiring continuous availability and optimum performance, using
    a server hosted in a datacenter can be an excellent option. This configuration
    consists of moving the server to a datacenter in the form of a physical rack server
    or a virtual server leased from an operator such as OVH or DigitalOcean.
  id: totrans-1280
  prefs: []
  type: TYPE_NORMAL
  zh: 对于需要持续可用性和最佳性能的交易员来说，使用数据中心托管的服务器可以是一个绝佳的选择。这种配置包括将服务器以物理机架服务器或从运营商如OVH或DigitalOcean租赁的虚拟服务器的形式移至数据中心。
- en: '1\. Advantages and disadvantages :'
  id: totrans-1281
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 优点和缺点：
- en: 'Advantages :'
  id: totrans-1282
  prefs: []
  type: TYPE_NORMAL
  zh: 优点：
- en: 'Stability in Availability: The data centers offer a robust infrastructure with
    redundancy systems to ensure almost constant availability, minimizing service
    interruptions.'
  id: totrans-1283
  prefs: []
  type: TYPE_NORMAL
  zh: 可用性稳定性：数据中心提供具有冗余系统的强大基础设施，以确保几乎持续可用，最小化服务中断。
- en: 'Fast connectivity: Servers in datacenters benefit from ultra-fast and reliable
    Internet connections, which is crucial for running real-time trading algorithms.'
  id: totrans-1284
  prefs: []
  type: TYPE_NORMAL
  zh: 快速连接：数据中心的服务器受益于超快且可靠的互联网连接，这对于运行实时交易算法至关重要。
- en: 'Disadvantages :'
  id: totrans-1285
  prefs: []
  type: TYPE_NORMAL
  zh: 缺点：
- en: 'Cybersecurity risk: Relocating your server potentially exposes you to increased
    cybersecurity risks. It is therefore essential to implement strict security measures
    to protect access and data.'
  id: totrans-1286
  prefs: []
  type: TYPE_NORMAL
  zh: 网络安全风险：迁移您的服务器可能会使您面临增加的网络安全风险。因此，实施严格的安全措施以保护访问和数据至关重要。
- en: 'Cost: Renting a server in a datacenter can be more expensive than using a personal
    computer. However, the advantages in terms of performance and availability may
    justify the investment.'
  id: totrans-1287
  prefs: []
  type: TYPE_NORMAL
  zh: 成本：在数据中心租赁服务器可能比使用个人电脑更昂贵。然而，在性能和可用性方面的优势可能足以证明投资是合理的。
- en: '2\. Server configuration in a datacenter :'
  id: totrans-1288
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 数据中心中的服务器配置：
- en: 'Choice of Operator :'
  id: totrans-1289
  prefs: []
  type: TYPE_NORMAL
  zh: 运营商选择：
- en: OVH, DigitalOcean, AWS, etc. These providers offer dedicated server or virtual
    server services (VPS) with different configurations to meet user needs.
  id: totrans-1290
  prefs: []
  type: TYPE_NORMAL
  zh: OVH、DigitalOcean、AWS等。这些提供商提供不同配置的专用服务器或虚拟服务器（VPS）服务，以满足用户需求。
- en: 'Server creation and configuration :'
  id: totrans-1291
  prefs: []
  type: TYPE_NORMAL
  zh: 服务器创建和配置：
- en: 'Physical server: Renting a physical rack server can offer maximum performance
    with dedicated resources. Ideal for large trading infrastructures.'
  id: totrans-1292
  prefs: []
  type: TYPE_NORMAL
  zh: 物理服务器：租赁物理机架服务器可以提供最大性能和专用资源。非常适合大型交易基础设施。
- en: 'Virtual Server (VPS): VPSs are more flexible and less expensive than physical
    servers. They offer sufficient power for most algorithmic trading applications.'
  id: totrans-1293
  prefs: []
  type: TYPE_NORMAL
  zh: 虚拟服务器（VPS）：VPS比物理服务器更灵活且成本更低。它们为大多数算法交易应用提供足够的动力。
- en: 'Installing the Development Environment :'
  id: totrans-1294
  prefs: []
  type: TYPE_NORMAL
  zh: 安装开发环境：
- en: 'Connecting to the server: Use SSH to connect to the server:'
  id: totrans-1295
  prefs: []
  type: TYPE_NORMAL
  zh: 连接到服务器：使用 SSH 连接到服务器：
- en: ssh root@your_vps_ip
  id: totrans-1296
  prefs: []
  type: TYPE_NORMAL
  zh: ssh root@your_vps_ip
- en: 'Initial Updates :'
  id: totrans-1297
  prefs: []
  type: TYPE_NORMAL
  zh: 初始更新：
- en: sudo apt update
  id: totrans-1298
  prefs: []
  type: TYPE_NORMAL
  zh: sudo apt update
- en: sudo apt upgrade
  id: totrans-1299
  prefs: []
  type: TYPE_NORMAL
  zh: sudo apt upgrade
