  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: • 拟定符合加州规定的独立承包商协议。
- en: • Create a non-disclosure agreement (NDA) between two U.S.-based software startups.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: • 创建两个美国软件初创公司之间的保密协议（NDA）。
- en: • Write a non-compete clause that meets Texas state law standards.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: • 写一份符合德克萨斯州州法律标准的非竞争条款。
- en: • Generate a freelance service agreement for a social media consultant.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: • 为社交媒体顾问生成一份自由职业服务协议。
- en: • Draft a termination clause respecting at-will employment doctrine.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: • 拟定一份尊重任意雇佣原则的终止条款。
- en: • Write a HIPAA-compliant confidentiality clause.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: • 写一份符合HIPAA标准的保密条款。
- en: • Create a basic cease and desist letter for copyright infringement.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: • 创建一份基本的版权侵权停止和禁止信。
- en: • Generate a referral fee agreement between two attorneys.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: • 生成两位律师之间的推荐费协议。
- en: • Draft a lease agreement for residential property in Florida.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: • 拟定一份佛罗里达州住宅物业的租赁协议。
- en: • Create an indemnity clause for commercial property disputes.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: • 为商业地产纠纷创建一项赔偿条款。
- en: • Write a force majeure clause that includes pandemic-related delays.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: • 写一份包含疫情相关延误的不可抗力条款。
- en: • Draft a software license agreement for a SaaS platform.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: • 拟定一份SaaS平台的软件许可协议。
- en: • Generate a standard indemnification clause for a B2B service contract.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: • 生成一份B2B服务合同的标准化赔偿条款。
