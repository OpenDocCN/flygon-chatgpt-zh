  zh: '**关于作者**'
- en: Susan Jagannath successfully combined a passion for reading, a love of writing
    and a fascination for technology, to create a career in technical writing before
    her decision to switch to writing the books she wanted to write. With over 50
    technical manuals (not) to her name, it was time to do something different, set
    off on adventures, help others to have adventures, and write books under her own
    name.
  id: totrans-429
  prefs: []
  type: TYPE_NORMAL
  zh: 苏珊·贾甘纳斯成功地将阅读的热情、写作的热爱和对技术的着迷结合起来，在决定转而写她想要写的书之前，她已经在技术写作领域建立了职业生涯。拥有超过50本技术手册（不是），是时候做一些不同的事情了，去冒险，帮助他人去冒险，并以自己的名字写书。
- en: As an army brat, her childhood included seven different schools, three universities
    and a couple of emergency evacuations from conflict zones. Travel and adventure
    were normal. She believes in seizing every opportunity to have a new adventure.
    Whether it’s camping on the beach in Australia, trekking in the Himalayas, kayaking
    in Queensland, white-water rafting down the Ganges, or walking the Camino in Spain,
    her philosophy is to pack it into one or two weeks to create memories for a lifetime,
    preferable with family and friends.
  id: totrans-430
  prefs: []
  type: TYPE_NORMAL
  zh: 作为一名军二代，她的童年包括了七所不同的学校、三所大学，以及从冲突区域进行的几次紧急疏散。旅行和冒险是常态。她相信抓住每一个机会去体验新的冒险。无论是澳大利亚海滩上的露营、喜马拉雅山脉的徒步、昆士兰州的皮划艇、恒河的激流皮划艇，还是西班牙的圣地亚哥之路，她的哲学是将这些经历压缩在一两周内，为一生创造记忆，最好是和家人朋友一起。
- en: Susan is now on her next adventure; writing books that are not technical manuals,
    helping others write and publish, and planning her next adventure, always.
  id: totrans-431
  prefs: []
  type: TYPE_NORMAL
  zh: 苏珊现在正在进行她的下一次冒险；写不像是技术手册的书，帮助他人写作和出版，并计划她的下一次冒险，永远如此。
- en: If you are interested in finding out more about Susan Jagannath’s books, email
    her at [susan@<wbr> xpresswords.com](mailto:susan@xpresswords.com)
  id: totrans-432
