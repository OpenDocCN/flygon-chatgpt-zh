- en: Tabulate the number of frequent flyer passengers who use the airport on average
    ([Figure 5.27](#fig5-27)).
  id: totrans-789
  prefs: []
  type: TYPE_NORMAL
  zh: 统计平均使用机场的常旅客乘客数量（[图 5.27](#fig5-27)）。
