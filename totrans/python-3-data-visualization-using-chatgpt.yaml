  zh: 每次调用 reshape() 方法后都跟着一个 print() 语句，以便您可以看到调用的影响。启动 [列表 2.17](#list2-17) 的输出如下：
- en: '[PRE145]'
  id: totrans-909
  prefs: []
  type: TYPE_PRE
  zh: '[PRE145]'
- en: '**CALCULATING THE MEAN AND STANDARD DEVIATION**'
  id: totrans-910
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**计算均值和标准差**'
- en: If you need to review these concepts from statistics (and perhaps also the mean,
    median, and mode as well), please read the appropriate online tutorials.
  id: totrans-911
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您需要回顾这些来自统计学（也许还包括均值、中位数和众数）的概念，请阅读相应的在线教程。
- en: 'NumPy provides various built-in functions that perform statistical calculations,
    such as the following list of methods:'
  id: totrans-912
  prefs: []
  type: TYPE_NORMAL
  zh: NumPy 提供了各种内置函数，用于执行统计计算，如下列方法列表所示：
- en: '[PRE146]'
  id: totrans-913
  prefs: []
  type: TYPE_PRE
  zh: '[PRE146]'
- en: The np.linspace() method generates a set of equally-spaced numbers between a
    lower bound and an upper bound. The np.mean() and np.std() methods calculate the
    mean and standard deviation, respectively, of a set of numbers. [Listing 2.18](#list2-18)
    displays the content of sample_mean_std.py that illustrates how to calculate statistical
    values from a NumPy array.
  id: totrans-914
  prefs: []
  type: TYPE_NORMAL
  zh: np.linspace() 方法生成一个介于下限和上限之间的等间距数字集合。np.mean() 和 np.std() 方法分别计算一组数字的均值和标准差。[列表
    2.18](#list2-18) 展示了 sample_mean_std.py 的内容，该内容说明了如何从 NumPy 数组中计算统计值。
- en: '***LISTING 2.18: sample_mean_std.py***'
  id: totrans-915
  prefs: []
  type: TYPE_NORMAL
  zh: '***列表 2.18: sample_mean_std.py***'
- en: '[PRE147]'
  id: totrans-916
  prefs: []
  type: TYPE_PRE
  zh: '[PRE147]'
- en: '[Listing 2.18](#list2-18) contains a NumPy array x2 that consists of the first
    eight integers. Next, the mean() and std() “associated” with x2 are invoked to
