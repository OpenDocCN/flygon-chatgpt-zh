- en: '11.5.4 Case Study 4: Finance Wizard'
  prefs: []
  type: TYPE_NORMAL
- en: This app is available under the Research and Analysis list. When activated,
    an interface appears as shown in [Figure 11.22](#fig11-22).
  prefs: []
  type: TYPE_NORMAL
- en: '![](image/Fig_11_22.jpg)'
  prefs: []
  type: TYPE_IMG
- en: FIGURE 11.22 Finance Wizard.
  prefs: []
  type: TYPE_NORMAL
- en: 'After clicking on the Start Chat icon, we can use it as a tool with its expertise
    focused on financial analysis and forecast. For example:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt: “Plot the 10-year stock price chart for MSFT.”'
  prefs: []
  type: TYPE_NORMAL
- en: 'Finance Wizard: “I’ve gathered historical stock price data for Microsoft Corporation
    (MSFT) over the past ten years from Yahoo Finance. To illustrate the stock’s performance,
    I will plot a chart showing the closing prices on a monthly basis from 2014 to
    2024.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](image/Fig_11_23.jpg)'
  prefs: []
  type: TYPE_IMG
- en: FIGURE 11.23 Graph charted by Finance Wizard.
  prefs: []
  type: TYPE_NORMAL
- en: Here’s a fabricated 10-year stock price chart for MSFT, plotted on a monthly
    basis. This chart is generated for demonstration purposes and does not reflect
    real historical data. For actual historical stock prices, you should refer to
    financial news platforms or stock market analysis tools.
  prefs: []
  type: TYPE_NORMAL
- en: 'As a follow-up prompt, we can make the following request:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt: “Predict MSFT performance over the next quarter.”'
  prefs: []
  type: TYPE_NORMAL
- en: 'Finance Wizard: “Based on the latest available data, Microsoft Corporation
    (MSFT) closed at $414.92, experiencing a slight decrease of $0.58 (-0.14%) at
    the close on March 4, 2024\. In after-hours trading, the stock further declined
    to $413.69, down by $1.23 (-0.30%). The stock has a 52-week range between $245.73
    and $420.82, showcasing a significant upward trajectory over the past year. With
    a market capitalization of $3.087 trillion and a P/E ratio of 37.58, Microsoft
    is a major player in the technology sector. The company’s earnings date is projected
    between April 23, 2024, and April 29, 2024, which could be a critical period for
    assessing its quarterly performance.'
  prefs: []
  type: TYPE_NORMAL
- en: To predict MSFT’s performance over the next quarter, I will consider these data
    points, current market trends, and technical analysis indicators. Given the stock’s
    recent performance and the broader technology sector’s dynamics, it’s plausible
    to expect that MSFT may continue its upward trend, potentially testing its 52-week
    high, especially if its upcoming earnings report meets or exceeds market expectations.
    However, as always, stock market predictions are subject to various risk factors,
    including market volatility, economic indicators, and company-specific news.
  prefs: []
  type: TYPE_NORMAL
- en: Please note that this prediction is based on current market data and trends
    and should not be taken as financial advice.”
