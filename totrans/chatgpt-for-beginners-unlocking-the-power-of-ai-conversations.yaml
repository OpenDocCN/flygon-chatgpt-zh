  prefs: []
  type: TYPE_NORMAL
  zh: '**ChatGPT是一个变革性的工具**，但权力越大，责任越大。道德使用确保AI作为促进善的力量，最小化风险并最大化利益。无论是验证信息、保护隐私、避免伤害还是促进自动化中的公平性，遵循这些原则有助于在AI技术中保持信任和诚信。'
