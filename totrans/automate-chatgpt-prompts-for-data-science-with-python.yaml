- en: Alright, here’s a controversial one. ChatGPT is not able to properly write code
    for time series validation.
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
- en: 'Here’s why: Without the prompt “please use data from A to B as training. Please
    use data from Y to Z as validation”, ChatGPT uses sklearn’s train_test_split to
    randomly splits the data points into train and validation. This is a huge no-no
    because the train_test_split function randomly splits the data with no regard
    for the temporal relationship between the datasets. Instead, it should have used
    all data points from an earlier timeframe as train and later timeframe as test.'
  id: totrans-227
  prefs: []
  type: TYPE_NORMAL
- en: 8\. Address Imbalance Data
  id: totrans-228
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt: I want you to act as a coder. I have trained a machine learning model
    on an imbalanced dataset. The predictor variable is the column [Insert column
    name]. In python, how do I oversample and/or undersample my data?'
  id: totrans-229
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc10F.jpg)![](image_rsrc10G.jpg)'
  id: totrans-230
  prefs: []
  type: TYPE_IMG
- en: ChatGPT used the imblearn library to write boilerplate code that randomly under
    and oversamples the dataset.
  id: totrans-231
  prefs: []
  type: TYPE_NORMAL
- en: The code is sound, but I would nitpick on its understanding of over and undersampling.
  id: totrans-232
  prefs: []
  type: TYPE_NORMAL
- en: Undersampling and oversampling should only be done on the train dataset. It
    should not be done on the entire dataset, which includes the test dataset. Otherwise,
    the evaluation will be done on a resampled test set that no longer reflects the
    actual distribution of the real dataset.
  id: totrans-233
  prefs: []
  type: TYPE_NORMAL
- en: Thus, it should have attempted to split the dataset into train and test sets
    first, before performing the under and oversampling.
  id: totrans-234
  prefs: []
  type: TYPE_NORMAL
