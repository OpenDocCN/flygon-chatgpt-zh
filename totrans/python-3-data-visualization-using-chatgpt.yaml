- en: '**OTHER USEFUL NUMPY METHODS**'
  id: totrans-854
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**其他有用的 NumPy 方法**'
- en: In addition to the NumPy methods that you saw in the code samples prior to this
    section, the following NumPy methods are also useful.
  id: totrans-855
  prefs: []
  type: TYPE_NORMAL
  zh: 除了本节之前代码示例中看到的 NumPy 方法之外，以下 NumPy 方法也非常有用。
- en: The method np.zeros() initializes an array with 0 values.
  id: totrans-856
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: np.zeros() 方法使用 0 值初始化一个数组。
- en: The method np.ones() initializes an array with 1 value.
  id: totrans-857
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: np.ones() 方法使用 1 值初始化一个数组。
- en: The method np.empty() initializes an array with 0 values.
  id: totrans-858
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: np.empty() 方法使用 0 值初始化一个数组。
- en: The method np.arange() provides a range of numbers.
  id: totrans-859
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: np.arange() 方法提供了一系列数字。
- en: The method np.shape() displays the shape of an object.
  id: totrans-860
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: np.shape() 方法显示了一个对象的大小。
- en: The method np.reshape() <= *very useful!*
  id: totrans-861
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: np.reshape() 方法 <= *非常有用！*
- en: The method np.linspace() <= *useful in regression*
  id: totrans-862
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: np.linspace() 方法 <= *非常有用，用于回归*
- en: The method np.mean() computes the mean of a set of numbers.
  id: totrans-863
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: np.mean() 方法计算一组数字的平均值。
- en: The method np.std() computes the standard deviation of a set of numbers.
  id: totrans-864
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: np.std() 方法计算一组数字的标准差。
- en: Although the np.zeros() and np.empty() both initialize a 2D array with 0, np.zeros()
    requires less execution time. You could also use np.full(size, 0), but this method
    is the slowest of all three methods.
  id: totrans-865
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然 np.zeros() 和 np.empty() 都使用 0 初始化一个二维数组，但 np.zeros() 需要更少的执行时间。您还可以使用 np.full(size,
    0)，但这是三种方法中最慢的一种。
- en: The reshape() method and the linspace() method are very useful for changing
    the dimensions of an array and generating a list of numeric values, respectively.
    The reshape() method often appears in TensorFlow code, and the linspace() method
    is useful for generating a set of numbers in linear regression. More details about
    the methods np.reshape() and np.linspace() are provided later in this chapter.
  id: totrans-866
  prefs: []
  type: TYPE_NORMAL
  zh: reshape() 方法以及 linspace() 方法非常有用，分别用于改变数组的维度和生成一系列数值。reshape() 方法常出现在 TensorFlow
    代码中，而 linspace() 方法对于生成线性回归中的一组数字非常有用。关于 np.reshape() 和 np.linspace() 方法的更多细节将在本章后面提供。
- en: The mean() and std() methods are useful for calculating the mean and the standard
    deviation of a set of numbers, respectively. For example, you can use these two
    methods to resize the values in a Gaussian distribution so that their mean is
    0 and the standard deviation is 1\. This process is called *standardizing* a Gaussian
    distribution.
  id: totrans-867
  prefs: []
  type: TYPE_NORMAL
  zh: mean() 和 std() 方法对于计算一组数字的均值和标准差非常有用。例如，您可以使用这两个方法来调整高斯分布中的值，使它们的均值变为 0，标准差变为
    1。这个过程被称为 *标准化* 高斯分布。
