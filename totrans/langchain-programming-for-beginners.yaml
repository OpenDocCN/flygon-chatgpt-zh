- en: from langchain_community.chat_models import ChatOllama
  prefs: []
  type: TYPE_NORMAL
- en: from langchain_community.embeddings import OllamaEmbeddings
  prefs: []
  type: TYPE_NORMAL
- en: llm
  prefs:
  - PREF_H1
