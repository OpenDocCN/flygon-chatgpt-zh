  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A higher value indicates better clustering.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Disadvantages
  prefs: []
  type: TYPE_NORMAL
- en: It assumes that clusters are convex and isotropic.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Dunn Index
  prefs: []
  type: TYPE_NORMAL
- en: Advantages
