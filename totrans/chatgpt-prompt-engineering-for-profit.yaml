- en: '****W**e** ****li**ve** ****i**n** ****a**n** ****e**ra** ****wh**ere** ****arti**ficia**l
    ****inte**lligen**ce ****i**s** ****adva**ncin**g ****rap**idl**y, ****tran**sformi**ng
    ****t**he** ****wo**rld** ****a**nd** ****o**ur** ****da**ily** ****li**ves**.
    ****How**eve**r, ****ev**en** ****wi**th** ****a**ll** ****th**ese** ****techn**ologic**al
    ****adv**ance**s, ****o**ne** ****esse**ntia**l ****sk**ill** ****st**ill** ****rem**ain**s
    ****i**n** ****hu**man** ****ha**nds**: ****t**he** ****abi**lit**y ****t**o**
    ****a**sk** ****t**he** ****ri**ght** ****ques**tion**s. ****Be**ing** ****a****
    " ****Pr**omp**t " ****Ma**ker** ****i**s** ****mo**re** ****th**an** ****ju**st**
    ****inte**ractin**g ****wi**th** ****A**I** ****mo**del**s; ****i**t** ****i**s**
    ****kno**win**g ****h**ow** ****t**o** ****gu**ide** ****th**ese** ****mac**hine**s
    ****i**n** ****or**der** ****t**o** ****ext**rac**t ****th**eir** ****fu**ll**
    ****pote**ntia**l. ****Thr**oug**h ****th**is** ****eb**ook** , ****I**** ****wa**nt**
    ****t**o** ****sh**ow** ****t**he** ****impo**rtanc**e ****o**f** ****Pr**omp**t
    ****Engi**neerin**g , ****a**** ****fund**amenta**l ****sk**ill**, ****ev**en**
    ****i**n** ****ti**mes** ****o**f** ****adv**ance**d ****A**I**. ****T**he** ****abi**lit**y
    ****t**o** ****stru**ctur**e ****ques**tion**s ****i**n** ****a**n** ****orga**nize**d
    ****a**nd** ****cre**ativ**e ****w**ay** ****al**low**s ****u**s** ****t**o**
    ****com**man**d ****arti**ficia**l ****inte**lligen**ce ****tow**ard**s ****t**he**
    ****des**ire**d ****res**ult**s, ****maxi**mizin**g ****t**he** ****va**lue**
    ****o**f** ****t**he** ****ans**wer**s ****obt**aine**d.'
  id: totrans-4
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 我们生活在一个人工智能快速发展的时代，它正在改变世界和我们的日常生活。然而，即使拥有所有这些技术进步，人类手中仍然保留着一种基本技能：提出正确问题的能力。成为一名“提示”制作人不仅仅是与AI模型互动；它知道如何引导这些机器以发挥其全部潜力。通过这本书，我想要展示提示工程的重要性，这是一种即使在先进AI时代也是基本技能。能够以有组织且富有创意的方式构建问题，使我们能够指挥人工智能朝着期望的结果前进，最大化获取答案的价值。
