    ****se**r**v**e** ****a****s**** ****gu**i**d**es** ****f****o**r** ****mod**e**li**ng**
    ****t****h**e** ****des**i**r**ed** ****res**p**on**se**.'
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 在提示中包含示例可以特别有用，尤其是在处理更复杂或更具创造性的任务时。例如，当需要为广告提出想法时，一个有效的提示可能如下：“为可持续咖啡品牌提出三个标语。例如：‘一次选择，一个更美好的世界。’使用友好和激励性的语气。”这些示例作为建模期望响应的指南。
