- en: 34\. The Ethics of AI Regulation & Governance 34.1 Why AI Ethics Matter
  id: totrans-498
  prefs: []
  type: TYPE_NORMAL
  zh: 34. AI监管与治理的伦理 34.1 为什么AI伦理很重要
- en: As AI becomes more embedded in daily life, ethical considerations surrounding
    fairness, bias, and accountability must be addressed.
