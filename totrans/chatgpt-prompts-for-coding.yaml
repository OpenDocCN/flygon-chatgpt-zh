  prefs: []
  type: TYPE_NORMAL
  zh: '9: 构建单页应用程序（SPA）'
- en: 'Prompt:'
  id: totrans-575
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Write code to create a simple Single Page Application (SPA) using vanilla
    JavaScript. Include navigation between multiple sections without reloading the
    page. Discuss the advantages and challenges of SPAs compared to traditional multi-page
    applications."'
  id: totrans-576
  prefs: []
  type: TYPE_NORMAL
  zh: '"编写代码使用纯JavaScript创建一个简单的单页应用程序（SPA）。包括在多个部分之间导航而不重新加载页面。讨论与传统的多页应用程序相比，SPA的优势和挑战。"'
- en: '10: Handling Events in JavaScript'
  id: totrans-577
  prefs: []
  type: TYPE_NORMAL
  zh: '10: 在JavaScript中处理事件'
- en: 'Prompt:'
  id: totrans-578
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Write a JavaScript program to handle button click events on a webpage. Include
    functionality to dynamically change the text of an element and toggle visibility.
    Discuss the importance of event handling in creating interactive web pages."'
  id: totrans-579
  prefs: []
  type: TYPE_NORMAL
  zh: '"编写一个JavaScript程序来处理网页上的按钮点击事件。包括动态更改元素文本和切换可见性的功能。讨论事件处理在创建交互式网页中的重要性。"'
- en: '11: Creating an Accessible Web Form'
  id: totrans-580
  prefs: []
  type: TYPE_NORMAL
  zh: '11: 创建可访问的Web表单'
- en: 'Prompt:'
  id: totrans-581
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Write HTML code to create a web form that is accessible to users with disabilities.
    Include labels, ARIA roles, and keyboard navigation support. Discuss the importance
    of accessibility in web development and the WCAG guidelines."'
  id: totrans-582
  prefs: []
  type: TYPE_NORMAL
  zh: '"编写HTML代码创建一个对残障用户可访问的Web表单。包括标签、ARIA角色和键盘导航支持。讨论在Web开发中可访问性的重要性以及WCAG指南。"'
- en: '12: Styling with SASS'
  id: totrans-583
  prefs: []
  type: TYPE_NORMAL
  zh: '12: 使用SASS进行样式化'
- en: 'Prompt:'
  id: totrans-584
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Write SCSS code to style a responsive card component with nested elements.
    Include variables, mixins, and nesting to demonstrate SASS features. Discuss how
    SASS enhances CSS maintainability and reusability."'
  id: totrans-585
  prefs: []
  type: TYPE_NORMAL
  zh: '"编写SCSS代码以样式化具有嵌套元素的响应式卡片组件。包括变量、混合和嵌套来展示SASS特性。讨论SASS如何增强CSS的可维护性和可重用性。"'
- en: '13: Optimizing Web Page Performance'
  id: totrans-586
  prefs: []
  type: TYPE_NORMAL
  zh: '13: 优化网页性能'
- en: 'Prompt:'
  id: totrans-587
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Write a plan to optimize the performance of a web page. Include techniques
    like lazy loading images, minifying CSS and JavaScript, and using a Content Delivery
    Network (CDN). Discuss how performance improvements impact user experience and
    SEO."'
  id: totrans-588
  prefs: []
  type: TYPE_NORMAL
  zh: '"编写一个优化网页性能的计划。包括图像懒加载、最小化CSS和JavaScript以及使用内容分发网络（CDN）等技术。讨论性能改进如何影响用户体验和搜索引擎优化（SEO）。"'
- en: '14: Implementing Dark Mode'
  id: totrans-589
  prefs: []
  type: TYPE_NORMAL
  zh: '14: 实现暗黑模式'
- en: 'Prompt:'
  id: totrans-590
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Write JavaScript code to implement a dark mode toggle for a webpage. Include
    CSS for light and dark themes and save the user''s preference using localStorage.
    Discuss the benefits of offering dark mode for user comfort."'
  id: totrans-591
  prefs: []
  type: TYPE_NORMAL
  zh: '"编写JavaScript代码实现网页的暗黑模式切换。包括光亮和暗黑主题的CSS以及使用localStorage保存用户的偏好设置。讨论提供暗黑模式对用户舒适度的益处。"'
- en: '15: Using Bootstrap for Quick Prototyping'
  id: totrans-592
  prefs: []
  type: TYPE_NORMAL
  zh: '15: 使用Bootstrap进行快速原型设计'
- en: 'Prompt:'
  id: totrans-593
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Write a responsive webpage layout using Bootstrap. Include a navbar, a hero
    section, and a footer. Explain how Bootstrap’s pre-built components and grid system
    speed up the development process."'
  id: totrans-594
  prefs: []
  type: TYPE_NORMAL
  zh: '"使用Bootstrap编写一个响应式网页布局。包括导航栏、英雄部分和页脚。解释Bootstrap的预构建组件和网格系统如何加快开发过程。"'
- en: '16: Creating a Custom Dropdown Menu'
  id: totrans-595
  prefs: []
  type: TYPE_NORMAL
  zh: '16: 创建自定义下拉菜单'
- en: 'Prompt:'
  id: totrans-596
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Write HTML, CSS, and JavaScript code to create a custom dropdown menu. Include
    features like keyboard navigation and closing the menu when clicking outside.
    Discuss how dropdown menus improve usability."'
  id: totrans-597
  prefs: []
  type: TYPE_NORMAL
  zh: '"编写HTML、CSS和JavaScript代码以创建一个自定义下拉菜单。包括键盘导航和点击外部关闭菜单的功能。讨论下拉菜单如何提高可用性。"'
- en: '17: Building a To-Do App with React'
  id: totrans-598
  prefs: []
  type: TYPE_NORMAL
  zh: '17: 使用React构建待办事项应用'
- en: 'Prompt:'
  id: totrans-599
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Write a React application to create a to-do list. Include functionality to
    add, mark as complete, and delete tasks. Explain how React’s state and lifecycle
    methods are used in managing application data."'
  id: totrans-600
  prefs: []
  type: TYPE_NORMAL
  zh: '"编写一个React应用程序以创建待办事项列表。包括添加、标记为完成和删除任务的功能。解释React的状态和生命周期方法在管理应用程序数据中的应用。"'
- en: '18: Implementing Responsive Images'
  id: totrans-601
  prefs: []
  type: TYPE_NORMAL
  zh: '18: 实现响应式图片'
- en: 'Prompt:'
  id: totrans-602
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Write HTML code to implement responsive images using the <picture> element
    and the srcset attribute. Include examples for serving different image sizes based
    on screen width. Discuss how responsive images improve page load times and user
    experience."'
  id: totrans-603
  prefs: []
  type: TYPE_NORMAL
  zh: '"编写HTML代码以使用<picture>元素和srcset属性实现响应式图片。包括根据屏幕宽度提供不同图片大小的示例。讨论响应式图片如何提高页面加载时间和用户体验。"'
- en: '19: Understanding CSS Animations'
  id: totrans-604
  prefs: []
  type: TYPE_NORMAL
  zh: '19: 理解CSS动画'
- en: 'Prompt:'
  id: totrans-605
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Write CSS code to create an animation that fades in text and moves it upward.
    Explain how keyframes and animation properties work, and discuss when to use CSS
    animations over JavaScript-based animations."'
  id: totrans-606
  prefs: []
  type: TYPE_NORMAL
  zh: '"编写CSS代码以创建一个淡入文本并向上移动的动画。解释关键帧和动画属性的工作原理，并讨论何时使用CSS动画而不是基于JavaScript的动画。"'
- en: '20: Creating a Progress Bar'
  id: totrans-607
  prefs: []
  type: TYPE_NORMAL
  zh: '20: 创建进度条'
- en: 'Prompt:'
  id: totrans-608
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Write HTML, CSS, and JavaScript code to create a progress bar that updates
    dynamically based on user input. Include an example use case for file upload progress.
    Discuss the importance of visual feedback in user interfaces."'
  id: totrans-609
  prefs: []
  type: TYPE_NORMAL
  zh: '"编写HTML、CSS和JavaScript代码以创建一个根据用户输入动态更新的进度条。包括文件上传进度示例。讨论在用户界面中视觉反馈的重要性。"'
- en: '21: Implementing Drag-and-Drop'
  id: totrans-610
  prefs: []
  type: TYPE_NORMAL
  zh: '21: 实现拖放'
- en: 'Prompt:'
  id: totrans-611
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Write JavaScript code to implement a drag-and-drop interface for rearranging
    items in a list. Include event listeners for dragstart, dragover, and drop. Discuss
    how drag-and-drop functionality improves interactivity."'
  id: totrans-612
  prefs: []
  type: TYPE_NORMAL
  zh: '"编写JavaScript代码以实现一个用于在列表中重新排列项目的拖放界面。包括对dragstart、dragover和drop事件的监听器。讨论拖放功能如何提高交互性。"'
- en: '22: Using Vue.js for Dynamic Content'
  id: totrans-613
  prefs: []
  type: TYPE_NORMAL
  zh: '22: 使用Vue.js进行动态内容'
- en: 'Prompt:'
  id: totrans-614
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Write a Vue.js component to display a list of products with filtering options.
    Include a search box and category filters. Explain how Vue’s reactivity system
    simplifies dynamic content management."'
  id: totrans-615
  prefs: []
  type: TYPE_NORMAL
  zh: '"编写一个Vue.js组件以显示具有过滤选项的产品列表。包括搜索框和分类过滤器。解释Vue的反应性系统如何简化动态内容管理。"'
- en: '23: Writing Media Queries for Responsive Design'
  id: totrans-616
  prefs: []
  type: TYPE_NORMAL
  zh: '23: 编写响应式设计的媒体查询'
- en: 'Prompt:'
  id: totrans-617
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Write CSS code to style a webpage for different screen sizes using media queries.
    Include examples for adjusting font sizes, layout widths, and visibility. Discuss
    best practices for responsive design."'
  id: totrans-618
  prefs: []
  type: TYPE_NORMAL
  zh: '"编写CSS代码以使用媒体查询为不同屏幕尺寸的网页设置样式。包括调整字体大小、布局宽度和可见性的示例。讨论响应式设计的最佳实践。"'
- en: '24: Building a Search Bar with Autocomplete'
  id: totrans-619
  prefs: []
  type: TYPE_NORMAL
  zh: '24: 构建带有自动完成的搜索栏'
- en: 'Prompt:'
  id: totrans-620
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Write HTML, CSS, and JavaScript code to create a search bar with autocomplete
    suggestions. Include functionality to fetch suggestions from an API. Discuss how
    autocomplete enhances usability."'
  id: totrans-621
  prefs: []
  type: TYPE_NORMAL
  zh: '"编写HTML、CSS和JavaScript代码以创建一个带有自动完成建议的搜索栏。包括从API获取建议的功能。讨论自动完成如何增强可用性。"'
- en: '25: Creating a Sticky Header'
  id: totrans-622
  prefs: []
  type: TYPE_NORMAL
  zh: '25: 创建粘性头部'
- en: 'Prompt:'
  id: totrans-623
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Write CSS and JavaScript code to create a sticky header that stays at the
    top of the page during scrolling. Discuss the importance of sticky elements for
    navigation and how to implement them effectively."'
  id: totrans-624
  prefs: []
  type: TYPE_NORMAL
  zh: '"编写CSS和JavaScript代码以创建一个在滚动时保持在页面顶部的粘性头部。讨论粘性元素在导航中的重要性以及如何有效地实现它们。"'
- en: '26: Using CSS Variables for Theming'
  id: totrans-625
  prefs: []
  type: TYPE_NORMAL
  zh: '26: 使用CSS变量进行主题化'
- en: 'Prompt:'
  id: totrans-626
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Write CSS code to create a color theme using CSS variables. Include an example
    of dynamically switching themes using JavaScript. Discuss how CSS variables improve
    maintainability in styling."'
  id: totrans-627
  prefs: []
  type: TYPE_NORMAL
  zh: '"编写 CSS 代码以使用 CSS 变量创建颜色主题。包括使用 JavaScript 动态切换主题的示例。讨论 CSS 变量如何提高样式的可维护性。"'
- en: '27: Creating Charts with Chart.js'
  id: totrans-628
  prefs: []
  type: TYPE_NORMAL
  zh: '27: 使用 Chart.js 创建图表'
- en: 'Prompt:'
  id: totrans-629
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Write JavaScript code to create a bar chart using Chart.js. Include steps
    to configure the chart and update it dynamically based on user input. Discuss
    how data visualization improves the presentation of complex data."'
  id: totrans-630
  prefs: []
  type: TYPE_NORMAL
  zh: '"编写 JavaScript 代码使用 Chart.js 创建柱状图。包括配置图表和根据用户输入动态更新图表的步骤。讨论数据可视化如何改善复杂数据的展示。"'
- en: '28: Implementing Infinite Scrolling'
  id: totrans-631
  prefs: []
  type: TYPE_NORMAL
  zh: '28: 实现无限滚动'
- en: 'Prompt:'
  id: totrans-632
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Write JavaScript code to implement infinite scrolling for a list of items
    fetched from an API. Include functionality to load more items as the user scrolls
    down. Discuss how infinite scrolling enhances user experience in content-heavy
    applications."'
  id: totrans-633
  prefs: []
  type: TYPE_NORMAL
  zh: '"编写 JavaScript 代码以实现从 API 获取的项目列表的无限滚动。包括在用户向下滚动时加载更多项目的功能。讨论无限滚动如何增强内容丰富的应用程序的用户体验。"'
- en: '29: Using LocalStorage for State Persistence'
  id: totrans-634
  prefs: []
  type: TYPE_NORMAL
  zh: '29: 使用 LocalStorage 进行状态持久化'
- en: 'Prompt:'
  id: totrans-635
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Write a JavaScript program to store and retrieve user preferences (e.g., theme
    selection) using localStorage. Discuss the advantages of localStorage for persisting
    data between sessions."'
  id: totrans-636
  prefs: []
  type: TYPE_NORMAL
  zh: '"编写一个 JavaScript 程序，使用 localStorage 存储和检索用户偏好（例如，主题选择）。讨论 localStorage 在会话间持久化数据时的优势。"'
- en: '30: Debugging Front-End Code'
  id: totrans-637
  prefs: []
  type: TYPE_NORMAL
  zh: '30: 调试前端代码'
- en: 'Prompt:'
  id: totrans-638
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Write a guide to debugging common front-end issues using browser developer
    tools. Include examples for inspecting elements, analyzing the DOM, and debugging
    JavaScript errors. Discuss best practices for identifying and resolving front-end
    issues efficiently."'
  id: totrans-639
  prefs: []
  type: TYPE_NORMAL
  zh: '"编写指南，使用浏览器开发者工具调试常见的前端问题。包括检查元素、分析 DOM 和调试 JavaScript 错误的示例。讨论高效识别和解决前端问题的最佳实践。"'
- en: Back-End Development
  id: totrans-640
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 后端开发
- en: The back end is the engine that powers your application. In this chapter, on
    the basis of my own experience, I walk you through prompts for managing APIs,
    databases, and server-side logic. These tools will help you build robust, scalable,
    and efficient back-end systems that keep your applications running smoothly.
  id: totrans-641
  prefs: []
  type: TYPE_NORMAL
  zh: 后端是驱动您应用程序的引擎。在本章中，基于我的个人经验，我将向您介绍管理 API、数据库和服务器端逻辑的提示。这些工具将帮助您构建健壮、可扩展和高效的后端系统，使您的应用程序平稳运行。
- en: '1: Understanding Back-End Basics'
  id: totrans-642
  prefs: []
  type: TYPE_NORMAL
  zh: '1: 理解后端基础知识'
- en: 'Prompt:'
  id: totrans-643
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Explain the role of back-end development in a web application. Write a simple
    server program in Node.js that responds with ''Hello, World!'' to client requests.
    Discuss how the back-end interacts with the front-end and database."'
  id: totrans-644
  prefs: []
  type: TYPE_NORMAL
  zh: '"解释后端开发在 Web 应用程序中的作用。编写一个简单的 Node.js 服务器程序，对客户端请求响应 ''Hello, World!''。讨论后端如何与前端和数据库交互。"'
- en: '2: Setting Up a RESTful API'
  id: totrans-645
  prefs: []
  type: TYPE_NORMAL
  zh: '2: 设置 RESTful API'
- en: 'Prompt:'
  id: totrans-646
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Write a RESTful API in [Node.js/Python (Flask)/etc.] with endpoints to create,
    read, update, and delete user profiles. Include data validation and error handling.
    Discuss how REST principles guide API design."'
  id: totrans-647
  prefs: []
  type: TYPE_NORMAL
  zh: '"在 [Node.js/Python (Flask)/等] 中编写 RESTful API，包括创建、读取、更新和删除用户配置文件的端点。包括数据验证和错误处理。讨论
    REST 原则如何指导 API 设计。"'
- en: '3: Connecting to a Database'
  id: totrans-648
  prefs: []
  type: TYPE_NORMAL
  zh: '3: 连接到数据库'
- en: 'Prompt:'
  id: totrans-649
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Write a program in [Python/Java/etc.] to connect to a MySQL database, perform
    a query, and display the results. Include error handling for failed connections
    and explain how database connectivity is managed in back-end development."'
  id: totrans-650
  prefs: []
  type: TYPE_NORMAL
  zh: '"在 [Python/Java/等] 中编写程序以连接到 MySQL 数据库，执行查询并显示结果。包括对失败连接的错误处理，并解释如何在后端开发中管理数据库连接。"'
- en: '4: Creating an Authentication System'
  id: totrans-651
  prefs: []
  type: TYPE_NORMAL
  zh: '4: 创建身份验证系统'
- en: 'Prompt:'
  id: totrans-652
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Write a back-end program in [Node.js/Java/etc.] to implement user authentication
    using JSON Web Tokens (JWT). Include steps for user registration, login, and token
    validation. Discuss the benefits of using JWT for secure authentication."'
  id: totrans-653
  prefs: []
  type: TYPE_NORMAL
  zh: '"在 [Node.js/Java/等] 中编写后端程序，以使用 JSON Web Tokens (JWT) 实现用户身份验证。包括用户注册、登录和令牌验证的步骤。讨论使用
    JWT 进行安全身份验证的好处。"'
- en: '5: Writing Middleware in Express.js'
  id: totrans-654
  prefs: []
  type: TYPE_NORMAL
  zh: '5: 在 Express.js 中编写中间件'
- en: 'Prompt:'
  id: totrans-655
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Explain the concept of middleware in Express.js. Write middleware functions
    to log requests and validate API keys. Discuss how middleware improves modularity
    and reusability in back-end applications."'
  id: totrans-656
  prefs: []
  type: TYPE_NORMAL
  zh: '"解释 Express.js 中中间件的概念。编写中间件函数以记录请求和验证 API 密钥。讨论中间件如何提高后端应用程序的模块化和可重用性。"'
- en: '6: Building a GraphQL API'
  id: totrans-657
  prefs: []
  type: TYPE_NORMAL
  zh: '6: 构建 GraphQL API'
- en: 'Prompt:'
  id: totrans-658
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Write a GraphQL API in Node.js to handle queries and mutations for managing
    a library system. Include examples for fetching books by author and adding new
    books. Discuss the advantages of GraphQL over REST."'
  id: totrans-659
  prefs: []
  type: TYPE_NORMAL
  zh: '"在Node.js中编写GraphQL API以处理管理图书馆系统的查询和突变。包括按作者检索书籍和添加新书籍的示例。讨论GraphQL相对于REST的优势。"'
- en: '7: Understanding MVC Architecture'
  id: totrans-660
  prefs: []
  type: TYPE_NORMAL
  zh: '7: 理解MVC架构'
- en: 'Prompt:'
  id: totrans-661
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Explain the Model-View-Controller (MVC) architecture. Write a back-end program
    in [Node.js/Java/etc.] that follows the MVC pattern for managing a blog application.
    Discuss how MVC separates concerns and improves maintainability."'
  id: totrans-662
  prefs: []
  type: TYPE_NORMAL
  zh: '"解释模型-视图-控制器（MVC）架构。在[Node.js/Java等]中编写遵循MVC模式的博客应用程序的后端程序。讨论MVC如何分离关注点并提高可维护性。"'
- en: '8: Using ORM for Database Operations'
  id: totrans-663
