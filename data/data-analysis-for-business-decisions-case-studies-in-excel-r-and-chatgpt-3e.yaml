  type: TYPE_NORMAL
  zh: 对于第一个问题，“乘客对机场清洁最频繁的投诉是什么？”，我们设置了变量 Q9COM（在代码中）。设置屏幕显示在[图 7.24](#fig7-24)，结果帕累托分析显示在[图
