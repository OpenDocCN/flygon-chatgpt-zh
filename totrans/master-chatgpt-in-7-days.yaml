  prefs: []
  type: TYPE_NORMAL
- en: Why This Matters
  prefs: []
  type: TYPE_NORMAL
- en: The quality of ChatGPT's responses depends heavily on the clarity and structure
    of your prompt. Today you’ll master the art of communicating effectively with
    the AI.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 1: What Makes a Prompt Effective?'
  prefs: []
  type: TYPE_NORMAL
- en: 'Key principles of a good prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: Be specific
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Provide context
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: State the format you want
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Limit or guide the scope
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Use examples when needed
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Example:'
  prefs: []
  type: TYPE_NORMAL
- en: “Summarize this paragraph in 3 bullet points for a presentation.”
  prefs: []
  type: TYPE_NORMAL
- en: “Write a polite customer service email apologizing for late delivery.”
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrcV2.jpg)'
  prefs: []
  type: TYPE_IMG
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
