- en: '**SUMMARY**'
  id: totrans-1086
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**总结**'
- en: This chapter introduced you to the NumPy library for Python. You learned how
    to write Python scripts containing loops, arrays, and lists. You also saw how
    to work with dot products, the reshape() method, plotting with Matplotlib (discussed
    in more detail in [Chapter 6](ch06.xhtml)), and examples of linear regression.
  id: totrans-1087
  prefs: []
  type: TYPE_NORMAL
  zh: 本章介绍了 Python 的 NumPy 库。你学习了如何编写包含循环、数组和列表的 Python 脚本。你还看到了如何处理点积、reshape() 方法、使用
    Matplotlib 绘图（在[第 6 章](ch06.xhtml)中更详细地讨论），以及线性回归的示例。
- en: Then you learned how to work with subranges of arrays, and also negative subranges
    of vectors and arrays, both of which are very useful for extracting portions of
    datasets in machine learning tasks. You also saw various other NumPy operations,
    such as the reshape() method, which is useful when working with image files.
  id: totrans-1088
  prefs: []
  type: TYPE_NORMAL
  zh: 然后你学习了如何处理数组的子范围，以及向量和数组的负子范围，这两者对于在机器学习任务中提取数据集的部分都非常有用。你还看到了各种其他 NumPy 操作，例如
    reshape() 方法，这在处理图像文件时非常有用。
- en: Next, you learned how to use NumPy for linear regression, the mean squared error
    (MSE), and how to calculate the MSE with the NumPy linspace() method. Finally,
    you had an introduction Google Colaboratory, where you can take advantage of the
    free GPU time when you launch Jupyter notebooks.
  id: totrans-1089
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，你学习了如何使用 NumPy 进行线性回归、均方误差（MSE），以及如何使用 NumPy linspace() 方法计算 MSE。最后，你介绍了
    Google Colaboratory，在那里你可以在启动 Jupyter 笔记本时利用免费的 GPU 时间。
- en: CHAPTER 3
  id: totrans-1090
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**第 3 章**'
- en: '*PANDAS AND DATA VISUALIZATION*'
  id: totrans-1091
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '*PANDAS 和 数据可视化*'
- en: This chapter introduces the Pandas library and contains various code samples
    that illustrate some useful Pandas features. As you will see, the title of each
    section clearly indicates its contents, so you can easily scan this chapter for
    those sections that contain material that is new to you. This approach will help
    you make efficient use of your time when you read the contents of this chapter.
  id: totrans-1092
  prefs: []
  type: TYPE_NORMAL
  zh: 本章介绍了 Pandas 库，并包含各种代码示例，展示了 Pandas 的一些有用功能。正如你将看到的，每个部分的标题清楚地表明了其内容，因此你可以轻松地扫描本章以查找包含新材料的部分。这种方法将帮助你高效地利用阅读本章内容的时间。
- en: The first part of this chapter contains a brief introduction to Pandas, followed
    by code samples that illustrate how to define Pandas DataFrames and also display
    their attributes. Please keep in mind that this chapter is devoted to Pandas DataFrames.
    There is one code block that illustrates how to define a Pandas Series, and if
    you want to learn more about this Pandas Series, you can search online for more
    information.
  id: totrans-1093
  prefs: []
  type: TYPE_NORMAL
  zh: 本章的第一部分简要介绍了 Pandas，随后是代码示例，说明了如何定义 Pandas DataFrame 并显示其属性。请注意，本章专注于 Pandas
    DataFrame。有一个代码块说明了如何定义 Pandas Series，如果你想了解更多关于 Pandas Series 的信息，可以在网上搜索更多信息。
- en: The second part of this chapter discusses various types of DataFrames that you
    can create, such as numeric and Boolean DataFrames. In addition, you will see
    examples of creating DataFrames with NumPy functions and random numbers. You will
    also see examples of converting between Python dictionaries and JSON-based data,
    and also how to create a Pandas DataFrame from JSON-based data.
  id: totrans-1094
  prefs: []
  type: TYPE_NORMAL
  zh: 本章的第二部分讨论了你可以创建的各种 DataFrame 类型，例如数值和布尔 DataFrame。此外，你还将看到使用 NumPy 函数和随机数创建
    DataFrame 的示例。你还将看到将 Python 字典和基于 JSON 的数据之间进行转换的示例，以及如何从基于 JSON 的数据创建 Pandas
    DataFrame。
- en: '**WHAT IS PANDAS?**'
  id: totrans-1095
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**什么是 PANDAS？**'
- en: 'Pandas is a Python library that is compatible with other Python libraries,
    such as NumPy, Matplotlib, and so forth. Install Pandas by opening a command shell
    and invoking this command for Python 3.x:'
  id: totrans-1096
  prefs: []
  type: TYPE_NORMAL
  zh: Pandas 是一个与 Python 库兼容的 Python 库，例如 NumPy、Matplotlib 等。通过打开命令行并调用以下命令安装 Pandas（适用于
    Python 3.x）：
- en: '[PRE169]'
  id: totrans-1097
  prefs: []
  type: TYPE_PRE
  zh: '[PRE169]'
- en: In many ways the Pandas library has the semantics of a spreadsheet, and it also
    works with various file types, such as xsl, xml, html, csv files. Pandas provides
    a data type called a DataFrame (similar to a Python dictionary) with extremely
    powerful functionality (similar to the functionality of a spreadsheet).
  id: totrans-1098
  prefs: []
  type: TYPE_NORMAL
  zh: 在许多方面，Pandas 库具有电子表格的语义，并且它还与各种文件类型一起工作，例如 xsl、xml、html、csv 文件。Pandas 提供了一种称为
    DataFrame 的数据类型（类似于 Python 字典），具有非常强大的功能（类似于电子表格的功能）。
- en: '**Pandas DataFrames**'
  id: totrans-1099
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '**Pandas DataFrame**'
- en: 'In simplified terms, a Pandas DataFrame is a two-dimensional data structure,
    and it’s convenient to think of the data structure in terms of rows and columns.
    DataFrames can be labeled (rows as well as columns), and the columns can contain
    different data types. The source of the dataset can be a data file, database tables,
    Web service, and so forth. Pandas DataFrame features include:'
  id: totrans-1100
  prefs: []
  type: TYPE_NORMAL
  zh: 简而言之，Pandas DataFrame 是一个二维数据结构，方便将其视为行和列。DataFrame 可以标记（包括行和列），列可以包含不同的数据类型。数据集的来源可以是数据文件、数据库表、Web
    服务等。Pandas DataFrame 的功能包括：
- en: data frame methods
  id: totrans-1101
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 数据框方法
- en: data frame statistics
  id: totrans-1102
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 数据框统计信息
- en: grouping, pivoting, and reshaping
  id: totrans-1103
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 分组、交叉和重塑
- en: handle missing data
  id: totrans-1104
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 处理缺失数据
- en: join data frames
  id: totrans-1105
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 连接数据框
- en: '**Dataframes and Data Cleaning Tasks**'
  id: totrans-1106
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '**DataFrame 和数据清洗任务**'
- en: 'The specific tasks that you need to perform depend on the structure and contents
    of a dataset. In general, you will perform a workflow with the following steps
    (not necessarily always in this order), all of which can be performed with a Pandas
    DataFrame:'
  id: totrans-1107
  prefs: []
  type: TYPE_NORMAL
  zh: 你需要执行的具体任务取决于数据集的结构和内容。通常，你将按照以下步骤（不一定总是按此顺序）执行工作流程，所有这些都可以使用 Pandas DataFrame
    完成：
- en: read data into a DataFrame
  id: totrans-1108
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将数据读入 DataFrame
- en: display top of DataFrame
  id: totrans-1109
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 显示 DataFrame 的顶部
- en: display column data types
  id: totrans-1110
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 显示列数据类型
- en: display non-missing values
  id: totrans-1111
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 显示非缺失值
- en: replace NA with a value
  id: totrans-1112
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 用值替换 NA
- en: iterate through the columns
  id: totrans-1113
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 遍历列
- en: statistics for each column
  id: totrans-1114
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 每列的统计信息
- en: find missing values
  id: totrans-1115
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 查找缺失值
- en: total missing values
  id: totrans-1116
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 总缺失值
- en: percentage of missing values
  id: totrans-1117
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 缺失值的百分比
- en: sort table values
  id: totrans-1118
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 排序表值
- en: print summary information
  id: totrans-1119
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 打印摘要信息
- en: columns with > 50% missing values
  id: totrans-1120
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 列中缺失值超过 50%
- en: rename columns
  id: totrans-1121
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 重命名列
- en: '**A PANDAS DATAFRAME EXAMPLE**'
  id: totrans-1122
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**PANDAS DataFrame 示例**'
