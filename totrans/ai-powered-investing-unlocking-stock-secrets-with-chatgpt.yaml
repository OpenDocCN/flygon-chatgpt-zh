- en: '• **Limi**ted **Sco**pe: **I**t''**s** **ha**rd **t**o **dee**ply **anal**yze
    **ma**ny **compa**nies **a**t **on**ce.'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: • **范围有限**：同时深入分析许多公司是困难的。
- en: '**A**I **chan**ges **the**se **prob**lems. **I**t **c**an:'
