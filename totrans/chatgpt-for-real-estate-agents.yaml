- en: 'Prompt example:'
  id: totrans-374
  prefs: []
  type: TYPE_NORMAL
  zh: 提示示例：
- en: “Write a friendly LinkedIn message to a local business owner I met at a chamber
    event.”
  id: totrans-375
  prefs: []
  type: TYPE_NORMAL
  zh: “给我写一封友好的LinkedIn信息，给在商会活动中遇到的当地企业主。”
- en: 'Output:'
  id: totrans-376
  prefs: []
  type: TYPE_NORMAL
  zh: 输出：
- en: “Hi Sarah! It was great meeting you at the Chamber event yesterday. I’d love
    to connect and learn more about your work with the bakery. Also happy to share
    a few real estate insights if you’re ever curious about the market!”
  id: totrans-377
  prefs: []
  type: TYPE_NORMAL
  zh: “嗨，莎拉！很高兴在昨天的商会活动中见到你。我很想与你联系并了解更多关于你在面包店的工作。如果你对市场感兴趣，我也很乐意分享一些房地产见解！”
- en: 'Quote to remember:'
  id: totrans-378
  prefs: []
  type: TYPE_NORMAL
  zh: 要记住的名言：
- en: “Success usually comes to those who are too busy to be looking for it.” — Henry
    David Thoreau
  id: totrans-379
  prefs: []
  type: TYPE_NORMAL
  zh: “成功通常降临在那些太忙而无法寻找它的人身上。” —— 亨利·大卫·梭罗
- en: With AI in your corner, you can stay ‘too busy’ closing deals 🏁.
  id: totrans-380
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  id: totrans-381
  prefs: []
  type: TYPE_NORMAL
- en: 'Chapter 32: Branding Yourself—Without the Ego Trip'
