  prefs: []
  type: TYPE_NORMAL
  zh: 现在让我们请ChatGPT为我们定制这个故事。我鼓励你自己尝试改变主角、熊、场景或其他任何东西，使其更加个性化。同时，查看我们在提示[11-6](#PC11)中的做法。我有两个儿子，名叫查理和埃米特，我想让他们成为故事的主角。我希望他们能从个人层面去理解这个故事，所以我想让故事发生在俄勒冈州的一个小社区。而不是熊，我想让他们进入《瑞克和莫蒂》中的几个角色的家中。提示11-6
- en: Asking ChatGPT to give us a personalized version of Goldilocks and the Three
    Bears
  id: totrans-987
  prefs: []
  type: TYPE_NORMAL
  zh: 请ChatGPT给我们一个个性化的《金发姑娘和三只熊》版本
- en: In Response [11-6](#PC12), ChatGPT does an excellent job of integrating the
    changes we asked for, as well as adding flair based upon the *Rick and Morty*
    TV show.Here's a customized version of the story for Charlie and Emmett, set in
    a small Oregon neighborhood featuring characters from **Rick and Morty**:---**Charlie
    and Emmett's Adventure**One sunny afternoon in a quiet neighborhood in Oregon,
    Charlie and Emmett decided to go exploring while their parents were busy gardening.
    The brothers loved adventure, and they never knew what they might discover.As
    they wandered down a quiet street, they came upon a strange house at the end of
    the block. It looked like something out of a sci-fi movie, with gadgets sticking
    out of the roof and green glowing lights in the windows."Do you think anyone lives
    here?" asked Charlie."I don't know," said Emmett, "but we should check it out!"---**The
    House of Rick and Morty**The boys knocked on the door, but no one answered. They
    pushed it open cautiously and stepped inside. The house was messy, filled with
    weird inventions and strange smells. Unbeknownst to them, the house belonged to
    Rick, Morty, and Summer, who had gone on an interdimensional adventure and left
    the door unlocked.---**The Snacks**In the kitchen, Charlie and Emmett found three
    bowls of something that looked like glowing cereal.Charlie tried the first bowl.
    "Too spicy!" he exclaimed, sticking out his tongue. It was clearly one of Rick's
    crazy experiments.Emmett tried the second bowl. "Too sour!" he said, his face
    scrunching up.Then they both tried the smallest bowl, which looked normal."Just
    right!" they said together, and they ate it all up.---**The Chairs**Next, they
    went into the living room, which was cluttered with futuristic furniture. There
    were three chairs.Charlie sat in the first chair. "Too stiff!" he said, standing
    up quickly.Emmett tried the second chair. "Too wobbly!" he said as it started
    spinning uncontrollably.Then they both tried the third chair, a cozy recliner
    in the corner. "Just right!" they said, curling up together. But when they pulled
    the lever, the chair launched them halfway across the room!---**The Beds**After
    recovering from the chair fiasco, the boys found a staircase leading to the bedrooms.
    Upstairs, there were three beds.Charlie flopped onto the first bed. "Too hard!"
    he said, rubbing his back.Emmett tried the second bed, which was covered in glowing
    slime. "Too sticky!" he said, hopping off immediately.Then they both crawled into
    the third bed, which was soft and smelled like freshly washed blankets."Just right!"
    they said, yawning. Before they knew it, they were fast asleep.---**The Return
    of Rick, Morty, and Summer**Meanwhile, Rick, Morty, and Summer returned from their
    interdimensional trip, carrying strange gadgets and arguing loudly."Why is the
    door open?!" Rick growled.As they walked into the house, they noticed the glowing
    cereal had been eaten. "Someone's been eating my toxic cereal!" Rick shouted."And
    someone sat in my hover chair!" complained Morty.When they went upstairs, Summer
    stopped and pointed. "Uh, Rick? Someone's sleeping in my bed…and it's two kids!"Charlie
    and Emmett woke up to find the three staring at them. Rick was holding a portal
    gun, and Morty looked panicked."Uh, hi?" said Charlie nervously."Kids, you've
    got about three seconds to explain yourselves before I send you to another dimension!"
    Rick barked.---**A Quick Escape**Terrified, Charlie and Emmett scrambled out of
    bed and ran down the stairs. They darted past the strange gadgets, through the
    glowing kitchen, and out the front door."Let's never go in that house again!"
    said Emmett, panting as they ran home."Agreed!" said Charlie, laughing now that
    they were safe.From that day on, Charlie and Emmett stuck to exploring places
    that didn't look like they belonged in a sci-fi cartoon. But they always remembered
    their wild adventure in the house at the end of the block.**The End.**---What
    do you think? Would you like to tweak anything to make it even more personal?Response
    11-6
  id: totrans-988
  prefs: []
  type: TYPE_NORMAL
  zh: 在回应 [11-6](#PC12) 中，ChatGPT 完美地整合了我们要求的变化，并基于 *Rick and Morty* 电视剧增添了特色。这是为
    Charlie 和 Emmett 定制的剧情版本，发生在俄勒冈州一个小社区，其中包含来自 **Rick and Morty** 的角色：---**Charlie
    和 Emmett 的冒险**在一个阳光明媚的下午，在俄勒冈州一个安静的社区，Charlie 和 Emmett 决定在他们的父母忙于园艺时去探险。兄弟俩喜欢冒险，他们永远不知道他们可能会发现什么。当他们沿着一条安静的小路漫步时，他们来到了街区尽头的奇怪的房子。这看起来像是一部科幻电影，屋顶上伸出各种小玩意，窗户里透出绿色的发光灯光。“你认为这里有人住吗？”Charlie
    问。“我不知道，”Emmett 说，“但我们应该去看看！”---**Rick 和 Morty 的房子**男孩们敲了敲门，但没有人回答。他们小心翼翼地推开门，走了进去。房子很乱，充满了奇怪的发明和奇怪的气味。他们不知道，这所房子属于
    Rick、Morty 和 Summer，他们已经去进行了一次跨维度的冒险，并留下了没锁的门。---**零食**在厨房里，Charlie 和 Emmett 发现了三个看起来像发光谷物的碗。Charlie
    尝了第一碗。“太辣了！”他大声说，伸出舌头。这显然是 Rick 的疯狂实验之一。Emmett 尝了第二碗。“太酸了！”他说，他的脸皱了起来。然后他们俩都尝了最小的碗，看起来很正常。“正好！”他们异口同声地说，把它们都吃光了。---**椅子**接下来，他们走进了客厅，里面堆满了未来派的家具。有三把椅子。Charlie
    坐在第一把椅子上。“太硬了！”他说，迅速站起来。Emmett 尝试了第二把椅子。当它开始不受控制地旋转时，他说：“太摇晃了！”然后他们俩都试了第三把椅子，角落里一个舒适的躺椅。“正好！”他们说，一起蜷缩在一起。但当他们拉动杠杆时，椅子把他们发射到房间的一半！---**床**从椅子事故中恢复过来后，男孩们发现了一座通往卧室的楼梯。楼上，有三张床。Charlie
    扑到第一张床上。“太硬了！”他说，揉着他的背。Emmett 尝试了第二张床，床上覆盖着发光的粘液。“太粘了！”他说，立刻跳了下来。然后他们俩都爬进了第三张床，床很软，闻起来像新洗的毯子。“正好！”他们说，打着哈欠。在他们不知不觉中，他们很快就睡着了。---**Rick、Morty
    和 Summer 的回归**与此同时，Rick、Morty 和 Summer 从跨维度的旅行中回来，带着奇怪的装置，大声争吵。“为什么门开着？！”Rick
    咆哮着。当他们走进房子时，他们注意到发光的谷物已经被吃掉了。“有人吃了我有毒的谷物！”Rick 大喊。“有人坐了我的悬浮椅！”Morty 抱怨道。当他们上楼时，Summer
    停了下来，指着。“呃，Rick？有人在睡我的床……而且是两个小孩！”Charlie 和 Emmett 被三个人盯着醒来。Rick 持着一把传送枪，Morty
    看起来很恐慌。“呃，你好？”Charlie 紧张地说。“孩子们，在我把你们送到另一个维度之前，你们有大约三秒钟的时间来解释一下你们自己！”Rick 咆哮道。---**快速逃跑**惊恐的
    Charlie 和 Emmett 爬下床，跑下楼梯。他们穿过奇怪的装置，穿过发光的厨房，跑出前门。“我们再也不去那所房子了！”Emmett 喘着气说，当他们跑回家时。“同意！”Charlie
    说，现在他们安全了，他笑了。从那天起，Charlie 和 Emmett 只探索那些看起来不像科幻卡通的地方。但他们总是记得他们在街区尽头的房子里的疯狂冒险。**结束。**---你觉得怎么样？你想要调整些什么来让它更加个性化吗？回应
    11-6
- en: ChatGPT gives us a personalized story that’s sure to delight
  id: totrans-989
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT为我们提供了一个令人愉悦的个人故事。
- en: As you can see from Response [11-6](#PC12), ChatGPT comes up with a very entertaining
    story that still resembles the setup from Goldilocks and the Three Bears while
    adding the personal touch of making two young boys the protagonists. It also makes
    the story a joy to read for fans of *Rick and Morty*.
  id: totrans-990
  prefs: []
  type: TYPE_NORMAL
  zh: 如您从响应[11-6](#PC12)中看到，ChatGPT提出一个非常有趣的故事，它仍然类似于《金发姑娘和三只熊》的情节，同时增加了将两个小男孩作为主角的个人特色。它还使故事成为《瑞克和莫蒂》粉丝的阅读乐趣。
- en: Conclusion
  id: totrans-991
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: In this chapter, we looked at how ChatGPT can be used to rewrite and rephrase
    text for business, translation, and even the customization of a bedtime story
    to make it more personal. In the next chapter, we’re going to be looking at how
    ChatGPT can be used to extract data for various uses, from conducting research
    based on blog reviews to creating a budget plan based upon actual buying habits.
  id: totrans-992
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们探讨了如何使用ChatGPT来改写和重述文本，用于商业、翻译，甚至定制睡前故事以使其更加个性化。在下一章中，我们将探讨如何使用ChatGPT提取数据，用于各种用途，从基于博客评论的研究到基于实际购买习惯制定预算计划。
- en: © The Author(s), under exclusive license to APress Media, LLC, part of Springer
    Nature 2025L. EvelynMaking ChatGPT Work for You[https://doi.org/10.1007/979-8-8688-1445-7_12](https://doi.org/10.1007/979-8-8688-1445-7_12)
  id: totrans-993
  prefs: []
  type: TYPE_NORMAL
  zh: © 作者（们），独家授权给APress Media, LLC，Springer Nature的一部分，2025L. Evelyn《让ChatGPT为您服务》[https://doi.org/10.1007/979-8-8688-1445-7_12](https://doi.org/10.1007/979-8-8688-1445-7_12)
- en: 12. Budget Planning, Product Research, and Writing an Article with ChatGPT
  id: totrans-994
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 12. 使用ChatGPT进行预算规划、产品研究和撰写文章
- en: Lydia Evelyn^([1](#Aff2)  )(1)Catalonia, Spain
  id: totrans-995
  prefs: []
  type: TYPE_NORMAL
  zh: Lydia Evelyn^([1](#Aff2)  )(1)西班牙加泰罗尼亚
- en: At this point, we know that ChatGPT is good at handling large quantities of
    data—whether it be text, documents, or even photos. A good rule of thumb is that
    any time you’re dealing with a lot of information, *it’s the perfect opportunity
    to use ChatGPT*. ChatGPT performs the best with as much information as possible.
    Because of this, if you’re conducting research on large quantities of information
    or are trying to sort through data for specific information, you know which tool
    to rely on.
  id: totrans-996
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，我们知道ChatGPT擅长处理大量数据——无论是文本、文档还是照片。一个很好的经验法则是，每次你处理大量信息时，*这就是使用ChatGPT的完美机会*。ChatGPT在尽可能多的信息下表现最佳。因此，如果你正在研究大量信息或试图整理特定信息的数据，你知道可以依赖哪个工具。
- en: In this chapter, we’re looking at how ChatGPT can be used to extract data and
    do something with it. What do we mean by this? Well, for example, if you’re conducting
    product research, it’s unlikely you’re just going to collect that information
    and then proceed to do nothing else. You’re probably going to write up a report,
    create a marketing strategy, or use the information and write about it. If you’re
    looking at financial information like bills and payment stubs, you’re likely to
    then start making a budget, manage your spending habits, or categorize payments
    so that they’re easier to sort through in the future.
  id: totrans-997
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们探讨了如何使用ChatGPT提取数据并对其进行处理。我们这里的含义是什么？例如，如果你正在进行产品研究，你不太可能只是收集这些信息然后什么都不做。你可能需要撰写一份报告，制定营销策略，或者使用这些信息并撰写关于它们的文章。如果你正在查看财务信息，如账单和支付收据，你可能会开始制定预算，管理你的消费习惯，或者对支付进行分类，以便将来更容易整理。
- en: 'So, to save ourselves some time, we’re going to use ChatGPT to reduce the effort
    needed to pour over large quantities of text and numbers by having ChatGPT follow
    two steps: analyze the material, then do something with it.'
  id: totrans-998
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，为了节省我们一些时间，我们将使用ChatGPT通过以下两个步骤来减少阅读大量文本和数字所需的努力：分析材料，然后对其进行处理。
- en: 'What will be covered in this chapter:'
  id: totrans-999
  prefs: []
  type: TYPE_NORMAL
  zh: 本章将涵盖以下内容：
- en: Planning on writing a novel? Get to know your audience first! Conducting product
    research on fantasy novels.
  id: totrans-1000
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 打算写一部小说吗？首先了解你的受众！对奇幻小说进行产品研究。
- en: Get the most out of what you learned by sharing with others. Writing about writing
    based upon great examples.
  id: totrans-1001
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过与他人分享所学，最大限度地发挥所学知识的价值。基于优秀示例撰写关于写作的文章。
- en: Take the guessing out of budget planning. Using ChatGPT o1 to take photos of
    actual receipts and make an effective budget plan to accurately cut spending costs.
  id: totrans-1002
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 消除预算规划的猜测。使用ChatGPT o1拍摄实际收据的照片，制定有效的预算计划以准确削减支出成本。
- en: Conducting Product Research Based on Blog Reviews
  id: totrans-1003
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 基于博客评论进行产品研究
- en: If you’re selling a product of any kind, product research is crucial for understanding
    what interested consumers are looking for. You need to understand how other products
    may or may not be meeting their needs, what impresses your potential clients,
    and find out what’s trending. Going through customer reviews, however, is extremely
    tedious.
  id: totrans-1004
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你正在销售任何类型的产品，产品研究对于理解感兴趣的消费群体在寻找什么至关重要。你需要了解其他产品可能是否满足他们的需求，哪些方面能打动你的潜在客户，以及了解当前的趋势。然而，浏览客户评价却是一项极其繁琐的工作。
- en: Besides, not all reviews are the same. Imagine you’re managing a cooking blog,
    and one of your readers leaves a bad review, but they rarely cook. Trying to impress
    that kind of reader isn’t going to help your research in the long run if you’re
    looking through your comments for feedback. You want people that enjoy cooking
    often to enjoy your blog, because they’re the ones that will keep coming back.
    From a business perspective, the enthusiast’s opinion matters more than someone
    that only dabs in cooking on occasion.
  id: totrans-1005
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，并非所有评论都是一样的。想象一下，你正在管理一个烹饪博客，你的一个读者留下了一条负面评论，但他们很少做饭。如果你在查看评论以获取反馈时试图取悦这样的读者，那么从长远来看，这不会帮助你进行的研究。你希望那些经常享受烹饪的人喜欢你的博客，因为他们是那些会不断回来的人。从商业角度来看，热衷者的观点比偶尔涉足烹饪的人更重要。
- en: For this reason, in this example, we’re going to be looking at how ChatGPT can
    be used to extract content from blog reviews that are directly related to the
    subject we’re interested in. For this example, we’re going to be examining reviews
    and critiques of popular fantasy novels. Blog reviewers are not only sure to be
    dedicated to the product they’re discussing, they also have the ability to influence
    people interested in the topic they’re discussing. Finding out about their opinion
    is much more efficient than, for example, just going through Amazon reviews of
    popular novels arbitrarily. So, let’s get started.
  id: totrans-1006
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，在这个例子中，我们将探讨如何使用ChatGPT从与我们所感兴趣的主题直接相关的博客评论中提取内容。在这个例子中，我们将审查流行奇幻小说的评论和批评。博客评论者不仅一定会对其讨论的产品保持忠诚，他们还有能力影响对所讨论话题感兴趣的人。了解他们的观点比例如仅随意浏览流行小说的亚马逊评论要高效得多。所以，让我们开始吧。
- en: Using ChatGPT to Compare Popular Fantasy Novels
  id: totrans-1007
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 使用ChatGPT比较流行的奇幻小说
- en: In this example, we’re going to examine the reviews of different fantasy novels
    and find out what reviewers agree are the common highlights and downfalls of each.
    We’re going to use ChatGPT to find different bloggers to conduct our research
    and save time.
  id: totrans-1008
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个例子中，我们将审查不同奇幻小说的评论，找出评论者一致认为的每部小说的亮点和不足。我们将使用ChatGPT来寻找不同的博主进行我们的研究，以节省时间。
- en: This example will consist of a back-and-forth conversation with ChatGPT that
    will use its web search abilities as well as reference previous points in the
    same conversation. The approach here will resemble concepts covered in Chapter
    [4](641691_1_En_4_Chapter.xhtml), so if you want a reminder on how you can use
    ChatGPT to write content based upon information it was taught as reference, you
    can check that out. Now, let’s get started with Prompt [12-1](#PC1).I want you
    to find some book bloggers that have reviewed the book Game of Thrones, by George
    R. R. Martin. Give me the links to their blogs. Find bloggers that wrote negatively
    about the book, as well as bloggers that wrote positively about it. Give me a
    list. Make sure that the bloggers you find mostly read fantasy.Prompt 12-1
  id: totrans-1009
  prefs: []
  type: TYPE_NORMAL
  zh: 这个例子将包括与ChatGPT的来回对话，它将利用其网络搜索能力以及参考同一对话中的先前观点。这里的方法将与第[4](641691_1_En_4_Chapter.xhtml)章中涵盖的概念相似，所以如果你想回顾如何使用ChatGPT根据其作为参考的信息来撰写内容，你可以查看那个部分。现在，让我们开始使用提示[12-1](#PC1)。我想让你找到一些已经评论过乔治·R·R·马丁所著《权力的游戏》的博主。给我他们博客的链接。找出那些对这本书持负面评价的博主，以及那些持正面评价的博主。给我一个列表。确保你找到的博主主要阅读奇幻作品。提示12-1
- en: Using ChatGPT to conduct product research for fantasy novels As you can see
    from our prompt, we’re enlisting ChatGPT to find various sources to obtain information
    from bloggers that have reviewed *Game of Thrones* by George R. R. Martin. Not
    only are we trying to get their opinions, we’re trying to specifically get the
    opinions that matter most to us—fans of fantasy. This will give us the viewpoint
    of an already-engaged audience in this genre. Response [12-1](#PC2) shows the
    answer we got from ChatGPT.Here is a list of book bloggers who have reviewed *A
    Game of Thrones* by George R.R. Martin, with both negative and positive perspectives,
    focusing on bloggers who primarily review fantasy literature:**Negative Reviews:**1\.
    **Kelson Vibber** - On the blog *Hyperborea*, Kelson Vibber found *A Game of Thrones*
    difficult to get into, describing it as a "tedious" read with characters he struggled
    to care about. He compared it unfavorably to other epic fantasies like *The Wheel
    of Time*.2\. **John Daulton** - On his blog *John Daulton Books*, Daulton criticized
    the book for its unnecessary sexual content and inconsistent dialogue, though
    he did praise its descriptive passages and character depth.3\. **Fantasy Book
    Review** - A reviewer on *Fantasy Book Review* expressed frustration with the
    character development, stating that the emphasis on morally gray characters made
    it hard to care about them, ultimately finding the book boring despite its creative
    world-building.**Positive Reviews:**1\. **Books of Brilliance** - *Books of Brilliance*
    praised *A Game of Thrones* as a must-read for fantasy lovers, emphasizing its
    detailed world-building and its importance in redefining the fantasy genre.2\.
    **Tommye** - On *The Fantasy Review*, Tommye praised *A Game of Thrones* for its
    complex politics and intricate character relationships, ranking it as one of the
    top epic fantasies.3\. **Fantasy Book Review** - Another review on *Fantasy Book
    Review* from a different reviewer lauded the novel as one of the greatest fantasy
    works, highlighting its suspenseful narrative and emotional depth.These bloggers
    provide a balanced view of the book, with some focusing on its flaws and others
    on its strengths, all within the context of the fantasy genre.Response 12-1
  id: totrans-1010
  prefs: []
  type: TYPE_NORMAL
  zh: 使用ChatGPT进行奇幻小说的产品研究，如您从我们的提示中看到的，我们正在召集ChatGPT来寻找各种来源，以获取乔治·R·R·马丁的《权力的游戏》的博客评论者的信息。我们不仅试图获取他们的观点，还试图获取对我们来说最重要的观点——奇幻小说的粉丝。这将给我们提供这个流派中已经参与其中的受众的观点。响应[12-1](#PC2)显示了我们从ChatGPT那里得到的答案。以下是一位评论了乔治·R·R·马丁的《冰与火之歌》的博客评论者列表，包括负面和正面的观点，重点关注主要评论奇幻文学的博客作者：**负面评论：**1.
    **Kelson Vibber** - 在博客*Hyperborea*上，Kelson Vibber发现《冰与火之歌》难以入门，将其描述为“乏味”的阅读，其中的人物让他难以关心。他将它与《时光之轮》等其他史诗奇幻作品进行了不利的比较。2.
    **John Daulton** - 在他的博客*John Daulton Books*上，Daulton批评了书中不必要的性内容和不一致的对话，尽管他赞扬了其描述段落和人物深度。3.
    **Fantasy Book Review** - 一位在*Fantasy Book Review*上的评论者对人物发展表示了挫败感，指出道德灰色地带的人物使得关心他们变得困难，最终尽管其创意的世界构建，他发现这本书很无聊。**正面评论：**1.
    **Books of Brilliance** - *Books of Brilliance*将《冰与火之歌》誉为奇幻爱好者的必读书，强调其详细的世界构建和在重新定义奇幻流派中的重要性。2.
    **Tommye** - 在*The Fantasy Review*上，Tommye赞扬了《冰与火之歌》的复杂政治和错综复杂的人物关系，将其评为顶级史诗奇幻作品之一。3.
    **Fantasy Book Review** - 来自*Fantasy Book Review*的另一篇评论称赞这部小说是伟大的奇幻作品之一，突出了其悬疑的叙事和情感深度。这些博客作者提供了关于这本书的平衡观点，一些作者关注其缺点，而另一些作者关注其优点，所有这些都是在奇幻流派背景下进行的。响应12-1
- en: ChatGPT finds various book reviews of various opinions on Game of Thrones, by
    George R. R. Martin
