  id: totrans-434
  prefs: []
  type: TYPE_NORMAL
  zh: 在探索人工智能的过程中，你会遇到许多技术术语。这里有一个简单的词汇表，帮助你理解基础知识！
- en: '? ? AI Terms You Should Know'
  id: totrans-435
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '? ? 你应该知道的人工智能术语'
- en: '| Term | Definition |'
  id: totrans-436
  prefs: []
  type: TYPE_TB
  zh: '| 术语 | 定义 |'
- en: '| --- | --- |'
  id: totrans-437
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- |'
- en: '| Artificial Intelligence (AI) | Computer systems designed to perform tasks
    that typically require human intelligence, like learning, problem-solving, and
    decision-making. |'
  id: totrans-438
  prefs: []
  type: TYPE_TB
  zh: '| 人工智能（AI） | 设计用于执行通常需要人类智能的任务（如学习、问题解决和决策）的计算机系统。|'
- en: '| Machine Learning (ML) | A subset of AI where computers are trained to learn
    from data and improve over time without being explicitly programmed. |'
  id: totrans-439
  prefs: []
  type: TYPE_TB
  zh: '| 机器学习（ML） | 人工智能的一个子集，其中计算机被训练从数据中学习并在不进行明确编程的情况下随着时间的推移而改进。|'
- en: '| Prompt | A specific request or instruction given to an AI tool to generate
    a response or action. |'
  id: totrans-440
  prefs: []
  type: TYPE_TB
  zh: '| 提示 | 给予人工智能工具以生成响应或执行特定请求或指令的具体请求或指令。|'
- en: '| Chatbot | An AI system that can engage in conversations with humans, often
    used for customer service. |'
  id: totrans-441
  prefs: []
  type: TYPE_TB
  zh: '| 聊天机器人 | 一种可以与人类进行对话的人工智能系统，常用于客户服务。|'
- en: '| Natural Language Processing (NLP) | A field of AI that helps computers understand,
    interpret, and respond to human language. |'
  id: totrans-442
  prefs: []
  type: TYPE_TB
  zh: '| 自然语言处理（NLP） | 人工智能的一个领域，帮助计算机理解、解释和响应人类语言。|'
- en: '| Neural Network | A type of machine learning modeled after the human brain,
    used to identify patterns and make decisions. |'
  id: totrans-443
  prefs: []
  type: TYPE_TB
  zh: '| 神经网络 | 一种模仿人脑的机器学习类型，用于识别模式和做出决策。|'
- en: '| Algorithm | A set of rules or instructions AI follows to complete a task.
    |'
  id: totrans-444
  prefs: []
  type: TYPE_TB
  zh: '| 算法 | 人工智能完成任务时遵循的一组规则或指令。|'
- en: '| Generative AI | AI systems that create new content (text, images, music,
    etc.) based on patterns learned from data. |'
  id: totrans-445
  prefs: []
  type: TYPE_TB
  zh: '| 生成式人工智能 | 基于从数据中学习到的模式创建新内容（文本、图像、音乐等）的人工智能系统。|'
- en: '| AI Ethics | The study of the moral implications of AI, ensuring that AI is
    used fairly, safely, and without bias. |'
  id: totrans-446
  prefs: []
  type: TYPE_TB
  zh: '| 人工智能伦理 | 研究人工智能的道德影响，确保人工智能被公平、安全且无偏见地使用。|'
- en: '? ? Bonus : Add any new AI terms you learn along the way. This glossary can
    grow with you!'
  id: totrans-447
  prefs: []
  type: TYPE_NORMAL
  zh: '? ? 奖励：添加你在学习过程中学到的任何新人工智能术语。这个词汇表可以随着你一起成长！'
