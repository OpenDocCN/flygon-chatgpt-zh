- en: 'Step 3: Use Format Instructions'
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 第3步：使用格式指令
- en: 'You can ask ChatGPT to deliver its answers in:'
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以要求ChatGPT以以下方式提供其答案：
- en: Lists
  id: totrans-135
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 列表
- en: Tables
  id: totrans-136
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 表格
- en: Headings and subheadings
  id: totrans-137
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 标题和副标题
- en: JSON or Markdown
  id: totrans-138
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: JSON或Markdown
- en: Even role-based replies (e.g. “Answer as a tutor”)
  id: totrans-139
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 即使是基于角色的回复（例如，“以导师的身份回答”）
- en: “Give me a table comparing 3 email marketing tools by price and features.”
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: “给我一个按价格和功能比较3个电子邮件营销工具的表格。”
- en: “Write an article draft in Markdown format for my blog.”
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: “用Markdown格式为我写一篇文章草稿。”
- en: '![](image_rsrcV3.jpg)'
  id: totrans-142
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrcV3.jpg)'
