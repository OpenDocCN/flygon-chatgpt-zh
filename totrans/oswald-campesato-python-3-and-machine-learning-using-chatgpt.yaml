  type: TYPE_NORMAL
- en: CHATGPT AND DATA VISUALIZATION
  prefs: []
  type: TYPE_NORMAL
- en: This chapter contains examples of using ChatGPT and GPT-4 to perform data visualization,
    such as charts and graphs that are based on datasets (e.g., the Titanic dataset).
    ChatGPT generated all the code samples via the Advanced Data Analysis plugin.
    ChatGPT also generated some of the accompanying text for the Python-based code
    samples.
  prefs: []
  type: TYPE_NORMAL
- en: The first part of this chapter describes the process of uploading a dataset
    in ChatGPT and then providing prompts for tasks such as explaining the features
    in a given dataset, generating visualizations, and downloading the curated dataset.
    You will also learn how to prompt ChatGPT to create and train a machine learning
    model.
  prefs: []
  type: TYPE_NORMAL
- en: The second part of this chapter contains examples of data visualization with
    Matplotlib, where the code samples were generated with ChatGPT. The third part
    of this chapter contains examples of data visualization with Seaborn, where the
    code samples were generated with ChatGPT.
  prefs: []
  type: TYPE_NORMAL
- en: Before you read the material in this chapter, please keep in mind that some
    formatting has been applied to the AI content that GPT-4 has generated in this
    chapter as well as [Chapters 5](13_ch05.xhtml), [6](14_ch06.xhtml), and [7](15_ch07.xhtml).
    However, the additional formatting has been kept to a minimum so that you will
    become familiar with the style of GPT-4.
  prefs: []
