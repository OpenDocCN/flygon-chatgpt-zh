  zh: 在**2018**年，**马斯克**离开公司同年，**OpenAI**发布了一篇题为《通过生成式预训练改进语言理解》的研究论文。虽然这个标题可能听起来像是一篇论文的冗长标题，但其中重要的部分在于最后两个词：**生成式预训练**。这是**生成式预训练转换器**这一概念首次被提出，一个将导致我们正在经历的AI革命的想法。如果你还没有弄清楚，生成式预训练转换器的缩写是**GPT**。
