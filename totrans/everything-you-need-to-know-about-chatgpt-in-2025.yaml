  prefs: []
  type: TYPE_NORMAL
  zh: 在这个背景下，**一种**提出的解决方案是**创造**新的工作和**专门**的角色。随着人工智能**承担**更多重复性和结构化的任务，**对**需要**专门**技能的**新**工作岗位的需求**出现**，这些技能包括监控、分析、编程和维护人工智能系统。人工智能工程师、数字伦理学家和**人机界面**设计师是**一些**可能随着技术发展而**增长**的角色。这些职位不仅对于人工智能系统的**运营**是**必要**的，而且对于解决与它们融入社会和经济相关的**复杂**问题也是**必要**的。
