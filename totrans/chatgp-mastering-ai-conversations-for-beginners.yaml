  id: totrans-883
  prefs: []
  type: TYPE_NORMAL
  zh: '**尽管**它可能意味着将ChatGPT与这些现代“哲学家和女性”一起使用，但它有助于我们以相同的方式思考当我们提供敏感数据和个人信息时我们的生成式AI聊天机器人。**就像你不会发送你的密码、银行详情等，所以你也不应该将它们输入到为ChatGPT编写的提示中。**同样，也不要在提示中包含知识产权或商业机密。**重要的是要记住，无论你与ChatGPT分享什么信息，这些信息都会被添加到其不断增长的数据库中，并且由于ChatGPT的数据库位于公共领域，你的个人信息将变得对公众可访问。'
