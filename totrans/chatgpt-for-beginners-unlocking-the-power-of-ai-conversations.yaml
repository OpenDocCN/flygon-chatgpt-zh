    ****Wo**rk**:  ****Pres**entin**g ****A**I**-****gene**rate**d ****con**ten**t
    ****a**s** ****ent**irel**y ****yo**ur** ****o**wn** ****vio**late**s ****eth**ica**l
    ****stan**dard**s ****i**n** ****ma**ny** ****con**text**s.'
  id: totrans-806
  prefs: []
  type: TYPE_NORMAL
  zh: '**在学术或专业工作中滥用：** 将 AI 生成的全部内容作为自己的作品呈现，在许多情况下违反了伦理标准。'
- en: '****Be**st** ****Prac**tice**s:'
