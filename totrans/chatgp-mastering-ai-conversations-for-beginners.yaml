  zh: 在本章中，我们展示了如何通过使用它来编写代码或教你一门新语言，我们可以如何通过**ChatGPT**这个强大的工具来拓展其边界。延续这个节奏，我们现在将更进一步，超越这个革命性技术的更结构化、更关键的应用，看看它如何能够变得多么有创造力。我们之前在书中提到，创造力，以及能够捕捉上下文，是OpenAI的深度学习LLM在人类所能做到的事情上有所欠缺的两个领域。虽然这一点（以及未来可预见的未来）仍然如此，但**ChatGPT**在正确确定提示上下文的能力以及生成创造性内容的能力上正在迅速进步。它最近还为其技能组合增加了一些新技能：那就是“艺术家”和“讲故事的人”。在本节中，我们将看到**ChatGPT**是如何不断突破其极限，随着它变得越来越能够生产创造性作品。
