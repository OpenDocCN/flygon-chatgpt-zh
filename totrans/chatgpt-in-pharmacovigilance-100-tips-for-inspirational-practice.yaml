  id: totrans-328
  prefs: []
  type: TYPE_TB
  zh: '| 泰国 | 2022 | 国家人工智能战略和行动计划（2022）：目标：到2027年通过人工智能促进经济增长和生活质量。目标：发展技能和技术，推动经济增长，并做出社会和环境贡献。策略：解决人工智能的社会、伦理和法律维度。2027年目标：教育60万泰国人了解人工智能法律/伦理，执行人工智能法规，使泰国在人工智能准备指数排名前50位，每年增加10%的数字投资，培养30,000名人工智能专业人士，并创建100个研发原型。
    |'
- en: '| United Kingdom | 2023 | A pro-innovation approach to AI regulation[https://www.gov.uk/government/publications/ai-regulation-a-pro-innovation-approach/white-paper](https://www.gov.uk/government/publications/ai-regulation-a-pro-innovation-approach/white-paper)The
    UK stresses AI''s role in public services, job creation, and skills advancement.
