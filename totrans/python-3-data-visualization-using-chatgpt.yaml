- en: '**Testing for Digits and Alphabetic Characters**'
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Python enables you to examine each character in a string and then test whether
    that character is a bona fide digit or an alphabetic character. This section provides
