- en: '**OUTPUT AUDIENCE Component**'
  prefs: []
  type: TYPE_NORMAL
- en: Understanding the [AUDIENCE] is crucial to AI. When crafting instructions, consider
    the "persona" consuming the output. Their education level, vocabulary, and intended
    use should all influence how AI tailors its response.
