    to Action like "Learn More" or "Buy Now")
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Style consistent with your brand
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Target audience representation (if applicable)
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Your Prompt:*'
  prefs: []
  type: TYPE_NORMAL
