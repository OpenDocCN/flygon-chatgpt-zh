  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3. 提示工程的艺术：提出正确的问题
- en: '4\. Productivity Superpowers: Using ChatGPT for Work & Business'
  id: totrans-8
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4. 生产力超级能力：利用ChatGPT进行工作和商业
- en: '5\. Creative Companion: Writing, Storytelling, and Content Creation'
  id: totrans-9
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 5. 创意伴侣：写作、讲故事和内容创作
- en: '6\. Learning & Growth: ChatGPT as Your Personal Tutor'
  id: totrans-10
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 6. 学习与成长：ChatGPT作为你的个人导师
- en: '7\. Ethical AI: The Do’s and Don’ts of ChatGPT'
  id: totrans-11
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 7. 道德AI：ChatGPT的应做与不应做的事
- en: '8\. The Future of AI: What’s Next for ChatGPT and Beyond?'
  id: totrans-12
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 8. AI的未来：ChatGPT及其超越的未来是什么？
