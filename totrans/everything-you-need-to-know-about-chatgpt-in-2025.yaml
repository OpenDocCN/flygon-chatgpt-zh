  prefs: []
  type: TYPE_NORMAL
  zh: 其中一个主要担忧是数据收集的范围。AI系统需要数据才能有效运行，但我们应该允许这些模型访问我们多少个人信息？虽然AI平台可以提供增强用户体验的功能，例如个性化内容或预测需求，但它们也面临着收集超出必要范围的信息的风险，例如行为模式、偏好和敏感数据。
