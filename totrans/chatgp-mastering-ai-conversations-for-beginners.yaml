  zh: 为了有效地以目标为导向和协作，AI 也需要能够根据上下文做出反应。你的聊天机器人越能阅读到与客户交谈时的情境，其对话设计技能就会越好。虽然 AI 无法每次都能在上下文中做出反应，但有一些技巧可以帮助使你的聊天机器人至少看起来更具有情境意识。第一个技巧是尽可能从听起来自动或机械的消息中引导清晰。这意味着尽可能个性化你的聊天机器人的“问候语”，例如，通过创建不同的问候语，取决于机器人是向第一次访问你网站的访客说“你好”，还是向已经通过绳索的访客说“你好”。
