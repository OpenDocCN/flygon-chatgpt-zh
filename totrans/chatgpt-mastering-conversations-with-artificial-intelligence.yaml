  zh: 助理角色：
- en: '*GPT Assistant, assume the role of a tech expert.*'
  id: totrans-473
  prefs: []
  type: TYPE_NORMAL
  zh: '*GPT 助手，扮演技术专家的角色。*'
- en: 'Assistant Task:'
  id: totrans-474
  prefs: []
  type: TYPE_NORMAL
  zh: 助理任务：
- en: '*Suggest the best computer components for a high-end gaming PC within a reasonable
    budget.*'
