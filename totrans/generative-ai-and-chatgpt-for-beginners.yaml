  id: totrans-542
  prefs: []
  type: TYPE_NORMAL
  zh: 图46. ChatGPT数据分析示例
- en: In the image above, ChatGPT was able to correctly describe the columns present
    in the dataset as well as their purposes.
  id: totrans-543
  prefs: []
  type: TYPE_NORMAL
  zh: 在上面的图像中，ChatGPT能够正确描述数据集中存在的列以及它们的作用。
- en: 'Under the hood, ChatGPT will write and run Python code to perform the data
    analysis. If you want to see the code generated by ChatGPT, you can click on the
    small console icon ([>_]) that appears at the end of the answer as shown below:'
  id: totrans-544
  prefs: []
  type: TYPE_NORMAL
  zh: 在底层，ChatGPT将编写并运行Python代码以执行数据分析。如果你想查看ChatGPT生成的代码，可以点击答案末尾出现的较小控制台图标([>_])，如下所示：
- en: '![5 da show code](image_rsrc1KK.jpg)'
  id: totrans-545
  prefs: []
  type: TYPE_IMG
  zh: '![5 da show code](image_rsrc1KK.jpg)'
- en: Figure 47\. ChatGPT Show Data Analysis Code
  id: totrans-546
  prefs: []
  type: TYPE_NORMAL
  zh: 图47. ChatGPT展示数据分析代码
- en: 'Next, I asked for the top 10 happiest countries plotted as a bar chart:'
  id: totrans-547
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我要求绘制一个柱状图，显示前10个最幸福的国家：
- en: '![5 da 2](image_rsrc1KM.jpg)'
  id: totrans-548
  prefs: []
  type: TYPE_IMG
  zh: '![5 da 2](image_rsrc1KM.jpg)'
- en: Figure 48\. Creating a Bar Chart
  id: totrans-549
  prefs: []
  type: TYPE_NORMAL
  zh: 图48. 创建柱状图
- en: 'I can also visualize correlations between the happiness score and its factors:'
  id: totrans-550
  prefs: []
  type: TYPE_NORMAL
  zh: 我还可以可视化幸福分数与其因素之间的相关性：
- en: '![5 da 3](image_rsrc1KN.jpg)'
  id: totrans-551
  prefs: []
  type: TYPE_IMG
  zh: '![5 da 3](image_rsrc1KN.jpg)'
- en: Figure 49\. Creating a Correlation Matrix
  id: totrans-552
  prefs: []
  type: TYPE_NORMAL
  zh: 图49. 创建相关矩阵
- en: 'Or plot a trend graph visualizing the happiness trend in a specific country.
    For example, I asked for the trend graph of Japan:'
  id: totrans-553
  prefs: []
  type: TYPE_NORMAL
  zh: 或者绘制一个趋势图，可视化特定国家的幸福趋势。例如，我要求了日本的趋势图：
- en: '![5 da 4](image_rsrc1KP.jpg)'
  id: totrans-554
  prefs: []
  type: TYPE_IMG
  zh: '![5 da 4](image_rsrc1KP.jpg)'
- en: Figure 50\. Creating a Trend Graph
  id: totrans-555
  prefs: []
  type: TYPE_NORMAL
  zh: 图50. 创建趋势图
- en: 'Then I compare the trend graph between Japan and Canada:'
  id: totrans-556
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，我比较了日本和加拿大的趋势图：
- en: '![5 da 5](image_rsrc1KR.jpg)'
  id: totrans-557
  prefs: []
  type: TYPE_IMG
  zh: '![5 da 5](image_rsrc1KR.jpg)'
- en: Figure 51\. Comparing Two Trend Graphs
  id: totrans-558
  prefs: []
  type: TYPE_NORMAL
  zh: 图51. 比较两个趋势图
- en: You can view the Python code executed by ChatGPT to create all the charts above
    by clicking the small console icon by the end of the answer.
  id: totrans-559
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以通过点击答案末尾的小控制台图标来查看ChatGPT执行以创建所有上述图表的Python代码。
- en: The ability to write and run Python code means that ChatGPT can assist you with
    various types of analysis and prediction, including hypothesis testing, linear
    regression, and plotting trend graphs.
  id: totrans-560
  prefs: []
  type: TYPE_NORMAL
  zh: 编写和运行Python代码的能力意味着ChatGPT可以帮助你进行各种类型的分析和预测，包括假设检验、线性回归和绘制趋势图。
- en: Keep in mind that you still need to verify the results produced by ChatGPT.
    Without proper knowledge, you might end up with invalid results.
  id: totrans-561
  prefs: []
  type: TYPE_NORMAL
  zh: 请记住，你仍然需要验证ChatGPT产生的结果。如果没有适当的知识，你可能会得到无效的结果。
- en: Summary
  id: totrans-562
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: ChatGPT Plus offers several advanced features, including image generation with
    DALL-E, real-time web browsing, and enhanced data analysis capabilities.
  id: totrans-563
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT Plus提供了一些高级功能，包括使用DALL-E进行图像生成、实时网络浏览和增强数据分析能力。
- en: These features, combined with higher usage limits, make ChatGPT Plus an excellent
    productivity tool for both personal and professional use.
  id: totrans-564
  prefs: []
  type: TYPE_NORMAL
  zh: 这些功能，结合更高的使用限制，使ChatGPT Plus成为个人和专业人士使用的优秀生产力工具。
- en: If you find ChatGPT useful and you hit the free tier limit a lot, then you probably
    won’t regret upgrading to the Plus plan.
  id: totrans-565
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你发现ChatGPT很有用，并且经常达到免费层限制，那么你可能不会后悔升级到Plus计划。
- en: Next, we’re going to explore how to create and share custom GPTs.
  id: totrans-566
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们将探讨如何创建和分享自定义GPT。
- en: 'Chapter 6: Using and Creating Custom GPTs'
  id: totrans-567
  prefs: []
  type: TYPE_NORMAL
  zh: 第六章：使用和创建自定义 GPT
- en: A custom GPT is a personalized version of ChatGPT designed to perform specific
    purposes.
  id: totrans-568
  prefs: []
  type: TYPE_NORMAL
  zh: 自定义 GPT 是为 ChatGPT 定制的个性化版本，旨在执行特定目的。
- en: The personalization is done by giving ChatGPT a series of instructions, uploading
    documents to augment the AI knowledge, and integrating third-party services so
    that ChatGPT can perform actions, such as generating a design or searching for
    the cheapest flight schedule.
  id: totrans-569
  prefs: []
  type: TYPE_NORMAL
  zh: 个性化是通过给 ChatGPT 一系列指令、上传文档以增强 AI 知识以及集成第三方服务来实现的，这样 ChatGPT 就可以执行诸如生成设计或搜索最便宜的航班时刻表等操作。
- en: With a custom GPT, you can provide a specific context for the conversation permanently.
    This means you don’t need to repeat the same context each time you create a new
    chat session.
  id: totrans-570
  prefs: []
  type: TYPE_NORMAL
  zh: 使用自定义 GPT，你可以为对话提供特定的上下文，使其永久存在。这意味着你不需要在每次创建新的聊天会话时重复相同的上下文。
- en: You can also give specific knowledge such as the latest documentation of your
    business procedure or key performance indicator (KPI) criteria to make the interaction
    with AI more productive.
  id: totrans-571
  prefs: []
  type: TYPE_NORMAL
  zh: 你也可以提供特定的知识，例如你业务流程的最新文档或关键绩效指标（KPI）标准，以使与 AI 的互动更加高效。
- en: When correctly implemented, a custom GPT will save you hundreds of hours in
    the future. This chapter will explore how to use an existing custom GPT and then
    learn how to create one from scratch.
  id: totrans-572
  prefs: []
  type: TYPE_NORMAL
  zh: 当正确实施时，自定义 GPT 将在未来为你节省数百小时。本章将探讨如何使用现有的自定义 GPT，然后学习如何从头开始创建一个。
- en: GPT Store Introduction
  id: totrans-573
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: GPT 商店介绍
- en: The GPT store is the online store for custom GPTs, you can create, share, and
    discover custom GPTs created by other ChatGPT users in this platform.
  id: totrans-574
  prefs: []
  type: TYPE_NORMAL
  zh: GPT 商店是自定义 GPT 的在线商店，你可以在该平台上创建、分享和发现其他 ChatGPT 用户创建的自定义 GPT。
- en: 'To access the platform, click on the Explore GPTs menu on the sidebar. You’ll
    then be presented with the most popular GPTs and a search bar:'
  id: totrans-575
  prefs: []
  type: TYPE_NORMAL
  zh: 要访问平台，请点击侧边栏上的“探索 GPT”菜单。然后，你会看到最受欢迎的 GPT 和一个搜索栏：
- en: '![3 custom gpts](image_rsrc1KC.jpg)'
  id: totrans-576
  prefs: []
  type: TYPE_IMG
  zh: '![3 custom gpts](image_rsrc1KC.jpg)'
- en: Figure 52\. Exploring Custom GPTs
  id: totrans-577
  prefs: []
  type: TYPE_NORMAL
  zh: 图 52\. 探索自定义 GPT
- en: All GPTs on this platform can be used for free, so just select the one you are
    interested in to see the details of the GPT.
  id: totrans-578
  prefs: []
  type: TYPE_NORMAL
  zh: 该平台上的所有 GPT 都可免费使用，所以只需选择你感兴趣的一个，即可查看 GPT 的详细信息。
- en: 'If you’d like to try the GPT out, click Start Chat to begin conversing with
    the GPT. A new chat screen will appear, and you will be shown four conversation
    starters. Here’s an example when chatting with Canva GPT:'
  id: totrans-579
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想要尝试 GPT，点击“开始聊天”以开始与 GPT 进行对话。会出现一个新的聊天窗口，并展示四个对话起始点。以下是与 Canva GPT 聊天的示例：
- en: '![6 gpt start chat](image_rsrc1KS.jpg)'
  id: totrans-580
  prefs: []
  type: TYPE_IMG
  zh: '![6 gpt start chat](image_rsrc1KS.jpg)'
- en: Figure 53\. Start Chatting With Custom GPT
  id: totrans-581
  prefs: []
  type: TYPE_NORMAL
  zh: 图 53\. 开始与自定义 GPT 聊天
- en: A custom GPT may have access to third-party services to perform specific actions.
    For example, the Canva GPT can make use of Canva services to create designs.
  id: totrans-582
  prefs: []
  type: TYPE_NORMAL
  zh: 自定义 GPT 可能可以访问第三方服务以执行特定操作。例如，Canva GPT 可以利用 Canva 服务来创建设计。
- en: 'First, I asked Canva GPT to create the following graphic:'
  id: totrans-583
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，我要求 Canva GPT 创建以下图形：
- en: Create an inspirational graphic with the quote 'seize the day' for social media
  id: totrans-584
  prefs: []
  type: TYPE_NORMAL
  zh: 为社交媒体创建一个带有“抓住今天”引言的灵感图形
- en: 'Canva GPT will then ask for your permission to connect with Canva services
    and you can choose to Allow or Decline this request:'
  id: totrans-585
  prefs: []
  type: TYPE_NORMAL
  zh: Canva GPT 将会请求你的许可以连接到 Canva 服务，你可以选择允许或拒绝此请求：
- en: '![6 gpt permission request](image_rsrc1KT.jpg)'
  id: totrans-586
  prefs: []
  type: TYPE_IMG
  zh: '![6 gpt permission request](image_rsrc1KT.jpg)'
- en: Figure 54\. Custom GPT Asking for Permission
  id: totrans-587
  prefs: []
  type: TYPE_NORMAL
  zh: 图 54\. 自定义 GPT 请求许可
- en: 'When you click Allow, Canva GPT will create one or two designs following your
    prompt. You can click on the design to view the details:'
  id: totrans-588
  prefs: []
  type: TYPE_NORMAL
  zh: 当你点击“允许”时，Canva GPT 将根据你的提示创建一个或两个设计。你可以点击设计查看详细信息：
- en: '![6 gpt output](image_rsrc1KU.jpg)'
  id: totrans-589
  prefs: []
  type: TYPE_IMG
  zh: '![6 gpt output](image_rsrc1KU.jpg)'
- en: Figure 55\. Custom GPT Output
  id: totrans-590
  prefs: []
  type: TYPE_NORMAL
  zh: 图 55\. 自定义 GPT 输出
- en: And that’s how you use Custom GPTs in a nutshell. You can try chatting with
    any other GPTs that interest you.
  id: totrans-591
  prefs: []
  type: TYPE_NORMAL
  zh: 简而言之，这就是如何使用自定义 GPT 的方法。你可以尝试与任何其他你感兴趣的 GPT 进行聊天。
- en: Creating a Custom GPT
  id: totrans-592
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 创建自定义 GPT
- en: Let’s begin creating our first custom GPT. For this example, we’re going to
    create a GPT for evaluating the IELTS Writing Task Answers.
  id: totrans-593
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们开始创建我们的第一个自定义 GPT。在这个例子中，我们将创建一个用于评估 IELTS 写作任务答案的 GPT。
- en: The IELTS test is an official English language proficiency test essential for
    those aiming to study, work, or migrate to English-speaking countries.
  id: totrans-594
  prefs: []
  type: TYPE_NORMAL
  zh: IELTS 测试是对那些希望学习、工作或移民到英语国家的人来说必不可少的官方英语水平测试。
- en: We’re going to upload a document describing the key assessment criteria[[4]](part0015.xhtml#a1G7)
    for the IELTS answer and give a score for the user’s answers.
  id: totrans-595
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将上传一份描述 IELTS 答案关键评估标准的文档[[4]](part0015.xhtml#a1G7)，并为用户的答案评分。
- en: 'To create a custom GPT, you need to click on the + Create button shown on the
    GPT store main screen:'
  id: totrans-596
  prefs: []
  type: TYPE_NORMAL
  zh: 要创建自定义 GPT，您需要点击 GPT 商店主屏幕上显示的“+ 创建”按钮：
- en: '![6 create gpt button](image_rsrc1KV.jpg)'
  id: totrans-597
  prefs: []
  type: TYPE_IMG
  zh: '![6 创建 GPT 按钮](image_rsrc1KV.jpg)'
- en: Figure 56\. Creating a Custom GPT
  id: totrans-598
  prefs: []
  type: TYPE_NORMAL
  zh: 图 56\. 创建自定义 GPT
- en: 'You will be directed to the GPT editor screen, where you can create the GPT
    on the left and test it on the right:'
  id: totrans-599
  prefs: []
  type: TYPE_NORMAL
  zh: 您将被引导到 GPT 编辑器屏幕，在那里您可以在左侧创建 GPT，在右侧测试它：
- en: '![6 gpt editor](image_rsrc1KW.jpg)'
  id: totrans-600
  prefs: []
  type: TYPE_IMG
  zh: '![6 GPT 编辑器](image_rsrc1KW.jpg)'
- en: Figure 57\. GPT Editor Screen
  id: totrans-601
  prefs: []
  type: TYPE_NORMAL
  zh: 图 57\. GPT 编辑器屏幕
- en: 'You also have two options to build the custom GPT: Chat with the GPT Builder
    bot or configure the GPT manually.'
  id: totrans-602
  prefs: []
  type: TYPE_NORMAL
  zh: 您也有两种方式来构建自定义的 GPT：与 GPT Builder 机器人聊天或手动配置 GPT。
- en: If you open the Configure tab, you’ll see that the custom GPT parameters are
    all empty. As you chat with the GPT Builder on the Create tab, the parameters
    here will be filled.
  id: totrans-603
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您打开配置选项卡，您会看到自定义 GPT 参数都是空的。当您在创建选项卡上与 GPT Builder 聊天时，这里的参数将会被填充。
- en: 'Let’s start by describing what we want to GPT Builder:'
  id: totrans-604
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们先描述一下我们想要 GPT Builder 做的事情：
- en: I want to create an assistant for evaluating my IELTS writing task answer.
  id: totrans-605
  prefs: []
  type: TYPE_NORMAL
  zh: 我想创建一个评估我的 IELTS 写作任务答案的助手。
- en: 'The builder will start generating a draft GPT for you as shown below:'
  id: totrans-606
  prefs: []
  type: TYPE_NORMAL
  zh: 构建者将开始为您生成一个草稿 GPT，如下所示：
- en: '![6 gpt start](image_rsrc1KX.jpg)'
  id: totrans-607
  prefs: []
  type: TYPE_IMG
  zh: '![6 GPT 开始](image_rsrc1KX.jpg)'
- en: Figure 58\. Interacting With GPT Builder
  id: totrans-608
  prefs: []
  type: TYPE_NORMAL
  zh: 图 58\. 与 GPT Builder 交互
- en: 'I prefer to use the name ''IELTS Writing Coach'', so I instructed GPT Builder
    to change the name and generate a logo for me:'
  id: totrans-609
  prefs: []
  type: TYPE_NORMAL
  zh: 我更喜欢使用“IELTS 写作教练”这个名字，所以我指示 GPT Builder 为我更改名称并生成一个标志：
- en: Let's use IELTS Writing Coach instead. And please generate a logo for this GPT
  id: totrans-610
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们使用 IELTS Writing Coach。并且请为这个 GPT 生成一个标志
- en: 'The GPT Builder will use DALL-E to generate the logo. If you don’t like the
    logo, you can upload your own image or ask it to generate another one as shown
    below:'
  id: totrans-611
  prefs: []
  type: TYPE_NORMAL
  zh: GPT Builder 将使用 DALL-E 生成标志。如果您不喜欢这个标志，您可以上传自己的图片或要求它生成另一个，如下所示：
- en: '![6 change gpt logo](image_rsrc1KY.jpg)'
  id: totrans-612
  prefs: []
  type: TYPE_IMG
  zh: '![6 更改 GPT 标志](image_rsrc1KY.jpg)'
- en: Figure 59\. Generating GPT Logo
  id: totrans-613
  prefs: []
  type: TYPE_NORMAL
  zh: 图 59\. 生成 GPT 标志
- en: Any changes done to the custom GPT will be saved automatically. You can save
    the custom GPT as a draft until it’s ready for use.
  id: totrans-614
  prefs: []
  type: TYPE_NORMAL
  zh: 对自定义 GPT 所做的任何更改都将自动保存。您可以将自定义 GPT 保存为草稿，直到它准备好使用。
- en: 'Next, I uploaded the file containing the IELTS writing task scoring criteria
    and asked GPT to refer to it when giving feedback:'
  id: totrans-615
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我上传了包含 IELTS 写作任务评分标准的文件，并要求 GPT 在提供反馈时参考它：
- en: '![6 gpt upload document](image_rsrc1KZ.jpg)'
  id: totrans-616
  prefs: []
  type: TYPE_IMG
  zh: '![6 上传 GPT 文档](image_rsrc1KZ.jpg)'
- en: Figure 60\. Uploading Document for GPT to Use
  id: totrans-617
  prefs: []
  type: TYPE_NORMAL
  zh: 图 60\. 为 GPT 上传文档
- en: 'For the last part, I want to limit how users can interact with the GPT. This
    allows the GPT to focus only on scoring the IELTS writing task answers:'
  id: totrans-618
  prefs: []
  type: TYPE_NORMAL
  zh: 对于最后一部分，我想限制用户与 GPT 的交互方式。这允许 GPT 只专注于评分 IELTS 写作任务的答案：
- en: Great. As the last instruction, please remember that you only evaluate the writing
    task answers.
  id: totrans-619
  prefs: []
  type: TYPE_NORMAL
  zh: 很好。作为最后的指示，请记住您只需评估写作任务的答案。
- en: You need to politely refuse when asked to evaluate the reading, listening, or
    speaking test answers.
  id: totrans-620
  prefs: []
  type: TYPE_NORMAL
  zh: 当被要求评估阅读、听力或口语测试答案时，您需要礼貌地拒绝。
- en: 'And now the GPT is ready for use. If you open the Configure tab, you’ll see
    the GPT parameters are now filled by the GPT Builder:'
  id: totrans-621
  prefs: []
  type: TYPE_NORMAL
  zh: 现在GPT已经准备好使用。如果您打开配置选项卡，您会看到 GPT 参数现在已被 GPT Builder 填充：
- en: '![6 gpt detail 1](image_rsrc1M0.jpg)'
  id: totrans-622
  prefs: []
  type: TYPE_IMG
  zh: '![6 GPT 详细 1](image_rsrc1M0.jpg)'
- en: Figure 61\. GPT Parameters Auto-filled
  id: totrans-623
  prefs: []
  type: TYPE_NORMAL
  zh: 图 61\. GPT 参数自动填充
- en: You can edit any of this information as you need. The Name and Description inputs
    are used to describe the GPT to the users. The Instructions input provides the
    GPT with context. What does the GPT do and what it needs to avoid doing?
  id: totrans-624
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以根据需要编辑任何这些信息。名称和描述输入用于向用户描述 GPT。说明输入为 GPT 提供上下文。GPT 做什么以及它需要避免做什么？
- en: Below that, you have the Conversation starters input that serves as the template
    for users when starting a new conversation. It’s recommended to add 4 starters
    here.
  id: totrans-625
  prefs: []
  type: TYPE_NORMAL
  zh: 在下面，您有用于用户开始新对话的对话起始输入，它作为模板使用。建议在这里添加 4 个起始点。
- en: 'The Knowledge input is where you upload the documents relevant to the GPT tasks.
    Here, there’s only one PDF file which contains the IELTS writing key assessment
    criteria:'
  id: totrans-626
  prefs: []
  type: TYPE_NORMAL
  zh: 知识输入是您上传与 GPT 任务相关的文档的地方。这里只有一个包含 IELTS 写作关键评估标准的 PDF 文件：
- en: '![6 gpt detail 2](image_rsrc1M1.jpg)'
  id: totrans-627
  prefs: []
  type: TYPE_IMG
  zh: '![6 gpt detail 2](image_rsrc1M1.jpg)'
- en: Figure 62\. More GPT Details
  id: totrans-628
  prefs: []
  type: TYPE_NORMAL
  zh: 图 62. 更多 GPT 详细信息
- en: The Capabilities input determines whether the GPT can have extra abilities,
    such as browsing the web, generating images with DALL-E, or running code. Currently,
    these abilities are not needed, so they are not enabled.
  id: totrans-629
  prefs: []
  type: TYPE_NORMAL
  zh: 能力输入决定 GPT 是否可以拥有额外的能力，例如通过 DALL-E 生成图像、浏览网页或运行代码。目前，这些能力不是必需的，因此它们没有被启用。
- en: The Actions input is where you can provide GPT with access to third-party services
    through web APIs. Web APIs are how web applications talk with each other. You
    can upload the API schema in JSON or YAML format here.
  id: totrans-630
  prefs: []
  type: TYPE_NORMAL
  zh: 动作输入是你可以提供 GPT 通过 Web API 访问第三方服务的地方。Web API 是网络应用程序之间通信的方式。你可以在此处上传 API 架构的
    JSON 或 YAML 格式。
- en: Finally, the Additional Settings contains an option to allow ChatGPT to use
    conversation data to improve the overall AI system.
  id: totrans-631
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，附加设置中有一个选项允许 ChatGPT 使用对话数据来改进整体 AI 系统。
- en: Publishing Custom GPT
  id: totrans-632
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 发布自定义 GPT
- en: 'Once you are finished tuning the custom GPT, you can publish the AI by clicking
    on the Create button on the top right corner of the editor screen:'
  id: totrans-633
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦你完成自定义 GPT 的调整，你可以通过点击编辑屏幕右上角的创建按钮来发布 AI：
- en: '![6 publish gpt](image_rsrc1M2.jpg)'
  id: totrans-634
  prefs: []
  type: TYPE_IMG
  zh: '![6 publish gpt](image_rsrc1M2.jpg)'
- en: Figure 63\. Publishing Custom GPT
  id: totrans-635
  prefs: []
  type: TYPE_NORMAL
  zh: 图 63. 发布自定义 GPT
- en: 'You will then see three options to control who can access the GPT:'
  id: totrans-636
  prefs: []
  type: TYPE_NORMAL
  zh: 你将看到三个选项来控制谁可以访问 GPT：
- en: To publish the GPT only for you
  id: totrans-637
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 仅为你自己发布 GPT
- en: To share the link with anyone
  id: totrans-638
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 与任何人分享链接
- en: Put in the GPT store
  id: totrans-639
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 放入 GPT 商店
- en: When you put the GPT in the GPT store, other people can discover and use your
    creation from there.
  id: totrans-640
  prefs: []
  type: TYPE_NORMAL
  zh: 当你将 GPT 放入 GPT 商店时，其他人可以从那里发现并使用你的创作。
- en: Once published, the GPT status will change from 'Draft' to 'Live'.
  id: totrans-641
  prefs: []
  type: TYPE_NORMAL
  zh: 发布后，GPT 状态将从“草稿”变为“实时”。
- en: Congratulations! You have just created your very own custom GPT.
  id: totrans-642
  prefs: []
  type: TYPE_NORMAL
  zh: 恭喜！你刚刚创建了自己的自定义 GPT。
- en: Custom GPT Best Practices
  id: totrans-643
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 自定义 GPT 最佳实践
- en: 'There are five best practices you can use as a guide when creating custom GPT:'
  id: totrans-644
  prefs: []
  type: TYPE_NORMAL
  zh: 在创建自定义 GPT 时，你可以使用以下五个最佳实践作为指导：
- en: 1\. Consider your workflow
  id: totrans-645
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 考虑你的工作流程
- en: Before creating a custom GPT, you need to understand the overall workflow of
    your project. Evaluate your current processes and look for specific areas that
    are repetitive and time-consuming, and figure out how the GPT can aid in specific
    tasks.
  id: totrans-646
  prefs: []
  type: TYPE_NORMAL
  zh: 在创建自定义 GPT 之前，你需要了解你项目的整体工作流程。评估你当前的过程，寻找重复且耗时的工作区域，并找出 GPT 如何在特定任务中提供帮助。
- en: 2\. Assign a specific role for the GPT
  id: totrans-647
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 为 GPT 分配一个特定的角色
- en: A well-defined role helps GPT to perform optimally. Instead of creating one
    GPT to complete five tasks, you might want to assign each task to a specific GPT.
    Whether it’s acting as a virtual assistant, customer service representative, or
    content creator, having a specific role will influence how the GPT will respond.
  id: totrans-648
  prefs: []
  type: TYPE_NORMAL
  zh: 一个明确定义的角色有助于 GPT 优化性能。与其创建一个 GPT 来完成五个任务，你可能会想为每个任务分配一个特定的 GPT。无论是作为虚拟助手、客户服务代表还是内容创作者，特定的角色将影响
    GPT 的响应方式。
- en: 3\. Give just enough context
  id: totrans-649
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 只提供足够多的上下文
- en: Providing the right amount of context is important for GPT to generate accurate
    and relevant responses. Too little context can lead to vague or irrelevant answers,
    while too much can overwhelm the model and reduce efficiency.
  id: totrans-650
  prefs: []
  type: TYPE_NORMAL
  zh: 提供适当数量的上下文对于 GPT 生成准确和相关的响应非常重要。上下文过少可能导致模糊或不相关的答案，而上下文过多可能会使模型不知所措并降低效率。
- en: 4\. Clearly define the task and the desired response tone
  id: totrans-651
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 明确定义任务和期望的响应语气
- en: Defining the task and the tone of the response ensures that the GPT meets your
    expectations and aligns with your vision. It helps in managing user expectations
    and delivering consistent interactions.
  id: totrans-652
  prefs: []
  type: TYPE_NORMAL
  zh: 定义任务和响应的语气确保 GPT 符合你的期望并与你的愿景保持一致。这有助于管理用户期望并确保交互的一致性。
- en: 5\. Organize the information well and update it continuously
  id: totrans-653
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 良好地组织信息并持续更新
- en: The information provided to GPT should be well-organized and regularly updated
    to maintain the accuracy and relevance of its responses. This practice ensures
    that the GPT is equipped with the latest data and structured knowledge to perform
    efficiently.
  id: totrans-654
  prefs: []
  type: TYPE_NORMAL
  zh: 提供给 GPT 的信息应该组织良好并定期更新，以保持其响应的准确性和相关性。这种做法确保 GPT 配备了最新的数据和结构化知识，以高效地执行任务。
- en: Summary
  id: totrans-655
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: Custom GPTs are personalized versions of ChatGPT designed to perform specific
    tasks. By creating custom GPTs, users can set a permanent context for interactions,
    ensuring the AI consistently understands the task at hand without needing repeated
    context explanations.
  id: totrans-656
  prefs: []
  type: TYPE_NORMAL
  zh: 定制GPT是ChatGPT的个性化版本，旨在执行特定任务。通过创建定制GPT，用户可以为交互设置一个永久性的上下文，确保AI始终理解手头的任务，而无需重复解释上下文。
- en: In this chapter, you’ve learned how to create a custom GPT that can assess the
    answers for IELTS writing tasks. You can use the same method to create custom
    GPTs that assist in various tasks.
  id: totrans-657
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，你学习了如何创建一个可以评估IELTS写作任务答案的定制GPT。你可以使用相同的方法创建帮助执行各种任务的定制GPT。
- en: For instance, you can create a custom GPT with your company’s employee KPI criteria
    or content marketing style guidelines so that it can assist users in reviewing
    employee performance or giving feedback on the content marketing materials.
  id: totrans-658
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，你可以创建一个定制的GPT，包含你公司员工的KPI标准或内容营销风格指南，以便它能帮助用户审查员工绩效或对内容营销材料提供反馈。
- en: The best practices guide will help you to create an optimized GPT with the potential
    to save you hundreds of hours in the future.
  id: totrans-659
  prefs: []
  type: TYPE_NORMAL
  zh: 最佳实践指南将帮助你创建一个优化的GPT，未来可能为你节省数百小时。
- en: 'Chapter 7: Generative AI Use Cases'
  id: totrans-660
  prefs: []
  type: TYPE_NORMAL
  zh: 第七章：生成式AI应用案例
- en: Now that you’ve explored the features of the ChatGPT Plus plan, it’s time to
    learn how you can use ChatGPT in various cases you might encounter in your professional
    and personal life.
  id: totrans-661
  prefs: []
  type: TYPE_NORMAL
  zh: 现在你已经了解了ChatGPT Plus计划的特性，是时候学习如何在你的职业和个人生活中遇到的各种情况下使用ChatGPT了。
- en: One of the most prominent applications of Generative AI is in assisting with
    day-to-day activities that require extensive writing, problem-solving, and domain-specific
    knowledge.
  id: totrans-662
  prefs: []
  type: TYPE_NORMAL
  zh: 生成式AI最显著的应用之一是协助日常活动中需要大量写作、问题解决和特定领域知识的情况。
- en: 'Here, we will explore three practical use cases of ChatGPT:'
  id: totrans-663
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，我们将探讨ChatGPT的三个实际应用案例：
- en: '| ​▪​ | Personal assistant |'
  id: totrans-664
  prefs: []
  type: TYPE_TB
  zh: '|  |  |'
- en: '| ​▪​ | Resume feedback and mock interviewing |'
  id: totrans-665
  prefs: []
  type: TYPE_TB
  zh: '|  | 简历反馈和模拟面试 |'
- en: '| ​▪​ | A guide in software development |'
  id: totrans-666
  prefs: []
  type: TYPE_TB
  zh: '|  | 软件开发指南 |'
- en: Through these examples, you’ll see how ChatGPT can improve your workflow, boost
    your productivity, and support your professional growth.
  id: totrans-667
  prefs: []
  type: TYPE_NORMAL
  zh: 通过这些示例，你将看到ChatGPT如何提高你的工作效率，提升你的生产力，并支持你的职业发展。
- en: Personal Assistant
  id: totrans-668
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 个人助理
- en: ChatGPT can be your personal assistant that helps you with many tasks that you
    need to finish throughout your days, especially when the task requires writing
    words.
  id: totrans-669
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT可以成为你的个人助理，帮助你完成日常中需要完成的许多任务，尤其是在需要写作的任务中。
- en: 'For example, ChatGPT can help you draft a business proposal for a certain client:'
  id: totrans-670
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，ChatGPT可以帮助你为客户草拟一份商业提案：
- en: 'Help me draft a business proposal for [Client Name]. Make sure that the proposal
    is thoughtful and fulfills the needs of the client. The project descriptions are
    as follows:'
  id: totrans-671
  prefs: []
  type: TYPE_NORMAL
  zh: 帮我草拟一份针对[客户名称]的商业提案。确保提案深思熟虑并满足客户的需求。项目描述如下：
- en: '[Project Descriptions]'
  id: totrans-672
  prefs: []
  type: TYPE_NORMAL
  zh: '[项目描述]'
- en: You then need to write the client name and project descriptions in the prompt
    above.
  id: totrans-673
  prefs: []
  type: TYPE_NORMAL
  zh: 然后你需要在上述提示中写入客户名称和项目描述。
- en: In another scenario, you might have an issue with your coworkers that impacts
    the performance of your team, and you want to address this issue with them.
  id: totrans-674
  prefs: []
  type: TYPE_NORMAL
  zh: 在另一种情况下，你可能遇到影响团队表现的问题，你希望与他们解决这个问题。
- en: 'You can use ChatGPT to brainstorm for an effective resolution:'
  id: totrans-675
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以使用ChatGPT来头脑风暴一个有效的解决方案：
- en: I'm working in the marketing department, and my team is having an issue because
    of team members who have not been meeting deadlines.
  id: totrans-676
  prefs: []
  type: TYPE_NORMAL
  zh: 我在营销部门工作，我的团队因为一些未能按时完成任务的小组成员而遇到了问题。
- en: I'm not sure how to approach the discussion without offending them, but I need
    to talk to them about this. Could you advise me on how to properly express my
    concerns?
  id: totrans-677
  prefs: []
  type: TYPE_NORMAL
  zh: 我不确定如何在不冒犯他们的前提下进行讨论，但我需要和他们谈谈这个问题。你能给我一些建议，如何恰当地表达我的担忧吗？
- en: 'ChatGPT will help you find a thoughtful approach as shown below:'
  id: totrans-678
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT将帮助你找到以下所示的有益方法：
- en: '![7 chatgpt dealing coworkers](image_rsrc1M3.jpg)'
  id: totrans-679
  prefs: []
  type: TYPE_IMG
  zh: '![7 chatgpt dealing coworkers](image_rsrc1M3.jpg)'
- en: Figure 64\. Using ChatGPT to Write an Email
  id: totrans-680
  prefs: []
  type: TYPE_NORMAL
  zh: 图64. 使用ChatGPT撰写电子邮件
- en: Access the full chat response at [chatgpt.com/share/50f711e2-79ec-480b-9a6a-4cba33c290ca](https://chatgpt.com/share/50f711e2-79ec-480b-9a6a-4cba33c290ca)
  id: totrans-681
  prefs: []
  type: TYPE_NORMAL
  zh: 在[chatgpt.com/share/50f711e2-79ec-480b-9a6a-4cba33c290ca](https://chatgpt.com/share/50f711e2-79ec-480b-9a6a-4cba33c290ca)访问完整的聊天响应。
- en: As you can see, ChatGPT can be used as a helpful personal assistant to figure
    out an effective solution in your life.
  id: totrans-682
  prefs: []
  type: TYPE_NORMAL
  zh: 如您所见，ChatGPT可以用作有用的个人助理，帮助您在生活中找到有效的解决方案。
- en: Resume Feedback and Mock Interviewer
  id: totrans-683
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 简历反馈和模拟面试官
- en: With ChatGPT, you can optimize your resume to highlight the skills and experiences
    that are most relevant to the position you are applying for.
  id: totrans-684
  prefs: []
  type: TYPE_NORMAL
  zh: 使用ChatGPT，您可以优化简历，突出与您申请的职位最相关的技能和经验。
- en: 'Here’s an example prompt you can use to get resume feedback:'
  id: totrans-685
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一个您可以使用的示例提示来获取简历反馈：
- en: 'Optimize my resume for [Job Title] by highlighting my most relevant experiences
    and skills. The job description is as follows:'
  id: totrans-686
  prefs: []
  type: TYPE_NORMAL
  zh: 通过突出我最相关的经验和技能，优化我的[职位名称]简历。职位描述如下：
- en: '[Job Description]'
  id: totrans-687
  prefs: []
  type: TYPE_NORMAL
  zh: '[职位描述]'
- en: 'My current resume is as follows:'
  id: totrans-688
  prefs: []
  type: TYPE_NORMAL
  zh: 我当前的简历如下：
- en: '[Your Resume]'
  id: totrans-689
  prefs: []
  type: TYPE_NORMAL
  zh: '[您的简历]'
- en: Focus on my role in [Project/Event] and my proficiency in [Skill], making sure
    to present this information in a way that's engaging and ATS-friendly.
  id: totrans-690
  prefs: []
  type: TYPE_NORMAL
  zh: 专注于我在[项目/活动]中的角色以及我在[技能]方面的熟练度，确保以吸引人和ATS友好的方式呈现这些信息。
- en: Also, suggest strong action verbs and quantifiable outcomes that I might add
    for maximum impact.
  id: totrans-691
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，建议使用强有力的动词和可衡量的成果，以便我能够添加以产生最大影响。
- en: Input your details as hinted above, and ChatGPT will analyze the given information
    to help you improve the resume.
  id: totrans-692
  prefs: []
  type: TYPE_NORMAL
  zh: 按照上述提示输入您的详细信息，ChatGPT将分析提供的信息以帮助您改进简历。
- en: Next, ChatGPT can assist you with interview preparation by proposing questions
    that are relevant to the job you are applying for.
  id: totrans-693
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，ChatGPT可以通过提出与您申请的职位相关的疑问来帮助您准备面试。
- en: 'Use the following prompt and enter your details:'
  id: totrans-694
  prefs: []
  type: TYPE_NORMAL
  zh: 使用以下提示并输入您的详细信息：
- en: Propose a list of interview questions that are commonly asked for the [Job Title]
    position, focusing on behavioral and technical questions.
  id: totrans-695
  prefs: []
  type: TYPE_NORMAL
  zh: 提出一组针对[职位名称]职位的常见面试问题，重点关注行为和技术问题。
- en: 'The job descriptions are as follows:'
  id: totrans-696
  prefs: []
  type: TYPE_NORMAL
  zh: 职位描述如下：
- en: '[Job Descriptions]'
  id: totrans-697
  prefs: []
  type: TYPE_NORMAL
  zh: '[职位描述]'
- en: 'And here''s my resume:'
  id: totrans-698
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是我的简历：
- en: '[Your Resume]'
  id: totrans-699
  prefs: []
  type: TYPE_NORMAL
  zh: '[您的简历]'
- en: Ensure the questions are relevant to the job description and the given resume.
  id: totrans-700
  prefs: []
  type: TYPE_NORMAL
  zh: 确保问题与职位描述和提供的简历相关。
- en: ChatGPT will then provide potential questions that you might get in a real job
    interview for the role.
  id: totrans-701
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT将随后提供可能在实际工作面试中遇到的问题。
- en: This way, the feedback given by ChatGPT is tailored to your specific experiences
    and the requirements of the job, helping you to prepare more effectively for the
    interview.
  id: totrans-702
  prefs: []
  type: TYPE_NORMAL
  zh: 这样，ChatGPT提供的反馈将根据您的具体经验和工作的要求进行定制，帮助您更有效地准备面试。
- en: Software Development
  id: totrans-703
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 软件开发
- en: Whether you are a seasoned developer or a novice, ChatGPT can be used to help
    you complete software development tasks as a real-time assistant.
  id: totrans-704
  prefs: []
  type: TYPE_NORMAL
  zh: 不论您是经验丰富的开发者还是新手，ChatGPT都可以用作实时助手，帮助您完成软件开发任务。
- en: 'For example, a coding novice might ask ChatGPT about an error he or she encountered
    as follows:'
  id: totrans-705
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，一个编程新手可能会这样询问ChatGPT他或她遇到的错误：
- en: 'I keep getting this error in my Python code:'
  id: totrans-706
  prefs: []
  type: TYPE_NORMAL
  zh: 我在我的Python代码中不断遇到这个错误：
- en: 'UnboundLocalError: local variable ''x'' referenced before assignment'
  id: totrans-707
  prefs: []
  type: TYPE_NORMAL
  zh: 'UnboundLocalError: 在赋值之前引用了局部变量 ''x'''
- en: How can I fix this error?
  id: totrans-708
  prefs: []
  type: TYPE_NORMAL
  zh: 我该如何修复这个错误？
- en: 'ChatGPT will then show some common scenarios and solutions for this error as
    follows:'
  id: totrans-709
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT将随后显示一些常见的错误场景和解决方案，如下所示：
- en: '![7 chatgpt fix error](image_rsrc1M4.jpg)'
  id: totrans-710
  prefs: []
  type: TYPE_IMG
  zh: '![7 chatgpt fix error](image_rsrc1M4.jpg)'
- en: Figure 65\. Using ChatGPT to Fix Code Error
  id: totrans-711
  prefs: []
  type: TYPE_NORMAL
  zh: 图65. 使用ChatGPT修复代码错误
- en: You can also ask ChatGPT to generate boilerplate code that you can edit later,
    although this would require you to specify more details.
  id: totrans-712
  prefs: []
  type: TYPE_NORMAL
  zh: 您也可以要求ChatGPT生成您稍后可以编辑的模板代码，尽管这可能需要您提供更多详细信息。
- en: 'For example, you can prompt ChatGPT to create Python code to connect to PostgreSQL
    using the psycopg2 library:'
  id: totrans-713
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，您可以提示ChatGPT使用psycopg2库创建连接到PostgreSQL的Python代码：
- en: Write Python code that connects to PostgreSQL using psycopg2 and query a table
    named 'USERS' for the first 10 rows of 'first_name' and 'last_name' fields where
    the 'first_name' field contains the word 'Tom'.
  id: totrans-714
  prefs: []
  type: TYPE_NORMAL
  zh: 编写使用psycopg2连接到PostgreSQL并查询名为'USERS'的表的前10行'first_name'和'last_name'字段的Python代码，其中'first_name'字段包含单词'Tom'。
- en: Make sure that the code is optimized and secure.
  id: totrans-715
  prefs: []
  type: TYPE_NORMAL
  zh: 确保代码已优化且安全。
- en: 'ChatGPT will respond with optimized Python code for you to use. It also explains
    what the code is all about:'
  id: totrans-716
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT将为您提供优化的Python代码以供使用。它还解释了代码的内容：
- en: '![7 chatgpt write python](image_rsrc1M5.jpg)'
  id: totrans-717
  prefs: []
  type: TYPE_IMG
  zh: '![7 chatgpt write python](image_rsrc1M5.jpg)'
- en: Figure 66\. ChatGPT Generating Python Code
  id: totrans-718
  prefs: []
  type: TYPE_NORMAL
  zh: 图66. ChatGPT生成Python代码
- en: As you can see above, ChatGPT optimizes the code for security by using environment
    variables for sensitive information, and the query is parameterized to prevent
    SQL injection.
  id: totrans-719
  prefs: []
  type: TYPE_NORMAL
  zh: 如上图所示，ChatGPT通过使用环境变量来处理敏感信息，并对查询进行参数化以防止SQL注入，从而优化代码的安全性。
- en: For the complete chat result, you can visit [chatgpt.com/share/91f2a695-4c16-4021-9851-7c4a215879ff](https://chatgpt.com/share/91f2a695-4c16-4021-9851-7c4a215879ff)
  id: totrans-720
  prefs: []
  type: TYPE_NORMAL
  zh: 对于完整的聊天结果，您可以访问[chatgpt.com/share/91f2a695-4c16-4021-9851-7c4a215879ff](https://chatgpt.com/share/91f2a695-4c16-4021-9851-7c4a215879ff)
- en: The clear explanation of what the code does is super helpful when you’re working
    on a project or learning to code.
  id: totrans-721
  prefs: []
  type: TYPE_NORMAL
  zh: 当你在项目上工作或学习编码时，对代码功能的清晰解释非常有帮助。
- en: But keep in mind that ChatGPT might generate errors, especially when the requirements
    for the code are complex.
  id: totrans-722
  prefs: []
  type: TYPE_NORMAL
  zh: 但请记住，ChatGPT可能会生成错误，尤其是在代码要求复杂时。
- en: Experienced developers should be able to verify the code generated by ChatGPT,
    but if you’re a beginner, you still need to consult with books and seniors to
    understand the code thoroughly.
  id: totrans-723
  prefs: []
  type: TYPE_NORMAL
  zh: 经验丰富的开发者应该能够验证ChatGPT生成的代码，但如果你是初学者，你仍然需要咨询书籍和资深人士来彻底理解代码。
- en: Furthermore, due to its knowledge cutoff date, ChatGPT may not always be up
    to date with the newest frameworks or programming languages. To make sure your
    code follows best practices, you have to keep track of the latest developments
    in your field of work.
  id: totrans-724
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，由于其知识截止日期，ChatGPT可能并不总是了解最新的框架或编程语言。为了确保你的代码遵循最佳实践，你必须跟踪你所在领域的最新发展。
- en: Summary
  id: totrans-725
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: In this chapter, we explored how to use ChatGPT to uncover insights that you
    might overlook in several subjects.
  id: totrans-726
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们探讨了如何使用ChatGPT来揭示你可能在多个学科中忽视的见解。
- en: As a personal assistant, it can help draft documents, provide advice, and find
    effective solutions for interpersonal challenges.
  id: totrans-727
  prefs: []
  type: TYPE_NORMAL
  zh: 作为个人助理，它可以帮助起草文件、提供建议，并找到解决人际挑战的有效方案。
- en: For job seekers, ChatGPT offers tailored resume feedback and generates relevant
    interview questions to better prepare them for the hiring process.
  id: totrans-728
  prefs: []
  type: TYPE_NORMAL
  zh: 对于求职者来说，ChatGPT提供定制的简历反馈，并生成相关的面试问题，以更好地帮助他们准备招聘流程。
- en: In software development, ChatGPT might assist with debugging errors, writing
    boilerplate code, and ensuring code security.
  id: totrans-729
  prefs: []
  type: TYPE_NORMAL
  zh: 在软件开发中，ChatGPT可能帮助调试错误、编写样板代码和确保代码安全。
- en: Not all use cases in this chapter will be relevant to your field of work, but
    you can use the information as a reference on how Generative AI can be integrated
    into your routine.
  id: totrans-730
  prefs: []
  type: TYPE_NORMAL
  zh: 本章中的所有用例可能并不适用于你的工作领域，但你可以将这些信息作为参考，了解如何将生成式AI整合到你的日常工作中。
- en: Also keep in mind that while ChatGPT is a helpful tool, it only works best when
    complemented by human expertise and deep level knowledge.
  id: totrans-731
  prefs: []
  type: TYPE_NORMAL
  zh: 还要注意，虽然ChatGPT是一个有用的工具，但它最好与人类的专业知识和深入知识相结合。
- en: 'Chapter 8: Ethical Considerations and Responsible Use of AI'
  id: totrans-732
  prefs: []
  type: TYPE_NORMAL
  zh: 第8章：AI的伦理考量与负责任的使用
- en: The rapid development and deployment of AI present many opportunities for innovation
    and efficiency.
  id: totrans-733
  prefs: []
  type: TYPE_NORMAL
  zh: AI的快速发展和部署为创新和效率提供了许多机会。
- en: However, they also raise significant ethical challenges, including concerns
    about privacy, bias, safety, and accountability.
  id: totrans-734
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，它们也提出了重大的伦理挑战，包括对隐私、偏见、安全和问责制的担忧。
- en: 'This chapter explores several considerations that must be taken into account
    when developing and deploying Generative AI technologies, such as:'
  id: totrans-735
  prefs: []
  type: TYPE_NORMAL
  zh: 本章探讨了在开发和部署生成式AI技术时必须考虑的几个因素，例如：
- en: '| ​▪​ | Bias and fairness in AI systems |'
  id: totrans-736
  prefs: []
  type: TYPE_TB
  zh: '| ● | AI系统中的偏见与公平性 |'
- en: '| ​▪​ | Data privacy and security |'
  id: totrans-737
  prefs: []
  type: TYPE_TB
  zh: '| ● | 数据隐私和安全 |'
- en: '| ​▪​ | Malicious actors and rogue AI |'
  id: totrans-738
  prefs: []
  type: TYPE_TB
  zh: '| ● | 恶意行为者和流氓AI |'
- en: By examining these important issues, we can better understand how to promote
    AI use responsibly.
  id: totrans-739
  prefs: []
  type: TYPE_NORMAL
  zh: 通过审视这些重要问题，我们可以更好地理解如何负责任地推广AI的使用。
- en: Bias and Fairness in AI
  id: totrans-740
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: AI中的偏见与公平性
- en: Bias and fairness in AI are critical issues that have garnered significant attention
    in recent years.
  id: totrans-741
  prefs: []
  type: TYPE_NORMAL
  zh: AI系统中的偏见与公平性是近年来受到广泛关注的关键问题。
- en: This issue is particularly concerning in areas such as hiring, finance, and
    healthcare, where biased AI decisions can significantly impact people’s lives.
  id: totrans-742
  prefs: []
  type: TYPE_NORMAL
  zh: 在招聘、金融和医疗保健等领域，AI的偏见决策可能会对人们的生活产生重大影响，这个问题尤其令人担忧。
- en: Artificial Intelligence systems often reflect the biases present in the data
    they are trained on, which can lead to unfair and discriminatory outcomes.
  id: totrans-743
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能系统通常反映了它们训练数据中存在的偏见，这可能导致不公平和歧视性的结果。
- en: 'Bias in AI can originate from several sources, such as:'
  id: totrans-744
  prefs: []
  type: TYPE_NORMAL
  zh: AI中的偏见可能源于多个来源，例如：
- en: '| ​▪​ | Human input that may contain subjective biases |'
  id: totrans-745
  prefs: []
  type: TYPE_TB
  zh: '|   | 可能包含主观偏见的用户输入 |'
- en: '| ​▪​ | AI algorithmic design that accidentally favors particular groups |'
  id: totrans-746
  prefs: []
  type: TYPE_TB
  zh: '|   | 意外偏向特定群体的算法设计 |'
- en: '| ​▪​ | Historical data that reflects existing prejudices |'
  id: totrans-747
  prefs: []
  type: TYPE_TB
  zh: '|   | 反映现有偏见的现有数据 |'
- en: 'To give an example, suppose you are training an AI system for hiring, and you
    give a dataset that consists of:'
  id: totrans-748
  prefs: []
  type: TYPE_NORMAL
  zh: 以一个例子来说明，假设你正在训练一个用于招聘的人工智能系统，你提供了一个包含以下数据的训练集：
- en: '| ​▪​ | 100 male resumes |'
  id: totrans-749
  prefs: []
  type: TYPE_TB
  zh: '|   | 100份男性简历 |'
- en: '| ​▪​ | 50 female resumes |'
  id: totrans-750
  prefs: []
  type: TYPE_TB
  zh: '|   | 50份女性简历 |'
- en: This dataset is unbalanced because it has more male resumes compared to female
    resumes, which can cause the AI system being trained to favor male candidates
    over female candidates.
  id: totrans-751
  prefs: []
  type: TYPE_NORMAL
  zh: 这个数据集是不平衡的，因为它包含的男性简历比女性简历多，这可能导致训练的人工智能系统更倾向于男性候选人而不是女性候选人。
- en: '![8 ai bias illustration](image_rsrc1M6.jpg)'
  id: totrans-752
  prefs: []
  type: TYPE_IMG
  zh: '![8人工智能偏见插图](image_rsrc1M6.jpg)'
- en: Figure 67\. Example of AI Bias
  id: totrans-753
  prefs: []
  type: TYPE_NORMAL
  zh: 图67. 人工智能偏见的示例
- en: The AI system may learn to associate certain characteristics, such as male names
    or male-dominated job titles, with a higher likelihood of success or better qualifications.
    The bias might also exclude disabled people or certain minority groups.
  id: totrans-754
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能系统可能会学会将某些特征，如男性姓名或男性主导的职位名称，与更高的成功可能性或更好的资格联系起来。这种偏见也可能排除残疾人或某些少数群体。
- en: As a result, The AI system may recommend more male candidates for interviews,
    leading to a lack of diversity and potential loss of good candidates in the hiring
    process.
  id: totrans-755
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，人工智能系统可能会推荐更多男性候选人参加面试，导致招聘过程中的多样性不足，并可能导致优秀候选人的流失。
- en: To resolve this issue, you need to make sure that the training data used to
    train the AI system is well balanced. If you have 100 ideal male resumes, then
    make sure you also have an equal number of ideal female resumes.
  id: totrans-756
  prefs: []
  type: TYPE_NORMAL
  zh: 为了解决这个问题，你需要确保用于训练人工智能系统的训练数据是平衡的。如果你有100份理想的男性简历，那么确保你也有相同数量的理想女性简历。
- en: Another example of AI bias might occur in the financial sector, where biased
    credit scoring algorithms can deny loans to deserving individuals based on race
    or gender.
  id: totrans-757
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能偏见在金融领域的另一个例子可能发生在信用评分算法上，这些算法可能会基于种族或性别拒绝有资格的人的贷款。
- en: How to Mitigate AI Bias
  id: totrans-758
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 如何减轻人工智能偏见
- en: 'Here are several strategies that can help address the bias in an AI system:'
  id: totrans-759
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一些策略可以帮助解决人工智能系统中的偏见：
- en: '| ​▪​ | Make sure that you have good training data. |'
  id: totrans-760
  prefs: []
  type: TYPE_TB
  zh: '|   | 确保你有良好的训练数据。 |'
- en: '| ​▪​ | Assign trusted individuals to look after the system. |'
  id: totrans-761
  prefs: []
  type: TYPE_TB
  zh: '|   | 指派可信赖的人来照看系统。 |'
- en: '| ​▪​ | Develop a fairness-aware algorithm |'
  id: totrans-762
  prefs: []
  type: TYPE_TB
  zh: '|   | 开发公平感知算法 |'
- en: '| ​▪​ | Continuous monitoring |'
  id: totrans-763
  prefs: []
  type: TYPE_TB
  zh: '|   | 持续监控 |'
- en: The first step is to ensure that you have diverse training data that are representative
    of the population or use cases the AI system will encounter.
  id: totrans-764
  prefs: []
  type: TYPE_NORMAL
  zh: 第一步是确保你有多样化的训练数据，这些数据能够代表人工智能系统将要遇到的群体或用例。
- en: After the dataset is ready, it is important to assign dependable people to supervise
    and guarantee that the AI system isn’t making biased judgments.
  id: totrans-765
  prefs: []
  type: TYPE_NORMAL
  zh: 数据集准备就绪后，重要的是指派可信赖的人来监督，并确保人工智能系统不会做出有偏见的判断。
- en: Additionally, fairness-aware algorithms can be designed to minimize bias and
    promote equitable outcomes. Continuous monitoring and auditing of AI systems are
    also essential to identify and rectify biases that may emerge over time.
  id: totrans-766
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，可以设计公平感知算法来最小化偏见并促进公平的结果。对人工智能系统进行持续监控和审计也是必要的，以识别和纠正可能随时间出现的偏见。
- en: Data Privacy and Security
  id: totrans-767
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 数据隐私和安全
- en: AI systems often rely on vast amounts of training data, which raises serious
    security and privacy concerns.
  id: totrans-768
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能系统通常依赖于大量的训练数据，这引发了严重的安全和隐私问题。
- en: Back to the previous example, training an AI system to help in the hiring process
    requires real resume data.
  id: totrans-769
  prefs: []
  type: TYPE_NORMAL
  zh: 回到之前的例子，训练一个用于招聘流程的人工智能系统需要真实的简历数据。
- en: AI systems scan resumes using algorithms to find keywords, experiences, and
    talents that match the job description. You need to feed the AI system with a
    large collection of resumes, training it to recognize relevant information and
    make reliable assessments.
  id: totrans-770
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能系统使用算法扫描简历，以找到与职位描述匹配的关键词、经验和才能。你需要向人工智能系统提供大量简历，训练它识别相关信息并做出可靠的评估。
- en: The resumes contain sensitive personal information such as names, contact details,
    addresses, educational backgrounds, and work histories. Unauthorized access to
    this information can lead to identity theft, fraud, and other malicious activities.
  id: totrans-771
  prefs: []
  type: TYPE_NORMAL
  zh: 简历中包含敏感的个人信息，例如姓名、联系方式、地址、教育背景和工作经历。未经授权访问这些信息可能导致身份盗窃、欺诈和其他恶意活动。
- en: You need to ensure that the information remains confidential and is accessed
    only by authorized personnel.
  id: totrans-772
  prefs: []
  type: TYPE_NORMAL
  zh: 你需要确保信息保持机密，并且只有授权人员才能访问。
- en: How to Improve Data Privacy and Security
  id: totrans-773
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 如何提高数据隐私和安全
- en: 'To ensure that data privacy and security are improved, it is essential to:'
  id: totrans-774
  prefs: []
  type: TYPE_NORMAL
  zh: 为了确保数据隐私和安全得到改善，以下措施是至关重要的：
- en: '| ​▪​ | Obtain consent from people |'
  id: totrans-775
  prefs: []
  type: TYPE_TB
  zh: '| ● | 获得人们的同意'
- en: '| ​▪​ | Comply with data protection regulations such as GDPR and CCPA |'
  id: totrans-776
  prefs: []
  type: TYPE_TB
  zh: '| ● | 遵守数据保护法规，如GDPR和CCPA'
- en: '| ​▪​ | Anonymize data when possible |'
  id: totrans-777
  prefs: []
  type: TYPE_TB
  zh: '| ● | 在可能的情况下匿名化数据'
- en: '| ​▪​ | Regularly audit data usage |'
  id: totrans-778
  prefs: []
  type: TYPE_TB
  zh: '| ● | 定期审计数据使用'
- en: When collecting data for AI training, you need to make sure that you get explicit
    consent from people before collecting, storing, or using their data. You also
    need to explain how their information will be used.
  id: totrans-779
  prefs: []
  type: TYPE_NORMAL
  zh: 在收集用于AI训练的数据时，你需要在收集、存储或使用他们的数据之前确保从人们那里获得明确的同意。你还需要解释他们的信息将如何被使用。
- en: You also need to comply with data protection regulations such as the General
    Data Protection Regulation (GDPR) in the European Union and the California Consumer
    Privacy Act (CCPA) in the United States.
  id: totrans-780
  prefs: []
  type: TYPE_NORMAL
  zh: 你还需要遵守数据保护法规，如欧盟的通用数据保护条例（GDPR）和美国加州消费者隐私法案（CCPA）。
- en: When possible, you need to protect and anonymize personally identifiable information
    (PII) to prevent unauthorized access or misuse. For example, OpenAI removes any
    PII from the data they want to use to improve ChatGPT.
  id: totrans-781
  prefs: []
  type: TYPE_NORMAL
  zh: 在可能的情况下，你需要保护和匿名化个人身份信息（PII），以防止未经授权的访问或滥用。例如，OpenAI从他们想要用于改进ChatGPT的数据中移除了任何PII。
- en: Finally, you need to regularly audit data usage and storage practices to identify
    potential vulnerabilities, ensure ongoing compliance with privacy regulations,
    and make necessary adjustments to maintain robust security measures.
  id: totrans-782
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，你需要定期审计数据使用和存储实践，以识别潜在漏洞，确保持续遵守隐私法规，并做出必要调整以维持强大的安全措施。
- en: Malicious Actors
  id: totrans-783
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 恶意行为者
- en: As Generative AI continues to expand, the potential for its misuse becomes a
    growing concern for everyone.
  id: totrans-784
  prefs: []
  type: TYPE_NORMAL
  zh: 随着生成式人工智能的持续扩展，其滥用的潜在风险成为每个人的日益关注的问题。
- en: 'To protect human society, addressing the risks associated with bad AI users
    is very important. Here are some ways AI can be used for malicious intent:'
  id: totrans-785
  prefs: []
  type: TYPE_NORMAL
  zh: 为了保护人类社会，解决与不良AI用户相关的风险非常重要。以下是一些AI可能被用于恶意目的的方式：
- en: '| ​▪​ | Phishing scams |'
  id: totrans-786
  prefs: []
  type: TYPE_TB
  zh: '| ● | 钓鱼诈骗'
- en: '| ​▪​ | Impersonation |'
  id: totrans-787
  prefs: []
  type: TYPE_TB
  zh: '| ● | 冒充'
- en: '| ​▪​ | Doxxing |'
  id: totrans-788
  prefs: []
  type: TYPE_TB
  zh: '| ● | Doxxing'
- en: Phishing is a form of social engineering with the intention of deceiving people
    into revealing sensitive information. Leveraging the power of Generative AI, criminals
    can organize highly targeted phishing messages that are tailored to specific recipients.
  id: totrans-789
  prefs: []
  type: TYPE_NORMAL
  zh: 钓鱼是一种社会工程形式，其目的是欺骗人们泄露敏感信息。利用生成式人工智能的力量，犯罪分子可以组织高度针对性的钓鱼信息，这些信息针对特定的收件人。
- en: With proper grammar and authoritative sounding campaigns, a phishing attack
    that uses Generative AI boosts the probability of successful deception and data
    theft
  id: totrans-790
  prefs: []
  type: TYPE_NORMAL
  zh: 通过适当的语法和权威感十足的宣传活动，使用生成式人工智能的钓鱼攻击提高了成功欺骗和数据盗窃的概率
- en: Additionally, malicious actors can also use AI to clone voice and create videos
    to impersonate friends and family members.
  id: totrans-791
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，恶意行为者还可以使用人工智能克隆声音和创建视频来冒充朋友和家人。
- en: In February 4 2024, an employee lost $25 million to fraudsters[[5]](part0015.xhtml#a1GJ)
    because of a deepfake video impersonating the Chief Financial Officer. The worker
    attended a video call meeting with the CFO and several staff members, but it turns
    out everyone there was not real except him.
  id: totrans-792
  prefs: []
  type: TYPE_NORMAL
  zh: 2024年2月4日，一名员工因一个冒充首席财务官的深度伪造视频而损失了2500万美元[[5]](part0015.xhtml#a1GJ)。这位员工参加了一个与首席财务官和几位员工的视频会议，但结果发现除了他之外，其他人都不是真实的。
- en: '![8 ai fraud illustration](image_rsrc1M7.jpg)'
  id: totrans-793
  prefs: []
  type: TYPE_IMG
  zh: '![8 人工智能欺诈插图](image_rsrc1M7.jpg)'
- en: Figure 68\. Example of AI-Assisted Fraud
  id: totrans-794
  prefs: []
  type: TYPE_NORMAL
  zh: 图68. 人工智能辅助欺诈示例
- en: Another way AI can be used maliciously is through doxxing, which is the act
    of disclosing personally identifiable information, such as the phone number or
    address online (in social media or forums)
  id: totrans-795
  prefs: []
  type: TYPE_NORMAL
  zh: AI被恶意使用的另一种方式是通过Doxxing，即在线（在社交媒体或论坛）披露个人身份信息，如电话号码或地址。
- en: Large Language Models that power AI tools like ChatGPT are trained on vast amounts
    of internet data, which makes them able to interpret the location of an image.
    This means bad actors can accurately predict where you live based on a single
    photo you shared on social media.
  id: totrans-796
  prefs: []
  type: TYPE_NORMAL
  zh: 驱动ChatGPT等AI工具的大型语言模型是在海量互联网数据上训练的，这使得它们能够解读图像的位置。这意味着恶意行为者可以根据你在社交媒体上分享的单张照片准确地预测你的居住地。
- en: How to Detect and Prevent Malicious AI Use
  id: totrans-797
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 如何检测和预防恶意AI使用
- en: Detecting and preventing malicious AI use requires a multifaceted approach.
    The first and most important step is to increase public awareness and educate
    individuals about the risks and how to protect themselves.
  id: totrans-798
  prefs: []
  type: TYPE_NORMAL
  zh: 检测和预防恶意AI使用需要多方面的方法。第一步也是最重要的一步是提高公众意识，并教育个人关于风险以及如何保护自己的知识。
- en: Everyone should be educated on the best practices for protecting their personal
    information, such as adding the Multi-factor authentication process to safeguard
    their accounts.
  id: totrans-799
  prefs: []
  type: TYPE_NORMAL
  zh: 每个人都应该接受关于保护个人信息的最佳实践的教育，例如添加多因素认证过程来保护他们的账户。
- en: AI-based tools can be developed to identify and counteract malicious activities.
    For example, Sentinel AI is a technology company that uses machine learning algorithms
    to detect and combat fake information[[6]](part0015.xhtml#a1GF).
  id: totrans-800
  prefs: []
  type: TYPE_NORMAL
  zh: 可以开发基于AI的工具来识别和对抗恶意活动。例如，Sentinel AI是一家使用机器学习算法来检测和对抗虚假信息的技术公司[[6]](part0015.xhtml#a1GF)。
- en: Governments and international organizations also need to establish strict regulations
    to provide guidelines and enforce accountability for AI use.
  id: totrans-801
  prefs: []
  type: TYPE_NORMAL
  zh: 政府和国际组织还需要制定严格的法规，以提供指导并确保AI使用的问责制。
- en: Summary
  id: totrans-802
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: In the following years, the use of Generative AI will only expand to more aspects
    of our lives, from healthcare and finance to marketing and human resources management.
  id: totrans-803
  prefs: []
  type: TYPE_NORMAL
  zh: 在接下来的几年里，生成式AI的使用将扩展到我们生活的更多方面，从医疗保健和金融到市场营销和人力资源管理。
- en: As with any powerful technology, keeping Generative AI under control is necessary
    to create a safe future for everyone.
  id: totrans-804
  prefs: []
  type: TYPE_NORMAL
  zh: 就像任何强大的技术一样，为了创造一个对每个人来说都安全的未来，控制生成式AI是必要的。
- en: To ensure that AI aligns with human values and social norms, we can begin by
    developing a good strategy for using AI ethically and responsibly.
  id: totrans-805
  prefs: []
  type: TYPE_NORMAL
  zh: 为了确保AI与人类价值观和社会规范相一致，我们可以从制定一个良好的AI伦理和负责任使用策略开始。
- en: 'Chapter 9: Future Trends - AI Development and Job Market Impact'
  id: totrans-806
  prefs: []
  type: TYPE_NORMAL
  zh: 第9章：未来趋势 - 人工智能发展及就业市场影响
- en: It is expected that Generative AI will continue to improve and be integrated
    into various aspects of our lives. The technology definitely will change industries
    and reshape the job market.
  id: totrans-807
  prefs: []
  type: TYPE_NORMAL
  zh: 预计生成式AI将继续改进并融入我们生活的各个方面。这项技术无疑将改变行业并重塑就业市场。
- en: Will AI take your job? What new opportunities will emerge? This chapter will
    explore these critical questions and give some realistic predictions.
  id: totrans-808
  prefs: []
  type: TYPE_NORMAL
  zh: AI会取代你的工作吗？将出现哪些新的机遇？本章将探讨这些关键问题，并给出一些现实的预测。
- en: Will AI Take Your Job?
  id: totrans-809
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: AI会取代你的工作吗？
- en: A general concern regarding AI is its potential to replace human jobs for efficiency
    reasons. As AI becomes more advanced, people fear that it could make a significant
    portion of the workforce obsolete, particularly in industries reliant on repetitive
    tasks.
  id: totrans-810
  prefs: []
  type: TYPE_NORMAL
  zh: 关于AI的一个普遍担忧是其出于效率原因可能取代人类工作。随着AI的日益先进，人们担心它可能会使很大一部分劳动力变得过时，尤其是在依赖重复性任务的行业中。
- en: This shift could lead to widespread unemployment and economic instability, further
    widening the social gap between the rich and the poor.
  id: totrans-811
  prefs: []
  type: TYPE_NORMAL
  zh: 这种转变可能导致广泛失业和经济不稳定，进一步扩大贫富之间的社会差距。
- en: While it is true that AI can automate repetitive and mundane tasks, the reality
    is that professionals with deep-level expertise stand to gain the most from Generative
    AI.
  id: totrans-812
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然AI确实可以自动化重复性和枯燥的任务，但现实是，具有深度专业知识的专业人士将最有可能从生成式AI中获益。
- en: This is because Generative AI relieves workers from handling essential basic
    tasks, giving them more time to concentrate on strategic decision-making and critical
    responsibilities.
  id: totrans-813
  prefs: []
  type: TYPE_NORMAL
  zh: 这是因为生成式AI减轻了工人处理基本任务的压力，使他们有更多时间专注于战略决策和关键责任。
- en: For example, in healthcare, AI can assist doctors by quickly analyzing medical
    images, helping doctors to detect the disease faster and leaving more time to
    focus on diagnosis and patient care.
  id: totrans-814
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，在医疗保健领域，AI可以通过快速分析医学图像来协助医生，帮助医生更快地检测疾病，从而有更多时间专注于诊断和病人护理。
- en: In finance, AI tools can handle data-heavy tasks such as fraud detection and
    risk assessment, but analysts are still needed to verify and make decisions based
    on the data given by AI.
  id: totrans-815
  prefs: []
  type: TYPE_NORMAL
  zh: 在金融领域，AI工具可以处理如欺诈检测和风险评估等数据密集型任务，但分析师仍然需要根据AI提供的数据进行验证和决策。
- en: After exploring the previous chapters, you may come to understand that Generative
    AI like ChatGPT is merely a tool. It represents the most extensive repository
    of knowledge ever created by humans.
  id: totrans-816
  prefs: []
  type: TYPE_NORMAL
  zh: 在探索了前面的章节之后，你可能会理解到，像ChatGPT这样的生成式AI仅仅是一个工具。它代表了人类有史以来创建的最全面的知识库。
- en: However, without knowing how to use it effectively, you might perceive it as
    just a slightly more intelligent chatbot.
  id: totrans-817
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，如果你不知道如何有效地使用它，你可能会认为它仅仅是一个稍微聪明一点的聊天机器人。
- en: When using ChatGPT, a good prompt produces a good result, and your skill level
    determines how effective you are with the tool.
  id: totrans-818
  prefs: []
  type: TYPE_NORMAL
  zh: 当使用ChatGPT时，一个良好的提示会产生一个好的结果，你的技能水平决定了你使用这个工具的有效性。
- en: This also means that someone who has never worked as a software developer, marketer,
    or doctor cannot suddenly use ChatGPT to perform the duties of these professions.
  id: totrans-819
  prefs: []
  type: TYPE_NORMAL
  zh: 这也意味着，从未担任过软件开发人员、营销人员或医生的人不能突然使用ChatGPT来执行这些职业的职责。
- en: Rather than replacing jobs, AI simply augments human capabilities, making professionals
    more efficient and effective.
  id: totrans-820
  prefs: []
  type: TYPE_NORMAL
  zh: AI并不是取代工作，它只是增强人类的能力，使专业人士更加高效和有效。
- en: New Opportunities Will Emerge
  id: totrans-821
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 新的机会将会出现
- en: Supporting the point that AI does not necessarily eliminate jobs, it is essential
    to recognize that while some jobs may become obsolete, new opportunities will
    emerge.
  id: totrans-822
  prefs: []
  type: TYPE_NORMAL
  zh: 支持AI不一定消除工作的观点，重要的是要认识到，虽然一些工作可能会变得过时，但新的机会将会出现。
- en: The digital revolution of the 2000s is a prime example, where the rise of the
    internet led to the decline of traditional roles in printed newspaper and encyclopedia
    businesses, but created new professions such as web designers, software developers,
    and digital marketers.
  id: totrans-823
  prefs: []
  type: TYPE_NORMAL
  zh: 2000年代的数字革命是一个典型的例子，其中互联网的兴起导致了传统角色在印刷报纸和百科全书业务中的衰落，但创造了新的职业，如网页设计师、软件开发人员和数字营销人员。
- en: In the same manner, the propagation of AI tools is set to generate a new wave
    of job opportunities. New roles like AI ethics and safety manager, data scientist,
    and machine learning engineer will see more demand in the future.
  id: totrans-824
  prefs: []
  type: TYPE_NORMAL
  zh: 同样，AI工具的传播预计将产生新一波的工作机会。像AI伦理和安全经理、数据科学家和机器学习工程师这样的新角色在未来将会有更多的需求。
- en: Moreover, roles focused on integrating AI into various sectors, managing AI
    systems, and ensuring their ethical use will become increasingly vital.
  id: totrans-825
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，专注于将AI整合到各个领域、管理AI系统并确保其道德使用的角色将变得越来越重要。
- en: Industries will also see the creation of entirely new job categories. For instance,
    the entertainment industry is exploring AI for content generation, leading to
    roles in supervising AI-created content and developing interactive experiences.
  id: totrans-826
  prefs: []
  type: TYPE_NORMAL
  zh: 行业也将看到全新的工作类别的创造。例如，娱乐行业正在探索AI内容生成，导致监督AI创建的内容和发展互动体验的角色出现。
- en: In education, AI tutors and personalized learning plan designers are emerging
    as AI tailors education to individual student needs.
  id: totrans-827
  prefs: []
  type: TYPE_NORMAL
  zh: 在教育领域，AI导师和个性化学习计划设计师正在兴起，AI正根据每个学生的需求量身定制教育。
- en: More Wealth For Everyone
  id: totrans-828
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 为每个人创造更多财富
- en: The purpose of tools like ChatGPT and other AI technologies is to drive innovation,
    enhance productivity, and create new business opportunities across various industries.
    This means there will be more wealth created for everyone.
  id: totrans-829
  prefs: []
  type: TYPE_NORMAL
  zh: 类似ChatGPT和其他AI技术的工具目的是推动创新、提高生产力和在各个行业创造新的商业机会。这意味着将为每个人创造更多的财富。
- en: 'Lane Wagner, a software developer and founder of Boot.dev elaborates[[7]](part0015.xhtml#a1GK)
    on the following scenario:'
  id: totrans-830
  prefs: []
  type: TYPE_NORMAL
  zh: Boot.dev的创始人、软件开发者Lane Wagner在[[7]](part0015.xhtml#a1GK)详细阐述了以下场景：
- en: Suppose a business has several projects that will significantly add value once
    completed.
  id: totrans-831
  prefs: []
  type: TYPE_NORMAL
  zh: 假设一家企业有几个项目，一旦完成将显著增加价值。
- en: One particular project is estimated to generate $100,000 in revenue, but the
    cost to complete this project is also $100,000.
  id: totrans-832
  prefs: []
  type: TYPE_NORMAL
  zh: 一个特定的项目预计将产生10万美元的收入，但完成这个项目的成本也是10万美元。
- en: In this scenario, the project would generate a $0 return on investment (ROI),
    so it will be abandoned.
  id: totrans-833
  prefs: []
  type: TYPE_NORMAL
  zh: 在这种情况下，项目将产生零投资回报率（ROI），因此将被放弃。
- en: Now, imagine that ChatGPT boosts worker productivity by 200%, reducing the time
    required to complete the project.
  id: totrans-834
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，想象一下ChatGPT通过提高工作效率200%，减少了完成项目所需的时间。
- en: After recalculating, the cost of the project decreases to $50,000\. With this
    reduced cost, the project becomes a lucrative opportunity and is executed because
    of its positive ROI.
  id: totrans-835
  prefs: []
  type: TYPE_NORMAL
  zh: 重新计算后，项目的成本降至50,000美元。由于成本降低，该项目成为了一个有利可图的商机，并且由于其积极的投资回报率而得以执行。
- en: Additionally, the reduction in cost means more personnel can be assigned to
    handle a greater number of projects in an effort to gain more revenue.
  id: totrans-836
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，成本的降低意味着可以分配更多的人员来处理更多的项目，以获得更多的收入。
- en: Small businesses can leverage AI to compete with larger enterprises by utilizing
    tools that were previously unaffordable or inaccessible. This leveling of the
    playing field encourages entrepreneurship and can lead to a more rich and competitive
    market landscape.
  id: totrans-837
  prefs: []
  type: TYPE_NORMAL
  zh: 小型企业可以通过利用以前负担不起或无法获得的工具，利用AI与大型企业竞争。这种竞争环境的平等化鼓励了创业精神，并可能导致一个更加丰富和竞争激烈的市场格局。
- en: The impact of AI-driven productivity gains and new business ventures are expected
    to contribute to overall economic growth, potentially leading to more wealth and
    improved standards of living for everyone.
  id: totrans-838
  prefs: []
  type: TYPE_NORMAL
  zh: 预计由AI驱动的生产力提升和新商业领域的开拓将对整体经济增长做出贡献，可能为每个人带来更多的财富和生活水平的提高。
- en: Summary
  id: totrans-839
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: While the rapid advancement of Generative AI presents a danger, it also has
    significant opportunities.
  id: totrans-840
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管生成式AI的快速发展带来了一定的危险，但它也带来了重大的机遇。
- en: AI will cause some jobs to vanish, but data from reputable sources so far shows
    that the ones who benefit the most from Generative AI are professionals with advanced
    skill sets.
  id: totrans-841
  prefs: []
  type: TYPE_NORMAL
  zh: AI将导致一些工作消失，但到目前为止，来自可靠来源的数据显示，从生成式AI中受益最大的是拥有高级技能的专业人士。
- en: New jobs that didn’t exist in the past would also emerge as the change in society
    requires new roles, particularly those relevant to an AI-integrated world.
  id: totrans-842
  prefs: []
  type: TYPE_NORMAL
  zh: 新的工作岗位也将出现，因为社会的变化需要新的角色，尤其是与AI集成世界相关的角色。
- en: We can’t predict the future with certainty, but it’s far more productive to
    learn how Generative AI works, integrate it into our routines, and discover ways
    to create wealth with this technology rather than worrying about whether it will
    bring widespread unemployment and economic instability.
  id: totrans-843
  prefs: []
  type: TYPE_NORMAL
  zh: 我们无法准确预测未来，但学习生成式AI的工作原理，将其整合到我们的日常工作中，并发现利用这项技术创造财富的方法，要比担心它是否会带来大规模的失业和经济不稳定要更有成效。
- en: Wrapping Up
  id: totrans-844
  prefs: []
  type: TYPE_NORMAL
  zh: 总结
- en: Congratulations on finishing this book! We’ve gone through many concepts and
    topics together to help you learn what is Generative AI and the technology that
    makes this tool possible.
  id: totrans-845
  prefs: []
  type: TYPE_NORMAL
  zh: 恭喜您完成这本书！我们一起探讨了众多概念和主题，帮助您了解什么是生成式AI以及使这个工具成为可能的技术。
- en: You’ve also learned how to start using ChatGPT efficiently and improve its response
    through prompt engineering, then explore the paid features of ChatGPT before finishing
    strong with Generative AI use cases, ethical considerations, and future trends.
  id: totrans-846
  prefs: []
  type: TYPE_NORMAL
  zh: 您还学会了如何高效地开始使用ChatGPT，并通过提示工程改进其响应，然后在结束前探索ChatGPT的付费功能，以及生成式AI的使用案例、伦理考量以及未来趋势。
- en: I hope you enjoyed exploring and learning Generative AI with this book as much
    as I enjoyed writing it.
  id: totrans-847
  prefs: []
  type: TYPE_NORMAL
  zh: 我希望您像我喜欢写这本书一样，享受使用这本书探索和学习生成式AI的过程。
- en: I’d like to ask you for a small favor.
  id: totrans-848
  prefs: []
  type: TYPE_NORMAL
  zh: 我想请您帮一个小忙。
- en: If you enjoyed the book, I’d be very grateful if you would leave an honest review
    on Amazon. (I read all reviews coming my way)
  id: totrans-849
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您喜欢这本书，如果您能在亚马逊上留下一个诚实的评论，我将不胜感激。（我会阅读所有向我来的评论）
- en: Every single review counts, and your support makes a big difference.
  id: totrans-850
  prefs: []
  type: TYPE_NORMAL
  zh: 每一条评论都很重要，您的支持意义重大。
- en: Thanks again for your kind support!
  id: totrans-851
  prefs: []
  type: TYPE_NORMAL
  zh: 再次感谢您的慷慨支持！
- en: Until next time,
  id: totrans-852
  prefs: []
  type: TYPE_NORMAL
  zh: 到下次见面时，
- en: Nathan
  id: totrans-853
  prefs: []
  type: TYPE_NORMAL
  zh: 内森
- en: About the author
  id: totrans-854
  prefs: []
  type: TYPE_NORMAL
  zh: 关于作者
- en: Nathan Sebhastian is a senior software developer with a decade of experience
    in the technology industry.
  id: totrans-855
  prefs: []
  type: TYPE_NORMAL
  zh: 内森·塞巴斯蒂安是一位拥有十年科技行业经验的资深软件开发人员。
- en: He is passionate about making technology education accessible for everyone and
    has taught online since 2018.
  id: totrans-856
  prefs: []
  type: TYPE_NORMAL
  zh: 他热衷于让每个人都能获得技术教育，并自2018年以来一直在网上授课。
- en: End Notes
  id: totrans-857
  prefs: []
  type: TYPE_NORMAL
  zh: 尾注
