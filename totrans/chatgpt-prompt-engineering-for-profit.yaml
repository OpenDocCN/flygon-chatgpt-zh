  zh: '**逐步分析**通过指导LLM以有组织的步骤描述问题解决过程来工作。提示可能包括“逐步解决问题”或“详细描述过程，逐步进行”等指令。每个步骤都以逻辑和顺序的方式呈现，使用户能够理解每个阶段如何有助于问题的完成。'
