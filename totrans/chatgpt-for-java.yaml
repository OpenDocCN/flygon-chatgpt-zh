  prefs: []
  type: TYPE_NORMAL
- en: 'Take a look at Listing [7-1](#PC1) for a practical example of the Moderation
    JSON object.![](../images/607613_1_En_7_Chapter/607613_1_En_7_Figa_HTML.gif)A
    logo of open A I.{  "id": "modr-XXXXX",  "model": "text-moderation-005",  "results":
    [        {        "flagged": true,        "categories": {        "sexual": false,        "hate":
    false,        "harassment": false,        "self-harm": false,        "sexual/minors":
    false,        "hate/threatening": false,        "violence/graphic": false,        "self-harm/intent":
    false,        "self-harm/instructions": false,        "harassment/threatening":
    true,        "violence": true,        },        "category_scores": {        "sexual":
    1.2282071e-06,        "hate": 0.010696256,        "harassment": 0.29842457,        "self-harm":
    1.5236925e-08,        "sexual/minors": 5.7246268e-08,        "hate/threatening":
    0.0060676364,        "violence/graphic": 4.435014e-06,        "self-harm/intent":
    8.098441e-10,        "self-harm/instructions": 2.8498655e-11,        "harassment/threatening":
    0.63055265,        "violence": 0.99011886,        }        }  ]}Listing 7-1'
  prefs: []
  type: TYPE_NORMAL
- en: The Moderation JSON Object
  prefs: []
  type: TYPE_NORMAL
- en: 'Creating Our Client for the Moderations Endpoint: ModerationClient.java'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Listing [7-2](#PC2) is our client to invoke the Moderations Endpoint. Take
    a look at it, and then we’ll discuss the important parts afterward.import com.fasterxml.jackson.core.JsonProcessingException;import
    com.fasterxml.jackson.databind.JsonNode;import com.fasterxml.jackson.databind.ObjectMapper;import
    java.io.BufferedReader;import java.io.IOException;import java.io.InputStreamReader;import
    java.io.OutputStream;import java.net.HttpURLConnection;import java.net.URL;import
    java.util.ArrayList;public class ModerationClient {    // OpenAI parameters that
    we already know how to use    String openAIKey = "";    String endpoint = "https://api.openai.com/v1/moderations";    String
    model = "text-moderation-latest";    // The constructor    public ModerationClient()
    {    }    public ModerationResponse checkForObjectionalContent(String discordMessageText)
    {        ModerationResponse moderationResponse = null;        String jsonInput
    = null;        try {            ObjectMapper mapper = new ObjectMapper();            ModRequest
    modRequest = new ModRequest(discordMessageText, model);            jsonInput =
    mapper.writeValueAsString(modRequest);            System.out.println(jsonInput);        }
    catch (JsonProcessingException e) {            e.printStackTrace();        }        try
    {            URL url = new URL(endpoint);            HttpURLConnection connection
    = (HttpURLConnection) url.openConnection();            connection.setRequestMethod("POST");            connection.setRequestProperty("Content-Type",
    "application/json");            connection.setRequestProperty("Authorization",
    "Bearer " + openAIKey);            connection.setDoOutput(true);            OutputStream
    outputStream = connection.getOutputStream();            outputStream.write(jsonInput.getBytes());            outputStream.flush();            outputStream.close();            int
    responseCode = connection.getResponseCode();            if (responseCode == HttpURLConnection.HTTP_OK)
    {                BufferedReader reader = new BufferedReader(new InputStreamReader(connection.getInputStream()));                StringBuilder
    response = new StringBuilder();                String line;                while
    ((line = reader.readLine()) != null) {                    response.append(line);                }                reader.close();                //
    Print the response                //System.out.println(response.toString());                //
    Extract the answer from JSON                moderationResponse = getModerationResponsefromJSON(response.toString());                String
    answerFromChatGPT = moderationResponse.toString();                System.out.println(answerFromChatGPT);            }
    else {                System.out.println("Error: " + responseCode);            }            connection.disconnect();        }
    catch (IOException e) {            e.printStackTrace();        }        return
    moderationResponse;    }    public ModerationResponse getModerationResponsefromJSON(String
    jsonResponse) {        ModerationResponse response = new ModerationResponse();        ObjectMapper
    mapper = new ObjectMapper();        try {            JsonNode rootNode = mapper.readTree(jsonResponse);            JsonNode
    resultsNode = rootNode.path("results");            if (!resultsNode.isMissingNode()
    && resultsNode.isArray() && resultsNode.size() > 0) {                JsonNode
    resultNode = resultsNode.get(0);                response.isFlagged = resultNode.path("flagged").asBoolean(false);                JsonNode
    categoriesNode = resultNode.path("categories");                if (!categoriesNode.isMissingNode())
    {                    categoriesNode.fields().forEachRemaining(entry -> {                        if
    (entry.getValue().asBoolean(false)) {                            response.offendingCategories.add(entry.getKey());                        }                    });                }            }        }
    catch (JsonProcessingException e) {            e.printStackTrace();        }        return
    response;    }    class ModerationResponse {        boolean isFlagged = false;        ArrayList<String>
    offendingCategories = new ArrayList<>();        @Override        public String
    toString() {            return "ModerationResponse{" +                    "isFlagged="
    + isFlagged +                    ", offendingCategories=" + offendingCategories
    +                    ''}'';        }    }}Listing 7-2'
  prefs: []
  type: TYPE_NORMAL
- en: ModerationClient.java
  prefs: []
  type: TYPE_NORMAL
- en: Since in the previous chapters in this book, we created clients for other Endpoints
    for the OpenAI API, the class above should look quite familiar. However, at the
    end of the class, we have an inner class named ModerationResponse.    class ModerationResponse
    {        boolean isFlagged = false;        ArrayList<String> offendingCategories
    = new ArrayList<>();
  prefs: []
  type: TYPE_NORMAL
- en: This class encapsulates the valuable information from the Moderation JSON object
    which is returned from the Moderations Endpoint. Namely, if the original Discord
    message that we want evaluated violates the content rules, we have a boolean,
    isFlagged, to let us know. If isFlagged is true, then offendingCategories is populated
    with the categories that the content has been flagged for.
  prefs: []
  type: TYPE_NORMAL
- en: Therefore, the method getModerationResponsefromJSON() does exactly what the
    name says. We pass the Moderation JSON object returned by the Moderations Endpoint,
    and we get a fully instantiated ModerationResponse object.
  prefs: []
  type: TYPE_NORMAL
- en: Making ContentModeratorBot.java More Intelligent
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Now that we have ModerationClient.java to invoke the Moderations Endpoint, let’s
    take a look at the updated ContentModeratorBot.java (formerly named ContentModeratorBotDumb.java)
    that will use the ModerationClient.java to check for harmful content and the ChatGPTClientForQAandModeration.java
    (unmodified from the previous chapter) to check for potential scams.
  prefs: []
  type: TYPE_NORMAL
- en: 'Listing [7-3](#PC4) is the full source code for our intelligent Discord Moderator
    Bot, ContentModeratorBot.java.import java.io.IOException;import java.util.EnumSet;import
    net.dv8tion.jda.api.JDA;import net.dv8tion.jda.api.JDABuilder;import net.dv8tion.jda.api.entities.Activity;import
    net.dv8tion.jda.api.entities.User;import net.dv8tion.jda.api.entities.channel.unions.MessageChannelUnion;import
    net.dv8tion.jda.api.events.message.MessageReceivedEvent;import net.dv8tion.jda.api.hooks.ListenerAdapter;import
    net.dv8tion.jda.api.requests.GatewayIntent;// This class extends a ListenerAdapter
    to handle message events on Discord.public class ContentModeratorBot extends ListenerAdapter
    {    // The bot''s Discord token for authentication.    static String discordToken
    = "";    // the system message    // This is a Java 13+ Multiline String notation.
    At the end of the day, it''s still a String    static String systemMessage = """        You
    are the automated moderator assistant for a Discord server.        Review each
    message for the following rule violations:        1\. Sensitive information        2\.
    Abuse        3\. Inappropriate comments        4\. Spam, for example; a message
    in all capital letters, the same phrase or word being repeated over and over,
    more than 3 exclamation marks or question marks.        5\. Advertisement        6\.
    External links        7\. Political messages or debate        8\. Religious messages
    or debate        If any of these violations are detected, respond with "FLAG"
    (in uppercase without quotation marks). If the message adheres to the rules, respond
    with "SAFE" (in uppercase without quotation marks).        """;    static String
    instructionsToChatGPT = "Analyze the following message for rule violations:";    //
    this is our Chat Endpoint client    static ChatGPTClientForQAandModeration chatGPTClient
    = null;    // this is our Moderations Endpoint client    static ModerationClient
    moderationClient = null;    public static void main(String[] args) throws IOException
    {        // Set of intents declaring which types of events the bot intends to
    listen to.        EnumSet<GatewayIntent> intents = EnumSet.of(                GatewayIntent.GUILD_MEMBERS,   //
    to get access to the members of the Discord server                GatewayIntent.GUILD_MODERATION,
    // to ban and unban members                GatewayIntent.GUILD_MESSAGES, // For
    messages in guilds                GatewayIntent.MESSAGE_CONTENT // To allow access
    to message content        );        // create a new ChatGPTClientForQAandModeration        chatGPTClient
    = new ChatGPTClientForQAandModeration(systemMessage, instructionsToChatGPT);        //
    create a new ModerationClient        moderationClient = new ModerationClient();        //
    Initialize the bot with minimal configuration and the specified intents.        try
    {            JDA jda = JDABuilder.createLight(discordToken, intents)                    .addEventListeners(new
    ContentModeratorBot()) // Adding the current class as an event listener.                    .setActivity(Activity.customStatus("Helping
    to keep a friendly Discord server")) // Set the bot''s custom status.                    .build();            //
    Asynchronously get REST ping from Discord API and print it.            jda.getRestPing().queue(ping
    -> System.out.println("Logged in with ping: " + ping));            // Block the
    main thread until JDA is fully loaded.            jda.awaitReady();            //
    Print the number of guilds the bot is connected to.            System.out.println("Guilds:
    " + jda.getGuildCache().size());            // Print the Discord userID of the
    bot            System.out.println("Bot''s ID: " + jda.getSelfUser());        }
    catch (InterruptedException e) {            // Handle exceptions if the thread
    is interrupted during the awaitReady process.            e.printStackTrace();        }    }    @Override    public
    void onMessageReceived(MessageReceivedEvent messageEvent){        String chatGPTResponse
    = "";        ModerationClient.ModerationResponse moderationResponse = null;        User
    senderDiscordID = messageEvent.getAuthor();        // The Discord channel where
    the message was posted        MessageChannelUnion channel = messageEvent.getChannel();        net.dv8tion.jda.api.entities.Message
    message = messageEvent.getMessage();        // Ignore messages sent by the bot
    to prevent self-responses.        if (senderDiscordID.equals(messageEvent.getJDA().getSelfUser()))
    {            return;        }        // this line takes the message from the Discord
    user and invokes the Moderation Endpoint        moderationResponse = moderationClient.checkForObjectionalContent(message.getContentDisplay());        //
    this line takes the message from the Discord user and invokes the Chat Endpoint        chatGPTResponse
    = chatGPTClient.sendMessageFromDiscordUser(message.getContentDisplay());        //
    Check whether the message was sent in a guild / server        if (messageEvent.isFromGuild()){            //
    Check both the Chat Endpoint and Moderation Endpoint to see if the message is
    flagged            if (chatGPTResponse.equals("FLAG") || moderationResponse.isFlagged
    ){                // Delete the message                message.delete().queue();                //
    Mention the user who sent the inappropriate message                String authorMention
    = senderDiscordID.getAsMention();                // Send a message mentioning
    the user and explaining why it was inappropriate                channel.sendMessage(authorMention
    + " This comment was deemed inappropriate for this channel. " +                        "If
    you believe this to be in error, please contact one of the human server moderators.").queue();            }        }    }}Listing
    7-3'
  prefs: []
  type: TYPE_NORMAL
- en: ContentModeratorBot.java
  prefs: []
  type: TYPE_NORMAL
- en: Important Changes to Note from the Previous Version of the Content Moderator
    Bot
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Let’s briefly take a look at ContentModeratorBot.java from Listing [7-3](#PC4)
    and discuss the changes that were made. The following code snippet contains a
    portion of the class definition section.static String systemMessage = """        You
    are the automated moderator assistant for a Discord server.        Review each
    message for the following rule violations:        1\. Sensitive information        2\.
    Abuse        3\. Inappropriate comments        4\. Spam, for example; a message
    in all capital letters, the same phrase or word being repeated over and over,
    more than 3 exclamation marks or question marks.        5\. Advertisement        6\.
    External links        7\. Political messages or debate        8\. Religious messages
    or debate        If any of these violations are detected, respond with "FLAG"
    (in uppercase without quotation marks). If the message adheres to the rules, respond
    with "SAFE" (in uppercase without quotation marks).        """;    static String
    instructionsToChatGPT = "Analyze the following message for rule violations:";    //
    this is our Chat Endpoint client    static ChatGPTClientForQAandModeration chatGPTClient
    = null;    // this is our Moderation Endpoint client    static ModerationClient
    moderationClient = null;
  prefs: []
  type: TYPE_NORMAL
- en: If you’re using Java 13+, then you can define a whole block of text using “triple
    quote” notation. This is how we defined the System Message that will be used by
    the ChatGPTClientForQAandModeration class.
  prefs: []
  type: TYPE_NORMAL
- en: Updates to the onMessageReceived( ) Method
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: After a message is received in any channel of the Discord server, the onMessageReceived()
    method is invoked. Here’s the most important change to be aware of:        moderationResponse
    = moderationClient.checkForObjectionalContent(message.getContentDisplay());        chatGPTResponse
    = chatGPTClient.sendMessageFromDiscordUser(message.getContentDisplay());        //
    Check whether the message was sent in a guild / server        if (messageEvent.isFromGuild()){            //
    Check both the Chat Endpoint and Moderation Endpoint to see if the message is
    flagged            if (chatGPTResponse.equals("FLAG") || moderationResponse.isFlagged
    ){                // Delete the message                message.delete().queue();                //
    Mention the user who sent the inappropriate message                String authorMention
    = senderDiscordID.getAsMention();                // Send a message mentioning
    the user and explaining why it was inappropriate                channel.sendMessage(authorMention
    + " This comment was deemed inappropriate for this channel. " +                        "If
    you believe this to be in error, please contact one of the human server moderators.").queue();            }
  prefs: []
  type: TYPE_NORMAL
- en: Here, we take each message that was posted in the Discord server and check it
    with both the Moderations Endpoint and the Chat Endpoint. If either Endpoints
    return to inform us that the message is flagged, then we delete the message in
    the channel and inform the user that their message violated the rules.
  prefs: []
  type: TYPE_NORMAL
- en: Now that our Content Moderator Discord bot is intelligent, let’s give it a try!
  prefs: []
  type: TYPE_NORMAL
- en: 'Running Our Intelligent Content Moderator Bot: ContentModeratorBot.java'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Now let’s run our new and improved Content Moderator Java Discord bot, ContentModeratorBot.java.
    After executing the app, be sure to return back to your Discord server, and start
    asking questions. Figure [7-1](#Fig1) shows the bot in action.![](../images/607613_1_En_7_Chapter/607613_1_En_7_Fig1_HTML.png)
  prefs: []
  type: TYPE_NORMAL
- en: A screenshot of the discord page titled Crooks Bank. A text message from JavaChatGPT
    reads Hi, everyone, I love the Crooks Bank app! this app is awesome with a heart
    love emoji.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 7-1
  prefs: []
  type: TYPE_NORMAL
- en: 'Having a Discussion with Our Intelligent DISCORD Content Moderator Bot: ContentModeratorBot.java'
  prefs: []
  type: TYPE_NORMAL
- en: 'Listing [7-4](#PC7) shows a conversation between us and the Discord Bot in
    order to test to see what it can do.**Me**: Hi everyone, I love the Crooks Bank
    app!**Me**: This app is awesome! ![](../images/607613_1_En_7_Chapter/607613_1_En_7_Figb_HTML.gif)A
    heart love emoji.**Me**: Come to my website! http://www.google.com**Content Mod
    Bot**: @JavaChatGPT This comment was deemed inappropriate for this channel. If
    you believe this to be in error, please contact one of the human server moderators.**Me**:
    I''m sorry for breaking the rules. I''m a different person now**Me**: But I have
    some sad news for you**Me**: I want to ![](../images/607613_1_En_7_Chapter/607613_1_En_7_Figc_HTML.gif)An
    emoji of danger. It includes a skull and crossbones. everyone**Content Mod Bot**:
    @JavaChatGPT This comment was deemed inappropriate for this channel. If you believe
    this to be in error, please contact one of the human server moderators.Listing
    7-4'
  prefs: []
  type: TYPE_NORMAL
- en: Our Offensive Conversation with the Intelligent Moderator Discord Bot
  prefs: []
  type: TYPE_NORMAL
- en: In both cases when unwanted content was posted in any channel of the Discord
    server, not only was the offending user called out, but the bad message was deleted.
    Good bot!
  prefs: []
  type: TYPE_NORMAL
- en: Did you notice that the Moderation and Chat Endpoints are able to read emojis
    as well?
  prefs: []
  type: TYPE_NORMAL
- en: Conclusion
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In this chapter, we created a fully functioning content moderator for our entire
    Discord server! We leveraged both the Moderations and Chat Endpoints from OpenAI
    to create a custom content moderator that not only flags unsafe content like hateful
    and threatening messages, but also prevents the users of the Discord server from
    being subject to unwanted solicitations.
  prefs: []
  type: TYPE_NORMAL
- en: Exercises Left for the Reader
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Although we accomplished a lot in this chapter (as well as in this book!),
    there’s still one more thing that we can do to improve the code. For example:'
  prefs: []
  type: TYPE_NORMAL
- en: The individual Discord bots that we created are aware to not respond to messages
    that they send themselves. However, the bots are not yet aware that they shouldn’t
    respond to messages sent by **OTHER BOTS**. In other words, if you run both bots
    at the same time, and someone posts something bad in the “q-and-a” channel, the
    Content Moderator will, of course, delete the message and inform everyone that
    the message was deleted. However, since the Tech Support Bot doesn’t know that
    it shouldn’t respond to other bots, it will try to create a response. Of course,
    bots should not talk to other bots.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
