    ****les**son**s, ****y**ou** ****gi**ve** ****th**em** ****mil**lion**s ****o**f**
    ****bo**oks** ****a**nd** ****on**lin**e ****art**icle**s. ****Ov**er** ****ti**me**,
    ****a**s** ****th**ey** ****re**ad**, ****th**ey** ****be**gin** ****t**o** ****unde**rstan**d
    ****t**he** ****pat**tern**s ****o**f** ****lan**guag**e, ****reco**gnizin**g
    ****h**ow** ****sent**ence**s ****f**it** ****tog**ethe**r, ****wh**ich** ****wo**rds**
    ****fo**llo**w ****ot**her**s, ****a**nd** ****ev**en** ****t**he** ****nua**nce**s
    ****o**f** ****to**ne**. ****Th**at**’****s**** ****sim**ila**r ****t**o** ****h**ow**
    ****Cha**tGP**T ****le**arn**s ****t**o** “****sp**eak**” ****a**nd** ****res**pon**d—****i**t**
    ****re**ads** ****thr**oug**h ****va**st** ****amo**unt**s ****o**f** ****te**xt**,
    ****capt**urin**g ****pat**tern**s, ****lea**rnin**g ****conn**ection**s, ****a**nd**,
    ****i**n** ****a**** ****w**ay**, ****pred**ictin**g ****wh**at** ****t**o** ****s**ay**
    ****ne**xt** ****ba**sed** ****o**n** ****wh**at** ****i**t**’****s**** ****se**en**
    ****be**for**e.'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 想象一下，你正在教一个朋友学习一门新语言，但你不是通过课程，而是给他们提供数百万本书和在线文章。随着时间的推移，当他们阅读时，他们开始理解语言的模式，认识到句子是如何相互匹配的，哪些词跟在哪些词后面，甚至还有语调的细微差别。这与ChatGPT学习“说话”和响应的方式相似——它阅读大量文本，捕捉模式，学习联系，并在某种程度上，根据它之前所见的内容预测接下来要说的话。
- en: '****I**n** ****th**is** ****cha**pte**r, ****w**e**’****l**l** ****lo**ok**
    ****a**t** ****h**ow** ****Cha**tGP**T ****tran**sform**s ****fr**om** ****a****
    ****mas**siv**e ****pi**le** ****o**f** ****te**xt** ****in**to** ****a**** ****conve**rsation**al
    ****to**ol** ****cap**abl**e ****o**f** ****answ**erin**g ****ques**tion**s, ****gi**vin**g
    ****ad**vic**e, ****a**nd** ****ev**en** ****sha**rin**g ****jo**kes**!'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将探讨ChatGPT是如何将大量文本转换为能够回答问题、提供建议甚至分享笑话的对话工具的！
- en: '****Wh**at** ****Exa**ctl**y ****i**s** ****a**** “****Lan**guag**e ****Mo**del**”?'
  id: totrans-34
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**什么是“语言模型”**？'
- en: '****A**** *****lan**guag**e ****mo**del*** ****i**s** ****li**ke** ****a****
    ****su**per**-****pow**ere**d ****pred**ictiv**e ****te**xt**. ****Ins**tea**d
    ****o**f** ****ju**st** ****gue**ssin**g ****t**he** ****ne**xt** ****wo**rd**
    ****i**n** ****a**** ****te**xt** ****mes**sag**e, ****i**t** ****gene**rate**s
    ****en**tir**e ****sent**ence**s, ****sto**rie**s, ****o**r** ****ev**en** ****expl**anatio**ns.
    ****Cha**tGP**T ****i**s** ****o**ne** ****o**f** ****th**ese** ****lan**guag**e
    ****mo**del**s, ****a**nd** ****i**t**’****s**** ****des**igne**d ****t**o** ****b**e**
    ****vers**atil**e.'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: '**语言模型就像一个超级强大的预测性文本**。它不仅仅是在文本消息中猜测下一个单词，而是生成完整的句子、故事，甚至解释。ChatGPT就是这些语言模型之一，它的设计目的是要通用。'
- en: '****Th**ink** ****o**f** ****i**t** ****li**ke** ****a**** ****re**cip**e ****f**or**
    ****lan**guag**e: ****i**t** ****do**esn**’****t**** “****unde**rstan**d” ****wo**rds**
    ****li**ke** ****w**e** ****d**o** ****b**ut** ****i**s** ****ab**le** ****t**o**
    ****pre**dic**t ****a**nd** ****gen**erat**e ****resp**onse**s ****ba**sed** ****o**n**
    ****t**he** ****rec**ipe**s ****i**t**’****s**** ****be**en** ****ta**ugh**t ****thr**oug**h
    ****va**st** ****amo**unt**s ****o**f** ****da**ta**.'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 想象一下，这是一份语言食谱：它并不“理解”单词，就像我们做的那样，但它能够根据它所教授的大量数据预测和生成响应。
- en: '****Bui**ldin**g ****Bl**ock**s: ****To**ken**s, ****Tra**inin**g, ****a**nd**
