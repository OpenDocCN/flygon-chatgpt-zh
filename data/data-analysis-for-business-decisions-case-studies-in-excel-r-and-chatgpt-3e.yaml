  id: totrans-1337
  prefs: []
  type: TYPE_NORMAL
  zh: 销售额和利润之间是否存在关系？
- en: Following our practice of not changing the raw data, select the entire file
    and copy it as the shaped file into a new spreadsheet and label the tab “Correlation
    Data.” Use the Analysis ToolPak to compute the correlation matrix between all
    the continuous variables.
  id: totrans-1338
  prefs: []
  type: TYPE_NORMAL
  zh: 按照我们不更改原始数据的惯例，选择整个文件，将其作为形状文件复制到新的工作表中，并将标签命名为“相关性数据”。使用Analysis ToolPak计算所有连续变量之间的相关矩阵。
- en: Select all the continuous variable data columns. Make sure to select the row
    headers as well. Go to the “Data” ribbon and select “Data Analysis” and then “Correlation”
    from the Analysis ToolPak menu ([Figure 9.3](#fig9-3)).
  id: totrans-1339
  prefs: []
  type: TYPE_NORMAL
  zh: 选择所有连续变量数据列。请确保选择行标题。转到“数据”选项卡，然后从Analysis ToolPak菜单中选择“数据分析”和“相关性”。
