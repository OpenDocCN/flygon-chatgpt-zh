  zh: 然而，**AI**的广泛采用也给全球经济带来了风险，尤其是在经济不平等方面。虽然人工智能的益处是巨大的，但存在一个危险，那就是国家、行业和社会群体之间的差异将会扩大。那些无法获取最新**AI**技术的国家和公司可能会落后，导致领先创新者和落后者之间的经济差距扩大。为了减轻这种风险，实施促进数字包容和技术教育的政策将是至关重要的，确保**AI**的进步对社会的所有部分都是可获取和有益的。
