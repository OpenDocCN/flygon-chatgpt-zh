  type: TYPE_NORMAL
  zh: '**你** **曾** **经** **听** **说** **过** **“** **读** **后** **烧** **毁** **”** **这**
    **个** **词** **吗** **？** **这** **个** **短语** **适用** **于** **间谍** **，** **现** **在**
    **也** **应** **用于** **ChatGPT**。** **禁** **用** **聊** **天** **历** **史** **和** **训**
    **练** **是** **确** **保** **在** **使** **用** **OpenAI** **的** **深** **度** **学** **习**
    **聊** **天** **机器人** **时** **您** **的** **安** **全** **和** **隐** **私** **的** **重**
    **要** **步** **骤** **，** **但** **这** **可能** **还** **不够** **。** **这** **个** **功**
    **能** **阻** **止** **ChatGPT** **在** **您** **输入** **到** **它** **中** **的** **信**
    **息** **上** **进** **行** **训** **练** **，** **但** **它** **并** **不** **真** **正**
    **删** **除** **它** **。** **这** **意** **味** **着** **，** **如** **果** **有** **数**
    **据** **泄** **露** **，** **您** **的** **聊** **天** **历** **史** **仍** **可** **能**
    **被** **泄** **露** **。** **这** **种** **情** **况** **在** **2023** **年** **3** **月**
    **20** **日** **发** **生** **了** **，** **当** **一** **个** **“** **错** **误** **”**
    **从** **一个** **被** **添加** **到** **其** **数** **据** **库** **的** **开源** **图** **书**
    **馆** **中** **侵** **入** **了** **ChatGPT** **系** **统** **，** **导致** **用** **户**
    **能** **够** **查** **看** **其他** **用** **户** **的** **聊** **天** **历** **史** **标**
    **题** **。** **惊** **人** **的** **是** **，** **从** **1** **.** **2** **%** **的**
    **ChatGPT** **Plus** **用** **户** **的** **一** **些** **支** **付** **信** **息** **被**
    **公** **开** **，** **包括** **他** **们** **的** **名** **字** **、** **电** **子** **邮**
    **箱** **地** **址** **，** **甚** **至** **信** **用** **卡** **信** **息** **（** **Kan**
    **，** **2023** **）。** **这** **看** **似** **只** **是** **总** **数** **中** **的一** **小**
    **部** **分** **，** **但** **如果** **您** **是** **那** **些** **不幸** **的** **一** **员**
    **之** **一** **，** **您** **的** **个** **人** **信** **息** **被** **泄** **露** **，**
    **那** **么** **对** **于** **那** **些** **其** **他** **还** **在** **安** **全** **中**
    **的** **人** **来** **说** **，** **这** **几** **乎** **没** **有** **什** **么** **意**
    **义** **。**'
