- en: Part 3
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: From Code to Production with GenAI
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: In *Part 3* of this book, we branch from simple coding to the full **software
    development life cycle** (**SDLC**). We first focus on writing docstrings, followed
    by testing, since these are almost universally required for production-ready code.
    The next advanced topic is scaling applications for systems in terms of runtime
    and memory. The part will also cover logging, monitoring, and error handling.
  prefs: []
  type: TYPE_NORMAL
- en: The techniques for completing these SDLC steps build on both the five S’s framework
    and advanced prompt engineering techniques discussed in *Part 2*.
  prefs: []
  type: TYPE_NORMAL
- en: The final chapter examines the current trends, including vibe coding, and suggests
    what might be next for the field of GenAI.
  prefs: []
  type: TYPE_NORMAL
