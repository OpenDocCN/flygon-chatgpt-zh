- en: The Cultural and Social Impact of ChatGPT
  id: totrans-965
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: ChatGPT的文化和社会影响
- en: '![image](d2d_images/chapter_title_below.png)'
  id: totrans-966
  prefs: []
  type: TYPE_IMG
  zh: '![image](d2d_images/chapter_title_below.png)'
- en: ChatGPT is a prime example of the transformative potential of AI in reshaping
    how people create and consume content. It has democratized access to a wide audience,
    allowing more people to engage with AI than ever before. Yet, this progress is
    not without its pitfalls. We must be aware of challenges such as automated deception,
    uneven information distribution, and potential data breaches that come with the
    territory of AI deployment in cultural and social spheres.
  id: totrans-967
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT是人工智能在重塑人们创造和消费内容方式上的变革潜力的一个典型例子。它使更多人能够接触到广泛的受众，比以往任何时候都更容易与人工智能互动。然而，这种进步并非没有其缺陷。我们必须意识到，在文化和社交领域部署人工智能所带来的挑战，如自动化欺骗、信息分布不均以及潜在的数据泄露。
- en: ChatGPT is fundamentally altering human communication. By substituting traditional
    face-to-face conversations with machine-mediated dialogues, it introduces a new
    dynamic that can strain interpersonal relationships. Machines equipped with emotion-detecting
    technologies may inadvertently misinterpret or overlook subtleties that are intrinsic
    to human communication. Thus, it's crucial to consider the implications of these
    advancements on daily life and strive for an environment where intelligent systems
    do not perpetuate discrimination or exploitation.
  id: totrans-968
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT正在从根本上改变人类沟通。通过用机器介导的对话取代传统的面对面交流，它引入了一种新的动态，可能会对人际关系造成压力。配备情感识别技术的机器可能会无意中误解或忽视人类沟通中固有的细微差别。因此，考虑这些进步对日常生活的影响，并努力创造一个智能系统不会持续歧视或剥削的环境至关重要。
- en: On the other hand, the integration of AI like ChatGPT into various use-cases
    presents numerous advantages. Improved customer service via responsive chatbots
    and accurate data analysis are just the tip of the iceberg. However, regardless
    of future advancements, it is imperative to institute measures that protect privacy
    and ensure the impartiality of algorithm decisions.
  id: totrans-969
  prefs: []
  type: TYPE_NORMAL
  zh: 另一方面，将ChatGPT等人工智能集成到各种用例中带来了许多优势。通过响应式聊天机器人和准确的数据分析来改善客户服务，这只是冰山一角。然而，无论未来的进步如何，都必须制定保护隐私和确保算法决策公正性的措施。
- en: ChatGPT-driven chatbots are becoming a popular, cost-effective solution for
    large-scale customer service operations. Despite their convenience and speed,
    these chatbots cannot fully replicate the human connection that emerges from real
    conversations with customers. Their potential failure to accurately interpret
    emotional cues from users can lead to subpar experiences. This highlights the
    irreplaceable value of human involvement in areas where technology currently falls
    short.
  id: totrans-970
  prefs: []
  type: TYPE_NORMAL
  zh: 由ChatGPT驱动的聊天机器人正成为大规模客户服务运营的流行且成本效益高的解决方案。尽管它们方便快捷，但这些聊天机器人无法完全复制来自与客户真实对话中产生的人性化联系。它们可能无法准确解读用户情绪的潜在失败可能导致体验不佳。这突显了在技术目前不足的领域，人类参与的不可替代价值。
- en: The story of ChatGPT is a testament to the ways in which AI has revolutionized
    culture in recent years. However, it is also a cautionary tale that reminds us
    of the risks associated with AI-powered products and services. We must not overlook
    the need for robust methods of detecting bias in AI systems, as well as safeguards
    for privacy and civil rights, prior to deploying any new AI-powered system.
  id: totrans-971
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT的故事证明了近年来人工智能如何革命性地改变文化。然而，它也是一个警示故事，提醒我们与人工智能产品和服务相关的风险。在部署任何新的基于人工智能的系统之前，我们必须重视检测人工智能系统中的偏见所需的强大方法，以及保护隐私和公民权利的保障措施。
- en: 'AI and Cybersecurity: Safeguarding Data and Networks'
  id: totrans-972
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能与网络安全：保护数据和网络
- en: The potential of AI on businesses, customers, and cybercriminals is a double-edged
    sword. Voice recognition technology like Alexa has become an integral part of
    everyday life. Search engines such as Google have revolutionized the way people
    access information.
  id: totrans-973
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能对商业、客户和网络犯罪分子的潜在影响是一把双刃剑。语音识别技术如Alexa已成为日常生活的一部分。搜索引擎如Google已经彻底改变了人们获取信息的方式。
- en: Moreover, certain financial organizations are using AI to prevent fraudulent
    activities, saving them billions yearly. Yet the utilization of AI in cyber security
    raises questions about its potential for enhancing or weakening digital security
    for companies.
  id: totrans-974
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，某些金融机构正在使用人工智能来预防欺诈活动，每年为他们节省数十亿美元。然而，在网络安全领域使用人工智能引发了对其增强或削弱公司数字安全潜力的质疑。
- en: What Challenges Does Cyber Security Face?
  id: totrans-975
  prefs: []
  type: TYPE_NORMAL
  zh: 网络安全面临哪些挑战？
- en: 'Cyber security faces many challenges, including:'
  id: totrans-976
  prefs: []
  type: TYPE_NORMAL
  zh: 网络安全面临许多挑战，包括：
- en: A vast attack surface area.
  id: totrans-977
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 广阔的攻击面。
- en: An extensive number of devices need protection within an organization.
  id: totrans-978
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在一个组织中需要保护大量设备。
- en: Numerous attack vectors are used by hackers.
  id: totrans-979
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 黑客使用了多种攻击向量。
- en: A lack of skilled security professionals due to ever-growing demands.
  id: totrans-980
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 由于需求不断增长，缺乏熟练的安全专业人员。
- en: Too much data with too little human capacity needed to process it all accurately
    – making analysis increasingly difficult
  id: totrans-981
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 数据量太大，而人类处理这些数据的能力却有限，这使得分析越来越困难
- en: What Is the Reach of AI in Cyber Security?
  id: totrans-982
  prefs: []
  type: TYPE_NORMAL
  zh: AI在网络安全中的影响范围是什么？
- en: In the realm of cyber safety, artificial intelligence, specifically ChatGPT,
    presents both opportunities and challenges. While it enhances our ability to analyze,
    understand, and thwart malicious activities to protect user information and business
    assets, it also presents an avenue for wrongdoers to leverage this technology
    for nefarious purposes. A notable application of AI in this context is virtual
    private networks (VPNs). Machine learning gives them an upper hand in mitigating
    online threats that stem from AI itself!
  id: totrans-983
  prefs: []
  type: TYPE_NORMAL
  zh: 在网络安全领域，人工智能，特别是ChatGPT，既提供了机遇也带来了挑战。虽然它增强了我们分析、理解和挫败恶意活动的能力，以保护用户信息和商业资产，但它也为不法分子提供了利用这项技术进行恶意目的的途径。在这个背景下，AI的一个显著应用是虚拟私人网络（VPN）。机器学习使它们在减轻由AI本身产生的在线威胁方面具有优势！
- en: As we advance further into the digital age, anticipating and neutralizing cyber
    threats is crucial. With AI-infused security solutions like ChatGPT at our disposal,
    we stand a better chance against online adversaries. The sophisticated algorithms
    of machine learning and AI offer a competitive edge, swiftly processing data and
    providing robust defense mechanisms. The time to capitalize on these advanced
    technologies is now! View them as shields, defending us from potential digital
    hazards.
  id: totrans-984
  prefs: []
  type: TYPE_NORMAL
  zh: 随着我们进一步进入数字时代，预测和中和网络威胁至关重要。有了像ChatGPT这样的AI增强安全解决方案，我们对抗网络对手的机会更大。机器学习和AI的复杂算法提供了竞争优势，快速处理数据并提供强大的防御机制。利用这些先进技术的时机已经到来！把它们看作是盾牌，保护我们免受潜在的数字危害。
- en: The 10 Benefits of Using AI in Cybersecurity
  id: totrans-985
  prefs: []
  type: TYPE_NORMAL
  zh: 使用AI在网络安全中的10大好处
- en: Seeking success in the digital age? AI can get you there. With over 200,000
    cyber events aiming to take down mid-sized companies each day, it’s critical that
    businesses deploy advanced technology for maximum protection of their networks
    and data. Artificial intelligence is a powerful tool for combatting threats, recognizing
    new malware types, and safeguarding sensitive info—all key ingredients when it
    comes to staying safe online.
  id: totrans-986
  prefs: []
  type: TYPE_NORMAL
  zh: 在数字时代寻求成功？AI可以帮你实现。每天有超过20万次网络事件试图摧毁中型公司，因此企业部署先进技术以最大程度地保护其网络和数据至关重要。人工智能是应对威胁、识别新型恶意软件和保障敏感信息的有力工具——这些都是保持在线安全的关键因素。
- en: 'Instead of relying on human experts who struggle to manually address every
    alert (an impossible task due to the huge volume of attacks), AI systems are able
    to process vast amounts of info faster and more accurately, preventing any breach
    from slipping through the cracks! If your business wants to stay ahead in today’s
    ever-evolving tech world, then AI is an essential component for keeping secure.
    Here’re ten ways this cutting-edge intel can boost cybersecurity:'
  id: totrans-987
  prefs: []
  type: TYPE_NORMAL
  zh: 与依赖努力手动处理每个警报的人类专家（由于攻击量巨大，这是一项不可能完成的任务）相比，AI系统能够更快、更准确地处理大量信息，防止任何漏洞从缝隙中溜走！如果你的企业想在今天不断变化的科技世界中保持领先，那么AI是保持安全的关键组成部分。这里有十种方式这种尖端情报可以提升网络安全：
- en: Get Smarter Over Time
  id: totrans-988
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 随着时间的推移变得更聪明
- en: AI has the ability to analyze network activity as they occur - detecting anomalies
    or incidents that don’t line up with normal behavior patterns right away so hackers
    have no chance of outsmarting it.
  id: totrans-989
  prefs: []
  type: TYPE_NORMAL
  zh: AI能够实时分析网络活动——立即检测出与正常行为模式不符的异常或事件，这样黑客就没有机会智胜它。
- en: Unknown Threats Identified Instantly
  id: totrans-990
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 立即识别未知威胁
- en: Keeping tabs on unknown threats used to be tough, but now Artificial Intelligence
    automates this process by quickly scanning through data sets - allowing you to
    detect potential danger before it does damage.
  id: totrans-991
  prefs: []
  type: TYPE_NORMAL
  zh: 监控未知威胁曾经很困难，但现在人工智能通过快速扫描数据集自动化这一过程——让你在它造成损害之前就能检测到潜在的危险。
- en: Handle Data Easily
  id: totrans-992
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 轻松处理数据
- en: With vast amounts of traffic flowing through company networks on a daily basis,
    manually reviewing all activity isn’t feasible; however, AI technology automatically
    scans and identifies disguised threats so businesses can focus their attention
    elsewhere without compromising safety measures.
  id: totrans-993
  prefs: []
  type: TYPE_NORMAL
  zh: 由于公司网络每天都会流经大量流量，手动审查所有活动是不切实际的；然而，人工智能技术可以自动扫描和识别伪装的威胁，从而使企业能够将注意力集中在其他地方，而不会影响安全措施。
- en: Vulnerability Management
  id: totrans-994
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 漏洞管理
- en: Cybersecurity personnel often have difficulty pinpointing weak points within
    existing systems when faced with numerous targets – luckily though, Artificial
    Intelligence is well-equipped to handle such tasks due to its self-learning capabilities!
    This helps businesses fix problems quicker while also preventing attacks from
    occurring beforehand too.
  id: totrans-995
  prefs: []
  type: TYPE_NORMAL
  zh: 面对众多目标时，网络安全人员往往难以在现有系统中确定弱点——幸运的是，由于人工智能具备自我学习能力，它非常适合处理这类任务！这有助于企业更快地解决问题，同时也能在攻击发生之前预防攻击。
- en: Overall Security Boosted
  id: totrans-996
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 总体安全性提升
- en: Human error is inevitable; mistakes happen every day, which makes solidifying
    overall security measures even harder. Fortunately, using automated processes
    powered by Artificial Intelligence means you won’t miss anything important. This
    eliminates risk and allows companies to prioritize prevention against multiple
    looming dangers simultaneously, giving them one less thing worth worrying about,
    no matter how sophisticated the tactics get over time.
  id: totrans-997
  prefs: []
  type: TYPE_NORMAL
  zh: 人类错误在所难免；错误每天都在发生，这使得巩固整体安全措施变得更加困难。幸运的是，利用由人工智能驱动的自动化流程意味着您不会错过任何重要信息。这消除了风险，使公司能够同时优先预防多个即将到来的危险，从而减少他们需要担心的事情，无论随着时间的推移策略变得多么复杂。
- en: Streamlining Security Systems
  id: totrans-998
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 简化安全系统
- en: AI has completely transformed the game when it comes to cyber security, automating
    tiresome and repetitive tasks that could otherwise lead to human error or complacency.
    It’s like having an extra pair of eyes on watch - all day, every day - scanning
    large amounts of data for potential threats and ensuring businesses stay up-to-date
    with their network safety protocols at all times.
  id: totrans-999
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能在网络安全方面彻底改变了游戏规则，自动化了那些可能导致人为错误或懈怠的繁琐和重复性任务。这就像全天候、每天24小时都有一双眼睛在监视——扫描大量数据以寻找潜在威胁，并确保企业始终了解其网络安全协议。
- en: Rapidly Detecting and Responding
  id: totrans-1000
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 快速检测和响应
- en: Integrating AI into digital defense is a total game changer in terms of detection
    speed. With it malicious activity can be spotted faster than ever before, allowing
    for immediate action before any irreversible damage is done. This frees up humans
    from tedious manual scans so they can focus more intently on higher-level strategies
    instead.
  id: totrans-1001
  prefs: []
  type: TYPE_NORMAL
  zh: 将人工智能集成到数字防御中，在检测速度方面是一次彻底的变革。有了它，恶意活动可以比以往任何时候都更快地被发现，从而在造成任何不可逆转的损害之前立即采取行动。这使人类从繁琐的手动扫描中解放出来，可以更加专注地关注高级策略。
- en: Strengthening Authentication Processes
  id: totrans-1002
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 加强身份验证流程
- en: Websites featuring user accounts or contact forms with sensitive info require
    an added layer of protection - one that AI is uniquely suited for providing, thanks
    to its ability to recognize patterns better than traditional methods like CAPTCHAs
    or fingerprint scanners. It can handle even complex authentication scenarios efficiently
    while protecting against credential stuffing attacks and brute force attempts
    leading up to a possible breach in your network’s defenses.
  id: totrans-1003
  prefs: []
  type: TYPE_NORMAL
  zh: '拥有用户账户或包含敏感信息的联系表单的网站需要额外的保护层——由于人工智能能够比传统的CAPTCHA或指纹扫描器等传统方法更好地识别模式，它非常适合提供这种保护。它能够高效地处理复杂的身份验证场景，同时保护免受凭证填充攻击和暴力破解尝试，这些尝试可能导致网络防御出现漏洞。 '
- en: Reducing Manual Labor
  id: totrans-1004
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 减少人工劳动
- en: With AI reducing the amount of tedious labor needed, human experts no longer
    have to waste countless hours performing mundane scans but rather use them as
    opportunities to hone their skillset and further refine strategies combatting
    emerging cyber threats more effectively.
  id: totrans-1005
  prefs: []
  type: TYPE_NORMAL
  zh: 随着人工智能减少所需进行的繁琐劳动量，人类专家不再需要浪费无数小时进行日常扫描，而是可以利用这些时间作为提升技能集和进一步优化应对新兴网络威胁策略的机会。
- en: Battling Bots
  id: totrans-1006
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 打击机器人
- en: To protect against bots used maliciously spreading malware and stealing data,
    Artificial Intelligence provides invaluable assistance by recognizing patterns
    within bot behavior. It deploys honeypots, capturing and blocking them effectively
    and learning how to adapt new tactics for bypassing existing safeguards.
  id: totrans-1007
  prefs: []
  type: TYPE_NORMAL
  zh: 为了防止恶意传播恶意软件和窃取数据，人工智能通过识别机器人行为中的模式提供了宝贵的帮助。它部署诱饵，有效地捕获和阻止它们，并学习如何适应绕过现有安全措施的新策略。
- en: '| ![image](d2d_images/chapter_title_corner_decoration_left.png) |  | ![image](d2d_images/chapter_title_corner_decoration_right.png)
    |'
  id: totrans-1008
  prefs: []
  type: TYPE_TB
  zh: '| ![image](d2d_images/chapter_title_corner_decoration_left.png) |  | ![image](d2d_images/chapter_title_corner_decoration_right.png)
    |'
- en: '![image](d2d_images/chapter_title_above.png)'
  id: totrans-1009
  prefs: []
  type: TYPE_IMG
  zh: '![image](d2d_images/chapter_title_above.png)'
- en: 'AI and Employment: Upskilling and Reskilling the Workforce'
  id: totrans-1010
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 人工智能与就业：提升技能和再培训劳动力
- en: '![image](d2d_images/chapter_title_below.png)'
  id: totrans-1011
  prefs: []
  type: TYPE_IMG
  zh: '![image](d2d_images/chapter_title_below.png)'
- en: The AI revolution has made experts with specialized skills a must for the ever-changing
    landscape of today. According to LinkedIn’s 2020 report, demand for tech wizards
    is soaring due to companies favoring automation over manual labor. Although this
    advancement can make our lives simpler by taking on mundane tasks, it also brings
    forth certain risks like job insecurity and widening the already huge divide between
    those who have access to education and those who don’t.
  id: totrans-1012
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能革命使得具有专业技能的专家在当今不断变化的领域中变得必不可少。根据LinkedIn 2020年的报告，由于公司更倾向于自动化而非手工劳动，对技术奇才的需求正在激增。尽管这种进步可以通过承担日常任务来简化我们的生活，但它也带来了一些风险，如就业不安全和扩大那些能够获得教育的人和那些不能获得教育的人之间的巨大差距。
- en: This is why upskilling and reskilling are nowadays seen as go-to solutions businesses
    use to stay ahead of revolutionary technology changes. Upskilling allows organizations
    to develop their existing employees’ abilities through extra training, while reskilling
    gives them whole new areas of knowledge - preparing them for positions they may
    be unaware exist! So if you want your business to keep up and dominate in this
    fast-paced world, equip yourself or your team with these valuable skills now.
  id: totrans-1013
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是为什么现在提升技能和再培训被视为企业用来保持领先于革命性技术变革的常用解决方案。提升技能允许组织通过额外培训来发展现有员工的能力，而再培训则为他们提供了全新的知识领域——为那些他们可能尚未意识到的职位做准备！所以，如果你想让你的业务跟上并在这个快节奏的世界中占据主导地位，现在就装备自己或你的团队这些宝贵的技能吧。
- en: The Power of Reskilling and Upskilling
  id: totrans-1014
  prefs: []
  type: TYPE_NORMAL
  zh: 再培训和提升技能的力量
- en: 'As AI continues to revolutionize the job market, upskilling and reskilling
    are invaluable tools when it comes to keeping your team ahead of the curve. By
    acquiring new skills or refreshing old ones, workers can easily adjust their abilities
    in order to keep pace with technological advancements – allowing them to remain
    just as competitive no matter how quickly things change. Here are a few key areas
    that companies should consider investing in:'
  id: totrans-1015
  prefs: []
  type: TYPE_NORMAL
  zh: 随着人工智能继续革命化就业市场，提升技能和再培训是保持你的团队走在曲线前面的宝贵工具。通过获取新技能或更新旧技能，工人可以轻松调整他们的能力，以跟上技术进步的步伐——使他们无论变化多快都能保持竞争力。以下是公司应考虑投资的几个关键领域：
- en: 'Data Analysis: With AI becoming increasingly integral to businesses worldwide,
    data analytics is an essential skill for professionals across all industries -
    from salespeople needing sophisticated CRM systems which use AI algorithms for
    customer predictions based on past buying activities right through IT experts
    and software developers who require proficiency working around ML technologies.'
  id: totrans-1016
  prefs: []
  type: TYPE_NORMAL
  zh: 数据分析：随着人工智能在全球企业中变得越来越不可或缺，数据分析是所有行业专业人士的必备技能——从需要使用人工智能算法进行客户预测的复杂CRM系统销售员，到需要熟练处理机器学习技术的IT专家和软件开发者。
- en: 'AI and Machine Learning Knowledge: As tech evolves evermore rapidly into more
    complex territories, everyone needs a basic understanding of Artificial Intelligence
    (AI) and machine learning (ML). Not only does this ensure you stay relevant moving
    forward, but it also gives you an edge over competitors still stuck in outdated
    methods - so if you want success tomorrow, then don’t sleep on these must-have
    techniques.'
  id: totrans-1017
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能与机器学习知识：随着技术以越来越快的速度进入更复杂的领域，每个人都需要了解人工智能（AI）和机器学习（ML）的基本知识。这不仅确保你能够继续前进并保持相关性，而且还能让你在那些仍然停留在过时方法上的竞争对手中占据优势——所以，如果你想成功，那么不要忽视这些必备技术。
- en: 'Digital Literacy and Cybersecurity Skills: As society moves towards a future
    where Artificial Intelligence plays a bigger role than ever before, having digital
    literacy is now essential for any employee looking to stay ahead in the game -
    whether they’re creating content or using online tools powered by AI. To ensure
    that all businesses reap maximum benefits from their investments in such technologies
    without running afoul of security policies at the same time, reskilling employees
    in cybersecurity should also be a high priority when upskilling staff members
    across different departments within an organization.'
  id: totrans-1018
  prefs: []
  type: TYPE_NORMAL
  zh: 数字素养与网络安全技能：随着社会朝着人工智能比以往任何时候都扮演更大角色的未来迈进，拥有数字素养对于任何希望保持竞争优势的员工来说现在变得至关重要——无论他们是创建内容还是使用由人工智能驱动的在线工具。为确保所有企业都能从其对这些技术的投资中获得最大收益，同时又不违反安全政策，当组织内部不同部门的员工提升技能时，对员工进行网络安全再培训也应成为一项高优先级任务。
- en: Boosting Employee Morale and Retention
  id: totrans-1019
  prefs: []
  type: TYPE_NORMAL
  zh: 提升员工士气和留存率
- en: Keeping employee morale and loyalty high doesn’t have to be complicated. Invest
    in your team’s growth by giving them opportunities for upskilling or reskilling.
    They’ll know you value their development, resulting in greater commitment and
    satisfaction. Plus, it’s a solution where everyone benefits. Yes, everyone benefits
    from the investment.
  id: totrans-1020
  prefs: []
  type: TYPE_NORMAL
  zh: 保持员工士气和忠诚度不一定要复杂。通过为他们提供提升或再培训的机会来投资于团队的增长。他们会知道您重视他们的发展，这将导致更大的承诺和满意度。此外，这是一个让每个人都受益的解决方案。是的，每个人都从投资中受益。
- en: 'Examples:'
  id: totrans-1021
  prefs: []
  type: TYPE_NORMAL
  zh: 例子：
- en: 'Career Advancement Possibilities: Employers that offer upskilling opportunities
    make clear to their staff there’s a chance for professional growth within the
    organization. A customer service rep, for instance? They can get trained in superior
    communication tactics and leadership abilities. As such, their current job performance
    can be improved while giving them a path toward personal development - resulting
    in contentedness and loyalty to the company.'
  id: totrans-1022
  prefs: []
  type: TYPE_NORMAL
  zh: 职业发展可能性：提供提升机会的雇主向其员工明确表示，在组织内部有职业发展的机会。例如，一位客户服务代表？他们可以接受高级沟通策略和领导能力的培训。因此，他们的当前工作表现可以得到改善，同时为他们提供个人发展的途径——从而带来满意度和对公司的忠诚度。
- en: 'Individual Development Programs: Reinvigorate your team with reskilling. Introduce
    coding classes to employees in non-technical departments - it’s a great way for
    them to learn something new and explore potential job opportunities. Investing
    in personnel development shows you care, plus it’ll give everyone an extra morale
    boost too.'
  id: totrans-1023
  prefs: []
  type: TYPE_NORMAL
  zh: 个人发展计划：通过再培训让您的团队焕发活力。向非技术部门的员工介绍编码课程——这是他们学习新事物和探索潜在工作机会的好方法。投资于人员发展表明您关心他们，同时也会给大家带来额外的士气提升。
- en: 'Adaptability during Changes: Adapt or get left behind. Reskilling courses are
    perfect for industries where technology is rapidly evolving, like manufacturing;
    workers won’t have to worry about their roles becoming redundant as automation
    takes over if they’re upskilled in robot maintenance or programming. Education
    businesses should show their commitment by providing these programs – not only
    now but also looking ahead into the future. With creative minds from different
    disciplines working together, the possibilities are endless, and more efficient
    solutions can be implemented immediately.'
  id: totrans-1024
  prefs: []
  type: TYPE_NORMAL
  zh: 变革中的适应性：适应或被淘汰。再培训课程非常适合技术快速发展的行业，如制造业；如果工人在机器人维护或编程方面得到提升，他们就不必担心自己的角色会因为自动化而变得多余。教育企业应通过提供这些项目来表明他们的承诺——不仅现在，而且展望未来。来自不同学科的创新思维共同工作，可能性是无限的，并且可以立即实施更有效的解决方案。
- en: 'Cross-Functional Collaboration: Stepping outside of the comfort zone and upskilling
    or reskilling employees in areas beyond their primary role can bring a fresh,
    creative outlook to any project. For instance, say you’ve got an ace marketer
    who has recently been trained in data analysis; when this person partners with
    your data science team, they have the potential to craft strategies that blend
    both artistry and analytics for maximum impact.'
  id: totrans-1025
  prefs: []
  type: TYPE_NORMAL
  zh: 跨职能协作：走出舒适区，对员工进行超出其主要角色的提升或再培训，可以为任何项目带来新鲜、富有创造力的视角。例如，假设您有一位最近接受过数据分析培训的顶尖营销人员；当这个人与您的数据科学团队合作时，他们有可能制定出结合艺术和数据分析以产生最大影响的策略。
- en: 'Efficiency in Problem-Solving: With diverse skillsets, problem-solving becomes
    faster and more efficient. Take for instance a project manager who is familiar
    with coding; this allows them to better understand software development issues
    while allowing them to communicate quickly with developers for quicker resolution
    of said issues which ultimately streamlines the project’s execution process.'
  id: totrans-1026
  prefs: []
  type: TYPE_NORMAL
  zh: 解决问题的效率：拥有多样化的技能组合，问题解决变得更加快速和高效。以一个熟悉编码的项目经理为例；这使他们能够更好地理解软件开发问题，同时允许他们与开发者快速沟通，以更快地解决这些问题，从而最终简化项目的执行过程。
- en: 'Innovation in Product Development: Upskilling or reskilling also leads to much-needed
    innovation when it comes to product design and buildout - think aesthetically
    pleasing user experiences (UX) from those who have been upskilled. This means
    products created now meet customer needs easier as well as stand out amongst the
    competition - all thanks to an understanding of UX principles.'
  id: totrans-1027
  prefs: []
  type: TYPE_NORMAL
  zh: 产品开发创新：在产品设计和构建方面，提升技能或重新培训也带来了迫切需要的创新——想想那些经过提升技能的人所创造的美观用户体验（UX）。这意味着现在创造的产品更容易满足客户需求，并在竞争中脱颖而出——这一切都归功于对UX原则的理解。
- en: '| ![image](d2d_images/chapter_title_corner_decoration_left.png) |  | ![image](d2d_images/chapter_title_corner_decoration_right.png)
    |'
  id: totrans-1028
  prefs: []
  type: TYPE_TB
  zh: '| ![image](d2d_images/chapter_title_corner_decoration_left.png) |  | ![image](d2d_images/chapter_title_corner_decoration_right.png)
    |'
- en: '![image](d2d_images/chapter_title_above.png)'
  id: totrans-1029
  prefs: []
  type: TYPE_IMG
  zh: '![image](d2d_images/chapter_title_above.png)'
- en: 'AI and Human Decision-Making: Striking the Perfect Balance'
  id: totrans-1030
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 人工智能与人类决策：寻求完美的平衡
- en: '![image](d2d_images/chapter_title_below.png)'
  id: totrans-1031
  prefs: []
  type: TYPE_IMG
  zh: '![image](d2d_images/chapter_title_below.png)'
- en: As tech capabilities continue to grow, Artificial Intelligence is becoming increasingly
    useful in structured environments with clearly defined goals and limited inputs/outputs.
    Take a parts distribution machine at a manufacturing plant for example – AI armed
    with real-time feedback of usage on the factory floor and urgent requests can
    process information quickly and accurately, delivering whatever parts are needed
    exactly when they’re necessary for just-in-time engineering. This leads to fewer
    accidents, injuries, or delays due to human error. Plus, it’s way faster than
    any person could manage alone.
  id: totrans-1032
  prefs: []
  type: TYPE_NORMAL
  zh: 随着技术能力的持续增长，人工智能在具有明确目标和有限输入/输出的结构化环境中变得越来越有用。以制造工厂中的零部件配送机器为例——配备有工厂地面实时使用反馈和紧急请求的人工智能可以快速准确地处理信息，在需要时正好提供所需的零部件，为即时工程提供支持。这导致由于人为错误而发生的意外、伤害或延误减少。而且，这比任何一个人单独管理都要快得多。
- en: 'So can you ensure AI systems strike the perfect balance between automation
    and human input? Assuming all variables remain controlled while still allowing
    variation in certain circumstances, an algorithm must be implemented which takes
    into account every possible input and output and then processes them accordingly
    to maximize benefits while solving complex problems efficiently. In other words:
    let machines handle what they’re good at but don’t forget about us humans either
    – because, sometimes, there’s no substitute for our unique logic!'
  id: totrans-1033
  prefs: []
  type: TYPE_NORMAL
  zh: 你能确保人工智能系统在自动化和人类输入之间达到完美的平衡吗？假设在控制所有变量的同时，仍允许在某些情况下有所变化，必须实施一个算法，该算法考虑了所有可能的输入和输出，并相应地处理它们，以最大化利益并高效地解决复杂问题。换句话说：让机器处理它们擅长的事情，但别忘了我们人类——因为，有时，我们独特的逻辑是无法替代的！
- en: Humans have the gift of ingenuity, but it takes time to make complex decisions.
    In today’s world, where businesses need to consider an immense number of factors
    when looking at potential acquisitions or partnerships, AI can be used as a tool
    to help human minds navigate these challenging choices quickly and efficiently.
  id: totrans-1034
  prefs: []
  type: TYPE_NORMAL
  zh: 人类拥有独创性的天赋，但做出复杂的决策需要时间。在当今世界，当企业需要考虑在潜在收购或合作中考虑的大量因素时，人工智能可以用作工具，帮助人类大脑快速有效地导航这些挑战性选择。
- en: Instead of spending days analyzing data points by hand, Artificial Intelligence
    (AI) can be employed for comprehensive processing capabilities that provide a
    clear overview. That way, it allows for more energy and resources to weigh the
    pros and cons before making a final decision on any given issue.
  id: totrans-1035
  prefs: []
  type: TYPE_NORMAL
  zh: 而不是花费几天时间手动分析数据点，人工智能（AI）可以用于综合处理能力，提供清晰的概述。这样，它允许在做出最终决定之前，有更多的时间和资源权衡利弊。
- en: Take buying out another company, for example. There are so many components involved
    like design history, market conditions, current staff productivity levels, payroll
    absorption implications, etc. All of them need careful consideration in order
    to form an informed conclusion about whether or not it’s worth taking this step
    forward into uncharted waters – something humans haven’t been able to maximize
    alone until now.
  id: totrans-1036
  prefs: []
  type: TYPE_NORMAL
  zh: 以收购另一家公司为例。涉及许多组成部分，如设计历史、市场状况、当前员工的生产力水平、工资吸收影响等。所有这些都需要仔细考虑，以便形成关于是否值得采取这一步进入未知水域的明智结论——这是人类以前无法独自最大化的。
- en: The power of AI-aided Intelligence Amplification is perhaps best seen in situations
    requiring such nuanced judgment calls, where technology helps speed up the process
    without sacrificing detail quality. It frees up the human cognition space needed
    for strategic planning and creative problem solving – some things just require
    those special touches only we humans possess!
  id: totrans-1037
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能辅助智能增强的力量在需要这种细微判断的情况中表现得尤为明显，其中技术有助于加快过程而不牺牲细节质量。它释放了人类认知空间，用于战略规划和创造性问题解决——有些事情确实需要我们人类所特有的那些特殊触感！
- en: 'As an entrepreneur, I’m in the pursuit of my dreams, and AI is part of that
    journey. Although it has come far, there’s still much work to be done before it
    can replace me in running a business effectively – something which requires expertise
    from all angles: staff, family, friends, and mentors all give valuable input,
    which contributes to an individual knowledge bank that allows sound decision making
    for multiple facets within the startup world.'
  id: totrans-1038
  prefs: []
  type: TYPE_NORMAL
  zh: 作为一名企业家，我正在追求我的梦想，而人工智能是这一旅程的一部分。尽管它已经取得了很大的进步，但在它能够有效地管理业务并取代我之前，还有很多工作要做——这需要从各个角度的专业知识：员工、家人、朋友和导师都提供了宝贵的意见，这有助于形成个人知识库，从而在创业世界的多个方面做出明智的决策。
- en: However, AI does help me when considering complex scenarios. For instance, analytics
    tools help determine my next move by providing insight into website performance.
    Plus, they make me more efficient. People may not even realize they’re using Artificial
    Intelligence every day, but its presence is definitely felt - so embrace this
    technological revolution.
  id: totrans-1039
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，人工智能在考虑复杂情况时确实帮助了我。例如，分析工具通过提供对网站性能的洞察来帮助确定我的下一步行动。此外，它们使我更加高效。人们可能甚至没有意识到他们每天都在使用人工智能，但它的存在确实感受到了——所以拥抱这场技术革命吧。
- en: The Role of Regulations and Policies in ChatGPT
  id: totrans-1040
  prefs: []
  type: TYPE_NORMAL
  zh: 规章和政策在ChatGPT中的作用
- en: Regulations and policies play a crucial role in the development, use, and management
    of AI technologies like ChatGPT. These rules and guidelines are set in place to
    ensure the ethical, responsible, and safe use of AI, and to prevent misuse or
    abuse.
  id: totrans-1041
  prefs: []
  type: TYPE_NORMAL
  zh: 规章和政策在ChatGPT等人工智能技术的发展、使用和管理中发挥着至关重要的作用。这些规则和指南的制定旨在确保人工智能的道德、负责任和安全使用，并防止滥用或误用。
- en: 'Here are some of the areas where regulations and policies come into play:'
  id: totrans-1042
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一些规章和政策发挥作用的领域：
- en: 'Data Protection and Privacy: ChatGPT and similar models are trained on large
    amounts of data, which may include personal or sensitive information. Policies
    and regulations like GDPR in the European Union, and other data protection laws
    worldwide, guide how this data should be handled to protect individuals'' privacy.'
  id: totrans-1043
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 数据保护和隐私：ChatGPT和类似模型是在大量数据上训练的，这些数据可能包括个人信息或敏感信息。欧盟的GDPR等政策和法规以及全球其他数据保护法指导了如何处理这些数据以保护个人隐私。
- en: 'Fairness and Bias: AI models can unintentionally perpetuate or amplify biases
    present in the training data. Regulations and policies can ensure that these technologies
    are developed and used in a way that minimizes these biases and promotes fairness.'
  id: totrans-1044
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 公平与偏见：人工智能模型可能会无意中持续或放大训练数据中存在的偏见。规章和政策可以确保这些技术以最小化这些偏见并促进公平的方式开发和使用。
- en: 'Transparency and Explainability: AI decisions can sometimes be hard to understand
    due to their complex and opaque decision-making processes. Regulations can enforce
    transparency and explainability in AI operations, helping users understand how
    decisions are made.'
  id: totrans-1045
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 透明度和可解释性：由于人工智能的决策过程复杂且不透明，有时很难理解。规章可以强制执行人工智能操作的透明度和可解释性，帮助用户了解决策是如何做出的。
- en: 'Misuse of Technology: There are concerns about the potential misuse of AI technology,
    such as spreading disinformation, creating deepfakes, or performing automated
    attacks. Policies can help prevent and penalize such misuse.'
  id: totrans-1046
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 技术滥用：人们对人工智能技术的潜在滥用表示担忧，例如传播虚假信息、创建深度伪造或执行自动化攻击。政策可以帮助预防和惩罚此类滥用。
- en: 'Accountability and Responsibility: When errors or harmful outcomes occur, it''s
    important to have policies in place that assign responsibility and accountability.'
  id: totrans-1047
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 责任与问责制：当出现错误或有害后果时，制定政策以分配责任和问责制至关重要。
- en: 'Intellectual Property: AI technologies can generate content that could infringe
    on existing copyrights or create new content that may require protection. Policies
    help define who owns AI-generated content and how intellectual property rights
    apply.'
  id: totrans-1048
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 知识产权：人工智能技术可以生成可能侵犯现有版权的内容，或创建可能需要保护的新内容。政策有助于定义谁拥有人工智能生成的内容以及知识产权如何适用。
- en: OpenAI has a set of principles and guidelines to ensure the responsible and
    ethical use of its technologies, and complies with existing regulations. As AI
    technology continues to advance, it's important that regulations and policies
    evolve alongside it to address new challenges and concerns.
  id: totrans-1049
  prefs: []
  type: TYPE_NORMAL
  zh: OpenAI有一套原则和指南，以确保其技术的负责任和道德使用，并遵守现有法规。随着人工智能技术的不断进步，法规和政策与其同步发展，以应对新的挑战和担忧至关重要。
- en: '| ![image](d2d_images/chapter_title_corner_decoration_left.png) |  | ![image](d2d_images/chapter_title_corner_decoration_right.png)
    |'
  id: totrans-1050
  prefs: []
  type: TYPE_TB
  zh: '| ![image](d2d_images/chapter_title_corner_decoration_left.png) |  | ![image](d2d_images/chapter_title_corner_decoration_right.png)
    |'
- en: '![image](d2d_images/chapter_title_above.png)'
  id: totrans-1051
  prefs: []
  type: TYPE_IMG
  zh: '![image](d2d_images/chapter_title_above.png)'
- en: 'Chapter 7: Building Your AI Skills and Expertise'
  id: totrans-1052
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第7章：构建您的AI技能和专业知识
- en: '![image](d2d_images/chapter_title_below.png)'
  id: totrans-1053
  prefs: []
  type: TYPE_IMG
  zh: '![image](d2d_images/chapter_title_below.png)'
- en: This chapter serves as a guide to help you learn and acquire practical knowledge
    that will enable you to excel in the field of AI. Whether you are a beginner or
    have some prior experience, this book is here to support your learning journey
    as you develop the necessary skills to navigate the dynamic landscape of artificial
    intelligence.
  id: totrans-1054
  prefs: []
  type: TYPE_NORMAL
  zh: 本章作为指南，旨在帮助您学习和获取实际知识，使您能够在人工智能领域脱颖而出。无论您是初学者还是有相关经验，本书都旨在支持您的学习之旅，帮助您发展在人工智能动态领域导航所需的技能。
- en: 'Learning AI: Courses, Resources, and Certifications'
  id: totrans-1055
  prefs: []
  type: TYPE_NORMAL
  zh: 学习人工智能：课程、资源和认证
- en: With Artificial Intelligence (AI) on the rise, now’s the time to gear up for
    a career in this field. According to IDC’s projections, revenues from AI software
    are expected to skyrocket and reach $596 billion by 2025 - that’s an impressive
    17.7% CAGR! To help you get ahead of the curve and stay competitive in this rapidly
    evolving industry, getting certified in AI technologies is important. Investing
    your energy into learning about these tools can open doors for exciting opportunities
    and make employers view you as an expert in AI-related solutions.
  id: totrans-1056
  prefs: []
  type: TYPE_NORMAL
  zh: 随着人工智能（AI）的兴起，现在是时候为在这个领域的事业做好准备。根据IDC的预测，人工智能软件的收入预计将大幅增长，到2025年将达到5960亿美元——这是一个令人印象深刻的17.7%的复合年增长率！为了帮助您走在曲线的前面，并在这个快速发展的行业中保持竞争力，获得人工智能技术的认证至关重要。将精力投入到学习这些工具中可以打开令人兴奋的机会的大门，并使雇主将您视为人工智能相关解决方案的专家。
- en: Stanford University School of Engineering AI Graduate Program
  id: totrans-1057
  prefs: []
  type: TYPE_NORMAL
  zh: 斯坦福大学工程学院人工智能研究生项目
- en: 'Key Elements:'
  id: totrans-1058
  prefs: []
  type: TYPE_NORMAL
  zh: 关键要素：
- en: The Stanford University School of Engineering is offering a highly sought-after
    Artificial Intelligence Graduate Program. Dive into the fundamentals and technologies
    at the core of AI, such as logic, probability models, machine learning algorithms,
    robotics systems, natural language processing capabilities, and knowledge representation
    methods. Discover how machines can be used to solve problems or interact with
    one another through reasoning and learning processes - then design your own tests
    for implementation!
  id: totrans-1059
  prefs: []
  type: TYPE_NORMAL
  zh: 斯坦福大学工程学院提供了一项备受追捧的人工智能研究生项目。深入探索人工智能的核心基础和技术，如逻辑、概率模型、机器学习算法、机器人系统、自然语言处理能力和知识表示方法。了解机器如何通过推理和学习过程解决问题或相互交互——然后设计您自己的测试以进行实施！
- en: To successfully complete this program, you’ll need to earn a 3.0 GPA or higher
    in each course which consists of 1 required class plus three electives tailored
    to your interests.
  id: totrans-1060
  prefs: []
  type: TYPE_NORMAL
  zh: 要成功完成此项目，您需要在每门课程中取得3.0或更高的GPA，每门课程包括1门必修课和3门针对您兴趣的选修课。
- en: 'Requirements for Admission:'
  id: totrans-1061
  prefs: []
  type: TYPE_NORMAL
  zh: 入学要求：
- en: If you want to jump into the deep end of higher education, here’s what you’ll
    need. First and foremost, a bachelor’s degree with an impressive 3.0 GPA or above
    is essential; furthermore, having mastery over prerequisites like stats and probability,
    linear algebra, and calculus is key! Plus, don’t forget your programming chops
    - think C/C++, Java, or Python (or something similar). Note that each course could
    have its own set of additional prerequisites, so make sure to check them off too.
  id: totrans-1062
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想深入高等教育，以下是你需要的条件。首先，一个令人印象深刻的3.0 GPA或以上的学士学位是必不可少的；此外，掌握先决条件，如统计学和概率论、线性代数和微积分是关键！别忘了你的编程技能——想想C/C++、Java或Python（或类似的语言）。请注意，每门课程可能都有自己的附加先决条件，所以务必检查清楚。
- en: Designing and Building Artificial Intelligence Products and Services by MIT
    xPro
  id: totrans-1063
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 由麻省理工学院xPro设计的《设计和构建人工智能产品和服务》
- en: 'Key Elements:'
  id: totrans-1064
  prefs: []
  type: TYPE_NORMAL
  zh: 关键要素：
- en: Take your understanding of AI to the next level with this 8-week certificate
    program. Dive into the four stages of creating an AI-based product, from concept
    to completion. Explore machine and deep learning algorithms that will help you
    solve real-world challenges. Plus, put your newfound knowledge into practice as
    you craft a proposal for stakeholders and investors – it’s ShowTime! Get ready
    to become an AI expert.
  id: totrans-1065
  prefs: []
  type: TYPE_NORMAL
  zh: 通过这个为期8周的证书课程，将你对人工智能的理解提升到新的层次。深入探索从概念到完成的四个阶段，创建一个基于人工智能的产品。了解机器学习和深度学习算法，这些算法将帮助你解决现实世界的挑战。此外，在为利益相关者和投资者制定提案的过程中，将你的新知识付诸实践——这是展示时刻！准备好成为人工智能专家。
- en: 'Requirements for Admission:'
  id: totrans-1066
  prefs: []
  type: TYPE_NORMAL
  zh: 入学要求：
- en: UX/UI designers, tech professionals, consultants, entrepreneurs, technical product
    managers, and AI startup founders
  id: totrans-1067
  prefs: []
  type: TYPE_NORMAL
  zh: UX/UI设计师、技术专业人士、顾问、企业家、技术产品经理和AI初创公司创始人
- en: 'AI: Business Strategies and Applications by UC Berkeley Executive Education
    and Emeritus'
  id: totrans-1068
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 由加州大学伯克利分校执行教育部门和荣誉退休教授出版的《人工智能：商业策略与应用》
- en: 'Key Elements:'
  id: totrans-1069
  prefs: []
  type: TYPE_NORMAL
  zh: 关键要素：
- en: This certificate program is designed for managers who are leading AI teams —
    not teaching the technical aspects of AI development. It will introduce you to
    essential applications of Artificial Intelligence in business and discuss its
    current capabilities, uses, potential risks, and opportunities.
  id: totrans-1070
  prefs: []
  type: TYPE_NORMAL
  zh: 这个证书课程是为领导人工智能团队的经理设计的——不是教授人工智能开发的各个方面。它将向你介绍商业中人工智能的必要应用，并讨论其当前的能力、用途、潜在风险和机遇。
- en: You’ll also get a comprehensive overview of automation, machine learning, deep
    learning, neural networks, computer vision, and robotics. Discover how to build
    an effective AI team from scratch as well as manage successful projects involving
    AI applications. Plus, gain insights into technology-related topics so you can
    communicate clearly with your tech squad and co-workers.
  id: totrans-1071
  prefs: []
  type: TYPE_NORMAL
  zh: 你还将获得自动化、机器学习、深度学习、神经网络、计算机视觉和机器人技术的全面概述。了解如何从头开始构建有效的AI团队，以及如何管理涉及AI应用的成功项目。此外，深入了解与技术相关的话题，以便你能与技术团队和同事清晰沟通。
- en: 'Prerequisites:'
  id: totrans-1072
  prefs: []
  type: TYPE_NORMAL
  zh: 先决条件：
- en: Ideal candidates include C-suite executives and senior managers, data scientists,
    analysts, and mid-career professionals looking to advance their skillset in Artificial
    Intelligence technologies ― all ready to embark upon this fascinating journey
    together.
  id: totrans-1073
  prefs: []
  type: TYPE_NORMAL
  zh: 理想候选人包括C级高管和高级经理、数据科学家、分析师以及希望提升人工智能技术技能的中级职业人士——所有这些都准备好一起踏上这段迷人的旅程。
- en: IBM Applied AI Professional Certificate (via Coursera)
  id: totrans-1074
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: IBM应用人工智能专业证书（通过Coursera）
- en: 'Key Elements:'
  id: totrans-1075
  prefs: []
  type: TYPE_NORMAL
  zh: 关键要素：
- en: Ready to get your Artificial Intelligence expertise started? This beginner-level
    AI certification course is here to help bring you up to speed. You’ll understand
    what’s at the core of artificial intelligence, its applications and use cases,
    and machine learning concepts like deep learning and neural networks - no problem!
    Using IBM Watson AI services, APIs, and Python (with minimal coding skills necessary!),
    it will equip you with the tools needed to create virtual assistants and chatbots
    that can be deployed onto websites without any programming knowledge. Lastly,
    this course will also teach computer vision techniques using OpenCV and Watson
    so you can develop custom image classification models and deploy them in the cloud.
  id: totrans-1076
  prefs: []
  type: TYPE_NORMAL
  zh: 准备开始你的人工智能专业知识之旅吗？这门入门级人工智能认证课程旨在帮助你快速掌握。你将了解人工智能的核心，其应用和用例，以及深度学习和神经网络等机器学习概念——毫无问题！使用IBM
    Watson人工智能服务、API和Python（只需最少的编码技能！），它将为你提供创建虚拟助手和聊天机器人的工具，这些机器可以在无需编程知识的情况下部署到网站上。最后，这门课程还将教授使用OpenCV和Watson的计算机视觉技术，这样你就可以开发定制的图像分类模型并在云中部署它们。
- en: 'Prerequisites:'
  id: totrans-1077
  prefs: []
  type: TYPE_NORMAL
  zh: 前提条件：
- en: It doesn’t matter if your background is technical, everyone’s invited! Just
    note that an introductory Python course is included for those without a programming
    background before diving into building/deploying those sweet AI apps.
  id: totrans-1078
  prefs: []
  type: TYPE_NORMAL
  zh: 无论你的背景是否技术性，每个人都欢迎！只是请注意，对于那些没有编程背景的人来说，在深入构建/部署那些令人愉悦的人工智能应用之前，包含了一门Python入门课程。
- en: Artificial Intelligence for Everyone by Andrew Ng (via Coursera)
  id: totrans-1079
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 安德鲁·吴的人工智能入门（通过Coursera）
- en: 'Key Elements:'
  id: totrans-1080
  prefs: []
  type: TYPE_NORMAL
  zh: 关键要素：
- en: This course is a nontechnical exploration of AI, looking into the definitions
    and implications of common terms like neural networks, machine learning, deep
    learning, and data science. You’ll learn what AI can -and cannot- do for you or
    your company, how to spot potential opportunities to apply it, the feeling of
    building ML projects from scratch, working with AI teams efficiently, and formulating
    effective strategies in organizations. Plus, getting those tough conversations
    about ethics out there!
  id: totrans-1081
  prefs: []
  type: TYPE_NORMAL
  zh: 这门课程是对人工智能的非技术性探索，探讨了诸如神经网络、机器学习、深度学习和数据科学等常见术语的定义和含义。你将了解人工智能能为你或你的公司做什么——以及不能做什么，如何发现应用它的潜在机会，从头开始构建ML项目的感受，如何与AI团队高效合作，以及在组织中制定有效的策略。此外，还会涉及关于伦理的艰难对话！
- en: 'Prerequisites:'
  id: totrans-1082
  prefs: []
  type: TYPE_NORMAL
  zh: 前提条件：
- en: Open to everyone regardless of background knowledge.
  id: totrans-1083
  prefs: []
  type: TYPE_NORMAL
  zh: 欢迎所有背景知识的人士参加。
- en: Introduction to TensorFlow for AI, Deep Learning, and Machine Learning (via
    Coursera)
  id: totrans-1084
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: TensorFlow人工智能、深度学习和机器学习入门（通过Coursera）
- en: 'Key Elements:'
  id: totrans-1085
  prefs: []
  type: TYPE_NORMAL
  zh: 关键要素：
- en: Are you a software developer aspiring to become an AI-powered algorithm expert?
    Then this Deep Learning and AI TensorFlow Developer Professional Certificate program
    is just what you need! It covers the best practices for using TensorFlow, an open-source
    machine learning framework - teaching students how to create basic neural networks
    and use convolutions to improve them.
  id: totrans-1086
  prefs: []
  type: TYPE_NORMAL
  zh: 你是一名希望成为人工智能算法专家的软件开发者吗？那么，这个深度学习和人工智能TensorFlow开发者专业证书项目正是你所需要的！它涵盖了使用TensorFlow（一个开源机器学习框架）的最佳实践，教授学生如何创建基本的神经网络并使用卷积来改进它们。
- en: 'Prerequisites:'
  id: totrans-1087
  prefs: []
  type: TYPE_NORMAL
  zh: 前提条件：
- en: There’s no prior knowledge of machine or deep learning required. All that’s
    needed is high school-level math and experience with Python coding.
  id: totrans-1088
  prefs: []
  type: TYPE_NORMAL
  zh: 不需要机器学习或深度学习的先验知识。所需的一切只是高中水平的数学和Python编码经验。
- en: '| ![image](d2d_images/chapter_title_corner_decoration_left.png) |  | ![image](d2d_images/chapter_title_corner_decoration_right.png)
    |'
  id: totrans-1089
  prefs: []
  type: TYPE_TB
  zh: '| ![image](d2d_images/chapter_title_corner_decoration_left.png) |  | ![image](d2d_images/chapter_title_corner_decoration_right.png)
    |'
- en: '![image](d2d_images/chapter_title_above.png)'
  id: totrans-1090
  prefs: []
  type: TYPE_IMG
  zh: '![image](d2d_images/chapter_title_above.png)'
- en: Developing Programming Skills for AI
  id: totrans-1091
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 为人工智能开发编程技能
- en: '![image](d2d_images/chapter_title_below.png)'
  id: totrans-1092
  prefs: []
  type: TYPE_IMG
  zh: '![image](d2d_images/chapter_title_below.png)'
- en: 'AI programming skills are the capabilities necessary to thrive as an AI programmer
    in a field that utilizes artificial intelligence. Key objectives of utilizing
    an AI-based program or algorithm include:'
  id: totrans-1093
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能编程技能是在利用人工智能的领域中作为人工智能程序员成功所需的技能。利用基于人工智能的程序或算法的关键目标包括：
- en: Replacing people on recurrent and relatively simple duties
  id: totrans-1094
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 替换在重复和相对简单任务上工作的人
- en: Outperforming the human brain when it comes to learning and memorizing
  id: totrans-1095
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在学习和记忆方面超越人脑
- en: Instantly recognizing patterns and making decisions based on them
  id: totrans-1096
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 立即识别模式并据此做出决策
- en: 'To master Artificial Intelligence, here’s what you should do:'
  id: totrans-1097
  prefs: []
  type: TYPE_NORMAL
  zh: 要掌握人工智能，你应该这样做：
- en: Get your High School Diploma
  id: totrans-1098
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 获得你的高中文凭
- en: To become involved in Artificial Intelligence engineering, getting a high school
    diploma with a specialization in scientific disciplines like mathematics, physics
    or chemistry is essential. You can also add statistics to your educational background
    for more success later on. Having these solid foundations through secondary education
    will give you major advantages going forward.
  id: totrans-1099
  prefs: []
  type: TYPE_NORMAL
  zh: 要参与人工智能工程，拥有数学、物理或化学等科学学科的高中文凭是必不可少的。你还可以在学业背景中增加统计学，以在将来获得更大的成功。通过中学教育打下这些坚实的基础将为你未来的发展带来重大优势。
- en: Earn Your Bachelor’s Degree
  id: totrans-1100
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 获得学士学位
- en: If you're looking for ways to stand out from other applicants while pursuing
    careers related to AI engineering, consider enrolling in either a three-year B.Sc.
    (Bachelor of Science) program or a four-year B.Tech. (Bachelor of Technology)
    degree course specializing specifically within this area alongside data science
    and machine learning studies, too, if desired. However, if NITs, IITs, and IIITs
    are where you wish to study, make sure to ace the Joint Entrance Examination (JEE)
    first.
  id: totrans-1101
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你正在寻找在追求与人工智能工程相关的职业时如何脱颖而出，考虑报名参加为期三年的B.Sc.（理学学士）课程或为期四年的B.Tech.（工科学士）学位课程，专门在这个领域学习，如果需要的话，还可以学习数据科学和机器学习。然而，如果你希望去NITs、IITs和IIITs学习，请确保首先通过联合入学考试（JEE）。
- en: Get Your Master’s Degree
  id: totrans-1102
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 获得你的硕士学位
- en: Further boosting job opportunities and earning potential by acquiring yourself
    an MSc focusing solely on Artificial Intelligence would prove highly beneficial,
    too, so don’t forget about this option as well, given its many benefits over time.
  id: totrans-1103
  prefs: []
  type: TYPE_NORMAL
  zh: 通过获得专注于人工智能的硕士学位，进一步增加就业机会和收入潜力也将证明是非常有益的，所以不要忘记这个选项，考虑到它随时间带来的许多好处。
- en: Earn Professional Credentials
  id: totrans-1104
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 获得专业资格证书
- en: Gaining proficiency in AI and ML doesn’t have to break the bank. You can become
    an ace engineer without spending all your hard-earned cash. Consider taking part
    in diploma programs or postgraduate courses for a structured learning experience.
  id: totrans-1105
  prefs: []
  type: TYPE_NORMAL
  zh: 在人工智能和机器学习方面获得熟练程度不必花费大量金钱。你可以在不花费所有辛苦赚来的钱的情况下成为一名顶尖工程师。考虑参加文凭课程或研究生课程，以获得结构化的学习体验。
- en: With guidance from experienced professionals, you’ll be able to work on real-world
    projects with feedback along the way. By combining theoretical knowledge with
    practical experience, you’re sure to join the ever-growing field of AI.
  id: totrans-1106
  prefs: []
  type: TYPE_NORMAL
  zh: 在经验丰富的专业人士的指导下，你将能够参与实际项目并在过程中获得反馈。通过将理论知识与实践经验相结合，你必定能加入不断扩大的AI领域。
- en: Grow Your Expertise through Experience
  id: totrans-1107
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 通过经验增长你的专业知识
- en: To reach peak performance as an AI expert, it’s essential that you get hands-on
    practice with actual problems out there. Through participating in hackathons and
    completing projects, you can hone your capabilities using different toolsets used
    by industry experts – plus earn yourself some major street cred! And if classroom
    instruction isn’t quite for you - don’t worry; online tutorials are just as effective
    at teaching these cutting-edge technologies.
  id: totrans-1108
  prefs: []
  type: TYPE_NORMAL
  zh: 要成为人工智能专家并达到顶峰性能，实际解决实际问题是至关重要的。通过参加黑客马拉松和完成项目，你可以使用行业专家使用的不同工具集来磨练你的能力——同时为自己赢得一些重要的街头信誉！如果你觉得课堂指导不适合你——不用担心；在线教程在教授这些尖端技术方面同样有效。
- en: Reap the Rewards of Your Hard Work
  id: totrans-1109
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 享受你辛勤工作的回报
- en: Finally, what kind of compensation could one expect after all the hard work?
    According to Glassdoor statistics, being an AI engineer pays off both here in
    America (with an average annual salary of $114k) or overseas ($765k annually).
    Although salaries may vary depending on organization size and individual skillset
    - rest assured that investing time into honing your craft will reap big rewards
    down the road.
  id: totrans-1110
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，经过所有辛勤工作后，一个人可以期待什么样的报酬？根据Glassdoor的统计数据，成为一名人工智能工程师在这里（美国的平均年薪为114k）或海外（年薪为765k）都能得到回报。尽管工资可能因组织规模和个人技能而异——但请放心，投入时间磨练你的技艺将带来长远的大回报。
- en: '| ![image](d2d_images/chapter_title_corner_decoration_left.png) |  | ![image](d2d_images/chapter_title_corner_decoration_right.png)
    |'
  id: totrans-1111
  prefs: []
  type: TYPE_TB
  zh: '| ![image](d2d_images/chapter_title_corner_decoration_left.png) |  | ![image](d2d_images/chapter_title_corner_decoration_right.png)
    |'
- en: '![image](d2d_images/chapter_title_above.png)'
  id: totrans-1112
  prefs: []
  type: TYPE_IMG
  zh: '![image](d2d_images/chapter_title_above.png)'
- en: Exploring AI Frameworks and Libraries
  id: totrans-1113
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 探索人工智能框架和库
- en: '![image](d2d_images/chapter_title_below.png)'
  id: totrans-1114
  prefs: []
  type: TYPE_IMG
  zh: '![image](d2d_images/chapter_title_below.png)'
- en: AI development is made simpler by Python’s extensive libraries and frameworks.
    With pre-built functions and tools, developers can save time creating AI systems.
    Below are some of the top Python libraries used in Artificial Intelligence.
  id: totrans-1115
  prefs: []
  type: TYPE_NORMAL
  zh: Python丰富的库和框架使人工智能开发变得更加简单。有了预构建的函数和工具，开发人员可以节省创建人工智能系统的时间。以下是用于人工智能的一些顶级Python库。
- en: TensorFlow is the ultimate go-to for developing advanced AI applications. As
    Google’s premier deep learning library, it’s become a favorite among developers
    - both amateur and pro. With its intuitive design, you can quickly construct powerful
    neural networks that train on gargantuan datasets. Plus, TensorFlow supports all
    kinds of platforms from Android to iOS and the web - ensuring your cutting-edge
    AI apps are available anywhere! To top things off with a contemporary flair, references
    to modern pop culture abound throughout TensorFlow, so creating Artificial Intelligence
    has never been simpler or more fun.
  id: totrans-1116
  prefs: []
  type: TYPE_NORMAL
  zh: TensorFlow是开发高级人工智能应用的终极选择。作为Google的顶级深度学习库，它已成为开发人员（无论是业余的还是专业的）的首选。凭借其直观的设计，你可以快速构建强大的神经网络，这些神经网络在庞大的数据集上进行训练。此外，TensorFlow支持从Android到iOS和Web的各种平台——确保你的尖端人工智能应用无处不在！为了增添现代感，TensorFlow中充满了对现代流行文化的引用，因此创建人工智能从未如此简单或有趣。
- en: 'With the rise of artificial intelligence, two frameworks have come to dominate
    the space: Keras and Scikit-Learn. For those just getting their feet wet in deep
    learning, Keras is a great place to start thanks to its simple yet powerful user
    interface - it’s easy enough for any novice developer to use but still supports
    complex experimentation with neural networks. With an active community always
    ready with support when you need it, this high-level API is quickly becoming beloved
    by AI enthusiasts around the world!'
  id: totrans-1117
  prefs: []
  type: TYPE_NORMAL
  zh: 随着人工智能的兴起，两个框架已经主导了这个领域：Keras和Scikit-Learn。对于那些刚开始接触深度学习的人来说，Keras是一个很好的起点，因为它提供了一个简单而强大的用户界面——它足够简单，任何新手开发者都可以使用，同时仍然支持对神经网络的复杂实验。拥有一个活跃的社区随时准备提供支持，这个高级API正在迅速成为全球人工智能爱好者的最爱！
- en: But if you’re looking for something more advanced that offers serious results
    fast, look no further than Scikit-learn. This Python library gives users access
    to all sorts of supervised and unsupervised algorithms designed specifically for
    classification and clustering purposes - plus everything else needed to create
    quality models swiftly and efficiently. And unlike other libraries out there whose
    documentation can be confusingly technical or overcomplicated at times, this one
    explains things so clearly even rookies will know exactly what they’re doing each
    step of the way.
  id: totrans-1118
  prefs: []
  type: TYPE_NORMAL
  zh: 但如果你在寻找更高级的解决方案，能够快速获得显著结果，那么Scikit-learn就是你的不二选择。这个Python库为用户提供了一系列专门为分类和聚类目的设计的监督和非监督算法——以及创建高质量模型所需的所有其他工具。与那些有时技术性或过于复杂的文档相比，这个库解释事物的方式非常清晰，即使是新手也能在每个步骤中确切地知道自己在做什么。
- en: PyTorch, the brainchild of Facebook’s AI Research team, is a powerful open-source
    toolkit for Artificial Intelligence development. It stands out in deep learning
    and provides an adaptable platform to easily create and train neural networks.
    One of its chief advantages is its dynamic computation graph which allows developers
    to modify the network architecture during runtime - enabling faster experimentation!
    Plus, PyTorch offers flexibility when it comes to testing models quickly and iterating
    as needed.
  id: totrans-1119
  prefs: []
  type: TYPE_NORMAL
  zh: PyTorch，Facebook人工智能研究团队的杰作，是一个强大的开源工具包，用于人工智能开发。它在深度学习领域脱颖而出，提供了一个灵活的平台，可以轻松创建和训练神经网络。其最大的优点之一是其动态计算图，允许开发者在运行时修改网络架构——从而实现更快的实验！此外，PyTorch在快速测试模型和按需迭代方面提供了灵活性。
- en: NLTK (Natural Language Toolkit) has become an essential Python library for working
    with human language data. This invaluable resource covers everything from tokenization
    and stemming all the way up to part-of-speech tagging - making it perfect for
    those creating NLP projects such as chatbots or virtual assistants. NLTK’s wide
    array of features makes it ideal for tackling complex tasks within this space
    while offering plenty of room for customization.
  id: totrans-1120
  prefs: []
  type: TYPE_NORMAL
  zh: NLTK（自然语言工具包）已成为处理人类语言数据的Python库的必备工具。这个宝贵的资源涵盖了从分词和词干提取到词性标注的各个方面——使其成为创建聊天机器人或虚拟助手等NLP项目的完美选择。NLTK丰富的功能使其非常适合处理这个领域内的复杂任务，同时提供了大量的定制空间。
- en: '| ![image](d2d_images/chapter_title_corner_decoration_left.png) |  | ![image](d2d_images/chapter_title_corner_decoration_right.png)
    |'
  id: totrans-1121
  prefs: []
  type: TYPE_TB
  zh: '| ![image](d2d_images/chapter_title_corner_decoration_left.png) |  | ![image](d2d_images/chapter_title_corner_decoration_right.png)
    |'
- en: '![image](d2d_images/chapter_title_above.png)'
  id: totrans-1122
  prefs: []
  type: TYPE_IMG
  zh: '![image](d2d_images/chapter_title_above.png)'
- en: Hands-on AI Projects
  id: totrans-1123
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 实践AI项目
- en: '![image](d2d_images/chapter_title_below.png)'
  id: totrans-1124
  prefs: []
  type: TYPE_IMG
  zh: '![image](d2d_images/chapter_title_below.png)'
- en: In an ever-evolving world of Artificial Intelligence, tech fanatics have a plethora
    of opportunities to explore and create groundbreaking projects. From the research
    that pushes the boundaries of what’s possible to everyday applications, AI is
    making huge strides in our lives – it can be seen everywhere, from Spotify playlist
    curation to Instagram feeds.
  id: totrans-1125
  prefs: []
  type: TYPE_NORMAL
  zh: 在人工智能不断发展的世界中，技术爱好者有大量的机会去探索和创造突破性的项目。从推动可能性的边界的研究到日常应用，人工智能正在我们生活中取得巨大进步——它无处不在，从Spotify播放列表的编排到Instagram的动态。
- en: As AI continues its rapid growth over the next few years, companies like IBM,
    Accenture, and Apple predict that by 2025 this industry will be worth $126 Billion
    US Dollars!
  id: totrans-1126
  prefs: []
  type: TYPE_NORMAL
  zh: 随着人工智能在未来几年中的快速增长，IBM、埃森哲和苹果等公司预测，到2025年，这个行业的价值将达到1260亿美元美国美元！
- en: So where do you start? Well, there are plenty of options out there.
  id: totrans-1127
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，你从哪里开始呢？嗯，有很多选择。
- en: Lane Line Detection
  id: totrans-1128
  prefs: []
  type: TYPE_NORMAL
  zh: 车道线检测
- en: 'Aim: To develop an AI-driven system that can accurately detect lane lines on
    roads in real-time, assisting self-driving cars and line-following robots alike.'
  id: totrans-1129
  prefs: []
  type: TYPE_NORMAL
  zh: 目标：开发一个由AI驱动的系统，能够实时准确地检测道路上的车道线，帮助自动驾驶汽车和循线机器人。
- en: 'Problem: Autonomous vehicles have the potential to revolutionize transportation,
    but careless programming could lead to disastrous incidents - a risk we must mitigate.
    As such, it is vital for these vehicles to be able to recognize lane lines while
    they are driving so as not to put anyone else at risk.'
  id: totrans-1130
  prefs: []
  type: TYPE_NORMAL
  zh: 问题：自动驾驶汽车有潜力彻底改变交通，但粗心的编程可能导致灾难性事件——这是我们必须要减轻的风险。因此，这些车辆在行驶时能够识别车道线至关重要，以免给他人带来风险。
- en: 'Solution: Computer Vision techniques implemented with OpenCV are perfect for
    this task due to their ability to access all major platforms (Windows, macOS,
    Linux, Android, and iOS) and quickly process data in order for autonomous cars
    or robots to make judgments about their surroundings without any human input.'
  id: totrans-1131
  prefs: []
  type: TYPE_NORMAL
  zh: 解决方案：由于OpenCV技术能够访问所有主要平台（Windows、macOS、Linux、Android和iOS）并快速处理数据，使其非常适合这项任务，自动驾驶汽车或机器人可以据此在没有人类输入的情况下对其周围环境做出判断。
- en: By using CV tactics such as color thresholding or frame masking on NumPy arrays,
    you can easily find white markers along each side of lanes that serve as navigational
    signals while driving down roads. Applying Hough line transformations will then
    help pinpoint these lane lines more precisely, ensuring they’re visible during
    navigation providing your autonomous car with an extra layer of security like
    Tony Stark’s AI assistant Jarvis!
  id: totrans-1132
  prefs: []
  type: TYPE_NORMAL
  zh: 通过使用CV策略，如颜色阈值或NumPy数组上的帧掩码，你可以轻松地找到车道每侧的白色标记，这些标记作为驾驶时的导航信号。然后应用Hough线变换将有助于更精确地定位这些车道线，确保在导航过程中它们是可见的，为你的自动驾驶汽车提供额外的安全层，就像托尼·斯塔克的人工智能助手贾维斯一样！
- en: 'Application: Lane line detection is an essential tool for modern-day autonomous
    vehicles, from cars to robots that follow a predetermined path. It’s also widely
    used in the gaming industry - think of all those high-octane racing games on PlayStation
    and Xbox! With lane line detection, developers can create an ultra-realistic driving
    experience that puts players firmly in the driver’s seat with total control over
    their virtual ride. This tech is also immensely useful for testing out innovative
    self-driving technology before introducing it to reality on streets and highways.
    Plus, you get a chance to relive your favorite movie car chase scenes without
    leaving your couch.'
  id: totrans-1133
  prefs: []
  type: TYPE_NORMAL
  zh: 应用：车道线检测是现代自动驾驶汽车（从汽车到遵循预定路径的机器人）的必要工具。它也在游戏行业中得到广泛应用——想想PlayStation和Xbox上所有那些高能赛车游戏！有了车道线检测，开发者可以创建一个超逼真的驾驶体验，让玩家完全控制他们的虚拟驾驶，坐在驾驶座上。这项技术对于在街道和高速公路上引入现实中的自动驾驶技术之前测试创新的自驾驶技术也非常有用。此外，你还有机会在家中重温你最喜欢的电影追逐场景，而无需离开沙发。
- en: Chatbots
  id: totrans-1134
  prefs: []
  type: TYPE_NORMAL
  zh: 聊天机器人
- en: 'Aim: Bring your web or app platform to the next level with a Python-powered
    chatbot that provides users with an awesome experience.'
  id: totrans-1135
  prefs: []
  type: TYPE_NORMAL
  zh: 目标：使用Python驱动的聊天机器人将你的Web或应用平台提升到下一个水平，为用户提供令人惊叹的体验。
- en: 'Problem: In this digital age, it’s more important than ever for companies to
    keep their customers engaged and satisfied. Failing to do so can be detrimental,
    resulting in lost revenue and missed opportunities.'
  id: totrans-1136
  prefs: []
  type: TYPE_NORMAL
  zh: 问题：在这个数字时代，公司保持客户参与和满意比以往任何时候都更重要。未能做到这一点可能会造成损害，导致收入损失和错失机会。
- en: 'Solution: Chatbots are essential if you want to stay ahead of the competition!
    Powered by AI, these bots provide 24/7 automated customer service - from answering
    questions and navigating through websites or apps to personalizing experiences
    and boosting sales. Plus, they offer incredible insights into user behavior, allowing
    businesses to tweak products and services for optimum success. It’s time to give
    your platforms a facelift - get yourself a chatbot now.'
  id: totrans-1137
  prefs: []
  type: TYPE_NORMAL
  zh: 解决方案：如果您想保持竞争优势，聊天机器人是必不可少的！由人工智能驱动的这些机器人提供24/7的自动化客户服务——从回答问题、导航网站或应用，到个性化体验和提升销售。此外，它们提供了对用户行为的深刻洞察，使企业能够调整产品和服务的最佳成功。是时候给你的平台进行翻新了——现在就为自己获取一个聊天机器人。
- en: If it’s time to get on board with building your own chatbot, then have no fear;
    taking those first steps is relatively straightforward. Begin by researching which
    structure works best for other websites and doing something similar before moving
    on to applying Natural Language Processing (NLP) technology. These are algorithms
    that understand human interactions across multiple languages plus audio signals,
    text analysis, and conversion into machine language. Once all these elements come
    together, it’ll be like having an intelligent assistant ready at hand 24/7!
  id: totrans-1138
  prefs: []
  type: TYPE_NORMAL
  zh: 如果是时候加入构建自己的聊天机器人的行列，那么无需害怕；迈出第一步相对简单。首先，研究哪种结构最适合其他网站，并做类似的事情，然后再转向应用自然语言处理（NLP）技术。这些算法能够理解多种语言以及音频信号的人类交互，包括文本分析和转换为机器语言。一旦所有这些元素结合在一起，就像拥有一个随时待命的智能助手一样！
- en: 'Applications: Chatbots are now being used by everyone from eCommerce giants
    like Amazon Alexa and Spotify to real estate firms such as Marriott International
    and Pizza Hut; Customer Service departments alongside IT Helpdesk teams in Sales
    Marketing and HR alike rely heavily on them every day. Don’t miss out - make sure
    your business has one today if it doesn’t already.'
  id: totrans-1139
  prefs: []
  type: TYPE_NORMAL
  zh: 应用：聊天机器人现在被从电子商务巨头如亚马逊Alexa和Spotify到房地产公司如万豪国际和必胜客等各行各业广泛使用；客户服务部门以及销售营销和人力资源部门的IT帮助台团队每天都非常依赖它们。不要错过——如果您的业务还没有，今天确保您的业务拥有一个。
- en: Voice-Based Virtual Assistant
  id: totrans-1140
  prefs: []
  type: TYPE_NORMAL
  zh: 基于语音的虚拟助手
- en: 'Aim: Crafting a revolutionary app that makes life easier.'
  id: totrans-1141
  prefs: []
  type: TYPE_NORMAL
  zh: 目标：打造一个使生活更便捷的革命性应用。
- en: 'Problem: With the vastness of the Internet, it can be hard to locate exactly
    what you need. Not to mention we are always on the go and don’t have time for
    mundane tasks.'
  id: totrans-1142
  prefs: []
  type: TYPE_NORMAL
  zh: 问题：随着互联网的浩瀚，找到你确切需要的东西可能很困难。更不用说我们总是忙于奔波，没有时间处理日常琐事。
- en: 'Solution: Enter virtual assistants with their remarkable Natural Language Processing
    (NLP) capabilities, such as Alexa or Siri - they understand your needs before
    you even voice them out. They save your queries in databases, so when you ask
    for something again, they already know about it. Plus, these apps easily convert
    words into text and vice versa - just like magic.'
  id: totrans-1143
  prefs: []
  type: TYPE_NORMAL
  zh: 解决方案：借助具有卓越自然语言处理（NLP）能力的虚拟助手，如Alexa或Siri——它们在你开口之前就能理解你的需求。它们将你的查询保存在数据库中，所以当你再次询问时，它们已经了解情况。此外，这些应用能够轻松地将文字转换为文本，反之亦然——就像魔法一样。
- en: 'Application: Finding things quickly is only one aspect of the abilities of
    virtual assistants. But there’s more; from playing music to showing movies or
    sending reminders – whatever task you need to be done will be handled by your
    trusty assistant with finesse. So go ahead and take advantage of all modern technology
    has to offer–just ask away without hesitation because no matter how crazy life
    gets, help is here waiting for you.'
  id: totrans-1144
  prefs: []
  type: TYPE_NORMAL
  zh: 应用：快速找到东西只是虚拟助手能力的一个方面。但不仅如此；从播放音乐到显示电影或发送提醒——无论你需要完成的任务是什么，你的可靠助手都会以优雅的方式处理。所以，大胆地利用现代技术所能提供的一切——毫不犹豫地提问，因为无论生活多么疯狂，帮助就在这里等着你。
- en: Plagiarism Checker
  id: totrans-1145
  prefs: []
  type: TYPE_NORMAL
  zh: 抄袭检测器
- en: 'Aim: Develop an AI-powered system to effectively identify and detect plagiarism
    in any document.'
  id: totrans-1146
  prefs: []
  type: TYPE_NORMAL
  zh: 目标：开发一个由人工智能驱动的系统，以有效地识别和检测任何文档中的抄袭。
- en: 'Problem: Plagiarists are doing serious damage - from tarnishing reputations
    to flagrantly disregarding copyright laws and putting people at risk of legal
    repercussions. Organizations need a reliable solution that can help them combat
    this growing problem.'
  id: totrans-1147
  prefs: []
  type: TYPE_NORMAL
  zh: 问题：剽窃者正在造成严重的损害——从损害声誉到公然无视版权法，甚至使人们面临法律后果的风险。组织需要可靠的解决方案来帮助他们应对这个日益严重的问题。
- en: 'Solution: By combining Python Flask with text mining technology, you can create
    the ultimate anti-plagiarism tool. It is not your average checker, either. Bolstered
    by the Pinecone vector database, it will be able to quickly spot copied material
    in documents with ease!'
  id: totrans-1148
  prefs: []
  type: TYPE_NORMAL
  zh: 解决方案：通过结合Python Flask和文本挖掘技术，你可以创建终极的防剽窃工具。它不仅仅是一个普通的检查器。借助Pinecone向量数据库的支持，它将能够轻松地在文档中识别出复制的材料！
- en: 'Application: Goodbye plagiarizers - hello originality! Bloggers, editors/publishers
    evaluating manuscripts, or freelancers creating content for clients.'
  id: totrans-1149
  prefs: []
  type: TYPE_NORMAL
  zh: 应用：再见剽窃者——你好原创！博主、编辑/出版商评估稿件，或者为客户端创作内容的自由职业者。
- en: Games
  id: totrans-1150
  prefs: []
  type: TYPE_NORMAL
  zh: 游戏
- en: 'Aim: Craft Epic Video Games with AI.'
  id: totrans-1151
  prefs: []
  type: TYPE_NORMAL
  zh: 目标：用AI制作史诗般的视频游戏。
- en: 'Problem: Gamers are always looking for more realistic, immersive digital experiences.'
  id: totrans-1152
  prefs: []
  type: TYPE_NORMAL
  zh: 问题：游戏玩家总是寻找更加真实、沉浸式的数字体验。
- en: 'Solution: Step up your game and supercharge the realism in video games with
    Artificial Intelligence. Think of cool stuff like chatbots, voice recognition,
    Natural Language Processing (NLP), image processing tools, and data mining algorithms
    combined with some next-level machine learning techniques.'
  id: totrans-1153
  prefs: []
  type: TYPE_NORMAL
  zh: 解决方案：通过人工智能提升你的游戏水平，让视频游戏更加逼真。想想像聊天机器人、语音识别、自然语言处理（NLP）、图像处理工具和数据挖掘算法，结合一些高级机器学习技术。
- en: 'Application: Be prepared to be amazed by incredible AI-powered video games
    such as AlphaGo from Google DeepMind, the all-time chess champion Deep Blue from
    IBM, the FEAR series brought to you by Monolith Productions, and Microsoft Studios’
    legendary Halo franchise. By merging your project ideas with advanced AI capabilities,
    you will become a programming pro and get involved in amazing tech like NLP and
    Data Science - making every gamer jump out of their seat in excitement.'
  id: totrans-1154
  prefs: []
  type: TYPE_NORMAL
  zh: 应用：准备好被谷歌DeepMind的AlphaGo、IBM的永恒象棋冠军Deep Blue、Monolith Productions带来的FEAR系列游戏，以及微软工作室的传奇Halo系列游戏等令人难以置信的人工智能驱动的视频游戏所震撼。通过将你的项目想法与高级人工智能能力相结合，你将成为编程高手，并参与到像NLP和数据科学这样的惊人技术中——让每个游戏玩家都兴奋得跳起来。
- en: Building a Career in AI
  id: totrans-1155
  prefs: []
  type: TYPE_NORMAL
  zh: 在AI领域建立职业生涯
- en: Welcome to the thrilling world of AI and ML, where opportunities are boundless,
    and rewards abound. Strap in because this realm is about to take off like a rocket
    ship - you won’t want to miss out on this wild ride. Just ask Ray Kurzweil, who
    insists that by 2029 machines will have achieved human-level intelligence.
  id: totrans-1156
  prefs: []
  type: TYPE_NORMAL
  zh: 欢迎来到激动人心的AI和ML世界，这里的机会无限，回报丰厚。系好安全带，因为这个领域即将像火箭一样腾飞——你不会想错过这次刺激的旅程。问问雷·库兹韦尔，他坚持认为到2029年，机器将达到人类水平的智能。
- en: But wait! There is more. He also predicts that our civilization’s machine smartness
    could be multiplied up to one billion times by 2045 - it’s as if Artificial Intelligence
    is the wish-granting genie from Aladdin! So, if you’re ready for an adventure
    of a lifetime and make your mark on history, then look no further – seize this
    golden opportunity now before it slips away.
  id: totrans-1157
  prefs: []
  type: TYPE_NORMAL
  zh: 但等等！还有更多。他还预测，到2045年，我们文明的机器智能可能增加至十亿倍——这就像《阿拉丁》中的许愿神灯一样的人工智能！所以，如果你准备好进行一生一次的冒险并在历史上留下你的印记，那么就无需再寻找了——抓住这个千载难逢的机会，以免它溜走。
- en: 'Here are five game-changing roles in the AI and ML universe:'
  id: totrans-1158
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是AI和ML领域五个颠覆性的角色：
- en: Machine Learning Engineer
  id: totrans-1159
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 机器学习工程师
- en: ML engineers are responsible for programming machines to do specific tasks while
    also managing and constructing machine learning platforms. If you have an academic
    background in programming or engineering, this role would be perfect for you since
    it will help with an easy transition into other similar roles too.
  id: totrans-1160
  prefs: []
  type: TYPE_NORMAL
  zh: 机器学习工程师负责编程机器执行特定任务，同时管理和构建机器学习平台。如果你有编程或工程学的学术背景，这个角色非常适合你，因为它将帮助你轻松过渡到其他类似的角色。
- en: It is necessary that ML engineers possess knowledge of various coding languages
    such as Python, Java, and Scala; they should also know how to handle large datasets
    using utilities like R and SQL efficiently whilst applying predictive models on
    them correctly, following big data best practices.
  id: totrans-1161
  prefs: []
  type: TYPE_NORMAL
  zh: 机器学习工程师必须掌握各种编程语言，如Python、Java和Scala；他们还应该知道如何使用R和SQL等工具高效地处理大数据集，并在其上正确应用预测模型，遵循大数据最佳实践。
- en: Alongside this, experience with agile development techniques and leading tools
    (like IntelliJ/Eclipse) is desirable when looking into becoming an engineer. Plus,
    if you can add the cherry on top by having either a Master’s degree or a Doctoral
    degree related to computer science or mathematics, then your CV will stand out
    from the rest.
  id: totrans-1162
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，当考虑成为工程师时，具备敏捷开发技术和领先工具（如 IntelliJ/Eclipse）的经验是可取的。而且，如果你能再加上一个亮点，拥有与计算机科学或数学相关的硕士学位或博士学位，那么你的简历将脱颖而出。
- en: Data Scientist
  id: totrans-1163
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 数据科学家
- en: 'If you want to be the Tony Stark of your organization and turn heads with your
    tech game, then here’s what it takes: A master’s or doctoral degree in computer
    science is a must-have for any aspiring data scientist.'
  id: totrans-1164
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想要成为你组织的托尼·斯塔克，用你的技术游戏吸引人们的注意，那么以下是你需要具备的条件：对于任何有抱负的数据科学家来说，拥有计算机科学硕士学位或博士学位是必不可少的。
- en: But don’t sweat if that’s not in the books just yet - expertise with cloud tools
    like Hadoop or Amazon S3 along with two years’ worth of machine learning experience,
    can still take you places.
  id: totrans-1165
  prefs: []
  type: TYPE_NORMAL
  zh: 但如果你还没有这方面的专业知识，也不要担心——具备云工具（如 Hadoop 或 Amazon S3）的专长以及两年机器学习经验，仍然可以让你走得很远。
- en: Data scientists are our modern-day wizards who work their magic on massive datasets
    using predictive analytics and ML techniques. They create pipelines powered by
    Spark, MapReduce, Hive, and Pig; coding languages such as SQL, Python, Perl, and
    Scala; and models that make sense of this information, all while keeping up with
    today’s ever-changing technology landscape. These experts help organizations make
    fast and informed decisions like never before.
  id: totrans-1166
  prefs: []
  type: TYPE_NORMAL
  zh: 数据科学家是我们这个时代的魔术师，他们使用预测分析和机器学习技术在大数据集中施展魔法。他们创建由 Spark、MapReduce、Hive 和 Pig
    驱动的管道；编写 SQL、Python、Perl 和 Scala 等编程语言；并构建能够理解这些信息的模型，同时还要跟上今天不断变化的技术格局。这些专家帮助组织做出前所未有的快速和明智的决策。
- en: Business Intelligence (BI) Developer
  id: totrans-1167
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 商业智能（BI）开发者
- en: Are you ready to dive into an awesome journey as a business intelligence programmer?
    In today’s complicated market, these master coders hold the key to success. They
    dig deep into intricate datasets, uncover concealed patterns and understand what
    keeps the industry running. To make data more accessible and tractable, they work
    their secret powers of analytics on cloud platforms.
  id: totrans-1168
  prefs: []
  type: TYPE_NORMAL
  zh: 你准备好投身于作为商业智能程序员的精彩旅程了吗？在当今复杂的市场中，这些大师级程序员掌握着成功的关键。他们深入复杂的数据库，揭示隐藏的模式，并理解是什么让行业运转。为了使数据更易于访问和处理，他们在云平台上施展他们的分析秘密力量。
- en: 'To thrive in this epic job role, there are certain skills required: top-notch
    analysis acumen plus technical know-how; problem-solving chops with great communication
    abilities (to liaise with those who don’t speak tech), along with having a bachelor’s
    degree in computer science or related field - bonus points if you can wield SQL
    queries and data mining/warehouse designs and BI technologies. Experience is not
    compulsory but certainly welcomed!'
  id: totrans-1169
  prefs: []
  type: TYPE_NORMAL
  zh: 要在这个史诗般的工作角色中茁壮成长，需要具备某些技能：一流的洞察力和技术知识；解决问题的能力以及出色的沟通能力（与那些不懂技术的人沟通），此外，拥有计算机科学或相关领域的学士学位也是一个加分项——如果你能熟练运用
    SQL 查询、数据挖掘/仓库设计和 BI 技术，那就更好了。经验不是强制性的，但当然受欢迎！
- en: Research Scientist
  id: totrans-1170
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 研究科学家
- en: Research scientists in artificial intelligence (AI) work to advance the theoretical
    understanding of AI concepts and create new AI technologies and applications.
    Their work involves conducting research, designing and running experiments, publishing
    papers, and presenting findings at conferences.
  id: totrans-1171
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能（AI）的研究科学家致力于推进人工智能概念的理论理解，并创建新的AI技术和应用。他们的工作涉及进行研究、设计和运行实验、发表论文以及在会议上展示发现。
- en: 'Some of the main areas of research in AI include:'
  id: totrans-1172
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能研究的一些主要领域包括：
- en: 'Machine learning: Developing algorithms that allow computers to improve automatically
    through experience. This includes areas like deep learning, reinforcement learning,
    etc.'
  id: totrans-1173
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 机器学习：开发允许计算机通过经验自动改进的算法。这包括深度学习、强化学习等领域。
- en: 'Natural language processing: Research focused on giving computers the ability
    to understand and manipulate human language.'
  id: totrans-1174
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 自然语言处理：研究使计算机能够理解和操纵人类语言的能力。
- en: 'Computer vision: Using AI to help computers “see” and interpret visual images
    and video.'
  id: totrans-1175
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 计算机视觉：使用人工智能帮助计算机“看到”并解释视觉图像和视频。
- en: 'Robotics: Developing intelligent autonomous robots through the use of AI and
    machine learning.'
  id: totrans-1176
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 机器人技术：通过使用人工智能和机器学习来开发智能自主机器人。
- en: 'To become a research scientist in AI, you will typically need:'
  id: totrans-1177
  prefs: []
  type: TYPE_NORMAL
  zh: 要成为人工智能的研究科学家，你通常需要：
- en: An advanced degree, often a Ph.D., in a relevant field like computer science,
    electrical engineering, cognitive science, or math. A master’s in computer science
    can also work for some positions.
  id: totrans-1178
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在计算机科学、电气工程、认知科学或数学等相关领域拥有高级学位，通常是博士学位。计算机科学硕士学位也可以适用于某些职位。
- en: Strong programming skills in languages like Python, R, and Java. Knowledge of
    frameworks like TensorFlow and PyTorch is often required.
  id: totrans-1179
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在Python、R和Java等语言中拥有强大的编程技能。通常需要了解TensorFlow和PyTorch等框架。
- en: Excellent problem-solving abilities and the capability to conduct independent
    research and experiments.
  id: totrans-1180
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 优秀的解决问题的能力以及进行独立研究和实验的能力。
- en: The ability to clearly communicate and publish findings through research papers
    and conference presentations.
  id: totrans-1181
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 能够通过研究论文和会议演讲清晰地沟通和发布发现。
- en: Curiosity, creativity, and an interest in pushing the boundaries of what’s possible
    with AI and machine intelligence.
  id: totrans-1182
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 好奇心、创造力和对推动人工智能和机器智能可能性的边界感兴趣。
- en: Big Data Engineer/Architect
  id: totrans-1183
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 大数据工程师/架构师
- en: Big data engineers and architects play a vital role in creating the infrastructure
    and systems that power businesses’ big data initiatives. They are tasked with
    designing architectures and implementing solutions that can efficiently collect,
    store, manage, and analyze extremely large datasets.
  id: totrans-1184
  prefs: []
  type: TYPE_NORMAL
  zh: 大数据工程师和架构师在构建支撑企业大数据项目的基础设施和系统中扮演着至关重要的角色。他们负责设计架构并实施解决方案，这些解决方案能够高效地收集、存储、管理和分析极其庞大的数据集。
- en: 'Some of the primary responsibilities of big data engineers and architects include:'
  id: totrans-1185
  prefs: []
  type: TYPE_NORMAL
  zh: 大数据工程师和架构师的一些主要职责包括：
- en: 'Designing data architectures: They must determine how data will flow and be
    stored in large distributed systems. This includes choosing the appropriate storage
    options, file systems, databases, APIs, and frameworks to optimize for performance,
    scalability, and cost-efficiency.'
  id: totrans-1186
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 设计数据架构：他们必须确定数据如何在大型分布式系统中流动和存储。这包括选择适当的存储选项、文件系统、数据库、API和框架，以优化性能、可扩展性和成本效益。
- en: 'Implementing data pipelines: They build data pipelines to ingest data from
    various sources into the big data environment. This may involve using tools like
    Apache Kafka, Flume, and Sqoop. They must optimize these pipelines for high throughput
    and fault tolerance.'
  id: totrans-1187
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 实施数据管道：他们构建数据管道，从各种来源将数据导入大数据环境。这可能涉及使用Apache Kafka、Flume和Sqoop等工具。他们必须优化这些管道以实现高吞吐量和容错性。
- en: 'Developing ETL processes: They design and implement extract, transform, and
    load (ETL) processes to move data from source systems into data warehouses and
    lakes. This includes writing scripts and jobs to cleanse, conform and transform
    data.'
  id: totrans-1188
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 开发ETL流程：他们设计和实施提取、转换和加载（ETL）流程，将数据从源系统移动到数据仓库和湖中。这包括编写脚本和作业来清洗、规范和转换数据。
- en: 'Configuring big data platforms: They deploy and configure big data platforms
    like Hadoop, Spark, and Hive, which allow large-scale data processing and storage.
    This involves setting up clusters, tuning configurations, and testing performance.'
  id: totrans-1189
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 配置大数据平台：他们部署和配置像Hadoop、Spark和Hive这样的大数据平台，这些平台允许大规模的数据处理和存储。这包括设置集群、调整配置和测试性能。
- en: 'Integrating systems: They integrate various internal and external systems,
    databases, and data sources into a cohesive big-data environment so data can flow
    seamlessly. This requires deep knowledge of various technologies and interoperability
    standards.'
  id: totrans-1190
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 集成系统：他们将各种内部和外部系统、数据库和数据源集成到一个统一的的大数据环境中，以便数据可以无缝流动。这需要深入了解各种技术和互操作性标准。
- en: 'Optimizing performance: They monitor the performance of the big data systems
    they develop, identifying bottlenecks and optimizing for speed, reliability, and
    resource usage. This often involves scaling clusters up or out as needed.'
  id: totrans-1191
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 优化性能：他们监控他们开发的大数据系统的性能，识别瓶颈并优化速度、可靠性和资源使用。这通常涉及根据需要扩展或缩减集群。
- en: 'Here are the steps to becoming a big data engineer or architect:'
  id: totrans-1192
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是成为大数据工程师或架构师的步骤：
- en: Get a bachelor’s degree in computer science, electrical engineering, or a related
    quantitative field. Courses in programming, databases, data structures, and algorithms
    will provide a strong foundation.
  id: totrans-1193
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 获得计算机科学、电气工程或相关定量领域的学士学位。编程、数据库、数据结构和算法的课程将提供一个坚实的基础。
- en: Gain practical experience. Work on personal projects involving large datasets
    and open-source big data tools. Take internships or part-time roles to build your
    professional experience.
  id: totrans-1194
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 获得实践经验。从事涉及大量数据集和开源大数据工具的个人项目。实习或兼职以积累专业经验。
- en: Learn key technologies. Master SQL and NoSQL databases. Learn programming languages
    like Python, Java, Scala, and R. Become proficient in big data frameworks like
    Hadoop, Spark, Hive, and Pig.
  id: totrans-1195
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 学习关键技术。掌握SQL和NoSQL数据库。学习Python、Java、Scala和R等编程语言。熟练掌握Hadoop、Spark、Hive和Pig等大数据框架。
- en: Learn big data architecture. Study architecture patterns used for big data systems.
    Understand techniques for optimizing and scaling big data pipelines. Develop an
    eye for performance and reliability issues.
  id: totrans-1196
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 学习大数据架构。研究用于大数据系统架构的架构模式。了解优化和扩展大数据管道的技术。培养对性能和可靠性问题的洞察力。
- en: Study data management. Learn ETL processes, data warehousing principles, and
    data modeling techniques. Understand data integration, interoperability standards,
    and API development.
  id: totrans-1197
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 研究数据管理。学习ETL流程、数据仓库原则和数据建模技术。了解数据集成、互操作性标准和API开发。
- en: Develop soft skills. Communication, collaboration, and problem-solving abilities
    are crucial for big data roles. Cultivate business analysis skills to understand
    how data solutions impact business objectives.
  id: totrans-1198
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 发展软技能。沟通、协作和解决问题的能力对于大数据角色至关重要。培养业务分析技能，以了解数据解决方案如何影响业务目标。
- en: Get certified. Industry certifications like Cloudera Certified Professional
    Data Scientist, Hadoop Developer Certified Professional, and Certified Apache
    Spark Developer demonstrate your expertise and competence to employers.
  id: totrans-1199
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 获得认证。如Cloudera认证专业数据科学家、Hadoop开发者认证专业和认证Apache Spark开发者等行业认证可以证明你的专业能力和雇主。
- en: 'Pro Tip: One way to gain experience is by volunteering to work with data for
    a local organization or taking on a data-focused project as part of your studies.
    Enrolling in a Data Science course is a plus for sure!'
  id: totrans-1200
  prefs: []
  type: TYPE_NORMAL
  zh: 小贴士：获得经验的一种方式是自愿为当地组织工作，或作为你学习的一部分承担数据相关的项目。当然，报名参加数据科学课程也是一个加分项！
