    ****o**r** ****gen**uin**e ****lea**rnin**g. ****Stu**dent**s ****sh**oul**d ****u**se**
    ****i**t** ****a**s** ****a**** ****supp**lemen**t ****t**o**, ****ra**the**r
    ****th**an** ****a**** ****subs**titut**e ****f**or**, ****trad**itiona**l ****educ**ationa**l
    ****reso**urce**s ****a**nd** ****met**hod**s.'
  id: totrans-572
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然 ChatGPT 是一个有用的工具，但它不应取代批判性思维或真正的学习。学生应将其作为补充，而不是替代传统教育资源和方法。
