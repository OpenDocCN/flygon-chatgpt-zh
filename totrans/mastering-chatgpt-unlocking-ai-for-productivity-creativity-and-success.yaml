  id: totrans-540
  prefs: []
  type: TYPE_NORMAL
  zh: ●        👉 "在大学水平上解释量子物理。"（更详细）
- en: ●        👉 "Explain quantum physics in 3 bullet points." (Concise)
  id: totrans-541
  prefs: []
  type: TYPE_NORMAL
  zh: ●        👉 "用10岁孩子的语言解释量子物理。"
- en: ●        👉 "Explain quantum physics with an analogy." (Engaging)
  id: totrans-542
  prefs: []
  type: TYPE_NORMAL
  zh: ●        👉 "用类比解释量子物理。"（引人入胜）
