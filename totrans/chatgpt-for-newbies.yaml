  - PREF_UL
  type: TYPE_NORMAL
  zh: '"列出将业务扩展到[地区]的利弊，包括法律、文化和后勤考虑。"'
- en: Everyday Productivity Prompts
  id: totrans-788
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 每日生产力提示
- en: 'Goal-Oriented Scheduling:'
  id: totrans-789
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 以目标为导向的时间安排：
- en: '"Plan a 3-week productivity schedule for preparing for [specific exam], balancing
    work, study, and rest."'
  id: totrans-790
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '"为准备[具体考试]制定为期3周的生产力时间表，平衡工作、学习和休息。"'
- en: 'Healthy Habits:'
  id: totrans-791
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 健康习惯：
- en: '"Design a morning routine for someone aiming to improve their focus and energy
