  prefs: []
  type: TYPE_NORMAL
- en: Writing Prose
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Personal Journal Entry
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '"I want to write a personal journal entry reflecting on my day. My main activities
    included [describe your day], and I felt [describe emotions]. Please write a thoughtful
    and engaging journal entry in the first person, capturing my thoughts and feelings.
    Keep it introspective yet conversational."'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: Storytelling for Kids
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '"I need to tell a bedtime story to a [age] year-old child about a brave [animal
    or character] who embarks on an adventure in a magical land. The story should
    be engaging, age-appropriate, and include a moral lesson about [kindness, bravery,
    honesty, etc.]. Please write a short, imaginative story with dialogue."'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: Reflective Letter to My Future Self
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '"I’d like to write a letter to my future self, one year from today. In this
    letter, I want to reflect on my current struggles, dreams, and goals. I also want
    to include words of encouragement, reminders of important values, and a few questions
    to reflect on. Please write this letter in a warm and inspiring tone."'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: Captivating Social Media Post
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '"I want to create an engaging social media post about [topic—travel, food,
    productivity, self-care, etc.]. The post should have a compelling hook, a relatable
    story, and a call to action that encourages engagement (e.g., asking followers
    for their experiences). Please make it conversational and engaging, suitable for
    Instagram/Facebook."'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: Personal Essay for Self-Improvement
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '"I am reflecting on an important life lesson I recently learned: [describe
    lesson]. I’d like to turn this into a personal essay that tells a short anecdote,
    explains the lesson learned, and provides insights that others might find valuable.
    Please make it engaging and thought-provoking, around 500 words."'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: Motivational Speech for a Small Audience
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '"I need to give a short motivational speech to a small group of friends or
    colleagues about overcoming challenges. The speech should start with a personal
    anecdote, introduce a universal lesson, and end with an inspiring call to action.
    Please write this in a passionate yet conversational tone, around 3-5 minutes
    long."'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: Wedding or Special Occasion Toast
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '"I have to give a toast at [wedding, birthday, retirement, anniversary, etc.].
    The toast should be heartfelt, a little humorous, and express my deep appreciation
    for [person’s name]. Include a personal story, a warm message, and a memorable
    closing. Please make it lighthearted and sincere."'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: Engaging Travel Blog Post
