- en: Unlocking AI for Productivity, Creativity, and Success
  id: totrans-1
  prefs: []
  type: TYPE_NORMAL
  zh: 解锁AI以提高生产力、创造力和成功
- en: Artificial intelligence, deep learning, machine learning — whatever you’re doing
    if you don’t understand it — learn it. Because otherwise, you’re going to be a
    dinosaur within three years.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能、深度学习、机器学习——无论你在做什么，如果你不理解它——就去学习它。因为否则，你将在三年内变成恐龙。
- en: BY-Mitthun
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 作者：Mitthun
- en: CHAPTERS
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 章节目录
