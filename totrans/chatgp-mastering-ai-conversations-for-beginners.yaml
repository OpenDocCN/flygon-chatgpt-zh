  zh: '**如果**你**曾**经**跟**随**着**生成**式**技术**的**持续**进**步，你**已**经**听**说**过**一**些**关**于**A**I**艺**术**如**何**横**扫**世**界**（**或**至**少**，**在**互**联**网**上**），**以**暴**风**骤**雨**之**势**。**如果**没**有**，**那**好**，**这**就**是**本**节**的**用**意**！**它**曾**经**常**常**被**认**为**，**艺**术**或**其他**创**造**性**的**途**径**，**将**是**A**I**最**后**的**据**点**，**是**机器**最**后**的**试**验**场**，**如果**它们**能**够**达**到**那**个**地**步**；**因**为**我**们**人**类**能**够**做**的**事**情**，**技**术**似**乎**不**知**所**措**。**但**是**，**从**ChatGPT**在**2022**年**的**释**放**以**来**，**所**有**的**疑**问**都**已**经**解**决**。**在**2023**年**9**月**，**OpenAI**发**布**了**DALL-E**
    3**，**这是**它**的**A**I**艺**术**工**具**的**最新**发**展**，**通过**ChatGPT**运**行**。**DALL-E**
    3**是**一**个**文**字**到**图**像**的**模**型**，**能**够**从**你**在**聊天**框**中**输入**的**提**示**中**生**成**A**I**艺**术**，**并且**与**此**前**这**类**软**件**的**旧**版**本**不**同**，**它**能**够**以**惊**人**的**细**节**、**准**确**性**和**对**提**示**的**遵**从**来**做**到**这**点**！**更**多**的**是**，**E**3**模**型**允**许**你**对**它**生**成**的**图**像**进**行**微**调**和**修**改**，**意**味**着**你**不**必**每**次**都**从**零**开**始**，**只**要**你**的**设**想**有**一**点**不**同**于**你**预**想**的**东**西**。'
