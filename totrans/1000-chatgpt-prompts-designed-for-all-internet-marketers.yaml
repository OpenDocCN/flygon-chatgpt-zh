  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrcUY.jpg)'
- en: 'Preparing to Pitch Investors :'
  id: totrans-189
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 准备向投资者提案：
- en: You can use ChatGPT to role-play situations and perfect your pitch. Here are
    10 examples of how you can write scenario
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以使用ChatGPT进行角色扮演，完善你的提案。以下是如何编写情景的10个示例：
- en: prompts and request feedback on your pitch.
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: 对你的提案提出反馈。
- en: 'SCENARIO PROMPTS:'
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: 情景提示：
- en: • Imagine you're pitching an investor for a new mobile app that helps people
    track their daily water intake. Explain the problem the app solves and the target
    audience for the app.
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: • 想象一下你正在向投资者推销一个帮助人们跟踪每日饮水量的新移动应用。解释该应用解决的问题以及目标受众。
- en: • You're pitching an investor for a new eco-friendly fashion line. Describe
    the unique features of the clothing and how they benefit the environment, and
    share your plans for marketing and distribution.
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: • 你正在向投资者推销一个新环保时尚品牌。描述该服装的独特特点以及它们如何造福环境，并分享你的营销和分销计划。
- en: • Imagine you're pitching an investor for a new software platform that automates
    the accounts payable process for small businesses. Explain the pain points that
    the software solves and how it saves time and money for business owners.
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: • 想象一下你正在向投资者推销一个新软件平台，该平台自动化了小型企业的应付账款流程。解释该软件解决的问题以及它如何为企业家节省时间和金钱。
- en: • You're pitching an investor for a new plant-based meat alternative. Describe
    the product's nutritional benefits and how it compares to traditional meat in
    taste and texture, and share your plans for production and distribution.
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
  zh: • 你正在向投资者推销一个新的人造肉替代品。描述该产品的营养益处以及它与传统肉类在口感和质地上的比较，并分享你的生产和分销计划。
- en: • Imagine you're pitching an investor for a new
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: • 想象一下你正在向投资者推销一个新
- en: telemedicine platform that connects patients with healthcare providers through
    video chat. Describe the problem the platform solves and how it benefits patients
    and providers, and share your plans for marketing and scaling the platform.
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: 通过视频聊天将患者与医疗保健提供者连接起来的远程医疗平台。描述该平台解决的问题以及它如何惠及患者和提供者，并分享你的营销和平台扩展计划。
- en: • You're pitching an investor for a new service that helps people find affordable
    housing in high-cost cities. Explain the problem the service solves and the target
    audience for the service, and share your plans for revenue and growth.
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: • 你正在向投资者推销一个帮助人们在高成本城市寻找负担得起住房的新服务。解释该服务解决的问题以及目标受众，并分享你的收入和增长计划。
- en: • Imagine you're pitching an investor for a new social media platform that prioritizes
    user privacy and data security. Describe the features of the platform that set
    it apart from other social media platforms, and share your plans for user acquisition
    and monetization.
  id: totrans-200
  prefs: []
  type: TYPE_NORMAL
  zh: • 想象一下你正在向投资者推销一个优先考虑用户隐私和数据安全的新社交媒体平台。描述该平台与众不同的特点，以及你关于用户获取和货币化的计划。
- en: • You're pitching an investor for a new e-commerce platform that connects consumers
    with local artisans and craftspeople. Explain the problem the platform solves
    and how it benefits both consumers and artisans, and share your plans for marketing
    and expansion.
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
  zh: • 你正在向投资者推销一个将消费者与当地工匠和手工艺人连接起来的新电子商务平台。解释该平台解决的问题以及它如何惠及消费者和工匠，并分享你的营销和扩张计划。
- en: • Imagine you're pitching an investor for a new online marketplace for sustainable
    and ethical consumer goods. Describe the unique features of the marketplace and
    how it benefits both consumers and producers, and share your plans for growth
    and impact.
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
  zh: • 想象一下你正在向投资者推销一个可持续和道德消费商品的新在线市场。描述该市场的独特特点以及它如何惠及消费者和生产者，并分享你的增长和影响计划。
- en: • You're pitching an investor for a new blockchain-based platform that helps
    small businesses access financing from a global network of investors. Explain
    the problem the platform solves and how it benefits small businesses and investors,
    and share your plans for scaling the platform.
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: ⑬ 你正在向投资者推销一个基于区块链的新平台，该平台帮助小型企业从全球投资者网络中获取融资。解释该平台解决的问题以及它如何惠及小型企业和投资者，并分享你扩大该平台的计划。
- en: 'EXAMPLES: ![](image_rsrcUZ.jpg)'
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：![](image_rsrcUZ.jpg)
- en: 'Hiring and Leadership :'
  id: totrans-205
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 招聘和领导力：
- en: 'INSTRUCTIONAL PROMPTS:'
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: 指导性提示：
- en: • How can I create a personalized message for a new hire of **[role]** that
    highlights their unique strengths and
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
  zh: ④ 我该如何为新员工的**[职位]**撰写一份个性化的欢迎信息，突出他们的独特优势，
- en: contributions to the **[Company type]** team, while also making them feel valued
    and supported in their new role?
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
  zh: ⑩ 我该如何在同时让他们感受到对**[公司类型]**团队的贡献，并让他们在新的角色中感到被重视和支持？
- en: • What would be a good message to welcome a new hire to **[company details]**
    team and provide them with a brief overview of our company culture, values, and
    goals?
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
  zh: ⑦ 什么样的欢迎信息能够很好地欢迎新员工加入**[公司详情]**团队，并向他们简要介绍我们的企业文化、价值观和目标？
- en: • How can I create a fun and engaging onboarding experience for a new hire in
    **[company type]**, that includes opportunities for them to get to know their
    colleagues, familiarize themselves with our company culture, and understand their
    role and responsibilities in **[role]**?
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: ⑫ 我该如何为**[公司类型]**的新员工创造一个有趣且吸引人的入职体验，包括让他们有机会了解同事、熟悉我们的企业文化，并理解他们在**[职位]**中的角色和责任？
- en: • How can I create a message for a new hire for **[role]**, that showcases our
    **[company type]** commitment to diversity, equity, and inclusion, and makes them
    feel welcome and valued as a member of our team?
  id: totrans-211
  prefs: []
  type: TYPE_NORMAL
  zh: ① 我该如何为新员工撰写一份关于**[职位]**的消息，展示我们对于多元化、平等和包容的**[公司类型]**承诺，并让他们感受到作为团队一员的欢迎和重视？
- en: 'OPEN-ENDED PROMPTS:'
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
  zh: 开放式提示：
- en: • “Imagine you're hiring a new customer service representative. What are some
    key skills and qualities you would look for in a candidate? What questions would
    you ask to assess their ability to handle customer inquiries and resolve issues?”
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
  zh: ③ “想象一下，你正在招聘一名新的客户服务代表。你会在候选人身上寻找哪些关键技能和品质？你会问哪些问题来评估他们处理客户咨询和解决问题的能力？”
- en: • “You're hiring a new software developer. What technical skills and experience
    are important for this position? What questions would you ask to evaluate their
    coding abilities and problemsolving skills?”
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
  zh: ② “你正在招聘一名新的软件开发人员。对于这个职位，哪些技术技能和经验是重要的？你会问哪些问题来评估他们的编码能力和解决问题的能力？”
- en: • “Imagine you're hiring a new marketing manager. What experience and qualifications
    are essential for this role? What questions would you ask to assess their understanding
    of your target market and their ability to develop effective marketing strategies?”
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
  zh: ⑤ “想象一下，你正在招聘一名新的市场营销经理。对于这个角色，哪些经验和资质是必要的？你会问哪些问题来评估他们对目标市场的理解以及他们制定有效营销策略的能力？”
- en: • “You're hiring a new sales representative. What traits and qualities would
    you look for in a candidate for this position? What questions would you ask to
    evaluate their communication and persuasion skills, as well as their ability to
    meet sales targets?”
  id: totrans-216
  prefs: []
  type: TYPE_NORMAL
  zh: ⑥ “你正在招聘一名新的销售代表。对于这个职位，你会在候选人身上寻找哪些特质和品质？你会问哪些问题来评估他们的沟通和说服能力，以及他们达成销售目标的能力？”
- en: • “Imagine you're hiring a new human resources manager. What experience and
    qualifications are essential for this role? What questions would you ask to assess
    their understanding of HR best practices and their ability to manage employee
    relations?”
  id: totrans-217
  prefs: []
  type: TYPE_NORMAL
  zh: ⑧ “想象一下，你正在招聘一名新的人力资源经理。对于这个角色，哪些经验和资质是必要的？你会问哪些问题来评估他们对人力资源最佳实践的理解以及他们管理员工关系的能力？”
- en: • “You're hiring a new accountant. What technical skills and experience are
    important for this position? What questions would you ask to evaluate their knowledge
    of accounting principles and their ability to analyze financial statements?”
  id: totrans-218
  prefs: []
  type: TYPE_NORMAL
  zh: ⑨ “你正在招聘一名新的会计。对于这个职位，哪些技术技能和经验是重要的？你会问哪些问题来评估他们对会计原则的了解以及他们分析财务报表的能力？”
- en: • “Imagine you're hiring a new graphic designer. What experience and qualifications
    are essential for this role? What questions would you ask to evaluate their creative
    abilities and their ability to work collaboratively with other team members?”
  id: totrans-219
  prefs: []
  type: TYPE_NORMAL
  zh: ⑪ “想象一下，你正在招聘一名新的图形设计师。对于这个角色，哪些经验和资质是必要的？你会问哪些问题来评估他们的创造能力和与团队成员协作的能力？”
- en: • “You're hiring a new project manager. What traits and qualities would you
    look for in a candidate for this position? What questions would you ask to assess
    their leadership and organizational skills, as well as their ability to manage
    deadlines and budgets?”
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
  zh: • “你正在招聘一位新的项目经理。你会在候选人中寻找哪些特质和品质？你会问哪些问题来评估他们的领导能力和组织技能，以及他们管理截止日期和预算的能力？”
- en: • “Imagine you're hiring a new administrative assistant. What skills and qualities
    are important for this role? What questions would you ask to evaluate their organizational
    abilities and their ability to handle multiple tasks and priorities?”
  id: totrans-221
  prefs: []
  type: TYPE_NORMAL
  zh: • “想象一下，你正在招聘一位新的行政助理。对这个角色来说，哪些技能和品质是重要的？你会问哪些问题来评估他们的组织能力和处理多项任务和优先级的能力？”
- en: • “You're hiring a new data analyst. What technical skills and experience are
    important for this position? What questions would you ask to evaluate their ability
    to analyze and interpret data, as well as their experience with data visualization
    tools and techniques?”
  id: totrans-222
  prefs: []
  type: TYPE_NORMAL
  zh: • “你正在招聘一位新的数据分析师。对这个职位来说，哪些技术技能和经验是重要的？你会问哪些问题来评估他们分析和解释数据的能力，以及他们使用数据可视化工具和技术方面的经验？”
- en: 'FILL-IN-THE-BLANK PROMPTS:'
  id: totrans-223
  prefs: []
  type: TYPE_NORMAL
  zh: 填空提示：
- en: • What are the qualifications required for **[**role**]** in
  id: totrans-224
  prefs: []
  type: TYPE_NORMAL
  zh: • **[**角色**]**在
- en: '**[**type of business**]?**'
  id: totrans-225
  prefs: []
  type: TYPE_NORMAL
  zh: '**[**业务类型**]?**'
- en: • What is the expected work schedule and company
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
  zh: • 预期的工时安排和公司
- en: culture for **[**role**]** in **[**type of business**]?**
  id: totrans-227
  prefs: []
  type: TYPE_NORMAL
  zh: 文化对于**[**角色**]**在**[**业务类型**]?**
- en: • Can you provide me a step-by-step tutorial on how to hire
  id: totrans-228
  prefs: []
  type: TYPE_NORMAL
  zh: • 你能提供一份关于如何招聘
