  - PREF_UL
  type: TYPE_NORMAL
  zh: '**有时**，一个简单的提示可能不会产生完美的响应。在这种情况下，请进行**优化和迭代**：'
- en: '****St**art** ****wi**th** ****a**** ****br**oad** ****pr**omp**t: “****Gi**ve**
