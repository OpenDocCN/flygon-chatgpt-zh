  prefs: []
  type: TYPE_NORMAL
  zh: 2\. "创建一个跟踪创新在不同营销生态系统之间如何转变的‘价值突变框架’。"
- en: 3\. "Develop a 'cross-pollination intelligence' model that identifies breakthrough
    opportunities by combining seemingly unrelated domains."
  id: totrans-763
  prefs: []
