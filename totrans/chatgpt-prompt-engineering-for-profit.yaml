- en: '[****Wh**at** ****i**s** ****yo**ur** ****ma**in** ****obje**ctiv**e ]'
  id: totrans-984
  prefs: []
  type: TYPE_NORMAL
  zh: '[****Wh**at** ****i**s** ****yo**ur** ****ma**in** ****obje**ctiv**e ]'
- en: '****T**he** ****ma**in** ****obje**ctiv**e ****o**f** ****Cont**raria**n ****Prom**ptin**g
    ****pro**mote**s ****cri**tica**l ****thi**nkin**g ****b**y** ****chal**lengin**g
    ****conv**ention**al ****wi**sdo**m ****o**r** ****ques**tionin**g ****wi**del**y
    ****he**ld** ****assu**mption**s. ****Th**is** ****enco**urage**s ****t**he**
    ****cre**atio**n ****o**f** ****a**** ****mo**re** ****com**plet**e ****ana**lysi**s,
    ****wh**ere** ****pr**os** ****a**nd** ****co**ns** ****a**re** ****exp**lore**d
    ****i**n** ****a**** ****bal**ance**d ****w**ay**. ****B**y** ****ta**kin**g ****a**n**
    ****opp**osin**g ****vi**ew**, ****L**LM** ****he**lps** ****ide**ntif**y ****pote**ntia**l
    ****ri**sks** ****a**nd** ****be**tte**r ****unde**rstan**d ****t**he** ****ot**her**
    ****si**de** ****o**f** ****a**n** ****arg**umen**t.'
  id: totrans-985
  prefs: []
  type: TYPE_NORMAL
  zh: '**主要目标**是**通过挑战传统智慧或质疑广泛持有的假设来促进批判性思考**。这鼓励创建更全面的**分析**，其中正反双方都得到平衡的探讨。通过采取对立的观点，LLM
    帮助识别潜在风险，并更好地理解论点的另一面。'
- en: '****Ano**the**r ****go**al** ****i**s** ****t**o** ****enco**urag**e ****crea**tivit**y
    ****a**nd** ****inno**vatio**n, ****a**s** ****chal**lengin**g ****t**he** ****st**atu**s
    ****q**uo** ****c**an** ****re**vea**l ****n**ew** ****solu**tion**s ****o**r**
    ****an**gle**s ****o**n** ****pro**blem**s. ****Of**ten**, ****b**y** ****ques**tionin**g
    ****conv**ention**al ****assu**mption**s, ****inno**vativ**e ****id**eas** ****a**nd**
    ****appr**oache**s ****em**erg**e ****th**at** ****c**an** ****ha**ve** ****a****
    ****sign**ifican**t ****a**nd** ****pos**itiv**e ****im**pac**t.'
  id: totrans-986
  prefs: []
  type: TYPE_NORMAL
  zh: '**另一个目标是鼓励创造力和创新**，因为挑战现状可以揭示新的解决方案或解决问题的角度。通常，通过质疑传统假设，可以涌现出具有重大和积极影响的创新想法和方法。'
- en: '[****H**ow** ****i**t** ****wo**rks** ]'
  id: totrans-987
  prefs: []
  type: TYPE_NORMAL
  zh: '[****H**ow** ****i**t** ****wo**r**ks** ]'
- en: '****Cont**raria**n ****Prom**ptin**g ****wo**rks** ****b**y** ****as**kin**g
    ****t**he** ****L**LM** ****t**o** ****pro**vid**e ****a**** ****cou**nte**r-****res**pons**e
    ****o**r** ****res**pons**e ****t**o** ****t**he** ****view**poin**t ****pres**ente**d.
    ****T**he** ****pr**omp**t ****m**ay** ****inc**lud**e ****req**uest**s ****su**ch**
    ****a**s** “****Ar**gue** ****aga**ins**t…”, “****Wh**at** ****a**re** ****t**he**
    ****nega**tive**s ****o**f**…”, ****o**r** “****Chal**leng**e ****t**he** ****prev**ailin**g
    ****vi**ew** ****o**f**…”. ****Th**is** ****enco**urage**s ****t**he** ****mo**del**
    ****t**o** ****lo**ok** ****f**or** ****a**nd** ****exp**lor**e ****le**ss** ****disc**usse**d
    ****o**r** ****neg**ativ**e ****asp**ect**s ****th**at** ****m**ay** ****n**ot**
    ****b**e** ****evi**den**t ****a**t** ****fi**rst** ****gl**anc**e.'
  id: totrans-988
  prefs: []
  type: TYPE_NORMAL
  zh: '**Contrarian Prompting**通过要求LLM提供对立回应或对所呈现观点的回应来工作。提示可能包括“**反对…”，“…的缺点是什么？”或“**挑战主流观点**”。这鼓励模型寻找和探索那些可能在一瞥之下不明显或不被认可的讨论或负面方面。'
- en: '****F**or** ****exa**mpl**e, ****i**f** ****t**he** ****cons**ensu**s ****i**s**
    ****th**at** "****wor**kin**g ****rem**otel**y ****incr**ease**s ****prod**uctivi**ty",
    ****t**he** ****Cont**raria**n ****Prom**ptin**g ****wo**uld** ****a**sk** ****t**he**
    ****L**LM** ****t**o** ****ar**gue** ****t**he** ****opp**osit**e, ****iden**tifyin**g
    ****asp**ect**s ****su**ch** ****a**s** ****emp**loye**e ****isol**atio**n, ****t**he**
    ****diff**icult**y ****i**n** ****sepa**ratin**g ****per**sona**l ****a**nd**
    ****prof**ession**al ****li**fe**, ****a**nd** ****t**he** ****chal**lenge**s
    ****o**f** ****main**tainin**g ****go**od** ****commu**nicati**on.'
  id: totrans-989
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，如果共识是“远程工作提高生产力”，那么反证法会要求LLM提出相反的观点，识别诸如员工孤立、难以区分个人生活和职业生活，以及保持良好沟通的挑战等方面。
- en: '****Th**is** ****app**roac**h ****al**low**s ****f**or** ****de**epe**r ****cri**tica**l
    ****ana**lysi**s, ****high**lighti**ng ****pote**ntia**l ****fl**aws** ****o**r**
    ****pro**blem**s ****i**n** ****a**n** ****esta**blishe**d ****pos**itio**n ****a**nd**
    ****hel**pin**g ****t**o** ****exp**lor**e ****t**he** ****is**sue** ****i**n**
    ****a**** ****mo**re** ****com**plet**e ****a**nd** ****bal**ance**d ****w**ay**.'
  id: totrans-990
  prefs: []
  type: TYPE_NORMAL
  zh: 这种方法允许进行更深入的批判性分析，突出潜在的错误或问题，并帮助以更全面和平衡的方式探索问题。
- en: '[****Wh**en** ****t**o** ****u**se** ]'
  id: totrans-991
  prefs: []
  type: TYPE_NORMAL
  zh: '[何时使用]'
- en: '****Cont**raria**n ****Prom**ptin**g ****sh**oul**d ****b**e** ****us**ed**
    ****wh**en** ****y**ou** ****wa**nt** ****t**o** ****chal**leng**e ****a**n**
    ****arg**umen**t, ****ide**ntif**y ****pote**ntia**l ****ri**sks** ****a**nd**
    ****fl**aws** ****i**n** ****a**** ****pro**posa**l, ****o**r** ****wh**en** ****y**ou**
    ****wa**nt** ****t**o** ****g**et** ****a**** ****com**plet**e ****pic**tur**e
    ****o**f** ****a**** ****contr**oversi**al ****is**sue**. ****I**t** ****i**s**
    ****us**efu**l ****i**n** ****deb**ate**s ****a**nd** ****disc**ussion**s, ****wh**ere**
    ****y**ou** ****ne**ed** ****t**o** ****exp**lor**e ****a**ll** ****an**gle**s
    ****t**o** ****ma**ke** ****a**n** ****inf**orme**d ****dec**isio**n.'
  id: totrans-992
  prefs: []
  type: TYPE_NORMAL
  zh: 当你想挑战一个论点、识别提案中的潜在风险和缺陷，或者当你想要全面了解一个有争议问题时，应该使用反证法。它在辩论和讨论中很有用，在这些场合中，你需要探索所有角度来做出明智的决定。
- en: '****Th**is** ****tech**niqu**e ****i**s** ****reco**mmende**d ****i**n** ****educ**ationa**l
    ****set**ting**s, ****espe**ciall**y ****wh**en** ****tea**chin**g ****cri**tica**l
    ****thi**nkin**g ****sk**ill**s ****a**nd** ****enco**uragin**g ****stu**dent**s
    ****t**o** ****s**ee** ****bo**th** ****si**des** ****o**f** ****a**n** ****arg**umen**t.
    ****I**t** ****i**s** ****al**so** ****ve**ry** ****us**efu**l ****i**n** ****stra**tegi**c
    ****pla**nnin**g, ****wh**ere** ****ques**tionin**g ****ini**tia**l ****assu**mption**s
    ****c**an** ****he**lp** ****ide**ntif**y ****ri**sks** ****th**at** ****ne**ed**
    ****t**o** ****b**e** ****miti**gate**d.'
  id: totrans-993
  prefs: []
  type: TYPE_NORMAL
  zh: 这种技巧在教育环境中特别推荐，尤其是在教授批判性思维技能和鼓励学生看到一个论点的两面时。它也在战略规划中非常有用，因为质疑初始假设可以帮助识别需要缓解的风险。
- en: '****Furt**hermor**e, ****i**t** ****i**s** ****val**uabl**e ****i**n** ****deve**lopin**g
    ****inno**vativ**e ****id**eas**. ****B**y** ****ques**tionin**g ****prev**ailin**g
    ****opi**nio**n, ****i**t** ****i**s** ****pos**sibl**e ****t**o** ****op**en**
    ****u**p** ****n**ew** ****possi**biliti**es ****a**nd** ****exp**lor**e ****alte**rnativ**e
    ****solu**tion**s ****th**at** ****m**ay** ****pr**ove** ****mo**re** ****effi**cien**t
