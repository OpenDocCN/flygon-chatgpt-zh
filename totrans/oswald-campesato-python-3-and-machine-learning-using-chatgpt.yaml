  prefs: []
  type: TYPE_NORMAL
- en: 'LISTING 3.4: tree_classifier.py'
  prefs: []
  type: TYPE_NORMAL
- en: import numpy as np
  prefs: []
  type: TYPE_NORMAL
- en: import matplotlib.pyplot as plt
  prefs: []
  type: TYPE_NORMAL
- en: import pandas as pd
  prefs: []
  type: TYPE_NORMAL
- en: Importing the dataset
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: dataset = pd.read_csv('partial_wine.csv')
  prefs: []
  type: TYPE_NORMAL
- en: X = dataset.iloc[:, [0, 1]].values
  prefs: []
  type: TYPE_NORMAL
- en: y = dataset.iloc[:, 2].values
  prefs: []
  type: TYPE_NORMAL
- en: split the dataset into a training set and a test set
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: from sklearn.model_selection import train_test_split
  prefs: []
  type: TYPE_NORMAL
- en: X_train, X_test, y_train, y_test = train_test_split(X, y, test_size = 0.25,
    random_state = 0)
  prefs: []
  type: TYPE_NORMAL
- en: Feature Scaling
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: from sklearn.preprocessing import StandardScaler
  prefs: []
  type: TYPE_NORMAL
- en: sc = StandardScaler()
  prefs: []
  type: TYPE_NORMAL
- en: X_train = sc.fit_transform(X_train)
  prefs: []
  type: TYPE_NORMAL
- en: X_test = sc.transform(X_test)
  prefs: []
  type: TYPE_NORMAL
- en: ====> INSERT YOUR CLASSIFIER CODE HERE <====
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: from sklearn.tree import DecisionTreeClassifier
  prefs: []
  type: TYPE_NORMAL
- en: classifier = DecisionTreeClassifier(criterion='entropy',rand om_state=0)
  prefs: []
  type: TYPE_NORMAL
- en: classifier.fit(X_train, y_train)
  prefs: []
  type: TYPE_NORMAL
- en: ====> INSERT YOUR CLASSIFIER CODE HERE <====
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: predict the test set results
  prefs:
