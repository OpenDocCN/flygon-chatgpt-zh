  - PREF_IND
  type: TYPE_NORMAL
  zh: '"我想制定一个健身计划，帮助我实现[目标—减肥、增肌、耐力]。我的当前健身水平是[初学者/中级/高级]，我更喜欢[家庭锻炼、健身房课程、户外活动]。请提供一个每周锻炼日程。"'
