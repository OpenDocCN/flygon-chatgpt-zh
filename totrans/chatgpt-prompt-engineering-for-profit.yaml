  zh: 与**比较提示**相比，后者中LLM比较两个元素，**角色反转提示**则涉及在每个场景中假设一个特定的角色并探索该方的视角。目标不仅仅是比较，而是真正地采纳另一方的立场，这使得分析更加同理心强和引人入胜。
