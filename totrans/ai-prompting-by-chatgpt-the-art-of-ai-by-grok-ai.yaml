  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: INTERACTIVE PROMPTING EXERCISES
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: To further enhance your understanding and skills in AI communication, this section
    provides a series of interactive exercises. These exercises are designed to be
    practical and hands-on, allowing you to apply the concepts and techniques discussed
    in the book. They range from basic to more advanced scenarios, suitable for readers
    at different levels of familiarity with AI.
  prefs: []
  type: TYPE_NORMAL
- en: 'Exercise 1: Basic AI Prompt Construction'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Objective: Practice creating clear and concise prompts for a simple AI task.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Task: Write a prompt asking an AI to summarize a recent news article on a specific
    topic.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Follow-Up: Evaluate the effectiveness of your prompt based on the AI’s response.
    Revise the prompt for clarity and specificity if needed.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Exercise 2: Contextual Prompting'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Objective: Learn to include relevant context in your prompts for more accurate
    AI responses.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Task: Formulate a prompt asking an AI for travel recommendations, including
    specific preferences or constraints (e.g., budget, dietary restrictions).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Follow-Up: Reflect on how the inclusion of context influenced the AI’s recommendations.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Exercise 3: Handling Ambiguity'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Objective: Develop skills in clarifying ambiguous prompts.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Task: Create an ambiguous prompt intentionally and observe how the AI responds.
    Then, clarify the prompt and compare the responses.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Follow-Up: Analyse how ambiguity affected the AI’s response and how clarification
    improved the outcome.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Exercise 4: Sequential Prompting for Complex Queries'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Objective: Practice using sequential prompts to explore a complex topic with
    AI.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Task: Start with a general query about a broad subject (e.g., climate change)
    and use a series of follow-up prompts to delve deeper into a specific aspect.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Follow-Up: Assess how each subsequent prompt guided the AI’s responses and
