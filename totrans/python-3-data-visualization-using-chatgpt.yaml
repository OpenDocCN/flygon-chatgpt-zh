    The output from launching [Listing 2.18](#list2-18) is here:'
  id: totrans-917
  prefs: []
  type: TYPE_NORMAL
  zh: '[列表 2.18](#list2-18) 包含一个 NumPy 数组 x2，该数组由前八个整数组成。接下来，调用与 x2 相关的 mean() 和 std()
    来计算 x2 元素的均值和标准差。启动 [列表 2.18](#list2-18) 的输出如下：'
- en: '[PRE148]'
  id: totrans-918
  prefs: []
  type: TYPE_PRE
  zh: '[PRE148]'
- en: '**CODE SAMPLE WITH MEAN AND STANDARD DEVIATION**'
  id: totrans-919
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**具有均值和标准差的代码示例**'
- en: 'The code sample in this section extends the code sample in the previous section
    with additional statistical values, and the code in [Listing 2.19](#list2-19)
    can be used for any data distribution. Keep in mind that the code sample uses
    random numbers simply for the purposes of illustration: after you have launched
    the code sample, replace those numbers with values from a CSV file or some other
    dataset containing meaningful values.'
  id: totrans-920
  prefs: []
  type: TYPE_NORMAL
  zh: 本节中的代码示例在上一节的代码示例基础上扩展了额外的统计值，[列表 2.19](#list2-19) 中的代码可以用于任何数据分布。请注意，代码示例使用随机数字仅用于说明目的：在您启动代码示例后，将这些数字替换为来自
    CSV 文件或其他包含有意义值的数据集的值。
- en: Moreover, this section does not provide details regarding the meaning of quartiles,
    but you can learn about quartiles at *[https://en.wikipedia.org/wiki/Quartile](https://en.wikipedia.org/wiki/Quartile)*.
  id: totrans-921
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，本节不提供关于四分位数含义的详细信息，但您可以在 *[https://en.wikipedia.org/wiki/Quartile](https://en.wikipedia.org/wiki/Quartile)*
    上了解四分位数。
- en: '[Listing 2.19](#list2-19) displays the content of stat_values.py that illustrates
    how to display various statistical values from a NumPy array of random numbers.'
  id: totrans-922
  prefs: []
  type: TYPE_NORMAL
  zh: '[列表 2.19](#list2-19) 展示了 stat_values.py 的内容，该内容说明了如何从随机数的 NumPy 数组中显示各种统计值。'
- en: '***LISTING 2.19: stat_values.py***'
  id: totrans-923
  prefs: []
  type: TYPE_NORMAL
  zh: '***列表 2.19: stat_values.py***'
- en: '[PRE149]'
  id: totrans-924
  prefs: []
  type: TYPE_PRE
  zh: '[PRE149]'
- en: 'The data sample (shown in bold) in [Listing 2.19](#list2-19) is from a uniform
    distribution between 0 and 1\. The NumPy percentile() function calculates a linear
    interpolation (average) between observations, which is needed to calculate the
    median on a sample with an even number of values. As you can surmise, the NumPy
    functions min() and max() calculate the smallest and largest values in the data
    sample. The output from launching [Listing 2.19](#list2-19) is here:'
  id: totrans-925
  prefs: []
  type: TYPE_NORMAL
  zh: '[列表 2.19](#list2-19) 中的数据样本（以粗体显示）来自 0 和 1 之间的均匀分布。NumPy 的 percentile() 函数计算观察值之间的线性插值（平均值），这在计算具有偶数个值的样本的中位数时是必需的。正如您可以推测的那样，NumPy
    的 min() 和 max() 函数计算数据样本中的最小值和最大值。启动 [列表 2.19](#list2-19) 的输出如下：'
- en: '[PRE150]'
  id: totrans-926
  prefs: []
  type: TYPE_PRE
  zh: '[PRE150]'
- en: '**Trimmed Mean and Weighted Mean**'
  id: totrans-927
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '**截尾均值和加权均值**'
- en: In addition to the arithmetic mean, there are variants that are known as the
    trimmed mean (also called the “truncated mean”) and the weighted mean.
  id: totrans-928
  prefs: []
  type: TYPE_NORMAL
  zh: 除了算术均值之外，还有被称为截尾均值（也称为“截断均值”）和加权均值的变体。
- en: 'A *trimmed mean* is a robust estimate (i.e., a metric that is not sensitive
    to outliers). As a simple example of a trimmed mean, suppose that you have five
    scores for the evaluation of a product: simply drop the highest and lowest scores
    and then compute the average of the remaining three scores. If you have multiple
    sets of five scores, repeat the preceding process and then compute the average
    of the set of trimmed mean values.'
  id: totrans-929
  prefs: []
  type: TYPE_NORMAL
  zh: 截尾均值是一种稳健的估计（即，对异常值不敏感的度量）。截尾均值的一个简单例子是，假设您有五个用于评估产品的分数：简单地丢弃最高分和最低分，然后计算剩余三个分数的平均值。如果您有多个五分数的集合，重复前面的过程，然后计算截尾均值值的集合的平均值。
- en: A *weighted mean* is useful when sample data does not represent different groups
    in a dataset. Assigning a larger weight to groups that are under-represented yields
    a weighted mean that more accurately represents the various groups in the dataset.
    However, keep in mind that outliers can affect the mean as well as the weighted
    mean.
  id: totrans-930
  prefs: []
  type: TYPE_NORMAL
  zh: 当样本数据不能代表数据集中的不同组时，*加权平均*很有用。给代表性不足的组分配更大的权重，可以得到一个更准确地表示数据集中各种组的加权平均。然而，请注意，异常值会影响平均值以及加权平均值。
- en: The weighted mean is the same as the expected value. If you are unfamiliar with
    the notion of an expected value, suppose that the set P = {p1,p2,...,pn} is a
    probability distribution, which means that the numeric values in the set P must
    be non-negative and have a sum equal to 1\. In addition, suppose that V = {v1,v2,...,vn}
    is a set of numeric scores that are assigned to n features of a product M. For
    example, the values in the set V could be positive integers in some range (e.g.,
    between 1 and 10) that represent “rewards”.
  id: totrans-931
  prefs: []
  type: TYPE_NORMAL
  zh: 加权平均与期望值相同。如果你不熟悉期望值的概念，假设集合 P = {p1,p2,...,pn} 是一个概率分布，这意味着集合 P 中的数值必须是非负的，并且它们的和等于
    1。此外，假设 V = {v1,v2,...,vn} 是一个分配给产品 M 的 n 个特征的数值分数集合。例如，集合 V 中的值可以是某些范围内的正整数（例如，1
    到 10 之间），代表“奖励”。
- en: 'Then the *expected value* E for that product is computed as follows:'
  id: totrans-932
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，该产品的 *期望值* E 计算如下：
- en: '[PRE151]'
  id: totrans-933
  prefs: []
  type: TYPE_PRE
  zh: '[PRE151]'
- en: The Python code samples in the next several sections contain some rudimentary
    APIs from Matplotlib. The code samples start with simple examples of line segments,
    followed by an introduction to Linear Regression.
  id: totrans-934
  prefs: []
  type: TYPE_NORMAL
  zh: 在接下来的几个部分中，Python 代码示例包含了一些来自 Matplotlib 的基本 API。代码示例从线段的简单示例开始，然后介绍线性回归。
- en: '**WORKING WITH LINES IN THE PLANE (OPTIONAL)**'
  id: totrans-935
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**平面中线的处理（可选）**'
- en: 'This section contains a short review of lines in the Euclidean plane, so you
    can skip this section if you are comfortable with this topic. A minor point that
    is often overlooked is that lines in the Euclidean plane have infinite length.
    If you select two distinct points of a line, then all the points between those
    two selected points are a *line segment*. A *ray* is a “half infinite” line: when
    you select one point as an endpoint, then all the points on one side of the line
    constitute a ray.'
  id: totrans-936
  prefs: []
  type: TYPE_NORMAL
  zh: 本节包含了对欧几里得平面中线的简要回顾，因此如果你对这个主题感到舒适，可以跳过这一节。一个常被忽视的细微之处是，欧几里得平面中的线具有无限长度。如果你选择一条线上的两个不同点，那么这两个选定点之间的所有点都构成一个
    *线段*。*射线* 是“半无限”的线：当你选择一个点作为端点时，那么线的一侧的所有点构成一个射线。
- en: For example, the points in the plane whose y-coordinate is 0 form a line along
    the x-axis, whereas the points between (0,0) and (1,0) on the x-axis form a line
    segment. In addition, the points on the x-axis that are to the right of (0,0)
    form a ray, and the points on the x-axis that are to the left of (0,0) also form
    a ray.
  id: totrans-937
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，平面中 y 坐标为 0 的点形成沿 x 轴的线，而 x 轴上 (0,0) 和 (1,0) 之间的点形成线段。此外，x 轴上位于 (0,0) 右侧的点形成一个射线，而
    x 轴上位于 (0,0) 左侧的点也形成一个射线。
- en: 'For simplicity and convenience, in this book we will use the terms “line” and
    “line segment” interchangeably. Now, let’s delve into the details of lines in
    the Euclidean plane. Here is the equation of a (non-vertical) line in the Euclidean
    plane:'
  id: totrans-938
  prefs: []
  type: TYPE_NORMAL
  zh: 为了简单和方便，在这本书中，我们将“线”和“线段”这两个术语互换使用。现在，让我们深入了解欧几里得平面中线的细节。以下是欧几里得平面中一条（非垂直）线的方程：
- en: '[PRE152]'
  id: totrans-939
  prefs: []
  type: TYPE_PRE
  zh: '[PRE152]'
- en: 'The value of m is the slope of the line and the value of b is the y-intercept
    (i.e., the place where the non-vertical line intersects the y-axis). The following
    form for a line in the plane is a general equation that includes vertical lines:'
  id: totrans-940
  prefs: []
  type: TYPE_NORMAL
  zh: m 的值是线的斜率，b 的值是 y 轴截距（即非垂直线与 y 轴相交的地方）。平面中线的以下形式是一个包含垂直线的通用方程：
- en: '[PRE153]'
  id: totrans-941
  prefs: []
  type: TYPE_PRE
  zh: '[PRE153]'
- en: However, we will not be working with vertical lines, so we will continue using
    the first formula. [Figure 2.1](#fig2-1) displays three horizontal lines whose
    equations (from top to bottom) are y = 3, y = 0, and y = -3.
  id: totrans-942
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，我们不会处理垂直线，因此我们将继续使用第一个公式。[图 2.1](#fig2-1) 显示了三条水平线，其方程（从上到下）分别是 y = 3，y =
    0 和 y = -3。
