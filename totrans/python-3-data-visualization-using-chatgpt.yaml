- en: '**SUMMARY**'
  id: totrans-766
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**总结**'
- en: This chapter showed you how to work with numbers and perform arithmetic operations
    on numbers, and then you learned how to work with strings and use string operations.
    You also learned how to use the try/except construct to handle exceptions that
    might occur in your Python code. The next chapter shows you how to work with conditional
    statements, loops, and user-defined functions.
  id: totrans-767
  prefs: []
  type: TYPE_NORMAL
  zh: 本章向您展示了如何处理数字并在数字上执行算术运算，然后您学习了如何处理字符串并使用字符串操作。您还学习了如何使用 try/except 结构来处理 Python
    代码中可能发生的异常。下一章将向您展示如何处理条件语句、循环和用户定义的函数。
- en: CHAPTER 2
  id: totrans-768
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第二章
- en: '*INTRODUCTION TO NUMPY*'
  id: totrans-769
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '*NUMPY 简介*'
- en: This chapter provides a quick introduction to the Python NumPy package, which
    provides very useful functionality, not only for “regular” Python scripts, but
    also for Python-based scripts with TensorFlow. For instance, you will see NumPy
    code samples containing loops, arrays, and lists. You will also learn about dot
    products, the reshape() method (very useful!), how to plot with Matplotlib (discussed
    in more detail in [Chapter 4](ch04.xhtml)), and examples of linear regression.
  id: totrans-770
  prefs: []
  type: TYPE_NORMAL
  zh: 本章快速介绍了 Python NumPy 包，它提供了非常实用的功能，不仅适用于“常规”Python 脚本，也适用于基于 TensorFlow 的 Python
    脚本。例如，您将看到包含循环、数组和列表的 NumPy 代码示例。您还将了解点积、reshape() 方法（非常有用！）、如何使用 Matplotlib 绘图（在第四章中详细讨论），以及线性回归的示例。
- en: The first part of this chapter briefly discusses NumPy and some of its useful
    features. The second part contains examples of working arrays in NumPy, and contrasts
    some of the APIs for lists with the same APIs for arrays. In addition, you will
    see how easy it is to compute the exponent-related values (square, cube, and so
    forth) of elements in an array.
  id: totrans-771
  prefs: []
  type: TYPE_NORMAL
  zh: 本章的第一部分简要介绍了 NumPy 以及其一些有用的特性。第二部分包含了 NumPy 中工作数组的示例，并对比了列表与数组相同 API 的使用。此外，您还将看到计算数组中元素指数相关值（平方、立方等）是多么简单。
- en: The second part of the chapter introduces subranges, which are very useful (and
    frequently used) for extracting portions of datasets in machine learning tasks.
    In particular, you will see code samples that handle negative (-1) subranges for
    vectors as well as for arrays, because they are interpreted one way for vectors
    and a different way for arrays.
  id: totrans-772
  prefs: []
  type: TYPE_NORMAL
  zh: 本章的第二部分介绍了子范围的概念，这在机器学习任务中提取数据集的部分时非常有用（并且经常使用）。特别是，您将看到处理向量和数组中负（-1）子范围的代码示例，因为它们在向量和数组中的解释方式不同。
- en: 'The third part of this chapter delves into other NumPy methods, including the
    reshape() method, which is useful (and very common) when working with image files:
    some TensorFlow APIs require converting a 2D array of (R,G,B) values into a corresponding
    one-dimensional vector.'
  id: totrans-773
  prefs: []
  type: TYPE_NORMAL
  zh: 本章的第三部分深入探讨了其他 NumPy 方法，包括 reshape() 方法，这在处理图像文件时非常有用（并且非常常见）：一些 TensorFlow
    API 需要将 (R,G,B) 值的二维数组转换为相应的一维向量。
- en: The fourth part of this chapter delves into linear regression, the mean squared
    error (MSE), and how to calculate MSE with the NumPy linspace() API.
  id: totrans-774
  prefs: []
  type: TYPE_NORMAL
  zh: 本章的第四部分深入探讨了线性回归、均方误差（MSE）以及如何使用 NumPy linspace() API 计算MSE。
- en: '**WHAT IS NUMPY?**'
  id: totrans-775
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**什么是 NumPy？**'
- en: NumPy is a Python library that provides many convenient methods and improved
    code performance. NumPy contains a core library for scientific computing in Python,
    with performant multi-dimensional arrays and vectorized math functions, along
    with support for linear algebra and random numbers.
  id: totrans-776
  prefs: []
  type: TYPE_NORMAL
  zh: NumPy 是一个 Python 库，提供了许多方便的方法和改进的代码性能。NumPy 包含了 Python 中的科学计算核心库，具有高性能的多维数组和向量化数学函数，以及线性代数和随机数支持。
- en: NumPy is modeled after MatLab, with support for lists, arrays, and so forth.
    NumPy is easier to use than MatLab, and it is very common in TensorFlow code as
    well as Python code.
  id: totrans-777
  prefs: []
  type: TYPE_NORMAL
  zh: NumPy 是基于 MatLab 构建的，支持列表、数组等。NumPy 比MatLab 更易于使用，并且在 TensorFlow 代码以及 Python
    代码中都非常常见。
- en: '**Useful NumPy Features**'
  id: totrans-778
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '**有用的 NumPy 特性**'
- en: The NumPy package contains the *ndarray* object, which encapsulates *multi*-dimensional
    arrays of homogeneous data types. Many ndarray operations are performed in compiled
    code to improve performance.
  id: totrans-779
  prefs: []
  type: TYPE_NORMAL
  zh: NumPy 包含了 *ndarray* 对象，它封装了同构数据类型的 *多* 维数组。许多 ndarray 操作都是通过编译代码来执行的，以提高性能。
- en: There are important differences between NumPy arrays and standard Python sequences.
    First, NumPy arrays have a fixed size, whereas Python lists can expand dynamically.
    Second, NumPy arrays are homogeneous, which means that the elements in a NumPy
    array must have the same data type. Third, NumPy arrays support more efficient
    execution (and require less code) of various types of operations on large amounts
    of data.
  id: totrans-780
  prefs: []
  type: TYPE_NORMAL
  zh: NumPy 数组与标准 Python 序列之间存在重要差异。首先，NumPy 数组具有固定大小，而 Python 列表可以动态扩展。其次，NumPy 数组是同质的，这意味着
    NumPy 数组中的元素必须具有相同的数据类型。第三，NumPy 数组支持更高效的执行（并且需要更少的代码）来处理大量数据的各种操作。
- en: Now that you have a general idea about NumPy, let’s delve into some examples
    that illustrate how to work with NumPy arrays, which is the topic of the next
    section.
  id: totrans-781
  prefs: []
  type: TYPE_NORMAL
  zh: 现在您对 NumPy 有了一个大致的了解，让我们深入研究一些示例，这些示例说明了如何使用 NumPy 数组，这是下一节的主题。
- en: '**WHAT ARE NUMPY ARRAYS?**'
  id: totrans-782
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**什么是 NumPy 数组？**'
- en: 'An *array* is a set of consecutive memory locations used to store data. Each
    item in the array is called an *element*. The number of elements in an array is
    called the *dimension* of the array. A typical array declaration is shown here:'
  id: totrans-783
  prefs: []
  type: TYPE_NORMAL
  zh: '*数组* 是一组连续的内存位置，用于存储数据。数组中的每个项目称为 *元素*。数组中的元素数量称为数组的 *维度*。一个典型的数组声明如下：'
- en: '[PRE111]'
  id: totrans-784
  prefs: []
  type: TYPE_PRE
  zh: '[PRE111]'
- en: The preceding code snippet declares arr1 as an array of five elements, which
    you can access via arr1[0] through arr1[4]. Notice that the first element has
    an index value of 0, the second element has an index value of 1, and so forth.
    Thus, if you declare an array of 100 elements, then the 100^(th) element has an
    index value of 99.
  id: totrans-785
  prefs: []
  type: TYPE_NORMAL
  zh: 上述代码片段将 arr1 声明为一个包含五个元素的数组，您可以通过 arr1[0] 到 arr1[4] 访问这些元素。请注意，第一个元素的索引值为 0，第二个元素的索引值为
    1，依此类推。因此，如果您声明一个包含 100 个元素的数组，那么第 100 个元素的索引值为 99。
- en: '**NOTE** *The first position in a NumPy array has the index “0.”*'
  id: totrans-786
  prefs: []
  type: TYPE_NORMAL
  zh: '**注意** *NumPy 数组中的第一个位置具有索引“0。”*'
- en: 'NumPy treats arrays as vectors. Math operations are performed element-by-element.
    Remember the following difference: “doubling” an array *multiplies* each element
    by 2, whereas “doubling” a list *appends* a list to itself.'
  id: totrans-787
  prefs: []
  type: TYPE_NORMAL
  zh: NumPy 将数组视为向量。数学运算按元素逐个执行。请记住以下区别：“加倍”数组会将每个元素乘以 2，而“加倍”列表会将列表添加到自身。
- en: '[Listing 2.1](#list2-1) displays the content of nparray1.py that illustrates
    some operations on a NumPy array.'
  id: totrans-788
