  zh: '**对话设计**工作以类似用户体验设计（简称**UX**）的方式运作。**UX**设计关注于确保用户能够以简单、流畅的方式与数字技术互动，即“**合乎常理**”，而**对话设计**做的是同样的事情，但针对的是我们与技术之间的互动，而不是界面。这些互动可以是基于语音或文本的，包括虚拟助手如**Alexa**和**Siri**，以及聊天机器人如ChatGP**T**。每次你与技术进行对话，并且它以类似人类的方式回复，你就是在见证**对话设计**的实际应用。换句话说，我们可以将**对话设计**视为**图灵测试**的终极浮华版。'
