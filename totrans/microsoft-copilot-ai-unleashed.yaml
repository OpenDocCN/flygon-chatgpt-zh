- en: '● Meeting Note Taking: Copilot assists in taking meeting notes by suggesting
    words and sentences relevant to the ongoing discussion. For example, if attendees
    are discussing a "marketing plan," Copilot might propose words and phrases such
    as "Marketing Goals," "Target Group," "Marketing Strategy," etc.'
  prefs: []
  type: TYPE_NORMAL
- en: '● Follow-Up Conversations: Copilot aids in following up on meeting discussions
    by offering words and phrases aligned with the outcomes. For instance, if participants
    agree to implement a "marketing plan," Copilot could suggest phrases like "Establish
    a timeline," "Assign responsibilities," etc.'
  prefs: []
  type: TYPE_NORMAL
- en: '● Key Point Summarization: Copilot helps summarize key points by suggesting
    vocabulary and sentences pertinent to the important topics raised during the meeting.
    For instance, if participants summarize that "The marketing plan was successful,"
    Copilot may propose phrases like "Increased sales," "Satisfied customers," etc.'
  prefs: []
  type: TYPE_NORMAL
- en: '● Task Progress Tracking: Copilot facilitates tracking the progress of tasks
    assigned during meetings by providing words and phrases relevant to the task status.
    For example, if attendees are tasked with executing a "marketing plan," Copilot
    might suggest phrases like "On schedule completion," "Encountered any issues?"
    etc.'
  prefs: []
  type: TYPE_NORMAL
- en: '● Collaboration Coordination: Copilot aids in coordinating collaboration during
    meetings by offering words and phrases suitable for the collaborative efforts.
    For instance, if participants are collaborating on a "Marketing Plan," Copilot
    might suggest phrases like "Request feedback," "Seek assistance," etc.'
  prefs: []
  type: TYPE_NORMAL
