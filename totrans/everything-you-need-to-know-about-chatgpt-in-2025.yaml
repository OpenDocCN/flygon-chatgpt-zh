  zh: 当然，自动化也并非没有挑战。对于公司来说，确保人工智能系统不会重现现有的偏见或歧视某些候选人群体至关重要。例如，一个AI模型可能会在包含种族或性别偏见的历史数据上训练，这可能导致系统偏爱某些类型的候选人。为了减轻这些风险，公司承诺设计透明、包容和可审计的人工智能系统至关重要，并保持持续监督，以确保选拔过程公平且公正。
