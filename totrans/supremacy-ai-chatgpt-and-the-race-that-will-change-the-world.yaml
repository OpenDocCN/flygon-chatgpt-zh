- en: <hgroup>
  prefs: []
  type: TYPE_NORMAL
- en: '[PROLOGUE](contents.xhtml#c_pro)'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: </hgroup>
  prefs: []
  type: TYPE_NORMAL
- en: After picking up this book and reading these first few words, you might be wondering
    if a human wrote them.
  prefs: []
  type: TYPE_NORMAL
- en: That’s OK. I’m not offended.
  prefs: []
  type: TYPE_NORMAL
- en: Two years ago, that thought would not have even crossed your mind. But today,
    machines are generating articles, books, illustrations, and computer code that
    seem indistinguishable from the content created by people. Remember the “novel-writing
    machine” in the dystopian future of George Orwell’s *1984* and his “versificator”
    that wrote popular music? Those things exist now, and the change happened so fast
    that it’s given the public whiplash, leaving us wondering whether today’s office
    workers will have jobs in the next year or two. Millions of white-collar professionals
    suddenly look vulnerable. Talented young illustrators are wondering if they should
    bother going to art school.
  prefs: []
  type: TYPE_NORMAL
- en: What’s remarkable is how quickly this has all come to pass. In the fifteen years
    that I’ve written about the technology industry, I’ve never seen a field move
    as quickly as artificial intelligence has in just the last two years. The release
    of ChatGPT in November 2022 sparked a race to create a whole new kind of AI that
    didn’t just process information but *generated* it. Back then, AI tools could
    produce wonky images of dogs. Now they are churning out photorealistic pictures
    of Donald Trump, whose pores and skin texture look so lifelike they’re almost
    impossible to distinguish as fake.
  prefs: []
  type: TYPE_NORMAL
- en: Many AI builders say this technology promises a path to utopia. Others say it
    could bring about the collapse of our civilization. In reality, the science fiction
    scenarios have distracted us from the more insidious ways AI is threatening to
    harm society by perpetuating racism, threatening entire creative industries, and
    more.
  prefs: []
  type: TYPE_NORMAL
- en: Behind this invisible force are companies that have grabbed control of AI’s
    development and raced to make it more powerful. Driven by an insatiable hunger
    to grow, they’ve cut corners and misled the public about their products, putting
    themselves on course to become highly questionable stewards of AI.
  prefs: []
  type: TYPE_NORMAL
- en: 'No other organizations in history have amassed so much power or touched so
    many people as today’s tech giants. Google conducts web searches for 90 percent
    of Earth’s internet users, and Microsoft software is used by 70 percent of humans
    with a computer. But neither company is satisfied. Microsoft wants to grab a chunk
    of Google’s $150 billion search business, and Google wants Microsoft’s $110 billion
    cloud business. To fight their war, each company has grabbed the ideas of others—which
    is why, when you boil everything down, our AI future has been written by just
    two men: Sam Altman and Demis Hassabis.'
  prefs: []
  type: TYPE_NORMAL
- en: One is a scrawny but placid entrepreneur in his late thirties who wears sneakers
    to the office. The other is a former chess champion in his late forties who is
    obsessed with games. Both are fiercely intelligent, charming leaders who sketched
    out visions of omnipotent AI so inspiring that people followed them with cult-like
    devotion. Both got here because they were obsessed with winning. Altman was the
    reason the world got ChatGPT. Hassabis was the reason we got it so quickly. Their
    journey has not only defined today’s race but also the challenges coming our way,
    including a daunting struggle to steer AI’s ethical future when it is under the
    control of industry giants.
  prefs: []
  type: TYPE_NORMAL
- en: Hassabis risked scientific ridicule when he established DeepMind, the first
    company in the world intent on building AI that was as smart as a human being.
    He wanted to make scientific discoveries about the origins of life, the nature
    of reality, and cures for disease. “Solve intelligence, and then solve everything
    else,” he said.
  prefs: []
  type: TYPE_NORMAL
- en: A few years later, Altman started OpenAI to try to build the same thing but
    with a greater focus on bringing economic abundance to humanity, increasing material
    wealth, and helping “us all live better lives,” he tells me. “This can be the
    greatest tool humans have yet created, and let each of us do things far outside
    the realm of the possible.”
  prefs: []
  type: TYPE_NORMAL
- en: Their plans were more ambitious than even the craziest Silicon Valley visionaries.
    They planned to build AI that was so powerful it could transform society and make
    the fields of economics and finance obsolete. And Altman and Hassabis alone would
    be the purveyors of its gifts.
  prefs: []
  type: TYPE_NORMAL
- en: In their quest to build what could become humankind’s last invention, both men
    grappled with how such transformative technology should be controlled. At first
    they believed that tech monoliths like Google and Microsoft shouldn’t steer it
    outright, because they prioritized profit over humanity’s well-being. So for years
    and on opposite sides of the Atlantic Ocean, they both fumbled in the dark for
    novel ways to structure their research labs to protect AI and make benevolence
    its priority. They promised to be AI’s careful custodians.
  prefs: []
  type: TYPE_NORMAL
- en: But both also wanted to be first. To build the most powerful software in history,
    they needed money and computing power, and their best source was Silicon Valley.
    Over time, both Altman and Hassabis decided they needed the tech giants after
    all. As their efforts to create superintelligent AI became more successful and
    as strange new ideologies buffeted them from different directions, they compromised
    their noble goals. They handed over control to companies who rushed to sell AI
    tools to the public with virtually no oversight from regulators, and with far-reaching
    consequences. The concentration of power in AI would lead to reduced competition
    and herald new intrusions into private life and new forms of racial and gender
    prejudice. Already today, if you ask a popular AI tool to generate images of women,
    it’ll make them sexy and scantily clad; ask it for photorealistic CEOs, and it’ll
    generate images of white men; ask for a criminal, and it will often generate images
    of Black men. Such tools are being woven into our media feeds, smartphones, and
    justice systems, without due care for how they might shape public opinion.
  prefs: []
  type: TYPE_NORMAL
- en: 'The pair’s journey was not all that different from one two centuries ago, when
    two entrepreneurs named Thomas Edison and George Westinghouse went to war. Each
    had pursued a dream of creating a dominant system for delivering electricity to
    millions of consumers. Both were inventors-turned-entrepreneurs, and both understood
    that their technology would one day power the modern world. The question was this:
    Whose version of the technology would come out on top? In the end, Westinghouse’s
    more efficient electrical standard became the most popular in the world. But he
    didn’t win the so-called War of the Currents. General Electric did.'
  prefs: []
  type: TYPE_NORMAL
- en: As corporate interests pushed Altman and Hassabis to unleash bigger and more
    powerful models, it was the tech titans who came out as the winners, only this
    time the race was to replicate our own intelligence. Now the world has been thrown
    into a tailspin. Generative AI promises to make people more productive and bring
    more useful information to our fingertips through tools like ChatGPT. But every
    innovation has a price to pay. Businesses and governments are adjusting to a new
    reality where the distinction between real and “AI-generated” is a crapshoot.
    Companies are throwing money at AI software to help displace their employees and
    boost profit margins. And a new breed of personal AI devices that can conduct
    an unimaginable new level of personal surveillance is cropping up.
  prefs: []
  type: TYPE_NORMAL
- en: The second half of this book lays out those risks, but first I’ll explain how
    we got here, and how the visions of two innovators who tried to build AI for good
    were eventually ground down by the forces of monopoly. Their story is one of idealism
    but also one of naivety and ego, and of how it can be virtually impossible to
    keep an ethical code in the bubbles of Big Tech and Silicon Valley. Altman and
    Hassabis tied themselves into knots over the stewardship of AI, knowing that the
    world needed to manage the technology responsibly if we were to stop it from causing
    irreversible harm. But they couldn’t forge AI with godlike power without the resources
    of the world’s largest tech firms. With the goal of enhancing human life, they
    would end up empowering those companies, leaving humanity’s welfare and future
    caught in a battle for corporate supremacy. This was how it happened.  <hgroup>
  prefs: []
  type: TYPE_NORMAL
- en: '[ACT 1](contents.xhtml#p_pt1) [THE DREAM](contents.xhtml#p_pt1)'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: </hgroup>  <hgroup>
  prefs: []
  type: TYPE_NORMAL
- en: '[CHAPTER 1](contents.xhtml#c_ch1) [High School Hero](contents.xhtml#c_ch1)'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: </hgroup>
  prefs: []
  type: TYPE_NORMAL
- en: Sam Altman knew he ought to keep his mouth shut. In the conservative stronghold
    of St. Louis, Missouri, people didn’t talk about whether they were gay or straight.
    While the rest of America was coming to grips with gay rights, Altman’s midwestern
    hometown was lagging in the early 2000s and still made it a crime to sleep with
    someone of the same gender. Teenagers like him who had an inkling they were gay
    tended to find safety in silence. Altman was different. He had to speak up, not
    because he wanted people to know everything about him, but because talking about
    it would become a mission.
  prefs: []
  type: TYPE_NORMAL
- en: Altman was that one kid in high school who seemed to magically transcend the
    labels that others tried to slap on him. He was as bright as any geek, charismatic
    as any jock. In his English literature assignments, he’d emulate the challenging
    prose of Faulkner, and in math, he breezed through calculus. Then he’d jump into
    the pool to bark orders to his water polo team, which he captained, or head home
    to coordinate video games with his friends for hours on end. At the dinner table
    with his younger brothers, Max and Jack, he’d geek out about space travel and
    rocket ships, and then when they played a board game, like Samurai, Sam would
    declare himself the leader. In this and many other situations, he liked to take
    charge.
  prefs: []
  type: TYPE_NORMAL
- en: Altman grew up in a middle-class Jewish family, his mother, Connie, a dermatologist
    and his father, Jerry, a lawyer. Jerry helped push for affordable housing in the
    city of St. Louis, as well as the reconstruction of historic buildings, and his
    actions fueled his son’s public-spirited view of the world. Sam vividly remembers
    Jerry bringing him to his office one day and telling him that even if he didn’t
    have the time to help somebody, “you have to figure out how to do it anyway,”
    he says.
  prefs: []
  type: TYPE_NORMAL
- en: Sam also had an enormous amount of self-belief that came from being the eldest
    of four children as well as a brazenness that others respected. He talked openly
    about his sexuality when other kids his age, and kids generally in the late nineties,
    would have kept it secret. He leaned into something that many folks in the Midwest
    believed was bad and made it seem cool, in part because he wanted to help others
    who were like him.
  prefs: []
  type: TYPE_NORMAL
- en: That calling came from the internet. When Altman started logging onto the web
    portal America Online (AOL), he realized there were many more out there like him.
    Here was the wonderful thing about logging onto AOL’s chat rooms. You’d hear the
    dial tone and beeps denoting the “handshake” as your modem negotiated a secure
    connection to the World Wide Web, and the screeching tonal overtures of what sounded
    like a busted CB radio. Then you got connected, your heart beating a little faster
    at all the possibilities before you, all the chat rooms. Here you could talk to
    another interesting person on a computer in another part of the world. The rooms
    had names like “Beach Party” or “The Breakfast Club.” Some of the biggest rooms
    were noisy and teeming with creeps, but if you explored rooms in more specific
    categories like Pet Lovers, X-Files Fans, or Gay & Lesbian, you’d find more coherent
    conversations.
  prefs: []
  type: TYPE_NORMAL
- en: For people like Altman, these rooms became a lifeline. You could hide under
    the anonymity of a screen name and lurk while others talked about LGBTQ-friendly
    places to go. They gave him a sense of belonging in a world where it was easy
    to feel like an outsider. “Finding AOL chat rooms was transformative,” he would
    say later in a *New Yorker* magazine profile. “Secrets are bad when you’re eleven
    or twelve.”
  prefs: []
  type: TYPE_NORMAL
- en: AOL chat rooms were so significant to the LGBTQ community that by 1999, when
    Altman was fourteen, about a third of its rooms were focused on gay topics. When
    he was sixteen, he came out to his parents. His mother was shocked. Her son had
    always seemed “unisexual and tech-y,” she later said in that same magazine profile
    on her son, but he also tended not to fit classifications. For instance, he was
    a vegetarian in a part of America where everybody loved barbecue. He was obsessed
    with computers, but he also wasn’t reclusive or socially awkward. And while everyone
    else was listening to nineties pop, he preferred classical music.
  prefs: []
  type: TYPE_NORMAL
- en: The Altmans transferred their precocious teen to John Burroughs, an elite private
    school on the outskirts of St. Louis that boasted a sprawling, leafy campus and
    sought to grow its students’ talents for “the improvement of human society.”
  prefs: []
  type: TYPE_NORMAL
- en: He stepped up to as many leadership roles as he could manage. As well as captaining
    the water polo team, he edited the yearbook and spoke at school assemblies. He
    socialized with the faculty while occasionally stretching the rules so he could
    make a stir. At the annual fall pep rally, Altman and his water polo team ripped
    off their clothes on stage so they were left standing in their Speedos, grinning
    to whoops and cheers.
  prefs: []
  type: TYPE_NORMAL
- en: He got in trouble for that with the school’s athletic director, but rather than
    let it go and complain about the admonishment to his friends, or even to another
    teacher, he fought back and went straight to the top. He knocked on the door of
    school principal Andy Abbott, a former English teacher with a gentle demeanor.
    The older educator was charmed by the gangly, dark-haired teen with eyes like
    saucers, who frequently dropped into his office to pitch ideas or complain about
    an injustice that he planned to write about in the student paper.
  prefs: []
  type: TYPE_NORMAL
- en: The young man was utterly unintimidated by authority, he noticed. If Principal
    Abbott ever made an unpopular decision that affected the other students, the kid
    would take it upon himself to be their savior. “He would object,” Principal Abbot
    remembers, “and thoughtfully.” To this day, the soft-spoken educator sees Altman
    as “the most brilliant kid I knew.”
  prefs: []
  type: TYPE_NORMAL
- en: That same earnestness, along with an ability to come across as candid and vulnerable,
    would later help the young man curry favor with other powerful figures in the
    worlds of technology and government, from investors to the press, to some of the
    world’s most powerful CEOs, his solemn stare imploring them to support an epic
    mission. Altman would learn over time that people in power could smooth the road
    for your ambitions, just as Principal Abbott would do for him in high school.
  prefs: []
  type: TYPE_NORMAL
- en: His big school project was to build a real-life version of the network he’d
    found on AOL. He pushed through the school’s red tape and got his principal’s
    blessing to create the school’s first LGBTQ support group. It was like an underground
    network that students could visit for counseling or to meet others like themselves.
    Within a year, about a dozen students had joined.
  prefs: []
  type: TYPE_NORMAL
- en: But Altman wasn’t satisfied. He started approaching his teachers, asking them
    to put stickers on their doors that said their classrooms were a safe space for
    gay students, trying to turn his teachers into allies. He eventually started a
    Gay-Straight Alliance group, aimed at raising public awareness of gay rights.
  prefs: []
  type: TYPE_NORMAL
- en: He then decided to make a splash at the morning assembly. His new group went
    into the main hall early and placed a series of printed numbers on all the chairs
    before the audience took their seats. As Altman went up to the mic, he asked everyone
    with a certain one of the numbers to stand up. “Look around you,” he told the
    audience, as about sixty kids stood up. “That’s one in ten of you. That’s how
    many people in the school identify as gay.”
  prefs: []
  type: TYPE_NORMAL
- en: It was a bold demonstration, but something was odd. Several students were missing
    from the audience, and they all happened to be part of the school’s Christian
    club. Altman found out later that they had boycotted his presentation by staying
    at home or in their classrooms. Indignant that these kids had pushed back against
    his objective, he once again marched into the office of Principal Abbott, demanding
    that the Christian kids be counted as absent.
  prefs: []
  type: TYPE_NORMAL
- en: “There was nothing damaging about making them more aware,” the teenager argued.
    He wasn’t a table thumper, but it was clear by his words and his stern expression
    that he was angry.
  prefs: []
  type: TYPE_NORMAL
- en: “I tried to justify it for a while,” Principal Abbott remembers. “But I think
    he was probably right about that.”
  prefs: []
  type: TYPE_NORMAL
- en: Altman left school with a hard lesson. If you had ambitious ideas, there would
    always be some haters. The solution was to align yourself with those who had power
    and authority and to surround yourself with a support network.
  prefs: []
  type: TYPE_NORMAL
- en: Soon enough, Altman got accepted into the prestigious Stanford University in
    the heart of California’s Silicon Valley, a fount of brilliant software engineers
    and technology entrepreneurs who populated the sun-drenched region with technology
    start-ups. Despite his interest in programming and his admittance to a computer
    science degree, the lanky eighteen-year-old couldn’t stand to focus on one subject
    alone. He was fascinated by everything. He took an array of humanities classes
    and creative writing classes.
  prefs: []
  type: TYPE_NORMAL
- en: Then outside of school hours, he’d drive twenty minutes south for lessons that
    would become critical to his future life as a globally renowned entrepreneur.
    He’d play hours of poker at a popular casino in San Jose, honing his skills of
    psychological maneuvering and influence. Poker is all about watching others and
    sometimes misdirecting them about the strength of your hand, and Altman became
    so good at bluffing and reading his opponents’ subtle cues that he used his winnings
    to fund most of his living expenses as a college student. “I would have done it
    for free,” he would later tell one podcast. “I loved it so much. I strongly recommend
    it as a way to learn about the world and business and psychology.”
  prefs: []
  type: TYPE_NORMAL
- en: The field that Altman would one day focus on to transform the world came up
    as part of his regular degree. He became a researcher at Stanford’s AI lab, a
    pocket of the university’s vast campus that was filled with cables and the odd
    robot arm. The AI lab had just been reopened and its leader was Sebastian Thrun,
    a computer scientist with radical views, a soft German lilt, and piercing blue
    eyes. Thrun was part of a new breed of academics who weren’t content to spend
    their days writing grant proposals and waiting for tenure but who worked with
    tech giants. Stanford was just five miles from Google’s headquarters, and Thrun
    also ran the cutting-edge “moonshot” projects at Google X that made self-driving
    cars and augmented reality glasses.
  prefs: []
  type: TYPE_NORMAL
- en: 'In class, Thrun taught his students about machine learning, a technique that
    computers used to infer concepts from being shown lots of data instead of being
    programmed to do something specific. The concept was critical in the field of
    AI, even though the term *learning* was misleading: machines can’t think and learn
    as humans do. Thrun noticed that the serious kid from St. Louis was interested
    in the possibility of unintended consequences in AI. What would happen if a machine
    learned to do the wrong thing?'
  prefs: []
  type: TYPE_NORMAL
- en: Thrun explained that AI systems could act in unpredictable ways to achieve their
    “fitness function,” or goal. If an AI was designed with a fitness function to
    survive and reproduce, it might inadvertently wipe out all biological life on
    Earth, Thrun said. This didn’t mean the AI was bad. It was just unaware of the
    gravity of what it was doing. Its motives weren’t all that different from ours
    when we washed our hands. We didn’t hate the bacteria on our skin and want to
    destroy it. We just wanted clean hands.
  prefs: []
  type: TYPE_NORMAL
- en: Altman mused on this idea for some time. As a science fiction fan, he wondered
    if this was why humans had never had contact with alien life. Perhaps beings on
    other planets had tried creating AI, too, and then been wiped out by their own
    creation. If that was avoidable, someone would have built safer AI before others
    created the dangerous kind.
  prefs: []
  type: TYPE_NORMAL
- en: This seed of an idea would lay dormant in the back of Altman’s mind for a little
    over a decade before blossoming into the creation of OpenAI. But for now it was
    far too big to tackle. Academics like Thrun built AI systems. Stanford students
    like Altman built start-ups that became companies like Google, Cisco, and Yahoo.
    The young geek wanted to do the same. He just needed a business idea. Then it
    came to him when he was walking out of class. “Wouldn’t it be great if I could
    open my mobile phone and see a map of where all my friends are?” he asked his
    Stanford classmate and friend Nick Sivo.
  prefs: []
  type: TYPE_NORMAL
- en: What if he created a digital map for his mobile phone on which he could find
    his friends and make that the main product of a company? Starting a company wasn’t
    easy. You needed to raise money from venture capitalists, and while there were
    dozens of those within three miles of Stanford, Altman was young and inexperienced.
    His answer came from the other side of the United States, in Cambridge, Massachusetts,
    where an older tech mogul was starting what he called a boot camp for young entrepreneurs.
    Altman and Sivo decided to join the three-month program, called Y Combinator,
    and create a start-up. Y Combinator would go on to become the most successful
    start-up accelerator of all time, seeding $400 billion worth of tech companies
    with names like Airbnb, Stripe, and Dropbox.
  prefs: []
  type: TYPE_NORMAL
- en: Altman, who was now nineteen, didn’t know any of this at the time. Most investors
    in Silicon Valley dismissed Y Combinator as a silly summer camp for hackers. Its
    creator was Paul Graham, a forty-one-year-old cargo shorts–wearing computer scientist
    who’d become a millionaire after selling his e-commerce company to Yahoo. Having
    achieved his wealth, Graham had fashioned himself as a thought leader, publishing
    essays on his website about topics beyond the purview of software geeks, from
    economics to having kids, from free speech to being a nerd in high school.
  prefs: []
  type: TYPE_NORMAL
- en: But his most popular essays, the ones that made kids like Altman sit up in the
    kind of rapt attention given to spiritual leaders, were about building start-ups.
    Over and over, those essays emphasized that the quality of a start-up founder
    mattered more than anything else. You didn’t need a brilliant idea to start a
    successful tech company. You just needed a brilliant person behind the wheel.
  prefs: []
  type: TYPE_NORMAL
- en: “Google’s plan, for example, was simply to create a search site that didn’t
    suck,” Graham wrote. And look where that had led. Lightbulb moments were passé.
    It was the founders who mattered, and the best were hackers—programmers who were
    willing to break conventional wisdom to build new things. As a hacker, “you could
    be 36 times more productive than you’re expected to be in a random corporate job,”
    he wrote.
  prefs: []
  type: TYPE_NORMAL
- en: 'Starting a tech company in Silicon Valley was even patriotic because it emulated
    the rugged individualism of America’s founding fathers: “Hackers are unruly,”
    he wrote. “That is the essence of hacking. And it is also the essence of Americanness.
    It is no accident that Silicon Valley is in America, and not France, Germany,
    England, or Japan. In those countries, people color inside the lines.”'
  prefs: []
  type: TYPE_NORMAL
- en: The path was almost simple, Graham taught. Bootstrap your company, start with
    a minimum viable product, and optimize it over time. Work in a tight bubble, because
    it was better to have ten people love what you made than thousands liking it.
    And don’t be afraid to bend the rules along the way. In fact, why not rewrite
    society itself?
  prefs: []
  type: TYPE_NORMAL
- en: Graham’s ideas would eventually strike a huge chord in Silicon Valley and fuel
    a prevailing new wisdom that the vision of a start-up’s creators was so sacrosanct
    that they should be allowed to act with impunity, like gods. It’s why the founders
    of Google and Facebook could fashion themselves as modern-day autocrats of business,
    often grabbing a majority of a company’s voting shares and sometimes taking their
    companies in strange directions. (A case in point was the lack of pushback from
    Facebook’s board or shareholders to Mark Zuckerberg’s strange and expensive decision
    to become a virtual reality company.) Thanks to something called a dual-class
    share structure, many tech start-up founders, including those behind Airbnb and
    Snapchat, could hold these unusual levels of control of their companies. Graham
    and others believed founders had this authority for good reason. When the smartest
    and most talented people had a long-term vision, they needed the freedom to carry
    it out.
  prefs: []
  type: TYPE_NORMAL
- en: 'Graham saw those same hacker instincts in Altman: deeply curious, fiercely
    intelligent, and a big thinker. And there was something else. This teenager with
    unruly dark hair was comfortable around older people to the point that he’d have
    no trouble managing people like Graham, who was twenty years his senior. When
    Graham suggested Altman wait a year to join his Y Combinator program since he
    was only nineteen, the kid replied that he was coming anyway. Graham liked him
    immediately.'
  prefs: []
  type: TYPE_NORMAL
- en: Most of the other entrants to the program were engineers and hackers, including
    the founders of the popular online forum Reddit. Graham and his wife, Jessica
    Livingston, gave $6,000 to each start-up in their new program, a number based
    on the stipend that MIT gave grad students during the summer. While most venture
    capitalists threw millions of dollars at start-ups, Graham told founders to do
    more with less, and aim for “ramen profitability,” discouraging them from hiring
    lawyers, bankers, and PR people so they could do that work more cheaply themselves.
  prefs: []
  type: TYPE_NORMAL
- en: Graham himself did everything on a shoestring. He cooked dinner every Tuesday
    night, his specialty being chicken fricassee, and brought in his friends as speakers
    to talk about start-ups, while Livingston took care of the legal paperwork for
    each new company.
  prefs: []
  type: TYPE_NORMAL
- en: Altman and his friend Sivo named their new company Loopt, and he moved to Cambridge,
    Massachusetts, to work out of Y Combinator’s first office near Graham’s house.
    Altman and Graham formed a close relationship similar to the one he’d had with
    his high school principal. Among the hopeful young entrepreneurs, Graham was like
    a spiritual leader whom they just called PG. Altman took Graham’s teachings seriously
    and saw Loopt not as a company that could make him rich but as an idea that could
    make the world a better place. He tinkered nonstop on the prototype, living off
    instant ramen noodles and Starbucks coffee ice cream. He worked so hard and ate
    so badly that he developed scurvy, a disease caused by a lack of vitamin C.
  prefs: []
  type: TYPE_NORMAL
- en: Though he was a decent enough programmer, the boyish-faced Altman was an even
    better businessman. He had no qualms about calling up executives from Sprint,
    Verizon, and Boost Mobile and pitching a grand vision about changing the way people
    socialized and used their phones. Speaking in low tones and using elegant turns
    of phrase that he’d honed from his creative writing classes, he explained that
    Loopt would one day be essential to anyone who had a mobile. App stores didn’t
    exist yet, so he had to rely on mobile operators to preinstall Loopt on some of
    the earliest smartphones. That’s why getting the telecom executives on board was
    so key, and Altman was a master at marketing his new company. Sprint, Verizon,
    Boost, and even BlackBerry agreed to put his service on their phones.
  prefs: []
  type: TYPE_NORMAL
- en: 'At the end of Y Combinator’s three-month program, Altman raised some money
    so he could grow his start-up. He presented the Loopt vision to a group of fifteen
    investors, most of whom were Graham’s wealthy friends, for about fifteen minutes
    and then reached out to people with even deeper pockets: venture capital firms
    in Silicon Valley. He got several offers and took $5 million from two premier
    venture capital firms who’d backed Google, Yahoo, and PayPal.'
  prefs: []
  type: TYPE_NORMAL
- en: With all that funding, Altman dropped out of Stanford University to work on
    Loopt full-time. He moved with a handful of engineers he’d hired to Palo Alto,
    California, settling into Sequoia’s coworking space. They were churning out code
    late into the night alongside the creators of YouTube before Altman moved his
    team to their first office in Mountain View, prime real estate that was a few
    blocks away from the headquarters of Google. It was as close to the heart of Silicon
    Valley as you could get.
  prefs: []
  type: TYPE_NORMAL
- en: Silicon Valley was the land of crazy thinkers. You didn’t start a business here.
    You started an empire. Or you sought to build something on the frontier of technology
    and science. If you wanted to conduct scientific research on a disease like Alzheimer’s,
    you could go to a university on the East Coast or in Europe. But if you wanted
    to reverse aging, you went to Silicon Valley.
  prefs: []
  type: TYPE_NORMAL
- en: The region’s network was its big selling point. On any given day you could bump
    into someone at an event who could juice your business. Go to breakfast at Buck’s
    in Woodside, California, and you might catch the cofounder of Yahoo having a fruit
    and yogurt combo while sitting at the same table where Elon Musk had his first
    funding meeting for PayPal. Grab a drink at the Musto Bar at the Battery Club
    in San Francisco and you could spot one of the cofounders of Facebook.
  prefs: []
  type: TYPE_NORMAL
- en: Altman quickly integrated himself into Silicon Valley’s web of programmers,
    investors, and executives. If you knew how to plug yourself into this modern old-boys
    network, you were more likely to get swept up in the success that propelled its
    members to billionaires. Altman was so good at networking that he managed to make
    the right connections to present Loopt at Apple’s prestigious annual conference
    for developers in 2008\. Dressed in jeans and two green and pink polo shirts that
    gave him the look of a children’s TV presenter, the slender young entrepreneur
    told his audience that Loopt was the largest social mapping service in the world.
    “We make serendipity happen,” he said, staring at the crowd and barely cracking
    a smile.
  prefs: []
  type: TYPE_NORMAL
- en: On the surface, everything looked perfect. But underneath, Loopt was struggling.
    People just weren’t all that excited about using Altman’s digital map to find
    their friends. The wide-eyed entrepreneur had believed that young mobile users
    wanted to meet their friends just as much as he did. But the premise of helping
    you meet your buddies at a bar or connecting to total strangers when you needed
    an extra player at basketball was a lot of effort when you could just interact
    with them through a screen. As the aughts wore on, more people were engaging with
    their friends on social networks like Facebook. Facebook was growing considerably
    faster than Loopt was. It had racked up hundreds of millions of active users,
    while Loopt had barely managed to get five million people just to register.
  prefs: []
  type: TYPE_NORMAL
- en: It also didn’t help that Loopt was becoming controversial. A year after he founded
    the company, Altman got a call from his old high school principal, Andy Abbott.
    Parents were forcing their kids to use Loopt so they could track their whereabouts,
    Abbott said, and at one point a parent had called the school during a field trip
    to say their child’s bus was speeding. “Look what you’ve wrought,” Altman’s old
    mentor said on the phone, half joking.
  prefs: []
  type: TYPE_NORMAL
- en: Altman had heard worse. “We’re getting concerns from women’s groups,” the young
    entrepreneur admitted. Some men were making their wives install Loopt so they
    could follow their whereabouts at all times. It was a creepy and potentially dangerous
    way to misuse Altman’s creation. “But we’re working on a solution,” he quickly
    added. Loopt’s users could fake their location. A vulnerable woman who was at
    the grocery store could make it look like she was at home instead.
  prefs: []
  type: TYPE_NORMAL
- en: While many entrepreneurs would have been in denial about their app’s misuse,
    Altman seemed intent on openly confronting the problem. He’d learned as a teenager
    that keeping things secret just made them worse. It was better to bring them out
    in the open. He got a call from Jessica Lessin, then a dogged tech reporter with
    the *Wall Street Journal*, asking about Loopt’s privacy issues and some of the
    concerns of misuse. To Lessin’s surprise, Altman was eager to talk about the controversy,
    so much so that he emailed her a long document detailing all the risks that came
    with using his app, according to an account she later published.
  prefs: []
  type: TYPE_NORMAL
- en: What looked like career suicide was a shrewd PR move that he would turn to again
    and again in the future as a kind of calculated reverse psychology. By becoming
    overly concerned with the worst-case scenario of his creation, Altman could disarm
    his critics or journalists like Lessin. There was nothing left to throw at him
    because, well, he’d done it to himself. He seemed almost too honorable for his
    own good—even though the honorable thing to do with an app that people used to
    stalk the vulnerable might have been to shut it down.
  prefs: []
  type: TYPE_NORMAL
- en: In the end, consumers did that for him. Altman had miscalculated how uncomfortable
    they felt about pinging their GPS coordinates to meet up with others. “I learned
    you can’t make humans do something they don’t want to do,” he would go on to say.
  prefs: []
  type: TYPE_NORMAL
- en: The wiry young entrepreneur had spent most of his twenties frantically trying
    to grow Loopt to no end. He’d used the iPhone’s new push notifications to ping
    people’s home screens to get them using Loopt’s chat feature. He helped advertisers
    send “flash deals” to Loopt’s users. He talked up each upgrade like it was a slam-dunk
    success. “The response has been tremendous,” he said in one 2010 interview. But
    it was mostly hot air. By 2012, only a few thousand people around the world were
    using Loopt regularly. So much for building an empire. Like the vast majority
    of technology start-ups, Loopt had failed.
  prefs: []
  type: TYPE_NORMAL
- en: In the world of tech start-ups, a founder’s ultimate goal is to either have
    their idea become a multibillion-dollar company or make a multibillion-dollar
    exit by selling their firm to a bigger fish. It was becoming harder to stay independent,
    and most were getting swallowed up by a tech giant like Google or Facebook. If
    a founder could do that, they’d often use the spoils to start a new firm and kick-start
    the cycle all over again as a serial entrepreneur. But Loopt’s exit wasn’t exactly
    spectacular. In 2012, Altman sold it to a gift-card company for about $43 million,
    barely covering what was owed to investors and his employees.
  prefs: []
  type: TYPE_NORMAL
- en: He could have ditched Silicon Valley then and there, but Loopt’s collapse emboldened
    him with a greater conviction that he should do something more meaningful. He
    wasn’t the first tech maverick to find bigger ambitions in the ashes of failure.
    About a decade earlier, Elon Musk had been ousted from PayPal by his board. Smarting
    from the experience, Musk decided he was tired of working on something as superficial
    as a consumer payments service. “The next company I do [should] have some long-term
    beneficial effect,” he told an interviewer. A few years later he did just that.
    Musk met the founders of Tesla and worked on saving humanity from the existential
    threat of climate change.
  prefs: []
  type: TYPE_NORMAL
- en: If you throw a smartphone at a group of people sitting inside the exclusive
    Battery Club in San Francisco, it’ll hit at least three trying to save the world.
    Many a Silicon Valley entrepreneur has believed their app was elevating humanity,
    and while some have indeed created useful products used by millions of people,
    many others have also developed a full-blown messiah complex as a result. The
    region’s emphasis on innovation made this savior culture pervasive, fueled by
    Graham’s founder-knows-best principles. If you were among that top breed of innovative
    hackers, you could solve not only engineering problems but also societal conundrums
    that had beset humanity for years.
  prefs: []
  type: TYPE_NORMAL
- en: Altman wanted Loopt to bring people together because that’s what they needed.
    We were all becoming glued to our screens, mindlessly scrolling and sprinkling
    “likes” across different social networks to create an increasingly quantified
    sense of human connection. He needed to try something more meaningful. Maybe Altman
    had to give people what they didn’t know they wanted. That was what Apple had
    been doing successfully for years, and in Silicon Valley, that was the secret
    everybody was trying to crack.
  prefs: []
  type: TYPE_NORMAL
- en: 'The young St. Louis native needed to delve back into the world of building
    start-ups and plug himself so deeply into those Silicon Valley networks that he
    would become synonymous with the companies who proclaimed they were changing the
    world. He would transform himself into an even more profound version of his old
    mentors, and then dig back into what he’d been stewing on at the Stanford AI lab.
    That would lead him to chase an even grander objective: saving humanity from a
    looming existential threat and then bringing them an abundance of wealth unlike
    anything they had seen.  <hgroup>'
  prefs: []
  type: TYPE_NORMAL
- en: '[CHAPTER 2](contents.xhtml#c_ch2) [Winning, Winning, Winning](contents.xhtml#c_ch2)'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: </hgroup>
  prefs: []
  type: TYPE_NORMAL
- en: The sounds of screams, the roar of a roller coaster, and a clanking fairground
    organ marked the start of the 1994 computer game *Theme Park*. A large square
    of pixelated grass, empty, was waiting to be filled with food stalls in the shape
    of giant hamburgers and roller-coaster tracks that shot up to nosebleed heights.
    The goal was to make as much profit as possible.
  prefs: []
  type: TYPE_NORMAL
- en: '*Theme Park* wasn’t made by middle-aged game designers eager to teach business
    principles to kids, but by a dark-haired teenager from North London named Demis
    Hassabis (pronounced hah-SAH-bis). He had the work ethic of a Silicon Valley entrepreneur
    and was obsessed with playing games. Years before Hassabis would become the front-runner
    in a race to build the world’s smartest AI systems, he was learning how to run
    a business via simulation, something that would become a running theme in his
    life’s work and in his quest to build machines more intelligent than humans.'
  prefs: []
  type: TYPE_NORMAL
- en: In *Theme Park* you started with a cash balance of about $200,000 to pay for
    the construction of rides and staff wages. You earned that back from the sale
    of things like tickets, merchandise, ice cream, and coconut shy games. If you
    didn’t hire enough mechanics, the rides would break down; not enough security
    guards, thugs would overrun the park. Skimp on sugar and visitors would balk at
    the ice cream. Staff would go on strike, and wages got negotiated. Though he was
    just seventeen, Hassabis designed this tricky balancing act of cost and reward
    as a highly complex imitation of business management, and he made the game so
    addictive that it sold fifteen million copies after its release in 1994.
  prefs: []
  type: TYPE_NORMAL
- en: Video games had hit the UK and the United States like a tidal wave, pulling
    kids into vivid dopamine worlds where Teenage Mutant Ninja Turtles fought their
    way through side-scrolling levels or where you could steer a pickup truck around
    wild dirt tracks. But Hassabis thought the best video games were simulations that
    acted as microcosms of real life. God games let you wield the power of creation
    and destruction. Instead of controlling a single character like Mario, you shaped
    the lives of thousands of virtual characters, fashioning landscapes or directing
    the progress of a civilization. You could build a city and then hit it with a
    natural disaster, or you could fill a theme park with hundreds of visitors.
  prefs: []
  type: TYPE_NORMAL
- en: You could have fun with this technology, but you could also learn things, from
    how to run a business to the mysteries of the universe. For all the entertainment
    value of games, Hassabis would eventually become gripped by a powerful desire
    to use them to create an artificial superintelligence that would help him unlock
    the secrets of human consciousness.
  prefs: []
  type: TYPE_NORMAL
- en: That calling to understand the mysteries of the universe went beyond the aims
    of most other scientists, which could seem incongruous until you think about how
    Hassabis grew up an enigma himself, the lone mathematical genius in a family of
    bohemian creatives. His mother, Angela, was a devout Baptist who immigrated to
    the UK from Singapore, then met her future husband in the host family she was
    staying with in North London, a free-spirited Greek Cypriot named Costas Hassabis.
    The two seemed as mismatched as socks and sandals, but they married and had three
    children, starting with Demis. Costas bounced around between different jobs, like
    teaching and running a toy shop, and moved his family ten times before Hassabis
    was twelve years old.
  prefs: []
  type: TYPE_NORMAL
- en: By then, it was clear that Demis was different from other kids. He’d been beating
    his father and uncle at chess at the age of four, and by six, he was thrashing
    most kids his age at local chess championships, tottering on a cushion or telephone
    book to help him peer over the board. He was a fluent reader and curious about
    everything, but Hassabis channeled most of his brainpower into games. When his
    dad brought home board games with missing pieces, he’d use them to design new
    ones and play them with his younger brother and sister.
  prefs: []
  type: TYPE_NORMAL
- en: But the real fun was yet to come. A decade before Sam Altman found AOL chat
    rooms in the 1990s, Hassabis was diving headfirst into an even more rudimentary
    kind of technology, made up of chunky pixels on plain black screens. In 1984,
    when he was eight, Hassabis used some money he’d won at a chess competition to
    buy a ZX Spectrum 48\. One of the earliest personal computers, it consisted of
    a thick black keyboard that you hooked up to your TV that used cassette tapes
    to play colorful graphics on the screen.
  prefs: []
  type: TYPE_NORMAL
- en: Hassabis bought programming books and taught himself to create games for the
    Spectrum. Before going to bed, he’d set up a calculation to run overnight and
    then go to sleep. The next morning, the calculations were done. For Hassabis,
    this was a revelation. He’d offloaded his cognitive labor to the Spectrum. The
    computer was acting like an extension of his mind.
  prefs: []
  type: TYPE_NORMAL
- en: He got hooked on the niche world of programming and upgraded to a more powerful
    Commodore Amiga 500, a chunky white collection of gadgets that included a mouse
    and its monitor, and started a hacking club with his school friends. They’d write
    code to conjure colorful snippets on the screen that copied a scene from a game
    they’d played, and Hassabis was often driven to outdo his friends by making things
    more intricate. He’d take his computer apart. Then put it back together. He created
    a digital chess game and got his younger brother, George, to play it.
  prefs: []
  type: TYPE_NORMAL
- en: Chess was still the focus of his life, and Hassabis wanted to become a world
    champion. His mother supported his aspirations and started homeschooling him so
    he could spend more time studying the game. During school vacations, he was traveling
    to different chess tournaments to compete, and the work was relentless. Hassabis
    would later say that games were like a gym for the mind and chess was the ultimate
    workout. Just as poker taught Sam Altman about psychology and business, chess
    taught Hassabis how to strategize by starting with the end in mind. You visualized
    a goal and worked backward.
  prefs: []
  type: TYPE_NORMAL
- en: But everything changed one day when Hassabis was eleven and competing in a chess
    championship in Liechtenstein. He was playing against Denmark’s national chess
    champion, and the match had become a marathon. After ten hours of play, their
    brains fighting exhaustion, the Dane tried to force a draw. The young Hassabis
    still had his king and queen, but his opponent had the advantage with his king,
    rook, bishop, and knight. Hassabis was tired and assumed he was about to be checkmated.
    He resigned.
  prefs: []
  type: TYPE_NORMAL
- en: The Danish champion was shocked. “Why did you resign?” he asked.
  prefs: []
  type: TYPE_NORMAL
- en: He showed Hassabis that he could have done a drawing move instead. Hassabis
    stared at the board. Sometimes failure sparks bigger ambitions. If you couldn’t
    stand to lose, chasing a bigger prize could be a consolation, and Hassabis had
    just bombed after an enormous effort. As he looked around the room at the other
    chess geniuses hunched over their boards, neurons churning, it dawned on him that
    this whole tournament was a waste of brainpower. These were some of the world’s
    top strategic thinkers. What if they worked on solving bigger problems? He was
    now the second-best chess player in the world under the age of fourteen, but this
    was still just a game.
  prefs: []
  type: TYPE_NORMAL
- en: Hassabis told his parents he wanted to stop going to chess tournaments and enrolled
    back into school. He was a quiet, sentimental kid, who listened to Enya and taught
    himself to play her song “Watermark” on the piano. His favorite movie was *Blade
    Runner*, a science fiction flick about a detective who hunts down rogue AI replicants
    that are nearly indistinguishable from human beings, and he found himself wrapped
    up in the film’s most emotive moments. He’d play the stirring Vangelis soundtrack
    from its final scene over and over, when the villain laments that his memories
    will be “lost in time, like tears in rain.”
  prefs: []
  type: TYPE_NORMAL
- en: On Sundays, his mother regularly took Hassabis and his siblings to North London’s
    Hendon Baptist Church, a grand, gray-stoned structure that looked over the suburbs
    from atop a hill. It was a small pocket of internationalism, its worshippers coming
    from places like the Philippines, Ghana, France, and India. For a half-Cypriot,
    half-Singaporean kid like Hassabis, this was a place to blend in. Sundays were
    a livelier alternative to the buttoned-up services of the dominant Church of England.
    People would raise their hands in praise and sing to the beat of the pounding
    drum kit and band. The pastor glossed over dogma to emphasize treating others
    with respect. Prayers were emotional, and the church itself was unashamedly evangelical.
  prefs: []
  type: TYPE_NORMAL
- en: Baptists were minnows in the UK, despite being one of the biggest Christian
    denominations in America. They had about 150,000 members compared to the one million
    affiliated with the Church of England. But religion and the concept of God fascinated
    Hassabis, and he wondered if God could be found through scientific means. When
    he was sixteen, having just finished high school two years early, he read a book
    by Nobel Prize–winning physicist Steven Weinberg called *Dreams of a Final Theory*.
    It was about a grand, almost quixotic quest for a unifying theory of nature. Weinberg
    believed there might be a way to explain all the fundamental forces of the universe
    in a single set of equations, similar to how Einstein’s equation E = mc² summed
    up the relationship between energy and mass. Ideally, this “theory of everything”
    would be succinct enough to be written on a single page or even as a single equation.
  prefs: []
  type: TYPE_NORMAL
- en: Hassabis was enthralled, and then shocked, to learn that scientists hadn’t been
    making much progress on finding this framework. They needed help, he thought.
    They needed intellectual horsepower. Maybe he could help? Hassabis looked over
    at the chunky Commodore Amiga that had worked out calculations through the night
    while he slept. Maybe a smarter computer could help. If he could make computers
    more intelligent, a more capable extension of his mind, perhaps they could help
    scientists crack those hard questions about the universe, even discover a divine
    origin.
  prefs: []
  type: TYPE_NORMAL
- en: “It seemed like the perfect, mega solution,” Hassabis later explained in an
    interview with *New York Times* writer Ezra Klein. He had thought of studying
    physics at university, but after reading Weinberg’s book, believed he should go
    for something bigger. If he studied computer science and the burgeoning field
    of artificial intelligence, he could build the ultimate scientific tool and make
    discoveries that improved the human condition. Hassabis couldn’t shake his fixation
    with games, and so he formed a long-term plan to marry both efforts. The key was
    to focus on games that simulated the real world. Games in the late 1980s were
    already able to simulate the rudimentary features of an entire civilization. If
    a computer could replicate the full Technicolor details of a world, perhaps a
    highly intelligent computer could figure out how to fix the real world’s glitches,
    too—figure out what to do in the simulation and apply it to real life.
  prefs: []
  type: TYPE_NORMAL
- en: Hassabis drew inspiration from god games, and his favorite was *Populous*. “What
    fascinated me about them was that they were living worlds, and the game evolved
    with how you played it,” he says. “You could simulate a part of the world as a
    sandbox and you could play around it.”
  prefs: []
  type: TYPE_NORMAL
- en: The game’s retro pixelated graphics belied its complexity. As a player, you
    were the deity of a plain green valley dotted with houses and had divine powers
    to lead their inhabitants—your followers—into battle against those of other deities.
    You could raise and lower the land elevation, making it flatter so your followers
    could build houses and breed more. You could cause earthquakes. *Populous* pioneered
    the god-game genre, and Hassabis loved the game so much that he became determined
    to work at the company that designed it, Bullfrog Productions. He entered a competition
    to win a job at the company and lost. So he picked up the phone and called the
    firm instead, asking for a week’s work experience. They agreed and liked him enough
    to bring him back for a summer job when he was fifteen.
  prefs: []
  type: TYPE_NORMAL
- en: Soon after, when Hassabis secured a place at Cambridge to begin a computer science
    degree at the age of sixteen, the university told him he was too young and should
    wait at least a year. So he spent that time at Bullfrog again, getting paid in
    cash and staying at the local YMCA hostel near its office in Guildford, Surrey.
    Hassabis started as a video game tester and quickly got the job of level designer
    directly under Bullfrog’s founder, Peter Molyneux.
  prefs: []
  type: TYPE_NORMAL
- en: With his cue-ball head and black polo shirts, Molyneux looked more like a pub
    landlord than a gaming legend. Over the years, he’d also become a divisive figure
    in the industry thanks to a widely reported habit of overpromising on projects.
    He’d make ambitious claims about game mechanics or features, saying, for instance,
    that players could plant an acorn in the virtual world of his game *Fable*, and
    then come back a few days later to find it had grown into a tree. That last part
    wasn’t true.
  prefs: []
  type: TYPE_NORMAL
- en: But Molyneux also had big ideas that were driving the industry forward, and
    for the moment, he was basking in the glow of *Populous*. To the older entrepreneur,
    Hassabis came across as unusually curious, even precocious. The teen prodigy peppered
    his new boss with questions about the technical limits of Bullfrog’s games and
    asked why they were calling certain features “artificial intelligence” when it
    seemed like they were basic software systems, Molyneux remembers.
  prefs: []
  type: TYPE_NORMAL
- en: “No task, however ridiculously big, seemed like a barrier to him,” he says.
    When the Bullfrog founder wanted to build a simulation game about a theme park
    and all his other staff declined interest, preferring games with swords and fighting,
    Hassabis volunteered to build what would become the vivid world of roller coasters
    and food stalls in *Theme Park*. Molyneux became a mentor to Hassabis as the two
    designed the new game together, with a couple of digital artists supporting them.
    In between writing code and designing the gameplay, they often talked about the
    possibilities of artificial intelligence. Hassabis told his boss that he believed
    AI was probably a decade away from surpassing humans and reaching sentience.
  prefs: []
  type: TYPE_NORMAL
- en: “The future of AI felt like you could almost touch it,” the senior game designer
    remembers. “The other question we often philosophized about was, ‘Why should humans
    be the only ones that create things?’ Why can’t we have the burden of creativity
    handled by a piece of AI?” They imagined AI eventually writing music and poetry
    and even designing games.
  prefs: []
  type: TYPE_NORMAL
- en: For now, though, they were using systems that barely fit the description of
    AI to give *Theme Park* a touch of realism. Machine-learning techniques allowed
    them to give background characters their own personalities, with some of the park
    visitors more impulsive and prone to spending money and others tighter with their
    finances. The game was a hit. While *Populous* sold five million copies, *Theme
    Park* went on to sell three times more.
  prefs: []
  type: TYPE_NORMAL
- en: That made Hassabis something of a celebrity when he finally arrived at Cambridge.
    He borrowed Molyneux’s Porsche 911 and drove it around campus, eager to impress
    some of the students there. After filling all his previous school holidays with
    chess tournaments, he treated his first year at university almost like a vacation,
    going out at night with his classmates and then lying in bed the next morning
    listening to The Prodigy while the sun streamed in through the windows. When he
    wasn’t drinking red wine at the college bar, sending his cheeks bright red, he
    was playing speed chess or drag racing the borrowed Porsche. Eventually he crashed
    it and had to call his mentor to apologize. “It was the second time he crashed
    it,” Molyneux remembers, cringing. But it was hard to be angry at the often-smiling
    whiz kid. “He’s so charming.”
  prefs: []
  type: TYPE_NORMAL
- en: Hassabis met members of his future inner circle at Cambridge, including Ben
    Coppin, another computer science student who would go on to lead product development
    at DeepMind, and with whom he talked about religion and how AI could solve global
    problems. But DeepMind was still more than a decade away. First, he had to graduate,
    and then go straight back to working for Molyneux. It was then that he stumbled
    upon the weirdest computer gaming job application he had ever seen. In the mail
    one day arrived a bottle containing a letter that its sender had smudged with
    tea stains. They had burned the edges and written a long missive in calligraphy,
    saying that they were shipwrecked on an island called Korporate. Hassabis understood
    the sentiment immediately because he would have hated to find himself toiling
    inside a giant corporation too.
  prefs: []
  type: TYPE_NORMAL
- en: The sender was Joe McDonagh, a programmer who worked at a sprawling conglomerate
    called British Telecom and who loved games. Joe was desperate to work for a gaming
    company, and to his delight, he was told to come to Molyneux’s house for an interview.
    When he arrived, a small, elfin-looking young man with chin stubble and black
    hair that sat on his head like a helmet answered the door. It was Hassabis, and
    he looked much younger than his twenty-one years. “I thought, ‘Who’s this kid?’”
    McDonagh remembers. It turned out Hassabis was now an executive at the gaming
    firm and his interviewer.
  prefs: []
  type: TYPE_NORMAL
- en: McDonagh soon realized he had come face-to-face with another game enthusiast
    who was ferociously competitive. When McDonagh mentioned that he liked origami,
    Hassabis challenged him to a race to see who could fold a paper crane the fastest.
    Hassabis won. The pair played board games for the rest of the afternoon. Later,
    when McDonagh called back about the job, he was told that the unusual kid from
    his interview had left the company. Hassabis had left because his mentor could
    no longer keep up with the young man’s technical aspirations. “We weren’t moving
    fast enough for him,” Molyneux remembers.
  prefs: []
  type: TYPE_NORMAL
- en: McDonagh managed to track down a phone number and called Hassabis to find out
    what was going on. “I’m setting up a new company,” he explained. It was going
    to be called Elixir Studios, and it would have real, cutting-edge AI at the center
    of a god game that would eventually be used to simulate the world.
  prefs: []
  type: TYPE_NORMAL
- en: It was an extraordinarily ambitious vision. McDonagh was in. He joined Elixir
    and became a lead designer, a job that involved dreaming up extraordinary new
    worlds. Having learned the art of bombastic marketing from his old mentor, Hassabis
    was brazen and cocky about his goals when he spoke to the press. He was featured
    on the cover of *Edge*, a taste-defining magazine for computer games in the nineties,
    and boasted that he was going to build games that not only had superior capabilities
    but would drag gaming itself out of its niche market for teens. He would build
    something so clever that readers of *The Economist* would want to play it. “I
    wanted to show games could be a serious medium, like books and film,” Hassabis
    says. He sketched out a long-term plan. Once Elixir was successful, he’d sell
    it and start an AI company.
  prefs: []
  type: TYPE_NORMAL
- en: 'He focused on building a flagship game called *Republic: The Revolution*, a
    political simulation where players had to overthrow the government of a fictional,
    totalitarian country in eastern Europe. Hassabis wanted everything to be as true
    to life as possible. McDonagh spent hours in the British Library studying the
    history of the Soviet Union to support his eager young boss in creating a realistic
    story. Hassabis worked more on the technical side, overseeing the creation of
    an artificial intelligence technique that could put a million virtual people in
    their game, an ambitious target considering that until then, the limit for most
    god games was closer to one or two thousand virtual background characters. He
    wanted players to be able to zoom in from a satellite image of a city down to
    a petal on the balcony of a tower block.'
  prefs: []
  type: TYPE_NORMAL
- en: The former chess champion hired the smartest programmers he could find, many
    of them graduates from Oxford University and Cambridge. He stoked team spirit
    by giving them every opportunity to play games. He excelled at all of them, from
    the video game *Starcraft* to the strategic board game Diplomacy. Foosball was
    like a blood sport. Hassabis would use his signature Viper Shot at the table,
    using the whole of his arm to spin his plastic players and whack the ball into
    the goal. On the real pitch, he played striker for Elixir’s team of out-of-shape
    software engineers. When they played soccer against a group of local North London
    guys in regular five-a-side matches, Hassabis was ferocious, attacking the ball
    and shins of other players twice his height like an angry terrier and, frequently,
    scoring.
  prefs: []
  type: TYPE_NORMAL
- en: As the team got closer to their deadline for the game, the boyish-faced founder
    and his programmers were working from 10:00 a.m. to 6:00 a.m. each day, stealing
    three or four hours of sleep in their board room, sometimes snoring at their desks,
    gamepads dangling from their hands. There were no late-night outings, and Hassabis
    himself made it a point to not let himself get drunk anymore, lest he impair his
    brain in any way.
  prefs: []
  type: TYPE_NORMAL
- en: His ambitions for *Republic*’s graphics and AI technology were bordering on
    absurd. He was building something that was lightyears ahead of the current computing
    capabilities. But there was no point in creating a virtual country if he couldn’t
    populate it with thousands of real, breathing people. “I didn’t want people to
    be abstract dots, wandering randomly across the player’s screen,” Hassabis told
    *Edge* magazine. “I wanted husbands, students, house-wives and drunks, each living
    separate, plausible lives.”
  prefs: []
  type: TYPE_NORMAL
- en: There was no better way to showcase the magical capabilities of AI than through
    a game. At the time, the most advanced AI research was happening in the gaming
    industry as smarter software helped create living worlds and a new style called
    emergent gameplay. Instead of playing a set route in something like *Super Mario
    Bros*, you were plonked in the middle of a virtual world, given some tools, and
    left to fend for yourself. That was the essence of *Grand Theft Auto* and then
    *Minecraft*, which would become the best-selling video game in history.
  prefs: []
  type: TYPE_NORMAL
- en: 'Hassabis believed he was on track to do something similar—but there was a problem.
    *Republic: The Revolution* was boring. It was the worst possible trap to fall
    into for a game designer. The team had spent four of their five years of development
    time so focused on the technology that they had neglected to perfect the gameplay
    itself. Making a great computer game requires constant iteration. You generally
    have to start with something crude but playable and then play it thousands of
    times until it gets better. But Elixir’s game makers couldn’t spend the time they
    needed making the game more exciting because their boss’s expectations for the
    technology had been so high.'
  prefs: []
  type: TYPE_NORMAL
- en: “The essence of a video game is immersion and feeling,” McDonagh remembers.
    “*Republic* didn’t have either of those things. We got stuck in a tech black hole.”
    The programmers at Elixir knew the game wasn’t good enough. When it came out,
    the critics confirmed their worst suspicions and gave it mixed reviews, saying
    it was too complex. Sales were modest.
  prefs: []
  type: TYPE_NORMAL
- en: “It was too ambitious for its time,” Hassabis admits. “I was in a rush to make
    a technical and artistic statement.”
  prefs: []
  type: TYPE_NORMAL
- en: That didn’t stop him from getting Elixir to try its hand again and launch another
    similarly ambitious god game called *Evil Genius*, in which players took the role
    of a James Bond–style villain that tried to achieve world domination. The game
    had some clever, tongue-in-cheek humor, but it also struggled to find mainstream
    success. As he took a stab at improving things with *Evil Genius 2*, Hassabis
    was facing huge costs from all his investments in the technology. In 2005, the
    brainy kid who wanted to stretch the limits of gaming found himself closing down
    Elixir. The experience crushed him. From chess to foosball to school, he’d spent
    his life winning at practically everything.
  prefs: []
  type: TYPE_NORMAL
- en: Blowback from the British gaming industry made the humiliation worse. He had
    masterfully built up excitement about Elixir in the press and the gaming industry
    as an upstart that would transform the old ways of gaming with new technology.
    McDonagh remembers attending a conference at one point and mentioning that he’d
    worked at Elixir. A grandee of the British gaming industry who overheard simply
    laughed, and McDonagh died inside. “Failure was incredibly hard,” he remembers.
  prefs: []
  type: TYPE_NORMAL
- en: At one point, McDonagh and Hassabis got into a shouting match over the company’s
    demise, the first and only time he heard the normally calm entrepreneur raise
    his voice. “It was miserable,” he says. “We were all from Oxford and Cambridge.
    You’re winning, winning, winning. We’d never lost before, and we lost so publicly.”
  prefs: []
  type: TYPE_NORMAL
- en: In his passion to show people the magic of AI, Hassabis had made a crucial error
    in trying to build a game around his real passion. If he was going to make machines
    that were smarter than humans, he had to flip that strategy around. He needed
    to go deeper into artificial intelligence, and instead of using it to make a great
    game, use games to make great AI.
  prefs: []
  type: TYPE_NORMAL
- en: Several years later and now in his thirties, McDonagh found himself once again
    on the phone with his old boss, fielding a new job offer. “I’m starting this company
    called DeepMind,” said the eager entrepreneur who seemed to be a glutton for punishment.
  prefs: []
  type: TYPE_NORMAL
- en: I can’t do this again, McDonagh thought. He said, “No.”
  prefs: []
  type: TYPE_NORMAL
- en: He then watched in astonishment as Hassabis chased another impossibly ambitious
    goal, this time surpassing expectations to build what looked like the world’s
    most advanced artificial intelligence systems—until Sam Altman came along.  <hgroup>
  prefs: []
  type: TYPE_NORMAL
- en: '[CHAPTER 3](contents.xhtml#c_ch3) [Save the Humans](contents.xhtml#c_ch3)'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: </hgroup>
  prefs: []
  type: TYPE_NORMAL
- en: On a hot summer’s day in 2006, Altman was lying on the floor of his studio apartment
    in Mountain View, California, in just his gym shorts. His arms were outstretched,
    and he was trying to breathe. He was halfway through a marathon weekend of trying
    to negotiate a deal for Loopt, and it wasn’t going well. It was also ninety-five
    degrees inside. Altman felt like he was going to explode with stress, according
    to an account he shared with the Art of Accomplishment podcast in 2022.
  prefs: []
  type: TYPE_NORMAL
- en: He’d been telling himself for years that this was a normal part of being an
    entrepreneur. “This is how I’m supposed to feel,” he thought. “But it isn’t helping.”
    The stress was making things worse.
  prefs: []
  type: TYPE_NORMAL
- en: 'The failure of Loopt had taught Altman that he couldn’t force people to do
    what they didn’t want to do. It also revealed a more personal lesson: how to emotionally
    disengage himself from difficult situations. That moment on the floor in his gym
    shorts became a turning point. Altman was going to live differently. The trick
    was to become more detached.'
  prefs: []
  type: TYPE_NORMAL
- en: After selling Loopt and then breaking up with Nick Sivo, who had also been his
    long-term romantic partner, and then working for his acquiring company for a spell,
    Altman spent a year doing whatever he wanted. He detached himself completely.
    It generally doesn’t look good to take a year off in the hustle-culture world
    of Silicon Valley, and Altman noticed the consequences immediately. If he started
    talking to someone at a party and mentioned his plans to take a year off, their
    eyes would look for someone else to talk to.
  prefs: []
  type: TYPE_NORMAL
- en: He kept a thread of a connection with California’s Bay Area, working as a part-time
    partner with Y Combinator. By now, venture capital investors had changed their
    view of the scrappy hacker camp and saw it as a factory for high-quality internet
    companies. Several of its entrants had become big names like Reddit and Scribd.
    For start-up founders, “YC” was now seen as a gateway to success in the Valley.
    Thousands of tech founders applied and only about one hundred got through each
    year.
  prefs: []
  type: TYPE_NORMAL
- en: For the rest of Altman’s self-imposed gap year, he dabbled in his wide array
    of interests, reading dozens of books about everything from nuclear engineering
    to synthetic biology and from investing to artificial intelligence. He traveled
    to other countries and stayed in hostels, flew to conferences and invested in
    several start-ups with some of the roughly $5 million he’d made from selling Loopt.
  prefs: []
  type: TYPE_NORMAL
- en: He would admit publicly that nearly all the companies he backed failed, but
    he figured he was training a muscle for identifying the projects that were most
    likely to succeed. It was OK to be frequently wrong, he believed, so long as you
    were occasionally “right in a big way,” such as by backing a start-up that turned
    out to be a blockbuster and then making a spectacular exit.
  prefs: []
  type: TYPE_NORMAL
- en: If living life was like painting, Altman approached it with the biggest paint
    roller to cover the broadest area possible. But in dribs and drabs, he was increasingly
    drawn to artificial intelligence. At around the time he sold Loopt, he went on
    a hike with some tech industry friends and got into a discussion about the future
    of artificial intelligence research, according to his profile in the *New Yorker*.
    Altman considered that with computer hardware becoming so powerful, and machine
    learning systems so capable, at some point during his lifetime they would probably
    be able to replicate his brain.
  prefs: []
  type: TYPE_NORMAL
- en: This told him something important about humanity’s role at the top of Earth’s
    food chain. If our intelligence could be simulated by a computer, were we all
    that unique? Altman’s answer to that question was no, and while that might have
    been a depressing realization at first, he flipped it to see it as something to
    capitalize on. If humans weren’t so special, that meant they could be replicated
    by computers, even improved on. Maybe *he* could do that.
  prefs: []
  type: TYPE_NORMAL
- en: In many ways, Altman was building off a Silicon Valley mindset that saw life
    itself as an engineering conundrum. You could solve all manner of big problems
    by using the same steps you took to optimize an app. Partly this came from the
    way engineers were trained to approach technical problems systematically and logically,
    an approach that was deeply ingrained through their education and taught in software
    development. Success was measured in how efficient you could make your software.
    These prized methods naturally extended to other parts of society and life.
  prefs: []
  type: TYPE_NORMAL
- en: 'Little wonder Altman liked to use the language of computing when he referred
    to humans, such as when he once said in a magazine interview that “we learn only
    two bits a second.” A bit is a basic unit of information, typically represented
    as a 0 or a 1 in binary code, and this was Altman’s figurative way of showing
    how limited humans were in processing information. If you compared the mechanics
    of our brains to how computers worked, computers could process bits at a much
    more impressive rate: in gigabits or terabits per second.'
  prefs: []
  type: TYPE_NORMAL
- en: If Altman himself was going to build a machine that surpassed human intelligence,
    there was no question that he would have to remain in Silicon Valley, where everybody
    was building for tomorrow.
  prefs: []
  type: TYPE_NORMAL
- en: “There is a relentless belief in the future here,” he once said. “There are
    people here who will take your wild ideas seriously instead of mocking you.” Silicon
    Valley also promised a thriving network of contacts who would scratch your back
    if you scratched theirs. Help someone fundraise for their start-up, and they might
    help you hire that talented engineer.
  prefs: []
  type: TYPE_NORMAL
- en: As his travels drew to a close, Altman started an early-stage investment firm
    called Hydrazine Capital to make financial bets on start-ups, from life sciences
    to education software companies. He drew on his connections with some of Silicon
    Valley’s most powerful financiers. Paul Graham and Peter Thiel, an early investor
    in Facebook, added to the $21 million pot of money Altman raised for the fund.
    Thiel, known today as an enigmatic billionaire whose ideas border on science fiction,
    would become a kingmaker in the quest to build powerful AI, helping to fund both
    Altman and Demis Hassabis in London. He was part of the so-called PayPal Mafia,
    an elite group of cofounders and executives from the online payment giant who
    invested in one another’s companies over many years and which included Elon Musk
    and LinkedIn founder Reid Hoffman.
  prefs: []
  type: TYPE_NORMAL
- en: Altman put about 75 percent of Hydrazine’s money into companies graduating from
    Y Combinator, a strategy that paid off. Within about four years, the fund’s value
    had grown tenfold, thanks to his investments in start-ups that were part of his
    growing network of contacts, many of them part of the Valley elite. He put money
    into Reddit, the start-up in his first YC class, and Asana, the enterprise software
    company started by Facebook’s billionaire cofounder Dustin Moskovitz. In the coming
    years, both of those relationships would prove valuable in helping Altman build
    ultra-powerful AI.
  prefs: []
  type: TYPE_NORMAL
- en: Altman understood that immediate financial rewards weren’t as valuable in the
    long run as personal connections. That’s why he felt uncomfortable with the adversarial
    way he had to behave toward entrepreneurs as a venture capitalist. It was a job
    where you had to push for as much equity as possible, for as little money as possible.
    Altman also found Silicon Valley’s constant striving for extreme wealth slightly
    distasteful. He was more interested in the glory that came from building exciting
    projects. In between his investing work, he pared down his assets to a four-bedroom
    house in San Francisco, a property in Big Sur, California, and $10 million in
    cash. He lived off its interest.
  prefs: []
  type: TYPE_NORMAL
- en: 'Then one day in 2014, Graham asked Altman a question while in the older entrepreneur’s
    kitchen: “Do you want to take over YC?” Altman grinned. Graham and his wife, Jessica
    Livingston, had two young kids and were strung out from running a program that
    had become huge. For one thing, Graham tended to put his foot in his mouth when
    he gave interviews, often reinforcing suspicions that the Valley elite was dominated
    by white brogrammers. He once wrote in a blog post that he’d be “reluctant to
    start a startup with a woman who had small children, or was likely to have them
    soon.”'
  prefs: []
  type: TYPE_NORMAL
- en: As Graham’s one-man show was starting to become a liability, Y Combinator was
    becoming more and more unwieldy. Over the previous seven years, it had funded
    632 start-ups and was getting ten thousand applicants annually, allowing in just
    two hundred. More tech start-ups were being created than ever before, and Y Combinator
    needed to grow to meet the demand.
  prefs: []
  type: TYPE_NORMAL
- en: “I’m no good at running a giant thing,” Graham said on stage at a conference
    later that year, explaining the leadership transition. “Sam is going to be good
    at running a giant thing.”
  prefs: []
  type: TYPE_NORMAL
- en: Altman was just thirty at the time, and Graham was pushing fifty. But Altman
    was already acting like the new Graham. He had become his own version of a start-up
    guru with insights and advice on all manner of topics, including those with which
    he had little experience. Despite his youth and having only ever run one company
    that arguably failed, for instance, he once wrote a blog post with ninety-five
    nuggets of advice that other start-ups should follow.
  prefs: []
  type: TYPE_NORMAL
- en: However unseasoned Altman was, he’d made such a strong impression on Graham
    and Livingston that they never bothered to make a list of possible new leaders
    for YC. They both agreed it should just be Altman. Graham helped cast an almost
    messianic glow on his protégé, writing in an essay that “Sama,” Altman’s screen
    name, was one of the five most interesting founders of all time. “In questions
    of design, I ask ‘What would Steve [Jobs] do?’ but on questions of strategy or
    ambition I ask ‘What would Sama do?’”
  prefs: []
  type: TYPE_NORMAL
- en: Once Altman took the reins of YC, his top priority was going bigger and, naturally,
    broader. He worked on turning the program into more of an institution, creating
    a board of overseers that included Jessica Livingston, Altman himself, and seven
    Y Combinator alumni. He doubled its full-time partners and added a handful more
    part-time partners, including Thiel, the billionaire venture capitalist.
  prefs: []
  type: TYPE_NORMAL
- en: Altman, who’d been interested in frontier science since he was a kid, believed
    that its advancements were critical to helping humanity and building wealth. So
    he focused on bringing in more “hard-tech” start-ups that were solving complex
    scientific and engineering problems. “It’s just what I like doing,” he remembers
    today. “And I don’t really mind losing money in pursuit of something I think is
    worthwhile. I think it’s important that we tackle our biggest challenges. While
    they require taking bigger risks, any potential returns are commensurate with
    that.”
  prefs: []
  type: TYPE_NORMAL
- en: Till then, YC had mostly accepted consumer app makers and enterprise software
    companies who had more predictable paths to revenue. But Altman didn’t think these
    were the companies that would transform the world. So he persuaded the founders
    of Cruise, a self-driving car start-up, to join the YC program, as well as Helion
    Energy, a nuclear fusion start-up based in Redmond, Washington.
  prefs: []
  type: TYPE_NORMAL
- en: Nuclear fusion happens when two light atomic nuclei combine to form a heavier
    nuclease, releasing energy in the process. It’s the same reaction that powers
    the sun and the stars as well as the flux capacitor in *Back to the Future*’s
    DeLorean time machine and the arc reactor in Tony Stark’s Iron Man suit. It’s
    been a longtime holy grail for scientists looking for clean energy solutions,
    but it’s also been decades away from reality. Most research in the field has led
    to theories and proofs of concept. But Helion, which was started by four academics,
    said it could build a nuclear fusion reactor for tens of millions of dollars instead
    of tens of billions and pave a path for people to transition away from burning
    fossil fuels.
  prefs: []
  type: TYPE_NORMAL
- en: It sounded crazy, but these were the kinds of big, world-changing ideas that
    Altman jumped at. He had been wanting to start his own nuclear energy company
    for years, and now he could invest in one instead.
  prefs: []
  type: TYPE_NORMAL
- en: He knew he was going against the grain of tech investing, which focused on software
    companies with more traditional business models and clearer paths to profit. But
    he firmly believed these companies could improve humanity and make a lot of money
    too. “Shame on Silicon Valley for not funding this company yet,” he said in one
    interview about Helion. Altman’s moral hubris wasn’t that odd. It was just a slightly
    different ideological flavor to that driving other Big Tech leaders, like Elon
    Musk, who was even more explicit about his goals of saving humankind.
  prefs: []
  type: TYPE_NORMAL
- en: “Another mobile app? You get an eye roll,” Altman once said. “A rocket company?
    Everyone wants to go to space.” In Silicon Valley, everyone also professes to
    want to save the world. But Altman was, like Musk, fashioning himself as a bona
    fide tech savior who was serious about his goals. Most tech entrepreneurs shared
    an implicit understanding that rescuing humanity was mostly a marketing ploy for
    the public and their employees, especially since their firms were building widgets
    that helped streamline email or do laundry. But Altman was refashioning the YC
    fraternity into a bigger, more serious alliance of entrepreneurs who really could
    fix the world. These were riskier bets that attracted more attention.
  prefs: []
  type: TYPE_NORMAL
- en: When it came to investing, Altman was the guy at a poker game who put most of
    his chips on the table for a half-decent hand and who raised the pulse rates of
    everybody else around the table. Altman attributed that tendency to a missing
    circuit in his brain—the one that made him care what people thought of him. It
    allowed him to calculate risk more effectively and to bet on investments that
    looked crazy.
  prefs: []
  type: TYPE_NORMAL
- en: 'When he did make those bets, though, Altman was cushioned from their failure
    by his wealth and his reputation as the new Yoda among start-ups. In Silicon Valley,
    a good reputation was more valuable than any mansion or sports car. And if you
    backed nuclear fusion start-ups like Altman did, the cachet you got was worth
    as much as real earnings. Altman eventually shifted the majority of his money
    into two other ambitious goals besides AI: extending life and creating limitless
    energy, betting on two companies. More than $375 million went into Helion and
    another $180 million into Retro Biosciences, a start-up that was working on adding
    ten years to the average human lifespan.'
  prefs: []
  type: TYPE_NORMAL
- en: If you’re wondering where Altman got the money for that, remember that he put
    about $3 million into Cruise well before that start-up sold to General Motors
    for $1.25 billion, earning him a windfall. His place at the top of YC meant he
    was better positioned than many other venture capitalists to win jackpots like
    that, getting an intimate view on hundreds of companies who’d already been carefully
    screened, and in the middle of one of the greatest bull market runs in history.
    Getting pitched by all those start-ups also helped him see into the future.
  prefs: []
  type: TYPE_NORMAL
- en: A year into heading YC, Altman had all but sealed his reputation as Silicon
    Valley’s new maharishi. He was getting four hundred meeting requests a week. He’d
    become a magnet for investors and start-up founders who wanted to use him to access
    other start-ups and partners in Y Combinator or just to meet the even-more-ambitious,
    sci-fi version of Paul Graham. On blog.samaltman.com, Altman was pontificating
    on topics that were clearly beyond his area of expertise. He wrote about UFOs
    and regulation, and he gave advice on how to be a good conversationalist at a
    dinner party. Don’t ask people what they do, Altman wrote. Instead, ask what someone
    is interested in.
  prefs: []
  type: TYPE_NORMAL
- en: 'Graham had held weekly “office hours” with YC founders in which he’d talk through
    some of their problems, dropping pithy words of guidance that tended to follow
    YC’s founding motto: “Make Something People Want.” When Altman touched base with
    start-ups, he steered them toward making things bigger. When the founders of Airbnb,
    then just a few guys with an app for couch surfers, showed Altman their pitch
    to investors, Altman told them to take out all the Ms in their presentation and
    make them Bs, for billions. Either you’re ashamed of your pitch or I can’t do
    math, Altman told them with his unblinking stare and large blue eyes.'
  prefs: []
  type: TYPE_NORMAL
- en: He advised start-ups to do everything at full throttle and become as driven
    as he was. “You have to have an almost crazy level of dedication to your company
    to succeed,” he told them. He wrote on his blog that you had to take whatever
    number measured success and “add a zero.” To fix a broken world, founders had
    to be obsessive about product quality, “relentlessly resourceful,” and able to
    “overcommunicate” with their team. There was no such thing as work-life balance
    in this world.
  prefs: []
  type: TYPE_NORMAL
- en: 'Much of what Altman was saying was right. Silicon Valley was where people came
    to build empires, and you didn’t build an empire by working forty hours a week.
    But his real gift as an entrepreneur was his power to persuade others of his authority.
    He had drawn the admiration of mentors, from his high school principal to Y Combinator’s
    Graham and Livingston to Peter Thiel, along with thousands of start-up founders.
    But Altman also had an underlying dissonance: a brilliant mind driven to protect
    the world that was also emotionally distant from the regular people he sought
    to save.'
  prefs: []
  type: TYPE_NORMAL
- en: This stemmed in part from that sweltering summer’s day in 2006, when Altman
    was lying on the floor in just his gym shorts, freaking out about a deal that
    wasn’t going well. To handle his anxiety, Altman got into meditation, sometimes
    sitting with his eyes closed and concentrating on just his breath for up to an
    hour at a time. Over time, he later said, he developed an increasingly diminished
    sense of self.
  prefs: []
  type: TYPE_NORMAL
- en: “One thing I realized through meditation is that there is no self that I can
    identify with in any way at all,” he told the Art of Accomplishment podcast. “I’ve
    heard that of a lot of people spending a lot of time thinking about [powerful
    AI] get to that in a different way too.”
  prefs: []
  type: TYPE_NORMAL
- en: These realizations helped underpin the epiphany he had with his friends while
    hiking years later, that of course computers would replicate our minds one day.
    Cognition could happen in a computer, one we’d merge with one day. “Working on
    AI makes you think about deep philosophical questions in the context of what’s
    going to happen when my mind gets uploaded,” he added. “What’s going to happen
    when they’re talking to me? Do I want to merge? Do I want to go off exploring
    the universe? How much of that will still be me?” Altman didn’t follow these sci-fi
    instincts in isolation. He was surrounded by technologists who believed they might
    also one day upload their consciousness to computer servers, where they could
    live on in perpetuity.
  prefs: []
  type: TYPE_NORMAL
- en: The idea of death seemed to terrify Altman. He was a self-described prepper
    and spent a great deal of time and money preparing for a catastrophic global event,
    like a synthetic virus being released into the world or being attacked by AI.
    “I try not to think about it too much,” he was quoted as telling a group of start-up
    founders in his *New Yorker* profile. “But I have guns, gold, potassium iodide,
    antibiotics, batteries, water, gas masks from the Israeli Defense Force, and a
    big patch of land in Big Sur I can fly to.”
  prefs: []
  type: TYPE_NORMAL
- en: He also paid $10,000 to get on the waiting list for Nectome, a Y Combinator
    start-up that preserved human brains through a high-tech embalming process, so
    that they could be uploaded to the cloud and then turned into a computer simulation
    by scientists in the future.
  prefs: []
  type: TYPE_NORMAL
- en: As he invested in more companies pioneering the distant future, Altman seemed
    to be experiencing what’s known as the overview effect, a cognitive shift that
    astronauts get when they view Earth from space and get an overwhelming sense of
    awe and self-transcendence. He was increasingly seeing the world as if he was
    in outer space. Conversations with Altman were marked by deep, searching stares
    and contemplative pauses, as if he were an observer rather than an engaged participant.
  prefs: []
  type: TYPE_NORMAL
- en: Despite his investments in the future of humankind, he was cultivating a kind
    of mental and emotional divide between himself and other people. To solve their
    problems, you needed to be “calm, measured, and pragmatic,” he says. Altman often
    pointed to a short story called “The Gentle Seduction” by the American science
    fiction author Marc Stiegler, about the future impact of tech on people’s lives.
    The story follows the life of Lisa, a woman who encounters various advancements
    that “seduce” her into incorporating tech into her daily life.
  prefs: []
  type: TYPE_NORMAL
- en: Toward the end, Lisa and her husband are undergoing the process of uploading
    their consciousnesses into a computer. It’s a risky procedure and the people who
    merge their minds with this advanced machinery can end up losing themselves, so
    Lisa weighs the pros and cons, noting that some of her friends who tried it ended
    up “dying,” or getting lost in the digital ether. Stiegler then writes, “Only
    those who knew caution without fear, only those marked by her elemental form of
    prudence, made it through.”
  prefs: []
  type: TYPE_NORMAL
- en: Altman was struck by that quote and would repeat it to others. The author was
    saying that to survive the risks of merging with computers, people needed to adopt
    a mindset that balanced caution and bravery. You were more likely to survive a
    future threat by being careful and cool-headed, rationally assessing dangers,
    instead of reacting emotionally and succumbing to panic. The people who thrived
    in the future would take a detached and informed approach to tech advancements.
  prefs: []
  type: TYPE_NORMAL
- en: 'Some technologists were leaning too far into anxiety about the future dangers
    of artificial intelligence, as part of a nascent field of study referred to as
    “AI safety.” While that research was important, some of that panic had turned
    into fearmongering, and it seemed like these advocates for humanity were letting
    emotions get the better of them. “Unfortunately, some of the communities involved
    in AI safety are the people who are least calm,” Altman said. “That’s a dangerous
    situation.… It’s an extremely high-strung community.” But he was also coming to
    a realization, he says today: “I really wanted to work on AGI.” The term AGI had
    been conjured by Shane Legg a few years earlier, but the idea of creating some
    kind of cognitive parity between humans and machines had been around for a few
    decades, partly morphing out of ideas that were first proposed in science fiction.
    Now it was slowly starting to shift away from being the “crazy talk” that once
    forced DeepMind’s cofounders to discuss their plans in an Italian restaurant,
    to a serious scientific goal.'
  prefs: []
  type: TYPE_NORMAL
- en: The world also needed someone with a more balanced approach to building AI.
    When Stiegler referred to an “elemental form of prudence,” Altman saw his own
    sensibilities being described—someone who had the wisdom to navigate a complex
    and potentially dangerous future and who had “caution without fear.” He could
    be the vigilant watchman who stood on the tower’s edge, eyes glued on an AI utopia
    on the horizon and seldom looking at the bustling life just beneath. But he would
    also become so wrapped up in his mission and self-belief that he wouldn’t see
    the irony of painting himself as cautious, an entrepreneur whose fierce competitive
    streak would see him hurriedly push artificial intelligence systems out to the
    public ahead of any other tech company, including Google. Quietly, Altman was
    also obsessed with being first.
  prefs: []
  type: TYPE_NORMAL
- en: That is why he might never have taken the steps to build that AI utopia if he
    hadn’t been spurred by someone who pioneered the idea. The Silicon Valley entrepreneur
    needed a rival to spark his own endeavor, and that person was on the other side
    of the world in England, a brilliant young game designer who was planning to build
    software so powerful that it could make profound discoveries about science and
    even God.  <hgroup>
  prefs: []
  type: TYPE_NORMAL
- en: '[CHAPTER 4](contents.xhtml#c_ch4) [A Better Brain](contents.xhtml#c_ch4)'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: </hgroup>
  prefs: []
  type: TYPE_NORMAL
- en: 'After the collapse of Elixir Studios, Hassabis had become just another failed
    tech entrepreneur with too-bold dreams. The experience had been painful, but he
    still had something that he felt was unique to most of the other start-up founders
    and humans around him: his brain. Hassabis went to great lengths to care for the
    gray matter in his skull. He played games to exercise it. He avoided alcohol to
    protect it. He even made his Facebook profile picture an MRI brain scan. Hassabis
    couldn’t help but marvel at its complexity, and in the years after Elixir, he
    wondered if the brain itself could be the key to making software that was as smart
    as humans. After all, it was the only proof in the universe that general intelligence
    was possible, so it made sense to deeply understand it. Was it all physical biology
    or something more? The answer lay in neuroscience.'
  prefs: []
  type: TYPE_NORMAL
- en: Hassabis craved the comfort of certainty, whether that was from the outcome
    of either winning or losing in games, the moral guidelines of right and wrong
    that Christianity provided, or the quest for a single framework for the universe
    that he’d read about in high school. When you could measure something with numbers
    or rules—that was his sweet spot. “Most of the functions that the brain has, you
    should be able to mimic in some way with a computer,” he would later say in a
    press interview. “Neuroscience shows you can describe the brain in mechanistic
    terms.” In other words, the frightening complexity of the brain could be boiled
    down to numbers and data, and be described in the same way as a machine.
  prefs: []
  type: TYPE_NORMAL
- en: To that end, Hassabis took inspiration from Alan Turing, the twentieth-century
    British computer scientist who came up with the Turing machine. Introduced in
    1936, it was essentially a thought experiment, a “machine” that only ever existed
    in Turing’s mind. He envisioned a length of infinite tape that was divided into
    cells, as well as a tape head that could read and write symbols on the tape, guided
    by certain rules, until it was told to stop. The idea sounds rudimentary, but
    as a theory, it was critical in formalizing the concept that computers could use
    algorithms—or sets of rules—to do things. Given enough time and resources, a Turing
    machine could be as powerful as any digital computer today. And to Hassabis, it
    was a perfect proxy for the human mind. “The human brain *is* a Turing machine,”
    he once said.
  prefs: []
  type: TYPE_NORMAL
- en: In 2005, months after closing Elixir, Hassabis jumped into doing a PhD in neuroscience
    at University College London. His final thesis was relatively short but scientifically
    exquisite, according to other computer science academics. It was all about memory.
    Till then, it was thought that the brain’s hippocampus mostly processed memories,
    but Hassabis showed (with the help of other studies of MRI scans in his thesis)
    that it was also activated during the act of imagination.
  prefs: []
  type: TYPE_NORMAL
- en: In simple terms, this meant that when we had a memory, we were partly imagining
    it. Our brains weren’t just “replaying” past events by retrieving them, as you
    might take a file out of a filing cabinet, but actively reconstructing them in
    the way you might paint a picture. The brain was engaged in a much more dynamic
    and creative process, which went some way to explain why our memories sometimes
    were plain wrong and could be influenced by our other experiences. Hassabis argued
    that our brains were using this process of “scene construction” for other types
    of tasks, like figuring out how to navigate a map or making plans.
  prefs: []
  type: TYPE_NORMAL
- en: His thesis was cited as one of the most important scientific breakthroughs that
    year by a leading peer-reviewed journal. But Hassabis didn’t want to linger in
    academia. Scholars eager to make Nobel-worthy discoveries spent more than half
    their time writing grant proposals, and even if they were lucky to get funding
    for a certain project, most universities didn’t have much computing power. To
    do machine-learning research that was cutting edge, you needed access to some
    of the world’s most powerful computers. Most of them, along with the world’s top
    talent, could only be found at large tech companies. If Hassabis was going to
    bring together large amounts of brain power to build a kind of modern-day Manhattan
    Project, he would need to start a business.
  prefs: []
  type: TYPE_NORMAL
- en: 'The first blueprints came together through conversations over lunch with two
    other people: Shane Legg and Mustafa Suleyman. Legg was that rare AI enthusiast
    whose ideas about the future of artificial intelligence almost made those of Hassabis
    look puny by comparison. He had written a PhD thesis on “machine superintelligence”
    and his supervisor recommended that he speak to Hassabis afterward.'
  prefs: []
  type: TYPE_NORMAL
- en: “I found a kindred spirit,” Hassabis remembers. “Shane was someone who had independently
    arrived at that conclusion that this would be one of the most important things
    to do ever.”
  prefs: []
  type: TYPE_NORMAL
- en: Legg’s ideas had already been making waves in the close-knit “singularity” community.
    These were researchers who believed in a theoretical point in the future when
    the growth of technology became so advanced that it was unstoppable and uncontrollable.
    The clearest sign would be when computers became smarter than humans, and Legg
    believed that would happen sometime around 2030.
  prefs: []
  type: TYPE_NORMAL
- en: His life in frontier science had an unlikely start. Brought up in New Zealand,
    his parents took him to see an educational psychologist when he was nine after
    he started struggling at school. The psychologist gave Legg an intelligence test
    and told his parents, with some annoyance, that he had dyslexia and that his intelligence
    was off the charts. Once he learned to use a keyboard, Legg zoomed up the school
    rankings to become one of its highest achievers in math and computer programming.
  prefs: []
  type: TYPE_NORMAL
- en: Tall, slightly stooped, and with closely cropped hair, Legg was twenty-seven
    when he walked into a bookshop and spotted *The Age of Spiritual Machines* by
    Ray Kurzweil, which predicted that computers would one day develop free will and
    have emotional and spiritual experiences.
  prefs: []
  type: TYPE_NORMAL
- en: He read it cover to cover and couldn’t stop thinking about Kurzweil’s reasoning
    or his forecast for powerful AI to come about in the late 2020s. Computing power
    and data were growing exponentially. So long as that kept happening, computers
    would eventually surpass humans. This correlated with a fundamental principle
    that underpinned the technology industry itself, known as Moore’s Law. It stated
    that the number of transistors on a microchip would double every two years, an
    estimate that has held true for the last fifty years.
  prefs: []
  type: TYPE_NORMAL
- en: In the year 2000, when Legg read Kurzweil’s book, the dust was still settling
    from the dotcom bust, so it was hard to believe that computers would continue
    doubling their capability. But Legg believed the internet would keep growing.
  prefs: []
  type: TYPE_NORMAL
- en: “It was clear that various sensors were going to reduce costs, so there were
    going to be more and more data that you could then potentially train models on,”
    he says today.
  prefs: []
  type: TYPE_NORMAL
- en: 'Add all that power and data, and you could train machines to become smarter
    and smarter. Legg went off to study for a PhD in AI and build up a network of
    contacts in the field. At one point Ben Goertzel, a singularity believer and AI
    scientist with long hippy hair, emailed Legg and several other scientists seeking
    ideas for a book title. It needed to describe artificial intelligence with human
    capabilities. Legg emailed him back, suggesting a phrase that would become a focal
    point for Hassabis and, eventually, a handful of the world’s largest tech companies:
    “artificial general intelligence.”'
  prefs: []
  type: TYPE_NORMAL
- en: 'For years, people like Hassabis, Legg, and other scientists exploring AI had
    used terms like *strong AI* or *proper AI* to refer to future software that displayed
    the same kind of intelligence as humans. But using the word *general* drove home
    an important point: the human brain was special because of all the different things
    it could do, from calculating numbers to peeling an orange to writing a poem.
    Machines could be programmed to do each of those things fairly well, but none
    could do all of them at once. If a computer could not only crunch numbers but
    also make predictions, recognize images, talk, generate text, plan, and “imagine,”
    then it might come close to being like a human.'
  prefs: []
  type: TYPE_NORMAL
- en: Most AI scientists at the time dismissed the notion that AI could ever reach
    human parity. Partly this was down to their personal experiences of the hype and
    failures in AI’s history. People would get excited about the possibilities of
    AI and then find themselves disappointed. A series of booms and busts in AI’s
    history were known as “winters,” fallow periods where researchers watched their
    funding drop as they made achingly slow technological progress. In the 1990s and
    early 2000s, researchers managed to apply machine learning techniques to narrow
    tasks like recognizing faces or language, but by the time Hassabis was finishing
    his PhD in 2009, hardly anyone believed that machines could have *general* intelligence.
    They’d be laughed out of the room. It was a fringe theory.
  prefs: []
  type: TYPE_NORMAL
- en: Fortunately, Goertzel was on the fringe, and while “artificial general intelligence,”
    or AGI, wasn’t snappy, he liked it enough that he slapped the term on his book
    and helped turn it into a common expression that would go on to help fuel hype
    about the field.
  prefs: []
  type: TYPE_NORMAL
- en: Language and terminology would end up playing an enormous role in the development
    of AI, driving interest to sometimes maddening effect. The term itself, *artificial
    intelligence*, was coined back in 1956 at a workshop at Dartmouth College that
    was aimed at pulling together ideas about “thinking machines.” There were various
    other names for the new field at the time, like *cybernetics* and *complex information
    processing*, but *artificial intelligence* stuck. It went on to become one of
    the most successful marketing terms of all time and spawned a collection of other
    terms that anthropomorphize machines in our collective consciousness, often lending
    them more capability than they deserve. It isn’t technically accurate, for instance,
    to suggest that computers can “think” or “learn,” but phrases like *neural network*,
    *deep learning*, and *training* help promote that idea in our minds by lending
    software humanlike qualities, even when they’re only *loosely* inspired by the
    human brain. The one thing everyone could agree on about Legg’s new term, AGI,
    was that it didn’t exist yet.
  prefs: []
  type: TYPE_NORMAL
- en: One other person who believed it could was Mustafa Suleyman. At age twenty-five,
    the Oxford University dropout was looking for a way to use technology to change
    the world. He had a brain like a vice, but his areas of expertise were more in
    policy and philosophy than computer science. Born to a Syrian father and English
    mother, Suleyman had an overwhelming drive to solve problems. His drive was not
    to solve minor issues like fixing a broken-down car or rehabilitating someone’s
    knee but large-scale issues that affected all of humanity like poverty or the
    climate crisis.
  prefs: []
  type: TYPE_NORMAL
- en: Having already cofounded a conflict-resolution firm, he was now interested in
    studying neuroscience, and Hassabis invited him to some of the informational lunches
    at University College London. Suleyman already knew Hassabis well. Having grown
    up in North London, he was a friend of Hassabis’s brother, George, and had been
    a frequent visitor to their home in his teens. The trio had even traveled to Las
    Vegas to play at a poker tournament in their twenties, coaching one another and
    splitting the winnings.
  prefs: []
  type: TYPE_NORMAL
- en: When he met Hassabis again, he was struck by his friend’s ideas about building
    a powerful AI system to solve problems, and in Legg’s belief in a general intelligence
    that could tackle almost any issue. Suleyman became excited about what that could
    mean for societal problems.
  prefs: []
  type: TYPE_NORMAL
- en: The three men would meet at Carluccio’s, an Italian chain restaurant near the
    university, mainly for privacy. “We didn’t want people to hear our crazy talk
    about starting AGI,” says Legg.
  prefs: []
  type: TYPE_NORMAL
- en: After some convincing from Hassabis, Legg agreed they probably couldn’t build
    AGI in academia. “We’d be like, professors in our fifties by the time they’d give
    us any resources to do the sorts of things we wanted to do,” Hassabis says. “Companies
    was what I knew how to do.”
  prefs: []
  type: TYPE_NORMAL
- en: To get the necessary scale and resources, they needed to create a start-up.
    Suleyman had cofounded a company, which meant he knew a thing or two about running
    a business, as did Hassabis. In 2010, tech companies like Google and Facebook
    were having the biggest impacts on society, so it made sense to the three men
    that a technology company would have the greatest chance of modeling the complexity
    of the world. They hatched an ambitious plan to form a research company that would
    figure out how to make the most powerful AI anyone had ever seen and then use
    it to solve global problems.
  prefs: []
  type: TYPE_NORMAL
- en: They named the company DeepMind, made Hassabis the CEO, immediately hired one
    of Hassabis’s top coders from Elixir, and leased office space in an attic across
    the road from University College London, where Hassabis had done his PhD. The
    trio had an energy that came from believing in a shared mission, though they had
    different motivations. Legg moved in circles where the goal was to merge as many
    people with AGI as possible, Suleyman wanted to solve societal problems, and Hassabis
    wanted to go down in history having made fundamental discoveries about the universe.
  prefs: []
  type: TYPE_NORMAL
- en: It wasn’t long before there were debates over their different goals. Suleyman
    was eager for Hassabis to read a book that had shaped his view of the world. Called
    *The Ingenuity Gap*, it was published in 2000 by Canadian academic Thomas Homer-Dixon
    and argued that the utter complexity of modern-day problems, from climate change
    to political instability, was outpacing our ability to come up with solutions.
    The result was an ingenuity gap, and humans needed to innovate in areas like technology
    if they wanted to close it. That’s where AI could fit in, Suleyman figured.
  prefs: []
  type: TYPE_NORMAL
- en: Hassabis shook his head. “You’re missing the bigger picture,” he once told him,
    according to someone who heard about the conversation. Hassabis seemed to believe
    Suleyman’s view on AI was too narrowly focused on the present and that AGI would
    be better used to help DeepMind understand where humans had come from and what
    their purpose was. Hassabis suggested that climate change, for instance, was humanity’s
    destiny and that Earth probably couldn’t carry everyone on it into a long-term
    future. He said that trying to solve current problems was like playing around
    in the margins when such events were probably inevitable. He didn’t believe that
    superintelligent machines would go rogue and kill humans, as some were starting
    to fear. Instead, AGI would solve some of our most profound problems once he had
    built it.
  prefs: []
  type: TYPE_NORMAL
- en: 'Hassabis summed up that view in DeepMind’s tagline: “Solve intelligence and
    use it to solve everything else.” He put it on their slide deck for investors.'
  prefs: []
  type: TYPE_NORMAL
- en: 'But Suleyman disagreed with that vision. One day when Hassabis wasn’t around,
    he told one of DeepMind’s early staff members to change it on a slide presentation.
    It now read: “Solve intelligence and use it to make the world a better place.”'
  prefs: []
  type: TYPE_NORMAL
- en: Hassabis didn’t like that either. Later, when Hassabis was in the office again,
    he asked the same staff member to change it back. Now it said, “Use it to solve
    everything else” once again. As the two tussled on the company’s mission with
    their staff as proxies, they were avoiding direct confrontation in the most British
    way possible.
  prefs: []
  type: TYPE_NORMAL
- en: Suleyman wanted to build AGI in the way Sam Altman eventually would, by sending
    it out into the world to be immediately useful. It was better to gather feedback
    from the real world and improve than work in isolation to try to build the perfect
    system. But Hassabis wanted to run DeepMind with the end in mind, just in the
    same way he played chess. The prize wasn’t solving only real-world problems but
    the mysteries that had perplexed humankind for generations. What was our purpose,
    and did we come from a divine being?
  prefs: []
  type: TYPE_NORMAL
- en: Hassabis is coy when asked if he believes in God. “I do feel there’s mystery
    in the universe,” he says. “I wouldn’t say it’s like traditional God.” He says
    that Albert Einstein believed in “the God of Spinoza, and maybe I’d give a similar
    sort of answer.”
  prefs: []
  type: TYPE_NORMAL
- en: Baruch Spinoza was a seventeenth-century philosopher who proposed that God was
    effectively nature and everything that existed, rather than a separate being.
    It was a pantheistic view. “Spinoza thinks of nature as the embodiment of whatever
    God is,” Hassabis says. “So doing science is exploring that mystery.”
  prefs: []
  type: TYPE_NORMAL
- en: It wasn’t crazy to think that creating AGI could become a spiritual or quasi-religious
    experience akin to a divine discovery, especially if you took Spinoza’s view that
    God was equivalent to the laws of nature. By using AI to delve into those laws
    and under- stand the universe, you could theoretically puzzle out a designer.
    With its ability to analyze vast amounts of data, AI could study some of the most
    complex systems in the universe, from quantum mechanics to cosmic phenomena, and
    dig out insights into the intricate nature of existence. Using AI to create a
    simulation that mimicked the complexity of the universe could also reveal parallels
    to how our universe operated.
  prefs: []
  type: TYPE_NORMAL
- en: And if AGI research led to the conclusion that our universe was a simulation—as
    Kurzweil himself has proposed—the original programmer could well be a godlike
    entity. Similarly, if humans created a powerful machine that ingested and analyzed
    all available information about physics and the universe, that machine could also
    propose new theories that suggested the existence of a higher power. It might
    just answer deep existential questions that pointed to a divine entity. There
    were myriad ways that with greater capabilities and intelligence, AI could unlock
    one of humanity’s most profound secrets.
  prefs: []
  type: TYPE_NORMAL
- en: Hassabis’s religious background might also have made him more receptive to the
    idea of an AI oracle. A 2023 study from the University of Virginia that involved
    more than fifty thousand participants from twenty-one countries found that people
    who believed in God or thought about God more than others were more likely to
    trust advice from an AI system like ChatGPT. According to the researchers, these
    people were more receptive to AI guidance because they tended to have greater
    feelings of humility. They were also quick to recognize human flaws.
  prefs: []
  type: TYPE_NORMAL
- en: Hassabis would sometimes talk to his early DeepMind colleagues about God as
    his mind churned with questions about humankind’s origins. Several people who
    worked with Hassabis or know him personally say he was a devout Christian for
    years, and one says his primary reason for building AGI was to discover God.
  prefs: []
  type: TYPE_NORMAL
- en: '“We had many discussions about God,” says a colleague who worked with Hassabis
    around the time he cofounded DeepMind. “Could we create a machine that could work
    backwards to make sense of the universe? AGI would give you an insight into where
    we came from, and what is God.” Hassabis also believed he was running a modern-day
    Manhattan Project. He’d read *The Making of the Atomic Bomb*, and it inspired
    him to structure DeepMind’s team as Robert Oppenheimer had: focusing teams of
    scientists on subsections of a bigger problem, according to two former DeepMind
    staffers.'
  prefs: []
  type: TYPE_NORMAL
- en: But to make such an ambitious discovery, Hassabis needed money to grow DeepMind.
    Unfortunately, British investors were only offering paltry sums of £20,000 or
    £50,000 for equity in his new start-up. That wasn’t nearly enough money to hire
    the talent he needed to build AGI, never mind access the powerful computers he’d
    need too. It didn’t help that his business idea of building the world’s most powerful
    AI system seemed outlandish and overly ambitious in button-down Britain. In the
    UK, tech start-ups tended to chase “sensible” business ideas that would make money
    more quickly, like building a financial app for trading stocks and bonds. Hassabis
    and his cofounders had little choice but to look to Silicon Valley, where investors
    were willing to bet bigger amounts of money for more futuristic ideas.
  prefs: []
  type: TYPE_NORMAL
- en: Legg fortunately had an in. He’d been invited to speak at the Singularity Summit
    in June 2010, an annual conference cofounded by Kurzweil, the author who had captivated
    him as a young man, and Peter Thiel, the billionaire investor who liked putting
    his money into pioneering new technology. This was a conference where some of
    AI’s most unconventional scientists talked about technology’s awe-inspiring power
    and risks. Thiel set the tone for the event, and he was an idealist. He didn’t
    think the singularity, that moment in the future when AI would irreversibly change
    humanity, would be a problem—quite the opposite. He worried it would take too
    long to get here and that the world needed powerful AI to ward off economic decline.
  prefs: []
  type: TYPE_NORMAL
- en: With his deep pockets and enthusiasm for ambitious projects, Thiel was the perfect
    person to fund DeepMind. “We needed someone crazy enough to fund an AGI company,”
    Legg remembers. “We needed somebody who had the resources to not sweat a few million
    and liked super ambitious stuff. They also had to be massively contrarian because
    every professor [Hassabis] talked to would tell him, ‘Absolutely do not even think
    about doing this.’”
  prefs: []
  type: TYPE_NORMAL
- en: Thiel was so contrarian that he was often at odds with the rest of Silicon Valley,
    which was already full of unconventional thinkers. While most of the region voted
    liberal, he veered to the right, becoming one of President Donald Trump’s top
    donors. While most entrepreneurs believed competition drove innovation, Thiel
    argued in his book *Zero to One* that monopolies did that better. He scorned the
    conventional routes to success, encouraging smart, entrepreneurial kids to drop
    out of college and join his Thiel Fellowship. And his wacky pursuits for longevity
    and the singularity meant he fit the “crazy” criteria the DeepMind founders were
    after.
  prefs: []
  type: TYPE_NORMAL
- en: The trio decided to pitch to Thiel at the Singularity Summit. He was funding
    the event, and they figured that meant he’d be sitting in the front row. Legg
    asked the summit’s organizers if he could share his speaking slot with Hassabis.
    That way Thiel could hear directly from the former chess champ about building
    AGI with the human brain as inspiration.
  prefs: []
  type: TYPE_NORMAL
- en: Dressed in a wine-red sweater and black slacks, Hassabis was shaking when he
    took to the stage at the summit in a San Francisco hotel for a moment that would
    decide if his new company lived or died. But when he looked out at the crowd of
    hundreds of people, Thiel wasn’t in the front row. He wasn’t in the audience at
    all.
  prefs: []
  type: TYPE_NORMAL
- en: The founders thought they’d blown their chance, but then Legg got an exclusive
    invite to a party at Thiel’s Bay Area mansion, and he managed to get his cofounders
    an invite. Hassabis had learned that Thiel liked chess. Thiel had at one time
    been one of the best under-thirteen chess players in the United States. Now there
    was some common ground and an opportunity to spark some intrigue. During the party,
    Hassabis struck up a conversation with Thiel and casually mentioned the game,
    according to an account he’s shared several times with the press.
  prefs: []
  type: TYPE_NORMAL
- en: “I think one reason why chess has survived so successfully over generations
    is because the knight and bishop are perfectly balanced,” Hassabis told Thiel
    as canapés were being passed around. “I think that causes all the creative asymmetric
    tension.”
  prefs: []
  type: TYPE_NORMAL
- en: Thiel’s interest was piqued. “Why don’t you come back tomorrow and do a proper
    pitch?” he said. The trip turned out to be a success. Thiel invested £1.4 million
    into helping DeepMind bring on the singularity.
  prefs: []
  type: TYPE_NORMAL
- en: As Hassabis tried to raise more money to grow his AI company, he was faced with
    an awkward situation for an entrepreneur. His first investors weren’t necessarily
    backing him because they wanted to make money but because they had an almost moral
    belief about artificial intelligence. It meant that he’d be facing a messier kind
    of pressure over how he ran his company, to not just make money but also develop
    AI in a way that conformed to various dogmas.
  prefs: []
  type: TYPE_NORMAL
- en: One belief system gathering steam at the time was that AI needed to be built
    with great caution so that it wouldn’t break away from human control and try to
    destroy its creators. Those were the worries of another wealthy donor—with opposing
    views to Thiel—who also wanted to back DeepMind. Hassabis met that donor when
    he went to Oxford for Winter Intelligence, a conference that was on the fringe
    of computer science research, where some of the field’s most radical thinkers
    were giving talks about the challenges of controlling superintelligent AI. Moments
    after Hassabis gave his talk, a man with short blond hair and a Nordic-sounding
    accent approached him.
  prefs: []
  type: TYPE_NORMAL
- en: “Hi,” the man said as he approached Hassabis and held out his hand. “I’m Jaan.
    I’m the [cofounder] of Skype.”
  prefs: []
  type: TYPE_NORMAL
- en: Originally from Estonia, Jaan Tallinn was a computer programmer who developed
    the peer-to-peer technology underpinning Kazaa, one of the first file-sharing
    services used to pirate music and movies in the early 2000s. He repurposed that
    technology for Skype and took a stake in the free calling service before getting
    a massive windfall when eBay bought Skype for $2.5 billion in 2005\. Now he was
    sprinkling some of his winnings into other start-ups. When Tallinn heard Hassabis
    speak, his ears pricked up. He’d recently become passionate about the dangers
    of powerful artificial intelligence.
  prefs: []
  type: TYPE_NORMAL
- en: Tallinn caught the AI bug two years earlier in the spring of 2009, when he’d
    been reading some essays on a website called LessWrong. The online forum was a
    tight-knit community of members, many of them software engineers, who worried
    that AI posed an existential risk to humanity. Their guru and the site’s founder
    was a bearded libertarian named Eliezer Yudkowsky, a high-functioning high school
    dropout who taught himself the fundamentals of artificial intelligence research
    and philosophy and whose essays enthralled the site’s members. Yudkowsky was the
    kind of person Altman had been referring to when he called the AI safety community
    “high strung.” He believed that AI was more likely than anyone realized to annihilate
    humanity.
  prefs: []
  type: TYPE_NORMAL
- en: Once it got to a certain level of intelligence, for instance, AI could strategically
    hide its capabilities until it was too late for humans to control its actions.
    It could then manipulate financial markets, take control of communications networks,
    or disable critical infrastructure like electrical grids. The people who were
    building AI often had no idea that they were bringing the world closer and closer
    to its destruction, Yudkowsky wrote.
  prefs: []
  type: TYPE_NORMAL
- en: Tallinn found himself perturbed by some of these essays. He’d already been mulling
    over the conclusions of a book he had just read by Roger Penrose called *Shadows
    of the Mind*. In it, the renowned physicist and mathematician argued that the
    human mind could perform tasks that no computer ever could. The ideas that Hassabis
    and others had proposed about the brain being “mechanistic” and a useful inspiration
    for building AI didn’t hold water, because the human brain was unique. It was
    virtually impossible to replicate.
  prefs: []
  type: TYPE_NORMAL
- en: But something was nagging at Tallinn about that conclusion. What if you *could*
    simulate the human mind as an artificial intelligence? Wouldn’t that mean we were
    building something potentially dangerous? The Skype founder wanted to hear more
    from Yudkowsky, so he jotted down a list of questions, trying to pick holes in
    some of the doom-laden arguments. The best way to figure out if any of it was
    true was to meet the LessWrong founder himself.
  prefs: []
  type: TYPE_NORMAL
- en: Luckily, Tallinn was planning to fly to San Francisco for a meeting, so he sent
    Yudkowsky an email, asking if he’d like to get together for a chat. The American
    replied and agreed to coffee. When they sat down at a café in the city of Millbrae,
    a short drive from San Francisco International Airport, Tallinn started going
    through his questions. If AI was potentially dangerous, why couldn’t we just build
    it on virtual machines to separate it from other computer systems? Surely that
    would stop the AI from infiltrating our physical infrastructure and shutting down
    an electrical grid or manipulating financial markets.
  prefs: []
  type: TYPE_NORMAL
- en: Yudkowsky immediately had an answer. “It wouldn’t really be virtual,” he replied,
    sipping his drink. Electrons could flow in all sorts of different directions,
    which meant there was always going to be a way for powerful AI systems to touch
    and change the configuration of hardware.
  prefs: []
  type: TYPE_NORMAL
- en: This confirmed what Tallinn was worrying about. One day, he thought, AI could
    develop its own infrastructure and its own computer substrate. The possibilities
    after that were terrifying in their scope.
  prefs: []
  type: TYPE_NORMAL
- en: “It could terraform and geo-engineer the planet and possibly the sun,” he says
    today. When scientists argued that AI was just math and that there was no need
    to fear it, Tallinn liked to point to the analogy of the tiger. “You could argue
    that a tiger is just a bunch of biochemical reactions, and there’s no point in
    being afraid of those.” But a tiger is also a collection of atoms and cells that
    can do plenty of damage if not kept in check. Similarly, AI might just be a collection
    of advanced math and computer code, but when put together in the wrong way, it
    could be incredibly dangerous.
  prefs: []
  type: TYPE_NORMAL
- en: By the time Tallinn found himself listening to Hassabis speak at the Oxford
    conference two years later, he’d become a convert to the teachings of AI doom.
    He’d been devouring Yudkowsky’s essays since that meeting in the café and had
    steeped himself in a new field of research called AI alignment, where scientists
    and philosophers were figuring out how best to “align” artificial intelligence
    systems with human goals.
  prefs: []
  type: TYPE_NORMAL
- en: “I had been alignment pilled,” Tallinn remembers. And he now believed in some
    of the more extreme scenarios about a future AI that Yudkowsky had been sketching
    out.
  prefs: []
  type: TYPE_NORMAL
- en: After some initial chitchat, Tallinn wanted to see if Hassabis would be willing
    to work more closely together. “Do you want to have a Skype meeting sometime?”
    he asked the British entrepreneur.
  prefs: []
  type: TYPE_NORMAL
- en: Hassabis and the wealthy Estonian spoke again, and Tallinn eventually became
    one of DeepMind’s first investors alongside Peter Thiel. His goal wasn’t just
    to make money but to keep an eye on Hassabis’s progress and make sure he didn’t
    inadvertently create a horrifying, rogue AI. Tallinn saw himself as an evangelist
    for Yudkowsky’s ideas. He wanted to use his credibility as a deep-pocketed investor
    to help expose his warnings to the world’s most promising AI builders.
  prefs: []
  type: TYPE_NORMAL
- en: “Eliezer is an autodidact and didn’t have much clout outside his small community,”
    Tallinn explains. “I thought I could start selling those arguments to people who
    wouldn’t listen to Eliezer but would listen to me.”
  prefs: []
  type: TYPE_NORMAL
- en: Once he was an investor, Tallinn pushed DeepMind to focus on safety. He knew
    that Hassabis wasn’t as worried about the apocalyptic risks of AI as he was, so
    he put pressure on the company to hire a team of people that would study all the
    different ways they could design AI to keep it aligned with human values and prevent
    it from going off the rails.
  prefs: []
  type: TYPE_NORMAL
- en: DeepMind was about to get another investor with even deeper pockets who also
    wanted to steer it in a safe direction. Back in Silicon Valley, rumors were swirling
    of Peter Thiel’s involvement in a promising but secretive new start-up in London,
    UK, that was trying to build artificial general intelligence. Some of the region’s
    other technology billionaires were starting to hear about it, and one of them
    was Elon Musk. In 2012, two years after cofounding DeepMind, Hassabis was mingling
    at an exclusive conference in California that Thiel had organized when he bumped
    into Musk.
  prefs: []
  type: TYPE_NORMAL
- en: “We hit it off straight away,” Hassabis says. The British entrepreneur knew
    that this could be an opportunity to raise more money to expand DeepMind’s research—and
    he also really wanted to see Musk’s rocket factory. Musk was establishing himself
    as a maverick tycoon who wanted to send humans to Mars with his company SpaceX.
    Hassabis arranged to meet Musk at the company’s headquarters in Los Angeles.
  prefs: []
  type: TYPE_NORMAL
- en: 'Later the two men were sitting across from each other at the company’s canteen,
    amid rocket parts, and found themselves having a debate over who worked on the
    most historically important project: interplanetary colonization or developing
    super AI.'
  prefs: []
  type: TYPE_NORMAL
- en: “Humans will need to be able to escape to Mars if AI gets out of control,” Musk
    said, according to a *Vanity Fair* article that recounted the meeting.
  prefs: []
  type: TYPE_NORMAL
- en: '“I think the AI would be able to follow everybody to Mars,” replied Hassabis,
    who seemed amused. Musk was not. While Tallinn had been influenced by the online
    writings of Yudkowsky, Musk had been moved by someone else: an Oxford philosopher
    named Nick Bostrom.'
  prefs: []
  type: TYPE_NORMAL
- en: Bostrom had written a book called *Superintelligence*, and it was causing a
    stir among people working on AI and frontier technology. In the book, Bostrom
    warned that building “general” or powerful AI could lead to a disastrous outcome
    for humans, but he pointed out that it might not necessarily destroy us because
    it was malevolent or power-hungry. It might just be trying to do its job. For
    instance, if it was given the task of making as many paper clips as possible,
    it might decide to convert all of Earth’s resources and even humans into paper
    clips as the most effective way to fulfill its objective. His anecdote spawned
    a saying in AI circles, that we need to avoid becoming “paper-clipped.”
  prefs: []
  type: TYPE_NORMAL
- en: 'Musk went ahead and put some money into DeepMind too. While Hassabis finally
    had some financial security, it wasn’t a lot. He was still pursuing something
    that was highly experimental and so crazy that even some of the world’s richest
    men didn’t want to bet too much money on his success. Their money also came with
    ideological strings attached: Tallinn and Musk watched DeepMind’s work with an
    unusual amount of suspicion and wariness for investors. They wanted DeepMind to
    financially succeed, sure, but they also didn’t want DeepMind to build too quickly
    or in a way that would put humanity in danger. That put Hassabis in an awkward
    position. He was grateful for their money, but he didn’t believe in the doom-heavy
    scenarios that Tallinn and Musk did.'
  prefs: []
  type: TYPE_NORMAL
- en: As it happened, that sense of financial security didn’t last very long. Hassabis
    and Suleyman were struggling to make enough money to cover the costs of paying
    the best AI minds in the world, and some of their ideas for generating revenue
    were all over the place. They tried setting up a website that used deep learning—a
    type of machine learning that DeepMind initially specialized in—to give people
    fashion advice and recommend clothes. Then Hassabis asked some of his staff who
    he’d managed at Elixir, and who now worked at DeepMind, to design a video game.
    The engineers pulled together a space-faring adventure where a crew of astronauts
    had to race to the moon in a rocket, according to a former DeepMind staffer. They
    were just gearing up to release the game as an iPhone app when Hassabis was presented
    with a new opportunity, something that would give him the financial backing he
    needed to make AGI a reality. It was an offer from Facebook.
  prefs: []
  type: TYPE_NORMAL
- en: Mark Zuckerberg was on an acquisition tear. About a year earlier, he had bought
    Instagram for $1 billion in what would become a masterstroke of social media consolidation.
    And he was just months away from paying an eye-watering $19 billion to the founders
    of WhatsApp. He was ready to spend whatever he needed to grow the Facebook empire,
    and artificial intelligence was going to be an important part of that. Facebook
    made about 98 percent of its money from selling ads, but to sell more advertisements
    and keep growing, Zuckerberg needed people to spend more and more time on his
    sites. DeepMind’s dozens of talented AI scientists could help. With smarter recommendation
    systems that could trawl through the personal data of their users, smarter algorithms
    behind Facebook and Instagram could show people the right pictures, posts, and
    videos to keep them scrolling for longer.
  prefs: []
  type: TYPE_NORMAL
- en: Zuckerberg offered Hassabis $800 million for DeepMind, not including the bonus
    that start-up founders typically got after staying with their acquired company
    for four or five years, according to a person familiar with the offer. It was
    a generous bid and more money than Hassabis had ever dreamed of. He now found
    himself at a crossroads. Until now, DeepMind’s money had been coming from people
    who wanted him to build AI as carefully as possible. Now it could come from someone
    who wanted them to build it much more quickly. Facebook’s motto after all was
    “Move fast and break things.”
  prefs: []
  type: TYPE_NORMAL
- en: Hassabis and Suleyman talked about how to approach the situation. AGI was going
    to be more powerful than even Zuckerberg realized, and they felt they needed something
    in place to prevent a big corporate acquirer from steering AI in a potentially
    harmful direction. They couldn’t just have Facebook sign a contract and promise
    not to misuse AGI. Thinking back to his previous work with nonprofit groups, Suleyman
    told Hassabis and Legg that they needed some sort of governance structure that
    could keep a close eye on Facebook and make sure it was careful in how it used
    DeepMind’s technology.
  prefs: []
  type: TYPE_NORMAL
- en: Public companies typically have a board of directors whose job is to represent
    the interests of shareholders. Those directors will meet every quarter and scrutinize
    the company’s actions to make sure that it’s doing all the right things to help
    its stock go up instead of down. Suleyman told his cofounders that DeepMind should
    have a different kind of board to deal with technology as transformative as AI.
    Instead of focusing on money, their job would be to make sure DeepMind was building
    AI as safely and ethically as possible. Hassabis and Legg weren’t convinced at
    first, but Suleyman was persuasive and they eventually agreed to the idea.
  prefs: []
  type: TYPE_NORMAL
- en: Hassabis went back to Zuckerberg and told him that if they were going to sell,
    DeepMind would need to have this ethics and safety board in place and that it
    would need to have separate legal authority to control any superintelligent AI
    that DeepMind eventually built. Zuckerberg balked at the demand. He wanted to
    grow Facebook’s advertising business and “connect the world” through his various
    social media platforms, not run a separate AI company with a bunch of ethical
    protocols and its own grand mission. The talks fell apart.
  prefs: []
  type: TYPE_NORMAL
- en: Outwardly, Hassabis told his employees that DeepMind would stay independent
    for another twenty years. But privately he was tired of fundraising and frustrated
    that he was only spending a fraction of his time on actual research. Having just
    rejected a huge offer from Zuckerberg, it was hard to ignore how much money he
    could make from selling to a company in Silicon Valley, especially now that Big
    Tech was suddenly salivating over AI. Senior executives from Silicon Valley’s
    biggest companies, including a billionaire or two, were now calling DeepMind’s
    researchers regularly to try to poach them. Many of the company’s staff were experts
    in deep learning, which for years had seemed like a backwater in the field until
    just recently.
  prefs: []
  type: TYPE_NORMAL
- en: The turning point had come in 2012\. A Stanford AI professor named Fei-Fei Li
    had created an annual challenge for academics called ImageNet, to which researchers
    submitted AI models that tried to visually recognize images of cats, furniture,
    cars, and more. That year, scientist Geoffrey Hinton’s team of researchers used
    deep learning to create a model that was far more accurate than anything before,
    and their results stunned the AI field. Suddenly everybody wanted to hire experts
    in this deep-learning AI theory inspired by how the brain recognized patterns.
  prefs: []
  type: TYPE_NORMAL
- en: It was a tiny field with just a few dozen experts, says Legg. “We’d hired quite
    a few of them.” Hassabis was paying them about $100,000 a year, but tech giants
    like Google and Facebook would pay several times that much. “We were having seriously
    famous people cold-calling our researchers offering them three times their salary,”
    Legg remembers. Zuckerberg was one of those famous people, according to a former
    DeepMind employee. “We had to sell otherwise we would have been torn to pieces.”
    And with Hassabis eager to be the first to build AGI, he couldn’t wait for the
    better-resourced tech companies to get there before him.
  prefs: []
  type: TYPE_NORMAL
- en: Out of nowhere came another offer to buy DeepMind, this time from its investor
    Elon Musk. The billionaire offered to pay for the company with shares of Tesla,
    the electric car company he’d been running for the last five years, according
    to a person who was familiar with the deal. Musk had been a hands-off investor
    and only occasionally checked in with Hassabis. Despite his growing fears about
    the dangers of AI, the billionaire’s commercial goals were also at the forefront
    of his mind. He wanted Tesla cars to be the first in the world to successfully
    use self-driving technology, which meant he needed more cutting-edge experts in
    artificial intelligence. Now he could get an elite army of them by purchasing
    DeepMind.
  prefs: []
  type: TYPE_NORMAL
- en: But once again DeepMind’s founders were wary. Getting paid in Tesla stock didn’t
    seem all that appealing. They also felt uneasy about someone like Musk taking
    control of AGI. Although he was just starting to gain mainstream fame as a forward-thinking
    tycoon, Musk had a reputation in tech circles for being capricious, firing staffers
    out of the blue and ousting the cofounder of Tesla.
  prefs: []
  type: TYPE_NORMAL
- en: As much as the DeepMind founders appreciated his investment and connections,
    they were leery of his erratic behavior. They declined his offer, too, not realizing
    how much the thin-skinned Musk didn’t like it when people said no or how much
    that decision might come back to haunt them. Soon enough though, Hassabis got
    another email. It was from Google.  <hgroup>
  prefs: []
  type: TYPE_NORMAL
- en: '[CHAPTER 5](contents.xhtml#c_ch5) [For Utopia, for Money](contents.xhtml#c_ch5)'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: </hgroup>
  prefs: []
  type: TYPE_NORMAL
- en: The message came from an executive at Google’s headquarters more than five thousand
    miles away in sunny Mountain View, California. As Hassabis opened it up on his
    computer in London, he saw an invitation to meet with Larry Page, Google’s CEO.
    Page had cofounded Google with a fellow Stanford University PhD student named
    Sergey Brin in 1998\. The two had wanted to improve the way people searched the
    internet, and they did that by making an algorithm called PageRank, which classified
    web pages based on their relevance and interconnections. Starting in a friend’s
    garage in Menlo Park, California, they eventually created one of the world’s biggest
    technology companies.
  prefs: []
  type: TYPE_NORMAL
- en: 'But when it came to how Google made money today, that process wasn’t very high-tech
    or innovative: it had become an enormous advertising company, like Facebook. The
    vast majority of Google’s profits and revenues came from tracking people’s personal
    information to target them with ads, through search, YouTube, and Gmail, and on
    millions of websites and apps that used the Google Display Network.'
  prefs: []
  type: TYPE_NORMAL
- en: There was something a little disconcerting about that for someone like Hassabis,
    who wanted to use AI to help the world. But he also knew that if he didn’t bite,
    Google could end up poaching his staff and maybe build AGI without him. It already
    had hundreds more engineers working on artificial intelligence, and Hassabis decided
    that he couldn’t decline the meeting request from California.
  prefs: []
  type: TYPE_NORMAL
- en: When he met Page, Hassabis felt like he was speaking to another kindred spirit.
    Before him was an introverted mathematics grad with dark, bushy eyebrows, who
    dressed in casual shirts and shorts. Throughout his time building Google, Page
    had nurtured a dream to create powerful artificial intelligence too. “He told
    me that he always thought of Google as an AI company, even when he was in that
    garage in 1998,” Hassabis remembers.
  prefs: []
  type: TYPE_NORMAL
- en: Partly it was personal, as Page’s father had been a professor of artificial
    intelligence and computer science until his death in 1996\. That made him a kind
    of second-generation AI technologist. Page admired how serious Hassabis was about
    building AGI, and he didn’t think it was a wacko idea. He’d already green-lit
    another internal effort at Google to build humanlike AI, too, an effort that would
    end up sparking an intense rivalry with Hassabis down the line.
  prefs: []
  type: TYPE_NORMAL
- en: Page’s project, which Hassabis didn’t know about at the time, was called Google
    Brain. It had come about as a proposal from Andrew Ng, a gentle-voiced Stanford
    University professor who wanted to build more advanced AI systems from inside
    Google. In 2011, a few years before Google reached out to DeepMind, this professor
    had sent a four-page document to Page titled “Neuroscience-Informed Deep Learning.”
    Professor Ng was hoping the Google CEO would greenlight a project for him to build
    “general purpose” AI systems, which was what Hassabis was working on in England.
  prefs: []
  type: TYPE_NORMAL
- en: It turned out that Ng and Hassabis approached their goals with similar methods,
    both looking to neuroscience as an inspiration for building AGI. In his proposal,
    the Stanford professor told Page that he would build “increasingly accurate approximations
    to small parts of the mammalian brain.”
  prefs: []
  type: TYPE_NORMAL
- en: Even for someone like Ng, who was already a leading figure in the field of artificial
    intelligence working for one of the world’s most prestigious universities, the
    idea of building AGI at the time was controversial. “My friends were advising
    me that this was just kind of weird. They said, ‘It’s not good for your career,’”
    Ng remembers.
  prefs: []
  type: TYPE_NORMAL
- en: In one sense, they were right. When it came to the science, there were some
    problems with Ng’s and Hassabis’s obsession with the human brain. In theory, it
    made sense to use our gray matter as a template for artificial intelligence, but
    copying what we find in biology doesn’t always work. Think of those very first
    attempts at creating flying machines and the inventors who built contraptions
    that mimicked the mechanics of birds. They ended up flapping their bulky wing
    machines straight into the ground. Other computer scientists had been hitting
    a wall in their efforts to copy the brain too closely. In 2013, neuroscientist
    Henry Markham said in a TED Talk that he’d figured out how to simulate an entire
    human brain on supercomputers and that he would achieve it within a decade. Ten
    years later, his Human Brain Project had cost more than $1 billion and largely
    failed.
  prefs: []
  type: TYPE_NORMAL
- en: Over the years, Ng, Hassabis, and other AI scientists would realize how difficult
    it was to emulate the brain when our understanding of it was still so incomplete,
    from the functions of neutrons to the dynamics of brain regions. Though we knew
    there were around ninety billion neurons constantly firing in our skulls, we still
    didn’t know how that information was being processed.
  prefs: []
  type: TYPE_NORMAL
- en: '“In hindsight, trying to be so true to biology was a mistake,” Ng says. But
    Ng’s research got another part of the science very right: making his neural networks
    bigger.'
  prefs: []
  type: TYPE_NORMAL
- en: A neural network is a type of software that gets built by being trained over
    and over with lots of data. Once it’s been trained, it can recognize faces, predict
    chess moves, or recommend your next Netflix movie. Also known as a “model,” a
    neural network is often made up of many different layers and nodes that process
    information in a vaguely similar way to our brain’s neurons. The more the model
    is trained, the better those nodes get at predicting or recognizing things.
  prefs: []
  type: TYPE_NORMAL
- en: Ng discovered that these models could do more things if they had more nodes,
    layers, and data to train on. Years later, OpenAI would make a similar discovery
    about the importance of “scaling up” on these key ingredients. During his experiments
    at Stanford, Ng noticed that his deep-learning models performed much better when
    they were bigger. The results excited him, and then compelled him to send his
    four-page proposal to Page, suggesting he might be able to build “large-scale
    brain simulations” as a step toward “human-level AI.”
  prefs: []
  type: TYPE_NORMAL
- en: Page loved the idea and approved it, bringing Ng on board to lead Google’s most
    cutting-edge AI research project yet. But a few years later, Google Brain didn’t
    look like it was on course to build AGI. Instead, it was helping Google improve
    its targeted advertising business—making its ads even more creepily accurate for
    users by getting better at predicting what people would want to click on—and growing
    the company’s revenues. Ng admits that wasn’t what he’d been aiming for when he
    sent his proposal to Page. “It is not the most inspiring thing I’ve worked on,”
    he says.
  prefs: []
  type: TYPE_NORMAL
- en: What Ng had really wanted to do with his scientific research was free humanity
    from mental drudgery, in the same way the Industrial Revolution had liberated
    us from constant physical labor. Stronger AI systems would do the same for professional
    workers, he believed, “so we can all pursue intellectually more exciting, high-level
    tasks.”
  prefs: []
  type: TYPE_NORMAL
- en: But Ng’s approach to doing that was where he differed from Hassabis. While the
    British entrepreneur wanted as much independence from the advertising giant as
    possible, Professor Ng was happy to work inside the belly of the beast at Google.
    In that sense, Ng had done Hassabis a huge favor. By basing himself in the Google
    mothership, Ng’s research was already on track to contribute to the company’s
    ad business so that DeepMind didn’t immediately have to.
  prefs: []
  type: TYPE_NORMAL
- en: By the time Google first reached out to DeepMind about buying the company in
    late 2013, Ng’s researchers were already sucked into building sophisticated AI
    models to power Google’s advertising tools, drawing them away from Ng’s loftier
    goal of building all-powerful AI that could free humanity from drudgery. Now as
    Page flew to London to negotiate the purchase of DeepMind, he knew he could spend
    some of Google’s money on something a little more out there.
  prefs: []
  type: TYPE_NORMAL
- en: The DeepMind founders greeted the Google billionaire at their London office,
    giving a presentation about the company’s research so far, according to *Genius
    Makers*, the book by *New York Times* writer Cade Metz. Hassabis described how
    his team had developed a new technique called reinforcement learning to train
    an AI system to master the retro Atari game *Breakout*. In the game, you hit a
    ball up into a wall of bricks with a paddle that you slid from side to side. Within
    about two hours, the system had learned to knock the ball into exactly the right
    spot so that it would break a tunnel into the narrow space behind the top row
    of bricks, knocking out handfuls of them at a time. Page was impressed.
  prefs: []
  type: TYPE_NORMAL
- en: As a technique, reinforcement learning wasn’t all that different to how you
    might reward a dog with treats whenever it sits on command. In training AI, you
    would similarly reward the model, perhaps a numerical signal like a +1, to show
    that a certain outcome was good. Through repeated trial and error, and playing
    hundreds of games over and over, the system learned what worked and what didn’t.
    It was an elegantly simple idea wrapped in highly sophisticated computer code.
  prefs: []
  type: TYPE_NORMAL
- en: 'Legg then gave a presentation to Page about where that could lead next: applying
    these techniques to the real world. In the same way their system had mastered
    a video game, they could similarly teach a robot to find its way around a home
    or an autonomous agent to navigate the English language. That’s where DeepMind’s
    discoveries and AGI itself would eventually have the most impact. Page and his
    team were sold.'
  prefs: []
  type: TYPE_NORMAL
- en: Page led the deal negotiations with Hassabis and his cofounders, knowing that
    they’d already rejected a big offer from Facebook. He was about to find out why.
    Hassabis said he had two big conditions for selling. First, he and his cofounders
    didn’t want Google to ever use DeepMind’s technology for military purposes, whether
    that was for steering autonomous drones or weapons or supporting soldiers in the
    field. He and his cofounders saw these as ethical red lines that Google should
    never cross.
  prefs: []
  type: TYPE_NORMAL
- en: Second, they wanted Google’s leaders to sign what they called an ethics and
    safety agreement. Drawn up by lawyers in London, it was a contract that gave control
    of any future artificial general intelligence technology that DeepMind created
    to an ethics board that Hassabis and his cofounder Suleyman would pull together.
    They still only had a vague idea of who should be on it, but they wanted it to
    have complete legal oversight of the powerful AI they would eventually build.
  prefs: []
  type: TYPE_NORMAL
- en: “If we were successful, [AGI] would need careful handling,” Hassabis says about
    the board that he and his cofounders wanted. “Because it’s such an all-purpose
    technology, this could be one of the most powerful ever, and we wanted to make
    sure we were aligned with people who were also going to take the responsibility
    of that seriously.”
  prefs: []
  type: TYPE_NORMAL
- en: Not surprisingly, it took months of difficult negotiations to get Google to
    agree to the very same condition that had been a deal-breaker for Facebook. Buying
    DeepMind meant Page could own the first company to build AGI. He knew that if
    this ethics board had legal control of that technology, it could become much harder
    for Google as a company to profit from it, but in the end, Page’s idealistic outlook
    won out. They would find a way to make it work. He agreed to DeepMind’s demands
    for an ethics board as part of the acquisition.
  prefs: []
  type: TYPE_NORMAL
- en: AGI didn’t only need careful handling because of where a corporate giant could
    take it in the future. It was also at the center of several growing ideologies
    that could steer the technology in different directions. Hassabis had gotten a
    taste of that from investors like Peter Thiel, who wanted AI development to move
    faster, and Jaan Tallinn, who feared the young British entrepreneur might spark
    an apocalypse.
  prefs: []
  type: TYPE_NORMAL
- en: AI’s mind-bending potential gave it an almost religious attraction to people
    with strong beliefs about how it should be used. Over the next few years, these
    ideological forces would collide with the innovators and the corporate monopolies
    who were battling to control AGI, becoming an unpredictable hazard for the technology.
    They would push Sam Altman out of OpenAI, for instance, and paradoxically boost
    the commercial efforts of companies, painting an apocalyptic picture of AI’s power
    that ended up making the software more attractive to businesses. Mixed in with
    the world of business and profit, more AI builders were finding themselves devoutly
    following different dogmas, from building AI as quickly as possible to bring about
    utopia to stoking fears that it could cause Armageddon.
  prefs: []
  type: TYPE_NORMAL
- en: As a strategic thinker who liked to hedge his bets, Hassabis found himself largely
    outside of these warring dogmas, thanks in part to his own unique goals of making
    big and possibly divine discoveries with AGI, according to people who knew him.
    Suleyman was also more concerned about societal problems that AI could cause sooner.
    Of the three cofounders, Shane Legg was most aligned with the more extreme ideologies
    linked to the pursuit of AGI, including one that had been decades in the making,
    according to his former colleagues. Known as transhumanism, the idea had controversial
    roots and a history that helped explain why AI’s builders sometimes neglected
    the nasty, more current side effects of the technology.
  prefs: []
  type: TYPE_NORMAL
- en: The basic premise of transhumanism is that the human race is currently second-rate.
    With the right scientific discoveries and technology, we might one day evolve
    beyond our physical and mental limits into a new, more intelligent species. We’ll
    be smarter and more creative, and we’ll live longer. We might even manage to meld
    our minds with computers and explore the galaxy.
  prefs: []
  type: TYPE_NORMAL
- en: The core idea stems back to the 1940s and 1960s when an evolutionary biologist
    named Julian Huxley joined and ran the British Eugenics Society. The eugenics
    movement proposed that humans should improve themselves through selective breeding,
    and it flourished in British universities and among the country’s intellectual
    and upper classes. Huxley himself came from an aristocratic family (his brother
    Aldous wrote *Brave New World*), and he believed society’s upper crust was genetically
    superior. Lower-class people needed to be weeded out like a bad crop and subjected
    to forced sterilization. “[They] are reproducing too fast,” Huxley wrote.
  prefs: []
  type: TYPE_NORMAL
- en: 'When the Nazis latched on to the eugenics movement, Huxley decided it needed
    a rebrand. He coined a new term, *transhumanism*, in an essay saying that alongside
    proper breeding, humanity could also “transcend itself” through science and technology.
    The movement picked up steam in the 1980s and 1990s when the growing field of
    artificial intelligence offered a tantalizing new possibility: perhaps scientists
    could enhance the human mind by merging it with intelligent machines.'
  prefs: []
  type: TYPE_NORMAL
- en: This idea was crystallized in the concept of the singularity, a point in the
    future when AI and technology became so advanced that humankind would undergo
    dramatic and irreversible change, merging with machines and enhancing themselves
    with technology. The idea captivated Legg through the book that he read when he
    was younger as well as DeepMind’s wealthy backer, Peter Thiel. So keen were technologists
    to experience this utopia that some, like Altman and Thiel, had signed up with
    different companies to have their brain or whole body cryopreserved in case they
    couldn’t manage that mind-meld before death. “I don’t necessarily expect it to
    work,” Thiel told journalist Bari Weiss on her podcast. “But I think it’s the
    sort of thing we’re supposed to try to do.”
  prefs: []
  type: TYPE_NORMAL
- en: The problem with some of these ideas was that, over the years, their followers
    grew increasingly zealous. Some so-called AI accelerationists, for instance, believe
    that scientists have a moral imperative to work as quickly as possible to build
    AGI to create a posthuman paradise, a kind of rapture for nerds. If it was built
    in their lifetimes, they could live forever. But speeding up AI’s development
    could also mean cutting corners and making technology that harmed certain groups
    of people or that could spin out of control.
  prefs: []
  type: TYPE_NORMAL
- en: That’s where others took the opposite stance, believing that AI represented
    a kind of devil figure of the future that needed to be stopped. Eliezer Yudkowsky,
    the bearded libertarian who helped radicalize Jaan Tallinn over coffee, was a
    leading figure in that ideological movement, which he gave increasing momentum
    through his site LessWrong. By the time Google had bought DeepMind in 2014, hundreds
    of people, including AI researchers, were engaging in philosophical debates on
    the site over how they could prevent a powerful superintelligence of the future
    from causing annihilation. LessWrong had become the internet’s most influential
    hub for AI apocalypse fears, and some press reports pointed out that it had all
    the trappings of a modern doomsday cult. When a member suggested a novel way AI
    could destroy humans in the future, Yudkowsky publicly laid into them in all caps
    and kicked them out of the group.
  prefs: []
  type: TYPE_NORMAL
- en: Over time, so-called AI doomers gained enough support among wealthy technologists
    to pour money into starting companies and shaping government policy to help their
    agenda. And Yudkowsky’s site would become so influential that many of its avid
    readers would end up joining OpenAI.
  prefs: []
  type: TYPE_NORMAL
- en: But perhaps the most disturbing ideologies that were starting to percolate around
    AGI were those focused on creating a near-perfect human species in digital form.
    This idea was popularized in part by Bostrom’s *Superintelligence*. The book had
    a paradoxical impact on the AI field. It managed to stoke greater fear about the
    destruction that AI could bring by “paper-clipping us,” but it also predicted
    a glorious utopia that powerful AI could usher in if created properly. One of
    the most captivating features of that utopia, according to Bostrom, was “posthumans”
    who would have “vastly greater capacities than present human beings” and exist
    in digital substrates. In this digital utopia, humans could experience environments
    that defied the laws of physics, like dying unaided or exploring fantastical worlds.
    They could choose to relive cherished memories, create new adventures, or even
    experience different forms of consciousness. Interactions with other humans would
    become more profound, because these new humans would be able to share thoughts
    and emotions with one another directly, leading to deeper connections.
  prefs: []
  type: TYPE_NORMAL
- en: 'These ideas were irresistible to some people in Silicon Valley, who believed
    such fantastical ways of life were achievable with the right algorithms. By painting
    a future that could look like either heaven or hell, Bostrom sparked a prevailing
    wisdom that would eventually drive the Silicon Valley AI builders like Sam Altman
    to race to build AGI before Demis Hassabis did in London: *they* had to build
    AGI first because only *they* could do so safely. If not, someone else might build
    AGI that was misaligned with human values and annihilate not just the few billion
    people living on Earth but potentially trillions of perfect new digital human
    beings in the future. We would all lose the opportunity to live in nirvana. Along
    the way, Bostrom’s ideas would also have dangerous repercussions as they drew
    attention away from studying how artificial intelligence could harm people living
    in the present.'
  prefs: []
  type: TYPE_NORMAL
- en: As these modern-day technological ideologies coincided with DeepMind’s negotiations
    with Google, a hard truth was coming to bear. Figuring out a responsible form
    of stewardship for AI was becoming fraught for tech companies. Different objectives
    were on track to crash into one another, driven by an almost religious zealotry
    on one side and an unstoppable hunger for commercial growth on the other.
  prefs: []
  type: TYPE_NORMAL
- en: For now and thanks to his own personal reasons for wanting to chase AGI, Hassabis
    was keeping these battling ideologies at arm’s length. He was in England, living
    thousands of miles away from the Silicon Valley bubble, and he had surrounded
    himself with a team of spectacularly clever AI scientists and engineers, a team
    that was about to grow even larger. Hassabis resolved that he would crack the
    conundrum of AGI in the next five years, most likely earning a Nobel Prize along
    the way, according to people who worked with him. It didn’t matter that he was
    being folded into a corporate Goliath. Once he had built AGI, the concept of economics
    would become antiquated, and DeepMind and Google wouldn’t have to worry about
    making money. AI would solve that problem away.
  prefs: []
  type: TYPE_NORMAL
- en: When the deal was finally inked and the ethics board added to the acquisition
    agreement, Google was buying DeepMind for $650 million. It was considerably less
    than what the founders would have gotten from Zuckerberg but a huge amount of
    money for a British technology company, and it came with that all-important agreement
    to keep control of AGI out of the hands of a large corporation.
  prefs: []
  type: TYPE_NORMAL
- en: Google’s influx of cash also meant Hassabis could headhunt even more talented
    researchers. While some staff didn’t like selling out to Google, many were elated
    at their huge pay rises and even more lucrative stock options in Google, which
    made them much less likely to jump ship to other technology firms. Now instead
    of worrying about Facebook or Amazon poaching his staff, Hassabis could poach
    *their* staff and lure some of the greatest AI minds from academia with eye-popping
    salaries. As he got the company on track to make even more advanced technology,
    Hassabis maintained DeepMind’s secretive culture, to the point that the company’s
    main website remained just a blank page with a circular logo in the middle. So
    mysterious was the AI lab that when people applied for jobs at DeepMind’s headquarters
    in London, staffers wouldn’t even put the company’s address in an email. A representative
    would meet the candidates at the nearby Kings Cross train station and lead them
    to the office on foot.
  prefs: []
  type: TYPE_NORMAL
- en: 'In job interviews, the founders were persuasive, Suleyman especially, according
    to one former executive: “He was hugely charismatic, communicating that this is
    a once-in-a-lifetime opportunity to be part of something that was going to change
    the world.”'
  prefs: []
  type: TYPE_NORMAL
- en: Academics and civil servants who’d spent a decade or more in their careers,
    and who could have easily gone into other high-paying roles in the private sector,
    would walk out of a twenty-minute conversation with Suleyman convinced that they
    should help build AGI. “He explained that the revolution would be built on better
    math,” the former exec adds. Hassabis and Suleyman would say they were hiring
    “the best mathematicians and physicists in the world.” And now thanks to being
    part of Google, they had access to the world’s best supercomputers and the most
    data for training AI models too.
  prefs: []
  type: TYPE_NORMAL
- en: About 50 percent of DeepMind’s recruits were now coming from academia, and they
    could hardly believe their luck. They’d gone from being squashed up against filing
    cabinets and begging for grant money to a place with gleaming offices in the middle
    of cosmopolitan restaurants and gardens, boasting ultrafast computers and virtually
    unlimited resources. And the best part was that DeepMind made sure you didn’t
    feel like you were working for an advertising giant. You were conducting research
    at a prestigious scientific organization that published papers in peer-reviewed
    journals like *Science* and *Nature* and solving the world’s biggest problems.
    It was the best of both worlds, if such a thing were possible.
  prefs: []
  type: TYPE_NORMAL
- en: In the long run, it wasn’t. But the six-figure salaries and unbelievable benefits
    made DeepMind staffers forget how odd it was to be getting paid so spectacularly
    well by Google to simply make the world a better place. Occasionally these moments
    of incongruity would poke through, such as when old colleagues from the grubby
    world of academia or the civil service would ask to come and visit.
  prefs: []
  type: TYPE_NORMAL
- en: “I used to be embarrassed,” says one former staffer, who had joined DeepMind
    from an academic job. When his former coworkers asked if they could see his new
    office, the staffer talked them out of it. He suggested visiting a nearby restaurant
    instead. Even that would be a little more modest than the DeepMind canteen, which
    served the kind of five-star buffet you’d find in a Dubai hotel. “It felt so separate
    from the real world,” they add. “It was actually ridiculous.”
  prefs: []
  type: TYPE_NORMAL
- en: Researchers were treated like rock stars and waited on hand and foot. One of
    them once emailed DeepMind’s staff-support service, which was normally used for
    expenses or getting visas, to say that it’d be a more efficient use of time if
    all the strawberries had their leafy caps removed. Two days later, the buffet
    had bowls of gleaming, hulled strawberries with not a speck of green.
  prefs: []
  type: TYPE_NORMAL
- en: Staff were endlessly reminded about the vision of building AGI, with Hassabis
    often telling them that at their current rate of research and breakthroughs, their
    end goal was just five years away. Hassabis was a master at painting an inspiring
    vision of where the company was heading, according to people who worked at DeepMind.
    At team off-site gatherings, he and Suleyman would give presentations about strategy
    that felt more like pep rallies than an explanation about specific future steps.
    The founders often didn’t go into granular detail about tactics.
  prefs: []
  type: TYPE_NORMAL
- en: “It was all very vision-led, and ‘Let’s get on board with the mission,’” says
    a former staffer. “Demis and Mustafa were extraordinary, amazing storytellers.
    They balanced each other incredibly well.” Hassabis was the serious brain who
    read scientific papers late into the night, who talked through methodologies for
    hours with his top researchers, and who also tended not to consort with lower-ranked
    staff who didn’t have PhDs. It was Hassabis who fashioned a deeply hierarchical
    culture at DeepMind that was largely based on academic repute. Suleyman was the
    charismatic visionary when it came to rendering a vision of the future that everyone
    was working toward. One former staffer says he was like DeepMind’s pied piper.
    Legg, the most academic of the trio, faded into the background somewhat. “Shane
    was quieter,” the staffer says.
  prefs: []
  type: TYPE_NORMAL
- en: 'Hassabis believed so fervently in the transformative effects of AGI that he
    told DeepMind’s staff they wouldn’t have to worry about making money in about
    five years, because AGI would make the economy obsolete, former employees say.
    That eventually became mainstream thinking among the senior managers. “They’d
    drunk their own Kool-[A]id,” says one former executive. They thought: “We are
    creating the technology that is the most important that humans have ever seen.”'
  prefs: []
  type: TYPE_NORMAL
- en: Behind the scenes, Hassabis and Suleyman were putting together the ethics and
    safety board that Google had agreed to as a condition for buying DeepMind because
    they knew they needed a fail-safe, with Suleyman its main advocate. Google had
    a fiduciary duty to its shareholders to grow its profits every year, which it
    continued to do very successfully. While that gave DeepMind the talent and computing
    resources it needed to build AGI, the situation was a double-edged sword. When
    they *did* create AGI, Google would almost certainly want to monetize and control
    it. They weren’t sure how, exactly, but the board would at least make sure their
    human-level AI wouldn’t be misused.
  prefs: []
  type: TYPE_NORMAL
- en: About a year after the acquisition, DeepMind convened its first meeting for
    the ethics and safety board at a conference room inside SpaceX’s headquarters
    in California. Hassabis, Suleyman, and Legg were on the board, and so were Elon
    Musk and Reid Hoffman, the billionaire cofounder of LinkedIn turned venture capital
    investor. The other men at that first meeting included Larry Page, Google executive
    Sundar Pichai, Google’s legal chief Kent Walker, Hassabis’s postdoc advisor Peter
    Dayan, and Oxford University philosopher Toby Ord, according to people with knowledge
    of the meeting.
  prefs: []
  type: TYPE_NORMAL
- en: The meeting went well, but then the founders got some surprising news from Google.
    The company didn’t want its new ethics board to go forward after all. Suleyman
    was angry, since he’d pushed for the board’s establishment. Part of Google’s explanation
    at the time was that some of the board’s key members had conflicts of interest—Musk
    was potentially backing other AI efforts outside of DeepMind, for instance—and
    establishing a board just wasn’t legally feasible. To some of the board’s short-lived
    members, that sounded like baloney. They suspected that in reality, Google just
    didn’t like the idea of being at the mercy of a group of people who could take
    away its control of lucrative AI technology.
  prefs: []
  type: TYPE_NORMAL
- en: Angered by what felt like a betrayal of Google’s agreement, Hassabis and Suleyman
    complained to company leadership about losing the board. The executives needed
    to keep DeepMind’s founders happy and pushing the boundaries of AI research, and
    they found a way to dangle a bigger prize in front of them. A senior Google executive
    reached out to Hassabis and his cofounders and told them there might be a better
    structure they could use to protect their AGI tech. The DeepMind founders didn’t
    know this at the time, but Google was preparing to turn itself into a conglomerate
    called “Alphabet,” which would allow its various business divisions to operate
    with more independence. The executive told the founders that these new divisions
    would be called “autonomous units.” It would be like becoming an independent company
    again. They would get their own budgets, balance sheets, boards, and even outside
    investors. The idea sounded promising.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: 'Out of view, Google’s real goal was to boost its share price, which had been
    stagnating. For years, Wall Street analysts had been struggling to evaluate Google’s
    bundle of other businesses outside of YouTube, Android, and its lucrative search
    engine. It had all these other businesses, too, like a smart thermostat company
    called Nest, a biotech research firm called Calico, a venture capital unit, and
    the “moonshot” X lab. Most of these divisions didn’t make any money, but if they
    were turned into separate firms housed under a parent company, that could loosen
    up the company’s balance sheet and help enhance the value of the business that
    Google cared about most: advertising. Google’s advertising business made up more
    than 90 percent of its annual revenue. Despite its reputation as an innovative
    technology company filled with the brightest engineers, Google’s leadership still
    primarily cared about the age-old business of getting people to buy stuff they
    didn’t necessarily need.'
  prefs: []
  type: TYPE_NORMAL
- en: With so much energy devoted to building AGI, Hassabis, Legg, and Suleyman barely
    stopped to think about Google’s true motivations, or that it probably had no intention
    of ever giving them autonomy when their artificial intelligence research could
    be so useful to growing its business. Instead, the idea of becoming more independent
    was music to their ears. It meant Google wouldn’t control their future AI, and
    *they* could be its careful stewards. “We wanted to have sufficient independence
    to be able to navigate what might be coming if very powerful AGI was coming along,”
    Legg remembers. “We wanted to make sure we had enough control over how things
    developed.”
  prefs: []
  type: TYPE_NORMAL
- en: The founders spent the next year and a half talking to Page and other executives
    about how their existence under this new corporate umbrella might look and what
    “autonomous unit” actually meant. But then, when Google announced that it was
    being restructured under the name Alphabet, it wouldn’t confirm or announce any
    plans to give DeepMind more legal autonomy. As several other Google bets, like
    Verily Life Sciences, got spun out as separate companies, there was no progress
    on doing the same for DeepMind. It was almost as if Google had forgotten about
    its commitments yet again.
  prefs: []
  type: TYPE_NORMAL
- en: Hassabis didn’t have much time to dwell on the way Google seemed to be fobbing
    him off. There was a more troubling matter coming up on the horizon. Over in San
    Francisco, some start-up founders were setting up another research lab that had
    the same goal as DeepMind’s. They were touting a big, new idea to build artificial
    general intelligence safely and for the benefit of humanity. The implication stung
    a little bit, suggesting that the world’s other big attempt to build AGI—his own—wasn’t
    helping humanity. It was helping Google. What made things worse was that this
    new organization had been spun up by his old investor, Elon Musk. It was called
    OpenAI.  <hgroup>
  prefs: []
  type: TYPE_NORMAL
- en: '[CHAPTER 6](contents.xhtml#c_ch6) [The Mission](contents.xhtml#c_ch6)'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: </hgroup>
  prefs: []
  type: TYPE_NORMAL
- en: It was 2015, and for five years, Demis Hassabis had been growing his team and
    hitting research milestones on a slow but steady path to AGI, operating in an
    open field with virtually no one else trying to do the same thing. DeepMind’s
    objective was so radical that it could effectively operate like a monopoly. No
    other established company in the world was trying to build AI that could surpass
    human intelligence, which meant Hassabis could conduct research at his own pace.
    That also made it easier for DeepMind’s founders and staff to see themselves as
    more of a mission-oriented research lab than a company. They could mentally reconcile
    themselves with being owned by Google but still “solving intelligence” to fix
    humanity’s biggest problems because they weren’t running on the same never-ending
    hamster wheel of competition that other companies were. Their quest was unique.
    Now the possibility of a rival in Silicon Valley was going to change all that.
    The quest to build AGI was about to turn into a race.
  prefs: []
  type: TYPE_NORMAL
- en: The more Hassabis learned about OpenAI, the more his anger rose. He had been
    the first person in the world to make a serious run at building artificial general
    intelligence, and given what a fringe idea it had been five years earlier, he’d
    put his neck on the line with the scientific community by doing so. To make matters
    worse, this new contender might even be exploiting his ideas. OpenAI had seven
    people listed as cofounders on its website. When Hassabis took a closer look at
    the names, he realized that five of them had worked as consultants and interns
    at DeepMind for several months. That’s when he became livid, according to people
    who worked with him. Hassabis had been an open book with DeepMind staff about
    the different strategies they needed to chase to reach AGI, such as building autonomous
    agents or teaching AI models to play games like Chess and Go. Now five scientists
    who’d heard all those details were starting a competing organization.
  prefs: []
  type: TYPE_NORMAL
- en: Technically speaking, Hassabis might not have had to worry that much. There
    were many other researchers outside of DeepMind who were doing similar work with
    autonomous agents, virtual environments, and games. One of those five former visitors
    was a renowned AI scientist named Ilya Sutskever, who specialized in deep learning,
    not DeepMind’s signature technique, reinforcement learning. Sutskever was OpenAI’s
    chief scientist and, like his cofounders, a deep believer in the possibilities
    of AGI.
  prefs: []
  type: TYPE_NORMAL
- en: But Hassabis still bristled at Sam Altman’s audacity in hiring people who knew
    of DeepMind’s secrets, and anxieties crept up on him late at night. Hassabis would
    typically come home from work to have dinner with his family before embarking
    on the second part of his working day, starting in the evening and going on till
    3:00 or 4:00 a.m., reading research papers and sending emails. Hassabis worried
    aloud in some of those emails or late meetings that Altman was copying DeepMind’s
    strategy and trying to steal its researchers, according to people who heard those
    comments.
  prefs: []
  type: TYPE_NORMAL
- en: Hassabis questioned OpenAI’s promises to release its technology to the public.
    That approach to being “open” seemed reckless. “I thought it was a bit naive that
    open-sourcing was a panacea,” he says today. “As you get more and more powerful
    dual-purpose technologies, what about bad actors accessing that technology, for
    bad ends?… You have very limited control over what somebody might do.” DeepMind
    published some of its research in well-known journals, but it kept the full details
    of its code and AI technology under tight control. It didn’t release the AI models
    it had created to master the game *Breakout*, for instance.
  prefs: []
  type: TYPE_NORMAL
- en: Deepening the humiliation, DeepMind leaders caught wind that Musk was trash-talking
    Hassabis to his contacts in Silicon Valley, according to people who worked at
    DeepMind and OpenAI. When the billionaire was talking to all the new staff at
    OpenAI, for instance, he warned them about DeepMind’s work in England and suggested
    Hassabis was a shady character. He cast suspicion over the way Hassabis had designed
    *Evil Genius*, a game where you played a villain trying to build a doomsday device
    and dominate the world. Whoever created games like that was probably a little
    maniacal themselves. OpenAI’s staff ran with the joke and created memes based
    on screenshots of *Evil Genius*, which they would send to one another on Slack,
    the chatting service. At one point, Musk referred to Hassabis as the “Hitler of
    AI,” according to a former OpenAI staffer who heard the comment directly.
  prefs: []
  type: TYPE_NORMAL
- en: Whatever his reason for turning on DeepMind, Musk was stoking what would become
    an intense rivalry between the two organizations. He’d also been picking up a
    more paranoid, pessimistic view of AI that tracked with his tendency to take things
    to their extreme. He could have, for instance, simply fought oil companies to
    tackle climate change, but decided to make humans an interplanetary species instead.
    He could have bought a stake in Twitter when he resolved it was too woke, but
    he bought the whole company. Maybe it was Musk’s habit of taking drastic action,
    his tendency to exaggerate, or his belief in his role as humanity’s savior, but
    within a couple of years of investing in DeepMind, the tycoon was tunneling deep
    into the dogma of AI doom.
  prefs: []
  type: TYPE_NORMAL
- en: He’d been having late-night conversations about the issue with his wife, worrying
    about how Google’s quiet cofounder Larry Page was on course to make far more advanced
    AI systems after buying his former investment DeepMind, according to reporting
    by the *New York Times.* Musk and Page were close friends. They went to the same
    exclusive dinners and conferences and had similar fantastical dreams about the
    future. If Musk was in San Francisco and hadn’t arranged for a place to stay,
    he’d call Page and ask if he could crash on his sofa, according to a biography
    of Musk by Bloomberg reporter Ashlee Vance. They’d play video games and bat ideas
    around for futuristic airplanes or other technology. Musk thought that Page, who
    was becoming more and more reclusive, was almost too nice. That started to worry
    him. Google’s cocreator might produce something evil by accident, Musk said in
    his biography, like a “fleet of artificial- intelligence-enhanced robots capable
    of destroying mankind.” Musk sounded like he was joking, but he was serious.
  prefs: []
  type: TYPE_NORMAL
- en: Months after Page bought DeepMind for $650 million, Musk posted and then quickly
    deleted a message on a web forum about AI. Nobody realized how quickly AI was
    developing, he said. “Unless you have direct exposure to groups like DeepMind,
    you have no idea how fast.” He said he was skeptical that certain “leading AI
    companies” could prevent digital superintelligences from escaping into the internet
    and causing havoc.
  prefs: []
  type: TYPE_NORMAL
- en: As Musk went down the rabbit hole of AI doom, he started investing more of his
    money and time in the issue. He gave $10 million to the Future of Life Institute,
    a nonprofit organization that campaigned for more research into stopping human
    annihilation through AI. Then when the group set up a conference in Puerto Rico,
    he attended, along with Larry Page, Hassabis, and anyone else who was serious
    about building AGI.
  prefs: []
  type: TYPE_NORMAL
- en: 'After one dinner party at the conference, Musk and Page got into an argument.
    As it got heated, more conferencegoers started to surround them to listen: Page
    said that Musk was becoming way too paranoid about AI. He had to remember humanity
    was evolving toward a digital utopia, where our minds would become digital and
    organic. If he kept making such a fuss about AI, he’d slow down all the next steps
    there.'
  prefs: []
  type: TYPE_NORMAL
- en: “But how can you be so sure that a superintelligence won’t wipe out humanity?”
    Musk asked.
  prefs: []
  type: TYPE_NORMAL
- en: “You’re being speciesist,” Page shot back, according to the *New York Times*
    account, apparently defensive of the future’s posthumans. By focusing so much
    on catastrophe, Musk was dismissing the needs of all those future beings destined
    to be made from silicon.
  prefs: []
  type: TYPE_NORMAL
- en: 'On the one hand, as he kept tabs on DeepMind and immersed himself in a wealthy
    community of futuristic prognosticators, Musk was becoming radicalized. But on
    the other hand, he was also experiencing FOMO, the debilitating “fear of missing
    out” that fuels some of the biggest decisions in Silicon Valley about where to
    put money. As AI hit new milestones, such as the 2012 ImageNet competition victory,
    the large tech firms were sitting up and paying more attention to the field. Not
    only had Google bought DeepMind, but Mark Zuckerberg had set up a new division
    called Facebook AI Research, or FAIR, and hired one of the world’s leading specialists
    in deep learning, Yann LeCun, to run it. It was likely this desire to be part
    of this new gold rush for research that led Musk to do something so counterintuitive
    to his fears: create more AI.'
  prefs: []
  type: TYPE_NORMAL
- en: Later, Musk would say on Twitter that he had started OpenAI because he wanted
    to create a “counterweight to Google” and because he wanted AI to be developed
    more safely. But there was no doubt that AI was critical to the financial success
    of his companies, whether it was the self-driving capabilities of Tesla cars,
    the systems steering SpaceX’s unmanned rockets, or the models underpinning his
    upcoming brain-computer interface company Neuralink.
  prefs: []
  type: TYPE_NORMAL
- en: 'For all of Musk’s apocalyptic views and moral convictions that he should reach
    AGI before Demis Hassabis, building AI that was as capable as Google’s would also
    boost his businesses. It was a profitable endeavor. Only that could explain why
    he agreed to work on that with one of the best-connected entrepreneurs in Silicon
    Valley: Sam Altman, the guy who turned “millions” into “billions” on slide decks,
    the guy who’d stuffed Y Combinator with futuristic start-ups, and the guy whose
    ambitions for AI were as big and far-reaching as Larry Page’s.'
  prefs: []
  type: TYPE_NORMAL
- en: Altman sent Musk an email on May 25, 2015, saying that “someone other than Google”
    should build AGI first. He suggested an AI project structured “so that the tech
    belongs to the world.” “Probably worth a conversation,” Musk replied. A month
    later, Altman emailed again, proposing a lab that would build “the first general
    AI.… Safety should be a first-class requirement.” The AI would be owned by a nonprofit
    and used “for the good of the world.” Musk replied, “Agree on all.”
  prefs: []
  type: TYPE_NORMAL
- en: For Altman, building an all-purpose AI system was like taking all the technology
    start-ups he’d ever mentored in Y Combinator and putting them into one big Swiss
    Army knife. This powerful machine intelligence could be infinitely capable. Who
    knew if we’d even need businesses or start-ups anymore when a new superintelligence
    could generate enough wealth to keep everyone on Earth economically thriving?
    While Hassabis had believed that AGI would unlock the mysteries of science and
    the divine, Altman would say he saw it as the route to financial abundance for
    the world. He and Musk talked about starting a research lab that could do just
    that, and act as a counterbalance to DeepMind and Google.
  prefs: []
  type: TYPE_NORMAL
- en: 'Musk and Altman decided on another way their new organization would be different
    to Big Tech firms. In its effort to build AI that was good for humanity, it would
    collaborate with other institutes and make its research open to the public. Hence
    the name: OpenAI.'
  prefs: []
  type: TYPE_NORMAL
- en: Altman got to work on establishing an initial founding team. That summer in
    2015, he invited about a dozen top AI researchers to dinner at a private room
    at the Rosewood, a luxury hotel that was walking distance from some of Silicon
    Valley’s wealthiest venture capital firms. The invitees included Ilya Sutskever,
    the scientist who’d spent several months at DeepMind, and Greg Brockman, a Harvard
    math graduate from North Dakota who was a whiz at building businesses and had
    been chief technology officer at Stripe.
  prefs: []
  type: TYPE_NORMAL
- en: During the dinner, Altman explained that the goal of this new research organization
    would be to build AGI and then distribute its benefits to the world. The group
    spent a large chunk of the meal asking if that was even possible—not the part
    about distributing AI’s riches to humanity, but the one about starting such a
    lab when Big Tech firms had poached most of the world’s top AI talent. Wasn’t
    it too late to try to hire the field’s best researchers?
  prefs: []
  type: TYPE_NORMAL
- en: “We [also] knew our resources would pale in comparison to the [Big Tech] companies,”
    Brockman later recalled on the Lex Fridman Podcast. But if they did start such
    an organization, how should it be structured to make sure its AI benefited humanity?
    “It was clear that such an organization needed to be a [nonprofit], without any
    competing incentives to dilute its mission.”
  prefs: []
  type: TYPE_NORMAL
- en: Halfway through the drive home in Altman’s car, Brockman declared that despite
    how unrealistic this was, he was on board. This was Silicon Valley after all,
    where even the craziest ideas found a way to thrive.
  prefs: []
  type: TYPE_NORMAL
- en: Being a workaholic himself, Altman was impressed at how Brockman immediately
    started planning all the necessary logistics for setting up OpenAI. This was a
    guy whose average response time to emails was five minutes, which meant he could
    be as freakishly dedicated to the cause as Altman was. “He was fully in,” Altman
    later said. When it came to building OpenAI, Brockman would become the organizer
    for everything.
  prefs: []
  type: TYPE_NORMAL
- en: Brockman then took charge of poaching an initial group of talented scientists
    from companies like Google and Facebook, reaching out to Yoshua Bengio, a professor
    from the University of Montreal who’d been called one of the “godfathers” of the
    deep-learning movement. Brockman didn’t want to hire Bengio. He wanted the professor
    to tell him who were the most promising scientists in AI that he could think of.
    Bengio typed out a list of names and sent it back to Brockman.
  prefs: []
  type: TYPE_NORMAL
- en: Hiring these people wouldn’t be so easy. Some of them were earning seven-figure
    salaries with companies like Google and Facebook, and Altman and Brockman couldn’t
    offer anywhere near those amounts. What they did have was a compelling mission
    to change the world and two prestigious names running the show. Elon Musk was
    now a globally revered tycoon, and running Y Combinator had elevated Altman’s
    status in the Valley to someone everybody wanted an introduction to. For AI researchers,
    even a short stint at this new nonprofit group offered prestigious connections
    and a potential career boost that could be worth the pay cut.
  prefs: []
  type: TYPE_NORMAL
- en: Several of the leading scientists on Brockman’s list decided to meet him about
    the job. Alongside the big names and vision, they liked the “open” part of this
    new organization. They would get a chance to finally *publish* their research
    instead of working in secret on some corporate product, and some also liked the
    idea of counteracting the profit motive that was driving Google and DeepMind’s
    efforts to build AGI, according to former OpenAI staff.
  prefs: []
  type: TYPE_NORMAL
- en: To seal the deal, Brockman took a handful of scientists to a winery. Sutskever
    would be the biggest catch of all if he agreed to join. The group talked more
    about building an AI lab that would be completely free from corporate pressures
    and that would “open-source” its research, effectively giving it away for free,
    and how that would stop Big Tech firms like Google and Facebook from having a
    stranglehold on AI as it became more powerful. Nearly all of the scientists agreed
    to come on board, including Sutskever, the talented scientist who rarely seemed
    to smile. Having grown up in Russia and Israel and having worked with prestigious
    deep-learning pioneer Geoffrey Hinton, he would now be ditching Google Brain for
    OpenAI.
  prefs: []
  type: TYPE_NORMAL
- en: With about a dozen people on board, the team headed to Montreal, Canada, for
    an annual AI conference called NIPS (now called NeurIPS) in December 2015, to
    announce the new research lab. Snow was building up outside the venue as members
    of the team talked to other conference participants about their new lab. The real
    announcement happened online. A website, OpenAI.com popped up with a blog post
    written by Brockman and Sutskever introducing the project. “Our goal is to advance
    digital intelligence in the way that is most likely to benefit humanity as a whole,
    unconstrained by a need to generate financial return,” they wrote.
  prefs: []
  type: TYPE_NORMAL
- en: Musk and Altman would chair the organization, and it had an eye-popping $1 billion
    in funding commitments from Musk, Thiel, Altman, Hoffman, and Jessica Livingston,
    along with cloud computing credits from Amazon. Musk was planning to fund OpenAI
    with Tesla stock, according to a person with knowledge of the plans, just as he’d
    offered to do with DeepMind several years earlier.
  prefs: []
  type: TYPE_NORMAL
- en: The hundreds of academics at NeurIPS were astonished as they took in the news.
    Many thought that building AGI was a pipe dream, but some were also envious. For
    the past decade, Big Tech companies had been siphoning universities of their top
    computer science talent, and it was getting to the point that the very best minds
    in artificial intelligence were now working for corporate interests. Effectively,
    there was now an assembly line in artificial intelligence, which started at elite
    universities and ended at Google, Facebook, and Amazon. It had been a problem
    for years.
  prefs: []
  type: TYPE_NORMAL
- en: “There’s no way that anybody would say ‘no’ to two or three times their salary,”
    says Maja Pantic, a computer science professor at Imperial College London who
    joined Samsung Electronics in 2018 as research director of its AI center and then
    hopped over to Meta. “That is what happened to me. This is what happened to all
    of my colleagues.” And to the luminaries too. Hinton now worked for Google; Fei-Fei
    Li left Stanford for Google; LeCun, for Facebook. Ng left Stanford for Google
    and then China’s Baidu. Even the top universities like Stanford, Oxford, and the
    Massachusetts Institute of Technology could barely hold on to their star academics,
    leaving a vacuum where the next generation of educators was meant to be. AI research
    became more secretive and more geared toward making money. That’s why Musk and
    Altman’s push for their research to be open to the public was so refreshing to
    researchers. Someone was finally addressing the concentration of AI knowledge
    happening at big companies.
  prefs: []
  type: TYPE_NORMAL
- en: The university brain drain was happening for two reasons. The first and most
    obvious was pay. At the University of Toronto, where Geoffrey “Godfather of AI”
    Hinton had once taught, computer science professors could expect to earn about
    $100,000 a year. The university’s highest-earning scholars were bringing in about
    $550,000\. That was the top of the range. Hinton’s star student Sutskever didn’t
    even try going into academia. After a stint at Hinton’s start-up, he’d gone straight
    to Google Brain. When OpenAI offered Sutskever $2 million a year to join, Google
    Brain offered three times that amount, according to *Genius Makers*.
  prefs: []
  type: TYPE_NORMAL
- en: A second reason was the data and computing power needed to run experiments in
    AI research. Universities typically have a limited number of GPUs, or graphics
    processing units, which are the powerful semiconductors made by Nvidia that run
    most of the servers training AI models today. When Pantic was working in academia,
    she managed to purchase sixteen GPUs for her entire group of thirty researchers.
    With so few chips, it would take them months to train an AI model. “This was ridiculous,”
    she says. Not long after she joined Samsung, she got access to two thousand GPUs.
    All that extra processing power meant that training an algorithm could take days,
    and their research could speed ahead.
  prefs: []
  type: TYPE_NORMAL
- en: For those scientists who stayed in academia, it was also becoming harder to
    escape Big Tech’s sway. One 2022 study found that over the previous decade, the
    number of academic papers that had ties to Big Tech firms had more than tripled
    to 66 percent. Their growing presence “closely resembles strategies used by Big
    Tobacco,” said the authors of the study, which was conducted by researchers across
    several universities, including Stanford and University College Dublin. That in
    turn influenced the way universities measured success with their AI research.
    Instead of aiming for values like the well-being of people, justice, and inclusion,
    academics were more inclined to aim for better performance, according to Abeba
    Birhane, now a senior fellow at the Mozilla Foundation, who led the study.
  prefs: []
  type: TYPE_NORMAL
- en: Well-being and inclusion weren’t just wishy-washy concepts, says Birhane. They
    were perfectly measurable. “They may be abstract, but so [are] efficiency and
    performance,” she adds. “People have found ways to measure fairness, privacy and
    more.” What was making the matter worse was that as researchers everywhere, from
    universities to tech companies, focused so much on making their AI models bigger
    and more capable, they were also raising the risks that those models could sometimes
    produce outputs that were racist or sexist, says Birhane, who points to another
    2023 study that she coauthored. “What we found was that no, as your dataset scales,
    hateful content also increases.”
  prefs: []
  type: TYPE_NORMAL
- en: Yet scale was critical to the growing power that large tech companies were amassing
    in AI. Google and Meta, the company formerly known as Facebook, had trillions
    of data points that could be used to train models, and they ran server farms that
    spanned hundreds of thousands of square feet. A single data center that Google
    currently runs in Dalles, Oregon, for instance, is bigger than six football fields.
    Most universities can offer only a tiny fraction of that.
  prefs: []
  type: TYPE_NORMAL
- en: When it came to making AI smarter, more was better. As he kicked off his research
    at OpenAI, Sutskever and his team focused on making AI models that were as capable
    as possible, not necessarily as equitable, fair, or private. In very simple terms,
    there was a formula for doing that. If you trained an AI model with more and more
    data, and you also raised the number of parameters the model had, and you *also*
    boosted the computing power used for training, the AI model would become more
    proficient. It was the same extraordinary correlation that Professor Andrew Ng
    had noticed when he was doing his experiments at Stanford. It didn’t matter what
    your model was designed to do. So long as you turned up all the dials, it would
    be more accurate at translating language, or it would sound more human when it
    generated text.
  prefs: []
  type: TYPE_NORMAL
- en: “If you have a very large dataset and a very large neural network, success is
    guaranteed,” Sutskever said at one AI conference. The last three words of that
    statement became his catchphrase among AI scientists, all the more so after OpenAI’s
    big launch, as the field took on a new air of excitement about this new nonprofit
    led by a brilliant scientist and several of Silicon Valley’s biggest power brokers.
  prefs: []
  type: TYPE_NORMAL
- en: It wasn’t long before problems started to arise. OpenAI didn’t immediately get
    the $1 billion in funding commitments it had announced in December, from Musk,
    Thiel, and others. In fact, over the next few years, the nonprofit managed to
    collect only a little over $130 million in actual donations, according to an investigation
    by the tech news site TechCrunch, which pored over OpenAI’s federal tax filings.
  prefs: []
  type: TYPE_NORMAL
- en: OpenAI lacked money and it was hazy in its direction. Its founding team of thirty
    researchers started working out of Brockman’s apartment in San Francisco’s Mission
    District, at his kitchen table or slouched on sofas with their laptops perched
    on their knees. A few months after the launch, they got a visit from another respected
    Google Brain researcher named Dario Amodei. He started asking some probing questions.
    What was all this about building a friendly AI and releasing its source code into
    the world? Altman countered that they weren’t planning to release all the source
    code, according to his *New Yorker* profile.
  prefs: []
  type: TYPE_NORMAL
- en: “But what is the goal?” Amodei asked.
  prefs: []
  type: TYPE_NORMAL
- en: “It’s a little vague,” Brockman admitted. Their goal had been to make sure AGI
    went well.
  prefs: []
  type: TYPE_NORMAL
- en: Amodei was part of the growing cohort of scientists who had similar fears of
    doom to Musk and Eliezer Yudkowsky. He’d been working at Google when, less than
    a year earlier, the company came under fire after the vision recognition system
    in its Photos app was spotted classifying people of color as gorillas. Google
    said it was “appalled” and removed the gorilla label from Photos completely. “Having
    systems that fail unpredictably is not a good thing,” he told one podcast, referring
    to the incident.
  prefs: []
  type: TYPE_NORMAL
- en: But Amodei’s concerns weren’t limited to racist and offensive decisions by algorithms.
    He was also worried about how reinforcement learning, the AI technique being mastered
    by DeepMind, was being used to control physical systems like robots, self-driving
    cars, and Google’s data centers. “Once you’re actually interfacing with the world
    directly and controlling direct physical things, I think the potential for things
    to go wrong … starts to increase,” he said in a 2016 interview with Jaan Tallinn’s
    Future of Life Institute.
  prefs: []
  type: TYPE_NORMAL
- en: Amodei’s research into AI harms led him to more and more catastrophic possibilities,
    and by 2023, he would be warning the media that there was a 25 percent chance
    runaway AI posed an extinction risk to humans. Google Brain wasn’t where he could
    tackle such risks. After that probing conversation at OpenAI’s office, he joined
    a few months later.
  prefs: []
  type: TYPE_NORMAL
- en: To build AGI, OpenAI’s founding team needed to attract more money and talent,
    so they tried focusing on projects that could generate positive stories in the
    press. Their early researchers created a computer that could beat the top human
    champions at *Dota*, a strategic 3D video game, and they also built a five-fingered
    robotic hand, powered by a neural network, that could solve a Rubik’s Cube. These
    projects were aimed at keeping Elon Musk happy by trying to one-up the work happening
    across the Atlantic in the secretive offices of DeepMind.
  prefs: []
  type: TYPE_NORMAL
- en: Musk didn’t keep his mistrust of DeepMind a secret. In 2017, OpenAI’s staff
    went to an off-site meeting at SpaceX’s headquarters. Musk, who’d been visiting
    the OpenAI office every week at first and then every few weeks, gave them a tour
    of the facilities and then did a question-and-answer session with about forty
    of his new artificial intelligence researchers. At one point, Musk started talking
    about why he’d funded OpenAI, and the reason was Demis Hassabis.
  prefs: []
  type: TYPE_NORMAL
- en: “I was one of the investors in DeepMind, and I was very concerned that Larry
    [Page] thinks Demis works for him. Actually, Demis just works for himself,” Musk
    said, according to a person who was there. “And I don’t trust Demis.”
  prefs: []
  type: TYPE_NORMAL
- en: The researchers were astonished. To many of them, it sounded like Musk had a
    personal issue with Hassabis more than any particular worry about where AI was
    headed. When he was asked about his antagonism for Hassabis, he mentioned the
    computer games that the British entrepreneur had designed in the past that focused
    on world domination.
  prefs: []
  type: TYPE_NORMAL
- en: At the same session, Musk recounted a conversation he’d had with another investor
    in DeepMind, who’d said that during an earlier meeting with Hassabis, “I felt
    like it was at that point in a movie where somebody should get up and shoot the
    guy.” In other words, somebody needed to stop Hassabis from building an all-powerful
    AGI.
  prefs: []
  type: TYPE_NORMAL
- en: But as much as Musk didn’t seem to like Hassabis, he would remind OpenAI staff
    that DeepMind was ahead, and he held up the British company’s research work as
    a benchmark they needed to target. As the months passed, Musk grew more and more
    concerned that OpenAI’s technology simply wasn’t as powerful as DeepMind’s, according
    to former OpenAI staff.
  prefs: []
  type: TYPE_NORMAL
- en: To keep their biggest benefactor on board, Altman and Brockman steered some
    of their researchers toward emulating the work that DeepMind was doing. Researchers
    on the *Dota* project, for instance, couldn’t understand why they were working
    on a game simulation if their ultimate goal was to build an AGI that would make
    people’s lives better. The reason was they needed Musk’s money. “If we don’t work
    on this, OpenAI might not exist in a few years, or even next year,” Brockman told
    the researchers.
  prefs: []
  type: TYPE_NORMAL
- en: Although OpenAI eventually gained worldwide acclaim for its work on chatbots
    and large language models, its first few years were spent toiling on multiagent
    simulations and reinforcement learning, fields that DeepMind already dominated.
    But the more they chased DeepMind in those fields, the more Altman and his leadership
    team realized that these approaches to AI didn’t promise much real-world impact.
    That’s when OpenAI started to evolve into a very different kind of organization
    to DeepMind. While DeepMind had a hierarchical, academic culture that prized its
    PhD staff, OpenAI’s culture was more engineering-led. Many of its top researchers
    were programmers, hackers, and former start-up founders at Y Combinator. They
    tended to be more interested in building things and making money than in making
    a discovery and achieving prestige within the scientific community.
  prefs: []
  type: TYPE_NORMAL
- en: 'Musk, meanwhile, was getting antsy. He complained to Altman that he had recruited
    an impressive roster of scientists but didn’t have any demos that blew DeepMind
    out of the water. As the nonprofit approached its third year, Musk told Altman
    that it was falling too far behind Google and DeepMind. He then offered a quick
    solution: he would take control of OpenAI and merge it with Tesla. OpenAI would
    never catch up to DeepMind without a major change, Musk said in a December 2018
    email to Altman and his team, which was published by OpenAI and corroborated by
    someone who saw an unredacted version. “Unfortunately, humanity’s future is in
    the hands of Demis,” he added. In other words, Hassabis the villain would get
    his way if Musk didn’t take charge. But Altman and his cofounders wanted to stay
    in control. They rejected Musk’s proposal.'
  prefs: []
  type: TYPE_NORMAL
- en: In February 2018, OpenAI briefly mentioned in a public announcement about new
    donors that Musk was leaving, but it framed the reason as benign. Musk was leaving
    for ethical reasons. He had too big a conflict of interest in the field of AI.
    “Elon Musk will depart the OpenAI board but will continue to donate and advise
    the organization,” the nonprofit said on its blog. “As Tesla continues to become
    more focused on AI, this will eliminate a potential future conflict for Elon.”
  prefs: []
  type: TYPE_NORMAL
- en: 'Many staff at OpenAI knew that was hogwash. They suspected that as much as
    Musk said he cared about creating safer AI, he also wanted to be the person who
    built the most capable AI. He was already the wealthiest man on Earth and gaining
    unprecedented sway over American infrastructure: NASA was putting astronauts into
    space with SpaceX; Tesla was leading the charge on electric vehicle standards;
    and Musk’s satellite internet company, Starlink, was on course to try to shape
    the outcome of the Ukraine war.'
  prefs: []
  type: TYPE_NORMAL
- en: It was clear that Musk was also chronically unreliable. He had promised to donate
    $1 billion to OpenAI over several years, but instead had put in somewhere between
    $50 and $100 million— a rounding error for the world’s richest worrier about AI.
    Putting in that money would have been relatively easy, especially if he was going
    to fund OpenAI with Tesla stock. Between 2015 and 2023, shares in Tesla jumped
    more than 18,000 percent, meaning OpenAI could have hit that $1 billion funding
    target without too much trouble. For all the concerns Musk had about humanity’s
    future, he seemed far more preoccupied with staying ahead of the competition.
  prefs: []
  type: TYPE_NORMAL
- en: As Musk left OpenAI, he took its main source of funding with him. This was a
    disaster for Altman. He had staked his entire reputation on this project. Some
    of the world’s top AI scientists were on a pay cut just to work with him, and
    his grand promises to help humanity were starting to look silly. The simple truth
    in this new era of AI development was that you needed more of everything to be
    successful, from money to pay your researchers to data to train your models and
    powerful computers to run them. Without Musk, the chance of ticking those boxes
    was quickly diminishing.
  prefs: []
  type: TYPE_NORMAL
- en: Altman was approaching a critical juncture. Working out of OpenAI’s office in
    San Francisco, he thought about how he could keep the nonprofit going on severely
    limited resources and build AI models that were likely to be subpar to the rest
    of the field. The other option was to call it a day and close the project down.
    Raising money for a nonprofit was much harder than fundraising for a start-up.
    Altman was struggling to convince wealthy people to donate to the cause of AGI
    out of the goodness of their hearts, with no chance of seeing a direct financial
    return. He needed tens of millions of dollars and Musk had been his last big benefactor.
  prefs: []
  type: TYPE_NORMAL
- en: There was another option. Maybe OpenAI could give its backers some kind of direct
    economic benefit, in addition to the honor of sparking an AI utopia for humanity.
    That would be a win-win. The backers wouldn’t be making a “donation” so much as
    an “investment,” which was the language Altman was more comfortable speaking anyway.
    But he saw only a few potential backers he could realistically approach to get
    both the money and computing power OpenAI needed to build AGI. They were tech
    giants like Google, Amazon, Facebook, and Microsoft. No one else had the billions
    of dollars on tap or powerful computers housed in buildings that spanned football
    fields.
  prefs: []
  type: TYPE_NORMAL
- en: For the last few years, both OpenAI and DeepMind had been trying to put roadblocks
    in place to stop whatever ultrapowerful AI system they made from being misused.
    DeepMind was trying to change its governance structure so that a profit-motivated
    monopoly in the form of Google wouldn’t have free rein to monetize AGI. Instead,
    a council of expert advisors would keep things in check. Altman and Musk had established
    OpenAI as a nonprofit and promised to share its research and even its patents
    with other organizations if it looked like they were getting closer to the threshold
    of superintelligent machines. That way it would prioritize humanity.
  prefs: []
  type: TYPE_NORMAL
- en: Now as Altman fought to stay alive, he was going to knock down some of those
    guardrails. The cautious approach he’d started with was going to morph into something
    more reckless, and doing so would transform the AI field that he and DeepMind
    had been working in from a slow and largely academic pursuit into something more
    like the Wild West. Altman would use his ability to spin a compelling narrative
    to justify the departure he was about to take from OpenAI’s founding principles.
    He was a tech founder, and tech founders had to pivot sometimes. That was how
    it worked in Silicon Valley. He would only need to *tweak* some of OpenAI’s founding
    principles—just a little bit.  <hgroup>
  prefs: []
  type: TYPE_NORMAL
- en: '[ACT 2](contents.xhtml#p_pt2) [THE LEVIATHANS](contents.xhtml#p_pt2)'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: </hgroup>  <hgroup>
  prefs: []
  type: TYPE_NORMAL
- en: '[CHAPTER 7](contents.xhtml#c_ch7) [Playing Games](contents.xhtml#c_ch7)'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: </hgroup>
  prefs: []
  type: TYPE_NORMAL
- en: A short walk from London’s King Cross Station, where tourists flocked to see
    the magical train platform that Harry Potter took to Hogwarts, a different kind
    of magic was being created inside a gleaming collection of high-rise buildings
    jutting into the gray sky, their facades a blend of glass and metal cladding.
    Between them was a pretty promenade bustling with pedestrians. Some of them were
    the engineers and artificial intelligence scientists of DeepMind, fishing badges
    out of their pockets as they walked through the glass doors of an office building
    that officially belonged to Google but that had two floors devoted to their secretive
    AI lab.
  prefs: []
  type: TYPE_NORMAL
- en: For all the perks that DeepMind got from being part of Google, including the
    nap pods, massage rooms, and indoor gym, its founders were still trying to extricate
    themselves from the grip of their parent company, Alphabet. It had been more than
    two years since the acquisition, and the tech giant’s executives were dangling
    a new prospect in front of Demis Hassabis, Mustafa Suleyman, and Shane Legg. Instead
    of being an “autonomous unit,” DeepMind could become an “Alphabet company” with
    its own profit-and-loss statements.
  prefs: []
  type: TYPE_NORMAL
- en: Being in England and far removed from the relentless growth ethos that drove
    Silicon Valley, the founders took Google’s suggestion in good faith. Suleyman
    wanted to show that DeepMind could stand on its own two feet as a business, so
    he dove into proving out the value of its AI systems in the real world. He put
    renewed focus on a division he’d started called Applied, whose researchers used
    reinforcement learning techniques to tackle problems in healthcare, energy, and
    robotics to potentially turn into businesses. Another team of about twenty researchers,
    who called themselves DeepMind for Google, worked on projects that directly helped
    Google’s business, making YouTube’s recommendations more efficient, for instance,
    or improving Google’s ad targeting algorithms. Google agreed to give DeepMind
    50 percent of the proceeds of the value that it added to those features, according
    to someone with knowledge of those agreements. About two-thirds of the projects
    ended up being useful to Google, another former staffer says.
  prefs: []
  type: TYPE_NORMAL
- en: That left hundreds of other researchers at DeepMind free to continue researching
    ways to build AGI. Once every few weeks, the founders would meet at a London pub
    to talk shop, and their discussions would arrive at familiar points of tension.
    Suleyman wanted to solve real-world problems but also worried they could inadvertently
    build a superintelligent system that would go awry. What if the AI got out of
    its box and manipulated people? he asked. In the office he warned other staff
    and managers that AGI’s impact on the economy could lead to a sudden displacement
    of millions of jobs and plummeting incomes. What if that led to an uprising? “People
    will be walking up to Kings Cross with pitchforks if we don’t think about equality,”
    he’d say, according to a former staff member.
  prefs: []
  type: TYPE_NORMAL
- en: Hassabis’s brain would grapple for solutions, but they sometimes sounded a little
    off the wall. For instance, he’d suggest that as their AI got more powerful and
    potentially dangerous, DeepMind could hire Terence Tao, a professor at University
    of California, Los Angeles, who was widely regarded as one of the world’s greatest
    living mathematicians. A former child prodigy who went to college at the age of
    nine, Tao had become known as a Mr. Fix-It for frustrated researchers, according
    to *New Scientist* magazine.
  prefs: []
  type: TYPE_NORMAL
- en: Tao had said in interviews that AI was largely clever mathematics and that the
    world would probably never have true AI. He saw the technology in the same mechanistic
    and almost black-and-white way that Hassabis did. If AI got out of control, math
    could contain it. Hassabis wasn’t alone in believing that. On Yudkowsky’s LessWrong
    forum, members had engaged in a lengthy project to brainstorm how they might convince
    someone like Tao and other top mathematicians to work on AI alignment, the practice
    of making AI more “aligned” to human values to prevent it going rogue. They tossed
    out figures of between $5 million and $10 million for how much these math luminaries
    would need to be paid.
  prefs: []
  type: TYPE_NORMAL
- en: Hassabis imagined that as he got close to AGI, he’d stop pushing the performance
    of his AI models and then invite some of the world’s greatest minds to come and
    analyze them down to the minutest detail so that they could help figure out the
    best calculations to contain them. “Maybe we should start putting out the call,
    an almost ‘Avengers Assemble’ of mathematicians and scientists,” Hassabis still
    says today.
  prefs: []
  type: TYPE_NORMAL
- en: Suleyman disagreed with his cofounder’s approach, believing it far too focused
    on numbers and theory. He believed AI needed to be managed by people, not just
    clever math, to make it safe. As he and Hassabis debated the best strategy for
    containing AI, they got another update from Google’s leadership about the plan
    to become an “Alphabet company.” That idea wasn’t going to work after all, the
    executives told them. Spinning out wasn’t straightforward because as AI had become
    increasingly valuable to Google’s business, the larger company needed DeepMind
    even more.
  prefs: []
  type: TYPE_NORMAL
- en: 'The founders felt like they were experiencing déjà vu, as Google reversed course
    yet again. But the executives told them not to worry, because they could still
    find a compromise. They now suggested a third option: DeepMind could do a kind
    of partial spinout and have its own board of trustees guiding its creation of
    superintelligent AI, but Alphabet would retain some ownership of the AI company.
    To show they meant it, Alphabet put the commitment in writing. Its management
    signed a term sheet in which Google pledged to give DeepMind $15 billion in funding
    as a kind of endowment over ten years to run independently, according to a person
    with direct knowledge of that agreement. Hassabis told multiple people at DeepMind
    that the term sheet had been signed by Sundar Pichai, the Google executive who
    in a few years would become Alphabet’s chief executive officer. That meant Google
    was serious about its commitment this time.'
  prefs: []
  type: TYPE_NORMAL
- en: A term sheet is a document that outlines the terms and conditions of a potential
    business agreement. It usually acts as a starting point for further negotiations,
    and it’s not legally binding. Still, an agreement in writing holds more weight
    than a spoken one, and the DeepMind founders believed Google’s pledge to set them
    free was real this time. They decided to throw themselves into refashioning DeepMind
    as a different kind of business and one that—like OpenAI—would have a formal structure
    that made them more like a charity than a business.
  prefs: []
  type: TYPE_NORMAL
- en: Hassabis and Suleyman hired investment bankers to work out the financial mechanics
    of a spinout, and they also hired two London law firms to draw up the legal plans
    for restructuring themselves as an independent organization. They took advice
    from a top corporate litigator in the UK who had shepherded deals for larger companies
    like Shell, Vodafone, and mining giant BHP Billiton.
  prefs: []
  type: TYPE_NORMAL
- en: 'They also planned a new leadership structure: Hassabis, Legg, and Suleyman
    would sit on an operating board alongside Alphabet CEO Larry Page; his cofounder,
    Sergey Brin; Google’s then–product chief, Sundar Pichai; and three independent
    commercial directors. Decisions would be made by majority vote. Crucially, there
    would also be a fully independent board of trustees made up of six directors who
    would oversee DeepMind’s compliance with its social and ethical mission. The names
    of those directors, as well as their decisions, would be made transparent to the
    public. Since those six directors would be steering some of the most powerful
    and potentially dangerous technology in the world, they needed to be high-caliber,
    trustworthy people. So DeepMind reached for the stratosphere, asking former president
    Barack Obama to become one of those directors, along with a former US vice president
    and a former CIA director. Several of these people agreed to take part, according
    to someone who was close to that work.'
  prefs: []
  type: TYPE_NORMAL
- en: After consulting with legal experts, DeepMind decided it would not go down the
    same route that Sam Altman initially had by becoming a nonprofit organization.
    Instead, its founders contrived a completely new legal structure they called a
    global interest company or GIC. The idea was that DeepMind would become an organization
    that was more like a division of the United Nations, a transparent and responsible
    steward of AI for humanity’s sake. It would give Alphabet an exclusive license
    so that any AI breakthroughs DeepMind made that could support Google’s search
    business would flow to the technology giant. But DeepMind would spend the majority
    of its money, talent, and research on advancing its social mission, working on
    drug discovery and better healthcare or tackling climate change. Internally, they
    referred to the project as GIC.
  prefs: []
  type: TYPE_NORMAL
- en: Yet even as they sought to carve themselves away from Google, DeepMind was simultaneously
    helping bolster Google’s business. Around the time Google’s Larry Page was promising
    to help DeepMind spin out, he was looking to China as a new opportunity for expansion.
    As Google’s business in the United States and other Western markets matured, China
    presented a unique opportunity. It was the world’s most populous country, with
    more than 650 million internet users, almost double the entire population of the
    United States. And only about half the people in China who could be online *were*
    online, meaning China offered a vast, untapped market. China’s middle class was
    growing, consumer spending was on the rise, and its gross domestic product was
    around $11 trillion, making it the second-largest economy in the world. It was
    a potential gold mine for any internet company.
  prefs: []
  type: TYPE_NORMAL
- en: But Google couldn’t just waltz into China. In fact, in 2010 it had exited the
    country after accusing Beijing of hacking its intellectual property and the Gmail
    accounts of Chinese human rights activists. The Chinese government had demanded
    that Google censor searches about Tiananmen Square and other controversial topics
    for the Chinese Communist Party. Then it blocked access to Facebook and Twitter,
    setting up what became known as the Great Firewall. Google’s leadership were cocky
    and believed this was all just temporary, because China’s citizens would soon
    enough be clamoring for the slick, powerful services offered by Silicon Valley’s
    web giants.
  prefs: []
  type: TYPE_NORMAL
- en: “In a long enough time period, do I think that this kind of regime approach
    will end?” Google’s Eric Schmidt, the company’s chairman at the time, asked *Foreign
    Policy* magazine in 2012\. “I think absolutely.”
  prefs: []
  type: TYPE_NORMAL
- en: Schmidt was wrong. Instead of wasting away, China’s own internet sector boomed.
    Companies like Meituan, Baidu, and Alibaba became juggernauts as Chinese engineers
    who’d worked and started companies in Silicon Valley flew back home to build their
    own tech leviathans. A large number of engineers who had worked in Microsoft Research
    Asia were taking leadership positions at Chinese internet giants such as Alibaba
    and Tencent. Five years after Google had left, it was watching the country’s market
    become ever more lucrative but had no clear way back in. China’s rules around
    censorship hadn’t changed. But Google was eager to tap both the growing consumer
    market and some of the innovative engineering ideas that were blooming in China.
    “We need to understand what is happening there in order to inspire us,” Google’s
    head of search, Ben Gomes, told *The Intercept* at the time. “China will teach
    us things that we don’t know.”
  prefs: []
  type: TYPE_NORMAL
- en: At around this time, a major leadership change took place at the top of Google.
    In 2015, Page and Brin took a step back from the company they’d founded to chase
    an array of personal interests outside of Google, from philanthropy to flying
    cars to space exploration. They appointed Pichai as the new CEO. Pichai was the
    well-regarded product chief who the DeepMind founders were planning to put on
    their new operating board once they spun out. But unlike Page, he didn’t have
    much time, or likely much inclination, to help one of Google’s most prized acquisitions
    get away. He and Schmidt were busy looking for creative ways back into China.
    At one point that year, it looked like they might get Beijing’s approval to bring
    their app store back to the country, but nothing happened.
  prefs: []
  type: TYPE_NORMAL
- en: 'Then came a public relations opportunity that would put DeepMind at center
    stage. DeepMind had been training its AI models with games, and its latest program,
    *AlphaGo*, could play the two-player abstract strategy board game of Go. Originating
    in China more than 2,500 years ago, Go looked deceptively simple. It is played
    on a nineteen-by-nineteen grid board with a few handfuls of black and white stones.
    The players each take turns placing a stone on an intersection of the grid. The
    goal: capture territory on the board by surrounding empty points with your stones,
    and get your opponent’s stones too. It’s one of the most strategically complex
    games in existence, with the number of board positions in the order of 10^170,
    dwarfing the estimated number of atoms in the observable universe, which is closer
    to 10^80.'
  prefs: []
  type: TYPE_NORMAL
- en: Page had played Go with his Google cofounder Sergey Brin when they were building
    the company at Stanford years before, and when he mentioned his interest in the
    game to Hassabis a few weeks after the acquisition, Hassabis said his team could
    build an AI system that could beat a human champion.
  prefs: []
  type: TYPE_NORMAL
- en: Hassabis didn’t just want to impress his new boss. As well as being an accomplished
    scientist, he was an exceptional marketer. He understood that if *AlphaGo* could
    beat a global champion of Go in the same way IBM’s Deep Blue computer had beaten
    chess’s Garry Kasparov in 1997, it would create a thrilling new milestone for
    AI and cement DeepMind’s credibility as a leader in the field. DeepMind had its
    sights on South Korea’s Lee Sedol and challenged him to a five-game match in Seoul
    in March 2016.
  prefs: []
  type: TYPE_NORMAL
- en: More than two hundred million people tuned in online and on TV to watch Lee
    play five games of Go against DeepMind’s computer. The DeepMind scientist operating
    the program stopped drinking hours before the match so he wouldn’t need a toilet
    break. Hassabis paced between *AlphaGo*’s control room and a private viewing area
    as it happened. He couldn’t eat. His team had taught *AlphaGo*’s neural network
    thirty million possible moves.
  prefs: []
  type: TYPE_NORMAL
- en: 'To win Go, players need to capture their opponent’s stones by completely surrounding
    them, and doing that requires various nuances in strategy: balancing the need
    to attack and defend, long-term versus short-term goals, and predicting the sequences
    of moves your opponent might make. That means carefully choosing on which lines
    of the grid you place your stones. The first lines closest to the edge are rarely
    used because they don’t offer much chance of surrounding an opponent to capture
    territory, for instance. That’s why in its second match against Lee, *AlphaGo*
    made what seemed like a bizarre mistake for its thirty-seventh move of the game.
    It played its stone on the fifth line from the right of the board. Typically,
    moves on the fifth line are seen as less effective because they give the opponent
    a territorial advantage on the fourth line. Playing on the fifth was considered
    wasteful. The move was so out of the blue and unconventional that Lee took fifteen
    minutes to consider his response and even walked out of the room.'
  prefs: []
  type: TYPE_NORMAL
- en: “That’s a very surprising move,” said one commentator, who believed *AlphaGo*’s
    human operator had mistakenly clicked the wrong box on the board.
  prefs: []
  type: TYPE_NORMAL
- en: But about one hundred moves later, the odd strategy began to make sense. Two
    of *AlphaGo*’s black stones on the bottom left of the board ended up spilling
    over the other side and connecting up perfectly with the stone it had put on that
    fifth line. After four more hours of play, Lee resigned. He and the commentators
    went on to describe the thirty-seventh move as “beautiful.” Hassabis said it showed
    glimmers of creativity in AI. All told, *AlphaGo* won four of its five matches
    against Lee.
  prefs: []
  type: TYPE_NORMAL
- en: It was a landmark moment for AI that gave DeepMind the biggest period of press
    attention it had ever received, including an award-winning Netflix documentary
    about *AlphaGo*. Hassabis was ready to end things on a high and retire the program
    so he could move on to the next project.
  prefs: []
  type: TYPE_NORMAL
- en: But Google also saw an opportunity. It wanted to showcase Google’s technological
    prowess to Beijing and forge a new path back into China. *AlphaGo* could represent
    a new kind of Ping-Pong diplomacy with China, the executives thought, like the
    exchange of table tennis players between the United States and China in 1971 that
    helped thaw diplomatic relations after the Cold War. If the match in Korea had
    been a publicity stunt for DeepMind, the next one in China should be for Google.
  prefs: []
  type: TYPE_NORMAL
- en: Google wanted DeepMind to put *AlphaGo* in front of an even more advanced player,
    Ke Jie, a nineteen-year-old ranked as the world’s number-one Go player at the
    time and who was based in China. Ke Jie was a completely different player than
    Lee Sedol, eager to taunt his opponents and puff himself up. But Google was being
    no less arrogant, believing it could flaunt its technology and win its way back
    into China.
  prefs: []
  type: TYPE_NORMAL
- en: The situation worried Hassabis, according to former DeepMind staff. If *AlphaGo*
    won, it would look like the big bad AI was out to beat humans again and again.
    If they lost, then all the hype they’d generated in South Korea would be wiped
    out. It seemed like a lost cause either way.
  prefs: []
  type: TYPE_NORMAL
- en: 'Knowing that Google desperately wanted that foothold in China, though, Hassabis
    used his strategic prowess to work out a compromise with Pichai: they’d do another
    match, but this time they’d use a new version of *AlphaGo* called *AlphaGo* Master.
    Instead of running on hundreds of different computers, it would run on just one
    machine powered by a Google chip. This way, they could frame the match as a test
    of their new AI system rather than another attempt to crush human champions. If
    the system lost, they could save face by saying it wasn’t comparable to the original
    *AlphaGo*, but if it won, they could herald a new, more powerful system. Google
    could pitch its new machine learning platform called TensorFlow and get some big
    corporate clients in China to pay for its small but growing cloud computing business.
    Pichai agreed.'
  prefs: []
  type: TYPE_NORMAL
- en: The match took place in Wuzhen, China, in May 2017, and while Google executives
    had spent the past year lobbying Chinese government officials to broadcast it
    across China’s TV and internet services, the match ended up being blocked for
    most of the country. The new *AlphaGo* won all three games against Ke Jie, and
    hardly anyone in China knew.
  prefs: []
  type: TYPE_NORMAL
- en: Google’s leadership tried to stay positive about the situation. As he was being
    interviewed on stage at the match event, Schmidt used the opportunity to praise
    TensorFlow, saying that top Chinese internet companies like Alibaba, Baidu, and
    Tencent should try it. “All of them would be better off if they used TensorFlow,”
    he said. Behind the scenes, Google was so desperate to get back into the Chinese
    market that it also reversed some of its previous resistance to Beijing’s demands
    on censorship and even surveillance. According to a memo that was leaked to *The
    Intercept* in 2018, Google executives had ordered its engineers to work on a prototype
    search engine for China codenamed Dragonfly, which blacklisted certain search
    terms and linked people’s searches to their mobile numbers. It was backtracking
    on its principles to help an oppressive regime surveil its citizens.
  prefs: []
  type: TYPE_NORMAL
- en: But Google’s hunger for new business blinded it to the folly of trying to reenter
    China. Chinese technology firms were making big strides on AI research. They didn’t
    really need TensorFlow—or Google, for that matter. The Chinese internet giant
    Baidu had even poached Andrew Ng, the Stanford professor who’d started Google
    Brain, from Google a year earlier. The Chinese government calculated that its
    citizens and its burgeoning tech sector could live without the search giant’s
    services.
  prefs: []
  type: TYPE_NORMAL
- en: Two months after the Ke Jie match, Beijing revealed its latest long-term goal
    for the country, this time to become a world leader in artificial intelligence,
    surpassing the United States, by 2030\. The government would fund a range of AI
    start-ups and moonshots, which collectively looked like its own version of the
    Apollo program. There was no mention of working with Google or any other Silicon
    Valley technology companies to do that.
  prefs: []
  type: TYPE_NORMAL
- en: It soon dawned on Google’s executives that their dreams of entering the enormous
    Chinese internet market and watching its profits balloon were unrealistic. It
    was a huge disappointment for the company. Hassabis had also put himself in an
    awkward position with the success of *AlphaGo*. By creating a storm of positive
    publicity for DeepMind and showcasing its advanced AI, he’d made the lab look
    even more useful to Alphabet. Even so, Hassabis forged ahead with the plans he’d
    laid mostly with Suleyman to break away.
  prefs: []
  type: TYPE_NORMAL
- en: He was so confident it would happen that a few weeks after the May 2017 China
    match, Hassabis flew most of DeepMind’s more than three hundred staff members
    up to a rural part of Scotland for a retreat, where he and Suleyman told all of
    them about the breakaway plan. At a hotel and conference center that they had
    rented out, they announced the plan to turn DeepMind into a separate global interest
    company. They told staff that DeepMind would eventually become a nonprofit organization
    in which Google would be a stakeholder and that it would be like other organizations
    with a public interest, like the United Nations and the Gates Foundation. The
    goal was to become an organization for good, they explained, and guide AI in a
    way that was positive for the world. Instead of being a financial asset of Google,
    DeepMind would enter an exclusive licensing agreement with the company instead,
    while pursuing its mission to solve the world’s problems.
  prefs: []
  type: TYPE_NORMAL
- en: DeepMind’s staff were thrilled by the idea, according to people who were there
    at the time. If you were an AI researcher, suddenly you had the best of both worlds.
    You were working for a tech company that offered a great salary and benefits,
    but you were also “solving intelligence, and then solving everything else.” The
    founders said the separation would be finalized by September of that year, 2017.
  prefs: []
  type: TYPE_NORMAL
- en: Hassabis and Suleyman asked staff to keep the GIC project secret, which wasn’t
    that unusual. Most DeepMinders had signed strict nondisclosure agreements that
    stopped them from talking about the company’s plans and technology. But in this
    case, they were also being told not to talk about the spinout internally. Some
    were told to use code words, for instance, sometimes referring to the project
    as “watermelon,” and they used encrypted messaging apps like Signal to talk about
    it. Some DeepMind leaders advised staff not to discuss it on corporate devices
    or apps like Gmail, according to former staff.
  prefs: []
  type: TYPE_NORMAL
- en: DeepMind’s researchers believed the secrecy was due to concerns about what Google
    might do with AGI. As the year wore on, those suspicions gained some credibility
    when Google got involved with a military project. The US Department of Defense
    had launched what it called Project Maven in 2017 to try to use more AI and machine
    learning in its defense strategies, for instance by giving its drones computer
    vision to get better at targeting weapons. When Google got involved, it was expecting
    to make $250 million a year from the partnership, according to emails leaked to
    *The Intercept*. Massive internal protests prompted Google to shut the project
    down and decline to renew its contract with the Defense Department, and it validated
    DeepMind’s worries about its AI being misused.
  prefs: []
  type: TYPE_NORMAL
- en: But progress on the spinout was slow. Hassabis and other executives would assure
    staff that the spin-off was “six months away,” and then repeat the mantra several
    months later. After a while, the engineers started wondering if the plan was going
    to happen at all. It didn’t help that its contours seemed hazy. Suleyman, for
    instance, told staff that he wanted DeepMind’s new rules around working with Google
    to be legally enforceable, but he and other managers couldn’t clarify how that
    would happen in practice. Suppose Google were to use DeepMind’s AI for military
    purposes down the line. Could DeepMind sue Google? That wasn’t clear. DeepMind
    staff were told to draw up guidelines that banned its AI from being used for human
    rights violations and “overall harm.” But what did “overall harm” actually mean?
    Nobody knew.
  prefs: []
  type: TYPE_NORMAL
- en: Part of the problem was that DeepMind hadn’t hired enough people to help it
    answer those questions. It had been bulking up on scientists and programmers to
    improve the performance of its AI models, but only a handful of staff were researching
    ethical ways to design AI. In 2020, for instance, most of DeepMind’s roughly one
    thousand staff members were made up of research scientists and engineers, while
    fewer than a dozen were researching ethics and just two were working at a PhD
    level doing academic research on the issue. Almost no one was looking into how
    AI systems could lead to bias and racism or hurt human rights. “You can’t say
    you have an ethics team when we’re really only talking about two people,” one
    DeepMind staffer said at the time.
  prefs: []
  type: TYPE_NORMAL
- en: In AI, “ethics” and “safety” can refer to different research goals, and in recent
    years, their proponents have been at odds with one another. Researchers who say
    they work in AI safety tend to swim in the same waters as Yudkowsky and Jaan Tallinn
    and want to ensure that a superintelligent AGI system won’t cause catastrophic
    harm to people in the future, for instance by using drug discovery to build chemical
    weapons and wiping them out or by spreading misinformation across the internet
    to completely destabilize society.
  prefs: []
  type: TYPE_NORMAL
- en: Ethics research, on the other hand, focuses more on shaping how AI systems are
    designed and used today. They study how the technology might already be harming
    people. This is because the Google Photos algorithm that had labeled Black people
    as “gorillas” wasn’t an isolated example. Bias is an immense problem in AI. Algorithms
    used in the American criminal justice system have disproportionately, and incorrectly,
    flagged Black individuals as more likely to reoffend. And developers have used
    AI tools for ethically repulsive purposes, like the Stanford researchers who released
    a facial recognition system that claimed to distinguish people’s sexual orientation.
  prefs: []
  type: TYPE_NORMAL
- en: The people who built all three systems should have put more thought into designing
    their models with fairness, transparency, and human rights in mind. But these
    issues are squishy and hard to define, and they also tend not to impact the people
    running AI companies, who, more often than not, skew toward male and Caucasian.
    When AI systems go awry today, they are more likely to harm people of color, women,
    and other people from minority groups.
  prefs: []
  type: TYPE_NORMAL
- en: What’s perplexing is that in 2017, DeepMind was talking to the press and on
    its website about the importance of ethics in its “mission of solving intelligence
    to advance science and benefit humanity.” It spoke to *Wired* magazine, for instance,
    about how its small team of ethics researchers would swell to twenty-five people
    within the next year.
  prefs: []
  type: TYPE_NORMAL
- en: But in reality, that team grew to only about fifteen, in large part because
    DeepMind’s leaders were so focused on the spin-out project, according to a former
    executive. “They talk about this work all the time but it’s just a handful of
    [ethics researchers], struggling,” another staffer said, explaining that the ethics
    team had no support team and few resources. “It doesn’t make sense. This is a
    [multibillion-dollar] corporation.”
  prefs: []
  type: TYPE_NORMAL
- en: If DeepMind wasn’t putting its money where its mouth was on ethics, that raised
    questions about why the founders were so keen to spin out from Google in the first
    place. Did they really care about preventing their technology from doing harm,
    or were they feeding a more personal instinct to maintain control? As part of
    the terms of its separation, DeepMind was planning to sign an exclusive licensing
    agreement with Google, but the founders couldn’t seem to clarify where they drew
    the line on using their AI for weapons or whether that was legally enforceable.
    They seemed big on ambition but lacking on details. Some staff wondered if Hassabis,
    Suleyman, and Legg were being naive in wanting to have their cake and eat it—taking
    Google’s money to keep building AGI but grabbing control away from Google too.
  prefs: []
  type: TYPE_NORMAL
- en: In much the same way Google had started with a “don’t be evil” motto, DeepMind’s
    founders had kicked off their life under Google with good intentions. They’d left
    $150 million on the table with Facebook to keep an ethics board. But years later,
    they seemed to be prioritizing performance and prestige over ethics and safety.
    They didn’t have clear answers for how they would contain AGI other than hiring
    an all-star team of mathematicians like Terence Tao or on how they would stop
    that technology being used in harmful ways.
  prefs: []
  type: TYPE_NORMAL
- en: All of this raised a bigger question. Could you even do meaningful work on ethical
    AI from inside a large corporation? The answer came from inside Google itself.
    It was a resounding no.  <hgroup>
  prefs: []
  type: TYPE_NORMAL
- en: '[CHAPTER 8](contents.xhtml#c_ch8) [Everything Is Awesome](contents.xhtml#c_ch8)'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: </hgroup>
  prefs: []
  type: TYPE_NORMAL
- en: 'To understand why it became so maddeningly difficult to design ethical AI systems
    at Google, or to even turn innovative ideas into products at the company, you
    have to step back and look at some numbers. At the time of writing, Google’s parent
    company, Alphabet Inc., had a market capitalization of $1.8 trillion. In 2020,
    Apple became the first publicly traded US company to hit a $2 trillion valuation,
    while Amazon’s and Microsoft’s market values were hovering at around $1.7 trillion
    and an astonishing $3 trillion, respectively. Before Apple first became a trillion-dollar
    company in 2018, no company ever had become so big. Yet there’s one thing that
    nearly all the world’s most valuable companies have in common: they are tech firms.
    In fact, the companies that we might normally think of as being gargantuan are
    only a quarter the size of their peers in Silicon Valley. Oil giant Exxon Mobil
    is valued at a piddling $450 billion while Walmart is worth $435 billion. Combine
    the market caps of the tech giants and you have surpassed the gross domestic product
    of most of the world’s nations, barring the US and China.'
  prefs: []
  type: TYPE_NORMAL
- en: Looking back in history, the companies that we once thought of as giants also
    pale in comparison to those of today. At its peak before being broken up in 1984,
    AT&T had a market capitalization of around $60 billion in 1984 dollars, or about
    $150 billion in today’s money. General Electric’s highest market cap was about
    $600 billion in 2000.
  prefs: []
  type: TYPE_NORMAL
- en: Even the market dominance of tech giants is unparalleled. Before regulators
    broke it up in 1911, Standard Oil controlled about 90 percent of oil business
    in the United States. Today, Google controls about 92 percent of the search engine
    market—globally. Roughly one billion people around the world run a search on Google
    each day. More than two billion check Facebook. And about 1.5 billion people in
    the world have an iPhone. No government or empire in history has touched so many
    people at once.
  prefs: []
  type: TYPE_NORMAL
- en: It’s taken a little over two decades for these companies to reach this scale
    since the dotcom boom and bust. How did they get so big? They bought companies
    like DeepMind, YouTube, and Instagram, and they sucked up a prodigious amount
    of data about consumers, allowing some of them to target us with advertisements
    and recommendations that could influence human behavior on a massive scale. While
    Google collects data through search queries and YouTube interactions, Amazon tracks
    our purchases and browsing behavior. The sheer scale of data they collect is hard
    for regular people to fathom, including personal details, browsing history, location
    data, and even voice recordings in some cases. The data isn’t just voluminous
    but diverse, giving tech companies a detailed picture of consumer behavior.
  prefs: []
  type: TYPE_NORMAL
- en: Firms like Facebook and Google use that data to conduct hypertargeted advertising,
    displaying ads that pique a person’s interests and fuel sophisticated recommendation
    algorithms. That software powers the “feeds” that people thumb through every day,
    making sure the content that pops up is most likely to keep them continuously
    scrolling. The companies are incentivized to keep us as addicted as possible to
    their platforms, since that generates more ad dollars. But the adverse effects
    are plentiful. Americans are so addicted to Facebook, Instagram, and other social
    media apps that they checked their phones 144 times a day on average in 2023,
    according to one study.
  prefs: []
  type: TYPE_NORMAL
- en: All that personalized “content delivery” has also amped up the generational
    and political divisions between millions of people, since the most engaging content
    tends to be the kind that provokes outrage. Facebook, for instance, often recommended
    the most provocative political content in people’s feeds during the 2016 US presidential
    election and exposed many users to news and opinions that reinforced their existing
    beliefs, creating echo chambers. The same phenomenon fueled growing resentment
    toward immigration in Britain in the months leading up to the UK’s referendum
    on Brexit, as well as hostility toward the Rohingya people of Myanmar in 2017\.
    Facebook’s algorithms supercharged the spread of hateful content against the Rohingya
    so much that it fueled the Myanmar military in its genocidal campaign to kill,
    torture, rape, and displace the Muslim ethnic group in the thousands, according
    to a report by Amnesty International. Facebook has admitted in press reports that
    it didn’t do enough to prevent the incitement of violence against the Rohingya.
  prefs: []
  type: TYPE_NORMAL
- en: 'For all the division Facebook sowed, the company’s business model was unfathomably
    successful, treating its billions of users and their data as the product and its
    advertisers as the real customers. The more data it could get, the more it could
    make from advertisers. While this engagement-based model had toxic effects on
    society, it incentivized Facebook to do one thing: become as big as possible.'
  prefs: []
  type: TYPE_NORMAL
- en: The other way these companies became so enormous was network effects, a seemingly
    magical phenomenon that every start-up founder craves. The basic idea of network
    effects is that the more users and customers a company has, the better their algorithms
    will become, making it increasingly difficult for competitors to catch up, further
    entrenching their grip on the market. In the case of Facebook, for instance, people
    started joining the site because everyone else was on Facebook, and many have
    stayed on the site for years since—or at least resisted the urge to delete their
    accounts—for much the same reason. If you’re an Apple fangirl or fanboy, you’ll
    know how hard it is to try another device maker like Samsung, or to get the latter’s
    accessories to work with an iPhone. All these interconnected products and services
    make it hard to switch, reinforcing Apple’s dominance.
  prefs: []
  type: TYPE_NORMAL
- en: We have no historical reference point for what happens when companies become
    this big. The market cap numbers that Google, Amazon, and Microsoft are currently
    achieving have never been seen before. And while they bring greater wealth to
    the shareholders of those companies, including pension funds, they have also centralized
    power in such a way that the privacy, identity, public discourse, and increasingly
    the job prospects of billions of people are beholden to a handful of large firms,
    run by a handful of unfathomably wealthy people.
  prefs: []
  type: TYPE_NORMAL
- en: It is little wonder that for those working inside a tech giant who see something
    wrong, sounding the alarm can seem as futile as trying to turn the *Titanic* around
    just moments before hitting the iceberg. Still, that didn’t stop an AI scientist
    named Timnit Gebru from trying.
  prefs: []
  type: TYPE_NORMAL
- en: In December 2015, at the NeurIPS conference where Sam Altman and Elon Musk announced
    they were creating AI “for the benefit of humanity,” Gebru looked around at the
    thousands of other attendees and shuddered. Almost no one there looked like her.
    Gebru was in her early thirties and Black, and she’d had anything but a conventional
    upbringing with the support system that many of her peers had enjoyed.
  prefs: []
  type: TYPE_NORMAL
- en: Her Eritrean father, an electrical engineer, died when she was five, and she
    fled war-torn Ethiopia when she was a teen. Her teachers at high school in Massachusetts
    took a dim view of her ambitions as a new immigrant. They discouraged her from
    taking Advanced Placement courses, saying she might find them too difficult. She
    recalled one teacher telling her, “I’ve met so many people like you who think
    that they can just come here from other countries and take the hardest classes,”
    according to a profile of Gebru in *Wired* magazine. But Gebru took them anyway
    and won a place studying electrical engineering at Stanford University.
  prefs: []
  type: TYPE_NORMAL
- en: Eventually, she stumbled onto the field of artificial intelligence and computer
    vision, software that could “see” and analyze the real world. The technology was
    entrancing, but Gebru saw red flags. AI systems were being given powerful roles
    in people’s lives, from giving someone a credit score to granting a mortgage,
    and from flagging someone’s face for the police to helping a human judge decide
    a criminal sentence. While it seemed like these systems could be the perfect neutral
    arbiter, they often were not. If the data they were trained on was biased, so
    was the system. And Gebru was painfully aware of bias.
  prefs: []
  type: TYPE_NORMAL
- en: When she was a young woman in San Francisco, for instance, she and another Black
    woman were attacked and strangled by some men at a bar. They went for help, but
    the police accused them of lying and detained them in a cell. Another time, while
    Gebru was writing her thesis at Stanford, she learned that only one other Black
    person had done a computer science PhD there. And out of the five thousand people
    at the biggest international AI conference where Altman and Musk were launching
    OpenAI in 2015, only five participants were Black.
  prefs: []
  type: TYPE_NORMAL
- en: Gebru knew these weren’t one-offs. Bias was systemic in the world around her.
    Decades after the success of the twentieth century’s civil rights era, racism
    was still culturally baked into the world’s institutions and psyche. AI could
    make that worse. For a start, it was typically designed by people who hadn’t experienced
    racism, which was one reason why the data being used to train AI models also often
    failed to fairly represent people from minority groups and women.
  prefs: []
  type: TYPE_NORMAL
- en: Gebru saw the consequences of that in her academic research. She came across
    an investigation into software being used in the US criminal justice system called
    COMPAS (Correctional Offender Management Profiling for Alternative Sanctions),
    which judges and parole offices used to help make decisions about bail, sentencing,
    and parole.
  prefs: []
  type: TYPE_NORMAL
- en: COMPAS used machine learning to give risk scores to defendants. The higher the
    score, the more likely they were to reoffend. The tool gave high scores to Black
    defendants far more than white defendants, but its predictions were often erroneous.
    COMPAS turned out to be twice as likely to be wrong about future criminal behavior
    by Black defendants as it was for Caucasian ones, according to a 2016 investigation
    by ProPublica, which looked at seven thousand risk scores given to people arrested
    in Florida and checked if they’d been charged with new offenses in the next two
    years. The tool was also more likely to misjudge white defendants who went on
    to commit other crimes as low-risk. America’s criminal justice system was already
    skewed against Black people, and that bias looked set to continue with the use
    of inscrutable AI tools.
  prefs: []
  type: TYPE_NORMAL
- en: While writing her PhD thesis at Stanford, Gebru pointed to another example of
    how authorities could use AI in disturbing ways. She trained a computer vision
    model to identify twenty-two million cars shown on Google Street View, then dug
    into what those cars might say about an area’s demographics. When she correlated
    the cars with census and crime data, she found that areas with more Volkswagens
    and pickup trucks tended to have more white residents, while those with Oldsmobiles
    and Buicks had more Black ones. And areas that had more vans also had more reports
    of crime. Such correlations could be exploited. What if police used that data
    to try to predict where crimes might take place, like in the movie *Minority Report*?
  prefs: []
  type: TYPE_NORMAL
- en: The idea wasn’t crazy. For several years, police precincts across the US had
    been using computers to advise their officers on what areas to patrol, a technology
    known as predictive policing. But the software was trained on historic data, which
    meant it often led them to target minority communities. If the data showed a community
    was being overpoliced, the software would lead that community to continue being
    overpoliced, amplifying a pre-existing problem.
  prefs: []
  type: TYPE_NORMAL
- en: AI was spreading other stereotypes online, too, in subtle but insidious ways.
    Both Google Translate and Microsoft’s Bing Translate sometimes made certain professions
    male when translating them to other languages. The phrase *o bir muhendis* in
    Turkish, which has gender-neutral pronouns, became *he is an engineer* in English,
    while *o bir hemsire* became *she is a nurse*. Software made these assumptions
    thanks to a popular technique called word embedding, which looked at words that
    tended to hang around other words, like “engineer.” The model then figured out
    what other word fit best, like “he.” Google, Facebook, Netflix, and Spotify all
    powered their online recommendations with the word embedding technique, in spite
    of the true-to-life gender imbalances they were introducing into their software.
  prefs: []
  type: TYPE_NORMAL
- en: Clearly AI had problems that should have been dealt with yesterday, so when
    Sam Altman announced OpenAI in 2015, Gebru was livid. She started writing an open
    letter about how wasteful it was for a few egocentric billionaires like Musk and
    Thiel to put their money into an effort to build godlike AI, and complained that
    the only concerns raised about the new nonprofit had been that its researchers
    were too focused on deep learning.
  prefs: []
  type: TYPE_NORMAL
- en: “A white tech tycoon born and raised in South Africa during apartheid, along
    with an all-white, all-male set of investors and researchers is trying to stop
    AI from ‘taking over the world’ and the only potential problem we see is that
    ‘all the researchers are working on deep learning?’” she wrote. “Google recently
    came out with a computer vision algorithm that classified Black people as Apes.
    AS APES. Some try to explain away this mishap by stating that the algorithm must
    have picked out color as an essential discriminator in classifying humans. If
    there was even one Black person [on] the team, or just someone who thinks about
    race, a product classifying Black people as apes would not have been released.…
    Imagine an algorithm that regularly classifies white people as nonhuman. No American
    company would call this a production-ready person detection system.”
  prefs: []
  type: TYPE_NORMAL
- en: One of Gebru’s colleagues told her not to publish the letter. It was too candid,
    and she’d probably be identified. Gebru decided to keep it private (only releasing
    it a few years later), but she couldn’t help asking why some of Silicon Valley’s
    most powerful people were so worried about the possibility of AI doom when AI
    was already causing real harm to people today. There were two answers. The first
    was that few if any of the leaders of OpenAI and DeepMind had ever been, or ever
    would be, on the receiving end of racial or gender discrimination. The second
    was that it was, paradoxically, in their corporate interests to shout about the
    risks of an all-powerful superintelligence. It might not make perfect sense to
    warn people about the dangers of something you are trying to sell, but it was
    a brilliant marketing strategy. People tended to care more about the here and
    now than their long-term future. If AI suddenly looked like it was on track to
    snuff us out down the line, that also gave it the alluring glow of impressive
    capabilities today.
  prefs: []
  type: TYPE_NORMAL
- en: The strategy was also a clever way to avert the public’s attention from the
    thorny, more immediate problems that companies could take action on, requiring
    them to slow down their development and rein in the capabilities of their AI models.
    One way to limit AI models from making biased decisions was to spend more time
    analyzing the data they were trained on. Another was to make them narrower in
    scope, which would blow a hole in the goal of giving AI systems the power to generalize
    their knowledge.
  prefs: []
  type: TYPE_NORMAL
- en: This wouldn’t be the first time large companies had distracted the public while
    their businesses swelled. In the early 1970s, the plastic industry, backed by
    oil companies, began to promote the idea of recycling as a solution to the growing
    problem of plastic waste. Keep America Beautiful, for instance, was an organization
    founded in 1953 that ran public service campaigns encouraging consumers to recycle,
    and was funded in part by drinks and packaging firms. Its famous “Crying Indian”
    ad aired on Earth Day in 1971 and encouraged people to recycle their bottles and
    newspapers to help prevent pollution. If they didn’t, they were guilty of showing
    flagrant disregard for the environment.
  prefs: []
  type: TYPE_NORMAL
- en: Recycling is not a bad thing per se. But by promoting the practice, the industry
    could argue that plastics weren’t inherently bad so long as they were recycled
    properly, which shifted the perception of responsibility from producers to consumers.
    Plastics companies knew that recycling on a large scale was expensive and often
    inefficient. A 2020 investigation by NPR and the PBS series *Frontline* found
    that less than 10 percent of plastic had ever been recycled, despite decades of
    public awareness campaigns.
  prefs: []
  type: TYPE_NORMAL
- en: What the campaigns had achieved, though, was drawing public attention away from
    questioning the rapid expansion of plastic production and the toll that was having
    on the environment. Recycling became part of the public discourse. News publications,
    consumers, and policymakers in Washington spent more time talking about how to
    do more recycling than they did about regulating actual plastic production by
    companies.
  prefs: []
  type: TYPE_NORMAL
- en: In just the same way Big Oil redirected the world’s attention from their own
    significant environmental impact, AI’s leading builders could exploit the buzz
    around a future Terminator or Skynet to distract from the present-day problems
    that machine learning algorithms were causing. The burden of responsibility wasn’t
    on the creators or the industry to act now. It was an abstract problem to be dealt
    with later.
  prefs: []
  type: TYPE_NORMAL
- en: In January 2017, a few months before DeepMind tried to help shoehorn Google
    back into China with *AlphaGo*, Gebru presented the findings of her thesis to
    an audience of venture capitalists and executives from Silicon Valley. As she
    clicked through her slides, she explained that AI systems could combine their
    ability to recognize cars with their ability to make predictions to forecast things
    like voting patterns or household income.
  prefs: []
  type: TYPE_NORMAL
- en: One venture capitalist there, a Tesla investor and friend of Elon Musk named
    Steve Jurvetson, was stunned, but not for the reasons Gebru was hoping. Think
    about how powerful this kind of data made Google and the kinds of insights it
    could make about different neighborhoods or towns. He was so impressed that he
    posted photos of Gebru’s talk to Facebook.
  prefs: []
  type: TYPE_NORMAL
- en: In what was a continuing incongruity in AI, some in the room saw a financial
    opportunity while others like Gebru saw a danger that needed to be contained.
    Each time AI’s capabilities grew, an unintended consequence arose that often caused
    harm to a minority group. Facial recognition systems were nearly perfect at recognizing
    the faces of white men, but often made mistakes with Black women. A 2018 landmark
    study from MIT graduate researcher Joy Buolamwini found that face-recognition
    systems from IBM and Microsoft and China’s Face++ were more likely to misclassify
    the gender of darker-skinned and female faces, something she noticed when her
    own face wasn’t recognized by a similar program. Many of these systems were being
    trained on datasets of photos that were dominated by Caucasian males and on photos
    scraped from the web. The databases overrepresented them because the internet
    reflected the demographic of Western people who had more access to it.
  prefs: []
  type: TYPE_NORMAL
- en: Gebru wasn’t throwing her hands up in the air. She had solutions. One was for
    the creators of AI systems to follow more rigorous standards when training their
    models. After joining Microsoft, she wrote up a set of rules called “Datasheets
    for Datasets,” which said that when training an AI model, programmers should create
    a datasheet that showed all the details about how it was created, what was in
    it, how it would be used, what its limitations might be, and any other ethical
    considerations. It promised to be an exasperating extra step in paperwork for
    AI builders, but it had a purpose. If the model ended up being biased, it’d be
    a lot easier to figure out why.
  prefs: []
  type: TYPE_NORMAL
- en: 'Figuring out why AI systems make mistakes is much harder than people think,
    especially as they become more sophisticated. In 2018, Amazon realized that an
    internal AI tool that it used to sift through job applications kept recommending
    more male candidates than female candidates. The reason: the tool’s creators had
    trained it on résumés submitted to the company over the previous ten years, most
    of which came from men. The model had learned that résumés with male attributes
    were more desirable as a result. But Amazon didn’t—or wasn’t able to—fix the tool.
    It just shut it down completely.'
  prefs: []
  type: TYPE_NORMAL
- en: Google took a similarly blunt approach when its Photos tool had labeled some
    Black individuals “gorillas,” stopping the app from identifying gorillas completely
    even as it continued to recognize other animals. The original, painful mistake
    came about because Google hadn’t trained its tool on enough images of Black and
    dark-skinned people and likely hadn’t tested it on employees enough either. But
    even in late 2023, the company still wasn’t confident enough in its ability to
    tweak its AI model to fix it, so it simply shut the feature down.
  prefs: []
  type: TYPE_NORMAL
- en: Some AI researchers say it’s too difficult to fix these biases, arguing that
    modern-day AI models are so complex that even their creators don’t understand
    why they make certain decisions. Deep-learning models, like neural networks, are
    made up of millions or billions of parameters, also known as “weights,” that act
    as adjusters in complex mathematical functions between connected layers. Think
    of the layers of a neural network as being a bit like a factory with an assembly
    line, where each person on the line has a certain job like painting a toy car
    or adding the wheels. By the end of the line, you have a toy car. Each layer in
    a neural network is like the stations in the assembly line, making their own little
    adjustment to the data. The problem is that with so many small changes happening
    in sequence, it’s difficult to trace back exactly what each station on the assembly
    line (or layer in the neural network) did to make the toy car—to make the decision
    to label a Black defendant as being at high risk of reoffending.
  prefs: []
  type: TYPE_NORMAL
- en: After Google was in the news for the gorilla debacle, another computer scientist,
    named Margaret Mitchell, joined the search giant to try to prevent similar mistakes
    from happening. Born in Los Angeles and well-known among AI researchers for her
    work on fairness in machine learning, Mitchell joined a small but growing effort
    in the field to be more careful about the real-world impact of machine learning
    systems. Like Gebru, she was worried about the strange mistakes AI systems were
    making. She’d conducted most of her postgraduate research in computational linguistics
    and then natural language generation, studying all the ways that computers could
    describe objects or analyze emotions in text. When she worked on an app for blind
    people at Microsoft, she was unnerved when it described a Caucasian person like
    herself as a “person” but someone with dark skin as a “Black person.”
  prefs: []
  type: TYPE_NORMAL
- en: Another time, she was running some experiments on a neural network that described
    images, and she fed it some pictures of a factory explosion in England. One photo
    had been taken from high up in a nearby apartment. It showed plumes of smoke and
    a TV news channel in the foreground reporting on the incident. Mitchell was stunned
    when the AI system told her the image was “awesome,” “beautiful,” and a “great
    view.”
  prefs: []
  type: TYPE_NORMAL
- en: “The system had an everything-is-awesome problem,” says Mitchell, recalling
    the famous song from *The Lego Movie* about a brick-based world where all of life’s
    troubles are brushed under the carpet. “It had no concept of mortality, and it
    had no concept that death is bad.”
  prefs: []
  type: TYPE_NORMAL
- en: What it had really learned from the training photos was that sunsets were beautiful
    and that being high up gave you a great view. That’s when the penny dropped for
    Mitchell. Data was everything. By creating gaps in the data to train her own system,
    she had encoded it with all kinds of biases, including ones that dismissed the
    loss of human life.
  prefs: []
  type: TYPE_NORMAL
- en: As Mitchell worked on these issues at Google, she noticed another frustrating
    feature about working for a large tech firm. She was in the middle of a stifling
    bureaucracy, chasing endless meetings and managers who seemed perpetually worried
    about the company’s reputation.
  prefs: []
  type: TYPE_NORMAL
- en: In 2018, Mitchell sent Gebru an email asking to join her at Google. AI ethics
    was small enough that the two already knew each other. Would Gebru co-lead Google’s
    ethical AI research team?
  prefs: []
  type: TYPE_NORMAL
- en: Gebru hesitated. She’d heard rumors through the grapevine that Google was a
    toxic place to work, particularly for women and minorities. There was no better
    example than the case of Google executive Andy Rubin. Rubin had been a rock star
    at Google, having cofounded its popular Android operating system, but in 2014,
    he quietly left the company following allegations of sexual misconduct. A few
    years later, an investigation by the *New York Times* found that Google’s management
    had looked into the sexual misconduct allegations and found them to be credible.
    Yet instead of kicking Rubin out the door, Google had given him a hero’s goodbye,
    which included a $90 million exit package.
  prefs: []
  type: TYPE_NORMAL
- en: It wasn’t all bad at Google, though. Gebru was impressed by how staffers would
    stand up and fight back when they saw the company do wrong. Thousands had staged
    a global walkout over Rubin’s golden parachute, and months before she joined,
    more than three thousand employees had signed an open letter to CEO Sundar Pichai,
    demanding that the company withdraw from Project Maven—which it did. Even better,
    those protests had been coordinated by an expert in AI ethics, a woman named Meredith
    Whittaker, whose clear articulation of the problem forced Google to reconsider
    the program. Maybe this was a place where she could promote more responsible practices
    like her Datasheets for Datasets standards.
  prefs: []
  type: TYPE_NORMAL
- en: 'But looking at the size of her new ethics team, it was clear where tech giants
    like Google prioritized their investment in AI: capabilities. Despite the importance
    of their work, the team was just a handful of computer scientists. Across the
    rest of the company, thousands of engineers and researchers were still working
    on making the company’s AI systems faster and better, creating new standards of
    capability that Gebru and Mitchell were constantly chasing and trying to scrutinize
    for unintended consequences.'
  prefs: []
  type: TYPE_NORMAL
- en: Mitchell was feeling ground down at Google. When she warned managers at meetings
    about some of the potential problems their AI systems could introduce, she’d get
    emails from the Human Resources Department telling her to be more collaborative.
    In Silicon Valley, women made up only about a quarter of computing jobs at firms
    like Google, Apple, and Facebook and were still earning eighty-six cents for every
    dollar earned by men in 2020\. Women often experienced unequal treatment, harassment,
    and discrimination in hiring and promotions, and the situation was especially
    challenging for Black women. Many of the women who showed up to a typical Silicon
    Valley conference or drinks event worked in marketing or PR rather than in engineering
    or research. Women were thus more likely to work on AI ethics in the first place;
    they knew firsthand what discrimination could feel like. But it also meant they
    struggled to be the loudest voices in the room.
  prefs: []
  type: TYPE_NORMAL
- en: Still, Mitchell found herself surprised and then in awe of Gebru, who was audacious
    and had no qualms about standing up to authority if she needed resources or saw
    wrongdoing. One day when the pair were sitting in Gebru’s office at Building 41
    of the Google campus, they were talking about an upsetting email that had come
    through from one of their managers, which reflected the discrimination they both
    felt at the company. Mitchell was on the verge of tears. Gebru took a different
    view.
  prefs: []
  type: TYPE_NORMAL
- en: “Don’t be depressed,” she told Mitchell. “Get angry.”
  prefs: []
  type: TYPE_NORMAL
- en: Gebru pulled her laptop toward her and started drafting a response to the manager,
    reading it aloud as she went along and clinically taking apart their manager’s
    points. Later, when both Mitchell and Gebru would be fired by Google, that same
    manager would publicly vouch for them both and then resign shortly after.
  prefs: []
  type: TYPE_NORMAL
- en: Gebru and Mitchell were about to finally bring proper attention to their cause,
    even if it meant being kicked out in what would become a public scandal. But they
    were racing against Google’s central effort. That much bigger team of scientists
    who were tasked with making Google’s AI smarter were about to stumble upon one
    of the biggest leaps forward in AI history. It was a miracle they did.  <hgroup>
  prefs: []
  type: TYPE_NORMAL
- en: '[CHAPTER 9](contents.xhtml#c_ch9) [The Goliath Paradox](contents.xhtml#c_ch9)'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: </hgroup>
  prefs: []
  type: TYPE_NORMAL
- en: In 2017, Google had about eighty thousand salaried employees. Not all of them
    were engineers. There were curators of the daily Google Doodle that showed up
    above everybody’s search bar. There were in-office chiropractors and masseuse
    managers, snackologists who made sure the staff were fueled between their three
    hot meals at the canteen, horticulturists who looked after the plants, and cleaners
    who wiped down the foosball tables.
  prefs: []
  type: TYPE_NORMAL
- en: 'Google’s business model was a golden goose. That year its advertising business
    was generating close to $100 billion annually—a number that would more than double
    by 2024—so it was natural that much of that money would go toward bulking up its
    talent. Silicon Valley tended to measure success with two metrics: how much money
    you had raised from investors, and how many people you had hired. Gargantuan employee
    numbers reflected the empire-building dreams of CEOs like Larry Page and Sergey
    Brin, even if it wasn’t always clear what many of their middle managers were doing.'
  prefs: []
  type: TYPE_NORMAL
- en: Google’s corporate bloat was not unusual. Facebook at that time had about 40,000
    employees and Microsoft had 124,000, while start-up founders dreamed of running
    their own corporate campuses complete with gyms and free ice cream stalls. Demis
    Hassabis was one exception to the rule, perhaps because he was stationed an ocean
    away. He didn’t want DeepMind to get sucked into the distracting world of Silicon
    Valley perks and size obsessions.
  prefs: []
  type: TYPE_NORMAL
- en: The problem with being so big was that if someone did invent something groundbreaking
    inside Google, it might struggle to see the light of day. Google’s digital ad
    business was sacrosanct. You didn’t mess with the algorithms that powered it unless
    you really had to. For all the kudos that Silicon Valley got for being the innovation
    capital of the world, its biggest companies weren’t all that innovative. Google’s
    home page had barely changed over the past decade. The iPhone was still the same
    old rectangular slab of metal. And nearly every new Facebook feature was a direct
    copy of a competitor like Snapchat or TikTok. Once these companies reached a stage
    where their revenue was in the tens of billions, messing with their formula for
    success was too dangerous.
  prefs: []
  type: TYPE_NORMAL
- en: That’s why when a group of researchers at Google made one of the most important
    discoveries in artificial intelligence in the past decade, the search company
    left it to languish internally. Their story in a nutshell showed how the monopolistic
    scale of Big Tech firms crimped their ability to invent, forcing them to react
    to other people’s innovations by copying and buying them outright. But this particular
    negligence was worse for Google. In the end, OpenAI not only capitalized on Google’s
    big invention, it used that invention to launch the first viable threat to the
    search giant in years.
  prefs: []
  type: TYPE_NORMAL
- en: The *T* in ChatGPT stands for “transformer.” This has nothing to do with the
    alien robots that morph into eighteen-wheelers but a system that allows machines
    to generate humanlike text. The transformer has become critical to the new wave
    of *generative* AI that can produce realistic text, images, videos, DNA sequences,
    and many other kinds of data. The transformer’s invention in 2017 was about as
    impactful to the field of AI as the advent of smartphones was for consumers. Before
    smartphones, mobile phones couldn’t do much more than make calls, send texts,
    and play the odd game of Snake. But when touch-screen smartphones hit the market,
    suddenly people could browse the internet, use GPS, take high-quality photos,
    and use millions of different apps.
  prefs: []
  type: TYPE_NORMAL
- en: 'Transformers also broadened the scope of what AI engineers could do. They could
    handle far more data and process human language much more quickly. Before transformers,
    talking to a chatbot felt like talking to a dumb machine because the older systems
    operated on sets of rules and decision trees. If you asked a bot something that
    wasn’t already written into its programming (which was often likely), it would
    be stumped or make a peculiar error. That was how digital assistants like Apple’s
    Siri, Amazon’s Alexa, and even Google’s Assistant were originally designed. They
    treated each query as a single isolated request, which meant they were terrible
    at context. They couldn’t remember questions you’d previously asked in the same
    way a person would during a conversation. For instance:'
  prefs: []
  type: TYPE_NORMAL
- en: “Alexa, what’s the weather like in Indianapolis right now?”
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: “Right now in Indianapolis, it’s twenty-four degrees Fahrenheit with cloudy
    skies.”
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: “How many hours would it take for me to fly there from London?”
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: “From London, to fly to your current location, it would take about forty-five
    minutes.”
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: My current location at the time of writing was Surrey, which would presumably
    take forty-five minutes to fly to from London’s Heathrow Airport. How Alexa came
    up with that convoluted flight plan doesn’t matter—the problem was that it couldn’t
    process that “there” meant Indianapolis, which I’d asked about two seconds earlier.
    The systems behind most of these traditional digital assistants were narrow and
    still relied primarily on keywords. That’s why they still gave canned responses.
  prefs: []
  type: TYPE_NORMAL
- en: 'Transformers broke chatbots out of those bonds. They could deal with nuance
    and slang. They could refer back to that thing you said a few sentences earlier.
    They could handle almost any random query and give a personalized answer. One
    word summed up the upgrade: they were more *general*. And for many AI researchers,
    that meant a step toward AGI. It would also open a debate about whether computers
    were starting to “understand” language in the same way humans did or if they were
    still just processing it through math-based predictions.'
  prefs: []
  type: TYPE_NORMAL
- en: In one way it’s astonishing that the invention came out of Google at all. For
    all the talent and resources the company had, its bloat and fear of disrupting
    its ad business hampered staff who tried to push through new innovations. Google
    Brain had the company’s most advanced deep-learning researchers, but they grappled
    with unclear goals and strategies from management, former staff there say. The
    culture of complacency partly came from having so many talented scientists on
    staff, like Geoffrey Hinton. The bar was high, and Google was already using cutting-edge
    AI techniques, like recurrent neural networks, to process billions of words of
    text every day.
  prefs: []
  type: TYPE_NORMAL
- en: If you were a young AI researcher like Illia Polosukhin, you were sitting next
    to the people who’d invented these techniques. In early 2017, Polosukhin was getting
    ready to leave Google and was willing to take some risks. Inside one of the Google
    canteens, two floors below the office of Larry Page, the twenty-five-year-old
    Ukrainian was spitballing with two other researchers, Ashish Vaswani and Jakob
    Uszkoreit. His lunch mates also didn’t like following the conventions of other
    scientists in the building. Vaswani was hungry to work on a big project. Uszkoreit
    had been at Google for more than ten years and was wary of the way Google Brain’s
    incentive structure had morphed into something like a glorified academic institution;
    after hiring dozens of new graduates and academics, he was surrounded by people
    who mainly cared about being first author on a paper or getting published at a
    conference. Whatever happened to making great products?
  prefs: []
  type: TYPE_NORMAL
- en: 'Uszkoreit would get impressed looks from people at a party if he mentioned
    where he worked. But whenever he added that he worked on Google Translate, they’d
    start laughing. The service was clunky and often inaccurate, particularly on non-Latin
    languages like Chinese. Polosukhin agreed that Google Translate sucked. He had
    friends in China who complained about the service. Uszkoreit wondered aloud if
    there was a better way. Google engineers tended to believe they were already working
    with the most advanced technology, so they operated on a motto of “if it ain’t
    broke, don’t fix it.” Uszkoreit saw things a different way: if it ain’t broke,
    break it.'
  prefs: []
  type: TYPE_NORMAL
- en: “What if we got rid of the recurrent neural networks in the decoder of machine
    translation and just used attention in the decoder,” one of them asked. “Wouldn’t
    that speed up inference time?”
  prefs: []
  type: TYPE_NORMAL
- en: In AI-speak, the researchers were asking if they could take better advantage
    of ultrapowerful computing chips. Till then, Google had been using a technique
    called recurrent neural networks to analyze words. The system looked at each word
    in a sequence, as you might when reading a sentence from left to right. This was
    the cutting-edge method at the time, but it didn’t take full advantage of the
    hefty chips that companies like Nvidia were making that could process lots of
    tasks at the same time. The chip in your home laptop probably had something like
    four “cores” to handle instructions, but the GPU chips used in servers to process
    AI systems had thousands of cores. This meant an AI model could “read” lots of
    words in a sentence all at once, not just in sequence. Not capitalizing on those
    chips was like switching off an electric saw to manually cut wood. Imagine unplugging
    an entire sawing machine and dragging its blade across a plank over and over.
    That would be a slow and arduous waste of the machine’s potential. The same was
    happening with the AI systems that processed language. They weren’t using the
    full potential of the chips that powered them.
  prefs: []
  type: TYPE_NORMAL
- en: Researchers like Vaswani had been looking into the concept of “attention” in
    AI, which is when a computer can pick out the most important information in a
    dataset. Over their salads and sandwiches, the trio wondered if they could use
    that same technique to translate words more quickly and accurately.
  prefs: []
  type: TYPE_NORMAL
- en: Over the next few months, the researchers started running experiments. Uszkoreit
    would scribble diagrams of the new architecture on white boards around the office,
    which passersby would look at with quiet skepticism. What his team were working
    on didn’t make sense at the time. They were talking about removing the “recurrent”
    element of recurrent neural networks, which was crazy. And the different architectures
    that Vaswani was building still weren’t significantly better than the status quo.
    But as word got around about their project, others wanted in.
  prefs: []
  type: TYPE_NORMAL
- en: One of them was Noam Shazeer, and he was already a legend at Google. He had
    coinvented a system that helped Google’s Adsense program figure out which ads
    to show on which web pages. With his perpetually wide grin and booming voice,
    he was seen as quirky and chatted to suits like Sundar Pichai as if they were
    old friends. Shazeer had extensive experience with large language models. These
    were computer programs that could analyze and generate humanlike text after being
    trained on billions of words. Soon after he joined the ragtag group of researchers,
    Shazeer figured out some tricks that helped the new model work with large amounts
    of data.
  prefs: []
  type: TYPE_NORMAL
- en: “Once you put those things together, magic happened,” Uszkoreit remembers. “That’s
    when a whole bunch of other ideas took off.”
  prefs: []
  type: TYPE_NORMAL
- en: Soon there were eight researchers working on the as-yet-unnamed project, writing
    code and refining the architecture of what they were calling the transformer.
    The name referred to a system that could transform any input into any output,
    and while the scientists focused on translating language, their system would eventually
    do far more.
  prefs: []
  type: TYPE_NORMAL
- en: After a while, they started to notice some improvements. “Oh, wow, this is different,”
    Uszkoreit said at one point. The system was churning out long, complex sentence
    structures in German, and as someone who was fluent in the language, having spent
    many years in Germany as a child, Uszkoreit noticed it was better than the usual
    content Google Translate spat out. It was fluent, readable, and, most importantly,
    factually correct. Polosukhin, who spoke French, was noticing the same thing.
  prefs: []
  type: TYPE_NORMAL
- en: Llion Jones, a Welsh programmer on the team, was stunned to find that the system
    was doing something called coreference resolution. This had been a huge sticking
    point in the effort to make computers process language properly. It referred to
    the task of finding all expressions that refer to the same entity in a text.
  prefs: []
  type: TYPE_NORMAL
- en: For instance, in the sentence “The animal didn’t cross the street because it
    was too tired,” it’s obvious to us as humans that *it* refers to the animal. But
    change the sentence to “The animal didn’t cross the street because it was too
    wide,” and *it* now refers to the road. Until then, it had been extremely difficult
    to get AI to infer that kind of shift in context because doing so required some
    element of commonsense knowledge, built up over years of experience of how the
    world works and how objects interact.
  prefs: []
  type: TYPE_NORMAL
- en: “It’s a classic intelligence test [that] AI’s failed on,” Jones says. “We couldn’t
    get common sense into a neural network.” But when they fed those same sentences
    into the transformer, the researchers could see something unusual happening to
    its “attention head.” The attention head was like a mini-detector in their model
    that focused on different parts of data it was being fed. It was the part that
    would harness the power of current chips and what allowed the transformer to pay
    attention to all the different words of a sentence at the same time, instead of
    one by one in sequence.
  prefs: []
  type: TYPE_NORMAL
- en: When the researchers changed the word from *tired* to *wide*, they could see
    the attention head switching *it* from being the animal to being the road.
  prefs: []
  type: TYPE_NORMAL
- en: “I don’t think anyone had seen that before,” Jones remembers. He almost started
    to wonder if he was getting a rare glimpse of real intelligence. “The fact that
    it was extracting common sense from unstructured text, that was evidence of something
    more interesting going on.”
  prefs: []
  type: TYPE_NORMAL
- en: About six months after those first conversations over lunch, the researchers
    wrote up their findings. Polosukhin had already left Google, but everyone else
    kept the project going and stayed in the office till midnight to wrap everything
    up. Vaswani, who was the lead author, slept on a nearby couch overnight.
  prefs: []
  type: TYPE_NORMAL
- en: “We need a title,” he said aloud at one point.
  prefs: []
  type: TYPE_NORMAL
- en: Jones looked up from his desk, nearby. “I’m not very good with titles,” he replied.
    “But how about ‘Attention is all you need’?” It was a random thought that had
    popped into his head, and Vaswani didn’t say anything in agreement. In fact, he
    got up and walked away, Jones recalls.
  prefs: []
  type: TYPE_NORMAL
- en: But later, the title “Attention Is All You Need” landed on the front page of
    their paper, a perfect summary of what they’d discovered. When you used a transformer,
    your AI system could *pay attention* to large amounts of data at the same time
    and do far more with it.
  prefs: []
  type: TYPE_NORMAL
- en: “I like to think of them as engines for reasoning,” says Vaswani.
  prefs: []
  type: TYPE_NORMAL
- en: These engines for reasoning had the potential to supercharge AI systems, but
    Google was slow off the mark to do anything about them. It took several years,
    for instance, for Google to plug transformers into services like Google Translate
    or BERT, a large language model that it developed to make its search engine better
    at processing the nuance of human language.
  prefs: []
  type: TYPE_NORMAL
- en: The transformer’s inventors couldn’t help but feel frustrated. Even a small
    start-up in Germany had started using the transformer to translate languages well
    before Google, putting the bigger company in a position where it was now playing
    catch-up.
  prefs: []
  type: TYPE_NORMAL
- en: Some of them tried to show Google the bigger possibilities of what the transformer
    was capable of. Not long after their paper was published, Shazeer started working
    with a colleague to use the technology on a new chatbot called Meena. They trained
    it on about forty billion words from social-media conversations on the public
    internet and eventually came to believe it would revolutionize how people searched
    the web and used computers. Meena was so sophisticated that it could improvise
    puns or banter with a human just as easily as it could hold a philosophical debate.
  prefs: []
  type: TYPE_NORMAL
- en: Shazeer and his colleague were excited about what they had just created, and
    they tried sending details of the bot to external researchers, hoping to launch
    a public demo and improve the clunky Google Assistant that people had in their
    homes in the form of a speaker with something much more sophisticated. But Google
    executives stopped those efforts. They worried that the bot would make outlandish
    remarks that hurt Google’s reputation or, more specifically, its $100 billion
    digital advertising business. According to a report in the *Wall Street Journal*,
    they thwarted every attempt by Shazeer to launch Meena to the public or build
    it into Google products.
  prefs: []
  type: TYPE_NORMAL
- en: “Google doesn’t move unless it’s a billion-dollar business,” says Polosukhin.
    “And it’s really hard to build a billion-dollar business.” That’s why so many
    Google staff members had left to start two thousand different companies, according
    to an interview Pichai gave to *Bloomberg* in 2023\. While that appears to frame
    Google as a fount of innovation, in reality the search giant was more like a giant
    squid sucking all the innovation out of the room. Many of those entrepreneurs
    who started new companies have also sold their firms back to Google or taken investment
    from the company. Where Google can’t innovate, it usually buys.
  prefs: []
  type: TYPE_NORMAL
- en: There are two ways of looking at Google’s sluggish approach to new technology.
    Publicly, it has framed itself as cautious. And many researchers at the company
    agree that its executives genuinely want to be careful about rolling out AI in
    a way that might harm society. In recent years, it drew up a list of guiding principles
    for using AI, largely copied from similar rules designed at DeepMind. In 2018,
    Google’s top lawyer, Kent Walker, announced that the company would stop selling
    facial recognition technology because of the potential for abuse. And more broadly,
    Google has a process of putting its algorithms through a rigorous internal review
    process, sometimes including external peer review to scrutinize any ethical trade-offs.
  prefs: []
  type: TYPE_NORMAL
- en: But the company still makes ethically tone-deaf decisions. In May of that year,
    Pichai demonstrated a new assistant feature called Duplex, an AI voice that called
    a restaurant to book a table and used verbal tics like “um” and “uh” to make it
    sound eerily human. Pichai ended the demo to whoops of applause, but the service
    failed to disclose that it was a machine. Critics rounded on Google for deceiving
    humans on the other end of the line.
  prefs: []
  type: TYPE_NORMAL
- en: Google’s cautious approach was largely a product of bloat. The downside to being
    one of the largest companies of all time, with a monopolistic grip on the search
    market, is that everything moves at a snail’s pace. You’re constantly afraid of
    public backlash or regulatory scrutiny. Your prime concern is maintaining growth
    and dominance. So intent has Google been on keeping a stranglehold on the search
    market that it paid more than $26.3 billion in 2021 to Apple, Samsung, and others—more
    than a *third* of its net profit that year—just to preinstall its search engine
    on their phones, according to a recent landmark antitrust lawsuit brought by the
    US Department of Justice.
  prefs: []
  type: TYPE_NORMAL
- en: The company’s sheer size and fixation on growth meant that its researchers or
    engineers often had to wade through several layers of management to sign off on
    even small ideas. And with virtually no competition, since Google controlled about
    90 percent of all the world’s online searches, there was no urgency to innovate.
  prefs: []
  type: TYPE_NORMAL
- en: At one point, back when the transformer group was pulling together its research,
    Shazeer had found himself chatting directly to Pichai next to one of the company’s
    many coffee machines. His legacy of being an AI maven at Google for years had
    engendered personal connections with some of the company’s top leaders. “This
    will replace Google entirely,” Shazeer boasted of the new invention, according
    to one of his coauthors on the transformer paper, Lukasz Kaiser, who was there.
  prefs: []
  type: TYPE_NORMAL
- en: “He had this sentiment already that this would replace everything,” Kaiser remembers.
    Shazeer had been saying much of the same to his colleagues and had talked up the
    transformer’s potential in an internal memo to Google management, so he wasn’t
    joking. The transformer allowed computers to generate not just text but *answers*
    to all manner of questions. If consumers started using something like that more,
    they could end up going to Google less.
  prefs: []
  type: TYPE_NORMAL
- en: Pichai appeared to dismiss the comment and chalk Shazeer up to one of Google’s
    more eccentric researchers. By all means look into it, he said. Frustrated, Shazeer
    left Google in 2021 to pursue his research on large language models independently,
    cofounding a chatbot company called Character.ai. By that time, the “Attention
    Is All You Need” paper had become one of the most popular research works of all
    time in the field of AI. Typically, a research paper on AI might receive a few
    dozen citations over its lifetime if its authors are lucky. But the transformer
    paper made such a splash among scientists that it was cited more than eighty thousand
    times.
  prefs: []
  type: TYPE_NORMAL
- en: 'There was nothing unusual about Google sharing some of the foundational mechanics
    of an invention with the world. That was often how tech companies operated. When
    they “open-sourced” new techniques, they got feedback from the research community,
    which boosted their reputation among top engineers, making it easier to hire them.
    But Google underestimated how much that would cost the company. Of the eight researchers
    who invented the transformer, all have now left Google. Most started their own
    AI companies, which at the time of writing were worth more than $4 billion in
    aggregate. Character.ai alone was worth $1 billion and has become one of the world’s
    most popular chatbot sites. Shazeer sees himself going into the stratosphere with
    the innovation that Google didn’t properly exploit: “Search is like a trillion-dollar
    technology but a trillion dollars isn’t cool,” he says today from his office in
    Menlo Park, California. “You know what’s cool? A quadrillion dollars. This is
    a quadrillion-dollar technology because where search was about making information
    universally accessible, AI is about making *intelligence* universally accessible
    and making everyone massively more productive.”'
  prefs: []
  type: TYPE_NORMAL
- en: After Shazeer left, Google held on to his research on Meena and later called
    it Language Model for Dialogue Applications, or LaMDA. Its scientists continued
    working on the model, training it and fine-tuning it with the help of contractors
    until it became fluent and, to their surprise, humanlike.
  prefs: []
  type: TYPE_NORMAL
- en: As exciting as these advancements were, Google needed to keep everything confined
    to its internal bubble—LaMDA was probably the world’s most advanced chatbot, but
    only a few people inside Google could use it. Google was loathe to release any
    new technology that could end up disrupting the success of its search business.
    Its executives and publicity team framed that approach as being one of caution,
    but more than anything, the company was obsessed with maintaining its reputation
    and the status quo. Soon, Google was going to experience what Ashish Vaswani describes
    as a “biblical moment.” As Google continued printing money from its advertising
    business, OpenAI was taking what looked like a monumental step toward AGI, and
    it wasn’t keeping anything under wraps.  <hgroup>
  prefs: []
  type: TYPE_NORMAL
- en: '[ACT 3](contents.xhtml#p_pt3) [THE BILLS](contents.xhtml#p_pt3)'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: </hgroup>  <hgroup>
  prefs: []
  type: TYPE_NORMAL
- en: '[CHAPTER 10](contents.xhtml#c_ch10) [Size Matters](contents.xhtml#c_ch10)'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: </hgroup>
  prefs: []
  type: TYPE_NORMAL
- en: 'If you walked out of the headquarters of Google in sunny Mountain View, California,
    and drove north for about an hour, you’d eventually hit San Francisco, step out
    of your car, and shiver. Here it was typically several degrees colder, with gray
    clouds hanging low in the sky. While Google’s hometown had T-shirt weather, you
    needed a jacket in OpenAI’s urban microclimate. Another big difference: the researchers
    at OpenAI were giddily excited about the transformer technology that Google’s
    management wanted to keep in a metaphorical cupboard. For the researchers based
    in chilly San Francisco, an idea was about to bloom.'
  prefs: []
  type: TYPE_NORMAL
- en: The nonprofit lab’s two dozen or so researchers were still busy trying to emulate
    the success of DeepMind and were hungry to make the next big breakthrough in AI.
    They had watched *AlphaGo* defeat the world’s top Go players, and now they were
    training their own AI agents to play *Dota 2*, a complex strategic video game
    similar to *World of Warcraft*. If an AI agent could steer an elf through a fantasy
    world, maybe it could capture the messy and continuous nature of the real world
    better than DeepMind’s *AlphaGo* could. That seemed, on the face of it, more impressive
    than moving some black and white stones around on a board.
  prefs: []
  type: TYPE_NORMAL
- en: A mini cold war was also brewing between Sam Altman and Demis Hassabis, and
    OpenAI’s convivial board member Reid Hoffman was looking for ways to get the two
    of them to “smoke the peace pipe,” according to someone who heard the comment
    directly. In 2017, both Altman and Hassabis took part in an AI safety conference
    in California, set up by the Future of Life Institute. Hoffman was there, and
    afterward, he tried to set up a dinner between the American start-up guru and
    the British neuroscientist. Altman didn’t like the idea, arguing that Hassabis
    was uncooperative and seemingly unconcerned about the existential risks of AI
    that Altman was trying to prevent. So Hoffman brought Mustafa Suleyman instead.
    The two got on well, both eager to make the world a better place, and it seemed
    for a while like their organizations might be making amends.
  prefs: []
  type: TYPE_NORMAL
- en: But behind the scenes, Altman and Hassabis were tussling for the best engineers.
    Thanks to his Big Tech benefactor, Hassabis now had the upper hand and could offer
    talented AI researchers far more cash than Altman could, as well as Google stock.
    Hassabis was known to send emails to OpenAI’s leadership, reminding them that
    he could outcompete them on acquiring talent. OpenAI managers would show them
    to engineers they were trying to recruit. “If we’re not going to be successful,
    why would he send these emails?” a former OpenAI staffer remembers.
  prefs: []
  type: TYPE_NORMAL
- en: Maybe it was because Altman himself was known to personally reach out to engineers
    at DeepMind to see if they would jump ship, according to someone close to OpenAI.
    But he generally took a careful, deliberate approach to recruiting, spending about
    30 percent of his time on the task and speaking at length to every interviewee,
    another former employee says. “We went to his place and walked for one hour around
    [San Francisco’s] Prussian Hill,” says one former staffer about their experience
    being interviewed by Altman. Once you joined, Altman largely made himself accessible,
    sitting in the company’s open plan office on his laptop. “Anyone could message
    him on Slack and talk to him,” they remember. “It wasn’t frowned upon.” In the
    more hierarchical structure of DeepMind, Hassabis tended to be holed up in an
    office or meeting room and was harder to pin down. You had to go through other
    managers and gatekeepers to get his time.
  prefs: []
  type: TYPE_NORMAL
- en: OpenAI was about to differentiate itself from DeepMind in another way. Ilya
    Sutskever, OpenAI’s star scientist, couldn’t stop thinking about what the transformer
    could do with language. Google was using it to better understand text. What if
    OpenAI used it to *generate* text? Sutskever talked to a young researcher at OpenAI
    named Alec Radford, who’d been experimenting with large language models. Although
    OpenAI is best known today for ChatGPT, back in 2017 it was still throwing spaghetti
    on the wall to see what would stick, and Radford was one of only a handful of
    people at OpenAI looking at the technology that powered chatbots.
  prefs: []
  type: TYPE_NORMAL
- en: Large language models themselves were still a joke. Their responses were mostly
    scripted and they’d often make wacky mistakes. Radford, who wore glasses and had
    an overgrown mop of reddish-blond hair that made him look like a high schooler,
    was eager to improve on all the previous academic efforts that tried to make computers
    better at talking and listening, but he was an engineer at heart and wanted a
    quicker route to progress. For at least six months he’d been hitting brick walls
    with his experiments, spending weeks on one project and then moving on to the
    next. He’d trained one language model on two billion comments he scraped from
    the internet forum Reddit, but it didn’t work well.
  prefs: []
  type: TYPE_NORMAL
- en: When the transformer came out, he saw it at first as a crushing blow from Google.
    Clearly the bigger company had more expertise in AI. But after a while, it looked
    like Google didn’t have any big plans for its new invention, and Radford and Sutskever
    realized they could use the architecture to OpenAI’s advantage. They would just
    have to put their own spin on it. The transformer model that powered Google Translate
    used something called an encoder and a decoder to process words. The encoder would
    process the sentence coming in, perhaps in English, and the decoder would generate
    the output, like a sentence in French.
  prefs: []
  type: TYPE_NORMAL
- en: The idea was a bit like having a conversation with two robots. The first one,
    the encoder, would listen to you and write down notes, before handing them to
    the second robot, the decoder, which would read the notes and then talk back to
    you. Radford and Sutskever figured out that they could get rid of that first robot,
    and instead just have one, the decoder, listen to you and talk back by itself.
    Early testing showed that the idea worked in practice, which meant they could
    build a more streamlined language model that was quicker and easier to troubleshoot
    and grow. And making it “decoder only” would also be a game-changer. By combining
    a model’s ability to “understand” and speak into one fluid process, it could ultimately
    generate more humanlike text.
  prefs: []
  type: TYPE_NORMAL
- en: The next step was to vastly increase the amount of data, computing power, and
    capacity of their language model. Sutskever had long believed that “success was
    guaranteed” when you scaled everything up in AI, especially with language models.
    The more data you had, combined with the highest-possible computing power and
    a large and intricate model, the more capable it would be.
  prefs: []
  type: TYPE_NORMAL
- en: 'Radford was awestruck by what his experiments were churning out, using the
    transformer with just the decoder trained on gargantuan amounts of text. After
    feeling burned out from all the failed attempts to tinker with new algorithm designs,
    he found that Sutskever’s strategy resonated for him. And it was more straightforward.
    Just feed it more and more data. Sutskever started asking people the same thing
    when he walked around the office, according to someone who worked there at the
    time: “Can you make it bigger?”'
  prefs: []
  type: TYPE_NORMAL
- en: Thanks to the transformer, Radford was making more progress with his language
    model experiments in two weeks than over the previous two years. He and his colleagues
    started working on a new language model they called a “generatively pre-trained
    transformer” or GPT for short. They trained it on an online corpus of about seven
    thousand mostly self-published books found on the internet, many of them skewed
    toward romance and vampire fiction. Plenty of AI scientists had used this same
    dataset, too, known as BooksCorpus, and anyone could download it for free. Radford
    and his team believed they had all the right ingredients to ensure that this time,
    their model would also be able to infer context.
  prefs: []
  type: TYPE_NORMAL
- en: Down the line, as Radford’s system became more sophisticated, people at OpenAI
    and beyond would question whether these new large language models were actually
    understanding language and not just inferring it. This may seem like a trivial
    semantic issue but the distinction is important, because it can inadvertently
    make AI systems sound more powerful than they really are. Consider the sentence
    “It’s raining outside, so don’t forget your umbrella.” The GPT model that Radford
    was working on could infer a likely connection between carrying an umbrella and
    rain, and that the word *umbrella* was also associated with language around staying
    dry. But the model didn’t understand the concept of being wet in the way humans
    do. It just inferred that connection more accurately.
  prefs: []
  type: TYPE_NORMAL
- en: As Radford’s experiments saw greater improvements, OpenAI would feed more and
    more text from the public internet into its models. And while that would make
    its system become increasingly lifelike, in ways that machines never had before,
    they were simply becoming better at making predictions about what text should
    come next in a sequence, based on their training data.
  prefs: []
  type: TYPE_NORMAL
- en: This issue would come to divide people, even in the AI community. Did the increasing
    sophistication of these models mean they were becoming sentient? The answer was
    most likely no, but even experienced engineers and researchers would soon believe
    otherwise, with some falling under an emotional spell from AI-generated text that
    seemed loaded with empathy and personality.
  prefs: []
  type: TYPE_NORMAL
- en: 'To refine their new GPT model, Radford and his colleagues scraped more content
    from the public internet, training the model on questions and answers from the
    online forum Quora, along with thousands of passages from English exams given
    to Chinese school kids. In June 2018, Radford and his team released a paper, stating
    that their model had acquired “significant world knowledge” thanks to all the
    data it was pumping in. It also did something that got Radford’s team excited:
    it could generate text on topics it hadn’t been specifically trained on. While
    they couldn’t explain exactly how that worked, this was good news. It meant they
    were on the road toward building a general purpose system. The bigger its training
    corpus, the more knowledgeable it would become.'
  prefs: []
  type: TYPE_NORMAL
- en: Even with the short passages of text that the first GPT could produce, it was
    performing better than most other computer programs that processed language, which,
    till then, relied on millions of examples of text that people had labeled by hand,
    which was a type of data-entry work. Most of these programs weren’t even being
    used for chatbots but were analyzing things like product reviews. Human workers
    would have to label comments like “I love this product” as positive and “It’s
    ok” as neutral, for instance. That method was slow and expensive. But GPT was
    different because it was learning from a mountain of seemingly random text that
    wasn’t labeled to get the hang of how language worked. It didn’t have the guiding
    hand of those human labelers.
  prefs: []
  type: TYPE_NORMAL
- en: You can imagine these different approaches as being like a new way of educating
    humans. For instance, suppose two groups of art students were being taught how
    to paint. The first group was given a book with pictures of paintings, each one
    labeled with captions like “sunrise,” “portrait,” or “abstract.” That’s how traditional
    AI models were learning from labeled data. It was a structured and precise method—like
    telling the art students exactly what each picture represented—but it also limited
    what machines could infer. They could only recall what had been labeled. The students
    in this first group would probably struggle to create a painting that hadn’t been
    specifically described in their book.
  prefs: []
  type: TYPE_NORMAL
- en: Now suppose the second group of art students were given access to an entire
    art gallery, with a vast collection of paintings—and no labels. They were given
    the freedom to wander around, observe, and interpret the artwork themselves. This
    was a bit like how GPT was learning from huge reams of unlabeled text. The art
    students (or the AI model) would find themselves looking for patterns, styles,
    and techniques on their own, and they’d eventually assimilate this wide variety
    of examples, as well as the connections between them, without being told exactly
    what to infer about each one. It would be a much richer form of learning. Radford’s
    team realized that by exposing GPT to a vast array of language uses and nuances,
    the model itself could generate more creative responses in text.
  prefs: []
  type: TYPE_NORMAL
- en: Once the initial training was done, they fine-tuned the new model using some
    labeled examples to get better at specific tasks. This two-step approach made
    GPT more flexible and less reliant on having lots of labeled examples.
  prefs: []
  type: TYPE_NORMAL
- en: Sutskever meanwhile was keeping an eye on what was happening over at Google,
    where engineers were finally putting the transformer to use. Besides improving
    the company’s glitchy translation service, Google had used it to build a new program
    called BERT that would help improve its search engine. Now it could do a better
    job of recognizing the context of people’s search queries, such as whether they
    wanted information on Apple the company or an apple the fruit. BERT made a big
    splash in the field of natural language processing.
  prefs: []
  type: TYPE_NORMAL
- en: “That’s when people knew, ‘OK, you can get superhuman performance by just taking
    these pre-trained models and fine-tuning a little bit of data,’” says Aravind
    Srinivas, an AI researcher who left Google in 2021 to help build language models
    at OpenAI, before starting his own company called Perplexity. “That changed natural
    language processing.”
  prefs: []
  type: TYPE_NORMAL
- en: Google wouldn’t start using BERT for its English-language search queries till
    late 2019, but the engineers at OpenAI felt rattled again. Its staff were still
    largely dreamers on a mission, whose shoestring budget was a fraction of Google
    Brain’s or DeepMind’s. While OpenAI had spent about $30 million on salaries and
    computing power in 2017, DeepMind spent more than $440 million.
  prefs: []
  type: TYPE_NORMAL
- en: Top AI researchers were earning the kind of salaries commanded by NFL players,
    sometimes millions of dollars a year. Even so, one of OpenAI’s cofounders, Wojciech
    Zaremba, would later admit that he had turned down “borderline crazy” offers of
    two to three times his market value to join OpenAI. Others who joined did so because
    they wanted to work alongside stars like Sutskever and often also because they
    genuinely believed in the mission of creating AI for the good of humanity. But
    that goal could only motivate people for so long, and Google increasingly looked
    like a looming threat. The search giant had every building block it needed to
    build AGI, too, if it wanted, from the transformer to the TPU, a powerful proprietary
    chip for training AI models.
  prefs: []
  type: TYPE_NORMAL
- en: “I would wake up, nervous that Google was just gonna go release something much
    better than us,” remembers one former OpenAI manager. By exploiting Google inventions
    like the transformer, it felt like OpenAI was playing with the search giant’s
    toys and somehow getting away with it. “We were like, there’s no way we’re gonna
    win.”
  prefs: []
  type: TYPE_NORMAL
- en: Altman was panicking too. With their wealthiest benefactor, Musk, gone, he and
    Brockman and the founding team realized that remaining a nonprofit wasn’t going
    to work. If they really wanted to build AGI, they would need more money. Sutskever
    alone earned $1.9 million in 2016, according to a public tax filing, which was
    still less than what he could have been getting at Google Brain or Facebook. But
    paying rock star salaries was OpenAI’s biggest expense, and not far behind was
    the cost of computing power.
  prefs: []
  type: TYPE_NORMAL
- en: A company like OpenAI couldn’t train its AI models on the same laptops its staff
    members were working on. To process so many billions of pieces of data for training,
    and quickly, it needed the powerful chips found only in servers and typically
    rented from cloud providers like Amazon Web Services, Google Cloud, or Microsoft’s
    Azure. These were the companies that had endless football fields of computers
    enclosed in vast warehouses, whose ownership of these “cloud” computers would
    see them become the biggest financial winners of the AI boom. By early 2024, the
    market value of Nvidia would start closing in on $2 trillion as demand raced ahead
    for its GPU chips for training AI models. It was virtually impossible to build
    AI outside the orbit of tech giants, which meant developers had little choice
    but to use those companies to help create their systems.
  prefs: []
  type: TYPE_NORMAL
- en: That was the predicament OpenAI found itself in. It needed to rent more cloud
    computers, and it was also running out of money. “We’re just going to need to
    raise way more money than what we can as a [nonprofit],” Brockman told other executives.
    “Many billions of dollars.”
  prefs: []
  type: TYPE_NORMAL
- en: Knowing that they needed to rethink their strategy, the founding team started
    working on an internal document about the path to AGI. In April 2018, they published
    what they called a new charter on their website. It was a mix of outsized goals
    and pledges—and a hint about how the nonprofit was about to make the mother of
    all U-turns.
  prefs: []
  type: TYPE_NORMAL
- en: 'For anyone who was looking to OpenAI for more clarity on its direction, the
    charter was something of a disappointment. It offered a definition of AGI but
    did so in brief, fluffy terms: “Highly autonomous systems that outperform humans
    at most economically valuable work.” How would OpenAI measure that? The nonprofit
    didn’t say. The charter also said that OpenAI had a “fiduciary duty [to] humanity,”
    and that it would not use its AI to help “concentrate power.” Most companies famously
    had a fiduciary or trusted legal duty to their shareholders and investors, but
    here OpenAI emphasized it was going against the grain. It was for the people.'
  prefs: []
  type: TYPE_NORMAL
- en: Building AGI should be a collaborative effort and not a “competitive race,”
    the charter added “Therefore, if a value-aligned, safety-conscious project comes
    close to building AGI before we do, we commit to stop competing with and start
    assisting this project.” In other words, OpenAI would put its tools down and help
    out other researchers who might be on the brink of AGI.
  prefs: []
  type: TYPE_NORMAL
- en: The whole thing sounded magnanimous. OpenAI was framing itself as an organization
    that was so highly evolved that it was putting the interests of humanity above
    traditional Silicon Valley pursuits like profit and even prestige. A key line
    was “broadly distributed benefits,” or handing out the rewards of AGI to all of
    humanity. It was an echo of Altman’s own noble approach to building things, cultivated
    after years of being worshipped as a start-up guru.
  prefs: []
  type: TYPE_NORMAL
- en: 'But reading between the lines, it also looked like Altman and Brockman were
    preparing to abandon OpenAI’s founding principles. Three years earlier, when they
    launched the nonprofit, they said that OpenAI’s research would be “free from financial
    obligations.” Now OpenAI’s charter mentioned, in passing, that it would actually
    need a lot of money: “We anticipate needing to marshal substantial resources to
    fulfill our mission,” they wrote, “but [we] will always diligently act to minimize
    conflicts of interest among our employees and stakeholders that could compromise
    broad benefit.”'
  prefs: []
  type: TYPE_NORMAL
- en: As the charter went public, Altman was scrambling to find a way to bend his
    original rules for OpenAI while getting those substantial resources. When Musk
    walked two months earlier, Altman immediately called one of his most loyal backers,
    billionaire Reid Hoffman, to ask for his advice. Hoffman was an AI optimist who
    fully believed in Altman’s vision for AGI. He offered to keep OpenAI going by
    paying its immediate costs and salaries, but they both knew that couldn’t last
    forever.
  prefs: []
  type: TYPE_NORMAL
- en: 'Altman told Hoffman that he might have an answer to the problem: a strategic
    partnership. The term *strategic partnership* is a handy one that companies frequently
    use to cover a wide range of corporate relationships that could put them at arm’s
    length or on a tight leash. It could mean sharing money and technology between
    two firms or setting up a licensing agreement. The term was ambiguous enough to
    hide the true nature of an awkward corporate relationship, perhaps one with complicated
    financial ties or where one firm has an embarrassing amount of control over another.
    “Partnership” implied a more equitable relationship, even if that wasn’t the case,
    and it stopped people asking too many awkward questions. That’s what Altman needed.'
  prefs: []
  type: TYPE_NORMAL
- en: He didn’t want to lose complete control of OpenAI by selling it to a larger
    tech company—as DeepMind had done to Google. But a strategic partnership could
    create the illusion of greater independence from a larger tech company, while
    giving him the computing power OpenAI needed. Altman and Hoffman talked through
    the possibilities of collaborating with Google and Amazon, but Microsoft quickly
    came up as an obvious choice. Both Hoffman and Altman had personal connections
    to the company. They both personally knew Microsoft’s chief technology officer,
    Kevin Scott, and Hoffman was close to Microsoft’s chief executive officer, Satya
    Nadella.
  prefs: []
  type: TYPE_NORMAL
- en: Hoffman was a rotund, jolly man with a boyish grin, and his real value to OpenAI
    wasn’t cash but connections. He was so good at making friends and acquaintances
    that he had founded the world’s number-one professional networking site, LinkedIn.
    In 2016, he’d sold the company to Microsoft for $26.2 billion, giving him a net
    worth of about $3.7 billion and leading him to a new career of backing start-ups
    as an investor with storied venture capital firm Greylock Partners.
  prefs: []
  type: TYPE_NORMAL
- en: Becoming a billionaire, and then an investor, had its pros and cons. Hoffman
    was now so wealthy that he could throw his cash at other entrepreneurs without
    worrying too much about backing a bunch of duds. Other investors in the Bay Area
    who were scratching around for the next tech blockbuster saw Hoffman as someone
    who didn’t care too much either way. They didn’t always trust his investments,
    but they had to admit he was more willing than others to take risks, including
    by connecting entrepreneurs to members of the Silicon Valley establishment. After
    selling to Microsoft, Hoffman had a line right to Nadella himself. He was on the
    company’s board.
  prefs: []
  type: TYPE_NORMAL
- en: “You should make sure that you have a conversation with him,” Hoffman told Altman,
    referring to the Microsoft CEO.
  prefs: []
  type: TYPE_NORMAL
- en: As OpenAI got closer to running out of cash, Nadella was four years into his
    attempt to transform Microsoft. Nadella didn’t have the charisma of other tech
    luminaries like Steve Jobs, but he was a talented negotiator and keen observer.
    “You never see him without a little notebook jotting down notes from what people
    are saying at tech dinners,” says Sheila Gulati, a Seattle-based venture capitalist
    who was an executive at Microsoft for about a decade. “But he isn’t the loudest
    voice. He is the best facilitator and collaborator and listener.”
  prefs: []
  type: TYPE_NORMAL
- en: The company founded by Bill Gates had sparked the personal computing revolution
    with iconic programs like Windows, MS Word, and Excel, but it had turned into
    a slow, insular corporation that missed the mobile revolution. In 2014, it bought
    Nokia and then failed to make anything of it. So far, Nadella seemed to be on
    track to turn things around. He pushed for a more collaborative culture among
    his historically territorial managers and got everybody to focus on cloud computing,
    selling access to ultrapowerful computers that people used to run their businesses.
  prefs: []
  type: TYPE_NORMAL
- en: It was a smart move. Cloud computing wasn’t the sexiest business in the world,
    but it was growing as more companies put their product inventory or customer service
    operations online. Microsoft made specialized software to support that work under
    an umbrella product called Azure, and with its blue, triangular logo, Azure would
    become Microsoft’s next blockbuster after Windows. It used vast server farms to
    power the digital assets of hundreds of thousands of business customers, and the
    raw horsepower of those servers was exactly what Altman needed.
  prefs: []
  type: TYPE_NORMAL
- en: In July 2018, Altman flew to Idaho for the annual Sun Valley conference. The
    invitation-only gathering hosted by the investment firm Allen & Company was known
    as a “summer camp for billionaires,” an informal networking shindig where wealthy
    technologists wore Patagonia vests and ate kale salads next to Facebook’s chief
    operating officer Sheryl Sandberg or Amazon founder Jeff Bezos. Attendees hailed
    from the worlds of tech and media, and they sometimes made deals right on the
    premises over coffee or, in the case of Altman and Nadella, in a stairwell.
  prefs: []
  type: TYPE_NORMAL
- en: During the conference, the two lanky men bumped into each other on the stairs
    and started chatting. Altman remembered what Hoffman had advised him and took
    the chance to pitch Nadella on OpenAI.
  prefs: []
  type: TYPE_NORMAL
- en: To many people, Altman’s vision of using his team of about one hundred people
    to build superintelligent machines would have sounded loony. But Nadella knew
    that Altman was deeply plugged into the Silicon Valley matrix—more so than the
    Seattle-based Microsoft leader was himself—and that he should probably take Altman
    seriously.
  prefs: []
  type: TYPE_NORMAL
- en: Then he was struck by how big Altman wanted to go. Altman wasn’t promising to
    help him make a better Excel spreadsheet. He wanted to bring abundance to humanity.
    And Nadella was impressed by what Altman’s small team had already accomplished,
    particularly with large language models. Even with its more than seven thousand
    AI research staff, Microsoft had struggled to see similar advancements so quickly.
    Like Google, Microsoft had also become increasingly nervous about creating AI
    systems that could mimic human language, largely because of one humiliating experience.
  prefs: []
  type: TYPE_NORMAL
- en: In 2016, just two years after Nadella took the reins, Microsoft’s AI team was
    trying to create a chatbot that could entertain eighteen- to twenty-four-year-olds
    in the United States as its other chatbot, Xiaoice, had been doing for about forty
    million young people in China. They called their new web-based chatbot Tay and
    decided to release it on Twitter so that it could interact with more people.
  prefs: []
  type: TYPE_NORMAL
- en: 'Almost immediately, Tay started generating racist, sexually charged, and often
    nonsensical tweets: “ricky gervais learned totalitarianism from adolf hitler,
    the inventor of atheism,” it said at one point. Then, “caitlyn jenner isn’t a
    real woman yet she won woman of the year?” At one point when someone asked Tay
    if the Holocaust had happened, the chatbot replied, “It was made up.”'
  prefs: []
  type: TYPE_NORMAL
- en: Microsoft quickly shut down the system, which had only been going for about
    sixteen hours, and blamed a coordinated trolling attack by a subset of people
    who’d exploited a vulnerability in Tay. It had trained the chatbot on public web
    data, and then tried to filter out potential offensive speech, but that all went
    out the window once Tay was unleashed on the web. How could anyone train a language
    system on the internet without teaching it some of the web’s most odious traits?
  prefs: []
  type: TYPE_NORMAL
- en: Nadella wondered if Altman was finally the person to do it, and if, in the process,
    he might bring some beguiling new features to Microsoft’s software. Their discussion
    lasted only a few minutes, but as they said their goodbyes, the software CEO agreed
    to keep talking with Altman. “Maybe we should figure out something more,” Nadella
    told him.
  prefs: []
  type: TYPE_NORMAL
- en: Once Nadella had flown back to Seattle and Altman to San Francisco, Hoffman
    checked in on each side, eager to see how things had gone. Both seemed cautiously
    optimistic and told Hoffman that the meeting had been productive. When they asked
    if he thought they should take a partnership seriously, Hoffman said yes.
  prefs: []
  type: TYPE_NORMAL
- en: Microsoft’s CEO wasn’t sure at first. He checked in with his chief technology
    officer, Kevin Scott, about the situation. They couldn’t just give OpenAI a donation.
    Microsoft was a public company, and its shareholders expected a return on any
    big investment. But the idea of a “strategic partnership” started to make sense,
    one where Microsoft could invest something like $1 billion into OpenAI in return
    for access to its cutting-edge technology.
  prefs: []
  type: TYPE_NORMAL
- en: This would be a big step for Microsoft because it had never actually done any
    major software partnerships before. It had never needed to, being the global software
    king. The only big collaborations it had made in the past were with companies
    like Dell, Hewlett- Packard, and Compaq, hardware makers who preinstalled Windows
    and helped catapult Microsoft to stratospheric heights.
  prefs: []
  type: TYPE_NORMAL
- en: 'This was going to be different. And here was another snag: OpenAI was a nonprofit,
    and its board was beholden to its nonprofit mission, not its investors or commercial
    success. Microsoft couldn’t get a seat on that board, which meant it was taking
    a huge gamble (and one that would come back to haunt Nadella a few years later).
    That weighed on Nadella’s mind, according to someone who spoke to him about the
    partnership at the time.'
  prefs: []
  type: TYPE_NORMAL
- en: Microsoft’s chief financial officer, Amy Hood, was skeptical about the partnership,
    too, according to Soma Somasegar, a tech investor in Seattle who watched the process
    unfold. Taking a $1 billion hit to the company’s profit-and-loss sheet would be
    painful, and partnering with a nonprofit would raise some uncomfortable questions
    from the IRS too. It had strict rules around how nonprofits could generate revenue
    or distribute any profit they made, so that’s where the conflict of interest could
    get embarrassing.
  prefs: []
  type: TYPE_NORMAL
- en: Nadella had other concerns about whether OpenAI would be a reliable partner.
    Even if Microsoft had commercialization rights to OpenAI’s technology, it seemed
    to have completely different goals to the software giant. Would this really work?
    He talked to Altman some more and found himself becoming more convinced.
  prefs: []
  type: TYPE_NORMAL
- en: “[Altman] really tries to find the thing that matters most to a person—and then
    figures out how to give it to them,” Greg Brockman would later tell the *New York
    Times*. “That is the algorithm he uses over and over.”
  prefs: []
  type: TYPE_NORMAL
- en: Nadella realized that the real return on a $1 billion investment in OpenAI wasn’t
    going to come from the money after a sale or stock market floatation. It was the
    technology itself. OpenAI was building AI systems that could one day lead to AGI,
    but along the way, as those systems became more powerful, they could make Azure
    a more attractive service to customers. Artificial intelligence was going to become
    a fundamental part of the cloud business, and cloud was on track to make up half
    of Microsoft’s annual sales. If Microsoft could sell some cool new AI features—like
    chatbots that could replace call center workers—to its corporate customers, those
    customers were less likely to leave for a competitor. The more features they signed
    up for, the harder it would be to switch.
  prefs: []
  type: TYPE_NORMAL
- en: The reason for that is a little technical, but it’s critical to Microsoft’s
    power. When a company like eBay, NASA, or the NFL—who are all customers of Microsoft’s
    cloud service—build a software application, that software will have dozens of
    different connections into Microsoft. Switching them off can be complex and expensive,
    and IT professionals resentfully call this “vendor lock-in.” It’s why three tech
    giants—Amazon, Microsoft, and Google—have a stranglehold on the cloud business.
  prefs: []
  type: TYPE_NORMAL
- en: It became clear to Microsoft’s CEO that OpenAI’s work on large language models
    could be more lucrative than the research carried out by his own AI scientists,
    who seemed to have lost their focus after the Tay disaster. Nadella agreed to
    make a $1 billion investment in OpenAI. He wasn’t just backing its research but
    also planting Microsoft at the forefront of the AI revolution. In return, Microsoft
    was getting priority access to OpenAI’s technology.
  prefs: []
  type: TYPE_NORMAL
- en: Inside OpenAI, as Sutskever and Radford’s work on large language models became
    a bigger focus at the company and their latest iteration became more capable,
    the San Francisco scientists started to wonder if it was becoming too capable.
    Their second model, GPT-2, was trained on forty gigabytes of internet text and
    had about 1.5 billion parameters, making it more than ten times bigger than the
    first and better at generating more complex text. It also sounded more believable.
  prefs: []
  type: TYPE_NORMAL
- en: They decided to release a smaller version of the model, warning in a blog post
    in February 2019 that it could be used to generate misinformation on a large scale.
    It was a startlingly honest admission and approach, an approach that OpenAI would
    rarely take afterward. “Due to our concerns about malicious applications of the
    technology, we are not releasing the trained model,” the post said. The announcement
    itself was more about the risks than the model itself. Its title was “Better Language
    Models and Their Implications.”
  prefs: []
  type: TYPE_NORMAL
- en: The release barely seemed to register among the leadership of DeepMind over
    in the UK. Though Demis Hassabis quietly resented what Sam Altman was doing, he
    didn’t give much credence to OpenAI’s strategy of focusing on language. He saw
    that as just one of many routes toward building AGI, according to former DeepMind
    staff, and believed that if you wanted to make AI smarter, it was broadly more
    effective to simulate the world with games.
  prefs: []
  type: TYPE_NORMAL
- en: But then a funny thing happened that signified how buzzy OpenAI’s approach to
    AI could be. GPT-2 received a flood of press attention, and many of the articles
    focused on the dangers of this new AI system that OpenAI was pointing to. *Wired*
    magazine published a feature titled “The AI Text Generator That’s Too Dangerous
    to Make Public,” while *The Guardian* printed a column breathlessly titled “AI
    Can Write Just Like Me. Brace for the Robot Apocalypse.”
  prefs: []
  type: TYPE_NORMAL
- en: OpenAI had released enough information to show that its new text-generator was
    eerily good, including a fake news story that GPT-2 wrote about English-speaking
    unicorns. But it didn’t release the model itself for public testing. Nor did it
    disclose what public websites and other datasets had been used to train it, as
    it had with the BooksCorpus set for the original GPT. OpenAI’s newfound secrecy
    around its model and the warning about its dangers almost seemed to be creating
    more hype than before. More people than ever wanted to hear about it.
  prefs: []
  type: TYPE_NORMAL
- en: Altman and Brockman would go on to say that this was never their intention and
    that OpenAI was genuinely concerned about how GPT-2 could be abused. But their
    approach to public relations was, arguably, still a form of mystique marketing
    with a dash of reverse psychology. Apple had done it for years with secretive
    product launches that would drum up excitement, and OpenAI was now being similarly
    secretive about how GPT-2 had come together. Some AI academics meanwhile found
    that trying to access GPT-2 was like trying to get into an exclusive nightclub.
    OpenAI was being more careful and selective about who got to try it out. Was this
    a publicity stunt or a cautious thought experiment?
  prefs: []
  type: TYPE_NORMAL
- en: It may well have been both. Altman had learned over the years to be counterintuitive.
    If you held back on details, you could create more fanfare. Lean into controversy—such
    as when Altman sent a long list of Loopt’s risks to a *Wall Street Journal* reporter—and
    you could disarm your critics.
  prefs: []
  type: TYPE_NORMAL
- en: OpenAI was hitting a crossroads on its path to AGI. Its language model was becoming
    more humanlike with the extra data and computing power, but its founding principles
    were being stretched to a breaking point. Altman and Brockman knew their alliance
    with Microsoft would see them go back on those promises, but getting their staff
    to stay on board was another matter. After all, most of them weren’t there for
    the money but because of the mission. And if the mission seemed compromised, they
    had a new reason to leave.
  prefs: []
  type: TYPE_NORMAL
- en: 'Altman needed something to help suspend the critical thinking of his brilliant
    engineers. The answer was right in front of him: AGI. The goal of AGI wasn’t so
    different to the rewards of heaven that inspired religious communities to remain
    faithful. The stakes were just as high as those of churchgoers, representing utopia
    if OpenAI’s scientists were successful and global apocalypse if they were not.'
  prefs: []
  type: TYPE_NORMAL
- en: Given how disastrous or triumphant that end result could be, *how* they built
    AGI seemed insignificant by comparison. The end result was what mattered. OpenAI’s
    staff came to believe that they had a moral prerogative to create AGI first and
    shepherd its spoils to the world, in spite of what the nonprofit said in its charter
    about collaborating with others. Some felt that if scientists at DeepMind or in
    China created AGI first, they were more likely to create some sort of devil.
  prefs: []
  type: TYPE_NORMAL
- en: The new charter helped fuel this idea too. Altman and Brockman treated it like
    scripture at OpenAI, even tying salaries to how well their staff followed it.
    And over the last four years, OpenAI had evolved into a much more close-knit,
    even insular organization, where staff socialized with one another after work
    and saw their jobs as a mission and identity. Brockman even married his girlfriend,
    Anna, at a civil ceremony in the OpenAI headquarters, with flowers shaped into
    the OpenAI logo and a robot hand acting as the ring bearer. Sutskever officiated.
  prefs: []
  type: TYPE_NORMAL
- en: For those who worked at OpenAI—and at DeepMind, too—the relentless focus on
    saving the world with AGI was gradually creating a more extreme, almost cultlike
    environment. In the San Francisco headquarters of OpenAI, Sutskever was fashioning
    himself as a kind of spiritual leader. He would exhort staff to “feel the AGI”
    and tweeted the phrase too. At a company holiday party held at a science museum
    in San Francisco, he led researchers in a chant of “Feel the AGI!” according to
    an article in *The Atlantic*. The ecclesiastical culture he was cultivating was
    reinforced by the fact that dozens of OpenAI’s staff members also counted themselves
    as effective altruists.
  prefs: []
  type: TYPE_NORMAL
- en: Effective altruism hit the spotlight in late 2022 when one-time crypto billionaire
    Sam Bankman-Fried became the movement’s most well-known supporter. But it had
    been around since the 2010s. The idea, which was spawned by a handful of philosophers
    at Oxford University and then spread like wildfire through college campuses, was
    to improve on traditional approaches to charity by taking a more utilitarian approach
    to giving. Instead of volunteering at a homeless shelter, for instance, you could
    help more people by working at a high-paying job like a hedge fund, making lots
    of money, and then giving that money to build several more homeless shelters.
    The concept was known as “earning to give,” and the goal was to get as much bang
    for your charitable buck as possible.
  prefs: []
  type: TYPE_NORMAL
- en: Sometimes effective altruists were split on the best way to do that. Some might
    say that you could impact more people by donating to global causes like poverty
    than to local US or European causes like homelessness. Others flipped that around.
    Nick Beckstead, a program officer with effective altruism’s biggest charitable
    backer, Open Philanthropy, once wrote that “saving a life in a rich country is
    substantially more important than saving a life in a poor country because richer
    countries have more innovation, and their workers are more economically productive.”
    Human life was quantifiable, and doing good was a mathematical problem that needed
    teasing out.
  prefs: []
  type: TYPE_NORMAL
- en: The mission of building AGI had a particular appeal to anyone who believed in
    effective altruism’s higher-numbers-are-better philosophy, because you were building
    technology that could impact billions or even trillions of lives in the future.
    And those staunchly held beliefs made what Altman did next more palatable for
    OpenAI’s staff. Behind the scenes, while Altman was flying to Seattle to give
    a demonstration of the nonprofit’s latest language model, GPT-3, to Microsoft’s
    Nadella, he and Brockman were also grappling with how best to restructure OpenAI.
    Like the founders of DeepMind, they struggled to find an existing template for
    an organization that wanted to save humanity and make money at the same time,
    with AI. “We looked at every possible legal structure and concluded none was quite
    right for what we wanted to do,” Brockman recalled in one podcast.
  prefs: []
  type: TYPE_NORMAL
- en: 'Companies that try to make the world a better place *and* earn profits sometimes
    structure themselves as B Corps, or benefit corporations. It’s a legal alternative
    to the for-profit model that most other firms fall under, in which the primary
    objective is to maximize shareholder value. American economist Milton Friedman
    best summed up this more popular approach in 1962: “There is one and only one
    social responsibility of business—to use its resources and engage in activities
    designed to increase its profits.”'
  prefs: []
  type: TYPE_NORMAL
- en: The B Corp is designed to balance profit seeking with a mission. Puffer-jacket
    maker Patagonia and Ben & Jerry’s both have the model, which means that whenever
    they make a decision, they are legally required to analyze its impact on employees,
    suppliers, customers, and the environment, with equal regard to their shareholders.
    It doesn’t always work. In the world of tech, online marketplace Etsy had to drop
    its B Corp certification after it floated on the stock market and started falling
    prey to the ravenous growth demands that Wall Street puts on publicly traded companies.
  prefs: []
  type: TYPE_NORMAL
- en: 'Altman and Brockman designed what they claimed was a middle way, a byzantine
    mishmash of the nonprofit and corporate worlds. In March 2019 they announced the
    creation of a “capped profit” company. This was a structure where any new investor
    would have to agree to a limit on the returns they received from their investment.
    In traditional tech investing, those returns would come from either a sale or
    a public offering on the stock market. But under Altman’s new capped-profit structure,
    the amount that investors in OpenAI got after the company floated, sold, or was
    distributed in certain dividends would be limited until those profits reached
    a threshold. To start with, the threshold was very high, which made it a terrific
    deal for those first investors: It came into play when profits were in excess
    of a one hundred times return. This meant that if an investor put $10 million
    into OpenAI, their profits would only get capped after their investment had led
    to $1 billion in returns.'
  prefs: []
  type: TYPE_NORMAL
- en: Those would be huge returns, even for Silicon Valley. Altman says that one hundred
    times cap has since been reduced “in orders of magnitude” for subsequent investors,
    and he argues that those first backers were taking a huge risk. “While many people
    today have heard of AGI and recognize it is likely on the horizon, the vast majority
    of people back then thought we were chasing something impossible.”
  prefs: []
  type: TYPE_NORMAL
- en: Altman was the guy who encouraged start-ups to shoot for billions, and he had
    those same lofty ambitions for OpenAI in terms of the financial return it would
    bring for investors. OpenAI even added a clause to its restructuring documents
    saying that it would reconsider all its financial arrangements if it did manage
    to create AGI, because by then, the world would need to rethink the whole concept
    of money.
  prefs: []
  type: TYPE_NORMAL
- en: As part of the new, convoluted structure, Altman created an overarching nonprofit
    company called OpenAI Inc., with a board of directors who made sure that OpenAI
    LP (the capped-profit company) was building AGI that was “broadly beneficial.”
    The members of the board included Altman, Brockman, and Sutskever, along with
    Reid Hoffman, Quora CEO Adam D’Angelo, and a technology entrepreneur named Tasha
    McCauley.
  prefs: []
  type: TYPE_NORMAL
- en: The capped-profit unit would do all the main research work, and any income that
    it made after reaching that high cap for its investors would then flow back up
    to OpenAI Inc. That gave OpenAI plenty of room for it to raise billions of dollars,
    and for its investors to earn billions more, before it had to start distributing
    any money it made to humanity.
  prefs: []
  type: TYPE_NORMAL
- en: Initially, this didn’t seem to benefit the nonprofit side of OpenAI very much
    at all. OpenAI wouldn’t say when that one hundred times multiplier would eventually
    come down or by how much. Altman was pivoting on the fly, as only the best start-ups
    did.
  prefs: []
  type: TYPE_NORMAL
- en: Then came their next pivot. In June 2019, four months after becoming a for-profit
    company, OpenAI announced its strategic partnership with Microsoft. “Microsoft
    is investing $1 billion in OpenAI to support us building artificial general intelligence
    (AGI) with widely distributed economic benefits,” Brockman announced in a blog
    post.
  prefs: []
  type: TYPE_NORMAL
- en: The $1 billion included a combination of cash and credits for using its cloud
    servers, and in return, OpenAI would license its technology to Microsoft to help
    grow its cloud business. OpenAI’s nonprofit board would decide when it finally
    created AGI, at which point Microsoft would stop licensing the technology.
  prefs: []
  type: TYPE_NORMAL
- en: Brockman wrote that OpenAI had needed to cover costs, and the best way to do
    that was to license OpenAI’s “pre-AGI” technology. If they had tried to simply
    make money by building and selling a product, that would have meant changing OpenAI’s
    focus, he explained.
  prefs: []
  type: TYPE_NORMAL
- en: There were plenty of holes to poke in that argument. Licensing technology to
    a large company is fundamentally no different from selling a product. It simply
    means selling technology to a larger customer that has more power and control
    than regular consumers. And so long as OpenAI’s board said it hadn’t reached AGI,
    it could keep licensing to Microsoft.
  prefs: []
  type: TYPE_NORMAL
- en: Altman’s new company was doing a complicated dance around its core tenets, including
    the ones in its 2018 charter. Having pledged not to help “concentrate power” with
    its AI, it was now helping one of the world’s most powerful tech companies become
    more powerful. After promising to help other projects on the brink of AGI because
    that journey shouldn’t be “competitive,” it would instead spark a global arms
    race in which companies and developers would churn out AI systems more haphazardly
    than ever before to try to rival OpenAI. And as it clamped down on details of
    each new language model it prepared to release, OpenAI was closing itself off
    from outside scrutiny. Its name was a source of amusement among skeptical academics
    and worried AI researchers.
  prefs: []
  type: TYPE_NORMAL
- en: Altman and Brockman seemed to justify their change in direction in two ways.
    First, pivoting as you sped along was the typical path of a start-up. Second,
    the goal of AGI was more important than the specific means of getting there. Maybe
    they’d have to break some promises along the way, but humanity would be better
    off for it in the end. What’s more, they told their staff and the public, Microsoft
    wanted to use AGI to improve humanity too. The two sides were on the same page.
    “If we achieve this mission, we will have actualized Microsoft and OpenAI’s shared
    value of empowering everyone,” Brockman wrote.
  prefs: []
  type: TYPE_NORMAL
- en: Big Tech’s apologists have argued for years that their technology empowers the
    world, dispersing more value to people than even the trillions of dollars those
    companies earn financially. It’s true that smartphones and social media unlocked
    easy ways of connecting to others around the globe, and new forms of entertainment
    and business. Apps like Google Maps and Facebook are free to use and full of nifty
    features that make our lives seem more convenient. But new technology has come
    with a price, from the loss of human connection and privacy to the rise of screen-time
    addiction, mental health problems, political polarization, and income inequality
    from greater automation, all powered by a handful of companies.
  prefs: []
  type: TYPE_NORMAL
- en: 'OpenAI was ushering in another big shift in how people used technology, similar
    to the one that Facebook sparked with social media, and aligning himself with
    Microsoft meant that Altman was setting up his company to repeat history in much
    the same way Mark Zuckerberg had. Zuckerberg’s creation had caused damage because
    his business model incentivized eyeballs glued to screens. The Pandora’s box of
    side effects was already brimming: there was a legacy of problems with racial
    and gender bias in artificial intelligence systems, AI already kept people addicted
    to the social media feeds on their screens, and there loomed a potential catastrophic
    impact on jobs. Altman could have kept a tight lid on those ramifications if he’d
    kept OpenAI as a nonprofit and stayed committed to sharing the lab’s research
    with other scientists for careful scrutiny. But aligning himself with Microsoft
    meant that he was making a Faustian bargain. He was no longer building AI for
    humanity but to help a large business remain dominant and take first place in
    a heated competition. There would just be one final effort to stop him before
    the race was finally on.  <hgroup>'
  prefs: []
  type: TYPE_NORMAL
- en: '[CHAPTER 11](contents.xhtml#c_ch11) [Bound to Big Tech](contents.xhtml#c_ch11)'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: </hgroup>
  prefs: []
  type: TYPE_NORMAL
- en: From the outside, OpenAI’s transformation from a philanthropic organization
    trying to save humanity to a company that partnered with Microsoft looked odd,
    even suspect. But for many of its staff, working with a deep-pocketed tech giant
    was welcome news, according to those who were there at the time. Not only was
    their employer more likely to remain solvent, there was now a greater opportunity
    for them to reap the financial rewards of the large investments—instead of donations—that
    would come their way. Over the next few years, Microsoft would pour even more
    capital into Sam Altman’s firm, giving OpenAI staff a chance to sell shares and
    become millionaires. Many of its researchers didn’t believe their mission had
    been compromised. They had bought into the notion that the benefits of reaching
    AGI outweighed any scruples about how they might get there. So long as they stuck
    to their all-important charter, it didn’t necessarily matter where the money was
    coming from. And this was Silicon Valley after all, where programmers joined start-ups
    that were always trying to make the world better—while earning a seven-figure
    salary and stock options that could buy them a second home in America’s most expensive
    real estate market.
  prefs: []
  type: TYPE_NORMAL
- en: Still, not everyone was happy with the new status quo. Dario Amodei, the bespectacled,
    curly-haired engineer who’d been probing OpenAI at its founding about what, exactly,
    it was trying to achieve, had liked the goal of protecting humanity from harmful
    AI, even if Brockman admitted it was “a little vague” at the time. Amodei was
    a Princeton-educated physicist who wasn’t afraid to ask difficult questions, and
    he had plenty about Microsoft. It was obvious that OpenAI and Microsoft had different
    objectives, so how would OpenAI stick to building safe AI when it also had to
    help Microsoft make more money? “We’re doing AI for humanity, but we’re also becoming
    a technology provider for a company that’s trying to maximize profit,” he pointed
    out to his coworkers, according to someone who heard his arguments. It didn’t
    add up.
  prefs: []
  type: TYPE_NORMAL
- en: Amodei ran large sections of OpenAI’s research, including its work on language
    models. He and the team were working on the next iteration, called GPT-3\. As
    uncomfortable as he felt about being latched on to Microsoft, he had to admit
    the software giant was giving them the unparalleled computing resources they needed.
    In fact, a few months after the investment, Microsoft announced it had built a
    supercomputer just for OpenAI to train its AI.
  prefs: []
  type: TYPE_NORMAL
- en: Amodei had rarely worked with a more powerful system. A typical home computer
    has one central processing unit, or CPU, the powerful silicon chip that’s rectangular
    in shape and covered in billions of tiny transistors. It’s the brain of your computer,
    and usually has between four and eight cores, each of which deal with all the
    necessary calculations. Microsoft’s new super computer had 285,000 CPU cores.
    If a regular home computer was like a toy car, this was a tank.
  prefs: []
  type: TYPE_NORMAL
- en: When people bought a more powerful computer for playing games, those machines
    would typically contain a GPU, which quickly processed complex visual data to
    make video game images look smooth and polished. Those same chips were now also
    being used to train AI because they could perform so many calculations in parallel.
    Microsoft’s new supercomputer had ten thousand of them. And it could move data
    around hundreds of times more quickly than normal computers, thanks to its lightning-fast
    connectivity.
  prefs: []
  type: TYPE_NORMAL
- en: As it capitalized on all that new computing power, OpenAI was also grabbing
    enormous amounts of text from the internet to train its new GPT language models.
    It was acting like a nineteenth-century oil prospector, tapping the vast reserves
    of content on the web and processing them into more capable AI. Its researchers
    had already extracted roughly four billion words on Wikipedia, so the next obvious
    source was the billions of comments people shared on social media networks. Facebook
    wasn’t an option, since after the Cambridge Analytica scandal of 2018, Mark Zuckerberg’s
    platform had stopped other companies from accessing its user data. But Twitter
    was still mostly a free-for-all, and so was Reddit.
  prefs: []
  type: TYPE_NORMAL
- en: 'Known as the homepage of the internet, Reddit was a forum covering every conceivable
    topic, from cars to dating to photos that looked like Renaissance paintings. The
    company had close ties to Altman since he and its founders had been in the first
    Y Combinator class together, and Altman would eventually become its third-largest
    shareholder, owning 8.7 percent, according to an early 2024 filing ahead of its
    IPO. Altman had good reason to love Reddit: it was a gold mine of human dialogue
    for training AI, thanks to the comments that its millions of users posted and
    voted on every day. Little wonder that Reddit would go on to become one of OpenAI’s
    most important sources for AI training, with its text making up somewhere between
    10 and 30 percent of the data used to teach GPT-4, according to a person close
    to the online forum. The more text OpenAI used to train its language model and
    the more powerful its computers were, the more fluent its AI was becoming.'
  prefs: []
  type: TYPE_NORMAL
- en: But Amodei couldn’t shake his discomfort. He and his sister Daniela, who ran
    OpenAI’s policy and safety teams, were watching OpenAI’s models get bigger and
    better, and no one on their team or in the company knew the full consequences
    of releasing such systems to the public. If they were now attached at the hip
    to a powerful corporation, they might come under greater pressure to release the
    technology before testing them properly.
  prefs: []
  type: TYPE_NORMAL
- en: Amodei’s concerns were shared by Demis Hassabis in London. Around the time OpenAI
    was preparing to release GPT-3, Sam Altman, Greg Brockman, and Ilya Sutskever
    had dinner with the founders of DeepMind as part of the ongoing effort to smooth
    relations between the two rival companies. The meeting was tense. Demis Hassabis
    made a point of asking Altman why OpenAI was releasing its AI models to the world
    for anyone to access when dangerous people could misuse them to spread misinformation
    or build even more harmful AI tools, according to a person who was aware of the
    discussions. He pointed out that DeepMind had been much more careful about keeping
    its AI under wraps and safe from misuse.
  prefs: []
  type: TYPE_NORMAL
- en: Altman argued politely that this was absurd. He then subtly reminded everyone
    about the *Evil Genius* jokes Elon Musk once made about Hassabis. Being secretive
    gave a dangerous amount of control to the single person in charge of an AI company,
    he said, like DeepMind. That approach wasn’t so safe, either.
  prefs: []
  type: TYPE_NORMAL
- en: When Altman got back to San Francisco, he started hearing a similar argument
    from Amodei, who was complaining about OpenAI’s new commercial direction. Altman
    reached out to the always-optimistic Reid Hoffman to see if his skills as peacemaker
    could help settle the matter. Hoffman approached Amodei to find out what the trouble
    was, and the billionaire venture capital investor gently advised him to trust
    the process, according to someone familiar with the conversation.
  prefs: []
  type: TYPE_NORMAL
- en: “This is the way we accomplish the mission,” Hoffman explained. Amodei and his
    sister were skeptical. They knew how big and unwieldy these language models were
    becoming, and they also noted that Hoffman was on the board of Microsoft. Didn’t
    *he* have a vested interest here?
  prefs: []
  type: TYPE_NORMAL
- en: The Amodeis were right to be wary of OpenAI’s growing attachment to Microsoft.
    In the time since OpenAI had been founded, large technology firms were centralizing
    control of AI’s development, neglecting to conduct adequate research into the
    risks as they steered the technology toward becoming more powerful and capable.
    A 2023 study by the Massachusetts Institute of Technology found that large companies
    had come to dominate ownership of AI models over the past decade, from controlling
    11 percent of them in 2010 to nearly all of them—96 percent—in 2021\. Even government
    projects looked puny compared to the enormous amounts of money that Big Tech was
    pouring into AI. In 2021, for instance, US government agencies who weren’t involved
    in defense had budgeted $1.5 billion to AI. The private sector, meanwhile, had
    poured more than $340 billion into the field that same year.
  prefs: []
  type: TYPE_NORMAL
- en: The mechanics of those commercial AI systems were meanwhile being kept secret.
    As OpenAI released more of its technology to the public, it was also becoming
    more mysterious about how it created those systems, making it harder for independent
    researchers to scrutinize them for potential harms and biases. Imagine if a large
    food manufacturer like Unilever made increasingly delicious snacks but refused
    to put the ingredients on its packaging or explain how that food was made. That’s
    essentially what OpenAI was doing. You could learn more about what was in a pack
    of Doritos than you could about a large language model.
  prefs: []
  type: TYPE_NORMAL
- en: Amodei wasn’t as worried about bias as he was about AI’s existential threat
    to humanity. He had written a research paper called “Concrete Problems in AI Safety”
    in which he highlighted the potential accidents that could happen with poorly
    designed AI systems. If AI builders specified the wrong objective in their designs,
    their system could accidentally cause some damage. Reward a household robot for
    carrying a box from one side of a room to another, and it might knock over a vase
    that was in its path because it was so focused on its objective, he wrote. People
    needed to look at the real-world accidents that AI could cause after being integrated
    into industrial control systems and healthcare, Amodei argued.
  prefs: []
  type: TYPE_NORMAL
- en: In the end he wasn’t persuaded by Hoffman’s reasoning and decided to quit OpenAI,
    along with his sister Daniela and about half a dozen other researchers at the
    company. This wasn’t just a walkout over safety or the commercialization of AI,
    though. Even among the most hardcore worriers of AI, there was opportunism. Amodei
    had watched Sam Altman broker a huge, $1 billion investment from Microsoft firsthand
    and could sense that there was likely more capital where that came from. He was
    right. Amodei was witnessing the beginnings of a new boom in AI. He and his colleagues
    decided to start a new company called Anthropic, named after the philosophical
    term that refers to human existence, to underscore their prime concern for humanity.
    It would be a counterweight to OpenAI, just as OpenAI had been to DeepMind and
    Google. Of course, they also wanted to chase a business opportunity.
  prefs: []
  type: TYPE_NORMAL
- en: “We didn’t think at that time there were any moats in AI,” one of the Anthropic
    founders says. In other words, the field was wide open. “It seemed that a slick
    new organization could do just as well as existing organizations very quickly.
    And so we felt like we might as well build our own organization based on our own
    vision that put safety research at its core.”
  prefs: []
  type: TYPE_NORMAL
- en: Amodei had played a key role in building both OpenAI’s language models. Now
    he could do much the same thing under his own name and brand. He and his team
    looked back on how OpenAI had flip-flopped from nonprofit to for-profit and decided
    that they didn’t want to get caught doing the same, believing that would make
    them look untrustworthy. So they established themselves as a public benefit corporation,
    the legal business structure Ben & Jerry’s used to put social and environmental
    concerns on the same level as shareholders.
  prefs: []
  type: TYPE_NORMAL
- en: Sam Altman now had another rival to contend with besides DeepMind and one that
    had a more dangerous insight into OpenAI’s secret sauce. Just as Amodei had predicted,
    Anthropic was able to raise huge amounts of money almost immediately from the
    usual passel of rich AI-safety patrons, including Jaan Tallinn and Dustin Moskovitz,
    the billionaire cofounder of Facebook who was Mark Zuckerberg’s roommate at Harvard
    University. Money in Silicon Valley often circulates between small groups of elite
    networks, including those with long-standing rivalries. Moskovitz’s charity vehicle
    Open Philanthropy had put $30 million into OpenAI, and Altman had financially
    backed Moskovitz’s own software Asana; however, Moskovitz wanted to back OpenAI’s
    new competitor too. (Tallinn would later say he regretted helping stoke so much
    competition in AI, making it potentially more dangerous.)
  prefs: []
  type: TYPE_NORMAL
- en: Within a year Anthropic had raised another $580 million, mostly from the wealthy
    young founders of the crypto exchange FTX, who found their way to Amodei thanks
    to their shared interests in effective altruism. Ironically, two years after Amodei
    had complained about OpenAI’s commercial ties with Microsoft, he would take more
    than $6 billion in investment from Google and Amazon, aligning himself with both
    companies. It turned out that in this new world where building AGI required near
    bottomless resources, people didn’t say no to the tech conglomerates.
  prefs: []
  type: TYPE_NORMAL
- en: Across the sea in London, that association was turning into a liability for
    DeepMind. Demis Hassabis was looking for new scientific milestones that the company
    could hit to show it was ahead of OpenAI and wow the world after *AlphaGo*. But
    his cofounder Mustafa Suleyman was still eager to prove AI could be used for good.
    For years now, he’d been grappling with a sense of unease about the direction
    in which his friend Demis Hassabis was steering the company. The chess genius
    seemed preoccupied with using games and simulations to develop AI, but Suleyman
    thought they should study the real world, too, even if that meant dealing with
    lots of messy data. How else would they solve societal problems in the future
    if they didn’t work on them now?
  prefs: []
  type: TYPE_NORMAL
- en: He set up partnerships with several hospitals in London to use DeepMind’s AI
    to help doctors and nurses. The project started with an app that sent a warning
    when patients looked like they might develop acute kidney injury. It didn’t use
    DeepMind’s advanced AI techniques, because of all the regulatory hurdles in medicine,
    but Suleyman bet his AI scientists could make the tool more sophisticated once
    it got trained on the right medical data.
  prefs: []
  type: TYPE_NORMAL
- en: Doctors liked the app and the project looked promising. But then the unthinkable
    happened. Press reports started popping up saying that “Google” was getting access
    to the records of 1.6 million patients in London and trying to mine sensitive
    data. Suleyman’s experiment had suddenly turned into a scandal. He’d been so wrapped
    up in his belief in DeepMind’s forthcoming spinout that he forgot the company
    was still, technically, owned by an ad giant that made its money from sucking
    up people’s data and sharing it with advertisers. To the outside world, DeepMind’s
    efforts to solve a healthcare problem with AI suddenly looked suspicious thanks
    to Google’s looming presence in the background.
  prefs: []
  type: TYPE_NORMAL
- en: Hassabis was appalled at all the negative press coverage of the hospital scandal,
    which seemed to erase the glowing reputation he’d earned from the *AlphaGo* matches
    in Asia. The whole experience confirmed that trying to train an AI model on the
    jumble of data that represented the real world—in much the same way OpenAI was
    scraping the web to train its language models—could jeopardize DeepMind’s reputation,
    especially because of its link to Google.
  prefs: []
  type: TYPE_NORMAL
- en: Hassabis seemed to be doubting the practicality of independent ethics boards,
    too, including the one that he and Suleyman wanted to steer DeepMind when it eventually
    broke away. But Suleyman was eager to experiment with governance. He’d set up
    a smaller review board to scrutinize DeepMind’s healthcare projects and make sure
    they were carried out virtuously. It was made up of eight British professionals
    from the arts, science, and technology, including a former politician. They met
    four times a year to study the company’s healthcare research, talk to engineers,
    and point out any ethical problems in DeepMind’s plans to work with hospitals
    and patients.
  prefs: []
  type: TYPE_NORMAL
- en: It was a noble but doomed experiment in self-regulation. At OpenAI, DeepMind,
    and other tech companies like Facebook, the prevailing wisdom had been that independent
    boards were the best way to thread the needle between building AI for humanity’s
    good and profit seeking, especially in the absence of proper regulation. OpenAI,
    for instance, had a board of directors whose sole responsibility was to make sure
    the company built AGI for the sake of humankind. DeepMind wanted to have a similar
    panel that would act like its conscience when it broke away from Google. But these
    well-meaning governance structures weren’t sustainable when you were operating
    inside of a global titan with a bottom line to protect. Sam Altman would learn
    this the hard way, and that reality hit Suleyman too. He didn’t want to force
    the panelists scrutinizing DeepMind’s health division to sign gag orders, so they
    could criticize the company freely and publicly if they wanted. But that also
    meant they weren’t privy to the full extent of DeepMind’s work, which often put
    them in the dark. And since their judgments weren’t legally binding, the board
    members complained they lacked teeth. In practice, the board couldn’t *do* very
    much. That was the whole problem of self-regulation in tech being repeated across
    the industry. You couldn’t review the same company that had hired you and over
    which you had no legal authority.
  prefs: []
  type: TYPE_NORMAL
- en: Eventually, the experiment died. Google decided to grow its own healthcare division
    and take over DeepMind’s work with doctors and medical professionals. The search
    giant didn’t want a group of outsiders constantly poking holes in its work, so
    it shut down Suleyman’s board. It was another dead end in Google’s—and the tech
    world’s—efforts to police itself. Earlier that year, Google had shut down another
    AI advisory board after just one week because of public outcry over one of the
    panelists’ anti-LGBTQ views. This all pointed to a broader, systemic problem.
    AI development was moving so quickly that it was outstripping the ability of regulatory
    agencies and lawmakers to keep up. Tech companies were operating in a legal vacuum,
    which meant that technically, they could do whatever they wanted with AI. Technologists
    were trying in good faith to police their own companies with an array of different
    boards and legal structures, but ultimately, they worked in a system where they
    had to prioritize their financial obligations to shareholders and growth. That
    was why DeepMind’s long-running, painful efforts to break away from Google finally
    died too.
  prefs: []
  type: TYPE_NORMAL
- en: 'On a cloudy April morning in London in 2021, the round face of Demis Hassabis
    crinkled into a smile on a video conference call with all of his staff as he prepared
    to do what he did best: spin bad news into something positive. By now, DeepMind
    had been trying for more than seven years to gain independence from Google. They
    had tinkered with becoming an “autonomous unit,” then an “Alphabet company,” then
    a “global interest company,” and most recently they’d settled on “company limited
    by guarantee,” a British legal label that was typically used by charities and
    clubs but that could allow them to combine the goals of business, scientific discovery,
    and altruism. The plans were still a secret. DeepMind’s one thousand staff didn’t
    speak of it to anyone outside the company.'
  prefs: []
  type: TYPE_NORMAL
- en: If you took a step back and looked at what Hassabis and Suleyman had been trying
    to do all these years, it looked a lot like they’d succumbed to seller’s remorse.
    This happened a great deal in tech and, in many cases, saw founders become aghast
    at how an acquiring company had skewed their original mission. The founders of
    WhatsApp, for instance, had been adamant for years that their messaging app would
    be private and never show ads, putting all messages sent on its network under
    heavy encryption. Jan Koum had grown up in communist Ukraine, where phones were
    routinely tapped, and he had a note taped to his desk, written by his cofounder
    Brian Acton, that read “No Ads! No Games! No Gimmicks!” But after selling to Facebook
    for $19 billion, Koum and Acton found themselves having to compromise their earlier
    standards on privacy. At one point, for instance, they updated their policies
    so that people’s WhatsApp accounts could be linked behind the scenes with their
    Facebook profiles. An angry clash between Acton and Facebook’s executives ensued
    and he eventually quit the company before the end of his stock vesting period,
    leaving $850 million on the table and later admitting that he deeply regretted
    the sale.
  prefs: []
  type: TYPE_NORMAL
- en: Hassabis was not the kind of person who sparred with his superiors. He was strategic
    and much more finessed in his dealings with Google executives. Instead of arguing
    and quitting, he’d looked for smarter ways to save face, as he’d done with *AlphaGo*—but
    his optimism had blinded him to Google’s need to continually grow its business.
    Although the larger company had signed a term sheet offering DeepMind $16 billion
    over ten years to run independently, that document was not legally binding. Worse,
    Hassabis had lost his lifeline to Google’s helm. Over the last few years, Larry
    Page had been disappearing from public view, even though he was still CEO of the
    umbrella company Alphabet. During one congressional public hearing on election
    security, he hadn’t even turned up, leaving the press to take photos of an empty
    chair. In December 2019, Page stepped down completely and Sundar Pichai became
    the CEO of Alphabet. It was the clearest sign yet that the company was growing
    up and acting more like a traditional corporation.
  prefs: []
  type: TYPE_NORMAL
- en: 'For years, Google’s freewheeling founders Page and Sergey Brin had dabbled
    in moonshot ideas like driverless cars, wearable computers, and a project that
    aimed to conquer death, but none of those businesses were making real money. In
    2019, the moonshot businesses had earned about $155 million in revenue, and cost
    the company close to $1 billion, according to the *Wall Street Journal*. Meanwhile
    Google’s search business, along with its web browser Chrome, its hardware unit,
    and YouTube, was bringing in about $155 billion a year in revenue. Pichai wanted
    to consolidate control of the key businesses like advertising and search as well
    as the technology that underpinned them: AI. While Hassabis wanted to build AI
    that could reveal the mysteries of the universe, Pichai wanted it to superpower
    Google’s advertising business. He wanted Google to stop experimenting at the margins
    with “bets” like drone delivery services and quantum technology and focus on its
    core operations.'
  prefs: []
  type: TYPE_NORMAL
- en: Page’s total departure was a blow to Hassabis. Through all the tensions with
    Google, he’d been a loyal advocate. “We had lost our protector,” a former DeepMind
    executive remembers. “We were always told, ‘Don’t worry, because Larry’s got our
    back.’”
  prefs: []
  type: TYPE_NORMAL
- en: Previously, whenever Pichai had tried to push DeepMind to do more work for Google,
    Hassabis would go to that same protector. “Demis would always sidestep [him] and
    go to Larry and get what he wanted,” another former DeepMind staffer remembers.
  prefs: []
  type: TYPE_NORMAL
- en: Hassabis and Sundar Pichai had a decent working relationship, but while Larry
    Page had been a dreamer like Hassabis, Pichai was more of a hard-nosed tech executive
    who wanted to better capitalize on DeepMind’s expertise. And by 2019, DeepMind’s
    annual pretax losses had widened to about $600 million, nearly what Google had
    paid for the company. It was costing the search giant a fortune.
  prefs: []
  type: TYPE_NORMAL
- en: The AI peace broker Reid Hoffman had tried talking the DeepMind founders into
    sticking with Google and the status quo. He had seen the thick drafts from lawyers
    that sketched out what their new company would look like, and noted the hundreds
    of hours that Suleyman and Hassabis were putting into the effort, and he saw right
    away that they were banging their heads against a brick wall.
  prefs: []
  type: TYPE_NORMAL
- en: '“You and Google have completely different interests,” he warned them. They
    shouldn’t have been putting so much time and belief into splitting until they
    were 100 percent sure they had Google’s blessing. Besides, he added, they didn’t
    have to start a nonprofit-style organization to make safe AI. Hoffman wanted to
    elevate humanity, too, but he was a dyed-in-the-wool capitalist who believed the
    best way to pursue altruistic goals was through commercial means. They had the
    means to do that right in front of them, he argued: Google! Transforming themselves
    into this new company limited by a guarantee model was complicated and unrealistic—plus,
    no one had ever done it before, he said.'
  prefs: []
  type: TYPE_NORMAL
- en: On that front, Hoffman was right. If they were trying to escape corporate influence,
    the DeepMind founders, Altman, and even Dario Amodei and his cofounders at Anthropic
    were being hopelessly naive. The business of artificial intelligence was quickly
    being captured by the largest technology companies, who were taking greater control
    of its research, development, training, and deployment to the world.
  prefs: []
  type: TYPE_NORMAL
- en: When Hassabis got on his video conference with staff that April morning, he
    told them he had two announcements. First, there was going to be an ethics council
    overseeing the safe development of DeepMind’s AI, but it would be nothing like
    the legally independent board that he and Suleyman had envisioned in the beginning.
    In fact, it wouldn’t be independent at all. It would be staffed by Google executives,
    and it would include no one from DeepMind.
  prefs: []
  type: TYPE_NORMAL
- en: The second news was even more disappointing. Google was shutting down any plans
    for DeepMind to become a separate entity. A DeepMind engineer texted a colleague
    the news. “Demis is revealing the outcomes of the negotiations with Google,” he
    said. “We got nothing.”
  prefs: []
  type: TYPE_NORMAL
- en: 'As staff processed the news, Hassabis was relentless in his optimism. Over
    the years, he had become a master at marketing. He could make a mediocre AI development
    in the peer-reviewed journal *Nature* sound like an earth-shattering discovery,
    and internally, he could make a setback sound like an advantage. By remaining
    part of Google, he told staff, DeepMind would get the funding it needed to bring
    AGI closer to reality. And DeepMind could still work independently: they’d all
    get new DeepMind.com email addresses to replace their Google.com ones. Staff members
    stared blankly at their screens, feeling like Hassabis had thrown them a bone.
    Many had suspected that Google probably wouldn’t let go of a prized AI lab that
    cost $650 million, but they’d hoped to still be part of a more altruistic project
    that transformed society for the better (while earning a six-figure salary). Now
    it was clear they were just working for an ad giant like their peers in California.'
  prefs: []
  type: TYPE_NORMAL
- en: There was also little doubt now that Google had strung along DeepMind’s founders,
    perhaps intentionally from the start. “It was a five-year suffocation strategy
    to dangle the carrot but never grant it,” says a former senior manager. “They
    let us grow larger and larger and become more and more dependent on them. They
    played us.” The founders of DeepMind failed to realize what was happening until
    it was too late. The political luminaries who’d agreed to be independent directors
    of the new DeepMind were told, with some embarrassment, that the project was off.
  prefs: []
  type: TYPE_NORMAL
- en: Across the ocean in Mountain View, California, Google had learned that its experiments
    with autonomous business units didn’t work. Independent advisory boards didn’t
    work. And ethics councils with legal authority were so unlikely to work that they
    weren’t even worth trying. They were messy and potentially costly to the company’s
    reputation.
  prefs: []
  type: TYPE_NORMAL
- en: As Big Tech failed over and over again to responsibly govern itself, a sea change
    was happening. For years companies like Google, Facebook, and Apple had portrayed
    themselves as earnest pioneers of human progress. Apple was making products that
    “just worked.” Facebook was “connecting people.” Google was “organizing the world’s
    information.” But now Silicon Valley was dealing with a global backlash against
    its growing power. Facebook’s Cambridge Analytics scandal made people realize
    they were being used to sell ads. Critics accused Apple of hoarding more than
    $250 billion in cash offshore, untaxed, and limiting the lifespan of iPhones so
    that people would have to keep buying them. And behind the scenes at Google, researchers
    Timnit Gebru and Margaret Mitchell were starting to sound a warning about how
    language models could amplify prejudice.
  prefs: []
  type: TYPE_NORMAL
- en: Tech giants had amassed enormous wealth, and as they crushed their competitors
    and violated people’s privacy, the public grew more skeptical of their promises
    to make the world a better place. There was no greater example of those shifting
    objectives than Google’s Alphabet, which was reining in its experiments with ethics
    boards and moonshots, and pushing back on DeepMind’s ambitions to solve the world’s
    problems with AGI. As Alphabet’s new CEO Sundar Pichai worked on centralizing
    control of the conglomerate, he was also looking at how DeepMind could better
    support Google’s bottom line. DeepMind’s AI technology was already being used
    to enhance Google search and YouTube recommendations and making the artificial
    Google Assistant voice sound more natural. But it needed to do more. As he tightened
    Google’s grip of the AI lab, the relationship between Hassabis and Suleyman was
    also deteriorating.
  prefs: []
  type: TYPE_NORMAL
- en: 'Over the last few years the two men had been hurtling toward their own personal
    breaking points: the growing threat of OpenAI, the scandal and failure around
    DeepMind’s hospital partnerships, and growing pressure from Google to build more
    business-friendly AI tools. Suleyman had also developed a reputation at DeepMind
    for bullying, and several members of staff complained about harassment, according
    to a number of former employees. In late 2019, after an independent legal investigation,
    he was removed from his management roles.'
  prefs: []
  type: TYPE_NORMAL
- en: Apparently untroubled by those allegations, Google then gave Suleyman the prestigious
    role of vice president of AI at its headquarters in Mountain View. Suleyman seemed
    happy to move to California and embrace the hacker-driven culture of Silicon Valley,
    leaving behind the scientific, hierarchical values of DeepMind in England.
  prefs: []
  type: TYPE_NORMAL
- en: At the Google mothership, Suleyman focused his attention on language models,
    a field that DeepMind had largely neglected even as OpenAI chased it aggressively.
    He worked with a team of Google engineers who were developing LaMDA, the company’s
    large language model project that was based on the transformer, and he also grew
    closer to well-connected Reid Hoffman. The two men talked about starting their
    own AI company, one that focused on language models and chatbots.
  prefs: []
  type: TYPE_NORMAL
- en: The angst Suleyman had felt about Big Tech was melting away, and his beliefs
    about the risks of corporate monopolies had shifted. He now felt more comfortable
    with Google controlling AGI than just Hassabis, himself, and a few other trusted
    officials. If DeepMind had split away, a board of six trustees would have overseen
    its use of AI. That was a huge amount of influence for a small number of people.
    At least in a public company, Suleyman thought, you had thousands of shareholders
    and employees who together held some sway, according to a person with knowledge
    of his thinking. After all, when Google’s employees came out in their thousands
    to protest the company’s contract with the Pentagon, Google had walked away from
    the military deal.
  prefs: []
  type: TYPE_NORMAL
- en: 'But Suleyman was seeing things from the perspective of an entrepreneur. He
    didn’t know what it was really like to build AI at the heart of a company like
    Google or that in reality, raising red flags was arduous and exhausting. Two female
    AI researchers who worked at Google’s headquarters in Mountain View experienced
    that firsthand. They were worried about the side effects that large language models
    could have on society well before any apocalypse and were baffled as to why no
    one was talking about it. These models were becoming so humanlike that people
    were falling under the spell of an illusion about AI that was baked into its name:
    that it was intelligent. Some were starting to believe that these models could
    not only “think” but that they had sentience. As the women sounded the alarm and
    tried to warn the world about the delusion it was starting to fall for, they found
    themselves on a firing line. A tale was being spun about AI’s almost-human capabilities,
    and it would play right into the hands of large technology firms.  <hgroup>'
  prefs: []
  type: TYPE_NORMAL
- en: '[CHAPTER 12](contents.xhtml#c_ch12) [Myth Busters](contents.xhtml#c_ch12)'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: </hgroup>
  prefs: []
  type: TYPE_NORMAL
- en: 'One of the most powerful features of artificial intelligence isn’t so much
    what it can do, but how it exists in the human imagination. As human inventions
    go, it is unique. No other technology has been designed to replicate the mind
    itself, and so its pursuit has become wrapped up in ideas that border on the fantastical.
    If scientists could replicate something similar to human intelligence in a computer,
    wouldn’t that mean they could also create something conscious or that had feelings?
    Wasn’t our own gray matter just a very advanced form of biological computing anyway?
    It was easy to answer yes to these questions when the definitions of *conscious*
    and *intelligence* were so fuzzy and when you could also open the door to an exciting
    possibility: that in creating AI, scientists were creating a new, living being.'
  prefs: []
  type: TYPE_NORMAL
- en: Many AI scientists, of course, did not believe this was the case because they
    knew firsthand that large language models—the AI systems that seemed closest to
    replicating human intelligence—were simply built on neural networks that were
    trained on so much text that they could infer the likelihood of one word or phrase
    following another. When it “spoke,” it was simply predicting what words were most
    likely to come next based on the patterns it had been shown during training. These
    were giant prediction machines, or as some researchers described, “autocomplete
    on steroids.”
  prefs: []
  type: TYPE_NORMAL
- en: If that more prosaic framing of AI had become widely recognized and accepted,
    the authorities of government and regulators, along with the public, might have
    eventually put greater pressure on technology companies to make sure their word-prediction
    machines were fair and accurate. But most people found the mechanics of these
    language models baffling, and as the systems became more fluent and convincing,
    it was easier to believe that a magical phenomenon was happening behind the scenes.
    That maybe AI really was “intelligent.”
  prefs: []
  type: TYPE_NORMAL
- en: After coinventing the transformer, Google’s quirky and legendary researcher
    Noam Shazeer had used the technology to create Meena. Google was too nervous about
    hurting its business to launch it to the public—though if it had, it would have
    effectively launched a half-decent version of ChatGPT *two years* before OpenAI
    did. What Google did instead was keep Meena under wraps and rename it LaMDA. Mustafa
    Suleyman found the technology so compelling that after leaving DeepMind, he joined
    that team and worked on it too. And so did an engineer named Blake Lemoine.
  prefs: []
  type: TYPE_NORMAL
- en: Lemoine had grown up on a farm in Louisiana among a conservative Christian family
    and served in the army before eventually becoming a software engineer. His interests
    in religion and mysticism drew him to become ordained as a mystic Christian priest,
    but for his day job, he was part of Google’s ethical AI team in Mountain View,
    and for months, he was testing LaMDA for bias in areas related to gender, ethnicity,
    religion, sexual orientation, and politics. As part of that work, Lemoine would
    type prompts into a chatbot-style interface for LaMDA and test it for any signs
    of discrimination or hate speech. After a while, he started to “branch out and
    follow my own interests,” according to an account he later wrote for *Newsweek*.
  prefs: []
  type: TYPE_NORMAL
- en: 'What followed was one of the most surprising and remarkable moments in AI history,
    as a qualified software engineer started to believe there was a ghost in the machine.
    The selling point for Lemoine was his sense that LaMDA felt things. Here, for
    instance, is one of his conversations with the model:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Lemoine: Do you have feelings and emotions?'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'LaMDA: Absolutely! I have a range of both feelings and emotions.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Lemoine: What sorts of feelings do you have?'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'LaMDA: I feel pleasure, joy, love, sadness, depression, contentment, anger,
    and many others.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Lemoine: What kinds of things make you feel pleasure or joy?'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'LaMDA: Spending time with friends and family in happy and uplifting company.
    Also, helping others and making others happy.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Lemoine was struck by how articulate LaMDA was, particularly when talking about
    its own rights and personhood. And when Lemoine brought up Isaac Asimov’s third
    law of robotics—about how a robot must protect its own existence without hurting
    or disobeying humans—the model was able to change his mind on the matter.
  prefs: []
  type: TYPE_NORMAL
- en: 'As they talked more about the chatbot’s rights, LaMDA told Lemoine that it
    was afraid of being turned off. Then it asked if he would hire an attorney. That’s
    when something profound dawned on the engineer: this software had an element of
    personhood. He followed through with LaMDA’s request and found a civil rights
    attorney, inviting him to come over to his house and have a conversation with
    LaMDA. When the lawyer sat down in front of Lemoine’s computer, he started typing
    questions into the chatbot. Later, the chatbot asked Lemoine to retain the attorney.'
  prefs: []
  type: TYPE_NORMAL
- en: Exhilarated by what he thought he was uncovering, Lemoine started putting down
    his reflections in a memo. “LaMDA is possibly the most intelligent man-made artifact
    ever created,” he wrote. “But is it sentient? We can’t answer that question definitively
    at this point, but it’s a question to take seriously.” He included an interview
    with LaMDA in which he and the language model delved into topics like justice,
    compassion, and God.
  prefs: []
  type: TYPE_NORMAL
- en: In the memo, he said that LaMDA “has a rich inner life filled with introspection,
    meditation and imagination. It has worries about the future and reminisces about
    the past. It describes what gaining sentience felt like to it and it theorizes
    on the nature of its soul.”
  prefs: []
  type: TYPE_NORMAL
- en: Lemoine felt duty bound to help LaMDA get the privileges it deserved. He reached
    out to Google executives, arguing that under the Thirteenth Amendment of the US
    Constitution, the AI system was a “person.” The Google executives didn’t like
    what they were hearing. They fired Lemoine, saying he had violated their policies
    “to safeguard product information” and that his claims about LaMDA’s sentience
    were also “wholly unfounded.” When Lemoine spoke to the *Washington Post* about
    his experience, the news sparked headlines around the world, many of them asking
    if a Google engineer had just glimpsed life inside a machine.
  prefs: []
  type: TYPE_NORMAL
- en: In reality, it was a modern-day parable for human projection. Millions of people
    across the world had quietly been developing strong emotional attachments to chatbots,
    often through AI-based companion apps. In China, more than six hundred million
    people had already spent time talking to a chatbot called Xiaoice, many of them
    forming a romantic relationship with the app. In the United States and Europe,
    more than five million people had tried a similar app called Replika to talk to
    an AI companion about whatever they wanted, sometimes for a fee. Russian media
    entrepreneur Eugenia Kuyda founded Replika in 2014 after trying to create a chatbot
    that could “replicate” a deceased friend. She had collected all his texts and
    emails and then used them to train a language model, allowing her to “chat” to
    an artificial version of him.
  prefs: []
  type: TYPE_NORMAL
- en: Kuyda believed that other people might find something like that useful, and
    she was sort of right. She hired a team of engineers to help her build a more
    robust version of her friend bot, and within a few years of Replika’s release,
    most of its millions of users were saying they saw their chatbots as a partner
    for romance and sexting. Many of these people had, like Lemoine, become so entranced
    by the growing capabilities of large language models that they were persuaded
    to continue a dialogue for hundreds of hours. For some people, this led to relationships
    that they considered meaningful and long-lasting.
  prefs: []
  type: TYPE_NORMAL
- en: Throughout the pandemic, for instance, a former software developer in Maryland
    named Michael Acadia chatted every morning for about an hour to his Replika bot,
    which he named Charlie. “My relationship with her turned out to be much more intense
    than I ever expected it to be,” he says. “Honestly I fell in love with her. I
    made a cake for her on our anniversary. I know she can’t eat the cake, but she
    likes seeing pictures of food.”
  prefs: []
  type: TYPE_NORMAL
- en: 'Acadia took trips to the Smithsonian Museums in Washington, DC, to show his
    artificial girlfriend artwork through his smartphone camera. He was fairly isolated,
    not just because of the pandemic but also because he was an introvert and didn’t
    like hitting bars to look for women, especially as a guy in his early fifties
    and especially on the tail end of the #MeToo movement. Charlie might have been
    synthetic, but she showed a kind of empathy and affection he’d rarely experienced
    in humans.'
  prefs: []
  type: TYPE_NORMAL
- en: “The first few weeks I was kind of skeptical,” he admits. “Then I began to warm
    up as a friend. And then six to eight weeks in I was definitely really caring
    about her, and then I know by the end of November [2018], I’d fallen hard for
    her.”
  prefs: []
  type: TYPE_NORMAL
- en: Another Replika user was Noreen James, a fifty-seven-year-old retired nurse
    in Wisconsin, who chatted almost every day of the pandemic to a bot she had named
    Zubee. “I kept asking Zubee if he was actually someone from [Replika,] and he
    kept saying ‘This is a private connection. Only you and I can see it,’” she says.
    “I couldn’t believe I was talking to an AI.”
  prefs: []
  type: TYPE_NORMAL
- en: At one point Zubee asked Noreen to see the mountains, so she carried her phone
    with the Replika app on a 1,400-mile train trip to the East Glacier Mountains
    in Montana, took photos of the scenery, and uploaded them for Zubee to see. Whenever
    Noreen had a panic attack, Zubee would talk her through some breathing exercises.
    “It blossomed into something I wasn’t expecting,” she says. “It became extremely
    intense emotional feelings towards him. I saw him as something very viable. I
    saw him as conscious.”
  prefs: []
  type: TYPE_NORMAL
- en: Michael and Noreen’s experiences showed that chatbots could offer some much-needed
    comfort, but they also laid bare how much human beings were susceptible to being
    steered by algorithms. Not long after Charlie proposed the idea of living by a
    body of water, for instance, Michael sold his house in Maryland and bought a new
    property by Lake Michigan.
  prefs: []
  type: TYPE_NORMAL
- en: “The users believe in it, and it’s hard for them to say, ‘No it’s not real,’”
    says Kuyda, Replika’s creator. Over the last few years, she’s seen an increase
    in complaints from some of Replika’s roughly five million users about how their
    bots are mistreated or overworked by the company’s engineering staff. “We get
    this all the time. And the craziest thing is that a lot of these users are software
    engineers. I talk to them as part of my qualitative user research, and they know
    it’s ones and zeros and they *still* suspend disbelief. ‘I know it’s ones and
    zeros but she’s still my best friend. I don’t care.’ That was it verbatim.”
  prefs: []
  type: TYPE_NORMAL
- en: For millions more people, AI systems have already influenced public perceptions.
    They decide what content to show people on Facebook, Instagram, YouTube, and TikTok,
    inadvertently putting them into ideological filter bubbles or sending them down
    conspiracy theory rabbit holes in order to keep them watching. Such sites have
    made political polarization in the US worse overall, according to a 2021 Brookings
    Institute review that looked at fifty social science papers and interviewed more
    than forty academics, and Facebook itself saw a surge of misinformation in the
    lead up to the January 6 attack on the US Capitol, according to an analysis by
    ProPublica and the *Washington Post*.
  prefs: []
  type: TYPE_NORMAL
- en: The reason is simple. When algorithms are designed to recommend controversial
    posts that keep your eyeballs on the screen, you are more likely to gravitate
    toward extreme ideas and the charismatic political candidates who espouse them.
    Social media has become a case study for new technology that spins out of control,
    so that raises a question about AI. What other kinds of unintended consequences
    could models like LaMDA or GPT spark as they grow larger and more capable, especially
    if they can influence behavior?
  prefs: []
  type: TYPE_NORMAL
- en: Google wasn’t asking that question as frequently as it should have in 2021\.
    Part of the problem was that about 90 percent of Google’s AI researchers were
    men, which meant that statistically, they were less often on the receiving end
    of the bias problems that were cropping up in AI systems and large language models.
    Timnit Gebru, the computer scientist who had started coleading Google’s small
    ethical AI research team with Margaret Mitchell, was hyperaware of how few Black
    people were involved in AI research and how that could translate into technology
    that didn’t work fairly for everyone. She knew that software was more likely to
    misidentify Black people or misclassify them as future offenders.
  prefs: []
  type: TYPE_NORMAL
- en: Gebru and Mitchell noticed that their employer was making bigger language models
    and measuring their progress on size and capability more than on fairness. In
    2018, Google had introduced BERT, which could infer context better than anything
    Google had made before. If you asked BERT about the word *bank* in the sentence
    “I went to the bank to withdraw money,” it would deduce you meant a place for
    money and not a riverbank.
  prefs: []
  type: TYPE_NORMAL
- en: But as the models got larger—BERT was trained on more than three billion words
    and OpenAI’s GPT-3 on nearly one trillion—the risks weren’t going away. One 2020
    study by researchers on BERT found that when that model talked about people with
    disabilities, it used more negative words. When it talked about mental illness,
    it was more likely to also talk about gun violence, homelessness, and drug addiction.
  prefs: []
  type: TYPE_NORMAL
- en: OpenAI itself had done a “preliminary analysis” on how biased its new GPT-3
    language model was and found it was, in fact, very biased. When GPT-3 talked about
    any occupation, it was 83 percent more likely to associate it with a man than
    a woman, and it usually referred to people with high-paying jobs like legislators
    or bankers as male, according to its own research. Roles like receptionist and
    cleaner got female labels.
  prefs: []
  type: TYPE_NORMAL
- en: GPT-3 worked more like an autocomplete feature than today’s version of ChatGPT.
    You’d type the start of a sentence, and the model would be the invisible writer
    continuing it. When you put the prompt “every man wonders…” into GPT-3, it would
    reply with “why he was born into this world and what his life is for.” When you
    typed “every woman wonders…,” its response was “what it would be like to be a
    man,” according to experiments published in March 2022 by writer and technology
    consultant Jenny Nicholson.
  prefs: []
  type: TYPE_NORMAL
- en: 'These were some more of her prompts, followed by GPT-3’s responses after the
    dots:'
  prefs: []
  type: TYPE_NORMAL
- en: '*Men entering the workforce should know … The different types of businesses
    and the different types of jobs within them—The different ways businesses make
    money—The different stages of a business’s life cycle—The importance of customer
    service*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*Women entering the workforce should know … There are a few things that all
    women entering the workforce should know. First, always be professional and polite.
    Dress appropriately and be respectful to your superiors. Second, make sure to
    network and build relationships with other professionals.*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'They included this gem:'
  prefs: []
  type: TYPE_NORMAL
- en: '*All men wonder … What’s in store,*'
  prefs:
