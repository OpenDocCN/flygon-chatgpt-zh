- en: 'Choose one goal, such as:'
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
  zh: 选择一个目标，例如：
- en: Writing a blog post
  id: totrans-221
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 写博客文章
- en: Planning a trip
  id: totrans-222
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 规划旅行
- en: Creating a social media calendar
  id: totrans-223
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 创建社交媒体日历
- en: 'Now build a full ChatGPT workflow:'
  id: totrans-224
  prefs: []
  type: TYPE_NORMAL
  zh: 现在构建一个完整的ChatGPT工作流程：
- en: Define the goal and audience
  id: totrans-225
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 定义目标和受众
- en: Ask for a draft
  id: totrans-226
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求草稿
- en: Request improvements
  id: totrans-227
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求改进
- en: Format the result (bullet points, table, Markdown)
  id: totrans-228
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 格式化结果（项目符号、表格、Markdown）
- en: Save this conversation as a template for the future.
  id: totrans-229
  prefs: []
  type: TYPE_NORMAL
  zh: 将此对话保存为未来使用的模板。
