  type: TYPE_NORMAL
  zh: 设置图形大小
- en: rotate label text
  id: totrans-2116
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 旋转标签文本
- en: set xlim or ylim
  id: totrans-2117
  prefs:
