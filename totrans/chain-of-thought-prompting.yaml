- en: Chapter 31\. Consulting with Yourself using CoT Prompting
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: '| ![](image_rsrc6FJ.jpg) This chapter is based on the Second Level Transactional
    Analysis theory presented in Chapter 27\. Intra-Psyche Communication Channels.
    |'
  prefs: []
  type: TYPE_TB
- en: From an ideal Transactional Analysis perspective, when a person is presented
    with a quandary, the issue first “hits” the Adult.
  prefs: []
  type: TYPE_NORMAL
- en: The Adult then farms out the quandary to the Child and the Parent, each of which
    consider the question at hand from their own perspectives. Subsequently the Adult
    considers the “opinions” of the Child and the Adult and synthesizes a conclusion
    based on the feedback from all parts of the psyche.
  prefs: []
  type: TYPE_NORMAL
- en: In this way a person can make a decision that considers how that decision will
    impact on every part of the person’s being and emotions.
  prefs: []
  type: TYPE_NORMAL
- en: Simulating Internal Thought
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'We can simulate this thinking process flow using CoT Prompting (implemented
    in Python), by using the following algorithm:'
  prefs: []
  type: TYPE_NORMAL
- en: Receive the initial question.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Translate the question to a Child-version of the question.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Translate the question to a Parent-version of the question.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Pass the Child-version of the question to the Child.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Pass the Parent-version of the question to the Parent.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Allow the Parent and the Child to determine their own answers.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Let the Parent and the Child pass their individual answers back to the Adult.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Let the Adult take the answers of the Parent and the Child into account, while
    formulating its own final conclusion.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: By using this technique, we can explore the full gamut of options that would
    be considered by all aspects of the persona, and then take these options into
    account when forming a final, reasoned opinion.
  prefs: []
  type: TYPE_NORMAL
- en: Using the Python code from github.com/edwardchalk/SimulatingThought, let’s see
    how this works in action.
