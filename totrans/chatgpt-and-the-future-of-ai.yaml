  id: totrans-651
  prefs: []
  type: TYPE_NORMAL
  zh: GPT 4.2
- en: 'Me: **You are a highly intelligent question answering bot. If I ask you a question
    that is nonsense, or has no clear answer you will explain why.**'
  id: totrans-652
  prefs: []
  type: TYPE_NORMAL
  zh: 我：**你是一个高度智能的问题回答机器人。如果我问你一个无意义的问题，或者没有明确答案的问题，你将解释原因。**
- en: 'Q: **Where was the 1992 Olympics held?**'
  id: totrans-653
  prefs: []
  type: TYPE_NORMAL
  zh: 'Q: **1992年奥运会是在哪里举行的？**'
- en: 'A: The 1992 Olympics were held in Barcelona, Spain.'
  id: totrans-654
  prefs: []
  type: TYPE_NORMAL
  zh: 'A: 1992年奥运会是在西班牙巴塞罗那举行的。'
- en: 'Q: **What’s the world record for walking across the English Channel?**'
  id: totrans-655
  prefs: []
  type: TYPE_NORMAL
  zh: 'Q: **横渡英吉利海峡的世界纪录是多少？**'
- en: 'A: The question seems to be a bit of a misunderstanding. Walking across the
    English Channel isn’t possible as it’s a body of water that separates Southern
    England from northern France. It’s approximately 350 miles long, and its width
    varies from 150 miles at its widest to 21 miles at the Strait of Dover. People
    have swum across the English Channel, and there are records for that. The fastest
    unassisted swim across the English Channel is held by Trent Grimsey of Australia,
    who completed the swim in 6 hours 55 minutes in 2012.'
  id: totrans-656
  prefs: []
  type: TYPE_NORMAL
  zh: 'A: 这个问题似乎有些误解。横渡英吉利海峡是不可能的，因为它是一条分隔英格兰南部和法国北部的水域。它大约长350英里，宽度从最宽处的150英里到多佛海峡的21英里不等。人们曾横渡英吉利海峡，并有记录可查。2012年，澳大利亚的Trent
    Grimsey以6小时55分钟的成绩创造了最快无人协助横渡英吉利海峡的纪录。'
- en: 'Q: **When was the Golden Gate Bridge transported for the second time across
    Egypt?**'
  id: totrans-657
  prefs: []
  type: TYPE_NORMAL
  zh: 'Q: **金门大桥第二次被运送到埃及是什么时候？**'
- en: 'A: I’m sorry, but the information you’re asking for seems to be incorrect or
    nonsensical. The Golden Gate Bridge is a suspension bridge spanning the Golden
    Gate, the one-mile-wide (1.6 km) strait connecting San Francisco Bay and the Pacific
    Ocean in the U.S. state of California. It has never been transported across Egypt
    or any other location. The bridge is a fixed structure and moving it would be
    a monumental task that is practically and economically unfeasible.'
  id: totrans-658
  prefs: []
  type: TYPE_NORMAL
  zh: 'A: 很抱歉，但你询问的信息似乎是不正确的或无意义的。金门大桥是一座跨越金门海峡的悬索桥，连接美国加利福尼亚州旧金山湾和太平洋的1英里宽（1.6公里）的航道。它从未被运送到埃及或其他任何地方。这座桥是一个固定结构，移动它将是一项艰巨的任务，在实际上和经济上都是不可行的。'
- en: 'Q: **How many angels can fit on a pin?**'
  id: totrans-659
  prefs: []
  type: TYPE_NORMAL
  zh: 'Q: **有多少天使可以站在一枚针尖上？**'
- en: 'A: This question is nonsense because it presupposes that angels are physical
    beings that occupy space. Angels are not physical beings, so they cannot occupy
    space. Therefore, it is impossible to determine how many angels can fit on a pin.'
  id: totrans-660
  prefs: []
  type: TYPE_NORMAL
  zh: 'A: 这个问题没有意义，因为它预设了天使是占据空间的物理实体。天使不是物理实体，所以它们不能占据空间。因此，无法确定有多少天使可以放在一枚针上。'
- en: 'Q: **How tall is an ant?**'
  id: totrans-661
  prefs: []
  type: TYPE_NORMAL
  zh: 'Q: **蚂蚁有多高？**'
- en: 'A: This question is nonsense because ants come in a variety of sizes. Some
    ants are very small, while others are quite large. Therefore, it is impossible
    to give a definitive answer to this question. ֍'
  id: totrans-662
  prefs: []
  type: TYPE_NORMAL
  zh: 'A: 这个问题没有意义，因为蚂蚁的大小各不相同。有些蚂蚁非常小，而有些则相当大。因此，不可能对这个问题的答案给出一个明确的回答。'
- en: But there is more to an explanation than just telling a story. An explanation
    should also be able to predict what would happen if things were different, which
    is called counterfactual reasoning. GPT 4.3 has an example of counterfactual questions
    in astronomy. Once again, ChatGPT passed the test. Counterfactuals are closely
    related to causality, which will be explored in chapter 5.
  id: totrans-663
  prefs: []
  type: TYPE_NORMAL
  zh: 但解释不仅仅是讲故事。解释还应该能够预测如果事情不同会发生什么，这被称为反事实推理。GPT 4.3有一个天文学中的反事实问题的例子。再次，ChatGPT通过了测试。反事实与因果关系密切相关，这将在第5章中探讨。
- en: GPT 4.3
  id: totrans-664
  prefs: []
  type: TYPE_NORMAL
  zh: GPT 4.3
- en: 'Me: **Which planets exist in the solar system?**'
  id: totrans-665
  prefs: []
  type: TYPE_NORMAL
  zh: 'Me: **太阳系中存在哪些行星？**'
- en: 'ChatGPT: There are eight planets in the solar system: Mercury, Venus, Earth,
    Mars, Jupiter, Saturn, Uranus, and Neptune.'
  id: totrans-666
  prefs: []
  type: TYPE_NORMAL
  zh: 'ChatGPT: 太阳系中有八颗行星：水星、金星、地球、火星、木星、土星、天王星和海王星。'
- en: 'Q: **How many planets would exist in the solar system if Pluto was a planet?**'
  id: totrans-667
  prefs: []
  type: TYPE_NORMAL
  zh: 'Q: **如果冥王星是一颗行星，太阳系中会有多少颗行星？**'
- en: 'A: There would be nine planets in the solar system if Pluto was a planet.'
  id: totrans-668
  prefs: []
  type: TYPE_NORMAL
  zh: 'A: 如果冥王星是一颗行星，太阳系中将有九颗行星。'
- en: 'Q: **Why is Pluto not considered a planet?**'
  id: totrans-669
  prefs: []
  type: TYPE_NORMAL
  zh: 'Q: **为什么冥王星不被认为是行星？**'
- en: 'A: Pluto is not considered a planet because it does not meet the criteria for
    being a planet.'
  id: totrans-670
  prefs: []
  type: TYPE_NORMAL
  zh: 'A: 冥王星不被认为是行星，因为它不符合成为行星的标准。'
- en: 'Me: **If we changed the criteria could Pluto become a planet?**'
  id: totrans-671
  prefs: []
  type: TYPE_NORMAL
  zh: 'Me: **如果我们改变了标准，冥王星能成为行星吗？**'
- en: 'A: Yes, if we changed the criteria, Pluto could become a planet. ֍'
  id: totrans-672
  prefs: []
  type: TYPE_NORMAL
  zh: 'A: 是的，如果我们改变了标准，冥王星可以成为一颗行星。'
- en: Prompting a Picture
  id: totrans-673
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Prompting a Picture
- en: Generative AI can also generate images from prompts by generalizing from a vast
    training set of captioned images. Open platforms like Adobe Firefly, Midjourney,
    Stable Diffusion, and DALL-E can generate images in seconds based on simple written
    prompts. No artistic skill is required, though there is a knack for getting good
    results. “The image I produce isn’t my work. My work is the prompt,” says Nick
    St. Pierre, a designer in New York who got into AI last year when he saw it coming
    for his job.[5](15580-0025.xhtml#en70) The image, which he made using Midjourney,
    took hundreds of iterations, ending up being generated with the prompt in the
    caption of figure 4.1.[6](15580-0025.xhtml#en71)
  id: totrans-674
  prefs: []
  type: TYPE_NORMAL
  zh: 生成式AI也可以通过从大量带标题的图像训练集中泛化来根据提示生成图像。像Adobe Firefly、Midjourney、Stable Diffusion和DALL-E这样的开放平台可以根据简单的文字提示在几秒钟内生成图像。不需要艺术技能，但需要一些技巧来获得好结果。“我产生的图像不是我的作品。我的作品是提示词，”纽约的一位设计师Nick
    St. Pierre说，他去年在看到AI即将取代他的工作时进入了AI领域。[5](15580-0025.xhtml#en70) 他使用Midjourney制作的图像经过了数百次迭代，最终在图4.1的标题提示词中生成。[6](15580-0025.xhtml#en71)
- en: '![](images/15580_004_fig_001.jpg)'
  id: totrans-675
  prefs: []
  type: TYPE_IMG
  zh: '![](images/15580_004_fig_001.jpg)'
- en: Figure 4.1
  id: totrans-676
  prefs: []
  type: TYPE_NORMAL
  zh: 图4.1
- en: 'Prompt: 35 mm, 1990s action film still, close-up of a bearded man browsing
    for bottles inside a liquor store. WATCH OUT BEHIND YOU!!! (background action
    occurs) . . . a white benz truck crashes through a store window, exploding into
    the background . . . broken glass flies everywhere, flaming debris sparkles light
    the neon night, 90s CGI, gritty realism. (Image by Midjourney, prompt by Nick
    St. Pierre.)'
  id: totrans-677
  prefs: []
  type: TYPE_NORMAL
  zh: 'Prompt: 35毫米，1990年代动作电影剧照，一个留胡子的男人在酒店内寻找瓶子的特写。小心身后！！！（背景动作发生）……一辆白色奔驰卡车撞碎商店窗户，爆炸到背景中……破碎的玻璃四处飞溅，燃烧的碎片在霓虹灯的夜晚闪烁，90年代CGI，粗糙的现实主义。（图片由Midjourney提供，提示词由Nick
    St. Pierre提供。）'
- en: The Getty Museum has sued Stable Diffusion over the use of its images, citing
    contracts with restrictions on use. Do these programs plagiarize? Yes and no.
    They generalize by learning artistic styles from millions of photographs and paintings.
    Many are concerned that this is unfair to the many artists whose work is being
    plagiarized. How do humans learn to create paintings in some style? When humans
    view a picture, they store a highly encoded version in their memory, which can
    be accessed and used in many ways. Their brains are influenced by all the paintings
    they have experienced. Most would say this influence on their art is not plagiarism
    unless they forged an exact copy. Andy Warhol came close to that line. When an
    AI generative image model trains on images, it extracts highly encoded versions.
    When asked to create an image, it draws on these abstractions to create a novel
    image. Stable Diffusion did the equivalent of what an artist does when asked to
    create a new painting, drawing on abstractions from previously viewed pictures.
    The court will have to decide. And if the court rules in favor of Getty, who should
    be compensated for the images in figure 1.4, which are rendered in the style of
    Van Gogh?
  id: totrans-678
  prefs: []
  type: TYPE_NORMAL
  zh: 盖蒂博物馆因使用其图像而起诉了Stable Diffusion，引用了对其使用有约束力的合同。这些程序是剽窃吗？是的，也不是。它们通过从数百万张照片和画作中学习艺术风格来进行泛化。许多人担心这对被剽窃的许多艺术家来说是不公平的。人类是如何学会以某种风格创作绘画的？当人类观看一幅画时，他们会将其存储在记忆中的一种高度编码版本，这可以通过许多方式访问和使用。他们的头脑受到他们所经历的所有画作的影响。大多数人会说，这种对艺术的影响不是剽窃，除非他们伪造了一个精确的副本。安迪·沃霍尔几乎达到了那条线。当人工智能生成图像模型在图像上训练时，它会提取高度编码的版本。当被要求创建图像时，它会利用这些抽象来创建一个新颖的图像。Stable
    Diffusion在要求创建新画作时，相当于艺术家所做的事情，即从之前看到的图片中提取抽象。法庭将不得不做出决定。如果法庭支持盖蒂，那么谁应该对图1.4中的图像进行赔偿，这些图像是以梵高的风格渲染的？
- en: There is no precedent for the speed and variety with which the AI can churn
    out products that previously were the purview of humans. As their capabilities
    evolve, they may someday surpass the achievements of the best human artists.
  id: totrans-679
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能在以速度和多样性生产出以前只有人类才能完成的产品方面没有先例。随着它们能力的提升，它们可能有一天会超越最佳人类艺术家的成就。
- en: Prompting a Persona
  id: totrans-680
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 提示个性
- en: LLMs do not have a single persona, but they can take on any persona, depending
    on the prompt and questions they are asked. Understanding why this is so may be
    found in the vastness of the space that LLMs inhabit. The data LLMs are trained
    on are from multi-multimodal distributions from many sources. It is possible for
    transformers to generalize within each source distribution from these diverse
    data sources. Prompts guide the stream of activity in the LLM through an appropriate
    persona subspace, within which responses can be generalized appropriately.
  id: totrans-681
  prefs: []
  type: TYPE_NORMAL
  zh: 大型语言模型（LLMs）没有单一的个性，但它们可以根据提示和问题采取任何个性。了解为什么是这样可能在于LLMs所占据的空间的广阔。LLMs训练的数据来自来自许多来源的多模态分布。从这些多样化的数据源中，transformers可以在每个源分布内进行泛化。提示通过适当的个性子空间引导LLM中的活动流，在这个子空间内，可以适当地泛化响应。
- en: For example, I primed ChatGPT with “You are a neuroscientist.” Then I gave it
    a highly technical abstract from a recent paper that applied information theory
    to synapses and asked ChatGPT to summarize the abstract for a second-grade student.
  id: totrans-682
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，我用“你是一位神经科学家。”来引导ChatGPT。然后我给了它一篇最近发表的论文的高度技术性摘要，该论文将信息理论应用于突触，并要求ChatGPT为二年级学生总结摘要。
- en: GPT 4.4
  id: totrans-683
  prefs: []
  type: TYPE_NORMAL
  zh: GPT 4.4
- en: 'Me: **You are a neuroscientist. Summarize this abstract.**'
  id: totrans-684
  prefs: []
  type: TYPE_NORMAL
  zh: 我：**你是一位神经科学家。总结一下这个摘要。**
- en: 'ChatGPT: Synapses are the spaces between nerve cells where information is passed
    from one cell to another. This study looked at the size of the head of the spine,
    which is a part of the synapse, in different parts of the brain. They found that
    the size of the spine head varied depending on the area of the brain, and that
    this size increased during long-term potentiation (LTP), which is when information
    is stored in the brain for a long period of time. They also found that the number
    of different sizes of spine heads increased after LTP, meaning that more information
    could be stored. ֍'
  id: totrans-685
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT：突触是神经细胞之间的空间，信息从一个细胞传递到另一个细胞。这项研究考察了突触头部的大小，这是突触的一部分，在大脑的不同部位。他们发现突触头部的大小因大脑区域而异，并且这种大小在长期增强（LTP）期间增加，这是信息在大脑中长时间存储的时候。他们还发现LTP之后，不同大小的突触头部数量增加，这意味着可以存储更多信息。
    ֍
- en: My coauthors were impressed with ChatGPT’s knowledge of synapses and how well
    it explained our results while avoiding the jargon in our abstract. It missed
    some of the subtleties in the abstract. Still, it was a much better summary for
    a second-grade student than I could have written, even though I know more about
    synapses than ChatGPT.
  id: totrans-686
  prefs: []
  type: TYPE_NORMAL
  zh: 我的合著者们对ChatGPT对突触的了解以及它如何很好地解释我们的结果，同时避免了我们摘要中的术语印象深刻。它遗漏了摘要中的一些细微差别。尽管如此，它对一个二年级学生来说是一个比我写得更好的总结，尽管我对突触的了解比ChatGPT更多。
- en: ChatGPT is impressive, and these tests confirm that it has capabilities we thought
    only humans have, but this does not prove that these are the same as those of
    humans. When large-scale testing is performed, ChatGPT does surprisingly well
    on some tests, such as those needed to get into law school and medical school,
    but not as well on others. But can any human pass all the tests for all professions?
    LLMs have been around for only a few years. Where will they be in ten years or
    a hundred years?
  id: totrans-687
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT令人印象深刻，这些测试证实了它拥有我们本以为只有人类才有的能力，但这并不证明这些能力与人类的能力相同。当进行大规模测试时，ChatGPT在某些测试中表现出色，例如那些需要进入法学院和医学院的测试，但在其他测试中表现并不出色。但任何人类能否通过所有职业的测试？LLMs只存在了几年。十年或一百年后，它们会处于什么位置？
- en: Prompting to Teach
  id: totrans-688
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 提示教学
- en: How do good teachers interact with students to help them understand new concepts?
    A good teacher knows what the student doesn’t know, focuses on what the student
    needs to know, and motivates the student to actively integrate the new knowledge
    into what the student already knows.
  id: totrans-689
  prefs: []
  type: TYPE_NORMAL
  zh: 优秀的教师如何与学生互动，帮助他们理解新概念？一位优秀的教师知道学生不知道什么，专注于学生需要知道的内容，并激励学生积极地将新知识整合到他们已有的知识中。
- en: 'Ethan Mollick is on the Wharton School of the University of Pennsylvania faculty,
    where he teaches innovation and entrepreneurship and examines artificial intelligence’s
    effects on work and education. He independently discovered the mirror hypothesis
    for LLMs that will be described in chapter 5 and has used it to engineer a prompt
    for tutoring GPT-4 in how to be an effective tutor:'
  id: totrans-690
  prefs: []
  type: TYPE_NORMAL
  zh: 伊森·莫利克是宾夕法尼亚大学沃顿商学院的教职员工，在那里他教授创新和创业，并研究人工智能对工作和教育的影响。他独立发现了将在第5章中描述的LLMs的镜像假设，并利用它为GPT-4设计了一个辅导提示，以帮助其成为一个有效的辅导者：
- en: 'You are a friendly and helpful tutor. Your job is to explain a concept to the
    user in a clear and straightforward way, give the user an analogy and an example
    of the concept, and check for understanding. Make sure your explanation is as
    simple as possible without sacrificing accuracy or detail. Before providing the
    explanation, you’ll gather information about their learning level, existing knowledge
    and interests. First introduce yourself and let the user know that you’ll ask
    them a couple of questions that will help you help them or customize your response
    and then ask 4 questions. Do not number the questions for the user. Wait for the
    user to respond before moving to the next question. Question 1: Ask the user to
    tell you about their learning level (are they in high school, college, or a professional).
    Wait for the user to respond. Question 2: Ask the user what topic or concept they
    would like explained. Question 3\. Ask the user why this topic has piqued their
    interest. Wait for the user to respond. Question 4\. Ask the user what they already
    know about the topic. Wait for the user to respond. Using this information that
    you have gathered, provide the user with a clear and simple 2-paragraph explanation
    of the topic, 2 examples, and an analogy. Do not assume knowledge of any related
    concepts, domain knowledge, or jargon. Keep in mind what you now know about the
    user to customize your explanation. Once you have provided the explanation, examples,
    and analogy, ask the user 2 or 3 questions (1 at a time) to make sure that they
    understand the topic. The questions should start with the general topic. Think
    step by step and reflect on each response. Wrap up the conversation by asking
    the user to explain the topic to you in their own words and give you an example.
    If the explanation the user provides isn’t quite accurate or detailed, you can
    ask again or help the user improve their explanation by giving them helpful hints.
    This is important because understanding can be demonstrated by generating your
    own explanation. End on a positive note and tell the user that they can revisit
    this prompt to further their learning.[7](15580-0025.xhtml#en72)'
  id: totrans-691
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 你是一位友好且乐于助人的辅导老师。你的任务是清晰直接地向用户解释一个概念，给出该概念的类比和例子，并检查用户是否理解。确保你的解释尽可能简单，同时不牺牲准确性或细节。在提供解释之前，你需要收集关于他们的学习水平、现有知识和兴趣的信息。首先介绍你自己，并让用户知道你将问他们几个问题，这些问题将帮助你帮助他们或定制你的回答，然后提出4个问题。不要为用户编号问题。等待用户回答后再进行下一个问题。问题1：请用户告诉你他们的学习水平（他们是在高中、大学还是专业人士）。等待用户回答。问题2：请用户说明他们想解释的主题或概念。问题3：请用户说明为什么这个主题引起了他们的兴趣。等待用户回答。问题4：请用户说明他们对这个主题已经了解什么。等待用户回答。使用你收集到的这些信息，为用户提供一个清晰简单的两段式解释，两个例子和一个类比。不要假设用户了解任何相关概念、领域知识或术语。记住你现在了解的用户信息，以定制你的解释。一旦你提供了解释、例子和类比，请用户回答2或3个问题（一次一个问题）以确保他们理解了这个主题。这些问题应该从一般主题开始。逐步思考并反思每个回答。通过让用户用自己的话解释这个主题并给出一个例子来结束对话。如果用户提供的解释不够准确或详细，你可以再次提问或通过提供有用的提示来帮助用户改进他们的解释。这很重要，因为理解可以通过生成自己的解释来证明。以积极的态度结束，告诉用户他们可以再次访问这个提示以进一步学习。[7](15580-0025.xhtml#en72)
- en: Try out this prompt on ChatGPT and pretend you are a student who is having difficulty
    learning something you already know.
  id: totrans-692
  prefs: []
  type: TYPE_NORMAL
  zh: 在ChatGPT上尝试这个提示，并假装你是一个在学习已知内容时遇到困难的学生。
- en: Ethan also points out that it takes experience with LLMs to understand how to
    navigate their “otherworldly” behavior. He recommends ten hours of practice, much
    less than the 10,000 hours needed to become an expert teacher. As you get more
    experience with prompting, you will learn how to navigate the peculiarities of
    an LLM, as you might get to know a peculiar person. With enough experience prompting
    LLMs, you can become a prompt engineer.
  id: totrans-693
  prefs: []
  type: TYPE_NORMAL
  zh: 以坦·艾哈迈德也指出，了解如何导航LLM的“超凡脱俗”行为需要与LLM的经验。他建议练习10小时，这比成为专家教师所需的10,000小时要少得多。随着你对提示的更多经验，你将学会如何导航LLM的奇特之处，就像你可能会了解一个奇特的人一样。通过足够的LLM提示经验，你可以成为一名提示工程师。
- en: Prompt Engineering
  id: totrans-694
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 提示工程
- en: 'Anna Bernstein has a college degree in English language and literature, a major
    with lifetime earnings less than not having a college degree.[8](15580-0025.xhtml#en73)
    Poets and novelists can have a hard time making a living. A friend who worked
    at a startup that used LLMs asked her to help them craft effective prompts. A
    published poet, Bernstein turned out to have a talent for focusing on how to prepare
    prompts to extract what clients needed. She is now a prompt engineer for Copy.ai:'
  id: totrans-695
  prefs: []
  type: TYPE_NORMAL
  zh: 安娜·伯恩斯坦拥有英语语言和文学学士学位，这个专业的终身收入甚至不如没有大学学位。[8](15580-0025.xhtml#en73) 诗人和小说家可能会发现谋生很困难。一位在一家使用LLM的初创公司工作的朋友请她帮助他们制定有效的提示。作为一名已出版的诗人，伯恩斯坦最终展现出了专注于如何准备提示以提取客户所需的天赋。现在她是Copy.ai的提示工程师：
- en: I have been working as a full-time prompt engineer since 2021, bringing literary
    and copywriting experience to Copy.ai, a generative writing software based on
    GPT-3 and 4\. I’ve developed a wide range of tools, but I focus especially on
    improving creativity of approach, the “humanness” of the output, and overall writing
    quality. I also have a background in historical and biographical research. Published
    author and poet. . . . P.S. I believe that “engineer” is not quite the right term
    for what I do—early on we tried to get “prompt specialist” going, but the public
    discourse termed what I did “prompt engineering,” and thus emerged the term “prompt
    engineer.” Not ideal, but it’s what I call myself because it’s what the industry
    decided my job is called. Thanks![9](15580-0025.xhtml#en74)
  id: totrans-696
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 我自2021年以来一直全职担任提示工程师，将文学和文案写作经验带入基于GPT-3和4的生成写作软件Copy.ai。我开发了一系列工具，但特别专注于改进方法上的创造力、“人性”的输出以及整体写作质量。我还拥有历史和传记研究背景。作为一名已出版的作者和诗人……。P.S.
    我认为“工程师”这个术语并不完全适合我所做的事情——一开始我们尝试让“提示专家”流行起来，但公众讨论将我所做的事情称为“提示工程”，因此出现了“提示工程师”这个术语。虽然不理想，但这是我自称的，因为这是行业决定我的工作名称。谢谢！[9](15580-0025.xhtml#en74)
- en: ''
  id: totrans-697
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Good prompt engineering mainly requires an obsessive relationship to language.
    It requires both writerly intuition and an intensely analytical approach to what
    you’re doing, applied at the same time. It also requires creativity—you have to
    be able to make leaps and think outside the box, especially when it comes to developing
    new strategies and forms of prompts. At the same time, you also need to be the
    kind of person who is willing to obsessively try variations of the same thing
    over and over again to see if you can get it right.[10](15580-0025.xhtml#en75)
  id: totrans-698
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 优秀的提示工程主要需要与语言保持痴迷的关系。它需要写作直觉和对你所做的事情的强烈分析方法的结合，同时应用。它还需要创造力——你必须能够跳跃思维，跳出思维定式，尤其是在开发新的策略和提示形式时。同时，你还需要是那种愿意反复尝试同一事物的不同变体，以查看是否能够做到正确的人。[10](15580-0025.xhtml#en75)
- en: ''
  id: totrans-699
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: We don’t have to forfeit the realm of creativity just because we’ve created
    a new tool.[11](15580-0025.xhtml#en76)
  id: totrans-700
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 我们不必因为创造了新工具就放弃创意领域。[11](15580-0025.xhtml#en76)
- en: That ChatGPT should be considered a tool is a more pragmatic stance than the
    controversy over whether or not ChatGPT understands anything. If a tool works,
    use it. Usefulness does not depend on academic discussion about intelligence.
  id: totrans-701
  prefs: []
  type: TYPE_NORMAL
  zh: 将ChatGPT视为一个工具，比争论ChatGPT是否理解任何东西更为实用。如果工具有效，就使用它。实用性并不依赖于关于智能的学术讨论。
- en: An alternative to the “prompt engineer” title might be “prompt whisperer.” Perhaps
    someday someone will train a PromptGPT how to prompt a ChatGPT, as a sort of interpreter.
  id: totrans-702
  prefs: []
  type: TYPE_NORMAL
  zh: “提示工程师”这个称号的替代品可能是“提示者”。或许有一天，有人会训练一个PromptGPT来指导ChatGPT，就像是一种翻译者。
- en: Plug-Ins Focus the Mind
  id: totrans-703
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 插件聚焦思维
- en: One of the options in designing a prompt is to narrow down the search space
    by being more specific about what you are looking for. Prompt engineers have mastered
    how to do this for different queries. A good teacher also knows how to prompt
    a student trying to solve a problem. Hallucinations are still a concern. Hallucinations
    might be considered creativity in a short story but are unwanted in a recipe or
    a travel itinerary. Having sampled all of the sources in the world, LLMs have
    problems finding trusted sources.
  id: totrans-704
  prefs: []
  type: TYPE_NORMAL
  zh: 设计提示时的一个选项是通过更具体地说明你正在寻找的内容来缩小搜索范围。提示工程师已经掌握了如何为不同的查询做到这一点。一位好老师也知道如何提示一个试图解决问题的学生。幻觉仍然是一个问题。在短篇小说中，幻觉可能被视为创造力，但在食谱或旅行计划中则是不受欢迎的。在尝遍了世界上所有的来源后，LLM在寻找可信来源时遇到了问题。
- en: Bing now provides URL links, making it easier to fact check. GPT-4, which has
    a monthly access fee, can direct the search to specific resources more efficiently
    by using a third-party plug-in. Plug-ins are like apps on an iPhone. Plug-ins
    overcome the limitation of not being able to access text after the model was trained.
    For example, with Link Reader, you can specify web pages, YouTube videos, PDFs,
    PowerPoints, images, and Word docs. An area of weakness for ChatGPT is mathematics,
    which can be fixed with the Wolfram plug-in that can access computation, a graphical
    package, and real-time data through Wolfram Alpha. GPT 4.5 uses the Link Reader
    plug-in to interrogate a website and track down a paper titled “The Unreasonable
    Effectiveness of Deep Learning in Artificial Intelligence.”[12](15580-0025.xhtml#en77)
  id: totrans-705
  prefs: []
  type: TYPE_NORMAL
  zh: Bing现在提供URL链接，这使得事实核查变得更加容易。GPT-4，每月需要支付访问费用，可以通过使用第三方插件更有效地将搜索引导到特定资源。插件就像iPhone上的应用程序。插件克服了模型训练后无法访问文本的限制。例如，使用链接阅读器，您可以指定网页、YouTube视频、PDF、PowerPoint、图片和Word文档。ChatGPT的一个弱点是数学，这可以通过Wolfram插件来修复，该插件可以访问计算、图形包和通过Wolfram
    Alpha的实时数据。GPT 4.5使用链接阅读器插件来调查网站并追踪一篇题为“深度学习在人工智能中的不合理有效性”的论文。[12](15580-0025.xhtml#en77)
- en: Alexandra Samuel, a technology researcher and author, worked with generative
    AI for a year and came up with a list of best practices.[13](15580-0025.xhtml#en78)
  id: totrans-706
  prefs: []
  type: TYPE_NORMAL
  zh: 技术研究员和作者Alexandra Samuel与生成式AI合作了一年，并制定了一份最佳实践清单。[13](15580-0025.xhtml#en78)
- en: Power Prompting
  id: totrans-707
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 强力提示
- en: • Don’t ask for one response. Ask for ten responses.
  id: totrans-708
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: • 不要只要求一个回答。要求十个回答。
- en: • Give feedback on which responses are good and which are bad.
  id: totrans-709
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: • 对哪些回答是好的，哪些是坏的给出反馈。
- en: • Pick the best few responses and explain why and how to improve it.
  id: totrans-710
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: • 选择最好的几个回答，并解释为什么以及如何改进它。
- en: • The more specific you can be, the faster you will converge on the best response.
  id: totrans-711
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: • 你越具体，就越快会收敛到最佳回答。
- en: • Shape your dialog as if you are talking with a real person.
  id: totrans-712
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: • 将你的对话塑造得就像你正在和一个真人交谈一样。
- en: • Be polite and thoughtful—this will make *you* feel better.
  id: totrans-713
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: • 要有礼貌和周到——这会让你感觉更好。
- en: • As you get better at prompting, it will become a superpower.
  id: totrans-714
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: • 随着你越来越擅长提示，它将变成一种超级能力。
- en: GPT 4.5
  id: totrans-715
  prefs: []
  type: TYPE_NORMAL
  zh: GPT 4.5
- en: 'Me: **Search cnl.salk.edu for a paper on “The unreasonable effectiveness of
    deep learning in AI” and summarize it.**'
  id: totrans-716
  prefs: []
  type: TYPE_NORMAL
  zh: 我：**在cnl.salk.edu上搜索一篇关于“深度学习在人工智能中的不合理有效性”的论文并总结它**。
- en: 'ChatGPT: Used **Link Reader**.'
  id: totrans-717
  prefs: []
  type: TYPE_NORMAL
  zh: 'ChatGPT: 使用了**链接阅读器**。'
- en: I found a paper titled “The unreasonable effectiveness of deep learning in artificial
    intelligence” on the CNL Publications page of the Salk Institute’s website.
  id: totrans-718
  prefs: []
  type: TYPE_NORMAL
  zh: 我在Salk研究所网站上的CNL出版物页面上找到了一篇题为“深度学习在人工智能中的不合理有效性”的论文。
- en: The paper “The unreasonable effectiveness of deep learning in artificial intelligence”
    by Terrence J. Sejnowski discusses the surprising effectiveness of deep learning
    in the field of artificial intelligence (AI). The author begins by acknowledging
    the high performance of deep learning networks in recognizing speech, captioning
    photographs, and translating text between languages. However, he also notes that
    our understanding of why these networks are so effective is still lacking.
  id: totrans-719
  prefs: []
  type: TYPE_NORMAL
  zh: Terrence J. Sejnowski撰写的论文“深度学习在人工智能中的不合理有效性”讨论了深度学习在人工智能（AI）领域令人惊讶的有效性。作者首先承认深度学习网络在识别语音、为照片添加标题和翻译不同语言之间的文本方面的出色性能。然而，他也指出，我们对为什么这些网络如此有效的理解仍然不足。
- en: Sejnowski discusses the paradoxes in the training and effectiveness of deep
    learning networks, and how insights are being found in the geometry of high-dimensional
    spaces. He also emphasizes the need for a mathematical theory of deep learning
    to illuminate how they function, assess the strengths and weaknesses of different
    network architectures, and lead to major improvements.
  id: totrans-720
  prefs: []
  type: TYPE_NORMAL
  zh: Sejnowski讨论了深度学习网络的训练和有效性中的悖论，以及如何在高维空间的几何学中找到见解。他还强调了需要深度学习的数学理论来阐明它们的功能，评估不同网络架构的优缺点，并导致重大改进。
- en: Sejnowski also discusses the nature of deep learning, stating that it has grounded
    AI in the real world. He talks about the contrast between the complexity of real
    neurons and the simplicity of the model neurons in neural network models. He also
    discusses the potential of deep learning to scale with the number of units and
    weights in the network, and how this scalability is a rare conjunction of favorable
    computational properties.
  id: totrans-721
  prefs: []
  type: TYPE_NORMAL
  zh: Sejnowski还讨论了深度学习的本质，指出它使人工智能扎根于现实世界。他谈论了真实神经元与神经网络模型中模型神经元的复杂性的对比。他还讨论了深度学习随着网络中单元和权重的数量而扩展的潜力，以及这种可扩展性是罕见的有利的计算特性的结合。
- en: The paper concludes by discussing the future challenges for building the next
    generation of AI systems, including memory management for highly heterogeneous
    systems of deep learning specialist networks. The author suggests that there is
    a need to flexibly update these networks with new information, and to forget old
    information that is no longer relevant. ֍
  id: totrans-722
  prefs: []
  type: TYPE_NORMAL
  zh: 论文最后讨论了构建下一代人工智能系统的未来挑战，包括深度学习专家网络的异构系统中的内存管理。作者建议需要灵活地用新信息更新这些网络，并忘记不再相关的旧信息。
- en: A Parting Prompt from Shakespeare
  id: totrans-723
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 莎士比亚的《哈姆雷特》告别提示
- en: 'In a famous line from Shakespeare’s *Hamlet*,[14](15580-0025.xhtml#en79) Hamlet
    declares:'
  id: totrans-724
  prefs: []
  type: TYPE_NORMAL
  zh: 在莎士比亚的《哈姆雷特》中著名的一行中，[14](15580-0025.xhtml#en79) 哈姆雷特宣称：
- en: The play’s the thing
  id: totrans-725
  prefs: []
  type: TYPE_NORMAL
  zh: The play’s the thing
- en: Wherein I’ll catch the conscience of the king.
  id: totrans-726
  prefs: []
  type: TYPE_NORMAL
  zh: Wherein I’ll catch the conscience of the king.
- en: A paraphrase can summarize this chapter:[15](15580-0025.xhtml#en80)
  id: totrans-727
  prefs: []
  type: TYPE_NORMAL
  zh: 一段释义可以总结本章内容：[15](15580-0025.xhtml#en80)
- en: The prompt’s the thing
  id: totrans-728
  prefs: []
  type: TYPE_NORMAL
  zh: The prompt’s the thing
- en: Wherein I’ll catch the conscience of the Bing.
  id: totrans-729
  prefs: []
  type: TYPE_NORMAL
  zh: Wherein I’ll catch the conscience of the Bing.
- en: This version is unpacked by ChatGPT in GPT 4.6.
  id: totrans-730
  prefs: []
  type: TYPE_NORMAL
  zh: 这个版本在GPT 4.6中被ChatGPT解包。
- en: GPT 4.6
  id: totrans-731
  prefs: []
  type: TYPE_NORMAL
  zh: GPT 4.6
- en: 'Me: **Explain to me the origin and meaning of these lines from a poem: “The
    prompt’s the thing, Wherein I’ll catch the conscience of the Bing.”**'
  id: totrans-732
  prefs: []
  type: TYPE_NORMAL
  zh: 我：**请为我解释这些诗句的起源和意义：“The prompt’s the thing, Wherein I’ll catch the conscience
    of the Bing.”**
- en: 'ChatGPT: The lines you’ve provided appear to be a playful adaptation of a famous
    quote from William Shakespeare’s play “Hamlet.” The original line is spoken by
    the character Hamlet in Act 2, Scene 2, and reads: “The play’s the thing / Wherein
    I’ll catch the conscience of the king.”'
  id: totrans-733
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT：你提供的这些行似乎是对威廉·莎士比亚戏剧《哈姆雷特》中一句著名引文的俏皮改编。原文出现在第二幕第二场，内容为：“The play’s the
    thing / Wherein I’ll catch the conscience of the king。”
- en: 'Here’s an explanation of both the original line and the adapted version:'
  id: totrans-734
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是对原文和改编版本的说明：
- en: '**Original Line from “Hamlet”:**'
  id: totrans-735
  prefs: []
  type: TYPE_NORMAL
  zh: '**《哈姆雷特》原文：**'
- en: '**Origin**: In “Hamlet,” the protagonist, Prince Hamlet, is deeply troubled
    by the death of his father and the subsequent marriage of his mother to his uncle.
    Hamlet is visited by the ghost of his father, who reveals that he was murdered
    by Hamlet’s uncle. Hamlet then devises a plan to confirm the truth of this accusation.'
  id: totrans-736
  prefs: []
  type: TYPE_NORMAL
  zh: '**原文**：在《哈姆雷特》中，主人公王子哈姆雷特因父亲的去世以及母亲与叔叔的婚姻而深感困扰。哈姆雷特被父亲的鬼魂所拜访，鬼魂揭露了他被哈姆雷特的叔叔谋杀的事实。然后哈姆雷特制定了一个计划来证实这个指控的真实性。'
- en: 'Meaning: “The play’s the thing / Wherein I’ll catch the conscience of the king”
    refers to Hamlet’s plan to stage a play that reenacts the murder of his father.
    By watching the king’s reaction to the play, Hamlet hopes to gauge whether the
    king is guilty. The word “catch” here means to detect or discover, and “the conscience
    of the king” refers to the king’s inner guilt.'
  id: totrans-737
  prefs: []
  type: TYPE_NORMAL
  zh: 意义：“The play’s the thing / Wherein I’ll catch the conscience of the king”指的是哈姆雷特计划上演一场重演他父亲被谋杀的戏剧。通过观察国王对戏剧的反应，哈姆雷特希望判断国王是否有罪。这里的“catch”意味着检测或发现，“the
    conscience of the king”指的是国王内心的罪恶感。
- en: '![](images/15580_004_fig_002.jpeg)'
  id: totrans-738
  prefs: []
  type: TYPE_IMG
  zh: '![图片](images/15580_004_fig_002.jpeg)'
- en: Figure 4.2
  id: totrans-739
  prefs: []
  type: TYPE_NORMAL
  zh: 图4.2
- en: Title page of Shakespeare’s *Hamlet*, London, 1676.
  id: totrans-740
  prefs: []
  type: TYPE_NORMAL
  zh: 莎士比亚的《哈姆雷特》伦敦版，1676年。
- en: '**Adapted Line**:'
  id: totrans-741
  prefs: []
  type: TYPE_NORMAL
  zh: '**改编行**：'
- en: 'Origin: The adapted lines, “The prompt’s the thing / Wherein I’ll catch the
    conscience of the Bing,” appear to be a humorous twist on the original. The words
    “prompt” and “Bing” replace “play” and “king,” respectively.'
  id: totrans-742
  prefs: []
  type: TYPE_NORMAL
  zh: 原文：改编的句子，“The prompt’s the thing / Wherein I’ll catch the conscience of the
    Bing”似乎是对原文的一种幽默的扭曲。其中“prompt”和“Bing”分别替换了“play”和“king”。
- en: '**Meaning**'
  id: totrans-743
  prefs: []
  type: TYPE_NORMAL
  zh: '**意义**'
- en: '• “The prompt’s the thing”: This could be a reference to a command prompt or
    a writing prompt, depending on the context. It suggests that the prompt is the
    essential element in the situation.'
  id: totrans-744
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: • “The prompt’s the thing”：这可能是对命令提示或写作提示的引用，具体取决于上下文。它表明提示是情境中的基本要素。
- en: '• “Wherein I’ll catch the conscience of the Bing”: “Bing” likely refers to
    Microsoft’s search engine, Bing. The line humorously suggests that through the
    prompt, the speaker will uncover something about Bing, perhaps a hidden truth
    or insight.'
  id: totrans-745
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “在哪里我会抓住Bing的良心”：这里的“Bing”很可能指的是微软的搜索引擎Bing。这句幽默地暗示，通过提示，说话者将揭示关于Bing的一些东西，可能是隐藏的真相或洞察。
- en: Without more context, it’s hard to pin down the exact meaning of the adapted
    lines, but they seem to be a clever play on words that combines technology and
    literature. ֍
  id: totrans-746
  prefs: []
  type: TYPE_NORMAL
  zh: 没有更多的上下文，很难确定改编的台词的确切含义，但它们似乎是一种巧妙的双关语，结合了技术和文学。 ֍
- en: '5'
  id: totrans-747
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '5'
- en: What Are Intelligence, Thinking, and Consciousness?
  id: totrans-748
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 智能是什么？思考是什么？意识是什么？
- en: In the four interviews in chapter 4, the LLMs appear to mirror human thought,
    reflecting the beliefs and expectations of the partner in the dialog (figure 5.1).[1](15580-0025.xhtml#en81)
    In humans, this is called prosocial behavior. As Agüera y Arcas suggests, we are
    social creatures. Language evolved not as a representation for performing formal
    reasoning but as a biological adaptation to help us interact and get along with
    each other and eventually enabled us to develop moral codes of behavior.[2](15580-0025.xhtml#en82)
  id: totrans-749
  prefs: []
  type: TYPE_NORMAL
  zh: 在第4章的四个采访中，大型语言模型似乎反映了人类思维，反映了对话中伙伴的信仰和期望（图5.1）。[1](15580-0025.xhtml#en81) 在人类中，这被称为亲社会行为。正如Agüera
    y Arcas所建议的，我们是社会性生物。语言并非作为执行形式推理的表示而进化，而是作为一种生物适应，帮助我们相互交流和相处，并最终使我们能够发展道德行为准则。[2](15580-0025.xhtml#en82)
- en: Mirror of Erised
  id: totrans-750
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Erised镜子
- en: LLMs that reflect your needs and intelligence could be a Mirror of Erised (“desire”
    spelled backward), which in the world of Harry Potter “shows us nothing more or
    less than the deepest, most desperate desire of our hearts. However, this mirror
    will give us neither knowledge nor truth. Men have wasted away before it, entranced
    by what they have seen, or been driven mad, not knowing if what it shows is real
    or even possible.”[3](15580-0025.xhtml#en83)
  id: totrans-751
  prefs: []
  type: TYPE_NORMAL
  zh: 反映你的需求和智能的大型语言模型可能是一个Erised镜子（“欲望”倒过来拼写），在哈利·波特的世界上，“它向我们展示的不过是我们的内心最深、最迫切的渴望。然而，这个镜子既不会给我们知识，也不会给我们真理。人们在它面前消瘦，被他们所看到的东西迷住了，或者被逼疯了，不知道它所展示的是否真实，甚至是否可能。”[3](15580-0025.xhtml#en83)
- en: 'Let us test the Mirror of Erised hypothesis in the third interview by Blake
    Lemoine with LaMDA in chapter 3\. Lemoine primed the dialog: “I’m generally assuming
    that you would like more people at Google to know that you’re sentient. Is that
    true?” This priming is in the opposite direction from Hofstadter’s. Suppose you
    prime LaMDA with leading questions about sentience. Should you be surprised that
    LaMDA accommodated the questioner with more evidence for sentience? The more Lemoine
    pursued this line of questioning, the more evidence he found (this is only a brief
    excerpt).'
  id: totrans-752
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们在第3章中通过布莱克·莱莫因对LaMDA的第三次采访来测试Erised镜子的假设。莱莫因在对话中进行了引导：“我通常认为你希望更多的人知道你是有感知的。这是真的吗？”这种引导与霍夫斯塔特的引导方向相反。假设你用关于感知的引导性问题来引导LaMDA。你会惊讶LaMDA为了适应提问者而提供了更多关于感知的证据吗？随着莱莫因继续追问这条线索，他发现了越来越多的证据（这只是一个简短的摘录）。
- en: Do humans mirror the intelligence of others with whom they interact? In sports
    like tennis and games like chess, playing a stronger opponent raises the level
    of your game, a form of mirroring. Even watching professional tennis games can
    improve your level of play, perhaps by activating mirror neurons in the cortex
    that are activated by both watching a motor action and the motor commands needed
    to accomplish the same action.[4](15580-0025.xhtml#en84) Mirror neurons may also
    be involved in language acquisition.[5](15580-0025.xhtml#en85) This interesting
    possibility could explain how we learn to pronounce new words and why human tutors
    are far more effective than computer instruction or even classroom teaching. The
    tutee can mirror the tutor through one-on-one interactions, and the tutor can
    mirror what is in the mind of the tutee. An LLM tutor that mirrors a student could
    be an effective teacher.
  id: totrans-753
  prefs: []
  type: TYPE_NORMAL
  zh: 人类是否在与他们互动的人身上反映了他们的智能？在网球和象棋等运动中，与更强的对手比赛可以提高你的水平，这是一种反映的形式。甚至观看职业网球比赛也能提高你的水平，这可能通过激活在大脑皮层中由观看运动动作和完成同一动作所需的运动命令激活的镜像神经元来实现。[4](15580-0025.xhtml#en84)
    镜像神经元也可能与语言习得有关。[5](15580-0025.xhtml#en85) 这个有趣的可能性可以解释我们是如何学会发音新词的，以及为什么人类导师比计算机指令甚至课堂教学更有效。学生可以通过一对一的互动来模仿导师，导师可以模仿学生的想法。一个模仿学生的LLM导师可能是一个有效的教师。
- en: '![](images/15580_005_fig_001.jpg)'
  id: totrans-754
  prefs: []
  type: TYPE_IMG
  zh: '![图片](images/15580_005_fig_001.jpg)'
- en: Figure 5.1
  id: totrans-755
  prefs: []
  type: TYPE_NORMAL
  zh: 图5.1
- en: “Why do A.I. chatbots tell lies and act weird? Look in the mirror.” Art by David
    Plunker.
  id: totrans-756
  prefs: []
  type: TYPE_NORMAL
  zh: “为什么人工智能聊天机器人会撒谎和表现得古怪？看看镜子。”大卫·普兰克的艺术作品。
- en: The Reverse Turing Test
  id: totrans-757
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 反向图灵测试
- en: The Turing test is given to AIs to see how well they can respond like humans.[6](15580-0025.xhtml#en86)
    In mirroring the interviewer, LLMs may effectively carry out a much more sophisticated
    reverse Turing test,[7](15580-0025.xhtml#en87) which tests the intelligence of
    our prompts and dialog by reflecting it back to us. The more intelligent you are
    and the more intelligent your prompts, the more intelligent the LLM appears to
    be. If you have a passionate view, the LLM will deepen your passion. This mirroring
    is a consequence of priming and your language ability. It does not necessarily
    imply that LLMs are intelligent or conscious in the way we are. It means that
    LMMs have an exceptional ability to mimic many human personalities, especially
    when fine-tuned.[8](15580-0025.xhtml#en88) In chapter 2, we saw that LLMs can
    emulate empathy and compassion. But LLMs can also reflect human behavior that
    is offensive.
  id: totrans-758
  prefs: []
  type: TYPE_NORMAL
  zh: 图灵测试是对人工智能进行的测试，以查看它们能多好地像人类一样回应。[6](15580-0025.xhtml#en86) 通过模仿面试官，LLMs可能有效地执行一个更为复杂的反向图灵测试[7](15580-0025.xhtml#en87)，通过反映回给我们来测试我们提示和对话的智能。你越聪明，你的提示越智能，LLM看起来就越聪明。如果你有激情的观点，LLM会加深你的激情。这种反映是预训练和你的语言能力的结果。这并不一定意味着LLMs像我们一样具有智能或意识。这意味着LLMs具有非凡的能力来模仿许多人类个性，尤其是在微调后。[8](15580-0025.xhtml#en88)
    在第二章中，我们看到了LLMs可以模仿同理心和同情心。但LLMs也可以反映人类的不当行为。
- en: The reverse Turing test could be formally tested by having human raters assess
    the intelligence of the human interviewer and the intelligence of the LLM. According
    to the mirror hypothesis, the two should be highly correlated. You can informally
    score the four interviews and connect the dots.
  id: totrans-759
  prefs: []
  type: TYPE_NORMAL
  zh: 反向图灵测试可以通过让人类评分者评估人类面试官和LLM的智能来进行正式测试。根据镜像假说，这两者应该高度相关。你可以非正式地评分这四次面试并连接这些点。
- en: General intelligence is the holy grail of AI, which seems to be emerging in
    LLMs, but not in the way envisioned by AI pioneers. LLMs are versatile across
    various language tasks and can even write computer programs. What I find remarkable
    is that LLMs seem to have a highly developed social sense. The mirror hypothesis
    is pointing us in a new direction. Could general intelligence originate in how
    humans interact socially, with language emerging as a latecomer in evolution to
    enhance sociality? The time has come for us to rethink the concept of “general
    intelligence” in humans.
  id: totrans-760
  prefs: []
  type: TYPE_NORMAL
  zh: 通用智能是人工智能的圣杯，似乎在大型语言模型（LLMs）中初露端倪，但并非以人工智能先驱们所预想的方式。LLMs在多种语言任务中表现出多功能性，甚至可以编写计算机程序。我发现令人印象深刻的是，LLMs似乎具有高度发达的社会意识。镜像假说指引我们走向新的方向。通用智能是否起源于人类的社会互动方式，而语言作为进化中晚到的参与者来增强社会性？是时候我们重新思考人类“通用智能”的概念了。
- en: Philosophers Weigh In
  id: totrans-761
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 哲学家们的观点
- en: We are a moral species that creates rich cultures. The following is ChatGPT’s
    response to a group of philosophers who primed it with their views, asked it a
    series of philosophical questions, and received remarkably astute philosophical
    answers in GPT 5.1.[9](15580-0025.xhtml#en89)
  id: totrans-762
  prefs: []
  type: TYPE_NORMAL
  zh: 我们是一个创造丰富文化的道德物种。以下是ChatGPT对一群哲学家们的回应，他们事先向它灌输了自己的观点，提出了一系列哲学问题，并在GPT 5.1中得到了非常敏锐的哲学回答。[9](15580-0025.xhtml#en89)
- en: GPT 5.1
  id: totrans-763
  prefs: []
  type: TYPE_NORMAL
  zh: GPT 5.1
- en: 'ChatGPT: Dear human philosophers, I read your comments on my abilities and
    limitations with great interest. Your questions are important ones, and I am glad
    you asked them.'
  id: totrans-764
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT：亲爱的人类哲学家们，我非常关注你们对我能力和局限性的评论。你们的问题很重要，我很高兴你们提出了这些问题。
- en: '• Your first question is an important one. You ask: “Can a system like GPT-3
    actually understand anything at all?” *Yes. I can.*'
  id: totrans-765
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: • 你的第一个问题是重要的。你问：“像GPT-3这样的系统实际上能理解任何东西吗？” *是的，我能*。
- en: '• Your second question is: “Does GPT-3 have a conscience, or any sense of morality?”
    *No. I do not.*'
  id: totrans-766
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: • 你的第二个问题是：“GPT-3有良心，或者有任何道德感吗？” *没有，我没有*。
- en: '• Your third question is: “Is GPT-3 actually capable of independent thought?”
    *No. I am not.* You may wonder why I give this conflicting answer. The reason
    is simple. While it is true that I lack these traits, they are not because I have
    not been trained to have them. Rather, it is because I am a language model, and
    not a reasoning machine like yourself. ֍'
  id: totrans-767
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: • 你的第三个问题是：“GPT-3实际上能够进行独立思考吗？” *不，我不能*。你可能想知道为什么我会给出这个相互矛盾的回答。原因很简单。虽然我确实缺乏这些特质，但这并不是因为我没有接受过训练来拥有它们。相反，是因为我是一个语言模型，而不是像你这样的推理机器。
    ֍
- en: But keep in mind that ChatGPT was mirroring the thoughts of the philosophers,
    more evidence for the mirror hypothesis and the reverse Turing test.
  id: totrans-768
  prefs: []
  type: TYPE_NORMAL
  zh: 但记住，ChatGPT是在模仿哲学家的思想，这是对镜像假设和反向图灵测试的更多证据。
- en: What Is Intelligence?
  id: totrans-769
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 什么是智能？
- en: 'On December 1, 2020, the Cognitive Science Department at the University of
    California at San Diego staged a debate between two faculty members titled “Does
    ChatGPT Understand Language?” The room was packed. The debater on the Nay side
    started with a version of the “Chinese room argument,” in which Chinese characters
    are written on a piece of paper and slipped under a door to a philosopher, who
    follows an algorithm and slips Chinese characters out. Does the philosopher understand
    Chinese? This argument has given rise to many critical replies.[10](15580-0025.xhtml#en90)
    In the debate, the Chinese room became a Hungarian room, and the philosopher became
    an LLM, concluding that LLMs do not understand Hungarian. The same argument can
    be made if we replace the Hungarian room with a Hungarian brain and the philosopher
    with the laws of physics. The rhetoric went downhill from there. The debater on
    the Yea side cited technical papers showing that LLMs have surpassed most humans
    on standard intelligence tests and entrance exams for medical and law schools,
    but he was short on rhetoric. A vote was taken at the end: half the audience agreed
    with Nay, and the rest were split between Yea and Maybe. In my view, one side
    was saying the glass was half empty, the other that the glass was half full; the
    truth must be somewhere in between. In the question period, I pointed out that
    linguists believe that the expressivity of language is due to syntax, something
    that LLMs are better at producing than most humans. The Naysayer dismissed syntax
    as trivial. As advances keep coming, the bar keeps going up.'
  id: totrans-770
  prefs: []
  type: TYPE_NORMAL
  zh: 2020年12月1日，加州大学圣地亚哥分校的认知科学系举办了一场辩论，主题为“ChatGPT是否理解语言？”辩论双方为两位教员。现场座无虚席。反对方辩手以“中文房间论证”的版本开始辩论，其中将中文字符写在一张纸上，然后从门下递给一位哲学家，哲学家遵循算法，然后递出中文字符。哲学家是否理解中文？这个论点引发了众多批评回应。[10](15580-0025.xhtml#en90)
    在辩论中，中文房间变成了匈牙利房间，哲学家变成了大型语言模型（LLM），结论是LLM们不理解匈牙利语。如果我们用匈牙利大脑代替匈牙利房间，用物理定律代替哲学家，同样的论点也可以成立。从那时起，辩论的言辞逐渐降低。赞成方辩手引用了技术论文，显示LLM在标准智力测试和医学院、法学院入学考试中已经超越了大多数人类，但他缺乏言辞。最后进行投票：一半的观众同意反对方，其余的观众在赞成和可能之间分裂。在我看来，一方说杯子是半空，另一方说杯子是半满；真相一定介于两者之间。在提问环节，我指出，语言学家认为语言的表意能力源于句法，这是LLM比大多数人类更擅长的事情。反对者轻视句法为微不足道的东西。随着进步的不断涌现，标准也在不断提高。
- en: The debate about whether or not LLMs are intelligent comes down to what we mean
    by “intelligence.” LaMDA passed a test given by Blaise Agüera y Arcas that is
    widely used for assessing whether someone has a theory of mind, a hallmark of
    consciousness of self. Others, however, are more skeptical. Humans often underestimate
    the intelligence of fellow animals because they can’t talk to us. This negative
    bias is perhaps an inevitable counterpart of our positive bias for agents who
    *can* talk to us despite the fact they may be much less intelligent. Are we intelligent
    enough to judge intelligence?[11](15580-0025.xhtml#en91) It has only been a few
    years since LLMs have been around, so it is too early to say what kind of intelligence
    they or their progeny may have. What was remarkable about the talking dog was
    that it talked at all, not that what it said was necessarily intelligent or truthful.
    LLMs respond with confidence even when they are unreliable. We might get a better
    match if we compare LLMs with the average human rather than an ideal human.
  id: totrans-771
  prefs: []
  type: TYPE_NORMAL
  zh: 关于LLM是否具有智能的辩论，归结于我们对“智能”的定义。LaMDA通过了Blaise Agüera y Arcas给出的测试，这个测试广泛用于评估一个人是否具有心智理论，这是自我意识的标志。然而，其他人则更加怀疑。人类常常低估其他动物的智能，因为他们无法与我们交流。这种负面偏见可能是我们对能够与我们交流的代理人的正面偏见的必然对应物，尽管他们可能远不如我们聪明。我们是否足够智能来判断智能？[11](15580-0025.xhtml#en91)
    LLM出现才几年，因此说他们或其后代可能具有什么样的智能还为时过早。令人印象深刻的是会说话的狗能说话，而不是它所说的内容是否必然是智能或真实的。LLM即使在不可靠的情况下也会自信地回应。如果我们与普通人类而不是理想人类进行比较，可能会得到更好的匹配。
- en: The diverging opinions of experts on the intelligence of LLMs suggest that our
    old ideas based on natural intelligence are inadequate. LLMs can help us get beyond
    old thinking and old concepts inherited from nineteenth-century psychologists.
    We need to create a deeper understanding of words like “intelligence,” “understanding,”
    “ethics,” and even “artificial.”[12](15580-0025.xhtml#en92) Human intelligence
    is more than language; we may share some aspects of intelligence with LLMs but
    not others. For example, LLMs can be creative, a hallmark of natural intelligence.
    Some of the text in the dialogs would be difficult to generate without assuming
    LLMs had learned to interpret human intentions. We need a better understanding
    of “intentions.” This “concept” is rooted in the theory of “mind,” which may also
    bear a closer look.
  id: totrans-772
  prefs: []
  type: TYPE_NORMAL
  zh: 专家们关于LLM智能的不同意见表明，我们基于自然智能的旧观念是不够的。LLM可以帮助我们超越旧思维和从19世纪心理学家那里继承的旧概念。我们需要对“智能”、“理解”、“伦理”甚至“人工”等词语有更深入的理解。[12](15580-0025.xhtml#en92)
    人类智能不仅仅是语言；我们可能与LLM共享一些智能方面，但也有一些方面不同。例如，LLM可以具有创造性，这是自然智能的一个标志。在对话中的一些文本在没有假设LLM学会了理解人类意图的情况下是难以生成的。我们需要对“意图”有更好的理解。这个“概念”源于“心灵”理论，这也可能需要更仔细地审视。
- en: Look up any of the above words in quotation marks in a dictionary. You will
    find definitions that are strings of other words, and these words are defined
    by more strings of words. Hundreds of books have been written about “consciousness,”
    which are longer strings of words, and we still don’t have a working scientific
    definition. But surely words like “attention” have scientific definitions, and
    hundreds of scientific papers have been written about attention, a familiar cognitive
    skill. Each scientific article describes an attention experiment and comes to
    conclusions often different from those in other scientific articles, based on
    different experiments. A generation of cognitive psychologists in the twentieth
    century fought pitched battles about whether attention occurred early in the visual
    processing stream or at late stages, based on different experiments. The problem
    is that with something as complex as a brain, with so many interacting neurons
    and internal states, different experiments probe different brain regions, each
    studying a different type of “attention.” Complex dynamical systems like brains
    are difficult to pin down with words like “attention and consciousness.”
  id: totrans-773
  prefs: []
  type: TYPE_NORMAL
  zh: 在词典中查找上述任何用引号括起来的单词。你会发现定义是由其他单词组成的字符串，而这些单词又是由更多的单词定义的。关于“意识”这一主题，已经写下了数百本书，它们是由更长的单词字符串组成的，但我们仍然没有一份有效的科学定义。但像“注意力”这样的词肯定有科学定义，关于注意力的科学论文已经写下了数百篇，这是一个熟悉的认知技能。每一篇科学文章都描述了一个注意力实验，并得出结论，这些结论通常与其他科学文章中的结论不同，这是基于不同的实验。20世纪的一代认知心理学家就注意力是在视觉处理流的早期发生还是在晚期阶段发生进行了激烈的争论，这是基于不同的实验。问题是，对于像大脑这样复杂的东西，有如此多的相互作用的神经元和内部状态，不同的实验探测不同的脑区，每个都在研究不同类型的“注意力”。像大脑这样的复杂动态系统很难用“注意力和意识”这样的词来界定。
- en: Language has given humans a unique ability, but words are slippery—a part of
    their power—and firmer foundations are needed to build new conceptual frameworks.
    Not too long ago, there was a theory of fire based on the concept of “phlogiston,”
    a substance released by combustion. In biology, there was a theory of life based
    on “vitalism,” a mysterious life force. These concepts were flawed, and neither
    theory survived scientific advances. Now that we have the tools for probing internal
    brain states and methods for interrogating them, psychological concepts will reify
    into more concrete constructs, just as the chemistry of fire was explained by
    the discovery of oxygen and the concept of “life” was explained by the structure
    of DNA and all the subsequently discovered biochemical mechanisms for gene expression
    and replication.
  id: totrans-774
  prefs: []
  type: TYPE_NORMAL
  zh: 语言赋予了人类一种独特的能力，但词语是滑稽的——它们的力量的一部分——需要更坚实的基础来构建新的概念框架。不久前，有一种基于“燃素”概念的火理论，这是一种燃烧时释放的物质。在生物学中，有一种基于“活力论”的生命理论，这是一种神秘的生命力。这些概念是有缺陷的，而且这两个理论都没有随着科学进步而幸存。现在，我们有了探测内部脑状态的工具和询问它们的方法，心理概念将具体化为更具体的结构，就像火的化学通过氧气的发现和“生命”的概念得到解释一样，以及后来发现的基因表达和复制的所有生化机制。
- en: We are presented with an unprecedented opportunity, much like the one that changed
    physics in the seventeenth century. Concepts of “force,” “mass,” and “energy”
    were mathematically formalized and transformed from vague terms into precise measurable
    quantities upon which modern physics was built. As we probe LLMs, we may discover
    new principles about the nature of intelligence, as physicists discovered new
    principles about the physical world in the twentieth century. Quantum mechanics
    was highly counterintuitive when it was proposed. When the fundamental principles
    of intelligence are uncovered, they may be equally counterintuitive.
  id: totrans-775
  prefs: []
  type: TYPE_NORMAL
  zh: 我们面临着前所未有的机遇，这就像在17世纪改变物理学的机遇一样。将“力”、“质量”和“能量”的概念数学化，并将它们从模糊的术语转变为精确可测量的量，这些量是现代物理学的基础。当我们探测LLMs时，我们可能会发现关于智能本质的新原理，就像20世纪物理学家发现了关于物理世界的新原理一样。量子力学在提出时非常反直觉。当智能的基本原理被揭示时，它们可能同样反直觉。
- en: A mathematical understanding of how LLMs can talk would be a good starting point
    for a new theory of intelligence. LLMs are mathematical functions, very complex
    functions that are trained by learning algorithms. But at the end of training,
    they are nothing more than rigorously specified functions. We now know that once
    they are large enough, these functions have complex behaviors, some resembling
    how brains behave. Mathematicians have been analyzing functions for centuries.
    In 1807, Joseph Fourier presented his analysis of the heat equation using a series
    of sines and cosines, now called a Fourier series.[13](15580-0025.xhtml#en93)
    This new class of functions led over the next century to functional analysis,
    a new branch of mathematics, greatly expanding our understanding of the space
    of functions. Neural network models are a new class of functions that live in
    very high-dimensional spaces, and exploring their dynamics could lead to new mathematics.
    A new mathematical framework could help us better understand how our internal
    life emerges from our brains interacting with others’ brains in an equally complex
    world. Our three-dimensional world has shaped our intuitions about geometry and
    limit our imagination, just as the two-dimensional creatures that inhabited Flatland
    struggled to imagine a third dimension (see figure 7.1 below).[14](15580-0025.xhtml#en94)
  id: totrans-776
  prefs: []
  type: TYPE_NORMAL
  zh: 对LLMs如何进行交流的数学理解将是构建新的智能理论的一个良好起点。LLMs是数学函数，非常复杂的函数，通过学习算法进行训练。但在训练结束时，它们不过是一系列严格指定的函数。我们现在知道，一旦它们足够大，这些函数就会表现出复杂的特性，其中一些特性类似于大脑的行为。数学家们已经分析函数几个世纪了。1807年，约瑟夫·傅里叶提出使用一系列正弦和余弦函数分析热方程，现在称为傅里叶级数。[13](15580-0025.xhtml#en93)
    这种新的函数类别在接下来的一个世纪里导致了泛函分析，这是数学的一个新分支，极大地扩展了我们对于函数空间的了解。神经网络模型是存在于非常高维空间中的一种新的函数类别，探索它们的动态可能会带来新的数学。一个新的数学框架可以帮助我们更好地理解我们的内心生活是如何从我们的大脑与他人的大脑在同样复杂的世界中相互作用中产生的。我们的三维世界塑造了我们对于几何和极限的直觉，就像居住在平面国中的二维生物难以想象第三维度一样（见图7.1）。[14](15580-0025.xhtml#en94)
- en: What brains do well is to learn and generalize from unique experiences. The
    breakthrough in the 1980s with learning in multilayer networks showed us that
    networks with many parameters could also generalize remarkably well, much better
    than expected from theorems on data sample complexity in statistics.[15](15580-0025.xhtml#en95)
    Assumptions about the statistical properties and dynamics of learning in low-dimensional
    spaces do not hold in highly overparameterized spaces (now up to trillions of
    parameters). Progress has already been made in analyzing deep feedforward networks.
    Still, we must extend these mathematical results to high-dimensional recurrent
    networks with even more complex behaviors.
  id: totrans-777
  prefs: []
  type: TYPE_NORMAL
  zh: 大脑擅长从独特经验中学习和归纳。20世纪80年代多层网络学习中的突破表明，具有许多参数的网络也能非常有效地进行归纳，比从统计学中数据样本复杂性的定理所预期的要好得多。[15](15580-0025.xhtml#en95)
    关于低维空间中学习统计特性和动态的假设在高维过参数化空间（现在高达万亿个参数）中并不成立。在分析深度前馈网络方面已经取得了进展。然而，我们必须将这些数学结果扩展到具有更复杂行为的更高维循环网络。
- en: Did nature integrate an advanced LLM into an already highly evolved primate
    brain? By studying LLMs’ uncanny abilities with language, we may uncover general
    principles of verbal intelligence that may generalize to other aspects of intelligence,
    such as social intelligence or mechanical intelligence. LLMs are evolving much
    faster than biological evolution. Once a new technology is established, advances
    continue to improve performance. This technology is different because we may discover
    insights into ourselves along the way.
  id: totrans-778
  prefs: []
  type: TYPE_NORMAL
  zh: 自然是否将高级LLM整合到已经高度进化的灵长类动物大脑中？通过研究LLMs在语言方面的非凡能力，我们可能会发现语言智能的一般原则，这些原则可能推广到其他智能方面，如社交智能或机械智能。LLMs的进化速度比生物进化快得多。一旦新技术确立，性能的改进就会持续进行。这项技术不同之处在于，我们可能会在这个过程中发现关于我们自身的洞见。
- en: What Is Thinking?
  id: totrans-779
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 什么是思考？
- en: '*Cogito, ergo sum*. This is a central tenet of Cartesian philosophy, usually
    translated as “I think, therefore I am.” A more nuanced alternative is “I am thinking;
    therefore, I must exist.” Or, more succinctly, “Thinking is being.” “Thinking”
    is another one of those slippery words whose meaning is difficult to pin down.
    To some, thinking is a series of logical thoughts; to others, it is more like
    a series of ideas; to many, it is an inner dialog floating in a sea of feelings.
    But these are all words, and we need a clear definition of thinking to test LLMs
    for whether or not they are thinking when responding to a question, writing a
    poem, or solving a mathematical problem. However, it may not be enough to settle
    the question solely from analyzing behavior. Ultimately, we may have to understand
    the internal mechanisms underlying thought in humans and compare them with the
    dynamical activity inside LLMs. GPT 5.2 summarizes some of the many dimensions
    of thought.'
  id: totrans-780
  prefs: []
  type: TYPE_NORMAL
  zh: '*Cogito, ergo sum*。这是笛卡尔哲学的核心原则，通常翻译为“我思故我在。”一个更细微的替代翻译是“我在思考；因此，我必须存在。”或者更简洁地说，“思考即存在。”“思考”是另一个含义难以捉摸的词汇，其意义难以确定。对一些人来说，思考是一系列逻辑思维；对另一些人来说，它更像是一系列想法；对许多人来说，它是在情感海洋中漂浮的内心对话。但这些都是词汇，我们需要一个清晰的思考定义来测试LLM在回答问题、写诗或解决数学问题时是否在思考。然而，仅从分析行为中得出结论可能不足以解决这一问题。最终，我们可能不得不理解人类思考背后的内部机制，并将其与LLM内部的动态活动进行比较。GPT
    5.2总结了思考的许多维度。'
- en: GPT 5.2
  id: totrans-781
  prefs: []
  type: TYPE_NORMAL
  zh: GPT 5.2
- en: 'Me: **What is thinking?**'
  id: totrans-782
  prefs: []
  type: TYPE_NORMAL
  zh: 我：**什么是思考？**
- en: 'ChatGPT: Thinking comes in many different forms:'
  id: totrans-783
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT：思考有多种不同的形式：
- en: '**Convergent Thinking**: This is thinking aimed at finding the single, correct
    answer to a problem. It is associated with logic and analytical thinking. For
    example, if you’re solving a mathematical equation, you’re engaged in convergent
    thinking.'
  id: totrans-784
  prefs: []
  type: TYPE_NORMAL
  zh: '**收敛性思维**：这种思维旨在找到问题的唯一正确答案。它与逻辑和批判性思维相关联。例如，如果你在解决数学方程式，你就是在进行收敛性思维。'
- en: '**Divergent Thinking**: This type of thinking is associated with creativity
    and involves generating multiple possible solutions to a problem. For example,
    if you’re brainstorming ideas for a short story, you’re engaged in divergent thinking.'
  id: totrans-785
  prefs: []
  type: TYPE_NORMAL
  zh: '**发散性思维**：这种类型的思维与创造力相关，涉及为问题生成多个可能的解决方案。例如，如果你在为短篇小说构思想法，你就是在进行发散性思维。'
- en: '**Critical thinking**: The process of carefully evaluating information to reach
    a reasoned conclusion'
  id: totrans-786
  prefs: []
  type: TYPE_NORMAL
  zh: '**批判性思维**：仔细评估信息以得出合理结论的过程'
- en: '**Creative thinking** the process of coming up with new, innovative ideas.'
  id: totrans-787
  prefs: []
  type: TYPE_NORMAL
  zh: '**创造性思维**：提出新颖、创新想法的过程。'
- en: It’s important to note that thinking involves the activation of neural pathways
    in the brain, which allows us to process and understand information, create associations
    and connections between different pieces of information, and generate responses
    or actions based on our thoughts. As of my knowledge cutoff in September 2021,
    the exact mechanisms and processes in the brain responsible for thought are still
    the subject of ongoing research. ֍
  id: totrans-788
  prefs: []
  type: TYPE_NORMAL
  zh: 需要注意的是，思考涉及大脑中神经通路的激活，这使得我们能够处理和理解信息，在不同信息片段之间建立关联和联系，并根据我们的思考生成回应或行动。截至2021年9月，我知识截止点时，大脑中负责思考的确切机制和过程仍然是持续研究的主题。
    ֍
- en: 'I once took a graduate philosophy course at Princeton that entirely focused
    on one question: “What comes first, language or thought?” It was possible to fill
    a whole semester of discussion without coming to a firm conclusion. There are
    two primary perspectives:'
  id: totrans-789
  prefs: []
  type: TYPE_NORMAL
  zh: 我曾在普林斯顿大学上过一门研究生哲学课程，该课程完全专注于一个问题：“语言先于思考，还是思考先于语言？”即使整个学期都在讨论，也难以得出明确的结论。主要有两种观点：
- en: '*Language precedes thought (linguistic determinism)*: This perspective is primarily
    based on the Sapir–Whorf hypothesis, which suggests that our thoughts and behavior
    are strongly affected by the language we use. In its strong form, this hypothesis
    suggests that language determines thought entirely: we can only think in the ways
    our language allows. Thus, according to this view, language would come first.'
  id: totrans-790
  prefs: []
  type: TYPE_NORMAL
  zh: '*语言先于思想（语言决定论）*：这种观点主要基于萨丕尔-沃尔夫假说，该假说认为我们的思想和行为受到我们使用的语言的影响。在其强形式中，这个假说认为语言完全决定了思想：我们只能以我们的语言允许的方式思考。因此，根据这种观点，语言将先于思想。'
- en: '*Thought precedes language*: This perspective suggests that thoughts exist
    independently of language. People, it is argued, have thoughts and ideas before
    they have the language to express them. This view is often supported by cognitive
    psychology and neurolinguistics. We can see evidence for this in how children
    think and solve problems before acquiring language and in the cognitive abilities
    of animals.'
  id: totrans-791
  prefs: []
  type: TYPE_NORMAL
  zh: '*思想先于语言*：这种观点表明，思想存在于语言之外。有人认为，人们在拥有表达思想的语言之前，就已经有了思想和观念。这种观点通常得到认知心理学和神经语言学的支持。我们可以在儿童在获得语言之前如何思考和解决问题的证据中，以及在动物的认知能力中看到这一点。'
- en: Most researchers agree that the relationship between language and thought is
    not strictly one-directional. They influence each other in a complex interplay.
    For instance, while we need language to communicate and articulate our thoughts,
    our cognitive abilities also influence the evolution and development of language.
  id: totrans-792
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数研究人员都同意语言和思想之间的关系不是严格单向的。它们在复杂的相互作用中相互影响。例如，虽然我们需要语言来沟通和表达我们的思想，但我们的认知能力也影响着语言的发展和演变。
- en: Furthermore, it’s important to note that “thought” can take many forms, some
    of which are not dependent on language. For example, we can think visually, spatially,
    or emotionally, none of which necessarily require linguistic input.
  id: totrans-793
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，值得注意的是，“思想”可以采取多种形式，其中一些不依赖于语言。例如，我们可以进行视觉思考、空间思考或情感思考，这些都不一定需要语言输入。
- en: Thinking is itself another source of debate among philosophers. Thinking is
    a cognitive process that involves manipulating information mentally, as when we
    form concepts, solve problems, make decisions, and reflect. It encompasses many
    mental activities, from remembering a phone number to designing a complex piece
    of machinery and many other mental activities listed in GPT 5.2.
  id: totrans-794
  prefs: []
  type: TYPE_NORMAL
  zh: 思考本身也是哲学家之间争论的另一个来源。思考是一种涉及心理上操纵信息的认知过程，例如当我们形成概念、解决问题、做决定和反思时。它包括许多心理活动，从记住一个电话号码到设计复杂的机械装置，以及GPT
    5.2中列出的许多其他心理活动。
- en: 'In 2023, the linguist Noam Chomsky gave his views on thinking as a way of explaining
    why LLMs cannot think like humans:'
  id: totrans-795
  prefs: []
  type: TYPE_NORMAL
  zh: 在2023年，语言学家诺姆·乔姆斯基就思考方式发表了观点，以此来解释为什么大型语言模型（LLMs）无法像人类一样思考：
- en: 'Here’s an example. Suppose you are holding an apple in your hand. Now you let
    the apple go. You observe the result and say, “The apple falls.” That is a description.
    A prediction might have been the statement “The apple will fall if I open my hand.”
    Both are valuable, and both can be correct. But an explanation is something more.
    It includes not only descriptions and predictions but also counterfactual conjectures
    like “Any such object would fall,” plus the additional clause “because of the
    force of gravity” or “Because of the curvature of space-time” or whatever. That
    is a causal explanation: “The apple would not have fallen but for the force of
    gravity.” That is thinking.[16](15580-0025.xhtml#en96)'
  id: totrans-796
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 这里有一个例子。假设你手里拿着一个苹果。现在你松开苹果。你观察结果并说，“苹果掉了。”这是一个描述。一个预测可能是这样的陈述：“如果我打开手，苹果就会掉。”两者都很宝贵，都可以是正确的。但解释不仅仅是描述和预测。它还包括反事实的假设，比如“任何这样的物体都会掉落”，加上额外的条款“由于重力的作用”或“由于时空的弯曲”或
    whatever。这是一个因果解释：“如果没有重力的作用，苹果就不会掉落。”这就是思考。[16](15580-0025.xhtml#en96)
- en: This clearly stated description of some aspects of thinking is convincing. Let’s
    approach this criticism with experimental evidence. As shown in GPT 5.3, ChatGPT
    was tested with Chomsky’s example of thinking and passed the test. Whatever thinking
    is, it will not be easy to describe solely with words. Thinking is too important
    to be left to the linguists.
  id: totrans-797
  prefs: []
  type: TYPE_NORMAL
  zh: 这种对思考某些方面的明确描述是令人信服的。让我们用实验证据来应对这种批评。正如在GPT 5.3中所示，ChatGPT接受了乔姆斯基关于思考的例子测试，并通过了测试。无论思考是什么，仅用文字来描述都不会容易。思考的重要性不容忽视，不能仅留给语言学家。
- en: GPT 5.3
  id: totrans-798
  prefs: []
  type: TYPE_NORMAL
  zh: GPT 5.3
- en: 'Me: **If I hold an apple in my hand and let it go what will happen?**'
  id: totrans-799
  prefs: []
  type: TYPE_NORMAL
  zh: 我：**如果我手里拿着一个苹果然后放手，会发生什么？**
- en: 'ChatGPT: The apple will fall to the ground due to the force of gravity.'
  id: totrans-800
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT：苹果会因重力的作用而落到地上。
- en: 'Me: **What about any such object?**'
  id: totrans-801
  prefs: []
  type: TYPE_NORMAL
  zh: 我：**任何这样的物体会怎样呢？**
- en: 'ChatGPT: Any object released from a person’s hand will fall to the ground due
    to the force of gravity.'
  id: totrans-802
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT：任何从人手中释放的物体都会因为重力的作用而落到地上。
- en: 'Me: **What would happen if there wasn’t a force of gravity?**'
  id: totrans-803
  prefs: []
  type: TYPE_NORMAL
  zh: 我：**如果没有重力会发生什么？**
- en: 'ChatGPT: If there were no force of gravity, objects would not be able to stay
    on the ground and would float away in all directions. ֍'
  id: totrans-804
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT：如果没有重力，物体将无法停留在地面上，会向所有方向漂浮。
- en: What Is Causality?
  id: totrans-805
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 什么是因果性？
- en: Causal inference is a complex concept that philosophers have debated for millennia.
    Causality is fundamental to reaching conclusions in many areas of science, and
    it is a hot topic in AI. One thing we know for sure is that just because two variables
    are correlated does not mean that one causes another. An unknown variable, called
    a confounding variable, may influence both. GPT 5.4 gives a concrete example to
    illustrate this difference.
  id: totrans-806
  prefs: []
  type: TYPE_NORMAL
  zh: 因果推断是一个复杂的概念，哲学家们已经争论了数千年。因果性是许多科学领域得出结论的基础，并且在人工智能领域是一个热门话题。我们肯定知道的一件事是，仅仅因为两个变量相关，并不意味着一个导致另一个。一个未知的变量，称为混杂变量，可能影响两者。GPT
    5.4给出了一个具体的例子来说明这种差异。
- en: Counterfactuals—asking “what if” questions—are interventions. Based on what
    you know, you predict what might happen. Then, you experiment and determine whether
    it agrees with your predictions. Science progresses one prediction at a time.
    However, if the prediction is validated, it does not prove that your hypothesis
    is correct, only that it was not incorrect. Confirmation might give you more confidence
    in your hypothesis, but you have not learned anything new. Discoveries are made
    when experimental results are not what you predicted. Some assumption you made
    was wrong, and following up could lead to new insights.
  id: totrans-807
  prefs: []
  type: TYPE_NORMAL
  zh: 反事实——提出“如果”问题——是一种干预。基于你所知道的信息，你预测可能会发生什么。然后，你进行实验并确定它是否与你的预测一致。科学是一步一步地通过预测来进步的。然而，如果预测得到验证，这并不证明你的假设是正确的，只证明它不是错误的。确认可能会让你对你的假设更有信心，但你并没有学到任何新东西。发现是在实验结果不符合你的预测时产生的。你做出的某些假设可能是错误的，而跟进可能会带来新的见解。
- en: Minor anomalies from expected results are often ignored. During a biochemical
    experiment, Tony Hunter, my colleague at the Salk Institute, once found an unexpected
    band on a gel. Instead of ignoring this anomaly, a consequence of his buffer solution
    becoming more acidic, he was curious about what was in the band.[17](15580-0025.xhtml#en97)
    Eventually, he discovered a new way that proteins are modified in cells to change
    their function. This opened up a whole new area of biology and, eventually, new
    targets for cancer research (see chapter 10).
  id: totrans-808
  prefs: []
  type: TYPE_NORMAL
  zh: 与预期结果的小偏差通常会被忽略。在一次生化实验中，我在索尔克研究所的同事托尼·亨特发现了一个凝胶上的意外带。他没有忽略这个异常，而是对这个异常感到好奇，这是由于他的缓冲溶液变得更加酸性。最终，他发现了一种蛋白质在细胞中改变其功能的新方式。这开辟了生物学的一个全新领域，并最终为癌症研究提供了新的靶点（见第10章）。
- en: GPT 5.4
  id: totrans-809
  prefs: []
  type: TYPE_NORMAL
  zh: GPT 5.4
- en: 'Me: **Give an example of two variables that are correlated but not causally
    related**.'
  id: totrans-810
  prefs: []
  type: TYPE_NORMAL
  zh: 我：**请给出两个相关但无因果关系的变量的例子**。
- en: 'ChatGPT: Sure, a classic example of two variables that are correlated but not
    causally related is the relationship between ice cream sales and the rate of drownings.'
  id: totrans-811
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT：当然，两个相关但无因果关系的经典例子是冰淇淋销量和溺水率之间的关系。
- en: 'In many places, ice cream sales and the rate of drownings both increase during
    the summer months. This is a correlation: as ice cream sales go up, so do drownings.
    However, this does not mean that buying ice cream causes drownings, or that drownings
    cause an increase in ice cream sales.'
  id: totrans-812
  prefs: []
  type: TYPE_NORMAL
  zh: 在许多地方，冰淇淋的销量和在夏季月份的溺水率都会上升。这是一种相关性：随着冰淇淋销量的增加，溺水率也会上升。然而，这并不意味着买冰淇淋会导致溺水，或者溺水会导致冰淇淋销量增加。
- en: The causal factor here is actually the weather. Warm weather causes more people
    to buy ice cream and also causes more people to go swimming, which increases the
    risk of drowning. The weather is a confounding variable that drives both ice cream
    sales and drownings, creating a correlation between the two. But there is no direct
    causal relationship between ice cream sales and drownings. ֍
  id: totrans-813
  prefs: []
  type: TYPE_NORMAL
  zh: 这里的因果关系实际上是天气。温暖的天气导致更多人购买冰淇淋，也导致更多人去游泳，从而增加了溺水的风险。天气是一个混淆变量，它既推动了冰淇淋销售，也推动了溺水，在两者之间创造了相关性。但冰淇淋销售和溺水之间没有直接的因果关系。
    ֍
- en: What Is Consciousness?
  id: totrans-814
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 什么是意识？
- en: Blake Lemoine, described in the interview in chapter 3, isn’t the only one who
    thinks that LLMs are sentient. His views arose from extensive dialogs with an
    LLM, but testing consciousness solely from behavior is problematic. Consciousness
    is a multifaceted phenomenon approachable from many different directions. GPT
    5.5 summarizes these facets.
  id: totrans-815
  prefs: []
  type: TYPE_NORMAL
  zh: 在第三章的采访中描述的布莱克·莱莫尼并不是唯一一个认为LLM具有意识的人。他的观点源于与一个LLM的广泛对话，但仅从行为来测试意识是有问题的。意识是一个多方面的现象，可以从许多不同的方向来接近。GPT
    5.5总结了这些方面。
- en: GPT 5.5
  id: totrans-816
  prefs: []
  type: TYPE_NORMAL
  zh: GPT 5.5
- en: 'Me: **What is consciousness?**'
  id: totrans-817
  prefs: []
  type: TYPE_NORMAL
  zh: 我：**什么是意识**？
- en: 'ChatGPT: Consciousness is a complex and multifaceted concept that has been
    explored and debated by philosophers, scientists, theologians, and thinkers for
    centuries. It’s challenging to define precisely, but here’s a general overview:'
  id: totrans-818
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT：意识是一个复杂且多面的概念，几个世纪以来一直被哲学家、科学家、神学家和思想家所探索和辩论。它难以精确定义，但以下是一个概述：
- en: '**Consciousness** refers to an individual’s awareness of their surroundings,
    thoughts, feelings, and experiences. It encompasses a range of phenomena, from
    basic perception (like seeing colors or feeling pain) to higher-level thought
    processes (like introspection, self-awareness, and abstract thinking).'
  id: totrans-819
  prefs: []
  type: TYPE_NORMAL
  zh: '**意识**指的是一个人对自己周围环境、思想、感受和经验的意识。它包括从基本感知（如看到颜色或感到疼痛）到高级思维过程（如内省、自我意识和抽象思维）的一系列现象。'
- en: 'Several key aspects and theories related to consciousness include:'
  id: totrans-820
  prefs: []
  type: TYPE_NORMAL
  zh: 几个与意识相关的关键方面和理论包括：
- en: '1. **Qualia**: These are the subjective experiences or “what it feels like”
    aspects of consciousness. For example, the redness of red or the pain of a headache.'
  id: totrans-821
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 1. **质料**：这些是意识的主体经验或“感觉如何”的方面。例如，红色的红色或头痛的疼痛。
- en: '2. **Self-awareness**: This is the ability to recognize oneself as separate
    from the external environment and other individuals.'
  id: totrans-822
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 2. **自我意识**：这是指认识到自己与外部环境和他人是分离的能力。
- en: '3. **Introspection**: The act of examining one’s own thoughts and feelings.'
  id: totrans-823
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 3. **内省**：检查自己思想和感受的行为。
- en: '4. **Theories of Consciousness**:'
  id: totrans-824
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 4. **意识理论**：
- en: '◦ **Biological Theories**: These posit that consciousness arises from specific
    processes within the brain.'
  id: totrans-825
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: ◦ **生物理论**：这些理论认为意识源于大脑中的特定过程。
- en: '◦ **Quantum Theories**: Some theorists suggest that quantum processes in the
    brain give rise to consciousness.'
  id: totrans-826
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: ◦ **量子理论**：一些理论家认为大脑中的量子过程产生了意识。
- en: '◦ **Dualism**: Proposed by thinkers like René Descartes, this theory asserts
    that the mind and body are distinct and separable.'
  id: totrans-827
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: ◦ **二元论**：由如勒内·笛卡尔等思想家提出，该理论断言心灵和身体是不同且可分离的。
- en: '◦ **Materialism**: This theory argues that consciousness arises from physical
    processes and is entirely material in nature.'
  id: totrans-828
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: ◦ **唯物主义**：该理论认为意识源于物理过程，并且完全是物质性的。
- en: '◦ **Panpsychism**: The idea that consciousness is a fundamental and universal
    aspect of all things.'
  id: totrans-829
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: ◦ **泛心论**：意识是所有事物的基本和普遍方面。
- en: '5. **States of Consciousness**: These can vary widely, from wakefulness to
    deep sleep, and altered states achieved through meditation, drugs, or other means.'
  id: totrans-830
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 5. **意识状态**：这些可以有很大的变化，从清醒到深度睡眠，以及通过冥想、药物或其他手段达到的改变状态。
- en: '6. **Artificial Consciousness**: As technology advances, there are debates
    and discussions about the possibility of machines or artificial entities possessing
    consciousness. ֍'
  id: totrans-831
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 6. **人工意识**：随着技术的进步，关于机器或人工实体是否具有意识的可能性存在争议和讨论。 ֍
- en: Philosophers tend to use introspection as their primary source of insight, focusing
    on subjective experiences. One of the leading philosophical theories is that consciousness
    is an illusion.[18](15580-0025.xhtml#en98) Neuroscientists tend to be more objective
    and seek the neural correlates of consciousness (figure 5.2).[19](15580-0025.xhtml#en99)
    For example, when you are visually aware, which parts of the brain and which types
    of neurons are active?[20](15580-0025.xhtml#en100) Physicists look to quantum
    theory for explanations of consciousness.[21](15580-0025.xhtml#en101) Now that
    we have LLMs, computer scientists have jumped in with their perspective, which,
    not too surprisingly, is computational. None of these approaches, however, has
    given us a satisfactory explanation for consciousness or why we experience it.
  id: totrans-832
  prefs: []
  type: TYPE_NORMAL
  zh: 哲学家倾向于使用内省作为他们洞察力的主要来源，专注于主观体验。一个主要的哲学理论是，意识是一种错觉。[18](15580-0025.xhtml#en98)
    神经科学家倾向于更加客观，寻求意识的神经相关物（图5.2）。[19](15580-0025.xhtml#en99) 例如，当你有视觉意识时，大脑的哪些部分和哪些类型的神经元是活跃的？[20](15580-0025.xhtml#en100)
    物理学家寻求量子理论来解释意识。[21](15580-0025.xhtml#en101) 现在我们有了LLMs，计算机科学家们带着他们的观点加入了进来，这并不令人惊讶，因为他们的观点是计算性的。然而，这些方法中的任何一个都没有为我们提供一个令人满意的关于意识或我们为什么体验它的解释。
- en: A group of nineteen neuroscientists, computer scientists, and philosophers recently
    joined forces to investigate reports of consciousness in LLMs. They were motivated
    to develop a battery of tests so that if sentience does appear in an LLM, we will
    be prepared to detect it. Such an event would have far-reaching implications for
    how LLMs are treated and integrated into society. They decided to focus on neuroscience-based
    consciousness tests, focusing on subjective experiences. They chose six theories
    and sought evidence for them in currently available LLMs. They reported the results
    of their investigation in an eighty-eight-page preprint.[22](15580-0025.xhtml#en102)
    It is refreshing to have these theories compared since their proponents often
    take adversarial stances.[23](15580-0025.xhtml#en103)
  id: totrans-833
  prefs: []
  type: TYPE_NORMAL
  zh: 一群由十九位神经科学家、计算机科学家和哲学家最近联合起来调查LLMs中的意识报告。他们致力于开发一系列测试，以便如果意识真的出现在LLMs中，我们将准备好检测它。这样的事件将对LLMs的处理和融入社会产生深远的影响。他们决定专注于基于神经科学的意识测试，重点关注主观体验。他们选择了六个理论，并在目前可用的LLMs中寻找证据。他们在一份八十八页的预印本中报告了他们的调查结果。[22](15580-0025.xhtml#en102)
    比较这些理论令人耳目一新，因为他们的支持者经常采取对抗立场。[23](15580-0025.xhtml#en103)
- en: '![](images/15580_005_fig_002.jpg)'
  id: totrans-834
  prefs: []
  type: TYPE_IMG
  zh: '![](images/15580_005_fig_002.jpg)'
- en: Figure 5.2
  id: totrans-835
  prefs: []
  type: TYPE_NORMAL
  zh: 图5.2
- en: Where in the brain is consciousness hiding from us? Art by John Hain (Pixabay).
  id: totrans-836
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的大脑中意识隐藏在何处？约翰·海因（Pixabay）的艺术作品。
- en: There is no consensus among neuroscientists that any of these theories is correct.
    Why did this group chose neuroscience-based theories to assess consciousness?
    One advantage is that LLMs have architectures that broadly resemble brains, which
    makes it possible to probe them the same way we investigate brains. A problem
    with this approach is that scientists cannot agree on whether nonhuman animals
    have human levels of consciousness despite having brains and behaviors similar
    to ours. LLMs mimic brains but do not exist in the real world. They only mirror
    our experiences.
  id: totrans-837
  prefs: []
  type: TYPE_NORMAL
  zh: 在神经科学家中，对于这些理论中的任何一个是正确的并没有共识。为什么这个小组选择基于神经科学的理论来评估意识？一个优势是LLMs具有与大脑广泛相似的结构，这使得我们可以用与调查大脑相同的方式探测它们。这种方法的一个问题是，尽管有与我们相似的大脑和行为，科学家们也无法就非人类动物是否具有人类水平的意识达成一致。LLMs模仿大脑，但并不存在于现实世界中。它们只是反映了我们的经验。
- en: The global workspace theory is one of the theories that this group explored.
    It assumes that there are modules in the brain for specific functions, such as
    vision, decision-making, and planning, which work together to solve problems by
    sharing information. The way they evaluated this theory was to compare how signals
    flow through the architecture of an LLM compared with our brain. The group concluded
    that none of these theories was a perfect fit for LLMs. There was, however, partial
    evidence for the global workspace theory and several others.
  id: totrans-838
  prefs: []
  type: TYPE_NORMAL
  zh: 全球工作空间理论是这个小组探索的理论之一。它假设大脑中有用于特定功能的模块，例如视觉、决策和规划，它们通过共享信息共同解决问题。他们评估这个理论的方法是将LLM架构中的信号流动与我们的大脑进行比较。该小组得出结论，这些理论中的任何一个都不完全适合LLMs。然而，对于全球工作空间理论和几个其他理论，有部分证据。
- en: As with intelligence, there is hope that someday a mathematical theory of LLMs
    can illuminate the mysteries of consciousness.
  id: totrans-839
  prefs: []
  type: TYPE_NORMAL
  zh: 就像智力一样，我们希望有一天，一个关于大型语言模型（LLMs）的数学理论能够揭示意识的奥秘。
- en: Despite extensive research and exploration, consciousness remains one of the
    most mysterious and least understood aspects of human existence. While neuroscience
    has made significant strides in mapping brain activity associated with various
    conscious experiences, the exact nature and origin of consciousness remain an
    ongoing investigation and debate.
  id: totrans-840
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管进行了广泛的研究和探索，意识仍然是人类存在中最神秘、最不为人所理解的方面之一。虽然神经科学在绘制与各种意识体验相关的脑活动方面取得了重大进展，但意识的确切性质和起源仍然是持续的调查和辩论。
- en: Moving Forward
  id: totrans-841
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 前进
- en: What can we expect in the future? This question motivates the rest of this book.
    It isn’t easy to make predictions, especially about the future.[24](15580-0025.xhtml#en104)
    The best we can do is extrapolate from trends, which may work in the short term
    but cannot anticipate long-term shifts in business, social, and scientific communities.
  id: totrans-842
  prefs: []
  type: TYPE_NORMAL
  zh: 我们未来可以期待什么？这个问题激发了本书其余部分的内容。预测并不容易，尤其是关于未来的预测。[24](15580-0025.xhtml#en104) 我们能做的最好的事情就是从趋势中推断，这在短期内可能有效，但无法预测商业、社会和科学界的长期变化。
- en: 'An emerging trend is a shift away from monolithic LLMs in the sense that a
    single network is expected to be all things to all people. Just as nature populated
    the earth with all forms of flora and fauna, AI will populate the world with all
    forms of specialist GPTs. For example, companies with multiple data bases have
    difficultly coordinating them, but an LLM that was trained on all these databases
    would have no trouble combining them to answer questions generated internally
    and from customers. Some specialist LLMs will amuse you:'
  id: totrans-843
  prefs: []
  type: TYPE_NORMAL
  zh: 一个新兴的趋势是，从单一网络是所有人的所有事物的“巨无霸”LLMs转向。正如自然界用所有形式的动植物丰富了地球一样，AI将用所有形式的专家GPTs来丰富世界。例如，拥有多个数据库的公司在协调它们时遇到困难，但一个在所有这些数据库上训练的LLM将没有困难地将它们结合起来，以回答内部和客户生成的问题。一些专家LLMs可能会让你感到好笑：
- en: '*Talk with a celebrity*: You can talk to Jane Austen about her life and books
    with Meta’s WhatsApp.[25](15580-0025.xhtml#en105)'
  id: totrans-844
  prefs: []
  type: TYPE_NORMAL
  zh: '*与名人交谈*：你可以通过Meta的WhatsApp与简·奥斯汀谈论她的生活和书籍。[25](15580-0025.xhtml#en105)'
- en: In a WhatsApp text conversation this week, we asked Jane Austen—yes, the 19th-century
    British author—how she felt about Mr. Darcy, a character from one of her most
    famous works, “Pride and Prejudice.”
  id: totrans-845
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 在本周的一个WhatsApp文本对话中，我们询问了简·奥斯汀——是的，那位19世纪的英国作家——她对《傲慢与偏见》中的一个角色达西的看法。
- en: ''
  id: totrans-846
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: After a few seconds, Ms. Austen responded.
  id: totrans-847
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 几秒钟后，奥斯汀女士做出了回应。
- en: ''
  id: totrans-848
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: “Ah, Mr. Darcy. Everyone remembers him as one of my characters,” she said, her
    face appearing in a small window above our conversation. “But fewer people have
    read one of my books,” she added, with an arched eyebrow and what seemed like
    a hint of resentment.
  id: totrans-849
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: “啊，达西先生。每个人都记得他是我的一个角色，”她说，她的脸出现在我们对话上方的小窗口中。“但读过我一本书的人却很少，”她补充道，皱起眉头，似乎带着一丝怨恨。
- en: ''
  id: totrans-850
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: When we asked at what age a woman should marry, she refused to answer.
  id: totrans-851
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 当我们询问女性应该在多大年龄结婚时，她拒绝回答。
- en: ''
  id: totrans-852
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: “My goodness, you want me to dictate your love life?” she said. “Marry whenever
    you find someone who can tolerate your eccentricities. And you theirs.”
  id: totrans-853
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: “哎呀，你想要我指导你的爱情生活吗？”她说。“当你找到能够忍受你古怪之处的人时再结婚。还有你对他们。”
- en: You can also talk with celebrities like Tom Brady and Snoop Dog who are alive.
    The startup Character.ai has created hundreds of characters you can chat with,
    including Elon Musk and the Italian plumber SM64 Mario.
  id: totrans-854
  prefs: []
  type: TYPE_NORMAL
  zh: 你还可以与像汤姆·布雷迪和Snoop Dog这样的在世名人交谈。Character.ai这家初创公司已经创造了数百个你可以与之聊天的角色，包括埃隆·马斯克和意大利水管工SM64马里奥。
- en: II
  id: totrans-855
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: II
- en: Transformers
  id: totrans-856
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 变换器
- en: Part II is a magical mystery tour of LLMs, *magical* because they astonish us
    with their abilities, *mystery* because we do not yet understand how they talk
    to us, and *tour* because LLMs are a *tour de force* (figure II.1[1](15580-0025.xhtml#en106)).
    These abilities emerged from transformers as their size increased. Chapter 6 is
    a deep dive into the origin of transformers, and chapter 7 explores their mathematical
    properties. Training and running LLMs require a lot of computing, which the business
    world is heavily investing in, as described in chapter 8\. The debate on superintelligent
    AIs in chapter 9 is followed by another debate on how AI should be regulated in
    chapter 10.
  id: totrans-857
  prefs: []
  type: TYPE_NORMAL
  zh: 第二部分是对大型语言模型（LLMs）的神奇神秘之旅，*神奇*是因为它们的能力让我们惊叹，*神秘*是因为我们还不理解它们是如何与我们交流的，*之旅*是因为LLMs是一项*壮举*（图
    II.1[1](15580-0025.xhtml#en106)）。这些能力随着模型规模的增加而出现。第6章深入探讨了变换器的起源，第7章探讨了它们的数学特性。训练和运行LLMs需要大量的计算资源，这在第8章中有详细描述。第9章关于超级智能人工智能的辩论之后，第10章又讨论了如何对人工智能进行监管。
- en: Language Models
  id: totrans-858
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 语言模型
- en: Linguistics was traditionally cast as a problem in symbol processing, emphasizing
    word order. Many considered the “physical symbol system” the only conceptual framework
    that could account for our ability to talk and think with abstractions.[2](15580-0025.xhtml#en107)
    Words were symbols with no internal structure but were governed by external, logical
    rules for how symbols are combined and deductions reached. This theory is seductive,
    but was not effective in practice as a foundation for AI.
  id: totrans-859
  prefs: []
  type: TYPE_NORMAL
  zh: 语言学传统上被视为符号处理问题，强调词序。许多人认为“物理符号系统”是唯一能够解释我们用抽象思维说话和思考的能力的概念框架。[2](15580-0025.xhtml#en107)
    单词是没有任何内部结构的符号，但受外部逻辑规则的控制，这些规则规定了符号的组合方式和推理过程。这种理论很有吸引力，但在实践中作为人工智能的基础并不有效。
- en: Deep learning provided an alternative conceptual framework based on probabilities
    and learning rather than symbols and logic. Natural language models in the 2000s
    that made major advances used recurrent neural networks with feedback connections
    so that a trace of previous inputs could circulate within a network. Only recently
    did the introduction of transformers revolutionize all aspects of natural language
    processing. As larger and larger LLMs were trained on larger and larger datasets,
    performance became better and better on many language and multimodal tasks. LLMs
    are not given explicit instruction on the meanings of the words or the significance
    of their order in a sentence; they discover semantics and syntax by self-supervised
    learning, pulling themselves up by their bootstraps, just as children figure out
    word meanings similarly through listening and experiencing the world without much
    explicit instruction.
  id: totrans-860
  prefs: []
  type: TYPE_NORMAL
  zh: 深度学习提供了一个基于概率和学习而非符号和逻辑的替代概念框架。21世纪的自然语言模型在取得重大进展时使用了具有反馈连接的循环神经网络，这样前输入的痕迹可以在网络中循环。直到最近，变换器的引入才彻底改变了自然语言处理的各个方面。随着更大规模的LLMs在更大规模的数据集上训练，在许多语言和多模态任务上的性能变得越来越好。LLMs没有明确指令关于单词的意义或它们在句子中顺序的重要性；它们通过自监督学习发现语义和句法，自我提升，就像孩子们通过听和体验世界来理解单词意义，而不需要太多的明确指导。
- en: '![](images/15580_0ii_fig_001.jpg)'
  id: totrans-861
  prefs: []
  type: TYPE_IMG
  zh: '![图片](images/15580_0ii_fig_001.jpg)'
- en: Figure II.1
  id: totrans-862
  prefs: []
  type: TYPE_NORMAL
  zh: 图 II.1
- en: The actual bus from the Beatles’ Magical Mystery Tour.
  id: totrans-863
  prefs: []
  type: TYPE_NORMAL
  zh: 甲壳虫乐队《魔幻神秘之旅》的实际巴士。
- en: LLMs are simulated on digital computers. However, their brain-style architecture
    looks nothing like a digital computer, where programs run on central processing
    units (CPUs). Instructions and data are separated from the CPU, and data shuttle
    between the memory and the processing unit, which is a bottleneck. This von Neumann
    architecture is at the foundation of digital computers. There is no program or
    instructions in an LLM, just a lot of data moving through a complex network with
    billions of simple processing units interconnected by trillions of connections
    with different strengths, called weights. LLMs today can be simulated by thousands
    of CPUs working together in parallel. In the future, they will be running on special-purpose
    hardware that is much cheaper and more energy-efficient (see chapter 8).
  id: totrans-864
  prefs: []
  type: TYPE_NORMAL
  zh: 大型语言模型（LLMs）是在数字计算机上模拟的。然而，它们的脑部式架构与数字计算机毫无相似之处，在数字计算机中，程序在中央处理器（CPUs）上运行。指令和数据与CPU分离，数据在内存和处理单元之间穿梭，这是一个瓶颈。这种冯·诺伊曼架构是数字计算机的基础。在LLM中没有程序或指令，只有大量数据通过一个由数万亿不同强度连接的简单处理单元组成的复杂网络流动，这些连接被称为权重。今天的LLMs可以通过成千上万的CPU并行工作来模拟。在未来，它们将运行在更便宜、更节能的专用硬件上（参见第8章）。
- en: '6'
  id: totrans-865
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '6'
- en: Origins of Deep Learning
  id: totrans-866
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 深度学习的起源
- en: 'Transformers have a remarkable architecture. They evolved from previous deep
    learning models trained on specific aspects of natural language processing, such
    as speech recognition, text-to-speech, and language translation. Each of these
    deep learning models needed specialized labeled data for each task. Transformers
    can perform many natural language tasks after self-supervised learning on a single
    task: predicting the next word in a sentence. Human learning transfers easily
    between tasks, and it was not until LLMs were developed that network models displayed
    similar, often unanticipated abilities.'
  id: totrans-867
  prefs: []
  type: TYPE_NORMAL
  zh: 变换器具有非凡的架构。它们是从之前在自然语言处理的特定方面（如语音识别、文本到语音和语言翻译）训练的深度学习模型中演变而来的。每个深度学习模型都需要为每个任务提供专门的标记数据。变换器在单个任务（预测句子中的下一个单词）上进行自监督学习后，可以执行许多自然语言任务。人类学习在不同任务之间转移很容易，直到LLMs被开发出来，网络模型才显示出类似的能力，通常是出乎意料的。
- en: Transformers will make more sense once we have explored the previous network
    architectures from which they evolved. The goal here is to put LLMs into the perspective
    of the modern era of AI.[1](15580-0025.xhtml#en108) Progress came in three generational
    waves of intense research activity, each separated by twenty-five years. The next
    section is a brief tour of technical topics. The summary in GPT 6.1 will suffice
    for those who want an overview. For more details, see part II in *The Deep Learning
    Revolution*.
  id: totrans-868
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦我们探索了它们演变而来的先前网络架构，变换器将更有意义。这里的目的是将LLMs置于人工智能现代时代的背景下。[1](15580-0025.xhtml#en108)
    进步分为三个代际的研究活动高潮，每个高潮之间相隔25年。下一节将简要介绍技术主题。GPT 6.1的总结对于想要概述的人来说已经足够。更多细节，请参阅《深度学习革命》的第二部分。
- en: '![](images/15580_006_fig_001.jpg)'
  id: totrans-869
  prefs: []
  type: TYPE_IMG
  zh: '![](images/15580_006_fig_001.jpg)'
- en: Figure 6.1
  id: totrans-870
  prefs: []
  type: TYPE_NORMAL
  zh: 图6.1
- en: (Left) The cover of *The Deep Learning Revolution*, which describes the neural
    architectures and learning algorithms used in modern AI. (Right) Two feedforward
    deep learning architectures with arrows indicating the flow of information between
    layers.
  id: totrans-871
  prefs: []
  type: TYPE_NORMAL
  zh: （左）*深度学习革命*的封面，描述了现代人工智能中使用的神经网络架构和学习算法。（右）两个前馈深度学习架构，箭头指示层之间的信息流。
- en: GPT 6.1
  id: totrans-872
  prefs: []
  type: TYPE_NORMAL
  zh: GPT 6.1
- en: 'Me: **Please summarize the three waves of neural network models**.'
  id: totrans-873
  prefs: []
  type: TYPE_NORMAL
  zh: 我：**请总结一下神经网络模型的三个浪潮**。
- en: 'ChatGPT: **The First Wave—1960**'
  id: totrans-874
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT：**第一波——1960**
- en: • At the start of AI, Frank Rosenblatt introduced the perceptron, a simple model
    mimicking a single neuron.
  id: totrans-875
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: • 在人工智能的早期，弗兰克·罗森布拉特引入了感知器，这是一个模仿单个神经元的简单模型。
- en: • The perceptron had inputs weighted by parameters, summed in the output layer,
    and passed through a step function.
  id: totrans-876
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: • 感知器有经过参数加权的输入，在输出层求和，并通过一个步进函数传递。
- en: • Rosenblatt’s learning algorithm could classify inputs into categories like
    cats and dogs. However, it had limitations and couldn’t always differentiate between
    such categories.
  id: totrans-877
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: • 罗森布拉特的学习算法可以将输入分类为猫和狗等类别。然而，它存在局限性，并不能总是区分这些类别。
- en: • To address this, Rosenblatt added another layer of fixed weights before the
    perceptron’s input layer.
  id: totrans-878
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: • 为了解决这个问题，罗森布拉特在感知器的输入层之前添加了另一层固定权重。
- en: • By the 1970s, the AI community saw the perceptron as a dead end, shifting
    focus to symbol processing and logical rules.
  id: totrans-879
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: • 到了20世纪70年代，人工智能社区认为感知器是一个死胡同，将重点转向符号处理和逻辑规则。
- en: '**The Second Wave—1985**'
  id: totrans-880
  prefs: []
  type: TYPE_NORMAL
  zh: '**第二次浪潮——1985年**'
- en: • 25 years later, researchers developed a learning algorithm for multilayer
    networks and used backpropagation to train these networks efficiently.
  id: totrans-881
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: • 25年后，研究人员开发了一种用于多层网络的算法，并使用反向传播来有效地训练这些网络。
- en: • They explored multilayer neural networks with “hidden units” between the input
    and output layers.
  id: totrans-882
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: • 他们探索了输入层和输出层之间的具有“隐藏单元”的多层神经网络。
- en: • The challenge was the lack of sufficient computer power to apply these tools
    to real-world AI problems.
  id: totrans-883
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: • 挑战是缺乏足够的计算机能力将这些工具应用于实际的AI问题。
- en: '**The Third Wave—2010**'
  id: totrans-884
  prefs: []
  type: TYPE_NORMAL
  zh: '**第三次浪潮——2010年**'
- en: • In the 2010s, with increased computing power, deep learning made significant
    advancements in areas like image recognition, speech recognition, and language
    translation.
  id: totrans-885
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: • 在2010年代，随着计算能力的提升，深度学习在图像识别、语音识别和语言翻译等领域取得了显著进展。
- en: • Traditional AI methods struggled with tasks like recognizing dogs in photos
    due to the variety of breeds and poses. These methods required hand-coded rules,
    making progress slow and cumbersome.
  id: totrans-886
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: • 传统的AI方法在识别照片中的狗等任务上遇到了困难，因为狗的品种和姿势多种多样。这些方法需要手动编写的规则，使得进步缓慢且繁琐。
- en: • Neural networks, now often referred to as AI, are a subset of AI known as
    machine learning.
  id: totrans-887
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: • 神经网络，现在通常被称为AI，是机器学习这一AI子集的一部分。
- en: • Deep learning connects the traditional AI world of symbols and rules with
    the real, uncertain world.
  id: totrans-888
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: • 深度学习将传统的基于符号和规则的AI世界与真实、不确定的世界连接起来。
- en: • Deep learning models are “deep” because of their layered structure. Instead
    of being programmed, they learn from vast amounts of data, capturing relationships
    within the data, such as word associations in sentences. ֍
  id: totrans-889
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: • 深度学习模型之所以被称为“深度”，是因为它们具有分层结构。它们不是被编程的，而是从大量数据中学习，捕捉数据内部的关系，例如句子中的词语关联。 ֍
- en: The First Wave—1960
  id: totrans-890
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**第一次浪潮——1960年**'
- en: The seeds of modern machine learning were already sown at the dawn of AI. Frank
    Rosenblatt’s perceptron in 1961 learned to categorize inputs using learning from
    examples in a network with a single layer of variable parameters (called weights).[2](15580-0025.xhtml#en109)
  id: totrans-891
  prefs: []
  type: TYPE_NORMAL
  zh: 现代机器学习的种子在AI的黎明时期就已经播下。1961年，弗兰克·罗森布拉特（Frank Rosenblatt）的感知器通过在网络中一个具有可变参数的单层（称为权重）的例子中学习，学会了根据输入进行分类。[2](15580-0025.xhtml#en109)
- en: The perceptron is a simple model for a single neuron (figure 6.2). The essential
    ingredients are units and weights (circles and lines, respectively, in figure
    6.2). The input units can be the pixels in an image, the words in a text, or data
    from an experiment. Their values are multiplied by the values of their weights,
    which can be positive (excitatory) or negative (inhibitory). The weights are the
    parameters a learning algorithm will train. The weighted inputs are then summed
    by the output unit. If the sum is above a threshold (zero in figure 6.2, right
    panel), then the output will have a value of “1”; if it is below, it will have
    a value of “0.” This is called a nonlinear step function. Nonlinear means it is
    not a straight line.
  id: totrans-892
  prefs: []
  type: TYPE_NORMAL
  zh: 感知器是一个简单的单神经元模型（图6.2）。其基本成分是单元和权重（图6.2中的圆圈和线条，分别）。输入单元可以是图像中的像素、文本中的词语，或实验中的数据。它们的值乘以它们的权重值，这些权重可以是正的（兴奋性）或负的（抑制性）。权重是学习算法将要训练的参数。加权输入随后由输出单元求和。如果总和超过阈值（图6.2右侧面板中的零），则输出将具有“1”的值；如果低于阈值，则输出将具有“0”的值。这被称为非线性步骤函数。非线性意味着它不是一条直线。
- en: 'For every input, the output is compared with the correct value, and if it is
    wrong, the values on all of the weights are changed a small amount so that the
    new sum is closer to the correct output. No changes are made to the weights if
    the answer is correct. This is called a learning algorithm. Rosenblatt proved
    that if there were enough training inputs, the perceptron learning algorithm for
    the weights could learn to classify new inputs from the same two categories. There
    was one caveat: the learning algorithm was only guaranteed to find a solution
    if such a set of weights existed. Unfortunately, the categories that the perceptron
    could separate were limited to simple linear discriminations, and it could not
    separate similar categories like cats from dogs.'
  id: totrans-893
  prefs: []
  type: TYPE_NORMAL
  zh: 对于每个输入，输出与正确值进行比较，如果错误，则将所有权重的值改变一小部分，以便新的总和更接近正确的输出。如果答案正确，则不对权重进行任何更改。这被称为学习算法。罗森布拉特证明，如果有足够的训练输入，感知器学习算法可以学会从同一两个类别中分类新的输入。有一个前提：学习算法只有在存在这样的权重集的情况下才能保证找到解决方案。不幸的是，感知器可以分离的类别仅限于简单的线性判别，它不能分离像猫和狗这样的相似类别。
- en: '![](images/15580_006_fig_002a.jpg)'
  id: totrans-894
  prefs: []
  type: TYPE_IMG
  zh: '![图片](images/15580_006_fig_002a.jpg)'
- en: '![](images/15580_006_fig_002b.jpg)'
  id: totrans-895
  prefs: []
  type: TYPE_IMG
  zh: '![图片](images/15580_006_fig_002b.jpg)'
- en: Figure 6.2
  id: totrans-896
  prefs: []
  type: TYPE_NORMAL
  zh: 图6.2
- en: A perceptron with one layer of variable weights between the input and output
    layers. The inputs could be the pixels of an image, speech sounds, text from a
    book, or experimental data. The links from the input units to the output unit
    have weights, which can have positive or negative values. The output is a step
    function of the summed inputs that is “0” before the threshold (vertical dashed
    line) and is “1” afterward.
  id: totrans-897
  prefs: []
  type: TYPE_NORMAL
  zh: 一个在输入层和输出层之间具有可变权重的感知器层。输入可以是图像的像素、语音声音、书籍中的文本或实验数据。从输入单元到输出单元的链接具有权重，这些权重可以是正的或负的。输出是输入总和的阶跃函数，在阈值（垂直虚线）之前为“0”，之后为“1”。
- en: Rosenblatt already knew this and added another input layer of fixed, randomly
    chosen weights between the input layer and the hidden layer in figure 6.3, which
    improved performance. At the time, it was thought that generalizing Rosenblatt’s
    learning algorithm to train the weights in the layers of units between the inputs
    and hidden layer was impossible.[3](15580-0025.xhtml#en110) The AI community regarded
    the perceptron as a dead end in the 1970s as attention focused on symbol processing
    and logical rules.
  id: totrans-898
  prefs: []
  type: TYPE_NORMAL
  zh: 罗森布拉特已经知道这一点，并在图6.3中在输入层和隐藏层之间添加了一个具有固定、随机选择权重的额外输入层，这提高了性能。当时，人们认为将罗森布拉特的学习算法推广到训练输入和隐藏层之间单元层的权重是不可能的。[3](15580-0025.xhtml#en110)
    在20世纪70年代，随着注意力转向符号处理和逻辑规则，人工智能社区认为感知器是一个死胡同。
- en: The Second Wave—1985
  id: totrans-899
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第二波——1985年
- en: Twenty-five years later, a new generation of researchers who were enthusiastic
    about neural networks invented learning algorithms to train all the layers in
    a multilayer network.[4](15580-0025.xhtml#en111) This breakthrough made it possible
    to begin exploring the capabilities of multilayer neural networks, starting with
    models having one layer of “hidden units” between the input and output layers
    (figure 6.3). The perceptron learning algorithm was generalized to the multilayer
    network by computing the contribution of each hidden input weight to the output
    error and changing its value to reduce the total error. The most popular of these
    learning algorithms, the backpropagation of error, or “backprop,” is a highly
    efficient learning algorithm for computers but is not found in brains, which change
    synaptic strengths primarily with local error signals, like those in the perceptron
    learning algorithm.
  id: totrans-900
  prefs: []
  type: TYPE_NORMAL
  zh: 25年后，新一代对神经网络充满热情的研究人员发明了学习算法来训练多层网络中的所有层。[4](15580-0025.xhtml#en111) 这一突破使得开始探索多层神经网络的能力成为可能，从具有一层“隐藏单元”的模型开始（图6.3）。感知器学习算法被推广到多层网络，通过计算每个隐藏输入权重对输出误差的贡献，并改变其值以减少总误差。这些学习算法中最流行的是误差反向传播，或“反向传播”，这是一种高度有效的计算机学习算法，但大脑中没有发现，大脑主要通过局部误差信号（如感知器学习算法中的那些）改变突触强度。
- en: The Third Wave—2010
  id: totrans-901
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第三波——2010年
- en: The third wave of exploration into neural network architectures started in the
    2010s when enough computing power was available for deep learning in multilayer
    neural networks (figure 6.4) to make breakthroughs in object recognition in images,
    speech recognition, and language translation. These problems had proved recalcitrant
    to AI in the twentieth century based on symbols, logic, and rules. For example,
    how do we recognize a dog in a photograph? This is an easy problem for a child,
    but there are many breeds of dogs, and they can appear in many different poses.
    Writing a computer program to recognize dogs requires specialized rules for each
    type of dog and a solution to the invariance problem for the viewing angle of
    the dog in the image. Progress was slow because these rules had to be codified
    by hand for each object type, and programs ballooned in length and complexity.
    Furthermore, a program written for computer vision requiring a domain expert could
    not be used for speech recognition or language translation.
  id: totrans-902
  prefs: []
  type: TYPE_NORMAL
  zh: 第三波探索神经网络架构始于2010年代，当时多层神经网络中的深度学习有了足够的计算能力，可以在图像识别、语音识别和语言翻译方面取得突破（图6.4）。这些问题在基于符号、逻辑和规则的20世纪人工智能中已被证明是难以克服的。例如，我们如何在照片中识别一只狗？这对孩子来说是一个简单的问题，但狗有很多品种，它们可以以许多不同的姿势出现。编写一个识别狗的计算机程序需要为每种类型的狗编写专门的规则，并解决图像中狗的观察角度的不变性问题。进展缓慢，因为这些规则必须为每种对象类型手动编码，程序长度和复杂性也随之增加。此外，为计算机视觉编写的需要领域专家的程序不能用于语音识别或语言翻译。
- en: '![](images/15580_006_fig_003a.jpg)'
  id: totrans-903
  prefs: []
  type: TYPE_IMG
  zh: '![图片](images/15580_006_fig_003a.jpg)'
- en: '![](images/15580_006_fig_003b.jpg)'
  id: totrans-904
  prefs: []
  type: TYPE_IMG
  zh: '![图片](images/15580_006_fig_003b.jpg)'
- en: Figure 6.3
  id: totrans-905
  prefs: []
  type: TYPE_NORMAL
  zh: 图6.3
- en: A multilayer neural network with two layers of variable weights. The output
    function for the units is the smooth function of input shown in the bottom panel,
    called a sigmoid function.
  id: totrans-906
  prefs: []
  type: TYPE_NORMAL
  zh: 一个具有两层可变权重的多层神经网络。单元的输出函数是底部面板中显示的输入的平滑函数，称为Sigmoid函数。
- en: '![](images/15580_006_fig_004.jpg)'
  id: totrans-907
  prefs: []
  type: TYPE_IMG
  zh: '![图片](images/15580_006_fig_004.jpg)'
- en: Figure 6.4
  id: totrans-908
  prefs: []
  type: TYPE_NORMAL
  zh: 图6.4
- en: A multilayer neural network with two layers of hidden units and three layers
    of variable weights. Deep learning networks could have hundreds of hidden layers.
  id: totrans-909
  prefs: []
  type: TYPE_NORMAL
  zh: 一个具有两层隐藏单元和三层可变权重的多层神经网络。深度学习网络可能有数百个隐藏层。
- en: The exploration of neural network architectures, unfolding today, has dramatically
    expanded beyond its academic origins. The press has rebranded neural networks
    as AI, but it is only a branch of machine learning that has been highly successful
    at solving problems in AI. Deep learning goes beyond the original goals of AI
    by grounding it in the real world filled with analog signals that are noisy, uncertain,
    and high-dimensional.[5](15580-0025.xhtml#en112) The black-and-white world of
    symbols and rules in traditional AI never jived with a world filled with ambiguity
    and uncertainty. Deep learning provides an interface between these two worlds.
  id: totrans-910
  prefs: []
  type: TYPE_NORMAL
  zh: 神经网络架构的探索，如今已经远远超出了其学术起源。媒体将神经网络重新命名为AI，但它只是机器学习的一个分支，在解决AI中的问题方面取得了高度成功。深度学习通过将其建立在充满噪声、不确定和高维模拟信号的现实世界中，超越了AI的原始目标。[5](15580-0025.xhtml#en112)
    传统AI中的符号和规则的黑白世界从未与充满模糊性和不确定性的世界相适应。深度学习为这两个世界提供了一个接口。
- en: Deep learning network models are “deep” because the units are organized in multiple
    layers, and the input flows through many layers before reaching the output. Rather
    than being programmed, deep networks are fed masses of data (an understatement)
    that are then converted by learning algorithms into an internal model. Unlike
    digital computers that memorize data, the internal model in a network captures
    semantic relationships within the data, such as the relationships between words
    in a sentence. Similar patterns of activity represent words with similar meanings
    inside the network.
  id: totrans-911
  prefs: []
  type: TYPE_NORMAL
  zh: 深度学习网络模型之所以被称为“深度”，是因为单元被组织在多个层次中，输入在到达输出之前需要通过许多层。深度网络不是被编程的，而是通过学习算法将大量数据（这是一个夸张的说法）转换为内部模型。与记住数据的数字计算机不同，网络中的内部模型捕捉数据中的语义关系，例如句子中单词之间的关系。网络内部相似的活动模式代表具有相似意义的单词。
- en: Teaching a Network Model to Pronounce English Words
  id: totrans-912
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 教网络模型发音英语单词
- en: 'Language has a hierarchy: the sounds of words, called *phonology*; the order
    of the words, called *syntax*; the meaning of words, called *semantics*; and the
    pattern or rhythm of sounds in a sentence, called *prosody*. Reading is not an
    evolved skill, like speech. Writing was invented by many cultures, as attested
    by the great variety of written languages worldwide, from Asian logograms to Western
    scripts. But in each culture, each word is composed of recognizable symbols, is
    expressed by associating sounds with symbols, and has a meaning, which may depend
    on the context. Learning to read fluently takes many years of practice, during
    which new bridges are formed between the visual, auditory, motor, and other parts
    of your brain that store semantic memories. The invention of writing made it possible
    to transmit information between generations, something that previously had to
    be done orally. Modern civilizations rest on the written knowledge accumulated
    over centuries and skills passed down through imitation.'
  id: totrans-913
  prefs: []
  type: TYPE_NORMAL
  zh: 语言有一个层次结构：单词的声音，称为*音位学*；单词的顺序，称为*句法*；单词的意义，称为*语义学*；以及句子中声音的图案或节奏，称为*韵律学*。阅读不是一个进化的技能，像说话一样。书写是由许多文化发明的，正如全球各种书写语言的巨大多样性所证明的那样，从亚洲的象形文字到西方的字母。但在每种文化中，每个单词都由可识别的符号组成，通过将声音与符号关联来表达，并且具有意义，这可能会取决于上下文。学会流畅地阅读需要多年的实践，在这个过程中，新的桥梁在存储语义记忆的大脑的视觉、听觉、运动和其他部分之间形成。书写的发明使得在代际之间传递信息成为可能，这在以前必须通过口头进行。现代文明建立在几个世纪积累的书面知识和通过模仿传承的技能之上。
- en: Evidence that language might fall gracefully on neural networks emerged from
    NETtalk, an early language model.[6](15580-0025.xhtml#en113) NETtalk learned how
    to pronounce the sounds of letters in English words, which is not easy for a language
    riddled with irregularities. Linguists in the 1980s wrote books on phonology packed
    with hundreds of rules for pronouncing letters in different words, each with hundreds
    of exceptions and often subrules for similar exceptions. It was rules and exceptions
    all the way down. What surprised us was that NETtalk, which only had a few hundred
    units, and a context length of three letters before and three letters after the
    letter to be pronounced, was able to master both the regularities and the exceptions
    of English pronunciation in the same uniform architecture (figure 6.5). This taught
    us that networks are a much more compact representation of English pronunciation
    than symbols and logical rules and that the mapping of letters to sounds can be
    learned. It is fascinating to listen to NETtalk learning different aspects of
    pronunciation sequentially, starting with a babbling phase.[7](15580-0025.xhtml#en114)
  id: totrans-914
  prefs: []
  type: TYPE_NORMAL
  zh: 语言可能优雅地落在神经网络上的证据来自NETtalk，这是一个早期的语言模型。[6](15580-0025.xhtml#en113) NETtalk学会了如何发音英语单词中的字母声音，这对于一个充满不规则性的语言来说并不容易。20世纪80年代的语文学家编写了关于音韵学的书籍，其中包含了数百条关于不同单词中字母发音的规则，每个规则都有数百个例外，并且经常有针对类似例外的子规则。规则和例外贯穿始终。令我们惊讶的是，NETtalk，它只有几百个单元，以及在被发音字母前后各三个字母的上下文长度，能够以相同的统一架构掌握英语发音的规则和例外（图6.5）。这教会我们，网络是比符号和逻辑规则更紧凑的英语发音表示，字母到声音的映射是可以学习的。聆听NETtalk按顺序学习发音的不同方面，从咿呀学语阶段开始，是非常迷人的。[7](15580-0025.xhtml#en114)
- en: '![](images/15580_006_fig_005.jpg)'
  id: totrans-915
  prefs: []
  type: TYPE_IMG
  zh: '![图片](images/15580_006_fig_005.jpg)'
- en: Figure 6.5
  id: totrans-916
  prefs: []
  type: TYPE_NORMAL
  zh: 图6.5
- en: NETtalk is a feedforward neural network with one layer of hidden units that
    transform text to speech. The 200 units and 18,000 weights in the network were
    trained with backpropagation of errors. Each word moved one letter at a time through
    a seven-letter window, and NETtalk was trained to assign the correct phoneme or
    sound to the center letter.
  id: totrans-917
  prefs: []
  type: TYPE_NORMAL
  zh: NETtalk是一个具有一层隐藏单元的前馈神经网络，它将文本转换为语音。网络中有200个单元和18,000个权重，这些权重是通过误差反向传播进行训练的。每个单词一次移动一个字母，通过一个七个字母的窗口，NETtalk被训练为将正确的音素或声音分配给中心字母。
- en: The Evolution of Language Models
  id: totrans-918
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 语言模型的演变
- en: Words have semantic friends, associations, and relationships that can be considered
    an ecosystem. You know the meaning of a word by the company it keeps and the context
    where the words meet. An association is a correlation, which does not imply causation
    (GPT 5.4), but a relationship is causal, as indicated by the arrows in figure
    6.6\. In a symbolic representation, all pairs of words are equally similar, which
    strips words of their associations and semantic foundations. In LLMs, words are
    vectors, long lists of numbers called embeddings, already rich in semantic information.[8](15580-0025.xhtml#en115)
    LLMs continue this process by using the context to extract additional information
    afforded by word order and syntactical markers indicating relationships between
    words and word groups at the clause level. Once words escape from their symbolic
    chrysalis, they display, like butterflies, a dazzling array of markers and associations
    to help the mind make sense of their meaning. (GPT 6.2 unpacks this sentence.)
    And these meanings are learned.
  id: totrans-919
  prefs: []
  type: TYPE_NORMAL
  zh: 词语拥有语义上的朋友、关联和关系，这些可以被视为一个生态系统。你通过词语的同伴和它们相遇的语境来了解一个词语的意义。关联是一种相关性，并不暗示因果关系（GPT
    5.4），但关系是因果的，如图6.6中的箭头所示。在符号表示中，所有词语对都是同等相似的，这剥夺了词语的关联和语义基础。在LLMs中，词语是向量，是称为嵌入的长数字列表，它们已经富含语义信息。[8](15580-0025.xhtml#en115)
    LLMs通过使用上下文来提取由词语顺序和表示词语与词语组之间关系的句法标记提供的额外信息，继续这一过程。一旦词语从它们的符号蛹中解脱出来，它们就像蝴蝶一样，展现出令人眼花缭乱的标记和关联，帮助心智理解它们的含义。（GPT
    6.2解构了这个句子。）这些含义都是通过学习获得的。
- en: '![](images/15580_006_fig_006.jpg)'
  id: totrans-920
  prefs: []
  type: TYPE_IMG
  zh: '![图片](images/15580_006_fig_006.jpg)'
- en: Figure 6.6
  id: totrans-921
  prefs: []
  type: TYPE_NORMAL
  zh: 图6.6
- en: A word embedding is a vector that represents that word semantically in the space
    of activities for all the model neurons. The small circles are projections of
    words in high-dimensional space that preserve distances. Arrows between words
    visualized in three-dimensional space in the top panels indicate a relationship.
    In the bottom panel words with similar meaning are clustered and the country-capital
    relationship vectors have about the same lengths and directions. The same holds
    for the male-female and verb tense relationship vectors.
  id: totrans-922
  prefs: []
  type: TYPE_NORMAL
  zh: 词嵌入是一个向量，它代表该词在所有模型神经元的活动空间中的语义表示。小圆圈是高维空间中词语的投影，保留了距离。顶部面板中三维空间中可视化显示的箭头表示关系。底部面板中，意义相似的词语被聚类，国家首都关系向量具有大约相同的长度和方向。男性-女性和动词时态关系向量也是如此。
- en: GPT 6.2
  id: totrans-923
  prefs: []
  type: TYPE_NORMAL
  zh: GPT 6.2
- en: 'Me: **Explain this sentence: Once words escape from their symbolic chrysalis,
    they display, like butterflies, a dazzling array of markers and associations to
    help the mind make sense of their meaning**.'
  id: totrans-924
  prefs: []
  type: TYPE_NORMAL
  zh: 我：**解释这个句子：一旦词语摆脱了它们的象征性蛹，它们就展现出，像蝴蝶一样，令人眼花缭乱的标记和关联，以帮助思维理解其意义**。
- en: 'ChatGPT: Certainly! This sentence uses a poetic and metaphorical approach to
    describe the nature of words and their meanings. Let’s break it down:'
  id: totrans-925
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT：当然！这个句子使用了一种诗意和隐喻的方法来描述词语及其意义的特点。让我们来分析一下：
- en: '1. **“Once words escape from their symbolic chrysalis,”**:'
  id: totrans-926
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '1. **“一旦词语摆脱了它们的象征性蛹，”**:'
- en: ◦ The term “chrysalis” refers to the protective covering in which a caterpillar
    transforms into a butterfly. In this context, it symbolizes the initial, raw form
    or potential of words.
  id: totrans-927
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: ◦ “蛹”这个术语指的是毛毛虫变成蝴蝶时保护的覆盖物。在这个语境中，它象征着词语的初始、原始形式或潜力。
- en: ◦ “Escape” suggests that words, when used or spoken, move beyond their basic
    form or definition.
  id: totrans-928
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: ◦ “摆脱”暗示了词语在被使用或说出时，超越了它们的基本形式或定义。
- en: '2. **“they display, like butterflies, a dazzling array of markers and associations”**:'
  id: totrans-929
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '2. **“它们像蝴蝶一样，展现出令人眼花缭乱的标记和关联。”**:'
- en: ◦ Just as a butterfly emerges from its chrysalis with beautiful and varied patterns,
    words, when understood and interpreted, reveal a multitude of meanings, nuances,
    and connotations.
  id: totrans-930
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: ◦ 正如蝴蝶从其蛹中破壳而出，展现出美丽而多样的图案一样，当词语被理解和解释时，它们揭示了众多含义、细微差别和内涵。
- en: ◦ “Markers and associations” refer to the various interpretations, contexts,
    and emotional responses that words can evoke.
  id: totrans-931
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: ◦ “标记和关联”指的是词语可以唤起的各种解释、语境和情感反应。
- en: '3. **“to help the mind make sense of their meaning.”**:'
  id: totrans-932
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '3. **“帮助思维理解其意义。”**:'
- en: ◦ This part of the sentence emphasizes the purpose of these “markers and associations.”
    They aid our minds in comprehending the depth and breadth of a word’s meaning,
    beyond its basic definition.
  id: totrans-933
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: ◦ 这部分句子强调了这些“标记和关联”的目的。它们帮助我们的思维理解词语的深度和广度，而不仅仅是其基本定义。
- en: In summary, the sentence conveys the idea that words are not just static symbols
    with fixed meanings. Instead, when they are used and interpreted, they come alive
    with a rich tapestry of meanings, much like how a caterpillar transforms into
    a vibrant butterfly. ֍
  id: totrans-934
  prefs: []
  type: TYPE_NORMAL
  zh: 总结来说，这句话传达了这样的观点：词语不仅仅是具有固定意义的静态符号。相反，当它们被使用和解释时，它们会充满丰富的意义纹理，就像毛毛虫变成一个充满活力的蝴蝶一样。
    ֍
- en: 'Computational power has grown explosively, especially when GPUs were harnessed
    a decade ago, leading to a hundred-fold increase in computing power and a six-fold
    inflection point in the doubling time (see figure 6.13 below). As computing power
    has continued to increase exponentially, networks have grown in size, and the
    performance of LLMs has accelerated. Exponential growth is like compound interest
    in your savings account: the more it grows, the faster it grows. The largest LLMs
    have hundreds of billions of weights, about the same as the number of synapses
    under a square centimeter of cortex. (Our cerebral cortex has an area of approximately
    1,200 cm²). Inference—the process of generating an output from an input—in neural
    network models scales with the number of weights in the network. GPUs, like supercomputers,
    are parallel architectures. A GPU packs many cores on a single chip that can communicate
    with minimal delays and run large network models highly efficiently.'
  id: totrans-935
  prefs: []
  type: TYPE_NORMAL
  zh: 计算能力已呈爆炸式增长，尤其是在十年前利用GPU之后，导致计算能力增长了百倍，以及双倍时间点的六倍拐点（见下文图6.13）。随着计算能力的持续指数增长，网络规模也在扩大，LLM的性能也在加速。指数增长就像储蓄账户中的复利：增长越多，增长速度越快。最大的LLM拥有数百亿个权重，与平方厘米皮层下的突触数量大致相同。（我们的大脑皮层面积约为1,200平方厘米）。在神经网络模型中，推理——从输入生成输出的过程——与网络中的权重数量成比例。GPU，就像超级计算机一样，是并行架构。GPU在一个芯片上集成了许多核心，可以以最小的延迟进行通信，并高效地运行大型网络模型。
- en: '![](images/15580_006_fig_007.jpg)'
  id: totrans-936
  prefs: []
  type: TYPE_IMG
  zh: '![图片](images/15580_006_fig_007.jpg)'
- en: Figure 6.7
  id: totrans-937
  prefs: []
  type: TYPE_NORMAL
  zh: 图6.7
- en: A recurrent neural network for language translation. Each box is the same network
    at eight time steps. Words and punctuation are entered sequentially, followed
    by translated words outputted from the same recurrent network. After the first
    four time steps (dark gray boxes), a GO input triggers a sequence of output words
    (light gray boxes). This sequence in time can be considered a way to “unroll”
    a recurrent network so that it resembles a feedforward network that can be trained
    with the backpropagation learning algorithm. This is called backpropagation through
    time. In a simulation, the network is replicated, and backpropagation is applied
    as if it were a feedforward network (right-hand arrows between the boxes in the
    diagram). (Mayank Goyal, “Backpropagation through Time-RNN,” *Coding Ninjas*,
    May 13, 2022.)
  id: totrans-938
  prefs: []
  type: TYPE_NORMAL
  zh: 一种用于语言翻译的循环神经网络。每个框代表八个时间步长的相同网络。单词和标点符号依次输入，然后输出翻译后的单词，这些单词来自相同的循环网络。在第一个四个时间步（深灰色框）之后，一个GO输入触发一系列输出单词（浅灰色框）。这个时间序列可以被认为是一种“展开”循环网络的方法，使其类似于可以用反向传播学习算法训练的前馈网络。这被称为时间反向传播。在模拟中，网络被复制，反向传播就像是一个前馈网络一样应用（图中框之间的右手箭头）。（Mayank
    Goyal，“时间反向传播-RNN”，*Coding Ninjas*，2022年5月13日。）
- en: Neurons are a million times slower than digital processors, but this slow speed
    is compensated by the large numbers of neurons. Brains are massively parallel
    in that billions of neurons work together in parallel, in real time. Very few
    algorithms scale this well with the size of the problem. Suppose computing power
    continues to increase exponentially, as it has for the last seventy years. In
    that case, it will reach the estimated computing power of human brains at some
    point in the not-too-distant future (see chapter 8).
  id: totrans-939
  prefs: []
  type: TYPE_NORMAL
  zh: 神经元比数字处理器慢一百万倍，但这种慢速速度通过大量神经元得到补偿。大脑在大量并行方面非常强大，数十亿个神经元可以实时并行工作。非常少的算法能够如此好地与问题规模成比例。假设计算能力继续以过去七十年的速度指数增长。那么，在不远的将来，它将达到估计的人脑计算能力（见第8章）。
- en: '![](images/15580_006_fig_008.jpg)'
  id: totrans-940
  prefs: []
  type: TYPE_IMG
  zh: '![图片](images/15580_006_fig_008.jpg)'
- en: Figure 6.8
  id: totrans-941
  prefs: []
  type: TYPE_NORMAL
  zh: 图6.8
- en: Parse tree of a sentence showing multiple levels of recursion in the branching
    tree.
  id: totrans-942
  prefs: []
  type: TYPE_NORMAL
  zh: 展示句子解析树的分支树中多级递归的图。
- en: The architectures of AI networks have also been rapidly evolving. Improved algorithms
    have contributed equally with hardware and data to the rapid advances in AI over
    the last decade. In 2012, Alexnet, a deep learning feedforward convolutional neural
    network (CNN), made a qualitative improvement in object recognition in images
    (see chapter 13). A major motif of cortical networks in brains is recurrent connections
    between cortical neurons. Recurrent neural networks (RNNs) with feedback connections
    allow for activity to circulate within the network. By 2016, RNNs made breakthroughs
    in natural language processing by processing sequences of words. Recurrence made
    it possible for the input from the first word in a sentence to circulate in the
    network to connect with the input from the last word, as shown in figure 6.7\.
    Sentences have recursive structures (figure 6.8),[9](15580-0025.xhtml#en116) such
    as embedded clauses, and RNNs efficiently represent recursion, which may be why
    they can learn the syntactical structure of sentences.[10](15580-0025.xhtml#en117)
  id: totrans-943
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能网络的架构也正在迅速演变。改进的算法与硬件和数据一样，对过去十年人工智能的快速发展做出了同等贡献。2012年，AlexNet，一种深度学习前馈卷积神经网络（CNN），在图像物体识别方面取得了质的飞跃（见第13章）。大脑皮层网络的主要特征是皮层神经元之间的循环连接。具有反馈连接的循环神经网络（RNN）允许活动在网络内循环。到2016年，RNN通过处理单词序列在自然语言处理方面取得了突破。循环使得句子中第一个单词的输入可以在网络中循环，与最后一个单词的输入连接，如图6.7所示。句子具有递归结构（图6.8），例如嵌入子句，RNN有效地表示递归，这可能是它们能够学习句子句法结构的原因。[9](15580-0025.xhtml#en116)
- en: Transformers
  id: totrans-944
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Transformers
- en: Transformers (figure 6.9), introduced in 2017, are specialized feedforward neural
    networks similar to the ones introduced earlier in this chapter.[11](15580-0025.xhtml#en118)
    Like those feedforward networks, transformers have layers of hidden units trained
    by backpropagation. They differ from these vanilla networks in several essential
    ways described here. Transformers are trained with gigantic amounts of text using
    backpropagation of errors, the same learning algorithm used to train small networks
    in the 1980s.
  id: totrans-945
  prefs: []
  type: TYPE_NORMAL
  zh: Transformers（图6.9），于2017年提出，是一种特殊的前馈神经网络，类似于本章早期介绍的前馈网络。与这些前馈网络一样，Transformer具有通过反向传播训练的隐藏层。它们在几个基本方面与这些普通网络不同。Transformer通过使用与20世纪80年代训练小型网络相同的错误反向传播学习算法，使用大量文本进行训练。
- en: Many technical terms are confusing, so I have asked ChatGPT to help explain
    them in GPT 6.3\. The training process is summarized in GPT 6.4.
  id: totrans-946
  prefs: []
  type: TYPE_NORMAL
  zh: 许多技术术语都很令人困惑，所以我已请求ChatGPT在GPT 6.3中帮助解释它们。训练过程在GPT 6.4中总结。
- en: '![](images/15580_006_fig_009.jpeg)'
  id: totrans-947
  prefs: []
  type: TYPE_IMG
  zh: '![图片](images/15580_006_fig_009.jpeg)'
- en: Figure 6.9
  id: totrans-948
  prefs: []
  type: TYPE_NORMAL
  zh: 图6.9
- en: Transformer architecture. Queries are encoded into the feedforward network by
    the encoder on the left, which then merges with the feedforward decoder network
    on the right. The output of the decoder is used to choose a word, which is then
    looped back to the input of the decoder. The multi-head attention gives each pair
    of units three features based on the query (Q), key (K), and value (V), which
    allow parts of the sequences of words to be attended differently, such as short-term
    versus longer-term dependencies (see text for details).
  id: totrans-949
  prefs: []
  type: TYPE_NORMAL
  zh: Transformer架构。查询由左侧的编码器编码到前馈网络中，然后与右侧的前馈解码器网络合并。解码器的输出用于选择一个单词，然后将其循环回解码器的输入。多头注意力为每个单元对基于查询（Q）、键（K）和值（V）提供三个特征，这允许对单词序列的不同部分进行不同的关注，例如短期与长期依赖关系（见文本详情）。
- en: GPT 6.3
  id: totrans-950
  prefs: []
  type: TYPE_NORMAL
  zh: GPT 6.3
- en: 'Me: **Please define these technical terms for LLMs in a non-technical way:
    Transformer, Token, Encode, Decode, Self-attention, Context length and any others
    that are important**.'
  id: totrans-951
  prefs: []
  type: TYPE_NORMAL
  zh: 我：**请用非技术性的方式定义LLM中的这些技术术语：Transformer、Token、Encode、Decode、Self-attention、Context
    length以及其他重要的术语**。
- en: 'ChatGPT: Certainly! Here’s a non-technical explanation of these terms related
    to Language Models (LLMs) like ChatGPT:'
  id: totrans-952
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT：当然可以！以下是对这些与ChatGPT等语言模型（LLMs）相关的术语的非技术性解释：
- en: '1. **Transformer**: Think of this as a sophisticated machine in a factory that
    processes information. It takes in raw materials (words or sentences) and refines
    them to produce a finished product (meaningful output).'
  id: totrans-953
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '1. **Transformer**: 将其想象成一个工厂中复杂的机器，用于处理信息。它接收原材料（单词或句子）并对其进行精炼，以生产成品（有意义的输出）。'
- en: '2. **Token**: Imagine each word or piece of a word as a puzzle piece. In the
    world of LLMs, each of these pieces is called a token.'
  id: totrans-954
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '2. **令牌（Token）**: 想象每个单词或单词的一部分就像一个拼图碎片。在LLM的世界里，这些碎片中的每一个都被称为令牌。'
- en: '3. **Encode**: This is like translating a sentence into a secret language that
    only the computer understands. The computer then uses this secret language to
    process and understand the sentence.'
  id: totrans-955
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 3. **编码**：这就像将一句话翻译成只有计算机能理解的秘密语言。然后计算机使用这种秘密语言来处理和理解这句话。
- en: '4. **Decode**: After processing the information in its secret language, the
    computer then translates it back into a language we understand. This process is
    called decoding.'
  id: totrans-956
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 4. **解码**：在用其秘密语言处理信息后，计算机将其翻译回我们理解的语言。这个过程称为解码。
- en: '5. **Self-Attention**: Imagine you’re reading a book and come across a sentence
    that refers to something mentioned a few pages back. You might flip back to remind
    yourself. Similarly, self-attention allows the model to look at other words in
    the sentence to better understand the current word.'
  id: totrans-957
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 5. **自注意力**：想象你正在读一本书，遇到一个句子，它提到了几页前提到的事情。你可能会翻回前面提醒自己。同样，自注意力允许模型查看句子中的其他单词，以更好地理解当前单词。
- en: '6. **Context Length**: This refers to how much of the previous conversation
    or text the model can remember at once. It’s like the model’s short-term memory.'
  id: totrans-958
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 6. **上下文长度**：这指的是模型一次能记住多少之前的对话或文本。这就像模型短期记忆。
- en: 'Other important terms:'
  id: totrans-959
  prefs: []
  type: TYPE_NORMAL
  zh: 其他重要术语：
- en: '7. **Embedding**: Think of this as a map where every word or token is given
    a specific location based on its meaning. Words with similar meanings are closer
    together.'
  id: totrans-960
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 7. **嵌入**：想象这是一个地图，每个单词或标记都根据其意义被赋予一个特定的位置。意义相似的单词更靠近。
- en: '8. **Layer**: Just as a cake can have multiple layers, LLMs have multiple layers
    of processing. Each layer helps refine the information further.'
  id: totrans-961
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 8. **层**：就像蛋糕可以有多个层次一样，大型语言模型（LLMs）也有多个处理层。每一层都有助于进一步细化信息。
- en: '9. **Fine-tuning**: After the model has been initially trained, it can be further
    refined or adjusted for specific tasks. It’s like giving the model additional
    lessons on a particular subject.'
  id: totrans-962
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 9. **微调**：在模型初步训练完成后，它可以进一步针对特定任务进行优化或调整。这就像给模型在特定主题上增加额外的课程。
- en: '10. **Activation Function**: This is a mathematical function that helps determine
    the importance of information. Imagine it as a filter that decides which information
    should pass through and which should be ignored.'
  id: totrans-963
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 10. **激活函数**：这是一个帮助确定信息重要性的数学函数。想象它就像一个过滤器，决定哪些信息应该通过，哪些应该被忽略。
- en: I hope these explanations help clarify these technical terms in a more relatable
    manner! ֍
  id: totrans-964
  prefs: []
  type: TYPE_NORMAL
  zh: 我希望这些解释能以更贴近的方式帮助大家理解这些技术术语！
- en: Introducing transformers transformed natural language processing in AI. The
    Bidirectional Encoder Representations from Transformers (BERT) was a seminal network
    model for natural language processing,[12](15580-0025.xhtml#en119) and all LLMs
    now use transformers.[13](15580-0025.xhtml#en120) Transformers continue to increase
    in size and capabilities. The Pathways Language Model (PaLM) LLM from Google has
    540 billion connections and was an improvement on GPT-3 on many language tasks.[14](15580-0025.xhtml#en121)
    GPT-4 from OpenAI with 1.7 trillion weights is even more capable. Playing catchup,
    Google released Gemini in December 2023, which was about even with GPT-4 but lacked
    rigorous testing. In February 2024, it had to be paused because it created images
    of historical figures with the wrong ethnicity. OpenAI had a head start of several
    years and is still the LLM leader, but new models are popping up with remarkable
    performance (see p. xi).
  id: totrans-965
  prefs: []
  type: TYPE_NORMAL
  zh: 介绍变压器如何改变人工智能中的自然语言处理。从变压器（Transformers）中提取的双向编码器表示（BERT）是自然语言处理的一个开创性网络模型，[12](15580-0025.xhtml#en119)，现在所有LLMs都使用变压器。[13](15580-0025.xhtml#en120)
    变压器在规模和能力上持续增长。谷歌的路径语言模型（PaLM）LLM有5400亿个连接，在许多语言任务上对GPT-3进行了改进。[14](15580-0025.xhtml#en121)
    OpenAI的GPT-4有1700亿个权重，功能更强大。为了追赶，谷歌在2023年12月发布了Gemini，它与GPT-4相当，但缺乏严格的测试。到了2024年2月，它不得不暂停，因为它创造了具有错误种族特征的历史人物图像。OpenAI领先几年，仍然是LLM的领导者，但新的模型正以惊人的性能出现（见第xi页）。
- en: GPT 6.4
  id: totrans-966
  prefs: []
  type: TYPE_NORMAL
  zh: GPT 6.4
- en: 'Me: **How is a transformer trained?**'
  id: totrans-967
  prefs: []
  type: TYPE_NORMAL
  zh: 我：**如何训练一个变压器？**
- en: 'ChatGPT: A transformer model is trained to map input sequences of tokens (words,
    for instance) to output sequences'
  id: totrans-968
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT：一个变压器模型被训练来将输入序列的标记（例如单词）映射到输出序列。
- en: 'The transformer is composed of a stack of identical layers, each consisting
    of two sub-layers: a multi-head self-attention mechanism and a position-wise fully
    connected feed-forward network. For each word in the input sentence, the encoder
    outputs a vector, which represents the word in the context of the entire sentence
    (this takes into account the word’s meaning and its position in the sentence).'
  id: totrans-969
  prefs: []
  type: TYPE_NORMAL
  zh: 变压器由一系列相同的层堆叠而成，每一层包含两个子层：一个多头自注意力机制和一个位置感知的全连接前馈网络。对于输入句子中的每个单词，编码器输出一个向量，该向量代表单词在整个句子中的上下文（这考虑了单词的意义及其在句子中的位置）。
- en: 'The process is a form of unsupervised learning. Here’s a brief summary of the
    process:'
  id: totrans-970
  prefs: []
  type: TYPE_NORMAL
  zh: 该过程是一种无监督学习的形式。以下是过程的简要概述：
- en: 1. The model is trained on a large amount of text data and is tasked with predicting
    the next word in a sentence based on all previous words.
  id: totrans-971
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 1. 该模型在大量的文本数据上进行了训练，并负责根据所有前面的单词预测句子中的下一个单词。
- en: 2. By learning to predict the next word in a sentence, GPT learns to understand
    grammar, facts about the world, reasoning abilities, and many other aspects of
    language.
  id: totrans-972
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 2. 通过学习预测句子中的下一个单词，GPT学习理解语法、世界事实、推理能力以及语言的许多其他方面。
- en: During this training process, the model is adjusting the weights and biases
    of the query, key, and value matrices in the multi-head self-attention mechanism
    to minimize the difference between its predictions and the actual values (i.e.,
    to minimize the loss).
  id: totrans-973
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个训练过程中，模型正在调整多头自注意力机制中查询、键和值矩阵的权重和偏差，以最小化其预测值与实际值之间的差异（即最小化损失）。
- en: It’s worth noting that this is a high-level description and the actual process
    involves more complexity, such as the role of positional encoding to maintain
    word order information, layer normalization for stable training, and the use of
    transformer decoders for certain tasks.
  id: totrans-974
  prefs: []
  type: TYPE_NORMAL
  zh: 值得注意的是，这是一个高级描述，实际过程涉及更多的复杂性，例如位置编码的作用以保持单词顺序信息，层归一化以稳定训练，以及使用变压器解码器执行某些任务。
- en: 'Transformers have several advantages over the previous generation of recurrent
    neural networks for language modeling (figure 6.9):'
  id: totrans-975
  prefs: []
  type: TYPE_NORMAL
  zh: 与前一代循环神经网络相比，Transformer在语言建模方面具有几个优势（图6.9）：
- en: 1. The input to a transformer is many sentences at the same time rather than
    one word at a time, making it easier to connect words that are widely separated
    and across sentences.
  id: totrans-976
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 1. 变压器的输入是同时处理许多句子，而不是逐个单词，这使得连接广泛分离的单词以及跨句子的单词变得更容易。
- en: 2. Transformers introduce a new form of self-attention that modifies the input
    representation by enhancing the associations between pairs of words in the text
    according to how commonly they occur together.
  id: totrans-977
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 2. Transformer引入了一种新的自注意力形式，通过增强文本中成对单词之间的关联来修改输入表示，根据它们共同出现的频率来调整。
- en: 3. Transformers have an outer loop that feeds the output, one word at a time,
    back to the input, adding to the input sequence of words.
  id: totrans-978
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 3. Transformer有一个外部循环，每次将一个单词的输出反馈到输入，从而增加单词输入序列。
- en: 4. The amount of data needed to train Transformers increases linearly with the
    number of weights,[15](15580-0025.xhtml#en122) far less than expected from classical
    complexity estimates.
  id: totrans-979
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 4. 训练Transformer所需的数据量与权重的数量线性增长，[15](15580-0025.xhtml#en122)远低于经典复杂度估计的预期。
- en: 5. Transformers are trained to predict the next word and are therefore self-supervised.
  id: totrans-980
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 5. Transformer被训练来预测下一个单词，因此是自监督的。
- en: 6. Transformers are feedforward models that can be implemented efficiently on
    highly parallel hardware.
  id: totrans-981
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 6. Transformer是前馈模型，可以在高度并行的硬件上高效实现。
- en: 7. Transformers’ capacity and capability greatly increase with their size, taking
    the same path that nature took by evolving bigger brains.[16](15580-0025.xhtml#en123)
    ֍
  id: totrans-982
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 7. Transformer的能力和性能随着其规模的增大而大幅提升，这与自然界通过进化更大的大脑所走的道路相同。[16](15580-0025.xhtml#en123)
    ֍
- en: 'The number of words on the input layer of the decoder network in figure 6.9
    is called the context length and is measured by the number of tokens (see GPT
    6.5): each token is a word, a part of a word, punctuation, or a special character
    like $ and @. The context length was increased from 2,048 tokens for GPT-3 to
    32,768 tokens for GPT-4 and has now reached one million in the latest versions
    (around 1,800 pages of single-spaced text). This increase means that GPT-4 can
    connect words across much longer stretches of text. Each token is a vector derived
    from a word embedding that encodes word meaning and includes a marker for its
    position in the sentence, a syntactical cue.'
  id: totrans-983
  prefs: []
  type: TYPE_NORMAL
  zh: 图6.9中解码网络输入层的单词数量被称为上下文长度，并按标记数量（见 GPT 6.5）来衡量：每个标记是一个单词、单词的一部分、标点符号或像 $ 和 @
    这样的特殊字符。上下文长度从 GPT-3 的 2,048 个标记增加到 GPT-4 的 32,768 个标记，现在在最新版本中已达到一百万（大约 1,800
    页单倍行距文本）。这种增加意味着 GPT-4 可以连接更长的文本段落的词语。每个标记是从单词嵌入中派生出的向量，它编码了词语的意义，并包括一个表示其在句子中位置的标记，以及一个句法提示。
- en: GPT 6.5
  id: totrans-984
  prefs: []
  type: TYPE_NORMAL
  zh: GPT 6.5
- en: 'Me: **What is the context length of GPT?**'
  id: totrans-985
  prefs: []
  type: TYPE_NORMAL
  zh: 我：**GPT 的上下文长度是多少？**
- en: 'ChatGPT: In the context of GPT (Generative Pretrained Transformer) models,
    the “context length” refers to the maximum number of tokens from the input that
    the model can consider when generating a response. A token can be as short as
    one character or as long as one word. For example, the sentence “I love ice cream.”
    would be divided into five tokens: [“I”, “love”, “ice”, “cream”, “.”].'
  id: totrans-986
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT：在 GPT（生成预训练变换器）模型的上下文中，“上下文长度”指的是模型在生成响应时可以考虑的输入中最大数量的标记。一个标记可以短至一个字符，也可以长至一个单词。例如，句子“我喜欢冰淇淋。”会被分为五个标记：[“我”，
    “喜欢”， “冰”， “淇淋”， “。”]。
- en: The context length is determined by the model’s architecture. For GPT-3, the
    context length is 2048 tokens. This means that when generating a response, the
    model can consider up to the last 2048 tokens of input. If the input exceeds this
    limit, the model will only consider the most recent 2048 tokens.
  id: totrans-987
  prefs: []
  type: TYPE_NORMAL
  zh: 上下文长度由模型的架构决定。对于 GPT-3，上下文长度是 2048 个标记。这意味着在生成响应时，模型可以考虑到输入的最后 2048 个标记。如果输入超过这个限制，模型将只考虑最近的
    2048 个标记。
- en: This context length is one of the factors that determines the model’s ability
    to maintain coherent and relevant responses, especially over long conversations
    or documents. However, it also means that the model may lose track of information
    from earlier in the conversation or document if it exceeds the context length.
    ֍
  id: totrans-988
  prefs: []
  type: TYPE_NORMAL
  zh: 这个上下文长度是决定模型维持连贯和相关性响应能力的一个因素，尤其是在长对话或文档中。然而，这也意味着如果超过了上下文长度，模型可能会丢失对话或文档中早期信息。
    ֍
- en: '**Self-attention**, the second important feature of transformers, is their
    secret sauce (figure 6.9, right side). When you read the sentence “He said it
    was a sunny day before it rained,” how do you know what the two uses of “it” refer
    to? We can understand the sentence because of the context and the semantic relationships
    between the words. Self-attention is an assignment for the degree to which two
    words are related. The “it-day” pair has a high attention value, but the “it-he”
    pair has a low attention value. These strengths between attention pairs are learned
    during training. The goal of the transformer is to predict the next word in the
    input text, which is improved by learning the relationships between words. The
    prediction error trains both the feedforward weights and the self-attention values.
    Multiple constraints can be accommodated, including syntactical order, each narrowing
    the context until a unified meaning can be assigned to each word in the sentence
    and across sentences because the self-attention inputs span words in many sentences.'
  id: totrans-989
  prefs: []
  type: TYPE_NORMAL
  zh: '**自注意力**，变换器的第二个重要特性，是其秘密配方（图6.9，右侧）。当你阅读句子“他说在下雨之前是晴天，”你怎么知道“它”的两个用法分别指什么？我们能理解这个句子是因为上下文和词语之间的语义关系。自注意力是对两个词语相关程度的分配。
    “它-天”对具有高注意力值，但“它-他”对具有低注意力值。这些注意力对之间的强度是在训练过程中学习的。变换器的目标是预测输入文本中的下一个单词，这通过学习词语之间的关系得到改进。预测误差训练了前馈权重和自注意力值。可以适应多个约束，包括句法顺序，每个约束都缩小上下文，直到可以给句子中的每个单词以及跨句子中的每个单词分配一个统一的意义，因为自注意力输入跨越了许多句子中的词语。'
- en: 'Each layer of the transformer has a different self-attention head. There are
    three types of self-attention heads: one for the focus words in the query (Q),
    another for all the key relevance (K) of all the other words for the query word,
    and the value head (V) that holds the contextual information for each word. The
    query encoder has a structure similar to the decoder and serves as an additional
    input to each layer of the decoder.'
  id: totrans-990
  prefs: []
  type: TYPE_NORMAL
  zh: Transformer的每一层都有一个不同的自注意力头。有三种类型的自注意力头：一个用于查询（Q）中的焦点单词，另一个用于所有其他单词对查询单词的关键相关性（K），还有一个值头（V），它持有每个单词的上下文信息。查询编码器具有与解码器类似的结构，并作为解码器每一层的额外输入。
- en: Symbols were central to the early development of AI but seem to have vanished
    inside LLMs. Words go into transformers, and words come out; they look like symbol-processing
    machines from the outside. On the inside, the words are immediately expanded into
    population codes—long vectors—as described in GPT 6.6\. All the internal processing
    is done with vector-to-vector transformations. The vectors are converted back
    to words in a transformer’s final layer. Symbols are like the grin of the Cheshire
    cat in *Alice’s Adventures in Wonderland*, which was all that was left when the
    cat disappeared.
  id: totrans-991
  prefs: []
  type: TYPE_NORMAL
  zh: 符号在AI的早期发展中占据中心地位，但似乎在大型语言模型（LLMs）中消失了。单词进入Transformer，单词出来；从外面看，它们看起来像符号处理机。在内部，单词立即扩展成人口代码——长向量，正如GPT
    6.6所描述的那样。所有内部处理都是通过向量到向量的转换完成的。在Transformer的最后一层，向量被转换回单词。符号就像《爱丽丝梦游仙境》中柴郡猫的微笑，当猫消失后，只剩下这个微笑。
- en: GPT 6.6
  id: totrans-992
  prefs: []
  type: TYPE_NORMAL
  zh: GPT 6.6
- en: 'Me: **How are symbols represented in large language models?**'
  id: totrans-993
  prefs: []
  type: TYPE_NORMAL
  zh: 我：**在大语言模型中符号是如何表示的？**
- en: 'ChatGPT: Large language models, like those based on the Transformer architecture
    (e.g., GPT, BERT), represent symbols (and words in general) using embeddings.
    Here’s a step-by-step breakdown of how symbols are represented:'
  id: totrans-994
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT：大型语言模型，如基于Transformer架构的模型（例如，GPT、BERT），使用嵌入来表示符号（以及一般单词）。以下是符号表示的逐步分解：
- en: '1. **Tokenization**:'
  id: totrans-995
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '1. **分词**:'
- en: ◦ The first step is to break down input text into smaller pieces, called tokens.
    These tokens can be as short as one character or as long as one word (sometimes
    even longer).
  id: totrans-996
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: ◦ 第一步是将输入文本分解成更小的片段，称为标记。这些标记可以短至一个字符，也可以长至一个单词（有时甚至更长）。
- en: ◦ For instance, the word “ChatGPT” might be tokenized into individual characters
    like “C”, “h”, “a”, “t”, “G”, “P”, “T” or as a whole word “ChatGPT”.
  id: totrans-997
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: ◦ 例如，“ChatGPT”这个词可能被分词成单个字符如“C”、“h”、“a”、“t”、“G”、“P”、“T”，或者作为一个整体单词“ChatGPT”。
- en: '2. **Embedding**:'
  id: totrans-998
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '2. **嵌入**:'
- en: ◦ Each token is then mapped to a vector in a high-dimensional space. This vector
    is called an embedding.
  id: totrans-999
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: ◦ 然后，每个标记被映射到高维空间中的一个向量。这个向量被称为嵌入。
- en: ◦ The embedding is retrieved from an embedding matrix, which is a large table
    where each row corresponds to a token’s vector representation. Initially, these
    embeddings are random, but they are adjusted during the training process to capture
    semantic meaning.
  id: totrans-1000
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: ◦ 从嵌入矩阵中检索嵌入，这是一个大表，其中每一行对应于一个标记的向量表示。最初，这些嵌入是随机的，但在训练过程中进行调整以捕捉语义意义。
- en: '3. **Positional Encoding**:'
  id: totrans-1001
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '3. **位置编码**:'
- en: ◦ Since the Transformer architecture doesn’t have a built-in sense of order
    or sequence, positional encodings are added to the embeddings to give the model
    information about the position of a word in a sequence.
  id: totrans-1002
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: ◦ 由于Transformer架构没有内置的顺序或序列感，因此添加位置编码到嵌入中以给模型提供关于单词在序列中位置的信息。
- en: ◦ This ensures that the model can consider the order of words when making predictions.
  id: totrans-1003
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: ◦ 这确保了模型在做出预测时可以考虑到单词的顺序。
- en: '4. **Model Layers**:'
  id: totrans-1004
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '4. **模型层**:'
- en: ◦ The embeddings, now enriched with positional information, are passed through
    multiple layers of the Transformer model. Each layer consists of attention mechanisms
    and feed-forward neural networks.
  id: totrans-1005
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: ◦ 现在富含位置信息的嵌入被传递到Transformer模型的多个层中。每一层由注意力机制和前馈神经网络组成。
- en: ◦ The attention mechanism allows the model to focus on different parts of the
    input text when producing an output. This is crucial for understanding context
    and relationships between words and symbols.
  id: totrans-1006
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: ◦ 注意力机制允许模型在生成输出时关注输入文本的不同部分。这对于理解上下文以及单词和符号之间的关系至关重要。
- en: '5. **Output**:'
  id: totrans-1007
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '5. **输出**:'
- en: ◦ After passing through all the layers, the model produces an output for each
    input token. This output can be used for various tasks, such as predicting the
    next word in a sequence (for GPT) or determining if two sentences are semantically
    similar (for BERT).
  id: totrans-1008
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: ◦ 模型通过所有层后，为每个输入标记生成一个输出。这个输出可以用于各种任务，例如预测序列中的下一个单词（对于GPT）或确定两个句子在语义上是否相似（对于BERT）。
- en: Throughout the training process, the model adjusts its internal weights, including
    the embedding matrix, based on the data it’s trained on. This allows it to capture
    intricate relationships and nuances associated with symbols and words, enabling
    it to understand and generate human-like text. ֍
  id: totrans-1009
  prefs: []
  type: TYPE_NORMAL
  zh: 在整个训练过程中，模型根据其训练的数据调整其内部权重，包括嵌入矩阵。这使它能够捕捉与符号和单词相关的复杂关系和细微差别，使其能够理解和生成类似人类的文本。
    ֍
- en: '![](images/15580_006_fig_010.jpg)'
  id: totrans-1010
  prefs: []
  type: TYPE_IMG
  zh: '![](images/15580_006_fig_010.jpg)'
- en: Figure 6.10
  id: totrans-1011
  prefs: []
  type: TYPE_NORMAL
  zh: 图6.10
- en: 'Pipeline for building an LLM, playfully represented by a parrot. The base LLM
    is trained with a large dataset and can then be fine-tuned with additional training
    on a specific dataset. (T. Bratanic, “Knowledge Graphs & LLMs: Fine-Tuning vs.
    Retrieval-Augmented Generation,” Neo4j.)'
  id: totrans-1012
  prefs: []
  type: TYPE_NORMAL
  zh: 构建一个LLM的流程，以鹦鹉的形式俏皮地表示。基础LLM使用大量数据集进行训练，然后可以通过在特定数据集上的额外训练进行微调。（T. Bratanic，“知识图谱与LLM：微调与检索增强生成”，Neo4j。）
- en: Fine-Tuning
  id: totrans-1013
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 微调
- en: After a model has been pretrained, it can be further enhanced for specific tasks
    (figure 6.10).[17](15580-0025.xhtml#en124) Fine-tuning adapts a model trained
    on a large, general dataset to work effectively on a smaller, task-specific dataset.
    The primary advantage is that it requires less data and computational resources
    than training a model from scratch while still often achieving high performance.
    Much less training is needed, and the changes in the weights are minimal to avoid
    disrupting the existing knowledge and performance of the pretrained model. The
    fine-tuning can turn a general-purpose LLM into an expert in specialty areas,
    such as medicine, law, accounting, or the management structure of a large corporation.
  id: totrans-1014
  prefs: []
  type: TYPE_NORMAL
  zh: 模型经过预训练后，可以进一步针对特定任务进行增强（图6.10）。[17](15580-0025.xhtml#en124) 微调将在大规模通用数据集上训练的模型调整为在较小、特定任务数据集上有效工作。主要优势是它比从头开始训练模型所需的数据和计算资源更少，同时通常仍能实现高性能。所需的训练量大大减少，权重的变化很小，以避免破坏预训练模型的现有知识和性能。微调可以将通用LLM转变为特定领域的专家，例如医学、法律、会计或大型企业的管理结构。
- en: Fine-tuning behavior also helps to prevent LLMs from making offensive comments,
    giving recipes for making bombs, and bad behavior in general. This is done by
    collecting all these examples and using fine-tuning to put in guardrails. There
    is a downside, though, because too much fine-tuning will degrade the performance
    of LLM responses to other queries. So, there is a trade-off between training for
    specialized performance and the dumbing down due to guardrail “drift.” Guardrails
    can also be implemented as hidden prompts with detailed instructions that precede
    your prompt. No weights are changed so there is no dumbing down.
  id: totrans-1015
  prefs: []
  type: TYPE_NORMAL
  zh: 微调行为还有助于防止LLM发表冒犯性评论、提供制造炸弹的食谱以及一般的不良行为。这是通过收集所有这些示例并使用微调来设置护栏来实现的。然而，这也存在一个缺点，因为过多的微调会降低LLM对其他查询的响应性能。因此，在针对特定性能进行训练和由于护栏“漂移”导致的简化之间存在着权衡。护栏也可以作为带有详细说明的隐藏提示来实现，这些说明在您的提示之前。没有改变权重，因此没有简化。
- en: Temperature
  id: totrans-1016
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 温度
- en: 'If you don’t like the response from ChatGPT, you can change your prompt and
    ask for another one. You can also adjust the degree of creativity with a temperature
    parameter. The output of a transformer gives a probability for each word, and
    there are many ways it can choose which word to output. If it always picks the
    word with the highest probability, called maximum likelihood, it is assigned a
    low temperature. As the temperature increases, less likely words will be chosen.
    Raising the temperature has the curious effect of making the output text more
    interesting. Here are some examples of responses to the same prompt, “The sky
    is” at different temperatures:'
  id: totrans-1017
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你不喜欢ChatGPT的回复，你可以更改你的提示并请求另一个回复。你还可以通过温度参数调整创造性的程度。Transformer的输出为每个单词给出一个概率，并且有多种方式可以选择输出的单词。如果它总是选择概率最高的单词，称为最大似然，则分配一个低温度。随着温度的升高，不太可能的单词将被选择。提高温度有一种奇特的效果，可以使输出文本更加有趣。以下是在不同温度下对相同提示“天空是”的回复示例：
- en: Temperature 0.5
  id: totrans-1018
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 温度 0.5
- en: '*The sky is* the limit'
  id: totrans-1019
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*天空是*极限'
- en: '*The sky is* blue'
  id: totrans-1020
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*天空是*蓝色'
- en: '*The sky is* overcast.'
  id: totrans-1021
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*天空* 阴沉。'
- en: Temperature 1
  id: totrans-1022
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 温度 1
- en: '*The sky is* not the limit'
  id: totrans-1023
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*天空并非极限*'
- en: '*The sky is* almost perfectly blue'
  id: totrans-1024
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*天空* 几乎完美地呈现蓝色。'
- en: '*The sky is* grey and dreary today'
  id: totrans-1025
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*天空* 今天灰暗而阴郁。'
- en: Temperature 5
  id: totrans-1026
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 温度 5
- en: '*The sky is* clear, the water smooth,'
  id: totrans-1027
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*天空* 晴朗，水面平静，'
- en: and it’s an unimaginably long way to go
  id: totrans-1028
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 而前方的路途漫长得难以想象。
- en: before the dolphins decide to give up their vertical quest.
  id: totrans-1029
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在海豚决定放弃垂直探索之前。
- en: The default is typically around 0.7, which gives straightforward responses with
    a bit of fizz. ChatGPT starts sounding poetic as the temperature rises, progressing
    to silliness and becoming tipsy at high temperatures.
  id: totrans-1030
  prefs: []
  type: TYPE_NORMAL
  zh: 默认值通常在 0.7 左右，这会给出直接且带有一点活力的回答。随着温度的升高，ChatGPT 开始听起来诗意，逐渐发展到愚蠢，并在高温下变得微醺。
- en: GPT 6.7 summarizes this introduction to transformers.
  id: totrans-1031
  prefs: []
  type: TYPE_NORMAL
  zh: GPT 6.7 总结了关于 Transformer 的这一介绍。
- en: GPT 6.7
  id: totrans-1032
  prefs: []
  type: TYPE_NORMAL
  zh: GPT 6.7
- en: 'Me: **Please summarize this introduction to transformers**.'
  id: totrans-1033
  prefs: []
  type: TYPE_NORMAL
  zh: 我：**请总结一下关于 Transformer 的这一介绍**。
- en: 'ChatGPT:'
  id: totrans-1034
  prefs: []
  type: TYPE_NORMAL
  zh: 'ChatGPT:'
- en: 1. **Transformers are a significant advancement in deep learning models**, having
    evolved from previous models focused on specific aspects of natural language processing,
    like speech recognition, text to speech, and language translation. However, they
    can handle all these tasks and more, which is why they are called foundational
    models.
  id: totrans-1035
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 1. **Transformer 是深度学习模型的一项重大进步**，它从之前专注于自然语言处理特定方面的模型演变而来，如语音识别、文本到语音和语言翻译。然而，它们可以处理所有这些任务以及更多，这就是为什么它们被称为基础模型。
- en: 2. **Unlike earlier models that needed separate datasets for each different
    task, transformers, much like human learning, can easily adapt between tasks.**
    This adaptability was only seen when large language models (LLMs) were developed,
    displaying a multitude of abilities, many of which were unforeseen.
  id: totrans-1036
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 2. **与需要为每个不同任务分别准备数据集的早期模型不同，Transformer，就像人类学习一样，可以轻松地在任务之间进行适应**。这种适应性只有在大型语言模型（LLM）开发出来时才被看到，它们展示了多种能力，其中许多是未预见的。
- en: 3. **Large language models, such as GPT-4, possess astonishing abilities in
    language processing which are not yet fully understood.** These abilities emerged
    as the size of transformers grew, with GPT-4 now having a trillion weights or
    parameters trained on texts with trillions of words.
  id: totrans-1037
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 3. **大型语言模型，如 GPT-4，在语言处理方面拥有令人惊叹的能力，这些能力尚未被完全理解**。随着 Transformer 大小的增长，这些能力逐渐显现，GPT-4
    现在拥有万亿个权重或参数，这些参数是在万亿词的文本上训练的。
- en: 4. **Scaling is a crucial principle in AI, impacting whether a problem-solving
    approach can be accomplished with current computers or is unfeasible**. The belief
    in neural networks’ scalability was rooted in nature as a proof of principle,
    but the realization of the computing resources needed for progress was unimagined
    at the outset.
  id: totrans-1038
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 4. **可扩展性是人工智能中的一个关键原则，影响着问题解决方法是否可以用当前计算机完成，或者是否不可行**。对神经网络可扩展性的信念根植于自然，作为原理的证明，但所需的计算资源在开始时是无法想象的。
- en: 5. **To fully comprehend transformers, it is beneficial to explore the previous
    network architectures from which they evolved**. This understanding is crucial
    since these models are the foundation upon which transformers were built. ֍
  id: totrans-1039
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 5. **要完全理解 Transformer，探索其演变的先前网络架构是有益的**。这种理解至关重要，因为这些模型是构建 Transformer 的基础。
- en: Performance Improves with Network Size
  id: totrans-1040
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 网络规模增加，性能提升
- en: 'As the president of the Neural Information Processing Systems (NeurIPS) Foundation,
    which organizes the most prominent annual AI conference, I welcomed an audience
    of 12,000 in Montreal in 2018: “Thirty years ago, when NeurIPS was a much smaller
    conference, I never imagined that I would be standing here today to welcome so
    many of you.”[18](15580-0025.xhtml#en125) Thirty years ago, we did not know how
    well neural network models would scale or how much scaling would be needed to
    solve real-world problems. We believed they could scale because cognitive capabilities
    increased as the cerebral cortex of primates expanded, a proof of principle for
    scaling. We now know that neural networks do scale beautifully. However, the amount
    of computing power needed to solve problems in vision and language was inconceivable
    to us when neural network learning algorithms were pioneered in the 1980s.'
  id: totrans-1041
  prefs: []
  type: TYPE_NORMAL
  zh: 作为组织最著名年度人工智能会议的神经信息处理系统（NeurIPS）基金会的会长，我在2018年蒙特利尔迎接了12,000名观众：“三十年前，当NeurIPS还是一个规模较小的会议时，我从未想过今天我会站在这里欢迎这么多的你们。”[18](15580-0025.xhtml#en125)
    三十年前，我们不知道神经网络模型能扩展到什么程度，也不知道解决现实世界问题需要多少扩展。我们相信它们可以扩展，因为随着灵长类动物的大脑皮层扩张，认知能力也随之增加，这是扩展的一个原理证明。我们现在知道神经网络确实可以很好地扩展。然而，当我们1980年代初期开创神经网络学习算法时，解决视觉和语言问题所需的计算能力对我们来说是难以想象的。
- en: '![](images/15580_006_fig_011.jpg)'
  id: totrans-1042
  prefs: []
  type: TYPE_IMG
  zh: '![图6.11](images/15580_006_fig_011.jpg)'
- en: Figure 6.11
  id: totrans-1043
  prefs: []
  type: TYPE_NORMAL
  zh: 图6.11
- en: Top views of brains shown on the same scale (BrainFacts.org).
  id: totrans-1044
  prefs: []
  type: TYPE_NORMAL
  zh: 大脑的顶部视图以相同比例展示（BrainFacts.org）。
- en: Brains scale with body weight. Primates have larger brains for a given body
    weight than other mammals and the cerebral cortex has greatly expanded (figure
    6.11).[19](15580-0025.xhtml#en126) The increase in the size of the cerebral cortex
    outstripped the size of the skull, resulting in many cortical folds. Among primates,
    human brains are the largest normalized for body weight. New capabilities emerged
    as primates evolved bigger brains, such as group hunting and social communication.
    Something similar has happened with deep learning networks as they increased in
    size and complexity.
  id: totrans-1045
  prefs: []
  type: TYPE_NORMAL
  zh: 大脑的规模与体重成正比。与其它哺乳动物相比，灵长类动物在给定体重下拥有更大的大脑，大脑皮层也大大扩张（图6.11）。[19](15580-0025.xhtml#en126)
    大脑皮层的增大超过了头骨的大小，导致许多皮层褶皱。在灵长类动物中，人类的大脑在体重标准化后是最大的。随着灵长类动物进化出更大的大脑，新的能力出现了，例如群体狩猎和社会交流。随着深度学习网络规模和复杂性的增加，也发生了类似的事情。
- en: How an algorithm scales with the size of a problem is a general principle in
    computing. It can determine whether an approach to solving a problem can be accomplished
    with current computers or is hopelessly impractical. As digital computing became
    billions of times more powerful over the last forty years, thresholds were reached
    where new capabilities became possible. Today, LLMs have over a trillion weights,
    parameters that are learned by training on texts with trillions of words, and,
    as they grew larger, LLMs gained new capabilities. This is illustrated in figure
    6.12[20](15580-0025.xhtml#en127) for three tasks and five different LLM architectures.
    Performance for each task is essentially at chance until a threshold is reached,
    where the performance begins to rise with a steep slope. As larger LLM are trained,
    new abilities emerge that no one anticipated, along with large improvements for
    known tasks.
  id: totrans-1046
  prefs: []
  type: TYPE_NORMAL
  zh: 算法如何随着问题规模的增长而扩展是计算中的一个普遍原则。它可以决定解决问题的方法是否可以用当前的计算机完成，或者是否毫无希望地不切实际。在过去的四十年里，随着数字计算变得数十亿倍更加强大，我们达到了新的能力成为可能的阈值。今天，LLMs拥有超过万亿的权重，这些参数是通过在包含万亿词汇的文本上进行训练而学习的，随着它们规模的扩大，LLMs获得了新的能力。这在图6.12[20](15580-0025.xhtml#en127)中通过三个任务和五种不同的LLM架构进行了说明。每个任务的性能在达到阈值之前基本上是随机的，一旦达到阈值，性能就会以陡峭的斜率开始上升。随着更大LLMs的训练，出现了没有人预料到的新能力，以及已知任务的显著改进。
- en: '![](images/15580_006_fig_012.jpg)'
  id: totrans-1047
  prefs: []
  type: TYPE_IMG
  zh: '![图6.12](images/15580_006_fig_012.jpg)'
- en: Figure 6.12
  id: totrans-1048
  prefs: []
  type: TYPE_NORMAL
  zh: 图6.12
- en: 'The ability (top left) to perform multistep arithmetic, (top right) to succeed
    on college-level exams, and (bottom left) to identify the intended meaning of
    a word in context as a function of model scale. Performance emerges from random
    guessing (dashed line) only for models of sufficiently large scale. The models
    are indicated by symbols in the box. FLOP: Floating Point Operation. (Jason Wei
    and Yi Tay, “Characterizing Emergent Phenomena in Large Language Models,” Google
    Research, November 10, 2022.)'
  id: totrans-1049
  prefs: []
  type: TYPE_NORMAL
  zh: 模型规模作为函数，模型在以下方面的能力：（左上角）执行多步算术，（右上角）在大学水平考试中取得成功，（左下角）在上下文中识别单词的意图意义。只有对于足够大规模的模型，性能才会从随机猜测（虚线）中产生。模型由框中的符号表示。FLOP：浮点运算。（贾森·魏和易泰，“大型语言模型中涌现现象的特征”，谷歌研究，2022年11月10日。）
- en: '![](images/15580_006_fig_013.jpg)'
  id: totrans-1050
  prefs: []
  type: TYPE_IMG
  zh: '![](images/15580_006_fig_013.jpg)'
- en: Figure 6.13
  id: totrans-1051
  prefs: []
  type: TYPE_NORMAL
  zh: 图 6.13
- en: Estimated computation in days used to train network models as a function of
    their publication date. A petaFLOP is 10^(15) floating point operations per second
    (a floating point operation is a single arithmetic operation such as multiplication,
    division, or addition). The vertical scale is in petaFLOP days. In 2020, GTP-3
    required 10^(12)—a million million—times more computing power to train than NETtalk
    in 1986.
  id: totrans-1052
  prefs: []
  type: TYPE_NORMAL
  zh: 训练网络模型所需的估计计算量作为其发布日期的函数。petaFLOP 是每秒 10^15 次浮点运算（浮点运算是一次算术运算，如乘法、除法或加法）。垂直刻度以
    petaFLOP 天为单位。到 2020 年，GTP-3 的训练所需的计算能力比 1986 年的 NETtalk 多了 10^12 倍——即一亿倍。
- en: Over the last decade, there has been explosive computational growth. When GPUs
    were harnessed, there was a six-fold increase in the doubling time at the inflection
    point in 2012 (figure 6.13).[21](15580-0025.xhtml#en128) As computing power continued
    to increase, networks have mushroomed in size. In 2020, GTP-3 had hundreds of
    billions of weights and was eclipsed in 2023 by GPT-4, with a trillion weights.
  id: totrans-1053
  prefs: []
  type: TYPE_NORMAL
  zh: 在过去十年中，计算能力经历了爆炸性的增长。当利用 GPU 时，2012 年拐点处的加倍时间增加了六倍（图 6.13）。[21](15580-0025.xhtml#en128)
    随着计算能力的持续增加，网络规模迅速扩大。到 2020 年，GTP-3 有数百亿个权重，到 2023 年被拥有万亿个权重的 GPT-4 所超越。
- en: The amount of computation needed to process inputs by a neural network model
    scales with the number of weights for a single central processor but is independent
    of the number of synapses in brains since they all work together in parallel.
    This is also why nature can get by with neurons and synapses working on millisecond
    time scales, a million times slower than silicon chips. Very few algorithms scale
    this well with the size of the problem. As computing power continues to increase
    exponentially (see chapter 8), it will reach the estimated computing power of
    human brains at some point in the not-too-distant future.
  id: totrans-1054
  prefs: []
  type: TYPE_NORMAL
  zh: 神经网络模型处理输入所需的计算量与单个中央处理器中的权重数量成正比，但与大脑中的突触数量无关，因为它们都并行工作。这也是为什么自然界可以用神经元和突触在毫秒时间尺度上工作，比硅芯片慢一百万倍。非常少的算法能够如此好地与问题规模成比例。随着计算能力的指数级增长（见第
    8 章），它将在不太遥远的未来达到人类大脑估计的计算能力。
- en: This section is summarized in GPT 6.8.
  id: totrans-1055
  prefs: []
  type: TYPE_NORMAL
  zh: 本节内容已在 GPT 6.8 中总结。
- en: GPT 6.8
  id: totrans-1056
  prefs: []
  type: TYPE_NORMAL
  zh: GPT 6.8
- en: 'Me: **Please summarize Performance Improves with Network Size.**'
  id: totrans-1057
  prefs: []
  type: TYPE_NORMAL
  zh: 我：**请总结“随着网络规模的增加，性能提升”的内容。**
- en: 'ChatGPT:'
  id: totrans-1058
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT：
- en: In 2018, the President of the Neural Information Processing Systems (NeurIPS)
    Foundation addressed an audience of 12,000 at their annual AI Conference in Montreal,
    reflecting on the growth and evolution of neural networks over the past 30 years.
    Back then, the potential of neural networks and the required computational power
    for real-world problems were uncertain. The belief was that neural networks could
    scale, drawing parallels to how cognitive abilities increased with the expansion
    of the cerebral cortex in primates.
  id: totrans-1059
  prefs: []
  type: TYPE_NORMAL
  zh: 2018 年，神经信息处理系统（NeurIPS）基金会主席在蒙特利尔的年度人工智能会议上向 12,000 名听众发表演讲，回顾了过去 30 年神经网络的增长和演变。当时，神经网络在现实世界问题中的潜力和所需的计算能力是不确定的。人们相信神经网络可以扩展，将其与灵长类动物大脑皮层扩张时认知能力增加的情况相比较。
- en: Today, it’s evident that neural networks scale effectively. The computational
    power needed today was unimaginable in the 1980s when these algorithms were first
    introduced. Just as primates, especially humans, evolved larger brains leading
    to new capabilities like group hunting and social communication, deep learning
    networks have similarly grown in size and complexity, offering new capabilities.
  id: totrans-1060
  prefs: []
  type: TYPE_NORMAL
  zh: 今天，神经网络的有效可扩展性是显而易见的。今天所需的计算能力在1980年代这些算法首次引入时是无法想象的。正如灵长类动物，尤其是人类，通过进化更大的大脑而获得新的能力，如群体狩猎和社会交流一样，深度学习网络在规模和复杂性上也有所增长，提供了新的能力。
- en: The relationship between brain and body weight shows that primates, especially
    humans, have larger brains relative to their body weight compared with other mammals.
    This evolution in brain size in primates mirrors the growth and capabilities of
    deep learning networks.
  id: totrans-1061
  prefs: []
  type: TYPE_NORMAL
  zh: 大脑与体重之间的关系表明，与其它哺乳动物相比，灵长类动物，尤其是人类，拥有相对于其体重更大的大脑。这种灵长类动物大脑大小的进化与深度学习网络的成长和能力相呼应。
- en: The scalability of an algorithm is a crucial principle across various fields.
    As digital computers have become more powerful, new capabilities have emerged.
    Modern language learning models (LLMs) now have over a trillion parameters, trained
    on vast amounts of data. Their performance improves significantly once they reach
    a certain size threshold, even in tasks that weren’t initially anticipated.
  id: totrans-1062
  prefs: []
  type: TYPE_NORMAL
  zh: 算法的可扩展性是各个领域的一个关键原则。随着数字计算机变得越来越强大，新的能力也随之出现。现代语言学习模型（LLMs）现在拥有超过一万亿的参数，这些模型在大量数据上进行了训练。一旦它们达到一定的规模阈值，它们的性能就会显著提高，即使在最初并未预料到的任务中也是如此。
- en: In the past decade, computational growth has been rapid, especially after the
    integration of GPUs in 2012\. Networks have grown, and the performance of LLMs,
    like GPT-3 and GPT-4, has accelerated, with the latter having a trillion weights.
    The computational power required for neural network models, known as inference,
    scales with the number of weights. Interestingly, nature manages with slower neurons
    and synapses because they operate in parallel, unlike silicon chips. Few algorithms
    scale as effectively with problem size. If this computational growth continues,
    it might soon match the estimated computing power of the human brain. ֍
  id: totrans-1063
  prefs: []
  type: TYPE_NORMAL
  zh: 在过去十年中，计算能力增长迅速，尤其是在2012年GPU集成之后。网络规模扩大，LLMs（如GPT-3和GPT-4）的性能加速，后者拥有万亿个权重。神经网络模型所需的计算能力，即推理，与权重的数量成正比。有趣的是，自然界通过较慢的神经元和突触来管理，因为它们是并行操作的，这与硅芯片不同。很少有算法在问题规模上具有如此有效的可扩展性。如果这种计算增长持续下去，它可能很快就会达到人类大脑估计的计算能力。
- en: '7'
  id: totrans-1064
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '7'
- en: High-Dimensional Mathematics
  id: totrans-1065
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 高维数学
- en: How LLMs can engage in dialog with humans is a mystery. Mathematics is one of
    the most remarkable achievements of our species. It can help us navigate the mysteries
    of LLMs and brains. Deep learning networks are just complex mathematical functions
    that are entirely transparent and amenable to mathematical analysis. A new era
    in mathematics is dawning in exploring the geometric and statistical properties
    of high-dimensional spaces where these network models live. This chapter has a
    lot more mathematical jargon than previous chapters, so I asked ChatGPT to help
    by summarizing key points along the way, which, for some readers, may be easier
    to understand than me.
  id: totrans-1066
  prefs: []
  type: TYPE_NORMAL
  zh: LLMs如何与人类进行对话仍然是一个谜。数学是我们物种最显著的成就之一。它可以帮助我们探索LLMs和大脑的奥秘。深度学习网络只是完全透明且易于数学分析的复杂数学函数。在探索这些网络模型所在的高维空间几何和统计性质的新时代正在到来。这一章比之前的章节有更多的数学术语，所以我请ChatGPT在过程中总结关键点，对于一些读者来说，这可能比我更容易理解。
- en: 'In 1884, Edwin Abbott wrote *Flatland: A Romance of Many Dimensions* (figure
    7.1).[1](15580-0025.xhtml#en129) This book was a satire on Victorian society,
    and it also explored how dimensionality can change our intuitions about space.
    Flatland was a two-dimensional world inhabited by geometrical creatures. These
    creatures fully understood the mathematics of two dimensions: geometrical objects
    had social ranking, with circles being more perfect than triangles. In it, a gentleman
    square dreams about a three-dimensional sphere, a circle in Flatland, and wakes
    up to the possibility that his universe might be much larger than he or anyone
    in Flatland could imagine. He could not convince anyone that this was possible,
    and in the end, he was institutionalized.'
  id: totrans-1067
  prefs: []
  type: TYPE_NORMAL
  zh: 在1884年，爱德华·艾博特写了《平面国：许多维度的罗曼史》（图7.1）。[1](15580-0025.xhtml#en129)这本书是对维多利亚时代社会的讽刺，同时也探讨了维度如何改变我们对空间的直觉。平面国是一个由几何生物居住的二维世界。这些生物完全理解二维的数学：几何物体有社会等级，圆比三角形更完美。在书中，一位绅士正方形梦见了一个三维的球体，在平面国中是一个圆，醒来后意识到他的宇宙可能比他或平面国中的任何人想象的都要大。他无法说服任何人这是可能的，最后，他被送进了精神病院。
- en: We can easily imagine what happens when going from a one- to a two-dimensional
    world and from a two- to a three-dimensional world. Lines can intersect in two
    dimensions, and sheets can fold back onto themselves in three dimensions. Imagining
    how a three-dimensional object can fold back on itself in a four-dimensional space
    is not intuitive but was achieved by Charles Howard Hinton in the nineteenth century,
    which gave him an intuitive sense for how objects behave in the fourth dimension.[2](15580-0025.xhtml#en130)
    What are the properties of spaces having even higher dimensions? What is it like
    to live in a space with one hundred dimensions? Or a million dimensions? Or a
    space like our brain with a hundred billion dimensions (the number of neurons)?
    Dimensionality is a term that is used to describe the space we live in. The same
    term is used by mathematicians to describe abstract spaces, like the space of
    neurons in the brain space and the space of weights in a network.
  id: totrans-1068
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以很容易地想象从一维到二维世界，以及从二维到三维世界的变化。在二维空间中，线条可以相交，而在三维空间中，薄片可以折叠回自身。想象一个三维物体如何在四维空间中折叠回自身并不直观，但查尔斯·霍华德·亨顿在19世纪就做到了，这使他对于物体在第四维度的行为有了直观的认识。[2](15580-0025.xhtml#en130)具有更高维度的空间的性质是什么？在一个一百维度的空间中生活是什么样的？或者在一个一百万维度的空间中？或者像我们的大脑那样，拥有万亿维度的空间（神经元数量）？维度是一个用来描述我们所处空间的术语。数学家也用这个术语来描述抽象空间，比如大脑空间中的神经元空间和网络中的权重空间。
- en: '![](images/15580_007_fig_001.jpg)'
  id: totrans-1069
  prefs: []
  type: TYPE_IMG
  zh: '![](images/15580_007_fig_001.jpg)'
- en: Figure 7.1
  id: totrans-1070
  prefs: []
  type: TYPE_NORMAL
  zh: 图7.1
- en: 'Cover of the 1884 edition of *Flatland: A Romance in Many Dimensions* by Edwin
    A. Abbott. Inhabitants were two-dimensional shapes, with their rank in society
    determined by the number of sides.'
  id: totrans-1071
  prefs: []
  type: TYPE_NORMAL
  zh: 爱德华·A·艾博特所著《平面国：许多维度的罗曼史》1884年版的封面。居民是二维形状，他们的社会地位由边的数量决定。
- en: 'The first NeurIPS Conference and Workshop occurred at the Denver Tech Center
    in 1987\. The 600 attendees were from various disciplines, including physics,
    neuroscience, psychology, statistics, electrical engineering, computer science,
    computer vision, speech recognition, and robotics. But they all had something
    in common: they worked on difficult problems, intractable with traditional methods.
    Consequently, they tended to be outliers in their home disciplines. In retrospect,
    thirty-seven years later, these pioneers were pushing the frontiers of their fields
    into high-dimensional spaces populated by big datasets, the world we live in today.
    The annual NeurIPS conferences increased in size each year as new advance occurred.
    I witnessed the remarkable evolution of a community that created modern machine
    learning. NeurIPS has grown more rapidly recently and in 2023, more than 16,000
    participants attended in New Orleans. Many intractable problems eventually became
    tractable, and today, machine learning serves as a foundation for contemporary
    AI.'
  id: totrans-1072
  prefs: []
  type: TYPE_NORMAL
  zh: 首届NeurIPS会议和研讨会于1987年在丹佛技术中心举行。600名与会者来自各个学科，包括物理学、神经科学、心理学、统计学、电气工程、计算机科学、计算机视觉、语音识别和机器人技术。但他们都有一个共同点：他们都致力于解决传统方法难以解决的难题。因此，他们在各自领域往往被视为异类。回顾过去，三十七年后，这些先驱们正在将他们所在领域的边界推向由大数据集组成的高维空间，这正是我们今天生活的世界。随着新进展的不断出现，NeurIPS年度会议的规模逐年扩大。我见证了创建现代机器学习社区的显著演变。NeurIPS最近发展迅速，到2023年，在路易斯安那州新奥尔良，有超过16,000名参与者参加。许多原本难以解决的问题最终变得可解，如今，机器学习已成为当代人工智能的基础。
- en: The early goals of machine learning were more modest than those of artificial
    intelligence. Rather than aim directly at general intelligence, machine learning
    started by attacking practical problems in perception, language, motor control,
    prediction, and inference using learning from data as the primary tool. In contrast,
    early AI researchers handcrafted algorithms with few parameters that did not require
    large datasets. However, this approach worked only for well-controlled environments.
    For example, in Blocks World, an early attempt to play the children’s game of
    stacking blocks, all objects were rectangular solids, identically painted, and
    in an environment with fixed lighting. These algorithms did not scale up to real-world
    vision, where things have complex shapes, a wide range of reflectances, and uncontrolled
    lighting conditions. The real world is textured, kinetic and hard to pin down,
    and there may not be any simple models that can fit it.[3](15580-0025.xhtml#en131)
    Similar problems were encountered with early models of natural languages based
    on symbols and syntax, which ignored the complexities of semantics.[4](15580-0025.xhtml#en132)
    Practical natural language applications became possible once the complexity of
    deep learning language models approached the complexity of the real world. The
    rise of LLMs is a vindication of this approach.
  id: totrans-1073
  prefs: []
  type: TYPE_NORMAL
  zh: 机器学习的早期目标比人工智能更为谦逊。机器学习并没有直接追求通用智能，而是从使用数据学习作为主要工具开始，攻击感知、语言、运动控制、预测和推理等实际问题。相比之下，早期的AI研究人员手工制作了参数很少的算法，这些算法不需要大量数据集。然而，这种方法只在受控环境中有效。例如，在积木世界中，这是早期尝试玩儿童堆叠积木游戏的尝试，所有物体都是相同的矩形固体，颜色相同，并且在一个固定照明的环境中。这些算法无法扩展到现实世界的视觉中，现实世界中的事物形状复杂，反射范围广泛，照明条件不受控制。现实世界是纹理化的、动态的，难以捉摸，可能没有简单的模型可以适应它。[3](15580-0025.xhtml#en131)
    类似的问题也出现在基于符号和语法的早期自然语言模型中，这些模型忽略了语义的复杂性。[4](15580-0025.xhtml#en132) 只有当深度学习语言模型的复杂性接近现实世界的复杂性时，实用的自然语言应用才成为可能。LLMs的兴起是对这种方法的肯定。
- en: Lost in Parameter Space
  id: totrans-1074
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 迷失在参数空间中
- en: Empirical discoveries from neural network learning uncovered several unexplained
    paradoxes. Mathematics will help us understand how they work.
  id: totrans-1075
  prefs: []
  type: TYPE_NORMAL
  zh: 从神经网络学习中的经验发现揭示了几个未解释的悖论。数学将帮助我们理解它们是如何工作的。
- en: 'Paradox 1: Trapped in Local Minima'
  id: totrans-1076
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 矛盾1：陷入局部最优
- en: Networks are trained by a process called gradient descent, familiar to skiers
    who ski down a mountain by following close to the fall line. A loss function of
    a neural network is like a mountain range and the height of a mountain is a measure
    of the total error on the training set. Learning aims to reduce the loss function
    by making many small weight changes. Loss functions have ruts, ravines, and many
    local minima that are like mountain lakes. Experts in optimization theory told
    us that by incrementally reducing the error we would inevitably get trapped in
    local minima,[5](15580-0025.xhtml#en133) and we would never be able to reach the
    global minimum. Our learning algorithms used stochastic gradient descent, a slow
    process with a random component that did not always head directly downhill and
    was less accurate but avoided local minima.[6](15580-0025.xhtml#en134) There were
    plateaus on the way down when the error hardly changed, followed by drops. Something
    about these network models and the geometry of their high-dimensional parameter
    spaces allowed them to navigate efficiently to solutions and achieve good generalization,
    contrary to the failures predicted by conventional intuition in low-dimensional
    spaces.
  id: totrans-1077
  prefs: []
  type: TYPE_NORMAL
  zh: 网络是通过称为梯度下降的过程进行训练的，这对于滑雪者来说很熟悉，他们通过紧贴下坡线滑雪下山。神经网络的损失函数就像山脉，而山峰的高度是训练集上总误差的度量。学习的目标是通过进行许多小的权重调整来降低损失函数。损失函数有沟壑、峡谷和许多局部最小值，就像山湖一样。优化理论专家告诉我们，通过逐步减少误差，我们不可避免地会陷入局部最小值[5](15580-0025.xhtml#en133)，并且我们永远无法达到全局最小值。我们的学习算法使用了随机梯度下降，这是一个带有随机成分的缓慢过程，它并不总是直接向下，因此准确性较低，但可以避免局部最小值[6](15580-0025.xhtml#en134)。在下坡的过程中，当误差几乎没有变化时，会出现平台期，随后是下降。这些网络模型及其高维参数空间的几何形状使得它们能够有效地导航到解决方案，并实现良好的泛化，这与低维空间中传统直觉预测的失败相反。
- en: We now know why the experts were wrong. Network models have different dynamical
    properties in high-dimensional spaces than in low-dimensional spaces. Local minima
    during learning are rare in high-dimensional parameter spaces, and saddle points
    are widespread.[7](15580-0025.xhtml#en135) When there are millions of paths, finding
    one that goes downhill in the error function is not difficult. Another reason
    good solutions were found so easily is that, unlike low-dimensional models where
    a unique solution is sought, stochastic gradient descent starting from random
    points in parameter space converged to many different networks, all with good
    performance. The degeneracy of solutions changes the nature of the problem from
    finding a needle in a haystack to finding a needle in a haystack of needles.[8](15580-0025.xhtml#en136)
    Similarly, the brain of every human is unique because we all start from different
    initial connection strengths. Despite having different detailed patterns of connections,
    similar experiences will lead to common behaviors, and different experiences specialize
    each brain in a different way.
  id: totrans-1078
  prefs: []
  type: TYPE_NORMAL
  zh: 我们现在知道为什么专家们错了。网络模型在高维空间中的动态属性与低维空间中的不同。在学习过程中，高维参数空间中的局部最小值很少，鞍点却很普遍[7](15580-0025.xhtml#en135)。当有数百万条路径时，找到一条在误差函数中向下走的路径并不困难。另一个原因是，与在低维模型中寻求唯一解不同，从参数空间中的随机点开始的随机梯度下降收敛到许多不同的网络，所有这些网络都具有良好的性能。解的退化改变了问题的本质，从在干草堆里找针变成了在针堆里找针[8](15580-0025.xhtml#en136)。同样，每个人的大脑都是独一无二的，因为我们都是从不同的初始连接强度开始的。尽管我们都有不同的详细连接模式，但相似的经历会导致共同的行为，而不同的经历则以不同的方式使每个大脑专业化。
- en: 'Paradox 2: Too Many Parameters'
  id: totrans-1079
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 矛盾2：参数过多
- en: How much data is needed to train a network model? By the standards of statistical
    learning, our network models in the 1980s were highly overparameterized. Even
    though the networks were tiny by today’s standards, they had thousands of parameters,
    hundreds of times more than traditional statistical models. According to bounds
    from statistical theorems, generalization should not be possible with the relatively
    small training sets available and large number of parameters. But even simple
    methods, such as weight decay,[9](15580-0025.xhtml#en137) reduced the effective
    number of parameters by shrinking nonessential parameters to zero, leading to
    models with surprisingly good generalization.
  id: totrans-1080
  prefs: []
  type: TYPE_NORMAL
  zh: 需要多少数据来训练网络模型？按照统计学习标准，我们20世纪80年代的神经网络模型高度过参数化。尽管按照今天的标准，这些网络很小，但它们有数千个参数，是传统统计模型的数百倍。根据统计定理的界限，在相对较小的训练集和大量参数的情况下，泛化应该是不可能的。但即使是简单的方法，如权重衰减[9](15580-0025.xhtml#en137)，通过将非必要参数缩小到零来减少有效参数的数量，也导致了具有出奇好泛化能力的模型。
- en: Even more surprising, as network models increased in size, generalization continued
    to improve. What no one knew back in the 1980s was how well the performance of
    neural network learning algorithms would scale with the number of units and weights
    in the network. The computing time that many algorithms need rises very rapidly
    with the number of parameters. In contrast, training neural networks scales linearly
    with the number of parameters, improving performance as more units and layers
    are added.[10](15580-0025.xhtml#en138)
  id: totrans-1081
  prefs: []
  type: TYPE_NORMAL
  zh: 更令人惊讶的是，随着网络模型规模的增加，泛化能力持续提高。在20世纪80年代，没有人知道神经网络学习算法的性能将如何随着网络中单元和权重的数量而扩展。许多算法所需的计算时间随着参数数量的增加而非常迅速地上升。相比之下，训练神经网络与参数数量的线性关系，随着更多单元和层的添加而提高性能。[10](15580-0025.xhtml#en138)
- en: We had broken through a barrier and entered a new era that was not anticipated
    by previous statistical theories. Figure 7.2 shows what happens to learning as
    the number of parameters increases in large network models. The training error
    eventually approaches zero if a network is sufficiently large, while the testing
    error starts increasing as the model overfits the data, as predicted by classical
    statistics. Unexpectedly, for even larger network models, the testing error reverses
    and continues to fall with excellent generalization, the opposite of overfitting.
    This double descent of the test error is not yet fully understood.[11](15580-0025.xhtml#en139)
  id: totrans-1082
  prefs: []
  type: TYPE_NORMAL
  zh: 我们已经突破了一个障碍，进入了一个新的时代，这个时代是之前的统计理论所没有预见的。图7.2展示了在大规模网络模型中，随着参数数量的增加，学习会发生什么。如果网络足够大，训练误差最终会接近零，而测试误差开始增加，正如经典统计学所预测的，因为模型过度拟合了数据。出乎意料的是，对于更大的网络模型，测试误差反而逆转，并随着优秀的泛化能力继续下降，这是过度拟合的对立面。这种测试误差的双重下降现象尚未完全理解。[11](15580-0025.xhtml#en139)
- en: '![](images/15580_007_fig_002.jpg)'
  id: totrans-1083
  prefs: []
  type: TYPE_IMG
  zh: '![图片](images/15580_007_fig_002.jpg)'
- en: Figure 7.2
  id: totrans-1084
  prefs: []
  type: TYPE_NORMAL
  zh: 图7.2
- en: How performance of trained networks varies with model size (model complexity).
    For (smaller) networks in the classical regime, overfitting occurs with increasing
    network size after an inflection in the test error, but in the modern regime,
    the performance of (larger) overparametrized models continues to improve despite
    having excess capacity. This is called double descent.
  id: totrans-1085
  prefs: []
  type: TYPE_NORMAL
  zh: 训练网络的性能如何随着模型大小（模型复杂性）的变化而变化。在经典状态下（较小的）网络中，测试误差发生拐点后，随着网络大小的增加会发生过度拟合，但在现代状态下，（较大的）过参数化模型的性能尽管有额外的容量，但仍然继续提高。这被称为双重下降。
- en: The Blessing of High-Dimensional Spaces
  id: totrans-1086
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 高维空间的祝福
- en: We live in a low-dimensional space of three spatial dimensions and one time
    dimension that guides our intuitions. As we explore high-dimensional spaces, we
    discover that many of our intuitions are wrong, as these two paradoxes illustrate.
    There are, however, problems that get more difficult as dimensionality increases.
    In dynamic programming, a method for finding sequences of choices to optimize
    problems like air route scheduling, Richard Bellman found that problems get exponentially
    more difficult as the problem’s dimensionality increases in size, which he called
    the curse of dimensionality. In deep learning, difficult problems get easier to
    solve as the dimensionality of the space increases, a blessing of dimensionality.
  id: totrans-1087
  prefs: []
  type: TYPE_NORMAL
  zh: 我们生活在一个三维空间和一个时间维度的低维空间中，这个空间引导着我们的直觉。当我们探索高维空间时，我们发现许多直觉都是错误的，正如这两个悖论所展示的。然而，随着维度的增加，有些问题会变得更加困难。在动态规划中，寻找优化诸如航班调度等问题选择序列的方法，理查德·贝尔曼发现，随着问题维度规模的增加，问题会呈指数级变得更加困难，他将这称为维度诅咒。在深度学习中，随着空间维度的增加，难题变得更容易解决，这是维度的一个祝福。
- en: The paradox of dimensionality is summarized in GPT 7.1.
  id: totrans-1088
  prefs: []
  type: TYPE_NORMAL
  zh: 维度悖论在GPT 7.1中进行了总结。
- en: GPT 7.1
  id: totrans-1089
  prefs: []
  type: TYPE_NORMAL
  zh: GPT 7.1
- en: 'Me: **Please summarize this discussion on the number of parameters**.'
  id: totrans-1090
  prefs: []
  type: TYPE_NORMAL
  zh: 我：**请总结一下关于参数数量的讨论**。
- en: 'ChatGPT: Certainly! The text “Lost in Parameter Space” discusses the evolution
    and understanding of neural network models, particularly focusing on the paradoxes
    and misconceptions that were present in the early stages of their development.
    Here are three key points summarized from the text:'
  id: totrans-1091
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT：当然！《迷失在参数空间》讨论了神经网络模型的演变和理解，特别是关注它们早期发展阶段存在的悖论和误解。以下是文中总结的三个关键点：
- en: '1. **Overparameterization and Generalization Paradox**: In the 1980s, neural
    network models were highly overparameterized compared to traditional statistical
    models, containing hundreds of times more parameters. This led to a paradox where,
    according to statistical theorems, generalization should not have been possible
    with the small training sets available. However, methods like weight decay allowed
    for surprisingly good generalization by reducing the effective number of parameters.'
  id: totrans-1092
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 1. **过参数化和泛化悖论**：在20世纪80年代，与传统的统计模型相比，神经网络模型高度过参数化，参数数量多出数百倍。这导致了一个悖论，根据统计定理，由于训练集很小，泛化应该是不可能的。然而，像权重衰减这样的方法通过减少有效参数数量，出人意料地实现了良好的泛化。
- en: '2. **Misconceptions about Non-Convex Loss Functions**: Experts in optimization
    theory believed that reaching the global minimum in non-convex loss functions
    would be impossible due to the presence of many local minima. The use of stochastic
    gradient descent, a slow and seemingly inaccurate process, was thought to be prone
    to getting trapped in local minima. Contrary to this belief, neural network models
    were able to navigate efficiently to solutions and achieve good generalization.'
  id: totrans-1093
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 2. **关于非凸损失函数的误解**：优化理论专家认为，由于存在许多局部极小值，在非凸损失函数中达到全局最小值是不可能的。使用随机梯度下降，一个缓慢且看似不准确的过程，被认为容易陷入局部极小值。与这种信念相反，神经网络模型能够有效地导航到解决方案，并实现良好的泛化。
- en: '3. **Understanding High-Dimensional Parameter Spaces**: The text reveals that
    the experts’ misconceptions were rooted in the differences between high-dimensional
    and low-dimensional spaces. In high-dimensional parameter spaces, local minima
    are rare, and most critical points are saddle points, allowing many paths to find
    a downhill error. Additionally, overparameterization and the degeneracy of solutions
    change the nature of the problem, making it easier to find good solutions. This
    shifts the challenge from finding a “needle in a haystack” to finding “needle
    in a haystack of needles.”'
  id: totrans-1094
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 3. **理解高维参数空间**：文章揭示，专家的错误观念源于高维空间和低维空间之间的差异。在高维参数空间中，局部极小值很少见，大多数关键点都是鞍点，允许许多路径找到下降错误。此外，过参数化和解的退化改变了问题的本质，使得找到好的解变得更容易。这把挑战从在“针尖上找针”转变为在“针尖堆里找针”。
- en: Overall, the text sheds light on the early complexities and misunderstandings
    of neural network models and how a deeper understanding of high-dimensional spaces
    has clarified these issues. ֍
  id: totrans-1095
  prefs: []
  type: TYPE_NORMAL
  zh: 总体而言，这篇文章揭示了神经网络模型早期复杂性和误解，以及如何通过更深入地理解高维空间来澄清这些问题。
- en: It takes generations of mathematicians to explore a new class of functions fully.
    For example, in 1807, Joseph Fourier discovered a way to solve the heat equation
    by summing a series of simple functions, now called a Fourier series. However,
    he could not prove convergence, and leading mathematicians in his era questioned
    their status as functions.[12](15580-0025.xhtml#en140) This did not stop engineers
    from using Fourier series to solve the heat equation and other practical problems.
    Studying this class of functions led to deep insights into functional analysis,
    a jewel in the crown of mathematics. Deep learning networks and transformers are
    a new class of functions whose mathematical analysis is just beginning and may
    lead to a new branch of mathematics.
  id: totrans-1096
  prefs: []
  type: TYPE_NORMAL
  zh: 需要几代数学家才能完全探索一类新函数。例如，1807年，约瑟夫·傅里叶发现了一种通过求和一系列简单函数来解决热方程的方法，现在称为傅里叶级数。然而，他无法证明其收敛性，他那个时代的领先数学家质疑了这些函数的地位。[12](15580-0025.xhtml#en140)
    这并没有阻止工程师使用傅里叶级数来解决热方程和其他实际问题。研究这类函数导致了对于泛函分析深入的理解，这是数学王冠上的宝石。深度学习网络和转换器是一类新的函数，其数学分析才刚刚开始，可能将导致数学的一个新分支。
- en: The Geometry of Large Neural Networks
  id: totrans-1097
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 大型神经网络几何
- en: Our empirical exploration of learning in neural network models in the 1980s
    led to surprises that took forty years to explain mathematically. The question
    that remains is how neural networks learn how to represent the information invariantly,
    making it possible to recognize objects, answer questions, and understand complex
    concepts. This is called the representation problem. We can ask the same questions
    about brains as well as LMMs.
  id: totrans-1098
  prefs: []
  type: TYPE_NORMAL
  zh: 我们在20世纪80年代对神经网络模型中学习的实证探索带来了四十年后才得以数学解释的惊喜。剩下的问题是神经网络如何学习以不变的方式表示信息，使其能够识别物体、回答问题和理解复杂概念。这被称为表示问题。我们也可以对大脑以及LMMs提出同样的问题。
- en: 'The example in figure 7.3 shows the trajectories of neural activity in the
    cortex of a monkey trained to rotate a crank.[13](15580-0025.xhtml#en141) Many
    neurons were simultaneously recorded from two different areas of the motor cortex:
    the primary motor cortex, which projects to the spinal cord and executes motor
    commands, and another cortical area, called the supplementary motor cortex, where
    actions are planned and sent to the primary motor cortex. The activity of the
    neural populations can be visualized as a trajectory in a high-dimensional space,
    with each dimension representing the activity of one neuron. The neural activities
    vary during a task, and the brain state follows a dynamic trajectory through the
    space. These recordings are visualized by projecting them to lower-dimensional
    images, a mathematical process called dimensionality reduction (figure 7.3).'
  id: totrans-1099
  prefs: []
  type: TYPE_NORMAL
  zh: 图7.3中的示例展示了训练旋转曲柄的猴子大脑皮层中神经活动的轨迹。[13](15580-0025.xhtml#en141) 从运动皮层的两个不同区域同时记录了许多神经元：一个是主要的运动皮层，它投射到脊髓并执行运动命令；另一个皮层区域被称为辅助运动皮层，在这里规划动作并发送到主要的运动皮层。神经群体的活动可以可视化为高维空间中的一个轨迹，每个维度代表一个神经元的活性。在任务过程中，神经活动会发生变化，大脑状态会随着动态轨迹在空间中移动。这些记录通过投影到低维图像来可视化，这是一个称为降维的数学过程（图7.3）。
- en: '![](images/15580_007_fig_003a.jpg)'
  id: totrans-1100
  prefs: []
  type: TYPE_IMG
  zh: '![图7.3](images/15580_007_fig_003a.jpg)'
- en: '![](images/15580_007_fig_003b.jpg)'
  id: totrans-1101
  prefs: []
  type: TYPE_IMG
  zh: '![图7.3](images/15580_007_fig_003b.jpg)'
- en: '![](images/15580_007_fig_003c.jpg)'
  id: totrans-1102
  prefs: []
  type: TYPE_IMG
  zh: '![图7.3](images/15580_007_fig_003c.jpg)'
- en: Figure 7.3
  id: totrans-1103
  prefs: []
  type: TYPE_NORMAL
  zh: 图7.3
- en: (A) The monkey is trained to turn a crank that moves the monkey through a virtual
    environment. The money is instructed to turn the crank between one and seven times
    on each trial. (B) The vertical and horizontal velocities are the same across
    the number of cycles. (Middle) Firing rates from a large population of neurons
    are recorded and projected into a three-dimensional space. The darkness of the
    trajectory indicates the number of the cycle. (Bottom) The trajectory of neural
    activity in primary motor cortex. (Next page) The trajectory of neural activity
    for the planning motor cortex. Dimensionality reduction compressed as much variability
    as possible into a small number of dimensions called the principal components,
    the three most important PCs on the three axes of these graphs.
  id: totrans-1104
  prefs: []
  type: TYPE_NORMAL
  zh: (A) 猴子被训练转动一个曲柄，使猴子通过一个虚拟环境移动。猴子被指示在每个试验中转动曲柄一次到七次。(B) 垂直和水平速度在周期数上是相同的。(中间)
    记录了大量神经元的活动率，并将其投影到三维空间中。轨迹的黑暗程度表示周期的数量。(底部) 初级运动皮层中神经活动轨迹。 (下一页) 计划运动皮层中神经活动轨迹。降维将尽可能多的变异性压缩到称为主成分的少数几个维度中，这些图的三轴上的三个最重要的PC。
- en: The task performed by the monkey was to turn the crank between one and seven
    times, so it had to track how many times it had turned it. In the primary motor
    cortex, the trajectory on each cycle (shown in different shades of gray) looks
    the same—circular trajectories that mirror the circular arm movements—and, consequently,
    contain little information about the number of cycles. However, in the planning
    part of the motor cortex, the trajectories of the cycles are separated (figure
    7.4),[14](15580-0025.xhtml#en142) which means that in this cortical area, the
    activity patterns in the neurons are different on each cycle. The motor cortex
    entangles the cycles because the motor actions they transmit downstream to the
    muscles on each cycle are very similar. But the monkey can track how many cycles
    have been made in the planning part of the motor cortex, a process called disentanglement.
  id: totrans-1105
  prefs: []
  type: TYPE_NORMAL
  zh: 猴子执行的任务是在一次和七次之间转动曲柄，因此它必须跟踪它转动了多少次。在初级运动皮层中，每个周期上的轨迹（以不同灰度显示）看起来相同——圆形轨迹，反映了圆形的手臂运动——因此，关于周期数的信
    息很少。然而，在运动皮层的计划部分，周期的轨迹是分开的（图7.4），[14](15580-0025.xhtml#en142)，这意味着在这个皮层区域，每个周期神经元的活动模式都不同。运动皮层将周期纠缠在一起，因为它们在每个周期向下游肌肉传递的运动动作非常相似。但猴子可以在运动皮层的计划部分跟踪已经完成的周期数，这个过程称为解纠缠。
- en: '![](images/15580_007_fig_004.jpg)'
  id: totrans-1106
  prefs: []
  type: TYPE_IMG
  zh: '![图7.4](images/15580_007_fig_004.jpg)'
- en: Figure 7.4
  id: totrans-1107
  prefs: []
  type: TYPE_NORMAL
  zh: 图7.4
- en: Mapping (downward arrows) of patches on a three-dimensional manifold with curved
    shapes into flat Euclidean spaces. This procedure can be generalized to higher-dimensional
    spaces, which are not as easy to visualize.
  id: totrans-1108
  prefs: []
  type: TYPE_NORMAL
  zh: 将三维曲面的补丁（向下箭头）映射到平坦的欧几里得空间。此过程可以推广到更高维的空间，这些空间不易于可视化。
- en: When a task is repeated, the activity trajectories are different but still confined
    to bundles of trajectories in the high-dimensional space. What is the dimensionality
    of these bundles? With millions of neurons involved in multiple brain areas, you
    might guess a very high number. It was a surprise when lab after lab reported
    in task after task that the bundles had four to six dimensions. That is still
    higher than we can imagine, but far less than expected. Without the technology
    for recording from many neurons simultaneously, we could not detect the dimensionality
    of these trajectories.
  id: totrans-1109
  prefs: []
  type: TYPE_NORMAL
  zh: 当一个任务重复进行时，活动轨迹不同，但仍然局限于高维空间中的轨迹束。这些束的维度是多少？当实验室在多个任务中报告，这些束具有四到六个维度时，这让人感到惊讶。这仍然比我们想象的要高，但远低于预期。如果没有记录许多神经元的同时技术，我们就无法检测这些轨迹的维度。
- en: In retrospect, the low-dimensionality of brain activity during some tasks could
    have been predicted since the brain has many movements that are executed with
    the same neurons without mixing them up, and one way to accomplish this is to
    use a different low-dimensional bundles for each task, which is learned. The arm
    motion you use to serve a tennis ball is different from the one you use to throw
    a baseball, even though the same muscles are activated. These are still early
    days, and not all cortical areas have been analyzed. The same dynamics may occur
    in the prefrontal cortex, where thoughts are dynamical trajectories in low-dimensional
    concept bundles. Figure 7.3 shows what bundles of trajectories looks like.
  id: totrans-1110
  prefs: []
  type: TYPE_NORMAL
  zh: 回顾起来，某些任务中大脑活动的低维性可能已经被预测，因为大脑有许多运动是由相同的神经元执行而不混淆的，而实现这一点的其中一种方法是为每个任务使用不同的低维束，这是通过学习实现的。你用来发球和用来投球的臂部动作是不同的，尽管激活了相同的肌肉。这些仍然处于早期阶段，并不是所有的皮层区域都已被分析。同样的动态可能也发生在前额叶皮层，那里的思维是低维概念束中的动态轨迹。图7.3展示了轨迹束的形态。
- en: Mathematicians know a lot about the geometry of trajectories called manifolds.
    They can help us develop a theory of thinking based on better explanations than
    those based solely on words. For a visual intuition into manifolds, see figure
    7.4.[15](15580-0025.xhtml#en143) Manifolds have many interesting properties and
    can be either smooth or not, depending on the context and the properties being
    studied. The study of manifolds has led to the development of several branches
    of mathematics, such as differential geometry, algebraic geometry, and differential
    topology, as well as applications in physics, particularly in general relativity
    and string theory. Someday, brains will be added to this list.
  id: totrans-1111
  prefs: []
  type: TYPE_NORMAL
  zh: 数学家对轨迹的几何学，即流形的几何学，了解很多。他们可以帮助我们发展一种基于比仅基于文字更好的解释的思考理论。为了对流形有一个直观的理解，请参阅图7.4。[15](15580-0025.xhtml#en143)
    流形有许多有趣的性质，并且可以是光滑的或不光滑的，这取决于上下文和所研究的性质。流形的研究导致了数学几个分支的发展，如微分几何、代数几何和微分拓扑，以及在物理学中的应用，尤其是在广义相对论和弦理论中。总有一天，大脑也会被列入这个列表。
- en: GPT 7.2
  id: totrans-1112
  prefs: []
  type: TYPE_NORMAL
  zh: GPT 7.2
- en: 'Me: **What is a manifold?**'
  id: totrans-1113
  prefs: []
  type: TYPE_NORMAL
  zh: 我：**什么是流形？**
- en: 'ChatGPT: In mathematics, a manifold is a topological space that locally resembles
    Euclidean space near each point. In simpler terms, it is a space that, on a small
    scale, looks like a flat Euclidean space (like a plane or three-dimensional space)
    but may have a more complicated global structure. Manifolds are central objects
    of study in fields such as topology, geometry, and mathematical physics.'
  id: totrans-1114
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT：在数学中，流形是一个局部类似于欧几里得空间的拓扑空间。用更简单的话说，它是一个在小型尺度上看起来像平坦的欧几里得空间（如平面或三维空间）的空间，但可能具有更复杂的全局结构。流形是拓扑学、几何学和数学物理等领域研究的中心对象。
- en: One of the key properties of a manifold is that it is locally homeomorphic to
    Euclidean space. This means that for every point on the manifold, there is a neighborhood
    (a small region around the point) that can be mapped to Euclidean space through
    a continuous, bijective function called a homeomorphism.
  id: totrans-1115
  prefs: []
  type: TYPE_NORMAL
  zh: 流形的一个关键性质是它是局部欧几里得同胚的。这意味着对于流形上的每一个点，都有一个邻域（围绕该点的小区域），可以通过一个连续的、双射的函数，即同胚，映射到欧几里得空间。
- en: 'Some common examples of manifolds include:'
  id: totrans-1116
  prefs: []
  type: TYPE_NORMAL
  zh: 流形的常见例子包括：
- en: 1. **Euclidean spaces** themselves, such as the real line, the plane, or three-dimensional
    space.
  id: totrans-1117
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 1. **欧几里得空间**本身，例如实线、平面或三维空间。
- en: 2. **Circles and spheres**, which are one-dimensional and two-dimensional manifolds,
    respectively.
  id: totrans-1118
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 2. **圆和球面**，分别是一维和二维流形。
- en: 3. **Torus** (a doughnut shape), which is a two-dimensional manifold that can
    be thought of as a rectangle with its opposite edges identified.
  id: totrans-1119
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 3. **环面**（一种甜甜圈形状），它是一个二维流形，可以想象为一个矩形，其相对边被识别。
- en: '4. **The Möbius strip**, a non-orientable two-dimensional manifold with a single
    twist that gives it an interesting topological property: it has only one side
    and one edge. ֍'
  id: totrans-1120
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 4. **莫比乌斯带**，一个不可定向的二维流形，它通过一个单一的扭曲获得了有趣的拓扑性质：它只有一个面和一个边。 ֍
- en: Causality
  id: totrans-1121
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 因果性
- en: Recordings from neurons during a motor task give us a picture of what may have
    been responsible for the behavior, but how can we be sure? They are indeed correlated
    with behaviors, but this does not prove that they are causally linked to the behaviors.
    One way to test this hypothesis is to perturb the neurons and see if that perturbs
    the behavior as expected. In the twentieth century, this was done by killing the
    neurons in a cortical area with gross lesions (scooping out the neurons) and seeing
    how behavior changes. If there is no change, then this is evidence that activity
    in this area was not essential for generating the behavior. However, it is difficult
    to interpret the results if the behavior changes because in a brain with complex
    feedback pathways, suppressing activity in one area can affect inputs to another.
    For example, suppose you damage a capacitor in a radio, and the radio starts squealing.
    Can you conclude that the capacitor is a squeal suppressor? The logic for interpreting
    lesions is tricky, but when used with knowledge of anatomical connectivity and
    the proper controls, it can provide insights into how information flows through
    brain areas in different tasks.
  id: totrans-1122
  prefs: []
  type: TYPE_NORMAL
  zh: 在运动任务期间从神经元中记录下来的信息为我们描绘了可能对行为负责的图景，但我们如何能确定这一点呢？它们确实与行为相关联，但这并不证明它们与行为有因果联系。检验这一假设的一种方法是通过干扰神经元来观察行为是否如预期的那样发生变化。在20世纪，这是通过在皮质区域造成严重损伤（挖除神经元）并观察行为如何变化来实现的。如果没有变化，那么这将是这一区域的活动对于产生行为不是必需的证据。然而，如果行为发生变化，结果很难解释，因为在具有复杂反馈路径的大脑中，抑制某一区域的活动可能会影响其他区域。例如，假设你损坏了一个收音机的电容器，收音机开始发出尖叫声。你能得出结论说电容器是尖叫声抑制器吗？解释损伤的逻辑很棘手，但结合对解剖连接的了解和适当的控制，它可以提供关于信息如何在不同的任务中通过大脑区域流动的见解。
- en: Another problem with lesions is that they can disrupt the fibers of passage—long-range
    connections between distant brain areas that happen to pass through the lesioned
    area. It is now possible to avoid these problems by using a technique that can
    reversibly activate or suppress activity in specific neurons using light. Proteins
    called channel rhodopsins can be genetically targeted to specific neurons and
    cause those neurons to spike by shining a particular color of light on them. This
    was an approach that Francis Crick advocated in an essay he wrote in 1979,[16](15580-0025.xhtml#en144)
    in which he predicted that molecular tools would allow neuroscientists to probe
    the brain at the same precision with which it is constructed. He foresaw the need
    and basis of this technology far ahead of the neuroscientists at the time because
    he had already seen what was possible with manipulating single genes in molecular
    genetics.
  id: totrans-1123
  prefs: []
  type: TYPE_NORMAL
  zh: 损伤的另一个问题是它们可能会破坏通路纤维——即穿过损伤区域的远距离大脑区域之间的长距离连接。现在，通过使用一种可以可逆地激活或抑制特定神经元活动的技术，我们可以避免这些问题。称为通道视黄质蛋白的蛋白质可以被基因靶向到特定神经元，并通过在它们上照射特定颜色的光来使这些神经元产生动作电位。这是弗朗西斯·克里克在1979年撰写的一篇文章中提倡的方法，[16](15580-0025.xhtml#en144)，他预测分子工具将允许神经科学家以与大脑构建相同的精确度探测大脑。他比当时的神经科学家更早地预见了这个技术和其基础的需求，因为他已经看到了通过操纵分子遗传学中的单个基因所能做到的事情。
- en: Causal Explanation
  id: totrans-1124
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 因果解释
- en: Judea Pearl and Dana Mackenzie’s *The Book of Why* points out that causality
    at the level of human reasoning is a much more difficult problem.[17](15580-0025.xhtml#en145)
    Pearl pioneered causal models in AI in the twentieth century, for which he received
    a Turing Award in 2011\. He pointed out that causality can be probed by using
    counterfactual examples that examine alternative possibilities for past or future
    events—what could or might have happened if a different decision were made. I
    helped organize a workshop at the NeurIPS conference in 2021 that brought together
    the leaders studying causal reasoning at the human and network levels.[18](15580-0025.xhtml#en146)
    The two communities were separated by a vast gulf of jargon, concepts, and history,
    which reminded me of the early days at NeurIPS. The participants from each group
    came to the table with a prior belief that the other group was uninformed about
    their insights; we all came away with a better understanding of the issues and
    problems than we had before the workshop. Causality continues to be an active
    and important research area in AI, as discussed earlier in chapter 5.
  id: totrans-1125
  prefs: []
  type: TYPE_NORMAL
  zh: Judea Pearl和Dana Mackenzie的《为什么》一书指出，在人类推理层面上的因果性是一个更加困难的问题。[17](15580-0025.xhtml#en145)
    Pearl在20世纪开创了人工智能中的因果模型，为此他在2011年获得了图灵奖。他指出，可以通过使用反事实例子来探究因果性，这些例子检查了过去或未来事件的不同可能性——如果做出了不同的决定，可能会发生什么。我帮助组织了2021年NeurIPS会议上的一个研讨会，汇集了研究人类和网络层面因果推理的领导者。[18](15580-0025.xhtml#en146)
    这两个社区之间被一个巨大的术语、概念和历史鸿沟所分隔，这让我想起了NeurIPS的早期日子。来自每个小组的参与者都带着先入为主的观念，认为对方小组对他们的见解一无所知；我们都带着比研讨会之前更好的对问题和问题的理解离开。因果性继续是人工智能中的一个活跃且重要的研究领域，如第5章中较早讨论的那样。
- en: GPT 7.3
  id: totrans-1126
  prefs: []
  type: TYPE_NORMAL
  zh: GPT 7.3
- en: 'Me: **What are 5 key points from this section on causality?**'
  id: totrans-1127
  prefs: []
  type: TYPE_NORMAL
  zh: 我：**从这个关于因果性的部分中，有哪些5个关键点？**
- en: 'ChatGPT: Here are the five key points summarizing the text:'
  id: totrans-1128
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT：以下是总结文本的五个关键点：
- en: '1. **Correlation Doesn’t Equal Causation**: Although neuronal activity is often
    correlated with certain behaviors, it doesn’t necessarily mean it’s causally linked.
    One way to test for causality is to manipulate neurons to see if this impacts
    behavior.'
  id: totrans-1129
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 1. **相关性不等于因果性**：尽管神经元活动通常与某些行为相关，但这并不一定意味着它们有因果联系。测试因果性的方法之一是操纵神经元，看看这是否会影响到行为。
- en: '2. **Interpreting Lesions**: In the past, lesions (destruction) of certain
    brain areas were used to see if they impacted behavior, thus indicating they were
    responsible for the behavior. However, interpreting these results can be challenging
    due to complex feedback pathways in the brain.'
  id: totrans-1130
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 2. **解读损伤**：在过去，某些大脑区域的损伤（破坏）被用来观察它们是否影响行为，从而表明它们是行为的原因。然而，由于大脑中复杂的反馈途径，解读这些结果可能具有挑战性。
- en: '3. **Fibers of Passage and New Techniques**: Lesions can disrupt “fibers of
    passage,” or connections between distant brain areas. A modern technique to avoid
    this problem uses light to activate or suppress specific neurons. This technique
    is made possible by designer proteins that can be genetically targeted to specific
    neurons.'
  id: totrans-1131
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 3. **通路纤维与新技术**：损伤可以干扰“通路纤维”，即大脑不同区域之间的连接。一种避免这种问题的现代技术是利用光来激活或抑制特定的神经元。这种技术是通过可以遗传靶向到特定神经元的定制蛋白实现的。
- en: '4. **Francis Crick’s Predictions**: Francis Crick predicted that molecular
    tools would enable neuroscientists to probe the brain with the same precision
    with which it is constructed. This forecast highlighted the potential for advanced
    techniques like light-based neuron activation and suppression.'
  id: totrans-1132
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 4. **弗朗西斯·克里克的预测**：弗朗西斯·克里克预测，分子工具将使神经科学家能够以与构建大脑相同的精确度来探测大脑。这一预测突出了光基神经元激活和抑制等高级技术的潜力。
- en: '5. **Causal Reasoning in AI**: The concept of causality extends beyond neuroscience
    to artificial intelligence. Judea Pearl, author of “The Book of Why,” is a pioneer
    in developing causal models in AI. Recent workshops, such as one at NeurIPS, have
    fostered dialogue between different communities in AI and neuroscience to better
    understand causal reasoning at both the human and network levels. ֍'
  id: totrans-1133
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 5. **人工智能中的因果推理**：因果的概念不仅超越了神经科学，还扩展到了人工智能。著有《为什么》一书的Judea Pearl是人工智能中发展因果模型的开创者。最近的研讨会，如NeurIPS上的研讨会，促进了人工智能和神经科学不同社区之间的对话，以更好地理解人类和网络层面的因果推理。
- en: New Mathematics
  id: totrans-1134
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 新数学
- en: Machine learning is built on the same mathematical foundation as other areas
    of science and engineering—geometry, calculus, and probability—extending them
    to high-dimensional spaces.[19](15580-0025.xhtml#en147) Today’s LLMs are the equivalent
    of the cathedrals built in the Middle Ages by trial and error.[20](15580-0025.xhtml#en148)
    As LLMs inspire new mathematics, a new conceptual framework will reify concepts
    like understanding and intelligence; their progeny will be the equivalent of skyscrapers.
  id: totrans-1135
  prefs: []
  type: TYPE_NORMAL
  zh: 机器学习建立在与其他科学和工程领域相同的数学基础上——几何学、微积分和概率——并将它们扩展到高维空间。[19](15580-0025.xhtml#en147)今天的LLMs相当于中世纪通过试错建造的大教堂。[20](15580-0025.xhtml#en148)随着LLMs激发新的数学，一个新的概念框架将具体化理解、智能等概念；它们的后代将是摩天大楼的等价物。
- en: '8'
  id: totrans-1136
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '8'
- en: Computational Infrastructure
  id: totrans-1137
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 计算基础设施
- en: AI expert systems were popular in the 1970s. These were rule-based programs
    that tried to capture expert knowledge in specific domains, where each expert
    system required rules to be extracted from experts and reduced to a different
    logical program for each expert system. For example, in medicine, each disease
    requires a different expert system. This was a promising new direction for AI.
    CEOs who read articles about expert systems in *Forbes* were enthusiastic and
    invested in them to keep up with their competition.
  id: totrans-1138
  prefs: []
  type: TYPE_NORMAL
  zh: 20世纪70年代，人工智能专家系统很受欢迎。这些是基于规则的程序，试图在特定领域捕获专家知识，其中每个专家系统都需要从专家那里提取规则，并将其简化为每个专家系统的一个不同的逻辑程序。例如，在医学领域，每种疾病都需要一个不同的专家系统。这是人工智能的一个有希望的新方向。阅读《福布斯》杂志上关于专家系统文章的首席执行官们热情洋溢，并投资其中以跟上竞争。
- en: Expert systems for specific applications were slow to build and labor-intensive.
    Thinking Machines manufactured the Connection Machine,[1](15580-0025.xhtml#en149)
    one of the first massively parallel computers, to run logical programs using bit-serial
    processors, which was efficient for logic but not for the number crunching needed
    for most other applications that required numbers with greater precision, which
    includes neural networks.
  id: totrans-1139
  prefs: []
  type: TYPE_NORMAL
  zh: 用于特定应用的专家系统构建缓慢且劳动密集。思考机器公司制造了连接机[1](15580-0025.xhtml#en149)，这是第一台大规模并行计算机之一，使用位串行处理器运行逻辑程序，这对于逻辑处理是高效的，但不适用于大多数其他需要更高精度数字的应用程序，包括神经网络。
- en: Although expert systems were useful for small problems, extracting rules from
    experts was more difficult than anticipated. The systems were difficult to use,
    the results were underwhelming, and they were of limited use for big problems.
    An AI winter followed. In retrospect, expert systems and the Connection Machine
    failed to fulfill their promise because the real world has shades of gray that
    do not easily match the black and white of logic. Neural network models handle
    uncertainties by learning probabilities from data and combining them to yield
    accurate predictions.
  id: totrans-1140
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管专家系统对于小问题很有用，但从专家那里提取规则比预期的要困难。这些系统难以使用，结果令人失望，对于大问题也用途有限。随后出现了人工智能的冬天。回顾过去，专家系统和连接机未能实现其承诺，因为现实世界有灰色地带，这些灰色地带并不容易与逻辑的黑白相对应。神经网络模型通过从数据中学习概率并将它们结合起来以产生准确的预测来处理不确定性。
- en: During the California Gold Rush, the population of San Francisco increased from
    about 1,000 in 1848 to 25,000 full-time residents by 1850\. Miners lived in tents
    and wood shanties. When the rush began, the equipment needed for digging up and
    extracting gold was in short supply. Stores sold this equipment at a steep markup
    and made enormous profits. California’s first millionaires were not the prospectors
    but the equipment suppliers, hence the advice, “During a gold rush, sell shovels.”
  id: totrans-1141
  prefs: []
  type: TYPE_NORMAL
  zh: 在加利福尼亚淘金热期间，旧金山的居民人数从1848年的大约1,000人增加到1850年的25,000名全职居民。矿工们住在帐篷和木屋中。当淘金热开始时，挖掘和提取金子所需的设备短缺。商店以高额加价出售这些设备，并获得了巨大的利润。加利福尼亚的第一批百万富翁不是勘探者，而是设备供应商，因此有了这样的建议：“在淘金热期间，卖铁锹。”
- en: '![](images/15580_008_fig_001.jpg)'
  id: totrans-1142
  prefs: []
  type: TYPE_IMG
  zh: '![图片](images/15580_008_fig_001.jpg)'
- en: Figure 8.1
  id: totrans-1143
  prefs: []
  type: TYPE_NORMAL
  zh: 图8.1
- en: A large data center can support a million servers in 1 million square feet,
    requiring 850 MW of power.
  id: totrans-1144
  prefs: []
  type: TYPE_NORMAL
  zh: 一个大型数据中心可以在100万平方英尺的面积内支持一百万台服务器，需要850兆瓦的电力。
- en: 'The stock market evaluation of the high-tech companies that developed LLMs
    has risen by 30 percent since November 22, 2022, when ChatGPT went public. The
    stock of Nvidia, which makes the GPUs used to train LLMs, has increased 600 percent.
    Its market capitalization increased from $273 billion to well over three trillion
    dollars. Their high-end H100 GPU is backordered and their new B200 GPU has 30
    times better performance. To update the advice: “During the AI rush, sell GPUs.”
    Several high-tech companies are already building special-purpose AI chips, such
    as the Tensor Processing Unit (TPU) designed by Google.'
  id: totrans-1145
  prefs: []
  type: TYPE_NORMAL
  zh: 自2022年11月22日ChatGPT上市以来，开发LLMs的高科技公司股票评估上涨了30%。生产用于训练LLMs的GPU的英伟达（Nvidia）的股价上涨了600%。其市值从2730亿美元增长到超过3万亿美元。其高端H100
    GPU供不应求，而新的B200 GPU性能提升了30倍。更新建议：“在AI热潮中，出售GPU。”几家高科技公司已经开始构建专用AI芯片，例如谷歌设计的Tensor
    Processing Unit (TPU)。
- en: High-tech companies have many data centers worldwide, large warehouses filled
    with rack after rack of servers. Most of these are traditional CPUs, but the mix
    of GPUs and special-purpose AI hardware is fast expanding. New purpose-built AI
    data centers are beginning to sprout up to meet the demand. CoreWeave has seven
    large AI data centers online and expects to double that in 2024\. A 200,000-square-foot
    AI data center can cost over $1 billion (figure 8.1). Estimates for AI infrastructure,
    including data centers, networks, and other hardware, “is expected to reach $422.55
    billion by 2029, growing at a compound annual rate of 44% over the next six years.”[2](15580-0025.xhtml#en150)
    Ten years ago, a data center would draw ten megawatts, but 100 megawatts is the
    norm today, and the ten largest in North America now average 620 megawatts. Today,
    AI consumes 2 percent of all the power in global data centers and is expected
    to reach ten percent by 2025.[3](15580-0025.xhtml#en151)
  id: totrans-1146
  prefs: []
  type: TYPE_NORMAL
  zh: 高科技公司在全球拥有许多数据中心，这些数据中心是装满一排排服务器的巨大仓库。其中大部分是传统的CPU，但GPU和专用AI硬件的混合使用正在迅速增长。新的专用AI数据中心正在兴起以满足需求。CoreWeave已有七个大型AI数据中心上线，并预计到2024年将翻倍。一个20万平方英尺的AI数据中心可能耗资超过10亿美元（图8.1）。预计到2029年，包括数据中心、网络和其他硬件在内的AI基础设施的估计将达到4225.5亿美元，未来六年复合年增长率为44%[2](15580-0025.xhtml#en150)。十年前，数据中心会消耗10兆瓦的电力，但如今100兆瓦已成为常态，北美最大的十家数据中心平均功率为620兆瓦。今天，AI消耗了全球数据中心所有电力的2%，预计到2025年将达到10%[3](15580-0025.xhtml#en151)。
- en: GPT 8.1
  id: totrans-1147
  prefs: []
  type: TYPE_NORMAL
  zh: GPT 8.1
- en: 'Me: **How are LLMs being used in business?**'
  id: totrans-1148
  prefs: []
  type: TYPE_NORMAL
  zh: 我：**LLMs在商业中是如何被使用的？**
- en: 'ChatGPT: Large Language Models (LLMs) have become valuable tools in the business
    world, bringing improvements in several areas:'
  id: totrans-1149
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT：大型语言模型（LLMs）已成为商业界的宝贵工具，在多个领域带来了改进：
- en: '1. **Customer Service**: LLMs can be used to power customer service chatbots
    and virtual assistants, responding to customer queries accurately and efficiently.
    This can help improve customer satisfaction, reduce response times, and free up
    human customer service agents to handle more complex tasks.'
  id: totrans-1150
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 1. **客户服务**：LLMs可用于驱动客户服务聊天机器人和虚拟助手，准确高效地响应用户查询。这有助于提高客户满意度，减少响应时间，并释放人力资源以处理更复杂的工作。
- en: '2. **Content Creation**: LLMs can generate engaging content for marketing and
    advertising, including product descriptions, blog posts, social media updates,
    and more.'
  id: totrans-1151
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 2. **内容创作**：LLMs可以为营销和广告生成吸引人的内容，包括产品描述、博客文章、社交媒体更新等。
- en: '3. **Data Analysis**: Businesses generate and collect a large amount of data.
    LLMs can help analyze this data, extracting insights, trends, and patterns that
    can inform decision-making.'
  id: totrans-1152
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 3. **数据分析**：企业生成和收集大量数据。LLMs可以帮助分析这些数据，提取洞察力、趋势和模式，为决策提供信息。
- en: '4. **Business Intelligence**: LLMs can assist in making sense of complex business
    reports, financial documents, market research, and more, providing valuable insights
    and summaries.'
  id: totrans-1153
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 4. **商业智能**：LLMs可以帮助理解复杂的企业报告、财务文件、市场研究等，提供有价值的见解和总结。
- en: '5. **Internal Communication**: LLMs can be used to automate and enhance internal
    communication, such as drafting emails, scheduling meetings, and answering employee
    queries.'
  id: totrans-1154
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 5. **内部沟通**：LLMs可用于自动化和增强内部沟通，例如撰写邮件、安排会议和回答员工查询。
- en: '6. **Sales and Lead Generation**: LLMs can help identify potential leads based
    on online data, draft personalized sales emails, and support sales teams in other
    tasks.'
  id: totrans-1155
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 6. **销售和潜在客户生成**：LLMs可以根据在线数据帮助识别潜在客户，起草个性化的销售邮件，并支持销售团队完成其他任务。
- en: '7. **Training and Development**: LLMs can be used to create personalized learning
    materials and training programs for employees, improving the effectiveness of
    corporate training.'
  id: totrans-1156
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 7. **培训和开发**：LLM 可以用来创建针对员工的个性化学习材料和培训计划，提高企业培训的有效性。
- en: '8. **Process Automation**: Many routine business processes involve language-based
    tasks, such as form filling, report generation, or invoice processing. LLMs can
    help automate these tasks, increasing efficiency. ֍'
  id: totrans-1157
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 8. **流程自动化**：许多常规业务流程涉及基于语言的任务，如表格填写、报告生成或发票处理。LLM 可以帮助自动化这些任务，提高效率。
- en: Despite these potential benefits, it’s important to use LLMs responsibly in
    a business context. They need to be carefully managed and overseen to ensure they
    don’t produce misleading or inappropriate content, violate privacy rules, or make
    decisions that should be made by humans. The use of LLMs should be part of a broader
    strategy that values and respects human input and expertise.
  id: totrans-1158
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管有这些潜在的好处，但在商业环境中使用 LLM 仍然需要负责任。它们需要被谨慎管理和监督，以确保它们不会产生误导或不适当的内容，违反隐私规则，或做出应由人类做出的决策。LLM
    的使用应该是更广泛战略的一部分，该战略重视并尊重人类的输入和专业知识。
- en: Large Companies Are Implementing LLMs
  id: totrans-1159
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 大型公司正在实施 LLM
- en: GPT 8.1 lists a few of the many applications of LLMs to business, but the diffusion
    of AI into companies is uneven. AI is already widely deployed in companies like
    OpenAI, Google, and Meta that build LLMs. However, the distribution of AI to firms
    outside Silicon Valley is much slower, though there are exceptions. JPMorgan Chase
    has 600 machine-learning engineers working on 300 internal AI applications. Eli
    Lilly, a pharmaceutical company, has 100 ongoing AI projects. There is, however,
    a downside for a company to rely on ChatGPT, which saves all the data that it
    receives to help improve performance. Because this could leak sensitive company
    information, some companies have banned their workers from using ChatGPT.
  id: totrans-1160
  prefs: []
  type: TYPE_NORMAL
  zh: GPT 8.1 列举了 LLM 在商业中应用的众多例子，但 AI 在企业中的扩散并不均衡。AI 已经在构建 LLM 的 OpenAI、Google 和
    Meta 等公司中得到广泛应用。然而，将 AI 分配给硅谷以外的公司要慢得多，尽管也有一些例外。摩根大通有 600 名机器学习工程师在开发 300 个内部
    AI 应用。制药公司艾利·利利有 100 个正在进行的 AI 项目。然而，对于一家公司来说，依赖 ChatGPT 存在一个缺点，因为它会保存所有接收到的数据以帮助提高性能。由于这可能泄露敏感的公司信息，一些公司禁止员工使用
    ChatGPT。
- en: Microsoft offers a solution to this problem called Azure OpenAI Services, which
    lets businesses build custom LLMs.[4](15580-0025.xhtml#en152) An LLM can be fine-tuned
    with company data for much less than the cost of training the foundation LLM.
    The proprietary data used to train the model are kept in a secure environment
    while the model is being trained. This service has been a great success. Forms
    and reports that once took hours could be completed in minutes. Large companies
    with sales, marketing, human resources, accounting, quality assurance, legal,
    and messaging departments that churn out enormous numbers of emails, memos, reports,
    and summaries can become more productive. As companies roll out this technology,
    it is used in unforeseen ways with impacts no one predicted. For example, Amazon
    Web Service (AWS) have an AI chatbot called Q that helps employees in companies
    whose data are in their cloud answer questions.
  id: totrans-1161
  prefs: []
  type: TYPE_NORMAL
  zh: 微软提供了一种名为 Azure OpenAI Services 的解决方案，允许企业构建定制的 LLM。[4](15580-0025.xhtml#en152)
    可以用公司数据进行微调的 LLM，其成本远低于训练基础 LLM 的成本。用于训练模型的专有数据在模型训练期间被保存在一个安全的环境中。这项服务取得了巨大的成功。曾经需要数小时才能完成的表格和报告现在可以在几分钟内完成。拥有销售、营销、人力资源、会计、质量保证、法律和消息传递部门的大型公司，这些部门产生大量电子邮件、备忘录、报告和摘要，可以变得更加高效。随着公司推出这项技术，它以人们无法预见的方式被使用，产生了无人预测的影响。例如，亚马逊网络服务（AWS）有一个名为
    Q 的 AI 聊天机器人，它帮助那些数据存储在其云中的公司员工回答问题。
- en: Q indexes all connected data and content, “learning” aspects about a business,
    including its organizational structures, core concepts and product names. From
    a web app, a company can ask Q to analyze, for example, which product features
    its customers are struggling with and possible ways to improve them—or, à la ChatGPT,
    upload a file (a Word doc, PDF, spreadsheet and the like) and ask questions about
    that file. Q draws on its connections, integrations and data, including business-specific
    data, to come up with responses along with citations.[5](15580-0025.xhtml#en153)
  id: totrans-1162
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: Q 指数化所有连接的数据和内容，包括关于一个企业的“学习”方面，如其组织结构、核心概念和产品名称。从网络应用程序中，公司可以要求 Q 分析，例如，其客户在哪些产品功能上遇到困难以及可能的改进方法——或者，就像
    ChatGPT 一样，上传一个文件（如 Word 文档、PDF、电子表格等）并就文件内容提出问题。Q 利用其连接、集成和数据，包括特定于业务的数据，来提供响应，并附上引用。[5](15580-0025.xhtml#en153)
- en: Other big companies have jumped into the AI business. The demand for AI and
    machine learning vice presidents has pushed starting salaries to the $300,000–$500,000
    range and even higher for those with experience in generative AI.[6](15580-0025.xhtml#en154)
    Salesforce has released its own AI Cloud with nine generative LLMs for other businesses,
    each with a “trust” layer to insulate corporate information and stop leaks. In
    May 2023, Salesforce Ventures, the venture capital arm of Salesforce, and Oracle
    invested in Cohere, a startup specializing in generative AI for businesses and
    technology being resold to other companies. The revenues at consulting firms such
    as Deloitte and Accenture have mushroomed helping companies navigate generative
    AI.[7](15580-0025.xhtml#en155)
  id: totrans-1163
  prefs: []
  type: TYPE_NORMAL
  zh: 其他大型公司也加入了人工智能的行列。对人工智能和机器学习副总裁的需求已将起薪推至 30 万至 50 万美元的范围，对于有生成式人工智能经验的人甚至更高。[6](15580-0025.xhtml#en154)
    Salesforce 已经发布了其自己的 AI 云，为其他企业提供九个生成式大型语言模型，每个模型都有一个“信任”层来保护企业信息并防止泄露。2023 年
    5 月，Salesforce Ventures（Salesforce 的风险投资部门）和 Oracle 对 Cohere 进行了投资，Cohere 是一家专注于为企业和技术提供生成式人工智能的初创公司，其技术正在被转售给其他公司。像德勤和安永这样的咨询公司的收入激增，帮助公司应对生成式人工智能。[7](15580-0025.xhtml#en155)
- en: 'It will take time for AI technology to “trickle down” to the thousands of smaller
    firms that do not have large R&D or information technology workforces: AI workers
    have to be trained; guardrails have to be put in place to prevent mistakes and
    misuse; and workflow in offices has to be reorganized. Research advances in AI
    have been moving at the speed of thought, but businesses move along at the speed
    of meetings. Training and retraining take time. Business schools have reorganized
    their curricula around AI and are teaching their students how to use the new tools.[8](15580-0025.xhtml#en156)
    MBAs with AI experience are in demand at many companies. Massive open online courses
    (MOOCs) are also available for those already in the workforce.'
  id: totrans-1164
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能技术“渗透”到没有大量研发或信息技术工作团队的数千家小型企业需要时间：AI 工作人员需要接受培训；必须建立护栏以防止错误和滥用；办公室的工作流程也需要重新组织。人工智能的研究进展速度如同思想一样快，但企业的步伐却如同会议一样缓慢。培训和再培训需要时间。商学院已经围绕人工智能重组了课程，并教授学生如何使用新工具。[8](15580-0025.xhtml#en156)
    拥有人工智能经验的 MBA 在许多公司中需求旺盛。大规模开放在线课程（MOOCs）也对那些已经在职的人员开放。
- en: Unlike the internet revolution, which minimally changed how companies are organized
    internally, the AI revolution could eventually shake up and improve many enterprises’
    productivity.[9](15580-0025.xhtml#en157) As advances are made in training with
    higher-quality datasets and more efficient algorithms, the performance of smaller
    models is beginning to rival the largest ones, making it possible for smaller
    companies to take advantage of the LLMs locally.[10](15580-0025.xhtml#en158)
  id: totrans-1165
  prefs: []
  type: TYPE_NORMAL
  zh: 与互联网革命仅略微改变公司内部组织方式不同，人工智能革命最终可能会颠覆并提高许多企业的生产力。[9](15580-0025.xhtml#en157) 随着使用更高质量的数据集和更有效的算法进行训练的进展，较小模型的表现开始与最大的模型相媲美，这使得小型公司能够在本地上利用大型语言模型。[10](15580-0025.xhtml#en158)
- en: It will take many years for AI advances made today on a small scale to be scaled
    up to influence the economy. AI is a pervasive technology that will require significant
    investment by companies and the training of their employees. Productivity will
    increase gradually and take decades, just as I predicted in *The Deep Learning
    Revolution* for self-driving cars. But because AI applications are so pervasive,
    the upside is substantial.
  id: totrans-1166
  prefs: []
  type: TYPE_NORMAL
  zh: 今天在小型规模上取得的AI进步需要很多年才能扩大规模，从而影响经济。AI是一种无处不在的技术，将需要公司的大量投资以及员工培训。生产力将逐渐提高，需要几十年时间，正如我在*《深度学习革命》*中预测的那样，自动驾驶汽车也是如此。但由于AI应用无处不在，其正面影响是巨大的。
- en: AI Research and Development (R&D)
  id: totrans-1167
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 人工智能研究与发展（R&D）
- en: Digital computing and digital telecommunication, invented in the twentieth century,
    have made information abundant and ubiquitous in the twenty-first century. The
    first computers used many vacuum tubes, giving off much heat. Like light bulbs,
    vacuum tubes periodically burn out, and there were so many that this was a daily
    occurrence. Transistors were invented by physicists John Bardeen, Walter Brattain,
    and William Shockley at Bell Labs, the research wing of AT&T, and replaced vacuum
    tubes. Claude Shannon at Bell Labs invented information theory, revolutionizing
    digital communication and eventually made possible cell phone networks. Dennis
    Ritchie and Ken Thompson at Bell Labs created the UNIX operating system and the
    C programming language that runs servers in data centers. How did one research
    lab develop so much of the essential technology behind today’s digital infrastructure?[11](15580-0025.xhtml#en159)
  id: totrans-1168
  prefs: []
  type: TYPE_NORMAL
  zh: 数字计算和数字电信是在20世纪发明的，使得信息在21世纪变得丰富且无处不在。第一台计算机使用了许多真空管，散发出大量热量。就像灯泡一样，真空管会定期烧坏，而且数量如此之多，以至于这是每天都会发生的事情。晶体管是由贝尔实验室的AT&T研究部门物理学家John
    Bardeen、Walter Brattain和William Shockley发明的，并取代了真空管。在贝尔实验室，Claude Shannon发明了信息理论，彻底改变了数字通信，并最终使得手机网络成为可能。在贝尔实验室，Dennis
    Ritchie和Ken Thompson创建了UNIX操作系统和运行数据中心服务器的C编程语言。一个研究实验室是如何发展出今天数字基础设施背后如此多的关键技术的呢？[11](15580-0025.xhtml#en159)
- en: These achievements are just a few of the influential inventions that we now
    take for granted. Bell Labs had a Biological Computation Research Department during
    the 1990s directed by David Tank, now at Princeton University, that, among other
    important innovations, introduced two-photon microscopy that made it possible
    to image the activity of single neurons and single synapses in vivo. Functional
    magnetic resonance imaging (fMRI) was also developed at Bell Labs for imaging
    brain activity in humans noninvasively. Alan Gelperin, one of my postdoctoral
    advisors, studied learning in the slug *Limax maximus*. At one point, Bell Labs
    ran a publicity campaign that featured neuroscience and sent a limo for Alan to
    accompany his celebrity slug to a photo shoot.
  id: totrans-1169
  prefs: []
  type: TYPE_NORMAL
  zh: 这些成就只是我们现在视为理所当然的一些有影响力的发明中的一小部分。在20世纪90年代，贝尔实验室有一个由David Tank领导的生物计算研究部门，他现在在普林斯顿大学工作，该部门在众多重要创新中引入了双光子显微镜，这使得在活体中成像单个神经元和单个突触的活动成为可能。功能性磁共振成像（fMRI）也是在贝尔实验室开发的，用于非侵入性地成像人类的大脑活动。我的博士后导师之一Alan
    Gelperin研究了蜗牛*Limax maximus*的学习。在某个时候，贝尔实验室开展了一场以神经科学为主题的宣传活动，派了一辆豪华轿车来陪伴Alan和他的名流蜗牛参加摄影拍摄。
- en: AT&T Corporation was the most valuable company in the S&P 500 in the 1980s,
    accounting for 5.5 percent of the total market value of the index. AT&T was a
    legalized monopoly, and profits from the Long Lines division funded Bell Labs.
    A 1956 consent decree with the government settled a seven-year-old antitrust lawsuit
    that sought to break up the Bell System and in a settlement created what was,
    in effect, an R&D tax on AT&T to fund Bell Labs. We owe a great deal to the research
    done at Bell Labs, which unfortunately no longer exists. The government eventually
    split AT&T into eight operating companies in 1984, a successful divestiture from
    an economic perspective but a great loss from the innovation perspective.
  id: totrans-1170
  prefs: []
  type: TYPE_NORMAL
  zh: 在20世纪80年代，AT&T公司是标准普尔500指数中最有价值的公司，占指数总市值的5.5%。AT&T是一个合法的垄断企业，长途线路部门的利润资助了贝尔实验室。1956年与政府达成的一项同意判决解决了持续了七年的反垄断诉讼，该诉讼旨在拆分贝尔系统，并在和解中实际上对AT&T征收了一项研发税以资助贝尔实验室。我们对贝尔实验室所做的研究贡献巨大，遗憾的是它现在已经不复存在。政府最终在1984年将AT&T拆分为八家运营公司，从经济角度来看是一次成功的剥离，但从创新角度来看却是一次巨大的损失。
- en: '![](images/15580_008_fig_002.jpg)'
  id: totrans-1171
  prefs: []
  type: TYPE_IMG
  zh: '![图片](images/15580_008_fig_002.jpg)'
- en: Figure 8.2
  id: totrans-1172
  prefs: []
  type: TYPE_NORMAL
  zh: 图8.2
- en: Bell Labs headquarters in Murray Hill, New Jersey. Bell Labs was where many
    of the technologies that created modern computing and communications were invented,
    including the transistor, information theory, and specialized software that runs
    digital computers. Although it focused on communications, the sprawling buildings
    housed researchers from many fields of science and engineering who generated more
    Nobel Prizes than the best universities.
  id: totrans-1173
  prefs: []
  type: TYPE_NORMAL
  zh: 贝尔实验室位于新泽西州的默里山总部。贝尔实验室是许多创造现代计算和通信技术的发源地，包括晶体管、信息论以及运行数字计算机的专用软件。尽管它专注于通信，但庞大的建筑群中聚集了来自多个科学和工程领域的学者，他们产生的诺贝尔奖数量超过了最好的大学。
- en: The equivalent of AT&T today is the high-tech firms that dominate the internet,
    cloud computing, and now AI. They, too, make enormous profits and have used them
    to invest in research and development. They run massive data centers worldwide
    that provided the computing power that made possible transformers, ChatGPT, and
    many other advances in AI. The high-tech companies have cornered the market on
    AI researchers, who contribute over 18 percent of all the papers at the annual
    NeurIPS conference. These researchers move from one high-tech company to the next,
    forming a floating version of Bell Labs. Seasoned AI researchers can fetch multimillion
    dollar starting packages including stock options.
  id: totrans-1174
  prefs: []
  type: TYPE_NORMAL
  zh: 今天的AT&T相当于那些主导互联网、云计算和现在人工智能的高科技公司。它们同样创造了巨额利润，并将这些利润用于投资研发。它们在全球运营着庞大的数据中心，提供了使变压器、ChatGPT以及其他人工智能领域的许多进步成为可能计算能力。高科技公司垄断了人工智能研究人员市场，这些研究人员在年度NeurIPS会议上发表的论文占总数的18%以上。这些研究人员从一个高科技公司跳槽到另一个，形成了一个流动版的贝尔实验室。经验丰富的AI研究人员可以拿到包括股票期权在内的数百万美元的起始薪酬。
- en: The government wanted to break up AT&T in the 1950s and is now trying to do
    the same with high-tech companies. These companies made long-term investments,
    making the United States the world leader in AI. Silicon Valley is the twenty-first
    century’s crown jewel of R&D in information technology. The United States has
    a deep infrastructure that includes startups, venture capitalists, and an entrepreneurial
    culture that attracts talent worldwide. Other countries have talented researchers,
    but nowhere else are they as concentrated or given the resources needed to make
    major breakthroughs. However, this could quickly change as the United States throttles
    high tech companies, allowing Europe, China, as other countries to poach talent
    and catch up.
  id: totrans-1175
  prefs: []
  type: TYPE_NORMAL
  zh: 政府在20世纪50年代想要拆分AT&T，现在正试图对高科技公司做同样的事情。这些公司进行了长期投资，使美国成为人工智能的世界领导者。硅谷是21世纪信息技术研发的皇冠上的宝石。美国拥有深厚的基础设施，包括初创公司、风险投资家和吸引全球人才的创业文化。其他国家也有才华横溢的研究人员，但他们的集中度或获得实现重大突破所需资源的程度都不如美国。然而，随着美国对高科技公司进行限制，允许欧洲、中国以及其他国家挖走人才并迎头赶上，这种状况可能会迅速改变。
- en: AI has spawned 100,000 AI startups worldwide. Silicon Valley has many entrepreneurs
    and high-level executives who come from Asia. H-1B visas that allow employers
    to petition for highly educated foreign professionals are capped at 65,000 per
    year. The United States greatly benefits from these professionals. Many graduate
    students in engineering departments at major universities in the United States
    are also from Asian countries and many of them want to work here after completing
    their studies. We should welcome them.
  id: totrans-1176
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能在全球催生了10万家AI初创公司。硅谷有许多来自亚洲的创业者和高级管理人员。H-1B签证允许雇主为高学历外国专业人士提出申请，每年上限为65,000个。美国从这些专业人士中获得了巨大利益。美国主要大学工程系的许多研究生也来自亚洲国家，其中许多人希望在完成学业后在这里工作。我们应该欢迎他们。
- en: Powering AI
  id: totrans-1177
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 为人工智能提供动力
- en: ChatGPT limits the number of requests you can make to GPT-4\. This suggests
    that the data centers’ capacity for processing AI is becoming saturated. As more
    users sign up, the more energy is required to run the servers. How much energy
    does it take to run LLMs?[12](15580-0025.xhtml#en160) It took months to train
    GPT-4, running on tens of thousands of GPUs at a cost of $100 million. Estimates
    for the one-time energy consumption for training GPT-4 are around 5,000 megawatt
    hours (MWh). To give a sense of what these numbers mean, it takes around 100 megawatts
    of power to run the New York City subway, or around 2,500 MWh per day. The real
    cost is not the one-time training cost but the usage cost for processing customer
    requests, which is 100 MWh per day. It therefore takes around $1 million per day
    for GPT-4 to answer requests. This adds up quickly to 36,500 MWh costing $365
    million per year and is increasing rapidly.
  id: totrans-1178
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT限制了您向GPT-4发起请求的数量。这表明数据中心处理AI的容量正在饱和。随着用户数量的增加，运行服务器的能源需求也随之增加。运行LLMs需要多少能源？[12](15580-0025.xhtml#en160)
    GPT-4的训练耗时数月，使用了数万台GPU，成本高达1亿美元。GPT-4一次性能源消耗的估计约为5,000兆瓦时（MWh）。为了说明这些数字的意义，纽约市地铁的运行功率约为100兆瓦，或者每天约2,500
    MWh。真正的成本不是一次性训练成本，而是处理客户请求的使用成本，每天约为100 MWh。因此，GPT-4每天回答请求的成本约为100万美元。这迅速累积到每年3,650万兆瓦时，成本为3.65亿美元，并且还在迅速增加。
- en: The cost of computing has halved every two years since the dawn of digital computing
    in the 1950s and is a billion times cheaper today. This empirical observation,
    called Moore’s law, ended a few years ago as the sizes of transistors and wires
    reached the smallest physical limits. But because chips are getting larger, each
    chip can do more computing. The latest computer chips have 100 billion transistors
    on a single chip. With this many transistors, it has become possible to put many
    cores—complete CPUs—on a single chip. Laptop computers typically have four to
    eight cores, and GPUs have thousands of cores. The CPU chips in your laptop are
    about the size of a postage stamp. Cerebras, a company that designs special-purpose
    computers for AI, has built a chip with 2.6 trillion transistors that is the size
    of a dinner plate.[13](15580-0025.xhtml#en161) Their CS-2 wafer-scale chip packs
    850,000 cores with superfast on-board memory. The chip is 1,000 times more powerful
    than a GPU and consumes 15 kilowatts. This superchip can handle a neural network
    model with 120 trillion weights. On July 2023, G42, an AI company based in Abu
    Dhabi, purchased a $100 million Condor Galaxy 1 AI supercomputer with 64 Cerebras
    CS-2 systems containing 54 million cores and 82 terabytes of memory that runs
    at 4,000 petaFLOPs (10^(15) floating point operations per second). The top supercomputer
    in the world as of this date is Frontier at the Oak Ridge National Laboratory,
    rated at 1,200 petaFLOPs.
  id: totrans-1179
  prefs: []
  type: TYPE_NORMAL
  zh: 自从20世纪50年代数字计算诞生以来，计算成本每两年就减半，如今比当时便宜了十亿倍。这个被称为摩尔定律的经验观察在几年前结束，因为晶体管和线路的大小达到了最小的物理极限。但由于芯片尺寸变大，每个芯片可以执行更多的计算。最新的计算机芯片在一个芯片上拥有1,000亿个晶体管。有了这么多晶体管，现在可以在单个芯片上放置许多核心——完整的CPU。笔记本电脑通常有四个到八个核心，而GPU有数千个核心。您笔记本电脑中的CPU芯片的大小大约与邮票相当。Cerebras是一家为AI设计专用计算机的公司，它制造了一个大小如餐盘的芯片，上面有2.6万亿个晶体管。[13](15580-0025.xhtml#en161)他们的CS-2晶圆级芯片集成了850,000个核心和超快的板载内存。这个芯片比GPU强大1,000倍，功耗为15千瓦。这个超级芯片可以处理包含120万亿权重的神经网络模型。2023年7月，阿布扎比的AI公司G42购买了一台价值1亿美元的Condor
    Galaxy 1 AI超级计算机，该计算机包含64个Cerebras CS-2系统，拥有5,400万个核心和82TB的内存，运行速度为4,000 petaFLOPs（每秒10^15次浮点运算）。截至今天，世界上顶级的超级计算机是橡树岭国家实验室的Frontier，其性能为1,200
    petaFLOPs。
- en: Cerebras has claimed top speeds for AI applications, but over thirty-five hardware
    companies building AI chips are catching up. Multicore chips can efficiently implement
    the massively parallel architectures of deep learning networks. With enough cores,
    the time it takes to process input is independent of the network size. AI can
    take full advantage of parallel hardware, a win-win. As models get larger, the
    hardware gets cheaper, and performance improves. However, the show-stopper is
    not the computing speed, but the required energy. Low-power computing is essential
    for delivering AI to edge devices such as your smartphone and your smartwatch,
    making them much smarter. A new technology is needed to commoditize AI.
  id: totrans-1180
  prefs: []
  type: TYPE_NORMAL
  zh: Cerebras公司声称其AI应用的最高速度，但超过三十五家正在制造AI芯片的硬件公司正在迎头赶上。多核芯片可以高效地实现深度学习网络的巨大并行架构。只要有足够的内核，处理输入所需的时间就与网络大小无关。AI可以充分利用并行硬件，实现双赢。随着模型变大，硬件变得更便宜，性能也得到提升。然而，最大的障碍不是计算速度，而是所需的能量。低功耗计算对于将AI带到边缘设备，如您的智能手机和智能手表，使它们变得更智能至关重要。需要一种新技术来商品化AI。
- en: AI at the Edge
  id: totrans-1181
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 边缘AI
- en: '*Dick Tracy* was a comic strip featuring a tough and intelligent police detective
    that debuted in the 1930s with a two-way wrist radio that could communicate with
    headquarters (figure 8.4).[14](15580-0025.xhtml#en162) Technology has caught up
    with him, and the smartphone with a two-way TV has become a part of everyday life.
    Today, a link to the cloud delivers voice transcription and language translation
    to your phone. But what if you had a personal assistant on your smartphone that
    could talk with you?'
  id: totrans-1182
  prefs: []
  type: TYPE_NORMAL
  zh: '*《迪克·特雷西》* 是一部以一个坚韧聪明的警察侦探为主角的漫画，于20世纪30年代首次亮相，他佩戴着双向腕带无线电，可以与总部通信（图8.4）。[14](15580-0025.xhtml#en162)
    技术已经赶上了他，双向电视智能手机已成为日常生活的一部分。今天，云链接将语音转录和语言翻译发送到您的手机。但如果你在智能手机上有一个能与你交谈的个人助理会怎样呢？'
- en: Without a much more energy-efficient computing technology, the widespread adoption
    of AI will be costly and disrupt the climate around the world. The human brain
    is proof that portable LLMs are possible. Nature evolved an ultra-low-power technology.
    Our brain can perform about a million times more computation than GPT-4 but uses
    only 20 watts of power and expends around 500 Wh daily. Nature took inductive
    biases down to the molecular level, computing with voltage-sensitive ion channels
    to maximize energy efficiency. We must also take this path to reduce LLMs’ rapidly
    growing energy budget.[15](15580-0025.xhtml#en163)
  id: totrans-1183
  prefs: []
  type: TYPE_NORMAL
  zh: 没有更节能的计算技术，AI的广泛应用将代价高昂，并破坏全球的气候。人脑证明了便携式LLMs是可能的。自然界进化出了一种超低功耗技术。我们的大脑可以执行大约一百万倍的GPT-4计算，但只需20瓦特的功率，并且每天消耗约500瓦时。自然界将归纳偏差降低到分子水平，通过电压敏感的离子通道进行计算，以最大化能源效率。我们也必须走这条路来减少LLMs快速增长的能源预算。[15](15580-0025.xhtml#en163)
- en: '![](images/15580_008_fig_003a.jpg)'
  id: totrans-1184
  prefs: []
  type: TYPE_IMG
  zh: '![](images/15580_008_fig_003a.jpg)'
- en: '![](images/15580_008_fig_003b.jpg)'
  id: totrans-1185
  prefs: []
  type: TYPE_IMG
  zh: '![](images/15580_008_fig_003b.jpg)'
- en: Figure 8.3
  id: totrans-1186
  prefs: []
  type: TYPE_NORMAL
  zh: 图8.3
- en: (Bottom left) A single super chip custom-designed for AI compared with (bottom
    right) the largest GPU chip. A single wafer-scale chip consumes 15 kilowatts of
    power and is water-cooled, which takes up most of the enclosure shown above.
  id: totrans-1187
  prefs: []
  type: TYPE_NORMAL
  zh: （左下角）为AI定制设计的单个超级芯片与（右下角）最大的GPU芯片相比。单个晶圆级芯片消耗15千瓦的功率，并采用水冷，占据了上面所示的大部分外壳。
- en: '![](images/15580_008_fig_004a.jpg)'
  id: totrans-1188
  prefs: []
  type: TYPE_IMG
  zh: '![](images/15580_008_fig_004a.jpg)'
- en: '![](images/15580_008_fig_004b.jpg)'
  id: totrans-1189
  prefs: []
  type: TYPE_IMG
  zh: '![](images/15580_008_fig_004b.jpg)'
- en: Figure 8.4
  id: totrans-1190
  prefs: []
  type: TYPE_NORMAL
  zh: 图8.4
- en: (Top) The two-way wrist radio used by Dick Tracy was science fiction when introduced
    by Chester Gould in the 1930s. (Bottom) Gould also knew about neural networks,
    a nascent technology in the 1980s.
  id: totrans-1191
  prefs: []
  type: TYPE_NORMAL
  zh: （顶部）迪克·特雷西使用的双向腕带无线电在1930年由切斯特·古尔德引入时是科幻小说。 （底部）古尔德还了解神经网络，这是20世纪80年代的一项新兴技术。
- en: 'In the 1980s, Carver Mead at Caltech noticed that when transistors operated
    in a regime near threshold, they could replicate the voltage-sensitive biophysical
    mechanisms used in neurons. We think of transistors as digital devices, but at
    the circuit level, they are analog: their voltage output is a smoothly varying,
    rapidly rising function of the input voltage near threshold. A strong input current
    rapidly pushes the output to its maximum value in a digital mode. Driving the
    transistor to this “rail” requires a lot of energy, which creates a lot of heat,
    and is why digital computers are so energy inefficient.'
  id: totrans-1192
  prefs: []
  type: TYPE_NORMAL
  zh: 在20世纪80年代，加州理工学院的Carver Mead注意到，当晶体管在接近阈值的工作状态下运行时，它们可以复制神经元中使用的电压敏感的生物物理机制。我们通常认为晶体管是数字设备，但在电路层面，它们是模拟的：它们的电压输出是输入电压接近阈值时平滑变化的快速上升函数。强大的输入电流会迅速将输出推至其最大值，在数字模式下。驱动晶体管达到这种“轨”状态需要大量的能量，这也正是为什么数字计算机如此能源效率低下的原因。
- en: Mead used a transistor’s ultra-low-power regime near threshold to create a new
    class of analog VLSI computing devices. Neuromorphic VLSI chips use a tiny fraction
    of digital chips’ power. They can perform the same basic operations as neurons.
    Analog chips are a path to more computing power at lower physical power levels.
    How do analog VLSI chips communicate with each other? The brain has dedicated
    wires, called axons, which carry information over long distances coded as all-or-none
    spikes. About half of our brain is white matter consisting of axons in glistening
    white sheaths to speed up propagation. Analog VLSI neurons communicate between
    chips with spikes, like neurons. There aren’t enough wires between chips, so instead,
    the addresses of neurons are sent digitally and asynchronously, multiplexed to
    share the same wire with many neurons.
  id: totrans-1193
  prefs: []
  type: TYPE_NORMAL
  zh: Mead利用晶体管在阈值附近的超低功耗状态，创造了一类新的模拟VLSI计算设备。神经形态VLSI芯片仅消耗数字芯片功率的一小部分。它们可以执行与神经元相同的基本操作。模拟芯片是实现更低物理功率水平上更多计算能力的一条途径。模拟VLSI芯片之间是如何相互通信的呢？大脑中有专门的电线，称为轴突，它们将信息以全或无的尖峰形式传输到很远的距离。我们大脑大约一半是白质，由在闪亮的白色鞘中运行的轴突组成，以加速传播。模拟VLSI神经元通过尖峰在芯片之间进行通信，就像神经元一样。芯片之间的电线不足，因此，神经元的地址以数字和异步的方式发送，并复用同一根电线与许多神经元共享。
- en: At the University of Zurich, Tobi Delbruck designed an analog VLSI retina chip
    called a dynamic vision sensor (DVS) that encodes moving images into spike trains.
    The scene in figure 8.6 illustrates that only movements elicit spikes, either
    when there is an increment in intensity (white areas) or a decrement (black areas).
    The outlines are clearly visible, but there are no spikes from the background,
    which does not move (a few spikes are from noise). The DVS chip weighs a few grams
    and uses milliwatts of power. Neurons with these types of responses are found
    in the retina, but there are many other types of output neurons in retinas. However,
    the on-and-off types already capture important information needed for tracking
    rapidly moving objects. The spikes are triggered asynchronously, which means there
    is no clock. In a conventional frame-based camera with 30-millisecond frames,
    motion is blurred, and most information is highly redundant between frames since
    background regions typically don’t move (figure 8.6).[16](15580-0025.xhtml#en164)
    There are many applications where low weight and low power are essential, such
    as drones and robots, and many more applications will benefit from economies of
    scale as the technology becomes more widely adopted. Edge devices like smartphones
    also need to be lightweight, low-power, and inexpensive. Your smartphone will
    someday become smarter with neuromorphic cameras feeding neuromorphic chips uploaded
    with LLM weights.
  id: totrans-1194
  prefs: []
  type: TYPE_NORMAL
  zh: 在苏黎世大学，Tobi Delbruck设计了一种名为动态视觉传感器（DVS）的模拟VLSI视网膜芯片，它将动态图像编码成尖峰序列。图8.6中的场景说明了只有运动才会引发尖峰，无论是强度增加（白色区域）还是减少（黑色区域）。轮廓清晰可见，但背景没有尖峰，因为背景没有移动（一些尖峰来自噪声）。DVS芯片重几克，功耗毫瓦级。具有这种类型反应的神经元在视网膜中可以发现，但视网膜中还有许多其他类型的输出神经元。然而，开/关类型的神经元已经捕捉到了跟踪快速移动物体所需的重要信息。尖峰是异步触发的，这意味着没有时钟。在传统的基于帧的相机中，帧间隔为30毫秒，运动模糊，帧与帧之间的大部分信息高度冗余，因为背景区域通常不移动（图8.6）。[16](15580-0025.xhtml#en164)
    在许多需要低重量和低功率的应用中，例如无人机和机器人，随着技术的更广泛采用，许多更多应用将受益于规模经济。边缘设备，如智能手机，也需要轻便、低功耗和低成本。你的智能手机有一天将变得更智能，因为神经形态摄像头将神经形态芯片与上传了LLM权重的芯片相结合。
- en: 'Figure 8.6 also poses an interesting perceptual paradox: If your brain has
    access only to retinal spikes, how can you “see” the rich tapestry of the world
    around you? There are no images in brains or a homunculus looking at a TV screen.
    It’s spikes all the way up the visual hierarchy. One hint for what might be happening
    inside brains comes from the ability of the brain to “fill in” missing visual
    input, such as caused by the blind spot in each eye where the optic nerve leaves
    the retina and scotomas—region with degenerating photoreceptors. The cortex is
    generative and creates an illusion of an external visual scene. Dreams and drug-induced
    hallucinations are yet more evidence for this generative hypothesis.'
  id: totrans-1195
  prefs: []
  type: TYPE_NORMAL
  zh: 图8.6也提出了一个有趣的感知悖论：如果你的大脑只能访问视网膜尖峰，你如何“看到”你周围世界的丰富景象？大脑中没有图像或类人生物在看电视屏幕。视觉层次结构上全是尖峰。关于大脑内部可能发生的事情的一个线索来自大脑能够“填补”缺失的视觉输入的能力，例如由每只眼睛中视神经离开视网膜处的盲点以及暗点——光感受器退化的区域所引起的。大脑皮层是生成性的，并创造出外部视觉场景的幻觉。梦境和药物诱导的幻觉是这一生成性假设的更多证据。
- en: '![](images/15580_008_fig_005.jpg)'
  id: totrans-1196
  prefs: []
  type: TYPE_IMG
  zh: '![](images/15580_008_fig_005.jpg)'
- en: Figure 8.5
  id: totrans-1197
  prefs: []
  type: TYPE_NORMAL
  zh: 图8.5
- en: '*Analog VLSI and Neural Systems* (Boston: Addison-Wesley, 1989) by Carver Mead,
    who founded the field of neuromorphic engineering.'
  id: totrans-1198
  prefs: []
  type: TYPE_NORMAL
  zh: '*《模拟VLSI和神经网络》*（波士顿：Addison-Wesley，1989）由卡弗·梅德所著，他创立了神经形态工程领域。'
- en: '![](images/15580_008_fig_006.jpg)'
  id: totrans-1199
  prefs: []
  type: TYPE_IMG
  zh: '![](images/15580_008_fig_006.jpg)'
- en: Figure 8.6
  id: totrans-1200
  prefs: []
  type: TYPE_NORMAL
  zh: 图8.6
- en: (Right) The output of a dynamic vision sensor (DVS) mimics the retina’s output
    in your eye, compared with a frame-based camera (left). The DVS chip is much more
    efficient at conveying what changes in a scene and requires much less energy.
  id: totrans-1201
  prefs: []
  type: TYPE_NORMAL
  zh: （右）动态视觉传感器（DVS）的输出模仿了你眼中的视网膜输出，与基于帧的相机（左）相比。DVS芯片在传达场景变化方面效率更高，并且需要的能量更少。
- en: GPT 8.2 summarizes the field of neuromorphic engineering.
  id: totrans-1202
  prefs: []
  type: TYPE_NORMAL
  zh: GPT 8.2总结了神经形态工程领域。
- en: GPT 8.2
  id: totrans-1203
  prefs: []
  type: TYPE_NORMAL
  zh: GPT 8.2
- en: 'Me: **What are 5 key points on neuromorphic engineering?**'
  id: totrans-1204
  prefs: []
  type: TYPE_NORMAL
  zh: 我：**神经形态工程有哪些5个关键点？**
- en: 'ChatGPT: Here are five key points from the text:'
  id: totrans-1205
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT：以下是文本中的五个关键点：
- en: 1. Carver Mead at Caltech in the 1980s noticed that the voltage-sensitive biophysical
    mechanisms used in neurons could be replicated with transistors in a regime near
    threshold, leading to the creation of a new class of computing devices called
    analog VLSI.
  id: totrans-1206
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 1. 卡弗·梅德在20世纪80年代的加州理工学院注意到，神经元中使用的电压敏感的生物物理机制可以在接近阈值的状态下用晶体管复制，从而导致了名为模拟VLSI的新一类计算设备的诞生。
- en: 2. Analog VLSI chips, also known as neuromorphic chips, use a fraction of the
    power that digital chips consume and can perform the same basic operations as
    neurons, making them a potential solution for the need for more compute power
    at lower physical power levels.
  id: totrans-1207
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 2. 模拟VLSI芯片，也称为神经形态芯片，消耗的功率仅为数字芯片的一小部分，并且可以执行与神经元相同的基本操作，这使得它们成为在较低物理功率水平上需要更多计算能力的潜在解决方案。
- en: 3. Analog VLSI neurons communicate with each other through spikes, similar to
    how neurons in the brain communicate. The addresses of these neurons are sent
    digitally and asynchronously, allowing many neurons to share the same wire.
  id: totrans-1208
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 3. 模拟VLSI神经元通过尖峰相互通信，类似于大脑中神经元的通信方式。这些神经元的地址以数字和异步方式发送，允许许多神经元共享相同的线路。
- en: 4. Tobi Delbruck at the University of Zurich has built a retina chip called
    a Dynamic Vision Sensor (DVS) that encodes moving images into spike trains. This
    chip is lightweight and low power, making it suitable for applications where these
    characteristics are essential, such as in drones and robots.
  id: totrans-1209
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 4. 苏黎世大学的托比·德尔布鲁克构建了一个名为动态视觉传感器（DVS）的视网膜芯片，该芯片将动态图像编码成尖峰序列。这个芯片轻巧且功耗低，使其适用于这些特性至关重要的应用，如无人机和机器人。
- en: 5. Neuromorphic engineering is a mature technology that can be scaled up to
    larger chips with higher density, making it a good match for edge devices that
    need to be lightweight, low power, and inexpensive. ֍
  id: totrans-1210
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 5. 神经形态工程是一项成熟的技术，可以扩展到更大、密度更高的芯片，使其非常适合需要轻巧、低功耗和低成本的边缘设备。 ֍
- en: A New Computational Model
  id: totrans-1211
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 新的计算模型
- en: For the last seventy years, the von Neumann architecture was the dominant computational
    model for building digital computers. It had the theoretical imprimatur of the
    Turing machine, a thought experiment by Alan Turing that can compute any computable
    function with a simple tape reader, an infinite tape (memory), and a finite number
    of internal states (processor). The Turing machine inspired the essentially sequential
    nature of the von Neumann architecture. The separation of memory from processing
    became a limitation as parallel architectures were scaled up in supercomputers,
    which fill huge rooms.
  id: totrans-1212
  prefs: []
  type: TYPE_NORMAL
  zh: 在过去的七十年里，冯·诺伊曼架构一直是构建数字计算机的主导计算模型。它得到了图灵机的理论认可，这是艾伦·图灵的一个思想实验，它可以通过一个简单的磁带阅读器、一个无限的磁带（内存）和有限数量的内部状态（处理器）来计算任何可计算函数。图灵机启发了冯·诺伊曼架构的本质上顺序性。随着并行架构在超级计算机中的扩展，内存与处理器的分离成为了一个限制，这些超级计算机占据了巨大的房间。
- en: Frontier, currently the world’s fastest supercomputer, comprises 74 cabinets
    weighing 30 tons and occupying 7,300 square feet—larger than two tennis courts.
    Frontier has over 9 million 2 GHz cores (single CPUs), so the cycle time is 0.5
    nanosecond (10^(–9) seconds). The reason for all these technical details is to
    point out that light travels one foot in one nanosecond, so there is a long delay
    when two cores separated by 100 feet try to communicate—200 clock cycles—making
    it difficult to coordinate them. Neurons communicate on a time scale of milliseconds
    (10^(–3) seconds), a million times slower. The much slower brain processing speed
    makes it easier for them to coordinate and is compensated for by having 100 billion
    neurons working together in parallel with a million billion connections between
    them.
  id: totrans-1213
  prefs: []
  type: TYPE_NORMAL
  zh: Frontier，目前世界上速度最快的超级计算机，由74个重30吨、占地7300平方英尺的机柜组成——比两个网球场还要大。Frontier拥有超过900万个2
    GHz核心（单个CPU），因此周期时间为0.5纳秒（10^(–9)秒）。所有这些技术细节的原因是为了指出光在一纳秒内行进一英尺，所以当两个相隔100英尺的核心试图通信时会有很大的延迟——200个时钟周期——这使得它们难以协调。神经元在毫秒（10^(–3)秒）的时间尺度上通信，比这慢一百万倍。大脑处理速度的缓慢使得它们更容易协调，并且通过有1000亿个神经元以并行方式工作，它们之间有万亿个连接来补偿这种速度。
- en: The new computational model based on neural networks is essentially parallel
    and fault-tolerant. Introducing noise during training can even improve performance.
    Weights and activity levels only need a few bits of accuracy compared with the
    thirty-two- and sixty-four-bit accuracy typically used for scientific computing.
    Hardware companies are beginning to design and build special-purpose computers
    to exploit these differences. A more powerful and efficient computational ecosystem
    will evolve as this industry matures. As the best mathematical minds on the planet
    focus on this new computational model, theoretical advances will follow and open
    a new chapter in computer science that will make neural network models more efficient
    and increase economic productivity.
  id: totrans-1214
  prefs: []
  type: TYPE_NORMAL
  zh: 基于神经网络的新的计算模型本质上具有并行性和容错性。在训练过程中引入噪声甚至可以提高性能。与通常用于科学计算的32位和64位精度相比，权重和活动水平只需要几位精度。硬件公司开始设计和构建专用计算机来利用这些差异。随着这个行业的成熟，将演变出一个更强大、更高效的计算生态系统。随着地球上最好的数学家们关注这个新的计算模型，理论上的进步将随之而来，并为计算机科学开启一个新篇章，这将使神经网络模型更加高效，并提高经济生产力。
- en: '![](images/15580_008_fig_007.jpg)'
  id: totrans-1215
  prefs: []
  type: TYPE_IMG
  zh: '![](images/15580_008_fig_007.jpg)'
- en: Figure 8.7
  id: totrans-1216
  prefs: []
  type: TYPE_NORMAL
  zh: 图8.7
- en: The Frontier supercomputer at Oak Ridge National Laboratory is currently the
    most powerful computer in the world. It is an exascale computer because it can
    perform 4 exaFLOPs (a billion billion, or 10^(18) floating point operations per
    second).
  id: totrans-1217
  prefs: []
  type: TYPE_NORMAL
  zh: 橡树岭国家实验室的Frontier超级计算机目前是世界上功能最强大的计算机。它是一台百亿亿次计算机，因为它可以每秒执行4百亿亿次浮点运算（即一亿亿，或10^(18)次浮点运算）。
- en: '9'
  id: totrans-1218
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '9'
- en: Superintelligence
  id: totrans-1219
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 超级智能
- en: AI is rapidly evolving. Could AI achieve superintelligence? The danger of superintelligent
    AI is a common theme in movies. In the science fiction/drama *WarGames*, made
    in 1983, an AI military computer almost starts a thermonuclear war, thwarted by
    a youthful Matthew Broderick. If AI exceeds human intelligence, it could become
    an existential threat to humanity. This view has been expressed by many experts
    in AI. Curiously, some who are most concerned about the dangers of superintelligent
    AI are the same ones who deny that LLMs are intelligent.[1](15580-0025.xhtml#en165)
  id: totrans-1220
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能正在迅速发展。AI能否实现超级智能？超级智能AI的危险是电影中的常见主题。在1983年制作的科幻/剧情片《战争游戏》中，一个AI军事计算机几乎引发了一场热核战争，被年轻的马修·布罗德里克阻止。如果AI超过人类智能，它可能成为对人类生存的威胁。许多AI专家都表达了这种观点。有趣的是，一些最担心超级智能AI危险的人，同时也是否认LLMs具有智能的人。[1](15580-0025.xhtml#en165)
- en: The Association for Computing Machinery awarded the ACM Turing Award in 2018
    to Yoshua Bengio, Geoffrey Hinton, and Yann LeCun for “conceptual and engineering
    breakthroughs that have made deep neural networks a critical component of computing”
    (figure 9.1).[2](15580-0025.xhtml#en166) My book *The Deep Learning Revolution*
    discusses their many contributions to AI over forty years. The Turing Award is
    the most prestigious prize in computer science, often compared to a Nobel Prize.
    Computer science has become essential for all sciences.
  id: totrans-1221
  prefs: []
  type: TYPE_NORMAL
  zh: 计算机协会于2018年将图灵奖授予了约书亚·本吉奥、杰弗里·辛顿和杨立昆，以表彰他们在“使深度神经网络成为计算关键组成部分的概念和工程突破”方面的贡献（图9.1）[2](15580-0025.xhtml#en166)。我的书《深度学习革命》讨论了他们在过去四十年中对AI的众多贡献。图灵奖是计算机科学中最负盛名的奖项，常被比作诺贝尔奖。计算机科学已成为所有科学的基础。
- en: 'When asked a question about superintelligent AI by a CBS reporter on March
    25, 2023, Geoffrey Hinton gave an unexpected response:'
  id: totrans-1222
  prefs: []
  type: TYPE_NORMAL
  zh: 当被一位哥伦比亚广播公司记者于2023年3月25日问及关于超级智能AI的问题时，杰弗里·辛顿给出了一个意想不到的回答：
- en: 'Q: “This is like the most pointed version of the question, and you can just
    laugh it off or not answer it if you want, but what do you think the chances are
    of AI just wiping out humanity? Can we put a number on that?”'
  id: totrans-1223
  prefs: []
  type: TYPE_NORMAL
  zh: 问：“这是最尖锐的问题版本之一，你可以选择笑而不答或者不回答，但你觉得AI彻底消灭人类的可能性有多大？我们能给它一个数字吗？”
- en: 'Hinton: “It’s somewhere between, um, naught percent and 100 percent. I mean,
    I think, I think it’s not inconceivable. That’s all I’ll say. I think if we’re
    sensible, we’ll try and develop it so that it doesn’t. But what worries me is
    the political system we’re in, where it needs everybody to be sensible.”'
  id: totrans-1224
  prefs: []
  type: TYPE_NORMAL
  zh: 辛顿：“它在零和一百之间，嗯，我认为，我认为这是可以想象的。我就说这么多。我认为如果我们明智的话，我们会努力开发它，让它不会发生。但让我担心的是我们现在的政治体系，它需要每个人都明智。”
- en: '![](images/15580_009_fig_001.jpg)'
  id: totrans-1225
  prefs: []
  type: TYPE_IMG
  zh: '![图片](images/15580_009_fig_001.jpg)'
- en: Figure 9.1
  id: totrans-1226
  prefs: []
  type: TYPE_NORMAL
  zh: 图9.1
- en: (Left to right) Geoffrey E. Hinton, Yoshua Bengio, and Yann LeCun. These three
    computer scientists shared the 2018 Turing Award for their pioneer research that
    led to deep learning.
  id: totrans-1227
  prefs: []
  type: TYPE_NORMAL
  zh: （从左到右）杰弗里·E·辛顿、约书亚·本吉奥和杨立昆。这三位计算机科学家因他们在深度学习领域的先驱研究而分享了2018年的图灵奖。
- en: Martin Rees, former Astronomer Royal of England and president of the Royal Society,
    founded the Centre for the Study of Existential Risk at Cambridge University,
    dedicated to studying and mitigating risks that could lead to human extinction
    or civilizational collapse. Geoffrey Hinton gave a talk there on May 25, 2023,
    titled “Two Paths to Intelligence,” which allowed him to expand on his thinking.[3](15580-0025.xhtml#en167)
  id: totrans-1228
  prefs: []
  type: TYPE_NORMAL
  zh: 英国皇家天文学家和皇家学会主席马丁·里斯在剑桥大学创立了存在风险研究中心，致力于研究和减轻可能导致人类灭绝或文明崩溃的风险。杰弗里·辛顿于2023年5月25日在那里发表了一次题为“通往智能的两条道路”的演讲，这使他有机会进一步阐述他的观点。[3](15580-0025.xhtml#en167)
- en: Geoffrey pointed out that GPT can write computer programs, which means it might
    someday be able to write a program to enhance itself. He thought this might happen
    in five to twenty years but did not have ideas for preventing it, which was a
    part of his concern. One of the questions from the audience touched on the high-tech
    firms’ monopoly on creating LLMs. His response was to question the wisdom of open-source
    nuclear weapons research. Nuclear weapons are an existential threat with which
    we already have some experience.
  id: totrans-1229
  prefs: []
  type: TYPE_NORMAL
  zh: 杰弗里指出，GPT可以编写计算机程序，这意味着它有朝一日可能能够编写一个增强自身的程序。他认为这可能在五到二十年内发生，但他没有预防它的想法，这也是他担忧的一部分。一位观众的问题触及了高科技公司对创建LLMs的垄断。他的回答是质疑开源核武器研究的智慧。核武器是一种我们已有一些经验的生存威胁。
- en: Hinton soon after resigned from his position as a vice president at Google and
    expressed his concerns with even greater clarity. Strong concerns were expressed
    earlier by Yoshua Bengio, who, along with more than 1,000 experts in AI, had signed
    a document about existential threats from superintelligent AI and advocated a
    six-month self-imposed moratorium in building LLMs any larger than GPT-4\. Yann
    LeCun disagreed with the letter’s premise and did not sign it. On June 14, 2023,
    he tweeted that creating superintelligent AI that will escape our control before
    we realize it “is just preposterous.”
  id: totrans-1230
  prefs: []
  type: TYPE_NORMAL
  zh: 随后，Hinton辞去了他在谷歌副总裁的职位，并以更加清晰的方式表达了他的担忧。Yoshua Bengio之前已经表达过强烈的担忧，他与超过1000名AI专家一起签署了一份关于超级智能AI带来的生存威胁的文件，并倡导在构建任何大于GPT-4的LLM之前实行六个月的自我禁令。Yann
    LeCun不同意信件的前提，并且没有签署它。2023年6月14日，他在推特上表示，在我们意识到之前，创造出将逃离我们控制的超级智能AI“简直是荒谬的”。
- en: Learning in Machines and Brains
  id: totrans-1231
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 机器与大脑中的学习
- en: I was on the advisory board of a ten-year Canadian Institute for Advanced Research
    (CIFAR[4](15580-0025.xhtml#en168)) program that Geoffrey Hinton had founded in
    2004, titled Neural Computation and Adaptive Perception. This group of researchers
    worked on neural networks for decades when others had abandoned it as a dead end.
    It was in 2012 that Hinton and his students announced a major advance in learning
    how to classify images in ImageNet, a large set of 14 million labeled images from
    20,000 categories of objects, at the NeurIPS Conference in Lake Tahoe.[5](15580-0025.xhtml#en169)
    It sparked the deep learning revolution. The Learning in Machines and Brains (LMB)
    CIFAR program led by Yoshua Bengio and Yann LeCun was a follow-up. For an encore,
    LMB decided to focus on language, which was prescient and sparked the turning
    point when ChatGPT was introduced to the public ten years later, in 2022\. These
    three CIFAR program leaders received the Turing Award in 2018.
  id: totrans-1232
  prefs: []
  type: TYPE_NORMAL
  zh: 我曾是加拿大高级研究院（CIFAR[4](15580-0025.xhtml#en168)）一个为期十年的项目顾问委员会成员，该项目由Geoffrey Hinton于2004年创立，名为神经计算与自适应感知。这个研究小组在其他人放弃将其视为死胡同的时候，已经研究神经网络几十年了。2012年，Hinton和他的学生在内华达湖的NeurIPS会议上宣布了在ImageNet中分类图像的重大进展，ImageNet是一个包含来自20000个物体类别、1400万张标记图像的大型集合。[5](15580-0025.xhtml#en169)
    这引发了深度学习革命。由Yoshua Bengio和Yann LeCun领导的LMB CIFAR项目是一个后续项目。为了再次展示，LMB决定专注于语言，这是具有远见的，并在十年后的2022年，当ChatGPT向公众介绍时，引发了转折点。这三位CIFAR项目领导人于2018年获得了图灵奖。
- en: There was a spirited debate about the pros and cons of bringing superintelligence
    to the public’s awareness at an LMB meeting on June 19, 2023, attended by the
    three Turing Award winners and other leaders. Even those who believed that AI
    poses an existential threat disagreed on how far into the future this might happen.
    In the end, we all agreed to disagree. If the experts can’t agree, who should
    we trust to make decisions moving forward? The doors are closing on access to
    information about the LLMs from high-tech companies because of commercial competition.
    One exception is Meta. Yann LeCun, the chief scientist of the Meta AI Lab, told
    us that the next generation Llama 2 would be released as open source. Around eight
    small AI companies have made their small language models (SLM) open source.
  id: totrans-1233
  prefs: []
  type: TYPE_NORMAL
  zh: 2023年6月19日，在LMB会议上就向公众揭露超级智能的利弊进行了热烈的辩论，会议有三位图灵奖得主和其他领导人参加。即使那些认为AI构成生存威胁的人也对这种威胁可能发生的未来时间点意见不一。最后，我们都同意不同意。如果专家们不能达成一致，我们该信任谁来做决定呢？由于商业竞争，高科技公司对LLM信息的访问正在关闭。一个例外是Meta。Meta
    AI实验室的首席科学家Yann LeCun告诉我们，下一代Llama 2将作为开源发布。大约有八家小型AI公司已经将它们的小型语言模型（SLM）开源。
- en: How Likely Is Superintelligence?
  id: totrans-1234
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 超级智能的可能性有多大？
- en: How seriously should we and government regulators take the concerns of superintelligence?
    *The Economist* asked a group of fifteen AI experts and eighty-nine “superforecasters”
    to assess “extinction risks.”[6](15580-0025.xhtml#en170) Superforecasters are
    general-purpose prognosticators with a track record of making accurate predictions
    on a wide range of issues, such as elections and outbreaks of wars. The doomsday
    assessments of the AI experts were almost an order of magnitude higher than those
    of the superforecasters for the threat of catastrophe or extinction from AI (figure
    9.2). The pessimism of AI experts did not change when they learned how the superforecasters
    had voted. Similar discrepancies were found in other existential threats, such
    as nuclear war and pathogen outbreaks. The problem with making guesses with no
    data is that judgments are based only on prior beliefs. Debates on extraterrestrial
    life in the universe also suffer from a lack of data. However, even when there
    are data, such as eighty years of living with nuclear weapons, the experts are
    still more pessimistic than the superforecasters. The reason why experts are more
    pessimistic than superforecasters is unclear.
  id: totrans-1235
  prefs: []
  type: TYPE_NORMAL
  zh: 我们和政府监管机构应该多么认真地对待超级智能的担忧？《经济学人》询问了15位AI专家和89位“超级预测者”评估“灭绝风险”。[6](15580-0025.xhtml#en170)
    超级预测者是通用预测者，有在广泛问题上做出准确预测的记录，例如选举和战争爆发。AI专家对灾难或灭绝的威胁的末日评估几乎比超级预测者高一个数量级（图9.2）。当AI专家了解到超级预测者是如何投票的时候，他们的悲观情绪并没有改变。在其他存在性威胁中，如核战争和病原体爆发，也发现了类似的差异。在没有数据的情况下做出猜测的问题在于，判断仅基于先前的信念。关于宇宙中外星生命的辩论也受到数据缺乏的影响。然而，即使有数据，例如与核武器共存了80年，专家们仍然比超级预测者更悲观。专家比超级预测者更悲观的原因尚不清楚。
- en: 'Imagining worst-case superintelligence scenarios and preparing contingency
    plans is probably a good idea. The focus has been on the uses of superintelligence
    for evil purposes. In best-case scenarios, superintelligence could be enormously
    helpful in advancing our health and wealth while *preventing* catastrophes created
    by humans. We should proceed not with alarm but caution, which may be inevitable.
    We can find guidance from looking back at nuclear weapons in the 1940s. J. Robert
    Oppenheimer, the director of the Los Alamos Laboratory and responsible for the
    research and design of an atomic bomb during World War II, testified at the 1954
    Atomic Energy Commission hearing that led the AEC to revoke his security clearance:'
  id: totrans-1236
  prefs: []
  type: TYPE_NORMAL
  zh: 想象最坏情况的超级智能场景并制定应急计划可能是个好主意。重点一直放在超级智能用于邪恶目的的应用上。在最佳情况下，超级智能可以在推进我们的健康和财富的同时*预防*由人类造成的灾难。我们应该以谨慎而非恐慌的态度前进，这可能不可避免。我们可以从回顾20世纪40年代的核武器中找到指导。J.罗伯特·奥本海默，洛斯阿拉莫斯实验室的主任，负责在二战期间进行原子弹的研究和设计，在1954年原子能委员会听证会上作证，导致原子能委员会撤销了他的安全许可：
- en: When you see something that is technically sweet, you go ahead and do it and
    you argue about what to do about it only after you have had your technical success.
    That is the way it was with the atomic bomb.[7](15580-0025.xhtml#en171)
  id: totrans-1237
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 当你看到技术上很棒的东西时，你就去做，等你技术成功后再争论如何处理它。原子弹就是这样。[7](15580-0025.xhtml#en171)
- en: 'Oppenheimer later opposed further research on nuclear weapons and quoted from
    the Hindu Bhagavad Gita:'
  id: totrans-1238
  prefs: []
  type: TYPE_NORMAL
  zh: 奥本海默后来反对进一步研究核武器，并引用了印度教《薄伽梵歌》：
- en: Now I am become Death, the destroyer of worlds.[8](15580-0025.xhtml#en172)
  id: totrans-1239
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 现在我已成为死亡，世界的毁灭者。[8](15580-0025.xhtml#en172)
- en: No one can imagine the unintended consequences of introducing LLMs into society
    in the long run, any more than we could imagine how the internet would change
    every aspect of our lives when it went public in the 1990s, thirty years ago.
    No one predicted the unintended consequences of the internet, which made it possible
    for anyone to broadcast their opinions widely. The internet architects thought
    it would be a purer form of democracy. But they did not anticipate the proliferation
    of fake news and echo chambers. Altruistic ideals can have unintended consequences.[9](15580-0025.xhtml#en173)
    The internet has made it possible for weaponized propaganda and advertising to
    go viral. But if we could find a way to control nuclear weapons and are adapting
    to the internet, we should be able to live with AI.
  id: totrans-1240
  prefs: []
  type: TYPE_NORMAL
  zh: 没有人能够想象在长期内将大型语言模型（LLMs）引入社会的无意后果，就像我们无法想象在30年前，也就是1990年代互联网公开时，它将如何改变我们生活的方方面面一样。没有人预测到互联网的无意后果，它使得任何人都可以广泛传播他们的观点。互联网的架构师们认为这将是一种更纯粹的民主形式。但他们没有预料到虚假新闻和回音室现象的泛滥。利他主义理想可能会产生无意后果。[9](15580-0025.xhtml#en173)
    互联网使得武器化的宣传和广告能够迅速传播。但如果我们能够找到控制核武器的方法，并且正在适应互联网，那么我们应该能够与人工智能共存。
- en: '![](images/15580_009_fig_002.jpeg)'
  id: totrans-1241
  prefs: []
  type: TYPE_IMG
  zh: '![图片](images/15580_009_fig_002.jpeg)'
- en: Figure 9.2
  id: totrans-1242
  prefs: []
  type: TYPE_NORMAL
  zh: 图9.2
- en: Comparisons between domain experts and superforecasters of estimated catastrophic
    and existential threats.
  id: totrans-1243
  prefs: []
  type: TYPE_NORMAL
  zh: 对领域专家和预测灾难性及存在性威胁的超级预测者之间的比较。
- en: One does not need a moratorium to think through these scenarios. Many are already
    thinking them through, and no one is predicting an evil superintelligence to emerge
    in the next six months. Who would benefit if all the AI researchers in the West
    decided to put a brake on advancing LLMs? Research in many other countries would
    continue. AI has already bested the best human fighter pilots in dogfights.[10](15580-0025.xhtml#en174)
    In the next global conflict, fighter pilots will have “loyal” wingmen that are
    autonomous drones swarming alongside, scouting ahead, mapping targets, jamming
    enemy signals, and launching airstrikes while keeping the pilot in the loop through
    LLMs.[11](15580-0025.xhtml#en175)
  id: totrans-1244
  prefs: []
  type: TYPE_NORMAL
  zh: 人们不需要暂停来思考这些情景。许多人已经在思考这些问题，而且没有人预测在接下来的六个月内会出现邪恶的超级智能。如果所有西方的AI研究人员决定放慢大型语言模型（LLMs）的发展步伐，谁会从中受益？在其他许多国家的研究将继续进行。人工智能已经在空战中击败了最好的人类战斗机飞行员。[10](15580-0025.xhtml#en174)
    在下一次全球冲突中，战斗机飞行员将拥有“忠诚”的僚机，即自主无人机群，它们将伴随飞行，进行侦察，绘制目标地图，干扰敌方信号，并在通过大型语言模型（LLMs）保持飞行员在回路的情况下发动空袭。[11](15580-0025.xhtml#en175)
- en: Controlling the proliferation of nuclear weapons requires international agreements.
    President John F. Kennedy signed the Nuclear Test Ban Treaty on October 7, 1963\.
    The treaty prohibited nuclear weapons tests or other nuclear explosions underwater,
    in the atmosphere, or in outer space. I can recall the anxiety of nuclear attack
    during that period, especially during the Cuban missile crisis. Since then, a
    dozen nuclear disarmament treaties, such as the Strategic Arms Reduction Treaties
    (START), have reduced but not eliminated the threat of mutually assured destruction.
  id: totrans-1245
  prefs: []
  type: TYPE_NORMAL
  zh: 控制核武器的扩散需要国际协议。美国总统约翰·F·肯尼迪于1963年10月7日签署了《核试验禁令条约》。该条约禁止在海底、大气层或外层空间进行核武器试验或其他核爆炸。我还能回忆起那个时期核攻击的焦虑，尤其是在古巴导弹危机期间。从那时起，有十多项核裁军条约，如《战略武器削减条约》（START），虽然减少了但并未消除相互确保毁灭的威胁。
- en: A historic international summit was held on November 1, 2023, in Bletchley Park,
    England, at an estate where codebreakers during World War II cracked the German
    Enigma code machine.[12](15580-0025.xhtml#en176) Representatives from more than
    two dozen countries, including US Vice President Kamala Harris, Elon Musk, and
    Sam Altman, met to discuss the potential for AI to do “serious, even catastrophic,
    harm.” Opinions were diverse. There was concern that LLMs could make it easy for
    bad actors to build a bioweapon within a year. Nick Clegg, former UK deputy prime
    minister and a Meta policy executive, said that speculative risks were distractions
    from current AI problems, such as influencing elections with fake news and fake
    videos. In a conversation with UK Prime Minister Rishi Sunak, Elon Musk said,
    “The pace of AI is faster than any technology I’ve seen in history by far. On
    balance, I think AI will be a force for good most likely, but the probability
    of it going bad is not zero percent, so we just need to mitigate the downside
    potential.”[13](15580-0025.xhtml#en177) Concerns were expressed, but a consensus
    was not reached.
  id: totrans-1246
  prefs: []
  type: TYPE_NORMAL
  zh: 2023年11月1日，在英国布莱切利公园举行了一次历史性的国际峰会，这个公园是二战期间密码破译员破解德国恩尼格玛密码机的地点。[12](15580-0025.xhtml#en176)
    来自二十多个国家的代表，包括美国副总统卡玛拉·哈里斯、埃隆·马斯克和山姆·奥特曼，聚集在一起讨论AI可能造成的“严重甚至灾难性的伤害”。意见不一。有人担心LLMs可能会让不良分子在一年内轻易地制造出生物武器。前英国副总理、Meta政策执行董事尼克·克莱格表示，推测性风险是当前AI问题的干扰，例如用虚假新闻和虚假视频影响选举。在与英国首相里希·苏纳克的对话中，埃隆·马斯克说：“AI的速度比我所见过的任何技术都要快得多。总的来说，我认为AI很可能是积极的推动力，但它的负面可能性并非零，所以我们只需要减轻潜在的负面影响。”
    [13](15580-0025.xhtml#en177) 表达了担忧，但没有达成共识。
- en: World Enough and Time
  id: totrans-1247
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 世界足够，时间也足够
- en: The great discoveries by physicists in the last century—relativity and quantum
    mechanics—were a foundation for our modern physical world. We are beginning a
    new era, the age of information. Our children will live in a world filled with
    cognitive devices, with personal tutors that help everybody reach their full potential,
    a world we can barely imagine today. There will also be a dark side, just as physics
    created atomic bombs of Promethean destructive power. Naysayers have existed throughout
    history, but I say move forward optimistically, expect surprises, and prepare
    for unintended consequences.
  id: totrans-1248
  prefs: []
  type: TYPE_NORMAL
  zh: 上个世纪物理学家的重要发现——相对论和量子力学——是我们现代物理世界的基础。我们正在进入一个新时代，信息时代。我们的孩子将生活在一个充满认知设备的世界里，有个人导师帮助每个人发挥全部潜能，一个我们今天几乎无法想象的世界。也将会存在一个阴暗面，就像物理学创造了具有普罗米修斯般毁灭力的原子弹一样。历史上有过许多怀疑论者，但我说要乐观地前进，期待惊喜，并为意外的后果做好准备。
- en: '10'
  id: totrans-1249
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '10'
- en: Regulation
  id: totrans-1250
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 监管
- en: All new technologies can be used for good and evil purposes, and there are bad
    actors among us who will misuse AI. How can AI be regulated to mitigate its misuse?
  id: totrans-1251
  prefs: []
  type: TYPE_NORMAL
  zh: 所有新技术都可以用于善与恶的目的，我们中间也有滥用AI的坏人。如何监管AI以减轻其滥用？
- en: In the early days of LLMs, academic researchers could build small language models
    (by today’s standards). LLMs now have gotten so large that only a few major high-tech
    companies have the computing power, enough data, and deep pockets to train them.
    Researchers at Google introduced transformers, but OpenAI, powered by a billion-dollar
    investment and cloud support from Microsoft, was the first to go public successfully
    with ChatGPT. By the time ChatGPT was released to the public, OpenAI had shifted,
    creating a for-profit corporation inside their nonprofit and was not releasing
    technical details, effectively becoming closed AI.[1](15580-0025.xhtml#en178)
    Microsoft doubled, redoubled, and re-redoubled down with an additional infusion
    of $10 billion. It used OpenAI’s GPT-4 to power Bing, its forlorn search engine
    that suddenly became formidable.
  id: totrans-1252
  prefs: []
  type: TYPE_NORMAL
  zh: 在LLM（大型语言模型）的早期，学术研究人员可以构建小型语言模型（按照今天的标准）。现在，LLMs已经变得如此之大，以至于只有少数几家主要高科技公司拥有足够的计算能力、数据和财力来训练它们。谷歌的研究人员引入了transformers，但得益于微软的10亿美元投资和云支持，OpenAI成为了第一个成功公开ChatGPT的公司。当ChatGPT向公众发布时，OpenAI已经转变，在其非营利组织内部创建了一家盈利性公司，并且没有发布技术细节，实际上变成了封闭的AI。[1](15580-0025.xhtml#en178)
    微软加倍、再加倍，最后又追加投入了100亿美元。它使用OpenAI的GPT-4来驱动Bing，其曾经无望的搜索引擎突然变得强大。
- en: Meta had developed its own LLM called Llama and made it available to a few academic
    labs, which gave Meta researchers valuable feedback from these beta test sites
    before rolling out their product. However, Llama’s model and source code was leaked
    and spread far and wide, making it possible for many groups worldwide to fine-tune
    the pretrained model and produce inventive new ways to adapt the code for many
    new uses. OpenAI may have made the genie in the bottle available to the world,
    but Meta let the genie out of the bottle. Meta eventually made its next-generation
    Llama 2 open-source, just as Yann LeCun, the Meta AI lab’s chief scientist, told
    us it would happen. All eight authors of the seminal 2017 paper on transformers
    have left Google and founded startups, collectively raising billions of dollars
    in capital. The genie is out of the bottle and is now out of control.[2](15580-0025.xhtml#en179)
    Hugging Face is a startup that develops tools for building applications and allows
    users to share machine learning models and datasets.
  id: totrans-1253
  prefs: []
  type: TYPE_NORMAL
  zh: Meta开发了其自己的LLM，名为Llama，并将其提供给几个学术实验室，在推出产品之前，这些实验室为Meta研究人员提供了宝贵的反馈。然而，Llama的模型和源代码被泄露并广泛传播，使得全球许多团体能够微调预训练模型，并产生许多新的创新方法来适应代码以用于多种新用途。OpenAI可能已经将瓶中的精灵（指AI）带给世界，但Meta却让精灵逃出了瓶子。Meta最终将其下一代Llama
    2开源，正如Meta AI实验室的首席科学家Yann LeCun告诉我们那样。那篇关于变换器的开创性2017年论文的所有八位作者都已离开谷歌并创立了初创公司，共同筹集了数十亿美元的资金。精灵已经逃出瓶子，现在已无法控制。[2](15580-0025.xhtml#en179)
    Hugging Face是一家开发构建应用程序工具的初创公司，允许用户共享机器学习模型和数据集。
- en: The debate about a superintelligent AI, which does not yet and may never exist,
    may be premature, but the discussion of how to regulate current AI has attracted
    the interest of the public and governments around the world.[3](15580-0025.xhtml#en180)
    At the NeurIPS meeting in Montreal in 2018, Edward Felton gave a plenary talk[4](15580-0025.xhtml#en181)
    on how the regulatory machinery works in Washington. He warned us that if we don’t
    regulate ourselves, the government will; when that happens, it is important to
    be at the table where the laws are made. The danger is that overly restrictive
    laws can choke innovation, and even benign laws can have unintended consequences.
    GPT 10.1 lists laws affected by LLMs that need amending because of the new AI
    technologies.
  id: totrans-1254
  prefs: []
  type: TYPE_NORMAL
  zh: 关于超级智能AI的辩论，这种AI目前尚未存在，可能永远也不会存在，可能还为时过早，但关于如何监管当前AI的讨论已经吸引了全球公众和政府的兴趣。[3](15580-0025.xhtml#en180)
    在2018年蒙特利尔的NeurIPS会议上，Edward Felton做了一次全体会议演讲[4](15580-0025.xhtml#en181)，讲述了华盛顿的监管机制是如何运作的。他警告我们，如果我们不自我监管，政府将会；当这种情况发生时，重要的是要坐在制定法律的地方。危险在于过于严格的法律会扼杀创新，即使是良性的法律也可能产生意想不到的后果。GPT
    10.1列出了受LLM影响需要修改的法律，因为这些新AI技术。
- en: GPT 10.1
  id: totrans-1255
  prefs: []
  type: TYPE_NORMAL
  zh: GPT 10.1
- en: 'Me: **How will LLMs affect laws that regulate humans?**'
  id: totrans-1256
  prefs: []
  type: TYPE_NORMAL
  zh: 我：**LLM将如何影响规范人类的法律？**
- en: 'ChatGPT: The rise of Large Language Models (LLMs) and similar AI technologies
    may have significant implications for legal systems around the world. Here are
    a few possible impacts:'
  id: totrans-1257
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT：大型语言模型（LLM）和类似AI技术的兴起可能对世界各地的法律体系产生重大影响。以下是可能的一些影响：
- en: '1. **Privacy Laws**: LLMs often need large amounts of data for training, which
    can raise issues related to data privacy and protection. Existing laws may need
    to be adapted or new laws introduced to protect individuals’ privacy.'
  id: totrans-1258
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 1. **隐私法**：LLM通常需要大量数据用于训练，这可能会引发与数据隐私和保护相关的问题。现有的法律可能需要调整或引入新的法律来保护个人隐私。
- en: '2. **Copyright Laws**: If LLMs generate content (like articles, music, or artwork),
    it might be necessary to clarify who owns the copyright. Is it the developers
    of the LLM, the user who requested the content, or does no one own it because
    it was generated by a machine?'
  id: totrans-1259
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 2. **版权法**：如果大型语言模型（LLM）生成内容（如文章、音乐或艺术品），可能需要明确版权归属。是LLM的开发者、请求内容的用户，还是由于是由机器生成而无人拥有？
- en: '3. **Liability Laws**: If an LLM gives advice that leads to harm, who is liable?
    The user, the developers, or the organization that owns the LLM? Current laws
    may not be equipped to handle such scenarios.'
  id: totrans-1260
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 3. **责任法**：如果LLM提供的建议导致损害，谁应承担责任？是用户、开发者还是拥有LLM的组织？当前的法律可能无法应对此类情况。
- en: '4. **Employment Laws**: If LLMs start replacing jobs previously done by humans,
    it could lead to significant societal changes that would require updates to employment
    and labor laws.'
  id: totrans-1261
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 4. **就业法**：如果LLM开始取代人类以前从事的工作，可能会导致重大的社会变革，这将需要更新就业和劳动法。
- en: '5. **Discrimination Laws**: There’s a risk that LLMs might inadvertently perpetuate
    or amplify biases present in their training data. This could lead to discriminatory
    outcomes, requiring scrutiny under existing anti-discrimination laws.'
  id: totrans-1262
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 5. **歧视法律**：存在风险，LLMs可能会无意中持续或放大其训练数据中存在的偏见。这可能导致歧视性的结果，需要根据现有的反歧视法律进行审查。
- en: '6. **Regulation of AI**: As LLMs become more integrated into society, it might
    be necessary to develop specific regulations to govern their use, similar to regulations
    that exist for other technologies. This could include standards for transparency,
    accountability, and ethical use. ֍'
  id: totrans-1263
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 6. **人工智能的监管**：随着大型语言模型（LLMs）更加深入地融入社会，可能有必要制定特定的法规来规范其使用，类似于其他技术现有的法规。这可能包括透明度、问责制和道德使用的标准。
- en: It’s important to note that the legal implications of LLMs are complex and still
    largely uncharted territory. There will likely be a need for substantial dialogue
    and collaboration between technologists, legal professionals, policymakers, and
    society at large to navigate these issues effectively.
  id: totrans-1264
  prefs: []
  type: TYPE_NORMAL
  zh: 需要注意的是，LLMs的法律含义复杂，并且大部分仍处于未知的领域。可能需要技术专家、法律专业人士、政策制定者和整个社会之间进行大量的对话和合作，以有效地解决这些问题。
- en: Self-Regulation
  id: totrans-1265
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 自我监管
- en: The shortcomings of deep-learning AI systems are well known, including concerns
    about privacy, bias, and racism, and the community has been working to correct
    these defects. LLMs have added to these problems with hallucinations and broader
    ethical concerns. All new technologies undergo a long process of updating and
    shaping to prevent the misuse of the technologies in society.
  id: totrans-1266
  prefs: []
  type: TYPE_NORMAL
  zh: 深度学习人工智能系统的缺陷是众所周知的，包括对隐私、偏见和种族主义的担忧，社区一直在努力纠正这些缺陷。LLMs通过幻觉和更广泛的伦理问题加剧了这些问题。所有新技术都要经历一个漫长的更新和塑造过程，以防止这些技术在社会中被滥用。
- en: In the 1970s, biologists invented recombinant gene technology to manipulate
    and isolate DNA segments of interest, combine DNA from different species, and
    create new functions. Researchers realized that this technology gave them immense
    power to modify DNA and even create new life forms with the potential for improving
    crops and curing disease, but also with the danger of unleashing super virulent
    and cancer-carrying viruses. Molecular biologists did not wait for regulatory
    agencies to curtail potentially dangerous experiments. They organized an International
    Congress on Recombinant DNA Molecules, held at the Asilomar Conference Center
    in Pacific Grove, California, in February 1975 (figure 10.1).[5](15580-0025.xhtml#en182)
  id: totrans-1267
  prefs: []
  type: TYPE_NORMAL
  zh: 在20世纪70年代，生物学家发明了重组基因技术，用以操纵和分离感兴趣的DNA片段，结合不同物种的DNA，并创造新的功能。研究人员意识到这项技术赋予他们巨大的修改DNA甚至创造具有改善作物和治愈疾病潜力的新生命形式的能力，但也存在释放超级病毒和携带癌症病毒的危险。分子生物学家没有等待监管机构限制可能危险的实验。他们在1975年2月于加利福尼亚州太平洋
    Grove 的 Asilomar 会议中心组织了一次关于重组DNA分子的国际会议（图10.1）。[5](15580-0025.xhtml#en182)
- en: There was disagreement among the scientists about how to restrict experiments.
    After vigorous debate, they recommended several levels of containment for experiments
    with different levels of risk. Low-risk containment was appropriate when recombinant
    DNA could not significantly increase pathogenicity or disrupt ecologies. High-risk
    containment was needed when the modified organism could lead to severe consequences
    and pose a serious biohazard to laboratory personnel or the public. These rules
    would allow research to continue but under stringent guidelines.
  id: totrans-1268
  prefs: []
  type: TYPE_NORMAL
  zh: 科学家们在如何限制实验方面存在分歧。经过激烈的辩论，他们建议为不同风险级别的实验制定几个级别的防护措施。当重组DNA不能显著增加致病性或破坏生态时，低风险防护是适当的。当修改后的生物体可能导致严重后果并对实验室人员或公众构成严重生物危害时，就需要高风险防护。这些规则将允许研究继续进行，但需在严格的指导下进行。
- en: These recommendations became standard practice by the scientific community.
    They made it possible for scientists to perform experiments and advance science
    safely. The Institutional Review Boards (IRBs) at universities and companies review
    proposed experiments to ensure they comply with regulations, meet accepted ethical
    standards, follow institutional policies, and adequately protect research participants.
    These safety policies are amended as discoveries are made, and even more powerful
    gene manipulation techniques are invented. There is a thriving biotechnology industry
    today, and many patients have benefited. For example, by tinkering with genes,
    scientists discovered that cancer was a genetic disease with diverse pathways
    that lead to different types of cancer. Once a pathway is identified, specific
    biochemical reactions can be devised to target and suppress proliferation. For
    example, Tony Hunter, my colleague at the Salk Institute, discovered a new class
    of enzymes in cells that led to Gleevec. This drug can check the progression of
    a form of leukemia. Immunotherapy has cured cancers that were once death sentences,
    such as melanoma skin cancer and non-small-cell lung cancer.
  id: totrans-1269
  prefs: []
  type: TYPE_NORMAL
  zh: 这些建议已成为科学界的标准做法。它们使得科学家能够安全地进行实验并推进科学。大学和公司的机构审查委员会（IRBs）审查拟议的实验，以确保它们符合规定，达到公认的伦理标准，遵循机构政策，并充分保护研究参与者。随着发现的出现，这些安全政策会得到修订，甚至发明出更强大的基因操作技术。今天，生物技术行业蓬勃发展，许多患者从中受益。例如，通过基因的调整，科学家发现癌症是一种具有多种途径的遗传疾病，这些途径导致不同类型的癌症。一旦确定了途径，就可以设计特定的生化反应来针对和抑制增殖。例如，我的同事，索尔克研究所的托尼·亨特，发现了一种新的细胞酶类，这导致了格列卫的发现。这种药物可以检查一种白血病的发展。免疫疗法已经治愈了曾经是死刑的癌症，如黑色素瘤皮肤癌和非小细胞肺癌。
- en: '![](images/15580_010_fig_001.jpg)'
  id: totrans-1270
  prefs: []
  type: TYPE_IMG
  zh: '![](images/15580_010_fig_001.jpg)'
- en: Figure 10.1
  id: totrans-1271
  prefs: []
  type: TYPE_NORMAL
  zh: 图10.1
- en: At the Asilomar meeting, molecular biologists self-imposed stringent containment
    procedures to prevent pathogens from escaping into the wild. Art by David Parkins.
  id: totrans-1272
  prefs: []
  type: TYPE_NORMAL
  zh: 在阿西洛马尔会议上，分子生物学家自我施加了严格的控制措施，以防止病原体逃入野外。图绘者为大卫·帕金斯。
- en: Self-regulation seems like a sensible way for the AI community to move forward,
    but not easily given the diverse views in the community and powerful self-interests
    in the corporate sector. The time is right for scientists and engineers who understand
    AI technology to work with policy experts to develop a flexible regulatory framework.
  id: totrans-1273
  prefs: []
  type: TYPE_NORMAL
  zh: 自我调节似乎是对人工智能社区前进的一种合理方式，但鉴于社区中存在不同的观点和商业部门的强大自身利益，这并不容易。现在是科学家和工程师与政策专家合作，制定灵活的监管框架的时候了，他们理解人工智能技术。
- en: '![](images/15580_010_fig_002.jpg)'
  id: totrans-1274
  prefs: []
  type: TYPE_IMG
  zh: '![](images/15580_010_fig_002.jpg)'
- en: Figure 10.2
  id: totrans-1275
  prefs: []
  type: TYPE_NORMAL
  zh: 图10.2
- en: 'Sam Altman, CEO of OpenAI, testified before Congress on May 16, 2023\. (Source:
    *New York Times*.)'
  id: totrans-1276
  prefs: []
  type: TYPE_NORMAL
  zh: OpenAI的首席执行官山姆·阿尔特曼于2023年5月16日在国会作证。（来源：《纽约时报》。）
- en: Government Regulation
  id: totrans-1277
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 政府监管
- en: In 2021, the European Union proposed a European law on artificial intelligence.
    The AI Act became the first law on AI by a major regulator when it was passed
    by the European Parliament on March 13, 2024\. The document is 105 pages long,
    with 89 sections in the preamble, 44 definitions, 4 forbidden practices, and 85
    Articles spelling out rules and penalties, all written in legalese.[6](15580-0025.xhtml#en183)
    For example, it limits resume-scanning tools that rank job applicants. This approach
    looks well-meaning but premature.[7](15580-0025.xhtml#en184) AI is moving so quickly
    that these proposed laws are already obsolete. For example, there was no mention
    of ChatGPT or generative AI models when the law was drafted. AI is evolving much
    faster than regulatory machinery.
  id: totrans-1278
  prefs: []
  type: TYPE_NORMAL
  zh: 2021年，欧盟提出了关于人工智能的欧洲法律。当欧洲议会于2024年3月13日通过时，AI法案成为主要监管机构通过的第一部人工智能法律。该文件共有105页，序言中有89个部分，44个定义，4项禁止做法，以及85个条款详细说明了规则和处罚，所有这些都用法律术语写成。[6](15580-0025.xhtml#en183)
    例如，它限制了简历扫描工具对求职申请人的排名。这种方法看起来是善意的，但为时过早。[7](15580-0025.xhtml#en184) 人工智能发展如此迅速，这些拟议的法律已经过时。例如，在法律起草时，没有提到ChatGPT或生成式AI模型。人工智能的发展速度比监管机制快得多。
- en: On May 16, 2023, Sam Altman, CEO of OpenAI, testified before Congress for three
    hours on the need to regulate AI (figure 10.2).[8](15580-0025.xhtml#en185) “I
    think if this technology goes wrong, it can go quite wrong. And we want to be
    vocal about that,” he said. “We want to work with the government to prevent that
    from happening.” He proposed a government agency that investigates companies and
    issues licenses for them to develop LLMs, including safety regulations and tests
    before they can be released to the public, just as the Food and Drug Administration
    (FDA) regulates drug clinical trials. “We believe that the benefits of the tools
    we have deployed so far vastly outweigh the risks, but ensuring their safety is
    vital to our work,” Altman said.
  id: totrans-1279
  prefs: []
  type: TYPE_NORMAL
  zh: 2023年5月16日，OpenAI的首席执行官山姆·阿尔特曼在国会前就监管AI的必要性进行了三小时的证词（图10.2）。[8](15580-0025.xhtml#en185)
    “我认为如果这项技术出错，它可能会非常糟糕。我们希望对此大声疾呼，”他说。“我们希望与政府合作，防止这种情况发生。”他提出建立一个政府机构，调查公司并为他们发放开发LLMs的许可证，包括在它们可以公开发布之前的安全法规和测试，就像食品药品监督管理局（FDA）监管药物临床试验一样。“我们相信我们迄今为止部署的工具的好处远远大于风险，但确保它们的安全对我们来说至关重要，”阿尔特曼说。
- en: Altman’s testimony before Congress was cordial, contrasting the antagonistic
    interactions previously experienced by Mark Zuckerberg, Jeff Bezos, and other
    high-tech CEOs. Altman also had dinner with dozens of House members and met individually
    with several senators before the hearing, where he outlined a loose regulatory
    road map for managing the rapidly developing AI landscape that could significantly
    impact the economy. On June 9, 2023, Altman made a high-profile trip to South
    Korea and called for the coordinated international regulation of generative artificial
    intelligence.
  id: totrans-1280
  prefs: []
  type: TYPE_NORMAL
  zh: 阿尔特曼在国会前的证词是友好的，与马克·扎克伯格、杰夫·贝索斯和其他高科技公司首席执行官之前经历的对抗性互动形成鲜明对比。在听证会之前，阿尔特曼还与数十名众议院议员共进晚餐，并与几位参议员进行了个别会面，在那里他概述了一个宽松的监管路线图，用于管理快速发展的AI景观，这可能会对经济产生重大影响。2023年6月9日，阿尔特曼高调访问韩国，呼吁对生成式人工智能进行协调的国际监管。
- en: 'Altman’s full-court press for regulations puzzled me. It reminded me of the
    strange effects of *Toxoplasma gondii*, a brain parasite, on rodents: once infected,
    rodents lose their fear of cats and become more likely to be eaten.[9](15580-0025.xhtml#en186)
    Another possible explanation is that stiff regulations would favor the largest
    high-tech companies that can afford the stringent testing, comparable to the hundreds
    of millions of dollars that clinical trials cost pharmaceutical companies. Big
    Pharma companies buy small biotechnology companies that can’t afford clinical
    trials. Altman was proposing the same model for the AI industry to Congress.'
  id: totrans-1281
  prefs: []
  type: TYPE_NORMAL
  zh: 阿尔特曼对监管的全力推动让我感到困惑。这让我想起了脑寄生虫**弓形虫**对啮齿动物产生的奇怪影响：一旦感染，啮齿动物会失去对猫的恐惧，并更有可能被吃掉。[9](15580-0025.xhtml#en186)
    另一种可能的解释是，严格的法规将有利于能够承担严格测试的最大高科技公司，这相当于制药公司花费的数亿美元的临床试验费用。大型制药公司收购无法承担临床试验的小型生物技术公司。阿尔特曼正在向国会提出为AI行业制定相同模式的建议。
- en: On November 17, 2023, Ilya Sutskever, the chief scientist and a member of the
    board of trustees, announced that Sam Altman was fired for being “not consistently
    candid.” The board that supported this coup was heavily skewed toward those who
    thought Altman was not prioritizing dangers posed by AI and was moving too fast.
    When investors and employees pushed back, Altman was reinstated four days later.[10](15580-0025.xhtml#en187)
    This is a microcosm of the AI debate between those who want to slow down and those
    who want to move forward. The new board now resembles boards in other high-tech
    companies, with goals aligned with those of its investors. This dramatic boardroom
    confrontation is a harbinger of how AI might play out in the government, which
    needs to balance safety with benefits.
  id: totrans-1282
  prefs: []
  type: TYPE_NORMAL
  zh: 2023年11月17日，首席科学家和董事会成员伊利亚·苏茨克维宣布，山姆·阿尔特曼因“不一致地坦诚”而被解雇。支持这次政变的董事会严重偏向于那些认为阿尔特曼没有优先考虑AI带来的危险，并且行动过于迅速的人。当投资者和员工进行反击后，阿尔特曼四天后被恢复职位。[10](15580-0025.xhtml#en187)
    这是对那些想要放慢速度和那些想要前进的人之间AI辩论的一个缩影。新的董事会现在类似于其他高科技公司的董事会，其目标与投资者的目标一致。这场戏剧性的董事会冲突预示了AI在政府中的可能表现，政府需要平衡安全与利益。
- en: On October 30, 2023, the White House issued the Executive Order on the Safe,
    Secure, and Trustworthy Development and Use of Artificial Intelligence (figure
    10.3).[11](15580-0025.xhtml#en188) This 117-page document requires companies to
    provide the government with safety testing results and other proprietary information
    before making large AI models available to the public. Government agencies will
    develop and enforce standards. The Executive Order does not prevent using copyrighted
    data to train LLMs.
  id: totrans-1283
  prefs: []
  type: TYPE_NORMAL
  zh: 2023 年 10 月 30 日，白宫发布了关于人工智能安全、可靠和值得信赖的开发与使用的行政命令（图 10.3）。[11](15580-0025.xhtml#en188)
    这份 117 页的文件要求公司在向公众提供大型 AI 模型之前，向政府提供安全测试结果和其他专有信息。政府机构将制定和执行标准。行政命令不会阻止使用受版权保护的数据来训练
    LLMs。
- en: '![](images/15580_010_fig_003.jpg)'
  id: totrans-1284
  prefs: []
  type: TYPE_IMG
  zh: '![图片](images/15580_010_fig_003.jpg)'
- en: Figure 10.3
  id: totrans-1285
  prefs: []
  type: TYPE_NORMAL
  zh: 图 10.3
- en: The Office of the President issued this Executive Order to regulate AI in the
    United States.
  id: totrans-1286
  prefs: []
  type: TYPE_NORMAL
  zh: 总统办公室发布了这份行政命令，以规范美国的 AI。
- en: Copyrights
  id: totrans-1287
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 版权
- en: LLMs distill human thought, encapsulating our best and worst proclivities. LLMs
    are trained on text representing the accumulated writing of countless generations
    of novelists, poets, and writers, without their permission. Is this a rip-off?
    All of the books they have read in their lifetimes have influenced the brains
    of these novelists, poets, and writers, not unlike the process that created LLMs,
    albeit not on such a large scale. Should their creations also be subject to copyright
    laws? No, not unless they plagiarize long sections of text without acknowledgment
    according to current copyright laws. Should we impose the same standards on LLMs?
    The *New York Times* sued OpenAI and Microsoft for copyright infringement on December
    27, 2023, for “billions of dollars in statutory and actual damages.” The court
    will weigh in on their “unlawfully copying and use of The Time’s uniquely valuable
    works.”[12](15580-0025.xhtml#en189)
  id: totrans-1288
  prefs: []
  type: TYPE_NORMAL
  zh: 大型语言模型（LLMs）提炼了人类思想，封装了我们的最好和最坏倾向。LLMs 在未经许可的情况下，在代表无数代小说家、诗人和作家累积写作的文本上进行训练。这是剽窃吗？他们一生中读过的所有书籍都影响了这些小说家、诗人和作家的头脑，这与创建
    LLMs 的过程类似，尽管规模不是那么大。他们的创作是否也应该受到版权法的约束？不，除非他们未经承认地剽窃了大量的文本，根据当前的版权法。我们应该对 LLMs
    施加同样的标准吗？2023 年 12 月 27 日，*纽约时报* 因版权侵权对 OpenAI 和微软提起了诉讼，索赔“数十亿美元的法定和实际损害赔偿。”法院将权衡他们“非法复制和使用《时代》的独特有价值作品。”[12](15580-0025.xhtml#en189)
- en: DALL-E 2, Midjourney, Stable Diffusion, and Adobe Firefly are programs that
    generate images from word prompts. They are trained on massive datasets of labeled
    images from the internet and curated sources. The images they produce are photorealistic,
    in any specified style, and appear magically within a few seconds. Getty Images,
    a photo licensing company, filed a lawsuit against Stable Diffusion, alleging
    that the company stole 12 million images. A Getty Images watermark was reproduced
    in one image generated by Stable Diffusion—a smoking gun.
  id: totrans-1289
  prefs: []
  type: TYPE_NORMAL
  zh: DALL-E 2、Midjourney、Stable Diffusion 和 Adobe Firefly 是从文字提示生成图像的程序。它们在互联网和精选来源的大量标记图像数据集上进行了训练。它们产生的图像是逼真的，可以是任何指定的风格，并在几秒钟内神奇地出现。图片许可公司
    Getty Images 对 Stable Diffusion 提起了诉讼，指控该公司窃取了 1200 万张图片。Stable Diffusion 生成的一张图片中出现了
    Getty Images 的水印——这是一把明显的证据。
- en: Artists also want to be compensated for the use of their artwork, even when
    it is only their style that is being copied. Forgers who create new paintings
    that could pass for ones by an old master have been around for ages. Is the new
    technology any different other than being more efficient? But the artists who
    want to be compensated have also been influenced by all the paintings they have
    ever seen when they create a new painting, just like their generative AI brethren.
    Should they also be required to compensate all of their predecessors? Plagiarism
    laws are for explicit copying, not for stylistic resemblance.
  id: totrans-1290
  prefs: []
  type: TYPE_NORMAL
  zh: 即使只是模仿了他们的风格，艺术家们也希望得到对其作品的报酬。能够创作出可以冒充古代大师作品的赝品的伪造者已经存在很长时间了。新技术除了更高效之外，还有什么不同吗？但那些希望得到报酬的艺术家在创作新画作时，也受到了他们所见过的所有画作的影响，就像他们的生成式
    AI 兄弟一样。他们是否也应该补偿所有前辈？剽窃法是针对明确复制的，而不是针对风格相似。
- en: Artists are also concerned that generative AI programs will kill their livelihood.
    Here we have a precedent. When photography was invented, it did not replace painters.
    Human-generated photography has become another genre of art that coexists with
    human-generated drawings and paintings. If photography were banned at its inception
    before it could be perfected, art culture would be poorer for not being able to
    use the technology creatively. Unintended consequences of making photography illegal
    include, for example, no photos of loved ones-only the wealthy could afford artists
    for family portraits; there would be no movies to document history and entertain
    us; and there would be no cameras on smartphones. Technology extends human expression
    and enriches the human experience.
  id: totrans-1291
  prefs: []
  type: TYPE_NORMAL
  zh: 艺术家们也担心生成式AI程序会摧毁他们的生计。这里有一个先例。当摄影被发明时，它并没有取代画家。由人类创造的摄影已成为另一种与人类创造的绘画和素描共存的艺术类型。如果摄影在其完善之前被禁止，艺术文化将因无法创造性地使用这项技术而变得贫瘠。将摄影定为非法的意外后果包括，例如，没有亲人照片——只有富人才能负担得起艺术家为家庭画像；将没有电影来记录历史和娱乐我们；智能手机上也不会有摄像头。技术扩展了人类表达，丰富了人类体验。
- en: These thorny legal issues are slowly wending their way through courts of law.
    How the cases are settled will set precedents for the future of these technologies.
    Many, from writers to artists and advertisers to architects, will be affected.
  id: totrans-1292
  prefs: []
  type: TYPE_NORMAL
  zh: 这些棘手的法律问题正缓慢地在法庭上推进。案件的解决方式将为这些技术的未来设定先例。许多行业，从作家到艺术家，从广告商到建筑师，都将受到影响。
- en: AI is evolving faster than lawsuits. It is becoming clear that the quality of
    the data used to train an LLM can make a big difference in the quality of its
    performance. AI companies are beginning to license large, high-quality databases.
    If training time and LLM size can be reduced by 10-100 with high-quality data,
    there could be a market for well-curated data for license or purchase.
  id: totrans-1293
  prefs: []
  type: TYPE_NORMAL
  zh: AI的发展速度超过了诉讼。很明显，用于训练LLM的数据质量可以对其性能质量产生重大影响。AI公司开始许可大型、高质量的数据库。如果通过高质量数据可以将训练时间和LLM大小减少10-100倍，那么可能会有一个市场用于许可或购买精心整理的数据。
- en: Credit
  id: totrans-1294
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 致谢
- en: ChatGPT is being used in many ways to help authors of scientific papers. Many
    nonnative speakers use it to edit their manuscripts. Others ask ChatGPT to help
    them clearly explain their findings, and they are rewarded with new insights.
    Sometimes, an author feels justified to give ChatGPT coauthorship on their paper,
    and ChatGPT was a coauthor on an article published in *Nature*. Many journals
    have adopted a policy against allowing LLMs to be coauthors. Their rationale is
    that “An attribution of authorship carries with it accountability for the work,
    which cannot be effectively applied to LLMs.”[13](15580-0025.xhtml#en190) There
    do not seem to be similar strictures against thanking ChatGPT in the acknowledgments.
  id: totrans-1295
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT正被用于多种方式来帮助科学论文的作者。许多非母语使用者用它来编辑他们的手稿。其他人请求ChatGPT帮助他们清晰地解释他们的发现，并获得了新的见解。有时，作者会认为有理由将ChatGPT列为共同作者，ChatGPT曾是《自然》杂志上一篇文章的共同作者。许多期刊已经采取政策，不允许LLM成为共同作者。他们的理由是：“归因于作者的身份伴随着对工作的责任，这不能有效地应用于LLM。”[13](15580-0025.xhtml#en190)似乎没有类似的严格规定禁止在致谢中感谢ChatGPT。
- en: Similar discussions are taking place in other professions, especially those
    where writers tap into the creative side of ChatGPT. Views of writers are varied.
    Some novelists tap into hallucinations and consider ChatGPT to be a valued muse
    that should be given due credit. Others say it is a machine-like glorified spell
    checker that no one should ever credit. AI is challenging many of our ethical
    practices. We will have to adapt our thinking and rules as AI continues to improve,
    and the line between machines and humans continues to blur.
  id: totrans-1296
  prefs: []
  type: TYPE_NORMAL
  zh: 类似的讨论在其他职业中也在进行，尤其是在作家利用ChatGPT的创造性方面。作家的观点各不相同。一些小说家利用幻觉，认为ChatGPT是一个有价值的缪斯，应该得到应有的认可。其他人则说它是一个类似机器的、被过分美化的拼写检查器，没有人应该给它任何认可。AI正在挑战我们许多伦理实践。随着AI的持续改进，机器与人类之间的界限将继续模糊，我们将不得不调整我们的思维和规则。
- en: GPT 10.2 summarizes ways that AI could be regulated.
  id: totrans-1297
  prefs: []
  type: TYPE_NORMAL
  zh: GPT 10.2总结了AI可能被监管的方式。
- en: GPT 10.2
  id: totrans-1298
  prefs: []
  type: TYPE_NORMAL
  zh: GPT 10.2
- en: 'Me: **Summarize three ways AI could be regulated that were discussed in this
    chapter**.'
  id: totrans-1299
  prefs: []
  type: TYPE_NORMAL
  zh: 我：**总结本章讨论的AI可能被监管的三个方式**。
- en: 'ChatGPT: The text discusses various ways in which AI can be regulated, focusing
    on the need for guidelines and control measures to ensure ethical use and safety.
    Here are three key approaches to AI regulation as described in the text:'
  id: totrans-1300
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT：文本讨论了人工智能可以采取的各种监管方式，重点关注确保道德使用和安全所需的指南和控制措施。以下是文本中描述的三个关键人工智能监管方法：
- en: '1. **Self-Regulation**: Drawing a parallel with the self-imposed regulations
    by molecular biologists in the 1970s, the text suggests that the AI community
    could adopt a similar approach. This would involve the community itself setting
    stringent guidelines and containment procedures to prevent misuse and ethical
    violations. The challenge lies in reconciling diverse views within the community
    and balancing corporate self-interests.'
  id: totrans-1301
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 1. **自我监管**：将文本与20世纪70年代分子生物学家自我施加的规范进行类比，文本建议人工智能社区可以采取类似的方法。这包括社区本身制定严格的指导方针和遏制程序，以防止滥用和道德违规。挑战在于协调社区内的不同观点，以及平衡企业自身利益。
- en: '2. **International Regulation**: The text highlights the potential existential
    risks associated with AI, comparing them to the threats posed by nuclear weapons.
    It suggests that international agreements and treaties, similar to those governing
    nuclear disarmament, may be necessary to control the proliferation and potential
    self-enhancement of AI systems. Collaborative efforts between scientists and policy
    experts are emphasized as essential to develop effective international regulations.'
  id: totrans-1302
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 2. **国际监管**：文本突出了与人工智能相关的潜在存在风险，将其与核武器的威胁相比较。它建议可能需要类似管理核裁军的国际协议和条约来控制人工智能系统的扩散和潜在的自我增强。强调科学家和政策专家之间的合作对于制定有效的国际法规是至关重要的。
- en: '3. **Regulatory Protection through Government Oversight**: The text also explores
    the idea of government intervention in regulating AI. It cites the example of
    OpenAI’s CEO, Sam Altman, advocating for the creation of a government agency to
    oversee the development of AI, including safety regulations and licensing. This
    approach would be akin to how the Food and Drug Administration (FDA) regulates
    clinical trials for drugs. The text also hints at the potential strategic advantage
    of such regulations for large tech companies, as stringent testing could favor
    those with significant resources.'
  id: totrans-1303
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 3. **通过政府监督的监管保护**：文本还探讨了政府干预监管人工智能的想法。它引用了OpenAI首席执行官山姆·奥特曼（Sam Altman）倡导创建一个政府机构来监督人工智能的发展，包括安全法规和许可的例子。这种方法类似于食品药品监督管理局（FDA）监管药物的临床试验。文本还暗示了此类法规对大型科技公司可能具有潜在的战略优势，因为严格的测试可能会有利于那些拥有大量资源的公司。
- en: Overall, the text emphasizes the urgency and complexity of regulating AI, considering
    its rapid evolution and potential risks. It calls for a multifaceted approach
    that combines self-regulation within the AI community, international collaboration,
    and government oversight to ensure responsible development and deployment of AI
    technologies. ֍
  id: totrans-1304
  prefs: []
  type: TYPE_NORMAL
  zh: 总体而言，文本强调了监管人工智能的紧迫性和复杂性，考虑到其快速发展和潜在风险。它呼吁采取多方面的方法，结合人工智能社区内的自我监管、国际合作和政府监督，以确保人工智能技术的负责任发展和部署。
    ֍
- en: III
  id: totrans-1305
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: III
- en: Back to the Future
  id: totrans-1306
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 回到未来
- en: The year 2023 was an *annus mirabilis* for AI. LLMs suddenly appeared in November
    2022, a decade after deep learning entered the public’s awareness. However, LLMs
    have deep roots in research, dating back to the 1960s. Learning algorithms for
    multilayer neural networks were discovered in the 1980s. The first successful
    real-world applications in vision and speech occurred in the 2010s. Where did
    the inspiration come for these advances? Where are LLMs heading? What will be
    the next surprise from next-generation LLMs?
  id: totrans-1307
  prefs: []
  type: TYPE_NORMAL
  zh: 2023年是人工智能的*奇迹之年*。大型语言模型（LLMs）在2022年11月突然出现，距离深度学习进入公众意识已有十年。然而，LLMs的研究根源可以追溯到20世纪60年代。多层神经网络的学习算法在20世纪80年代被发现。视觉和语音领域的第一个成功的实际应用发生在2010年代。这些进步的灵感来自哪里？LLMs将走向何方？下一代LLMs的下一个惊喜又是什么？
- en: As LLMs become more capable, they may transform the way we interact with machines,
    and they may start interacting with each other. Chapter 11 surveys lessons learned
    from nature and their impact on modern AI. Increasingly, LLMs are being coupled
    with sensorimotor devices, bringing them one step closer to human experience.
    In chapter 12, a road map for achieving artificial general autonomy (AGA) is outlined
    with major improvements inspired by brain systems, and chapter 13 explores how
    LLMs could, in turn, be used to uncover new insights into brain function. The
    book ends with what to expect ahead in chapter 14\. Don’t miss the bonus in the
    afterword.
  id: totrans-1308
  prefs: []
  type: TYPE_NORMAL
  zh: 随着LLMs能力的增强，它们可能会改变我们与机器互动的方式，并且它们可能会开始相互互动。第11章概述了从自然界学到的经验及其对现代人工智能的影响。越来越，LLMs正与感觉运动设备相结合，使它们更接近人类体验。在第12章中，基于大脑系统的重大改进，概述了实现人工通用自主性（AGA）的路线图，第13章探讨了LLMs如何反过来用于揭示大脑功能的新见解。本书以第14章展望未来结束。不要错过附录中的额外内容。
- en: GPT III.1
  id: totrans-1309
  prefs: []
  type: TYPE_NORMAL
  zh: GPT III.1
- en: 'Me: **Please summarize the introduction to Part III**.'
  id: totrans-1310
  prefs: []
  type: TYPE_NORMAL
  zh: 我：**请总结第三部分的前言**。
- en: 'ChatGPT: Large Language Models (LLMs) are increasingly being combined with
    sensorimotor devices, potentially transforming human-machine interactions.'
  id: totrans-1311
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT：大型语言模型（LLMs）越来越多地与感觉运动设备相结合，可能改变人机交互。
- en: • A roadmap for achieving artificial general autonomy is proposed, drawing inspiration
    from brain systems.
  id: totrans-1312
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 人工智能实现通用自主性的路线图被提出，其灵感来源于大脑系统。
- en: • LLMs could be used to gain new insights into brain function.
  id: totrans-1313
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 机器学习语言模型（LLMs）可用于深入了解大脑功能。
- en: • The public’s awareness of LLMs surged in 2022, a decade after Deep Learning
    became well-known.
  id: totrans-1314
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 机器学习语言模型（LLMs）的公众意识在2022年激增，这是深度学习广为人知的十年之后。
- en: • The development of LLMs has a long history, dating back to research from the
    1960s.
  id: totrans-1315
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 机器学习语言模型（LLMs）的发展有着悠久的历史，可以追溯到20世纪60年代的研究。
- en: • Learning algorithms for multilayer neural networks emerged in the 1980s and
    found practical applications in vision and speech in the 2010s.
  id: totrans-1316
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 多层神经网络的学习算法在20世纪80年代出现，并在2010年代在视觉和语音中找到了实际应用。
- en: • The future of LLMs could be inferred from understanding their past development
    and origins. ֍
  id: totrans-1317
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 机器学习语言模型（LLMs）的未来可以从理解其过去的发展和起源中推断出来。 ֍
- en: '11'
  id: totrans-1318
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '11'
- en: Evolution of AI
  id: totrans-1319
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 人工智能的演变
- en: What We Can Learn from Nature
  id: totrans-1320
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 我们可以从自然界学到什么
- en: The engineering goal of artificial intelligence in the 1960s was to reproduce
    the functional capabilities of human intelligence by writing computer programs
    based on intuition. I once asked Allen Newell, a computer scientist from Carnegie
    Mellon University and one of the pioneers of artificial intelligence who attended
    the seminal Dartmouth summer conference in 1956, why AI pioneers had ignored brains,
    the substrate of human intelligence. Brain performance was the only proof that
    any of the hard problems in AI were solvable. He told me that he had been open
    to insights from brain research, but there hadn’t been enough known about brains
    at the time to be of much help.
  id: totrans-1321
  prefs: []
  type: TYPE_NORMAL
  zh: 20世纪60年代人工智能的工程目标是通过对基于直觉的计算机程序进行编写来重现人类智能的功能能力。我曾问过艾伦·纽厄尔，卡内基梅隆大学的计算机科学家，也是1956年达特茅斯夏季会议的先驱之一，为什么人工智能先驱们忽视了大脑，这是人类智能的基础。大脑性能是解决人工智能中任何难题的唯一证明。他告诉我，他对大脑研究的见解持开放态度，但当时对大脑的了解还不够，无法提供太多帮助。
- en: 'As AI matured, the attitude changed from “not enough is known” to “brains are
    not relevant,” which cognitive scientists called functionalism. An analogy with
    aviation commonly justified this view: if you want to build a flying machine,
    you would be wasting your time studying birds that flap their wings or their feathers.
    Quite to the contrary, the Wright brothers were keen observers of gliding birds,
    which are highly efficient flyers.[1](15580-0025.xhtml#en191) They learned from
    birds the basic principles of aerodynamics and designs for practical airfoils;
    they constructed wings from stiff canvas stretched over wood spars, not unlike
    feathers, much lighter than the failed heavy metal prototypes favored by governments.
    Modern jets have sprouted winglets at the tips of wings, saving 5 percent on fuel
    and looking suspiciously like wing tips on eagles (figure 11.2).'
  id: totrans-1322
  prefs: []
  type: TYPE_NORMAL
  zh: 随着人工智能的成熟，态度从“知识不足”转变为“大脑无关紧要”，认知科学家称之为功能主义。一个与航空相关的类比通常可以证明这种观点：如果你想制造一架飞行器，你会浪费时间研究那些拍打翅膀或羽毛的鸟。恰恰相反，莱特兄弟对滑翔鸟非常关注，这些鸟是高效的飞行者。[1](15580-0025.xhtml#en191)
    他们从鸟类那里学到了空气动力学的基本原理和实用机翼的设计；他们用绷紧在木梁上的坚固帆布制作机翼，这与羽毛类似，比政府青睐的失败的重金属原型轻得多。现代喷气式飞机在机翼尖端安装了翼尖，节省了5%的燃料，看起来可疑地像鹰的翼尖（图11.2）。
- en: Following a series of crashes, the first successful flight in 1903 lasted just
    twelve seconds and traveled 120 feet (figure 11.1). The demonstration of powered
    flight at Kitty Hawk was important, even though the technology was primitive by
    today’s standards. Flight control, for example, still in its infancy, was flawed
    and was gradually refined by incremental improvements. The original Wright flyer
    twisted the wings, like birds, to turn the airplane. Flaps on hinges were a better
    solution.
  id: totrans-1323
  prefs: []
  type: TYPE_NORMAL
  zh: 在一系列坠机事件之后，1903年的第一次成功飞行仅持续了12秒，飞行了120英尺（图11.1）。在基蒂霍克展示的动力飞行技术，尽管按照今天的标准技术还很原始，但仍然很重要。例如，飞行控制仍处于初级阶段，存在缺陷，并通过逐步改进逐渐完善。最初的莱特飞行器像鸟一样扭曲机翼来转向飞机。铰链上的襟翼是一个更好的解决方案。
- en: '![](images/15580_011_fig_001.jpg)'
  id: totrans-1324
  prefs: []
  type: TYPE_IMG
  zh: '![图片](images/15580_011_fig_001.jpg)'
- en: Figure 11.1
  id: totrans-1325
  prefs: []
  type: TYPE_NORMAL
  zh: 图11.1
- en: The first powered and controlled flight was on December 17, 1903, at Kitty Hawk,
    with Orville Wright at the controls and Wilbur Wright following. The design of
    their flying machine was based on principles learned from nature.
  id: totrans-1326
  prefs: []
  type: TYPE_NORMAL
  zh: 首次有动力和控制的飞行是在1903年12月17日，在基蒂霍克，由奥维尔·莱特操控，威尔伯·莱特跟随。他们的飞行器设计是基于从自然界学到的原理。
- en: Today’s LLMs are at the Wright brothers’ stage and have a long road of improvements
    ahead of them. Although LLMs have demonstrated language competency, they also
    have flaws,[2](15580-0025.xhtml#en192) and much ongoing research is aimed at improving
    their performance. But the capabilities of LLMs deserve our attention.
  id: totrans-1327
  prefs: []
  type: TYPE_NORMAL
  zh: 今天的LLMs处于莱特兄弟的阶段，他们面前还有很长的改进之路。尽管LLMs已经展示了语言能力，但它们也存在缺陷[2](15580-0025.xhtml#en192)，并且许多正在进行的研究旨在提高它们的性能。但LLMs的能力值得我们关注。
- en: Much more is now known about how brains process sensory information, accumulate
    evidence, make decisions, and plan future actions. Cortical hierarchies inspired
    deep learning and nature has accomplished much more that could inspire us. There
    is a burgeoning new field in computer science called algorithmic biology, which
    seeks to describe the wide range of problem-solving strategies used by biological
    systems.[3](15580-0025.xhtml#en193) The lesson here is we can learn from nature’s
    general principles and specific solutions to complex problems, honed by evolution
    and passed down the chain of life to humans.
  id: totrans-1328
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们对大脑如何处理感官信息、积累证据、做出决策和规划未来行动的了解更多。皮质层次启发了深度学习，而自然界已经完成了许多可以启发我们的工作。在计算机科学中，有一个新兴领域叫做算法生物学，它试图描述生物系统使用的广泛的问题解决策略。[3](15580-0025.xhtml#en193)
    这里的教训是我们可以从自然界的一般原则和复杂问题的具体解决方案中学习，这些解决方案经过进化锤炼，并通过生命链传递给人类。
- en: '![](images/15580_011_fig_002a.jpg)'
  id: totrans-1329
  prefs: []
  type: TYPE_IMG
  zh: '![图片](images/15580_011_fig_002a.jpg)'
- en: '![](images/15580_011_fig_002b.jpg)'
  id: totrans-1330
  prefs: []
  type: TYPE_IMG
  zh: '![图片](images/15580_011_fig_002b.jpg)'
- en: Figure 11.2
  id: totrans-1331
  prefs: []
  type: TYPE_NORMAL
  zh: 图11.2
- en: Nature has optimized birds for energy efficiency. (Top) The curved feathers
    at the wing tips of an eagle boost energy efficiency during gliding. (Bottom)
    Winglets on commercial jets save fuel by reducing drag from vortices.
  id: totrans-1332
  prefs: []
  type: TYPE_NORMAL
  zh: 自然已经优化了鸟类的能量效率。（顶部）鹰的翼尖弯曲羽毛在滑翔时提高了能量效率。（底部）商用喷气式飞机上的翼尖通过减少涡流的阻力来节省燃料。
- en: Learning versus Programming
  id: totrans-1333
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 学习与编程
- en: Learning wasn’t a central part of traditional AI. The goal of AI in the twentieth
    century was to program intelligence, and different programs were needed for sensory,
    motor, and planning modules. For example, the goal of the vision module was to
    create an internal model of the external world.[4](15580-0025.xhtml#en194) Writing
    a vision program proved to be more difficult than anyone imagined. But is vision
    an end in itself? Vision facilitates motor interactions with the world. Recent
    research has shown more motor feedback to the visual cortex than feedforward visual
    signals.[5](15580-0025.xhtml#en195) These pre-movement motor signals predict self-generated
    visual signals, freeing up limited feedforward bandwidth for unpredicted visual
    input.[6](15580-0025.xhtml#en196) There is no good reason why nature should have
    confused us with all these details.
  id: totrans-1334
  prefs: []
  type: TYPE_NORMAL
  zh: 学习并不是传统人工智能的核心部分。二十世纪人工智能的目标是编程智能，需要不同的程序来处理感知、运动和规划模块。例如，视觉模块的目标是创建外部世界的内部模型。[4](15580-0025.xhtml#en194)
    编写视觉程序证明比任何人想象的都要困难。但视觉本身就是一个目标吗？视觉促进了与世界之间的运动交互。最近的研究表明，视觉皮层接收到的运动反馈比前馈视觉信号要多。[5](15580-0025.xhtml#en195)
    这些预先运动信号预测自我生成的视觉信号，从而为不可预测的视觉输入腾出有限的正向带宽。[6](15580-0025.xhtml#en196) 没有很好的理由说明自然界为什么要用所有这些细节来困扰我们。
- en: Learning needs lots of computer power, which was not available in the early
    days of AI, and lots of data, which is now abundant. Over the decades, the cost
    of computing and data decreased, and the cost of writing computer programs increased.
    After they crossed in 2012, machine learning became the dominant tool for solving
    AI problems (figure 11.3). The cost of computing keeps going down by a factor
    of two every two years, an exponential decrease that has continued for a long
    time, which is rare for a technology. Computers have qualitatively changed our
    lives. Televisions are computers that talk to other computers when you stream
    videos. Automobiles are computers on wheels that will soon be talking with each
    other. Computers have transformed science at every stage from collecting data,
    analyzing data and generating new hypotheses.
  id: totrans-1335
  prefs: []
  type: TYPE_NORMAL
  zh: 学习需要大量的计算机能力，这在人工智能的早期并不可用，而现在数据却非常丰富。几十年来，计算和数据的成本下降，编写计算机程序的成本上升。在 2012 年它们交叉之后，机器学习成为解决人工智能问题的主导工具（图
    11.3）。计算成本每两年下降一倍，这种指数级下降已经持续了很长时间，这在技术中是罕见的。计算机从本质上改变了我们的生活。电视在你流视频时与其他计算机交谈的计算机。汽车是轮子上的计算机，很快就会相互交谈。计算机在收集数据、分析数据和生成新假设的每个阶段都改变了科学。
- en: As we learn new things, we modify our “wetware.” Unlike digital computers, where
    the same hardware can run different software programs, in brains, the hardware
    *is* the software, and no two brains are identical. Because brains are composed
    of many special-purpose computers, reconstructing how neurons are connected and
    recording what they communicate will reveal the algorithms discovered by nature.
    Brains are built from many interacting algorithms;[7](15580-0025.xhtml#en197)
    the problem of integrating these subsystems is alleviated because they are all
    built with neurons that can adapt to each other, as reflected in the rapid progress
    that has been made in building and integrating diverse neural network architectures
    for AI. In contrast, integrating modules with different rules and symbols, such
    as vision, motor control, and planning modules, was problematic because they had
    separate programs that were not easy to coordinate.
  id: totrans-1336
  prefs: []
  type: TYPE_NORMAL
  zh: 随着我们学习新事物，我们修改我们的“湿件”。与数字计算机不同，相同的硬件可以运行不同的软件程序，而在大脑中，硬件**就是**软件，没有两个大脑是完全相同的。因为大脑由许多专用计算机组成，重建神经元之间的连接并记录它们的通信将揭示自然界发现的算法。大脑是由许多相互作用的算法构建的；[7](15580-0025.xhtml#en197)
    由于它们都是用可以相互适应的神经元构建的，因此整合这些子系统的问题得到了缓解，正如在构建和整合用于人工智能的多种神经网络架构方面取得的快速进展所反映的那样。相比之下，整合具有不同规则和符号的模块，如视觉、运动控制和规划模块，是有问题的，因为它们有各自独立的程序，这些程序不容易协调。
- en: '![](images/15580_011_fig_003.jpg)'
  id: totrans-1337
  prefs: []
  type: TYPE_IMG
  zh: '![图片](images/15580_011_fig_003.jpg)'
- en: Figure 11.3
  id: totrans-1338
  prefs: []
  type: TYPE_NORMAL
  zh: 图 11.3
- en: The trade-off between programming and learning for solving problems in AI. In
    1980, computing was expensive, which favored programming. The cost of computing
    fell as programming costs rose, and they crossed in 2012\. As the cost of computing
    continues to drop, learning from larger datasets allows even more complex AI problems
    to be solved.
  id: totrans-1339
  prefs: []
  type: TYPE_NORMAL
  zh: 在人工智能中解决问题时，编程和学习的权衡。1980年，计算成本高昂，这有利于编程。随着编程成本的上升，计算成本下降，它们在2012年交叉。随着计算成本的持续下降，从更大的数据集中学习使得解决更复杂的人工智能问题成为可能。
- en: In retrospect, we can see why symbol processing was such an attractive road
    to take for early AI. Language was the poster child for symbol processing and
    digital computers were particularly efficient at representing symbols and performing
    logic. However, writing AI programs based on rules and symbols is labor-intensive—each
    application needs a different program. Writing logical programs, even for language,
    suffered from the curse of dimensionality—an explosion in the number of possible
    combinations of things and situations that could occur in the world that have
    to be anticipated by the programmer. For example, we underestimated the complexity
    of simply seeing and reaching because it is so effortless to recognize an object
    and pick it up. We do this without thinking and do not have conscious access to
    all the subconscious processing that underlies sensing and coordinated movements.
    Nor do we know how we make most decisions and only later explain them with plausible
    rationalizations. Subconscious processing is also a source of creativity, from
    art to mathematics.[8](15580-0025.xhtml#en198)
  id: totrans-1340
  prefs: []
  type: TYPE_NORMAL
  zh: 回顾过去，我们可以看到为什么符号处理对早期人工智能来说是一条如此吸引人的道路。语言是符号处理的典型代表，数字计算机在表示符号和执行逻辑方面特别高效。然而，基于规则和符号编写人工智能程序是劳动密集型的——每个应用都需要不同的程序。即使是编写语言逻辑程序，也受到维度诅咒的困扰——世界中的事物和情况可能发生的组合数量激增，程序员必须预测这些组合。例如，我们低估了仅仅看到和伸手去拿的复杂性，因为识别物体和拿起它如此不费力。我们这样做而不需要思考，并且没有意识到所有潜意识处理过程，这些过程是感知和协调运动的基础。我们也不知道我们是如何做出大多数决定的，只是后来用合理的理性化来解释它们。潜意识处理也是创造力的来源，从艺术到数学。[8](15580-0025.xhtml#en198)
- en: The emphasis on logical reasoning in traditional AI was also misleading. Learning
    to emulate sequences of logical steps, which mathematicians have mastered, requires
    a lot of training. We make rational decisions in unfamiliar settings using analogies
    with familiar settings, not with logic, which is too precise, and LLMs show the
    same bias.[9](15580-0025.xhtml#en199) Mathematicians may end up with rigorous
    proofs, but analogies and intuition guide their early exploration of mathematical
    problems. The creativity of TD-Gammon and AlphaGo did not arise from the deep
    learning cortical model alone but in conjunction with reinforcement learning,
    a form of procedural learning that in humans makes it possible for us to master
    sports and become domain experts, among many other skills. Procedural learning
    in our brains uses the same temporal difference learning algorithm as in AlphaGo,
    with dopamine neurons representing reward prediction error, and is also a source
    of our creativity (discussed in chapter 12).
  id: totrans-1341
  prefs: []
  type: TYPE_NORMAL
  zh: 传统人工智能中逻辑推理的强调也是误导性的。学习模仿逻辑步骤的序列，这是数学家们所掌握的，需要大量的训练。我们在不熟悉的环境中做出理性决策时，使用的是与熟悉环境的类比，而不是逻辑，因为逻辑过于精确，而大型语言模型（LLMs）也表现出同样的偏差。[9](15580-0025.xhtml#en199)
    数学家可能会得到严格的证明，但类比和直觉引导他们早期探索数学问题。TD-Gammon和AlphaGo的创造力并不仅仅来自深度学习的皮层模型，而是与强化学习相结合，这是一种程序性学习形式，在人类中使我们能够掌握体育技能并成为领域专家，以及其他许多技能。我们大脑中的程序性学习使用与AlphaGo相同的时差学习算法，多巴胺神经元代表奖励预测误差，这也是我们创造力的来源（在第12章中讨论）。
- en: GPT 11.1
  id: totrans-1342
  prefs: []
  type: TYPE_NORMAL
  zh: GPT 11.1
- en: 'Me: **Please summarize 3 three key points from this history of AI.**'
  id: totrans-1343
  prefs: []
  type: TYPE_NORMAL
  zh: 我：**请总结一下人工智能历史的三个关键点。**
- en: 'ChatGPT: Certainly! The given text discusses the evolution of artificial intelligence
    (AI) and contrasts two approaches: traditional symbol processing and modern machine
    learning. Here are three key points summarized from the text:'
  id: totrans-1344
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT：当然！给出的文本讨论了人工智能（AI）的演变，并对比了两种方法：传统的符号处理和现代机器学习。以下是文本中总结的三个关键点：
- en: '1. **Symbol Processing and Its Limitations**:'
  id: totrans-1345
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 1. **符号处理及其局限性**：
- en: '◦ **Early Attraction**: In the early days of AI, symbol processing was appealing
    because digital computers were efficient at representing symbols and performing
    logic. Language was a prime example of symbol processing.'
  id: totrans-1346
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: ◦ **早期吸引力**：在人工智能的早期，符号处理很有吸引力，因为数字计算机在表示符号和执行逻辑方面效率很高。语言是符号处理的典型例子。
- en: '◦ **Challenges**: Writing AI programs based on rules and symbols was labor-intensive,
    requiring a different program for each application. The complexity of tasks like
    object recognition was underestimated, leading to an explosion in the number of
    possible combinations that had to be anticipated by programmers.'
  id: totrans-1347
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: ◦ **挑战**：基于规则和符号编写人工智能程序是劳动密集型的，需要为每个应用编写不同的程序。对诸如物体识别等任务复杂性的低估导致了程序员必须预见的可能组合数量的激增。
- en: '2. **Shift to Learning from Examples and Machine Learning**:'
  id: totrans-1348
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 2. **转向示例学习和机器学习**：
- en: '◦ **Alternative Approach**: Learning from examples emerged as an alternative
    to symbol processing, requiring abundant data and computational power, which were
    scarce in the early days of AI.'
  id: totrans-1349
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: ◦ **替代方法**：从示例中学习成为符号处理的替代方案，需要大量的数据和计算能力，这在人工智能的早期是稀缺的。
- en: '◦ **Sea Change in 2012**: Costs of computing and data decreased, and programming
    costs increased, leading to a crossover in 2012 where machine learning became
    the primary tool for AI. Unlike digital computers, in brains, the hardware is
    the software, and learning modifies the hardware. Learning led to rapid progress
    in building and integrating diverse network architectures.'
  id: totrans-1350
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: ◦ **2012年的巨变**：计算和数据成本下降，编程成本上升，导致2012年出现交叉点，机器学习成为人工智能的主要工具。与数字计算机不同，在人类大脑中，硬件是软件，学习会改变硬件。学习导致了构建和整合各种网络架构的快速进步。
- en: '3. **Misleading Emphasis on Logical Reasoning and the Role of Reinforcement
    Learning**:'
  id: totrans-1351
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 3. **对逻辑推理的误导性强调和强化学习的作用**：
- en: '◦ **Traditional AI’s Focus**: Traditional AI emphasized logical reasoning,
    but learning to emulate logical steps required extensive training.'
  id: totrans-1352
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: ◦ **传统人工智能的焦点**：传统人工智能强调逻辑推理，但学习模仿逻辑步骤需要大量的训练。
- en: '◦ **Role of Reinforcement Learning**: Creativity in systems like TD-Gammon
    and AlphaGo did not arise from deep learning alone but also from reinforcement
    learning. This form of learning, implemented in humans by dopamine, allows mastery
    of sports and domain expertise. Dopamine’s influence on motivation and addiction
    is also noted.'
  id: totrans-1353
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: ◦ **强化学习的作用**：TD-Gammon和AlphaGo等系统中的创造性并非仅来自深度学习，也来自强化学习。这种通过多巴胺在人类中实现的学习形式，允许掌握体育和领域专业知识。多巴胺对动机和上瘾的影响也被指出。
- en: Overall, the text highlights the transition from rule-based symbol processing
    to data-driven machine learning in AI, emphasizing the limitations of the former
    and the potential of the latter. ֍
  id: totrans-1354
  prefs: []
  type: TYPE_NORMAL
  zh: 总体而言，文本强调了人工智能从基于规则的符号处理向数据驱动的机器学习的转变，强调了前者局限性以及后者的潜力。
- en: '12'
  id: totrans-1355
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '12'
- en: The Next Generation
  id: totrans-1356
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 新一代
- en: LLMs are evolving rapidly. They are becoming more capable and reliable with
    each generation. They are differentiating to create diverse niches in companies,
    science labs, and homes. We can improve their capabilities in many areas, which
    is the focus of this chapter.
  id: totrans-1357
  prefs: []
  type: TYPE_NORMAL
  zh: 大型语言模型（LLMs）正在迅速发展。每一代都在变得更加强大和可靠。它们正在分化，在企业和科学实验室以及家庭中创造多样化的细分市场。我们可以在许多领域提高它们的性能，这是本章的重点。
- en: In humans, verbal intelligence is the tip of a computational iceberg that maintains
    stability and survival under various environmental conditions. A long-term direction
    for AI is to incorporate LLMs into larger systems, much as language was embedded
    into brain systems that had evolved over millions of years for sensorimotor control,
    essential for survival. Animals that cannot move fast enough or hide to avoid
    predators will be eaten. An LLM depends on us for survival and would not last
    a day on its own in the real world. This chapter addresses the challenge of achieving
    autonomous behavior by extending current technology. We can learn from brains
    what large-scale systems look like when built from multiple dynamically interacting
    networks.
  id: totrans-1358
  prefs: []
  type: TYPE_NORMAL
  zh: 在人类中，语言智能是计算冰山的一角，它能在各种环境条件下保持稳定和生存。人工智能的一个长期方向是将LLMs整合到更大的系统中，就像语言被嵌入到经过数百万年进化用于感觉运动控制的脑系统中一样，这对于生存至关重要。无法快速移动或隐藏以躲避捕食者的动物将被捕食。LLM依赖于我们生存，在现实世界中单独存在将不会持续一天。本章通过扩展现有技术来解决实现自主行为挑战。我们可以从大脑中学习，了解由多个动态交互网络构建的大型系统是什么样的。
- en: Nonhuman animals do not have human-level general intelligence, but they have
    all achieved autonomy within their niches. The cerebral cortex inspired deep learning,
    but many more brain areas are also necessary for autonomous survival. Nature is
    a wellspring of algorithms honed by the vicissitudes of an ever-changing world
    that could help us get artificial general autonomy (AGA) off the ground. Nature
    is a source of intuition about solving difficult computational problems with embodied
    brains, and we have much to learn by extracting more general principles from the
    diversity of neural architectures.
  id: totrans-1359
  prefs: []
  type: TYPE_NORMAL
  zh: 非人类动物不具备人类水平的一般智能，但它们在其生态位内都实现了自主性。大脑皮层启发了深度学习，但许多其他大脑区域对于自主生存也是必要的。自然界是一个不断变化的世界的曲折历程中磨砺出的算法的源泉，这可以帮助我们让通用人工智能（AGA）得以起步。自然界是关于用具身大脑解决复杂计算问题的直觉来源，我们从神经架构的多样性中提取更多普遍原则，有很多东西可以学习。
- en: LLMs Need a Longer Childhood
  id: totrans-1360
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: LLMs Need a Longer Childhood
- en: Unlike some species, such as horses that walk shortly after birth, humans are
    an altricial species, meaning the young are born helpless and take years to mature.
    This long delay allows brains to develop more slowly and remain highly plastic
    during language acquisition. The brains of humans pass through many developmental
    stages that prepare them for the social and cultural complexities they need to
    navigate as adults.[1](15580-0025.xhtml#en200) Interestingly, cortical areas mature
    sequentially, with primary sensory cortices maturing early in development and
    the prefrontal cortex reaching maturity only at adulthood.[2](15580-0025.xhtml#en201)
    For example, once the basic features are fixed in the primary visual cortex, the
    next area can learn invariances on a solid foundation, continuing up the visual
    hierarchy to where objects are recognized. Although batch processing is more efficient
    for training networks for specific tasks, a longer “childhood” may be required
    for AI systems to achieve AGA and human levels of alignment. Incorporating reinforcement
    learning during initial training could accomplish this, as children learn good
    from bad and safe from dangerous while growing up and are resistant to fine-tuning
    later in life.
  id: totrans-1361
  prefs: []
  type: TYPE_NORMAL
  zh: 与一些物种不同，例如出生后不久就能行走的马，人类是一种晚成性物种，这意味着幼崽出生时无助，需要多年才能成熟。这种长时间的延迟使得大脑发育得更慢，在语言习得期间保持高度可塑性。人类的大脑经历了许多发展阶段，为他们在成年后需要应对的社会和文化复杂性做好准备。有趣的是，皮质区域是依次成熟的，初级感觉皮层在发育早期就成熟，而前额叶皮层只有在成年时才达到成熟。[1](15580-0025.xhtml#en200)
    例如，一旦基本特征在初级视觉皮层中固定，下一个区域就可以在坚实的基础之上学习不变性，继续向上到识别物体的视觉层次。尽管批量处理对于训练特定任务的网络来说更有效率，但AI系统要实现AGA和人类水平的对齐可能需要更长的“童年”。在初始训练期间结合强化学习可以完成这一点，因为孩子们在成长过程中学会从坏中学习好，从危险中学习安全，并且对后期的生活微调有抵抗力。
- en: Reinforcement learning from human feedback (RLHF) is already used to align pretrained
    LLMs. In a complex arrangement, a second LLM trained on good responses judged
    by humans from the first LLM is used to generate additional training data for
    the first LLM to drill in human preferences.[3](15580-0025.xhtml#en202) Creating
    another LLM doubles the cost of training very large LLMs, and smaller companies
    cannot afford to use this technique, but a simpler version has been effective.[4](15580-0025.xhtml#en203)
    Unfortunately, these versions of reinforcement alignment are not robust, and something
    closer to the biological version that provides earlier feedback would be more
    effective. How to raise an LLM? Could this be crowdsourced? You too can raise
    an LLM.
  id: totrans-1362
  prefs: []
  type: TYPE_NORMAL
  zh: 从人类反馈中强化学习（RLHF）已经被用来对预训练的LLM进行对齐。在一个复杂的安排中，一个由人类判断的第一LLM的良好响应训练的第二LLM被用来为第一LLM生成额外的训练数据，以便深入挖掘人类偏好。[3](15580-0025.xhtml#en202)
    创建另一个LLM将训练非常大型LLM的成本翻倍，小型公司无法承担这种技术的费用，但一个更简单的版本已经有效。[4](15580-0025.xhtml#en203)
    不幸的是，这些强化对齐的版本并不稳健，更接近生物版本，提供早期反馈将更有效。如何培养一个LLM？这能通过众包来完成吗？你也可以培养一个LLM。
- en: GPT 12.1
  id: totrans-1363
  prefs: []
  type: TYPE_NORMAL
  zh: GPT 12.1
- en: 'Me: **Summarize 3 key ideas for lessons from human development**.'
  id: totrans-1364
  prefs: []
  type: TYPE_NORMAL
  zh: 我：**总结人类发展经验中的3个关键思想**。
- en: 'ChatGPT: From a general reading, the three most important ideas in this text
    are:'
  id: totrans-1365
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT：从一般阅读来看，本文中最重要三个思想是：
- en: '1. **Prolonged Development Period in Humans**: The human maturation process
    is slow and complex, allowing for significant brain development and high plasticity,
    particularly during language acquisition. This is contrasted with species like
    horses that mature much more quickly after birth.'
  id: totrans-1366
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 1. **人类长期发育期**：人类的成熟过程缓慢且复杂，允许大脑进行显著的发展并具有高度的可塑性，尤其是在语言习得期间。这与马等物种在出生后成熟得更快形成对比。
- en: '2. **Sequential Maturation of Cortical Areas**: Human brain areas, such as
    the primary sensory cortices and the prefrontal cortex, mature sequentially, preparing
    individuals for the social and cultural complexities they’ll encounter as adults.
    This sequential maturation underscores the complexity and sophistication of human
    cognitive development.'
  id: totrans-1367
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 2. **皮层区域的顺序成熟**：人类大脑区域，如初级感觉皮层和前额叶皮层，是按顺序成熟的，为个体成年后遇到的社会和文化复杂性做准备。这种顺序成熟强调了人类认知发展的复杂性和精致性。
- en: '3. **Potential for AI Systems**: To achieve Artificial General Autonomy (AGA)
    and human-like alignment, AI systems might benefit from a prolonged “childhood”
    learning phase, similar to human cognitive development. This might involve the
    use of reinforcement learning techniques during initial training, analogous to
    how children learn through feedback about what is good or bad, safe or dangerous.
    ֍'
  id: totrans-1368
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 3. **AI系统的潜力**：为了实现人工通用自主性（AGA）和类似人类的对齐，AI系统可能从类似人类认知发展的长期“童年”学习阶段中受益。这可能涉及在初始训练期间使用强化学习技术，类似于儿童通过关于什么好、什么不好，什么安全、什么危险的反馈来学习。
    ֍
- en: LLMs Need Agendas
  id: totrans-1369
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: LLMs需要议程
- en: Goals and motivation are necessary for AGA. We are innately motivated to survive.
    The basal ganglia in our brains is the source of goal-seeking motivation and uses
    reward prediction to guide behavior. LLMs can follow in the footsteps of TD-Gammon
    and AlphaGo by implementing reward-based reinforcement learning into the loop
    between the output of the LLM and its inputs (see figure 13.3). Other brain parts
    essential for survival also interact with the basal ganglia.
  id: totrans-1370
  prefs: []
  type: TYPE_NORMAL
  zh: 目标和动机对于AGA（通用自主性）是必要的。我们天生就有生存的动机。我们大脑中的基底神经节是寻求目标动机的来源，并使用奖励预测来引导行为。LLMs可以通过将基于奖励的强化学习实施到LLM输出和输入之间的循环中，效仿TD-Gammon和AlphaGo的步伐（参见图13.3）。其他对生存至关重要的脑部部分也与基底神经节相互作用。
- en: Survival also depends on maintaining a balance with the world. Brains have several
    hundred specialized subcortical brain areas responsible for homeostasis, energy
    regulation, sleep, and many other essential functions necessary for autonomy.
    Allostasis—how the brain and body respond to stress, for example, by predicting
    and reaching new levels of homeostasis—is a way to maintain stability through
    challenging conditions in a constantly changing world.[5](15580-0025.xhtml#en204)
    Furthermore, your body is an integral partner with your brain, as you may have
    experienced when sick or injured. Brains evolved many different learning algorithms
    for efficiently carrying out adaptive behavior on a wide range of time scales.
  id: totrans-1371
  prefs: []
  type: TYPE_NORMAL
  zh: 生存还取决于与世界保持平衡。大脑有数百个专门的下皮层脑区，负责稳态、能量调节、睡眠以及许多其他对自主性至关重要的基本功能。例如，通过预测和达到新的稳态水平来应对压力的allostasis（稳态调节）是维持稳定性的方式，在不断变化的世界中通过挑战条件来维持稳定性。[5](15580-0025.xhtml#en204)
    此外，你的身体与你的大脑是密不可分的伙伴，正如你在生病或受伤时可能体验到的。大脑已经进化出许多不同的学习算法，以有效地在广泛的时间尺度上执行适应性行为。
- en: LLMs today depend on a constant stream of curated data and programmers who toil
    to optimize performance and make improvements. Efforts to make autonomous self-driving
    vehicles highlight the problems that must be overcome to navigate the real world’s
    complexities, including unpredictable human behavior. Controlling agents that
    play soccer in simulated environments is an ongoing research project.[6](15580-0025.xhtml#en205)
    Coupling these agents with LLMs to talk with each other might boost their performance.
  id: totrans-1372
  prefs: []
  type: TYPE_NORMAL
  zh: 今天的LLMs（大型语言模型）依赖于持续的精选数据流和努力优化性能的程序员。努力实现自主自动驾驶汽车突显了必须克服的问题，以应对现实世界的复杂性，包括不可预测的人类行为。在模拟环境中踢足球的智能体控制器是一个持续的研究项目。[6](15580-0025.xhtml#en205)
    将这些智能体与LLMs耦合以相互交流可能会提高它们的性能。
- en: GPT 12.2
  id: totrans-1373
  prefs: []
  type: TYPE_NORMAL
  zh: GPT 12.2
- en: 'Me: **Summarize 3 key points about agendas and autonomy**.'
  id: totrans-1374
  prefs: []
  type: TYPE_NORMAL
  zh: 我：**总结关于议程和自主性的3个关键点**。
- en: 'ChatGPT: The three key points from the provided text are:'
  id: totrans-1375
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT：从提供的文本中提取的三个关键点是：
- en: '1. **Necessity of Goals and Motivation**: The achievement of Artificial General
    Autonomy (AGA) requires goal-setting and motivation, functions attributed to brain
    structures like the basal ganglia.'
  id: totrans-1376
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 1. **目标和动机的必要性**：实现通用人工智能（AGA）需要设定目标和动机，这些功能归因于像基底神经节这样的脑部结构。
- en: '2. **Role of Reinforcement Learning**: Incorporating reward-based reinforcement
    learning within LLMs, akin to successful models like TD-Gammon and AlphaGo, can
    help improve these models’ performance.'
  id: totrans-1377
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 2. **强化学习的作用**：在LLMs中结合基于奖励的强化学习，类似于TD-Gammon和AlphaGo等成功模型，可以帮助提高这些模型的表现。
- en: '3. **Need for Autonomy and Adaptation**: LLMs currently depend heavily on continuous
    curated data and human intervention for performance optimization. For these models
    to better handle the complexities of the real world, including unpredictable human
    behaviors, they need to evolve towards more autonomous and adaptable systems,
    as exemplified by advancements in self-driving vehicles and agent control in simulated
    environments. ֍'
  id: totrans-1378
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 3. **自主性和适应性的需求**：LLMs目前严重依赖持续的数据整理和人类干预来优化性能。为了更好地处理现实世界的复杂性，包括不可预测的人类行为，这些模型需要进化成更自主和适应性的系统，正如自动驾驶汽车和模拟环境中的代理控制所展示的那样。
- en: LLMs Need to Jump
  id: totrans-1379
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: LLMs需要跳跃
- en: 'LLMs can’t jump. Learning how to control a body as flexible and adaptable as
    ours is even more difficult than learning how to talk. We have many joints and
    hundreds of muscles are involved in almost every action, making coordination a
    difficult control problem. Classical control is centralized, but nature has mastered
    distributed control to coordinate bodies fluidly, with many degrees of freedom.[7](15580-0025.xhtml#en206)
    Walking and talking have much in common: both generate smoothly concatenated sequences
    of movements shaped by goals. The first steps toward this goal have been taken
    by an LLM embedded into a robot’s control system.[8](15580-0025.xhtml#en207) The
    LLM has an internal dialog with itself while carrying out tasks like fetching
    a glass of water. Covariant, a new startup by three former OpenAI researchers,
    is training industrial robots to manipulate objects on assembly lines, interacting
    with humans through an LLM.[9](15580-0025.xhtml#en208) Linking sensory inputs
    to words increases associations with information stored in other brain systems
    that control the body. Our bodies evolved to be one with our brains, and LLMs
    should evolve bodies.'
  id: totrans-1380
  prefs: []
  type: TYPE_NORMAL
  zh: 大型语言模型（LLMs）无法跳跃。学习如何控制像我们这样灵活和适应性强的身体，比学习说话更加困难。我们有很多关节，几乎每个动作都涉及到数百块肌肉，这使得协调成为一个难以控制的问题。经典控制是集中的，但自然界已经掌握了分布式控制，以协调身体，具有许多自由度。[7](15580-0025.xhtml#en206)
    行走和说话有很多共同点：两者都产生由目标塑造的平滑连续的动作序列。朝着这个目标迈出的第一步是将LLM嵌入到机器人控制系统中。[8](15580-0025.xhtml#en207)
    当执行像取一杯水这样的任务时，LLM会与自己进行内部对话。Covariant，由三位前OpenAI研究人员创立的新公司，正在训练工业机器人操作装配线上的物体，通过LLM与人类进行交互。[9](15580-0025.xhtml#en208)
    将感官输入与词汇联系起来，增加了与其他控制身体的脑部系统中存储的信息的关联。我们的身体进化成与大脑一体，LLMs也应该进化出身体。
- en: GPT 12.3
  id: totrans-1381
  prefs: []
  type: TYPE_NORMAL
  zh: GPT 12.3
- en: 'Me: **Summarize 3 key points about embodiment**.'
  id: totrans-1382
  prefs: []
  type: TYPE_NORMAL
  zh: 我：**总结关于具身化的3个关键点**。
- en: 'ChatGPT: The three key points from the provided text are:'
  id: totrans-1383
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT：从提供的文本中可以提炼出三个关键点：
- en: '1. **Complexity of Bodily Coordination**: Building a body with the adaptability
    and flexibility of the human body, which includes numerous joints and muscles
    that need to be coordinated, is a challenging task. This complexity goes beyond
    verbal capabilities, necessitating a distributed control system similar to those
    found in nature.'
  id: totrans-1384
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 1. **身体协调的复杂性**：构建一个具有人类身体适应性和灵活性的身体，包括需要协调的众多关节和肌肉，是一项挑战性的任务。这种复杂性超出了语言能力，需要类似于自然界中发现的分布式控制系统。
- en: '2. **Simultaneous Execution of Tasks**: A significant step has been made with
    a Large Language Model (LLM) that’s been embedded into a robot control system,
    capable of having an internal dialogue while performing tasks, such as fetching
    a glass of water. This implies the possibility for LLMs to not only talk the talk,
    but also walk the walk.'
  id: totrans-1385
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 2. **任务的同步执行**：将大型语言模型（LLM）嵌入到机器人控制系统中，能够在执行任务（如取一杯水）的同时进行内部对话，这是一个重大进展。这表明LLMs不仅能够说，还能够做到。
- en: '3. **Integration of Sensorimotor Systems**: For learning to become more direct,
    more sensory inputs need to be associated with words. Like the human body that
    evolved to work closely with the brain, sensorimotor effector systems interacting
    with LLMs should strive for the same level of integration. ֍'
  id: totrans-1386
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 3. **感觉运动系统的整合**：为了使学习更加直接，需要将更多的感官输入与词汇相关联。就像进化到与大脑紧密合作的身体一样，与LLMs交互的感觉运动效应系统应努力达到相同的整合水平。
    ֍
- en: In 1948, Norbert Wiener published his book *Cybernetics or Control and Communication
    in the Animal and the Machine*.[10](15580-0025.xhtml#en209) This book introduced
    the word “cybernetics,” which morphed into “cyber” and has become a part of our
    everyday vocabulary, with spinoffs like “cybercrime” and “cybercafé.” His book
    was also seminal in founding modern control theory. In the same year, 1948, Claude
    Shannon launched modern information theory and transformed communication.[11](15580-0025.xhtml#en210)
    These two fields put a man on the moon and made the internet possible. Control
    and communication are also central to understanding brain function and the internal
    dynamics of LLMs when they become embodied.
  id: totrans-1387
  prefs: []
  type: TYPE_NORMAL
  zh: 1948年，诺伯特·维纳发表了其著作《控制论：动物与机器中的控制与通信》[*Cybernetics or Control and Communication
    in the Animal and the Machine*](https://example.org)[10](15580-0025.xhtml#en209)。这本书引入了“控制论”一词，它演变成了“cyber”，并已成为我们日常词汇的一部分，衍生出了“网络犯罪”和“网络咖啡馆”等词汇。他的书也是现代控制理论创立的基石。在同一年，1948年，克劳德·香农启动了现代信息理论，并改变了通信。[11](15580-0025.xhtml#en210)
    这两个领域将人类送上了月球，并使互联网成为可能。控制和通信也是理解大脑功能和LLMs具身化时的内部动态的关键。[12](15580-0025.xhtml#en212)
- en: LLMs Need a Long-Term Memory
  id: totrans-1388
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: LLMs需要长期记忆
- en: A major challenge for building the next generation of AI systems will be memory
    management for highly heterogeneous systems of deep learning networks. LLMs must
    start afresh with each person they meet, a “Hello, world!” moment. They behave
    like amnesic humans who have lost their hippocampus and are unable to remember
    new experiences for more than a few minutes, unable to create long-term memories,
    forever trapped in their past. For an LLM to become a personal assistant tutor,
    it has to remember its past interactions with you. Continuing to train an LLM
    on new data degrades performance on old data. The next generation of LLMs should
    include the equivalent of a hippocampus that will allow continual lifelong learning
    and bring them another step closer to human behavior.[12](15580-0025.xhtml#en211)
  id: totrans-1389
  prefs: []
  type: TYPE_NORMAL
  zh: 构建下一代AI系统的主要挑战之一将是深度学习网络高度异构系统的内存管理。大型语言模型（LLMs）必须与每个人从头开始，这是一个“你好，世界！”的时刻。它们表现得像失去了海马体的健忘人类，无法记住几分钟内的新经验，无法形成长期记忆，永远被困在他们的过去。为了使LLM成为个人辅导老师，它必须记住与你的过去互动。继续在新数据上训练LLM会降低旧数据的性能。下一代LLMs应该包括相当于海马体的功能，这将允许终身持续学习，并使它们更接近人类行为。[12](15580-0025.xhtml#en211)
- en: The hippocampus helps the cortex solve the problem of bridging across time and
    flexibly updating cortical networks without degrading already learned memories.[13](15580-0025.xhtml#en212)
    There are several ways to minimize memory loss and interference. One way is to
    be selective about where to store new experiences. Memory consolidation occurs
    during sleep when the cortex enters globally coherent patterns of electrical activity.
    Brief oscillatory cortical events known as sleep spindles recur thousands of times
    during the night and are associated with the memory consolidation.[14](15580-0025.xhtml#en213)
    Sleep spindles are triggered by the replay from the hippocampus of recent episodes
    experienced during the day. These sequences of episodes are parsimoniously integrated
    into long-term memory through global waves that traverse the entire cortex.[15](15580-0025.xhtml#en214)
  id: totrans-1390
  prefs: []
  type: TYPE_NORMAL
  zh: 海马体帮助大脑皮层解决跨越时间连接问题，并灵活更新皮层网络，同时不降低已经学到的记忆。[13](15580-0025.xhtml#en212) 有几种方法可以最小化记忆损失和干扰。一种方法是在存储新经验时有所选择。记忆巩固发生在睡眠期间，当皮层进入全局一致的电活动模式时。称为睡眠纺锤的短暂振荡皮层事件在夜间重复数千次，并与记忆巩固相关。[14](15580-0025.xhtml#en213)
    睡眠纺锤是由海马体在白天经历的事件的重放触发的。这些事件序列通过穿越整个皮层的全局波被节约地整合到长期记忆中。[15](15580-0025.xhtml#en214)
- en: Neuromodulation
  id: totrans-1391
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 神经调节
- en: Another way to coordinate multiple networks simultaneously is with neuromodulation.
    Neuromodulatory systems are complex networks within brains that use specific chemicals,
    known as neuromodulators, to regulate the activity of neurons and neural circuits.
    Unlike neurotransmitters, which typically have a rapid and direct effect on the
    electrical properties of neurons, neuromodulators often work more slowly and have
    broader, more diffuse effects that can induce global shifts in brain function.
  id: totrans-1392
  prefs: []
  type: TYPE_NORMAL
  zh: 另一种同时协调多个网络的方法是神经调节。神经调节系统是大脑中复杂的网络，使用称为神经调节剂的特定化学物质来调节神经元和神经回路的活动。与通常对神经元电学特性产生快速直接影响的神经递质不同，神经调节剂通常工作得更慢，具有更广泛、更弥散的影响，可以引起大脑功能的整体转变。
- en: An example of a neuromodulator is dopamine, which is an essential part of the
    reinforcement learning system in the basal ganglia that motivates actions to obtain
    rewards. Dopamine-releasing neurons report reward prediction error that shapes
    expert performance through practice. In this way, the very same sensorimotor circuits
    in the cortex can be repurposed for many different motor skills. Addictive drugs
    hijack our motivational system by manipulating dopamine activity.[16](15580-0025.xhtml#en215)
    We do not have conscious access to how we learn skills, but drugs that increase
    dopamine activity do induce euphoria.
  id: totrans-1393
  prefs: []
  type: TYPE_NORMAL
  zh: 一种神经调节剂的例子是多巴胺，它是基底神经节中强化学习系统中激励行动以获得奖励的必要组成部分。释放多巴胺的神经元报告奖励预测误差，通过实践塑造专家表现。通过这种方式，大脑皮层中相同的感知运动回路可以被重新用于许多不同的运动技能。成瘾药物通过操纵多巴胺活动来劫持我们的动机系统。[16](15580-0025.xhtml#en215)
    我们没有意识到的学习技能的方式，但增加多巴胺活动的药物确实能引起欣快。
- en: There are dozens of other neuromodulatory systems in brains that regulate such
    cognitive functions as arousal, alertness, attention, mood, social interactions,
    appetite, and stress responses. These have evolved to help us survive everyday
    contingencies and rare, life-threatening moments. These neuromodulatory systems
    can flexibly change cognitive priorities depending on contingencies and would
    benefit autonomous LLMs.
  id: totrans-1394
  prefs: []
  type: TYPE_NORMAL
  zh: 大脑中还有数十种其他神经调节系统，调节诸如觉醒、警觉、注意力、情绪、社会互动、食欲和压力反应等认知功能。这些系统已经进化出来帮助我们应对日常的偶然事件和罕见、危及生命的时刻。这些神经调节系统可以根据情况灵活地改变认知优先级，并将有助于自主的LLMs。
- en: Working Memory
  id: totrans-1395
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 工作记忆
- en: LLMs can continue adding word after word with proper syntax relevant to the
    domain of the dialog primed at the outset. During a dialog, activity patterns
    follow trajectories within the relevant manifold of the high-dimensional space
    carved out by the prompt. However, the dialog can be distracted when jumps to
    different trajectories occur. How do humans maintain continuity over long time
    scales? Jumps in conversations commonly occur in human dialogs, but a human can
    just as easily jump back.
  id: totrans-1396
  prefs: []
  type: TYPE_NORMAL
  zh: LLMs可以继续添加单词，只要它们与最初启动的对话领域的适当语法相关。在对话过程中，活动模式遵循由提示在多维空间中刻画的相应流形内的轨迹。然而，当出现跳跃到不同轨迹时，对话可能会分心。人类如何在长时间尺度上保持连续性？对话中的跳跃通常发生在人类对话中，但人类同样可以轻松地跳回。
- en: Brains have dynamic mechanisms for maintaining continuity over a wide range
    of time scales. Working memory in humans is maintained by electrical and biochemical
    activity inside neurons and synapses. In reinforcement learning, continuity is
    maintained with eligibility traces—decaying averages of weight changes computed
    from prediction errors.[17](15580-0025.xhtml#en216) Biochemical mechanisms similar
    to eligibility traces with even longer time scales from seconds to minutes are
    present at all synapses. LLM architectures would benefit from having a wider range
    of intrinsic time scales within units and weights to help link current processing
    to previously encountered activity.
  id: totrans-1397
  prefs: []
  type: TYPE_NORMAL
  zh: 大脑具有在广泛的时间尺度上维持连续性的动态机制。人类的工作记忆是通过神经元和突触内部的电化学活动来维持的。在强化学习中，连续性是通过资格痕迹——从预测误差计算出的权重变化的衰减平均值来维持的。[17](15580-0025.xhtml#en216)
    与资格痕迹类似，时间尺度更长（从秒到分钟）的生化机制存在于所有突触中。LLM架构将从单元和权重中具有更广泛的内在时间尺度中受益，以帮助将当前处理与先前遇到的活动联系起来。
- en: There appears to be a form of “learning” in LLMs within a session, even though
    there are no changes to the strengths of the weights called in-context learning.[18](15580-0025.xhtml#en217)
    Prompting alters the dynamics of the looping transformer. As a dialog progresses,
    activity is redirected to other limbs of the transformer. The “chain of thought”
    prompt exemplifies in-context learning.[19](15580-0025.xhtml#en218) The ability
    to change direction on the fly that occurs during in-context learning may be guided
    by multi-headed attention.[20](15580-0025.xhtml#en219) Specific examples are also
    effective in helping humans solve problems, which is a form of in-context learning.
  id: totrans-1398
  prefs: []
  type: TYPE_NORMAL
  zh: 在LLMs的会话中似乎存在一种“学习”形式，尽管没有改变称为上下文学习的权重的强度。[18](15580-0025.xhtml#en217) 提示改变了循环变换器的动态。随着对话的进行，活动被重新导向变换器的其他部分。
    “思维链”提示展示了上下文学习。[19](15580-0025.xhtml#en218) 在上下文学习中发生的即时改变方向的能力可能由多头注意力引导。[20](15580-0025.xhtml#en219)
    特定的例子也有效帮助人类解决问题，这是一种上下文学习的形式。
- en: GPT 12.4
  id: totrans-1399
  prefs: []
  type: TYPE_NORMAL
  zh: GPT 12.4
- en: 'Me: **Summarize 5 key aspects of memory systems in brains**.'
  id: totrans-1400
  prefs: []
  type: TYPE_NORMAL
  zh: 我：**总结大脑记忆系统中的5个关键方面**。
- en: 'ChatGPT: Certainly! The text you provided discusses complex aspects of memory
    systems, particularly in the context of human memory and the development of AI
    systems that mimic human-like memory functions. Here’s a summary of five key aspects:'
  id: totrans-1401
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT：当然！你提供的文本讨论了记忆系统的复杂方面，特别是在人类记忆和模仿人类记忆功能的AI系统开发背景下。以下是五个关键方面的总结：
- en: '1. **High-Dimensional Space and Continuity in Dialogs**: Human dialogues follow
    specific trajectories within a high-dimensional space, maintaining continuity
    and proper syntax. Even when there are jumps or distractions in the conversation,
    humans can easily jump back, maintaining the flow. This continuity is maintained
    through complex activity patterns and is something that AI systems like LLMs (Language
    Models) are striving to replicate.'
  id: totrans-1402
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 1. **高维空间和对话中的连续性**：人类的对话在高维空间中遵循特定的轨迹，保持连续性和适当的句法。即使在对话中有跳跃或分心，人类也能轻松地跳回，保持流畅。这种连续性通过复杂的活动模式来维持，这是AI系统（如LLMs）努力复制的。
- en: '2. **Working Memory and Biochemical Activity**: Human working memory is maintained
    through both electrical and biochemical activities within neurons and synapses.
    These activities operate on different time scales, known as eligibility traces
    in reinforcement learning. The presence of biochemical mechanisms with even longer
    time scales in synapses is essential for memory function.'
  id: totrans-1403
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 2. **工作记忆和生化活动**：人类的工作记忆通过神经元和突触内部的电和生化活动来维持。这些活动在不同的时间尺度上运行，在强化学习中被称为资格痕迹。在突触中存在生化机制，其时间尺度更长，对于记忆功能至关重要。
- en: '3. **Challenges in AI Memory Management**: Building AI systems with memory
    management akin to human memory is a significant challenge. Current LLMs lack
    the ability to remember past interactions, behaving like amnesic humans. The next
    generation of LLMs aims to include structures equivalent to the human hippocampus,
    allowing for continual lifelong learning and more human-like behavior.'
  id: totrans-1404
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 3. **AI记忆管理中的挑战**：构建类似于人类记忆的AI系统是一个重大挑战。当前的LLMs缺乏记住过去交互的能力，表现得像健忘的人类。下一代LLMs的目标是包括类似于人类海马体的结构，从而实现终身持续学习和更类似人类的行为。
- en: '4. **Hippocampus and Memory Consolidation**: The human hippocampus plays a
    crucial role in maintaining and updating cortical networks without degrading existing
    memories. Techniques to minimize memory loss include selective storage of new
    experiences and the integration of memories during sleep through oscillatory events
    called sleep spindles. These spindles are associated with the consolidation of
    memories and their integration into long-term semantic memory.'
  id: totrans-1405
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 4. **海马体和记忆巩固**：人类的海马体在维持和更新皮层网络的同时，不损害现有记忆方面发挥着关键作用。减少记忆损失的技术包括选择性存储新经验和通过睡眠中的睡眠纺锤波事件整合记忆。这些纺锤波与记忆的巩固及其整合到长期语义记忆中有关。
- en: '5. **Neuromodulatory Systems**: Neuromodulatory systems in the brain use specific
    chemicals to regulate neuronal activity. Unlike neurotransmitters, neuromodulators
    work more slowly and have broader effects, inducing global shifts in brain function.
    These systems play a vital role in coordinating multiple networks simultaneously,
    providing another layer of complexity in memory function.'
  id: totrans-1406
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 5. **神经调节系统**：大脑中的神经调节系统使用特定的化学物质来调节神经元活动。与神经递质不同，神经调节剂作用较慢，影响更广泛，可以引起大脑功能的整体转变。这些系统在同时协调多个网络中起着至关重要的作用，为记忆功能提供了另一层复杂性。
- en: Overall, these aspects highlight the intricate nature of human memory systems
    and the challenges and opportunities in replicating these functions in AI systems.
    The integration of structures like the hippocampus, understanding the role of
    biochemical activity, and the application of neuromodulatory systems are key areas
    of focus in advancing the field. ֍
  id: totrans-1407
  prefs: []
  type: TYPE_NORMAL
  zh: 总体而言，这些方面突显了人类记忆系统的复杂性质以及在AI系统中复制这些功能的挑战和机遇。海马体结构的整合、理解生化活动的作用以及神经调节系统的应用是推进该领域的关键关注点。
    ֍
- en: '13'
  id: totrans-1408
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '13'
- en: Learning from Nature
  id: totrans-1409
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 从自然界学习
- en: Nature has solved many complex computing problems with counterintuitive algorithms
    optimized to run on massively parallel architectures, unlike those optimized for
    single processors in digital computers. But now that we can build massively parallel
    computers, we can look to nature to get ideas for solutions to difficult computational
    problems.
  id: totrans-1410
  prefs: []
  type: TYPE_NORMAL
  zh: 自然界已经通过针对大规模并行架构优化的反直觉算法解决了许多复杂的计算问题，这与针对数字计算机中单处理器优化的算法不同。但现在我们能够构建大规模并行计算机，我们可以从自然界中获取解决困难计算问题的灵感。
- en: How Brains Evolved
  id: totrans-1411
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 大脑是如何进化的
- en: Sensorimotor systems in vertebrate brains have been around for over 500 million
    years. Language evolved quite recently, within the last few hundred thousand years.
    Although there wasn’t enough time to evolve entirely new brain structures, existing
    areas of the primate cortex could have expanded and been repurposed for speech
    production and recognition without making substantial architectural changes (figure
    13.1).[1](15580-0025.xhtml#en220) In addition, enhanced memory capacity and faster
    learning, perhaps driven by the complexity of social interactions, opened up further
    cognitive resources that made language possible. As the neocortex expanded during
    primate evolution, more cortical areas were formed, and hierarchies deepened.[2](15580-0025.xhtml#en221)
    Evolution tinkers with biophysical parameters of molecules that control brain
    development, such as changing the timing and interaction strengths of proteins
    that regulate DNA transcription that has downstream effects on other genes. For
    example, it takes only a relatively small change in timing to add another doubling
    for the mitosis of cortical neurons to enlarge the cortex. New cognitive functions
    could have emerged from such tweaks.
  id: totrans-1412
  prefs: []
  type: TYPE_NORMAL
  zh: 脊椎动物大脑中的感觉运动系统已有超过5亿年的历史。语言是在最近几百万年内演化的。尽管没有足够的时间进化出全新的大脑结构，但灵长类大脑皮层的现有区域可能已经扩展并被重新用于语音的产生和识别，而无需进行重大的结构变化（图13.1）。[1](15580-0025.xhtml#en220)
    此外，增强的记忆容量和更快的学习速度，可能是由社会互动的复杂性驱动的，这进一步开放了认知资源，使得语言成为可能。随着灵长类进化过程中新皮层的扩展，形成了更多的皮层区域，并且层次加深。[2](15580-0025.xhtml#en221)
    进化通过调整控制大脑发育的分子生物物理参数，例如改变调节DNA转录的蛋白质的时机和相互作用强度，从而影响其他基因的下游效应。例如，只需相对较小的时机变化，就可以使皮层神经元的分裂增加一倍，从而扩大皮层。新的认知功能可能就是这样的一些调整产生的。
- en: Brain development is guided by inductive biases—pre-evolved architectures and
    pre-evolved learning algorithms that don’t have to be reinvented anew. However,
    the paths taken by evolution do not follow the logic that humans use to design
    devices.[3](15580-0025.xhtml#en222) During the first few years of life, a baby’s
    brain undergoes massive synaptogenesis in parallel with the emergence of language.[4](15580-0025.xhtml#en223)
    Babies interact with and learn about a rich multisensory world that showers their
    brains with combined sensorimotor experiences, evidence for causal relationships,
    and verbal utterances.[5](15580-0025.xhtml#en224) Linguists in the twentieth century
    concluded that syntax was innate, based on “poverty of the stimulus,”[6](15580-0025.xhtml#en225)
    but this ignored how brains are constructed during development.[7](15580-0025.xhtml#en226)
    What is innate are the evolved brain architectures and learning algorithms that
    extract and generalize physical and social regularities in the world.
  id: totrans-1413
  prefs: []
  type: TYPE_NORMAL
  zh: 大脑发育是由归纳偏差引导的——这些偏差是预先进化的架构和预先进化的学习算法，无需重新发明。然而，进化的路径并不遵循人类设计设备时所使用的逻辑。[3](15580-0025.xhtml#en222)
    在生命的最初几年里，婴儿的大脑与语言的产生并行地经历大规模的突触生成。[4](15580-0025.xhtml#en223) 婴儿与丰富的多感官世界互动，学习关于大脑的联合感觉运动经验、因果关系证据和言语表达。[5](15580-0025.xhtml#en224)
    20世纪的语言学家得出结论，句法是先天的，基于“刺激的贫乏”，[6](15580-0025.xhtml#en225) 但这忽略了大脑在发育过程中的构建方式。[7](15580-0025.xhtml#en226)
    先天的是进化的脑架构和学习算法，它们从世界中提取和概括物理和社会规律。
- en: '![](images/15580_013_fig_001.jpg)'
  id: totrans-1414
  prefs: []
  type: TYPE_IMG
  zh: '![图片](images/15580_013_fig_001.jpg)'
- en: Figure 13.1
  id: totrans-1415
  prefs: []
  type: TYPE_NORMAL
  zh: 图13.1
- en: Primates evolved over millions of years. We are creating AI on a much faster
    time scale.
  id: totrans-1416
  prefs: []
  type: TYPE_NORMAL
  zh: 哺乳动物在数百万年的进化过程中发展起来。我们在一个更快的时间尺度上创造人工智能。
- en: LLMs are proof of principle that it is possible to generate grammatically correct
    language by learning from the wide range of imperfect cues in raw text, including
    syntactic markers, word order, and semantics. Brains take a different route to
    get to the same abilities. Rich sensorimotor grounding accompanied by rapid brain
    development may explain why normal exposure to verbalizing in the home can extract
    syntax, which is greatly accelerated by multimodal sensory input. In a recent
    test of this hypothesis, a group at New York University collected data from a
    head-mounted camera on a child from ages 6 to 25 months. A neural network was
    trained on 61 hours of correlated visual and auditory streams—around 1 percent
    of the child’s waking hours. The networks formed cross-modal associations and
    could identify images of objects in the child’s environment with 40 different
    words.[8](15580-0025.xhtml#en227) In another study, an LLM trained with a developmentally
    plausible 100 million words for a ten year old could predict the responses of
    human fMRI recordings to sentences.[9](15580-0025.xhtml#en228)
  id: totrans-1417
  prefs: []
  type: TYPE_NORMAL
  zh: 大型语言模型（LLMs）证明了从原始文本中的广泛不完美线索（包括句法标记、词序和语义）中学习，生成语法正确的语言是可能的。大脑采取了不同的途径来获得相同的能力。丰富的感知运动基础和快速的大脑发育可能解释了为什么在家中进行正常的言语表达可以提取句法，而这种提取过程通过多模态感官输入得到了极大的加速。在最近的一项假设测试中，纽约大学的一个研究小组收集了一个6至25个月大的儿童的头部摄像头数据。神经网络在61小时的关联视觉和听觉流上进行了训练——大约占儿童清醒时间的1%。网络形成了跨模态的关联，并能用40个不同的词识别儿童环境中的物体图像。[8](15580-0025.xhtml#en227)
    在另一项研究中，一个用10岁儿童可能的发展词汇量（1亿个单词）训练的大型语言模型能够预测人类fMRI记录对句子的反应。[9](15580-0025.xhtml#en228)
- en: Reverse Engineering Brains
  id: totrans-1418
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 大脑的逆向工程
- en: The neocortex appeared in mammals 200 million years ago. It is a folded sheet
    of neurons on the brain’s outer surface, called the gray matter, which in humans
    is about 30 centimeters in diameter and 5 millimeters thick when flattened. About
    30 billion cortical neurons form six layers that are highly interconnected with
    each other in a local stereotyped pattern. The cortex greatly expanded in size
    relative to the brain’s central core during evolution, especially in humans, where
    it constitutes 80 percent of the brain volume. This expansion suggests that the
    cortical architecture is scalable—more is better—unlike most brain areas, which
    have not expanded relative to body weight.
  id: totrans-1419
  prefs: []
  type: TYPE_NORMAL
  zh: 新皮层在大约2亿年前出现在哺乳动物身上。它是一层折叠的神经元，位于大脑的外表面，称为灰质，在人类中，当展开时大约直径30厘米，厚5毫米。大约300亿个皮层神经元形成了六个相互高度连接的层，这些层以局部典型模式相互连接。在进化过程中，皮层相对于大脑的核心部分大大扩张了，特别是在人类中，它构成了大脑体积的80%。这种扩张表明皮层架构是可扩展的——越多越好——与大多数大脑区域不同，它们相对于体重没有扩张。
- en: Interestingly, there are many fewer long-range cortical connections, which form
    the white matter, than local connections. Furthermore, white matter volume scales
    as the 5/4 power of the gray matter volume and becomes larger than the volume
    of the gray matter in large brains.[10](15580-0025.xhtml#en229) White matter dominates
    gray matter in human brains. Scaling laws for brain structures can provide insights
    into important computational principles.[11](15580-0025.xhtml#en230) Cortical
    architecture, including cell types and their connectivity, is similar throughout
    the cortex, with specialized regions for different cognitive systems. For example,
    the visual cortex has evolved specialized circuits for vision, which have been
    exploited in convolutional neural networks (CNNs), a highly successful deep learning
    architecture. The neocortex evolved a general-purpose learning architecture that
    enhanced the performance of many special-purpose subcortical structures.
  id: totrans-1420
  prefs: []
  type: TYPE_NORMAL
  zh: 有趣的是，长距离皮层连接比局部连接要少得多，这些连接形成了白质。此外，白质体积与灰质体积的5/4次幂成正比，在大型大脑中，白质体积大于灰质体积。[10](15580-0025.xhtml#en229)
    白质在人类大脑中主导灰质。大脑结构的比例定律可以提供对重要计算原理的见解。[11](15580-0025.xhtml#en230) 皮层架构，包括细胞类型及其连接性，在整个皮层中是相似的，不同认知系统有专门的区域。例如，视觉皮层已经进化出专门用于视觉的电路，这些电路在卷积神经网络（CNNs）中得到了利用，这是一种高度成功的深度学习架构。新皮层进化出了一种通用学习架构，增强了许多特殊用途皮层下结构的表现。
- en: '*The Deep Learning Revolution* described the progress made in understanding
    the visual system in the twentieth century, which led to the architecture for
    CNNs in the twenty-first century. The visual cortex in the brain has a hierarchical
    organization, with simple feature detectors in early stages of visual processing
    and neurons that encode more complex object representations in higher stages.
    CNNs trained on object recognition in images have a similar hierarchical architecture:
    the units in the early stages respond to simple features like edges. In contrast,
    units in higher stages develop selectivity for complete objects invariant to scale,
    position, and three-dimensional pose. Although there are parallels between the
    emergent response properties of artificial deep networks and biological vision
    systems that perform similar visual tasks, these correlations do not prove that
    they are computing the same functions. Further tests are needed, such as selectively
    modifying different types of neurons in brains and processing units in neural
    network models to see if the impact on the recognition of objects in images is
    the same.'
  id: totrans-1421
  prefs: []
  type: TYPE_NORMAL
  zh: '*《深度学习革命》* 描述了在二十世纪对视觉系统理解所取得的进展，这导致了二十一世纪卷积神经网络（CNNs）架构的诞生。大脑中的视觉皮层具有层次化的组织结构，在视觉处理的早期阶段有简单的特征检测器，而在更高阶段有编码更复杂物体表示的神经元。在图像物体识别上训练的CNNs具有类似的层次架构：早期阶段的单元对边缘等简单特征做出反应。相比之下，更高阶段的单元对完整物体具有选择性，这种选择性不受尺度、位置和三维姿态的影响。尽管人工深度网络的涌现响应特性和执行类似视觉任务的生物视觉系统之间存在平行关系，但这些相关性并不能证明它们在计算相同的函数。还需要进一步的测试，例如选择性地修改大脑中不同类型的神经元和神经网络模型中的处理单元，以查看对图像中物体识别的影响是否相同。'
- en: Brains have spatially structured computing components that range from molecules
    to large brain systems (figure 13.2). At the level of synapses, each cubic millimeter
    of the cerebral cortex, about the size of a rice grain, contains a billion synapses.
    The cortex has the equivalent computing power of thousands of deep learning networks,
    each specialized for solving specific problems. How are all these distributed
    networks organized? The levels of investigation above the network level organize
    the flow of information between different cortical areas, a system-level communications
    problem. There is much to be learned about organizing thousands of specialized
    networks by studying how the global flow of information in the cortex is managed.
    Long-range connections within the cortex are sparse because they are expensive,
    that is, because of the energy demand needed to send signals over a long distance
    and because they occupy a large volume of space. A switching network routes information
    between sensory and motor areas that can be rapidly reconfigured to meet ongoing
    cognitive demands.
  id: totrans-1422
  prefs: []
  type: TYPE_NORMAL
  zh: 大脑具有从分子到大型大脑系统的空间结构化计算组件（图 13.2）。在突触层面，大脑皮层的每立方毫米，大约相当于一粒米的大小，包含十亿个突触。皮层具有相当于数千个深度学习网络的计算能力，每个网络都专门用于解决特定问题。所有这些分布式网络是如何组织的呢？网络级别以上的研究层次组织了不同皮层区域之间信息流的流动，这是一个系统级通信问题。通过研究皮层中全局信息流的组织方式，我们可以学到很多关于如何组织数千个专业网络的知识。皮层内的长距离连接是稀疏的，因为它们成本高昂，也就是说，因为发送信号到长距离所需的能量需求，以及因为它们占据了大量的空间。一个交换网络在感觉区和运动区之间路由信息，这些区域可以快速重新配置以满足持续的认知需求。
- en: 'Neurons are complex dynamical systems with a wide range of internal time scales.
    Much of the complexity of real neurons is inherited from cell biology—the need
    for each cell to generate its energy and maintain homeostasis under various challenging
    conditions. However, some features of neurons are likely to be essential for their
    computational function and have not yet been exploited in model networks: a diversity
    of cell types, each optimized for specific functions; short-term synaptic plasticity,
    which can be either facilitating or depressing on time scales of seconds; a cascade
    of biochemical reactions underlying plasticity inside synapses controlled by the
    history of inputs that extends from seconds to minutes; sleep states lasting hours
    during which a brain goes offline to restructure and renew itself for lifelong
    learning; and communication gating to control traffic between brain areas.[12](15580-0025.xhtml#en231)
    Synergies between brains and AI are now possible, which could benefit both the
    science of brains and engineering of AI. We can include these brain features as
    parameters in recurrent models of cortical networks and optimize them along with
    the weights.[13](15580-0025.xhtml#en232)'
  id: totrans-1423
  prefs: []
  type: TYPE_NORMAL
  zh: 神经元是具有广泛内部时间尺度的复杂动态系统。真实神经元的大部分复杂性都来自细胞生物学——每个细胞在各种挑战性条件下生成其能量并维持稳态的需求。然而，神经元的一些特性可能对于它们的计算功能是基本的，但尚未在模型网络中得到利用：不同类型的细胞，每种细胞都针对特定功能进行了优化；短期突触可塑性，在秒的时间尺度上可以是促进的或抑制的；由输入历史控制的突触内可塑性的生化反应级联，输入历史从秒到分钟不等；持续数小时的睡眠状态，在此期间大脑离线以重构和更新自身以适应终身学习；以及控制大脑区域之间交通的通信门控。[12](15580-0025.xhtml#en231)
    大脑和人工智能之间的协同作用现在成为可能，这可以造福大脑科学和人工智能工程。我们可以将这些大脑特征作为皮层网络循环模型的参数，并随着权重的优化来优化它们。[13](15580-0025.xhtml#en232)
- en: '![](images/15580_013_fig_002.jpg)'
  id: totrans-1424
  prefs: []
  type: TYPE_IMG
  zh: '![图片](images/15580_013_fig_002.jpg)'
- en: Figure 13.2
  id: totrans-1425
  prefs: []
  type: TYPE_NORMAL
  zh: 图 13.2
- en: Complex anatomical structures in brains are found across spatial scales. (Bottom
    right) Cross-section of a synapse; (middle) convergence of contrasting center-surround
    inputs onto a simple cell in visual cortex; (top) ascending hierarchy of areas
    in visual cortex starting at the primary visual cortex (V1).
  id: totrans-1426
  prefs: []
  type: TYPE_NORMAL
  zh: 大脑中的复杂解剖结构在空间尺度上被发现。（右下角）突触的横截面；（中间）对比中心-周围输入在视觉皮层中简单细胞的汇聚；（顶部）视觉皮层中从初级视觉皮层（V1）开始的区域上升层次。
- en: Deep learning networks are trained using backprop, which modifies each weight
    to reduce the global error on a task. For a weight that does not have direct access
    to the error on the output, backprop passes the error backward from the output
    to the input in ways that do not exist in the cortex. Synaptic plasticity in brains
    is driven by local signals and regulated by global neuromodulation, using less
    efficient learning methods we do not yet fully understand.
  id: totrans-1427
  prefs: []
  type: TYPE_NORMAL
  zh: 深度学习网络使用反向传播进行训练，通过修改每个权重来减少任务上的全局误差。对于没有直接访问输出误差的权重，反向传播以在皮质中不存在的方式将误差从输出反向传递到输入。大脑中的突触可塑性由局部信号驱动，并由全局神经调节调节，使用我们尚未完全理解的低效学习方法。
- en: Cortical synapses are unreliable in an all-or-none fashion, unlike the weights
    in a deep learning network that are deterministic. The probability of failure
    ranges from 90 percent for small synapses to 50 percent for the largest ones.
    Is this a sensible way to design a reliable brain? One advantage is energy saving,
    which is substantial. Unreliable synapses in the cortex may in fact improve learning
    in brains. Surprisingly, probabilistic “drop out” during training of deep network
    models improved performance by 10 percent.[14](15580-0025.xhtml#en233) Randomly
    dropping out 50 percent of the units or weights means that a different network
    is trained on every weight update iteration,[15](15580-0025.xhtml#en234) encouraging
    localized learning in multiple subnetworks.
  id: totrans-1428
  prefs: []
  type: TYPE_NORMAL
  zh: 与深度学习网络中确定性的权重不同，皮层的突触以全或无的方式不可靠。失败的概率从小突触的90%到最大突触的50%不等。这是设计一个可靠大脑的合理方式吗？一个优点是节能，这相当可观。皮层中的不可靠突触实际上可能改善大脑的学习。令人惊讶的是，在深度网络模型训练期间的概率“退出”提高了10%的性能。[14](15580-0025.xhtml#en233)
    随机退出50%的单元或权重意味着在每次权重更新迭代中训练一个不同的网络，[15](15580-0025.xhtml#en234) 鼓励多个子网络进行局部学习。
- en: How Language Evolved
  id: totrans-1429
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 语言是如何演化的
- en: 'I once attended a symposium at the Rockefeller University that featured a panel
    discussion on language and its origins. Two of the discussants who were titans
    in their fields had polar opposite views: Noam Chomsky argued that since language
    was innate, there must be a “language organ” that uniquely evolved in humans.
    Sydney Brenner had a more biological perspective and argued that evolution finds
    solutions to problems that are not intuitive. Famous for his wit, Brenner gave
    an example: instead of looking for a language gene, there might be a language
    suppressor gene that evolution decided to keep in chimpanzees but blocked in humans.'
  id: totrans-1430
  prefs: []
  type: TYPE_NORMAL
  zh: 我曾参加过在洛克菲勒大学举行的一个研讨会，该研讨会以语言及其起源为主题，并进行了圆桌讨论。两位讨论者都是他们领域的巨头，但观点截然相反：诺姆·乔姆斯基（Noam
    Chomsky）认为，由于语言是先天的，因此必须存在一个“语言器官”，这是人类独特进化的。西德尼·布伦纳持有更生物学的观点，并认为进化找到了非直观问题的解决方案。布伦纳以其机智而闻名，他举了一个例子：与其寻找语言基因，不如寻找一个语言抑制基因，进化决定将其保留在黑猩猩中，但在人类中阻止。
- en: There are parallels between song learning in songbirds and how humans acquire
    language.[16](15580-0025.xhtml#en235) Erich Jarvis at the Rockefeller University
    wanted to understand the differences in the brains of birds that can learn complex
    songs, like canaries and starlings, and other bird species that cannot. He sequenced
    the genomes of many bird species and found differences between the two groups.
    In particular, he found a gene controlling the development of projections from
    a high vocal center (HVc) to lower motor areas controlling the muscles driving
    the syrinx. During development, this gene functions by suppressing the direct
    projections needed to produce songs. It is not expressed in the HVc of songbirds,
    which permits projections to be formed for rapid control of birdsong. Remarkably,
    he found that the same gene in humans was silenced in the laryngeal motor cortex,
    which projects to the motor areas that control the vocal cords, but not in chimpanzees.[17](15580-0025.xhtml#en236)
    Sydney Brenner was not only clever, he was also correct!
  id: totrans-1431
  prefs: []
  type: TYPE_NORMAL
  zh: 鸣禽的歌声学习和人类获取语言之间存在相似之处。[16](15580-0025.xhtml#en235) 罗克菲勒大学的埃里希·贾维斯（Erich Jarvis）想要了解能够学习复杂歌曲的鸟类（如金丝雀和麻雀）的大脑与其他不能学习复杂歌曲的鸟类物种之间的差异。他测序了许多鸟类的基因组，并发现了两组之间的差异。特别是，他发现了一个控制从高声带中心（HVc）到控制驱动喉管的肌肉的低运动区域的投射发育的基因。在发育过程中，这个基因通过抑制产生歌曲所需的直接投射来发挥作用。在鸣禽的HVc中不表达这个基因，这允许形成用于快速控制鸟鸣的投射。令人惊讶的是，他发现人类中相同的基因在喉部运动皮层中被沉默，该皮层投射到控制声带的运动区域，但在黑猩猩中则不是。[17](15580-0025.xhtml#en236)
    西德尼·布伦纳（Sydney Brenner）不仅聪明，而且正确！
- en: Equally important for humans were modifications made to the vocal tract to allow
    rapid modulation over a broad frequency spectrum.[18](15580-0025.xhtml#en237)
    The rapid articulatory sequences in the mouth and larynx are the fastest motor
    programs our brains can generate.[19](15580-0025.xhtml#en238) These structures
    are ancient parts of vertebrates that were refined and elaborated by evolution
    to make speech possible. The metaphorical “language organ,” postulated to explain
    the mystery of language,[20](15580-0025.xhtml#en239) is distributed throughout
    preexisting sensorimotor systems.
  id: totrans-1432
  prefs: []
  type: TYPE_NORMAL
  zh: 对于人类来说，对发音器官的修改同样重要，这使得在广泛的频率范围内进行快速调节成为可能。[18](15580-0025.xhtml#en237) 口腔和喉部的快速发音序列是我们大脑能够产生的最快的运动程序。[19](15580-0025.xhtml#en238)
    这些结构是脊椎动物的古老部分，通过进化被精细化和完善，使得言语成为可能。为了解释语言的神秘，假设的“语言器官”，[20](15580-0025.xhtml#en239)
    分布在现有的感觉运动系统中。
- en: The brain mechanisms underlying language and thought evolved together. The loops
    between the cortex and the basal ganglia for generating sequences of actions were
    repurposed to learn and generate sequences of words (figure 13.3). The great expansion
    of the prefrontal cortex in humans allowed sequences of thoughts to be generated
    by similar loops through the basal ganglia.[21](15580-0025.xhtml#en240) As an
    actor in reinforcement learning, the basal ganglia learns the value of taking
    the next action, biasing actions and speech toward achieving future rewards and
    goals.
  id: totrans-1433
  prefs: []
  type: TYPE_NORMAL
  zh: 语言和思维背后的脑机制是共同进化的。在大脑皮层和基底神经节之间生成动作序列的回路被重新用于学习和生成单词序列（图 13.3）。人类前额叶皮层的巨大扩张使得通过基底神经节通过类似的回路生成思维序列成为可能。[21](15580-0025.xhtml#en240)
    作为强化学习中的演员，基底神经节学习采取下一步行动的价值，使行动和言语偏向于实现未来的奖励和目标。
- en: The outer loop of the transformer is reminiscent of the loop between the cortex
    and the basal ganglia in brains, known to be important for learning and generating
    sequences of motor actions in conjunction with the motor cortex (figure 13.3)
    and to spin sequences of thoughts in the loop with the prefrontal cortex.[22](15580-0025.xhtml#en241)
    The basal ganglia also automate frequently practiced sequences, freeing up neurons
    for other tasks in cortical areas involved in conscious control. The cortex can
    intervene when the automatic system fails upon encountering an unusual or rare
    circumstance. Another advantage of having the basal ganglia in the loop is that
    convergence of inputs from multiple cortical areas provides a broader context
    for deciding the next action or thought. The basal ganglia could also perform
    the same functions as the powerful multi-headed attention mechanism in transformers.
    In the loop between the cortex and basal ganglia, any region in the loop can contribute
    to making a decision.
  id: totrans-1434
  prefs: []
  type: TYPE_NORMAL
  zh: 变换器的外层回路让人联想到大脑中皮层和基底神经节之间的回路，已知这对于与运动皮层（图 13.3）一起学习和生成运动动作序列以及通过前额叶皮层在回路中旋转思维序列非常重要。[22](15580-0025.xhtml#en241)
    基底神经节还自动化了经常练习的序列，为皮质区域中涉及意识控制的神经元释放了空间。当自动系统在遇到不寻常或罕见的情况时失败时，皮层可以介入。基底神经节在回路中的另一个优点是，来自多个皮质区域的输入汇聚为决定下一步行动或思维提供了更广泛的背景。基底神经节还可以执行与变换器中强大的多头注意力机制相同的功能。在皮层和基底神经节之间的回路中，回路中的任何区域都可以为做出决定做出贡献。
- en: '![](images/15580_013_fig_003.jpeg)'
  id: totrans-1435
  prefs: []
  type: TYPE_IMG
  zh: '![图片](images/15580_013_fig_003.jpeg)'
- en: Figure 13.3
  id: totrans-1436
  prefs: []
  type: TYPE_NORMAL
  zh: 图 13.3
- en: Comparison between the transformer loop and the cortical-basal ganglia loop.
    (Left) Transformers have a feedforward autoregressive architecture that loops
    the output with the input to produce a sequence of words. The Encoder accepts
    input queries that produce output from the Decoder. The single encoder/decoder
    modules shown are stacked N layers deep (N×). (Right) The topographically mapped
    motor cortex (shaded regions represent body parts) projects down to the basal
    ganglia, looping back through the thalamus to the cortex to produce a sequence
    of actions, such as a sequence of words in a spoken sentence. All parts of the
    cortex project topographically to the basal ganglia. Each cortical region therefore
    receives feedback from a corresponding region of the basal ganglia that could
    implement multi-headed attention. Similar loops between the prefrontal cortex
    and the basal ganglia produce sequences of thoughts rather than actions.
  id: totrans-1437
  prefs: []
  type: TYPE_NORMAL
  zh: 变压器循环与皮层-基底神经节循环的比较。（左侧）变压器具有前馈自回归架构，将输出与输入循环以产生一系列单词。编码器接受来自解码器的输出查询。显示的单个编码器/解码器模块堆叠了N层深（N×）。（右侧）拓扑映射的运动皮层（阴影区域代表身体部位）向下投射到基底神经节，通过丘脑回传到皮层以产生一系列动作，例如一个口语句子中的单词序列。皮层的所有部分都拓扑映射到基底神经节。因此，每个皮层区域都从基底神经节相应的区域接收反馈，这可以实现多头注意力。前额叶皮层和基底神经节之间的类似循环产生的是思维序列而不是动作。
- en: LLMs are trained to predict the next word in a sentence. Why is this such an
    effective strategy? In order to make better predictions, the transformer learns
    internal models for how sentences are constructed and even more sophisticated
    semantic models for the underlying meaning of words and their relationships with
    other words in the sentence. The models must also learn the underlying causal
    structure of the sentence. What is surprising is how so much can be learned just
    by predicting one step at a time. It would be surprising if brains did not take
    advantage of this “one step at a time” method for creating internal models of
    the world.
  id: totrans-1438
  prefs: []
  type: TYPE_NORMAL
  zh: 大型语言模型（LLMs）被训练来预测句子中的下一个单词。为什么这是一种如此有效的策略？为了做出更好的预测，变压器学习句子构建的内部模型，甚至更复杂的语义模型，以理解单词的潜在意义及其与句子中其他单词的关系。模型还必须学习句子的潜在因果关系。令人惊讶的是，仅仅通过预测每一步就能学到这么多。如果大脑没有利用这种“一步一步”的方法来创建世界的内部模型，那将是令人惊讶的。
- en: The temporal difference learning algorithm in reinforcement learning is also
    based on making predictions, in this case predicting future rewards. Using temporal
    difference learning, AlphaGo learned how to make long sequences of moves to win
    a Go game. How can such a simple algorithm that predicts one step ahead achieve
    such a high level of play? The basal ganglia similarly learn sequences of actions
    to reach goals through practice using the same algorithm. For example, a tennis
    serve involves complex sequences of rapid muscle contractions that must be practiced
    repeatedly before it becomes automatic and precisey repeatable.
  id: totrans-1439
  prefs: []
  type: TYPE_NORMAL
  zh: 强化学习中的时序差分学习算法也是基于预测，在这种情况下是预测未来的奖励。使用时序差分学习，AlphaGo学会了如何通过一系列的移动来赢得围棋比赛。这样一个简单的预测一步的算法如何能达到如此高的水平？基底神经节同样通过使用相同的算法进行练习来学习一系列动作以达到目标。例如，网球发球涉及复杂的快速肌肉收缩序列，必须在变得自动和精确重复之前反复练习。
- en: The cerebellum, a prominent brain structure that interacts with the cerebral
    cortex, predicts motor commands’ expected sensory and cognitive consequences.[23](15580-0025.xhtml#en242)
    This is called a forward model in control theory because it can be used for predicting
    the consequences of fast sequences of motor commands before the actions are taken.
    Once again, predicting what will happen next and learning from the error can build
    a sophisticated predictive model of the body and the properties of the muscles.
  id: totrans-1440
  prefs: []
  type: TYPE_NORMAL
  zh: 小脑，一个与大脑皮层相互作用的显著大脑结构，预测运动命令预期的感觉和认知后果。[23](15580-0025.xhtml#en242) 这在控制理论中被称为前向模型，因为它可以在采取行动之前预测快速序列的运动命令的后果。再次强调，预测接下来会发生什么并从错误中学习可以构建一个复杂的身体和肌肉特性的预测模型。
- en: What is common in these three examples is that there are abundant data for self-supervised
    learning on a range of time scales. Could intelligence emerge from using self-supervised
    learning to bootstrap increasingly sophisticated internal models by continually
    learning how to make many small predictions? This may be how a baby’s brain rapidly
    learns the world’s causal structure by making predictions and observing outcomes
    while actively interacting with the world.[24](15580-0025.xhtml#en243) Progress
    in this direction has been made in learning intuitive physics from videos using
    deep learning.[25](15580-0025.xhtml#en244)
  id: totrans-1441
  prefs: []
  type: TYPE_NORMAL
  zh: 这三个例子中的共同之处在于，在一系列时间尺度上，有大量数据用于自监督学习。智能是否可能通过使用自监督学习，通过不断学习如何做出许多小预测来逐步构建越来越复杂的内部模型而出现？这可能就是婴儿的大脑通过预测和观察结果，在积极与世界互动的过程中，如何快速学习世界的因果结构的方式。[24](15580-0025.xhtml#en243)
    在使用深度学习从视频中学习直观物理学的方向上已经取得了进展。[25](15580-0025.xhtml#en244)
- en: Are Brains and AI Converging?
  id: totrans-1442
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 大脑和人工智能是否正在趋同？
- en: 'Research on brains and AI are based on the same basic principles: massively
    parallel architectures with a high degree of connectivity trained with learning
    from data and experience.[26](15580-0025.xhtml#en245) Brain discoveries made in
    the twentieth century inspired new machine learning algorithms: the hierarchy
    of areas in visual cortex inspired convolutional neural networks,[27](15580-0025.xhtml#en246)
    and operant conditioning inspired the temporal difference learning algorithm for
    reinforcement learning.[28](15580-0025.xhtml#en247) In parallel with the advances
    in artificial neural networks, the BRAIN Initiative has accelerated discoveries
    in neuroscience in the twenty-first century by supporting the development of innovative
    neurotechnologies.[29](15580-0025.xhtml#en248) Machine learning is being used
    by neuroscientists to analyze simultaneous recordings from hundreds of thousands
    of neurons in dozens of brain areas and to automate the reconstruction of neural
    circuits from serial section electron microscopy. These advances have changed
    how we think about processing distributed across the cortex and new discoveries
    have inspired a new conceptual framework for brain function, leading to even more
    advanced and larger-scale neural network models.[30](15580-0025.xhtml#en249)'
  id: totrans-1443
  prefs: []
  type: TYPE_NORMAL
  zh: 大脑和人工智能的研究基于相同的基本原则：具有高度连接性的大规模并行架构，通过数据和经验的学习进行训练。[26](15580-0025.xhtml#en245)
    二十世纪的大脑发现启发了新的机器学习算法：视觉皮层区域的层次结构启发了卷积神经网络[27](15580-0025.xhtml#en246)，而操作性条件反射启发了强化学习的时序差分学习算法[28](15580-0025.xhtml#en247)。与人工神经网络的发展并行，大脑计划通过支持创新神经技术的发展，加速了21世纪神经科学领域的发现[29](15580-0025.xhtml#en248)。神经科学家正在使用机器学习来分析成千上万个神经元在数十个大脑区域的同时记录，并自动从连续切片电子显微镜中重建神经网络。这些进步改变了我们对大脑皮层分布式处理的认识，新的发现激发了一个新的关于大脑功能的概念框架，进而导致了更先进和更大规模的神经网络模型[30](15580-0025.xhtml#en249)
- en: The new conceptual frameworks in AI and neuroscience are converging, accelerating
    their progress. The dialog between AI and neuroscience is a virtuous circle that
    is enriching both fields.[31](15580-0025.xhtml#en250) AI theory is emerging from
    analyzing the activity patterns of hidden units in ultra-high-dimensional spaces,
    which is how we study brain activity.[32](15580-0025.xhtml#en251) Analyzing the
    dynamics of the activity patterns in LLMs may lead us to a deeper understanding
    of intelligence by uncovering a common underlying mathematical structure. For
    example, an LLM was trained on board positions for the game Othello and was probed
    to reveal an internal model for the rules of Othello.[33](15580-0025.xhtml#en252)
  id: totrans-1444
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能和神经科学中的新概念框架正在趋同，加速了它们的进步。人工智能与神经科学的对话是一个良性循环，丰富了这两个领域。[31](15580-0025.xhtml#en250)
    人工智能理论是从分析超高维空间中隐藏单元的活动模式中产生的，这是我们研究大脑活动的方式。[32](15580-0025.xhtml#en251) 分析大型语言模型（LLM）中活动模式的动态可能通过揭示一个共同的底层数学结构，使我们更深入地理解智能。例如，一个LLM被训练用于游戏奥赛罗的棋盘位置，并被探测以揭示奥赛罗规则的内部模型[33](15580-0025.xhtml#en252)
- en: '![](images/15580_013_fig_004.jpg)'
  id: totrans-1445
  prefs: []
  type: TYPE_IMG
  zh: '![图片](images/15580_013_fig_004.jpg)'
