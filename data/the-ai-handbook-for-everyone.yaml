  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '"我需要一个基于我的饮食偏好[例如，素食、高蛋白、低碳水化合物]和可用食材[列出食材]的每周饮食计划。请提供餐点想法以及易于遵循的食谱。"'
- en: Time Management Strategy
  id: totrans-905
