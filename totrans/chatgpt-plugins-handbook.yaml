  id: totrans-1078
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 介绍ChatGPT插件：帮助完成15种工作，使工作更快，效率提高十倍。推荐插件：帮助教育
- en: 'ChatGPT plugin is a tool that allows ChatGPT to integrate with other software.
    more efficiently Currently, there are several ChatGPT plugins that can be used
    to help with education, as follows:'
  id: totrans-1079
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT插件是一个工具，它允许ChatGPT与其他软件更高效地集成。目前，有几种ChatGPT插件可以用于帮助教育，如下所示：
- en: 1\. Research and research work
  id: totrans-1080
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 研究和研究工作
- en: ● ChatGPT Research Assistant It is a plugin that allows you to research and
    research information quickly and efficiently. It can help you find relevant information,
    summarize information, and create a research plan.
  id: totrans-1081
  prefs: []
  type: TYPE_NORMAL
  zh: ● ChatGPT研究助手：这是一个插件，允许你快速高效地进行研究和查找信息。它可以帮助你找到相关信息、总结信息，并制定研究计划。
- en: '● Example prompt command:'
  id: totrans-1082
  prefs: []
  type: TYPE_NORMAL
  zh: ● 示例提示命令：
- en: ○ "HelpmefindoutaboutChinesehistory."
  id: totrans-1083
  prefs: []
  type: TYPE_NORMAL
  zh: ○ "帮助我了解中国历史。"
- en: ○ "Helpmesummarizeinformationaboutmachine learningtheory."
  id: totrans-1084
  prefs: []
  type: TYPE_NORMAL
  zh: ○ "帮助我总结关于机器学习理论的信息。"
- en: ○ "Helpmecreatearesearchplanontheimpactsof climatechangeonagriculture."
  id: totrans-1085
  prefs: []
  type: TYPE_NORMAL
  zh: ○ "帮助我制定关于气候变化对农业影响的研究计划。"
- en: 2.Writing and translation work
