  prefs: []
  type: TYPE_NORMAL
- en: Too vague.
  prefs: []
  type: TYPE_NORMAL
- en: 'Improved Prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: “Explain the basics of digital marketing to a beginner, using simple terms and
    a short list format.”
  prefs: []
  type: TYPE_NORMAL
- en: Precise, clear, and with intent.
  prefs: []
  type: TYPE_NORMAL
- en: 'Try this exercise:'
  prefs: []
  type: TYPE_NORMAL
