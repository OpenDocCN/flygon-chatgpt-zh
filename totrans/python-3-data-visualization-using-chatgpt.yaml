  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'Python allows you to specify the number of decimal places of precision to use
    when printing decimal numbers, as shown here:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE54]'
  prefs: []
  type: TYPE_PRE
- en: '**WORKING WITH FRACTIONS**'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Python supports the Fraction() function (defined in the fractions module),
    which accepts two integers that represent the numerator and the denominator (which
    must be non-zero) of a fraction. Several examples of defining and manipulating
    fractions are shown here:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE55]'
  prefs: []
  type: TYPE_PRE
- en: Before delving into code samples that work with strings, the next section briefly
    discusses Unicode and UTF-8, both of which are character encodings.
  prefs: []
  type: TYPE_NORMAL
- en: '**UNICODE AND UTF-8**'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: A Unicode string consists of a sequence of numbers that are between 0 and 0x10ffff,
    where each number represents a group of bytes. An *encoding* is the manner in
    which a Unicode string is translated into a sequence of bytes. Among the various
    encodings, UTF-8 (“Unicode Transformation Format”) is perhaps the most common,
    and it is also the default encoding for many systems. The digit 8 in UTF-8 indicates
    that the encoding uses 8-bit numbers, whereas UTF-16 uses 16-bit numbers (but
    this encoding is less common).
  prefs: []
  type: TYPE_NORMAL
- en: The ASCII character set is a subset of UTF-8, so a valid ASCII string can be
    read as a UTF-8 string without any re-encoding required. In addition, a Unicode
    string can be converted into a UTF-8 string.
  prefs: []
  type: TYPE_NORMAL
- en: '**WORKING WITH UNICODE**'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Python supports Unicode, which means that you can render characters in different
    languages. Unicode data can be stored and manipulated in the same way as strings.
    Create a Unicode string by prepending the letter u, as shown here:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE56]'
  prefs: []
  type: TYPE_PRE
- en: 'Special characters can be included in a string by specifying their Unicode
    value. For example, the following Unicode string embeds a space (which has the
    Unicode value 0x0020) in a string:'
