- en: '[7](15580-0016.xhtml#en184r). An early draft of the AI Act required sourcing
    for all data used to train the model. This was removed after Mistral, a French
    AI startup, lobbied with political support from President Macron’s office (“Meet
    the French Startup Hoping to Take on OpenAI,” *The Economist*, March 2, 2024).
    Mistral was later investigated by the European Commission when it formed a strategic
    partnership with Microsoft (Martin Coulter and Foo Yun Chee, “Microsoft’s Deal
    with Mistral AI faces EU Scrutiny,” Reuters, February 27, 2024, https://www.reuters.com/technology/microsofts-deal-with-mistral-ai-faces-eu-scrutiny-2024-02-27/).'
  id: totrans-1953
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '[7](15580-0016.xhtml#en184r). 人工智能法案的早期草案要求为训练模型所使用的所有数据进行溯源。这一要求在法国人工智能初创公司
    Mistral（在法国总统马克龙的办公室的政治支持下进行游说，“Meet the French Startup Hoping to Take on OpenAI”，*《经济学人》*，2024年3月2日）之后被删除。Mistral
    在与微软形成战略合作伙伴关系后，被欧洲委员会调查（Martin Coulter 和 Foo Yun Chee，“微软与 Mistral AI 的交易面临欧盟审查”，路透社，2024年2月27日，https://www.reuters.com/technology/microsofts-deal-with-mistral-ai-faces-eu-scrutiny-2024-02-27/）。'
