  prefs: []
  type: TYPE_NORMAL
  zh: '**神经网络**是受人类大脑启发的一种计算结构，它使机器能够学习和处理信息。神经网络由节点（或“神经元”）层组成，这些节点相互连接以处理信息。这些网络是许多深度学习模型的基础，对于高级人工智能的发展至关重要，例如语言模型。'
