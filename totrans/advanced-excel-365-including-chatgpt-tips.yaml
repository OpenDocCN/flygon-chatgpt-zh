  prefs: []
  type: TYPE_NORMAL
- en: Sub Gross_Salary()
  prefs: []
  type: TYPE_NORMAL
- en: User will select the range H2:H101 Dim wscell As Range
  prefs: []
  type: TYPE_NORMAL
- en: For Each wscell In Selection
  prefs: []
  type: TYPE_NORMAL
- en: wscell.Offset(0, 1).Value= wscell.Value * .75
  prefs: []
  type: TYPE_NORMAL
- en: wscell.Offset(0, 2).Value = wscell.Value * 60%
  prefs: []
  type: TYPE_NORMAL
- en: wscell.Offset(0, 3).Value = wscell.value + wscell.Offset(0, 1).Value + wscell.Offset(0,
    2).Value
  prefs: []
  type: TYPE_NORMAL
- en: Next
  prefs: []
  type: TYPE_NORMAL
- en: End Sub
