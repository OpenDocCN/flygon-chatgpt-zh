- en: '7.Germany: 66.2 million users (54.07% cumulative)'
  id: totrans-1018
  prefs: []
  type: TYPE_NORMAL
  zh: 7.德国：6620万用户（累计54.07%）
- en: '8.United Kingdom: 55.7 million users (56.32% cumulative)'
  id: totrans-1019
  prefs: []
  type: TYPE_NORMAL
  zh: 8.英国：5570万用户（累计56.32%）
- en: '9.Nigeria: 55.4 million users (58.55% cumulative)'
  id: totrans-1020
  prefs: []
  type: TYPE_NORMAL
  zh: 9.尼日利亚：5540万用户（累计58.55%）
- en: '10.France: 53.5 million users (60.71% cumulative)'
  id: totrans-1021
  prefs: []
  type: TYPE_NORMAL
  zh: 10.法国：5350万用户（累计60.71%）
- en: '11.Mexico: 48 million users (62.65% cumulative)'
  id: totrans-1022
  prefs: []
