  id: totrans-1136
  prefs: []
  type: TYPE_NORMAL
  zh: '[列表 3.2](#list3-2) 以两个标准的导入语句开始，随后是变量 myarray，它是一个 3x3 的 NumPy 数组。变量 rownames
    和 colnames 分别为 Pandas DataFrame mydf 的行和列提供名称，mydf 是初始化为 Pandas DataFrame 的指定数据源（即
    myarray）。'
- en: 'The first portion of the output below requires a single print statement (which
