    then creates the rainfall table with a text column and a real-valued column called
    day and centimeters, respectively. Now launch the code in [Listing 4.25](#list4-25),
    and then navigate to the sqlite3 prompt to check the number of rows in the rainfall
    table:'
  id: totrans-1717
  prefs: []
  type: TYPE_NORMAL
  zh: '[列表 4.25](#list4-25) 如果 rainfall 表已存在，则删除该表，然后创建具有文本列和名为 day 和 centimeters
    的实值列的 rainfall 表。现在运行 [列表 4.25](#list4-25) 中的代码，然后导航到 sqlite3 提示符以检查 rainfall
    表中的行数：'
- en: '[PRE359]'
  id: totrans-1718
  prefs: []
  type: TYPE_PRE
  zh: '[PRE359]'
- en: In the next section, you will learn how to write Python code for managing data
    in sqlite3 and also learn how to extract data from the rainfall table in order
    to generate a histogram using Pandas.
  id: totrans-1719
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一节中，您将学习如何编写用于管理 sqlite3 中数据的 Python 代码，并学习如何从 rainfall 表中提取数据以使用 Pandas 生成直方图。
- en: '**PYTHON AND SQLITE**'
  id: totrans-1720
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**PYTHON 和 SQLITE**'
- en: This section contains an assortment of Python files that illustrate how to perform
    various operations in sqlite3, which are the counterpart to the examples that
    you learned how to perform from the sqlite3 prompt. Note that the Python code
    samples use the mytools.db database instead of the test.db database.
  id: totrans-1721
  prefs: []
  type: TYPE_NORMAL
  zh: 本节包含了一系列 Python 文件，展示了如何在 sqlite3 中执行各种操作，这些操作是对您从 sqlite3 提示符中学到的示例的补充。请注意，Python
    代码示例使用 mytools.db 数据库而不是 test.db 数据库。
