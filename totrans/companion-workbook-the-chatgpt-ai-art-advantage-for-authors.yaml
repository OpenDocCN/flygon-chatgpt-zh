  prefs: []
  type: TYPE_NORMAL
  zh: '*结果*'
- en: '**Generate and Evaluate:** Use the prompt. Does the image grab attention? Is
    the text clear (or can it be easily added later)? Does it convey the intended
    message and emotion?'
  id: totrans-370
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**生成和评估：** 使用提示。图片是否吸引注意力？文本是否清晰（或可以稍后轻松添加）？它是否传达了预期的信息和情感？'
- en: '**Refine for Clarity/Impact:** Use iterative prompts to improve the visual
    clarity, emotional impact, or text rendering (if attempted). *Refinement Prompts:*'
  id: totrans-371
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**精炼以增强清晰度/影响力：** 使用迭代提示来提高视觉清晰度、情感影响力或文本渲染（如果尝试过）。*精炼提示：*'
