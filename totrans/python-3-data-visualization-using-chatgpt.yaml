  prefs: []
  type: TYPE_NORMAL
- en: '![Images](../images/f0049-01.jpg)'
  prefs: []
  type: TYPE_IMG
- en: '***FIGURE 2.6*** Datasets with potential linear regression, showing the output
    generated by the code in [Listing 2.21](#list2-21)'
  prefs: []
  type: TYPE_NORMAL
- en: Now that you have seen an assortment of line graphs and scatterplots, let’s
    delve into linear regression, which is the topic of the next section.
  prefs: []
  type: TYPE_NORMAL
- en: '**WHAT IS LINEAR REGRESSION?**'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '*Linear regression* was created in 1805, and it is an important algorithm in
    statistical analysis and machine learning. Any decent statistical package supports
    linear regression and invariably supports polynomial regression. Linear regression
    involves lines, which are polynomials with degree one, whereas polynomial regression
    involves fitting polynomials of degrees greater than one to a dataset.'
  prefs: []
  type: TYPE_NORMAL
- en: In general terms, linear regression finds the equation of the best-fitting hyperplane
    that approximates a dataset, where the hyperplane has degree one less than the
    dimensionality of the dataset. In particular, if the dataset is in the Euclidean
    plane, the hyperplane is simply a line; if the dataset is in 3D, the hyperplane
    is a “regular” plane.
  prefs: []
  type: TYPE_NORMAL
- en: Linear regression is suitable when the points in a dataset are distributed in
    such a way that they can reasonably be approximated by a hyperplane. If not, then
    you can try to fit other types of multi-variable polynomial surfaces to the points
    in the dataset.
  prefs: []
  type: TYPE_NORMAL
- en: Keep in mind two other details. First, the best-fitting hyperplane does not
    necessarily intersect all (or even most of) the points in the dataset. In fact,
    the best-fitting hyperplane might not intersect *any* points in the dataset. The
    purpose of a best-fitting hyperplane is to *approximate* the points in dataset
    as closely as possible. Second, linear regression is *not* the same as curve fitting,
    which attempts to find a polynomial that passes through a set of points.
  prefs: []
  type: TYPE_NORMAL
- en: Some details about curve fitting are as follows. Given n points in the plane
    (no two of which have the same x value), there is a polynomial of degree less
    than or equal to n-1 that passes through those points. Thus, a line (which has
    degree 1) will pass through any pair of non-vertical points in the plane. For
    any triple of points in the plane, there is a quadratic equation or a line that
    passes through those points.
  prefs: []
  type: TYPE_NORMAL
- en: 'In some cases, a lower degree polynomial is available. For instance, consider
    the set of 100 points in which the x value equals the y value: clearly the line
    y = x (a polynomial of degree 1) passes through all of those points.'
  prefs: []
  type: TYPE_NORMAL
- en: However, the extent to which a line “represents” a set of points in the plane
    depends on how closely those points can be approximated by a line.
  prefs: []
  type: TYPE_NORMAL
- en: '**What is Multivariate Analysis?**'
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: '*Multivariate analysis* generalizes the equation of a line in the Euclidean
    plane, and it has the following form:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE156]'
  prefs: []
  type: TYPE_PRE
- en: The preceding equation contains a linear combination of the variables x1, x2,
    . . ., xn. In this book we will usually work with datasets that involve lines
    in the Euclidean plane.
  prefs: []
  type: TYPE_NORMAL
- en: '**What about Non-Linear Datasets?**'
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Simple linear regression finds the line that best fits a dataset, but what happens
    if the dataset does not fit a line in the plane? This is an excellent point! In
    such a scenario, we look for other curves to approximate the dataset, such as
    quadratic, cubic, or higher-degree polynomials. However, these alternatives involve
    trade-offs, as we will discuss later.
  prefs: []
  type: TYPE_NORMAL
- en: Another possibility is to use a continuous piece-wise linear function, which
    is a function that comprises a set of line segments, where adjacent line segments
    are connected. If one or more pairs of adjacent line segments are not connected,
    then it is a piece-wise linear function (i.e., the function is discontinuous).
    In either case, line segments have degree one, which involves lower computational
    complexity than higher order polynomials.
  prefs: []
  type: TYPE_NORMAL
- en: 'Thus, given a set of points in the plane, try to find the best-fitting line
    that fits those points after addressing the following questions:'
  prefs: []
  type: TYPE_NORMAL
- en: How do we know that a line “fits” the data?
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: What if a different type of curve is a better fit?
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: What does “best fit” mean?
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'One way to check if a line fits the data well is through a simple visual check:
    display the data in a graph and if the data conforms to the shape of a line reasonably
    well, then a line might be a good fit. However, this is a subjective decision,
    and a sample dataset that does not fit a line is displayed in [Figure 2.7](#fig2-7).'
  prefs: []
  type: TYPE_NORMAL
- en: '[Figure 2.7](#fig2-7) displays a dataset containing four points that do not
    fit a line.'
  prefs: []
  type: TYPE_NORMAL
- en: '![Images](../images/f0051-01.jpg)'
  prefs: []
  type: TYPE_IMG
- en: '***FIGURE 2.7*** A non-linear dataset'
  prefs: []
  type: TYPE_NORMAL
- en: 'However, if a line does not appear to be a good fit for the data, then perhaps
    a quadratic or cubic (or even higher degree) polynomial has the potential of being
    a better fit. Let’s defer the non-linear scenario and make the assumption that
    a line would be a good fit for the data. There is a well-known technique for finding
    the best-fitting line for such a dataset: the Mean Squared Error (MSE).'
  prefs: []
  type: TYPE_NORMAL
- en: '**THE MSE (MEAN SQUARED ERROR) FORMULA**'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '[Figure 2.8](#fig2-8) displays the formula for the MSE. The MSE is the sum
    of the squares of the difference between an *actual* y value and the *predicted*
    y value, divided by the number of points. Note that the predicted y value is the
    y value that each data point would have if that data point were actually on the
    best-fitting line.'
  prefs: []
  type: TYPE_NORMAL
- en: In general, the goal is to minimize the error, which determines the best-fitting
    line in the case of linear regression. However, you might be satisfied with a
    “good enough” value when the time and/or cost for any additional reduction in
    the error is deemed prohibitive, which means that this decision is not a purely
    programmatic decision.
  prefs: []
  type: TYPE_NORMAL
- en: '[Figure 2.8](#fig2-8) displays the formula for the MSE for calculating the
    best-fitting line for a set of points in the plane.'
  prefs: []
  type: TYPE_NORMAL
- en: '![Images](../images/f0052-01.jpg)'
  prefs: []
  type: TYPE_IMG
- en: '***FIGURE 2.8*** The MSE formula'
  prefs: []
  type: TYPE_NORMAL
- en: '**Other Error Types**'
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'Although we only discuss the MSE for linear regression in this book, there
    are other types of formulas for errors that you can use for linear regression,
    some of which are listed here:'
  prefs: []
  type: TYPE_NORMAL
- en: MAE
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: RMSE
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: RMSPROP
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: MAE
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The MSE is the basis for the preceding error types. For example, the RMSE is
    the Root Mean Squared Error, which is the square root of the MSE.
  prefs: []
  type: TYPE_NORMAL
- en: The MAE is the Mean Absolute Error, which is *the sum of the absolute value
    of the differences of the y terms* (not the square of the differences of the y
    terms).
  prefs: []
  type: TYPE_NORMAL
- en: The RMSProp optimizer utilizes the magnitude of recent gradients to normalize
    the gradients. Maintain a moving average over the RMS (root mean squared, which
    is the square root of the MSE) gradients, and then divide that term by the current
    gradient.
  prefs: []
  type: TYPE_NORMAL
- en: 'Although it is easier to compute the derivative of the MSE (because it is a
    differentiable function), it is also true that the MSE is more susceptible to
    outliers, more so than the MAE. The reason is simple: a squared term can be significantly
    larger than adding the absolute value of a term. For example, if a difference
    term is 10, then the squared term 100 is added to the MSE, whereas only 10 is
    added to the MAE. Similarly, if a difference term is -20, then the squared term
    400 is added to the MSE, whereas only 20 (which is the absolute value of -20)
    is added to the MAE.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Non-Linear Least Squares**'
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: When predicting housing prices, where the dataset contains a wide range of values,
    techniques such as linear regression or random forests can cause the model to
    “overfit” the samples with the highest values in order to reduce quantities such
    as the mean absolute error.
  prefs: []
  type: TYPE_NORMAL
- en: In this scenario, you probably want an error metric, such as relative error,
    that reduces the importance of fitting the samples with the largest values. This
    technique is called *non-linear least squares*, which may use a log-based transformation
    of labels and predicted values.
  prefs: []
  type: TYPE_NORMAL
- en: '**CALCULATING THE MSE MANUALLY**'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Let’s look at two simple graphs, each of which contains a line that approximates
    a set of points in a scatterplot. Notice that the line segment is the same for
    both sets of points, but the datasets are slightly different. We will manually
    calculate the MSE for both datasets and determine which value of the MSE is smaller.
  prefs: []
  type: TYPE_NORMAL
- en: '[Figure 2.9](#fig2-9) displays a set of points and a line that is a potential
    candidate for best-fitting line for the data.'
  prefs: []
  type: TYPE_NORMAL
- en: '![Images](../images/f0053-01.jpg)'
  prefs: []
  type: TYPE_IMG
- en: '***FIGURE 2.9*** A line graph that approximates the points of a scatterplot'
  prefs: []
  type: TYPE_NORMAL
- en: 'The MSE for the line in [Figure 2.9](#fig2-9) is computed as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE157]'
  prefs: []
  type: TYPE_PRE
- en: Now look at [Figure 2.10](#fig2-10), which also displays a set of points and
    a line that is a potential candidate for the best-fitting line of the data.
  prefs: []
  type: TYPE_NORMAL
- en: '![Images](../images/f0054-01.jpg)'
  prefs: []
  type: TYPE_IMG
- en: '***FIGURE 2.10*** A line graph that approximates the points of a scatterplot'
  prefs: []
  type: TYPE_NORMAL
- en: 'The MSE for the line in [Figure 2.10](#fig2-10) is computed as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE158]'
  prefs: []
  type: TYPE_PRE
- en: Thus, the line in [Figure 2.10](#fig2-10) has a smaller MSE than the line in
    [Figure 2.9](#fig2-9), which might have surprised you (or did you guess correctly?)
  prefs: []
  type: TYPE_NORMAL
- en: In these two figures we calculated the MSE easily and quickly, but in general,
    it is significantly more difficult. For instance, if we plot 10 points in the
    Euclidean plane that do not closely fit a line, with individual terms that involve
    non-integer values, we would probably need a calculator. A better solution involves
    NumPy functions, as discussed in the next section.
  prefs: []
  type: TYPE_NORMAL
- en: '**FIND THE BEST-FITTING LINE IN NUMPY**'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Earlier in this chapter, you saw examples of lines in the plane, including horizontal,
    slanted, and parallel lines. Most of those lines have a positive slope and a non-zero
    value for their y-intercept. Although there are scatterplots of data points in
    the plane where the best-fitting line has a negative slope, the examples in this
    book involve scatterplots whose best-fitting line has a positive slope.
  prefs: []
  type: TYPE_NORMAL
- en: '[Listing 2.22](#list2-22) displays the content of find_best_fit.py that illustrates
    how to determine the best-fitting line for a set of points in the Euclidean plane.
    The solution is based on “closed form” formulas, which are available from statistics.'
  prefs: []
  type: TYPE_NORMAL
- en: '***LISTING 2.22: find_best_fit.py***'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE159]'
  prefs: []
  type: TYPE_PRE
- en: '[Listing 2.22](#list2-22) starts with two NumPy arrays xs and ys that are initialized
    with the first five positive integers. The Python function best_fit_slope() calculates
    the optimal values of m (the slope) and b (the y-intercept) of a set of numbers.
    The output from [Listing 2.22](#list2-22) is here:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE160]'
  prefs: []
  type: TYPE_PRE
- en: Notice that the NumPy arrays xs and ys are identical, which means that these
    points lie on the identity function whose slope is 1\. By simple extrapolation,
    the point (0,0) is also a point on the same line. Hence, the y-intercept of this
    line must equal 0.
  prefs: []
  type: TYPE_NORMAL
- en: If you are interested, you can search online to find the derivation for the
    values of m and b. In this chapter, we will skip the derivation and proceed with
    examples of calculating the MSE. The first example involves calculating the MSE
    manually, followed by an example that uses NumPy formulas to perform the calculations.
  prefs: []
  type: TYPE_NORMAL
- en: '**CALCULATING THE MSE BY SUCCESSIVE APPROXIMATION (1)**'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: This section contains a code sample that uses a simple technique for successively
    determining better approximations for the slope and y-intercept of the best-fitting
    line. Recall that an approximation of a derivative is the ratio of “delta y” divided
    by “delta x.” The “delta” values calculate the difference of the y values and
    the difference of the x values, respectively, of two nearby points (x1,y1) and
    (x2,y2) on a function. Hence, the delta-based approximation ratio is (y2-y1)/(x2-x1).
  prefs: []
  type: TYPE_NORMAL
- en: 'The technique in this section involves a simplified approximation for the “delta”
    values: we assume that the denominators are equal to 1\. As a result, we need
    only calculate the numerators of the “delta” values: in this code sample, those
    numerators are the variables dw and db.'
  prefs: []
  type: TYPE_NORMAL
- en: '[Listing 2.23](#list2-23) displays the content of plain_linreg1.py that illustrates
    how to compute the MSE with simulated data.'
  prefs: []
  type: TYPE_NORMAL
- en: '***LISTING 2.23: plain_linreg1.py***'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE161]'
  prefs: []
  type: TYPE_PRE
- en: '[Listing 2.23](#list2-23) defines the variables X and Y that are simple arrays
    of numbers (this is our dataset). Next, the losses array is initialized as an
    empty array, and we will append successive loss approximations to this array.
    The variables W and b correspond to the slope and y-intercept, and they are initialized
    with the values 0.45 and 0.75, respectively (feel free to experiment with these
    values).'
  prefs: []
  type: TYPE_NORMAL
- en: 'The next portion of [Listing 2.23](#list2-23) is a for loop that executes 100
    times. During each iteration, the variables Y_pred, loss_error, and loss are computed,
    and they correspond to the predicted value, the error, and the loss, respectively
    (remember: we are performing linear regression). The value of loss (which is the
    error for the current iteration) is then appended to the losses array.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Next, the variables dw and db are calculated: these correspond to the “delta
    w” and “delta b” that we will use to update the values of W and b, respectively.
    The code is reproduced here:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE162]'
  prefs: []
  type: TYPE_PRE
- en: Notice that dw and db are both multiplied by the value 0.01, which is the value
    of our “learning rate” (experiment with this value as well).
  prefs: []
  type: TYPE_NORMAL
- en: 'The next code snippet displays the current cost, which is performed every tenth
    iteration through the loop. When the loop finishes execution, the values of W
    and b are displayed, and a plot is displayed that shows the cost values on the
    vertical axis and the loop iterations on the horizontal axis. The output from
    [Listing 2.23](#list2-23) is here:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE163]'
  prefs: []
  type: TYPE_PRE
- en: '[Figure 2.11](#fig2-11) displays the plot of cost-versus-iterations for [Listing
    2.23](#list2-23).'
  prefs: []
  type: TYPE_NORMAL
- en: '![Images](../images/f0057-01.jpg)'
  prefs: []
  type: TYPE_IMG
- en: '***FIGURE 2.11*** A plot of cost-versus-iterations'
  prefs: []
  type: TYPE_NORMAL
- en: '**CALCULATING THE MSE BY SUCCESSIVE APPROXIMATION (2)**'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In the previous section, you saw how to calculate “delta” approximations to
    determine the equation of a best-fitting line for a set of points in a 2D plane.
    The example in this section generalizes the code in the previous section by adding
    an outer loop that represents the number of epochs. The number of epochs specifies
    the number of times that an inner loop is executed.
  prefs: []
  type: TYPE_NORMAL
- en: '[Listing 2.24](#list2-24) displays the content of plain_linreg2.py that illustrates
    how to compute the MSE with simulated data.'
  prefs: []
  type: TYPE_NORMAL
- en: '***LISTING 2.24: plain_linreg2.py***'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE164]'
  prefs: []
  type: TYPE_PRE
- en: 'Compare the new contents of [Listing 2.24](#list2-24) (shown in bold) with
    the contents of [Listing 2.23](#list2-23): the changes are minimal, and the main
    difference is to execute the inner loop 100 times for each iteration of the outer
    loop, which also executes 100 times. The output from [Listing 2.24](#list2-24)
    is here:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE165]'
  prefs: []
  type: TYPE_PRE
- en: '[Figure 2.12](#fig2-12) displays the plot of loss-versus-iterations for [Listing
    2.24](#list2-24).'
  prefs: []
  type: TYPE_NORMAL
- en: '![Images](../images/f0059-01.jpg)'
  prefs: []
  type: TYPE_IMG
- en: '***FIGURE 2.12*** A plot of loss-versus-iterations'
  prefs: []
  type: TYPE_NORMAL
- en: Notice that [Figure 2.12](#fig2-12) has 10,000 iterations on the horizontal
    axis, whereas [Figure 2.11](#fig2-11) has only 100 iterations on the horizontal
    axis.
  prefs: []
  type: TYPE_NORMAL
- en: '**GOOGLE COLABORATORY**'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Depending on the hardware, GPU-based TF 2 code is typically at least 15 times
    faster than CPU-based TF 2 code. However, the cost of a good GPU can be a significant
    factor. Although NVIDIA provides GPUs, those consumer-based GPUs are not optimized
    for multi-GPU support (which *is* supported by TF 2).
  prefs: []
  type: TYPE_NORMAL
- en: Fortunately, Google Colaboratory is an affordable alternative that provides
    free GPU support, and also runs as a Jupyter notebook environment. In addition,
    Google Colaboratory executes your code in the cloud and involves zero configuration,
    and it is available at *[https://colab.research.google.com/notebooks/welcome.ipynb](https://colab.research.google.com/notebooks/welcome.ipynb)*.
  prefs: []
  type: TYPE_NORMAL
- en: The Jupyter notebook is suitable for training simple models and testing ideas
    quickly. Google Colaboratory makes it easy to upload local files, install software
    in Jupyter notebooks, and even connect Google Colaboratory to a Jupyter runtime
    on your local machine.
  prefs: []
  type: TYPE_NORMAL
- en: Some of the supported features of Colaboratory include TF 2 execution with GPUs,
    visualization using Matplotlib, and the ability to save a copy of your Google
    Colaboratory notebook to Github by using File > Save a copy to GitHub.
  prefs: []
  type: TYPE_NORMAL
- en: Moreover, you can load any .ipynb on GitHub by just adding the path to the URL
    *[colab.research.google.com/github/](http://colab.research.google.com/github/)*
    (see the Colaboratory website for details).
  prefs: []
  type: TYPE_NORMAL
- en: 'Google Colaboratory has support for other technologies, such as HTML and SVG,
    enabling you to render SVG-based graphics in notebooks that are in Google Colaboratory.
    Remember that any software you install in a Google Colaboratory notebook is only
    available on a per-session basis: if you log out and log in again, you need to
    perform the same installation steps that you performed during your earlier Google
    Colaboratory session.'
  prefs: []
  type: TYPE_NORMAL
- en: 'There is one other *very* nice feature of Google Colaboratory: you can execute
    code on a GPU for up to twelve hours per day for free. This free GPU support is
    extremely useful for people who do not have a suitable GPU on their local machine
    (which is probably the majority of users). Now, they can launch TF 2 code to train
    neural networks in less than 20 or 30 minutes, a process that would otherwise
    require multiple hours of CPU-based execution time.'
  prefs: []
  type: TYPE_NORMAL
- en: 'You can launch Tensorboard inside a Google Colaboratory notebook with the following
    command (replace the specified directory with your own location):'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE166]'
  prefs: []
  type: TYPE_PRE
- en: Keep in mind the following details about Google Colaboratory. First, whenever
    you connect to a server in Google Colaboratory, you start a *session*. You can
    execute the code in a session with a CPU (the default), GPU, or TPU (which is
    available for free), and you can execute your code without any time limit for
    your session. However, if you select the GPU option for your session, *only the
    first 12 hours of GPU execution time are free*. Any additional GPU time during
    that same session incurs a small charge (see the website for those details).
  prefs: []
  type: TYPE_NORMAL
- en: 'The other point to keep in mind is that any software that you install in a
    Jupyter notebook during a given session will *not* be saved when you exit that
    session. For example, the following code snippet installs TFLearn in a Jupyter
    notebook:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE167]'
  prefs: []
  type: TYPE_PRE
- en: When you exit the current session and later, start a new session, you need to
    install TFLearn again, as well as any other software (such as Github repositories)
    that you also installed in any previous session.
  prefs: []
  type: TYPE_NORMAL
- en: 'Incidentally, you can also run TF 2 code and TensorBoard in Google Colaboratory.
    Navigate to this URL for more information:'
  prefs: []
  type: TYPE_NORMAL
- en: '*[https://www.tensorflow.org/tensorboard/r2/tensorboard_in_notebooks](https://www.tensorflow.org/tensorboard/r2/tensorboard_in_notebooks)*'
  prefs: []
  type: TYPE_NORMAL
