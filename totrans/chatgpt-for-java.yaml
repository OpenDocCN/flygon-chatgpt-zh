  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: © 作者（们），独家授权给APress Media, LLC，Springer Nature的一部分，2024B. HopkinsChatGPT for
    Java[https://doi.org/10.1007/979-8-8688-0116-7_2](https://doi.org/10.1007/979-8-8688-0116-7_2)
- en: 2. Using ChatGPT As Your Java Pair-Programmer
  id: totrans-166
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 2. 使用ChatGPT作为您的Java配对程序员
- en: Bruce Hopkins^([1](#Aff2)  )(1)Beaverton, OR, USA
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 布鲁斯·霍普金斯^([1](#Aff2)  )(1)美国俄勒冈州比佛顿
- en: I’m a big fan of some of the practices of XP (eXtreme Programming), and especially
    pair-programming. No matter what flavor of pair-programming that you prefer, it
    involves two engineers sitting down at the same screen and solving the same problem
    together. One of the biggest benefits that you get is a fresh set of eyes on a
    problem, and of course, you now have two engineers who have “touched” the codebase
    instead of one. Sometimes you can have one engineer write the code and the other
    write the tests and the comments. No matter how you slice it, it’s all good stuff.
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 我非常欣赏XP（极限编程）的一些实践，尤其是配对编程。无论您更喜欢哪种配对编程风格，它都涉及两名工程师坐在同一屏幕前共同解决问题。您获得的最大好处之一是问题的新视角，当然，现在您有两个工程师“接触”了代码库，而不是一个。有时可以有一个工程师编写代码，另一个编写测试和注释。无论如何划分，这都是好事。
- en: Now, the OpenAI REST APIs for ChatGPT and their other models are officially
    supported in Python, Typescript, and of course, cURL (which is the de facto standard
    for REST APIs).
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，ChatGPT和OpenAI的其他模型的OpenAI REST API已正式支持Python、Typescript，当然还有cURL（这是REST
    API的事实标准）。
- en: There are a few Java APIs that exist that were created by third-party developers,
    but the biggest problem (in my opinion) is that this space is rapidly changing.
    OpenAI is constantly updating both their models and their HTTP interfaces, and
    as a result, they are adding or deprecating features and functionality frequently.
    If you choose to use a third-party Java API for your project, you risk the problem
    of using an API that is outdated or rout of sync with the OpenAI REST API.
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 存在一些由第三方开发者创建的Java API，但在我看来，最大的问题是这个领域正在迅速变化。OpenAI不断更新他们的模型和HTTP接口，因此他们经常添加或弃用功能和功能。如果您选择在项目中使用第三方Java
    API，您可能会遇到使用过时或与OpenAI REST API不同步的API的问题。
- en: So, in this chapter, we’re going to use ChatGPT as our pair-programmer and simply
    port the official OpenAI REST APIs directly to Java. Every time OpenAI makes any
    changes to their officially supported languages and interfaces, we have everything
    needed to update our own library instantly. Let’s do this!
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，在本章中，我们将使用ChatGPT作为我们的配对程序员，并将官方OpenAI REST API直接移植到Java。每当OpenAI对其官方支持的语言和接口进行任何更改时，我们都能立即更新我们自己的库所需的一切。让我们这么做吧！
- en: 'Creating Your First Java ChatGPT App: ListModels.java'
  id: totrans-172
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 创建您的第一个Java ChatGPT应用程序：ListModels.java
- en: We’re actually going to accomplish two tasks at once here. We’re going to create
    a basic application in Java using the OpenAI APIs, and in the process, we’re going
    to verify that we’ve properly obtained an API key. So, needless to say, in case
    you haven’t done so already, follow the instructions in Chapter [1](607613_1_En_1_Chapter.xhtml)
    to create your OpenAI developer account and obtain your API key. Going forward,
    all the code samples in this book require a valid API key.
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 我们实际上将同时完成两个任务。我们将使用 OpenAI API 创建一个基本的 Java 应用程序，并在过程中验证我们已经正确地获取了 API 密钥。因此，不用说，如果你还没有这样做，请按照第
    [1](607613_1_En_1_Chapter.xhtml) 章的说明创建你的 OpenAI 开发者账户并获取你的 API 密钥。从现在开始，本书中的所有代码示例都需要一个有效的
    API 密钥。
- en: List Models Endpoint
  id: totrans-174
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: List Models 端点
- en: One of the most basic (but also essential) services that we can call is the
    **List Models** endpoint. Why, you may ask? The List Models endpoint allows you
    to get a list of all the AI models that are currently available for use by developers
    via the REST API.
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以调用的最基本（但也是最重要的）服务之一是 **List Models** 端点。为什么你会问这个问题？List Models 端点允许你通过 REST
    API 获取所有当前可供开发者使用的 AI 模型列表。
- en: Creating the Request
  id: totrans-176
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 创建请求
- en: Table [2-1](#Tab1) lists all the HTTP parameters necessary to call the List
    Models endpoint.Table 2-1
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 表 [2-1](#Tab1) 列出了调用 List Models 端点所需的全部 HTTP 参数。表 2-1
- en: The HTTP Parameters Necessary to Call the List Models Endpoint
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: 调用 List Models 端点所需的 HTTP 参数
- en: '| HTTP Param | Description |'
  id: totrans-179
  prefs: []
  type: TYPE_TB
  zh: '| HTTP 参数 | 描述 |'
- en: '| --- | --- |'
  id: totrans-180
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- |'
- en: '| Endpoint URL | [https://api.openai.com/v1/models](https://api.openai.com/v1/models)
    |'
  id: totrans-181
  prefs: []
  type: TYPE_TB
  zh: '| 端点 URL | [https://api.openai.com/v1/models](https://api.openai.com/v1/models)
    |'
- en: '| Method | GET |'
  id: totrans-182
  prefs: []
  type: TYPE_TB
  zh: '| 方法 | GET |'
- en: '| Header | Authorization: Bearer **$OPENAI_API_KEY** |'
  id: totrans-183
  prefs: []
  type: TYPE_TB
  zh: '| 标题 | 授权: Bearer **$OPENAI_API_KEY** |'
- en: Handling the JSON Response
  id: totrans-184
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 处理 JSON 响应
- en: After successfully invoking the List Models endpoint, the service will provide
    a JSON response with the structure shown in Table [2-2](#Tab2).
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: 在成功调用 List Models 端点后，服务将提供一个包含所示结构的 JSON 响应，如表 [2-2](#Tab2) 所示。
- en: Model (JSON)
  id: totrans-186
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 模型 (JSON)
- en: Table 2-2
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: 表 2-2
- en: The Structure of the Model JSON Object
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: 模型 JSON 对象的结构
- en: '| Field | Type | Description |'
  id: totrans-189
  prefs: []
  type: TYPE_TB
  zh: '| 字段 | 类型 | 描述 |'
- en: '| --- | --- | --- |'
  id: totrans-190
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- | --- |'
- en: '| object | String | This always returns the literal, "list" |'
  id: totrans-191
  prefs: []
  type: TYPE_TB
  zh: '| object | 字符串 | 总是返回字面量，"list" |'
- en: '| data | Array | A list of AI models offered by OpenAI |'
  id: totrans-192
  prefs: []
  type: TYPE_TB
  zh: '| data | 数组 | OpenAI 提供的 AI 模型列表 |'
- en: '|   ↳ id | String | The unique ID of the AI model, which is essentially the
    full name of the model |'
  id: totrans-193
  prefs: []
  type: TYPE_TB
  zh: '|   ↳ id | 字符串 | AI 模型的唯一 ID，实际上是模型的完整名称 |'
- en: '|   ↳ object | String | This always returns the literal, "model" |'
  id: totrans-194
  prefs: []
  type: TYPE_TB
  zh: '|   ↳ object | 字符串 | 总是返回字面量，"model" |'
- en: '|   ↳ created | integer | The creation date for the model |'
  id: totrans-195
  prefs: []
  type: TYPE_TB
  zh: '|   ↳ created | 整数 | 模型的创建日期 |'
- en: '|   ↳ owned_by | String | The name of the organization that owns the model
    |'
  id: totrans-196
  prefs: []
  type: TYPE_TB
  zh: '|   ↳ owned_by | 字符串 | 拥有该模型的组织的名称 |'
- en: '| permission | Array | This is an array of metadata for the permissions for
    the model |'
  id: totrans-197
  prefs: []
  type: TYPE_TB
  zh: '| 权限 | 数组 | 这是模型权限的元数据数组 |'
- en: '| root | String | This is typically a copy of the data.id field, which is the
