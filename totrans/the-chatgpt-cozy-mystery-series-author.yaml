  prefs: []
  type: TYPE_NORMAL
- en: MINDSET SHIFT. Become an Agile Author.
  prefs: []
  type: TYPE_NORMAL
- en: AI is not going away. ChatGPT and other AI writing tools are being developed
    at a truly astonishing rate, and the rate will accelerate over the next few years
    to become even more integrated into every part of our personal, writing, and business
    lives. It will change the world.
  prefs: []
  type: TYPE_NORMAL
- en: AI has the power to totally disrupt the publishing industry from the bottom
    up and the top down.
  prefs: []
  type: TYPE_NORMAL
- en: What key points does this all come down to?
  prefs: []
  type: TYPE_NORMAL
- en: AI is a massive disruption you can leverage or avoid.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The advantage an individual has over big companies is agility and the ability
    to adapt and adjust to technology faster and more creatively in hours rather than
    weeks.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Your unique creative passion and purpose will become your superpower.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: These are early days, and I believe that authors who adapt and use AI to support
    the creative writing process will be ahead of the game in a time of great turmoil.
  prefs: []
  type: TYPE_NORMAL
- en: This is why AI is one of the most exciting technological advances in decades!
  prefs: []
  type: TYPE_NORMAL
- en: 'It’s time to re-think ChatGPT as your new friendly and professional story guide
    and co-author who:'
  prefs: []
  type: TYPE_NORMAL
- en: Has the power to transform your productivity and output.
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Is always available 24/7, providing you have an internet connection.
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Is always ready to help with any aspect of the writing process.
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: If you have upgraded to ChatGPT Plus, it can handle inputs and outputs of several
    thousand words so that you can work one chapter at a time.
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Can have a conversation with you on any topic you want – at least almost any
    subject. Violent and Erotic Content are not allowed. This is not the place to
    ask for help writing erotic mystery fiction.
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: The Purpose of This Book
  prefs: []
  type: TYPE_NORMAL
- en: The primary aim of this book is to guide authors, particularly those interested
    in cozy mystery fiction, through the process of using ChatGPT to enhance their
    writing and build a series of linked books.
  prefs: []
  type: TYPE_NORMAL
- en: With the correct prompts and guidance, ChatGPT can help create compelling characters,
    emotional narratives, and vibrant settings that capture readers' hearts.
  prefs: []
  type: TYPE_NORMAL
- en: By understanding how ChatGPT works, how to craft effective prompts, and how
    to edit and refine the text it generates, authors can utilize this tool to augment
    their creativity, not replace it.
  prefs: []
  type: TYPE_NORMAL
- en: I will be using a case study to demonstrate how ChatGPT can dramatically cut
    down the story development and plotting process for a complete series.
  prefs: []
  type: TYPE_NORMAL
- en: I sincerely hope this book will act as a practical guide on how you can use
    ChatGPT to help you plot a compelling story that hits all of the expected story
    beats AND retains your unique voice.
  prefs: []
  type: TYPE_NORMAL
- en: No fluff or padding. Just practical information on how you can use the power
    of AI tools such as ChatGPT to help you plot and draft your commercial modern
    cozy mystery – fast!
  prefs: []
  type: TYPE_NORMAL
- en: How to Plot a Cozy Murder Mystery Series using ChatGPT
  prefs: []
  type: TYPE_NORMAL
- en: My Ten-Step Procrastination-Busting Process.
  prefs: []
  type: TYPE_NORMAL
- en: In my experience, shaping and writing that first scrappy draft of your cozy
    mystery fiction of any length is the crucial first step in discovering more about
    your characters and where they want to take you inside your story.
  prefs: []
  type: TYPE_NORMAL
- en: That’s why this first draft is often called the “discovery” draft. It helps
    you to discover where your characters will take you.
  prefs: []
  type: TYPE_NORMAL
- en: ChatGPT will help you develop that crucial discovery first draft as quickly
    as possible. The best way to use this technology is to break down the story development
    process and work through a series of prompts in a step-by-step sequence. You are
    giving the AI a framework of specific instructions.
  prefs: []
  type: TYPE_NORMAL
- en: What’s more, it helps to fill in the gaps between your writing strengths. If
    you are brilliant at witty dialogue and characterization – that’s amazing! Let
    ChatGPT help you with plot outlines, setting, and world-building.
  prefs: []
  type: TYPE_NORMAL
- en: How to Use the Ten-Step Process to Build a Series
  prefs: []
  type: TYPE_NORMAL
- en: The first step is to come up with a fantastic high-concept story idea for book
    one of the series that is cool, different, intriguing, and so interesting that
    you cannot wait to find out where your characters will take you.
  prefs: []
  type: TYPE_NORMAL
- en: What is the setting? Contemporary, historical, or escapist fun?
  prefs: []
  type: TYPE_NORMAL
- en: Now we need a detective and secondary characters who will investigate the murder.
  prefs: []
  type: TYPE_NORMAL
- en: By working quickly through your ideas and options, you can triage the results
    and select one idea to focus on.
  prefs: []
  type: TYPE_NORMAL
- en: These are the foundations for the entire series, so it is always worth taking
    the time to work on the core elements of the first book. The rest of the series
    will spin off from here. By working quickly through your ideas and options, you
    can triage the results and select one idea to focus on.
  prefs: []
  type: TYPE_NORMAL
- en: At this point, we are ready to start working on the murder mystery puzzle of
    the first book, which will set the tone and style for the complete series.
  prefs: []
  type: TYPE_NORMAL
- en: This is the fun part of the writing process when you can create dozens of murder
    scenarios and go to town on cool and engaging ideas that are a perfect fit for
    both your sleuth and your story situation.
  prefs: []
  type: TYPE_NORMAL
- en: Once you have worked through these steps, you can then start working on a draft
    outline for the first book using a 4-Act story structure.
  prefs: []
  type: TYPE_NORMAL
- en: Big disclaimer here. There is no ideal or perfect way to write fiction.
  prefs: []
  type: TYPE_NORMAL
- en: There is only YOUR way, process, words, approach, and style. Every writer has
    to develop a unique writing method.
  prefs: []
  type: TYPE_NORMAL
- en: I am sharing my process, based on my extensive study of story craft and my professional
    and practical experience creating fiction for a traditional publisher.
  prefs: []
  type: TYPE_NORMAL
- en: This process can be applied to any fiction project but works particularly well
    for cozy mystery fiction, where a cozy mystery plotline is combined with character
    arcs to create an engaging, emotional journey for your reader.
  prefs: []
  type: TYPE_NORMAL
- en: This process is the fastest way to get to the heart of your story.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s get started!
  prefs: []
  type: TYPE_NORMAL
- en: 'PART ONE: BUILDING THE FOUNDATIONS'
  prefs: []
  type: TYPE_NORMAL
- en: How to Plan a Cozy Murder Mystery Series using ChatGPT
  prefs: []
  type: TYPE_NORMAL
- en: How Do You Get Started Planning A Cozy Mystery Series?
  prefs: []
  type: TYPE_NORMAL
- en: One successful approach is to start with a high-level concept and then add more
    layers and detail until you have a story idea that you cannot wait to start writing.
  prefs: []
  type: TYPE_NORMAL
- en: For me, it starts with three critical decisions.
  prefs: []
  type: TYPE_NORMAL
- en: WHAT kind of cozy mystery fiction do you love to read and want to write?
  prefs: []
  type: TYPE_NORMAL
- en: WHERE is the ideal setting for that kind of mystery?
  prefs: []
  type: TYPE_NORMAL
- en: WHO is the sleuth and the main characters in this story?
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc42E.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Decision One. Theme and Niche
  prefs: []
  type: TYPE_NORMAL
- en: '![A blue and white rectangular box with white text  Description automatically
    generated](image_rsrc42F.jpg)'
  prefs: []
  type: TYPE_IMG
- en: What theme and cozy niche category would you use to describe your series?
  prefs: []
  type: TYPE_NORMAL
- en: What kind of world does your series take us to? From wedding planning to book
    selling, dog walking to baking cupcakes, hobby store to historical or paranormal—the
    range is only limited by your imagination.
  prefs: []
  type: TYPE_NORMAL
- en: What are you interested in and curious about? What will keep you writing the
    following books in the series? You have to enjoy and care about the industry,
    craft, hobby, or period you are drawn to. The goal is to create immersive story
    worlds.
  prefs: []
  type: TYPE_NORMAL
- en: Use any specialist knowledge you may have. Focus on the way people talk, the
    jargon and idioms of the hobby or profession, the equipment and tools they use,
    and the arguments and gossip in the hobby or industry. These are the details that
    make the backstory of the characters and the storyworld come alive.
  prefs: []
  type: TYPE_NORMAL
- en: Why Is It So Essential To Understand What Niche, Or Combination Of Niches, Best
    Describes The Cozy Mystery Fiction You Want To Write.
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'Because the competition in the mystery genre is very tough, it is crucial to
    understand the following:'
  prefs: []
  type: TYPE_NORMAL
- en: The particular niche/sub-genre you love to read and is the best fit for the
    books you love to read and write.
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: The specific cozy mystery plotlines and story ideas that are associated with
    that particular niche/sub-genre.
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: How can you combine popular tropes and themes with your niche or niches to attract
    your ideal readers to your work?
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: It is the unique combination of all of these elements that will make your book
    unique and yet similar enough to other books in your selected niche that readers
    will instantly be able to recognize that this is the type of book that they want
    to read.
  prefs: []
  type: TYPE_NORMAL
- en: The good news is that there is now a vast range of cozy mystery niche categories
    and markets with readers who are looking for the next book and story world to
    discover.
  prefs: []
  type: TYPE_NORMAL
- en: The range means that it is crucial for you to decide on your niche before you
    start developing the story and characters for the first book and the series.
  prefs: []
  type: TYPE_NORMAL
- en: Establishing the theme and niche at this point impacts every other decision
    about this book and the characters.
  prefs: []
  type: TYPE_NORMAL
- en: Each cozy mystery niche comes with a set of reader expectations and tropes,
    often associated with specific settings.
  prefs: []
  type: TYPE_NORMAL
- en: For example. I love to read cozy culinary mysteries with an amateur sleuth set
    in small communities. Bookstores come next. You may prefer paranormal themes,
    historical cozies, needlecraft, or a story with animal companions.
  prefs: []
  type: TYPE_NORMAL
- en: Every author is different. Your book, your idea, your choice.
  prefs: []
  type: TYPE_NORMAL
- en: Note down some ideas and have fun with themes, plot ideas, characters, or hooky
    titles. You will find it easy to find something that interests you.
  prefs: []
  type: TYPE_NORMAL
- en: '![A blue circle with white text  Description automatically generated](image_rsrc42G.jpg)'
