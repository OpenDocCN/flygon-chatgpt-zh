    ****b**e** ****sh**ort** ****a**nd** ****t**o** ****t**he** ****po**int**. ****T**he**
    ****L**LM** ****us**es** ****th**ese** ****exa**mple**s ****t**o** ****esta**blis**h
    ****a**** ****pat**ter**n ****a**nd** ****th**en** ****gen**erat**e ****a****
    ****res**pons**e ****th**at** ****fol**low**s ****t**he** ****sa**me** ****fo**rma**t
    ****a**nd** ****st**yle**.'
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: '****T**he** ****exa**mple**s ****p**r**o**v**i**d**e**d ****s**h**o**u**l**d
