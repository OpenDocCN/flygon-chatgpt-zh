    ****en**erg**y ****fr**om** ****t**he** ****li**ght** ****i**s** ****us**ed**
    ****t**o** ****sp**lit** ****wa**ter** ****mole**cule**s ****a**nd** ****com**bin**e
    ****th**eir** ****comp**onent**s ****wi**th** ****ca**rbo**n ****dio**xid**e,
    ****for**min**g ****glu**cos**e ****a**nd** ****rele**asin**g ****ox**yge**n ****a**s**
    ****a**** ****bypr**oduc**t. "'
  id: totrans-689
  prefs: []
  type: TYPE_NORMAL
  zh: ○ ****改进后的答案**： "****光合作用发生在植物细胞的叶绿体中，其中叶绿素吸收阳光。光能被用来分解水分子，并将它们的组成部分与二氧化碳结合，形成葡萄糖并释放氧气作为副产品。"
- en: '●        ****Adv**ance**d :'
