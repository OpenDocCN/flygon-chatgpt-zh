- en: 4.4 Conclusions and avenues for future research
  id: totrans-952
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 4.4 结论和未来研究方向
- en: ChatGPT assists teachers and students in making their work more convenient and
    manageable, significantly contributing to the enhancement of education’s quality
    and effectiveness ([Harini 2023](#ch12.xhtml#r142)). ChatGPT enables teachers
    to delegate specific tasks, shifting their focus from primarily delivering content
    to cultivating learners’ creativity and promoting individualized learning. ChatGPT
    encourages students to be more proactive in their studies, fostering a willingness
    to ask questions and engage in debates. This aligns with the principles of modern
    education. Encouraging the responsible use of ChatGPT and developing digital competencies
    while harnessing digital tools is a pathway for teachers, students, and learners
    to further their growth, supporting their learning and career development.
  id: totrans-953
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT帮助教师和学生使他们的工作更加方便和可管理，对提高教育的质量和效率做出了重大贡献([Harini 2023](#ch12.xhtml#r142))。ChatGPT使教师能够委派特定任务，将他们的重点从主要传授内容转移到培养学习者的创造力和促进个性化学习。ChatGPT鼓励学生更加积极主动地学习，培养他们提问和参与辩论的意愿。这符合现代教育的原则。鼓励负责任地使用ChatGPT，同时发展数字技能并利用数字工具，是教师、学生和学习者进一步成长、支持他们的学习和职业发展的途径。
- en: Nevertheless, ChatGPT does exhibit several limitations and potential risks when
    used irresponsibly and unethically ([Wach et al. 2023](#ch12.xhtml#r178)). Consequently,
    scholars have taken an increasing interest in this topic recently. Although several
    excellent assessments have been carried out ([Lo 2023](#ch12.xhtml#r156), [Thurzo
    et al. 2023](#ch12.xhtml#r173), [Pradana and Salehudin 2015](#ch12.xhtml#r167),
    [Ansari, Ahmad, and Bhutta 2023](#ch12.xhtml#r118)), research on the updated scientific
    landscape of issues related to ChatGPT in education remains somewhat limited.
  id: totrans-954
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管如此，当ChatGPT被不负责任和不道德地使用时，确实表现出一些局限性和潜在风险([Wach等人 2023](#ch12.xhtml#r178))。因此，学者们最近对这个话题越来越感兴趣。尽管已经进行了几项出色的评估([Lo
    2023](#ch12.xhtml#r156), [Thurzo等人 2023](#ch12.xhtml#r173), [Pradana和Salehudin
    2015](#ch12.xhtml#r167), [Ansari, Ahmad和Bhutta 2023](#ch12.xhtml#r118))，但关于ChatGPT在教育领域相关问题的最新科学景观的研究仍然相对有限。
- en: A thorough map of this topic must be made to obtain a comprehensive scientific
    structure that aids in forecasting future research directions in this area. This
    chapter uses bibliometric techniques to explore the relationships between primary
    publications and the scientific research structure on using ChatGPT in education.
    Two techniques – bibliographic coupling and co-citation – are specifically combined
    to give an overview of the intellectual structure of these intriguing research
    topics. This makes it possible for researchers to pinpoint their positions in
    the field and consider potential future lines of inquiry. The studies with the
    highest indices of co-citation are [Rudolph, Tan, and Tan (2023)](#ch12.xhtml#r170),
    [Kasneci et al. (2023)](#ch12.xhtml#r149), and [Tlili et al. (2023)](#ch12.xhtml#r174),
    according to the results of the bibliographic coupling analysis. Publications
    with the highest indices of bibliographic coupling are [Cotton, Cotton, and Shipway
    (2023)](#ch12.xhtml#r128), [Tlili et al. (2023)](#ch12.xhtml#r174), and [Arif,
    Munaf, and Ul-Haque (2023)](#ch12.xhtml#r119). China, the UK, Germany, Australia,
    and the United States of America are the nations spearheading ChatGPT research
    in education. The most highly cited authors are Enkelejda Kasneci (Technical University
    of Munich, Germany), Jürgen Rudolph (Head of Research, Kaplan Singapore, Singapore),
    and Debby R. E. Cotton (SCION Research Group, DREC – Plymouth Marjon University,
    Plymouth, UK). Leading researchers on this topic include Paul Denny (University
    of Auckland, Auckland, New Zealand), Juho Leinonen (University of Auckland, Auckland,
    New Zealand), and Ken Masters (Sultan Qaboos University, Sultanate of Oman). While
    *arXiv*, the *Journal of Chemical Education*, *Nature Journal*, *Journal of Computers
    in Education*, and *JMIR Medical Education* are regarded as significant reference
    journals for learning about ChatGPT in education, *Education Sciences* tops the
    list of journals with the most research on the topic. Bibliographic coupling analysis
    formed eight clusters, while co-citation analysis results formed three clusters
    (ChatGPT and Academic Integrity, ChatGPT and Education’s Opportunities and Challenges,
    and ChatGPT Research and Multidisciplinary Perspectives).
  id: totrans-955
  prefs: []
  type: TYPE_NORMAL
  zh: 为了获得一个全面的科学结构，以帮助预测该领域未来的研究方向，必须对这个主题进行彻底的梳理。本章使用文献计量技术来探讨初级出版物与使用ChatGPT进行教育科学研究的结构之间的关系。两种技术——文献耦合和共引——被特别结合，以概述这些引人入胜的研究主题的智力结构。这使得研究人员能够确定他们在该领域的位置，并考虑潜在的未来研究方向。根据文献耦合分析的结果，共引指数最高的研究是[Rudolph,
    Tan和Tan (2023)](#ch12.xhtml#r170), [Kasneci等人 (2023)](#ch12.xhtml#r149), 和[Tlili等人
    (2023)](#ch12.xhtml#r174)。在文献耦合指数最高的出版物中，[Cotton, Cotton和Shipway (2023)](#ch12.xhtml#r128),
    [Tlili等人 (2023)](#ch12.xhtml#r174), 和[Arif, Munaf和Ul-Haque (2023)](#ch12.xhtml#r119)。中国、英国、德国、澳大利亚和美国是教育领域ChatGPT研究的领头羊。被引用次数最多的作者是Enkelejda
    Kasneci（德国慕尼黑工业大学），Jürgen Rudolph（新加坡Kaplan新加坡研究负责人），和Debby R. E. Cotton（英国普利茅斯马乔恩大学SCION研究小组）。该领域的领先研究者包括Paul
    Denny（新西兰奥克兰大学），Juho Leinonen（新西兰奥克兰大学），和Ken Masters（阿曼苏丹国苏丹卡布斯大学）。虽然*arXiv*，*化学教育杂志*，*自然杂志*，*计算机教育杂志*和*JMIR医学教育杂志*被认为是了解ChatGPT在教育领域的重大参考期刊，但*教育科学杂志*在研究该主题的期刊中排名第一。文献耦合分析形成了八个聚类，而共引分析结果形成了三个聚类（ChatGPT和学术诚信，ChatGPT和教育的机遇与挑战，以及ChatGPT研究和多学科视角）。
- en: This chapter’s information about ChatGPT’s use in education will inspire future
    researchers to work in this rapidly developing field. The outcomes of the bibliographic
    analysis also assist researchers in positioning their ongoing work and identifying
    fresh areas for future study. Lastly, educational policymakers can obtain academic
    knowledge and a comprehensive picture that can be implemented in practice by using
    this study’s scientific framework for this topic. There may be limitations due
    to this being the first study to integrate co-citation analysis and bibliographic
    coupling about comprehending ChatGPT in education. Initially, WoS data sources
    were used in this chapter. Future investigations might use more extensive data
    sources to ensure earlier research is noticed. Secondly, as ChatGPT develops,
    search terms can be broadened to better comprehend and quickly identify emerging
    trends. Lastly, splitting the research period into smaller time frames could be
    helpful to examine modifications and advancements in these study areas.
  id: totrans-956
  prefs: []
  type: TYPE_NORMAL
  zh: 本章关于ChatGPT在教育中应用的资料将激励未来的研究者投身于这个快速发展的领域。文献分析的结果也帮助研究者定位他们正在进行的工作，并识别未来研究的崭新领域。最后，教育政策制定者可以通过使用本研究的科学框架来获取学术知识，并形成一个可以在实践中应用的全面图景。由于这是第一个将共引分析和文献耦合整合起来理解ChatGPT在教育中的应用的研究，可能存在一些局限性。最初，本章使用了WoS数据源。未来的研究可能会使用更广泛的数据源以确保早期研究得到关注。其次，随着ChatGPT的发展，搜索词可以扩展以更好地理解和快速识别新兴趋势。最后，将研究时间段分割成更小的时间段可能有助于考察这些研究领域的变化和进步。
