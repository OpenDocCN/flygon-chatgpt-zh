  zh: '**最好的思考心理健康的方式**是将我们的心理、情感和社会福祉视为一个交叉截面。这意味着我们的心理健康负责我们日常思考、行动和感受的方式。它还在我们做出明智决策、应对压力以及与他人关系的能力中发挥作用。换句话说，我们的心理健康决定了我们是否看到那著名的玻璃杯是半空还是半满。如果我们想在工作中保持高效，在设定目标时保持有效，那么我们就需要保持我们的心理健康处于最佳状态。'
