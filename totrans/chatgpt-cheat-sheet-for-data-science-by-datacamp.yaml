- en: ChatGPT cheat sheet for data science
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
- en: How to use this cheatsheet?
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
- en: 1 What is ChatGPT?
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
- en: ChatGPT is a language model developed by OpenAI that has gained significant
    attention due to its remarkable ability to generate human-like responses to prompts
    given to it. ChatGPT is useful for a variety of language-based tasks, including
    language translation, question answering, text completion, and a lot more. It’s
    also very useful for data science workflows.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
- en: 2 How to get started?
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
- en: To get started, simply head to OpenAI’s site and start inputting prompts. Register
    for free or upgrade to a paid version for priority access.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
- en: '[https://chat.openai.com/chat](https://chat.openai.com/chat)'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
- en: 3 What to expect in this cheat sheet?
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
- en: In this cheat sheet, you will find specific examples of using ChatGPT for common
    data science tasks, including data visualization, data analysis, machine learning,
    and more.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/00114.png)'
  id: totrans-16
  prefs: []
  type: TYPE_IMG
- en: ChatGPT cheat sheet for data science
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
- en: Our guide for great prompts
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
- en: 1 Start prompts with a description of the AI’s role. For example, “You are a
    {x}” or
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
- en: “I want you to act as {x}”. If you aren’t sure, try “You are a helpful assistant”.
    e.g., You are a data scientist at OpenAI, you are working on large language models.
    Explain to me how GPT-3 works.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
- en: 2 Use it for common tasks.  The more common the task, the better the chances
    of
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
- en: success with ChatGPT.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
- en: 3 Offer context. Offering context when posing a question to ChatGPT allows it
    to
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
- en: provide specific answers. Providing context allows the model to understand the
    nuances of the problem and generate more informed responses. e.g., You are a data
    scientist at OpenAI, you are working on large language models. Explain how GPT-3
    works to a business executive with no technical background.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
- en: 4 Be precise. Being precise is another best practice that can minimize the need
    for
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
- en: tweaking the output. When posing a question, be clear about the input (if any)
    and the desired outcome.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
- en: 5 Keep trying. Do not be  afraid to try multiple prompts. Using different prompts
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
- en: can provide different perspectives on a problem and enable the model to generate
    a variety of responses.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/00108.png)'
  id: totrans-29
  prefs: []
  type: TYPE_IMG
- en: ChatGPT cheat sheet for data science
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
- en: Limitations of ChatGPT
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
- en: However, ChatGPT is not perfect – it can generate wrong information, or “hallucinate”.
    ChatGPT can provide incorrect answers in an authoritative tone. As such, it’s
    very important to fact check all of its answers.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/00043.png)'
