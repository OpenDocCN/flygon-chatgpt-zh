  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “扮演一个[角色]并帮助我[目标]...”
- en: “Explain [topic] to a [type of audience]...”
  id: totrans-147
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “向[受众类型]解释[主题]...”
- en: “Give me [number] ideas for [context]...”
  id: totrans-148
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “给我提供[数量]个[情境]的想法...”
- en: “Turn the following into [format/output]...”
  id: totrans-149
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “将以下内容转换为[格式/输出]...”
- en: 'Tip: You can create a document or a note collection with your favorite prompts.'
