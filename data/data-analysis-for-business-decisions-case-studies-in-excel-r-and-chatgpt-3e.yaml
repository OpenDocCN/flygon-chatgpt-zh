- en: 'Analysis Case 15.2: Text Analysis II – Sentiment Analysis'
  id: totrans-2422
  prefs: []
  type: TYPE_NORMAL
  zh: 分析案例 15.2：文本分析 II – 情感分析
- en: Sentiment analysis is a powerful text analytics technique that helps determine
    the emotional tone or attitude expressed in a piece of text. This method uses
    natural language processing, computational linguistics, and machine learning algorithms
    to systematically identify, extract, and quantify affective states and subjective
    information within textual data.
  id: totrans-2423
  prefs: []
  type: TYPE_NORMAL
  zh: 情感分析是一种强大的文本分析技术，有助于确定文本中表达的情感基调或态度。该方法使用自然语言处理、计算语言学和机器学习算法，系统地识别、提取和量化文本数据中的情感状态和主观信息。
- en: Sentiment analysis categorizes text into positive, negative, or neutral sentiments.
    More advanced systems can detect nuanced emotions like anger, joy, frustration,
    or sarcasm. The process typically involves preprocessing the text, tokenizing
    words or phrases, and then applying algorithms that assess the sentiment based
    on pre-defined lexicons or trained machine learning models.
  id: totrans-2424
  prefs: []
  type: TYPE_NORMAL
  zh: 情感分析将文本分类为正面、负面或中性情感。更高级的系统可以检测细微的情绪，如愤怒、喜悦、挫败感或讽刺。这个过程通常涉及文本预处理、分词单词或短语，然后应用基于预定义词典或训练有素的机器学习模型的算法来评估情感。
- en: This technique is widely used across various industries for numerous applications.
    In business, it is crucial for monitoring brand reputation, analyzing customer
    feedback, and gauging public opinion on products or services. In social media
    analysis, sentiment analysis helps track public mood on trending topics or evaluate
    the impact of marketing campaigns. Financial institutions use it to predict market
    trends based on news sentiment, while political analysts employ it to understand
    public opinion on policies or candidates.
  id: totrans-2425
  prefs: []
  type: TYPE_NORMAL
  zh: 这种技术在各个行业的众多应用中广泛使用。在商业中，它对于监控品牌声誉、分析客户反馈和衡量公众对产品或服务的意见至关重要。在社会媒体分析中，情感分析有助于跟踪公众对热门话题的情绪或评估营销活动的影响。金融机构使用它根据新闻情绪预测市场趋势，而政治分析师则用它来了解公众对政策或候选人的意见。
- en: Sentiment analysis provides valuable insights that go beyond mere word frequency,
    offering a deeper understanding of the emotional context behind text data. However,
    it has challenges in accurately interpreting context, sarcasm, and cultural nuances,
    areas where ongoing research continues to refine its capabilities.
  id: totrans-2426
  prefs: []
  type: TYPE_NORMAL
  zh: 情感分析提供了超越单纯词频的有价值见解，提供了对文本数据背后的情感背景的更深入理解。然而，它在准确解释上下文、讽刺和文化细微差别方面存在挑战，这些领域的研究仍在不断改进其功能。
- en: Using Excel for Sentiment Analysis
  id: totrans-2427
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 Excel 进行情感分析
- en: We now use the Excel COUNTIF function to generate an analysis of text fields
    for the purposes of performing customer sentiment analysis.
  id: totrans-2428
  prefs: []
  type: TYPE_NORMAL
  zh: 我们现在使用 Excel 的 COUNTIF 函数来生成用于执行客户情感分析的文本字段分析。
- en: 'We will answer this question:'
  id: totrans-2429
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将回答以下问题：
- en: Do customers feel positively or negatively about a product?
  id: totrans-2430
  prefs: []
  type: TYPE_NORMAL
  zh: 客户对产品的感受是正面还是负面？
- en: Using the Case Data repository provided, find the Product Reviews.xlxs data
    file.
  id: totrans-2431
  prefs: []
  type: TYPE_NORMAL
  zh: 使用提供的 Case Data 存储库，找到 Product Reviews.xlxs 数据文件。
- en: Navigate to the Product Review worksheets. Scrape the rows for the Windex™ brand
    (rows 709–1056). Paste the rows into a new worksheet and label the worksheet Windex.
    Scrape the top row of the Product Review worksheet with the variable names and
    insert them in the top row of the newly created worksheet.
  id: totrans-2432
  prefs: []
  type: TYPE_NORMAL
  zh: 导航到产品评论工作表。抓取 Windex™ 品牌的行（第 709-1056 行）。将行粘贴到新的工作表中，并将工作表标记为 Windex。抓取产品评论工作表顶部的行，包含变量名称，并将其插入新创建工作表的顶部行。
- en: Scrape the Windex “reviews.text” and “reviews.title” columns. Paste the columns
    into a new worksheet and label it “Windex Reviews.” Move the “reviews.text” column
    to column C. Add the title of “Reviews” to column A and inset consecutive numbers
    down the column. Notice that there are 348 reviews. You should now have a table
    like that shown in [Figure 15.6](#fig15-6).
  id: totrans-2433
  prefs: []
  type: TYPE_NORMAL
  zh: 抓取 Windex 的“reviews.text”和“reviews.title”列。将列粘贴到新的工作表中，并将其标记为“Windex Reviews”。将“reviews.text”列移动到
    C 列。在 A 列添加“评论”的标题，并在列中插入连续的数字。注意，共有 348 条评论。你现在应该有一个像[图 15.6](#fig15-6)中所示的表格。
- en: '![image](images/pg366.jpg)'
  id: totrans-2434
  prefs: []
  type: TYPE_IMG
  zh: '![图片](images/pg366.jpg)'
- en: FIGURE 15.6 Extracted product reviews for the Windex product
  id: totrans-2435
  prefs: []
  type: TYPE_NORMAL
  zh: 图 15.6 提取的 Windex 产品评论
- en: We will use both the title text and the review text columns to assess sentiment.
    Create a list of words expressing likes for the product (e.g., “good” and “love”)
    and enter them in one column in the spreadsheet near to the dataset. Create another
    list of words expressing dislike for the product (these would be the opposite
    of the “good” words, e.g., “bad” or “hate”).
  id: totrans-2436
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将使用标题文本和评论文本列来评估情感。创建一个表达对产品喜爱之情的单词列表（例如，“好”和“爱”），并在电子表格中靠近数据集的一列中输入它们。创建另一个表达对产品不喜欢的单词列表（这些将是“好”单词的反义词，例如，“坏”或“恨”）。
- en: 'Use the COUNTIF function to count all occurrences of your words for liking
    and disliking in both the review and title text columns. The form of the COUNTIF
    function should be written like this for each column:'
  id: totrans-2437
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 COUNTIF 函数计算评论和标题文本列中你单词的喜爱和不喜欢出现的所有次数。COUNTIF 函数的形式应该为每个列编写如下：
- en: =COUNTIF(B$2:B$348,”*good*”)
  id: totrans-2438
  prefs: []
  type: TYPE_NORMAL
  zh: =COUNTIF(B$2:B$348,”*good*”)
- en: Tabulate and summarize the results, as shown in [Figure 15.7](#fig15-7). Score
    the sentiment of the reviews by subtracting total dislikes from the total likes
    and dividing by the total count. If the number is positive, then we can conclude
    people feel “good” about the product; if negative, we can conclude otherwise.
    The closer the number is to +1, the more the customers “love” the product, and
    vice versa.
  id: totrans-2439
  prefs: []
  type: TYPE_NORMAL
  zh: 如[图15.7](#fig15-7)所示，整理并总结结果。通过从总喜欢数中减去总不喜欢数，然后除以总数来评分评论的情感。如果这个数字是正数，那么我们可以得出结论，人们对这个产品有“好”的感觉；如果是负数，则结论相反。这个数字越接近+1，顾客对产品的“喜爱”程度就越高，反之亦然。
- en: '![image](images/pg367.jpg)'
  id: totrans-2440
  prefs: []
  type: TYPE_IMG
  zh: '![image](images/pg367.jpg)'
- en: FIGURE 15.7 Sentiment analysis of the Windex product generated from the text
    comments in the reviews using the Excel COUNTIF function
  id: totrans-2441
  prefs: []
  type: TYPE_NORMAL
  zh: 图15.7 使用Excel COUNTIF函数从评论中的文本生成的Windex产品的情感分析
- en: Keep in mind these are approximate numbers (not very exact or scientific answers)
    and dependent on the list of words we count. It does, however, provide a general
    business answer.
  id: totrans-2442
  prefs: []
  type: TYPE_NORMAL
  zh: 请记住，这些数字是近似值（不是非常精确或科学的答案），并且取决于我们统计的单词列表。然而，它确实提供了一个一般性的商业答案。
- en: Now copy the text in columns B2:C348 (both title and text) into the computer
    buffer. We are going to compute a word cloud and compare it to the COUNTIF score.
  id: totrans-2443
  prefs: []
  type: TYPE_NORMAL
  zh: 现在将B2:C348列（标题和文本）中的文本复制到计算机缓冲区。我们将计算一个词云并将其与COUNTIF评分进行比较。
- en: Use the Voyant tool explored earlier in this chapter. Create a word cloud and
    perform a word frequency analysis. Be sure to remove product-specific words from
    the STOPLIST (such as “Windex,” “product,” and “reviews”). Consider [Figure 15.8](#fig15-8).
    Does the sentiment analysis computed with COUNTIF and what you see in the word
    cloud match?
  id: totrans-2444
  prefs: []
  type: TYPE_NORMAL
  zh: 使用本章前面探索过的Voyant工具。创建一个词云并执行词频分析。确保从STOPLIST中删除特定产品的单词（例如“Windex”、“产品”和“评论”）。考虑[图15.8](#fig15-8)。使用COUNTIF进行的情感分析和你在词云中看到的是否匹配？
- en: '![image](images/pg368.jpg)'
  id: totrans-2445
  prefs: []
  type: TYPE_IMG
  zh: '![image](images/pg368.jpg)'
- en: FIGURE 15.8 Sentiment analysis using a word cloud analysis of the Windex product
    from text comments in the product reviews
  id: totrans-2446
  prefs: []
  type: TYPE_NORMAL
  zh: 图15.8 使用词云分析从产品评论中的文本对Windex产品进行的情感分析
- en: Repeat steps above for the brand Rubbermaid™. The results are mixed, still positive
    but not by much. The computed sentiment score is shown in [Figure 15.9](#fig15-9).
  id: totrans-2447
  prefs: []
  type: TYPE_NORMAL
  zh: 对品牌Rubbermaid™重复上述步骤。结果混合，仍然是正面的，但不是很多。计算出的情感评分显示在[图15.9](#fig15-9)中。
- en: '![image](images/pg369.jpg)'
  id: totrans-2448
  prefs: []
  type: TYPE_IMG
  zh: '![image](images/pg369.jpg)'
- en: FIGURE 15.9 Sentiment analysis using the Excel COUNTIF function of the Rubbermaid
    product from the text comments extracted from the product reviews
  id: totrans-2449
  prefs: []
  type: TYPE_NORMAL
  zh: 图15.9 使用Excel COUNTIF函数对Rubbermaid产品从产品评论中提取的文本进行的情感分析
- en: Use the Voyant tool explored earlier in this chapter. Create a word cloud and
    perform a word frequency analysis. Add common words to the STOPLIST (such as “mop,”
    “Rubbermaid,” and “bottle”). Do the sentiment analyses computed with COUNTIF and
    the word cloud match? (See [Figure 15.10](#fig15-10).)
  id: totrans-2450
  prefs: []
  type: TYPE_NORMAL
  zh: 使用本章前面探索过的Voyant工具。创建一个词云并执行词频分析。确保将常用词添加到STOPLIST中（例如“拖把”、“Rubbermaid”和“瓶子”）。使用COUNTIF和词云进行的情感分析是否匹配？（见[图15.10](#fig15-10)。）
- en: '![image](images/pg370.jpg)'
  id: totrans-2451
  prefs: []
  type: TYPE_IMG
  zh: '![image](images/pg370.jpg)'
- en: FIGURE 15.10 Sentiment analysis using a word cloud analysis of the Rubbermaid
    product from text comments in the product reviews
  id: totrans-2452
  prefs: []
  type: TYPE_NORMAL
  zh: 图15.10 使用词云分析从产品评论中的文本对Rubbermaid产品进行的情感分析
- en: CHAPTER 16
  id: totrans-2453
  prefs: []
  type: TYPE_NORMAL
  zh: 第16章
- en: ANALYZING LARGE DATASETS
  id: totrans-2454
  prefs: []
  type: TYPE_NORMAL
  zh: 分析大数据集
- en: '![image](images/pg371.jpg)'
  id: totrans-2455
  prefs: []
  type: TYPE_IMG
  zh: '![image](images/pg371.jpg)'
- en: 'This chapter addresses a common challenge in modern data analysis: working
    with datasets too large to fit into a single Excel spreadsheet. As data volumes
    continue to grow, analysts often encounter files that exceed Excel’s capacity,
    potentially limiting their ability to apply the valuable techniques learned in
    previous chapters. This chapter presents practical solutions to overcome this
    hurdle, allowing analysts to leverage their Excel skills even when dealing with
    massive datasets.'
  id: totrans-2456
  prefs: []
  type: TYPE_NORMAL
  zh: 本章讨论了现代数据分析中一个常见的挑战：处理无法放入单个Excel电子表格中的数据集。随着数据量的持续增长，分析师经常会遇到超出Excel容量的文件，这可能会限制他们应用在前面章节中学到的有价值的技术。本章提出了克服这一障碍的实际解决方案，使分析师即使在处理大量数据集时也能利用他们的Excel技能。
- en: We begin by introducing the concept of random sampling as an important strategy
    for handling large data files. By extracting a representative sample from the
    original dataset, you can work with a manageable subset that fits within Excel’s
    limitations while still providing statistically significant results. This approach
    offers a practical compromise between the convenience of using familiar Excel
    tools and the need to analyze comprehensive datasets.
  id: totrans-2457
  prefs: []
  type: TYPE_NORMAL
  zh: 我们首先介绍随机抽样作为处理大型数据文件的重要策略。通过从原始数据集中提取具有代表性的样本，您可以在Excel的限制范围内处理一个可管理的子集，同时仍然提供具有统计意义的成果。这种方法在熟悉Excel工具的便利性和分析综合数据集的需求之间提供了一个实用的折衷方案。
- en: This chapter guides you through a step-by-step process for determining an appropriate
    sample size using online calculators. We discuss how to balance factors such as
    confidence level and margin of error to ensure that the sampled data accurately
    represents the larger population. This foundational knowledge empowers analysts
    to make informed decisions about sample sizes for various projects and accuracy
    requirements.
  id: totrans-2458
  prefs: []
  type: TYPE_NORMAL
  zh: 本章将指导您通过在线计算器逐步确定合适的样本量。我们讨论了如何平衡置信水平和误差范围等因素，以确保样本数据能够准确代表更大的总体。这种基础知识使分析师能够就各种项目和准确性要求做出明智的样本量决策。
- en: We then introduce R and RStudio as tools for extracting random samples from
    large datasets. Since you may be unfamiliar with R, we include clear instructions
    for using RStudio Cloud, a free online version of the software. This allows you
    to experiment with R’s sampling capabilities without the need for local installation.
    (For those interested in handling even larger files, we also suggest installing
    RStudio locally and providing guidance on the process.)
  id: totrans-2459
  prefs: []
  type: TYPE_NORMAL
  zh: 我们随后介绍了R和RStudio作为从大型数据集中提取随机样本的工具。由于您可能对R不熟悉，我们包括使用RStudio Cloud（软件的免费在线版本）的明确说明。这允许您在无需本地安装的情况下实验R的采样功能。（对于有兴趣处理更大文件的用户，我们还建议在本地安装RStudio，并提供有关该过程的指导。）
- en: Practical exercises are integrated throughout the chapter, allowing you to apply
    the sampling techniques to real-world datasets of varying sizes. These hands-on
    activities reinforce the concepts and build confidence in working with large data
    files. The chapter also demonstrates how to validate the accuracy of sampled data
    by comparing results from the sample to those from the full dataset, illustrating
    both the power and limitations of the sampling approach.
  id: totrans-2460
  prefs: []
  type: TYPE_NORMAL
  zh: 实践练习贯穿整个章节，让您能够将采样技术应用于不同大小的现实世界数据集。这些动手活动加强了概念，并增强了处理大型数据文件时的信心。本章还展示了如何通过将样本结果与完整数据集的结果进行比较来验证样本数据的准确性，说明了采样方法的强大之处和局限性。
- en: Advanced topics are also covered, such as handling extremely large files that
    exceed the capacity of free cloud-based tools. We offer suggestions for overcoming
    these limitations, including using local installations of R or exploring alternative
    sampling methods.
  id: totrans-2461
  prefs: []
  type: TYPE_NORMAL
  zh: 本章还涵盖了高级主题，例如处理超出免费云工具容量的极大型文件。我们提供了解决这些限制的建议，包括使用本地R安装或探索替代采样方法。
- en: By the end of the chapter, you will have developed a robust toolkit for analyzing
    large datasets using a combination of sampling techniques and Excel’s analytical
    capabilities. You will understand how to determine appropriate sample sizes, extract
    random samples using R, and validate their results. This knowledge enables analysts
    to confidently tackle projects involving massive datasets, expanding the scope
    of their analytical capabilities beyond Excel’s built-in limitations.
  id: totrans-2462
  prefs: []
  type: TYPE_NORMAL
  zh: 到本章结束时，您将开发出一个强大的工具包，用于结合采样技术和Excel的分析能力来分析大型数据集。您将了解如何确定合适的样本量，使用R提取随机样本，并验证其结果。这种知识使分析师能够自信地应对涉及大量数据集的项目，扩展其分析能力超越Excel的内置限制。
- en: The skills and techniques presented in this chapter are increasingly valuable
    in today’s data-driven business environment. As organizations continue to collect
    and analyze ever-larger volumes of data, the ability to work effectively with
    these massive datasets becomes a critical skill for analysts. By mastering the
    approaches outlined in this chapter, readers will be well-equipped to handle the
    challenges of big data analysis while still leveraging the power and familiarity
    of Excel for their analytical work.
  id: totrans-2463
  prefs: []
  type: TYPE_NORMAL
  zh: 本章中介绍的技能和技术在当今以数据驱动的商业环境中越来越有价值。随着组织继续收集和分析日益庞大的数据量，有效地处理这些大量数据集的能力成为分析师的一项关键技能。通过掌握本章中概述的方法，读者将能够应对大数据分析带来的挑战，同时仍然利用Excel的强大功能和熟悉度来进行他们的分析工作。
- en: 'This technique answers the business question: “How do we work with tables too
    large to load into Excel?”'
  id: totrans-2464
  prefs: []
  type: TYPE_NORMAL
  zh: 这种技术回答了商业问题：“我们如何处理太大而无法加载到Excel中的表格？”
- en: Using Sampling to Work with Large Data Files
  id: totrans-2465
  prefs: []
  type: TYPE_NORMAL
  zh: 使用抽样处理大型数据文件
- en: 'Analysis Case 16.1: Big Data Analysis'
  id: totrans-2466
  prefs: []
  type: TYPE_NORMAL
  zh: 分析案例16.1：大数据分析
- en: 'The premise of this exercise is that we wish to use Excel as our analysis tool
    but are aware of its limitations with respect to very large files. Typically,
    it is not the number of variables that is the problem but rather the number of
    rows. Let’s say we have a very large data file, hundreds of megabytes consisting
    of hundreds of thousands or perhaps millions of rows. How do we use Excel in this
    case when we cannot load the entire file in a spreadsheet? We make a tradeoff:
    we are willing to accept a slight decrease in the accuracy of our statistical
    results for the convenience of using Excel for the analysis.'
  id: totrans-2467
  prefs: []
  type: TYPE_NORMAL
  zh: 这个练习的前提是我们希望使用Excel作为我们的分析工具，但我们意识到它在处理非常大的文件方面的局限性。通常，问题不在于变量的数量，而在于行数。假设我们有一个非常大的数据文件，由数百万行组成，大小为数百兆字节。当我们无法将整个文件加载到电子表格中时，我们如何使用Excel？我们做出权衡：我们愿意为了使用Excel进行分析的便利性而接受我们的统计结果准确性略有下降。
- en: The technique is to randomly sample the large (or big data) file and obtain
    a random sample of manageable rows of data. We first use one tool to compute an
    adequate sample size, and then we use another tool to sample the original file.
    We then use a free Web-based tool to compute sample size, and then we use a free
    cloud-based program, RStudio, to extract a random sample.
  id: totrans-2468
  prefs: []
  type: TYPE_NORMAL
  zh: 这种技术是通过随机抽样大型（或大数据）文件，并获取可管理的随机数据行样本。我们首先使用一个工具计算适当的样本大小，然后使用另一个工具对原始文件进行抽样。然后我们使用一个免费的基于网络的工具来计算样本大小，然后使用一个免费的基于云的程序，RStudio，来提取随机样本。
- en: First, let’s compute an adequate sample size. The entire file is our population.
    For example, we wish to have 95% confidence in our statistical analysis using
    our sample and to have no more than a 1% margin of error in our results (these
    are very typical parameters in business). Let’s take a 70 MB data file with 753,324
    rows. Using an online sample size calculator found at [https://www.surveymonkey.com/mp/sample-size-calculator/](https://www.surveymonkey.com/mp/sample-size-calculator/),
    we see ([Figure 16.1](#fig16-1)) that we will need a random sample of 9,484 rows
    to achieve our desired level of accuracy and margin of error ([Figure 16.1](#fig16-1)).
  id: totrans-2469
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，让我们计算一个适当的样本大小。整个文件是我们的总体。例如，我们希望对我们的样本统计分析有95%的信心，并且我们的结果误差不超过1%（这些在商业中是非常典型的参数）。让我们以一个70MB的数据文件为例，包含753,324行。使用位于[https://www.surveymonkey.com/mp/sample-size-calculator/](https://www.surveymonkey.com/mp/sample-size-calculator/)的在线样本大小计算器，我们看到([图16.1](#fig16-1))，我们需要一个包含9,484行的随机样本来实现我们所需的准确度和误差范围([图16.1](#fig16-1))。
- en: '![image](images/pg374.jpg)'
  id: totrans-2470
  prefs: []
  type: TYPE_IMG
  zh: '![图片](images/pg374.jpg)'
- en: FIGURE 16.1 Sample size calculation using an online calculator for a dataset
    of 753,324 rows, with 95% confidence level and 1% margin of error
  id: totrans-2471
  prefs: []
  type: TYPE_NORMAL
  zh: 图16.1 使用在线计算器对包含753,324行数据集进行样本大小计算，置信水平为95%，误差范围为1%
- en: Using the online calculator, compute the necessary number of random rows in
    the sample files for various accuracy levels in the table below ([Table 16.1](#tab16-1)).
    (Note that the rightmost column has the answer!)
  id: totrans-2472
  prefs: []
  type: TYPE_NORMAL
  zh: 使用在线计算器，计算样本文件中所需随机行数以达到下表中各种准确度水平（[表16.1](#tab16-1)）。(注意，最右侧列有答案！)
- en: TABLE 16.1 Sample size requirements for various datasets under different confidence
    levels and margins of error
  id: totrans-2473
  prefs: []
  type: TYPE_NORMAL
  zh: 表16.1在不同置信水平和误差范围下不同数据集的样本大小要求
- en: '![image](images/pg375.jpg)'
  id: totrans-2474
  prefs: []
  type: TYPE_IMG
  zh: '![图片](images/pg375.jpg)'
- en: Sampling Using R
  id: totrans-2475
  prefs: []
  type: TYPE_NORMAL
  zh: 使用R进行抽样
- en: 'We now use a popular free cloud version of the R program: RStudio Cloud. (You
    can also download and install RStudio on your computer so you will have a permanently
    installed sample extraction tool for future use. Otherwise, proceed to learn the
    technique with the cloud version.)'
  id: totrans-2476
  prefs: []
  type: TYPE_NORMAL
  zh: 我们现在使用 R 程序的流行免费云版本：RStudio Cloud。（您也可以在您的计算机上下载并安装 RStudio，这样您将有一个永久安装的样本提取工具供将来使用。否则，请继续使用云版本学习技术。）
- en: Navigate to [https://rstudio.cloud/](https://rstudio.cloud/), create a free
    account, and then proceed to the next step.
  id: totrans-2477
  prefs: []
  type: TYPE_NORMAL
  zh: 导航到[https://rstudio.cloud/](https://rstudio.cloud/)，创建一个免费账户，然后进行下一步。
- en: In RStudio Cloud, create a new project. The typical RStudio interface appears.
    Note the “>_” prompt in the lower-left corner of the left screen. It should be
    blinking, waiting for your R commands. The resulting screen in your browser should
    look like that shown in [Figure 16.2](#fig16-2).
  id: totrans-2478
  prefs: []
  type: TYPE_NORMAL
  zh: 在 RStudio Cloud 中创建一个新的项目。典型的 RStudio 界面会出现。注意左侧屏幕左下角的“>_”提示符。它应该闪烁，等待您的 R 命令。您浏览器中的结果屏幕应该看起来像[图
    16.2](#fig16-2)中所示的那样。
- en: '![image](images/pg376.jpg)'
  id: totrans-2479
  prefs: []
  type: TYPE_IMG
  zh: '![image](images/pg376.jpg)'
- en: FIGURE 16.2 RStudio Cloud interface showing the initial project setup
  id: totrans-2480
  prefs: []
  type: TYPE_NORMAL
  zh: 图 16.2 显示初始项目设置的 RStudio Cloud 界面
- en: First, we upload all the files we will be sampling. Using the Case Dataset files
    provided, find the files ORDERS.csv, Courses.csv, and Community.csv files.
  id: totrans-2481
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，我们上传所有将要抽样的文件。使用提供的案例数据集文件，找到 ORDERS.csv、Courses.csv 和 Community.csv 文件。
- en: Click on the “Files” tab in the lower-right pane of the RStudio desktop on your
    browser. Then, click “Upload” in the new row. You should see the interface shown
    in [Figure 16.3](#fig16-3).
  id: totrans-2482
  prefs: []
  type: TYPE_NORMAL
  zh: 在您浏览器中的 RStudio 桌面右下角面板中点击“文件”标签。然后，在新行中点击“上传”。您应该看到[图 16.3](#fig16-3)中所示的界面。
- en: '![image](images/pg376_1.jpg)'
  id: totrans-2483
  prefs: []
  type: TYPE_IMG
  zh: '![image](images/pg376_1.jpg)'
- en: FIGURE 16.3 RStudio Cloud file upload interface for importing large datasets
  id: totrans-2484
  prefs: []
  type: TYPE_NORMAL
  zh: 图 16.3 显示导入大型数据集的 RStudio Cloud 文件上传界面
- en: Click the “Browse” button and upload each of the three files, one after the
    other. (Some of the larger files take some time to upload.) When done, the “File”
    area in the upper-right screen should be like that shown in [Figure 16.4](#fig16-4).
  id: totrans-2485
  prefs: []
  type: TYPE_NORMAL
  zh: 点击“浏览”按钮，依次上传三个文件。 (一些较大的文件上传需要一些时间。) 完成后，右上角屏幕中的“文件”区域应该像[图 16.4](#fig16-4)中所示的那样。
- en: '![image](images/pg377.jpg)'
  id: totrans-2486
  prefs: []
  type: TYPE_IMG
  zh: '![image](images/pg377.jpg)'
- en: FIGURE 16.4 RStudio Cloud Files panel showing successfully uploaded data files
  id: totrans-2487
  prefs: []
  type: TYPE_NORMAL
  zh: 图 16.4 显示成功上传的数据文件的 RStudio Cloud 文件面板
- en: We start with sampling the smaller file (ORDERS) and then move on to the larger
    files. In the upper-left panel, pull down the “File > Open” function and select
    the ORDERS.csv file from the list. That loads the file into the workspace (note
    the “Source” panel now appears and has information about the file).
  id: totrans-2488
  prefs: []
  type: TYPE_NORMAL
  zh: 我们从抽样较小的文件（ORDERS）开始，然后转到较大的文件。在上左角的面板中，下拉“文件 > 打开”功能，从列表中选择 ORDERS.csv 文件。这样就将文件加载到工作区中（注意“源”面板现在出现，并包含有关文件的信息）。
- en: Go down to the lower-left panel and click in front of the “>_” cursor. It should
    start blinking, ready for your command.
  id: totrans-2489
  prefs: []
  type: TYPE_NORMAL
  zh: 下降到左下角的面板，点击在“>_”光标前面。它应该开始闪烁，准备接收您的命令。
- en: 'Enter the following sets of commands, one after the other:'
  id: totrans-2490
  prefs: []
  type: TYPE_NORMAL
  zh: 依次输入以下命令集：
- en: set.seed(123)
  id: totrans-2491
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: set.seed(123)
- en: Y <- read.csv(“ORDERS.csv”)
  id: totrans-2492
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: Y <- read.csv(“ORDERS.csv”)
- en: View(Y)
  id: totrans-2493
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: View(Y)
- en: index <- sample (1:nrow(Y), 4482)
  id: totrans-2494
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: index <- sample (1:nrow(Y), 4482)
- en: Z <- Y[index, ]
  id: totrans-2495
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: Z <- Y[index, ]
- en: View(Z)
  id: totrans-2496
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: View(Z)
- en: write.csv(Z,’Z.csv’)
  id: totrans-2497
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: write.csv(Z,’Z.csv’)
- en: Enter the random number of rows required (4482), but without a comma, or the
    command will be interpreted as a part of the command and not as part of the number.
    We are using “Y” and “Z” as temporary containers for our data.
  id: totrans-2498
  prefs: []
  type: TYPE_NORMAL
  zh: 输入所需的随机行数（4482），但不要加逗号，否则命令将被解释为命令的一部分，而不是数字的一部分。我们正在使用“Y”和“Z”作为我们数据的临时容器。
- en: Note that the “Source” upper-left panel shows the original data in table form
    (the result of the “View” command).
  id: totrans-2499
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，“源”右上角的面板显示了以表格形式显示的原始数据（“View”命令的结果）。
- en: Also, note that the upper-right panel shows two files in the workspace, Y and
    Z, and their characteristics. Note that Y has the original set of rows, 8,399,
    and Z has the sample rows, 4,482\. The random sampling was done with the “sample”
    command.
  id: totrans-2500
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，请注意右上角的面板显示了工作区中的两个文件，Y 和 Z，以及它们的特征。请注意，Y 包含原始的行集，共 8,399 行，而 Z 包含样本行，共 4,482
    行。随机抽样是通过“sample”命令完成的。
- en: We outputted the sample rows to the Z file, and the program wrote it out to
    the disk as Z.csv. Now the lower-right panel has that file in the directory ([Figure
    16.5](#fig16-5)).
  id: totrans-2501
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将样本行输出到 Z 文件中，程序将其写入磁盘作为 Z.csv。现在右下角面板中有该文件在目录中([图 16.5](#fig16-5))。
- en: '![image](images/pg378.jpg)'
  id: totrans-2502
  prefs: []
  type: TYPE_IMG
  zh: '![image](images/pg378.jpg)'
- en: FIGURE 16.5 RStudio Cloud Files panel showing successfully uploaded data files
  id: totrans-2503
  prefs: []
  type: TYPE_NORMAL
  zh: 图16.5 显示成功上传数据文件的RStudio Cloud文件面板
- en: Now we need to download the file from the cloud directory to our computer. Check
    the box next to the Z.csv file. In the lower-right panel, click on the “More”
    icon (it looks like a blue gear). Select “Export” and follow the directions to
    download the file to your desktop for now. You should rename the file to ORDERSSample.csv
    as you save it. (It is important to note that we only used Y and Z as temporary,
    easy-to-use containers.)
  id: totrans-2504
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们需要将文件从云端目录下载到我们的电脑上。勾选Z.csv文件旁边的复选框。在右下角的面板中，点击“更多”图标（看起来像蓝色的齿轮）。选择“导出”，并按照指示将文件下载到您的桌面上。保存文件时，应将其重命名为ORDERSSample.csv。（需要注意的是，我们只使用了Y和Z作为临时的、易于使用的容器。）
- en: To check on our work, we will compute some results using both the original population
    and the sample rows and compare them.
  id: totrans-2505
  prefs: []
  type: TYPE_NORMAL
  zh: 为了检查我们的工作，我们将使用原始总体和样本行计算一些结果，并将它们进行比较。
- en: Open ORDERS.csv and ORDERSSample.csv. Notice that the sample dataset contains
    a new column (at the extreme left) that identifies each sample row uniquely (a
    random number). You need to label that column (for example, “SAMPLEID”).
  id: totrans-2506
  prefs: []
  type: TYPE_NORMAL
  zh: 打开ORDERS.csv和ORDERSSample.csv。注意，样本数据集包含一个新列（在最左边），用于唯一标识每个样本行（一个随机数）。您需要标记该列（例如，“SAMPLEID”）。
- en: Using pivot tables, tabulate the total sales by region for both files. Compare
    the results from both tables ([Figure 16.6](#fig16-6)). Compute the difference
    between the total population and the sample. You will find it to be well within
    the 5% margin of error.
  id: totrans-2507
  prefs: []
  type: TYPE_NORMAL
  zh: 使用交叉表，对两个文件按地区汇总总销售额。比较两个表的结果（[图16.6](#fig16-6)）。计算总体和样本之间的差异。您会发现它远远在5%的误差范围内。
- en: '![image](images/pg379.jpg)'
  id: totrans-2508
  prefs: []
  type: TYPE_IMG
  zh: '![图片](images/pg379.jpg)'
- en: FIGURE 16.6 Comparison of total sales by region between the original dataset
    and sampled dataset using pivot tables
  id: totrans-2509
  prefs: []
  type: TYPE_NORMAL
  zh: 图16.6 原始数据集和样本数据集使用交叉表比较地区间总销售额
- en: Note that whereas the computed total from the sampled file is quite accurate
    when compared to that computed using the entire original file, there is a much
    wider error in the individual regional results, especially for those regions with
    fewer rows. If you repeat for the PROFIT variable rather than SALES, you will
    see a much wider variation.
  id: totrans-2510
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，与使用整个原始文件计算出的总数相比，从样本文件计算出的总数相当准确，但个别地区的结果误差要大得多，尤其是那些行数较少的地区。如果您重复使用PROFIT变量而不是SALES，您将看到更大的变化。
- en: Repeat the process for the Community.csv and Courses.csv files for a 95% confidence
    level and a 2% margin of error. Compute the summary of one of the variables for
    both the total population and the sampled files and compare.
  id: totrans-2511
  prefs: []
  type: TYPE_NORMAL
  zh: 为95%的置信水平和2%的误差范围，对Community.csv和Courses.csv文件重复此过程。计算总体和样本文件中一个变量的摘要并进行比较。
- en: 'Analysis Case 16.2: Analysis Using the BankComplaints Large Data File'
  id: totrans-2512
  prefs: []
  type: TYPE_NORMAL
  zh: 分析案例16.2：使用BankComplaints大型数据文件进行分析
- en: You will find that if you try to load the BankComplaints.csv 300 MB file in
    RStudio Cloud, it will give you an error. The free cloud version only allows smaller
    files to load. One solution is to get a paid subscription and continue, but if
    we are only using R for its easy sampling capability, it may be better to continue
    using free versions of RStudio (or find yourself some other way to sample very
    large data files).
  id: totrans-2513
  prefs: []
  type: TYPE_NORMAL
  zh: 您会发现，如果您尝试在RStudio Cloud中加载300 MB的BankComplaints.csv文件，它会给您一个错误。免费云版本只允许加载较小的文件。一个解决方案是获取付费订阅并继续，但如果我们只是使用R的简单采样功能，可能更好的是继续使用RStudio的免费版本（或找到其他方法来采样非常大的数据文件）。
- en: Our proposal is for you to install RStudio on your PC or Mac computer. Then,
    you can use the techniques of the exercise above as they are given. (The interface
    to RStudio is identical, so just follow the instructions given, except now you
    can load a 300 MB or 3 GB or whatever size file you need to sample.)
  id: totrans-2514
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的提议是您在您的PC或Mac电脑上安装RStudio。然后，您可以使用上面练习中给出的技术。（RStudio的界面是相同的，所以只需按照给出的说明操作即可，但现在您可以加载300
    MB或3 GB或您需要的任何大小的文件进行采样。）
- en: 'As a first step, locate the free RStudio program on the Internet and download
    and install it. You may obtain it here: [https://www.rstudio.com/products/rstudio/download/](https://www.rstudio.com/products/rstudio/download/).'
  id: totrans-2515
  prefs: []
  type: TYPE_NORMAL
  zh: 作为第一步，在互联网上找到免费的RStudio程序，下载并安装它。您可以从这里获得：[https://www.rstudio.com/products/rstudio/download/](https://www.rstudio.com/products/rstudio/download/)。
- en: Once installed, try it out on the 300 MB BankComplaints.csv file. Compute the
    number of random rows to select for an adequate sample for a 95% confidence level
    and a 1% margin of error ([Table 16.2](#tab16-2)).
  id: totrans-2516
  prefs: []
  type: TYPE_NORMAL
  zh: 安装完成后，在300 MB的BankComplaints.csv文件上试用。计算在95%置信水平和1%误差范围内的随机行数以获得足够的样本（[表16.2](#tab16-2)）。
- en: TABLE 16.2 Sample size calculation for the BankComplaints.csv large dataset
  id: totrans-2517
  prefs: []
  type: TYPE_NORMAL
  zh: 表16.2 对BankComplaints.csv大型数据集的样本量计算
- en: '![image](images/pg380.jpg)'
  id: totrans-2518
  prefs: []
  type: TYPE_IMG
  zh: '![image](images/pg380.jpg)'
- en: Use the R commands given earlier to sample the file and save it as BankComplaintsSample.csv.
    (Make sure to use the correct file name in the commands.)
  id: totrans-2519
  prefs: []
  type: TYPE_NORMAL
  zh: 使用前面给出的R命令对文件进行抽样，并将其保存为BankComplaintsSample.csv。 (确保在命令中使用正确的文件名。)
- en: Use the file of samples to tabulate the percentage of complaints by state to
    discover the states with the most and the least complaints. Add the size of the
    population of each state and normalize the complaints per million residents of
    each state. Get the states with the least and the most complaints per capita.
    Compute other descriptive statistics of this variable.
  id: totrans-2520
  prefs: []
  type: TYPE_NORMAL
  zh: 使用样本文件编制按州划分的投诉百分比表格，以发现投诉最多和最少的州。添加每个州的人口规模，并按每个州每百万居民投诉数进行标准化。找出人均投诉最多和最少的州。计算该变量的其他描述性统计量。
- en: Using the Analysis ToolPak, obtain the summary descriptive statistics ([Figure
    16.7](#fig16-7)).
  id: totrans-2521
  prefs: []
  type: TYPE_NORMAL
  zh: 使用分析工具包，获取汇总描述性统计信息（[图16.7](#fig16-7)）。
- en: '![image](images/pg381.jpg)'
  id: totrans-2522
  prefs: []
  type: TYPE_IMG
  zh: '![image](images/pg381.jpg)'
- en: FIGURE 16.7 Descriptive statistics summary for the sampled BankComplaints dataset
    using Excel’s Analysis ToolPak
  id: totrans-2523
  prefs: []
  type: TYPE_NORMAL
  zh: 图16.7 使用Excel分析工具包对抽样BankComplaints数据集的描述性统计信息汇总
- en: CHAPTER 17
  id: totrans-2524
  prefs: []
  type: TYPE_NORMAL
  zh: 第17章
- en: DATA VISUALIZATION
  id: totrans-2525
  prefs: []
  type: TYPE_NORMAL
  zh: 数据可视化
- en: '![image](images/pg383.jpg)'
  id: totrans-2526
  prefs: []
  type: TYPE_IMG
  zh: '![image](images/pg383.jpg)'
- en: Data visualization is a critical skill in today’s economy. The ability to create
    clear, compelling, and informative visual representations of data can make the
    difference between insights being understood and acted upon or business losing
    important opportunities. This chapter introduces a comprehensive framework for
    analyzing and improving data visualizations, built around an 18-point checklist
    organized along six key dimensions.
  id: totrans-2527
  prefs: []
  type: TYPE_NORMAL
  zh: 数据可视化在当今经济中是一项关键技能。能够创建清晰、引人入胜且信息丰富的数据可视化可以区分洞察力是否被理解并采取行动，或者企业失去重要机会。本章介绍了一个综合框架，用于分析和改进数据可视化，该框架围绕一个18点清单组织，该清单沿六个关键维度展开。
- en: 'The six dimensions (Story, Signs, Purpose, Perception, Method, and Charts)
    provide a holistic approach to evaluating and enhancing data visuals. Each dimension
    focuses on specific aspects of effective visualization:'
  id: totrans-2528
  prefs: []
  type: TYPE_NORMAL
  zh: 六个维度（故事、标志、目的、感知、方法和图表）为评估和增强数据视觉提供了一个整体方法。每个维度都专注于有效可视化的特定方面：
- en: '**1.**Story: ensuring the visual tells a clear narrative'
  id: totrans-2529
  prefs: []
  type: TYPE_NORMAL
  zh: '**1.** 故事：确保视觉讲述一个清晰的故事'
- en: '**2.**Signs: using appropriate symbols and maintaining a high signal-to-noise
    ratio'
  id: totrans-2530
  prefs: []
  type: TYPE_NORMAL
  zh: '**2.** 标志：使用适当的符号并保持高信噪比'
- en: '**3.**Purpose: aligning with organizational needs and audience expectations'
  id: totrans-2531
  prefs: []
  type: TYPE_NORMAL
  zh: '**3.** 目的：与组织需求及受众期望保持一致'
- en: '**4.**Perception: leveraging principles of visual perception for clarity'
  id: totrans-2532
  prefs: []
  type: TYPE_NORMAL
  zh: '**4.** 感知：利用视觉感知原理以增强清晰度'
- en: '**5.**Method: employing best practices in color use, decluttering, and titling'
  id: totrans-2533
  prefs: []
  type: TYPE_NORMAL
  zh: '**5.** 方法：采用最佳实践在颜色使用、整理和标题制作上'
- en: '**6.**Charts: selecting and implementing the most appropriate chart types'
  id: totrans-2534
  prefs: []
  type: TYPE_NORMAL
  zh: '**6.** 图表：选择和实施最合适的图表类型'
- en: Within these dimensions, the 18-point checklist serves as a practical tool for
    assessing and refining data visualizations. It prompts creators to consider crucial
    elements such as the clarity of the visual story, effectiveness of signs and symbols,
    match between the visualization and its intended purpose, application of perceptual
    principles, judicious use of visual methods, and selection of appropriate chart
    types.
  id: totrans-2535
  prefs: []
  type: TYPE_NORMAL
  zh: 在这些维度中，18点清单作为评估和改进数据可视化的实用工具。它促使创作者考虑关键元素，如视觉故事的清晰度、标志和符号的有效性、可视化与其预期目的之间的匹配、感知原理的应用、视觉方法的审慎使用以及适当图表类型的选取。
- en: In this chapter, we demonstrate how to apply this checklist through a series
    of case analyses. Each case focuses on one dimension, guiding readers through
    the process of critically examining visualization and identifying areas for improvement.
    This step-by-step approach allows you to internalize the principles and progressively
    develop your analytical skills.
  id: totrans-2536
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们通过一系列案例分析展示了如何应用此清单。每个案例都聚焦于一个维度，引导读者通过批判性地审视可视化并确定改进领域的过程。这种逐步的方法使你能够内化原则并逐步提高你的分析技能。
- en: 'Traditionally, applying such a checklist would require significant time and
    expertise from a human analyst. However, the chapter also explores an exciting
    new frontier: the use of large language models (LLMs) in data visualization analysis.
    By fine-tuning an LLM with the principles embodied in the 18-point checklist,
    we create a powerful AI assistant capable of rapidly analyzing and suggesting
    improvements for data visualizations.'
  id: totrans-2537
  prefs: []
  type: TYPE_NORMAL
  zh: 传统上，应用此类清单需要人类分析师大量的时间和专业知识。然而，本章还探索了一个令人兴奋的新领域：在数据可视化分析中使用大型语言模型（LLMs）。通过将18点清单中体现的原则微调到LLM中，我们创建了一个强大的AI助手，能够快速分析并建议改进数据可视化。
- en: We conclude by comparing the manual analysis process with the AI-assisted approach.
    This comparison highlights both the progress made in automating complex analytical
    tasks and the continued importance of human judgment and creativity in data visualization.
    While the AI can quickly identify potential issues and suggest improvements based
    on established principles, the human analyst brings contextual understanding,
    creative problem-solving, and the ability to make nuanced decisions that go beyond
    rule-based assessments.
  id: totrans-2538
  prefs: []
  type: TYPE_NORMAL
  zh: 我们通过比较手动分析过程与AI辅助方法来总结。这种比较突出了在自动化复杂分析任务方面取得的进展，以及人类判断力和创造力在数据可视化中的持续重要性。虽然AI可以快速识别潜在问题并根据既定原则提出改进建议，但人类分析师带来了情境理解、创造性问题解决以及做出超越基于规则评估的细微决策的能力。
- en: By presenting both traditional and AI-assisted methods, this chapter equips
    readers with a versatile toolkit for creating and improving data visualizations.
    Whether working through the checklist manually to develop a deep understanding
    of visualization principles, or leveraging AI to streamline the analysis process,
    you will gain valuable skills for communicating data effectively in various professional
    contexts.
  id: totrans-2539
  prefs: []
  type: TYPE_NORMAL
  zh: 通过展示传统方法和AI辅助方法，本章为读者提供了一套灵活的工具集，用于创建和改进数据可视化。无论是手动通过清单来深入理解可视化原则，还是利用AI来简化分析过程，你都将获得在多种专业环境中有效传达数据的宝贵技能。
- en: You will not only learn how to critique and enhance existing visualizations
    but also how to apply these principles in creating their own compelling data stories.
    This comprehensive approach to data visualization empowers you to transform raw
    data into impactful visual narratives that drive understanding and decision-making.
  id: totrans-2540
  prefs: []
  type: TYPE_NORMAL
  zh: 你不仅将学习如何批评和增强现有的可视化，还将学习如何将这些原则应用于创建他们自己的引人入胜的数据故事。这种全面的数据可视化方法使你能够将原始数据转化为有影响力的视觉叙事，从而推动理解和决策。
- en: Data Visualization
  id: totrans-2541
  prefs: []
  type: TYPE_NORMAL
  zh: 数据可视化
- en: The Analysis Case
  id: totrans-2542
  prefs: []
  type: TYPE_NORMAL
  zh: 分析案例
- en: Consider being called into a meeting to review a pitch to be used by your company
    for a customer meeting. This company has been doing business with the City of
    New York for many years, and they wanted to reinforce the partnership they have
    with the city. Part of the pitch is to demonstrate how good a vendor they have
    been to the city by showing how much business various city agencies have done
    with your company. The sales department intends to use the slide below to demonstrate
    the state of the relationship as a vendor. It is your job to analyze and suggest
    changes to the slide to make the case more compelling.
  id: totrans-2543
  prefs: []
  type: TYPE_NORMAL
  zh: 假设你被召集去参加一个会议，审查用于公司客户会议的提案。这家公司与纽约市已有多年业务往来，他们希望加强与城市的合作关系。提案的一部分是通过展示各个城市机构与贵公司进行的业务量来证明贵公司一直是城市的好供应商。销售部门打算使用下面的幻灯片来展示作为供应商的关系状态。你的任务是分析并建议对幻灯片进行修改，以使案例更具说服力。
- en: 'It is the purpose of this lab to analyze the slide and data visual and create
    a new slide. We analyze the slide along six major dimensions: Story, Signs, Purpose,
    Perception, Methods, and Charts. These six dimensions are described at the start
    of each of the six labs in this chapter. We will use a template with a checklist
    of appropriate questions that need to be answered during the analysis.'
  id: totrans-2544
  prefs: []
  type: TYPE_NORMAL
  zh: 本实验的目的是分析幻灯片和数据可视化，并创建一个新的幻灯片。我们沿着六个主要维度分析幻灯片：故事、标志、目的、感知、方法和图表。这六个维度在每个章节的六个实验室的开始部分进行描述。我们将使用一个带有需要回答的分析问题的清单的模板。
- en: '![image](images/pg386.jpg)'
  id: totrans-2545
  prefs: []
  type: TYPE_IMG
  zh: '![图片](images/pg386.jpg)'
- en: FIGURE 17.1 Case study slide to be analyzed, modified, and made more compelling
  id: totrans-2546
  prefs: []
  type: TYPE_NORMAL
  zh: 图表17.1 待分析、修改和增强吸引力的案例研究幻灯片
- en: The Analysis Template
  id: totrans-2547
  prefs: []
  type: TYPE_NORMAL
  zh: 分析模板
- en: We use the analysis template provided below to analyze and improve charts, or
    data visualization, along the six dimensions outlined. The template here includes
    a set of questions, one for each dimension. If the answer is roughly “yes,” the
    chart is considered adequate in that dimension. If the answer is “no,” an analysis
    of that dimension is required, along with the implementation of remedies for any
    deficiencies identified. The instructions on how to enhance the chart in that
    dimension are provided in each section of the chapter below. The six dimensions
    are discussed in detail at the start of each of the six cases that follow. We
    are using the tool as a guide and to improve your ability to discriminate. Using
    the analysis template and the associated questions produces an imperfect indicator,
    but it should be sufficient to guide you in making improvements to any chart.
    We hope that by using the tool multiple times, you will then begin to internalize
    the questions, and eventually, you will not need to use the tool.
  id: totrans-2548
  prefs: []
  type: TYPE_NORMAL
  zh: 我们使用以下提供的分析模板来分析和改进图表或数据可视化，沿着概述的六个维度。该模板包括一系列问题，每个维度一个问题。如果答案是“大致上‘是’”，则图表在该维度上是充分的。如果答案是“否”，则需要对该维度进行分析，并实施任何识别出的不足的补救措施。在该章节以下各节中提供了如何在该维度上增强图表的说明。六个维度在每个后续六个案例的开始部分进行详细讨论。我们使用这个工具作为指南，以提高你的辨别能力。使用分析模板和相关问题会产生一个不完美的指标，但它应该足以指导你在改进任何图表时。我们希望通过多次使用这个工具，你将开始内化这些问题，最终你将不再需要使用这个工具。
- en: 'To use the tool, consider answering the question associated with each principle.
    Consider each question and then use the following rough criteria: answer “YES”
    if the chart fulfills the question for the most part, and “NO” if the chart is
    deficient in that question. Then elaborate: what would you do to improve the chart
    in this dimension? This process requires a rough pass-fail judgment on the issue.
    It is not perfect, and it is not meant to create an exact measurement of the visual’s
    perfection. It is meant to develop and refine your power of discrimination when
    analyzing and improving charts: what looks good and what does not. But most importantly,
    what needs improvement.'
  id: totrans-2549
  prefs: []
  type: TYPE_NORMAL
  zh: 要使用这个工具，考虑回答与每个原则相关的问题。考虑每个问题，然后使用以下粗略标准：如果图表大部分满足该问题，则回答“是”，如果图表在该问题上存在缺陷，则回答“否”。然后详细说明：你会如何改进这个维度的图表？这个过程需要对问题进行粗略的通过-不通过判断。它并不完美，它不是用来创建视觉完美的精确度量的。它的目的是发展和完善你在分析和改进图表时的辨别能力：什么看起来好，什么不好。但最重要的是，什么需要改进。
- en: Story
  id: totrans-2550
  prefs: []
  type: TYPE_NORMAL
  zh: 故事
- en: '• Create a visual story: Is the point of the visual very clear?'
  id: totrans-2551
  prefs: []
  type: TYPE_NORMAL
  zh: • 创建视觉故事：视觉的点是否非常清晰？
- en: '• Make it a prop: Has the visual has been simplified and focused?'
  id: totrans-2552
  prefs: []
  type: TYPE_NORMAL
  zh: • 使其成为道具：视觉是否已经被简化并聚焦？
- en: '• Emulate legendary storytellers: Are past masters and the basic charts that
    they pioneered emulated?'
  id: totrans-2553
  prefs: []
  type: TYPE_NORMAL
  zh: • 模仿传奇讲述者：是否模仿了过去的大师和他们开创的基本图表？
- en: Signs
  id: totrans-2554
  prefs: []
  type: TYPE_NORMAL
  zh: 标志
- en: '• Signs: Is the use of signs and symbols appropriate?'
  id: totrans-2555
  prefs: []
  type: TYPE_NORMAL
  zh: • 标志：符号和标志的使用是否适当？
- en: '• Communication: Is the signal-to-noise ratio high?'
  id: totrans-2556
  prefs: []
  type: TYPE_NORMAL
  zh: • 沟通：信号与噪声比是否高？
- en: '• Function: Is the chart functionally informational rather than beautiful art?'
  id: totrans-2557
  prefs: []
  type: TYPE_NORMAL
  zh: • 功能：图表是否是功能性的信息，而不是美丽的艺术？
- en: Purpose
  id: totrans-2558
  prefs: []
  type: TYPE_NORMAL
  zh: 目的
- en: '• Need: Does the chart fulfill organizational information needs?'
  id: totrans-2559
  prefs: []
  type: TYPE_NORMAL
  zh: • 需求：图表是否满足组织的信息需求？
- en: '• Audience: Does the chart allow for audience biases, needs, and journeys?'
  id: totrans-2560
  prefs: []
  type: TYPE_NORMAL
  zh: • 受众：图表是否允许受众的偏见、需求和旅程？
- en: '• Frame: Does the visual answer a well-framed analytical question?'
  id: totrans-2561
  prefs: []
  type: TYPE_NORMAL
  zh: • 框架：视觉是否回答了一个良好框架的分析问题？
- en: Perception
  id: totrans-2562
  prefs: []
  type: TYPE_NORMAL
  zh: 感知
- en: '• Seeing: Does the eye of the viewer focus on the most important point being
    made?'
  id: totrans-2563
  prefs: []
  type: TYPE_NORMAL
  zh: • 观察：观众的目光是否聚焦在最重要的论点上？
- en: '• Mind: Have the principles of the Gestalt psychology of perception been thoughtfully
    employed in the visual?'
  id: totrans-2564
  prefs: []
  type: TYPE_NORMAL
  zh: • 心理：视觉中是否深思熟虑地应用了格式塔心理学感知原则？
- en: '• Quality: Does the visual inform the viewer and dispel his ignorance?'
  id: totrans-2565
  prefs: []
  type: TYPE_NORMAL
  zh: • 质量：视觉元素是否能够向观众传达信息并消除他们的无知？
- en: Method
  id: totrans-2566
  prefs: []
  type: TYPE_NORMAL
  zh: 方法
- en: '• Color: Is color used judiciously and sparsely?'
  id: totrans-2567
  prefs: []
  type: TYPE_NORMAL
  zh: • 颜色：颜色是否被谨慎且稀疏地使用？
- en: • Chart “junk:” Is the visual is clear of unnecessary visual elements not leading
    to a clear point being made?
  id: totrans-2568
  prefs: []
  type: TYPE_NORMAL
  zh: • 图表“垃圾”：视觉元素是否清晰，没有不必要的视觉元素，这些元素不会导致明确的观点？
- en: '• Title: Does the title of the chart convey the point being made with the chart?'
  id: totrans-2569
  prefs: []
  type: TYPE_NORMAL
  zh: • 标题：图表的标题是否传达了图表所表达的观点？
- en: Charts
  id: totrans-2570
  prefs: []
  type: TYPE_NORMAL
  zh: 图表
- en: '• Right chart: Does the type of chart being used match the level of judgment
    required?'
  id: totrans-2571
  prefs: []
  type: TYPE_NORMAL
  zh: • 正确的图表：所使用的图表类型是否与所需的判断水平相匹配？
- en: '• Selection: Does the chart type used match the business question being answered?'
  id: totrans-2572
  prefs: []
  type: TYPE_NORMAL
  zh: • 选择：所使用的图表类型是否与要回答的商业问题相匹配？
- en: '• Tables: Are referenceable visuals (tables) readable with appropriate conditional
    formatting and thumbnail graphs used for emphasis?'
  id: totrans-2573
  prefs: []
  type: TYPE_NORMAL
  zh: • 表格：可引用的视觉元素（表格）是否可以通过适当的条件格式化和用于强调的缩略图图表进行阅读？
- en: 'Analysis Case 17.1: Story'
  id: totrans-2574
  prefs: []
  type: TYPE_NORMAL
  zh: 分析案例17.1：故事
- en: 'Create a Visual Story: Is the point of the visual very clear?'
  id: totrans-2575
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个视觉故事：视觉元素的重点是否非常清晰？
- en: As the saying goes, “a picture is worth a thousand words.” Does your visual
    make a clear point that would take a lot of words to convey? What is the point
    of the visual? Does your audience get the point? Is your story clear?
  id: totrans-2576
  prefs: []
  type: TYPE_NORMAL
  zh: 正如俗话所说，“一图胜千言。”你的视觉元素是否能够清晰地表达出需要很多文字才能传达的观点？视觉元素的重点是什么？你的观众是否理解了这个重点？你的故事是否清晰？
- en: 'Make It a Prop: Has the visual has been simplified and focused?'
  id: totrans-2577
  prefs: []
  type: TYPE_NORMAL
  zh: 使其成为道具：视觉元素是否已经被简化并聚焦？
- en: The chart maker Stephen Few said that “numbers have an important story to tell.”
    Our numbers rely on us to give them a compelling voice. A data visual should not
    tell the whole story but be a prop to be used by the storyteller. Charts support
    the storyteller, but they are not the whole story. Charts are a complement for
    the storyteller by summarizing complex data in a single image.
  id: totrans-2578
  prefs: []
  type: TYPE_NORMAL
  zh: 图表制作者斯蒂芬·菲尔（Stephen Few）说：“数字有一个重要的故事要讲。”我们的数字依赖于我们赋予它们一个引人入胜的声音。数据可视化不应该讲述整个故事，而应该是讲故事者使用的道具。图表支持讲故事者，但它们不是整个故事。图表通过在单一图像中总结复杂数据，成为讲故事者的补充。
- en: 'Emulate Legendary Storytellers: Are past masters and the basic charts that
    they pioneered emulated?'
  id: totrans-2579
  prefs: []
  type: TYPE_NORMAL
  zh: 模仿传奇故事讲述者：是否模仿了过去的大师和他们开创的基本图表？
- en: We have a rich data visualization heritage from experts in the field. They are
    master storytellers who invented and used data visuals as their props. Can you
    improve your visual by emulating famous chart makers? Are your visuals rooted
    in their chart exemplars? For example, examine the works of experts like John
    Snow with his London Cholera Map (Snow, 1855); Charles Minard and Napoleon’s March
    on Moscow (Minard, 1869); Hans Rosling, who invented Gapminder and moving bubble
    diagrams (Rosling, 2018); Joseph Priestley and his Chart of Biography and his
    New Chart of History (Priestly 1765); W.E.B DuBois’s brilliant Paris exhibition
    of 1900 charts (DuBois, 1900)and finally, Florence Nightingale and her radar charts
    of the Crimean War (Nightingale, 1858).
  id: totrans-2580
  prefs: []
  type: TYPE_NORMAL
  zh: 我们从该领域的专家那里继承了一个丰富的数据可视化传统。他们是精通讲故事的大师，他们发明并使用数据可视化作为他们的道具。你能通过模仿著名的图表制作者来改进你的视觉元素吗？你的视觉元素是否根植于他们的图表典范？例如，考察像约翰·斯诺（John
    Snow）的伦敦霍乱地图（Snow, 1855）；查尔斯·米纳德（Charles Minard）和拿破仑对莫斯科的进军（Minard, 1869）；汉斯·罗斯林（Hans
    Rosling），他发明了Gapminder和移动气泡图（Rosling, 2018）；约瑟夫·普里斯特利（Joseph Priestley）和他的传记图表以及他的新历史图表（Priestly
    1765）；W.E.B 杜波依斯（W.E.B DuBois）1900年巴黎展览的杰出图表（DuBois, 1900）以及最后，弗洛伦斯·南丁格尔（Florence
    Nightingale）和她在克里米亚战争中的雷达图表（Nightingale, 1858）。
- en: 'Case Analysis: Story'
  id: totrans-2581
  prefs: []
  type: TYPE_NORMAL
  zh: 案例分析：故事
- en: 'Review the case study and the chart to be improved. Use this exercise to practice
    analyzing a chart along the Story dimension. Make sure to use the analysis questions
    from the template, which are repeated below. After you have applied the three
    principles, you will be able to answer the following questions:'
  id: totrans-2582
  prefs: []
  type: TYPE_NORMAL
  zh: 审查案例研究和需要改进的图表。使用这个练习来练习沿着故事维度分析图表。确保使用模板中的分析问题，这些问题如下重复。在你应用了三个原则之后，你将能够回答以下问题：
- en: What is wrong with the visual analysis using these dimensions?
  id: totrans-2583
  prefs: []
  type: TYPE_NORMAL
  zh: 使用这些维度进行视觉分析有什么问题？
- en: What can be done to improve the visual in all these dimensions?
  id: totrans-2584
  prefs: []
  type: TYPE_NORMAL
  zh: 在所有这些维度上，我们可以做些什么来改进视觉元素？
- en: '**1.**Create a visual story. Is the main idea of the visual understandable?'
  id: totrans-2585
  prefs: []
  type: TYPE_NORMAL
  zh: '**1.**创建一个视觉故事。视觉元素的主要思想是否可以理解？'
- en: '**2.**Make it a prop. Has the visual has been simplified, and is it focused
    on the important data?'
  id: totrans-2586
  prefs: []
  type: TYPE_NORMAL
  zh: '**2.**将其作为道具。视觉元素是否已经被简化，并且是否专注于重要的数据？'
- en: '**3.**Emulate legendary storytellers.'
  id: totrans-2587
  prefs: []
  type: TYPE_NORMAL
  zh: '**3.** 模仿传奇的讲故事者。'
- en: 'Analysis Case 17.2: Signs'
  id: totrans-2588
  prefs: []
  type: TYPE_NORMAL
  zh: 分析案例 17.2：标志
- en: 'Give Them a Sign: Is the use of signs and symbols appropriate?'
  id: totrans-2589
  prefs: []
  type: TYPE_NORMAL
  zh: 给他们一个信号：使用标志和符号是否恰当？
- en: 'People need a strong sign to be able to make good decisions. Are we using signs
    and symbols properly in our visuals? Does the visual use cultural cues properly?
    Do we transgress any cultural conventions? Is our audience expecting the symbolism
    we use in our chart, or are they surprised and confused by it? The science of
    sign making has three parts: the signifier, which is the intended meaning; the
    signified or significant, which is the symbol or icon that stands in for the signifier
    (for example, a “dog” is represented by a “picture of a dog”); and the sign, which
    is the combination that makes up our understanding.'
  id: totrans-2590
  prefs: []
  type: TYPE_NORMAL
  zh: 人们需要一个强烈的标志来做出良好的决策。我们在视觉中是否正确地使用了标志和符号？视觉是否正确地使用了文化线索？我们是否违反了任何文化习俗？我们的受众是否期待我们在图表中使用的象征主义，或者他们对此感到惊讶和困惑？标志制作的科学有三个部分：符号，即预期的意义；所指或意义，即代表符号或图标的象征或符号（例如，“狗”由“狗的图片”表示）；以及符号，即构成我们理解的综合体。
- en: 'It is a Communication System: Is the signal-to-noise ratio high?'
  id: totrans-2591
  prefs: []
  type: TYPE_NORMAL
  zh: 它是一个通信系统：信噪比是否高？
- en: Sign making for our charts is part of setting up a communication system. We
    must ask, as with any communication system, does our visual send a strong, unmistakable
    signal? Will the receiver, our audience, be able to decode it? Or is there too
    much noise, and what can we do to reduce it? In an effective presentation, the
    audience understands your main idea even in the presence of noise.
  id: totrans-2592
  prefs: []
  type: TYPE_NORMAL
  zh: 为我们的图表制作标志是建立通信系统的一部分。我们必须像任何通信系统一样提问，我们的视觉是否发送了一个强烈、明确的信号？我们的受众，即观众，能否解码它？或者噪音太多，我们能做些什么来减少它？在一个有效的演示中，即使在噪音的存在下，观众也能理解你的主要观点。
- en: 'Design for Function: Is the chart functionally informational rather than beautiful
    art?'
  id: totrans-2593
  prefs: []
  type: TYPE_NORMAL
  zh: 设计功能：图表是否功能上具有信息性，而不是仅仅美观的艺术？
- en: Ask yourself if the chart informs or entertains your intended audience. We should
    avoid creating charts that are more like beautiful art than providing information.
    A chart should be functional and avoid extra, unnecessary decoration. Have we
    sacrificed clarity to make our chart pleasing to the eye? We should strive to
    inform, not to create charts that appeal to emotions; we want our charts to lead
    to good decisions.
  id: totrans-2594
  prefs: []
  type: TYPE_NORMAL
  zh: 问问自己图表是否向你的目标受众传达信息或娱乐。我们应该避免创建更像美观艺术而不是提供信息的图表。图表应该是功能性的，避免额外的、不必要的装饰。我们是否为了使图表看起来更吸引人而牺牲了清晰度？我们应该努力传达信息，而不是创建吸引情感的图表；我们希望我们的图表能引导到好的决策。
- en: 'Case Analysis: Signs'
  id: totrans-2595
  prefs: []
  type: TYPE_NORMAL
  zh: 案例分析：标志
- en: 'Review the case study and the chart to be improved. Use this exercise to practice
    analyzing a chart using the Sign dimension. Make sure to use the analysis questions
    from the template, which are repeated below. After you have applied the three
    principles, you will be able to answer the following questions:'
  id: totrans-2596
  prefs: []
  type: TYPE_NORMAL
  zh: 回顾案例研究和需要改进的图表。使用这个练习来练习使用标志维度分析图表。确保使用模板中的分析问题，这些问题如下重复。在你应用了三个原则之后，你将能够回答以下问题：
- en: What is wrong with the visual analyzed along these dimensions?
  id: totrans-2597
  prefs: []
  type: TYPE_NORMAL
  zh: 沿着这些维度分析出的视觉问题是什么？
- en: What can be done to improve the visual along all these dimensions?
  id: totrans-2598
  prefs: []
  type: TYPE_NORMAL
  zh: 沿着所有这些维度可以采取哪些措施来改进视觉？
- en: '**1.**Signs: Is the use of signs and symbols appropriate?'
  id: totrans-2599
  prefs: []
  type: TYPE_NORMAL
  zh: '**1.** 标志：使用标志和符号是否恰当？'
- en: '**2.**Communication: Is the signal-to-noise ratio high?'
  id: totrans-2600
  prefs: []
  type: TYPE_NORMAL
  zh: '**2.** 通信：信噪比是否高？'
- en: '**3.**Function: Is the chart functionally informational rather than simply
    beautiful art?'
  id: totrans-2601
  prefs: []
  type: TYPE_NORMAL
  zh: '**3.** 功能：图表是否功能上具有信息性，而不是仅仅美观的艺术？'
- en: 'Analysis Case 17.3: Purpose'
  id: totrans-2602
  prefs: []
  type: TYPE_NORMAL
  zh: 分析案例 17.3：目的
- en: 'Consider the Information Need: Does the chart fulfill organizational information
    needs?'
  id: totrans-2603
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑信息需求：图表是否满足组织的信息需求？
- en: We use our presentation and its embedded graphs to fulfill the needs of the
    requester and the organization. We should make sure our visuals fulfill an organizational,
    informational need. We should only be bringing data that is vital to the organization
    and its mission. The graph must speak to an organizational information need. We
    should also consider if the requester will be satisfied with this level of information
    and the news you bring. Most importantly, does the visual help them make a decision?
    In other words, does it educate your requester and audience sufficiently to satisfy
    their needs?
  id: totrans-2604
  prefs: []
  type: TYPE_NORMAL
  zh: 我们使用我们的演示和嵌入的图表来满足请求者和组织的需求。我们应该确保我们的视觉满足组织的信息需求。我们应该只提供对组织及其使命至关重要的数据。图表必须针对组织的信息需求。我们还应该考虑请求者是否会满足这一层次的信息和您带来的新闻。最重要的是，视觉是否帮助他们做出决定？换句话说，它是否足够教育您的请求者和受众，以满足他们的需求？
- en: 'Consider the Audience: Does the chart allow for audience biases, needs, and
    journeys?'
  id: totrans-2605
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑受众：图表是否允许受众的偏见、需求和旅程？
- en: Together with the audience’s information needs, we should consider all other
    aspects of our viewers and listeners. What are their biases, what journey are
    they on, what will they do with the information? Then, we must match the visual
    style to the audience’s biases, needs, and journey. The visual must take into
    consideration their point of view, and account for their biases, education, training.
    It should help them with their journey to make their numbers. Any mismatch would
    introduce noise, perhaps making it difficult to explain the main ideas from the
    data.
  id: totrans-2606
  prefs: []
  type: TYPE_NORMAL
  zh: 与受众的信息需求一起，我们应该考虑我们观众和听众的所有其他方面。他们的偏见是什么，他们在什么样的旅程中，他们会如何使用这些信息？然后，我们必须将视觉风格与受众的偏见、需求和旅程相匹配。视觉必须考虑他们的观点，并考虑到他们的偏见、教育、培训。它应该帮助他们完成旅程，使他们的数字更加清晰。任何不匹配都会引入噪声，可能使解释数据中的主要思想变得困难。
- en: 'Answer Well-Framed Analytical Questions: Does the visual answer a well-framed
    analytical question?'
  id: totrans-2607
  prefs: []
  type: TYPE_NORMAL
  zh: 回答良好框架的分析问题：图表是否回答了一个良好框架的分析问题？
- en: In the end, to satisfy the information need, we must present our results of
    answering well-framed analytical questions stemming from those needs. The analytical
    questions were posed and answered as part of the analysis process. The creation
    of the communication set of visuals is not the time to discover or search for
    the answers. We select, out of the many analytical questions we used to inform
    ourselves of the answers, those few that are the most important. They contain
    the primary evidence, the facts, that support our conclusions. Those important
    facts must be clearly evident in the chart.
  id: totrans-2608
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，为了满足信息需求，我们必须展示我们回答那些源于这些需求的良好框架分析问题的结果。分析问题是在分析过程中提出并回答的。创建沟通视觉集的时间不是发现或寻找答案的时候。我们从许多用于告知我们答案的分析问题中，选择那些最重要的几个。它们包含了支持我们结论的主要证据，即事实。这些重要的事实必须在图表中清晰明显。
- en: 'Case Analysis: Purpose'
  id: totrans-2609
  prefs: []
  type: TYPE_NORMAL
  zh: 案例分析：目的
- en: 'Review the case study and the chart to be improved. Use this exercise to practice
    analyzing a chart along the Purpose dimension. Make sure to use the analysis questions
    from the template, which are repeated below. After you have applied the three
    principles, you will be able to answer the following questions:'
  id: totrans-2610
  prefs: []
  type: TYPE_NORMAL
  zh: 审查要改进的案例研究和图表。使用这个练习来练习沿着目的维度分析图表。确保使用模板中的分析问题，以下将重复列出。在你应用了三个原则之后，你将能够回答以下问题：
- en: What is wrong with the visual being analyzed along these dimensions?
  id: totrans-2611
  prefs: []
  type: TYPE_NORMAL
  zh: 在这些维度上，被分析的视觉有什么问题？
- en: What can be done to improve the visual along all these dimensions?
  id: totrans-2612
  prefs: []
  type: TYPE_NORMAL
  zh: 在所有这些维度上，我们可以做些什么来改善视觉效果？
- en: '**1.**Need: Does the chart fulfill the organizational information needs?'
  id: totrans-2613
  prefs: []
  type: TYPE_NORMAL
  zh: '**1.**需求：图表是否满足组织的信息需求？'
- en: '**2.**Audience: Does the chart allow for audience biases, needs, and journeys?'
  id: totrans-2614
  prefs: []
  type: TYPE_NORMAL
  zh: '**2.**受众：图表是否允许受众的偏见、需求和旅程？'
- en: '**3.**Frame: Does the visual answer a well-framed analytical question?'
  id: totrans-2615
  prefs: []
  type: TYPE_NORMAL
  zh: '**3.**框架：图表是否回答了一个良好框架的分析问题？'
- en: 'Analysis Case 17.4: Perception'
  id: totrans-2616
  prefs: []
  type: TYPE_NORMAL
  zh: 分析案例 17.4：感知
- en: Use the “Eye-Brain System of Seeing:” Does the eye of the viewer focus on the
    most important point being made?
  id: totrans-2617
  prefs: []
  type: TYPE_NORMAL
  zh: 使用“眼脑视觉系统”：观众的眼睛是否聚焦于正在阐述的最重要点？
- en: The eye is attracted unconsciously to strong focal points in images. Therefore,
    you should decide which are the most important pieces of information you want
    your viewers to focus on and make them obvious. You can use Gestalt principles,
    color theory, employment of the right chart, removing chart junk, and other methods
    to assist in focusing. You must guide the way your audience views the data in
    the chart.
  id: totrans-2618
  prefs: []
  type: TYPE_NORMAL
  zh: 视线会无意识地被图像中的强烈焦点吸引。因此，你应该决定哪些是最重要的信息，你希望观众关注，并使它们明显。你可以使用格式塔原则、色彩理论、使用正确的图表、移除图表垃圾和其他方法来帮助集中注意力。你必须引导你的观众如何查看图表中的数据。
- en: Employ the Gestalt Principles of Perception - Have the principles of the Gestalt
    psychology of perception been thoughtfully employed in the visual?
  id: totrans-2619
  prefs: []
  type: TYPE_NORMAL
  zh: 应用感知的格式塔原则 - 在视觉中是否深思熟虑地应用了格式塔心理学的感知原则？
- en: One way to assure that we are guiding the eye to the most important elements
    of the chart we have designed is to use the principles of the Gestalt “psychology
    of perception.” Have the principles been used to the greatest advantage? The most
    important principle for our purposes is to make sure the visual has good figure/ground
    differences. Does the main point visually stand out? Then we can consider secondary
    effects such as asking if the grouping has been used to the best effect. Has connectedness
    been used effectively? Has flow been used properly?
  id: totrans-2620
  prefs: []
  type: TYPE_NORMAL
  zh: 确保我们引导视线到我们设计的图表中最重要的元素的一种方法，是使用格式塔“感知心理学”的原则。这些原则是否被最大限度地利用了？对我们来说最重要的原则是确保视觉有良好的图形/背景差异。主要观点在视觉上是否突出？然后我们可以考虑次要效果，例如询问分组是否被最有效地使用。连接性是否被有效地使用？流动是否被恰当地使用？
- en: 'Design with Quality: Does the visual inform the viewer and dispel his ignorance?'
  id: totrans-2621
  prefs: []
  type: TYPE_NORMAL
  zh: 以质量设计：视觉是否向观众传达信息并消除他的无知？
- en: A quality chart is one that is full of information; in other words, our visuals
    must be “alive.” To be “alive,” a visual must provide a service. The service is
    the resolution of a tension the viewer brings to the chart. They want to know.
    If the chart informs, the tension is relieved, the viewer then “knows.” If the
    viewer is still puzzled over the information after viewing, the chart does not
    have the “living” quality of informing and releasing the “tension” of ignorance.
  id: totrans-2622
  prefs: []
  type: TYPE_NORMAL
  zh: 一个高质量的图表是信息丰富的；换句话说，我们的视觉必须“生动”。为了“生动”，一个视觉必须提供一种服务。这种服务是解决观众带到图表中的紧张感。他们想知道。如果图表传达了信息，紧张感就会缓解，观众随后“知道”。如果观众在观看后仍然对信息感到困惑，图表就没有传达和释放无知“紧张感”的“生动”品质。
- en: 'Case Analysis: Perception'
  id: totrans-2623
  prefs: []
  type: TYPE_NORMAL
  zh: 案例分析：感知
- en: 'Review the case study and the chart to be improved. Use this exercise to practice
    analyzing a chart along the Perception dimension. Make sure to use the analysis
    questions from the template, which are repeated below. After you have applied
    the three principles, you will be able to answer the following questions:'
  id: totrans-2624
  prefs: []
  type: TYPE_NORMAL
  zh: 检查要改进的案例研究和图表。使用这个练习来练习从感知维度分析图表。确保使用模板中的分析问题，以下将重复列出。在你应用了三个原则之后，你将能够回答以下问题：
- en: What is wrong with the visual analyzed along these dimensions?
  id: totrans-2625
  prefs: []
  type: TYPE_NORMAL
  zh: 沿着这些维度分析视觉时出了什么问题？
- en: What can be done to improve the visual along all these dimensions?
  id: totrans-2626
  prefs: []
  type: TYPE_NORMAL
  zh: 为了改善视觉在所有这些维度上可以做些什么？
- en: '**1.**Seeing: Does the eye of the viewer focus on the most important point
    being made?'
  id: totrans-2627
  prefs: []
  type: TYPE_NORMAL
  zh: '**1.** 观察：观众的视线是否聚焦于正在阐述的最重要观点？'
- en: '**2.**Mind: Have the principles of the Gestalt “psychology of perception” been
    thoughtfully employed in the visual?'
  id: totrans-2628
  prefs: []
  type: TYPE_NORMAL
  zh: '**2.** 心智：在视觉中是否深思熟虑地应用了格式塔“感知心理学”的原则？'
- en: '**3.**Quality: Does the visual inform the viewer and dispel his ignorance?'
  id: totrans-2629
  prefs: []
  type: TYPE_NORMAL
  zh: '**3.** 质量：视觉是否向观众传达信息并消除他的无知？'
- en: 'Analysis Case 17.5: Method'
  id: totrans-2630
  prefs: []
  type: TYPE_NORMAL
  zh: 分析案例 17.5：方法
- en: 'Use Color Effectively: Is color used judiciously and sparsely?'
  id: totrans-2631
  prefs: []
  type: TYPE_NORMAL
  zh: 有效使用颜色：颜色是否被明智且稀疏地使用？
- en: Color should be used judiciously and it should enhance the chart. If you use
    Excel, for example, the program chooses which colors to display based on some
    internal formula. That does not always lead to the best color combination. Use
    color sparsely. Most of your chart should be in black and white. Color should
    be left for those elements you want to use to draw the viewer’s attention. For
    example, you could gray out the axis somewhat to make it fade into the background.
    Does your use of color grab the viewer’s attention? Color should also be used
    semantically correct.
  id: totrans-2632
  prefs: []
  type: TYPE_NORMAL
  zh: 颜色应谨慎使用，并应增强图表效果。例如，如果你使用Excel，程序会根据某些内部公式选择要显示的颜色。这并不总是导致最佳的颜色组合。应尽量少用颜色。你的图表大部分应该是黑白。颜色应留给那些你想用来吸引观众注意力的元素。例如，你可以将坐标轴稍微变灰，使其融入背景。你的颜色使用是否吸引了观众的注意力？颜色还应使用语义正确的方式。
- en: 'Remove the Chart Junk: Is the visual clear of unnecessary visual elements not
    leading to a clear point being made?'
  id: totrans-2633
  prefs: []
  type: TYPE_NORMAL
  zh: 移除图表垃圾：视觉上是否清晰，没有不必要的视觉元素，这些元素不会导致明确的观点？
- en: Chart junk is anything in your visual that detracts from the viewer’s comprehension
    of the chart. Just as we must declutter when we prepare our family home to be
    sold, you should clear up the viewing space in a visual as much as possible. Use
    the redo and undo function in your chart maker. Try putting a certain feature
    into the chart and then delete it to see how it affects the visual impact of the
    chart. Go back and forth, putting it in and taking it out repeatedly to determine
    whether valuable information would be lost if it is not there. Is there a simpler
    way to make that point? Remove unnecessary or confusing visual elements in charts
    and graphs. Any markings and visual elements can be called “chart junk” if they
    are not part of the minimum set of visuals necessary to communicate the information
    understandably.
  id: totrans-2634
  prefs: []
  type: TYPE_NORMAL
  zh: 图表垃圾是任何会分散观众对图表理解的东西。正如我们必须在准备出售家庭时清理杂乱一样，你应在视觉中尽可能清理观看空间。使用图表制作器的重做和撤销功能。尝试将某个功能放入图表中，然后删除它，看看它如何影响图表的视觉冲击力。来回尝试，反复放入和取出，以确定如果没有它是否会丢失有价值的信息。是否有更简单的方式来表达这个观点？移除图表和图形中不必要的或令人困惑的视觉元素。如果它们不是传达信息所需的最小视觉元素集的一部分，任何标记和视觉元素都可以称为“图表垃圾”。
- en: 'Tell the Story with the Title: Does the title of the chart convey the point
    being made with the chart?'
  id: totrans-2635
  prefs: []
  type: TYPE_NORMAL
  zh: 用标题讲述故事：图表的标题是否传达了图表所表达的观点？
- en: Consultants at McKinsey and Company, a consulting company, title their presentation
    slides in a certain manner. The title of the slide (or even the visual, but not
    both) makes the business point of the graph explicitly. It tells the viewer what
    the graph means in the title. They do not allow the viewers to try to figure it
    out for themselves because they may draw an incorrect conclusion. You need to
    tell the exact meaning of your chart at the top of your slide. Be succinct but
    express the main idea of the chart as a complete thought. Charts should also have
    direct labeling for series. Avoid using a legend that makes the viewer’s eye go
    back and forth because they may fail to understand the most important points.
    Tell them directly what each chart feature is.
  id: totrans-2636
  prefs: []
  type: TYPE_NORMAL
  zh: 麦肯锡公司（McKinsey and Company）的顾问以某种方式命名他们的演示文稿幻灯片。幻灯片的标题（或甚至视觉元素，但不包括两者）明确地表达了图表的商业观点。它告诉观众图表在标题中的含义。他们不允许观众自己尝试理解，因为他们可能会得出错误的结论。你需要在幻灯片顶部明确说明图表的确切含义。要简洁但完整地表达图表的主要思想。图表还应具有对系列的直接标注。避免使用使观众的眼睛来回移动的图例，因为他们可能无法理解最重要的点。直接告诉他们每个图表特征是什么。
- en: 'Case Analysis: Method'
  id: totrans-2637
  prefs: []
  type: TYPE_NORMAL
  zh: 案例分析：方法
- en: 'Review the case study and the chart to be improved. Use this exercise to practice
    analyzing a chart along the Methods dimension. Make sure to use the analysis questions
    from the template, which are repeated below. After you have applied the three
    principles, you will be able to answer the following questions:'
  id: totrans-2638
  prefs: []
  type: TYPE_NORMAL
  zh: 审查案例研究和要改进的图表。使用这个练习来练习沿着方法维度分析图表。确保使用模板中的分析问题，这些问题如下重复。在你应用了三个原则之后，你将能够回答以下问题：
- en: What is wrong with the visual analyzed along these dimensions?
  id: totrans-2639
  prefs: []
  type: TYPE_NORMAL
  zh: 沿着这些维度分析视觉有什么问题？
- en: What can be done to improve the visual along all these dimensions?
  id: totrans-2640
  prefs: []
  type: TYPE_NORMAL
  zh: 可以采取哪些措施来改善所有这些维度的视觉？
- en: '**1.**Color: Is color used judiciously and sparsely?'
  id: totrans-2641
  prefs: []
  type: TYPE_NORMAL
  zh: '**1.** 颜色：颜色是否被谨慎且少量使用？'
- en: '**2.**Chart junk: Is the visual clear of unnecessary visual elements so that
    the most important point can be made?'
  id: totrans-2642
  prefs: []
  type: TYPE_NORMAL
  zh: '**2.**图表垃圾：视觉元素是否清晰，没有不必要的视觉元素，以便能够表达最重要的观点？'
- en: '**3.**Title: Does the title of the chart convey the point being made with the
    chart?'
  id: totrans-2643
  prefs: []
  type: TYPE_NORMAL
  zh: '**3.**标题：图表的标题是否传达了图表所表达的观点？'
- en: 'Analysis Case 17.6: Charts'
  id: totrans-2644
  prefs: []
  type: TYPE_NORMAL
  zh: 分析案例17.6：图表
- en: 'Use the Right Chart: Does the type of chart being used match the level of judgment
    required?'
  id: totrans-2645
  prefs: []
  type: TYPE_NORMAL
  zh: 使用正确的图表：所使用的图表类型是否与所需的判断水平相匹配？
- en: Researchers have developed a useful scale for elementary perceptual tasks, which
    we apply to decide the type of graph that should be used for the level of accuracy
    desired. This functional scale tells us that the higher the encoding methods,
    the more accurate the comparison it facilitates. Linear charts such as bar charts,
    line charts, and scatterplots afford the highest level of accurate comparison.
    Charts like pie charts are good for general but not very accurate comparisons.
    They are better for encouraging other types of judgment, such as contributions
    to the whole. The least accurate, but still useful, are color scales used in coloring
    a map with data as in GIS plots. This should guide us to match the type of graph
    to use for the question being answered. Using this scale, we can ask the following
    questions. Is the right chart being used for the intended purpose? Does the visual
    use the right level of encoding for the level of accurate judgment desired?
  id: totrans-2646
  prefs: []
  type: TYPE_NORMAL
  zh: 研究人员已经开发了一个用于基本感知任务的有用量表，我们将它应用于决定应使用何种图表来满足所需的精度水平。这个功能量表告诉我们，编码方法越高，它所促进的比较就越准确。线性图表，如柱状图、折线图和散点图，提供了最高水平的准确比较。饼图适用于一般比较，但不是非常准确。它们更适合鼓励其他类型的判断，如整体贡献。最不准确但仍然有用的是在GIS图表中用于数据着色的颜色量表。这应该指导我们根据所回答的问题选择使用哪种图表类型。使用这个量表，我们可以提出以下问题。是否使用了正确的图表来达到预期的目的？视觉元素是否使用了适当的编码水平来满足所需的准确判断水平？
- en: 'Select the Chart Type Effectively: Does the chart type used match the business
    question being answered?'
  id: totrans-2647
  prefs: []
  type: TYPE_NORMAL
  zh: 有效选择图表类型：所使用的图表类型是否与所回答的业务问题相匹配？
- en: Consider answering a few basic questions in the use of the chart type that was
    selected. Are the charts answering the right business question? Does the chart
    match the business question being presented? Have the basic four chart types been
    used properly (bar, line, and pie charts, and scatterplot)? Each chart type is
    best suited to presenting answers to certain types of questions. For example,
    a Pareto bar chart is excellent for showing the 80/20 percent contributions for
    certain contributors. Pie charts are best for contributions to a whole. Match
    the point you are trying to make to the type of chart that suits that type of
    information best
  id: totrans-2648
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑回答一些关于所选图表类型的基本问题。图表是否回答了正确的问题？图表是否与所提出的问题相匹配？是否正确使用了基本的四种图表类型（柱状图、折线图、饼图和散点图）？每种图表类型最适合展示某些类型的问题的答案。例如，帕累托柱状图非常适合展示特定贡献者的80/20百分比贡献。饼图最适合展示整体贡献。将你试图表达的观点与最适合该类型信息的图表类型相匹配。
- en: 'Enhance Table Data for Emphasis: Are referenceable visuals (tables) readable
    with appropriate conditional formatting and thumbnail graphs used for emphasis?'
  id: totrans-2649
  prefs: []
  type: TYPE_NORMAL
  zh: 增强表格数据以强调：可参考的视觉元素（表格）是否可以通过适当的条件格式和缩略图图表进行强调而易于阅读？
- en: When using tables in our visuals, we must ask the following questions. Are we
    using the table to analyze or to tell? Is the use of referenceable or glanceable
    visual appropriate? Is the referenceable visual been designed to be legible and
    readable? Do the tables have enough white space? Has shading of the table been
    used appropriately and sparingly? Has the emphasis been appropriately added with
    conditional formatting? Have the thumbnail graphs, such as Sparklines, been employed
    to add insight?
  id: totrans-2650
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们在视觉元素中使用表格时，我们必须提出以下问题。我们是使用表格来分析还是来讲述？使用可参考或可快速浏览的视觉元素是否合适？可参考的视觉元素是否设计得易于阅读和识别？表格是否有足够的空白空间？表格的阴影是否被适当地和少量地使用？是否通过条件格式适当地添加了强调？是否使用了缩略图图表，如Sparklines，以增加洞察力？
- en: 'Case Analysis: Charts'
  id: totrans-2651
  prefs: []
  type: TYPE_NORMAL
  zh: 案例分析：图表
- en: 'Review the case study and the chart to be improved. Use this exercise to practice
    analyzing a chart along the Charts dimension. Make sure to use the analysis questions
    from the template, which are repeated below. After you have applied the three
    principles, you will be able to answer the following questions:'
  id: totrans-2652
  prefs: []
  type: TYPE_NORMAL
  zh: 审查要改进的案例研究和图表。使用这个练习来练习沿着图表维度分析图表。确保使用模板中的分析问题，这些问题如下重复。在你应用了三个原则之后，你将能够回答以下问题：
- en: What is wrong with the visual analyzed along these dimensions?
  id: totrans-2653
  prefs: []
  type: TYPE_NORMAL
  zh: 沿着这些维度分析的可视化有什么问题？
- en: What can be done to improve the visual along all these dimensions?
  id: totrans-2654
  prefs: []
  type: TYPE_NORMAL
  zh: 沿着所有这些维度可以做什么来改进可视化？
- en: '**1.**Right chart: Does the type of chart being used match the level of judgment
    required?'
  id: totrans-2655
  prefs: []
  type: TYPE_NORMAL
  zh: '**1.**正确的图表：所使用的图表类型是否与所需的判断水平相匹配？'
- en: '**2.**Selection: Does the chart type used match the business question being
    answered?'
  id: totrans-2656
  prefs: []
  type: TYPE_NORMAL
  zh: '**2.**选择：所使用的图表类型是否与要回答的业务问题相匹配？'
- en: '**3.**Tables: Are the referenceable visuals (tables) readable with appropriate
    conditional formatting and thumbnail graphs used for emphasis?'
  id: totrans-2657
  prefs: []
  type: TYPE_NORMAL
  zh: '**3.**表格：可引用的可视化（表格）是否使用适当的条件格式化和缩略图图表用于强调？'
- en: 'Analysis Case 17.7: Putting It All Together'
  id: totrans-2658
  prefs: []
  type: TYPE_NORMAL
  zh: 分析案例17.7：整合所有内容
- en: 'Create a new chart you will propose to your company to be used in place of
    the chart they were going to use. Do this without looking at the solution chart
    generated by an expert. Make sure your revised chart accomplishes the following:'
  id: totrans-2659
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个新的图表，你将向你的公司提议替换他们原本打算使用的图表。这样做时不要看专家生成的解决方案图表。确保你的修改后的图表能够实现以下目标：
- en: '**1.**It tells a “good” story.'
  id: totrans-2660
  prefs: []
  type: TYPE_NORMAL
  zh: '**1.**它讲述了一个“好”的故事。'
- en: '**2.**It can be used as a prop.'
  id: totrans-2661
  prefs: []
  type: TYPE_NORMAL
  zh: '**2.**它可以作为道具使用。'
- en: '**3.**It emulates traditional charts made by experts.'
  id: totrans-2662
  prefs: []
  type: TYPE_NORMAL
  zh: '**3.**它模仿了专家制作的传统图表。'
- en: '**4.**It makes a good sign.'
  id: totrans-2663
  prefs: []
  type: TYPE_NORMAL
  zh: '**4.**它是一个好的标志。'
- en: '**5.**It sends a strong signal.'
  id: totrans-2664
  prefs: []
  type: TYPE_NORMAL
  zh: '**5.**它发出了强烈的信号。'
- en: '**6.**It is functional, not artistic.'
  id: totrans-2665
  prefs: []
  type: TYPE_NORMAL
  zh: '**6.**它是实用的，而不是艺术的。'
- en: '**7.**It fulfills the organizational need.'
  id: totrans-2666
  prefs: []
  type: TYPE_NORMAL
  zh: '**7.**它满足了组织需求。'
- en: '**8.**It allows for audience biases and journeys.'
  id: totrans-2667
  prefs: []
  type: TYPE_NORMAL
  zh: '**8.**它允许观众有偏见和旅程。'
- en: '**9.**It answers a well-framed analytical question.'
  id: totrans-2668
  prefs: []
  type: TYPE_NORMAL
  zh: '**9.**它回答了一个精心构建的分析问题。'
- en: '**10.**The eye of the viewer is focused on the most important elements.'
  id: totrans-2669
  prefs: []
  type: TYPE_NORMAL
  zh: '**10.**观众的注意力集中在最重要的元素上。'
- en: '**11.**It employs proper Gestalt perception principles.'
  id: totrans-2670
  prefs: []
  type: TYPE_NORMAL
  zh: '**11.**它采用了适当的全景感知原则。'
- en: '**12.**It dispels viewer ignorance.'
  id: totrans-2671
  prefs: []
  type: TYPE_NORMAL
  zh: '**12.**消除观众的认知盲点。'
- en: '**13.**It uses color appropriately.'
  id: totrans-2672
  prefs: []
  type: TYPE_NORMAL
  zh: '**13.**它适当地使用了颜色。'
- en: '**14.**Is free of chart junk.'
  id: totrans-2673
  prefs: []
  type: TYPE_NORMAL
  zh: '**14.**无图表垃圾。'
- en: '**15.**It has an appropriate title.'
  id: totrans-2674
  prefs: []
  type: TYPE_NORMAL
  zh: '**15.**它有一个合适的标题。'
- en: '**16.**The chart type being used supports the level of judgment needed.'
  id: totrans-2675
  prefs: []
  type: TYPE_NORMAL
  zh: '**16.**所使用的图表类型支持所需的判断水平。'
- en: '**17.**The chart type you used matches the business question being answered.'
  id: totrans-2676
  prefs: []
  type: TYPE_NORMAL
  zh: '**17.**你使用的图表类型与要回答的业务问题相匹配。'
- en: '**18.**If there is a table, make sure it has the appropriate conditional formatting
    and thumbnail graphs for emphasis so that viewers can understand information quickly.'
  id: totrans-2677
  prefs: []
  type: TYPE_NORMAL
  zh: '**18.**如果有表格，确保它具有适当的条件格式化和缩略图图表以强调，以便观众可以快速理解信息。'
