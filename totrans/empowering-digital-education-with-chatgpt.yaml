- en: 7.1 Introduction
  id: totrans-1392
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 7.1 引言
- en: 7.1.1 Background and Significance of the Study
  id: totrans-1393
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 7.1.1 研究的背景和意义
- en: The integration of technology in higher education has been on the rise, and
    this trend is expected to continue in the future. “The learning landscape is a
    restless place. Constantly shifting and resettling, erupting, changing, evolving”
    ([Locker, 2009](#ch15.xhtml#r289), p. 139). The rapid growth of the incorporation
    of artificial intelligence (AI) in education (AIEd) has been noted by a significant
    body of research ([Alam & Mohanty, 2022](#ch15.xhtml#r263)). AI is spreading rapidly
    across various fields due to technological advancement and innovation. “AI refers
    to the ability of machines to perform tasks that are similar to those performed
    by the human brain, such as solving mathematical equations” ([Prajapati et al.,
    2024](#ch15.xhtml#r295), p. 2). Recently, AI has been changing the learning landscape
    of higher education, impacting teaching, learning, and research experiences. AIEd
    is transforming the learning environment, and in turn, the learning environment
    is shaping learners, creating a mutual influence that is highly unpredictable.
    Studies (Alam & Mohanty, 2022) have been exploring the implications of AI in education,
    as adaptive learning, smart campus, tutoring robots, virtual assistants, or generative
    AI models such as chatbots are being used in or outside classrooms. In response
    to barriers and challenges to learning, technology is usually perceived as a promising
    solution ([Wang, 2023](#ch15.xhtml#r311)). The need to adopt and adapt to technological
    developments has been widely recognized and voiced. [Hannan and Liu (2023)](#ch15.xhtml#r277)
    conducted a literature review that concluded that AI can be beneficially be applied
    to improving student learning experiences, providing educational support for learners,
    and improving the enrolment process. [Celik (2023)](#ch15.xhtml#r267) emphasized
    the impact of technology on higher education, expanding new opportunities for
    both instructors and students. Educational resources became more easily accessible
    and expanded the scope of higher education beyond traditional classroom environments
    ([Rawas, 2023](#ch15.xhtml#r297)). For example, online platforms and digital tools
    allow educators to engage with a wider audience and tailor their teaching methods
    to different learning styles. Moreover, students can access course materials remotely,
    enabling them to study at their own pace and overcome geographical barriers to
    education.
  id: totrans-1394
  prefs: []
  type: TYPE_NORMAL
  zh: 技术在高等教育中的整合一直在上升，并且预计这一趋势在未来将继续。 “学习景观是一个不安定的地方。不断变化和重新安置，爆发，变化，进化” ([洛克勒，2009](#ch15.xhtml#r289)，第139页)。
    教育中人工智能（AI）的快速整合引起了大量研究的注意 ([阿拉姆和莫汉蒂，2022](#ch15.xhtml#r263))。 由于技术进步和创新，AI正在迅速跨越各个领域。
    “AI指的是机器执行与人类大脑执行的任务相似的能力，例如解决数学方程式” ([普拉贾帕蒂等人，2024](#ch15.xhtml#r295)，第2页)。 最近，AI正在改变高等教育的学习景观，影响教学、学习和研究体验。
    AIEd正在改变学习环境，反过来，学习环境也在塑造学习者，形成一种高度不可预测的相互影响。 研究（阿拉姆和莫汉蒂，2022）正在探索AI在教育中的影响，因为自适应学习、智能校园、辅导机器人、虚拟助手或聊天机器人等生成AI模型正在课堂内外使用。
    为了应对学习和挑战，技术通常被视为一种有希望的解决方案 ([王，2023](#ch15.xhtml#r311))。 采纳和适应技术发展的必要性已被广泛认可和表达。
    [汉南和刘（2023）](#ch15.xhtml#r277) 进行了一项文献综述，得出结论认为，AI可以有益地应用于改善学生学习体验，为学习者提供教育支持，并改善招生过程。
    [塞利克（2023）](#ch15.xhtml#r267) 强调了技术对高等教育的影响，为教师和学生提供了新的机会。 教育资源变得更加容易获取，并扩大了高等教育范围，超越了传统的课堂环境
    ([拉瓦斯，2023](#ch15.xhtml#r297))。 例如，在线平台和数字工具允许教育工作者与更广泛的受众互动，并根据不同的学习风格调整他们的教学方法。
    此外，学生可以远程访问课程材料，使他们能够根据自己的节奏学习，并克服教育地理障碍。
- en: 7.1.2 Methodology
  id: totrans-1395
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 7.1.2 方法论
- en: This chapter’s methodology is based on literature review aiming to explore the
    integration of AI tools, particularly ChatGPT, in higher education. It examines
    studies, reports, and articles related to personalized learning, inclusivity,
    and the role of AI in addressing diverse learning needs. Through critical analysis,
    the chapter evaluates the features, limitations, and challenges associated with
    the identified works. Following this assessment, the study conducts a comparative
    analysis of existing implementations of ChatGPT in educational settings, categorizing
    them based on various criteria. This comparative study provides a comprehensive
    understanding of the current landscape of ChatGPT integration for personalized
    learning in higher education. Building on this knowledge, the chapter explores
    emerging trends, unresolved issues, and potential future research directions,
    aiming to contribute to the advancement of AI-driven personalized learning in
    higher education.
  id: totrans-1396
  prefs: []
  type: TYPE_NORMAL
  zh: 本章的研究方法基于文献综述，旨在探索AI工具，特别是ChatGPT在高等教育中的整合。它考察了与个性化学习、包容性和AI在解决多样化学习需求中的作用相关的学术研究、报告和文章。通过批判性分析，本章评估了所识别作品的相关特征、局限性和挑战。在此评估之后，该研究对现有教育环境中ChatGPT的实施进行了比较分析，并根据各种标准进行分类。这项比较研究为高等教育中个性化学习ChatGPT整合的现状提供了全面的理解。基于这一知识，本章探讨了新兴趋势、未解决的问题和潜在的未来研究方向，旨在为高等教育中AI驱动的个性化学习的发展做出贡献。
- en: 7.1.3 Chapter Organization
  id: totrans-1397
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 7.1.3 章节组织
- en: 'The rest of the chapter is organized as follows: [Section 7.2](#ch15.xhtml#h1-041)
    presents a comparison of natural language processing (NLP) and AI aiming to understand
    the functionality of NLP systems and exploring how AI systems process speech.
    [Section 7.3](#ch15.xhtml#h1-042) discusses the role of Chat Generative Pre-Trained
    Transformer Boot (ChatGPT) in education, while [Section 7.4](#ch15.xhtml#h1-043)
    addresses challenges and opportunities in implementing ChatGPT for education.
    [Sections 7.5](#ch15.xhtml#h1-044) and [7.6](#ch15.xhtml#h1-045) describe the
    role of ChatGPT in enhancing inclusivity, focusing on its impact on diverse learning
    needs within higher education, while [Section 7.7](#ch15.xhtml#h1-046) concludes
    the chapter and provides future directions for research.'
  id: totrans-1398
  prefs: []
  type: TYPE_NORMAL
  zh: 本章的其余部分组织如下：[第7.2节](#ch15.xhtml#h1-041)比较了自然语言处理（NLP）和人工智能（AI），旨在理解NLP系统的功能并探索AI系统如何处理语音。[第7.3节](#ch15.xhtml#h1-042)讨论了Chat
    Generative Pre-Trained Transformer Boot（ChatGPT）在教育中的作用，而[第7.4节](#ch15.xhtml#h1-043)则探讨了在教育中实施ChatGPT所面临的挑战和机遇。[第7.5节](#ch15.xhtml#h1-044)和[7.6节](#ch15.xhtml#h1-045)描述了ChatGPT在提高包容性方面的作用，重点关注其对高等教育中多样化学习需求的影响，而[第7.7节](#ch15.xhtml#h1-046)总结了本章内容，并为未来的研究方向提供了指导。
- en: 7.2 Natural Language Processing versus Artificial Intelligence
  id: totrans-1399
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 7.2 自然语言处理与人工智能的比较
- en: 'NLP is the intersection of AI and linguistics ([Khurana et al., 2023](#ch15.xhtml#r283)).
    As a subfield of AI, NLP comprises a set of techniques that enable a computer
    system to understand human speech ([Khurana et al., 2023](#ch15.xhtml#r283)).
    The origins of NLP can be traced back to the 1950s when the renowned English scientist
    Alan Turing published the article “Computing Machines and Intelligence”, introducing
    the “Turing Test” ([Turing, 1950](#ch15.xhtml#r309), [2012](#ch15.xhtml#r310)).
    One of its criteria is the machine’s capability to interpret and generate human
    speech automatically. According to Khurana et al. (2023), NLP can be categorized
    into two components: natural language understanding and natural language generation,
    encompassing tasks related to understanding and producing a text ([Khurana et
    al., 2023](#ch15.xhtml#r283)). Natural language understanding refers to linguistics,
    while natural language generation involves creating meaningful phrases, sentences,
    and paragraphs based on an internal representation ([Khurana et al., 2023](#ch15.xhtml#r283)).'
  id: totrans-1400
  prefs: []
  type: TYPE_NORMAL
  zh: 自然语言处理（NLP）是人工智能和语言学的交汇点（[Khurana等人，2023](#ch15.xhtml#r283)）。作为人工智能的一个子领域，NLP包括一系列技术，使计算机系统能够理解人类的语言（[Khurana等人，2023](#ch15.xhtml#r283)）。NLP的起源可以追溯到20世纪50年代，当时著名的英国科学家艾伦·图灵发表了文章《计算机与智能》，介绍了“图灵测试”（[图灵，1950](#ch15.xhtml#r309)，[2012](#ch15.xhtml#r310)）。其一项标准是机器自动解释和生成人类语言的能力。根据Khurana等人（2023）的研究，NLP可以分为两个组成部分：自然语言理解和自然语言生成，包括与理解和生成文本相关的任务（[Khurana等人，2023](#ch15.xhtml#r283)）。自然语言理解涉及语言学，而自然语言生成则涉及根据内部表示创建有意义的短语、句子和段落（[Khurana等人，2023](#ch15.xhtml#r283)）。
- en: AI, a ubiquitous term, is believed to have been modeled after the concept formulated
    by John McCarthy ([Chaka, 2022](#ch15.xhtml#r268)). Nowadays, serving as an integral
    part of our existence, AI is used to process data and make informed decisions.
    Some advantages of AI include its tirelessness, vast storage capabilities, rapid
    processing speed, accuracy, and accelerated reporting ([Kleebayoon & Wiwanitkit,
    2023](#ch15.xhtml#r284)).
  id: totrans-1401
  prefs: []
  type: TYPE_NORMAL
  zh: AI，一个无处不在的术语，据信是根据约翰·麦卡锡提出的概念构建的（[查卡，2022](#ch15.xhtml#r268)）。如今，作为我们存在的有机组成部分，AI用于处理数据和做出明智的决策。AI的一些优点包括其不知疲倦、巨大的存储能力、快速的处理速度、准确性和加速报告（[克莱贝约恩和维万尼特金，2023](#ch15.xhtml#r284)）。
- en: NLP-based systems give the impression of understanding the user’s messages,
    creating an illusion of comprehension. However, in reality, the program does not
    delve into the essence of the dialogue. There were no significant breakthroughs
    in NLP over the following decades until the emergence of the first machine learning
    algorithms in the 1980s ([Langley, 2011](#ch15.xhtml#r285)).
  id: totrans-1402
  prefs: []
  type: TYPE_NORMAL
  zh: 基于自然语言处理（NLP）的系统给人一种理解用户信息的印象，创造了一种理解的错觉。然而，实际上，程序并没有深入对话的本质。在接下来的几十年里，自然语言处理没有取得重大突破，直到20世纪80年代出现了第一批机器学习算法（[兰利，2011](#ch15.xhtml#r285)）。
- en: The turning point in language processing started with the emergence of deep
    learning algorithms ([Rouast et al., 2021](#ch15.xhtml#r300)). Many advancements
    that emerged during this time, including chatbots, autocorrect systems, and voice
    assistants, continue to be utilized today. These challenges are frequently tackled
    using recurrent neural networks.
  id: totrans-1403
  prefs: []
  type: TYPE_NORMAL
  zh: 语言处理的关键转折点始于深度学习算法的出现（[鲁阿斯特等，2021](#ch15.xhtml#r300)）。在此期间出现的许多进步，包括聊天机器人、自动纠错系统和语音助手，至今仍在使用。这些挑战通常使用循环神经网络来解决。
- en: 7.2.1 How Do NLP Systems Work?
  id: totrans-1404
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 7.2.1 自然语言处理系统是如何工作的？
- en: To answer this question, it is crucial to understand how humans use natural
    language – a complex mechanism involving several simultaneous processes, such
    as perception, understanding the meaning and triggering and producing verbal behavior
    to convey messages. Perception is the process of translating a sensory signal
    into symbolic form [Miller and Johnson-Laird (1976](#ch15.xhtml#r292)). Understanding
    the meaning is quite challenging, as numerous misunderstandings and, at times,
    significant conflicts can emerge due to a lack of context and the misinterpretation
    of phrases.
  id: totrans-1405
  prefs: []
  type: TYPE_NORMAL
  zh: 要回答这个问题，理解人类如何使用自然语言至关重要——这是一个涉及多个同时进行的复杂机制，如感知、理解意义、触发和产生言语行为以传达信息。感知是将感官信号转换为符号形式的过程
    [米勒和约翰逊-莱尔德（1976](#ch15.xhtml#r292)）。理解意义相当具有挑战性，因为由于缺乏上下文和对短语的误解，可能会出现许多误解，有时甚至会出现重大的冲突。
- en: Verbal behavior, or the response generated in a typical communication experience,
    is an outcome of a decision. It involves generating a range of potential verbal
    and non-verbal behaviors based on the meaning of the perceived phrase, context,
    and, potentially, some subjective experiences ([Skinner, 1986](#ch15.xhtml#r302)).
    NLP algorithms work on similar principles. The perception process implies coding
    the incoming information into a machine-readable set of symbols. While generating
    a reaction (answer, response), it is the result of a decision from a set of possible
    answers based on weighing alternatives and comparing the results with each other
    ([Taye, 2023](#ch15.xhtml#r307)). However, understanding is a more complex matter,
    which should be considered separately.
  id: totrans-1406
  prefs: []
  type: TYPE_NORMAL
  zh: 语言行为，或典型沟通体验中产生的反应，是决策的结果。它涉及根据感知短语的意义、上下文以及潜在的某些主观经验生成一系列可能的言语和非言语行为（[斯金纳，1986](#ch15.xhtml#r302)）。自然语言处理算法基于类似的原则工作。感知过程意味着将传入的信息编码成一组机器可读的符号。在生成反应（答案、回应）时，它是基于权衡各种选择并将结果相互比较后从可能的答案中做出决策的结果（[泰耶，2023](#ch15.xhtml#r307)）。然而，理解是一个更复杂的问题，应该单独考虑。
- en: 7.2.2 So, How Do AI Systems Understand Speech?
  id: totrans-1407
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 7.2.2 那么，AI系统是如何理解语音的？
- en: 'Currently, the following types of analysis are commonly employed to solve language
    understanding issues: statistical, formal-grammatical, and neural network. Comprehending
    speech involves various analytical approaches, commonly categorized into statistical,
    formal-grammatical, and neural network methods ([Khurana et al., 2023](#ch15.xhtml#r283)).
    “Natural language understanding enables machines to understand natural language
    and analyse it by extracting concepts, entities, emotion, keywords etc.” ([Khurana
    et al., 2023](#ch15.xhtml#r283), p. 3715). Additionally, AI can be classified
    based on different criteria, as outlined in [Table 7.1](#ch15.xhtml#t17).'
  id: totrans-1408
  prefs: []
  type: TYPE_NORMAL
  zh: 目前，以下类型的分析通常用于解决语言理解问题：统计的、形式-语法的和神经网络。理解语音涉及各种分析方法，通常分为统计的、形式-语法的和神经网络方法([Khurana等人，2023)](#ch15.xhtml#r283))。“自然语言理解使机器能够通过提取概念、实体、情感、关键词等来理解并分析自然语言。”([Khurana等人，2023)](#ch15.xhtml#r283)，第3715页)。此外，人工智能可以根据不同的标准进行分类，如[表7.1](#ch15.xhtml#t17)中概述。
- en: '[Table 7.1](#ch15.xhtml#t17b) Classification of artificial intelligence'
  id: totrans-1409
  prefs: []
  type: TYPE_NORMAL
  zh: '[表7.1](#ch15.xhtml#t17b) 人工智能分类'
- en: '| **Criteria** | **AI** |'
  id: totrans-1410
  prefs: []
  type: TYPE_TB
  zh: '| **标准** | **人工智能** |'
- en: '| --- | --- |'
  id: totrans-1411
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- |'
- en: '| According to its technology | *Data-driven* (or machine learning) *Knowledge-based*
    (or symbolic AI) *Hybrid AI* (which combines data- and knowledge- based approaches
    with human cognition) ([Sánchez & Lama, 2011)](#ch15.xhtml#r301). |'
  id: totrans-1412
  prefs: []
  type: TYPE_TB
  zh: '| 根据其技术 | *数据驱动*（或机器学习）*基于知识*（或符号人工智能）*混合人工智能*（结合数据、知识方法与人类认知）([Sánchez & Lama,
    2011)](#ch15.xhtml#r301). |'
- en: '| According to capability | *Narrow or Weak AI* (focused on a specific task,
    employing a “learning” algorithm that adjusts its parameters based on training
    data. It lacks mental and cognitive abilities but demonstrates a higher efficiency
    in task performance compared to a human). *General or Strong AI* (capable of replicating
    human abilities such as learning, understanding, reasoning, decision-making, consciousness,
    and emotions. To the best of our knowledge, all existing AI systems, at this point,
    are considered weak). |'
  id: totrans-1413
  prefs: []
  type: TYPE_TB
  zh: '| 根据能力 | *窄或弱人工智能*（专注于特定任务，采用“学习”算法，根据训练数据调整其参数。它缺乏心理和认知能力，但与人类相比，在任务执行效率上更高）。*通用或强人工智能*（能够复制人类能力，如学习、理解、推理、决策、意识、情感。据我们所知，目前所有现有的AI系统都被认为是弱人工智能）。|'
- en: '*Source:* [Kapustina et al. (2023](#ch15.xhtml#r280)).'
  id: totrans-1414
  prefs: []
  type: TYPE_NORMAL
  zh: '*来源:* [Kapustina等人（2023）](#ch15.xhtml#r280)).'
- en: AI systems understand speech through a process called natural language understanding.
    This process consists of various computational techniques that enable machines
    to interpret and analyze human language. These techniques include (i) speech recognition,
    which involves algorithms to convert spoken language into text; (ii) language
    parsing, when AI systems analyze the grammatical structure and syntax of the language
    to understand its meaning; (iii) semantic analysis, which involves identifying
    relationships between words and extracting key concepts or entities mentioned
    in the text; (iv) contextual understanding, possible if AI systems take into account
    the broader context in which language is used to infer meaning; and (v) machine
    learning, which allows AI systems to improve their understanding of speech over
    time through machine learning algorithms. By analyzing extensive speech data,
    AI models can learn to recognize patterns and make more accurate predictions about
    the meaning of natural language. Overall, AI systems understand speech by combining
    these techniques to interpret the linguistic content, context, and intent behind
    speech.
  id: totrans-1415
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能系统通过自然语言理解的过程来理解语音。这个过程包括各种计算技术，使机器能够解释和分析人类语言。这些技术包括（i）语音识别，涉及将口语语言转换为文本的算法；（ii）语言解析，当人工智能系统分析语言的语法结构和句法以理解其含义；（iii）语义分析，涉及识别词语之间的关系，提取文本中提到的关键概念或实体；（iv）上下文理解，如果人工智能系统考虑到语言使用的更广泛背景，则可能推断出含义；（v）机器学习，它允许人工智能系统通过机器学习算法随着时间的推移提高对语音的理解。通过分析大量的语音数据，AI模型可以学会识别模式，并对自然语言的含义做出更准确的预测。总的来说，人工智能系统通过结合这些技术来解释语音的语言内容、上下文和意图。
- en: 7.3 Chat Generative Pre-Trained Transformer Boot
  id: totrans-1416
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 7.3 聊天生成预训练转换器
- en: Recently, there has been a surge in the release of large generative AI models,
    marking another revolution in NLP systems. A significant milestone occurred in
    2019 when OpenAI introduced the Generative Pre-Trained Transformer 2, or GPT-2,
    language model. Unlike previous generators, this neural network demonstrated the
    capability to generate lengthy strings of coherent text, answer questions, compose
    poetry, and even create new recipes. ChatGPT, an AI language model developed by
    OpenAI in San Francisco, CA, represents a remarkable advancement in this domain.
    It is engineered to process, comprehend, analyze, and interpret user inquiries,
    generating responses based on its programming and training. Released on November
    30, 2022, ChatGPT boasts the ability to provide human-like answers to a diverse
    array of questions, owing to its extensive training on a vast knowledge database.
    One of the key reasons for its widespread popularity is its accessibility, being
    freely available to users. Functioning as a conversational and highly sophisticated
    chatbot, ChatGPT “mimics natural language and addresses cognitive challenges by
    reinforcing learning from online resources through human feedback” ([Howard et
    al., 2023](#ch15.xhtml#r279), p. 405). Continuously updating its knowledge base,
    ChatGPT utilizes a pre-trained transformer architecture to enhance its text-based
    responses to user prompts and inquiries.
  id: totrans-1417
  prefs: []
  type: TYPE_NORMAL
  zh: 最近，大型生成式 AI 模型的发布激增，标志着自然语言处理系统领域的又一次革命。2019 年，OpenAI 推出了生成预训练转换器 2，或 GPT-2
    语言模型，这是一个重要的里程碑。与之前的生成器不同，这个神经网络展示了生成长串连贯文本、回答问题、创作诗歌甚至创造新食谱的能力。ChatGPT 是由位于加利福尼亚州旧金山的
    OpenAI 开发的一种 AI 语言模型，代表了该领域的重大进步。它被设计用来处理、理解、分析和解释用户查询，并根据其编程和训练生成回答。2022 年 11
    月 30 日发布的 ChatGPT 能够提供类似人类的答案来回答各种问题，这得益于其在广泛的知识数据库上的训练。其广泛受欢迎的关键原因之一是其易用性，它对用户免费开放。作为一个对话式且高度复杂的聊天机器人，ChatGPT
    “模仿自然语言，通过人类反馈强化从在线资源中学习，以解决认知挑战” ([Howard 等人，2023](#ch15.xhtml#r279)，第 405 页)。ChatGPT
    通过持续更新其知识库，利用预训练的转换器架构来增强其对用户提示和查询的基于文本的回答。
- en: ChatGPT claims its ability to learn and adapt to new situations and contexts
    as needed. [Stokel-Walker and van Noorden (2023)](#ch15.xhtml#r304) discussed
    the use of ChatGPT in science, while additional research has investigated its
    application in medical contexts ([Howard et al., 2023](#ch15.xhtml#r279)). The
    chatbot can assist students in researching and developing checklists for academic
    essays or research projects. The output can be regenerated, edited, recombined,
    or utilized with the ideas provided by the AI. However, at this point, ChatGPT
    responses are sometimes unreliable, generating false responses. This limitation
    is attributed to the learning model used, based on statistical patterns of language
    from online texts, leading to false, biased, incorrect, or outdated information
    or specifically specialized content with limited data for training ([Stokel-Walker
    & Van Noorden, 2023](#ch15.xhtml#r304)), or misunderstandings of context and meaning.
    [Lund and Wang (2023)](#ch15.xhtml#r291) emphasized the drawbacks of ChatGPT,
    including high training costs, requirements for large amounts of data and computational
    resources, and challenges in implementation for certain organizations and individuals.
  id: totrans-1418
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT 声称其能够根据需要学习和适应新的情况和环境。[Stokel-Walker 和 van Noorden (2023)](#ch15.xhtml#r304)
    讨论了 ChatGPT 在科学领域的应用，而其他研究则探讨了其在医疗环境中的应用 ([Howard 等人，2023](#ch15.xhtml#r279))。该聊天机器人可以帮助学生研究和开发学术论文或研究项目的清单。输出内容可以被再生、编辑、重新组合或利用
    AI 提供的想法。然而，目前 ChatGPT 的回答有时不可靠，会生成错误回答。这种局限性归因于所使用的基于在线文本语言统计模式的训练学习模型，导致错误、有偏见、不正确或过时的信息，或者特定领域内容的数据有限，用于训练
    ([Stokel-Walker & Van Noorden, 2023](#ch15.xhtml#r304))，或者对上下文和意义的误解。[Lund 和 Wang
    (2023)](#ch15.xhtml#r291) 强调了 ChatGPT 的缺点，包括高昂的训练成本、对大量数据和计算资源的需求，以及某些组织和个人在实施方面面临的挑战。
- en: The integration of ChatGPT into higher education is relatively recent. Consequently,
    many teachers struggle to find effective methods for incorporating AI into education
    to facilitate learning for their students and motivate them. Recent applications
    of ChatGPT in higher education include its utilization for essay writing ([Zhai,
    2023](#ch15.xhtml#r312)), guiding research activities ([Ratnam et al., 2023](#ch15.xhtml#r296)),
    and serving as a tool to foster complex thinking ([Romero-Rodríguez et al., 2023](#ch15.xhtml#r299)).
    ChatGPT can also assist in drafting legal contracts, lecture notes, poetry, and
    computer code, among other tasks, wowing users with its flexibility, although
    not all of its output is accurate and creative.
  id: totrans-1419
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT融入高等教育是相对较新的。因此，许多教师努力寻找有效的方法将人工智能融入教育，以促进学生的学习和激励他们。ChatGPT在高等教育中的近期应用包括用于论文写作([Zhai，2023](#ch15.xhtml#r312))、指导研究活动([Ratnam等人，2023](#ch15.xhtml#r296))和作为培养复杂思维的工具([Romero-Rodríguez等人，2023](#ch15.xhtml#r299))。ChatGPT还可以协助起草法律合同、讲义、诗歌和计算机代码等任务，尽管其输出的并非所有内容都准确且富有创意，但它的灵活性仍然让用户惊叹。
- en: Despite these advancements, it’s crucial to acknowledge the limitations of AI
    within academia and teaching. AI, including ChatGPT, cannot perform certain academic
    tasks, including creative activities, such as inventing new courses or teaching
    methods ([Dempere et al., 2023](#ch15.xhtml#r270)). ChatGPT is efficient for providing
    instant feedback, developing individualized learning paths, saving time in research,
    generating background information, and solving basic problems. However, AI lacks
    the capacity for interpersonal interactions integral to education, such as counseling,
    providing personalized feedback, and resolving individual student issues ([Dempere
    et al., 2023](#ch15.xhtml#r270)). Kashyap and ChatGPT OpenAI (2023) considers
    that ChatGPT can alleviate the workload of teachers, allowing them to focus more
    on inclusive tasks such as offering specialized support, leading discussions,
    and mentoring activities. Moreover, [Prajapati et al. (2024)](#ch15.xhtml#r295)
    highlighted ChatGPT’s remarkable capability to handle activities that are beyond
    the capacity of human intellect, emphasizing its potential to revolutionize various
    fields through advanced automation and problem-solving prowess.
  id: totrans-1420
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管有这些进步，但承认人工智能在学术界和教学中的局限性至关重要。人工智能，包括ChatGPT，无法执行某些学术任务，包括创造性活动，如发明新的课程或教学方法（[Dempere等人，2023](#ch15.xhtml#r270)）。ChatGPT在提供即时反馈、开发个性化学习路径、节省研究时间、生成背景信息和解决基本问题方面效率很高。然而，人工智能缺乏教育中不可或缺的人际互动能力，如咨询、提供个性化反馈和解决个别学生问题（[Dempere等人，2023](#ch15.xhtml#r270)）。Kashyap和ChatGPT
    OpenAI（2023）认为，ChatGPT可以减轻教师的负担，使他们能够更多地专注于提供专门支持、引导讨论和指导活动等包容性任务。此外，[Prajapati等人（2024）](#ch15.xhtml#r295)强调了ChatGPT处理超出人类智力能力活动的能力，强调其通过高级自动化和解决问题的能力有可能革命性地改变各个领域。
- en: Understanding both the benefits and limitations of AI in higher education is
    crucial for ensuring a balanced and effective learning environment. Other concerns
    raised by educators include the issue of passive information consumption and cheating
    in exams or other research activities. ChatGPT can easily lead to a read-only
    environment, and the teacher still plays a crucial role in providing a virtual
    space for active engagement in learning. [Fryer et al. (2017)](#ch15.xhtml#r273)
    examined the impact of chatbots on students’ engagement and learning outcomes,
    revealing a significant decrease in students’ task interest when interacting with
    a chatbot compared to a human partner.
  id: totrans-1421
  prefs: []
  type: TYPE_NORMAL
  zh: 理解人工智能在高等教育中的利弊对于确保平衡和有效的学习环境至关重要。教育工作者提出的其他问题包括被动信息消费和考试或其他研究活动中的作弊问题。ChatGPT很容易导致只读环境，而教师在提供虚拟空间以促进学习的积极参与方面仍发挥着关键作用。[Fryer等人（2017）](#ch15.xhtml#r273)研究了聊天机器人对学生参与和学习成果的影响，发现与人类伙伴相比，在与聊天机器人互动时学生的任务兴趣显著下降。
- en: AI technologies are becoming the subject of active discussion among participants
    in the educational process as an effective tool for customizing education in universities.
    Many technological innovations undergo what is commonly referred to as “Gartner’s
    hype cycles” – distinct stages in their market development. Despite initial optimistic
    forecasts, a considerable number of innovations may ultimately fall short of realizing
    their full development potential ([Linden & Fenn, 2003](#ch15.xhtml#r288)). In
    the context of higher education, fostering open and collaborative discussions
    becomes paramount for optimizing the integration of technology into teaching and
    learning. This participatory approach ensures that the diverse needs and perspectives
    of stakeholders, including educators and students, are considered, thereby enhancing
    the effectiveness of technology-enabled educational initiatives.
  id: totrans-1422
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能技术在大学教育过程中正成为参与者积极讨论的主题，作为一种定制教育的有效工具。许多技术创新经历了通常所说的“Gartner的炒作周期”——它们市场发展的不同阶段。尽管最初乐观的预测，但相当多的创新最终可能无法实现其全部的发展潜力
    ([Linden & Fenn, 2003](#ch15.xhtml#r288))。在高等教育背景下，培养开放和协作的讨论对于优化技术融入教学和学习至关重要。这种参与式方法确保了包括教育者和学生在内的利益相关者的多样性和观点得到考虑，从而提高了技术支持的教育活动的有效性。
- en: 7.4 Implementing ChatGPT for Customized Education in Higher Education Settings
  id: totrans-1423
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 7.4 在高等教育环境中实施ChatGPT进行定制教育
- en: Recently, more and more studies have focused on examining the impact of ChatGPT
    in education by exploring its use in ensuring personalized learning in higher
    education ([Rawas, 2023](#ch15.xhtml#r297)). This chapter develops understandings
    of some of the key controversies linked to the incorporation of ChatGPT in teaching
    and learning in universities and in shifting from traditional teacher-centered
    learning approaches to more student-centered pedagogies ([Alt, 2023](#ch15.xhtml#r264)).
  id: totrans-1424
  prefs: []
  type: TYPE_NORMAL
  zh: 最近，越来越多的研究开始关注通过探索其在确保高等教育中个性化学习中的应用来检验ChatGPT在教育中的影响 ([Rawas, 2023](#ch15.xhtml#r297))。本章探讨了与在大学中融入ChatGPT进行教学和学习以及从传统的以教师为中心的学习方法转向更以学生为中心的教学法相关的一些关键争议
    ([Alt, 2023](#ch15.xhtml#r264))。
- en: Over the past two decades, the student population has diversified, encompassing
    school graduates, full-time and part-time students, retirees pursuing master’s
    and postgraduate degrees, as well as students with disabilities. Notably, the
    pandemic has underscored the value of hybrid and fully remote learning options,
    leading to an increased preference for remote study and work among students. In
    this context, the personalized approach has also become central for universities.
    However, adult teaching and learning is a particular process, and the need to
    understand personalization as a process tailoring education to each individual
    learner has to take into consideration not only their specific needs and capabilities
    but also their motivations, experiences, and goals in pursuing a specific study
    program. Some key components of personalized learning, highlighting the various
    elements that contribute to tailoring instruction and experiences to meet the
    individual needs of each student, can be visualized in [Figure 7.1](#ch15.xhtml#f16).
    It provides an overview of the key components of personalized learning, highlighting
    how instruction, content, pace, experiences, and technology contribute to creating
    tailored learning experiences for each student.
  id: totrans-1425
  prefs: []
  type: TYPE_NORMAL
  zh: 过去二十年里，学生群体已经多元化，包括学校毕业生、全日制和非全日制学生、追求硕士学位和研究生学位的退休人员，以及残疾学生。值得注意的是，疫情凸显了混合和完全远程学习选项的价值，导致学生对远程学习和工作的偏好增加。在这种情况下，个性化方法也已成为大学的核心。然而，成人教学和学习是一个特殊的过程，理解个性化作为调整教育以适应每个个别学习者的过程，必须考虑他们的具体需求和能力，以及他们在追求特定学习计划中的动机、经验和目标。个性化学习的一些关键组成部分，突出各种有助于调整教学和经验以满足每个学生个别需求的元素，可以在[图7.1](#ch15.xhtml#f16)中可视化。它概述了个性化学习的关键组成部分，突出了教学、内容、节奏、经验和技术如何为每个学生创造定制的学习体验。
- en: '![An infographic titled features of adaptive learning systems consists of four
    boxes in a row titled content, tasks, interaction, and feedback and assessment.
    Each box contains descriptions.](html/images/9781032716084_C007_001.jpg)'
  id: totrans-1426
  prefs: []
  type: TYPE_IMG
  zh: '![一个名为自适应学习系统特征的图表，由四排标题为内容、任务、互动和反馈与评估的盒子组成。每个盒子包含描述。](html/images/9781032716084_C007_001.jpg)'
- en: '[Figure 7.1](#ch15.xhtml#f16b) Personalized learning features.'
  id: totrans-1427
  prefs: []
  type: TYPE_NORMAL
  zh: '[图7.1](#ch15.xhtml#f16b) 个性化学习功能。'
- en: Understanding the diverse backgrounds and life experiences of adult learners
    is crucial in designing educational programs that effectively cater to their unique
    circumstances and enhance their overall learning experience.
  id: totrans-1428
  prefs: []
  type: TYPE_NORMAL
  zh: 理解成年学习者的多元背景和生活经历对于设计能够有效满足他们独特情况并提升他们整体学习体验的教育项目至关重要。
- en: Personalization enables the integration of students as active participants in
    the educational process by considering diverse student needs, including different
    learning abilities and backgrounds, and implementing inclusive strategies to ensure
    equal access to resources and opportunities. With personalized learning, educational
    modules become highly adapted to each student. In [Table 7.2](#ch15.xhtml#t18),
    key features of a personalized learning approach in higher education are presented,
    emphasizing the importance of adaptability, technological integration, data-driven
    decision-making, and the strengthening collaboration and student autonomy in learning.
  id: totrans-1429
  prefs: []
  type: TYPE_NORMAL
  zh: 个性化学习通过考虑不同学生的需求，包括不同的学习能力和背景，并实施包容性策略以确保资源和平等机会的平等获取，使学生成为教育过程中的积极参与者。在个性化学习中，教育模块高度适应每个学生。在[表7.2](#ch15.xhtml#t18)中，展示了高等教育个性化学习方法的要点，强调了适应性、技术整合、数据驱动决策以及加强学习和学生自主性的重要性。
- en: '[Table 7.2](#ch15.xhtml#t18b) Key features of personalized learning approach
    in higher education'
  id: totrans-1430
  prefs: []
  type: TYPE_NORMAL
  zh: '[表7.2](#ch15.xhtml#t18b) 高等教育个性化学习方法的要点'
- en: '| **Area** | **Key Features** |'
  id: totrans-1431
  prefs: []
  type: TYPE_TB
  zh: '| **领域** | **关键特征** |'
- en: '| --- | --- |'
  id: totrans-1432
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- |'
- en: '| Flexibility in learning paths | • Customizing learning paths based on specific
    educational needs • Customizing training format (classroom, mixed, remote) • Integrating
    various learning styles • Providing choices of academic disciplines and content
    within those discipline |'
  id: totrans-1433
  prefs: []
  type: TYPE_TB
  zh: '| 学习路径的灵活性 | • 根据具体教育需求定制学习路径 • 定制培训格式（课堂、混合、远程） • 整合各种学习风格 • 在学科内提供学术学科和内容的选择
    |'
- en: '| Adaptive content and resources | • Customizing educational materials to match
    students’ proficiency levels and learning styles • Integrating multimedia, interactive
    content, and real-world examples • Selecting the complexity level and duration
    of academic subjects • Having the opportunity to study disciplines individually
    (not on a fixed schedule) • Free access to educational materials at any time |'
  id: totrans-1434
  prefs: []
  type: TYPE_TB
  zh: '| 适应性内容和资源 | • 根据学生的熟练程度和学习风格定制教育材料 • 整合多媒体、互动内容和现实世界案例 • 选择学术主题的复杂程度和持续时间
    • 有机会单独学习学科（而非固定时间表） • 任何时间都可以免费访问教育材料 |'
- en: '| Technology integration | • Utilizing adaptive learning platforms and technologies
    • Incorporating online resources, simulations, and virtual environments |'
  id: totrans-1435
  prefs: []
  type: TYPE_TB
  zh: '| 技术整合 | • 利用适应性学习平台和技术 • 结合在线资源、模拟和虚拟环境 |'
- en: '| Data-driven decision-making | • Collecting and analyzing student performance
    data for continuous improvement • Implementation of predictive analytics to identify
    areas for intervention |'
  id: totrans-1436
  prefs: []
  type: TYPE_TB
  zh: '| 数据驱动决策 | • 收集和分析学生表现数据以持续改进 • 实施预测分析以确定干预领域 |'
- en: '| Collaborative learning opportunities | • Encouraging self-directed learning
    and goal setting • Providing choices in assignments, projects, and assessment
    methods • Integrating collaborative projects and group activities • Using online
    forums and social learning platforms to facilitate peer interaction • Having a
    personal mentor (tutor) |'
  id: totrans-1437
  prefs: []
  type: TYPE_TB
  zh: '| 协作学习机会 | • 鼓励自主学习与目标设定 • 在作业、项目和评估方法上提供选择 • 整合协作项目和团队活动 • 利用在线论坛和社会学习平台促进同伴互动
    • 拥有个人导师（辅导教师） |'
- en: '| Feedback and assessment | • Providing regular and timely feedback on student
    progress • Implementing formative assessments to guide ongoing learning |'
  id: totrans-1438
  prefs: []
  type: TYPE_TB
  zh: '| 反馈和评估 | • 提供关于学生进展的定期及时反馈 • 实施形成性评估以指导持续学习 |'
- en: '| Faculty support and training | • Providing professional development for educators
    to offer personalized learning paths • Ensuring support systems for faculty to
    implement and manage personalized learning effectively |'
  id: totrans-1439
  prefs: []
  type: TYPE_TB
  zh: '| 教师支持和培训 | • 为教育工作者提供专业发展，以提供个性化学习路径 • 确保教师支持系统以有效实施和管理个性化学习 |'
- en: Universities are actively seeking innovative ways to customize learning content,
    educational technologies, and academic and career support to match the group and
    individual educational needs of their students. Personalization is a pervasive
    trend that extends across every facet of the student experience ([Grant & Basye,
    2014](#ch15.xhtml#r276)). Personalized learning in higher education means crafting
    an individual educational path done by the student in close collaboration with
    a mentor. Higher education allows for a dynamic and responsive educational experience
    that adapts to the evolving needs of each learner.
  id: totrans-1440
  prefs: []
  type: TYPE_NORMAL
  zh: 大学正在积极寻求创新的方法来定制学习内容、教育技术和学术及职业支持，以满足学生的群体和个体教育需求。个性化是一个普遍的趋势，贯穿于学生体验的各个方面（[Grant
    & Basye, 2014](#ch15.xhtml#r276)）。高等教育中的个性化学习意味着学生与导师紧密合作，制定个性化的教育路径。高等教育允许提供动态和响应式的教育体验，以适应每个学习者的不断变化的需求。
- en: In a personalized learning environment, the role of educators extends beyond
    content delivery. Mentors play a crucial role in understanding the strengths,
    challenges, and motivations of each student ([Colvin & Ashman, 2010](#ch15.xhtml#r269);
    [Lankau & Scandura, 2002](#ch15.xhtml#r286)). This deeper understanding enables
    mentors to provide targeted guidance, support, and resources, fostering not only
    academic growth but also the development of critical skills such as problem-solving,
    creativity, and self-directed learning ([Benbow et al., 2021](#ch15.xhtml#r266)).
  id: totrans-1441
  prefs: []
  type: TYPE_NORMAL
  zh: 在个性化的学习环境中，教育者的角色超越了内容传递。导师在理解每个学生的优势、挑战和动机方面发挥着至关重要的作用（[Colvin & Ashman, 2010](#ch15.xhtml#r269);
    [Lankau & Scandura, 2002](#ch15.xhtml#r286)）。这种更深入的理解使导师能够提供有针对性的指导、支持和资源，不仅促进学术成长，还培养诸如问题解决、创造力和自主学习等关键技能（[Benbow
    et al., 2021](#ch15.xhtml#r266)）。
- en: As personalized learning gains prominence in higher education, it challenges
    institutions to rethink traditional structures and embrace innovation. Teachers
    play a crucial role, not only in sharing fundamental knowledge but also in cultivating
    students’ abilities to learn continuously, promoting the concept of lifelong learning
    ([Baran et al., 2011](#ch15.xhtml#r265)).
  id: totrans-1442
  prefs: []
  type: TYPE_NORMAL
  zh: 随着个性化学习在高等教育中的日益突出，它挑战着机构重新思考传统结构并拥抱创新。教师不仅要在分享基本知识方面发挥关键作用，还要培养学生的持续学习能力，促进终身学习的理念（[Baran
    et al., 2011](#ch15.xhtml#r265)）。
- en: Summing up the impact of personalized learning, it is important to highlight
    its positive effects on students’ educational and professional development. Increased
    flexibility in selecting subjects, reduced student-to-teacher ratios, and heightened
    availability of extracurricular activities collectively contribute to increasing
    both student satisfaction levels and overall academic success. The opportunity
    for subject choices empowers students to tailor their academic path, aligning
    it with their interests and career aspirations. With smaller student-to-teacher
    ratios, learners benefit from more personalized attention, fostering a beneficial
    environment for meaningful engagement and individualized support. Additionally,
    extracurricular activities, including various internships, research projects,
    and practical application of knowledge, enhance the holistic educational experience,
    providing students with opportunities for personal growth and competence development.
  id: totrans-1443
  prefs: []
  type: TYPE_NORMAL
  zh: 总结个性化学习的影响，重要的是要强调其对学生的教育和职业发展的积极影响。在科目选择上的灵活性增加、师生比例降低以及课外活动的丰富性提高，共同促进了学生满意度的提升和整体学术成功的增加。科目选择的机会使学生能够根据自己的兴趣和职业抱负调整学术路径。师生比例的降低使学习者能够获得更多个性化的关注，营造一个有益的参与和个性化支持的环境。此外，包括各种实习、研究项目和知识实践在内的课外活动，增强了全面的教育体验，为学生提供了个人成长和技能发展的机会。
- en: 7.5 Implementing ChatGPT for Customized Education in Higher Education Settings
  id: totrans-1444
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 7.5 在高等教育环境中实施ChatGPT进行个性化教育
- en: The effective utilization of digital learning platforms in higher education,
    accentuated by the 2019 pandemic, has advanced in recent years, resulting in a
    substantial body of research ([Lehmann et al., 2022](#ch15.xhtml#r287)). Technology
    takes precedence over traditional teaching methodologies. This shift is marked
    by an increasing reliance on advanced educational technologies, including AI and
    big data analytics ([Luan et al., 2020](#ch15.xhtml#r290)). New technologies play
    a pivotal role in tailoring educational experiences to individual students, facilitating
    access to personalized content, and providing data-driven insights into learning
    progress. The effective integration of technology serves as a valuable tool to
    enhance, rather than replace, the vital connection between educators and learners
    in the pursuit of personalized and effective education.
  id: totrans-1445
  prefs: []
  type: TYPE_NORMAL
  zh: 由于2019年的大流行，高等教育中数字学习平台的有效利用近年来取得了进展，导致大量研究产生([Lehmann等人，2022](#ch15.xhtml#r287))。技术优于传统教学方法。这种转变以对先进教育技术（包括人工智能和大数据分析）的日益依赖为标志([Luan等人，2020](#ch15.xhtml#r290))。新技术在为个别学生量身定制教育体验、促进个性化内容获取以及提供学习进度数据驱动洞察方面发挥着关键作用。技术的有效整合作为一项宝贵工具，旨在增强而非取代教育工作者与学习者之间在追求个性化有效教育过程中至关重要的联系。
- en: As a tool for personalized education, ChatGPT can work as an assistant supporting
    learners to achieve specific results. Its flexibility, availability, and fast
    processing of a large amount of data allow this technology to be in great demand,
    despite the fact that the model still makes serious mistakes ([Dempere et al.,
    2023](#ch15.xhtml#r270)).
  id: totrans-1446
  prefs: []
  type: TYPE_NORMAL
  zh: 作为个性化教育的工具，ChatGPT可以作为助手支持学习者实现特定目标。其灵活性、可用性和对大量数据的快速处理能力使得这项技术需求旺盛，尽管该模型仍然存在严重的错误([Dempere等人，2023](#ch15.xhtml#r270))。
- en: 'ChatGPT has the capacity to revolutionize higher education by introducing various
    opportunities for students, educators, and institutions. Recent studies have explored
    several promising prospects offered by ChatGPT in higher education ([Elbanna &
    Armstrong, 2024](#ch15.xhtml#r271); [Gill et al., 2024](#ch15.xhtml#r275); [Mogavi
    et al., 2024](#ch15.xhtml#r293)):'
  id: totrans-1447
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT通过为学生、教育工作者和机构提供各种机会，有能力革命性地改变高等教育。最近的研究探讨了ChatGPT在高等教育中提供的几个有希望的展望([Elbanna
    & Armstrong，2024](#ch15.xhtml#r271); [Gill等人，2024](#ch15.xhtml#r275); [Mogavi等人，2024](#ch15.xhtml#r293))：
- en: '*Accessible Learning Materials:* ChatGPT can convert text into alternative
    formats such as audio or braille, ensuring accessibility for students with visual
    impairments.'
  id: totrans-1448
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*可访问的学习材料：* ChatGPT可以将文本转换为音频或盲文等替代格式，确保视觉障碍学生的可访问性。'
- en: '*Personalized Learning Paths*: ChatGPT can adapt learning materials and provide
    customized support based on the individual learning needs and preferences of students
    with disabilities.'
  id: totrans-1449
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*个性化学习路径：* ChatGPT可以根据残疾学生的个别学习需求和偏好调整学习材料并提供定制化支持。'
- en: '*Assistive Communication:* ChatGPT can serve as an assistive communication
    tool for students with speech or language disabilities, aiding in verbal interactions
    and expression.'
  id: totrans-1450
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*辅助沟通：* ChatGPT可以作为言语或语言障碍学生的辅助沟通工具，帮助进行口头交流和表达。'
- en: '*Simplified Instructions:* ChatGPT can simplify instructions and assignments,
    making them more understandable for students with cognitive or learning disabilities.'
  id: totrans-1451
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*简化指令：* ChatGPT可以简化指令和作业，使认知或学习障碍的学生更容易理解。'
- en: '*Academic Support:* ChatGPT can offer academic assistance and tutoring tailored
    to the specific challenges faced by students with disabilities, promoting academic
    success.'
  id: totrans-1452
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*学术支持：* ChatGPT可以提供针对残疾学生面临的特定挑战的学术援助和辅导，促进学术成功。'
- en: '*Inclusive Classroom Participation:* ChatGPT can facilitate participation in
    classroom discussions and group activities, ensuring inclusivity for students
    with disabilities.'
  id: totrans-1453
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*包容性课堂参与：* ChatGPT可以促进课堂讨论和小组活动中的参与，确保残疾学生的包容性。'
- en: '[Figure 7.2](#ch15.xhtml#f17) illustrates the primary opportunities identified.'
  id: totrans-1454
  prefs: []
  type: TYPE_NORMAL
  zh: '[图7.2](#ch15.xhtml#f17)展示了确定的主要机会。'
- en: '![An infographic titled opportunities of Chat G P T in higher education for
    students with disabilities. It lists 6 points numbered from 1 to 6 as follows.
    1. Accessible learning materials. 2. Personalized learning paths. 3. Assistive
    communication. 4. Simplified instructions. 5. Academic support. 6. Inclusive classroom
    participants.](html/images/9781032716084_C007_002.jpg)'
  id: totrans-1455
  prefs: []
  type: TYPE_IMG
  zh: '![一个名为“Chat G P T 在高等教育中为残疾学生提供的机会”的信息图。它列出了从1到6的6个要点如下。1. 可访问的学习材料。2. 个性化学习路径。3.
    辅助沟通。4. 简化说明。5. 学术支持。6. 包容的课堂参与者。](html/images/9781032716084_C007_002.jpg)'
- en: '[Figure 7.2](#ch15.xhtml#f17b) Opportunities provided by ChatGPT in higher
    education for students with disabilities.'
  id: totrans-1456
  prefs: []
  type: TYPE_NORMAL
  zh: '[图7.2](#ch15.xhtml#f17b) ChatGPT在高等教育中为残疾学生提供的机会。'
- en: 'Despite its practical application, implementing ChatGPT (and AI tools more
    broadly) in learning processes can pose challenges, particularly concerning academic
    outcomes. It is essential to discern and evaluate the genuine learning outcomes
    derived from such processes and to effectively assess the acquired knowledge ([Rezaev
    & Tregubova, 2023](#ch15.xhtml#r298)). Before incorporating ChatGPT as a supportive
    tool in learning, students must possess specific foundational skills, including
    metacognitive skills, creative thinking, and flexibility. Although ChatGPT was
    not explicitly designed for higher education, its applicability extends to various
    educational domains ([Rezaev & Tregubova, 2023](#ch15.xhtml#r298); [Su & Yang,
    2023](#ch15.xhtml#r306)). Here are a few illustrative examples:'
  id: totrans-1457
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管ChatGPT（以及更广泛的AI工具）在学习过程中的应用具有实用性，但其实施可能会带来挑战，尤其是在学术成果方面。重要的是要辨别和评估从这些过程中获得的真正学习成果，并有效地评估所获得的知识
    ([Rezaev & Tregubova，2023](#ch15.xhtml#r298))。在将ChatGPT作为学习中的辅助工具之前，学生必须具备特定的基础技能，包括元认知技能、创造性思维和灵活性。尽管ChatGPT并非专为高等教育设计，但其适用性扩展到各种教育领域
    ([Rezaev & Tregubova，2023](#ch15.xhtml#r298); [Su & Yang，2023](#ch15.xhtml#r306))。以下是一些说明性的例子：
- en: Use of ChatGPT in assisting the creation of chatbots aimed at aiding foreign
    language learning, providing students with a platform to enhance their speaking
    skills and acquire new lexical units ([Hong, 2023](#ch15.xhtml#r278); [Mukarto,
    2023](#ch15.xhtml#r294)).
  id: totrans-1458
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用ChatGPT协助创建旨在帮助外语学习的聊天机器人，为学生提供一个平台来提高他们的口语技能和获取新的词汇单元 ([Hong，2023](#ch15.xhtml#r278);
    [Mukarto，2023](#ch15.xhtml#r294))。
- en: Efficient tool for automatic text summarization, enabling students to effectively
    summarize lengthy texts. This is particularly beneficial for students preparing
    for exams or engaging in pilot studies, as well as for students with specific
    learning disorders who struggle with reading and comprehending long texts, which
    are common in university study programs ([Kasneci et al., 2023](#ch15.xhtml#r282)).
  id: totrans-1459
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 自动文本摘要的高效工具，使学生能够有效地总结长篇文章。这对于准备考试或参与试点研究的学生以及有特定学习障碍的学生尤其有益，这些学生难以阅读和理解长篇文章，这在大学学习计划中很常见
    ([Kasneci 等人，2023](#ch15.xhtml#r282))。
- en: Useful tools for assisting students in essay or thesis writing ([Fitria, 2023](#ch15.xhtml#r272);
    Tira Nur, 2023). These language models can generate topics, ideas, plans, and
    even complete essays based on user input. For students, ChatGPT addresses the
    common challenge of facing “blank pages” and provides assistance in initiating
    coursework and dissertation text.
  id: totrans-1460
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 有用的工具，帮助学生撰写论文或论文 ([Fitria，2023](#ch15.xhtml#r272); Tira Nur，2023)。这些语言模型可以根据用户输入生成主题、想法、计划，甚至完整的论文。对于学生来说，ChatGPT解决了面对“空白页”的常见挑战，并在启动课程工作和论文文本方面提供帮助。
- en: '“Study buddy” function: ChatGPT can be utilized to create a comprehensive system
    for answering questions related to the course of study, helping students prepare
    for exams and tests ([Fulk et al., 2022](#ch15.xhtml#r274)). This feature is especially
    beneficial for students with disabilities, as it allows them to review the study
    material at their own pace, without feeling pressured or rushed.'
  id: totrans-1461
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “学习伙伴”功能：ChatGPT可以被用来创建一个综合系统，用于回答与学习课程相关的问题，帮助学生准备考试和测试 ([Fulk 等人，2022](#ch15.xhtml#r274))。这一功能对于有残疾的学生尤其有益，因为它允许他们以自己的节奏复习学习材料，而不会感到压力或匆忙。
- en: '[Kapustina et al. (2023)](#ch15.xhtml#r280) outlined various other applications
    of ChatGPT in education, including:'
  id: totrans-1462
  prefs: []
  type: TYPE_NORMAL
  zh: '[Kapustina 等人 (2023)](#ch15.xhtml#r280) 概述了ChatGPT在教育中各种其他应用，包括：'
- en: facilitating creativity by providing a framework for further work;
  id: totrans-1463
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过提供一个进一步工作的框架来促进创造力；
- en: assisting in initiating and/or optimizing editorial tasks;
  id: totrans-1464
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 协助启动和/或优化编辑任务；
- en: practicing critical thinking, which involves systematically evaluating the content
    and relevance of provided answers;
  id: totrans-1465
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 练习批判性思维，这涉及到系统地评估提供的答案的内容和相关性；
- en: supporting the preparation of individualized training by analyzing tasks and
    proposing adapted training materials;
  id: totrans-1466
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过分析任务并提出适应性的培训材料来支持个性化培训的准备；
- en: assisting in lesson planning by aiding in the drafting of educational plans
    and inclusive activities.
  id: totrans-1467
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过协助起草教育计划和包容性活动来协助课程规划。
- en: However, it is essential to acknowledge certain limitations when utilizing chatbots.
    Firstly, ChatGPT is constrained by a lack of information on events and phenomena
    post-2021\. Moreover, caution is warranted when employing ChatGPT in educational
    settings due to the potential generation of inappropriate content. Like many AI
    technologies, ChatGPT is a product of the data on which it is trained. Consequently,
    there exists a risk of generating responses that may be inappropriate or offensive
    when interacting with students. If the training data for ChatGPT carries biases,
    such as stereotypes, or reflects a particular historical narrative, these may
    inadvertently be perpetuated in its responses.
  id: totrans-1468
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，在利用聊天机器人时，承认某些局限性是至关重要的。首先，ChatGPT受限于对2021年之后事件和现象的信息不足。此外，在将ChatGPT应用于教育环境时需要谨慎，因为可能产生不适当的内容。像许多人工智能技术一样，ChatGPT是其训练数据的产品。因此，在与学生互动时，存在生成可能不适当或冒犯性的回答的风险。如果ChatGPT的训练数据包含偏见，如刻板印象或反映特定的历史叙述，这些偏见可能会无意中在其回答中延续。
- en: In the pursuit of integrating AI into the educational process, university professors
    can apply ChatGPT for content creation for classes by generating educational materials
    ([Rezaev & Tregubova, 2023](#ch15.xhtml#r298)). Rather than investing substantial
    time in crafting content from scratch, ChatGPT can initiate the process by generating
    a preliminary project, which can then be refined and edited by professors along
    with their students. Another use of ChatGPT is in assisting teachers in the organization
    of exams and tests by providing support in formulating and screening questions.
  id: totrans-1469
  prefs: []
  type: TYPE_NORMAL
  zh: 在追求将人工智能融入教育过程的过程中，大学教授可以通过使用ChatGPT来生成课程内容，从而为课程创建教育材料（[Rezaev & Tregubova,
    2023](#ch15.xhtml#r298)）。ChatGPT可以首先生成一个初步项目，然后由教授及其学生进行修改和完善。ChatGPT的另一个用途是协助教师组织考试和测试，通过提供制定和筛选问题的支持。
- en: '7.6 Enhancing Inclusivity: ChatGPT’s Role in Higher Education'
  id: totrans-1470
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 7.6 提高包容性：ChatGPT在高等教育中的作用
- en: UNESCO ([Steven, 2021](#ch15.xhtml#r303)) established the following recommendations
    for governments and stakeholders in incorporating AI in education, such as (i)
    identifying opportunities and addressing challenges posed by AI technologies;
    (ii) supporting the development of new models facilitated by AI; (iii) providing
    education and training services where the benefits clearly outweigh the risks
    and utilize AI tools to create lifelong learning systems that enable personalized
    learning anytime and anywhere for everyone; (iv) using AI technologies to empower
    teachers rather than replacing them and developing appropriate capacity-building
    programs to enable teachers to work alongside AI systems; (v) promoting the fair
    and inclusive use of AI, regardless of social or economic status, ethnic or cultural
    background, or geographical location, with particular attention to gender equality,
    while ensuring ethical, transparent, and verifiable use of data in education.
    Based on these recommendations, universities are exploring solutions to incorporate
    AI technology to ensure a more inclusive and equitable environment for their students.
  id: totrans-1471
  prefs: []
  type: TYPE_NORMAL
  zh: 联合国教科文组织（[Steven, 2021](#ch15.xhtml#r303)）为政府及教育领域的利益相关者制定了以下关于将人工智能融入教育的建议，例如：（i）识别人工智能技术带来的机遇和挑战；（ii）支持由人工智能促进的新模型的发展；（iii）在明显利大于弊的情况下提供教育和培训服务，利用人工智能工具创建终身学习系统，使每个人都能在任何时间、任何地点进行个性化学习；（iv）使用人工智能技术赋予教师权力而不是取代他们，并开发适当的能力建设计划，使教师能够与人工智能系统协同工作；（v）促进人工智能的公平和包容使用，无论社会或经济地位、种族或文化背景，或地理位置如何，特别关注性别平等，同时确保在教育中使用数据的道德、透明和可验证性。基于这些建议，大学正在探索将人工智能技术融入以确保为他们的学生提供一个更加包容和公平的环境的解决方案。
- en: ChatGPT can help students avoid common mistakes when studying and identify potential
    areas of interest, based on the results demonstrated during training in previous
    courses/modules. Since modern AI technologies have made significant progress in
    facial recognition, educators can have real-time access to information and tools
    that objectively measure student engagement in learning here and now.
  id: totrans-1472
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT可以帮助学生在学习时避免常见的错误，并根据之前课程/模块训练中展示的结果，识别潜在的感兴趣领域。由于现代人工智能技术在面部识别方面取得了显著进展，教育工作者可以实时获取信息和工具，以客观地衡量学生在当前学习中的参与度。
- en: 'Studies ([Fitria, 2023](#ch15.xhtml#r272); [Kapustina et al., 2023](#ch15.xhtml#r280);
    [Kasneci et al., 2023](#ch15.xhtml#r282); [Sánchez & Lama, 2011](#ch15.xhtml#r301);
    Tira Nur, 2023) identified some practical options for using ChatGPT in teaching.
    It can be used to:'
  id: totrans-1473
  prefs: []
  type: TYPE_NORMAL
  zh: 研究们（[Fitria, 2023](#ch15.xhtml#r272)；[Kapustina et al., 2023](#ch15.xhtml#r280)；[Kasneci
    et al., 2023](#ch15.xhtml#r282)；[Sánchez & Lama, 2011](#ch15.xhtml#r301)；Tira
    Nur, 2023）确定了使用ChatGPT进行教学的某些实用选项。它可以用于：
- en: generate a large number of discussion topics that encourage students to be critical
    and problem solvers;
  id: totrans-1474
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 生成大量鼓励学生批判性和解决问题的讨论话题；
- en: design quizzes and assessments, providing instant feedback tailored to the needs
    and goals of each student, based on past learning behavior;
  id: totrans-1475
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 设计测验和评估，根据过去的学习行为提供针对每个学生需求和目标的即时反馈；
- en: design differentiated tasks adapted to the needs and abilities of each student;
  id: totrans-1476
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 设计适应每个学生需求和能力的差异化任务；
- en: create educational activities tailored to the needs and abilities of each student;
  id: totrans-1477
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 创建满足每个学生需求和能力的定制教育活动；
- en: convert educational content into visual materials such as posters or infographics;
  id: totrans-1478
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将教育内容转换为视觉材料，如海报或信息图表；
- en: develop a glossary of terms and definitions related to the curriculum or training
    unit;
  id: totrans-1479
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 开发与课程或培训单元相关的术语和定义词汇表；
- en: support students in exam preparation by designing self-assessment tools, such
    as tables or checklists, that help students evaluate their own work;
  id: totrans-1480
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过设计自我评估工具（如表格或清单），帮助学生评估自己的工作，以支持学生的考试准备。
- en: provide professional development activities to help teachers improve their skills
    in using data effectively;
  id: totrans-1481
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提供专业发展活动，帮助教师提高有效使用数据的能力；
- en: generate ideas for teaching strategies based on the analysis of data collected
    during teaching hours;
  id: totrans-1482
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 根据教学时间收集的数据分析，生成教学策略的想法；
- en: summarize lecture notes, assignments, or written tests;
  id: totrans-1483
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 概括讲义、作业或书面测试；
- en: 'organize study time: schedules for schoolwork, homework, and other activities.'
  id: totrans-1484
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 安排学习时间：学校作业、家庭作业和其他活动的日程安排。
- en: ChatGPT is an efficient tool for studying and personalizing learning. Teachers
    and students can co-create educational programs adapted to their level of knowledge
    and needs. Furthermore, an AI-based assistant is able to collect and analyze the
    student’s answers, identify and explain errors in detail, which contributes to
    a deeper understanding of the study material. Its popularity can be explained
    by the game approach; it can be prompted to use elements of games to create fun
    and interesting learning experiences that will keep students motivated and engaged.
  id: totrans-1485
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT是学习和个性化学习的有效工具。教师和学生可以共同创建适应他们知识水平和需求的教育计划。此外，基于人工智能的助手能够收集和分析学生的答案，详细识别和解释错误，这有助于对学习材料有更深入的理解。其受欢迎程度可以归因于游戏方法；它可以被提示使用游戏元素来创造有趣和有趣的学习体验，这将保持学生的动力和参与度。
- en: 7.7 Conclusion and Future Directions for Research
  id: totrans-1486
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 7.7 结论和研究未来方向
- en: This chapter presents the results of a literature review aimed at investigating
    the effectiveness of using ChatGPT as a tool to assist students and teachers in
    learning and teaching. The goal was to contribute to the existing literature on
    the use of AIEd and its potential to improve student engagement, critical thinking,
    and learning outcomes.
  id: totrans-1487
  prefs: []
  type: TYPE_NORMAL
  zh: 本章介绍了文献综述的结果，旨在调查使用ChatGPT作为辅助学生和教师学习和教学的工具的有效性。目标是贡献于现有关于AIEd的使用及其提高学生参与度、批判性思维和学习成果潜力的文献。
- en: In conclusion, this chapter has provided an in-depth examination of the technology
    behind ChatGPT, a highly sophisticated chatbot that has gained significant attention
    in recent years ([Lund & Wang, 2023](#ch15.xhtml#r291)). It can easily and quickly
    offer answers to various questions, transform content, summarize, convert notes
    into text, generate content, messages, letters, or emails, draft legal contracts,
    design research studies, formulate hypotheses, propose research methodologies,
    offer ideas and alternative approaches, translate, generate code, and probably
    this is only the beginning. The promise of tools like ChatGPT is quite exciting
    and could have a profound impact on society. At the same time, their true potential
    will have to be tested in the real world.
  id: totrans-1488
  prefs: []
  type: TYPE_NORMAL
  zh: 总结来说，本章深入探讨了ChatGPT背后的技术，这是一个高度复杂的聊天机器人，近年来受到了广泛关注([Lund & Wang, 2023](#ch15.xhtml#r291))。它能够轻松快速地回答各种问题，转换内容，总结，将笔记转换为文本，生成内容、消息、信件或电子邮件，起草法律合同，设计研究项目，制定假设，提出研究方法，提供想法和替代方案，翻译，生成代码，而这可能只是开始。ChatGPT等工具的承诺非常令人兴奋，可能会对社会产生深远的影响。同时，它们在现实世界中的真正潜力还需要经过检验。
- en: Through an examination of its capabilities and potential applications, it has
    been demonstrated that ChatGPT offers a wide range of functionalities, from providing
    quick answers to questions to generating content and assisting with various tasks
    such as drafting legal contracts and formulating research methodologies. The versatility
    of ChatGPT presents exciting opportunities for enhancing teaching and learning
    experiences.
  id: totrans-1489
  prefs: []
  type: TYPE_NORMAL
  zh: 通过对其能力和潜在应用的研究，已经证明ChatGPT提供了一系列功能，从提供快速答案到生成内容，以及协助各种任务，如起草法律合同和制定研究方法。ChatGPT的通用性为提升教学和学习体验提供了令人兴奋的机会。
- en: However, there are certain risks associated with using ChatGPT in human activities
    in general and in education in particular. While these tools offer rapid advancements
    and tireless learning capabilities, questions remain about their impact on human
    activity, particularly in the realm of education. Concerns arise regarding the
    pace at which AI tools can improve their performance compared to humans and the
    implications of this advancement for traditional teaching methods. Rapid future
    developments are anticipated, leveraging robust storage capabilities and tireless
    learning capabilities. Moreover, ethical considerations must be carefully addressed
    when implementing AI in higher education. Issues such as data privacy, algorithmic
    bias, and equitable access to educational resources require careful attention
    to ensure that AI technologies are deployed responsibly and ethically. However,
    questions remain unanswered, and time will reveal their solutions. What does the
    future hold for chatbots in education? If AI tools can learn, how quickly can
    they enhance their performance compared to humans? Does this pose a threat? What
    are the advantages and limitations of employing AI in higher education? How can
    AI contribute to improving student learning outcomes? What ethical considerations
    need to be addressed when integrating AI into higher education? Time will determine
    whether ChatGPT and other AI technologies are part of the solution or part of
    the problem.
  id: totrans-1490
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，在人类活动，尤其是教育领域使用ChatGPT存在一定的风险。虽然这些工具提供了快速进步和不懈的学习能力，但关于它们对人类活动，特别是在教育领域的影响，仍存在疑问。人们担忧AI工具提高性能的速度与人类相比，以及这种进步对传统教学方法的影响。预计未来将会有快速的发展，利用强大的存储能力和不懈的学习能力。此外，在高等教育中实施AI时，必须仔细考虑伦理问题。诸如数据隐私、算法偏见和公平获取教育资源等问题需要仔细关注，以确保AI技术负责任和道德地部署。然而，仍有一些问题尚未得到解答，时间将揭示它们的解决方案。教育中聊天机器人的未来会怎样？如果AI工具能够学习，它们与人类相比提高性能的速度有多快？这会构成威胁吗？在高等教育中采用AI的优势和局限性是什么？AI如何有助于提高学生的学习成果？在将AI整合到高等教育中时，需要解决哪些伦理问题？时间将决定ChatGPT和其他AI技术是解决方案的一部分还是问题的一部分。
- en: Ultimately, the future of chatbots like ChatGPT in education remains uncertain
    and will depend on how these tools are integrated into educational practices and
    the extent to which they can effectively enhance student learning outcomes. Despite
    its practical implications in education and research, ChatGPT has serious limitations,
    these include challenges in answering questions with specific wording and a lack
    of quality control, which may result in erroneous responses, as noted by [Strzelecki
    (2023)](#ch15.xhtml#r305). Continued research and evaluation will be essential
    to determine whether AI technologies like ChatGPT are indeed the solution to educational
    challenges or pose new problems that need to be addressed.
  id: totrans-1491
  prefs: []
  type: TYPE_NORMAL
  zh: 最终，像ChatGPT这样的聊天机器人在教育中的未来仍然不确定，这取决于这些工具如何融入教育实践以及它们在多大程度上能够有效提升学生的学习成果。尽管ChatGPT在教育和研究中的实际应用具有重要意义，但它也存在严重的局限性，包括在回答特定措辞的问题时的挑战以及缺乏质量控制，这可能导致错误答案，正如Strzelecki
    (2023)所指出的。持续的研究和评估对于确定像ChatGPT这样的AI技术是否确实是教育挑战的解决方案，或者是否提出了需要解决的新问题至关重要。
