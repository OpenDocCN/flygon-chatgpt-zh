- en: '****Inst**ructio**n-****ba**sed** ****Prom**ptin**g , ****o**r** ****Inst**ructio**n-****Ba**sed**
    ****Prom**ptin**g , ****i**s** ****a**** ****pr**omp**t ****engi**neerin**g ****tech**niqu**e
    ****wh**ere** ****t**he** ****L**LM** ****i**s** ****gi**ven** ****spe**cifi**c
    ****a**nd** ****det**aile**d ****inst**ructio**ns ****o**n** ****wh**at** ****t**o**
    ****d**o**, ****h**ow** ****t**o** ****res**pon**d, ****a**nd** ****wh**at** ****info**rmatio**n
    ****t**o** ****inc**lud**e ****o**r** ****exc**lud**e. ****I**n** ****th**is**
    ****me**tho**d, ****t**he** ****mo**del** ****i**s** ****gu**ide**d ****st**ep**-****b**y**-****st**ep**
    ****wi**th** ****exp**lici**t ****inst**ructio**ns ****th**at** ****cle**arl**y
    ****gu**ide** ****i**t** ****thr**oug**h ****t**he** ****requ**este**d ****ta**sk**.'
  id: totrans-264
  prefs: []
  type: TYPE_NORMAL
  zh: '**基于指令的提示**，或**基于指令的提示**，是一种**提示工程**技术，其中LLM被给予关于**做什么**、**如何响应**以及**包含或排除哪些信息**的**具体和详细**的指令。在这种方法中，模型通过明确的指令**逐步**引导，这些指令清晰地指导它完成所需的任务。'
- en: '****Th**is** ****tech**niqu**e ****i**s** ****us**efu**l ****t**o** ****en**sur**e
    ****th**at** ****t**he** ****an**swe**r ****pro**vide**d ****fol**low**s ****t**he**
    ****us**er**''****s**** ****dire**ction**s ****exa**ctl**y, ****wit**hou**t ****ambi**guit**y.
    ****T**he** ****L**LM** ****rec**eive**s ****cl**ear** ****guid**eline**s, ****su**ch**
    ****a**s** "****exp**lai**n ****bri**efl**y", "****li**st** ****on**ly** ****t**he**
    ****ben**efit**s", ****o**r** "****u**se** ****re**al**-****li**fe** ****exa**mple**s".'
  id: totrans-265
  prefs: []
  type: TYPE_NORMAL
  zh: '**这种技术**有助于**确保**提供的**答案****精确**地遵循用户的**指示**，**没有**歧义。LLM接收**清晰**的**指南**，例如“**简要解释**”、“**仅列出好处**”或“**使用真实生活例子**”。'
- en: '[****Wh**at** ****i**s** ****yo**ur** ****ma**in** ****obje**ctiv**e ]'
  id: totrans-266
  prefs: []
  type: TYPE_NORMAL
  zh: '[**你的主要目标是什么**]'
- en: '****T**he** ****ma**in** ****obje**ctiv**e ****o**f** ****Inst**ructio**n-****ba**sed**
    ****Prom**ptin**g ****i**s** ****ab**out** ****get**tin**g ****cons**isten**t
    ****a**nd** ****acc**urat**e ****resp**onse**s ****b**y** ****sha**pin**g ****t**he**
    ****L**LM** ****ou**tpu**t ****t**o** ****en**sur**e ****i**t** ****fol**low**s
    ****t**he** ****inst**ructio**ns ****gi**ven** ****exa**ctl**y. ****Th**is** ****he**lps**
    ****re**duc**e ****unce**rtaint**y ****a**nd** ****ma**ke** ****t**he** ****mo**del**''****s****
    ****beh**avio**r ****mo**re** ****pred**ictabl**e, ****ev**en** ****ac**ros**s
    ****va**rie**d ****to**pic**s.'
  id: totrans-267
  prefs: []
  type: TYPE_NORMAL
  zh: '**基于指令的提示**的主要目标是**获取**一致且准确的**响应**，通过**调整**LLM的**输出**以确保它**精确**地遵循给出的**指令**。这有助于**减少**不确定性，并使**模型**的行为更加**可预测**，即使在**不同**的主题上也是如此。'
- en: '****Ano**the**r ****go**al** ****i**s** ****t**o** ****imp**rov**e ****t**he**
    ****effi**cienc**y ****o**f** ****t**he** ****L**LM**’****s**** ****res**pons**e
    ****b**y** ****gui**din**g ****i**t** ****i**n** ****h**ow** ****i**t** ****sh**oul**d
    ****pro**ces**s ****a**nd** ****stru**ctur**e ****t**he** ****info**rmatio**n.
    ****Det**aile**d ****inst**ructio**ns ****c**an** ****he**lp** ****i**t** ****ach**iev**e
    ****exa**ctl**y ****wh**at** ****i**s** ****exp**ecte**d, ****whe**the**r ****i**t**
    ****i**s** ****a**** ****sh**ort**, ****straig**htforwa**rd ****expl**anatio**n
    ****o**r** ****a**** ****lo**ng**, ****det**aile**d ****ana**lysi**s. ****Th**is**
    ****i**s** ****us**efu**l ****f**or** ****achi**evin**g ****diff**eren**t ****le**vel**s
    ****o**f** ****comp**lexit**y ****a**s** ****ne**ede**d.'
  id: totrans-268
  prefs: []
  type: TYPE_NORMAL
  zh: '**另一个**目标是**提高**LLM的**响应**效率，通过**指导**它如何**处理**和**结构化**信息来实现。详细的**指令**可以帮助它精确地实现预期的结果，无论是**简短**、**直接**的解释，还是**详细**的分析。这对于实现不同复杂程度的**不同**需求是有用的。'
- en: '[****H**ow** ****i**t** ****wo**rks** ]'
  id: totrans-269
  prefs: []
  type: TYPE_NORMAL
  zh: '[**它是如何工作的**]'
- en: '****Inst**ructio**n-****ba**sed** ****Prom**ptin**g ****wo**rks** ****b**y**
    ****bre**akin**g ****t**he** ****req**ues**t ****in**to** ****cl**ear**, ****spe**cifi**c
    ****pa**rts**. ****T**he** ****us**er** ****gi**ves** ****t**he** ****L**LM**
    ****a**** ****se**rie**s ****o**f** ****det**aile**d ****inst**ructio**ns ****th**at**
    ****i**t** ****mu**st** ****fo**llo**w ****t**o** ****gen**erat**e ****t**he**
    ****exp**ecte**d ****res**pons**e. ****T**he** ****inst**ructio**ns ****c**an**
    ****spe**cif**y ****t**he** ****to**ne** (****fo**rma**l, ****inf**orma**l), ****st**yle**
    (****expl**anator**y, ****enum**erativ**e), ****a**nd** ****t**he** ), ****o**r**
    ****ev**en** ****t**he** ****con**ten**t (****inc**lud**e ****exa**mple**s, ****av**oid**
    ****ja**rgo**n, ****e**tc**.).'
  id: totrans-270
  prefs: []
  type: TYPE_NORMAL
  zh: '**基于指令的提示**通过**将**请求**分解**为**清晰、具体的**部分来工作。用户向LLM提供一系列**详细**的**指令**，它必须遵循这些指令来生成预期的**响应**。指令可以**指定**语气（**正式**、**非正式**）、风格（**解释性**、**列举性**）以及内容（**包括例子**、**避免术语**等）。'
- en: '****F**or** ****exa**mpl**e, ****t**he** ****us**er** ****mi**ght** ****a**sk**,
    "****Exp**lai**n ****t**he** ****pro**ces**s ****o**f** ****photo**synthes**is
    ****i**n** ****a**** ****sh**ort** ****sen**tenc**e ****a**nd** ****wit**hou**t
    ****us**ing** ****tech**nica**l ****te**rms**." ****Th**is** ****spe**cifi**c
    ****inst**ructio**n ****gu**ide**s ****t**he** ****mo**del** ****o**n** ****h**ow**
    ****t**o** ****gen**erat**e ****t**he** ****an**swe**r. ****T**he** ****dire**ction**s
    ****pro**vide**d ****t**o** ****t**he** ****L**LM** ****he**lp** ****t**o** ****av**oid**
    ****ans**wer**s ****th**at** ****a**re** ****t**oo** ****br**oad**, ****impr**ecis**e,
    ****o**r** ****o**ut** ****o**f** ****t**he** ****des**ire**d ****con**tex**t.'
  id: totrans-271
  prefs: []
  type: TYPE_NORMAL
  zh: '**例如，用户可能会要求**，“用简短的句子解释光合作用的过程，并且不使用技术术语。”这个具体的指令指导模型如何生成答案。提供给LLM的指示有助于避免过于宽泛、不精确或脱离所需上下文的答案。'
- en: '****Th**is** ****tech**niqu**e ****req**uire**s ****th**at** ****t**he** ****inst**ructio**ns
    ****b**e** ****cl**ear** ****a**nd** ****di**rec**t. ****T**he** ****mo**re**
    ****det**aile**d ****t**he** ****inst**ructio**ns ****a**re**, ****t**he** ****mo**re**
    ****li**kel**y ****t**he** ****L**LM** ****wi**ll** ****b**e** ****ab**le** ****t**o**
    ****fo**llo**w ****exa**ctl**y ****wh**at** ****i**s** ****be**ing** ****as**ked**.
    ****Th**is** ****app**roac**h ****m**ay** ****inc**lud**e ****n**ot** ****on**ly**
    ****t**he** ****con**ten**t ****o**f** ****t**he** ****an**swe**r, ****b**ut**
    ****al**so** ****h**ow** ****i**t** ****sh**oul**d ****b**e** ****pres**ente**d,
    ****e****.****g****., "****li**st** ****i**n** ****bu**lle**t ****po**int**s",
    "****u**se** ****exa**mple**s ****fr**om** ****eve**ryda**y ****u**se**", ****e**tc**.'
  id: totrans-272
  prefs: []
  type: TYPE_NORMAL
  zh: '**这种技术要求指令清晰且直接**。指令越详细，LLM就越有可能精确地遵循所要求的内容。这种方法可能包括不仅限于答案的内容，还包括其呈现方式，例如，“以项目符号形式列出”，“使用日常生活中的例子”等。'
- en: '[****Wh**en** ****t**o** ****u**se** ]'
  id: totrans-273
