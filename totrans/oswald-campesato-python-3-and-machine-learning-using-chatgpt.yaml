- en: plt.show()
  prefs: []
  type: TYPE_NORMAL
- en: '[Listing 2.3](#lis_2-3) initializes the array variable x with the values that
    are generated via the np.linspace() API, which, in this case, is a set of 100
    equally spaced decimal numbers between -5 and 5\. Notice the snippet [:,None]
    in the initialization of x, which results in an array of elements, each of which
    is an array consisting of a single number.'
  prefs: []
  type: TYPE_NORMAL
- en: 'The array variable y is defined in two parts: the first part is a quadratic
    equation -0.5 + 2.2*x +0.3*x**2 and the second part is a “perturbation” value
    that is based on a random number (similar to the code in [Listing 2.1](#lis_2-1)).
    Thus, the array variable y simulates a set of values that approximates a quadratic
    equation. The output from [Listing 2.3](#lis_2-3) is here:'
  prefs: []
  type: TYPE_NORMAL
- en: 'x:'
  prefs: []
  type: TYPE_NORMAL
- en: '[[-5\. ]'
  prefs: []
  type: TYPE_NORMAL
- en: '[-4.8989899 ]'
  prefs: []
