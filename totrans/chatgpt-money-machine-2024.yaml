- en: 'Chapter 4: The Real Deal—Behind the Scenes of Prompt Engineering'
  id: totrans-663
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第四章：真实情况——prompt engineering幕后
- en: '![image](d2d_images/chapter_title_below.png)'
  id: totrans-664
  prefs: []
  type: TYPE_IMG
  zh: '![image](d2d_images/chapter_title_below.png)'
- en: This chapter starts the journey of prompt engineering by looking at the strategic
    art of writing queries that make chatbot exchanges truly useful. We’ll examine
    prompt engineering’s importance and how deliberate query building affects sophisticated
    language models like ChatGPT’s responsiveness.
  id: totrans-665
  prefs: []
  type: TYPE_NORMAL
  zh: 本章通过探讨编写使聊天机器人交流真正有用的查询的战略艺术，开始了prompt engineering的旅程。我们将研究prompt engineering的重要性以及精心构建查询如何影响复杂语言模型如ChatGPT的响应能力。
- en: This exploration is centered on defining prompt engineering, which is a planned
    and thoughtful method for customizing questions, directions, or statements when
    interacting with chatbots. It’s more than just construction; it’s a deep look
    at how language models understand and react to prompts. This chapter shows how
    important well-designed prompts are, focusing on how they affect contextual guidance,
    task-specific directions, and making the most of creativity. Let’s hop in!
  id: totrans-666
  prefs: []
  type: TYPE_NORMAL
  zh: 这项探索集中在定义prompt engineering上，这是一种在交互聊天机器人时定制问题、指示或声明的有计划和深思熟虑的方法。它不仅仅是构建；它是对语言模型如何理解和反应提示的深入探讨。本章展示了精心设计的提示有多么重要，重点关注它们如何影响上下文指导、特定任务的指示以及最大限度地发挥创造力。让我们开始吧！
- en: What Is Prompt Engineering?
  id: totrans-667
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 什么是prompt engineering？
- en: The term “prompt engineering” refers to the process of intentionally crafting
    questions or prompts to use with chatbots, especially those with sophisticated
    language models like ChatGPT. The goal is to direct the chatbot’s responses toward
    specific results by manipulating questions, commands, or remarks. By deliberately
    crafting the information given to the AI, we want to elicit answers that are informative,
    relevant to the context, and cohesive.
  id: totrans-668
  prefs: []
  type: TYPE_NORMAL
  zh: “prompt engineering”这个术语指的是有意设计和构建问题或提示以供聊天机器人使用的过程，特别是那些拥有如ChatGPT这样的复杂语言模型的聊天机器人。目标是通过对问题、命令或评论的操纵，引导聊天机器人的回答趋向特定结果。通过故意构建提供给AI的信息，我们希望得到的信息是富有信息量、与上下文相关且连贯的。
- en: When it comes to ChatGPT, prompt engineering is more than just making up questions.
    This involves a detailed comprehension of how language models process and react
    to commands, enabling users to strategically impact the results. The steps include
    trying out various wordings, giving background information, and making good use
    of the model’s capabilities with carefully worded instructions.
  id: totrans-669
  prefs: []
  type: TYPE_NORMAL
  zh: 当涉及到ChatGPT时，prompt engineering不仅仅是提出问题。这涉及到对语言模型如何处理和反应命令的详细理解，使用户能够战略性地影响结果。步骤包括尝试不同的措辞、提供背景信息，并利用精心措辞的指令充分利用模型的能力。
- en: The Crucial Role of Good Prompts
  id: totrans-670
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 优秀提示的重要性
- en: You may think of crafting a smart prompt as preparing the groundwork for a meaningful
    interaction with the chatbot. The AI’s ability to provide relevant and understandable
    responses is heavily dependent on the quality of the prompt. Here’s why prompt
    engineering is important.
  id: totrans-671
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能会认为，制作一个智能提示就像为与聊天机器人的有意义互动打下基础。人工智能提供相关和可理解回答的能力在很大程度上取决于提示的质量。这就是为什么提示工程很重要。
- en: Contextual Guidance
  id: totrans-672
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 环境指导
- en: To make sure the AI gets the user’s intent right, well-crafted prompts give
    the chatbot clear context and direction. Responding in a logical and pertinent
    manner relies heavily on context.
  id: totrans-673
  prefs: []
  type: TYPE_NORMAL
  zh: 为了确保AI正确理解用户意图，精心设计的提示为聊天机器人提供了清晰的环境和方向。以逻辑和相关的形式回应很大程度上依赖于环境。
- en: Task-Specific Instructions
  id: totrans-674
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 针对特定任务的指令
- en: Approaches vary depending on the work at hand. Whether it’s for creative writing,
    solving problems, or retrieving information, prompt engineering lets users customize
    instructions. The chatbot’s efficiency is improved by this task-specific accuracy.
  id: totrans-675
  prefs: []
  type: TYPE_NORMAL
  zh: 方法因任务而异。无论是创意写作、解决问题还是检索信息，提示工程允许用户自定义指令。通过这种针对特定任务的准确性，聊天机器人的效率得到了提高。
- en: Avoiding Ambiguity
  id: totrans-676
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 避免歧义
- en: Responses could be muddled if questions are not specific enough. Users can guide
    the chatbot to produce answers that specifically address their questions by engineering
    cues with accuracy, thereby minimizing ambiguity.
  id: totrans-677
  prefs: []
  type: TYPE_NORMAL
  zh: 如果问题不够具体，回答可能会变得混乱。用户可以通过精确地设计提示来引导聊天机器人产生针对他们问题的具体答案，从而最小化歧义。
- en: Optimizing Creativity
  id: totrans-678
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 优化创造力
- en: A tool for optimizing creativity, prompt engineering is useful for creative
    jobs like coming up with stories or concepts. The chatbot can be guided and inspired
    to create creative and relevant material with strategic wording.
  id: totrans-679
  prefs: []
  type: TYPE_NORMAL
  zh: 提示工程是优化创造力的工具，对于像创作故事或概念这样的创意工作很有用。通过战略性的措辞，聊天机器人可以被引导和启发，以创造有创造性和相关性的材料。
- en: How Well-Designed Prompts Can Save You Time
  id: totrans-680
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 优秀设计的提示如何节省你的时间
- en: Recognizing Intent Clearly
  id: totrans-681
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 清晰识别意图
- en: To help the chatbot comprehend the user’s intent precisely, well-crafted prompts
    serve as beacons. Users can get better, faster answers from the chatbot when they
    ask direct queries or provide detailed instructions.
  id: totrans-682
  prefs: []
  type: TYPE_NORMAL
  zh: 为了帮助聊天机器人精确理解用户的意图，精心设计的提示就像灯塔。当用户提出直接查询或提供详细指令时，他们可以从聊天机器人那里获得更好、更快的答案。
- en: Reducing the Number of Iterations
  id: totrans-683
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 减少迭代次数
- en: As the chatbot tries to understand the user’s needs, iterative exchanges may
    occur if the instructions are not clear or are poorly written. Well-designed prompts
    eliminate this room for interpretation, which in turn shortens the conversation
    and makes it more efficient.
  id: totrans-684
  prefs: []
  type: TYPE_NORMAL
  zh: 当聊天机器人试图理解用户的需求时，如果指令不清晰或书写不佳，可能会发生迭代交流。设计良好的提示消除了这种解释空间，从而缩短了对话并使其更有效率。
- en: Optimization for Specific Tasks
  id: totrans-685
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 针对特定任务的优化
- en: Methods that work for one task may not work for another. Whether the user is
    looking for information, ideas, or help with addressing problems, a well-designed
    prompt allows the chatbot to stay focused and provide task-specific responses
    without being sidetracked.
  id: totrans-686
  prefs: []
  type: TYPE_NORMAL
  zh: 对于一项任务有效的方法可能对另一项任务无效。无论用户是在寻找信息、想法还是需要解决问题的帮助，精心设计的提示都允许聊天机器人保持专注，提供针对特定任务的响应，而不会分心。
- en: Maximizing Productivity With Strategic Prompt Building
  id: totrans-687
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 通过战略性的提示构建最大化生产力
- en: First, make sure the chatbot is focused on the work at hand when you’re making
    its prompts. That way, it can direct its capabilities toward answering the user’s
    questions and creating content that is tailored to their needs. The engagement
    is made more efficient by this task-oriented accuracy.
  id: totrans-688
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，当你制作聊天机器人的提示时，确保它专注于手头的工作。这样，它可以将能力集中在回答用户的问题和创建满足他们需求的内容上。这种以任务为导向的准确性使参与变得更加高效。
- en: '●  Providing concrete examples: Encouraging the chatbot to follow a framework
    can be achieved by supplementing prompts with examples. To help the chatbot generate
    responses more quickly and with less cognitive strain, users might show examples
    of the required format or content to aid the AI.'
  id: totrans-689
  prefs: []
  type: TYPE_NORMAL
  zh: ●  提供具体示例：通过补充示例来鼓励聊天机器人遵循框架。为了帮助聊天机器人更快、更轻松地生成响应，用户可能需要展示所需格式或内容的示例，以帮助AI。
- en: '●  Minimization of redundant data: Carefully designed prompts enable users
    to express their needs concisely, reducing the amount of data that is redundant
    or superfluous. By narrowing in on the most important data, this targeted input
    helps the chatbot to respond faster and more efficiently.'
  id: totrans-690
  prefs: []
  type: TYPE_NORMAL
  zh: ●  减少冗余数据：精心设计的提示使用户能够简洁地表达需求，减少冗余或多余的数据量。通过聚焦于最重要的数据，这种有针对性的输入有助于聊天机器人更快、更有效地响应。
- en: '●  Contextual relevance: When properly implemented, prompts encourage replies
    that are relevant to the user’s context, making it easier for the chatbot to respond
    to the user’s questions. Not only does this contextual harmony help users save
    time, but it also makes their experience more gratifying and interesting.'
  id: totrans-691
  prefs: []
  type: TYPE_NORMAL
  zh: ●  上下文相关性：当正确实施时，提示鼓励产生与用户上下文相关的回复，使聊天机器人更容易回答用户的问题。这种上下文和谐不仅帮助用户节省时间，还使他们的体验更加愉悦和有趣。
- en: Tokens and the Boundaries of Computing
  id: totrans-692
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 计算的边界与标记
- en: Language models such as GPT rely on tokens as their primary construction elements.
    Tokens can range in length from a single character to a full word. To make good
    prompts, you need to know the token cap, because each input uses up a certain
    number of tokens.
  id: totrans-693
  prefs: []
  type: TYPE_NORMAL
  zh: 语言模型如GPT依赖于标记作为它们的主要构建元素。标记的长度可以从单个字符到整个单词不等。为了制作好的提示，你需要知道标记上限，因为每个输入都会消耗一定数量的标记。
- en: Computational Load and Token Limitations
  id: totrans-694
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 计算负载和标记限制
- en: Much like other language models, ChatGPT functions within token limitations.
    Computer processing time and load are affected by the sum of all tokens in a prompt,
    instructions, and following discourse. When determining the ideal length of a
    prompt for effective interactions, users should bear these constraints in mind.
  id: totrans-695
  prefs: []
  type: TYPE_NORMAL
  zh: 与其他语言模型类似，ChatGPT在标记限制内运行。计算机处理时间和负载受提示、指令和后续对话中所有标记的总和影响。在确定有效互动的理想提示长度时，用户应考虑这些限制。
- en: Finding the Right Balance Between Complexity and Conciseness
  id: totrans-696
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 在复杂性和简洁性之间找到合适的平衡
- en: Prompt engineering that gets the job done well strikes a balance between being
    thorough and keeping things simple. Users should be careful not to exceed the
    model’s bounds with very lengthy prompts since this can slow down response times
    and reduce computing efficiency.
  id: totrans-697
  prefs: []
  type: TYPE_NORMAL
  zh: 做好工作的提示工程在详尽和简洁之间取得平衡。用户应小心不要使用非常长的提示超出模型的界限，因为这可能会减慢响应时间并降低计算效率。
- en: Technical Hacks for Crafting the Perfect Prompt
  id: totrans-698
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 构建完美提示的技术技巧
- en: A key part of working with language models like GPT-3 is prompt engineering,
    which involves planning how to use prompts to get specific answers that you want.
    To do this, you need to be creative, have a deep knowledge of how the model works,
    and test it over and over again to find the best solution for each task or application.
    Let’s take a look at some technical hacks for crafting the perfect prompts.
  id: totrans-699
  prefs: []
  type: TYPE_NORMAL
  zh: 与GPT-3等语言模型一起工作的关键部分是提示工程，这涉及到规划如何使用提示来获取你想要的特定答案。为此，你需要有创造力，深入了解模型的工作原理，并且反复测试以找到每个任务或应用的最佳解决方案。让我们来看看一些构建完美提示的技术技巧。
- en: Clarity and Specificity
  id: totrans-700
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 清晰性和具体性
- en: Making sure instructions are crystal clear and detailed is a cornerstone of
    prompt engineering. Vague prompts can produce unclear results, demanding the specific
    formulation of tasks or queries. The model needs to be guided with specificity
    to produce meaningful and accurate replies.
  id: totrans-701
  prefs: []
  type: TYPE_NORMAL
  zh: 确保指令清晰详细是提示工程的基础。含糊的提示会产生不明确的结果，需要具体地制定任务或查询。模型需要具体指导以产生有意义的准确回复。
- en: Example
  id: totrans-702
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 示例
- en: '●  Instead of: “Translate this sentence.”'
  id: totrans-703
  prefs: []
  type: TYPE_NORMAL
  zh: ●  而不是：“翻译这个句子。”
- en: '●  Use: “Translate the following English sentence to French: ‘The quick brown
    fox jumps over the lazy dog.’”'
  id: totrans-704
  prefs: []
  type: TYPE_NORMAL
  zh: ●  用法：“将以下英文句子翻译成法语：‘The quick brown fox jumps over the lazy dog.’”
- en: Leveraging Relevant Information
  id: totrans-705
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 利用相关信息
- en: Important context should be included in the prompts for the model to grasp them.
    A better understanding of the context helps to generate answers that are more
    suitable for that specific situation. Adjusting the context window’s length has
    another effect on the model’s ability to pay attention and remember things.
  id: totrans-706
  prefs: []
  type: TYPE_NORMAL
  zh: 重要背景信息应包含在提示中，以便模型能够理解。更好的理解背景有助于生成更符合特定情况的答案。调整上下文窗口的长度对模型关注和记忆事物的能力也有另一种影响。
- en: Example
  id: totrans-707
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 示例
- en: '●  Instead of: “Summarize this article.”'
  id: totrans-708
  prefs: []
  type: TYPE_NORMAL
  zh: ●  而不是：“总结这篇文章。”
- en: '●  Use: “Given the context of this scientific article on climate change, provide
    a concise summary focusing on the key findings and implications.”'
  id: totrans-709
  prefs: []
  type: TYPE_NORMAL
  zh: ●  使用：“在气候变化科学文章的背景下，提供一个简洁的摘要，重点关注关键发现和影响。”
- en: Temperature and Max Tokens
  id: totrans-710
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 温度和最大令牌数
- en: An ingenious method to circumvent prompt engineering is to fiddle with the temperature
    and maximum tokens. Changing the “max tokens” option lets you limit the longest
    answer, and the “temperature” parameter controls how random the output is. By
    fine-tuning these parameters, you can get the right amount of unpredictability
    and reaction time.
  id: totrans-711
  prefs: []
  type: TYPE_NORMAL
  zh: 通过调整温度和最大令牌数来规避提示工程是一种巧妙的方法。更改“最大令牌”选项可以让您限制最长答案，而“温度”参数控制输出的随机性。通过微调这些参数，您可以获得适量的不可预测性和反应时间。
- en: You can change the temperature measure to control how creative your language
    model is. Imagine a creativity dial. If the temperature is higher, say 0.8, the
    model is more likely to try out different word choices and sentence patterns.
    On the flip side, a lower temperature, like 0.2, cools down the creative fervor,
    leading to more deterministic and focused responses.
  id: totrans-712
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以通过更改温度值来控制语言模型的创造力。想象一个创造力旋钮。如果温度较高，例如0.8，模型更有可能尝试不同的词汇选择和句子模式。另一方面，较低的温度，如0.2，会冷却创意热情，导致更确定性和专注的回应。
- en: Example
  id: totrans-713
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 示例
- en: 'In your API call, specify the temperature parameter like this (Python example):'
  id: totrans-714
  prefs: []
  type: TYPE_NORMAL
  zh: 在您的API调用中指定温度参数，如下所示（Python示例）：
- en: response = openai.Completion.create(
  id: totrans-715
  prefs: []
  type: TYPE_NORMAL
  zh: response = openai.Completion.create(
- en: engine=“text-davinci-003”,
  id: totrans-716
  prefs: []
  type: TYPE_NORMAL
  zh: engine=“text-davinci-003”,
- en: 'prompt=“Translate the following English sentence to French: ‘The quick brown
    fox jumps over the lazy dog.’”,'
  id: totrans-717
  prefs: []
  type: TYPE_NORMAL
  zh: prompt=“将以下英文句子翻译成法语：‘The quick brown fox jumps over the lazy dog.’”,
- en: temperature=0.8,
  id: totrans-718
  prefs: []
  type: TYPE_NORMAL
  zh: temperature=0.8,
- en: max_tokens=100
  id: totrans-719
  prefs: []
  type: TYPE_NORMAL
  zh: max_tokens=100
- en: )
  id: totrans-720
  prefs: []
  type: TYPE_NORMAL
  zh: )
- en: Adjust the temperature value to find the sweet spot that aligns with your desired
    level of creativity.
  id: totrans-721
  prefs: []
  type: TYPE_NORMAL
  zh: 调整温度值以找到与您期望的创造力水平相匹配的甜点。
- en: Configuring Max Tokens
  id: totrans-722
  prefs: []
  type: TYPE_NORMAL
  zh: 配置最大令牌数
- en: Use the max_tokens parameter to cap the length of the text that is created.
    It limits the output to a certain number of words or lines. If you set it to a
    certain number, like changing it to 50 in the above example, the program will
    always give you a short answer within that range.
  id: totrans-723
  prefs: []
  type: TYPE_NORMAL
  zh: 使用max_tokens参数来限制创建的文本长度。它将输出限制在特定数量的单词或行。如果您将其设置为特定数字，如在上面的示例中将它改为50，程序将始终在范围内给出简短的答案。
- en: Example
  id: totrans-724
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 示例
- en: 'In your API call, add the max_tokens parameter:'
  id: totrans-725
  prefs: []
  type: TYPE_NORMAL
  zh: 在您的API调用中添加max_tokens参数：
- en: response = openai.Completion.create(
  id: totrans-726
  prefs: []
  type: TYPE_NORMAL
  zh: response = openai.Completion.create(
- en: engine=“text-davinci-003”,
  id: totrans-727
  prefs: []
  type: TYPE_NORMAL
  zh: engine=“text-davinci-003”,
- en: 'prompt=“Translate the following English sentence to French: ‘The quick brown
    fox jumps over the lazy dog.’”,'
  id: totrans-728
  prefs: []
  type: TYPE_NORMAL
  zh: prompt=“将以下英文句子翻译成法语：‘The quick brown fox jumps over the lazy dog.’”,
- en: temperature=0.8,
  id: totrans-729
  prefs: []
  type: TYPE_NORMAL
  zh: temperature=0.8,
- en: max_tokens=50
  id: totrans-730
  prefs: []
  type: TYPE_NORMAL
  zh: max_tokens=50
- en: )
  id: totrans-731
  prefs: []
  type: TYPE_NORMAL
  zh: )
- en: The max_tokens value lets you change how long or short the generated text should
    be. Remember that you need to try different things until you find the right mix
    for your needs. You can change these numbers as much as you want until you get
    the desired results!
  id: totrans-732
  prefs: []
  type: TYPE_NORMAL
  zh: max_tokens值允许您更改生成的文本的长度或短。请记住，您需要尝试不同的方法，直到找到满足您需求的最合适的组合。您可以随意更改这些数字，直到获得期望的结果！
- en: Strategic Framing and Wording
  id: totrans-733
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 战略性框架和措辞
- en: Prompt framing and phrases must be carefully considered. A bias in the output
    might be introduced by framing prompts in a favorable or negative light. Users
    may easily construct prompts that produce the desired outcomes by experimenting
    with alternative wording and phrasing and seeing how it changes the model’s reaction.
  id: totrans-734
  prefs: []
  type: TYPE_NORMAL
  zh: 提示框架和短语必须仔细考虑。通过从有利或不利的角度框架提示，可能会引入输出中的偏见。用户可以通过尝试不同的措辞和表达方式，并观察它如何改变模型的反应，轻松构建产生所需结果的提示。
- en: Example
  id: totrans-735
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 示例
- en: '●  Instead of: “Describe the advantages of renewable energy.”'
  id: totrans-736
  prefs: []
  type: TYPE_NORMAL
  zh: ●  不要：“描述可再生能源的优势。”
- en: '●  Use: “Highlight the positive aspects of adopting renewable energy sources
    in the context of environmental sustainability.”'
  id: totrans-737
  prefs: []
  type: TYPE_NORMAL
  zh: ●  使用：“在环境可持续性的背景下，突出采用可再生能源的积极方面。”
- en: Continuous Refinement for Optimal Results
  id: totrans-738
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 为获得最佳结果进行持续优化
- en: Prompt engineering relies on iterative testing. It is possible to optimize and
    develop the model over time by trying out various kinds of prompts, seeing how
    the model responds, and then adjusting the prompts appropriately.
  id: totrans-739
  prefs: []
  type: TYPE_NORMAL
  zh: 提示工程依赖于迭代测试。通过尝试各种类型的提示，观察模型的反应，并相应地调整提示，您可以在一段时间内优化和开发模型。
- en: Example
  id: totrans-740
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 示例
- en: Experimenting with different language translation task prompts and making adjustments
    based on the model’s ability to produce accurate and relevant translations in
    different contexts.
  id: totrans-741
  prefs: []
  type: TYPE_NORMAL
  zh: 尝试不同的语言翻译任务提示，并根据模型在不同上下文中产生准确和相关的翻译的能力进行调整。
- en: Prompt Chaining
  id: totrans-742
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 提示链
- en: The process of prompt chaining is constructing simple tasks from a series of
    related prompts. In this method, the model is led through a series of steps by
    simply passing the results of one prompt into the next. It works really well for
    tasks that have more than one step.
  id: totrans-743
  prefs: []
  type: TYPE_NORMAL
  zh: 提示链的过程是从一系列相关提示中构建简单的任务。在这个方法中，模型通过简单地将一个提示的结果传递到下一个提示中，被引导通过一系列步骤。这对于需要多个步骤的任务效果非常好。
- en: Example
  id: totrans-744
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 示例
- en: 'For a content creation task, break it into steps:'
  id: totrans-745
  prefs: []
  type: TYPE_NORMAL
  zh: 对于内容创作任务，将其分解为步骤：
- en: Generate an introduction.
  id: totrans-746
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 生成一个引言。
- en: Provide key points.
  id: totrans-747
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供关键点。
- en: Formulate a conclusion using outputs from the previous steps.
  id: totrans-748
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用前一步的输出制定结论。
- en: System Messages
  id: totrans-749
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 系统消息
- en: Adding system messages to prompts gives the model more direction for interactive
    use. In a controlled way, these signals affect the model’s responses by setting
    the scene for the discussion.
  id: totrans-750
  prefs: []
  type: TYPE_NORMAL
  zh: 将系统消息添加到提示中，为模型的交互式使用提供了更多方向。以受控的方式，这些信号通过为讨论设定场景来影响模型的响应。
- en: Example
  id: totrans-751
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 示例
- en: 'In a chatbot scenario, use a system message like: “You are an assistant helping
    with travel plans”'
  id: totrans-752
  prefs: []
  type: TYPE_NORMAL
  zh: 在聊天机器人场景中，可以使用如下系统消息：“您是一个帮助制定旅行计划的助手”
- en: This prompt can be used to guide the subsequent user-bot interaction.
  id: totrans-753
  prefs: []
  type: TYPE_NORMAL
  zh: 这个提示可以用来引导后续的用户-机器人交互。
- en: Controlling Output Format
  id: totrans-754
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 控制输出格式
- en: One technical trick in prompt engineering is controlling the output format.
    For better-organized results, specify the output format (paragraphs, bullet points,
    etc.) before you begin.
  id: totrans-755
  prefs: []
  type: TYPE_NORMAL
  zh: 提示工程中的一个技术技巧是控制输出格式。为了获得更好的组织结果，在开始之前指定输出格式（段落、项目符号等）。
- en: Example
  id: totrans-756
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 示例
- en: For a list-based answer, for instance, you could tell the model to use bullet
    points instead of paragraphs to present the information.
  id: totrans-757
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，对于列表形式的答案，你可以告诉模型使用项目符号而不是段落来呈现信息。
- en: Domain-Specific Fine-Tuning
  id: totrans-758
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 领域特定微调
- en: Sometimes, improving the model’s performance for certain tasks can be achieved
    by fine-tuning it using data specific to the domain. To do this, the model needs
    to be trained on a unique dataset so that it can be used in specific situations.
  id: totrans-759
  prefs: []
  type: TYPE_NORMAL
  zh: 有时，通过使用特定领域的数据进行微调，可以提高模型在特定任务上的性能。为此，模型需要在独特的数据集上进行训练，以便在特定情况下使用。
- en: Example
  id: totrans-760
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 示例
- en: Using legal documents to fine-tune a language model so it can produce more accurate
    and contextually appropriate legal text is one example.
  id: totrans-761
  prefs: []
  type: TYPE_NORMAL
  zh: 使用法律文件来微调语言模型，使其能够生成更准确和上下文相关的法律文本是一个例子。
- en: Mitigating Biases
  id: totrans-762
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 缓解偏见
- en: It is important to address any biases in the model’s responses through prompt
    engineering. Users should do their best to avoid unintended consequences by being
    cognizant of biases and trying out various prompts.
  id: totrans-763
  prefs: []
  type: TYPE_NORMAL
  zh: 通过提示工程解决模型响应中的任何偏见是很重要的。用户应尽最大努力避免无意中的后果，通过意识到偏见并尝试各种提示来实现。
- en: Example
  id: totrans-764
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 示例
- en: An example of this would be keeping an eye on and tweaking prompts to make sure
    that natural language generation produces fair and unbiased results by reducing
    gender bias in responses.
  id: totrans-765
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，可以通过关注和调整提示来确保自然语言生成产生公平且无偏见的成果，通过减少响应中的性别偏见来实现。
- en: Lastly, a thorough familiarity with the underlying model is essential for the
    iterative and ever-changing process of rapid engineering. These technological
    tricks and tips can help users become better at making useful prompts and can
    optimize language models for a wide range of uses.
  id: totrans-766
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，对于快速工程中迭代和不断变化的过程，对底层模型的充分熟悉是必不可少的。这些技术技巧和提示可以帮助用户更好地制作有用的提示，并可以优化语言模型以适应广泛的用途。
- en: Techniques for Testing Prompt Effectiveness
  id: totrans-767
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 测试提示有效性的技巧
- en: It is essential to begin the process of testing and refining before introducing
    a prompt into the ever-changing ecosystem of chatbots. By checking it against
    a well-thought-out strategy, this predeployment step guarantees that the prompt
    is more than a collection of words. Some ways to measure and improve the efficacy
    of a prompt are as follows.
  id: totrans-768
  prefs: []
  type: TYPE_NORMAL
  zh: 在将提示引入聊天机器人的不断变化的生态系统之前，开始测试和改进的过程是至关重要的。通过将其与精心制定的策略进行对照，这个预部署步骤确保提示不仅仅是词语的集合。以下是一些衡量和改进提示有效性的方法。
- en: Pilot Testing
  id: totrans-769
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 预测试
- en: Pilot tests should be carried out on a small scale before implementing a prompt
    on a larger one. Start a conversation with the chatbot by answering its questions
    and seeing how it reacts. Pilot testing is a great way to see how the model handles
    the prompt and find places where it could want some work.
  id: totrans-770
  prefs: []
  type: TYPE_NORMAL
  zh: 在更大规模上实施提示之前，应在小规模上实施试点测试。通过与聊天机器人回答问题并观察其反应来开始对话。试点测试是了解模型如何处理提示并找到需要改进的地方的好方法。
- en: Scenario Variations
  id: totrans-771
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 情景变化
- en: Investigate the prompt’s functionality in various contexts. To test how well
    the model can be adjusted, try changing the setting, tone, or difficulty of the
    question. Making sure the prompt works in a variety of situations is what testing
    is all about.
  id: totrans-772
  prefs: []
  type: TYPE_NORMAL
  zh: 调查提示在各种环境下的功能。为了测试模型调整得如何，尝试改变设置、语气或问题的难度。确保提示在各种情况下都能工作，这就是测试的全部内容。
- en: User Feedback
  id: totrans-773
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 用户反馈
- en: Gather feedback from users who interact with the chatbot by asking them to fill
    out the survey. Take into account their feedback on how to improve the prompt
    as you examine their experiences and look for trends. Quick optimization is guided
    by user feedback, which provides real-world insights.
  id: totrans-774
  prefs: []
  type: TYPE_NORMAL
  zh: 通过让用户填写调查问卷来收集与聊天机器人互动的用户反馈。在检查他们的体验并寻找趋势的同时，考虑他们对改进提示的反馈。快速优化由用户反馈指导，这提供了现实世界的见解。
- en: Benchmarking Against Goals
  id: totrans-775
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 与目标基准测试
- en: For example, you may want to know if the prompt is asking for creative work,
    problem-solving, or information retrieval. To measure how well the chatbot performed,
    compare its responses to these objectives. By focusing on specific objectives,
    we can check if the prompt is serving its intended function.
  id: totrans-776
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，你可能想知道提示是要求创意工作、问题解决还是信息检索。为了衡量聊天机器人执行这些目标的效果，将其响应与这些目标进行比较。通过关注具体目标，我们可以检查提示是否发挥了其预期的作用。
- en: Task-Specific Performance
  id: totrans-777
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 任务特定性能
- en: To evaluate the prompt’s efficacy, try it out on different jobs. Consider how
    effectively the prompt relates to the current activity while asking for information,
    ideas, or solutions. For better results, modify prompts according to details particular
    to the activity at hand.
  id: totrans-778
  prefs: []
  type: TYPE_NORMAL
  zh: 为了评估提示的有效性，尝试在不同的工作岗位上使用它。考虑在请求信息、想法或解决方案时，提示如何有效地与当前活动相关联。为了获得更好的结果，根据手头活动的特定细节修改提示。
- en: Comparative Testing
  id: totrans-779
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 比较测试
- en: Conduct comparative testing by crafting multiple prompts for the same task.
    To find the best prompt, compare the chatbot’s reactions to these variants. Users
    can fine-tune and choose the prompt that reliably produces the best results through
    comparative testing.
  id: totrans-780
  prefs: []
  type: TYPE_NORMAL
  zh: 通过为同一任务构建多个提示来进行比较测试。为了找到最佳的提示，比较聊天机器人对这些变体的反应。用户可以通过比较测试微调和选择能够可靠产生最佳结果的提示。
- en: Scenario Complexity Gradation
  id: totrans-781
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 情景复杂性分级
- en: When testing prompts, progressively make the circumstances more complicated.
    Begin with basic inquiries and work your way up to more complex ones. This gradation
    guarantees the adaptability of the program and helps evaluate the model’s capacity
    to handle various complications.
  id: totrans-782
  prefs: []
  type: TYPE_NORMAL
  zh: 在测试提示时，逐步使情况变得更加复杂。从基本查询开始，逐步过渡到更复杂的查询。这种分级保证了程序的适应性，并有助于评估模型处理各种复杂情况的能力。
- en: Examples of Well-Crafted Prompts
  id: totrans-783
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 精心设计的提示示例
- en: The art of crafting well-engineered prompts goes beyond just providing instructions.
    To show this, let’s look at some examples of how combining clarity, specificity,
    and strategic thought can lead to prompts that are perfectly suited for the desired
    outcome.
  id: totrans-784
  prefs: []
  type: TYPE_NORMAL
  zh: 构建精心设计的提示的艺术不仅仅在于提供指令。为了展示这一点，让我们看看一些如何结合清晰度、具体性和战略思维来产生适合预期结果的提示的例子。
- en: Information Retrieval
  id: totrans-785
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 信息检索
- en: '●  Poor prompt: “Tell me about space.”'
  id: totrans-786
  prefs: []
  type: TYPE_NORMAL
  zh: ●  不良提示：“告诉我关于太空的事情。”
- en: '●  Well-crafted prompt: “Provide a concise overview of recent advancements
    in space exploration, highlighting key discoveries and missions.”'
  id: totrans-787
  prefs: []
  type: TYPE_NORMAL
  zh: ●  精心设计的提示：“提供关于太空探索近期进展的简洁概述，突出关键发现和任务。”
- en: Creative Writing Assistance
  id: totrans-788
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 创意写作辅助
- en: '●  Poor prompt: “Write a story.”'
  id: totrans-789
  prefs: []
  type: TYPE_NORMAL
  zh: ●  不良提示：“写一个故事。”
- en: '●  Well-crafted prompt: “Compose a captivating short story set in a dystopian
    future where technology shapes societal norms. Emphasize the impact on human relationships
    and individual autonomy.”'
  id: totrans-790
  prefs: []
  type: TYPE_NORMAL
  zh: ●  精心设计的提示：“创作一个设定在反乌托邦未来的吸引人短篇故事，强调技术对社会规范的影响以及个人自主性的影响。”
- en: Problem-Solving
  id: totrans-791
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 问题解决
- en: '●  Poor prompt: “Help me solve a problem.”'
  id: totrans-792
  prefs: []
  type: TYPE_NORMAL
  zh: ●  不良提示：“帮助我解决问题。”
- en: '●  Well-crafted prompt: “Offer step-by-step guidance on optimizing a digital
    marketing strategy for a small business targeting a niche market. Include insights
    on audience engagement and conversion metrics.”'
  id: totrans-793
  prefs: []
  type: TYPE_NORMAL
  zh: ●  优秀的提示：“为针对细分市场的中小型企业提供优化数字营销策略的逐步指导。包括关于受众参与和转化指标的见解。”
- en: Coding Assistance
  id: totrans-794
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 编程辅助
- en: '●  Poor prompt: “Help with code.”'
  id: totrans-795
  prefs: []
  type: TYPE_NORMAL
  zh: ●  不良提示：“帮助编写代码。”
- en: '●  Well-crafted prompt: “Assist in debugging a Python script for data analysis.
    The script aims to analyze a dataset, identify outliers, and generate visualizations.
    Provide insights on improving code efficiency.”'
  id: totrans-796
  prefs: []
  type: TYPE_NORMAL
  zh: ●  优秀的提示：“协助调试用于数据分析的Python脚本。该脚本旨在分析数据集，识别异常值，并生成可视化。提供关于提高代码效率的见解。”
- en: Creative Ideation
  id: totrans-797
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 创意构思
- en: '●  Poor prompt: “Generate ideas.”'
  id: totrans-798
  prefs: []
  type: TYPE_NORMAL
  zh: ●  不良提示：“产生想法。”
- en: '●  Well-crafted prompt: “Brainstorm unique concepts for a sustainable product
    launch campaign targeting environmentally conscious consumers. Incorporate elements
    that evoke a sense of eco-friendliness and community engagement.”'
  id: totrans-799
  prefs: []
  type: TYPE_NORMAL
  zh: ●  优秀的提示：“为针对环保意识消费者的可持续产品发布活动构思独特概念。融入唤起环保意识和社区参与感的元素。”
- en: Software Troubleshooting
  id: totrans-800
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 软件故障排除
- en: '●  Poor prompt: “Fix my software.”'
  id: totrans-801
  prefs: []
  type: TYPE_NORMAL
  zh: ●  不良提示：“修复我的软件。”
- en: '●  Well-crafted prompt: “Diagnose and troubleshoot issues in a Java-based software
    application that encounters performance bottlenecks during large-scale data processing.
    Provide recommendations for optimization.”'
  id: totrans-802
  prefs: []
  type: TYPE_NORMAL
  zh: ●  优秀的提示：“诊断和排除基于Java的软件应用程序在大型数据处理期间遇到性能瓶颈的问题。提供优化建议。”
- en: Common Mistakes and How to Avoid Them
  id: totrans-803
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 常见错误及其避免方法
- en: You need to know the ins and outs of AI models like ChatGPT to master their
    precise performance. Some common mistakes, like unclear prompts or using too much
    slang, can make experiences less useful. To make the process of utilizing AI more
    seamless, let’s identify these obstacles and figure out how to avoid them.
  id: totrans-804
  prefs: []
  type: TYPE_NORMAL
  zh: 要掌握像ChatGPT这样的AI模型的精确性能，你需要了解其内部和外部。一些常见的错误，如提示不明确或使用过多俚语，可能会使体验变得不那么有用。为了使利用AI的过程更加顺畅，让我们识别这些障碍并找出如何避免它们。
- en: Vague Prompts
  id: totrans-805
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 含糊不清的提示
- en: If you start conversations with questions that aren’t specific enough, the system
    could misunderstand you and give you answers that aren’t useful.
  id: totrans-806
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你用不够具体的问题开始对话，系统可能会误解你，并给出无用的答案。
- en: Solution
  id: totrans-807
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 解决方案
- en: Make your point explicit by giving background and details. Be specific when
    describing the information or help you need, and steer clear of broad inquiries.
    Language precision helps the AI model provide better, more relevant results.
  id: totrans-808
  prefs: []
  type: TYPE_NORMAL
  zh: 通过提供背景和细节来明确你的观点。在描述所需的信息或帮助时，要具体，避免泛泛而谈。语言精确性有助于AI模型提供更好、更相关的结果。
- en: Excessive Length
  id: totrans-809
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 过长
- en: Making prompts that are too lengthy can cause the model to run out of tokens
    and not analyze data properly. Responses can be missing important details if they
    are too lengthy.
  id: totrans-810
  prefs: []
  type: TYPE_NORMAL
  zh: 制作过长的提示可能会导致模型耗尽令牌，无法正确分析数据。如果提示过长，响应可能会遗漏重要细节。
- en: Solution
  id: totrans-811
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 解决方案
- en: Strive for concise yet comprehensive prompts. Prioritize essential details,
    avoiding unnecessary verbosity. A balance between informativeness and brevity
    ensures optimal interaction without compromising the model’s processing capacity.
  id: totrans-812
  prefs: []
  type: TYPE_NORMAL
  zh: 力求简洁而全面的提示。优先考虑关键细节，避免不必要的冗长。信息量和简洁之间的平衡确保了最佳的互动，同时不会影响模型的处理能力。
- en: Repetitive Phrasing
  id: totrans-813
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 重复措辞
- en: The AI model could become confused and produce unnecessary repetition if prompts
    contain repetitive phrases.
  id: totrans-814
  prefs: []
  type: TYPE_NORMAL
  zh: 如果提示中包含重复的短语，AI模型可能会感到困惑并产生不必要的重复。
- en: Solution
  id: totrans-815
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 解决方案
- en: Use a variety of words and structures. Think about substituting synonyms or
    changing the wording while still being clear, instead of just restating the directions.
    This way, the discussion is more engaging and less likely to result in boring
    or repetitive outputs.
  id: totrans-816
  prefs: []
  type: TYPE_NORMAL
  zh: 使用多种词汇和结构。考虑用同义词替换或改变措辞，同时保持清晰，而不是简单地重复指示。这样可以使讨论更加引人入胜，并减少产生无聊或重复输出的可能性。
- en: Asking Complex Questions in One Go
  id: totrans-817
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 一次性提出复杂问题
- en: Overwhelming the AI model with too many difficult or multifaceted queries in
    one prompt could lead to partial or fragmented answers.
  id: totrans-818
  prefs: []
  type: TYPE_NORMAL
  zh: 一次性提出太多困难或复杂的查询可能会使AI模型感到不知所措，导致部分或碎片化的答案。
- en: Solution
  id: totrans-819
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 解决方案
- en: The solution is to separate the more involved questions into simpler, more sequential
    ones. By breaking down the process into its parts, the model can provide replies
    that are both consistent and nuanced. A conversation that is well-structured leads
    to clarity.
  id: totrans-820
  prefs: []
  type: TYPE_NORMAL
  zh: 解决方案是将更复杂的问题分解成更简单、更连续的问题。通过将过程分解成各个部分，模型可以提供既一致又细腻的回答。结构良好的对话会导致清晰的结果。
- en: Overuse of Abbreviations or Slang
  id: totrans-821
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 过度使用缩写或俚语
- en: Since AI models may not always accurately understand colloquial English, using
    a lot of acronyms or slang can lead to confusion.
  id: totrans-822
  prefs: []
  type: TYPE_NORMAL
  zh: 由于人工智能模型可能无法始终准确理解口语英语，因此使用大量缩写或俚语可能导致混淆。
- en: Solution
  id: totrans-823
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 解决方案
- en: The solution is to use simple, common language. Keep the usage of slang and
    acronyms to a minimum for the sake of clarity. Pick words with clear definitions
    when you need to be precise so that it doesn’t misunderstand you.
  id: totrans-824
  prefs: []
  type: TYPE_NORMAL
  zh: 解决方案是使用简单、常见的语言。为了清晰起见，尽量减少俚语和缩写的使用。在需要精确时，选择有明确定义的词语，以免误解。
- en: Providing Incomplete Information
  id: totrans-825
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 提供不完整的信息
- en: The AI model can’t do its job properly if the prompt doesn’t provide enough
    information.
  id: totrans-826
  prefs: []
  type: TYPE_NORMAL
  zh: 如果提示没有提供足够的信息，人工智能模型就无法正确地完成其工作。
- en: Solution
  id: totrans-827
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 解决方案
- en: Give the model all the information it needs by being specific in your prompts.
    Accurate replies are improved by contextual signals. To get the best outcomes,
    try to strike a balance between being clear and being informative.
  id: totrans-828
  prefs: []
  type: TYPE_NORMAL
  zh: 通过在提示中具体说明，给模型提供它所需的所有信息。通过上下文信号提高准确回答。为了获得最佳结果，尝试在清晰和提供信息之间取得平衡。
- en: Ignoring ChatGPT’s Limitations
  id: totrans-829
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 忽视ChatGPT的限制
- en: Disregarding ChatGPT’s built-in limitations, like token restrictions and other
    biases, might lead to less-than-ideal interactions.
  id: totrans-830
  prefs: []
  type: TYPE_NORMAL
  zh: 忽视ChatGPT内置的限制，如令牌限制和其他偏见，可能导致不太理想的交互。
- en: Solution
  id: totrans-831
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 解决方案
- en: Make sure you are aware of the limitations imposed by the model. Follow the
    rules of token limitations, make sure everything is clear, and watch out for biases.
    Engaging with these limits more effectively requires a deeper understanding.
  id: totrans-832
  prefs: []
  type: TYPE_NORMAL
  zh: 确保你了解模型施加的限制。遵循令牌限制规则，确保一切清晰，并注意偏见。更有效地处理这些限制需要更深入的理解。
- en: Not Addressing Inaccuracies
  id: totrans-833
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 未解决的不准确性
- en: If you don’t take responsibility for correcting false information, it spreads
    and makes encounters less reliable.
  id: totrans-834
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你不对纠正错误信息承担责任，它就会传播并使遭遇变得不可靠。
- en: Solution
  id: totrans-835
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 解决方案
- en: If any errors come up during the conversation, make sure to address them. Help
    the model understand its input better so it can participate in a more educated
    and trustworthy conversation by providing clarifications when necessary.
  id: totrans-836
  prefs: []
  type: TYPE_NORMAL
  zh: 如果在对话中出现任何错误，请确保解决它们。通过在必要时提供澄清，帮助模型更好地理解其输入，以便它能通过参与更明智和可靠的对话来参与。
- en: The Impact of Prompt Craftsmanship on ChatGPT’s Responses
  id: totrans-837
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 提示制作对ChatGPT回答的影响
- en: In the field of AI interaction, the difference between poorly designed and well-engineered
    prompts shows how different the results are from models like ChatGPT. A badly
    written prompt might lead to misunderstanding and unproductive or misleading responses.
    On the other hand, a well-crafted one is key to accurate and helpful responses,
    bridging the gap between human intent and AI capabilities.
  id: totrans-838
  prefs: []
  type: TYPE_NORMAL
  zh: 在人工智能交互领域，糟糕设计的提示与精心设计的提示之间的差异展示了ChatGPT等模型的结果差异。一个写得不好的提示可能导致误解和无效或误导性的回答。另一方面，一个精心设计的提示对于准确和有帮助的回答至关重要，它弥合了人类意图和人工智能能力之间的差距。
- en: Accuracy in Expression
  id: totrans-839
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 表达的准确性
- en: When directions are poorly worded and filled with vagueness or ambiguity, the
    communication process becomes as confusing as a maze with no way out. It’s hard
    for the model to figure out what people are trying to say, so it gives answers
    that might not meet their needs. On the flip side, a well-crafted prompt serves
    as a lighthouse, leading the model to a precise comprehension of user expectations.
  id: totrans-840
  prefs: []
  type: TYPE_NORMAL
  zh: 当指示用词不当且充满模糊性或歧义时，沟通过程变得如同没有出口的迷宫一般令人困惑。模型难以理解人们试图表达的内容，因此给出的答案可能不符合他们的需求。另一方面，精心设计的提示就像一座灯塔，引导模型精确理解用户期望。
- en: Rich Contextual Information
  id: totrans-841
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 丰富的上下文信息
- en: ChatGPT can produce responses that are both correct and contextually rich because
    of well-crafted prompts. To avoid the traps of misunderstanding or misinterpretation,
    contextual clues help the model better understand user questions.
  id: totrans-842
  prefs: []
  type: TYPE_NORMAL
  zh: 由于精心设计的提示，ChatGPT可以产生既正确又具有上下文丰富性的回答。为了避免误解或误解释的陷阱，上下文线索帮助模型更好地理解用户问题。
- en: Getting Around Limitations
  id: totrans-843
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 克服限制
- en: When writing prompts, it’s very important to be very aware of what ChatGPT can’t
    do. If the prompt is not well-designed, the model could be overloaded and produce
    useless or illogical results. A well-calibrated prompt, on the other hand, keeps
    the model within its capabilities and allows it to produce answers that are both
    informative and relevant.
  id: totrans-844
  prefs: []
  type: TYPE_NORMAL
  zh: 在撰写提示时，非常重要的一点是要非常清楚ChatGPT不能做什么。如果提示设计不当，模型可能会超载并产生无用或不合逻辑的结果。另一方面，一个精心调整的提示将使模型保持在它的能力范围内，并允许它产生既信息丰富又相关的答案。
- en: Real-World Examples of Prompt Impact on ChatGPT Responses
  id: totrans-845
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 实际示例中提示对ChatGPT响应的影响
- en: The chasm between a well-crafted and a poorly-crafted prompt becomes strikingly
    evident when examining real-world examples, showcasing the profound impact on
    the quality of ChatGPT’s responses.
  id: totrans-846
  prefs: []
  type: TYPE_NORMAL
  zh: 当检查现实世界的例子时，优秀提示与差劣提示之间的差距变得非常明显，展示了它们对ChatGPT响应质量产生的深远影响。
- en: Poorly-Crafted Prompt
  id: totrans-847
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 差劣的提示
- en: '●  Prompt 1: “Write an article.”'
  id: totrans-848
  prefs: []
  type: TYPE_NORMAL
  zh: ●  提示1：“写一篇文章。”
- en: '●  Response 1: “The sky is blue.”'
  id: totrans-849
  prefs: []
  type: TYPE_NORMAL
  zh: ●  回复1：“天空是蓝色的。”
- en: What follows is an entirely irrelevant and useless response to a poorly worded
    and vague question. Given such vague parameters, the model is left to produce
    meaningless and unrelated content.
  id: totrans-850
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是对一个措辞不当且含糊不清的问题的完全无关且无用的回应。鉴于这样的模糊参数，模型只能产生无意义且不相关的内容。
- en: Well-Crafted Prompt
  id: totrans-851
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 优秀的提示
- en: '●  Prompt 2: “Compose a thought-provoking article exploring the impact of artificial
    intelligence on job markets. Discuss potential challenges and opportunities for
    the future.”'
  id: totrans-852
  prefs: []
  type: TYPE_NORMAL
  zh: ●  提示2：“撰写一篇引人深思的文章，探讨人工智能对就业市场的影响。讨论未来可能面临的挑战和机遇。”
- en: '●  Response 2: “The integration of artificial intelligence into the job market
    has sparked debates on its implications. While some foresee increased efficiency,
    concerns about job displacement and the need for reskilling have emerged as critical
    considerations for policymakers and businesses.”'
  id: totrans-853
  prefs: []
  type: TYPE_NORMAL
  zh: ●  回复2：“人工智能融入就业市场引发了对其影响的辩论。虽然有些人预见到了效率的提高，但关于就业岗位流失和重新培训的需求已成为政策制定者和企业的重要考虑因素。”
- en: This thoughtfully constructed question, full of context and details, gets an
    answer that is spot on for what the user meant. The model comes up with a thoughtful
    and useful look at how AI affects job markets, showing how powerful carefully
    chosen input can be.
  id: totrans-854
  prefs: []
  type: TYPE_NORMAL
  zh: 这个精心构造的问题，充满了背景和细节，得到了一个完全符合用户意图的答案。模型提出了一种深思熟虑且有用的观点，探讨了人工智能对就业市场的影响，展示了精心选择输入的强大作用。
- en: If you want to learn fast, the next chapter will help you with just that, giving
    you tips and tricks on how to become a pro.
  id: totrans-855
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想要快速学习，下一章将帮助你做到这一点，提供成为专家的技巧和窍门。
- en: '| ![image](d2d_images/chapter_title_corner_decoration_left.png) |  | ![image](d2d_images/chapter_title_corner_decoration_right.png)
    |'
  id: totrans-856
  prefs: []
  type: TYPE_TB
  zh: '| ![image](d2d_images/chapter_title_corner_decoration_left.png) |  | ![image](d2d_images/chapter_title_corner_decoration_right.png)
    |'
- en: '![image](d2d_images/chapter_title_above.png)'
  id: totrans-857
  prefs: []
  type: TYPE_IMG
  zh: '![image](d2d_images/chapter_title_above.png)'
- en: 'Chapter 5: From Noob to Pro—Hacks for Fast Learning'
  id: totrans-858
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第5章：从新手到专家——快速学习技巧
- en: '![image](d2d_images/chapter_title_below.png)'
  id: totrans-859
  prefs: []
  type: TYPE_IMG
  zh: '![image](d2d_images/chapter_title_below.png)'
- en: Learning ChatGPT isn’t just one person’s journey; it’s a group effort. Joining
    online groups and forums turns learning into a journey that everyone can enjoy.
    There are places online that are like educational institutions where people of
    all skill levels can share their knowledge and tips. When you face problems, it’s
    like putting together puzzles. In this community, asking questions is not just
    welcomed, but encouraged. You can talk with friends who have been there and done
    that. This feeling of learning with others not only helps you understand ChatGPT
    better but also makes the whole thing more fun. This chapter will show you how
    to use these groups to improve your ChatGPT learning and illustrate their significance.
  id: totrans-860
  prefs: []
  type: TYPE_NORMAL
  zh: 学习ChatGPT不仅仅是个人旅程；它是一个团队努力的结果。加入在线团体和论坛将学习变成了一场每个人都能享受的旅程。在线有一些像教育机构一样的地方，不同技能水平的人可以分享他们的知识和技巧。当你遇到问题时，就像拼图一样。在这个社区中，提问不仅受到欢迎，而且被鼓励。你可以与那些经历过并成功的人交流。与他人一起学习的这种感觉不仅帮助你更好地理解ChatGPT，也让整个过程更加有趣。本章将向你展示如何使用这些团体来提高你的ChatGPT学习，并说明它们的重要性。
- en: Communities and Forums
  id: totrans-861
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 社区和论坛
- en: In these communities, novices, aficionados, and professionals all come together
    to discuss what they’ve learned and come up with new ideas. With the help of the
    extensive knowledge base, users can master the ins and outs of prompt design,
    hone their techniques, and discover subtle ways to improve their interactions
    with ChatGPT.
  id: totrans-862
  prefs: []
  type: TYPE_NORMAL
  zh: 在这些社区中，新手、爱好者和专业人士聚集在一起，讨论他们所学到的知识，并提出新的想法。借助丰富的知识库，用户可以掌握提示设计的方方面面，磨练他们的技巧，并发现改进与ChatGPT互动的微妙方式。
- en: In these communities, problems are treated as shared mysteries, which are solved
    by working together. By seeing how other users have succeeded and failed, users
    can learn from each other’s mistakes and progress more quickly. Through the exchange
    of questions and answers, a vibrant ecosystem of shared knowledge is formed, enabling
    individuals to fully utilize ChatGPT’s capabilities.
  id: totrans-863
  prefs: []
  type: TYPE_NORMAL
  zh: 在这些社区中，问题被视为共享的神秘，通过共同努力来解决。通过观察其他用户的成功和失败，用户可以从彼此的错误中学习，并更快地进步。通过问答的交流，形成了一个充满活力的共享知识生态系统，使个人能够充分利用ChatGPT的能力。
- en: Being a part of these groups brings people together in a spirit of camaraderie
    as they work to improve their abilities and achieve more. Belonging to a community
    does more than only provide useful information; it also motivates and strengthens
    people to persevere through tough times.
  id: totrans-864
  prefs: []
  type: TYPE_NORMAL
  zh: 成为这些群体的一员，人们在共同提高能力和实现更多目标的过程中团结起来。属于一个社区不仅仅提供有用的信息；它还激励和加强人们克服困难时期。
- en: A Guide to Enthusiast Communities and Resources
  id: totrans-865
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 热衷者社区和资源指南
- en: Becoming a communication expert in the expansive realm of ChatGPT requires a
    team of people working together. To really learn how to use ChatGPT, you should
    get involved in the active groups that have grown up around this groundbreaking
    tool. When you use sites like DataFit.ai, FlowGPT, and the OpenAI Community Forum,
    you can find and share a lot of information and knowledge.
  id: totrans-866
  prefs: []
  type: TYPE_NORMAL
  zh: 在ChatGPT广阔的领域成为沟通专家需要一支团队共同努力。要真正学会使用ChatGPT，你应该参与围绕这个突破性工具成长起来的活跃群体。当你使用DataFit.ai、FlowGPT和OpenAI社区论坛等网站时，你可以找到并分享大量信息和知识。
- en: It’s a great way to grow as a person by asking questions. In these groups, the
    questions are manageable, and the knowledge of other fans makes sure that every
    question gets a thoughtful answer. The communities are cooperative places to learn
    as a group, whether you’re looking at complex applications or breaking down the
    details of prompt creation.
  id: totrans-867
  prefs: []
  type: TYPE_NORMAL
  zh: 通过提问来成长是一个很好的方式。在这些群体中，问题易于管理，其他粉丝的知识确保每个问题都能得到深思熟虑的回答。这些社区是作为群体学习的好地方，无论是查看复杂的应用程序还是分析提示创建的细节。
- en: Personal stories add even more depth to the structure of the group. By sharing
    your insights, you strengthen what you know and make important additions to the
    pool of knowledge that everyone shares. The variety of experiences creates a lively
    learning space where every exchange pushes the group to greater heights.
  id: totrans-868
  prefs: []
  type: TYPE_NORMAL
  zh: 个人故事为小组的结构增添了更多深度。通过分享你的见解，你加强了你的知识，并为每个人共享的知识库增添了重要补充。各种经验创造了一个充满活力的学习空间，每一次交流都推动小组达到更高的水平。
- en: The following are some of the prominent spaces where you can join the AI forces.
  id: totrans-869
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是一些你可以加入AI力量的突出空间。
- en: Community Hubs
  id: totrans-870
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 社区中心
- en: '●  DataFit.ai: This platform is a beacon for ChatGPT fans; it is completely
    community-driven and has a library of over 200 different themes. A wide range
    of categories are covered by these templates, which offer users effective and
    precise suggestions for ChatGPT to provide appropriate responses.'
  id: totrans-871
  prefs: []
  type: TYPE_NORMAL
  zh: ●  DataFit.ai：这个平台是ChatGPT爱好者的灯塔；它完全由社区驱动，拥有200多个不同主题的库。这些模板涵盖了广泛的类别，为用户提供ChatGPT提供适当响应的有效和精确建议。
- en: '●  FlowGPT: FlowGPT is a new hub where business, marketing, programming, and
    design aficionados can find, share, and learn from powerful ChatGPT prompts. Use
    it as a place to work on your prompt-creation abilities with others.'
  id: totrans-872
  prefs: []
  type: TYPE_NORMAL
  zh: ●  FlowGPT：FlowGPT是一个新的中心，商业、营销、编程和设计爱好者可以在这里找到、分享并从强大的ChatGPT提示中学习。将其作为一个与其他人一起磨练提示创作能力的地方。
- en: '●  OpenAI Community Forum: The original home of ChatGPT, the OpenAI Community
    Forum is an excellent place for people to talk to each other, get answers to their
    questions, and meet other people who are interested in AI. In this space, people
    can get their queries answered and information is shared easily.'
  id: totrans-873
  prefs: []
  type: TYPE_NORMAL
  zh: ● OpenAI 社区论坛：ChatGPT 的原始家园，OpenAI 社区论坛是人们相互交谈、回答他们问题的绝佳场所，也是那些对 AI 感兴趣的人的聚集地。在这个空间中，人们可以轻松地得到他们的疑问得到解答，信息也容易共享。
- en: Social Media Gatherings
  id: totrans-874
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 社交媒体聚会
- en: '●  The ChatGPT community on Facebook: This vibrant community is home to more
    than 624,000 people and is always buzzing with activity. You can use it to connect
    with others, share your stories, and learn more about how ChatGPT is changing
    all the time.'
  id: totrans-875
  prefs: []
  type: TYPE_NORMAL
  zh: ● Facebook 上的 ChatGPT 社区：这个充满活力的社区拥有超过 624,000 名成员，总是充满活力。你可以用它来与他人建立联系，分享你的故事，并了解更多关于
    ChatGPT 如何不断变化的信息。
- en: 'Link to the community page: www.facebook.com/groups/chatgpt'
  id: totrans-876
  prefs: []
  type: TYPE_NORMAL
  zh: 社区页面链接：www.facebook.com/groups/chatgpt
- en: '●  ChatGPT groups on different sites: Go beyond Facebook to join the thriving
    ChatGPT communities on other social media sites. Using different sites to interact
    with people who share your interests can help you see things from different angles.'
  id: totrans-877
  prefs: []
  type: TYPE_NORMAL
  zh: ● 不同网站上的 ChatGPT 群组：超越 Facebook，加入其他社交媒体网站上蓬勃发展的 ChatGPT 社区。使用不同的网站与有共同兴趣的人互动，可以帮助你从不同的角度看待事物。
- en: Cheat Sheets for Quick Mastery
  id: totrans-878
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 快速精通的备忘单
- en: Here’s a list of resources that you can use as cheat sheets for AI proficiency.
  id: totrans-879
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一份资源列表，你可以将其用作 AI 熟练程度的备忘单。
- en: ChatGPT Cheat Sheet
  id: totrans-880
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: ChatGPT 备忘单
- en: You can easily find your way around ChatGPT with the help of the ChatGPT Cheat
    Sheet. Whether you’re working with code, NLP, types of media, or structured or
    unstructured output, this all-inclusive resource has you covered.
  id: totrans-881
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以在 ChatGPT 备忘单的帮助下轻松地了解 ChatGPT。无论你是在处理代码、NLP、媒体类型，还是结构化或非结构化输出，这个全面资源都能为你提供支持。
- en: 'Link: www.kdnuggets.com/2023/01/chatgpt-cheat-sheet.html'
  id: totrans-882
  prefs: []
  type: TYPE_NORMAL
  zh: 链接：www.kdnuggets.com/2023/01/chatgpt-cheat-sheet.html
- en: OpenAI Cookbook
  id: totrans-883
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: OpenAI 烹饪书
- en: To learn about the OpenAI API and how to use it to make ChatGPT apps. You can
    also find code examples for GPT-3, embedding, and fine-tuning.
  id: totrans-884
  prefs: []
  type: TYPE_NORMAL
  zh: 要了解 OpenAI API 以及如何使用它来制作 ChatGPT 应用程序。你还可以找到 GPT-3、嵌入和微调的代码示例。
- en: 'Link: github.com/openai/openai-cookbook'
  id: totrans-885
  prefs: []
  type: TYPE_NORMAL
  zh: 链接：github.com/openai/openai-cookbook
- en: 'Sample Scripts: Ready-To-Use Prompts'
  id: totrans-886
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 样本脚本：现成提示
- en: While coming up with your own prompts is a skill that you should work on, beginners
    often find comfort and inspiration in example scripts that have already been written.
    Freshers can use these carefully written tools by experienced users as starting
    points for getting started with ChatGPT communication.
  id: totrans-887
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然自己编写提示是一个你应该练习的技能，但初学者通常会在已经编写的示例脚本中找到安慰和灵感。新手可以使用经验丰富的用户精心编写的工具作为开始使用 ChatGPT
    交流的起点。
- en: Guiding Novices
  id: totrans-888
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 指导新手
- en: For beginners, digging into the complexities of prompt creation can be challenging.
    Example scripts are helpful guides that give users a structured way to learn how
    to communicate effectively with ChatGPT. These scripts can be used for a wide
    range of things, from coming up with creative content to asking for help with
    code. They give beginners real-world examples to get them started.
  id: totrans-889
  prefs: []
  type: TYPE_NORMAL
  zh: 对于初学者来说，深入研究提示的复杂性可能具有挑战性。示例脚本是有用的指南，它为用户提供了一种结构化的方式来学习如何有效地与 ChatGPT 进行沟通。这些脚本可用于各种事情，从提出创意内容到请求代码帮助。它们为初学者提供了现实世界的例子，帮助他们开始。
- en: Learning by Observation
  id: totrans-890
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 通过观察学习
- en: Sample scripts let users see the subtleties of how questions are put together
    and figure out what clues in the situation lead to more accurate and useful answers.
    It’s more than just learning theory; it gives you real-world examples of how to
    communicate effectively with AI models like ChatGPT.
  id: totrans-891
  prefs: []
  type: TYPE_NORMAL
  zh: 样本脚本让用户看到如何构建问题的微妙之处，并找出情境中的哪些线索导致更准确和有用的答案。这不仅仅是学习理论；它为你提供了如何与像 ChatGPT 这样的
    AI 模型有效沟通的现实世界例子。
- en: Different Uses
  id: totrans-892
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 不同用途
- en: Sample scripts are made for different uses so that people with different interests
    and needs can find scripts that work for them. These scripts give users a wide
    range of tools to explore all of ChatGPT’s many features, whether they’re writing
    gripping stories, fixing coding problems, or coming up with new ideas.
  id: totrans-893
  prefs: []
  type: TYPE_NORMAL
  zh: 样本脚本是为不同的用途制作的，以便不同兴趣和需求的人都能找到适合他们的脚本。这些脚本为用户提供了一系列工具，以便探索 ChatGPT 的众多功能，无论是撰写引人入胜的故事、修复编码问题，还是提出新想法。
- en: Building Confidence
  id: totrans-894
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 建立自信
- en: For new users, the most important thing is to feel comfortable using ChatGPT.
    Sample scripts are a low-risk way to start because they let users try out prewritten
    prompts before they move on to more personalized exchanges. This hands-on experience
    helps users feel comfortable and confident, which makes it easier for them to
    gradually write their prompts.
  id: totrans-895
  prefs: []
  type: TYPE_NORMAL
  zh: 对于新用户来说，最重要的是感到舒适地使用ChatGPT。示例脚本是一个低风险的开端，因为它们允许用户在进入更个性化的交流之前尝试预写的提示。这种动手经验帮助用户感到舒适和自信，这使得他们逐渐编写提示变得更加容易。
- en: Sample Prompts
  id: totrans-896
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 样本提示
- en: Personal Productivity
  id: totrans-897
  prefs:
  - PREF_H3
