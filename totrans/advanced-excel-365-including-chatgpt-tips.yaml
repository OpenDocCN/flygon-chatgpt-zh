  id: totrans-2349
  prefs: []
  type: TYPE_NORMAL
  zh: 图15.3 场景4
- en: 'For solve this scenario, follow these steps:'
  id: totrans-2350
  prefs: []
  type: TYPE_NORMAL
  zh: 为解决此场景，请按照以下步骤操作：
- en: 1. Start recording (use the name “Subtotal_Macro”).
  id: totrans-2351
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 开始录制（使用名称“Subtotal_Macro”）。
- en: 2. Select the Salary sheet (source data).
  id: totrans-2352
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 选择“薪资”工作表（源数据）。
- en: 3. Select cell A1 (the database starts from A1).
  id: totrans-2353
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 选择单元格A1（数据库从A1开始）。
- en: 4. Perform Sort on Region, as shown in [Figure 15.4](#fig15-4).
  id: totrans-2354
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 如[图15.4](#fig15-4)所示，对区域执行排序。
- en: '![image](image/Figure_15.4.jpg)'
  id: totrans-2355
  prefs: []
  type: TYPE_IMG
  zh: '![image](image/Figure_15.4.jpg)'
- en: Figure 15.4 Scenario 4 Solution
  id: totrans-2356
  prefs: []
  type: TYPE_NORMAL
  zh: 图15.4 场景4解决方案
- en: Note Sorting must be done per the requirement of Subtotal. Incorrect sorting
    will result in an incorrect subtotal.
  id: totrans-2357
  prefs: []
  type: TYPE_NORMAL
  zh: 注意：排序必须按照小计的要求进行。排序错误会导致小计错误。
- en: 5. Perform Subtotal on Region, as shown in [Figure 15.5](#fig15-5), and follow
    the steps below.
  id: totrans-2358
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 如[图15.5](#fig15-5)所示，对区域执行小计，并按照以下步骤操作。
- en: a. On Data Tab, go to the Outline Group.
  id: totrans-2359
  prefs: []
  type: TYPE_NORMAL
  zh: a. 在“数据”选项卡中，转到“大纲”组。
- en: b. Click on the Subtotal button.
  id: totrans-2360
  prefs: []
  type: TYPE_NORMAL
  zh: b. 点击“小计”按钮。
- en: c. Also select Region in.
  id: totrans-2361
  prefs: []
  type: TYPE_NORMAL
  zh: c. 还选择“区域”。
- en: d. Select the Sum function (you can choose any other function per the requirement
    of your project.)
  id: totrans-2362
  prefs: []
  type: TYPE_NORMAL
  zh: d. 选择求和函数（您可以根据项目需求选择任何其他函数）。
- en: e. Select Salary Field.
  id: totrans-2363
  prefs: []
  type: TYPE_NORMAL
  zh: e. 选择“薪资”字段。
- en: f. Click OK.
  id: totrans-2364
  prefs: []
  type: TYPE_NORMAL
  zh: f. 点击“确定”。
- en: Refer to [Figure 15.5](#fig15-5).
  id: totrans-2365
  prefs: []
  type: TYPE_NORMAL
  zh: 参考图15.5 [图15.5](#fig15-5)。
- en: '![image](image/Figure_15.5.jpg)'
  id: totrans-2366
  prefs: []
  type: TYPE_IMG
  zh: '![image](image/Figure_15.5.jpg)'
- en: Figure 15.5 Scenario 4 Solution
  id: totrans-2367
  prefs: []
  type: TYPE_NORMAL
  zh: 图15.5 场景4解决方案
- en: 6. Click on Second level of Outline (only the subtotal must be shown).
  id: totrans-2368
  prefs: []
  type: TYPE_NORMAL
  zh: 6. 点击“大纲”的第二级（只显示小计）。
- en: 7. Select the data.
  id: totrans-2369
  prefs: []
  type: TYPE_NORMAL
  zh: 7. 选择数据。
- en: 8. Press Alt + ; key combination to select visible cells from the selection.
  id: totrans-2370
  prefs: []
  type: TYPE_NORMAL
  zh: 8. 按下Alt + ;键组合来选择从选择中的可见单元格。
- en: 9. Copy the selection (Ctrl + C).
  id: totrans-2371
  prefs: []
  type: TYPE_NORMAL
  zh: 9. 复制选择（Ctrl + C）。
- en: 10. Insert the new worksheet (Shift + F11).
  id: totrans-2372
  prefs: []
  type: TYPE_NORMAL
  zh: 10. 插入新工作表（Shift + F11）。
- en: 11. Paste the copied data (Ctrl + V).
  id: totrans-2373
  prefs: []
  type: TYPE_NORMAL
  zh: 11. 粘贴复制的数据（Ctrl + V）。
- en: 12. Go to the Salary sheet (source data).
  id: totrans-2374
  prefs: []
  type: TYPE_NORMAL
  zh: 12. 转到“薪资”工作表（源数据）。
- en: '13. Remove Subtotal using the following steps:'
  id: totrans-2375
  prefs: []
  type: TYPE_NORMAL
  zh: 13. 使用以下步骤删除小计：
- en: a. Go to Data Tab.
  id: totrans-2376
  prefs: []
  type: TYPE_NORMAL
  zh: a. 转到“数据”选项卡。
- en: b. Click Subtotal.
  id: totrans-2377
  prefs: []
  type: TYPE_NORMAL
  zh: b. 点击“小计”。
- en: c. Click on the RemoveAll button.
  id: totrans-2378
  prefs: []
  type: TYPE_NORMAL
  zh: c. 点击“移除所有”按钮。
- en: 14. Activate the previous sheet (Ctrl + PageUp).
  id: totrans-2379
  prefs: []
  type: TYPE_NORMAL
  zh: 14. 激活上一个工作表（Ctrl + PageUp）。
- en: 15. Stop recording.
  id: totrans-2380
  prefs: []
  type: TYPE_NORMAL
  zh: 15. 停止录制。
- en: Refer to [Figure 15.6](#fig15-6).
  id: totrans-2381
  prefs: []
  type: TYPE_NORMAL
