  type: TYPE_NORMAL
  zh: '4: 理解测试驱动开发（TDD）'
- en: 'Prompt:'
  id: totrans-468
  prefs: []
  type: TYPE_NORMAL
  zh: 'Prompt:'
- en: '"Explain the principles of Test-Driven Development (TDD) and its benefits.
