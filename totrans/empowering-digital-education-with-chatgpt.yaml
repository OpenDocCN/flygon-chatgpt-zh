  id: totrans-737
  prefs: []
  type: TYPE_TB
  zh: '| 社会影响 | 4.78 | 0.23 | 4.33 | 5.23 |'
- en: '*Note:* All UTAUT variables were measured with Likert Scales (1–7). SE: standard
    error, CI: confidence interval; Attitude: attitude toward using technology; Behavioral
    intention: behavioral intention to use technology.'
  id: totrans-738
  prefs: []
  type: TYPE_NORMAL
  zh: '*注意：* 所有UTAUT变量均使用李克特量表（1–7）进行测量。SE：标准误，CI：置信区间；态度：对使用技术的态度；行为意向：使用技术的行为意向。'
- en: The correlation analysis of the post-ChatGPT-use UTAUT variables, as depicted
    in [Figure 3.2](#ch11.xhtml#f5), showed significant relationships between various
    factors. The highest correlation was found between performance expectancy and
    behavioral intention to use ChatGPT, with a strong positive correlation (*r* =
    0.85), reinforcing the pre-ChatGPT-use findings.
  id: totrans-739
  prefs: []
  type: TYPE_NORMAL
  zh: 后ChatGPT使用UTAUT变量的相关性分析，如图3.2所示，显示了各种因素之间的显著相关性。表现预期与使用ChatGPT的行为意向之间的相关性最高，强正相关（*r*
    = 0.85），这强化了前ChatGPT使用时的发现。
- en: '![A heatmap titled post-survey correlation heatmap with correlation values
    ranging from negative 0.5 to 1.0\. It includes variables B I, A N, S E, F C, S
    I, A T, E E, and P E on both axes. A scale on the right labeled correlation ranges
    from negative 0.5 to 1.0.](html/images/9781032716084_C003_002.jpg)'
  id: totrans-740
  prefs: []
  type: TYPE_IMG
  zh: '![标题为“后调查相关性热图”，相关性值范围为-0.5到1.0的热图。它包括B I, A N, S E, F C, S I, A T, E E和P E这两个轴上的变量。右侧有一个标签为相关性范围的刻度，范围从-0.5到1.0。](html/images/9781032716084_C003_002.jpg)'
- en: '[Figure 3.2](#ch11.xhtml#f5b) Heatmap of the correlation between the UTAUT
    variables of the post-measurement. PE: performance expectancy; EE: effort expectancy;
    AT: attitude toward using technology; SI: social influence; FC: facilitating conditions;
    SE: self-efficacy; AN: anxiety; BI: behavioral intention to use ChatGPT.'
  id: totrans-741
  prefs: []
  type: TYPE_NORMAL
  zh: '[图3.2](#ch11.xhtml#f5b) 后测量UTAUT变量的相关性热图。PE：表现预期；EE：努力预期；AT：对使用技术的态度；SI：社会影响；FC：促进条件；SE：自我效能；AN：焦虑；BI：使用ChatGPT的行为意向。'
- en: A negative correlation was observed between behavioral intention to use ChatGPT
    and anxiety (*r* = −0.53), indicating that as students’ anxiety about using ChatGPT
    decreased, their behavioral intention to use ChatGPT increased, according to the
    UTAUT. In addition, self-efficacy showed a high correlation with facilitating
    conditions and social influence, suggesting that students’ confidence in using
    ChatGPT is influenced by the support and perceptions of their social environment.
  id: totrans-742
  prefs: []
  type: TYPE_NORMAL
  zh: 观察到使用 ChatGPT 的行为意向与焦虑之间存在负相关（*r* = −0.53），根据 UTAUT，这表明随着学生对使用 ChatGPT 的焦虑减少，他们使用
    ChatGPT 的行为意向增加。此外，自我效能与促进条件和社交影响高度相关，这表明学生对使用 ChatGPT 的信心受其社会环境支持和认知的影响。
- en: '[Figure 3.3](#ch11.xhtml#f6) presents a comparative analysis of the mean scores
    of UTAUT variables before and after the seminar. This comparison highlights the
    seminar’s impact on students’ perceptions and attitudes toward ChatGPT. The overall
    increase in positive perceptions and decrease in anxiety after the ChatGPT use
    indicate a successful engagement with the technology, fostering a more favorable
    outlook toward its use in scientific writing. Still, confidence intervals of pre-
    and post-measurement overlap, indicating that this increase or decrease of the
    scales was non-significant.'
  id: totrans-743
  prefs: []
  type: TYPE_NORMAL
  zh: '[图3.3](#ch11.xhtml#f6) 展示了研讨会前后 UTAUT 变量的平均分数的比较分析。这种比较突出了研讨会对学生对 ChatGPT 的认知和态度的影响。ChatGPT
    使用后积极认知的整体增加和焦虑的减少表明，与该技术的互动是成功的，促进了对其在科学写作中应用的更积极看法。然而，测量前后的置信区间重叠，表明这种量表的增加或减少不具有统计学意义。'
- en: '![A dot plot plots mean of Likert-scale items versus UTAUT scales. Values are
    estimated. P E (pre, 5.25) and (post, 5.7). E E (pre, 5.8) and (post, 5.9). A T
    (pre, 5.1) and (post, 5.3). S I (pre, 4.25) and (4.75). F C (pre, 5.3) and (post,
    5.75). S E (pre, 5.2) and (post, 5.21). A N (pre, 2.98) and (post, 3). B I (pre,
    5.5) and (post, 6.1).](html/images/9781032716084_C003_003.jpg)'
  id: totrans-744
  prefs: []
  type: TYPE_IMG
  zh: '![点图显示了李克特量表项的平均值与 UTAUT 量表的关系。数值是估计的。P E (前，5.25) 和 (后，5.7)。E E (前，5.8) 和
    (后，5.9)。A T (前，5.1) 和 (后，5.3)。S I (前，4.25) 和 (4.75)。F C (前，5.3) 和 (后，5.75)。S E
    (前，5.2) 和 (后，5.21)。A N (前，2.98) 和 (后，3)。B I (前，5.5) 和 (后，6.1)。](html/images/9781032716084_C003_003.jpg)'
- en: '[Figure 3.3](#ch11.xhtml#f6b) Comparison of means of UTAUT variables pre- and
    post-measurement. Pre: pre-ChatGPT-use survey; Post: post-ChatGPT-use survey;
    PE: performance expectancy; EE: effort expectancy; AT: attitude toward using technology;
    SI: social influence; FC: facilitating conditions; SE: self-efficacy; AN: anxiety;
    BI: behavioral intention to use ChatGPT.'
  id: totrans-745
  prefs: []
  type: TYPE_NORMAL
  zh: '[图3.3](#ch11.xhtml#f6b) 比较了测量前后的 UTAUT 变量的平均值。前：ChatGPT 使用前的调查；后：ChatGPT 使用后的调查；PE：绩效预期；EE：努力预期；AT：对使用技术的态度；SI：社会影响；FC：促进条件；SE：自我效能；AN：焦虑；BI：使用
    ChatGPT 的行为意向。'
- en: 3.6 Discussion
  id: totrans-746
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 3.6 讨论
- en: In this chapter, we analyzed how LLMs, exemplified by ChatGPT, influence students’
    scientific writing. By surveying an undergraduate seminar, we measured students’
    perceived usefulness and acceptance of ChatGPT for scientific writing and asked
    them open-ended questions about their expectations and experiences on the perceived
    strengths and weaknesses of ChatGPT. The results showed a positive perception
    of students’ regarding ChatGPT, although other concerns emerged.
  id: totrans-747
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们分析了以 ChatGPT 为例的 LLMs 如何影响学生的科学写作。通过调查本科生研讨会，我们测量了学生对 ChatGPT 在科学写作中的感知有用性和接受度，并就他们对
    ChatGPT 感知优势和劣势的期望和经验提出了开放式问题。结果显示，学生对 ChatGPT 的认知是积极的，尽管也出现了其他担忧。
- en: Our results show regular use of ChatGPT by most participants both before and
    after our measurements. This widespread adoption underscores the growing relevance
    of LLMs in educational settings (cf. [Farrokhnia et al., 2023](#ch11.xhtml#r107)).
    Behavioral intention to use ChatGPT increased after ChatGPT use, suggesting that
    structured instruction and exposure to ChatGPT, as well as prompt engineering
    training, enhanced students’ perceived utility of ChatGPT in academic writing.
  id: totrans-748
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的结果显示，大多数参与者在我们的测量前后都定期使用 ChatGPT。这种广泛采用凸显了 LLMs 在教育环境中的日益相关性（参见图 [Farrokhnia
    等人，2023](#ch11.xhtml#r107)）。使用 ChatGPT 后，使用 ChatGPT 的行为意向增加，这表明结构化指导和接触 ChatGPT，以及提示工程培训，增强了学生对
    ChatGPT 在学术写作中感知到的效用。
- en: Overall, comparing the pre- and post-use qualitative responses, we found that
    while practical familiarity with ChatGPT increased, perceptions of its capabilities
    and limitations remained relatively consistent. The increased reliance on ChatGPT
    for seminar writing tasks post-ChatGPT-use raises questions about its impact on
    academic rigor and student effort. This highlights the need for a balanced approach
    to integrating LLMs like ChatGPT in educational settings, ensuring they complement
    rather than replace traditional learning and research methodologies.
  id: totrans-749
  prefs: []
  type: TYPE_NORMAL
  zh: 总体而言，比较使用前后的定性回应，我们发现虽然对ChatGPT的实践熟悉度增加，但对其能力和局限性的看法相对保持一致。ChatGPT使用后对研讨会写作任务的依赖增加，引发了对其对学术严谨性和学生努力的潜在影响的疑问。这突显了在教育环境中整合LLMs如ChatGPT需要平衡的方法，确保它们补充而不是取代传统学习和研究方法。
- en: The post-ChatGPT-use analysis provided valuable insights into the evolving perceptions
    and attitudes of students toward ChatGPT. The seminar appears to have played a
    pivotal role in enhancing students’ understanding and acceptance of the technology,
    as evidenced by the increased scores in most UTAUT variables and the decreased
    anxiety levels. These findings offer important implications for integrating LLMs
    like ChatGPT in educational contexts, emphasizing the need for comprehensive educational
    interventions to maximize their acceptance and utility.
  id: totrans-750
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT使用后的分析提供了关于学生对于ChatGPT不断变化的认识和态度的宝贵见解。研讨会似乎在增强学生对技术的理解和接受方面发挥了关键作用，这从大多数UTAUT变量的得分提高和焦虑水平下降可以看出。这些发现对于在教育环境中整合LLMs如ChatGPT具有重要意义，强调了需要全面的教育干预措施以最大化其接受度和效用。
- en: Consistent with recent literature, students acknowledged ChatGPT’s strengths,
    such as increased creativity and productivity, and identified practical applications
    where it proved beneficial, such as drafting or generating ideas and research
    questions. However, they also identified weaknesses, particularly the lack of
    accurate academic references and instances of incorrect output. Students also
    reported that ChatGPT had limitations, such as the inability to write a seminar
    thesis and make independent decisions. This raises critical questions about the
    impact of such technology on traditional learning methods. While ChatGPT has many
    advantages, including efficiency and accessibility of information, and has been
    widely adopted, these findings underscore the need for a balanced approach to
    integrating ChatGPT into education, ensuring that it complements rather than replaces
    traditional learning methods.
  id: totrans-751
  prefs: []
  type: TYPE_NORMAL
  zh: 与近期文献一致，学生们认可了ChatGPT的优势，例如提高了创造力和生产力，并确定了它在实际应用中的益处，例如起草或生成想法和研究问题。然而，他们也指出了其弱点，尤其是缺乏准确的学术参考文献和错误输出的实例。学生们还报告说，ChatGPT存在局限性，例如无法撰写研讨会论文和做出独立决策。这引发了关于此类技术对传统学习方法影响的重大问题。尽管ChatGPT具有许多优势，包括信息获取的效率和可及性，并且已被广泛采用，但这些发现强调了将ChatGPT融入教育中需要平衡的方法，确保它补充而不是取代传统学习方法。
- en: Although limited by our sample size, the quantitative analysis provided first
    insights into UTAUT factors influencing the acceptance of ChatGPT, with ease of
    use and perceived usefulness emerging as key determinants. These factors are critical
    in understanding the students’ willingness to adopt LLMs like ChatGPT as a part
    of their academic toolkit. Additionally, the influence of social and environmental
    factors cannot be overlooked. The role of peer influence and institutional support
    in ChatGPT adoption highlights the need for a supportive ecosystem to maximize
    the benefits of LLMs in education ([Shoufan, 2023](#ch11.xhtml#r110)).
  id: totrans-752
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管我们的样本量有限，但定量分析首次揭示了影响ChatGPT接受度的UTAUT因素，其中易用性和感知有用性成为关键决定因素。这些因素在理解学生愿意将LLMs如ChatGPT作为其学术工具的一部分至关重要。此外，社会和环境因素的影响不容忽视。同伴影响和机构支持在ChatGPT采用中的作用突显了建立一个支持性生态系统的必要性，以最大化LLMs在教育中的益处
    ([Shoufan, 2023](#ch11.xhtml#r110))。
- en: The correlations for both pre- and post-ChatGPT use are consistent with the
    UTAUT; for example, performance expectancy is a critical predictor of ChatGPT
    adoption ([Venkatesh et al., 2003](#ch11.xhtml#r114)). This suggests that students
    who perceive ChatGPT as beneficial to their academic performance are more likely
    to use it. For educators and developers, this suggests that improving the performance
    capabilities of LLMs, such as customizing ChatGPT to educational contexts, could
    lead to more usage and increased acceptance among students. It also highlights
    the importance of training students in prompt engineering by teaching students
    how to use different prompt techniques and explore multiple prompts before using
    an output to optimize the effectiveness of ChatGPT ([White et al., 2023](#ch11.xhtml#r115)).
  id: totrans-753
  prefs: []
  type: TYPE_NORMAL
  zh: 预后和ChatGPT使用之间的相关性与UTAUT一致；例如，绩效预期是ChatGPT采用的关键预测因素([Venkatesh et al., 2003](#ch11.xhtml#r114))。这表明，认为ChatGPT对其学术表现有益的学生更有可能使用它。对于教育者和开发者来说，这表明通过定制ChatGPT以适应教育环境等方式提高大型语言模型（LLM）的性能能力，可能导致学生使用率更高和接受度增加。这也突出了通过教授学生如何使用不同的提示技术并在使用输出之前探索多个提示来训练学生进行提示工程的重要性([White
    et al., 2023](#ch11.xhtml#r115))。
- en: The rapid advancements of LLMs like ChatGPT provide fertile ground for future
    research in general and for tailoring LLMs to educational needs, such as prompt
    engineering training, customizing LLMs to access scientific literature, and integrating
    LLMs interactively into the curriculum. While newer versions of ChatGPT and other
    LLMs are already working on addressing limitations, such as information accuracy
    and reference validity, future research should also examine the long-term impact
    of LLM integration on learning outcomes and student engagement.
  id: totrans-754
  prefs: []
  type: TYPE_NORMAL
  zh: 类似ChatGPT这样的LLM的快速发展为未来研究提供了肥沃的土壤，包括针对教育需求定制LLM，如提示工程培训、定制LLM以访问科学文献以及将LLM交互式地整合到课程中。虽然ChatGPT和其他LLM的新版本已经在努力解决信息准确性和参考有效性等局限性，但未来的研究也应考察LLM整合对学习成果和学生参与度的长期影响。
- en: A limitation of our study is the inability to make inferential comparisons between
    pre- and post-seminar data due to the sample size limitations. Future studies
    could build on our findings by conducting a multivariate statistical analysis
    to better understand how students’ perceptions, intentions, and experiences evolve
    with the use of ChatGPT ([Shoufan, 2023](#ch11.xhtml#r110)).
  id: totrans-755
  prefs: []
  type: TYPE_NORMAL
  zh: 我们研究的一个局限性是由于样本量限制，无法对研讨会前后数据进行推断性比较。未来的研究可以通过进行多元统计分析来建立在我们发现的基础上，更好地理解学生在使用ChatGPT（[Shoufan,
    2023](#ch11.xhtml#r110)）的过程中，他们的感知、意图和经历是如何演变的。
- en: 3.7 Conclusion
  id: totrans-756
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 3.7 结论
- en: In conclusion, our study of integrating LLMs such as ChatGPT into scientific
    writing seminars reveals a diverse landscape of perceived usefulness and acceptance
    of LLMs among students. LLMs’ significant and regular use underscores their growing
    importance in educational and academic environments. However, while students recognize
    the strengths of LLMs in enhancing creativity and productivity, they also express
    concerns about their limitations, particularly in providing accurate academic
    references and reliable output.
  id: totrans-757
  prefs: []
  type: TYPE_NORMAL
  zh: 总之，我们将ChatGPT等LLM整合到科学写作研讨会中的研究揭示了学生在LLM感知有用性和接受度方面的一个多样化景观。LLM的显著和常规使用强调了它们在教育环境和学术环境中的日益重要性。然而，尽管学生认识到LLM在增强创造力和生产力方面的优势，他们也对它们的局限性表示担忧，尤其是在提供准确的学术参考和可靠的输出方面。
- en: Future studies should focus on how LLMs, such as ChatGPT, can be further developed
    to meet the specific needs of academic environments, particularly in improving
    information accuracy and reference validity. Teachers could adapt LLMs to access
    scientific literature and should interactively teach students how to use LLMs
    through prompt engineering techniques. In addition, the long-term impact of integrating
    LLMs on learning outcomes and student engagement should be explored. As we navigate
    integrating LLMs into education, it is critical to maintain a balanced approach,
    ensuring that these tools complement traditional learning methods and foster an
    environment that enhances students’ overall learning experience without compromising
    academic integrity.
  id: totrans-758
  prefs: []
  type: TYPE_NORMAL
  zh: 未来研究应关注如何进一步发展LLM（如ChatGPT），以满足学术环境的具体需求，特别是在提高信息准确性和参考有效性方面。教师可以将LLM应用于访问科学文献，并通过提示工程技术与学生互动教学如何使用LLM。此外，应探讨整合LLM对学习成果和学生参与度长期影响的探索。在我们将LLM整合到教育中的过程中，保持平衡的方法至关重要，确保这些工具补充传统学习方法，并营造一个增强学生整体学习体验的环境，同时不损害学术诚信。
