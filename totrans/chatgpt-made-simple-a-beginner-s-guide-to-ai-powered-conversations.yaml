    ****o**ur** ****capa**biliti**es ****wh**ile** ****ens**urin**g ****eth**ica**l
    ****stan**dard**s ****a**re** ****m**et**.'
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
  zh: '**作为用户和倡导者，我们有责任以深思熟虑的方式参与人工智能。这意味着保持信息灵通，了解局限性，并呼吁在人工智能的设计和开发中实现透明度。像ChatGPT这样的工具不应取代人类专业知识，而应作为补充伙伴，在确保达到伦理标准的同时，增强我们的能力。**'
