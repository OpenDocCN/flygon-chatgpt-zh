  zh: '[PRE108]'
- en: The ability to specify input values from the command line provides useful functionality.
    For example, suppose that you have a custom Python class that contains the methods
    add and subtract to add and subtract a pair of numbers.
  id: totrans-757
  prefs: []
  type: TYPE_NORMAL
  zh: 从命令行指定输入值的功能非常有用。例如，假设您有一个包含 add 和 subtract 方法的自定义 Python 类，用于添加和减去一对数字。
- en: 'You can use command-line arguments to specify which method to execute on a
    pair of numbers, as shown here:'
  id: totrans-758
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以使用命令行参数指定对一对数字执行哪个方法，如下所示：
- en: '[PRE109]'
  id: totrans-759
  prefs: []
  type: TYPE_PRE
  zh: '[PRE109]'
- en: This functionality is very useful because you can programmatically execute different
    methods in a Python class, which means that you can write unit tests for your
    code as well. Read [Chapter 8](ch08.xhtml) to learn how to create custom classes.
  id: totrans-760
  prefs: []
  type: TYPE_NORMAL
  zh: 这种功能非常有用，因为您可以在 Python 类中程序化地执行不同的方法，这意味着您可以为您自己的代码编写单元测试。阅读[第 8 章](ch08.xhtml)了解如何创建自定义类。
