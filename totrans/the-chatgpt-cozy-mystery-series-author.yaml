  prefs: []
  type: TYPE_NORMAL
- en: AI tools such as ChatGPT provide a starting point for triggering your own ideas
    for characters, external and internal conflicts, and settings. These ideas are
    presented as suggestions  designed to spark your imagination and creativity.
  prefs: []
  type: TYPE_NORMAL
- en: Won’t my work be stilted and robotic?
  prefs: []
  type: TYPE_NORMAL
- en: ChatGPT, Claude, Sudowrite, Novel Crafter, and the numerous AI fiction-support
    software platforms available online are tools.
  prefs: []
  type: TYPE_NORMAL
- en: Not replacements for your style or unique voice.
  prefs: []
  type: TYPE_NORMAL
- en: New, more sophisticated options are already being developed, but right now they
    are valuable tools that any genre fiction author can use to transform their productivity
    and output – saving time, energy, and money so that you can focus on the quality
    of the cozy mystery fiction produced.
  prefs: []
  type: TYPE_NORMAL
- en: Use their suggestions and outputs as inspiration and ideas for how your book
