  zh: 在与ChatGPT的每一次有意义的互动中，其核心要素是一个经常被忽视的、看似简单的元素：**提示词**。在拉伊曼的术语中，提示词是我们提供给模型以获取答案的指令或问题。然而，将提示词简化为简单的短语或命令将会低估它们的强大和重要性。提示词不是更多的要求；它们是解锁ChatGPT巨大潜力的关键，将之从被动的系统转变为一个积极和富有创造力的合作伙伴。
