  zh: '![13询问YouTube结果](image_rsrc1ZS.jpg)'
- en: Figure 48\. Ask YouTube Application Result
  id: totrans-1408
  prefs: []
  type: TYPE_NORMAL
  zh: 图48. 询问YouTube应用程序结果
- en: You can pass a YouTube short link or full link. It will work as shown above.
  id: totrans-1409
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以传递YouTube短链接或完整链接。它将按上述方式工作。
- en: Handling Transcript Doesn’t Exist Error
  id: totrans-1410
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 处理不存在文本记录错误
- en: 'Because YouTube music videos don’t have transcripts, you’ll get an error when
    you give one to the application:'
  id: totrans-1411
  prefs: []
  type: TYPE_NORMAL
  zh: 由于YouTube音乐视频没有文本记录，当您将其提供给应用程序时，您会得到一个错误：
- en: 'ValueError: Expected IDs to be a non-empty list, got []'
  id: totrans-1412
  prefs: []
  type: TYPE_NORMAL
  zh: 'ValueError: 预期ID列表非空，但得到 []'
- en: This error occurs because the YoutubeLoader loads an empty document list, so
    that empty list gets passed into Chroma.from_documents() method.
  id: totrans-1413
  prefs: []
  type: TYPE_NORMAL
  zh: 这个错误发生是因为YoutubeLoader加载了一个空的文档列表，因此这个空列表被传递到Chroma.from_documents()方法中。
- en: 'To prevent this error, you need to check if the docs variable is not empty
    before running further process:'
  id: totrans-1414
  prefs: []
  type: TYPE_NORMAL
  zh: 为了防止此错误，在运行进一步处理之前，您需要检查docs变量是否不为空：
- en: 'if docs:'
  id: totrans-1415
  prefs: []
  type: TYPE_NORMAL
  zh: 'if docs:'
- en: text_splitter = RecursiveCharacterTextSplitter(
  id: totrans-1416
  prefs: []
  type: TYPE_NORMAL
  zh: text_splitter = RecursiveCharacterTextSplitter(
- en: chunk_size=1000, chunk_overlap=200
  id: totrans-1417
  prefs: []
  type: TYPE_NORMAL
  zh: chunk_size=1000, chunk_overlap=200
- en: )
  id: totrans-1418
  prefs: []
  type: TYPE_NORMAL
  zh: )
- en: chunks = text_splitter.split_documents(docs)
  id: totrans-1419
  prefs: []
  type: TYPE_NORMAL
  zh: chunks = text_splitter.split_documents(docs)
- en: '# ...'
  id: totrans-1420
  prefs: []
  type: TYPE_NORMAL
  zh: '# ...'
- en: st.session_state.crc = conversational_rag_chain
  id: totrans-1421
  prefs: []
  type: TYPE_NORMAL
  zh: st.session_state.crc = conversational_rag_chain
- en: st.success("Video processed. Ask your questions")
  id: totrans-1422
  prefs: []
  type: TYPE_NORMAL
  zh: st.success("视频处理完成。提出您的问题")
- en: 'else:'
  id: totrans-1423
  prefs: []
  type: TYPE_NORMAL
  zh: 'else:'
- en: st.error("Video has no transcript. Please try another video")
  id: totrans-1424
  prefs: []
  type: TYPE_NORMAL
  zh: st.error("视频没有文本记录。请尝试另一个视频")
- en: 'This way, an error message is shown when the video has no transcript, and no
    error is thrown by ChromaDB:'
  id: totrans-1425
  prefs: []
  type: TYPE_NORMAL
  zh: 这样，当视频没有文本记录时，会显示错误消息，而ChromaDB不会抛出错误：
- en: '![13 no transcript](image_rsrc1ZT.jpg)'
  id: totrans-1426
  prefs: []
  type: TYPE_IMG
  zh: '![13无文本记录](image_rsrc1ZT.jpg)'
- en: Figure 49\. No Transcript Detected
  id: totrans-1427
  prefs: []
  type: TYPE_NORMAL
  zh: 图49. 未检测到文本记录
- en: Without the transcript, we can’t generate vector data.
  id: totrans-1428
  prefs: []
  type: TYPE_NORMAL
  zh: 没有文本记录，我们无法生成向量数据。
- en: Summary
  id: totrans-1429
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: The code for this chapter is available in the folder 13_Chat_With_Youtube from
    the book source code.
  id: totrans-1430
  prefs: []
  type: TYPE_NORMAL
  zh: 本章的代码可在书籍源代码的13_Chat_With_Youtube文件夹中找到。
- en: In this chapter, you’ve learned how to create a Chat With YouTube application
    that fetches a YouTube video transcript using the URL, and then converts the transcript
    into vectors, which can be used to augment the LLM knowledge.
  id: totrans-1431
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，你学习了如何创建一个使用URL获取YouTube视频文本记录的Chat With YouTube应用程序，然后将文本记录转换为向量，这些向量可以用来增强LLM的知识。
- en: By using AI, you can ask for the key points or summary of a long video without
    having to watch the video yourself.
  id: totrans-1432
  prefs: []
  type: TYPE_NORMAL
  zh: 通过使用AI，您可以在不观看视频的情况下请求长视频的关键点或摘要。
- en: 'Chapter 14: Interacting With Images Using Multimodal Messages'
  id: totrans-1433
  prefs: []
  type: TYPE_NORMAL
  zh: 第14章：使用多模态消息与图像交互
- en: Now that we can load different types of documents, let’s continue with making
    AI understand images.
  id: totrans-1434
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们能够加载不同类型的文档，让我们继续制作让AI理解图像。
- en: Understanding Multimodal Messages
  id: totrans-1435
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 理解多模态消息
- en: A multimodal message is a message that uses more than one mode of communication
    to communicate.
  id: totrans-1436
  prefs: []
  type: TYPE_NORMAL
  zh: 多模态消息是使用多种通信模式进行交流的消息。
- en: 'The communication modes known to humans are:'
  id: totrans-1437
  prefs: []
  type: TYPE_NORMAL
  zh: 人类已知的信息交流模式有：
- en: '| ​▪​ | Text |'
  id: totrans-1438
  prefs: []
  type: TYPE_TB
  zh: '|  | 文本 |'
- en: '| ​▪​ | Video |'
  id: totrans-1439
  prefs: []
  type: TYPE_TB
  zh: '|  | 视频 |'
- en: '| ​▪​ | Audio |'
  id: totrans-1440
  prefs: []
  type: TYPE_TB
  zh: '|  | 音频 |'
- en: '| ​▪​ | Image |'
  id: totrans-1441
  prefs: []
  type: TYPE_TB
  zh: '|  | 图像 |'
- en: Advanced models like GPT-4 and Gemini Pro already have vision capabilities,
    meaning the models can "see" images and answer questions about them.
  id: totrans-1442
  prefs: []
  type: TYPE_NORMAL
  zh: 高级模型如GPT-4和Gemini Pro已经具备视觉能力，这意味着模型可以“看到”图像并回答有关它们的问题。
- en: By sending a multimodal message, we can use AI to interact with images, like
    asking how many persons are shown on an image or what color is dominant in the
    image.
  id: totrans-1443
  prefs: []
  type: TYPE_NORMAL
  zh: 通过发送多模态消息，我们可以使用AI与图像交互，例如询问图像中有多少人或图像中的主导颜色是什么。
- en: Let’s learn how to create such application using LangChain next.
  id: totrans-1444
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们学习如何使用 LangChain 创建这样的应用程序。
- en: Sending Multimodal Messages in LangChain
  id: totrans-1445
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 在 LangChain 中发送多模态消息
- en: To send a multimodal message in LangChain, you only need to adjust the prompt
    template and pass a list instead of a string for the human message.
  id: totrans-1446
  prefs: []
  type: TYPE_NORMAL
  zh: 要在 LangChain 中发送多模态消息，您只需调整提示模板，并将人类消息传递为一个列表而不是一个字符串。
- en: 'First, create a new file named handle_image.py, import the required packages,
    and define the LLM to use as follows:'
  id: totrans-1447
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，创建一个名为 handle_image.py 的新文件，导入所需的包，并定义要使用的 LLM，如下所示：
- en: from decouple import config
  id: totrans-1448
  prefs: []
  type: TYPE_NORMAL
  zh: from decouple import config
- en: from langchain_openai import ChatOpenAI
  id: totrans-1449
  prefs: []
  type: TYPE_NORMAL
  zh: from langchain_openai import ChatOpenAI
- en: from langchain_core.prompts import ChatPromptTemplate
  id: totrans-1450
  prefs: []
  type: TYPE_NORMAL
  zh: from langchain_core.prompts import ChatPromptTemplate
- en: import base64
  id: totrans-1451
  prefs: []
  type: TYPE_NORMAL
  zh: import base64
- en: OPENAI_KEY = config("OPENAI_KEY")
  id: totrans-1452
  prefs: []
  type: TYPE_NORMAL
  zh: OPENAI_KEY = config("OPENAI_KEY")
- en: llm = ChatOpenAI(model="gpt-4o", api_key=OPENAI_KEY)
  id: totrans-1453
  prefs: []
  type: TYPE_NORMAL
  zh: llm = ChatOpenAI(model="gpt-4o", api_key=OPENAI_KEY)
- en: The base64 module will be used to encode images in base 64 format.
  id: totrans-1454
  prefs: []
  type: TYPE_NORMAL
  zh: 将使用 base64 模块以 base 64 格式编码图片。
- en: 'Write the function to encode images below the llm variable:'
  id: totrans-1455
  prefs: []
  type: TYPE_NORMAL
  zh: 在 llm 变量下方编写编码图片的函数：
- en: 'def encode_image(image_path):'
  id: totrans-1456
  prefs: []
  type: TYPE_NORMAL
  zh: 'def encode_image(image_path):'
- en: 'with open(image_path, "rb") as image_file:'
  id: totrans-1457
  prefs: []
  type: TYPE_NORMAL
  zh: 'with open(image_path, "rb") as image_file:'
- en: return base64.b64encode(image_file.read()).decode("utf-8")
  id: totrans-1458
  prefs: []
  type: TYPE_NORMAL
  zh: return base64.b64encode(image_file.read()).decode("utf-8")
- en: image = encode_image("./image-1.jpg")
  id: totrans-1459
  prefs: []
  type: TYPE_NORMAL
  zh: image = encode_image("./image-1.jpg")
- en: You can pass any image you have on your computer to the encode_image() function.
    Just make sure it doesn’t contain any sensitive data.
  id: totrans-1460
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以将您电脑上的任何图片传递给 encode_image() 函数。只需确保图片中不包含任何敏感数据。
- en: 'The encoded image can then be passed into a chat prompt template as follows:'
  id: totrans-1461
  prefs: []
  type: TYPE_NORMAL
  zh: 编码后的图片可以按如下方式传递到聊天提示模板中：
- en: prompt = ChatPromptTemplate.from_messages(
  id: totrans-1462
  prefs: []
  type: TYPE_NORMAL
  zh: prompt = ChatPromptTemplate.from_messages(
- en: '['
  id: totrans-1463
  prefs: []
  type: TYPE_NORMAL
  zh: '['
- en: ("system", "You are a helpful assistant that can describe images in detail."),
  id: totrans-1464
  prefs: []
  type: TYPE_NORMAL
  zh: ("system", "您是一个能够详细描述图片的有用助手。"),
- en: (
  id: totrans-1465
  prefs: []
  type: TYPE_NORMAL
  zh: (
- en: '"human",'
  id: totrans-1466
  prefs: []
  type: TYPE_NORMAL
  zh: '"human",'
- en: '['
  id: totrans-1467
  prefs: []
  type: TYPE_NORMAL
  zh: '['
- en: '{"type": "text", "text": "{input}"},'
  id: totrans-1468
  prefs: []
  type: TYPE_NORMAL
  zh: '{"type": "text", "text": "{input}"},'
- en: '{'
  id: totrans-1469
  prefs: []
  type: TYPE_NORMAL
  zh: '{'
- en: '"type": "image_url",'
  id: totrans-1470
  prefs: []
  type: TYPE_NORMAL
  zh: '"type": "image_url",'
- en: '"image_url": {'
  id: totrans-1471
  prefs: []
  type: TYPE_NORMAL
  zh: '"image_url": {'
- en: '"url": f"data:image/jpeg;base64,{image}",'
  id: totrans-1472
  prefs: []
  type: TYPE_NORMAL
  zh: '"url": f"data:image/jpeg;base64,{image}",'
- en: '"detail": "low",'
  id: totrans-1473
  prefs: []
  type: TYPE_NORMAL
  zh: '"detail": "low",'
- en: '},'
  id: totrans-1474
  prefs: []
  type: TYPE_NORMAL
  zh: '},'
- en: '},'
  id: totrans-1475
  prefs: []
  type: TYPE_NORMAL
  zh: '},'
- en: '],'
  id: totrans-1476
  prefs: []
  type: TYPE_NORMAL
  zh: '],'
- en: ),
  id: totrans-1477
  prefs: []
  type: TYPE_NORMAL
  zh: ),
- en: ']'
  id: totrans-1478
  prefs: []
  type: TYPE_NORMAL
  zh: ']'
- en: )
  id: totrans-1479
  prefs: []
  type: TYPE_NORMAL
  zh: )
- en: 'In the template above, you can see that there are two messages passed as the
    human message: the "text" for the question and the "image_url" for the image.'
  id: totrans-1480
  prefs: []
  type: TYPE_NORMAL
  zh: 在上面的模板中，您可以看到有两个消息作为人类消息传递：问题的 "text" 和图片的 "image_url"。
- en: We can pass a public image url such as 'https://', but here we use the data:image
    URI because we upload an image from our computer.
  id: totrans-1481
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以传递一个公开的图片 URL，例如 'https://'，但在这里我们使用 data:image URI，因为我们是从电脑上传图片。
- en: Behind the scenes, LangChain automatically converts the message into a multimodal
    message.
  id: totrans-1482
  prefs: []
  type: TYPE_NORMAL
  zh: 在幕后，LangChain 自动将消息转换为多模态消息。
- en: 'Create a chain from the prompt and the llm, and ask the user for an input:'
  id: totrans-1483
  prefs: []
  type: TYPE_NORMAL
  zh: 从提示和 llm 创建链，并请求用户输入：
- en: chain = prompt | llm
  id: totrans-1484
  prefs: []
  type: TYPE_NORMAL
  zh: chain = prompt | llm
- en: 'response = chain.invoke({"input": "What do you see on this image?"})'
  id: totrans-1485
  prefs: []
  type: TYPE_NORMAL
  zh: 'response = chain.invoke({"input": "在这张图片上您看到了什么？"})'
- en: print(response.content)
  id: totrans-1486
  prefs: []
  type: TYPE_NORMAL
  zh: print(response.content)
- en: The LLM will process the image, and then give you the appropriate answer.
  id: totrans-1487
  prefs: []
  type: TYPE_NORMAL
  zh: LLM 将处理图片，然后给出适当的答案。
- en: Adding UI and Chat History
  id: totrans-1488
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 添加 UI 和聊天历史
- en: Now that you can ask questions about an image using a language model, let’s
    improve the application by adding a web interface and chat history.
  id: totrans-1489
  prefs: []
  type: TYPE_NORMAL
  zh: 现在您可以使用语言模型对图片提出问题，让我们通过添加网页界面和聊天历史来改进应用程序。
- en: 'As always, import the packages needed to add the web interface and history
    first:'
  id: totrans-1490
  prefs: []
  type: TYPE_NORMAL
  zh: 如往常一样，首先导入添加网页界面和历史的所需包：
- en: from decouple import config
  id: totrans-1491
  prefs: []
  type: TYPE_NORMAL
  zh: from decouple import config
- en: from langchain_openai import ChatOpenAI
  id: totrans-1492
  prefs: []
  type: TYPE_NORMAL
  zh: from langchain_openai import ChatOpenAI
- en: import streamlit as st
  id: totrans-1493
  prefs: []
  type: TYPE_NORMAL
  zh: import streamlit as st
- en: Adding History from langchain_core.prompts import ChatPromptTemplate, MessagesPlaceholder
  id: totrans-1494
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 添加来自 langchain_core.prompts 的历史记录
- en: from langchain_community.chat_message_histories import StreamlitChatMessageHistory
  id: totrans-1495
  prefs: []
  type: TYPE_NORMAL
  zh: from langchain_community.chat_message_histories import StreamlitChatMessageHistory
- en: from langchain_core.runnables.history import RunnableWithMessageHistory
  id: totrans-1496
  prefs: []
  type: TYPE_NORMAL
  zh: from langchain_core.runnables.history import RunnableWithMessageHistory
- en: import os, base64
  id: totrans-1497
  prefs: []
  type: TYPE_NORMAL
  zh: import os, base64
- en: Next, you need to instantiate Streamlit chat history and upgrade the chain to
    include chat history, similar to Chapter 9.
  id: totrans-1498
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，您需要实例化 Streamlit 聊天历史并升级链以包括聊天历史，类似于第 9 章。
- en: 'You also need to create a process_image() function, which will encode the image
    and store it in session state:'
  id: totrans-1499
  prefs: []
  type: TYPE_NORMAL
  zh: 您还需要创建一个 process_image() 函数，该函数将编码图片并将其存储在会话状态中：
