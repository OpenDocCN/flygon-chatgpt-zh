  type: TYPE_NORMAL
- en: Fill-in-the-blank vs. Open-ended prompts
  id: totrans-71
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In this product, you’ll mostly find fill-in-the-blank and openended ChatGPT
    prompts.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
- en: 'Using open-ended and fill-in-the-blank prompts for ChatGPT is a powerful way
    to generate responses and insights that can help you achieve your business goals.
    Here''s how to use them effectively:'
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
- en: '• 1) Open-ended prompts: Open-ended prompts are designed to elicit a wide range
    of responses and ideas from ChatGPT. When using open-ended prompts, be as broad
    as possible, avoiding specific terms or jargon that may limit the range of responses
    you receive.'
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: • 1) 开放式提示：开放式提示旨在从ChatGPT那里获得广泛范围的响应和想法。在使用开放式提示时，尽可能广泛，避免可能限制你收到的响应范围的特定术语或行话。
- en: '• Example: "What are some innovative ideas for improving customer engagement
    in my industry?"'
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: • 示例："针对我的行业，有哪些提高客户参与度的创新想法？"
- en: '• 2) Fill-in-the-blank prompts: Fill-in-the-blank prompts provide a framework
    for ChatGPT to generate responses that are specific to your needs. When using
    fill-in-theblank prompts, be as specific as possible, providing clear details
    about the information you want to receive.'
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: • 2) 填空提示：填空提示为ChatGPT生成针对你需求的特定响应提供了一个框架。在使用填空提示时，尽可能具体，提供关于你想要获得的信息的明确细节。
- en: '• Example: "I want to generate a sales email that focuses on [insert product
    name]. What are some key selling points that I should include?"'
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: • 示例："我想生成一封以[插入产品名称]为重点的销售邮件。我应该包括哪些关键卖点？"
- en: By using a combination of open-ended and fill-in-the-blank prompts, you can
    generate a wide range of responses that are tailored to your needs and goals.
    Remember to analyze these responses carefully, refining your prompts and inputs
    over time to get better and more accurate results. With practice, you can use
    ChatGPT to generate powerful insights and ideas that can help you achieve your
    business goals.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 通过结合使用开放式和填空提示，你可以生成一系列针对你的需求和目标的响应。记住要仔细分析这些响应，随着时间的推移改进你的提示和输入，以获得更好和更准确的结果。通过实践，你可以使用ChatGPT生成强大的见解和想法，帮助你实现商业目标。
- en: Crack How ChatGPT Works
  id: totrans-79
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 揭秘ChatGPT的工作原理
- en: 'Here are some prompts that you can use to ask ChatGPT about how it works:'
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一些你可以用来询问ChatGPT如何工作的提示：
- en: • "What is ChatGPT, and how does it work?"
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: • "ChatGPT是什么，它是如何工作的？"
- en: • "How does ChatGPT generate responses to my prompts?"
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: • "ChatGPT是如何对我的提示生成响应的？"
- en: • "What is the training data used by Chat GPT to generate responses?"
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: • "ChatGPT用于生成响应的训练数据是什么？"
- en: • "How does ChatGPT learn from my inputs and improve its responses over time?"
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: • "ChatGPT是如何从我的输入中学习并随着时间的推移改进其响应的？"
- en: • "What are some best practices for using ChatGPT effectively?"
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: • "使用ChatGPT的有效性有哪些最佳实践？"
- en: • "How accurate are the responses generated by ChatGPT, and what factors can
    impact accuracy?"
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: • "ChatGPT生成的响应有多准确，哪些因素会影响准确性？"
- en: • "Can ChatGPT understand natural language inputs, and how does it interpret
    them?"
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: • "ChatGPT能否理解自然语言输入，它是如何解释它们的？"
- en: • "What are the limitations of ChatGPT, and what types of prompts or inputs
    may not work as well?"
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: • "ChatGPT的限制是什么，哪些类型的提示或输入可能效果不佳？"
- en: • "How can I evaluate the quality of responses generated by ChatGPT?"
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: • "我如何评估ChatGPT生成的响应的质量？"
- en: • "Are there any tips or tricks that can help me get better results when using
    ChatGPT?"
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: • "有什么技巧或窍门可以帮助我在使用ChatGPT时获得更好的结果？"
- en: By asking these types of questions, you can gain a better understanding of how
    ChatGPT works, what it can do, and how to use it most effectively. You can use
    this information to craft more effective prompts, refine your inputs, and generate
    more accurate and insightful responses over time.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 通过提出这类问题，你可以更好地了解ChatGPT的工作原理、它能做什么以及如何最有效地使用它。你可以利用这些信息来制定更有效的提示，改进你的输入，并在一段时间内生成更准确和有洞察力的响应。
- en: 2\. General Business Toolkit
  id: totrans-92
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 2. 通用商业工具包
- en: Researching Your Competitors
  id: totrans-93
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 研究你的竞争对手
- en: '• Here are the names of my top competitors in [industry]: [competitor 1], [competitor
    2], and [competitor 3]. Generate an analysis of their strengths, weaknesses, and
    market position.'
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: • 这里是我所在[行业]中的主要竞争对手的名称：[竞争对手1]、[竞争对手2]和[竞争对手3]。生成对他们优势、劣势和市场位置的的分析。
- en: • Here is a list of the key products or services offered by my top competitors.
    [Product 1] by [Company 1], [Product 2] by [Company 2]. Analyze their pricing,
    features, and marketing strategies to gain insights into their competitive position.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: • 这里是我主要竞争对手提供的关键产品或服务的列表。[产品1]由[公司1]提供，[产品2]由[公司2]提供。分析他们的定价、功能和营销策略，以了解他们的竞争地位。
- en: • Please provide a list of the marketing channels used by my top competitors.
    Analyze their messaging, targeting, and customer engagement strategies to identify
    areas for improvement and gain a competitive advantage.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: • 请提供我主要竞争对手使用的营销渠道列表。分析他们的信息传递、目标受众和客户参与策略，以确定改进领域并获得竞争优势。
- en: 'OPEN-ENDED PROMPTS:'
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 开放式提示：
- en: • "Who are my main competitors in the [industry/niche] and how do they compare
    to [my company/product]?"
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: • “在[行业/细分市场]中，我的主要竞争对手是谁，他们与[我的公司/产品]相比如何？”
- en: • "What are my competitors' [strengths/weaknesses] and how can I use this information
    to gain a competitive advantage?"
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: • “我的竞争对手的[优势/劣势]是什么，我如何利用这些信息获得竞争优势？”
- en: • "What kind of [products/services] do my competitors offer and how do they
    compare to [my company/product]?"
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: • “我的竞争对手提供什么样的[产品/服务]，它们与[我的公司/产品]相比如何？”
- en: • "What kind of [pricing strategies] do my competitors use and how do they compare
    to [my company/product]?"
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: • “我的竞争对手使用什么样的[定价策略]，它们与[我的公司/产品]相比如何？”
- en: • "What kind of [marketing strategies] do my competitors use and how effective
    are they in [generating leads/attracting customers]?"
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: • “我的竞争对手使用什么样的[营销策略]，它们在[生成线索/吸引客户]方面效果如何？”
- en: • "What kind of [content] do my competitors publish and how can I create better
    content to compete with them?"
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: • “我的竞争对手发布什么样的[内容]，我如何创造更好的内容来与他们竞争？”
- en: • "What kind of [social media presence] do my competitors have and how can I
    leverage social media to compete with them?"
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: • “我的竞争对手拥有什么样的[社交媒体存在感]，我如何利用社交媒体来与他们竞争？”
- en: • "What kind of [customer service/support] do my competitors provide and how
    can I improve my own customer service/support to compete with them?"
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: • “我的竞争对手提供什么样的[客户服务/支持]，我如何改进自己的客户服务/支持以与他们竞争？”
- en: • "What kind of [SEO strategies] do my competitors use and how can I improve
    my own SEO to compete with them?"
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: • “我的竞争对手使用什么样的[SEO策略]，我如何改进自己的SEO以与他们竞争？”
- en: • "What kind of [partnerships/collaborations] do my competitors have and how
    can I establish similar relationships to gain a competitive advantage?"
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: • “我的竞争对手有哪些[合作伙伴/合作]，我如何建立类似的关系以获得竞争优势？”
- en: 'EXAMPLES: ![](image_rsrcUV.jpg)'
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：![](image_rsrcUV.jpg)
- en: Creating a Business Plan
  id: totrans-109
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 制定商业计划
- en: 'FILL-IN-THE-BLANK PROMPTS:'
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 填空提示：
- en: • Write a business plan for my business called **[name of the company]** that
    sells **[product]** to **[niche]** and wants to **[goals]**.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: • 为我的名为**[公司名称]**的业务撰写商业计划，该业务向**[细分市场]**销售**[产品]**并希望**[目标]**。
- en: • Write a business plan for my business called **[name of the company]** that
    sells **[product]** to **[niche]** and wants to **[goals]**. Include an executive
    summary, financial calculations of expected costs, sales and profit, and company
    mission and vision. Use a formal tone and statistics.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: • 为我的名为**[公司名称]**的业务撰写商业计划，该业务向**[细分市场]**销售**[产品]**并希望**[目标]**。包括执行摘要、预期成本、销售额和利润的财务计算，以及公司使命和愿景。使用正式的语气和统计数据。
- en: • I want to reach **[goal]** with my company and I require performance targets
    for my team. Please write an outline of quarterly milestones and roles accountable
    for each milestone.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: • 我希望我的公司能够达到**[目标]**，并为我的团队设定绩效目标。请列出季度里程碑和每个里程碑的责任人。
- en: • Write a list of specific, measurable, and attainable goals for **[company
    or project]** using the OKR framework.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: • 使用OKR框架，为**[公司或项目]**列出具体、可衡量和可实现的目标。
- en: '• Turn this vision into a SMART goal: **[insert vision]**. Include the most
    important outcomes and deliverables.'
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: • 将这个愿景转化为SMART目标：**[插入愿景]**。包括最重要的成果和可交付成果。
- en: 'OPEN-ENDED PROMPTS:'
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 开放式提示：
- en: • “What is my business idea? What products or services will I offer, and how
    will they be different or unique compared to competitors?”
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: • “我的商业理念是什么？我将提供哪些产品或服务，它们与竞争对手相比有何不同或独特之处？”
- en: • “Who is my target market? What are their needs and pain points, and how will
    my products or services address them?”
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: • “我的目标市场是谁？他们的需求和痛点是什么，我的产品或服务将如何解决这些问题？”
- en: • “What is my marketing and sales strategy? How will I reach and engage with
    my target audience, and what channels or tactics will I use to promote my business?”
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: • “我的营销和销售策略是什么？我将如何接触和吸引目标受众，以及我将使用哪些渠道或策略来推广我的业务？”
- en: • “How will I structure and organize my business? What legal structure will
    I use, and how will I manage finances and operations?”
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: • “我将如何构建和组织我的业务？我将使用什么样的法律结构，以及我将如何管理财务和运营？”
- en: • “What are my financial projections and goals? How much revenue do I expect
    to generate in the first year, and how will I invest in growth and expansion over
    time?”
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: • “我的财务预测和目标是什么？我预计在第一年能产生多少收入，我将如何随着时间的推移投资于增长和扩张？”
- en: • “What are the key risks and challenges that my business may face, and how
    will I mitigate or address them?”
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: • “我的业务可能面临哪些关键风险和挑战，我将如何减轻或解决它们？”
- en: • “Who are the key members of my team, and what roles and responsibilities will
    they have? How will I recruit and retain talented employees as the business grows?”
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: • “我的团队的关键成员是谁，他们将承担哪些角色和责任？随着业务的发展，我将如何招聘和留住有才华的员工？”
- en: • “What are my short-term and long-term goals for the business, and how will
    I measure progress and success?”
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: • “我的业务短期和长期目标是什么，我将如何衡量进度和成功？”
- en: • “How will I stay competitive and adapt to changes in the market or industry
    over time? What strategies will I use to innovate and stay ahead of the curve?”
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: • “我如何保持竞争力并适应市场或行业随时间的变化？我将使用哪些策略来创新并保持领先？”
- en: • “How will I fund the business and manage cash flow? What sources of financing
    or investment will I use, and how will I budget and manage expenses?”
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: • “我该如何为业务提供资金并管理现金流？我将使用哪些融资或投资来源，以及我将如何制定预算和管理费用？”
- en: 'EXAMPLES:'
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：
- en: '![](image_rsrcUW.jpg)'
  id: totrans-128
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrcUW.jpg)'
- en: Writing Proposals for Clients
  id: totrans-129
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 为客户撰写提案
- en: FILL-IN-THE-BLANK PROMPTS**:**
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 填空提示：**
- en: • Write a proposal for my **[potential client]** who is struggling with **[pain
    points]**. These are the services that I offer **[list services]**. Make the proposal
    **[describe the tone of voice]**.
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: • 为我那些在**[痛点]**方面有困难的**[潜在客户]**撰写一个提案。以下是我提供的**[服务]**。使提案**[描述语气]**。
- en: • Write a proposal for my potential **[client]** who is struggling with **[pain
    points]**. These are the services that I offer **[list services]**. Here is my
    proposed **[pricing]** and **[timeline]** for delivery. Make the proposal **[describe
    the tone of voice]**.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: • 为我那些在**[痛点]**方面有困难的潜在**[客户]**撰写一个提案。以下是我提供的**[服务]**。以下是我的交付**[定价]**和**[时间表]**。使提案**[描述语气]**。
- en: • I am pitching a project to **[insert company/organization name]** and need
    to write a proposal. The project is focused on **[insert project scope]**. What
    are the key deliverables and timeline for the project? How will I ensure that
    the project meets their needs? Write a proposal that is concise and persuasive.
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: • 我正在向**[插入公司/组织名称]**推销一个项目，并需要撰写一个提案。该项目专注于**[插入项目范围]**。项目的关键交付成果和进度表是什么？我将如何确保项目满足他们的需求？撰写一个简洁而有说服力的提案。
- en: 'OPEN-ENDED PROMPTS:'
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 开放式提示：
- en: • “How can [services] help a client business in [industry] achieve its goals
    and objectives?”
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: • “[服务]如何帮助[行业]的客户业务实现其目标和目标？”
- en: • “How can a business in [industry] stand out from competitors?”
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: • “[行业]中的企业如何从竞争对手中脱颖而出？”
- en: • “How can we help [type of business] improve the efficiency and productivity
    of another business?”
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: • “我们如何帮助[业务类型]提高另一家企业的效率和生产力？”
- en: • “What solutions can a [type of business] provide to address any current pain
    points or challenges in the market?”
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: • “[业务类型]可以提供哪些解决方案来解决市场上任何当前的痛点或挑战？”
- en: • “How can a [type of business] assist a client in expanding its customer base
    and reaching new markets?”
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: • “一种[业务类型]如何帮助客户扩大客户群并进入新市场？”
- en: • What steps can a [type of business] take to improve customer satisfaction
    and loyalty?”
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: • [业务类型]可以采取哪些步骤来提高客户满意度和忠诚度？”
- en: • “How can our [type of services] stay ahead of industry trends and innovation?”
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: • “我们的[服务类型]如何保持领先于行业趋势和创新？”
- en: • “How can [type of industry] demonstrate the ROI and potential impact of its
    services to clients?”
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: • “[行业类型]如何向客户展示其服务的投资回报率和潜在影响？”
- en: 'EXAMPLES: ![](image_rsrcUX.jpg)'
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：![](image_rsrcUX.jpg)
- en: Company Vision Statement
  id: totrans-144
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 公司愿景声明
- en: FILL-IN-THE-BLANK PROMPTS**:**
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 填空提示：**
- en: '• Generate a company vision statement that includes:'
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: • 制定一个公司愿景声明，包括：
- en: '• Introduction: "Our vision is to **[insert your vision statement, such as
    ''change the world'', ''disrupt the industry'', or ''transform lives'']**.'
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: • 引言：“我们的愿景是**[插入你的愿景声明，例如‘改变世界’、‘颠覆行业’或‘改变生活’]**。
- en: '• Values: We believe in **[insert your first value, such as ''innovation'',
    ''excellence'', or ''integrity'']**, **[insert your second value]**, and **[insert
    your third value]**. These values guide our actions and decisions as we work toward
    our vision.'
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: • 价值观：我们相信**[插入你的第一个价值观，例如'创新'、'卓越'或'诚信']**、**[插入你的第二个价值观]**和**[插入你的第三个价值观]**。这些价值观指导我们在实现愿景的过程中采取行动和做出决策。
- en: '• Call-to-Action: Join us as we work to **[insert your vision statement in
    action, such as ''create a better future'', ''inspire change'', or ''make a difference'']**.'
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: • 行动号召：加入我们，我们一起努力**[插入你的愿景声明在行动中的表述，例如'创造一个更美好的未来'、'激发变革'或'产生影响']**。
- en: '• Contact Information: Contact us by **[insert your preferred method of contact,
    such as phone, email, or chat]** at **[insert your team''s email address or phone
    number]** if you want to learn more.'
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: • 联系信息：如果您想了解更多信息，请通过**[插入您首选的联系方式，如电话、电子邮件或聊天]**联系**[插入您的团队电子邮件地址或电话号码]**。
- en: '• Sign-off: Best regards, **[insert your name]**."'
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: • 结束语：最好的祝愿，**[插入你的名字]**。
- en: • I am pitching a project to **[insert company/organization name]** and need
    to write a proposal. The project is focused on **[insert project scope]**. What
    are the key deliverables and timeline for the project? How will I ensure that
    the project meets their needs? Write a proposal that is concise and persuasive.
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: • 我正在向**[插入公司/组织名称]**推销一个项目，并需要撰写一份提案。该项目专注于**[插入项目范围]**。项目的关键交付成果和进度表是什么？我将如何确保项目满足他们的需求？写一份简洁而有说服力的提案。
- en: 'OPEN-ENDED PROMPTS:'
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 开放式提示：
- en: • "Generate a vision statement that encapsulates the purpose and direction of
    my company."
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: • “生成一个概括我公司的目的和方向的愿景声明。”
- en: • "Brainstorm some ideas for my company's vision statement."
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: • “为我的公司愿景声明头脑风暴一些想法。”
- en: • "What kind of impact do I want my company to have on the world?"
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: • “我想让我的公司对世界产生什么样的影响？”
- en: • "What values do I want my company to embody?"
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: • “我想让我的公司体现哪些价值观？”
- en: • "What kind of culture do I want to create within my company?"
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: • “我想在我的公司内创造什么样的文化？”
- en: • "What kind of customers do I want to attract to my company?"
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: • “我想吸引什么样的客户到我的公司？”
- en: • "What kind of legacy do I want my company to leave behind?"
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: • “我想让我的公司留下什么样的遗产？”
- en: • "Refine my vision statement by inputting more specific prompts related to
    my company's goals, values, and audience."
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: • “通过输入更多与我公司目标、价值观和受众相关的具体提示，完善我的愿景声明。”
- en: • "Compare and contrast different versions of my vision statement to see which
    one resonates the most."
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: • “比较和对比我愿景声明的不同版本，看看哪一个最能引起共鸣。”
- en: • "Get feedback on my vision statement by inputting it into Chat GPT to evaluate
    its clarity, conciseness, and overall effectiveness."
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: • “通过将我的愿景声明输入Chat GPT来评估其清晰度、简洁性和整体有效性，获取对我的愿景声明的反馈。”
- en: 'EXAMPLES:'
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：
- en: '![](image_rsrcUY.jpg)'
  id: totrans-165
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrcUY.jpg)'
- en: 'Generating Business Ideas :'
  id: totrans-166
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 生成商业想法：
- en: 'OPEN-ENDED PROMPTS:'
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 开放式提示：
- en: • “Can you suggest some business ideas that are currently in demand?”
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: • “你能建议一些当前需求旺盛的商业想法吗？”
- en: • “Can you suggest some business ideas that are currently in demand in [insert
    industry or country]?”
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: • “你能建议一些在[插入行业或国家]当前需求旺盛的商业想法吗？”
- en: • “I'm looking for business ideas that require minimal investment. What do you
    suggest?”
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: • “我在寻找需要最少投资的商业想法。你有什么建议？”
- en: • “What are some business ideas that are innovative and unique?”
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: • “有哪些创新且独特的商业想法？”
- en: • “I run this type of business [describe business]. What new products and services
    can I offer my customers?”
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: • “我经营这种业务[描述业务]。我能为我的客户提供哪些新产品和服务？”
- en: • “Can you recommend some business ideas for a startup with limited resources?”
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: • “你能为资源有限的初创公司推荐一些商业想法吗？”
- en: • “I'm interested in starting a business in [insert industry]. What ideas do
    you have for me?”
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: • “我对在[插入行业]开始一项业务感兴趣。你有什么想法给我？”
- en: • “What are some business ideas that have a high potential for growth?”
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: • “有哪些具有高增长潜力的商业想法？”
- en: • “I like to [insert passions and interest]. What type of businesses could I
    create?”
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: • “我喜欢[插入激情和兴趣]。我能创建哪种类型的业务？”
- en: • “I am good at [insert skills and experience]. What type of businesses could
    I create?”
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: • “我擅长[插入技能和经验]。我能创建哪种类型的业务？”
- en: • “I'm looking for business ideas that are environmentally friendly. Can you
    help me out?”
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: • “我在寻找环保的商业想法。你能帮帮我吗？”
- en: • “I'm looking for business ideas that I can do from home. Can you help me out?”
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: • “我在寻找可以在家做的商业想法。你能帮帮我吗？”
- en: • “Can you suggest some business ideas for a small town or rural area?”
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: • “你能为小镇或农村地区提出一些商业想法吗？”
- en: • “I'm interested in starting a business in the [insert niche]. What ideas do
    you have for me?”
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: • “我对在[插入利基市场]开始一项业务感兴趣。你有什么想法吗？”
- en: • “Can you recommend some business ideas that are suitable for beginners?”
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: • “你能推荐一些适合初学者的商业想法吗？”
- en: • “I want to start a business in [insert industry] but I'm not sure where to
    begin. Any ideas?”
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: • “我想在[插入行业]开始一项业务，但我不确定从哪里开始。有什么建议吗？”
- en: • “What are some business ideas that are easy to scale up?”
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: • “有哪些容易扩展的商业想法？”
- en: • “Can you suggest some business ideas that are popular with [insert target
    market]?”
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: • “你能推荐一些在[插入目标市场]中流行的商业想法吗？”
- en: • “I'm looking for business ideas that have a social impact. What do you suggest?”
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: • “我在寻找有社会影响力的商业想法。你有什么建议吗？”
