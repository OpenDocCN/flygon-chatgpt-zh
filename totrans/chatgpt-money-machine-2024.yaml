    to identify emerging themes and innovations likely to impact our market.”'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Demographic insights: “Generate insights on the demographics of our target
    audience. Include age, location, preferences, and purchasing behavior.”'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'SEO and keyword optimization: “Conduct a thorough analysis of our website’s
    SEO performance. Suggest keywords and strategies for better online visibility.”'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Sentiment analysis on social media: “Analyze social media platforms for sentiment
