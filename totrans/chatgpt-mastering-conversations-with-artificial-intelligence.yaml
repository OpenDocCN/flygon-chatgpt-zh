  id: totrans-1692
  prefs: []
  type: TYPE_NORMAL
  zh: '[2](#footnote-10462-2-backlink). 高盛研究报告，"生成式AI可能将全球GDP提高7%" (2023年10月访问；[https://www.goldmansachs.com/intelligence/pages/generative-ai-could-raise-global-gdp-by-7-percent.html](https://www.goldmansachs.com/intelligence/pages/generative-ai-could-raise-global-gdp-by-7-percent.html)).'
