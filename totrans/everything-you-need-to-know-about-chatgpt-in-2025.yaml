    ****th**e**i**r** ****prod**uc**ti**vit**y.'
  id: totrans-428
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，**非常重要**的是，工作者需要熟悉AI工具并在他们的日常使用中发展相关能力。这并不必然意味着所有专业人士都需要成为编程或数据科学方面的专家。然而，对AI系统如何工作以及它们在各自领域的应用有一个基本的理解正变得越来越有价值。能够将这些工具整合到他们的日常任务中工作者将更有可能利用自动化并提高他们的生产力。
