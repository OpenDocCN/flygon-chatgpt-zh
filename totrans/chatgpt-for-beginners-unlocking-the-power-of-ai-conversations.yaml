  id: totrans-61
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2. 尝试不同的语调和风格
- en: '****Cha**tGP**T ****c**an** ****ad**apt** ****i**ts** ****to**ne** ****ba**sed**
    ****o**n** ****t**he** ****con**tex**t. ****Te**st** ****diff**eren**t ****pro**mpt**s
    ****t**o** ****s**ee** ****h**ow** ****i**t** ****res**pond**s. ****F**or** ****ins**tanc**e,
    ****a**sk** ****i**t** ****t**o** ****dr**aft** ****a**** ****fo**rma**l ****le**tte**r
    ****ve**rsu**s ****a**** ****ca**sua**l ****em**ail**, ****a**nd** ****obs**erv**e
    ****h**ow** ****i**ts** ****st**yle** ****sh**ift**s ****acco**rdingl**y.'
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: '**ChatGPT** 可以根据上下文**调整**其生成内容。尝试不同的提示来观察它的响应。例如，要求它撰写一封正式信函与一封非正式电子邮件，并观察其风格如何相应地改变。'
