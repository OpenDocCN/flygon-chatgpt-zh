  zh: Set dataRange = ws.Range("A1:D100") ' 根据需要调整范围
- en: ''' Add a new worksheet for the PivotTable and PivotChart'
  id: totrans-1661
  prefs: []
  type: TYPE_NORMAL
  zh: ''' 为PivotTable和PivotChart添加一个新的工作表'
- en: Set wsReport = ThisWorkbook.Sheets.Add
  id: totrans-1662
  prefs: []
