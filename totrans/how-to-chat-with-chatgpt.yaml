    to ChatGPT, upload pictures, or use the voice feature to make your chats with
    ChatGPT more natural. The more you explore, the more you’ll see how ChatGPT can
    help you do more and do better every day.
  id: totrans-1967
  prefs: []
  type: TYPE_NORMAL
  zh: 尝试我们讨论的一些提示和示例。直接与ChatGPT交谈，上传图片，或使用语音功能使您的ChatGPT聊天更加自然。您探索得越多，就越会看到ChatGPT如何帮助您每天做得更多、做得更好。
- en: If you’ve made here and still haven’t had a chat with Chat, don’t wait—get started
    with ChatGPT today! Tap into the magic of AI and discover how it can transform
    the way you work, learn, and play. The future is here, and it’s time to make the
    most of it.
  id: totrans-1968
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您已经到达这里，还没有与Chat聊天，不要等待——今天就开始使用ChatGPT！探索AI的魔力，了解它如何改变您的工作、学习和娱乐方式。未来已经到来，现在是时候充分利用它了。
- en: Happy chatting!
  id: totrans-1969
  prefs: []
  type: TYPE_NORMAL
  zh: 享受愉快的聊天！
- en: Glossary of AI Terms
  id: totrans-1970
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能术语表
- en: 'AI (Artificial Intelligence): Machines designed to act and think like humans,
    including learning from experience and making decisions'
  id: totrans-1971
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能（Artificial Intelligence）：设计成像人类一样行动和思考的机器，包括从经验中学习和做出决策
- en: 'AI ethics: The rules and principles guiding the responsible creation, use,
    and impact of AI technologies on society'
  id: totrans-1972
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能伦理：指导人工智能技术在社会中负责任地创造、使用和影响的规则和原则
- en: 'AI-generated tool: Software that uses AI to automatically create content, solve
    problems, or generate data'
  id: totrans-1973
  prefs: []
  type: TYPE_NORMAL
  zh: AI生成工具：使用AI自动创建内容、解决问题或生成数据的软件
- en: 'AI-Powered world: A society where AI is part of everyday life, helping with
    jobs, entertainment, health care, and more'
  id: totrans-1974
  prefs: []
  type: TYPE_NORMAL
  zh: AI赋能世界：一个AI成为日常生活一部分的社会，帮助工作、娱乐、医疗保健等
- en: 'Algorithm: A step-by-step guide for AI to achieve something specific'
  id: totrans-1975
  prefs: []
  type: TYPE_NORMAL
  zh: 算法：AI实现特定目标的逐步指南
- en: 'Application Programming Interface (API): A set of rules and tools for building
    software and applications, allowing different programs to communicate with each
    other'
  id: totrans-1976
  prefs: []
  type: TYPE_NORMAL
  zh: 应用程序编程接口（API）：一组用于构建软件和应用程序的规则和工具，允许不同的程序相互通信
- en: 'Artificial General Intelligence (AGI): AI with the ability to understand, learn,
    and apply knowledge across many tasks at a human level'
  id: totrans-1977
  prefs: []
  type: TYPE_NORMAL
  zh: 通用人工智能（AGI）：具有在人类水平上理解、学习和应用知识的能力的AI
- en: 'Backpropagation: A training method for neural networks where errors are corrected
    backward to improve performance'
  id: totrans-1978
  prefs: []
  type: TYPE_NORMAL
  zh: 反向传播：一种用于神经网络的训练方法，通过反向纠正错误来提高性能
- en: 'Big data: Large sets of data that can be analyzed to find patterns, trends,
    and insights'
  id: totrans-1979
  prefs: []
  type: TYPE_NORMAL
  zh: 大数据：可以分析以发现模式、趋势和洞察力的大型数据集
- en: 'Bias (AI context): When an AI makes unfair decisions based on its programming
    or training data'
  id: totrans-1980
  prefs: []
  type: TYPE_NORMAL
  zh: 偏差（AI语境）：当AI根据其编程或训练数据做出不公平的决定时
- en: 'Chatbot: A program designed to simulate conversation with human users online'
  id: totrans-1981
  prefs: []
  type: TYPE_NORMAL
  zh: 聊天机器人：一种旨在在线与人类用户模拟对话的程序
- en: 'ChatGPT: An AI by OpenAI that can chat, answer questions, and provide information
    based on its training'
  id: totrans-1982
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT：OpenAI开发的一种AI，可以聊天、回答问题和提供基于其训练的信息
- en: 'Clarity: Being clear and easy to understand, important when instructing AI'
  id: totrans-1983
  prefs: []
  type: TYPE_NORMAL
  zh: 清晰度：清晰易懂，在指导AI时非常重要
- en: 'Computer vision: AI that enables computers to understand and interpret visual
    information'
  id: totrans-1984
  prefs: []
  type: TYPE_NORMAL
  zh: 计算机视觉：使计算机能够理解和解释视觉信息的AI
- en: 'Content creation: Making articles, videos, and posts to share online'
  id: totrans-1985
  prefs: []
  type: TYPE_NORMAL
  zh: 内容创作：制作文章、视频和帖子以在线分享
- en: 'Contextual understanding: AI’s ability to understand the background or situation
    of a question or task'
  id: totrans-1986
  prefs: []
  type: TYPE_NORMAL
  zh: 上下文理解：AI理解问题或任务背景或情况的能力
- en: 'Contextualization: Adding background information to give more meaning to a
    task for AI'
  id: totrans-1987
  prefs: []
  type: TYPE_NORMAL
  zh: 上下文化：添加背景信息以赋予AI任务更多意义
- en: 'Conversational AI: AI designed to interact with humans in a natural, human-like
    way'
  id: totrans-1988
  prefs: []
  type: TYPE_NORMAL
  zh: 对话式AI：设计成以自然、类似人类的方式与人类互动的AI
- en: 'Creativity: Using imagination to come up with new and original ideas or content'
  id: totrans-1989
  prefs: []
  type: TYPE_NORMAL
  zh: 创造力：运用想象力提出新颖和原创的想法或内容
- en: 'Cross-Questioning: Asking follow-up questions to get more accurate information
    from AI'
  id: totrans-1990
  prefs: []
  type: TYPE_NORMAL
  zh: 交叉提问：向AI提出后续问题以获取更准确的信息
- en: 'CustomGPT: A customized version of GPT AI for specific tasks or industries'
  id: totrans-1991
  prefs: []
  type: TYPE_NORMAL
  zh: CustomGPT：GPT AI的定制版本，用于特定任务或行业
- en: 'DALL-E: An AI by OpenAI that creates images from text descriptions'
  id: totrans-1992
  prefs: []
  type: TYPE_NORMAL
  zh: DALL-E：OpenAI开发的一种AI，可以从文本描述中创建图像
- en: 'Data augmentation: Increasing the diversity of data for training models without
    collecting new data'
  id: totrans-1993
  prefs: []
  type: TYPE_NORMAL
  zh: 数据增强：在不收集新数据的情况下增加训练模型的数据多样性
- en: 'Deep learning: A type of machine learning using deep neural networks to analyze
    and learn from data'
  id: totrans-1994
  prefs: []
  type: TYPE_NORMAL
  zh: 深度学习：一种使用深度神经网络分析并从数据中学习的机器学习类型
- en: 'Effective communication with AI: Clearly conveying what you want AI to do for
    better responses'
  id: totrans-1995
  prefs: []
  type: TYPE_NORMAL
  zh: 与AI有效沟通：清晰传达你希望AI为你做什么以获得更好的响应
- en: 'Equity: Ensuring fairness and justice in procedures and resource distribution'
  id: totrans-1996
  prefs: []
  type: TYPE_NORMAL
  zh: 公平：确保程序和资源分配中的公平和正义
- en: 'Federated learning: Training a model across many devices or servers holding
    local data samples'
  id: totrans-1997
  prefs: []
  type: TYPE_NORMAL
  zh: 联邦学习：在许多持有本地数据样本的设备或服务器上训练模型
- en: 'Generative AI: AI that can create new content like text, images, or music'
  id: totrans-1998
  prefs: []
  type: TYPE_NORMAL
  zh: 生成式AI：可以创建新内容，如文本、图像或音乐的AI
- en: 'GAN (Generative Adversarial Network): A machine learning framework where two
    networks compete to create realistic data'
  id: totrans-1999
  prefs: []
  type: TYPE_NORMAL
  zh: GAN（生成对抗网络）：一种机器学习框架，其中两个网络相互竞争以创建逼真的数据
- en: 'Google Gemini AI: A free web-based AI with image generation and live web browsing'
  id: totrans-2000
  prefs: []
  type: TYPE_NORMAL
  zh: 谷歌Gemini AI：一个免费的基于网络的AI，具有图像生成和实时网页浏览功能
- en: 'GPT (Generative Pre-Trained Transformer): An AI that understands and generates
    text like a human'
  id: totrans-2001
  prefs: []
  type: TYPE_NORMAL
  zh: GPT（生成预训练变换器）：一种理解并像人类一样生成文本的AI
- en: 'GPT store: A place in ChatGPT apps to find and use various AI tools and applications'
  id: totrans-2002
  prefs: []
  type: TYPE_NORMAL
  zh: GPT商店：在ChatGPT应用中查找和使用各种AI工具和应用程序的地方
- en: 'Hallucinations (AI context): When an AI makes up information or presents false
    facts'
  id: totrans-2003
  prefs: []
  type: TYPE_NORMAL
  zh: 幻觉（AI上下文）：当AI编造信息或呈现虚假事实时
- en: 'Human-centered values: Principles focusing on human well-being and dignity
    in technology'
  id: totrans-2004
  prefs: []
  type: TYPE_NORMAL
  zh: 以人为中心的价值：关注技术中人类福祉和尊严的原则
- en: 'Image recognition: AI’s ability to identify objects, places, people, and actions
    in images'
  id: totrans-2005
  prefs: []
  type: TYPE_NORMAL
  zh: 图像识别：AI在图像中识别物体、地点、人物和动作的能力
- en: 'Interactive elements: Parts of digital media users can interact with, like
    buttons or links'
  id: totrans-2006
  prefs: []
  type: TYPE_NORMAL
  zh: 交互元素：用户可以与之交互的数字媒体部分，如按钮或链接
- en: 'Iteration: Repeating a process until a desired outcome is achieved'
  id: totrans-2007
  prefs: []
  type: TYPE_NORMAL
  zh: 迭代：重复一个过程，直到达到期望的结果
- en: 'Language model: An AI that understands, generates, and manipulates human language'
  id: totrans-2008
  prefs: []
  type: TYPE_NORMAL
  zh: 语言模型：理解、生成和操作人类语言的AI
- en: 'Large language model (LLM): An advanced language model that uses large data
    sets to understand and generate human language accurately'
  id: totrans-2009
  prefs: []
  type: TYPE_NORMAL
  zh: 大型语言模型（LLM）：一种高级语言模型，使用大量数据集来准确理解和生成人类语言
- en: 'Machine learning (ML): AI that allows computers to learn from data and improve
    over time'
  id: totrans-2010
  prefs: []
  type: TYPE_NORMAL
  zh: 机器学习（ML）：允许计算机从数据中学习并随时间改进的AI
- en: 'Microsoft Copilot App: A mobile app by Microsoft using GPT-4 for AI image generation
    and live web browsing'
  id: totrans-2011
  prefs: []
  type: TYPE_NORMAL
  zh: 微软Copilot应用：微软开发的一款使用GPT-4进行AI图像生成和实时网页浏览的移动应用
- en: 'Natural language processing (NLP): Technology for computers to understand and
    interact with human language'
  id: totrans-2012
  prefs: []
  type: TYPE_NORMAL
  zh: 自然语言处理（NLP）：计算机理解并与人交互的技术
- en: 'Neural network: Algorithms that recognize relationships in data, similar to
    how the human brain works'
  id: totrans-2013
  prefs: []
  type: TYPE_NORMAL
  zh: 神经网络：识别数据中关系的算法，类似于人类大脑的工作方式
- en: 'Overfitting: When a model learns details and noise from training data too well,
    performing poorly on new data'
  id: totrans-2014
  prefs: []
  type: TYPE_NORMAL
  zh: 过拟合：当模型从训练数据中学习细节和噪声过于出色时，在新数据上的表现不佳
- en: 'Predictive analytics: Using data to predict future trends or events'
  id: totrans-2015
  prefs: []
  type: TYPE_NORMAL
  zh: 预测分析：使用数据预测未来的趋势或事件
- en: 'Prompt: A question or instruction given to an AI for a specific response'
  id: totrans-2016
  prefs: []
  type: TYPE_NORMAL
  zh: Prompt：向AI提供的用于特定响应的问题或指令
- en: 'Reinforcement learning: Learning where an AI agent makes decisions based on
    rewards or penalties'
  id: totrans-2017
  prefs: []
  type: TYPE_NORMAL
  zh: 强化学习：AI代理根据奖励或惩罚做出决策的学习
- en: 'Robotics: Technology for designing, building, and using robots'
  id: totrans-2018
  prefs: []
  type: TYPE_NORMAL
  zh: 机器人技术：设计、构建和使用机器人的技术
- en: 'Structured data: Information organized in a predefined way, often in databases'
  id: totrans-2019
  prefs: []
  type: TYPE_NORMAL
  zh: 结构化数据：以预定义方式组织的信息，通常在数据库中
- en: 'Supervised learning: Machine learning where the model is trained on labeled
    data'
  id: totrans-2020
  prefs: []
  type: TYPE_NORMAL
  zh: 监督学习：在标记数据上训练模型的机器学习
- en: 'Token: A piece of text treated as a single data unit in AI'
  id: totrans-2021
  prefs: []
  type: TYPE_NORMAL
  zh: 令牌：在AI中作为单个数据单元处理的文本片段
- en: 'Training data: The data set used to teach an AI model'
  id: totrans-2022
  prefs: []
  type: TYPE_NORMAL
  zh: 训练数据：用于教授AI模型的数据库
- en: 'Transfer learning: Using a model developed for one task as a starting point
    for a different task'
  id: totrans-2023
  prefs: []
  type: TYPE_NORMAL
  zh: 迁移学习：使用为一个任务开发的模型作为不同任务的起点
- en: 'Turing test: A test to determine if a machine’s behavior is indistinguishable
    from a human’s'
  id: totrans-2024
  prefs: []
  type: TYPE_NORMAL
  zh: 图灵测试：用于判断机器的行为是否与人类无法区分的测试
- en: 'Unsupervised learning: Machine learning on unlabeled data to find hidden patterns'
  id: totrans-2025
  prefs: []
  type: TYPE_NORMAL
  zh: 无监督学习：在未标记数据上进行的机器学习，以发现隐藏的模式
- en: 'Voice recognition: Technology for devices to understand and respond to human
    speech.'
  id: totrans-2026
  prefs: []
  type: TYPE_NORMAL
  zh: 语音识别：设备理解并响应人类语音的技术。
