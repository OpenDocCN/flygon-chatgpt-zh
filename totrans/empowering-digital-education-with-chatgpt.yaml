- en: 4.3.2.2 Journal
  id: totrans-944
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 4.3.2.2 期刊
- en: A co-citation network map was developed to represent the 74 analysed journals
    with a minimum of 20 citations. The results in [Figure 4.5](#ch12.xhtml#f11) highlight
    the most influential journals in issues related to ChatGPT in education. The top
    journals considered critical sources for learning about ChatGPT in education were
    *arXiv*, *Journal of Chemical Education*, *Nature Journal*, *Journal of Computers
    in Education*, and *JMIR Medical Education*.
  id: totrans-945
  prefs: []
  type: TYPE_NORMAL
  zh: 为了表示至少有20篇引用的74种分析过的期刊，开发了一个共引网络图。图[4.5](#ch12.xhtml#f11)中的结果显示了与教育中ChatGPT相关议题中最有影响力的期刊。被认为是了解教育中ChatGPT的关键来源的顶级期刊包括*arXiv*、*化学教育杂志*、*自然杂志*、*计算机在教育中的应用杂志*和*JMIR医学教育*。
