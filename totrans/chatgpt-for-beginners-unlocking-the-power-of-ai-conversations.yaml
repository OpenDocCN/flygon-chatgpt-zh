  prefs: []
  type: TYPE_NORMAL
  zh: '**道德AI使用意味着确保ChatGPT被建设性地使用，而不是用于伤害。滥用AI来创建冒犯性、有害或非法内容会损害这项强大技术的潜力，并对个人和社会构成严重风险**。'
