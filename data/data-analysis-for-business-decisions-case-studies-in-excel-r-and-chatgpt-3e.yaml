- en: Analysis with Generative AI
  id: totrans-1508
  prefs: []
  type: TYPE_NORMAL
  zh: 使用生成式AI进行分析
- en: 'Using the Case Dataset files provided, upload the file Franchises.xlsx into
    ChatGPT-4\. Then use the prompt below to obtain the response that follows:'
  id: totrans-1509
  prefs: []
  type: TYPE_NORMAL
  zh: 使用提供的案例数据集文件，将文件Franchises.xlsx上传到ChatGPT-4。然后使用以下提示来获取以下响应：
- en: 'Prompt: “Build a linear regression model of franchises factors (SQFT, INVENTORY,
    ADVERTISING, FAMILIES, STORES) and sales, and then save all coefficients and intercept
    in a Excel file. After that, please use five scatter plots (with regression line)
    to show how each independent variables can affect the sales.”'
  id: totrans-1510
  prefs: []
  type: TYPE_NORMAL
  zh: 提示： “构建一个关于特许经营因素（SQFT，INVENTORY，ADVERTISING，FAMILIES，STORES）和销售的线性回归模型，并将所有系数和截距保存到Excel文件中。之后，请使用五个散点图（带有回归线）来展示每个自变量如何影响销售。”
- en: 'Response from ChatGPT-4:'
  id: totrans-1511
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT-4的响应：
- en: '[Figure 10.9](#fig10-9) shows the coefficients of the model found by ChatGPT.
    [Figure 10.10](#fig10-10) shows the factor-by-factor linear relationship to sales
    visualized as trend curves.'
  id: totrans-1512
  prefs: []
  type: TYPE_NORMAL
  zh: '[图10.9](#fig10-9) 显示了ChatGPT找到的模型系数。[图10.10](#fig10-10) 显示了各因素与销售之间的线性关系，以趋势曲线的形式可视化。'
- en: '![image](images/pg226.jpg)'
  id: totrans-1513
  prefs: []
  type: TYPE_IMG
  zh: '![图片](images/pg226.jpg)'
- en: FIGURE 10.9 Result of the linear regression model showing the coefficients of
    the model found by ChatGPT
  id: totrans-1514
  prefs: []
  type: TYPE_NORMAL
  zh: 图10.9 线性回归模型的结果，显示了ChatGPT找到的模型系数
- en: '![image](images/pg226_1.jpg)'
  id: totrans-1515
  prefs: []
  type: TYPE_IMG
  zh: '![图片](images/pg226_1.jpg)'
- en: FIGURE 10.10 Linear regression showing the relationship between each input variable
    and sales
  id: totrans-1516
  prefs: []
  type: TYPE_NORMAL
  zh: 图10.10 线性回归展示了每个输入变量与销售之间的关系
- en: ChatGPT Answers to Framed Analytical Questions
  id: totrans-1517
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT对框架分析问题的回答
- en: We now use ChatGPT to obtain more detailed answers to the framed questions provided
    by the generative AI tool. Remember that the relevant data file has already been
    loaded into ChatGPT for the previous computation. This is a continuation of the
    analysis.
  id: totrans-1518
  prefs: []
  type: TYPE_NORMAL
  zh: 我们现在使用ChatGPT来获取由生成式AI工具提供的框架问题的更详细答案。请记住，相关数据文件已经加载到ChatGPT中进行之前的计算。这是分析的延续。
- en: 'Prompt: “What factors affect sales in the franchises, and how?”'
  id: totrans-1519
  prefs: []
  type: TYPE_NORMAL
  zh: 提示： “哪些因素影响分店的销售，以及如何影响？”
- en: 'Response from ChatGPT:'
  id: totrans-1520
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT的回复：
- en: Several factors influence the sales in the franchises, as evidenced by the linear
    regression analysis conducted. The factors include the square footage of the store
    (SQFT), inventory levels (INVENTORY), advertising expenses (ADVERTISING), number
    of families in the area (FAMILIES), and the number of competing stores (STORES).
  id: totrans-1521
  prefs: []
  type: TYPE_NORMAL
  zh: 几个因素影响了分店的销售，正如进行的线性回归分析所证明的那样。这些因素包括商店的面积（SQFT）、库存水平（INVENTORY）、广告费用（ADVERTISING）、该地区的家庭数量（FAMILIES）以及竞争店铺的数量（STORES）。
- en: The SQFT has a positive coefficient, indicating that as the size of the store
    increases, sales tend to increase as well. Similarly, INVENTORY, ADVERTISING,
    and FAMILIES also have positive coefficients, suggesting that higher inventory
    levels, more advertising expenses, and a larger number of families in the area
    are associated with higher sales. On the contrary, the STORES variable has a negative
    coefficient, implying that an increase in the number of competing stores is associated
    with a decrease in sales.
  id: totrans-1522
  prefs: []
  type: TYPE_NORMAL
  zh: SQFT具有正系数，表明随着商店规模的增加，销售也倾向于增加。同样，INVENTORY、ADVERTISING和FAMILIES也具有正系数，表明更高的库存水平、更多的广告费用以及该地区更多的家庭数量与更高的销售相关。相反，STORES变量具有负系数，意味着竞争店铺数量的增加与销售下降相关。
- en: 'Prompt: “Can we create a model showing us how to design a store size given
    certain demographics that allows us to achieve a certain level of sales?”'
  id: totrans-1523
  prefs: []
  type: TYPE_NORMAL
  zh: 提示： “我们能创建一个模型来展示如何根据特定的人口统计信息设计商店规模，以便我们达到一定的销售水平吗？”
- en: 'Response from ChatGPT:'
  id: totrans-1524
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT的回复：
- en: Yes, it is feasible to create a model to design a store size based on certain
    demographics to achieve a desired level of sales. The constructed linear regression
    model can be utilized to make such predictions. By inputting the desired sales
    level and the known demographic factors (like the number of families, competing
    stores, advertising expenses, and inventory levels) into the model, we can solve
    for the required square footage (SQFT) that is estimated to meet the sales target.
  id: totrans-1525
  prefs: []
  type: TYPE_NORMAL
  zh: 是的，根据特定的人口统计信息创建一个设计商店规模的模型以实现期望的销售水平是可行的。构建的线性回归模型可以用来进行此类预测。通过将期望的销售水平和已知的
    demographics 因素（如家庭数量、竞争店铺数量、广告费用和库存水平）输入模型，我们可以求解出满足销售目标的所需面积（SQFT）。
- en: However, it’s crucial to note that the accuracy of these predictions depends
    on the reliability and representativeness of the data used to build the model,
    as well as the assumption that the relationships between variables are linear.
    Additionally, external factors and changing market conditions, which are not accounted
    for in the model, could also impact the actual sales outcomes. Thus, while the
    model can provide a useful guideline, its predictions should be interpreted with
    caution and complemented with business insights and market analysis.
  id: totrans-1526
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，需要注意的是，这些预测的准确性取决于构建模型所使用数据的可靠性和代表性，以及变量之间关系线性的假设。此外，模型中没有考虑的外部因素和不断变化的市场条件也可能影响实际的销售结果。因此，虽然模型可以提供一个有用的指导，但其预测应谨慎解读，并辅以商业洞察和市场分析。
- en: 'Analysis Case 10.2: Analysis Case Using SFO Airport Survey Data'
  id: totrans-1527
  prefs: []
  type: TYPE_NORMAL
  zh: 分析案例10.2：使用SFO机场调查数据的分析案例
- en: Analysis with Excel
  id: totrans-1528
  prefs: []
  type: TYPE_NORMAL
  zh: 使用Excel进行分析
- en: Use the Case Data files and find the file 2016_SFO_Customer_Survey_Data.xlsx.
    Open the data dictionary file and have it available to consult as you work with
    the data. Open the data file using Excel.
  id: totrans-1529
  prefs: []
  type: TYPE_NORMAL
  zh: 使用案例数据文件，找到文件2016_SFO_Customer_Survey_Data.xlsx。打开数据字典文件，并在处理数据时可供查阅。使用Excel打开数据文件。
- en: 'We are going to answer the following question:'
  id: totrans-1530
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将回答以下问题：
- en: Create a multivariate regression model to predict the overall score Q7ALL someone
    will give given selected sub-question scores (Q7FOOD, Q7STORE, Q7SIGN, Q7SCREENS,
    and Q7WIFI).
  id: totrans-1531
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个多元回归模型，预测给定选定子问题得分（Q7FOOD、Q7STORE、Q7SIGN、Q7SCREENS和Q7WIFI）时某人将给出的整体得分Q7ALL。
- en: We need to remove the problem of “0” and “6” scores, which are not scores by
    customers but categorical data indicating the absence of a response. These two
    numbers should not be entered into a predictive model. One way to handle this
    is to delete all rows that have either a “0” or a “6” in any one column. Hopefully,
    this leaves enough response rows to make a good model. The annotated table should
    leave behind more than 50% of the original rows.
  id: totrans-1532
  prefs: []
  type: TYPE_NORMAL
  zh: 我们需要移除“0”和“6”得分的问题，这些得分不是客户给出的，而是表示没有响应的分类数据。这两个数字不应输入到预测模型中。一种处理方法是删除任何一列中包含“0”或“6”的所有行。希望这能留下足够的响应行来构建一个好的模型。标注表应保留超过50%的原始行。
- en: Then, we can proceed to analyze which of the survey Q7 sub-questions appear
    to be correlated to the overall score and to each other ([Figure 10.11](#fig10-11)).
  id: totrans-1533
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，我们可以继续分析哪些调查Q7子问题似乎与整体得分以及彼此相关（[图10.11](#fig10-11)）。
- en: '![image](images/pg229.jpg)'
  id: totrans-1534
  prefs: []
  type: TYPE_IMG
  zh: '![图片](images/pg229.jpg)'
- en: FIGURE 10.11 Correlation matrix of customer satisfaction scores for individual
    areas of the airport to each other and to the overall satisfaction score
  id: totrans-1535
  prefs: []
  type: TYPE_NORMAL
  zh: 图10.11 机场各区域客户满意度得分之间的相互关系以及与整体满意度得分的关系
- en: Using Excel’s Analysis ToolPak, create a multivariate linear regression model
    (MLR) to predict the Q7Overall score given the scores in the other sub-questions.
    Test your model by predicting the Q7Overall score when someone gives all “5s”
    and all “1s” in the sub-questions, and see how close to “7” and “1” you come in
    each case. The model details are shown in [Figure 10.12](#fig10-12).
  id: totrans-1536
  prefs: []
  type: TYPE_NORMAL
  zh: 使用Excel的分析工具包创建一个多元线性回归模型（MLR），预测给定其他子问题得分时的Q7Overall得分。通过预测当某人在子问题中给出所有“5”和所有“1”时的Q7Overall得分来测试你的模型，并查看每个案例中你接近“7”和“1”的程度。模型细节如图10.12所示。
- en: '![image](images/pg230.jpg)'
  id: totrans-1537
  prefs: []
  type: TYPE_IMG
  zh: '![图片](images/pg230.jpg)'
- en: FIGURE 10.12 Multivariate linear regression model to predict overall customer
    satisfaction from satisfaction scores in selected areas of the airport operation
  id: totrans-1538
  prefs: []
  type: TYPE_NORMAL
  zh: 图10.12 从机场运营选定区域满意度得分预测整体客户满意度的多元线性回归模型
- en: Note that the P-value of all coefficients is very, very small (less than .05),
    which means that all sub-question scores are significant and are highly related
    to the overall score.
  id: totrans-1539
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，所有系数的P值都非常非常小（小于.05），这意味着所有子问题得分都是显著的，并且与整体得分高度相关。
- en: Analysis with R
  id: totrans-1540
  prefs: []
  type: TYPE_NORMAL
  zh: 使用R进行数据分析
- en: Using the Case Dataset files, find the file 2016_SFO_Customer_Survey_Data.csv.
    Upload it into Jamovi and build linear regression between overall Q7 score and
    all Q7 sub-question scores. The correlation matrix is shown is shown in [Figure
