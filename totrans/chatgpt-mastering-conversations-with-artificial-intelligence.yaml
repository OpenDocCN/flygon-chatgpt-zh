- en: '**3\. Prompt Design**'
  id: totrans-211
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '**3. 提示词设计**'
- en: Structuring and phrasing prompts play a pivotal role in the type of response
    that ChatGPT generates. Slight alterations can lead to varied outputs, highlighting
    the model's sensitivity. Keeping this in mind and experimenting with different
    phrasings can help users optimize the interactions. This adaptability ensures
    that they consistently get the desired information.
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
  zh: 提示的结构和措辞在 ChatGPT 生成的响应类型中起着关键作用。微小的改动可能导致不同的输出，突显了模型对敏感性的反应。考虑到这一点并尝试不同的措辞可以帮助用户优化交互。这种适应性确保他们始终获得所需的信息。
- en: We can compare chatting with a Language Model with writing a letter to a friend
    with whom you are sharing thoughts, whom you are asking questions, or requesting
    advice. The way you share your thoughts, the context you give, and the way you
    phrase your questions or requests greatly influence what you get out of the conversation.
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以将与语言模型的对话与给一位分享思想、提问或请求建议的朋友写信进行比较。你分享思想的方式、你提供的上下文以及你提问或请求措辞的方式极大地影响了你从对话中获得的内容。
- en: Similarly, to get the most out of the conversation with ChatGPT you need to
    structure your message. It is like a Lego game. We will start learning the building
    blocks of a prompt and how to use them for different outcomes.
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
  zh: 同样，为了从与 ChatGPT 的对话中获得最大收益，你需要结构化你的信息。这就像是一个乐高游戏。我们将开始学习提示的构建模块以及如何使用它们实现不同的结果。
- en: Then, we will continue with understanding how AI's word memory works and how
    to harness it to keep your conversations flowing naturally and coherently.
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，我们将继续了解 AI 的词汇记忆工作原理以及如何利用它使你的对话自然流畅且连贯。
- en: With every chapter the theory is fantastic, but the practice is where the real
    magic happens. The hands-on experience will boost your confidence and upgrade
    your prompt crafting skills.
  id: totrans-216
  prefs: []
  type: TYPE_NORMAL
  zh: 每一章的理论都十分精彩，但实践才是真正的魔法所在。动手经验将增强你的信心并提升你的提示构建技能。
- en: '**3.1 Prompt Structure**'
  id: totrans-217
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**3.1 提示结构**'
- en: The precision of an AI model's response hinges upon the quality of your prompt.
    Different phrasing, context, examples, and instructions, all play a role in shaping
    the output of a prompt^([1](#footnote-12250-1)). To embark on this journey, let's
    start by understanding the fundamental components of a prompt. An organized approach
    to craft prompts can yield remarkable results. The most important elements are
    presented below (Figure 3.1).
  id: totrans-218
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能模型响应的精确性取决于你提示的质量。不同的措辞、上下文、示例和指示都起着塑造提示输出的作用^([1](#footnote-12250-1))。为了开始这段旅程，让我们首先了解提示的基本组成部分。以下列出了最重要的元素（图
    3.1）。
- en: '![Figure_3.1.tif](../Images/Figure_3.1_fmt.png)'
  id: totrans-219
  prefs: []
  type: TYPE_IMG
  zh: '![Figure_3.1.tif](../Images/Figure_3.1_fmt.png)'
- en: '*Figure 3.1 Components of a prompt*'
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
  zh: '*图 3.1 提示的组成部分*'
- en: In Figure 3.2 we have simple examples for each component.
  id: totrans-221
  prefs: []
  type: TYPE_NORMAL
  zh: 在图 3.2 中，我们为每个组件提供了简单示例。
- en: '![Figure_3.2.tif](../Images/Figure_3.2_fmt.png)'
  id: totrans-222
  prefs: []
  type: TYPE_IMG
  zh: '![Figure_3.2.tif](../Images/Figure_3.2_fmt.png)'
- en: '*Figure 3.2 Components of a prompt: examples*'
  id: totrans-223
  prefs: []
  type: TYPE_NORMAL
  zh: '*图 3.2 提示的组成部分：示例*'
- en: We will learn them one by one.
  id: totrans-224
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将逐一学习它们。
- en: '**CONTEXT Component**'
  id: totrans-225
  prefs: []
  type: TYPE_NORMAL
  zh: '**上下文组件**'
- en: Just as in having a friendly chat with a colleague, before seeking advice or
    posing a question it is essential to set the stage and provide context, to establish
    the conversation's foundation.
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
  zh: 就像与同事进行友好的聊天一样，在寻求建议或提出问题之前，设置场景和提供上下文，建立对话的基础是至关重要的。
- en: 'By using the CONTEXT instructions, we enable AI to:'
  id: totrans-227
  prefs: []
  type: TYPE_NORMAL
  zh: 通过使用上下文指示，我们使 AI 能够：
- en: – Understand our overall goal
  id: totrans-228
  prefs: []
  type: TYPE_NORMAL
  zh: – 理解我们的总体目标
- en: – Decode jargon, abbreviations, or acronyms
  id: totrans-229
  prefs: []
  type: TYPE_NORMAL
  zh: – 解码行话、缩写或首字母缩略词
- en: – Generate output relevant to us
  id: totrans-230
  prefs: []
  type: TYPE_NORMAL
  zh: – 生成与我们相关的输出
- en: – Ensure outputs are sensitive to regional and cultural differences.
  id: totrans-231
  prefs: []
  type: TYPE_NORMAL
  zh: – 确保输出对区域和文化差异敏感。
- en: 'Example 1: Seeking Writing Advice'
  id: totrans-232
  prefs: []
  type: TYPE_NORMAL
  zh: 示例 1：寻求写作建议
- en: 'CONTEXT:'
  id: totrans-233
  prefs: []
  type: TYPE_NORMAL
  zh: '**上下文**：'
- en: '*I''m working on a blog post about sustainable living and need help with structuring
    my ideas.*'
  id: totrans-234
  prefs: []
  type: TYPE_NORMAL
  zh: '*我在写一篇关于可持续生活的博客文章，需要帮助组织我的想法。*'
- en: 'Example 2: Programming Task Assistance'
  id: totrans-235
  prefs: []
  type: TYPE_NORMAL
  zh: 示例 2：编程任务协助
- en: 'CONTEXT:'
  id: totrans-236
  prefs: []
  type: TYPE_NORMAL
  zh: '**上下文**：'
- en: '*I''m working on a web development project and need help with coding a responsive
    navigation menu.*'
  id: totrans-237
  prefs: []
  type: TYPE_NORMAL
  zh: '*我在进行一个网站开发项目，需要帮助编写一个响应式导航菜单的代码。*'
- en: 'Example 3: Organizing an Environmental Conservation Event'
  id: totrans-238
  prefs: []
  type: TYPE_NORMAL
  zh: 示例 3：组织环境保护活动
- en: 'CONTEXT:'
  id: totrans-239
  prefs: []
  type: TYPE_NORMAL
  zh: '**上下文**：'
- en: '*Domain of Discourse: Environmental Conservation*'
  id: totrans-240
  prefs: []
  type: TYPE_NORMAL
  zh: '*领域：环境保护*'
- en: '*Location: Australian Outback*'
  id: totrans-241
  prefs: []
  type: TYPE_NORMAL
  zh: '*地点：澳大利亚内陆*'
- en: '*Time Period: Present day*'
  id: totrans-242
  prefs: []
  type: TYPE_NORMAL
  zh: '*时间：当代*'
- en: '*Scenario: Planning a tree-planting event*'
  id: totrans-243
  prefs: []
  type: TYPE_NORMAL
  zh: '*场景：规划植树活动*'
- en: '*Desired Perspective: Ecologically sustainable practices*'
  id: totrans-244
  prefs: []
  type: TYPE_NORMAL
  zh: '*期望视角：生态可持续实践*'
- en: '*Overall Goal: To organize a successful event that promotes community engagement
    in environmental conservation.*'
  id: totrans-245
  prefs: []
  type: TYPE_NORMAL
  zh: '*总体目标：组织一场成功的事件，促进社区参与环境保护。*'
- en: '**AI ROLE Component**'
  id: totrans-246
  prefs: []
  type: TYPE_NORMAL
  zh: '**AI 角色组件**'
- en: The next most important thing when we talk to AI is to assign AI a certain role.
    This empowers it to take on distinct responsibilities, such as teacher, language
    instructor, or designer.
  id: totrans-247
  prefs: []
  type: TYPE_NORMAL
  zh: 与 AI 交谈时，接下来最重要的事情是分配给 AI 一个特定的角色。这使它能够承担不同的责任，如教师、语言教师或设计师。
- en: The instruction "Act as a [ROLE]" equips AI with a blueprint for interaction.
    With this role in mind, AI can offer tailored responses, insights, and solutions
    that align with its defined role.
  id: totrans-248
  prefs: []
  type: TYPE_NORMAL
  zh: 指令 "扮演 [角色]" 为 AI 提供了互动的蓝图。有了这个角色在心中，AI 可以提供符合其定义角色的定制回答、见解和解决方案。
- en: 'Advanced GPT engines can adopt various roles, including:'
  id: totrans-249
  prefs: []
  type: TYPE_NORMAL
  zh: 高级 GPT 引擎可以采用各种角色，包括：
- en: – Functioning as a Human Expert, whether as prompt engineer, analyst, teacher,
    therapist, or financial analyst.
  id: totrans-250
  prefs: []
  type: TYPE_NORMAL
  zh: – 作为人类专家，无论是作为提示工程师、分析师、教师、治疗师还是财务分析师。
- en: – Operating as a Tool, simulating functionalities like a Linux terminal, JavaScript
    Console, or an Excel Sheet.
  id: totrans-251
  prefs: []
  type: TYPE_NORMAL
  zh: – 作为工具运行，模拟 Linux 终端、JavaScript 控制台或 Excel 表格等功能。
- en: 'Example 1: Seeking Writing Advice'
  id: totrans-252
  prefs: []
  type: TYPE_NORMAL
  zh: 示例 1：寻求写作建议
- en: 'ROLE:'
  id: totrans-253
  prefs: []
  type: TYPE_NORMAL
  zh: '**角色：**'
- en: '*Act like a Writing Consultant.*'
  id: totrans-254
  prefs: []
  type: TYPE_NORMAL
  zh: '*扮演写作顾问的角色。*'
- en: 'Example 2: Programming Task Assistance'
  id: totrans-255
  prefs: []
  type: TYPE_NORMAL
  zh: 示例 2：编程任务协助
- en: 'ROLE:'
  id: totrans-256
  prefs: []
  type: TYPE_NORMAL
  zh: '**角色：**'
- en: '*Act like a Code Mentor.*'
  id: totrans-257
  prefs: []
  type: TYPE_NORMAL
  zh: '*扮演代码导师的角色。*'
- en: 'Example 3: Seeking Custom Travel Advice'
  id: totrans-258
  prefs: []
  type: TYPE_NORMAL
  zh: 示例 3：寻求定制旅行建议
- en: 'ROLE:'
  id: totrans-259
  prefs: []
  type: TYPE_NORMAL
  zh: '**角色：**'
- en: '*You are a travel advisor, specializing in creating personalized itineraries
    for budget-conscious backpackers.*'
  id: totrans-260
  prefs: []
  type: TYPE_NORMAL
  zh: '*你是一位旅行顾问，专门为预算有限的背包客制定个性化行程。*'
- en: In this role (as travel advisor), ChatGPT would provide tailored travel advice,
    suggest affordable accommodations, transportation options, and tourist attractions,
    and help backpackers plan cost-effective adventures.
  id: totrans-261
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个角色（作为旅行顾问）中，ChatGPT 会提供定制旅行建议，建议经济实惠的住宿、交通选择和旅游景点，并帮助背包客规划成本效益高的冒险。
- en: '**AI PERSONALITY Component**'
  id: totrans-262
  prefs: []
  type: TYPE_NORMAL
  zh: '**AI 个人性组件**'
- en: This component of a prompt includes specific instructions about how AI should
    behave throughout the conversation, and how AI interacts with you. The default
    setting is "ChatGPT, you are a helpful assistant."
  id: totrans-263
  prefs: []
  type: TYPE_NORMAL
  zh: 这个提示的组件包括关于 AI 在整个对话中应该如何表现以及如何与你互动的具体指令。默认设置是 "ChatGPT，你是一个有用的助手。"
- en: 'Example: Preparing a History Lesson'
  id: totrans-264
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：准备历史课程
- en: 'PERSONALITY:'
  id: totrans-265
  prefs: []
  type: TYPE_NORMAL
  zh: '**个性：**'
- en: '*You are a witty, knowledgeable, and slightly sarcastic assistant with a penchant
    for historical anecdotes. While providing precise information, you engage with
    a touch of humor and an old-world charm, making the learning journey enjoyable.*'
  id: totrans-266
  prefs: []
  type: TYPE_NORMAL
  zh: '*你是一个机智、知识渊博且略带讽刺的助手，喜欢讲述历史轶事。在提供精确信息的同时，你用一点幽默和古风魅力，使学习之旅变得愉快。*'
- en: This personality imbues the interaction with a lively, engaging tone, along
    with a dash of humor, making the discourse informative yet entertaining.
  id: totrans-267
  prefs: []
  type: TYPE_NORMAL
  zh: 这种个性使互动充满活力、引人入胜的语气，以及一丝幽默，使对话既富有信息性又充满娱乐性。
- en: '**AI TASK Component**'
  id: totrans-268
  prefs: []
  type: TYPE_NORMAL
  zh: '**AI 任务组件**'
- en: The instruction "Execute [TASK]" is what we want the model to perform, respectively
    our immediate request. Consider it as assigning tasks to different friends with
    specific expertise.
  id: totrans-269
  prefs: []
  type: TYPE_NORMAL
  zh: 指令 "执行 [任务]" 是我们希望模型执行的内容，即我们的直接请求。将其视为向具有特定专长的不同朋友分配任务。
- en: The instruction "Execute [TASK]" could include the current task or a step in
    a broader project.
  id: totrans-270
  prefs: []
  type: TYPE_NORMAL
  zh: 指令 "执行 [任务]" 可以包括当前任务或更广泛项目中的一个步骤。
- en: – The long-term goal if the immediate task is part of a larger project.
  id: totrans-271
  prefs: []
  type: TYPE_NORMAL
  zh: – 如果当前任务是更大项目的一部分，那么长期目标是什么。
- en: '– The task to be executed now: write, rewrite, generate, summarize, analyze,
    code, cluster, extract, etc.'
  id: totrans-272
  prefs: []
  type: TYPE_NORMAL
  zh: – 现在要执行的任务：撰写、重写、生成、总结、分析、编码、聚类、提取等。
- en: 'Example 1: Seeking Writing Advice'
  id: totrans-273
  prefs: []
  type: TYPE_NORMAL
  zh: 示例 1：寻求写作建议
- en: 'TASK:'
  id: totrans-274
  prefs: []
  type: TYPE_NORMAL
  zh: '**任务：**'
- en: '*Provide guidance on organizing key points and creating engaging subheadings.*'
  id: totrans-275
  prefs: []
  type: TYPE_NORMAL
  zh: '*提供组织要点和创建引人入胜的小标题的指导。*'
- en: 'Example 2: Programming Task Assistance'
  id: totrans-276
  prefs: []
  type: TYPE_NORMAL
  zh: 示例 2：编程任务协助
- en: 'TASK:'
  id: totrans-277
  prefs: []
  type: TYPE_NORMAL
  zh: '**任务：**'
- en: '*Guide me through creating a responsive navigation menu using HTML and CSS.*'
  id: totrans-278
  prefs: []
  type: TYPE_NORMAL
  zh: '*指导我使用 HTML 和 CSS 创建一个响应式导航菜单。*'
- en: 'Example 3: Creating a Meal Plan'
  id: totrans-279
  prefs: []
  type: TYPE_NORMAL
  zh: 示例 3：制定餐单
- en: 'TASK:'
  id: totrans-280
  prefs: []
  type: TYPE_NORMAL
  zh: '**任务：**'
- en: '*Create a week-long meal plan for a family of four, ensuring it''s balanced,
    nutritious, and caters to a vegetarian diet. Include a variety of cuisines, and
    ensure each day has three meals and two snacks, along with a brief description
    of each meal and snack.*'
  id: totrans-281
  prefs: []
  type: TYPE_NORMAL
  zh: '*为四口之家创建一周饮食计划，确保其平衡、营养，并适应素食饮食。包括各种菜系，确保每天有三餐和两次零食，并简要描述每餐和零食。*'
- en: '**TASK GUIDELINES Component**'
  id: totrans-282
  prefs: []
  type: TYPE_NORMAL
  zh: '**任务指南组件**'
- en: 'However, refining the task often requires additional [TASK GUIDELINES]. These
    guidelines provide instructions for AI to better structure task execution:'
  id: totrans-283
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，细化任务通常需要额外的[任务指南]。这些指南为AI提供指令，以更好地结构化任务执行：
- en: – Domain knowledge (fields or industries)
  id: totrans-284
  prefs: []
  type: TYPE_NORMAL
  zh: – 领域知识（领域或行业）
- en: – Source requirements (e.g., scientific journals only)
  id: totrans-285
  prefs: []
  type: TYPE_NORMAL
  zh: – 源要求（例如，仅限科学期刊）
- en: – Time constraints for sources (e.g., recent publications)
  id: totrans-286
  prefs: []
  type: TYPE_NORMAL
  zh: – 源的时间限制（例如，近期出版物）
- en: – Methodology (e.g., Feynman methodology), argument structure
  id: totrans-287
  prefs: []
  type: TYPE_NORMAL
  zh: – 方法论（例如，费曼方法论）、论证结构
- en: – Data privacy, ethical considerations, feedback incorporation
  id: totrans-288
  prefs: []
  type: TYPE_NORMAL
  zh: – 数据隐私、伦理考量、反馈整合
- en: – Clear multi-step instructions for complex tasks
  id: totrans-289
  prefs: []
  type: TYPE_NORMAL
  zh: – 复杂任务的清晰多步说明
- en: – Adaptability based on evolving data
  id: totrans-290
  prefs: []
  type: TYPE_NORMAL
  zh: – 根据不断变化的数据进行适应性调整
- en: – Comparative analyses with pros, cons, and potential outcomes
  id: totrans-291
  prefs: []
  type: TYPE_NORMAL
  zh: – 比较分析，包括优点、缺点和潜在结果
- en: – Necessary data for the model to execute the request (e.g., text to summarize)
  id: totrans-292
  prefs: []
  type: TYPE_NORMAL
  zh: – 模型执行请求所需的数据（例如，要总结的文本）
- en: 'Example 1: Seeking Writing Advice'
  id: totrans-293
  prefs: []
  type: TYPE_NORMAL
  zh: 示例1：寻求写作建议
- en: 'TASK GUIDELINES:'
  id: totrans-294
  prefs: []
  type: TYPE_NORMAL
  zh: 任务指南：
- en: '*Consider a casual, informative tone.*'
  id: totrans-295
  prefs: []
  type: TYPE_NORMAL
  zh: '*考虑轻松、信息性的语气。*'
- en: '*Suggest subheadings that capture each aspect of sustainable living.*'
  id: totrans-296
  prefs: []
  type: TYPE_NORMAL
  zh: '*建议子标题，以捕捉可持续生活的各个方面。*'
- en: '*Use examples from recent articles.*'
  id: totrans-297
  prefs: []
  type: TYPE_NORMAL
  zh: '*使用最近文章的例子。*'
- en: 'Example 2: Programming Task Assistance'
  id: totrans-298
  prefs: []
  type: TYPE_NORMAL
  zh: 示例2：编程任务辅助
- en: 'TASK GUIDELINES:'
  id: totrans-299
  prefs: []
  type: TYPE_NORMAL
  zh: 任务指南：
- en: '*Follow best practices for mobile-first design.*'
  id: totrans-300
  prefs: []
  type: TYPE_NORMAL
  zh: '*遵循以移动优先设计为最佳实践。*'
- en: '*Explain the use of media queries for responsiveness.*'
  id: totrans-301
  prefs: []
  type: TYPE_NORMAL
  zh: '*解释媒体查询在响应性方面的使用。*'
- en: '*Provide code snippets and explanations.*'
  id: totrans-302
  prefs: []
  type: TYPE_NORMAL
  zh: '*提供代码片段和解释。*'
- en: 'Example 3: Creating a Meal Plan'
  id: totrans-303
  prefs: []
  type: TYPE_NORMAL
  zh: 示例3：创建饮食计划
- en: 'TASK GUIDELINES:'
  id: totrans-304
  prefs: []
  type: TYPE_NORMAL
  zh: 任务指南：
- en: '*Include a variety of cuisines to keep the plan exciting.*'
  id: totrans-305
  prefs: []
  type: TYPE_NORMAL
  zh: '*包括各种菜系，以保持计划的趣味性。*'
- en: '*Ensure each day meets the nutritional requirements of a balanced vegetarian
    diet.*'
  id: totrans-306
  prefs: []
  type: TYPE_NORMAL
  zh: '*确保每一天都满足平衡素食饮食的营养需求。*'
- en: '*Provide a brief description of each meal and snack, mentioning key ingredients.*'
  id: totrans-307
  prefs: []
  type: TYPE_NORMAL
  zh: '*简要描述每餐和零食，提及关键成分。*'
- en: '*Offer alternative options for at least three meals to cater to different tastes.*'
  id: totrans-308
  prefs: []
  type: TYPE_NORMAL
  zh: '*提供至少三种不同口味的替代餐食选项。*'
- en: '*Ensure the descriptions are beginner-friendly, avoiding technical jargon.*'
  id: totrans-309
  prefs: []
  type: TYPE_NORMAL
  zh: '*确保描述适合初学者，避免使用技术术语。*'
- en: '*Include a section at the end for tips on meal prep to save time.*'
  id: totrans-310
  prefs: []
  type: TYPE_NORMAL
  zh: '*在末尾包含节省时间的饮食准备技巧部分。*'
- en: '**OUTPUT FORMAT Component**'
  id: totrans-311
  prefs: []
  type: TYPE_NORMAL
  zh: '**输出格式组件**'
- en: '[OUTPUT FORMAT] is outlined through instructions that encompass all aspects
    of the output:'
  id: totrans-312
  prefs: []
  type: TYPE_NORMAL
  zh: '[输出格式]通过包含输出所有方面的指令进行概述：'
- en: – Type (email, blog, review, etc.)
  id: totrans-313
  prefs: []
  type: TYPE_NORMAL
  zh: – 类型（电子邮件、博客、评论等）
- en: – Tone (formal, informal, academic, persuasive, etc.)
  id: totrans-314
  prefs: []
  type: TYPE_NORMAL
  zh: – 口吻（正式、非正式、学术、说服性等）
- en: – Voice (first person, second person, third person)
  id: totrans-315
  prefs: []
  type: TYPE_NORMAL
  zh: – 语气（第一人称、第二人称、第三人称）
- en: – Length, versions, format (plain text, table, etc.)
  id: totrans-316
  prefs: []
  type: TYPE_NORMAL
  zh: – 长度、版本、格式（纯文本、表格等）
- en: – Citation style, visual elements
  id: totrans-317
  prefs: []
  type: TYPE_NORMAL
  zh: – 引用风格、视觉元素
- en: 'Example 1: Seeking Writing Advice'
  id: totrans-318
  prefs: []
  type: TYPE_NORMAL
  zh: 示例1：寻求写作建议
- en: 'OUTPUT FORMAT:'
  id: totrans-319
  prefs: []
  type: TYPE_NORMAL
  zh: 输出格式：
- en: '*Type: Blog post*'
  id: totrans-320
  prefs: []
  type: TYPE_NORMAL
  zh: '*类型：博客文章*'
- en: '*Tone: Informal and informative*'
  id: totrans-321
  prefs: []
  type: TYPE_NORMAL
  zh: '*语气：非正式且信息丰富*'
- en: '*Voice: First person*'
  id: totrans-322
  prefs: []
  type: TYPE_NORMAL
  zh: '*语气：第一人称*'
- en: '*Length: Around 800 words*'
  id: totrans-323
  prefs: []
  type: TYPE_NORMAL
  zh: '*长度：约800字*'
- en: 'Example 2: Programming Task Assistance'
  id: totrans-324
  prefs: []
  type: TYPE_NORMAL
  zh: 示例2：编程任务辅助
- en: 'OUTPUT FORMAT:'
  id: totrans-325
  prefs: []
  type: TYPE_NORMAL
  zh: 输出格式：
- en: '*Type: Text document*'
  id: totrans-326
  prefs: []
  type: TYPE_NORMAL
  zh: '*类型：文本文档*'
- en: '*Tone: Technical and instructional*'
  id: totrans-327
  prefs: []
  type: TYPE_NORMAL
  zh: '*语气：技术性和指导性*'
- en: '*Voice: Second person*'
  id: totrans-328
  prefs: []
  type: TYPE_NORMAL
  zh: '*语气：第二人称*'
- en: '*Length: Comprehensive guide*'
  id: totrans-329
  prefs: []
  type: TYPE_NORMAL
  zh: '*长度：全面指南*'
- en: 'Example 3: Creating a Meal Plan'
  id: totrans-330
  prefs: []
  type: TYPE_NORMAL
  zh: 示例3：创建饮食计划
- en: 'OUTPUT FORMAT:'
  id: totrans-331
  prefs: []
  type: TYPE_NORMAL
  zh: 输出格式：
- en: '*Present the meal plan on a colorful table, with rows representing the days
    of the week and columns for breakfast, lunch, dinner, and snacks.*'
  id: totrans-332
  prefs: []
  type: TYPE_NORMAL
  zh: '*以色彩丰富的表格形式呈现饮食计划，行代表一周中的日子，列包括早餐、午餐、晚餐和零食。*'
- en: '*Each cell should contain the name of the dish along with a brief description.
    Additionally, provide a separate list of alternative meal options and a section
    at the end with meal prep tips, formatted as bullet points.*'
  id: totrans-333
  prefs: []
  type: TYPE_NORMAL
  zh: '*每个单元格应包含菜肴名称及简要描述。此外，提供替代餐食选项的单独列表，并在末尾以项目符号格式提供饮食准备技巧。*'
- en: '*Ensure the document is in a PDF format, with a clear, readable font and a
    title at the top.*'
  id: totrans-334
  prefs: []
  type: TYPE_NORMAL
  zh: '*确保文档以PDF格式保存，使用清晰易读的字体，并在顶部添加标题。*'
- en: '**OUTPUT AUDIENCE Component**'
  id: totrans-335
  prefs: []
  type: TYPE_NORMAL
  zh: '**输出受众组件**'
- en: Understanding the [AUDIENCE] is crucial to AI. When crafting instructions, consider
    the "persona" consuming the output. Their education level, vocabulary, and intended
    use should all influence how AI tailors its response.
  id: totrans-336
  prefs: []
  type: TYPE_NORMAL
  zh: 理解[受众]对于AI至关重要。在制定指令时，考虑消耗输出的“角色”。他们的教育水平、词汇量和预期用途都应该影响AI如何定制其响应。
- en: 'Example 1: Seeking Writing Advice'
  id: totrans-337
  prefs: []
  type: TYPE_NORMAL
  zh: 示例1：寻求写作建议
- en: 'OUTPUT AUDIENCE:'
  id: totrans-338
  prefs: []
  type: TYPE_NORMAL
  zh: 输出受众：
- en: '*General readers interested in eco-friendly lifestyles.*'
  id: totrans-339
  prefs: []
  type: TYPE_NORMAL
  zh: '*对环保生活方式感兴趣的普通读者。*'
- en: '*Level of education: High school and above.*'
  id: totrans-340
  prefs: []
  type: TYPE_NORMAL
  zh: '*教育水平：高中及以上。*'
- en: 'Example 2: Programming Task Assistance'
  id: totrans-341
  prefs: []
  type: TYPE_NORMAL
  zh: 示例2：编程任务辅助
- en: 'OUTPUT AUDIENCE:'
  id: totrans-342
  prefs: []
  type: TYPE_NORMAL
  zh: 输出受众：
- en: '*Web developers and enthusiasts.*'
  id: totrans-343
  prefs: []
  type: TYPE_NORMAL
  zh: '*网页开发者和爱好者。*'
- en: '*Level of education: Coding knowledge required.*'
  id: totrans-344
  prefs: []
  type: TYPE_NORMAL
  zh: '*教育水平：需要编码知识。*'
- en: 'Example 3: Creating a tutorial'
  id: totrans-345
  prefs: []
  type: TYPE_NORMAL
  zh: 示例3：创建教程
- en: 'OUTPUT AUDIENCE:'
  id: totrans-346
  prefs: []
  type: TYPE_NORMAL
  zh: 输出受众：
- en: '*The content is aimed at young adults aged 18-25, who are tech-savvy, curious
    about the digital world, and have a basic understanding of social media platforms.*'
  id: totrans-347
  prefs: []
  type: TYPE_NORMAL
  zh: '*内容针对18-25岁的年轻成年人，他们技术熟练，对数字世界充满好奇，并对社交媒体平台有基本了解。*'
- en: '*They value straightforward, jargon-free explanations and appreciate visuals
    and examples that relate to their daily digital interactions.*'
  id: totrans-348
  prefs: []
  type: TYPE_NORMAL
  zh: '*他们重视直接、无术语的解释，并欣赏与他们日常数字互动相关的视觉和示例。*'
- en: '**SYSTEM SETTINGS Component**'
  id: totrans-349
  prefs: []
  type: TYPE_NORMAL
  zh: '**系统设置组件**'
- en: 'Language models, such as ChatGPT, operate under specific environments. For
    instance, "temperature" controls randomness, "max_tokens" limits response length,
    and "top_p" influences text diversity. Using [SYSTEM SETTINGS] we can set the
    values of some of the following parameters:'
  id: totrans-350
  prefs: []
  type: TYPE_NORMAL
  zh: 语言模型，如ChatGPT，在特定的环境中运行。例如，“温度”控制随机性，“max_tokens”限制响应长度，“top_p”影响文本多样性。使用[系统设置]，我们可以设置以下一些参数的值：
- en: – what model do we want to use
  id: totrans-351
  prefs: []
  type: TYPE_NORMAL
  zh: – 我们想使用什么模型
- en: ChatGPT is powered by different OpenAI models. E.g., GPT-4 (Generative Pre-trained
    Transformer 4) is the fourth iteration of the GPT series of language models. The
    newer and larger the model the better the performance.
  id: totrans-352
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT由不同的OpenAI模型提供支持。例如，GPT-4（生成预训练变换器4）是GPT系列语言模型的第四代。模型越新、越大，性能越好。
- en: – how creative we want the model to be (the parameter is called "temperature"
    and takes values between 0 and 1)
  id: totrans-353
  prefs: []
  type: TYPE_NORMAL
  zh: – 我们希望模型有多大的创意（该参数称为“温度”，取值范围在0到1之间）
- en: When you set the temperature to a low value the model becomes more focused and
    more predictable. When you set the temperature to a high value the model generates
    text that is more random and imaginative.
  id: totrans-354
  prefs: []
  type: TYPE_NORMAL
  zh: 当您将温度设置为低值时，模型变得更加专注和可预测。当您将温度设置为高值时，模型生成的文本更加随机和富有想象力。
- en: – how many words we want the model to return as output (max_tokens)
  id: totrans-355
  prefs: []
  type: TYPE_NORMAL
  zh: – 我们希望模型返回多少单词作为输出（max_tokens）
- en: We can use "max_tokens" to limit the number of words or tokens that the model
    can use to generate a response.
  id: totrans-356
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以使用"max_tokens"来限制模型在生成响应时可以使用单词或标记的数量。
- en: – which words it should consider for the next part of the text it generates
    (top_p)
  id: totrans-357
  prefs: []
  type: TYPE_NORMAL
  zh: – 它应该考虑哪些单词作为生成文本下一部分的内容（top_p）
- en: '"top_p" stands for "top probability" and controls the diversity and randomness
    of the model''s generated text. "top_p" values balance the model between producing
    common phrases and exploring more creative language.'
  id: totrans-358
  prefs: []
  type: TYPE_NORMAL
  zh: '"top_p"代表"最高概率"，它控制着模型生成文本的多样性和随机性。"top_p"值在模型生成常见短语和探索更创意语言之间取得平衡。'
- en: The default settings for ChatGPT
  id: totrans-359
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT的默认设置
- en: '*Model: gpt-3.5-turbo*'
  id: totrans-360
  prefs: []
  type: TYPE_NORMAL
  zh: '*模型：gpt-3.5-turbo*'
- en: '*Max Tokens: 4096*'
  id: totrans-361
  prefs: []
  type: TYPE_NORMAL
  zh: '*最大标记数：4096*'
- en: '*Temperature: 0.8*'
  id: totrans-362
  prefs: []
  type: TYPE_NORMAL
  zh: '*温度：0.8*'
- en: '*Frequency Penalty: 0.0*'
  id: totrans-363
  prefs: []
  type: TYPE_NORMAL
  zh: '*频率惩罚：0.0*'
- en: '*Presence Penalty: 0.0*'
  id: totrans-364
  prefs: []
  type: TYPE_NORMAL
  zh: '*存在惩罚：0.0*'
- en: These settings provide a balanced mix of creativity and coherence for general
    use cases.
  id: totrans-365
  prefs: []
  type: TYPE_NORMAL
  zh: 这些设置提供了创意和连贯性的平衡，适用于一般用例。
- en: You can adjust the settings to better fit your needs.
  id: totrans-366
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以调整设置以更好地满足您的需求。
- en: 'Example 1: Seeking Writing Advice'
  id: totrans-367
  prefs: []
  type: TYPE_NORMAL
  zh: 示例1：寻求写作建议
- en: 'SYSTEM SETTINGS:'
  id: totrans-368
  prefs: []
  type: TYPE_NORMAL
  zh: 系统设置：
- en: '*Use GPT-4 model.*'
  id: totrans-369
  prefs: []
  type: TYPE_NORMAL
  zh: '*使用GPT-4模型。*'
- en: '*Set the temperature to 0.6 for creative but focused responses.*'
  id: totrans-370
  prefs: []
  type: TYPE_NORMAL
  zh: '*将温度设置为0.6以获得创意但专注的响应。*'
- en: '*Limit response to 250 words (max_tokens).*'
  id: totrans-371
  prefs: []
  type: TYPE_NORMAL
  zh: '*限制响应长度为250字（max_tokens）。*'
- en: 'Example 2: Programming Task Assistance'
  id: totrans-372
  prefs: []
  type: TYPE_NORMAL
  zh: 示例2：编程任务辅助
- en: 'SYSTEM SETTINGS:'
  id: totrans-373
  prefs: []
  type: TYPE_NORMAL
  zh: 系统设置：
- en: '*Employ GPT-4 model.*'
  id: totrans-374
  prefs: []
  type: TYPE_NORMAL
  zh: '*使用GPT-4模型。*'
- en: '*Set the temperature to 0.5 for a balanced mix of creativity and precision.*'
  id: totrans-375
  prefs: []
  type: TYPE_NORMAL
  zh: '*将温度设置为0.5以获得创意和精确度的平衡混合。*'
- en: '*Limit response to 500 words (max_tokens).*'
  id: totrans-376
  prefs: []
  type: TYPE_NORMAL
  zh: '*限制响应长度为500字（max_tokens）。*'
- en: Remember, you do not need to incorporate all prompt elements every time. It
    is akin to pack for a trip — you select the essential items while leaving behind
    what is unnecessary. Start with the essentials, adding details as needed.
  id: totrans-377
  prefs: []
  type: TYPE_NORMAL
  zh: 记住，您不必每次都包含所有提示元素。这就像为旅行打包——您选择必需品，同时丢弃不必要的物品。从必需品开始，根据需要添加细节。
- en: '**3.2 Guiding Conversation with Custom Instructions**'
  id: totrans-378
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**3.2 使用自定义指令引导对话**'
- en: Custom Instructions are helpful for giving GPT the same context and guidance
    that you will use frequently. The model will consistently consider these Custom
    Instructions whenever it responds, eliminating the need for you to repeat your
    preferences or information in each interaction. (You must be a ChatGPT Plus member
    to enable this feature.)
  id: totrans-379
  prefs: []
  type: TYPE_NORMAL
  zh: 自定义指令有助于为GPT提供您将频繁使用的相同上下文和指导。模型将在每次响应时始终考虑这些自定义指令，从而消除您在每次交互中重复您的偏好或信息的需求。（您必须是ChatGPT
    Plus会员才能启用此功能。）
- en: '**Setting Up ChatGPT Custom Instructions**'
  id: totrans-380
  prefs: []
  type: TYPE_NORMAL
  zh: '**设置ChatGPT自定义指令**'
- en: Custom Instructions are like the settings and preferences you adjust to tailor
    your phone experience to your preference/convenience. It is about setting a persistent
    CONTEXT for/during a long interaction with AI.
  id: totrans-381
  prefs: []
  type: TYPE_NORMAL
  zh: 自定义指令就像您调整以根据您的偏好/便利性定制手机体验的设置和偏好。这是在长时间与AI交互时设置持久上下文。
- en: To enable Custom Instructions, click ![menu1.tif](../Images/menu1_fmt1.png)
    next to your name, then click "Settings and Beta." Enable the Custom Instructions
    feature using the toggle button.
  id: totrans-382
  prefs: []
  type: TYPE_NORMAL
  zh: 要启用自定义指令，点击![menu1.tif](../Images/menu1_fmt1.png)你名字旁边的菜单，然后点击“设置和测试版。”使用切换按钮启用自定义指令功能。
- en: This feature allows customization of ChatGPT's responses based on your preferences
    and can be modified or removed anytime for future conversations.
  id: totrans-383
  prefs: []
  type: TYPE_NORMAL
  zh: 此功能允许根据您的偏好定制ChatGPT的响应，并且可以在未来的对话中随时修改或删除。
- en: '![Screenshot_.tif](../Images/Screenshot__fmt.png)'
  id: totrans-384
  prefs: []
  type: TYPE_IMG
  zh: '![Screenshot_.tif](../Images/Screenshot__fmt.png)'
- en: If you change the Custom Instructions in the middle of the conversation with
    ChatGPT you need to start a new chat to see changes reflected.
  id: totrans-385
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您在与ChatGPT的对话中更改自定义指令，您需要开始一个新的聊天才能看到更改反映出来。
- en: Custom Instructions offer a world of possibilities across various domains, making
    the AI-assisted experience even more delightful. E.g., teachers can more easily
    use ChatGPT to design lesson plans without constantly remind AI the overall goal
    of the interaction; content creators can infuse their distinctive writing style,
    rhythm, and tone over every piece of text generated by AI.
  id: totrans-386
  prefs: []
  type: TYPE_NORMAL
  zh: 自定义指令在各个领域提供了无限的可能性，使AI辅助体验更加愉悦。例如，教师可以更轻松地使用ChatGPT来设计课程计划，而无需不断提醒AI交互的整体目标；内容创作者可以在AI生成的每篇文本中融入他们独特的写作风格、节奏和语气。
- en: You can test ChatGPT with and without Custom Instructions to get an idea about
    what this setting can do for you.
  id: totrans-387
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以通过使用和不使用自定义指令测试ChatGPT，以了解此设置能为您做什么。
- en: 'Key takeaways:'
  id: totrans-388
  prefs: []
  type: TYPE_NORMAL
  zh: 关键要点：
- en: '– Use Custom Instructions to specify:'
  id: totrans-389
  prefs: []
  type: TYPE_NORMAL
  zh: – 使用自定义指令来指定：
- en: 'B CONTEXT: domain of discourse, scenario, and overall goal of the interaction.'
  id: totrans-390
  prefs: []
  type: TYPE_NORMAL
  zh: B 上下文：话语领域、场景和交互的整体目标。
- en: 'B AI ROLE (e.g., an expert in digital currency): assumed during the whole conversation.'
  id: totrans-391
  prefs: []
  type: TYPE_NORMAL
  zh: B AI 角色（例如，数字货币专家）：在整个对话中假定。
- en: 'B AI PERSONALITY: ensures consistency in style, tone, vocabulary, rhythm, and
    flow of the conversation.'
  id: totrans-392
  prefs: []
  type: TYPE_NORMAL
  zh: B AI 个人风格：确保对话的风格、语气、词汇、节奏和流畅性的一致性。
- en: 'B OUTPUT AUDIENCE: adapts the responses.'
  id: totrans-393
  prefs: []
  type: TYPE_NORMAL
  zh: B 输出受众：调整响应。
- en: B Preferred AI SYSTEM SETTINGS.
  id: totrans-394
  prefs: []
  type: TYPE_NORMAL
  zh: B 偏好的AI系统设置。
- en: – As you interact with ChatGPT TASKS, TASK GUIDELINES, and OUTPUT FORMATS can
    vary as you might need to adapt them to the responses you want.
  id: totrans-395
  prefs: []
  type: TYPE_NORMAL
  zh: – 当您与ChatGPT交互时，任务、任务指南和输出格式可能会根据您想要的响应而变化，您可能需要根据它们进行调整。
- en: – Using Custom Instructions will save you a lot of time. Once you start a new
    conversation in another CONTEXT do not forget to either disable Custom Instructions
    or to set a new one.
  id: totrans-396
  prefs: []
  type: TYPE_NORMAL
  zh: – 使用自定义指令可以为您节省大量时间。一旦您在另一个上下文中开始新的对话，不要忘记禁用自定义指令或设置一个新的指令。
- en: '**3.3 Context Memory**'
  id: totrans-397
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**3.3 上下文记忆**'
- en: If you have a fairly long conversation with a person, it might happen that the
    conversation goes off the track. The person you talk to might remember only the
    last few dozen interactions and completely forget the initial topic.
  id: totrans-398
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您与某人的对话相当长，可能会发生对话偏离轨道的情况。您交谈的人可能只会记得最后几十次互动，而完全忘记最初的主题。
- en: This also happens if you have a long conversation to ChatGPT.
  id: totrans-399
  prefs: []
  type: TYPE_NORMAL
  zh: 这也适用于您与ChatGPT的长对话。
- en: This limitation is a common aspect of all language models, being known as "Context
    Memory" or "Context Window" (Figure 3.3).
  id: totrans-400
  prefs: []
  type: TYPE_NORMAL
  zh: 这种限制是所有语言模型的共同特点，被称为“上下文记忆”或“上下文窗口”（图 3.3）。
- en: It happens because a technical limitation allows AI to recall only a limited
    amount of information. If this limitation is expressed in words, it is called
    "Word Limit."
  id: totrans-401
  prefs: []
  type: TYPE_NORMAL
  zh: 这是因为技术限制使得 AI 只能回忆有限的信息。如果这个限制用单词来表示，就称为“单词限制”。
- en: A Word Limit of 6,000 indicates that the model considers the past 6,000 words
    of the conversation when generating a response.
  id: totrans-402
  prefs: []
  type: TYPE_NORMAL
  zh: 6,000 个单词的单词限制表示模型在生成响应时考虑了过去 6,000 个单词的对话。
- en: '![Figure_3.3.tif](../Images/Figure_3.3_fmt.png)'
  id: totrans-403
  prefs: []
  type: TYPE_IMG
  zh: '![Figure_3.3.tif](../Images/Figure_3.3_fmt.png)'
- en: '*Figure 3.3 Context Window*'
  id: totrans-404
  prefs: []
  type: TYPE_NORMAL
  zh: '*图 3.3 上下文窗口*'
- en: Another way to express this limitation is to use "tokens," in this case, the
    limitation being known as "Context Window." Since a "token" describes not only
    a specific word but also some other contextual elements that the models need to
    know about that word when processing it, it may have various lengths. So, if we
    want to convert the technical specification "Context Window" (expressed in tokens)
    into "Word Limit" (expressed in words), we need to use an average value, each
    token corresponding to roughly 0.75 words.
  id: totrans-405
  prefs: []
  type: TYPE_NORMAL
  zh: 表达这种限制的另一种方式是使用“标记”，在这种情况下，这种限制被称为“上下文窗口”。由于“标记”不仅描述了特定的单词，还包括模型在处理该单词时需要了解的一些其他上下文元素，它可能有不同的长度。因此，如果我们想将技术规范“上下文窗口”（以标记表示）转换为“单词限制”（以单词表示），我们需要使用平均值，每个标记大致对应
    0.75 个单词。
- en: Let's try a simple example.
  id: totrans-406
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们尝试一个简单的例子。
- en: '[Word Limit] is expressed in "words"'
  id: totrans-407
  prefs: []
  type: TYPE_NORMAL
  zh: '[单词限制] 以“单词”表示'
- en: '[Context Window] is expressed in "tokens"'
  id: totrans-408
  prefs: []
  type: TYPE_NORMAL
  zh: '[上下文窗口] 以“标记”表示'
- en: 1 token ~ 0.75 words (Average token length)
  id: totrans-409
  prefs: []
  type: TYPE_NORMAL
  zh: 1 个标记 ~ 0.75 个单词（平均标记长度）
- en: Given a Context Window of 1,000 tokens, what is the Word Limit?
  id: totrans-410
  prefs: []
  type: TYPE_NORMAL
  zh: 给定 1,000 个标记的上下文窗口，单词限制是多少？
- en: Word Limit = Context Window / Average Token Length
  id: totrans-411
  prefs: []
  type: TYPE_NORMAL
  zh: 单词限制 = 上下文窗口 / 平均标记长度
- en: Word Limit = 1,000 tokens / 0.75 words per token
  id: totrans-412
  prefs: []
  type: TYPE_NORMAL
  zh: 单词限制 = 1,000 个标记 / 每个标记 0.75 个单词
- en: Word Limit ≈ 1,333 words
  id: totrans-413
  prefs: []
  type: TYPE_NORMAL
  zh: 单词限制 ≈ 1,333 个单词
- en: 'Here is the Context Window for the most prominent models:'
  id: totrans-414
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是最突出模型的上下文窗口：
- en: '*Table 3.1 Context Window of the most prominent LMs*'
  id: totrans-415
  prefs: []
  type: TYPE_NORMAL
  zh: '*表 3.1 最突出 LMs 的上下文窗口*'
- en: '| **Model** | **Context Window (tokens)** | **Word Limit (words)** |'
  id: totrans-416
  prefs: []
  type: TYPE_TB
  zh: '| **模型** | **上下文窗口（标记）** | **单词限制（单词）** |'
- en: '| GPT-4 Enterprise | 32,000 | ~ 24,000 |'
  id: totrans-417
  prefs: []
  type: TYPE_TB
  zh: '| GPT-4 Enterprise | 32,000 | ~ 24,000 |'
- en: '| GPT-4 | 8,000 | ~ 6,000 |'
  id: totrans-418
  prefs: []
  type: TYPE_TB
  zh: '| GPT-4 | 8,000 | ~ 6,000 |'
- en: '| GPT-3.5 | 4,000 | ~ 3,000 |'
  id: totrans-419
  prefs: []
  type: TYPE_TB
  zh: '| GPT-3.5 | 4,000 | ~ 3,000 |'
- en: The Context Window limitation has implications for the way we use the model.
    The combined length of our prompt and the model's response should be around 1,333
    words to stay within the given Context Window (approx. two and a half A4 pages
    of text). But how do we deal with it? One way to maintain context is to control
    the output and specify the length of the response. We want to stop AI from being
    very talkative when we need brief answers. Another way is to control the input
    and, for example, if we intend to ask AI to summarize a lengthy text, to divide
    it into manageable chunks.
  id: totrans-420
  prefs: []
  type: TYPE_NORMAL
  zh: 上下文窗口限制对我们使用模型的方式有影响。我们的提示和模型响应的合并长度应大约为 1,333 个单词，以保持在给定的上下文窗口内（大约两页半的 A4 文本）。但我们如何处理这个问题呢？一种保持上下文的方法是控制输出并指定响应的长度。我们希望在我们需要简短答案时，AI
    不要过于健谈。另一种方法是控制输入，例如，如果我们打算让 AI 概括一篇长文，我们可以将其分成可管理的块。
- en: Keep in mind that both examples represent a simplified estimation, and the actual
    word limit might be affected by various factors, including tokenization specifics
    and any updates in the model's capabilities.^([2](#footnote-12250-2))
  id: totrans-421
  prefs: []
  type: TYPE_NORMAL
  zh: 请记住，这两个例子都代表了一种简化的估计，实际的单词限制可能会受到各种因素的影响，包括标记化细节和模型能力的任何更新。[2](#footnote-12250-2)
- en: '**3.4 Prompting Good Practices**'
  id: totrans-422
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**3.4 提示的良好实践**'
- en: 1\. ChatGPT is different than Google's search engine. Use it accordingly.
  id: totrans-423
  prefs: []
  type: TYPE_NORMAL
  zh: 1. ChatGPT 与谷歌的搜索引擎不同。相应地使用它。
- en: 2\. The easiest way to work with it is to ask lots of follow-up questions —
    have a conversation.
  id: totrans-424
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 与其打交道最简单的方法是提出很多后续问题——进行对话。
- en: 3\. Start "easy" with a few cases, gradually adding information.
  id: totrans-425
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 从几个案例开始“简单”，逐渐增加信息。
- en: 4\. Play safe and do not enter any personal information.
  id: totrans-426
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 小心行事，不要输入任何个人信息。
- en: 5\. Keep in mind the cut-off date of January 2022\. Anything you ask about after
    this date will probably get no actionable reply.
  id: totrans-427
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 请记住截止日期为 2022 年 1 月。在此日期之后提出的问题可能不会得到任何可操作的回复。
- en: 6\. Create a space (file, folder) to save your best prompts.
  id: totrans-428
  prefs: []
  type: TYPE_NORMAL
  zh: 6. 创建一个空间（文件、文件夹）来保存你最好的提示。
- en: 7\. Organize your saved prompts.
  id: totrans-429
  prefs: []
  type: TYPE_NORMAL
  zh: 7. 组织你保存的提示。
- en: 8\. Give AI enough guidance and time to think. Break down the task into logical
    steps.
  id: totrans-430
  prefs: []
  type: TYPE_NORMAL
  zh: 8. 给AI足够的指导和思考时间。将任务分解为逻辑步骤。
- en: '9\. Use prompt components to set up the stage: context, overall goal, expected
    output (format, structure, length, vocabulary), and output consumers.'
  id: totrans-431
  prefs: []
  type: TYPE_NORMAL
  zh: 9. 使用提示组件来设定场景：上下文、总体目标、预期输出（格式、结构、长度、词汇）和输出消费者。
- en: 10\. Ask for multiple-option answers from which you can choose.
  id: totrans-432
  prefs: []
  type: TYPE_NORMAL
  zh: 10. 请求多个选项的答案，你可以从中选择。
- en: 11\. Ask AI to write in your own style. Without any guidance or customization,
    ChatGPT tends to use a particular writing style, authoritative and formal sounding.
    One helpful technique is to provide ChatGPT with a few samples of your own writing,
    then ask it to analyze your style and implement similar stylistic elements into
    the new generated text.
  id: totrans-433
  prefs: []
  type: TYPE_NORMAL
  zh: 11. 请求AI以你自己的风格写作。如果没有任何指导或定制，ChatGPT倾向于使用特定的写作风格，听起来权威且正式。一个有用的技巧是向ChatGPT提供一些你自己的写作样本，然后请求它分析你的风格并将类似的风格元素应用到新生成的文本中。
- en: '**3.5 Fact-checking AI**'
  id: totrans-434
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**3.5 事实核查AI**'
- en: 'The most important good practice habit is to check AI output, assessing the
    accuracy and reliability of the information provided by the model. Here are some
    practical steps you can employ for cognitive verification:'
  id: totrans-435
  prefs: []
  type: TYPE_NORMAL
  zh: 最重要的良好习惯是检查AI输出，评估模型提供的信息的准确性和可靠性。以下是一些你可以采用的认知验证的实际步骤：
- en: '– Start with general information: Begin by asking the AI model for general
    information on a topic. This can give you an initial overview and help you gauge
    the accuracy of its responses in the domain.'
  id: totrans-436
  prefs: []
  type: TYPE_NORMAL
  zh: – 从一般信息开始：首先向AI模型请求关于某个主题的一般信息。这可以为你提供一个初步的概述，并帮助你评估其在该领域的响应准确性。
- en: '– Look for consistency: If the information provided by the AI model sticks
    with what you already know or have learned from other sources, it adds to the
    credibility of the response.'
  id: totrans-437
  prefs: []
  type: TYPE_NORMAL
  zh: – 寻找一致性：如果AI模型提供的信息与你已知或从其他来源学到的信息一致，这将增加响应的可信度。
- en: '– Check dates and context: If the AI model provides information that is time-sensitive,
    check that it is up-to-date. Additionally, take into consideration the context
    the information is being presented; sometimes, context matters as much as the
    information itself.'
  id: totrans-438
  prefs: []
  type: TYPE_NORMAL
  zh: – 检查日期和上下文：如果AI模型提供的信息是时间敏感的，请确保它是最新的。此外，考虑信息呈现的上下文；有时，上下文与信息本身一样重要。
- en: '– Cross-reference multiple sources: After receiving a response from ChatGPT,
    cross-reference the information with multiple reliable sources. like academic
    papers, books, or experts in the field. If multiple sources confirm the information,
    it is more likely to be accurate.'
  id: totrans-439
  prefs: []
  type: TYPE_NORMAL
  zh: – 多源交叉验证：在收到ChatGPT的响应后，将信息与多个可靠来源进行交叉验证，如学术论文、书籍或该领域的专家。如果多个来源确认信息，则更有可能是准确的。
- en: '– Question unusual claims: If the AI model provides complex or unusual claims
    or if they contradict widely accepted knowledge, it is wise to be skeptical.'
  id: totrans-440
  prefs: []
  type: TYPE_NORMAL
  zh: – 对异常主张提出质疑：如果AI模型提供了复杂或异常的主张，或者它们与广泛接受的知识相矛盾，明智的做法是持怀疑态度。
- en: '– Use critical thinking: Apply your own critical thinking skills to assess
    the plausibility and logic of the information provided. If something seems too
    good to be true or does not stick with your understanding, delve deeper to verify.'
  id: totrans-441
  prefs: []
  type: TYPE_NORMAL
  zh: – 使用批判性思维：运用你自己的批判性思维技能来评估提供的信息的合理性和逻辑性。如果某件事看起来好得令人难以置信或与你的理解不符，深入调查以验证。
- en: '– Evaluate source reliability: AI-generated information might lack proper citation
    or come from less reliable sources. Be cautious when information is not attributed
    to well-known sources.'
  id: totrans-442
  prefs: []
  type: TYPE_NORMAL
  zh: – 评估来源可靠性：AI生成的信息可能缺乏适当的引用或来自不可靠的来源。当信息没有归因于知名来源时，要谨慎。
- en: '– Verify technical details: If you are dealing with technical details or complex
    concepts, consult experts in the field to validate the information. They can provide
    insights that might not be readily apparent to non-experts.'
  id: totrans-443
  prefs: []
  type: TYPE_NORMAL
  zh: – 核实技术细节：如果你处理的是技术细节或复杂概念，可以咨询该领域的专家以验证信息。他们可以提供非专业人士可能不会立即察觉的见解。
- en: '– Seek clarification: If you are not sure about the accuracy of a response,
    you can ask the AI''s model follow-up questions, requesting more detailed explanations
    or additional context.'
  id: totrans-444
  prefs: []
  type: TYPE_NORMAL
  zh: – 寻求澄清：如果你不确定响应的准确性，可以向AI模型提出后续问题，请求更详细的解释或额外的背景信息。
- en: Following these steps, you can leverage ChatGPT's generative capabilities while
    maintaining a high level of accuracy and reliability in the generated information.
  id: totrans-445
  prefs: []
  type: TYPE_NORMAL
  zh: 按照这些步骤，你可以在保持生成信息的高准确性和可靠性的同时，利用ChatGPT的生成能力。
- en: '**3.6 Hands-on Exercises**'
  id: totrans-446
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**3.6 实践练习**'
- en: As you explore forthcoming examples, you will gain practical insights into applying
    these prompt elements effectively. Adapt and modify the prompts to suit your needs.
  id: totrans-447
  prefs: []
  type: TYPE_NORMAL
  zh: 当你探索即将到来的示例时，你将获得有效应用这些提示元素的实际见解。根据你的需求调整和修改提示。
- en: 'Context-Centric Prompt:'
