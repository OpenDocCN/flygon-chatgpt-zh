- en: Preface
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In this book, we take you on a fun, hands-on crash course to Vibe Coding with
    Python and ChatGPT. With Vibe coding, you will use ChatGPT and Python to build
    apps for you without you having to do complex coding, while you focus on the big
    ideas.
  prefs: []
  type: TYPE_NORMAL
- en: 'In the course of this book, we will cover building functional, personal apps
    in minutes that: - Download YouTube Content - Retrieve Price of Bitcoin through
    API/Web Scraping - Automate Web Browsing - Converts Text to Speech - Generate
    a Voice Clone with the Elevenlabs API - Automate Emails'
  prefs: []
  type: TYPE_NORMAL
- en: '- Computer Vision'
  prefs: []
  type: TYPE_NORMAL
- en: '- Create and Host Websites - Creating a Flappy Bird Game - Speech to Text and
    Summarizing with the OpenAI API - Create a Telegram bot - Create a RAG - Chat
    with PDF app Getting Book Updates'
  prefs: []
  type: TYPE_NORMAL
- en: To receive updated versions of the book, subscribe to our mailing list by sending
    a mail to [support@i-ducate.com](mailto:support@i-ducate.com). I try to update
    my books to use the latest version of software, libraries and will update the
    codes/content in this book. So do subscribe to my list to receive updated copies!
  prefs: []
  type: TYPE_NORMAL
- en: Companion Video Course Contact me at support@i-ducate.com to obtain the companion
    videos for this book. Some of the examples are better illustrated in video. Comments
    or questions concerning this book can also be directed to the same.
  prefs: []
  type: TYPE_NORMAL
- en: Chapter 1 - Introduction
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Welcome to Vibe Coding for beginners with Python and ChatGPT!
  prefs: []
  type: TYPE_NORMAL
- en: The goal of this book is to help you learn how to create apps without mastering
    complex coding. You will learn how to use Python to build real applications for
    personal use or more. You’ll see results in minutes, from prompt to completion.
  prefs: []
  type: TYPE_NORMAL
- en: Unlike traditional programming books, this one doesn’t require you to dive deep
    into code syntax or take hours to complete. The curriculum is flexible, allowing
    you to start anywhere or follow the guided learning curve.
  prefs: []
  type: TYPE_NORMAL
- en: The first part of the book focuses on simple code that runs in a single file.
    The second part explores the use of APIs. Finally, the book includes several examples,
    combining libraries and APIs to demonstrate the types of projects you can create.
  prefs: []
  type: TYPE_NORMAL
- en: The goal of this book is to show you how to use and integrate Python’s libraries
    and APIs. It will equip you with a toolkit of the most useful and enjoyable functions,
    illustrate how to turn ideas into practical applications.
  prefs: []
  type: TYPE_NORMAL
- en: Once you understand how to use Python and integrate libraries and APIs into
    your workflow, you’ll be able to create all kinds of programs to boost your efficiency—even
    for one-time use.
  prefs: []
  type: TYPE_NORMAL
- en: Introduction to Vibe Coding
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In traditional coding, a programmer makes a plan, writes the code, runs it,
    and corrects errors along the way. With vibe coding, you don’t write any code
    yourself. Instead, you ask an LLM to do it for you. You run the result without
    reading the code, and if errors arise or you want to tweak the output, you simply
    tell the LLM to adjust it as you go.
  prefs: []
  type: TYPE_NORMAL
- en: 'So, where does vibe coding come from? The term was coined by Andrej Karpathy,
    co-founder of OpenAI. It’s about asking an LLM in plain English to create something,
    managing the product rather than the code itself:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc113.jpg)'
  prefs: []
  type: TYPE_IMG
- en: '(source: https://medium.com/@utsavmadaan823/the-vibe-coding-revolution-hype-pitfalls-how-to-ride-the-wave-%EF%B8%8F-a5e9b4a4185e)'
  prefs: []
  type: TYPE_NORMAL
- en: To do this effectively, you need a minimum viable knowledge of basic programming
    concepts to unlock this skill.
  prefs: []
  type: TYPE_NORMAL
- en: Is Vibe Coding “Bad” Coding?
  prefs: []
  type: TYPE_NORMAL
- en: Vibe coding isn’t about coding perfectly. It is about embracing a practical
    “getting things done” approach, especially when building personal apps that don’t
    typically need the same standards as commercial software. You’re building code
    for yourself, adding to your talent stack and combining it with your other skills.
  prefs: []
  type: TYPE_NORMAL
- en: Why Vibe Coding is a great start
  prefs: []
  type: TYPE_NORMAL
- en: Vibe coding has a much gentler learning curve than traditional programming courses,
    it’s fun to experiment with ideas, explore libraries and APIs, and offers a fresh
    practical approach to building software and apps. You can create them for yourself,
    fun, work or curiousity. There’s so much you can create!
  prefs: []
  type: TYPE_NORMAL
- en: So, How Do You Vibe Code?
  prefs: []
  type: TYPE_NORMAL
- en: You’ll start by asking an LLM—we’ll use ChatGPT in this case. Simply
  prefs: []
  type: TYPE_NORMAL
- en: 1\. Prompt what app you want
  prefs: []
  type: TYPE_NORMAL
- en: 2\. Copy and paste the code it generates.
  prefs: []
  type: TYPE_NORMAL
- en: 3\. Just run the code (without reading it).
  prefs: []
  type: TYPE_NORMAL
- en: 4\. If there are errors or you want changes, copy paste the errors or request
    adjustments from the LLM.
  prefs: []
  type: TYPE_NORMAL
- en: 5\. Repeat.
  prefs: []
  type: TYPE_NORMAL
- en: Using Python
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: We will use Python in this book. Python is a programming language that reads
    somewhat like English but has its own syntax. We chose Python because LLMs are
    well-trained on it. Basic programming experience in any language will be useful,
    but you don’t need to learn Python in-depth.
  prefs: []
  type: TYPE_NORMAL
- en: You need to install Python on your machine. It might already be installed; if
    not, download it for free at python.org. There are plenty of tutorials online,
    or you can ask ChatGPT to guide you through the setup.
  prefs: []
  type: TYPE_NORMAL
- en: To write and run Python programs, you need a code editor. I recommend VS Code,
    a free code editor for Mac and Windows, downloadable from code.visualstudio.com.
    Within VS Code, you’ll use the terminal window—a simple interface at the bottom
    of the screen—to run your code, copy and paste errors, and see the results.
  prefs: []
  type: TYPE_NORMAL
- en: Python Libraries
  prefs: []
  type: TYPE_NORMAL
- en: 'Python libraries are free collections of functions that add features to your
    programs. There are thousands of libraries for databases, math, graphics, computer
    vision, and more. Each library typically requires you to install it on your machine
    using:'
  prefs: []
  type: TYPE_NORMAL
- en: pip install [library name]
  prefs: []
  type: TYPE_NORMAL
- en: 'and to use them in your code:'
  prefs: []
  type: TYPE_NORMAL
- en: import [library name]
  prefs: []
  type: TYPE_NORMAL
- en: We’ll explore many examples of this later on.
  prefs: []
  type: TYPE_NORMAL
- en: Chapter 2 - Using Python Libraries for Simple Projects
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: We’ll explore basic programming concepts and apps through simple one function
    projects that fit in a single file. The code is short and doesn’t require much
    organization.
  prefs: []
  type: TYPE_NORMAL
- en: The first typical programming project is "Hello World!" It’s a simple program
    that displays "Hello World!"
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s go to chatgpt.com and say, “create a Python hello world program”:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc114.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Here’s the output:![](image_rsrc115.jpg)
  prefs: []
  type: TYPE_NORMAL
- en: 'We don’t need to read it—just copy it. And in VSCode, create a new Python File:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc116.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 'and paste the code:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc117.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 'then click the little triangle (top right) to run the Python file:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc118.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 'We need to save it. Let’s call it "hello.py":'
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc119.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 'And you can see in the bottom a Terminal window appears with “Hello World”:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc11A.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Downloading YouTube Content
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'We’re next going to create a program to download a video from a YouTube link.
    Let’s go to ChatGPT and prompt it: "Create a Python program that can download
    a video from a YouTube link":'
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc11B.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 'We can see in the response that we can use the pytube library to download Youtube
    videos. Let’s install pytube by running in the VSCode Terminal:'
  prefs: []
  type: TYPE_NORMAL
- en: pip install pytube
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc11C.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 'We then follow the rest of the instructions on how to use pytube:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc11D.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 'We don’t actually need to read the code. We just copy-paste the code into a
    new Python file in VSCode:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc11E.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 'Let’s run it. I am going to call it youtube.py. Now when I run it, I get an
    error message like:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc11F.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 'I can simply copy the whole error message and paste it into ChatGPT:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc11G.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 'And I think the issue is because I am using Python3:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc11H.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 'And if I run:'
  prefs: []
  type: TYPE_NORMAL
- en: pip3 install pytube
  prefs: []
  type: TYPE_NORMAL
- en: Try running the app again and the program runs!
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc11J.jpg)'
  prefs: []
  type: TYPE_IMG
- en: It asks me to “Enter Youtube video URL:”
  prefs: []
  type: TYPE_NORMAL
- en: 'So just give it a random video (try choosing a small one first), and I get
    another error:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc11K.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Again, copy-paste the error into ChatGPT
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc11M.jpg)'
  prefs: []
  type: TYPE_IMG
- en: And I get another error. After trying this for a few more times, I get the same
    error repeating.
  prefs: []
  type: TYPE_NORMAL
- en: 'Now ChatGPT is offering an alternative library:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc11N.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 'It’s suggesting using yt-dlp. So let’s do:'
  prefs: []
  type: TYPE_NORMAL
- en: pip3 install yt-dlp
  prefs: []
  type: TYPE_NORMAL
- en: 'And copy-paste the entire code to replace youtube.py, and I get another error:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc11P.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 'Again, let’s copy-paste the error into ChatGPT and I get the following workaround:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc11R.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 'I copy-paste into VSCode and run it:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc11S.jpg)'
  prefs: []
  type: TYPE_IMG
- en: And this time, the program runs successfully and it downloaded the video (probably
    same folder as youtube.py)!
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc11T.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Now, you might encounter different error messages or recommendations from your
    LLM, but that’s okay. That’s the whole essence of vibe coding, where we just prompt
    the LLM, run it, and if we encounter any errors, copy-paste it back into the LLM
    and repeat.
  prefs: []
  type: TYPE_NORMAL
- en: Retrieve Price of Bitcoin through API
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: You can use programs to retrieve data from APIs. For example, let’s say we want
    to get the latest price of Bitcoin. Let’s prompt “Create a python program that
    gets the latest price of bitcoin”
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc11U.jpg)'
  prefs: []
  type: TYPE_IMG
- en: The program retrieves the latest Bitcoin price from coingecko.com’s API.
  prefs: []
  type: TYPE_NORMAL
- en: 'So I copy and paste the code. And before running it, I install requests with:'
  prefs: []
  type: TYPE_NORMAL
- en: pip3 install requests
  prefs: []
  type: TYPE_NORMAL
- en: 'Now, let’s run it:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc11V.jpg)'
  prefs: []
  type: TYPE_IMG
- en: And I get the latest price of Bitcoin!
  prefs: []
  type: TYPE_NORMAL
- en: Retrieve Price of Bitcoin through Web Scraping
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Suppose we don’t want to use the API, (perhaps we don’t want to pay the API
    fees or there’s no API available), we can prompt “Create a python program that
    gets the latest price of bitcoin by scraping from a website”.
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc11W.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 'And ChatGPT suggests using a library called BeautifulSoup, which is designed
    to parse HTML code. Let’s copy-paste this code, install the libraries and give
    it a try:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc11X.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Unfortunately, the Price is not found. It seems that we need to provide more
    details of the HTML structure so our program knows where to gather the price from.
  prefs: []
  type: TYPE_NORMAL
- en: 'What we can do is take a look at coinmarketcap.com/currencies/bitcoin/:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc11Y.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 'We have the Bitcoin price clearly showing on the left. If inspect the bitcoin
    price:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc11Z.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 'We can see the HTML element containing the price:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc120.jpg)'
  prefs: []
  type: TYPE_IMG
- en: If you are an experienced developer, you might examine the path to that code,
    but we’re not going to do that.
  prefs: []
  type: TYPE_NORMAL
- en: 'Instead, we’ll copy the element:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc121.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 'And then paste it into ChatGPT:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc122.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 'ChatGPT identifies that the price is stored within a span tag in the HTML structure,
    and now it’s modifying the code:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc123.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 'We then copy-paste the code, run it and we get the current Bitcoin price:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc124.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Web Browsing Automation
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Let’s create a program that visit websites for us. Let’s create a Python program
    that goes to wikipedia and enters a search term input by the user:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc125.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 'And we copy-paste the code:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc126.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 'Let’s run it. Let’s enter a search term *e.g.* “vibe coding”:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc127.jpg)'
  prefs: []
  type: TYPE_IMG
- en: '![](image_rsrc128.jpg)'
  prefs: []
  type: TYPE_IMG
- en: The search term is entered, and we’ve navigated to the Wikipedia page!
  prefs: []
  type: TYPE_NORMAL
- en: Text to Speech
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'We’re going to use ChatGPT to turn a text into an audio file using text-to-speech
    technology. Let’s prompt it:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc129.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 'And it gives us:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc12A.jpg)'
  prefs: []
  type: TYPE_IMG
- en: If we look at the code, we can see that it imports the Google Text-to-Speech
    library, from gtts import gTTS. It receives the text from the user, and then calls
    a function to create and save the audio as an MP3 file.
  prefs: []
  type: TYPE_NORMAL
- en: 'First, run: pip install gtts'
  prefs: []
  type: TYPE_NORMAL
- en: Now, run the file and write something simple like, “Hello, how are you doing?”
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc12B.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 'The audio file will be saved as something like output.mp3:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc12C.jpg)'
  prefs: []
  type: TYPE_IMG
- en: And if you play the output, it should play “Hello. How are you doing?”. Try
    feeding it larger text and it should work fine too.
  prefs: []
  type: TYPE_NORMAL
- en: Changing the Voice
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Can we change the voice for the text to speech? Let’s try prompting: “can change
    the voice?”'
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc12D.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 'It tells us to use the pyttsx3 library for different languages and accents
    and provides an updated script:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc12E.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 'Let’s copy-paste the code and run it:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc12F.jpg)'
  prefs: []
  type: TYPE_IMG
- en: We are being presented with a list of voices. If we select a voice and provide
    the text, it works! Now, the voice can sound quite robotic. If you want a higher
    quality voice or even clone a famous person’s voice, we can use the Elevenlabs
    API which we will explore in the next section.
  prefs: []
  type: TYPE_NORMAL
- en: Generate a Voice Clone with the Elevenlabs API
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: To be able to generate a voice clone, there are a variety of services to do
    so. One of the most popular is by the company called ElevenLabs. You need to first
    provide them with a voice sample.
  prefs: []
  type: TYPE_NORMAL
- en: 'The voice cloning service is a paid service. It’s $11 per month for the most
    popular plan:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc12G.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 'Let’s prompt, “create a python program that uses the elevenlabs API to clone
    a voice and produce an audio file with user input text”:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc12H.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 'In the ElevenLabs dashboard, get your API key:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc12J.jpg)'
  prefs: []
  type: TYPE_IMG
