  prefs: []
  type: TYPE_NORMAL
- en: 'You may have noticed a few things from this worked example:'
  prefs: []
  type: TYPE_NORMAL
- en: The AI-generated book titles are based on the context of the story and the subgenre
    of different popular cozy mystery tropes.
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: ChatGPT has learned technical information about yarns and crafts and can apply
    this to the instruction without additional prompting.
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: The system can follow multi-part prompts/instructions and deliver results in
