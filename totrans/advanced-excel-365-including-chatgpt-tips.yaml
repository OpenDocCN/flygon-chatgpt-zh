- en: Conclusion
  id: totrans-2528
  prefs: []
  type: TYPE_NORMAL
  zh: 结论
- en: In this chapter, we covered the topic of assigning buttons to macros in Excel.
    We learned how to create buttons on the Quick Access Toolbar and customize them
    by modifying menus or buttons. Additionally, we explored the process of creating
    buttons directly in an Excel worksheet. We also discussed editing recorded macros
    to enhance their functionality.
  id: totrans-2529
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们讨论了在Excel中为宏分配按钮的主题。我们学习了如何在快速访问工具栏上创建按钮，并通过修改菜单或按钮来自定义它们。此外，我们还探讨了直接在Excel工作表中创建按钮的过程。我们还讨论了编辑记录的宏以增强其功能。
