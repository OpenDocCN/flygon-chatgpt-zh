  prefs: []
  type: TYPE_NORMAL
  zh: 为什么它有效：
- en: This prompt helps initiate collaborations in a professional and personable way,
    increasing the chances of building successful influencer partnerships.
  id: totrans-410
  prefs: []
  type: TYPE_NORMAL
  zh: 此提示以专业和亲切的方式启动合作，增加了建立成功的网红合作伙伴关系的可能性。
- en: '![](image_rsrc15E.jpg)'
  id: totrans-411
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc15E.jpg)'
- en: 27\. Customer Feedback Request
  id: totrans-412
  prefs: []
  type: TYPE_NORMAL
  zh: 27. 客户反馈请求
- en: 'Prompt:'
  id: totrans-413
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: “Write a friendly email requesting feedback from a recent customer about their
    experience with our product. The tone should be polite, appreciative, and focused
    on learning how to improve.”
  id: totrans-414
  prefs: []
  type: TYPE_NORMAL
  zh: “撰写一封友好的邮件，请求最近一位客户就他们对我们的产品的体验提供反馈。语气应礼貌、感激，并专注于了解如何改进。”
- en: 'Why It Works:'
  id: totrans-415
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么它有效：
- en: Asking for feedback shows you value customer opinions. This prompt makes it
    easy for you to request feedback in a non-intrusive and appreciative manner.
  id: totrans-416
  prefs: []
  type: TYPE_NORMAL
  zh: 请求反馈表明您重视客户意见。此提示使您能够以非侵入性和感激的方式轻松请求反馈。
- en: '![](image_rsrc15E.jpg)'
  id: totrans-417
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc15E.jpg)'
- en: 28\. Time-Sensitive Offer
  id: totrans-418
  prefs: []
  type: TYPE_NORMAL
  zh: 28. 时间敏感的优惠
- en: 'Prompt:'
  id: totrans-419
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: “Create an email announcing a time-sensitive, limited-time offer on our best-selling
    product. The email should include a countdown timer and a clear call to action.
    The tone should be urgent but not too pushy.”
  id: totrans-420
  prefs: []
  type: TYPE_NORMAL
  zh: “创建一封宣布我们畅销产品限时、限时优惠的邮件。邮件应包括倒计时计时器和明确的行动号召。语气应紧迫但不过分。”
- en: 'Why It Works:'
  id: totrans-421
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么它有效：
- en: Limited-time offers drive urgency. This prompt gives you an email structure
    that can encourage customers to act quickly.
  id: totrans-422
  prefs: []
  type: TYPE_NORMAL
  zh: 限时优惠推动紧迫感。此提示为您提供一种电子邮件结构，可以鼓励客户迅速采取行动。
- en: '![](image_rsrc15E.jpg)'
  id: totrans-423
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc15E.jpg)'
- en: 29\. Product Feature Highlight for Email
  id: totrans-424
  prefs: []
  type: TYPE_NORMAL
  zh: 29. 邮件中突出产品功能
- en: 'Prompt:'
  id: totrans-425
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: “Write an email highlighting one of our flagship products. Include the key features,
    benefits, and how it helps our target audience. The tone should be authoritative
    and persuasive.”
  id: totrans-426
  prefs: []
  type: TYPE_NORMAL
  zh: “撰写一封突出我们旗舰产品的邮件。包括关键功能、好处以及它如何帮助我们的目标受众。语气应权威且具有说服力。”
- en: 'Why It Works:'
  id: totrans-427
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么它有效：
- en: Focusing on a product’s unique selling points is essential for conversions.
    This prompt will ensure that the email emphasizes the value and benefits effectively.
  id: totrans-428
  prefs: []
  type: TYPE_NORMAL
  zh: 关注产品的独特卖点对于转化至关重要。此提示将确保邮件有效地强调价值和好处。
- en: '![](image_rsrc15E.jpg)'
  id: totrans-429
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc15E.jpg)'
- en: 30\. Customer Success Story
  id: totrans-430
  prefs: []
  type: TYPE_NORMAL
  zh: 30. 客户成功故事
- en: 'Prompt:'
  id: totrans-431
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: “Write a customer success story about how our product helped a small business
    owner grow their brand. Focus on the results they achieved and the impact on their
    business. The tone should be inspiring and relatable.”
  id: totrans-432
  prefs: []
  type: TYPE_NORMAL
  zh: “撰写一篇关于我们的产品如何帮助一位小型企业主扩大其品牌的客户成功故事。重点关注他们取得的结果及其对业务的影响。语气应鼓舞人心且易于共鸣。”
- en: 'Why It Works:'
  id: totrans-433
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么它有效：
- en: Customer success stories help build credibility. This prompt highlights the
    real-world impact your product can have, creating trust among potential customers.
  id: totrans-434
  prefs: []
  type: TYPE_NORMAL
  zh: 客户成功故事有助于建立信誉。此提示突出了您的产品在现实世界中的影响，在潜在客户中建立信任。
- en: '![](image_rsrc15E.jpg)'
  id: totrans-435
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc15E.jpg)'
- en: 31\. Email Follow-up After Purchase
  id: totrans-436
  prefs: []
  type: TYPE_NORMAL
  zh: 31. 购买后的邮件跟进
- en: 'Prompt:'
  id: totrans-437
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: “Write an email follow-up after a purchase thanking the customer and providing
    information on how to get the most out of their new product. Include a request
    for a product review. The tone should be appreciative and friendly.”
  id: totrans-438
  prefs: []
  type: TYPE_NORMAL
  zh: “在购买后撰写一封邮件，感谢客户并提供有关如何充分利用他们新产品的信息。包括对产品评论的请求。语气应感激且友好。”
- en: 'Why It Works:'
  id: totrans-439
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么它有效：
- en: Following up after a purchase builds a positive customer experience and encourages
    loyalty. This prompt ensures the email is both thank-you oriented and action-oriented.
  id: totrans-440
  prefs: []
  type: TYPE_NORMAL
  zh: 购买后的跟进建立积极的客户体验并鼓励忠诚度。此提示确保邮件既以感谢为导向，又以行动为导向。
- en: '![](image_rsrc15E.jpg)'
  id: totrans-441
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc15E.jpg)'
- en: 32\. Sales Funnel Nurturing Email
  id: totrans-442
  prefs: []
  type: TYPE_NORMAL
  zh: 32. 销售漏斗培养型邮件
- en: 'Prompt:'
  id: totrans-443
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: “Write a nurturing email for subscribers who haven’t yet purchased. Share helpful
    tips or success stories and offer a limited-time discount to encourage them to
    buy. The tone should be gentle and persuasive.”
  id: totrans-444
  prefs: []
  type: TYPE_NORMAL
  zh: “为尚未购买的订阅者撰写培养型邮件。分享有用的提示或成功故事，并提供限时折扣以鼓励他们购买。语气应温和且具有说服力。”
- en: 'Why It Works:'
  id: totrans-445
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么它有效：
- en: Nurturing emails help guide potential customers through your sales funnel. This
    prompt ensures a soft approach that provides value and encourages action.
  id: totrans-446
  prefs: []
  type: TYPE_NORMAL
  zh: 培养型邮件有助于引导潜在客户通过您的销售漏斗。此提示确保了一种温和的方法，提供价值并鼓励采取行动。
- en: '![](image_rsrc15E.jpg)'
  id: totrans-447
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc15E.jpg)'
- en: 33\. Loyalty Program Announcement
  id: totrans-448
  prefs: []
  type: TYPE_NORMAL
  zh: 33. 忠诚度计划公告
- en: 'Prompt:'
  id: totrans-449
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: “Write an announcement about a new loyalty program for returning customers.
    Explain how it works, the benefits, and how customers can sign up. The tone should
    be welcoming and enthusiastic.”
  id: totrans-450
  prefs: []
  type: TYPE_NORMAL
  zh: “为回头客写一篇关于新忠诚度计划的公告。解释它的工作方式、好处以及客户如何注册。语气应该是欢迎和热情的。”
- en: 'Why It Works:'
  id: totrans-451
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么它有效：
- en: Loyalty programs foster customer retention. This prompt ensures the message
    is clear and exciting, motivating customers to participate.
  id: totrans-452
  prefs: []
  type: TYPE_NORMAL
  zh: 忠诚计划促进客户保留。这个提示确保信息清晰且令人兴奋，激励客户参与。
- en: '![](image_rsrc15E.jpg)'
  id: totrans-453
  prefs: []
  type: TYPE_IMG
  zh: '![image_rsrc15E.jpg]'
- en: 34\. New Service Announcement
  id: totrans-454
  prefs: []
  type: TYPE_NORMAL
  zh: 34. 新服务公告
- en: 'Prompt:'
  id: totrans-455
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: “Create an announcement for a new service offering. Include details about how
    the service works, who it’s for, and why it’s beneficial. The tone should be informative
    and professional.”
  id: totrans-456
  prefs: []
  type: TYPE_NORMAL
  zh: “创建一项新服务提供的公告。包括服务如何运作、面向的对象以及为什么它是有益的。语气应该是信息性和专业的。”
- en: 'Why It Works:'
  id: totrans-457
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么它有效：
- en: New services require clear and engaging communication to inform and entice customers.
    This prompt ensures that your announcement provides all the essential details.
  id: totrans-458
  prefs: []
  type: TYPE_NORMAL
  zh: 新服务需要清晰和吸引人的沟通来告知和吸引客户。这个提示确保你的公告提供了所有必要的信息。
- en: '![](image_rsrc15E.jpg)'
  id: totrans-459
  prefs: []
  type: TYPE_IMG
  zh: '![image_rsrc15E.jpg]'
- en: 35\. Limited-Edition Product Announcement
  id: totrans-460
  prefs: []
  type: TYPE_NORMAL
  zh: 35. 限量版产品公告
- en: 'Prompt:'
  id: totrans-461
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: “Write a product announcement for a limited-edition item. Emphasize its exclusivity
    and the urgency to buy before it’s gone. The tone should be exciting and exclusive.”
  id: totrans-462
  prefs: []
  type: TYPE_NORMAL
  zh: “为限量版商品写一篇产品公告。强调其独特性和在售罄前的购买紧迫性。语气应该是激动人心的和独特的。”
- en: 'Why It Works:'
  id: totrans-463
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么它有效：
- en: Limited editions create urgency and exclusivity. This prompt makes sure the
    announcement generates excitement and drives immediate sales.
  id: totrans-464
  prefs: []
  type: TYPE_NORMAL
  zh: 限量版创造紧迫感和独特性。这个提示确保公告能激发兴奋情绪并推动即时销售。
- en: '![](image_rsrc15E.jpg)'
  id: totrans-465
  prefs: []
  type: TYPE_IMG
  zh: '![image_rsrc15E.jpg]'
- en: 36\. Post-Sale Thank You Note
  id: totrans-466
  prefs: []
  type: TYPE_NORMAL
  zh: 36. 销售后感谢信
- en: 'Prompt:'
  id: totrans-467
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: “Write a heartfelt thank you note to a customer who just made a large purchase.
    Express appreciation for their support, highlight their importance to the brand,
    and offer a discount for future purchases. The tone should be warm and sincere.”
  id: totrans-468
  prefs: []
  type: TYPE_NORMAL
  zh: “写一封充满感情的感谢信给刚刚做了大额购买的客户。表达对他们支持的感激，强调他们对品牌的重要性，并提供未来购买的折扣。语气应该是温暖和真诚的。”
- en: 'Why It Works:'
  id: totrans-469
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么它有效：
- en: Personal thank-you notes make customers feel valued, which can help build long-term
    loyalty. This prompt adds a personal touch to the customer’s experience.
  id: totrans-470
  prefs: []
  type: TYPE_NORMAL
  zh: 个人感谢信能让客户感到被重视，这有助于建立长期忠诚度。这个提示为客户的体验增添了个人化的触感。
- en: '![](image_rsrc15E.jpg)'
  id: totrans-471
  prefs: []
  type: TYPE_IMG
  zh: '![image_rsrc15E.jpg]'
- en: 37\. FAQ Page Content
  id: totrans-472
  prefs: []
  type: TYPE_NORMAL
  zh: 37. 常见问题解答页面内容
- en: 'Prompt:'
  id: totrans-473
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: “Create an FAQ page for my website. Include questions like ‘What is the best
    way to contact customer support?’ and ‘Do you offer international shipping?’ The
    tone should be helpful and clear.”
  id: totrans-474
  prefs: []
  type: TYPE_NORMAL
  zh: “为我的网站创建一个常见问题解答页面。包括像‘如何最佳地联系客户支持？’和‘你们提供国际运输吗？’这样的问题。语气应该是帮助性和清晰的。”
- en: 'Why It Works:'
  id: totrans-475
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么它有效：
- en: An FAQ page ensures customers get the information they need. This prompt ensures
    the content is easy to understand and addresses common queries.
  id: totrans-476
  prefs: []
  type: TYPE_NORMAL
  zh: 常见问题解答页面确保客户获得所需信息。这个提示确保内容易于理解并解决常见问题。
- en: '![](image_rsrc15E.jpg)'
  id: totrans-477
  prefs: []
  type: TYPE_IMG
  zh: '![image_rsrc15E.jpg]'
- en: 38\. Social Media Feedback Request
  id: totrans-478
  prefs: []
  type: TYPE_NORMAL
  zh: 38. 社交媒体反馈请求
- en: 'Prompt:'
  id: totrans-479
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: “Write a post asking for feedback from followers about a recent product. Encourage
    comments and be open to suggestions. The tone should be conversational and inviting.”
  id: totrans-480
  prefs: []
  type: TYPE_NORMAL
  zh: “写一篇帖子，向粉丝征求关于最近产品的反馈。鼓励评论并开放接受建议。语气应该是对话性和邀请性的。”
- en: 'Why It Works:'
  id: totrans-481
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么它有效：
- en: Asking for feedback creates engagement and shows customers that you care about
    their opinions. This prompt ensures the tone is friendly and encourages interaction.
  id: totrans-482
  prefs: []
  type: TYPE_NORMAL
  zh: 征求反馈创造参与感并表明你关心客户的意见。这个提示确保语气友好并鼓励互动。
- en: '![](image_rsrc15E.jpg)'
  id: totrans-483
  prefs: []
  type: TYPE_IMG
  zh: '![image_rsrc15E.jpg]'
- en: 39\. Cross-Sell Email
  id: totrans-484
  prefs: []
  type: TYPE_NORMAL
  zh: 39. 跨卖电子邮件
- en: 'Prompt:'
  id: totrans-485
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: “Write an email that cross-sells related products after a customer has made
    a purchase. Offer a bundle deal with a discount. The tone should be helpful and
    non-pushy.”
  id: totrans-486
  prefs: []
  type: TYPE_NORMAL
  zh: “在客户购买后写一封电子邮件来推销相关产品。提供带折扣的捆绑套餐。语气应该是帮助性和非推销性的。”
- en: 'Why It Works:'
  id: totrans-487
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么它有效：
- en: Cross-selling can increase sales, but it’s important to present it in a helpful
    way. This prompt encourages a balanced approach without sounding too salesy.
  id: totrans-488
  prefs: []
  type: TYPE_NORMAL
  zh: 跨卖可以提高销售额，但以帮助性的方式呈现它很重要。这个提示鼓励采取平衡的方法，而不显得过于推销。
- en: '![](image_rsrc15E.jpg)'
  id: totrans-489
  prefs: []
  type: TYPE_IMG
  zh: '![image_rsrc15E.jpg]'
- en: 40\. Thank You Message for Social Media Share
  id: totrans-490
  prefs: []
  type: TYPE_NORMAL
  zh: 40. 社交媒体分享感谢信息
- en: 'Prompt:'
  id: totrans-491
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: “Write a message thanking a follower for sharing a post about my product. Offer
    them a special discount code as a token of appreciation. The tone should be warm
    and personal.”
  id: totrans-492
  prefs: []
  type: TYPE_NORMAL
  zh: “写一封感谢信给一位分享我产品帖子的追随者。作为感谢的象征，提供他们特殊折扣码。语气应该是温馨和个性化的。”
- en: 'Why It Works:'
  id: totrans-493
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么它有效：
- en: Engaging with customers who share your content shows appreciation and can inspire
    them to continue promoting your business.
  id: totrans-494
  prefs: []
  type: TYPE_NORMAL
  zh: 与分享你内容的人互动表示感激，并可以激励他们继续推广你的业务。
- en: '![](image_rsrc15E.jpg)'
  id: totrans-495
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrc15E.jpg)'
- en: 41\. Sale Announcement for Email
  id: totrans-496
  prefs: []
  type: TYPE_NORMAL
  zh: 41. 邮件销售公告
- en: 'Prompt:'
  id: totrans-497
  prefs: []
  type: TYPE_NORMAL
  zh: 'Prompt:'
- en: “Write an email announcing a flash sale on our website. Include the sale details,
    a countdown clock, and a sense of urgency. The tone should be exciting and prompt
    immediate action.”
  id: totrans-498
  prefs: []
  type: TYPE_NORMAL
  zh: “写一封邮件宣布我们网站上的闪购活动。包括销售详情、倒计时时钟和紧迫感。语气应该是激动人心的，并促使立即采取行动。”
- en: 'Why It Works:'
  id: totrans-499
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么它有效：
- en: Flash sales require urgency, so this prompt ensures the email includes all the
    necessary elements to generate excitement and encourage immediate action.
  id: totrans-500
  prefs: []
  type: TYPE_NORMAL
  zh: 闪购需要紧迫感，所以这个提示确保邮件包含所有必要的元素来产生兴奋感并鼓励立即采取行动。
- en: '![](image_rsrc15E.jpg)'
  id: totrans-501
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrc15E.jpg)'
- en: 42\. Social Media Giveaway
  id: totrans-502
  prefs: []
  type: TYPE_NORMAL
  zh: 42. 社交媒体赠品
- en: 'Prompt:'
  id: totrans-503
  prefs: []
  type: TYPE_NORMAL
  zh: 'Prompt:'
- en: “Write a post announcing a giveaway. Explain the rules, what the winner will
    receive, and how to enter. The tone should be fun and engaging.”
  id: totrans-504
  prefs: []
  type: TYPE_NORMAL
  zh: “写一篇宣布赠品的帖子。解释规则、获胜者将获得什么以及如何参与。语气应该是有趣和吸引人的。”
- en: 'Why It Works:'
  id: totrans-505
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么它有效：
- en: Giveaways boost engagement and attract attention. This prompt ensures that your
    post is clear and encourages followers to participate.
  id: totrans-506
  prefs: []
  type: TYPE_NORMAL
  zh: 赠品可以提高参与度和吸引注意力。这个提示确保你的帖子清晰，并鼓励追随者参与。
- en: '![](image_rsrc15E.jpg)'
  id: totrans-507
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrc15E.jpg)'
- en: 43\. Webinar Follow-Up Email
  id: totrans-508
  prefs: []
  type: TYPE_NORMAL
  zh: 43. 网络研讨会跟进邮件
- en: 'Prompt:'
  id: totrans-509
  prefs: []
  type: TYPE_NORMAL
  zh: 'Prompt:'
- en: “Write a follow-up email to attendees after a webinar. Thank them for attending,
    provide a link to the recording, and include a special offer. The tone should
    be appreciative and helpful.”
  id: totrans-510
  prefs: []
  type: TYPE_NORMAL
  zh: “在网络研讨会结束后给参与者写一封跟进邮件。感谢他们参加，提供录制链接，并包含特别优惠。语气应该是感激和有帮助的。”
- en: 'Why It Works:'
  id: totrans-511
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么它有效：
- en: A follow-up email reinforces the value of your webinar and gives you a chance
    to nurture leads. This prompt helps create a post-event touchpoint that adds value.
  id: totrans-512
  prefs: []
  type: TYPE_NORMAL
  zh: 跟进邮件可以加强网络研讨会价值，并给你一个培养潜在客户的机会。这个提示帮助创建一个事后接触点，增加价值。
- en: '![](image_rsrc15E.jpg)'
  id: totrans-513
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrc15E.jpg)'
- en: 44\. Seasonal Content Strategy
  id: totrans-514
  prefs: []
  type: TYPE_NORMAL
  zh: 44. 季节性内容策略
- en: 'Prompt:'
  id: totrans-515
  prefs: []
  type: TYPE_NORMAL
  zh: 'Prompt:'
- en: “Write a content strategy for the holiday season. Include ideas for blog posts,
    social media content, and sales campaigns. The tone should be festive and strategic.”
  id: totrans-516
  prefs: []
  type: TYPE_NORMAL
  zh: “为假日季节制定内容策略。包括博客文章、社交媒体内容和销售活动的想法。语气应该是节日气氛和策略性的。”
- en: 'Why It Works:'
  id: totrans-517
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么它有效：
- en: Planning seasonal content ahead of time ensures consistency in messaging. This
    prompt helps you organize and create content that aligns with the season.
  id: totrans-518
  prefs: []
  type: TYPE_NORMAL
  zh: 提前规划季节性内容可以确保信息的一致性。这个提示帮助你组织和创建与季节相符的内容。
- en: '![](image_rsrc15E.jpg)'
  id: totrans-519
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrc15E.jpg)'
- en: 45\. Influencer Marketing Strategy
  id: totrans-520
  prefs: []
  type: TYPE_NORMAL
  zh: 45. 网红营销策略
- en: 'Prompt:'
  id: totrans-521
  prefs: []
  type: TYPE_NORMAL
  zh: 'Prompt:'
- en: “Write a strategy for incorporating influencer marketing into my small business
    marketing plan. The strategy should focus on finding the right influencers and
    ensuring the partnership aligns with my brand values. The tone should be professional
    and well-researched.”
  id: totrans-522
  prefs: []
  type: TYPE_NORMAL
  zh: “为将网红营销纳入我的小型企业营销计划制定策略。策略应侧重于找到合适的网红，并确保合作伙伴关系与我的品牌价值观一致。语气应该是专业和经过充分研究的。”
- en: 'Why It Works:'
  id: totrans-523
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么它有效：
- en: This prompt helps structure an effective influencer marketing strategy, ensuring
    that your influencer partnerships are aligned with your brand and business goals.
  id: totrans-524
  prefs: []
  type: TYPE_NORMAL
  zh: 这个提示有助于构建有效的网红营销策略，确保你的网红合作伙伴与你的品牌和商业目标一致。
- en: '![](image_rsrc15E.jpg)'
  id: totrans-525
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrc15E.jpg)'
- en: 46\. Product Review Request
  id: totrans-526
  prefs: []
  type: TYPE_NORMAL
  zh: 46. 产品评论请求
- en: 'Prompt:'
  id: totrans-527
  prefs: []
  type: TYPE_NORMAL
  zh: 'Prompt:'
- en: “Write a friendly email requesting a product review from a customer who recently
    purchased from our store. Offer an incentive such as a discount for future purchases.
    The tone should be polite and appreciative.”
  id: totrans-528
  prefs: []
  type: TYPE_NORMAL
  zh: “写一封友好的邮件，请求一位最近在我们商店购买过产品的客户进行产品评论。提供未来购买的折扣等激励措施。语气应该是礼貌和感激的。”
- en: 'Why It Works:'
  id: totrans-529
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么它有效：
- en: Product reviews are critical for building social proof. This prompt ensures
    that your request is respectful and encourages customers to leave positive feedback.
  id: totrans-530
  prefs: []
  type: TYPE_NORMAL
  zh: 产品评论对于建立社会信任至关重要。这个提示确保你的请求是尊重的，并鼓励客户留下正面反馈。
- en: '![](image_rsrc15E.jpg)'
  id: totrans-531
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrc15E.jpg)'
- en: 47\. Abandoned Cart Email
  id: totrans-532
  prefs: []
  type: TYPE_NORMAL
  zh: 47. 被遗弃的购物车邮件
- en: 'Prompt:'
  id: totrans-533
  prefs: []
  type: TYPE_NORMAL
  zh: 'Prompt:'
- en: “Write an email to a customer who left items in their cart. Include a reminder
    of the items, offer a small discount to complete the purchase, and include a clear
    call to action. The tone should be friendly and persuasive.”
  id: totrans-534
  prefs: []
  type: TYPE_NORMAL
  zh: “给一位将商品留在购物车中的客户发送一封电子邮件。包括对商品的提醒，提供小额折扣以完成购买，并包含明确的行动号召。语气应友好且具有说服力。”
- en: 'Why It Works:'
  id: totrans-535
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么它有效：
- en: Abandoned cart emails recover potential sales by providing a gentle nudge. This
    prompt encourages the customer to complete their purchase by offering a discount.
  id: totrans-536
  prefs: []
  type: TYPE_NORMAL
  zh: 被遗弃的购物车电子邮件通过提供温和的推动来恢复潜在销售。这个提示鼓励客户通过提供折扣来完成他们的购买。
- en: '![](image_rsrc15E.jpg)'
  id: totrans-537
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrc15E.jpg)'
- en: 48\. Testimonial Sharing Post
  id: totrans-538
  prefs: []
  type: TYPE_NORMAL
  zh: 48. 分享评价帖子
- en: 'Prompt:'
  id: totrans-539
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: “Write a post sharing a customer testimonial. Highlight their experience and
    how your product made a difference in their business. The tone should be genuine
    and appreciative.”
  id: totrans-540
  prefs: []
  type: TYPE_NORMAL
  zh: “撰写一篇分享客户评价的帖子。突出他们的体验以及你的产品如何在他们的事业中产生差异。语气应真诚且感激。”
- en: 'Why It Works:'
  id: totrans-541
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么它有效：
- en: Sharing testimonials builds trust with your audience. This prompt ensures the
    testimonial is presented authentically, creating more credibility for your brand.
  id: totrans-542
  prefs: []
  type: TYPE_NORMAL
  zh: 分享评价可以与你的受众建立信任。这个提示确保评价以真实的方式呈现，为你的品牌创造更多信誉。
- en: '![](image_rsrc15E.jpg)'
  id: totrans-543
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrc15E.jpg)'
- en: 49\. Exclusive Offer Email
  id: totrans-544
  prefs: []
  type: TYPE_NORMAL
  zh: 49. 专属优惠电子邮件
- en: 'Prompt:'
  id: totrans-545
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: “Write an email offering an exclusive discount to loyal customers. The tone
    should be VIP-like and make the customer feel special.”
  id: totrans-546
  prefs: []
  type: TYPE_NORMAL
  zh: “撰写一封向忠实客户提供独家折扣的电子邮件。语气应像VIP一样，让客户感到特别。”
- en: 'Why It Works:'
  id: totrans-547
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么它有效：
- en: Exclusive offers make customers feel valued. This prompt emphasizes the importance
    of making the offer feel personal and unique.
  id: totrans-548
  prefs: []
  type: TYPE_NORMAL
  zh: 专属优惠让客户感到被重视。这个提示强调了让优惠感觉个性化且独特的重要性。
- en: '![](image_rsrc15E.jpg)'
  id: totrans-549
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrc15E.jpg)'
- en: 50\. Limited-Time Product Launch Email
  id: totrans-550
  prefs: []
  type: TYPE_NORMAL
  zh: 50. 限时产品发布电子邮件
- en: 'Prompt:'
  id: totrans-551
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: “Write a time-sensitive email announcing a new product launch with limited availability.
    Include the product features, benefits, and an urgency-driven call to action.
    The tone should be exciting and urgent.”
  id: totrans-552
  prefs: []
  type: TYPE_NORMAL
  zh: “撰写一封时间敏感的电子邮件，宣布一款限量供应的新产品发布。包括产品特性、优势和紧迫性的行动号召。语气应充满激情和紧迫。”
- en: 'Why It Works:'
  id: totrans-553
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么它有效：
- en: This final prompt is meant to create urgency and drive sales with a limited-time
    offer, ensuring your audience knows they need to act fast.
  id: totrans-554
  prefs: []
  type: TYPE_NORMAL
  zh: 这个最后的提示旨在通过限时优惠创造紧迫感并推动销售，确保你的受众知道他们需要迅速行动。
- en: CONCLUSION
  id: totrans-555
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: These fifty prompts are designed to help you streamline your marketing content
    creation process, making it easier to engage your audience, communicate your brand
    voice, and convert leads into loyal customers. By adjusting these prompts to your
    specific needs, you’ll have a robust toolkit for content generation that saves
    time while keeping your messaging on-brand.
  id: totrans-556
  prefs: []
  type: TYPE_NORMAL
  zh: 这五十个提示旨在帮助你简化营销内容创作流程，使你更容易吸引受众、传达品牌声音并将潜在客户转化为忠实客户。通过调整这些提示以适应你的具体需求，你将拥有一个强大的内容生成工具包，节省时间同时保持信息与品牌一致。
- en: Now, take these prompts, and let ChatGPT help you create content that truly
    connects with your audience, drives real engagement, and moves your business forward.
  id: totrans-557
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，利用这些提示，让ChatGPT帮助你创建真正与受众连接、驱动真实参与并推动你业务前进的内容。
- en: Wishing you success as you bring your brand to life!
  id: totrans-558
  prefs: []
  type: TYPE_NORMAL
  zh: 祝你在将品牌带入生活时取得成功！
