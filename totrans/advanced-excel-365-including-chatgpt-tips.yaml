- en: Scenario 30
  id: totrans-3558
  prefs: []
  type: TYPE_NORMAL
  zh: 场景30
- en: Create a UserForm which will accept the participant’s information to get enrolled
    for the training. The form should have Insert and Cancel command buttons. When
    the Insert button is clicked, the information entered in the form must go into
    Excel. When the Cancel button is clicked, the Form should be closed.
  id: totrans-3559
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个用户表单，用于接受参与者的信息以便注册培训。表单应包含插入和取消命令按钮。当点击插入按钮时，表单中输入的信息必须进入Excel。当点击取消按钮时，表单应关闭。
- en: Solution
  id: totrans-3560
  prefs: []
  type: TYPE_NORMAL
  zh: 解决方案
- en: Follow the steps below.
  id: totrans-3561
  prefs: []
  type: TYPE_NORMAL
  zh: 按照以下步骤操作。
- en: 1. Insert a UserForm.
  id: totrans-3562
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 插入一个用户表单。
- en: 2. Change the name and caption from the property window.
  id: totrans-3563
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 从属性窗口更改名称和标题。
- en: 3. The name of the form should be “USR_enroll.”
  id: totrans-3564
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 表单的名称应为“USR_enroll。”
- en: 4. The caption should be “Training Enrollment Form.”
  id: totrans-3565
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 标题应为“培训注册表单。”
- en: 5. Design the form as shown in [Figure 22.5](#fig22-5).
  id: totrans-3566
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 按照如图22.5所示的样式设计表单。
- en: '![image](image/Figure_22.5.jpg)'
  id: totrans-3567
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image/Figure_22.5.jpg)'
- en: Figure 22.5 Scenario 30 Solution
  id: totrans-3568
  prefs: []
  type: TYPE_NORMAL
  zh: 图22.5 场景30解决方案
- en: This example has several properties.
  id: totrans-3569
  prefs: []
  type: TYPE_NORMAL
  zh: 此示例有几个属性。
- en: '■Label: Displays descriptive text.'
  id: totrans-3570
  prefs: []
  type: TYPE_NORMAL
  zh: ■标签：显示描述性文本。
- en: '■TextBox: A TextBox is the control most commonly used to display information
    entered by a user.'
  id: totrans-3571
  prefs: []
  type: TYPE_NORMAL
  zh: ■文本框：文本框是最常用的控制项，用于显示用户输入的信息。
- en: '■ListBox: Displays a list of values and lets you select one or more.'
  id: totrans-3572
  prefs: []
  type: TYPE_NORMAL
  zh: ■列表框：显示一系列值，并允许您选择一个或多个。
- en: '■ComboBox: Combines the features of a ListBox and a TextBox. The user can enter
    a new value, as with a TextBox, or the user can select an existing value, as with
    a ListBox.'
  id: totrans-3573
  prefs: []
  type: TYPE_NORMAL
  zh: ■ComboBox：结合了 ListBox 和 TextBox 的功能。用户可以输入新值，就像在 TextBox 中一样，或者用户可以选择现有值，就像在
    ListBox 中一样。
- en: '■Frame: Creates a functional and visual control group.'
  id: totrans-3574
  prefs: []
  type: TYPE_NORMAL
  zh: ■框架：创建功能性和视觉上的控件组。
- en: '■Properties: Attributes (properties or variables).'
  id: totrans-3575
  prefs: []
  type: TYPE_NORMAL
  zh: ■属性：属性（属性或变量）。
- en: '■Methods: Operations the object will perform with the attribute.'
  id: totrans-3576
  prefs: []
  type: TYPE_NORMAL
  zh: ■方法：对象将使用属性执行的操作。
- en: Refer to the following [Table 22.1](#tab22-1).
  id: totrans-3577
  prefs: []
  type: TYPE_NORMAL
  zh: 参考以下 [Table 22.1](#tab22-1)。
- en: TABLE 22.1 Employee UserForm
  id: totrans-3578
  prefs: []
  type: TYPE_NORMAL
  zh: 表 22.1 员工 UserForm
- en: '![image](image/pg-268.jpg)'
  id: totrans-3579
  prefs: []
  type: TYPE_IMG
  zh: '![image](image/pg-268.jpg)'
- en: Conclusion
  id: totrans-3580
  prefs: []
  type: TYPE_NORMAL
  zh: 结论
- en: In conclusion, User Forms and user input are essential components of Visual
    Basic Scripting (VBS) that allow developers to create interactive and user-friendly
    applications. By utilizing User Forms, developers can design intuitive interfaces,
    capture user input, and enhance the overall user experience. Incorporating User
    Forms and effectively managing user input can greatly improve the functionality
    and usability of VBS applications.
  id: totrans-3581
  prefs: []
  type: TYPE_NORMAL
  zh: 总之，User Forms 和用户输入是 Visual Basic Scripting (VBS) 的基本组件，允许开发者创建交互式和用户友好的应用程序。通过使用
    User Forms，开发者可以设计直观的界面，捕获用户输入，并提升整体用户体验。结合 User Forms 并有效管理用户输入可以极大地提高 VBS 应用程序的功能性和可用性。
- en: Exercises
  id: totrans-3582
  prefs: []
  type: TYPE_NORMAL
  zh: 练习
- en: '1. Create a UserForm called “RegistrationForm” that captures user information
    for event registration. The form should include the following controls:'
  id: totrans-3583
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 创建一个名为“RegistrationForm”的 UserForm，用于捕获事件注册的用户信息。该表单应包括以下控件：
- en: 'a. Labels: “Name:,” “Email:,” “Phone:,” “Event:,” “Payment Method:.”'
  id: totrans-3584
  prefs: []
  type: TYPE_NORMAL
  zh: a. 标签：“姓名：”，“邮箱：”，“电话：”，“事件：”，“支付方式：。”
- en: b. Textboxes where the user will enter their name, email, and phone number.
  id: totrans-3585
  prefs: []
  type: TYPE_NORMAL
  zh: b. 文本框，用户将在其中输入他们的姓名、邮箱和电话号码。
- en: c. Combobox containing a list of events for the user to select.
  id: totrans-3586
  prefs: []
  type: TYPE_NORMAL
  zh: c. 包含用户可以选择的事件列表的 ComboBox。
- en: d. Option buttons for the user to choose their preferred payment method (e.g.,
    “Credit Card,” “PayPal,” “Cash”).
  id: totrans-3587
  prefs: []
  type: TYPE_NORMAL
  zh: d. 选项按钮，用户可以选择他们偏好的支付方式（例如，“信用卡”，“PayPal”，“现金”）。
- en: 'e. Command buttons: “Submit” and “Clear.”'
  id: totrans-3588
  prefs: []
  type: TYPE_NORMAL
  zh: e. 命令按钮：“提交”和“清除。”
- en: Your task is to design the UserForm with the appropriate controls, set their
    properties, and handle events for the Submit and Clear buttons.
  id: totrans-3589
  prefs: []
  type: TYPE_NORMAL
  zh: 您的任务是设计带有适当控制的 UserForm，设置它们的属性，并处理“提交”和“清除”按钮的事件。
- en: CHAPTER  23
  id: totrans-3590
  prefs: []
  type: TYPE_NORMAL
  zh: 第 23 章
- en: Advanced VBA Techniques and Best Practices
  id: totrans-3591
  prefs: []
  type: TYPE_NORMAL
  zh: 高级 VBA 技巧和最佳实践
- en: Introduction
  id: totrans-3592
  prefs: []
  type: TYPE_NORMAL
  zh: 简介
- en: In this chapter, we delve into advanced VBA techniques and best practices to
    enhance the functionality and efficiency of Excel applications. We explore topics
    such as initializing control values, working with option buttons, creating custom
    buttons and user forms, utilizing Add-ins, implementing a case conversion Add-In,
    and creating menus through code. By mastering these advanced techniques, readers
    will gain a deeper understanding of VBA programming and be able to build more
    powerful and user-friendly Excel applications.
  id: totrans-3593
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将深入探讨高级 VBA 技巧和最佳实践，以增强 Excel 应用程序的功能和效率。我们探讨了初始化控件值、处理选项按钮、创建自定义按钮和用户表单、使用插件、实现大小写转换插件以及通过代码创建菜单等主题。通过掌握这些高级技巧，读者将更深入地理解
    VBA 编程，并能够构建更强大、更用户友好的 Excel 应用程序。
- en: Structure
  id: totrans-3594
  prefs: []
  type: TYPE_NORMAL
  zh: 结构
- en: 'In this chapter, we will go over the following topics:'
  id: totrans-3595
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将讨论以下主题：
- en: ■Code to set initial values for the control
  id: totrans-3596
  prefs: []
  type: TYPE_NORMAL
  zh: ■设置控制器初始值的代码
- en: ■Code for option buttons
  id: totrans-3597
  prefs: []
