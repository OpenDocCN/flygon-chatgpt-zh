  prefs: []
  type: TYPE_NORMAL
- en: Summary
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The code for this chapter is available in the folder 11_Chat_With_Document from
    the book source code.
  prefs: []
  type: TYPE_NORMAL
- en: In this chapter, you’ve learned how to create a Chat With Document application
    using LangChain.
  prefs: []
  type: TYPE_NORMAL
- en: Using the RAG technique, LangChain can be used to retrieve information from
    a document, and then pass the information to the LLM.
  prefs: []
  type: TYPE_NORMAL
- en: The first thing you need to do is to process the document and turn it into chunks,
    which can then be converted into vectors using an embedding model.
  prefs: []
  type: TYPE_NORMAL
- en: The vectors are stored in ChromaDB, and the retriever created from the database
    is used when the user sends a query or input.
  prefs: []
  type: TYPE_NORMAL
- en: Once the core functionality is finished, you can easily add a web interface
    and chat memory into the application using Streamlit.
  prefs: []
  type: TYPE_NORMAL
- en: Next, let’s see how we can load documents in different formats, such as .docx
    and .pdf.
  prefs: []
  type: TYPE_NORMAL
- en: 'Chapter 12: Uploading Different Document Types'
  prefs: []
  type: TYPE_NORMAL
- en: Now that we can load and interact with a .txt document in LangChain, let’s improve
    the application so we can also load other document types or formats, such as .docx
    and .pdf.
  prefs: []
  type: TYPE_NORMAL
- en: To load different document types, you need to create a file uploader interface
    in Streamlit.
  prefs: []
  type: TYPE_NORMAL
- en: 'Just below the Streamlit title, add new code as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: st.title("Ask the Document")
  prefs: []
  type: TYPE_NORMAL
- en: 'uploaded_file = st.file_uploader("Upload your document: ", type=["pdf", "docx",
    "txt"])'
  prefs: []
  type: TYPE_NORMAL
- en: add_file = st.button("Submit File", on_click=clear_history)
  prefs: []
  type: TYPE_NORMAL
- en: 'if uploaded_file and add_file:'
  prefs: []
  type: TYPE_NORMAL
- en: process_file(uploaded_file)
  prefs: []
  type: TYPE_NORMAL
- en: The st.file_uploader() method creates a file uploader input, then we add a button
    to submit the file.
  prefs: []
  type: TYPE_NORMAL
- en: 'When the submit button is clicked, the clear_history() method will be executed,
    so you need to define the method next:'
  prefs: []
  type: TYPE_NORMAL
- en: 'def clear_history():'
  prefs: []
  type: TYPE_NORMAL
- en: 'if "langchain_messages" in st.session_state:'
  prefs: []
  type: TYPE_NORMAL
- en: del st.session_state["langchain_messages"]
  prefs: []
  type: TYPE_NORMAL
- en: Above the clear_history() function, create a new function named process_file()
    to process the uploaded file.
  prefs: []
  type: TYPE_NORMAL
- en: 'This function needs to check on the extension of the document to use the right
    loader:'
  prefs: []
  type: TYPE_NORMAL
- en: 'def process_file(file):'
  prefs: []
  type: TYPE_NORMAL
- en: 'with st.spinner("File is in process..."):'
  prefs: []
  type: TYPE_NORMAL
- en: data = file.read()
  prefs: []
  type: TYPE_NORMAL
- en: file_name = os.path.join("./", file.name)
  prefs: []
  type: TYPE_NORMAL
- en: 'with open(file_name, "wb") as f:'
  prefs: []
  type: TYPE_NORMAL
- en: f.write(data)
  prefs: []
  type: TYPE_NORMAL
- en: name, extension = os.path.splitext(file_name)
  prefs: []
  type: TYPE_NORMAL
- en: 'if extension == ".pdf":'
  prefs: []
  type: TYPE_NORMAL
- en: from langchain_community.document_loaders import PyPDFLoader
  prefs: []
  type: TYPE_NORMAL
- en: loader = PyPDFLoader(file_name)
  prefs: []
  type: TYPE_NORMAL
- en: 'elif extension == ".docx":'
  prefs: []
  type: TYPE_NORMAL
- en: from langchain_community.document_loaders import Docx2txtLoader
  prefs: []
  type: TYPE_NORMAL
- en: loader = Docx2txtLoader(file_name)
  prefs: []
  type: TYPE_NORMAL
- en: 'elif extension == ".txt":'
  prefs: []
  type: TYPE_NORMAL
- en: from langchain_community.document_loaders import TextLoader
  prefs: []
  type: TYPE_NORMAL
- en: loader = TextLoader(file_name)
  prefs: []
  type: TYPE_NORMAL
- en: 'else:'
  prefs: []
  type: TYPE_NORMAL
- en: st.error("This format is not supported!")
  prefs: []
  type: TYPE_NORMAL
- en: The LangChain loaders simply load the respective document using Python packages.
  prefs: []
  type: TYPE_NORMAL
- en: 'You need to install the PyPDF and Docx2txt packages used by the loaders:'
  prefs: []
  type: TYPE_NORMAL
- en: pip install pypdf == 4.2.0 docx2txt == 0.8
  prefs: []
  type: TYPE_NORMAL
- en: 'Once the loader is created, you can load and split the document into chunks,
    convert the chunks into vectors, and create the chains as before:'
  prefs: []
  type: TYPE_NORMAL
- en: docs = loader.load()
  prefs: []
  type: TYPE_NORMAL
- en: text_splitter = RecursiveCharacterTextSplitter(
  prefs: []
  type: TYPE_NORMAL
- en: chunk_size=1000, chunk_overlap=200
  prefs: []
  type: TYPE_NORMAL
- en: )
  prefs: []
  type: TYPE_NORMAL
- en: chunks = text_splitter.split_documents(docs)
  prefs: []
  type: TYPE_NORMAL
- en: embeddings = OpenAIEmbeddings(openai_api_key=OPENAI_KEY)
  prefs: []
  type: TYPE_NORMAL
- en: vector_store = Chroma.from_documents(chunks, embeddings)
  prefs: []
  type: TYPE_NORMAL
- en: retriever = vector_store.as_retriever()
  prefs: []
  type: TYPE_NORMAL
- en: history_aware_retriever = create_history_aware_retriever(
  prefs: []
  type: TYPE_NORMAL
- en: llm, retriever, contextualize_prompt
  prefs: []
  type: TYPE_NORMAL
- en: )
  prefs: []
  type: TYPE_NORMAL
- en: rag_chain = create_retrieval_chain(
  prefs: []
  type: TYPE_NORMAL
- en: history_aware_retriever, question_answer_chain
  prefs: []
  type: TYPE_NORMAL
- en: )
  prefs: []
  type: TYPE_NORMAL
- en: conversational_rag_chain = RunnableWithMessageHistory(
  prefs: []
  type: TYPE_NORMAL
- en: rag_chain,
  prefs: []
  type: TYPE_NORMAL
- en: 'lambda session_id: history,'
  prefs: []
  type: TYPE_NORMAL
- en: input_messages_key="input",
  prefs: []
  type: TYPE_NORMAL
- en: history_messages_key="chat_history",
  prefs: []
  type: TYPE_NORMAL
- en: output_messages_key="answer",
  prefs: []
  type: TYPE_NORMAL
- en: )
  prefs: []
  type: TYPE_NORMAL
- en: To make the conversational_rag_chain, available outside of the function, we
    need to persist the object by saving it in Streamlit session state.
  prefs: []
  type: TYPE_NORMAL
- en: 'We also show a message saying the file is uploaded and embedded successfully:'
  prefs: []
  type: TYPE_NORMAL
- en: st.session_state.crc = conversational_rag_chain
  prefs: []
  type: TYPE_NORMAL
- en: st.success("File uploaded and embedded successfully")
  prefs: []
  type: TYPE_NORMAL
- en: When the user passes a question, you can check if crc is available in st.session_state
    and use it.
  prefs: []
  type: TYPE_NORMAL
- en: 'Also, don’t forget to call the pick() method from the crc chain to stream the
    answer:'
  prefs: []
  type: TYPE_NORMAL
- en: 'if question:'
  prefs: []
  type: TYPE_NORMAL
- en: 'with st.chat_message("user"):'
  prefs: []
  type: TYPE_NORMAL
- en: st.markdown(question)
  prefs: []
  type: TYPE_NORMAL
- en: 'if "crc" in st.session_state:'
  prefs: []
  type: TYPE_NORMAL
- en: crc = st.session_state["crc"]
  prefs: []
  type: TYPE_NORMAL
- en: answer_chain = crc.pick("answer")
  prefs: []
  type: TYPE_NORMAL
- en: response = answer_chain.stream(
  prefs: []
  type: TYPE_NORMAL
- en: '{"input": question}, config={"configurable": {"session_id": "any"}}'
  prefs: []
  type: TYPE_NORMAL
- en: )
  prefs: []
  type: TYPE_NORMAL
- en: 'with st.chat_message("assistant"):'
  prefs: []
  type: TYPE_NORMAL
- en: st.write_stream(response)
  prefs: []
  type: TYPE_NORMAL
- en: 'else:'
  prefs: []
  type: TYPE_NORMAL
- en: st.error("No document is uploaded. Upload your document first")
  prefs: []
  type: TYPE_NORMAL
- en: Here, we also add an else statement to inform the user when no document has
    been uploaded yet.
  prefs: []
  type: TYPE_NORMAL
- en: And that’s it. Now you can upload a .txt, .docx, or .pdf document and ask questions
    relevant to the content of the document.
  prefs: []
  type: TYPE_NORMAL
- en: If you upload a document of other types, Python will show 'The document format
    is not supported' error. Good job!
  prefs: []
  type: TYPE_NORMAL
- en: Summary
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The code for this chapter is available in the folder 12_Uploading_Different_Document_Types
    from the book source code.
  prefs: []
  type: TYPE_NORMAL
- en: In this chapter, you have improved the Chat With Document application further
    by creating an interface for uploading a file, then load the document using different
    loaders, depending on the type of the document.
  prefs: []
  type: TYPE_NORMAL
- en: In the next chapter, I’m going to show you how to chat with YouTube videos.
    See you there!
  prefs: []
  type: TYPE_NORMAL
- en: 'Chapter 13: Chat With YouTube Videos'
  prefs: []
  type: TYPE_NORMAL
- en: Now that you’ve learned how to make AI interact with documents, let’s continue
    with creating a Chat with YouTube application.
  prefs: []
  type: TYPE_NORMAL
- en: To create this application, you can copy the finished application from Chapter
    12 and make the changes shown in this chapter.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s get started!
  prefs: []
  type: TYPE_NORMAL
- en: Adding The YouTube Loader
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The Chat With YouTube application uses the RAG technique to augment the LLM
    with the video’s transcript data.
  prefs: []
  type: TYPE_NORMAL
- en: 'To get a YouTube video’s transcript, you need to install the youtube-transcript-api
    package using pip as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: pip install youtube-transcript-api==0.6.2
  prefs: []
  type: TYPE_NORMAL
- en: This API is used by LangChain’s YouTube loader to fetch the transcript of a
    video.
  prefs: []
  type: TYPE_NORMAL
- en: 'At the top of the file, import the YoutubeLoader class from LangChain like
    this:'
  prefs: []
  type: TYPE_NORMAL
- en: from langchain_community.document_loaders import YoutubeLoader
  prefs: []
  type: TYPE_NORMAL
- en: 'Just below the Streamlit title, create a Streamlit text input to replace the
    file uploader as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: youtube_url = st.text_input("Input YouTube URL")
  prefs: []
  type: TYPE_NORMAL
- en: 'if youtube_url:'
  prefs: []
  type: TYPE_NORMAL
- en: process_youtube_url(youtube_url)
  prefs: []
  type: TYPE_NORMAL
- en: Next, create the process_youtube_url() function which replaces the process_file()
    function.
  prefs: []
  type: TYPE_NORMAL
- en: 'Instead of importing different loaders to load the documents, you can use the
    YoutubeLoader to create a document from the YouTube url as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: 'def process_youtube_url(url):'
  prefs: []
  type: TYPE_NORMAL
- en: 'with st.spinner("Processing YouTube video..."):'
  prefs: []
  type: TYPE_NORMAL
- en: loader = YoutubeLoader.from_youtube_url(url)
  prefs: []
  type: TYPE_NORMAL
- en: docs = loader.load()
  prefs: []
  type: TYPE_NORMAL
- en: text_splitter = RecursiveCharacterTextSplitter(
  prefs: []
  type: TYPE_NORMAL
- en: chunk_size=1000, chunk_overlap=200
  prefs: []
  type: TYPE_NORMAL
- en: )
  prefs: []
  type: TYPE_NORMAL
- en: '#... the rest of the function'
  prefs: []
  type: TYPE_NORMAL
- en: '#...'
  prefs: []
  type: TYPE_NORMAL
- en: st.success("Video processed. Ask your questions")
  prefs: []
  type: TYPE_NORMAL
- en: The YoutubeLoader.from_youtube_url() method will fetch a YouTube video’s transcript
    as a document, which you can then split into chunks using the text_splitter object.
  prefs: []
  type: TYPE_NORMAL
- en: The rest of the function code is the same, except that when the rag_chain is
    created, we show the 'video processed' success message.
  prefs: []
  type: TYPE_NORMAL
- en: Now run the application using streamlit run, pass the URL, and ask questions
    relevant to the YouTube video’s content.
  prefs: []
  type: TYPE_NORMAL
- en: 'For example, I passed the URL to my video at [https://youtu.be/Sr4KeW078P4](https://youtu.be/Sr4KeW078P4)
    which explains the JavaScript Promise syntax:'
  prefs: []
  type: TYPE_NORMAL
- en: '![13 ask youtube result](image_rsrc1ZS.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 48\. Ask YouTube Application Result
  prefs: []
  type: TYPE_NORMAL
- en: You can pass a YouTube short link or full link. It will work as shown above.
  prefs: []
  type: TYPE_NORMAL
- en: Handling Transcript Doesn’t Exist Error
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Because YouTube music videos don’t have transcripts, you’ll get an error when
    you give one to the application:'
  prefs: []
  type: TYPE_NORMAL
- en: 'ValueError: Expected IDs to be a non-empty list, got []'
  prefs: []
  type: TYPE_NORMAL
- en: This error occurs because the YoutubeLoader loads an empty document list, so
    that empty list gets passed into Chroma.from_documents() method.
  prefs: []
  type: TYPE_NORMAL
- en: 'To prevent this error, you need to check if the docs variable is not empty
    before running further process:'
  prefs: []
  type: TYPE_NORMAL
- en: 'if docs:'
  prefs: []
  type: TYPE_NORMAL
- en: text_splitter = RecursiveCharacterTextSplitter(
  prefs: []
  type: TYPE_NORMAL
- en: chunk_size=1000, chunk_overlap=200
  prefs: []
  type: TYPE_NORMAL
- en: )
  prefs: []
  type: TYPE_NORMAL
- en: chunks = text_splitter.split_documents(docs)
  prefs: []
  type: TYPE_NORMAL
- en: '# ...'
  prefs: []
  type: TYPE_NORMAL
- en: st.session_state.crc = conversational_rag_chain
  prefs: []
  type: TYPE_NORMAL
- en: st.success("Video processed. Ask your questions")
  prefs: []
  type: TYPE_NORMAL
- en: 'else:'
  prefs: []
  type: TYPE_NORMAL
- en: st.error("Video has no transcript. Please try another video")
  prefs: []
  type: TYPE_NORMAL
- en: 'This way, an error message is shown when the video has no transcript, and no
    error is thrown by ChromaDB:'
  prefs: []
  type: TYPE_NORMAL
- en: '![13 no transcript](image_rsrc1ZT.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 49\. No Transcript Detected
  prefs: []
  type: TYPE_NORMAL
