  type: TYPE_NORMAL
  zh: import yfinance as yf
- en: Data recovery for Apple shares
  id: totrans-947
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 苹果股票数据恢复
- en: data = yf.download('AAPL', start='2022-01-01', end='2023-01-01')
