- en: '**JOINT PLOT FOR BIVARIATE DATA**'
  id: totrans-3219
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**双变量数据的联合图**'
- en: Seaborn’s jointplot displays a relationship between two variables. It combines
    scatterplots, regression plots, and even hexbin plots with histograms. It allows
    us to display a relationship between two variables along with their individual
    distributions.
  id: totrans-3220
  prefs: []
  type: TYPE_NORMAL
  zh: Seaborn 的 jointplot 显示了两个变量之间的关系。它结合了散点图、回归图，甚至六边形图与直方图。它允许我们显示两个变量之间的关系以及它们的各自分布。
