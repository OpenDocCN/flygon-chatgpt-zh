  - PREF_UL
  type: TYPE_NORMAL
- en: 'Anti-Trust Regulations: Introduces new antitrust regulations to prevent market
    monopolization.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: As technology evolves, these laws will play a pivotal role in shaping the digital
    landscape, both within the EU and globally. The proactive approach taken by the
    EU in these matters sets a precedent for other regions, highlighting the importance
    of regulatory frameworks in the age of AI and digital transformation.
  prefs: []
  type: TYPE_NORMAL
- en: AI Act Overview
  prefs: []
  type: TYPE_NORMAL
- en: The AI Act is a proposed regulation by the EU to govern the use of AI within
    its member states. This act is significant as it represents one of the first major
    legal frameworks specifically designed to address the wide-ranging implications
    of AI technology.
  prefs: []
  type: TYPE_NORMAL
- en: Overview of the AI Act
  prefs: []
  type: TYPE_NORMAL
- en: The AI Act is intended to ensure that AI systems used in the EU are safe and
    ethical and respect existing laws on fundamental rights and values.
  prefs: []
  type: TYPE_NORMAL
- en: It covers various AI applications, from consumer products to critical infrastructure,
    focusing on high-risk AI systems.
  prefs: []
  type: TYPE_NORMAL
- en: Main Principles of the AI Act
  prefs: []
  type: TYPE_NORMAL
- en: '![A diagram of a company''s company''s company''s company''s company''s company''s
    company''s company''s company''s company''s company''s company''  Description
    automatically generated](image_rsrc6D5.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5\. Main principles of AI Act.
  prefs: []
  type: TYPE_NORMAL
- en: Effectiveness and Impact
  prefs: []
  type: TYPE_NORMAL
- en: 'Standard Setting: The AI Act is expected to set a global standard for AI regulation,
    much like the General Data Protection Regulation (GDPR) did for data privacy.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Innovation vs Regulation Balance: The Act aims to balance promoting AI innovation
    with regulating and controlling potential risks associated with AI technologies.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Global Influence: As companies worldwide often comply with EU regulations to
    maintain access to their market, the AI Act''s influence is likely to extend beyond
    Europe.'
  prefs: []
  type: TYPE_NORMAL
- en: Challenges and Considerations
  prefs: []
  type: TYPE_NORMAL
- en: 'Implementation Complexity: The categorization of AI systems by risk and the
    subsequent compliance requirements can be complex and challenging for organizations.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Evolving Technology: Keeping the Act relevant amidst rapidly growing AI technologies
    poses a continuous challenge.'
  prefs: []
  type: TYPE_NORMAL
- en: 'International Cooperation: Harmonizing AI regulations with other global standards
    and navigating international trade implications is essential.'
  prefs: []
  type: TYPE_NORMAL
- en: The EU's AI Act is a pioneering step in establishing a legal framework for AI
    technologies. It aims to safeguard fundamental rights and ensure safety while
    fostering innovation.
  prefs: []
  type: TYPE_NORMAL
- en: However, its effectiveness will depend on how it's implemented and evolves in
    response to technological advancements and global trends. As the AI landscape
    continues to grow, the AI Act will play a crucial role in shaping its ethical
    and safe development.
  prefs: []
  type: TYPE_NORMAL
- en: Use of AI in the Lifecycle of Medicines
  prefs: []
  type: TYPE_NORMAL
- en: The use of AI in the lifecycle of medicines represents a transformative shift
    in how pharmaceuticals are developed, monitored, and managed.
  prefs: []
  type: TYPE_NORMAL
- en: 'A central point in the Reflection Paper on the Use of Artificial Intelligence
    in the Lifecycle of Medicines published on 19-Jul-2023 highlights (Reference:
    [https://www.vph-institute.org/news/ema-reflection-paper-on-the-use-of-artificial-intelligence-in-the-lifecycle-of-medicines.html](https://www.vph-institute.org/news/ema-reflection-paper-on-the-use-of-artificial-intelligence-in-the-lifecycle-of-medicines.html)):'
  prefs: []
  type: TYPE_NORMAL
- en: AI as a Catalyst for Enhanced Efficiency and Decision-Making Across the Medicinal
    Product Lifecycle
  prefs: []
  type: TYPE_NORMAL
- en: AI technologies have the potential to significantly enhance the efficiency and
    effectiveness of various stages in the medicinal product lifecycle. From drug
    discovery and clinical trials to post-market surveillance and PV, AI can process
    vast datasets far beyond human capability, uncovering insights and patterns that
    may remain undiscovered. For instance, in the early phases of drug development,
    AI can predict molecule interactions, thereby speeding up the identification of
    promising compounds.
  prefs: []
  type: TYPE_NORMAL
- en: AI algorithms can optimize patient selection and monitoring during clinical
    trials, potentially leading to more robust and rapid trial outcomes. Moreover,
    in the post-market phase, AI's advanced signal detection capabilities can monitor
    adverse drug reactions, improving patient safety and ensuring regulatory compliance.
  prefs: []
  type: TYPE_NORMAL
- en: Crucially, AI systems can integrate and analyze real-world and controlled trial
    data, offering a more comprehensive view of a medicine's efficacy and safety profile.
    Implementing AI across the medicinal product lifecycle promises incremental improvements
    and a paradigm shift in pharmaceutical development and patient care.
  prefs: []
  type: TYPE_NORMAL
- en: PV professionals, regulators, and healthcare providers must work in tandem to
    harness AI's capabilities responsibly, ensuring that these technologies are reliable,
    transparent, and governed by ethical considerations to benefit public health and
    safety ultimately.
  prefs: []
  type: TYPE_NORMAL
- en: The document includes vital information highly relevant for PV professionals
    considering the implementation and use of AI throughout the medicinal product
    lifecycle.
  prefs: []
  type: TYPE_NORMAL
- en: Table 1\. The implementation and use of AI throughout the medicinal product
    lifecycle.
  prefs: []
  type: TYPE_NORMAL
- en: '| Section | Description | Implications for PV |'
  prefs: []
  type: TYPE_TB
- en: '| General Considerations | The paper outlines AI as a tool for supporting decision-making
    processes.It emphasizes that AI is not an end in itself but should augment human
    expertise. | PV professionals must understand the scope of AI applications and
    ensure they complement, rather than replace, human judgment. |'
  prefs: []
  type: TYPE_TB
- en: '| Data Quality and Integrity | The accuracy of AI outputs is highly dependent
    on data quality.Data used to train AI models should be representative, of high
    quality, and from verified sources. | When using AI for PV, professionals should
    critically assess the source and quality of data to prevent biases and ensure
    reliable outcomes. |'
  prefs: []
  type: TYPE_TB
- en: '| Transparency and Explainability | AI systems should be transparent and explainable.The
    reasoning behind AI decisions should be understandable to PV experts. | It is
    crucial for PV professionals to be able to interpret AI findings and explain them
    in regulatory or clinical contexts. |'
  prefs: []
  type: TYPE_TB
- en: '| Robustness and Performance | AI systems should be robust and able to perform
    under various conditions.They should be tested for different scenarios, including
    potential data changes over time. | PV systems must be resilient to changes in
    data patterns and capable of maintaining performance, requiring ongoing validation
    and testing. |'
  prefs: []
  type: TYPE_TB
- en: '| PV-Specific Considerations | The paper discusses specific applications of
    AI in PV, such as signal detection, literature screening, and case processing.
    | Professionals should explore and implement AI solutions to enhance efficiency
    in routine PV tasks and improve signal detection capabilities. |'
  prefs: []
  type: TYPE_TB
- en: Proposed AI Liability
  prefs: []
  type: TYPE_NORMAL
- en: This structure of fines is similar to what is seen in other significant EU regulations,
    such as the GDPR, which also imposes steep fines based on a percentage of worldwide
    annual turnover to ensure that penalties are substantial and proportionate to
    the size of the business.
  prefs: []
  type: TYPE_NORMAL
- en: The table below summarizes penalties based on the proposed AI Act.
  prefs: []
  type: TYPE_NORMAL
- en: Table 2\. Proposed penalties.
  prefs: []
  type: TYPE_NORMAL
- en: '| Infringement | Maximum Fine |'
  prefs: []
  type: TYPE_TB
- en: '| Non-compliance with the prohibition of AI practices referred to in Article
    5 | Up to €40 millionor 7% of total worldwide annual turnover, whichever is higher
    |'
  prefs: []
  type: TYPE_TB
- en: '| Non-compliance with the requirements laid down in Article 10 and 13 | Subject
    to fines(specific amount not quoted) |'
  prefs: []
  type: TYPE_TB
- en: '| Non-compliance of the AI system with any requirements or obligations under
    the Regulation other than those in Articles 5 and 10 | Up to €250,000 |'
  prefs: []
  type: TYPE_TB
- en: '| Non-compliance with the prohibition of AI practices referred to in Article
    5 | Up to €30 million or 6% of total worldwide annual turnover, whichever is higher
    |'
  prefs: []
  type: TYPE_TB
- en: '| Non-compliance of the AI system with the requirements laid down in Article
    10 | Up to €1 million |'
  prefs: []
  type: TYPE_TB
- en: '| Non-compliance of the AI system with any requirements or obligations under
    the Regulation other than those laid down in Articles 5 and 10 | Up to €750,000
    |'
  prefs: []
  type: TYPE_TB
- en: The fines collected as a result of these penalties are intended to contribute
    to the general budget of the European Union.
  prefs: []
  type: TYPE_NORMAL
- en: These fines represent the EU's commitment to ensuring compliance with its regulations
    on AI, emphasizing the importance of adhering to ethical and legal standards in
    developing and deploying AI systems. The high ceiling for these fines underscores
    the potential severity of non-compliance and the EU's determination to enforce
    these rules effectively.
  prefs: []
  type: TYPE_NORMAL
- en: 'Global AI Framework: Harmonization and Diversity in Regulation'
  prefs: []
  type: TYPE_NORMAL
- en: As AI advances and integrates into various aspects of society, the need for
    a comprehensive global framework to regulate its use becomes increasingly paramount.
  prefs: []
  type: TYPE_NORMAL
- en: The development of such a framework must balance the diversity of ethical norms,
    legal traditions, and regulatory priorities across different regions while aiming
    for a degree of harmonization that facilitates international cooperation and innovation.
  prefs: []
  type: TYPE_NORMAL
- en: The Need for a Global Framework
  prefs: []
  type: TYPE_NORMAL
- en: AI technologies are inherently borderless, often developed in one country, trained
    on data from multiple regions, and deployed worldwide. A fragmented regulatory
    landscape can lead to compliance challenges for AI developers and users, potentially
    stifling innovation and creating barriers to market entry. A global framework
    aims to provide a consistent set of principles and guidelines that can be adapted
    to local contexts.
  prefs: []
  type: TYPE_NORMAL
- en: Challenges in Developing a Global Framework
  prefs: []
  type: TYPE_NORMAL
- en: Variations in Ethical Norms
  prefs: []
  type: TYPE_NORMAL
- en: Different cultures and societies have varying perceptions of what constitutes
    ethical AI, which may lead to divergent approaches to regulation.
  prefs: []
  type: TYPE_NORMAL
- en: Sovereignty and Local Legislation
  prefs: []
  type: TYPE_NORMAL
- en: Countries may prioritize their sovereignty and existing legal systems over a
    global framework, complicating the creation of uniform regulations.
  prefs: []
  type: TYPE_NORMAL
- en: Technological Neutrality and Evolution
  prefs: []
  type: TYPE_NORMAL
- en: The framework should be technologically neutral and flexible enough to adapt
    to the rapid evolution of AI technologies.
  prefs: []
  type: TYPE_NORMAL
- en: Balancing Innovation and Regulation
  prefs: []
  type: TYPE_NORMAL
- en: Regulations should protect the public and promote ethical AI use without hindering
    technological advancements and economic competitiveness.
  prefs: []
  type: TYPE_NORMAL
- en: International Efforts and Cooperation
  prefs: []
  type: TYPE_NORMAL
- en: United Nations and Other Global Bodies
  prefs: []
  type: TYPE_NORMAL
- en: The United Nations could be pivotal in facilitating discussions and consensus-building
    for a global AI framework through its specialized agencies.
  prefs: []
  type: TYPE_NORMAL
- en: Multilateral Agreements
  prefs: []
  type: TYPE_NORMAL
- en: Countries may enter multilateral agreements that outline shared commitments
    to ethical AI development and use.
  prefs: []
  type: TYPE_NORMAL
- en: Public-Private Partnerships
  prefs: []
  type: TYPE_NORMAL
- en: Collaborations between governments and private entities can drive the creation
    of standards and best practices that reflect both regulatory and industry perspectives.
  prefs: []
  type: TYPE_NORMAL
- en: Cross-Border Data Flow Agreements
  prefs: []
  type: TYPE_NORMAL
- en: Agreements on the data flow borders are essential to AI development and must
    balance economic interests with privacy and security concerns.
  prefs: []
  type: TYPE_NORMAL
- en: Creating a global AI framework represents an ambitious endeavor to ensure responsible
    and beneficial use of AI technologies. Such a framework must be inclusive, adaptable,
    and designed to facilitate international collaboration. While challenges persist,
    particularly in reconciling diverse perspectives and interests, pursuing a cohesive
    set of global regulations remains a critical goal for the future of AI governance.
  prefs: []
  type: TYPE_NORMAL
