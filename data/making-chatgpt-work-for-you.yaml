  id: totrans-476
  prefs: []
  type: TYPE_NORMAL
  zh: © 作者，独家授权给APress Media, LLC，Springer Nature的一部分，2025L. Evelyn让ChatGPT为你工作[https://doi.org/10.1007/979-8-8688-1445-7_5](https://doi.org/10.1007/979-8-8688-1445-7_5)
- en: 5. Using ChatGPT Canvas to Help You Write Long-Form Content
  id: totrans-477
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 5. 使用ChatGPT Canvas帮助您撰写长篇内容
- en: Lydia Evelyn^([1](#Aff2)  )(1)Catalonia, Spain
  id: totrans-478
  prefs: []
  type: TYPE_NORMAL
  zh: Lydia Evelyn^([1](#Aff2)  )(1)加泰罗尼亚，西班牙
- en: For many students, writing a paper or thesis is a very daunting task and can
    leave some with a sense of paralysis that prevents them from even starting. Procrastination
    sets in, time passes, and the end result is a paper completed in the middle of
    the night by a student hopped up on Monster Energy drinks the day before the deadline.
    We’ve all seen this story before.
  id: totrans-479
  prefs: []
  type: TYPE_NORMAL
  zh: 对于许多学生来说，撰写论文或论文是一项非常艰巨的任务，可能会让一些人感到瘫痪，以至于他们甚至无法开始。拖延症开始出现，时间流逝，最终的结果是学生在截止日期前一天晚上熬夜，喝着Monster能量饮料完成的论文。我们之前都见过这个故事。
- en: In Chapter [4](641691_1_En_4_Chapter.xhtml), you saw how we used ChatGPT to
    write emails and create a list of tasks or a to-do list. We stretched its capabilities
    to create long-form content by asking it to write a blog post—which it did—but
    writing longer content like this is more inconvenient when you’re simply having
    a back-and-forth conversation with ChatGPT. If you have small changes to make
    or want to make changes yourself, it’s not easy to do that in this “chat window”
    format that is the default when you’re using ChatGPT. Also, ChatGPT rarely writes
    anything longer than a few hundred words in its default mode.
  id: totrans-480
  prefs: []
  type: TYPE_NORMAL
  zh: 在第[4](641691_1_En_4_Chapter.xhtml)章中，你看到了我们如何使用ChatGPT撰写电子邮件和创建任务列表或待办事项清单。我们通过要求它撰写博客帖子来扩展其功能，从而创建长篇内容——它确实做到了——但当你只是与ChatGPT进行一来一回的对话时，撰写像这样的长篇内容就更加不便。如果你需要做小的修改或想自己进行修改，在这个默认的“聊天窗口”格式中并不容易做到。此外，ChatGPT在默认模式下很少撰写超过几百字的任何内容。
- en: Well, ChatGPT’s Canvas feature solves these problems by making ChatGPT a collaborator
    in your content creation, particularly when you’re asking it to write longer bodies
    of text. In this chapter, we’re going to look at how this feature works.
  id: totrans-481
  prefs: []
  type: TYPE_NORMAL
  zh: 好吧，ChatGPT的Canvas功能通过使ChatGPT成为你内容创作中的合作伙伴来解决这些问题，尤其是在你需要它撰写较长的文本时。在本章中，我们将探讨这个功能是如何工作的。
- en: Using Canvas to Write a Thesis with ChatGPT
  id: totrans-482
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用ChatGPT Canvas撰写论文
- en: Up until now, we’ve been having a back-and-forth conversation with ChatGPT as
    we’re already accustomed to at this point. However, in our next prompts, we’re
    going to instruct ChatGPT to start using the Canvas feature. In this case, we’re
    using Canvas to help us write an introduction to our thesis. Additionally, we’re
    going to be asking ChatGPT to look for sources, just like we did in Chapter [4](641691_1_En_4_Chapter.xhtml).
    This is an academic paper, after all. Therefore, we need ChatGPT to provide sources
    so we can see for ourselves where it got its information from. For our example,
    we’re going to be writing an introduction to a thesis on how J.R.R. Tolkien’s
    use of mythology and folklore influenced the development of modern fantasy literature.
  id: totrans-483
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，我们一直在与 ChatGPT 进行来回对话，因为我们已经习惯了这一点。然而，在我们的下一个提示中，我们将指示 ChatGPT 开始使用 Canvas
    功能。在这种情况下，我们使用 Canvas 来帮助我们撰写论文的引言。此外，我们还将要求 ChatGPT 寻找资料，就像我们在第 [4](641691_1_En_4_Chapter.xhtml)
    章中所做的那样。毕竟，这是一篇学术论文。因此，我们需要 ChatGPT 提供资料，这样我们就可以亲自看到它从哪里获取信息。在我们的例子中，我们将撰写一篇关于
    J.R.R. 托尔金如何使用神话和民间传说影响现代奇幻文学发展的论文引言。
- en: Note
  id: totrans-484
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: It’s important to remember that different universities will have different rules
    on how much ChatGPT can be used to help with homework. Above all, university rules
    should be followed. This chapter will provide details that can be used to help
    write academic papers, but it’s up to a student’s discretion on how much advice
    to take from this chapter.
  id: totrans-485
  prefs: []
  type: TYPE_NORMAL
  zh: 重要的是要记住，不同的大学会有不同的规则，关于 ChatGPT 可以用来帮助做作业的程度。最重要的是，应遵守大学规则。本章将提供可用于帮助撰写学术论文的详细信息，但学生如何从本章中获取建议则由学生自行决定。
- en: 'What will be covered in this chapter:'
  id: totrans-486
  prefs: []
  type: TYPE_NORMAL
  zh: 本章将涵盖的内容：
- en: What is Canvas and how does it work?
  id: totrans-487
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Canvas 是什么？它是如何工作的？
- en: Using ChatGPT to pick a topic for a thesis and get out of decision paralysis
  id: totrans-488
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用 ChatGPT 选择论文主题并摆脱决策瘫痪
- en: Choosing a focus for a thesis on J.R.R. Tolkien
  id: totrans-489
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为 J.R.R. 托尔金选择论文主题
- en: Using ChatGPT to help write the introduction of a thesis on J.R.R. Tolkien’s
    effect on modern depictions of fantasy in literature and film
  id: totrans-490
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用 ChatGPT 帮助撰写关于 J.R.R. 托尔金对现代文学和电影中奇幻描绘影响的论文引言
- en: Now, let’s answer the obvious question.
  id: totrans-491
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们回答一个明显的问题。
- en: What Is Canvas?
  id: totrans-492
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 什么是 Canvas？
- en: Simply put, Canvas is a feature within ChatGPT that allows you to write alongside
    ChatGPT on long-form content. Think of it like your own personal collaborator.
    In order to leverage the Canvas feature, we have to switch to the Canvas “model”
    from our typical ChatGPT window. Figure [5-1](#Fig1) shows you how.![Screenshot
    of a user interface with a red arrow pointing to the text "ChatGPT 4o with canvas"
    at the top left. The bottom right shows a text input area with the prompt "Message
    ChatGPT" and options for "Create image," "Summarize text," and "Code."](../images/641691_1_En_5_Chapter/641691_1_En_5_Fig1_HTML.jpg)
  id: totrans-493
  prefs: []
  type: TYPE_NORMAL
  zh: 简而言之，Canvas 是 ChatGPT 中的一个功能，允许你在长篇内容中与 ChatGPT 一起写作。想象它就像你自己的个人合作者。为了利用 Canvas
    功能，我们必须从典型的 ChatGPT 窗口切换到 Canvas “模式”。图 [5-1](#Fig1) 展示了如何操作。![用户界面的截图，红色箭头指向左上角的文本
    "ChatGPT 4o with canvas"。右下角显示一个文本输入区域，提示为 "Message ChatGPT"，并提供了 "创建图像"、"总结文本"
    和 "代码" 的选项。](../images/641691_1_En_5_Chapter/641691_1_En_5_Fig1_HTML.jpg)
- en: Figure 5-1
  id: totrans-494
  prefs: []
  type: TYPE_NORMAL
  zh: 图 5-1
- en: Switching the model you’re using for ChatGPT Canvas By clicking the drop-down
    on the top-left corner of any ChatGPT conversation window, you can select any
    model that has the Canvas feature to get started. What this will do is allow ChatGPT
    to decide if what you’re asking for will require the creation of long-form content.
    Alternatively, you can tell ChatGPT to use the Canvas feature explicitly. So let’s
    try out this exciting feature with Prompt [5-1](#PC1).Let's write an article together.Prompt
    5-1
  id: totrans-495
  prefs: []
  type: TYPE_NORMAL
  zh: 通过点击 ChatGPT 对话窗口左上角的下拉菜单，你可以选择任何具有 Canvas 功能的模型以开始使用。这将允许 ChatGPT 判断你提出的要求是否需要创建长篇内容。或者，你可以明确告诉
    ChatGPT 使用 Canvas 功能。所以，让我们通过提示 [5-1](#PC1) 尝试这个令人兴奋的功能。让我们一起写篇文章吧。提示 5-1
- en: Getting started
  id: totrans-496
  prefs: []
  type: TYPE_NORMAL
  zh: 开始使用
- en: Now, you’ll notice that we used a very simple prompt. And, as you might have
    expected, we got a very simple answer from ChatGPT (Response [5-1](#PC2)).Sure!
    What topic do you have in mind for the article? We could explore something related
    to your current projects, a particular interest, or even brainstorm some ideas
    together!Response 5-1
  id: totrans-497
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，你会注意到我们使用了一个非常简单的提示。正如你所预期的，我们从 ChatGPT 那里得到了一个非常简单的回答（响应 [5-1](#PC2)）。当然！你打算为这篇文章选择什么主题？我们可以探索与你当前项目相关的内容，一个特定的兴趣，甚至一起头脑风暴一些想法！响应
    5-1
- en: ChatGPT answers, but without Canvas As you can see, though we said we were ready
    to write an article, we haven’t made ChatGPT think we were ready to open the Canvas
    mode. This is because we’ve given it no details on what we want to write about,
    how long the article will be, or anything else. Cleverly, you’ll notice that ChatGPT
    actually suggests the kinds of prompts we can use to help us get started. So,
    let’s take its advice and explore a specific topic. I picked elephants because…
    well, I like elephants and watch way too many *National Geographic* documentaries.
    We used Prompt [5-2](#PC3) to continue our conversation.I want to write about
    the evolution of the Asian elephant!Prompt 5-2
  id: totrans-498
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT会回答，但没有画布。正如您所看到的，尽管我们说我们已经准备好写文章了，但我们并没有让ChatGPT认为我们已经准备好打开画布模式。这是因为我们没有给它任何关于我们想要写什么、文章有多长或其他任何细节的信息。巧妙的是，您会注意到ChatGPT实际上建议了我们可以使用的一些提示来帮助我们开始。所以，让我们接受它的建议，探索一个特定的话题。我选择了大象，因为……好吧，我喜欢大象，并且看了太多的*国家地理*纪录片。我们使用了提示[5-2](#PC3)来继续我们的对话。我想写关于亚洲象进化的文章！提示5-2
- en: Let’s write a simple article on elephants
  id: totrans-499
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们写一篇关于大象的简单文章
- en: Our topic is much more specific now. We’ve chosen to write about the evolution
    of the Asian elephant, a subject that’s sure to go on for much longer than a few
    hundred words if used in an article. In Figure [5-2](#Fig2), you’ll see that ChatGPT
    decided that this was a job for the Canvas feature.![Screenshot of a chat interface
    and a document editor. On the left, a conversation about writing an article on
    the evolution of the Asian elephant is displayed, with suggestions and responses.
    On the right, a document titled "Evolution Asian Elephant" is visible, discussing
    the ancestors and early beginnings of the Asian elephant, including species like
    Moeritherium and Stegodon. The text highlights evolutionary adaptations and the
    rise of proboscideans. The interface includes options for editing and suggesting
    edits.](../images/641691_1_En_5_Chapter/641691_1_En_5_Fig2_HTML.jpg)
  id: totrans-500
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的话题现在更加具体了。我们选择写关于亚洲象的进化，这是一个如果用在文章中，肯定会比几百个字更长的话题。在图[5-2](#Fig2)中，您会看到ChatGPT决定这是一个画布功能的工作。![聊天界面和文档编辑器的截图。左侧显示了一场关于撰写关于亚洲象进化的对话，包括建议和回应。右侧可见一个名为“亚洲象进化”的文档，讨论了亚洲象的祖先和早期起源，包括如Moeritherium和Stegodon这样的物种。文本突出了进化适应性和长鼻目动物的兴起。界面包括编辑和提出编辑的选项。](../images/641691_1_En_5_Chapter/641691_1_En_5_Fig2_HTML.jpg)
- en: Figure 5-2
  id: totrans-501
  prefs: []
  type: TYPE_NORMAL
  zh: 图5-2
- en: The Canvas feature looks pretty impressive!
  id: totrans-502
  prefs: []
  type: TYPE_NORMAL
  zh: 画布功能看起来相当令人印象深刻！
- en: Whoa, this looks very different from anything we’ve seen with ChatGPT so far,
    so let’s slow down and understand what we’re looking at.
  id: totrans-503
  prefs: []
  type: TYPE_NORMAL
  zh: 哇，这看起来与我们迄今为止看到的ChatGPT的任何东西都大不相同，所以让我们放慢速度，理解我们正在看的是什么。
- en: Anatomy of a ChatGPT Canvas Window
  id: totrans-504
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: ChatGPT画布窗口的解剖结构
- en: If you haven’t noticed already, the way we’ve used ChatGPT so far has been in
    the form of a conversation. We send a prompt; ChatGPT responds. If we wanted ChatGPT
    to modify its response in any way, we’ve had to make a suggestion, and then ChatGPT
    would send a new response with our requested changes. This is great, but can become
    cumbersome if you’re writing more long-form content or if the changes you’d like
    ChatGPT to make only affect a small portion of the text it’s sending you, not
    the entire response. Canvas fixes these problems in a few ways. Figure [5-3](#Fig3)
    shows a numbered guide to the key features Canvas offers that’s different from
    the typical ChatGPT format we’ve been accustomed to thus far.![Screenshot of a
    digital interface displaying a conversation and an article draft. On the left,
    a chat interface shows a user and an AI discussing writing an article about the
    evolution of the Asian elephant. The AI suggests exploring the topic's history
    and key sections. On the right, the article draft titled "Evolution Asian Elephant"
    discusses the evolutionary journey of the Asian elephant, its ancestors, and the
    rise of proboscideans. The interface includes options for editing and suggesting
    changes.](../images/641691_1_En_5_Chapter/641691_1_En_5_Fig3_HTML.jpg)
  id: totrans-505
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你还没有注意到，我们迄今为止使用ChatGPT的方式一直是对话的形式。我们发送一个提示；ChatGPT做出回应。如果我们想让ChatGPT以任何方式修改其回应，我们不得不提出建议，然后ChatGPT会发送一个新的带有我们请求的更改的回应。这很好，但如果你要写更长的内容，或者你希望ChatGPT进行的更改仅影响它发送给你的文本的一部分而不是整个回应，这可能会变得繁琐。画布通过几种方式解决了这些问题。图[5-3](#Fig3)展示了Canvas提供的编号指南，这些指南与迄今为止我们习惯的典型ChatGPT格式不同。![数字界面截图，显示对话和文章草稿。左侧的聊天界面显示用户和AI讨论撰写关于亚洲象进化的文章。AI建议探讨该主题的历史和关键部分。右侧的文章草稿“亚洲象进化”讨论了亚洲象的进化历程、其祖先和长鼻目动物的兴起。界面包括编辑和提出更改的选项。](../images/641691_1_En_5_Chapter/641691_1_En_5_Fig3_HTML.jpg)
- en: Figure 5-3
  id: totrans-506
  prefs: []
  type: TYPE_NORMAL
  zh: 图5-3
- en: 'Highlights of ChatGPT’s Canvas features Let’s break down each feature of ChatGPT’s
    Canvas:'
  id: totrans-507
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT画布功能的亮点让我们逐一分析ChatGPT画布的每个功能：
- en: '1.'
  id: totrans-508
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '1.'
- en: The chat window has become a panel that is pushed to the left side of the page.
    Here, we can hold a conversation with ChatGPT as normal. The difference here is
    that the **content we’re asking ChatGPT to create** will be on the right side
    of the page.
  id: totrans-509
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 聊天窗口已变为页面左侧的一个面板。在这里，我们可以像平常一样与ChatGPT进行对话。这里的区别在于，我们要求ChatGPT创建的**内容将位于页面右侧**。
- en: '2.'
  id: totrans-510
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '2.'
- en: These are buttons that allow you to undo, redo, copy the content, and restore
    a previous version of the content you’re working on.
  id: totrans-511
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 这些按钮允许你撤销、重做、复制内容，以及恢复你正在工作的内容的上一个版本。
- en: '3.'
  id: totrans-512
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '3.'
- en: Here on the right side of the page, we have the **content we’re creating with
    ChatGPT**. In this case, it’s an article on the evolution of the Asian elephant.
    Unlike the typical responses we get from ChatGPT, this text can be manually edited
    by you **or** ChatGPT (Figure [5-4](#Fig4) shows what this looks like). What this
    means is you can make a minor change yourself or, in the chat window to the left,
    ask ChatGPT to make a change on your behalf. You can even highlight a portion
    of the text in this window and ask ChatGPT to make a specific change to that portion
    alone (again, see Figure [5-4](#Fig4) for details).
  id: totrans-513
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 在页面右侧，我们有**使用ChatGPT创建的内容**。在这种情况下，它是一篇关于亚洲象进化的文章。与从ChatGPT那里得到的典型回复不同，这段文本可以由你**或**ChatGPT手动编辑（图[5-4](#Fig4)展示了它的样子）。这意味着你可以自己进行一些小的修改，或者在左侧的聊天窗口中要求ChatGPT代表你进行修改。你甚至可以在这个窗口中突出显示文本的一部分，并要求ChatGPT仅对该部分进行特定的修改（再次，请参阅图[5-4](#Fig4)以获取详细信息）。
- en: '![Screenshot of a text document discussing the evolution of proboscideans,
    including elephants and their relatives. The text highlights the diversification
    of species like Stegodon and mentions the common ancestry of Asian elephants,
    mammoths, and African elephants. A pop-up comment is visible, stating, "I don''t
    know what this word means! Replace this with a simpler term," referring to the
    highlighted word "Proboscideans."](../images/641691_1_En_5_Chapter/641691_1_En_5_Fig4_HTML.jpg)'
  id: totrans-514
  prefs: []
  type: TYPE_IMG
  zh: '![讨论长鼻目动物进化的文本文档截图，包括象及其亲属。文本突出了象类如Stegodon的物种多样化，并提到了亚洲象、猛犸象和非洲象的共同祖先。一个弹出注释可见，指出“我不知道这个词的意思！用更简单的词替换它”，指的是突出显示的单词“Proboscideans”。](../images/641691_1_En_5_Chapter/641691_1_En_5_Fig4_HTML.jpg)'
- en: Figure 5-4
  id: totrans-515
  prefs: []
  type: TYPE_NORMAL
  zh: 图5-4
- en: You can highlight any portion of the text within the content window to make
    a small change
  id: totrans-516
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以在内容窗口内的任何文本部分进行突出显示以进行小的修改
- en: '4.'
  id: totrans-517
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '4.'
- en: This is the **Suggest edits** panel. It includes a list of commands you can
    tell ChatGPT to apply to the **content we’re creating** as a whole. You can **add
    emojis**, which instructs ChatGPT to add emojis to the content wherever it deems
    suitable. You can **add final polish**, which essentially tells ChatGPT to “check
    its work” and ensure the quality of the content. You can adjust the **reading
    level**, which is very similar to the prompts we used in Chapter [1](641691_1_En_1_Chapter.xhtml)
    to adjust the tone of an example science report from a fifth grade reading level
    to the academic tone of an English paper. Finally, you can **adjust the length**
    of the document, which is pretty self-explanatory. Adjusting this parameter is
    a way to instruct ChatGPT to either elaborate on what the content covers to make
    it longer or condense the content to make it shorter.
  id: totrans-518
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 这是**建议编辑**面板。它包括一系列你可以告诉ChatGPT应用于我们正在创建的**整个内容**的命令。你可以**添加表情符号**，这会指示ChatGPT在认为合适的地方添加表情符号。你可以**添加最终润色**，这本质上告诉ChatGPT“检查自己的工作”并确保内容的品质。你可以调整**阅读水平**，这与我们在第[1](641691_1_En_1_Chapter.xhtml)章中使用的提示非常相似，可以将五年级学生的阅读水平调整为英语论文的学术语气。最后，你可以**调整文档的长度**，这一点相当直观。调整此参数是指导ChatGPT要么详细说明内容以使其更长，要么压缩内容以使其更短的一种方式。
- en: If you’ve ever collaborated with someone else on a Word document or Google Docs
    file, you’ll see that the process of using the Canvas feature is very similar.
    The Canvas window becomes a text editor that you can type in freely and even make
    text bold, italicized, or underlined. You can also create headers!
  id: totrans-519
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你曾经与其他人合作过Word文档或Google Docs文件，你会发现使用Canvas功能的过程非常相似。Canvas窗口变成了一个你可以自由输入文本并甚至可以加粗、斜体或下划线的文本编辑器。你还可以创建标题！
- en: So, now that we know what Canvas is and what it does, let’s ask ChatGPT to help
    us write the introduction to a thesis with the help of the Canvas feature. But
    first, let’s start by brainstorming.
  id: totrans-520
  prefs: []
  type: TYPE_NORMAL
  zh: 既然我们已经知道了Canvas是什么以及它能做什么，让我们请求ChatGPT在Canvas功能的帮助下帮助我们撰写论文的引言。但首先，让我们从头脑风暴开始。
- en: Picking a Topic for Our Thesis
  id: totrans-521
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 为我们的论文选择一个主题
- en: Before we start using Canvas for writing our thesis, we’re going to start the
    process from the beginning and get ideas from ChatGPT on what to write about in
    the first place.
  id: totrans-522
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们开始使用Canvas来撰写论文之前，我们将从开始处开始这个过程，并从ChatGPT那里获取关于首先写什么的想法。
- en: Let’s say you need to write a paper for your English Literature class based
    on influential European authors that have made major impacts on American literature.
    But let’s take a step back. You may not even know what you want to write about.
    Let’s release ourselves from decision paralysis and get ChatGPT to offer us some
    options to get us started. We used Prompt [5-3](#PC4).
  id: totrans-523
  prefs: []
  type: TYPE_NORMAL
