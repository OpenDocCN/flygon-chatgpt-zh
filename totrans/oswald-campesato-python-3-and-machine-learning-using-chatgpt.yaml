  prefs: []
  type: TYPE_NORMAL
- en: AP exams
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: SAT
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: GRE
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: medical tests
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: law exams
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: business school exams
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Wharton MBA exam
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: USA Biology Olympiad Semifinal Exam
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: sommelier (wine steward) exams
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'You can read more details regarding the preceding tests from this Web page:'
  prefs: []
  type: TYPE_NORMAL
- en: '[https://www.businessinsider.com/list-here-are-the-exams-chatgpt-has-passed-so-far-2023-1](https://www.businessinsider.com/list-here-are-the-exams-chatgpt-has-passed-so-far-2023-1)'
  prefs: []
  type: TYPE_NORMAL
- en: 'The following Web page contains much more detailed information regarding test
    scores, benchmarks, and other results pertaining to GPT-4: [https://openai.com/research/gpt-4](https://openai.com/research/gpt-4).'
  prefs: []
  type: TYPE_NORMAL
- en: GPT-4 Parameters
  prefs: []
  type: TYPE_NORMAL
- en: This section contains information regarding some of the GPT-4 parameters, some
    of which are best-guess approximations.
  prefs: []
  type: TYPE_NORMAL
- en: 'Since GPT-4 is a transformer-based AR (auto regressive) model, it is trained
    to perform next-token prediction. The following paper, “GPT-4 Technical Report,”
    was released in March 2023, and it contains a detailed analysis of the capabilities
    of GPT-4:'
  prefs: []
  type: TYPE_NORMAL
- en: '[https://arxiv.org/abs/2303.08774](https://arxiv.org/abs/2303.08774)'
  prefs: []
  type: TYPE_NORMAL
- en: GPT-4 Fine Tuning
  prefs: []
  type: TYPE_NORMAL
- en: Although OpenAI allows you to fine-tune the four base models, it is (currently)
    not possible to perform fine tuning on ChatGPT 3.5 or GPT-4\. Instead, you can
    integrate OpenAI models with your own data source via LangChain or LlamaIndex
    (previously known as GPT-Index). Both of them enable you to connect OpenAI models
    with your existing data sources.
  prefs: []
  type: TYPE_NORMAL
- en: 'An introduction to LangChain is accessible here:'
  prefs: []
  type: TYPE_NORMAL
- en: '[https://www.pinecone.io/learn/series/langchain/langchain-intro/](https://www.pinecone.io/learn/series/langchain/langchain-intro/)'
  prefs: []
  type: TYPE_NORMAL
- en: 'An introduction to LlamaIndex is accessible at the following Web pages:'
  prefs: []
  type: TYPE_NORMAL
- en: '[https://zilliz.com/blog/getting-started-with-llamaindex](https://zilliz.com/blog/getting-started-with-llamaindex)'
  prefs: []
  type: TYPE_NORMAL
- en: '[https://stackoverflow.com/questions/76160057/openai-chat-completions-api-how-do-i-customize-answers-from-gpt-3-5-or-gpt-4-mo?noredirect=1&lq=1](https://stackoverflow.com/questions/76160057/openai-chat-completions-api-how-do-i-customize-answers-from-gpt-3-5-or-gpt-4-mo?noredirect=1&lq=1)'
  prefs: []
  type: TYPE_NORMAL
- en: CHATGPT AND GPT-4 COMPETITORS
  prefs: []
  type: TYPE_NORMAL
- en: 'Shortly after the release of ChatGPT on November 30, 2022, there was considerable
    activity among various companies to release a competitor to ChatGPT, some of which
    are listed below:'
  prefs: []
  type: TYPE_NORMAL
- en: Google Gemini
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: CoPilot (Microsoft)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Codex (OpenAI)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Apple GPT (Apple)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: PaLM 2 (Google and GPT-4 competitor)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Claude 2 and Claude 3 (Anthropic)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Llama 2(Meta)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The following subsections contain additional details regarding the LLMs in the
    preceding list.
  prefs: []
  type: TYPE_NORMAL
- en: Gemini
  prefs: []
  type: TYPE_NORMAL
- en: 'Gemini is an AI chatbot from Google that is a competitor to ChatGPT. By way
    of comparison, Gemini is powered by PaLM 2 (discussed later), whereas ChatGPT
    is powered by GPT-4\. Recently, Gemini added support for images in its answers
    to user queries, whereas this functionality for ChatGPT has not been released
    yet to the public. More information can be found at the following Web page:'
  prefs: []
  type: TYPE_NORMAL
- en: '[https://artificialcorner.com/google-bards-new-image-recognition-means-serious-competition-to-chatgpt-here-are-6-best-use-cases-55d69eae1b27](https://artificialcorner.com/google-bards-new-image-recognition-means-serious-competition-to-chatgpt-here-are-6-best-use-cases-55d69eae1b27)'
  prefs: []
  type: TYPE_NORMAL
- en: Bard (before it became Google Gemini) encountered an issue pertaining to the
    James Webb Space Telescope during a highly publicized release, which resulted
    in a significant decrease in market capitalization for Alphabet. However, Google
    has persevered in fixing issues and enhancing the functionality of Bard. You can
    access Bard at [https://bard.google.com/](https://bard.google.com/).
  prefs: []
  type: TYPE_NORMAL
- en: 'Around mid-2023, Bard was imbued with several features that were not available
    in GPT-4 during the same time period, some of which are listed below:'
  prefs: []
  type: TYPE_NORMAL
- en: generate images
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: generate HTML/CSS from an image
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: generate mobile applications from an image
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: create Latex formulas from an image
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: extract text from an image
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Presumably these features will spur OpenAI to provide the same set of features
    (some are implemented in GPT-4, but they are not publicly available).
  prefs: []
  type: TYPE_NORMAL
- en: CoPilot (OpenAI/Microsoft)
  prefs: []
  type: TYPE_NORMAL
- en: Microsoft CoPilot is a Visual Studio Code extension that is also powered by
    GPT-4\. GitHub CoPilot is already known for its ability to generate blocks of
    code within the context of a program. In addition, Microsoft is also developing
    Microsoft 365 CoPilot, whose availability date has not been announced as of mid-2023.
  prefs: []
  type: TYPE_NORMAL
- en: 'However, Microsoft has provided early demos that show some of the capabilities
    of Microsoft 365 Copilot, which includes automating tasks such as:'
  prefs: []
  type: TYPE_NORMAL
- en: writing emails
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: summarizing meetings
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: making PowerPoint presentations
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Microsoft 365 Copilot can analyze data in Excel spreadsheets, insert AI-generated
    images in PowerPoint, and generate drafts of cover letters. Microsoft has also
    integrated Microsoft 365 Copilot into some of its existing products, such as Loop
    and OneNote.
  prefs: []
  type: TYPE_NORMAL
- en: 'According to the following article, Microsoft intends to charge $30 per month
    for Office 365 Copilot:'
  prefs: []
  type: TYPE_NORMAL
- en: '[https://www.extremetech.com/extreme/microsoft-to-charge-30-per-month-for-ai-powered-office-apps](https://www.extremetech.com/extreme/microsoft-to-charge-30-per-month-for-ai-powered-office-apps)'
  prefs: []
  type: TYPE_NORMAL
- en: 'Copilot was reverse engineered in late 2022, which is described here:'
  prefs: []
  type: TYPE_NORMAL
- en: '[https://thakkarparth007.github.io/copilot-explorer/posts/copilot-internals](https://thakkarparth007.github.io/copilot-explorer/posts/copilot-internals)'
  prefs: []
  type: TYPE_NORMAL
- en: 'The following article shows you how to create a GPT-3 application that uses
    NextJS, React, and CoPilot:'
  prefs: []
  type: TYPE_NORMAL
- en: '[https://github.blog/2023-07-25-how-to-build-a-gpt-3-app-with-nextjs-react-and-github-copilot/](https://github.blog/2023-07-25-how-to-build-a-gpt-3-app-with-nextjs-react-and-github-copilot/)'
  prefs: []
  type: TYPE_NORMAL
- en: Codex (OpenAI)
  prefs: []
  type: TYPE_NORMAL
- en: OpenAI Codex is a fine-tuned GPT-3-based LLM that generates code from text.
    In fact, Codex powers GitHub Copilot. Codex was trained on more than 150 GB of
    Python code that was obtained from more than 50 million GitHub repositories.
  prefs: []
  type: TYPE_NORMAL
- en: 'According to OpenAI, the primary purpose of Codex is to accelerate human programming,
    and it can complete almost 40% of requests. Codex tends to work quite well for
    generating code for solving simpler tasks. Navigate to the Codex home page to
    obtain more information: [https://openai.com/blog/openai-codex](https://openai.com/blog/openai-codex).'
  prefs: []
  type: TYPE_NORMAL
- en: Apple GPT
  prefs: []
  type: TYPE_NORMAL
- en: In mid-2023, Apple announced Apple GPT, which is a competitor to ChatGPT from
    OpenAI. The actual release date was projected to be 2024\. “Apple GPT” is the
    current name for a product that is intended to compete with Google Gemini, OpenAI
    ChatGPT, and Microsoft Bing AI.
  prefs: []
  type: TYPE_NORMAL
- en: In brief, the LLM PaLM 2 powers Google Gemini, and GPT-4 powers ChatGPT as well
    as Bing Chat, whereas Ajax is what powers Apple GPT. Ajax is based on Jax from
    Google, and the name Ajax is a clever concatenation (“Apple Jax” perhaps?).
  prefs: []
  type: TYPE_NORMAL
- en: PaLM-2
  prefs: []
  type: TYPE_NORMAL
- en: PaLM-2, which is an acronym for the Pathways Language Model, is the successor
    to PaLM (circa 2022). PaLM-2 powers Gemini, and it is also a direct competitor
    to GPT-4\. By way of comparison, PaLM consists of 540 B parameters, and it is
    plausible that PaLM-2 is a larger LLM (details of the latter are undisclosed).
  prefs: []
  type: TYPE_NORMAL
- en: PaLM-2 provides four submodels called Gecko, Otter, Bison, and Unicorn (smallest
    to largest). PaLM-2 was trained in more than 100 human languages, as well as programming
    languages such as Fortran. Moreover, PaLM-2 has been deployed to a plethora of
    Google products, including Gmail and YouTube.
  prefs: []
  type: TYPE_NORMAL
- en: Med-PaLM M
  prefs: []
  type: TYPE_NORMAL
- en: 'In addition to the four submodels listed above, Med-PaLM 2 (the successor to
    Med-PaLM) is an LLM that provides answers to medical questions, and it is accessible
    here: [http://sites.research.google/med-palm/](http://sites.research.google/med-palm/).'
  prefs: []
  type: TYPE_NORMAL
- en: 'The successor to Med-PaLM is Med-PaLM M, and details about this LLM are accessible
    here: [https://arxiv.org/abs/2307.14334](https://arxiv.org/abs/2307.14334).'
  prefs: []
  type: TYPE_NORMAL
- en: 'An article that provides a direct comparison of performance benchmarks for
    PaLM 2 and GPT-4 is accessible here:'
  prefs: []
  type: TYPE_NORMAL
- en: '[https://www.makeuseof.com/google-palm-2-vs-openai-gpt-4/](https://www.makeuseof.com/google-palm-2-vs-openai-gpt-4/)'
  prefs: []
  type: TYPE_NORMAL
- en: PaLM-2 has a robust set of features, and it is a significant competitor to GPT-4.
  prefs: []
  type: TYPE_NORMAL
- en: Claude 2
  prefs: []
  type: TYPE_NORMAL
- en: Anthropic created the LLM Claude 2, which can answer queries about specific
    topics. It can also perform searches involving multiple documents, and can summarize
    documents, create documents, and generate code.
  prefs: []
  type: TYPE_NORMAL
- en: Claude 2 is an improvement on its predecessor Claude 1.3, and it can “ingest”
    entire books as well as generate code based on prompts from users. Claude 2 appears
    to be comparable with its rivals ChatGPT and GPT-4 in terms of competing functionality.
  prefs: []
  type: TYPE_NORMAL
- en: Furthermore, Claude 2 supports a context window of 100,000 tokens. It was trained
    on data as recent as early 2023, whereas ChatGPT was trained on data up until
    2021\. However, Claude 2 cannot search the Web (unlike its competitor GPT-4).
    Anthropic will likely be doing more important work in the area of LLMs.
  prefs: []
  type: TYPE_NORMAL
- en: LLAMA 2
  prefs: []
  type: TYPE_NORMAL
- en: Llama 2 (Large Language Model Meta AI) is an open source fine-tuned LLM from
    Meta that was trained on only publicly-available data; it has created a lot of
    excitement in the AI community. Llama 2 offers three models (7 B, 13 B, and 70
    B parameters) that utilize more data during the pre-training step than numerous
    other LLMs. Llama 2 was optimized to provide faster inferences and a longer context
    length (4 K) than other LLMs.
  prefs: []
  type: TYPE_NORMAL
- en: 'Moreover, the Llama 2 Chat LLM performs surprisingly well: in some cases, its
    quality is close to the quality of high-performing LLMs such ChatGPT and GPT-4\.
    Llama 2 is more user-friendly also provides better results for writing text in
    comparison to GPT-4\. GPT-4, however, is more adept for tasks such as generating
    code.'
  prefs: []
  type: TYPE_NORMAL
- en: How to Download Llama 2
  prefs: []
  type: TYPE_NORMAL
- en: Llama 2 provides a permissive license for community use and commercial use,
    and Meta has made the code as well as the pre-trained models and the fine-tuned
    models publicly available.
  prefs: []
  type: TYPE_NORMAL
- en: 'There are several ways that you can download Llama 2, starting with this Web
    page (after you provide some information, such as name, country, and affiliation):
    [https://ai.meta.com/llama/](https://ai.meta.com/llama/).'
  prefs: []
  type: TYPE_NORMAL
- en: 'You can access demonstrations of the 7 B, 13 B, and 70 B models at the following
    URLs:'
  prefs: []
  type: TYPE_NORMAL
- en: '[https://huggingface.co/spaces/huggingface-projects/Llama 2-7b-chat](https://huggingface.co/spaces/huggingface-projects/Llama2-7b-chat)'
  prefs: []
  type: TYPE_NORMAL
- en: '[https://huggingface.co/spaces/huggingface-projects/Llama 2-13b-chat](https://huggingface.co/spaces/huggingface-projects/Llama2-13b-chat)'
  prefs: []
  type: TYPE_NORMAL
- en: '[https://huggingface.co/spaces/ysharma/Explore_llamav2_with_TGI](https://huggingface.co/spaces/ysharma/Explore_llamav2_with_TGI)'
  prefs: []
  type: TYPE_NORMAL
- en: 'You can also access Llama 2 on Hugging Face from the following Web pages: [https://huggingface.co/blog/llama2](https://huggingface.co/blog/llama2)'
  prefs: []
  type: TYPE_NORMAL
- en: '[https://github.com/facebookresearch/llama](https://github.com/facebookresearch/llama)'
  prefs: []
  type: TYPE_NORMAL
- en: '[https://ai.meta.com/research/publications/llama-2-open-foundation-and-fine-tuned-chat-models/](https://ai.meta.com/research/publications/llama-2-open-foundation-and-fine-tuned-chat-models/)'
  prefs: []
  type: TYPE_NORMAL
- en: 'If you are interested in training Llama 2 on your laptop, more details for
    doing so are accessible here: [https://blog.briankitano.com/llama-from-scratch/](https://blog.briankitano.com/llama-from-scratch/).'
  prefs: []
  type: TYPE_NORMAL
- en: Llama 2 Architecture Features
  prefs: []
  type: TYPE_NORMAL
- en: 'This section simply contains a high-level list of some of the important distinguishing
    features of Llama 2, as shown below:'
  prefs: []
  type: TYPE_NORMAL
- en: decoder-only LLM
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: better pre-training
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: improved model architecture
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: SwiGLU activation function
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: different positional embeddings
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: GQA (Grouped Query Attention)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Ghost Attention (GAtt)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: RLHF and PPO
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: BPE SentencePiece tokenizer
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: modified normalization step
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The majority of LLMs contain the layer normalization that is in the original
    transformer architecture. By contrast, LlaMa uses a simplified alternative that
    involves Root Mean Square Layer Normalization (RMSNorm). RMSNorm has yielded improved
    results for training stability as well as for generalization.
  prefs: []
  type: TYPE_NORMAL
- en: Although SwiGLU is computationally more expensive than the ReLU activation function
    that is part of the original transformer architecture, SwiGLU achieves better
    performance.
  prefs: []
  type: TYPE_NORMAL
- en: 'Note that RLHF is discussed in [Chapter 5](13_ch05.xhtml), which also includes
    a brief description of TRPO and PPO. For a detailed description of how to fine
    tune Llama 2 on three tasks, navigate to the following Web page:'
  prefs: []
  type: TYPE_NORMAL
- en: '[https://www.anyscale.com/blog/fine-tuning-llama-2-a-comprehensive-case-study-for-tailoring-models-to-unique-applications](https://www.anyscale.com/blog/fine-tuning-llama-2-a-comprehensive-case-study-for-tailoring-models-to-unique-applications)'
  prefs: []
  type: TYPE_NORMAL
- en: Fine Tuning Llama 2
  prefs: []
  type: TYPE_NORMAL
- en: Although Llama 2 is an improvement over its predecessor Llama, you can further
    improve the performance of Llama 2 by performing some fine tuning of this LLM.
  prefs: []
  type: TYPE_NORMAL
- en: '[https://medium.com/@murtuza753/using-llama-2-0-faiss-and-langchain-for-question-answering-on-your-own-data-682241488476](https://medium.com/@murtuza753/using-llama-2-0-faiss-and-langchain-for-question-answering-on-your-own-data-682241488476)'
  prefs: []
  type: TYPE_NORMAL
- en: 'The following article shows you how to fine tune Llama 2 in a Google Colaboratory
    notebook:'
  prefs: []
  type: TYPE_NORMAL
- en: '[https://towardsdatascience.com/fine-tune-your-own-llama-2-model-in-a-colab-notebook-df9823a04a32](https://towardsdatascience.com/fine-tune-your-own-llama-2-model-in-a-colab-notebook-df9823a04a32)'
  prefs: []
  type: TYPE_NORMAL
- en: 'The following article describes how to use MonsterAPI (also discussed in the
    article) to fine tune Llama 2 in five steps: [https://blog.monsterapi.ai/how-to-fine-tune-llama-2-llm/](https://blog.monsterapi.ai/how-to-fine-tune-llama-2-llm/).'
  prefs: []
  type: TYPE_NORMAL
- en: 'The following Web page describes how to access Llama 2 in Google Colaboratory:'
  prefs: []
  type: TYPE_NORMAL
- en: '[https://levelup.gitconnected.com/harnessing-the-power-of-llama-2-using-google-colab-2e1dedc2d1d8](https://levelup.gitconnected.com/harnessing-the-power-of-llama-2-using-google-colab-2e1dedc2d1d8)'
  prefs: []
  type: TYPE_NORMAL
- en: WHEN WILL GPT-5 BE AVAILABLE?
  prefs: []
  type: TYPE_NORMAL
- en: As this book goes to print, there is no official information available regarding
    the status of GPT-5, which is to say that everything is speculative. In the early
    part of 2023, Sam Altman (CEO of OpenAI) remarked that there were “no official
    plans” for GPT-5.
  prefs: []
  type: TYPE_NORMAL
- en: However, during mid-2023 OpenAI filed a patent for GPT-5 in which there are
    some high-level details about the features of GPT-5\. Some people have speculated
    that GPT-5 will be a more powerful version of GPT-4, and others suggest that filing
    a patent might be nothing more than securing the name GPT-5 by OpenAI.
  prefs: []
  type: TYPE_NORMAL
- en: Regardless of the motivation for filing a patent, there is a great deal of competition
    with GPT-4 from various companies. Therefore, it is plausible that OpenAI will
    release either GPT 4.5 or GPT-5, perhaps by the end of 2024\. Regarding model
    sizes, recall that GPT-3 has 175 B parameters, and some speculate that GPT-4 has
    10 trillion parameters, which would mean that GPT-4 is roughly 60 times larger
    than GPT-3\. The same increase in scale for GPT-5 seems implausible because GPT-5
    would then consist of 600 trillion parameters.
  prefs: []
  type: TYPE_NORMAL
- en: Another possibility is that GPT-4 is based on the MoE (Mixture of Experts) methodology
    that involves multiple components. For instance, GPT-4 could be a combination
    of 8 components, each of which involves 220 million parameters, and therefore
    GPT-4 would consist of 1.76 trillion parameters.
  prefs: []
  type: TYPE_NORMAL
- en: Training LLMs such as GPT-4 is very costly and requires huge datasets for the
    pre-training step. Regardless of the eventual size of GPT-5, the training process
    could involve enormous costs.
  prefs: []
  type: TYPE_NORMAL
- en: SUMMARY
  prefs: []
  type: TYPE_NORMAL
- en: This chapter started with a discussion of ChatGPT from OpenAI and some of its
    features. In addition, you learned about some competitors to ChatGPT, such as
    Claude 2 from Anthropic.
  prefs: []
  type: TYPE_NORMAL
- en: Next you learned about GPT-4 from OpenAI, which powers ChatGPT, and some of
    its features. Then you learned about some competitors of GPT-4, such as Llama
    2 (Meta) and Google Gemini.
  prefs: []
  type: TYPE_NORMAL
- en: CHAPTER 5
  prefs: []
  type: TYPE_NORMAL
- en: LINEAR REGRESSION WITH GPT-4
  prefs: []
  type: TYPE_NORMAL
- en: This chapter introduces linear regression and includes GPT-4 generated code
    samples using NumPy APIs. The code samples use an “incremental” approach, starting
    with simple examples that involve Python and NumPy code (often using the NumPy
    linspace() API).
  prefs: []
  type: TYPE_NORMAL
- en: The first part of this chapter briefly discusses various types of linear regression,
    along with examples for simple linear regression, multiple linear regression,
    polynomial regression, and linear regression with interaction terms.
  prefs: []
  type: TYPE_NORMAL
- en: The second section in this chapter contains additional code samples involving
    linear regression tasks using standard techniques in NumPy. Hence, if you are
    comfortable with this topic, you can probably skim quickly through the first two
    sections of this chapter.
  prefs: []
  type: TYPE_NORMAL
- en: 'Before you read this chapter, keep in mind that most (around 90%) of the material
    was generated by ChatGPT. The editing process for the material in this chapter
    involved the following changes:'
  prefs: []
  type: TYPE_NORMAL
- en: the addition of section headings
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: the inclusion of bullet lists
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: the removal of inconsequential details
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: italicized headings
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: As you will soon see, the details in this chapter demonstrate the impressive
    ability of ChatGPT to provide fully detailed responses to tasks that are posed
    by users. In addition, ChatGPT has very helpful debugging capabilities that can
    assist in debugging the code that it generates for you because that code is not
    always perfect.
  prefs: []
  type: TYPE_NORMAL
- en: Now let’s look at content that was generated by GPT-4, with the next section
    as a starting point.
  prefs: []
  type: TYPE_NORMAL
- en: WHAT IS LINEAR REGRESSION?
  prefs: []
  type: TYPE_NORMAL
- en: Although linear regression was developed more than 200 years ago, this technique
    is still one of the “core” techniques for solving (albeit simple) problems in
    statistics and machine learning. The technique known as the Mean Squared Error
    (MSE) for finding a best-fitting line for data points in a 2D plane (or a hyperplane
    for higher dimensions) is implemented in Python and TensorFlow to minimize cost
    functions that are discussed later.
  prefs: []
  type: TYPE_NORMAL
- en: 'The goal of linear regression is to find the best-fitting line that “represents”
    a dataset. Keep in mind two key points. First, the best-fitting line does not
    necessarily pass through all (or even most of) the points in the dataset. The
    purpose of a best-fitting line is to minimize the distance of that line from the
    points in dataset. Second, linear regression does not determine the best-fitting
    polynomial: the latter involves finding a higher-degree polynomial that passes
    through many of the points in a dataset.'
  prefs: []
  type: TYPE_NORMAL
- en: EXAMPLES OF LINEAR REGRESSION
  prefs: []
  type: TYPE_NORMAL
- en: 'Linear regression is a statistical method used to model the relationship between
    a dependent variable and one or more independent variables. The simplest form
    of linear regression, simple linear regression, involves one dependent variable
    and one independent variable. By contrast, multiple linear regression involves
    one dependent variable and two or more independent variables. We will discuss
    examples of the following types of regression:'
  prefs: []
  type: TYPE_NORMAL
- en: simple linear regression
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: multiple linear regression
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: polynomial regression
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: linear regression with interaction terms
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'The choice of the type of linear regression to use depends on the nature of
    the data and the specific questions you are trying to answer. For instance, an
    example of simple linear regression involves predicting a person’s weight based
    on their height. Suppose that you have data on the heights and weights of a group
    of people. You want to predict weight (dependent variable) based on height (independent
    variable). The mathematical representation of weight and height is shown below:'
  prefs: []
  type: TYPE_NORMAL
- en: Weight=β0+β1×Height
  prefs: []
  type: TYPE_NORMAL
- en: 'An example of multiple linear regression involves predicting the price of a
    house based on its size and age. In this case, you are predicting house price
    (dependent variable) based on two independent variables: size of the house (in
    square feet) and age of the house (in years). The mathematical representation
    for price, size, and age is shown below:'
  prefs: []
  type: TYPE_NORMAL
- en: Price=β0+β1×Size+β2×Age
  prefs: []
  type: TYPE_NORMAL
- en: A third example involves linear regression with interaction terms, such as predicting
    the sales of a product based on its price and the amount of advertising, while
    also considering the interaction between price and advertising.
  prefs: []
  type: TYPE_NORMAL
- en: 'Besides the direct effect of price and advertising on sales, you are also considering
    how the combination of the two (their interaction) might influence sales. The
    mathematical representation for sales, price, advertising, and the produce of
    price and advertising is shown below:'
  prefs: []
  type: TYPE_NORMAL
- en: Sales=β0+β1×Price+β2×Advertising+β3×(Price×Advertising)
  prefs: []
  type: TYPE_NORMAL
- en: 'In addition to the preceding examples, it is possible to perform polynomial
    regression (a type of linear regression), such as predicting the trajectory of
    a projectile based on time. Even though it is called “polynomial,” it is still
    a form of linear regression because the regression coefficients (betas) are linear.
    The nonlinearity is in the independent variable. The mathematical representation
    (for a second-degree polynomial) for this example is shown below:'
  prefs: []
  type: TYPE_NORMAL
- en: Height=β0+β1×Time+β2×Time2
  prefs: []
  type: TYPE_NORMAL
- en: 'Yet another example involves linear regression with categorical predictors
    involves predicting a person’s salary based on their education level (e.g., high
    school, bachelor’s, or master’s). This involves using dummy variables to represent
    the categorical predictors. The mathematical representation (assuming “high school”
    is the reference category) is shown below:'
  prefs: []
  type: TYPE_NORMAL
- en: Salary=β0+β1×Bachelor’s+β2×Master’s
  prefs: []
  type: TYPE_NORMAL
- en: The coefficients for the dummy variables (i.e., β1 and β2) represent the differences
    in the mean salary relative to the reference category.
  prefs: []
  type: TYPE_NORMAL
- en: METRICS FOR LINEAR REGRESSION
  prefs: []
  type: TYPE_NORMAL
- en: Evaluating the performance of a linear regression model is crucial in understanding
    how well the model fits the data and in comparing it with other models.
  prefs: []
  type: TYPE_NORMAL
- en: 'No single metric can provide a complete picture of the model’s performance.
    It is essential to consider multiple metrics and understand the context of the
    problem you are addressing. Here are some common metrics used to evaluate linear
    regression models:'
  prefs: []
  type: TYPE_NORMAL
- en: Coefficient of Determination (R^2)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Mean Squared Error (MSE)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Root Mean Squared Error (RMSE)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Mean Absolute Error (MAE)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Residual Standard Error (RSE)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: F-statistic
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: T-statistic
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Adjusted R^2
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: AIC (Akaike Information Criterion)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Durbin-Watson Statistic
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Variance Inflation Factor (VIF)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The following subsections contain brief descriptions of the topics in the preceding
    list.
  prefs: []
  type: TYPE_NORMAL
- en: Coefficient of Determination (R^2)
  prefs: []
  type: TYPE_NORMAL
- en: 'R^2 (R-squared) represents the proportion of the variance for the dependent
    variable that is explained by the independent variable(s) in the regression model.
    Its value ranges from 0 to 1, with 1 indicating that the model explains all the
    variability of the response data around its mean. Here is the formula:'
  prefs: []
  type: TYPE_NORMAL
- en: R^2=1−(Residual Sum of Squares (RSS))/(Total Sum of Squares (TSS))
  prefs: []
  type: TYPE_NORMAL
- en: 'The Mean Squared Error (MSE) represents the average of the squares of the errors
    or deviations (i.e., difference between estimator and what is estimated). Here
    is the formula:'
  prefs: []
  type: TYPE_NORMAL
- en: MSE = (∑(yi−y^i)^2)/n
  prefs: []
  type: TYPE_NORMAL
- en: In the preceding formula, yi is the actual value, y^i is the predicted value,
    and n is the number of observations.
  prefs: []
  type: TYPE_NORMAL
- en: The RMSE represents the square root of the MSE. It provides the magnitude of
    error in the same units as the original data.
  prefs: []
  type: TYPE_NORMAL
- en: 'MAE represents the average absolute differences between the observed actual
    outcomes and the forecasts. The formula is shown below:'
  prefs: []
  type: TYPE_NORMAL
- en: MAE = (∑∣yi−y^i∣)/n
  prefs: []
  type: TYPE_NORMAL
- en: 'The RSE represents the standard deviation of the residuals. It gives a measure
    of how spread out the residuals are around the line of best fit. Here is the formula:'
  prefs: []
  type: TYPE_NORMAL
- en: RSE = sqrt((∑(yi−y^i)^2)/df)
  prefs: []
  type: TYPE_NORMAL
- en: In the preceding formula, yi is the observed value, y is the predicted value,
    and df is the degrees of freedom (the total number of observations). Smaller values
    for RSE are indicative of a better fitting model because the data points will
    be more closely “packed” around the regression line.
  prefs: []
  type: TYPE_NORMAL
- en: The F-statistic is used in the context of an ANOVA (analysis of variance) test
    and provides a statistical test of whether there is a significant relationship
    between the dependent variable and the independent variables. It compares the
    full model against a model with no predictors.
  prefs: []
  type: TYPE_NORMAL
- en: The t-statistic involves testing whether a given coefficient is different from
    0 (no effect). A large t-statistic (or one that is far from zero) and a small
    p-value suggest that the coefficient is statistically significant.
  prefs: []
  type: TYPE_NORMAL
- en: The adjusted R^2 is adjusted for the number of predictors in the model. Unlike
    R^2, it penalizes the addition of extraneous predictors. It is useful when comparing
    models with a different number of predictors.
  prefs: []
  type: TYPE_NORMAL
- en: The Akaike Information Criterion (AIC) and Bayesian Information Criterion (BIC)
    are used for model selection. They balance the goodness of fit of the model against
    the complexity of the model. The model with the lowest AIC or BIC is preferred.
  prefs: []
  type: TYPE_NORMAL
- en: The Durbin-Watson Statistic involves tests for autocorrelation in the residuals,
    and it is useful in time series data.
  prefs: []
  type: TYPE_NORMAL
- en: The Variance Inflation Factor (VIF) measures how much the variance of an estimated
    regression coefficient increases when your predictors are correlated. If no factors
    are correlated, the VIFs will be equal to 1.
  prefs: []
  type: TYPE_NORMAL
- en: LINEAR REGRESSION WITH RANDOM DATA WITH GPT-4
  prefs: []
  type: TYPE_NORMAL
- en: '[Listing 5.1](#lis_5-1) displays the content of linreg_gpt4.py that illustrates
    how to use the NumPy randn() API to generate a dataset and then the scatter()
    API in Matplotlib to plot the points in the dataset.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Note: The description of the code in [Listing 5.1](#lis_5-1) was prepared by
    the author and not by ChatGPT.'
  prefs: []
  type: TYPE_NORMAL
- en: 'LISTING 5.1: linreg_gpt4.py'
  prefs: []
  type: TYPE_NORMAL
- en: '"""'
  prefs: []
  type: TYPE_NORMAL
- en: A simple linear regression example using Python's scikit-learn library.
  prefs: []
  type: TYPE_NORMAL
- en: 1\. Generate Sample Data
  prefs: []
  type: TYPE_NORMAL
- en: First, let's generate some synthetic data. Suppose we are trying to model the
    relationship between years of experience and salary.
  prefs: []
  type: TYPE_NORMAL
- en: '"""'
  prefs: []
  type: TYPE_NORMAL
- en: import numpy as np
  prefs: []
  type: TYPE_NORMAL
- en: import matplotlib.pyplot as plt
  prefs: []
  type: TYPE_NORMAL
- en: Generate synthetic data
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'np.random.seed(0) # for reproducibility'
  prefs: []
  type: TYPE_NORMAL
- en: Random years of experience between 0 to 2.5 years
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: X = 2.5 * np.random.rand(100, 1)
  prefs: []
  type: TYPE_NORMAL
- en: Salary = base + 3*Experience + noise
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: y = 5 + 3 * X + np.random.randn(100, 1)
  prefs: []
  type: TYPE_NORMAL
- en: plt.scatter(X, y)
  prefs: []
  type: TYPE_NORMAL
- en: plt.xlabel("Years of Experience")
  prefs: []
  type: TYPE_NORMAL
- en: plt.ylabel("Salary")
  prefs: []
  type: TYPE_NORMAL
- en: plt.title("Experience vs. Salary")
  prefs: []
  type: TYPE_NORMAL
- en: plt.show()
  prefs: []
  type: TYPE_NORMAL
- en: '"""'
  prefs: []
  type: TYPE_NORMAL
- en: 'In the above code:'
  prefs: []
  type: TYPE_NORMAL
- en: X represents years of experience.
  prefs: []
  type: TYPE_NORMAL
- en: y represents the corresponding salary.
  prefs: []
  type: TYPE_NORMAL
- en: We assume a base salary of 5, and for each year of experience, the salary increases
    by 3 units. In addition, there is some random noise.
  prefs: []
  type: TYPE_NORMAL
- en: '"""'
  prefs: []
  type: TYPE_NORMAL
- en: '"""'
  prefs: []
  type: TYPE_NORMAL
- en: 2\. Train a Linear Regression Model
  prefs: []
  type: TYPE_NORMAL
- en: let's fit a linear regression model to this data.
  prefs: []
  type: TYPE_NORMAL
- en: '"""'
  prefs: []
  type: TYPE_NORMAL
- en: from sklearn.linear_model import LinearRegression
  prefs: []
  type: TYPE_NORMAL
- en: Create a linear regression model
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: reg = LinearRegression()
  prefs: []
  type: TYPE_NORMAL
- en: Fit the model to the data
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: reg.fit(X, y)
  prefs: []
  type: TYPE_NORMAL
- en: Get the regression coefficients
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: intercept = reg.intercept_[0]
  prefs: []
  type: TYPE_NORMAL
- en: slope = reg.coef_[0][0]
  prefs: []
  type: TYPE_NORMAL
- en: 'print(f"Intercept (base salary): {intercept:.2f}")'
  prefs: []
  type: TYPE_NORMAL
- en: 'print(f"Slope (salary increase per year of experience): {slope:.2f}")'
  prefs: []
  type: TYPE_NORMAL
- en: '"""'
  prefs: []
  type: TYPE_NORMAL
- en: 'In the code above:'
  prefs: []
  type: TYPE_NORMAL
- en: Use LinearRegression() from scikit-learn for a linear regression model.
  prefs: []
  type: TYPE_NORMAL
- en: The fit method trains the model using our synthetic data.
  prefs: []
  type: TYPE_NORMAL
- en: The intercept_ gives the base salary (y-intercept), and coef_ provides the increase
    in salary for each additional year of experience (slope).
  prefs: []
  type: TYPE_NORMAL
- en: 3\. Visualize the Regression Line
  prefs: []
  type: TYPE_NORMAL
- en: Let's plot the data points and the regression line.
  prefs: []
  type: TYPE_NORMAL
- en: '"""'
  prefs: []
  type: TYPE_NORMAL
- en: Predict values
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: y_pred = reg.predict(X)
  prefs: []
  type: TYPE_NORMAL
- en: plt.scatter(X, y)
  prefs: []
  type: TYPE_NORMAL
- en: plt.plot(X, y_pred, color='red')
  prefs: []
  type: TYPE_NORMAL
- en: plt.xlabel("Years of Experience")
  prefs: []
  type: TYPE_NORMAL
- en: plt.ylabel("Salary")
  prefs: []
  type: TYPE_NORMAL
- en: plt.title("Experience vs. Salary with Regression Line")
  prefs: []
  type: TYPE_NORMAL
- en: plt.show()
  prefs: []
  type: TYPE_NORMAL
- en: '"""'
  prefs: []
  type: TYPE_NORMAL
- en: In the visualization, data points are shown as blue dots.
  prefs: []
  type: TYPE_NORMAL
- en: The red line is the linear regression model's prediction.
  prefs: []
  type: TYPE_NORMAL
- en: 4\. Evaluate the Model
  prefs: []
  type: TYPE_NORMAL
- en: Finally, let's compute the RMSE (Root Mean Squared Error) to evaluate the performance
    of our model.
  prefs: []
  type: TYPE_NORMAL
- en: '"""'
  prefs: []
  type: TYPE_NORMAL
- en: from sklearn.metrics import mean_squared_error
  prefs: []
  type: TYPE_NORMAL
- en: rmse = np.sqrt(mean_squared_error(y, y_pred))
  prefs: []
  type: TYPE_NORMAL
- en: 'print(f"Root Mean Squared Error: {rmse:.2f}")'
  prefs: []
  type: TYPE_NORMAL
- en: '"""'
  prefs: []
  type: TYPE_NORMAL
- en: 'In this step:'
  prefs: []
  type: TYPE_NORMAL
- en: Use the mean_squared_error function in scikit-learn to compute the MSE.
  prefs: []
  type: TYPE_NORMAL
- en: The square root of the MSE gives us the RMSE, which indicates the model's prediction
    error in the same units as the target variable.
  prefs: []
  type: TYPE_NORMAL
- en: This entire process allows us to understand the relationship between experience
    and salary, model it using linear regression, and evaluate the performance of
    the model.
  prefs: []
  type: TYPE_NORMAL
- en: '"""'
  prefs: []
  type: TYPE_NORMAL
