  prefs: []
  type: TYPE_NORMAL
- en: '​•​Cognitive Tools: I can also guide you through mental tools like the SWOT
    analysis (strengths, weaknesses, opportunities, and threats) to evaluate your
    options and weigh potential outcomes.'
  prefs: []
  type: TYPE_NORMAL
- en: '​•​Values Exploration: Sometimes decisions are hard because they involve your
