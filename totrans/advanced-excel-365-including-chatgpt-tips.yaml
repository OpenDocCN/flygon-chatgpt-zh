  type: TYPE_NORMAL
- en: Pivot Tables
  prefs: []
  type: TYPE_NORMAL
- en: Introduction
  prefs: []
  type: TYPE_NORMAL
- en: A pivot table is an interactive, worksheet-based table that quickly summarizes
    large amounts of data using the format and calculation methods you choose. It
    is called a pivot table because you can rotate its row and column headings around
    the core data area to give you different views of the source data. As source data
    changes, you can update a pivot table. It resides on a worksheet, so you can integrate
    a pivot table into a larger worksheet model using standard formulas. You can use
    a pivot table to analyze data in an Excel workbook or from an external database
    such as MS Access or SQL Server.
  prefs: []
  type: TYPE_NORMAL
- en: Structure
  prefs: []
  type: TYPE_NORMAL
- en: 'In this chapter, we will go over the following topics:'
  prefs: []
  type: TYPE_NORMAL
- en: ■Examining Pivot Tables
  prefs: []
  type: TYPE_NORMAL
- en: ■Recommended Pivot Table
  prefs: []
  type: TYPE_NORMAL
- en: ■Creating a Pivot Table
  prefs: []
  type: TYPE_NORMAL
- en: ■Percent of Grand Total
  prefs: []
  type: TYPE_NORMAL
- en: ■Create a Graph Using Pivot Data
  prefs: []
  type: TYPE_NORMAL
- en: ■Slicer
  prefs: []
  type: TYPE_NORMAL
- en: ■Timeline
  prefs: []
  type: TYPE_NORMAL
- en: ■Power View
  prefs: []
  type: TYPE_NORMAL
- en: ■Power Pivot
  prefs: []
  type: TYPE_NORMAL
- en: ■Benefits of Data Model
  prefs: []
  type: TYPE_NORMAL
- en: ■Creating Pivot Tables Using Power Pivot
  prefs: []
  type: TYPE_NORMAL
- en: Objectives
  prefs: []
  type: TYPE_NORMAL
- en: After studying this chapter, the reader will be able to create pivot tables,
    make different reports using pivot tables, and use advanced features of pivot
    tables.
  prefs: []
  type: TYPE_NORMAL
- en: Examining Pivot Tables
  prefs: []
  type: TYPE_NORMAL
- en: The data on which a pivot table is based is called the Source Data. Each column
    represents a field or category of information, which you can assign to different
    parts of the pivot table to determine how the data is arranged. You can add four
    types of fields, which are further explained in [Table 9.1](#tab9-1).
  prefs: []
  type: TYPE_NORMAL
- en: TABLE 9.1 Types of Field in Pivot Tables
  prefs: []
  type: TYPE_NORMAL
- en: '| Field | Description |'
  prefs: []
  type: TYPE_TB
- en: '| Report Filter | Filter summarized data in PivotTable. If you select an item
    in the report filter, the view of PivotTable varies only to display summarized
    data related to that item. For example, if the area is a report filter, you can
    display short data for North, West, or all areas. |'
  prefs: []
  type: TYPE_TB
- en: '| Row Labels | Row shows items in the field as labels. For example, the row
    label quarters field contains values, which means that the table shows a line
    for each quarter. |'
  prefs: []
  type: TYPE_TB
- en: '| Column Labels | Column labels are the value of the product field, which means
    that the table shows a column for each product, in the field that displays the
    item as a column label. |'
  prefs: []
  type: TYPE_TB
- en: '| ∑ Values | Summary data are included. These fields usually contain numeric
    data, such as sales and inventory. The area where the data appears is called the
    data area. |'
  prefs: []
  type: TYPE_TB
- en: 'Refer to [Figure 9.1](#fig9-1):'
  prefs: []
  type: TYPE_NORMAL
- en: '![image](image/Figure_9.1.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9.1 Fields of Pivot Tables
  prefs: []
  type: TYPE_NORMAL
- en: Select any cell in a data range that includes a heading for each column in the
    top row. In the Tables group, click the PivotTable button, or click the PivotTable
    list and select PivotTable. In the Table/Range box, select the range that contains
    the data to be used in the pivot table. Select the location for the pivot table.
    You can place the pivot table in a new or existing worksheet. Click OK to create
    the pivot table.
  prefs: []
  type: TYPE_NORMAL
- en: You can add fields to a pivot table to specify the data you want to display.
    The fields of the source data appear in the “PivotTable Field List” task pane.
    To add fields, drag the relevant field from the top of the PivotTable Field List
    to one of the four areas at the bottom. You can add more than one field to an
    area, and you do not need to add all fields to the table.
  prefs: []
  type: TYPE_NORMAL
- en: 'To display data, use data in Row Labels list and numeric in Values:'
  prefs: []
  type: TYPE_NORMAL
- en: 1. Activate the Insert tab, to open the Create PivotTable dialog box.
  prefs: []
  type: TYPE_NORMAL
- en: 2. Add fields to headings. You need to place at least one field in the S Values
    area.
  prefs: []
  type: TYPE_NORMAL
- en: After the field is in place, you can filter the information that appears in
    the table by selecting from the report in the Filter column, the filter rows,
    or the filter list. For example, you can show all the data values or restrict
    PivotTable to summarize just a few of them.
  prefs: []
  type: TYPE_NORMAL
- en: Recommended Pivot Table
  prefs: []
  type: TYPE_NORMAL
- en: Check the recommendations for pivot. To see the recommendations, select the
    database and click the Insert tab. Click on the recommended pivot table options,
    as shown in [Figure 9.2](#fig9-2).
  prefs: []
  type: TYPE_NORMAL
- en: '![image](image/Figure_9.2.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9.2 Recommended Pivot Table
  prefs: []
  type: TYPE_NORMAL
- en: Alternatively, simply select the data to make the pivot table. Click on the
    button in the lower right corner and select the table option to create the pivot
    report.
  prefs: []
  type: TYPE_NORMAL
- en: Creating a Pivot Table
  prefs: []
  type: TYPE_NORMAL
- en: To begin our analysis, we will create a pivot table using the provided sales
    data. Follow the steps mentioned earlier to set up a pivot table with the necessary
    fields, including REP, CUSTNAME, PRODUCT, DATE, QTY, CP, S.P., and NET. We will
    use these fields to analyze the sales data from various perspectives.
  prefs: []
  type: TYPE_NORMAL
- en: Follow the steps below.
  prefs: []
  type: TYPE_NORMAL
- en: 1. Select the entire range of data, including headers. You can do this by clicking
    and dragging your cursor across the data or by using keyboard shortcuts (for example,
    Ctrl+A). Refer to [Figure 9.3](#fig9-3).
  prefs: []
  type: TYPE_NORMAL
- en: '![image](image/Figure_9.3.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9.3 Sales Data
  prefs: []
  type: TYPE_NORMAL
- en: 2. In Excel, go to the Insert tab on the ribbon menu, and then click on the
    PivotTable button, as shown in [Figure 9.4](#fig9-4).
  prefs: []
  type: TYPE_NORMAL
- en: '![image](image/Figure_9.4.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9.4 Insert PivotTable
  prefs: []
  type: TYPE_NORMAL
- en: 3. A Create PivotTable dialog box will appear. Ensure that the range of data
    you selected is correct, then choose where you want to place the pivot table (for
    example, a new worksheet or an existing worksheet). Refer to [Figure 9.5](#fig9-5).
  prefs: []
  type: TYPE_NORMAL
- en: 4. Click OK to create the pivot table.
  prefs: []
  type: TYPE_NORMAL
- en: '![image](image/Figure_9.5.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9.5 Table/Range
  prefs: []
  type: TYPE_NORMAL
- en: 5. The pivot table field list will appear on the right side of the screen. This
    list contains the column headers from your sales data. Refer to [Figure 9.6](#fig9-6).
  prefs: []
  type: TYPE_NORMAL
- en: '![image](image/Figure_9.6.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9.6 Customer Quantity
  prefs: []
  type: TYPE_NORMAL
- en: 6. Drag and drop the desired fields from the field list into the different areas
    of the pivot table.
  prefs: []
  type: TYPE_NORMAL
- en: 7. Drag the CUSTNAME field to the Rows area to group the data by customer names.
  prefs: []
  type: TYPE_NORMAL
- en: 8. Drag the QTY field to the Values area to calculate the total quantity sold.
  prefs: []
  type: TYPE_NORMAL
- en: Refer to [Figure 9.7](#fig9-7).
  prefs: []
  type: TYPE_NORMAL
- en: '![image](image/Figure_9.7.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9.7 Value Field Settings
  prefs: []
  type: TYPE_NORMAL
- en: 9. You can change the summary function by clicking on the drop-down arrow next
    to the field name in the “Values” area and selecting a different calculation (for
    example, average, count). Refer to [Figure 9.8](#fig9-8).
  prefs: []
  type: TYPE_NORMAL
- en: '![image](image/Figure_9.8.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9.8 Sum and Average
  prefs: []
  type: TYPE_NORMAL
- en: Percent of Grand Total
  prefs: []
  type: TYPE_NORMAL
- en: 'To find the percent of grand total, follow these steps:'
  prefs: []
  type: TYPE_NORMAL
- en: 1. Right-click on any value in the Qty column of the pivot table.
  prefs: []
  type: TYPE_NORMAL
- en: 2. Select Value Field Settings or Value Settings from the context menu.
  prefs: []
  type: TYPE_NORMAL
- en: 3. In the dialog box that appears, choose the option for % of Grand Total or
    Percentage of the total (exact wording may vary depending on your spreadsheet
    software).
  prefs: []
  type: TYPE_NORMAL
- en: 4. Click OK to apply the calculation.
  prefs: []
  type: TYPE_NORMAL
- en: 5. The pivot table will now display the percentage of the grand total for each
    customer or grouping in the Qty column.
  prefs: []
  type: TYPE_NORMAL
- en: 'Refer to [Figure 9.9](#fig9-9):'
  prefs: []
  type: TYPE_NORMAL
- en: '![image](image/Figure_9.9.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9.9 Percent of Grand Total
  prefs: []
  type: TYPE_NORMAL
- en: Group Items in a Pivot Table
  prefs: []
  type: TYPE_NORMAL
- en: If you want to prepare a report based on the current data for the year or the
    yearly quarter, then you can use the group option in the pivot table. Follow the
    steps below.
  prefs: []
  type: TYPE_NORMAL
- en: 1. Select any cell in a data range.
  prefs: []
  type: TYPE_NORMAL
- en: 2. Activate the Option tab.
  prefs: []
  type: TYPE_NORMAL
- en: 3. Click on Group Field.
  prefs: []
  type: TYPE_NORMAL
- en: 4. In the By box, click one or more time periods for the groups.
  prefs: []
  type: TYPE_NORMAL
- en: Grouping of Dates
  prefs: []
  type: TYPE_NORMAL
- en: 'To group dates, follow these steps:'
  prefs: []
  type: TYPE_NORMAL
- en: 1. Assuming you already have a pivot table created with the Date field in the
    Rows or Columns area, proceed to the next step.
  prefs: []
  type: TYPE_NORMAL
- en: 2. Right-click on any date value in the Date column of the pivot table.
  prefs: []
  type: TYPE_NORMAL
- en: 3. In the context menu that appears, select Group or Group Field (the specific
    wording may vary depending on your spreadsheet software).
  prefs: []
  type: TYPE_NORMAL
- en: 4. In the Grouping dialog box, choose the Months option.
  prefs: []
  type: TYPE_NORMAL
- en: 5. Click OK to apply the grouping.
  prefs: []
  type: TYPE_NORMAL
- en: 6. The pivot table will now display the Date column grouped by month, with each
    month appearing as a separate item in the pivot table.
  prefs: []
  type: TYPE_NORMAL
- en: Refer to [Figure 9.10](#fig9-10).
  prefs: []
  type: TYPE_NORMAL
- en: '![image](image/Figure_9.10.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9.10 Grouping of Dates
  prefs: []
  type: TYPE_NORMAL
- en: Monthly Report
  prefs: []
  type: TYPE_NORMAL
- en: The monthly report can be seen in the following [Figure 9.11](#fig9-11).
  prefs: []
  type: TYPE_NORMAL
- en: '![image](image/Figure_9.11.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9.11 Monthly Report
  prefs: []
  type: TYPE_NORMAL
- en: Create a Graph Using Pivot Data
  prefs: []
  type: TYPE_NORMAL
- en: You can use a PivotChart to graphically display data from a PivotTable. A single
    PivotChart provides different views of the same data. When you create a PivotChart,
    the row fields of the PivotTable become the categories, and the column fields
    become the series.
  prefs: []
  type: TYPE_NORMAL
- en: To create a PivotChart, select any cell within a PivotTable, and click Chart
    in the Tools group on the Options tab. Select Options for the chart as you would
    for a standard chart, then click OK. You can also create a new PivotChart and
    PivotTable at the same time by selecting a cell in the source data and selecting
    PivotChart from the PivotTable list in the Tables group on the Insert tab. Refer
    to [Figure 9.12](#fig9-12).
  prefs: []
  type: TYPE_NORMAL
- en: '![image](image/Figure_9.12.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9.12 Monthly Chart
  prefs: []
  type: TYPE_NORMAL
- en: 'To group the Date column in your pivot table by both month and year:'
  prefs: []
  type: TYPE_NORMAL
- en: 1. Right-click on any date value in the Date column of the pivot table and select
    Group.
  prefs: []
  type: TYPE_NORMAL
- en: 2. In the Grouping dialog box, choose the Months option and the Years option.
    Finally, click OK to apply the grouping.
  prefs: []
  type: TYPE_NORMAL
- en: Refer to [Figure 9.13](#fig9-13).
  prefs: []
  type: TYPE_NORMAL
- en: '![image](image/Figure_9.13.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9.13 Grouping by Year and Month
  prefs: []
  type: TYPE_NORMAL
- en: 'To group the Date column in your pivot table by both year and Qtr, follow these
    steps:'
  prefs: []
  type: TYPE_NORMAL
- en: 1. Right-click on any date value in the Date column of the pivot table and select
    Group.
  prefs: []
  type: TYPE_NORMAL
- en: 2. In the Grouping dialog box, choose the Qtr option and the Years option. Finally,
    click OK to apply the grouping. (Qtr1 refers here to January, February, and March.)
  prefs: []
  type: TYPE_NORMAL
- en: Refer to [Figure 9.14](#fig9-14).
  prefs: []
  type: TYPE_NORMAL
- en: '![image](image/Figure_9.14.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9.14 Grouping by Year and Quarter
  prefs: []
  type: TYPE_NORMAL
- en: Weekly Report
  prefs: []
  type: TYPE_NORMAL
- en: If you have grouping on the date field, you can group items by weeks. Click
    Days in the By box, and make sure that Days is the only time period selected.
    Then click on seven in the Number of days box.
  prefs: []
  type: TYPE_NORMAL
- en: Refer to [Figure 9.15](#fig9-15).
  prefs: []
  type: TYPE_NORMAL
- en: '![image](image/Figure_9.15.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9.15 Grouping by Day
  prefs: []
  type: TYPE_NORMAL
- en: The pivot table will now display the data grouped by days, allowing you to see
    the weekly report with data summarized on a daily basis, as shown in [Figure 9.16](#fig9-16).
  prefs: []
  type: TYPE_NORMAL
- en: '![image](image/Figure_9.16.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9.16 Weekly Report
  prefs: []
  type: TYPE_NORMAL
- en: Grouping of Numbers (Creating Slabs)
  prefs: []
  type: TYPE_NORMAL
- en: 'For grouping of numbers, follow these steps:'
  prefs: []
  type: TYPE_NORMAL
- en: 1. Right-click on any value in the Net column of the pivot table.
  prefs: []
  type: TYPE_NORMAL
- en: 2. From the context menu, select Group or Group Field option. Refer to [Figure
    9.17](#fig9-17).
  prefs: []
  type: TYPE_NORMAL
- en: '![image](image/Figure_9.17.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9.17 Grouping by Numbers
  prefs: []
  type: TYPE_NORMAL
- en: 3. In the Grouping dialog box, specify the starting value for your grouping
    slabs. For example, if you want to start with 0, enter 0 in the Starting at field.
  prefs: []
  type: TYPE_NORMAL
- en: 4. In the By field, enter the slab size you want to use. In this case, enter
    1000.
  prefs: []
  type: TYPE_NORMAL
- en: 5. Click OK to apply the grouping.
  prefs: []
  type: TYPE_NORMAL
- en: The pivot table will now display the Net column with values grouped into slabs
    of 1000\. This grouping allows you to analyze the Qty values based on the defined
    slabs.
  prefs: []
  type: TYPE_NORMAL
- en: Slicer
  prefs: []
  type: TYPE_NORMAL
- en: Slicers are easy-to-use filtering components. They contain a set of buttons
    that enable you to quickly filter the data in a PivotTable report, without the
    need to open dropdown lists to find the items that you want to filter. When you
    use a regular PivotTable report filter to filter multiple items, the filter indicates
    that multiple items are filtered, but you have to open a dropdown list to find
    the filtering details. A slicer clearly labels the filter that is applied and
    provides details so that you can easily understand the data that is displayed
    in the filtered PivotTable report. Refer to [Figure 9.18](#fig9-18).
  prefs: []
  type: TYPE_NORMAL
- en: '![image](image/Figure_9.18.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9.18 Grouping by Day
  prefs: []
  type: TYPE_NORMAL
- en: 'Follow these steps:'
  prefs: []
  type: TYPE_NORMAL
- en: 1. Select any cell within your pivot table.
  prefs: []
  type: TYPE_NORMAL
- en: 2. Go to the PivotTable Analyze or Analyze tab in the Excel ribbon.
  prefs: []
  type: TYPE_NORMAL
- en: 3. Locate the Filter group and click on the Insert Slicer button.
  prefs: []
  type: TYPE_NORMAL
- en: 4. In the Insert Slicers dialog box, check the box next to Custname to select
    it. Refer to [Figure 9.19](#fig9-19).
  prefs: []
  type: TYPE_NORMAL
- en: '![image](image/Figure_9.19.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9.19 Slicer
  prefs: []
  type: TYPE_NORMAL
- en: 5. Click on the OK button to insert the slicer. Refer to [Figure 9.20](#fig9-20).
  prefs: []
  type: TYPE_NORMAL
- en: '![image](image/Figure_9.20.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9.20 Customer Slicer
  prefs: []
  type: TYPE_NORMAL
- en: 6. A slicer will be added to your worksheet. You can resize and reposition it
    as needed.
  prefs: []
  type: TYPE_NORMAL
- en: 7. Use the slicer to filter the data in your pivot table by selecting the specific
  prefs: []
  type: TYPE_NORMAL
- en: Custname values you want to include or exclude.
  prefs: []
  type: TYPE_NORMAL
- en: Timeline
  prefs: []
  type: TYPE_NORMAL
- en: Instead of playing around with filters to show dates, you can now use a PivotTable
    timeline. It is a box you can add to your pivot table that lets you filter by
    time and zoom in on the period you want. Click Analyze | Insert Timeline to call
    it up. Refer to [Figure 9.21](#fig9-21).
  prefs: []
  type: TYPE_NORMAL
- en: '![image](image/Figure_9.21.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9.21 Timeline
  prefs: []
  type: TYPE_NORMAL
- en: '[Figure 9.22](#fig9-22) shows the date timeline.'
  prefs: []
  type: TYPE_NORMAL
- en: '![image](image/Figure_9.22.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9.22 Date Timeline
  prefs: []
  type: TYPE_NORMAL
- en: Power View
  prefs: []
  type: TYPE_NORMAL
- en: The Power View add-in allows you to define visually attractive summaries of
    your worksheet with special emphasis on the variables that you require. With a
    separate tab, you have the option to view data in the way that best suits you.
    After defining the relevant power fields, Power View extracts the information
    from the selected worksheet to give you a complete overview with respect to the
    viewing filters specified.
  prefs: []
  type: TYPE_NORMAL
- en: Moreover, you can choose a new theme, background, transparency, pictures, and
    other content with the freedom to insert, modify, arrange, and analyze relationships
    effectively. Follow the steps below.
  prefs: []
  type: TYPE_NORMAL
- en: 1. Select the data.
  prefs: []
  type: TYPE_NORMAL
- en: 2. Click on Insert tab.
  prefs: []
  type: TYPE_NORMAL
- en: 3. Click on Power View option.
  prefs: []
  type: TYPE_NORMAL
- en: 4. You can see the images power view look with Field list with data.
  prefs: []
  type: TYPE_NORMAL
- en: Make use of the filter button, which is on the right side of this data. It will
    allow you to filter the data as desired with the help of all the column fields.
  prefs: []
  type: TYPE_NORMAL
- en: You can make use of the field list to see various calculations such as sum,
    min, max, average, and more. Moreover, by using a salary parameter, you can check
    and see the data according to your selected range. This is the overview of the
    Power View option.
  prefs: []
  type: TYPE_NORMAL
- en: Power Pivot
  prefs: []
  type: TYPE_NORMAL
- en: 'Power Pivot is an add-in, which we can use to perform powerful data analysis
    in Excel. The add-in is built into Excel, but it is not enabled. To enable Power
    Pivot, follow these steps:'
  prefs: []
  type: TYPE_NORMAL
- en: 1. Go to the File tab.
  prefs: []
  type: TYPE_NORMAL
- en: 2. Click on Option | Add-Ins.
  prefs: []
  type: TYPE_NORMAL
- en: 3. In the Manage box, click on Com Add-ins.
  prefs: []
  type: TYPE_NORMAL
- en: 4. Check the MS Office Power Pivot in COM Add-ins box.
  prefs: []
  type: TYPE_NORMAL
- en: This is a user-friendly way to perform data analysis using familiar Excel features
    that you already know, such as the Office Fluent user interface, PivotTable and
    PivotChart views, and slicers. With Power Pivot, we can mash up large volumes
    of data from various sources, perform information analysis rapidly, and share
    insights easily.
  prefs: []
  type: TYPE_NORMAL
- en: Benefits of Data Model
  prefs: []
  type: TYPE_NORMAL
- en: In both Excel and PowerPoint, you can create a data model, which is a collection
    of tables with relationships. The data model, which is seen in a workbook in Excel,
    is a similar data model that you see in the power pivot window. Any data you import
    into Excel is available in PowerPoint, and vice versa.
  prefs: []
  type: TYPE_NORMAL
- en: Data Model is a collection of tables and their relationships that reflect real-world
    relations between business operations and processes; for example, how the product
    relates to inventory and sales.
  prefs: []
  type: TYPE_NORMAL
- en: Follow the steps below.
  prefs: []
  type: TYPE_NORMAL
- en: 1. Convert the data into a table.
  prefs: []
  type: TYPE_NORMAL
- en: 2. Import the Excel table into Power Pivot.
  prefs: []
  type: TYPE_NORMAL
- en: a. The table field list can have more than one table in the pivot table.
  prefs: []
  type: TYPE_NORMAL
- en: b. We can build the relationships between tables based on one common field so
    that you do not have to use lookup.
  prefs: []
  type: TYPE_NORMAL
- en: c. Power view is enabled by Data Model.
  prefs: []
  type: TYPE_NORMAL
- en: Creating a Pivot Table Using Power Pivot
  prefs: []
  type: TYPE_NORMAL
- en: 'We have four data sets in four different sheets: city, customer, order, and
    order details. We need to create a city report regarding the total quantity sold.
    We need to follow these steps:'
  prefs: []
  type: TYPE_NORMAL
- en: 1. Select the data
  prefs: []
  type: TYPE_NORMAL
- en: a. Go to the Home tab.
  prefs: []
  type: TYPE_NORMAL
- en: b. Select the Styles group.
  prefs: []
  type: TYPE_NORMAL
- en: c. Format as table.
  prefs: []
  type: TYPE_NORMAL
- en: d. Click on the Design tab.
  prefs: []
  type: TYPE_NORMAL
- en: e. In the Properties group, give a name to the table.
  prefs: []
  type: TYPE_NORMAL
- en: 2. Select the Power Pivot tab.
  prefs: []
  type: TYPE_NORMAL
- en: a. Go to the Tables group.
  prefs: []
  type: TYPE_NORMAL
- en: b. Add to Data Model. The table will be added to the data model.
  prefs: []
  type: TYPE_NORMAL
- en: 3. Define the relationship
  prefs: []
  type: TYPE_NORMAL
- en: a. Go to the Home tab in Power Pivot view.
  prefs: []
  type: TYPE_NORMAL
- en: b. Select the Diagram view from the View tab.
  prefs: []
  type: TYPE_NORMAL
- en: c. Drag and drop common fields to create the link between two tables.
  prefs: []
  type: TYPE_NORMAL
- en: 4. Select Data view in the View tab.
  prefs: []
  type: TYPE_NORMAL
- en: 5. Click on Pivot table on the Home tab.
  prefs: []
  type: TYPE_NORMAL
- en: 6. Create the pivot table.
  prefs: []
  type: TYPE_NORMAL
- en: 7. Choose the field from the table (Active and all). A black border around the
    table means it is linked with some other table.
  prefs: []
  type: TYPE_NORMAL
- en: 8. Select city name from city detail, and quantity from order details.
  prefs: []
  type: TYPE_NORMAL
- en: Conclusion
  prefs: []
  type: TYPE_NORMAL
- en: In conclusion, the chapter on pivot tables has provided a comprehensive understanding
    of this powerful tool in Excel, which can be used for data analysis and reporting.
    Pivot tables allow users to summarize and analyze large amounts of data quickly
    and efficiently, providing different perspectives and insights into the data.
  prefs: []
  type: TYPE_NORMAL
- en: The chapter covered various topics, including examining pivot tables, recommended
    pivot table options, formatting pivot table reports, creating graphs using pivot
    data, utilizing slicers and timelines for filtering data, and exploring advanced
    features, such as Power View and Power Pivot.
  prefs: []
  type: TYPE_NORMAL
- en: By following the step-by-step instructions and examples provided in the chapter,
    readers can learn how to create pivot tables, customize them according to their
    analysis requirements, and utilize advanced features to enhance their data analysis
    and reporting capabilities.
  prefs: []
  type: TYPE_NORMAL
- en: Overall, pivot tables offer a flexible and dynamic way to explore and present
    data, enabling users to gain valuable insights and make informed decisions based
    on the summarized information. By mastering pivot tables, users can efficiently
    analyze data, uncover trends, and communicate their findings effectively.
  prefs: []
  type: TYPE_NORMAL
- en: Exercises
  prefs: []
  type: TYPE_NORMAL
