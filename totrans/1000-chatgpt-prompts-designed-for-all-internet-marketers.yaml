  zh: ⚙️ 生成新闻通讯
- en: 'FILL-IN-THE-BLANK PROMPTS:'
  id: totrans-330
  prefs: []
  type: TYPE_NORMAL
  zh: 'FILL-IN-THE-BLANK PROMPTS:'
- en: '• Prompt 1: Analyze the tone of voice and writing style of this text: **[insert
    a text that represents your tone of voice and writing style]**'
  id: totrans-331
  prefs: []
  type: TYPE_NORMAL
  zh: • 提示1：分析这段文本的语气和写作风格：**[插入代表您的语气和写作风格的文本**]”
- en: '• Prompt 2: Use that tone of voice and writing style for writing an email that
    **[describe email]**'
  id: totrans-332
  prefs: []
  type: TYPE_NORMAL
  zh: • 提示2：使用那种语气和写作风格来撰写一封**[描述邮件**]的邮件。
- en: '• Generate a weekly newsletter email for potential customers that includes:'
  id: totrans-333
  prefs: []
  type: TYPE_NORMAL
  zh: • 为潜在客户生成一封每周新闻通讯邮件，包括：
- en: '• Greeting: Hi **[recipient name]**,'
  id: totrans-334
  prefs: []
  type: TYPE_NORMAL
  zh: • 问候语：嗨**[收件人姓名**]，
- en: '• Update: We have exciting news for you!'
  id: totrans-335
  prefs: []
  type: TYPE_NORMAL
  zh: • 更新：我们有一些令人兴奋的消息要告诉您！
- en: '• Content: Our **[insert your something you want to showcase]** is live and
    you can take a look here **[include link]**'
  id: totrans-336
  prefs: []
  type: TYPE_NORMAL
  zh: • 内容：我们的**[插入您想要展示的内容**]已上线，您可以通过这里查看**[包含链接**]。
- en: '• Benefits: This will help you **[insert your first benefit]**, **[insert your
    second benefit]**, and **[insert your third benefit]**.'
  id: totrans-337
  prefs: []
  type: TYPE_NORMAL
  zh: • 优点：这将帮助您**[插入您的第一个优点]**，**[插入您的第二个优点]**，和**[插入您的第三个优点]**。
- en: '• Call-to-action: If you want to **[main benefit]** without **[main objection]**,
    this is definitely for you.'
  id: totrans-338
  prefs: []
  type: TYPE_NORMAL
  zh: • 行动号召：如果您想**[主要优点]**而没有**[主要反对意见]**，这绝对适合您。
- en: '• Sign-off: Talk to you next week, **[insert your name].** QUESTION-BASED PROMPTS:'
  id: totrans-339
  prefs: []
  type: TYPE_NORMAL
  zh: • 结束语：下周再联系您，**[插入您的姓名]**。基于问题的提示：
- en: • "Write a weekly newsletter email for our customers that highlights new products,
    promotions, and events."
  id: totrans-340
  prefs: []
