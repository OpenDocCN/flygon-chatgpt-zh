  zh: 我们已经一起拼凑了ChatGPT谜题的几个更多片段，但我们对这个强大LLM的图像还不是完整的。为了获得完整的画面，我们不仅需要了解聊天机器人的优点，还需要了解它们的局限性和弱点。就像它的创造者一样，AI并不完美。正如我们在上面章节中提到的，ChatGPT有时会给出错误的答案，传播错误信息，甚至偶尔会产生无意义的回应。这并不意味着ChatGPT在处理任何严肃或复杂的事情时都不可用，至少从长远来看是这样的。这仅仅意味着你应该确保你了解生成式AI的局限性，以及如何补偿这些局限性。
