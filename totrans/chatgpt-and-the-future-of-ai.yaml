- en: '[13](15580-0010.xhtml#en93r). Fourier completed his memoir, *On the Propagation
    of Heat in Solid Bodies*, in 1807 and read it to the Paris Institute on December
    21 of that year. The reception was mixed. Both Lagrange and Laplace objected to
    the notion of what we now call Fourier series: the expansions of functions as
    trigonometrical series. Because of the controversy, Fourier’s memoir was not published
    until 1822.'
  id: totrans-1856
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '[13](15580-0010.xhtml#en93r). Fourier 在1807年完成了他的回忆录，*《固体热传导》*，并在同年12月21日向巴黎科学院宣读。反响不一。Lagrange
    和 Laplace 都反对我们现在称之为 Fourier 级数的概念：将函数表示为三角级数。由于争议，Fourier 的回忆录直到1822年才得以出版。'
