  zh: 当我们遇到无法自己解决的问题，或者我们拥有的某样东西坏了，我们通常会打电话给某人（比如妈妈或爸爸）——我们认为这个人可能知道能帮助我们的人。换句话说，我们在寻找推荐。这不仅限于修理东西。我们经常问别人是否认识能做X的人，是否在卖Y，或者可能能够帮助我们解决Z的问题。如果他们认识，这个人会自豪地让我们知道他们有一个非常好的推荐。我们得到了推荐，我们的朋友或家庭成员感到很高兴能帮助我们，而推荐的人或公司则获得了更多的业务。每个人都在某种程度上受益，这就是那一点点幸福感，对于被推荐的公司来说，还有一点点财富增长。
