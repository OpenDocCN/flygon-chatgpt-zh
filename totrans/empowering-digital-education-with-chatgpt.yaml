- en: 18.4.2 Collaborative Decision-Making and Management Education
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: This section constitutes the core of the survey findings, offering detailed
    insights into how different respondent groups perceive the effectiveness of various
    collaborative decision-making strategies.
  prefs: []
  type: TYPE_NORMAL
- en: In response to the initial query, the findings in [Table 18.5](#ch26.xhtml#t36)
    reveal a consistent pattern among various respondent groups regarding the first
    question. A majority of participants, including students, professors, and company
    managers, acknowledge the significance of collaborative decision-making in nurturing
    critical managerial skills.
  prefs: []
  type: TYPE_NORMAL
- en: The study highlights PBL as a valuable strategy, with a notable percentage of
    respondents recognizing its effectiveness. To elaborate, 26.00% of students, 32.90%
    of professors, and 36.60% of company managers consider PBL to be “very much” or
    “extremely” effective. This observation aligns with theoretical perspectives,
    especially the social constructivist viewpoint, which underscores the role of
    practical, real-world projects in collaborative skill development.
  prefs: []
  type: TYPE_NORMAL
- en: The significance of Online Collaborative Platforms is emphasized, with 30.00%
    of students, 25.30% of professors, and 24.90% of company managers indicating a
    “very much” level of importance. The slight variation across groups underscores
    the universal relevance of such platforms in facilitating collaborative decision-making,
    irrespective of the stakeholder’s role.
  prefs: []
  type: TYPE_NORMAL
- en: Case-Based Learning garners widespread recognition for its role in developing
    shared mental models. A significant proportion across all groups – students (30.00%),
    professors (34.70%), and company managers (40.80%) – acknowledges the “very much”
    or “extremely” beneficial impact of Case-Based Learning. This aligns with the
    theoretical underpinning of shared mental models, emphasizing the importance of
    a common understanding in decision-making processes.
  prefs: []
  type: TYPE_NORMAL
- en: Simulations and Business Games emerge as highly effective tools, with 30.00%
    of students, 30.50% of professors, and 29.90% of company managers attributing
    a “very much” or “extremely” high level of effectiveness. This underscores the
    practical applicability of simulated decision-making scenarios in enhancing collaborative
    skills.
  prefs: []
  type: TYPE_NORMAL
- en: Industry–University Partnerships are perceived as immensely valuable, particularly
    by company managers (50.00%) and students (25.00%). Professors also recognize
    their value, though to a slightly lesser extent (44.90%). The emphasis on real-world
    collaborations with industry aligns with the distributed cognition perspective,
    acknowledging the distributed nature of decision-making processes.
  prefs: []
  type: TYPE_NORMAL
- en: Human-in-the-Loop Approaches are recognized as essential, especially by professors
    (59.30%) and students (40.00%). Company managers also acknowledge their importance,
    with 35.00% attributing a “very much” or “extremely” high level of contribution.
    This finding aligns with the practical approaches identified in the literature
    review, emphasizing the need for human oversight in AI-generated content.
  prefs: []
  type: TYPE_NORMAL
- en: Ethical Decision-Making Modules are considered essential, particularly by students
    (45.00%) and professors (59.30%). Company managers also recognize their importance,
    with 78.00% attributing a “very much” or “extremely” high level of essentiality.
    This aligns with the ethical considerations highlighted in the literature, emphasizing
    the need for a structured approach to address ethical concerns associated with
    AI-generated content.
  prefs: []
  type: TYPE_NORMAL
- en: Customizable AI Tools receive recognition for their effectiveness in addressing
    industry-specific challenges. A substantial proportion of students (60.00%), professors
    (44.90%), and company managers (54.70%) attribute a “very much” or “extremely”
    high level of effectiveness. This underscores the importance of tailoring AI tools
    to suit the specific requirements of management education.
