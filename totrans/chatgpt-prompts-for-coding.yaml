  prefs: []
  type: TYPE_NORMAL
  zh: '3: 使用Selenium（Python/Java）自动化测试'
- en: 'Prompt:'
  id: totrans-465
  prefs: []
  type: TYPE_NORMAL
  zh: 'Prompt:'
- en: '"Write a Selenium test script to automate the testing of a web application’s
    login functionality. Include steps for locating elements, entering credentials,
    and validating successful login. Discuss how Selenium is used for automated functional
