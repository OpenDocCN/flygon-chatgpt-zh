  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 'Estructura general: Sujeto + Verbo + Objeto Directo + Lugar Circunstancial
    + Tiempo Circunstancial.'
- en: 'Detailed Analysis:'
  id: totrans-1764
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 'Análisis detallado:'
- en: 'Subject: “che Vittoria sogna di vedere da almeno un anno.”'
  id: totrans-1765
