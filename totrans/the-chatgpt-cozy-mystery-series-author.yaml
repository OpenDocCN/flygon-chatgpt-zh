- en: Book Titles
  prefs: []
  type: TYPE_NORMAL
- en: Cozy mysteries are famous for the book titles.
  prefs: []
  type: TYPE_NORMAL
- en: Authors have been mining the depths of familiar nursery stories, myths, sayings,
    anecdotes, and movie and TV show titles for years to come up with variations on
    a phrase or saying associated with a familiar expression.
  prefs: []
  type: TYPE_NORMAL
- en: They would be puns, twists, clever rephrasing, and new variations on a theme.
  prefs: []
  type: TYPE_NORMAL
- en: The most successful book titles take something familiar to their target readers
    and rework it into something fresh.
  prefs: []
  type: TYPE_NORMAL
- en: At the same time, the book title has to tell the reader what kind of reading
    experience to expect.
  prefs: []
  type: TYPE_NORMAL
- en: A fun, upbeat, and witty book will likely have a “punny” title with a play on
    words, for example. We’ll Always Have Parrots and Gone Gull by Donna Andrews.
  prefs: []
  type: TYPE_NORMAL
- en: A more traditional mystery may have “murder” in the title. For example. Murder
    on the Orient Express by Agatha Christie and Murder Among the Roses by Liz Fielding.
  prefs: []
  type: TYPE_NORMAL
- en: I like titles based on movies and TV shows. The more popular, the better.
  prefs: []
  type: TYPE_NORMAL
- en: What kind of title would you give to the first book that would serve as the
