  prefs: []
  type: TYPE_NORMAL
  zh: 此外，在使用数据方面的透明度是一个关键问题。用户往往不清楚他们的数据是如何被人工智能平台所使用的。实施人工智能系统的组织必须对其收集的数据、如何存储以及用于何种目的保持透明。在此过程中缺乏可见性可能导致用户对数据处理的信任度下降，他们可能会在不确定自己的信息如何被处理时感到脆弱。
