  prefs: []
  type: TYPE_NORMAL
- en: 'BOOK 2: "THE GUARDIAN''S LEGACY"'
  prefs: []
  type: TYPE_NORMAL
- en: 'Plot: Investigating a series of thefts of historical documents leads Laura
    to discover another artifact and a society sworn to protect Polperran''s secrets.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Series Arc Milestone: Laura learns of her family''s historical role as guardians
    of the artifacts and begins to understand the significance of her psychic abilities.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Subplot: Laura navigates her growing feelings for James while dealing with
    a competitive rival investigator.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Character Relationships: Strengthening of bonds with her aunt and the paranormal
    team, and the deepening of Laura''s relationship with James.'
  prefs: []
  type: TYPE_NORMAL
- en: 'BOOK 3: "SHADOWS OVER POLPERRAN"'
  prefs: []
  type: TYPE_NORMAL
- en: 'Plot: A mysterious figure is sabotaging efforts to protect Polperran''s artifacts.
    Laura must identify and stop them before an artifact falls into the wrong hands.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Series Arc Milestone: The discovery of an ancient ritual that could either
    safeguard or destroy Polperran, depending on who wields the artifacts.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Subplot: Laura''s aunt faces a crisis of faith in their mission, and Laura
    must help restore her confidence.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Character Relationships: Laura''s leadership skills emerge, drawing her closer
    to her team and James, who reveals a secret connection to Polperran''s history.'
  prefs: []
  type: TYPE_NORMAL
- en: 'BOOK 4: "WHISPERS OF THE TIDE"'
  prefs: []
  type: TYPE_NORMAL
- en: 'Plot: An artifact linked to the sea brings a tidal wave of paranormal activity
    to Polperran. Laura must unravel the artifact''s history to restore peace.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Series Arc Milestone: Laura discovers that the artifacts, when combined, have
    the power to open a gateway to another realm.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Subplot: An old rival of Laura''s aunt returns, challenging Laura''s beliefs
    about her mission and her abilities.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Character Relationships: Conflict and reconciliation with her mother, who finally
    accepts Laura''s path and reveals more about Laura''s late uncle''s intentions.'
  prefs: []
  type: TYPE_NORMAL
- en: 'BOOK 5: "THE FINAL GUARDIAN"'
  prefs: []
  type: TYPE_NORMAL
- en: 'Plot: With all artifacts in danger of being assembled by a malevolent force,
    Laura leads the effort to protect Polperran, culminating in a final showdown.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Series Arc Milestone: Laura fulfills her destiny as the final guardian, performing
    a ritual that safeguards Polperran''s future while also allowing her to fully
    embrace her psychic legacy.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Subplot: Laura must decide between her life in Polperran and a tempting offer
    elsewhere, reflecting on her journey and what she truly values.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Character Relationships: Resolution and deepening of relationships with her
