  id: totrans-1828
  prefs: []
  type: TYPE_NORMAL
  zh: 图12.3 用于ANOVA推理分析启动成本数据的Analysis ToolPak配置
- en: Compare the F value to the F critical (F crit) value ([Figure 12.4](#fig12-4))
    and determine if the means are the same or not. (In this case, there is at least
    one pair of means that is different.)
  id: totrans-1829
  prefs: []
  type: TYPE_NORMAL
  zh: 将F值与F临界值（F crit）比较 ([图12.4](#fig12-4))，并确定均值是否相同。（在这种情况下，至少有一对均值是不同的。）
- en: '![image](images/pg277.jpg)'
  id: totrans-1830
  prefs: []
  type: TYPE_IMG
  zh: '![图片](images/pg277.jpg)'
- en: FIGURE 12.4 Results of the ANOVA analysis of the StartupCosts data
  id: totrans-1831
  prefs: []
  type: TYPE_NORMAL
  zh: 图12.4 StartupCosts数据的ANOVA分析结果
- en: Use the Analysis ToolPak to compute the t-test comparison of pairs of means
    ([Figure 12.5](#fig12-5)). Use the “Two-Sample Assuming Unequal Variances” function.
    Make sure to select two columns of data, including the column headers. Compare
    the GIFTS and PETS startups.
  id: totrans-1832
  prefs: []
  type: TYPE_NORMAL
  zh: 使用分析工具包计算成对均值的双样本t检验 ([图12.5](#fig12-5))。确保选择包括列标题在内的两列数据。比较GIFTS和PETS创业公司。
- en: '![image](images/pg278.jpg)'
  id: totrans-1833
  prefs: []
  type: TYPE_IMG
  zh: '![图片](images/pg278.jpg)'
- en: FIGURE 12.5 Analysis ToolPak configuration for t-test inferential analysis to
    compare the means for startup costs for two different types of stores
  id: totrans-1834
  prefs: []
  type: TYPE_NORMAL
  zh: 图12.5 用于比较两种不同类型商店启动成本均值的t检验推理分析的Analysis ToolPak配置
- en: Compare the t-stat value to the t critical value for two tails ([Figure 12.6](#fig12-6)),
    and determine if the means are the same or not. (In this case, t-stat > t critical,
    so the means are significantly different.)
  id: totrans-1835
  prefs: []
  type: TYPE_NORMAL
  zh: 将t统计值与双尾t临界值比较 ([图12.6](#fig12-6))，并确定均值是否相同。（在这种情况下，t统计 > t临界，因此均值有显著差异。）
- en: '![image](images/pg279.jpg)'
