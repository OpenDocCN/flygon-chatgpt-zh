  id: totrans-522
  prefs: []
  type: TYPE_NORMAL
  zh: '**ChatGPT**的第一个用途是作为您的客户联络。正如我们之前提到的，生成式AI已经作为客户与业务之间的第一道防线存在了一段时间。但这种软件最初价格昂贵，通常只有大型公司才能使用。ChatGPT通过优于之前任何东西而提升了这个领域的水平。'
