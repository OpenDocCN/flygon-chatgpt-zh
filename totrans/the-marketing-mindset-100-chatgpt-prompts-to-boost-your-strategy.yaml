- en: 'Prompt 6: Draft a script for a 30-second Instagram Reel.'
  id: totrans-393
  prefs: []
  type: TYPE_NORMAL
  zh: 提示6：撰写一个30秒的Instagram Reel脚本。
- en: 'Benefit:'
  id: totrans-394
  prefs: []
  type: TYPE_NORMAL
  zh: 利益：
- en: Instagram Reels are a dynamic way to showcase products, tutorials, or behind-the-scenes
    content. This prompt ensures you create a short, punchy video script that maximizes
    engagement within a 30-second time frame.
  id: totrans-395
  prefs: []
  type: TYPE_NORMAL
  zh: Instagram Reels是一种展示产品、教程或幕后内容的动态方式。这个提示确保你创建一个短小精悍的视频脚本，在30秒的时间内最大化参与度。
- en: 'Example Prompts:'
  id: totrans-396
