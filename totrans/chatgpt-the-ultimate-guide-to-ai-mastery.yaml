  id: totrans-500
  prefs: []
  type: TYPE_NORMAL
  zh: 34.2 AI伦理的关键挑战
- en: '• Bias & Discrimination: AI models may inherit biases from training data.'
  id: totrans-501
  prefs: []
  type: TYPE_NORMAL
  zh: • 偏见与歧视：AI模型可能会从训练数据中继承偏见。
- en: '• Data Privacy Concerns: AI-driven data collection raises security risks.'
  id: totrans-502
  prefs: []
  type: TYPE_NORMAL
  zh: • 数据隐私担忧：AI驱动的数据收集增加了安全风险。
- en: '• Autonomous AI Decision-Making: How much control should AI have in critical
    areas like criminal justice or hiring?'
  id: totrans-503
  prefs: []
  type: TYPE_NORMAL
