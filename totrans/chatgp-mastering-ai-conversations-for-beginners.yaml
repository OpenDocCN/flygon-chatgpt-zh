- en: '****INTR**ODUCTI**ON'
  id: totrans-250
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '****引言'
- en: '****W********el**com**e, ****m**y** ****so**on**-****t**o**-****b**e** ****te**ch**
    ****sa**vvy** ****re**ade**r, ****t**o** ****yo**ur** ****ch**eat** ****sh**eet**
    ****f**or** ****succ**eedin**g ****i**n** ****t**he** ****dig**ita**l ****wo**rld**.
    ****Tech**nolog**y ****h**as** ****infi**ltrate**d ****al**mos**t ****ev**ery**
    ****as**pec**t ****o**f** ****o**ur** ****li**ves**, ****a**nd** ****wi**ll**
    ****on**ly** ****con**tinu**e ****t**o** ****d**o** ****s**o**. ****Whe**the**r
    ****th**is** ****i**s** ****a**** ****go**od** ****th**ing** ****o**r** ****a****
    ****b**ad** ****dep**end**s ****o**n** ****yo**ur** ****po**int** ****o**f** ****vi**ew**,
    ****a**nd** ****h**ow** ****we**ll**-****pl**ace**d ****y**ou** ****a**re** ****t**o**
    ****u**se** ****sa**id** ****te**ch** ****t**o** ****imp**rov**e ****t**he** ****br**ief**
    ****ti**me** ****y**ou** ****ha**ve** ****o**n** ****th**is** ****mo**rta**l ****co**il**.'
  id: totrans-251
  prefs: []
  type: TYPE_NORMAL
  zh: '****欢迎，我的即将成为技术达人读者，欢迎来到你的成功聊天表格，在数字世界中取得成功。技术已经渗透到我们生活的方方面面，并将继续这样做。这到底是好事还是坏事取决于你的观点，以及你如何利用这种技术来改善你在这一短暂生命之
    coil 中的短暂时光。'
- en: '****Ov**er** ****t**he** ****pa**st** ****f**ew** ****dec**ade**s, ****compu**tation**al
    ****dev**ice**s ****ha**ve** ****ta**ken** ****t**he** ****wo**rld** ****b**y**
    ****st**orm**, ****hel**pin**g ****u**s** ****t**o** ****d**o** ****mo**re**,
    ****le**arn** ****mo**re**, ****a**nd** ****ach**iev**e ****mo**re** ****th**an**
    ****ev**er** ****be**for**e. ****T**he** ****ave**rag**e ****pe**rso**n ****n**ow**
    ****h**as** ****ac**ces**s ****t**o** ****tech**nolog**y ****th**at**, ****a****
    ****f**ew** ****hun**dre**d ****ye**ars** ****a**go**, ****w**as** ****on**ly**
    ****cons**idere**d ****a**** ****poss**ibilit**y ****b**y** ****sci**enc**e ****fic**tio**n
    ****wri**ter**s. ****Du**rin**g ****t**he** ****ti**me** ****bet**wee**n ****th**en**
    ****a**nd** ****n**ow**, ****th**ere** ****ha**ve** ****be**en** ****a**** ****f**ew**
    ****revol**utiona**ry ****inve**ntion**s ****th**at** ****ha**ve** ****cha**nge**d
    ****t**he** ****ve**ry** ****fa**bri**c ****o**f** ****o**ur** ****exis**tenc**e.
    ****Th**ese** ****inc**lud**e ****t**he** ****li**kes** ****o**f** ****t**he**
    ****per**sona**l ****com**pute**r, ****t**he** ****int**erne**t, ****t**he** ****ph**one**,
    ****a**nd** ****mo**st** ****rec**entl**y, ****conve**rsation**al ****arti**ficia**l
    ****inte**lligen**ce (****A**I**). ****A**t** ****t**he** ****fore**fron**t ****o**f**
    ****th**is** ****la**tes**t ****techn**ologic**al ****revo**lutio**n ****i**s**
    ****a**** ****de**ep** ****lea**rnin**g, ****la**rge** ****lan**guag**e ****mo**del**
    ****ca**lle**d ****Cha**tGP**T (****ch**at** ****gene**rativ**e ****p**re**-****tra**ine**d
    ****tran**sforme**r).'
  id: totrans-252
  prefs: []
  type: TYPE_NORMAL
  zh: 在过去的几十年里，计算设备以风暴般的速度改变了世界，帮助我们做得更多、学得更多，并实现比以往任何时候都更多的成就。现在，平均每个人都能接触到几百年前科幻小说作家们仅视为可能性的技术。在那时和现在之间，有一些革命性的发明改变了我们存在的本质。这些包括个人电脑、互联网、电话，以及最近的人工智能（AI）。在这次最新技术革命的尖端是一个深度学习、大型语言模型，称为ChatGPT（聊天生成式预训练Transformer）。
- en: '****Wi**thi**n ****t**wo** ****mo**nth**s ****o**f** ****i**ts** ****la**unc**h
    ****o**n** ****Nov**embe**r ****3**0**, ****20**22**, ****t**he** ****gene**rativ**e
    ****cha**tbo**t ****deve**lope**d ****b**y** ****Op**enA**I ****h**ad** ****alr**ead**y
    ****rea**che**d ****1**00** ****mil**lio**n ****mon**thl**y ****us**ers**, ****a**nd**
    ****th**is** ****nu**mbe**r ****h**as** ****on**ly** ****cont**inue**d ****t**o**
    ****gr**ow**. ****T**o** ****p**ut** ****i**t** ****in**to** ****pers**pectiv**e,
    ****i**t** ****to**ok** ****Ti**kTo**k ****ni**ne** ****wh**ole** ****mo**nth**s
    ****t**o** ****re**ach** ****t**he** ****1**00** ****mil**lio**n ****ma**rk**,
    ****wh**ile** ****i**t** ****to**ok** ****Inst**agra**m ****a**** ****who**ppin**g
    ****t**wo**-****a**nd**-****a****-****ha**lf** ****ye**ars** ****t**o** ****ach**iev**e
    ****th**is** ****sa**me** ****mile**ston**e. ****Th**is** ****ma**kes** ****Cha**tGP**T
    ****t**he** “****fas**tes**t-****gro**win**g ****con**sume**r ****appl**icatio**n
    ****i**n** ****his**tor**y” (****H**u**, ****20**23**).'
  id: totrans-253
  prefs: []
  type: TYPE_NORMAL
  zh: 在其发布后的两个月内，即2022年11月30日，由OpenAI开发的生成式聊天机器人已经达到了1000万月活跃用户，并且这个数字仍在持续增长。为了将其置于一个更广阔的视角中，TikTok用了整整一个月的时间才达到1000万的里程碑，而Instagram则用了两年半的时间才达到这个成就。这使得ChatGPT成为了“历史上增长最快的消费者应用”（胡，2023）。
- en: '****Des**pit**e ****i**ts** ****ev**er**-****incr**easin**g ****popu**larit**y,
    ****th**ere** ****h**as** ****be**en** ****so**me** ****hesi**tatio**n ****a**nd**
    ****resi**stanc**e ****tow**ard**s ****th**is** ****groun**dbreaki**ng ****n**ew**
    ****tech**nolog**y. ****Th**ese** ****fe**ars** ****ce**nte**r ****ar**oun**d
    ****con**cern**s ****ab**out** ****da**ta** ****sec**urit**y ****a**nd** ****pri**vac**y,
    ****a**s** ****we**ll** ****a**s** ****t**he** ****pla**tfor**m’****s**** ****pote**ntia**l
    ****mi**sus**e ****b**y** ****nefa**riou**s ****indi**vidual**s; ****a**nd** ****t**he**
    ****big**ges**t ****wo**rry** ****o**f** ****th**em** ****a**ll**, ****th**at**
    ****Cha**tGP**T ****wi**ll** ****me**an** ****t**he** ****fur**the**r ****lo**ss**
    ****o**f** ****jo**bs** ****f**or** ****u**s** ****hu**man**s. ****Wh**ile** ****i**t**
    ****c**an** ****of**ten** ****fe**el** ****li**ke** ****w**e** ****a**re** ****dro**wnin**g
    ****i**n** ****a**** ****s**ea** ****o**f** ****ev**er**-****incr**easin**g ****techn**ologic**al
    ****comp**lexit**y, ****I****’****m**** ****he**re** ****t**o** ****te**ll** ****y**ou**
    ****i**t** ****i**s** ****pos**sibl**e ****t**o** ****ri**de** ****t**he** ****te**chn**o-****wa**ve**,
    ****us**ing** ****t**he** ****to**ols** ****a**t** ****o**ur** ****dis**posa**l
    ****t**o** ****ma**ke** ****o**ur** ****li**ves** ****be**tte**r ****a**nd** ****o**ur**
    ****fut**ure**s ****bri**ghte**r, ****wit**hou**t ****t**he** ****ri**sk** ****o**f**
    ****lo**sin**g ****o**ur** ****lu**nch** ****t**o** ****i**t**. ****A**ll** ****i**t**
    ****ta**kes** ****i**s** ****lea**rnin**g ****t**o** ****u**se** ****i**t** ****ri**ght**,
    ****wh**ich** ****lu**cky** ****f**or** ****y**ou**, ****i**s** ****exa**ctl**y
    ****wh**at** ****th**is** ****bo**ok** ****i**s** ****he**re** ****t**o** ****te**ach**
    ****y**ou**!'
  id: totrans-254
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管这项颠覆性的新技术越来越受欢迎，但仍然存在一些犹豫和阻力。这些担忧主要集中在数据安全和隐私问题上，以及该平台可能被恶意个人滥用的潜在风险；他们最大的担忧之一，就是ChatGPT可能会进一步导致我们人类失业。虽然我们常常感觉像是被不断增长的技术复杂性淹没，但我在这里要告诉你，使用我们手中的工具，我们可以驾驭技术浪潮，让我们的生活更加美好，让我们的未来更加光明，而不会失去我们的生计。这一切都需要我们正确地学习和使用它，幸运的是，这正是这本书旨在教给你的！
- en: '****I**n** ****t**he** ****pa**ges** ****a**nd** ****cha**pter**s ****t**o**
    ****fo**llo**w, ****w**e**’****r**e** ****go**ing** ****t**o** ****br**eak** ****do**wn**
    ****th**is** ****revol**utiona**ry ****n**ew** ****tech**nolog**y ****b**it**
    ****b**y** ****b**it**, ****st**ep** ****b**y** ****st**ep**, ****a**s** ****w**e**
    ****dis**cove**r ****t**he** ****va**st** ****ar**ray** ****o**f** ****wa**ys**
    ****th**at** ****Cha**tGP**T ****c**an** ****he**lp** ****t**o** ****tran**sfor**m
    ****yo**ur** ****li**fe**. ****W**e**’****l**l** ****be**gin** ****o**ur** ****jou**rne**y
    ****in**to** ****t**he** ****wo**rld** ****o**f** ****gene**rativ**e ****cha**tbot**s
    ****w**ay** ****ba**ck** ****i**n** ****t**he** ****St**one** ****A**ge**—****t**he**
    ****A**I** ****St**one** ****A**ge**, ****th**at** ****i**s**—****a**s** ****w**e**
    ****co**ver** ****t**he** ****his**tor**y ****o**f** ****compu**tation**al ****dev**ice**s
    ****a**nd** ****unr**ave**l ****t**he** ****mys**ter**y ****o**f** ****mac**hin**e
    ****lea**rnin**g ****a**nd** ****conve**rsation**al ****A**I**. ****Af**ter**
    ****o**ur** ****cr**ash** ****co**urs**e ****o**n** ****wh**at** ****arti**ficia**l
    ****inte**lligen**ce ****i**s** (****a**nd** ****wh**at** ****i**t** ****i**sn**’****t****),
    ****w**e**’****l**l** ****di**ve** ****o**n** ****thr**oug**h ****t**he** ****dig**ita**l
    ****loo**kin**g ****gl**ass** ****a**s** ****w**e** ****en**ter** ****in**to**
    ****t**he** ****e**ra** ****o**f** ****Cha**tGP**T ****pr**ope**r. ****W**e**’****l**l**
    ****out**lin**e ****t**he** ****stre**ngth**s ****a**nd** ****limi**tation**s
    ****o**f** ****A**I**’****s**** ****po**ste**r ****ch**ild** ****be**for**e ****begi**nnin**g
    ****t**o** ****de**fin**e ****h**ow** ****y**ou** ****c**an** ****be**gin** ****us**ing**
    ****i**t** ****t**o** ****enh**anc**e ****bo**th** ****yo**ur** ****per**sona**l
    ****a**nd** ****prof**ession**al ****li**fe**.'
  id: totrans-255
  prefs: []
  type: TYPE_NORMAL
  zh: 在接下来的页面和章节中，我们将逐步分解这一革命性的新技术，一点一滴，一步一个脚印，随着我们探索ChatGPT能够帮助改变你生活的各种方式。我们将从史前时代——AI的史前时代——开始我们的旅程，即——当我们回顾计算设备的历史并揭开机器学习和对话式AI的神秘面纱时。在经历了关于人工智能是什么（以及它不是什么）的崩溃课程之后，我们将深入探讨数字眼镜的奥秘，随着我们进入ChatGPT的黄金时代。我们将概述AI后代的优点和局限性，在开始定义如何开始使用它来提升你的个人和职业生涯之前。
- en: '****A**s** ****w**e**’****l**l** ****co**me** ****t**o** ****s**ee**, ****Cha**tGP**T
    ****i**s** ****t**he** ****be**st** ****per**sona**l ****assi**stan**t (****P**A**)
    ****y**ou** ****co**uld** ****ev**er** ****a**sk** ****f**or**. ****Wi**th** ****i**ts**
    ****abi**lit**y ****t**o** ****pro**ces**s ****nat**ura**l ****lan**guag**e ****com**bine**d
    ****wi**th** ****i**ts** ****de**ep** ****lea**rnin**g ****cap**acit**y, ****th**is**
    ****revol**utiona**ry ****cha**tbo**t ****c**an** ****as**sis**t ****y**ou** ****wi**th**
    ****pro**jec**t ****mana**gemen**t, ****con**ten**t ****cre**atio**n, ****a**nd**
    ****mo**re**—****ev**en** ****ser**vin**g ****a**s** ****yo**ur** ****ther**apis**t-****o**n**-****de**man**d
    ****t**o** ****as**sis**t ****wi**th** ****kee**pin**g ****o**n** ****t**op**
    ****o**f** ****yo**ur** ****me**nta**l ****he**alt**h. ****Bes**ide**s ****th**ese**
    ****mo**re** ****per**sona**l ****us**es**, ****y**ou** ****c**an** ****al**so**
    ****u**se** ****i**t** ****t**o** ****ta**ke** ****yo**ur** ****prof**ession**al
    ****li**fe** ****u**p** ****a**** ****f**ew** ****le**vel**s, ****ser**vin**g
    ****a**s** ****yo**ur** ****po**cke**t-****si**zed** ****bus**ines**s ****par**tne**r.
    ****Af**ter** ****w**e**’****v**e** ****di**ppe**d ****o**ur** ****to**es** ****in**to**
    ****t**he** ****wa**ter**s ****o**f** ****wh**at** ****Cha**tGP**T ****c**an**
    ****d**o** ****wi**th** ****th**ese** ****mo**re** ****we**ll**-****kn**own**
    ****us**es** ****o**f** ****assi**stiv**e ****A**I**, ****w**e**’****l**l** ****di**ve**
    ****i**n** ****de**epe**r ****a**s** ****w**e** ****s**ee** ****h**ow** ****y**ou**
    ****c**an** ****inco**rporat**e ****t**he** ****tech**nolog**y ****in**to** ****yo**ur**
