  id: totrans-1762
  prefs: []
  type: TYPE_NORMAL
  zh: Twitter，或 X.com，是发现策略想法和关注经验丰富的开发者的理想平台。专注于交易和策略开发的账户通常会被其他爱好者关注，这使得通过探索互动、点赞和关注的账户来发现新想法变得容易。以下是一些推荐账户：
