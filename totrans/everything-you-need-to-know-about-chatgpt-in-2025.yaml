  zh: '**另一个** **转** **换器** **的** **关键** **优势** **是** **其** **可** **扩展** **性**。 **当**
    **更多** **数据** **和** **计算** **资源** **被** **引入** **时**， **转换器** **可以** **指数级** **增加**
    **其** **生成** **连贯** **和** **逼真** **文本** **的能力**。 **这种** **可** **扩展** **性** **是**
    **GPT** **和其他** **生成** **模型** **成功** **的关键** **因素**。'
