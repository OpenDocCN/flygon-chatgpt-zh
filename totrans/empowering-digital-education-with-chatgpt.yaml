- en: '|  **Residuals** |  **138** |  **7581** |  **55** |   |   |'
  prefs: []
  type: TYPE_TB
- en: '|  **Signif. codes** |  **0 ‘***’** |  **0.001 ‘**’** |  **0.01 ‘*’** |  **0.05
    ‘.’** |  **0.1 ‘ ’** |'
  prefs: []
  type: TYPE_TB
- en: The result of the ANOVA indicates a significant difference between the student
    scores generated by the three methods, with an extremely low p-value (p-value
    = 2.10^(–16), well below 0.05). This finding suggests that the methods have a
    significant impact on student results.
  prefs: []
  type: TYPE_NORMAL
- en: However, to go beyond this overall finding and identify specific differences
    between the means of the methods, we need to use post-hoc tests. In this context,
    the Tukey test is chosen to conduct these multiple comparisons. A Tukey test (HSD)
    was employed to compare all means pairwise ([Table 14.2](#ch22.xhtml#t29)).
  prefs: []
  type: TYPE_NORMAL
- en: '[Table 14.2](#ch22.xhtml#t29b) Tukey test to comparisons between the means
    of the different methods'
  prefs: []
  type: TYPE_NORMAL
- en: '| **Groups** | **Diff** | **Lwr** | **Upr** | **P Adj** |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- | --- | --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '|  **G2-G1** |  **8.128** |  **4.525** |  **11.732** |  **1.10**^(**–6**) |'
  prefs: []
  type: TYPE_TB
- en: '|  **G3-G1** |  **17.638** |  **14.014** |  **21.261** |  **0.000** |'
  prefs: []
  type: TYPE_TB
- en: '|  **G3-G2** |  **9.509** |  **5.867** |  **13.151** |  **0.000** |'
  prefs: []
  type: TYPE_TB
- en: The outcomes of the Tukey test reveal a significant difference in the mean values
    among groups G1, G2 and G3\. Moreover, the findings underscore the significant
    divergence in students’ performance averages across all compared groups (G1, G2,
    G3). These discerned distinctions were substantiated by exceptionally low p-values,
    thereby enhancing confidence in the statistical robustness of the observed disparities
    between the groups.
  prefs: []
  type: TYPE_NORMAL
- en: In this phase of our analysis, we meticulously checked the fundamental conditions
    required for the application of ANOVA. To assess the normality of the residuals,
    we examined the cloud of residuals, which was found to be satisfactorily aligned
    on the right, suggesting that the residuals follow a normal distribution ([Figure
    14.2](#ch22.xhtml#f44)). The symmetry and linear shape of the cloud reinforce
    our confidence in the assumption of normality of the residuals.
  prefs: []
  type: TYPE_NORMAL
- en: '![A Q-Q plot plots sample quantiles versus theoretical quantiles. The plot
    features data points and a diagonal reference line extending from the bottom left
    starting on the x-axis and ending at the top right. The data points mostly align
    with the line, with some deviation towards the tails.](html/images/9781032716084_C014_002.jpg)'
  prefs: []
  type: TYPE_IMG
- en: '[Figure 14.2](#ch22.xhtml#f44b) Q–Q plot, test of normality.'
  prefs: []
  type: TYPE_NORMAL
- en: The second graph uses the autocorrelation function (ACF) to assess the independence
    of the residuals. All the bars in the ACF lie between the two dotted lines, with
    the exception of the first bar ([Figure 14.3](#ch22.xhtml#f45)). This observation
    suggests that the residuals are independent, with the exception of the first observation,
    which may require special attention.
  prefs: []
  type: TYPE_NORMAL
- en: '![A graph plots A C F versus lag. Values are estimated. It depicts a horizontal
    line that extends between (0, 0) and (22, 0), and two horizontal dashed lines
    extending right from negative 0.185 and 0.185 on the y-axis. The line extending
    right from 0 on the y-axis depicts multiple lags with peaks and troughs. The highest
    peak is at 0 on the y-axis.](html/images/9781032716084_C014_003.jpg)'
  prefs: []
  type: TYPE_IMG
- en: '[Figure 14.3](#ch22.xhtml#f45b) The test of independence of residuals.'
  prefs: []
  type: TYPE_NORMAL
- en: With regard to homoscedasticity, we used Bartlett’s test, and the value obtained
    is greater than 0.005\. This result supports the idea that the variances of the
    residuals are homogeneous between the groups, thus reinforcing the validity of
    the ANOVA results.
  prefs: []
  type: TYPE_NORMAL
- en: In short, our in-depth analyses of the ANOVA conditions, ranging from the normality
    and independence of the residuals to homoscedasticity, reinforce the robustness
    of our statistical approach, thereby strengthening the validity of the conclusions
    we can draw from the application of ANOVA to the data.
  prefs: []
  type: TYPE_NORMAL
- en: The ranges do not overlap, indicating a statistically significant difference
    between the means. Notably, Method3 (81.477) exhibits the highest mean among the
    three methods, potentially indicating higher performance in terms of scores. On
    the other hand, Method2 (71.967) presents an intermediate mean compared to the
    three methods. Meanwhile, Method1 (63.839) has the lowest average of the three
    methods, suggesting relatively lower performance ([Figure 14.4](#ch22.xhtml#f46)).
  prefs: []
  type: TYPE_NORMAL
- en: '![A box and whisker plot titled boxplot comparison of methods plots values
    versus the number of methods. It depicts three plots labeled method 1, method
    2, and method 3 with minimum values, first quartile, median, third quartile, and
    maximum values in an increasing pattern from the bottom left to the top right.](html/images/9781032716084_C014_004.jpg)'
  prefs: []
  type: TYPE_IMG
- en: '[Figure 14.4](#ch22.xhtml#f46b) Forest test.'
  prefs: []
  type: TYPE_NORMAL
- en: We implemented multiple linear regression using the backward elimination technique
    to examine the joint influences of socio-demographic factors (age, educational
    level, gender, income) and the computer level variable on the Score of evaluation.
    The results of this multivariate analysis ([Table 14.3](#ch22.xhtml#t30)) revealed
    that the variables Methods and Computing Level had a statistically significant
    impact on the evaluation Score, as shown by the results (P = 3.6.10^(–6)) and
    (P < 2.10^(–16)), respectively. In other words, both the methods used in the study
    and the participants’ level of computer literacy played a statistically significant
    role in predicting the score.
  prefs: []
  type: TYPE_NORMAL
- en: '[Table 14.3](#ch22.xhtml#t30b) Multiple linear regression using the backward
    elimination'
  prefs: []
  type: TYPE_NORMAL
- en: '|  | **Estimate** | **Std. Error** | **t Value** | **Pr(>&#124;**t**&#124;)**
    |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- | --- | --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '|  **Intercept** |  **48.2908** |  **1.3375** |  **36.107** |  **<2.10**^(**–16**)*******
    |'
  prefs: []
  type: TYPE_TB
- en: '|  **Methods** |  **3.5374** |  **0.7326** |  **4.828** |  **3.6.10**^(**–6**)*******
    |'
  prefs: []
  type: TYPE_TB
- en: '|  **Computer level** |  **6.0512** |  **0.5440** |  **11.124** |  **<210**^(**–16**)*******
    |'
  prefs: []
  type: TYPE_TB
- en: '|  **Signif. codes: 0 ‘***’ 0.001 ‘**’ 0.01 ‘*’ 0.05 ‘.’ 0.1 ‘ ’ 1** |'
  prefs: []
  type: TYPE_TB
- en: The adjusted R-squared, evaluated at 0.7246, highlights the robustness of the
    model in terms of its ability to explain score variability. This adjusted coefficient
    was able to account for approximately 72.46% of the variation recorded in the
    data. This finding reinforces the credibility and relevance of the model in its
    ability to capture the relationships between the explanatory variables and the
    “Score” variables.
  prefs: []
  type: TYPE_NORMAL
- en: 14.5 Conclusion
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In conclusion, this chapter represents a significant contribution to the in-depth
    exploration of the dynamics of hybrid learning. Through a comparative study, we
    have examined traditional educational strategies, those based on ChatGPT, as well
    as the hybrid approach. Rooted in the transformative landscape of education, this
    exploration highlights the impact of emerging technologies, notably ChatGPT, on
    the redefinition of conventional educational practices.
  prefs: []
  type: TYPE_NORMAL
- en: The critique of the traditional explanatory method, characterised by the unidirectional
    transmission of knowledge, highlights its passivity and lack of relevance to students’
    everyday lives. The study advocates a transition towards active and dialogical
    methodologies, aligned with learners’ needs. Various learning methods, such as
    visual, auditory, reading and writing, interactive online courses and adaptive
    platforms, illustrate the evolution of education.
  prefs: []
  type: TYPE_NORMAL
- en: ChatGPT, developed by OpenAI, is emerging as a versatile tool, enhancing personalised
    learning experiences. Its conversational capabilities facilitate virtual tutoring,
    language learning and engagement, providing students with a dynamic interface
    for interaction. ChatGPT’s algorithmic foundations, outlined in Algorithm 1, demonstrate
    its process for understanding and generating contextual responses.
  prefs: []
  type: TYPE_NORMAL
- en: The introduction of the innovative hybrid model seamlessly combines traditional
    teaching with ChatGPT-based interactions, aiming to exploit the strengths of both
    approaches to ensure personalised learning experiences. Statistical analyses,
    including ANOVA and Tukey tests, highlight significant differences between groups
    using traditional, ChatGPT-based and hybrid learning methods. The hybrid approach,
    merging the best of both worlds, shows particularly remarkable results, as highlighted
    by graphical representations such as the Q–Q plot and the Forest test.
  prefs: []
  type: TYPE_NORMAL
- en: An in-depth regression analysis confirms the importance of the selected methods
    and participants’ computer literacy in predicting assessment scores, with a model
    showing an adjusted R-squared of 72.46%, attesting to its robustness in explaining
    score variability.
  prefs: []
  type: TYPE_NORMAL
- en: In essence, this chapter highlights the changing educational landscape and underlines
    the compelling need for innovative methodologies. The hybrid learning model, integrating
    tradition and technology, is emerging as a promising avenue for effective personalised
    education. However, certain limitations should be noted, such as differences in
    students’ familiarity with ChatGPT, which may influence the results, and the limited
    size of the student groups, which restricts the generalisability of the findings.
    Future studies could benefit from a larger sample size to strengthen the external
    validity of the results.
  prefs: []
  type: TYPE_NORMAL
