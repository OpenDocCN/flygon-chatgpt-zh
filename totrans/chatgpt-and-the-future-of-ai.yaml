- en: '[10](15580-0007.xhtml#en33r). A slide rule is a device about the size of a
    large ruler consisting of three blocks of wood, one that slides in and out bounded
    by two static pieces. By lining up numbers on the blocks, you can quickly multiply
    and divide two numbers with 2.5 significant figures of accuracy. The power of
    10 has to be estimated.'
  id: totrans-1793
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '[10](15580-0007.xhtml#en33r). 计算尺是一种大约与大型尺子大小相当的装置，由三块木头组成，其中一块可以滑动，由两块静止的木头限制。通过将木块上的数字对齐，你可以快速地用2.5位有效数字的精度乘除两个数字。10的幂必须估计。'
