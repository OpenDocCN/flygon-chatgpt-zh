  id: totrans-444
  prefs: []
  type: TYPE_NORMAL
  zh: 最令人期待的前进之一是上下文理解的改进。尽管当前模型可以处理长对话和执行复杂任务，但它们在长期交互中保持一致性或在某些情境中解释极端复杂的细微差别方面仍存在限制。未来的
    GPT 模型预计将提高在更长时间交互中保持上下文的能力，从而允许进行更流畅和更高效的对话，无需重复信息或纠正误解。
