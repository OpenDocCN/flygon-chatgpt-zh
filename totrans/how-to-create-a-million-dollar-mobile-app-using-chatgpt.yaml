- en: 'Appendix E: Glossary of Terms'
  id: totrans-1514
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 附录 E：术语表
- en: 'A/B Testing: A method of comparing two versions of a feature or design to determine
    which performs better.'
  id: totrans-1515
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: A/B 测试：一种比较两个版本的功能或设计以确定哪个表现更好的方法。
- en: 'ARPU: Average Revenue Per User, a key metric for measuring profitability.'
  id: totrans-1516
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: ARPU：平均每用户收入，衡量盈利能力的关键指标。
- en: 'Freemium: A business model where the app is free, but additional features are
    paid.'
  id: totrans-1517
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Freemium：一种商业模式，应用程序免费，但附加功能需要付费。
- en: 'Retention Rate: The percentage of users who continue to use an app over time.'
  id: totrans-1518
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 留存率：在一段时间内继续使用应用程序的用户百分比。
- en: 'Tech Stack: The set of technologies used to develop and maintain an app.'
  id: totrans-1519
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 技术栈：用于开发和维护应用程序的技术集合。
- en: '* * *'
