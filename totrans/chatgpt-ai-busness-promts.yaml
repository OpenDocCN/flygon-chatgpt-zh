  prefs: []
  type: TYPE_NORMAL
  zh: 2. 建立一个框架来评估公司当前数字转型的状态。
- en: 3\. Create a survey to gauge how knowledgeable staff members are about AI.
  id: totrans-1074
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 制定一份调查问卷，以衡量员工对人工智能的了解程度。
