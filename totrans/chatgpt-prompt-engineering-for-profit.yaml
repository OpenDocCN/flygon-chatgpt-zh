  prefs: []
  type: TYPE_NORMAL
  zh: '■ ****主要问题: "****在接下来的20年里，基因医学的进步将产生什么影响？"'
- en: '■ ****Opti**misti**c ****Sce**nari**o: "****Adv**ance**s ****i**n** ****ge**ne**
