  - PREF_UL
  type: TYPE_NORMAL
  zh: 我该如何[使用时间分析工具]来[识别异常]和[突出]在[我的时间序列]中？
- en: I have [time series] and I want to [analyze trends]. How can I [apply analysis
    techniques] to [understand patterns] and [interpret results] in [my analyses]?
  id: totrans-2065
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我有[时间序列]数据，并想[分析趋势]。我该如何[应用分析技术]来[理解模式]和[解释分析结果]？
- en: A1.11\. Machine learning
  id: totrans-2066
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: A1.11\. 机器学习
- en: A1.11.1\. *Algorithm selection*
  id: totrans-2067
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: A1.11.1\. *算法选择*
- en: How can I determine the machine learning algorithm most appropriate for my [classification/regression]?
  id: totrans-2068
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我该如何确定最适合我的[分类/回归]的机器学习算法？
- en: Could you provide some examples of machine learning algorithms for [image recognition,
    sequence prediction, anomaly detection] and explain them?
  id: totrans-2069
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 您能提供一些关于[图像识别、序列预测、异常检测]的机器学习算法的例子，并解释一下吗？
- en: For my [unstructured textual data, time series data, computer vision tasks],
    what specific machine learning algorithms would you recommend considering?
  id: totrans-2070
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于我的[非结构化文本数据、时间序列数据、计算机视觉任务]，您推荐考虑哪些具体的机器学习算法？
- en: I am just starting out in machine learning. What are a few polyvalent algorithms
    I should start with for [classification, regression, clustering] problems?
  id: totrans-2071
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我刚开始学习机器学习。对于[分类、回归、聚类]问题，我应该从哪些多用途算法开始？
- en: Which machine learning algorithm is best suited for [small or large datasets]
    in terms of [training time, performances, scalability]?
  id: totrans-2072
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 从[训练时间、性能、可扩展性]方面考虑，哪种机器学习算法最适合[小型或大型数据集]？
- en: A1.11.2\. *Model training*
  id: totrans-2073
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: A1.11.2\. *模型训练*
- en: What are the best practices to follow when training models [regression, classification,
    neural network] on my dataset?
  id: totrans-2074
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在我的数据集上训练[回归、分类、神经网络]模型时，应该遵循哪些最佳实践？
- en: How can I adjust model hyperparameters, such as [learning rate, layers, dropout],
    to improve model performance when training [CNNs, RNNs, random forests]?
  id: totrans-2075
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我如何在训练[卷积神经网络、循环神经网络、随机森林]时调整模型超参数，如[学习率、层、dropout]，以提高模型性能？
- en: What techniques can I use to avoid overfitting and underfitting when training
    models on my dataset?
  id: totrans-2076
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我在训练数据集上训练模型时，如何使用技术避免过拟合和欠拟合？
- en: How can I determine the optimum number of eras, batch size and other parameters
    when training [deep learning, SVM, decision tree] models?
  id: totrans-2077
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我如何在训练[深度学习、支持向量机、决策树]模型时确定最佳时期数、批量大小和其他参数？
- en: How can I take advantage of validation sets, cross-validation and other methods
    to rigorously evaluate models during training?
  id: totrans-2078
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我如何利用验证集、交叉验证等方法在训练过程中严格评估模型？
- en: A1.11.3\. *Performance evaluation*
  id: totrans-2079
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: A1.11.3\. *性能评估*
- en: What evaluation measures would be most appropriate to assess the performances
    of my [classification, prediction, recommendation] model?
  id: totrans-2080
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 评估我的[分类、预测、推荐]模型性能最合适的评估指标是什么？
- en: How can I evaluate different machine learning models by training them against
    each other to select the best performer?
  id: totrans-2081
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我如何通过相互训练不同的机器学习模型来评估它们，并选择最佳表现者？
- en: What techniques are recommended for assessing model performance on unbalanced
    datasets?
  id: totrans-2082
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 评估不平衡数据集上的模型性能推荐使用哪些技术？
- en: Apart from accuracy, what other key aspects should I analyze to determine how
    well my model generalizes?
  id: totrans-2083
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 除了准确性之外，我还应该分析哪些关键方面来确定我的模型泛化得如何？
- en: What validation strategies, such as k-fold cross-validation, should I implement
    to rigorously evaluate the model’s performance?
  id: totrans-2084
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我应该实施哪些验证策略，如k折交叉验证，以严格评估模型性能？
- en: '# Appendix 2'
  id: totrans-2085
  prefs: []
  type: TYPE_NORMAL
  zh: '# 附录2'
- en: 'GPT-4 versus GPT-3.5: Feature Comparison'
  id: totrans-2086
  prefs: []
  type: TYPE_NORMAL
  zh: GPT-4与GPT-3.5：特性比较
- en: '**Table A2.1.** *Comparison between GPT-3.5 and GPT-4*'
  id: totrans-2087
  prefs: []
  type: TYPE_NORMAL
  zh: '**表A2.1.** *GPT-3.5与GPT-4的比较*'
- en: '| Features | GPT-3.5 | GPT-4 |'
  id: totrans-2088
  prefs: []
  type: TYPE_TB
  zh: '| 特征 | GPT-3.5 | GPT-4 |'
- en: '| --- | --- | --- |'
  id: totrans-2089
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- | --- |'
- en: '| **Parameters** | 175 billion | Over 1 trillion |'
  id: totrans-2090
  prefs: []
  type: TYPE_TB
  zh: '| **参数** | 1750亿 | 超过1万亿 |'
- en: '| **Training data period** | Until June 2021 | Until September 2021 |'
  id: totrans-2091
  prefs: []
  type: TYPE_TB
  zh: '| **训练数据期** | 至2021年6月 | 至2021年9月 |'
- en: '| **Training duration** | Standard training | Additional six months for human
    and AI feedback |'
  id: totrans-2092
  prefs: []
  type: TYPE_TB
  zh: '| **训练时长** | 标准训练 | 额外六个月用于人类和AI反馈 |'
- en: '| **Context window size** | 3,000 tokens | 25,000 tokens |'
  id: totrans-2093
  prefs: []
  type: TYPE_TB
  zh: '| **上下文窗口大小** | 3,000个标记 | 25,000个标记 |'
- en: '| **Accuracy** | Prone to hallucination | More accurate responses |'
  id: totrans-2094
  prefs: []
  type: TYPE_TB
  zh: '| **准确性** | 易于产生幻觉 | 更准确的响应 |'
- en: '| **Safety mechanisms** | Limited | Enhanced safety mechanisms |'
  id: totrans-2095
  prefs: []
  type: TYPE_TB
  zh: '| **安全机制** | 有限 | 增强的安全机制 |'
- en: '| **Programming skills** | Basic code generation | Can iterate and debug code
    |'
  id: totrans-2096
  prefs: []
  type: TYPE_TB
  zh: '| **编程技能** | 基础代码生成 | 可以迭代和调试代码 |'
- en: '| **Multimodal capabilities** | Text only | Also includes images (describes
    images, contexts, suggestions) |'
  id: totrans-2097
  prefs: []
  type: TYPE_TB
  zh: '| **多模态能力** | 仅文本 | 还包括图像（描述图像、上下文、建议） |'
- en: '| **Information synthesis** | Struggles to establish connections | Can synthesize
    from multiple sources |'
  id: totrans-2098
  prefs: []
  type: TYPE_TB
  zh: '| **信息综合** | 难以建立联系 | 可以从多个来源综合 |'
- en: '| **Creativity and consistency** | Basic creative writing | Improved narrative
    and character consistency |'
  id: totrans-2099
  prefs: []
  type: TYPE_TB
  zh: '| **创造性和一致性** | 基础创意写作 | 改善叙事和角色一致性 |'
- en: '| **Problem solving** | Limited in math and science | Complex mathematical
    and scientific solutions |'
  id: totrans-2100
  prefs: []
  type: TYPE_TB
  zh: '| **问题解决** | 数学科学有限 | 复杂的数学和科学解决方案 |'
- en: '| **Problem-solving capabilities** | Limited complex reasoning | Can solve
    advanced mathematical and scientific problems |'
  id: totrans-2101
  prefs: []
  type: TYPE_TB
  zh: '| **问题解决能力** | 有限复杂推理 | 能够解决高级数学和科学问题 |'
- en: '| **Bias and ethics** | More prone to bias | Reduced biased and unethical responses
    |'
  id: totrans-2102
  prefs: []
  type: TYPE_TB
  zh: '| **偏见与伦理** | 更易受偏见影响 | 减少偏见和不道德的回应 |'
- en: '| **Responsiveness** | Faster responses | Slower for longer responses |'
  id: totrans-2103
  prefs: []
  type: TYPE_TB
  zh: '| **响应速度** | 响应更快 | 长时间响应较慢 |'
- en: '| **Complex task management** | Limited capacity | Efficiently manages complex
    tasks |  # Appendix 3'
  id: totrans-2104
  prefs: []
  type: TYPE_NORMAL
  zh: '| **复杂任务管理** | 有限容量 | 高效管理复杂任务 |  # 附录 3'
- en: Basic Terminology Cheat Sheet
  id: totrans-2105
  prefs: []
  type: TYPE_NORMAL
  zh: 基本术语速查表
- en: '*Algorithms:* step-by-step instructions for solving problems programmatically.'
  id: totrans-2106
  prefs: []
  type: TYPE_NORMAL
  zh: '*算法*：用于程序化解决问题的逐步指令。'
- en: '*Anomaly detection:* identification of unusual patterns different from expected
    behavior.'
  id: totrans-2107
  prefs: []
  type: TYPE_NORMAL
  zh: '*异常检测*：识别与预期行为不同的异常模式。'
- en: '*API:* application programming interfaces enabling access to data and functionalities
    from an application.'
  id: totrans-2108
  prefs: []
  type: TYPE_NORMAL
  zh: '*API*：应用程序编程接口，允许从应用程序访问数据和功能。'
- en: '*Augmented analytics*: fusion of human and artificial intelligence for enhanced
    data insights.'
  id: totrans-2109
  prefs: []
  type: TYPE_NORMAL
  zh: '*增强分析*：融合人类和人工智能以增强数据洞察。'
- en: '*Automation:* the use of technology, such as AI, to perform tasks automatically.'
  id: totrans-2110
  prefs: []
  type: TYPE_NORMAL
  zh: '*自动化*：使用技术（如人工智能）自动执行任务。'
- en: '*Bias:* systematic prejudice that can skew model results.'
  id: totrans-2111
  prefs: []
  type: TYPE_NORMAL
  zh: '*偏见*：可能导致模型结果偏差的系统偏见。'
- en: '*Business intelligence (BI)*: processes and tools for collecting and analyzing
    data to generate business insights and make decisions.'
  id: totrans-2112
  prefs: []
  type: TYPE_NORMAL
  zh: '*商业智能（BI）*：收集和分析数据以生成业务洞察和做出决策的过程和工具。'
- en: '*Chatbots:* conversational AI systems capable of natural dialogues.'
  id: totrans-2113
  prefs: []
  type: TYPE_NORMAL
  zh: '*聊天机器人*：能够进行自然对话的对话式人工智能系统。'
- en: '*ChatGPT:* an advanced language model, created by OpenAI, capable of engaging
    in interactive conversations and generating coherent, contextually pertinent text
    in response to prompts.'
  id: totrans-2114
  prefs: []
  type: TYPE_NORMAL
  zh: '*ChatGPT*：由 OpenAI 创建的高级语言模型，能够参与互动对话，并根据提示生成连贯、上下文相关的文本。'
- en: '*ChatGPT plugins:* third-party integrations that enhance ChatGPT’s capabilities,
    such as code execution, data visualization or database querying.'
  id: totrans-2115
  prefs: []
  type: TYPE_NORMAL
  zh: '*ChatGPT 插件*：增强 ChatGPT 功能的第三方集成，例如代码执行、数据可视化或数据库查询。'
- en: '*Classification:* categorization of data points into distinct classes or categories.'
  id: totrans-2116
  prefs: []
  type: TYPE_NORMAL
  zh: '*分类*：将数据点分类到不同的类别或类别中。'
- en: '*Code:* a set of instructions written in a programming language to give orders
    to a computer and execute specific tasks.'
  id: totrans-2117
  prefs: []
  type: TYPE_NORMAL
  zh: '*代码*：用编程语言编写的指令集，用于向计算机下达命令并执行特定任务。'
- en: '*Code interpreter:* tool enabling AI to execute and interact with code snippets
    in various programming languages.'
  id: totrans-2118
  prefs: []
  type: TYPE_NORMAL
  zh: '*代码解释器*：使人工智能能够执行和与各种编程语言的代码片段交互的工具。'
- en: '*Coding:* process using programming languages to develop software, applications
    and technological solutions.'
  id: totrans-2119
  prefs: []
  type: TYPE_NORMAL
  zh: '*编码*：使用编程语言开发软件、应用程序和技术解决方案的过程。'
- en: '*Conversational AI:* artificial intelligence systems designed to interact and
    dialogue with humans in a natural, conversational way, often by understanding
    and generating human language.'
  id: totrans-2120
  prefs: []
  type: TYPE_NORMAL
  zh: '*对话式人工智能*：设计用于以自然、对话方式与人类互动和对话的人工智能系统，通常通过理解和生成人类语言来实现。'
- en: '*Correlation:* assessment of the statistical relationship between variables.'
  id: totrans-2121
  prefs: []
  type: TYPE_NORMAL
  zh: '*相关性*：评估变量之间的统计关系。'
- en: '*Creativity*: human ingenuity in formulating problems and imagining solutions.'
  id: totrans-2122
  prefs: []
  type: TYPE_NORMAL
  zh: '*创造力*：在制定问题和想象解决方案中的人类独创性。'
- en: '*Dashboard:* interface for visual monitoring of key data and key indicators.'
  id: totrans-2123
  prefs: []
  type: TYPE_NORMAL
  zh: '*仪表板*：用于视觉监控关键数据和关键指标的用户界面。'
- en: '*Data:* facts, statistics or information that can be analyzed to draw conclusions.'
  id: totrans-2124
  prefs: []
  type: TYPE_NORMAL
  zh: '*数据*：可以分析以得出结论的事实、统计数据或信息。'
- en: '*Data analyst:* a professional who interprets and analyzes data to extract
    useful information and make informed decisions.'
  id: totrans-2125
  prefs: []
  type: TYPE_NORMAL
  zh: '*数据分析师*：一位专业从事数据解释和分析，以提取有用信息并做出明智决策的人。'
- en: '*Data analytics*: discipline focused on extracting information from data using
    specialized tools and techniques.'
  id: totrans-2126
  prefs: []
  type: TYPE_NORMAL
  zh: '*数据分析*：专注于使用专用工具和技术从数据中提取信息的学科。'
- en: '*Data cleaning:* correction of inconsistencies and errors in the data.'
  id: totrans-2127
  prefs: []
  type: TYPE_NORMAL
  zh: '*数据清洗*：纠正数据中的不一致性和错误。'
- en: '*Data collection*: gathering relevant data from a variety of sources.'
  id: totrans-2128
  prefs: []
  type: TYPE_NORMAL
  zh: '*数据收集*：从各种来源收集相关数据。'
- en: '*Data pipeline:* architectural flow of data from raw state to processed state.'
  id: totrans-2129
  prefs: []
  type: TYPE_NORMAL
  zh: '*数据管道*：从原始状态到处理状态的数据架构流程。'
- en: '*Data preparation:* manual manipulation of data to make it usable.'
  id: totrans-2130
  prefs: []
  type: TYPE_NORMAL
  zh: '*数据准备*：手动操作数据以使其可用的过程。'
- en: '*Data quality:* assessment of accuracy, completeness and reliability of data.'
  id: totrans-2131
  prefs: []
  type: TYPE_NORMAL
  zh: '*数据质量*：评估数据的准确性、完整性和可靠性。'
- en: '*Data science*: interdisciplinary field that uses scientific processes and
    algorithms to extract knowledge from data.'
  id: totrans-2132
  prefs: []
  type: TYPE_NORMAL
  zh: '*数据科学*：一个跨学科领域，使用科学过程和算法从数据中提取知识。'
- en: '*Data scientist*: a data processing expert who applies statistical and computational
    methods to solve complex problems and gain actionable insights.'
  id: totrans-2133
  prefs: []
  type: TYPE_NORMAL
  zh: '*数据科学家*：一位数据处理专家，应用统计和计算方法来解决复杂问题并获得可操作的见解。'
- en: '*Data visualization*: graphical representation of information and ideas.'
  id: totrans-2134
  prefs: []
  type: TYPE_NORMAL
  zh: '*数据可视化*：信息和想法的图形表示。'
- en: '*Decision tree:* tree-shaped model representing classification rules.'
  id: totrans-2135
  prefs: []
  type: TYPE_NORMAL
  zh: '*决策树*：表示分类规则的树形模型。'
- en: '*Decision-making:* taking action informed by data.'
  id: totrans-2136
  prefs: []
  type: TYPE_NORMAL
  zh: '*决策制定*：根据数据采取行动。'
- en: '*Dimensionality reduction:* simplifying multi-dimensional data.'
  id: totrans-2137
  prefs: []
  type: TYPE_NORMAL
  zh: '*降维*：简化多维数据。'
- en: '*Ethics:* moral principles guiding the development and use of AI.'
  id: totrans-2138
  prefs: []
  type: TYPE_NORMAL
  zh: '*伦理*：指导AI开发和使用的道德原则。'
- en: '*Exploratory data analysis (EDA):* initial investigation of data to detect
    distributions, relationships and patterns.'
  id: totrans-2139
  prefs: []
  type: TYPE_NORMAL
  zh: '*探索性数据分析（EDA）*：对数据进行初步调查，以检测分布、关系和模式。'
- en: '*General intelligence:* human-like adaptability in different contexts and tasks.'
  id: totrans-2140
  prefs: []
  type: TYPE_NORMAL
  zh: '*通用智能*：在不同环境和任务中类似人类的适应性。'
- en: '*Generative AI*: artificial intelligence systems capable of creating original
    content, such as text or images, using machine learning models.'
  id: totrans-2141
  prefs: []
  type: TYPE_NORMAL
  zh: '*生成式AI*：能够使用机器学习模型创建原始内容（如文本或图像）的AI系统。'
- en: '*GPT-1*: first transforming pre-trained generator model, launched by OpenAI
    in 2018.'
  id: totrans-2142
  prefs: []
  type: TYPE_NORMAL
  zh: '*GPT-1*：第一个预训练生成器模型，由OpenAI于2018年推出。'
- en: '*GPT-2:* larger model, released in 2019, with 1.5 billion parameters.'
  id: totrans-2143
  prefs: []
  type: TYPE_NORMAL
  zh: '*GPT-2*：2019年发布的更大模型，具有15亿个参数。'
- en: '*GPT-3:* massive model with 175 billion parameters launched in 2020.'
  id: totrans-2144
  prefs: []
  type: TYPE_NORMAL
  zh: '*GPT-3*：2020年推出的具有1750亿参数的巨大模型。'
- en: '*GPT-3.5:* enhanced version of GPT-3 with updated architecture.'
  id: totrans-2145
  prefs: []
  type: TYPE_NORMAL
  zh: '*GPT-3.5*：GPT-3的增强版本，具有更新的架构。'
- en: '*GPT-4:* latest version of ChatGPT, with over 1 trillion parameters and multimodal
    capabilities.'
  id: totrans-2146
  prefs: []
  type: TYPE_NORMAL
  zh: '*GPT-4*：ChatGPT的最新版本，拥有超过1000亿个参数和多模态功能。'
- en: '*Human supervision:* people reviewing and criticizing AI suggestions.'
  id: totrans-2147
  prefs: []
  type: TYPE_NORMAL
  zh: '*人类监督*：人们审查和批评AI建议。'
- en: '*Human values:* qualities such as compassion, creativity and ethics that define
    humanity.'
  id: totrans-2148
  prefs: []
  type: TYPE_NORMAL
  zh: '*人类价值观*：如同情、创造力和道德等定义人性的品质。'
- en: '*Intelligent assistants*: smart systems, such as ChatGPT, that collaborate
    with humans.'
  id: totrans-2149
  prefs: []
  type: TYPE_NORMAL
  zh: '*智能助手*：如ChatGPT等与人类协作的智能系统。'
- en: '*Interpretability*: the ability of humans to understand AI results.'
  id: totrans-2150
  prefs: []
  type: TYPE_NORMAL
  zh: '*可解释性*：人类理解AI结果的能力。'
- en: '*Large language model (LLM)*: human-like communication, using natural language,
    processed by AI systems to enable conversational understanding and response.'
  id: totrans-2151
  prefs: []
  type: TYPE_NORMAL
  zh: '*大型语言模型（LLM）*：由AI系统处理的人性化沟通，使用自然语言，以实现对话理解和响应。'
- en: '*Logistic regression*: classification algorithm for binary results.'
  id: totrans-2152
  prefs: []
  type: TYPE_NORMAL
  zh: '*逻辑回归*：用于二元结果的分类算法。'
- en: '*Machine learning*: algorithms that automatically learn from data.'
  id: totrans-2153
  prefs: []
  type: TYPE_NORMAL
  zh: '*机器学习*：从数据中自动学习的算法。'
- en: '*Natural language processing (NLP):* understanding and generating human language
    with AI.'
  id: totrans-2154
  prefs: []
  type: TYPE_NORMAL
  zh: '*自然语言处理（NLP）*：使用AI理解和生成人类语言。'
- en: '*Neural networks:* computer systems modeled on biological brains.'
  id: totrans-2155
  prefs: []
  type: TYPE_NORMAL
  zh: '*神经网络*：基于生物大脑的计算机系统。'
- en: '*Noteable:* plugin transforming AI into a virtual note-taking assistant, capable
    of capturing, storing and organizing information during conversations.'
  id: totrans-2156
  prefs: []
  type: TYPE_NORMAL
  zh: '*Noteable*：将AI转换为虚拟笔记助手插件，能够在对话中捕捉、存储和组织信息。'
- en: '*OpenAI:* a renowned artificial intelligence research organization behind major
    developments such as ChatGPT and other generative AI models, aimed at pushing
    the boundaries of understanding and creativity machines.'
  id: totrans-2157
  prefs: []
  type: TYPE_NORMAL
  zh: '*OpenAI*：一个著名的AI研究组织，是ChatGPT和其他生成式AI模型等重大发展的背后力量，旨在推动理解和创造力的机器边界。'
- en: '*Plugins*: additional software components that add new capabilities or functionalities
    to an existing application.'
  id: totrans-2158
  prefs: []
  type: TYPE_NORMAL
  zh: '*插件*：为现有应用程序添加新功能或功能的附加软件组件。'
- en: '*Predictive analytics*: using data to predict future results.'
  id: totrans-2159
  prefs: []
  type: TYPE_NORMAL
  zh: '*预测分析*：使用数据预测未来结果。'
- en: '*Prompt:* instructions (or context) provided to ChatGPT to guide its responses.
    Carefully crafted prompts allow access to ChatGPT’s capabilities.'
  id: totrans-2160
  prefs: []
  type: TYPE_NORMAL
  zh: '*提示*：提供给ChatGPT的指令（或上下文），以引导其响应。精心设计的提示可以访问ChatGPT的能力。'
- en: '*Prompt engineering:* process of creating and selecting questions or instructions
    to guide the responses generated by AI models, in order to obtain relevant and
    useful results.'
  id: totrans-2161
  prefs: []
  type: TYPE_NORMAL
  zh: '*提示工程*：创建和选择问题或指令的过程，以引导AI模型生成的响应，以便获得相关和有用的结果。'
- en: '*Regression*: statistical models quantifying relationships between variables.'
  id: totrans-2162
  prefs: []
  type: TYPE_NORMAL
  zh: '*回归*：量化变量之间关系的统计模型。'
- en: '*Reinforcement learning*: agents that learn through trial-and-error interactions.'
  id: totrans-2163
  prefs: []
  type: TYPE_NORMAL
  zh: '*强化学习*：通过试错交互学习的智能体。'
- en: '*ShowMe*: plugin that enables AI to generate visual representations, such as
    diagrams and graphs, from text descriptions, to facilitate communication and understanding
    of complex concepts.'
  id: totrans-2164
  prefs: []
  type: TYPE_NORMAL
  zh: '*ShowMe*：一个插件，使AI能够从文本描述中生成视觉表示，如图表和图形，以促进复杂概念的表达和理解。'
- en: '*SQL*: structured query language used to manage and query relational databases.
    ChatGPT can understand SQL queries explained conversationally.'
  id: totrans-2165
  prefs: []
  type: TYPE_NORMAL
  zh: '*SQL*：用于管理和查询关系型数据库的结构化查询语言。ChatGPT可以理解以对话方式解释的SQL查询。'
- en: '*Structured data*: information organized in a tabular format with clear relationships
    between elements, facilitating analysis and manipulation via SQL queries or algorithms.'
  id: totrans-2166
  prefs: []
  type: TYPE_NORMAL
  zh: '*结构化数据*：以表格格式组织的信息，元素之间有明确的关系，便于通过SQL查询或算法进行分析和操作。'
- en: '*Supervised learning*: training algorithms on labeled datasets.'
  id: totrans-2167
  prefs: []
  type: TYPE_NORMAL
  zh: '*监督学习*：在标记数据集上训练算法。'
- en: '*Symbiosis*: mutually beneficial collaboration between beings.'
  id: totrans-2168
  prefs: []
  type: TYPE_NORMAL
  zh: '*共生*：生物体之间的互利合作。'
- en: '*Time series*: data indexed chronologically over time.'
  id: totrans-2169
  prefs: []
  type: TYPE_NORMAL
  zh: '*时间序列*：按时间顺序索引的数据。'
- en: '*Transparency:* openness about how AI systems work.'
  id: totrans-2170
  prefs: []
  type: TYPE_NORMAL
  zh: '*透明度*：关于AI系统工作方式的开放性。'
- en: '*Unstructured data:* information with no predefined format, such as text, images
    or audio, requiring special processing for analysis.'
  id: totrans-2171
  prefs: []
  type: TYPE_NORMAL
  zh: '*非结构化数据*：没有预定义格式的信息，如文本、图像或音频，需要特殊处理以进行分析。'
- en: '*Unsupervised learning:* finding patterns in unlabeled datasets.'
  id: totrans-2172
  prefs: []
  type: TYPE_NORMAL
  zh: '*无监督学习*：在未标记数据集中寻找模式。'
- en: '*Wolfram:* a powerful knowledge base providing access to advanced answers,
    calculations and visualizations related to various academic and scientific fields.'
  id: totrans-2173
  prefs: []
  type: TYPE_NORMAL
  zh: '*Wolfram*：一个强大的知识库，提供访问各种学术和科学领域的高级答案、计算和可视化。'
- en: '*Zapier*: automation platform connecting applications to facilitate data flow
    and automated action execution.'
  id: totrans-2174
  prefs: []
  type: TYPE_NORMAL
  zh: '*Zapier*：连接应用程序以促进数据流和自动执行操作自动化平台。'
