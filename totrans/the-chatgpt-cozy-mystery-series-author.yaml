- en: '![](image_rsrc44J.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 'Full Name:'
  prefs: []
  type: TYPE_NORMAL
- en: Frances Eleanor Wentworth
  prefs: []
  type: TYPE_NORMAL
- en: 'Physical Description:'
  prefs: []
  type: TYPE_NORMAL
- en: Frances stands at a modest 5'2", with a frame that's more sturdy than frail,
    suggesting years of active living. Her hair is a soft white, often tied back with
    a fabric ribbon that matches her current quilting project. Her eyes are a sharp
    blue, twinkling with kindness and curiosity, and her hands are nimble yet show
    the signs of her age and love for crafting. She dresses comfortably in layered
    clothing, adorned with handmade quilting patches, each telling a story of her
    past adventures and mysteries she's helped unravel.
  prefs: []
  type: TYPE_NORMAL
- en: 'Background:'
  prefs: []
  type: TYPE_NORMAL
- en: Frances was born into a family with a deep appreciation for the arts and crafts,
    with quilting being a tradition passed down through generations. She honed her
    craft under the guidance of her mother and grandmother, unknowingly developing
    her unique telepathic ability as she did. After a fulfilling career as a home
    economics teacher, she retired to the quaint town of Willow Creek, where she opened
    a small quilting shop named "The Patchwork Mind." Her shop became a hub for the
    local community, a place where secrets are both hidden and uncovered.
  prefs: []
  type: TYPE_NORMAL
- en: 'Current Crisis:'
  prefs: []
  type: TYPE_NORMAL
- en: Frances's tranquil retirement is disrupted when a mysterious fabric piece is
    left at her doorstep, carrying the distressing thoughts of someone in grave danger.
    This piece of fabric becomes the catalyst for her involvement in a new mystery,
    compelling her to use her abilities to save someone she may not even know. Meanwhile,
    her shop faces the threat of closure due to a new, modern craft store opening
    in town, challenging her to find a way to preserve her legacy and the town's history.
  prefs: []
  type: TYPE_NORMAL
- en: 'Personality:'
  prefs: []
  type: TYPE_NORMAL
- en: Frances is the epitome of warmth, exuding a grandmotherly affection that draws
    people to her. She's patient, with a keen listening ear, making her a confidante
    to many. However, beneath her gentle exterior lies a sharp intellect and a fierce
    determination. Frances is not one to shy away from challenges; instead, she approaches
    them with pragmatic optimism. Her wit is subtle but present, often surprising
    those who underestimate her based on her age.
  prefs: []
  type: TYPE_NORMAL
- en: 'Murder Connection:'
  prefs: []
  type: TYPE_NORMAL
- en: The mysterious fabric piece is linked to the disappearance of a local, beloved
    community member, whose last known location was near Frances's shop. As Frances
    delves deeper into her telepathic insights, she uncovers a web of secrets that
    connects this disappearance to a series of unsolved cases in Willow Creek. Her
    unique talent becomes crucial in piecing together the puzzle, drawing her into
    the heart of the investigation alongside the town's detective, who is initially
    skeptical of her abilities.
  prefs: []
  type: TYPE_NORMAL
- en: 'Ideas for Subplots with This Character:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Quilting Class Mysteries: Frances hosts a quilting class where each session
    unintentionally reveals a clue or a motive related to the case, weaving the participants
    into the fabric of the investigation.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'The Fabric of Time: Frances embarks on a personal quest to create a "memory
    quilt" for Willow Creek''s bicentennial celebration, leading her to uncover historical
    secrets that mirror the present-day mystery, suggesting a cyclical pattern of
    events.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'The Telepathic Network: Frances discovers there are others with similar telepathic
    abilities, connected through different crafts and hobbies. This network becomes
    instrumental in solving the mystery but also introduces new challenges as they
    navigate their shared and conflicting insights.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'The Patchwork Mind Showdown: The modern craft store''s owner is revealed to
    have a vendetta against Frances, tied to a decades-old mystery. This subplot explores
    themes of forgiveness, rivalry, and the preservation of tradition in the face
    of modernization.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'A Stitch in Time Saves Nine: Frances''s ability begins to take a toll on her,
    leading to a subplot where she must find a balance between helping others and
    preserving her own well-being. This journey introduces a character who could be
    a potential apprentice, hinting at the passing of the torch.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Frances Eleanor Wentworth's character brings a unique blend of mystery, warmth,
    and wisdom to the cozy murder mystery genre, making her an unforgettable and beloved
    figure in the series.
  prefs: []
  type: TYPE_NORMAL
- en: This is a really interesting profile.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s Play the “What-if” Game for Frances Wentworth
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: What if? Frances married the son of a wealthy business family that still runs
    the town? Her husband is alive and well and is planning to retire as a lawyer.
    This provides conflict, amusing banter, and scope for more plots.
  prefs: []
  type: TYPE_NORMAL
- en: What if? Frances exhibits her work, takes commissions from families, and donates
    work to charity auctions.
  prefs: []
  type: TYPE_NORMAL
- en: What if? Frances has known Laura’s aunt, Sera, since junior school. Sera is
    someone that Frances can talk to about her telepathic abilities, and they are
    pretty close.
  prefs: []
  type: TYPE_NORMAL
