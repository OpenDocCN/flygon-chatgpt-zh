  - PREF_UL
  type: TYPE_NORMAL
  zh: “提供ChatGPT可以处理的任务示例，以帮助公司节省运营成本。”
- en: Analytical and Decision-Making Prompts
  id: totrans-781
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 分析和决策提示
- en: 'Comparative Analysis:'
  id: totrans-782
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 比较分析：
- en: '"Compare and contrast the strengths and weaknesses of [two competing technologies],
    and recommend the better choice for a startup."'
  id: totrans-783
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '"比较和对比[两种竞争技术]的优缺点，并为初创公司推荐更好的选择。"'
- en: 'Scenario Analysis:'
  id: totrans-784
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 情景分析：
- en: '"Analyze the risks and benefits of launching a [specific product] in [specific
    market]. Provide a risk mitigation plan."'
  id: totrans-785
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '"分析在[特定市场]推出[特定产品]的风险和收益。提供风险缓解计划。"'
- en: 'Multi-Factor Decision Making:'
  id: totrans-786
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 多因素决策：
- en: '"List the pros and cons of expanding a business into [region]. Include legal,
