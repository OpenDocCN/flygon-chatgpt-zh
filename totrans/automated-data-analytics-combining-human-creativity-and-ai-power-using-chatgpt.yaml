- en: Preface
  id: totrans-419
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 前言
- en: Comparing the capacity of computers to the capacity of the human brain, I’ve
    often wondered, where does our success come from? The answer is synthesis, the
    ability to combine creativity and calculation… into a whole that is much greater
    than the sum of its parts.
  id: totrans-420
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 将计算机的容量与人类大脑的容量进行比较，我常常 wonder，我们的成功从何而来？答案是综合，即结合创造力和计算…的能力，使其整体远大于其各部分之和。
- en: ''
  id: totrans-421
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*How Life Imitates Chess,* Garry Kasparov (2007)'
  id: totrans-422
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*《生命模仿棋局》，加里·卡斯帕罗夫（2007年）*'
- en: Data analytics is a crucial process in today’s data-driven world. It involves
    collecting, cleaning, transforming and analyzing data to uncover useful information,
    insights, trends and patterns which inform business strategy, decision-making
    and process optimization. Traditionally, data analytics was a manual process requiring
    data scientists and analysts to prepare and process data before analyzing them.
    This was both tedious and time-consuming. The advent of machine learning and artificial
    intelligence (AI) has transformed data analytics by automating some parts of the
    process.
  id: totrans-423
  prefs: []
  type: TYPE_NORMAL
  zh: 数据分析是当今数据驱动世界中一个至关重要的过程。它涉及收集、清理、转换和分析数据，以揭示有用的信息、见解、趋势和模式，这些信息、见解、趋势和模式可以指导商业战略、决策和流程优化。传统上，数据分析是一个手动过程，需要数据科学家和分析师在分析之前准备和处理数据。这既繁琐又耗时。机器学习和人工智能（AI）的出现通过自动化过程的一些部分而改变了数据分析。
- en: Generative AI models, like ChatGPT, are at the forefront of this automation
    revolution in data analytics. These large language models can understand human
    prompts and generate coherent and human-like textual responses. They are trained
    with massive text datasets, enabling them to perform a variety of language-based
    tasks. Generative models, such as ChatGPT, can be fine-tuned for specific applications,
    including data analytics.
  id: totrans-424
  prefs: []
  type: TYPE_NORMAL
  zh: 生成式AI模型，如ChatGPT，处于数据分析自动化革命的前沿。这些大型语言模型可以理解人类的提示并生成连贯且类似人类的文本响应。它们使用大量的文本数据集进行训练，使它们能够执行各种基于语言的任务。生成模型，如ChatGPT，可以针对特定应用进行微调，包括数据分析。
- en: We can consider these generative AI models as children with unlimited potential.
    The data scientist’s role is to nurture these models, train them and help them
    grow – just as parents do with their children. In the beginning, these models
    are like children – they have immense capabilities, but need guidance to realize
    their potential.
  id: totrans-425
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以将这些生成式AI模型视为拥有无限潜力的孩子。数据科学家的角色是培养这些模型，训练它们并帮助它们成长——就像父母对待他们的孩子一样。起初，这些模型就像孩子一样——它们拥有巨大的能力，但需要指导才能实现它们的潜力。
- en: The data scientist trains them step-by-step, teaching them the different tasks,
    operations and functionalities required for data analytics. This includes data
    preprocessing, cleaning, feature engineering, modeling, evaluation and explanation.
    Models are trained thoroughly, across diverse datasets, learning the nuances of
    each analytical task.
  id: totrans-426
  prefs: []
  type: TYPE_NORMAL
  zh: 数据科学家逐步训练它们，教它们进行数据分析所需的不同任务、操作和功能。这包括数据预处理、清洗、特征工程、建模、评估和解释。模型在多样化的数据集上进行了彻底的训练，学习每个分析任务的细微差别。
- en: 'Gradually, just as a toddler learns to walk, talk and eat solid foods, generative
    models become capable with regard to various data analytics workflows. With each
    iteration, their skills improve: they learn to handle diverse datasets, manage
    missing values, transform features, select optimal models, critically assess performance
    and generate data-driven insights.'
  id: totrans-427
  prefs: []
  type: TYPE_NORMAL
  zh: 就像幼儿学会走路、说话和吃固体食物一样，生成模型在数据分析的各种工作流程中逐渐变得能够胜任。随着每一次迭代，它们的技能都在提高：它们学会处理多样化的数据集，管理缺失值，转换特征，选择最佳模型，批判性地评估性能并生成数据驱动的见解。
- en: After extensive training on a wide range of datasets and analytical tasks, these
    generative models evolve from toddlers into mature analytical assistants. They
    move from simple memorization of problem-solving techniques to the development
    of true conceptual understanding. The models understand why particular data transformations,
    models and evaluations are appropriate for given scenarios.
  id: totrans-428
  prefs: []
  type: TYPE_NORMAL
  zh: 在广泛的数据集和分析任务上进行大量训练后，这些生成模型从幼儿成长为成熟的分析助手。它们从简单记忆解决问题的技巧发展到真正的概念理解。模型理解为什么特定的数据转换、模型和评估适用于特定场景。
- en: In a way, they develop inductive reasoning and deductive logic, just like humans.
    They understand the principles and evidence-based principles that underlie data
    analytics workflows, rather than simply memorizing mechanical instructions. This
    conceptual understanding is what distinguishes generative AI from prior rule-based
    expert systems.
  id: totrans-429
  prefs: []
  type: TYPE_NORMAL
  zh: 在某种程度上，它们发展了归纳推理和演绎逻辑，就像人类一样。它们理解数据分析工作流程背后的原则和基于证据的原则，而不仅仅是简单地记忆机械指令。这种概念理解是区分生成式AI与先前的基于规则的专家系统的主要因素。
- en: Thus, when a data scientist prompts a mature, well-trained model like ChatGPT
    to perform analysis, it deeply understands the request, rather than simply matching
    keywords. It draws on its conceptual knowledge to analyze the dataset, select
    optimal techniques, generate insights and explain the reasoning behind them. And
    it does so at superhuman speeds, leveraging the computing power of AI.
  id: totrans-430
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，当数据科学家提示成熟的、训练有素的模型如ChatGPT进行分析时，它深刻理解请求，而不仅仅是匹配关键词。它利用其概念知识分析数据集，选择最佳技术，生成见解并解释其背后的推理。而且它以超人的速度完成这些，利用AI的计算能力。
- en: But does that make these generative models smarter than humans? The answer is
    no. At least not yet. Although they can outperform humans on narrow tasks within
    their training domain, these AI models lack generalized intelligence. Human cognition
    crucially remains far more advanced.
  id: totrans-431
  prefs: []
  type: TYPE_NORMAL
  zh: 但这使这些生成模型比人类更聪明吗？答案是否定的。至少目前还不是。尽管它们可以在训练域内的狭窄任务上超越人类，但这些AI模型缺乏通用智能。人类的认知在关键方面仍然更为先进。
- en: Unlike generative models, humans possess common sense, intuition, imagination,
    social intelligence, sensitivity and generalized reasoning capacities. We can
    creatively solve new and open problems that intersect several domains. Humans
    also have better judgment, wisdom and morality, which temper our technical capabilities
    with ethics and responsibility.
  id: totrans-432
  prefs: []
  type: TYPE_NORMAL
  zh: 与生成模型不同，人类拥有常识、直觉、想象力、社交智能、敏感性和广义推理能力。我们可以创造性地解决多个领域交叉的新问题和开放性问题。人类还有更好的判断力、智慧和道德，这些使我们的技术能力与伦理和责任相结合。
- en: So, while ChatGPT can analyze datasets and quickly generate information, it
    lacks the general critical thinking skills to deeply understand implications and
    assess ethics. Its intelligence is circumscribed by its training data and purpose.
    It cannot reason its way through completely new scenarios, as humans can through
    transfer learning.
  id: totrans-433
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，尽管ChatGPT可以分析数据集并快速生成信息，但它缺乏深入理解含义和评估伦理的通用批判性思维技能。它的智能被其训练数据和目的所限制。它无法像人类通过迁移学习那样，通过推理完全新的场景。
- en: That said, narrow AI models offer complementary advantages to human intelligence.
    Their prodigious memory and computational speed enable exhaustive data analytics.
    Their lack of bias and fatigue ensure consistent performance. In this way, they
    endow humans with superhuman data processing capabilities.
  id: totrans-434
  prefs: []
  type: TYPE_NORMAL
  zh: 话虽如此，窄AI模型为人类智能提供了补充优势。它们惊人的记忆和计算速度使得数据分析详尽无遗。它们缺乏偏见和疲劳，确保了性能的一致性。这样，它们赋予了人类超越常人的数据处理能力。
- en: Rather than competing with AI, we can collaborate with it – combining human
    wisdom and ethics with AI’s productivity and precision. Together, we evolve data
    analytics and make it more insightful and responsible. But humans must remain
    in the loop to provide guidance, assess implications and ensure alignment with
    ethics.
  id: totrans-435
  prefs: []
  type: TYPE_NORMAL
  zh: 我们不必与AI竞争，我们可以与之合作——结合人类的智慧和伦理与AI的生产力和精确性。共同进化数据分析，使其更具洞察力和责任感。但人类必须保持参与，以提供指导、评估影响并确保与伦理的一致性。
- en: An ideal symbiosis is one where humans manage creative and strategic tasks requiring
    reason, ethics and imagination, while AI accelerates repetitive analytical tasks
    requiring memory, computation and precision. Similar to Iron Man deploying the
    AI assistant JARVIS to enhance his human capabilities.
  id: totrans-436
  prefs: []
  type: TYPE_NORMAL
  zh: 理想的共生关系是人类管理需要推理、伦理和想象力的创造性和战略任务，而AI则加速需要记忆、计算和精确性的重复性分析任务。类似于钢铁侠部署AI助手JARVIS来增强他的人类能力。
- en: So, while the gap between human intelligence and AI persists, narrow AI models
    like ChatGPT are still in their infancy. Their capabilities will continue to grow
    exponentially thanks to increased data size, computing power and algorithmic advances.
    One day, they may even cross the threshold into artificial general intelligence
    (AGI).
  id: totrans-437
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，尽管人类智能与AI之间的差距仍然存在，但像ChatGPT这样的窄AI模型仍处于起步阶段。它们的性能将继续以指数级增长，得益于数据规模、计算能力和算法的进步。总有一天，它们甚至可能跨越进入人工通用智能（AGI）的门槛。
- en: But for the time being, generative AI enhances rather than replaces humans when
    it comes to data analytics process. It takes care of the tedious parts, allowing
    data scientists to focus on creative, high-added-value tasks. It is becoming an
    indispensable analytical assistant that continues to learn – like a child who
    grows into an adult over the years with careful attention.
  id: totrans-438
  prefs: []
  type: TYPE_NORMAL
  zh: 但目前，在数据分析过程中，生成AI增强人类而非取代人类。它处理了繁琐的部分，使数据科学家能够专注于创造性和高附加值的工作。它正成为不可或缺的分析助手，并持续学习——就像一个孩子在多年的细心关注下成长为成年人。
- en: The key is for humans to guide the development of these generative models in
    a thoughtful and ethical way. We need to focus on beneficial objectives and monitor
    for harmful biases or abuse. With judicious care and training, AI can usher in
    an era of augmented analytics – where human and machine intelligences meet and
    converge for more powerful, yet ethical, data insights. But the human must remain
    the supervising parent for the AI child.
  id: totrans-439
  prefs: []
  type: TYPE_NORMAL
  zh: 关键是人类要以深思熟虑和道德的方式引导这些生成模型的发展。我们需要关注有益的目标，并监控有害的偏见或滥用。通过审慎的关怀和训练，AI可以引领增强分析时代——在那里人类和机器智能相遇并汇聚，以获得更强大、更道德的数据洞察。但人类必须是AI孩子的监督性家长。
- en: 'Rather than wondering when AI will surpass human intelligence, we should focus
    on how to cultivate beneficial and ethical AI applications today. Generative models
    like ChatGPT are impressionable children that will shape the future based on the
    guidance they receive. Data scientists have a profound opportunity and responsibility:
    to educate these AI “children”, so that they become responsible and collaborative
    allies instead of impenetrable adversaries.'
  id: totrans-440
  prefs: []
  type: TYPE_NORMAL
  zh: 我们不应该猜测AI何时会超越人类智能，而应该关注如何培养今天有益和道德的AI应用。像ChatGPT这样的生成模型是易受影响的儿童，他们将根据所接受的指导塑造未来。数据科学家有一个深刻的机会和责任：教育这些AI“儿童”，使他们成为负责任和协作的盟友，而不是不可穿透的对手。
- en: Just as teaching helps humans to consolidate our own knowledge, the training
    of AI models requires us to thoroughly evaluate our hypotheses, biases and best
    practices. AI development is as much about advancing our own intelligence – codifying
    disciplines into coherent frameworks, evidence-based principles and methodologies.
  id: totrans-441
  prefs: []
  type: TYPE_NORMAL
  zh: 正如教学有助于人类巩固自己的知识一样，AI模型的训练需要我们彻底评估我们的假设、偏见和最佳实践。AI的发展同样关乎提升我们的智能——将学科编码成连贯的框架、基于证据的原则和方法。
- en: Collective training of generative models advances human knowledge across domains.
    This requires distilling nebulous issues into structured frameworks; formalizing
    messy tasks into step-by-step workflows; and crystallizing weakly defined domains
    into rigorous first principles. Teaching AI models through examples helps us to
    better evaluate solutions, generalize insights and formalize ethics for humans
    as well.
  id: totrans-442
  prefs: []
  type: TYPE_NORMAL
  zh: 生成模型的集体训练推动了人类知识在各个领域的进步。这需要将模糊的问题提炼成结构化的框架；将杂乱的任务形式化为逐步的工作流程；将定义不明确的领域结晶为严格的第一原理。通过示例教授AI模型有助于我们更好地评估解决方案，概括洞察力，并为人类正式化伦理。
- en: The future of data analytics is humans and AI working together – combining the
    human’s imaginative definition of problems, ethics and strategic judgment with
    AI’s vast memory, exhaustive computation and high-velocity analytical workflows.
    Neither can match the synergistic value of the two intelligences combined. Data
    science augments both human and artificial intelligence.
  id: totrans-443
  prefs: []
  type: TYPE_NORMAL
  zh: 数据分析的未来是人类与AI的协作——结合人类对问题的想象性定义、伦理和战略判断，以及AI的巨大记忆、详尽的计算和高速度的分析工作流程。两者都无法与两种智能结合的协同价值相匹配。数据科学增强了人类和人工智能。
- en: 'The time has come to actively train this child prodigy: ChatGPT! It holds enormous
    potential to enhance human capabilities if nurtured properly. We need to nurture
    it carefully – teaching analytical skills while emphasizing ethics, exposing ChatGPT
    to a variety of data and scenarios under supervision, so that it moves from mechanical
    regurgitation to contextual comprehension.'
  id: totrans-444
  prefs: []
  type: TYPE_NORMAL
  zh: 到了积极培养这位神童：ChatGPT！如果得到适当的培养，它具有极大的潜力来提升人类的能力。我们需要细心地培养它——在强调伦理的同时教授分析技能，在监督下让ChatGPT接触各种数据和场景，使其从机械的重复到情境理解。
- en: So, let us therefore guide these generative models with wisdom and kindness.
    Let us instill analytical techniques with values and ethics, guiding them from
    innocence to maturity. And let us develop artificial intelligence that makes individuals
    responsible instead of replacing them. Models such as ChatGPT are still in their
    maturing stages. With the careful supervision of researchers concerned with data
    ethics, they could evolve into assistants, opening up new horizons of ethically
    guided discovery, and collaborating more fruitfully with human than they could
    achieve on their own.
  id: totrans-445
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，让我们用智慧和仁慈来引导这些生成模型。让我们将分析技术与价值观和伦理相结合，引导它们从天真走向成熟。让我们开发出使个人负责任而不是取代他们的人工智能。像ChatGPT这样的模型仍处于成长阶段。在关注数据伦理的研究人员的谨慎监督下，它们可以发展成为助手，开辟新的道德指导发现领域，并与人类更有效地合作，而不是它们自己所能达到的程度。
- en: Just as Garry Kasparov’s quote states, human success arises from our ability
    to synthesize the creative and intuitive aspects of cognition with the computational
    and analytical aspects. When we combine these complementary modes of thinking
    and reasoning, the result is an emergent intelligence that simply exceeds the
    linear sum of creativity and calculation. There are synergies and amplifying effects
    that result from the fusion of different thinking styles, which makes us unique
    as human beings.
  id: totrans-446
  prefs: []
  type: TYPE_NORMAL
  zh: 正如加里·卡斯帕罗夫的名言所说，人类成功源于我们综合认知的创造性和直觉性方面与计算和分析性方面的能力。当我们结合这些互补的思维和推理模式时，结果是一种涌现的智能，它简单地超越了创造力和计算的线性总和。不同思维风格的融合产生了协同效应和放大效应，这使得我们作为人类独一无二。
- en: Synthesis creates something with expanded potential and capabilities beyond
    what creativity or calculation could achieve individually. It is this integration
    that allows us to shine. This is what Kasparov believes the human brain excels
    at, compared to computers.
  id: totrans-447
  prefs: []
  type: TYPE_NORMAL
  zh: 综合创造出的东西具有比单独的创造力和计算更大的潜力和能力。正是这种整合使我们能够发光。这正是卡斯帕罗夫认为人类大脑相对于计算机所擅长的。
- en: Kasparov’s quote eloquently captures the spirit of the collaboration between
    humans and AI that we advocate for in this book – combining complementary strengths
    for amplified potential. Just as the synthesis of creativity and computation expands
    human cognition, the integration of human ingenuity with the analytical power
    of AI opens up new frontiers in data science.
  id: totrans-448
  prefs: []
  type: TYPE_NORMAL
  zh: 卡斯帕罗夫的名言巧妙地捕捉了我们在这本书中倡导的人与AI合作的精髓——结合互补的优势以放大潜力。正如创造力和计算的融合扩展了人类认知一样，人类独创性与AI分析能力的结合开辟了数据科学的新领域。
- en: When we design responsible workflows that harness both modes of intelligence,
    the results can far exceed their individual contributions. A capacity emerges
    from the thoughtful combination of human ethics and supervision with artificial
    productivity and rigor. This book provides frameworks for harnessing these synergies
    to advance data analytics. The future holds exciting possibilities as we forge
    partnerships between hearts and minds.
  id: totrans-449
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们设计负责任的流程，利用这两种智能模式时，结果可以远远超出它们各自贡献的总和。从人类伦理和监督与人工生产力和严谨性的深思熟虑的结合中产生了一种能力。本书提供了利用这些协同效应来推进数据分析的框架。随着我们建立心灵与心灵的伙伴关系，未来充满了令人兴奋的可能性。
- en: July 2024
  id: totrans-450
  prefs: []
  type: TYPE_NORMAL
  zh: 2024年7月
- en: Introduction
  id: totrans-451
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 引言
- en: 'Imagine this: a seamless and interactive experience where you communicate effortlessly
    with your data, unravel their mysteries and uncover hidden insights through an
    engaging conversation. This vision can become a reality thanks to recent advances
    in artificial intelligence (AI) in data analytics.'
  id: totrans-452
  prefs: []
  type: TYPE_NORMAL
  zh: 想象一下：一个无缝且互动的体验，在那里你可以轻松地与你的数据交流，揭开它们的奥秘，通过引人入胜的对话发现隐藏的洞察。这一愿景得益于人工智能（AI）在数据分析领域的最新进展。
- en: The data-driven world is increasingly turning to AI to speed up and improve
    analysis. More specifically generative AI models, such as ChatGPT, are automating
    the process of interacting with data to discover insights. These generative models
    have immense potential as analytical assistants if developed responsibly under
    human guidance.
  id: totrans-453
  prefs: []
  type: TYPE_NORMAL
  zh: 数据驱动的世界正越来越多地转向AI来加速和改进分析。更具体地说，像ChatGPT这样的生成式AI模型正在自动化与数据交互的过程以发现洞察。如果在这些模型在人类的指导下负责任地开发，它们作为分析助手具有巨大的潜力。
- en: Just like a curious child who continually asks questions, generative AI enables
    fluid and intuitive exploration of datasets without the constraints of predefined
    queries or static reports. Users can engage in an ad hoc and open-ended dialogue,
    where the path is guided by emerging insights rather than being limited to pre-planned
    paths.
  id: totrans-454
  prefs: []
  type: TYPE_NORMAL
  zh: 就像一个不断提问的好奇孩子一样，生成式AI使得在不受预定义查询或静态报告限制的情况下流畅且直观地探索数据集成为可能。用户可以参与即兴和开放式对话，路径由新兴的见解引导，而不是局限于预计划的路径。
- en: This creative symbiosis between humans and machine remarkably amplifies the
    analytical process. Domain experts provide strategic thinking, intuition, monitoring
    and ethical judgment. Meanwhile, intelligent AI agents handle the difficult computational
    tasks – rapid analysis of plain-language questions, analyzing huge datasets and
    generating interactive responses in natural language.
  id: totrans-455
  prefs: []
  type: TYPE_NORMAL
  zh: 人与机器之间的这种创造性共生关系显著增强了分析过程。领域专家提供战略思维、直觉、监控和道德判断。同时，智能AI代理处理困难的计算任务——快速分析自然语言问题、分析大量数据集并在自然语言中生成交互式响应。
- en: For example, prompted by a human analyst to evaluate sales patterns, ChatGPT
    could respond with high-level trends, correlations and high-level hypotheses it
    has identified by rapidly analyzing sales data. The analyst can then interpret
    these insights critically, ask follow-up questions to validate hypotheses and
    direct the AI to explore new perspectives.
  id: totrans-456
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，由人类分析师提示评估销售模式时，ChatGPT可以通过快速分析销售数据，回应高级趋势、相关性以及它已识别出的高级假设。分析师随后可以批判性地解释这些洞察力，提出后续问题以验证假设，并指导AI探索新的视角。
- en: This collaborative analysis is far more exploratory and multidimensional than
    static queries or predefined reports. It combines the framing and monitoring of
    human imagination with the exhaustive computational power of AI for an exhaustive
    and open exploration. Insights emerge more organically, guiding data analysts
    towards unexpected paths and serendipitous discoveries.
  id: totrans-457
  prefs: []
  type: TYPE_NORMAL
  zh: 这种协作分析比静态查询或预定义报告更加探索性和多维。它结合了人类想象的框架和监控，以及AI的强大计算能力，进行彻底和开放的探索。洞察力更自然地出现，引导数据分析师走向意想不到的路径和意外的发现。
- en: Generative AI augments the human analyst by automatically aggregating, processing
    and visualizing volumes of data exponentially faster than manual analysis. But
    it is human creativity that sparks new threads of inquiry, asks “why” and “how”,
    and connects analytical dots to extract meaning and implications.
  id: totrans-458
  prefs: []
  type: TYPE_NORMAL
  zh: 生成式AI通过自动汇总、处理和可视化数据，比手动分析快得多，从而增强了人类分析师的能力。但正是人类的创造力激发了新的探究线索，提出“为什么”和“如何”的问题，并将分析点连接起来，以提取意义和影响。
- en: The AI assistant finds signals buried in the massive noise. The human provides
    the contextual framework for interpreting signals into meaningful information.
    Together, they can unravel complex phenomena by intimately engaging with the raw
    data through a natural conversational flow.
  id: totrans-459
  prefs: []
  type: TYPE_NORMAL
  zh: AI助手在巨大的噪声中找到隐藏的信号。人类提供了解释信号的上下文框架，将其转化为有意义的信息。共同地，他们可以通过自然对话流程与原始数据进行亲密互动，从而解开复杂现象。
- en: This fluid and unconstrained approach enables data scientists to seamlessly
    traverse granular detail and broad trends as required. They can quickly zoom in
    on micro-level data points if something appears anomalous, then zoom back out
    to visualize macro-trends – spotting unusual events within wider contexts.
  id: totrans-460
  prefs: []
  type: TYPE_NORMAL
  zh: 这种流畅且不受约束的方法使得数据科学家能够无缝地根据需要遍历细粒度细节和广泛趋势。如果出现异常情况，他们可以快速聚焦于微观层面的数据点，然后放大视角以可视化宏观趋势——在更广泛的背景下发现异常事件。
- en: A key advantage is that generative AI allows humans to guide the analysis intuitively
    using natural language, without the constraints of structured queries or predefined
    analyses. No need to know programming languages or database schema. Users can
    engage in conversation as the process evolves.
  id: totrans-461
  prefs: []
  type: TYPE_NORMAL
  zh: 一个关键优势是，生成式AI允许人类使用自然语言直观地引导分析，无需受结构化查询或预定义分析的约束。无需了解编程语言或数据库模式。用户可以在过程演变中参与对话。
- en: This makes data exploration more accessible to a wider audience beyond just
    data scientists. Business leaders, frontline staff and others can participate,
    encouraging diverse analytical perspectives. The AI assistant becomes the great
    equalizer, enabling more stakeholders to unlock insights from data via a natural
    conversation.
  id: totrans-462
  prefs: []
  type: TYPE_NORMAL
  zh: 这使得数据探索对更广泛的受众更加容易接近，而不仅仅是数据科学家。业务领导者、一线员工和其他人可以参与其中，鼓励多样化的分析视角。AI助手成为伟大的平等者，使更多利益相关者能够通过自然对话解锁数据中的洞察力。
- en: Of course, like any child learning a skill, an AI assistant requires extensive
    training under human supervision to become proficient. It must ingest a myriad
    of datasets and scenarios to move from the mechanical analysis of queries to a
    true understanding of the principles and trade-offs involved when interacting
    with data.
  id: totrans-463
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，就像任何学习技能的孩子一样，AI助手需要在人类监督下进行大量训练才能变得熟练。它必须摄入大量的数据集和场景，从查询的机械分析过渡到对数据交互中涉及的原则和权衡的真正理解。
- en: Data scientists must teach these conversational models the nuances of analytical
    workflows – how to manage ambiguity, validate hypotheses, identify limitations,
    avoid bias, present information responsibly, etc. Ethics and responsibility must
    be emphasized, as models progress from innocence to maturity.
  id: totrans-464
  prefs: []
  type: TYPE_NORMAL
  zh: 数据科学家必须教授这些对话模型分析工作流程的细微差别——如何管理模糊性、验证假设、识别局限性、避免偏见、负责任地呈现信息等。随着模型从天真发展到成熟，必须强调伦理和责任。
- en: But once properly developed, generative AI assistants, like ChatGPT, can automate
    the laborious aspects of data analytics, while humans focus on high-level creative
    supervision. This enables exponential scaling of data exploration while maintaining
    a human-led direction. With sufficient guardrails, AI can even suggest new analytical
    paths for humans to evaluate.
  id: totrans-465
  prefs: []
  type: TYPE_NORMAL
  zh: 但一旦得到适当开发，生成式AI助手，如ChatGPT，可以自动化数据分析的繁重部分，而人类则专注于高级创意监督。这使数据探索的指数级扩展成为可能，同时保持以人为导向的方向。在足够的约束下，AI甚至可以为人类提供新的分析路径以供评估。
- en: Of course, generative AI has its limitations. Unlike humans, these models lack
    any real semantic understanding, beyond pattern recognition in training data.
    They also lack human judgment, intuition and ethics. Unconstrained automation
    could lead to misleading insights or generalized bias.
  id: totrans-466
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，生成式AI有其局限性。与人类不同，这些模型在训练数据中的模式识别之外，缺乏任何真正的语义理解。它们也缺乏人类的判断力、直觉和伦理。不受约束的自动化可能导致误导性的洞察或普遍的偏见。
- en: As a result, human guidance is crucial when deploying generative AI. Data scientists
    must assess the ethics, assumptions and blind spots behind any insights generated
    by AI. Generative conversational models are still, ultimately, narrow AIs, contrary
    to generalized human cognition. They excel only in their trained domain.
  id: totrans-467
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，在部署生成式AI时，人类指导至关重要。数据科学家必须评估AI产生的任何洞察背后的伦理、假设和盲点。生成式对话模型在本质上仍然是狭隘的AI，与普遍的人类认知相反。它们仅在训练领域表现出色。
- en: The ideal symbiosis is rapidly prompted, human-supervised, generative AI mechanical
    analysis. But humans provide the global framing, subjective judgment and moral
    responsibility for interpreting, validating and acting on ideas, both critically
    and ethically.
  id: totrans-468
  prefs: []
  type: TYPE_NORMAL
  zh: 理想共生体是迅速启动的、人类监督的生成式AI机械分析。但人类提供全局框架、主观判断和道德责任，以批判性和伦理地解释、验证和采取行动，对想法进行评估。
- en: Neither humans nor machines alone can match the amplified intelligence of their
    collaboration. Together, they can mine both granular detail and big-picture meaning
    to uncover hidden insights in massive and complex data. AI expands the scope of
    analysis exponentially, while human creativity and ethics anchor it responsibly.
  id: totrans-469
  prefs: []
  type: TYPE_NORMAL
  zh: 单独的人类或机器都无法与它们合作的放大智能相匹配。共同合作，它们可以挖掘细节和整体意义，在大量复杂的数据中揭示隐藏的洞察。AI将分析范围指数级扩大，而人类的创造力和伦理则负责地锚定它。
- en: Generative AI promises to take data exploration to new frontiers by enabling
    a natural, fluid form of interactive analysis. But careful design and monitoring
    are essential if such automation is to be developed ethically and responsibly.
    When combined with human creativity and ethics, generative AI can open up new
    horizons of amplified analytical intelligence and accelerated discovery.
  id: totrans-470
  prefs: []
  type: TYPE_NORMAL
  zh: 生成式AI通过实现一种自然流畅的交互分析形式，有望将数据探索带入新的前沿。但若要使这种自动化得到道德和负责任的发展，精心设计和监控是必不可少的。当与人类的创造力和伦理相结合时，生成式AI可以开辟新的分析智能放大和加速发现的领域。
- en: As data grows exponentially, AI will become an indispensable partner to augment
    human analysts. These models are still maturing children. Under the tutelage of
    responsible data scientists, they could become trusted analytical allies operating
    under the compass of human values to extract the maximum value from data for the
    benefit of society.
  id: totrans-471
  prefs: []
  type: TYPE_NORMAL
  zh: 随着数据的指数级增长，AI将成为增强人类分析师不可或缺的伙伴。这些模型仍然是成长中的孩子。在负责任的数据科学家指导下，它们可以成为值得信赖的分析盟友，在人类价值观的指南下运作，以从数据中提取最大价值，造福社会。
- en: Why this book?
  id: totrans-472
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 为什么这本书？
- en: The emergence of AI has given rise to visions of a future where analytical tasks
    are fully automated by intelligent algorithms far exceeding human capabilities.
    This narrative evokes both excitement at the possibilities and apprehension at
    the implications of handing over decision-making power to AI systems devoid of
    human values. It imagines a world where generative models like ChatGPT rapidly
    displace humans’ footing in data science.
  id: totrans-473
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能的出现引发了对未来的展望，即分析任务将完全由超越人类能力的智能算法自动化。这种叙述既激发了人们对可能性的兴奋，也引起了人们对将决策权交给缺乏人类价值观的AI系统的担忧。它想象了一个世界，其中像ChatGPT这样的生成模型迅速取代了人类在数据科学中的地位。
- en: But this dystopian vision fails to take into account the enduring nature of
    human ingenuity and ignores the narrowness of contemporary AI technologies. As
    analytical automation is indeed accelerating, thanks to models like ChatGPT, they
    remain beneficial enhancements to human intelligence, more than adversaries. When
    developed responsibly, AI systems can amplify human potential to unlock new frontiers
    in data-driven insights and value creation.
  id: totrans-474
  prefs: []
  type: TYPE_NORMAL
  zh: 但这种反乌托邦的愿景未能考虑到人类独创性的持久性，也忽视了当代AI技术的局限性。尽管分析自动化确实在加速，多亏了ChatGPT等模型，但它们仍然是人类智能的有益补充，而非对手。当AI系统得到负责任地开发时，它们可以放大人类潜力，解锁数据驱动洞察和价值创造的新领域。
- en: However, careless implementation, focused solely on efficiency, risks undermining
    human action and responsibility. Maximizing the transformative power of AI-driven
    analytics requires respect for human ethics and surveillance throughout the process.
    This balance remains crucial, but precarious in the age of automation.
  id: totrans-475
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，仅关注效率的粗心实施可能会损害人类行动和责任。最大化由AI驱动的分析变革力量需要在整个过程中尊重人类的伦理和监督。这种平衡在自动化时代仍然至关重要，但也非常脆弱。
- en: 'That is why this timely book, *Automated Data Analytics: Combining Human Creativity
    and AI Power using ChatGPT*, serves as an indispensable guide to the modern analytical
    frontier. It charts a prudent course, one where human imagination and ethics harness
    automation to elevate, rather than overwhelm, human capabilities. The book advocates
    thoughtful collaboration with AI, and not abandonment.'
  id: totrans-476
  prefs: []
  type: TYPE_NORMAL
  zh: 正因如此，这本及时出版的书籍《自动化数据分析：利用ChatGPT结合人类创造力和AI力量》成为了现代分析前沿不可或缺的指南。它规划了一条谨慎的道路，一条人类想象力和伦理利用自动化来提升，而不是压倒人类能力之路。本书提倡与AI的深思熟虑的合作，而不是放弃。
- en: And this collaborative approach is, indeed, the wisest course. Because at their
    core, contemporary AI models like ChatGPT remain narrow and limited by the patterns
    contained in their training data. Although they can perform defined tasks at superhuman
    speeds, they lack generalized intelligence capabilities.
  id: totrans-477
  prefs: []
  type: TYPE_NORMAL
  zh: 而这种协作方法确实是明智之举。因为从本质上讲，当代的AI模型如ChatGPT仍然受限于其训练数据中的模式，是狭窄和有限的。尽管它们能够以超人类的速度执行定义的任务，但它们缺乏普遍的智能能力。
- en: What we need is a harmonious fusion of the forces of human creativity, ethics
    and surveillance with the relentless analytical excellence of AI on vast datasets.
    Neither humans nor machines alone can match the amplified intelligence unleashed
    by their symbiosis. The book provides frameworks for productively structuring
    this collaboration for maximum collective benefit.
  id: totrans-478
  prefs: []
  type: TYPE_NORMAL
  zh: 我们所需要的，是将人类创造力的力量、伦理和监督与AI在大量数据集上无情的分析卓越性和谐融合。单独的人类或机器都无法与它们共生释放出的增强智能相匹配。本书提供了构建这种合作以实现最大集体利益的框架。
- en: By shedding light on the inner workings, development processes and inherent
    limitations of AI systems, the book enables smoother integration into analytical
    workflows. Laying bare their technical realities helps to delimit optimal roles
    that emphasize the specialized strengths of humans versus machines. We can design
    complementary human–AI partnerships by assigning appropriate tasks based on contextual
    capabilities.
  id: totrans-479
  prefs: []
  type: TYPE_NORMAL
  zh: 通过揭示AI系统的内部运作、开发过程和固有局限性，本书有助于更顺畅地将它们整合到分析工作中。揭露它们的技术现实性有助于界定强调人类与机器专业优势的最优角色。我们可以通过根据情境能力分配适当的任务来设计互补的人类-人工智能伙伴关系。
- en: Humans must take the lead in framing problems, interpreting solutions and thinking
    globally, while AI undertakes data processing, calculation and in-depth analysis.
    This book discusses various interaction models that enable a continuous flow between
    human creativity and the machine’s productivity to constantly improve the discovery
    process.
  id: totrans-480
  prefs: []
  type: TYPE_NORMAL
  zh: 人类必须在界定问题、解释解决方案和全球思考方面发挥主导作用，而AI则负责数据处理、计算和深入分析。本书讨论了各种交互模型，这些模型能够使人类创造力和机器的生产力之间持续流动，从而不断改进发现过程。
- en: It highlights techniques to better expose the model’s decision logic, in order
    to increase trust and accountability. Continuous surveillance of model behavior
    and fail-safe guardrails are emphasized to ensure safety and prevent harmful abuse.
    The book also strongly advocates for maintaining sustainable human values and
    ethics at every stage of analytical automation to keep progress aligned with social
    benefits.
  id: totrans-481
  prefs: []
  type: TYPE_NORMAL
  zh: 它突出了更好地揭示模型决策逻辑的技术，以提高信任和问责制。强调对模型行为的持续监控和预防性安全措施，以确保安全并防止有害滥用。本书还强烈倡导在分析自动化的每个阶段都保持可持续的人类价值观和伦理，以确保进步与社会的利益保持一致。
- en: It explores frameworks for adapting to society and developing specialized human
    capabilities that unlock unique synergies with AI. All this is geared towards
    developing AI-driven analytics in a responsible way for collective human elevation.
    The book envisions an augmented intelligence, wherein humans and machines elevate
    each other, not AI supremacy over humanity.
  id: totrans-482
  prefs: []
  type: TYPE_NORMAL
  zh: 它探讨了适应社会和发展专门的人类能力以与人工智能解锁独特协同效应的框架。所有这些都旨在以负责任的方式发展人工智能驱动的分析，以促进人类的集体提升。本书设想了一种增强型智能，其中人类和机器相互提升，而不是人工智能对人类的统治。
- en: Mainly, it lays the foundations for the ethical integration of automation into
    the analytical workflow – from strategic problem definition where humans lead,
    to iterative collaboration where both participate seamlessly, to evaluative surveillance
    where human judgment remains essential. This makes it possible to benefit from
    productivity gains without giving up creativity or responsibility.
  id: totrans-483
  prefs: []
  type: TYPE_NORMAL
  zh: 主要来说，它为将自动化融入分析工作流程的伦理整合奠定了基础——从人类主导的战略问题定义，到双方无缝协作的迭代合作，再到人类判断依然至关重要的评估监控。这使得我们能够在不放弃创造力和责任的情况下，从生产力提升中获益。
- en: The book comes at an opportune moment when AI is transforming analysis, but
    its capacities remain nascent and impressionable, like a young child. It underlines
    our responsibility as developers, leaders and citizens to wisely guide AI’s progress
    from these formative stages to broader social benefit. The choices we make today
    will determine the long-term trajectory of artificial analytical intelligence.
  id: totrans-484
  prefs: []
  type: TYPE_NORMAL
  zh: 这本书在人工智能正在改变分析但能力仍处于萌芽和易受影响阶段的时候出版，恰逢其时。它强调了作为开发者、领导者和公民，我们有责任明智地引导人工智能从这些形成阶段走向更广泛的社会利益。我们今天所做的选择将决定人工智能分析的长远轨迹。
- en: And the book equips us to make these choices wisely by demystifying AI, highlighting
    its strengths and weaknesses, and providing ethically based normative advice.
    Whether you are excited or anxious about the revolution of automation, this book
    is an indispensable decision-making tool for navigating the future analytically.
  id: totrans-485
  prefs: []
  type: TYPE_NORMAL
  zh: 本书通过揭示人工智能，突出其优势和劣势，并提供基于伦理的规范性建议，使我们能够明智地做出这些选择。无论你对自动化革命感到兴奋还是焦虑，这本书都是导航未来分析不可或缺的决策工具。
- en: Its frameworks, examples and principles enable us to integrate analysis responsibly
    with a human-centered perspective. You will get comprehensive, balanced clarity
    on collaborative opportunities that elevate without undermining human agency.
    And it champions respect for ethics as a guiding compass in the development and
    application of analytical AI.
  id: totrans-486
  prefs: []
  type: TYPE_NORMAL
  zh: 其框架、示例和原则使我们能够从以人为本的视角负责任地整合分析。您将获得全面、平衡的清晰度，了解提升而不损害人类能动性的协作机会。它还倡导尊重伦理，作为分析和人工智能开发与应用中的指导罗盘。
- en: This book inspires a future where AI makes data insights available to the whole
    of society for the common enrichment of human life. Its sound advice steers analytical
    automation in a prudent direction that amplifies human potential exponentially
    while keeping humanity firmly in control. The possibilities are breathtaking if
    we move forward guided by the human values and spirit of collaboration that this
    book seeks to inspire.
  id: totrans-487
  prefs: []
  type: TYPE_NORMAL
  zh: 本书激发了一个未来，在那里人工智能使数据洞察对整个社会开放，以共同丰富人类生活。其明智的建议引导分析自动化朝着谨慎的方向发展，指数级地放大人类潜力，同时确保人类牢牢掌控。如果我们按照这本书所寻求激发的人类价值观和协作精神前进，前景将令人叹为观止。
- en: Who this book is for
  id: totrans-488
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 这本书面向的对象
- en: This book serves as an indispensable guide for the various stakeholders navigating
    the early stages of amplified analysis.
  id: totrans-489
  prefs: []
  type: TYPE_NORMAL
  zh: 本书为正在导航放大分析早期阶段的各方利益相关者提供了一本不可或缺的指南。
- en: For data scientists and analytics teams, it provides actionable frameworks for
    working responsibly with AI while retaining human creativity and human supervisions.
    The book’s insights will enable thoughtful development of analytical AI to unlock
    productivity while maintaining accountability. With illuminating case studies
    and prescriptive recommendations, data scientists can future-proof their skills
    and workflows to thrive in the age of automation.
  id: totrans-490
  prefs: []
  type: TYPE_NORMAL
  zh: 对于数据科学家和数据分析团队来说，它提供了在保持人类创造力和人类监督的同时，与人工智能负责任工作的可操作框架。本书的见解将使分析人工智能的深思熟虑的发展成为可能，从而在保持问责制的同时提高生产力。通过启发性的案例研究和具体的建议，数据科学家可以确保他们的技能和工作流程在自动化时代蓬勃发展。
- en: The book is also extremely important for business leaders and decision-makers
    evaluating the adoption of AI-based analytics. It grounds discussions in ethical
    considerations beyond mere efficiency, helping leaders to make wise choices when
    integrating automated analytics into their organizations. Pragmatic advice allows
    leaders to select analytical workflows that wisely enhance the capabilities of
    their teams, rather than ruthlessly replacing them.
  id: totrans-491
  prefs: []
  type: TYPE_NORMAL
  zh: 对于评估采用基于人工智能的分析的企业领导者和决策者来说，本书也非常重要。它将讨论建立在超越效率的伦理考虑之上，帮助领导者在将自动化分析整合到他们的组织中时做出明智的选择。实用建议允许领导者选择明智地增强其团队能力的分析工作流程，而不是无情地取代它们。
- en: For policy-makers and regulators, the book highlights the need for adaptive
    governance to encourage responsible AI innovation in data analytics. Its forwardlooking
    perspectives reveal how today’s prudent policies can proactively shape the trajectory
    of automation in a direction that benefits society collectively. The book provides
    insight into the development of governance frameworks that are responsive to rapid
    technological change, while remaining grounded in ethics and inclusion.
  id: totrans-492
  prefs: []
  type: TYPE_NORMAL
  zh: 对于政策制定者和监管者来说，本书强调了在数据分析中鼓励负责任的人工智能创新所需的适应性治理。其前瞻性观点揭示了今天的谨慎政策如何积极塑造自动化的发展轨迹，使其对社会集体有益。本书提供了对快速技术变革做出响应的治理框架的发展的见解，同时保持基于伦理和包容性。
- en: In academic institutions, this book offers an indispensable program both in
    data science programs and for interdisciplinary discussions. It enriches understanding
    of how best to develop AI-based techniques founded on moral principles and responsibility.
    The book sheds light on research avenues into reliable and transparent analytical
    algorithms. And it enables a nuanced discourse on the balance between productivity
    and prudence in the age of automation.
  id: totrans-493
  prefs: []
  type: TYPE_NORMAL
  zh: 在学术机构中，这本书在数据科学项目以及跨学科讨论中提供了一个不可或缺的计划。它丰富了如何基于道德原则和责任最好地发展人工智能技术的理解。本书揭示了可靠和透明的分析算法的研究途径。它还使人们能够就自动化时代生产力和谨慎之间的平衡进行细致的讨论。
- en: The book also serves civil society and general interest readers looking for
    balanced perspectives on the integration of analytical AI. It dispels alarmist
    fears of AI, while emphasizing the need for thoughtful monitoring and adaptation.
    By making technical concepts accessible through clear metaphors and examples,
    the book enables the public to participate in the ethical development of the discourse
    on automation. It contributes to the crucial dialogue on the direction of technology
    for collective human upliftment.
  id: totrans-494
  prefs: []
  type: TYPE_NORMAL
  zh: 本书对于寻求对分析人工智能整合平衡观点的公民社会和普通读者来说也非常重要。它消除了对人工智能的恐慌性恐惧，同时强调了对深思熟虑的监控和适应的需要。通过通过清晰的隐喻和例子使技术概念易于理解，本书使公众能够参与自动化话语的道德发展。它有助于关于技术方向以促进集体人类提升的至关重要的对话。
- en: Students and young professionals will find this book invaluable in preparing
    for the future of analysis. It provides a fundamental understanding of how best
    to develop collaborative skills in AI from a technical and ethical perspective.
    The information will help students cultivate human-centered values and creativity
    even as they develop technical prowess in AI systems. This fosters comprehensive
    capabilities suited to the judicious integration of automation between roles.
  id: totrans-495
  prefs: []
  type: TYPE_NORMAL
  zh: 学生和年轻专业人士会发现这本书在为分析的未来做准备时非常有价值。它从技术和伦理的角度提供了如何最好地发展人工智能协作技能的基本理解。这些信息将帮助学生培养以人为本的价值和创造力，即使在发展人工智能系统中的技术专长时也是如此。这促进了适合在角色之间明智地整合自动化的综合能力。
- en: But perhaps most critically, this work highlights the essential human responsibility
    in the development and deployment of analytical AI. It emphasizes that all stakeholders
    have an active role to play in shaping progress on the basis of moral principles
    and compassion. Only through collective foresight and wisdom can we nurture a
    beneficial intelligence that amplifies rather than diminishes human potential.
  id: totrans-496
  prefs: []
  type: TYPE_NORMAL
  zh: 但也许最重要的是，这项工作突出了在分析和AI的开发和部署中人类的基本责任。它强调所有利益相关者都有积极的作用，在基于道德原则和同情心的基础上推动进步。只有通过集体的远见和智慧，我们才能培养出一种有益的智能，它增强而不是削弱人类潜能。
- en: Overall, this book is aimed at anyone interested in or affected by the integration
    of automation and AI in data analytics. Its mix of technical foundations, ethical
    direction and pragmatic advice offers indispensable guidance for moving cautiously
    into the era of amplified analytics. The book awakens our collective consciousness
    to the responsible orientation of technology use towards the expansion of human
    capabilities. And it provides ways to synergize human and artificial intelligence
    under conscientious human management, so that automated analysis benefits, rather
    than harms, society.
  id: totrans-497
  prefs: []
  type: TYPE_NORMAL
  zh: 总体而言，这本书旨在为任何对自动化和AI在数据分析中的集成感兴趣或受其影响的人。它结合了技术基础、道德指导和实用建议，为谨慎进入增强分析时代提供了不可或缺的指导。这本书唤醒了我们集体意识，关注技术使用的负责任方向，以扩展人类能力。它还提供了在负责任的人类管理下协同人类和人工智能的方法，使自动化分析造福社会，而不是危害社会。
- en: The challenge of the book
  id: totrans-498
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 书籍的挑战
- en: The emergence of generative AI models such as ChatGPT has triggered a revolution
    in data analytics. These powerful technologies automate parts of the analytical
    process that previously required significant human effort. Tasks such as data
    cleaning, aggregation and basic reporting are rapidly transformed thanks to these
    AI systems.
  id: totrans-499
  prefs: []
  type: TYPE_NORMAL
  zh: 生成式AI模型如ChatGPT的出现触发了数据分析领域的革命。这些强大的技术自动化了以前需要大量人力投入的分析过程的部分。数据清洗、聚合和基本报告等任务因这些AI系统而迅速转变。
- en: An appropriate analogy compares the education of these AI models to the education
    of children. Like children, they start out as blank slates and gradually acquire
    complex skills through careful guidance. Data scientists act as parents, slowly
    exposing them to various datasets and analytical tasks during the training process.
  id: totrans-500
  prefs: []
  type: TYPE_NORMAL
  zh: 一个恰当的类比将这些AI模型的教育比作儿童的教育。就像儿童一样，它们一开始是一张白纸，通过仔细的指导逐渐获得复杂的技能。数据科学家扮演着父母的角色，在训练过程中逐渐向他们展示各种数据集和分析任务。
- en: Initially, the models are only capable of mechanically imitating operations
    based on training data. They do not have a deeper understanding of the concepts,
    principles and implications behind the workflows. Models can repeat data processing
    steps with precision, but without any notion of meaning.
  id: totrans-501
  prefs: []
  type: TYPE_NORMAL
  zh: 初始时，模型只能机械地模仿基于训练数据的操作。它们没有对工作流程背后的概念、原则和含义的深入理解。模型可以精确地重复数据处理步骤，但没有任何关于意义的理解。
- en: This is similar to a young child reciting multiplication tables by heart without
    grasping the deeper mathematical concepts of multiplication. They can perform
    the calculation accurately, but without the reasoning behind it. Early training
    of AI models also focuses on the repetitive execution of instructed tasks.
  id: totrans-502
  prefs: []
  type: TYPE_NORMAL
  zh: 这就像一个小孩能够通过心算背诵乘法表，但没有掌握乘法的更深层次数学概念。他们可以准确地执行计算，但没有背后的推理。AI模型的早期训练也侧重于重复执行指令任务。
- en: But with enough care over large datasets, these AI systems can move on to a
    true understanding of the patterns, relationships and rules governing analytical
    workflows. Just as varied exposure to the real world enables a child to deduce
    abstract concepts from concrete examples, extensive training helps models generalize.
  id: totrans-503
  prefs: []
  type: TYPE_NORMAL
  zh: 但通过对大量数据集的足够关注，这些AI系统可以发展到对分析工作流程中支配的规律、关系和规则的真实理解。正如对现实世界的多样化接触使孩子能够从具体例子中推导出抽象概念，广泛的训练有助于模型进行归纳。
- en: Gradually, the models evolve from the simple memorization of instructions to
    the development of an inductive understanding of the principles underlying data
    analytics workflows. They understand why particular techniques are appropriate
    in different contexts on the basis of conceptual understanding, rather than blind
    implementation.
  id: totrans-504
  prefs: []
  type: TYPE_NORMAL
  zh: 逐渐地，模型从简单的指令记忆发展到对数据分析工作流程中原理的归纳理解。他们基于概念理解，而不是盲目的实施，理解为什么特定的技术在不同的环境中是合适的。
- en: This transition reflects a student’s move from simply memorizing mathematical
    facts to understanding how mathematical operations work on the basis of logical
    reasoning. Through further maturation, the models acquire contextual awareness
    to adaptively select the optimal analytical approaches for new datasets and scenarios.
  id: totrans-505
  prefs: []
  type: TYPE_NORMAL
  zh: 这种转变反映了学生从简单地记忆数学事实到基于逻辑推理理解数学运算的工作原理的转变。通过进一步的成熟，模型获得了情境意识，以适应性地选择对新数据集和场景的最佳分析方法。
- en: In essence, they develop a trained intuition similar to that of human analysts.
    Models like ChatGPT acquire the ability to critically evaluate, explain and improve
    their analysis based on experience and learned patterns, rather than on simple,
    rigid instructions. Their analytical capabilities evolve in sophistication from
    basic obedience to contextual understanding.
  id: totrans-506
  prefs: []
  type: TYPE_NORMAL
  zh: 从本质上讲，它们发展出类似于人类分析师的训练有素的直觉。像ChatGPT这样的模型获得了基于经验和学习模式进行批判性评估、解释和改进分析的能力，而不是基于简单的、僵化的指令。它们的分析能力从基本的服从发展到情境理解。
- en: As models develop proficiencies in a variety of datasets, they are transformed
    from passive analysis tools into intelligent collaborators in the information
    extraction process. They move from simply analyzing data to engaging in intelligent
    dialogue with human analysts.
  id: totrans-507
  prefs: []
  type: TYPE_NORMAL
  zh: 随着模型在各种数据集上发展出熟练程度，它们从被动的分析工具转变为信息提取过程中的智能合作伙伴。它们从简单地分析数据发展到与人类分析师进行智能对话。
- en: The models provide the computational speed needed to rapidly process, crossreference
    and visualize complex data on a superhuman scale. Their patternrecognition capacities
    uncover relationships that humans may miss or take much longer to discern simply
    because of the sheer volume of data.
  id: totrans-508
  prefs: []
  type: TYPE_NORMAL
  zh: 这些模型提供了所需的计算速度，以在超人类规模上快速处理、交叉引用和可视化复杂数据。它们的模式识别能力揭示了人类可能错过或需要更长的时间才能辨别的关系，这仅仅是因为数据量的庞大。
- en: But human analysts provide the strategic framing, imagination and supervision
    needed to ensure appropriate interpretation and extraction of meaningful information,
    rather than simple blind correlations. Analysts evaluate the assumptions, ethics
    and implications guiding the appropriate application of model results.
  id: totrans-509
  prefs: []
  type: TYPE_NORMAL
  zh: 但人类分析师提供了确保适当解释和提取有意义信息的战略框架、想象力和监督，而不是简单的盲目关联。分析师评估指导模型结果适当应用的假设、伦理和影响。
- en: This creative synergy combines the power of data processing with nuanced judgment.
    Powerful AI models can generate new analytical avenues, but perceptive humans
    still need to guide the investigation by asking the right questions, through prompts.
    Models quickly reveal insights, but humans discern their meaning and applicability.
  id: totrans-510
  prefs: []
  type: TYPE_NORMAL
  zh: 这种创造性的协同作用结合了数据处理的力量和细微的判断。强大的AI模型可以产生新的分析途径，但具有洞察力的人类仍然需要通过提示来引导调查，提出正确的问题。模型迅速揭示洞察力，但人类辨别其意义和适用性。
- en: Together, humans and AI models can reach higher analytical heights than either
    of them can separately. But role divisions need to be carefully structured to
    benefit from this symbiosis. Just as shared parental responsibilities create specialization,
    the separation of analytical tasks promotes human–AI complementarity.
  id: totrans-511
  prefs: []
  type: TYPE_NORMAL
  zh: 人类和AI模型共同可以达到比单独任何一个更高的分析高度。但角色划分需要仔细构建，以从这种共生关系中受益。正如共同承担父母责任创造专业化一样，分析任务的分离促进了人-机互补性。
- en: Delineating clear roles while collaborating closely avoids confusion and ensures
    that human creativity and the power of AI can amplify each other. But care must
    be taken to structure the human–machine partnership in such a way as to highlight
    their complementarities.
  id: totrans-512
  prefs: []
  type: TYPE_NORMAL
  zh: 在紧密合作的同时明确划分角色可以避免混淆，并确保人类的创造力和人工智能的力量可以相互增强。但必须小心构建人机伙伴关系，以突出它们的互补性。
- en: Uncontrolled automation without human supervision risks losing contextual judgment
    and responsibility. Giving full control to autonomous AI models ignores their
    limitations in relation to generalized human cognition. Although powerful, these
    models still lack certain distinctly human mental capacities.
  id: totrans-513
  prefs: []
  type: TYPE_NORMAL
  zh: 没有人类监督的自动化风险是失去情境判断和责任。将完全控制权交给自主人工智能模型忽视了它们在广义人类认知方面的局限性。尽管这些模型功能强大，但它们仍然缺乏某些明显的人类心理能力。
- en: For example, AI is currently struggling with complex abstraction, causality,
    transfer learning and innovative analytical techniques. Models like ChatGPT also
    lack human judgment, intuition, common sense, morality and appreciation of ethics
    or biases. They have limited capacities for imagination and social awareness beyond
    their training.
  id: totrans-514
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，目前人工智能在处理复杂抽象、因果关系、迁移学习和创新分析技术方面正面临挑战。像ChatGPT这样的模型也缺乏人类的判断力、直觉、常识、道德观以及对伦理或偏见的欣赏。它们在想象力和社会意识方面的能力超越了它们的训练范围。
- en: We must recognize these technological limitations to properly integrate AI into
    the analytical workflow as assistants rather than sole replacements. Their specialized
    capacity makes them productivity amplifiers for specific tasks rather than fully
    capable analysts themselves. Sound human guidance prevents misleading ideas or
    exaggeration of correlations.
  id: totrans-515
  prefs: []
  type: TYPE_NORMAL
  zh: 我们必须认识到这些技术局限性，以便正确地将人工智能作为助手而不是唯一的替代品整合到分析工作流程中。它们的专门能力使它们成为特定任务的效率放大器，而不是完全合格的分析师。合理的人类指导可以防止误导性想法或对相关性的夸大。
- en: Some predict a dystopian future in which AI will rapidly surpass all human intelligence
    – the so-called *technological singularity,* (or simply *the singularity).* But
    for now, AI remains limited to narrow applications, unable to compete with the
    multi-faceted reasoning, ethics and creativity of the human mind. Their capabilities,
    while prodigious, are constrained by the limits of their data training.
  id: totrans-516
  prefs: []
  type: TYPE_NORMAL
  zh: 一些预测了一个反乌托邦的未来，其中人工智能将迅速超越所有人类智能——所谓的*技术奇点*（或简单地称为*奇点*）。但到目前为止，人工智能仍然局限于狭窄的应用，无法与人类思维的多元化推理、伦理和创造力相竞争。它们的能力虽然非凡，但受限于它们的数据训练。
- en: These models should be seen as powerful tools, not omniscient oracles. Like
    earlier innovations, such as calculators or computers, they extend certain analytical
    capacities without reproducing human cognition in the broadest sense. Their performance
    is exceptional, but narrowly delimited within a trained domain.
  id: totrans-517
  prefs: []
  type: TYPE_NORMAL
  zh: 这些模型应被视为强大的工具，而不是无所不知的先知。就像早期的创新，如计算器或计算机一样，它们扩展了某些分析能力，而没有在广义上复制人类的认知。它们的性能卓越，但局限于训练的领域内。
- en: 'This is why this book, entitled *Automated Data Analytics: Combining Human
    Creativity and AI Power using ChatGPT*, rightly advocates developing and exploiting
    these technologies with caution, rather than entrusting them with complete analytical
    controls. It warns against focusing solely on efficiency gains, without considering
    social impacts or the loss of human control.'
  id: totrans-518
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是为什么这本书，名为《自动化数据分析：利用ChatGPT结合人类创造力和人工智能力量》，正确地提倡谨慎地开发和利用这些技术，而不是将它们完全托付于分析控制。它警告说，只关注效率提升，而不考虑社会影响或人类控制的损失。
- en: The aim should be to synergize and advance human and artificial intelligence
    to better understand data, faster and more responsibly. This involves establishing
    strong human safeguards and emphasizing ethics when applying AI models to avoid
    abuse or harmful bias.
  id: totrans-519
  prefs: []
  type: TYPE_NORMAL
  zh: 目标应该是协同推进人类和人工智能，更好地理解数据，更快、更负责任地。这涉及到建立强大的人为保障，并在应用人工智能模型时强调伦理，以避免滥用或有害的偏见。
- en: But this also requires the development of mechanisms to interact seamlessly
    with AI, in order to improve, rather than simply automate, the analysis. This
    means structuring intuitive interfaces, intelligent workflows, and complementary
    human–AI team structures.
  id: totrans-520
  prefs: []
  type: TYPE_NORMAL
  zh: 但这也需要开发出与人工智能无缝交互的机制，以提高分析能力，而不仅仅是自动化。这意味着构建直观的界面、智能的工作流程和补充的人机团队结构。
- en: The optimal way forward is neither domination nor rejection of AI, but rather
    assimilation of AI under the aegis of human wisdom. This involves embracing AI’s
    productivity gains while instilling human values, creativity and supervision through
    continuous training.
  id: totrans-521
  prefs: []
  type: TYPE_NORMAL
  zh: 向前发展的最佳方式既不是对人工智能的支配，也不是拒绝，而是在人类智慧的庇护下吸收人工智能。这涉及到拥抱人工智能的生产力提升，同时通过持续训练灌输人类价值观、创造力和监督。
- en: If we nurture AI wisely, avoiding the perils of uncontrolled automation, the
    future promises new frontiers of creative data-driven insights far beyond what
    humans or machines could realize independently. AI development must balance social
    wellbeing and human dignity, not sacrifice them on the altar of efficiency and
    capability.
  id: totrans-522
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们明智地培养人工智能，避免无控制的自动化的危险，未来将承诺新的创造性数据驱动洞察的前沿，这远远超出了人类或机器独立实现的能力。人工智能的发展必须平衡社会福祉和人类尊严，而不是在效率和能力的高坛上牺牲它们。
- en: The wise integration of hearts and minds with artificial analytical power can
    propel progress at an unprecedented pace and scale. But this requires setting
    ethical boundaries and priorities beyond simply maximizing analytical power using
    AI, for example, ChatGPT.
  id: totrans-523
  prefs: []
  type: TYPE_NORMAL
  zh: 将心灵与人工智能分析力量智慧地融合，可以以前所未有的速度和规模推动进步。但这需要设定道德界限和优先事项，而不仅仅是简单地通过人工智能，例如 ChatGPT，来最大化分析能力。
- en: Human stewardship is essential to guide these technologies towards automation,
    rather than the replacement of human capabilities and responsibilities. We need
    to proactively shape their evolution based on moral considerations and social
    benefits.
  id: totrans-524
  prefs: []
  type: TYPE_NORMAL
  zh: 人类的管理至关重要，以引导这些技术走向自动化，而不是取代人类的能力和责任。我们需要根据道德考虑和社会利益积极塑造它们的演变。
- en: With AI transforming data analytics, we have reached a decisive turning point,
    where our choices and priorities will define the trajectory of the future of ethical
    AI. Treading the path cautiously, yet boldly, with compassion and creativity,
    jointly guiding analytical rigor, the dawn of hybrid intelligence promises an
    unprecedented, yet humanistic, discovery.
  id: totrans-525
  prefs: []
  type: TYPE_NORMAL
  zh: 随着人工智能改变数据分析，我们已达到一个决定性的转折点，我们的选择和优先事项将定义道德人工智能未来的轨迹。在谨慎而大胆地前行，带着同情和创造力，共同引导分析严谨性，混合智能的黎明预示着前所未有的、却具有人文主义精神的发现。
- en: Navigating content
  id: totrans-526
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 导航内容
- en: The contemporary world overflows with data, and in-depth analysis holds untold
    potential for individuals and organizations. However, traditional methods are
    struggling to unlock these nuggets of value. AI is emerging as a promising response,
    and in particular, generative models like ChatGPT automate entire sections of
    the analytical process, increasing our ability to extract impactful insights*.*
  id: totrans-527
  prefs: []
  type: TYPE_NORMAL
  zh: 当代世界充满了数据，深入分析对个人和组织具有不可估量的潜力。然而，传统方法正努力解锁这些价值宝藏。人工智能正成为一种有希望的回应，特别是像 ChatGPT
    这样的生成模型自动化了分析过程的部分，增加了我们提取有影响力见解的能力*。
- en: This book explores the fascinating world of AI-enhanced data analytics. Through
    a step-by-step exploration, it reveals the exciting possibilities of this symbiosis
    of human ingenuity and algorithmic power. The book demystifies these emerging
    technologies and provides a practical framework for integrating them ethically
    into modern analytical workflows. It presents an essential roadmap for the ethical
    and collaborative integration of automation in data analytics.
  id: totrans-528
  prefs: []
  type: TYPE_NORMAL
  zh: 本书探索了人工智能增强数据分析的迷人世界。通过逐步探索，它揭示了这种人类独创性和算法力量的共生关系的激动人心的可能性。本书消除了这些新兴技术的神秘感，并为将它们道德地整合到现代分析工作流程中提供了实用框架。它为自动化在数据分析中的道德和协作整合提供了基本路线图。
- en: The interconnected chapters guide the reader through the process of training,
    preparing and supporting ChatGPT, in order to ensure the automation of the various
    tasks involved in the analytical process.
  id: totrans-529
  prefs: []
  type: TYPE_NORMAL
  zh: 互联的章节引导读者通过训练、准备和支持 ChatGPT 的过程，以确保分析过程中涉及的各种任务的自动化。
- en: '[Chapter 1](c01.xhtml) sets the scene by examining how AI-driven automation
    is transforming data analytics. It highlights the immense potential of generative
    models such as ChatGPT to accelerate and deepen the extraction of insights. The
    chapter highlights the importance of combining human creativity and automated
    analysis in a harmonious way, in order to achieve augmented intelligence. It explains
    how to create effective prompts to get the most out of ChatGPT.'
  id: totrans-530
  prefs: []
  type: TYPE_NORMAL
  zh: '[第一章](c01.xhtml) 通过考察人工智能驱动的自动化如何改变数据分析来设定场景。它强调了生成模型如 ChatGPT 加速和深化见解提取的巨大潜力。本章强调了以和谐的方式结合人类创造力和自动化分析的重要性，以实现增强智能。它解释了如何创建有效的提示，以充分利用
    ChatGPT。'
- en: '[Chapter 2](c02.xhtml) delves into the heart of ChatGPT, revealing its unique
    capabilities for data analytics. It explores its powerful understanding of natural
    language, providing intuitive interaction. The chapter examines how ChatGPT can
    support data scientists, rather than replace them. It provides a practical guide
    to integrating ChatGPT into analytical workflows.'
  id: totrans-531
  prefs: []
  type: TYPE_NORMAL
  zh: '[第二章](c02.xhtml) 深入探讨了 ChatGPT 的核心，揭示了其在数据分析方面的独特能力。它探讨了其对自然语言的强大理解，提供了直观的交互。本章考察了
    ChatGPT 如何支持数据科学家，而不是取代他们。它为将 ChatGPT 集成到分析工作流程中提供了实用指南。'
- en: '[Chapter 3](c03.xhtml) shows how ChatGPT can automate data preparation – cleaning,
    preprocessing, management of missing values and outliers. This often tedious step
    is essential for high-quality analysis. By delegating these tasks to ChatGPT,
    analysts save valuable time.'
  id: totrans-532
  prefs: []
  type: TYPE_NORMAL
  zh: '[第3章](c03.xhtml) 展示了ChatGPT如何自动化数据准备——清理、预处理、缺失值和异常值的管理。这一通常繁琐的步骤对于高质量分析至关重要。通过将这些任务委托给ChatGPT，分析师节省了宝贵的时间。'
- en: '[Chapter 4](c04.xhtml) explains how to formulate natural and conversational
    queries for ChatGPT. No need to master SQL! ChatGPT takes questions in everyday
    language and translates them into optimized queries. This intuitive approach frees
    up analytical curiosity.'
  id: totrans-533
  prefs: []
  type: TYPE_NORMAL
  zh: '[第4章](c04.xhtml) 解释了如何为ChatGPT制定自然和对话式的查询。无需掌握SQL！ChatGPT将日常语言中的问题转换为优化的查询。这种直观的方法释放了分析的好奇心。'
- en: '[Chapter 5](c05.xhtml) highlights ChatGPT’s prowess in advanced analysis –
    data mining, statistics, prediction and sentiment analysis. Its assistance boosts
    analysts’ performance, enabling them to concentrate on high-value-added tasks.'
  id: totrans-534
  prefs: []
  type: TYPE_NORMAL
  zh: '[第5章](c05.xhtml) 突出了ChatGPT在高级分析——数据挖掘、统计学、预测和情感分析——方面的能力。其辅助作用提高了分析师的表现，使他们能够专注于高附加值任务。'
- en: '[Chapter 6](c06.xhtml) covers the automation of predictive modeling and time
    series analysis with ChatGPT. Its systematic approach surpasses human capabilities
    for rigorous and accurate models. Continuous feedback cycles with analysts optimize
    its performance.'
  id: totrans-535
  prefs: []
  type: TYPE_NORMAL
  zh: '[第6章](c06.xhtml) 讲述了ChatGPT在自动化预测模型和时间序列分析方面的巨大潜力。其系统方法超越了人类在严格和准确模型方面的能力。与分析师的持续反馈循环优化了其性能。'
- en: '[Chapter 7](c07.xhtml) reveals ChatGPT’s tremendous potential for accelerating
    the machine learning process. Its ability to generate personalized algorithms
    and improve their performance opens up new horizons in this crucial discipline.'
  id: totrans-536
  prefs: []
  type: TYPE_NORMAL
  zh: '[第7章](c07.xhtml) 揭示了ChatGPT加速机器学习过程的巨大潜力。其生成个性化算法并提高其性能的能力为这一关键学科开辟了新的天地。'
- en: '[Chapter 8](c08.xhtml) explains how ChatGPT automates engaging data storytelling
    – the generation of reports, interactive dashboards and eye-catching presentations.
    But it emphasizes the importance of preserving a human imprint in these narratives
    to truly captivate readers.'
  id: totrans-537
  prefs: []
  type: TYPE_NORMAL
  zh: '[第8章](c08.xhtml) 解释了ChatGPT如何自动化引人入胜的数据叙事——生成报告、交互式仪表板和引人注目的演示。但它强调在这些叙述中保留人类印记的重要性，以真正吸引读者。'
- en: Finally, the ethical dimensions surrounding the responsible use of ChatGPT in
    data analytics are addressed in [Chapter 9](c09.xhtml). This chapter provides
    guidelines for mitigating bias, ensuring fairness and transparency. Without a
    moral compass, automation risks dehumanizing data analytics.
  id: totrans-538
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，在[第9章](c09.xhtml)中讨论了ChatGPT在数据分析中负责任使用的伦理维度。本章提供了减轻偏见、确保公平和透明的指南。没有道德指南针，自动化可能会使数据分析去人性化。
- en: In broad terms, our aspiration is for this book to stand as a fundamental guide
    to thoughtfully integrating automation and AI in data analytics. We hope that
    its blend of ethical considerations and practical techniques will open up new
    perspectives on the development of human-centric augmented automated analytics.
  id: totrans-539
  prefs: []
  type: TYPE_NORMAL
  zh: 从广义上讲，我们的愿望是使本书成为在数据分析中深思熟虑地整合自动化和AI的基本指南。我们希望其道德考虑和实用技术的结合将为以人为本的增强型自动化分析的发展开辟新的视角。
- en: This book aims to stimulate your curiosity about the vast possibilities when
    human creativity and machine intelligence converge. And we hope it will provide
    fertile seeds for further exploration in the elaboration of analytical workflows
    that ethically amplify insight and productivity. While generative AI propels analysis
    in known territory, this book seeks to shed light on a prudent path based on moral
    principles.
  id: totrans-540
  prefs: []
  type: TYPE_NORMAL
  zh: 本书旨在激发你对人类创造力和机器智能结合时无限可能的好奇心。我们希望它能成为进一步探索分析工作流程细化的肥沃种子，这些工作流程在道德上放大洞察力和生产力。当生成式AI在已知领域推动分析时，本书寻求基于道德原则的谨慎路径。
- en: 'May it inspire you to participate in shaping the future trajectory of AI-powered
    automated analytics for the collective elevation of humanity.  # 1'
  id: totrans-541
  prefs: []
  type: TYPE_NORMAL
  zh: '希望它能激发你参与塑造人工智能驱动的自动化分析的未来轨迹，以提升人类整体水平。  # 1'
- en: Artificial Intelligence (AI) and Automated Data Analytics
  id: totrans-542
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能（AI）和自动化数据分析
- en: We are today at the dawn of a new era, defined by the rise of generative AI
    and the immense potential it opens up to automate and increase data analytics.
    Systems such as ChatGPT (GPT, abbreviation for Generative Pre-trained Transformer),
    which designates a sophisticated machine learning model that has undergone extensive
    pre-training on a vast dataset, foreshadow a fascinating future, as well as raising
    important questions about the evolving role of human analysts and the responsible
    integration of AI.
  id: totrans-543
  prefs: []
  type: TYPE_NORMAL
  zh: 我们今天正站在一个新时代的黎明，这个时代由生成式AI的兴起和它为自动化和增强数据分析所开启的巨大潜力所定义。例如ChatGPT（GPT，即生成式预训练变换器，缩写），它指定了一个经过大量数据集预训练的复杂机器学习模型，预示着一个迷人的未来，同时也提出了关于人类分析师角色演变和AI负责任整合的重要问题。
- en: The implications of this AI for data analytics are profound and disruptive.
    We now have an AI system that can not only calculate numbers, but also communicate
    with analysts in natural language as a collaborative partner. This human-like
    communication capability helps analysts to prepare data, formulate analytical
    questions, generate queries, run models, summarize results, and more.
  id: totrans-544
  prefs: []
  type: TYPE_NORMAL
  zh: 这种AI对数据分析的影响是深远且颠覆性的。我们现在拥有一个不仅能够计算数字，还能以协作伙伴的身份用自然语言与分析师进行交流的AI系统。这种类似人类的交流能力帮助分析师准备数据、制定分析问题、生成查询、运行模型、总结结果等。
- en: In essence, generative AI opens up the possibility of automated data analytics
    where algorithms take on the mechanical and repetitive tasks, while human analysts
    provide strategy, imagination and oversight. Working together, humans and AI systems
    can achieve exponentially more, faster and better than either could alone. This
    vision is what makes the rise of ChatGPT a paradigm shift for data analytics.
  id: totrans-545
  prefs: []
  type: TYPE_NORMAL
  zh: 从本质上讲，生成式AI开辟了自动化数据分析的可能性，其中算法承担机械和重复性任务，而人类分析师提供策略、想象力和监督。人类与AI系统共同工作，可以比单独工作更快、更好地实现指数级增长。正是这种愿景使得ChatGPT的兴起成为数据分析的范式转变。
- en: Before revealing how to guide ChatGPT step by step through all the tasks of
    the analytical process, it is essential to map out the landscape, opportunities
    and ethical considerations surrounding the automation of data analytics by emerging
    generative AI.
  id: totrans-546
  prefs: []
  type: TYPE_NORMAL
  zh: 在逐步指导ChatGPT完成分析过程的所有任务之前，描绘出围绕新兴生成式AI自动化数据分析的格局、机遇和伦理考量至关重要。
- en: '## 1.1\. The emergence of automated data analytics and the potential of generative
    AI'
  id: totrans-547
  prefs: []
  type: TYPE_NORMAL
  zh: '## 1.1\. 自动化数据分析的兴起和生成式AI的潜力'
- en: We are witnessing an unprecedented inflection point in the evolution of data
    analytics, catalyzed by the rapid advances of AI. The emergence of generative
    AI systems has paved the way for the automation of many analytical tasks traditionally
    requiring intensive human effort (Sedkaoui [2023](b05.xhtml#bib44)). This monumental
    change has the potential to fundamentally transform the way humans extract insights
    from data.
  id: totrans-548
  prefs: []
  type: TYPE_NORMAL
  zh: 我们正在见证数据分析演变中的一个前所未有的转折点，这是由AI的快速进步催化的。生成式AI系统的出现为许多传统上需要大量人力投入的分析任务的自动化铺平了道路（Sedkaoui
    [2023](b05.xhtml#bib44)）。这种重大变革有可能从根本上改变人类从数据中提取洞察力的方式。
- en: 1.1.1\. *The power unleashed by generative AI*
  id: totrans-549
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1.1.1\. *生成式AI释放的力量*
- en: A paradigm shift is underway, driven by the recent breakthroughs in deep learning.
    The development of natural language models based on transformers such as ChatGPT
    has produced AI systems capable of remarkably human-like written language behavior.
  id: totrans-550
  prefs: []
  type: TYPE_NORMAL
  zh: 深度学习最近的突破推动了范式转变。基于ChatGPT等变换器的自然语言模型的发展产生了能够表现出惊人的人类类似书面语言行为的AI系统。
- en: With over 1 trillion parameters, ChatGPT demonstrates an unprecedented ability
    to engage in contextual and coherent multi-turn natural language conversations
    on a dizzying array of topics (Tingiris and Kinsella [2021](b05.xhtml#bib55)).
    This presents a watershed moment for the unlocking of automated data analytics
    using natural language interfaces.
  id: totrans-551
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT拥有超过1000亿个参数，展示了前所未有的能力，能够在令人眼花缭乱的众多主题上进行情境化和连贯的多轮自然语言对话（Tingiris和Kinsella
    [2021](b05.xhtml#bib55)）。这标志着使用自然语言界面解锁自动化数据分析的一个分水岭时刻。
- en: By providing detailed instructions and feedback in simple conversational language,
    humans can now collaborate with AI systems to perform a wide range of analytical
    tasks. This includes data cleaning, pre-processing, visualization, statistical
    analysis, query generation, predictive modeling, report creation, etc.
  id: totrans-552
  prefs: []
  type: TYPE_NORMAL
  zh: 通过以简单的对话语言提供详细说明和反馈，人类现在可以与AI系统协作执行广泛的分析任务。这包括数据清理、预处理、可视化、统计分析、查询生成、预测建模、报告创建等。
- en: The implications are far-reaching. Every facet of the data analytics life cycle
    – from raw datasets to final insights – can potentially be accelerated, augmented
    and automated through collaboration with generative AI systems.
  id: totrans-553
  prefs: []
  type: TYPE_NORMAL
  zh: 其影响深远。数据分析和生命周期中的每一个方面——从原始数据集到最终见解——都有可能通过与生成式AI系统的协作而加速、增强和自动化。
- en: 1.1.2\. *Transforming the data analytics process*
  id: totrans-554
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1.1.2\. *转变数据分析过程*
- en: The integration of generative AI promises to profoundly reshape and accelerate
    the entire data analysis process. With ChatGPT, capable of handling many basic
    tasks in response to natural language prompts, human analysts can pursue more
    ambitious analysis goals and devote their time to high-value work.
  id: totrans-555
  prefs: []
  type: TYPE_NORMAL
  zh: 生成式AI的集成有望从根本上重塑并加速整个数据分析过程。借助ChatGPT，能够响应自然语言提示处理许多基本任务，人类分析师可以追求更雄心勃勃的分析目标，并将时间投入到高价值工作中。
- en: The preparation, cleaning and processing of datasets to make them ready for
    analysis often presents the most labor-intensive phase of analysis (Manning et
    al. [2014](b05.xhtml#bib26); Sedkaoui and Khelfaoui [2020](b05.xhtml#bib46)).
    ChatGPT would automate the bulk of the work, following guidelines to facilitate
    data analytics, preparation and transformation. It would also help to summarize
    datasets for analysis purposes, reducing analyst burden while improving consistency.
  id: totrans-556
  prefs: []
  type: TYPE_NORMAL
  zh: 准备、清理和处理数据集以使其准备好分析通常是最耗时的分析阶段（Manning et al. [2014](b05.xhtml#bib26)；Sedkaoui和Khelfaoui
    [2020](b05.xhtml#bib46)）。ChatGPT将自动化大部分工作，遵循指南以促进数据分析、准备和转换。它还将帮助总结数据集以供分析目的使用，减轻分析师的负担同时提高一致性。
- en: Formulating analytical questions and translating insights into executable queries
    and scripts is another area where AI is extremely promising. Instead of painstakingly
    coding queries, analysts could rely on ChatGPT to interpret the questions provided
    in plain language and suggest appropriate SQL or Python queries to run (Tingiris
    and Kinsella [2021](b05.xhtml#bib55)).
  id: totrans-557
  prefs: []
  type: TYPE_NORMAL
  zh: 制定分析问题和将见解转化为可执行的查询和脚本是AI极具潜力的另一个领域。分析师不必费力地编写查询，而是可以依赖ChatGPT来解释以普通语言提供的查询，并提出适当的SQL或Python查询以运行（Tingiris和Kinsella
    [2021](b05.xhtml#bib55)）。
- en: For advanced analysis covering statistical tests, forecasting and prediction,
    ChatGPT can also help design rigorous analytical workflows and rapidly perform
    calculations. Throughout AI’s natural language capabilities, namely ChatGPT, enable
    a highly interactive iterative process between humans and AI.
  id: totrans-558
  prefs: []
  type: TYPE_NORMAL
  zh: 对于涉及统计测试、预测和预测的高级分析，ChatGPT还可以帮助设计严格的分析工作流程并快速执行计算。在整个AI的自然语言能力中，即ChatGPT，使得人类与AI之间能够进行高度互动的迭代过程。
- en: The combined effect is a dramatic increase in analyst productivity and scope
    With AI systems automating all rote-coded tasks, analysts are able to find deeper
    insights faster among exponentially larger and more complex data.
  id: totrans-559
  prefs: []
  type: TYPE_NORMAL
  zh: 这种综合效应是分析师生产力和范围的显著增加。随着AI系统自动化所有例行编码任务，分析师能够在指数级更大和更复杂的数据中更快地找到更深入的见解。
- en: 1.1.3\. *Redefining coding with the intelligent agent*
  id: totrans-560
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1.1.3\. *用智能代理重新定义编码*
- en: By exploiting the advanced natural language processing capabilities of models
    like ChatGPT, data scientists can efficiently improve their workflows and achieve
    superior project results. The versatility of these intelligent agents extends
    their benefits to programmers and data analysts in a multitude of ways.
  id: totrans-561
  prefs: []
  type: TYPE_NORMAL
  zh: 通过利用ChatGPT等模型的高级自然语言处理能力，数据科学家可以有效地提高他们的工作流程并实现卓越的项目成果。这些智能代理的通用性将它们的益处以多种方式扩展到程序员和数据分析师。
- en: When it comes to programming, they are an invaluable asset. Their code generation
    prowess enables programmers to quickly formulate code snippets by responding to
    natural language prompts, which is particularly beneficial for rapid prototyping
    of ideas and boilerplate code generation. For example, by training ChatGPT on
    an assortment of code examples, a language model can emerge, capable of producing
    syntactically accurate code segments across a range of programming languages.
  id: totrans-562
  prefs: []
  type: TYPE_NORMAL
  zh: 在编程方面，它们是无价之宝。它们的代码生成能力使程序员能够通过响应自然语言提示快速形成代码片段，这对于快速原型设计和模板代码生成特别有益。例如，通过在一系列代码示例上训练ChatGPT，语言模型可以产生，能够在多种编程语言中生成语法准确的代码段。
- en: Another area where AI models prove invaluable is the creation of documentation.
    By familiarizing models with a corpus of code comments and documentation, programmers
    can cultivate a language model capable of autonomously composing documentation
    for code snippets or entire codebases, thus streamlining the documentation process.
  id: totrans-563
  prefs: []
  type: TYPE_NORMAL
  zh: AI模型在文档创建方面也证明了自己的价值。通过让模型熟悉代码注释和文档的语料库，程序员可以培养出一个能够自主为代码片段或整个代码库编写文档的语言模型，从而简化了文档过程。
- en: In addition, these models can contribute to code optimization by suggesting
    techniques for simplifying or refining code segments. Trained on a diverse collection
    of optimized code samples, the generative model evolves into a competent advisor,
    providing recommendations for improving existing code. This enhancement serves
    to reduce code complexities, improve performances and facilitate maintenance efforts.
  id: totrans-564
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，这些模型可以通过建议简化或改进代码段的技术来促进代码优化。在多样化的优化代码样本上训练后，生成模型演变成一个合格的顾问，为改进现有代码提供建议。这种增强有助于降低代码复杂性、提高性能并简化维护工作。
- en: It should be noted that generative AI models, such as ChatGPT, facilitate error
    management, offering potential solutions to common coding errors (Sedkaoui [2023](b05.xhtml#bib44)).
    Drawing on a knowledge pool of sample codes containing errors and their respective
    remedies, the model evolves into a resource that can provide solutions to common
    coding errors. This automated approach to error resolution can significantly improve
    the programming experience.
  id: totrans-565
  prefs: []
  type: TYPE_NORMAL
  zh: 应当指出，生成式AI模型，如ChatGPT，有助于错误管理，提供常见编码错误的潜在解决方案（Sedkaoui [2023](b05.xhtml#bib44)）。通过利用包含错误及其相应补救措施的示例代码的知识库，该模型演变成一个能够提供常见编码错误解决方案的资源。这种自动化的错误解决方法可以显著改善编程体验。
- en: ChatGPT, for example, is a powerful tool that can be used for a variety of programming
    and debugging tasks. It can generate code snippets, optimize code, debug code,
    document code and review code.
  id: totrans-566
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，ChatGPT是一个强大的工具，可用于各种编程和调试任务。它可以生成代码片段、优化代码、调试代码、编写代码文档和审查代码。
- en: ChatGPT is able to perform these tasks by analyzing programming language functions,
    requirements, algorithms, data structures, code structures and error messages.
    ChatGPT can be used to improve programmer productivity and efficiency by automating
    many of the tasks involved in programming and debugging code.
  id: totrans-567
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT能够通过分析编程语言函数、需求、算法、数据结构、代码结构和错误信息来执行这些任务。ChatGPT可以通过自动化编程和调试代码中涉及的大量任务来提高程序员的效率和生产力。
- en: In essence, the advanced language capabilities of ChatGPT, or other generative
    AI models, are a boon to programmers and data scientists alike. By integrating
    this technology, workflows are streamlined, coding efficiency is increased and
    the overall development process achieves new levels of productivity and efficiency.
  id: totrans-568
  prefs: []
  type: TYPE_NORMAL
  zh: 从本质上讲，ChatGPT或其他生成式AI模型的先进语言能力对程序员和数据科学家来说都是一大福音。通过整合这项技术，工作流程得以简化，编码效率提高，整体开发过程实现了新的生产力和效率水平。
- en: '**Table 1.1.** *ChatGPT: a programming and code debugging tool*'
  id: totrans-569
  prefs: []
  type: TYPE_NORMAL
  zh: '**表1.1.** *ChatGPT：编程和代码调试工具*'
- en: '| Task | ChatGPT usage |'
  id: totrans-570
  prefs: []
  type: TYPE_TB
  zh: '| 任务 | ChatGPT的使用 |'
- en: '| --- | --- |'
  id: totrans-571
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- |'
- en: '| Code generation | Generating code snippets based on user input, facilitating
    the implementation of specific functions or features |'
  id: totrans-572
  prefs: []
  type: TYPE_TB
  zh: '| 代码生成 | 根据用户输入生成代码片段，便于实现特定功能或特性 |'
- en: '| Code optimization | Analyzing code to identify inefficiencies and recommend
    improvements, enhancing code performance and efficiency |'
  id: totrans-573
  prefs: []
  type: TYPE_TB
  zh: '| 代码优化 | 分析代码以识别低效之处并推荐改进，提高代码性能和效率 |'
- en: '| Debugging assistance | Analyzing code structure and error messages and providing
    debugging recommendations, helping to resolve errors |'
  id: totrans-574
  prefs: []
  type: TYPE_TB
  zh: '| 调试辅助 | 分析代码结构和错误信息，并提供调试建议，帮助解决错误 |'
- en: '| Code documentation | Analyzing code structure and requirements and suggesting
    best documentation practices, contributing to clear documentation |'
  id: totrans-575
  prefs: []
  type: TYPE_TB
  zh: '| 代码文档 | 分析代码结构和需求，并建议最佳文档实践，有助于清晰的文档 |'
- en: '| Code review | Analyzing code and coding standards, offering suggestions for
    improving code quality and reliability during code reviews |'
  id: totrans-576
  prefs: []
  type: TYPE_TB
  zh: '| 代码审查 | 分析代码和编码标准，在代码审查过程中提出改进代码质量和可靠性的建议 |'
- en: '*1.1.4\. Human–AI collaboration*'
  id: totrans-577
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '*1.1.4\. 人机协作*'
- en: The unique capabilities of AI systems create the foundations for a highly collaborative
    human–AI partnership that reinvents data analytics. By managing time-consuming,
    codified tasks in response to natural language instructions, this frees up human
    analysts to focus on high-level strategic objectives that draw on unique human
    skills such as creativity, intuition and reasoning.
  id: totrans-578
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能系统的独特能力为一种高度协作的人机伙伴关系奠定了基础，这种伙伴关系重新定义了数据分析。通过响应自然语言指令来管理耗时且规范化的任务，这使人类分析师能够专注于需要独特人类技能（如创造力、直觉和推理）的高级战略目标。
- en: Tomorrow’s data scientists will devote their time to valuable work, such as
    formulating the right analytical questions, interpreting results, challenging
    hypotheses and communicating insights. AI assistants will perform data preparation,
    modeling, calculation and reporting under the guidance of the analyst.
  id: totrans-579
  prefs: []
  type: TYPE_NORMAL
  zh: 未来的数据科学家将把时间投入到有价值的工作中，如制定正确的分析问题、解释结果、挑战假设和传达洞察。在分析师的指导下，人工智能助手将执行数据准备、建模、计算和报告等工作。
- en: This vision promises to greatly boost the productivity of data scientists and
    enable deeper, faster data analytics. What once took an entire team weeks (Davenport
    and Harris [2007](b05.xhtml#bib11); Sedkaoui and Khelfaoui [2020](b05.xhtml#bib46))
    could soon be achievable for a single analyst in hours, or minutes, by harnessing
    the synergies of human and machine intelligence. This division of labor translates
    into a mutually beneficial arrangement, where AI brings speed, rigor and objectivity,
    while humans provide contextual advice, validation and monitoring.
  id: totrans-580
  prefs: []
  type: TYPE_NORMAL
  zh: 这一愿景有望极大地提高数据科学家的生产力，并使数据分析更加深入和快速。过去需要整个团队数周时间（Davenport和Harris [2007](b05.xhtml#bib11)；Sedkaoui和Khelfaoui
    [2020](b05.xhtml#bib46)）的工作，现在通过利用人类和机器智能的协同效应，一个分析师可能在数小时或数分钟内就能完成，这是可能的。这种劳动分工转化为一种互利安排，其中人工智能带来速度、严谨和客观性，而人类则提供情境建议、验证和监控。
- en: In this human–AI symbiosis, repetitive, codified tasks are delegated to naturallanguage
    AI assistants, freeing up analysts for strategic reflection and imagination. Together,
    this hybrid team achieves synergies and augmented capabilities far beyond what
    either could do separately. The whole becomes greater than the sum of its parts.
    This collaborative workflow combines the best of human and machine intelligence.
  id: totrans-581
  prefs: []
  type: TYPE_NORMAL
  zh: 在这种人机共生关系中，重复且规范化的任务被委托给自然语言人工智能助手，从而让分析师有更多时间进行战略反思和想象。这个混合团队共同实现了远超各自单独所能达到的协同效应和增强能力。整体大于部分之和。这种协作工作流程结合了人类和机器智能的最好之处。
- en: 1.1.5\. *The power of prompt engineering*
  id: totrans-582
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1.1.5\. *提示工程的力量*
- en: To collaborate effectively, generative AI systems like ChatGPT need detailed
    instructions and feedback from humans. This is achieved through careful prompt
    design – the art of designing prompts that clearly communicate tasks and desired
    outcomes to AI.
  id: totrans-583
  prefs: []
  type: TYPE_NORMAL
  zh: 为了有效协作，像ChatGPT这样的生成式人工智能系统需要来自人类的详细指令和反馈。这通过精心设计的提示来实现——这是一种设计提示的艺术，旨在向人工智能清晰地传达任务和期望的结果。
- en: The prompts that analysts use to run ChatGPT have a considerable influence on
    the quality, usefulness and ethics of the results produced. Carefully crafted
    prompts, providing relevant context and setting clear expectations, are essential
    for successfully leveraging ChatGPT in data analytics.
  id: totrans-584
  prefs: []
  type: TYPE_NORMAL
  zh: 分析师用于运行ChatGPT的提示对生成结果的质量、有用性和伦理有相当大的影响。精心制作的提示，提供相关背景并设定明确的期望，对于在数据分析中成功利用ChatGPT至关重要。
- en: Prompt engineering involves an iterative process of refining prompts based on
    AI responses to improve relevance, accuracy and specificity (Jiang et al. [2020](b05.xhtml#bib22)).
    Analysts must learn to formulate concise prompts that effectively guide the AI
    to apply the appropriate knowledge and perspective to generate optimal results.
  id: totrans-585
  prefs: []
  type: TYPE_NORMAL
  zh: 提示工程涉及基于人工智能响应的迭代过程，以改进相关性、准确性和具体性（Jiang等人[2020](b05.xhtml#bib22)）。分析师必须学会制定简洁的提示，以有效地引导人工智能应用适当的知识和视角，生成最佳结果；
- en: Mastering prompt engineering is crucial to guiding AI systems towards productive
    contributions while avoiding potential pitfalls. The prompts provided by analysts
    will shape the integration of generative AI systems into analysis workflows (see
    [Appendix 1](b02.xhtml)).
  id: totrans-586
  prefs: []
  type: TYPE_NORMAL
  zh: 掌握提示工程对于引导人工智能系统做出有成效的贡献并避免潜在陷阱至关重要。分析师提供的提示将塑造生成式人工智能系统融入分析工作流程（见[附录1](b02.xhtml)）；
- en: 'To take full advantage of the promise of generative AI in the data analytics
    process, humans must thoughtfully guide the process. Certain best practices play
    a pivotal role in building an ethical and productive collaboration with ChatGPT
    and similar AI systems, for example:'
  id: totrans-587
  prefs: []
  type: TYPE_NORMAL
  zh: 为了充分利用生成式人工智能在数据分析过程中的潜力，人类必须深思熟虑地引导这个过程。某些最佳实践在建立与ChatGPT和类似人工智能系统的道德和高效协作中起着关键作用，例如：
- en: providing sufficient context in the prompts to indicate the appropriate capabilities
    and frame of reference;
  id: totrans-588
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在提示中提供足够的上下文，以表明适当的能力和参考框架；
- en: iteratively re-prompting based on results to address shortcomings;
  id: totrans-589
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 基于结果进行迭代重提以解决不足；
- en: critically reviewing AI-generated output for completion, accuracy, potential
    biases and errors;
  id: totrans-590
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 仔细审查人工智能生成的输出，以检查完整性、准确性、潜在偏差和错误；
- en: providing feedback via additional prompt*s* to further improve the AI system;
  id: totrans-591
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过额外的提示提供反馈，以进一步改进人工智能系统；
- en: maintaining human control over the direction of analysis, ethics considerations
    and decision-making.
  id: totrans-592
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 保持对分析方向、伦理考虑和决策的人类控制；
- en: Adherence to these principles will steer AI systems towards their highest utility,
    while keeping humans firmly in charge of strategy and ethics. Overall, the prospects
    are extremely exciting, as AI is poised to energize the way humans extract insights
    from data.
  id: totrans-593
  prefs: []
  type: TYPE_NORMAL
  zh: 遵循这些原则将引导人工智能系统向其最高效用发展，同时确保人类在战略和伦理方面牢牢掌控。总体而言，前景极为激动人心，因为人工智能即将激发人类从数据中提取洞察力的方式。
- en: 1.1.6\. *An ethical North Star*
  id: totrans-594
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1.1.6\. *道德指南针*
- en: As we further integrate these AI systems into data analytics and data science,
    certain considerations arise. As with any powerful technology, to realize the
    full potential of generative AI in data analytics requires careful thought and
    guidance. While AI systems like ChatGPT harbor no intrinsic bias or motivation,
    their outputs are only as ethical and objective as their human designers.
  id: totrans-595
  prefs: []
  type: TYPE_NORMAL
  zh: 随着我们进一步将这些人工智能系统集成到数据分析和数据科学中，出现了一些考虑因素。与任何强大的技术一样，要实现生成式人工智能在数据分析中的全部潜力，需要仔细思考和指导。虽然像ChatGPT这样的人工智能系统没有固有的偏见或动机，但它们的输出只有在其人类设计者的道德和客观性范围内才是道德和客观的；
- en: One of the main concerns is the possibility of errors or biased results in data
    science when relying on AI systems (Osoba and Welser [2017](b05.xhtml#bib34)).
    ChatGPT’s performance depends on the quality of the data on which it has been
    trained. Consequently, any existing biases in the data may be amplified, leading
    to non-objective results. However, this concern does not justify rejecting AI’s
    potential entirely; instead, it emphasizes the need to use diverse and representative
    data when training the model.
  id: totrans-596
  prefs: []
  type: TYPE_NORMAL
  zh: 主要担忧之一是依赖人工智能系统进行数据科学时可能出现的错误或偏差结果（Osoba和Welser[2017](b05.xhtml#bib34)）。ChatGPT的性能取决于其训练数据的质量。因此，数据中存在的任何偏差都可能被放大，导致非客观结果。然而，这种担忧并不能完全否定人工智能的潜力；相反，它强调了在训练模型时使用多样化和代表性数据的需求；
- en: We must remain vigilant, so that by integrating AI into analysis workflows,
    we do not inadvertently perpetuate historical biases in training data. Transparency
    around data provenance and algorithmic limitations is crucial. Extensive human
    surveillance and correction of AI systems offer another vital guarantee.
  id: totrans-597
  prefs: []
  type: TYPE_NORMAL
  zh: 我们必须保持警惕，以确保通过将人工智能集成到分析工作流程中，我们不会无意中延续训练数据中的历史偏差。关于数据来源和算法限制的透明度至关重要。对人工智能系统进行广泛的人类监督和纠正提供了另一个重要保障；
- en: 'Overall, by proactively identifying and mitigating risks early, we can steer
    AI towards unambiguously positive outcomes that elevate society. The promise is
    too great not to pursue, but we must do so with wisdom and principle.  ## 1.2\.
    Revolutionizing the data analytics process with ChatGPT'
  id: totrans-598
  prefs: []
  type: TYPE_NORMAL
  zh: '总体而言，通过积极识别和早期缓解风险，我们可以引导AI朝着明确积极的成果发展，提升社会。这个承诺太大了，不能不追求，但我们必须以智慧和原则去追求。  ##
    1.2\. 使用ChatGPT革命化数据分析过程'
- en: The integration of generative AI systems such as ChatGPT has the potential to
    profoundly accelerate the data analytics process. By automating many repetitive
    and codified tasks, ChatGPT enables analysts to focus their time on high-value
    objectives that leverage human judgment, creativity and strategy.
  id: totrans-599
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT等生成式AI系统的集成有可能极大地加速数据分析过程。通过自动化许多重复和编码化的任务，ChatGPT使分析师能够将时间集中在高价值目标上，这些目标利用人类判断、创造力和策略。
- en: 1.2.1\. *The numbers behind ChatGPT’s potential*
  id: totrans-600
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1.2.1\. *ChatGPT潜在能力的数字背后*
- en: It is clear that AI-based systems are poised to bring transformative changes
    to various spheres of life. The underlying mechanism of this technology involves
    advanced machine learning algorithms that examine vast repositories of data, such
    as books, articles and web pages.
  id: totrans-601
  prefs: []
  type: TYPE_NORMAL
  zh: 很明显，基于AI的系统有望为生活的各个领域带来变革性的变化。这种技术的潜在机制涉及先进的机器学习算法，这些算法检查大量的数据存储库，如书籍、文章和网页。
- en: This intelligent AI agent is based on transformers, a type of attention-based
    deep neural network particularly effective for natural language tasks (Tingiris
    and Kinsella [2021](b05.xhtml#bib55)). Transformers integrate aspects of supervised,
    unsupervised and reinforcement learning.
  id: totrans-602
  prefs: []
  type: TYPE_NORMAL
  zh: 这个智能AI代理基于Transformer，这是一种特别有效的基于注意力的深度神经网络，特别适用于自然语言任务（Tingiris和Kinsella [2021](b05.xhtml#bib55)）。Transformer集成了监督学习、无监督学习和强化学习的方面。
- en: During pre-training, the model parameters are trained in an unsupervised manner
    on massive text corpora to learn language patterns, semantics and world knowledge.
    The pre-trained model is then refined using reinforcement learning based on human
    feedback to optimize its conversational capabilities and human alignment.
  id: totrans-603
  prefs: []
  type: TYPE_NORMAL
  zh: 在预训练期间，模型参数在大量文本语料库上以无监督的方式进行训练，以学习语言模式、语义和世界知识。然后，使用基于人类反馈的强化学习对预训练模型进行细化，以优化其对话能力和与人类的对齐。
- en: Supervised learning provides fine-tuning on specific tasks, such as classification
    using labeled training examples to improve performance. So, while transformers
    and neural networks form the core architecture, unsupervised pretraining, reinforcement
    fine-tuning and supervised customization combine synergistically.
  id: totrans-604
  prefs: []
  type: TYPE_NORMAL
  zh: 监督学习通过使用标记的训练示例对特定任务进行微调，例如分类，以提高性能。因此，虽然Transformer和神经网络构成了核心架构，但无监督预训练、强化微调和监督定制协同结合。
- en: This reflects the real-world practice of mixing learning paradigms to capitalize
    on their complementary strengths. The use of self-supervised pre-training, followed
    by downstream task tuning, has become a common pattern in state-of-the-art deep
    learning. ChatGPT illustrates the strength of hybrid approaches. Its foundation
    is based on recursive self-improvement through machine learning, guided by human
    feedback.
  id: totrans-605
  prefs: []
  type: TYPE_NORMAL
  zh: 这反映了现实世界中混合学习模式以利用其互补优势的实践。使用自监督预训练，然后进行下游任务调整，已成为最先进深度学习中的常见模式。ChatGPT展示了混合方法的强大之处。其基础是基于机器学习的递归自我改进，由人类反馈引导。
- en: As a result, ChatGPT is proving to be a powerful tool with many applications,
    including enhanced chatbots, automated content creation and more efficient search
    engines (Taecharungroj [2023](b05.xhtml#bib52); Thorp [2023](b05.xhtml#bib54)).
    In addition, the potential for improving language translation has the capacity
    to revolutionize intercultural communication.
  id: totrans-606
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，ChatGPT正在证明是一个强大的工具，具有许多应用，包括增强聊天机器人、自动内容创作和更高效的搜索引擎（Taecharungroj [2023](b05.xhtml#bib52)；Thorp
    [2023](b05.xhtml#bib54)）。此外，提高语言翻译的潜力有能力革命化跨文化交流。
- en: 'According to a recent McKinsey report ([2023](b05.xhtml#bib29)), the potential
    economic impact of generative AI can be assessed through:'
  id: totrans-607
  prefs: []
  type: TYPE_NORMAL
  zh: 根据麦肯锡最近的一份报告([2023](b05.xhtml#bib29))，生成式AI的潜在经济影响可以通过以下方式评估：
- en: an analysis of over 60 organizational use cases across all sectors and functions,
    estimating USD 2.6–4.4 billion in the potential annual value creation worldwide;
  id: totrans-608
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对所有行业和职能超过60个组织用例的分析，估计全球潜在年度价值创造为26-44亿美元；
- en: modeling the impact on automation of work activities in all professions, which
    could contribute 0.1–0.6% per year to growth in productivity up to 2040.
  id: totrans-609
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 模型化所有职业中工作活动对自动化的影响，这可能在2040年之前每年为生产力的增长贡献0.1–0.6%。
- en: Generative AI represents a radical improvement in capabilities over previous
    AI techniques.
  id: totrans-610
  prefs: []
  type: TYPE_NORMAL
  zh: 生成式AI在能力上相对于之前的AI技术有根本性的改进。
- en: Models like GPT-3 underpin many generative AI applications, trained on massive
    datasets to perform a variety of natural language or visual input-based tasks.
    According to the Mckinsey report, the most significant revenue impact is estimated
    in the banking (up from 2.8 to 4.7%), high-tech (from 4.8 to 9.3%) and pharmaceutical
    (from 2.6 to 4.5%) industries. In retail, marketing and customer service use cases
    could generate revenue growth from 1.2 to 2%, worth USD 400–660 billion per year.
  id: totrans-611
  prefs: []
  type: TYPE_NORMAL
  zh: 类似于GPT-3的模型支撑了许多生成式AI应用，这些模型在大量数据集上训练，以执行各种基于自然语言或视觉输入的任务。根据麦肯锡报告，最大的收入影响预计在银行（从2.8%上升到4.7%）、高科技（从4.8%上升到9.3%）和制药（从2.6%上升到4.5%）行业。在零售、营销和客户服务用例中，可能产生1.2%到2%的收入增长，每年价值400–6600亿美元。
- en: IMB’s report ([2023](b05.xhtml#bib21)) on enterprise generative AI is along
    the same lines, highlighting concrete examples of the successful adoption of these
    technologies by leading companies, such as Lloyds, which used chatbots powered
    by AI text generation to deliver fast, consistent responses to customers; and
    Bouygues Telecom, which deployed virtual assistants based on natural language
    processing to simplify customer–agent interactions in its call centers, practical
    applications which well and truly illustrate the potential of generative AI to
    streamline and optimize customer engagement.
  id: totrans-612
  prefs: []
  type: TYPE_NORMAL
  zh: IBM关于企业生成式AI的报告([2023](b05.xhtml#bib21))同样强调了领先公司成功采用这些技术的具体例子，例如Lloyds，它使用由AI文本生成驱动的聊天机器人为客户提供快速、一致的反应；以及Bouygues
    Telecom，它在呼叫中心部署基于自然语言处理的虚拟助手，简化客户与代理之间的互动，这些实际应用真正展示了生成式AI在简化客户参与和优化方面的潜力。
- en: '**Table 1.2.** *From basic to generative AI: a timeline*'
  id: totrans-613
  prefs: []
  type: TYPE_NORMAL
  zh: '**表1.2.** *从基础到生成式AI：时间线*'
- en: '| Type | Year | Milestone |'
  id: totrans-614
  prefs: []
  type: TYPE_TB
  zh: '| 类型 | 年份 | 里程碑 |'
- en: '| --- | --- | --- |'
  id: totrans-615
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- | --- |'
- en: '| **Basic chatbots** | 1966 | ELIZA, the first chatbot, developed by Weizenbaum
    |'
  id: totrans-616
  prefs: []
  type: TYPE_TB
