  type: TYPE_NORMAL
  zh: 在一个智能家居中，例如，物联网设备可以收集关于人们周围环境和活动的实时数据。人工智能，通过对这些数据的处理，可以预测行为和需求，调整温度、照明、能源消耗，甚至在没有直接人工干预的情况下调整家庭安全。想象一个能够识别家庭成员习惯并自动调整以改善能源效率或更有效地应对紧急情况的AI系统。
