  zh: 存储库中包含一个 CSV 文件，描述了自我状态的行为，您可以修改此文件以使自我状态以不同的方式响应。
- en: Summary
  id: totrans-1616
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: By combining Transactional Analysis theory with an advanced generative AI model,
    like ChatGPT 4, we can effectively represent the inner workings of the mind as
    described by Second Level TA Structural Analysis.
  id: totrans-1617
  prefs: []
  type: TYPE_NORMAL
  zh: 通过将交易分析理论（Transactional Analysis）与先进的生成式 AI 模型，如 ChatGPT 4 结合，我们可以有效地表示由二级 TA
    结构分析描述的内心工作机制。
- en: This opens the doorway to being able to provide chatbot services tailored to
    the mood of the individual questioner and allows us to perform qualitative question
    analysis like the way people process the questions with which they are faced.
  id: totrans-1618
  prefs: []
  type: TYPE_NORMAL
  zh: 这为能够提供针对个人提问者情绪定制的聊天机器人服务打开了大门，并允许我们像人们处理他们面临的问题那样进行定性问题分析。
- en: It also allows someone who really does have a life-decision to make, to consider
    every single perspective that could possibly be brought to bear on the issue,
    before making their decision.
  id: totrans-1619
  prefs: []
  type: TYPE_NORMAL
  zh: 它还允许那些真正需要做出生活决策的人，在做出决定之前考虑可能对问题产生影响的每一个观点。
