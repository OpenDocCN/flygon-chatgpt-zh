- en: 'Chapter 1:'
  id: totrans-26
  prefs:
  - PREF_H1
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第一章：
- en: Introduction to ChatGPT
  id: totrans-27
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: ChatGPT 简介
- en: Welcome to Your Business Adventure with AI
  id: totrans-28
  prefs:
  - PREF_H1
  - PREF_H2
  type: TYPE_NORMAL
  zh: 欢迎您加入人工智能商业冒险之旅
- en: This is "ChatGPT AI Business Prompts." Welcome. This tutorial is intended to
    help you use ChatGPT and artificial intelligence to revolutionize your company's
    operations. This book offers you ready-to-use templates that will save you time
    and propel business growth, regardless of your level of experience with AI.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 这是“ChatGPT AI 商业提示”。欢迎。本教程旨在帮助您使用 ChatGPT 和人工智能来革新公司的运营。本书为您提供现成的模板，无论您对人工智能的经验如何，都将节省您的时间并推动业务增长。
- en: How to Make the Most of This Book
  id: totrans-30
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 如何充分利用本书
- en: Being Aware of the Prompt Structure
  id: totrans-31
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 注意提示结构
- en: 'Each prompt in this book adheres to a tried-and-true structure:'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 本书中的每个提示都遵循一个经过验证的结构：
- en: Giving ChatGPT pertinent background information is known as "context setting."
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 向 ChatGPT 提供相关的背景信息被称为“设置上下文”。
- en: '2\. **Specific Instructions**: Detailed guidelines on your desired outcome'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 2. **具体指令**：关于您期望的结果的详细指南
- en: '3\. **Output Format**: Outlining the format you desire for the response'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 3. **输出格式**：概述您希望响应的格式
- en: '4\. **Additional Parameters**: Any particular specifications or limitations'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 4. **附加参数**：任何特定的规格或限制
- en: 'Well-Structured Prompt Example:'
  id: totrans-37
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 结构良好的提示示例：
- en: '[PRE0]'
  id: totrans-38
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Advice for Improving Outcomes
  id: totrans-39
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 提高成果的建议
- en: '1\. Be Specific: "Write a follow-up email to a potential client who attended
    our product demo last week" is a better alternative to "Write a business email."'
  id: totrans-40
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1. 一定要具体：“为上周参加我们产品演示的潜在客户撰写跟进邮件”比“写一封商业邮件”更好。
- en: 2\. Give background information on the company, the target market, and industry
    details.
  id: totrans-41
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2. 提供公司、目标市场和行业细节的背景信息。
- en: Present circumstances
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 当前情况
- en: The intended result
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 预期的结果
- en: 3\. Iterate and refine - Begin with the basic question - Examine the response.
  id: totrans-44
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3. 迭代和改进 - 从基本问题开始 - 检查响应。
- en: '- Include more information or restrictions. - Exp Question.'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: '- 包含更多信息或限制。 - 提出问题。'
- en: -the other strategies refine
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: -其他策略进行细化
- en: -prompts that work.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: -有效的提示。
- en: '4\. Best Practices: Use succinct, simple wording; divide complicated requests
    into manageable chunks.'
  id: totrans-48
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4. 最佳实践：使用简洁、简单的措辞；将复杂的要求分解成可管理的部分。
- en: Indicate the required tone and style, include any pertinent restrictions or
    limitations, and, if necessary, request certain formats.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 指出所需的语气和风格，包括任何相关的限制或限制，并在必要时请求特定的格式。
- en: Typical Errors to Avoid
  id: totrans-50
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 避免的典型错误
- en: 1\. Being very ambiguous
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 非常模糊
- en: '- Insufficient: "Help me with marketing." - More: "Create a 30-day social media
    marketing plan for a local coffee shop."'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: '- 不充分： “帮我做市场营销。” - 更具体： “为当地咖啡馆创建一个为期30天的社交媒体营销计划。”'
- en: 2\. Prompts that are too complicated
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 过于复杂的提示
- en: '- impoverished: "I need a really long, detailed, comprehensive, in-depth analysis..."'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: '- 贫乏： “我需要一份非常长、详细、全面、深入的分析……”'
- en: '- More Effective: "Provide a 5-point market analysis focusing on [specific
    aspects]."'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: '- 更有效： “提供一份关注[特定方面]的5点市场分析。”'
- en: 3\. Ignoring the Context
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 忽略上下文
- en: '"Write a customer email" is a poor choice.'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: “撰写客户邮件”不是一个好的选择。
- en: '- More Successful: "Provide a 5-point market analysis focusing on [specific
    aspects]."'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: -更成功的提示：“提供一份关注[特定方面]的5点市场分析。”
- en: Examining Your Suggestions
  id: totrans-59
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 检查您的建议
- en: 'Prior to putting any prompt into practice in your company:'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 在将任何提示付诸实践之前，在您的公司：
- en: 1\. Give it several tests.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 进行多次测试。
- en: 2\. Confirm the information's correctness. 3\. Modify in light of the findings
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 确认信息的准确性。3. 根据发现进行修改
- en: 4\. Store variants that work.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 存储有效的变体。
- en: 5\. Note any restrictions.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 注意任何限制。
- en: All Set to Start
  id: totrans-65
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 准备就绪，开始使用
- en: 'You''ll find thoughtfully designed prompts for a variety of business responsibilities
    in the upcoming chapters. For the best outcomes, each prompt has been tried and
    improved. Keep in mind to: - Tailor prompts to your requirements.'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 在接下来的章节中，您将找到为各种商业职责精心设计的提示。为了获得最佳结果，每个提示都经过尝试和改进。请记住：- 根据您的需求定制提示。
- en: Keep prompts that you find effective and try out several variations.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 保持您发现有效的提示，并尝试几种不同的变体。
- en: Record the successful results.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 记录成功的结果。
- en: Let's go on to Chapter 2, where we'll explore marketing and brand-building strategies
    that can have an instant influence on the expansion of your company.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们进入第二章，在那里我们将探讨可以立即影响您公司扩张的营销和品牌建设策略。
- en: 'Chapter 2:'
  id: totrans-70
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第二章：
- en: Ideas for Marketing and Branding
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 市场营销和品牌建设想法
- en: Key Questions for Marketing Strategies
  id: totrans-72
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 营销策略的关键问题
- en: Development of no Brand Voice[PRE1]
  id: totrans-73
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 无品牌声音的发展[PRE1]
- en: 'You work as a professional copywriter for products. Write enticing product
    descriptions for [name of product]. Among the salient features are [features].
    [demographic] is the target audience. Among the advantages are [benefits]. Kindly
    write:'
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 你作为产品专业文案撰写者，为[产品名称]撰写吸引人的产品描述。显著特点包括[特点]。[受众]是目标受众。优点包括[好处]。请撰写以下内容：
- en: 1\. A condensed (50-word) version
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 简洁版（50字）
- en: 2\. A comprehensive (200-word) version
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 综合版（200字）
- en: 3\. Three main selling points
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 三个主要卖点
- en: 4\. An optimized title[PRE2]
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 优化的标题[PRE2]
- en: 'Make a thorough content strategy for the upcoming 30 days in your capacity
    as a content marketing strategist. [Description] is the name of my company. [Details]
    is the target audience. Include: 1\. Topics and themes for the content'
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 制作一份未来30天的详细内容策略，作为内容营销策略师。[描述]是我公司的名称。[细节]是目标受众。包括：1. 内容的主题和主题
