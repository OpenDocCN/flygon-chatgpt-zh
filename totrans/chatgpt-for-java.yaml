- en: As you can see from Listing [4-1](#PC1), Whisper was able to understand all
    the punctuation in the audio, identify all the foreign words (of which there were
    several), and understand the names as well as the company name (“duolingo”) within
    a URL! Of course, if you noticed, it could also understand the difference between
    “wood” and “would.”
  id: totrans-526
  prefs: []
  type: TYPE_NORMAL
  zh: 如你所见，从列表 [4-1](#PC1) 中可以看出，Whisper 能够理解音频中的所有标点符号，识别所有外语（其中有很多），并且理解 URL 中的名字以及公司名称（“duolingo”）！当然，如果你注意到了，它也能理解“wood”和“would”之间的区别。
