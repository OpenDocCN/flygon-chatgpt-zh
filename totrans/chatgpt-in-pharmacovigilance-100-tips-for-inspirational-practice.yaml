- en: Vendor Adverse Event Reporting
  id: totrans-2133
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 供应商不良事件报告
- en: In the operational phase, ChatGPT can aid in structuring and automating the
    initial triage of adverse event reports. It can provide support by creating standardized
    forms and reporting templates that comply with regulatory guidelines, which can
    be used by the outsourcing partner to ensure consistency in data capture and reporting.
  id: totrans-2134
  prefs: []
  type: TYPE_NORMAL
  zh: 在运营阶段，ChatGPT可以帮助构建和自动化不良事件报告的初步分类。它可以通过创建符合监管指南的标准化表格和报告模板来提供支持，外包合作伙伴可以使用这些模板确保数据捕获和报告的一致性。
- en: An example of the triage of adverse event (AE) reports is a critical step that
    determines the urgency and priority with which these reports are handled. Utilizing
    ChatGPT for this process involves leveraging its advanced language processing
    and classification capabilities to assist PV professionals.
  id: totrans-2135
  prefs: []
  type: TYPE_NORMAL
  zh: 不良事件报告（AE）分类的一个例子是确定这些报告处理紧迫性和优先级的临界步骤。利用ChatGPT进行此过程涉及利用其高级语言处理和分类能力来协助PV专业人员。
- en: '1\. Initial Report Classification: Employ ChatGPT to perform an initial assessment
    of incoming AE reports. The AI can analyze the textual data to classify the reports
    based on seriousness, expectedness, and causality.'
  id: totrans-2136
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 初步报告分类：使用ChatGPT对收到的AE报告进行初步评估。AI可以分析文本数据，根据严重性、预期性和因果关系对报告进行分类。
- en: '2\. Seriousness Assessment: ChatGPT can be programmed to identify key terms
    and patient outcomes that indicate a serious adverse event, such as hospitalization,
    disability, congenital anomalies, or life-threatening conditions, and prioritize
    these reports for expedited processing.'
  id: totrans-2137
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 严重性评估：ChatGPT可以被编程以识别关键术语和患者结果，这些术语和结果表明存在严重不良事件，例如住院、残疾、先天性异常或危及生命的情况，并将这些报告优先处理以加快处理速度。
- en: '3\. Expectedness Evaluation: Utilize ChatGPT to cross-reference the event terms
    against the product label or Summary of Product Characteristics (SmPC) to determine
    the expectedness of the event. Unexpected events can be flagged for immediate
    attention.'
  id: totrans-2138
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 预期性评估：利用ChatGPT将事件术语与产品标签或产品特性总结（SmPC）进行交叉引用，以确定事件的预期性。意外事件可以被标记为需要立即关注。
- en: '4\. Data Completeness Check: Incorporate ChatGPT to assess the completeness
    of the information provided in the AE report, such as patient demographics, clinical
    details, and drug information. Incomplete reports can be triaged for follow-up
    to obtain missing information.'
  id: totrans-2139
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 数据完整性检查：将ChatGPT纳入评估AE报告中提供的信息的完整性，例如患者人口统计学、临床细节和药物信息。不完整的报告可以分类为后续跟进以获取缺失信息。
- en: '5\. Signal Detection Support: Leverage ChatGPT’s pattern recognition capabilities
    to assist in the identification of potential signals from the AE reports, which
    may necessitate further investigation.'
  id: totrans-2140
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 信号检测支持：利用ChatGPT的模式识别能力，协助从AE报告中识别潜在的信号，这可能需要进一步的调查。
- en: '6\. Regulatory Reporting Criteria: ChatGPT can be programmed to understand
    regulatory reporting requirements, such as those outlined by the FDA, EMA, or
    ICH, and triage reports accordingly based on regulatory timelines and obligations.'
  id: totrans-2141
  prefs: []
  type: TYPE_NORMAL
  zh: 6. 监管报告标准：ChatGPT可以被编程以理解监管报告要求，例如由FDA、EMA或ICH概述的要求，并根据监管时间表和义务相应地对报告进行分类。
- en: '7\. Automated Workflow Routing: Following triage, ChatGPT can assist in routing
    the reports to the appropriate PV teams or individuals responsible for follow-up
    actions, such as medical review, case processing, or regulatory submission.'
  id: totrans-2142
  prefs: []
  type: TYPE_NORMAL
  zh: 7. 自动化工作流程路由：在分类后，ChatGPT可以协助将报告路由到适当的PV团队或个人，他们负责后续行动，例如医学审查、案件处理或监管提交。
- en: '8\. Training and Machine Learning: Utilize ChatGPT’s machine learning capabilities
    to continually train the system with new data, enhancing the accuracy of the triage
    process over time.'
  id: totrans-2143
  prefs: []
  type: TYPE_NORMAL
  zh: 8. 培训和机器学习：利用ChatGPT的机器学习能力，不断用新数据训练系统，随着时间的推移提高分类过程的准确性。
- en: '9\. Quality Assurance: Implement a quality assurance step where ChatGPT''s
    triage outputs are periodically reviewed by PV experts to ensure accuracy and
    reliability.'
  id: totrans-2144
  prefs: []
  type: TYPE_NORMAL
  zh: 9. 质量保证：实施质量保证步骤，其中PV专家定期审查ChatGPT的分类输出，以确保准确性和可靠性。
- en: '10\. Integration with PV Systems: Ensure that ChatGPT is seamlessly integrated
    into existing PV databases and case management systems to facilitate efficient
    data flow and triage actions.'
  id: totrans-2145
  prefs: []
  type: TYPE_NORMAL
  zh: 10. 与PV系统的集成：确保ChatGPT无缝集成到现有的PV数据库和案件管理系统，以促进数据流和分类行动的效率。
- en: When using ChatGPT or any AI technology in the triage of adverse event reports,
    it is vital to maintain a system of checks and balances with PV experts to oversee
    and validate the AI’s work.
  id: totrans-2146
  prefs: []
  type: TYPE_NORMAL
  zh: 当在不良事件报告的分类中使用ChatGPT或任何AI技术时，与PV专家保持检查和平衡的系统对于监督和验证AI的工作至关重要。
- en: Additionally, compliance with data privacy and security regulations must be
    upheld throughout the process.
  id: totrans-2147
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，在整个过程中必须遵守数据隐私和安全法规。
- en: Performance Monitoring
  id: totrans-2148
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 性能监控
- en: To maintain high-quality standards in PV, ChatGPT can help establish key performance
    indicators (KPIs) and quality checks. It can be used to draft audit checklists
    and assist in the regular monitoring of the outsourcing partner’s performance
    against established benchmarks.
  id: totrans-2149
  prefs: []
  type: TYPE_NORMAL
  zh: 为了保持PV的高质量标准，ChatGPT可以帮助建立关键绩效指标（KPIs）和质量检查。它可以用来起草审计清单，并协助定期监控外包合作伙伴对既定基准的执行情况。
- en: Establishing KPIs using ChatGPT involves leveraging its capability to process
    and analyze data, providing insights that can drive performance improvements in
    PV operations.
  id: totrans-2150
  prefs: []
  type: TYPE_NORMAL
  zh: 使用ChatGPT建立KPI涉及利用其处理和分析数据的能力，提供可以推动PV运营性能改进的见解。
- en: Table 17\. KPIs monitoring.
  id: totrans-2151
  prefs: []
  type: TYPE_NORMAL
  zh: 表17. KPI监控。
- en: '| KPI (Key Performance Indicator) | Target | Explanation for Calculation |'
  id: totrans-2152
  prefs: []
  type: TYPE_TB
  zh: '| KPI（关键绩效指标） | 目标 | 计算说明 |'
- en: '| AE Report Submission Timeliness | ≥ 98% of reports submitted on time | Calculate
    the percentage of adverse event reports submitted before the regulatory deadline
    over the total number of reports due. This KPI measures regulatory compliance
    and timeliness of submissions. |'
  id: totrans-2153
  prefs: []
  type: TYPE_TB
  zh: '| AE报告提交及时性 | ≥98%的报告按时提交 | 计算在监管截止日期前提交的不良事件报告占总报告数的百分比。此关键绩效指标衡量监管合规和提交的及时性。|'
- en: '| Case Processing Accuracy | ≥ 99% accuracy rate | Determine the proportion
    of adverse event cases processed without errors over the total cases processed.
    This KPI assesses the precision of data entry and case processing. |'
  id: totrans-2154
  prefs: []
  type: TYPE_TB
  zh: '| 案例处理准确性 | ≥99%的准确率 | 确定在总处理案例中无错误处理的案例比例。此关键绩效指标评估数据录入和案例处理的精确度。|'
- en: '| Signal Detection Efficiency | Identification of signals within 5 days of
    data availability | Measure the time taken from the availability of data to the
    initial identification of a potential signal. This KPI evaluates the speed and
    effectiveness of the signal detection process. |'
  id: totrans-2155
  prefs: []
  type: TYPE_TB
  zh: '| 信号检测效率 | 数据可用后5天内识别信号 | 测量从数据可用到初步识别潜在信号所需的时间。此关键绩效指标评估信号检测过程的速度和有效性。|'
- en: '| PV Training Compliance | 100% of staff trained annually | Monitor the percentage
    of PV personnel who have completed mandatory training sessions annually. This
    KPI ensures adherence to internal and regulatory training requirements. |'
  id: totrans-2156
  prefs: []
  type: TYPE_TB
  zh: '| PV培训合规 | 每年对100%的员工进行培训 | 监控每年完成强制性培训课程的PV人员比例。此关键绩效指标确保遵守内部和监管培训要求。|'
- en: '| PV System Uptime | ≥ 99.5% uptime | Calculate the total operational time
    of the PV system over a specified period, excluding any downtime. This KPI assesses
    the reliability and availability of PV systems. |'
  id: totrans-2157
  prefs: []
  type: TYPE_TB
  zh: '| PV系统正常运行时间 | ≥99.5%的正常运行时间 | 计算在指定期间内PV系统的总运行时间，不包括任何停机时间。此关键绩效指标评估PV系统的可靠性和可用性。|'
- en: '| Customer Satisfaction Index | Score of ≥ 85 out of 100 | Use surveys and
    feedback tools to gauge stakeholder satisfaction with PV services, rating the
    service on various aspects such as responsiveness, clarity, and effectiveness.
    |'
  id: totrans-2158
  prefs: []
  type: TYPE_TB
  zh: '| 客户满意度指数 | 100分中的≥85分 | 使用调查和反馈工具衡量利益相关者对PV服务的满意度，对服务的响应性、清晰度和有效性等方面进行评分。|'
- en: '| Risk Management Plan (RMP) Implementation | 100% of RMP activities completed
    as scheduled | Track the completion rate of risk management plan activities against
    the planned schedule. This KPI measures the execution of risk mitigation strategies.
    |'
  id: totrans-2159
  prefs: []
  type: TYPE_TB
  zh: '| 风险管理计划（RMP）实施 | 100%的RMP活动按计划完成 | 跟踪风险管理计划活动完成率与计划进度的对比。此关键绩效指标衡量风险缓解策略的执行情况。|'
- en: '| Audit and Inspection Readiness | No critical findings during audits | Assess
    the outcome of regulatory audits and inspections, aiming for no critical or major
    findings. This KPI is indicative of the robustness of PV practices and preparedness.
    |'
  id: totrans-2160
  prefs: []
  type: TYPE_TB
  zh: '| 审计和检查准备情况 | 审计中无重大发现 | 评估监管审计和检查的结果，目标是避免出现重大或关键发现。此关键绩效指标表明PV实践的稳健性和准备情况。|'
- en: '| Literature Review Completion | 100% of literature reviewed within the stipulated
    timeline | Calculate the percentage of literature review tasks completed within
    the predefined timeline set by the PV department. This KPI ensures comprehensive
    monitoring of safety information. |'
  id: totrans-2161
  prefs: []
  type: TYPE_TB
  zh: '| 文献综述完成情况 | 在规定的时限内完成100%的文献综述 | 计算在PV部门设定的预定义时限内完成的文献综述任务百分比。此关键绩效指标确保对安全信息的全面监控。|'
- en: By setting these KPIs with the assistance of ChatGPT, pharmaceutical organizations
    can maintain a high standard of PV practices, ensuring patient safety and regulatory
    compliance.
  id: totrans-2162
  prefs: []
  type: TYPE_NORMAL
  zh: 通过ChatGPT的帮助设置这些KPI，制药组织可以维持高标准的PV实践，确保患者安全和监管合规。
- en: Feedback Loop and Continuous Improvement
  id: totrans-2163
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 反馈循环与持续改进
- en: ChatGPT can be utilized to develop feedback mechanisms, where insights and observations
