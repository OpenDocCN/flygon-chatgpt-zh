  zh: '**基本提示**是，本质上，一个直接和直接的提问或指令。常见的例子包括像“什么是人工智能？”或“写一篇关于气候变化的介绍。”这些提示很容易制定和使用，对于获取一般性答案很有用，但它们在处理更具体任务或复杂情境时存在局限性。基本提示通常不提供关于格式、语调或响应范围的具体细节，这可能导致结果不够定制，无法满足用户的特定需求。'
