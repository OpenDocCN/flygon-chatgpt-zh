    ****t**wo** ****cha**tbot**s, ****t**he** ****ma**in** ****a**im** ****o**f**
    ****A**I** (****a**nd** ****o**f** ****compu**tation**al ****dev**ice**s ****i**n**
    ****gen**era**l) ****i**s** ****t**o** ****ta**ke** ****u**p** ****t**he** ****gr**unt**
    ****wo**rk** ****hist**orical**ly ****do**ne** ****b**y** ****u**s** ****hu**man**s.
    ****W**e** ****us**ed** ****t**o** ****ha**ve** ****t**o** ****co**unt** ****th**ing**s
    ****ours**elve**s, ****un**til** ****w**e** ****inv**ente**d ****mac**hine**s
    ****t**o** ****co**unt** ****f**or** ****u**s**. ****W**e** ****us**ed** ****t**o**
    ****ha**ve** ****t**o** ****so**lve** ****pro**blem**s ****a**nd** ****pre**dic**t
    ****tr**end**s ****ours**elve**s, ****un**til** ****w**e** ****inv**ente**d ****algo**rithm**s
    ****t**o** ****d**o** ****th**at** ****f**or** ****u**s**. ****W**e** ****us**ed**
    ****t**o** ****ha**ve** ****t**o** ****th**ink** ****a**nd** ****sp**eak** ****f**or**
    ****ours**elve**s, ****un**til**… ****y**ou** ****g**et** ****t**he** ****pic**tur**e.'
  id: totrans-318
  prefs: []
  type: TYPE_NORMAL
  zh: 根据德勤在2020年进行的一项调查，其中一家“四大”会计师事务所，超过67%的今天运营的公司在其日常运营中使用某种形式的机器学习，这一比例逐年增长（布朗，2021）。正如我们从图灵测试和我们的前两个聊天机器人的对话中看到的那样，人工智能（以及一般计算设备）的主要目标是承担我们人类历史上一直承担的繁琐工作。我们曾经不得不自己计数，直到我们发明了机器来为我们计数。我们曾经不得不自己解决问题和预测趋势，直到我们发明了算法来为我们做这些。我们曾经不得不自己思考和说话，直到……你明白了。
- en: '****Wh**ile** ****ma**ny** ****mem**ber**s ****o**f** ****t**he** ****gen**era**l
