- en: Introduction
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 引言
- en: Welcome to the age of artificial intelligence, a time when the boundaries of
    innovation are constantly being pushed. Just a few years ago, ChatGPT became a
    global phenomenon, paving the way for conversations with machines that seemed
    almost human. Today, a new revolution is underway, and its name is DeepSeek.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 欢迎来到人工智能时代，这是一个创新边界不断被推高的时代。就在几年前，ChatGPT成为全球现象，为与机器进行看似几乎人类的对话铺平了道路。今天，一场新的革命正在展开，它的名字叫DeepSeek。
- en: 'If you''re reading this, you''re intrigued by what could be one of the biggest
    technological disruptions of our time. DeepSeek isn''t just an alternative to
    giants like ChatGPT or Gemini: it''s a real game-changer.'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你正在阅读这篇文章，你对可能是我们这个时代最大的技术颠覆之一感到好奇。DeepSeek不仅仅是对ChatGPT或Gemini等巨头的替代品：它是一个真正的游戏改变者。
- en: Built with an open-source approach, an innovative architecture called MoE (Mixture
    of Experts), and a vision focused on accessibility, DeepSeek promises not only
    to democratize artificial intelligence, but also to allow everyone – including
    you – to benefit from it.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 采用开源方法，一种名为MoE（专家混合）的创新架构，以及关注易用性的愿景，DeepSeek承诺不仅将人工智能民主化，而且让每个人——包括你——都能从中受益。
- en: In this book, I'll take you step-by-step through this revolution. You'll discover
    why DeepSeek is so special, how it outperforms its competitors, and most importantly,
    how you can use it to transform your daily life and your finances.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 在这本书中，我将一步步带你走进这场革命。你会发现为什么DeepSeek如此特别，它如何超越其竞争对手，以及最重要的是，如何利用它来改变你的日常生活和财务状况。
- en: Whether you are curious to explore the capabilities of AI, an entrepreneur looking
    to automate complex tasks, or even someone who wants to generate online income
    through AI, this book is for you.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 无论你是好奇探索AI的能力，还是希望自动化复杂任务的创业者，甚至想要通过AI在线赚钱的人，这本书都是为你准备的。
- en: 'Here''s what you''ll learn in these pages:'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 在这些页面中，你将学到以下内容：
- en: The basics of DeepSeek and its revolutionary features.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek的基本原理及其革命性特性。
- en: How to harness its potential to solve problems, create content or even develop
    unique tools.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 如何利用其潜力解决问题、创建内容，甚至开发独特的工具。
- en: Concrete strategies to earn money with this AI, taking advantage of its free
    access and flexibility.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 利用这种AI的免费访问和灵活性来赚钱的具体策略。
- en: I am not only an AI enthusiast, I am also a self-published author who has built
    a career by exploiting the digital tools and opportunities of our time. My goal
    is to share with you accessible, pragmatic and immediately applicable knowledge.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 我不仅是一个AI爱好者，我还是一位自出版的作者，通过利用我们这个时代的数字工具和机会建立了自己的职业生涯。我的目标是与你分享易于理解、实用且立即可应用的知识。
- en: Artificial intelligence is not a concept reserved for large companies or experienced
    developers. With DeepSeek, it finally becomes a resource that everyone can use
    to improve their lives and projects. It’s time to move beyond the fascination
    with AI and take action.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能并非仅是大型公司或经验丰富的开发者所保留的概念。有了DeepSeek，它终于成为了一种每个人都可以用来改善生活和工作项目的资源。是时候超越对AI的迷恋并采取行动了。
- en: 'Chapter 1: Discovering DeepSeek'
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 第一章：探索DeepSeek
- en: DeepSeek has burst onto the tech scene as a leading alternative to artificial
    intelligence (AI), an open-source language model designed in China that promises
    to democratize advanced AI tools in the face of giants like ChatGPT and Gemini.
    But what makes it so special? Its accessibility, freedom, and the ability to adapt
    to specific needs.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek作为人工智能（AI）的领先替代品，在中国设计的一种开源语言模型，承诺在ChatGPT和Gemini等巨头面前民主化高级AI工具。但是什么让它如此特别？它的易用性、自由度以及适应特定需求的能力。
- en: The popularity of the tool has led thousands of users to download it and explore
    its features. From complex tasks to simple functions, DeepSeek it features a versatile
    artificial intelligence that not only matches, but even surpasses, its famous
    competitors in some respects. In this article, we explain everything you need
    to know to get the most out of it.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 该工具的流行导致成千上万的用户下载它并探索其功能。从复杂任务到简单功能，DeepSeek拥有一种多才多艺的人工智能，不仅在某些方面与著名的竞争对手相匹配，甚至有所超越。在这篇文章中，我们解释了您需要了解的一切，以便充分利用它。
- en: What is DeepSeek?
  id: totrans-76
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 什么是DeepSeek？
- en: DeepSeek stands out with open and accessible AI that rivals industry leaders.
    Its MoE architecture splits tasks to improve efficiency and accuracy. It is free
    and versatile to perform tasks ranging from analysis to code generation.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek以其开放和易于访问的人工智能而脱颖而出，与行业领导者相媲美。其MoE架构将任务分割以提高效率和准确性。它是免费的，并且多功能，可以执行从分析到代码生成的一系列任务。
- en: DeepSeek is an artificial intelligence model designed to process natural language,
    automate business tasks, and aid in software development. Like other major language
    models like ChatGPT, it aims to interpret and output text with impressive accuracy.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek是一种旨在处理自然语言、自动化业务任务并帮助软件开发的人工智能模型。像ChatGPT等其他主要语言模型一样，它旨在以令人印象深刻的准确性解释和输出文本。
- en: What stands out about DeepSeek is its focus on open source. This means that
    developers have full access to the algorithms and can modify the AI to suit specific
    uses, including commercial use. Additionally, its free nature removes the barriers
    to entry that typically exist with other platforms.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek最引人注目的是其对开源的重视。这意味着开发者可以完全访问算法，并可以根据特定用途修改AI，包括商业用途。此外，其免费性质消除了其他平台通常存在的进入障碍。
- en: Its main objective is to optimize decision-making processes, reduce operational
    costs and provide real-time information. Infobae highlights that one of its differentiating
    features is its ability to offer results comparable to those of other leading
    AIs, but with a significantly lower investment.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 其主要目标是优化决策过程，降低运营成本并提供实时信息。Infobae强调，其区别于其他领先AI的一个不同之处在于，它能够提供与其他领先AI相当的结果，但投资显著较低。
- en: For example, in the financial sector, DeepSeek can analyze millions of transactions
    in seconds to identify fraud, a feature highlighted during its initial implementation.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，在金融领域，DeepSeek可以在几秒钟内分析数百万笔交易以识别欺诈，这是在其初始实施期间强调的功能。
- en: In the healthcare sector, this AI has been used to process large volumes of
    clinical data, making it possible to detect patterns that could predict diseases
    before they develop.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 在医疗保健领域，这种AI已被用于处理大量临床数据，这使得在疾病发展之前检测出可能预测疾病的模式成为可能。
- en: According to Voice of America, one of the most innovative aspects of DeepSeek
    is its modular architecture, which allows it to be easily customized to the specific
    needs of each company.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 根据美国之音报道，DeepSeek最具创新性的方面之一是其模块化架构，这使得它可以轻松地根据每个公司的特定需求进行定制。
- en: This flexibility allows for rapid integration with existing systems, which has
    led to its adoption by both startups and multinationals.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 这种灵活性使得它可以快速集成到现有系统中，这导致了初创公司和跨国公司对其的采用。
- en: An open-source AI designed to democratize AI
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 一种旨在民主化AI的开源AI
- en: DeepSeek is an open-source artificial intelligence (AI) developed by a Chinese
    startup of the same name. Launched in 2025, the AI quickly gained attention due
    to its performance comparable to proprietary models such as OpenAI's ChatGPT,
    while being freely available to the general public.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek是由同名的中国初创公司开发的开源人工智能（AI）。2025年推出后，由于其性能与OpenAI的ChatGPT等专有模型相当，同时向公众免费开放，AI迅速引起了人们的关注。
- en: DeepSeek's primary goal is to democratize access to advanced AI tools, enabling
    a wide range of users, from developers to enterprises, to leverage its capabilities
    without the cost constraints often associated with proprietary solutions.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek的主要目标是使高级AI工具的访问民主化，使从开发者到企业等各种用户能够利用其功能，而无需承担与专有解决方案通常相关的成本限制。
- en: DeepSeek's open-source approach means that its source code is publicly available,
    allowing developers around the world to review, modify and improve it.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek的开源方法意味着其源代码是公开可用的，这使得世界各地的开发者可以审查、修改和改进它。
- en: This transparency fosters collaborative innovation and ensures that AI can be
    adapted to various specific needs, thereby enhancing its usefulness in different
    contexts.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 这种透明度促进了协作创新，并确保AI能够适应各种特定需求，从而增强其在不同环境中的实用性。
- en: 'Comparison with ChatGPT and Gemini: Strengths and Weaknesses'
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 与ChatGPT和Gemini的比较：优势和劣势
- en: OpenAI’s ChatGPT and Google’s Gemini are two of the most recognized language
    models in the field of AI. These proprietary models have demonstrated impressive
    capabilities in text understanding and generation, but they have some limitations,
    including cost and flexibility.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: OpenAI的ChatGPT和谷歌的Gemini是人工智能领域最被认可的两种语言模型。这些专有模型在文本理解和生成方面展示了令人印象深刻的性能，但它们也有一些局限性，包括成本和灵活性。
- en: DeepSeek stands out for its open-source model, offering increased accessibility
    and the ability for users to customize the AI to their specific needs.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek因其开源模型而脱颖而出，提供了更高的可访问性，并允许用户根据特定需求定制AI。
- en: Additionally, DeepSeek was designed to operate more efficiently, requiring fewer
    computing resources to achieve performance comparable to its proprietary competitors.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，DeepSeek被设计得更加高效，需要更少的计算资源就能达到与其专有竞争对手相当的性能。
- en: However, as a relatively new open-source project, DeepSeek may still present
    challenges in terms of maturity and support compared to established solutions
    like ChatGPT and Gemini.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，作为一个相对较新的开源项目，与ChatGPT和Gemini等成熟解决方案相比，DeepSeek在成熟度和支持方面可能仍存在挑战。
- en: Nonetheless, its active developer community and commitment to continued innovation
    make it a promising alternative in the AI landscape.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管如此，其活跃的开发者社区和对持续创新的承诺使其成为人工智能领域的一个有希望的替代品。
- en: What can I achieve with DeepSeek?
  id: totrans-96
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 我可以用DeepSeek实现什么？
- en: 'DeepSeek is flexible and can be used for a variety of tasks:'
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek灵活，可用于各种任务：
- en: Solve complex math problems.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 解决复杂的数学问题。
- en: Help with programming, such as generating and debugging program code.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 帮助编程，例如生成和调试程序代码。
- en: Summarize the documents and explain them in simpler language.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 概括文档并解释其简单语言。
- en: Generate ideas, revisions and write academic or artistic texts.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 生成想法、修订并撰写学术或艺术文本。
- en: How Artificial Intelligence is Revolutionizing Your Field
  id: totrans-102
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 人工智能如何改变你的领域
- en: DeepSeek uses a revolutionary architecture called MOE (Expert Hybrid) that assigns
    tasks to specialized experts, increasing speed and accuracy.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek使用名为MOE（专家混合）的革命性架构，将任务分配给专业专家，从而提高速度和准确性。
- en: Additionally, its training process is based on reinforcement learning rather
    than labeled data, giving you the unique ability to adapt through trial and error.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，其训练过程基于强化学习而不是标记数据，这使你能够通过试错来适应。
- en: This also translates into significant energy and cost efficiency. While similar
    models like GPT-4 require billions of dollars of investment, DeepSeek has managed
    to stand out at a fraction of that cost.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 这也转化为显著的能量和成本效率。虽然类似模型如GPT-4需要数十亿美元的投资，但DeepSeek以一小部分成本脱颖而出。
- en: How much does DeepSeek cost?
  id: totrans-106
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: DeepSeek的费用是多少？
- en: 'DeepSeek currently offers several services that vary in capabilities and allow
    for different possibilities. Let''s focus on the main ones:'
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek目前提供几种不同的服务，这些服务在功能上有所不同，允许不同的可能性。让我们关注主要的服务：
- en: First up, we have DeepSeek’s web chatbot, which is based on the V3 model technology
    and is free to access. All you have to do is sign up and start chatting with the
    AI.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，我们有基于V3模型技术的DeepSeek网络聊天机器人，它免费开放访问。你只需注册并开始与AI聊天即可。
- en: Recently, the company enabled a feature called “DeepThink” that uses R1’s capabilities
    to provide complex answers after a reasoning process.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 最近，公司启用了一个名为“DeepThink”的功能，该功能利用R1的能力在推理过程后提供复杂的答案。
- en: On the other hand, we have the DeepSeek application, which also uses V3 AI and
    includes the “DeepThink” option, works as a conversational chat and is free.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 另一方面，我们有DeepSeek应用程序，它也使用V3 AI并包括“DeepThink”选项，作为一个对话聊天工具，并且是免费的。
- en: Finally, its R1 model API costs $0.55 (€0.53) for every 1 million tokens in
    the input you give to the AI if the input data is not in the cache and needs to
    be processed for the first time.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，如果输入数据不在缓存中且需要首次处理，其R1模型API每1000万个输入令牌的费用为0.55美元（0.53欧元）。
- en: In case this information has already been processed previously and is cached,
    the cost will be $0.14 (€0.13) for every million tokens processed. Meanwhile,
    the output cost will be $2.19 (€2.10) for 1 million tokens.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 如果此信息已被先前处理并缓存，则每处理一千万个标记的成本为0.14美元（1.30欧元）。同时，输出成本为每百万个标记2.19美元（2.10欧元）。
- en: How to download and use DeepSeek?
  id: totrans-113
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 如何下载和使用DeepSeek？
- en: The process of getting started with DeepSeek is simple and straightforward.
    You can access this AI through its official website or download its mobile application,
    both available on Android and iOS. Both platforms offer an optimized user experience.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 开始使用DeepSeek的过程简单直接。您可以通过其官方网站访问此AI，或下载其移动应用程序，该应用程序可在Android和iOS上使用。这两个平台都提供优化的用户体验。
- en: Once the installation is complete, you will need to create an account with your
    email address or log in with your Google or Apple credentials. From this point
    on, you will have access to a virtual assistant.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 安装完成后，您需要使用电子邮件地址创建账户或使用Google或Apple凭证登录。从这一点开始，您将能够访问虚拟助手。
- en: Who created DeepSeek
  id: totrans-116
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 谁创建了DeepSeek
- en: Liang Wenfeng founded DeepSeek in 2023\. This tycoon with a deep interest in
    technology was born in Guangdong, China in 1985\. Wenfeng started his career as
    an investor and in 2008, he studied computer vision at Zhejiang University in
    Hangzhou. After that, he combined his two interests by starting to study how to
    use AI in stock trading.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 梁文峰于2023年创立了DeepSeek。这位对技术有深厚兴趣的巨头于1985年出生于中国广东。文峰最初是一名投资者，2008年，他在杭州浙江大学学习计算机视觉。此后，他结合了自己的两个兴趣，开始研究如何将AI应用于股票交易。
- en: In 2015, he founded High-Flyer Capital Management, a hedge fund firm where he
    implemented his algorithms for evaluating investment opportunities. By 2017, almost
    all of his investments were made using AI. Currently, High-Flyer Capital Management
    is the only firm funding DeepSeek.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 2015年，他创立了High-Flyer Capital Management，一家对冲基金公司，在那里他实施了评估投资机会的算法。到2017年，他的几乎所有投资都是使用AI完成的。目前，High-Flyer
    Capital Management是唯一资助DeepSeek的公司。
- en: 'Main features of DeepSeek:'
  id: totrans-119
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: DeepSeek的主要功能：
- en: 'DeepSeek has several attributes that make it an attractive choice for many
    types of users:'
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek具有几个属性，使其成为许多类型用户的有吸引力的选择：
- en: 'R1 Model with DeepThink: This feature allows the AI to perform inferences and
    deep analysis of the prompts received, giving a more detailed and reasonable response.'
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 携带DeepThink的R1模型：此功能允许AI对收到的提示进行推理和深度分析，给出更详细和合理的回应。
- en: 'Integration with files: You can upload files directly to the platform, extract
    key information and get a detailed summary.'
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 与文件集成：您可以直接将文件上传到平台，提取关键信息并获得详细摘要。
- en: 'Web Search Function: The “Search” option allows you to search the website and
    navigate back to the answer and source.'
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 网络搜索功能： “搜索”选项允许您搜索网站并导航回答案和来源。
- en: Accuracy and speed in data analysis
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 数据分析中的准确性和速度
- en: DeepSeek is able to process large volumes of data in record time without compromising
    the accuracy of the results. Its deep learning architecture can identify complex
    patterns more accurately than many other existing AIs.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek能够在记录时间内处理大量数据，同时不降低结果的准确性。其深度学习架构能够比许多其他现有AI更准确地识别复杂模式。
- en: This could be particularly relevant in sectors such as finance, where data-driven
    decisions need to be made quickly to avoid risks.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 这在金融等需要快速做出数据驱动决策以避免风险的行业中尤其相关。
- en: Integration with existing systems
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 与现有系统集成
- en: DeepSeek is designed to integrate with existing technology infrastructures.
    Its modular design allows companies to configure the tool to their needs without
    making significant changes to their current systems.
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek被设计为与现有的技术基础设施集成。其模块化设计允许公司根据其需求配置工具，而无需对其现有系统进行重大更改。
- en: This could facilitate their adoption in environments where technology upgrades
    are often a challenge.
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 这可能有助于在技术升级经常是挑战的环境中的采用。
- en: Advanced predictive capabilities
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 高级预测能力
- en: DeepSeek uses prediction models based on real-time and historical data, generating
    insights to anticipate events or trends.
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek使用基于实时和历史数据的预测模型，生成洞察力以预测事件或趋势。
- en: In e-commerce, for example, you can predict purchasing habits to optimize inventory.
    In the healthcare sector, its potential for identifying early diagnostic risks
    has been explored.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，在电子商务领域，你可以预测购买习惯以优化库存。在医疗保健领域，其识别早期诊断风险的潜力已被探索。
- en: Adaptability to multiple sectors of activity
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 适应多个活动领域
- en: DeepSeek has been presented as a versatile tool, capable of adapting to the
    demands of various sectors. From the automation of industrial processes to the
    analysis of marketing behavior, its flexibility makes it an option to consider
    for companies looking for specific technological solutions.
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek被展示为一个多功能的工具，能够适应各个领域的需求。从工业流程的自动化到市场行为的分析，其灵活性使其成为寻找特定技术解决方案的公司的一个考虑选项。
- en: What are the capabilities of DeepSeek models?
  id: totrans-135
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: DeepSeek模型的功能有哪些？
- en: DeepSeek-V2 was later replaced by DeepSeek-Coder-V2, a more advanced model with
    236 billion parameters. Designed for complex encoding requests, the model has
    a high context window of up to 128,000 tokens. A context window of 128,000 tokens
    is the maximum length of input text that the model can process simultaneously.
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek-V2后来被DeepSeek-Coder-V2所取代，这是一个拥有2360亿参数的更高级模型。该模型专为复杂的编码请求设计，具有高达128,000个标记的高上下文窗口。128,000个标记的上下文窗口是模型可以同时处理的输入文本的最大长度。
- en: A larger context window allows the model to understand, summarize or analyze
    longer texts. This is a great advantage, for example, when working with long documents,
    books or complex dialogues.
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 更大的上下文窗口允许模型理解、总结或分析更长的文本。这是一个巨大的优势，例如，当处理长文档、书籍或复杂对话时。
- en: 'A token is a unit of text. Often, this unit can be a word, a particle (like
    "artificial" and "intelligence"), or even a character. For example: "Artificial
    intelligence is awesome!" can be composed of four tokens: Artificial, "Intelligence",
    "Cool", "!".'
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 标记是文本的单位。通常，这个单位可以是一个单词、一个粒子（如“人工”和“智能”），甚至是一个字符。例如：“人工智能很棒！”可以由四个标记组成：Artificial，"Intelligence"，"Cool"，"!"。
- en: The company's latest models, DeepSeek-V3 and DeepSeek-R1, have further cemented
    its position. A 671,000-parameter model, the DeepSeek-V3 requires significantly
    less resources than its counterparts, while achieving impressive results in various
    benchmark tests with other brands.
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 该公司最新的模型DeepSeek-V3和DeepSeek-R1进一步巩固了其地位。DeepSeek-V3是一个拥有671万个参数的模型，与同类产品相比，它需要的资源显著更少，同时在与其他品牌的各种基准测试中取得了令人印象深刻的成果。
- en: The DeepSeek-R1, launched in January 2025, focuses on complex tasks such as
    reasoning, coding, and mathematics. With its capabilities in this area, it challenges
    the o1, one of the latest ChatGPT models.
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek-R1于2025年1月推出，专注于推理、编码和数学等复杂任务。凭借其在这些领域的功能，它挑战了最新的ChatGPT模型之一。
- en: Although DeepSeek has seen significant success in a short period of time, Forbes
    wrote that the company is primarily focused on research and has no detailed plans
    for commercialization in the near future.
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管DeepSeek在短时间内取得了显著的成功，福布斯报道称，该公司主要专注于研究，并且近期内没有详细的商业化计划。
- en: How DeepSeek works
  id: totrans-142
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: DeepSeek是如何工作的
- en: 'MoE (Mixture of Experts): a revolutionary architecture'
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: MoE（专家混合）：一种革命性的架构
- en: At the heart of DeepSeek is an innovative architecture called “Mixture of Experts”
    (MoE). This approach involves dividing the model into multiple specialized sub-models,
    called “experts,” each trained to excel in a specific domain or task.
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek的核心是一个名为“专家混合”（MoE）的创新架构。这种方法涉及将模型划分为多个专门的子模型，称为“专家”，每个专家都经过训练，以在特定领域或任务中表现出色。
- en: When a query is received, the system determines which experts are most relevant
    to address that query and activates only those sub-models, thereby optimizing
    the efficiency and accuracy of responses.
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 当接收到查询时，系统会确定哪些专家与处理该查询最相关，并仅激活这些子模型，从而优化响应的效率和准确性。
- en: This architecture allows DeepSeek to handle a variety of complex tasks while
    maintaining efficient use of computing resources. By selectively activating relevant
    experts, the model reduces the computational load required, resulting in faster
    response times and reduced energy consumption.
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 这种架构允许DeepSeek处理各种复杂任务，同时保持对计算资源的有效利用。通过选择性地激活相关专家，模型减少了所需的计算负载，从而实现了更快的响应时间和降低能耗。
- en: 'Training and reduced cost: the secret of its effectiveness'
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 训练和降低成本：其有效性的秘诀
- en: One of the most remarkable aspects of DeepSeek is its efficiency in terms of
    training costs. While comparable models often require investments of several hundred
    million dollars, DeepSeek managed to train its R1 model with a budget of less
    than $6 million.
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek最引人注目的方面之一是其训练成本方面的效率。虽然可比模型通常需要数亿美元的投资，但DeepSeek设法用不到600万美元的预算训练了其R1模型。
- en: This feat was made possible by the use of innovative training methods and rigorous
    optimization of resources.
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 通过使用创新训练方法和资源的严格优化，这一成就才得以实现。
- en: By adopting an open-source approach and relying on the collaboration of the
    global developer community, DeepSeek was able to reduce the costs associated with
    developing and training its model.
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 通过采用开源方法并依靠全球开发者社区的协作，DeepSeek能够降低其模型开发和训练相关的成本。
- en: This collaborative strategy not only helped reduce expenses, but also accelerated
    the process of innovation and continuous improvement of the model.
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 这种协作策略不仅有助于降低成本，还加速了模型创新和持续改进的过程。
- en: How to use DeepSeek
  id: totrans-152
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 如何使用DeepSeek
- en: Using DeepSeek's chatbot is very simple and intuitive, as its dynamics are similar
    to other conversational AI models we already know, such as ChatGPT.
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 使用DeepSeek的聊天机器人非常简单直观，因为它的动态与其他我们已知的其他对话式AI模型类似，例如ChatGPT。
- en: We have the possibility to use it either from the web or through the application.
    In both cases, we will only have to register to start enjoying this AI for free.
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以选择从网页或通过应用程序使用它。在两种情况下，我们只需注册即可开始免费享受这款AI。
- en: Once your profile is ready, you will access the main interface of the chatbot,
    where the conversation panel and a drop-down bar on the left side will be displayed
    from which you can open a new chat, access past conversations, download the application
    and access your profile settings.
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦您的个人资料准备就绪，您将进入聊天机器人的主界面，其中将显示对话面板和左侧的下拉栏，您可以通过它打开新的聊天，访问过去的对话，下载应用程序以及访问您的个人资料设置。
- en: To interact with DeepSeek, simply type a prompt into the text drawer. Additionally,
    by clicking the paperclip button, you can attach text documents or images.
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 要与DeepSeek互动，只需在文本框中输入提示即可。此外，通过点击纸夹按钮，您可以附加文本文档或图像。
- en: You can also enable the “Search” option located below the text box so that the
    AI accesses the website to search for information. Finally, next to this is the
    “DeepThink” function, which is based on the DeepSeek R1 reasoning model and is
    very useful for solving complex problems or queries.
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 您还可以启用位于文本框下方的“搜索”选项，以便AI访问网站以搜索信息。最后，旁边是“DeepThink”功能，它基于DeepSeek R1推理模型，对于解决复杂问题或查询非常有用。
- en: By using the “DeepThink” mode, the AI will take a little longer to answer and
    will show the steps and logics it uses to arrive at the final solution. In addition,
    at the top of your answer, you will indicate the exact time it took you to conclude
    your reasoning.
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 通过使用“DeepThink”模式，AI的回答将稍微慢一些，并将显示它到达最终解决方案所使用的步骤和逻辑。此外，在您的答案顶部，您将指示您得出推理的确切时间。
- en: Can DeepSeek generate images?
  id: totrans-159
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: DeepSeek能生成图像吗？
- en: Unfortunately, DeepSeek is not yet capable of functioning as an image-generating
    AI and its capabilities are limited to conversation. Of course, you can use this
    chatbot as a helper tool to create rich and accurate descriptions that you can
    then feed to an image-generating AI.
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 不幸的是，DeepSeek目前还不能作为图像生成AI运行，其功能仅限于对话。当然，您可以将这个聊天机器人作为辅助工具使用，创建丰富且准确的描述，然后将这些描述输入到图像生成AI中。
- en: Why DeepSeek outperforms other models?
  id: totrans-161
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 为什么DeepSeek优于其他模型？
- en: DeepSeek stands out for its commitment to accessibility and customization. As
    an open-source model, it is freely available to everyone, removing financial barriers
    that can prevent the adoption of advanced AI technologies.
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek因其对可访问性和定制的承诺而脱颖而出。作为一个开源模型，它对每个人都是免费可用的，消除了可能阻止采用先进AI技术的财务障碍。
- en: Additionally, users have the freedom to customize the model to meet their specific
    needs, whether that means adapting the AI to a particular industry or integrating
    it into existing applications.
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，用户可以自由地定制模型以满足他们的特定需求，无论是将AI适应特定行业还是将其集成到现有应用中。
- en: This flexibility contrasts with proprietary models, which can be limited in
    terms of customization and often come with high subscription costs.
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 这种灵活性与专有模型形成对比，后者在定制方面可能有限，并且通常伴随着高昂的订阅费用。
- en: By offering a free, modifiable alternative, DeepSeek paves the way for broader
    adoption of AI, allowing a more diverse range of users to benefit from its capabilities.
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 通过提供免费且可修改的替代方案，DeepSeek为AI的更广泛采用铺平了道路，使更多样化的用户能够从其功能中受益。
- en: Is it really better than ChatGPT?
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 它真的比ChatGPT好吗？
- en: The developer has published the results of the tests it carried out with its
    DeepSeek R1 model and compared them with those obtained by some of its competitors.
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 开发者发布了其DeepSeek R1模型进行的测试结果，并将其与一些竞争对手获得的结果进行了比较。
- en: In doing so, he claims that R1 outperforms OpenAI's o1 model on a number of
    parameters.
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 在这样做的时候，他声称R1在许多参数上优于OpenAI的o1模型。
- en: Specifically, the settings in which R1 outperforms o1 are AIME (effectiveness
    measure), MATH-500 (mathematical problems), and SWE-bench Veridied (programming
    tasks).
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 具体来说，R1在AIME（有效性度量）、MATH-500（数学问题）和SWE-bench Veridied（编程任务）设置中优于o1。
- en: Graph published by DeepSeek showing the performance comparison of its DeepSeek
    R1 model with OpenAI's o1 model
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek发布的图表，显示了其DeepSeek R1模型与OpenAI的o1模型的性能比较
- en: Performance comparison of DeepSeek R1 with OpenAI's o1
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek R1与OpenAI的o1性能比较
- en: Let's not forget that o1 is one of the most powerful models in OpenAI, as it
    has advanced reasoning capabilities, and it is available in some ChatGPT paid
    plans.
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 我们不要忘记，o1是OpenAI中最强大的模型之一，因为它具有先进的推理能力，并且它可在某些ChatGPT付费计划中使用。
- en: On the other hand, R1's capabilities have been integrated into DeepSeek's free
    web and app chatbot, in addition to being available with its API.
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 另一方面，R1的功能已被集成到DeepSeek的免费网页和应用程序聊天机器人中，同时也可以通过其API获取。
- en: However, ChatGPT can generate images and allows other advanced features such
    as creating custom and specialized GPTs or accessing them through the GPT Store.
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，ChatGPT可以生成图像，并允许其他高级功能，如创建定制和专业的GPT或通过GPT Store访问它们。
- en: So, while DeepSeek R1's performance outperformed one of the more powerful models
    built into ChatGPT, both are excellent options.
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，虽然DeepSeek R1的性能优于ChatGPT中内置的更强大的模型之一，但两者都是优秀的选择。
- en: Is it more efficient than other AIs?
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 它是否比其他AI更有效率？
- en: DeepSeek not only compared its performance to OpenAI, but also benchmarked it
    against other leading products. In the case of its DeepSeek V3 language model,
    tests show that it outperforms models such as Llama 3.1 405B, Claude 3.5, or GPT-4o
    in several parameters.
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek不仅将其性能与OpenAI进行了比较，还将其与其他领先产品进行了基准测试。在其DeepSeek V3语言模型的情况下，测试显示它在几个参数上优于Llama
    3.1 405B、Claude 3.5或GPT-4o等模型。
- en: Is DeepSeek censored?
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek是否被审查？
- en: DeepSeek has to undergo evaluations by China's internet regulator, so it has
    to comply with what they call "core socialist values." That's why this AI avoids
    or refuses to answer certain questions because it considers them to be sensitive
    topics.
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek必须接受中国互联网监管机构的评估，因此它必须遵守他们所说的“核心价值观”。这就是为什么这个AI避免或拒绝回答某些问题，因为它认为它们是敏感话题。
- en: However, it should be noted that this censorship is only present in the DeepSeek
    chatbot. This means that if you use its API and install the model on your computer,
    this technology will not include these ideological alignments.
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，需要注意的是，这种审查只存在于DeepSeek聊天机器人中。这意味着如果你使用其API并在你的电脑上安装模型，这项技术将不包括这些意识形态的倾向。
- en: How has this affected other tech companies?
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: 这对其他科技公司有何影响？
- en: Until just a few days ago, the AI technology landscape was dominated by very
    specific giants, with OpenAI and Google standing out the most. However, the emergence
    of a new player has shaken up the board in such a way that, now, all the pieces
    have been affected.
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 直到几天前，AI技术领域一直由一些非常具体的巨头主导，其中OpenAI和Google最为突出。然而，新玩家的出现如此地震撼了棋盘，以至于现在所有棋子都受到了影响。
- en: Not only has DeepSeek released open source models that are as competitive as
    OpenAI's technology, but they require lower-capacity chips to run. This last factor
    has not gone unnoticed and has led to questions about the multi-million dollar
    investments in AI projects and the need to use large quantities of chips for their
    development.
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek不仅发布了与OpenAI技术竞争的开放源代码模型，而且它们需要更低容量的芯片来运行。这个因素并没有被忽视，并引发了关于数百万美元的AI项目投资以及需要大量芯片进行开发的必要性。
- en: A problem that hit hard Nvidia, a technology company that develops GPUs and
    chips to power AI systems, whose shares fell 17%, causing it to lose some $600
    billion. In this way, Nvidia went from the most valuable company in the world
    to third place, with Apple (1st) and Microsoft (2nd) having overtaken it.
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 这对Nvidia造成了重创，Nvidia是一家开发GPU和芯片以供AI系统使用的科技公司，其股价下跌了17%，导致其损失了约6000亿美元。这样，Nvidia从世界上最值钱的公司跌到了第三位，苹果（第1位）和微软（第2位）已经超过了它。
- en: 'Similarly, shares of other heavyweights in the tech ecosystem also fell: Alphabet
    fell by 4% and Microsoft by 2%. Meanwhile, there were significant declines in
    the stock markets, particularly the Nasdaq, which fell by 3.77%. On Monday 27,
    Dow Jones futures lost 1.04% and S&P 500 futures lost 2.29%.'
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: 同样，科技生态系统中其他重量级公司的股票也出现了下跌：Alphabet下跌了4%，微软下跌了2%。同时，股市出现了显著下跌，尤其是纳斯达克，下跌了3.77%。在27日星期一，道琼斯期货下跌了1.04%，标准普尔500指数期货下跌了2.29%。
- en: In summary, DeepSeek represents a significant advancement in the field of artificial
    intelligence, combining innovative architecture, remarkable efficiency and a commitment
    to accessibility.
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: 总结来说，DeepSeek代表了人工智能领域的一项重大进步，它结合了创新架构、显著的效率和致力于可及性的承诺。
- en: Its open-source approach and ability to compete with proprietary models make
    it an attractive option for those looking to harness the potential of AI without
    traditional constraints.
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: 它的开源方法和与专有模型竞争的能力，使其成为那些希望在不受传统约束的情况下利用AI潜力的人的一个有吸引力的选择。
- en: 'Chapter 2: Differences between DeepSeek and ChatGPT'
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: 第二章：DeepSeek与ChatGPT之间的差异
- en: The emergence of DeepSeek, an open-source artificial intelligence model developed
    by a Chinese startup, has attracted considerable interest due to its performance
    and accessibility. Compared with OpenAI's ChatGPT model, DeepSeek has notable
    differences in design, operation, cost, and applications.
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: 中国初创公司开发的开源人工智能模型DeepSeek的出现，由于其性能和可及性而引起了相当大的兴趣。与OpenAI的ChatGPT模型相比，DeepSeek在设计、操作、成本和应用方面都有显著的不同。
- en: Design and Architecture
  id: totrans-190
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 设计和架构
- en: ChatGPT, developed by OpenAI, is based on large language model architectures,
    such as GPT-3 and GPT-4\. These models are designed to be versatile, capable of
    handling a wide range of tasks from text generation to machine translation.
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: 由OpenAI开发的ChatGPT基于大型语言模型架构，如GPT-3和GPT-4。这些模型被设计成多才多艺的，能够处理从文本生成到机器翻译的广泛任务。
- en: However, this versatility can lead to trade-offs in terms of specialization
    and effectiveness for specific tasks.
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，这种多功能性可能导致在专业化和特定任务的有效性方面进行权衡。
- en: In contrast, DeepSeek takes a modular approach using an architecture called
    “Mixture of Experts” (MoE). This architecture allows tasks to be divided into
    specialized subtasks, assigned to dedicated experts, which improves efficiency
    and accuracy for specific applications. This specialization makes DeepSeek particularly
    effective for technical or niche tasks, where targeted expertise is essential.
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: 相反，DeepSeek采用了一种名为“专家混合”（MoE）的模块化方法。这种架构允许将任务划分为专门的子任务，分配给专门的专家，这提高了特定应用中的效率和准确性。这种专业化使DeepSeek在需要针对性专业知识的技术或细分任务中特别有效。
- en: Open-Source vs. Proprietary
  id: totrans-194
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 开源与专有
- en: A major distinction is the distribution model. ChatGPT is a proprietary service,
    accessible through a user interface developed by OpenAI, with paid subscription
    options for advanced features.
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: 一个主要区别是分发模式。ChatGPT是一个专有服务，通过OpenAI开发的用户界面提供访问，并提供高级功能的付费订阅选项。
- en: This centralized approach limits customization and adaptation of the model to
    specific user needs.
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
  zh: 这种集中式方法限制了模型针对特定用户需求的定制和适应。
- en: Conversely, DeepSeek is an open-source model, allowing users to download, modify,
    and integrate the model into various applications at no cost. This openness fosters
    collaborative innovation and allows for deep customization, tailored to individual
    or organizational needs.
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: 相反，DeepSeek是一个开源模型，允许用户免费下载、修改并将模型集成到各种应用中。这种开放性促进了协作创新，并允许进行深度定制，以满足个人或组织的需求。
- en: Cost and Accessibility
  id: totrans-198
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 成本和可及性
- en: The cost of development and operation is another point of divergence. ChatGPT,
    due to its size and complexity of its infrastructure, requires considerable resources,
    which is reflected in the subscription fees for users.
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: 开发和运营成本是另一个分歧点。由于ChatGPT规模和基础设施的复杂性，它需要大量的资源，这反映在用户的订阅费用上。
- en: DeepSeek, thanks to its optimized architecture and the use of less expensive
    hardware, has managed to significantly reduce training and operating costs. For
    example, the cost of training DeepSeek has been estimated at $5.6 million, much
    lower than the hundreds of millions of dollars required for comparable models.
  id: totrans-200
  prefs: []
  type: TYPE_NORMAL
  zh: 由于其优化的架构和使用了更便宜的硬件，DeepSeek成功地大幅降低了训练和运营成本。例如，DeepSeek的训练成本估计为560万美元，远低于类似模型的数亿美元。
- en: Performance and Specialization
  id: totrans-201
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 性能和专业化
- en: In terms of performance, ChatGPT excels at both general and complex tasks, providing
    consistent and informative answers on a variety of topics. However, its versatility
    can sometimes result in less accurate answers for very specialized domains.
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
  zh: 在性能方面，ChatGPT在通用和复杂任务上都表现出色，在各种主题上提供一致且信息丰富的答案。然而，其多功能性有时会导致在非常专业化的领域产生不太准确的答案。
- en: DeepSeek, with its modular approach, is designed to excel at technical and specialized
    tasks. It responds faster and with greater accuracy in specific domains, although
    its overall performance may be lower than ChatGPT for more general tasks.
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek以其模块化方法设计，旨在在技术和专业任务上表现出色。它在特定领域内响应更快，准确性更高，尽管在更通用任务上的整体性能可能低于ChatGPT。
- en: Applications and Use Cases
  id: totrans-204
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 应用和用例
- en: ChatGPT is widely used for various applications including content writing, translation,
    customer service, and education. Its ability to generate text in a smooth and
    natural way makes it suitable for a multitude of scenarios.
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT被广泛应用于各种应用，包括内容创作、翻译、客户服务和教育。它能够以流畅自然的方式生成文本，使其适用于多种场景。
- en: DeepSeek, due to its specialization, is particularly suited for applications
    requiring technical expertise, such as code generation, complex data analysis
    and scientific problem solving. Its ability to adapt and be integrated into various
    systems makes it a valuable tool for developers and researchers.
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: 由于其专业化，DeepSeek特别适合需要技术专长的应用，如代码生成、复杂数据分析以及科学问题解决。它能够适应并集成到各种系统中，使其成为开发人员和研究人员的有价值工具。
- en: Limitations and Challenges
  id: totrans-207
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 局限性和挑战
- en: Despite its advantages, DeepSeek has some limitations. Its effectiveness largely
    depends on the quality of the subject matter experts and how tasks are divided.
    Improper configuration or allocation of tasks can hamper its performance.
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管DeepSeek具有优势，但它也有一些局限性。其有效性很大程度上取决于主题专家的质量以及任务的分配方式。不恰当的配置或任务分配可能会影响其性能。
- en: ChatGPT, while powerful, can sometimes generate inaccurate or biased answers,
    due to the nature of its training on large datasets. Additionally, its proprietary
    model limits transparency and customizability.
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管ChatGPT功能强大，但由于其在大数据集上的训练性质，有时可能会生成不准确或带有偏见的答案。此外，其专有模型限制了透明度和可定制性。
- en: Functionality
  id: totrans-210
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 功能性
- en: DeepSeek focuses on precise JavaScript data processing and retrieving relevant
    information from databases, making it a powerful analysis and research tool. ChatGPT,
    on the other hand, generates texts based on inputs and is optimized to provide
    human-like responses.
  id: totrans-211
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek专注于精确的JavaScript数据处理，并从数据库中检索相关信息，使其成为一个强大的分析和研究工具。另一方面，ChatGPT基于输入生成文本，并优化以提供类似人类的响应。
- en: Technology
  id: totrans-212
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 技术
- en: DeepSeek uses contextualized algorithms and machine learning to analyze data.
    ChatGPT, on the other hand, is based on a language model that analyzed large amounts
    of text to understand and generate speech.
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek使用上下文算法和机器学习来分析数据。另一方面，ChatGPT基于一个语言模型，该模型分析了大量文本以理解和生成语音。
- en: Opportunities and challenges
  id: totrans-214
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 机遇与挑战
- en: Both technologies offer immense opportunities for companies looking to optimize
    their operations through artificial intelligence. DeepSeek can help make informed
    decisions based on accurate data analysis, while ChatGPT improves customer interaction
    and automates customer service.
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
  zh: 这两种技术为寻求通过人工智能优化其运营的公司提供了巨大的机遇。DeepSeek可以帮助基于准确的数据分析做出明智的决策，而ChatGPT则可以改善客户互动并自动化客户服务。
- en: However, there are also challenges. With DeepSeek, the complexity lies in data
    integration and analysis, while ChatGPT is challenged by the need for quality
    control of the generated content.
  id: totrans-216
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，也存在挑战。DeepSeek的复杂性在于数据集成和分析，而ChatGPT面临的挑战是需要对生成内容进行质量控制。
- en: Future Prospects
  id: totrans-217
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 未来展望
- en: The emergence of DeepSeek marks a milestone in the field of artificial intelligence,
    with a focus on open-source accessibility, specialization and collaboration.
  id: totrans-218
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek的出现标志着人工智能领域的一个里程碑，其重点在于开源可访问性、专业化和协作。
- en: This approach could redefine how AI models are developed and used, fostering
    a greater diversity of applications and innovations.
  id: totrans-219
  prefs: []
  type: TYPE_NORMAL
  zh: 这种方法可能会重新定义AI模型的开发和使用方式，促进更多样化的应用和创新。
- en: ChatGPT, as a proprietary model, will likely continue to evolve to provide improved
    performance and better customization. However, the trend toward open-source and
    specialization, embodied by DeepSeek, may influence future development directions
    in the AI field.
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
  zh: 作为专有模型，ChatGPT很可能会继续进化，以提供更好的性能和更优的定制。然而，DeepSeek所体现的开源和专业化趋势可能会影响人工智能领域的未来发展方向。
- en: In summary, although ChatGPT and DeepSeek share similar goals in natural language
    processing, their approaches differ significantly.
  id: totrans-221
  prefs: []
  type: TYPE_NORMAL
  zh: 总结来说，尽管ChatGPT和DeepSeek在自然语言处理方面有相似的目标，但它们的处理方法存在显著差异。
- en: ChatGPT emphasizes versatility and accessibility, while DeepSeek stands out
    for its specialization, open-source accessibility, and increased efficiency for
    technical tasks. The choice between the two models will depend on the specific
    needs of the users, the nature of the tasks to be accomplished, and the available
    resources.
  id: totrans-222
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT强调多功能性和易用性，而DeepSeek因其专业化、开源易用性和对技术任务的效率提升而脱颖而出。两种模型之间的选择将取决于用户的具体需求、要完成的任务性质以及可用的资源。
- en: 'Chapter 3: Mastering DeepSeek for your everyday needs'
  id: totrans-223
  prefs: []
  type: TYPE_NORMAL
  zh: 第3章：掌握DeepSeek以满足您的日常需求
- en: In this chapter, we will explore in detail how to install and use DeepSeek to
    meet your daily needs. Whether you are a novice or an experienced user, this guide
    will provide you with clear and understandable instructions to get the most out
    of this revolutionary artificial intelligence.
  id: totrans-224
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将详细探讨如何安装和使用DeepSeek来满足您的日常需求。无论您是新手还是经验丰富的用户，本指南都将为您提供清晰易懂的说明，帮助您充分利用这一革命性的人工智能。
- en: Installation and first steps
  id: totrans-225
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 安装和第一步
- en: How to download and configure DeepSeek (mobile app and computer)
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
  zh: 如何下载和配置DeepSeek（移动应用程序和电脑）
- en: To get started with DeepSeek, it is essential to know how to download and install
    the app on your devices. DeepSeek is available on multiple platforms, making it
    easy to access whether you are using a desktop, laptop, tablet, or smartphone.
  id: totrans-227
  prefs: []
  type: TYPE_NORMAL
  zh: 要开始使用DeepSeek，了解如何在您的设备上下载和安装应用程序至关重要。DeepSeek可在多个平台上使用，这使得无论您使用桌面、笔记本电脑、平板电脑还是智能手机，都能轻松访问。
- en: 'On computer (Windows, macOS, Linux):'
  id: totrans-228
  prefs: []
  type: TYPE_NORMAL
  zh: 在电脑上（Windows、macOS、Linux）：
- en: 'Access the official website: Open your web browser and go to the official DeepSeek
    website.'
  id: totrans-229
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 访问官方网站：打开您的网络浏览器并访问DeepSeek的官方网站。
- en: 'Download: On the home page, look for the download section. There you will find
    links for the different versions of the application suitable for your operating
    system.'
  id: totrans-230
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 下载：在主页面上，寻找下载部分。在那里，您将找到适合您操作系统的不同版本应用程序的链接。
- en: 'Installation: Once the file is downloaded, open it and follow the on-screen
    instructions to install the application.'
  id: totrans-231
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 安装：文件下载完成后，打开它并按照屏幕上的说明进行安装。
- en: 'On mobile devices (Android and iOS):'
  id: totrans-232
  prefs: []
  type: TYPE_NORMAL
  zh: 在移动设备上（Android和iOS）：
- en: 'Access the app store: Open the Google Play Store for Android devices or the
    App Store for iOS devices.'
  id: totrans-233
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 访问应用商店：打开Android设备的Google Play Store或iOS设备的App Store。
- en: 'Search: In the search bar, type “DeepSeek” and press “Search”.'
  id: totrans-234
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 搜索：在搜索栏中输入“DeepSeek”并按“搜索”。
- en: 'Download and Installation: Select the DeepSeek app from the search results,
    then tap “Install” to start the download and installation.'
  id: totrans-235
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 下载和安装：从搜索结果中选择DeepSeek应用程序，然后点击“安装”以开始下载和安装。
- en: Creating your account and navigating the interface
  id: totrans-236
  prefs: []
  type: TYPE_NORMAL
  zh: 创建您的账户并导航界面
- en: After installing the app, the next step is to create an account and familiarize
    yourself with the user interface.
  id: totrans-237
  prefs: []
  type: TYPE_NORMAL
  zh: 安装应用程序后，下一步是创建账户并熟悉用户界面。
- en: 'Launching the App: Open the DeepSeek app on your device.'
  id: totrans-238
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 启动应用程序：在您的设备上打开DeepSeek应用程序。
- en: 'Account Creation: On the home screen, you will see an option to create a new
    account. You can sign up using your email address or by logging in through your
    Google or Apple accounts for a faster process.'
  id: totrans-239
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 账户创建：在主页面上，您将看到一个创建新账户的选项。您可以使用电子邮件地址注册，或者通过您的谷歌或苹果账户登录以实现更快的流程。
- en: 'Initial Setup: Once registered, the app can guide you through a quick tutorial
    to familiarize you with its main features.'
  id: totrans-240
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 初始设置：一旦注册，应用程序可以引导您通过快速教程，熟悉其主要功能。
- en: 'Interface Navigation: DeepSeek’s interface is designed to be intuitive. On
    the main page, you’ll find a search bar where you can enter your queries. Side
    menus provide options to access additional features such as document analysis,
    content generation, and programming assistance.'
  id: totrans-241
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 界面导航：DeepSeek的界面设计得非常直观。在主页面上，您会找到一个搜索栏，您可以在其中输入您的查询。侧边菜单提供了访问额外功能，如文档分析、内容生成和编程辅助的选项。
- en: Exploiting key features
  id: totrans-242
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 利用关键特性
- en: DeepSeek offers a range of powerful features designed to enhance your productivity
    and meet various daily needs.
  id: totrans-243
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek提供了一系列强大的功能，旨在提高你的生产力和满足各种日常需求。
- en: Online research and information retrieval
  id: totrans-244
  prefs: []
  type: TYPE_NORMAL
  zh: 在线研究和信息检索
- en: One of the most impressive features of DeepSeek is its ability to perform online
    searches and extract relevant information.
  id: totrans-245
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek最令人印象深刻的特性之一是它执行在线搜索和提取相关信息的能力。
- en: 'Contextual Search: By entering a query in the search bar, DeepSeek analyzes
    the context and provides precise answers based on reliable sources.'
  id: totrans-246
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 上下文搜索：通过在搜索栏中输入查询，DeepSeek分析上下文并根据可靠来源提供精确答案。
- en: 'Data Extraction: If you need specific information from websites or online documents,
    DeepSeek can extract that data and present it in an organized manner.'
  id: totrans-247
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 数据提取：如果您需要从网站或在线文档中获取特定信息，DeepSeek可以提取该数据并以有组织的方式呈现。
- en: Document Summarization and Personalized Content Generation
  id: totrans-248
  prefs: []
  type: TYPE_NORMAL
  zh: 文档摘要和个性化内容生成
- en: DeepSeek also excels in document processing and content generation.
  id: totrans-249
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek在文档处理和内容生成方面也表现出色。
- en: 'Document Summary: You can upload documents directly into the app, and DeepSeek
    will generate a concise summary, highlighting key points.'
  id: totrans-250
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 文档摘要：您可以直接将文档上传到应用程序中，DeepSeek将生成简洁的摘要，突出重点。
- en: 'Content Generation: Whether you need an article, a report or even an email,
    DeepSeek can create custom content based on your instructions, ensuring it is
    consistent and relevant.'
  id: totrans-251
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 内容生成：无论您需要文章、报告还是甚至电子邮件，DeepSeek都可以根据您的指示创建定制内容，确保其一致性和相关性。
- en: 'Programming assistance: code generation and correction'
  id: totrans-252
  prefs: []
  type: TYPE_NORMAL
  zh: 编程辅助：代码生成和纠错
- en: For developers, DeepSeek offers valuable tools to make coding easier.
  id: totrans-253
  prefs: []
  type: TYPE_NORMAL
  zh: 对于开发者来说，DeepSeek提供了使编码更简单的宝贵工具。
- en: 'Code Generation: By providing a description of the desired functionality, DeepSeek
    can generate code snippets in various programming languages.'
  id: totrans-254
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 代码生成：通过提供所需功能的描述，DeepSeek可以生成各种编程语言的代码片段。
- en: 'Code Fix: If you encounter any errors or bugs, you can submit your code to
    DeepSeek, which will analyze the problem and suggest solutions or fixes.'
  id: totrans-255
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 代码修复：如果你遇到任何错误或bug，你可以将你的代码提交给DeepSeek，它将分析问题并提出解决方案或修复建议。
- en: Tailoring DeepSeek to your specific needs
  id: totrans-256
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 根据您的特定需求定制DeepSeek
- en: One of DeepSeek's strengths is its flexibility and ability to be customized
    to meet specific needs.
  id: totrans-257
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek的一个优势是其灵活性和能够根据特定需求进行定制。
- en: Advanced usage with open-source customization
  id: totrans-258
  prefs: []
  type: TYPE_NORMAL
  zh: 使用开源定制进行高级使用
- en: Being an open-source platform, DeepSeek allows advanced users to customize and
    extend its functionality.
  id: totrans-259
  prefs: []
  type: TYPE_NORMAL
  zh: 作为开源平台，DeepSeek允许高级用户自定义和扩展其功能。
- en: 'Source Code Access: Developers can access DeepSeek''s source code, allowing
    them to modify or add features as needed.'
  id: totrans-260
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 源代码访问：开发者可以访问DeepSeek的源代码，允许他们根据需要修改或添加功能。
- en: 'Integration with other tools: Thanks to its open-source nature, DeepSeek can
    be integrated with other applications or systems, improving existing workflows.'
  id: totrans-261
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 与其他工具的集成：得益于其开源性质，DeepSeek可以与其他应用程序或系统集成，改进现有工作流程。
- en: 'Usage scenarios: education, business, and leisure'
  id: totrans-262
  prefs: []
  type: TYPE_NORMAL
  zh: 使用场景：教育、商业和休闲
- en: 'Education :'
  id: totrans-263
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 教育：
- en: DeepSeek is a powerful resource for students. It can help them quickly search
    for relevant information, summarize academic papers, or even solve complex problems
    by explaining detailed concepts.
  id: totrans-264
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek是学生强大的资源。它可以帮助他们快速搜索相关信息，总结学术论文，甚至通过解释详细概念来解决复杂问题。
- en: For example, a medical student could use DeepSeek to get a clear explanation
    of biological theories or solve advanced mathematical exercises. This allows students
    to save time and focus on more creative tasks.
  id: totrans-265
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，一名医学生可以使用DeepSeek获取生物理论的清晰解释或解决高级数学练习。这使学生能够节省时间并专注于更具创造性的任务。
- en: 'Companies:'
  id: totrans-266
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 公司：
- en: For professionals, DeepSeek becomes an indispensable assistant in document management
    and reporting. It can analyze large volumes of documents and extract essential
    information from them.
  id: totrans-267
  prefs: []
  type: TYPE_NORMAL
  zh: 对于专业人士来说，DeepSeek成为文档管理和报告不可或缺的助手。它可以分析大量文档并从中提取关键信息。
- en: For example, in a legal firm, it could generate contract summaries or automate
    the writing of financial reports based on raw data.
  id: totrans-268
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，在律师事务所，它可以生成合同摘要或根据原始数据自动编写财务报告。
- en: DeepSeek is also useful for automating repetitive tasks like organizing emails
    or analyzing market trends.
  id: totrans-269
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek对于自动化重复性任务（如组织电子邮件或分析市场趋势）也很有用。
- en: 'Hobbies :'
  id: totrans-270
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 爱好：
- en: DeepSeek can also enrich users' experience in their daily lives. For example,
    it can help in writing formal or informal emails, planning trips by suggesting
    optimal routes and activities according to personal preferences.
  id: totrans-271
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek还可以丰富用户在日常生活体验。例如，它可以帮助撰写正式或非正式的电子邮件，通过根据个人偏好建议最佳路线和活动来规划旅行。
- en: Additionally, it can recommend books or movies based on the user's personal
    tastes, making it a versatile personal assistant for leisure.
  id: totrans-272
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，它还可以根据用户的个人喜好推荐书籍或电影，使其成为休闲的多功能个人助理。
- en: For travelers, it can also generate route suggestions, organize activities to
    do on site, or even compare transportation options.
  id: totrans-273
  prefs: []
  type: TYPE_NORMAL
  zh: 对于旅行者，它还可以生成路线建议，组织现场活动，甚至比较交通选择。
- en: In all three areas, DeepSeek positions itself as a revolutionary productivity
    tool that saves time and simplifies complex tasks.
  id: totrans-274
  prefs: []
  type: TYPE_NORMAL
  zh: 在这三个领域，DeepSeek将自己定位为一种革命性的生产力工具，节省时间并简化复杂任务。
- en: By mastering these features, you can seamlessly integrate DeepSeek into your
    daily routine, improving your efficiency and productivity.
  id: totrans-275
  prefs: []
  type: TYPE_NORMAL
  zh: 通过掌握这些功能，您可以无缝地将DeepSeek集成到日常工作中，提高效率和生产力。
- en: 'Chapter 4: DeepSeek Prompts'
  id: totrans-276
  prefs: []
  type: TYPE_NORMAL
  zh: 第四章：DeepSeek提示
- en: Effective use of DeepSeek relies on accurate and tailored prompts. A well-designed
    prompt guides the AI to generate relevant and useful responses. In this chapter,
    we will explore techniques for creating effective prompts, illustrated with practical
    examples.
  id: totrans-277
  prefs: []
  type: TYPE_NORMAL
  zh: 有效使用DeepSeek依赖于准确和定制的提示。一个精心设计的提示引导AI生成相关和有用的响应。在本章中，我们将探讨创建有效提示的技术，并通过实际示例进行说明。
- en: Understanding the role of prompts
  id: totrans-278
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 理解提示的作用
- en: A prompt is an instruction or question given to the AI to get a specific response.
    The quality of the prompt directly influences the relevance and accuracy of the
    response generated.
  id: totrans-279
  prefs: []
  type: TYPE_NORMAL
  zh: 提示是提供给AI以获得特定响应的指令或问题。提示的质量直接影响生成的响应的相关性和准确性。
- en: Clear and detailed prompts allow DeepSeek to understand the context and purpose
    of the request, leading to more satisfactory results.
  id: totrans-280
  prefs: []
  type: TYPE_NORMAL
  zh: 清晰和详细的提示使DeepSeek能够理解请求的上下文和目的，从而产生更令人满意的结果。
- en: Techniques for writing effective prompts
  id: totrans-281
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 编写有效提示的技术
- en: 'To write effective prompts and get high-quality responses with DeepSeek, it
    is crucial to follow specific principles that allow the AI to better understand
    your expectations and generate relevant and tailored results. Here is a detailed
    explanation of each technique:'
  id: totrans-282
  prefs: []
  type: TYPE_NORMAL
  zh: 要有效地使用DeepSeek并获得高质量的响应，关键是要遵循特定的原则，这些原则使AI更好地理解您的期望并生成相关和定制的结果。以下是每种技术的详细说明：
- en: Be specific and detailed
  id: totrans-283
  prefs: []
  type: TYPE_NORMAL
  zh: 要具体和详细
- en: A specific prompt helps the AI understand exactly what you want. Rather than
    asking a vague question like “Write an article about AI,” it’s better to specify
    the aspects you want the AI to cover.
  id: totrans-284
  prefs: []
  type: TYPE_NORMAL
  zh: 一个具体的提示有助于AI准确理解您的需求。与其提出一个模糊的问题，如“写一篇关于AI的文章”，不如具体说明您希望AI涵盖的方面。
- en: For example, “Write a 500-word article on AI applications in healthcare, with
    a focus on medical diagnostics.” This allows the AI to focus on a particular topic,
    providing more relevant and detailed information. The clearer and more specific
    the prompt, the more targeted and in-depth the AI will be able to respond.
  id: totrans-285
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，“撰写一篇关于医疗保健中AI应用的500字文章，重点介绍医学诊断。”这使AI能够专注于特定主题，提供更相关和详细的信息。提示越清晰、越具体，AI的响应就越有针对性、越深入。
- en: Define the role of AI
  id: totrans-286
  prefs: []
  type: TYPE_NORMAL
  zh: 定义AI的角色
- en: Assigning a role to the AI helps guide its behavior and the tone of the response.
    This is especially useful to ensure that the response is appropriate for the situation
    and the target audience.
  id: totrans-287
  prefs: []
  type: TYPE_NORMAL
  zh: 为AI分配一个角色有助于引导其行为和响应的语气。这对于确保响应适合情境和目标受众特别有用。
- en: 'For example, if you are asking AI to generate a marketing strategy, it is more
    effective to specify: “As a digital marketing expert, propose a strategy to increase
    the visibility of a technology startup.” This specific role encourages AI to adopt
    a more professional tone and strategic approach, while remaining in line with
    expectations.'
  id: totrans-288
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，如果您要求AI生成一个营销策略，更有效的方法是具体指定：“作为一名数字营销专家，提出一个提高科技初创公司可见性的策略。”这个具体的角色鼓励AI采用更专业的语气和战略方法，同时符合预期。
- en: Specify the format of the response
  id: totrans-289
  prefs: []
  type: TYPE_NORMAL
  zh: 指定响应的格式
- en: Clearly stating the format of the response makes it easier to organize and structure
    the information generated. For example, if you need a concise summary, a list
    of key points, or a detailed essay, mention this in your prompt.
  id: totrans-290
  prefs: []
  type: TYPE_NORMAL
  zh: 明确说明响应的格式可以更容易地组织和结构化生成信息。例如，如果您需要简洁的摘要、要点列表或详细的文章，请在您的提示中提及这一点。
- en: 'For example: “Write a bulleted list of the pros and cons of artificial intelligence
    in education.” This type of detail helps the AI adapt to your preferences for
    presenting information.'
  id: totrans-291
  prefs: []
  type: TYPE_NORMAL
  zh: 例如：“列出人工智能在教育中的利弊的要点列表。”此类细节有助于AI适应您对信息呈现方式的偏好。
- en: Use examples
  id: totrans-292
  prefs: []
  type: TYPE_NORMAL
  zh: 使用示例
- en: Providing examples can be very helpful in clarifying your expectations. If you
    are asking AI to generate catchy headlines for an article, provide a template
    or direction to follow.
  id: totrans-293
  prefs: []
  type: TYPE_NORMAL
  zh: 提供示例可以非常有帮助，有助于阐明您的期望。如果您要求AI为文章生成吸引人的标题，请提供一个模板或遵循的方向。
- en: For example, “Generates a list of 10 catchy headlines for a tech trends article,
    similar to ‘The 5 innovations that will transform the industry by 2025.’” These
    examples serve as a reference point for the AI, allowing it to better understand
    the expected style, tone, and structure.
  id: totrans-294
  prefs: []
  type: TYPE_NORMAL
  zh: 例如：“生成一个类似‘到2025年将改变行业的5项创新’的科技趋势文章的10个吸引人的标题。”这些示例作为AI的参考点，使其更好地理解预期的风格、语气和结构。
- en: Clear, detailed, and well-structured prompts help maximize AI effectiveness.
    By applying these techniques, you improve the quality of the answers you get,
    making the interaction with DeepSeek much more productive and relevant to your
    needs.
  id: totrans-295
  prefs: []
  type: TYPE_NORMAL
  zh: 清晰、详细且结构良好的提示有助于最大化人工智能的效果。通过应用这些技术，您可以提高获得答案的质量，使与DeepSeek的互动更加高效和符合您的需求。
- en: Examples of effective prompts for DeepSeek
  id: totrans-296
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: DeepSeek有效提示的示例
- en: 'The examples of effective prompts for DeepSeek are designed to maximize the
    clarity of the results obtained. Each type of task requires a specific approach
    to guide the AI in the right direction. Here is a detailed analysis of the proposed
    examples:'
  id: totrans-297
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek有效提示的示例旨在最大化获得结果的清晰度。每种任务类型都需要特定的方法来引导AI走向正确的方向。以下是所提示例的详细分析：
- en: 1\. Content creation
  id: totrans-298
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1. 内容创作
- en: 'Example 1: “Write a 300-word article on the benefits of solar energy for business,
    including recent statistics.”'
  id: totrans-299
  prefs: []
  type: TYPE_NORMAL
  zh: 示例 1：“撰写一篇300字的关于太阳能对企业益处的文章，包括最新统计数据。”
- en: Here, the AI must generate informative content on a specific topic (the benefits
    of solar energy for businesses) while respecting a length limit (300 words). Adding
    recent statistics directs the AI towards current data, which improves the relevance
    of the text.
  id: totrans-300
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，AI必须生成关于特定主题（太阳能对企业的益处）的信息性内容，同时遵守长度限制（300字）。添加最新统计数据可引导AI关注当前数据，从而提高文本的相关性。
- en: 'Example 2: “Propose a series of 5 social media posts to promote a new natural
    beauty product.”'
  id: totrans-301
  prefs: []
  type: TYPE_NORMAL
  zh: 示例 2：“提出一系列5个社交媒体帖子来推广一款新的天然美容产品。”
- en: This prompt specifies a series of posts for a specific product and for a specific
    platform (social media). This requires the AI to understand not only the product,
    but also the appropriate tone for social media and how to structure these messages.
  id: totrans-302
  prefs: []
  type: TYPE_NORMAL
  zh: 此提示指定了一系列针对特定产品和特定平台（社交媒体）的帖子。这要求AI不仅理解产品，还要了解社交媒体的适当语气以及如何构建这些信息。
- en: 2\. Programming assistance
  id: totrans-303
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2. 编程辅助
- en: 'Example 1: "Write a function in Python that sorts a list of integers in descending
    order."'
  id: totrans-304
  prefs: []
  type: TYPE_NORMAL
  zh: 示例 1：“编写一个Python函数，按降序排列整数列表。”
- en: This prompt asks the AI to generate a piece of code with a clear functionality
    (sorting a list) in a specific language (Python). This is a direct example where
    the AI must not only understand the task, but also execute it in a programming
    language.
  id: totrans-305
  prefs: []
  type: TYPE_NORMAL
  zh: 此提示要求AI生成一段具有明确功能（排序列表）的代码，使用特定的语言（Python）。这是一个直接示例，其中AI不仅必须理解任务，还必须在编程语言中执行它。
- en: 'Example 2: "Debug the following code by identifying and correcting syntax errors."'
  id: totrans-306
  prefs: []
  type: TYPE_NORMAL
  zh: 示例 2：“通过识别和纠正语法错误来调试以下代码。”
- en: This prompt is intended to help the AI spot errors in a given code. It asks
    the AI to perform a syntax analysis of the provided code and suggest corrections.
  id: totrans-307
  prefs: []
  type: TYPE_NORMAL
  zh: 此提示旨在帮助AI在给定的代码中找出错误。它要求AI对提供的代码进行语法分析并提出修正建议。
- en: 3\. Data analysis
  id: totrans-308
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3. 数据分析
- en: 'Example 1: “Analyze the attached dataset and identify major trends.”'
  id: totrans-309
  prefs: []
  type: TYPE_NORMAL
  zh: 示例 1：“分析所附数据集并识别主要趋势。”
- en: This prompt assumes that the AI is capable of processing a data file. The AI
    is asked to perform statistical or descriptive analysis to identify relevant trends
    in the data.
  id: totrans-310
  prefs: []
  type: TYPE_NORMAL
  zh: 此提示假设 AI 能够处理数据文件。AI 被要求执行统计或描述性分析，以识别数据中的相关趋势。
- en: 'Example 2: "Create a bar chart showing the distribution of sales by region."'
  id: totrans-311
  prefs: []
  type: TYPE_NORMAL
  zh: '示例 2: "创建一个显示按地区划分的销售分布的条形图。"'
- en: This prompt guides the AI to generate a data visualization. The AI must understand
    the underlying data (sales distribution by region) and choose the best way to
    represent it visually (bar chart).
  id: totrans-312
  prefs: []
  type: TYPE_NORMAL
  zh: 此提示指导 AI 生成数据可视化。AI 必须理解潜在数据（按地区划分的销售分布）并选择最佳方式来视觉化表示（条形图）。
- en: 4\. Education and training
  id: totrans-313
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4. 教育与培训
- en: 'Example 1: “Explain the concept of photosynthesis in simple terms for a 12-year-old
    student.”'
  id: totrans-314
  prefs: []
  type: TYPE_NORMAL
  zh: '示例 1: “用简单的话向一个 12 岁的学生解释光合作用的原理。”'
- en: This prompt targets a simple explanation suitable for a young audience. The
    AI must explain a complex scientific concept in a clear and accessible way to
    a 12-year-old child.
  id: totrans-315
  prefs: []
  type: TYPE_NORMAL
  zh: 此提示针对适合年轻观众的简单解释。AI 必须以清晰易懂的方式向一个 12 岁的孩子解释复杂的科学概念。
- en: 'Example 2: "Create a 10-question quiz on the history of the French Revolution."'
  id: totrans-316
  prefs: []
  type: TYPE_NORMAL
  zh: '示例 2: "创建一个关于法国大革命历史的 10 道题测验。"'
- en: Here, AI is tasked with generating a quiz. This involves structuring questions
    in an educational way while respecting a specific topic (French Revolution), and
    providing a practical format for a quiz.
  id: totrans-317
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，AI 被要求生成一个测验。这涉及到以教育方式构建问题，同时尊重特定主题（法国大革命），并为测验提供实用的格式。
- en: The prompt examples show the importance of clearly defining the task goal and
    providing sufficient context. The more specific a prompt is, the better the AI
    can tailor its response to expectations.
  id: totrans-318
  prefs: []
  type: TYPE_NORMAL
  zh: 提示示例显示了明确定义任务目标和提供充分背景的重要性。提示越具体，AI 就能更好地根据预期定制其回应。
- en: Whether generating content, debugging code, analyzing data, or creating educational
    resources, each type of request has specific needs, and clear instructions help
    DeepSeek provide more useful and tailored answers.
  id: totrans-319
  prefs: []
  type: TYPE_NORMAL
  zh: 无论是在生成内容、调试代码、分析数据或创建教育资源时，每种请求都有特定的需求，清晰的指示有助于 DeepSeek 提供更有用和定制的答案。
- en: Tips for Refining Your Prompts
  id: totrans-320
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提示细化技巧
- en: 'To optimally refine your prompts, here is a detailed explanation of each key
    point:'
  id: totrans-321
  prefs: []
  type: TYPE_NORMAL
  zh: 为了最佳地细化您的提示，以下是对每个关键点的详细解释：
- en: Iteration
  id: totrans-322
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 迭代
- en: Iteration is about gradually improving a prompt based on the results obtained.
    If the initial response is not what you expected, it does not mean that the AI
    is limited. Sometimes, it is enough to rephrase the prompt, add relevant information,
    or specify the aspects to be explored.
  id: totrans-323
  prefs: []
  type: TYPE_NORMAL
  zh: 迭代是关于根据获得的结果逐步改进提示。如果初始回应不是您所期望的，这并不意味着 AI 有局限性。有时，重新措辞提示、添加相关信息或指定要探索的方面就足够了。
- en: For example, if you ask for a market analysis but the AI focuses too much on
    general aspects, you can reformulate the request by specifying the specific period,
    region or sector. This revision step allows you to obtain more relevant answers
    that are tailored to your needs.
  id: totrans-324
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，如果您要求市场分析但 AI 过多关注一般方面，您可以通过指定特定时期、地区或部门来重新表述请求。这一修订步骤使您能够获得更相关且符合您需求的答案。
- en: Using contexts
  id: totrans-325
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 使用背景
- en: Context is crucial for AI to understand the environment or setting of the request.
    For example, if you ask AI to write a content strategy for a website, it is important
    to provide additional information such as the target audience, the company’s products
    or services, and current market trends.
  id: totrans-326
  prefs: []
  type: TYPE_NORMAL
  zh: 环境或设置对 AI 理解请求至关重要。例如，如果您要求 AI 为网站编写内容策略，提供有关目标受众、公司的产品或服务以及当前市场趋势的额外信息很重要。
- en: Adding these details allows the AI to generate a more targeted response, so
    that it is directly applicable to your specific situation. This allows the AI
    to better adapt to specific constraints, offering more precise suggestions that
    are consistent with the context of your request.
  id: totrans-327
  prefs: []
  type: TYPE_NORMAL
  zh: 添加这些细节可以让 AI 生成更针对性的回应，使其直接适用于您的具体情况。这允许 AI 更好地适应特定的约束，提供与您请求背景一致的更精确的建议。
- en: Clarification of expectations
  id: totrans-328
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 明确期望的澄清
- en: Specifying the response format is essential for the AI to optimally meet your
    needs. For example, if you want a summary, specify it. If you need a detailed
    analysis or a comparison in table form, clearly mention it in the prompt.
  id: totrans-329
  prefs: []
  type: TYPE_NORMAL
  zh: 指定回应格式对于 AI 最大限度地满足您的需求至关重要。例如，如果您想要摘要，请明确指出。如果您需要详细分析或以表格形式进行比较，请在提示中明确说明。
- en: This allows the AI to structure the response appropriately, making it easier
    to read and apply the information. By adding hints about the desired tone or length
    (e.g., “write a 300-word article” or “present a bulleted list”), you direct the
    AI to a response that better fits your style or specific needs.
  id: totrans-330
  prefs: []
  type: TYPE_NORMAL
  zh: 这使得人工智能能够适当地构建回答，使其更容易阅读和应用信息。通过添加关于所需语气或长度的提示（例如，“写一篇300字的文章”或“呈现一个项目符号列表”），你指导人工智能提供更符合你风格或特定需求的回答。
- en: In summary, these three tips help you optimize your interaction with AI and
    get more relevant, tailored, and actionable answers. Iteration improves accuracy,
    context ensures relevance, and clarifying expectations allows you to have a structured
    response that meets your exact needs.
  id: totrans-331
  prefs: []
  type: TYPE_NORMAL
  zh: 总结来说，这些建议帮助你优化与人工智能的互动，并获得更相关、定制和可操作的回答。迭代提高准确性，上下文确保相关性，明确期望使你能够获得符合你确切需求的有序回答。
- en: Avoiding Common Mistakes
  id: totrans-332
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 避免常见错误
- en: 1\. Ambiguity
  id: totrans-333
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 1. 模糊不清
- en: Ambiguity in a prompt can lead to vague or unhelpful responses. It’s crucial
    to be specific in how you phrase your requests. For example, rather than simply
    asking, “Tell me about AI,” specify what you’re expecting, such as, “What are
    the ethical challenges associated with using AI in recruiting?” This specificity
    helps the AI understand exactly what you’re looking for, avoiding overly general
    or off-topic responses.
  id: totrans-334
  prefs: []
  type: TYPE_NORMAL
  zh: 提示中的模糊不清可能导致含糊或无用的回答。在表述你的请求时，明确性至关重要。例如，与其简单地问“告诉我关于人工智能的信息”，不如具体说明你期望的内容，例如，“使用人工智能进行招聘时有哪些伦理挑战？”这种具体性有助于人工智能确切了解你想要什么，避免过于笼统或离题的回答。
- en: 2\. Lack of context
  id: totrans-335
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 2. 缺乏上下文
- en: Lack of context often leaves AI confused about the purpose of your query. For
    more relevant results, you should always provide enough information about the
    situation or background. For example, instead of asking “What are the challenges
    of project management?”, you can specify “What are the challenges of project management
    in a growing tech startup?” This gives AI the information it needs to tailor its
    response to a specific setting.
  id: totrans-336
  prefs: []
  type: TYPE_NORMAL
  zh: 缺乏上下文常常使人工智能对你的查询目的感到困惑。为了获得更相关的结果，你应该始终提供足够关于情况或背景的信息。例如，与其问“项目管理有哪些挑战？”不如具体说明“在一家成长中的科技初创公司中，项目管理有哪些挑战？”这为人工智能提供了它需要的信息，以便将其回答定制到特定环境中。
- en: 3\. Conflicting Instructions
  id: totrans-337
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 3. 冲突的指令
- en: Conflicting instructions can confuse the AI, resulting in inconsistent or inappropriate
    responses. For example, asking “Write a formal article about informal fashion
    trends” is a conflicting request because a formal article and informal trends
    don’t go well together.
  id: totrans-338
  prefs: []
  type: TYPE_NORMAL
  zh: 冲突的指令可能会使人工智能困惑，导致不一致或不适当的回答。例如，“写一篇关于非正式时尚趋势的正式文章”是一个冲突的请求，因为正式文章和非正式趋势不太相配。
- en: So it’s critical to make sure your requests are consistent and aligned with
    a common goal. This ensures that AI produces responses that meet the tone and
    expectations you’ve set.
  id: totrans-339
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，确保你的请求是一致并与共同目标相一致至关重要。这确保了人工智能产生的回答符合你设定的语气和期望。
- en: In summary, to avoid common mistakes, you need to be as clear and specific as
    possible in your requests, providing enough context and ensuring that the instructions
    are consistent. This allows the AI to generate relevant responses that are tailored
    to your needs.
  id: totrans-340
  prefs: []
  type: TYPE_NORMAL
  zh: 总结来说，为了避免常见错误，你需要尽可能清晰和具体地提出你的请求，提供足够的信息，并确保指令是一致的。这使人工智能能够生成符合你需求的、相关的回答。
- en: Proficiency in writing prompts is essential to fully exploiting the potential
    of DeepSeek. By applying the techniques and examples we explored in this chapter,
    you will be able to obtain more accurate results tailored to your specific needs.
  id: totrans-341
  prefs: []
  type: TYPE_NORMAL
  zh: 精通编写提示对于充分发挥DeepSeek的潜力至关重要。通过应用我们在本章中探讨的技术和示例，你将能够获得更准确的结果，这些结果符合你的特定需求。
- en: The ability to adjust your prompts based on the results obtained will allow
    you to get the most out of artificial intelligence, while optimizing its use in
    your personal or professional projects.
  id: totrans-342
  prefs: []
  type: TYPE_NORMAL
  zh: 根据获得的结果调整你的提示，这将使你能够最大限度地利用人工智能，同时优化你在个人或专业项目中的使用。
- en: The importance of a well-formulated prompt cannot be underestimated. Not only
    does it result in higher quality responses, it also facilitates a smoother and
    more productive interaction with DeepSeek.
  id: totrans-343
  prefs: []
  type: TYPE_NORMAL
  zh: '一个良好制定的提示的重要性不容低估。这不仅会导致更高质量的回答，还促进了与DeepSeek更顺畅和更高效的合作。 '
- en: By applying best practices and experimenting with different types of prompts,
    you can turn your experience with AI into a valuable asset.
  id: totrans-344
  prefs: []
  type: TYPE_NORMAL
  zh: 通过应用最佳实践并尝试不同的提示类型，你可以将你的AI经验转化为有价值的资产。
- en: 'Chapter 5: Making Money with DeepSeek'
  id: totrans-345
  prefs: []
  type: TYPE_NORMAL
  zh: 第5章：用DeepSeek赚钱
- en: The emergence of DeepSeek, an open-source artificial intelligence, has opened
    new avenues for monetization and innovation.
  id: totrans-346
  prefs: []
  type: TYPE_NORMAL
  zh: 开源人工智能DeepSeek的出现为货币化和创新开辟了新的途径。
- en: In this chapter, we will explore how to leverage DeepSeek to generate revenue,
    develop innovative services, and collaborate within the open-source community.
  id: totrans-347
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将探讨如何利用DeepSeek生成收入、开发创新服务并在开源社区中进行合作。
- en: Monetizing the use of AI
  id: totrans-348
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 利用AI进行货币化
- en: Create and sell DeepSeek generated content
  id: totrans-349
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 创建并销售DeepSeek生成的内容
- en: DeepSeek offers a powerful tool to generate high-quality content quickly and
    at a reduced cost compared to traditional models. This allows creators to produce
    various types of content, such as blog posts, e-books, video scripts and social
    media posts, without the need for an expensive editorial team. One of the great
    advantages of DeepSeek is its ability to produce texts adapted to different formats,
    which is essential in a world where the demand for digital content is constantly
    growing.
  id: totrans-350
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek提供了一种强大的工具，可以快速生成高质量的内容，并且与传统模型相比成本较低。这使得创作者能够生产各种类型的内容，如博客文章、电子书、视频脚本和社交媒体帖子，而无需昂贵的编辑团队。DeepSeek的一个巨大优势是它能够生成适应不同格式的文本，这在数字内容需求不断增长的世界中至关重要。
- en: Produce blog posts
  id: totrans-351
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 制作博客文章
- en: Blog posts are one of the most popular types of content on the web, and DeepSeek
    lets you create quality posts with great efficiency.
  id: totrans-352
  prefs: []
  type: TYPE_NORMAL
  zh: 博客文章是网络上最受欢迎的内容类型之一，DeepSeek让你能够以极高的效率创建高质量的文章。
- en: By providing a detailed prompt, you can get well-structured articles on various
    topics in minutes, allowing you to maintain a high publishing frequency without
    sacrificing quality.
  id: totrans-353
  prefs: []
  type: TYPE_NORMAL
  zh: 通过提供详细的提示，你可以在几分钟内获得关于各种主题的结构化文章，让你能够保持高频率的发布而不牺牲质量。
- en: Create eBooks
  id: totrans-354
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 创建电子书
- en: DeepSeek is also a great tool for creating eBooks. Whether you are an author
    or want to create how-to guides, tutorials, or non-fiction books, AI can help
    you generate complete sections of text, summarize complex ideas, and provide detailed
    information on a given topic. Plus, with fast content generation, you can save
    valuable time in the writing process.
  id: totrans-355
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek也是创建电子书的好工具。无论你是作者还是想创建如何指南、教程或非虚构书籍，人工智能可以帮助你生成完整的文本部分，总结复杂的概念，并就特定主题提供详细信息。此外，由于快速生成内容，你可以在写作过程中节省宝贵的时间。
- en: Developing video scripts
  id: totrans-356
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 开发视频脚本
- en: Videos, whether educational, informational or promotional, require well-written
    scripts to be effective.
  id: totrans-357
  prefs: []
  type: TYPE_NORMAL
  zh: 视频，无论是教育性、信息性还是促销性的，都需要精心编写的脚本才能有效。
- en: DeepSeek can help you create these scripts by generating dialogues, scenes,
    and descriptions tailored to your needs. The AI can adjust its tone to match the
    purpose of the video, whether it’s professional, informative, or entertaining.
  id: totrans-358
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek可以通过生成对话、场景和描述来帮助你创建这些脚本，这些内容是根据你的需求定制的。人工智能可以调整其语气以匹配视频的目的，无论是专业、信息性还是娱乐性的。
- en: Manage social media posts
  id: totrans-359
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 管理社交媒体帖子
- en: Social media management has become a key part of digital marketing, and DeepSeek
    can play a major role in this area.
  id: totrans-360
  prefs: []
  type: TYPE_NORMAL
  zh: 社交媒体管理已成为数字营销的关键部分，DeepSeek可以在这一领域发挥重要作用。
- en: By quickly generating engaging, well-written posts for platforms like Instagram,
    Twitter, or LinkedIn, you can stay present and active without investing a significant
    amount of time.
  id: totrans-361
  prefs: []
  type: TYPE_NORMAL
  zh: 通过为Instagram、Twitter或LinkedIn等平台快速生成引人入胜、文笔优美的帖子，你可以在不投入大量时间的情况下保持活跃。
- en: Additionally, DeepSeek can help you tailor your posts to the target audience,
    choosing the right keywords and adjusting the tone of the message.
  id: totrans-362
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，DeepSeek可以帮助你根据目标受众调整帖子，选择合适的关键词并调整信息的语气。
- en: Making Content Creation Profitable
  id: totrans-363
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使内容创作盈利
- en: One of the best ways to monetize DeepSeek-generated content is to sell it or
    use it to attract customers. You can create digital products like e-books, guides,
    or trainings and sell them directly on platforms like Amazon or Gumroad.
  id: totrans-364
  prefs: []
  type: TYPE_NORMAL
  zh: 利用DeepSeek生成的内容进行货币化的最佳方式之一是出售它或用它来吸引客户。你可以创建数字产品，如电子书、指南或培训课程，并在Amazon或Gumroad等平台上直接销售。
- en: Additionally, businesses can use this generated content to populate their blogs
    or websites, improve their SEO (search engine optimization) and attract more visitors.
  id: totrans-365
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，企业可以使用这些生成的内容来填充他们的博客或网站，提高他们的SEO（搜索引擎优化）并吸引更多访客。
- en: In short, DeepSeek offers a unique opportunity for content creators to produce
    and sell quality content at a fraction of the traditional cost. By using this
    powerful AI tool, you can meet the growing demand for digital content, save time,
    and increase your profitability.
  id: totrans-366
  prefs: []
  type: TYPE_NORMAL
  zh: 简而言之，DeepSeek为内容创作者提供了一个独特的机会，以传统成本的一小部分生产和销售高质量的内容。通过使用这个强大的AI工具，你可以满足对数字内容不断增长的需求，节省时间，并提高你的盈利能力。
- en: Technical assistance and consulting thanks to DeepSeek
  id: totrans-367
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 感谢DeepSeek提供的技术支持和咨询
- en: DeepSeek is not only a content generation tool, but also a powerful ally for
    technology professionals, especially those involved in consulting.
  id: totrans-368
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek不仅是一个内容生成工具，也是技术专业人士，尤其是那些从事咨询工作的人的强大盟友。
- en: Its versatility allows consultants to develop customized solutions for their
    clients, automate complex processes, and perform advanced analyses on massive
    data.
  id: totrans-369
  prefs: []
  type: TYPE_NORMAL
  zh: 它的通用性允许顾问为客户开发定制解决方案，自动化复杂流程，并对大量数据进行高级分析。
- en: This approach makes it possible to offer a more efficient and faster service,
    while freeing experts from repetitive and laborious tasks.
  id: totrans-370
  prefs: []
  type: TYPE_NORMAL
  zh: 这种方法使得能够提供更高效、更快的服务，同时让专家从重复和繁重的任务中解放出来。
- en: 1\. Personalization of solutions
  id: totrans-371
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1. 解决方案个性化
- en: DeepSeek can be used to create tailor-made solutions tailored to each customer's
    specific needs.
  id: totrans-372
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek可以用来创建针对每个客户特定需求的定制解决方案。
- en: For example, in software development, DeepSeek can automate code writing, error
    correction, and application performance analysis. By integrating this tool into
    your processes, you reduce the risk of human error and improve the overall productivity
    of your departments.
  id: totrans-373
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，在软件开发中，DeepSeek可以自动化代码编写、错误纠正和应用性能分析。通过将此工具集成到你的流程中，你可以降低人为错误的风险，并提高你部门的整体生产力。
- en: 2\. Automation of complex processes
  id: totrans-374
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2. 复杂流程自动化
- en: Repetitive and time-consuming tasks, such as managing databases, analyzing financial
    reports or extracting crucial information, can be automated with DeepSeek.
  id: totrans-375
  prefs: []
  type: TYPE_NORMAL
  zh: 通过DeepSeek自动化重复且耗时的工作，如管理数据库、分析财务报告或提取关键信息。
- en: This allows you to focus on the strategic aspects of your mission, while ensuring
    fast and accurate execution of technical tasks. This automation is particularly
    beneficial for consultants who have to manage massive volumes of data or projects
    simultaneously.
  id: totrans-376
  prefs: []
  type: TYPE_NORMAL
  zh: 这让你能够专注于你任务的战略方面，同时确保技术任务的快速和准确执行。这种自动化对于必须同时管理大量数据或项目的顾问尤其有益。
- en: 3\. In-depth data analysis
  id: totrans-377
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3. 深入数据分析
- en: One of DeepSeek’s major strengths is its ability to perform complex data analysis.
    For example, if you work in digital marketing, DeepSeek can analyze consumer trends,
    identify user preferences, and suggest content strategies based on this data.
  id: totrans-378
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek的主要优势之一是能够执行复杂的数据分析。例如，如果你从事数字营销，DeepSeek可以分析消费者趋势，识别用户偏好，并基于这些数据提出内容策略。
- en: For strategy consultants, this may include SWOT analyses, detailed market research,
    or even financial projections based on historical data patterns.
  id: totrans-379
  prefs: []
  type: TYPE_NORMAL
  zh: 对于战略顾问来说，这可能包括SWOT分析，详细的市场研究，甚至基于历史数据模式的财务预测。
- en: 4\. Positioning as an innovative expert
  id: totrans-380
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4. 定位为创新专家
- en: By integrating DeepSeek into your consulting services, you position yourself
    as a state-of-the-art consultant. Using this advanced AI strengthens your credibility
    as an expert capable of offering modern and effective solutions.
  id: totrans-381
  prefs: []
  type: TYPE_NORMAL
  zh: 通过将DeepSeek集成到你的咨询服务中，你将自己定位为最前沿的顾问。使用这种先进的AI增强了你作为专家的信誉，能够提供现代和有效的解决方案。
- en: This allows you to stand out from the competition by offering innovative services
    that exploit the latest technologies available.
  id: totrans-382
  prefs: []
  type: TYPE_NORMAL
  zh: 这让你能够通过提供利用最新技术的创新服务来在竞争中脱颖而出。
- en: 5\. Use cases in various sectors
  id: totrans-383
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 5. 各个领域的应用案例
- en: DeepSeek’s application sectors in consulting are multiple. For example, in the
    legal field, AI can be used to analyze contracts, automate the search for legal
    precedents or generate summaries of complex cases.
  id: totrans-384
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek在咨询领域的应用领域众多。例如，在法律领域，人工智能可以用来分析合同，自动化搜索法律先例或生成复杂案件的摘要。
- en: In marketing, it can identify underexploited market segments and propose communication
    strategies adapted to each target group. In the technology sector, it can be used
    to monitor systems, predict failures or optimize the performance of IT infrastructures.
  id: totrans-385
  prefs: []
  type: TYPE_NORMAL
  zh: 在市场营销中，它可以识别未被充分利用的市场细分，并为每个目标群体提出适应的沟通策略。在技术领域，它可以用来监控系统，预测故障或优化IT基础设施的性能。
- en: 6\. Cost and time optimization
  id: totrans-386
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 6. 成本和时间优化
- en: Using DeepSeek as part of your consulting services helps you optimize costs.
    By automating certain tasks, you reduce labor costs while accelerating project
    delivery.
  id: totrans-387
  prefs: []
  type: TYPE_NORMAL
  zh: 将DeepSeek作为您咨询服务的一部分可以帮助您优化成本。通过自动化某些任务，您可以在加速项目交付的同时降低劳动力成本。
- en: This allows you to focus on the more strategic and creative aspects of your
    work, whilst providing your clients with high quality service at a competitive
    price.
  id: totrans-388
  prefs: []
  type: TYPE_NORMAL
  zh: 这使您能够专注于工作的更战略性和创造性方面，同时以具有竞争力的价格为客户提供高质量的服务。
- en: 7\. Collaboration with your customers
  id: totrans-389
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 7. 与客户合作
- en: DeepSeek also makes it easy to collaborate with your customers. With its ability
    to generate detailed reports, analyses and personalized recommendations, it becomes
    an excellent tool for communication.
  id: totrans-390
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek还使您与客户合作变得容易。凭借其生成详细报告、分析和个性化推荐的能力，它成为沟通的优秀工具。
- en: You can share AI-generated reports with your customers, tailored to their expectations
    and needs, which facilitates decision-making and strengthens the relationship
    of trust.
  id: totrans-391
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以向客户分享定制的AI生成报告，这些报告符合他们的期望和需求，从而促进决策并加强信任关系。
- en: In summary, by integrating DeepSeek into your consulting services, you not only
    improve the efficiency and quality of your work, but you also position yourself
    as a technological leader capable of offering innovative, automated and high value-added
    solutions.
  id: totrans-392
  prefs: []
  type: TYPE_NORMAL
  zh: 总结来说，通过将DeepSeek整合到您的咨询服务中，您不仅提高了工作的效率和品质，而且将自己定位为能够提供创新、自动化和高附加值解决方案的技术领导者。
- en: With this advanced AI, you can deliver faster, more accurate, and lower-cost
    service, helping you retain customers while increasing your profitability.
  id: totrans-393
  prefs: []
  type: TYPE_NORMAL
  zh: 通过这种先进的AI，您可以提供更快、更准确、成本更低的客户服务，帮助您保留客户同时增加盈利能力。
- en: Developing services around DeepSeek
  id: totrans-394
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 围绕DeepSeek开发服务
- en: Creation of AI training and tutorials
  id: totrans-395
  prefs: []
  type: TYPE_NORMAL
  zh: 创建AI培训和教程
- en: Artificial intelligence has revolutionized learning, and the demand for specialized
    training and tutorials is greater than ever. DeepSeek, thanks to its ability to
    generate personalized content, allows you to create complete educational paths.
  id: totrans-396
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能已经彻底改变了学习，对专业培训和教程的需求比以往任何时候都更大。DeepSeek凭借其生成个性化内容的能力，允许您创建完整的教育路径。
- en: You can design interactive training programs that adapt to the needs of learners,
    practical guides on technical topics, or complete e-learning modules. Using DeepSeek
    in this area allows you not only to produce resources quickly, but also to monetize
    them effectively through training platforms like Udemy, paid webinars, or monthly
    subscriptions, thus offering passive income.
  id: totrans-397
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以设计适应学习者需求的互动培训计划，关于技术主题的实用指南，或完整的电子学习模块。使用DeepSeek在这个领域不仅可以快速制作资源，还可以通过Udemy、付费网络研讨会或月度订阅等培训平台有效地货币化，从而提供被动收入。
- en: In addition to classic formats, you can also integrate interactive exercises,
    quizzes and automated assessments using AI, enriching the learning experience.
  id: totrans-398
  prefs: []
  type: TYPE_NORMAL
  zh: 除了经典格式外，您还可以通过AI集成互动练习、测验和自动评估，丰富学习体验。
- en: This model can be extended to creating tutorials for AI tools or even corporate
    training. Additionally, DeepSeek can generate content tailored to different skill
    levels, from beginners to advanced users.
  id: totrans-399
  prefs: []
  type: TYPE_NORMAL
  zh: 这种模式可以扩展到创建AI工具教程或企业培训。此外，DeepSeek可以根据不同的技能水平生成定制内容，从初学者到高级用户。
- en: Developing Enterprise Solutions Based on DeepSeek
  id: totrans-400
  prefs: []
  type: TYPE_NORMAL
  zh: 基于DeepSeek的企业解决方案开发
- en: In a business environment where efficiency is paramount, companies are constantly
    looking for ways to optimize their processes.
  id: totrans-401
  prefs: []
  type: TYPE_NORMAL
  zh: 在一个效率至关重要的商业环境中，公司不断寻找优化其流程的方法。
- en: DeepSeek, with its ability to understand and process complex data, can be a
    powerful lever to meet these needs. By integrating DeepSeek into a company's operations,
    it becomes possible to develop customized solutions that automate repetitive tasks,
    improve data analysis, or facilitate internal communication via intelligent chatbots.
  id: totrans-402
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek凭借其理解和处理复杂数据的能力，可以成为满足这些需求的有力杠杆。通过将DeepSeek整合到公司的运营中，可以开发出定制化的解决方案，自动化重复性任务，改进数据分析，或通过智能聊天机器人促进内部沟通。
- en: For example, a DeepSeek-powered chatbot can respond to customer inquiries in
    real time, provide product information, or handle common queries, freeing teams
    from repetitive tasks.
  id: totrans-403
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，一个由DeepSeek驱动的聊天机器人可以实时响应用户咨询，提供产品信息，或处理常见问题，从而让团队从重复性任务中解放出来。
- en: Another key application is in advanced data analytics. DeepSeek can be used
    to create systems that analyze massive volumes of data, extract valuable insights,
    and generate reports on key metrics for executives.
  id: totrans-404
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个关键应用领域是高级数据分析。DeepSeek可用于创建分析海量数据的系统，提取有价值的见解，并为高管生成关键指标的报告。
- en: This enables businesses to make informed decisions based on current and accurate
    data.
  id: totrans-405
  prefs: []
  type: TYPE_NORMAL
  zh: 这使企业能够根据当前和准确的数据做出明智的决策。
- en: These solutions can be offered as Software as a Service (SaaS), allowing businesses
    to benefit from highly customized solutions without having to manage complex technology
    infrastructure. By developing on-demand applications or real-time analytics systems,
    you can generate recurring revenue through monthly or annual subscriptions, while
    providing sustainable added value to your customers.
  id: totrans-406
  prefs: []
  type: TYPE_NORMAL
  zh: 这些解决方案可以作为软件即服务（SaaS）提供，使企业能够从高度定制化的解决方案中受益，而无需管理复杂的技术基础设施。通过开发按需应用程序或实时分析系统，你可以通过每月或年度订阅产生持续收入，同时为你的客户提供可持续的增值服务。
- en: So, by using DeepSeek to create innovative business solutions, you position
    your company at the forefront of digital transformation, while leveraging a business
    model based on flexibility, scalability and profitability.
  id: totrans-407
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，通过使用DeepSeek创建创新业务解决方案，你将使你的公司在数字化转型的前沿位置，同时利用基于灵活性、可扩展性和盈利性的商业模式。
- en: Harnessing the power of open source to innovate
  id: totrans-408
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 利用开源的力量进行创新
- en: Collaboration with the global community
  id: totrans-409
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 与全球社区合作
- en: One of the major advantages of DeepSeek is its open-source nature. This feature
    enables global collaboration, fostering the exchange of ideas, continuous improvement
    and collective innovation.
  id: totrans-410
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek的主要优势之一是其开源性质。这一特性促进了全球合作，促进了思想的交流，持续改进和集体创新。
- en: By contributing to the community, you can not only enrich your skills, but also
    benefit from the advances made by other experts.
  id: totrans-411
  prefs: []
  type: TYPE_NORMAL
  zh: 通过为社区做出贡献，你不仅可以丰富自己的技能，还可以从其他专家的进步中受益。
- en: Building your own AI tools from DeepSeek
  id: totrans-412
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 从DeepSeek构建自己的AI工具
- en: DeepSeek stands out for its flexibility, allowing users to develop tailor-made
    AI tools based on their specific needs. One of the major advantages of DeepSeek
    is the ability to customize the model to fit the requirements of various industries
    such as healthcare, education, retail, and many others.
  id: totrans-413
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek以其灵活性脱颖而出，允许用户根据他们的特定需求开发定制化的AI工具。DeepSeek的主要优势之一是能够定制模型以满足医疗保健、教育、零售等多个行业的不同需求。
- en: By adjusting the model architecture to meet particular use cases, you can create
    tailored solutions that solve unique problems.
  id: totrans-414
  prefs: []
  type: TYPE_NORMAL
  zh: 通过调整模型架构以满足特定用例，你可以创建定制解决方案来解决独特问题。
- en: 'Take healthcare for example: DeepSeek can be used to develop tools that help
    analyze medical records, monitor patients, or make treatment recommendations based
    on historical and real-time data.'
  id: totrans-415
  prefs: []
  type: TYPE_NORMAL
  zh: 以医疗保健为例：DeepSeek可用于开发帮助分析病历、监测患者或基于历史和实时数据提出治疗建议的工具。
- en: By customizing the model's features, healthcare professionals can have an intelligent
    assistant capable of diagnosing or predicting pathologies from complex databases.
  id: totrans-416
  prefs: []
  type: TYPE_NORMAL
  zh: 通过定制模型的功能，医疗保健专业人员可以拥有一个智能助手，能够从复杂数据库中诊断或预测疾病。
- en: In education, it is possible to create applications that generate tailor-made
    learning paths for each student, taking into account their pace, preferences and
    gaps.
  id: totrans-417
  prefs: []
  type: TYPE_NORMAL
  zh: 在教育领域，可以创建为每个学生生成定制学习路径的应用程序，考虑到他们的学习进度、偏好和差距。
- en: For example, a DeepSeek-based tool could be developed to recommend tailored
    learning resources, interactive exercises, or personalized reviews, facilitating
    a dynamic and evolving learning experience.
  id: totrans-418
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，可以开发基于DeepSeek的工具来推荐定制的学习资源、互动练习或个性化的复习，从而促进动态和不断发展的学习体验。
- en: In the retail sector, DeepSeek can be used to create intelligent chatbots that
    can interact with customers, answer their questions in real time, or provide personalized
    product recommendations based on their preferences and previous purchases.
  id: totrans-419
  prefs: []
  type: TYPE_NORMAL
  zh: 在零售领域，DeepSeek可用于创建智能聊天机器人，可以与客户互动，实时回答他们的问题，或根据他们的偏好和以往购买提供个性化的产品推荐。
- en: Additionally, predictive analytics generated by AI tools like those created
    with DeepSeek could anticipate market trends and help retailers optimize their
    inventory and marketing strategies.
  id: totrans-420
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，由DeepSeek等AI工具生成的预测分析可以预测市场趋势，并帮助零售商优化库存和营销策略。
- en: By customizing and developing tools from DeepSeek, you are not just addressing
    an immediate need, but creating innovative solutions that can grow and evolve
    with market needs.
  id: totrans-421
  prefs: []
  type: TYPE_NORMAL
  zh: 通过定制和开发DeepSeek的工具，你不仅满足了当前的需求，还创造了可以随着市场需求增长和发展的创新解决方案。
- en: This positions you as a leader in integrating AI into diverse fields, while
    opening the way to new applications and economic opportunities.
  id: totrans-422
  prefs: []
  type: TYPE_NORMAL
  zh: 这使你在将人工智能整合到各个领域方面成为领导者，同时也为新的应用和经济机会开辟了道路。
- en: In conclusion, DeepSeek offers a multitude of opportunities to generate revenue,
    develop innovative services and collaborate within a dynamic community.
  id: totrans-423
  prefs: []
  type: TYPE_NORMAL
  zh: 总之，DeepSeek提供了多种创收、开发创新服务和在动态社区中协作的机会。
- en: By fully exploiting its capabilities, you can not only improve your professional
    skills, but also contribute to the evolution of artificial intelligence in various
    industries.
  id: totrans-424
  prefs: []
  type: TYPE_NORMAL
  zh: 通过充分利用其功能，你不仅可以提高你的专业技能，还可以为各个行业中人工智能的演变做出贡献。
- en: Conclusion
  id: totrans-425
  prefs: []
  type: TYPE_NORMAL
  zh: 结论
- en: Throughout the chapters, we explored the enormous potential of DeepSeek, a revolutionary
    artificial intelligence tool that is redefining the boundaries of AI.
  id: totrans-426
  prefs: []
  type: TYPE_NORMAL
  zh: 在整个章节中，我们探讨了DeepSeek的巨大潜力，这是一个革命性的人工智能工具，正在重新定义人工智能的边界。
- en: 'This open-source model, designed to democratize access to cutting-edge technologies,
    offers undeniable advantages: accessibility, customization and cost reduction.
    Thanks to DeepSeek, we have discovered a way not only to maximize our productivity,
    but also to create new professional and financial opportunities.'
  id: totrans-427
  prefs: []
  type: TYPE_NORMAL
  zh: 这个开源模式旨在民主化尖端技术的访问，提供了不可否认的优势：可访问性、定制化和成本降低。多亏了DeepSeek，我们找到了一种方法，不仅能够最大化我们的生产力，还能创造新的职业和财务机会。
- en: The world of artificial intelligence is constantly evolving, and DeepSeek stands
    out for its ability to overcome the limitations of existing models.
  id: totrans-428
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能的世界不断演变，DeepSeek因其克服现有模型局限性的能力而脱颖而出。
- en: Whether in content creation, developing enterprise solutions or collaborating
    with the open-source community, DeepSeek offers a multitude of possibilities.
  id: totrans-429
  prefs: []
  type: TYPE_NORMAL
  zh: 无论是在内容创作、开发企业解决方案还是与开源社区合作，DeepSeek都提供了多种可能性。
- en: This AI is not just a technical tool, it is the catalyst for a real digital
    revolution, accessible to everyone, even entrepreneurs and content creators without
    advanced technical resources.
  id: totrans-430
  prefs: []
  type: TYPE_NORMAL
  zh: 这个AI不仅仅是一个技术工具，它是真正数字革命的催化剂，对每个人开放，即使是那些没有先进技术资源的创业者和内容创作者。
- en: Throughout this book, you have learned how to master DeepSeek, exploit its many
    features, and adapt it to your specific needs.
  id: totrans-431
  prefs: []
  type: TYPE_NORMAL
  zh: 在这本书中，你学习了如何掌握DeepSeek，利用其众多功能，并适应你的特定需求。
- en: By applying the strategies we've covered, you're now ready to leverage artificial
    intelligence to achieve your personal and professional goals.
  id: totrans-432
  prefs: []
  type: TYPE_NORMAL
  zh: 通过应用我们介绍过的策略，你现在已经准备好利用人工智能来实现你的个人和职业目标。
- en: However, it is important to keep in mind that AI is a constantly evolving technology.
    DeepSeek, like any advanced technology, will continue to develop and improve.
  id: totrans-433
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，重要的是要记住，人工智能是一项不断发展的技术。DeepSeek，就像任何先进技术一样，将继续发展和改进。
- en: So this book is an important step in your journey, but it should not be seen
    as an end point. The real wealth of AI lies in its ability to reinvent itself,
    to push the boundaries of what we thought was possible.
  id: totrans-434
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，这本书是你旅程中的一个重要步骤，但它不应被视为终点。人工智能的真实财富在于其自我革新的能力，在于其推动我们认为可能的边界。
- en: The future of DeepSeek and artificial intelligence in general is full of promise.
    By staying curious, experimenting with new applications, and contributing to the
    open-source community, you can play a key role in this revolution. You now have
    in your hands not only a powerful tool, but also a unique opportunity to actively
    participate in creating a future where AI transforms our lives in a positive and
    sustainable way.
  id: totrans-435
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek和人工智能的未来充满了希望。通过保持好奇心，尝试新的应用，并为开源社区做出贡献，你可以在这次革命中扮演关键角色。你现在手中不仅有一个强大的工具，还有独特的机会积极参与创造一个未来，在那里人工智能以积极和可持续的方式改变我们的生活。
- en: So whether you are a content creator, consultant, entrepreneur or developer,
    now is the time to take charge of your future and maximize the possibilities that
    DeepSeek offers.
  id: totrans-436
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，无论你是内容创作者、顾问、企业家还是开发者，现在是时候掌握你的未来，最大限度地发挥DeepSeek提供的可能性。
- en: The age of artificial intelligence is here, and with it, new avenues for innovation
    and prosperity. Take full advantage of it, and remember that in the world of AI,
    anything is possible.
  id: totrans-437
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能的时代已经到来，随之而来的是创新和繁荣的新途径。充分利用它，并记住在人工智能的世界里，任何事都是可能的。
- en: The adventure has only just begun.
  id: totrans-438
  prefs: []
  type: TYPE_NORMAL
  zh: 冒险才刚刚开始。
