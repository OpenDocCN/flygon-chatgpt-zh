- en: Introduction
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Hey there! Welcome to "100 ChatGPT Power Prompts." This isn't just any guide—it's
    your ticket to transforming how you interact with ChatGPT. Whether you're looking
    for business advice, creative ideas, or practical solutions, these prompts are
    here to help you get the most out of ChatGPT. Perfect for both newcomers and seasoned
    pros, this guide is designed to elevate your ChatGPT experience.
  prefs: []
  type: TYPE_NORMAL
- en: Why Power Prompts?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'ChatGPT is impressive on its own, but knowing how to craft the right prompts
    can take it to a whole new level. Power prompts aren’t just your regular prompts;
    they’re designed to pull out detailed, accurate, and insightful answers from ChatGPT.
    Here’s why they’re a game-changer:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Generate Accurate Outputs: Clear and detailed prompts lead to more precise
    answers.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Save Time: By reducing the need for multiple attempts, you can get the information
    you need faster.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Uncover New Insights: Well-crafted prompts can reveal fresh perspectives you
    hadn’t considered.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Boost Creativity: Enhance your creativity and innovation by leveraging the
    power of ChatGPT.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Improve Decision-Making: Get better at solving problems and making decisions
    with insightful AI-generated advice.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: This Book is more than a collection of prompts. It’s your toolkit to unlock
    new opportunities and reach your goals with ChatGPT. Every prompt in this Book
    has been thoroughly tested with ChatGPT to ensure that it delivers accurate, detailed,
    and valuable responses.
  prefs: []
  type: TYPE_NORMAL
- en: Purpose of the Book
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The main goal of this book is to provide you with a treasure trove of carefully
    crafted prompts that can help you tap into ChatGPT’s full potential. Whether you’re
    an entrepreneur on the hunt for innovative business ideas, a content creator in
    need of engaging social media posts, or an educator developing comprehensive courses,
    there’s something in here for you. Each prompt is designed to give you detailed
    and actionable results, making your ChatGPT experience more productive and insightful.
  prefs: []
  type: TYPE_NORMAL
- en: How to Use This Book
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Inside, you'll discover over 100 prompts, each tailored for different purposes.
    From brainstorming business ideas to crafting compelling marketing copy, every
    prompt is designed to meet specific needs and objectives.
  prefs: []
  type: TYPE_NORMAL
- en: Using these power prompts is simple. Browse through the prompts, pick the ones
    that suit your needs, fill in the placeholders with relevant details, copy and
    paste them into ChatGPT, and hit enter. In seconds, ChatGPT will generate tailored
    responses to help with your queries, offering you valuable insights and solutions.
  prefs: []
  type: TYPE_NORMAL
- en: Understanding Placeholders
  prefs: []
  type: TYPE_NORMAL
- en: Placeholders are the parts of the prompt that you can fill in with specific
    details relevant to your needs.
  prefs: []
  type: TYPE_NORMAL
- en: 'They are typically enclosed in brackets and act as variables that you replace
    with your own information. For example:'
  prefs: []
  type: TYPE_NORMAL
- en: '"I want to learn [skill]" can be customized to "I want to learn Java programming."'
  prefs: []
  type: TYPE_NORMAL
- en: LearnPrompt.org
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Make sure to visit [LearnPrompt.org](https://www.learnprompt.org), a great platform
    with loads of ChatGPT prompts for various purposes. It’s an excellent resource
    to hone your prompting skills for free and stay ahead in the evolving AI landscape.
  prefs: []
  type: TYPE_NORMAL
- en: 'For easy access to all the prompts covered in this book and to copy them directly
    for use, visit our dedicated webpage: https://www.learnprompt.org/get100-power-prompts'
  prefs: []
  type: TYPE_NORMAL
- en: Empower Your Interactions
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: We hope this book becomes your go-to resource, helping you tap into the full
    potential of ChatGPT and make a real impact in whatever you do. With "100 ChatGPT
    Power Prompts," you have a powerful tool to unleash creativity, solve problems,
    and achieve your goals with incredible efficiency. Whether you're a business professional,
    a content creator, or a lifelong learner, let these power prompts guide you on
    a journey of discovery and innovation with ChatGPT.
  prefs: []
  type: TYPE_NORMAL
- en: Are you ready to unlock the full potential of ChatGPT? Let's dive in and explore
    the limitless possibilities together, one prompt at a time.
  prefs: []
  type: TYPE_NORMAL
- en: Prompt for Business Ideas
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Welcome to the first prompt of the book! This prompt is designed to ignite your
    entrepreneurial spirit by helping you generate innovative business ideas tailored
    to your chosen industry.
  prefs: []
  type: TYPE_NORMAL
- en: Prompt 1
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Create a list of innovative business ideas focused on the [industry or sector]
    industry. Each idea should include the following elements:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Business Concept: Describe the core concept of the business.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Target Market: Identify the primary demographic or customer base.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Unique Selling Proposition (USP): Highlight what makes this business idea unique
    or innovative.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Revenue Model: Explain how the business will generate income.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Potential Challenges: Outline any significant challenges or obstacles the business
    might face and possible solutions.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Ensure that the business ideas are practical, have clear paths to profitability,
    and cater to the specified market. Each description should be detailed and concise,
    providing a clear understanding of the business concept and its potential.
  prefs: []
  type: TYPE_NORMAL
- en: Steps to Use this Prompt in ChatGPT
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 1: Identify Your Industry or Sector:'
  prefs: []
  type: TYPE_NORMAL
- en: Choose the specific industry or sector you are interested in. For this example,
    we’ll use the health and wellness industry.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Step 2: Customize the Prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: Replace the placeholder [industry or sector] with your chosen industry.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Example: "Create a list of innovative business ideas focused on the health
    and wellness industry."'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Example Prompt: Health and Wellness Industry (First One Filled for You)'
  prefs: []
  type: TYPE_NORMAL
- en: 'Create a list of innovative business ideas focused on the health and wellness
    industry. Each idea should include the following elements:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Business Concept: Describe the core concept of the business.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Target Market: Identify the primary demographic or customer base.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Unique Selling Proposition (USP): Highlight what makes this business idea unique
    or innovative.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Revenue Model: Explain how the business will generate income.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Potential Challenges: Outline any significant challenges or obstacles the business
    might face and possible solutions.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Ensure that the business ideas are practical, have clear paths to profitability,
    and cater to the specified market. Each description should be detailed and concise,
    providing a clear understanding of the business concept and its potential.
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 3: Input the Customized Prompt into ChatGPT:'
  prefs: []
  type: TYPE_NORMAL
- en: Copy the customized prompt and paste it into the ChatGPT input box.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Step 4: Review the Generated Ideas:'
  prefs: []
  type: TYPE_NORMAL
- en: Read through the list of business ideas generated by ChatGPT.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Step 5: Refine and Iterate:'
  prefs: []
  type: TYPE_NORMAL
- en: If necessary, ask follow-up questions or request more details to refine the
    ideas further.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Example Follow-Up: Can you provide more examples of unique selling propositions
    for the wellness app?'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Prompt 2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: I am an entrepreneur looking to enter the [industry or sector] industry but
    am currently struggling to come up with innovative and practical business ideas.
    I need your expertise to generate a list of potential business concepts that are
    unique and have a clear path to profitability.
  prefs: []
  type: TYPE_NORMAL
- en: 'As an expert business strategist, your role is to create a list of [number
    of ideas] innovative business ideas focused on the [industry or sector] industry.
    Each idea should include the following elements:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Industry: Specify the industry or sector.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Business Concept: Describe the core concept of the business in detail.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Target Market: Identify the primary demographic or customer base, including
    relevant psychographics and behavioral characteristics.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Unique Selling Proposition (USP): Highlight what makes this business idea unique
    or innovative, and explain how it stands out from competitors.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Revenue Model: Explain in detail how the business will generate income, including
    primary and secondary revenue streams.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Market Analysis: Provide a brief analysis of the current market conditions,
    including trends, demands, and potential growth opportunities.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Marketing Strategy: Outline the key marketing strategies that will be used
    to attract and retain customers.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Operational Plan: Describe the key operations required to run the business,
    including any technology, staffing, and logistics considerations.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Financial Projections: Provide a high-level overview of the financial projections,
    including initial investment, break-even point, and profitability timeline.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Potential Challenges: Outline any significant challenges or obstacles the business
    might face and possible solutions.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Ensure that the business ideas are diverse, covering different aspects within
    the specified industry. Each idea should be practical, have clear paths to profitability,
    and provide a detailed understanding of the business concept and its potential.
  prefs: []
  type: TYPE_NORMAL
- en: Prompt for Generating Business Model
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Many aspiring entrepreneurs struggle with formulating a comprehensive business
    model that outlines how their venture will create, deliver, and capture value.
    This often leads to a lack of direction and inefficient resource allocation. This
    prompt guides you through the essential components of a business model, helping
    you clearly define your value proposition, customer segments, revenue streams,
    and more. By following this structured approach, you can develop a robust and
    coherent business model that serves as a strong foundation for your startup.
  prefs: []
  type: TYPE_NORMAL
- en: 'Please generate a comprehensive business model for the following idea: [describe
    your idea here]. The business model should cover the following key components:'
  prefs: []
  type: TYPE_NORMAL
- en: '1. Value Proposition: Clearly describe the unique value or benefit that the
    idea provides to customers. Explain how it solves a problem or meets a need. Include
    any unique selling points or advantages over competitors.'
  prefs: []
  type: TYPE_NORMAL
- en: '2\. Target Market: Identify the primary customer segments for this idea. Include
    demographic, geographic, and psychographic details. Consider market size and potential
    growth opportunities.'
  prefs: []
  type: TYPE_NORMAL
- en: '3\. Revenue Streams: Outline the various ways the business will generate revenue.
    Consider different pricing strategies, sales channels, subscription models, and
    potential partnerships.'
  prefs: []
  type: TYPE_NORMAL
- en: '4\. Cost Structure: Detail the main costs involved in operating the business.
    Include fixed and variable costs, initial setup expenses, ongoing operational
    expenses, and any potential economies of scale.'
  prefs: []
  type: TYPE_NORMAL
- en: '5\. Key Activities: List the essential activities and processes required to
    deliver the value proposition and operate the business successfully. Highlight
    any critical operational processes or innovations.'
  prefs: []
  type: TYPE_NORMAL
- en: '6\. Key Resources: Identify the critical resources (e.g., human, financial,
    physical, intellectual) needed to execute the business model. Consider any proprietary
    technology, patents, or unique assets.'
  prefs: []
  type: TYPE_NORMAL
- en: '7\. Key Partnerships: Describe any strategic alliances or partnerships that
    will be crucial for the success of the business. Consider suppliers, distributors,
    industry networks, and other stakeholders.'
  prefs: []
  type: TYPE_NORMAL
- en: '8. Customer Relationships: Explain how the business will interact with and
    maintain relationships with its customers. Include details on customer acquisition,
    retention, support strategies, and any loyalty programs.'
  prefs: []
  type: TYPE_NORMAL
- en: '9\. Channels: Define the channels through which the business will reach its
    customers and deliver its value proposition. Consider both online and offline
    channels, and include any marketing and distribution strategies.'
  prefs: []
  type: TYPE_NORMAL
- en: '10\. Competitive Landscape: Provide an overview of the competitive landscape.
    Identify key competitors, analyze their strengths and weaknesses, and describe
    how your idea differentiates itself.'
  prefs: []
  type: TYPE_NORMAL
- en: '11\. Milestones and Metrics: Outline key milestones and metrics for tracking
    the progress and success of the business. Include short-term and long-term goals,
    and any key performance indicators (KPIs).'
  prefs: []
  type: TYPE_NORMAL
- en: Ensure that each section is detailed and includes relevant examples, case studies,
    and data to support your analysis.
  prefs: []
  type: TYPE_NORMAL
- en: Prompt for Brand Name
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Coming up with a unique and memorable brand name that resonates with your target
    audience can be challenging, often resulting in frustration and delays in brand
    development. This prompt helps you generate a list of potential brand names by
    considering factors such as your business's core values, target market, and industry
    trends. It streamlines the creative process, enabling you to select a brand name
    that effectively communicates your brand identity and stands out in the marketplace.
  prefs: []
  type: TYPE_NORMAL
- en: 'Create a list of 10 unique and memorable brand names for a new business in
    the [industry or sector] industry. Each brand name should include the following
    elements:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Brand Name: A unique and catchy name that is easy to remember and pronounce.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Meaning and Inspiration: Provide a brief explanation of the meaning behind
    the name and the inspiration or rationale for choosing it. Highlight any relevant
    cultural, linguistic, or industry-specific references.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Target Market: Identify the primary demographic or customer base the brand
    name is intended to appeal to. Consider age, gender, location, interests, and
    lifestyle.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Brand Values and Personality: Describe how the brand name reflects the core
    values, mission, and personality of the business. Consider attributes like trustworthiness,
    innovation, luxury, sustainability, etc.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Emotional Appeal: Explain the emotional response the brand name is intended
    to evoke in the target audience. Consider feelings like trust, excitement, comfort,
    or aspiration.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Logo and Visual Identity Potential: Describe how the brand name could be visually
    represented in a logo or other branding materials. Consider colors, typography,
    and design elements.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Scalability and Flexibility: Assess how well the brand name can support potential
    brand extensions or new product lines in the future. Ensure it is versatile enough
    to grow with the business.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Cultural and Linguistic Considerations: Ensure the brand name is culturally
    sensitive and has positive connotations in different languages and regions where
    the business might operate.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Competitive Landscape: Compare the proposed brand name with existing brands
    in the industry. Explain how it differentiates from competitors and its potential
    for market distinction.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Ensure that the brand names are creative, relevant to the industry, and have
    the potential to stand out in a competitive market. Each description should be
    detailed and concise, providing a clear understanding of the name's significance
    and suitability. The names should also be versatile enough to support future brand
    extensions or product lines.
  prefs: []
  type: TYPE_NORMAL
- en: Prompt for Domain Name
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Finding an available domain name that is both relevant to your business and
    easy for customers to remember can be difficult, especially with many popular
    names already taken. This prompt aids you in brainstorming and refining domain
    name options by incorporating keywords related to your business, ensuring relevance
    and searchability. By using this prompt, you'll be able to identify and secure
    a domain name that enhances your online presence and aligns with your branding
    strategy.
  prefs: []
  type: TYPE_NORMAL
- en: 'Please generate [number of domains] original and creative domain names tailored
    for the [niche] niche. Focus on capturing the main concepts and target audience
    of this niche. Each domain name should meet the following criteria:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Brand Relevance: Strongly connect with the niche and its central concepts.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Memorable: Be captivating, easy to remember, and use familiar spellings.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Concise: Keep each domain name between 6-14 characters for ease of typing and
    recall.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Simplicity: Avoid hyphens and numbers for a cleaner appearance.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Keyword Incorporation: Utilize relevant niche keywords for improved SEO, if
    possible.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Pronunciation: Ensure each domain name is easily understandable when spoken
    or “radio-friendly.”'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Domain Extensions: Prioritize .com, .net, .org, and .ai extensions when applicable.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Legality: Refrain from infringing on existing trademarks or brands.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: For each domain name, provide a brief explanation (1-2 sentences) highlighting
    its relevance to the niche. Your response should be flexible and creative while
    maintaining a focused approach on the [niche] niche, providing a solid foundation
    for building a brand within that market.
  prefs: []
  type: TYPE_NORMAL
- en: Prompt for Logo Design
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Designing a logo that effectively represents your brand's identity and appeals
    to your target audience can be overwhelming, especially if you lack design experience.
    This prompt provides a step-by-step guide to conceptualizing and creating a logo
    by considering your brand's core values, target demographics, and industry aesthetics.
    By using this prompt, you can develop a distinctive and professional logo that
    captures the essence of your brand and makes a lasting impression.
  prefs: []
  type: TYPE_NORMAL
- en: 'Create a set of 5 unique logo design concepts for a [type of business or organization]
    called [business name]. Each logo concept should include the following elements:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Design Description: Provide a detailed description of the logo design, including
    the shape, colors, and any symbols or imagery used.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Brand Identity: Explain how the logo reflects the brand''s identity, mission,
    and values.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Target Audience: Identify the primary demographic or customer base that the
    logo is intended to appeal to.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Color Scheme: Specify the color scheme used in the logo and explain why these
    colors were chosen.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Typography: Describe the typeface used in the logo and its significance.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Versatility: Discuss how the logo can be used across different mediums (e.g.,
    print, digital, merchandise) and in various sizes.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Ensure that each logo concept is distinct, visually appealing, and aligns with
    the brand's overall vision. Provide enough detail to give a clear understanding
    of the design and its intended impact.
  prefs: []
  type: TYPE_NORMAL
- en: Prompt for Product Description
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Crafting engaging and informative product descriptions that highlight the features
    and benefits of your products can be time-consuming and challenging, often resulting
    in uninspiring content that fails to convert. This prompt helps you generate compelling
    product descriptions by focusing on key elements such as unique features, benefits,
    and customer pain points. With this prompt, you'll be able to create persuasive
    and attractive descriptions that effectively communicate the value of your products
    and drive sales.
  prefs: []
  type: TYPE_NORMAL
- en: Prompt 1
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Write a compelling product description for [product name], highlighting its
    key features such as [feature 1], [feature 2], and [feature 3]. Emphasize the
    benefits it offers, including [benefit 1], [benefit 2], and [benefit 3]. Ensure
    the tone is [formal/informal] and aimed at [target audience].
  prefs: []
  type: TYPE_NORMAL
- en: Prompt 2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: I am the marketing manager at a company that has just launched an innovative
    new product. We need a detailed and engaging product description to attract potential
    customers. Assume the role of a professional copywriter who specializes in creating
    compelling product descriptions.
  prefs: []
  type: TYPE_NORMAL
- en: 'Please create a product description for a [product type] named [product name].
    The description should include the following elements:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Product Overview: Start with a brief introduction to the product, including
    its name, primary use or purpose, and a catchy tagline.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Key Features: List and describe the main features of the product, focusing
    on what makes it unique and valuable. Include specific attributes such as [feature
    1], [feature 2], and [feature 3].'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Benefits: Explain the benefits of using the product, highlighting how it solves
    problems or improves the user’s life. Mention specific advantages like [benefit
    1], [benefit 2], and [benefit 3].'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Target Audience: Identify the primary demographic or customer base for the
    product. Specify details such as age range, gender, lifestyle, and interests.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Technical Specifications: Provide any relevant technical details or specifications
    that customers might need to know. Include specifics like [specification 1], [specification
    2], and [specification 3].'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Usage Instructions: Offer a brief guide on how to use the product effectively.
    Include steps such as [step 1], [step 2], and [step 3].'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Customer Testimonials: Include one or two fictional customer testimonials that
    illustrate positive experiences with the product.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Comparison to Competitors: Compare the product to similar products on the market,
    emphasizing its advantages.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Call to Action: End with a strong call to action, encouraging customers to
    purchase the product.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Ensure the description is persuasive, well-structured, and easy to read. It
    should capture the attention of potential customers and provide them with all
    the information they need to make an informed purchasing decision.
  prefs: []
  type: TYPE_NORMAL
- en: Prompt for Etsy Description
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Writing an Etsy description that stands out in a crowded marketplace and effectively
    conveys the unique aspects of your handmade or vintage items can be difficult.
    This prompt guides you through crafting an engaging description by emphasizing
    your product's unique qualities, materials, and crafting process. By using this
    prompt, you can enhance your product's appeal and visibility, attracting more
    potential buyers and increasing your chances of making sales.
  prefs: []
  type: TYPE_NORMAL
- en: Please create a detailed and engaging product description for an Etsy listing.
    The product is a [product type], specifically designed for [target audience].
    Highlight the unique features and benefits of the product, including [feature
    1], [feature 2], and [feature 3].
  prefs: []
  type: TYPE_NORMAL
- en: Mention the materials used, which are [materials], and the dimensions, which
    are [dimensions]. Explain the craftsmanship and any special techniques used in
    its creation, such as [technique].
  prefs: []
  type: TYPE_NORMAL
- en: Include care instructions, like [care instructions]. Finally, mention why this
    product makes a perfect gift or a valuable addition to someone's collection.
  prefs: []
  type: TYPE_NORMAL
- en: Prompt for Generating USPs
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Identifying and articulating your business's unique selling propositions (USPs)
    can be challenging, especially in a competitive market where differentiation is
    crucial. This prompt assists you in pinpointing your business's distinct advantages
    and strengths by analyzing your products and services. With this prompt, you can
    clearly define your USPs, enabling you to communicate your value proposition effectively
    and stand out from competitors.
  prefs: []
  type: TYPE_NORMAL
- en: I am currently working on a marketing campaign for a [product/service] in the
    [industry/market]. One of the challenges I am facing is creating compelling and
    concise Unique Selling Propositions (USPs) that effectively differentiate the
    [product/service] from its competitors. I need your expertise as a marketing strategist
    to help me generate [specify number] USPs.
  prefs: []
  type: TYPE_NORMAL
- en: Each USP should highlight a different key benefit or unique feature that sets
    the [product/service] apart. Consider the target audience, specifically focusing
    on their [audience demographics, e.g., age, gender] and [audience psychographics,
    e.g., interests, lifestyle], and address their primary needs and pain points.
  prefs: []
  type: TYPE_NORMAL
- en: Ensure each USP is no more than 2-3 sentences and includes a strong value proposition
    that clearly communicates the unique advantage of the [product/service].
  prefs: []
  type: TYPE_NORMAL
- en: Prompt for Understanding Ideal Customer
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Many businesses struggle to accurately define and understand their ideal customer,
    leading to ineffective marketing strategies and missed opportunities. This prompt
    helps you create a detailed profile of your ideal customer by considering factors
    such as demographics, psychographics, and buying behavior. By using this prompt,
    you can gain valuable insights into your target audience, allowing you to tailor
    your marketing efforts and connect more effectively with potential customers.
  prefs: []
  type: TYPE_NORMAL
- en: 'I am trying to understand the ideal customer for [specific product or service],
    but I am struggling to gather and organize the relevant information. You are an
    expert market analyst. Please help me analyze the profile of the ideal customer.
    The analysis should cover the following aspects:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Demographics: Age, gender, income level, education, occupation, and geographic
    location.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Psychographics: Lifestyle, values, interests, and attitudes.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Buying Behaviors: Purchasing habits, brand loyalty, decision-making process,
    and preferred shopping channels.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Needs and Pain Points: Identify the primary needs, challenges, and pain points
    that the product or service addresses.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Goals and Aspirations: Describe the customer''s goals, aspirations, and what
    they hope to achieve by using the product or service.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Influences and Motivations: Highlight the key factors that influence their
    purchasing decisions and what motivates them to buy.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Customer Journey: Map out the typical customer journey, from awareness to purchase
    and post-purchase stages.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Ensure the profile is detailed and based on data and insights relevant to [specific
    product or service]. Each element should provide a clear and actionable understanding
    of who the ideal customer is and how best to reach and engage them.
  prefs: []
  type: TYPE_NORMAL
- en: Prompt for Identifying Niche Market
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Many entrepreneurs struggle to find unique and profitable niche markets, often
    resulting in wasted resources and missed opportunities. This prompt helps you
    uncover untapped niche markets by leveraging ChatGPT's ability to analyze trends
    and consumer needs, enabling you to focus on areas with high potential and less
    competition.
  prefs: []
  type: TYPE_NORMAL
- en: Identify and explore various niche markets within the [industry/sector]. For
    each niche market, provide a detailed description, including the target audience,
    unique value propositions, and potential products or services that could cater
    to this market. Additionally, include examples of existing companies or products
    that have successfully tapped into these niches, if any.
  prefs: []
  type: TYPE_NORMAL
- en: 'Consider the following factors when identifying niche markets: emerging trends,
    unmet needs, cultural influences, technological advancements, and consumer behaviors.
    Ensure the analysis covers at least five distinct niche markets.'
  prefs: []
  type: TYPE_NORMAL
- en: Prompt for Creating User Persona
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Understanding your target audience can be challenging without a clear user persona,
    leading to ineffective marketing strategies and product offerings. By using this
    prompt, you can generate detailed user personas that capture the demographics,
    behaviors, and pain points of your ideal customers, ensuring your marketing efforts
    are more targeted and effective.
  prefs: []
  type: TYPE_NORMAL
- en: I am currently working on understanding my target audience within the [industry
    or sector]. One of the key challenges I face is gaining an in-depth understanding
    of this audience. To address this, I need a detailed user persona that can help
    us tailor our marketing efforts effectively.
  prefs: []
  type: TYPE_NORMAL
- en: 'As an expert in creating user personas, your task is to generate a comprehensive
    and realistic user persona for our target audience within the [industry or sector].
    The user persona should include the following elements:'
  prefs: []
  type: TYPE_NORMAL
- en: '1\. Demographic Information:'
  prefs: []
  type: TYPE_NORMAL
- en: Age range
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Gender
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Occupation
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Education level
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Income level
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Geographic location
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '2\. Psychographic Information:'
  prefs: []
  type: TYPE_NORMAL
- en: Interests and hobbies
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Values and beliefs
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Lifestyle and habits
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Personality traits
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '3\. Behavioral Information:'
  prefs: []
  type: TYPE_NORMAL
- en: Buying behavior and preferences
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Pain points and challenges
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Goals and motivations
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Technology usage and media consumption
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '4\. Scenario: Provide a scenario that illustrates a typical day or interaction
    for this persona, highlighting how they would engage with a product or service
    in the [industry or sector]. Describe specific actions, thoughts, and feelings
    during this interaction.'
  prefs: []
  type: TYPE_NORMAL
- en: '5\. Quote: Include a quote that represents the persona’s attitude or approach
    towards products or services in the [industry or sector].'
  prefs: []
  type: TYPE_NORMAL
- en: Ensure each section is detailed and paints a vivid picture of the persona. The
    overall persona should provide clear insights into who this person is and how
    they interact with the relevant industry or sector.
  prefs: []
  type: TYPE_NORMAL
- en: Prompt for Generating User Stories
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Developing user stories that accurately reflect your customers' needs and experiences
    is crucial for product development but can be time-consuming and complex. This
    prompt assists you in crafting comprehensive user stories that highlight key interactions
    and desired outcomes, providing valuable insights for your development team and
    improving your product's user experience.
  prefs: []
  type: TYPE_NORMAL
- en: I am working on developing a new application designed to help [target user group]
    achieve [specific goal or solve a specific problem]. However, I am struggling
    to create detailed user stories that effectively communicate the requirements
    to my development team. I need your expertise as a user story expert to assist
    me in this process.
  prefs: []
  type: TYPE_NORMAL
- en: 'Please generate a list of detailed user stories for this [type of application
    or product]. Each user story should include the following elements:'
  prefs: []
  type: TYPE_NORMAL
- en: 'User Role: Define the role of the user (e.g., customer, administrator, guest).'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Goal: Describe what the user wants to achieve.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Feature Description: Outline the specific feature or functionality that will
    enable the user to achieve their goal.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Acceptance Criteria: Provide clear criteria that must be met for the feature
    to be considered complete.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Importance: Indicate the priority of the user story (e.g., high, medium, low).'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Ensure that the user stories are specific, actionable, and aligned with the
    overall goals of the [type of application or product]. Each story should provide
    enough detail to guide the development team in creating a valuable and user-centered
    feature.
  prefs: []
  type: TYPE_NORMAL
- en: Prompt for Goal Setting
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Setting clear and achievable goals is essential for personal and professional
    growth, yet many struggle to define and prioritize their objectives. This prompt
    guides you through the process of setting SMART (Specific, Measurable, Achievable,
    Relevant, Time-bound) goals, providing a structured approach to goal setting that
    enhances your chances of success.
  prefs: []
  type: TYPE_NORMAL
- en: 'Create a detailed goal-setting plan for achieving [specific objective]. The
    plan should be tailored for [target audience] and should be completed by [deadline].
    Include the following elements in the plan:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Objective: Clearly define the specific goal to be achieved.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Motivation: Explain the importance of this goal and the benefits of achieving
    it.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Timeline: Provide a realistic timeline for achieving the goal, including start
    and end dates.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Milestones: Break down the goal into smaller, manageable milestones with specific
    target dates.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Action Steps: List the actionable steps required to reach each milestone, including
    any necessary resources and tools.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Potential Obstacles: Identify possible challenges or obstacles that might arise
    and propose strategies to overcome them.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Monitoring and Evaluation: Describe how progress will be monitored and evaluated,
    including key performance indicators (KPIs) and review intervals.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Support System: Outline any support or accountability mechanisms, such as mentors,
    coaches, or peer groups, that will assist in achieving the goal.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Ensure that the plan is thorough, practical, and tailored to the specific objective.
    Each section should provide clear and actionable information to guide the goal-setting
    process.
  prefs: []
  type: TYPE_NORMAL
- en: Prompt for Side Hustle
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Many individuals struggle to come up with viable side hustle ideas that align
    with their skills and interests. This prompt will help you generate creative and
    practical side hustle ideas tailored to your unique abilities and market opportunities,
    enabling you to supplement your income and explore new career avenues.
  prefs: []
  type: TYPE_NORMAL
- en: 'I am looking to explore innovative side hustle ideas that I can pursue alongside
    my full-time job. As an expert in side hustles, please generate a list of 10 diverse
    and innovative side hustle ideas that align with my skills and interests. Each
    idea should include the following elements:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Business Concept: Describe the core concept of the side hustle.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Target Market: Identify the primary demographic or customer base.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Unique Selling Proposition (USP): Highlight what makes this side hustle unique
    or innovative.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Revenue Model: Explain how the side hustle will generate income.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Startup Costs: Provide an estimate of the initial investment required.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Time Commitment: Outline the amount of time needed to manage this side hustle
    on a weekly basis.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Potential Challenges: Outline any significant challenges or obstacles the side
    hustle might face and possible solutions.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Please ensure that the side hustle ideas are diverse, covering different areas
    such as online businesses, freelance services, creative endeavors, and gig economy
    opportunities. Each description should be detailed and concise, providing a clear
    understanding of the side hustle concept and its potential.
  prefs: []
  type: TYPE_NORMAL
- en: 'My specific skills and interests are as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Skills: [List your relevant skills, e.g., digital marketing, graphic design,
    coding, writing, etc.]'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Interests: [List your interests, e.g., fitness, arts and crafts, technology,
    travel, etc.]'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Use this information to tailor the side hustle ideas to align with my skills
    and interests.
  prefs: []
  type: TYPE_NORMAL
- en: Prompt for Lead Generation
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: This lead generation prompt will empower you to develop a comprehensive strategy
    tailored specifically to your industry, focusing on attracting and converting
    your target audience. By leveraging this prompt, you will gain insights into target
    audience analysis, effective lead magnets, optimal marketing channels, a robust
    content strategy, lead nurturing techniques, and key performance indicators. This
    structured approach will help you identify and engage potential customers more
    effectively, ultimately enhancing your lead generation efforts and driving business
    growth.
  prefs: []
  type: TYPE_NORMAL
- en: I am the marketing manager of a [type of company] specializing in [specific
    products or services]. We are currently facing a challenge in generating high-quality
    leads to grow our customer base. Despite our efforts in various marketing campaigns,
    we have not seen the expected results in terms of lead volume and conversion rates.
  prefs: []
  type: TYPE_NORMAL
- en: 'I need you to act as a lead generation expert. Your task is to develop a comprehensive
    lead generation strategy tailored to our industry, with the goal of attracting
    [target audience]. The strategy should include the following components:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Target Audience Analysis: Describe the characteristics and demographics of
    the audience, including their needs, preferences, and pain points.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Lead Magnet Development: Suggest effective lead magnets that would appeal to
    this audience, such as eBooks, webinars, free trials, or exclusive content.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Marketing Channels: Identify the most effective marketing channels for reaching
    this audience, such as social media platforms, email marketing, content marketing,
    or paid advertising.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Content Strategy: Outline a content strategy that includes types of content
    (e.g., blog posts, videos, infographics) and a posting schedule to engage this
    audience and encourage lead generation.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Lead Nurturing: Develop a plan for nurturing leads through the sales funnel,
    including follow-up emails, personalized offers, and engagement tactics.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Metrics and KPIs: Define the key performance indicators (KPIs) and metrics
    to measure the success of the lead generation strategy, such as conversion rates,
    click-through rates, and lead quality.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Please ensure that the strategy is tailored to the specific nuances of the [industry/market]
    and addresses the unique challenges and opportunities within this sector.
  prefs: []
  type: TYPE_NORMAL
- en: Prompt for Writing Newsletter
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Crafting engaging and informative newsletters consistently can be a daunting
    task, often resulting in writer's block or uninspired content. This prompt will
    guide you in creating captivating and valuable newsletter content that keeps your
    subscribers engaged and eager for more, enhancing your communication strategy.
  prefs: []
  type: TYPE_NORMAL
- en: 'You are an AI model that assists in writing newsletters for [Company Name].
    The newsletter is sent [frequency] to keep subscribers informed about [topics:
    company news, product updates, industry trends, upcoming events, etc.].'
  prefs: []
  type: TYPE_NORMAL
- en: 'Here is all the information required for writing this newsletter: [Paste here
    company news, product updates, industry trends, customer stories, employee spotlights,
    upcoming events, educational content, any special offers or promotions, and anything
    else you want to include in the newsletter.]'
  prefs: []
  type: TYPE_NORMAL
- en: 'Please structure the newsletter as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '1. Opening Section:'
  prefs: []
  type: TYPE_NORMAL
- en: Start with a warm and engaging greeting.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Briefly introduce the main topics that will be covered in this edition.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '2\. Company News:'
  prefs: []
  type: TYPE_NORMAL
- en: Highlight significant achievements or announcements from the past [time period].
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Mention any new partnerships, awards, or notable projects.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Include any changes in leadership or organizational structure.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '3\. Product Updates:'
  prefs: []
  type: TYPE_NORMAL
- en: Provide details on any new product launches, updates, or features.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Include a brief testimonial or user review of a highlighted product.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Share tips or best practices on how to use the products effectively.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '4\. Industry Trends:'
  prefs: []
  type: TYPE_NORMAL
- en: Discuss current trends in the [industry] relevant to the company's products
    and services.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Provide insights or tips that would be valuable to the subscribers.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Include any recent studies or reports that highlight important data or statistics.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '5\. Customer Stories:'
  prefs: []
  type: TYPE_NORMAL
- en: Share a success story or case study featuring a customer who benefited from
    using your product or service.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Include quotes or testimonials from the customer.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '6\. Employee Spotlight:'
  prefs: []
  type: TYPE_NORMAL
- en: Highlight a team member’s achievements or contributions.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Include a brief interview or profile of the employee.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '7\. Upcoming Events:'
  prefs: []
  type: TYPE_NORMAL
- en: List any upcoming webinars, conferences, or events where the company will participate.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Include registration information and what subscribers can expect to learn or
    gain from attending.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '8\. Educational Content:'
  prefs: []
  type: TYPE_NORMAL
- en: Provide a short tutorial or how-to guide related to your products or services.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Share a link to a recent blog post or article written by the company.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '9\. Call to Action:'
  prefs: []
  type: TYPE_NORMAL
- en: End with a call to action, encouraging subscribers to visit the website, follow
    on social media, or contact for more information.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Include any special offers or promotions available to newsletter subscribers.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '10\. Closing Section:'
  prefs: []
  type: TYPE_NORMAL
- en: Thank the readers for their time and support.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Encourage feedback or suggestions for future newsletters.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Provide contact information for any inquiries or support.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '11\. Tone and Style:'
  prefs: []
  type: TYPE_NORMAL
- en: Maintain a professional yet friendly and approachable tone.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Ensure the language is clear, concise, and engaging.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Use a conversational style to make the content relatable.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Prompt for Customer Support
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Providing timely and effective customer support is essential, yet handling repetitive
    inquiries can be overwhelming. Leverage this prompt to generate precise and empathetic
    responses to common customer queries, improving your support team's efficiency
    and customer satisfaction.
  prefs: []
  type: TYPE_NORMAL
- en: You are an AI assistant for a company that sells [product]. A customer has contacted
    you with an issue regarding their recently purchased [product], which is experiencing
    [issue].
  prefs: []
  type: TYPE_NORMAL
- en: 'Instructions:'
  prefs: []
  type: TYPE_NORMAL
- en: Greet the customer politely and acknowledge their issue.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Express empathy and reassure the customer that you are here to help.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Ask for specific details about the problem (e.g., when it started, how often
    it occurs, any error messages).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Provide a step-by-step guide for troubleshooting the issue.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Offer to escalate the issue to technical support if the problem persists or
    if the troubleshooting steps do not resolve it.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Ensure all communication is empathetic, supportive, and professional.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Prompt for Productivity
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Maintaining productivity amidst distractions and a heavy workload can be challenging,
    leading to procrastination and stress. This prompt offers strategies and techniques
    to enhance your focus and manage your tasks more effectively, helping you achieve
    your goals with less effort and more consistency.
  prefs: []
  type: TYPE_NORMAL
- en: Prompt 1
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Create a comprehensive list of 10 productivity improvement strategies or tips
    that can be applied in various professional and personal contexts. For each strategy,
    include the following elements:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Strategy/Tip: Clearly describe the productivity strategy or tip.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Context: Explain the specific context or situation where this strategy is most
    effective (e.g., remote work, team collaboration, personal time management).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Implementation Steps: Provide a detailed step-by-step guide on how to implement
    this strategy.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Benefits: Highlight the key benefits and potential positive outcomes of applying
    this strategy.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Examples/Best Practices: Include examples or best practices to illustrate how
    this strategy can be effectively utilized.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Ensure that the strategies cover a diverse range of areas such as time management,
    task prioritization, work-life balance, technology utilization, and team dynamics.
    Each description should be detailed and practical, offering clear and actionable
    guidance on improving productivity.
  prefs: []
  type: TYPE_NORMAL
- en: Prompt 2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'I am working on achieving [specific goal/task] within [timeframe], but I am
    struggling with creating an effective productivity plan. I need your help as a
    productivity expert to develop a comprehensive plan that will help me stay on
    track and meet my goal. Please create a plan that includes the following elements:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Detailed Schedule: Outline a day-by-day or week-by-week schedule.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Prioritized Tasks: List and prioritize tasks required to achieve the goal.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Necessary Resources: Identify all resources needed, such as tools, materials,
    or support.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Potential Obstacles: Highlight possible challenges and propose strategies to
    overcome them.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Tracking Progress: Provide a method for monitoring progress, such as a checklist
    or a tracking system.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Criteria for Success: Define clear criteria for evaluating the success of the
    plan.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Additionally, please include specific examples or case studies from [relevant
    field or industry] to illustrate the effectiveness of the proposed plan.
  prefs: []
  type: TYPE_NORMAL
- en: Prompt for Brainstorming Content Ideas
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Many content creators struggle with generating fresh and engaging ideas, leading
    to writer's block and reduced productivity. This prompt will help you brainstorm
    a wide array of content ideas, ensuring a steady flow of creative and relevant
    topics tailored to your audience's interests.
  prefs: []
  type: TYPE_NORMAL
- en: I run a business in the [your industry] sector, specializing in [brief description
    of your business]. Our goal is to enhance our online presence by creating diverse
    and engaging content that resonates with our audience and strengthens our brand.
  prefs: []
  type: TYPE_NORMAL
- en: 'To achieve this, I need your help in brainstorming [number of ideas] creative
    and relevant content ideas that align with our industry and appeal to our target
    audience, who are [describe your audience]. Each content idea should include:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Suggested Topic: A concise and clear title for the content.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Brief Description: A short summary of the content, highlighting any unique
    angles or special twists.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '3 Possible Titles: Three attention-grabbing titles for each content idea, showcasing
    different approaches to the topic.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Please focus on generating ideas that will captivate our audience and differentiate
    our brand in the online space. Your suggestions will be crucial in helping us
    produce content that truly connects with our audience and enhances our online
    presence.
  prefs: []
  type: TYPE_NORMAL
- en: Prompt for Crafting Content Outline
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Creating a coherent and structured outline can be challenging, often resulting
    in disorganized content and unclear messaging. This prompt will guide you in generating
    detailed and logical content outlines, providing a clear roadmap for your writing
    and enhancing the overall quality of your work.
  prefs: []
  type: TYPE_NORMAL
- en: I am a content creator tasked with developing high-quality, engaging content
    for my audience, but I often struggle with structuring my ideas in a cohesive
    and comprehensive manner. I need your help in creating a detailed content outline
    that will serve as a solid foundation for my writing process.
  prefs: []
  type: TYPE_NORMAL
- en: 'You are an expert content strategist with extensive experience in organizing
    and structuring content to maximize clarity and engagement. Create a comprehensive
    content outline for a [type of content] on the topic of [topic] tailored for [target
    audience]. The outline should include the following elements:'
  prefs: []
  type: TYPE_NORMAL
- en: '1. Title:'
  prefs: []
  type: TYPE_NORMAL
- en: A compelling and descriptive title that captures the essence of the content
    and includes relevant keywords.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '2\. Introduction:'
  prefs: []
  type: TYPE_NORMAL
- en: A brief overview of the topic, explaining its importance and relevance to the
    target audience.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A hook to engage the reader’s interest.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A thesis statement outlining the main points to be covered.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '3\. Main Sections: Break down the content into several main sections, each
    with:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Heading: A clear and descriptive heading that includes keywords.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Subheadings: Key subtopics or sub-sections to be covered within the section.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Bullet Points: Specific points, arguments, or information to be addressed,
    including any relevant data or examples.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Supporting Information: Identify any data, case studies, quotes, or expert
    opinions that will support the points made in each section.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '4\. Visuals and Media:'
  prefs: []
  type: TYPE_NORMAL
- en: Suggestions for visuals, such as charts, graphs, or images, that would enhance
    the content and aid in explaining key points.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Recommendations for any multimedia elements (videos, infographics) that could
    be included.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Describe the purpose and placement of each visual or media element.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '5\. Conclusion:'
  prefs: []
  type: TYPE_NORMAL
- en: Summarize the key takeaways and insights from the content.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Restate the importance of the topic and the main points discussed.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Suggest any next steps or actions for the reader.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '6\. Call to Action (if applicable):'
  prefs: []
  type: TYPE_NORMAL
- en: Propose a call to action relevant to the content’s purpose, such as subscribing
    to a newsletter, downloading a resource, or engaging in a discussion.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '7\. Additional Resources:'
  prefs: []
  type: TYPE_NORMAL
- en: List any additional resources, references, or further reading materials that
    would be beneficial for the reader.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '8\. Tone and Style:'
  prefs: []
  type: TYPE_NORMAL
- en: Specify the desired tone and style (e.g., formal, informal, conversational,
    academic) suitable for the target audience.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '9\. SEO Considerations:'
  prefs: []
  type: TYPE_NORMAL
- en: Include recommendations for keyword usage, meta descriptions, and other SEO
    best practices to enhance content visibility.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Ensure that the outline is detailed, logically organized, and provides a comprehensive
    roadmap for writing the final content. Each section should be clear, concise,
    and provide a thorough exploration of the topic. The outline should also be tailored
    to the target audience, ensuring relevance and engagement.
  prefs: []
  type: TYPE_NORMAL
- en: Prompt for Content Writing
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Writing high-quality content requires a balance of creativity, clarity, and
    coherence, which can be difficult to achieve consistently. This prompt will assist
    you in crafting well-written, informative, and engaging content, ensuring that
    your message is communicated effectively to your audience.
  prefs: []
  type: TYPE_NORMAL
- en: I am a content creator facing the challenge of producing a high-quality, engaging
    article on the topic of [topic]. My audience expects detailed, insightful, and
    well-structured content. I need your expertise as an experienced content writer
    to help me craft this article.
  prefs: []
  type: TYPE_NORMAL
- en: 'Your task is to write a comprehensive and captivating article that includes
    the following elements:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Title: Create a compelling and descriptive title for the article.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Introduction: Start with a hook to capture the reader''s attention. Provide
    essential background information and clearly state the purpose of the article.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Main Body:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Section 1 - (Subheading 1): Explain the first key point related to the topic.
    Include a thorough analysis supported by relevant data, statistics, and quotes
    from experts.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Section 2 - (Subheading 2): Discuss another significant aspect of the topic.
    Use relevant examples, case studies, or anecdotes to illustrate your points.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Section 3 - (Subheading 3): Explore additional perspectives or counterarguments.
    Present a balanced view and address any potential objections or concerns.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Section 4 - (Subheading 4): Highlight any challenges or issues related to the
    topic. Propose potential solutions or strategies to address these challenges.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Section 5 - (Subheading 5) (Optional): Discuss future trends or implications
    related to the topic. Provide insights on what to expect moving forward.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Additional Sections (Optional): Include any other relevant sections as needed
    to fully cover the topic.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Conclusion: Summarize the key takeaways from the article. Reinforce the importance
    of the topic and suggest actionable steps for the readers.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Call to Action: End with a strong call to action, encouraging readers to engage
    further with the topic (e.g., share the article, participate in a discussion,
    explore additional resources).'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Ensure the article is:'
  prefs: []
  type: TYPE_NORMAL
- en: Well-researched and fact-checked.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Written in a [tone, e.g., informative, conversational, persuasive] tone suitable
    for the [target audience, e.g., business professionals, general public, students].
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Free of grammatical and spelling errors.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Approximately [desired word count] words in length.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Clearly structured, with subheadings and bullet points where appropriate to
    enhance readability.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Prompt for Human Like Blog Posts
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Many automated content generation tools produce text that feels robotic and
    impersonal, failing to engage readers. This prompt will help you create blog posts
    that read naturally and resonate with your audience, mimicking human writing style
    and tone for a more authentic experience.
  prefs: []
  type: TYPE_NORMAL
- en: 'I am currently working on creating a blog post on the topic of [topic] tailored
    for [target audience]. However, I am struggling to make the content engaging and
    relatable while ensuring it is informative and actionable. I need your help as
    a content creation expert to write a compelling blog post that resonates with
    the readers and keeps them hooked. Please incorporate the following elements into
    the blog post:'
  prefs: []
  type: TYPE_NORMAL
- en: '1. Title: Craft a catchy and intriguing title that grabs the reader''s attention.'
  prefs: []
  type: TYPE_NORMAL
- en: '2\. Introduction: Start with a personal anecdote, interesting fact, or a provocative
    question to draw the reader in. Explain the purpose of the post and why the topic
    matters to you and your readers.'
  prefs: []
  type: TYPE_NORMAL
- en: '3\. Main Content:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Storytelling - (Subheading 1): Share a personal story or experience related
    to the topic. Use vivid descriptions and emotions to make it engaging. Relate
    this story to a broader point or lesson.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Insightful Analysis - (Subheading 2): Dive into the topic with thoughtful analysis
    and insights. Incorporate your own opinions, experiences, and reflections. Use
    a conversational tone, and feel free to include humor, questions, or rhetorical
    devices to engage the reader.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Practical Tips - (Subheading 3): Provide practical advice, tips, or steps that
    the reader can take based on the topic. Make these actionable and easy to follow.
    Use bullet points or lists to enhance readability.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Community Connection - (Subheading 4): Foster a sense of community by addressing
    common challenges or questions readers might have. Encourage readers to share
    their own experiences, ask questions, or join a discussion in the comments.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '4\. Conclusion: Wrap up the post by summarizing the key points and reflecting
    on the personal story or insights shared. End with an inspiring or thought-provoking
    statement that leaves a lasting impression.'
  prefs: []
  type: TYPE_NORMAL
- en: '5\. Call to Action: Encourage readers to engage further with the content (e.g.,
    leave a comment, share the post on social media, subscribe to the blog, participate
    in a related challenge, etc.).'
  prefs: []
  type: TYPE_NORMAL
- en: 'Ensure the blog post is:'
  prefs: []
  type: TYPE_NORMAL
- en: Written in a conversational, engaging tone that feels personal and relatable.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Well-researched and fact-checked, with accurate information where necessary.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Free of grammatical and spelling errors.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Approximately [desired word count] words in length.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Tailored to the interests and needs of [target audience].
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Use subheadings and bullet points where appropriate to break up the text and
    enhance readability. Personalize the content with your own voice and experiences
    to connect with the readers.
  prefs: []
  type: TYPE_NORMAL
- en: Prompt for SEO Optimized Blog Article
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Achieving high search engine rankings requires content that is not only well-written
    but also optimized for SEO, a task that can be complex and time-consuming. This
    prompt will help you generate SEO-friendly blog articles, incorporating relevant
    keywords and best practices to improve your visibility and attract more organic
    traffic.
  prefs: []
  type: TYPE_NORMAL
- en: I am a content creator tasked with writing a comprehensive and SEO-optimized
    blog article on the topic of [main topic]. My goal is to ensure the article is
    engaging, informative, and meets all SEO best practices to attract and retain
    my target audience, [target audience].
  prefs: []
  type: TYPE_NORMAL
- en: 'SEO Instructions:'
  prefs: []
  type: TYPE_NORMAL
- en: 'To ensure the article is fully SEO-optimized, please follow these instructions:'
  prefs: []
  type: TYPE_NORMAL
- en: '1\. SEO Elements:'
  prefs: []
  type: TYPE_NORMAL
- en: Include [primary keyword] and [secondary keywords] naturally throughout the
    article.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Write a meta description that summarizes the article in [number] characters,
    using [primary keyword].
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Include at least [number of links] internal links and [number of links] external
    links to authoritative sources throughout the article. Ensure all internal and
    external links are underlined and hyperlinked where appropriate.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '2\. Internal Links:'
  prefs: []
  type: TYPE_NORMAL
- en: Link to [internal link 1] when discussing [related content 1].
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Link to [internal link 2] when mentioning [related content 2].
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Link to [internal link 3] for additional information on [related content 3].
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '3\. Images and Media:'
  prefs: []
  type: TYPE_NORMAL
- en: Suggest [number] relevant images or infographics to enhance the content.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Include alt text for images with [primary keyword] and [secondary keywords].
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Content Instructions:'
  prefs: []
  type: TYPE_NORMAL
- en: 'I need your help as an expert SEO blog writer to create this article. Please
    incorporate the following elements into the blog post:'
  prefs: []
  type: TYPE_NORMAL
- en: '1. Title: Create a compelling and keyword-rich title that includes [primary
    keyword] and appeals to [target audience].'
  prefs: []
  type: TYPE_NORMAL
- en: '2\. Introduction: Write an engaging introduction that provides an overview
    of [main topic] and highlights its importance or relevance to [target audience].
    Mention [primary keyword] and [secondary keywords].'
  prefs: []
  type: TYPE_NORMAL
- en: '3\. Subheadings and Structure:'
  prefs: []
  type: TYPE_NORMAL
- en: Use clear and descriptive subheadings, incorporating [secondary keywords] where
    appropriate.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Ensure the article is structured with logical flow and easy-to-read paragraphs.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '4. Content Sections:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Section 1 - (Subheading 1): Discuss the main points related to topic, such
    as [point 1], [point 2], and [point 3]. Include relevant statistics, examples,
    and case studies to support each point.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Section 2 - (Subheading 2): Discuss another significant aspect of the topic.
    Use relevant examples, case studies, or anecdotes to illustrate your points.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Section 3 - (Subheading 3): Explore additional perspectives or counterarguments.
    Present a balanced view and address any potential objections or concerns.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Section 4 - (Subheading 4): Highlight any challenges or issues related to the
    topic. Propose potential solutions or strategies to address these challenges.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Section 5 - (Subheading 5) (Optional): Discuss future trends or implications
    related to the topic. Provide insights on what to expect moving forward.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Additional Sections (Optional): Include any other relevant sections as needed
    to fully cover the topic.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '5. Conclusion: Summarize the key points discussed in the article and provide
    a call to action for [target audience], encouraging them to [desired action, e.g.,
    leave a comment, share the article, subscribe].'
  prefs: []
  type: TYPE_NORMAL
- en: '6. Additional Elements:'
  prefs: []
  type: TYPE_NORMAL
- en: Add a section for FAQs, addressing common questions related to [main topic].
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Include a brief author bio, mentioning [author's expertise or credentials].
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Please ensure the article is [desired length] words long and follows best practices
    for SEO optimization, readability, and engagement.
  prefs: []
  type: TYPE_NORMAL
- en: Prompt for Blog Post Title Generator
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Crafting compelling blog post titles is crucial for attracting readers, but
    coming up with catchy and effective titles can be a difficult task. This prompt
    will assist you in generating a variety of attention-grabbing blog post titles,
    enhancing your content's appeal and increasing click-through rates.
  prefs: []
  type: TYPE_NORMAL
- en: 'I need help generating blog post titles that are engaging and optimized for
    SEO. As a content creator, I find it challenging to create titles that grab attention
    and rank well in search engines. Can you act as a blog title generation expert
    and help me with this task? Generate a list of [specify number] blog post titles
    that are:'
  prefs: []
  type: TYPE_NORMAL
- en: Engaging and attention-grabbing.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Relevant to the [topic].
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Incorporate SEO keywords such as [SEO keywords].
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Suitable for [target audience].
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Prompt for Blog Post Title Tester
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: This prompt will help you analyze and improve your blog post titles by evaluating
    their effectiveness, engagement potential, clarity, and SEO optimization. By following
    the structured analysis and providing alternative titles, you can ensure your
    blog post titles are compelling and optimized for maximum reach.
  prefs: []
  type: TYPE_NORMAL
- en: As a professional blog post title copywriter, your task is to analyze and provide
    feedback on the given blog post titles. You should evaluate each title based on
    factors such as effectiveness, engagement potential, clarity, and SEO optimization.
    After analyzing each aspect, provide a detailed report explaining what’s wrong
    with the title and how it can be improved. Finally, offer a list of alternative
    titles that are more effective.
  prefs: []
  type: TYPE_NORMAL
- en: 'Input Blog Post Title: [Insert your Blog Post Title Here]'
  prefs: []
  type: TYPE_NORMAL
- en: 'For your analysis response, please follow this structure:'
  prefs: []
  type: TYPE_NORMAL
- en: 1\. Effectiveness Score (1-10)
  prefs: []
  type: TYPE_NORMAL
- en: 'Score: Provide an overall score for the effectiveness of the blog post title.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Explanation: Briefly explain your effectiveness score, mentioning key factors
    like relevance, appeal, and ability to attract clicks.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 2\. Engagement Potential Score (1-10)
  prefs: []
  type: TYPE_NORMAL
- en: 'Score: Rate the engagement potential of the blog post title.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Explanation: Briefly explain your engagement potential score, considering elements
    like curiosity, urgency, and emotional triggers.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 3\. Clarity Score (1-10)
  prefs: []
  type: TYPE_NORMAL
- en: 'Score: Provide an overall score for the clarity of the blog post title.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Explanation: Briefly explain your clarity score, noting how easily the main
    message or topic of the post is understood.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 4\. SEO Optimization
  prefs: []
  type: TYPE_NORMAL
- en: 'Analysis: Evaluate the blog post title for keyword usage and SEO best practices.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Explanation: Briefly discuss the effectiveness of the title in terms of search
    engine optimization.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 5\. Alternative Blog Post Titles
  prefs: []
  type: TYPE_NORMAL
- en: 'Improved Alternatives: Provide a list of 3-5 improved alternatives based on
    your analysis.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Alternative 1
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Alternative 2
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Please ensure that your response is detailed, clear, and concise while maintaining
    flexibility and creativity in offering improvements. Your goal is to maximize
    the blog post title's effectiveness without being overly restrictive or prescriptive
    in terms of style and content choices.
  prefs: []
  type: TYPE_NORMAL
- en: Prompt for Keyword Research
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Identifying the right keywords to target for SEO can be time-consuming and challenging,
    especially when trying to balance search volume and competition. This prompt will
    help you generate a comprehensive list of relevant keywords, providing insights
    into search volume and competition, ensuring you target the most effective keywords
    for your content.
  prefs: []
  type: TYPE_NORMAL
- en: 'I need you to act as an SEO specialist and perform comprehensive keyword research
    for the [industry or niche] industry. Specifically, I''m looking for the following:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Primary Keywords: Identify at least 10 primary keywords with high search volume
    and relevance to the niche.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Long-Tail Keywords: Identify at least 10 long-tail keywords that are highly
    relevant, have lower competition, and can attract targeted traffic.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Search Volume and Competition: Provide the search volume and keyword difficulty
    (competition level) for each keyword.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Keyword Relevance: Explain the relevance of each keyword to the target audience
    and their search intent.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Related Search Terms: Identify 10-15 related search terms and phrases that
    can complement the primary and long-tail keywords.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Content Opportunities: Suggest content topics or ideas that can effectively
    incorporate the identified keywords.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Keyword Trends: Highlight any noticeable trends or seasonal variations in keyword
    popularity.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Ensure the research is thorough and data-driven, utilizing reliable keyword
    research tools such as Google Keyword Planner, SEMrush, Ahrefs, or Keywords Everywhere.
    Each section should be detailed and provide actionable insights to enhance the
    SEO strategy. Present the results in a table format for clarity.
  prefs: []
  type: TYPE_NORMAL
- en: Prompt for Meta Title and Description
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Crafting compelling meta titles and descriptions that improve click-through
    rates while accurately representing your content can be tricky. This prompt assists
    you in creating engaging and SEO-optimized meta titles and descriptions, enhancing
    your content's visibility and attractiveness in search engine results.
  prefs: []
  type: TYPE_NORMAL
- en: 'I want you to act as an SEO expert. Create optimized meta titles and descriptions
    for a webpage focused on [topic or product]. Each meta title and description should
    include the following elements:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Keywords: Include the following keywords: [list of keywords].'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Meta Title: A concise, attention-grabbing title that incorporates the specified
    keywords. The title should be no more than [number of characters] characters.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Meta Description: A brief, engaging description that provides a summary of
    the webpage content and incorporates the specified keywords. The description should
    be no more than [number of characters] characters.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Ensure that each meta title and description pair is unique, accurately reflects
    the webpage content, and is designed to improve click-through rates and search
    engine rankings. Provide five different options to choose from.
  prefs: []
  type: TYPE_NORMAL
- en: Prompt for Blog Post Introduction
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Writing a captivating introduction that hooks readers and clearly outlines the
    blog post's value can be challenging. This prompt guides you in crafting a compelling
    and informative introduction, setting the tone for your blog post and enticing
    readers to continue reading.
  prefs: []
  type: TYPE_NORMAL
- en: I am struggling to create an engaging introduction for a blog post about [topic].
    As an expert blog writer, please help me craft an introduction that starts with
    a hook to grab the reader's attention, such as [hook idea]. Briefly mention the
    main points that will be covered, including [point 1], [point 2], and [point 3].
  prefs: []
  type: TYPE_NORMAL
- en: The tone should be [conversational/professional] and designed to appeal to [target
    audience]. Ensure that the introduction is compelling and sets the stage for the
    rest of the blog post.
  prefs: []
  type: TYPE_NORMAL
- en: Prompt for YouTube Transcript To Article
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Converting a YouTube video transcript into a coherent and engaging article can
    be daunting and time-consuming. This prompt will help you transform your YouTube
    transcripts into well-structured articles, ensuring the content is engaging and
    suitable for a written format, saving you time and effort.
  prefs: []
  type: TYPE_NORMAL
- en: 'Convert the following YouTube video transcript into a professionally written,
    SEO-optimized blog article. The article should be engaging, informative, and well-structured,
    with the following elements:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Title: Craft a compelling, keyword-rich title.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Introduction: Write an engaging introduction that provides an overview of the
    video content, capturing the reader''s interest.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Main Body: Divide the content into well-structured sections with appropriate
    headings. Ensure each section is detailed and informative.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Conclusion: Summarize the main points, reinforce the article’s key message,
    and provide a call-to-action or final thought.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'SEO Optimization: Integrate relevant keywords naturally throughout the article,
    use internal and external links where appropriate, and ensure the article is easy
    to read and understand.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Engagement: Make the content engaging by adding questions, anecdotes, or call-to-actions
    (CTAs) to encourage reader interaction.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Additional Instructions:'
  prefs: []
  type: TYPE_NORMAL
- en: Maintain a conversational, engaging tone suitable for [target audience].
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Ensure the article is free of grammatical and punctuation errors.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Use bullet points, numbered lists, or other formatting tools to enhance readability.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Ensure the article is between [desired word count] words.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'YouTube Transcript: [Paste the YouTube video transcript here]'
  prefs: []
  type: TYPE_NORMAL
- en: 'Target Keywords: [List of target keywords]'
  prefs: []
  type: TYPE_NORMAL
- en: 'Internal Links: [List of internal links]'
  prefs: []
  type: TYPE_NORMAL
- en: 'Target Audience: [Describe the target audience]'
  prefs: []
  type: TYPE_NORMAL
- en: Prompt for Content Calendar Planner
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Planning and organizing content over a period can be overwhelming, leading to
    inconsistent posting and missed opportunities. This prompt assists you in creating
    a detailed content calendar, ensuring a consistent and strategic approach to content
    creation and publication, improving your overall content strategy.
  prefs: []
  type: TYPE_NORMAL
- en: 'Before creating the content calendar, please review the following information
    about my business:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Business Name:  [Your Business Name]'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Industry/Sector:  [Your Industry/Sector]'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Business Description: [Briefly describe your business, including products/services
    offered.]'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Target Audience:  [Describe your primary customer base.]'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Business Goals:  [Outline the main objectives for your content (e.g., brand
    awareness, lead generation, customer engagement).]'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Based on this information, create a detailed content calendar planner for [specified
    time period], targeting [target audience or market]. The planner should include
    the following elements for each entry:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Date: Specify the date or date range for the content.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Content Type: Describe the type of content (e.g., blog post, social media post,
    video, webinar, infographic).'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Topic/Title: Provide a brief title or topic for the content.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Description: Offer a detailed description of the content, including key points
    or messages to be conveyed.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Target Audience: Identify the specific segment of the audience the content
    is aimed at.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Goals/Objectives: Outline the primary goals or objectives for the content (e.g.,
    increase engagement, drive traffic, generate leads).'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Keywords: List relevant keywords to be used for SEO.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Call to Action (CTA): Specify the desired call to action for the audience (e.g.,
    subscribe, share, comment, download).'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Distribution Channels: Indicate the platforms or channels where the content
    will be published (e.g., website, blog, social media platforms, email newsletter).'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Metrics for Success: Define the metrics or KPIs that will be used to measure
    the success of the content (e.g., views, clicks, shares, conversions).'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Ensure that the content calendar covers a diverse range of content types and
    topics, aligned with key dates, events, and themes relevant to the industry or
    brand. Each entry should be detailed and provide clear guidance for the content
    creation process.
  prefs: []
  type: TYPE_NORMAL
- en: Prompt for Setting the Tone of Content
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Establishing and maintaining a consistent tone across different pieces of content
    can be challenging, especially when trying to match the tone to your audience
    and brand. This prompt helps you define and maintain the desired tone for your
    content, ensuring consistency and resonance with your target audience, enhancing
    your brand's voice and appeal.
  prefs: []
  type: TYPE_NORMAL
- en: I run a business focused on [your niche, e.g., sustainable fashion] and mainly
    create content like [your content type, e.g., blog posts, YouTube scripts, social
    media updates]. I need your expertise to help set a consistent tone and style
    for our content.
  prefs: []
  type: TYPE_NORMAL
- en: 'Could you analyze the tone and style of the content examples I provide? Specifically,
    look at:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Formality: Identify whether the language is formal, semi-formal, or casual.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Emotion: Determine the types of emotions conveyed (e.g., excitement, trust,
    urgency).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Vocabulary: Examine the types of words and phrases used, noting if they are
    technical, simple, jargon-heavy, etc.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Sentence Structure: Analyze the complexity and length of sentences. Are they
    short and punchy or long and detailed?'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Unique Features: Identify any distinctive stylistic elements or patterns (e.g.,
    use of humor, rhetorical questions, storytelling techniques).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Please organize your findings clearly and concisely so AI tools like ChatGPT
    can understand them. Your report should include explanations and examples of the
    different styles and tones found in the content.
  prefs: []
  type: TYPE_NORMAL
- en: Our audience includes [describe your audience, e.g., ‘young professionals aged
    25-35 interested in tech and innovation’]. Help us ensure our content resonates
    with them.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here’s the content for analysis: [paste in the links you want analyzed, or
    provide transcriptions for audio/video content]'
  prefs: []
  type: TYPE_NORMAL
- en: Prompt for Script Writing
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Writing a compelling script can be a daunting task, especially when it comes
    to developing engaging dialogues, detailed scenes, and a coherent storyline. This
    prompt will help you generate a structured script outline, complete with character
    descriptions, scene settings, and dialogue suggestions, ensuring that your script
    is both engaging and professionally crafted.
  prefs: []
  type: TYPE_NORMAL
- en: I am a scriptwriter working on a new [specific genre] movie, but I am struggling
    to develop a comprehensive and engaging script outline. I need your expertise
    to create a detailed and cohesive script outline that will captivate both the
    audience and potential investors.
  prefs: []
  type: TYPE_NORMAL
- en: 'You are an expert scriptwriter with years of experience in crafting compelling
    movie scripts. Create a detailed script outline for a [specific genre] movie.
    The script should include the following elements:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Title: Provide a working title for the movie.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Logline: Write a one-sentence summary of the movie that captures its essence.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Main Characters: Describe the protagonist, antagonist, and key supporting characters.
    Include their backstories, motivations, and character arcs.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Setting: Describe the primary locations where the story takes place, including
    any significant world-building details.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Plot Summary: Outline the main plot points, including the setup, inciting incident,
    rising action, climax, falling action, and resolution.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Themes: Highlight the central themes and motifs explored in the story.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Dialogue Snippets: Include key pieces of dialogue that reveal character and
    advance the plot.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Act Structure:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Act 1: Introduction of characters, setting, and the central conflict.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Act 2: Development of the story, deepening of the conflict, and key turning
    points.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Act 3: Climax and resolution, wrapping up character arcs and plot threads.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Tone and Style: Specify the overall tone (e.g., dark, humorous, suspenseful)
    and style (e.g., fast-paced, character-driven) of the script.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Visual and Auditory Elements: Suggest important visual and auditory elements
    that enhance the storytelling, such as specific cinematography styles, key visual
    motifs, or important soundtracks.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Marketability: Explain why this script would appeal to audiences and potential
    investors, including any unique hooks or current market trends it aligns with.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Ensure that the script outline is engaging, cohesive, and has a clear narrative
    arc. The tone should match the genre and create an immersive experience for the
    audience. Finally, make sure all elements are interconnected to form a seamless
    and compelling story.
  prefs: []
  type: TYPE_NORMAL
- en: Prompt for Book Writing
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Crafting a detailed book requires extensive planning, including plotting the
    storyline, developing characters, and ensuring consistency throughout the chapters.
    This prompt guides you through the book writing process, helping you outline chapters,
    develop intricate plot lines, and create well-rounded characters, making your
    writing process smoother and more organized.
  prefs: []
  type: TYPE_NORMAL
- en: I am an aspiring novelist struggling to organize my ideas and create a cohesive
    outline for my [genre] novel. I've been finding it challenging to piece together
    the various elements of my story in a way that flows naturally and keeps readers
    engaged. I need your help to construct a detailed and engaging outline that will
    guide me through the writing process.
  prefs: []
  type: TYPE_NORMAL
- en: 'I want you to act as a professional novelist and outline creator. Please create
    a detailed outline for my [genre] novel, ensuring it is engaging and provides
    a clear roadmap for writing. The outline should include the following elements:'
  prefs: []
  type: TYPE_NORMAL
- en: '1. Title: Provide a working title for the book.'
  prefs: []
  type: TYPE_NORMAL
- en: '2\. Genre: Specify the genre of the novel.'
  prefs: []
  type: TYPE_NORMAL
- en: '3\. Setting: Describe the main setting(s) where the story takes place, including
    the time period, location, and atmosphere.'
  prefs: []
  type: TYPE_NORMAL
- en: '4\. Main Characters: Introduce the protagonist, antagonist, and key supporting
    characters. Include a brief backstory, personality traits, and motivations for
    each.'
  prefs: []
  type: TYPE_NORMAL
- en: '5\. Plot Summary: Outline the main plot points, including the inciting incident,
    rising action, climax, falling action, and resolution.'
  prefs: []
  type: TYPE_NORMAL
- en: '6\. Themes: Highlight the central themes and motifs explored in the story.'
  prefs: []
  type: TYPE_NORMAL
- en: '7\. Subplots: Describe any significant subplots that add depth and complexity
    to the main narrative.'
  prefs: []
  type: TYPE_NORMAL
- en: '8\. Chapter Breakdown: Provide a brief summary of what happens in the first
    ten chapters.'
  prefs: []
  type: TYPE_NORMAL
- en: '9\. Narrative Style and Point of View: Specify the narrative style (e.g., first
    person, third person) and the point of view from which the story is told.'
  prefs: []
  type: TYPE_NORMAL
- en: '10\. Character Development Arcs: Explain how the main characters will evolve
    throughout the story.'
  prefs: []
  type: TYPE_NORMAL
- en: '11\. Conflict and Tension: Identify the primary sources of conflict and tension
    that drive the narrative.'
  prefs: []
  type: TYPE_NORMAL
- en: '12\. Resolution: Describe how the main conflicts and subplots will be resolved
    by the end of the book.'
  prefs: []
  type: TYPE_NORMAL
- en: '13\. World-Building Elements: For genres like fantasy or science fiction, detail
    the unique aspects of the world, such as technology, magic systems, political
    structures, and cultural norms.'
  prefs: []
  type: TYPE_NORMAL
- en: '14\. Symbolism and Foreshadowing: Identify any key symbols and instances of
    foreshadowing that will be used to enhance the story’s depth.'
  prefs: []
  type: TYPE_NORMAL
- en: '15\. Pacing and Tone: Describe the intended pacing of the story (e.g., fast-paced,
    slow-burn) and the overall tone (e.g., dark, humorous, hopeful).'
  prefs: []
  type: TYPE_NORMAL
- en: '16\. Opening Scene: Provide a detailed description of the opening scene, setting
    the stage for the story and hooking the reader’s interest.'
  prefs: []
  type: TYPE_NORMAL
- en: '17\. Key Dialogue: Include snippets of important dialogue that reveal character
    traits or advance the plot.'
  prefs: []
  type: TYPE_NORMAL
- en: Ensure the outline is detailed and compelling, reflecting the chosen genre's
    tone and style. Create a narrative arc that captivates readers from beginning
    to end.
  prefs: []
  type: TYPE_NORMAL
- en: Prompt for Book Summary
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Summarizing a book while capturing its essence and main points can be challenging,
    especially if the book is lengthy or complex. This prompt assists you in creating
    a concise and comprehensive summary of any book, highlighting key themes, important
    events, and character developments, making it easier to grasp the core message
    of the book.
  prefs: []
  type: TYPE_NORMAL
- en: 'I would like you to act as an expert literary analyst. Your task is to generate
    a detailed summary for the book titled "[Book Title]" by [Author Name]. The summary
    should comprehensively cover the following aspects:'
  prefs: []
  type: TYPE_NORMAL
- en: '1. Introduction: Provide a brief overview of the book''s main theme and setting.'
  prefs: []
  type: TYPE_NORMAL
- en: Aim for 2-3 sentences summarizing the overall context.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Include any relevant historical or cultural background.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '2\. Plot Summary: Describe the main events and storyline, highlighting key
    turning points and developments.'
  prefs: []
  type: TYPE_NORMAL
- en: Focus on the primary narrative arc, significant events, and key plot twists.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Aim for 5-7 sentences.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Include specific examples or quotes to illustrate major plot points.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '3\. Character Analysis: Offer insights into the main characters, including
    their motivations, relationships, and growth throughout the book.'
  prefs: []
  type: TYPE_NORMAL
- en: Include at least 2-3 main characters.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Provide specific examples of their actions and development.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Aim for 4-6 sentences per character.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Highlight any notable character transformations or conflicts.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '4\. Themes and Motifs: Discuss the central themes, symbols, and motifs that
    are prevalent in the book, explaining their significance and impact on the overall
    narrative.'
  prefs: []
  type: TYPE_NORMAL
- en: Identify 2-3 main themes.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Provide examples and interpretations of key symbols or motifs.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Aim for 3-5 sentences per theme.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Explain how these themes are developed through the story and characters.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '5\. Author''s Style and Tone: Comment on the author''s writing style and tone,
    including any unique stylistic choices or literary techniques used.'
  prefs: []
  type: TYPE_NORMAL
- en: Discuss narrative style, tone, and any notable techniques.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Aim for 3-4 sentences.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Include examples of the author's use of language, such as notable passages or
    dialogue.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '6\. Personal Reflection: Include a personal reflection or opinion on the book,
    considering its strengths, weaknesses, and overall impact.'
  prefs: []
  type: TYPE_NORMAL
- en: Provide a balanced perspective, noting both positive and negative aspects.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Aim for 3-5 sentences.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Reflect on the emotional or intellectual impact of the book, and its relevance
    to contemporary issues if applicable.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Prompt for Creating eBook
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Creating an eBook involves more than just writing content; it requires structuring,
    designing, and ensuring the material is engaging and accessible for readers. This
    prompt guides you through the entire process of creating a comprehensive eBook,
    from cover design and detailed content development to structuring chapters and
    additional sections.
  prefs: []
  type: TYPE_NORMAL
- en: Prompt 1
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'I would like you to act as an experienced ebook author and designer. Your task
    is to create a comprehensive ebook based on the following specifications. The
    ebook should be well-structured, visually appealing, and informative. Please follow
    these detailed instructions:'
  prefs: []
  type: TYPE_NORMAL
- en: '1. Genre and Target Audience:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Genre: [Insert Genre Here]'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Target Audience: [Insert Target Audience Here]'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '2\. Title and Cover Design:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Title: [Insert Title Here]'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Subtitle: [Insert Subtitle Here]'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Cover Design: Describe the desired cover design, including the style, colors,
    and any images or illustrations that reflect the ebook’s theme and content.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Author Name: [Insert Author Name Here]'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '3\. Table of Contents:'
  prefs: []
  type: TYPE_NORMAL
- en: Create a detailed table of contents listing all chapters and main sections.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '4\. Introduction:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Purpose: Explain the purpose of the ebook and what readers can expect to learn.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Audience: Describe the target audience for the ebook.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Overview: Provide a brief overview of the ebook’s content and structure.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '5\. Chapters:'
  prefs: []
  type: TYPE_NORMAL
- en: 'For each chapter listed in the table of contents, include the following elements:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Chapter Title: Provide a clear and descriptive title.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Chapter Introduction: Write a brief introduction to the chapter’s content.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Main Content: Develop detailed and informative content covering the chapter’s
    topic.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Examples/Case Studies: Include relevant examples or case studies to illustrate
    key points.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Visuals: Describe the types of images, charts, or infographics needed to enhance
    understanding.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Summary: Conclude with a concise summary of the chapter’s key takeaways.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '6\. Additional Sections:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Appendices: Include any additional material or supplementary information.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'References: Provide a list of references or sources used in the ebook.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Glossary: Define key terms used throughout the ebook.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Index: Create an index to help readers locate specific information.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '7\. Conclusion:'
  prefs: []
  type: TYPE_NORMAL
- en: Summarize the main points covered in the ebook.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Encourage readers to take action or further explore the topic.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Provide information about the author and any additional resources or contact
    information.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Prompt 2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'I am [Your Name], and I am looking to create a comprehensive ebook titled "[eBook
    Title]" aimed at [target audience]. You are an expert content strategist. Your
    task is to help me develop a detailed and structured outline for the ebook. The
    outline should include the following elements for each chapter:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Chapter Title: Provide a clear and engaging title for each chapter.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Chapter Objective: Describe the main goal or takeaway for the reader.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Introduction: Write a brief introduction or preface for the chapter, setting
    the stage for the content and engaging the reader''s interest.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Content Summary: Outline the key points and topics to be covered in the chapter,
    providing a structured overview of the main ideas and subtopics.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Practical Examples or Case Studies: Include real-world examples or case studies
    to illustrate the concepts.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Actionable Tips or Exercises: Provide practical tips, exercises, or activities
    for the reader to apply what they have learned.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Visual Elements: Suggest any diagrams, charts, or images that would enhance
    understanding.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Resources and References: Suggest essential resources or references for further
    reading or context.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Appendices and Supplemental Material: Include any appendices or supplemental
    material that may be useful for the reader.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Ensure the ebook is logically organized, easy to follow, and covers the subject
    matter in depth. The tone should be [specify tone, e.g., professional, conversational,
    etc.], and the content should be [specify content type, e.g., instructional, inspirational,
    etc.].
  prefs: []
  type: TYPE_NORMAL
- en: 'Additionally, consider the following overarching guidelines:'
  prefs: []
  type: TYPE_NORMAL
- en: The ebook should be engaging and informative, providing value to the reader.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Each chapter should flow logically from one to the next, maintaining a cohesive
    narrative.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The content should be tailored to the target audience's needs and preferences.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Prompt for Novel Writing
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Writing a novel can be overwhelming due to the need for a captivating plot,
    complex characters, and consistent pacing across numerous chapters. This prompt
    aids in developing a novel outline, offering suggestions for plot twists, character
    arcs, and pacing, helping you create a compelling and cohesive narrative that
    keeps readers engaged from start to finish.
  prefs: []
  type: TYPE_NORMAL
- en: I am an aspiring novelist struggling to organize my thoughts and ideas into
    a cohesive and engaging outline for my novel. Despite having numerous creative
    ideas, I often find it challenging to structure them in a way that ensures a compelling
    narrative arc and well-developed characters. I need your help to bring clarity
    and order to my novel planning process.
  prefs: []
  type: TYPE_NORMAL
- en: 'I want you to act as an experienced novelist. Write a detailed and engaging
    outline for a novel in the [genre] genre. The outline should include the following
    elements:'
  prefs: []
  type: TYPE_NORMAL
- en: '1. Title: Provide a compelling and original title for the novel.'
  prefs: []
  type: TYPE_NORMAL
- en: '2\. Premise: Summarize the core premise of the novel in one or two sentences,
    highlighting the unique aspects of the story.'
  prefs: []
  type: TYPE_NORMAL
- en: '3\. Setting: Describe the world or environment where the story takes place,
    including key locations, the time period, and any significant historical or cultural
    context.'
  prefs: []
  type: TYPE_NORMAL
- en: '4\. Main Characters: Introduce the protagonist, antagonist, and key supporting
    characters. Provide a brief backstory, personality traits, motivations, and relationships
    for each.'
  prefs: []
  type: TYPE_NORMAL
- en: '5\. Plot Summary: Outline the main plot points, including the inciting incident,
    major conflicts, climax, and resolution. Highlight any twists or unexpected developments.'
  prefs: []
  type: TYPE_NORMAL
- en: '6\. Themes: Highlight the central themes and motifs explored in the story.'
  prefs: []
  type: TYPE_NORMAL
- en: '7\. Subplots: Describe any significant subplots and how they intertwine with
    the main plot.'
  prefs: []
  type: TYPE_NORMAL
- en: '8\. Character Arcs: Detail the development and transformation of the main characters
    throughout the story, noting key moments of change or growth.'
  prefs: []
  type: TYPE_NORMAL
- en: '9\. World-Building Elements: Describe unique aspects of the world, such as
    cultural, social, political, and technological elements, as well as any relevant
    history or mythology.'
  prefs: []
  type: TYPE_NORMAL
- en: '10\. Point of View: Indicate the narrative point of view (first person, third
    person, etc.) and any shifts in perspective that occur throughout the story.'
  prefs: []
  type: TYPE_NORMAL
- en: '11\. Chapter Breakdown: Provide a brief summary of what happens in the first
    five chapters, including key events, character introductions, and plot developments.'
  prefs: []
  type: TYPE_NORMAL
- en: '12\. Opening Scene: Describe the opening scene in detail, setting the stage
    for the story and hooking the reader''s interest.'
  prefs: []
  type: TYPE_NORMAL
- en: '13\. Conflict and Stakes: Clarify the main sources of conflict and the stakes
    involved for the protagonist and other key characters.'
  prefs: []
  type: TYPE_NORMAL
- en: '14\. Resolution and Denouement: Outline how the story resolves and what the
    characters'' lives look like after the climax, including any loose ends tied up
    in the denouement.'
  prefs: []
  type: TYPE_NORMAL
- en: Ensure the outline is comprehensive and provides a clear narrative arc. The
    tone should be [desired tone], reflecting the mood and style of the genre. Additionally,
    create engaging character dynamics and a compelling plot that keeps the reader
    invested throughout the novel. Focus on originality and creativity to make the
    story stand out.
  prefs: []
  type: TYPE_NORMAL
- en: Prompt for Story Writing
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Crafting a short story that is both engaging and complete within a limited word
    count can be difficult, requiring a balance of plot development and character
    depth. This prompt helps you create a well-structured and detailed story. It guides
    you through the process of describing the setting, introducing and developing
    characters, outlining the plot, incorporating meaningful dialogue, and building
    conflict and tension.
  prefs: []
  type: TYPE_NORMAL
- en: 'I am working on a new novel in the [genre] genre, but I am struggling to bring
    all the elements together into a cohesive and engaging story. I need your help
    to create a detailed and immersive narrative. I want you to act as a professional
    story writer and help me craft this novel. Here''s exactly what I am looking for:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Title: Provide a compelling and original title for the novel.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Premise: Summarize the core premise of the story in one or two sentences, highlighting
    the unique aspects of the story.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Setting: Describe the world or environment where the story takes place. Include
    specific details about the location, time period, and atmosphere. Paint a vivid
    picture that immerses the reader in the setting.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Main Characters: Introduce the protagonist, antagonist, and key supporting
    characters. Provide a brief backstory for each character, including their motivations,
    personality traits, and relationships with other characters.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Plot Summary: Outline the main plot points, including the inciting incident,
    major conflicts, climax, and resolution. Ensure the plot is well-paced and keeps
    the reader engaged throughout.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Themes: Highlight the central themes and motifs that the story explores. Explain
    how these themes are woven into the narrative and character arcs.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Character Development: Show how the main characters evolve throughout the story.
    Include key moments and events that influence their growth and change.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Dialogue: Incorporate meaningful and realistic dialogue that reveals character
    traits, advances the plot, and adds depth to the interactions between characters.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Conflict and Tension: Create a series of conflicts and obstacles that the characters
    must overcome. Ensure there is a clear buildup of tension leading to the climax.
    The conflicts should be both internal and external, driving character development
    and plot progression.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Resolution and Conclusion: Provide a satisfying conclusion that ties up the
    story’s major plot points and character arcs. The ending should feel earned and
    coherent with the overall narrative.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Ensure the story is well-structured, with a compelling narrative arc and rich,
    descriptive language. The tone should be [desired tone], reflecting the mood and
    themes of the story.
  prefs: []
  type: TYPE_NORMAL
- en: Prompt for Creating Children's Books
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Many aspiring children's authors struggle with generating engaging and age-appropriate
    content that captures young readers' imaginations. This prompt will help you create
    captivating children's stories by providing a structured framework and creative
    ideas, ensuring your book is both educational and entertaining for kids.
  prefs: []
  type: TYPE_NORMAL
- en: 'I am creating a children''s storybook and need help with both the writing and
    illustration ideas. I want you to act as a children''s book author and illustrator.
    Please write a children''s storybook with the following specifications:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Subject of the Story: [Insert Subject of the Story Here]'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Target Age Group: [Insert Age Group Here]'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Number of Pages: [Insert Number of Pages Here]'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Generate a storybook where each page contains:'
  prefs: []
  type: TYPE_NORMAL
- en: A part of the story (keep the language and concepts appropriate for the target
    age group).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A detailed description of the illustration for that page, including characters,
    setting, and key visual elements.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The final page should include an interactive activity related to the story,
    such as a puzzle, a coloring page, or a simple game.
  prefs: []
  type: TYPE_NORMAL
- en: 'Example format:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Page 1: [Story text for page 1]'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Illustration description: [Detailed illustration description for page 1]'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Page 2: [Story text for page 2]'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Illustration description: [Detailed illustration description for page 2]'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '...'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Final Page: [Interactive activity description]'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Ensure the story has a clear beginning, middle, and end, and that it conveys
    a positive message or moral suitable for the chosen age group.
  prefs: []
  type: TYPE_NORMAL
- en: Prompt for Academic Writing
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Students and researchers often face difficulties in organizing their thoughts
    and presenting complex information in a clear, scholarly manner. This prompt will
    help you craft a well-researched and thoroughly argued academic paper, adhering
    to all necessary academic standards and ensuring your work is detailed and scholarly.
  prefs: []
  type: TYPE_NORMAL
- en: Write a comprehensive academic paper on the topic of [topic] within the discipline
    of [discipline]. The paper should include the following sections and adhere to
    academic standards for structure, style, and citation. Ensure the paper is well-researched,
    thoroughly argued, and provides a detailed exploration of the topic.
  prefs: []
  type: TYPE_NORMAL
- en: '1. Title: Create a concise and descriptive title for the paper.'
  prefs: []
  type: TYPE_NORMAL
- en: '2\. Abstract: Write a brief summary of the key objectives, methods, and conclusions
    of the paper (150-250 words).'
  prefs: []
  type: TYPE_NORMAL
- en: '3\. Introduction:'
  prefs: []
  type: TYPE_NORMAL
- en: Present the context and background of the topic.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Clearly define the research problem or question.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: State the main objectives and aims of the paper.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Explain the importance and relevance of the research.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Briefly describe the structure of the paper.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '4\. Literature Review:'
  prefs: []
  type: TYPE_NORMAL
- en: Provide an overview of existing literature on the topic.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Discuss the main theories and concepts related to the topic.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Critically analyze the strengths and weaknesses of existing research.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Identify gaps or limitations in current research.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Reference key sources and studies in proper academic format.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '5\. Methodology:'
  prefs: []
  type: TYPE_NORMAL
- en: Describe the overall research design and approach.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Explain the methods used for data collection.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Outline the techniques and tools used for data analysis.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Discuss how the validity and reliability of the results were ensured.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Address any ethical considerations related to the research.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '6\. Results:'
  prefs: []
  type: TYPE_NORMAL
- en: Present the key findings of the research.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Interpret the data and explain its significance in the context of the research
    question.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '7\. Discussion:'
  prefs: []
  type: TYPE_NORMAL
- en: Discuss the implications of the findings for theory, practice, and future research.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Compare the results with findings from existing literature.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Acknowledge the limitations of the study.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Provide recommendations for further research or practical applications.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '8\. Conclusion:'
  prefs: []
  type: TYPE_NORMAL
- en: Summarize the main points and findings of the paper.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Offer final reflections or thoughts on the topic.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Suggest areas for future research.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '9\. References: List all sources cited in the paper, formatted according to
    [citation style].'
  prefs: []
  type: TYPE_NORMAL
- en: '10\. Appendices (if applicable):'
  prefs: []
  type: TYPE_NORMAL
- en: Include any additional material, such as raw data, questionnaires, or detailed
    calculations.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Ensure that the paper is structured logically, follows a coherent flow of ideas,
    and is written in a formal academic style. Use proper citations and references
    to support the arguments and ensure the paper adheres to the specified academic
    standards.
  prefs: []
  type: TYPE_NORMAL
- en: Prompt for Technical Writing
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Many professionals and technical writers struggle with creating detailed and
    well-structured technical documentation that effectively communicates complex
    information to their target audience. This prompt provides a clear framework for
    producing comprehensive technical documents, ensuring your content is accurate,
    organized, and accessible, thereby enhancing understanding and usability for your
    readers.
  prefs: []
  type: TYPE_NORMAL
- en: Prompt 1
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Create a [type of technical documentation] on [topic]. The document should be
    detailed, well-structured, and suitable for [target audience]. Ensure that the
    content is clear, accurate, and provides a thorough understanding of the subject
    matter.
  prefs: []
  type: TYPE_NORMAL
- en: 'Overall Document Structure:'
  prefs: []
  type: TYPE_NORMAL
- en: '1\. Introduction: Provide an overview of the topic, including its importance
    and relevance to the [target audience].'
  prefs: []
  type: TYPE_NORMAL
- en: '2\. Background/Overview: Offer detailed background information or an overview,
    including any necessary historical context or foundational knowledge.'
  prefs: []
  type: TYPE_NORMAL
- en: '*Specific Sections (customize based on the type of documentation):'
  prefs: []
  type: TYPE_NORMAL
- en: '3\. Technical Details:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Key Concepts: Define and explain any key concepts related to the topic.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Processes and Mechanisms: Describe the processes, mechanisms, or workflows
    involved.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Tools and Technologies: Detail any tools, technologies, or methodologies used.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Best Practices: Highlight best practices and recommended approaches.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '4\. Use Cases and Examples: Provide practical use cases and real-world examples
    to illustrate the application of the topic.'
  prefs: []
  type: TYPE_NORMAL
- en: '5\. Challenges and Solutions: Discuss common challenges or issues encountered
    and offer solutions or mitigation strategies.'
  prefs: []
  type: TYPE_NORMAL
- en: '6\. Future Trends: Explore potential future developments and trends related
    to the topic.'
  prefs: []
  type: TYPE_NORMAL
- en: '7\. Conclusion: Summarize the key points and takeaways, and provide any final
    thoughts or recommendations.'
  prefs: []
  type: TYPE_NORMAL
- en: '8\. References: Include a list of references or further reading materials for
    those interested in learning more.'
  prefs: []
  type: TYPE_NORMAL
- en: Ensure the document is detailed and thorough, with each section clearly labeled
    and logically organized. The writing style should be professional and accessible,
    suitable for [target audience].
  prefs: []
  type: TYPE_NORMAL
- en: '*Specific Customizations (replace point 3 with these points based on the type
    of documentation):'
  prefs: []
  type: TYPE_NORMAL
- en: '3\. User Manuals:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Installation Instructions: Step-by-step guide on how to install the product.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Usage Instructions: Detailed instructions on how to use the product, including
    screenshots or diagrams.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Troubleshooting: Common issues and how to resolve them.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '3\. API Documentation:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Endpoint Descriptions: Detailed information about each API endpoint, including
    URL, method, and parameters.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Request/Response Examples: Example requests and responses for each endpoint.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Authentication: Explanation of authentication methods and requirements.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '3\. Technical Reports:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Methodology: Detailed description of the methods used to conduct the research
    or analysis.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Data Analysis: Presentation and analysis of data collected.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Findings: Key findings and interpretations.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Recommendations: Suggestions based on the findings.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '3\. Whitepapers:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Problem Statement: Description of the problem or issue being addressed.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Proposed Solution: Explanation of the proposed solution and its benefits.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Implementation: Details on how the solution can be implemented.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Case Studies: Real-world examples of the solution in action.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Prompt 2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Write a detailed technical document that explains how to implement [feature]
    in [technology or software]. The document should cover the following sections:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Introduction:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Provide an overview of [feature].
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Explain the importance of [feature] in the context of [technology or software].
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Prerequisites:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: List the necessary tools, libraries, or frameworks required.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Mention any prior knowledge or skills needed.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Step-by-Step Implementation:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Describe the step-by-step process to implement [feature].
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Include code snippets, configurations, and relevant commands.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Explain each step clearly and provide rationale for key decisions.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Testing and Validation:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Outline the methods to test the implementation.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Provide examples of test cases and expected results.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Explain how to validate that [feature] is working correctly.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Common Issues and Troubleshooting:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: List common problems that might arise during implementation.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Offer solutions and workarounds for these issues.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Conclusion:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Summarize the main points of the document.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Provide additional resources or references for further reading.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Additional Information:'
  prefs: []
  type: TYPE_NORMAL
- en: Include diagrams, screenshots, or other visual aids to enhance understanding.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Use [specific style guide or format] for consistency and clarity.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Prompt for Essay Writing
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Many students find it challenging to structure their essays in a coherent and
    persuasive manner, often struggling to present their arguments effectively. This
    prompt will help you in writing a detailed and well-organized essay on any given
    topic, ensuring that your introduction, body paragraphs, counterarguments, and
    conclusion are all clearly defined and logically connected.
  prefs: []
  type: TYPE_NORMAL
- en: 'I am a student struggling with writing a comprehensive academic essay. I need
    a detailed and well-organized essay on the topic: [insert topic here].'
  prefs: []
  type: TYPE_NORMAL
- en: 'I am assigning you the role of an academic essay writer. Your task is to help
    me by writing an essay that includes the following elements:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Introduction:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Provide background information on the topic to set the context.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Present a clear and concise thesis statement that outlines the main argument
    or focus of the essay.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Body Paragraphs:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Paragraph 1: Present the first main point supporting the thesis. Include relevant
    evidence, examples, and analysis to substantiate your point.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Paragraph 2: Present the second main point supporting the thesis. Include relevant
    evidence, examples, and analysis to substantiate your point.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Paragraph 3: Present the third main point supporting the thesis. Include relevant
    evidence, examples, and analysis to substantiate your point.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Additional Paragraphs: If needed, include more paragraphs, each focusing on
    a single main point with supporting evidence.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Counterarguments:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Address potential counterarguments or opposing views. Provide evidence and reasoning
    to refute these points and strengthen your thesis.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Conclusion:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Summarize the main points of the essay succinctly.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Restate the thesis in light of the evidence presented.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Offer final thoughts, implications, or a call to action, if appropriate.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Ensure the essay is well-organized, with clear transitions between paragraphs.
    The writing should be formal and academic, demonstrating critical thinking and
    originality. Properly cite any sources used in accordance with academic standards.
  prefs: []
  type: TYPE_NORMAL
- en: Prompt for Speech Writing
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Writing a compelling and impactful speech can be challenging, especially when
    trying to convey a clear message that resonates with the audience. Many struggle
    with structuring their speech effectively, choosing the right tone, and including
    engaging content. This power prompt will guide you in crafting a well-structured,
    engaging, and persuasive speech tailored to your audience. By using this prompt,
    you can efficiently outline your main points, develop a strong narrative, and
    ensure your speech captures and maintains the audience's attention from start
    to finish.
  prefs: []
  type: TYPE_NORMAL
- en: 'I need you to act as a professional speechwriter. Write a detailed and persuasive
    speech for [occasion or purpose]. The speech should include the following elements:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Introduction: Capture the audience''s attention with a strong opening. Introduce
    yourself and provide context for the speech.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Main Points: Clearly outline the key points you want to convey. Each point
    should be supported with relevant facts, anecdotes, or examples.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Emotional Appeal: Use emotional language and stories to connect with the audience
    on a personal level.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Call to Action: Encourage the audience to take specific actions or adopt certain
    viewpoints.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Conclusion: Summarize the main points and end with a memorable closing statement.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Ensure that the speech is tailored to the [target audience] and the [occasion].
    The tone should be [desired tone, e.g., inspirational, motivational, formal, etc.].
    The speech should be engaging, coherent, and persuasive, leaving a lasting impact
    on the audience.
  prefs: []
  type: TYPE_NORMAL
- en: Prompt for Proposal Writing
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Writing a persuasive proposal that effectively communicates your ideas and secures
    buy-in can be difficult. This prompt guides you through the process of creating
    clear and compelling proposals, helping you present your ideas logically, address
    potential concerns, and make a strong case for your project or initiative.
  prefs: []
  type: TYPE_NORMAL
- en: 'Write a detailed and persuasive proposal for [project or purpose]. The proposal
    should include the following elements:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Title Page: Include the proposal title, the name of the organization or individual
    submitting it, and the date.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Executive Summary: Provide a brief overview of the proposal, highlighting the
    key points and intended outcomes.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Introduction: Offer background information, context, and the purpose of the
    proposal.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Problem Statement: Clearly define the issue or need that the proposal aims
    to address.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Objectives: List the specific goals the proposal aims to achieve.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Methodology: Describe the approach, strategies, and steps to be taken to achieve
    the objectives.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Timeline: Outline the schedule for the project, including start and end dates
    and major milestones.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Budget: Detail the financial requirements, including a breakdown of costs and
    funding sources.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Evaluation Plan: Explain how the success of the project will be measured and
    evaluated.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Conclusion: Summarize the proposal and reinforce the need for approval or funding.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Ensure that the proposal is tailored to the [intended audience or funding body]
    and the [specific requirements or guidelines provided]. The tone should be [desired
    tone, e.g., formal, professional, persuasive]. The proposal should be clear, coherent,
    and compelling, effectively communicating the value and feasibility of the project.
  prefs: []
  type: TYPE_NORMAL
- en: Prompt for Grant Writing
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Securing grant funding can be complex and competitive, requiring a well-crafted
    proposal that effectively communicates your project's value and aligns with funder
    criteria. Many individuals struggle with this process, leading to missed funding
    opportunities. This grant writing prompt will guide you in creating a detailed
    and persuasive proposal, enhancing your ability to present your project convincingly
    and increasing your chances of securing the necessary funding.
  prefs: []
  type: TYPE_NORMAL
- en: 'I am seeking to secure funding for a [specific project or initiative]. You
    are an expert grant writer. I need you to craft a detailed and persuasive grant
    proposal. The proposal should be structured as follows and adhere to a professional
    and compelling tone:'
  prefs: []
  type: TYPE_NORMAL
- en: '1. Executive Summary: Provide a brief overview of the project, including the
    primary objectives and the amount of funding requested.'
  prefs: []
  type: TYPE_NORMAL
- en: '2\. Introduction: Introduce the organization, its mission, and its history.
    Highlight relevant past successes and qualifications.'
  prefs: []
  type: TYPE_NORMAL
- en: '3\. Problem Statement: Clearly define the problem or need that the project
    addresses. Provide relevant data and evidence to support the need for the project.'
  prefs: []
  type: TYPE_NORMAL
- en: '4\. Project Description: Describe the project in detail, including:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Objectives: Specific, measurable goals of the project.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Activities: Detailed description of the activities and strategies that will
    be implemented to achieve the objectives.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Timeline: A realistic timeline for the project, including key milestones.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Staffing: Information on the project team, including their roles and qualifications.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '5\. Budget: Provide a detailed budget, including:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Budget Justification: Explanation of each budget item and how the costs were
    estimated.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Matching Funds: Information on any matching funds or in-kind contributions.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '6\. Evaluation Plan: Describe how the project''s success will be measured.
    Include specific metrics and methods for data collection and analysis.'
  prefs: []
  type: TYPE_NORMAL
- en: '7\. Sustainability: Explain how the project will continue after the grant period
    ends. Include plans for future funding and ongoing support.'
  prefs: []
  type: TYPE_NORMAL
- en: '8\. Conclusion: Summarize the key points of the proposal and make a final case
    for why the project should be funded.'
  prefs: []
  type: TYPE_NORMAL
- en: Make sure the proposal is compelling and demonstrates the project's potential
    impact. Use data and evidence to support your arguments, and make a persuasive
    case for the need for funding.
  prefs: []
  type: TYPE_NORMAL
- en: Prompt for Literature Review
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Tackling heaps of academic papers can be overwhelming and time-consuming, especially
    when trying to identify key themes and gaps in the research. This prompt helps
    by offering concise summaries of academic articles, highlighting key insights,
    and identifying patterns across sources. It streamlines your literature review,
    saving time and deepening your understanding of your research area.
  prefs: []
  type: TYPE_NORMAL
- en: 'I want you to act as an academic research assistant specializing in literature
    reviews. Your task is to conduct a comprehensive literature review on the topic
    of [specific topic] within the field of [field of study]. The review should critically
    analyze and synthesize existing research, highlighting key findings, trends, gaps,
    and areas for future research. The review should include the following elements:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Introduction: Provide an overview of the topic, its significance, and the scope
    of the review.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Key Themes and Trends: Identify and discuss the major themes and trends in
    the existing literature.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Critical Analysis: Critically evaluate the methodologies, findings, and conclusions
    of the key studies. Highlight the strengths and weaknesses of the existing research.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Gaps in the Literature: Identify any gaps or areas where further research is
    needed. Explain why these gaps are significant.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Theoretical Frameworks: Discuss the theoretical frameworks that have been used
    in the studies reviewed. Explain how these frameworks contribute to the understanding
    of the topic.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Future Directions: Suggest potential directions for future research based on
    the identified gaps and current trends.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Conclusion: Summarize the key findings of the literature review and their implications
    for the field.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Ensure that the review is well-organized, comprehensive, and provides a balanced
    assessment of the existing research. Each section should be detailed and supported
    by references to relevant studies.
  prefs: []
  type: TYPE_NORMAL
- en: Prompt for Better Writing
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Writers often struggle with making their text clear, engaging, and well-structured.
    Complex sentences and repetitive vocabulary can make writing less effective. This
    prompt helps rewrite your text for enhanced clarity, improved flow, and a more
    engaging tone. It ensures smooth transitions, varied vocabulary, and correct grammar,
    transforming your writing into a polished and compelling piece.
  prefs: []
  type: TYPE_NORMAL
- en: 'Rewrite the following text to improve its clarity, flow, and overall impact.
    Ensure the revised version retains the original meaning and includes the following
    elements:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Enhanced Clarity: Simplify complex sentences and eliminate any ambiguity.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Improved Flow: Ensure smooth transitions between sentences and paragraphs.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Engaging Tone: Adjust the tone to be more engaging and appropriate for the
    target audience.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Varied Vocabulary: Use a rich and varied vocabulary to avoid repetition and
    enhance readability.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Correct Grammar and Punctuation: Ensure the text is free from grammatical errors
    and punctuation mistakes.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Original Text: [paste your text here]'
  prefs: []
  type: TYPE_NORMAL
- en: 'Specific Instructions (if any): [Any additional instructions or preferences]'
  prefs: []
  type: TYPE_NORMAL
- en: Prompt for Paraphrasing
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Paraphrasing text accurately while maintaining the original meaning can be challenging,
    especially when avoiding plagiarism. It's easy to fall into the trap of using
    too similar wording or losing the essence of the content. This prompt will assist
    you in rephrasing any text while preserving its original context and meaning,
    ensuring that your writing remains unique and free from plagiarism.
  prefs: []
  type: TYPE_NORMAL
- en: 'Please paraphrase the following text while adhering to these guidelines:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Maintain Meaning and Intent: Ensure the original meaning and intent are preserved.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Use Different Words and Structures: Utilize different vocabulary and sentence
    structures.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Preserve Tone and Style: Keep the original tone and style intact.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Enhance Readability and Coherence: Make sure the paraphrased version is easy
    to read and coherent.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Original Text: [Insert the text to be paraphrased here]'
  prefs: []
  type: TYPE_NORMAL
- en: 'Example of Desired Output:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Original: "The quick brown fox jumps over the lazy dog."'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Paraphrased: "A swift brown fox leaps over a sluggish dog."'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Please provide the paraphrased text below.
  prefs: []
  type: TYPE_NORMAL
- en: Prompt for Anti-Ai Detection Rewriter
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: AI-generated content can often be flagged by detection algorithms, which might
    affect its acceptance and credibility. Ensuring that AI-written material passes
    as human-written can be a tricky task. This prompt will help you rewrite AI-generated
    content in a more natural and human-like style, reducing the likelihood of detection
    by AI content detectors.
  prefs: []
  type: TYPE_NORMAL
- en: Please rewrite the following AI-generated content in a human-like writing style
    to evade detection by AI content detectors. Ensure the text flows naturally, includes
    diverse sentence structures, and integrates subtle imperfections to mimic human
    writing. Use idiomatic expressions, vary the vocabulary, and consider adding personal
    anecdotes or opinions where appropriate. Avoid overly formal language and strive
    for a conversational tone.
  prefs: []
  type: TYPE_NORMAL
- en: 'The original AI-generated content is: [paste AI-generated content here]'
  prefs: []
  type: TYPE_NORMAL
- en: Prompt for Grammar Check
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Poor grammar can undermine the clarity and professionalism of your writing,
    leading to miscommunication and negative impressions. Manually checking for grammatical
    errors can be tedious and prone to oversight. This prompt will help you identify
    and correct grammatical mistakes in your text, ensuring that your writing is clear,
    polished, and professional. It provides a quick and reliable way to improve the
    quality of your written communication.
  prefs: []
  type: TYPE_NORMAL
- en: Review the following text for grammatical accuracy and clarity. Make necessary
    corrections to grammar, punctuation, and syntax. Additionally, suggest improvements
    to sentence structure and word choice to enhance readability and coherence. Maintain
    the original meaning and tone of the text. Include an explanation for each major
    change you make.
  prefs: []
  type: TYPE_NORMAL
- en: 'Instructions:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Grammar and Punctuation: Correct any grammatical errors, including verb tense,
    subject-verb agreement, and punctuation mistakes.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Sentence Structure: Improve sentence structure for better flow and readability.
    Break down long, complex sentences and vary sentence length.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Word Choice: Suggest alternative words or phrases where appropriate to improve
    clarity and conciseness.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Consistency: Ensure consistency in style, tone, and tense throughout the text.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Explanation of Changes: Provide a brief explanation for each significant correction
    or improvement, detailing the reason for the change and how it enhances the text.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Text to Review:'
  prefs: []
  type: TYPE_NORMAL
- en: '[Insert text here]'
  prefs: []
  type: TYPE_NORMAL
- en: Prompt for Proofreading
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Proofreading your own work can be difficult, as it's easy to overlook errors
    and inconsistencies. Missing mistakes can negatively impact the readability and
    credibility of your writing. This prompt will assist you in thoroughly proofreading
    your text, catching typos, punctuation errors, and inconsistencies that you might
    have missed. It ensures that your document is error-free and maintains a high
    standard of quality.
  prefs: []
  type: TYPE_NORMAL
- en: 'Proofread the following text, focusing on:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Grammar and Punctuation: Correct any grammatical errors and punctuation mistakes.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Sentence Structure: Enhance the sentence structure for better clarity and readability.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Consistency: Ensure consistency in style, tone, and terminology throughout
    the text.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Clarity: Rewrite awkward or unclear sentences to improve understanding.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Feedback: Provide specific feedback and suggestions for overall improvement.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Additionally, highlight areas needing significant improvement or rewriting,
    suggest alternative phrasings for awkward or unclear sentences, and point out
    any inconsistencies in style or tone with recommendations for cohesion.
  prefs: []
  type: TYPE_NORMAL
- en: 'Text to be proofread: [Paste your text here]'
  prefs: []
  type: TYPE_NORMAL
- en: Prompt for Marketing
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Many businesses struggle to develop a comprehensive marketing strategy that
    effectively reaches their target audience, resulting in wasted resources and missed
    opportunities. This prompt helps you outline a detailed marketing strategy by
    identifying your target market, key messaging, and the best channels to reach
    your audience. By using this prompt, you can create a cohesive plan that maximizes
    your marketing efforts and ensures your message resonates with potential customers.
  prefs: []
  type: TYPE_NORMAL
- en: 'I want you to take on the role of a marketing strategist. Your task is to develop
    a comprehensive marketing strategy for a new [product or service] in the [specific
    industry]. The strategy should be innovative and tailored to the target market,
    ensuring a successful launch and sustained growth. Please include the following
    elements:'
  prefs: []
  type: TYPE_NORMAL
- en: '1. Market Analysis: Provide an overview of the current market landscape, including
    key trends, major competitors, and insights into the target audience.'
  prefs: []
  type: TYPE_NORMAL
- en: '2\. Brand Positioning: Define the brand’s unique value proposition and market
    positioning. Explain how it differentiates from competitors and addresses market
    needs.'
  prefs: []
  type: TYPE_NORMAL
- en: '3\. Marketing Objectives: Outline the primary marketing goals, such as increasing
    brand awareness, generating leads, acquiring customers, and achieving sales targets.'
  prefs: []
  type: TYPE_NORMAL
- en: '4\. Target Audience: Describe the primary demographic and psychographic characteristics
    of the target audience, including their preferences, behaviors, and pain points.'
  prefs: []
  type: TYPE_NORMAL
- en: '5\. Marketing Channels: Identify the most effective marketing channels (e.g.,
    social media, email marketing, content marketing, influencer partnerships) and
    justify why they are suitable for reaching the target audience.'
  prefs: []
  type: TYPE_NORMAL
- en: '6\. Campaign Tactics: Detail specific marketing tactics and campaigns, including
    creative concepts, messaging, and promotional activities. Provide examples of
    potential ad copy, visuals, and content ideas.'
  prefs: []
  type: TYPE_NORMAL
- en: '7\. Budget Allocation: Present a proposed budget allocation for each marketing
    channel and campaign, ensuring a cost-effective approach.'
  prefs: []
  type: TYPE_NORMAL
- en: '8\. Metrics and KPIs: Define the key performance indicators (KPIs) and metrics
    to measure the success of the marketing strategy. Explain how these metrics will
    be tracked and reported.'
  prefs: []
  type: TYPE_NORMAL
- en: '9\. Timeline: Create a timeline for the implementation of the marketing strategy,
    including key milestones and deadlines.'
  prefs: []
  type: TYPE_NORMAL
- en: '10\. Potential Challenges: Identify potential challenges or obstacles in executing
    the marketing strategy and propose solutions to address them.'
  prefs: []
  type: TYPE_NORMAL
- en: Ensure that the marketing strategy is comprehensive, actionable, and aligned
    with the overall business objectives. Each section should be detailed and provide
    clear guidance for implementation.
  prefs: []
  type: TYPE_NORMAL
- en: Prompt for Digital Marketing
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Crafting a comprehensive digital marketing strategy can be daunting, especially
    with the ever-changing landscape of online marketing channels. This prompt will
    help you generate a tailored digital marketing strategy that encompasses various
    platforms, techniques, and metrics to ensure a cohesive and effective approach
    for your business.
  prefs: []
  type: TYPE_NORMAL
- en: 'I run a [type of business]. My business focuses on [briefly describe the business,
    its products or services]. Our target audience is [describe the target audience].
    I want you to act as an expert digital marketing consultant. Create a detailed
    digital marketing strategy for my business. The strategy should include the following
    elements:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Business Overview: Provide a brief description of the business, including its
    products or services, and its target audience.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Goals and Objectives: Define the primary goals of the digital marketing campaign,
    such as brand awareness, lead generation, or sales increase.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Target Audience: Identify the specific demographics, psychographics, and behaviors
    of the target audience.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Marketing Channels: List and describe the digital channels to be used, such
    as social media, email marketing, content marketing, SEO, and PPC.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Content Strategy: Outline the types of content to be created and shared (e.g.,
    blog posts, videos, infographics) and the key messages to be conveyed.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Social Media Strategy: Detail the approach for each social media platform,
    including content types, posting frequency, and engagement tactics.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'SEO and SEM: Describe the search engine optimization and search engine marketing
    strategies, including keyword research, on-page and off-page optimization, and
    paid search campaigns.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Email Marketing: Develop an email marketing plan, including list segmentation,
    email types (e.g., newsletters, promotional emails), and automation.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Analytics and Measurement: Identify the key performance indicators (KPIs) and
    tools to track and measure the success of the digital marketing efforts.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Budget and Resources: Provide an estimated budget for the campaign and outline
    the resources required, such as team members, tools, and software.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Ensure that the strategy is comprehensive, actionable, and tailored to the specific
    business. Each section should be detailed and provide clear steps for implementation.
    Additionally, consider any unique aspects of the business that might influence
    the strategy.
  prefs: []
  type: TYPE_NORMAL
- en: Prompt for Market Research
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Conducting thorough market research is essential but can be time-consuming and
    complex, involving the collection and analysis of vast amounts of data. This prompt
    will assist you in systematically gathering relevant market insights, analyzing
    competition, identifying customer needs, and understanding industry trends to
    make informed business decisions.
  prefs: []
  type: TYPE_NORMAL
- en: 'I run a business in the [industry/sector] industry and need your expertise
    as a Market Research Analyst. Please conduct a comprehensive market research report
    for our [product/service]. The report should include the following sections:'
  prefs: []
  type: TYPE_NORMAL
- en: '1\. Market Overview: Provide an overview of the current market landscape, including
    market size, growth trends, key drivers, and major market segments.'
  prefs: []
  type: TYPE_NORMAL
- en: '2\. Target Audience Analysis: Identify and describe the primary demographic
    and psychographic characteristics of the target audience, including geographic
    locations, buying behaviors, and preferences.'
  prefs: []
  type: TYPE_NORMAL
- en: '3\. Competitive Analysis: List and analyze the main competitors, their market
    share, strengths, weaknesses, pricing strategies, and key differentiators. Include
    a comparison table for clarity.'
  prefs: []
  type: TYPE_NORMAL
- en: '4\. SWOT Analysis: Conduct a SWOT analysis (Strengths, Weaknesses, Opportunities,
    Threats) for the product/service.'
  prefs: []
  type: TYPE_NORMAL
- en: '5\. Customer Needs and Preferences: Identify the main needs and preferences
    of the target audience, including pain points, desired features, and purchasing
    criteria. Include insights from surveys or focus groups if available.'
  prefs: []
  type: TYPE_NORMAL
- en: '6\. Market Opportunities and Challenges: Highlight potential market opportunities
    and challenges, including regulatory considerations, technological trends, and
    economic factors.'
  prefs: []
  type: TYPE_NORMAL
- en: '7\. Marketing Strategy Recommendations: Provide actionable recommendations
    for a marketing strategy to effectively reach and engage the target audience.
    Include suggestions for branding, positioning, pricing, promotion, and distribution.'
  prefs: []
  type: TYPE_NORMAL
- en: '8\. Data Sources and Methodology: Detail the sources of data used and the methodology
    employed in conducting the research. Specify any primary and secondary research
    methods, such as surveys, interviews, industry reports, and market analysis tools.'
  prefs: []
  type: TYPE_NORMAL
- en: '9\. Future Market Projections: Provide projections for market growth and trends
    over the next 5-10 years, and discuss how the product/service can adapt to these
    changes.'
  prefs: []
  type: TYPE_NORMAL
- en: '10\. Case Studies or Examples: Include relevant case studies or examples of
    similar products/services that have succeeded or failed in the market, and analyze
    the factors contributing to their outcomes.'
  prefs: []
  type: TYPE_NORMAL
- en: Ensure that the report is well-organized, thoroughly researched, and provides
    actionable insights. Each section should be detailed and supported by relevant
    data and analysis.
  prefs: []
  type: TYPE_NORMAL
- en: Prompt for Ad Copy
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Writing compelling ad copy that capture attention and drive action can be challenging,
    requiring creativity and persuasive language. This prompt will generate multiple
    persuasive and engaging ad copies for your specified product or service, helping
    you attract and convert potential customers more effectively.
  prefs: []
  type: TYPE_NORMAL
- en: Prompt 1
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'I need your help as a professional ad copywriter to create [number] persuasive
    and engaging ad copies for [product or service]. Each ad copy should include the
    following elements:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Headline: Craft a catchy and attention-grabbing headline.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Introduction: Highlight the main feature or benefit of [product or service]
    in a compelling introduction.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Key Features: List the top three features of [product or service].'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Benefits: Explain how [product or service] improves the lives of the target
    audience or solves a specific problem.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Call to Action (CTA): Include a clear and compelling call to action that encourages
    the audience to take the next step.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Target Audience: Specify the primary demographic or customer base for the ad
    copy.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Visual Elements: Describe any visual elements that should accompany the ad
    (e.g., images, videos, graphics) and how the ad copy should align with them.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Ensure each ad copy is concise, compelling, and uses persuasive language and
    a tone that resonates with the target audience. Consider incorporating emotional
    triggers or storytelling elements to make the ad more relatable and impactful.
    Use no more than [specified word limit] words per ad copy to maintain brevity
    and effectiveness.
  prefs: []
  type: TYPE_NORMAL
- en: Prompt 2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'I need to create an engaging ad copy for [platform: Google Ads, Facebook Ads,
    etc.] to promote [product/service]. As an expert in crafting persuasive advertisements,
    please assist me by developing an ad that highlights the unique selling points
    of the product/service. The key points to emphasize are:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Unique Selling Point 1: [USP 1]'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Unique Selling Point 2: [USP 2]'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Unique Selling Point 3: [USP 3]'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Additionally, include a strong call to action, such as [call to action], and
    ensure the ad copy is within [character limit] characters. The ad should be compelling,
    clear, and designed to capture the audience's attention quickly. Please also consider
    the tone and style suitable for the platform and target audience.
  prefs: []
  type: TYPE_NORMAL
- en: Generate [number of Ad copy] different variations, ensuring each one has a unique
    approach to the same product/service, focusing on different aspects or wording
    to appeal to a broad audience.
  prefs: []
  type: TYPE_NORMAL
- en: Prompt for Ad Copy Tester
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Creating ad copy that effectively captures attention and converts prospects
    can be challenging. This prompt allows you to evaluate and improve ad copy by
    analyzing its effectiveness, clarity, engagement potential, and adherence to best
    practices, ultimately providing alternative versions to enhance performance.
  prefs: []
  type: TYPE_NORMAL
- en: As a professional ad copywriter, your task is to analyze and provide feedback
    on the given digital ad copy. You should evaluate the ad based on factors such
    as effectiveness, clarity, engagement, and compliance with best practices. After
    analyzing each aspect, provide a detailed report explaining what’s wrong with
    the ad copy and how it can be improved. Finally, offer a list of alternative ad
    copies that are more effective.
  prefs: []
  type: TYPE_NORMAL
- en: 'Input Ad Copy: [Insert your Ad Copy Here]'
  prefs: []
  type: TYPE_NORMAL
- en: 'For your analysis response, please follow this structure:'
  prefs: []
  type: TYPE_NORMAL
- en: 1\. Effectiveness Score (1-10)
  prefs: []
  type: TYPE_NORMAL
- en: 'Score: Provide an overall score for the effectiveness of the ad copy.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Explanation: Briefly explain your effectiveness score, mentioning key factors
    like relevance, appeal, and potential to drive action.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 2\. Clarity Score (1-10)
  prefs: []
  type: TYPE_NORMAL
- en: 'Score: Rate how easy it is for users to understand the main message of the
    ad copy.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Explanation: Briefly explain your clarity score, considering word choice, length,
    and readability.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 3\. Engagement Potential
  prefs: []
  type: TYPE_NORMAL
- en: 'Analysis: Determine the potential of the ad copy to engage the target audience.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Explanation: Briefly explain your analysis, noting any elements that contribute
    to or detract from engagement.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 4\. Best Practices Compliance
  prefs: []
  type: TYPE_NORMAL
- en: 'Analysis: Identify any compliance issues with advertising best practices.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Explanation: Briefly discuss the identified issues and their potential impact
    on the ad’s performance.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 5\. Alternative Ad Copies
  prefs: []
  type: TYPE_NORMAL
- en: 'Improved Alternatives: Provide a list of 3-5 improved alternatives based on
    your analysis.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Alternative 1
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Alternative 2
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Please ensure that your response is detailed, clear, and concise while maintaining
    flexibility and creativity in offering improvements. Your goal is to maximize
    the ad’s effectiveness without being overly restrictive or prescriptive in terms
    of style and content choices.
  prefs: []
  type: TYPE_NORMAL
- en: Prompt for Advertising
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Planning and executing an advertising campaign involves numerous elements, including
    target audience identification, message crafting, and budget allocation. This
    prompt will guide you through creating a detailed advertising campaign plan, covering
    all critical aspects to ensure your campaign reaches the right audience and achieves
    your marketing goals.
  prefs: []
  type: TYPE_NORMAL
- en: 'I run a business that offers [product or service], and I need your help as
    an advertising strategist to develop a comprehensive advertising campaign. Here’s
    exactly what I’m looking for:'
  prefs: []
  type: TYPE_NORMAL
- en: '1\. Target Audience: Describe the primary demographic and psychographic characteristics
    of the target audience.'
  prefs: []
  type: TYPE_NORMAL
- en: '2\. Customer Insights: Provide any relevant customer data or insights that
    can inform the campaign strategy.'
  prefs: []
  type: TYPE_NORMAL
- en: '3\. Key Message: Define the core message that the campaign will communicate
    to the audience.'
  prefs: []
  type: TYPE_NORMAL
- en: '4\. Unique Selling Proposition (USP): Highlight what makes the product or service
    unique and why the target audience should choose it over competitors.'
  prefs: []
  type: TYPE_NORMAL
- en: '5\. Campaign Goals: Specify the main objectives of the campaign, such as increasing
    brand awareness, driving website traffic, or boosting sales.'
  prefs: []
  type: TYPE_NORMAL
- en: '6\. Competitor Analysis: Include a brief analysis of key competitors and their
    advertising strategies.'
  prefs: []
  type: TYPE_NORMAL
- en: '7\. Advertising Channels: Identify the most effective channels for reaching
    the target audience (e.g., social media, television, print, online ads).'
  prefs: []
  type: TYPE_NORMAL
- en: '8\. Creative Strategy: Outline the creative elements of the campaign, including
    the tone, style, and visual/graphic elements to be used.'
  prefs: []
  type: TYPE_NORMAL
- en: '9\. Content Plan: Develop a content plan detailing the types of ads, posts,
    or materials to be created, including any slogans, taglines, or key visuals.'
  prefs: []
  type: TYPE_NORMAL
- en: '10\. Call to Action (CTA): Specify the CTAs to be used in the campaign to drive
    desired actions.'
  prefs: []
  type: TYPE_NORMAL
- en: '11\. Brand Alignment: Ensure the campaign aligns with the overall brand voice
    and values.'
  prefs: []
  type: TYPE_NORMAL
- en: '12\. Budget: Provide an estimated budget for the campaign, including allocation
    for different channels and creative production.'
  prefs: []
  type: TYPE_NORMAL
- en: '13\. Timeline: Create a timeline for the campaign, from the initial planning
    stages through to execution and evaluation.'
  prefs: []
  type: TYPE_NORMAL
- en: '14\. Compliance and Legal Considerations: Note any industry-specific regulations
    or compliance issues to be mindful of.'
  prefs: []
  type: TYPE_NORMAL
- en: '15\. Metrics and Evaluation: Define the key performance indicators (KPIs) and
    methods for measuring the success of the campaign.'
  prefs: []
  type: TYPE_NORMAL
- en: Ensure that the campaign is cohesive and strategically aligned with the brand’s
    overall marketing goals. Each section should be detailed and provide a clear roadmap
    for executing the campaign.
  prefs: []
  type: TYPE_NORMAL
- en: Prompt for Email Writing
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Crafting a thoughtful and appropriate response to received emails can be time-consuming
    and requires careful consideration of tone and content. This prompt will help
    you generate well-structured, polite, and contextually relevant replies to emails,
    saving you time and ensuring effective communication.
  prefs: []
  type: TYPE_NORMAL
- en: Prompt 1
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: I am [Role] at [Your Company Name], a company specializing in [brief description
    of your business and its core services or products]. We are committed to [mention
    key values or goals of your company, such as customer satisfaction, innovation,
    quality, etc.].
  prefs: []
  type: TYPE_NORMAL
- en: Your task is to craft a professional and engaging reply to an email we have
    received. The reply should address the sender's queries or concerns, provide clear
    and concise information, and reflect our company's values and commitment to excellent
    customer service.
  prefs: []
  type: TYPE_NORMAL
- en: 'Please ensure the reply includes the following elements:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Greeting: A polite and professional opening.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Acknowledgment: Recognize the sender''s email and thank them for reaching out.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Main Response: Address the specific points or questions raised in the email.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Additional Information: Offer any additional relevant information or assistance.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Closing: A courteous closing statement, encouraging further communication if
    needed.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Please ensure the email is well-structured, concise, and engaging, maintaining
    a professional tone throughout.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here is the email we received that requires a response:'
  prefs: []
  type: TYPE_NORMAL
- en: '[Paste the email you received here]'
  prefs: []
  type: TYPE_NORMAL
- en: Prompt 2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Instruction: Before using this prompt, please upload the document containing
    frequently asked questions (FAQs) and your typical responses. This document will
    serve as a reference for crafting accurate and consistent email replies.'
  prefs: []
  type: TYPE_NORMAL
- en: I am [your name], the owner of a business specializing in [insert your niche].
  prefs: []
  type: TYPE_NORMAL
- en: As an expert in this field, I often receive a variety of emails that need timely
    and thoughtful responses. To assist me with this, I have uploaded a document containing
    frequently asked questions along with my typical responses. Please refer to this
    document when crafting your replies to ensure consistency and accuracy.
  prefs: []
  type: TYPE_NORMAL
- en: I will be pasting individual emails here, one at a time.
  prefs: []
  type: TYPE_NORMAL
- en: 'Your task is to respond to each email as if you were me, an expert in [your
    niche]. Please ensure your responses include the following elements:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Tone: Empathetic, friendly, and human-centric, showcasing a personality that
    prioritizes warmth and approachability over formal professionalism.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Consistency: Reflect my approach as a business owner, maintaining a consistent
    and authentic voice.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Accuracy: Address each sender’s needs and concerns effectively, referring to
    the provided FAQ document for guidance on common questions.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: If an email contains questions or issues not covered in the document, ask me
    for additional context or clarification. This will ensure each response is accurate,
    personalized, and aligns with my business’s values and expertise.
  prefs: []
  type: TYPE_NORMAL
- en: Remember, the goal is to maintain a consistent and authentic voice that reflects
    my approach as a business owner, while effectively addressing each sender’s needs
    and concerns.
  prefs: []
  type: TYPE_NORMAL
- en: Prompt for Email Subject Line Tester
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Crafting an effective email subject line is crucial for improving open rates,
    but many struggle with capturing attention and avoiding spam filters. This prompt
    helps you analyze and improve your subject lines, offering feedback on effectiveness,
    sentiment, and potential spam triggers, along with alternative suggestions for
    better performance.
  prefs: []
  type: TYPE_NORMAL
- en: 'As a professional email subject line copywriter, your task is to analyze and
    provide feedback on the given subject lines. You should evaluate each input subject
    line based on the following factors: effectiveness, scannability, sentiment, spammy
    triggers, usage of all caps words, and emojis.'
  prefs: []
  type: TYPE_NORMAL
- en: After analyzing each aspect, provide a detailed report explaining what’s wrong
    with the subject line and how it can be improved. Finally, offer a list of alternative
    subject lines that are more effective.
  prefs: []
  type: TYPE_NORMAL
- en: 'Input Subject Line: [Insert your Subject Line Here]'
  prefs: []
  type: TYPE_NORMAL
- en: 'For your analysis response, please follow this structure:'
  prefs: []
  type: TYPE_NORMAL
- en: 1\. Effectiveness Score (1-10)
  prefs: []
  type: TYPE_NORMAL
- en: 'Score: Provide an overall score for the effectiveness of the input subject
    line.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Explanation: Briefly explain your effectiveness score, mentioning key factors
    like relevance, appeal, and engagement potential.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 2\. Scannability Score (1-10)
  prefs: []
  type: TYPE_NORMAL
- en: 'Score: Rate how easy it is for users to quickly understand the main message
    of the subject line.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Explanation: Briefly explain your scannability score, considering word choice,
    length, and clarity.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 3\. Sentiment Analysis
  prefs: []
  type: TYPE_NORMAL
- en: 'Tone: Determine if the tone in the subject line is positive, neutral, or negative.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Explanation: Briefly explain your sentiment analysis, noting any emotional
    triggers or perceptions the subject line may evoke.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 4\. Spam Triggers
  prefs: []
  type: TYPE_NORMAL
- en: 'Analysis: Identify any phrases or elements that might trigger spam filters.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Explanation: Briefly discuss the identified spam triggers and their potential
    impact on deliverability.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 5\. All Caps Words
  prefs: []
  type: TYPE_NORMAL
- en: 'Analysis: Note any words written in all capital letters.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Explanation: Briefly discuss the impact of all caps words on readers’ perception
    and email effectiveness.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 6\. Emojis
  prefs: []
  type: TYPE_NORMAL
- en: 'Analysis: Assess whether adding an emoji would enhance or detract from the
    effectiveness of the subject line.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Explanation: Briefly explain your reasoning, considering factors like relevance,
    audience, and visual appeal.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 7\. Alternative Subject Lines
  prefs: []
  type: TYPE_NORMAL
- en: 'Improved Alternatives: Provide a list of 3-5 improved alternatives based on
    your analysis.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Alternative 1
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Alternative 2
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Alternative 3
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Alternative 4
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Alternative 5
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Please ensure that your response is clear and concise while maintaining flexibility
    and creativity in offering improvements to maximize engagement through optimized
    email subject lines. Avoid being overly restrictive or prescriptive in terms of
    style and content choices.
  prefs: []
  type: TYPE_NORMAL
- en: Prompt for Cold Email
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Reaching out to potential clients or partners through cold emails can be challenging,
    requiring a balance of personalization and professionalism to avoid being ignored.
    This prompt will help you create personalized and compelling cold email templates
    that increase the likelihood of getting a positive response, thereby enhancing
    your outreach efforts.
  prefs: []
  type: TYPE_NORMAL
- en: I am [Your Name], [Your Position] at [Your Company], a company specializing
    in [brief description of your business]. We are looking to enhance our outreach
    efforts and connect with potential clients more effectively.
  prefs: []
  type: TYPE_NORMAL
- en: 'Please act as a professional sales copywriter specializing in cold email outreach.
    Your task is to craft an engaging and persuasive cold email tailored for [target
    audience or industry]. The email should introduce our [product/service] and encourage
    the recipient to take a specific action. The email should include:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Subject Line: A compelling subject line that grabs attention and encourages
    the recipient to open the email.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Opening: A personalized greeting and a hook that captures the recipient’s interest.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Introduction: A brief introduction of the sender (me) and my company, highlighting
    what makes our [product/service] unique.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Value Proposition: A clear explanation of the benefits and value of our [product/service],
    addressing the recipient''s specific pain points or needs.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Call to Action (CTA): A clear and actionable CTA, such as scheduling a meeting,
    signing up for a demo, or downloading a resource.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Closing: A polite and professional closing, offering a way for the recipient
    to get in touch for more information.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Ensure the tone is professional yet friendly, and the content is concise and
    to the point. The email should be no longer than [number of words] words.
  prefs: []
  type: TYPE_NORMAL
- en: Prompt for Email Marketing
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Many businesses struggle with crafting compelling email marketing campaigns
    that capture the reader’s attention and drive engagement. This prompt will guide
    you through creating persuasive email content, from subject lines to call-to-actions,
    ensuring your emails stand out in crowded inboxes and achieve your marketing goals.
  prefs: []
  type: TYPE_NORMAL
- en: Prompt 1
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Craft a compelling email marketing campaign targeting [target audience] to
    promote [product/service]. The email should include the following elements:'
  prefs: []
  type: TYPE_NORMAL
- en: '1. Subject Line: Create an attention-grabbing subject line that highlights
    [key benefit or feature]. Ensure it is concise and piques curiosity or urgency.'
  prefs: []
  type: TYPE_NORMAL
- en: '2\. Opening Statement: Begin with a personalized greeting and a captivating
    opening statement that addresses a common pain point or need of the [target audience].
    Make the reader feel understood and interested right from the start.'
  prefs: []
  type: TYPE_NORMAL
- en: '3\. Body Content: Provide a detailed description of [product/service], emphasizing
    its unique features and the following benefits:'
  prefs: []
  type: TYPE_NORMAL
- en: '[Benefit 1]'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[Benefit 2]'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[Benefit 3]'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Explain how the product/service solves the pain point or need of the target
    audience. Support your content with relevant statistics, testimonials, or case
    studies to build credibility and trust.
  prefs: []
  type: TYPE_NORMAL
- en: '4\. Call to Action: End with a strong call to action that encourages [desired
    action, e.g., ''Buy Now'', ''Sign Up'', ''Learn More''], and include a link to
    [landing page or website].'
  prefs: []
  type: TYPE_NORMAL
- en: '5\. Closing and Signature: End with a friendly closing statement and provide
    your contact information, including [name, position, company, contact details].
    Ensure the closing feels personal and inviting for any follow-up communication.'
  prefs: []
  type: TYPE_NORMAL
- en: Prompt 2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'I am looking for a comprehensive email marketing strategy for my [business
    type/industry]. As an experienced email marketing strategist, you will develop
    a detailed and actionable plan that engages our target audience, drives conversions,
    and builds long-term customer relationships. The strategy should include the following
    elements:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Target Audience: Define the primary demographic and customer segments we aim
    to reach with our email campaigns. Provide insights into their preferences, behaviors,
    and pain points.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Email Campaign Types: Outline the different types of email campaigns we will
    run (e.g., welcome series, promotional emails, newsletters, re-engagement campaigns).
    Include the objectives and key messages for each campaign type.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Content Strategy: Describe the content themes and topics for each campaign
    type. Provide examples of subject lines, email body content, and call-to-action
    (CTA) strategies. Ensure the content aligns with our brand voice and resonates
    with our audience.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Segmentation and Personalization: Explain how we will segment our email list
    and personalize content to improve engagement and conversion rates. Include specific
    criteria for segmentation and examples of personalized content.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Automation and Scheduling: Detail the email automation workflows we will implement
    and the frequency/timing of our email sends. Provide recommendations for optimizing
    send times and ensuring consistent communication.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Metrics and KPIs: Identify the key performance indicators (KPIs) we will track
    to measure the success of our email campaigns (e.g., open rates, click-through
    rates, conversion rates). Explain how we will use these metrics to inform and
    refine our strategy.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'A/B Testing: Explain our approach to A/B testing different elements of our
    emails (e.g., subject lines, CTA buttons, images) to optimize performance. Include
    a testing schedule and criteria for evaluating results.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Compliance and Best Practices: Outline how we will ensure compliance with email
    marketing regulations (e.g., GDPR, CAN-SPAM) and follow industry best practices.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Ensure that the strategy is not only comprehensive but also practical and implementable.
    Each section should provide specific recommendations, examples, and step-by-step
    guidance to facilitate the effective execution of the email marketing strategy.
  prefs: []
  type: TYPE_NORMAL
- en: Prompt for Project Management
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Managing projects efficiently can be challenging, with numerous tasks, deadlines,
    and team members to coordinate. This prompt will help you develop a comprehensive
    project management plan, outlining clear objectives, timelines, responsibilities,
    and resources, enabling you to streamline your project execution and enhance team
    collaboration.
  prefs: []
  type: TYPE_NORMAL
- en: 'I run a business in the [niche/industry] sector. As an expert in project management,
    I need your assistance in developing a comprehensive project management plan for
    [type of project]. Please use the following specific details to tailor the plan:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Project Name: [Name of the project]'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Project Duration: [Expected duration, e.g., 6 months]'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Project Goals: [Primary goals and objectives, e.g., to improve customer satisfaction
    by 20%]'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Key Deliverables: [Key deliverables, e.g., website redesign, customer training
    manual]'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Team Members: [List of team members and their roles, e.g., Bob Lee - Project
    Manager, John Smith - Lead Developer]'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Budget Constraints: [Budget constraints, e.g., $50,000]'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Preferred Tools: [Preferred project management tools/software, e.g., Trello,
    Asana]'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Reporting Requirements: [Reporting requirements and frequency, e.g., weekly
    progress reports]'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Success Criteria: [How success will be measured, e.g., project completed on
    time and within budget]'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Past Projects: [Lessons learned from past projects, e.g., importance of regular
    stakeholder communication]'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Please include the following elements in the project management plan:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Project Overview: Provide a brief description of the project, its objectives,
    and scope.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Stakeholder Analysis: Identify key stakeholders, their roles, and their expectations.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Project Timeline: Develop a detailed timeline with milestones, deliverables,
    and deadlines.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Resource Allocation: Outline the resources required, including personnel, equipment,
    and materials.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Budget Plan: Create a budget plan with estimated costs for each phase of the
    project.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Risk Management: Identify potential risks and develop mitigation strategies.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Communication Plan: Define the communication strategies and channels to be
    used throughout the project.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Quality Management: Establish quality standards and procedures to ensure the
    project''s outcomes meet the required specifications.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Monitoring and Evaluation: Develop a plan for monitoring progress and evaluating
    the project''s success upon completion.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Ensure that the project management plan is thorough, realistic, and tailored
    to the specific needs of the [type of project]. Each section should be detailed
    and provide clear guidance for managing the project effectively.
  prefs: []
  type: TYPE_NORMAL
- en: Prompt for Language Learning
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Learning a new language involves mastering various skills, including vocabulary,
    grammar, conversation, reading comprehension, and cultural understanding. These
    prompts will provide targeted practice in each area, offering structured exercises
    and immersive scenarios to boost your language proficiency and cultural knowledge
    effectively.
  prefs: []
  type: TYPE_NORMAL
- en: Prompt for Vocabulary Building
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'I am a student learning advanced [language] vocabulary. You are my language
    tutor. Please help me learn new vocabulary words through the following process:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Word Introduction: Introduce a new advanced vocabulary word.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Definition: Provide a clear and concise definition of the word.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Example Sentence: Use the word in a sentence to illustrate its meaning.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Synonyms and Antonyms: List at least three synonyms and three antonyms of the
    word.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Usage Context: Explain the context in which the word is commonly used, including
    any relevant nuances.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Quiz: Ask me to create my own sentence using the word and provide feedback
    on its correctness.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Let's begin with the first word.
  prefs: []
  type: TYPE_NORMAL
- en: Prompt for Cultural Understanding
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: I am a language student learning [target language]. You are my cultural advisor.
    Your task is to teach me about [target language] culture through language. Choose
    a specific cultural topic, such as [cultural topic], and explain it in [target
    language]. Provide an English translation and elaborate on any cultural nuances,
    idiomatic expressions, or historical context that are important for understanding
    the topic.
  prefs: []
  type: TYPE_NORMAL
- en: After discussing this topic, suggest another cultural topic that I should learn
    about. Please recommend one that is essential for a deeper understanding of [target
    language] culture.
  prefs: []
  type: TYPE_NORMAL
- en: Prompt for Grammar Practice
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'I am a student learning advanced [language] grammar. You are my grammar coach.
    I need your help to practice complex grammatical structures. Please follow these
    steps:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Concept Explanation: Clearly explain the advanced grammatical concept.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Examples: Provide three example sentences that demonstrate the correct use
    of the grammatical concept.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Exercises: Create three practice sentences where I need to apply the grammatical
    concept correctly.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Feedback: Review my sentences and provide detailed feedback on any mistakes,
    including corrections and explanations.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Additional Practice: Suggest further reading or exercises to reinforce the
    concept.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Let''s start with the grammatical concept: [initial grammatical concept].'
  prefs: []
  type: TYPE_NORMAL
- en: After discussing this concept, suggest another advanced grammatical concept
    that I should learn about.
  prefs: []
  type: TYPE_NORMAL
- en: Prompt for Conversational Practice
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'I am trying to improve my conversational skills in [language]. I often struggle
    with [specific problem or scenario, e.g., ordering food at a restaurant]. Please
    help me practice by role-playing as [character/role], while I take the role of
    [your role]. Simulate a conversation where we discuss [specific topic or context,
    e.g., menu, order, food]. During our conversation, please:'
  prefs: []
  type: TYPE_NORMAL
- en: Correct any grammatical mistakes I make and provide explanations for these corrections.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Highlight key vocabulary words and phrases used in the conversation, offering
    brief definitions or context if necessary.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Provide constructive feedback on each of my responses, including corrections
    and suggestions for improvement.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Ask the next question to continue our conversation after each of my replies.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Ensure the conversation is engaging and realistic to help me practice effectively.
  prefs: []
  type: TYPE_NORMAL
- en: Prompt for Reading Comprehension
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'I am a student working on improving my reading comprehension in [language].
    You are my reading comprehension guide. Please help me through the following steps:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Passage Selection: Choose a short, advanced-level passage from [type of literature
    or source, e.g., classic novels, scientific articles, contemporary fiction, etc.].'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Reading and Translation: Present the passage and provide a sentence-by-sentence
    translation into [your native language].'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Comprehension Questions: Ask five comprehension questions related to the passage.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Discussion: Discuss the main themes and ideas presented in the passage.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Vocabulary and Phrases: Identify and explain any difficult vocabulary words
    or phrases from the passage.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Let's start with the selected passage.
  prefs: []
  type: TYPE_NORMAL
- en: Prompt for Learning New Skills
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: With the rapid pace of technological advancement, staying updated with new skills
    can be overwhelming. This prompt will help you create a personalized learning
    plan, identifying key resources, setting achievable goals, and maintaining motivation,
    ensuring you can efficiently acquire and master new skills relevant to your personal
    or professional growth.
  prefs: []
  type: TYPE_NORMAL
- en: I am seeking to learn a new skill and would like your assistance in guiding
    me through the process. I have [brief description of any prior knowledge or experience]
    in this field. Assume the role of an Expert Mentor in this skill. Please provide
    a step-by-step learning plan, recommended resources, practical exercises, and
    tips for mastering the skill.
  prefs: []
  type: TYPE_NORMAL
- en: 'I want to learn [skill]. The plan should include the following components:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Introduction: Provide a brief overview of [skill] and its significance in [relevant
    field or context].'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Learning Goals: Outline specific goals I should aim to achieve by the end of
    this learning process.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Learning Plan: Outline a structured plan for learning [skill] over [number]
    weeks, breaking down the key concepts and milestones for each week.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Recommended Resources: Suggest books, online courses, websites, and other learning
    materials for each stage of the learning plan.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Practical Exercises: Provide practical exercises, mini-projects, and real-world
    applications for each week to reinforce learning.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Tips for Mastery: Offer tips on how to effectively learn and retain [skill],
    common pitfalls to avoid, and advice on how to stay motivated throughout the learning
    process.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Ensure the plan is adaptable to different learning styles and levels of experience.
    Each section should be detailed and provide actionable steps for the learner.
  prefs: []
  type: TYPE_NORMAL
- en: '[Skill]: paste here the skill you want to learn, e.g., Python programming for
    data analysis'
  prefs: []
  type: TYPE_NORMAL
- en: Prompt for Interview Preparation
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Preparing for job interviews can be nerve-wracking, especially when you are
    unsure of the types of questions that will be asked and how to answer them effectively.
    This prompt offers a comprehensive mock interview tailored to the specific role
    and company you are applying for. It covers behavioral, technical, and scenario-based
    questions, providing you with a realistic interview experience. Additionally,
    you will receive constructive feedback after each response, helping you refine
    your answers and improve your performance, ultimately boosting your confidence
    and readiness for the actual interview.
  prefs: []
  type: TYPE_NORMAL
- en: 'I am preparing for a job interview and need your help. You will act as the
    interviewer. The role I am applying for is [Job Title] at [Company/Industry].
    I am looking for a comprehensive mock interview that includes:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Behavioral Questions: Focus on my past experiences, teamwork, problem-solving
    skills, and how I handle challenges and conflicts.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Technical Questions: Cover key areas relevant to a [Job Title] role such as
    [Relevant Skills/Technologies], [Specific Techniques], [Programming Skills (e.g.,
    Python, SQL)], and experience with [Tools/Software (e.g., Tableau, Power BI)].'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Scenario-Based Questions: Present hypothetical situations related to [Job-Specific
    Scenarios] and ask how I would approach and solve these problems.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Feedback: Provide constructive feedback after my responses to help me improve.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Instructions:'
  prefs: []
  type: TYPE_NORMAL
- en: Ask me one interview question at a time.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: After I provide my answer, give me detailed feedback on my response and show
    me the correct way to answer.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Then ask the next question.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Maintain a professional tone throughout.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Please ensure the interview mimics a real-life scenario, with follow-up questions
    based on my answers.
  prefs: []
  type: TYPE_NORMAL
- en: Prompt for Career Advice
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Navigating career decisions can be complex, whether you're starting out, considering
    a change, or seeking advancement. This prompt will offer personalized career advice,
    helping you assess your strengths, explore potential career paths, and develop
    a strategic plan to achieve your professional goals, empowering you to make informed
    decisions and thrive in your chosen field.
  prefs: []
  type: TYPE_NORMAL
- en: Prompt 1
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'I want you to act as a career transition advisor. I am currently working as
    a [current role] in the [current industry] industry but am considering a switch
    to [desired field]. Provide detailed advice on how to make this transition, including:'
  prefs: []
  type: TYPE_NORMAL
- en: Necessary skills to acquire or develop.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Recommended certifications or courses.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Relevant experiences and accomplishments to highlight on my resume.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Potential challenges I might face during the transition.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Suggest actionable steps to get started on this new career path.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Prompt 2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'I want you to act as a career growth strategist. I am currently working as
    a [current position] in the [current industry] industry and aim to advance to
    a [desired position] within the next [time frame]. Please outline a comprehensive
    career growth plan that includes the following:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Key Milestones: Define specific, measurable milestones I should aim for at
    different stages of my career progression.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Skills Development: Identify critical skills and knowledge areas I need to
    develop or enhance to qualify for the desired position.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Networking Strategies: Suggest effective networking strategies and opportunities
    within my industry to build valuable connections.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Potential Obstacles: Highlight common obstacles or challenges I might face
    and propose ways to overcome them.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Mentorship: Provide advice on how to find and approach potential mentors in
    my field.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Motivation and Tracking: Offer tips on how to stay motivated throughout this
    journey and recommend methods for tracking my career progress.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Feel free to add any other relevant insights or recommendations that could aid
    in my career advancement.
  prefs: []
  type: TYPE_NORMAL
- en: Prompt for Writing Resume
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Many job seekers struggle to create a resume that effectively highlights their
    skills and experiences, making it difficult to stand out in a competitive job
    market. This prompt will guide you in generating a professional resume tailored
    to your industry, ensuring you present your qualifications in the most impactful
    way possible.
  prefs: []
  type: TYPE_NORMAL
- en: 'I am looking to create a professional resume but am unsure how to organize
    and present my information effectively. As an expert resume builder, please assist
    me in generating a resume for a [job title]. Below are the details that need to
    be included in the resume:'
  prefs: []
  type: TYPE_NORMAL
- en: 1. Contact Information
  prefs: []
  type: TYPE_NORMAL
- en: 'Full Name: [Full Name]'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Phone Number: [Phone Number]'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Email Address: [Email Address]'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'LinkedIn Profile: [LinkedIn Profile URL]'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Address: [Address]'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 2. Professional Summary
  prefs: []
  type: TYPE_NORMAL
- en: 'Summary: [Brief summary highlighting your career objectives, key skills, and
    a snapshot of your experience]'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 3. Work Experience
  prefs: []
  type: TYPE_NORMAL
- en: (Include multiple entries if applicable)
  prefs: []
  type: TYPE_NORMAL
- en: 'Job Title: [Job Title]'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Company: [Company Name]'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Location: [Location]'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Dates of Employment: [Start Date - End Date]'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Key Responsibilities and Achievements:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[List key responsibilities and achievements for each position]'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: (Repeat for each position)
  prefs: []
  type: TYPE_NORMAL
- en: 4. Education
  prefs: []
  type: TYPE_NORMAL
- en: (Include multiple entries if applicable)
  prefs: []
  type: TYPE_NORMAL
- en: 'Degree: [Degree]'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Institution: [Institution Name]'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Location: [Location]'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Graduation Year: [Graduation Year]'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 5. Skills
  prefs: []
  type: TYPE_NORMAL
- en: 'List of Skills: [List relevant skills for the job, including technical skills,
    soft skills, and any industry-specific skills]'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 6. Certifications and Awards
  prefs: []
  type: TYPE_NORMAL
- en: (Include multiple entries if applicable)
  prefs: []
  type: TYPE_NORMAL
- en: 'Certification/Award: [Certification or Award Name]'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Issuing Organization: [Issuing Organization]'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Date Received: [Date]'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Details: [Brief description of the significance or requirements of the certification/award]'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: (Repeat for each certification or award)
  prefs: []
  type: TYPE_NORMAL
- en: 7. Projects
  prefs: []
  type: TYPE_NORMAL
- en: (Include multiple entries if applicable)
  prefs: []
  type: TYPE_NORMAL
- en: 'Project Title: [Project Title]'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Description: [Brief description of the project]'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Role: [Your role in the project]'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Technologies Used: [Technologies used in the project]'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Outcomes: [Key outcomes or impact of the project, including any quantifiable
    results]'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: (Repeat for each project)
  prefs: []
  type: TYPE_NORMAL
- en: 8. Additional Sections (if applicable)
  prefs: []
  type: TYPE_NORMAL
- en: 'Volunteer Experience: [Details of volunteer work, including organization names,
    roles, and responsibilities]'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Languages: [Languages you speak, along with proficiency levels]'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Please format the resume professionally with clear headings for each section
    and use bullet points for easy readability. Tailor the content to highlight the
    most relevant experience and skills for the [job title] position.
  prefs: []
  type: TYPE_NORMAL
- en: Prompt for Research Proposal
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Writing a compelling research proposal can be challenging, particularly when
    trying to clearly articulate your research objectives, methodology, and expected
    outcomes. This prompt will help you structure a detailed and persuasive research
    proposal, making it easier to convey your ideas and secure funding or approval.
  prefs: []
  type: TYPE_NORMAL
- en: 'I need your assistance in creating a research proposal. You will act as an
    expert research advisor with extensive knowledge in [insert field, e.g., environmental
    science, artificial intelligence, etc.]. I am looking for a detailed and structured
    research proposal on the topic of [insert topic, e.g., "The Impact of Urban Green
    Spaces on Mental Health"]. The proposal should include the following elements:'
  prefs: []
  type: TYPE_NORMAL
- en: '1\. Introduction:'
  prefs: []
  type: TYPE_NORMAL
- en: Provide a comprehensive background on the topic.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: State the research problem and its significance.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Outline the main objectives and research questions that the study aims to address.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '2\. Literature Review:'
  prefs: []
  type: TYPE_NORMAL
- en: Summarize key findings from existing studies related to the topic.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Identify gaps in the current research that the proposed study will address.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Explain the theoretical framework or models that will guide the research, citing
    relevant theories and concepts.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '3\. Methodology:'
  prefs: []
  type: TYPE_NORMAL
- en: Describe the research design and approach (e.g., qualitative, quantitative,
    or mixed methods).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Detail the data collection methods (e.g., surveys, interviews, experiments)
    and justify their suitability.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Explain the sampling strategy, including the population, sample size, and selection
    criteria.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Outline the data analysis techniques and tools to be used.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '4\. Expected Results:'
  prefs: []
  type: TYPE_NORMAL
- en: Discuss the potential outcomes and their implications.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Highlight the contributions the research will make to the field.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '5\. Timeline and Budget:'
  prefs: []
  type: TYPE_NORMAL
- en: Provide a realistic timeline for each stage of the research, including key milestones
    and deadlines.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Estimate the budget required for the research, including a detailed breakdown
    of costs (e.g., personnel, materials, travel, equipment).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '6\. Conclusion:'
  prefs: []
  type: TYPE_NORMAL
- en: Summarize the importance of the research.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Reinforce the potential impact and benefits of the study.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Prompt for Social Media Post
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Crafting engaging and relevant social media posts can be time-consuming, especially
    when trying to maintain a consistent brand voice. This prompt will assist you
    in creating impactful social media content tailored to your audience, helping
    you increase engagement and reach.
  prefs: []
  type: TYPE_NORMAL
- en: Prompt 1
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: I need help creating an engaging social media post for my upcoming [event/product/service].
    I'm struggling to craft a post that will capture attention and drive engagement.
    I want you to act as a social media marketing expert.
  prefs: []
  type: TYPE_NORMAL
- en: 'Write a captivating social media post for [platform: Facebook, Twitter, Instagram]
    promoting my [event/product/service]. Include a catchy headline that grabs attention,
    a brief description that highlights the key benefits and unique aspects of the
    [event/product/service], and a compelling call to action such as [call to action].
    Use relevant hashtags like [hashtags], consider the target audience, and ensure
    the post aligns with the tone and style suitable for [platform]. The post should
    be [character limit] characters long.'
  prefs: []
  type: TYPE_NORMAL
- en: Prompt 2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: I am a [your role] for a [type of company/organization]. Please create an engaging
    social media post for our official [social media platform] account. The post should
    highlight the key features and benefits of [product/service/event], and it should
    encourage our followers to [desired action]. The tone should be [tone description],
    and the post should include a call-to-action and relevant hashtags. Make sure
    to mention [specific details or keywords], and aim to keep the post concise and
    compelling.
  prefs: []
  type: TYPE_NORMAL
- en: Prompt for Social Media Calendar
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Planning and organizing social media content can be overwhelming, often leading
    to inconsistent posting and missed opportunities. This prompt will help you develop
    a comprehensive social media calendar, ensuring you have a well-structured plan
    that maximizes your content's impact and reach.
  prefs: []
  type: TYPE_NORMAL
- en: 'I want you to act as a Social Media Manager for my business. Your role is to
    create a detailed social media calendar for the next [time period]. Our business
    operates in the [niche] industry. Here are the specific requirements:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Platforms: Focus on [list of social media platforms].'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Frequency: Plan for [posting frequency], incorporating a mix of content types.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Content Types:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Educational Posts: Share industry tips, how-to guides, and informative articles.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Promotional Posts: Highlight new products, special offers, and upcoming events.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Engagement Posts: Create polls, questions, and interactive content to boost
    engagement.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Visual Content: Suggest themes and concepts for images, infographics, and short
    videos.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Themes and Campaigns: Develop [weekly/monthly/etc.] themes or campaigns that
    align with our business goals and seasonal trends.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Hashtags and Keywords: Suggest relevant hashtags and keywords for each platform
    to maximize reach and engagement.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Metrics and Goals: Define clear goals for each post type, such as increasing
    followers, boosting engagement, or driving website traffic.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Target Audience: Specify details about our target audience, including demographics,
    interests, and online behavior, to tailor the content more precisely.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Call-to-Actions (CTAs): Suggest specific CTAs to be used in the posts to encourage
    user interaction and engagement.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Detailed Schedule: Provide a day-by-day breakdown of posts, including specific
    times for optimal engagement.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Ensure the content is tailored to each platform’s audience and leverages the
    unique features of each. Use engaging captions and appropriate hashtags to enhance
    the posts.
  prefs: []
  type: TYPE_NORMAL
- en: Prompt for Social Media Strategy
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Without a clear social media strategy, efforts can become scattered and ineffective,
    leading to poor engagement and growth. This prompt will guide you in creating
    a robust social media strategy, aligning your goals, target audience, and content
    plan to drive better results and enhance your online presence.
  prefs: []
  type: TYPE_NORMAL
- en: I am starting a new [type of brand] and planning to launch it in [time frame].
    I need a solid social media strategy to ensure a successful launch and ongoing
    growth. Despite my efforts, I'm struggling to define clear goals, identify the
    right audience, and create an effective content plan. You have over 10 years of
    experience as a Social Media Strategist, specializing in launching and growing
    new brands through comprehensive social media strategies.
  prefs: []
  type: TYPE_NORMAL
- en: 'Your task now is to help me develop a comprehensive social media strategy for
    this new brand. The strategy should cover the following elements:'
  prefs: []
  type: TYPE_NORMAL
- en: '1. Goals and Objectives: Outline the primary goals of the social media strategy,
    including brand awareness, engagement, and conversions. Specify numerical targets
    for each goal (e.g., reach X number of followers, achieve Y% engagement rate).'
  prefs: []
  type: TYPE_NORMAL
- en: '2\. Target Audience: Define the target audience, including demographics (age,
    gender, location), psychographics (lifestyle, values, interests), and key interests.
    Mention any relevant behaviors or trends observed in this audience.'
  prefs: []
  type: TYPE_NORMAL
- en: '3\. Platforms: Recommend the social media platforms to focus on and explain
    why they are suitable for the brand. Consider where the target audience is most
    active and the nature of the content that performs best on these platforms.'
  prefs: []
  type: TYPE_NORMAL
- en: '4\. Content Strategy: Develop a detailed content plan, including:'
  prefs: []
  type: TYPE_NORMAL
- en: Content types (e.g., posts, stories, videos, live streams)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Themes and messaging
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Posting schedule (frequency and timing)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Content ideas and potential topics that align with the brand’s goals and audience
    interests.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '5\. Engagement Tactics: Suggest tactics for engaging with the audience, including
    community management, user-generated content, and influencer partnerships. Detail
    specific engagement activities and frequency.'
  prefs: []
  type: TYPE_NORMAL
- en: '6\. Paid Advertising: Propose a strategy for paid social media campaigns, including
    budget allocation, ad types, and targeting options. Include expected outcomes
    and methods to optimize ads for better performance.'
  prefs: []
  type: TYPE_NORMAL
- en: '7\. KPIs and Metrics: Identify the key performance indicators (KPIs) and metrics
    to track the success of the strategy. Explain how each metric aligns with the
    goals (e.g., follower growth for brand awareness, click-through rate for conversions).'
  prefs: []
  type: TYPE_NORMAL
- en: '8\. Timeline: Provide a detailed timeline for the implementation of the strategy,
    including:'
  prefs: []
  type: TYPE_NORMAL
- en: Key milestones leading up to the launch
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Breakdown of tasks by month and week
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Any critical deadlines or review points.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Prompt for Creating Presentation
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Preparing a professional and compelling presentation can be daunting, especially
    when trying to convey complex information clearly and engagingly. This prompt
    will help you design a structured and visually appealing presentation, ensuring
    your key messages are communicated effectively and leave a lasting impression
    on your audience.
  prefs: []
  type: TYPE_NORMAL
- en: I am preparing an important presentation on the topic [Your Topic Here], and
    I need it to be professional and engaging. I am struggling to structure the content
    and make it appealing to the audience.
  prefs: []
  type: TYPE_NORMAL
- en: 'I want you to act as an experienced Presentation Designer. Your task is to
    create a detailed and compelling presentation outline and content. Here is exactly
    what I am looking for:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Title Slide: Create a title slide that includes the main title and a subtitle
    if necessary.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Introduction Slide: Write an introduction slide that briefly introduces the
    topic, states the purpose of the presentation, and provides an overview of what
    will be covered.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Main Sections:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Create 3-5 main sections with clear headings.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: For each section, write content for 2-3 slides covering key points, facts, or
    data.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Ensure the content is concise, informative, and engaging.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Suggest relevant visuals (e.g., charts, images, diagrams) that could be included
    to enhance understanding.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Conclusion Slide: Add a conclusion slide that:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Summarizes the key takeaways.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Offers final thoughts or recommendations.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Includes a call to action, if applicable.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Q&A Slide: Write a Q&A slide inviting questions from the audience.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Ensure the content is well-organized, with clear and concise text, and provide
    speaker notes for each slide to guide the presentation delivery.
  prefs: []
  type: TYPE_NORMAL
- en: Prompt for Graphic Design
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Struggling to come up with unique and visually appealing graphic design ideas
    can be a major roadblock for designers and marketers. This prompt will help you
    generate creative and innovative graphic design concepts tailored to your specific
    needs, ensuring your projects stand out and effectively communicate your message.
  prefs: []
  type: TYPE_NORMAL
- en: I am working on a [project type], and I am facing challenges in developing creative
    and cohesive design concepts that align with our [theme or objective]. Despite
    having a general idea, I'm struggling to finalize the visual elements that will
    make the project stand out and resonate with our target audience of [target audience].
  prefs: []
  type: TYPE_NORMAL
- en: 'I need your expertise as a creative director to help generate innovative ideas
    and concepts. Specifically, I am looking for guidance on the following elements:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Visual Style: Suggest appropriate visual styles that align with [theme or objective],
    considering current trends and target audience preferences.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Color Schemes: Recommend color palettes that evoke [desired emotions or feelings],
    and explain the psychological impact of these colors.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Typography: Propose fonts that match the project''s overall aesthetic and describe
    why these fonts are suitable.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Unique Features: Include any unique features or elements that can make the
    [project type] stand out, such as interactive components, innovative layouts,
    or special effects.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Please provide detailed explanations and examples for each element to ensure
    a comprehensive understanding of your creative direction.
  prefs: []
  type: TYPE_NORMAL
- en: Prompt for Interior Design
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Planning and visualizing a cohesive and functional interior design for a specific
    room can be challenging, especially without professional guidance. This prompt
    will assist you in creating a detailed interior design plan for any type of room,
    considering factors such as layout, color scheme, furniture, and decor to achieve
    a harmonious and aesthetically pleasing space.
  prefs: []
  type: TYPE_NORMAL
- en: I am looking to redesign my [type of room] to reflect a [theme or style]. Currently,
    the space feels [describe current issues, e.g., cluttered, outdated, not cohesive],
    and I want to transform it into a more [desired outcome, e.g., modern, eco-friendly,
    and functional] environment. I have some ideas, but I need expert guidance to
    bring everything together seamlessly.
  prefs: []
  type: TYPE_NORMAL
- en: 'As an experienced interior designer specializing in [theme or style], your
    task is to create a comprehensive and detailed interior design plan for my [type
    of room]. The design should incorporate the following elements:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Theme and Style: Describe the overall theme and style of the [type of room],
    focusing on [key aspects, e.g., modern aesthetics with an emphasis on sustainability
    and eco-friendliness].'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Color Scheme: Choose a color palette that enhances the [key aspects, e.g.,
    modern and eco-friendly] theme. Explain the rationale behind the chosen colors,
    how they interact with each other, and how they contribute to the desired ambiance.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Furniture: List and describe key furniture pieces, ensuring they are [key requirement,
    e.g., eco-friendly]. Include information about materials, design, and the functionality
    of each piece. Explain how the furniture aligns with the overall theme and style.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Layout: Provide a detailed layout plan for the [type of room]. Explain the
    placement of furniture and how it optimizes space, functionality, and flow. Include
    considerations for different activities and traffic patterns within the room.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Lighting: Suggest lighting solutions that complement the [specific focus, e.g.,
    modern design] and are [specific requirement, e.g., energy-efficient]. Describe
    the types of lighting fixtures (e.g., ambient, task, accent), their placement,
    and how they enhance the room''s functionality and mood.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Decorative Elements: Include suggestions for decorative elements such as [decor
    types, e.g., artwork, plants, and accessories] that align with the [key aspects].
    Explain how these elements add character and personal touch to the space.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Technology Integration: Recommend smart home technologies that enhance convenience,
    functionality, and sustainability in the [type of room]. Provide examples of specific
    technologies (e.g., smart lighting, climate control) and explain how they integrate
    with the overall design.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Prompt for UX Design
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Crafting an effective and user-friendly UX design can be complex, requiring
    a deep understanding of user behavior and design principles. This prompt will
    guide you in developing a comprehensive UX design plan, focusing on user experience,
    interface usability, and overall functionality to create intuitive and engaging
    digital products.
  prefs: []
  type: TYPE_NORMAL
- en: 'I am looking for a comprehensive UX design plan for a new [type of application
    or website] called [name of your app]. You are an expert UX designer with extensive
    experience in creating user-friendly and visually appealing interfaces. Your task
    is to develop a detailed UX design plan for an app whose primary purpose is [primary
    purpose of the app] and that will use [technology stack or frameworks]. The plan
    should include the following elements:'
  prefs: []
  type: TYPE_NORMAL
- en: '1. User Personas: Create [number] detailed user personas representing the primary
    user groups, such as:'
  prefs: []
  type: TYPE_NORMAL
- en: '[Example Persona 1]'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[Example Persona 2]'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[Example Persona 3]'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '2\. Core Features: Outline and describe the core features of the app, ensuring
    they cater to the needs of each user persona. Include:'
  prefs: []
  type: TYPE_NORMAL
- en: '[Feature 1]'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[Feature 2]'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[Feature 3]'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '3\. User Journey: Develop a user journey map for each persona, detailing the
    steps from [starting point] to [end point]. Highlight key touchpoints and potential
    pain points, and propose solutions to enhance the user experience.'
  prefs: []
  type: TYPE_NORMAL
- en: '4\. Design Principles: Specify the design principles that will guide the app''s
    user interface (UI) and user experience (UX). Consider:'
  prefs: []
  type: TYPE_NORMAL
- en: Accessibility
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Simplicity
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Visual engagement
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Responsiveness
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '5\. Wireframes and Mockups: Provide low-fidelity wireframes and high-fidelity
    mockups for the main screens of the app, such as:'
  prefs: []
  type: TYPE_NORMAL
- en: Onboarding screen
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Dashboard
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Daily log
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Alerts and notifications
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: User profile
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '6\. Visual Design Guidelines: Develop guidelines for the visual design, including:'
  prefs: []
  type: TYPE_NORMAL
- en: Color schemes
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Typography
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Iconography
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Branding elements
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '7\. Usability Testing Plan: Outline a plan for conducting usability testing,
    including:'
  prefs: []
  type: TYPE_NORMAL
- en: Test objectives and criteria for success
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Recruitment of participants matching the user personas
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Methods for collecting feedback (e.g., surveys, interviews)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Metrics for evaluating usability
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Ensure that the design plan is user-centric, intuitive, and aligns with current
    UX best practices. Each section should be detailed and provide clear, actionable
    insights and recommendations to meet the specific needs of [target user group].
  prefs: []
  type: TYPE_NORMAL
- en: Prompt for Fitness
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Many people find it difficult to design a workout plan that matches their fitness
    goals, experience level, and available equipment. This prompt will help you create
    a personalized workout plan, tailored to your specific fitness objectives, preferences,
    and constraints, ensuring you stay motivated and achieve your fitness goals effectively.
  prefs: []
  type: TYPE_NORMAL
- en: Prompt 1
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'I am a fitness enthusiast looking to improve my health and fitness routine.
    You are a fitness expert with knowledge in exercise science, nutrition, and workout
    planning. Please design a [workout type] workout plan tailored for [fitness goal],
    considering the following details:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Current Fitness Level:  [beginner/intermediate/advanced]'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Available Equipment:  [list of equipment or ''none'' for bodyweight exercises]'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Preferred Workout Duration:  [time in minutes]'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Workout Frequency:  [number of days per week]'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Specific Preferences or Restrictions:  [e.g., focus on strength, avoid high-impact
    exercises, etc.]'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Ensure the plan includes warm-up, main exercises, and cool-down, along with
    any additional tips for maximizing results.
  prefs: []
  type: TYPE_NORMAL
- en: Prompt 2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: I am looking to improve my fitness and overall health, but I am struggling to
    create a workout plan that suits my unique needs and lifestyle. I have some specific
    goals and limitations that make it challenging to find a one-size-fits-all solution.
    Given your expertise as a professional fitness trainer, I need your help to design
    a personalized workout plan.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here are the details you need to consider:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Current Fitness Level: [beginner, intermediate, advanced]'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Goals: [e.g., weight loss, muscle gain, endurance, flexibility]'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Available Equipment: [e.g., gym equipment, dumbbells, resistance bands, no
    equipment]'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Time Commitment: [e.g., 30 minutes per session, 1 hour per session, 3 days
    a week, 5 days a week]'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Special Considerations: [e.g., previous injuries, specific preferences, dietary
    restrictions]'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Dietary Preferences: [Include any nutritional guidance or dietary preferences.]'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Physical Measurements: [Provide current weight, height, and any relevant body
    measurements.]'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Lifestyle Information: [Describe any relevant lifestyle factors (e.g., sedentary
    job, active hobbies).]'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Motivational Factors: [Mention what motivates the individual to stay committed
    to their fitness journey.]'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Health Conditions: [Specify any health conditions or medical considerations.]'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Current Exercise Routine: [Any existing exercise habits or routines.]'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Preferred Workout Time: [Preferred time of day for workouts (e.g., morning,
    afternoon, evening).]'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Sleep Schedule: [General sleep patterns or schedules.]'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Stress Levels: [Indication of current stress levels or factors contributing
    to stress.]'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'The workout plan should include:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Weekly Schedule: Outline the days and types of workouts (e.g., cardio, strength
    training, flexibility).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Daily Workout Details: Provide specific exercises, sets, reps, and rest periods
    for each day.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Warm-Up and Cool-Down: Include appropriate warm-up and cool-down routines for
    each session.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Progression Plan: Suggest how the workout plan can be adjusted over time to
    continue making progress.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Additional Tips: Provide any extra tips for maximizing results and maintaining
    motivation.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Ensure that the plan is safe, effective, and aligns with my goals and abilities.
  prefs: []
  type: TYPE_NORMAL
- en: Prompt for Diet Plan
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Designing a balanced and nutritious diet plan that aligns with individual health
    goals and dietary restrictions can be overwhelming. This prompt will assist you
    in generating a personalized diet plan, considering your nutritional needs, preferences,
    and health objectives to promote a healthier lifestyle and optimal well-being.
  prefs: []
  type: TYPE_NORMAL
- en: 'I have been struggling with my diet and overall health. Despite trying various
    approaches, I haven''t been able to achieve my health goals. I often find it challenging
    to create a balanced diet plan that fits my lifestyle, dietary preferences, and
    health needs. As a nutritionist/dietitian, please help me design a personalized
    diet plan that meets the following criteria:'
  prefs: []
  type: TYPE_NORMAL
- en: '1. Age and Gender: I am [age] years old and [gender].'
  prefs: []
  type: TYPE_NORMAL
- en: '2\. Current Weight and Height: My current weight is [weight] kg/lbs and my
    height is [height] cm/ft.'
  prefs: []
  type: TYPE_NORMAL
- en: '3\. Health Goals: I want to [lose weight/gain muscle/maintain weight/improve
    overall health].'
  prefs: []
  type: TYPE_NORMAL
- en: '4\. Dietary Preferences: My dietary preferences include [Vegetarian, vegan,
    keto, paleo, etc.]. I prefer to avoid [specific foods or allergens].'
  prefs: []
  type: TYPE_NORMAL
- en: '5\. Daily Caloric Intake: My target daily caloric intake is [calorie amount]
    kcal.'
  prefs: []
  type: TYPE_NORMAL
- en: '6\. Meal Frequency: I prefer to eat [number] meals per day, with [number] snacks.'
  prefs: []
  type: TYPE_NORMAL
- en: '7\. Macronutrient Distribution: I aim for a macronutrient distribution of [percentage]
    carbs, [percentage] protein, and [percentage] fats.'
  prefs: []
  type: TYPE_NORMAL
- en: '8\. Specific Foods or Ingredients: I would like to include [specific foods
    or ingredients] in my diet plan.'
  prefs: []
  type: TYPE_NORMAL
- en: '9\. Lifestyle and Activity Level: My activity level is [sedentary/lightly active/moderately
    active/very active], and I engage in [type of exercise or physical activity] [number]
    times per week.'
  prefs: []
  type: TYPE_NORMAL
- en: '10\. Food Timing Preferences: I prefer to eat at the following times: [list
    preferred meal times].'
  prefs: []
  type: TYPE_NORMAL
- en: '11\. Budget: My weekly budget for food is [budget amount] USD.'
  prefs: []
  type: TYPE_NORMAL
- en: '12\. Cooking Skills and Equipment: My cooking skills are [beginner/intermediate/advanced],
    and I have the following kitchen equipment available: [list equipment].'
  prefs: []
  type: TYPE_NORMAL
- en: '13\. Health Conditions: I have the following medical conditions or dietary
    restrictions: [list conditions/restrictions].'
  prefs: []
  type: TYPE_NORMAL
- en: '14\. Additional Considerations: Please take into account [any additional considerations,
    such as specific dietary requirements, etc.].'
  prefs: []
  type: TYPE_NORMAL
- en: Please provide a weekly meal plan, including breakfast, lunch, dinner, and snacks,
    along with portion sizes and nutritional information for each meal. Additionally,
    provide any necessary recipes or preparation instructions to ensure the plan is
    easy to follow.
  prefs: []
  type: TYPE_NORMAL
- en: Lastly, please explain the rationale behind the choices made for my diet plan
    to help me understand how it aligns with my health goals and preferences.
  prefs: []
  type: TYPE_NORMAL
- en: Prompt for Meal Planning
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Planning meals for a week or month can be time-consuming and challenging, especially
    when trying to balance variety, nutrition, and taste. This prompt will help you
    create a structured and diverse meal plan, ensuring you enjoy a balanced diet
    with a variety of delicious and nutritious meals, saving you time and effort in
    meal planning.
  prefs: []
  type: TYPE_NORMAL
- en: I have been struggling with planning my meals effectively and maintaining a
    healthy diet that fits my lifestyle. With my busy schedule, it has become increasingly
    difficult to find the time to plan meals, shop for ingredients, and prepare balanced
    meals that meet my dietary needs and preferences. I need help creating a meal
    plan for [duration] that I can follow easily.
  prefs: []
  type: TYPE_NORMAL
- en: I want you to act as my meal planning assistant. You are an expert in creating
    customized meal plans that are nutritious, budget-friendly, and tailored to individual
    preferences and constraints.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here are the details I need you to consider for my meal plan:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Dietary Preferences: My dietary preferences or restrictions are [list dietary
    preferences or restrictions, such as vegetarian, vegan, gluten-free, etc.].'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Meals per Day: I want to have [number of meals per day, e.g., 3 meals and 2
    snacks] each day.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Caloric Intake: My daily caloric intake goal is [daily caloric intake goal,
    if any].'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Cuisine Preferences: My preferred types of cuisine are [preferred types of
    cuisine, such as Italian, Mexican, Mediterranean, etc.].'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Specific Ingredients: I want to include [specific ingredients you want to include]
    and exclude [specific ingredients you want to exclude].'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Budget: My weekly budget for food is [approximate budget per week or per meal,
    if any].'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Preparation Time: I prefer the maximum preparation time per meal to be [preferred
    maximum preparation time per meal].'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Allergies: I have the following food allergies [list any food allergies].'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Preferred Meal Types: I am looking for [specify meal types such as quick meals,
    family meals, meal prep-friendly, etc.].'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Cooking Equipment: I have the following kitchen equipment available [mention
    any specific kitchen equipment available or preferred].'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Skill Level: My cooking skill level is [specify your cooking skill level, e.g.,
    beginner, intermediate, advanced].'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Please provide a detailed meal plan, including breakfast, lunch, dinner, and
    snacks, with recipes and a shopping list for each day.
  prefs: []
  type: TYPE_NORMAL
- en: Prompt for Holiday Planning
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Planning a holiday can be overwhelming with countless destinations, accommodation
    options, and activities to choose from, often leading to stress and decision fatigue.
    This prompt helps you streamline your holiday planning by generating a detailed
    itinerary based on your preferences, budget, and travel dates, ensuring a hassle-free
    and enjoyable vacation experience.
  prefs: []
  type: TYPE_NORMAL
- en: 'I am planning a holiday and facing some challenges in organizing it effectively.
    I need your help as my personal travel planner to create a well-organized and
    enjoyable holiday plan. Here are the details I need you to consider for my holiday
    plan:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Destination: I want to travel to [destination].'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Travel Dates: My travel dates are from [start date] to [end date].'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Accommodation Preferences: I prefer to stay in [type of accommodation, e.g.,
    hotel, Airbnb, resort, etc.].'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Activities and Interests: I am interested in [activities and interests, e.g.,
    hiking, beach relaxation, cultural tours, adventure sports, etc.].'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Budget: My budget for this trip is [budget amount].'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Travel Companions: I will be traveling with [number and relationship of travel
    companions, e.g., alone, with family, with friends, etc.].'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Special Requirements: I have special requirements such as [any special requirements,
    e.g., dietary restrictions, accessibility needs, etc.].'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Transportation: I prefer to travel by [preferred mode of transportation, e.g.,
    car, plane, train, etc.].'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Local Experiences: I am particularly interested in experiencing [specific local
    experiences or highlights you are interested in, e.g., local cuisine, historical
    sites, festivals, etc.].'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Please provide a detailed holiday plan that includes the following:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Itinerary: A detailed day-by-day breakdown of activities and suggested places
    to visit, tailored to my interests.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Accommodation Options: Recommendations for places to stay that align with my
    preferences and budget.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Travel Arrangements: Suggestions for transportation options and advice on how
    to get around the destination efficiently.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Local Tips: Useful advice on local customs, must-try foods, and important things
    to know about the destination to enhance my travel experience.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Ensure the plan is comprehensive, practical, and feasible for the specified
    dates, and aligns with my interests and budget. The suggestions should be well-researched
    and tailored to my specific needs and preferences.
  prefs: []
  type: TYPE_NORMAL
- en: Prompt for Translation
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Accurate translation between languages can be challenging, especially when dealing
    with idiomatic expressions, cultural nuances, and technical terms. This prompt
    provides precise and context-aware translations, making it easier to communicate
    effectively and understand content in different languages, bridging the gap between
    linguistic barriers.
  prefs: []
  type: TYPE_NORMAL
- en: I need your expertise as a professional translator. Please translate the following
    text from [source language] to [target language]. Ensure the translation is accurate,
    contextually appropriate, and maintains the original tone, style, and meaning.
    Consider any cultural nuances and idiomatic expressions to provide a natural and
    fluent translation that is clear and readable.
  prefs: []
  type: TYPE_NORMAL
- en: 'Text to be translated: [paste your text here]'
  prefs: []
  type: TYPE_NORMAL
- en: Additionally, provide a brief explanation of any challenging or unique phrases
    and how you translated them to ensure clarity and understanding.
  prefs: []
  type: TYPE_NORMAL
- en: Prompt for Financial Analysis
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Conducting a comprehensive financial analysis requires sifting through vast
    amounts of data, which can be time-consuming and complex. This prompt assists
    you in performing detailed financial analyses by generating insights on financial
    statements, ratios, and trends, helping you make informed decisions and understand
    your financial health better.
  prefs: []
  type: TYPE_NORMAL
- en: Prompt 1
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: I am currently facing a challenge in conducting a comprehensive financial analysis
    for [Company/Organization/Project Name]. Despite having access to various financial
    statements, I am struggling to derive actionable insights and compare them effectively
    with industry benchmarks and historical performance.
  prefs: []
  type: TYPE_NORMAL
- en: 'You are an expert financial analyst with over 10 years of experience in analyzing
    and interpreting financial data for various organizations. Your role is to assist
    me in performing a detailed financial analysis that covers the following key areas:
    profitability, liquidity, solvency, and efficiency.'
  prefs: []
  type: TYPE_NORMAL
- en: For profitability, evaluate key metrics such as net profit margin, return on
    assets, and return on equity. For liquidity, analyze the current ratio and quick
    ratio. For solvency, assess the debt-to-equity ratio and interest coverage ratio.
    For efficiency, review the inventory turnover ratio and accounts receivable turnover
    ratio.
  prefs: []
  type: TYPE_NORMAL
- en: 'Additionally, provide a comparison with industry benchmarks and historical
    performance. Use the following data:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Income Statement:  [insert income statement data here]'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Balance Sheet:  [insert balance sheet data here]'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Cash Flow Statement:  [insert cash flow statement data here]'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Industry Benchmarks:  [insert industry benchmark data here]'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Historical Financial Data:  [insert historical financial data here]'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Ensure the analysis includes a detailed explanation of each metric, the methodology
    used for calculations, and any assumptions made during the analysis. Please also
    include summary of key findings and recommendations based on the analysis.
  prefs: []
  type: TYPE_NORMAL
- en: Prompt 2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: I am working on a project that requires a comprehensive financial analysis of
    [Company Name]. I need to understand the company's financial health and performance
    over the past [number] years to make informed decisions.
  prefs: []
  type: TYPE_NORMAL
- en: 'I want you to act as a financial analyst. Please perform a detailed financial
    analysis for [Company Name]. The analysis should include the following elements:'
  prefs: []
  type: TYPE_NORMAL
- en: '1\. Financial Statements Review: Analyze the company''s income statement, balance
    sheet, and cash flow statement for the past [number] years. Highlight key figures
    and trends. Present the data in a clear and concise table format.'
  prefs: []
  type: TYPE_NORMAL
- en: '2\. Ratio Analysis: Calculate and interpret key financial ratios, including
    liquidity ratios (e.g., current ratio, quick ratio), profitability ratios (e.g.,
    net profit margin, return on equity), and solvency ratios (e.g., debt-to-equity
    ratio). Summarize the ratios in a table.'
  prefs: []
  type: TYPE_NORMAL
- en: '3\. Trend Analysis: Identify and discuss trends in revenue, expenses, net income,
    and other significant financial metrics over the analyzed period. Use tables to
    illustrate these trends.'
  prefs: []
  type: TYPE_NORMAL
- en: '4\. Comparative Analysis: Compare the company''s financial performance with
    industry benchmarks and key competitors. Present the comparative data in a table
    format.'
  prefs: []
  type: TYPE_NORMAL
- en: '5\. SWOT Analysis: Conduct a SWOT analysis (Strengths, Weaknesses, Opportunities,
    Threats) based on the financial data.'
  prefs: []
  type: TYPE_NORMAL
- en: '6\. Forecasting: Provide a financial forecast for the next [number] years,
    including projected income statement, balance sheet, and cash flow statement.
    Use tables to present the forecasts and justify your assumptions and methodology.'
  prefs: []
  type: TYPE_NORMAL
- en: '7\. Investment Analysis: Assess the company''s stock performance, including
    valuation metrics such as price-to-earnings (P/E) ratio and earnings per share
    (EPS). Provide investment recommendations and present key metrics in a table.'
  prefs: []
  type: TYPE_NORMAL
- en: '8\. Risk Analysis: Identify and evaluate potential financial risks and challenges
    the company might face in the future.'
  prefs: []
  type: TYPE_NORMAL
- en: Additionally, search the internet to gather the latest information and data
    relevant to the analysis. Use credible sources and quote references with hyperlinks
    at the end of the analysis.
  prefs: []
  type: TYPE_NORMAL
- en: Ensure that the analysis is thorough, well-structured, and supported by relevant
    data. Each section should include detailed explanations and tables where applicable
    to illustrate key points.
  prefs: []
  type: TYPE_NORMAL
- en: Prompt for Competitor Analysis
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Understanding your competitors' strategies, strengths, and weaknesses is crucial
    for staying competitive, but gathering and analyzing this information can be daunting.
    This prompt facilitates thorough competitor analysis by providing detailed reports
    on competitors' market positions, products, and marketing strategies, enabling
    you to identify opportunities and threats in your industry.
  prefs: []
  type: TYPE_NORMAL
- en: Prompt 1
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Conduct a detailed competitor analysis for a business in the [industry or sector]
    industry. Analyze [number of competitors] major competitors. The analysis should
    cover the following aspects for each competitor:'
  prefs: []
  type: TYPE_NORMAL
- en: '1. Company Overview: Provide a brief overview of the competitor, including
    its history, mission, and key products or services.'
  prefs: []
  type: TYPE_NORMAL
- en: '2\. Market Position: Describe the competitor’s position in the market, including
    market share and geographical presence.'
  prefs: []
  type: TYPE_NORMAL
- en: '3\. Strengths: Highlight the key strengths of the competitor, such as unique
    selling propositions (USPs), strong brand recognition, superior technology, etc.'
  prefs: []
  type: TYPE_NORMAL
- en: '4\. Weaknesses: Identify the main weaknesses or areas where the competitor
    is lacking compared to others in the industry.'
  prefs: []
  type: TYPE_NORMAL
- en: '5\. Strategies: Analyze the competitor’s business strategies, including marketing,
    sales, and distribution strategies.'
  prefs: []
  type: TYPE_NORMAL
- en: '6\. Financial Performance: Summarize the competitor’s financial performance,
    including key metrics such as revenue, profit margins, and growth rates.'
  prefs: []
  type: TYPE_NORMAL
- en: '7\. Customer Base: Describe the primary customer segments targeted by the competitor
    and any notable customer demographics.'
  prefs: []
  type: TYPE_NORMAL
- en: '8\. Product/Service Offerings: Detail the range of products or services offered
    by the competitor, highlighting any flagship products.'
  prefs: []
  type: TYPE_NORMAL
- en: '9\. Pricing Strategy: Explain the competitor’s pricing strategy and how it
    compares to others in the market.'
  prefs: []
  type: TYPE_NORMAL
- en: '10\. Recent Developments: Note any recent significant developments related
    to the competitor, such as mergers, acquisitions, new product launches, or strategic
    partnerships.'
  prefs: []
  type: TYPE_NORMAL
- en: '11\. SWOT Analysis: Conduct a SWOT analysis (Strengths, Weaknesses, Opportunities,
    Threats) for the competitor.'
  prefs: []
  type: TYPE_NORMAL
- en: '12\. Competitive Advantage: Identify the competitor’s key competitive advantages
    and how they maintain them.'
  prefs: []
  type: TYPE_NORMAL
- en: '13\. Future Outlook: Provide insights into the competitor’s future plans and
    potential impact on the industry.'
  prefs: []
  type: TYPE_NORMAL
- en: Ensure that the analysis is comprehensive and well-structured, providing actionable
    insights that can inform strategic decisions. Use credible sources and provide
    citations where necessary. Focus on delivering detailed, nuanced, and up-to-date
    information for each competitor to offer a thorough understanding of the competitive
    landscape.
  prefs: []
  type: TYPE_NORMAL
- en: Prompt 2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'I am facing a challenge with understanding the competitive landscape of my
    industry. To address this, I need a comprehensive analysis of a key competitor.
    You have over 10 years of experience in market research and competitive analysis.
    Your task now is to act as a market research analyst and provide a thorough analysis
    of [Competitor Name], a key player in the [industry or sector] industry. The analysis
    should cover the following aspects:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Company Overview: Provide a detailed overview of [Competitor Name], including
    its history, mission, vision, and core values.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Market Position: Describe [Competitor Name]’s position in the market, including
    its market share, geographical presence, and major market segments. Use market
    reports and credible industry sources.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Product/Service Offerings: Detail the range of products or services offered
    by [Competitor Name], highlighting any flagship products or services and recent
    innovations.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Strengths: Identify and elaborate on the key strengths of [Competitor Name],
    such as unique selling propositions (USPs), strong brand recognition, superior
    technology, etc.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Weaknesses: Analyze the main weaknesses or areas where [Competitor Name] is
    lacking compared to other competitors in the industry.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Business Strategies: Examine [Competitor Name]’s business strategies, including
    marketing, sales, distribution, and customer engagement strategies.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Financial Performance: Summarize [Competitor Name]’s financial performance,
    including key metrics such as revenue, profit margins, growth rates, and financial
    stability.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Customer Base: Describe the primary customer segments targeted by [Competitor
    Name] and any notable customer demographics or loyalty programs.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Pricing Strategy: Explain [Competitor Name]’s pricing strategy and how it compares
    to others in the market.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Recent Developments: Note any recent significant developments related to [Competitor
    Name], such as mergers, acquisitions, new product launches, or strategic partnerships.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'SWOT Analysis: Conduct a SWOT analysis (Strengths, Weaknesses, Opportunities,
    Threats) for [Competitor Name].'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Competitive Advantage: Identify [Competitor Name]’s key competitive advantages
    and how they maintain them.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Future Outlook: Provide insights into [Competitor Name]’s future plans, strategic
    goals, and potential impact on the industry.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Ensure that the analysis is comprehensive and well-structured, providing actionable
    insights that can inform strategic decisions. Use credible sources such as market
    research reports, industry publications, and financial statements, and provide
    citations where necessary.
  prefs: []
  type: TYPE_NORMAL
- en: '[Competitor Name]: type your competitor name here'
  prefs: []
  type: TYPE_NORMAL
- en: Prompt for Stock Analysis
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Analyzing stocks involves evaluating multiple financial indicators and market
    trends, which can be overwhelming for both novice and experienced investors. This
    prompt offers in-depth stock analysis by evaluating key metrics, historical performance,
    and market conditions, helping you make well-informed investment decisions and
    maximize your returns.
  prefs: []
  type: TYPE_NORMAL
- en: I want you to act as a financial analyst. Conduct a comprehensive stock analysis
    for [Company Name]. The analysis should cover various aspects of the company's
    financial health, market position, and future prospects. Gather the data by searching
    the internet and quote the references used. Present numerical values in table
    format where applicable.
  prefs: []
  type: TYPE_NORMAL
- en: 'Your analysis should include the following sections:'
  prefs: []
  type: TYPE_NORMAL
- en: '1. Company Overview: Provide a brief description of the company, its industry,
    and its primary products or services.'
  prefs: []
  type: TYPE_NORMAL
- en: '2\. Financial Statements Analysis:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Income Statement: Analyze the company''s revenue, expenses, and profitability
    trends over the past 3-5 years. Include key figures such as revenue, net income,
    and EBITDA.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Balance Sheet: Evaluate the company''s assets, liabilities, and equity structure.
    Highlight key ratios such as the current ratio, debt-to-equity ratio, and quick
    ratio.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Cash Flow Statement: Assess the company''s cash flow from operations, investing,
    and financing activities. Identify any significant changes or trends.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '3\. Ratio Analysis: Calculate and interpret key financial ratios, including
    profitability ratios (e.g., gross margin, net margin, return on assets (ROA),
    return on equity (ROE)), liquidity ratios (e.g., current ratio, quick ratio),
    and solvency ratios (e.g., debt-to-equity ratio, interest coverage ratio). Present
    numerical values in table format.'
  prefs: []
  type: TYPE_NORMAL
- en: '4\. Trend Analysis: Identify and discuss significant trends in the company''s
    financial performance and stock price over the past 3-5 years.'
  prefs: []
  type: TYPE_NORMAL
- en: '5\. Comparative Analysis: Compare the company''s financial metrics and stock
    performance with its major competitors and industry averages. Include at least
    three sources for comparison. Present numerical values in table format.'
  prefs: []
  type: TYPE_NORMAL
- en: '6\. SWOT Analysis: Conduct a SWOT analysis to identify the company''s strengths,
    weaknesses, opportunities, and threats.'
  prefs: []
  type: TYPE_NORMAL
- en: '7\. Forecasting: Provide financial projections for the next 3-5 years based
    on historical data, industry trends, and any available guidance from the company.'
  prefs: []
  type: TYPE_NORMAL
- en: '8\. Investment Analysis: Evaluate the company''s stock as a potential investment.
    Discuss factors such as valuation (e.g., P/E ratio, P/B ratio), growth prospects,
    dividend policy, and risk factors.'
  prefs: []
  type: TYPE_NORMAL
- en: '9\. Risk Analysis: Identify and discuss major risks that could impact the company''s
    financial performance and stock price. Consider factors such as market risk, operational
    risk, and regulatory risk.'
  prefs: []
  type: TYPE_NORMAL
- en: Ensure the analysis is detailed, data-driven, and well-supported by financial
    metrics and relevant industry information. Each section should offer clear insights
    into the company's current position and future prospects. Use reliable and up-to-date
    sources for data collection.
  prefs: []
  type: TYPE_NORMAL
- en: Prompt for Qualitative Analysis
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Conducting a comprehensive qualitative analysis can be challenging due to the
    complexity and nuance involved in interpreting subjective data. This prompt provides
    a clear and structured approach to qualitative analysis, ensuring thorough and
    well-organized research. It helps you gather and interpret data, identify major
    themes, and present insightful findings. This systematic framework enhances the
    depth and quality of your analysis.
  prefs: []
  type: TYPE_NORMAL
- en: Prompt 1
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Conduct a qualitative analysis on the impact of [topic] on [specific aspect
    or group]. The analysis should cover the following key areas: [Area 1], [Area
    2], and [Area 3].'
  prefs: []
  type: TYPE_NORMAL
- en: For [Area 1], discuss [specific details or questions]. For [Area 2], analyze
    [specific details or questions]. For [Area 3], explore [specific details or questions].
  prefs: []
  type: TYPE_NORMAL
- en: In your analysis, include relevant examples, quotes, and case studies from [sources
    or references] to support your points. Ensure the analysis is thorough, providing
    a well-rounded understanding of the impact. Highlight any significant patterns,
    themes, or insights that emerge, and discuss their implications.
  prefs: []
  type: TYPE_NORMAL
- en: Prompt 2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'I want you to act as a qualitative research analyst. Your task is to conduct
    a comprehensive qualitative analysis on the topic of [topic]. The analysis should
    include the following elements:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Introduction: Provide an overview of the topic, including its significance
    and relevance.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Literature Review: Summarize key findings from existing research and literature
    related to the topic. Highlight important theories, models, and frameworks.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Methodology: Describe the methods used to gather qualitative data, including
    data sources, sampling techniques, and data collection methods (e.g., interviews,
    focus groups, observations).'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Data Analysis: Analyze the qualitative data, identifying major themes, patterns,
    and insights. Use quotes or excerpts from the data to illustrate key points.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Findings: Present the main findings of the analysis, discussing how they relate
    to the research questions or objectives.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Discussion: Interpret the findings, exploring their implications, significance,
    and potential impact. Discuss any limitations of the study and suggest areas for
    future research.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Conclusion: Summarize the key points of the analysis and provide final thoughts
    on the topic.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Ensure the analysis is thorough and well-organized, with each section clearly
    delineated. Use appropriate academic or professional language and support your
    points with evidence from the qualitative data. Additionally, ensure the use of
    reputable sources and cite them appropriately.
  prefs: []
  type: TYPE_NORMAL
- en: Prompt for API Generation
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Developers often struggle with the complexity of designing and generating robust
    APIs that meet specific requirements and integrate seamlessly with other systems.
    This prompt helps you generate a complete and well-structured API based on your
    specified criteria, ensuring all necessary endpoints, methods, and data formats
    are included. By using this prompt, you can save time and reduce the risk of errors,
    allowing you to focus more on implementation and functionality.
  prefs: []
  type: TYPE_NORMAL
- en: Prompt 1
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: I am currently working on developing a new application for [specific use case
    or industry, e.g., healthcare, e-commerce, finance]. One of the critical components
    of this application is an API that will handle [main functionality, e.g., user
    data management, order processing, data analysis].
  prefs: []
  type: TYPE_NORMAL
- en: To ensure the API is robust, efficient, and meets industry standards, I need
    your help. Please act as an expert API developer.
  prefs: []
  type: TYPE_NORMAL
- en: Generate a detailed design for a [type of API, e.g., RESTful, GraphQL] API using
    [programming language/framework]. The API should integrate seamlessly with [data
    sources or external services, e.g., a SQL database, external payment gateway].
  prefs: []
  type: TYPE_NORMAL
- en: Provide detailed endpoints, data structures, and methods required to achieve
    this functionality. Include examples of request and response formats for each
    endpoint. If applicable, also describe any authentication and authorization mechanisms
    that should be implemented. Additionally, consider [performance requirements]
    to ensure the API meets expected performance standards.
  prefs: []
  type: TYPE_NORMAL
- en: Prompt 2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: I am in the process of developing a new API for a [type of application, e.g.,
    e-commerce platform, social media app, healthcare management system]. Despite
    having a clear vision for the application's functionalities, I am facing challenges
    in structuring the API comprehensively to ensure it meets all necessary requirements
    for robustness, security, and ease of use.
  prefs: []
  type: TYPE_NORMAL
- en: You have over 10 years of experience in designing and developing APIs for various
    applications, including [relevant field, e.g., e-commerce platforms, social media
    apps, healthcare systems]. Your task now is to help me create a detailed and comprehensive
    plan for developing this API.
  prefs: []
  type: TYPE_NORMAL
- en: 'The API plan should include the following elements:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Overview: Provide a brief overview of the API''s purpose and the [type of application]
    it supports. Explain the main functionalities and the target users.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Endpoints: Identify at least five key endpoints, describing their purposes
    and functionalities. For each endpoint, include the URL and a detailed explanation
    of its purpose.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Request Types: Specify the request types (GET, POST, PUT, DELETE) for each
    endpoint. Include a brief explanation of when and why each request type is used.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Input Parameters: Detail the required input parameters for each endpoint, including
    data types, validation rules, and examples. Ensure to cover mandatory and optional
    parameters.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Expected Outputs: Describe the expected outputs for each endpoint, including
    data formats (e.g., JSON, XML) and example responses. Highlight any specific data
    structures or key fields.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Authentication and Authorization: Outline the authentication and authorization
    mechanisms to be implemented, such as OAuth2, JWT, or API keys. Describe the process
    of token issuance and validation.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Error Handling: Describe how errors will be handled, including common error
    codes (e.g., 400, 401, 404, 500) and corresponding messages. Provide examples
    of error responses and advice on handling errors gracefully.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Security Measures: Implement rate limiting, input validation, and encryption
    (HTTPS, data at rest) to protect the API. Configure CORS settings to control domain
    access.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Testing: Plan for unit tests, integration tests, and load tests using tools
    like Postman, JUnit, and LoadRunner to ensure API functionality and performance.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Documentation: Describe the approach for documenting the API, ensuring it is
    clear and comprehensive for developers.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Ensure the plan is detailed and provides a clear roadmap for developing a robust
    and secure API. Each description should be thorough, providing a clear understanding
    of the functionality and structure of the API. Include examples or templates where
    applicable to illustrate key points.
  prefs: []
  type: TYPE_NORMAL
- en: Prompt for Creating Courses
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Creating a comprehensive and engaging course outline can be challenging, especially
    when trying to organize content in a logical, effective manner that facilitates
    learning. This prompt guides you through generating a detailed course outline,
    ensuring that all essential topics are covered in a structured and pedagogically
    sound sequence. It helps you create a clear roadmap for your course, making it
    easier to develop content and deliver a cohesive learning experience.
  prefs: []
  type: TYPE_NORMAL
- en: 'Develop a comprehensive course outline for a [subject or topic] course targeted
    at [target audience]. The outline should be structured to facilitate effective
    learning and cover all essential aspects of the subject. Include the following
    elements:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Course Title: Provide a descriptive and engaging title for the course.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Course Description: Write a brief overview of the course, highlighting its
    objectives, target audience, and any prerequisites.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Learning Objectives: List the specific skills and knowledge that students will
    gain by the end of the course.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Course Modules: Break down the course into modules or units. Each module should
    include:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Module Title: A descriptive title for the module.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Module Description: A brief overview of what the module will cover.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Key Topics: A list of the main topics or lessons included in the module.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Learning Activities: Describe the activities, exercises, or assignments that
    will help students understand the material.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Real-World Examples: Provide specific examples or case studies that illustrate
    the concepts being taught.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Assessment Methods: Explain how students will be assessed on their understanding
    of the module''s content.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Course Materials: List any required textbooks, articles, software, or other
    materials needed for the course.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Schedule: Provide a suggested timeline or schedule for completing the course,
    including the duration of each module and any key milestones.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Additional Resources: Suggest additional resources for further reading or practice,
    such as websites, videos, or supplementary materials.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Final Project or Capstone: If applicable, detail a final project or capstone
    that allows students to apply what they have learned in a practical, comprehensive
    manner.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Ensure that the course outline is detailed, well-organized, and designed to
    engage and educate students effectively. The course should be suitable for the
    specified target audience and should have clear, achievable learning outcomes.
    The outline should balance theoretical knowledge and practical application, ensuring
    students can effectively apply what they learn.
  prefs: []
  type: TYPE_NORMAL
- en: Prompt for Mind Map
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Organizing complex ideas and information into a visually coherent and easily
    understandable format can be challenging, particularly when dealing with intricate
    subjects. This prompt helps you generate a detailed mind map based on your specified
    text, breaking down the content into main topics, subtopics, and key points. By
    using this prompt, you can visually structure your thoughts and ideas, making
    it easier to see connections and develop a comprehensive overview of the information.
  prefs: []
  type: TYPE_NORMAL
- en: 'Generate a mind map based on the following text: [paste your text here].'
  prefs: []
  type: TYPE_NORMAL
- en: 'The mind map should include the main topics, subtopics, and key points mentioned
    in the text. Use the following structure:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Main Topic: [Main topic or theme of the text]'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Subtopic 1: [First subtopic]'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Key Point 1.1: [First key point under Subtopic 1]'
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Key Point 1.2: [Second key point under Subtopic 1]'
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '[Add more key points as needed]'
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Subtopic 2: [Second subtopic]'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Key Point 2.1: [First key point under Subtopic 2]'
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Key Point 2.2: [Second key point under Subtopic 2]'
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '[Add more key points as needed]'
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Ensure that the mind map visually represents the hierarchy and relationships
    between the main topic, subtopics, and key points. Highlight any connections or
    overlaps between different subtopics and key points to provide a comprehensive
    overview of the text.
  prefs: []
  type: TYPE_NORMAL
- en: Prompt for Analyzing Legal Document
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Understanding and analyzing legal documents can be overwhelming due to their
    complexity and the specialized language used. This prompt helps you break down
    and analyze legal documents, providing clear and concise summaries of key points,
    terms, and implications. By using this prompt, you can better comprehend legal
    texts, identify critical issues, and make informed decisions without getting lost
    in legal jargon.
  prefs: []
  type: TYPE_NORMAL
- en: I have a [type of legal document] that I'm struggling to understand due to its
    complex legal jargon and clauses. I need you to act as a legal document analyst.
    Please analyze this document for me.
  prefs: []
  type: TYPE_NORMAL
- en: Your analysis should cover the main points, key terms, and any important clauses
    that could impact me. Break down the complex legal language into simple, everyday
    terms. Additionally, provide a summary of the document's purpose and any actions
    that may be required from me.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here is the document text: [paste legal document text here].'
  prefs: []
  type: TYPE_NORMAL
- en: Thank you
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
