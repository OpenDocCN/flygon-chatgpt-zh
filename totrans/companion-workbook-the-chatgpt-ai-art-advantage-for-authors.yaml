- en: INTRODUCTION
  id: totrans-44
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '**引言**'
- en: '**Welcome, Author!**'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: '**欢迎，作者！**'
- en: If you've read "The ChatGPT AI Art Advantage for Authors," you know that creating
    compelling visuals for your book marketing doesn't have to be daunting or expensive,
    even if you feel graphically challenged. That book laid the foundation, showing
    you the incredible potential of using tools like ChatGPT 4o to bring your visual
    ideas to life.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您已经阅读了《ChatGPT AI艺术优势作者指南》，您知道为您的书籍营销创建引人注目的视觉元素不必令人畏惧或昂贵，即使您觉得自己在图形设计方面有挑战。那本书奠定了基础，向您展示了使用ChatGPT
    4o等工具将您的视觉想法变为现实的无穷潜力。
- en: Now, it's time to put that knowledge into practice! This companion workbook
    is your hands-on guide, taking you step-by-step through the process of creating
    stunning marketing visuals specifically for your books. Think of it as the practical
    application lab for the concepts you learned.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，是时候将知识付诸实践了！这本配套工作簿是您的动手指南，逐步引导您通过创建专为您的书籍量身定制的引人注目的营销视觉元素的过程。把它看作是您所学概念的实用应用实验室。
- en: '**Workbook Goals**'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: '**工作簿目标**'
- en: 'Our goals in this workbook are simple but powerful:'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 本工作簿的目标简单但强大：
- en: '**Build Confidence:** Move from understanding AI art concepts to confidently
    generating your own visuals.'
  id: totrans-50
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**建立信心**：从理解AI艺术概念到自信地生成自己的视觉元素。'
- en: '**Develop Practical Skills:** Master the art of prompting, refining images,
    and applying AI to specific marketing needs like social media graphics and cover
    concepts.'
  id: totrans-51
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**培养实用技能**：掌握提示技巧、精炼图像以及将AI应用于特定的营销需求，如社交媒体图形和封面概念。'
- en: '**Create Tangible Assets:** By the end of this workbook (and especially if
    you join the live challenge!), you''ll have a portfolio of usable marketing visuals
    tailored to your book.'
  id: totrans-52
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**创建有形资产**：在本工作簿结束时（尤其是如果您加入现场挑战的话！），您将拥有一套适用于您书籍的可用营销视觉元素。'
- en: '**Save Time & Money:** Learn to leverage AI efficiently, freeing up resources
    for what you do best – writing.'
  id: totrans-53
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**节省时间和金钱**：学会高效利用AI，释放资源用于您最擅长的写作。'
- en: '**How to Use This Workbook**'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: '**如何使用本工作簿**'
- en: This workbook is flexible. You can work through it at your own pace, applying
    the exercises directly to your current book project.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 本工作簿是灵活的。您可以按自己的节奏完成它，将练习直接应用于您当前的书本项目。
- en: It's also specifically designed to accompany the book, **“** [The ChatGPT AI
    Art Advantage for Authors](https://alsoby.me/r/amazon/B0FB1WY5PW?fc=au&ds=1) **”**
    . If you're participating in the challenge, each module corresponds to a day's
    focus, and the exercises will be central to our live sessions and activities.
    Look for the "Challenge Activity Prep" notes within the exercises!
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 它还专门设计来配合书籍，**《ChatGPT AI艺术优势作者指南》** [The ChatGPT AI Art Advantage for Authors](https://alsoby.me/r/amazon/B0FB1WY5PW?fc=au&ds=1)
    。如果您正在参加挑战，每个模块对应一天的重点，练习将是我们的现场会议和活动的主要内容。在练习中寻找“挑战活动准备”的说明！
- en: '**Connecting to the Book**'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: '**与书籍连接**'
- en: This workbook directly builds upon "[The ChatGPT AI Art Advantage for Authors](https://alsoby.me/r/amazon/B0FB1WY5PW?fc=au&ds=1)
    ." We'll frequently reference concepts, examples, and chapters from the book.
    Having the original book handy will enrich your experience, but the core exercises
    here are designed to be actionable on their own, assuming you grasp the fundamentals
    covered in the book.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 本工作簿直接基于"[The ChatGPT AI Art Advantage for Authors](https://alsoby.me/r/amazon/B0FB1WY5PW?fc=au&ds=1)"。我们将经常引用书中的概念、示例和章节。手头有原始书籍将丰富您的体验，但这里的核心练习旨在独立行动，前提是您掌握了书中涵盖的基本知识。
- en: '**Tools Needed**'
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: '**所需工具**'
- en: 'To make the most of this workbook, you''ll need:'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 为了最大限度地利用本工作簿，您将需要：
- en: '**Access to ChatGPT 4o:** Ensure you have an account (free or paid) and are
    comfortable with the basic interface.'
  id: totrans-61
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**访问ChatGPT 4o**：确保您有一个账户（免费或付费）并且熟悉基本界面。'
- en: '**A Web Browser:** For accessing ChatGPT.'
  id: totrans-62
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**网络浏览器**：用于访问ChatGPT。'
- en: '**This Workbook:** Either the digital version (which you might be able to fill
    directly) or the print version (with plenty of space for your notes and ideas).'
  id: totrans-63
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**本工作簿**：无论是数字版本（您可能可以直接填写）还是印刷版本（有足够的空间记录笔记和想法）。'
- en: '**(Recommended) Your Copy of "The ChatGPT AI Art Advantage for Authors":**
    For easy reference.'
  id: totrans-64
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**（推荐）您的《ChatGPT AI艺术优势作者指南》副本**：方便查阅。'
- en: Ready to transform your author marketing with visuals you create yourself? Let's
    dive in!
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 准备好使用您自己创建的视觉元素来转型您的作者营销吗？让我们开始吧！
- en: '[You can also follow along on the online challenge!](https://susanjagannath.gumroad.com/l/TCA-1)'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: '[你还可以跟随在线挑战！](https://susanjagannath.gumroad.com/l/TCA-1)'
- en: '![](Image00002.jpg)'
  id: totrans-67
  prefs: []
  type: TYPE_IMG
  zh: '![](Image00002.jpg)'
- en: 1 VISUAL STRATEGY & MINDSET FOR AUTHORS
  id: totrans-68
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 1 作者的视觉策略与心态
- en: This module helps do the basic groundwork before you dive into AI image creation.
    We'll connect the core message of your book, as discussed in "The ChatGPT AI Art
    Advantage for Authors," to visual concepts and understand your target audience's
    visual preferences.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 本模块帮助你完成在AI图像创作之前的基本准备工作。我们将把你在《ChatGPT AI艺术优势作者指南》中讨论的书籍核心信息与视觉概念联系起来，并了解你目标受众的视觉偏好。
- en: Get the printed version of this workbook here.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里获取这份工作簿的印刷版。
- en: 'EXERCISE 1.1: DEFINING YOUR BOOK''S CORE MESSAGE FOR VISUAL TRANSLATION'
  id: totrans-71
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 练习1.1：为视觉翻译定义你的书籍核心信息
- en: '**Objective:** To state the central theme or promise of your book into keywords
    and concepts that you can use to guide your visual creation.'
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: '**目标：** 将你的书籍的中心主题或承诺用关键词和概念表达出来，这些可以用来指导你的视觉创作。'
- en: '**Reference:** Think back to the Preface and Chapter 1 of "The ChatGPT AI Art
    Advantage for Authors." Why did you write your book? What is the single most important
    takeaway you want readers to have?'
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: '**参考：** 回想一下《ChatGPT AI艺术优势作者指南》的序言和第一章。你为什么写这本书？你希望读者获得的最重要的收获是什么？'
- en: '**Do this:**'
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: '**这样做：**'
- en: '**Summarise Your Book''s Core Message:** In one or two sentences, what is the
    essence of your book? What problem does it solve, or what transformation does
    it offer? *Your Answer:*'
  id: totrans-75
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**总结你的书籍核心信息：** 用一句话或两句话概括你的书籍的精髓。它解决了什么问题，或提供了什么转变？*你的答案：*'
- en: '**Identify Key Themes/Concepts:** List 3 main themes, ideas, or concepts explored
    in your book.'
  id: totrans-76
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**识别关键主题/概念：** 列出你在书中探讨的3个主要主题、想法或概念。'
- en: 'Theme 1:'
  id: totrans-77
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 主题 1：
- en: 'Theme 2:'
  id: totrans-78
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 主题 2：
- en: 'Theme 3:'
  id: totrans-79
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 主题 3：
- en: '**Brainstorm Visual Keywords:** For each theme above, brainstorm 5-10 keywords
    or short phrases that represent it visually. Think about objects, actions, emotions,
    settings, and symbols.'
  id: totrans-80
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**头脑风暴视觉关键词：** 对于上述每个主题，头脑风暴5-10个代表其视觉意义的词汇或短语。考虑物体、动作、情感、环境和符号。'
- en: 'Theme 1 Keywords:'
  id: totrans-81
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 主题 1 关键词：
- en: 'Theme 2 Keywords:'
  id: totrans-82
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 主题 2 关键词：
- en: 'Theme 3 Keywords:'
  id: totrans-83
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 主题 3 关键词：
- en: '**Identify the Core Emotion:** What is the primary emotion you want your book''s
    visuals to evoke (e.g., empowerment, curiosity, relief, excitement, calm, urgency)?
    *Your Answer:*'
  id: totrans-84
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**识别核心情感：** 你希望你的书籍视觉元素唤起的主要情感是什么（例如，赋权、好奇心、缓解、兴奋、平静、紧迫）？*你的答案：*'
- en: '**Challenge Activity Prep:** Keep this list handy! These keywords and the core
    emotion will be the starting point for your first AI image prompts in Module 2.'
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: '**挑战活动准备：** 保留这个清单！这些关键词和核心情感将是你在第2模块中第一个AI图像提示的起点。'
- en: 'EXERCISE 1.2: WHAT YOUR AUDIENCE LIKES'
  id: totrans-86
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 练习1.2：了解你的受众喜好
- en: '**Objective:** To understand the visual styles and preferences of your ideal
    reader, helping you create marketing materials they''ll connect with.'
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: '**目标：** 理解你理想读者的视觉风格和偏好，帮助你创建他们能够产生共鸣的营销材料。'
- en: '**Do this:**'
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: '**这样做：**'
- en: '**Describe Your Ideal Reader:** Briefly describe your target reader (age, interests,
    challenges, aspirations). Who are they? *Your Answer:*'
  id: totrans-89
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**描述你的理想读者：** 简要描述你的目标读者（年龄、兴趣、挑战、抱负）。他们是谁？*你的答案：*'
- en: '**Where Do They Hang Out Online?** List the social media platforms, websites,
    or online communities your ideal reader frequents. *Your Answer:*'
  id: totrans-90
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**他们在网上哪里活跃？** 列出你的理想读者经常访问的社交媒体平台、网站或在线社区。*你的答案：*'
- en: '**What Visuals do they love:** Think about the types of images, colors, and
    styles prevalent in the online spaces you listed above. What seems to capture
    their attention?'
  id: totrans-91
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**他们喜欢什么样的视觉元素：** 思考你列出的在线空间中普遍存在的图像类型、颜色和风格。什么似乎吸引了他们的注意？'
- en: 'Image Types (e.g., photos, illustrations, memes, infographics):'
  id: totrans-92
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 图像类型（例如，照片、插图、表情包、信息图表）：
- en: Color Palettes (e.g., bright, muted,
  id: totrans-93
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 色彩搭配（例如，明亮、柔和、
- en: professional)
  id: totrans-94
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 专业）
- en: 'Overall Style (e.g., modern, vintage, minimalist, bold, artistic):'
  id: totrans-95
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**整体风格（例如，现代、复古、极简、大胆、艺术）：**'
- en: '**What Visuals are Turn-offs:** Are there any visual styles or types of imagery
    that might alienate your ideal reader? *Your Answer:*'
  id: totrans-96
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**哪些视觉元素是禁忌：** 有哪些视觉风格或图像类型可能会使你的理想读者感到疏远？*你的答案：*'
- en: '**Visual Preference Summary:** Based on the above, summarize the likely visual
    preferences of your target audience in a few sentences. What kind of look and
    feel should your marketing visuals aim for? *Your Answer:*'
  id: totrans-97
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**视觉偏好总结：** 根据上述内容，用几句话总结你目标受众可能的视觉偏好。你的营销视觉应该追求什么样的外观和感觉？*你的答案：*'
- en: '**Challenge Activity Prep:** Understanding your audience''s visual language
    helps you tailor your AI prompts for maximum impact. Consider these preferences
    when crafting prompts in later modules.'
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: '**挑战活动准备：** 理解受众的视觉语言有助于你为最大影响调整你的AI提示。在后续模块中制作提示时，考虑这些偏好。'
- en: '![](Image00003.jpg)'
  id: totrans-99
  prefs: []
  type: TYPE_IMG
  zh: '![](Image00003.jpg)'
- en: 2 MASTERING THE PROMPTING CONVERSATION
  id: totrans-100
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 2 精通提示对话
- en: This module focuses on translating your visual ideas into effective prompts
    for ChatGPT 4o, building on the techniques discussed in Chapters 2 and 3 of "The
    ChatGPT AI Art Advantage for Authors."
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 本模块侧重于将你的视觉想法转化为有效的ChatGPT 4o提示，基于《作者ChatGPT AI艺术优势》第二章和第三章中讨论的技术。
- en: 'EXERCISE 2.1: ANALYZING PROMPTS FROM THE BOOK'
  id: totrans-102
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: EXERCISE 2.1：分析书中的提示
- en: '**Objective:** To deconstruct the example prompts provided in the book to understand
    the function of each component.'
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: '**目标：** 通过分解书中提供的示例提示来理解每个组件的功能。'
- en: '**Reference:** Revisit the prompt examples in Chapter 3 of the book (e.g.,
    the senior author, the weight loss walker, the ebook cover).'
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: '**参考：** 回顾书中第三章的提示示例（例如，资深作者、减肥的行人、电子书封面）。'
- en: '**Instructions:** Choose one of the detailed prompts from Chapter 3.'
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: '**说明：** 从第三章中选择一个详细的提示。'
- en: Break it down into its core components using the structure mentioned in the
    book (or identify the key elements yourself).
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 使用书中提到的结构（或自己识别关键元素）将其分解为其核心组件。
- en: '**Selected Prompt from Book:**'
  id: totrans-107
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**书中选择的提示：**'
- en: '**Prompt Breakdown:**'
  id: totrans-108
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**提示分解：**'
- en: 'Subject(s):'
  id: totrans-109
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 主题：
- en: 'Action(s):'
  id: totrans-110
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 动作：
- en: 'Setting/Background:'
  id: totrans-111
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 场景/背景：
- en: 'Key Objects:'
  id: totrans-112
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 关键物体：
- en: 'Emotion/Mood:'
  id: totrans-113
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 情感/氛围：
- en: 'Style/Artistic Direction:'
  id: totrans-114
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 风格/艺术方向：
- en: 'Lighting/Atmosphere:'
  id: totrans-115
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 光照/氛围：
- en: 'Camera Angle/Composition (if specified):'
  id: totrans-116
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 摄像机角度/构图（如果指定）：
- en: 'Other Details:'
  id: totrans-117
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 其他细节：
- en: '**Reflection:** What makes this prompt effective? How does each component contribute
    to the final image described in the book?'
  id: totrans-118
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**反思：** 这个提示为什么有效？每个组件是如何贡献到书中描述的最终图像的？'
- en: 'EXERCISE 2.2: CRAFTING BASIC PROMPTS FOR THE THEMES OF YOUR OWN BOOK'
  id: totrans-119
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: EXERCISE 2.2：为你的书籍主题制作基本提示
- en: '**Objective:** To practice writing initial prompts based on the keywords and
    core message identified in Module 1.'
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: '**目标：** 练习根据模块1中确定的关键词和核心信息编写初始提示。'
- en: '**Reference:** Use your answers from Exercise 1.1 (Core Message & Keywords)
    and the prompt structure discussed in Chapter 3 of the book.'
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: '**参考：** 使用你在练习1.1中的答案（核心信息与关键词）和书中第三章讨论的提示结构。'
- en: '**Instructions:**'
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: '**说明：**'
- en: '**Select a Core Theme:** Choose one of the key themes you identified for your
    book in Exercise 1.1\. *Selected Theme:*'
  id: totrans-123
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**选择核心主题：** 从练习1.1中为你的书籍确定的一个关键主题中选择一个。*选择的主题：*'
- en: '**Select Keywords:** Pick 3-5 relevant visual keywords you brainstormed for
    this theme. *Keywords:*'
  id: totrans-124
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**选择关键词：** 从这个主题中挑选3-5个相关的视觉关键词。*关键词：*'
- en: '**Draft a Basic Prompt:** Combine your keywords with essential elements (subject,
    action, setting) to create a simple, clear prompt for ChatGPT 4o. Aim for a descriptive
    sentence. *Initial Prompt Draft:*'
  id: totrans-125
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**起草基本提示：** 将你的关键词与基本元素（主题、动作、场景）结合，为ChatGPT 4o创建一个简单、清晰的提示。目标是描述性句子。*初始提示草案：*'
- en: '**Generate the Image:** Input your prompt into ChatGPT 4o. *(Optional: Paste
    or describe the resulting image here)*'
  id: totrans-126
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**生成图像：** 将你的提示输入到ChatGPT 4o中。*(可选：粘贴或描述生成的图像)*'
- en: '**Repeat:** Draft basic prompts for at least two other themes/keyword sets
    from Exercise 1.1.'
  id: totrans-127
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**重复：** 为至少两个其他主题/关键词集从练习1.1中起草基本提示。'
- en: '**Challenge Activity Prep:** Bring your drafted prompts and generated images
    (if any) to the Prompt Crafting Workshop.'
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: '**挑战活动准备：** 带上你起草的提示和生成的图像（如果有）参加提示制作研讨会。'
- en: 'EXERCISE 2.3: EXPERIMENTING WITH STYLE KEYWORDS'
  id: totrans-129
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: EXERCISE 2.3：使用风格关键词进行实验
- en: '**Objective:** To explore how adding style keywords can dramatically change
    the look and feel of an AI-generated image.'
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: '**目标：** 探索添加风格关键词如何显著改变AI生成图像的外观和感觉。'
- en: '**Reference:** Consider the different visual styles possible (*photorealistic,
    illustration, watercolor, cartoon, minimalist, vintage* ,).'
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: '**参考：** 考虑不同的视觉风格可能性（*逼真、插画、水彩、卡通、极简、复古*）。'
- en: '**Instructions:**'
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: '**说明：**'
- en: '**Choose a Basic Prompt:** Select one of the prompts you drafted in Exercise
    2.2 (or use a simple new one like "A cat sitting on a stack of books"). *Base
    Prompt:*'
  id: totrans-133
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**选择基本提示：** 从练习2.2中选择的提示之一（或使用一个简单的新提示，如“一只猫坐在一堆书上”）。*基础提示：*'
- en: '**Generate Base Image:** Input the base prompt into ChatGPT 4o. *(Optional:
    Note the result)*'
  id: totrans-134
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**生成基础图像：** 将基础提示输入到ChatGPT 4o中。*(可选：注意结果)*'
- en: '**Add Style Keywords:** Generate new images by adding different style keywords
    to your base prompt. Try at least 3 different styles.'
  id: totrans-135
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**添加风格关键词：** 通过向基本提示中添加不同的风格关键词来生成新图像。尝试至少 3 种不同的风格。'
- en: 'Prompt + Style 1 (e.g., "... in a photorealistic style"):'
  id: totrans-136
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '提示 + 风格 1（例如，"..." 以逼真风格呈现）:'
- en: 'Prompt + Style 2 (e.g., "... as a watercolor illustration"):'
  id: totrans-137
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '提示 + 风格 2（例如，"..." 作为水彩插画）:'
- en: 'Prompt + Style 3 (e.g., "... in a vintage cartoon style"):'
  id: totrans-138
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '提示 + 风格 3（例如，"..." 以复古卡通风格呈现）:'
- en: '**Observe the Differences:** How did the style keywords change the output?
    Which styles might be suitable for your author brand and target audience (refer
    back to Exercise 1.2)?'
  id: totrans-139
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**观察差异：** 风格关键词如何改变了输出？哪些风格可能适合你的作者品牌和目标受众（参考练习 1.2）？'
- en: '**Challenge Activity Prep:** Understanding style keywords is crucial for controlling
    the aesthetic of your visuals.'
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: '**挑战活动准备：** 理解风格关键词对于控制你的视觉美学至关重要。'
- en: Which styles worked best for your prompts?
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 哪些风格对你的提示最有效？
- en: '![](Image00004.jpg)'
  id: totrans-142
  prefs: []
  type: TYPE_IMG
  zh: '![](Image00004.jpg)'
- en: 3 ITERATION AND REFINEMENT TECHNIQUES
  id: totrans-143
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 3 迭代和细化技术
- en: In this module you will refine AI-generated images using ChatGPT 4o's conversational
    abilities, building on the examples from Chapter 3 of "The ChatGPT AI Art Advantage
    for Authors."
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 在本模块中，你将利用 ChatGPT 4o 的对话能力细化 AI 生成的图像，基于《作者用 ChatGPT AI 艺术优势》第 3 章的示例。
- en: 'EXERCISE 3.1: REFINING A PROVIDED IMAGE (GUIDED EXAMPLE)'
  id: totrans-145
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 练习 3.1：细化提供的图像（引导示例）
- en: '**Objective:** To practice common refinement techniques by modifying a starting
    image step-by-step.'
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: '**目标：** 通过逐步修改起始图像来练习常见的细化技术。'
- en: '**Reference:** Recall the iterative process shown in Chapter 3 where the senior
    author image was modified.'
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: '**参考：** 回忆第 3 章中展示的迭代过程，其中高级作者图像被修改。'
- en: '**Instructions:**'
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: '**说明：**'
- en: '**1\. Starting Prompt:** Use ChatGPT 4o to generate an image with the following
    prompt:'
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: '**1. 起始提示：** 使用 ChatGPT 4o 生成以下提示的图像：'
- en: '*Create an image of a cozy reading nook with a comfortable armchair, a small
    side table with a steaming mug, and a bookshelf filled with colourful books. Make
    it evening time with warm lamplight.*'
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: '*创建一个舒适的阅读角落图像，包括一个舒适的扶手椅、一张小侧桌、一个冒着热气的杯子，以及一个摆满彩色书籍的书架。让它成为晚上，有温暖的灯光。*'
- en: Generate the image and observe the result
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 生成图像并观察结果
- en: 'Notes:'
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 备注：
- en: '**Refinement 1 (Adding Detail):** Ask ChatGPT to modify the image, with the
    following prompt:'
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: '**细化 1（添加细节）：** 使用以下提示让 ChatGPT 修改图像：'
- en: '*Add a sleeping cat curled up on the armchair.*'
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: '*添加一只蜷缩在扶手椅上的睡猫。*'
- en: Generate the image and observe the result
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 生成图像并观察结果
- en: 'Notes: Did it integrate the cat naturally?'
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 备注：它是否自然地融合了猫？
- en: '**Refinement 2 (Changing Style/Mood):** Now, ask, with the following prompt'
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: '**细化 2（改变风格/情绪）：** 现在，使用以下提示'
- en: '*Change the style to a slightly more whimsical illustration style, less photorealistic.*'
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: '*将风格改为稍微更富有想象力的插画风格，不太逼真。*'
- en: Generate the image and observe the result
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 生成图像并观察结果
- en: Note - Observe the style shift. Did it retain the core elements?
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 注意 - 观察风格变化。它是否保留了核心元素？
- en: '**Refinement 3 (Correcting Elements):** Let''s pretend the mug looks wrong.
    Ask, with the following prompt:'
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: '**细化 3（纠正元素）：** 假设杯子看起来不正确。使用以下提示：'
- en: '*Make the mug on the side table a bright red color and ensure it looks like
    it''s made of ceramic.*'
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: '*将侧桌上的杯子改为鲜艳的红色，并确保它看起来是由陶瓷制成的。*'
- en: Generate the image and observe the result
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 生成图像并观察结果
- en: 'Note: *Was the specific correction accurate?*'
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 备注：*具体的纠正是否准确？*
- en: '**Reflection:** How did the conversational prompts allow you to guide the image
    generation? What challenges did you encounter, if any?'
  id: totrans-165
