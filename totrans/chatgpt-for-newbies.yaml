  id: totrans-865
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 扩张的初始资本投资限制为500,000美元。
- en: Market saturation may slow growth after Year 2.
  id: totrans-866
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 第二年后，市场饱和可能减缓增长。
- en: '| • | Additional Considerations: |'
  id: totrans-867
  prefs: []
  type: TYPE_TB
  zh: '| • | 其他考虑因素：'
