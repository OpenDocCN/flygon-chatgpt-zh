- en: Cluster 1\. ChatGPT and Academic Integrity
  id: totrans-932
  prefs: []
  type: TYPE_NORMAL
  zh: 第1组. ChatGPT与学术诚信
- en: The studies in this first cluster primarily focus on how ChatGPT influences
    knowledge assessment and academic integrity. Topics in this group encompass the
    challenges of upholding academic integrity in a society where ChatGPT and other
    AI-enabled tools are widely utilized, the ramifications of large language models
    in the context of medical education and knowledge assessment, the connection between
    chatbots, plagiarism, and AI in higher education, and academic integrity concerns
    associated with large AI language models in the post-pandemic era.
  id: totrans-933
  prefs: []
  type: TYPE_NORMAL
  zh: 本集群中的研究主要关注ChatGPT如何影响知识评估和学术诚信。本组主题包括在ChatGPT和其他AI工具广泛使用的社会中维护学术诚信的挑战，大型语言模型在医学教育和知识评估背景下的影响，聊天机器人、剽窃和高等教育中AI之间的联系，以及后疫情时代大型AI语言模型相关的学术诚信问题。
- en: Cluster 2\. Education’s Opportunities and Challenges
  id: totrans-934
  prefs: []
  type: TYPE_NORMAL
  zh: 集群 2：教育的机遇与挑战
- en: The studies in this second cluster investigate the pros and cons of employing
    large language models, particularly ChatGPT, in educational settings. Some research
    explores the specific applications of ChatGPT in these contexts. In contrast,
    others delve into large language models’ potential benefits and challenges, questioning
    whether ChatGPT benefits education. Additionally, this cluster examines the utilization
    of chatbots in education, emphasizing their role as educational aids, using ChatGPT
    as a case study. It also assesses educators’ current state of AI technology adoption
    through a systematic review of applied research in higher education.
  id: totrans-935
  prefs: []
  type: TYPE_NORMAL
  zh: 本集群中的研究调查了在教育环境中使用大型语言模型，特别是ChatGPT的利弊。一些研究探讨了ChatGPT在这些环境中的具体应用。相比之下，其他研究深入探讨了大型语言模型的潜在利益和挑战，质疑ChatGPT是否对教育有益。此外，本集群还考察了聊天机器人在教育中的使用，强调其作为教育辅助工具的作用，并以ChatGPT作为案例研究。它还通过系统回顾高等教育中的应用研究，评估了教育工作者对AI技术的当前采用状态。
- en: Cluster 3\. Research and Multidisciplinary Perspectives
  id: totrans-936
  prefs: []
  type: TYPE_NORMAL
  zh: 集群 3：研究和多学科视角
- en: The articles in the third cluster explore the functionality of ChatGPT in research
    and offer interdisciplinary perspectives on how to use it. More specifically,
    the potential of ChatGPT in financial research is considered in this cluster.
    A comprehensive overview of generative conversational AI in research, practice,
    and policy is also studied alongside these technologies’ ramifications, difficulties,
    and prospects. Finally, the remaining theme in this cluster is the use of open
    AI platforms in nursing education, including the risks associated with their improper
    use and their potential as tools for academic advancement.
  id: totrans-937
  prefs: []
  type: TYPE_NORMAL
  zh: 第三集群中的文章探讨了ChatGPT在研究中的功能，并提供了跨学科视角，说明了如何使用它。更具体地说，本集群考虑了ChatGPT在金融研究中的潜力。同时研究了生成式对话AI在研究、实践和政策中的全面概述，以及这些技术的副作用、困难和前景。最后，本集群的剩余主题是开放AI平台在护理教育中的应用，包括其不当使用的风险以及作为学术进步工具的潜力。
