  type: TYPE_NORMAL
  zh: '**4.**满意（4）：所有年龄组的大多数受访者都属于“满意”类别，25-34岁年龄组的计数最高。'
- en: '**5.**Very satisfied (5): The proportion of respondents who are very satisfied
    is fairly consistent across all age groups, with slightly higher counts in the
    younger age groups (Under 25 and 25-34).'
  id: totrans-2223
  prefs: []
  type: TYPE_NORMAL
  zh: '**5.**非常满意（5）：非常满意的受访者在所有年龄组中的比例相对一致，在年轻年龄组（25岁以下和25-34岁）中略有较高。'
- en: Conclusion
  id: totrans-2224
  prefs: []
  type: TYPE_NORMAL
  zh: 结论
- en: Overall satisfaction with the SFO airport appears to vary somewhat by age group.
    The majority of respondents in all age groups are “Satisfied” (4), with the highest
    satisfaction in the 25-34 age group. The chi-squared test results (p-value = 0.0035)
    indicate that there is a statistically significant association between age and
    overall satisfaction, suggesting that while satisfaction levels are broadly similar,
    there are differences in how various age groups rate their satisfaction.
  id: totrans-2225
  prefs: []
  type: TYPE_NORMAL
  zh: 对旧金山国际机场的整体满意度似乎因年龄组而异。所有年龄组的大多数受访者都表示“满意”（4），25-34岁年龄组的满意度最高。卡方检验结果（p值=0.0035）表明，年龄与整体满意度之间存在统计学上的显著关联，这表明尽管满意度水平总体相似，但不同年龄组对其满意度的评价存在差异。
- en: CHAPTER 14
  id: totrans-2226
  prefs: []
  type: TYPE_NORMAL
  zh: 第14章
- en: A/B TESTING
  id: totrans-2227
  prefs: []
  type: TYPE_NORMAL
  zh: A/B测试
- en: '![image](images/pg335.jpg)'
  id: totrans-2228
  prefs: []
  type: TYPE_IMG
  zh: '![图片](images/pg335.jpg)'
- en: A/B testing, also known as split testing, is a powerful and widely-used method
    in data analysis and digital marketing. This chapter introduces you to the fundamental
    concepts, techniques, and applications of A/B testing, a crucial tool for making
    data-driven decisions in various business contexts.
  id: totrans-2229
  prefs: []
  type: TYPE_NORMAL
  zh: A/B测试，也称为拆分测试，是数据分析与数字营销中一种强大且广泛使用的方法。本章向您介绍了A/B测试的基本概念、技术和应用，这是在各种商业环境中做出数据驱动决策的关键工具。
- en: A/B testing is a comparative experiment where two versions of a single variable
    are tested against each other to determine which performs better. Version A is
    typically the “control” or current version, while version B is the “variation”
    or new version being tested. This method allows businesses to make informed decisions
    about changes to their products, Web sites, marketing campaigns, or any other
    aspect of their operations based on statistical evidence rather than intuition
    or guesswork.
  id: totrans-2230
  prefs: []
  type: TYPE_NORMAL
  zh: A/B 测试是一种比较实验，其中测试单个变量的两个版本相互比较，以确定哪个表现更好。版本 A 通常是指“控制”或当前版本，而版本 B 是指“变体”或正在测试的新版本。这种方法允许企业根据统计证据而非直觉或猜测，基于对产品、网站、营销活动或其运营任何其他方面的变化做出明智的决策。
- en: The applications of A/B testing are vast and varied. In digital marketing, it
    is commonly used to optimize Web site designs, email campaigns, and advertisement
    layouts. Product managers use A/B tests to evaluate new features or user interface
    changes. Even in fields like health care and education, A/B testing can be employed
    to assess the effectiveness of different interventions or teaching methods.
  id: totrans-2231
  prefs: []
  type: TYPE_NORMAL
  zh: A/B 测试的应用范围广泛且多样化。在数字营销中，它通常用于优化网站设计、电子邮件营销活动和广告布局。产品经理使用 A/B 测试来评估新功能或用户界面更改。即使在医疗保健和教育等领域，A/B
    测试也可以用于评估不同干预措施或教学方法的有效性。
- en: This chapter guides you through the essential elements of A/B testing, including
    hypothesis formulation, test design, data collection, and statistical analysis.
    You will learn how to set up an A/B test, choose appropriate metrics, determine
    sample sizes, and interpret results. We explore the concept of statistical significance
    and how it relates to making confident decisions based on your test outcomes.
  id: totrans-2232
  prefs: []
  type: TYPE_NORMAL
  zh: 本章将引导您了解 A/B 测试的基本要素，包括假设制定、测试设计、数据收集和统计分析。您将学习如何设置 A/B 测试、选择合适的指标、确定样本大小以及解读结果。我们将探讨统计显著性这一概念及其与基于测试结果做出自信决策的关系。
- en: One of the key advantages of A/B testing is its ability to provide clear, quantifiable
    results. By comparing the performance metrics of two versions, businesses can
    make data-driven decisions that can significantly impact their bottom line. It
    is crucial to understand the limitations and potential pitfalls of A/B testing,
    as well. This chapter addresses common challenges such as determining appropriate
    test durations, avoiding common biases, and dealing with inconclusive results.
  id: totrans-2233
  prefs: []
  type: TYPE_NORMAL
  zh: A/B 测试的一个关键优势是它能够提供清晰、可量化的结果。通过比较两个版本的性能指标，企业可以做出基于数据的决策，这可能会对其底线产生重大影响。同时，了解
    A/B 测试的限制和潜在陷阱也至关重要。本章将解决常见的挑战，例如确定适当的测试持续时间、避免常见偏差以及处理不明确的结果。
- en: We also discuss more advanced concepts like multivariate testing, which allows
    for testing multiple variables simultaneously, and sequential testing, which can
    help optimize resource allocation in testing processes. You will gain insights
    into how to integrate A/B testing into a broader culture of experimentation and
    continuous improvement within an organization.
  id: totrans-2234
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还讨论了更高级的概念，如多变量测试，它允许同时测试多个变量，以及顺序测试，它可以帮助优化测试过程中的资源分配。您将深入了解如何将 A/B 测试整合到组织更广泛的实验和持续改进文化中。
- en: There are real-world examples and case studies that illustrate the practical
    application of A/B testing across various industries throughout the chapter. These
    examples demonstrate how even small changes, when validated through A/B testing,
    can lead to significant improvements in key performance indicators such as conversion
    rates, user engagement, or customer satisfaction.
  id: totrans-2235
  prefs: []
  type: TYPE_NORMAL
  zh: 本章中包含真实世界的例子和案例研究，展示了 A/B 测试在各个行业中的实际应用。这些例子表明，即使通过 A/B 测试验证的小幅变化，也能在关键性能指标（如转化率、用户参与度或客户满意度）上带来显著的改进。
- en: By the end of this chapter, you will have a comprehensive understanding of how
    to leverage A/B testing to make more informed, data-driven decisions. You will
    be equipped with the knowledge to design, implement, and analyze A/B tests effectively,
    as well as interpret and act on the results. This skill set is invaluable in today’s
    data-rich business environment, where the ability to extract actionable insights
    from data can provide a significant competitive advantage.
  id: totrans-2236
  prefs: []
  type: TYPE_NORMAL
  zh: 到本章结束时，你将全面了解如何利用A/B测试做出更明智、基于数据的决策。你将具备设计、实施和分析A/B测试的有效知识，以及解读和采取行动的结果。在当今数据丰富的商业环境中，这种技能组合非常有价值，因为从数据中提取可操作的见解可以提供显著的竞争优势。
- en: Whether you are a marketer looking to optimize campaign performance, a product
    manager aiming to improve user experience, or a business analyst seeking to drive
    growth through data-driven decision-making, mastering A/B testing is a valuable
    addition to your analytical toolkit.
  id: totrans-2237
  prefs: []
  type: TYPE_NORMAL
  zh: 无论你是希望优化活动性能的市场营销人员，还是希望提升用户体验的产品经理，或者是寻求通过基于数据的决策推动增长的商业分析师，掌握A/B测试都是你分析工具箱中的一个宝贵补充。
- en: 'This technique answers the following business question: “Is there a significant
    difference between the outcomes when testing two versions of a proposed change?”'
  id: totrans-2238
  prefs: []
  type: TYPE_NORMAL
  zh: 这种技术回答了以下商业问题：“测试两个版本的提议变更时，结果之间是否存在显著差异？”
- en: A/B Testing
  id: totrans-2239
  prefs: []
  type: TYPE_NORMAL
  zh: A/B Testing
- en: What is A/B Testing?
  id: totrans-2240
  prefs: []
  type: TYPE_NORMAL
  zh: 什么是A/B测试？
- en: A/B testing (or split testing) is used in data analysis and marketing to compare
    two versions of a product, Web page, or marketing element to determine which performs
    better. This technique is widely used in digital marketing, user experience design,
    and product development to make data-driven decisions and optimize performance.
  id: totrans-2241
  prefs: []
  type: TYPE_NORMAL
  zh: A/B测试（或拆分测试）在数据分析和市场营销中用于比较两个版本的产品、网页或营销元素，以确定哪个表现更好。这种技术在数字营销、用户体验设计和产品开发中广泛使用，以做出基于数据的决策并优化性能。
- en: 'The basic premise of A/B testing is simple: create two versions of something
    (version A and version B), show each version to a different subset of your audience,
    and measure which version performs better according to your defined metrics. These
    metrics could include click-through rates, conversion rates, time spent on page,
    or any other relevant performance indicators.'
  id: totrans-2242
  prefs: []
  type: TYPE_NORMAL
  zh: A/B测试的基本前提很简单：创建两个版本的某个东西（版本A和版本B），向你的受众的不同子集展示每个版本，并根据你定义的指标衡量哪个版本表现更好。这些指标可能包括点击率、转化率、页面停留时间或任何其他相关的性能指标。
- en: A/B testing is typically used when businesses want to optimize Web site or app
    designs, improve email marketing campaigns, refine product features, enhance user
    experience, or increase conversion rates and sales. It provides a systematic way
    to test hypotheses and make improvements based on actual user behavior rather
    than assumptions.
  id: totrans-2243
  prefs: []
  type: TYPE_NORMAL
  zh: A/B测试通常用于企业想要优化网站或应用设计、改进电子邮件营销活动、完善产品功能、提升用户体验或提高转化率和销售额时。它提供了一种系统的方法来测试假设，并根据实际用户行为而不是假设进行改进。
- en: 'To conduct an A/B test, you first identify the element you want to test, such
    as a button color, headline, or page layout. You then create two versions: the
    control (current version) and the variant. Your audience is randomly split into
    two groups, with one group shown version A and the other shown version B. Data
    is collected on how each version performs, and the results are analyzed to determine
    if there’s a statistically significant difference. If one version clearly outperforms
    the other, it can be implemented as the new standard.'
  id: totrans-2244
  prefs: []
  type: TYPE_NORMAL
  zh: 要进行A/B测试，首先确定你想要测试的元素，例如按钮颜色、标题或页面布局。然后创建两个版本：控制版（当前版本）和变体版。你的受众被随机分成两组，一组展示版本A，另一组展示版本B。收集每个版本的表现数据，并分析结果以确定是否存在统计学上的显著差异。如果某个版本明显优于另一个版本，它可以被实施为新的标准。
- en: It is crucial to test only one element at a time to ensure you can attribute
    any performance differences to that specific change. Additionally, your sample
    size should be large enough and your test should run long enough to produce statistically
    significant results. A/B testing is not a one-time effort but an ongoing process.
    Businesses often run multiple tests over time to continually refine and improve
    their digital assets and marketing strategies based on empirical data rather than
    guesswork or intuition.
  id: totrans-2245
  prefs: []
  type: TYPE_NORMAL
  zh: 确保一次只测试一个元素至关重要，以确保你可以将任何性能差异归因于那个特定的改变。此外，你的样本量应该足够大，你的测试应该运行足够长，以产生具有统计显著性的结果。A/B测试不是一次性的努力，而是一个持续的过程。企业通常会随着时间的推移进行多次测试，以不断改进他们的数字资产和营销策略，而不是基于猜测或直觉。
- en: What are the Elements of A/B Testing?
  id: totrans-2246
  prefs: []
  type: TYPE_NORMAL
  zh: A/B测试的要素是什么？
- en: The elements of A/B testing form the foundation for conducting effective experiments
    and deriving meaningful insights. Understanding these components is crucial for
    anyone looking to implement A/B testing in their data analysis or marketing strategies.
  id: totrans-2247
  prefs: []
  type: TYPE_NORMAL
  zh: A/B测试的要素构成了进行有效实验和得出有意义的见解的基础。理解这些组成部分对于任何想要在他们的数据分析或营销策略中实施A/B测试的人来说至关重要。
- en: '**1.**Hypothesis: Every A/B test begins with a clear hypothesis. This is a
    statement that predicts how a change in a specific element will affect user behavior
    or performance metrics. For example, “Changing the color of the ‘Buy Now’ button
    from blue to green will increase click-through rates by 10%.”'
  id: totrans-2248
  prefs: []
  type: TYPE_NORMAL
  zh: '**1.**假设：每个A/B测试都以一个明确的假设开始。这是一个预测特定元素的变化将如何影响用户行为或性能指标的陈述。例如，“将‘立即购买’按钮的颜色从蓝色改为绿色将使点击率增加10%。”'
- en: '**2.**Variables: In A/B testing, you have two types of variables:'
  id: totrans-2249
  prefs: []
  type: TYPE_NORMAL
  zh: '**2.**变量：在A/B测试中，你有两种类型的变量：'
- en: '**a.**independent variable: the element you are changing (e.g., button color)'
  id: totrans-2250
  prefs: []
  type: TYPE_NORMAL
  zh: '**a.**自变量：你正在改变的因素（例如，按钮颜色）'
- en: '**b.**dependent variable: the metric you are measuring (e.g., click-through
    rate)'
  id: totrans-2251
  prefs: []
  type: TYPE_NORMAL
  zh: '**b.**因变量：你正在测量的指标（例如，点击率）'
- en: '**3.**Control and variant: These are the two versions you are testing:'
  id: totrans-2252
  prefs: []
  type: TYPE_NORMAL
  zh: '**3.**控制组和变体：这是你要测试的两个版本：'
- en: '**a.**control: the original version (A)'
  id: totrans-2253
  prefs: []
  type: TYPE_NORMAL
  zh: '**a.**控制组：原始版本（A）'
- en: '**b.**variant: the modified version (B)'
  id: totrans-2254
  prefs: []
  type: TYPE_NORMAL
  zh: '**b.**变体：修改后的版本（B）'
- en: '**4.**Sample groups: Your audience is divided into two random, equally sized
    groups. Each group is shown one version of the test.'
  id: totrans-2255
  prefs: []
  type: TYPE_NORMAL
  zh: '**4.**样本组：你的受众被分成两个随机、大小相等的组。每个组都展示测试的一个版本。'
- en: '**5.**Sample size: This is the number of participants in your test. A larger
    sample size generally leads to more reliable results.'
  id: totrans-2256
  prefs: []
  type: TYPE_NORMAL
  zh: '**5.**样本量：这是你测试中的参与者数量。较大的样本量通常会导致更可靠的结果。'
- en: '**6.**Duration: The length of time your test runs. This should be long enough
    to gather sufficient data but not so long that external factors might influence
    results.'
  id: totrans-2257
  prefs: []
  type: TYPE_NORMAL
  zh: '**6.**持续时间：你的测试运行的长度。这应该足够长，以便收集足够的数据，但又不至于太长，以至于外部因素可能会影响结果。'
- en: '**7.**Metrics: These are the quantifiable measures you use to determine which
    version performs better. Common metrics include conversion rates, click-through
    rates, time on page, and bounce rates.'
  id: totrans-2258
  prefs: []
  type: TYPE_NORMAL
  zh: '**7.**指标：这些是你用来确定哪个版本表现更好的可量化措施。常见的指标包括转化率、点击率、页面停留时间和跳出率。'
- en: '**8.**Statistical significance: This indicates whether the difference in performance
    between A and B is due to the change you made or just random chance. A commonly
    used threshold is 95% confidence.'
  id: totrans-2259
  prefs: []
  type: TYPE_NORMAL
  zh: '**8.**统计显著性：这表明A和B之间性能差异是由于你做出的改变还是仅仅随机机会。常用的阈值是95%的置信度。'
- en: '**9.**Segmentation: This involves analyzing results for different subgroups
    within your sample, such as new vs. returning visitors or desktop vs. mobile users.'
  id: totrans-2260
  prefs: []
  type: TYPE_NORMAL
  zh: '**9.**细分：这涉及到分析样本中不同子组的结果，例如新访客与回头客或桌面用户与移动用户。'
- en: '**10.**Multivariate testing: An advanced form of A/B testing where multiple
    variables are tested simultaneously.'
  id: totrans-2261
  prefs: []
  type: TYPE_NORMAL
  zh: '**10.**多变量测试：一种更高级的A/B测试形式，其中同时测试多个变量。'
- en: By carefully considering and implementing these elements, you can conduct robust
    A/B tests that provide valuable insights for data-driven decision making. Remember
    that A/B testing is not just about finding a “winner,” but about learning more
    about your audience and continuously improving your digital assets or marketing
    strategies. Each test, whether it confirms or refutes your hypothesis, provides
    valuable information that can guide future optimizations and experiments.
  id: totrans-2262
  prefs: []
  type: TYPE_NORMAL
  zh: 通过仔细考虑和实施这些要素，您可以进行稳健的 A/B 测试，为数据驱动决策提供有价值的见解。请记住，A/B 测试不仅仅是寻找“赢家”，更是为了更了解您的受众，并持续改进您的数字资产或营销策略。每次测试，无论它证实还是反驳了您的假设，都能提供有价值的信息，可以指导未来的优化和实验。
- en: 'Example Case Study: An E-commerce Button Color Test'
  id: totrans-2263
  prefs: []
  type: TYPE_NORMAL
  zh: 示例案例研究：电子商务按钮颜色测试
- en: 'Background: An online retailer, ShopEasy, wants to improve the conversion rate
    on their product pages. They hypothesize that changing the “Add to Cart” button
    color from blue to orange will increase click-through rates. They decide to run
    an A/B test to validate this hypothesis.'
  id: totrans-2264
  prefs: []
  type: TYPE_NORMAL
  zh: 背景：在线零售商 ShopEasy 希望提高其产品页面上的转化率。他们假设将“添加到购物车”按钮的颜色从蓝色改为橙色将提高点击通过率。他们决定运行 A/B
    测试来验证这一假设。
- en: 'Hypothesis: Changing the “Add to Cart” button color from blue (Control - A)
    to orange (Variant - B) will increase the click-through rate by at least 5%.'
  id: totrans-2265
  prefs: []
  type: TYPE_NORMAL
  zh: 假设：将“添加到购物车”按钮的颜色从蓝色（控制组 - A）改为橙色（变体 - B）将至少提高点击通过率 5%。
- en: 'Test Setup:'
  id: totrans-2266
  prefs: []
  type: TYPE_NORMAL
  zh: 测试设置：
- en: '• duration: 2 weeks'
  id: totrans-2267
  prefs: []
  type: TYPE_NORMAL
  zh: • 持续时间：2 周
- en: '• sample size: 20,000 visitors (10,000 per variant)'
  id: totrans-2268
  prefs: []
  type: TYPE_NORMAL
  zh: • 样本量：20,000 名访客（每个变体 10,000 名）
- en: '• metric: click-through rate (CTR) on the “Add to Cart” button'
  id: totrans-2269
  prefs: []
  type: TYPE_NORMAL
  zh: • 指标：在“添加到购物车”按钮上的点击通过率（CTR）
- en: 'Results: Here is the cross tabulation of the collected data:'
  id: totrans-2270
  prefs: []
  type: TYPE_NORMAL
  zh: 结果：以下是收集到的数据的交叉表：
- en: TABLE 14.1 Results of the A/B testing
  id: totrans-2271
  prefs: []
  type: TYPE_NORMAL
  zh: 表 14.1 A/B 测试结果
- en: '![image](images/pg341.jpg)'
  id: totrans-2272
  prefs: []
  type: TYPE_IMG
  zh: '![图片](images/pg341.jpg)'
- en: 'Analysis:'
  id: totrans-2273
  prefs: []
  type: TYPE_NORMAL
  zh: 分析：
- en: '**1.**Absolute difference: The orange button (B) had a 1 percentage point higher
    CTR than the blue button (A).'
  id: totrans-2274
  prefs: []
  type: TYPE_NORMAL
  zh: '**1.**绝对差异：橙色按钮（B）的点击通过率比蓝色按钮（A）高 1 个百分点。'
- en: '**2.**Relative difference: The orange button’s CTR was 20% higher than the
    blue button’s CTR. Calculation: (6.00% - 5.00%) / 5.00% = 20%'
  id: totrans-2275
  prefs: []
  type: TYPE_NORMAL
  zh: '**2.**相对差异：橙色按钮的点击通过率比蓝色按钮的点击通过率高出 20%。计算：(6.00% - 5.00%) / 5.00% = 20%'
- en: '**3.**Statistical significance: Using a chi-square test or z-test for proportions,
    we can calculate the p-value. Assuming the p-value is 0.0023 (which would be calculated
    based on the data), this result is statistically significant at the 95% confidence
    level (as p < 0.05).'
  id: totrans-2276
  prefs: []
  type: TYPE_NORMAL
  zh: '**3.**统计显著性：使用卡方检验或比例的 z 检验，我们可以计算 p 值。假设 p 值为 0.0023（这将基于数据计算得出），此结果在 95%
    的置信水平上具有统计学意义（因为 p < 0.05）。'
- en: '**4.**Confidence interval: The 95% confidence interval for the difference in
    proportions might be 0.4% to 1.6%. This means we can be 95% confident that the
    true difference in CTR is between 0.4 and 1.6 percentage points.'
  id: totrans-2277
  prefs: []
  type: TYPE_NORMAL
  zh: '**4.**置信区间：比例差异的 95% 置信区间可能是 0.4% 到 1.6%。这意味着我们可以有 95% 的信心认为，真实的点击通过率差异在 0.4
    到 1.6 个百分点之间。'
- en: 'Interpretation: The A/B test results show that changing the “Add to Cart” button
    color from blue to orange led to a statistically significant increase in the click-through
    rate. The orange button (Version B) outperformed the blue button (Version A) by
    1 percentage point, which represents a 20% relative increase in CTR. The p-value
    of 0.0023 indicates that there is only a 0.23% chance that we would observe this
    difference (or a more extreme one) if there were no real difference between the
    two button colors.'
  id: totrans-2278
  prefs: []
  type: TYPE_NORMAL
  zh: 解释：A/B 测试结果显示，将“添加到购物车”按钮的颜色从蓝色改为橙色导致了点击通过率的显著增加。橙色按钮（版本 B）的表现优于蓝色按钮（版本 A），高出
    1 个百分点，这代表了点击通过率 20% 的相对增长。p 值为 0.0023 表明，如果没有两种按钮颜色之间的真实差异，我们观察到这种差异（或更极端的差异）的可能性仅为
    0.23%。
- en: 'Conclusion: Based on these results, we can reject the null hypothesis and conclude
    that the orange button does indeed increase the click-through rate. The observed
    increase (20% relative, 1 percentage point absolute) exceeds our hypothesized
    5% improvement.'
  id: totrans-2279
  prefs: []
  type: TYPE_NORMAL
  zh: 结论：基于这些结果，我们可以拒绝零假设，并得出结论，橙色按钮确实提高了点击通过率。观察到的增加（相对 20%，绝对 1 个百分点）超过了我们假设的 5%
    改善。
- en: 'Recommendation: Implement the orange “Add to Cart” button across all product
    pages. However, continue monitoring performance to ensure the positive effect
    persists over time and across different user segments.'
  id: totrans-2280
  prefs: []
  type: TYPE_NORMAL
  zh: 建议：在所有产品页面上实施橙色“添加到购物车”按钮。然而，继续监控性能，以确保积极效果在一段时间内以及不同用户群体中持续存在。
- en: 'Analysis Case 14.1: Design and Analysis of Trials'
  id: totrans-2281
  prefs: []
  type: TYPE_NORMAL
  zh: 分析案例 14.1：试验设计和分析
- en: A/B Test Analysis with Excel
  id: totrans-2282
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 Excel 进行 A/B 测试分析
- en: Using the Case Dataset files provided, find the file TestOfSignificanceForA/BTest.xls.
    Open TestOfSignificanceForA/BTest.xls using Excel.
  id: totrans-2283
  prefs: []
  type: TYPE_NORMAL
  zh: 使用提供的案例数据集文件，找到文件 TestOfSignificanceForA/BTest.xls。使用 Excel 打开 TestOfSignificanceForA/BTest.xls。
- en: Use the chi-squared test to decide which Web page changes to keep. Enter the
    data in the appropriate places in the spreadsheet. Let’s analyze the following
    A/B data ([Figure 14.1](#fig14-1)).
  id: totrans-2284
  prefs: []
  type: TYPE_NORMAL
  zh: 使用卡方检验来决定保留哪些网页更改。在电子表格中适当的位置输入数据。让我们分析以下 A/B 数据（[图 14.1](#fig14-1)）。
- en: 'Consider this case:'
  id: totrans-2285
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑以下案例：
- en: You made a significant change to the Web site (Version A) from the original
    (Version B). In the last three days, there were 2,750 visitors to the Web site,
    with 1,310 using Version A and 1,440 using Version B. Of those using Version A,
    450 yielded positive results. Of those using Version B, 395 yielded positive results.
  id: totrans-2286
  prefs: []
  type: TYPE_NORMAL
  zh: 你对网站（版本 A）进行了重大更改（相对于原始版本 B）。在过去的三天里，网站有 2,750 名访客，其中 1,310 使用版本 A，1,440 使用版本
    B。使用版本 A 的用户中，450 人产生了积极结果。使用版本 B 的用户中，395 人产生了积极结果。
- en: Are you ready to switch to Version A? Why or why not?
  id: totrans-2287
  prefs: []
  type: TYPE_NORMAL
  zh: 你准备好切换到版本 A 吗？为什么或为什么不？
- en: '![image](images/pg343.jpg)'
  id: totrans-2288
  prefs: []
  type: TYPE_IMG
  zh: '![图片](images/pg343.jpg)'
- en: FIGURE 14.1 Steps in using the TestforSignificanceCalculatorFor A/B test calculator
  id: totrans-2289
  prefs: []
  type: TYPE_NORMAL
  zh: 图 14.1 使用 A/B 测试计算器的步骤
- en: 'Analysis Case 14.2: Analysis Using ORDERS'
  id: totrans-2290
  prefs: []
  type: TYPE_NORMAL
  zh: 分析案例 14.2：使用 ORDERS 进行分析
- en: Analysis with Excel
  id: totrans-2291
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 Excel 进行分析
- en: Using the Case Dataset files, find the file ORDERS.xlsx. Open ORDERS.xlsx using
    Excel.
  id: totrans-2292
  prefs: []
  type: TYPE_NORMAL
  zh: 使用案例数据集文件，找到文件 ORDERS.xlsx。使用 Excel 打开 ORDERS.xlsx。
- en: 'We are going to answer this question:'
  id: totrans-2293
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将回答以下问题：
- en: In 2012, a policy was put in place to give bonuses to managers of provincial
    stores that increased the number of profitable orders by 10% in 2011\. Was that
    policy change effective?
  id: totrans-2294
  prefs: []
  type: TYPE_NORMAL
  zh: 2012 年，实施了一项政策，向 2011 年增加 10% 盈利订单的省级商店经理发放奖金。这项政策变更有效吗？
- en: Create a pivot table of the entire ORDERS table ([Figure 14.2](#fig14-2)). Select
    ODERDATE as the rows and group by year. Add PROVINCE under ORDERDATE in the columns
    of the pivot table. Tabulate count of ORDERID to get a count of all the orders
    by year and by province.
  id: totrans-2295
  prefs: []
  type: TYPE_NORMAL
  zh: 创建整个 ORDERS 表的交叉表（[图 14.2](#fig14-2)）。选择 ODERDATE 作为行，按年份分组。在交叉表的列中添加 PROVINCE
    到 ODERDATE 之下。计算 ORDERID 的计数以获取按年份和省份的所有订单的计数。
- en: '![image](images/pg344.jpg)'
  id: totrans-2296
  prefs: []
  type: TYPE_IMG
  zh: '![图片](images/pg344.jpg)'
- en: FIGURE 14.2 The pivot table of the number of orders by year and by province
  id: totrans-2297
  prefs: []
  type: TYPE_NORMAL
  zh: 图 14.2 按年份和省份的订单数量交叉表
- en: Create another pivot table the same way you did in the process above but add
    a “slicer” (found on the pivot table “Format” ribbon) to only show the results
    of PROFIT for each order above 0 (in other words, only count orders that were
    profitable) ([Figure 14.3](#fig14-3)).
  id: totrans-2298
  prefs: []
  type: TYPE_NORMAL
  zh: 以与上述过程相同的方式创建另一个交叉表，但添加一个“切片器”（在交叉表“格式”选项卡上找到）以仅显示每个订单的利润结果（换句话说，仅计算盈利订单）([图
    14.3](#fig14-3))。
- en: '![image](images/pg345.jpg)'
  id: totrans-2299
  prefs: []
  type: TYPE_IMG
  zh: '![图片](images/pg345.jpg)'
- en: FIGURE 14.3 The pivot table of the number of orders by year and by province
    filtered for profitable orders
  id: totrans-2300
  prefs: []
  type: TYPE_NORMAL
  zh: 图 14.3 按年份和省份的订单数量交叉表（仅过滤盈利订单）
- en: Copy and paste both lists side by side as values into another sheet. Compute
    the percent of profitable orders and enter into another contiguous column ([Figure
    14.4](#fig14-4)). In another column, compute the percent difference from one year
    to the next. We are looking for provinces with a difference greater than 10% between
    2012 and 2011.
  id: totrans-2301
  prefs: []
  type: TYPE_NORMAL
  zh: 将两个列表并排复制粘贴到另一个工作表中作为值。计算盈利订单的百分比并将其输入到另一个连续的列中（[图 14.4](#fig14-4)）。在另一列中，计算一年到下一年的百分比差异。我们正在寻找
    2012 年和 2011 年之间差异大于 10% 的省份。
- en: '![image](images/pg346.jpg)'
  id: totrans-2302
  prefs: []
  type: TYPE_IMG
  zh: '![图片](images/pg346.jpg)'
- en: FIGURE 14.4 Computation of the percent difference in orders by province from
    current year (CY) compared to the prior year (PY)
  id: totrans-2303
  prefs: []
  type: TYPE_NORMAL
  zh: 图 14.4 按省份从当前年份（CY）与上一年（PY）相比的订单百分比差异计算
- en: Note that the overall CY-PY difference between 2012 and 2011 is only 2%, and
    Quebec and PEI were the only two that had percent changes greater than 10%. Of
    the two, Quebec is more important since it had ten times more orders than PEI.
  id: totrans-2304
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，2012 年和 2011 年之间的整体 CY-PY 差异仅为 2%，魁北克和 PEI 是唯一两个百分比变化大于 10% 的省份。在这两个中，魁北克更重要，因为它比
    PEI 多十倍订单。
- en: Use the TestForSignificanceofABTest.xlsx worksheet found in the Case Files folder
    to analyze the A/B data ([Figure 14.5](#fig14-5)). Compute the chi-squared statistic
    for the A/B test for overall orders and for Quebec. We see that the change was
    not significant in the case of Quebec. Overall, the 2% change was not significant.
  id: totrans-2305
  prefs: []
  type: TYPE_NORMAL
  zh: 使用位于案例文件夹中的TestForSignificanceofABTest.xlsx工作表分析A/B数据([图14.5](#fig14-5))。计算A/B测试的整体订单和魁北克省的卡方统计量。我们看到在魁北克省的情况下变化并不显著。总体而言，2%的变化并不显著。
- en: '![image](images/pg347.jpg)'
  id: totrans-2306
  prefs: []
  type: TYPE_IMG
  zh: '![图片](images/pg347.jpg)'
- en: FIGURE 14.5 Using A/B testing to test for significance of the CY/PY profit change
    for the province of Quebec
  id: totrans-2307
  prefs: []
  type: TYPE_NORMAL
  zh: 图14.5 使用A/B测试测试魁北克省CY/PY利润变化的显著性
- en: 'Analysis Case 14.3: Analysis Using SFO Airport Survey Data'
  id: totrans-2308
  prefs: []
  type: TYPE_NORMAL
  zh: 分析案例14.3：使用SFO机场调查数据进行分析
- en: Analysis with Excel
  id: totrans-2309
  prefs: []
  type: TYPE_NORMAL
  zh: 使用Excel进行分析
- en: Using the Case Dataset files, find the file 2016_SFO_Customer_Survey_Data.xls.
    Also download the previous year’s data and data dictionary.
  id: totrans-2310
  prefs: []
  type: TYPE_NORMAL
  zh: 使用案例数据集文件，找到2016_SFO_Customer_Survey_Data.xls文件。同时下载前一年的数据和数据字典。
- en: For the purposes of this lab, and in case the Web site is not reachable, you
    may use the datasets in the Case Dataset files. Use the 2016 and 2015 datasets.
  id: totrans-2311
  prefs: []
  type: TYPE_NORMAL
  zh: 为了本实验的目的，并且以防网站无法访问，你可以使用案例数据集文件中的数据集。使用2016年和2015年的数据集。
- en: 'We are going to answer two questions:'
  id: totrans-2312
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将回答两个问题：
- en: Given that SFO launched a marketing campaign in 2016 to attract more female
    customers, did the campaign succeed?
  id: totrans-2313
  prefs: []
  type: TYPE_NORMAL
  zh: 由于旧金山国际机场（SFO）在2016年启动了一项营销活动以吸引更多女性客户，这项活动是否取得了成功？
- en: Given that the airport increased its cleaning staff and the frequency of cleaning
    in 2016, did the efforts yield greater customer satisfaction?
  id: totrans-2314
  prefs: []
  type: TYPE_NORMAL
  zh: 由于机场在2016年增加了清洁人员并增加了清洁频率，这些努力是否带来了更高的客户满意度？
- en: Open the data files using Excel. To answer the first question, create pivot
    tables to tabulate the ratio of male to female customers in the latest year (or
    2016) and prior year (or 2015).
  id: totrans-2315
  prefs: []
  type: TYPE_NORMAL
  zh: 使用Excel打开数据文件。为了回答第一个问题，创建数据透视表来统计最新一年（或2016年）和前一年（或2015年）男女客户的比例。
- en: Using the TestForSignificanceofABTest.xlsx worksheet found in the Lab Files
    folder under the Tools folder, analyze the A/B data ([Figure 14.6](#fig14-6)).
    Was the change significant? Could you state with confidence that the campaign
    succeeded?
  id: totrans-2316
  prefs: []
  type: TYPE_NORMAL
  zh: 使用位于工具文件夹下的Lab Files文件夹中的TestForSignificanceofABTest.xlsx工作表分析A/B数据([图14.6](#fig14-6))。变化是否显著？你能否有信心地说活动取得了成功？
- en: '![image](images/pg348.jpg)'
  id: totrans-2317
  prefs: []
  type: TYPE_IMG
  zh: '![图片](images/pg348.jpg)'
- en: FIGURE 14.6 A/B test results showing the significant change of the 2015/2016
    marketing campaign to improve the satisfaction rate of female airport customers
  id: totrans-2318
  prefs: []
  type: TYPE_NORMAL
  zh: 图14.6 A/B测试结果显示，2015/2016年营销活动显著提高了女性机场客户的满意度
- en: To answer the second question, repeat the process on Q9ALL on cleanliness ([Figure
    14.7](#fig14-7)). Here, we consider it a “success” if the increased number of
    passengers rated the cleanliness a “5.” Did the percentage of “5” ratings significantly
    increase from one year to the next under the new cleaning regime? Since p > .05,
    the answer is “no.”
  id: totrans-2319
  prefs: []
  type: TYPE_NORMAL
  zh: 为了回答第二个问题，在Q9ALL上重复清洁([图14.7](#fig14-7))的过程。在这里，如果乘客对清洁的评分增加为“5”，我们将其视为“成功”。在新清洁制度下，从一年到下一年“5”评分的百分比显著增加了吗？由于p
    > .05，答案是“没有”。
- en: '![image](images/pg349.jpg)'
  id: totrans-2320
  prefs: []
  type: TYPE_IMG
  zh: '![图片](images/pg349.jpg)'
- en: FIGURE 14.7 A/B test results showing significant difference in satisfaction
    by the 2015/2016 cleaning improvement campaign to improve the satisfaction of
    the “highly satisfied” (5’s only) airport customers
  id: totrans-2321
  prefs: []
  type: TYPE_NORMAL
  zh: 图14.7 A/B测试结果显示，2015/2016年清洁改进活动在提高“非常满意”的（仅5分）机场客户满意度方面产生了显著差异
- en: What if we changed the condition to an increase in the number of customers who
    gave a rating of “4” or “5” from one year to the next versus a “1,” “2,” or “3?”
    Did that change the outcome of the analysis? Again, since p > .05, the answer
    is “no” ([Figure 14.8](#fig14-8)).
  id: totrans-2322
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们将条件改为从一年到下一年客户对“4”或“5”评分的增加与对“1”、“2”或“3”评分的增加相比，这会改变分析结果吗？再次，由于p > .05，答案是“没有”([图14.8](#fig14-8))。
- en: '![image](images/pg349_1.jpg)'
  id: totrans-2323
  prefs: []
  type: TYPE_IMG
  zh: '![图片](images/pg349_1.jpg)'
- en: FIGURE 14.8 A/B test results showing no significant change by the 2015/2016
    cleaning improvement campaign to improve the satisfaction of the “satisfied” (4’s
    and 5’s) airport customers
  id: totrans-2324
  prefs: []
  type: TYPE_NORMAL
  zh: 图14.8 A/B测试结果显示，2015/2016年清洁改进活动对提高“满意”的（4分和5分）机场客户满意度没有产生显著变化
- en: 'Analysis Case 14.4: Analysis Using Titanic Data'
  id: totrans-2325
  prefs: []
  type: TYPE_NORMAL
  zh: 分析案例14.4：使用泰坦尼克号数据进行分析
- en: Analysis with Excel
  id: totrans-2326
  prefs: []
  type: TYPE_NORMAL
  zh: 使用Excel进行分析
- en: The Titanic had a sister ship, the Britannic, built almost identically. Due
    to the Titanic disaster, the shipbuilders made the Britannic ship safer in case
    of disaster. Unfortunately, the Britannic sank almost in the same way as the Titanic
    (though from a human-made disaster, a torpedo during WWI, not an iceberg). The
    survival rates, however, were dramatically different. The data may be obtained
    from [http://www.titanicfacts.net/](http://www.titanicfacts.net/) ([Figure 14.9](#fig14-9)).
  id: totrans-2327
  prefs: []
  type: TYPE_NORMAL
  zh: 泰坦尼克号有一艘姐妹船，布里斯托尔尼克号，几乎一模一样地建造。由于泰坦尼克号灾难，造船商使布里斯托尔尼克号在灾难发生时更安全。不幸的是，布里斯托尔尼克号几乎以与泰坦尼克号相同的方式沉没（尽管是人为灾难，一战期间的鱼雷，而不是冰山）。然而，生存率却大不相同。数据可以从[http://www.titanicfacts.net/](http://www.titanicfacts.net/)获得（[图14.9](#fig14-9)）。
- en: '![image](images/pg350.jpg)'
  id: totrans-2328
  prefs: []
  type: TYPE_IMG
  zh: '![图片](images/pg350.jpg)'
- en: FIGURE 14.9 Survival statistics of the Titanic and Britannic transatlantic ship
    disasters
  id: totrans-2329
  prefs: []
  type: TYPE_NORMAL
  zh: 图14.9 泰坦尼克号和布里斯托尔尼克号跨大西洋船只灾难的生存统计数据
- en: 'The question we want to answer is as follows:'
  id: totrans-2330
  prefs: []
  type: TYPE_NORMAL
  zh: 我们想要回答的问题是以下内容：
- en: Did the changes in ship safety make a significant difference in the survival
    rates?
  id: totrans-2331
  prefs: []
  type: TYPE_NORMAL
  zh: 船只安全性的变化是否对生存率产生了显著影响？
- en: We set up the analysis as an A/B test and use the TestForSignificanceOfABTest.xlsx
    tool. We can compute a p-value to guide our answer ([Figure 14.10](#fig14-10)).
  id: totrans-2332
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将分析设置为一个A/B测试，并使用TestForSignificanceOfABTest.xlsx工具。我们可以计算一个p值来指导我们的答案（[图14.10](#fig14-10)）。
- en: '![image](images/pg351.jpg)'
  id: totrans-2333
  prefs: []
  type: TYPE_IMG
  zh: '![图片](images/pg351.jpg)'
- en: FIGURE 14.10 A/B test results show that the Britannic survival rate was statistically
    significantly higher than the Titanic’s
  id: totrans-2334
  prefs: []
  type: TYPE_NORMAL
  zh: 图14.10 A/B测试结果显示，布里斯托尔尼克号的生存率在统计上显著高于泰坦尼克号
- en: The answer is that the changes made a significant difference.
  id: totrans-2335
  prefs: []
  type: TYPE_NORMAL
  zh: 答案是，这些变化产生了显著的影响。
- en: CHAPTER 15
  id: totrans-2336
  prefs: []
  type: TYPE_NORMAL
  zh: 第15章
- en: TEXT ANALYTICS
  id: totrans-2337
  prefs: []
  type: TYPE_NORMAL
  zh: 文本分析
- en: '![image](images/pg353.jpg)'
  id: totrans-2338
  prefs: []
  type: TYPE_IMG
  zh: '![图片](images/pg353.jpg)'
- en: Text analytics, also known as text data mining, is a rapidly evolving field
    that allows analysts to extract meaningful insights from unstructured textual
    data. As organizations accumulate vast amounts of text from sources like social
    media, customer reviews, emails, and documents, the ability to algorithmically
    analyze this data has become increasingly valuable. This chapter introduces important
    concepts and techniques in text analytics that enable businesses to unlock the
    potential of their textual data assets.
  id: totrans-2339
  prefs: []
  type: TYPE_NORMAL
  zh: 文本分析，也称为文本数据挖掘，是一个快速发展的领域，允许分析师从非结构化文本数据中提取有意义的见解。随着组织从社交媒体、客户评论、电子邮件和文档等来源积累大量的文本，算法分析这些数据的能力变得越来越有价值。本章介绍了文本分析中的重要概念和技术，使企业能够释放其文本数据资产潜力。
- en: Text analytics transforms raw, unstructured text into structured data that can
    be systematically analyzed. This process combines elements from natural language
    processing, machine learning, statistics, and information retrieval. Some fundamental
    techniques covered in this chapter include word frequency analysis, sentiment
    analysis, and visualization methods like word clouds.
  id: totrans-2340
  prefs: []
  type: TYPE_NORMAL
  zh: 文本分析将原始的非结构化文本转换为可以系统分析的结构化数据。这个过程结合了自然语言处理、机器学习、统计学和信息检索的元素。本章涵盖的一些基本技术包括词频分析、情感分析和如词云之类的可视化方法。
- en: Word frequency analysis involves counting the occurrences of words or phrases
    within a corpus of text. This seemingly simple approach can reveal important themes,
    topics, and patterns. For example, analyzing the most frequent words in customer
    reviews can quickly highlight commonly mentioned product features or issues. Word
    clouds provide an intuitive visual representation of word frequencies, with more
    common words appearing larger in the display.
  id: totrans-2341
  prefs: []
  type: TYPE_NORMAL
  zh: 词频分析涉及计算文本语料库中单词或短语的出现次数。这种看似简单的方法可以揭示重要的主题、话题和模式。例如，分析客户评论中最频繁出现的单词可以快速突出常见的商品特性或问题。词云提供了直观的词频视觉表示，显示中更常见的单词在显示中更大。
- en: Sentiment analysis helps determine the emotional tone expressed in text. By
    categorizing text as positive, negative, or neutral, businesses can gauge customer
    satisfaction, monitor brand perception, and track public opinion. More advanced
    sentiment analysis can detect nuanced emotions like anger, joy, or frustration.
  id: totrans-2342
  prefs: []
  type: TYPE_NORMAL
  zh: 情感分析有助于确定文本中表达的情感基调。通过将文本分类为正面、负面或中性，企业可以衡量客户满意度、监控品牌认知和跟踪公众舆论。更高级的情感分析可以检测细微的情绪，如愤怒、喜悦或挫败感。
- en: We demonstrate these techniques using practical examples and tools. You will
    learn to use Excel functions like COUNTIF to perform basic sentiment scoring on
    product reviews. You will also gain hands-on experience with Web-based text analytics
    tools to create word clouds and conduct word frequency analysis on larger text
    corpora.
  id: totrans-2343
  prefs: []
  type: TYPE_NORMAL
  zh: 我们通过实际示例和工具演示这些技术。您将学习如何使用Excel函数如COUNTIF对产品评论进行基本情感评分。您还将获得使用基于网络的文本分析工具创建词云和在更大的文本语料库上进行单词频率分析的实际经验。
- en: An extended example analyzes a collection of classic travel books, showing how
    text analytics can extract insights from a million words of unstructured text.
    This is much like real-world scenarios where analysts might need to derive meaning
    from large volumes of social media posts, customer feedback, or other text data.
  id: totrans-2344
  prefs: []
  type: TYPE_NORMAL
  zh: 一个扩展的例子分析了经典旅行书籍的集合，展示了文本分析如何从一百万字的非结构化文本中提取见解。这类似于现实世界场景，分析师可能需要从大量社交媒体帖子、客户反馈或其他文本数据中推导出意义。
- en: While powerful, it is important to recognize the limitations of these techniques.
    Word frequency and sentiment analysis can miss context-dependent meanings or struggle
    with sarcasm and cultural nuances. As such, text analytics is often most effective
    when combined with human interpretation and domain expertise.
  id: totrans-2345
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然功能强大，但重要的是要认识到这些技术的局限性。单词频率和情感分析可能会错过上下文相关的含义或难以处理讽刺和文化细微差别。因此，文本分析通常与人类解释和领域专业知识结合使用时最为有效。
- en: The applications of text analytics span diverse industries and use cases. Marketing
    teams use it to understand customer feedback and track brand sentiment. Human
    resources departments apply text analytics to screen resumes and job applications.
    Legal teams use it to review contracts and ensure regulatory compliance. Researchers
    employ text analytics to uncover connections between scientific papers and concepts.
  id: totrans-2346
  prefs: []
  type: TYPE_NORMAL
  zh: 文本分析的应用范围广泛，涵盖了多个行业和用例。营销团队使用它来理解客户反馈和跟踪品牌情绪。人力资源部门应用文本分析来筛选简历和求职申请。法律团队使用它来审查合同并确保合规性。研究人员使用文本分析来揭示科学论文和概念之间的联系。
- en: As businesses increasingly recognize the value locked in their unstructured
    text data, proficiency in text analytics techniques is becoming an essential skill
    for data analysts and business intelligence professionals. This chapter equips
    you with foundational knowledge and practical skills in text analytics, preparing
    you to derive actionable insights from the textual data associated with modern
    business.
  id: totrans-2347
  prefs: []
  type: TYPE_NORMAL
  zh: 随着企业越来越认识到其非结构化文本数据中的价值，精通文本分析技术已成为数据分析师和商业智能专业人士的一项基本技能。本章为您提供了文本分析的基础知识和实践技能，使您能够从与现代商业相关的文本数据中得出可操作的见解。
- en: 'This technique answers the business question: “What are they saying?”'
  id: totrans-2348
  prefs: []
  type: TYPE_NORMAL
  zh: 这种技术回答了商业问题：“他们在说什么？”
- en: Text Analytics
  id: totrans-2349
  prefs: []
  type: TYPE_NORMAL
  zh: 文本分析
- en: What is Text Analytics?
  id: totrans-2350
  prefs: []
  type: TYPE_NORMAL
  zh: 什么是文本分析？
- en: Text analytics is a set of techniques and methodologies used to extract meaningful
    information and insights from unstructured text data. It combines elements from
    various fields, including natural language processing, machine learning, statistics,
    and information retrieval. The goal of text analytics is to transform raw text
    into structured data that can be analyzed to uncover patterns, trends, and valuable
    insights. One of the fundamental techniques in text analytics is frequency analysis,
    which involves counting the occurrences of words or phrases within a corpus of
    text. Frequency analysis can reveal the most common topics, themes, or keywords
    in a collection of documents. It’s often used as a starting point for more advanced
    analyses and can help identify important concepts or trends within the text data.
    For example, a company might use frequency analysis on customer reviews to identify
    the most frequently mentioned product features or issues.
  id: totrans-2351
  prefs: []
  type: TYPE_NORMAL
  zh: 文本分析是一套用于从非结构化文本数据中提取有意义信息和洞察力的技术和方法。它结合了来自多个领域的元素，包括自然语言处理、机器学习、统计学和信息检索。文本分析的目标是将原始文本转换为结构化数据，以便进行分析，揭示模式、趋势和有价值的见解。文本分析中的一个基本技术是频率分析，它涉及计算文本语料库中单词或短语的出现次数。频率分析可以揭示文档集中最常见的主题、主题或关键词。它通常用作更高级分析的开端，并有助于在文本数据中识别重要概念或趋势。例如，一家公司可能会对客户评论进行频率分析，以确定最常提到的产品功能或问题。
- en: Sentiment analysis is another crucial technique in text analytics. It aims to
    determine the emotional tone or attitude expressed in a piece of text. Sentiment
    analysis can categorize text as positive, negative, or neutral, and sometimes
    even detect more nuanced emotions like anger, joy, or frustration. This technique
    is particularly valuable for understanding customer opinions and feedback. For
    instance, social media monitoring tools often employ sentiment analysis to gauge
    public reaction to brand campaigns or product launches. Document similarity scoring
    is a technique used to measure how alike two or more documents are in terms of
    their content or themes. This can be done using various methods, such as cosine
    similarity of term frequency-inverse document frequency (TF-IDF) vectors, or more
    advanced techniques like latent semantic analysis. Document similarity scoring
    is useful for tasks such as content recommendation systems, plagiarism detection,
    or grouping related documents in large databases.
  id: totrans-2352
  prefs: []
  type: TYPE_NORMAL
  zh: 情感分析是文本分析中的另一项关键技术。它的目的是确定文本中表达的情感基调或态度。情感分析可以将文本分类为正面、负面或中性，有时甚至可以检测到更细微的情感，如愤怒、喜悦或挫败感。这项技术在理解客户意见和反馈方面特别有价值。例如，社交媒体监控工具通常采用情感分析来衡量公众对品牌活动或产品发布的反应。文档相似度评分是一种用于衡量两个或多个文档在内容或主题上相似程度的技巧。这可以通过各种方法完成，例如使用词频-逆文档频率（TF-IDF）向量的余弦相似度，或更高级的技术，如潜在语义分析。文档相似度评分对于内容推荐系统、抄袭检测或在大数据库中分组相关文档等任务非常有用。
- en: These text analytics techniques can be applied to a wide variety of data sources
    and business applications. Some common types of data analyzed include social media
    posts and comments, customer reviews and feedback, email communications, support
    tickets and customer service interactions, news articles and blog posts, academic
    papers and research documents, legal documents and contracts, and survey responses.
    Business applications of text analytics are diverse and can provide significant
    value across various industries. For example, companies can gain customer insights
    by analyzing feedback, reviews, and social media mentions to understand sentiment,
    identify common issues, and improve products or services. In market research,
    text analytics can be used to monitor industry trends, competitor activities,
    and consumer preferences by analyzing news articles, social media, and online
    forums.
  id: totrans-2353
  prefs: []
  type: TYPE_NORMAL
  zh: 这些文本分析技术可以应用于广泛的数据源和商业应用。一些常见的分析数据类型包括社交媒体帖子及评论、客户评价及反馈、电子邮件沟通、支持工单及客户服务互动、新闻文章及博客文章、学术论文及研究文件、法律文件及合同，以及调查问卷回复。文本分析在商业应用中种类繁多，可以在各个行业中提供显著的价值。例如，公司可以通过分析反馈、评价和社交媒体提及来获取客户洞察，理解情感，识别常见问题，并改进产品或服务。在市场调研中，通过分析新闻文章、社交媒体和在线论坛，文本分析可以用来监控行业趋势、竞争对手活动和消费者偏好。
- en: Fraud detection is another important application, where text analytics can help
    identify potential fraudulent activities by analyzing patterns in text data from
    financial transactions or insurance claims. In health care, text analytics techniques
    can be applied to medical records and research papers to identify trends in diseases,
    treatments, or patient outcomes. Human resource departments can use text analytics
    to screen resumes and job applications, matching candidates with job requirements
    more efficiently. Legal and compliance teams can review large volumes of legal
    documents to identify relevant information for cases or ensure compliance with
    regulations.
  id: totrans-2354
  prefs: []
  type: TYPE_NORMAL
  zh: 欺诈检测是另一个重要的应用，文本分析可以通过分析金融交易或保险索赔中的文本数据模式来帮助识别潜在的欺诈活动。在医疗保健领域，文本分析技术可以应用于病历和研究论文，以识别疾病、治疗或患者结果的趋势。人力资源部门可以使用文本分析来筛选简历和求职申请，更有效地将候选人与工作要求相匹配。法律和合规团队可以审查大量法律文件，以识别案件或确保符合规定的相关信息。
- en: Content recommendation systems often rely on text analytics to suggest relevant
    articles, products, or services based on user preferences and behavior. Brand
    monitoring is another common application, where companies track brand mentions
    and sentiment across various online platforms to manage reputation and respond
    to customer concerns. Text analytics is also used in political analysis to gauge
    public opinion on political issues or predict election outcomes by analyzing social
    media posts and news articles. In scientific research, text analytics can help
    identify connections between different research papers or discover new relationships
    between scientific concepts. As businesses increasingly recognize the value of
    unstructured text data, the applications of text analytics continue to expand,
    offering new opportunities for gaining insights and making data-driven decisions
    across various domains.
  id: totrans-2355
  prefs: []
  type: TYPE_NORMAL
  zh: 内容推荐系统通常依赖于文本分析，根据用户偏好和行为建议相关的文章、产品或服务。品牌监控是另一个常见应用，公司跟踪品牌在各种在线平台上的提及和情绪，以管理声誉并回应客户关注。文本分析也用于政治分析，通过分析社交媒体帖子和新文章来衡量公众对政治问题的看法或预测选举结果。在科学研究领域，文本分析可以帮助识别不同研究论文之间的联系或发现科学概念之间新的关系。随着企业越来越认识到非结构化文本数据的价值，文本分析的应用范围不断扩展，为在各个领域获取见解和做出数据驱动决策提供了新的机会。
- en: What are the Elements of Text Analytics?
  id: totrans-2356
  prefs: []
  type: TYPE_NORMAL
  zh: 文本分析的要素有哪些？
- en: Text analytics, like histograms for numerical data, is a method for visualizing
    and analyzing unstructured textual information. The important elements of text
    analytics include
  id: totrans-2357
  prefs: []
  type: TYPE_NORMAL
  zh: 文本分析，类似于数值数据的直方图，是一种用于可视化和分析非结构化文本信息的方法。文本分析的重要元素包括
- en: '**1.**Corpus: This is the entire collection of text documents being analyzed,
    similar to the dataset in histogram analysis.'
  id: totrans-2358
  prefs: []
  type: TYPE_NORMAL
  zh: '**1.**语料库：这是正在分析的整个文本文档集合，类似于直方图分析中的数据集。'
- en: '**2.**Tokens: These are individual words or phrases extracted from the text,
    analogous to the individual data points in a numerical dataset.'
  id: totrans-2359
  prefs: []
  type: TYPE_NORMAL
  zh: '**2.**标记：这些是从文本中提取的个别单词或短语，类似于数值数据集中的个别数据点。'
- en: '**3.**Frequency distribution: Similar to how histograms show the distribution
    of numerical values, text analytics often involves analyzing the frequency distribution
    of words or phrases.'
  id: totrans-2360
  prefs: []
  type: TYPE_NORMAL
  zh: '**3.**频率分布：类似于直方图显示数值值的分布，文本分析通常涉及分析单词或短语的频率分布。'
- en: '**4.**Bins or categories: In text analytics, this could be represented by grouping
    words into themes, topics, or sentiment categories, much like how numerical data
    is grouped into bins in a histogram.'
  id: totrans-2361
  prefs: []
  type: TYPE_NORMAL
  zh: '**4.**分类或分组：在文本分析中，这可以通过将单词分组到主题、话题或情感类别来表示，类似于数值数据在直方图中被分组到分组中。'
- en: '**5.**Visualization: While histograms use bars to represent data, text analytics
    might use word clouds, network graphs, or other text-specific visualizations to
    represent patterns and relationships in the data.'
  id: totrans-2362
  prefs: []
  type: TYPE_NORMAL
  zh: '**5.**可视化：虽然直方图使用条形来表示数据，但文本分析可能会使用词云、网络图或其他特定于文本的可视化来表示数据中的模式和关系。'
- en: '**6.**Statistical measures: Just as histograms help identify measures like
    central tendency and spread, text analytics uses statistical measures to identify
    significant words, phrases, or patterns.'
  id: totrans-2363
  prefs: []
  type: TYPE_NORMAL
  zh: '**6.**统计量度：正如直方图有助于识别诸如集中趋势和分布等度量，文本分析使用统计量度来识别重要的单词、短语或模式。'
- en: '**7.**Preprocessing: This involves cleaning and preparing the text data, similar
    to how numerical data might be sorted or filtered before creating a histogram.'
  id: totrans-2364
  prefs: []
  type: TYPE_NORMAL
  zh: '**7.**预处理：这涉及到清洗和准备文本数据，类似于在创建直方图之前可能对数值数据进行排序或过滤。'
- en: '**8.**Analysis tools: Much like the Excel, R, and AI tools mentioned for histogram
    creation, text analytics employs various software tools and programming languages
    for analysis.'
  id: totrans-2365
  prefs: []
  type: TYPE_NORMAL
  zh: '**8.**分析工具：与用于创建直方图的Excel、R和AI工具类似，文本分析使用各种软件工具和编程语言进行数据分析。'
- en: These elements of text analytics serve similar purposes to those in histogram
    analysis, helping to summarize, visualize, and extract insights from large volumes
    of textual data.
  id: totrans-2366
  prefs: []
  type: TYPE_NORMAL
  zh: 这些文本分析的元素与直方图分析中的元素具有类似的作用，有助于总结、可视化和从大量文本数据中提取见解。
- en: An Example of Text Analytics
  id: totrans-2367
  prefs: []
  type: TYPE_NORMAL
  zh: 文本分析的一个例子
- en: The sonnet “How Do I Love Thee?” by Elizabeth Barrett Browning is used in the
    following example. (It is one of the sonnets from her collection Sonnets from
    the Portuguese.)
  id: totrans-2368
  prefs: []
  type: TYPE_NORMAL
  zh: 伊丽莎白·巴雷特·布朗宁的十四行诗《我该如何爱你？》在以下例子中使用。（这是她诗集《葡萄牙十四行诗》中的一首诗。）
- en: How do I love thee? Let me count the ways.
  id: totrans-2369
  prefs: []
  type: TYPE_NORMAL
  zh: 我该如何爱你？让我数一数。
- en: I love thee to the depth and breadth and height
  id: totrans-2370
  prefs: []
  type: TYPE_NORMAL
  zh: 我爱你至深至广至高
- en: My soul can reach, when feeling out of sight
  id: totrans-2371
  prefs: []
  type: TYPE_NORMAL
  zh: 当我的灵魂失去视线时，我能触及
- en: For the ends of being and ideal grace.
  id: totrans-2372
  prefs: []
  type: TYPE_NORMAL
  zh: 为了存在的目的和理想的优雅。
- en: I love thee to the level of every day’s
  id: totrans-2373
  prefs: []
  type: TYPE_NORMAL
  zh: 我用日常生活的水平爱你
- en: Most quiet need, by sun and candle-light.
  id: totrans-2374
  prefs: []
  type: TYPE_NORMAL
  zh: 在阳光和烛光下，最宁静的需求。
- en: I love thee freely, as men strive for right.
  id: totrans-2375
  prefs: []
  type: TYPE_NORMAL
  zh: 我爱你，自由如人们为正义奋斗。
- en: I love thee purely, as they turn from praise.
  id: totrans-2376
  prefs: []
  type: TYPE_NORMAL
  zh: 我爱你，纯粹如他们转向赞美。
- en: I love thee with the passion put to use
  id: totrans-2377
  prefs: []
  type: TYPE_NORMAL
  zh: 我用投入使用的激情爱你
- en: In my old griefs, and with my childhood’s faith.
  id: totrans-2378
  prefs: []
  type: TYPE_NORMAL
  zh: 在我旧日的悲伤中，以及我童年的信仰。
- en: I love thee with a love I seemed to lose
  id: totrans-2379
  prefs: []
  type: TYPE_NORMAL
  zh: 我用我似乎失去的爱爱你
- en: With my lost saints. I love thee with the breath,
  id: totrans-2380
  prefs: []
  type: TYPE_NORMAL
  zh: 我失去的圣徒。我用呼吸爱你，
- en: Smiles, tears, of all my life; and, if God choose,
  id: totrans-2381
  prefs: []
  type: TYPE_NORMAL
  zh: 笑容，眼泪，我一生中的一切；如果上帝选择，
- en: I shall but love thee better after death.
  id: totrans-2382
  prefs: []
  type: TYPE_NORMAL
  zh: 我死后会更爱你。
- en: Using the Voyant text analytics tool, we can generate one element of analysis,
    the word cloud. Some frequently used words in the corpus are “love” (11), “ways”
    (1), “use” (1), “turn” (1), and “tears” (1). We see that the most frequent word
    is “love,” as it should be and it dominates the word cloud.
  id: totrans-2383
  prefs: []
  type: TYPE_NORMAL
  zh: 使用Voyant文本分析工具，我们可以生成分析的一个元素，即词云。语料库中一些常用的词是“爱”（11次）、“方式”（1次）、“使用”（1次）、“转向”（1次）和“眼泪”（1次）。我们看到最频繁的词是“爱”，正如它应该的那样，它主导了词云。
- en: '![image](images/pg359.jpg)'
  id: totrans-2384
  prefs: []
  type: TYPE_IMG
  zh: '![image](images/pg359.jpg)'
- en: FIGURE 15.1 The word cloud result of the text analytics of Elizabeth Barrett
    Browning’s 43rd sonnet
  id: totrans-2385
  prefs: []
  type: TYPE_NORMAL
  zh: 图 15.1 对伊丽莎白·巴雷特·布朗宁第43首十四行诗的文本分析词云结果
- en: 'Analysis Case 15.1: Text Analysis I – Word Frequency Analysis'
  id: totrans-2386
  prefs: []
  type: TYPE_NORMAL
  zh: 分析案例 15.1：文本分析 I – 词频分析
- en: Word frequency analysis and word clouds are fundamental techniques in text analytics,
    offering visual and statistical insights into large volumes of textual data. Word
    frequency analysis involves counting the occurrences of individual words within
    a corpus, providing a quantitative measure of word importance or prevalence. This
    technique helps identify important themes, dominant topics, and recurring concepts
    within the text. It is particularly useful for understanding the main focus of
    documents, tracking trends over time, or comparing different text sources.
  id: totrans-2387
  prefs: []
  type: TYPE_NORMAL
  zh: 词频分析和词云是文本分析的基本技术，为大量文本数据提供了视觉和统计洞察。词频分析涉及计算语料库中单个单词的出现次数，提供了单词重要性的定量度量或普遍性。这项技术有助于识别文本中的重要主题、主导主题和重复概念。它特别有助于理解文档的主要焦点、跟踪趋势或比较不同的文本来源。
- en: 'Word clouds are visual representations of word frequency data. In a word cloud,
    words are displayed in varying sizes based on their frequency: the more frequent
    a word, the larger it appears in the cloud. This creates a quick view of the most
    prominent terms in a text corpus. Word clouds are especially effective for quickly
    communicating the important concepts within large text datasets to non-technical
    audiences.'
  id: totrans-2388
  prefs: []
  type: TYPE_NORMAL
  zh: 词云是词频数据的视觉表示。在词云中，根据词频显示不同大小的单词：一个词越频繁，它在云中的显示就越大。这为文本语料库中最突出的术语提供了一个快速视图。词云对于快速向非技术受众传达大型文本数据集中的重要概念特别有效。
- en: Both techniques are valuable for initial exploratory analysis, helping researchers
    and analysts to quickly understand the content of large text collections. They
    can reveal unexpected patterns, guide further in-depth analysis, and support decision-making
    processes in various fields, from market research to literary analysis. However,
    it is important to note that these methods focus on individual words and may miss
    context-dependent meanings or multi-word phrases, necessitating complementary
    analysis techniques for a comprehensive understanding of the text.
  id: totrans-2389
  prefs: []
  type: TYPE_NORMAL
  zh: 这两种技术对于初步探索性分析都很有价值，帮助研究人员和分析人员快速理解大量文本集合的内容。它们可以揭示意外的模式，指导进一步的深入分析，并支持各个领域的决策过程，从市场研究到文学分析。然而，重要的是要注意，这些方法侧重于单个单词，可能会错过上下文相关的含义或多词短语，需要互补的分析技术来全面理解文本。
