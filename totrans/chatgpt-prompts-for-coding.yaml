  zh: '"解释数组在内存中的存储方式和索引的工作原理。编写一个[Python/JavaScript等]程序，演示访问和修改二维数组中的元素。"'
- en: '25: Writing Basic Encryption and Decryption Code'
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: '25: 编写基本的加密和解密代码'
- en: 'Prompt:'
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Write a program in [Python/JavaScript/etc.] that encrypts a string using a
    simple Caesar cipher technique. Include a decryption function and explain how
    the algorithm works."'
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: '"编写一个[Python/JavaScript等]程序，使用简单的凯撒密码技术加密字符串。包括一个解密函数，并解释算法是如何工作的。"'
- en: '26: Understanding Variables and Data Types'
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: '26: 理解变量和数据类型'
- en: 'Prompt:'
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Explain the concept of variables and data types in [Python/JavaScript/etc.]
    with examples. Provide a simple analogy to help a beginner understand, and include
    use cases for each data type."'
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: '"用示例解释[Python/JavaScript等]中的变量和数据类型的概念。提供一个简单的类比来帮助初学者理解，并包括每种数据类型的使用案例。"'
- en: '27: Writing a Reusable Function'
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: '27: 编写可重用函数'
- en: 'Prompt:'
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Create a reusable function in [Python/JavaScript/etc.] that [performs a specific
    task, e.g., calculates the area of a rectangle or validates a password]. Include
    comments to explain each step, and provide suggestions for optimizing its performance."'
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: '"在[Python/JavaScript等]中创建一个可重用函数，[执行特定任务，例如计算矩形的面积或验证密码]。包括注释来解释每一步，并提供优化其性能的建议。"'
- en: '28: Refactoring Code for Clarity'
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: '28: 优化代码以提高清晰度'
- en: 'Prompt:'
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Refactor the following code snippet to make it more readable and maintainable.
    Add comments where necessary and improve variable naming:'
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: '"重构以下代码片段以使其更易于阅读和维护。在必要时添加注释并改进变量命名："'
- en: '[Paste your code snippet here]"'
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: '[在此粘贴你的代码片段]'
- en: '29: Generating Boilerplate Code for a Project'
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: '29: 为项目生成样板代码'
- en: 'Prompt:'
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Write boilerplate code for a [specific project type, e.g., a command-line
    to-do app or a simple HTTP server] in [Python/JavaScript/etc.]. Include setup
    instructions, key file structure, and comments to guide further development."'
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: '"为[特定项目类型，例如命令行待办事项应用或简单的HTTP服务器]编写样板代码。[Python/JavaScript等]。包括设置说明、关键文件结构和注释以指导进一步开发。"'
- en: '30: Writing and Translating Pseudocode'
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: '30: 编写和翻译伪代码'
- en: 'Prompt:'
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Write pseudocode to solve the following problem: [describe the problem]. Then,
    convert the pseudocode into working code in [specific programming language]. Ensure
    the code is well-commented for clarity."'
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: '"编写伪代码以解决以下问题：[描述问题]。然后，将伪代码转换为[特定编程语言]中的工作代码。确保代码有良好的注释以提高清晰度。"'
- en: Language-Specific Prompts
  id: totrans-180
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 语言特定提示
- en: Every programming language has its unique nuances, strengths, and challenges.
    In this chapter, I guide you through tailored prompts for popular languages like
    Python, JavaScript, Java, and more. These prompts will help you leverage the full
    potential of your chosen language while overcoming common pitfalls.
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: 每种编程语言都有其独特的细微差别、优势和挑战。在本章中，我将引导你通过针对Python、JavaScript、Java等流行语言的定制提示。这些提示将帮助你充分利用所选语言的优势，同时克服常见的陷阱。
- en: '1: Writing Python Functions with Error Handling'
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: '1: 编写具有错误处理的Python函数'
- en: 'Prompt:'
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Write a Python function to calculate the square root of a number. Include
    error handling to check if the input is a non-negative number. If the input is
    invalid (e.g., a string or negative number), return an appropriate error message.
    Additionally, explain how Python’s try-except block works and why it’s essential
    for robust coding."'
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: '"编写一个Python函数来计算一个数的平方根。包括错误处理来检查输入是否为非负数。如果输入无效（例如，字符串或负数），返回适当的错误信息。此外，解释Python的try-except块是如何工作的，以及为什么它对健壮的编码至关重要。"'
- en: '2: Understanding List Comprehensions in Python'
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: '2: 理解Python中的列表推导'
- en: 'Prompt:'
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Explain the concept of list comprehensions in Python with detailed examples.
    Write a program that uses list comprehensions to generate a list of squares for
    numbers between 1 and 20, excluding multiples of 3\. Provide comparisons between
    list comprehensions and traditional loops, explaining when to use each."'
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: '"用详细的示例解释Python中列表推导的概念。编写一个使用列表推导生成1到20之间数字的平方列表的程序，排除3的倍数。提供列表推导与传统循环的比较，解释何时使用每种方法。"'
- en: '3: Using JavaScript Promises for Asynchronous Tasks'
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: '3: 使用JavaScript Promise处理异步任务'
- en: 'Prompt:'
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Explain the concept of Promises in JavaScript and why they are used for handling
    asynchronous operations. Write code to simulate a simple API request using Promises,
    including resolve and reject cases. Additionally, demonstrate how to chain .then()
    and .catch() methods and handle errors gracefully."'
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: '"解释JavaScript中Promise的概念以及为什么它们用于处理异步操作。编写代码模拟一个简单的API请求使用Promise，包括解决和拒绝的情况。此外，演示如何链式调用.then()和.catch()方法，并优雅地处理错误。"'
- en: '4: Building a Simple Web Server in Node.js'
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: '4: 在Node.js中构建简单的Web服务器'
- en: 'Prompt:'
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Write code to create a basic HTTP web server in Node.js that listens on port
    3000 and responds with ''Hello, World!'' to any request. Explain the key concepts
    of Node.js, including how it handles asynchronous events, and discuss the advantages
    of using Node.js for server-side development."'
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: '"编写代码创建一个基本的HTTP网络服务器，使用Node.js监听端口3000，并对任何请求响应''Hello, World!''。解释Node.js的关键概念，包括它如何处理异步事件，并讨论使用Node.js进行服务器端开发的优点。"'
- en: '5: Creating a REST API in Flask (Python)'
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: '5: 使用Flask（Python）创建REST API'
- en: 'Prompt:'
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: 'Prompt:'
- en: '"Write a REST API in Python using the Flask framework. The API should include
    endpoints to create, read, update, and delete a list of books. Each book should
    have attributes such as title, author, and publication year. Explain how Flask
    routes work and how to test the API using tools like Postman."'
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
  zh: '"使用Flask框架在Python中编写REST API。该API应包括创建、读取、更新和删除书籍列表的端点。每本书应具有标题、作者和出版年份等属性。解释Flask路由的工作方式以及如何使用Postman等工具测试API。"'
- en: '6: Understanding JavaScript Closures'
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: '6: 理解JavaScript闭包'
- en: 'Prompt:'
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: 'Prompt:'
- en: '"Explain closures in JavaScript with detailed examples. Write a program that
    demonstrates closures by creating a function that generates a counter. Include
    a discussion of scope, lexical environment, and real-world use cases of closures,
    such as maintaining private variables in JavaScript."'
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: '"用详细示例解释JavaScript中的闭包。编写一个程序，通过创建一个生成计数器的函数来演示闭包。讨论作用域、词法环境和闭包在JavaScript中的实际应用，例如在JavaScript中维护私有变量。"'
- en: '7: Writing a Sorting Algorithm in Java'
  id: totrans-200
  prefs: []
  type: TYPE_NORMAL
  zh: '7: 在Java中编写排序算法'
- en: 'Prompt:'
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
  zh: 'Prompt:'
- en: '"Implement the Merge Sort algorithm in Java and provide a step-by-step explanation
    of how it works. Include detailed comments in the code to explain the recursive
    calls and merging process. Additionally, discuss the time complexity of Merge
    Sort and compare it with other sorting algorithms like Quick Sort and Bubble Sort."'
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
  zh: '"在Java中实现归并排序算法，并逐步解释其工作原理。在代码中包含详细的注释来解释递归调用和合并过程。此外，讨论归并排序的时间复杂度，并将其与其他排序算法如快速排序和冒泡排序进行比较。"'
- en: '8: Using TypeScript for Strongly-Typed JavaScript'
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: '8: 使用TypeScript进行强类型JavaScript'
- en: 'Prompt:'
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
  zh: 'Prompt:'
- en: '"Explain the advantages of using TypeScript over JavaScript for large-scale
    projects. Write code to define and use a TypeScript interface for a student object
    with properties such as name, age, and grades. Include examples of type-checking
    errors and how TypeScript catches them during development."'
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
  zh: '"解释在大型项目中使用TypeScript而不是JavaScript的优势。编写代码定义并使用一个TypeScript接口来表示学生对象，具有如姓名、年龄和成绩等属性。包括类型检查错误的示例以及TypeScript如何在开发过程中捕获它们。"'
- en: '9: Writing SQL Queries for Complex Joins'
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: '9: 编写复杂连接的SQL查询'
- en: 'Prompt:'
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
  zh: 'Prompt:'
- en: '"Write SQL queries to join two tables, ''employees'' and ''departments,'' to
    find employees working in a specific department. Include examples of INNER JOIN,
    LEFT JOIN, and RIGHT JOIN, and explain when each should be used. Additionally,
    discuss common pitfalls in joins and how to optimize query performance."'
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
  zh: '"编写SQL查询以连接两个表，''employees''（员工）和''departments''（部门），以找到在特定部门工作的员工。包括INNER
    JOIN（内连接）、LEFT JOIN（左连接）和RIGHT JOIN（右连接）的示例，并解释何时应该使用每种连接。此外，讨论连接中的常见陷阱以及如何优化查询性能。"'
- en: '10: Understanding Python Decorators'
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
  zh: '10: 理解Python装饰器'
- en: 'Prompt:'
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: 'Prompt:'
- en: '"Explain the concept of decorators in Python with examples. Write a decorator
    that logs the execution time of a function and apply it to a sample function.
    Discuss the use cases of decorators in real-world applications, such as logging,
    caching, and authentication."'
  id: totrans-211
  prefs: []
  type: TYPE_NORMAL
  zh: '"用示例解释Python中的装饰器概念。编写一个装饰器，用于记录函数的执行时间，并将其应用于一个示例函数。讨论装饰器在现实世界应用中的用例，如日志记录、缓存和身份验证。"'
- en: '11: Using Java Streams for Data Processing'
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
  zh: '11: 使用Java Streams进行数据处理'
- en: 'Prompt:'
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
  zh: 'Prompt:'
- en: '"Explain the concept of streams in Java with examples. Write code to process
    a list of integers using Java streams to filter out even numbers, sort the remaining
    numbers in descending order, and calculate their sum. Discuss the benefits of
    using streams for functional programming in Java."'
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
  zh: '"用示例解释Java中的流的概念。编写代码使用Java流处理整数列表，过滤出偶数，按降序排序剩余的数字，并计算它们的总和。讨论在Java函数式编程中使用流的好处。"'
- en: '12: Debugging JavaScript Code'
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
  zh: '12: 调试JavaScript代码'
- en: 'Prompt:'
  id: totrans-216
  prefs: []
  type: TYPE_NORMAL
  zh: 'Prompt:'
- en: '"Explain common debugging techniques in JavaScript. Write a program with intentional
    errors (e.g., missing variables or incorrect logic) and demonstrate how to use
    browser developer tools and the console.log() method to identify and fix the issues.
    Include tips for debugging asynchronous JavaScript code."'
  id: totrans-217
  prefs: []
  type: TYPE_NORMAL
  zh: '"解释JavaScript中的常见调试技术。编写一个包含故意错误（例如，缺少变量或逻辑错误）的程序，并演示如何使用浏览器开发者工具和console.log()方法来识别和修复问题。包括调试异步JavaScript代码的技巧。"'
- en: '13: Writing a Python Script for Web Scraping'
  id: totrans-218
  prefs: []
  type: TYPE_NORMAL
  zh: '13: 编写用于网络爬取的Python脚本'
- en: 'Prompt:'
  id: totrans-219
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Write a Python script to scrape the latest news headlines from a website using
    the BeautifulSoup library. Explain how to handle HTTP requests, parse HTML data,
    and avoid issues such as blocked requests or IP bans by using headers and delays.
    Provide best practices for ethical web scraping."'
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
  zh: '"使用BeautifulSoup库编写一个Python脚本，从网站爬取最新的新闻标题。解释如何处理HTTP请求、解析HTML数据，并使用头部和延迟来避免如请求被阻止或IP封禁等问题。提供道德网络爬取的最佳实践。"'
- en: '14: Creating a Class in C++'
  id: totrans-221
  prefs: []
  type: TYPE_NORMAL
  zh: '14: 在C++中创建一个类'
- en: 'Prompt:'
  id: totrans-222
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Write a C++ program to define a class called ''Car'' with attributes like
    brand, model, and price. Include member functions to display car details and calculate
    discounts. Explain the principles of Object-Oriented Programming (OOP) and how
    C++ implements encapsulation and inheritance."'
  id: totrans-223
  prefs: []
  type: TYPE_NORMAL
  zh: '"编写一个C++程序，定义一个名为''Car''的类，具有品牌、型号和价格等属性。包括显示汽车详情和计算折扣的成员函数。解释面向对象编程（OOP）的原则以及C++如何实现封装和继承。"'
- en: '15: Writing a Regex Pattern in JavaScript'
  id: totrans-224
  prefs: []
  type: TYPE_NORMAL
  zh: '15: 在JavaScript中编写正则表达式模式'
- en: 'Prompt:'
  id: totrans-225
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Explain the concept of Regular Expressions (Regex) with examples. Write a
    JavaScript function that validates email addresses using a Regex pattern. Discuss
    common pitfalls in Regex matching and provide tips for writing efficient patterns."'
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
  zh: '"解释正则表达式（Regex）的概念，并举例说明。编写一个JavaScript函数，使用正则表达式模式验证电子邮件地址。讨论正则表达式匹配中的常见陷阱，并提供编写高效模式的技巧。"'
- en: '16: Handling Errors in Java'
  id: totrans-227
  prefs: []
  type: TYPE_NORMAL
  zh: '16: Java中的错误处理'
- en: 'Prompt:'
  id: totrans-228
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Write a Java program to demonstrate exception handling. Include examples of
    using try-catch blocks to handle specific exceptions such as ArrayIndexOutOfBoundsException
    and NullPointerException. Discuss the importance of finally blocks and when to
    use custom exceptions."'
  id: totrans-229
  prefs: []
  type: TYPE_NORMAL
  zh: '"编写一个Java程序来演示异常处理。包括使用try-catch块处理特定异常（例如，ArrayIndexOutOfBoundsException和NullPointerException）的示例。讨论finally块的重要性以及何时使用自定义异常。"'
- en: '17: Writing Efficient Python Generators'
  id: totrans-230
  prefs: []
  type: TYPE_NORMAL
  zh: '17: 编写高效的Python生成器'
- en: 'Prompt:'
  id: totrans-231
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Explain the concept of generators in Python and how they differ from regular
    functions. Write a generator function to produce an infinite sequence of Fibonacci
    numbers. Discuss the memory efficiency of generators and their applications in
    data streaming and large datasets."'
  id: totrans-232
  prefs: []
  type: TYPE_NORMAL
  zh: '"解释Python中的生成器概念以及它们与常规函数的不同之处。编写一个生成器函数来生成无限序列的斐波那契数。讨论生成器的内存效率及其在数据流和大数据集中的应用。"'
- en: '18: Creating a CRUD Application in PHP'
  id: totrans-233
  prefs: []
  type: TYPE_NORMAL
  zh: '18: 在PHP中创建CRUD应用程序'
- en: 'Prompt:'
  id: totrans-234
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Write a PHP script to create a simple CRUD (Create, Read, Update, Delete)
    application for managing tasks. Use MySQL as the database and explain the key
    concepts of connecting to the database, executing queries, and handling user input
    securely to prevent SQL injection."'
  id: totrans-235
  prefs: []
  type: TYPE_NORMAL
  zh: '"编写一个PHP脚本，创建一个简单的CRUD（创建、读取、更新、删除）应用程序来管理任务。使用MySQL作为数据库，并解释连接到数据库、执行查询以及安全处理用户输入以防止SQL注入的关键概念。"'
- en: '19: Using Async/Await in JavaScript'
  id: totrans-236
  prefs: []
  type: TYPE_NORMAL
  zh: '19: 在JavaScript中使用Async/Await'
- en: 'Prompt:'
  id: totrans-237
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Explain the async/await syntax in JavaScript and how it simplifies working
    with Promises. Write code to fetch data from a public API using async/await, and
    demonstrate how to handle errors in asynchronous code. Include a comparison with
    traditional Promise chaining."'
  id: totrans-238
  prefs: []
  type: TYPE_NORMAL
  zh: '"解释JavaScript中的async/await语法以及它是如何简化Promise操作的。编写使用async/await从公共API获取数据的代码，并演示如何处理异步代码中的错误。包括与传统Promise链式调用的比较。"'
- en: '20: Writing Multi-threaded Code in Java'
  id: totrans-239
  prefs: []
  type: TYPE_NORMAL
  zh: '20: 在Java中编写多线程代码'
- en: 'Prompt:'
  id: totrans-240
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Write a Java program to demonstrate multi-threading by creating a simple application
    where two threads print numbers from 1 to 10\. Explain the key concepts of thread
    lifecycle, synchronization, and avoiding race conditions. Discuss the advantages
    of multi-threading in Java."'
  id: totrans-241
  prefs: []
  type: TYPE_NORMAL
  zh: '"编写一个Java程序，通过创建一个简单的应用程序来演示多线程，其中两个线程从1打印到10。解释线程生命周期、同步和避免竞态条件的关键概念。讨论Java中多线程的优势。"'
- en: '21: Exploring Functional Programming in Python'
  id: totrans-242
  prefs: []
  type: TYPE_NORMAL
  zh: '21: 探索Python中的函数式编程'
- en: 'Prompt:'
  id: totrans-243
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Explain the principles of functional programming in Python. Write examples
    that use functions like map(), filter(), and reduce() to process a list of numbers.
    Discuss the differences between functional and imperative programming approaches."'
  id: totrans-244
  prefs: []
  type: TYPE_NORMAL
  zh: '"解释 Python 中函数式编程的原则。编写使用 map()、filter() 和 reduce() 等函数处理数字列表的示例。讨论函数式编程和命令式编程方法之间的区别。"'
- en: '22: Writing Tests with Pytest in Python'
  id: totrans-245
  prefs: []
  type: TYPE_NORMAL
  zh: '22: 使用 Pytest 在 Python 中编写测试'
- en: 'Prompt:'
  id: totrans-246
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Write unit tests for a Python function that calculates the factorial of a
    number using the Pytest framework. Include test cases for edge scenarios like
    0, negative numbers, and large inputs. Explain how testing improves code quality
    and reliability."'
  id: totrans-247
  prefs: []
  type: TYPE_NORMAL
  zh: '"使用 Pytest 框架编写一个 Python 函数的单元测试，该函数使用 Python 计算数字的阶乘。包括针对 0、负数和大型输入等边缘场景的测试用例。解释测试如何提高代码质量和可靠性。"'
- en: '23: Building a CLI Tool with Go'
  id: totrans-248
  prefs: []
  type: TYPE_NORMAL
  zh: '23: 使用 Go 构建 CLI 工具'
- en: 'Prompt:'
  id: totrans-249
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Write a simple command-line tool in Go that accepts a URL as input and fetches
    its HTML content. Explain the key features of Go, such as concurrency and simplicity,
    and discuss how to structure a CLI tool project effectively."'
  id: totrans-250
  prefs: []
  type: TYPE_NORMAL
  zh: '"编写一个简单的 Go 命令行工具，该工具接受 URL 作为输入并获取其 HTML 内容。解释 Go 的关键特性，如并发性和简单性，并讨论如何有效地构建
    CLI 工具项目。"'
- en: '24: Implementing Polymorphism in Java'
  id: totrans-251
  prefs: []
  type: TYPE_NORMAL
  zh: '24: 在 Java 中实现多态'
- en: 'Prompt:'
  id: totrans-252
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Explain the concept of polymorphism in Java with examples. Write a program
    that demonstrates runtime polymorphism using a parent class Shape and subclasses
    like Circle and Rectangle. Discuss how polymorphism improves code flexibility
    and reusability."'
  id: totrans-253
  prefs: []
  type: TYPE_NORMAL
  zh: '"用示例解释 Java 中的多态概念。编写一个程序，使用父类 Shape 和子类如 Circle 和 Rectangle 来演示运行时多态。讨论多态如何提高代码的灵活性和可重用性。"'
- en: '25: Creating a Dynamic HTML Form with JavaScript'
  id: totrans-254
  prefs: []
  type: TYPE_NORMAL
  zh: '25: 使用 JavaScript 创建动态 HTML 表单'
- en: 'Prompt:'
  id: totrans-255
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Write a JavaScript program to dynamically generate an HTML form based on user
    input. Include validation for fields like name, email, and age. Explain how the
    DOM is manipulated to create and update elements dynamically."'
  id: totrans-256
  prefs: []
  type: TYPE_NORMAL
  zh: '"编写一个 JavaScript 程序，根据用户输入动态生成 HTML 表单。包括对姓名、电子邮件和年龄等字段的验证。解释如何操作 DOM 以动态创建和更新元素。"'
- en: '26: Handling Dates and Times in Python'
  id: totrans-257
  prefs: []
  type: TYPE_NORMAL
  zh: '26: 在 Python 中处理日期和时间'
- en: 'Prompt:'
  id: totrans-258
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Write a Python script to calculate the difference in days between two dates
    using the datetime module. Include examples of formatting dates and handling time
    zones. Discuss the challenges of working with dates in different formats and locales."'
  id: totrans-259
  prefs: []
  type: TYPE_NORMAL
  zh: '"编写一个 Python 脚本来计算两个日期之间的天数差异，使用 datetime 模块。包括日期格式化和处理时区的示例。讨论在不同格式和地区处理日期的挑战。"'
- en: '27: Exploring Functional Interfaces in Java'
  id: totrans-260
  prefs: []
  type: TYPE_NORMAL
  zh: '27: 探索 Java 中的功能接口'
- en: 'Prompt:'
  id: totrans-261
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Explain the concept of functional interfaces in Java. Write a program that
    uses the Predicate functional interface to filter a list of integers based on
    custom conditions. Discuss how functional interfaces enable functional programming
    in Java."'
  id: totrans-262
  prefs: []
  type: TYPE_NORMAL
  zh: '"解释 Java 中的功能接口概念。编写一个程序，使用 Predicate 功能接口根据自定义条件过滤整数列表。讨论功能接口如何使 Java 能够进行函数式编程。"'
- en: '28: Writing Modular JavaScript Code'
  id: totrans-263
  prefs: []
  type: TYPE_NORMAL
  zh: '28: 编写模块化 JavaScript 代码'
- en: 'Prompt:'
  id: totrans-264
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Write a JavaScript program that demonstrates modularity by splitting code
    into multiple files and importing/exporting functions using ES6 modules. Discuss
    the advantages of modular code and how it improves maintainability."'
  id: totrans-265
  prefs: []
  type: TYPE_NORMAL
  zh: '"编写一个 JavaScript 程序，通过将代码拆分为多个文件并使用 ES6 模块导入/导出函数来展示模块化。讨论模块化代码的优势以及它是如何提高可维护性的。"'
- en: '29: Building a React Component'
  id: totrans-266
  prefs: []
  type: TYPE_NORMAL
  zh: '29: 构建 React 组件'
- en: 'Prompt:'
  id: totrans-267
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Write a React component that renders a list of items and includes a search
    bar to filter items dynamically. Explain the key concepts of React, including
    state, props, and lifecycle methods, and provide best practices for managing component
    state."'
  id: totrans-268
  prefs: []
  type: TYPE_NORMAL
  zh: '"编写一个 React 组件，用于渲染项目列表并包含一个搜索栏以动态过滤项目。解释 React 的关键概念，包括状态、属性和生命周期方法，并提供管理组件状态的最佳实践。"'
- en: '30: Understanding Python’s Asyncio'
  id: totrans-269
  prefs: []
  type: TYPE_NORMAL
  zh: '30: 理解 Python 的 Asyncio'
- en: 'Prompt:'
  id: totrans-270
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Explain the asyncio library in Python and how it enables asynchronous programming.
    Write a Python script to demonstrate asynchronous fetching of data from multiple
    APIs using asyncio. Discuss when to use asyncio over threading and multiprocessing."'
  id: totrans-271
  prefs: []
  type: TYPE_NORMAL
  zh: '"解释 Python 中的 asyncio 库以及它是如何实现异步编程的。编写一个 Python 脚本来演示使用 asyncio 从多个 API 异步获取数据。讨论何时使用
    asyncio 而不是线程和多进程。"'
- en: Debugging and Error Handling
  id: totrans-272
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 调试和错误处理
- en: Debugging is both an art and a skill, often making the difference between success
    and frustration. In this chapter, I share prompts to help you quickly identify,
    understand, and resolve errors. Whether you’re tackling runtime issues or logical
    bugs, these prompts will sharpen your problem-solving abilities and ensure smoother
    development.
  id: totrans-273
  prefs: []
  type: TYPE_NORMAL
  zh: 调试既是艺术也是技能，常常是成功与挫败之间的区别。在本章中，我分享了一些提示，帮助您快速识别、理解和解决错误。无论您是在处理运行时问题还是逻辑错误，这些提示都将提高您的问题解决能力，并确保开发过程更加顺利。
- en: '1: Understanding Debugging Basics'
  id: totrans-274
  prefs: []
  type: TYPE_NORMAL
  zh: '1: 理解调试基础'
- en: 'Prompt:'
  id: totrans-275
  prefs: []
  type: TYPE_NORMAL
  zh: 'Prompt:'
- en: '"Explain the concept of debugging in software development. Write a program
    in [Python/JavaScript/etc.] with intentional errors, and then demonstrate how
    to identify and fix them step by step using print statements or logging methods.
    Discuss the importance of debugging in the development process."'
  id: totrans-276
  prefs: []
  type: TYPE_NORMAL
  zh: '"解释软件开发中调试的概念。编写一个程序，使用 [Python/JavaScript 等] 故意包含错误，然后演示如何使用打印语句或日志方法逐步识别和修复它们。讨论调试在开发过程中的重要性。"'
- en: '2: Debugging with Breakpoints'
  id: totrans-277
  prefs: []
  type: TYPE_NORMAL
  zh: '2: 使用断点进行调试'
- en: 'Prompt:'
  id: totrans-278
  prefs: []
  type: TYPE_NORMAL
  zh: 'Prompt:'
- en: '"Write a program in [Python/JavaScript/etc.] that calculates the factorial
    of a number. Demonstrate how to use breakpoints in an IDE (e.g., PyCharm, VSCode)
    to inspect variable values at runtime and locate issues in the code. Explain how
    breakpoints improve the debugging process."'
  id: totrans-279
  prefs: []
  type: TYPE_NORMAL
  zh: '"编写一个程序，使用 [Python/JavaScript 等] 计算一个数的阶乘。演示如何在 IDE（例如，PyCharm，VSCode）中使用断点来检查运行时的变量值并定位代码中的问题。解释断点如何提高调试过程。"'
- en: '3: Using Python’s pdb Module'
  id: totrans-280
  prefs: []
  type: TYPE_NORMAL
  zh: '3: 使用 Python 的 pdb 模块'
- en: 'Prompt:'
  id: totrans-281
  prefs: []
  type: TYPE_NORMAL
  zh: 'Prompt:'
- en: '"Explain how to use Python''s pdb module for debugging. Write a script that
    calculates the average of a list of numbers and intentionally includes a bug.
    Use pdb to identify and fix the issue, and describe the key commands (n, s, c,
    l) used during debugging."'
  id: totrans-282
  prefs: []
  type: TYPE_NORMAL
  zh: '"解释如何使用 Python 的 pdb 模块进行调试。编写一个脚本来计算一系列数字的平均值，并故意包含一个错误。使用 pdb 识别和修复问题，并描述调试过程中使用的关键命令（n,
    s, c, l）。"'
- en: '4: Debugging Asynchronous Code in JavaScript'
  id: totrans-283
  prefs: []
  type: TYPE_NORMAL
  zh: '4: 在 JavaScript 中调试异步代码'
- en: 'Prompt:'
  id: totrans-284
  prefs: []
  type: TYPE_NORMAL
  zh: 'Prompt:'
- en: '"Write an asynchronous JavaScript program using Promises and intentionally
    introduce an error. Demonstrate how to debug the code using browser developer
    tools, specifically focusing on the Call Stack and Console. Discuss common challenges
    in debugging async code."'
  id: totrans-285
  prefs: []
  type: TYPE_NORMAL
  zh: '"编写一个使用 Promises 的异步 JavaScript 程序并故意引入一个错误。演示如何使用浏览器开发者工具调试代码，特别是关注调用堆栈和控制台。讨论调试异步代码的常见挑战。"'
- en: '5: Handling Division by Zero Errors'
  id: totrans-286
  prefs: []
  type: TYPE_NORMAL
  zh: '5: 处理除以零错误'
- en: 'Prompt:'
  id: totrans-287
  prefs: []
  type: TYPE_NORMAL
  zh: 'Prompt:'
- en: '"Write a function in [Python/JavaScript/etc.] that performs division of two
    numbers. Include error handling to catch division by zero errors and return an
    appropriate message. Explain the importance of anticipating edge cases during
    development."'
  id: totrans-288
  prefs: []
  type: TYPE_NORMAL
  zh: '"编写一个函数，使用 [Python/JavaScript 等] 对两个数字进行除法。包括错误处理来捕获除以零的错误并返回适当的消息。解释在开发过程中预见边缘情况的重要性。"'
- en: '6: Logging for Better Debugging'
  id: totrans-289
  prefs: []
  type: TYPE_NORMAL
  zh: '6: 更好的调试日志记录'
- en: 'Prompt:'
  id: totrans-290
  prefs: []
  type: TYPE_NORMAL
  zh: 'Prompt:'
- en: '"Write a program in [Python/JavaScript/etc.] to calculate the sum of a list
    of numbers. Use logging (e.g., Python’s logging module or JavaScript’s console.log)
    to record key steps in the program execution. Explain the difference between debugging
    with print statements and structured logging."'
  id: totrans-291
  prefs: []
  type: TYPE_NORMAL
  zh: '"编写一个程序，使用 [Python/JavaScript 等] 计算一系列数字的总和。使用日志记录（例如，Python 的 logging 模块或
    JavaScript 的 console.log）记录程序执行的关键步骤。解释使用打印语句和结构化日志进行调试之间的区别。"'
- en: '7: Debugging Memory Leaks in JavaScript'
  id: totrans-292
  prefs: []
  type: TYPE_NORMAL
  zh: '7: 调试 JavaScript 中的内存泄漏'
- en: 'Prompt:'
  id: totrans-293
  prefs: []
  type: TYPE_NORMAL
  zh: 'Prompt:'
- en: '"Explain what a memory leak is in JavaScript and how it can occur. Write a
    simple program that demonstrates a memory leak using event listeners. Use browser
    developer tools to identify and fix the issue, and provide best practices to avoid
    memory leaks in JavaScript."'
  id: totrans-294
  prefs: []
  type: TYPE_NORMAL
  zh: '"解释 JavaScript 中的内存泄漏是什么以及它如何发生。编写一个简单的程序，使用事件监听器演示内存泄漏。使用浏览器开发者工具识别和修复问题，并提供避免
    JavaScript 中内存泄漏的最佳实践。" '
- en: '8: Understanding Stack Traces'
  id: totrans-295
  prefs: []
  type: TYPE_NORMAL
  zh: '8: 理解堆栈跟踪'
- en: 'Prompt:'
  id: totrans-296
  prefs: []
  type: TYPE_NORMAL
  zh: 'Prompt:'
- en: '"Explain what a stack trace is and how to interpret it. Write a program in
    [Python/JavaScript/etc.] that intentionally raises an exception, then analyze
    the stack trace to locate the source of the error. Discuss how stack traces help
    in debugging complex applications."'
  id: totrans-297
  prefs: []
  type: TYPE_NORMAL
  zh: '"解释堆栈跟踪是什么以及如何解释它。编写一个程序，使用 [Python/JavaScript 等] 故意抛出异常，然后分析堆栈跟踪以定位错误的来源。讨论堆栈跟踪如何帮助调试复杂的应用程序。"'
- en: '9: Debugging Syntax Errors'
  id: totrans-298
  prefs: []
  type: TYPE_NORMAL
  zh: '9: 调试语法错误'
- en: 'Prompt:'
  id: totrans-299
  prefs: []
  type: TYPE_NORMAL
  zh: 'Prompt:'
- en: '"Write a program in [Python/JavaScript/etc.] with multiple syntax errors. Use
    the language-specific error messages to identify and fix each issue. Explain how
    syntax errors differ from runtime errors and provide tips for avoiding them."'
  id: totrans-300
  prefs: []
  type: TYPE_NORMAL
  zh: '"使用[Python/JavaScript等]编写一个包含多个语法错误的程序。使用特定语言的错误消息来识别和修复每个问题。解释语法错误与运行时错误的不同之处，并提供避免它们的技巧。"'
- en: '10: Handling File Not Found Errors'
  id: totrans-301
  prefs: []
  type: TYPE_NORMAL
  zh: '10: 处理文件未找到错误'
- en: 'Prompt:'
  id: totrans-302
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Write a program in [Python/JavaScript/etc.] to open and read a file. Include
    error handling to catch cases where the file does not exist and provide a user-friendly
    error message. Explain the importance of handling file-related errors gracefully."'
  id: totrans-303
  prefs: []
  type: TYPE_NORMAL
  zh: '"使用[Python/JavaScript等]编写一个程序以打开和读取文件。包括错误处理以捕获文件不存在的情况，并提供友好的错误消息。解释优雅地处理文件相关错误的重要性。"'
- en: '11: Debugging Loops'
  id: totrans-304
  prefs: []
  type: TYPE_NORMAL
  zh: '11: 调试循环'
- en: 'Prompt:'
  id: totrans-305
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Write a program in [Python/JavaScript/etc.] that calculates the sum of all
    even numbers in a list using a loop. Introduce a logical error in the loop and
    demonstrate how to debug it using step-by-step inspection of loop iterations."'
  id: totrans-306
  prefs: []
  type: TYPE_NORMAL
  zh: '"使用[Python/JavaScript等]编写一个程序，使用循环计算列表中所有偶数的总和。在循环中引入一个逻辑错误，并演示如何通过逐步检查循环迭代来调试它。"'
- en: '12: Debugging Multi-Threaded Code in Java'
  id: totrans-307
  prefs: []
  type: TYPE_NORMAL
  zh: '12: 调试Java中的多线程代码'
- en: 'Prompt:'
  id: totrans-308
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Write a multi-threaded Java program that prints numbers from 1 to 10 using
    two threads. Introduce a race condition and demonstrate how to debug and resolve
    it using synchronized methods. Explain common threading issues and how to address
    them."'
  id: totrans-309
  prefs: []
  type: TYPE_NORMAL
  zh: '"编写一个使用两个线程打印1到10的Java多线程程序。引入一个竞争条件，并演示如何使用同步方法进行调试和解决。解释常见的线程问题及其解决方法。"'
- en: '13: Using JavaScript’s Debugger Statement'
  id: totrans-310
  prefs: []
  type: TYPE_NORMAL
  zh: '13: 使用JavaScript的断言语句'
- en: 'Prompt:'
  id: totrans-311
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Write a JavaScript program with a bug and demonstrate how to use the debugger
    statement to pause execution and inspect variable values. Explain the advantages
    of using the debugger statement over manual logging."'
  id: totrans-312
  prefs: []
  type: TYPE_NORMAL
  zh: '"编写一个包含错误的JavaScript程序，并演示如何使用断言语句暂停执行并检查变量值。解释使用断言语句而不是手动记录的优势。"'
- en: '14: Handling Null Pointer Exceptions in Java'
  id: totrans-313
  prefs: []
  type: TYPE_NORMAL
  zh: '14: 处理Java中的空指针异常'
- en: 'Prompt:'
  id: totrans-314
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Write a Java program that demonstrates a NullPointerException scenario. Explain
    why the exception occurs and how to handle it gracefully using conditional checks
    or the Optional class."'
  id: totrans-315
  prefs: []
  type: TYPE_NORMAL
  zh: '"编写一个Java程序，演示NullPointerException场景。解释异常发生的原因以及如何使用条件检查或Optional类优雅地处理它。"'
- en: '15: Debugging Database Queries'
  id: totrans-316
  prefs: []
  type: TYPE_NORMAL
  zh: '15: 调试数据库查询'
- en: 'Prompt:'
  id: totrans-317
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Write an SQL query that joins two tables and intentionally introduce an error
    (e.g., a typo in a column name). Demonstrate how to debug the query using error
    messages and database tools like MySQL Workbench or pgAdmin. Provide best practices
    for writing error-free queries."'
  id: totrans-318
  prefs: []
  type: TYPE_NORMAL
  zh: '"编写一个SQL查询，连接两个表，并故意引入一个错误（例如，列名中的拼写错误）。使用错误消息和数据库工具（如MySQL Workbench或pgAdmin）演示如何调试查询。提供编写无错误查询的最佳实践。"'
- en: '16: Debugging Infinite Loops'
  id: totrans-319
  prefs: []
  type: TYPE_NORMAL
  zh: '16: 调试无限循环'
- en: 'Prompt:'
  id: totrans-320
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Write a program in [Python/JavaScript/etc.] with an intentional infinite loop.
    Explain how to detect and stop the loop during execution, and provide strategies
    to prevent infinite loops in code."'
  id: totrans-321
  prefs: []
  type: TYPE_NORMAL
  zh: '"使用[Python/JavaScript等]编写一个包含故意无限循环的程序。解释如何在执行期间检测并停止循环，并提供建议以防止代码中的无限循环。"'
- en: '17: Using Assertions for Debugging'
  id: totrans-322
  prefs: []
  type: TYPE_NORMAL
  zh: '17: 使用断言进行调试'
- en: 'Prompt:'
  id: totrans-323
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Explain the concept of assertions in programming. Write a program in [Python/JavaScript/etc.]
    that uses assertions to check input conditions for a function. Discuss how assertions
    can serve as a debugging tool and their limitations."'
  id: totrans-324
  prefs: []
  type: TYPE_NORMAL
  zh: '"解释编程中的断言概念。使用[Python/JavaScript等]编写一个程序，使用断言检查函数的输入条件。讨论断言如何作为调试工具及其局限性。"'
- en: '18: Debugging REST API Errors'
  id: totrans-325
  prefs: []
  type: TYPE_NORMAL
  zh: '18: 调试REST API错误'
- en: 'Prompt:'
  id: totrans-326
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Write a simple REST API in [Python (Flask)/JavaScript (Node.js)]. Introduce
    an intentional bug in one of the endpoints and demonstrate how to debug it using
    tools like Postman or curl. Discuss common API debugging techniques, such as analyzing
    response status codes and payloads."'
  id: totrans-327
  prefs: []
  type: TYPE_NORMAL
  zh: '"使用[Python (Flask)/JavaScript (Node.js)]编写一个简单的REST API。在一个端点中引入一个故意的错误，并演示如何使用Postman或curl等工具进行调试。讨论常见的API调试技术，例如分析响应状态码和有效载荷。"'
- en: '19: Debugging Regular Expressions'
  id: totrans-328
  prefs: []
  type: TYPE_NORMAL
  zh: '19: 调试正则表达式'
- en: 'Prompt:'
  id: totrans-329
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Write a program in [Python/JavaScript/etc.] that uses a Regular Expression
    (Regex) to validate email addresses. Introduce a bug in the Regex pattern and
    demonstrate how to debug it using online tools like regex101\. Discuss common
    pitfalls in Regex debugging."'
  id: totrans-330
  prefs: []
  type: TYPE_NORMAL
  zh: '"编写一个[Python/JavaScript等]程序，使用正则表达式（Regex）验证电子邮件地址。在正则表达式模式中引入一个错误，并演示如何使用在线工具（如regex101）调试它。讨论正则表达式调试中的常见陷阱。"'
- en: '20: Handling Timeouts in JavaScript'
  id: totrans-331
  prefs: []
  type: TYPE_NORMAL
  zh: '20: 在JavaScript中处理超时'
- en: 'Prompt:'
  id: totrans-332
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Write an asynchronous JavaScript program that fetches data from a public API.
    Simulate a timeout error and demonstrate how to handle it gracefully using Promises
    or async/await. Explain strategies to prevent timeout errors in production applications."'
  id: totrans-333
  prefs: []
  type: TYPE_NORMAL
  zh: '"编写一个异步JavaScript程序，从公共API获取数据。模拟超时错误并演示如何使用Promises或async/await优雅地处理它。解释在生产应用程序中防止超时错误的方法。"'
- en: '21: Debugging Import Errors in Python'
  id: totrans-334
  prefs: []
  type: TYPE_NORMAL
  zh: '21: 调试Python中的导入错误'
- en: 'Prompt:'
  id: totrans-335
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Write a Python program that imports a custom module. Introduce an error in
    the module import (e.g., incorrect file name or missing dependencies) and demonstrate
    how to debug and resolve it. Provide tips for managing imports in Python projects."'
  id: totrans-336
  prefs: []
  type: TYPE_NORMAL
  zh: '"编写一个Python程序，导入一个自定义模块。在模块导入中引入一个错误（例如，文件名不正确或缺少依赖项）并演示如何调试和解决它。提供管理Python项目中导入的技巧。"'
- en: '22: Debugging Configuration Issues in Java'
  id: totrans-337
  prefs: []
  type: TYPE_NORMAL
  zh: '22: 在Java中调试配置问题'
- en: 'Prompt:'
  id: totrans-338
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Write a Java application that connects to a database using a configuration
    file. Introduce a bug in the configuration file (e.g., incorrect database URL)
    and demonstrate how to debug it. Discuss the importance of validating configuration
    settings."'
  id: totrans-339
  prefs: []
  type: TYPE_NORMAL
  zh: '"编写一个Java应用程序，使用配置文件连接到数据库。在配置文件中引入一个错误（例如，数据库URL不正确）并演示如何调试它。讨论验证配置设置的重要性。"'
- en: '23: Debugging Variable Scope Issues'
  id: totrans-340
  prefs: []
  type: TYPE_NORMAL
  zh: '23: 调试变量作用域问题'
- en: 'Prompt:'
  id: totrans-341
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Write a program in [Python/JavaScript/etc.] that demonstrates a bug caused
    by incorrect variable scoping (e.g., a variable shadowing issue). Explain how
    to identify and fix scope-related bugs and provide best practices for managing
    scope in code."'
  id: totrans-342
  prefs: []
  type: TYPE_NORMAL
  zh: '"编写一个[Python/JavaScript等]程序，演示由不正确的变量作用域引起的错误（例如，变量遮蔽问题）。解释如何识别和修复作用域相关的错误，并提供管理代码中作用域的最佳实践。"'
- en: '24: Debugging Serialization Errors'
  id: totrans-343
  prefs: []
  type: TYPE_NORMAL
  zh: '24: 调试序列化错误'
- en: 'Prompt:'
  id: totrans-344
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Write a program in [Python/Java/etc.] that serializes and deserializes a data
    object. Introduce an error (e.g., missing fields during deserialization) and demonstrate
    how to debug and resolve it. Discuss the importance of data validation in serialization
    processes."'
  id: totrans-345
  prefs: []
  type: TYPE_NORMAL
  zh: '"编写一个[Python/Java等]程序，序列化和反序列化数据对象。引入一个错误（例如，反序列化时缺少字段）并演示如何调试和解决它。讨论数据验证在序列化过程中的重要性。"'
- en: '25: Handling Runtime Errors in JavaScript'
  id: totrans-346
  prefs: []
  type: TYPE_NORMAL
  zh: '25: 在JavaScript中处理运行时错误'
- en: 'Prompt:'
  id: totrans-347
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Write a JavaScript program that demonstrates a runtime error (e.g., accessing
    an undefined variable). Use try-catch blocks to handle the error and provide user-friendly
    feedback. Explain the difference between runtime and compile-time errors."'
  id: totrans-348
  prefs: []
  type: TYPE_NORMAL
  zh: '"编写一个JavaScript程序，演示运行时错误（例如，访问未定义的变量）。使用try-catch块来处理错误并提供用户友好的反馈。解释运行时错误和编译时错误的区别。"'
- en: '26: Debugging Network Requests in Python'
  id: totrans-349
  prefs: []
  type: TYPE_NORMAL
  zh: '26: 在Python中调试网络请求'
- en: 'Prompt:'
  id: totrans-350
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Write a Python script that makes a GET request to a public API using the requests
    library. Simulate an error (e.g., incorrect URL or timeout) and demonstrate how
    to debug network-related issues using status codes and exception handling."'
  id: totrans-351
  prefs: []
  type: TYPE_NORMAL
  zh: '"编写一个Python脚本，使用requests库向公共API发起GET请求。模拟一个错误（例如，URL不正确或超时）并演示如何使用状态码和异常处理调试网络相关的问题。"'
- en: '27: Debugging Circular Dependencies in JavaScript'
  id: totrans-352
  prefs: []
  type: TYPE_NORMAL
  zh: '27: 在JavaScript中调试循环依赖'
- en: 'Prompt:'
  id: totrans-353
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Explain what circular dependencies are and how they occur in JavaScript modules.
    Write a simple program to demonstrate a circular dependency issue and discuss
    strategies to debug and resolve it, such as restructuring modules."'
  id: totrans-354
  prefs: []
  type: TYPE_NORMAL
  zh: '"解释循环依赖在JavaScript模块中的含义以及它们是如何发生的。编写一个简单的程序来演示循环依赖问题，并讨论调试和解决它的策略，例如重构模块。"'
- en: '28: Handling Exceptions in Asynchronous Python Code'
  id: totrans-355
  prefs: []
  type: TYPE_NORMAL
  zh: '28: 在异步Python代码中处理异常'
- en: 'Prompt:'
  id: totrans-356
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Write an asynchronous Python program that fetches data from multiple APIs.
    Introduce an intentional bug (e.g., an invalid API endpoint) and demonstrate how
    to handle exceptions in async code using try-except blocks and asyncio''s exception
    handling features."'
  id: totrans-357
  prefs: []
  type: TYPE_NORMAL
  zh: '"编写一个异步Python程序，从多个API获取数据。引入一个故意的错误（例如，无效的API端点）并演示如何使用try-except块和asyncio的异常处理功能处理异步代码中的异常。"'
- en: '29: Debugging Event Listeners in JavaScript'
  id: totrans-358
  prefs: []
  type: TYPE_NORMAL
  zh: '29: 在JavaScript中调试事件监听器'
- en: 'Prompt:'
  id: totrans-359
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Write a JavaScript program that adds event listeners to buttons on a web page.
    Introduce a bug in the event listener logic and demonstrate how to debug it using
    browser developer tools. Discuss common issues with event listeners and how to
    fix them."'
  id: totrans-360
  prefs: []
  type: TYPE_NORMAL
  zh: '"编写一个JavaScript程序，为网页上的按钮添加事件监听器。在事件监听器逻辑中引入一个错误，并演示如何使用浏览器开发者工具进行调试。讨论事件监听器常见的错误及其修复方法。"'
- en: '30: Debugging Infinite Recursion in Python'
  id: totrans-361
  prefs: []
  type: TYPE_NORMAL
  zh: '30: 调试Python中的无限递归'
- en: 'Prompt:'
  id: totrans-362
  prefs: []
  type: TYPE_NORMAL
  zh: 'Prompt:'
- en: '"Write a recursive Python function to calculate the sum of a list of numbers.
    Introduce a bug that causes infinite recursion and demonstrate how to debug it
    using stack trace analysis and base case validation. Discuss how to avoid infinite
    recursion in recursive functions."'
  id: totrans-363
  prefs: []
  type: TYPE_NORMAL
  zh: '"编写一个递归Python函数来计算数字列表的总和。引入一个导致无限递归的错误，并演示如何使用堆栈跟踪分析和基本案例验证来调试它。讨论如何在递归函数中避免无限递归。"'
- en: Software Design and Architecture
  id: totrans-364
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 软件设计和架构
- en: A well-designed system isn’t just functional; it’s scalable, maintainable, and
    robust. Here, I introduce prompts that empower you to think like a software architect.
    From structuring your code to designing efficient workflows, you’ll learn to create
    solutions that stand the test of time.
  id: totrans-365
  prefs: []
  type: TYPE_NORMAL
  zh: 一个设计良好的系统不仅仅是功能性的；它还应该是可扩展的、可维护的和健壮的。在这里，我介绍了能够让你像软件架构师一样思考的提示。从结构化你的代码到设计高效的流程，你将学会创建经得起时间考验的解决方案。
- en: '1: Understanding Software Architecture Basics'
  id: totrans-366
  prefs: []
  type: TYPE_NORMAL
  zh: '1: 理解软件架构基础'
- en: 'Prompt:'
  id: totrans-367
  prefs: []
  type: TYPE_NORMAL
  zh: 'Prompt:'
- en: '"Explain the fundamental concepts of software architecture, including layers,
    modules, and components. Write a simple example of a three-layer architecture
    (Presentation, Business Logic, Data Access) in [Python/Java/etc.]. Discuss the
    benefits of using layered architecture in software development."'
  id: totrans-368
  prefs: []
  type: TYPE_NORMAL
  zh: '"解释软件架构的基本概念，包括层、模块和组件。在[Python/Java等]中编写一个三层架构（表示层、业务逻辑层、数据访问层）的简单示例。讨论在软件开发中使用分层架构的优点。"'
- en: '2: Designing a Scalable System'
  id: totrans-369
  prefs: []
  type: TYPE_NORMAL
  zh: '2: 设计可扩展的系统'
- en: 'Prompt:'
  id: totrans-370
  prefs: []
  type: TYPE_NORMAL
  zh: 'Prompt:'
- en: '"Write a design plan for a scalable e-commerce platform that handles high traffic.
    Include considerations for database design, caching strategies, load balancing,
    and API structure. Explain how scalability is achieved and what trade-offs might
    be involved."'
  id: totrans-371
  prefs: []
  type: TYPE_NORMAL
  zh: '"编写一个可扩展的电子商务平台的设计计划，该平台可以处理高流量。包括数据库设计、缓存策略、负载均衡和API结构方面的考虑。解释如何实现可扩展性以及可能涉及到的权衡。"'
- en: '3: Explaining Design Patterns'
  id: totrans-372
  prefs: []
  type: TYPE_NORMAL
  zh: '3: 解释设计模式'
- en: 'Prompt:'
  id: totrans-373
  prefs: []
  type: TYPE_NORMAL
  zh: 'Prompt:'
- en: '"Explain what design patterns are and why they are used in software development.
    Write an example of the Singleton pattern in [Python/Java/etc.], including its
    implementation, advantages, and potential drawbacks. Discuss scenarios where the
    Singleton pattern is particularly useful."'
  id: totrans-374
  prefs: []
  type: TYPE_NORMAL
  zh: '"解释设计模式是什么以及为什么在软件开发中使用它们。在[Python/Java等]中编写Singleton模式的示例，包括其实现、优点和潜在缺点。讨论Singleton模式特别有用的场景。"'
- en: '4: Understanding Microservices Architecture'
  id: totrans-375
  prefs: []
  type: TYPE_NORMAL
  zh: '4: 理解微服务架构'
- en: 'Prompt:'
  id: totrans-376
  prefs: []
  type: TYPE_NORMAL
  zh: 'Prompt:'
- en: '"Explain the concept of microservices architecture and how it differs from
    monolithic architecture. Write a sample design for a microservices-based application
    with services for user authentication, product catalog, and order management.
    Discuss the benefits and challenges of using microservices."'
  id: totrans-377
  prefs: []
  type: TYPE_NORMAL
  zh: '"解释微服务架构的概念以及它与单体架构的区别。为基于微服务的应用程序编写一个示例设计，包括用户认证、产品目录和订单管理服务。讨论使用微服务的优势和挑战。"'
- en: '5: Building a RESTful API'
  id: totrans-378
  prefs: []
  type: TYPE_NORMAL
  zh: '5: 构建RESTful API'
- en: 'Prompt:'
  id: totrans-379
  prefs: []
  type: TYPE_NORMAL
  zh: 'Prompt:'
- en: '"Write a design and implementation plan for a RESTful API that provides endpoints
    for managing a library''s catalog. Include CRUD operations, data validation, and
    error handling. Explain how REST principles guide the design of APIs and how they
    improve interoperability."'
  id: totrans-380
  prefs: []
  type: TYPE_NORMAL
  zh: '"编写一个RESTful API的设计和实现计划，该API提供管理图书馆目录的端点。包括CRUD操作、数据验证和错误处理。解释REST原则如何指导API的设计以及它们如何提高互操作性。"'
- en: '6: Event-Driven Architecture Design'
  id: totrans-381
  prefs: []
  type: TYPE_NORMAL
  zh: '6: 事件驱动架构设计'
- en: 'Prompt:'
  id: totrans-382
  prefs: []
  type: TYPE_NORMAL
  zh: 'Prompt:'
- en: '"Explain the principles of event-driven architecture. Write a sample design
    for a real-time chat application using an event-driven approach. Include an explanation
    of how events are propagated and handled, as well as the benefits of this architecture
    for real-time systems."'
  id: totrans-383
  prefs: []
  type: TYPE_NORMAL
  zh: '"解释事件驱动架构的原则。使用事件驱动方法编写一个实时聊天应用的示例设计。包括解释事件是如何传播和处理的，以及这种架构对实时系统的优势。"'
- en: '7: Understanding Dependency Injection'
  id: totrans-384
  prefs: []
  type: TYPE_NORMAL
  zh: '7: 理解依赖注入'
- en: 'Prompt:'
  id: totrans-385
  prefs: []
  type: TYPE_NORMAL
  zh: 'Prompt:'
- en: '"Explain the concept of dependency injection and why it is important in software
    design. Write a program in [Python/Java/etc.] that demonstrates dependency injection
    in action, and discuss how it improves modularity and testability."'
  id: totrans-386
  prefs: []
  type: TYPE_NORMAL
  zh: '"解释依赖注入的概念以及为什么它在软件设计中很重要。编写一个演示依赖注入的程序，并讨论它如何提高模块化和可测试性。"'
- en: '8: Using UML for Software Design'
  id: totrans-387
  prefs: []
  type: TYPE_NORMAL
  zh: '8: 使用 UML 进行软件设计'
- en: 'Prompt:'
  id: totrans-388
  prefs: []
  type: TYPE_NORMAL
  zh: 'Prompt:'
- en: '"Write a step-by-step guide to creating a UML class diagram for a hospital
    management system. Include examples of classes, relationships, and attributes.
    Explain how UML helps in communicating design ideas to both technical and non-technical
    stakeholders."'
  id: totrans-389
  prefs: []
  type: TYPE_NORMAL
  zh: '"编写一个为医院管理系统创建 UML 类图的逐步指南。包括类、关系和属性的示例。解释 UML 如何帮助向技术和非技术利益相关者传达设计理念。"'
- en: '9: Designing for Fault Tolerance'
  id: totrans-390
  prefs: []
  type: TYPE_NORMAL
  zh: '9: 设计容错性'
- en: 'Prompt:'
  id: totrans-391
  prefs: []
  type: TYPE_NORMAL
  zh: 'Prompt:'
- en: '"Design a system for a payment processing application with fault tolerance
    in mind. Include mechanisms for handling failures such as retries, backups, and
    circuit breakers. Explain how fault tolerance enhances system reliability and
    availability."'
  id: totrans-392
  prefs: []
  type: TYPE_NORMAL
  zh: '"设计一个具有容错性的支付处理应用程序系统。包括处理失败（如重试、备份和断路器）的机制。解释容错性如何增强系统可靠性和可用性。"'
- en: '10: Understanding the Builder Design Pattern'
  id: totrans-393
  prefs: []
  type: TYPE_NORMAL
  zh: '10: 理解建造者设计模式'
- en: 'Prompt:'
  id: totrans-394
  prefs: []
  type: TYPE_NORMAL
  zh: 'Prompt:'
- en: '"Explain the Builder design pattern and its use cases. Write a program in [Python/Java/etc.]
    that uses the Builder pattern to construct a complex object, such as a vehicle
    with various configurable options. Discuss when and why to use the Builder pattern."'
  id: totrans-395
  prefs: []
  type: TYPE_NORMAL
  zh: '"解释建造者设计模式及其用例。编写一个使用建造者模式构建复杂对象（如具有各种可配置选项的车辆）的程序。讨论何时以及为什么使用建造者模式。"'
- en: '11: Architectural Trade-Offs'
  id: totrans-396
  prefs: []
  type: TYPE_NORMAL
  zh: '11: 架构权衡'
- en: 'Prompt:'
  id: totrans-397
  prefs: []
  type: TYPE_NORMAL
  zh: 'Prompt:'
- en: '"Discuss the trade-offs between consistency and availability in distributed
    systems. Provide an example scenario where prioritizing one over the other is
    necessary, and explain how architectural decisions align with business goals."'
  id: totrans-398
  prefs: []
  type: TYPE_NORMAL
  zh: '"讨论分布式系统中一致性和可用性之间的权衡。提供一个优先考虑一方而非另一方的必要场景示例，并解释架构决策如何与业务目标相一致。"'
- en: '12: Designing a Logging Framework'
  id: totrans-399
  prefs: []
  type: TYPE_NORMAL
  zh: '12: 设计日志框架'
- en: 'Prompt:'
  id: totrans-400
  prefs: []
  type: TYPE_NORMAL
  zh: 'Prompt:'
- en: '"Write a design plan for a centralized logging framework in a distributed system.
    Include components such as log aggregators, storage, and visualization tools.
    Discuss how centralized logging aids in monitoring and debugging large-scale applications."'
  id: totrans-401
  prefs: []
  type: TYPE_NORMAL
  zh: '"编写一个在分布式系统中创建集中式日志框架的设计计划。包括日志聚合器、存储和可视化工具等组件。讨论集中式日志如何帮助监控和调试大规模应用程序。"'
- en: '13: Domain-Driven Design (DDD)'
  id: totrans-402
  prefs: []
  type: TYPE_NORMAL
  zh: '13: 领域驱动设计 (DDD)'
- en: 'Prompt:'
  id: totrans-403
  prefs: []
  type: TYPE_NORMAL
  zh: 'Prompt:'
- en: '"Explain the principles of Domain-Driven Design (DDD). Write an example of
    defining a domain model for a flight booking system, including entities, value
    objects, and aggregates. Discuss the benefits of DDD in handling complex business
    requirements."'
  id: totrans-404
  prefs: []
  type: TYPE_NORMAL
  zh: '"解释领域驱动设计 (DDD) 的原则。编写一个为航班预订系统定义领域模型的示例，包括实体、值对象和聚合。讨论 DDD 在处理复杂业务需求方面的优势。"'
- en: '14: Designing for High Availability'
  id: totrans-405
  prefs: []
  type: TYPE_NORMAL
  zh: '14: 设计高可用性'
- en: 'Prompt:'
  id: totrans-406
  prefs: []
  type: TYPE_NORMAL
  zh: 'Prompt:'
- en: '"Write a design for a high-availability email notification system. Include
    strategies such as load balancing, failover mechanisms, and redundancy. Explain
    how these strategies ensure continuous operation and minimal downtime."'
  id: totrans-407
  prefs: []
  type: TYPE_NORMAL
  zh: '"设计一个高可用性电子邮件通知系统。包括负载均衡、故障转移机制和冗余等策略。解释这些策略如何确保连续运行和最小化停机时间。"'
- en: '15: Implementing the Observer Pattern'
  id: totrans-408
  prefs: []
  type: TYPE_NORMAL
