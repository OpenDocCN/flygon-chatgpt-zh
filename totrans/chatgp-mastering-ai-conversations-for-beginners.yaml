  id: totrans-1062
  prefs: []
  type: TYPE_NORMAL
  zh: '**有许多方法**可以使对话式人工智能和深度学习LLMs提高数字连通性和可及性。**AI助手**如Siri以及**辅助技术**如谷歌语音访问的发展，有助于提高使用手机和电脑等技术的残疾人的独立性。屏幕阅读应用、语音命令和视频上的**闭字幕**使信息和娱乐比以往任何时候都更容易获得。通过这种方式，对话式AI正在尽其所能确保残疾人不会被遗留在我们驶入数字时代的过程中。让我们看看ChatGPT和其他对话式AI是如何帮助提高可及性，从而改善残疾人或残疾人的生活，使他们能够比以往更多地参与数字时代。'
