- en: So, at the end of the day, it will be able to understand audio spoken by yourself
    and probably any language spoken by your friends and colleagues.
  id: totrans-586
  prefs: []
  type: TYPE_NORMAL
  zh: 所以，最终，它将能够理解你自己说的音频，以及可能你朋友和同事说的任何语言。
- en: Developers are limited to send no more than 50 requests per minute to the endpoint,
    so this constraint needs to be taken into consideration if you want to transcribe
    vast amounts of audio.
  id: totrans-587
  prefs: []
  type: TYPE_NORMAL
  zh: 开发者被限制每分钟向端点发送不超过 50 个请求，因此如果你想要转录大量音频，需要考虑这个限制。
- en: Whisper supports audio in flac, mp3, mp4, mpeg, mpga, m4a, ogg, wav, or webm
    formats. Regardless of the format that you use, the maximum file size to send
    to the endpoint is 25MB.
  id: totrans-588
  prefs: []
  type: TYPE_NORMAL
  zh: Whisper 支持以下格式的音频：flac、mp3、mp4、mpeg、mpga、m4a、ogg、wav 或 webm。无论你使用哪种格式，发送到端点的最大文件大小为
    25MB。
- en: Now, if you haven’t worked extensively with audio files, please be aware that
    some formats create REALLY HUGE files (e.g., wav format), and others create really
    small files (e.g., m4a format). So, converting your file to a different format
    can help you with the 25MB limitation. However, later in this chapter, we’ll see
    the code for a tool that takes a single large audio file and splits it into multiple,
    smaller files.
  id: totrans-589
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，如果你没有大量处理音频文件，请注意，某些格式会创建非常大的文件（例如，wav 格式），而其他格式会创建非常小的文件（例如，m4a 格式）。因此，将你的文件转换为不同的格式可以帮助你克服
    25MB 的限制。然而，在本章的后面，我们将看到如何使用一个工具将单个大音频文件分割成多个较小的文件。
- en: Transcriptions Endpoint
  id: totrans-590
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 转写端点
- en: The Transcriptions Endpoint is a REST service that converts audio into text,
    and is only compatible with the Whisper model.
  id: totrans-591
  prefs: []
  type: TYPE_NORMAL
  zh: 转写端点是一个 REST 服务，它将音频转换为文本，并且仅与 Whisper 模型兼容。
- en: Creating the Request
  id: totrans-592
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 创建请求
- en: Table [4-1](#Tab1) lists all the HTTP parameters necessary to call the Transcriptions
    Endpoint.Table 4-1
  id: totrans-593
  prefs: []
  type: TYPE_NORMAL
  zh: 表 [4-1](#Tab1) 列出了调用转写端点所需的全部 HTTP 参数。表 4-1
- en: The HTTP Parameters for the Transcriptions Endpoint
  id: totrans-594
  prefs: []
  type: TYPE_NORMAL
  zh: 转写端点的 HTTP 参数
- en: '| HTTP Param | Description |'
  id: totrans-595
  prefs: []
  type: TYPE_TB
  zh: '| HTTP 参数 | 描述 |'
- en: '| --- | --- |'
  id: totrans-596
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- |'
- en: '| Endpoint URL | [https://api.openai.com/v1/audio/transcriptions](https://api.openai.com/v1/audio/transcriptions)
    |'
  id: totrans-597
  prefs: []
  type: TYPE_TB
  zh: '| 端点 URL | [https://api.openai.com/v1/audio/transcriptions](https://api.openai.com/v1/audio/transcriptions)
    |'
- en: '| Method | POST |'
  id: totrans-598
  prefs: []
  type: TYPE_TB
  zh: '| 方法 | POST |'
- en: '| Header | Authorization: Bearer **$OPENAI_API_KEY** |'
  id: totrans-599
  prefs: []
  type: TYPE_TB
  zh: '| 头部 | 授权：Bearer **$OPENAI_API_KEY** |'
- en: '| Content-Type | multipart/form-data |'
  id: totrans-600
  prefs: []
  type: TYPE_TB
  zh: '| 内容类型 | multipart/form-data |'
- en: Note
  id: totrans-601
  prefs: []
  type: TYPE_NORMAL
  zh: 备注
- en: Pay close attention to the content-type in the preceding table! Unlike the Chat
    Endpoint that sends all HTTP request parameters as a JSON object, the Transcriptions
    Endpoint only accepts parameters as **Form data elements**. If you try to send
    a well-formatted (or even a poorly formatted) JSON object, the Transcriptions
    Endpoint will return a very opaque error.
  id: totrans-602
  prefs: []
  type: TYPE_NORMAL
  zh: 请密切注意前面表格中的内容类型！与发送所有 HTTP 请求参数作为 JSON 对象的 Chat 端点不同，转写端点仅接受作为 **表单数据元素** 的参数。如果你尝试发送格式良好的（甚至格式糟糕的）JSON
    对象，转写端点将返回一个非常模糊的错误。
- en: Request Body (Multipart Form Data)
  id: totrans-603
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 请求体（多部分表单数据）
- en: Table 4-2
  id: totrans-604
  prefs: []
  type: TYPE_NORMAL
  zh: 表 4-2
- en: The Request Body for Whisper
  id: totrans-605
  prefs: []
  type: TYPE_NORMAL
  zh: Whisper 请求体
- en: '| Field | Type | Required? | Description |'
  id: totrans-606
  prefs: []
  type: TYPE_TB
  zh: '| 字段 | 类型 | 是否必需 | 描述 |'
- en: '| --- | --- | --- | --- |'
  id: totrans-607
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- | --- | --- |'
- en: '| File | file | Required | The entire audio file that you want to be transcribed.Accepted
    formats are• flac• mp3• mp4• mpeg• mpga• m4a• ogg• wav• webm |'
  id: totrans-608
  prefs: []
  type: TYPE_TB
  zh: '| 文件 | 文件 | 必需 | 您想要转录的整个音频文件。接受的格式是• flac• mp3• mp4• mpeg• mpga• m4a• ogg• wav• webm
    |'
- en: '| Model | String | Required | The ID of the model that you want to use for
    transcription.Compatible models include• whisper-1 |'
  id: totrans-609
  prefs: []
  type: TYPE_TB
  zh: '| 模型 | 字符串 | 必需 | 您想要用于转录的模型的ID。兼容的模型包括• whisper-1 |'
- en: '| prompt | String | Optional | This is any text that can be provided to change
    the model’s transcription style or to provide it with more context from a previous
    segment of audio.Be sure that the prompt is in the same language as the audio
    for best results.Additionally, this field can be used to change the spelling or
    capitalization of any words that Whisper is not familiar with. |'
  id: totrans-610
  prefs: []
  type: TYPE_TB
  zh: '| 提示 | 字符串 | 可选 | 这可以是提供给模型以改变转录风格或从之前的音频片段提供更多上下文的任何文本。请确保提示与音频语言相同，以获得最佳结果。此外，此字段可用于更改Whisper不熟悉的任何单词的拼写或大小写。
    |'
- en: '| response_format | Stringdefault: json | Optional | This is the format of
    the output of transcription.Accepted formats are• json• text• srt• verbose_json• vtt
    |'
  id: totrans-611
  prefs: []
  type: TYPE_TB
  zh: '| 响应格式 | 字符串 默认值：json | 可选 | 这是转录输出的格式。接受的格式是• json• text• srt• verbose_json• vtt
    |'
- en: '| temperature | Number default: 0 | Optional | This is the sampling temperature,
    ranging from 0 to 1.A higher value increases the randomness of the output, whereas
    a lower value ensures a more deterministic output. |'
  id: totrans-612
  prefs: []
  type: TYPE_TB
  zh: '| 温度 | 数字 默认值：0 | 可选 | 这是采样温度，范围从0到1。更高的值会增加输出的随机性，而较低的值确保输出更加确定。 |'
- en: '| language | String | Optional | This is the language of the input audio. It’s
    optional, but providing the value can improve the accuracy and latency for the
    transcription. |'
  id: totrans-613
  prefs: []
  type: TYPE_TB
  zh: '| 语言 | 字符串 | 可选 | 这是输入音频的语言。这是可选的，但提供此值可以提高转录的准确性和延迟。 |'
- en: 'Creating a Utility App to Split Audio Files: AudioSplitter.java'
  id: totrans-614
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 创建分割音频文件的实用应用程序：AudioSplitter.java
- en: So, we’re almost at the point where we are able to programmatically invoke the
    Whisper model using the Transcriptions Endpoint. However, the Whisper Model has
    a limitation of 25MB per file.
  id: totrans-615
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们几乎到了能够使用转录端点程序调用Whisper模型的地步。然而，Whisper模型对每个文件的限制是25MB。
- en: Now, this is not a problem if you’re listening to, for example, the StarDate
    podcast from the University of Texas at Austin. This podcast gives you a great
    glimpse of what to look for in the nighttime sky in about 2 minutes of audio.
    However, that’s not the case for other audio programs which tend to last for up
    to an hour (or even more). In cases like that, you’re going to definitely exceed
    the 25MB file limitation.
  id: totrans-616
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，如果您正在收听，例如，德克萨斯大学奥斯汀分校的StarDate播客，这不会成为问题。这个播客在约2分钟的音频中为您提供了关于夜空中要寻找什么的绝佳视角。然而，对于其他音频节目，它们通常持续长达一小时（甚至更长）。在这种情况下，您肯定会超过25MB的文件限制。
- en: Therefore, let’s pair-program with ChatGPT and use our human intelligence to
    create our own utility that will take a single audio file and split it into multiple
    smaller files.
  id: totrans-617
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，让我们与ChatGPT进行配对编程，并利用我们的人类智慧来创建我们自己的实用程序，该实用程序将单个音频文件分割成多个更小的文件。
- en: Note
  id: totrans-618
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: In this section, I’m presenting one of many possibilities available on how to
    segment a large audio file into smaller pieces. For instance, you can use popular
    audio editing apps (such as the Open Source tool, Audacity, or the licensed tool,
    Adobe Audition) to manually cut up a large file into smaller files.
  id: totrans-619
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，我将展示如何将大型音频文件分割成更小片段的多种可能性之一。例如，您可以使用流行的音频编辑应用程序（如开源工具Audacity或授权工具Adobe
    Audition）手动将大文件切割成更小的文件。
- en: 'Listing [4-2](#PC2) is the prompt that I sent to ChatGPT in order to get a
    basic app that splits audio files.**System**: You are a Java developer**User**:
    Write an application that takes as input a single MP3 file and splits the file
    into contiguous segments no longer than 10 minutes. Name the file, "AudioSplitter.java"Listing
    4-2'
  id: totrans-620
  prefs: []
  type: TYPE_NORMAL
  zh: 列表[4-2](#PC2)是我发送给ChatGPT以获取分割音频文件的基本应用程序的提示。**系统**：您是一位Java开发者**用户**：编写一个应用程序，它接受单个MP3文件作为输入，并将文件分割成不超过10分钟的连续片段。文件名为"AudioSplitter.java"列表4-2
- en: PROMPT. Using ChatGPT to Create the AudioSplitter.java App
  id: totrans-621
  prefs: []
  type: TYPE_NORMAL
  zh: PROMPT. 使用ChatGPT创建AudioSplitter.java应用程序
- en: After a little back and forth, I was able to create (as shown in Listing [4-3](#PC3))
    the AudioSplitter.Java application that includes my edits to what was generated
    by ChatGPT.![](../images/607613_1_En_4_Chapter/607613_1_En_4_Figa_HTML.gif)A logo
    of open A I.import org.bytedeco.javacv.FFmpegFrameGrabber;import org.bytedeco.javacv.FFmpegFrameRecorder;import
    java.io.IOException;public class AudioSplitter {        public static void main(String[]
    args) {        String inputFilePath = "path/to/file/sample.mp3";        String
    outputDirectory = "path/to/folder/";        int segmentDurationInSeconds = 600;
    // 10 minutes in seconds        try (FFmpegFrameGrabber grabber = new FFmpegFrameGrabber(inputFilePath))
    {            grabber.start();            long totalDurationInSeconds = (long)
    grabber.getLengthInTime() / 1000000; // Convert microseconds to seconds            double
    frameRate = grabber.getFrameRate();            long segmentStartTime = 0;            long
    segmentEndTime;            int segmentNumber = 1;            while (segmentStartTime
    < totalDurationInSeconds) {                String outputFilePath = outputDirectory
    + "segment_" + segmentNumber + ".mp3";                try (FFmpegFrameRecorder
    recorder = new FFmpegFrameRecorder(outputFilePath, 0)) {                    recorder.setAudioChannels(2);                    recorder.setAudioCodecName("libmp3lame");
    // Set the audio codec to MP3                    recorder.setAudioBitrate(192000);
    // Adjust bitrate as needed                    recorder.setSampleRate(44100);
    // Adjust sample rate as needed                    recorder.setFrameRate(frameRate);                    recorder.setFormat("mp3");
    // Set the output format to MP3                    recorder.start();                    segmentEndTime
    = Math.min(segmentStartTime + segmentDurationInSeconds, totalDurationInSeconds);                    grabber.setTimestamp(segmentStartTime
    * 1000000); // Set the grabber's timestamp to the start time in microseconds                    while
    (grabber.getTimestamp() / 1000000 < segmentEndTime) {                        recorder.record(grabber.grabSamples());                    }                }                segmentStartTime
    = segmentEndTime;                segmentNumber++;            }        } catch
    (IOException e) {            e.printStackTrace();        }        }}Listing 4-3
  id: totrans-622
  prefs: []
  type: TYPE_NORMAL
  zh: 经过一番尝试，我能够创建（如列表[4-3](#PC3)所示）包含我对ChatGPT生成的代码编辑的AudioSplitter.Java应用程序！![开放AI的标志](../images/607613_1_En_4_Chapter/607613_1_En_4_Figa_HTML.gif)导入org.bytedeco.javacv.FFmpegFrameGrabber;导入org.bytedeco.javacv.FFmpegFrameRecorder;导入java.io.IOException;public
    class AudioSplitter {        public static void main(String[] args) {        String
    inputFilePath = "path/to/file/sample.mp3";        String outputDirectory = "path/to/folder/";        int
    segmentDurationInSeconds = 600; // 10 minutes in seconds        try (FFmpegFrameGrabber
    grabber = new FFmpegFrameGrabber(inputFilePath)) {            grabber.start();            long
    totalDurationInSeconds = (long) grabber.getLengthInTime() / 1000000; // Convert
    microseconds to seconds            double frameRate = grabber.getFrameRate();            long
    segmentStartTime = 0;            long segmentEndTime;            int segmentNumber
    = 1;            while (segmentStartTime < totalDurationInSeconds) {                String
    outputFilePath = outputDirectory + "segment_" + segmentNumber + ".mp3";                try
    (FFmpegFrameRecorder recorder = new FFmpegFrameRecorder(outputFilePath, 0)) {                    recorder.setAudioChannels(2);                    recorder.setAudioCodecName("libmp3lame");
    // Set the audio codec to MP3                    recorder.setAudioBitrate(192000);
    // Adjust bitrate as needed                    recorder.setSampleRate(44100);
    // Adjust sample rate as needed                    recorder.setFrameRate(frameRate);                    recorder.setFormat("mp3");
    // Set the output format to MP3                    recorder.start();                    segmentEndTime
    = Math.min(segmentStartTime + segmentDurationInSeconds, totalDurationInSeconds);                    grabber.setTimestamp(segmentStartTime
    * 1000000); // Set the grabber's timestamp to the start time in microseconds                    while
    (grabber.getTimestamp() / 1000000 < segmentEndTime) {                        recorder.record(grabber.grabSamples());                    }                }                segmentStartTime
    = segmentEndTime;                segmentNumber++;            }        } catch
    (IOException e) {            e.printStackTrace();        }        }}列表4-3
- en: RESPONSE. AudioSplitter.java
  id: totrans-623
  prefs: []
  type: TYPE_NORMAL
  zh: RESPONSE. AudioSplitter.java
- en: Since the standard Java libraries don’t have wide support for various media
    formats, we’re using a combination of the FFmpeg library and JavaCV (both are
    free and open source).
  id: totrans-624
  prefs: []
  type: TYPE_NORMAL
  zh: 由于标准的Java库对各种媒体格式的支持不够广泛，我们正在使用FFmpeg库和JavaCV（两者都是免费和开源的）的组合。
- en: 'The goal is simple: split an MP3 file into contiguous segments no longer than
    10 minutes using the Java language. In this simple app, we do the following steps:'
  id: totrans-625
  prefs: []
  type: TYPE_NORMAL
  zh: 目标很简单：使用Java语言将MP3文件分割成连续的段，每段不超过10分钟。在这个简单的应用程序中，我们执行以下步骤：
- en: First of all, we specify the input file path, output directory, and the desired
    segment duration in seconds (10 minutes).
  id: totrans-626
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 首先，我们指定输入文件路径、输出目录和所需的段持续时间（以秒为单位，10分钟）。
- en: Next, we use the FFmpegFrameGrabber to open the input MP3 file and gather information
    about it, such as frame rate, audio codec, sample rate, and more.
  id: totrans-627
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 接下来，我们使用FFmpegFrameGrabber打开输入MP3文件，并收集有关它的信息，例如帧率、音频编解码器、采样率等。
- en: Afterward, we iterate through the input MP3 file, segmenting it into smaller
    parts of the specified duration (10 minutes or less). For each segment, we create
    a new FFmpegFrameRecorder, set its parameters, and record the frames within the
    segment duration.
  id: totrans-628
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 之后，我们遍历输入MP3文件，将其分割成指定持续时间（10分钟或更短）的小部分。对于每个部分，我们创建一个新的FFmpegFrameRecorder，设置其参数，并在段持续时间内记录帧。
- en: Finally, we increment the segment start time and segment number for each segment
    until we’ve processed the entire input MP3 file.
  id: totrans-629
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 最后，我们增加每个段的起始时间和段号，直到我们处理完整个输入MP3文件。
- en: In order for this to work, you need to have the JavaCV and FFmpeg libraries
    properly installed and configured in your project.
  id: totrans-630
  prefs: []
  type: TYPE_NORMAL
  zh: 为了使这可行，你需要正确安装和配置JavaCV和FFmpeg库在你的项目中。
- en: Note
  id: totrans-631
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: FFmpeg is an open source binary that you will need to install on your machine
    and be placed in your PATH or made accessible within your project. JavaCV uses
    FFmpeg via JNI (the Java Native Interface).
  id: totrans-632
  prefs: []
  type: TYPE_NORMAL
  zh: FFmpeg是一个开源的二进制文件，你需要在你的机器上安装它，并将其放置在PATH中或在你的项目中使其可访问。JavaCV通过JNI（Java本地接口）使用FFmpeg。
- en: FFmpeg is an extremely versatile media converter which not only handles MP3
    audio files, but various other audio file formats (including M4A, OGG, and WAV).
    It is able to convert video formats as well as static images like PNG, JPEG, and
    GIF.
  id: totrans-633
  prefs: []
  type: TYPE_NORMAL
  zh: FFmpeg是一个非常通用的媒体转换器，它不仅处理MP3音频文件，还处理各种其他音频文件格式（包括M4A、OGG和WAV）。它还能够转换视频格式以及静态图像，如PNG、JPEG和GIF。
- en: After running the AudioSplitter.java utility on an MP3 file, you’ll have a folder
    full of segmented audio files that are ten minutes long or less. Using the AudioSplitter.java
    utility, you have everything within a single Java file to modify the settings
    that work best for you. For our purposes, the goal here is to have audio files
    that are <25MB, so if you’re transcribing 8-hr legal proceedings, for example,
    in WAV format, you may need to adjust the duration to be shorter, like 6 mins
    in length.
  id: totrans-634
  prefs: []
  type: TYPE_NORMAL
  zh: 在对MP3文件运行AudioSplitter.java实用程序后，你将有一个包含分割音频文件的文件夹，这些文件长度为10分钟或更短。使用AudioSplitter.java实用程序，你可以在单个Java文件中修改最适合你的设置。就我们的目的而言，这里的目的是拥有小于25MB的音频文件，所以如果你以WAV格式转录8小时的法庭程序，例如，你可能需要调整持续时间，使其更短，比如6分钟长度。
- en: When using the AudioSplitter, the best practice is to have the output folder
    to be a different folder from the input, and you’ll see why when we start to invoke
    the Transcriptions Endpoint using the Whisper model.
  id: totrans-635
  prefs: []
  type: TYPE_NORMAL
  zh: 当使用AudioSplitter时，最佳实践是将输出文件夹与输入文件夹分开，你将在我们开始使用Whisper模型调用Transcriptions Endpoint时看到原因。
- en: 'Creating the Audio Transcriber: WhisperClient.java'
  id: totrans-636
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 创建音频转录器：WhisperClient.java
- en: 'Now, let’s build our next Java app, WhisperClient.java. Again, we’re going
    to pair-program with ChatGPT to get a basis to work with. This time, we’re going
    to ask for the OK HTTP library to be used for this app for two reasons:'
  id: totrans-637
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们构建我们的下一个Java应用程序，WhisperClient.java。同样，我们将与ChatGPT进行结对编程，以获得工作的基础。这次，我们将要求使用OK
    HTTP库来构建此应用程序，原因有两个：
- en: We’ve already used the library in Chapter [3](607613_1_En_3_Chapter.xhtml) for
    the Slack Bot app.
  id: totrans-638
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们已经在第[3](607613_1_En_3_Chapter.xhtml)章中使用了这个库来构建Slack Bot应用程序。
- en: 'The OK HTTP library makes things a bit easier to use when working with HTTP
    multipart forms. Listing [4-4](#PC4) is the prompt to put in the Chat Playground
    to get things started. Be sure to note that I’m asking for a 60-sec HTTP request
    timeout since Whisper may take a little while to generate the transcript.**System:**
    You are a Java developer.**User:** Convert the following code from cURL to Java,
    using OkHttp to send the request. Make sure that I have a 60 second timeout on
    my request. Iterate over a single folder on my local computer and send all the
    files in the folder to the webservice. Name the file, WhisperClient.java.**User:**
    curl https://api.openai.com/v1/audio/transcriptions \  -H "Authorization: Bearer
    $OPENAI_API_KEY" \  -H "Content-Type: multipart/form-data" \  -F file="@/path/to/file/audio.mp3"
    \  -F model="whisper-1"**Model:** gpt-4**Temperature:** 1**Maximum Length:** 1150Listing
    4-4'
  id: totrans-639
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '当使用HTTP多部分表单时，OK HTTP库使得操作变得稍微容易一些。列表[4-4](#PC4)是放入Chat Playground以开始操作的提示。请注意，我要求60秒的HTTP请求超时，因为Whisper可能需要一点时间来生成转录本。**系统**：您是一位Java开发者。**用户**：将以下代码从cURL转换为Java，使用OkHttp发送请求。确保我的请求有60秒的超时。遍历我的本地计算机上的单个文件夹，并将文件夹中的所有文件发送到webservice。文件名为WhisperClient.java。**用户**：curl
    https://api.openai.com/v1/audio/transcriptions \  -H "Authorization: Bearer $OPENAI_API_KEY"
    \  -H "Content-Type: multipart/form-data" \  -F file="@/path/to/file/audio.mp3"
    \  -F model="whisper-1"**模型**：gpt-4**温度**：1**最大长度**：1150列表4-4'
- en: 'PROMPT: Asking ChatGPT to Convert cURL to Java and Send to Whisper’s API'
  id: totrans-640
  prefs: []
  type: TYPE_NORMAL
  zh: 'PROMPT: 请ChatGPT将cURL转换为Java并发送到Whisper的API'
- en: 'After some back and forth, here’s the response ChatGPT gave us that worked,
    as shown in Listing [4-5](#PC5).![](../images/607613_1_En_4_Chapter/607613_1_En_4_Figb_HTML.gif)A
    logo of open A I.import java.io.*;import java.nio.file.*;import okhttp3.*;import
    java.util.*;import java.util.concurrent.TimeUnit;import java.util.stream.Collectors;import
    java.util.stream.Stream;/*** Client class to transcribe MP3 files using the OpenAI
    Whisper model.*/public class WhisperClient {    public static void main(String[]
    args) throws IOException {        // API key for OpenAI (this should be replaced
    with your actual API key)        String openAIKey = "";        // OpenAI transcription
    endpoint        String endpoint = "https://api.openai.com/v1/audio/transcriptions";        //
    Model used for transcription        String model = "whisper-1";        // Media
    type for the MP3 files        MediaType MEDIA_TYPE_MP3 = MediaType.parse("audio/mpeg");        //
    Folder containing the MP3 files to be transcribed        String mp3FolderPath
    = "/Users/me/audio/segments";        // Desired format for the transcription response        String
    responseFormat = "text";        // Configure the HTTP client with specified timeouts        OkHttpClient
    client = new OkHttpClient.Builder()            .connectTimeout(60, TimeUnit.SECONDS)            .writeTimeout(60,
    TimeUnit.SECONDS)            .readTimeout(60, TimeUnit.SECONDS)            .build();        //
    List to store all mp3 files from the directory        List<File> mp3Files = new
    ArrayList<>();        // Try to collect all mp3 files in the directory and store
    them in the list        try (Stream<Path> paths = Files.walk(Paths.get(mp3FolderPath)))
    {            mp3Files = paths                .filter(Files::isRegularFile)                .filter(p
    -> p.toString().endsWith(".mp3"))                .map(Path::toFile)                .sorted(Comparator.comparing(File::getName))
    // Sort the files alphabetically                .collect(Collectors.toList());        }
    catch (IOException e) {            System.out.println("File reading error: " +
    e.getMessage());            return; // Exit if there''s an error reading the files        }        //
    Iterate over each MP3 file, transcribe it, and print the response        for (File
    mp3File : mp3Files) {            // Construct the request body for transcription            RequestBody
    requestBody = new MultipartBody.Builder()                .setType(MultipartBody.FORM)                .addFormDataPart(                    "file",                    mp3File.getName(),                    RequestBody.create(mp3File,
    MEDIA_TYPE_MP3))                .addFormDataPart("model", model)                .addFormDataPart("response_format",
    responseFormat)                .build();            // Build the HTTP request            Request
    request = new Request.Builder()                .url(endpoint)                .header("Authorization",
    "Bearer " + openAIKey)                .post(requestBody)                .build();            //
    Make the request and process the response            try (Response response =
    client.newCall(request).execute()) {                if (!response.isSuccessful())
    throw new IOException("Unexpected code " + response);                System.out.println(response.body().string());            }
    catch (IOException e) {                System.out.println("Request error for file:
    " + mp3File.getName() + " - " + e.getMessage());            }        }    }}Listing
    4-5'
  id: totrans-641
  prefs: []
  type: TYPE_NORMAL
  zh: '经过一番讨论，这是ChatGPT给出的有效响应，如列表[4-5](#PC5)所示。![开放AI的标志](../images/607613_1_En_4_Chapter/607613_1_En_4_Figb_HTML.gif)A
    logo of open A I.import java.io.*;import java.nio.file.*;import okhttp3.*;import
    java.util.*;import java.util.concurrent.TimeUnit;import java.util.stream.Collectors;import
    java.util.stream.Stream;/*** 客户端类，用于使用OpenAI Whisper模型转录MP3文件。*/public class WhisperClient
    {    public static void main(String[] args) throws IOException {        // OpenAI的API密钥（这应该替换为你的实际API密钥）        String
    openAIKey = "";        // OpenAI转录端点        String endpoint = "https://api.openai.com/v1/audio/transcriptions";        //
    用于转录的模型        String model = "whisper-1";        // MP3文件的媒体类型        MediaType
    MEDIA_TYPE_MP3 = MediaType.parse("audio/mpeg");        // 包含要转录的MP3文件的文件夹        String
    mp3FolderPath = "/Users/me/audio/segments";        // 转录响应期望的格式        String
    responseFormat = "text";        // 使用指定的超时配置HTTP客户端        OkHttpClient client
    = new OkHttpClient.Builder()            .connectTimeout(60, TimeUnit.SECONDS)            .writeTimeout(60,
    TimeUnit.SECONDS)            .readTimeout(60, TimeUnit.SECONDS)            .build();        //
    存储目录中所有mp3文件的列表        List<File> mp3Files = new ArrayList<>();        // 尝试收集目录中的所有mp3文件并将它们存储在列表中        try
    (Stream<Path> paths = Files.walk(Paths.get(mp3FolderPath))) {            mp3Files
    = paths                .filter(Files::isRegularFile)                .filter(p
    -> p.toString().endsWith(".mp3"))                .map(Path::toFile)                .sorted(Comparator.comparing(File::getName))
    // 按字母顺序排序文件                .collect(Collectors.toList());        } catch (IOException
    e) {            System.out.println("文件读取错误: " + e.getMessage());            return;
    // 如果读取文件出错，则退出        }        // 遍历每个MP3文件，转录它并打印响应        for (File mp3File
    : mp3Files) {            // 构建转录请求体            RequestBody requestBody = new MultipartBody.Builder()                .setType(MultipartBody.FORM)                .addFormDataPart(                    "file",                    mp3File.getName(),                    RequestBody.create(mp3File,
    MEDIA_TYPE_MP3))                .addFormDataPart("model", model)                .addFormDataPart("response_format",
    responseFormat)                .build();            // 构建HTTP请求            Request
    request = new Request.Builder()                .url(endpoint)                .header("Authorization",
    "Bearer " + openAIKey)                .post(requestBody)                .build();            //
    发送请求并处理响应            try (Response response = client.newCall(request).execute())
    {                if (!response.isSuccessful()) throw new IOException("Unexpected
    code " + response);                System.out.println(response.body().string());            }
    catch (IOException e) {                System.out.println("文件：" + mp3File.getName()
    + " 的请求错误 - " + e.getMessage());            }        }    }}列表4-5'
- en: 'RESPONSE: WhisperClient.java'
  id: totrans-642
  prefs: []
  type: TYPE_NORMAL
  zh: 响应：WhisperClient.java
- en: As you can see, the OkHttpClient class allows us to use the Builder pattern
    to create an instance of the class with the timeouts we specified.
  id: totrans-643
  prefs: []
  type: TYPE_NORMAL
  zh: 如你所见，OkHttpClient 类允许我们使用 Builder 模式创建一个具有我们指定的超时设置的类实例。
- en: Now, here’s the reason why it’s a good idea when using the AudioSplitter.java
    utility to make the output folder separate from the input folder. We’re creating
    a Collection of all the MP3 files from within a directory. More specifically,
    it’s a “List<File>” that’s named “mp3Files” to hold all the files that we want
    transcribed. Therefore, if the file that we want to be split into smaller segments
    is in the same folder with the segments themselves, then we’ll be sending the
    large file (the one that’s >25MB file) along with the smaller files to the Transcription
    Endpoint, which defeats the whole purpose of using the AudioSplitter.java app.
  id: totrans-644
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，这里就是为什么在使用 AudioSplitter.java 工具时，将输出文件夹与输入文件夹分开是一个好主意的原因。我们正在创建一个包含目录内所有
    MP3 文件的集合。更具体地说，它是一个名为“mp3Files”的“List<File>”，用于保存我们想要转录的所有文件。因此，如果我们想要分割成更小段落的文件与这些段落在同一个文件夹中，那么我们将把大于
    25MB 的大文件（即那个大于 25MB 的文件）以及较小的文件一起发送到转录端点，这违背了使用 AudioSplitter.java 应用程序的目的。
- en: Therefore, the “Files.walk()” method allows us to recursively traverse the “mp3FolderPath”
    directory and collect all MP3 files and filter out those that do not end with
    the “.mp3” extension (for safety purposes, and to prevent any errors with the
    web service). Then, we map each “Path” to its corresponding “File” object and
    sort the files alphabetically based on their names. Finally, we use the “Collectors.toList()”
    method to collect all the sorted files into the “mp3Files” list.
  id: totrans-645
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，“Files.walk()”方法允许我们递归遍历“mp3FolderPath”目录，收集所有 MP3 文件，并过滤掉不以“ .mp3”扩展名结尾的文件（出于安全考虑，并防止与
    Web 服务发生任何错误）。然后，我们将每个“Path”映射到其对应的“File”对象，并根据文件名对文件进行字母排序。最后，我们使用“Collectors.toList()”方法将所有排序后的文件收集到“mp3Files”列表中。
- en: With a Collection of MP3 files in hand, it’s now time to send them to the Transcription
    Endpoint. As we build the RequestBody, the most important lines you should pay
    attention to are           .addFormDataPart("model", model)           .addFormDataPart("response_format",
    responseFormat)
  id: totrans-646
  prefs: []
  type: TYPE_NORMAL
  zh: 手持一组 MP3 文件，现在是时候将它们发送到转录端点了。在我们构建 RequestBody 的过程中，你应该注意的最重要的一行是：.addFormDataPart("model",
    model) 和 .addFormDataPart("response_format", responseFormat)
- en: That’s due to the fact that if you want to add any optional parameters to the
    HTTP Request, (refer to Table [4-2](#Tab2) for all the parameters) such as the
    prompt or temperature, then you need to add them here in the same way that we
    specified the model and the response format.
  id: totrans-647
  prefs: []
  type: TYPE_NORMAL
  zh: 这是因为如果你想在 HTTP 请求中添加任何可选参数（请参阅表 [4-2](#Tab2) 中所有参数），例如提示或温度，那么你需要以我们指定模型和响应格式相同的方式在这里添加它们。
- en: Note
  id: totrans-648
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: Let me reiterate – invoking the Transcriptions Endpoint is completely different
    from the Chat Endpoint. You may have already noticed one of the major differences
    between ChatGPTClient.java and WhisperClient.java are the import statements. ChatGPTClient.java
    (in Chapters [2](607613_1_En_2_Chapter.xhtml) and [3](607613_1_En_3_Chapter.xhtml))
    have the Jackson library within its import statements since we need to send the
    request as a JSON object. However, the imports in WhisperClient.java have no mention
    of Jackson, since we’re sending everything as form data.
  id: totrans-649
  prefs: []
  type: TYPE_NORMAL
  zh: 让我重申——调用转录端点与调用聊天端点完全不同。你可能已经注意到了 ChatGPTClient.java 和 WhisperClient.java 之间的一大主要区别是导入语句。ChatGPTClient.java（在第
    [2](607613_1_En_2_Chapter.xhtml) 和 [3](607613_1_En_3_Chapter.xhtml) 章）的导入语句中包含了
    Jackson 库，因为我们需要以 JSON 对象的形式发送请求。然而，WhisperClient.java 中的导入语句没有提及 Jackson，因为我们是以表单数据的形式发送所有内容的。
