- en: 'Judges’ comments:'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: This short fiction has a unique charm and a heartwarming narrative that captivates
    the reader with its simplicity and depth.
  prefs: []
  type: TYPE_NORMAL
- en: Strengths
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'Emotional Resonance:'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The story effectively evokes emotions, creating a strong connection between
    the readers and the characters, especially in their quest to find where the inflatable
    swan truly belongs. This emotional journey is the story’s core, resonating well
    with themes of freedom and belonging.
  prefs: []
  type: TYPE_NORMAL
- en: 'Vivid Imagery:'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The descriptions of the candy-pink inflatable swan, from being “squashed and
    sad-looking” in a shop window to “setting sail” into the sunset, are vivid and
    engaging. This strong imagery not only brings the story to life but also accentuates
    the narrative’s whimsical and magical elements.
  prefs: []
  type: TYPE_NORMAL
- en: 'Character Relationship:'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The relationship between Hazel and the narrator is depicted with warmth and
    depth. Their interactions, characterized by shared dialogue and mirrored sentiments,
    beautifully illustrate their bond and mutual understanding, adding a rich layer
    to the story.
  prefs: []
  type: TYPE_NORMAL
- en: Areas for Improvement
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Tighten the dialogue.
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: While the repeated dialogue between Hazel and the narrator underscores their
    relationship and the story’s themes, it could be perceived as slightly redundant.
    Refining these exchanges to make them more varied or adding subtle nuances could
    enhance their impact without sacrificing the narrative’s rhythm.
  prefs: []
  type: TYPE_NORMAL
- en: 'Expand on Character Development:'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Although the story is short, providing a bit more background or insight into
    Hazel’s and the narrator’s lives could deepen the reader’s understanding of their
    motivations. Even a few sentences that hint at why the swan’s freedom is so meaningful
    to them can add layers to their characters.
  prefs: []
  type: TYPE_NORMAL
- en: 'Clarify the Swan’s Perspective:'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The story anthropomorphizes the swan, attributing emotions and reactions to
    it. While this technique adds whimsy, ensuring consistency and clarity in how
    the swan’s perspectives are presented can strengthen the narrative’s magical realism.
  prefs: []
  type: TYPE_NORMAL
- en: '25'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: My First Chocolate on Mars by Sally Ann Melia
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Chocolate. I am not going to Mars without chocolate. Only chocolate is not standard
    rations for NASA astronauts. OK, the menu includes chocolate mousse as a drink
    served in an aluminum pack. But that’s not my idea of chocolate.
  prefs: []
  type: TYPE_NORMAL
- en: 'My addiction is questionable. I spend a tense hour with the team psychiatrist.
    She almost persuades me to take a paperback - real books being the real luxuries
    of outer space - almost. However, this chat highlights another problem of space
    travel: personal space.'
  prefs: []
  type: TYPE_NORMAL
- en: Space flight is a strange life. Cycles of two days exercise follow eight days
    of cryogenic sleep. Thirty-one cycles to reach Mars and then the work begins.
    I packed dark chocolate mint thins, thirty-four to a box. Four boxes means 132
    days when I can savour the unwrapping, the aroma and the crunch. One a day, every
    day of my space adventure.
  prefs: []
  type: TYPE_NORMAL
- en: But I also want to be the first woman to eat chocolate on Mars. In secret, I
    place the treat in its gold foil into my mouth, as I suit up. I hold it there
    as the capsule burns through the atmosphere down to the surface. The boosters
    roar as they break our fall. Finally, I climb through the hatch and down to stand
    on red soil.
  prefs: []
  type: TYPE_NORMAL
- en: I look around and focus on slowing my pounding heart. Meanwhile I peal the foil
    back with my teeth and spit the wrapper into my helmet. The chocolate is melting
    across my tongue. I sigh and breathe deep.
  prefs: []
  type: TYPE_NORMAL
- en: Dark Chocolate. Red Planet.
  prefs: []
  type: TYPE_NORMAL
- en: An alarm sounds in my helmet. A warning appears in my view. My oxygen inlet
    is blocked. I reach to my neck. The chocolate warms me from inside, but I can’t
    breathe. I cough. I crumble.
  prefs: []
  type: TYPE_NORMAL
- en: I am the first woman killed by chocolate on Mars.
  prefs: []
  type: TYPE_NORMAL
- en: Judges’ Comments
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'This piece of fiction presents a unique blend of science fiction and a personal
    narrative cantered around the protagonist’s love for chocolate. Here are three
    strengths and three areas that could be improved for this story to stand out in
    a competition:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Strengths:'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'Original Concept:'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The idea of focusing on something as mundane as chocolate in the context of
    a high-stakes space mission to Mars is both original and engaging. It offers a
    humanizing contrast to the technological and impersonal aspects typically associated
    with space travel, making the story memorable.
  prefs: []
  type: TYPE_NORMAL
- en: 'Immersive Details:'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The specifics about space travel, like the cycles of exercise and cryogenic
    sleep, alongside the description of savouring chocolate in space, effectively
    draw readers into the protagonist’s world. These details provide a solid sense
    of place and atmosphere, enhancing the story’s believability.
  prefs: []
  type: TYPE_NORMAL
- en: 'Emotional Connection:'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The protagonist’s passion for chocolate and her determination to enjoy it on
    Mars create an emotional anchor for the reader. This connection not only humanizes
    the character but also adds a layer of relatability, as it displays how personal
    quirks and desires accompany us, even into space.
  prefs: []
  type: TYPE_NORMAL
- en: 'Areas for Improvement:'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'Plot Development and Clarity:'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The twist ending, where the protagonist is endangered (and possibly killed)
    by chocolate, is sudden and somewhat confusing. While dramatic, the story could
    benefit from a clearer buildup or more hints earlier on to prepare the reader
    for this conclusion, ensuring the ending feels earned rather than abrupt.
  prefs: []
  type: TYPE_NORMAL
- en: 'Character Depth:'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Aside from the protagonist’s love for chocolate, we get little sense of her
    personality or background. Fleshing out her character with more details about
    her life, motivations for going to Mars, or reflections on her journey could make
    readers care more deeply about her fate.
  prefs: []
  type: TYPE_NORMAL
- en: 'Technical Realism:'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: While the focus on chocolate is engaging, the story’s realism suffers slightly
    at the end. The scenario of being killed by chocolate blocking an oxygen inlet
    might seem implausible to readers familiar with space suit technology and safety
    protocols. Ensuring scientific accuracy or providing a more detailed explanation
    of how the chocolate causes a fatal issue could enhance the story’s credibility.
  prefs: []
  type: TYPE_NORMAL
- en: Overall, this piece offers a compelling glimpse into the protagonist’s unique
    experience with space travel. By refining the plot development, deepening character
    exploration, and ensuring technical accuracy, the story could strongly resonate
    in a competition setting, captivating judges and readers alike with its originality
    and emotional depth.
  prefs: []
  type: TYPE_NORMAL
- en: '26'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Tinkle Bells by Sally Ann Melia
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'It was an ancient bell of tainted brass etched with fairy figures and a single
    line of text:'
  prefs: []
  type: TYPE_NORMAL
- en: Ring me once, twice, three times, or four times for your heart’s desire. The
    fifth time I ring, all will retire.
  prefs: []
  type: TYPE_NORMAL
- en: The family had fallen on hard times. The father was sick. The mother had lost
    her place. The children were hungry, and it was the coldest, darkest night of
    winter. The mother wondered if she might sell the bell and rang it gently.
  prefs: []
  type: TYPE_NORMAL
- en: 'A small golden fairy fell out onto the table. As she stretched, she sprinkled
    fairy dust all around, then said:'
  prefs: []
  type: TYPE_NORMAL
- en: “What is your heart’s desire?”
  prefs: []
  type: TYPE_NORMAL
- en: The mother, her fingers blue, said, “We’re so cold.”
  prefs: []
  type: TYPE_NORMAL
- en: “Oh, that,” the fairy said dismissively and waved her wand. All at once, a fire
    roared in the stove.
  prefs: []
  type: TYPE_NORMAL
- en: The mother stood at the heart of her warm and bright home, but her tummy rumbled.
  prefs: []
  type: TYPE_NORMAL
- en: She rang the bell.
  prefs: []
  type: TYPE_NORMAL
- en: “We’re so hungry,” she explained.
  prefs: []
  type: TYPE_NORMAL
- en: The fairy shrugged her shoulders and said, “Oh, that.” She waved her wand, and
    the kitchen table, the counter, the stove, and the oven were stacked with food.
    There were pies and gravies, puddings and custards, wines, and cheese.
  prefs: []
  type: TYPE_NORMAL
- en: The children had been woken by the gurgling of their hot radiators and the smell
    of hot food, and now they saw the fairy disappear into the bell.
  prefs: []
  type: TYPE_NORMAL
- en: As their mother took a tray of food to their poor, sick father, they rang the
    bell.
  prefs: []
  type: TYPE_NORMAL
- en: The fairy was a little cross because she had almost fallen into a jug of custard,
    but she landed on the brim and skipped along the edge.
  prefs: []
  type: TYPE_NORMAL
- en: “Well?” she said.
  prefs: []
  type: TYPE_NORMAL
- en: “We want money,” the eldest girl said.
  prefs: []
  type: TYPE_NORMAL
- en: “A billion, billion pounds,” the youngest girl added.
  prefs: []
  type: TYPE_NORMAL
- en: The fairy sighed. “Well, you asked for it.” Then, when the mother returned,
    every inch of the house was stacked with wads of fifty-pound notes.
  prefs: []
  type: TYPE_NORMAL
- en: After that, they did not ring the bell for an exceedingly long time. The father
    was sent to the finest doctor, and soon he was quite well. The mother redecorated
    the extent of the house and then went into the property.
  prefs: []
  type: TYPE_NORMAL
- en: The eldest daughter went to Harrow, Eton, Oxford, Cambridge, and, for good measure,
    Harvard. The youngest daughter trained to be a dancer and formed her own theatre.
    All of them became adapted gamblers since casinos were the only way to convert
    their magical money into real cash.
  prefs: []
  type: TYPE_NORMAL
- en: Years later, after her fifth husband had left her, the mother sat in despair
    at the kitchen table. Her youngest daughter was a ballet star in Monte Carlo.
    Her husband owns a whisky distillery north of Edinburgh. Her eldest daughter was
    the Governor of California. It was the coldest, darkest night of the year, and
    she was alone. She rang the bell.
  prefs: []
  type: TYPE_NORMAL
- en: “I want to find true love.”
  prefs: []
  type: TYPE_NORMAL
- en: “You took your time,” said the fairy. “The next person who knocks on your front
    door will be your forever love.”
  prefs: []
  type: TYPE_NORMAL
- en: It was the Christmas holiday, so for three days no one came to the door—not
    even a postman—but at last the doorbell rang, and a young man appeared with leaflets
    about Jesus and salvation. Mother let him in, made him a cup of tea, and immediately
    fell completely in love.
  prefs: []
  type: TYPE_NORMAL
- en: Then the young man said,
  prefs: []
  type: TYPE_NORMAL
- en: “You have to give up all your worldly goods, all your money and all your possessions
    and turn to the light.”
  prefs: []
  type: TYPE_NORMAL
- en: 'The mother remembered what the fairy had said:'
  prefs: []
  type: TYPE_NORMAL
- en: Ring me once, twice, three times, or four times for your heart’s desire. The
    fifth time I ring, all will retire.
  prefs: []
  type: TYPE_NORMAL
- en: At that point, despite everything, the mother stood up and quietly opened the
    door, and the young man left. She picked up the bell and very carefully removed
    the clapper. The little brass bell would never be rung again.
  prefs: []
  type: TYPE_NORMAL
- en: For while it is true that money can’t buy you love, what is love anyway?
  prefs: []
  type: TYPE_NORMAL
- en: Judge’s Comments
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: This story weaves a magical tale with a blend of fairy-tale elements and modern-day
    morals. Here are three strengths and three areas that could be improved to increase
    its chances of winning a writing competition.
  prefs: []
  type: TYPE_NORMAL
- en: 'Strengths:'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'Engaging Premise:'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The concept of a magical bell that grants wishes with a limit is intriguing
    and draws the reader in. This premise sets up a clear structure for the story,
    allowing the reader to anticipate the unfolding of events with each ring of the
    bell.
  prefs: []
  type: TYPE_NORMAL
- en: 'Vivid Descriptions:'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The descriptions of the fairy’s actions and the transformations she brings about
    in the family’s life are vivid and imaginative. The detail given to the food,
    the warmth, and the wealth created by the fairy’s magic makes these moments particularly
    engaging and enjoyable to read.
  prefs: []
  type: TYPE_NORMAL
- en: 'Moral Complexity:'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The story explores themes of desire, greed, and the true meaning of happiness
    in a nuanced way. The twist ending, where the mother chooses to disable the bell
    after realizing the limitations of material wealth and the complexities of love,
    adds depth to the narrative and encourages reflection.
  prefs: []
  type: TYPE_NORMAL
- en: 'Areas for improvement:'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'Character Development:'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: While the plot is engaging, the characters themselves feel somewhat flat and
    could benefit from deeper development. Providing more insight into their emotions,
    thoughts, and personalities would make the reader more invested in their journey
    and the choices they make.
  prefs: []
  type: TYPE_NORMAL
- en: 'Pacing and Structure:'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The story moves quickly through significant life changes, which can sometimes
    feel rushed. Expanding on key moments or transitions, and perhaps showing more
    of the family’s life and struggles before the bell’s intervention, could enhance
    the story’s emotional impact and give the narrative a more balanced pace.
  prefs: []
  type: TYPE_NORMAL
- en: 'Ending Clarity and Impact:'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The conclusion aims for a philosophical reflection on love and materialism,
    which is ambitious but may come across as somewhat abrupt or unclear. Refining
    the ending to articulate the mother’s realization and emotional state more clearly,
    and perhaps offering a more nuanced contemplation of the story’s moral, would
    make the conclusion more satisfying and impactful.
  prefs: []
  type: TYPE_NORMAL
- en: In summary, this story’s imaginative premise, rich descriptions, and exploration
    of moral themes are its key strengths. To enhance its competitiveness, focusing
    on character depth, pacing, and a more nuanced and impactful ending would be beneficial.
    With these adjustments, the story could resonate more deeply with readers and
    judges alike, making it a strong contender in a writing competition.
  prefs: []
  type: TYPE_NORMAL
- en: '27'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'The Bells of Puttenham: A Medical Science Fiction by Sally Ann Melia'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'The church bells rang out: the zombies were coming.'
  prefs: []
  type: TYPE_NORMAL
- en: Five years have passed since chicken flu morphed into brain flu, and humanity
    has become a horde of stumbling, carnivorous idiots, but here in Puttenham, population
    217, we have barely noticed.
  prefs: []
  type: TYPE_NORMAL
- en: On the first news of zombies, farmer George canceled all incoming deliveries
    to the farm shop and doubled local production of everything else; the landlord
    at The Good Intent refurbished his aging still and took possession of the hops
    harvest; and the post office mistress pulled out stacks of stationery and employed
    boys as runners. Whatever happened elsewhere, Puttenham would eat, drink, and
    send out invitations for high tea, intimate suppers, and glamorous balls.
  prefs: []
  type: TYPE_NORMAL
- en: But now the zombies were coming.
  prefs: []
  type: TYPE_NORMAL
- en: The first defence was the village moat, stacked full of timber and soaked in
    kerosene. The zombies fell in and burned.
  prefs: []
  type: TYPE_NORMAL
- en: The second defence was an ancient hedge with four feet of brambles. The zombies
    struggled against thorns laced with barbed wire.
  prefs: []
  type: TYPE_NORMAL
- en: The third defence was the high walls of their medieval ruin. The residents of
    Puttenham drew up the drawbridge, sent out flights of arrows, and dropped cauldrons
    of boiling oil.
  prefs: []
  type: TYPE_NORMAL
- en: But after five months of siege, prospects were bleak.
  prefs: []
  type: TYPE_NORMAL
- en: “We’re done for,” said farmer George. “One chicken left.”
  prefs: []
  type: TYPE_NORMAL
- en: “Last orders,” said the pub landlord. “One pint left.”
  prefs: []
  type: TYPE_NORMAL
- en: “We should write our history,” said the postmistress. “Three hundred words,”
    she handed them pages. “And ring the bells to warn the other villages.”
  prefs: []
  type: TYPE_NORMAL
- en: At dawn, they climbed the high tower to watch the sun rise one last time.
  prefs: []
  type: TYPE_NORMAL
- en: However, they had not counted on the ringing of the bells, which had induced
    severe tinnitus and destroyed the last fragments of the zombies’ cerebral cortex.
    They all lay twitching and unconscious on the ground.
  prefs: []
  type: TYPE_NORMAL
- en: Puttenham survived the great zombie apocalypse. Thanks to the bells.
  prefs: []
  type: TYPE_NORMAL
- en: 'Judge’s comments:'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'This short fiction piece presents an intriguing and somewhat humorous take
    on the zombie apocalypse genre, set in the small village of Puttenham. Here’s
    how it might fare in a writing competition, with three strengths and three weaknesses
    identified:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Strengths:'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'Originality and Humor:'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The story injects humour and a sense of light-heartedness into the often-grim
    zombie apocalypse narrative. The idea that a small village barely notices the
    apocalypse due to their self-sufficiency and quirky methods of defence against
    zombies is both original and engaging. This unique angle could set the story apart
    in a competition.
  prefs: []
  type: TYPE_NORMAL
- en: 'Vivid Setting and Community Spirit:'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The setting of Puttenham is well-drawn, and the sense of community spirit in
    the face of adversity is palpable. The detailed descriptions of the village’s
    preparations and defences against the zombies showcase a tight-knit community
    that’s resourceful and resilient. This adds depth and a feel-good factor to the
    story.
  prefs: []
  type: TYPE_NORMAL
- en: 'Unexpected Twist:'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The conclusion, where the zombie horde is defeated not by physical defences
    but by an accidental side effect of the church bells causing tinnitus, is unexpected
    and clever. This twist adds a layer of irony and further originality to the piece.
  prefs: []
  type: TYPE_NORMAL
- en: 'Weaknesses:'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'Character Development:'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The story lacks depth in character development. Characters like farmer George,
    the pub landlord, and the postmistress are mentioned briefly, but we get little
    sense of their personalities or any emotional investment in them. Fleshing out
    these characters could enhance the story’s impact and emotional resonance.
  prefs: []
  type: TYPE_NORMAL
- en: 'Pacing and detail:'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: While the story is concise, which is often necessary for short fiction, certain
    areas could benefit from more detail or slower pacing. For instance, the transition
    from the village’s initial self-sufficiency to the siege could be explored in
    more depth, as could the final battle with the zombies. This would build tension
    and make the resolution more satisfying.
  prefs: []
  type: TYPE_NORMAL
- en: 'Exploration of Themes:'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The story touches on themes of community, resilience, and perhaps even the unintended
    consequences of technology (in this case, church bells). However, these themes
    could be explored more deeply or explicitly to add layers of meaning to the narrative
    and give it more weight in a competitive setting.
  prefs: []
  type: TYPE_NORMAL
- en: Overall, the piece is enjoyable and memorable for its original take on a popular
    genre. To improve its chances in a competition, focusing on character development,
    pacing, and thematic exploration could make it more compelling and emotionally
    engaging for readers and judges alike.
  prefs: []
  type: TYPE_NORMAL
