  id: totrans-3531
  prefs: []
  type: TYPE_NORMAL
  zh: 创建用户表单
- en: 'To create a user form, follow these steps:'
  id: totrans-3532
  prefs: []
  type: TYPE_NORMAL
  zh: 要创建用户表单，请按照以下步骤操作：
- en: 1. Click Insert Menu.
  id: totrans-3533
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 点击插入菜单。
- en: 2. Select UserForm, as shown in [Figure 22.2](#fig22-2) (a).
  id: totrans-3534
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 如[图22.2](#fig22-2) (a)所示，选择用户表单。
- en: 3. This will add one object, UserForm1, in your workbook, as shown in [Figure
    22.2](#fig22-2) (b).
  id: totrans-3535
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 这将在您的工作簿中添加一个对象，UserForm1，如[图22.2](#fig22-2) (b)所示。
- en: 4. Use the Properties window to change the name, behavior, and appearance of
    the form. For example, to change the caption on a form, set the Caption property,
    as shown in [Figure 22.2](#fig22-2) (c).
  id: totrans-3536
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 使用属性窗口来更改表单的名称、行为和外观。例如，要更改表单上的标题，设置标题属性，如[图22.2](#fig22-2) (c)所示。
- en: Refer to [Figure 22.2](#fig22-2).
  id: totrans-3537
  prefs: []
  type: TYPE_NORMAL
  zh: 参见图22.2。
