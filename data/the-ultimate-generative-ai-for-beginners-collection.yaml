  id: totrans-2009
  prefs: []
  type: TYPE_NORMAL
  zh: 'Prompt 1: “使用解决拼图谜语的隐喻解释神经网络中的隐藏层是如何工作的。”'
- en: 'Prompt 2: “Describe how backpropagation works using an analogy of a student
    learning from exam corrections.”'
  id: totrans-2010
  prefs: []
  type: TYPE_NORMAL
  zh: 'Prompt 2: “使用学生从考试更正中学习的类比描述反向传播的工作原理。”'
- en: 'Prompt 3: “Compare ReLU, sigmoid, and tanh activation functions using a scenario
    about doors that open under different conditions.”'
  id: totrans-2011
  prefs: []
  type: TYPE_NORMAL
  zh: 'Prompt 3: “使用关于在不同条件下开门的场景，比较ReLU、sigmoid和tanh激活函数。”'
- en: 'Prompt 4: “Design a neural network architecture for classifying images of cats
    and dogs. Explain your choice of layers and activation functions.”'
  id: totrans-2012
  prefs: []
  type: TYPE_NORMAL
  zh: 'Prompt 4: “设计一个用于分类猫和狗图像的神经网络架构。解释你选择的层和激活函数。”'
- en: 'Prompt 5: “Suggest three strategies to reduce overfitting in a neural network
    model. Explain how each works.”'
  id: totrans-2013
  prefs: []
  type: TYPE_NORMAL
  zh: 'Prompt 5: “提出三种减少神经网络模型过拟合的策略。解释每种策略是如何工作的。”'
- en: 'Prompt 6: “How can you use early stopping and learning rate adjustments to
