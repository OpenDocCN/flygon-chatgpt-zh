  id: totrans-246
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '6.'
- en: Clicking this icon allows you to hide the history panel.
  id: totrans-247
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 点击此图标可以隐藏历史记录面板。
