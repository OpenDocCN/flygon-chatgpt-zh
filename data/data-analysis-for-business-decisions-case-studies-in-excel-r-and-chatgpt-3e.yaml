- en: CHAPTER 3
  id: totrans-326
  prefs: []
  type: TYPE_NORMAL
  zh: 第3章
- en: DATA PREPARATION
  id: totrans-327
  prefs: []
  type: TYPE_NORMAL
  zh: 数据准备
- en: '![image](images/pg35.jpg)'
  id: totrans-328
  prefs: []
  type: TYPE_IMG
  zh: '![image](images/pg35.jpg)'
- en: In business analytics, the adage “garbage in, garbage out” holds particularly
    true. This chapter delves into the critical, yet often underappreciated, process
    of data preparation, which is a fundamental step that affects the success of any
    analytical endeavor. Effectively using raw data to obtain actionable insights
    involves meticulous cleaning, shaping, and transformation efforts.
  id: totrans-329
  prefs: []
  type: TYPE_NORMAL
  zh: 在商业分析中，谚语“垃圾进，垃圾出”尤其适用。本章深入探讨了数据准备这一关键但常被低估的过程，这是影响任何分析努力成功的基本步骤。有效地使用原始数据以获得可操作的见解需要细致的清理、塑形和转换工作。
- en: Data preparation, while time-consuming, is an indispensable phase in the analytical
    process. Studies have shown that data scientists and analysts spend up to 80%
    of their time on data preparation tasks. This chapter aims to equip readers with
    the knowledge and skills to navigate this crucial stage efficiently and effectively.
  id: totrans-330
  prefs: []
  type: TYPE_NORMAL
  zh: 数据准备，虽然耗时，但在分析过程中是不可或缺的阶段。研究表明，数据科学家和分析师将高达80%的时间花在数据准备任务上。本章旨在使读者具备有效且高效地应对这一关键阶段的知识和技能。
- en: We begin by introducing the concept of the flat-file format, a simple yet powerful
    structure for organizing data. This format, characterized by its tabular nature
    with clearly defined rows and columns, serves as the foundation for most analytical
    processes. We discuss why this format is preferred and how to transform various
    data sources into this standardized structure.
  id: totrans-331
  prefs: []
  type: TYPE_NORMAL
  zh: 我们首先介绍平面文件格式的概念，这是一种简单而强大的数据组织结构。这种格式以其表格性质、明确定义的行和列而著称，是大多数分析过程的基础。我们讨论为什么这种格式被首选以及如何将各种数据源转换为这种标准化结构。
- en: We then explore the diverse landscape of data sources and formats that analysts
    encounter in real-world scenarios. From numerical and categorical data to more
    complex text data, we examine the characteristics and challenges associated with
    each type. Understanding these distinctions is crucial for applying appropriate
    cleaning and shaping techniques.
  id: totrans-332
  prefs: []
  type: TYPE_NORMAL
  zh: 我们接下来探讨分析师在现实场景中遇到的各种数据源和格式。从数值和分类数据到更复杂的文本数据，我们考察了每种类型的特点和挑战。理解这些区别对于应用适当的清理和塑形技术至关重要。
- en: A significant portion of the chapter is dedicated to practical exercises that
    simulate real-world data preparation challenges. In Analysis Case 3.1, we examine
    the task of reshaping a complex budget report into a flat-file format suitable
    for pivot table analysis. This exercise not only demonstrates the transformation
    process but also highlights how proper data preparation can uncover errors in
    original reports, emphasizing the value of this often-overlooked step.
  id: totrans-333
  prefs: []
  type: TYPE_NORMAL
  zh: 本章的大部分内容致力于实践练习，这些练习模拟了现实世界中的数据准备挑战。在分析案例3.1中，我们考察了将复杂的预算报告重塑为适合数据透视表分析的平面文件格式的任务。这个练习不仅展示了转换过程，而且还突出了适当的数据准备如何揭示原始报告中的错误，强调了这一常被忽视的步骤的价值。
- en: Analysis Case 3.2 focuses on cleaning a dataset from a drug manufacturer’s test.
    This exercise showcases common data cleaning tasks such as correcting transcription
    errors, dealing with missing values, and ensuring data consistency. It shows the
    importance of data dictionaries and the need for careful validation of cleaned
    data.
  id: totrans-334
  prefs: []
  type: TYPE_NORMAL
  zh: 分析案例3.2专注于清理一家制药公司测试的数据集。这个练习展示了常见的数据清理任务，如纠正转录错误、处理缺失值和确保数据一致性。它展示了数据字典的重要性以及仔细验证清理数据的必要性。
- en: We then progress to more advanced data preparation techniques with two substantial
    case studies. Analysis Case 3.3 deals with cleaning and shaping the San Francisco
    Airport (SFO) Survey dataset, illustrating how to handle large-scale categorical
    data and remove meaningless entries to improve analysis quality.
  id: totrans-335
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，我们通过两个重要的案例研究，进一步探讨更高级的数据准备技术。分析案例3.3处理的是旧金山国际机场（SFO）调查数据集的清洗和塑形，展示了如何处理大规模分类数据，并删除无意义的条目以提高分析质量。
- en: Analysis Case 3.4 introduces the use of R for data preparation, focusing on
    the Small Business Administration (SBA) Loans dataset. This case study demonstrates
    how to leverage programming tools for efficient data manipulation, including creating
    new variables, binning data, and handling dates—skills that are invaluable when
    dealing with large datasets.
  id: totrans-336
  prefs: []
  type: TYPE_NORMAL
  zh: 分析案例3.4介绍了R在数据准备中的应用，重点关注小企业管理局（SBA）贷款数据集。这个案例研究展示了如何利用编程工具进行高效的数据操作，包括创建新变量、数据分箱和处理日期——这些技能在处理大型数据集时非常有价值。
- en: Throughout these exercises, we emphasize the iterative nature of data preparation.
    It is a process that requires patience, attention to detail, and often multiple
    rounds of cleaning and validation. We also stress the importance of understanding
    the business context behind the data, as this knowledge guides decision-making
    throughout the preparation process.
  id: totrans-337
  prefs: []
  type: TYPE_NORMAL
  zh: 在这些练习中，我们强调数据准备过程的迭代性。这是一个需要耐心、关注细节，并且通常需要多次清洗和验证的过程。我们还强调理解数据背后的业务背景的重要性，因为这种知识在整个准备过程中指导着决策。
- en: By the end of this chapter, readers will understand data preparation is not
    just a preliminary step, but an integral part of the analytical process. The skills
    acquired here lay the foundation for all subsequent analyses, ensuring that the
    insights derived are based on clean, well-structured data. As we progress through
    the book, the importance of these data preparation techniques will become increasingly
    evident, reinforcing the notion that mastery of these skills is essential for
    any aspiring business analyst.
  id: totrans-338
  prefs: []
  type: TYPE_NORMAL
  zh: 到本章结束时，读者将理解数据准备不仅是一个初步步骤，而且是分析过程的一个组成部分。在这里获得的能力为所有后续分析奠定了基础，确保所得出的见解基于干净、结构良好的数据。随着我们继续阅读本书，这些数据准备技术的重要性将越来越明显，强化了掌握这些技能对于任何有志于成为商业分析师的人来说是至关重要的。
- en: Data Preparation
  id: totrans-339
  prefs: []
  type: TYPE_NORMAL
  zh: 数据准备
- en: Steps in Preparing the Data Set for Analysis
  id: totrans-340
  prefs: []
  type: TYPE_NORMAL
  zh: 准备分析数据集的步骤
- en: In the first set of exercises, we consider the importance of shaping and cleaning
    data files. [Figure 3.1](#fig3-1) shows the Data Cleansing Cycle with many activities
    needed to prepare data for analysis, starting with importing the data, merging
    the datasets, standardizing and normalizing data, rebuilding missing data, de-duplicating,
    and verifying and enriching the dataset. The object is to produce a dataset in
    Excel in the flat-file format. When expressed in that format, the first row of
    the table must contain all the variable names; every row is of the same nature,
    and there are no empty rows or columns. All other rows and columns outside of
    the table area should be clear of data. Once in that format, the table is ready
    for analysis, and we can safely apply many of Excel’s analytic tools.
  id: totrans-341
  prefs: []
  type: TYPE_NORMAL
  zh: 在第一组练习中，我们考虑了塑形和清洗数据文件的重要性。[图3.1](#fig3-1)展示了数据清洗周期，其中包含许多准备数据分析所需的活动，从导入数据、合并数据集、标准化和归一化数据、重建缺失数据、去重，到验证和丰富数据集。目标是生成一个以平面文件格式存储在Excel中的数据集。当以该格式表达时，表的第行必须包含所有变量名；每一行都是同一性质，且没有空行或列。表区域之外的所有行和列应无数据。一旦达到这种格式，表格就准备好进行分析，并且我们可以安全地应用Excel的许多分析工具。
- en: '![image](images/pg38.jpg)'
  id: totrans-342
  prefs: []
  type: TYPE_IMG
  zh: '![image](images/pg38.jpg)'
- en: FIGURE 3.1 The Data Cleansing Cycle
  id: totrans-343
  prefs: []
  type: TYPE_NORMAL
  zh: 图3.1 数据清洗周期
- en: The data source varies; sometimes, we extract it from a DBMS using SQL queries.
    Other times, we may obtain a comma-separated values file (with a .CSV extension),
    or we may obtain a formatted text file (with a .TXT extension). Many datasets
    are scraped from HMTL-formatted Web pages.
  id: totrans-344
  prefs: []
  type: TYPE_NORMAL
  zh: 数据源可能多种多样；有时，我们通过SQL查询从数据库管理系统（DBMS）中提取数据。其他时候，我们可能获取一个以逗号分隔的值文件（带有.CSV扩展名），或者我们可能获取一个格式化的文本文件（带有.TXT扩展名）。许多数据集是从HTML格式的网页中抓取的。
- en: Once we practice loading data in various formats, we explore cleaning it in
    Exercise 3.1\. We practice using a small data file that contains several errors
    that need to be corrected. You are then directed to the original data to find
    the original values. The exercise allows you to exercise many tools in Excel that
    make the data cleaning process efficient.
  id: totrans-345
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦我们练习了以各种格式加载数据，我们将在3.1练习中探索清理数据。我们使用一个包含几个需要纠正的错误的小数据文件进行练习。然后，你将被引导到原始数据中找到原始值。这个练习让你有机会在Excel中练习许多使数据清理过程高效的工具。
- en: The whole process of scraping, uploading, cleaning, annotating, and shaping
    the data file is called data wrangling. Many studies have shown that this process
    is tedious and can take up to 80% of the overall time needed to perform the analysis.
    However, it is critical for success in data analysis. The more skilled you are
    in the use of cleaning and shaping tools, and the wiser you are in their use,
    the sooner you start the analysis and the less time you need to find answers.
  id: totrans-346
  prefs: []
  type: TYPE_NORMAL
  zh: 整个从抓取、上传、清理、标注到塑形数据文件的过程被称为数据整理。许多研究表明，这个过程既繁琐又可能占用执行分析所需总时间的80%。然而，对于数据分析的成功至关重要。你在使用清理和塑形工具方面的技能越熟练，你在使用它们方面的智慧越高，你开始分析的时间就越早，找到答案所需的时间就越少。
- en: Data Sources and Formats
  id: totrans-347
  prefs: []
  type: TYPE_NORMAL
  zh: 数据来源和格式
- en: Analysts must deal with many different data sources and formats. The various
    data variable types are shown in [Figure 3.2](#fig3-2). The most common types
    of data for business transactions are numeric and categorical. Computerized data
    is first collected and then stored to analyze financial transactions. The emphasis
    in the analysis is often on summarizing numeric data, which can easily be done
    with basic mathematical formulas such as average, sum, maximum, and minimum. Summarizing
    categorical data used to be complicated. Initially, analysts could only tabulate
    categorical data, counting the occurrence of each category. It was not until the
    advent of the Excel pivot table tool that evaluating categorical data in detail
    became as easy and commonplace as analyzing numerical data.
  id: totrans-348
  prefs: []
  type: TYPE_NORMAL
  zh: 分析师必须处理许多不同的数据来源和格式。各种数据变量类型如图[图3.2](#fig3-2)所示。最常见的业务交易数据类型是数值和分类。计算机化数据首先收集然后存储以分析财务交易。分析的重点通常在于汇总数值数据，这可以通过基本的数学公式如平均数、总和、最大值和最小值轻松完成。分类数据的汇总曾经很复杂。最初，分析师只能对分类数据进行制表，计算每个类别的发生次数。直到Excel数据透视表工具的出现，详细评估分类数据才变得像分析数值数据一样简单和普遍。
- en: Text data is much more complex to evaluate. It requires us to count words, but
    much of the work also requires tabulation and quantization by hand. We leave working
    with text data to more advanced texts.
  id: totrans-349
  prefs: []
  type: TYPE_NORMAL
  zh: 文本数据评估起来要复杂得多。它要求我们计算单词，但大部分工作还需要手动进行分类和量化。我们将处理文本数据的工作留给更高级的文本。
- en: '![image](images/pg39.jpg)'
  id: totrans-350
  prefs: []
  type: TYPE_IMG
  zh: '![image](images/pg39.jpg)'
- en: FIGURE 3.2 Categorizing the two types of data formats and four variable types
  id: totrans-351
  prefs: []
  type: TYPE_NORMAL
  zh: 图3.2 对两种数据格式和四种变量类型进行分类
- en: Numerical and categorical data are the most common data types, as shown in [Figure
    3.4](#fig3-4). We use standard techniques to work with these data types, such
    as pivot tables and numerical summarization functions. With the advent of social
    networks and sophisticated data tools, text data analysis is now more abundant
    and its analysis more commonplace.
  id: totrans-352
  prefs: []
  type: TYPE_NORMAL
  zh: 数值数据和分类数据是最常见的数据类型，如图[图3.4](#fig3-4)所示。我们使用标准技术来处理这些数据类型，例如数据透视表和数值汇总函数。随着社交网络和复杂数据工具的出现，文本数据分析现在更加丰富，其分析也更加普遍。
- en: It is essential to know where data can be found and in what form it exists in
    order to optimize the scraping and shaping process to ultimately produce it in
    the right format for analysis. In this chapter, we discuss the various forms in
    which we receive data.
  id: totrans-353
  prefs: []
  type: TYPE_NORMAL
  zh: 为了优化抓取和塑形过程，最终以适合分析的正确格式生成数据，了解数据可以找到的位置以及它存在的形式是至关重要的。在本章中，我们讨论了我们接收数据的各种形式。
- en: What is Data Shaping?
  id: totrans-354
  prefs: []
  type: TYPE_NORMAL
  zh: 什么是数据塑形？
- en: Data comes to us in many shapes and sizes, as we saw in the previous chapter.
    For most of our analytical tools, the data should be in a tabular format. Shaping
    the dataset entails transforming it from whatever shape the data is acquired in
    (such as a report, an SQL query output, a CSV file, or an Excel file) into the
    proper format ready for analysis with our tools.
  id: totrans-355
  prefs: []
  type: TYPE_NORMAL
  zh: 数据以各种形状和大小来到我们身边，正如我们在上一章所看到的。对于我们的大多数分析工具来说，数据应该以表格格式呈现。数据集的塑形意味着将其从数据获取的任何形状（例如报告、SQL查询输出、CSV文件或Excel文件）转换成适合我们工具分析的适当格式。
- en: Data analysts spend large portion of their time cleaning and shaping the dataset.
    A survey conducted by the data science company Crowdflower in 2016 shows the breakdown
    in tasks and the time needed to complete each ([Figure 3.3](#fig3-3)).
  id: totrans-356
  prefs: []
  type: TYPE_NORMAL
  zh: 数据分析师花费大量时间在数据清洗和塑形上。2016年，数据科学公司Crowdflower进行的一项调查显示了任务分解和完成每个任务所需的时间（[图3.3](#fig3-3)）。
- en: '![image](images/pg40.jpg)'
  id: totrans-357
  prefs: []
  type: TYPE_IMG
  zh: '![图片](images/pg40.jpg)'
- en: FIGURE 3.3 Typical proportions for cleaning, shaping, and analysis (Crowdflower
    16)
  id: totrans-358
  prefs: []
  type: TYPE_NORMAL
  zh: 图3.3 清洗、塑形和分析的典型比例（Crowdflower 16）
- en: The Flat-File Format
  id: totrans-359
  prefs: []
  type: TYPE_NORMAL
  zh: 平面文件格式
- en: Storing data in a simple structure of rows and columns is common today, often
    done with an Excel spreadsheet. This format has many limitations that may be overcome
    with sophisticated data structures, such as an RDBMS, including indexing, the
    economy of storage, easier retrieval, and additional massive datasets. Corporate
    data may sometimes be found stored using these more complex systems, but to use
    the data to answer questions, we extract the data from these complex systems and
    present it to the analyst in the simple form of a flat-file of rows and columns.
  id: totrans-360
  prefs: []
  type: TYPE_NORMAL
  zh: 在当今，将数据存储在简单的行列结构中是很常见的，通常使用Excel电子表格来完成。这种格式存在许多局限性，可以通过复杂的数据结构来克服，例如关系型数据库管理系统（RDBMS），包括索引、存储经济性、更易检索以及额外的海量数据集。企业数据有时可能使用这些更复杂的系统进行存储，但为了使用这些数据来回答问题，我们需要从这些复杂系统中提取数据，并以行列的简单形式呈现给分析师。
- en: A flat-file can also be considered a database, albeit a simple one, with data
    stored uniformly. Records (the rows) follow a consistent format, and there are
    no structures for indexing or recognizing relationships between records. Column
    names are often the named variables. A flat-file can be a plain text file or a
    binary file. Relationships may be inferred from the data in the file, but the
    table format itself does not make those relationships explicit. In a flat-file,
    all the rows are about the same population, such as orders, customers, patients,
    companies, or payments.
  id: totrans-361
  prefs: []
  type: TYPE_NORMAL
  zh: 平面文件也可以被视为一个数据库，尽管是一个简单的数据库，数据存储是统一的。记录（行）遵循一致的格式，没有用于索引或识别记录之间关系的结构。列名通常是命名变量。平面文件可以是纯文本文件或二进制文件。可以从文件中的数据推断出关系，但表格格式本身并不明确这些关系。在平面文件中，所有行都是关于同一群体的，例如订单、客户、病人、公司或支付。
- en: We often use spreadsheets as a database or as a container for data. We usually
    load these spreadsheets with many non-data elements that are not useful for data
    analysis. For example, a particular spreadsheet may be a report with titles, page
    numbers, and the coloring of specific cells to make it easier for humans to read
    and interpret the information. Some of this is metadata (data about the dataset),
    such as a data dictionary. To make the analysis more straightforward, we need
    to remove all of these human interface elements from the spreadsheet and format
    the remaining data into a row and column format. Some summarization tools in spreadsheets,
    such as the pivot table tool, require us to format the file this way.
  id: totrans-362
  prefs: []
  type: TYPE_NORMAL
  zh: 我们经常将电子表格用作数据库或数据容器。我们通常将这些电子表格加载许多对数据分析无用的非数据元素。例如，特定的电子表格可能是一个包含标题、页码以及特定单元格着色以方便人类阅读和解释信息的报告。其中一些是元数据（关于数据集的数据），例如数据字典。为了使分析更加直接，我们需要从电子表格中移除所有这些人类界面元素，并将剩余的数据格式化为行列格式。电子表格中的一些汇总工具，如数据透视表工具，要求我们以这种方式格式化文件。
- en: Moreover, programming languages for analysis such as R, readily ingest data
    in this form. In R, we refer to this format of data as dataframes. In most cases,
    the flat-file format is a convenient structure for analysis. [Figure 3.4](#fig3-4)
    shows a spreadsheet in the flat-file format.
  id: totrans-363
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，用于分析的编程语言，如R，可以轻松地处理这种形式的数据。在R中，我们将这种数据格式称为dataframes。在大多数情况下，平面文件格式是分析的一个方便结构。[图3.4](#fig3-4)展示了平面文件格式的电子表格。
- en: '![image](images/pg42_1.jpg)'
  id: totrans-364
  prefs: []
  type: TYPE_IMG
  zh: '![图片](images/pg42_1.jpg)'
- en: FIGURE 3.4 The flat-file format showing the elements of the rows and columns
  id: totrans-365
  prefs: []
  type: TYPE_NORMAL
  zh: 图3.4 平面文件格式展示行列元素
- en: '![image](images/pg42_2.jpg)'
  id: totrans-366
  prefs: []
  type: TYPE_IMG
  zh: '![图片](images/pg42_2.jpg)'
- en: FIGURE 3.5 The elements of a flat-file
  id: totrans-367
  prefs: []
  type: TYPE_NORMAL
  zh: 图3.5 平面文件的元素
- en: Before applying an analysis tool to a file, always ask “Is this dataset in a
    flat-file format?” Shaping the dataset into a flat-file results in a tabular format,
    with each variable in a column and the top row of the table containing the variable
    names. Each row of the table is an instantiation for the population being documented.
    [Figure 3.5](#fig3-5) is an excellent example of a table in such a format.
  id: totrans-368
  prefs: []
  type: TYPE_NORMAL
  zh: 在将分析工具应用于文件之前，总是要问自己：“这个数据集是否为平面文件格式？”将数据集塑造成平面文件格式会得到一个表格格式，其中每个变量占据一列，表格的最上面一行包含变量名。表格的每一行都是被记录的群体的一个实例。[图3.5](#fig3-5)是这种格式的表格的一个优秀示例。
- en: Let’s consider the table given in [Figure 3.6](#fig3-6).
  id: totrans-369
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们考虑[图3.6](#fig3-6)中给出的表格。
- en: '![image](images/pg43.jpg)'
  id: totrans-370
  prefs: []
  type: TYPE_IMG
  zh: '![图片](images/pg43.jpg)'
- en: FIGURE 3.6 A data file not in the flat-file format
  id: totrans-371
  prefs: []
  type: TYPE_NORMAL
  zh: 图3.6 非平面文件格式的数据文件
- en: Apply the flat-file format criteria to the table. Is this table in a flat-file
    format? The obvious answer is no. Excel can handle this data format, and a great
    deal of analysis can be performed in Excel on the dataset as is, but most analysis
    programs will not accept the data as it is. In [Figure 3.6](#fig3-6), we see two
    variables in the dataset. One variable is the type of store that was being started,
    and the other variable is the starting capital needed to open that type of store.
    One variable is categorical; the other variable is numerical. In reality, there
    should be a two-column, or two-variable, table with each row of the table being
    a particular store type needing individual capital cost datasets. We might even
    add a third variable with a unique identifier to each row or observation, but
    it is not necessary to do so. It would require significant data shaping to put
    the data from this table into a flat-file format so it can be uploaded to an analysis
    platform other than Excel.
  id: totrans-372
  prefs: []
  type: TYPE_NORMAL
  zh: 将平面文件格式标准应用于该表格。这个表格是否在平面文件格式中？明显的答案是：不是。Excel可以处理这种数据格式，并且可以在现有的数据集上执行大量分析，但大多数分析程序都不会接受这种原始数据。在[图3.6](#fig3-6)中，我们看到数据集中有两个变量。一个变量是正在开设的商店类型，另一个变量是开设这种类型商店所需的启动资金。一个变量是分类变量；另一个变量是数值变量。实际上，应该有一个两列或两个变量的表格，其中表格的每一行代表需要单独资本成本数据集的特定商店类型。我们甚至可以添加一个具有唯一标识符的第三个变量到每一行或观察中，但这不是必需的。将这个表格的数据塑造成平面文件格式以便上传到Excel以外的分析平台，需要进行大量的数据塑形工作。
- en: In the next two exercises, we show approaches to shape the data file into a
    flat-file format and how to remove errors from a data file.
  id: totrans-373
  prefs: []
  type: TYPE_NORMAL
  zh: 在接下来的两个练习中，我们将展示如何将数据文件塑造成平面文件格式以及如何从数据文件中移除错误。
- en: 'Analysis Case 3.1: Shaping the Data File'
  id: totrans-374
  prefs: []
  type: TYPE_NORMAL
  zh: 分析案例3.1：塑形数据文件
- en: Often, we either cause a program to produce a report or receive a report file
    electronically from coworkers that was produced by report writers in data processing
    systems or as a result of their own analysis in Excel. If the data is already
    in tabular form, shaping the dataset into a flat-file is relatively straightforward.
    If the data has been shaped into a reporting format that is more complex, we must
    perform extensive work.
  id: totrans-375
  prefs: []
  type: TYPE_NORMAL
  zh: 通常，我们或者让程序生成报告，或者从同事那里电子接收由数据处理系统中的报告编写者生成的报告文件，或者作为他们在Excel中自己分析的结果。如果数据已经是表格形式，将数据集塑造成平面文件相对简单。如果数据已经被塑造成更复杂的报告格式，我们必须进行大量工作。
- en: Take, for example, a proposed yearly departmental budget broken down by month,
    as shown in [Figure 3.7](#fig3-7). The data file may be found in the Case Data
    store of files that accompanies this book. Open the Data Cleaning and Shaping
    Exercise – Budget Report.xlxs file.
  id: totrans-376
  prefs: []
  type: TYPE_NORMAL
  zh: 以一个按月细分的一年度部门预算提案为例，如图3.7所示。[图3.7](#fig3-7)中的数据文件可以在本书附带的案例数据存储文件中找到。打开数据清洗和塑形练习
    – 预算报告.xlxs文件。
- en: '![image](images/pg45_1.jpg)'
  id: totrans-377
  prefs: []
  type: TYPE_IMG
  zh: '![图片](images/pg45_1.jpg)'
- en: FIGURE 3.7 A typical departmental budget proposal in report format
  id: totrans-378
  prefs: []
  type: TYPE_NORMAL
  zh: 图3.7 报告格式的典型部门预算提案
- en: Let’s assume your supervisor received this budget proposal as an Excel file
    (with no data table to support it). Your supervisor asked if you could generate
    a report of expense types broken down by cost types, similar to what is shown
    in [Figure 3.8](#fig3-8). That can easily be generated by a pivot table in Excel
    but not from the existing data format.
  id: totrans-379
  prefs: []
  type: TYPE_NORMAL
  zh: 假设你的主管收到了这个预算提案的Excel文件（没有数据表来支持它）。你的主管询问你是否能生成一个按成本类型细分费用类型的报告，类似于[图3.8](#fig3-8)中所示的内容。这可以通过Excel中的数据透视表轻松生成，但不能从现有的数据格式中生成。
- en: '![image](images/pg45_2.jpg)'
  id: totrans-380
  prefs: []
  type: TYPE_IMG
  zh: '![图片](images/pg45_2.jpg)'
- en: FIGURE 3.8 Required report of expenses by cost types
  id: totrans-381
  prefs: []
  type: TYPE_NORMAL
  zh: 图3.8 按成本类型要求的费用报告
- en: The original table that created this budget report may be extracted from the
    formatted budget report by taking each number from the budget report and creating
    the flat-file by hand. Or, by clever manipulation, you can extract the main data
    points from the original table and create a flat-file from which many questions
    can be answered by further analysis, including the results produced in [Figure
    3.8](#fig3-8). We need to shape the data.
  id: totrans-382
  prefs: []
  type: TYPE_NORMAL
  zh: 创建此预算报告的原始表格可能通过从预算报告中提取每个数字并手动创建平面文件来提取。或者，通过巧妙的操作，可以从原始表格中提取主要数据点并创建一个平面文件，通过进一步分析可以回答许多问题，包括图表
    3.8（#fig3-8）中产生的结果。我们需要调整数据格式。
- en: If you look carefully and analyze the table, you notice that there are four
    variables of interest in that table. Everything else is summaries or title cells.
    We also do not need the coloring of the cells, which is not required for a machine
    to process the data. The four variables are Month, Expense Type, Cost Type, and
    Amount.
  id: totrans-383
  prefs: []
  type: TYPE_NORMAL
  zh: 如果仔细观察并分析表格，你会注意到该表格中有四个感兴趣的变量。其他一切都是汇总或标题单元格。我们也不需要单元格的着色，这对于机器处理数据不是必需的。这四个变量是月份、费用类型、成本类型和金额。
- en: Starting with the given budget table ([Figure 3.7](#fig3-7)), we copy and paste
    (values only) the entire table into another worksheet. Delete all summary rows
    and columns and the cells with titles to leave behind the data, as shown in [Figure
    3.9](#fig3-9).
  id: totrans-384
  prefs: []
  type: TYPE_NORMAL
  zh: 从给定的预算表（图表 3.7）开始，我们将整个表格（仅值）复制粘贴到另一个工作表中。删除所有汇总行和列以及标题单元格，以保留数据，如图表 3.9 所示。
- en: '![image](images/pg46.jpg)'
  id: totrans-385
  prefs: []
  type: TYPE_IMG
  zh: '![图片](images/pg46.jpg)'
- en: FIGURE 3.9 Budget table with only the data elements, without the subtotals and
    labeling components
  id: totrans-386
  prefs: []
  type: TYPE_NORMAL
  zh: 图表 3.9 仅包含数据元素、没有小计和标签组件的预算表
- en: The table is laid out with the months across the top of the table. The months
    need to be in a column in our flat-file since it is one of the four variables.
    The best way to quickly further transform the table is to copy and paste the transformation
    of the table into another worksheet. [Figure 3.10](#fig3-10) shows the transposed
    table pasted into a new tab of the Excel file.
  id: totrans-387
  prefs: []
  type: TYPE_NORMAL
  zh: 表格布局为月份位于表格顶部。月份需要位于我们的平面文件中的一个列中，因为它是我们四个变量之一。快速进一步转换表格的最佳方式是将表格的转换复制粘贴到另一个工作表中。[图表
    3.10](#fig3-10) 显示了转置的表格粘贴到 Excel 文件的新标签页中。
- en: '![image](images/pg47_1.jpg)'
  id: totrans-388
  prefs: []
  type: TYPE_IMG
  zh: '![图片](images/pg47_1.jpg)'
- en: FIGURE 3.10 The transposed table
  id: totrans-389
  prefs: []
  type: TYPE_NORMAL
  zh: 图表 3.10 转置的表格
- en: 'Now, the hard work begins. Each number in the table has three categorical variables
    associated with it: a month, an expense type, and a cost type. There are monthly
    columns across the table, and they need to be transferred into the four vertical
    columns. The result is one table, shown in [Figure 3.11](#fig3-11), with four
    variables: the month, expense type, cost type, and amount.'
  id: totrans-390
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，艰苦的工作开始了。表格中的每个数字都与三个分类变量相关联：月份、费用类型和成本类型。表格中有多个月份列，它们需要转移到四个垂直列中。结果是只有一个表格，如图表
    3.11 所示，包含四个变量：月份、费用类型、成本类型和金额。
- en: '![image](images/pg47_2.jpg)'
  id: totrans-391
  prefs: []
  type: TYPE_IMG
  zh: '![图片](images/pg47_2.jpg)'
- en: 'FIGURE 3.11 Final flat-file showing the four variables: Month, Expense Type,
    Cost Type, and Amount'
  id: totrans-392
  prefs: []
  type: TYPE_NORMAL
  zh: 图表 3.11 显示四个变量的最终平面文件：月份、费用类型、成本类型和金额
- en: As always, when moving a lot of data, we want to make sure that we do not introduce
    any errors. Thus, we should reproduce the budget report using a pivot table and
    compare it to ensure that we have the same numbers. Once we have the data in a
    flat-file format, creating a summary using a pivot table is a simple matter. We
    can easily recreate the budget report ([Figure 3.7](#fig3-7)) with a pivot table
    shown in [Figure 3.12](#fig3-12) by judicious use of a pivot definition table
    with subcategories, defined in [Figure 3.13](#fig3-13).
  id: totrans-393
  prefs: []
  type: TYPE_NORMAL
  zh: 像往常一样，在移动大量数据时，我们想确保不引入任何错误。因此，我们应该使用交叉表重建预算报告并与之比较，以确保我们有相同的数字。一旦我们将数据以平面文件格式整理好，使用交叉表创建汇总就是一个简单的问题。我们可以通过巧妙地使用定义在图表
    3.13（#fig3-13）中的子类别交叉定义表，轻松地用图表 3.12（#fig3-12）中显示的交叉表重建预算报告（图表 3.7）。
- en: '![image](images/pg48_1.jpg)'
  id: totrans-394
  prefs: []
  type: TYPE_IMG
  zh: '![图片](images/pg48_1.jpg)'
- en: FIGURE 3.12 Recreation of the budget report using a pivot table applied to the
    final flat-file
  id: totrans-395
  prefs: []
  type: TYPE_NORMAL
  zh: 图表 3.12 使用交叉表对最终平面文件进行的预算报告重建
- en: '![image](images/pg48_2.jpg)'
  id: totrans-396
  prefs: []
  type: TYPE_IMG
  zh: '![图片](images/pg48_2.jpg)'
- en: FIGURE 3.13 The pivot table definition for the budget report recreation
  id: totrans-397
  prefs: []
  type: TYPE_NORMAL
  zh: 图表 3.13 预算报告重建的交叉表定义
- en: When comparing the pivot table (shown in [Figure 3.12](#fig3-12)) that recreated
    the budget report to the original report we were given (shown in [Figure 3.7](#fig3-7)),
    we notice something very curious. The numbers in row eight of the original report
    do not match the correspondingly computed numbers in our pivot table report. How
    can that be? Which is wrong, the pivot table or the original report?
  id: totrans-398
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们将重新创建的预算报告的交叉表（如图3.12所示）与提供的原始报告（如图3.7所示）进行比较时，我们注意到一个非常奇怪的现象。原始报告中第8行的数字与我们的交叉表报告中相应计算出的数字不匹配。这是怎么回事？是交叉表还是原始报告错了？
- en: The individual data points need to be checked. They all seem right; they appear
    to have transferred over properly. Why is there a discrepancy? When you check
    the formulas behind the subtotals in row 8, you notice that whoever created the
    report did not pick up all three rows of cost data above the subtotal to aggregate
    them, but only two of the rows for row 8\. The formulas are correct for all the
    other subtotals, but not for row 8\. The original report was wrong! Once you change
    the formula, the two tables match. You have been able to clean up the original
    report, which, if circulated as is, would have given the wrong budget numbers
    in the proposed budget.
  id: totrans-399
  prefs: []
  type: TYPE_NORMAL
  zh: 需要检查个别数据点。它们看起来都正确；它们似乎已经正确传输。为什么会有差异？当你检查第8行小计背后的公式时，你会注意到创建报告的人没有将小计之上的所有三行成本数据聚合起来，而只聚合了第8行的两行。其他所有小计的公式都是正确的，但第8行不是。原始报告是错误的！一旦你更改了公式，两个表格就匹配了。你已经能够清理原始报告，如果按原样分发，就会在拟议的预算中给出错误的预算数字。
- en: 'Analysis Case 3.2: Cleaning the Data File'
  id: totrans-400
  prefs: []
  type: TYPE_NORMAL
  zh: 分析案例3.2：清理数据文件
- en: Let’s do some additional data cleaning and data shaping work with some data
    files.
  id: totrans-401
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们使用一些数据文件进行一些额外的数据清洗和数据整理工作。
- en: A drug manufacturer has collected drug test data on 178 patients. We suspect
    that the data has transcription problems. (There were errors when entering data
    into the computer from the experiment notes.) Before analyzing the dataset, we
    want to make sure it is free of errors. Follow the instructions below to prepare
    the dataset for analysis and use the data from [http://bit.ly/2zoUVqz](http://bit.ly/2zoUVqz).
  id: totrans-402
  prefs: []
  type: TYPE_NORMAL
  zh: 一种药物制造商收集了178名患者的药物测试数据。我们怀疑数据存在转录错误。（在将实验笔记中的数据输入计算机时出现了错误。）在分析数据集之前，我们想确保它没有错误。按照以下说明准备数据集以供分析和使用数据：[http://bit.ly/2zoUVqz](http://bit.ly/2zoUVqz)。
- en: Copy and paste the data into a new Excel spreadsheet. Note that all the data
    is in one column. The data dictionary is available at [https://bit.ly/2HymiXr](https://bit.ly/2HymiXr).
    Use the “Text to Columns” function under the Data ribbon to distribute the data
    into their respective columns. You may also obtain the data by this other method.
  id: totrans-403
  prefs: []
  type: TYPE_NORMAL
  zh: 将数据复制粘贴到一个新的Excel工作表中。请注意，所有数据都在一个列中。数据字典可在[https://bit.ly/2HymiXr](https://bit.ly/2HymiXr)找到。使用数据选项卡下的“文本分列”功能将数据分布到各自的列中。您也可以通过这种方法获取数据。
- en: Using the Case Data set find the file calciumgood.txt. The data dictionary for
    this file is calcium.txt. Open calciumgood.txt using Excel. Use the Excel import
    function to import the data file from the Excel Data ribbon set of functions.
  id: totrans-404
  prefs: []
  type: TYPE_NORMAL
  zh: 使用案例数据集找到calciumgood.txt文件。该文件的字典是calcium.txt。使用Excel打开calciumgood.txt。使用Excel数据选项卡上的导入功能从Excel数据选项卡导入数据文件。
- en: The data is in columns, but there are no column titles. Use the data dictionary
    to add column titles, so all the variables are labeled. Note that the file is
    now in a flat-file format with columns as variables and rows as records. Save
    the file as calcium.xlsx.
  id: totrans-405
  prefs: []
  type: TYPE_NORMAL
  zh: 数据是按列排列的，但没有列标题。使用数据字典添加列标题，以便所有变量都有标签。请注意，该文件现在以平面文件格式存储，列作为变量，行作为记录。将文件保存为calcium.xlsx。
- en: 'This file contains many errors. Clean it by examining the data and correcting
    the errors. For example, some of the numbers in the SEX column are coded as “22”
    instead of “2.” That can easily corrected. Fixing data coded as “12” is more challenging.
    If you need to refer to the original data that was collected, use this URL to
    access the original observations: [http://academic.csuohio.edu/holcombj/clean/bigtable.htm](http://academic.csuohio.edu/holcombj/clean/bigtable.htm).'
  id: totrans-406
  prefs: []
  type: TYPE_NORMAL
  zh: 这个文件包含许多错误。通过检查数据并纠正错误来清理它。例如，在SEX列中，一些数字被编码为“22”而不是“2。”这可以很容易地纠正。修复编码为“12”的数据更具挑战性。如果您需要参考收集的原始数据，请使用此网址访问原始观测数据：[http://academic.csuohio.edu/holcombj/clean/bigtable.htm](http://academic.csuohio.edu/holcombj/clean/bigtable.htm)。
- en: 'When you feel reasonably sure you have a clean data file, use Excel to answer
    the following questions:'
  id: totrans-407
  prefs: []
  type: TYPE_NORMAL
  zh: 当你感觉相当有把握你有一个干净的数据文件时，使用Excel回答以下问题：
- en: How many men and how many women were in the study? Sort by gender and compute
    a sum for each group.
  id: totrans-408
  prefs: []
  type: TYPE_NORMAL
  zh: 研究中有多少男性和多少女性？按性别排序，并计算每个组的总和。
- en: Were the tests evenly distributed over the labs? Sort by lab type and compute
    subtotals by lab type.
  id: totrans-409
  prefs: []
  type: TYPE_NORMAL
  zh: 测试是否均匀分布在各个实验室？按实验室类型排序，并按实验室类型计算小计。
- en: Are the calcium levels for the males above or below the average for the females
    in the test? Sort by gender and use the AVG function to average the CAMMOL columns
    for each sex.
  id: totrans-410
  prefs: []
  type: TYPE_NORMAL
  zh: 测试中男性的钙水平是否高于或低于女性的平均水平？按性别排序，并使用AVG函数计算每个性别的CAMMOL列的平均值。
- en: Check your results against the solutions below ([Figure 3.14](#fig3-14)). Keep
    cleaning the data until you have found all the errors.
  id: totrans-411
  prefs: []
  type: TYPE_NORMAL
  zh: 将你的结果与下面的解决方案进行核对([图3.14](#fig3-14)). 继续清洗数据，直到你找到所有错误。
- en: '![image](images/pg51.jpg)'
  id: totrans-412
  prefs: []
  type: TYPE_IMG
  zh: '![image](images/pg51.jpg)'
- en: FIGURE 3.14 Analysis results computed after cleaning the data file
  id: totrans-413
  prefs: []
  type: TYPE_NORMAL
  zh: 图3.14 清洗数据文件后的分析结果
- en: 'Analysis Case 3.3: Cleaning and Shaping the SFO Survey Dataset'
  id: totrans-414
  prefs: []
  type: TYPE_NORMAL
  zh: 分析案例3.3：清洗和塑造SFO调查数据集
- en: To prepare the dataset for further analysis, we need to clean the dataset. We
    should remove all rows that have no impact on the result we are looking for. For
    example, in column Q7ALL, the result 0, 6, or blank are meaningless in our analysis,
    and we should remove those rows. In Excel, we can filter them out using the Filter
    function and delete them. The results are shown in [Figure 3.15](#fig3-15).
  id: totrans-415
  prefs: []
  type: TYPE_NORMAL
  zh: 为了准备数据集以进行进一步分析，我们需要清洗数据集。我们应该移除所有对我们想要的结果没有影响的行。例如，在Q7ALL列中，结果0、6或空白在我们的分析中是无意义的，我们应该移除这些行。在Excel中，我们可以使用过滤功能过滤它们并删除它们。结果如图3.15所示。
- en: '![image](images/pg52.jpg)'
  id: totrans-416
  prefs: []
  type: TYPE_IMG
  zh: '![image](images/pg52.jpg)'
- en: FIGURE 3.15 Use the Filter function to filter out meaningless rows
  id: totrans-417
  prefs: []
  type: TYPE_NORMAL
  zh: 图3.15 使用过滤函数过滤掉无意义的行
- en: Once you see only the rows that satisfy the specific condition you set, delete
    those cells and obtain a result like that shown in [Figure 3.16](#fig3-16).
  id: totrans-418
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦你只看到满足你设置的特定条件的行，删除这些单元格，并获得[图3.16](#fig3-16)中所示的结果。
- en: '![image](images/pg53.jpg)'
  id: totrans-419
  prefs: []
  type: TYPE_IMG
  zh: '![image](images/pg53.jpg)'
- en: FIGURE 3.16 Steps to delete specific cells
  id: totrans-420
  prefs: []
  type: TYPE_NORMAL
  zh: 图3.16 删除特定单元格的步骤
- en: Turn off the Filter function, and the remaining rows are the data you want to
    analyze. Similar to Q7ALL, when you analyze Q9ALL and Q10SAFE, you should remove
    cells with 0, 6, or blank to get a more meaningful result.
  id: totrans-421
  prefs: []
  type: TYPE_NORMAL
  zh: 关闭过滤功能，剩余的行就是你要分析的数据。类似于Q7ALL，当你分析Q9ALL和Q10SAFE时，你应该移除包含0、6或空白的单元格以获得更有意义的结果。
- en: After removing all meaningless cells, a new sheet will look like that shown
    in [Figure 3.17](#fig3-17).
  id: totrans-422
  prefs: []
  type: TYPE_NORMAL
  zh: 在移除所有无意义单元格后，新的工作表将看起来像[图3.17](#fig3-17)中所示的那样。
- en: '![image](images/pg54.jpg)'
  id: totrans-423
  prefs: []
  type: TYPE_IMG
  zh: '![image](images/pg54.jpg)'
- en: FIGURE 3.17 Output after cleaning
  id: totrans-424
  prefs: []
  type: TYPE_NORMAL
  zh: 图3.17 清洗后的输出
- en: 'Analysis Case 3.4: Shaping the SBA Loans Dataset'
  id: totrans-425
  prefs: []
  type: TYPE_NORMAL
  zh: 分析案例3.4：塑造SBA贷款数据集
- en: Excel can help analysts clean and shape small datasets; however, when the dataset
    is large, Excel may not be useful. In this case study, we use R to prepare the
    SBA Loans dataset due to the size of the dataset.
  id: totrans-426
  prefs: []
  type: TYPE_NORMAL
  zh: Excel可以帮助分析师清洗和塑造小型数据集；然而，当数据集很大时，Excel可能就不再有用。在本案例研究中，我们使用R来准备SBA贷款数据集，因为数据集的大小。
- en: Import the dataset into RStudio, as shown in [Figures 3.18](#fig3-18) and [3.19](#fig3-19).
  id: totrans-427
  prefs: []
  type: TYPE_NORMAL
  zh: 将数据集导入RStudio，如图3.18和3.19所示。
- en: '![image](images/pg55_1.jpg)'
  id: totrans-428
  prefs: []
  type: TYPE_IMG
  zh: '![image](images/pg55_1.jpg)'
- en: FIGURE 3.18 Steps to import the dataset into RStudio
  id: totrans-429
  prefs: []
  type: TYPE_NORMAL
  zh: 图3.18 将数据集导入RStudio的步骤
- en: '![image](images/pg55_2.jpg)'
  id: totrans-430
  prefs: []
  type: TYPE_IMG
  zh: '![image](images/pg55_2.jpg)'
- en: FIGURE 3.19 Showing the dataset imported in RStudio
  id: totrans-431
  prefs: []
  type: TYPE_NORMAL
  zh: 图3.19 显示导入RStudio中的数据集
- en: We want to know what year each loan was approved. To do so, we can use the following
    code to create a new variable ApprovalYear.
  id: totrans-432
  prefs: []
  type: TYPE_NORMAL
  zh: 我们想知道每笔贷款是在哪一年批准的。为此，我们可以使用以下代码创建一个新的变量ApprovalYear。
- en: '| SBALaons$ApprovalYear <- as.numeric(format(SBALaons$ApprovalDate, "%Y"))
    |'
  id: totrans-433
  prefs: []
  type: TYPE_TB
  zh: '| SBALaons$ApprovalYear <- as.numeric(format(SBALaons$ApprovalDate, "%Y"))
    |'
- en: We may want to know how many months each loan is used to pay all back. To do
    so, we can use the interval function under package lubridate.
  id: totrans-434
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可能想知道每笔贷款用了多少个月来支付全部款项。为此，我们可以使用lubridate包下的interval函数。
- en: '| install.packages("lubridate")library(lubridate)SBALaons$PaidInFullPeriod
    <-interval(SBALaons$ApprovalDate, SBALaons$PaidInFullDate) %/% months(1) |'
  id: totrans-435
  prefs: []
  type: TYPE_TB
  zh: '| install.packages("lubridate")library(lubridate)SBALaons$PaidInFullPeriod
    <-interval(SBALaons$ApprovalDate, SBALaons$PaidInFullDate) %/% months(1) |'
- en: We can also create a new variable, FUNDED, as a substitute for the variable
    LoanStatus for future analysis by assigning “NOT FUNDED” to 0, “PIF” or “CHGOFF”
    to 1, and all others to blank by using the following code.
  id: totrans-436
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还可以创建一个新的变量FUNDED，作为LoanStatus变量的替代，用于未来的分析，通过以下代码将“NOT FUNDED”赋值为0，“PIF”或“CHGOFF”赋值为1，其他所有情况赋值为空。
- en: '| library(dplyr)SBALaons <- SBALaons %>% mutate(FUNDED = case_when(SBALaons$LoanStatus
    == "NOT FUNDED" ~ "0",SBALaons$LoanStatus == "PIF" &#124; LoanStatus == "CHGOFF"
    ~ "1",TRUE ~"Blank")) |'
  id: totrans-437
  prefs: []
  type: TYPE_TB
  zh: '| library(dplyr)SBALaons <- SBALaons %>% mutate(FUNDED = case_when(SBALaons$LoanStatus
    == "NOT FUNDED" ~ "0",SBALaons$LoanStatus == "PIF" &#124; LoanStatus == "CHGOFF"
    ~ "1",TRUE ~"Blank")) |'
- en: Like the previous situation, we can bin (make into a binary variable with only
    two values, 0 or 1) the variable LoanStatus to create a new variable PAIDOFF.
  id: totrans-438
  prefs: []
  type: TYPE_NORMAL
  zh: 与前一种情况类似，我们可以将变量LoanStatus进行二值化（将其转换为只有两个值，0或1的二进制变量）以创建一个新的变量PAIDOFF。
- en: '| SBALaons <- SBALaons %>% mutate(PAIDOFF = case_when(SBALaons$LoanStatus ==
    "CHGOFF" ~ "0",SBALaons$LoanStatus == "PIF" ~ "1",TRUE ~"Blank")) |'
  id: totrans-439
  prefs: []
  type: TYPE_TB
  zh: '| SBALaons <- SBALaons %>% mutate(PAIDOFF = case_when(SBALaons$LoanStatus ==
    "CHGOFF" ~ "0",SBALaons$LoanStatus == "PIF" ~ "1",TRUE ~"Blank")) |'
- en: The shaped dataset will look like [Figure 3.20](#fig3-20).
  id: totrans-440
  prefs: []
  type: TYPE_NORMAL
  zh: 整理后的数据集将类似于[图3.20](#fig3-20)。
- en: '![image](images/pg57.jpg)'
  id: totrans-441
  prefs: []
  type: TYPE_IMG
  zh: '![image](images/pg57.jpg)'
- en: FIGURE 3.20 Newly created columns by running the given R code scripts
  id: totrans-442
  prefs: []
  type: TYPE_NORMAL
  zh: 图3.20 运行给定的R代码脚本创建的新列
