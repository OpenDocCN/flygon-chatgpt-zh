  type: TYPE_NORMAL
  zh: 然后，在2022年11月，OpenAI发布了ChatGPT，这是一个使用GPT的神经网络作为其基础的语言模型聊天机器人。我们将涵盖所有关于这个强大聊天机器人的技巧、窍门、优点和缺点，在接下来的章节中，但现在，我们只是想要展示一下是什么让ChatGPT成为人工智能和机器学习的革命性突破。与之前出现的任何东西不同，ChatGPT具有理解上下文的能力。这意味着它可以在单个对话中学习和适应，根据你对话的历史生成针对你问题的结果。这也意味着，在单个对话线程中，你可以“训练”GPT产生更多和更准确的答案，或者，以你更喜欢的风格写出更多和更深入的内容。
