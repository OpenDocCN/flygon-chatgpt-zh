  type: TYPE_NORMAL
- en: We now use ChatGPT to obtain more detailed answers to the framed questions provided
    by the generative AI tool. Remember that the relevant data file has already been
    loaded into ChatGPT for the previous computation. This is a continuation of the
    analysis.
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt: “What is the growth rate of the Chinese GDP and the growth rate of
    the US GDP?”'
  prefs: []
  type: TYPE_NORMAL
- en: 'Response from ChatGPT-4:'
  prefs: []
  type: TYPE_NORMAL
- en: The total GDP growth rate from 2000 to 2012 is
  prefs: []
  type: TYPE_NORMAL
- en: '• For China: Approximately 586.67%586.67%'
  prefs: []
  type: TYPE_NORMAL
- en: '• For the United States: Approximately 57.16%57.16%'
  prefs: []
  type: TYPE_NORMAL
- en: This means that during this period, China’s GDP increased by about 586.67%586.67%
    from its 2000 level, while the GDP of the United States increased by about 57.16%57.16%
    from its 2000 level. The calculation indicates a much higher growth rate for China
    compared to the United States over these years.
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt: “When do you project the Chinese GDP to catch up with the US GDP?”'
  prefs: []
  type: TYPE_NORMAL
- en: 'Response from ChatGPT-4:'
  prefs: []
  type: TYPE_NORMAL
- en: Based on the regression model and extrapolating the GDP trends into the future,
    it is projected that China’s GDP would catch up with the United States’ GDP around
    the year ≈2018≈2018, as the precise intersection is estimated to be in the year
    2017.95.
  prefs: []
  type: TYPE_NORMAL
- en: Please note that these projections are based on historical growth rates and
    the assumption that these rates will continue in the future. Real-world economic
    outcomes may vary due to a multitude of factors.
  prefs: []
  type: TYPE_NORMAL
- en: 'Analysis Case 11.2: Analysis Case Using ORDERS'
  prefs: []
  type: TYPE_NORMAL
- en: Analysis with Excel
  prefs: []
  type: TYPE_NORMAL
- en: Using the Case Dataset files, find the file ORDERS.xlsx. Open ORDERS.xlsx using
    Excel.
  prefs: []
  type: TYPE_NORMAL
- en: 'We are going to answer these questions:'
  prefs: []
  type: TYPE_NORMAL
- en: What is the yearly sales forecast for the past four years?
  prefs: []
  type: TYPE_NORMAL
- en: What is the overall sales trend?
  prefs: []
  type: TYPE_NORMAL
- en: Can we identify a province that is contributing the most to that trend?
  prefs: []
  type: TYPE_NORMAL
- en: Create a pivot table of the entire ORDERS table. Select ODERDATE as the rows
    and tabulate the sum of the SALES variable. Now, every order date for each sale
    is considered a category, so the pivot table has thousands of rows. We can aggregate
    them by year (or by month or by month and year) by using a function in the pivot
    tables. In the pivot table “Format” ribbon, find the “Group by” function. With
    any one of the dates selected in the pivot table, invoke the function and select
    “group dates by Year.” You should get a short table with four years and the sum
    of sales for all stores for all years ([Figure 11.8](#fig11-8)).
  prefs: []
  type: TYPE_NORMAL
- en: '![image](images/pg247.jpg)'
  prefs: []
  type: TYPE_IMG
- en: FIGURE 11.8 Pivot table parameters for computing the sales forecast for the
    last four years of total sales
  prefs: []
  type: TYPE_NORMAL
- en: Create a line chart of the yearly sales totals and add a trend line ([Figure
    11.9](#fig11-9)). What does the trend line tell you about overall sales?
  prefs: []
  type: TYPE_NORMAL
- en: '![image](images/pg248.jpg)'
  prefs: []
  type: TYPE_IMG
- en: FIGURE 11.9 Plot of four years of total sales with the added trend line
  prefs: []
  type: TYPE_NORMAL
- en: We notice a decrease in sales, so we need to analyze which provinces are causing
    this decline in sales. One way to do this is by creating a pivot table to show
    yearly sales for each province. To keep the chart manageable, we can limit it
    to the provinces with the highest sales by performing a Pareto analysis. We previously
    performed a Pareto analysis in the Analysis Case in [Chapter 7](16_ch07.xhtml)
    and found that six out of the 12 provinces contributed the most to annual sales.
    Let’s narrow it down further by selecting only the top four contributors – Alberta,
    British Columbia, Ontario, and Saskatchewan. We can do this by applying a filter
    on the columns and choosing these four provinces.
  prefs: []
  type: TYPE_NORMAL
- en: Creating a line chart with multiple series can be challenging when dealing with
    a table display. To simplify the process, copy the table to another spreadsheet.
    When pasting it, use the “Paste Special” function and select the “Transpose rows
    and columns” option. This will paste the data in a format that is more conducive
    to creating the correct line charts.
  prefs: []
  type: TYPE_NORMAL
- en: Please create line charts depicting sales data for the top four provinces from
    2009 to 2012\. Place total sales on a separate axis to facilitate observation
    of province trends. Additionally, add trend lines to all series (refer to [Figure
    11.10](#fig11-10)). After analyzing the charts, determine which province appears
    to be contributing the most to the overall sales decline trend.
  prefs: []
  type: TYPE_NORMAL
- en: '![image](images/pg249.jpg)'
  prefs: []
  type: TYPE_IMG
- en: FIGURE 11.10 Chart showing the sales trends by province
  prefs: []
  type: TYPE_NORMAL
- en: Perhaps displaying the monthly sales would be more useful and give us more insight.
    Repeat the process, but now group the ORDERDATE rows by Month and Year. Note that
    now the years and months are part of the table ([Figure 11.11](#fig11-11)).
  prefs: []
  type: TYPE_NORMAL
- en: '![image](images/pg250.jpg)'
  prefs: []
  type: TYPE_IMG
- en: FIGURE 11.11 Pivot table configuration for tabulating SALES by month
  prefs: []
  type: TYPE_NORMAL
- en: Create a table for the line chart. Paste the two columns from the pivot table
    to another sheet, remove the date rows, and add a month-year variable. Then, add
    a trend line ([Figure 11.12](#fig11-12)). We can see the same downward trend here.
    What else do you notice?
  prefs: []
  type: TYPE_NORMAL
- en: '![image](images/pg251.jpg)'
  prefs: []
  type: TYPE_IMG
- en: FIGURE 11.12 Trend line of monthly SALES data
  prefs: []
  type: TYPE_NORMAL
- en: There is a lot of variability to the monthly data. There is no discernible cyclicality
    to the data, either. So, this chart is not as useful as the simpler yearly data
    in discovering trends.
  prefs: []
  type: TYPE_NORMAL
- en: If we tried the same analysis for the top four provinces compared to total sales
    but monthly, the chart gets even more confusing ([Figure 11.13](#fig11-13)). One
    must produce both types of charts to see which one yields greater insight. Given
    that it was not insightful, this last chart does not need to be further formatted
    with the chart title, series names, or axes titles.
  prefs: []
  type: TYPE_NORMAL
- en: '![image](images/pg252.jpg)'
  prefs: []
  type: TYPE_IMG
- en: FIGURE 11.13 Trend analysis of monthly SALES data for the top four provinces
  prefs: []
  type: TYPE_NORMAL
- en: Analysis with R
  prefs: []
  type: TYPE_NORMAL
- en: Using the Case Dataset files provided, find the ORDERS.xlsx. Use the function
    in Jamovi with the settings shown in [Figure 11.14](#fig11-14) and results in
