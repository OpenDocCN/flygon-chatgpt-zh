  id: totrans-1355
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 为我们的网站创建准确描述我们的[产品/服务]并突出相关关键词的元标签。
- en: Write a product description optimized for search engines and incorporating relevant
