  zh: '**正如我们已知**，使用ChatGPT时，你提供的提示越具体，你的结果就会越准确。这尤其适用于让聊天机器人帮你编写代码的情况。记住，ChatGPT最擅长的工作语言不是某种编程语言，而是英语。这意味着，尽管聊天机器人会为你生成所需的编程语言代码，但你应该用清晰、语法正确、语法准确、英语的指令来提供它。除了确保你使用正确的单词和句子结构外，还要确保你尽可能为ChatGPT提供更多上下文。这对于需要作为更大编码项目一部分的代码片段尤其重要，或者如果需要理解特定框架以定制代码以满足你的特定要求。最后，如果你需要的代码需要特定的输入或输出格式，例如数字需要一个整数或圆需要一个特定的半径，确保你也包括这一点。'
