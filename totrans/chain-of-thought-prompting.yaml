- en: Chapter 30\. Synthesising Ego States using AI
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: So far, we have shown how generative AI can use Transactional Analysis to analyse
    human interactions and understand human behaviour.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s see if we can also synthesise ego states or an entire human psyche by
    using Chain of Thought Prompting and Transactional Analysis.
  prefs: []
  type: TYPE_NORMAL
- en: Synthesising Ego State Activity
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: At the simplest level, to simulate a TA-psyche using Chain of Thought Prompting,
    we must split the AI processing into the primary ego states, Parent, Adult and
    Child.
  prefs: []
  type: TYPE_NORMAL
- en: In other words, instead of using generative AI in a monolithic way, we can use
    Chain of Thought Prompting to simulate Parent, Adult and Child ego state processing
    and then recombine the output of these discrete synthetic ego states, as occurs
    in real life.
  prefs: []
  type: TYPE_NORMAL
- en: The following conversation occurred with a GPT called TA Chat ([https://t.ly/IAM0b](https://t.ly/IAM0b)),
    which is configured to provide a response from Adult, Parent or Child ego states,
    as appropriate.
  prefs: []
  type: TYPE_NORMAL
- en: '| YouIt''s so dull in London todayTA ChatFree Child: Oh, I can imagine that!
    Sometimes London can feel like it''s wearing a big grey hat, can''t it? But hey,
    even on dull days, there''s always something fun or new to explore. Maybe it''s
    a perfect day for a cosy cafe or a visit to one of those amazing museums!Nurturing
    Parent: I understand that grey days can be a bit gloomy. It''s important to take
    care of yourself during these times. Perhaps you could use this opportunity to
    do something comforting, like reading a good book or having a warm cup of tea.
    Remember, taking a moment for yourself can really brighten your day.Adult: While
    the weather is something we can''t control, we can certainly find ways to make
    the most of it. If you''re looking for indoor activities, London offers many.
    You could visit a gallery, explore a historical site, or enjoy some indoor sports
    or leisure activities. Or, it could be an opportunity to plan or organise something
    indoors, turning the day into a productive one. |'
  prefs: []
  type: TYPE_TB
- en: This output compares favourably with the following conversation with base ChatGPT.
  prefs: []
  type: TYPE_NORMAL
- en: '| YouIt''s so dull in London todayChatGPTI''m sorry to hear that it''s a dull
    day in London. If you''re looking for something to brighten your day, I can create
    a digital image for you. Just describe what you''d like to see, and I''ll generate
    an image accordingly. Whether it''s a sunny landscape, a colourful abstract piece,
    or anything else, feel free to let me know your preference! |'
  prefs: []
  type: TYPE_TB
- en: Because we asked ChatGPT to respond from each ego state discreetly, it is more
    informed and specific in the response from each ego state.
  prefs: []
  type: TYPE_NORMAL
- en: '![A group of people walking in Trafalgar Square  Description automatically
    generated](image_rsrc6GT.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A Rainy Day in London, Wikimedia Commons
  prefs: []
  type: TYPE_NORMAL
- en: Choosing a Preferred Ego State Response
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Now let’s allow the user to choose which ego state response they liked best,
    this will allow the GPT to continue the conversation in the vein best suited to
    the user.
  prefs: []
  type: TYPE_NORMAL
- en: In the following conversation, the GPT has been updated to ask the user which
    ego state response they prefer, and then to continue the conversation from that
    ego state.
  prefs: []
  type: TYPE_NORMAL
- en: '| YouIt''s so dull in London todayTA ChatFree Child: "Oh, a gloomy day in London?
    That''s just a perfect excuse to have some indoor fun! Maybe it''s time to explore
    a cosy cafe, dive into a good book, or start an exciting indoor adventure. Who
    says the rain has to spoil the day?"Nurturing Parent: "I understand that a dull
    day can feel a bit disheartening. It''s important to remember that every day has
    its own beauty, even the grey ones. This might be a lovely opportunity to relax,
    take care of yourself, and enjoy some peaceful moments indoors. How about some
    tea and a comforting activity?"Adult: "Acknowledging that the weather in London
    can often be overcast, it''s helpful to have a plan for these days. Indoor activities,
    whether they are productive tasks or leisure pursuits, can be quite fulfilling.
    You might consider visiting a museum, working on personal projects, or simply
    organising your space. It''s all about making the most of the situation."Which
    perspective do you prefer - Free Child, Nurturing Parent, or Adult?YouChildTA
    ChatFree Child: "Awesome choice! Let''s turn this dull day into an exciting one!
    How about creating your own little indoor adventure? Maybe build a fort with blankets,
    have a movie marathon with your favourite snacks, or even start a new hobby that''s
    been on your mind. The day is yours to make fun, no matter the weather. Let''s
    make the most of it with a smile and a dash of creativity!"  🌟🎉Ready to make today
    unforgettable? What''s your first fun activity going to be?  🚀🌈 |'
  prefs: []
  type: TYPE_TB
- en: 'Or:'
  prefs: []
  type: TYPE_NORMAL
- en: '| YouI need a boost in my IT careerTA ChatFree Child: Hey there! You''re looking
    for a career boost in IT? That''s awesome! Dive into the latest tech trends, like
    AI or cybersecurity. Have you thought about creating a cool app or joining some
    fun hackathons? Networking with other tech enthusiasts can be super exciting too.
    Remember, learning new skills and having fun with them is key!  🚀Nurturing Parent:
    It''s wonderful to hear you''re seeking growth in your IT career. It''s important
    to approach this with patience and kindness to yourself. Maybe consider enhancing
    your skills through online courses or certifications in areas you''re passionate
    about. Don''t forget the value of mentorship and networking. Remember, your well-being
    and work-life balance are just as important as professional development.  🌟Adult:
    Advancing in your IT career involves a strategic approach. Assess your current
    skills and identify areas for growth. Certifications in high-demand fields like
