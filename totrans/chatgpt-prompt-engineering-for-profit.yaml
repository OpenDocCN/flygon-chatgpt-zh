  id: totrans-1314
  prefs: []
  type: TYPE_NORMAL
  zh: '[**该技术的区别**]'
- en: '****Iter**ativ**e ****Brain**stormi**ng ****dif**fer**s ****fr**om** ****O**ne**-****sh**ot**
