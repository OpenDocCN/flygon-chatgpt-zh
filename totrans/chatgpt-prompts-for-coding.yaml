  prefs: []
  type: TYPE_NORMAL
  zh: '"编写测试多语言电子商务应用国际化的计划。包括验证语言翻译、货币格式和日期/时间格式的场景。讨论国际化测试如何确保无缝的全球用户体验。"'
- en: '25: Testing with Continuous Integration (CI)'
  id: totrans-530
  prefs: []
  type: TYPE_NORMAL
  zh: '25: 使用持续集成（CI）测试'
- en: 'Prompt:'
  id: totrans-531
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Explain the role of testing in a CI pipeline. Write a plan to integrate automated
    tests for a Node.js application using a CI tool like Jenkins or GitHub Actions.
    Discuss how CI pipelines improve testing efficiency and reduce integration errors."'
  id: totrans-532
  prefs: []
  type: TYPE_NORMAL
  zh: '"解释测试在 CI 流水线中的作用。制定一个计划，使用 Jenkins 或 GitHub Actions 等CI工具自动测试 Node.js 应用程序。讨论
    CI 流水线如何提高测试效率并减少集成错误。"'
- en: '26: Writing Negative Test Cases'
  id: totrans-533
  prefs: []
  type: TYPE_NORMAL
  zh: '26: 编写负面测试用例'
- en: 'Prompt:'
  id: totrans-534
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Write negative test cases for a payment processing feature, including scenarios
