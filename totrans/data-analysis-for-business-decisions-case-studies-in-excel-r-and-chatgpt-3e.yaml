  prefs: []
  type: TYPE_NORMAL
- en: To determine which type of start-up business has the best characteristics, we
    would consider factors such as lower median start-up costs and smaller interquartile
    ranges (indicating less variability in start-up costs). Based on the box plot
    and the five-point summary, the “Pets” category seems to have the lowest median
    start-up cost and a relatively small interquartile range, which may suggest it
    is a less risky option in terms of start-up expenses.
