    ****expe**ctanc**y ****a**nd** ****impr**ovin**g ****pe**opl**e''****s**** ****qua**lit**y
    ****o**f** ****li**fe**. "'
  id: totrans-859
  prefs: []
  type: TYPE_NORMAL
  zh: '■ ****乐观情景: "****基因编辑的进步将允许治疗多种遗传疾病，延长预期寿命并提高人们的生活质量。"'
- en: '■ ****Pess**imisti**c ****Sce**nari**o: "****Adv**ance**s ****wi**ll** ****b**e**
