- en: ChatGPT -
  id: totrans-921
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT -
- en: 'Prompting techniques mentioned in the document include:'
  id: totrans-922
  prefs: []
  type: TYPE_NORMAL
  zh: 文档中提到的提示技术包括：
- en: Chain-of-thought (CoT) Prompting[27].
  id: totrans-923
  prefs: []
