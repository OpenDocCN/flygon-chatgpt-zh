- en: Introduction to Prompting Basics
  id: totrans-36
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 提示基础介绍
- en: Prompting is a technique commonly used in programming and AI to guide systems
    towards desired outputs. Understanding the basics of prompting can enhance your
    ability to interact with various programming models, especially in the realm of
    natural language processing and AI-driven applications.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 提示是在编程和AI中常用的一种技术，用于引导系统向期望的输出发展。理解提示的基本原理可以提高您与各种编程模型交互的能力，尤其是在自然语言处理和AI驱动应用领域。
- en: What is Prompting?
  id: totrans-38
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 什么是提示？
- en: Prompting involves providing a model with a sequence of text (a prompt) to elicit
    a specific response or behavior. This is crucial in AI models like GPT (Generative
    Pre-trained Transformer), which require context to generate meaningful responses.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 提示涉及向模型提供一系列文本（提示），以引发特定的响应或行为。这在需要上下文来生成有意义响应的AI模型（如GPT（生成预训练变换器））中至关重要。
- en: Importance of Prompting
  id: totrans-40
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 提示的重要性
- en: 'Effective prompting can lead to:'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 有效的提示可以导致：
- en: More accurate and relevant responses from AI models.
  id: totrans-42
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 从AI模型获得更准确和相关的响应。
- en: Increased efficiency in obtaining desired outputs.
  id: totrans-43
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提高获取所需输出的效率。
- en: Better control over the behavior of AI-driven applications.
  id: totrans-44
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 更好地控制AI驱动应用程序的行为。
- en: Basic Prompting Techniques
  id: totrans-45
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 基本提示技巧
- en: 'To craft effective prompts, consider the following techniques:'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 要制作有效的提示，请考虑以下技巧：
- en: 1\. Be Specific
  id: totrans-47
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1. 具体明确
- en: Provide clear and specific instructions within your prompt. This helps the model
    understand the context and deliver more precise results.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 在你的提示中提供清晰和具体的指令。这有助于模型理解上下文并给出更精确的结果。
- en: Example of a specific prompt
  id: totrans-49
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 具体提示示例
- en: '"Write a Python function that calculates the factorial of a number."'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: '"编写一个Python函数，用于计算一个数的阶乘。"'
- en: 2\. Use Contextual Cues
  id: totrans-51
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2. 使用上下文线索
- en: Include relevant information in the prompt to guide the model effectively. Contextual
    cues can be facts, questions, or related data.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 在提示中包含相关内容以有效引导模型。上下文线索可以是事实、问题或相关数据。
- en: Example with contextual cue
  id: totrans-53
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 带有上下文线索的示例
- en: '"Given a list of integers, return the sorted list. Here''s the list: [5, 2,
    9, 1]."'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: '"给定一个整数列表，返回排序后的列表。这里是列表：[5, 2, 9, 1]。"'
- en: 3\. Test and Iterate
  id: totrans-55
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3. 测试和迭代
- en: Experiment with different prompt structures and iterate based on the outcomes.
    Testing helps refine prompts for optimal performance.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 尝试不同的提示结构并根据结果进行迭代。测试有助于优化提示以获得最佳性能。
- en: Common Challenges in Prompting
  id: totrans-57
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 提示中的常见挑战
- en: 1\. Ambiguity
  id: totrans-58
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1. 模糊性
- en: Ambiguous prompts can lead to unpredictable results. Ensure that your prompts
    are clear and unambiguous.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 模糊的提示可能导致不可预测的结果。确保你的提示清晰且无歧义。
- en: Ambiguous prompt
  id: totrans-60
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 模糊的提示
- en: '"Describe the process."'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: '"描述过程。"'
- en: Improved prompt
  id: totrans-62
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 改进的提示
- en: '"Describe the process of making a cup of coffee."'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: '"描述制作咖啡的过程。"'
- en: 2\. Overloading Information
  id: totrans-64
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2. 信息过载
- en: Providing too much information in a prompt can overwhelm the model. Keep prompts
    concise and focused on the task.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 在提示中提供过多信息可能会使模型感到不知所措。请保持提示简洁并专注于任务。
- en: Conclusion
  id: totrans-66
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: Mastering the basics of prompting is essential for intermediate developers working
    with AI models. By utilizing specific, contextual, and well-tested prompts, you
    can enhance the performance and reliability of AI-driven applications.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 掌握提示的基本技巧对于使用AI模型的中间开发者至关重要。通过利用具体、上下文丰富且经过充分测试的提示，你可以提高AI驱动应用程序的性能和可靠性。
- en: Writing Clear Prompts for AI Models
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 为AI模型编写清晰的提示
- en: Understanding the Importance of Clear Prompts
  id: totrans-69
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 理解清晰提示的重要性
- en: Writing clear prompts is essential for getting accurate and relevant responses
    from AI models. This involves crafting prompts that are specific, unambiguous,
    and contextually appropriate.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 写出清晰的提示对于从AI模型中获得准确和相关的响应至关重要。这涉及到制作具体、无歧义且上下文适当的提示。
- en: Principles of Effective Prompt Writing
  id: totrans-71
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 有效提示写作的原则
- en: 'To write effective prompts, follow these key principles:'
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 要编写有效的提示，请遵循以下关键原则：
- en: 'Clarity:  Use simple and direct language.'
  id: totrans-73
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 清晰性：使用简单直接的语言。
- en: 'Specificity:  Clearly define what you need to know or achieve.'
  id: totrans-74
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 明确性：明确说明你需要了解或实现的内容。
- en: 'Context:  Provide enough background information.'
  id: totrans-75
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 背景：提供足够的信息。
- en: Examples of Clear vs. Unclear Prompts
  id: totrans-76
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 清晰与不清晰提示的示例
- en: 'Consider the following examples to understand the difference:'
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑以下示例以了解差异：
- en: 'Unclear Prompt:'
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 不清晰的提示：
- en: Explain how to improve code.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 解释如何改进代码。
- en: 'Clear Prompt:'
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 清晰提示：
- en: Explain how to optimize a Python loop for better performance.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 解释如何优化Python循环以获得更好的性能。
- en: Structuring Your Prompt
  id: totrans-82
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 构建你的提示
- en: 'A well-structured prompt typically includes:'
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 一个结构良好的提示通常包括：
- en: 'Objective:  Clearly state the main goal.'
  id: totrans-84
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 目标：明确陈述主要目标。
- en: 'Details:  Specify any constraints or additional information.'
  id: totrans-85
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 详细信息：指定任何约束或附加信息。
- en: 'Format:  Indicate the desired format of the response if necessary.'
  id: totrans-86
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 格式：如有必要，指出所需的响应格式。
- en: Example of a Well-Structured Prompt
  id: totrans-87
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 结构良好的提示示例
- en: 'To better understand structuring, here''s an example:'
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 为了更好地理解结构，以下是一个示例：
- en: 'Objective:'
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 目标：
- en: Explain the concept of recursion in computer science.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 解释计算机科学中递归的概念。
- en: 'Details:'
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 详细信息：
- en: Include examples in Python and discuss its advantages and disadvantages.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 包括Python中的示例并讨论其优缺点。
- en: 'Format:'
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 格式：
- en: Provide a concise explanation followed by code examples.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 提供简明解释，后跟代码示例。
- en: Testing and Refining Prompts
  id: totrans-95
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 测试和改进提示
- en: 'After crafting a prompt, test it to ensure it elicits the desired response.
    Refine the prompt by:'
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 在制作提示后，测试它以确保它能引发所需响应。通过以下方式改进提示：
- en: Checking if the response meets your objective.
  id: totrans-97
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 检查响应是否符合你的目标。
- en: Adjusting the prompt based on the specificity and clarity of the response.
  id: totrans-98
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 根据响应的特定性和清晰度调整提示。
- en: Iterating until the prompt consistently produces useful answers.
  id: totrans-99
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 迭代直到提示始终产生有用的答案。
- en: Conclusion
  id: totrans-100
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 结论
- en: Writing clear prompts is a skill that improves with practice. By following these
    guidelines and continually refining your approach, you can effectively communicate
    with AI models and enhance the quality of the responses you receive.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 编写清晰的提示是一项随着实践而提高的技能。通过遵循这些指南并不断改进你的方法，你可以有效地与AI模型沟通并提高你收到的响应质量。
- en: Daily Planning with Prompts
  id: totrans-102
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 带有提示的每日规划
- en: Effective daily planning can significantly enhance productivity and focus. By
    utilizing structured prompts, developers can better manage their tasks and priorities.
    This guide outlines how to leverage prompts for efficient daily planning.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 有效的每日规划可以显著提高生产力和专注力。通过利用结构化提示，开发者可以更好地管理他们的任务和优先级。本指南概述了如何利用提示进行高效的每日规划。
- en: Understanding Daily Planning
  id: totrans-104
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 理解每日规划
- en: Daily planning involves setting clear goals and tasks for the day. It helps
    in maintaining focus and ensuring that important tasks are completed. For developers,
    daily planning often includes coding tasks, meetings, code reviews, and learning
    objectives.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 每日规划涉及为当天设定明确的目标和任务。它有助于保持专注并确保重要任务得到完成。对于开发者来说，每日规划通常包括编码任务、会议、代码审查和学习目标。
- en: Benefits of Using Prompts
  id: totrans-106
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 使用提示的好处
- en: 'Using prompts in daily planning helps in:'
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 在每日规划中使用提示有助于：
- en: Prioritizing tasks effectively
  id: totrans-108
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 有效优先化任务
- en: Maintaining a clear focus on daily goals
  id: totrans-109
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 保持对每日目标的清晰关注
- en: Ensuring a balanced workload
  id: totrans-110
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 确保工作负载平衡
- en: Tracking progress and achievements
  id: totrans-111
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 跟踪进度和成就
- en: Implementing Prompts in Daily Planning
  id: totrans-112
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 在每日规划中实施提示
- en: 'To incorporate prompts into your daily planning, follow these steps:'
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 要将提示纳入你的每日规划，请遵循以下步骤：
- en: 'Step 1: Define Daily Goals'
  id: totrans-114
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 第1步：定义每日目标
- en: 'Start by defining specific goals for the day. Consider using prompts such as:'
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 首先为当天定义具体的目标。考虑使用以下提示：
- en: What are the most critical tasks for today?
  id: totrans-116
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 今天最重要的任务是什么？
- en: Which tasks align with my weekly objectives?
  id: totrans-117
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 哪些任务与我的周目标一致？
- en: What can I do today to advance my current project?
  id: totrans-118
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我今天能做些什么来推进我的当前项目？
- en: 'Step 2: Identify Key Tasks'
  id: totrans-119
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 第2步：识别关键任务
- en: 'Identify the tasks that are crucial for the day. Use prompts like:'
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 识别当天至关重要的任务。使用以下提示：
- en: Which tasks have the highest priority?
  id: totrans-121
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 哪些任务具有最高优先级？
- en: Are there any deadlines to meet today?
  id: totrans-122
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 今天有什么截止日期需要遵守？
- en: Which tasks require collaboration with colleagues?
  id: totrans-123
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 哪些任务需要与同事协作？
- en: 'Step 3: Allocate Time for Each Task'
  id: totrans-124
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 第3步：为每个任务分配时间
- en: 'Estimate the time required for each task and allocate your time accordingly.
    Consider these prompts:'
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 估计每个任务所需的时间并根据时间分配你的时间。考虑以下提示：
- en: How much time should I dedicate to each task?
  id: totrans-126
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我应该为每项任务分配多少时间？
- en: What is the best time to work on each task?
  id: totrans-127
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 每项任务的最佳工作时间是什么？
- en: Do I have enough buffer time for unforeseen challenges?
  id: totrans-128
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我是否有足够的时间缓冲来应对意外挑战？
- en: 'Step 4: Review and Adjust'
  id: totrans-129
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 第4步：审查和调整
- en: 'At the end of the day, review your progress and adjust your plan as needed.
    Use these prompts:'
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 在一天结束时，回顾你的进度并根据需要调整计划。使用以下提示：
- en: What did I accomplish today?
  id: totrans-131
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我今天完成了什么？
- en: What tasks were left incomplete, and why?
  id: totrans-132
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 哪些任务未完成，原因是什么？
- en: How can I adjust my plan for tomorrow to improve productivity?
  id: totrans-133
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我如何调整明天的计划以提高生产力？
- en: Conclusion
  id: totrans-134
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: By incorporating prompts into daily planning, developers can enhance their productivity
    and ensure that they focus on the most important tasks. This structured approach
    not only helps in managing daily activities but also contributes to long-term
    success in projects and career development.
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 通过将提示纳入每日规划，开发者可以提高他们的生产力并确保他们专注于最重要的任务。这种结构化方法不仅有助于管理日常活动，而且有助于项目长期成功和职业发展。
- en: Understanding JavaScript Closures
  id: totrans-136
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 理解JavaScript闭包
- en: Introduction to Closures
  id: totrans-137
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 闭包简介
- en: Closures are a fundamental concept in JavaScript that allow functions to access
    variables from an outer scope even after that scope has completed execution. They
    are created every time a function is created, at function creation time.
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 闭包是JavaScript中的一个基本概念，允许函数在执行完成后访问外部作用域中的变量。每次创建函数时都会创建闭包，在函数创建时。
- en: Why Closures Are Important
  id: totrans-139
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 闭包为什么很重要？
- en: Closures enable powerful programming patterns such as data encapsulation, function
    factories, and maintaining state in asynchronous operations. They are essential
    for writing clean, efficient, and maintainable JavaScript code.
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 闭包使强大的编程模式成为可能，如数据封装、函数工厂以及在异步操作中维护状态。它们对于编写干净、高效和可维护的JavaScript代码至关重要。
- en: How Closures Work
  id: totrans-141
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 闭包的工作原理
- en: In JavaScript, when a function is defined, it retains access to its lexical
    scope, which is the scope in which it was declared. This means that the function
    can access variables that are in its own scope, as well as variables in the outer
    enclosing scopes.
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 在JavaScript中，当定义一个函数时，它保留了对其词法作用域的访问，即它被声明的范围。这意味着函数可以访问其自身的范围内的变量，以及外部封装作用域中的变量。
- en: Example of a Closure
  id: totrans-143
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 闭包示例
- en: 'Consider the following example:'
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑以下示例：
