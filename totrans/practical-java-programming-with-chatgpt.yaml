    # [CHAPTER 8](toc.xhtml#c08)    # [ChatGPT Generated Java Code for Indexing a
    Document](toc.xhtml#c08)    # [Introduction](toc.xhtml#s90a)    The **OpenAI ChatGPT**
    program was asked for example **Java** code for indexing a document with output
    of a list of keywords with the associated document page numbers.    The code provided
    by **ChatGPT** created an index of documents and their associated keywords using
    the **Lucene** library. It also allowed searching for documents based on keywords
    and returned the document path.    # [Structure](toc.xhtml#s91a)    In this chapter,
    we will discuss the following topics:    *   **ChatGPT** generated **Java** code
    for indexing a document giving keywords and page numbers *   Document Indexing
    Java code validation using an **Eclipse IDE** Java Program Project    # [ChatGPT
    generated Java code for indexing a document giving keywords and page numbers](toc.xhtml#s92a)    I
    used the **Ask AI** mobile ‘phone app the following question and the **Open AI
    ChatGPT 3.5** response was as listed in the quoted italics**:**    **Is there
    example java code for indexing a document so listing keywords with the document
    page numbers**.    ““Yes, there is example Java code for indexing a document and
    listing keywords with the document page numbers. Here is an example implementation
    using the Apache Lucene library:    [PRE571]    `import java.io.IOException;`    `import
