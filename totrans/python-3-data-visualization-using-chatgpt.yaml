    point number, Python raises an exception, so it is advisable to place your code
    in a try/except block.
  id: totrans-562
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你尝试将一个既不是有效整数也不是浮点数的字符串进行转换，Python 会引发异常，因此建议将你的代码放在 try/except 块中。
- en: '**Working with Other Bases**'
  id: totrans-563
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '**处理其他进制**'
