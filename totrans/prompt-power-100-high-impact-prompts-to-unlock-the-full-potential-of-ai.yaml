- en: '**Prompt Power: 100 High-Impact**'
  prefs: []
  type: TYPE_NORMAL
- en: '**Prompts to Unlock the Full Potential**'
  prefs: []
  type: TYPE_NORMAL
- en: '**of AI**'
  prefs: []
  type: TYPE_NORMAL
- en: '**Chapter 1: Why Prompts Are the New Digital Currency**'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: There’s a quiet revolution happening — and it doesn’t require coding, capital,
    or connections.
  prefs: []
  type: TYPE_NORMAL
- en: 'All it takes is one thing:'
  prefs: []
  type: TYPE_NORMAL
- en: A well-crafted prompt.
  prefs: []
  type: TYPE_NORMAL
- en: In the age of AI, the power has shifted. It no longer belongs only to those
    who can build software or run ads.
  prefs: []
  type: TYPE_NORMAL
- en: Now, it belongs to those who know how to ask the right questions.
  prefs: []
  type: TYPE_NORMAL
- en: '**AI Is Only As Smart As Your Input**'
  prefs: []
  type: TYPE_NORMAL
- en: You’ve probably heard of ChatGPT, Midjourney, DALL·E, Claude, Gemini — or maybe
    even used them.
  prefs: []
  type: TYPE_NORMAL
- en: 'But here’s what most people don’t realize:'
  prefs: []
  type: TYPE_NORMAL
- en: AI doesn’t create magic. It amplifies your intention.
  prefs: []
  type: TYPE_NORMAL
- en: It’s like a superpowered intern that works 24/7 — but only if you give it precise,
    high-leverage instructions.
  prefs: []
  type: TYPE_NORMAL
- en: The better your prompt, the more impressive your result.
  prefs: []
  type: TYPE_NORMAL
- en: '**Prompts = Leverage**'
  prefs: []
  type: TYPE_NORMAL
- en: 'With the right prompts, you can:'
  prefs: []
  type: TYPE_NORMAL
- en: Build an entire content calendar in 5 minutes
  prefs: []
  type: TYPE_NORMAL
- en: Write landing pages that convert
  prefs: []
  type: TYPE_NORMAL
- en: Brainstorm business ideas
  prefs: []
  type: TYPE_NORMAL
- en: Design brand identities
  prefs: []
  type: TYPE_NORMAL
- en: Generate marketing strategies
  prefs: []
  type: TYPE_NORMAL
- en: Create courses, books, or products
  prefs: []
  type: TYPE_NORMAL
- en: Even launch viral visuals using AI art
  prefs: []
  type: TYPE_NORMAL
- en: And it’s not just about saving time.
  prefs: []
  type: TYPE_NORMAL
- en: It’s about creating results you never thought possible — with zero burnout.
  prefs: []
  type: TYPE_NORMAL
- en: '**What Makes a Prompt Powerful?**'
  prefs: []
  type: TYPE_NORMAL
- en: 'A great prompt is:'
  prefs: []
  type: TYPE_NORMAL
- en: Clear (No vagueness)
  prefs: []
  type: TYPE_NORMAL
- en: Contextual (Defines the role, tone, purpose)
  prefs: []
  type: TYPE_NORMAL
- en: 'Command-driven (Uses strong verbs) Expandable (Allows follow-up, iteration,
    and refinement) Bad prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: “Write me something about digital marketing.”
  prefs: []
  type: TYPE_NORMAL
- en: 'Power prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: “Act as a digital marketing expert. Write me a 5-day email sequence for a new
    online course targeting busy moms who want to start side hustles. Include emotional
    storytelling and soft CTAs.”
  prefs: []
  type: TYPE_NORMAL
- en: See the di erence?
  prefs: []
  type: TYPE_NORMAL
- en: '**The Prompt Economy Is Real**'
  prefs: []
  type: TYPE_NORMAL
- en: 'People are already:'
  prefs: []
  type: TYPE_NORMAL
- en: Selling prompt bundles on Gumroad, Etsy, Hotmart Creating prompt-based YouTube
    channels and TikToks Launching AI agencies powered by custom workflows Building
    entire businesses from prompt mastery Your prompts are no longer just ideas —
    they’re tools of influence, income, and innovation.
  prefs: []
  type: TYPE_NORMAL
- en: '**What You’ll Get in This Book**'
  prefs: []
  type: TYPE_NORMAL
- en: 'This book contains 100 elite prompts — tested, refined, and categorized for
    real-world use. Whether you’re a content creator, entrepreneur, freelancer, student,
    or just curious — you’ll find prompts to: Save you hours'
  prefs: []
  type: TYPE_NORMAL
- en: Spark profitable ideas
  prefs: []
  type: TYPE_NORMAL
- en: Multiply your output
  prefs: []
  type: TYPE_NORMAL
- en: And 10x your creative power
  prefs: []
  type: TYPE_NORMAL
- en: Use them. Tweak them. Stack them. Build on them.
  prefs: []
  type: TYPE_NORMAL
- en: Because the better your prompts, the bigger your potential.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s unlock it — one line at a time.
  prefs: []
  type: TYPE_NORMAL
- en: '**Chapter 2: How to Use This eBook (With Any AI Platform)**'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Whether you’re new to AI or already experimenting with ChatGPT, Midjourney,
    or Claude — this chapter ensures you use these prompts like a pro, no matter the
    platform.
  prefs: []
  type: TYPE_NORMAL
- en: Because powerful prompts don’t just generate responses — they unlock possibilities.
  prefs: []
  type: TYPE_NORMAL
- en: '**What You’ll Need**'
  prefs: []
  type: TYPE_NORMAL
- en: 'To get the most out of this book, you’ll need access to one or more AI platforms.
    Here are some of the most popular (and free or freemium):'
  prefs: []
  type: TYPE_NORMAL
- en: '**Text-Based AI:**'
  prefs: []
  type: TYPE_NORMAL
- en: ChatGPT (chat.openai.com)
  prefs: []
  type: TYPE_NORMAL
- en: Claude (claude.ai)
  prefs: []
  type: TYPE_NORMAL
- en: Google Gemini (gemini.google.com)
  prefs: []
  type: TYPE_NORMAL
- en: Microsoft Copilot (via Bing or Edge)
  prefs: []
  type: TYPE_NORMAL
- en: '**Image-Based AI:**'
  prefs: []
  type: TYPE_NORMAL
- en: Midjourney (via Discord)
  prefs: []
  type: TYPE_NORMAL
- en: DALL·E (built into ChatGPT Plus)
  prefs: []
  type: TYPE_NORMAL
- en: Leonardo AI / Playground AI / Canva Magic Design Most prompts in this book are
    written for text generation, but many can be adapted for image creation or even
    voice assistants.
  prefs: []
  type: TYPE_NORMAL
- en: '**How to Use the Prompts (Step-by-Step)**'
  prefs: []
  type: TYPE_NORMAL
- en: '**1.**'
  prefs: []
  type: TYPE_NORMAL
- en: '**Copy and Paste the Prompt**'
  prefs: []
  type: TYPE_NORMAL
- en: Each prompt in this book is plug-and-play. Simply copy the text and paste it
    into your AI chat box.
  prefs: []
  type: TYPE_NORMAL
- en: '**2.**'
  prefs: []
  type: TYPE_NORMAL
- en: '**Edit the [Variables]**'
  prefs: []
  type: TYPE_NORMAL
- en: 'Many prompts contain brackets like:'
  prefs: []
  type: TYPE_NORMAL
- en: '[your niche] — [target audience] — [product name]'
  prefs: []
  type: TYPE_NORMAL
- en: Replace those parts with your specific details.
  prefs: []
  type: TYPE_NORMAL
- en: This makes the AI generate results customized to you.
  prefs: []
  type: TYPE_NORMAL
- en: '**3.**'
  prefs: []
  type: TYPE_NORMAL
- en: '**Ask Follow-Up Questions**'
  prefs: []
  type: TYPE_NORMAL
- en: 'AI loves context. If the first result isn’t perfect, reply with:'
  prefs: []
  type: TYPE_NORMAL
- en: “Make it shorter”
  prefs: []
  type: TYPE_NORMAL
- en: “Rewrite in a fun tone”
  prefs: []
  type: TYPE_NORMAL
- en: “Add bullet points”
  prefs: []
  type: TYPE_NORMAL
- en: “Now translate to Portuguese”
  prefs: []
  type: TYPE_NORMAL
- en: “Turn this into a tweet”
  prefs: []
  type: TYPE_NORMAL
- en: Think of it as a conversation, not a one-time command.
  prefs: []
  type: TYPE_NORMAL
- en: '**4.**'
  prefs: []
  type: TYPE_NORMAL
- en: '**Save and Organize**'
  prefs: []
  type: TYPE_NORMAL
- en: When you find a prompt that works, save it! Create folders or Notion boards
    to store your best AI workflows and responses.
  prefs: []
  type: TYPE_NORMAL
- en: You’re not just using prompts — you’re building personalized AI systems.
  prefs: []
  type: TYPE_NORMAL
- en: '**Pro Tips for Maximum Results**'
  prefs: []
  type: TYPE_NORMAL
- en: 'Start with a role:'
  prefs: []
  type: TYPE_NORMAL
- en: “Act as a lawyer…” / “You are now a marketing strategist…” This sets the frame
    for better answers.
  prefs: []
  type: TYPE_NORMAL
- en: 'Set the output style:'
  prefs: []
  type: TYPE_NORMAL
- en: “…write in a persuasive tone, under 300 words, using storytelling.”
  prefs: []
  type: TYPE_NORMAL
- en: 'Stack prompts:'
  prefs: []
  type: TYPE_NORMAL
- en: 'You can run one prompt, get a response, and build on it with new prompts. Example:
    Step 1: “Brainstorm 5 content ideas”'
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 2: “Turn idea #2 into a blog outline”'
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 3: “Now write the introduction for that blog”'
  prefs: []
  type: TYPE_NORMAL
- en: '**You Don’t Need to Be a Tech Expert**'
  prefs: []
  type: TYPE_NORMAL
- en: You don’t need to know how AI works internally. You just need to communicate
    clearly, with intention.
  prefs: []
  type: TYPE_NORMAL
- en: Think of this book as your library of creative weapons.
  prefs: []
  type: TYPE_NORMAL
- en: Use it to build content, ideas, o ers, brands, strategies — fast and fearlessly.
  prefs: []
  type: TYPE_NORMAL
- en: Now that you know how to use the prompts…
  prefs: []
  type: TYPE_NORMAL
- en: Let’s dive into the first batch and start creating real results.
  prefs: []
  type: TYPE_NORMAL
- en: '**Chapter 3: Content Creation Prompts (20 Prompts)**'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Use these prompts to instantly generate blogs, videos, carousels, captions,
    ideas, and entire content calendars using AI tools like ChatGPT or Claude. Each
    one is crafted to help you unlock speed, creativity, and authority in your niche.
  prefs: []
  type: TYPE_NORMAL
- en: '**Prompt 1 — 30-Day Content Calendar**'
  prefs: []
  type: TYPE_NORMAL
- en: Create a 30-day content calendar for [your niche] on Instagram. Include daily
    topics with themes, CTA suggestions, and engaging post ideas.
  prefs: []
  type: TYPE_NORMAL
- en: '**Prompt 2 — Viral Hook Generator**'
  prefs: []
  type: TYPE_NORMAL
- en: Generate 10 viral hooks for a YouTube Shorts video about [insert topic]. Use
    curiosity, emotion, or shock value.
  prefs: []
  type: TYPE_NORMAL
- en: '**Prompt 3 — TikTok Script in 3 Acts**'
  prefs: []
  type: TYPE_NORMAL
- en: Write a 45-second TikTok script with a 3-act structure (Hook, Value, Call to
    Action) for [target audience] about [problem or solution].
  prefs: []
  type: TYPE_NORMAL
- en: '**Prompt 4 — Educational Twitter Thread**'
  prefs: []
  type: TYPE_NORMAL
- en: Create a 7-tweet thread that teaches [topic] step by step, with a clear title
    tweet and value-packed insights.
  prefs: []
  type: TYPE_NORMAL
- en: '**Prompt 5 — Repurpose This Video**'
  prefs: []
  type: TYPE_NORMAL
- en: Take this YouTube video transcript and turn it into 3 short-form scripts for
    Reels or TikTok. Make them punchy and fast-paced.
  prefs: []
  type: TYPE_NORMAL
- en: '**Prompt 6 — SEO Blog Blueprint**'
  prefs: []
  type: TYPE_NORMAL
- en: Act as an SEO expert. Create a blog post outline for the keyword “[insert keyword]”.
    Include H1, H2s, and suggested word counts.
  prefs: []
  type: TYPE_NORMAL
- en: '**Prompt 7 — Caption with High Engagement**'
  prefs: []
  type: TYPE_NORMAL
- en: Write 3 Instagram captions for a motivational quote in the [niche] space that
    encourages comments and saves.
  prefs: []
  type: TYPE_NORMAL
- en: '**Prompt 8 — Lead Magnet Idea Generator**'
  prefs: []
  type: TYPE_NORMAL
- en: Give me 5 lead magnet ideas for [target audience] who struggle with [pain point].
  prefs: []
  type: TYPE_NORMAL
- en: '**Prompt 9 — Email Newsletter Writer**'
  prefs: []
  type: TYPE_NORMAL
- en: Act as a newsletter copywriter. Create a 200-word email for [niche] with a story-based
    hook and a call to action.
  prefs: []
  type: TYPE_NORMAL
- en: '**Prompt 10 — Carousel Copy (Instagram/LinkedIn)**'
  prefs: []
  type: TYPE_NORMAL
- en: Write copy for a 7-slide carousel post teaching [specific skill]. Make each
    slide concise, bold, and actionable.
  prefs: []
  type: TYPE_NORMAL
- en: '**Prompt 11 — CTA Variations List**'
  prefs: []
  type: TYPE_NORMAL
- en: List 10 unique call-to-action phrases I can use at the end of my videos to increase
    shares and saves.
  prefs: []
  type: TYPE_NORMAL
- en: '**Prompt 12 — Trend Hijack Formula**'
  prefs: []
  type: TYPE_NORMAL
- en: 'Show me 3 ways I can use this current trend: “[insert trend]” to promote my
    [product/service] on TikTok.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Prompt 13 — Storytelling Framework**'
  prefs: []
  type: TYPE_NORMAL
- en: Using the PAS (Problem, Agitation, Solution) formula, write a short story post
    to connect with my audience about [pain point].
  prefs: []
  type: TYPE_NORMAL
- en: '**Prompt 14 — Daily Posting Template**'
  prefs: []
  type: TYPE_NORMAL
- en: 'Create a repeatable daily post structure for Instagram that includes: hook,
    body, CTA — tailored to [niche].'
  prefs: []
  type: TYPE_NORMAL
- en: '**Prompt 15 — Hook + Headline Swipe File**'
  prefs: []
  type: TYPE_NORMAL
- en: Give me 10 high-converting headlines or hooks I can use in YouTube titles about
    [topic].
  prefs: []
  type: TYPE_NORMAL
- en: '**Prompt 16 — Quote-to-Caption Transformer**'
  prefs: []
  type: TYPE_NORMAL
- en: Take this quote “[insert quote]” and turn it into 3 impactful social media captions
    with a story or insight attached.
  prefs: []
  type: TYPE_NORMAL
- en: '**Prompt 17 — FAQ-Based Content Generator**'
  prefs: []
  type: TYPE_NORMAL
- en: Give me 10 content ideas based on the most common questions people ask about
    [insert product/niche].
  prefs: []
  type: TYPE_NORMAL
- en: '**Prompt 18 — Audience Engagement Booster**'
  prefs: []
  type: TYPE_NORMAL
- en: Give me 5 interactive post ideas (polls, questions, challenges) to boost engagement
    with my followers in the [niche] space.
  prefs: []
  type: TYPE_NORMAL
- en: '**Prompt 19 — Content Series Plan**'
  prefs: []
  type: TYPE_NORMAL
- en: Plan a 5-part content series for Instagram on the topic of [insert topic]. Include
    each post title and a summary.
  prefs: []
  type: TYPE_NORMAL
- en: '**Prompt 20 — Long-Form to Short-Form Repurposing**'
  prefs: []
  type: TYPE_NORMAL
- en: Show me how to break this 1,000-word article into 5 social media posts. Add
    hooks and CTAs for each.
  prefs: []
  type: TYPE_NORMAL
- en: '**Chapter 4: Marketing & Sales Prompts (15 Prompts)**'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: These prompts are designed to help you build magnetic o ers, write persuasive
    copy, and convert attention into income — faster and smarter with AI.
  prefs: []
  type: TYPE_NORMAL
- en: '**Prompt 21 — O er Clarity Breakdown**'
  prefs: []
  type: TYPE_NORMAL
- en: 'Break down my o er: [insert o er] using the 4P formula (Problem, Promise, Proof,
    Price) to clarify and strengthen it.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Prompt 22 — Sales Page Copywriter** Act as a 7-figure copywriter. Write a
    full landing page for [product name], targeting [audience], using the AIDA structure.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Prompt 23 — Sales Funnel Map**'
  prefs: []
  type: TYPE_NORMAL
- en: Create a 3-step sales funnel for my [digital/physical] product. Include lead
    magnet idea, email sequence, and o er upsell.
  prefs: []
  type: TYPE_NORMAL
- en: '**Prompt 24 — Email Sequence Builder**'
  prefs: []
  type: TYPE_NORMAL
- en: Write a 5-day email sequence to warm up leads and sell [product/service]. Each
    email should focus on value, trust, and emotional connection.
  prefs: []
  type: TYPE_NORMAL
- en: '**Prompt 25 — Persuasion Power Words**'
  prefs: []
  type: TYPE_NORMAL
- en: Give me 30 high-converting words or phrases proven to increase conversions in
    digital product sales.
  prefs: []
  type: TYPE_NORMAL
- en: '**Prompt 26 — Copy Rewrite for Conversions** Take this paragraph [insert paragraph]
    and rewrite it to be more persuasive, emotionally charged, and conversion-focused.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Prompt 27 — Product Description Optimizer**'
  prefs: []
  type: TYPE_NORMAL
- en: Optimize this product description [insert text] for clarity, urgency, and emotional
    appeal to boost conversions.
  prefs: []
  type: TYPE_NORMAL
- en: '**Prompt 28 — Problem-Aware Ad Copy**'
  prefs: []
  type: TYPE_NORMAL
- en: 'Write 3 Facebook ad versions for an audience that knows their problem but doesn’t
    yet know my product exists. Topic: [insert topic].'
  prefs: []
  type: TYPE_NORMAL
- en: '**Prompt 29 — Testimonial Enhancer**'
  prefs: []
  type: TYPE_NORMAL
- en: Rewrite this customer review to sound more emotionally compelling and results-oriented,
    without making it inauthentic.
  prefs: []
  type: TYPE_NORMAL
- en: '**Prompt 30 — Niche Positioning Statement** Craft a brand positioning statement
    for a [type of business] that clearly states: who it’s for, what it solves, and
    why it’s di erent.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Prompt 31 — One-Liner Pitch Generator**'
  prefs: []
  type: TYPE_NORMAL
- en: Write 5 powerful one-liner pitches I can use to describe my product in conversations,
    podcasts, or bios.
  prefs: []
  type: TYPE_NORMAL
- en: '**Prompt 32 — Scarcity/Urgency Copy**'
  prefs: []
  type: TYPE_NORMAL
- en: Give me 5 short urgency-driven copy blocks I can add to a landing page or email
    to create FOMO and increase conversions.
  prefs: []
  type: TYPE_NORMAL
- en: '**Prompt 33 — Objection Crusher Script**'
  prefs: []
  type: TYPE_NORMAL
- en: List the top 5 objections my potential buyers may have for [product], and give
    me persuasive rebuttals for each one.
  prefs: []
  type: TYPE_NORMAL
- en: '**Prompt 34 — High-Converting O er Name Ideas** Brainstorm 10 irresistible
    names for my online program/course about [topic], each under 5 words and emotionally
    sticky.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Prompt 35 — Upsell & Cross-Sell Ideas**'
  prefs: []
  type: TYPE_NORMAL
- en: 'Suggest 5 smart upsell or cross-sell ideas to add revenue to my main product:
    [insert product].'
  prefs: []
  type: TYPE_NORMAL
- en: '**Chapter 5: Business & Productivity Prompts (15 Prompts)**'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Use these prompts to streamline your thinking, organize your workflow, delegate
    smarter, and make faster, better business decisions with AI as your co-pilot.
  prefs: []
  type: TYPE_NORMAL
- en: '**Prompt 36 — Business Brainstorm Buddy**'
  prefs: []
  type: TYPE_NORMAL
- en: Give me 10 business ideas that combine [your passion/skill] and solve problems
    for [target audience].
  prefs: []
  type: TYPE_NORMAL
- en: '**Prompt 37 — 90-Day Business Roadmap**'
  prefs: []
  type: TYPE_NORMAL
- en: Act as a business strategist. Build me a 90-day action plan to grow my [type
    of business] from $0 to $10k/month.
  prefs: []
  type: TYPE_NORMAL
- en: '**Prompt 38 — Time Audit Analyzer**'
  prefs: []
  type: TYPE_NORMAL
- en: Help me audit my daily schedule. Show me where I waste time and how to restructure
    my routine for deep focus.
  prefs: []
  type: TYPE_NORMAL
- en: '**Prompt 39 — Daily CEO Dashboard**'
  prefs: []
  type: TYPE_NORMAL
- en: Create a simple daily dashboard I can use to track my top 3 goals, key metrics,
    and 1 big win.
  prefs: []
  type: TYPE_NORMAL
- en: '**Prompt 40 — SOP Generator (Standard Operating Procedure)**'
  prefs: []
  type: TYPE_NORMAL
- en: Write an SOP for [task/process], including tools needed, steps, and frequency,
    so I can delegate it to a VA.
  prefs: []
  type: TYPE_NORMAL
- en: '**Prompt 41 — Task Prioritization Matrix**'
  prefs: []
  type: TYPE_NORMAL
- en: 'Organize this list of tasks [insert tasks] using the Eisenhower Matrix: Urgent/Important,
    Not Urgent/Important, etc.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Prompt 42 — Meeting Agenda Optimizer**'
  prefs: []
  type: TYPE_NORMAL
- en: Create a tight 30-minute meeting agenda for my weekly team call focused on clarity,
    accountability, and next steps.
  prefs: []
  type: TYPE_NORMAL
- en: '**Prompt 43 — Business Name Generator**'
  prefs: []
  type: TYPE_NORMAL
- en: Generate 10 unique, brandable business names for my project in the [industry]
    space. Must be under 3 words and .com available.
  prefs: []
  type: TYPE_NORMAL
- en: '**Prompt 44 — Decision-Making Framework**'
  prefs: []
  type: TYPE_NORMAL
- en: Help me decide between [Option A] and [Option B] using a logical and emotional
    framework that includes long-term outcomes.
  prefs: []
  type: TYPE_NORMAL
- en: '**Prompt 45 — Productivity Ritual Design**'
  prefs: []
  type: TYPE_NORMAL
- en: Design a powerful 60-minute morning ritual that helps me focus, prioritize,
    and activate my best energy.
  prefs: []
  type: TYPE_NORMAL
- en: '**Prompt 46 — Delegation Clarity Prompt**'
  prefs: []
  type: TYPE_NORMAL
- en: 'Identify 5 recurring tasks I should delegate immediately in my business based
    on this list: [insert task list].'
  prefs: []
  type: TYPE_NORMAL
- en: '**Prompt 47 — KPI Setup Prompt**'
  prefs: []
  type: TYPE_NORMAL
- en: What are the 5 most important KPIs (key performance indicators) I should track
    weekly in a service-based business?
  prefs: []
  type: TYPE_NORMAL
- en: '**Prompt 48 — AI-Assisted Decision Tree**'
  prefs: []
  type: TYPE_NORMAL
- en: Create a simple decision tree to help me know when to invest, automate, delegate,
    or say no.
  prefs: []
  type: TYPE_NORMAL
- en: '**Prompt 49 — Productivity Blocker Identifier**'
  prefs: []
  type: TYPE_NORMAL
- en: Based on these habits [insert habits], show me which ones are slowing me down
    and how to replace them with higher-leverage habits.
  prefs: []
  type: TYPE_NORMAL
- en: '**Prompt 50 — 80/20 Business Audit**'
  prefs: []
  type: TYPE_NORMAL
- en: Run a simulated 80/20 audit. Show me which 20% of my tasks, clients, or actions
    are driving 80% of my results — or stress.
  prefs: []
  type: TYPE_NORMAL
- en: '**Chapter 6: Visual & Design Prompts (15 Prompts for Midjourney, DALL·E & More)**'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Use these prompts to create stunning images, branding elements, illustrations,
    product mockups, and visual content — even if you’re not a designer.
  prefs: []
  type: TYPE_NORMAL
- en: '**Prompt 51 — Minimalist Logo Design Prompt (DALL·E / Midjourney)**'
  prefs: []
  type: TYPE_NORMAL
- en: “Create a minimalist, modern logo for a [type of brand] called [brand name],
    using neutral tones and clean lines.”
  prefs: []
  type: TYPE_NORMAL
