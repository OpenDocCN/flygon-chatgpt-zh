    ****i**ts** ****inab**ilit**y ****t**o** ****re**tai**n ****info**rmatio**n ****ac**ros**s
    ****ses**sion**s. ****Wh**ile** ****i**t** ****c**an** ****mai**ntai**n ****con**tex**t
    ****wi**thi**n ****a**** ****si**ngl**e ****conv**ersati**on, ****on**ce** ****t**he**
    ****ses**sio**n ****en**ds**, ****a**ll** ****me**mor**y ****o**f** ****pre**viou**s
    ****inte**ractio**ns ****i**s** ****lo**st**.'
  id: totrans-878
  prefs: []
  type: TYPE_NORMAL
  zh: '**ChatGPT**的另一个关键限制是其无法在会话之间保持信息。虽然它可以在单个会话中保持上下文，但一旦会话结束，之前所有交互的记忆都会丢失。'
