    ****prom**otin**g ****a**** ****mo**re** ****com**plet**e ****a**nd** ****det**aile**d
    ****under**standi**ng.'
  id: totrans-764
  prefs: []
  type: TYPE_NORMAL
  zh: '**比较提示**，或**比较提示**，是一种提示工程技术，涉及要求LLM比较和对比两个或更多想法、概念、对象或场景。这种技术允许LLM突出主题之间的相似性、差异、优点和缺点，从而促进对主题的更全面和详细的了解。'
