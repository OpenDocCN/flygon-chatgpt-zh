  zh: '**负责任地使用 ChatGPT** 意味着优先考虑您的安全和隐私。通过避免分享敏感信息，使用安全的设备和网络，以及了解 OpenAI 的数据使用政策，您可以显著降低风险。加强账户安全性，谨慎处理协作使用，并持续关注最新的安全功能，进一步确保安全有效的体验。'
