- en: CHAPTER  16
  prefs: []
  type: TYPE_NORMAL
- en: Functions and Subroutines in VBA
  prefs: []
  type: TYPE_NORMAL
- en: Introduction
  prefs: []
  type: TYPE_NORMAL
- en: The chapter will introduce the concepts of functions and subroutines in Excel
    VBA programming. It explains the differences between the two and will delve into
    writing code inside modules using the Visual Basic Editor. The chapter also covers
    branching techniques to control the flow of code execution within procedures.
  prefs: []
  type: TYPE_NORMAL
- en: Structure
  prefs: []
  type: TYPE_NORMAL
- en: 'In this chapter, we will go over the following topics:'
  prefs: []
  type: TYPE_NORMAL
- en: ■Writing Procedures
  prefs: []
  type: TYPE_NORMAL
- en: ■The Visual Basic Editor
  prefs: []
  type: TYPE_NORMAL
- en: ■Inserting Modules
  prefs: []
  type: TYPE_NORMAL
- en: ■Writing Code Inside a Module
  prefs: []
  type: TYPE_NORMAL
- en: ■Sub Procedure
  prefs: []
  type: TYPE_NORMAL
- en: ■Function Procedure
  prefs: []
  type: TYPE_NORMAL
- en: ■Branching a Procedure
  prefs: []
  type: TYPE_NORMAL
- en: Objectives
  prefs: []
  type: TYPE_NORMAL
- en: After studying this chapter, the reader will be able to write procedures and
    understand Visual Basic Editor, which will be used in order to insert modules,
    write code, and so on. The reader will also learn about sub procedure, function
    procedure, and branching a procedure.
  prefs: []
  type: TYPE_NORMAL
- en: Writing Procedures
  prefs: []
  type: TYPE_NORMAL
- en: You can write code for each action that you record. All the procedures are written
    inside a module.
  prefs: []
  type: TYPE_NORMAL
- en: To write the code, you need to open Visual Basic Editor. The shortcut to open
    Visual Basic Editor is Alt + F11.
  prefs: []
  type: TYPE_NORMAL
- en: 'A module is a collection of procedures. There are two types of procedures:'
  prefs: []
  type: TYPE_NORMAL
- en: '■Sub Procedures: Sub procedures are used to automate Excel actions. A sub procedure
    is a unit of code enclosed between the Sub and End Sub block. A sub procedure
    without any arguments is a macro.'
  prefs: []
  type: TYPE_NORMAL
- en: '■Function Procedures: Functions are used to automate any complex calculations.
    A Function procedure is enclosed between the Function and End Function block.'
  prefs: []
  type: TYPE_NORMAL
- en: The differences between the sub procedures and function procedures are explored
    in [Table 16.1](#tab16-1).
  prefs: []
  type: TYPE_NORMAL
- en: TABLE 16.1 Differences Between Procedures
  prefs: []
  type: TYPE_NORMAL
- en: '| Sub Procedure | Function Procedure |'
  prefs: []
  type: TYPE_TB
- en: '| It cannot return a value. | It can return a value. |'
  prefs: []
  type: TYPE_TB
- en: '| It can perform actions on Excel objects. | It cannot perform actions on Excel
    objects. |'
  prefs: []
  type: TYPE_TB
- en: 'Here are some more points that you can keep in mind:'
  prefs: []
  type: TYPE_NORMAL
- en: ■Both types of procedure may or may not have arguments.
  prefs: []
  type: TYPE_NORMAL
- en: ■A sub procedure with no arguments is a macro.
  prefs: []
  type: TYPE_NORMAL
- en: ■All macros are procedures, but not all procedures are macros.
  prefs: []
  type: TYPE_NORMAL
- en: Visual Basic Editor
  prefs: []
  type: TYPE_NORMAL
- en: '[Figure 16.1](#fig16-1) shows the Code window in Visual Basic Editor:'
  prefs: []
  type: TYPE_NORMAL
