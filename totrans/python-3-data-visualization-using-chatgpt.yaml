- en: '[Listing 5.13](#list5-13) defines the NumPy variable trX that contains 101
    equally spaced numbers that are between -1 and 1 (inclusive). The variable trY
    is defined in two parts: the first part is 2*trX and the second part is a random
    value that is partially based on the length of the one-dimensional array trX.
    The variable trY is the sum of these two “parts,” which creates a “fuzzy” line
    segment.'
  id: totrans-1975
  prefs: []
  type: TYPE_NORMAL
  zh: '[列表 5.13](#list5-13) 定义了 NumPy 变量 trX，它包含 101 个在 -1 和 1（包含）之间等间隔的数字。变量 trY
    定义为两部分：第一部分是 2*trX，第二部分是基于一维数组 trX 长度的随机值。变量 trY 是这两部分的总和，从而创建了一个“模糊”的线段。'
- en: The next portion of [Listing 5.13](#list5-13) creates a scatterplot based on
    the values in trX and trY, followed by the Pyplot API plot() that renders a line
    segment. [Figure 5.10](#fig5-10) displays a random set of points based on the
    code in [Listing 5.13](#list5-13).
  id: totrans-1976
