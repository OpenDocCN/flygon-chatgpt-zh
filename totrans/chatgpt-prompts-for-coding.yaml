  prefs: []
  type: TYPE_NORMAL
  zh: '22: 理解逻辑运算符'
- en: 'Prompt:'
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Write a program in [Python/JavaScript/etc.] that demonstrates the use of logical
    operators (AND, OR, NOT). Include examples that evaluate complex conditions."'
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: '"编写一个[Python/JavaScript等]程序，演示逻辑运算符（AND、OR、NOT）的使用。包括评估复杂条件的示例。"'
