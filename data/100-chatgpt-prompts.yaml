  id: totrans-540
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你的细分市场是什么，你的受众如何与类似品牌互动？
- en: Would you like to create a branded hashtag campaign?
  id: totrans-541
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你是否想创建一个品牌标签活动？
