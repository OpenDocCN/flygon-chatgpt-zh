  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
- en: Welcome, Real Estate Rockstar.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
- en: 'If you''re reading this, you probably fall into one of the following categories:'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
- en: You're a real estate agent drowning in emails and lead gen.
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You’ve heard of ChatGPT but thought it was a Pokémon.
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You think "prompt engineering" sounds like something NASA does.
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Good news: You don’t need to be a techie. You don’t need to speak AI. You just
    need curiosity—and maybe a venti coffee.'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
- en: This book is your cheat code to working smarter, not harder. Let’s make ChatGPT
    your new unpaid intern (who never sleeps, complains, or asks for a raise).
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
- en: You’re going to learn how to write listings faster, follow up like a boss, and
    look like a marketing genius—all with a few magic words. And we’re going to have
    a few laughs along the way. Because if you can’t have fun selling houses, what
    are we even doing here?
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
- en: So buckle up. Your productivity is about to get a glow-up. And who knows? You
    might even have time for a nap.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
