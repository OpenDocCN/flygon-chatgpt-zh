    ****on**ly** ****on**ce**. ****Iter**ativ**e ****Brain**stormi**ng ****inv**olve**s
    ****mul**tipl**e ****ro**und**s, ****wh**ere** ****ea**ch** ****ro**und** ****cont**ribute**s
    ****t**o** ****impr**ovin**g ****pre**viou**s ****id**eas**, ****resu**ltin**g
    ****i**n** ****a**** ****mo**re** ****i**n**-****de**pth** ****a**nd** ****we**ll**-****deve**lope**d
    ****app**roac**h.'
  id: totrans-1315
  prefs: []
  type: TYPE_NORMAL
  zh: '**迭代头脑风暴**与**一次性头脑风暴**不同，一次性头脑风暴只生成一次想法。**迭代头脑风暴**涉及多轮，每一轮都为改进先前想法做出贡献，从而产生更深入和更完善的方案。'
- en: '****Com**pare**d ****t**o** ****St**ep**-****b**y**-****St**ep** ****Ana**lysi**s
