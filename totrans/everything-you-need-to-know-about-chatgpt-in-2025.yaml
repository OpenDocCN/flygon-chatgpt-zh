  id: totrans-387
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个背景下，责任在于技术的**开发者**和**使用者**双方。开发者必须不懈努力，确保他们的模型是**准确**、**透明**且能够**识别**和**预防**有害内容的生成。例如，定期更新以纠正错误、移除有害或危险响应，并确保人工智能不会陷入**有毒**的言语模式是必要的措施。同样，对于开发者来说，实施**验证**和**验证**机制，以便在信息到达用户之前检测到错误信息，也是至关重要的。
