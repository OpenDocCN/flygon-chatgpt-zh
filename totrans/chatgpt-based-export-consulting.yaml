  id: totrans-2243
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 出口产品选择和发展提示 2.1 产品生命周期（PLC）分析提示 2.2 产品组合分析提示
- en: Establishing Export Marketing Strategy Prompts 3.1 Market Segmentation and Targeting
    Prompts 3.2 Marketing Mix Strategy Prompts
  id: totrans-2244
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
