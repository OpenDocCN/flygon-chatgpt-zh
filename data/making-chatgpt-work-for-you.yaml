  id: totrans-232
  prefs: []
  type: TYPE_NORMAL
  zh: 在注册后，您将被直接带到聊天窗口以与ChatGPT互动。如果您注意的话，网站为您提供了一些开始对话的建议。图[1-3](#Fig3)显示了您登录ChatGPT网站时出现的聊天窗口。![ChatGPT界面截图，带有标注元素。主要区域显示提示“我能帮什么忙？”和一个标注为“消息ChatGPT”的文本输入框（2）。下方有选项：创建图像、制定计划、总结文本、头脑风暴和更多。左侧边栏包括“ChatGPT”（1）和“探索GPTs”（5）。右上角显示用户图标（7）。侧边栏被突出显示（4），表示导航选项。](../images/641691_1_En_1_Chapter/641691_1_En_1_Fig3_HTML.jpg)
