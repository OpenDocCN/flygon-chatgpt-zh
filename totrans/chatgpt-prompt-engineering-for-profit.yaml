    ****poll**utin**g ****veh**icle**s. "'
  id: totrans-948
  prefs: []
  type: TYPE_NORMAL
  zh: '**骑手司机**："**减少汽车空间会影响我们的工作。我们需要激励措施来使用无污染的车辆**。"'
