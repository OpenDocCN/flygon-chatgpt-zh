- en: '****T**he** ****ne**xt** ****th**ing** ****kee**pin**g ****pe**opl**e ****fr**om**
    ****see**kin**g ****o**ut** ****me**nta**l ****he**alt**h ****ca**re** ****i**s**
    ****t**he** ****am**oun**t ****o**f** ****ti**me** ****i**t** ****ta**kes** ****wai**tin**g
    ****t**o** ****s**ee** ****a**** ****me**nta**l ****he**alt**h ****prof**ession**al.
    ****A**s** ****w**e** ****ment**ione**d ****ear**lie**r ****i**n** ****th**is**
    ****cha**pte**r, ****al**mos**t ****ha**lf** ****o**f** ****pe**opl**e ****su**ffe**r
    ****fr**om** ****so**me** ****fo**rm** ****o**f** ****me**nta**l ****he**alt**h
