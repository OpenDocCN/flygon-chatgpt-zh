  zh: '**场景比较**，或称为**场景比较**，是一种提示工程技术，涉及让LLM比较不同的假设场景以理解每个场景的含义。这种技术允许模型提供对可能性的全面视图，突出每个场景的优势、劣势和潜在结果，帮助用户做出更明智的决定。'
