  prefs: []
  type: TYPE_NORMAL
  zh: 另一个目标是提供在不确定情况下进行决策的基础，在这种情况下可能需要考虑多个选项。通过比较场景，模型可以突出每个选择的临界因素和潜在影响，帮助用户仔细权衡他们的选项并确定实现目标的最佳方法。
- en: '[****H**ow** ****i**t** ****wo**rks** ]'
  id: totrans-1158
  prefs: []
  type: TYPE_NORMAL
  zh: '[**如何工作**]'
- en: '****Sce**nari**o ****Comp**ariso**n ****wo**rks** ****b**y** ****as**kin**g
    ****t**he** ****L**LM** ****t**o** ****des**crib**e ****t**wo** ****o**r** ****mo**re**
    ****hypo**thetic**al ****scen**ario**s ****a**nd** ****per**for**m ****a**** ****det**aile**d
    ****comp**arativ**e ****ana**lysi**s ****o**f** ****ea**ch**. ****T**he** ****pr**omp**t
    ****mi**ght** ****inc**lud**e ****ques**tion**s ****su**ch** ****a**s** “****Com**par**e
    ****scen**ario**s ****A**** ****a**nd** ****B**** ****i**n** ****te**rms** ****o**f**
    ****envir**onment**al ****im**pac**t” ****o**r** “****Wh**at** ****a**re** ****t**he**
    ****adva**ntage**s ****a**nd** ****disad**vantag**es ****o**f** ****ea**ch** ****o**f**
    ****t**he** ****scen**ario**s ****desc**ribe**d?” ****T**he** ****mo**del** ****th**en**
    ****pre**sent**s ****ea**ch** ****sce**nari**o, ****high**lighti**ng ****i**ts**
    ****ma**in** ****po**int**s, ****a**nd** ****per**form**s ****a**** ****comp**arativ**e
    ****ana**lysi**s ****t**o** ****high**ligh**t ****t**he** ****mo**st** ****impo**rtan**t
    ****asp**ect**s.'
  id: totrans-1159
  prefs: []
  type: TYPE_NORMAL
  zh: '**场景比较工作**是通过让LLM描述两个或更多假设场景并对其执行详细的比较分析来完成的。提示可能包括诸如“比较场景A和B在环境影响方面的差异”或“描述的场景的优缺点是什么？”等问题。然后，模型呈现每个场景，突出其主要要点，并执行比较分析以突出最重要的方面。'
- en: '****F**or** ****exa**mpl**e, ****wh**en** ****as**kin**g “****Wh**at** ****wo**uld**
    ****b**e** ****t**he** ****im**pac**t ****o**f** ****ado**ptin**g ****so**lar**
    ****en**erg**y ****ve**rsu**s ****wi**nd** ****en**erg**y ****i**n** ****a****
    ****spe**cifi**c ****re**gio**n?”, ****t**he** ****mo**del** ****co**uld** ****pro**vid**e
    ****a**n** ****ana**lysi**s ****o**f** ****t**he** ****ben**efit**s ****a**nd**
    ****limi**tation**s ****o**f** ****bo**th** ****opt**ion**s, ****cons**iderin**g
    ****fac**tor**s ****su**ch** ****a**s** ****co**st**, ****effi**cienc**y, ****a**nd**
    ****envir**onment**al ****im**pac**t.'
  id: totrans-1160
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，当询问“在特定地区采用太阳能与风能相比会产生什么影响？”时，模型可以提供对这两种选择的好处和局限性的分析，考虑因素包括成本、效率和环境影响。
- en: '****Th**is** ****tech**niqu**e ****i**s** ****espe**ciall**y ****effe**ctiv**e
    ****f**or** ****stra**tegi**c ****pla**nnin**g, ****wh**ere** ****y**ou** ****ne**ed**
    ****t**o** ****con**side**r ****diff**eren**t ****opt**ion**s ****a**nd** ****unde**rstan**d
    ****h**ow** ****ea**ch** ****o**ne** ****com**pare**s ****t**o** ****t**he** ****ot**her**s.
    ****Sce**nari**o ****Comp**ariso**n ****he**lps** ****y**ou** ****visu**aliz**e
    ****t**he** ****cons**equenc**es ****o**f** ****var**iou**s ****cho**ice**s ****i**n**
    ****a**** ****cl**ear** ****a**nd** ****det**aile**d ****w**ay**.'
  id: totrans-1161
  prefs: []
  type: TYPE_NORMAL
  zh: 这种技术在**战略规划**中特别有效，当你需要考虑不同的选项并理解每个选项与其他选项的比较时。情景比较帮助你以清晰和详细的方式可视化各种选择的结果。
- en: '[****Wh**en** ****t**o** ****u**se** ]'
  id: totrans-1162
  prefs: []
  type: TYPE_NORMAL
  zh: '[何时使用]'
- en: '****Sce**nari**o ****Comp**ariso**n ****sh**oul**d ****b**e** ****us**ed**
    ****wh**en** ****th**ere** ****i**s** ****mo**re** ****th**an** ****o**ne** ****vi**abl**e
    ****alte**rnativ**e ****a**nd** ****y**ou** ****wa**nt** ****t**o** ****be**tte**r
    ****unde**rstan**d ****t**he** ****diff**erence**s ****bet**wee**n ****th**ose**
    ****alte**rnativ**es ****i**n** ****or**der** ****t**o** ****ma**ke** ****a**n**
    ****inf**orme**d ****dec**isio**n. ****I**t** ****i**s** ****id**eal** ****f**or**
    ****bus**ines**s ****pla**nnin**g, ****inve**stmen**t ****deci**sion**s, ****pu**bli**c
    ****po**lic**y, ****o**r** ****a**ny** ****situ**atio**n ****wh**ere** ****y**ou**
    ****mu**st** ****ch**oos**e ****bet**wee**n ****sev**era**l ****possi**biliti**es.'
  id: totrans-1163
  prefs: []
  type: TYPE_NORMAL
  zh: 当存在多个可行的替代方案且你想要更好地理解这些替代方案之间的差异以便做出明智决策时，应使用**情景比较**。这对于商业规划、投资决策、公共政策或任何你必须从几个可能性中进行选择的情况都是理想的。
- en: '****Th**is** ****tech**niqu**e ****i**s** ****reco**mmende**d ****i**n** ****pla**nnin**g
    ****a**nd** ****ana**lysi**s ****con**text**s, ****wh**ere** ****t**he** ****pote**ntia**l
    ****out**come**s ****o**f** ****ea**ch** ****ch**oic**e ****m**ay** ****ha**ve**
    ****impo**rtan**t ****impl**icatio**ns. ****I**t** ****i**s** ****us**efu**l ****wh**en**
    ****o**ne** ****wa**nts** ****t**o** ****pre**dic**t ****t**he** ****cons**equenc**es
    ****o**f** ****diff**eren**t ****appr**oache**s ****a**nd** ****as**ses**s ****wh**ich**
    ****wo**uld** ****b**e** ****mo**st** ****bene**ficia**l ****i**n** ****te**rms**
    ****o**f** ****co**st**, ****so**cia**l ****im**pac**t, ****o**r** ****effi**cienc**y.'
  id: totrans-1164
  prefs: []
  type: TYPE_NORMAL
  zh: 这种技术在**规划和分析**环境中推荐使用，在这些环境中，每个选择的潜在结果可能具有重要的意义。当一个人想要预测不同方法的结果并评估哪种方法在成本、社会影响或效率方面最有益时，它是有用的。
- en: '****Addi**tional**ly, ****Sce**nari**o ****Comp**ariso**n ****i**s** ****val**uabl**e
    ****i**n** ****situ**ation**s ****wh**ere** ****y**ou** ****wa**nt** ****t**o**
    ****te**ach** ****ab**out** ****t**he** ****pos**sibl**e ****impl**icatio**ns
    ****o**f** ****diff**eren**t ****deci**sion**s. ****Comp**arin**g ****diff**eren**t
    ****fut**ure**s ****al**low**s ****f**or** ****a**** ****bro**ade**r ****vi**ew**
    ****a**nd** ****enco**urage**s ****t**he** ****us**er** ****t**o** ****th**ink**
    ****crit**icall**y ****ab**out** ****th**eir** ****cho**ice**s.'
  id: totrans-1165
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，**情景比较**在以下情况下非常有价值：当你想要讲解不同决策可能带来的潜在影响。比较不同的未来允许用户更广泛地看待问题，并鼓励用户批判性地思考他们的选择。
- en: '[****Ti**ps** ****f**or** ****u**se**]'
  id: totrans-1166
  prefs: []
  type: TYPE_NORMAL
  zh: '[使用技巧]'
- en: ● ****Cle**arl**y ****de**fin**e ****t**he** ****scen**ario**s ****y**ou** ****wa**nt**
    ****t**o** ****com**par**e ****a**nd** ****pro**vid**e ****t**he** ****comp**ariso**n
    ****cri**teri**a. ****Th**is** ****wi**ll** ****he**lp** ****t**he** ****L**LM**
    ****stru**ctur**e ****a**** ****compr**ehensi**ve ****a**nd** ****det**aile**d
    ****ana**lysi**s.
  id: totrans-1167
  prefs: []
  type: TYPE_NORMAL
  zh: ● **明确定义你想要比较的场景并提供比较标准。这将帮助LLM结构一个全面且详细的分析。**
- en: ● ****U**se** ****mul**tipl**e ****cri**teri**a ****f**or** ****comp**ariso**n,
    ****su**ch** ****a**s** ****co**st**, ****envir**onment**al ****im**pac**t, ****feas**ibilit**y
    ****a**nd** ****so**cia**l ****ben**efit**s. ****T**he** ****mo**re** ****det**aile**d
    ****t**he** ****ana**lysi**s, ****t**he** ****mo**re** ****us**efu**l ****t**he**
    ****re**sul**t ****wi**ll** ****b**e**.
  id: totrans-1168
  prefs: []
  type: TYPE_NORMAL
  zh: ● 使用多个标准进行比较，如成本、环境影响、可行性和社会效益。分析越详细，结果就越有用。
- en: '[****T**he** ****diff**erenc**e ****i**n** ****tech**niqu**e ]'
  id: totrans-1169
  prefs: []
  type: TYPE_NORMAL
  zh: '[**技术差异**]'
- en: '****Sce**nari**o ****Comp**ariso**n ****dif**fer**s ****fr**om** ****Sce**nari**o
    ****Pla**nnin**g, ****wh**ere** ****t**he** ****fo**cus** ****i**s** ****o**n**
    ****cre**atin**g ****mul**tipl**e ****pos**sibl**e ****scen**ario**s. ****I**n**
    ****Sce**nari**o ****Pla**nnin**g, ****t**he** ****go**al** ****i**s** ****t**o**
    ****exp**lor**e ****op**en** ****possi**biliti**es, ****wh**ile** ****i**n** ****Sce**nari**o
    ****Comp**ariso**n, ****t**he** ****fo**cus** ****i**s** ****o**n** ****comp**arin**g
    ****alr**ead**y ****pres**ente**d ****scen**ario**s ****t**o** ****be**tte**r
    ****unde**rstan**d ****th**eir** ****adva**ntage**s, ****disad**vantag**es, ****a**nd**
    ****impl**icatio**ns.'
  id: totrans-1170
  prefs: []
  type: TYPE_NORMAL
  zh: '**场景比较**与**场景规划**不同，后者侧重于创建多个可能场景。在场景规划中，目标是探索开放的可能性，而在场景比较中，重点是比较已经呈现的场景，以更好地理解它们的优点、缺点和影响。'
- en: '****Com**pare**d ****t**o** ****Comp**arativ**e ****Prom**ptin**g , ****wh**ich**
    ****foc**use**s ****o**n** ****comp**arin**g ****t**wo** ****ele**ment**s ****su**ch**
    ****a**s** ****con**cept**s, ****id**eas**, ****o**r** ****obj**ect**s, ****Sce**nari**o
    ****Comp**ariso**n ****foc**use**s ****o**n** ****anal**yzin**g ****com**plet**e
    ****hypo**thetic**al ****situ**ation**s, ****cons**iderin**g ****t**he** ****pote**ntia**l
    ****im**pac**t ****o**f** ****ea**ch** ****o**ne**. ****Th**is** ****tech**niqu**e
    ****exp**lore**s ****t**he** ****cons**equenc**es ****o**f** ****com**ple**x ****scen**ario**s
    ****mo**re**, ****ra**the**r ****th**an** ****comp**arin**g ****iso**late**d ****fea**ture**s.'
  id: totrans-1171
  prefs: []
  type: TYPE_NORMAL
  zh: '**与比较提示相比，后者专注于比较两个元素，如概念、想法或对象，**场景比较**专注于分析完整的假设情况，考虑每个情况的潜在影响。这种技术更多地探索复杂场景的后果，而不是比较孤立的特征。'
- en: '****Rega**rdin**g ****t**he** ****Hypo**thetic**al ****Reas**onin**g , ****wh**ich**
    ****inv**olve**s ****imag**inin**g ****a**** ****si**ngl**e ****hypo**thetic**al
    ****sce**nari**o, ****Sce**nari**o ****Comp**ariso**n ****ai**ms** ****t**o**
    ****exp**lor**e ****h**ow** ****diff**eren**t ****scen**ario**s ****com**par**e
    ****t**o** ****ea**ch** ****ot**her**, ****cre**atin**g ****a**n** ****ana**lysi**s
    ****th**at** ****al**low**s ****y**ou** ****t**o** ****ch**oos**e ****t**he**
    ****be**st** ****app**roac**h ****am**ong** ****sev**era**l ****pos**sibl**e ****alte**rnativ**es.'
  id: totrans-1172
  prefs: []
  type: TYPE_NORMAL
  zh: '**关于**假设推理，它涉及想象一个单独的假设场景，**场景比较**旨在探索不同场景如何相互比较，创建一个分析，让你能够在多个可能的选择中做出最佳选择。'
- en: '[****Exa**mple**s]'
  id: totrans-1173
  prefs: []
  type: TYPE_NORMAL
  zh: '[**示例**]'
- en: '●        ****Ba**sic** :'
  id: totrans-1174
  prefs: []
  type: TYPE_NORMAL
  zh: ● **基本**：
- en: '○ ****Que**stio**n : "****Wh**at** ****wo**uld** ****b**e** ****t**he** ****im**pac**t
    ****o**f** ****ado**ptin**g ****a**** ****hy**bri**d ****lea**rnin**g ****sy**ste**m
    ****ve**rsu**s ****a**** ****comp**letel**y ****on**lin**e ****lea**rnin**g ****sy**ste**m?
    "'
  id: totrans-1175
  prefs: []
  type: TYPE_NORMAL
  zh: ○ ****问题**："**采用混合学习系统与完全在线学习系统相比，会产生什么影响**？"
- en: '○        ****Sce**nari**o ****Comp**ariso**n :'
  id: totrans-1176
  prefs: []
  type: TYPE_NORMAL
  zh: '○        **场景比较** :'
- en: '■        ****Hy**bri**d ****Tea**chin**g :'
  id: totrans-1177
  prefs: []
  type: TYPE_NORMAL
  zh: '■        **混合教学** :'
- en: '■ ****Adva**ntage**s: "****I**t** ****of**fer**s ****flex**ibilit**y ****f**or**
    ****stu**dent**s ****a**nd** ****main**tain**s ****t**he** ****so**cia**l, ****fa**ce**-****t**o**-****fa**ce**
    ****inte**ractio**n ****th**at** ****c**an** ****b**e** ****impo**rtan**t ****f**or**
    ****lea**rnin**g ****a**nd** ****per**sona**l ****deve**lopmen**t. "'
  id: totrans-1178
  prefs: []
  type: TYPE_NORMAL
  zh: ■ ****优势**："**它为学生提供灵活性，并保持社会、面对面互动，这对于学习和个人发展可能很重要**。"
- en: '■        ****Disad**vantag**es: "****Req**uire**s ****infra**structu**re ****f**or**
    ****bo**th** ****i**n**-****pe**rso**n ****a**nd** ****on**lin**e ****cla**sse**s,
    ****wh**ich** ****c**an** ****inc**reas**e ****co**sts** ****f**or** ****inst**itutio**ns.
    "'
  id: totrans-1179
  prefs: []
  type: TYPE_NORMAL
  zh: ■        **劣势**："**需要为个人和在线课程都提供基础设施，这可能会增加机构的成本**。"
- en: '■        ****Comp**letel**y ****On**lin**e ****Tea**chin**g :'
  id: totrans-1180
  prefs: []
  type: TYPE_NORMAL
  zh: '■        **完全在线教学** :'
- en: '■        ****Adva**ntage**s: "****Gre**ate**r ****flex**ibilit**y ****a**nd**
    ****acces**sibili**ty, ****espe**ciall**y ****f**or** ****stu**dent**s ****w**ho**
    ****li**ve** ****f**ar** ****fr**om** ****la**rge** ****ur**ban** ****cen**ter**s.
    "'
  id: totrans-1181
  prefs: []
  type: TYPE_NORMAL
  zh: ■        **优势**："**更大的灵活性和可访问性，尤其是对于居住在远离大型城市中心的学生的学生**。"
- en: '■ ****Disad**vantag**es: "****I**t** ****c**an** ****ca**use** ****isol**atio**n
    ****a**nd** ****disen**gageme**nt ****am**ong** ****stu**dent**s, ****a**nd**
    ****i**t** ****c**an** ****b**e** ****ha**rde**r ****f**or** ****so**me** ****t**o**
    ****mai**ntai**n ****t**he** ****se**lf**-****disc**iplin**e ****ne**ede**d ****t**o**
    ****ke**ep** ****u**p**. "'
  id: totrans-1182
  prefs: []
  type: TYPE_NORMAL
  zh: ■ ****劣势**："**可能导致学生之间的孤立和脱节，并且对于一些人来说，维持保持自我纪律以保持学习的难度更大**。"
- en: '■ ****Comp**ariso**n : "****Ble**nde**d ****lea**rnin**g ****of**fer**s ****a****
    ****bal**anc**e ****b**ut** ****req**uire**s ****gre**ate**r ****inve**stmen**t
    ****i**n** ****infra**structu**re, ****wh**ile** ****on**lin**e ****lea**rnin**g
    ****c**an** ****re**ach** ****mo**re** ****pe**opl**e ****a**t** ****a**** ****lo**wer**
    ****co**st**, ****b**ut** ****t**he** ****lo**ss** ****o**f** ****fa**ce**-****t**o**-****fa**ce**
    ****inte**ractio**n ****c**an** ****af**fec**t ****t**he** ****qua**lit**y ****o**f**
    ****lea**rnin**g. "'
  id: totrans-1183
  prefs: []
  type: TYPE_NORMAL
  zh: ■ ****比较**："**混合学习提供了一种平衡，但需要更大的基础设施投资，而在线学习可以以更低的成本触及更多人，但面对面互动的丧失可能会影响学习的质量**。"
- en: '●        ****Inte**rmedia**ry :'
  id: totrans-1184
  prefs: []
  type: TYPE_NORMAL
  zh: '●        **中间** :'
- en: '○ ****Que**stio**n : "****H**ow** ****do**es** ****t**he** ****im**pac**t ****o**f**
    ****repl**acin**g ****fo**ssi**l ****fu**els** ****wi**th** ****so**lar** ****en**erg**y
    ****ve**rsu**s ****nuc**lea**r ****en**erg**y ****com**par**e ****i**n** ****te**rms**
    ****o**f** ****susta**inabili**ty? "'
  id: totrans-1185
  prefs: []
  type: TYPE_NORMAL
  zh: ○ ****问题**："**用太阳能替代化石燃料与核能相比，在可持续性方面如何比较**？"
- en: '○        ****Sce**nari**o ****Comp**ariso**n :'
  id: totrans-1186
  prefs: []
  type: TYPE_NORMAL
  zh: '○        **场景比较** :'
- en: '■        ****So**lar** ****En**erg**y :'
  id: totrans-1187
  prefs: []
  type: TYPE_NORMAL
  zh: '■        **太阳能** :'
- en: '■        ****Adva**ntage**s: "****Rene**wabl**e, ****le**ss** ****poll**utin**g
    ****a**nd** ****do**es** ****n**ot** ****em**it** ****gree**nhous**e ****ga**ses**
    ****du**rin**g ****oper**atio**n. "'
  id: totrans-1188
  prefs: []
  type: TYPE_NORMAL
  zh: ■        **优势**："**可再生、污染少，并且在运行过程中不排放温室气体**。"
- en: '■        ****Disad**vantag**es: "****Depe**nden**t ****o**n** ****wea**the**r
    ****cond**ition**s ****a**nd** ****req**uire**s ****la**rge** ****ar**eas** ****f**or**
    ****pa**nel** ****inst**allati**on. "'
  id: totrans-1189
  prefs: []
  type: TYPE_NORMAL
  zh: ■        **劣势**："**依赖于天气条件，并且需要大面积进行面板安装**。"
- en: '■        ****Nuc**lea**r ****En**erg**y :'
  id: totrans-1190
  prefs: []
  type: TYPE_NORMAL
  zh: ■        ****核能**：
- en: '■ ****Adva**ntage**s: "****Hi**gh** ****effi**cienc**y ****a**nd** ****abi**lit**y
    ****t**o** ****gen**erat**e ****la**rge** ****amo**unt**s ****o**f** ****con**stan**t
    ****en**erg**y ****wit**hou**t ****di**rec**t ****ca**rbo**n ****emis**sion**s.
    "'
  id: totrans-1191
  prefs: []
  type: TYPE_NORMAL
  zh: ■ ****优点**： "****高效率和产生大量恒定能源的能力，无需直接碳排放。"
- en: '■ ****Disad**vantag**es: "****I**t** ****pro**duce**s ****radi**oactiv**e ****wa**ste**
    ****th**at** ****ne**eds** ****t**o** ****b**e** ****st**ore**d ****f**or** ****thou**sand**s
    ****o**f** ****ye**ars** ****a**nd** ****th**ere** ****i**s** ****a**** ****ri**sk**
    ****o**f** ****nuc**lea**r ****acci**dent**s. "'
  id: totrans-1192
  prefs: []
  type: TYPE_NORMAL
  zh: ■ ****缺点**： "****它产生放射性废物，需要储存数千年，并且存在核事故的风险。"
