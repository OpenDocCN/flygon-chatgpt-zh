- en: 1. Introducing ChatGPT for Java Developers
  id: totrans-23
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 1. 为Java开发者介绍ChatGPT
- en: Bruce Hopkins^([1](#Aff2)  )(1)Beaverton, OR, USA
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 布鲁斯·霍普金斯^([1](#Aff2)  )(1)美国俄勒冈州比佛顿
- en: Who Is This Book For?
  id: totrans-25
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 这本书适合谁？
- en: First of all, this book is for Java developers who don’t have any training or
    experience in artificial intelligence, natural language processing, machine learning,
    or deep learning. You may have heard of the term “language model,” but I’m going
    to assume that it’s NOT a term that you use every day.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，这本书是为那些在人工智能、自然语言处理、机器学习或深度学习方面没有任何培训或经验的Java开发者而写的。你可能听说过“语言模型”这个术语，但我会假设这不是你每天都会使用的术语。
- en: Secondly, you might be familiar with (or have tried) ChatGPT, but you don’t
    *quite* understand how everything works “under the hood” and you’re not sure how
    to get started in order to use Java and ChatGPT programmatically together to “AI
    enable” your own applications and services.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 其次，你可能熟悉（或尝试过）ChatGPT，但你并不完全理解“内部”是如何运作的，你也不确定如何开始，以便将Java和ChatGPT程序化地结合起来，以“AI赋能”你自己的应用程序和服务。
- en: Note
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: Although ChatGPT is a household name, OpenAI, the company behind it, lacks broad
    recognition and isn’t as widely recognized. So, although this book is about how
    to use ChatGPT programmatically within your Java apps, the APIs that we will be
    using are officially the OpenAI REST APIs. Therefore, we’ll be using the term
    “ChatGPT API” and “OpenAI API” synonymously.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然ChatGPT是一个家喻户晓的名字，但背后的公司OpenAI却缺乏广泛的认可。因此，尽管这本书是关于如何在Java应用程序中程序化地使用ChatGPT，但我们将要使用的API是官方的OpenAI
    REST API。因此，我们将使用“ChatGPT API”和“OpenAI API”同义。
- en: Chapter Overview
  id: totrans-30
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 章节概述
- en: In this chapter, we’re going to dive right in and explain a few terms that you
    might not be familiar with, and then go straight to the ChatGPT Playground. The
    Playground is essentially a web interface for developers that’s built on top of
    ChatGPT REST API. So, once you’re familiar with the Playground, the calls and
    responses from the ChatGPT API will feel like second nature to you.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将直接深入解释一些你可能不熟悉的术语，然后直接进入ChatGPT游乐场。游乐场本质上是一个基于ChatGPT REST API构建的开发者网页界面。因此，一旦你熟悉了游乐场，ChatGPT
    API的调用和响应将对你来说就像第二本能一样自然。
