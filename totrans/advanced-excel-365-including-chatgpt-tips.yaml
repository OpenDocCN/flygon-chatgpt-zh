- en: CHAPTER  17
  id: totrans-2745
  prefs: []
  type: TYPE_NORMAL
  zh: 第 17 章
- en: Conditional Statements in VBA
  id: totrans-2746
  prefs: []
  type: TYPE_NORMAL
  zh: VBA 中的条件语句
- en: Introduction
  id: totrans-2747
  prefs: []
  type: TYPE_NORMAL
  zh: Introduction
- en: 'In Visual Basic for Applications (VBA), conditional statements are used to
    make decisions in your code based on certain conditions. They allow you to execute
    different blocks of code depending on the outcome of a logical expression. In
    this chapter, we will focus on two commonly used conditional statements in VBA:
    Select Case and If...End If.'
  id: totrans-2748
  prefs: []
  type: TYPE_NORMAL
  zh: 在 Visual Basic for Applications (VBA) 中，条件语句用于根据某些条件在代码中做出决策。它们允许您根据逻辑表达式的结果执行不同的代码块。在本章中，我们将重点介绍
    VBA 中常用的两个条件语句：Select Case 和 If...End If。
- en: Structure
  id: totrans-2749
  prefs: []
  type: TYPE_NORMAL
  zh: Structure
- en: 'In this chapter, we will go over the following topics:'
  id: totrans-2750
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将讨论以下主题：
- en: ■If…End If
  id: totrans-2751
  prefs: []
  type: TYPE_NORMAL
  zh: ■If…End If
- en: ■Select Case
  id: totrans-2752
  prefs: []
  type: TYPE_NORMAL
  zh: ■Select Case
- en: ■Select Case vs. If…End If
  id: totrans-2753
  prefs: []
  type: TYPE_NORMAL
  zh: ■Select Case 与 If…End If
- en: Objectives
  id: totrans-2754
  prefs: []
  type: TYPE_NORMAL
  zh: Objectives
- en: By the end of this chapter, the reader will learn the differences between Select
    Case and If...End If statements in VBA and learn their appropriate usage in different
    scenarios.
  id: totrans-2755
  prefs: []
  type: TYPE_NORMAL
  zh: 到本章结束时，读者将了解 VBA 中 Select Case 和 If...End If 语句的区别，并学习在不同场景中它们的适当用法。
- en: If…End If
  id: totrans-2756
  prefs: []
  type: TYPE_NORMAL
  zh: If…End If
- en: 'In VBA, the If...End If statement is used to evaluate a condition and execute
    a block of code if the condition is true. It can also be combined with ElseIf
    and Else clauses to handle multiple conditions. Here is an example of the basic
    syntax for the If...End If statement:'
  id: totrans-2757
  prefs: []
  type: TYPE_NORMAL
  zh: 在 VBA 中，If...End If 语句用于评估条件，如果条件为真，则执行代码块。它还可以与 ElseIf 和 Else 子句结合使用，以处理多个条件。以下是
    If...End If 语句的基本语法示例：
- en: If condition1 Then
  id: totrans-2758
  prefs: []
  type: TYPE_NORMAL
  zh: If condition1 Then
- en: ''' Code block to execute if condition1 is True'
  id: totrans-2759
  prefs: []
  type: TYPE_NORMAL
  zh: ''' 如果 condition1 为真，则执行以下代码块'
- en: ElseIf condition2 Then
  id: totrans-2760
  prefs: []
  type: TYPE_NORMAL
  zh: ElseIf condition2 Then
- en: ''' Code block to execute if condition2 is True and condition1 is False'
  id: totrans-2761
  prefs: []
  type: TYPE_NORMAL
  zh: ''' 如果 condition2 为真且 condition1 为假，则执行以下代码块'
- en: Else
  id: totrans-2762
  prefs: []
  type: TYPE_NORMAL
  zh: Else
- en: ''' Code block to execute if none of the previous conditions are'
  id: totrans-2763
  prefs: []
  type: TYPE_NORMAL
  zh: ''' 如果前面的条件都不满足，则执行以下代码块'
- en: 'True'
  id: totrans-2764
  prefs: []
  type: TYPE_NORMAL
  zh: 'True'
- en: End If
  id: totrans-2765
  prefs: []
  type: TYPE_NORMAL
  zh: End If
- en: The “condition” and “condition2” expressions in the above example are Boolean
    expressions that evaluate to either true or false.
  id: totrans-2766
  prefs: []
  type: TYPE_NORMAL
  zh: 在上述示例中，“condition”和“condition2”表达式是布尔表达式，其结果为真或假。
- en: It is important to note that the “If…End If statement can be nested within other
    control structures, like loops, and can be used in combination with other statements
    and keywords to create more complex logic in your VBA code.
  id: totrans-2767
  prefs: []
  type: TYPE_NORMAL
  zh: 需要注意的是，“If…End If 语句可以嵌套在其他控制结构（如循环）中，并且可以与其他语句和关键字结合使用，以在 VBA 代码中创建更复杂的逻辑。
- en: Example
  id: totrans-2768
  prefs: []
  type: TYPE_NORMAL
  zh: Example
- en: 'If the score is equal to or greater than 90, it displays “Grade: A.” If it
    is between 80 and 89, it displays “Grade: B,” and so on. If the score does not
    meet any of the specified conditions, it displays “Grade: F.”'
  id: totrans-2769
  prefs: []
  type: TYPE_NORMAL
  zh: '如果分数等于或大于 90，则显示“Grade: A。”如果分数在 80 到 89 之间，则显示“Grade: B”，依此类推。如果分数不符合任何指定条件，则显示“Grade:
    F。”'
- en: Sub GradeEvaluation()
  id: totrans-2770
  prefs: []
  type: TYPE_NORMAL
  zh: Sub GradeEvaluation()
- en: Dim score As Integer
  id: totrans-2771
  prefs: []
  type: TYPE_NORMAL
  zh: Dim score As Integer
- en: ''' Prompt the user to enter a score score = InputBox("Enter the score:")'
  id: totrans-2772
  prefs: []
  type: TYPE_NORMAL
  zh: ''' 提示用户输入分数 score = InputBox("Enter the score:")'
- en: ''' Evaluate the score and provide a corresponding grade If score >= 90 Then'
  id: totrans-2773
  prefs: []
  type: TYPE_NORMAL
  zh: ''' 如果分数大于等于 90，则评估分数并提供相应的等级 If score >= 90 Then'
- en: 'MsgBox "Grade: A"'
  id: totrans-2774
  prefs: []
  type: TYPE_NORMAL
  zh: 'MsgBox "Grade: A"'
- en: ElseIf score >= 80 Then
  id: totrans-2775
  prefs: []
  type: TYPE_NORMAL
  zh: ElseIf score >= 80 Then
- en: 'MsgBox "Grade: B"'
  id: totrans-2776
  prefs: []
  type: TYPE_NORMAL
  zh: 'MsgBox "Grade: B"'
- en: ElseIf score >= 70 Then
  id: totrans-2777
  prefs: []
  type: TYPE_NORMAL
  zh: ElseIf score >= 70 Then
- en: 'MsgBox "Grade: C"'
  id: totrans-2778
  prefs: []
  type: TYPE_NORMAL
  zh: 'MsgBox "Grade: C"'
- en: ElseIf score >= 60 Then
  id: totrans-2779
  prefs: []
  type: TYPE_NORMAL
  zh: ElseIf score >= 60 Then
- en: 'MsgBox "Grade: D"'
  id: totrans-2780
  prefs: []
  type: TYPE_NORMAL
  zh: MsgBox "成绩：D"
- en: Else
  id: totrans-2781
  prefs: []
  type: TYPE_NORMAL
  zh: Else
- en: 'MsgBox "Grade: F"'
  id: totrans-2782
  prefs: []
  type: TYPE_NORMAL
  zh: MsgBox "成绩：F"
- en: End If
  id: totrans-2783
  prefs: []
  type: TYPE_NORMAL
  zh: End If
- en: End Sub
  id: totrans-2784
  prefs: []
  type: TYPE_NORMAL
  zh: End Sub
- en: Select Case
  id: totrans-2785
  prefs: []
  type: TYPE_NORMAL
  zh: Select Case
- en: 'The Select Case statement in VBA provides a concise and structured way to handle
    multiple conditions and execute different code blocks based on the value of a
    single expression. Here is a comprehensive explanation of its syntax and usage:'
  id: totrans-2786
  prefs: []
  type: TYPE_NORMAL
  zh: VBA 中的 Select Case 语句提供了一种简洁且结构化的方式来处理多个条件，并根据单个表达式的值执行不同的代码块。以下是其语法和用法的全面解释：
- en: Select Case expression
  id: totrans-2787
  prefs: []
  type: TYPE_NORMAL
  zh: Select Case 表达式
- en: Case value1
  id: totrans-2788
  prefs: []
  type: TYPE_NORMAL
  zh: Case value1
- en: ''' Code to execute if expression matches value1'
  id: totrans-2789
  prefs: []
  type: TYPE_NORMAL
  zh: ''' 如果表达式与 value1 匹配时执行的代码'
- en: Case value2
  id: totrans-2790
  prefs: []
  type: TYPE_NORMAL
  zh: Case value2
- en: ''' Code to execute if expression matches value2'
  id: totrans-2791
  prefs: []
  type: TYPE_NORMAL
  zh: ''' 如果表达式与 value2 匹配时执行的代码'
- en: Case Else
  id: totrans-2792
  prefs: []
  type: TYPE_NORMAL
  zh: Case Else
- en: ''' Code to execute if expression does not match any previous cases'
  id: totrans-2793
  prefs: []
  type: TYPE_NORMAL
  zh: ''' 如果表达式不匹配任何之前的案例时执行的代码'
- en: End Select
  id: totrans-2794
  prefs: []
  type: TYPE_NORMAL
  zh: End Select
- en: Example
  id: totrans-2795
  prefs: []
  type: TYPE_NORMAL
  zh: 示例
- en: In this example, the program prompts the user to enter a fruit name. The Select
    Case statement then evaluates the input and displays a corresponding message based
    on the selected fruit. If the fruit is “apple,” it displays a message about it
    being a healthy choice. If it is “banana,” it mentions the potassium content.
    If it is “orange” or “mandarin,” it highlights the citrus goodness. For any other
    input, it displays a generic message.
  id: totrans-2796
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个例子中，程序提示用户输入一个水果名称。然后 Select Case 语句评估输入并根据所选的水果显示相应的消息。如果选择的是“apple”，它会显示这是一项健康选择的消息。如果选择的是“banana”，它会提到钾含量。如果选择的是“orange”或“mandarin”，它会强调柑橘类水果的好处。对于任何其他输入，它会显示一个通用的消息。
- en: Sub FruitSelection()
  id: totrans-2797
  prefs: []
  type: TYPE_NORMAL
  zh: Sub FruitSelection()
- en: Dim fruit As String
  id: totrans-2798
  prefs: []
  type: TYPE_NORMAL
  zh: Dim fruit As String
- en: ''' Prompt the user to enter a fruit name fruit = InputBox("Enter a fruit name:")'
  id: totrans-2799
  prefs: []
  type: TYPE_NORMAL
  zh: ''' 提示用户输入一个水果名称 fruit = InputBox("Enter a fruit name:")'
- en: ''' Evaluate the fruit name and display corresponding message Select Case fruit'
  id: totrans-2800
  prefs: []
  type: TYPE_NORMAL
  zh: ''' 评估水果名称并显示相应的消息 Select Case fruit'
- en: Case "apple"
  id: totrans-2801
  prefs: []
  type: TYPE_NORMAL
  zh: Case "apple"
- en: MsgBox "You selected an apple. It's a healthy choice!"
  id: totrans-2802
  prefs: []
  type: TYPE_NORMAL
  zh: MsgBox "您选择了一个苹果。这是一个健康的选择！"
- en: Case "banana"
  id: totrans-2803
  prefs: []
  type: TYPE_NORMAL
  zh: Case "banana"
- en: MsgBox "You selected a banana. It's a great source of potassium."
  id: totrans-2804
  prefs: []
  type: TYPE_NORMAL
  zh: MsgBox "您选择了一个香蕉。它是钾的极佳来源。"
- en: Case "orange", "mandarin"
  id: totrans-2805
  prefs: []
  type: TYPE_NORMAL
  zh: Case "orange", "mandarin"
- en: MsgBox "You selected an orange or a mandarin. Enjoy the citrus goodness!"
  id: totrans-2806
  prefs: []
  type: TYPE_NORMAL
  zh: MsgBox "您选择了一个橙子或柑橘。享受柑橘的美味！"
- en: Case Else
  id: totrans-2807
  prefs: []
  type: TYPE_NORMAL
  zh: Case Else
- en: MsgBox "That's an interesting choice!"
  id: totrans-2808
  prefs: []
  type: TYPE_NORMAL
  zh: MsgBox "这是一个有趣的选择！"
- en: End Select
  id: totrans-2809
  prefs: []
  type: TYPE_NORMAL
  zh: End Select
- en: End Sub
  id: totrans-2810
  prefs: []
  type: TYPE_NORMAL
  zh: End Sub
- en: Select Case vs. If … End If
  id: totrans-2811
  prefs: []
  type: TYPE_NORMAL
  zh: Select Case 与 If … End If 的比较
- en: Use the Select Case statement as an alternative to using ElseIf in If...Then...
    Else statements when comparing one expression to several different values.
  id: totrans-2812
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 Select Case 语句作为 If...Then...Else 语句中 ElseIf 的替代方案，当比较一个表达式与几个不同的值时。
- en: While If...Then...Else statements can evaluate a different expression for each
    ElseIf statement, the Select Case statement evaluates an expression only once,
    at the top of the control structure.
  id: totrans-2813
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然 If...Then...Else 语句可以为每个 ElseIf 语句评估不同的表达式，但 Select Case 语句只在一个控制结构的顶部评估一次表达式。
- en: Conclusion
  id: totrans-2814
  prefs: []
  type: TYPE_NORMAL
  zh: 结论
- en: In this chapter, we explored the differences between Select Case and If...End
    If statements in VBA. We learned that Select Case is a useful alternative when
    you have multiple conditions to evaluate against a single expression. It simplifies
    your code and improves readability. When you have distinct and unrelated conditions
    to consider, If...End If statements are more appropriate.
  id: totrans-2815
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们探讨了 VBA 中 Select Case 和 If...End If 语句之间的区别。我们了解到，当您需要对单个表达式进行多个条件评估时，Select
    Case 是一个有用的替代方案。它简化了您的代码并提高了可读性。当您考虑的是明确且无关的条件时，If...End If 语句更为合适。
- en: Exercises
  id: totrans-2816
  prefs: []
  type: TYPE_NORMAL
  zh: 练习
- en: 1. Write a VBA program that asks the user to enter a day of the week (as a number
    from one to seven), then displays the corresponding day name. Use both Select
    Case and If...End If statements to implement the program.
  id: totrans-2817
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 编写一个 VBA 程序，提示用户输入一周中的某一天（作为从一到七的数字），然后显示相应的星期名称。使用 Select Case 和 If...End
    If 语句来实现该程序。
- en: 2. Write a VBA program that asks the user to enter a number and determines if
    it is positive, negative, or zero. Use both Select Case and If...End If statements
    to implement the program.
  id: totrans-2818
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 编写一个 VBA 程序，提示用户输入一个数字，并确定它是正数、负数还是零。使用 Select Case 和 If...End If 语句来实现该程序。
- en: CHAPTER  18
  id: totrans-2819
  prefs: []
  type: TYPE_NORMAL
  zh: 第 18 章
- en: Variables and Data Types in VBA
  id: totrans-2820
  prefs: []
  type: TYPE_NORMAL
  zh: VBA 中的变量和数据类型
- en: Introduction
  id: totrans-2821
  prefs: []
  type: TYPE_NORMAL
  zh: 简介
- en: In this chapter, we will explore the fundamentals of variables and data types
    in VBA (Visual Basic for Applications). Variables are essential elements in programming
    that store and manipulate data during program execution, while data types define
    the nature of the data stored in variables. Understanding variables and data types
    is crucial for writing efficient and effective VBA code. We will cover topics
    such as declaring variables and constants, specifying data types, working with
    message boxes and input boxes, selecting cells, rows, and columns, and working
    with sheets, workbooks, and the application object.
  id: totrans-2822
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将探讨VBA（Visual Basic for Applications）中变量和数据类型的基础。变量是编程中的基本元素，在程序执行过程中存储和操作数据，而数据类型定义了存储在变量中的数据的性质。理解变量和数据类型对于编写高效和有效的VBA代码至关重要。我们将涵盖诸如声明变量和常量、指定数据类型、使用消息框和输入框、选择单元格、行和列以及与工作表、工作簿和应用程序对象一起工作等主题。
- en: Structure
  id: totrans-2823
  prefs: []
  type: TYPE_NORMAL
  zh: 结构
- en: 'In this chapter, we will cover the following topics:'
  id: totrans-2824
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将涵盖以下主题：
- en: ■Variables and constants
  id: totrans-2825
  prefs: []
  type: TYPE_NORMAL
  zh: ■变量和常量
- en: ■Declaring variables and constants
  id: totrans-2826
  prefs: []
  type: TYPE_NORMAL
  zh: ■声明变量和常量
- en: ■Data types of variables and constants
  id: totrans-2827
  prefs: []
  type: TYPE_NORMAL
  zh: ■变量和常量的数据类型
- en: ■The message box and the input box
  id: totrans-2828
  prefs: []
  type: TYPE_NORMAL
  zh: ■消息框和输入框
- en: ■Selecting and activating cells
  id: totrans-2829
  prefs: []
  type: TYPE_NORMAL
  zh: ■选择和激活单元格
- en: ■Selecting and activating rows and columns
  id: totrans-2830
  prefs: []
  type: TYPE_NORMAL
  zh: ■选择和激活行和列
- en: ■Working with Sheets
  id: totrans-2831
  prefs: []
  type: TYPE_NORMAL
  zh: ■与工作表一起工作
- en: ■Working with the Workbook
  id: totrans-2832
  prefs: []
  type: TYPE_NORMAL
  zh: ■与工作簿一起工作
- en: ■Working with the application object
  id: totrans-2833
  prefs: []
  type: TYPE_NORMAL
  zh: ■与应用程序对象一起工作
- en: Objectives
  id: totrans-2834
  prefs: []
  type: TYPE_NORMAL
  zh: 目标
- en: By the end of the chapter, the reader will be able to understand the concept
    of variables and constants in VBA and how to declare them, be familiar with different
    data types available in VBA and their respective ranges and understand the usage
    of message boxes and input boxes for user interaction. Additionally, the reader
    will also learn techniques for selecting and activating cells, rows, and columns
    in Excel, and gain knowledge on working with sheets, workbooks, and the application
    object in VBA.
  id: totrans-2835
  prefs: []
  type: TYPE_NORMAL
  zh: 到本章结束时，读者将能够理解VBA中变量和常量的概念以及如何声明它们，熟悉VBA中可用的不同数据类型及其相应的范围，并了解使用消息框和输入框进行用户交互的用法。此外，读者还将学习在Excel中选择和激活单元格、行和列的技术，并获得在VBA中与工作表、工作簿和应用程序对象一起工作的知识。
- en: Variables and Constants
  id: totrans-2836
  prefs: []
  type: TYPE_NORMAL
  zh: 变量和常量
- en: Let us now learn about variables and constants.
  id: totrans-2837
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们现在来了解变量和常量。
- en: Variables
  id: totrans-2838
  prefs: []
  type: TYPE_NORMAL
  zh: 变量
- en: 'The features of variables are as follows:'
  id: totrans-2839
  prefs: []
  type: TYPE_NORMAL
  zh: 变量的特性如下：
- en: ■A variable is a named storage location containing data that can be modified
    during program execution.
  id: totrans-2840
  prefs: []
  type: TYPE_NORMAL
  zh: ■变量是一个命名存储位置，包含在程序执行过程中可以修改的数据。
- en: ■Each variable has a name that uniquely identifies it within its scope.
  id: totrans-2841
  prefs: []
  type: TYPE_NORMAL
  zh: ■每个变量都有一个名称，它在它的作用域内是唯一的。
- en: ■A data type can be specified or not.
  id: totrans-2842
  prefs: []
  type: TYPE_NORMAL
  zh: ■数据类型可以指定也可以不指定。
- en: '■Variable names:'
  id: totrans-2843
  prefs: []
  type: TYPE_NORMAL
  zh: ■变量名：
- en: •Must begin with an alphabetic character,
  id: totrans-2844
  prefs: []
  type: TYPE_NORMAL
  zh: •必须以字母字符开头，
- en: •Must be unique within the same scope,
  id: totrans-2845
  prefs: []
  type: TYPE_NORMAL
  zh: •必须在同一作用域内是唯一的，
- en: •Cannot be longer than 255 characters, and
  id: totrans-2846
  prefs: []
  type: TYPE_NORMAL
  zh: •不能超过255个字符，并且
- en: •Must contain an embedded period or type-declaration character.
  id: totrans-2847
  prefs: []
  type: TYPE_NORMAL
  zh: •必须包含一个嵌入的点或类型声明字符。
- en: Constant
  id: totrans-2848
  prefs: []
  type: TYPE_NORMAL
  zh: 常量
- en: A constant is a named item that retains a constant value throughout the execution
    of a program. A constant can be a string or a numeric literal.
  id: totrans-2849
  prefs: []
  type: TYPE_NORMAL
  zh: 常量是一个在程序执行过程中保持恒定值的命名项。常量可以是字符串或数值字面量。
- en: Declaring Variables and Constants
  id: totrans-2850
  prefs: []
  type: TYPE_NORMAL
  zh: 声明变量和常量
- en: 'The syntax to declare a variable is:'
  id: totrans-2851
  prefs: []
  type: TYPE_NORMAL
  zh: 声明变量的语法是：
- en: DIM name_of_variable AS type_of_variable
  id: totrans-2852
  prefs: []
  type: TYPE_NORMAL
  zh: DIM name_of_variable AS type_of_variable
- en: 'For example:'
  id: totrans-2853
  prefs: []
  type: TYPE_NORMAL
  zh: 例如：
- en: Dim strName As String
  id: totrans-2854
  prefs: []
  type: TYPE_NORMAL
  zh: Dim strName As String
- en: Dim intX As Integer
  id: totrans-2855
  prefs: []
  type: TYPE_NORMAL
  zh: Dim intX As Integer
- en: Dim intX , intYAs Integer
  id: totrans-2856
  prefs: []
  type: TYPE_NORMAL
  zh: Dim intX , intYAs Integer
- en: 'The syntax to declare a constant is:'
  id: totrans-2857
  prefs: []
  type: TYPE_NORMAL
  zh: 声明常量的语法是：
- en: Const name_of_variable AS type_of_variable = constant value
  id: totrans-2858
  prefs: []
  type: TYPE_NORMAL
  zh: Const name_of_variable AS type_of_variable = constant value
- en: For example, Const conAge As Integer = 34.
  id: totrans-2859
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，Const conAge As Integer = 34.
- en: When declaring variables, use a Dim statement. For constants, use a Const statement.
  id: totrans-2860
  prefs: []
  type: TYPE_NORMAL
  zh: 在声明变量时，使用Dim语句。对于常量，使用Const语句。
- en: A declaration statement can be placed within a procedure to create a procedure-level
    variable. It may also be placed at the top of a module, in the Declarations section,
    to create a module-level variable.
  id: totrans-2861
  prefs: []
  type: TYPE_NORMAL
  zh: 声明语句可以放在过程中以创建过程级变量。它也可以放在模块的顶部，在声明部分中，以创建模块级变量。
- en: Data Types of Variables and Constants
  id: totrans-2862
  prefs: []
  type: TYPE_NORMAL
  zh: 变量和常量的数据类型
- en: '[Table 18.1](#tab18-1) shows the various ranges in data type.'
  id: totrans-2863
  prefs: []
  type: TYPE_NORMAL
  zh: '[表18.1](#tab18-1)显示了数据类型的各种范围。'
- en: TABLE 18.1 Data Types
  id: totrans-2864
  prefs: []
  type: TYPE_NORMAL
  zh: 表18.1 数据类型
- en: '| Data type | Range |'
  id: totrans-2865
  prefs: []
  type: TYPE_TB
  zh: '| 数据类型 | 范围 |'
- en: '| --- | --- |'
  id: totrans-2866
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- |'
- en: '| Byte | 0 to 255. |'
  id: totrans-2867
  prefs: []
  type: TYPE_TB
  zh: '| 字节 | 0到255。 |'
- en: '| Integer | – 32,768 to 32,767. |'
  id: totrans-2868
  prefs: []
  type: TYPE_TB
  zh: '| 整数 | – 32,768 到 32,767。 |'
- en: '| Long | – 2,147,483,648 to 2,147,483,647. |'
  id: totrans-2869
  prefs: []
  type: TYPE_TB
  zh: '| 长整型 | – 2,147,483,648 到 2,147,483,647。 |'
- en: '| Single | – 3.402823E38 to – 1.401298E – 45 (negative values). |'
  id: totrans-2870
  prefs: []
  type: TYPE_TB
  zh: '| 单精度浮点数 | – 3.402823E38 到 – 1.401298E – 45（负值）。 |'
- en: '| 1.401298E – 45 to 3.402823E38 (positive values). |'
  id: totrans-2871
  prefs: []
  type: TYPE_TB
  zh: '| 1.401298E – 45 到 3.402823E38（正值）。 |'
- en: '| Double | – 1.7200369313486231E308 to– 4.94065645841247E – 324 (negative values).
    4.94065645841247E – 324 to 1.7200369313486231E308(positive values). |'
  id: totrans-2872
  prefs: []
  type: TYPE_TB
  zh: '| 双精度浮点数 | – 1.7200369313486231E308 到 – 4.94065645841247E – 324（负值）。4.94065645841247E
    – 324 到 1.7200369313486231E308（正值）。 |'
- en: '| Currency | – 922,337,203,685,477.5808 to 922,337,203,685,477.5807. |'
  id: totrans-2873
  prefs: []
  type: TYPE_TB
  zh: '| 货币 | – 922,337,203,685,477.5808 到 922,337,203,685,477.5807。 |'
- en: '| String | Zero to approximately two billion characters. |'
  id: totrans-2874
  prefs: []
  type: TYPE_TB
  zh: '| 字符串 | 零到约二十亿个字符。 |'
- en: '| Variant | Date values: January 1, 100 to December 31, 9999. |'
  id: totrans-2875
  prefs: []
  type: TYPE_TB
  zh: '| 变体 | 日期值：100年1月1日到9999年12月31日。 |'
- en: '| Numeric values: same range as Double. |'
  id: totrans-2876
  prefs: []
  type: TYPE_TB
  zh: '| 数值：与双精度浮点数相同的范围。 |'
- en: '| String values: same range as String. |'
  id: totrans-2877
  prefs: []
  type: TYPE_TB
  zh: '| 字符串值：与字符串相同的范围。 |'
- en: '| Can also contain Error or Null values. |'
  id: totrans-2878
  prefs: []
  type: TYPE_TB
  zh: '| 也可以包含错误或空值。 |'
- en: '| Boolean | True or False. |'
  id: totrans-2879
  prefs: []
  type: TYPE_TB
  zh: '| 布尔值 | True 或 False。 |'
- en: '| Date | January 1, 100 to December 31, 9999. |'
  id: totrans-2880
  prefs: []
  type: TYPE_TB
  zh: '| 日期 | 100年1月1日到9999年12月31日。 |'
- en: '| Object | Any object reference. |'
  id: totrans-2881
  prefs: []
  type: TYPE_TB
  zh: '| 对象 | 任何对象引用。 |'
- en: Using the Option Explicit Statement
  id: totrans-2882
  prefs: []
  type: TYPE_NORMAL
  zh: 使用Option Explicit语句
- en: Use Option Explicit to enforce explicit declaration of variables. It must appear
    in a module before any procedure. If not used, undeclared variables will be of
    Variant type.
  id: totrans-2883
  prefs: []
  type: TYPE_NORMAL
  zh: 使用Option Explicit强制显式声明变量。它必须出现在模块中，在所有过程之前。如果不使用，未声明的变量将为Variant类型。
- en: Message Box and Input Box
  id: totrans-2884
  prefs: []
  type: TYPE_NORMAL
  zh: 消息框和输入框
- en: The Msgbox function displays a message in a dialog box, waits for the user to
    click a button, and returns an Integer indicating which button the user clicked.
  id: totrans-2885
  prefs: []
  type: TYPE_NORMAL
  zh: Msgbox函数在对话框中显示消息，等待用户点击按钮，并返回一个整数，表示用户点击了哪个按钮。
- en: The InputBox Function displays a prompt in a dialog box, waits for the user
    to input text or click a button, and returns a string containing the contents
    of the text box.
  id: totrans-2886
  prefs: []
  type: TYPE_NORMAL
  zh: InputBox函数在对话框中显示提示，等待用户输入文本或点击按钮，并返回一个包含文本框内容的字符串。
- en: 'Example:'
  id: totrans-2887
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：
- en: Sub Greet()
  id: totrans-2888
  prefs: []
  type: TYPE_NORMAL
  zh: Sub Greet()
- en: MsgBox "Hello " & InputBOx("What is your name?")
  id: totrans-2889
  prefs: []
  type: TYPE_NORMAL
  zh: MsgBox "Hello " & InputBox("What is your name?")
- en: End Sub
  id: totrans-2890
  prefs: []
  type: TYPE_NORMAL
  zh: 结束子程序
- en: Selecting and Activating Cells
  id: totrans-2891
  prefs: []
  type: TYPE_NORMAL
  zh: 选择和激活单元格
- en: When you work with Microsoft Excel, you usually select a cell or cells and then
    perform an action, such as formatting the cells or entering values in them.
  id: totrans-2892
  prefs: []
  type: TYPE_NORMAL
  zh: 当你使用Microsoft Excel时，你通常会选择一个或多个单元格，然后执行操作，例如格式化单元格或在其中输入值。
- en: Refer to [Table 18.2](#tab18-2) to write the codes for various actions.
  id: totrans-2893
  prefs: []
  type: TYPE_NORMAL
  zh: 请参阅[表18.2](#tab18-2)以编写各种操作的代码。
- en: TABLE 18.2 Codes for Various Actions
  id: totrans-2894
  prefs: []
  type: TYPE_NORMAL
  zh: 表18.2 各种操作的代码
- en: '| To do this | Write this code |'
  id: totrans-2895
  prefs: []
  type: TYPE_TB
  zh: '| 要这样做 | 编写此代码 |'
- en: '| Select cell A1 | Range("A1").select or Cells(1,1). select |'
  id: totrans-2896
  prefs: []
  type: TYPE_TB
  zh: '| 选择单元格 A1 | Range("A1").select 或 Cells(1,1).select |'
- en: '| Select range A1:B5 | Range("A1:b5").select |'
  id: totrans-2897
  prefs: []
  type: TYPE_TB
  zh: '| 选择范围 A1:B5 | Range("A1:B5").select |'
- en: '| Select range A1:A5 and C2:C10 | Range("A1:A5 , C2:C10").select |'
  id: totrans-2898
  prefs: []
  type: TYPE_TB
  zh: '| 选择范围 A1:A5 和 C2:C10 | Range("A1:A5, C2:C10").select |'
- en: '| Select current cell | Activecell.select |'
  id: totrans-2899
  prefs: []
  type: TYPE_TB
  zh: '| 选择当前单元格 | Activecell.select |'
- en: '| Select range from current cell to B6 | Range(Activecell , "B6").select |'
  id: totrans-2900
  prefs: []
  type: TYPE_TB
  zh: '| 从当前单元格到 B6 选择范围 | Range(Activecell, "B6").select |'
- en: '| Select current region of activecell | Activecell.currentregion.select |'
  id: totrans-2901
  prefs: []
  type: TYPE_TB
  zh: '| 选择活动单元格的当前区域 | Activecell.CurrentRegion.select |'
- en: '| Ctrl + Shift+ Down Arrow from Activecell | Range(ActivecellActivecell.End(X
    lDown)).select |'
  id: totrans-2902
  prefs: []
  type: TYPE_TB
  zh: '| 从活动单元格按 Ctrl + Shift + 向下箭头 | Range(ActivecellActivecell.End(XlDown)).select
    |'
- en: '| Ctrl + Shift + Down Arrow from cell A2 | Range("A2" , Activecell.End(XlDown)).
    Select |'
  id: totrans-2903
  prefs: []
  type: TYPE_TB
  zh: '| 从单元格 A2 按 Ctrl + Shift + 向下箭头 | Range("A2", Activecell.End(XlDown)).Select
    |'
- en: Selecting and activating rows and columns
  id: totrans-2904
  prefs: []
  type: TYPE_NORMAL
  zh: 选择和激活行和列
- en: Sometimes you need to select specific rows and columns and then perform actions.
  id: totrans-2905
  prefs: []
  type: TYPE_NORMAL
  zh: 有时你需要选择特定的行和列，然后执行操作。
- en: To do this, write the code shown in the following [Table 18.3](#tab18-3).
  id: totrans-2906
  prefs: []
  type: TYPE_NORMAL
  zh: 要这样做，请编写以下[表18.3](#tab18-3)中显示的代码。
- en: TABLE 18.3 Codes for Various Actions
  id: totrans-2907
  prefs: []
  type: TYPE_NORMAL
  zh: 表18.3 各种操作的代码
