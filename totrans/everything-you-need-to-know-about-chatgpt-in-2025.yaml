  prefs: []
  type: TYPE_NORMAL
  zh: 生成式AI的社会影响还意味着它有可能改变我们沟通的方式。随着AI模型变得更加复杂，它们与人类以自然和引人入胜的方式进行互动的能力也在增加。这引发了对我们互动真实性的问题。我们如何知道我们是在与一个人类还是一台机器交谈？我们如何信任AI生成的答案的真实性，当它们与真实人物的回答难以区分时？这种类型的哲学反思对于理解AI在我们日常生活中的影响至关重要。
