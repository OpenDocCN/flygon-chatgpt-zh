- en: Streamlining the Process of Registering Our Next Discord Bot App with Discord
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Now that we have successfully performed all the steps in order to get a functioning
    Discord bot, creating the second bot will be a piece of cake! So, let’s briefly
    reiterate all the steps from above in order to create our second Discord bot.
    I’ll make sure to point out the items that need to be changed or enhanced due
    to the fact that this second bot will work as a moderator, instead of providing
    answers to questions from the users of our Discord server.
  prefs: []
  type: TYPE_NORMAL
- en: Registering a New Discord Bot App with Discord
