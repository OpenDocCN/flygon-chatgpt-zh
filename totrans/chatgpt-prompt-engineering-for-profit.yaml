    ****d**o** ****ce**lls** ****fun**ctio**n ****a**s** ****t**he** ****ba**sic**
    ****un**it** ****o**f** ****li**fe**?” ****A**sk** ****t**he** ****mo**del** ****t**o**
    ****an**swe**r ****fr**om** ****th**is** ****n**ew** ****pers**pectiv**e.'
  id: totrans-355
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**将问题“**什么是细胞？”**重构为“**细胞如何作为生命的基本单位发挥作用？**”并要求模型从这个新视角回答。'
- en: '****Ref**ram**e ****t**he** ****que**stio**n “****W**hy** ****a**re** ****be**es**
    ****impo**rtan**t?” ****t**o** “****H**ow** ****d**o** ****be**es** ****af**fec**t
    ****t**he** ****envi**ronmen**t ****a**nd** ****o**ur** ****agri**cultur**e?”
    ****a**nd** ****s**ee** ****h**ow** ****t**he** ****mo**del** ****ans**wer**s
    ****wi**th** ****a**** ****bro**ade**r ****vi**ew**.'
  id: totrans-356
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**重新**构**建**问题“**为什么蜜蜂很重要？”**为“**蜜蜂如何影响环境和我们的农业？**”并看看模型如何从更广阔的视角回答。'
- en: '****A**sk** “****Wh**at** ****ca**use**s ****cli**mat**e ****ch**ang**e?” ****a**nd**
