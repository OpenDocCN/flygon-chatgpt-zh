  id: totrans-1422
  prefs: []
  type: TYPE_NORMAL
  zh: '"编写Python代码以使用贪心算法解决找到构成特定金额所需的最小硬币数的问题。讨论贪心算法何时最优以及它们失败的例子。"'
- en: '16: Solving Sliding Window Problems'
