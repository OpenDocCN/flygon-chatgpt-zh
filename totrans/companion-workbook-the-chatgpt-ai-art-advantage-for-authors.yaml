  id: totrans-348
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*您的提示：*'
- en: '**Generate and Assess:** Create the graphic. How clear is the layout? Is the
    text readable? Are the visuals helpful? (Note: AI might struggle with complex
    layouts or precise text placement; focus on getting the core elements right).'
  id: totrans-349
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**生成和评估：** 创建图形。布局有多清晰？文本是否可读？视觉元素是否有帮助？（注意：AI可能在复杂布局或精确文本定位方面遇到困难；专注于正确地获取核心元素）。'
- en: '**Simplify if Needed:** If ChatGPT struggles, simplify the request. Ask for
    the background and icons separately, then plan to add text using a simpler tool
    like Canva if needed.'
  id: totrans-350
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**如有需要简化：** 如果ChatGPT遇到困难，简化请求。分别请求背景和图标，然后计划使用像Canva这样的简单工具添加文本，如果需要的话。'
- en: 'Simplified Prompt Example:'
  id: totrans-351
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 简化提示示例：
- en: '*Create a clean background graphic with 5 distinct sections, each featuring
    a simple icon related to [Your Topic]. Use a [Color] color scheme.*'
  id: totrans-352
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*创建一个干净的背景图形，包含5个不同的部分，每个部分都包含与[您的主题]相关的简单图标。使用[颜色]色系。*'
- en: '**Challenge Activity Prep:** Bring your generated ad graphic or infographic
    concept to the Ad Graphic Critique session.'
  id: totrans-353
  prefs: []
