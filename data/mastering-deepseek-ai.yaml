  id: totrans-455
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc12X.jpg)'
- en: 'Here’s what DeepSeek AI gave me back:'
  id: totrans-456
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是 DeepSeek AI 给我的回复：
- en: '![](image_rsrc12Y.jpg)'
  id: totrans-457
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc12Y.jpg)'
- en: Isn’t that amazing?
  id: totrans-458
  prefs: []
  type: TYPE_NORMAL
  zh: 难道这不令人惊讶吗？
- en: Also, don’t forget to follow up the chats. For instance, if the above email
    is too long, tell the AI to make it shorter.
  id: totrans-459
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，别忘了跟进聊天。例如，如果上面的电子邮件太长，告诉 AI 让它更短。
- en: '![](image_rsrc12Z.jpg)'
  id: totrans-460
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc12Z.jpg)'
- en: Much better!
  id: totrans-461
  prefs: []
  type: TYPE_NORMAL
  zh: 太好了！
- en: 'Tip 8: Solve homework'
  id: totrans-462
  prefs: []
  type: TYPE_NORMAL
  zh: 小贴士 8：解决作业
- en: At this point, it’s probably not a surprise that you can use DeepSeek to solve
    homework too.
  id: totrans-463
  prefs: []
  type: TYPE_NORMAL
  zh: 到这个阶段，你可能会觉得使用 DeepSeek 来解决作业也不是什么惊喜了。
- en: You don’t even need to type it in. Just show an image of your task and it will
    get it done.
  id: totrans-464
  prefs: []
  type: TYPE_NORMAL
  zh: 你甚至不需要输入。只需展示你任务的图片，它就会完成。
- en: If the homework involves logical reasoning, activate DeepThink first.
  id: totrans-465
  prefs: []
  type: TYPE_NORMAL
  zh: 如果作业涉及逻辑推理，首先激活 DeepThink。
- en: '![](image_rsrc130.jpg)'
  id: totrans-466
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc130.jpg)'
- en: Then send the homework...
  id: totrans-467
  prefs: []
  type: TYPE_NORMAL
  zh: 然后发送作业...
- en: 'For example, here are three integrals I want the AI to solve:'
  id: totrans-468
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，这里有三个我想让 AI 解决的积分：
- en: '![](image_rsrc131.jpg)'
  id: totrans-469
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc131.jpg)'
- en: To do this, I can just drop the file into the view, tell the AI to solve, and
    then wait.
  id: totrans-470
  prefs: []
  type: TYPE_NORMAL
  zh: 要做到这一点，我只需将文件拖入视图，告诉 AI 解决问题，然后等待。
- en: '![](image_rsrc132.jpg)'
  id: totrans-471
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc132.jpg)'
- en: 'Here’s what DeepSeek was able to work out for me:'
  id: totrans-472
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是 DeepSeek 为我解决的问题：
- en: '![](image_rsrc133.jpg)'
  id: totrans-473
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc133.jpg)'
- en: Isn’t that amazing?
  id: totrans-474
  prefs: []
  type: TYPE_NORMAL
  zh: 难道这不令人惊讶吗？
- en: Also, it worked out the solutions step by step.
  id: totrans-475
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，它还逐步解决了问题。
- en: '![](image_rsrc134.jpg)'
  id: totrans-476
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc134.jpg)'
- en: However, this is not formatted nicely like ChatGPT would.
  id: totrans-477
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，这并没有像 ChatGPT 那样格式化得很好。
- en: 'Here’s a reference image of how ChatGPT did it:'
  id: totrans-478
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是 ChatGPT 如何做的参考图片：
- en: '![](image_rsrc135.jpg)'
  id: totrans-479
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc135.jpg)'
- en: That’s a lot better, I must admit.
  id: totrans-480
  prefs: []
  type: TYPE_NORMAL
  zh: 我必须承认，这要好得多。
- en: This is something DeepSeek could focus on in the future.
  id: totrans-481
  prefs: []
  type: TYPE_NORMAL
  zh: 这可能是 DeepSeek 未来可以关注的事情。
- en: However, it can’t nail everything at once, can it? Also, the results were correct
    so this isn’t that big an issue at all.
  id: totrans-482
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，它不能一次解决所有问题，对吧？此外，结果都是正确的，所以这根本不是什么大问题。
- en: 'Tip 9: Explain to a kid'
  id: totrans-483
  prefs: []
  type: TYPE_NORMAL
  zh: 小贴士 9：向孩子解释
- en: If there’s a new concept that you’re having a hard time wrapping your head around,
    just ask DeepSeek AI to simplify.
  id: totrans-484
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你有一个难以理解的新概念，只需让 DeepSeek AI 简化即可。
- en: The way I usually do it is by asking AI to simplify the topic for a child.
  id: totrans-485
  prefs: []
  type: TYPE_NORMAL
  zh: 我通常的做法是让 AI 为孩子简化主题。
- en: 'For example, here I’ve told DeepSeek to explain quantum entanglements to a
    kid:'
  id: totrans-486
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，这里我告诉 DeepSeek 向孩子解释量子纠缠：
- en: '![](image_rsrc136.jpg)'
  id: totrans-487
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc136.jpg)'
- en: This makes it much easier to understand—even for someone who has no idea what
    quantum mechanics means.
  id: totrans-488
  prefs: []
  type: TYPE_NORMAL
  zh: 这样做会使理解变得更加容易——即使是对于那些不知道量子力学意味着什么的人来说也是如此。
- en: This is one of my favorite ways to use AI—to explain hard topics in simple terms.
  id: totrans-489
  prefs: []
  type: TYPE_NORMAL
  zh: 这是我最喜欢的使用 AI 的方式之一——用简单的术语解释复杂的话题。
- en: 'Tip 10: Be specific'
  id: totrans-490
  prefs: []
  type: TYPE_NORMAL
  zh: 小贴士 10：具体说明
- en: To use AI effectively, add as much information as possible.
  id: totrans-491
  prefs: []
  type: TYPE_NORMAL
  zh: 要有效地使用 AI，尽可能多地添加信息。
- en: 'For example, if you just tell DeepSeek: “I’m bored, suggest my activities”,
    you’re not going to get accurate suggestions.'
  id: totrans-492
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，如果你只是告诉 DeepSeek：“我很无聊，建议我的活动”，你将不会得到准确的建议。
- en: However, if you tell the AI to ask follow-up questions about yourself to find
    the perfect activity, you can get much better results.
  id: totrans-493
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，如果你告诉 AI 提出关于你自己的后续问题以找到完美的活动，你可以得到更好的结果。
- en: This is what I always do. I tell the AI to ask me anything to optimize the outputs
    to the best of its ability.
  id: totrans-494
  prefs: []
  type: TYPE_NORMAL
  zh: 这是我一直做的事情。我告诉 AI 问我任何问题，以尽可能优化输出。
- en: 'Tip 11: Forget about typos'
  id: totrans-495
  prefs: []
  type: TYPE_NORMAL
  zh: 小贴士 11：忘记拼写错误
- en: AI understands typos. Don’t spend your time fixing those. It’s just a waste
    of time!
  id: totrans-496
  prefs: []
  type: TYPE_NORMAL
  zh: AI 可以理解拼写错误。不要浪费时间纠正它们。这只是浪费时间！
- en: 'Tip 12: Rename chats'
  id: totrans-497
  prefs: []
  type: TYPE_NORMAL
  zh: 小贴士 12：重命名聊天
- en: I recommend renaming chats. This helps you remember what the chat was about
    if there’s something you want to come back to later.
  id: totrans-498
  prefs: []
  type: TYPE_NORMAL
  zh: 我建议重命名聊天。这样，如果你以后想回顾，可以帮助你记住聊天的内容。
- en: To do this, check the left-hand side, click on the three dots on a chat, then
    choose “Rename.”
  id: totrans-499
  prefs: []
  type: TYPE_NORMAL
  zh: 要这样做，检查左侧，点击聊天上的三个点，然后选择“重命名”。
- en: '![](image_rsrc137.jpg)'
  id: totrans-500
  prefs: []
  type: TYPE_IMG
  zh: '![image_rsrc137.jpg]'
- en: 'Tip 13: Delete individual chats'
  id: totrans-501
  prefs: []
  type: TYPE_NORMAL
  zh: 小贴士 13：删除单个聊天
- en: To remove chats, click the three dots and click “Delete.”
  id: totrans-502
  prefs: []
  type: TYPE_NORMAL
  zh: 要删除聊天，点击三个点，然后点击“删除”。
- en: '![](image_rsrc138.jpg)'
  id: totrans-503
  prefs: []
  type: TYPE_IMG
  zh: '![image_rsrc138.jpg]'
- en: Then confirm the deletion.
  id: totrans-504
  prefs: []
  type: TYPE_NORMAL
  zh: 然后确认删除。
- en: '![](image_rsrc139.jpg)'
  id: totrans-505
  prefs: []
  type: TYPE_IMG
  zh: '![image_rsrc139.jpg]'
- en: 'Tip 14: Delete all chats'
  id: totrans-506
  prefs: []
  type: TYPE_NORMAL
  zh: 小贴士 14：删除所有聊天
- en: If you want to wipe out all the chats, click on your profile icon in the left-bottom
    corner.
  id: totrans-507
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您想删除所有聊天，请点击左下角的个人资料图标。
- en: '![](image_rsrc13A.jpg)'
  id: totrans-508
  prefs: []
  type: TYPE_IMG
  zh: '![image_rsrc13A.jpg]'
- en: Then choose “Delete all chats.”
  id: totrans-509
  prefs: []
  type: TYPE_NORMAL
  zh: 然后选择“删除所有聊天”。
- en: '![](image_rsrc13B.jpg)'
  id: totrans-510
  prefs: []
  type: TYPE_IMG
  zh: '![image_rsrc13B.jpg]'
- en: Then confirm the deletion.
  id: totrans-511
  prefs: []
  type: TYPE_NORMAL
  zh: 然后确认删除。
- en: 'Tip 15: Change Theme'
  id: totrans-512
  prefs: []
  type: TYPE_NORMAL
  zh: 小贴士 15：更改主题
- en: 'There are two themes in DeepSeek: The light mode and the dark mode.'
  id: totrans-513
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek 有两种主题：浅色模式和深色模式。
- en: To change this, choose “Settings.”
  id: totrans-514
  prefs: []
  type: TYPE_NORMAL
  zh: 要更改此设置，请选择“设置”。
- en: '![](image_rsrc13C.jpg)'
  id: totrans-515
  prefs: []
  type: TYPE_IMG
  zh: '![image_rsrc13C.jpg]'
- en: Then choose the “Theme” > “Dark/Light.”
  id: totrans-516
  prefs: []
  type: TYPE_NORMAL
  zh: 然后选择“主题”>“深色/浅色”。
- en: 'For example, here I’ve tweaked the dark mode to light:'
  id: totrans-517
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，这里我调整了深色模式为浅色：
- en: '![](image_rsrc13D.jpg)'
  id: totrans-518
  prefs: []
  type: TYPE_IMG
  zh: '![image_rsrc13D.jpg]'
- en: However, I think the dark mode is better because it’s easier for the eyes.
  id: totrans-519
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，我认为深色模式更好，因为它对眼睛更友好。
- en: '![](image_rsrc13E.jpg)'
  id: totrans-520
  prefs: []
  type: TYPE_IMG
  zh: '![image_rsrc13E.jpg]'
- en: 'Tip 16: Run DeepSeek privately'
  id: totrans-521
  prefs: []
  type: TYPE_NORMAL
  zh: 小贴士 16：私密运行 DeepSeek
- en: Lastly, let me show you how to install the DeepSeek R1 model on your device.
  id: totrans-522
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，让我向您展示如何在您的设备上安装 DeepSeek R1 模型。
- en: This allows you to run the AI without an internet connection. In other words,
    your messages will only happen between you and the AI.
  id: totrans-523
  prefs: []
  type: TYPE_NORMAL
  zh: 这允许您在没有互联网连接的情况下运行 AI。换句话说，您的消息只会在您和 AI 之间发生。
- en: 'Chapter 11: How To Make Money With AI'
  id: totrans-524
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第 11 章：如何用 AI 赚钱
- en: When done right, a business or freelancer using AI can bring in thousands of
    dollars every month, and you’d be amazed at how little it costs to keep the wheels
    turning. We’ve put our minds together to bring you some of the best ways of making
    money with AI using top AI-powered tools. Here15 ideas that can help you earn
    money with AI. Each of them requires access to an AI tool and some strategic thinking.
    But, each is accessible for those looking to make honest money online using AI.
  id: totrans-525
  prefs: []
  type: TYPE_NORMAL
  zh: 当做得正确时，使用 AI 的企业或自由职业者每个月可以带来数千美元的收入，你会惊讶于保持运转所需的成本有多低。我们集思广益，为您带来了一些使用顶级 AI
    工具赚钱的最佳方式。这里有 15 个想法可以帮助你用 AI 赚钱。每个都需要访问 AI 工具和一些战略性的思考。但是，对于想要使用 AI 在线赚取诚实收入的人来说，每个都是可访问的。
- en: 'AI is one of the most profitable industries in 2025, with many opportunities
    for making money. Here are 15 of the best ways to earn using AI:'
  id: totrans-526
  prefs: []
  type: TYPE_NORMAL
  zh: AI 是 2025 年最赚钱的行业之一，有很多赚钱的机会。以下是使用 AI 赚钱的 15 种最佳方式：
- en: 1\. AI-Powered Freelancing
  id: totrans-527
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1. AI 驱动的自由职业
- en: Platforms like Upwork and Fiverr offer opportunities for AI-related services,
    such as AI-generated content, chatbots, and automation scripts.
  id: totrans-528
  prefs: []
  type: TYPE_NORMAL
  zh: 如 Upwork 和 Fiverr 这样的平台提供了 AI 相关服务的机遇，例如 AI 生成的内容、聊天机器人和自动化脚本。
- en: 2\. Selling AI-Generated Content
  id: totrans-529
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2. 出售 AI 生成的内容
- en: Use AI tools like ChatGPT, Midjourney, and DALL·E to create and sell ebooks,
    blog articles, stock images, or videos.
  id: totrans-530
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 ChatGPT、Midjourney 和 DALL·E 等AI工具创建和销售电子书、博客文章、股票图片或视频。
- en: 3\. AI-Driven Chatbots & Virtual Assistants
  id: totrans-531
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3. AI驱动的聊天机器人与虚拟助手
- en: Build and sell AI-powered chatbots to businesses for customer service, sales,
    and lead generation.
  id: totrans-532
  prefs: []
  type: TYPE_NORMAL
  zh: 为企业构建和销售AI驱动的聊天机器人，用于客户服务、销售和潜在客户生成。
- en: 4\. AI-Based SaaS (Software as a Service)
  id: totrans-533
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4. 基于AI的SaaS（软件即服务）
- en: Create AI-powered tools for businesses, such as AI-driven analytics, SEO tools,
    or automated marketing software.
  id: totrans-534
  prefs: []
  type: TYPE_NORMAL
  zh: 为企业创建AI工具，例如AI驱动的分析、SEO工具或自动化营销软件。
- en: 5\. AI-Enhanced Trading & Investing
  id: totrans-535
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 5. AI增强交易与投资
- en: Use AI-powered trading bots to analyze stock or crypto markets and automate
    trading strategies.
  id: totrans-536
  prefs: []
  type: TYPE_NORMAL
  zh: 使用AI驱动的交易机器人分析股票或加密货币市场并自动化交易策略。
- en: 6\. AI for Dropshipping & E-Commerce
  id: totrans-537
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 6. AI用于Dropshipping与电子商务
- en: Leverage AI for product research, automated customer service, personalized recommendations,
    and AI-powered advertising in dropshipping businesses.
  id: totrans-538
  prefs: []
  type: TYPE_NORMAL
  zh: 利用AI进行产品研究、自动化客户服务、个性化推荐和AI驱动的广告，在Dropshipping业务中。
- en: 7\. AI Content Creation for YouTube & Social Media
  id: totrans-539
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 7. AI为YouTube和社交媒体的内容创作
- en: Use AI tools like Synthesia and Pictory to generate automated videos and sell
    content creation services or build your own monetized YouTube channel.
  id: totrans-540
  prefs: []
  type: TYPE_NORMAL
  zh: 使用Synthesia和Pictory等AI工具生成自动化视频，提供内容创作服务或建立自己的盈利YouTube频道。
- en: 8\. AI-Powered Resumes & Cover Letters
  id: totrans-541
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 8. AI驱动的简历和求职信
- en: Offer AI-assisted resume writing services or build a tool that generates optimized
    resumes and cover letters.
  id: totrans-542
  prefs: []
  type: TYPE_NORMAL
  zh: 提供AI辅助的简历写作服务或构建一个生成优化简历和求职信的工具。
- en: 9\. AI-Powered Online Courses & Coaching
  id: totrans-543
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 9. AI驱动的在线课程与辅导
- en: Develop and sell AI-related courses on platforms like Udemy, Teachable, or Coursera.
  id: totrans-544
  prefs: []
  type: TYPE_NORMAL
  zh: 在Udemy、Teachable或Coursera等平台上开发和销售AI相关课程。
- en: 10\. AI-Generated Art & NFTs
  id: totrans-545
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 10. AI生成艺术与NFT
- en: Create AI-generated artwork and sell it as prints, merchandise, or NFTs on platforms
    like OpenSea.
  id: totrans-546
  prefs: []
  type: TYPE_NORMAL
  zh: 在OpenSea等平台上创建AI生成的艺术品，并以印刷品、商品或NFT的形式出售。
- en: 11\. AI-Based Business Automation
  id: totrans-547
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 11. 基于AI的商业自动化
- en: Help businesses integrate AI for workflow automation, data analysis, and customer
    support.
  id: totrans-548
  prefs: []
  type: TYPE_NORMAL
  zh: 帮助企业将AI集成到工作流程自动化、数据分析客户支持中。
- en: 12\. AI-Powered Coding & Software Development
  id: totrans-549
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 12. AI驱动的编码与软件开发
- en: Use AI coding assistants like GitHub Copilot to speed up development and sell
    AI-driven software solutions.
  id: totrans-550
  prefs: []
  type: TYPE_NORMAL
  zh: 使用GitHub Copilot等AI编码助手来加速开发并销售AI驱动的软件解决方案。
- en: 13\. AI for Marketing & Advertising
  id: totrans-551
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 13. AI用于营销与广告
- en: Offer AI-driven copywriting, SEO, and personalized ad campaigns using AI tools
    like Jasper.ai.
  id: totrans-552
  prefs: []
  type: TYPE_NORMAL
  zh: 利用Jasper.ai等AI工具提供AI驱动的文案写作、SEO和个性化广告活动。
- en: 14\. AI in Healthcare & Legal Services
  id: totrans-553
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 14. 医疗保健与法律服务中的AI
- en: Develop AI solutions for document automation, medical diagnostics, or legal
    assistance.
  id: totrans-554
  prefs: []
  type: TYPE_NORMAL
  zh: 为文档自动化、医疗诊断或法律援助开发AI解决方案。
- en: 15\. AI Subscription Models & Membership Sites
  id: totrans-555
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 15. AI订阅模式与会员网站
- en: Build a subscription-based AI tool or website that provides valuable insights,
    automated reports, or AI-generated assets.
  id: totrans-556
  prefs: []
  type: TYPE_NORMAL
  zh: 建立基于订阅的AI工具或网站，提供有价值的见解、自动化报告或AI生成的资产。
- en: Would you like help getting started with any of these?
  id: totrans-557
  prefs: []
  type: TYPE_NORMAL
  zh: 你需要帮助开始这些中的任何一项吗？
- en: 'Chapter 12: Conclusion – The Future of AI Competition'
  id: totrans-558
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第12章：结论 – AI竞争的未来
- en: The rise of DeepSeek marks a significant turning point in the world of artificial
    intelligence. As we have seen throughout this book, DeepSeek is not only challenging
    the dominance of traditional U.S.-based tech giants like OpenAI and Google, but
    it is also reshaping the competitive dynamics in the global AI landscape. With
    its open-source model, cost-efficiency, and innovative approach to AI development,
    DeepSeek is set to play a central role in the future evolution of artificial intelligence.
  id: totrans-559
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek的兴起标志着人工智能领域的重大转折点。正如我们在整本书中看到的那样，DeepSeek不仅挑战了像OpenAI和Google这样的基于美国传统科技巨头的统治地位，而且也在重塑全球AI领域的竞争格局。凭借其开源模式、成本效益和创新的人工智能开发方法，DeepSeek注定将在人工智能未来的发展中扮演核心角色。
- en: In this chapter, we will look ahead at the future of AI competition, exploring
    the broader implications of DeepSeek’s rise, the emerging trends in AI development,
    and the role that global innovation will play in shaping the next phase of the
    AI revolution.
  id: totrans-560
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将展望AI竞争的未来，探讨DeepSeek崛起的更广泛影响、AI发展的新兴趋势以及全球创新在塑造AI革命下一阶段中的作用。
- en: A Shift in Global AI Leadership
  id: totrans-561
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 全球AI领导力的转变
- en: Historically, the U.S. has been the undisputed leader in AI research and development.
    Companies like OpenAI, Google, and Microsoft have set the standard for AI innovation,
    with their proprietary models and massive investments in computational power.
    However, DeepSeek’s entry into the scene has demonstrated that AI development
    is not limited to the resources of a few well-established tech giants.
  id: totrans-562
  prefs: []
  type: TYPE_NORMAL
  zh: 从历史上看，美国在人工智能研究和开发方面一直是无可争议的领导者。像OpenAI、谷歌和微软这样的公司为人工智能创新设定了标准，拥有他们自己的模型和大量计算能力的投资。然而，DeepSeek的加入表明，人工智能开发并不局限于少数几家已确立的科技巨头的资源。
- en: DeepSeek has shown that cutting-edge AI can be developed on a shoestring budget—a
    stark contrast to the millions, even billions, that have been poured into the
    development of models like GPT-4. This new approach makes AI technology more accessible
    and affordable, especially for smaller companies, independent developers, and
    those in regions outside of the traditional AI hubs.
  id: totrans-563
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek已经证明，尖端的人工智能可以在预算极低的情况下开发——这与投入数百万甚至数十亿资金开发GPT-4等模型的情形形成鲜明对比。这种新的方法使人工智能技术更加易于获取和负担得起，特别是对于小型公司、独立开发者和传统人工智能中心以外的地区。
- en: This shift in the balance of power reflects a broader trend in the tech industry,
    where emerging players are no longer content with merely following the lead of
    American companies. With China stepping up its AI capabilities, epitomized by
    DeepSeek, we are witnessing the rise of a multipolar world in AI, where global
    innovation is no longer constrained to a single geographic region.
  id: totrans-564
  prefs: []
  type: TYPE_NORMAL
  zh: 这种权力平衡的转变反映了科技行业的一个更广泛趋势，新兴玩家不再满足于仅仅跟随美国公司的领导。随着中国提升其人工智能能力，以DeepSeek为代表，我们正在见证人工智能领域多极世界的崛起，全球创新不再局限于单一地理区域。
- en: The Importance of Open-Source AI
  id: totrans-565
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 开源人工智能的重要性
- en: One of the key takeaways from DeepSeek’s success is the importance of the open-source
    model in the future of AI. While many of the leading AI companies have chosen
    to keep their models proprietary, limiting access to only a select few, DeepSeek’s
    decision to embrace an open-source approach has created an entirely new paradigm
    for AI development.
  id: totrans-566
  prefs: []
  type: TYPE_NORMAL
  zh: 从DeepSeek的成功中得出的一个关键教训是开源模式在人工智能未来中的重要性。虽然许多领先的AI公司选择保持他们的模型为专有，仅限于少数人访问，但DeepSeek选择拥抱开源方法，为人工智能开发创造了一个全新的范式。
- en: This shift in how AI is developed and shared has far-reaching implications.
    Developers now have the freedom to experiment, modify, and improve upon DeepSeek’s
    code, which fosters an ecosystem of collaboration and continuous improvement.
    By lowering the barrier to entry for AI development, DeepSeek is not only democratizing
    access to cutting-edge technology but also encouraging global collaboration. It’s
    an ecosystem that values innovation over exclusivity and community-driven growth
    over corporate control.
  id: totrans-567
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能的开发和共享方式的这种转变具有深远的影响。开发者现在有自由去实验、修改和改进DeepSeek的代码，这促进了协作和持续改进的生态系统。通过降低人工智能开发的门槛，DeepSeek不仅使尖端技术普及化，而且鼓励全球协作。这是一个重视创新而非排他性，重视社区驱动增长而非企业控制的生态系统。
- en: In the coming years, we are likely to see an increasing number of open-source
    AI projects gaining traction, as more developers and organizations realize the
    value of accessible, community-driven models. This shift could result in greater
    innovation, as AI development becomes a more global and inclusive effort.
  id: totrans-568
  prefs: []
  type: TYPE_NORMAL
  zh: 在未来几年，我们可能会看到越来越多的开源人工智能项目获得关注，因为更多的开发者和组织认识到可访问、社区驱动的模型的价值。这种转变可能导致更大的创新，因为人工智能开发成为一个更加全球化和包容性的努力。
- en: Cost Efficiency as the New Standard
  id: totrans-569
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 成本效益成为新标准
- en: As DeepSeek’s success proves, the future of AI may be defined by cost-efficiency.
    With its impressive capabilities, DeepSeek has shown that it is possible to develop
    advanced AI models without the massive financial investments that were once considered
    necessary for success.
  id: totrans-570
  prefs: []
  type: TYPE_NORMAL
  zh: 如DeepSeek的成功所证明，人工智能的未来可能由成本效益来定义。凭借其令人印象深刻的能力，DeepSeek已经证明，开发高级人工智能模型无需过去认为成功所必需的巨额金融投资。
- en: This cost-effective approach opens up new possibilities for businesses and developers,
    particularly those who have been priced out of the AI market due to the high costs
    associated with competing models. Smaller companies, independent developers, and
    startups now have access to AI technology that was previously out of their reach,
    leveling the playing field and enabling more diverse and dynamic innovation in
    the AI space.
  id: totrans-571
  prefs: []
  type: TYPE_NORMAL
  zh: 这种成本效益高的方法为企业和开发者开辟了新的可能性，尤其是那些由于与竞争模型相关的成本高昂而被排除在人工智能市场之外的企业和开发者。小型公司、独立开发者和初创公司现在可以接触到之前无法触及的人工智能技术，从而拉平竞争环境，使人工智能领域出现更多样化和动态的创新。
- en: In the future, cost efficiency is likely to become an essential aspect of AI
    development. As demand for AI technology grows, the industry will need to find
    ways to build powerful models while keeping costs low and operational efficiency
    high. DeepSeek’s approach could serve as a model for the next generation of AI
    technologies, where affordability becomes just as important as performance.
  id: totrans-572
  prefs: []
  type: TYPE_NORMAL
  zh: 在未来，成本效益很可能会成为人工智能发展的一个关键方面。随着对人工智能技术的需求增长，该行业将需要找到在保持成本低和运营效率高的同时构建强大模型的方法。DeepSeek的方法可能成为下一代人工智能技术的典范，其中可负担性变得与性能一样重要。
- en: The Role of Global Collaboration in AI Innovation
  id: totrans-573
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 全球合作在人工智能创新中的作用
- en: One of the most exciting aspects of DeepSeek’s rise is the potential for global
    collaboration in AI. The open-source nature of DeepSeek has already attracted
    a global community of developers who are contributing to the model’s development,
    sharing ideas, and building upon each other’s work. This collaborative ecosystem
    has created a space where AI innovation can thrive without the constraints of
    geographical or corporate borders.
  id: totrans-574
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek崛起中最令人兴奋的方面之一是人工智能全球合作的潜力。DeepSeek的开源性质已经吸引了一个全球开发者社区，他们正在为该模型的发展做出贡献，分享想法，并在此基础上进行工作。这个协作生态系统创造了一个空间，使人工智能创新可以在没有地理或企业边界限制的情况下蓬勃发展。
- en: As the AI landscape continues to evolve, we can expect an increase in cross-border
    collaboration between developers, researchers, and institutions. This global network
    of collaboration could lead to a faster rate of innovation, with new AI breakthroughs
    being driven by contributions from developers and researchers worldwide.
  id: totrans-575
  prefs: []
  type: TYPE_NORMAL
  zh: 随着人工智能格局的不断演变，我们可以期待开发者、研究人员和机构之间跨境合作的增加。这个全球合作网络可能导致创新速度加快，新的AI突破将由全球开发者和研究人员的贡献推动。
- en: In this new era of AI, no one country or company will be able to monopolize
    the field. Instead, the future of AI will be shaped by international partnerships,
    with countries and organizations working together to build on each other’s progress
    and drive technological advancement.
  id: totrans-576
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个人工智能的新时代，没有任何一个国家或公司能够垄断这个领域。相反，人工智能的未来将由国际伙伴关系塑造，各国和组织将共同努力，相互借鉴进步，推动技术进步。
- en: The Changing Competitive Landscape
  id: totrans-577
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 竞争格局的变化
- en: The competitive dynamics in the AI space are undergoing a fundamental shift.
    DeepSeek’s rise signals that the future of AI is not about competing for exclusive
    access to resources or proprietary algorithms but about creating an inclusive,
    diverse ecosystem where innovation can flourish. In the coming years, the AI industry
    will likely see more players from different countries and backgrounds stepping
    into the arena, each bringing their own unique approaches to solving problems
    and advancing technology.
  id: totrans-578
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能领域的竞争动态正在经历根本性的转变。DeepSeek的崛起标志着人工智能的未来不在于争夺对资源或专有算法的独家访问权，而在于创造一个包容、多元化的生态系统，创新可以蓬勃发展。在未来的几年里，人工智能行业可能会看到来自不同国家和背景的更多参与者进入这个领域，每个人都带来自己独特的解决问题的方法和推进技术的方法。
- en: For established companies like OpenAI, Google, and Microsoft, the challenge
    will be adapting to this new competitive landscape. With the emergence of powerful,
    open-source models like DeepSeek, these companies will need to rethink their strategies.
    The model of charging high subscription fees and limiting access to advanced features
    may no longer be sustainable in the face of more affordable and accessible alternatives.
  id: totrans-579
  prefs: []
  type: TYPE_NORMAL
  zh: 对于像OpenAI、谷歌和微软这样的成熟公司来说，挑战将是如何适应这个新的竞争格局。随着像DeepSeek这样的强大开源模型的兴起，这些公司将需要重新思考他们的策略。收取高额订阅费和限制对高级功能的访问的模式可能不再在面对更经济实惠和易于获取的替代品时可持续。
- en: At the same time, companies that have traditionally been on the sidelines of
    AI development will now have an opportunity to compete and innovate in ways they
    never could before. For example, small businesses and independent developers,
    who may have been unable to afford the astronomical costs of proprietary AI models,
    can now participate in the AI revolution thanks to DeepSeek’s affordable and open
    approach.
  id: totrans-580
  prefs: []
  type: TYPE_NORMAL
  zh: 同时，那些传统上在人工智能发展边缘的公司现在将有机会以他们以前从未能及的方式进行竞争和创新。例如，小型企业和独立开发者，他们可能无法承担专有AI模型的天文数字成本，现在可以因为
    DeepSeek 的经济实惠和开源方法而参与到人工智能革命中来。
- en: This democratization of AI is an exciting development that will lead to greater
    diversity in the types of AI models and technologies available to the world. It
    will also encourage competition that pushes the boundaries of what’s possible
    in AI.
  id: totrans-581
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能的这种民主化是一个令人兴奋的发展，将导致世界可用的AI模型和技术的类型更加多样化。它还将鼓励推动人工智能可能性的边界竞争。
- en: 'Conclusion: A New Era of AI'
  id: totrans-582
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 结论：人工智能新时代
- en: 'As we look toward the future, one thing is clear: DeepSeek’s rise is just the
    beginning of a new era in AI development. The competition in the AI space is shifting
    from a few powerful players to a more diverse and collaborative landscape where
    open-source models and cost-efficient technologies will play a central role. With
    global collaboration, cost efficiency, and democratized access to AI at the forefront,
    the next phase of AI development promises to be more inclusive and innovative
    than ever before.'
  id: totrans-583
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们展望未来时，有一点是明确的：DeepSeek 的崛起只是人工智能发展新时代的开始。人工智能领域的竞争正在从少数强大玩家转变为一个更加多元和协作的格局，其中开源模型和高效技术将扮演核心角色。在全球合作、成本效益和人工智能民主化接入的引领下，人工智能发展的下一阶段承诺将比以往任何时候都更加包容和创新。
- en: DeepSeek has already proven that cutting-edge AI can be developed without massive
    budgets and that global innovation can thrive in an open-source environment. As
    the AI industry continues to evolve, it’s clear that the future will not belong
    to just a few elite companies, but to a community of developers, researchers,
    and organizations working together to shape the future of technology.
  id: totrans-584
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek 已经证明，无需巨额预算也能开发尖端人工智能，并且在全球开源环境中创新可以蓬勃发展。随着人工智能行业的持续发展，很明显，未来不会只属于少数精英公司，而是属于一群开发者、研究人员和共同塑造技术未来的组织。
- en: 'In this new competitive landscape, the potential for progress and breakthroughs
    in AI is limitless. The question now is: who will take the next step, and how
    will the world harness the power of AI to create a better future for all?'
  id: totrans-585
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个新的竞争格局中，人工智能在进步和突破方面的潜力是无限的。现在的问题是：谁将迈出下一步，世界将如何利用人工智能的力量为所有人创造一个更美好的未来？
