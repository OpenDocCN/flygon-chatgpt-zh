  zh: 此外，还有一个关于原创性的问题。**机器**，由于其本质，并不以与人类相同的方式创造。**人工智能**从先前的模式和数据中生成内容，这引发了关于机器生产的内容是否可以被认为是真正原创的，或者它是否仅仅是现有内容的组合。这引发了关于人工智能生成创造性的真实性及其将真正新颖的事物带入艺术和文化世界的能力的问题。
