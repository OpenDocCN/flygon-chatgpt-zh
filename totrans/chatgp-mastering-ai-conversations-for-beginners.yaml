    ****guid**eline**s ****o**r** ****ru**les** (****o**r** ****algo**rithm**s, ****i**f**
    ****y**ou** ****li**ke**). ****Th**is** ****wo**uld** ****th**en** ****b**e**
    ****us**ed** ****t**o** ****com**put**e ****arit**hmeti**c (****add**itio**n ****a**nd**
    ****subt**ractio**n), ****a**nd** ****all**owe**d ****u**s** ****t**o** ****ke**ep**
