  zh: '**你可以将D&D作为双人游戏（一名玩家和一名DM）来玩，或者与尽可能多的玩家一起玩，只要DM愿意保持控制权。现在，有了ChatGPT，你甚至可以单独进行基于文本的冒险，让聊天机器人作为你的DM！这使RPG更像是一个互动故事，你可以自己决定前提，甚至完全让ChatGPT来创造与你的故事线，只需像普通玩家一样创建你的角色即可。除了在单人战役中获得一个人工智能DM来帮助你之外，你还可以使用它来设计你自己的战役，与你的朋友一起玩，用它来生成NPC来填充你正在创造的虚构世界，或者甚至用它来帮助你思考在朋友作为DM的战役中玩什么酷角色**。'
