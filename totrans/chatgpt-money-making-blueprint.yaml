  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This list provides structured prompts to help you use an AI LLM for various
    entrepreneurial tasks related to making money with AI. Use these templates as
    a starting point and iterate based on the AI’s output to achieve the best results.
  prefs: []
  type: TYPE_NORMAL
- en: 'Getting Book Topic Ideas (KDP):'
  prefs: []
  type: TYPE_NORMAL
- en: 'Niche Down:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Niche down [Topic] into more specific sub-topics.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Example: Niche down “Self-Help” into more specific sub-topics.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Book Title Ideas (KDP):'
  prefs: []
  type: TYPE_NORMAL
- en: 'Title Generation:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Please help me create 5 attractive book title ideas.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'The topic is: [Topic]'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Do the following:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Main title should state clearly what the book is about.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Subtitle should clearly state what the readers will learn inside the book.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Focus on being clear instead of fancy.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Example: The topic is “AI-Powered Content Creation.”'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Book Outline (KDP):'
  prefs: []
  type: TYPE_NORMAL
- en: 'Outline Creation:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: I’m writing a book called [Title].
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The goal is to take the reader from point A to point B.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Point A being: [Describe point A in one sentence]'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Point B being: [Describe point B in one sentence]'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Based on this information, please act as a professional book researcher and
    create a 4-chapter book outline that will take the reader from point A to B.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Please add 3 sections in bullet-point form under each chapter.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Please add 3 sub-sections in bullet-point form under each sub-section.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'FORMAT: Use markdown formatting such as headings (### H3, #### H4), bullet
    points (-), and numbered lists (1.) to organize and structure the output.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Example: Point A: The reader has no experience with AI content creation. Point
    B: The reader can create effective marketing copy using AI tools.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Writing Prompts (KDP):'
  prefs: []
  type: TYPE_NORMAL
- en: 'Introduction:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'I’m writing a book titled: [Book title].'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Please act as an expert ghostwriter and write the Introduction chapter, focusing
    on these key points:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[Key point #1]'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[Key point #2]'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[Key point #3]'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Write in the style of [An author with a writing style you like]
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Tone: [1-2 Tones]'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Example Tones: Warm, friendly, conversational, inspirational, serious, passionate,
    emotional, compassionate, humorous, authoritative, assertive, encouraging, persuasive,
    sarcastic'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Note: Key focus points can be 1-3\. “Write in the style of” and “Tone” sections
    are optional; you can remove either one or both.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Body Chapters:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Here is the next section: [Paste section name here]'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Focus on these key points:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[Key Point 1]'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[Key Point 2]'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[Key Point 3]'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Note: It’s better to do this for each “sub-section” rather than the entire
    chapter all at once.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Example: Section Name: “Understanding AI Writing Tools”. Key Points: 1\. Different
    types of AI writing tools. 2\. How to choose the right tool for your needs. 3\.
    Ethical considerations when using AI writing tools.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Conclusion:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Please write a conclusion chapter:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Focus on these key points:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[Key point #1]'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[Key point #2]'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[Key point #3]'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Note: Generally, for the conclusion chapter, you want to recap the main points
    covered in the book, thank the reader for reading until the end, and ask them
    for a review on Amazon.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Example: Key Points: 1\. Recap of the key benefits of using AI for content
    creation. 2\. Encouragement to start using AI tools. 3\. Call to action for reviews
    and feedback.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Follow-Up Prompts for Editing (KDP Content, Fiverr Gig Descriptions, Business
    Proposals, etc.):'
  prefs: []
  type: TYPE_NORMAL
- en: Rewrite it while focusing on being more practical and actionable.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Be more brief and get straight to the point.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Rewrite it without adding bullet points or lists.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Expand on [the section you want].
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Rewrite it and make sure to include [The specific detail you want included].
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Rewrite it but use more simple and common words without making it shorter.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
