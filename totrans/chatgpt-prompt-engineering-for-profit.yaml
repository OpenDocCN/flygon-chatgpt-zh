- en: '****1**0**. ****Go**al** ****Decom**positi**on (****Go**al** ****Decom**positi**on)'
  id: totrans-454
  prefs: []
  type: TYPE_NORMAL
  zh: '**10**. **目标分解（目标分解**）'
- en: '[****Wh**at** ****i**s** ]'
  id: totrans-455
  prefs: []
  type: TYPE_NORMAL
  zh: '[****Wh**at** ****i**s** ]'
- en: '****Go**al** ****Decom**positi**on , ****o**r** ****Go**al** ****Decom**positi**on,
    ****i**s** ****a**** ****pr**omp**t ****engi**neerin**g ****tech**niqu**e ****th**at**
    ****con**sist**s ****o**f** ****bre**akin**g ****do**wn** ****a**** ****com**ple**x
    ****req**ues**t ****in**to** ****sma**lle**r, ****mo**re** ****mana**geabl**e
    ****st**eps**. ****Th**is** ****tech**niqu**e ****he**lps** ****t**he** ****L**LM**
    ****de**al** ****wi**th** ****ques**tion**s ****th**at** ****inv**olv**e ****mul**tipl**e
    ****inte**rrelat**ed ****ta**sks** ****o**r** ****pa**rts**, ****faci**litati**ng
    ****t**he** ****res**pons**e ****pro**ces**s ****b**y** ****deco**mposin**g ****t**he**
    ****ove**ral**l ****go**al** ****in**to** ****mul**tipl**e ****s**ub**-****go**als**
    .'
  id: totrans-456
  prefs: []
  type: TYPE_NORMAL
  zh: '****目**标**分**解**，或称**目标分解**，是一种**提示工程**技术，它包括将一个复杂的**请求**分解成更小、更易于管理的步骤。这种技术帮助LLM处理涉及多个相互关联任务或部分的**问题**，通过将整体目标分解成多个**子目标**来简化响应过程。'
- en: '****T**he** ****cen**tra**l ****id**ea** ****i**s** ****t**o** ****ta**ke**
    ****a**** ****la**rge**r ****ta**sk** ****a**nd** ****br**eak** ****i**t** ****do**wn**
    ****in**to** ****log**ica**l, ****orga**nize**d ****pa**rts**, ****gui**din**g
    ****t**he** ****L**LM** ****t**o** ****so**lve** ****th**em** ****o**ne** ****b**y**
    ****o**ne** ****un**til** ****i**t** ****rea**che**s ****t**he** ****com**plet**e
    ****sol**utio**n. ****Wi**th** ****th**is** ****app**roac**h, ****t**he** ****sma**lle**r
    ****pa**rts** ****c**an** ****b**e** ****mo**re** ****ea**sil**y ****unde**rstoo**d
    ****a**nd** ****ans**were**d, ****resu**ltin**g ****i**n** ****a**** ****mo**re**
    ****acc**urat**e ****a**nd** ****we**ll**-****stru**cture**d ****ove**ral**l ****an**swe**r.'
  id: totrans-457
  prefs: []
  type: TYPE_NORMAL
  zh: '**中心思想**是**将**一个更大的**任务**分解成逻辑上**组织**的**部分**，**指导**LLM逐一解决它们，直到达到**完整**的**解决方案**。采用这种方法，较小的部分可以更容易地被**理解**和**回答**，从而**导致**一个更**准确**和**结构良好**的**整体**答案。'
- en: '[****Wh**at** ****i**s** ****yo**ur** ****ma**in** ****obje**ctiv**e ]'
  id: totrans-458
  prefs: []
  type: TYPE_NORMAL
  zh: '[****Wh**at** ****i**s** ****yo**ur** ****ma**in** ****obje**ctiv**e ]'
- en: '****T**he** ****ma**in** ****obje**ctiv**e ****o**f** ****t**he** ****Go**al**
    ****Decom**positi**on ****de**als** ****wi**th** ****ta**sks** ****th**at** ****m**ay**
    ****b**e** ****t**oo** ****com**ple**x ****t**o** ****b**e** ****ans**were**d
    ****i**n** ****o**ne** ****g**o**. ****B**y** ****bre**akin**g ****do**wn** ****t**he**
    ****pro**ble**m, ****t**he** ****L**LM** ****c**an** ****fo**cus** ****o**n**
    ****sol**vin**g ****ea**ch** ****sub**par**t ****wi**th** ****cla**rit**y ****a**nd**
    ****prec**isio**n, ****incr**easin**g ****t**he** ****qua**lit**y ****o**f** ****t**he**
    ****fi**nal** ****an**swe**r. ****Th**is** ****i**s** ****part**icular**ly ****us**efu**l
    ****wh**en** ****t**he** ****ta**sk** ****h**as** ****mul**tipl**e ****st**eps**
    ****o**r** ****asp**ect**s ****th**at** ****ne**ed** ****t**o** ****b**e** ****addr**esse**d
    ****sepa**ratel**y.'
  id: totrans-459
  prefs: []
  type: TYPE_NORMAL
  zh: '**目标分解**的主要目标处理那些可能过于复杂而无法一次性解决的问题。通过将问题分解，LLM可以专注于清晰地、精确地解决每个子问题，从而提高最终答案的质量。这种方法在任务包含多个步骤或需要分别处理的不同方面时尤其有用。'
- en: '****Ano**the**r ****impo**rtan**t ****go**al** ****i**s** ****t**o** ****fo**ste**r
    ****a**** ****de**epe**r ****under**standi**ng ****o**f** ****h**ow** ****t**o**
    ****ach**iev**e ****t**he** ****e**nd** ****go**al**. ****Bre**akin**g ****do**wn**
    ****t**he** ****go**al** ****he**lps** ****t**he** ****mo**del** ****t**o** ****wa**lk**
    ****thr**oug**h ****ea**ch** ****o**f** ****t**he** ****nece**ssar**y ****st**eps**,
    ****avo**idin**g ****log**ica**l ****le**aps** ****a**nd** ****prov**idin**g ****a****
    ****mo**re** ****under**standab**le ****a**nd** ****det**aile**d ****an**swe**r.
    ****Th**is** ****tech**niqu**e ****i**s** ****esse**ntia**l ****t**o** ****av**oid**
    ****gen**eri**c ****a**nd** ****simp**lifie**d ****ans**wer**s ****wh**en** ****dea**lin**g
    ****wi**th** ****to**pic**s ****th**at** ****req**uir**e ****mo**re** ****i**n**-****de**pth**
    ****ana**lysi**s.'
  id: totrans-460
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个重要目标是促进对如何实现最终目标的更深入理解。将目标分解有助于模型逐步走过每个必要步骤，避免逻辑跳跃，并提供更易于理解且详细的答案。这种技术在处理需要更深入分析的主题时至关重要，可以避免提供泛化和简化的答案。
- en: '[****H**ow** ****i**t** ****wo**rks** ]'
  id: totrans-461
  prefs: []
  type: TYPE_NORMAL
  zh: '[**如何工作**]'
- en: '****Go**al** ****Decom**positi**on ****wo**rks** ****b**y** ****as**kin**g
    ****t**he** ****L**LM** ****t**o** ****br**eak** ****do**wn** ****t**he** ****ta**sk**
    ****in**to** ****mul**tipl**e ****st**eps**. ****Init**iall**y, ****t**he** ****us**er**
    ****c**an** ****a**sk** ****t**he** ****L**LM** ****t**o** ****ide**ntif**y ****t**he**
    ****sub**task**s ****ne**ede**d ****t**o** ****com**plet**e ****t**he** ****ove**ral**l
    ****go**al**. ****Th**en**, ****ea**ch** ****o**f** ****th**ese** ****sub**task**s
    ****c**an** ****b**e** ****ans**were**d ****indi**vidual**ly. ****Th**is** ****pro**ces**s
    ****c**an** ****b**e** ****gu**ide**d ****wi**th** ****pro**mpt**s ****th**at**
    ****enco**urag**e ****log**ica**l ****div**isio**n ****a**nd** ****pla**nnin**g
    ****o**f** ****t**he** ****st**eps** ****t**o** ****b**e** ****fol**lowe**d.'
  id: totrans-462
  prefs: []
  type: TYPE_NORMAL
  zh: '**目标分解**通过让LLM将任务分解成多个步骤来实现。最初，用户可以要求LLM识别完成整体目标所需的子任务。然后，这些子任务可以单独回答。这个过程可以通过提示来引导，这些提示鼓励逻辑划分和规划要遵循的步骤。'
- en: '****F**or** ****exa**mpl**e, ****i**f** ****y**ou** ****a**sk** ****t**he**
    ****mo**del** ****t**o** ****exp**lai**n “****H**ow** ****d**o** ****I**** ****dev**elo**p
    ****a**** ****mo**bil**e ****a**pp**?”, ****a**n** ****exa**mpl**e ****o**f**
    ****go**al** ****decom**positi**on ****wo**uld** ****b**e** ****t**o** ****br**eak**
    ****t**he** ****an**swe**r ****in**to** ****t**he** ****foll**owin**g ****pa**rts**:
    “****De**fin**e ****t**he** ****a**pp** ****id**ea**”, “****Ch**oos**e ****t**he**
    ****prog**rammin**g ****lan**guag**e”, “****De**sig**n ****t**he** ****us**er**
    ****inte**rfac**e”, “ ****Impl**emen**t ****t**he** ****fea**ture**s”, ****a**nd**
    “****Te**st** ****t**he** ****a**pp**”. ****Th**is** ****w**ay**, ****t**he**
    ****L**LM** ****c**an** ****an**swe**r ****ea**ch** ****pa**rt** ****i**n** ****seq**uenc**e,
    ****prov**idin**g ****a**** ****cl**ear** ****vi**ew** ****o**f** ****t**he**
    ****en**tir**e ****pro**ces**s.'
  id: totrans-463
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，如果你要求模型解释“我如何开发一个移动应用？”，目标分解的一个例子就是将答案分解成以下部分：“定义应用想法”，“选择编程语言”，“设计用户界面”，“实现功能”，以及“测试应用”。这样，LLM可以按顺序回答每个部分，提供一个清晰的整个过程的视图。
- en: '****Th**is** ****app**roac**h ****i**s** ****id**eal** ****wh**en** ****th**ere**
    ****a**re** ****mul**tipl**e ****vari**able**s ****inv**olve**d ****i**n** ****sol**vin**g
    ****a**** ****pro**ble**m. ****T**he** ****pro**ces**s ****o**f** ****bre**akin**g
    ****t**he** ****obje**ctiv**e ****in**to** ****sma**lle**r ****pa**rts** ****al**low**s
    ****t**he** ****L**LM** ****t**o** ****fo**cus** ****o**n** ****ea**ch** ****o**f**
    ****t**he** ****indi**vidua**l ****comp**onent**s ****be**for**e ****inte**gratin**g
    ****th**em** ****in**to** ****t**he** ****ove**ral**l ****sol**utio**n.'
  id: totrans-464
  prefs: []
  type: TYPE_NORMAL
  zh: 这种方法在解决涉及多个变量的问题时是理想的。将目标分解成更小的部分，允许LLM在将它们整合到整体解决方案之前，专注于每个单独的组成部分。
- en: '[****Wh**en** ****t**o** ****u**se** ]'
  id: totrans-465
  prefs: []
  type: TYPE_NORMAL
  zh: '[何时使用]'
- en: '****Go**al** ****Decom**positi**on ****sh**oul**d ****b**e** ****us**ed** ****wh**en**
    ****t**he** ****req**ues**t ****inv**olve**s ****a**** ****ta**sk** ****th**at**
    ****m**ay** ****b**e** ****t**oo** ****br**oad** ****o**r** ****com**ple**x ****t**o**
    ****b**e** ****ans**were**d ****i**n** ****o**ne** ****g**o**. ****Th**is** ****tech**niqu**e
    ****i**s** ****us**efu**l ****f**or** ****sol**vin**g ****pro**blem**s ****th**at**
    ****inv**olv**e ****mul**tipl**e ****st**eps** ****o**r** ****req**uir**e ****det**aile**d
    ****expl**anatio**ns ****th**at** ****co**ver** ****sev**era**l ****asp**ect**s
    ****o**f** ****t**he** ****to**pic**.'
  id: totrans-466
  prefs: []
  type: TYPE_NORMAL
  zh: 当请求涉及可能过于宽泛或复杂，无法在一个目标中回答的任务时，应使用目标分解。这种技术在解决涉及多个步骤或需要详细解释，涵盖多个方面的话题时非常有用。
- en: '****I**t** ****i**s** ****id**eal** ****f**or** ****situ**ation**s ****th**at**
    ****req**uir**e ****pla**nnin**g, ****su**ch** ****a**s** ****wh**en** ****t**he**
    ****go**al** ****i**s** ****t**o** ****cr**eat**e ****some**thin**g, ****org**aniz**e
    ****com**ple**x ****info**rmatio**n, ****o**r** ****so**lve** ****a**** ****pro**ble**m
    ****th**at** ****h**as** ****sev**era**l ****la**yer**s. ****T**he** ****tech**niqu**e
    ****i**s** ****al**so** ****wi**del**y ****us**ed** ****i**n** ****educ**ationa**l
    ****con**text**s, ****a**s** ****i**t** ****al**low**s ****stu**dent**s ****t**o**
    ****s**ee** ****t**he** ****pro**ces**s ****st**ep** ****b**y** ****st**ep**,
    ****hel**pin**g ****th**em** ****unde**rstan**d ****t**he** ****wh**ole** ****con**cep**t.'
  id: totrans-467
  prefs: []
  type: TYPE_NORMAL
  zh: 它适用于需要计划的情况，例如当目标是创建某些东西、组织复杂信息或解决具有多个层的问题时。该技术也广泛应用于教育环境中，因为它允许学生逐步看到过程，帮助他们理解整个概念。
- en: '****Furt**hermor**e, ****Go**al** ****Decom**positi**on ****i**s** ****reco**mmende**d
    ****wh**en** ****t**he** ****us**er** ****ne**eds** ****a**n** ****an**swe**r
    ****th**at** ****inc**lude**s ****a**ll** ****t**he** ****impo**rtan**t ****det**ail**s,
    ****wit**hou**t ****mis**sin**g ****a**ny** ****asp**ect**s ****al**ong** ****t**he**
    ****w**ay**. ****B**y** ****bre**akin**g ****do**wn** ****t**he** ****obje**ctiv**e,
    ****t**he** ****L**LM** ****c**an** ****add**res**s ****ea**ch** ****as**pec**t
    ****i**n** ****de**tai**l ****a**nd** ****cohe**rentl**y, ****avo**idin**g ****omis**sion**s.'
  id: totrans-468
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，当用户需要包含所有重要细节的答案时，建议使用目标分解，而不会遗漏任何方面。通过分解目标，LLM 可以详细且连贯地处理每个方面，从而避免遗漏。
- en: '[****Ti**ps** ****f**or** ****u**se**]'
  id: totrans-469
  prefs: []
  type: TYPE_NORMAL
  zh: '[使用技巧](https://example.org)'
- en: ● ****Wh**en** ****as**kin**g ****yo**ur** ****L**LM** ****t**o** ****br**eak**
    ****do**wn** ****a**n** ****obje**ctiv**e, ****fi**rst** ****a**sk** ****f**or**
    ****a**** ****li**st** ****o**f** ****s**ub**-****ta**sks** ****a**nd** ****th**en**
    ****a**sk** ****th**em** ****t**o** ****exp**lai**n ****ea**ch** ****o**ne**.
    ****Th**is** ****wi**ll** ****en**sur**e ****th**at** ****ea**ch** ****st**ep**
    ****i**s** ****unde**rstoo**d ****be**for**e ****i**t** ****i**s** ****det**aile**d.
  id: totrans-470
  prefs: []
  type: TYPE_NORMAL
  zh: ● 当您要求您的 LLM 将目标分解为更小的部分时，首先要求一个子任务列表，然后要求它们解释每一个。这将确保在详细说明之前，每个步骤都被理解。
- en: ● ****B**e** ****spe**cifi**c ****wh**en** ****as**kin**g ****t**he** ****mo**del**
    ****t**o** ****exp**lai**n ****h**ow** ****a**** ****go**al** ****c**an** ****b**e**
    ****br**oke**n ****do**wn**. ****Te**ll** ****t**he** ****mo**del** ****t**o**
    ****fo**cus** ****o**n** “****bre**akin**g ****i**t** ****do**wn** ****in**to**
    ****si**mpl**e, ****log**ica**l ****st**eps**,” ****a**nd** ****th**en** ****a**sk**
    ****t**he** ****mo**del** ****t**o** ****ex**pan**d ****o**n** ****ea**ch** ****st**ep**.
  id: totrans-471
  prefs: []
  type: TYPE_NORMAL
  zh: ● 在向模型解释如何将目标分解为更小的部分时，要尽可能具体。告诉模型关注“将其分解为简单、逻辑的步骤”，然后要求模型对每一步进行展开。
- en: '[****T**he** ****diff**erenc**e ****i**n** ****tech**niqu**e ]'
  id: totrans-472
  prefs: []
  type: TYPE_NORMAL
  zh: '[技术差异](https://example.org)'
- en: '****Go**al** ****Decom**positi**on ****dif**fer**s ****fr**om** ****Ch**ain**
    ****o**f** ****Tho**ugh**t , ****wh**ich** ****foc**use**s ****o**n** ****thi**nkin**g
    ****thr**oug**h ****st**eps** ****t**o** ****re**aso**n ****ab**out** ****a****
    ****pro**ble**m, ****b**ut** ****usu**all**y ****ai**ms** ****t**o** ****ar**riv**e
    ****a**t** ****a**** ****si**ngl**e ****spe**cifi**c ****an**swe**r. ****Go**al**
    ****Decom**positi**on , ****o**n** ****t**he** ****ot**her** ****ha**nd**, ****inv**olve**s
    ****cre**atin**g ****mul**tipl**e ****s**ub**-****ta**sks** ****th**at** ****ne**ed**
    ****t**o** ****b**e** ****comp**lete**d ****t**o** ****ach**iev**e ****a**** ****la**rge**r
    ****go**al**. ****T**he** ****Ch**ain** ****o**f** ****Tho**ugh**t ****i**s**
    ****mo**re** ****o**f** ****a**** ****cont**inuou**s ****log**ica**l ****li**ne**,
    ****wh**ile** ****Go**al** ****Decom**positi**on ****br**eak**s ****t**he** ****ta**sk**
    ****in**to** ****dis**cret**e ****pa**rts**.'
  id: totrans-473
  prefs: []
  type: TYPE_NORMAL
  zh: 目标分解与思维链不同，思维链侧重于通过步骤进行思考以对问题进行推理，但通常旨在得出一个单一的特定答案。另一方面，目标分解涉及创建多个子任务，这些子任务需要完成才能实现一个更大的目标。思维链更像是一条连续的逻辑线，而目标分解则是将任务分解为离散的部分。
- en: '****Com**pare**d ****t**o** ****F**ew**-****sh**ot** ****Prom**ptin**g , ****wh**ere**
    ****exa**mple**s ****a**re** ****pro**vide**d ****t**o** ****t**he** ****mo**del**
    ****s**o** ****th**at** ****i**t** ****unde**rstand**s ****t**he** ****exp**ecte**d
    ****res**pons**e, ****decom**positi**on ****foc**use**s ****o**n** ****bre**akin**g
    ****t**he** ****ori**gina**l ****req**ues**t ****in**to** ****sev**era**l ****sma**lle**r
    ****pa**rts**. ****Wh**ile** ****F**ew**-****sh**ot** ****he**lps** ****sh**ape**
    ****t**he** ****st**yle** ****o**f** ****t**he** ****res**pons**e, ****Go**al**
    ****Decom**positi**on ****de**als** ****wi**th** ****t**he** ****comp**lexit**y
    ****o**f** ****con**ten**t.'
  id: totrans-474
  prefs: []
  type: TYPE_NORMAL
  zh: '****与少量提示相比，其中示例被提供给模型，以便模型理解预期的响应，分解重点在于将原始请求分解成几个更小的部分。虽然少量提示有助于塑造响应的风格，但目标分解处理内容的复杂性。'
